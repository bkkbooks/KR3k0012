front:
  text: 太平御覽卷第五百五
  hash: sha256:6fa47bcdbb3a268c00ae7e8c6b14ed4cce16c8d8a721f6657db5d7ddd913a26d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_505-1a}
body:
  text: 逸民部五逸民五蕭子顯齊書曰禇伯玉字元璩呉都錢塘人也年十八父爲婚婦入前門伯玉從後門出遂徃剡居瀑布山時人比之王仲都在山三十餘年隔絶人物王僧逹爲呉郡苦禮致之伯玉不得巳停郡信宿才交數言而退寧朔將軍丘彌孫與僧逹書曰聞禇先生出居貴館此子滅影雲棲不事王侯抗髙木食有年載矣自非折節好士何以致之望其還䇿之日蹔紆清塵亦願助爲譬說荅曰禇先生從白雲逰舊矣此子索然唯朋松石介於孤峯絶嶺者積數十載近故要其來此兾慰日夜比談討芝桂借訪荔蘿若巳窺煙波臨滄洲矣知君欲見之當爲申譬太祖即位手詔呉㑹二郡以禮迎遣又辭疾上不欲違其志勑於剡白石山立太平館居之又曰明僧紹字承烈平原聶人也隱長廣郡嶗山詔徴爲正貟郎稱疾不就其後上與崔思祖書曰不食周粟而食周薇古猶發議在今寧得息談耶僧紹弟慶符爲青州刺史罷任僧紹隨歸住江乗攝山太祖謂慶符曰卿兄髙尚其事亦堯之外臣與朕雖不相接有時通夢乃贈紹竹根如意南史曰郭希林武昌人也曽祖翻晉丗髙尚不仕希林少守家業徴召一無所就卒子蒙亦隱居不仕又曰辛普明字文逹少就關康之受業至性過人居貧與兄共處一帳兄亡仍帳施靈蚊甚多通夕不得寢而終不道侵螫僑居㑹稽㑹稽士子髙其行當葬兄皆送金爲贈後至者不復肯受人問其故荅曰夲以兄墓不周故不逆親友之意今實巳足豈可利亡者餘贈耶又曰杜京産字景齊呉郡錢塘人也父道鞠州從事善彈棊京産少恬静閑意榮官頗渉文義專修黄老㑹稽孔覬清剛有峻節一見而爲交郡命主簿州辟從事皆稱疾去與同郡顧懽同契始寜東山開舎受學齊建元中武陵王瞱爲㑹稽齊髙帝遣儒士劉瓛入東爲曄講瓛故往與之逰曰杜生當今之臺尚也永明十年孔珪陸澄沈約表薦京産徴爲奉朝請不至於㑹稽聚徒教授建武𥘉徴貟外散騎常侍郎京産曰莊生持釣豈爲白璧所廽辤疾不就又曰孔道徽㑹稽山隂人守志業不仕與杜京産友善道徽父祐至行通神隱於四明山谷中有數百斛錢視之如瓦石太守王僧䖍與張緒書曰孔祐敬康曽孫也行動幽祗德標松桂引爲主簿遂不可屈此古之遺德也道徽少厲髙行能丗其家風隱居南山終身不窺都邑豫章王嶷爲楊州辟西曹書佐不至郷宗慕之又曰臧榮緒東莞莒人也少孤躬自灌園以供祭祀母喪洒掃堂宇置筵席朔望輒拜薦焉甘珎未常先食純好學括東西晉爲一紀録志傳一百一十卷隱居京口教授齊髙帝爲楊州刺史徴榮緒爲主簿不到建元中司徒禇彦囬啓髙帝稱𫐠其羙以祕閣榮緒謂人曰昔宫尚奉丹書武王致齋降位李釋教誡並有禮敬之儀因甄明至道乃著拜五經序論常以宣尼庚子日生其日陳五經拜之自號披褐先生又以飲酒亂德言常爲誡永明六年卒𥘉榮緒與關康之俱隱在京口時號爲二隱又曰呉苞字天蓋濮陽鄄城人也儒學善三禮及老莊宋㤗始中過江聚徒敎學冠黄葛巾𬞞食二十餘年與劉瓛俱於禇彦回宅講授齊隆昌元年徴爲太學愽士不就始安王遥光及江祐徐孝嗣共爲立館於鐘山下教授朝士多到門焉當時稱儒者自劉瓛巳後聚徒講授唯苞一人而巳以壽終又曰樓惠明字智逺立性貞固有道術居金華山舊多毒害自惠明居之無復辛螫之苦藏名匿跡人莫之知宋明帝召不至齊髙帝徴又不至文惠太子在宫苦延方至仍又辞歸俄自金華輕棹西下及就路廻之豐安旬日聞俄賊起唯豊安獨全時人以爲有先覺齊武帝勑爲立館又曰漁父者不知姓名亦不知何許人也太康孫𬗟爲尋陽太守落日逍遥渚際見一輕舟凌波隱顯俄而漁父至神韻蕭灑垂綸長嘯𬗟甚異之乃閑問有魚賣乎漁父笑而荅曰其釣非釣寧賣魚者耶𬗟益恠焉遂褰裳渉水謂曰竊觀先生有道者也終朝鼓枻良足勞止吾聞黄金白壁重利也駟馬髙蓋榮勞也方今王道文明守在海外隱鱗之士靡然向風子胡不賛緝熈之羙何晦其用若是也漁父曰僕山海狂人不逹丗務未辨貴賤無論榮貴乃歌曰竹竿籊籊河水悠悠相忘爲樂貪餌吞釣非夷非恵聊以忘憂於是悠然鼓棹而去又曰顧歡字景怡呉興塩官人也家丗寒賤父祖並爲農歡獨好學年六七歲知推六甲家貧父使田中駈雀歡作黄雀賦而歸雀食稻過半父怒欲撻之見賦乃止郷中有學舎歡貧無以受業於舎壁後倚聽無遺忘者夕則燃松節讀書或燃糠自昭及長篤志不倦聞呉興東遷邵玄之傳五經文旬假爲書師從之受業同郡顧凱之臨縣見而異之遣諸子與逰從豫章雷次宗諮玄儒諸義母亡水漿不入口廬于墓側遂隱不仕於剡天台山開館聚徒受業諸生常近百人歡早孤讀詩至哀哀父母生我劬勞輙執書慟哭由是受學者廢蓼莪篇不復講焉又曰蔡㑹字休明陳留人清玩不與俗人交李撝謂江斆曰古人稱安貧清白曰夷涅而不緇曰白至如蔡休明者可不謂之夷白乎又曰徐伯珍字文楚東陽太末人也少孤貧無紙常以竹葉箭若甘蔗及地上學書山水暴出漂溺宅舎村隣皆奔走伯珍累床而坐講書不輟叔父璠之與顔延之友善還祛䝉山立精舎講授伯珍徃從學積十年究尋經史逰學者多依之太守琅邪王曇生呉郡張淹並加禮辟伯珍應召便退如此者凡十二焉如釋氏老莊兼明道術歳常旱伯珍筮之如期而雨舉動有禮過曲水之下趍而避早䘮妻晩不復重娶自此曽參宅南九里有山伯珎移居之階户之間木生皆連理門前梓樹一年便合抱白雀一雙栖其户牖論者以爲隠徳之感也又曰沈麟士字雲禎呉興武康人也父䖍之爲樂安令麟士㓜而俊敏年七歳聽叔父岳言玄賔散言無所遣失岳撫其肩曰若斯文不絶其爾乎及長愽通經史有髙尚之志親亡居䘮盡禮服闋忌日輙涕泣彌旬居貧織簾誦書口手不息郷里號爲織簾先生常行路隣人認其所着屐麟士曰是郷屐耶即跣而返隣人得屐送前者還之麟士笑而受之宋文帝令何尚之抄撰五經訪舉學士縣以麟士應選不得巳至都尚之深相接及去尚之謂子偃曰山藪固多竒士沈麟士黄叔度之流也汝師之麟士常苦無書因遊都下歴觀四部畢乃歎曰古人亦何人哉少時稱疾歸郷不與人物通或勸之仕荅曰魚懸獸檻天下一契聖人玄悟所以每履吉先吾誠未能景行坐忘何能不希企日損乃作玄散賦以絶丗隱居呉差山講經從學之士數百人各管屋宇依止其側時爲之語曰呉差山中有賢士開門教授居成市又曰諸葛璩字㓜玟琅邪人也丗居京口璩㓜事徴士關康之愽渉經史復師徴士臧榮緒榮緒著晉書稱璩有發擿之功方之靈壷齊建武𥘉江祀薦璩於明帝言璩安貧守道閱禮敦詩如其簡退可揚清激濁辟爲議曹從事帝許之璩辝不赴陳郡謝眺爲東海太守下教揚其風槩餉榖百斛梁天監中舉秀才不就璩性勤於誨誘後出就學者日至居宅狹陋無以容之太守張庂爲起講舎璩處身清正妻子不見喜愠之色旦夕孜孜講誦不輟時人益以此宗之又曰劉慧斐字宣文彭城人也少愽學能屬文起家梁安成王法曹行叅軍常還都途經尋陽逰於匡山遇處士張秀相得甚歡遂有終焉之志因不仕居東林寺又於山北搆園一所号曰離垢園時人因謂離垢先生逺近欽慕之簡文遺以机杖論者云自逺法師殁後將二百年始有張劉之盛矣又曰范元琰字伯珪居父憂時童孺哀慕盡禮親黨異之及長好學博通經史兼精佛義祖母患癱常自含吮與人言常恐傷物居家不出城市雖獨居如對賔客見者莫不改容憚之家貧唯以園𬞞爲業常出行見人盗其菘元琰遽退走母問其故具以實荅問盗者爲誰荅曰向所退畏其愧耻今啓其名願不泄也於是母子祕之或有渉溝盗其筍者元琰因伐木爲橋以度之自是盗大慙一郷無復草竊齊建武𥘉爲曹武平西參軍不至于時始安王遥光爲楊州謂徐孝嗣曰曹武叅軍豈是禮賢之職欲以西曹書佐聘之㑹遥光敗不果時人以爲恨梁書曰阮孝緒字士宗尉氏人父彦之誡曰冝思自朂以庻爾躬荅曰願追赤松子於滄海逐許由於穹谷耳自是屏居一室非晨昏定省未常出户外兄王晏貴顯緒度必顚覆聞笳聲至門孝緒乃穿籬逃迸及晏誅竟獲免時中丞任昉欲往見之不肯乃歎曰其室雖邇其人何逺自是飲風者莫不歛祍望塵而息也又曰陶弘景字通明丹陽人生十歲讀葛洪神仙傳曰仰青雲覩白日不覺爲逺齊髙祖作相引爲侍讀永明𥘉脫朝服掛神武門上表辝禄詔乃許之居勾容曲山自号華陽隱居武帝即位有吉㓙征討大事皆使咨問時人号爲山中宰相預知梁祚覆没乃製詩曰夷甫任散誕平叔坐論空豈悟昭陽殿遂作單于宫及侯景傾䧟篡位果在昭陽殿皆如其言大同𥘉卒年八十五顔色不變屋中有異香氣累日氲謚貞白先生有肘後方枕中術及夲草又曰沈顗呉興人也性有至介常慕黄叔度徐孺子之爲人每獨處一室罕見其面從叔㪍貴顯當朝每還呉賔客迎送填咽顗送迎不出域㪍乃歎曰吾乃今知貴不如賤也又曰何點字士哲廬江人也點雖不出入城府而遨逰于外不簪不帶駕柴車躡草履恣心所適致醉而歸士大夫多慕從之時人謂之通隱後周書曰韋夐字敬逺孝寛之兄也志尚夷簡淡於榮利太祖經略王業仄席求賢備禮辝之終不能起彌加敬重丗宗即位禮遇逾厚勑有司日給河東酒一㪷号曰逍遥公年七十而卒陳書曰馬樞字要理扶風人𥘉爲梁邵陵王綸學士綸舉兵援臺城留書二萬卷寄樞肆意尋覽將遍乃喟然歎曰吾常聞貴爵位者以巢由爲桎梏愛山林者以伊吕爲管庫今乃稽諸史典篤論其義亦各從其所好乃隱於茆山曰精洞太平御覽卷第五百五
