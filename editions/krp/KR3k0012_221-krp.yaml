  text: 太平御覽卷第二百二十一
  hash: sha256:6be361d34795e1e2be675f78a9346ae329b10360dac48c839817c5141c3408e6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_221-1a}
body:
  text: 職官部十九黄門侍郎給事中黄門侍郎六典曰黄門侍郎掌貳侍中之職凡政之㢮張事之與奪皆叅議焉若大祭祀則從升壇以陪禮皇帝盥手則奉巾以進旣恱則奠巾于篚奉匏爵以賛獻凢元正冬至天子視朝則以天下祥瑞奏聞漢官儀曰給事黃門侍郎次侍中侍從左右開通内外給事於中故曰給事中黃門侍郎漢書曰王音薦楊雄待詔歳餘爲給事黃門郎成哀平三代不徙又曰張禹爲太傅有疾成帝臨視拜於床下禹有少子在側數目之帝知其意於前拜黃門郎又曰劉向字子政宣帝時以中郎爲給事黃門侍郎又曰董賢字聖卿雲陽人爲太子舎人賢待漏在殿下爲人美麗自喜哀帝望見恱其儀皃識而問之曰是舎人董賢耶因引上與語拜爲黃門侍郎東觀漢記曰鄧閶字秀昭遷黃門侍郎于時國家每有災異水旱閶側身暴露憂懼顦顇形於顔色公卿以下咸髙尚焉漢興以來爲外戚儀表後漢書曰馬防子鉅爲常從小侯正月當冠特拜爲黃門侍郎肅宗親御章臺下殿陳鼎爼自臨冠之續漢書曰荀恱字仲豫遷黃門侍郎獻帝頗好文學恱與從弟彧孔融並侍講禁中又輿服志曰禁門曰黃闥以中人主之故號曰黃令然則黃門郎給事黃闥之内故曰黃門郎夲旣無貟於此各置六人也又百官志曰給事黃門侍郎六百石無貟侍從左右給事中使開通中外諸王朝見於殿上引王就位獻帝起居注曰自誅黃門後侍中侍郎出入禁中機事頗露由是王允乃奏侍中黃門不得出入不通賔客自此始也漢官曰尚書郎奏事於明光殿省中皆胡粉塗璧其邊以丹漆地故曰丹墀尚書郎含雞舌香伏其下奏事黃門侍郎對揖跪受漢舊儀曰黃門郎屬黃門令日暮入對青瑣門拜名曰夕郎魏志曰王粲字仲宣山陽人年十七司徒辟詔除黃門侍郎以西京擾亂皆不就又曰夏侯玄字太𥘉少知名弱冠爲黃門侍郎嘗進見與皇后弟毛曾並坐玄耻之不恱形之於色明帝恨之左遷爲羽林監又曰杜恕字矜伯爲散騎黃門侍郎恕推誠以質不治飭在朝不結交每政有得失常引綱維以正言於是侍中辛毗等器重之又曰夏侯向字伯仁淵從子也文帝與之親友有籌畫智略從太祖定兾州遷黃門侍郎又曰鍾毓字稚叔年十四爲散騎侍郎機捷談笑有父風大和𥘉蜀相諸葛亮圍祁山明帝欲親西征毓上䟽曰夫䇿貴廟勝功尚帷幄不下殿堂之上而决勝千里之外車駕冝鎭守中土以威四方今者盛暑行師詩人所重實非至尊順動之時也遷黃門侍郎魏略曰董遇字季直獻帝時爲黃門侍郎旦夕侍講爲天子所愛信蜀志曰費禕字文偉爲黃門侍郎丞相亮南征還群僚於數十里逢迎年位多在禕右而亮命禕同載由是衆莫不易觀呉志曰孫承字顯世好學有文章作螢火賦行於世爲黃門侍郎與頋榮俱爲侍臣歸命世内侍多得罪唯榮承獨獲免常使二人記事承荅頋問乃下詔曰自今巳後用侍郎皆當令如宗室承頋榮儔也又曰孫皓每宴會群臣無不咸令沉醉置黃門郎十人特不與酒侍立終日爲司過之吏宴罷之後各奏其闕失迕視之咎謬言之愆罔有不舉大者即加威刑小者咸以爲罪晉書曰頋榮少有珪璋符采朗澈仕呉弱冠舉賢良爲黃門侍郎當時後進盡相推謝稱榮有天才令望又曰張華爲黃門侍郎博覽圖籍千門萬户畫地成圖又曰呉隱之孝武帝欲以爲黃門郎以隱之貌類簡文帝乃止又曰嵇紹爲給事黄門侍郎時侍中賈謐以外戚之寵年少居位潘岳杜斌等皆附託焉謐求交於紹紹拒而不荅謐誅紹時在省以不阿比凶族封弋陽子晉書載記曰秦黃門郎古成詵風韻秀舉確然不群每以天下是非爲己任時京兆韋髙慕阮籍之爲人居母喪彈琴飲酒詵聞而泣曰吾當私刃斬之以崇風教遂持劒求髙髙懼逃匿終身不敢見詵齊職儀曰給事黃門侍郎四人秩六百石武冠絳朝服漢有中黃門給事黃門位從諸大夫秦制也與侍中掌奏文案賛相威儀典署其事後魏書曰崔光爲黃門侍郎未嘗留心文案唯從容論議叅賛文政而巳又曰陽平王之子匡爲黃門侍郎茹皓始有寵百寮微憚之世宗曾於山陵還詔匡陪乗乂命皓登車褰裳將上匡諫止世宗推之命下皓恨匡失色當時壯其忠謇又曰任城王之子順除給事黃門侍郎時領軍元乂威刑尤盛凡有遷授莫不造門謝謁順拜表而巳曾不詣乂乂謂順曰卿何得不見我順正色曰天子冨於春秋委政宗輔叔父冝至公爲心舉士報國如何賣恩責人私謝豈所望也北史曰盧誕拜給事黃門侍郎魏帝詔曰經典易求人師難得朕諸兒稍長欲令卿爲師於是親幸晉王第勑晉王以下皆拜之於帝前隋書曰劉行本爲黃門侍郎文帝嘗怒一郎於殿前笞之行本進諌帝不頋行夲乃正當上前又曰陛下不以臣不肖置臣左右豈得輕臣而不頋也乃置笏於地而退上謝之而原所笞者唐書曰温大雅爲黃門侍郎弟彦將爲中書侍郎對居近侍髙祖謂曰我起義晉陽爲卿一門耳又曰髙宗緫章元年十月東天笁烏蔡國長年婆羅門盧伽逸多受詔合丹上將餌之東臺侍郎郝處俊諫曰脩短有天命未聞萬乗之主輕服蕃夷之藥昔貞觀末年先帝令婆羅門僧那羅你娑婆寐依其本國仙方合長年神藥胡旣有異術徴求靈草秘石歷年而成先帝服之竟無異効大漸之際名醫莫知所爲欲歸罪於胡人將申大戮又恐取笑夷狄龜鏡若是惟陛下深察遂止又曰天寳元年改黃門侍郎爲門下侍郎五代史晉書曰天福七年詔門下侍郎班在常侍之下俸禄同常侍三輔决録曰卓茂字子康元帝時遊學長安以儒行爲給事黃門郎又曰杜恕字矜伯拜黃門侍郎每直省閤威儀矜嚴又曰馬右志在克已輔上不以私家干朝廷弟爲黃門郎訖永平世不遷英雄記曰曹純字子和年十六爲黄門郎王嘏別傳曰嘏字昭先魏文以嘏爲黃門侍郎每納忠言輙手壞本自在禁省歸書不封帝嘉其淑愼如此桓階別傳曰階爲尚書令文帝行幸見諸少子無禈上搏手曰長者子無禈是日拜三子爲黃門郎傳子曰王黎爲黃門郎軒軒然得志煦煦然自樂劉向七略曰孝宣皇帝重申不害君臣篇使黄門郎張子喬正其字劉向集書誡子歆曰今若年少得黄門侍郎顯處也新拜皆謝貴人叩頭謹戰戰慄慄乃可必免唐中宗授韋嗣立黃門侍郎制曰絳衣近侍秩亞貂蟬青瑣崇班職叅鴛鷺寔神化之有寄信賢才之攸冝通議大夫韋嗣立忠規弈葉孝緒蟬聮家臣玄鷰之朝人輔彤靈之代芝蘭並秀見謝石之階庭騏驥齊驅有劉山之昆季入光振鷺譽滿三臺出據馮熊聲流十部近者命兹鸞渚巳濯鴈行纔出公局奄歸蒿里永言荆樹坐析連枝眷彼恒山空餘一鳥俾遷榮於皂盖冝襲寵於黄樞給事中六典曰給事中凡百司奏抄侍中審定則先讀而署之以駮正違失凡制勑宣行大事則稱掦徳澤褒美功業覆奏而請施行小事則署而頒之凡文武六品以下授職所司奏楊則校其仕歷深淺功狀殿最訪其德行量其才藝若官非其人理失其事則白侍中而退量焉漢儀注曰諸給事中日上朝謁乎尚書奏事分爲左右以有事殿中故曰給事中多名儒國親爲之掌左右顧問漢書曰給事秦官也至漢因之皆爲加官所加或大夫博士議郎掌頋問應對位次中常侍又曰元帝詔蕭望之傳朕八年可賜爵關内侯給事中後漢書曰鄭衆字仲師以明經拜給事中魏志曰秦朗字元明明帝即位授以內官爲給事中每車駕出入朗常隨從時明帝喜發舉數有以輕微而致大辟者朗終不能有所諌止又未嘗進一善人帝亦以是親愛每頋問之多呼其小字阿蘇晉書曰任熈字伯逺立德邈然徴拜給事中晉起居注曰武帝太康七年詔曰郎中張建忠篤履素爲江表士大夫所稱冝在中朝其以建爲給事中晉武帝詔曰燕王師陳邵清貞廉㓗博通六籍冝在左右以敦儒訓可給事中唐書曰盧粲幽州范陽人也京龍二年遷給事中時節愍太子𥘉立韋庶人以非巳所生深加忌嫉勸中宗下勑令太子却取衛府封物每年以供服用粲駮奏曰皇太子處繼明之重當主鬯之尊歳時服用自可百司供擬又據周官諸應用財器歳終則㑹唯王及太子應用物並不㑹此則儲蓄之費咸與王同今與列國諸侯齊衡入封豈所謂憲章在昔垂法將來者也必謂青宫𥘉啓服用所資自當廣支庫物不可長存藩封詔從之又曰盧粲遷給事中時安樂公主壻武崇訓爲節愍太子所殺特追封爲魯王令司農少卿趙履温監護葬事履温諷公主奏請依永泰公主故事爲崇訓造陵詔從其請粲駮奏曰伏尋陵之稱謂本屬皇王及儲君等自皇家巳來諸王及公主墓無稱陵者唯永泰公主承恩特葬事越常途不應假永泰公主爲名請比貞觀巳來諸王舊例足得豐厚手勑荅曰安樂公主與永泰公主無異同穴之義古今不殊魯王縁此特爲陵制不煩固執粲又奏曰臣聞陵之稱謂施於尊極不屬王公巳下且魯王若欲論親等第則不親於雍王守禮雍王之墓尚不稱陵魯王則不可因尚公主而加號且君之舉事則載於方冊或稽之徃典或考自前朝臣歷撿貞觀巳來駙馬墓無得稱陵者且君人之禮服絶於傍朞盖爲不獨親其親不獨子其子陛下以膝下之恩愛施及其夫贈賵之儀哀榮足備豈得使上下無辯君臣一貫者哉帝竟依粲所奏又曰李藩爲給事中制勑有不可遂於黃勑後批之吏曰冝別連白𥿄藩曰別以白𥿄是文狀豈曰批勑耶裴垍言於帝以爲宰相器又曰憲宗以同州刺史吕元膺復爲給事中初元膺自給事中除同州及入謝上問以時政得失元膺論奏詞甚激切上嘉其剛正翌日謂宰臣曰吕元膺讜言直氣今欲留在左右使言得失卿等以爲何如李藩裴垍進賀曰陛下納諌超冠前王乃宗社無疆之福臣等不能廣求直士又不能數進直言孤負聖心合當罪責今請以元膺復爲給事中以俻頋問上恱而從之又曰李遜爲給事中嘗論時政以爲事君之義有犯無隱陳誠啓沃不必擇辰今君臣敷奏乃候隻日是畢歳臣下睹天顔獻可否能幾何憲宗嘉之又曰元和十四年以撫州司馬令狐通爲右衛將軍給事中崔植封還制書言通前刺史壽州用兵失律前罪未塞不冝遽加奬用上命宰臣諭植以通父彰有功不忍弃其子其制方行又曰韋弘景爲給事中屢有封駮時有劉士經以駙馬交通邪倖自撿校官用爲太僕卿弘景執奏不可中人宣諭再三弘景不爲之廻穆宗怒乃令弘景使安南邕容宣慰時論翕然推重又白郭承嘏爲給事中開成元年出爲華州刺史詔方下兩省迭詣中書求承嘏出麾之由給事中盧載封還詔書奏曰承嘏自居此官繼有封駮能奉其職冝在瑣闈牧守之才易爲推擇文宗謂宰臣曰承嘏乆在黃扉欲優其禄俸暫令廉問近關而諌列拜章惜其稱職甚美事也乃復爲給事中又曰于敖遷給事中昭愍初即位李逢吉用事與翰林學士李紳素不叶遂誣紳以不測之罪逐於嶺外紳同職駕部郎中知制誥龐嚴司封貟外郎知制誥蔣防坐紳黨左遷信汀等州刺史黜詔下敖封還詔書時人以爲與嚴相善訴其非罪皆曰于給事犯宰執之怒伸龐蔣之屈不亦仁乎及駮奏出乃是論龐嚴貶黜太輕中外無不大噱東方朔記曰東方朔爲中郎賜帛百疋給事中荀綽兖州記曰袁准字孝尼有俊才太始中拜爲給事中胡廣集曰給事中掌侍從左右無貟位次侍中常侍或名儒或國親束晢集曰貟外侍郎及給事冗從皆是帝室茂親或貴遊子弟若悉從髙品則非夲意若精郷議則必有降損太平御覽卷第二百二十一
