front:
  text: 太平御覽卷第九百八十菜茹部五
  hash: sha256:f853bb106fee782e722ee6a0ef662c84fd4dc1006edcac48530d65a788718d2f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_980-1a}
body:
  text: 蘆服芥蓴蘘荷紫菜苦買芹薺蕨堇荇邪蒿芸䑓薫柔鹿角胡妥優殿雍菜冬風絡葵蔊荶波稜蘆服爾雅曰蘆服萉冝爲菔蘆菔蕪菁属紫華大根俗爲電菔字或作蔔方言曰蕪菁紫者謂之蘆菔廣志曰蘆菔別名雹後漢書曰劉盆子在長安時掖庭中宫女猶有數百千人自更始敗後幽閉殿内拔庭中蘆菔根捕池魚而食之東觀漢記同北史曰張威隋文受禪遷青州刺史在州頗事産業遣家奴於人間鬻菔根其奴縁此侵擾百姓上深加責坐廢於家正論曰理丗不真賢猶治病無眞藥當用人參反得蘿菔根唐新語曰開元中中書令蕭嵩以文選是先代舊業欲注釋之奏請左𥙷闕王智明金吾衛佐李玄成進士陳居等注文選先是東宫衛佐馮光進入院校文選兼復注釋解鴟蹲云今之芋子即是著毛蘿蔔院中學士向外說之蕭嵩聞之附掌大笑雲南記曰嶲州界縁山野間有菜大葉而麤莖其根若大蘿蔔土人蒸煑其根葉而食之可以療飢名之爲諸侯菜云武侯南征用此菜子蒔於山中以濟軍食亦猶廣都縣山櫪林謂之諸葛木也芥魏子曰蓼䖝在蓼則生在芥則死非蓼仁芥賊本不可失也劉向別録曰尹都尉書有種芥葵蓼韮䓗諸篇嶺南異物志曰唐孟琯甞於嶺表買芥菜置壁下忘食數日皆生四足有首尾能行走大如螗蜋但腰身細長又曰南土芥髙者五六尺子如鷄卵廣州人以巨芥爲醎𦵔埋地中有三十年者貴尚親賔以相餉遺嶺表録異曰廣州地熱種麥則苗而不實北人將蔓菁子就彼種者出土即變爲芥吴氏夲草曰芥𦵔一名水蘇一名勞祖蓴南越志曰石蓴似紫菜色菁集異記曰丹陽張承先家有鬼長爲取它物㑹有客須蓴二斗鱧魚二十頭鬼將一小兒置驃騎令小兒睡眼覺看籃中巳有蓴鱧幽明録曰阿東常醜奴泛湖邊㧞蒲暮宿空舎時日暮見一女姿容極美乗舡載蓴至舎寄住變而爲獺蘘荷說文曰蘘蘘荷也一名菏苴廣雅同崔豹古今注曰蘘荷似蓄苴而白蓄苴色紫花生根中花未敗時可食乆置則削爛不爲實矣葉似薑冝䕃翳地常依䕃而生也搜神記曰余外婦姉夫蔣士有傭客得疾下血醫以中蠱乃宻以蘘荷根布席下不使知乃狂言曰食我蠱者乃張小人也乃呼小小亡去今丗攻蠱多用蘘荷根徃徃驗蘘荷或謂嘉草葛洪方曰人得蠱取蘘荷葉着卧席下不使知立呼蠱姓名潘岳閑居賦曰蘘菏依隂時藿向陽紫菜集異記曰㑹稽照誕入海採菜於山上曝之夜忽見羣鬼張目切齒欲來擊誕誕奮刀斫之見鬼悉披靡乃就誕乞少許紫菜誕不爲與吴那縁海記曰郡海邊諸山悉生紫菜吴賦云綸組紫絳者也苦買晉書安帝紀曰義熈二年有苦買菜生楊州營莖髙四尺六寸廣二尺二寸是後歲多征伐人民積苦故苦買者買苦也芹爾雅曰芹楚葵今水中芹也詩曰觱沸濫泉言采其芹芹菜也又曰泮水思樂泮水薄采其芹芹水菜也列子曰宋國有人其妻告之曰昔有人甘茙菽與芹子郷豪甞之哲於其口嘇於其膓衆哂之吕氏春秋伊尹說曰菜之美者雲夢之芹也范汪祠制曰孟春祭有芹𦵔宋林曰䇺音豈美菜生雲夢薺爾雅曰菥思歴切大薺似薺細葉俗呼老齊又曰蒫才何切薺實廣雅曰菥蓂馬辛也說文曰薺草可食詩曰誰謂茶苦其甘如薺荼苦菜也而君子於巳之苦又甚於荼北方之荼則如甘薺禮曰孟夏之月靡草死薺葶藶之属春秋䌓露曰薺以美冬水氣也薺甘味也乗於水氣故美者甘勝寒也薺之言濟所以濟大水也淮南子曰薺麥冬生而夏死抱朴子曰薺麥大䔉仲夏而枯物理論曰夫解小而引大了淺而伸深猶以牛刀割雞長殳刈薺吴氏夲草曰菥蓂一名折目一名筞冥一名馬駒雷公神農扁鵲辛季氏小温四月採乾二十日生道傍細辛乾薑苦參薺實神農甘毒生野田五月五日採隂乾治腹脹蕨詩曰陟彼南山言採其蕨蕨鼈菜也又曰山有蕨薇隰有𣏌桋晉書曰齊王秉權張翰謂郡人頋榮曰天下紛紛未巳吾夲山林間人無望於時去矣采南山蕨飲三江水也爾雅曰蕨鱉𥘉生無葉可食江西謂之弊古詩曰山桃發紅蕚野蕨漸紫苞堇詩曰周原膴膴堇荼如飴堇菜也荼苦菜也周之原地肥美所生菜雖有性苦者皆甘如飴也禮曰堇苴枌榆兔薧音考滫髓以滑之謂用調和飲食也蓂堇類也冬用堇夏用荁爾雅曰齧苦堇今堇葵也葉似栁予如米汋食之滑三十國春秋曰劉殷字長盛七歳喪其父哀毀踰禮曾祖母王氏盛冬思堇殷入澤中慟哭有堇生焉得斛餘廣語曰夏蓂秋堇滑如粉後魏書曰崔和爲平昌太守性鄙恡埋錢百斛其母季春思堇惜錢不買荇爾雅曰莕接余其葉苻藂生水中葉圎在莖端長短隨流水深淺江東人食之音杏也詩曰參差荇菜左右流之窈窕淑女窹寐求之荇接余也邪蒿北齊書曰刑峙字士俊以經授皇太子厨宰進太子食有菜曰邪蒿令去之曰此菜有不正之名非殿下所冝食顯宗聞而嘉之芸臺通俗文曰芸臺謂之胡菜韻集曰芸臺胡菜薫葇方言曰蘇之小者謂之穰葇薫菜也鹿角南越志曰猴葵色赤生石上南越謂之鹿角葫荽石崇奴劵曰奴當種羅勒胡荽不親不踈優殿南方草物狀曰合浦有菜名優殿以豆醬汁茹食芳好可食胡䴵雍菜廣州記曰雍菜生水以爲𦵔冬風廣州記曰冬風菜陸生冝肥肉作羮二者微味人甚重之絡葵博物志曰人食絡葵爲狗齧則瘡不差或致死蔊音竿字林曰蔊辛菜也荶音吟字林曰荶菜似䔉生水中波稜唐書曰太宗時尼婆羅獻波稜菜葉類紅藍實如蒺䔧大熟之能益食味太平御覽卷第九百八十
