front:
  text: 太平御覽卷第九百三
  hash: sha256:498b2b8c386988218024883b9676ecb8ac2259bf1811266aaeec7cbcf4dc2b35
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_903-1a}
body:
  text: 獸部十五豕爾雅曰豕豬江東呼爲狶䝐豶䝐羊箠反俗呼小獖猪爲䝐子也么㓜最後生者俗呼爲么豚奏者音温今貙猪矩頭皮理腠蹙也豕生三豵音宗二師一特所寢橧疾陵切四蹢皆曰􅘻音該其跡刻絶有力􅙊音厄豕髙五尺者牝豝彘五尺爲􅙊大豕爲􅙊今漁陽呼猪大者爲􅙊也說文曰􅩸許卜切小肫也膎肫生三月豵也子公切豚生六月也或曰一歲曰豵豝牝豕豶􅭘也豜公妍切三嵗豕豭壯豕也䝐豶也豛音役大谷名豬曰豛豷於麗切豕息也豢以榖圏養豕也何承天纂文曰梁州以豕爲䝕之渉切河南謂之彘呉楚謂之豨火豈切漁陽以大豬爲豝齊徐以小豬爲䝒化主切折音覔白豕黒頭也豕奏毛也方言曰猪燕朝鮮之間謂之猳關東謂之彘或謂之豕南楚謂之狶其子或謂之豚或謂之貕音奚呉楊之間謂之猪子春秋說題辭曰斗星時散精爲彘四月生應天理崔豹古今注曰猪一名喙一名叅軍易說卦曰坎爲豕又睽卦曰上九睽孤見豕負塗載鬼一車又大畜曰六五豶豕之牙吉又姤卦曰𥘉六繫于金柅貞吉有攸往見凶嬴豕孚蹢躅禮記曲禮下曰凡祭豕曰剛鬛豚曰腯肥又曰士無故不殺犬豕又月令曰孟夏農乃登麥天子以彘嘗麥又王制曰秋薦黍以豚又禮器曰晏平仲祭其先人豚肩不掩豆又内則曰豕望視而交睫腥望視逺視也腥當爲星星肉如米者論語曰陽貨欲見孔子孔子不見饋孔子豚詩國風騶虞曰彼茁者葭一發五豝豕牝曰豝又曰彼茁者蓬一發五豵一歳曰豵箋云豕三歲曰豵又魚藻嶃嶃之石曰有豕白蹢烝渉波矣左傳莊八年曰齊無知弑其君十二月齊侯游于姑棼遂田於貝丘見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼墜于車傷足䘮屨反誅屨於徒人費弗得鞭之見血走出遇賊于門刼而束之費曰我奚御哉袒而示之背信之費請先入伏公而岀鬪死于門中石之紛如死于階下遂入殺孟陽于牀曰非君也不類見公之足干户下遂殺之而立無知又昭七曰昔有仍氏生女樂正居夔取之生伯封實有豕心貪惏無饜謂之封豕又曰衛靈公夫人南子與宋朝通衛太子使齊過宋宋野人以婁猪㓨而歌之云旣定尓婁猪盍歸吾猳史記曰子路性鄙好勇伉直冠雄雞佩豭豚漢書曰公孫弘菑川人少時爲獄吏有罪兎家貧牧豕海上又曰郅都景帝將爲郎嘗從入上林賈姬在厠野彘入厠上目召都都不行上欲自持兵救賈姬都諌之乃止彘亦不傷賈姬又曰燕刺王旦將作亂厠中群豕岀壞太官竈東觀漢記曰承宫字少子琅邪人少孤年八歲人令牧豕郷里徐子盛明春秋經授諸生數百人宫過其廬下見諸生講誦好之因弃猪而聽經猪主怪不還行索見宫欲笞門下生共禁止因留精舎門下拾薪執苦數年遂通經又曰朱浮與彭寵書責之曰伯通自伐以功爲髙天下往時遼東有豕生子白頭異而獻之行至河東見群豕皆白懷慙而還若以子功論於朝廷則爲遼東豕也續漢書曰曹萌字元偉以仁厚稱隣人有亡豕者與萌豕相類詣門認之萌不與争後所亡豕自還其主大慙送所認豕辭謝萌萌笑而受之袁山松漢紀曰呉祐放猪於長垣澤中誦經而行遇父故人謂之曰子二千石子掉鞭而誦經行吟於澤畔縱子無耻奈君父何祐守志如𥘉與北海公沙穆遊大學資乏變服爲傭祐賃使㫪遂爲死交於杵臼之間張璠漢紀曰莎車王殺于寘王于寘大人都末岀城見野豕欲射之豕乃語曰無殺我我爲汝殺莎車將軍都末異之即與先共殺莎車王謝承後漢書曰朱穆字文元嘗飬猪猪有疾使人賣之於市語之言如售當自告買者言病也賣猪者售不言病且直過多穆怪其故賫半直以還買猪者辭不取穆弃錢而去魏志曰挹婁國在夫餘東常穴居土寒氣劇於夫餘其俗好飬猪食其肉衣其皮冬以猪膏塗身又曰管輅嘗至郭恩家碓上鳩鬪謂恩曰當有老人將肫一口從東候公舎有小口傷亦無所苦明日果有親知老翁攜肫饋恩恩射鳩爲饌箭着小女子脚舉家惶怖竟無所害又有人失婦使輅卜之輅曰君明日於路見檐猪者乃逐之行次猪忽繩斷走入他舎突破主人甕見其婦出着猪遂擒之晉書曰阮咸至宗人間共集不用杯觴斟酌以大瓮盛酒團坐相向大酌更飲時有群豕來飲其酒咸直接去其上便共飲之又曰愍懷太子嘗從帝觀豕牢言於帝曰豕甚肥何不殺以享士而使乆費五糓帝嘉其意即使亨之因撫其背謂廷尉傳祗曰此兒當興我家又曰韓友字景先廬江舒人也龍舒長鄧林父病積年垂死友爲筮使畫作野猪着卧處屏風上因是遂差又曰吕光死其子纂立有猪生子一身三頭又有龍出井中蟠於殿前繤以爲羙瑞羅什獨以爲災俄而吕超殺纂又曰劉聦時豕着進賢冠升聦殿與犬闘北史曰陸逞累除京兆尹郡界有豕生數子經旬而死其家又有豶豕遂乳飬之諸豚頼之以活時以逞仁政所致皇甫謐髙士傳曰孫期字仲彧濟隂人與諸生講京氏易古文尚書家貧事母至孝牧豕於大澤中以奉飬焉逺人從其學者皆執經壠畔以追之里落化其仁讓黄巾賊起過期里陌相約不能犯孫先生舎郡舉方正遣吏賫羊酒請期期駈豕入草不頋也三輔决録曰五門子孫凡民之伍馬氏兄弟五人共居此地作客舎飬猪賣豚故民謂之曰苑中三公鉅下二卿五門嚄嚄但聞豚聲董正别傳曰司馬徽字德操時人呼爲水鏡嘗有人妄認徽猪徽便推與之後數日亡猪者以猪還徽乃叩頭謝自責徽又厚謝華陽國志曰何隨字季業清廉退讓嘗有屠者牽猪過隨門索斷失之強認隨溷中猪隨牽與之屠人㝷自得亡者還隨隨以與之越絶書曰鷄山豕山者勾踐以畜鷄豕將伐呉以食死士也墨子曰孔子窮於陳蔡之間藜䒱不糂桒感切子路烹豕孔子不問肉所從來而食之符子曰朔人獻燕昭王以大豕曰飬奚若使曰豕也非大圊不居非人便不珎今年百二十矣人謂豕仙王乃命豕宰飬六十五年大如沙墳足如不勝其體王異之令衡官橋而量之折十橋豕不量又命水官舟而量其重千鈞其巨無用燕相謂王曰奚不饗之王乃命宰夫膳之夕見夢於燕相曰造化勞我以豕形食我以人穢吾患其生乆矣仗君之靈得化吾生始得爲魯津之伯燕相游乎魯津有赤龜奉璧而獻一云夜光珠孝經援神契曰彘水伏故去脉淮南子曰六九五十四四主時時主豕故豕四月而生又曰黄帝理天下狗彘吐菽粟於路無忿争之人山海經猫大者肉重千萬斤豪猪如豚而白毛毛大如笄而黒端郭璞注曰猫猪也夾脾而有麄豪長數尺能以頸上毫射物博物志曰商丘子有飬猪法卜式有飬猪羊法祖台之志怪曰呉中有一士大夫於都假還至曲阿塘上見一女子甚美留其宿士解臂金鈐繫女臂令暮更來遂不至使人求都無此色過猪圈見一母猪臂上繫金鈐飬生要集曰白豕白蹄青瓜不可食也異物志曰鬱林大猪一蹄有四五甲多膏賣者以鐡錐刺其頭入七八寸得赤肉乃動習鑿齒襄陽耆舊傳曰木蘭橋者今之豬欄橋是也山海經圖曰豪彘讃曰剛鬛之族號曰豪豨毛如攅錐中有激矢宋袁淑大蘭王九錫文曰太亥十年九月乙亥朔十三日丁亥北燕伯使使者豪豨冊命大蘭王曰咨惟君禀太隂之沉精摽群形於玄質體肥腯而洪茂長無心以遊逸資豢飬於人主雖無爵而有秩此君之純也君昔封國殷商號曰豕氏葉隆當時名垂于此此君之美也白蹢彰於周詩渉波應乎隆象歌詠垂於人口經千載而流響此君之德也君相與野遊唯君爲雄顧群數百自西徂東俯歕沬則成霧仰奮鬛則生風猛毒必噬有敵必攻長驅直突陣無全鋒此君之勇也太平御覽卷第九百三
