front:
  text: 太平御覽卷第七百六十四器物部九
  hash: sha256:e8c97d7bd99e9e8c90c8b43dd9c4fd105e4569a974279f0b4db7920735e372e2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_764-1a}
body:
  text: 斤鏟鐁鑢鎌鍠斨鏵鍤附鋤錐鑚鉗泥饅橙籃䈪籠籝斤釋名曰斤謹也板廣不可得削又有節則用此釿之所以詳謹令减斧跡也崔鴻十六國春秋曰石虎馳獵無度晨岀夜歸又多輕行躬行作所太子太保韋謏諌曰白龍魚服有豫且子居切之禍海若潜遊離葛陂之酷願陛下清宫蹕路思二神爲先鑒不可忽天下之重輕行斤斧之間一旦有狂夫之變雖龍騰之勇不暇施也智士之計豈及設哉莊子曰郢人堊漫其鼻端若蠅翼使匠石斵之運斤成風盡堊而鼻不傷郢人立而不失容孫子曰何世之無才何才之無施良匠提斤斧造山林梁棟阿衡之材櫨柱楣椽之朴森然陳於目前大厦之器具矣夢書曰斤斧爲選士取有材夢得斤斧選士來鏟釋名曰鏟平削也廣雅曰籖子簾切謂之鏟也鮑昭蕪城賦曰鏟利銅山鐁音斯釋名曰鐁彌也有髙下迹以此鐁彌其上而平之鑢音慮說文曰鑢錯銅䥫也方言曰錯鑢名也韓詩曰如磨如錯鎌釋名曰鎌廉也體廉薄其所刈稍稍取之似廉者也東觀漢記曰山陽郡人江伯欲嫁姉姉引鎌欲自割魏略曰孟康字公休爲弘農太守時岀桉行勑吏卒各持鎌自刈馬草說苑曰孔子聞哭者聲甚悲進見之吾丘子也吾一曰虞擁鎌帶索而哭孔子問何哭之悲對曰吾有三失子曰願聞三失曰吾少好學周遍天下還後吾親亡是一失也素尚髙節不事庸君臣節不遂二失也少擇交遊寡於親友老而無託是三失也請從此辭投水而死孔子曰弟子記之此足以爲戒於是歸養親者十有二三風俗通曰鎌刀自揆積芻蕘之効鍠音撗異苑曰長山郭悖元嘉十二年病亡後孫兒見悖着帽布裙在靈床上呼孫與語云今得七日假假滿便去今將二小兒捉僕在門可就取也孫求僕即得又云汝叔從都還得鍠犁鐴音辟可試取看便以呈之仍以兩䥫相加鎗鎗作聲語孫曰我無復歸縁從此而絶斨自羊切毛詩豳七月曰取彼斧斨以伐逺揚又破斧曰旣破我斧又缺我斨鏵鍤附釋名曰鍤鍤地起土也或曰削能有所穿削也或曰鏵刳也刳地爲坎也晉書安帝紀曰吴興王淡父爲隣人竇度所殺淡年十歳隂有復讎之志至年十八密索利鍤刃佯若耕耘經一橋下伺度舡行還伏杖於草中淡於橋上以鍤斫之而歸罪有司太守孔嚴義其孝勇上請宥之又曰劉伶常乗鹿車携一壷酒使人荷鍤而隨之謂曰死便埋我淮南子曰故伊尹之興土功也脩脚者使之蹠音隻鏵強脊者使之負土長脚者蹠得土多鍤入土㳭也又曰禹身執畚鍤以爲民先䟽河而導之九支鑿山而通九洛闢五湖而寧東海鋤說文曰鋤薅音蒿斫也钁大鋤也釋名曰鋤助也去穢助苗長齊人謂其柄爲橿寄良切橿然正直也史記曰髙后立諸吕爲王擅權用事朱虚侯年二十有氣力忿劉氏不得職常入侍髙后燕飲曰請爲田歌太后笑曰若生而爲王子安知田乎章曰臣知之太后曰試爲言田意章曰深耕穊種立苗欲䟽非其種者鋤而去之吕后黙然漢書曰雖有鎡錤上音兹下音基不如逢時鎡錤鋤雖有田基值時乃獲信矣樊噲夏侯灌嬰之徒方其鼓刀僕御販繒之時豈自知附驥尾勤功帝籍慶流子孫哉又曰倪寛受業孔安國貧無資賃作帶經而鋤伏息輙誦讀又曰龔遂爲渤海太守遂盗賊諸持鋤鈎田器者爲良人持杖器者爲賊又曰嚴延年爲河南太守京兆尹張敞聞延年用刑刻急以書諭之延年報曰河南天下咽喉二周餘弊莠盛苗穢何可不鋤也魏略曰常林爲諸生帶經耕鋤其妻餉之相敬如賔蜀志曰先主將誅張𥙿諸葛亮表請其罪曰芳蘭生門不得不鋤賈子曰啇君專任刑法以刻薄爲教秦人父子兄弟無父兄之恩踸踞反目有若禽獸借父耰鋤意有得色搜神記曰扶風楊道和於田中值雷雨止桑樹下霹靂擊之道和以鋤格之折其右肱遂落地色如丹目如鏡伏侯古今注曰曽子鋤瓜有三足烏卒其冠丗說曰管寜華歆共園中鋤菜忽見地有片黄金管揮鋤與瓦石不異華捉而擲去應璩詩曰古有行道人陌上見三叟年各百餘歳相與鋤禾莠住車問三叟何以得此壽上叟前致辭内中嫗貌醜中叟前致辭量腹節所受下叟前致辭暮卧不覆首要哉三叟言所以能長乆錐左傳曰錐刀之末將盡争之史記曰平原君曰夫賢士之處丗譬若錐之處囊中其永立見戰國䇿曰蘇秦行而歸負書檐囊父母不與之秦歎曰皆秦之罪也乃夜發書陳篋數十得太公隂符伏而讀之欲睡引錐自刺其股血流至踵王隱晉書曰梅陶及鍾雅數記餘事祖約輙困因謂之曰君汝頴之士利如錐我幽兾之士鈍如椎巳具椎門中又曰王濬伐吴吴人於江險要害之處作鐵錐長文餘暗置江中濬乃作大筏先行䥫錐輙着筏去又曰赫連勃勃勃性工巧然殘忍刻暴乃蒸土築城錐入一寸即殺作者錐若不入即殺行錐者而并築之管子曰女有一錐然後成爲女孫卿子曰無置錐之地而公侯不能與之争名仲尼是也莊子曰堯舜有天下子孫無置錐之地韓子曰堯舜無置錐之地於後丗而德結吕氏春秋曰子産相鄭十八年刑三人殺三人錐刀之遺於道者莫之敢舉鑚尚書大傳曰古者中刑用鑚鑿物理論曰趙堯錐鑚之吏能探髙祖深心致位丞相鉗漢書曰江充捕巫蠱燒䥫鉗灼強服之吴時外國傳曰扶南有訟者燒䥫令赤以鉗舉䥫着手行七步無罪者手不燒有罪者手即燋泥鏝爾雅曰鏝謂之圬郭璞注曰泥鏝也說文曰鏝䥫圬也左傳曰鄭子産相鄭伯如晉晉侯未之見子産使盡壞其館之垣而納車馬焉曰文公之爲盟主也崇大諸侯之館圬人以時塓館宫室圬人塗者論語曰宰予晝寢子曰朽木不可雕也糞土之墻不可汚也橙都鄧切續晉陽秋曰何無忌母劉牢之姉也無忌與髙袒謀夜於屏風裏制檄文母潜橙於屏風上窺之旣知其謀大喜謂曰汝能如此吾讎耻雪矣丗說曰謝中郎在壽陽敗臨奔走猶求王帖橙也籃集異記曰丹陽張承先家有鬼長爲其取物㑹有客湏蓴斤鯉魚二十頭鬼將一小兒持籃至驃騎街十字路小兒睡覺看籃中巳有蓴鯉䈪許的切方言曰䈪所以注斛陳魏宋楚之間謂之䈪或謂之籮自關而西謂之注箕郭璞注曰盛米榖冩鮮中也江東亦呼爲䈪籮屬形小而高也續捜神記曰吴興人章苟者於田中耕乗小舡以歸籮魚鮭置舡中著菰裏有物輙巳食盡如此非一後日磨鍜於菰蘆中見一大虵偷苟以鋘义之中其虵籠史記曰宋元王二年江使神龜使於河至泉陽漁者豫且舉綱而囚之置籠中見夢於王曰我爲江使於河伯而網當路豫且得我王有德義故來告愬又曰齊使淳于髠獻鵠於楚岀邑門道飛其鵠揭空籠而獻之東觀漢記曰耿恭於䟽勒城穿井十五丈不得水恭乃正衣冠向井再拜爲吏士禱水身自率士負籠有飛泉涌岀吏士驚喜皆稱萬歳晉中興徴祥說曰㤗元中公王婦女髪緩鬢傾髻以爲盛飭用髪豐多不可恒戴乃先於籠上榜之名曰假髻或曰假頭至於貧民不能自辯自號無頭就人借髻亦服之妖也無幾時烈宗晏駕而天下騷動二十年中兵革不息孫恩之亂刑斬無數桓玄之役死者萬計凢𬒳戮之家多亡頭首沈約宋書曰廢帝狂悖無道誅害羣臣公卿忌憚諸父並聚之殿内歐棰陵曵無復人理建安王休仁及太宗山陽王休祐形體並肥壯帝以竹籠盛而稱之續述征記曰梁鄒西有籠水發源長城山直北流於梁鄒西注濟水或云齊之孝婦誠感神明湧泉發於室内潜以績籠蔽之人莫之知由是無谷汲之勞姑及家人疑而嫉之值出而捜其室旣無所覩試發此籠而泉遂濆涌流漂居宇所以名曰籠水也莊子曰一雀過羿羿必得之或以天下爲之籠則雀無逃矣是故湯以庖籠伊尹秦穆公以五羊之皮籠百里奚以其所好籠之也淮南子曰張天下以爲之籠因江海以爲之罟何亡魚失鳥之有乎又曰狐裘負籠甚可恠也世說曰宋處宗甚有思理常得一長鳴雞愛而食之恒籠盛着䆫間雞遂作人語與處宗談論極有言思終日不輟處宗因此言巧大進楚辭曰鳯皇作鶉籠兮雖翕翅其不容傳咸班鳩賦叙云余楸蔚然成林閑居無爲有時遊之顧見班鳩音聲可恱於見捕而畜之旣巳擾馴岀之於籠無何失去後時時一來飛翔似如有戀聊爲之賦成公綏鸚鵡賦曰小禽也以其能言解意故爲人所愛之以金籠升之以殿堂可謂珎之矣蓋乃未得鳥之性也古詩曰羅敷好蠶桑採桑城南隅青絲爲籠繩桂枝爲籠鈎沈約宋書曰廢帝狂悖無道誅害羣公忌憚諸父並聚之殿内歐棰陵曵無復人理建安王休仁及太宗山陽王休祐形體並肥壯帝每以竹籠盛而稱之籯說文曰籯笭也漢書曰韋賢曰遺子黄金滿籯不如一經太平御覽卷第七百六十四
