front:
  text: 太平御覽卷第六百二
  hash: sha256:0f2185b577e363d2406bf95b7e748afec2b302d6c3076fc274c3178fcf43d0e3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_602-1a}
body:
  text: 文部十八著書下㓜屬文著書下吕氏春秋曰吕不韋爲秦相國集諸儒使著其所聞爲十二記八覽六論合十餘萬言名爲吕氏春秋暴之咸陽市門懸千金於其上有能増損一字者與之金時人無能増損說者以爲非不能也盖憚相國畏其勢耳然其書以道德爲准的以無爲爲紀綱以忠義爲品式以公方爲撿格與孟軻孫卿相表裏也列仙傳曰李耳字伯陽陳人也生於殷時爲周柱下史好養精氣貴無名接而不施轉爲守藏吏積年乃知其真人也仲尼師之去入大秦過關令尹喜待迎之彊使著書作道德上下經二卷鶡冠子或曰楚人隱居衣弊履穿以鶡爲冠莫測其名因服成號著書言道家事馮煖常師事之西京雜記曰淮南王著鴻列二十篇鴻大也烈明也言大明禮教也號爲淮南子一曰劉安子自云字中有風霜之氣楊子雲以爲一出一入字直百金又曰董仲舒夢蛟龍入懷乃作春秋繁露又曰葛洪家世有劉子駿漢言百卷首尾無題目但以甲乙丙丁記其卷數先父傳之劉歆欲撰書編録漢事類未得搆而亡故書無宗本止雜記而前後無事類後好事者以意次第之始甲之癸爲十帙帙十卷合百卷洪家有小同異又曰楊雄著太玄經夢吐白鳯皇集其頂上而㓕楊雄傳賛曰雄好古而樂道其志欲窮文辭成名於後丗以爲經莫大於易於是故作太玄傳莫大於論語故作法言桓譚新論曰楊子雲才智聞逹卓絶於衆漢興巳來未有此也國師子駿曰何以言之荅曰通才著書以百數唯太史公爲廣大餘皆藂殘小論不能比之子雲所造法言太玄也人貴所聞賤所見故輕易之若遇上好事必以太玄次五經也抱朴子曰王充作論衡北方都未有得之者蔡伯喈嘗到江東得之歎其文髙度越諸子及還中國諸儒覺其談論更逺嫌得異書或搜求至隱處果得論衡捉取數卷將去伯喈曰唯我與尓共之勿廣也又曰盧生問曰蔡伯喈張平子才足著子書正恐言逺旨深丗人不解故不著也余難云若如來言子雲亦不應作太玄經也瓦甂木柸比門所饒金觴玉爵萬家無一也又曰孔鄭之門耳聽口受者滅絶而託竹素者爲丗寳也又曰余家遭火典籍蕩盡困於無力不能更得故抄掇衆書撮其精要用功少而所収多思不煩而所見博或謂洪曰流無源則乾條離株則悴吾恐玉屑盈車不如金璧余荅曰詠圎流者採珠而捐蚌登荆嶺者拾五而棄石余之抄畧譬猶擿翡翠之藻羽脫犀象之角牙又曰嵇君道問二陸優劣抱扑子曰朱淮南嘗言二陸重規沓矩無多少也一手之中不無鈍利方之它人若江漢之與潢潦陸子十篇誠爲快書者其辭之冨者雖覃思不可損也其理之約者雖潜筆腐豪不可益也陸平原作子書未成吾門生有在陸君軍中嘗在左右說陸君臨亡曰窮通時也遭遇命也古人貴立言以爲不杇吾所作子書未成以此爲恨耳余謂仲長統作昌言未竟而亡後董襲撰次之桓譚新論未備而終班固謂其成琴道今才士何不賛成陸公子書頴容春秋例曰著述之事前有司馬遷楊雄後有鄭衆班固近即馬融鄭玄其所著作違義正者畧舉一兩事以言之遷史記不識畢公文王之子而言與周同姓楊雄法言不識六十四卦云所從來尚矣論衡曰畫工好畫上丗人不畫秦漢士者尊古卑今楊子云作太玄經法言張伯松不肯一觀與並肩故賤其言也若生周丗則爲金匱也又曰淮南吕覽文不無累害所以出者家冨官貴也人有難充書者繁重云不在多以爲龍少魚衆少者爲神充荅曰文衆勝寡財冨愈貧丗無一分吾有百篇人無一字吾有萬言孰爲賢也充仕數不遇以章和二年徙家避難揚州丹陽入爲治中才小任大職在刺劾笔札之思歷年寢廢章和三年罷州還年漸七十時可懸輿髪白齒落日月逾邁貧無供養志不娯快乃作養生之書凢十六篇論衡造於永平末定於建𥘉之年耳新論曰余爲新論術辨古今亦欲興治也何異春秋褒貶耶今有疑者所謂蚌異蛤二五爲非十也譚見劉向新序陸賈新語乃爲新論莊周寓言乃云堯問孔子淮南子云共工争帝地維絶亦皆爲妄作故丗人多云短書不可用然論天間莫明於聖人莊周等雖虚誕故當採其善何云盡弃耶風俗通應邵撰序云風者天氣有寒煖地形有隂陽泉水有美惡草木有剛柔俗者含血之類象而生之百里不同風千里不同俗周秦嘗以月遣輶軒使采異代方知載之祕府及羸氏之亡遺棄殆盡蜀人嚴君平有千餘言林陶翁儒才有挭槩與楊雄續注二十七年凢九千字猶不如尓雅之宏麗張竦云縣諸日月不刋之書余不才敢比隆於斯人金樓子曰王仲宣昔在荆州著書數十篇荆州壊盡焚其書今在者一篇知名之士咸重之見虎一毛不知其班又曰劉輔性矜嚴有盛名沉深好經書善說京氏易論集經傳及圖䜟文作五經通論丗號之曰沛王通明帝甚敬重之賞賜恩寵加異又曰或問余曰子何不詢之有識共著此書曷爲區區自懃如此予曰夫荷旃𬒳毳者難與道純緜之緻宻羮藜唅糗者不足論大牢之滋味故服絺巾絺之凉者不知盛暑之鬱燠襲貂狐之煖者不知至寒之悽愴予之術業豈賔客之能闚斯盖以筳撞鍾以蠡測海也予常切齒淮南不韋之書謂爲賔遊所製毎至著述之間不令賔客闚之也又曰桓譚新論華譚又有新論楊雄有太玄經楊泉有太元經談此多誤動形色或云桓譚有新論何處復有華譚楊子但有太玄經何處復聞太元也皆由不學使之然矣隋大業拾遺曰大業之𥘉勑内史舎人竇威起居舎人崔祖濬及龍川賛治侯偉等三十餘人撰區宇圖志一部五百餘卷新成奏之又著丹陽郡風俗乃見以呉人爲東夷度越禮義及屬辭比事全失脩撰之意帝不恱遣内史舎人柳逵宣勑責威等云昔漢末三方鼎立大呉之國以稱人物故晉武帝云江東之有呉㑹猶江西之有汝潁衣冠人物千載一時及永嘉之末華夏衣纓盡過江表此乃天下之名都自平陳之後碩學通儒文人才子莫非彼至尓等著其風俗乃爲東夷之人度越禮義於尓等可乎然於著術之體又無次序各賜杖一頓即日勑追祕書學士十八人脩十郡志内史侍郎虞丗基惣檢於是丗基先令學士各序一郡風俗擬奏請體式學士著作佐郎虞綽序京兆郡風俗學士宣惠尉陵敬序河南郡風俗學士宣德郎杜寳序呉郡風俗四人先成以簡丗基丗基曰虞綽序京兆文理俱贍優博有餘然非衆人之所能繼陵敬論河南雖文華才冨序事過繁袁朗杜寳呉蜀二序不畧不繁文理相副冝具狀以四序奏聞去取聽勑及奏帝曰學士脩書頗得人意各賜物二十叚付丗基擇善用之丗基乃鈔呉郡序付諸頭以爲體式及圖志第一副夲新成八百卷奏之帝以部秩太少更遣子細重脩成一千二百卷卷頭有圖別造新様𥿄卷長二尺叙山川則卷首有山水圖叙郡國則卷首有郭邑圖叙城隍則卷首有公館圖其圖上山水城邑題書字極細並用歐陽肅書即率更令詢之長子攻於草隷爲時所重㓜屬文東觀漢記曰班固字孟堅九歳能作賦頌因數入讀書禁中毎行廵狩輙獻上賦頌魏志曰陳思王植年十歳善屬文太祖曰汝倩人耶植跪對曰出言爲論下筆成章願當靣試時銅雀臺新成太祖悉將諸子登臺使各賦之植援筆立就亦出思疾門又曰文帝八歳屬文魏氏春秋曰阮籍㓜有竒才異質八歳能屬文性恬静兀然彈琴長嘯以此終日又曰庾闡字仲𥘉少孤年九歳能屬文郷里重之崔鴻十六國春秋曰南凉録秃髮傉檀子歸年十三命爲髙昌殿賦援筆即成影不移漏傉檀覽而異之擬之曹子建亦出思疾周後魏書曰胡叟入長安觀風化隱匿名行懼人見知時京兆韋祖思少閱典墳多蔑時彦知叟至召而見之祖思習常待叟不足聊與温涼拂衣而出祖思固留之曰當與君論天人之際何遽而反乎叟對曰論天人者其亡乆矣與君相知何夸言若是也遂不坐而去至主人家賦韋杜二族一宿而成時年十有八矣具述前載無違舊美叙中丗有恊時事而末及鄙黷人皆竒其才思其筆丗猶傳誦之以爲笑狎齊書曰張率字士簡性寛雅年十二能屬文常日限爲詩一篇或數日不作則追𥙷之稍進作賦頌至年十六向作二千餘首有虞訥者見而詆之率乃一旦焚毀更爲詩示焉託云沈約訥便向之嗟稱無字不善率曰此吾作也訥慙而退南史曰劉孝綽本名冉㓜聦敏七歳能屬文舅齊中書郎王融深賞異之與同載以適親友號曰神童融毎曰天下文章若無我當歸阿士阿士即孝綽小字也又曰謝貞八歳嘗爲春日閑居詩從舅王筠竒之謂所親曰至如風定花猶落乃追歩惠連矣年十三尤善左氏春秋工草隷蟲篆後周書曰李旭㓜年巳解屬文有聲洛下時洛陽刱置明堂旭年十歳數爲明堂賦雖優洽未足才制可觀見者咸曰有家風矣三國典略曰蕭大心字仁恕小名英童與大臨同年十歳並能屬文嘗雪朝入見梁武帝詠雪令二童各和並援筆立成梁書曰柳惲早有令名少工篇什爲詩云亭臯木葉下隴首秋雲飛琅邪王融見而嗟賞因書齋壁及所執白䦨團扇又曰太祖文帝諱綱字丗讃六歳能屬文髙祖驚其早就不之信也及於御前面試辭彩甚美髙祖難曰此子吾家之東阿也又曰丘遟字子希年八歳便屬文父靈鞠有才名常謂氣骨似我徴士何點見而異之又曰庾肩吾八歳能賦詩特爲兄於陵所友愛又曰何遜字仲言八歳能賦詩弱冠州舉秀才南郷范雲見對䇿大相稱賞謂所親曰頃觀文人質則過儒文則傷俗其能含清濁守今古見之何生矣沈約亦愛其文又曰陸從典字由儀㓜聦敏年八歳讀沈約集見廻文妍麗援筆擬之便有佳致十二作柳賦其辭甚美從父瑜特所賞愛隋書曰李德林㓜聦敏年數歳誦左思蜀都賦十餘日便度髙隆之見而嗟歎遍告朝士云若假其年必爲天下偉器鄴京人士多就宅觀之月餘日中車馬不絶年十五誦五經及古今文集日數千言俄而該博墳典隂陽緯候無不通渉善屬文辭覈而理暢又曰于宣敏字仲逹少沉宻有才思年十一詣周趙王王命之賦詩宣敏爲詩甚有幽貞之志王大竒之坐客莫不嗟賞起家右侍上士文選人名録曰曹植年十歳誦讀詩論及賦數萬言能屬文又曰謝靈運㓜而聦慧善屬文舉筆立成文章之盛獨絶當時㓜童傳曰謝瞻字宣逺㓜而聦悟五歳能屬文通玄理又曰孫士潜字石龍六歳上書七歳屬文金樓子自叙曰余六歳解爲詩奉勑爲詩曰池萍生巳合林花發稍周風入花枝動日照水光浮因尓稍學爲文也太平御覽卷第六百二
