front:
  text: 太平御覽卷第二百五十四職官部五十二
  hash: sha256:03fe801f52f6b5a8c570d0355e6f57bd4af70ea8a358fb2f03f7b76055e3ba2b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_254-1a}
body:
  text: 刺史上漢書曰監察御史秦官掌監郡漢省丞相遣刺史不常置武帝元封五年𥘉部刺史掌奉詔條察州郡祑六百石貟十三人又曰刺吏以六條問事非條所問不省一條強宗豪右田宅踰制以強凌弱以衆暴寡二條二千石不奉詔書遵承典制背公向私旁詔守利侵漁百姓聚歛爲姦三條二千石不䘏疑獄風厲殺人怒則任刑喜則任賞煩擾刻暴剥截黎元爲百姓所疾山崩石裂妖祥訛言四條二千石選署不平茍阿所愛蔽賢寵頑五條二千石子弟恃怙榮勢請託所監六條二千石違公下比阿附豪強通行貨賂割剥民人又曰王遵遷益州刺史先是琅邪王陽爲益州刺史行部至九折阪歎曰奉先人遺體柰何數乗此險後以病去及遵爲刺史至其坂問吏曰此王陽所畏道耶吏對曰是遵叱其馭曰駈之王陽爲孝子王遵爲忠臣又曰漢家立置郡縣部刺史奉使典州督察郡國吏人安寜故事居部九歳舉守相其有異材功著者聊登擢秩卑而賞厚咸勸功樂進今増秩爲牧以髙第𥙷九卿其中材則茍自守而巳恐功効陵夷姦䡄不禁臣請罷牧置刺史如故奏可東觀漢記曰州牧刺史漢舊官建元元年復置牧十八年改爲刺史督二千石又曰叚熲起於徒中爲并州刺史有功徴還京師熲乗車介士鼓吹曲盖朱旗騎馬殷天蔽日連騎相繼數十里後漢書曰馬嚴上書云臣伏見方今刺史太守專州典郡不務奉事盡心爲國而司察偏阿取與自巳同則舉爲尤異則中以刑法不即垂頭塞耳採求財賂又曰郭伋爲并州牧過京師謝恩帝即引見并召皇太子諸王宴語終日賞賜車馬衣服什物伋因言選𥙷衆職當簡天下賢俊不冝專用南陽人帝納之謝承後漢書云王宏遷冀州刺史宏性刻不發私書不容豪族賔客號曰王獨坐又曰李壽爲青州刺史發璽書於夲縣傳舎乗法駕騑騬朱軒就路奏免四郡相百城怖懼悉豫弃官魏志曰賈逵自梁道爲豫州刺史是時天下𥘉復州郡多不懾逵曰州夲以御史出監諸郡以六條詔書察長吏二千石已下故其狀皆言嚴鷹揚有督察之才不言安静寛仁有愷悌之德也今長吏慢法盗賊公行州知而不糺天子復何所取正乎逵到官數月乃還考竟其二千石以下阿縱不如法者皆舉奏免之帝曰逵真刺史矣布告天下當以豫州爲法又曰張旣字德容出爲雍州刺史太祖謂旣曰君還夲州可謂衣繡晝行矣又曰吕䖍字子恪任城人也遷徐州刺史加破虜將軍請琅耶王祥爲別駕民事一以委之丗多其能任賢晉書曰向雄太始中累遷秦州刺史假赤幢曲盖鼓吹又曰劉卞東平湏昌人也後爲岳州刺史昔同時爲湏昌小吏者百餘人祖餞之其一人輕卞卞遣扶出之人以此少之又曰王機入廣州刺史郭訥握節而避機遂入城就訥求節訥曰昔蘇武不失其節前史以爲羙談此節天朝所假義不相與自可遣兵取之機慙而止又曰石苞爲徐州刺史文帝之敗於東關也苞獨全軍而退帝指所持節謂苞曰恨不以此付卿晉陽春秋云胡質爲荆州刺史子威自洛陽至荆州定省家貧自驅驢單行見父停十餘日臨歸質賜絹一疋爲道粮威跪拜曰大人清髙不審安得此質曰吾俸禄之餘故以爲汝粮耳又曰晉武嘗問威曰卿清孰與卿父淸威曰臣不如也帝曰何以爲不如威曰臣父清畏人知之臣清畏人不知陸機晉武紀曰王濬之在巴郡也夢懸四刀於其上甚惡之璿主簿李毅拜賀曰三刀爲州而見益一明府其臨益州乎濬果爲益州刺史晉中興書曰荀羡字令則爲徐州刺史時年二十中興方伯未有如羡少者梁書曰夏侯詳遷湘州刺史詳善吏事在州四載爲百姓所稱州城南臨水有峻峯舊傳云刺史登此山輙代是山歷政莫敢至詳於其地起臺榭延僚屬以表損揖之志三國典略曰梁太祖制以南汾州刺史韋孝寛爲雍州刺史先是路側一里置一土堠經雨頽毀毎湏修𥙷孝寛臨州乃勒部内當土堆之處植樹以代之旣免修復之勞旋又得庇䕃太祖後見之恠而問焉人以狀對太祖嘉之豈得一州獨尓當令天下同之於是令諸州夾道一里種一樹十里種二樹百里五樹焉又曰梁蕭恪字敬則南平元襄王偉之子也𥘉恪爲雍州刺史賔客有江仲舉蔡薳王臺卿庾仲容四人俱𬒳接遇並有蓄積故樊鄧謌之云江千萬蔡五百正新車庾大宅梁武聞而接之曰主人憒憒不如客及恪還梁武問之恪甚慙恧後魏書曰髙陽王雍爲相州刺史帝誡曰爲牧之道亦易亦難其身正不令而行故曰是易其身不正雖令不從故曰是難又曰髙允爲懷州刺史允秋日廵境問民疾苦至郡縣見邵公廟廢毀不立乃曰邵公之德闕而不禮爲善者何望乃表聞修葺之又曰李崇爲并州刺史多刼盗崇乃村置一樓樓懸一皷盗發則擊之俄頃之間聲布百里遂多擒獲諸州皷樓自崇始也又曰南安王禎出爲相州刺史髙祖餞之於林都亭詔曰今者之集雖曰分歧實爲曲宴並可賦詩申意射者可以觀德不能賦詩者可聽射也當使武士彎弓文士下筆又曰汝隂王子修義字壽安渉獵書傳髙才爲髙祖所知除右將軍齊州刺史修義以齊州頻䘮刺史累表固辭詔曰脩短有命吉凶由人何過致憂憚以乖維城之寄違凶就吉時亦有之可聽更正廨宇修義於是移治東城又曰畢終敬父子相代爲夲州當丗榮之時終敬以老還郷常呼其子元賔爲史君毎於元賔聽政之時與出元賔所先遣左右勑不聽起觀其斷决忻忻然喜見顔色又曰邢巒征梁漢諸郡之民相継而至遂平漢中詔曰巒至彼有以懷和附衆髙下品第可依義陽都督之格也拜巒西安梁秦州刺史北齊書曰張亮武定𥘉拜太中大夫薛琡甞夢亮於山上挂絲以告亮旦占之曰山上絲幽字也君其爲幽州乎數曰亮出爲幽州刺史北史曰齊平鑒爲楊州刺史其妻生男鑒因喜飲醉擅免境内囚誤免關中細作二人醒而知之上表自劾文宣原其罪賜牛羊酒令作樂又曰慕容三藏爲郭州刺史州界連雲山響稱萬年者三詔頒郡國仍遣使醮山所其日景雲浮於上雉兔馴壇側使還以聞上大恱後周書曰蘇亮出爲𡵨州刺史朝廷以其牧夲州特給路車皷吹先還其宅并給騎士三千列羽儀逰郷黨經過故人歡飲旬日然後入州世以爲榮又曰獨孤信爲秦州刺史甞因獵日暮馳入城其帽微側詰旦而更人有戴帽者咸慕信而側帽焉其爲隣境及士庶所重如此又曰劉雄字猛雀髙祖甞從容謂雄曰古人云冨貴不歸故郷猶衣錦夜遊今以卿爲夲州何如雄稽首拜謝於是詔以雄爲河州刺史雄先巳爲夲縣令復有此授鄉里榮之又曰史寜爲涼州刺史遣使詣太祖請事太祖即以所服冠履衣𬒳及弓箭甲矟等賜寧謂其使人曰爲我謝涼州孤解衣以衣公推心以委公公其善始令終無損功名也又曰長孫儉爲荆州刺史時梁岳陽王蕭察内附𥘉遣使入朝至荆州儉於㕔事列軍儀具戎服與使人以賔主禮相見儉容貌魁偉音聲如鍾大爲鮮卑語遣人傳譯以問客客惶恐不敢仰視日晚儉乃著裙𥜗紗帽引客宴於別齋因序梁國喪亂朝廷招携之意發言可觀使人大恱出曰吾所不能測也三國典略曰周陸逞字季明甞爲冝州刺史故事刺史奉辭例備鹵簿逞以時屬農要奏請停之制曰逞雖未臨人巳存優恤冝遂所請彰其雅操又曰周帝制於玉璧置勲州以孝寛爲刺史爲其立勲於此因以名之又曰賀抜岳引軍西次平涼岳以夏州隣接宼賊欲求良牧以鎮之衆咸曰宇文左丞即其人也岳曰宇文左丞吾之左右手不可廢也沉吟累日乃從衆議表太祖爲夏州刺史陳書曰侯景平元帝遍問朝宰曰今天下始定極湏良才請卿各舉所知羣臣未有對者帝曰吾巳得一人矣侍中王褒進曰未審爲誰帝曰歐陽頠公有匡濟之才恐蕭廣州不肯致之乃授武州刺史太平御覽卷第二百五十四
