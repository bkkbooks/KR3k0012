front:
  text: 太平御覽卷第九百一十九
  hash: sha256:a62bfa77c1bf8843fa925db1386eea403107361bb4878b6204502d9caa87b8ea
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_919-1a}
body:
  text: 羽族部六鵝鴨鶩鳬鵝禮記内則曰舒鴈翠鄭玄注曰翠尾舒鴈鵝也謂不利人爾雅曰鵱鷜鵝郭璞曰今之野鵝舒鴈鵝郭璞曰出如舒鴈今江東呼􅕯音加廣雅曰鴐鵝野鵝也吴志曰景帝有疾使巫視鬼欲試之乃殺一鵝埋之於苑中架屋施床几以婦人服物着上乃使巫視之若能說此家中婦形狀者加賞此巫視日竟晝夕無所道帝催問之急乃曰實不見有鬼但見一頭白鵝在墓上所以不即白疑是神鬼變化而作定無復改易不知何故景帝乃厚賜之晉書曰永嘉中洛陽東北歩廣里地䧟有二鵝出焉一白一蒼白者不能飛蒼者飛去董養字仲道歎曰昔有周時盟㑹狄泉即此地也蒼胡白國象其可盡言乎又曰劉毅家在京口酷貧甞與郷曲士大夫往東堂共射時庾恱爲司徒右長史要府州僚佐出東堂毅巳先至遣與恱相聞曰身並貧躓營一遊甚難君如意人無處不可爲適豈能以此堂見讓曰恱素豪徑前不荅時衆人並避唯毅留射如故恱厨饌甚盛不以及毅毅旣不去恱甚不歡毅又相聞曰身今年未得子鵝豈能以殘炙見惠恱又不荅及毅貴奏解恱都督將軍官深相挫辱恱不得志疽發背少日而卒宋書曰胡蕃爲髙祖從事征廣固累月未抜忽有鳥如鵝蒼黒色飛入髙祖帳裏衆皆駭愕蕃起賀曰蒼黑色者戎虜戎虜歸我大吉之祥也明旦攻城䧟之又曰孔静居山隂宋武微時往候之静時寢夢人語曰天子在門覺寤即遣人出看而帝適至静虚已接待乃留帝宿夜設粥無鮭新伏鵝卵令煑以爲食賊平以静爲奮威將軍又曰劉暄𥘉爲江夏王寳玄郢州行事執事過刻王妃索煑肫帳下諮暄暄曰旦巳煑鵝不煩復此寳玄恚曰舅殊無渭陽之情齊書曰下彬禽獸决録目云鵝性頑而慠盖比潘敞也又曰桂陽之役朝庭周章詔檄乆之未就髙帝引江淹入中書省先賜酒食淹素能飲啖食鵝炙垂盡進酒數升文誥亦辦南史曰何逺爲永康令人甚稱之太守王彬廵属縣諸縣皆盛供帳以待焉至武康逺獨設糗水而巳彬去逺送至境進斗酒隻鵝而別彬戯曰卿禮有遇陸納將不爲古人所笑乎三國典略曰庾信自建康遁歸江陵湘東王因賜妾徐氏妾與信弟掞私通掞欲求之無致言者信庭前有一蒼鵝乃繫書于鵝頸信視之乃掞啓遂題紙尾曰畜生乞汝唐書曰元和十二年李愬襲蔡州兵至懸瓠城夜半雪甚城旁有鵝鴨池愬令驚擊之以雜其聲列子曰黄帝與炎帝戰以鵰鴈鵝爲旗幟魯連子曰君鵝鴨有餘食士不足半菽孟子曰仲子以兄之禄爲不義避兄離母處於陵他日歸則有饋其兄生鵝者嚬曰惡用是鶂鶂者爲其母殺是鵝與之食其兄自外至曰是鶂鶂肉也出而吐之趙岐曰鶂鶂鵝聲也戰國䇿曰管燕得罪於齊王謂左右曰子孰能與我赴諸侯乎左右莫對管燕連然流涕曰悲夫士何其易得而難用也田需對曰士三食不得厭而君鵝鶩有餘食下宫曳綺縠而士不得以爲縁且財者君之所輕死者臣之所重君不肯以所輕與士而責之以所重事非士易得而難用也異苑曰傅承爲江夏守有一雙鵝失之三年忽引導得三十餘頭來向承家秦記曰符殷食鵝炙知黒白之處人不信旣而試之果然丗說曰㑹稽有孤居老姥養一鵝鳴喚清長時王逸少爲太守就求市之未得逸少乃携故親命駕共往觀之姥聞二千石當來即烹以待之逸少旣至殊喪往意歎息弥日俗記曰京下劉光禄飬好鵝劉後軍從京還鎮㝷陽以一雙鵝爲後軍別純蒼色頸長四尺許頭似龍此一雙鵝可堪五萬自後不復見有此類張鴻傳曰鴻爲慕容晃黄門𥘉刑鴻不熟頥下生黄鬚三根長寸餘乃遣出宫看鵝鴨沈玄鵝賦序曰先大夫俞頴川者殊精意於善鵝求得駿鵝類於張猛虎亦多好者于時有緑眼黄喙折翼頳頭然經頴川之好者焦叔明以太康中得大蒼鵝從喙至足四尺有九寸體色豊麗鳴聲驚人三年而爲暴犬所害惜其不終故爲賦云崔豹古今注曰夫鵝似鵠而大頸長八尺善闘好啖虵列異傳曰廬山左右常有野鵝數千爲群長老傳言甞有一狸食明日見狸喚於沙州之上如見繫縛南越志曰化蒙縣祠山上有湖湖中有泉鵝如今野鵝弄吭山泉故号爲泉鵝兩京記曰浄影寺沙門慧逺講經𥘉在郷養一鵝常隨逺聽經及逺入京留在寺晝夜鳴呼不止僧徒送入京至此寺大門放之自然知逺房便入馴狎毎聞講鍾即入堂伏聽若聞汎說他事鳴翔而出如是六年忽哀叫庭宇不肯入堂二旬而逺卒寺内有逺碑亦述其事嶺南異物志曰南道之酋豪多選鵝之細毛夾以布帛絮而爲𬒳復縱撗納之其温柔不下於挾纊也俗云鵝毛柔暖而性冷偏冝覆嬰兒而辟驚癎也雲南記曰韋齊休使雲南屯城驛西牆外有大池斗門垂栁夾䕃池中鵝鴨甚衆幽明録曰晉義熈中羗主姚略壞洛陽隂溝取塼得一隻雄鵝並金色交頸長鳴聲聞九臯臨海記曰郡東南有砶山髙三百餘丈望之如雪山上有湖古老相傳云金鵝之所集八挂所植下有溪金光煥然又曰郡東有宴室山古老云越王時山上起望海舘山下有湖湖中有金鵝飛魚唐書曰貞觀二十年吐蕃遣其大臣禄東賛奉表曰聖天子定四方日月所照之國並爲臣妾而髙麗恃逺闕於臣禮天子自領百萬渡遼致討隳城䧟陣指日凱旋奴纔聞陛下發駕少選之間巳聞歸國鴈飛迅越不及陛下速疾奴黍預子婿喜百常夷夫鵝猶鴈也故作金鵝奉獻其鵝黄金鑄成髙七尺中可實酒三斛淮南子曰魯般墨子以木爲鵝而飛三日集而不可使爲工也唐書曰髙祖義兵至河東隋將堯君素城守時圍甚急君素乃爲木鵝置表於頸具論事勢浮之黄河下河陽守者得之逹於東都越王侗見而歎息鴨爾雅曰舒鳬鶩也郭璞曰鴨也廣雅曰鳬鶩鴨也魏氏春秋曰司馬文王鎮許昌徴還擊姜維至京師帝於平樂觀臨軍與左右小臣謀因文王辭劒之巳書詔文王入帝方食粟優人雲午等唱曰青頭雞青頭雞者鴨也帝懼不敢發景王因是謀廢帝江表傳曰魏文帝遣使求闘鴨群臣奏冝勿與權曰彼在諒闇之中所求若此豈可與言禮哉具以與使者吴志曰建昌侯孫慮於堂前作鬪鴨欄頗施小巧陸遜正色曰君侯冝勤覽經典用此何爲慮即毀之陳書曰齊人渡江至玄武湖西北莫府山南我軍自覆舟東移頓郊壇北與齊人對是時食盡調市人餽軍皆是麥屑爲飯以荷葉褁而分給兵士皆困㑹文帝遣送米三千石鴨千頭帝即炊米煑鴨誓申一戰將士及防身計粮數臠人人褁飯嫓以鴨肉帝命衆軍蓐食攻之齊軍大潰三國典略曰髙徳衆正相齊未誅之前家有赤鴨群行於庭犬來逐遂成碎血北史曰元善以髙頴有宰相之具常言於上曰楊素麁踈蘇威怯愞元胄元昊正似鴨耳可以付社稷者唯獨髙頴上𥘉然之唐書曰齊王祐太宗第五子好養鴨未反前忽有野狸入籠中咬四十餘鴨皆斷其頭及敗同惡而誅者四十四人抱朴子曰有白虎七變法取三月三日殺虎血鴨血等合和之𥘉生草似胡麻者生取其實合之可以移形易皃西京雜記曰髙祖旣作新豐并移舊社放犬羊雞鴨於通途亦競識其家傳子曰鴨足何以眅雞足何以盺眅吾不知也何况問天地乎金樓子曰海鴨大如常鴨班白文亦謂之交鳥洞冥記曰武帝昇望月臺南端有三青鴨飛俄而下帝恱之至夕鴨宿於臺端化爲三小童皆著青綺文𥜗各執鯨文大錢五枚置帝几前風俗通曰雞伏鴨卵鶵成入水雞母隨岸呼之鶵出而隨母鴨雞異類能相隨也博物志曰中諸藥毒巳死者取生鴨斷頭以鴨項内病者口中得血三兩滴入喉中即蘇也語林曰傅信貧母羸病恒驚悸信乃取雞鴨滅毛放承塵上行落地毋轉恐怖石崇金谷詩序曰吾有廬在河南金谷中去城十里有田十頃羊二百口雞猪鵝鴨之属莫不畢備㝷陽記曰周訪與啇人共入宫亭廟宿明起如厠見一白頭翁訪逐之化爲雄鴨還舡欲煑之啇人争看遂飛去廣志曰野鴨雄者赤頭有距蔡氏化清經曰水戰之鴨何必白纓盈俎之雞何必長鳴新言曰譬猛虎浮水不如鳬鴨騏驎登木不如猿猴太元經曰素嬰之鴨翰音之雞望視之兔白蹄之豕短喙之狗脩頸之馬君子之皃何獨異耶吴地記曰鴨城者吴王築城城以養鴨周數百里笁法真登羅山䟽曰山上有神湖湖中有白鴨嶺南異物志曰廣州浛洭縣金池黃家有養鵝鴨池嘗於鴨糞中見麩金片遂多收掏之日得一兩縁此而致冨其子孫皆爲使府劇職三丗後池即無金黄氏力殫矣鶩說文曰鶩野鳬春秋左傳曰公膳日雙雞饔人竊更之以鶩子尾怒春秋繁露曰張湯問仲舒曰祠宗廟或以鶩當鳬可不對曰鶩非鳬鳬非鶩愚以爲不可漢書王莽多事諸鬼用三牲鳥獸三千餘種後不能備乃以雞當鴈鶩東觀漢記曰馬援與兄子嚴敦書云學龐伯髙不就猶爲謹勑士所謂刻鵠不成尚類鶩者說苑曰鶩無他心故庻人以爲贄崔寔政論曰今下僣其上尊卑無別如使鷄鶩蛇頸龜身五色紛麗亦可貴於鳯乎唐子曰吾甞㑹賔設樂天忽雲興繼以大雨有群鶩成列飛翔而過此偶尔何異玄鸖二八也廣志曰鶩生百卵一日再生有露華鶩以秋冬生卵並出蜀晨鳬肥而耐寒冝爲矐越地傳曰越人爲競渡有輕薄少年各尚其勇爲鶩没之戲有至水底然後魚躍而岀鳬毛詩曰將翶將翔弋鳬與鴈又曰鳬鷖在涇公尸來燕來寧爾酒旣清爾殽旣馨公尸燕飲福禄來成鳬鷖在沙公尸來燕來冝爾酒旣多爾殽旣嘉公尸燕飲福禄來爲韓詩外傳曰趙倉唐擊爲魏文侯太子擊使於外問太子曰侯何好曰嗜晨鳬好北犬於是遣唐緤北犬奉晨鳬獻之侯曰擊愛我知我所嗜好莊子曰鳬脛雖短續之則憂風俗通曰王喬者河東人爲葉令喬有神術每月朔望常自縣詣臺朝帝怪其來數而不見車騎宻令太史伺望之言其臨至輙有雙鳬從東南飛來於是候鳬至舉羅張之但得一雙履乃詔尚方侯視則四年中所賜尚書官属履楚辭曰寧與騏驥抗軛將與雞鶩争食乎寧卭卭若千里之駒㲹㲹若水中之鳬焦贛易林曰鳬舞鼓翼嘉樂尭德李陵贈蘇武詩曰二鳬俱北飛一鳬獨南翔我當留斯館子當歸故郷蘇武與李陵書曰乗雲附景不足以譬速晨鳬失群不足以喻疾豈可因歸鴈以運粮託景風以餉軍哉晉書張華傳曰人有得鳬鳥毛長三丈以示華華見慘然曰此謂海鳬毛也出則天下亂後周書曰𥘉賀勝至關中自以年位素重見太祖不拜㝷而自悔太祖亦有望焉後從太祖宴于昆明池時有雙鳬遊於池上太祖乃授弓矢於勝曰不見公射乆矣請以爲歡勝射之一發俱中因拜太祖日使勝得奉神武以討不庭皆如此也太祖大恱自是恩禮日重勝亦盡誠推奉周書曰太祖車駕幸城南園臨水亭見雙鳬争藻戲於池面引弓射之一發而疊貫從官歡呼拜賀上命翰林繪工冩之縑素南越志曰化蒙縣祠山上有池池中有松鳬如今野鳬棲息松間故俗謂松鳬吴録地理記曰石首魚至秋化爲㓂鳬頭中有石冢墓記曰闔閭冢中有玉鳬廣州先賢傳曰頓琦至孝母䘮感慕哀聲不絶致飛鳬白鵝栖廬側見人輙去見琦而留又曰丁宻遭父艱致飛鳬一雙游廬旁小池見人則馴附如家所畜後遭母喪宻歸至所居一宿故雙鳬復游戲池中崔豹古今注曰鳬鴈常在海邊沙上食沙石皆消爛唯食海蛤不消隨其糞出以爲藥倍勝餘者蔡叔闘鳬賦曰冠緑葩以耀首綴素毛以點纓太平御覽卷第九百一十九一
