front:
  text: 太平御覽卷第四百六十五
  hash: sha256:d545ff7ffc0ea4d52a5302fcc30deefad995957e43fc12acb0a5b26622a30cfe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_465-1a}
body:
  text: 人事部一百六謳歌謡謳說文曰謳齊歌也左傳曰宋華元爲植巡功城者謳曰晘其目皤其腹棄甲而復于思于思棄甲復來又曰宋皇國父爲太宰爲平公築臺妨於農収子罕請俟農功之畢公不許築者謳曰澤門之晢實興我役邑中之黔實慰我心漢書曰漢王旣至南鄭諸將及士卒皆謌謳思東歸師古曰謳齊歌也多道亡還者未至南鄭在道即止歌釋名曰歌柯也所歌之聲是其質也以聲吟咏有上下如草木之有柯葉也說文曰歌詠也詩曰心之憂矣我歌且謡家語曰孔子相魯齊人歸女樂魯君淫荒孔子遂行師巳送曰夫子則非罪也孔子曰欲歌可乎歌曰彼婦人之口可以出走彼婦人之謁可以敗死優哉游哉聊以卒歳史記曰曹叅爲漢相國三年百姓歌之曰蕭何爲法講若畫一曹叅代之守而勿失載其清静人以寜一又曰衛子夫爲皇后弟青貴震天下天下歌之生男無喜生女無怒獨不見衛子夫霸天下漢書曰石顯與中僕射牢梁少府五鹿充宗結爲友黨諸附倚者得寵位民歌之曰牢耶石耶五鹿耶印何累累耶綬何若若耶言其兼官據勢也又曰太始二年趙中大夫白公白姓公爵也爲孺子之也復奏穿渠引涇水首起谷口尾入櫟陽注渭中延袤二百里漑田四千五百餘頃因名白渠民甚饒歌之曰田於何所池陽谷口鄭國在前白渠起後舉挿爲雲决渠爲雨涇水一石其泥數斗且糞且漑長我禾黍衣食京師億萬之口又曰馮立字聖通爲西河上郡與兄野王相代政行相似吏人嘉之乃歌曰大馮君小馮君兄弟繼踵相因循聦明聖智惠吏人政如魯衛德化鈞周公康叔猶二君又曰王氏五侯争爲奢侈大起第宅百姓歌曰五侯𥘉起曲陽最怒壞决髙都連境外杜土山漸臺象西白武白虎殿名後漢書曰皇甫嵩討平黄巾請兾州一年田租以瞻飢民百姓歌曰天下亂兮市爲墟母不保于妻失夫頼得皇甫復汝居又曰劉陶駼除順陽長以病免吏民思而歌之曰邑然不樂思我劉君何時復來安此下民又曰郭賀字喬卿爲荆州刺史到官有殊政百姓歌之曰厥德仁明郭喬卿忠正朝廷上下平謝承後漢書曰岑晊遷魏郡太守民歌之曰我有枳棘岑君伐之我有蛑賊岑君遏之狗吠不驚足下生氂含哺皷腹焉知㐫災我嘉我生獨丁斯時羙矣岑君於戲在兹又曰陳臨字子然爲蒼梧太守人遺腹子報父怨捕得繋獄傷其無子令其妻入獄遂産得男人歌曰蒼梧陳君恩廣大令死罪囚有後代徳叅古賢天報施司馬彪續漢書曰賈琮爲交州刺史歳間清平百姓安土爲之歌曰賈父來晚使我先反今見清平吏不敢飯又曰李爕拜京兆尹詔發西園錢爕上一封事遂止不發吏民愛仰乃歌曰我府君道教舉恩如春威如虎剛不吐弱不茹愛如母訓如父東觀漢記曰廉范字叔度爲蜀郡太守削火令但嚴使儲水而巳百姓歌之曰廉叔度來何暮不禁火人安堵平生無𥜗今五袴又曰范丹字史雲爲萊蕪長遭黨錮事推鹿車載妻子捃拾自資有時絶粮丹言貌無改閭里歌之曰甑中生塵范史雲釜中生魚范萊蕪又曰朱暉爲臨淮太守抑強絶雅歳常豊熟人爲之歌曰強直自遂南陽朱季吏畏其威人懷其惠又曰張堪爲漁陽太守勸人耕種以致豊冨百姓歌曰桑無附枝麥秀兩岐張君爲政樂不可支呉錄曰彭循字子陽毗陵人建國二年海賊丁儀等萬人據呉太守秋君聞循勇謀以守令循與儀相見陳說利害應時散隆民歌之曰時歳倉卒賊縱横大㦸強弩不可當頼遇賢令彭子陽又曰王譚字世容爲成武令民服德化宿惡奔逆父老歌之曰王世容治無雙省傜役盗賊空晉書束晳傳太康中郡界大旱晳爲邑人請雨三日而雨注衆謂晳誠感爲作歌曰束先生通神明請天三日甘雨零零我黍以育我稷以成何以醻之報束先生又曰鄧攸爲呉郡守刑政清明百姓歡恱爲中興良守後稱疾去職郡常有送迎錢數百萬攸去郡不受一錢百姓數千人留牽攸舡不得進攸乃少停夜中發去吳人歌之曰纔如打五皷雞鳴天欲曙鄧侯挽不留謝令推不去又曰徐州刺史吕䖍檄王祥爲別駕祥年垂耳順固辭不受爲具車牛祥乃應召䖍委以州事于時冦盗充斥祥率勵兵士頻討破之州界清静政化大行時人歌之曰海沂之康實頼王祥邦國不空別駕之功又曰諸葛恢字道明荀闓字道明蔡謨字道明皆有名譽號曰中興三明時人歌之曰京師三明各有名蔡氏儒雅荀葛廉清王隠晉書曰應詹爲南平郡郡人歌之曰亂離旣著殆爲灰朽僥倖之運頼兹應后䕃我塗炭惠隆丘阜潤曰江海恩猶父母崔鴻前秦録曰王猛化洽六州人移風變百姓歌之曰長安大街夾樹楊槐下走朱輪上有鸞栖英彦雲集誨我人黎又曰符堅時鳯皇集于東闕歌之曰鳯皇于飛其羽翼翼淵哉聖后饗齡萬億崔鴻崔氏家傳曰崔瑗爲汲令開溝澮興造稲田長老歌之曰上天降神明錫我慈仁父臨人布德澤恩惠施以序唐書顔師古叔父遊秦武德𥘉累遷廉州刺史封臨沂縣男時劉黒闥𥘉平人多以強暴寡禮風俗未安遊秦撫恤境内禮讓大行邑人歌之曰廉州顔有道性行同莊老愛人如赤子不煞非時草髙祖璽書勞勉之韓子曰齊桓公飲酒醉遺其冠耻之管仲曰公胡不雪之以政公曰善因發困倉賜貧窮論囹圄三日而人歌之曰公胡不復遺其冠乎吕氏春秋曰魏襄王使呉起爲鄴令引漳水灌田民大得利相與歌曰鄴有呉聖令爲公决漳水灌鄴旁終古斥鹵生稻粱世說曰郗超王珣並以雋才爲桓温大司馬所眷珣爲主簿超爲記室叅軍超多鬚珣形狀短小時人爲之歌曰髯叅軍短主簿能令公喜能令公怒常璩華陽國志曰吳資字元約爲巴郡太守屢獲豐年人歌之曰習習晨風動澍雨潤乎苗我后恤時務我人以優饒劉向新序曰季子以劒帯徐君墓樹徐人嘉而歌之曰延陵季子不忘舊故千金之劒以帶丘墓陳留耆舊傳曰爰珎除六令吏人訟息教誨其子弟歌之曰我有田疇爰父殖置我有子弟爰父教誨襄陽耆舊傳曰山季倫每臨習池未甞不大醉而還曰我髙陽地也襄陵城中小兒歌之曰山公出何去徃至髙陽池日夕倒載歸酩酊無所知時時能騎馬到着白接籬舉鞭向葛强何如并州兒又曰襄陽太守胡烈有惠化百姓歌曰羙哉明后儁哲惟嶷陶廣乹坤周孔是則文武播暢威振遐域謡爾雅曰徒歌曰謡漢書曰石顯失權數月丞相條奏顯舊惡及其黨牢梁陳順皆免官顯與妻子徒歸故郡憂懣不食道病死諸所交結以顯爲官廢罷少府五鹿充宗左遷玄菟太守御史中丞伊嘉爲鴈門都尉長安謡曰伊徙鴈鹿菟去牢與陳石無徒袁山松後漢書曰桓帝時朝廷日亂李膺風格秀整髙自標尚後進之士升其堂者以爲登龍門大學生三萬餘人牓天下士上稱三君次八俊次八顧次八及次八厨猶右之八元八凱也因爲七言謡曰不畏強禦陳仲舉九卿直言有陳蕃天下模楷李元禮天下好交荀伯條天下英秀王叔茂天下冰楞王秀陵天下忠平魏少英天下稽古劉伯祖天下良輔杜周甫天下才英趙仲經司馬彪續漢書曰張霸爲㑹稽太守越賊束手歸附童謡曰弃我㦸捐我矛盗賊盡吏皆休又曰蜀童謡曰黃牛白腹五銖當復時公孫述僣號於蜀時人竊言王莽稱黃述欲繼之故稱漢家貨泉當復也又曰桓帝時汝南太守宗資任用功曹范滂中人以下共嫉之作七言謡曰汝南太守范孟慱南陽宗資主畫諾東觀漢記曰王渙除河内温令啇賈露宿人開門卧人爲作謡曰王稚子代未有平徭役百姓喜呉志曰周瑜少精意於音樂三爵之後其有闕誤瑜必知之知之必頋時人謡曰曲有誤周郎頋晉書曰羊祜以伐呉必藉上流之勢又時呉有童謡曰阿童復阿童衘刀浮渡江不畏岸上獸但畏水中龍祜聞之曰此必水軍有功但當思應其名者耳又曰杜預遣周旨伍巢等伏兵樂郷城外孫歆遣軍岀拒王濬大敗而還旨等發伏兵隨歆軍而入直至帳下虜歆而還故軍中爲之謡曰以討伐戰一當萬於是進逼江陵又曰太始中爲賈充等謡曰賈裴王乱紀綱王裴賈濟天下言亡魏而成晉也王隠晉書曰裴秀纔十餘歳叔父徽有聲名賔客詣徽岀則過秀時人謡曰後進領䄂有裴秀又曰杜預開楊口起夏口水道洪洞逹巴陵經千餘里内冩長江之險外通零桂之漕南土美而謡之曰後世無叛由杜翁孰識智名與勇功又曰潘岳字安仁清辯能屬文早辟賈充府太子舎人出爲河陽令以仕次冝爲郎不得意時僕射山濤領選岳内非之宻作謡曰閣道東有大牛王濟鞅裴楷鞦和嶠刺促不得休崔鴻後趙録曰張樓爲臨水長嚴政酷刑殘忍無惠人謡之曰陽平張樓頭如箱見人切齒劇虎狼崔鴻前秦録曰符洪母姜氏因寢産洪驚悸而寤先是隴右大霖雨百姓苦之謡曰雨若不止洪水必起故名之曰洪又曰𥘉符生夢大魚食蒲又長安謡曰東海大魚化爲龍男便為王女爲公問在何所洛門東海堅將也時爲龍驤將軍第在洛門之東是月生以謡夢之故誅侍中魚遵趙書曰劉膠討陳安於隴城安下小將劉牙趙牢路松多堅戍不下城内得安死力謡曰隴上徤兒曰陳安軀幹雖小腹中寛愛養將士同心肝騄􅍡駮馬鐵瑕鞍七尺大刀配齊鐶丈八虵矛左右盤十盪十决無當前百騎俱出如雲浮追者千萬騎悠悠戰始三交失虵矛十騎俱盪九騎留弃我騄􅍡攀巖悲天降雨迨者休阿呵嗚乎奈子乎嗚呼阿呵柰子何又曰汲桑六月盛暑而重裘累茵使人扇之患不清凉斬扇者時軍中爲之謡曰士爲將軍何可羞六月重茵𬒳納裘不識寒暑斷他頭又曰燕人龐世爲光禄動奏案豪強苛尅人物咸懼疾之及卒門無弔客時人爲之謡曰龐家之巷車馬鱗鱗泥丸之曰無弔賔弔賔不來何所因由性苛尅寡所親隋書曰韓擒虎先是江東有謡曰黄斑青騘馬發自夀陽溪來時冬氣木去日春風始皆不知所謂擒虎夲名豹平陳之際又乗青騘馬徃反時節與謡相應至時是方悟列子曰堯微服遊於康衢開童謡曰立我蒸民莫匪尓極不識不知順帝之則抱朴子曰童謡猶助聖人之耳目豈况墳素之宏博哉益部耆舊傳曰王忳字少林詣京師於客見諸生病甚困生謂忳曰腰下有金十斤願以相與乞収藏尸骸未問姓名呼吸因絶忳賣金一斤以給棺絮九斤置生腰下後署大度亭長到亭日有馬一疋到亭中其日大風有一繡𬒳隨風以來後忳騎馬突入金彦父見曰真得盗矣忳說馬狀又取𬒳示之彦父帳然曰𬒳馬俱止卿有何隂德忳具說葬諸生事彦父曰此吾子也遣迎彦䘮金具存民謡之曰信哉少林丗爲遇飛𬒳走馬與鬼語陳留耆舊傳曰呉祐爲恒農令勸善懲姦貪濁出境甘露降年榖豊童謡曰君不我憂人何以休不行界署焉知人處啇氏丗傳曰啇亮字子華舉孝廉到陽城遇兩虎争一羊亮案劒直前斬羊虎乃各以其半去時人爲之謡曰石里之勇啇子華暴虎見之藏瓜牙常璩華陽國志曰閻慮字孟度爲綿竹令以禮讓爲夲童謡曰閻君賦政明且昶蠲苛去碎以禮讓劉恭叔異苑曰晉時長安謡曰秦川中血没踠唯有凉州倚柱看及惠愍之間關内殱破浮血丹溧張䡄擁衆一方威恩共著太平御覽卷第四百六十五
