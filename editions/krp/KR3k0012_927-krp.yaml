front:
  text: 太平御覽卷第九百二十七羽族部十四異鳥
  hash: sha256:d6e12b895dbd318176997fbd1df24ac6038c5790dd781ed1812dade0d49183e1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_927-1a}
body:
  text: 鵬鷖希有金翅意怠大風兼兼丗樂端琦青鳥治鳥木客惡鳥鴞鵩鴝鵅鴆鬼車不孝鳥鵬莊子曰北溟有魚其名爲鯤鯤之大不知幾千里化而爲鳥其名爲鵬鵬背不知幾千里也怒而飛翼若垂天之雲是鳥也海運將徙於南溟南溟者天池也水激三千里摶扶摇而上者九萬里司馬彪注曰扶摇上行風一晏子曰景公謂晏子曰天有極大物乎對曰有鵬浮遊雲背凌蒼天該於天地漻漻乎不知其翮之所在也幽明録曰楚文王好獵有一人獻一鷹擊鵬鶵事具鷹門異類傳曰漢武時西域獻黒鷹得鵬鶵東方朔識之晉書曰賈彪鵬鳥賦序曰余覧張安丗鷦鷯賦以其質微處褻而陋以逺害愚以爲未若大鵬栖形遐逺自育之全也此固禍福之機聊賦之云又曰阮脩大鵬賛曰蹌蹌大鵬誕自北溟假精靈鱗神化以生如雲之翼如山之形海運水擊扶搖上征又曰習鑿齒詣釋道安值衆僧齋衆皆捨鉢歛祍唯道安食不輟鑿齒曰大鵬從南來衆鳥皆戢翼何忽凍老鴟腩腩低頭食鷖一名天鷄神異經曰北海有大鳥其髙千里頭文曰天胷文曰鷄左翼文曰鷖右翼文曰勤左足在海北涯右足在海南涯其毛蒼其喙赤其脚黒名曰天鷄一名鷖勒頭河東止海央唯捕鯨魚死則北海水流利不犯觸人不干物或時舉翼飛其兩羽切如雷如風驚動天地張茂先曰北海多鯨魚而産子多北海溢塞故鳥食此魚海水通流希有東方朔神異經曰崑崙銅柱有屋辟方百丈上有一鳥名希有張左翼覆東王公右翼覆西王母一歳再登翼上之東王公也其喙赤目黄如金其肉苦鹹仙人甘之金翅鳥符子曰齊景公謂晏子曰寡人旣得寳千乗聚萬駟矣方欲珎懸黎㑹金玉其得之耶奚若晏嬰曰臣聞琬琰之外有鳥焉曰金翅民謂爲羽豪其爲鳥也非龍肺不食非鳯血不飲其食也常飢而不飽其飲也常渇而弗充生未幾何天其大年而死金玉之珎非乃爲君之患矣齊書曰𥘉武帝夢金翅鳥下殿庭摶食小龍無數乃飛上天明帝𥘉其夢竟驗意怠莊子曰東海有鳥名意怠進不敢爲前退不敢爲後食不敢先甞必取其緒行列不斥而人不得害以免於患大風淮南子曰堯使羿繳大風於靑丘大風鷙鳥在東方一云大風風伯也兼兼周書曰成王時巴人獻比翼鳥爾雅曰南方有比翼鳥焉不比不飛其名曰兼兼郭璞注曰似鳥亦色一目一翼相得乃飛也山海經曰有鳥其狀如鳬一翼一目相得乃飛名曰蠻比翼鳥色青青見則大水史記曰管仲說桓公古之封禪西海致比翼之鳥瑞應圖曰王者德及髙逺則比翼鳥至一本云王者有孝德則至博物志曰崇吾之山有鳥焉一足一翼一目相得乃飛名曰鶼鶼見則天下大水丗樂臨海異物志曰丗樂鳥五色頭上有冠丹喙赤足有道則見端琦說苑曰晉平公出朝其鳥環平公不去平公頋謂師曠曰是鳯耶師曠對曰東方有鳥名爲端琦憎鳥而愛狐今吾君必衣狐裘以朝乎平公曰然青鳥山海經曰三危之山有三青鳥居青鳥主爲西王母取者別自栖息於此山食紀年曰穆王十三年西徃至于青鳥之所解漢武故事曰七月七日上於承華殿齊止中忽有一青鳥從西方來集殿前上問東方朔朔曰此西王母欲來也有頃西王母至有二青鳥如烏俠侍王母旁又曰鈎弋夫人卒上爲起通靈臺常有一青鳥集臺上晉中興書曰顔含嫂病困湏髯虵膽不能得含憂歎累曰忽有一童子持青囊授含乃虵膽也童子化爲青鳥飛去神仙傳曰東陵聖母廣陵海陵人杜氏妻也學劉綱道座在立亡杜公不信誣言聖母作姧収付獄聖母從䆫中飛去於是逺近爲立廟甚有神效常有一青鳥在祭所人有失物者青鳥便非集物上路無拾遺晉郭璞青鳥賛曰山名三危青鳥所解徃來崑崙王母是隷穆王西征旋軫斯地治鳥捜神記曰越地深山有鳥大如鳩青色名曰治鳥穿大樹作窠如五六升噐口徑數寸周飾以土堊赤白相分狀如射侯伐木者見此樹即避之或夜冥不見鳥亦知人不見己也鳴曰咄咄上去明日便急上去曰咄咄下去明日便冝急下去若不便去但言笑而巳可止伐也若有穢惡及犯其所止者則虎害之白日見其形鳥形也夜聽其鳴亦鳥也時作人形長三尺入澗中取石蟹就人間火炙之越人謂此越祝之祖木客異物志曰木客鳥大如鵲數千百頭爲羣飛集有度不與衆鳥相厠人俗云木客白黄文者謂之君長有翼有綬飛髙而正赤者在前謂之五伯居前正黒者謂之鈴下緗色而頳雜者謂之功曹左脇有白帶似鞶囊者謂之主簿長次君後其五曹官属各有章色廬陵郡東有之惡鳥爾雅曰梟鵄郭璞注曰土梟鳥少尾長醜爲流粟史記曰古者天子常以春祠黄帝用一梟如淳曰漢使東郡送梟五月五日作梟羮以賜百官以其惡鳥故食之春秋後語曰蘇代謂魏王曰王獨不見夫博之所以貴梟乎愽之竪者爲梟楚詞云成梟而牟乎五白梟古堯切便則食不便則止今王曰事始巳行不可更是何言歟王之用智不若梟乎至乃止其行後漢書曰朱浮與彭寵書曰惜乎弃休令之嘉名造鴟梟之逆謀晉書曰張重華爲石季龍所攻重華掃境内使其征南將軍裴恒禦之恒壁于廣武欲以持乆弊之張躭舉主簿謝艾兼資文武必能折衝禦侮殱殄凶類重華召艾艾曰昔耿弇不欲以賊遺君父黄權願以萬人當㓂乞假臣兵七千爲殿下吞王擢麻秋等重華大恱以艾爲中堅將軍配歩騎五千擊秋引師出振武夜有二梟鳴於牙中艾曰梟邀也六博得梟者勝今梟鳴牙中尅敵之兆於是進戰大破之斬首五千級又載記曰乞伏乾歸略于五谿有梟集于其手甚惡之六年爲兄子公府所弑并其諸子十餘人北史李元忠性甚工彈甞從文襄入謁魏帝有梟鳴殿下文襄命元忠彈之問得幾丸而落對曰一丸承大將軍意氣兩丸足矣如其言而落之唐書曰有梟晨鳴扵張率更庭樹其妻以爲不祥連唾之文収云急灑掃吾當改官言末畢賀者巳在門淮南子曰白公之嗇財若梟之愛其子也許慎曰梟子大食其母也淮南萬畢術曰甑瓦止梟鳴取破甑瓦向抵之輙自止物相勝其性耳魯連子曰齊辯士田巴毀五帝罪三王離堅白合同異一日服千人有徐刼者弟子曰魯仲連年十二號千金駒徃詣田巴曰臣聞白刃交前者不救流矢急不暇救援也今楚軍南陽趙伐髙唐燕人十萬守聊城國之危在旦夕先生柰何不能却者先生之言有以梟鳴出聲而人惡之願先生勿復言田巴曰謹聞命矣說苑曰齊景公爲露寢之臺成而不通焉栢常騫曰爲臺甚急臺成君何爲不通焉公曰然梟昔鳴梟鳴者其聲無不爲也吾惡之甚是以不通焉栢常騫曰臣請禳而去之公曰阿具對曰築新室爲置白茅焉公使爲室成置白茅焉栢常騫夜用事明日問公曰今旦聞梟聲乎公曰一鳴而不復聞使人徃視之梟當陛布翼伏地而死又曰梟逢鳩鳩曰子安之梟曰我將東徙鳩曰何故梟曰一郷皆惡我鳴故徙也鳩曰更鳴則可不更鳴東徙亦惡子之聲桓譚新論曰王翁時男子畢康殺其母詔焚燒其屍暴其罪扵天下余上封章言宣帝時公卿朝㑹丞相語次曰聞梟生子長旦食其母寜然有賢者應曰但聞烏子反哺耳丞相大慙君子之於鳥獸尚爲之諱況人乎又曰余前爲典樂大夫有梟鳴扵庭樹府中皆懼余後與典謝侯爭闘俱坐免說文曰梟不孝鳥也至日捕梟磔之趙壹解擯賦曰甑瓦可以令梟寂嶺表録異曰北方梟鳴人家以爲恠共惡之南中晝夜飛鳴與烏鵲無異桂林人羅取生鬻之家家養使捕䑕以爲勝狸鴞禮記内則曰鵠鴞胖毛詩曰墓門有梅有鴞萃止夫也不良歌以訊之又曰翩彼飛鴞集于泮林食我桑椹懷我好音又詩義䟽曰鴞大如鳩緑色惡聲鳥也入人家凶賈誼所賦是也其肉甚美可爲羮臛又可炙漢供御物各隨其時唯鴞冬夏施以美故也莊子曰見卵而求時夜見彈而求鴞炙魏志曰夫鴞天下賤鳥也及其在林食椹則懷我好音晉書曰王羲之好鴞炙三國典略曰齊太山主武成之長也母曰胡太后夢扵海上坐玉盆日入裙下遂有娠生扵并州其日有鴞鳴於産帳之上盛弘之荆州記曰巫縣有鳥如雌鷄其名爲鴞廣志曰鴞楚鳩所生如驢巨靈種類不滋乳也鵩西京雜記曰賈誼在長沙鵩鳥集其承塵而鳴長沙俗以爲鵩至人家主人當死誼作鵩鳥賦齊死生等榮辱以遣憂累焉賈誼鵩鳥賦曰誼爲長沙王傅三年有鵩鳥飛入舎止于坐隅鵩似鴞不祥鳥也誼旣謫居長沙長沙卑濕自傷悼以爲壽不長爲賦以自廣漢太常孔臧仲尼之後以才學知名作鴞賦曰季夏庾子思道静居爰有飛鴞集我室隅異物之來吉凶是符昔在賈生有識之士忌兹鵩鳥卒用䘮巳咨我今考信道秉真變性生家謂之天神脩德滅邪化及其鄰梅陶鵩鳥賦序曰余旣遭王敦之難遂見忌録居于武昌其秋有野鳥入室感賈誼鵩鳥依而作焉神仙傳曰尹䡄字公度人有怪鳥鳴其屋上者以語公度公度爲一奏符著鳥鳴處其夕鳥伏符下死鴝鵒爾雅曰鵅鵋䳢郭璞注曰江東呼鵂鶹爲忌欺亦曰鴝鵅音句格纂文曰􅝐鶹一名忌欺白日不見人夜能拾蚤虱也蚤瓜音相近俗人云鵂鶹拾人弃瓜相其吉凶妄說也博物志曰鵂鶹一名鵄鵂晝日無所見夜則目至明人截爪甲弃露地此鳥夜至人家拾取瓜分别視之則知有吉凶凶者輙便鳴其家有殃莊子曰鵂鶹夜撮蚤察毫末畫暝目不見丘山殊性也淮南萬畢術曰鵄鵂致鳥取鵄鵂折其大羽絆其兩足以爲媒張羅其旁鳥自聚矣南史曰侯景入臺城在昭陽殿廊下居處常有鵂鶹鳥鳴呼景惡之使人窮山野捕焉三國典略曰侯景矯豫章嗣王㨂命禪位於巳將拜受冊命忽有丹觜鵲集於冊書又夜有鵂鶹鳴於太極殿上景深以爲惡自控弦伺之鴆廣雅曰鴆鳥雄曰運日雌曰隂諧東觀漢記曰公孫述欲徴李業爲博士業故不起乃遣人持鴆不起便賜藥業乃飲鴆而死晉中興書曰烈宗詔曰次飛督王饒忽上吾鴆鳥一口云以辟惡此凶物豈冝妄進於是鞭饒二百使殿中侍御史孫雲臨於四衢之道焚燒之晉書曰石崇出爲南中郎將荆州刺史領南蠻校尉加鷹楊將軍崇在南中得鴆鳥鶵以與後軍將軍王愷時制鴆鳥不得過江爲司隷校尉傳祗所糺詔原之燒鴆於都街山海經曰女几之山琴鼓之山玉山豐山岷山其鳥多鴆郭璞注曰鴆大如鵰紫喙色赤喙食虵蝮也淮南子曰運日知晏隂諧知雨吴氏本草曰運日一名羽鴆神農本草曰鴆生南郡大毒入五藏爛殺人鬼車荆楚歳時記曰正月七日多鬼車鳥度家家槌門打户捩㺃耳滅燭燈禳之玄中記云此鳥名姑獲一名天帝少女夜遊好取人家女人養之有小兒以血點其衣爲驗嶺表録異曰有鳥如鵂鶹又名鬼車春夏之間稍遇隂晦則飛鳴而過嶺外尤多愛入人家鑠人䰟氣或云九首曽爲犬齧下一首常滴血血滴之家即有凶咎三國典略曰齊後園有九頭鳥見色赤似鴨而九頭皆鳴玄中記曰姑獲鳥夜飛晝藏盖鬼神類衣毛爲鳥脫毛爲女人名爲天帝少女一名夜行遊女一名釣星一名隱飛鳥無子喜取人子養之以爲子人養小兒不可露其衣此鳥度即取兒也荆州爲多昔豫章男子見田中有六七女人不知是鳥扶匐徃先得其所解毛衣取藏之即徃就諸鳥各走就毛衣衣此飛去一鳥獨不得去男子取以爲婦生三女其母後使女問父取衣在積稻下得之衣之而飛去後以衣迎三女三女兒得衣飛去今謂之鬼車不孝鳥神異經曰不孝鳥狀如人身犬毛有齒猪牙額上有文曰不孝口下有文曰不慈鼻上有文曰不道左脇有文曰愛夫右脇有文曰憐婦故天立此異鳥以顯忠孝也太平御覽卷第九百二十七
