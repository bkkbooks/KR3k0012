front:
  text: 太平御覽卷第三百五十一
  hash: sha256:8decb75e91af1a84ee605965a2baa086023ccbcb2001ae527d7f2c476fbf991f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_351-1a}
body:
  text: 兵部八十二戈易曰離爲戈兵又曰投戈散地則六親不能相保書曰武王至啇郊王左仗黃鉞右秉白旄以麾曰逖矣西土之人稱爾戈比爾干立爾矛予其誓又曰武王伐紂戰於牧野前徒倒戈血流漂杵又曰成王崩太保命仲桓南宫毛孔安國日二臣桓毛名俾爰齊侯吕伋以二干戈虎賁百人逆子釗于南門之外又曰兊之戈和之弓垂之竹矢在東房兊和古之巧人又曰四人綦弁執戈上刃夾兩階戺一人冕執戣立于東垂一人冕執瞿立于西垂戣瞿皆㦸属又曰惟干戈省厥躬又曰魯侯伯禽宅曲阜徐夷並興公曰備乃弓矢鍜乃戈矛詩曰豈曰無衣與子同𫀆王于興師修我戈矛與子同仇豈曰無衣與子同澤王于與師修我矛㦸與子偕作又曰彼候人兮荷戈與祋毛萇曰候人道路送迎賔客者也荷揭也祋殳也祋丁外切又曰載戢干戈載櫜弓矢禮記曰進戈者前其鐏徂悶切後其刃進矛㦸者前其鐓音隊後其銳鄭玄曰後刃敬也二兵鐓鐏雖在下猶為首銳底曰鐏取其鐏地也平底曰鐓取其鐓地也又曰春夏學干戈秋冬學羽籥皆於東序干盾也戈句子㦸也干戈万舞象舞也又曰能執干戈以衛社稷又曰賔牟賈侍坐於孔子孔子與之言及樂子曰夫樂者象成者也惣干而山立武王之事也發揚而蹈厲太公之志也武亂皆坐周召之治也武王克啇濟河而西倒載干戈包以虎皮將帥之士使爲諸侯名之曰建櫜又曰大夫士旣殯而君徃焉祝先升君即位于阼小臣二人執戈立于前一人立于後周禮曰旅賁氏掌執戈盾夾王車而趨左八人右八人車止則持輪喪紀則衰葛執戈盾軍旅則介而趨又曰節服氏掌祭祀朝覲衮冕六人維王之太常郊祀裘冕二人執戈送逆尸從車鄭玄曰裘冕者亦從尸服也從尸車送逆之徃來也又曰方相氏掌蒙熊皮執戈揚盾帥百隷而時儺以索室毆疫及墓入壙以戈擊四隅毆方良方良罔良也又曰司戈楯掌戈楯之物而頒之祭祀授故士戈故士王族故士也與旅賁當事則衛王者也軍旅㑹同授貳車戈楯建乗車戈楯授旅賁及虎士戈楯乗車王所乗車也旅則草路㑹同則金路也又曰車謂之六等之數鄭玄曰六等之數法易之三材六畫也車􅎮四尺謂之二等人長八尺崇於戈四尺謂之三等殳長尋有四尺崇於人四尺謂之四等車㦸常崇於殳四尺謂之五等酋矛常有四尺崇於㦸四尺謂之六等又曰金有六齊四分其金而錫居一謂之戈㦸之齊又曰戈廣二寸内倍之胡三之援四之鄭玄曰戈今勾子㦸也或謂之鷄鳴或謂之擁頸也巳倨則不入巳勾則不决長内則折前短内則不疾鄭玄曰戈勾兵也主於胡巳倨謂胡㣲直而邪多以啄人則不入巳勾謂胡曲多也以啄人則創不决前謂援也内長則援短援短則曲於罄折而於罄折則引之折與胡並鈎内短則援長援長則倨於鏧折倨於罄折則引之不疫又曰盧人爲盧噐戈祕六尺六寸殳長尋有車四尺㦸常酋矛常有四尺矛夷三尋鄭玄曰祕猶柄也八尺曰尋倍尋曰常酋夷長短名也左傳曰晉公子重耳及齊齊桓公妻之公子安之姜曰行也懷與安實敗名公子不可姜與子犯醉而遣之醒以戈逐子犯又曰秦伐晉戰之明日晉襄公縛秦囚使萊駒以戈斬之囚呼萊駒失戈狼瞫取戈以斬囚禽之以從公乗遂以爲右又曰魯敗狄于鹹獲長狄僑如冨父終甥舂其喉以戈殺之舂猶衝也埋其首於子駒之北門狄長三丈又曰齊敗於鞍齊頃公旣免求逢丑父三入三出入于狄卒皆抽戈楯冐之以入于衛衛師免之遂自徐關入又曰晉楚戰於鄢陵范丐趨進丐士爕子曰塞井夷竈陳於軍中晉楚唯天所授何患焉文子執戈逐之曰國之存亡天也童子何知焉又曰晉骨童夷羊五帥甲八百將攻郄氏長魚矯請無用衆公使清沸魋助之沸魋嬖人也抽戈結祍祍裳際也而僞訟者三郄將謀於榭榭講武堂也矯以戈殺駒伯苦成叔於其位駒伯郄錡苦成叔郄犨也温季曰逃威也遂趍郄至夲意欲禀折君命而死今矯等不以君命而來故欲逃也矯及其車以戈殺之皆尸諸朝又曰晉中行獻子將伐齊夢與厲公訟弗勝厲公献子所殺公以戈擊之首墜於前跪而戴之奉之以走見梗陽之巫臯他日見諸道與之言同巫亦夢見献子與厲公訟巫曰今兹主必死若有事于東方則可以逞又曰晉侯伐齊范鞅門於雍門其御追喜以戈殺犬於門中殺犬示閑暇也又曰齊慶封好田而嗜酒與慶舎政舎慶封子盧蒲癸臣子之子之舎也與王何二人皆嬖使執寢戈而先後之寢戈親近兵仗也嘗於大公之廟慶舎涖事臨祭事也麻嬰爲尸爲祭尸也盧蒲癸王何執寢戈慶氏以其甲環公宫盧蒲癸自後刺子之王何以戈擊之解其左肩猶援廟桶動於甍以俎壷投殺人而後死言其力多又曰鄭徐吾犯之妹美公孫楚聘之楚子南也公子黒又使強委禽焉禽鴈也納綵内鴈也子南戎服入左右射超乗而出女自房觀之適子南氏子晢怒旣而櫜甲以見子南欲殺之而取其妻子南知之執戈逐之及衝擊之以戈衝交道也子晢傷而歸告大夫曰我好見之不知其有異志故傷又曰晉平公有疾鄭伯使公孫僑如晉聘且問疾叔向問寡君之疾病卜人曰實沉臺駘爲祟此何神也子産曰昔髙辛氏有二子伯曰閼伯季曰實沈不相能也日尋干戈以相征討后帝不臧遷閼伯于啇丘主辰遷實沉于大夏主參又曰衛公孟縶狎齊豹公孟靈公兄也齊豹齊惡之子爲衛司㓂也奪之司㓂與鄄公孟惡北宫喜禇師圃欲去之公子朝通于襄夫人宣姜懼而欲以作亂故齊豹北宫喜禇師圃公子朝作亂公孟有事於盖獲之門外有事祭也盖獲衛郭門也齊氏帷於門外而伏甲焉使祝龜寘戈於車薪以當門華齊御公孟宗魯驂乗及閎齊氏用戈擊公孟宗魯以背蔽之中公孟肩殺之又曰吴入郢楚昭王渉睢濟江入于夢中王寢盗攻之以戈擊王王孫由于以背受之中肩又曰吴伐越越子句踐禦之陳于檇李靈姑浮以戈擊闔閭傷將指又曰齊人輸晉范氏粟鄭子姚子般送之范吉射逆之趙鞅禦之郵無恤御簡子衛太子爲右登鐵上鄭人擊趙簡子中肩斃于車中太子救之以伐鄭師北太子復伐之鄭師大敗又曰齊簡公即位與婦人飲酒于檀臺成子遷諸寢徙公使居正寢公執戈將擊之疑其欲作亂也太史子餘曰非不利也將除害也又曰晉荀瑶帥師伐鄭荀瑶智伯也鄭駟弘請救于齊弘駟歂子陳成子救鄭及濮雨不渉成子衣製杖戈製雨衣也立于阪上馬不出者助之鞭之智伯聞之乃還畏其得衆心也曰我卜伐鄭不卜敵齊又曰衛良夫與太子蒯聵入舎於孔氏之外圃昏入適伯姬氏旣食孔伯姬仗戈而先太子與五人分輿猳從之分披甲也迫叔悝於厠強盟之孔氏專政故刼孔埋欲令逐輒漢書曰宣帝時美陽鼎獻之張敞好古文字案鼎銘勒而上議曰今鼎出於郊東中有刻書曰王命尸臣孟康曰尸主也官此㧦邑賜爾鸞旂黻琱戈尸臣拜手稽首竊以傳記言之鼎殆周之所以褒賜大臣也又曰武帝元鼎五年南越相吕嘉反遣歸義侯嚴爲戈舡将軍張晏曰嚴故越人降義歸義侯越人於水中負鑿鍳人舡又有蛟龍之害故置戈於下因以爲名也下離水晉書曰賈充傳云髙貴郷公之攻相府也充率衆拒戰於南闕軍將敗騎督成倅弟太子舎人濟問充曰今日之事當如何充謂曰公飬汝等正擬今日復何疑濟於是抽戈犯蹕崔鴻前趙録曰李景年字延祐前部人長平之戰劉聦馬中矢幾爲晉軍所獲景年以馬授聦揮戈前戰以功封梁鄒侯戰國䇿曰中山君饗都大夫羊羮不徧司馬子期怒而走於楚說楚王伐中山中山君亡走有二人挈戈而隨中山君顧謂二人子奚爲者也二人對曰臣有父當餓將死君下壷食餔臣之父故來死君也中山君慨然仰天嘆曰吾以一杯羊羮亡國以一壷食得士二人國語曰秦師侵晉惠公令韓簡挑戰曰昔君之惠寡人未敢忘寡人之衆能合之不能離也君若不還寡人將無所避穆公衡雕戈出見使者莊子曰孔子窮於陳蔡七日不食絃歌皷琴子路仡然執戈而儛韓子曰勾踐入宦於吴執戈爲吴王洗馬故能殺夫差於姑蘇吕氏春秋曰趙簡子攻衛附郭自將逺立郭逺立矢石不及也又居於犀蔽犀櫓之下投枹而嘆投弃也曰烏呼士之遫音速弊盡壹若此乎遫猶化也一猶皆也言士之爕化弊惡皆如此乎行人燭過免胄横戈而進曰亦有君不能耳士又何弊之有簡子乃去犀蔽犀櫓而立於矢石之所及矢箭也石弩也一皷而士乘之畢盡也乗凌也簡子曰與吾得革車千乗也不如聞行人燭過之一言淮南子曰陽虎爲亂於魯魯君令人閉城門而捕之得者有賞失者夷族圍三匝矣陽虎將舉劒而自刎頸門者止之曰我將出子陽虎左持劒右提戈赴圍而走門者岀之陽虎旣出顧出之者以戈推之攘祛薄腋魯君聞陽虎失怒所岀之門以爲傷者戰鬪者也不傷者爲縱之傷者受厚不傷者受重罪也此所謂害之而反利之者也又曰魯陽公與韓搆難戰酣日暮援戈而撝日日反三舎魯陽楚人也王之孫司馬期之子所謂魯陽文子也楚僣號稱王其守縣大夫皆稱公曰魯陽公今南陽魯是也五經要義曰國君及元率戎車將在中央當皷御者在左勇力之士執戈在後陸景典語曰戈刀雖備於執事而無所揚其鋒桓寛鹽鐵論曰匈奴處沙漠之中生不食之地如中國之麋鹿耳好事之臣求其義責之禮使中國干戈至今未息玄晏春秋曰七年春王正月乙酉予長七尺四寸矣未通史書與從姑子梁栁等擊壤于路或編荆爲楯執荻爲戈分陳相刺習兵共以爲樂張騭文士傳摯虞荅䇿曰古之良臣受彤弓彫戈之錫銘之彛器貺之後昆曠丗歷代以爲賔榮豈無其物貴殊品也抱朴子曰虎狼見逼不揮戈奮劒而彈琴詠詩吾未見其身之可保也又曰荆卿朱亥不示小勇於怯弱之間孟賁馮婦不奮戈㦸於貍犲之群山海經曰崐崘墟北有人曰太行伯把戈于寳捜神記曰有崔文子者學仙於子髙子髙化爲白蜺而持藥文子文子驚恠引戈擊蜺中之因墮其藥俯而視之王子喬之尸也置之室中覆以弊筐湏臾而化爲大鳥開而視之飜飛而去梅陶在盆口與三公書蘇峻勇而無謀兵家所常弊也長廣人釋鋤犁執干戈何知戰法文選曰戈鋋彗雲又曰戈矛若林離騷曰操吴戈兮𬒳犀甲車錯轂兮短兵接繁欽述征賦曰時三月之暮春逼干戈之急難王粲從軍詩曰摟船凌洪波尋戈刺群虜髙貴郷公詩曰干戈隨風靡武騎齊鴈行魏明帝堂上行曰武夫懷勇毅勒馬於中原干戈森若林長劒奮無前荀道雍猛虎行曰詰朝彈竹冠荷戈翦荒要應貞華覽曰萬夫决拾武騎齊足乗夷長森分行別属弓不虚彎戈不茍撲傳毅西征頌曰愠昆夷之匪恊咸矯於戎事干戈動而後戢天將祚而隆化崔駰北征頌曰人事恊兮皇恩得金精揚兮水靈伏順天機兮把刑德戈所指兮罔不尅張恊七命曰舉戈林竦揮鋒電滅仰傾雲巢俯殫地穴孔欣七誨曰擕同好命瓜牙攝烏號杖雄戈縁山結網叅雲張羅殷融議曰自頃多難國度屢空疋夫有重蠒之勞武王有執戈之勲太平御覽卷第三百五十一
