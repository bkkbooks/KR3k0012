front:
  text: 太平御覽卷第七百七十四
  hash: sha256:8a1ba8a2f4a7dff102a9adefea9413e1da323aec4f65128ed0f69bd4e4caabd3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_774-1a}
body:
  text: 車部三輅輿同輿附輦輅釋名曰天子所乗曰輅輅亦車也謂之輅言行路也金輅以金玉飾車也象輅革輅木輅各隨所名也書曰大輅在賔階面綴輅在阼階面大路王綴輅金靣前皆南饗先輅在左塾之前先輅象以輅木金王象皆以飾車木則無飾背以在路寝門内左右塾北面凡陳列皆象成王生時禮曰大輅者天子之車也又曰鸞車有虞氏之輅也軥音鈎車夏后氏之輅也又曰天子居青陽左个乗青輅駕蒼龍天子居明堂左个乗朱輅駕芩駵天子居太廟太室乗黄輅駕黄龍天子居緫章左个乗白輅駕白駱天子居玄堂左个乗玄輅駕鐡驪周禮曰有虞氏上陶夏后上匠殷人上梓周人上輅又曰王之五路一曰玉路錫樊纓十月再就建太常十有二斿以祀金路鈎樊纓九就建大旂以賔同姓以封象路朱樊纓七就建大赤以朝異姓以封革路龍勒條纓五就建大帛以即戎以封四衛木輅前樊鵠纓建大麾以田以封蕃國又曰王后之五路重翟錫靣朱緫厭翟勒靣績緫安車雕靣鷖緫皆有容蓋翟車皃靣組緫有握輦車組輓有翣羽蓋左傳曰清廟茅屋大路越音活席大羮不致粢食音寺不鑿昭其儉也又曰賜之大輅之服戎輅之服論語曰行夏之時乗殷之輅服周之冕說苑曰晏子朝乗弊車駕駑馬景公見之曰嘻天子之禄寡耶何乗不佼古巧切之甚也晏子對曰頼君之賜得以壽三族及國交遊皆得生焉臣得煖衣飽食弊車駑馬以奉其身於丗足矣晏子出公使梁立據遺之輅車乗馬三反不受公不恱趣音促召晏子曰夫子不受寡人亦不受晏子對曰君使臣臨百官之吏節其衣服食飲之飬以先齊國之民然猶恐其侈靡而不頋其行也仐輅車乗馬君乗之上臣亦乗之下民之無義侈其衣食而不頋其行者臣無以禁之遂讓不受也董巴輿服志曰殷瑞山車金根之色殷人以爲大輅於是秦皇作金根之車漢承秦制爲乗輿即孔子所謂乗殷之輅也鹵簿令曰玉輅駕六馬太僕卿馭駕士三十二人並平巾幘青衫大口袴千牛衛將軍一人陪乗執金裝長刀御乗輦其輅衫腰輿後行次金輅象輅革輅木輅以次相隨並駕六馬各駕士三十二人並平巾幘大口袴衫色各從輅色次五副輅駕士各二十人衣服同正輅次耕根車駕六馬士三十二人服同玉輅又曰皇太子金輅駕四馬僕寺令馭左右率府卒一人執儀刀陪乗駕士二十二人並平巾幘緋帔衫大口袴又曰王公巳下象輅駕四馬佐二人立侍一人武弁朱衣革帶在左一人緋裲襠大口袴執刀在右駕士十二人平巾幘緋衫大口袴又曰玉輅青質以玉飾諸末重輿左青龍右白虎金鳯翅畫苢文鳥獸黄屋左纛金鳯一在軾前十二鑾在衡輅耕根鑾數皆准此其副則八二鈴在式龍輈設鄣塵青蓋繡飾黄裏愽山鏡子樹羽輪金根朱班重牙左建旂十有二旒旒皆畫升龍其長曵地右載闟許及切㦸長四尺廣三尺黻文旂首金龍頭㗸結綬及鈴緌駕蒼龍金緵亡黯切方釳許乞切揷翟尾五焦鏤錫鞶纓十有二就錫馬當顱金爲之鞶馬大帶纓馬决皆以五彩罽飾之就成也祭祀納后則供之金輅赤質以金飾諸末餘與玉輅同駕赤駵饗射祀還飲至則供之象輅黄質以象飾諸末餘同玉輅駕黄駵行道則供之革輅白質輓莫官切之以革餘同玉輅駕白駱廵狩臨兵事則供之木輅黒質以􅃮飾諸末餘與玉輅同駕黒駵田獵則供之諸盖旌旗及鞶纓皆從輅色黄裏俱用黄其鏤錫與五輅同耕根車青質盖三重餘同玉輅籍田則供之又曰皇太子金輅赤質以金飾諸末重輅箱畫苣文鳥獸黄屋伏鹿軾龍輈金鳯一在軾前設鄣塵朱盖黄裏輪畫朱牙左建旂九旒右載闟㦸旂首金龍頭衘結綬及鈴緌駕赤駵四鑾在衡二鈴在軾金緵方釳挣翟尾五焦鏤錫鞶纓九就從祀享正冬大朝納妃則供之又曰王公以下象輅以象飾諸末朱班輅八鸞在衡左建旗旗畫龍外一降升一右載闟㦸革輅以革飾諸末左建旜通帛爲旜餘同象輅木輅以􅃮飾之餘同革輅諸輅皆朱質朱盖朱旂旜一品九旒二品八旒三品七旒四品六旒其鞶纓就數皆淮此張子平東京賦曰天子乃撫玉輅乗時龍又曰乗鑾輅而駕蒼龍又曰奉引旣睪先輅乃發又曰龍輅充庭雲旗拂霓輿周易曰君子得輿民所載也又曰輿說輻夫妻反目象曰輿說輻中無尤也又曰壯于大輿之輹又曰見輿曵其牛掣其人天且劓無𥘉有終象曰見輿曵位不當也無𥘉有終遇剛也續漢書輿服志曰上古聖人見轉蓬始知爲輅輅行可載因物生智後爲之輿晉書曰王道有羸疾不堪朝㑹顯宗親幸之置酒作樂又詔自今巳後輿載入殿不得施拜晉諸公讃曰司徒傅以足疾遜位不許板輿上殿晉起居注曰太始四年正門臨軒詔太宰安平生孚載輿昇殿宋書曰陶潜解印後有脚疾使一門生二兒舉藍輿詣王弘旣至欣然而與之飲酌語林曰武侯與宣王在渭濵將戰宣王戎服莅事使人視武侯乗輿葛巾持白羽扇指麾三軍皆隨其進止宣皇聞而嘆曰可謂名士丗說曰孟旭未逹時家貧在京常見王恭乗髙輿服鶴氅裘于時微雪旭於籬間窺之歎曰此真神仙中人也陳留耆舊傳曰洛陽令董宣死後詔使視之有蘭輿一乗白馬一疋帝曰宣之清死乃知之幽明録曰謝安石當桓温之丗恒懼不全夜忽夢乗桓輿行十六里見一白雞而止莫有解此夢者及温死後代居宰相歴十六年而得病安方悟云乗桓輿者代君其位也十六里者得十六年也見白雞生者今太歲在酉吾病殆不起乎少日而卒淮南子曰以天爲盖以地爲輿四時爲馬韓子曰輿人成輿則欲人富貴也非輿人仁不貴則不售也潘安仁閑居賦曰太夫人乃御板輿升輕軒逺覽王畿近周家國左太冲蜀都賦曰車輿雜沓冠帶混弁張子平東京賦曰乗輿廵乎岱岳勸稼穡於原陸又曰皇輿夙駕䡨仕佳切於東階䡨脚也曹子建七啓云駕超野之駟乗追風之輿宋玉髙唐賦曰王乃乗玉輿駟倉螭同輿魏志曰太祖軍摩陂召夏侯惇常與同輿載諸將無得比者蜀志曰曹公東征吕布於下邳先主從曹公還表先主爲左將軍禮之愈重出則同輿呉志曰大子登字子髙善待僚屬略同布衣之禮諸葛恪頋譚等或同轝而載晉中興書曰紀膽字士逺爲鎮東左長史丹陽宣城新安三郡中正上常幸瞻家同乗輿還府瞻甚見遇郷郡榮之輦傳曰猛獲奔衛南宮萬奔陳以乗車輦其母一日而至又曰齊慶克通于聲孟子與婦人蒙衣乗輦而入于閎巷門又曰孟氏之臣秦莒父輦重如役莒父孟獻子家臣歩挽重車以從師榖梁傳曰晉君召伯尊而問焉伯尊來遇輦者輦者不辟使車右下而鞭之凡車將左右御在中有力之人在右所以備非常爾雅曰徒禦不驚輦名也漢書曰淮南王長早失母常附吕后孝惠然常心怨辟陽侯孝文𥘉即位自以爲最親驕蹇數不奉法上寛赦之三年入朝從上入苑獵與上同輦帝謂爲太兄又曰傅昭儀有寵於上生定陶恭王多伎藝上甚愛之㘴則同席行湏同輦又曰班婕妤班况之女孝成帝婕妤也賢才通辨帝遊於後庭嘗欲與同輦婕妤辤曰觀古賢聖之君皆有名臣在側三代末主乃有嬖妾今欲同輦無乃似之乎上善其言而止太后聞之喜曰古有樊姬仐有班婕妤漢武故事曰又起明光宫發燕趙羙女二千人充之常從行國載之後車與上同輦者十六人貟數恒滿又曰上嘗輦至郎署見一人老郎鬢眉皓白上顔名駟江都人上問公何時爲郎何其老也對曰臣文帝時爲郎上曰何其不遇也駟曰文帝好文而臣好武景帝好老而臣尚少陛下好少而臣巳老是以三世不遇晉書曰山濤呉平之後詔天下罷軍役示海内大安州郡悉去兵大郡置武吏百人小郡五十人帝嘗講武于宣武塲濤時有疾詔乗歩輦從因與盧欽論用兵之本以爲不宜去州郡武備其論甚精于時咸以濤不學孫呉而闇與之合帝稱之曰天下名言也而不能用及永寜之後屢有變難宼賊歘起郡國皆以無備不能制天下遂以大亂如濤言焉又曰張敞東宫舊事太子有卧輦步輿王韶晉紀曰義軍起桓玄問衆曰朕其敗乎曹靖之對曰神怒民怨臣實憂懼玄曰神何爲怒民何爲怨對曰移晉宗廟飄零落薄無所祭之不及於祖此其所以怒也玄曰卿何不諌對曰輦上諸君皆以爲堯舜之丗臣何敢諌又曰梁兾與妻孫壽共乗輦張羽蓋飾以金銀以騁娯樂晉公卿禮祑曰太宰平王給雲母輦晉太康起居注曰齊王歸蕃詔賜香衣輦一乗後魏書禮志曰大樓輦輈十二加以玉飾衡輪雕采與輅同駕牛十二又曰乾象輦羽葆圎盖畫日月五星二十八宿天階雲漢山林雲氣仙聖賢明忠孝節義遊龍飛鳯朱雀玄武白虎青龍竒禽異獸可爲飾者皆亦圖焉太皇太后助祭郊廟則乗之鄴中記曰石虎大駕有金銀輦雲母輦武㓻輦數百乗虎皇后出乗嵩路輦文或玉路輦或朱􅃮卧輦純以雲母代紗中外四望皆通徹又曰石虎少遊獵體轉壯大不復乗馬作獵輦使二十人擔之如今之歩輦上安徘徊曲盖㘴處轉關床若射鳥獸冝有所向關隨身而轉王君内傳曰神人乗三雲之輦拾遺記曰周穆王馭黄金碧玉之輦從朝至暮而窮宇宙之内潘岳籍田賦曰天子御玉輦䕃華盖金銀照曜以炯晃龍驥騰驤而沛艾鄒陽上呉王書曰闘城不休救兵不至死者相隨輦車相屬轉象流輸千里不絶枚叔七發曰出輿入輦命曰蹷痿之機又云輦道斜交隄池紆曲曹子建公讌詩云輕輦隨風移劉公幹公讌詩云輦車飛素質從者盈路傍丘希範應詔詩云輕荑承玉輦細草籍龍騎漢草輦從上行太平御覽卷第七百七十四
