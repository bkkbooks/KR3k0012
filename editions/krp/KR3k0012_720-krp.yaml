body:
  text: 方術部一養生易曰天地之大德曰生傳曰君子有四時朝以聽政聽國政晝以訪問問可否夕以脩念念所施夜以安身於是節宣其氣宣散也勿使有所壅閉湫子小切底音止以露其體湫集也底滯也露羸也宣之則血氣集滯而躰嬴露兹心不爽而昏亂百度兹此也爽明也百度百事之節老子養生要訣曰一人之身一國之象􅎍臆之設猶宫室也支體之位猶郊境也骨節之分猶百川也腠七搆切理之間猶四衢也神猶君也血猶臣也氣猶民也故志人能理其身亦猶明君能治其國夫愛其民所以安其國愛其氣所以全其身民弊即國亡氣衰即身謝是以志人上士當施醫於未病之間不追修施於旣敗之後故知國難保而易䘮氣難清而易濁審機權可以安社稷制嗜慾可以保性命若能攝生者當先除六害然後可以延駐何名六害一曰薄名利二曰禁聲色三曰廉貨財四曰損滋味五曰屏虚妄六曰除疽妬六者若存則養生之道徒設耳盖未見其有益也雖心希妙理口念眞經咀才與切嚼英華呼吸景象不能𥙷其促矣誠者所以保和全眞當湏少思少念少笑少言少喜少怒少樂少愁少惡少好少事少機夫多思則神散多念則心勞多笑則臟腑上飜多言則氣海虚脫多喜則膀胱納客風多怒則腠理奔浮血多樂則心神邪蕩多愁則頭靣燋枯多好則氣智潰溢多惡則精爽奔騰多事則䈥脉乾急多機則智慮沉迷兹乃伐人之生甚於斤斧蝕人之性猛於犲狼無乆行無乆坐無乆立無乆卧無乆視無乆聽不飢強食則脾勞不渇強飲則胃脹體欲少勞食欲常少勞則勿過少勿令虚冬則朝勿虚夏則夜勿飽早起不在雞鳴前晚起不過日出後心内澄則眞人守其位氣内定則邪物去其身行欺詐則神悲行争競則神沮輕侮於人當減筭殺害於物必傷年行一善則䰟神歡搆一惡則魄神喜䰟神欲人生魄神欲人死常欲寛泰自居恬惔自守則神形安静災病不生仙録必書其名死籍必消其咎養生之理盡在此矣至於錬瓊丹而𥙷腦化金液以留神此上眞之妙道非食糓㗖血越分而修之萬人之中得者殊少深可誡焉莊子曰善養生若收羊視其後者而鞭之周威公曰何謂曰魯有單豹者巖居而谷飲不與民共利行年七十而猶有嬰兒之色不幸遇餓虎殺而食之有張毅者髙門懸薄無不走也行年四十而有内熱之病以死豹養其内而虎食其外毅養其外而病攻其内此二子者皆不鞭其後者夫守一方之事至於過理者不及於㑹通之適者鞭其後者去其不及耳又曰養形必先無物物有餘而形不養者有之矣有生必先無離形形離而生亡者有之矣其來不能却其去不能止也悲夫丗之人以爲養形足以存養形神清果不足以存生文子曰太上養神其次養形神清意平百節皆寕養生之本也肥肌膚充腹膓開嗜欲養生之末也淮南子同韓子曰神不注於外則身全身全之謂得得者得身也吕氏春秋曰凢生之長也順之也使生不順者欲也故聖人必先適欲適節也室大則多隂臺髙則多陽多隂則蹷多陽則痿蹷也逆寒疾也痿不能行此隂陽不適之患也是故先王不處大室不爲髙臺味不衆珎衣不燀之演切熱燀熱則理塞脉則閉結理塞則氣不逹味衆珎則胃充胃充則中大鞔音墜憊也中大鞔則氣不逹以此求長生其可得乎昔先聖王之爲苑囿園池也足以觀望勞形而己矣其爲宫室臺榭也足以辟燥備濕而巳矣其爲輿馬衣裘也足以逸身煖骸而巳矣其爲飲食􅋳音移醴也足以適味充虚而巳矣其爲聲色音樂也足以安性自娯而巳矣此五者之所以養性也非好儉而惡費也節于性也又曰天生隂陽寒暑燥濕四時之化萬物之變莫不爲利莫不爲害聖人察之以便生故精神安乎形而年壽長焉長也者非短而續之者也畢其數也畢數之務在去乎害何謂去害大甘大酸大苦大辛大醎五者充形則生害矣大喜大怒大憂大恐大哀五者接神則生害矣大寒大熱大燥大濕大風大霧六者動精則生害矣諸言大者皆謂過制故凢養生莫若知本知本則疾無由至矣又曰湯問伊尹曰欲取天下若何伊尹曰欲取天下天下可取身將先取身先爲天下所取也凢事之本必先治身嗇其大寳大寳身也用新弃其陳湊理遂通精氣日新邪氣盡去反其天年此之謂眞人昔先聖王成其身而天下成治其身而天下治故善響者不於響於聲善景者不於景於形爲天下者不於天下於身詩曰淑人君子其儀不忒其儀不忒正是四國言正諸身也故反道而身善矣行義而人善矣淮南子曰君子行正氣不行邪氣内便於性外合於義循理而動不繫於物而者正氣也推於滋味淫於聲色發於喜怒不頋後患者邪氣也邪與正相傷欲與性相害不可兩立一植一廢故聖人損欲而從事於性凡治身養性節寢處適飲食和喜怒便動静而邪氣自不生豈若憂瘕疪之興痤疽之廢而豫備之哉又曰今萬物之來擢抜吾性􅠡取吾精勢若泉原雖欲勿廪庸可得乎今夫樹木灌以潦水疇以肥壤十人養之一人拔之則必無餘蘖况以一國同伐之雖欲乆生豈可得哉今盆水在廷清之終日未能見眉睫濁之不過撓而不能察方貟人神易濁而難清猶盆水之類也又曰夫水之性清而沙土汩之人之性安而嗜慾亂之夫人之所受於性者耳目之於聲色也鼻口之於芳臭也肌膚之於寒煖也其情一也或通於神明或不免於癡狂者也其所以爲制者異也是故神者智之淵也神清則智明矣智心之府也智公則心平矣人莫鑒於洙泗而鑒於止水者以其静也莫窺於生鐵而窺於明鏡者以其易也夫惟易且静故能形物之情性由此觀之用者也是故虚室生白吉祥止焉又曰聖人不變其冝不易其常放准修䋲曲因其當夫喜怒者道之邪悲憂者德之失好憎者心之過嗜慾者性之累夫大怒破隂大喜墜陽薄氣發瘖驚怖爲狂憂悲多悉病乃成積好憎繁多禍乃相隨故心不憂樂德之至也性而不變静之至也嗜欲不載虚之至也無所愛憎平之至也不與物散粹之至也能此五者則通於神明通於神明者得其内者也抱朴子内篇曰夫太元之山難知易求不天不地不沉不浮絶險𬗟邈崔巍﨑嶇和氣烟煴神童並遊玉井泓窈灌漑延休百二十官曹府相由离坎列位玄芝萬株絳樹特生其實如珠金玉嵯峨醴泉出隅還年之土甘其清流于能修之松喬同儔此一山也長谷之山杳杳巍巍玄靈飄飄玉液霏霏金紫之房在乎其隈愚人競徃至皆歸有道至士登之不衰採服黃精以致天飛此二山也古賢之所祕子思之又曰凢養生者欲令多聞而貴要博見而擇善偏修一事不足必頼也又患好事之徒各伏其所長知玄素之術者則曰唯房中之術可以度丗矣明吐納之道者則曰唯行氣足以延壽矣知屈伸之法者則曰唯導引可以難老矣知草木之方者則曰唯竒藥可以無窮矣學道之不能成就由乎偏枯之若此也又曰余祖鴻臚少時嘗爲臨沇令云此縣有民家丗壽考或出百歳或八九十後徙去子孫轉多夭折他人居其故宅後亦累丗壽考由此乃覺是宅之所爲而不知何疑其井水殊赤乃試掘井左右得古人理丹砂數十斛去井數尺此丹沙汁因泉漸入井是以飲其水而得壽况乃錬丹沙而服之乎又曰人亦有不病者各有所制攝生食不欲飽眠不欲扇星下不卧里語曰人在人間日失一日如牽牛以詣屠所毎進一歩去死轉近也夫入九泉之下長夜罔極始爲螻蟻之粮終與塵埃合體令人怛然心熱求生之志何可不營新論曰曲陽侯王根迎方士西門君惠從其學養生却老之術君惠曰龜鶴稱三千歳以人之才何乃不如蟲鳥耶白虎通曰男子六十閉房户所以輔衰故重性命也㑹稽典録曰王充年漸七十乃作養生之書凢十六篇養氣自守閉明塞聦愛精自輔服藥道引庶幾獲道劉根别傳曰取七歳男齒女髮與已頸垢合燒服之一歳則不知老常爲之使老有少容也嵇康養生論曰養生有五難名利不滅此一難也喜怒不除此二難也聲色不去此三難也滋味不絶此四難也神慮精散此五難也五者必存雖心希難老口誦至言咀嚼英華呼吸太陽不能不夭其年也五者無於胷中則信順日深玄德日全不祈喜而自福不求壽而自延此飬生大理所歸也又曰夫爲稼於陽丗偏有一漑之功者雖終歸於樵爛必一漑者後枯然則一漑之益固不可誣也而丗常謂一怒不足以侵性一哀不足以傷身輕而肆之是猶不識一漑之益而望嘉榖於旱苗者也是以君子知形恃神以立神湏形以存悟生理之易失知一過之害生故脩性以保神安心以全身受憎不捿於情憂喜不留於心泊然無感而體氣和平又呼吸吐納服食養身使形神相親表裏俱濟也夫種田者一畝十斛謂之良田此天下通稱也不知區種可百餘斛田種一也至於樹養不同則功収相懸謂啇無十倍之價農無百斛之望此守常而不變者也且豆令人重榆令人瞑合歡蠲忿萱草忘憂愚智所知也薫辛害同豚魚不養丗所識也虱處頭而黒麝食栢而香頸處險而癭齒居晉而黄推此而言凢所食之氣蒸性染身莫不相應豈惟蒸之使重而無使輕害之使闇而無使明薫之使黄而無使堅芬之使香而無使延哉故神農曰上藥飬命中藥養性者誠知性命之理因輔養以通也而丗人不察唯五糓是嗜聲色是躭目惑玄黄耳務淫哇滋味煎其腑臓醴醪煑其膓胃香芳腐其骨髓喜怒悖其正氣思慮消其精神哀樂殃其平粹夫以蕞尔之軀攻之者非一途易竭之身而内外受敵身非木石其能乆乎神仙傳曰彭祖云養壽之道但莫傷之而巳夫冬温夏凉不失四時之和所以適身也美色淑姿安閑性樂不致思欲之感所以通神也車服威儀知足無求所以一志也八音五色以養視聽之懽所以導心也凢此皆以養壽而不能斟酌之者反以速患古之智人恐下才之子不識事冝流遁不還故絶其源故經有上士别牀中士異𬒳服藥百過不如獨卧色使目盲聲使耳聾味令口爽言若能節宣其冝適抑楊其通塞者不减年筭而得其益凢此之類譬猶水火可否失適反爲害耳人不知其經脉損傷血氣不足肉理空踈髓腦不實體巳先病故爲外物所犯因風寒酒色以發之耳若本充實豈有病乎凢逺思強徤傷人憂愁悲哀傷人喜樂過量傷人忿怒不解傷人汲汲所願傷人戚戚所患傷人寒煖失節傷人隂陽不交傷人人所傷者甚衆而獨責房室不亦惑哉男女相成猶天地相生也所以道養神氣使人不失其和天地得交接之道故無終竟之限人失交接之道故有殘折之期能避衆傷之事得隂陽之術則不死之道也天地晝離而夜合一歳三百六十交精氣和合者有四故能生育萬物不知窮極人能則之可以長存次則有服氣得其道則邪氣不能入治身之夲要也其餘歷藏導引之術及念體中萬神有含影中形之事不然干心志也人能愛精養體服氣錬神則萬神自守其不然者營衛枯疲萬神自逝非思念所留者也魏志曰呉普嘗問道於華佗佗謂普曰人體欲得勞動但不當使極耳如揺動則糓氣易消血脉通流病不得生譬猶户樞不蠧流水不腐以其常動故也是以仙者及漢時有士君舊爲導引之事熊經鵄頋引挽腰體動諸關節以求難老吾有一術名五禽之戯汝可行之一曰虎二曰鹿三曰熊四曰猨五曰鳥亦以除疾並利蹄足以當導引體中不快起作一禽之戯普施行之遂年九十餘博物志曰魏武帝問封君逹養生之術君逹曰體欲常勞食欲常少勞無過虚省肥濃節醎酸减思慮損喜怒除馳逐愼房室春夏施冩秋冬閑藏武帝行之有効髙湛養生論曰王叔和髙平人也博好經方洞識攝生之道嘗謂人曰食不欲雜雜則或有所犯當時或無災患積乆爲人作疾㝷常飲食每令得所多飡今人彭亨短氣或致暴疾夏至秋分少食肥膩餅臛之屬此物與酒食瓜果相妨當時不必習病入秋節變陽消隂息寒氣惣至多諸暴卒良由渉夏取冷大過飲食不節故也而不逹者皆以病至之日便謂是受病之始而不知其所由來者漸矣豈不惑哉養生要曰起東向坐以兩手相摩令熱以手摩額上至頂上滿二九止名曰存泥丸又清旦𥘉起以兩手人兩耳極上下之二七止令人不聾次縮鼻閉氣右手從頭上引左耳二七止次引兩髮鬢舉之令人血氣流通頭不白又摩手令熱以摩身體從上至下名乾浴令人勝風寒時氣寒熱頭痛百病皆除莊子曰吹喣呼吸吐故納新熊經鳥伸爲壽而巳矣此道引之士養形之人也彭祖壽考者之所好也養生要伏氣經曰道者氣也寳氣得道長存神者精也寳精則神明長生精者血脉之川流守骨之靈神精去則骨枯骨枯則死矣是以爲道者務寳其精從夜半至日中爲生氣時正僵仆瞑目握固掘固者如嬰兒之捲手閉氣不息於心中數至二百乃口吐氣出之曰増息如此身神具五藏安能閉氣數至二百五十華蓋明華蓋眉也耳目聦舉無病邪不入寳氣一名日行氣一名長息其法正僵仆徐潄澧泉豊泉唾也而咽之因行氣口但吐氣鼻但内氣徐縮引之莫大極滿者難還入五息巳一息自可吐也一息數之至九十息頻伸訖復爲之滿四九三百六十息爲一竟咽之乃鼻内氣也不尓或令欬凡内氣上外吐氣則氣不流自覺周身也抱朴子曰城陽郄儉少時行獵墮空塚中飢餓見塚中先有大龜數數廻轉所向無常張口吞氣或俛或仰儉素亦聞龜能導引乃試隨龜所爲遂不復飢百餘日後人有偶窺塚中見儉而出之後竟能咽氣斷榖魏王拘置土室中閑試之一年不食顔色恱澤氣力自若又曰尔乃咀吸寳華谷神太清外珎五耀内守九精修養雜訣曰老子云玄北之門是謂天地根綿綿若存用之不勤言口鼻也天地之門以吐納隂陽生死之氣毎至旦靣向午展兩手於膝之上徐按捺百節口吐濁氣鼻引清氣所以吐故納新是蹙氣良乆徐徐吐之仍以左右手上下前後柘取氣之時意想太和元氣下入毛際流於五臟四支皆受其潤如山納雲如地受澤若氣通則竟腹中咽咽轉動若得十通即竟身體潤澤而色光渙耳目聦明飲食有味氣力倍加諸疾去矣守九精法言曰生氣時牀鋪厚軟枕與身平仰卧展脚握固去身四五寸兩手亦去身四五寸微微鼻引大陽清氣入意送此氣遍身體即閉氣至極然後細從口吐之勿令耳聞吐氣之聲也著生論曰大凢著生先調元氣身有四氣人多不明四氣之中各主生死一日乾元之氣化爲精精反爲氣精者連於神精益則神明精固則神暢神暢則生徤若精散則神疲精竭則神去神去則死二曰坤元之氣化爲血血復爲氣氣血者通於内血壯則體豐血固則顔盛顔盛則生合若血衰即髮變血敗則腦空腦空則死三曰庻氣庻氣者二元交氣氣化爲津津復爲氣氣運於生生託於氣隂陽動息滋潤形骸氣通即生氣乏則死四曰衆氣衆氣者榖氣也榖濟於生終誤於命食榖味雖生藴榖氣還死精能附血氣能附生常使循環即身永固乾元之陽陽居隂位臍下氣海是也坤元之隂隂居陽位腦中血海是也生者屬陽陽貫五臟喘息之氣是也死者屬隂隂納五味穢惡之氣是也氣海之氣以壯精神以填骨髓血海之氣以𥙷肌膚以流血脉喘息之氣以通六腑以扶四支穢惡之氣以亂身神以腐五臓修養雜訣氣銘曰一氣未分三才同源清濁旣異元精各存天法象我我法象天我命在我不在於天昧用者夭善用者延性和者寂守一神閑靈芝在身不在於山返一守和理合玄玄精極乃明神極乃靈氣極乃精無精氣乃冥因氣而衰因氣而榮因氣而死因氣而生喜怒亂氣性情交争擁構成患神形豈寕錬陽銷隂其氣自行以正遣邪其患自平乾坤澄浄子後午前閉目平坐握固冥然納息盧中吐息天關入息微微岀息綿綿以意引氣臓腑廻旋然後呵之榮衛通宣但有不和遣之踵前五呵六呵無疾不蠲凢欲胎息導引爲先經脉不擁關節不煩或如射雕側身彎環或舉腰膝如蟾半圎交枝腦後左旋右旋勁展兩足氣岀指端擺掣四肢捉搦三關熟摩尺澤氣海亦然叩齒集神合䏬固關寘心亡形任意徃還覽氣調匀擁塞喉間擁氣則咽三咽相連轉舌漱入咽下丹田以意送之令聲泊然一咽三咽再咽如前三十六咽胎息成焉大道無爲爲於無爲不爲無爲莫若無爲不思爲思莫若無思萬法自然不假施爲不寒不熱不渇不飢淡無爲以道自怡妙中之妙微中之微懷道君子銘之佩之太平御覽卷第七百二十
