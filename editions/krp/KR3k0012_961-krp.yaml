front:
  text: 太平御覽卷第九百六十一
  hash: sha256:bced0db71462d617cf42ee0802003601d4d56824e870915bbf85096ee9c388c4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_961-1a}
body:
  text: 木部十交譲建木若木姑繇丹木􅕴靈椿附迷糓帝休雒常返魂如何仙樹棆机木鹿椵椋橝繫彌杭梁乙木求郍衛男青㝷木玉樹踈麻樠瑯玕盧頭櫰桬棠䡤音諸帝屋六駮􅃮槲樺柟石南婆郍娑枹牧婆羅青田都念娑羅兒樹酒樹陳勾鳥文比閭制木交讓大魏諸州記曰益州汶山郡平康縣界東北接牂牁有都安縣有交讓樹兩兩相對歳更㸦枯㸦生不俱盛左思蜀都賦曰交讓所植建木山海經曰有木若牛引之有皮若纓黄蛇其實若欒其木若區名曰建木在弱水上青葉紫莖玄華赤實百仞無枝上有九欘渉玉切下有九衢黄帝所爲欘曲也爲治護之也淮南子曰建木在廣都衆帝所自上下日中無影呼而無響盖天之中廣都方都南山也若木山海經曰灰野之山有樹青葉名曰若木郭璞注曰生崑崙西隅其華光赤照下地也楚詞曰羲和之未陽若華何光羲和日卿也言日未陽升之時若木能有赤明之光華又曰折若木以拂日姑繇穆天子傳曰天子釣于河以觀姑繇之木丹木山海經曰崦嵫山有丹木葉如榖其實大如瓜赤跗而黒理食之巳癉可以禦火又曰密山上多丹木圎葉而赤莖黄華實如飴食之不飢玉膏灌丹木丹木五歳五色乃清言光明也五味乃馨蓂靈列子曰荆之南有蓂靈者以五百歳爲春以八千歳爲秋椿左傳曰襄公十八年諸侯伐齊孟莊子斬雍門之椿或作槆爲公琴莊子曰上古有大椿以八千歳爲春秋曹毗魏都賦曰檉栢振露緑椿停霜迷榖山海經曰招揺之山有木焉其狀如榖而黒理其花四照其名迷榖佩之不迷帝休山海經曰少室之山有木名帝休其枝葉大如楊而五衢黄華黒實服之不恐雒常山海經曰肅慎之國有樹名雒常聖人代立於此取衣郭璞曰其俗無衣聖帝代立則此木皮可衣也返魂十洲記曰聚窟洲在西海中申未地上有大樹與楓木相似而華葉香聞數百里名爲返魂樹叩其樹樹亦能自聲聲如牛吼聞之者皆心振神駭伐其根心於玉釡中煑取汁微火熟煎之令可丸名曰驚精香或名震靈丸或名反生香或名人鳥精或名却死香斯靈物也香氣聞數百里死屍在地聞氣仍活如何神異經曰南方荒中如何之樹三百歳作華九百歳作實有核形如棗子長五尺金刀割之則飴非則辛食之得地仙顧凱之啓蒙記曰如何隨刀而改味仙樹西河舊事曰連山有仙樹人行山中飢渴者輙得之可飽不得持去平居時亦不得見棆音倫爾雅曰棆無疪也郭璞曰楩屬似豫章也机山海經曰單狐之山其木多机郭璞曰音飢也木鹿荆州土地記曰武陵城内社中木鹿樹及南岸二木鹿樹光武所種椵說文曰椵木可作伏机椋音良爾雅曰椋即來椋有髓熊折而乳之又曰今椋材中車輞橝音覃廣志曰橝樹葉似蘇繫彌毛詩義䟽曰繫迷一名契似檀廣志曰繫迷樹子赤如糯粟可食杭梁異物志曰有木洪直厥名杭梁乙木徐衷南方記曰乙樹葉檮之和繻葉汁煑之再沸味辛曝乾可投魚羹中求郍衛羅浮山記曰求郍衛外國樹英華紅粉至可愛翫男青羅浮山記曰男青條蘂之屬莫不朱色尤昜植立折挿土中因便開榮㝷木山海經曰㝷木長十里生河邊玉樹山海經曰開明北有文玉樹五彩括地圖曰崑崙墟北有玉樹丗說曰謝安甞謂子姪曰汝等何豫人事諸子莫言玄荅曰謦如芝蘭玉樹欲生庭堦耳唐書曰雲陽縣界多漢離宫故地有似槐而葉細士人謂之玉樹楊子雲甘泉賦云玉樹青䓗後左思以雄爲假稱珎怪也踈麻南越志曰踈麻大二圍髙數丈四時結實無衰落騷人所謂折踈麻兮瑶華樠音謾山海經曰樠樹生蜀中七八月吐穗成有塩梅粉可以酢羮瑯玕山海經曰崑崙山有瑯玕樹盧頭南越志曰南海江岸間有盧頭木葉如甘蔗織以爲帆以其踈暢懷風故㠶不以布櫰山海經曰中曲山有櫰音瓌木如棠而圎葉赤實如木瓜食之多力桬棠山海經曰桬棠木岀崑崙山黄色赤實味如李食之使不溺䡤音諸山海經曰前山其木多䡤似柞子可食冬夏恒青作柱難腐帝屋山海經曰講山有木名帝屋葉如椒反陽赤實反陽刺不勾也可以禦凶六駮陸機毛詩䟽義曰六駮馬梓其樹皮青白駮犖遥視似馬故謂之駮馬下章云山有苞棣隰有樹檖皆山隰木相配不冝謂獸崔豹古今注曰六駮山中有木葉似豫章皮多癬駮名六駮木􅃮淮南子曰䖟散積血斵木愈齲駈主切此類之推者也推行膏之殺鱉鵲矢中蝟中亦殺矣爛灰生蠅爛腐􅃮見蟹而不乾又曰染者先青而後黒則可先黒而後青則不可工人下􅃮而上丹則可下丹而上􅃮則不可萬事由此也所先後上下不可不審也崔豹古今注曰􅃮樹以剛斧其皮關以竹管承之汁滴則成也槲齊書曰樂預爲永丗令人懷其德卒官時有一媪年可六七十檐槲蔌葉造市貨之聞預卒人泣弃溪中曰失樂令我軰孤獨老姥故應就死尓市人皆泣其惠化如此三國典略曰齊斛律光之入寇也周將韋孝寛忌之孝寛叅軍曲巖頗知卜筮謂孝寛曰來年東朝必大相殺孝寛因令巖作謡言曰百升飛上天明月耀長安又曰髙山不推自崩槲樹不扶自竪乃間諜遺其文於鄴中齊人用是而殺斛律光明月光字也隋書曰倭國草木冬青土地膏腴水多陸少以小環挂鸕鷀項令入水捕魚得百餘頭俗無盤爼藉以槲葉食用手餔之性質直有雅風唐書曰萬歳登封元年春封嵩山御朝覲壇受朝賀登封壇南有槲樹大赦日於其杪置金鷄改名爲金鷄樹樺隋書曰鉢室韋衣胡布山而住人衆多比室韋不知爲幾部落用樺皮蓋屋杜寳大業拾遺録曰二年汾州起汾陽宫宫南外平林率是大樺木髙百餘尺行從文武皆剥取皮覆菴舎柟陸機毛詩䟽義曰梅柟其樹及葉似豫樟葉大如牛耳一頭尖其華赤黄子不可食柟木細理於豫樟無子赤者材堅白者脆荆州人曰梅多江南及魏興新城上庸蜀皆多樟柟三國典略曰𥘉陳文帝以湘州出杉柟使營造大艦金翅等二百許艘并諸水戰之具石南魏王花木志曰南方記石南樹野生二月花仍連着實實如鷰子八月熟民採之取核乾取皮皮作魚羮和之尤羙出九真任昉述異記曰曲阜古城有顔回墓墓上石楠二株可三四十圍土人云顔回手植之木婆郍娑隋書曰真臘國土俗與日南九真相類異者有婆郍娑樹無花葉似冬瓜菴羅樹花葉似棗實似李毗野樹花似木瓜葉似杏實似楮婆田羅樹花葉實並似棗而小異歌畢他樹花似李葉似榆而厚大實似李其大如升自餘多同九眞枹音嶺表録異曰枹木産江溪中葉細如檜身堅類栢唯根軟不勝刀鋸今潮循人多用其根刳而爲履當木濕時刻削易如割瓜木乾之後柔刀不可理也或油畫或􅃮其輕如通草暑月着之隔卑濕地氣力如杉木今廣州賔從諸郡牧守𥘉到任皆有油畫枹木履也牧婆羅南夷志曰南詔多牧婆羅樹子破其殻中白如柳絮紉爲絲織爲方幅裁之爲籠叚男子婦人通服之驃國弥臣諾亦皆披婆羅籠叚青田崔豹古今注曰鳥務國有青田核莫測其樹之形實至中國者得其核取將漬水則成酒其味淳羙核大如五六升瓠空之以盛水俄而成酒味劉璋時得兩核集賔客設之常供二十人飲之一核所盛方盡一核所盛者得中飲盡隨便注水隨成即飲不可乆置乆置則苦不堪飲名曰青田壷亦曰青田酒都念杜寳大業拾遺録曰十二年四月南海郡送都念子樹一百株勑付西苑十六院内種此樹髙一丈許葉如白楊枝柯長細花心金色花葉正赤似蜀葵而大其子小於柿子甘酸至羙蜜漬爲粽益佳嶺表録異曰倒捻子窠叢不大葉如苦李花似蜀葵小而深紫南中婦女得以染色有子如軟柿頭上有四葉如柿蔕食者必捻其蔕故謂之倒捻子或呼爲都念子蓋語訛也其子外紫肉赤無核食之甜軟甚暖腹藏兼益肌肉娑羅魏王花木志曰娑羅樹緗葉子似椒味如羅勒嶺北人呼爲大娑羅盛弘之荆州記曰巴陵縣僧寺牀下忽生一木不旬日勢凌軒棟道人移居避之木即長遟但極晚香有西域僧見之曰娑羅樹也彼僧所憇之䕃常著花至元嘉十一年忽生一花狀如芙蓉兒樹唐書曰波斯於西海中見一方石上有樹幹赤葉靑樹上惣生小兒長六七寸見人皆笑動其手脚頭著樹枝其使摘取一枝小兒便死今在大食王處酒樹梁書曰南方頓遜國有酒樹似安石榴取花汁停盃中數日成酒美而醉人博物志曰酒出无遜國都勾劉欣期交州記曰都勾樹木中出屑如麵可啖魏王花木志曰交州記都勾似栟櫚木中出屑如麵可取爲餌食如桄榔烏文崔豹古今注曰烏文木岀波斯國毎舶上將來就中烏文爛然中國亦有出温括婺等州北閭汲冢周書王㑹曰白洲北閭者其華若羽伐其木以爲車終行不敗白洲東南蛮與白民接也水中可居白洲洲中出此珎木制木崔豹古今注曰制木湖州最多有子如栗木有白皮波斯國來者皆去其皮人多不别太平御覽卷第九百六十一
