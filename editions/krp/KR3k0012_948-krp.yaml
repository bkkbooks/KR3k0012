front:
  text: 太平御覽卷第九百四十八蟲豸部五
  hash: sha256:e074b5fd7bd1d8dc44a668f149b4ba88d9cc6b571e24a95485b1a9d3d08b7db2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_948-1a}
body:
  text: 蜘蛛縊女馬蚿蝔竹蟲蓼蟲蠐螬螻蛄尺蠖蜘蛛焦贑易林未濟之蠱曰蜘蛛作網以司行旅青蠅嚵噉以求膏腴又井之遯曰蜘蛛南北廵行罔罟杜季利兵傷我心膂毛詩豳七月東山曰蠨蛸在户蠨蛸長踦也詩義䟽曰一名長脚荆州河内謂之喜子云此蟲來着人當有親客至亦如蜘蛛爲罔羅居之詩義問曰蠨蛸長足蜘蛛也劉芳毛詩義筌曰蠨蛸長䗁音﨑㠊之䗁小蜘蛛長脚者俗呼爲喜子爾雅曰次蟗音秋䵹鼄䵹鼄鼄蝥音矛土䵹鼄布地中布罔草䵹鼄絡幕草間蠨蛸長踦音䗁小蜘蛛長脚者俗呼為喜子張揖廣雅曰蛛蝥罔工蠾毒蜍也魏志曰館陶令諸葛原遷新與太守管輅徃祖餞之賔客並㑹原自起取燕卵蜂巢蜘蛛着器中使射覆卦成輅曰第三物觳觫長足吐絲成羅㝷網求食利在昏夜此蜘蛛也舉坐驚喜抱朴子曰太昊師蜘蛛而結網又曰或以赤班蜘蛛及七種水馬以合馮夷水仙丸服之亦可以居水中又以塗足下則可以歩行水上也符子曰晉公子重耳奔齊與五臣而遊乎大澤之中見蜘蛛布其網曳其網而執豸以食之公子重耳觀之顧謂其臣咎犯曰此蟲也智之薄者矣而猶役其智曵其網而執豸以食之况乎人之有智而不能廓垂天之網布絡地之網以供方丈之御是曽不如蜘蛛之智孰可謂之人乎咎犯曰公子愼勿言也終行之則有邦有嗣矣金樓子曰楚國龔舎𥘉隨楚王朝宿未央宫見蜘蛛焉有赤蜘蛛大如栗四面縈羅網有蟲觸之而死者退而不能得出焉舎乃歎曰吾生亦如是耳仕官者人之網羅也豈可淹歲於是挂冠而退時人笑之謂舎為蜘蛛之隱楊雄方言曰䵹鼄郭璞曰知蛛兩音朱蝥也者無自關而西秦晉之間謂之鼄蝥今江東呼蝃蝥音掇自關而東趙魏之郊謂之䵹鼄或謂之蠾蝓燭臾兩音蠾蝓者侏儒語之轉北燕朝鮮冽水之間謂之毒蛇齊人又呼爲杜公亦言罔工音毒束哲發蒙記曰蠅生積灰蜂出蜘蛛腐木爲螢火蠐螬出朽芻皇甫謐帝王丗紀曰湯出見羅者湯下車命解其三面而置其一面更教之祝曰昔蛛蝥作罔今人學結欲左者左欲右者右欲髙者髙欲下者下吾取其犯命者郭璞洞林曰流移道路諸人並欲令郭璞射覆人人自持五月五日蜘蛛者物悉驗遂不復射淮南萬畢術曰蜘蛛塗布而雨自晞取蜘蛛置甕中食以膏百日煞以塗布而雨不能濡也又曰取蜘蛛與水狗及猪肪置甕中密以新縑仍懸室後百日視之蜘蛛肥殺之以塗足渉水不没矣又一法取蜘蛛二七枚内甕中合肪百日以塗足得行水上故曰蜘蛛塗足不用橋梁王充論衡曰觀夫蜘蛛之絲以罔飛虫也人之用詐安過之郭義恭廣志曰草蜘蛛在草上色青土䵹鼄在地上春行草間索索履地西京雜記曰樊噲問陸賈曰古帝王人君皆云受命於天云有瑞應豈然乎賈曰有之夫目瞷得酒食火花得錢財乾鵲噪行人至蜘蛛集百事喜小故猶徴大亦冝然故目􅽋則呪之乾鵲噪則餧之蜘蛛集則放之况天下大寳人君重位非天命何以得之劉敬叔異苑曰陳郡殷家飬子名琅與一婢結好經年婢死後猶徃來不絶後夕見大蜘蛛形如斗拌縁牀就琅便宴爾怡恱毋取而殺之琅性理遂僻劉義慶幽明録曰某郡張甲者與司徒蔡謨有親僑住謨家暫行數宿過期不反謨晝眠夢甲云暫行忽暴病患心腹病痛脹滿不得吐下某時死主人殯殮謨悲涕相對又云我病名乾霍亂自可治之但人莫知其藥故令死耳謨曰何以治之甲曰取蜘蛛生斷去脚吞之則愈謨覺使人徃甲行所驗之果死問主人病時日皆與夢符後有乾霍亂者試用輙差廣五行記曰蜘蛛集於軍中及人家有喜事夢書曰䵹鼄爲大腹其性然也夢見蜘蛛憂懷任婦人也葛洪治瘧方曰取蜘蛛一枚着飯中吞即愈成公綏蜘蛛賦曰獨髙懸以浮處遂設罔於四隅南連大廡北接華堂左慿廣厦右依髙廊吐絲屬緒目引結䌉纎羅絡漠綺錯交張雲舉霧綴以待無方張望蜘蛛賦曰余嘯詠蓬蘆遨歩丘園覽蜘蛛之爲蟲焉乗虚運巧構不假物欲足性命蕭然靖逸良可翫也伊蜘蛛之爲蟲縱微性乎天壤禀妙造於化靈忽無礙而無想吐自然之纎緒先皇羲而結網慿輕羅以隱顯應大明之幽朗縊女爾雅曰蜆縊女也孫炎曰小黑蟲赤頭三輔謂之縊女此蟲多民多縊死郭璞注曰喜自經死故曰縊女異苑曰縊女蟲也一名蜆長寸許頭赤身黑恒吐絲自懸昔齊東郭姜旣亂崔杼之室慶封殺其二子姜亦自經俗傳此婦骸化而爲蟲故以縊女爲名馬蚿音賢爾雅曰蛝音閑馬踐仕板切也郭璞曰馬蠲虳也俗呼馬􅢡虳音均張揖廣雅曰蛆子魚切蟝強魚切馬􅢡音逐馬􅢡馬蚿也宋書曰王素聲譽甚髙山中有蚿其聲清長聽之使人不厭而其形甚醜素乃爲蚿賦以自况魯仲連子曰諺云百足蟲三斷不蹶者持之者衆文子曰善用人者若蚿之足衆不相害淮南子同荘子曰䕫憐蚿蚿憐蛇夔謂蚿曰吾以一足􅽃士今切踔敕卓切而行予無如矣今子使萬足獨柰何蚿曰不然子不見夫唾乎噴則大者如珠小者如露今子動吾天機不知所以然司馬彪曰比蒹謂蚿爲且渠也淮南子曰季夏草爲硏草得隂而死極隂中反陽故化爲蚈蚈馬蠸也蠸音權又曰良将之卒若虎之牙若兕之角若鳥之羽若蚈音牽之足蚈馬蠸也又曰蚈足衆走不及蛇物固有小不如大也明堂月令曰腐草爲蠲揚雄方言曰北燕馬蚿謂之蛆蟝張茂先博物志曰馬蚿一名百足中斷則頭尾各異行而去夲草經曰馬陸一名百足呉氏本草經曰一名馬軸蝔淮南子曰蝔知将雨高誘曰蝔蟲也大如筆管長三寸餘蝔音皆竹蟲淮南萬畢術曰竹蟲飲人自言其誠竹蟲三枚竹黄十枚治之欲得人情取藥如大豆燒酒中飲之不令醉以問其事必得其實也蓼蟲孔藂蓼蟲賦曰覩兹茂蓼紛葩吐榮爰有蠕而凖切蟲厥狀似螟羣聚其間食之以生悟物託事以况乎人㓜長斯蓼莫知其辛蠐螬毛詩碩人曰膚如凝脂領如蝤蠐蝤蠐蝎蟲也陸機毛詩䟽義曰蠐螬生糞中爾雅曰蟦音汾蠐螬也郭璞注曰在糞土中者蝤蠐蝎在木中有也今雖通名之爲蝎所在異也莊子曰烏足根爲蠐螬司馬彪曰烏足草名生水邊曹齊曹也淮南萬畢術曰黍成蠐螬以秋冬穫黍置溝中即生蠐螬也王充論衡曰蠐螬化爲復育復育轉爲蟬楊雄方言曰蠀螬謂之蟦蜚翠自關而東謂之蝤蠀酋酋兩音或謂之卷屬書卷或謂之蝖􅕪亦呼堂齊或呼地蝅宣斛兩音梁益之間謂之蛒音格或謂之蝎或謂之蛭音質蛒秦晉之間或謂蠧或謂之天螻按爾雅曰􅕪天螻謂蛞螻耳而方言以爲蝎未詳其義也說其乃祖非罪繫獄時有螻蛄蟲行其左右謂曰爾有神當活我因投飯與之食盡復來形稍大數日形如豚及當刑螻蛄夜掘壁爲孔以出故龐氏常祠螻蛄葛洪治箭鈎在咽喉不出方曰用螻蛄腦塗之即出范注治不得小便方曰取螻蛄大者二枚斷取體下以一升水漬之去皮飲之湏臾便通本草經曰䗜蛄一名天螻一名􅥿産難出刺在肉中潰癰腫下哽咽解毒愈惡瘡陶洪景夲草經曰螻蛄味鹹寒取自出者其自腰以前甚澁主大小便尺蠖周易下繫辭曰尺蠖之屈以求伸也龍虵之蟄以存身也爾雅曰蠖蚗蠖今蝍􅠸也晏子春秋曰弦章謂景公曰尺蠖食黃即身黄食蒼即身蒼說文曰尺蠖曲信蟲信音申方言曰蠀音資􅠸子六切謂之尺蠖郭璞曰歩屈也曹子建長歌行曰尺蠖知屈申體道識窮逹傅休弈潜通賦曰蠖屈體以求伸兮龍階木而升雲鮑明逺尺蠖賦曰智哉尺蠖觀機而作申非向厚詘非今薄静值泉渟機躁遇風驚起軒軀而曠莽伏累氣而併形冰炭弗觸韋刃靡迕逢嶮䠞跡值夷舒歩忌好退之見猜哀必進之爲蠧毎驤首以瞰塗常景行而翻路故身不豫托地無前期從方而應何慮何思是以軍筭慕其權國容擬其變高賢圖之隱淪智士以之藏見咲蛇靈之乆蟄羞龍德之方戰郭璞尺蠖譛曰貴有可賤賤有不珎嗟兹尺蠖體此屈申論配龍虵見歎聖人張恊七命曰鷦飛而生風尺蠖動而成響太平御覽卷第九百四十八
