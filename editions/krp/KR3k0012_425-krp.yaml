front:
  text: 太平御覽卷第四百二十五
  hash: sha256:d4b4e181255c05c1af724de0414fded68ff715759d17e2238c25950adc235f5d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_425-1a}
body:
  text: 人事部六十六清廉上釋名曰清青也去濁逺穢色如青也廉歛也自檢歛也左傳襄元曰季文子卒宰庀家噐爲葬具無衣帛之妾無食粟之馬無藏金玉無重噐備噐備謂珎寳甲兵之物君子是以知季文子之忠於公室也相三君矣而無私積可不謂忠乎又襄二曰宋人或得玉獻諸子罕子罕弗受獻玉者曰以示玉人玉人以爲寳也故敢獻之子罕曰我以不貪爲寳爾以玉爲寳若以與我皆喪寳也不若人有其寳又襄五曰與晏子邶殿其鄙六十弗受子尾曰富人之所欲也何獨弗欲對曰慶氏之邑足欲故亡吾邑不足欲也益之以邶殿乃足欲足欲亡無日矣耳夫富如布帛之有幅焉爲之制度使無遷也謂之幅利利過則爲敗吾不敢貪多所謂幅也與子雅邑辭多受少漢書曰琅瑘邴漢以清行徴爲京兆尹漢遂歸老於郷里漢兄子曼容亦飬老自脩爲官不肯過六百石輙自免去其名過出於漢又曰盖寛饒身爲司隷子常歩行自戍北邊蘇林日子自行戍不敢伐也公廉如此又曰趙禹以佐吏𥙷中都官用廉爲令史事太尉周亞夫爲丞相史府中皆稱其廉平然亞夫弗任曰極知禹無害然文深禹持文法深刻續漢書曰第五倫字伯魚京兆長陵人倫脩行清白甞召見上曰聞卿爲吏不過從弟兄飯寧有之耶倫對曰臣生遭飢饉米石萬錢不敢妄過人飯又曰袁彭字伯楚祖父安歴廣漢南陽太守順帝𥘉爲光禄勲行至清爲吏麤𫀆糲食終於議郎東觀漢記曰司空宋弘甞受俸得鹽令諸生糶諸生以賤不糶弘怒悉賤糶不與民爭利又曰孔奮字君魚右扶風人守姑臧長供飬至謹老母極膳妻子但食葱菜或啁奮曰置脂膏中不能自潤而奮不改又曰楊震字伯起弘農人性公廉不受私謁子孫常𬞞食歩行故舊長者或欲令爲開産業震不肯曰使後丗稱爲清白吏子孫以此遺之不亦厚乎爲東萊太守道經昌邑邑令王密故所舉茂才夜懷金十斤以遺震震曰故人知君君不知故人何也密曰夜無知者震曰天知神知何謂無知范曄後漢書日天知神知卿知我知也又曰閔仲叔客居安邑老病家貧不能買肉日買一片猪肝屠者或不肯爲斷安邑令候之問諸子何飯對曰但食猪肝屠或不肯予令出勑市吏後買輙得仲叔恠問其子道狀乃嘆曰閔仲叔豈以口腹累安邑耶遂去之又曰梁鴻少孤常獨止不與人同食比舎先炊巳呼鴻及熱釡炊鴻曰童子鴻不因人熱者也滅竈更然火又曰廉范年十五至蜀迎祖母喪及到葭萌舩没幾死太守張穆持筒中布數篋與范范曰石生堅蘭生香前後相違不忍行也遂不受又曰魯恭弟正耽思閉門講誦兄弟雙髙太尉趙喜嵗時遺子送米肉辭讓不受謝爲後漢書曰黄向字文章爲性廉㓗常歩行於路中得金璣一囊可直二百餘萬募求得其主還之又曰范丹姉病往看之姉設食丹以姉壻不德出門留二百錢姉使人追索還之丹不得巳受之聞里中芻藁僮僕更相怒曰言汝清髙豈范史雲軰而云不盗我菜乎丹聞之曰吾之微志乃在僮竪之口不可不勉遂投錢去又曰羊茂字季寳豫章人爲東郡太守冬坐白羊皮夏處丹板榻常食乾飯出界買鹽鼓又曰巴祗字敬祖爲楊州刺史在官不迎妻子暗坐不然官燭又曰左雄字伯豪爲兾州刺史不舉烟火常食乾飯又曰羊續字興祖泰山人爲廬江太守卧一幅布綯穿敗糊𥿄以𥙷綯爲南陽太守𥘉之郡府丞甞獻其生魚續受而懸之於庭丞後又進之續乃出所懸者以杜其意又曰徐稚字孺子豫章南昌人也少爲諸生隱處篤行常身躬耕非其衣不服非其食不食糠粃不厭所居閭里服其德化又曰河南陶碩郷曲餉之碩無所受但食棗飲水而巳袁山松後漢書曰范丹字史雲外黃人爲縣吏年十八弃衣物道邊家以爲死遂西入關學爲萊蕪長去官於市賣卜妻紡績以自給辟公府歩行無𬒳囊自隨常使兒桾麥得五斛郷人遺之一斛屬兒曰莫令尊君知兒歸不敢不道丹即令并送六斛言麥巳雜遂不取丹弟子愷見丹藩不完載柴將藩之時丹適行還怒勑子拔柴載還之閭里歌之曰甑中生塵范史雲釡中生魚范萊蕪自以性急毎爲吏常佩韋范曄後漢書曰張禹字伯逹性篤厚父歆卒於汲令使人贈送前後數百萬悉無所受又曰檀敷宇文有山陽瑕丘人少爲諸生貧而志清不受郷里施惠又曰鄭均字仲虞東平人少好黄老書兄爲縣吏頗受禮遺均數諌止不聽即脫身爲傭餘得錢帛歸以與兄曰物盡可復得爲吏坐贓身捐弃兄感其言遂爲廉㓗典略曰程竪字謀甫南陽武隂人仁孝清㓗居貧無資磨鏡自給不受人施諸嫗共漂更相呼食或不食者相謂曰汝非程謀甫何爲不食人食魏略曰沭並字德信河間人少孤苦袁紹父子時始爲吏名有志介甞過姉姉爲殺鷄炊黍而不留爲三府長吏時呉使朱然諸葛瑾攻圍樊城遣舩兵於峴山東斫材兵人作食有先熟者呼後熟者荅言不也呼者曰汝欲作沐德信耶其名流布播於異域如此又曰舊故西征有官厨財藉遷轉之際無不因縁而趙儼又手上車發到㶚上忘持其常所服藥雍州聞之乃追送雜藥朴數箱儼笑曰人言語殊不易我偶問所服耳何用是爲遂不取魏志曰盧欽著書稱徐邈曰徐公志髙行㓗才博氣猛其施之也髙而不狷㓗而不介博而守約猛而能寛聖人以清爲難而徐公之所易也或問欽徐公當武帝之時人以爲通向在凉州及還京師人以爲介何也欽荅曰往者毛孝先崔季珪用事貴清㓗之士時皆變易車服以求名髙而徐公不改其常故以爲通比來天下奢靡轉相放効而徐公雅尚自若不與丗同故前日之通乃今日之介是丗人無常而徐公有常也又曰景𥘉二年以滿寵年老徴還爲太尉寵不治産業家無餘財詔曰君典兵在外專心憂國有行父祭遵之風賜田十頃榖五百斛錢二十萬以明清忠儉約之節又曰胡質爲荆州刺史薨家無餘財唯有賜衣書篋而巳王隱晉書曰魏舒爲尚書三娶妻皆亡自表求還夲郡葬上曰魏舒清貧不營財産頓舉衆喪必無以自供其賜葬地一頃錢五十萬鄧粲晉記曰王敦籍周顗家笥簏中有故絮故播酒五甕米數斛在位者服其清晉陽秋曰胡威字伯虎少有志尚清白歴位宰牧武帝賜見嘆其父清因謂威曰卿清孰與父清威對曰臣不如也帝曰以何爲不如對曰臣父清恐人知臣清恐人不知是臣不如逺矣晉中興書曰劉驎之字子驥志在逸遁居于岐陽凡人致贈一無所受又曰龔玄之字道玄潜處未曽至公門有致餉一無所受又曰翟湯字道淵㝷陽人篤行純素始安太守于寳與湯通家遣舩餉之勑吏翟公廉讓卿致書記便委舩還湯無人送致乃更貨易絹物因寄還寳寳夲以惠而反煩之益愧嘆焉徐廣晉記曰中宗令曰太常賀循氷清玉㓗行爲俗表孤曽造其廬屋室服物周身而巳賜牀褥錢二十萬崔鴻前凉録曰汜勝字無忌燉煌人舉孝廉除郎中天下亂去官還郷里太守張閟造之閉門不見禮遺一無所受北齊書曰辛術字懷哲隴西人爲淮南經畧所部郡守犯大辟朝廷以其奴婢及資財盡賜術術三辭不見許術乃書送詣所司不復聞奏邢邵聞之遺術書曰昔鍾離意云孔子忍渴盗泉珠璣委地今能如此可謂異代一時沈約宋書曰栁元景南岸有數十畒菜園人賣菜得錢三萬送宅元景怒曰我立此園種菜以供家中噉之乃復賣取錢奪百姓之利耶以錢乞守園人又曰郭原平性至孝太守蔡興宗以私米遺之固辭不受許瑤之罷建安郡丞還家以綿一斤遺原平原平不受送而復反者前後數十瑶之乃自往曰今嵗過寒而建安綿好以此奉尊上下耳原平乃拜而受之原平以種瓜爲業大旱瓜瀆不復通舩丗祖令劉僧秀下瀆水與之原平曰今天大旱百姓俱困豈可減漑田之水以通運瓜之舩歩行從他道往錢塘貨賣又曰孔顗字思逺不尚矯飾服用麄敗終不改易時吴郡顧顗之亦尚儉素衣裘器服皆擇其陋者宋丗言清約稱此二人顗弟道存從弟微頗營産業二弟請假東還輜重十餘舡皆是綿絹𥿄席之屬顗見之令上置岸側命左右取火燒之盡乃去道存代顗爲江夏内史時都邑米貴道存慮顗甚乏遣吏載五百斛米餉之顗呼吏載米還彼吏曰都下米貴乞於此貨之不聽吏乃載米而去太平御覽卷第四百二十五
