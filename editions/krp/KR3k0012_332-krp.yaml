body:
  text: 兵部六十三據要漕運絶粮道據要呉子曰凢行師越境必審地形審知主客之向背地形若不悉知徃必敗矣故軍有所至先五十里内山川形勢使軍士伺其伏兵將必自行視地之勢因而圖之知其險易也戰國䇿曰秦師伐韓圍閼與趙遣將趙奢救之軍士許暦曰秦人不意趙師至此其來氣盛將軍必厚集其陣以待之不然必敗又曰先據北山上者勝後至者敗趙奢即發萬人趍之秦兵後至争山不得上趙奢縱兵擊之大破秦軍遂解閼與之圍與音餘後漢書曰諸將征隗囂爲所敗光武令悉軍栒邑末及至栒音詢隗囂乘勝使其將王元行廵將二萬餘人下隴因分遣廵取栒邑漢將馮異即馳兵欲先據之諸將皆曰虜兵盛而新乗勝不可與争冝止軍便地徐思方略異曰虜兵臨境忸忕小利忸状猶慣習也謂慣習前事而復爲之也忸音尼丑切􅏸音遊也遂欲深入若得栒邑三輔動揺是吾憂也夫攻者不足守者有餘今先據城以逸待勞非所以争也遂潜徃閼城偃旗鼔行廵不知馳赴之異乗其不意卒擊鼔建旗而出廵軍驚亂奔走追擊十里大破之蜀志曰諸葛亮出斜谷是時魏將司馬宣王屯渭南郭淮䇿亮必争北原若亮跨渭登原連兵北山隔絶隴道揺盪人夷非國之利也宣王善之淮遂屯北原塹壘未城蜀兵大至淮逆擊走之魏志曰諸葛誕胡遵等伐呉攻東興呉將諸葛恪率軍拒之及恪上岸部將丁奉與唐咨吕據留賛俱從山西上奉曰今軍行遟若敵據便地則難與争鋒矣乃令諸使下道率麾下三千人遥進時風便奉舉㠶二日至遂據塘天寒雪時魏諸將置酒髙㑹奉見其前部兵少相謂曰取封侯爵賞正在今日乃使兵解鎧着胄持短兵敵人從而笑焉不爲設備奉縱兵斫之大破敵前屯㑹據等至魏軍遂潰晉書曰劉𥙿率師伐南燕慕容超晉師度峴慕容超懼率卒四萬就其將叚暉等于臨昫其俱切謂其將公孫五樓曰冝進據川源晉軍至而失水亦不能戰矣臨昫有巨薎水去城四十里五樓馳據之龍驤將軍孟龍符領騎居前奔徃争之五樓乃退因而大敗崔鴻十六國春秋曰後秦姚興與前秦符登相持登自六陌向廢橋興乃自將精騎以迫登使將尹緯領歩軍據廢橋以抗登困急攻緯緯將出戰興遣使謂緯曰兵法不戰而制人者盖謂此也符登窮㓂特冝持重不可輕戰緯曰先帝登遐人情尚擾不因思奮之力梟殄逆豎大事去失矣遂與登戰大破之登衆渇死者十二三其夜大潰又曰夏赫連勃勃屯依力川後秦姚興將王奚聚羗胡三千餘户于勑竒堡勃勃進攻之奚驍悍有膂力短兵接戰勃勃之衆多爲所傷於是堰斷其水堡人窘迫執奚出降梁史曰宋武帝伐姚泓沈林子叅征西軍事加建武將軍統軍爲前鋒從汴入河僞并州刺史河東太守尹昭據蒲坂林子於陜城與冠軍檀道濟同攻蒲坂龍驤王鎭惡攻潼關姚泓聞大軍至遣僞平公姚紹争據潼關林子謂道濟曰潼關天岨所謂形勝之地鎭惡孤軍勢危力屈若使姚紹據之則難圗也及其未至當并力争之若潼關事捷尹昭可不戰而服道濟從之後周書曰東魏將齊神武伐西魏軍過蒲津渉洛至許原西魏將周文帝軍至沙苑齊神武聞周文帝至引軍來㑹詰朝候騎告齊神武軍且至周文帝部將李弼曰彼衆我寡不可平地置陣此東十里有渭曲可先據以待之遂進軍至渭曲背水東西爲陣合戰大破之北史曰安同從道武征姚平於紫壁姚興悉衆救平同進計曰汾東有蒙坑東西三百餘里徑路不通姚興來必定汾西乗髙臨下直至紫壁如此則㓂内外勢接冝截汾爲南北浮橋乗西岸築圍旣固賊至無所施其智力矣從之興果視平屠滅而不能救隋書曰文帝𥘉突厥㓂蘭州隋將賀婁子幹率衆拒之至可洛峐音哀山與賊相遇賊衆甚盛子幹阻川爲營賊軍不得水數日人馬甚弊縱擊大破之唐書曰盛彦師鎭冝陽㑹李密叛彦師率兵邀之令其衆曰唯我馬首是瞻遂踰洛水入南山令持弓弩者乗髙挾路持刀楯者伏於溪谷之間又令曰待賊半度而擊之所邵皆笑曰賊向洛州何爲守此彦師曰吾籌之熟矣李密聲徃洛州其實欲南走襄城就張善相耳若賊先入谷口我自後追之路險難以展力吾今先據要害此賊乃成擒也密果至知有伏乃踰山南上彦師邀擊之封葛國公漕運孫子曰不盡知用兵之害則不得盡知用兵之利故善用兵之者役不再籍粮不再載取用於國因粮於敵故軍食可足兵甲戰具取用國中粮因敵也故國之貧於師者逺師輸也逺輸則百姓貧兵事轉運千里之外財費於道路人有困窮者也近師則貴賣貴賣則百姓虚虚則竭近軍師市多非常之賣當時貧費以趣未利然後財貨殫盡國家虚也竭則急於丘役力屈中原内虚於家丘十六非也百姓財皆盡兵不解運粮盡力於原野百姓之費十去其七所破費也公家之用破車疲馬甲胄弓矢㦸楯矛櫓兵牛大車十去其六計較之也故智將務食於敵食敵一鍾當吾二十鍾六斛四斗爲鍾計千里轉運二十鍾而致一鍾於軍中也􅠇杆一石當吾二十石􅠇豆秆槀一石百二十斤也轉輸之法費二十石乃得一石也後漢書曰永平中理呼池石臼河從都虜至羊膓倉酈示水經注云汾陽故城積粟所謂羊膓倉在晉陽西北石隥榮季若羊膓焉故以爲若今嵐州界羊膓坂是也石臼河水名欲令通漕水運曰漕太原吏人苦役連年無成轉運所經三百八十九隘前後没溺死者不可勝筭建𥘉三年拜謁者使監領其事訓考量隠括隠審量括之也知大功難立具以上言肅宗從之遂罷其役更用驢輦歳省費億萬計全活徒士數千人又曰第五種拜髙宻侯相是時徐䆓州盗賊群聚髙密在二州之郊種乃儲粮稸勤厲吏士賊聞皆憚之又曰光武即位時軍食急乏㓂恂以輦車驪駕轉輸前後不絶前書音義曰驪駕併駕也輦車人挽行也又曰詔報朱浮曰徃年赤眉跋扈長安䟦扈猶暴撗也吾䇿其無榖必東來歸降今度此反虜勢無乆全其中必有内相斬者今軍資未充故湏候耳又曰來歙上書曰公孫𫐠以隴西天水爲藩蔽故得延命假息今二郡平蕩則述智計窮矣冝益選兵馬儲積資粮昔趙之將帥多賈人髙帝懸之以重賞髙帝十年陳稀反於趙代其將多賈人帝多以金購狶將皆降今西州新破兵人疲饉苦招以財糓則其衆可奪臣知國家所給非一用度不足然有不得巳也帝然之東觀漢記曰來歙征公孫述詔於汧積糓六萬斛驢四百頭負䭾蜀國志曰諸葛亮悉大衆由斜谷出以流馬運粮據武功五丈原與司馬宣王對於渭南晉書載記曰羅尚委城遁李雄遂尅成都于時雄軍飢甚乃率衆就糓於郪掘野䑕等食之晉書曰祖逖伐陳留太子陳川石季龍救之徙陳川還襄國留挑豹等守川故城住西臺逖遣將韓潜等鎭東城同大城賊從南門入放牧逖軍開東門相守四旬逖以布囊盛土如米狀使千餘人運上臺又令數人擔米僞疲極而息於道賊果逐之皆弃擔而走賊旣獲米謂逖士衆豊飽而胡戍飢乆益懼無復膽氣石勒將劉文堂以驢千頭運粮以饋祧豹逖遣韓潜馮鐡等追擊於汴盡獲之姚豹宵退據東燕唐書曰貞元十五年令江淮轉運米毎年冝運二百萬石巳來雖有此命而運米竟不過四十萬石又曰韋倫拜啇州刺史兼御史中丞充荆襄等遂租庸使㑹襄州禆將康楚元張嘉延擁衆爲叛兇黨萬餘人自稱楚義王襄州刺史王政棄城遁走嘉延又南襲破江陵漢沔饋運阻絶朝廷旰食倫乃調兵駐鄧州界康楚元兇黨有來降必原加賞數日後楚元衆頗怠倫進軍擊之生擒楚元以獻餘衆悉走収租庸錢物僅二百萬貫並免失墜又曰元和中塩䥫使王播進陳許軍琵琶溝運圖先是中官李重秀奉命視之還言可以通漕至郾城下北潁口水運千里而近及上覽圗詔韓弘發卒以通汴河於是舡勝三百石皆入潁又曰開成𥘉以王彦威判度支甞紫宸廷奏曰臣自掌計司按見管錢糓文簿皆量入以爲出使經費必足無所刻削且百口之家有歳蓄而軍用錢物一切通用悉隨色額占定終歳支給無毫釐之羌儻臣一旦愚迷欲自欺竊亦不可得也名曰度支占額圖旣而又進供軍國曰起至徳乾元之際迄於貞觀元和之𥘉天下有觀察者十節度者二十有九防禦者四經略者三掎角之師犬牙相制大都通邑無不有兵都計中外各額至八十餘萬長慶户口几三百三十五萬以額約九十九萬通計三户資一兵今計天下租賦一歳所入惣不過三千五百餘萬而上供之數三之一焉三分之中二給衣賜自留使兵士衣賜之外其餘四十萬衆仰給度支伏以時逢理安運属神聖然而兵不可弭食哉惟時憂勤之端兵食是功臣謬司邦計䖍奉睿圖輙纂事功庶禆聖覽又曰黄巢旣來圍陳郡三百日關東仍歳無耕稼人餓倚牆壁間賊俘人而食日殺數千賊有㫪磨砦爲巨碓數百生納人於臼粹之合骨而食其流毒若是又曰秦宗權以蔡州叛所至屠殘人物燔燒郡邑西至關内東極青齊南出江淮北至衛滑魚爛鳥散人煙断絶荆榛蔽野賊旣乏食啖人爲儲軍士四出則塩屍而從三國典略曰陳覇先遣錢明領水軍出江寕浦要擊齊人糧運盡獲其舡於是齊軍大餒殺馬驢而食之又曰以粮運不継調市人餽軍建康令孔奐以麥屑爲飯用荷葉裏之室宿之間得數萬褁以給兵士㑹陳蒨遣送米三千石鴨千頭霸先即炊黍煑鴨誓申一戰計糧分肉人獲數臠絶粮道漢書曰景帝𥘉呉楚七國反以太尉周亞夫問父綘侯客鄧都尉曰䇿安出客曰呉楚兵銳甚難與争鋒而剽輕不能乆莫若引兵東北壁昌邑以梁委呉呉必盡銳攻之將軍深溝髙壘使輕兵絶淮泗之口塞呉饟式亮切道使呉梁相弊而粮食竭乃以全軍強制其疲極破呉必矣亞夫言於帝許之遂破呉軍又曰王莽末天下亂光武兄伯升起兵討莽爲莾將甄音眞阜梁丘賜所敗復収㑹兵衆還保棘陽阜賜乗勝留輜重於藍郷引精兵十萬南度潢淳臨泚水潢音黄􆇕音毗阻兩川間爲營絶後橋示無還心伯升於是大饗軍士設盟約休卒三日爲六部潜師夜起襲取藍郷盡獲其輜重明晨漢軍自西南攻甄阜下江兵自東南攻梁丘賜至食時陣潰遂斬阜賜後漢書曰韓遂敗走榆中榆沖縣属金城郡張温乃遣周愼將三萬人追討之温叅軍事孫堅堅權之父也說愼曰賊城中無糓當外轉粮食堅願得萬人断其運道將軍以大兵継後賊必困乏而不敢戰若走入羗中并力討之則凉州可定也愼不從引軍圍榆中城而邊章遂分屯葵園峽反断愼運道愼懼乃棄重而退又曰曹公與袁紹相持官度沮授言於紹曰北兵數衆俎側居切而果勁不及南南糓虚少而貨財不及北南利在於急戰北利在於緩持冝曠以日月紹不從連營稍前逼官度合戰曹公軍不利復壁紹爲髙櫓起土山射營中皆蒙楯衆大懼曹公乃爲發石車擊紹樓皆破衆號霹靈車紹爲地道欲襲曹公營公輙於内爲長壍以拒之又遣騎兵襲擊紹運車大破之盡焚其糓㑹紹遣淳于瓊等將兵萬餘人北迎運沮授說紹可遣將別爲軍於表以絶曹公之抄紹復不從瓊宿鳥巢去紹軍四十里紹謀士許攸奔曹公攸謂曹公曰孤軍獨守外無求索危急之時也今袁氏輜重有萬餘兩而無巖備可輕兵襲之不慮而至燔其積聚不過三日袁氏自敗也公乃選精銳馬歩秉袁氏旗幟夜衘枚縳馬口從間道出人負束薪時有問者紿之紿音怠曰袁公恐曹操掠後軍兵以益備聞者信之旣至輜重圍屯燎薪火光亘天地破瓊等悉斬之數日紹弃甲而遁蜀志曰姜維率衆侵魏依麴山築二城使牙門將勾安李韶等守之聚羗胡質任㓂逼諸郡魏將陳泰禦之泰謂諸將曰麴城雖固去蜀險逺當須運粮羗夷患維勞役必未肯附今圍而取之可不血刄而拔其城雖其來救山道險阻非行兵之地乃使鄧艾等進兵圍之断其運道及城外流水安等挑戰不許將士困窘分粮聚雪以稽日月維果來救出自牛頭與泰相對泰曰兵法貴在不戰而屈人今絶牛頭維無返道則我之擒也諸軍各堅壘勿與戰自南度白水循水而東使諸將截其還路維懼遁走安等孤懸遂皆降崔鴻十六國春秋曰前趙劉曜遣將劉㣧西伐張駿之武威駿將遣辛巗韓瑛音英東拒劉胤屯于狄道城韓瑛進度沃于嶺辛巗曰我掘衆數萬籍玄羗之銳冝速戰以滅之不尓乆則變生瑛曰自夏末以來太白犯月辰星逆行白虹貫日皆變之大者不可以輕動動而不捷爲禍更深吾將乆而斃之且曜與石勒相攻胤亦不能乆積七十餘日軍粮竭遣辛巗督運於金城㣧聞之大恱謂其將士曰韓瑛之衆十倍於吾粮廩將懸難以持乆今分兵運粮可謂天授吾若敗辛巗英等自潰彼衆我寡冝以死戰戰而不捷當無疋馬得還咸奮於是率騎三千襲巗於沃于嶺大敗之瑛軍遂潰死者三萬餘人三國典略曰周王思政固守潁川思政運米數百車欲向孔城齊大都督破六韓常與洛州刺史可朱渾寳願前後要襲獲之乃啓于齊王澄曰常自鎭河陽巳來頻出關口大谷二道所有要害莫不知悉請於形勝之處營築城戍安置士馬截其徃來彼之咽喉旣断潁城吞滅可期且孔城以西年糓不稔東道断絶亦不能存王納其計太平御覽卷第三百三十二
