front:
  text: 太平御覽卷第八百六十二飲食部
  hash: sha256:44e9aed6e4fd19d77eba00e21c075f6f43fcc11a14b7f4599371ae727fbd2c8b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_862-1a}
body:
  text: 膾脯鯖鮓八珎膾周禮天官籩人曰朝事之籩其實膴鮑鄭玄曰膴䐑生魚爲大臠也鮑者於􅟺室中糗乾之岀於江淮也燕人膾魚方寸切其腴以㗖所貴也禮内則曰牛膾羊炙魚膾芥醬又曰大夫燕㑹有膾無脯有脯無膾士不貳羮胾庻人耆老不徒食尊卑差也膾春用葱秋用芥豚春用韭秋用蓼芥芥醬也肉腥細者爲膾大者爲軒膾者先軒之所謂攝而切之又少儀曰與羊魚之腥聶而切之爲膾聶之口䐑先藿葉切之復報切則成膾也詩曰來歸自鎬我行永乆飲御諸友炰鼈膾鯉鯉魚御進也箋云御侍也王以告甫逺從鎬地來又日月長乆今飲之酒使其諸友恩舊者待之又加珎羙之饌所以極勸之也論語郷黨曰膾不厭細春秋佐助期曰八月雨後苽菜生於洿下地中作羮臛甚羙呉中以鱸魚作鱸苽菜爲羹魚白如玉菜黄若金稱爲金羮玉鱸一時珎食說文曰鱸細切肉也釋名曰膾㑹也細切肉散分其赤白異切之乃㑹和之也東觀漢記曰章帝與舅馬光詔曰朝送鹿膾寜用飯也魏志曰陳登得胷中煩滿面赤不食華他爲脉曰府君胃中有虫數升欲成肉疽食腥物所爲也即作湯二升先服一升斯湏盡服之食頃吐出三升許虫赤頭皆動半身猶是生魚膾也沈約宋書曰張収爲猘犬所傷人云冝食蝦蟇膾収難之兄暢含笑先甞収乃食瘡即愈又曰沈攸之舉兵圍郢城獲范雲令送書入城餉栁世隆鱠魚二十頭梁書曰蕭潁胄素能飲酒噉白肉膾至三升葛洪神仙傳曰仙人介象字元則㑹稽人有諸方術呉主聞之徴象到武昌甚敬貴之稱爲介君與呉主共論鱠魚何者最羙象曰鯔魚爲上呉主曰論近魚耳此海中岀安可得耶象曰可得耳乃令人於殿庭中作方塪汲水滿之并求釣象起餌之垂綸於塪中不食頃果得鯔魚呉主驚喜問象曰可食否象曰故爲陛下取以作生安敢取不可食之物乃使厨下切之呉主曰聞蜀使來有蜀薑作韲甚好恨時無此象曰蜀薑豈不易得願羌所使者并付直呉主指左右一人以錢五十付之象書一符以着青竹杖中使行人閉目騎竹竹止便買薑訖復閉目此人承其言騎竹湏臾巳至成都不知是何處問人人言蜀市乃買薑于時呉使張温先在蜀旣於市中相識甚驚便作書寄其家此人買薑畢投書負薑騎杖閉目湏臾巳還到呉厨下切鱠亦適了搜神記曰左慈字元放在曹操坐操謂衆賔曰髙㑹所少呉浙江鱸魚耳放曰此可得也因求銅藻盤貯水以竿餌釣於盤中湏臾引一鱸出操拊手笑曰可更得不放乃更引餌沉之湏臾復引出皆長二尺餘生鮮可愛操令目前切膾孝子傳曰曽參食生魚甚羙因吐之人問者故參曰母在之日不知生魚味今我羙吐之終身不食異物記曰􅠧魚作膾味珍無軰列女傳曰姜詩妻事姑嗜魚膾又不能獨味妻與詩常力作供膾呼隣母共食其舎側忽有泉常出鯉魚一雙以供二母之膳呉越春秋曰伍子胥伐楚末還闔閭治魚作膾作膾過時不至魚臭猶湏子胥之至也三師到闔閭膾而食之不知其臰後王重作之者味如故人作魚湏膾者闔閭之時造也博物志曰呉王江行食鱠有餘弃之於中流化而爲異魚今呼王餘魚長數寸大如筯猶有膾形齊諧記曰江南有麻姑治者爲人好噉鱠江北岸有華夲者得一大虵喚麻爲鱠得食甚羙苦索魚名華本因醉喚取虵及餘肉出麻治見之大吐歐血死又曰周子有女噉鱠不知足家爲之貧至長橋南見罛者挫魚作鮓以錢一千求一飽食五斛便大吐有蟾蜍從吐中出婢以魚置口中即成水女遂不復噉膾世說曰張季膺辟齊王東曹掾在洛見秋風起因思呉中蓴羮鱸魚鱠曰人生貴得適意何覉宫千里以要名爵遂命駕便歸俄而齊王敗時人謂爲見機又曰桓車騎冲在荆州張玄爲侍中使至江陵路經陽歧俄見一人持小籠生魚逕來造舡云有魚欲寄作膾張乃維舟而納之問其姓字云是劉遺民劉驎之字遺民張素聞其名大相欣待旣知張䘖命問謝安王文度並佳不張甚欲語言劉子無意旣進膾便去云向得此魚觀君舡上當有膾具是故來耳於是便去杜寳大業拾遺録曰六年呉郡獻海鮸音免乾膾四瓶瓶容一斗浸一斗可得徑尺面盤并奏作乾膾法帝以示群臣云昔術人介象於殿庭釣得海魚此幻化耳亦何是珎異今日之鱠乃是海真魚所作求自數千里亦是一時竒味即出數盤以賜近臣作乾膾法當五六月盛熱之日於海取得鮸魚其魚大者長四五尺鱗細紫色無細骨不腥捕得之即去其皮骨取其精肉縷切隨成曬三四日湏極乾以新白瓷瓶未經水者盛之蜜封泥勿令風入經五六十日不異新者後取噉時以新布褁於水中漬三刻乆取出灑却水則曒然矣廣五行記曰唐咸亨四年洛州司户唐望之各集計至五品進止未出間有僧來覔𥘉不相識延之共坐少頃曰貧道出家人得飲食亦以少公名人故闇相託能設一頓鱠否司户欣然即處分買魚此僧云看有蒜否家人云蒜盡也僧即起司户留之曰蒜盡遣買即得僧云旣蒜盡不可更住苦留不止望之果無疾暴卒明皇雜録曰邢州人和璞甞謂房琯曰君殁之時必因食魚膾旣殁之後當以梓木爲棺然不得殁於君之私第不處公館不處玄壇佛寺不處親友之家其後譴於閬州寄居州之紫極宫卧疾數日刺史忽具鱠邀房於郡齋房亦欣然命駕旣歸暴卒州主命攅櫝於宫中棺得梓木爲之脯釋名曰脯搏也乾燥相搏着也脩縮也乾燥縮也說文曰脯乾肉也脩脯也𥙷莫切薄膊之屋上也腕骨脯也朐脯挺也周禮曰脯人掌乾肉也凢田獸腊膴羘之事夫物解肆乾謂之乾肉薄切日脯睡之而施薑桂曰暇脩腊小物而乾者祭祀共豆脯膴胖又曰膳夫凢王之稍事設薦脯醢鄭司農云稍事謂非日中大舉時而間食謂之稍事膳夫主設薦脯醢云謂稍有小而事飲酒也儀禮曰郷飲酒主人立于西階東薦脯使出祖釋軷祭脯士冠賔東面薦脯禮曰以脯脩置者左朐右末又曰婦人之䞇脯脩大夫燕禮有膾無脯又禮特牲曰大饗尚睱脩而巳矣榖梁傳曰束脩之肉不行境中有至尊者不貳公羊傳曰魯昭公出奔齊侯使髙子執簞食四脡脯公稽首以祍受易曰噬乾肺得金矢王肅注曰四體離隂卦骨之象骨在乾肉脯之象金象所以獲野禽故食之反得金矢君子於味必思其毒於利必備其難論語曰子曰自行束脩巳上吾未甞無誨焉孔曰言人奉禮自行束脩以上則皆教誨之也又曰沽酒市脯不食尚書大傳曰散冝生閎夭南宫适三子者學乎太公見三子知三子之爲賢人遂酌酒切脯約爲朋友漢書曰濁氏以賣而連騎東觀漢記曰光武𥘉起兵叔父良搏手大呼曰我欲詣納言嚴將軍叱上起去出閤令人視之還白方坐㗖脯晉書曰桑虞甞行宿寄逆旅同舎客失脯疑虞爲盗虞黙然無言便解衣償之主人曰此舎數失魚肉雞鴨多是狐狸偷君何以疑人乃將脯徃山冢間尋求果得之客求還衣虞投之不頋北齊書曰彭城王攸爲滄州刺史有一人從幽州來驢䭾鹿脯至滄州界脚痛行遟偶㑹一人爲伴遂盗驢及脯去明旦告州乃令左右及府僚吏分市鹿脯不限其至主見識之推獲盗者唐書曰太宗狩于濟源之凌山上曰古者三先駈以供宗廟今所獲鹿冝令所司造脯醢以充薦享國語曰楚成王聞子文之朝不及夕也成王楚文王之子成王頵於是乎毎朝設脯一束糗一筐以羞子文至于今令尹祑之祑常吕氏春秋曰趙宣子將之絳見翳桑之下有餓人宣孟與脯二朐拜受不敢食問其故曰臣有母持以遺之宣孟更賜之二束遂去東方朔神異經曰北方有増水萬里厚百丈有䑕在氷下土中食氷下草木肉重萬斤可以作脯又曰西北荒有遺酒追復脯焉其味如麞食一片復一片葛洪神仙傳曰王逺至蔡經家與麻姑共設肴膳擘脯而行云是麒麟脯又曰左慈詣劉表請犒軍有酒一器脯一盤百人捷酒賜兵人三杯酒一片脯萬人皆同而酒器如故脯亦不减丗語曰𥘉太祖乏食程昱掠其本縣供三旬粮頗雜以人脯由是失朝望故位不至公也續齊諧記曰劉晨阮肇入天台山有女仙人爲設胡麻飯山羊脯因留連之楚詞曰折瓊枝以爲羞王逸注日羞脯也盧諶祭法曰春祠用脯夏用煏慿逼反杜育菽賦曰脯則正膂通幹麄鹿肥麋梁劉孝威謝東宫賡鹿脯等啓曰上林絶胡人之搏禁地無張京之犯而猶有班超之遊獵李廣馳射逺歸於厨使入貢於脯人并圖三事之車影入九仙之鏡鯖西京雜記曰五侯不相能賔客不得徃來婁護豊辨傳㑹五侯間各得其意競致竒膳護乃合以爲鯖世稱五侯鯖以爲竒味焉齊書曰武帝就虞悰求諸飲食方悰祕不出上醉後體不快悰乃獻醒酒鯖鮓一方而巳鮓釋名曰鮓𦵔也以塩米釀之如𦵔熟而食之也呉志曰孟仁爲塩池司馬自能結網手以捕魚作鮓寄母母還之曰汝爲魚官而以鮓寄我非避嫌也宋書曰王瑩代謝超宗爲義興太守與謝交惡超宗到都後瑩父懋徃超宗處超宗設精白鮑羙鮓獐巴懋問郍得佳味超宗詭言瑩始見餉佯驚曰大人豈應不得耶懋大忿言於朝廷稱瑩供養不足坐失廢弃乆之愽物志曰仲秋月取折頭鯉子去鱗破腹使膂割爲漸米爛藻之以赤秝米飯塩酒令糝之鎮不苦重踰月乃熟是謂秋鯖王子年拾遺記曰漢元鳯二年於淋池之南起桂臺以望逺帝常以季秋之月沉衝瀾雲鷁之舟窮畧係夜釣於臺下以香金爲釣霜絲爲綸丹鯉爲餌得白蛟長三丈若大虵無鱗甲帝曰非瑞也命太官爲鮓肉紫骨青味絶香羙班賜羣臣帝後思其羙漁者不復得知爲神異也列異傳曰費長房又能縮地脉坐客在家至市買鮓一日之間人見之千里外者數處世說曰有人遺張華鮓見之謂客云此龍肉也肉鮓中則有五色光試之果如言後問其主云於茅積下得白魚所作也又曰陶侃少時作魚梁吏常以一坩苦甘切鮓餉母母封鮓付反書責侃曰汝爲吏以官物見餉非唯不能益吾乃以増吾憂也謝玄與婦書曰昨出釣獲魚作一坩鮓今奉送大業拾遺曰十二年六月呉郡獻太湖鯉魚腴鱔四十坩純以鯉腴爲之計一坩䱹用鯉魚三百頭肥美之極冠於鱣鮪八珎周禮天官曰食醫掌王之八珎禮曰淳熬煎醢加于六稻上沃之以膏曰淳熬沃煎成之以爲名淳母煎醢加于黍食之上沃之以膏曰淳母母讀日模模象他作此象淳熬也炮取豚若將圭之刳之實棗於其腹中編萑以苴之塗之以謹音堇塗炮之塗皆乾擘之濯手以摩之去其皽音善切爲稻粉糔溲之以爲醴以付豚煎諸膏膏必滅之鉅鑊湯以小鼎薌脯於其中使其湯母滅鼎三日三夜無絶火而后調之以醯醢炮者以爲塗燒之爲名將當爲牂牂羊也檮珎取牛羊麋􅍪之肉必脄音媒毎物與牛若一捶反側之去其餌熟出之去其皽柔其肉脊側肉漬取牛肉必新殺者薄切之必絶其理湛音尖諸羙酒期朝而食之以醢若醯臆湛亦漬也爲熬捶之去其皽編萑布牛肉焉屑桂與薑以洒諸上而塩之乾而食之施羊亦如之施麋施鹿施麏皆如牛羊欲濡肉則睪而煎之以醢欲乾肉則搖而食之熬取火上爲之今火脯似之此七者周禮八珎其一肝膋是也肝膋取狗肝一懞之以其濡炙之舉焦其膋不蓼膋腸間脂也太平御覽卷第八百六十二
