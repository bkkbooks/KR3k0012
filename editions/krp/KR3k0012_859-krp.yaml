body:
  text: 飲食部十七糜粥膏糜糝􅭁䵄蕡麮丘與切肺䐣蘇夲切血苦濫切熱洛河羗煑胡飯糜粥周書曰黄帝始烹榖爲粥記曰仲秋養衰老授几杖行麋粥飲食行酒賜也又曰公叔文子卒其子請謚於君君曰昔者衛國㓙飢夫子爲粥與國之餓者是不亦惠乎又曰悼公之䘮季昭子問於孟敬子曰爲君何食悼公魯哀公之子昭子康子之曽孫名強敬子武伯之子名捷敬子曰食粥天下之逹禮也又曰穆公之母卒穆公魯哀公之曽孫使人問於曽子曰如之何問居䘮之礼曾子曽參之于名申對曰申也聞諸申之父曰哭泣之哀齊斬之情饘粥之食自天子逹子䘮父母尊卑同又曰親始死三日不舉火故鄰里爲之麋粥以飲食之又曰君之䘮子大夫公子衆士皆三日不食子大夫公子食粥納財朝一溢米莫一溢米食之無筭又曰大夫之䘮主人室老子姓皆食粥左傳曰晉人執衛侯歸之于京師寘諸深室寗子納橐饘焉饘粥餅也又曰齊晏桓子卒晏嬰麤縗斬苴經帶杖菅屨食鬻君倚廬寢苫枕草其老曰非大夫之禮也又曰正考父鼎銘云饘於是粥於是以餬余口饘餼也爾雅曰鬻麋也薄糜餬饘也麋也釋名曰麋煑米使麋爛也粥濯於麋粥粥然也寒粥米投寒水中也史記曰左師觸龍見趙太后曰食得無衰乎太后曰恃粥耳又曰陽盧侯趙章病淳于意侯其脉曰迵音洞風迵風者五日而死後七日乃死曰其人嗜粥故中藏實實故過期後漢書曰光武爲王郎所追至無蔞亭馮異上豆粥一椀明日上謂諸將曰昨得公孫豆粥飢寒俱解又曰樊儵事後母至孝及母卒哀思過禮毀病不自支世祖常遣中黄門朝暮送饘粥東觀漢記曰曹褒遷將作大匠上聞襃病使致醫藥糜粥謝承後漢書曰南陽陸續仕郡户曹史時飢荒太守尹興使續於都亭賦民饘粥續悉令簡閱其人訊以名氏事畢興問所食幾何續因口說六百餘人皆分別姓字無有差謬興異之漢獻帝傳曰帝在長安榖一斛五十餘萬帝使侍御史侯汶岀太倉米豆爲飢民作糜粥死者不絶帝疑廪賦不實勑取米豆五升於御前作糜得滿兩盆詔杖汶五十九州春秋曰臧洪爲青州刺史爲袁紹所圍粮食巳盡𥘉尚掘䑕煑筋角後無可復食厨有米三升主簿啓進内稍以爲糜粥洪歎曰吾獨食此何爲命作薄粥與衆共啜之魏末傳曰曹爽等令李勝辭司馬宣王并伺察焉宣王見勝自陳無他勞効横蒙聖恩當爲夲州詣閤拜辭不悟加恩得蒙引見宣王令兩婢侍衣衣落復上指口言渴主飲婢進粥宣王持杯飲粥粥皆流岀沾胷勝愍然者乆之呉録曰李壽作糜以食飢者而不自名又曰朱桓除餘姚長遇疫癘榖食荒貴桓分部良吏隠親醫藥食粥相継士民感戴之王隠晉書曰賊杜㢭下蜀蜀人飢陶侃多作粥以待之於是悉降晉安帝紀曰桓玄敗走左右進以麄粥咽不能下郭林宗傳曰林宗甞止陳國文學見童子魏德公知其有異德公求近其房止供給洒埽林宗甞不佳夜中命作粥德公爲之進焉林宗一啜怒而呵之曰髙明爲長者作粥不如意使沙不可食以杯擿地徳公更爲粥三進三呵德公姿無變容顔色殊恱林宗乃曰始見子之靣今乃知卿心遂友善之卒爲妙士宋書曰戴顒與兄㪍並隠遁有名中書令王綏甞携客之㪍等方進豆粥綏曰聞卿善琴試欲一聽不荅綏恨而去又曰何子平大明末東土飢荒繼以師旅家有大䘮八年不得營葬晝夜號哭常如袒括之日冬不衣絮暑避清凉一日以數合米爲粥不進塩菜齊書曰宣考陳皇后生髙帝髙帝年二歳乳人乏乳后夢人以兩甌麻粥與之覺而乳驚因此豊足梁書曰昭明太子統母丁貴殯薨水漿不入口每哭慟絶武帝命中書舎人頋恊宣旨曰毀不滅性聖人之制不勝䘮比於不孝有我在那得自毀如此耶即強進飲粥太子奉勑乃進數合自是至葬日進麥粥一升武帝又敕曰聞汝所進食過少轉嬴瘦我比更無病正爲汝􅎍中亦圯塞成疾故應加饘粥不使我恒懸心雖屡奉敕勸逼終䘮日止一溢米不甞菜果之味又曰張弘䇿㓜以孝聞母甞有疾五日不食弘䇿亦不食母強爲進粥弘䇿乃食母所餘又曰蕭景爲南兖州刺史㑹年荒計口振恤又爲饘粥於路以賦之又曰任昉爲義興太守歳荒散私俸米豆爲粥活三千餘人又曰王志天監𥘉爲丹陽尹時年飢每旦爲粥於郡門以賦百姓衆悉稱惠又曰劉覽字孝智十六通老易位中書郎以所生母憂廬于墓再朞不甞塩酪食麥粥而巳又曰有河南孝廉秦綿遭母䘮送葬不忍復還郷人爲作菴仍止其中若遇有米食粥無米食菜而巳又曰庾沙弥母劉氏亡水漿不入口累日𥘉進大麥薄飲經十旬方爲薄粥終䘮不食塩酢陳書曰張昭弟乾字玄明聦敏好學亦有至性父卒兄弟日唯食一升麥屑粥後魏書曰崔浩道武季年威風嚴峻官省左右以微過得罪莫不逃避隠匿自下皆変浩獨恭勤不怠或終日不歸帝知之輒命賜以御粥又曰薛真度爲豫州刺史景明𥘉豫州大飢眞度輙表曰別岀倉米五十斛爲粥救其甚者詔曰真度所表甚有憂濟百姓之意冝在極䘏也又曰文明太后崩孝文五日不食楊椿諌曰聖人之禮毁不滅性縱陛下欲自賢於万代其若宗廟何帝感其言乃一進粥又曰楊逸爲光州刺史時災儉連歳逸欲以倉粟賑給而所司懼罪不敢逸曰國以人爲夲人以食爲命假令以此獲戾吾所甘心遂出粟然後申表右僕射元羅巳下謂公儲難闕並執不許尚書令臨淮王或以爲冝貸二萬詔聽貸五萬逸旣出粟之後其老小殘疾不能自存活者又於州門造粥飼之將死而得濟者以萬數帝聞而善逸又曰韋朏字遵顯少有志業年十八辟州主簿時屬歳儉朏以家粟造粥以飼飢人所活者甚衆又曰房景逺字升遐重然諾好施與儉分贍宗親又於通衢以粥食餓者存濟甚衆平原劉郁行造兖境忽遇刼賊巳殺十餘人次至郁郁曰與君郷近何忍見殺賊曰若言郷里親親是誰郁曰齊州主簿房陽是我姨兄陽是逺小字賊曰我食其粥得活何得殺其親遂還衣服蒙活者二十餘人又曰李搔妹曰法行㓜出家爲尼後遭時大儉施糜粥於路北齊書曰李士謙遇年飢多有死者士謙罄家資爲之糜粥頼以全活者萬計後周書曰皇甫遐字永賢河東汾隂人性至孝遭母䘮乃廬於墓側食粥枕苫櫛風沐雨形容枯顇家人不識隋書曰陸讓母者上黨馮氏女也性仁愛有母儀讓即其孽子也仁壽中爲畨州刺史贓貨狼籍爲司馬所奏上遣使按之皆驗乃命公卿百僚議之咸曰讓罪當死詔可其奏讓將就刑馮氏蓬頭垢面詣朝堂數日無汗馬之勞致位刺史不能盡誠奉國以荅鴻恩而返違犯憲章贓貨狼籍若言司馬誣汝百姓百官不應亦皆誣汝言至尊不憐愍汝百姓何故治書覆汝汝豈誠臣豈孝子不誠不孝何以爲人於是流涕嗚咽親持盂粥勸讓令食旣而上表求哀詞情甚切上愍然爲之改容獻皇后甚竒其意致請於上遂下詔可减死爲民太公金匱曰武王伐紂都洛邑而雪深丈餘不知何五大夫乗馬車從兩騎止王門外師尚父使人持一器粥出開門而進曰先生大夫在内方對天子未有出時天寒故進熱粥以御寒莊子曰顔回有負郭之田五十畝足以供饘粥七畧曰宣帝詔徴𬒳公見誦楚辭𬒳公年衰母老毎一誦輙與粥風俗通曰范滂父字叔矩遭母憂旣葬之後饘粥不贍司徒召滂滂曰老父年尊絶意世仕遂不得避也魏武遺令曰吾夜半覺小不佳至明日飲粥汗出服當歸湯譙子法訓曰或曰母有疾使其妻爲粥者妻不可以刀擊之夷其面可以爲孝乎曰以刀刃妻其親必駭而有憂及之何有於孝郭子曰許允爲吏部郎多用其郷里帝遣虎賁収之婦云無憂尋還作粟粥待之語林曰石崇爲客作豆粥咄嗟便辦王愷乃宻貨崇帳中都督曰豆難煑唯豫作熟豆以白粥投之續搜神記曰劉他苟䝉在夏口忽有鬼來喜偷食劉即於他家煑治葛取二升汁蜜賫還家向夜令舉家糜食餘一甌因冩治葛汁着中於几上以瓮覆至人定後聞鬼發瓮啖糜湏臾在屋頭吐至四更中寂然於此遂絶也徐廣晉記曰愍帝建興四年京城粮盡屑麹爲粥以供帝食録異傳曰周時尹氏貴盛五丗不别㑹食數千人遭飢荒羅鼎作糜啜之聲聞數十里鄴中記曰并州之俗以冬至後百五日介子推断火冷食三日乾粥中國爲寒食涼州異物志曰髙昌僻土有異於華寒服冷水暑啜羅闍闍受車切此郡人作糜粥啜之俗號闍丗南越志曰陵廬城中有井半清半黄黄者甜滑冝作粥色如金似灰汁甚芬馨世說曰郄嘉賔三伏之月詣謝公炎暑重赫雖當風交扇猶霑汗流離謝着故練衣食熱白粥郄謂謝曰自非君體幾不堪此又曰賔客詣陳大丘宿使元方季方炊太丘問炊何遟留元方長跪曰君與客語乃俱竊聽炊忘着米今皆成糜太丘曰尓頗有所識不二子長跪俱說言無遺失大丘曰如此俱成糜自可何必飯耶俗說曰王東亭嘗之呉郡就汰公宿別汰公設豆藿糜自噉一大甌東亭有難色汰公強進半甌王薈別傳曰薈爲呉郡内史其年太飢薈出私財爲百姓饘粥風土記曰天正日南黄鍾踐長粥饘追萌微納休昌是以陽始牙動爲饘粥以養㓜扶微俗尚以赤豆爲糜所以象色也廣志曰遼東赤梁魏武帝以爲御粥天文要集曰玉井主粥厨殷康集曰康爲武康縣教曰郭邑居民有死䘮者可令送兩坩粥時鏡新書曰齊魏収當寒食餉王元景與収書曰始知令節湏御麥粥加之以糖弥覺香冷荆楚歳時記曰正月十五日豆糜加油骨其上以祠門戸魏武帝苦寒行曰行行日巳逺人馬同時飢擔橐以取薪斧氷持作糜唐新語曰李勣旣貴其姉病必親爲煑粥火爇其鬚姉曰僕妾多何自苦若是勣對曰豈爲無人耶頋姉年老勣亦年老雖欲乆爲姉煑粥其可得乎膏糜國語曰勾踐載稻與脂於舟以行稻有膏糜國之孺子之遊者無不餔也無不歠也必問其名爲後將用之續齊諧記曰呉縣張成夜起忽見一婦人立於宅東南角舉手招成成便徃就之婦人曰此地是君家蚕室我即是此地之神明曰是正月半宜作白粥泛膏於上以祭也當令君蚕桑百倍言絶失所成如言爲作膏白粥自此巳後年年大得蚕今世人正月半作膏糜像此糝周易曰鼎折足覆公餗鄭玄曰糝謂之餗震又爲竹竹萌日荀荀者餗之米也詩云其餗唯何周禮曰醢人掌羞豆之實酏食糝食記曰犬羮莬羮和糝不蓼凢羮齊冝五味之和朱屑之糝蓼則不也又曰糝取牛羊豕之肉三如一小切之與稻米稻米二肉一合以爲餌煎之此周禮糝食也說文曰糂以米和羹也糂與糝同宗躬孝子傳曰桑虞䘮父十四日食百粒糝藜藿墨子曰孔子窮陳蔡之間藜蒸不糂􅭁所㦸切通俗文曰煑米􅭁食經日作糄法近水則澀䵄蕡周禮曰籩人掌朝食之籩其實䵄蕡白黒形塩蕡熬枲實也鄭司農云䵄麻曰蕡稻日白黍曰黒鄭玄曰今河問以北煑穜麦賣之名曰儀禮曰䵄蕡坐設于豆西當外列䵄在東方婦賛者執白黒以授主婦又曰主婦薦韭菹醢坐奠于筵前醢在南方婦賛者執二籩䵄蕡以授主婦主婦不興受之奠䵄于醢南蕡在䵄東禮曰芼羮菽麥蕡稻黍梁麮丘與切荅頡解詁曰麮煑麥也說文曰麮麥甘粥也釋名曰煑麥曰麮麮亦齲也熟煑之齲壞也急就曰甘麮殊羙奏諸君肺䐣蘇夲切說文曰䐣切熟肉内於血中和也釋名曰肺䐣也全米糝之如膏鑚也盧湛祭法曰四時祠皆用肺䐣血苦濫切說文曰羊血曰釋名曰血以血作之増其酸䜴之味使甚苦以消膏而加菹其中亦以消酒也盧湛祭法曰春夏秋祠皆用輱血熱洛河唐書曰安禄山思順翰並來朝玄宗使驃騎太將軍内侍髙力士及中貴人供奉官於京城東駙馬崔惠童池亭宴㑹使射生官射鮮鹿取血煑其膓謂之熱洛河以賜之爲翰好故也羗煑捜神記曰羗煑貊炙翟之食也自太始以來中國尚之戎翟侵中國之前兆也胡飯續漢書五行志曰靈帝好胡服胡飯京師貴戚皆競爲之太平御覽卷第八百五十九
