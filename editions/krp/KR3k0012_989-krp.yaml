front:
  text: 太平御覽卷第九百八十九
  hash: sha256:aba200f7fb97da4f4630eb8118e8a5d75293d9cd52c12fb95c0237c204af8623
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_989-1a}
body:
  text: 藥部六天門冬麦門冬术茯苓䐗苓卷栢甘草厚朴黄精胡麻當歸逺志細辛續斷肉蓯蓉藷藇地黄天門冬爾雅曰蘠蘼釁音門冬也郭璞注曰今門冬也一名蒲冬山海經曰釁谷之山草多釁冬列仙傳曰赤湏子豐人好食天門冬齒落更生神仙傳曰甘始者太原人服天門冬在人間三百餘年博物志曰天門冬莖間有刺而葉滑者曰郄休一名顛蕀根以浣縑素白越人名爲浣草似天門冬而非也凢服此先試浣衣如法者便非天門冬抱朴子曰杜子服天門冬御十八妾有子百四十人日行三百里又内篇曰天門冬或名地門冬麦門冬潜夫論曰夫理世不得真賢譬猶治疾不得真藥也治疾當得麦門冬及得蒸横麦已不識真合而飲之疾以䆮劇而不知爲人所欺也遊名山志曰泉山竹際及金州多夌門冬盛弘之荆州記曰魚復縣巖崖内生夌門冬廣州記曰鄣平縣偏饒夌門冬建康記曰建康出夌門冬本草經曰麥門冬味甘平生川谷治心腹結氣傷中胃脉絶乆服輕身不飢不老生函谷山吴氏本草曰夌門冬一名羊韮秦一名烏韮楚一名馬韮越一名羊薺一名愛韮一名禹韮一名㸑火冬一名忍冬一名忍陵一名不死藥一名禹餘粮一名僕壘一名隨脂神農歧伯甘平黄帝桐君雷公甘無毒季氏甘小温扁鵲無毒生山谷肥地葉如韮肥澤叢生採無時實青黄术尓雅曰术山薊本草云术一名山薊今术似薊而生山中山海經曰女几之山其草多术列仙傳曰㳙子好餌术接食其精三百年神仙傳曰陳子皇得餌术要方服之得仙去霍山其妻姜氏疲病念其婿採术之法服之病自愈至三百七十歳登山取术重擔而歸不息不極顔色氣力如二十時抱朴子内篇曰南陽文氏其先祖漢末大亂飢困欲死遇人教之食术云遂不飢數十年乃來還郷里顔色更少氣力勝故术一名山精神藥經曰必欲長生當服山精茯苓廣雅曰茯神茯苓也史記龜䇿傳曰茯苓在兎絲之下之似飛鳥之形新雨巳天淸静無風以夜燒兎絲去之即篝燭此地徐廣曰籍籠也盖然火而籠罩其去土也篝音溝火㓕即記其處明即掘取入地四尺至七尺得矣伏苓者千歳松脂食之不死齊書曰陶弘景永明中上表辭禄許之賜以束帛勑所在月給伏苓五斤白蜜二升以供服餌淮南子曰下有茯苓上有兔絲茯苓千歳松脂也兎絲生其上而無根一名女羅也抱朴子内篇曰任子季服茯苓十八年仙人玉女徃從之面體如玉澤范子計然曰茯苓出嵩髙三輔神異經記曰西北荒有人飲甘露食茯苓典論曰頴川郄儉能辟糓餌茯苓𥘉儉至市茯苓價暴貴數倍典術曰茯苓者松脂入地千歳爲茯苓望松樹赤者下有之神仙傳曰秀眉公餌茯苓得仙又曰皇𥘉起以弟初平得道乃弃妻子留就初平共服松栢茯苓至五萬日能坐在立亡行日中無影有童子之色及俱還郷里親戚死亡略盡乃復俱去臨去以方教南伯遂易姓爲赤𥘉起字魯班𥘉平字爲松子其後服此藥得仙者數十人列仙傳曰犢子者鄴人也少在黒山上採松子茯苓餌而服之且數百年時壯時老時好時醜時人乃知仙人也廣志曰茯神松汁所作勝茯苓或曰松根茯苓貫着之生朱提濮陽縣博物志曰仙傳云松栢入地中千年化爲茯苓茯苓千年化爲虎魄一名江珠今太山岀茯苓而無虎魄江珠益州永昌郡岀虎魄而無茯苓或云蜂燒窠所作未詳二說嵩髙山記曰取松柏茯苓二斤醇酒漬之和以白蜜日三服乃通靈名山略記曰鬰州山出茯苓吴氏本草曰茯苓通神桐君甘雷公扁鵲甘無毒或生益州大松根下入地三尺一丈二月七月採本草經曰茯苓一名茯神味甘平生山谷治匈脅山氣憂患悸驚生太山猪苓莊子曰豕橐藥也司馬彪注曰豕橐一名苓根似䐗豕治渴本草經曰䐗零一名猳䐗矢味甘平生山谷治疾虒解毒蠱蛀不祥利水道乆服輕身能不老生衡山吴氏本草曰䐗零神農甘雷公苦無毒如茯苓或生宛句八月採卷柏建康記曰建康岀卷柏范子計然曰卷柏岀三輔本草經曰卷柏一名萬歳味辛温生山谷治五藏邪氣吳氏本草曰卷柏一名豹足一名求股一名萬歳一名神投時神農平桐君雷公甘生谷鄭氏㛰禮謁文曰卷柏藥草附生山顚屈卷成性終無自伸甘草本草經曰甘草一名羙草一名蜜甘厚朴廣雅曰重皮厚䃼也范子計然曰厚朴出弘農本草經曰厚朴味苦温生山谷治中風傷寒熱血痺死肌去蟲生文山吴氏本草曰厚朴一名厚皮神農歧伯雷公苦無毒季氏小温生交阯黄精廣雅曰黃精龍衘也又曰黄精葉似小黄也抱朴子曰黄精一名莬竹一名鷄格一名岳珠服其花勝其實花生十斛乾之則可得五六升服之十年乃可得益列仙傳曰脩羊公魏人也止華隂山石室中中有懸石塌卧其上塌盡穿䧟略不食時取黃精服之神仙傳曰王烈字長能邯鄲人也常服黄精又曰白菟公服黃精而得仙永嘉記曰黄精出松陽永寕縣遊名山志曰名室藥多黄精博物志曰黄帝問天姥曰天地所生豈有食之令人不死者乎姥曰太陽草名黄精餌食之可以長生胡麻廣雅曰狗蝨鉅勝藤苰胡麻也孝經援神契曰鉅勝延年宋均注曰丗以鉅勝爲狗𣏌子晉書安帝紀曰殷仲堪在荆州以胡麻爲廪廣志曰胡麻一名方莖服之不老奈風濕其葉名青襄也淮南子曰汾水濛濁而冝胡麻列仙傳曰關令尹喜與老子俱之流沙西服鉅勝實莫知所終魯女生別傳曰女生長樂人也少好道𥘉服餌胡麻及术絶糓八十餘年更少壯色如桃華一日能行三百里走及麞鹿抱朴子曰胡麻好者一石蒸之如炊湏暴乾復蒸丸和細篩白蜜丸如雞子曰二枚一年面色羙身體滑二年白髪黒三年齒落更生四年入水不濡五年入火不燋六年走及奔馬或蜜水和作餅如糖狀炙食一餅抱朴子内篇曰胡麻服餌不老耐風濕吴氏本草曰胡麻一名方金一名狗蝨神農雷公甘平無毒立秋採青襄一名蔓神農苦雷公甘本草經曰胡麻一名巨勝味甘平生川澤治傷中虛羸𥙷五藏益氣乆服輕身不老生上黨崔寔四民月令曰二月可種胡麻謂之上時也當歸爾雅曰薜山靳廣雅曰山芹當歸今似芹而麤大靳音巨中切吴志曰曹公聞太史慈名遺書以篋封之發看無所道但貯當歸魏氏春秋同異曰姜維得母書并當歸維曰良田百頃不在一畝但有逺志不見當歸其皆親殉利如此范子計然曰當歸出隴西無枯者善秦州記曰隴西襄武縣有牛山是出當歸建康記曰建康出當歸不堪用廣州記曰鄣平縣出當歸博物志曰神農經曰下藥治病謂大黄除實當歸止痛崔豹古今注曰牛亨問將離别相贈以芍藥何也荅曰芍藥一名何離故將別贈以芍藥猶相招則贈以䕷蕪䕷蕪一名當歸也本草經曰當歸一名干歸味甘温生川谷主治逆止氣温瘧寒熱生隴西吴氏本草曰當歸神農黄帝桐君扁鵲甘無毒歧伯雷公辛無毒季氏小温或生羗胡地逺志爾雅云葽烏丁切繞蕀蒬今逺志也似麻黄赤華葉說而黄其上爲之小草棘蒬音棘冤抱朴子曰内篇曰陵陽仲服逺志二十年有子三十七人坐在立亡世說曰謝太傳始有東山之志後命屬不獲巳始就桓公司馬于時人有致桓公藥草者中有逺志公取以問謝此藥又名小草何以物有二稱謝未即荅尓時郝隆在坐謝因曰郝叅軍多知識試復通看郝應聲曰荅此甚易解處則爲逺志出則爲小草於是謝公殊有愧色桓目謝而笑曰郝叅軍此通乃不惡亦甚有㑹本草經曰逺志一名棘宛一名要繞乆服輕身不忘葉名小草生太及山及宛句細辛山海經曰浮戯之山東有蛇谷上多少辛管子曰五沃之土羣藥生少辛范子計然曰細辛出華隂色白者善名山志曰松陽諸山草多細辛永嘉記曰細辛出松陽本草經曰細辛一名少辛味温生山谷治欬逆明目通利九竅乆服輕身生華隂吴氏夲草曰細辛一名小辛一名細辛神農黃帝雷公相君辛小温歧伯無毒季氏小寒如葵葉赤色一根一葉相連二月八月採根續斷范子計然曰續斷出三輔廣州記曰鄣平縣岀續斷本草經曰續斷一名龍豆味苦微温生山谷治傷寒𥙷不足金瘡癕傷折跌續筋骨婦人乳難崩中漏血乆服益力生常山吴氏本草曰龍蒭一名龍多一名龍鬢一名續斷一名龍木一名草毒一名龍華一名懸莬神農季氏小寒雷公黃帝苦無毒扁鵲辛無毒生梁州七月七日採范注万曰續斷即是馬䔓與水䔓菜相似但大於小䔓葉似旁翁菜葉但小厚兩邊有刺刺人其華紫色肉蓯蓉本草經曰肉蓯蓉味甘微温生山谷治五勞七傷𥙷中除莖中寒熱飬五藏强隂益精氣多子婦人癥瘕乆服輕身生河西吴氏本草曰肉蓯蓉一名肉蓯蓉神農黃帝鹹雷公酸李氏小温生河東山隂地長三四寸藂生或代郡鴈門二月八月採隂乾用之藷藇山海經曰升山草多藷藇上藷署二音下余預二音湘中記曰永和𥘉有採藥衡山者道迷粮盡過巖下見一老公與四五年少對坐執書告以飢與之食物如署䂊指教所去五六月至家而不腹飢范子計然曰儲餘本岀三輔白色者善本草經曰署䂊一名山芋味甘温生山谷治傷中虚羸𥙷中益氣力長肌肉除邪氣寒熱乆服輕身耳目聦明不飢延年山嵩髙吴氏本草曰署䂊一名諸署秦楚名玉延齊越名山羊鄭趙名山羊一名玉延一名脩脆一名兒草神農甘小温桐君雷公甘無毒或生臨朐踵山始生赤莖細蔓五月華白七月實青黄八月熟落根中白皮黄類芋二月三月八月採根惡甘遂曹毗杜蘭香傳曰蘭香降張碩與三署預實曰食此可以辟霧露碩食二懷一欲以歸香曰可自食不得持去異苑曰署預一名山羊根旣入藥又復可食若掘取黙黙則獲唱名者不可得地黄爾雅曰苄音户地黃郭璞注曰一名地髓江東呼苄也抱朴子曰楚文子服地黃八年視有光手上車弩本草經曰地黄一名地髓治傷中長肌肉生咸陽太平御覽卷第九百八十九
