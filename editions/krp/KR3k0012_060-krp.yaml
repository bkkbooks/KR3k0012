front:
  text: 太平御覽卷第六十
  hash: sha256:9228baf90dadddeeb4f6bd7939ae1a31add83d5d2f28804b218722f24b8f58db
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_060-1a}
body:
  text: 地部二十五海江海釋名曰海晦也注引穢濁其水黒而晦也廣雅同說文曰海天池也書曰江漢朝宗于海禮記曰三王之祭川也皆先河而後海又曰洗之在阼其水在洗東祖天地之左海也禮斗威儀曰君乗土而王則海夷宋均注曰海夷不楊波論語曰子曰道不行乗桴浮于海公羊傳曰河海潤千里河海出雲及千里春秋感神符曰后妃恣則澤爲海春秋考異郵曰黃星騁海水躍宋均曰黃星土精土安靜躍則失常史記曰天不足西北星辰西北移地不足東南以海爲池漢書曰霍去病擊匈奴封狼居胥山登臨瀚海如淳注曰北海也謝承後漢書曰汝南陳茂嘗爲交阯別駕舊刺史行部不渡漲海刺史周敞渉海遇風舡欲覆沒茂抜劒訶罵水神風即止息晉書鮑靚爲南海守嘗行部入海遇風飢甚聚白石煑食之以濟又曰李㳙遼東人祖敏漢河内太守去還郷遼東太守公孫度欲強用之敏乗輕舟浮海莫知所終王隱晉書曰慕容晃上言曰臣躬征平郭逺假陛下天地之威將士竭命精誠感靈海爲結氷凌行海中三百餘里臣自立國及諸故老初無海水氷凍之歳韓詩成王時越裳氏重三譯而朝曰天下不逆風疾雨海之不波溢三年矣中國必有聖人老子曰江海所以能爲百谷王者以其善下也列子曰渤海之東不知幾萬億里有大壑無底之谷名曰歸塘張堪注日莊子云尾閭也莊子曰東海之鼈謂坎井之鼁曰夫海千里之逺不足以舉其大千仞之髙不足以極其深禹之時九年十潦而水弗加益湯之時八年七旱而涯不加損夫不爲頃乆推移不以多少進退者此亦東海之樂也又曰南海之帝爲儵北海之帝爲忽中央之帝爲渾沌儵與忽時相與遇於渾沌之地渾沌待之甚厚儵與忽謀報渾沌之德曰人皆存七竅以視聽食息此獨無有嘗試鑿之一日鑿一竅七日而渾沌死又曰肩吾曰其於治天下也猶渉海鑿河使蛟負山也又海水三歳一周流波相薄故地動又曰周顧視車轍有鮒魚焉曰我東海之波神也君豈有斗升之水活我哉又曰北溟有魚其名曰鯤化爲鳥其名曰鵬將徙於南溟撃水三千里又曰秋水時至百川灌河諸涯之間不辦牛馬河伯欣然自喜以天下之美爲盡在已順流東行至於北海東靣而視不見水端向若而歎北海若曰井蛙不可以語於海者拘於墟也夏虫不可以語於冰者篤於時也曲士不可以語於道者束於教也天下之水莫大於海萬川歸之不知何時止而不盈尾閭泄之不知何時巳而不虚春秋不變水旱不加此過江河之流不可爲量數司馬彪曰尾閭水之從海外岀者也丈子曰古之善爲君者法海以象其大注下以成其廣淮南子曰彗星墜而渤海決又曰海不讓水積小以成其大又曰庶女告天庶女少寡無子養姑者也姑無男有女女利母財而殺母以誣告寡婦婦不能自解故告天也雷霆下擊景公臺隕景公齊景公也雷擊景公臺隕壞之也枝體傷折景公爲雷霆所傷折海水大岀又曰舟在江海不爲莫乗而不浮君子行義不爲莫知而止休孟子曰觀於海者難爲水遊於聖人之門者難爲言抱朴子曰大厦旣燔而運水於滄海此無及也說苑曰齊景公遊於海上而樂之六月不歸告左右曰敢有先言歸有致死不赦顔燭進諌曰君樂治海不樂治國彼若有治國者君安得樂此海乎遂歸中道聞國人謀不内之法言曰百川學海而至于海丘陵學山而不至于山山海經曰大荒中有山名曰天臺海水入焉又曰桂林八樹在賁海東八樹而成林言其大也賁隅今畨隅也又曰發鳩之山有鳥名曰精衛炎帝之女遊于東海溺而不返是故精衛常取西山之木石以堙東海周景式孝子傳曰管寧避地遼東遇風舡人危懼皆叩頭悔過寧息惟諐咎念嘗如厠不冠而巳向天叩頭風亦㝷静神仙傳曰麻姑謂王方平曰自接侍以來見東海三爲桑田向到蓬萊水乃淺於往者略半也豈復將爲陵陸乎皇甫謐髙士傳曰姜肱字伯淮十辟公府九舉有道皆不就靈帝時曹節白帝徴肱隱身遯命浮桴入海名盖天下幽明録曰海中有金臺山髙百丈結搆巧麗窮盡神工撗光嚴渚竦曜星門臺内有金机彫文備制十洲記曰扶桑在碧海之中北靣一万里有大帝宫太眞東王公所治處山外别有貟海繞山貟海水色正黒謂之溟海無風而洪波百丈唯飛仙能到其處玄中記曰天下之強者東海之沃焦焉水灌而不巳沃焦者山名也在海東三萬里博物志曰舊說天河與海通近世有居海渚年年八月有浮查去來往反不失期此人乃立屋於查上賫粮乗查去忽不覺盡夜奄至一處有城廓屋舎望見室中多織婦見一丈夫牽牛渚次飲之驚問此人何由至此此人即問此爲何處荅曰君可詣蜀問嚴君平此人還問君平曰某月有客星犯斗牛即此人到天河也崔鴻十六國春秋前燕録曰慕容晃將乗海討其苐仁襲其不意群臣以凌道危阻冝從陸路晃曰舊海水陵自仁反巳來三凍皆成昔光武合滹沲之冰以濟大業天其或者欲乗此而尅之乎吾計决矣沮謀者斬二月晃親率三軍擒仁賜死東方朔十洲記曰祖洲東海中地方五百里上有不死草生瓊田中草似菰苗人巳死者以草覆之皆活又曰扶桑在碧海中樹長數千尺一千餘圍兩兩同根更相依倚是以名扶桑關令内傳曰天有五億五万五千五百五十里地亦如之各以四海爲脉江釋名曰江公也小水流入其中所公共也說文曰江水岀蜀湔氐徼外㟭山又曰江至㑹稽郡爲浙江尚書曰岷山導江東別爲沱毛詩曰江有沱江有汜又曰滔滔江漢南國之紀春秋元命苞曰牛女爲江湖江湖者所以開神潤化故其氣遄急家語曰楚昭王渡江江有物大如斗圎而赤直觸王舟舟人取之王大怪使之魯問孔子孔子曰此萍實也可剖而食之吉祥唯覇者能獲之使返王遽食之甚美謝承後漢書曰呉郡沈豊爲郡主薄太守第五倫母老不能之官倫每至臈節常感戀垂泣遣豊迎母廣陵母見大江畏水不敢渡豊祭神令子孫對母飲酒因醉卧便渡又曰呉郡王閎渡錢塘江遭風舡欲覆閎拔劒斫水罵伍子胥風息得濟續漢書曰張禹拜楊州刺史當過江行部中土人皆以江有子胥之神難於濟渉禹厲聲言曰子胥如其有靈知吾志在理察枉訟豈危我哉遂鼔而過魏志文帝伐呉至長江而漢曰天固以限南北也晉書祖逖北渡江中流誓曰逖不静中原而復濟者有如大江又曰呉猛年四十邑人丁義始授神方因還豫章江波甚急猛不假舟檝以白羽扇畫水而渡又曰王濬有竒略武帝謀伐呉詔濬造舡於蜀其木柿蔽江而下又曰陶偘語人曰大禹聖人乃惜寸隂至於衆人當惜分隂叅佐以戯廢事者乃取其蒱博之具悉投于江莊子曰魚相忘於江湖孫卿子曰子路盛服見孔子孔子曰由是檐䄡者何也昔者江出於汶山其始由源可以濫觴及其至江之津也不方舟不避風不可渉非唯下流大耶今汝衣服旣盛顔色充盈天下且孰肯諌汝乎三十國春秋曰劉𥙿次山陽聞何無忌敗績卷甲兼行將濟江而風急衆咸難之𥙿曰若有天命風當自息如其天不助舟覆溺何足可怪即命登舟舟移而風止董覽呉地記曰夫差立子胥以忠諌見亡遂賜死浮尸于江夫差悔焉與群臣於江設祭列仙傳曰江妃二女遊於江濵逢鄭交甫遂解佩與交甫受珮而去去數十歩懷中無佩女亦不見列女傳曰楚昭王貞姜者昭王夫人齊女也昭王出遊留夫人漸臺江水大至遣使者迎夫人忘持符夫人曰王與宫人約召必以符今使者不持符妾不敢行於是使者返取符未還臺巳壞沉水而死又曰廣漢姜詩妻事姑至孝姑好飲江水水去家七里妻常鷄鳴泝流而汲值風雪不時得水詩責遣之妻寄隣家紡績以市珎味使隣母遺姑詩聞追還舎側忽有涌泉岀味如江水華陽國志又載論衡曰儒書言伍子胥恨吴王驅水爲濤而溺殺今㑹稽錢塘丹徒江皆立子胥祠欲止其濤也袁山松冝都記曰對西陵南岸有山其峯孤秀人自山南上至頂俯臨大江如縈帶視舟舡如鳬鴈又曰大江清濁分流其水十丈見底視魚游如乗空淺處多五色石新序曰禹南濟于江黄龍負舟舟中之人失色禹仰視天而歎曰吾受命於天死生命也龍弭耳而逃呉録曰歩騭表言北降人說北多作而囊欲以盛沙塞大江呉主曰此曹必不敢来若不如孤言當以牛千頭爲君作主人後見吕岱說騭言北欲以囊塞江輙失笑曰此江自開闢以來寜可以囊塞乎水經注曰昔呉郡太守張公直自九江守徴還道由廬山子女觀祠女戯廟像其妻夜夢神人致娉覺言於夫至明恐怖遽發舡引中流而不行妻曰愛一女而合門受禍也公直不忍遂令妻下女於江其妻布廗水上以其亡兄女代之而舡得進㝷公直知兄女怒妻曰吾何靣於當世也復下巳女於水中將渡遥見二女於岸側傍有一吏立曰吾廬君主簿敬君之義悉還二女風俗通曰江貢也所出珎物可貢献也荆州記云江出泯山其源若甕可以濫觴在益州建寜漏江縣潜行地底數里至楚都遂廣十里傅子曰江海所以能爲百谷王者以其不逆之苟有所逆衆流不至多矣太平御覽卷第六十
