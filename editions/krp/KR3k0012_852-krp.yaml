  text: 太平御覽卷第八百五十二
  hash: sha256:cc22bd331d74b66b6ae0542603670ed2799f5584cb327ec7ce7ab76d316f5f12
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_852-1a}
body:
  text: 飲食部十䴺􅲑甘脆安乾特餳飴餳同序䴺􅲑束晢餅賦曰䴺􅲑髓燭甘脆范汪祠制曰孟夏祭下甘脆安乾特束晳餅賦曰安乾粔籹之倫盧諶祭法曰四時祠皆用安乾特餳禮記内則曰棗栗飴蜜以甘之方言曰餳謂之張皇即乾飴也飴謂之䬵音該餳謂之餹江東皆言餹也凢飴謂之餳自關而東陳魏宋楚衛之間通語說文曰飴米蘖煎也飴餳和饊也釋名曰餳洋也煑米消爛洋洋然也飴小弱於餳形怡怡然也哺餔也如餳而濁可哺也後漢書曰明德馬皇后報章帝曰吾但當含飴弄孫不能復關政矣東觀漢記曰野王獻甘膠膏餳毎作大發吏以爲饒利樊閎知之臨薨奏焉四王起事曰惠帝到華隂河間王遣使上甘菓餔二百幡幽明録曰王胤祖安國張顯等以太元中乗舡見仙人賜糖飴三餅大如比輪錢厚二分淮南子曰栁下惠見飴曰可以養老盗跖見飴可以粘牝見物同而用之異也壯門户籥壯也塩鐵論曰洗爵以盛水升降而進糖禮雖備然非其貴也丗說曰王君夫飴餔澳釡楚辭招魂曰粔籹蜜餌有張皇張皇賜也張衡七辨曰沙飴石蜜逺國貢儲崔寔四民月令曰十月先水凍作煑餳煑暴飴盧諶祭法曰冬祠用荆餳太平御覽卷第八百五十二
