front:
  text: 太平御覽卷第六百一十四
  hash: sha256:8551b2560a9ded63dc08b0fbc8bfe7c0cafff5c5b677a41b71e6db28bfa92370
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_614-1a}
body:
  text: 學部八㓜學晚學好學廢學㓜學禮記學記曰糿者聽而不問學不躐等也又曲禮曰十年曰㓜學論語爲政曰子曰吾十有五而志于學三十而立學成能有所立漢書曰東方朔十三學書三冬文史足用十五學擊劒十六學詩書誦二十二萬言十九學孫吴兵法鉦鼓之教亦誦二十萬言時莫之比司馬彪續漢書曰荀恱十二能讀春秋貧無書毎至市間閱篇牘一見多能誦記後漢書曰張堪早孤讓先父餘財數百萬與兄子年十六受業長安志美行厲諸儒號曰聖童魏志曰鍾㑹母性矜嚴勤見規誨四歳授孝經七歲誦論語八歳誦詩十歳誦尚書十一誦易十二誦春秋左氏國語十三誦周禮十四誦成侯易記十五便入太學問四方竒文異訓謂㑹曰學猥則倦倦則意怠故以漸訓汝今可以獨學矣西晉趙至字景真年十四隨人入太學觀書時嵇康於學寫石經古文異事訖去遂逐車問康異而語之爲諸生宋書曰王儉㓜篤學手不釋卷賔客或相稱美僧䖍曰我不患此兒無名正恐名太盛耳乃手書崔子玉坐右銘以貽之丹陽尹袁粲聞其名及見之曰宰相之門栝栢豫章雖小巳有棟梁氣矣南史曰虞荔字山披㑹稽餘姚人也㓜聦敏有志操年九歳隨從伯闡候太常陸倕問五經十事荔對無遺失倕甚異之太守衡陽王辟爲主簿荔又辭以年小不就後魏書曰祖瑩字元珎范陽人年八歳能誦詩書十二爲中書博學躭書以晝継夜父母恐其成疾禁之不能止常宻於灰中藏火駈逐僮僕父母寢睡後燃火讀書以衣𬒳蔽䆫户恐漏光明爲人所覺内外親戚呼爲聖小兒又曰任城王澄子順字子和年九歳師事樂安陳豊𥘉書王羲之小學篇數千言晝書夜誦旬有五日一皆通利豊竒之白澄曰豊十五從師迄于白首耳目所經未見此比江夏黄童不得無雙也澄笑曰藍田生玉何容不尓十六通杜氏春秋恒集門生討論同異三國典略曰齊王紘字師羅太安狄郡人北豫州刺史基之子也年十三楊州刺史郭元貞撫其背曰汝讀何書對曰誦孝經元貞曰孝經云何曰在上不驕爲下不亂元貞曰吾作刺史豈其驕乎紘曰雖不驕君子防未萌亦願留意梁書曰西陽王大鈞性厚重不妄戲弄年七歳武帝問讀何書對曰學詩因令諷誦即誦周南音韻清雅帝重之因賜王羲之書一卷三國典略曰梁孝元字丗誠𥘉年五歳梁武問曰讀何書對曰能讀曲禮梁武曰汝試言之孝元即誦上篇左右莫不驚歎及長精神爽儁殷興通語曰殷禮字往嗣幼而郷里異之七歳就官學書在師未甞戲弄諷誦恒不爲聲潜識而巳師殺雞詣禮父穎曰賀此子能興君門行在舟車手不釋卷從曲阿往返遂不知隄瀆廣狹及行旅喧閙未甞視之時人語曰竒才強記殷往嗣後與張温使蜀至荆州虎牙遭水衆人失色往嗣見之無異諸葛亮見之歎曰東吴菰蘆中乃有此竒偉晚學國語曰晉文公問元帥於趙衰元帥上卿對曰郄縠可行年五十矣縠晉大夫守學弥惇夫先王之法德義之府也志記德義生民之本也能惇篤者不忘百姓也請使郄縠公從之說苑曰晉平公問師曠曰吾年七十欲學恐晚如何對曰少年如日出之光二十而學如日中之光老學如炳燭之明孰與夜行乎公曰善哉後漢書曰獻帝詔曰孔子歎學之不講講者習也不講則所識日忘今耆儒年踰六十去離本土營求粮資不得專業結童入學白首空歸長委農野永絶榮望朕甚愍焉其依科罷者聽爲太子舎人劉艾獻帝紀曰時長安中謡曰頭白皓然食不充粮褁衣褰裳當還故郷聖主愍念悉用𥙷郎舎是布衣𬒳服玄黄齊書曰張充字延符少好逸遊父緒甞告歸至吴始入西郭逢充獵右臂鷹左牽狗遇舡至便放紲脫韝拜於水次父緒曰一身兩役無乃勞乎充曰充聞三十而立今充二十九矣請至來年緒曰過而能改顔氏子焉延明年便改多所該通唐書曰姚元崇玄宗獵于渭濵上曰卿頗知獵乎元崇曰臣少居廣城大澤不知書唯以射獵爲事年四十方遇張憬藏謂臣當以文學備位將相無爲自弃尓來折節讀書今雖官位過忝至於馳射老而猶能於是乎驅鷹放犬遟速稱旨上大恱曰乆不見卿思有顧問卿可於宰相行中行常後上縱轡乆顧之曰卿行何後公曰臣官踈賤不合叅宰相行上曰可兵部尚書平章事桓子新論曰髙君孟頗知律令常自伏冩書署郎哀其老欲代之不肯云我躬自冩乃當十遍讀魏應璩荅韓文憲書曰昔公孫引皓首入學顔涿聚五十始渉師門朝聞道夕殞聖人所貴足下之年甫在不惑如以學藝何晚之有若能上迨南榮忘食之樂下踵寧子黒夜之勤窮文盡義無微不綜規冨貴之榮取金紫之爵是夏侯勝拾芥之謂也好學論語曰子曰十室之邑必有忠信如丘者焉不如丘之好學也巳矣又曰有顔淵者好學不遷怒不貳過不幸短命死矣今也則亡未聞好學者也又曰孔文子何以謂之文也子曰敏而好學不恥下問是以謂之文又曰我非生而知之者好古敏以求之也又曰子夏曰日知其所亡月無亡其所能可謂好學也巳禮記檀弓上曰孔子與門人立拱而尚右二三子亦皆尚右孔子曰二三子之嗜學我則有姉之喪故也二三子皆尚左新序曰葉公諸梁問樂王鮒曰晉大夫趙文子爲人何若對曰好學而受規諌仁也江出岷山其源若甕口至楚國其廣十里無它故其下流多也好學受規諌冝乎立哉漢書曰陳平少時家貧好讀書治黄帝老子之術兄伯常耕田縱平遊學東觀漢記曰馮豹字仲文好儒學以詩傳教授郷里爲之語曰道德斌斌馮仲文又曰和熹鄧后七歳讀論語志在書傳母常非之曰當習女工今不是務寧當學博士耶后重違母意晝則縫紉夜私買脂燭讀經傳宗族外内皆號曰諸生范曄後漢書曰荀爽㓜好學太尉杜喬見而稱之曰可爲人師爽遂躭思經書慶弔不行徴命不應張璠漢記曰朱穆字公叔好學專精每一思至中食失飡行墜坑坎亡失冠履其父常言穆大專幾不知馬之幾足後漢書曰張覇就樊儵受嚴氏公羊春秋遂博覽五經諸生孫綝劉固等慕之各市宅其傍以就學耶魏書曰吉茂字叔暢好書不耻惡衣惡食而耻一物之不知建安𥘉與扶風蘇則共入武功南山精思數歳北齊書曰劉逖字子長少而聦敏在遊宴之中卷不離手值有文籍所未見者則終日諷誦或通夜不歸其好學如此也文士傳曰李庸字蕭逺篤志好學善屬文詞藻清美常燃柴草火以讀之南史曰梁劉峻字孝摽平原人也永明中從桑乾還自謂所見不博更求異書聞京師有者必往祈借清河崔蔚祖謂之書淫北史曰隨劉臻爲儀同性怳忽躭經史經日覃思至於丗事多所遺忘有劉訥者亦任儀同俱爲太子學士情好甚宻臻住南訥住東臻甞欲㝷訥謂從者曰汝知劉儀同家乎從者不知㝷訥謂還家因荅曰知於是引之而去旣扣門臻尚未悟謂至訥家乃據鞌大呼曰劉儀同可出矣其子迎門臻驚曰汝亦來耶其子荅曰是大人家於是顧盻乆之乃悟叱從者汝大無意吾欲造劉訥耳杜預自叙曰少而好學在官則勤於吏治在家則滋味典籍玄晏春秋曰余家素貧窘晝則務作於勞夜則甘疲寐及二時之務書卷生塵篋不解緘唯季冬裁得一旬學或兼夜寐或戲獨否或對食忘飡或不覺日夕是以遊出之事吉凶略絶冨陽男數以全生之道誨予方之好色號子爲書帙廢學毛詩緇衣曰子衿刺學校廢也丗亂則學校不脩焉青青子衿悠悠我心縱我不往子寧不嗣音尚書曰不學牆面涖事惟煩論語曰德之不修學之不講是吾憂也左傳曰學者植也不學將落也史記曰周道旣廢焚燒詩書故明堂石室金匱玉板圖籍散亂也又曰始皇諸生到者拜爲郎七百人宻種瓜於驪山山温成實令諸生就視說之人人不同乃爲伏機方難未定機發從上土填之其坈在陽西南三望里今爲閔儒郷也又曰秦始皇令天下有藏詩書百家語者悉詣守尉燒之敢偶詩書者棄市以古非今者族之漢書曰夫子没而微言絶七十子終而大義乖前漢書曰綘侯不好文學毎召諸生東向坐而責之不以賔主之禮相接東觀漢記曰班超字仲升家貧爲官傭冩書輟書歎曰文夫當効傳介子張騫立功異域以取封侯安能乆事筆硯乎三國典略曰齊許惇無學術與邢劭魏收等同列諸人談說經史惇隱几而睡深爲勝流所輕梁書曰栁津字元舉性強直乏風華或勸之聚書津曰吾甞令道士上章驅鬼安用此鬼名耶隋書曰宇文慶沉深有器局少以聦敏見知周𥘉受業東觀頗渉經史旣而謂人曰書足記姓名而巳安能乆事筆硯爲腐儒之業于時文州民夷相聚爲亂慶應募從征賊保據巖谷徑路懸絶慶束馬而進襲破之以功授都督唐書曰馬燧少甞與諸兄讀書乃輟卷歎曰天下將有事矣丈夫當立功征伐以濟四海安能矻矻爲一儒也西京雜記曰傳介子年十四好學書常弃瓢而歎曰大丈夫當立功絶域何能坐爲散儒卒斬匈奴使者還報拜中郎將後復斬樓蘭王首封義陽侯金樓子曰曹子文少善射御力格猛獸不避險阻數從征伐志意慷慨魏武常抑之曰汝不念讀書而好乗馬擊劒此一夫之用何足貴也太平御覽卷第六百一十四
