front:
  text: 太平御覽卷第七百一十六
  hash: sha256:e4cbf59b68ba75add499fb0e648b4a4393eff4ba47fae31b4cb6c8d5195d93ce
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_716-1a}
body:
  text: 服用部一十八手巾絮巾手巾漢名臣奏曰王莽斥出王閎太后憐之閎伏泣失聲太后親自以手巾拭閎泣英雄記曰在尊者前冝各具一手巾不冝借人巾用江表傳曰孫權尅荆州將吏悉皆歸附而潘濬涕泣交横慰勞與語使親近手巾拭其靣東宮舊事曰太子納妃有百濟白手巾也廣志曰炎州以火浣布爲手巾博物志曰魏文帝善彈碁能用手巾角竹林七賢論曰王戎雖爲三司率尔私行巡省園田不從一人以手巾挿腰戎故吏多大官相逢輙下道避之名山略記曰鬱州道祭酒徐誕常以治席爲事有呉人姓夏侯來師誕忽暴病死終冬渉春有長沙門從北來於道中見夏侯云被崑崙召不得辭師寄手巾爲信誕得手巾乃本所送入棺者志怪曰㑹稽人呉詳見一女子溪邊洗脚呼詳共宿明旦别去女贈詳以紫巾詳荅以白布手巾神仙服食經曰伏苓如拳者着手巾中百鬼消滅秦嘉婦與嘉書曰今奉越布手巾二枚絮巾漢書儀曰皇后親蚕絲絮織室作祭服皇后得以作絮巾魏畧曰趙歧避難至北海着絮巾市賣餅鄴中記曰石虎皇后岀以女騎一千爲鹵簿冬月皆絮綸巾博物志曰蜀人以絮巾爲帽絮太平御覽卷第七百一十六
