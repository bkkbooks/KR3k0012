front:
  text: 太平御覽卷第九百六十六果部三
  hash: sha256:580e03742de5e8128b8d9390a1826894675e51abd1771979f815a57687ea3093
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_966-1a}
body:
  text: 甘橘甘謝承後漢書曰丹陽張磐字子石爲廬江太守㝷陽令甞餉一奩甘其小男年七歳就取一枚磐奪取付外卒以兩枚與之磐奪兒甘鞭卒曰何故行賂於吾子宋書曰彭城王義康時四方獻饋皆以上品薦義康而以次者供御上甞冬月啖甘歎其味並劣義康在坐曰今年甘殊有佳者遣人還東府取甘大三寸又曰元嘉末魏太武征彭城遣使送九種塩并胡皷仍求黄甘梁書曰吕僧珎旣有大勲任惣心膂性甚恭慎當直禁中盛暑不敢解衣每侍御座屏氣鞠躬果食未甞舉筯甞醉後取一甘食武帝笑謂曰卿今日便是大有所進禄外令月給錢十萬唐書曰羅浮甘子開元中始有山僧種於南樓寺其後常資進獻幸蜀幸奉天之歳皆不結實又曰天寳中中書門下奏曰臣等今日因奏事承徳音聞江南爲橘江北爲枳蓋以地氣有殊物性因變朕近於宮内種甘子樹數株今秋巳來結實一百五十顆乃與江南及蜀道所進無別亦可謂稍異也晉今曰閬中縣置守黄甘吏一人風土記曰甘橘之属滋味甜羙特異者也有黄者有赬者赬者謂之壷甘廣志曰甘有二十一核有成都平蔕甘大如升色蒼黄犍爲南安縣出黄甘神異經曰東方朔云東南外有建春山其上多羙甘樹京口記曰京城東門射堂前柑樹十餘株盧諶祭法曰冬祠用柑襄陽記曰李衡字叔平爲丹陽太守衡每欲治家妻輙不聽後密遣十人於武陵龍陽洲上作宅種柑千樹臨死勑兒曰汝母悪吾治家故窮如是吾州里有千頭木奴不責汝衣食歳上一疋絹亦足用矣及衡甘成歳得絹數千疋荆州記曰枝江有名甘冝都郡舊江北有甘園名冝都甘湘州記曰州故大城内有陶侃廟地是賈誼故宅誼時種甘猶有存者崔豹古今注曰甘實形如石榴者謂爲壷甘也唐新語曰益州每歳進甘子皆以紙裏之他時長吏嫌𥿄不敬代之細布旣而恐甘子爲布所損每懷憂懼俄有御史甘子布至長吏以爲推布裹甘子事懼曰果爲所推及子布到驛長吏但叙以布裹甘子爲敬子布𥘉不之知乆而方晤聞者莫不大笑又曰安禄山將反宰臣韋見素請以平章事追之玄宗許焉草詔訖中留之遣中使輔璆琳送甘子且觀其變璆琳受賂而還因言無反狀玄宗謂宰臣曰禄山必無二心詔夲朕巳焚矣異苑曰河内司馬元㣧元嘉中爲新淦令䘮官月旦設祭甘化而爲鳶又曰南康皈羙山石城内有甘橘橙柚就食其實任意取足脫持歸者便遇大虺或顚仆失俓家人啖之亦病述異記曰南康郡有東望山營民入山頂有湖清深又有菓林周四里許衆菓畢植間無雜木行列整齊如人功也甘子熟三人共食致飽訖懷二枚欲以示外人便還㝷覔向逕迴旋半日迷不能得即聞空中語云放雙甘乃聽汝去懷甘者恐怖放甘於地轉眄即見歸逕乃相與俱却返廣古今五行記曰唐髙宗調露中連州見一甘樹四月中有子如拳大剖之有兩頭虵又曰唐光宅中李崇真任益州刺史廳事前有甘樹有子大如雞子晚熟微小有孔如針郡官咸異之方欲將進乆而方罷因剖之得一赤班虵長尺餘崇真後爲兵所殺王廙洛都賦曰若夫黄甘荔支殊逺之珎雖非方土之所産重九譯而來臻潘安仁笙賦曰披黄苞以授甘傾縹瓷以酌醽張載詩曰三巴黄甘瓜州素禁渇者所思銘之裳帶郭璞柚讃曰厥苞橘柚精者曰甘孔坦表曰天恩例賜酃酒黄甘不勝受遇謹表以聞張衡七辯曰離支黄甘宗炳甘頌曰煌煌嘉實磊如景星南金其色隨侯厥形橘焦贑易林剥之屯曰北山有萊橘柚所聚荷囊戴畚盈我筐筥尚書禹貢曰淮海惟楊州厥苞橘柚錫貢小曰橘大曰柚其所苞而致者也錫命乃貢言不嘗出周禮冬官上考工記曰橘踰淮而北爲枳此地氣然也春秋運斗樞曰旋星散爲橘史記曰蘇秦說燕文侯曰君誠能聽臣齊必置魚塩之海楚必致橘柚之園漢書曰江陵之千樹橘其人皆與千户侯等東觀漢記曰馬援好事至荔浦見冬筍名曰苞荀上言禹貢厥苞橘柚疑謂是也又曰建武中單于來朝賜橙橘謝承後漢書曰張磐爲廬江太守㝷陽令餉橘一奩小男年七歳卒以兩橘與之磐還橘鞭卒具甘部又曰沛國桓嚴字文林罷鄧縣舎楊州從事屈豫室廷有橘樹一株遇其實熟數垂室内嚴乃以竹蕃樹四靣時風吹動兩實墮地以書繩縛繋樹枝後漢書曰廉范爲成都太守部人楊由善風雲占候甞有風吹削哺哺當作材音孚廢切太守以問由對曰方當有薦木實者其色黄赤頃之五官椽獻橘數苞益部耆舊同魏志曰倭國有橘不知滋味吴志曰陸績年六歳於九江見袁術岀橘績懷三枚拜辭墮地術謂曰陸郎作賔客而懷橘乎績跪荅曰欲歸遺母術大竒之吴録地理志曰朱光禄爲建安郡中庭有橘冬月樹上覆裹之至明年春夏色變青黒味尤絶羙上林賦云盧橘夏熟盧黒也蓋近是也吴暦曰吴王饋魏文帝大橘魏文帝詔羣臣曰南方有橘酢正裂人牙時有甜耳建武故事曰咸和六年平西將軍庾亮送橘十二實共同一柢以爲瑞異百官畢賀中興書曰王者德盛則嘉朱生橘亦嘉味之流晉宮閣名曰華林園橘十一株宋書曰孝武大明中芳香琴堂東西有雙橘連理改芳香琴堂爲連理堂齊書曰豫章王嶷薨忽見形於第後園乗腰輿指摩處分呼直兵直兵無手板左右授一玉手板與之曰橘樹一株死可覔𥙷之因出後園閤直兵倒地仍失手板南史曰虞愿始數歳家中橘樹冬熟諸兒競來取之愿獨不取家人皆異之三國典略曰梁侯景未平王僧辯獻嘉橘一帶二十五子于湘東王王荅之曰昔文康獻橘十有二子用今方古彼有慙色今景之兇悪旣稔凱歌之聲巳及嘉瑞逺臻但増鯁慰晏子曰晏子使楚楚王謂其左右曰晏嬰習辤者也吾欲傷之坐定而縳一人至問何爲曰齊人坐盗王視晏子曰齊人善盗乎晏子對曰嬰聞橘生於淮北則爲枳枝葉徒似其實味不同水土異也今民生於齊不盗入楚得無俲楚民善盗耶王笑曰寡人取病焉又曰晏子使楚楚王進橘置削晏子并食不剖王曰橘當云剖對曰臣聞之賜人主前者瓜桃不削橘柚不剖今者萬乗無教故不敢剖臣非不知也荘子曰三王五帝之禮義法度譬猶樝梨橘柚其味相反而皆可適於口淮南子曰夫橘樹之江北化而爲橙吕氏春秋曰常山之北投淵之上有百菓焉羣鳥所食箕山之東靑馬之所有甘櫨焉箕山許由隱所青馬崑崙山東矣江浦之橘雲夢之柚漢上之菤所以致之菤菤且也音卷山海經曰洞庭之山其木多橘正論曰橘柚之貢堯舜不甞山龍華虫帝王不以爲䙝服而命臣餘黄甘厭文繡者蓋以萬數者也鹽鐵論曰孝武皇帝平百越以爲園圃而民皆厭橘柚宋躬孝子傳曰王靈之廬陵西昌人䘮父母二十年鹽酢不入其口所住屋夜有光廷中橘樹隆冬三實㑹稽先賢傳曰嚴遵從光武遇蜀郡獻橘栗上持付公卿遵獨不取巳具甘中水經曰劉備時巴郡結舫水居者五百家縣有甘橘官荔支園夏至則熟二千石常設厨膳命士大夫共㑹樹下食之縣北有稻田出御米也南夷志曰甘橘大釐城有之其味甚酸穹贆音飄有橘大如覆杯湘州記曰泉陵縣有焦山山上多橘裴淵廣州記曰羅浮山有橘夏熟實大如李雲南記曰雲南出甘橘甘蔗橙柚梨蒲桃桃李梅杏糖酪之類悉有魏王花木志曰盧橘蜀土有給客橙似橘而非若柚而香冬夏華實相繼或如彈丸或如拳通歳食之亦名盧橘異物志曰橘爲樹白華而赤實皮旣馨香又有善味江南則有之不生他所交阯有橘置長官一人秩三百石主歳貢御橘續捜神記曰晉孝武帝丗宣城秦精甞入武昌山中採茗忽見一人身長一丈通體皆毛從山北來乃探懷中二十枚橘與精甘羙異常具茗中異苑曰南康歸羙山石城有橘就食任意取足脫持歸者輙道遇大虺具甘部任昉述異記曰越多橘柚園越人歳多橘稅謂之橙橘吴闞澤表云請除臣之橘籍是也越中有王氏橘園胡氏梅山賀氏之瓜廣五行記曰陳後主夢黄衣人圍城繞城橘樹盡伐去之及隋兵至上下通服黄衣未幾爲隋攻圍之應嶺表録異曰山橘子大者冬熟如土瓜次者如彈丸其實金色而葉緑皮薄而味酸偏能破氣容廣之人帶枝葉藏之入膾醋尤加香羙楚辭曰皇后嘉樹橘來服皇天也后土也服習也言皇天后土生羙橘樹異於衆受命不遷生南國深固難從更其壹志緑葉素榮分其可喜又曰斬伐橘柚列樹苦桃司馬相如子虚賦曰橘柚芬芳又上林賦曰盧橘夏熟郭璞注曰蜀中有給客橙即橘也冬夏華賔相繼也楊雄蜀都賦曰於西則鹽泉鐵冶橘林銅陵張衡南都賦曰遊女弄珠於漢睪之曲注曰遊女漢女也鄭大夫交甫於漢見之而贈之橘抽曹植橘賦曰播萬里而遥植列銅雀之園廷背江州之暖氣處玄朔之肅清孫楚枤杜賦曰朱橘甘羙紫梨甜脆傳玄菊賦曰詩人覩王睢而詠后妃之徳屈平見朱橘而申貞臣之志焉繁休伯三胡賦曰頟似鼬皮色象萎橘左思蜀都賦曰家有􅐭泉之井户有橘柚之園栢梁臺詩太官令曰柤梨橘栗桃李梅古詩曰橘柚垂華實乃在深山側聞君好我甘竊獨自雕飾崔琦七蠲曰于斯江睪寔産橘柚孟冬之月於時可食撫以玉手永用華飾王褒僮約曰南安拾栗採橘南安縣名岀好栗橘太平御覽卷第九百六十六
