front:
  text: 太平御覽卷第三百三十三
  hash: sha256:7eb9a56dc6942d867090935b0a3624e7e4446cff01847396a783d4125e54364c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_333-1a}
body:
  text: 兵部六十四屯田戍役屯田漢書曰昭帝始元二年詔發習戰射士詣朔方調故吏將屯田張掖郡調謂發選之也故吏前爲官職者也令其郡習戰射士於張掖為屯田也調音從釣切將音子亮切朔方張掖並今郡地也又曰孝宣神爵元年遣後將軍趙充國將兵擊先零羗充國以擊虜殄滅爲期乃欲罷騎兵屯田以待其弊奏曰臣所將吏士馬牛食月用粮糓十九萬九千六百三十斛塩千六百九十三斛艾槀二十五萬二百八十六石石百一十斤也難乆不解徭役不息又恐他夷卒有不虞之變且羗虜易以計破難用兵猝且没切言倉卒暴疾也故臣愚以爲擊之不便計度臨羗東至浩亹浩音閱亹音門即金城郡度武縣地臨羗在今西平郡也羗虜故田及公田人所未墾可二千頃以上願罷騎兵留㢮刑應募及淮陽汝南歩兵與吏私從者合九萬二百八十二人用糓月二萬七千三百六十三斛塩三百八斛分屯要害處氷解漕下繕郷亭浚溝渠水運木繕𥙷也治湟陿以西漕音皇陿音峽道橋七十所令可至鮮水左右田事出賦人二十畝田事出謂至春人出營田也賦班輿之也至四月草生發郡騎及屬國胡騎伉健各千倅馬什二就草倅副也七碎切什二者千騎則與副馬二百疋爲田者遊兵以充入金城郡益積蓄省大費今大司農所轉糓至者足支萬人一歳食謹上田處及器用簿唯陛下裁計之詔曰如將軍之計虜當何時伏誅兵當何時得决孰計其便復奏充國又奏曰今留歩士萬人屯田地勢平易臣愚以爲屯田内有士費之利外有守禦之備騎兵雖罷其見在人留田爲必擒之具其土崩歸徳冝不乆矣詔罷兵獨充國留屯田大獲地利明年遂破先零也魏志曰武帝旣破黄巾欲經略四方而苦軍食不足羽林監潁川棗祗建置屯田於是以仕峻爲典農中郎將募百姓屯田於許下今潁川郡許昌縣也得糓百萬斛郡國列置田官數年之中所在積粟倉廪皆滿又曰廢帝齊王正始四年司馬宣王督諸軍伐呉因欲廣田積榖爲兼并之計乃使鄧艾行陳項以東至壽春自今淮陽郡項城縣以東至今壽春郡也艾以爲田良水少不足以盡地利冝開河渠可以大積軍粮又通運漕之道乃著濟河論以喻其指又以爲昔破黄巾因爲屯田積糓計都以制四方今三隅巳定事在淮南毎大軍征舉運兵過半功費巨億以爲大役陳蔡之間土下田良可省許昌左右諸稻田并水東下令淮北二萬人淮南三萬人分木且田且守小豊常収三倍於西計除衆費歳完五百萬斛以爲軍資六七年間可積三千萬斛於淮上此則十萬之衆五年食也以此乗敵無不尅矣宣王善之皆如艾計遂北臨淮水自鍾離西南撗石以西盡沘水沘旁脂切四百餘里置一營營六十人且田且守兼脩廣淮陽百咫二渠上引流下通淮潁大理諸陂於潁南潁北穿渠三百餘里漑田二萬頃淮南淮北皆相連接自壽春到京師農官兵田雞犬之聲阡陌相屬毎東南有事大軍出征汎舟而下逹于江淮資食有儲而無水害艾所建也晉書曰羊祐爲征南大將軍鎭襄陽呉西城去襄陽七百里毎爲邊害羊祐患之意以詭計令呉罷守於是戍邏减半分以懇田八百餘頃大獲其利祐之始至也軍無百日之粮及至季年有十年之積太康元年平呉之後當陽侯杜元凱在荆州今襄陽郡脩邵信臣遺迹邵信臣所作鉗廬陂大門堰並今南陽郡獲縣界時爲荆州所統也激用􅘷音虽淯音育諸水以浸田原萬頃分壃刋石使有定分公私同利衆庶頼之號曰杜父舊水道淮沔漢逹江陵千八百里北無通路又巴兵胡沅湘之㑹表裏山川寔爲險固荆蠻之所恃也當陽侯乃開楊口起夏水逹巴陵千餘里夏水口在今江陵郡江陵縣界巴陵即今郡也内㵼長江之險外通零桂之漕零陵桂陽並令邵地南土歌之曰後代無叛由杜翁孰識智名與勇功又曰梁武昭王暠擊王門以諸城皆下之遂屯玉門陽関廣田積糓爲東伐之資又曰東晉元帝督課農功二千石長吏以入糓多少爲殿其宿衛要任皆令赴農使軍各自佃即以爲廩太興中三呉大飢後軍將軍應詹上表曰魏武帝用棗祗韓浩之議廣建屯田又於征伐之中分帶甲之士隨冝開懇故下不甚勞大功尅舉間者流人奔東呉東呉今儉皆巳返江西良田曠廢未乆火耕水耨爲功差易冝簡流人興復農官功勞報賞皆如魏氏故事一年中興百姓二年分稅三年計賦稅以使之公私兼濟則倉庾盈億可計日而行也又曰穆帝升平𥘉荀羡爲北部都尉鎭下邳今臨淮郡縣也起田于東陽之石鼈亦在臨淮郡界也公私利之齊書曰髙帝勑垣崇祖脩理芍陂田曰卿但努力營田自然平殄虜㓂昔魏置典農而中都足食晉開汝潁而河汴委儲卿冝勉之後魏書曰文帝大統十一年大旱十二年秘書丞李彪上表請別立農官取州郡户十分之一爲屯人相水陸之宜料頃畝之數以贓贖雜物市牛科給令其肆力一夫之田歳責六十斛甄其正課并征戍雜役行此二事數年之中則糓積而人足矣帝覽而善之㝷施行焉自此公私豊贍雖有水旱不爲害也北史曰後魏刀雍除薄骨律鎮將雍以西土乏兩表求鑿渠溉公私田又奉詔以髙平安定統萬及薄骨律等四鎭出車牛五千乗運屯糓五十萬斛付沃野以供軍粮道多深沙車牛難阻河水之次造舡水運又以所綰邊表常懼不虞造儲榖置兵備守詔皆從之詔即名此城爲刁公城以旌功焉北齊書曰廢帝乾明中尚書左丞蘇珎芝又議脩石鼈等屯歳收數十萬石自是淮南防粮足又曰孝昭帝皇建中平州刺史嵇曄建議開幽州督冗舊陂今范陽郡范陽縣界是長城左右營屯田歳收稻粟數十萬石北境得以周贍又於河内置懷義等屯以給河南之費自是稍止轉輸之勞又曰武成帝河清三年詔縁邊城守堪墾食者營屯田置都子使以統之子使當田五十頃歳終課其所入褒貶隋書曰文帝開皇三年突厥犯塞吐谷渾㓂邊轉輸勞弊乃命朔方惣管趙仲卿於長城以北大興屯田隨書曰郭衍授朔州惣管所部有恒安鎭北接畨境常勞轉運衍乃選沃饒地置屯田歲剰粟萬餘石民免轉輸之勞唐書曰竇静歴并州大惣管司馬遷長史千時突厥數爲邊患師旅歳興軍粮不屬静上表請於太原多置屯田以省餽運時議者以人物淍零不冝動衆書奏不省静復上書辝甚切於是徵静入朝與裴寂蕭瑀封徳彞等争論於殿庭寂等不能屈竟從静議歳収數十萬斛髙祖善之又曰開元二十五年令諸屯隷司農寺者每三十頃以下二十頃以上爲一屯隷州鎭諸軍者毎五十頃爲一屯其屯應置者皆從尚書省處分其舊屯重置者一依丞前封壃爲定新置者並取荒閑無籍廣占之地其屯雖料五十頃易田之處各依郷原量事加數其屯官取勲官五品以上及武散官并前資邊州縣府鎭戍八品以上文武官内簡堪者充據所収斛斗等級爲功優諸屯田應用牛之處山原川澤土有硬軟至於耕懇用力不同土軟處每一頃五十畝配牛一頭疆硬處一頃二十畝配牛一頭即當屯之内有硬有軟亦准此法其稻田毎八十畝配牛一頭諸營田若五十頃外更有地剰配得丁牛者所収斛皆准頃畝折除其大麥喬麥乾蘿蔔等准粟計折斛斗以定等級天寶八年天下屯田百九十一萬三千九百六十石關内五十六萬三千八百一十石河北四十萬三千二百八十石河東二十四萬五千八百八十石河西二十六萬八十八石隴右四十四萬九百二石後上元中於楚州古折陽湖置洪澤屯夀州置􅫨陂屯厥田沃裹大獲共利王元長䇿秀才文曰今農戰不滫文儒是競棄本殉末厥弊兹多戍役詩曰采薇遣戍役也文王之時西有昆夷之患北有獫狁之難以天子之命命將卒遣戍役以守衛中國故歌采薇以遣之又曰楊之水刺平王也不撫其民而逺屯戍于母家周人怨思焉左傳曰齊侯使連稱管至父戍葵丘瓜時而徃曰及瓜而代期戍公問不至請代不許故謀作乱漢書曰晁錯上言守邊備塞勸農力本當世急務也臣聞秦北攻胡貊築塞河上南攻楊粤置卒戍焉非所以衛邊地而救民死也貪戾而欲廣地故功未立而天下乱夫起兵不知其勢戰則爲人禽屯則卒積死夫胡貉之地積隂之處也木皮三寸冰厚六尺食肉飲酪其人宻理島獸毳毛宻理謂肥肉也而性能寒楊粤音越之地少隂多陽其人䟽理鳥獸稀毛其性能暑秦之戍卒不能其水土死者僨於地僨也音奮秦民見行如徃棄市因以讁發之名曰讁戍也凢民守戰至死而不降北者以計爲之也故戰勝守固則有拜爵之賞攻城屠邑則得其財鹵以冨家室故能使其衆蒙矢石赴湯火視死如歸秦之發卒也有萬死之害而無銖兩之報故其禍及巳陳勝行戌至于大澤爲天下先唱天下從之如流水胡人衣食之業不著於地如飛鳥走獸於廣壄羙草甘水則止草盡水竭則移徃來轉徙時至時去此胡人之業然令卒守塞一歳而更不知胡人之能不如選常居者家室田作以爲備便爲之髙城深壍具藺石布渠荅藺石城上雷石也渠荅鐵蒺䔧也調立城邑母下千家爲中周虎落虎落外藩也上從其言募民從塞下又曰錯復言臣聞古之徙逺方以實廣虚也相其隂陽之利甞其水泉之味審其土地之冝觀其草木之饒然後營邑立城製里割宅通田作之道正阡陌之界先爲築室家有一堂二内二内内房也置器物焉此民所以輕去故郷而勸之新邑爲置醫藥巫以救疾病以脩祭祀男女有昬生死相恤此所以使民樂其處而有長居之心也又曰宣帝地節三年詔曰朕旣不徳不能附逺是以邊境屯戍未息今復飾兵重屯乆勞百姓非所以綏天下也其罷車騎將軍右將軍屯兵後漢書曰横野大將軍王常薨遣驃騎大將軍杜茂將衆兵屯北邊築亭候脩烽燧又曰十五年徙鴈門代郡上谷三郡人置常山關以東又曰二十五年南單于遣子入侍於是雲中五原八郡人歸本土邊人在中國皆賜以裝錢轉輸給食也太平御覽卷第三百三十三
