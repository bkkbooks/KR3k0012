front:
  text: 太平御覽卷第二百四十一
  hash: sha256:eb13b4a0aa8cdabc1993403801f14537d208bbad5dc89ad22cccb471d742399f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_241-1a}
body:
  text: 職官部三十九中郎將五官中郎將左右中郎將虎賁中郎將四中郎將雜中郎將凡五都尉奉車都尉騎都尉中郎將漢書曰武帝拜張騫爲中郎將使西域又曰宣帝即位詔曰朕微眇時故掖庭令張賀輔導朕躬賀有孤孫霸七歳拜爲中郎將又曰宣帝時楊惲爲中郎將郎官故事郎出錢市財用給文書乃得出名曰山郎山郎以資財爲郎也山之所出財用故取名焉惲罷山郎皆以法令從事有罪過輒奏免郎官化之莫不自勵又曰司馬相如爲中郎將持節過蜀縣令負弩前導蜀人以爲榮又曰衛綰爲中郎將醇謹無他孝景幸上林詔中郎將叅乗還問曰君知所以得叅乗乎綰曰臣代戲車士得功次遷待罪中郎將不知也又曰張安世長子千秋與霍光子禹俱爲中郎將將兵隨渡遼將軍范明友擊烏桓還謁大將軍光問千秋戰闘方略山川形勢千秋口對兵事畫地成圖無所忘失問禹禹不能記曰皆有文書光由是賢千秋以禹爲不才歎曰霍氏世衰張氏興矣後霍禹誅滅安世子相繼爲侍中常侍列校十餘人又曰卜式爲中郎𥘉式不願爲郎上曰吾有羊在上林欲令子牧之式即爲郎而牧羊歳餘肥息上善之式曰非獨羊也治民亦猶是矣以時起居惡者輒去無令敗羣上竒其言東觀漢記曰更始入長安多用羣小時人爲之語曰竈下養中郎將後漢書曰董卓以吕布爲騎都尉誓爲父子甚愛信之遷至中郎將卓自知凶恣毎懷猜畏行止嘗以布自衛小失卓意抜手㦸擲之布拳捷得免而改容顧謝卓意亦解布由是隂怨於卓蜀志曰霍峻字仲邈南郡支江人也兄篤於郷里合部曲數百人篤卒荆州牧劉表令峻攝其衆表卒峻率衆歸先主先主以峻爲中郎將又曰劉焉字君郎江夏竟陵人少仕州郡以宗室拜中郎後以師祝公喪去官又曰張飛字益德涿郡人也少與關羽俱事先主羽年長數歳兄事之先主從曹公破吕布還許昌曹公拜羽飛爲中郎將五官中郎將續漢書曰五官中郎將一人比二千石主五官郎也五官中郎比六百石無貟五官侍郎比三百石無貟凡官皆主更直執㦸宿衛諸殿門東觀漢記曰江革字次翁拜五官中郎將毎朝㑹天子使虎賁扶持帝自禮之有疾不㑹輙遣太官送飡醪恩寵莫比續漢書曰張純字伯仁遷五官中郎將純在朝歷世明習故事建武𥘉舊章多闕毎有疑議輒以訪純自郊廟㛰冠喪紀禮儀多所正定帝甚重之一日或數四引見謝沈漢書曰樊英字秀齊順帝備禮徴拜五官中郎將數月以病遜位歸應劭漢官儀曰五官中郎將秦官也秩比二千石三署郎屬焉魏武令曰告子文沙等悉爲侯而子桓獨不封而爲五官郎將此是太子可知矣魏志建安十五年爲五官中郎將副丞相者也左中郎將天文録曰郎將星若今之左右郎將也故星讃曰郎將星主閱具爲武俻漢書曰辛慶忌字子貢從光禄大夫遷左曹中郎將後漢書曰左宫爲左中郎將擊武陵賊降凡將兵二十餘年以信謹質朴故常見用續漢書曰丞宫遷左中郎將數進忠諌論議守正不希世偶朝臣憚其節名稱聞於匈奴單于遣使來貢求見宫詔勑宫自漢頓宫曰夷狄眩名非識實也聞臣虚稱故欲見臣臣醜陋形寢見必輕賤不如選長大有威容者時以大鴻臚魏應示之又曰楊秉字叔節以尚書侍講蔡雍字伯喈以侍中並爲左中郎將又曰皇甫嵩爲左中郎將撃匈奴漢舊儀曰左中郎將秩比二千石主謁者右中郎將漢書曰叚㑹宗字子松爲右中郎將續漢書曰朱雋爲右中郎將持節撃頴川長社賊漢舊儀曰右中郎將秩比二千石主常侍侍郎蜀志曰宗預爲右郎將將命使呉虎賁中郎將應劭漢官儀曰虎賁中郎將古官也書稱武王伐紂戎車三百兩虎賁三百人擒紂於牧之野言其猛怒如虎之奔赴平帝元始元年更名虎賁郎古有勇者孟賁改奔爲賁中郎將冠兩鶡尾鶡鷙鳥中之異勁者也毎所攫取應瓜摧碎鶡尾上黨所貢周禮夏官下虎賁氏曰虎賁掌先後王而趍以卒伍軍旅㑹同亦如之舎則守王閑閑梐枑也尚書牧誓曰戎車三百兩虎賁三百人與受戰于牧野作牧誓周書曰古有虎賁士千人以牛投牛以馬投馬以車捧車漢書百官表曰期門僕射秩比千石平帝元始元年更名虎賁郎置中郎將秩比二千石東觀漢記曰馬援從隴西太守遷虎賁中郎將又曰馬后不以私家于朝廷兄爲虎賁中郎將訖永平世不轉又曰明德太后姉子夏夀等私呼虎賁張鳴與敖戲爭闘上特詔曰爾虎賁將軍蒙國厚恩位在中臣宿衛禁門當進人不避仇讎舉罰不避親戚今者反於殿中交通輕薄虎賁蘭内所使至命欲相殺於殿下不避門内畏懦恣縱故不逐捕此皆生於不學之門所致也又曰馬廖任傀皆從羽林監遷虎賁中郎將續漢書曰魯國孔融爲北軍中候三日遷虎賁中郎將又曰虎賁中郎將比二千石主虎賁宿衛也左右僕射左右陛長各一人僕射主虎賁郎將陛長主直虎賁朝㑹在殿之下又曰虎賁武騎皆鶡冠虎文單衣襄邑歳獻織成虎文云鶡者勇雉也其闘死乃止又曰虎賁中郎將秩比二千石虎賁中郎比六百石虎賁侍郎比四百石虎賁郎中比三百石節從虎賁比二百石皆無貟數掌宿衛侍從虎賁武騎皆鶡冠虎文單衣謝承後漢書曰建武十八年夏旱公卿皆暴露請雨洛陽令着車盖出門候何湯將衛士鈎令車收案有詔免令官拜湯虎賁中郎將上常歎曰﨣﨣武夫公侯干城何湯之謂也漢官典職曰虎賁中郎將主虎賁千五百人郎多至千人漢名臣奏曰丞相薛宣奏漢興以來深考古義推萬變之俻於是制宣室出入之義正輕重之罰故司馬殿省闕至五六里周衛擊刀斗竟門自近臣侍側尚不得著劒人防未然也陛下聖德純備海内晏然此國家之明制必前後備虎賁漢舊儀曰期門騎者隴西工射獵人及能用五兵材力二百人王莽以爲虎賁郎劉謙之晉紀曰桓玄欲復虎賁中郎將疑應直與不訪之僚佐咸莫能定叅軍劉蘭之對曰昔潘岳爲秋興賦序云兼虎賁中郎將寓直於散騎之省以此言之是直官也後魏書曰韓荗膂力絶人尤善騎射太宗曽親征丁零翟猛荗爲中軍執幢時大風諸軍旌旗皆偃仆茂於馬上持幢𥘉不傾倒太宗異而問之徴茂所屬具以狀對太宗謂左右曰記之㝷徵詣行在所試以騎射太宗深竒之以茂爲虎賁中郎將九州春秋曰袁術爲虎賁中郎將張讓殺何進術斫閤起火魏志曰術燒南宫嘉得青門也環濟要略曰漢武帝好微行因置期門郎與之期於殿門平帝改爲虎賁中郎張純别傳曰純字伯仁郊廟冠㛰喪紀禮儀多所正定上甚重之以純兼虎賁中郎將一日數見東中郎將魏志曰蔣濟字子通文帝即位爲東中郎將濟請留詔曰髙祖歌曰安得猛士守四方天下未寜要湏良臣以鎮邊境如其無事乃還鳴玉未爲後也後曹仁薨復以濟爲東中郎將代領其兵詔曰卿兼資文武志節忼慨常有超越江湖呑呉㑹之志故復授將帥之任西中郎將沈約宋書曰西中郎將南北東西中郎將後漢號也南中郎將魏志曰鄢陵侯彰爲南中郎將又曰臨淄侯植爲南中郎將晉諸公讃曰石崇爲南中郎將北中郎將續漢書曰盧植爲北中郎將征黃巾魏志曰代郡烏丸反以曹彰爲北中郎將臨發太祖誡之曰居家爲父子受事爲君臣王隱晉書曰山濤爲北中郎將守鄴晉起居注曰武帝太始二年詔鄴城守事冝速有人又當得親親有文武器任者髙陽王珪今來之國雖當出爲蕃輔以才幹事亦古之制也其以珪爲督鄴城守事北中郎將晉中興書曰荀羡爲北中郎將徐州刺史時年二十八郭泰别傳曰王叔優問才之所冝泰曰當以武官顯叔優後至北中郎將雜中郎將匈奴中郎將續漢書曰張奐字然明與叚紀明皇甫威明俱顯京師號爲涼州三明並爲匈奴中郎將司金中郎將魏略曰河北始開冶遂以王脩爲司金中郎將脩奏記曰脩聞枳棘之材無柱梁之質㳙流之水無洪波之勢是以在職七年忠謹不昭於時功業不見於事力少任重不堪爲㩴典農中郎將數年魏志曰任峻字伯逺爲典農中郎將數年所在積粟倉廪皆盈又曰母丘儉字仲㳟河東聞喜人爲洛陽典農時取農民以治宫室儉上䟽曰臣愚以爲天下所急除者二賊所急務者衣食誠使二賊不滅士民飢凍雖崇美宫室猶無益也魏略曰上以農殖大事將選典農以徐邈爲頴川典農中郎將所在著稱武衛中郎將魏志曰許楮字仲康太祖與遂超等單馬㑹語左右皆不得從唯禇在超負其力隂欲突太祖素聞禇勇疑從騎是禇乃問太祖曰公有虎侯者安在太祖顧指禇禇瞋目眄之超不動乃各罷後數日㑹戰大破超等禇身斬首級遷武衛中郎將武衛之號自此始也建義中郎將後漢書曰袁紹傳魏郡兵反賊有陶升者自號平漢將軍英雄記曰升故爲内黄小吏獨反諸賊將部衆踰西城入閉府門具車重重輜重也載紹家及諸衣冠在州内者身自扞衛送到斥丘斥丘縣屬鉅鹿郡故城今相州成安縣東南十三州志云地斥齒故曰斥丘也紹還因屯斥丘以陶升爲建義中郎將都尉史記曰寗成居家上欲以爲郡守御史大夫公孫弘曰臣居山東爲少吏時寗成爲濟南都尉其治如狼牧羊誠不可令治民上乃拜成爲關都尉又曰汲黯字長孑焉正爲東海太守歳餘大治上聞召爲主爵都尉治務在無爲而巳引大體不拘文法漢書曰主爵中尉秦官掌列侯景帝中元六年更名都尉武帝太𥘉元年更名右扶風治内史右地與左馮翊京兆是爲三輔皆有兩丞又曰韓信數以䇿干項羽羽弗用亡楚歸漢未得知名爲連敖楚官坐法當斬信乃仰視滕公曰不欲就天下乎而斬壯士滕公竒壯之與語大說言於漢王以爲治粟都尉東觀漢記曰樊曄與世祖有舊世祖常於新野坐文書事𬒳拘時曄爲市吏餽餌一笥上德之後拜爲河東尉臨發之官引見雲臺賜御食衣𬒳上啁曄曰一笥餌得都尉何如曄頓首曰小臣蒙恩特見拔擢陛下不忘徃舊臣得竭死自効又曰任延字長孫南宛人更始拜爲西部都尉年十九迎吏見其少皆驚及到澹泊無爲下車遣吏以中牢具祠延陵季子時天下新定道路不通諸避世江南者皆未還㑹稽多士延到皆禮之卑請髙行俊乂董子儀嚴子陵等待以師友之禮行縣所到輙使勞孝子崇禮飬善如此建武之𥘉上書言臣賛拜不由王庭願牧骸骨詔書徴延民攀持轂涕泣漢官解詁云都尉將兵副佐太守俻盗賊也魏略曰積弩都尉秩比二千石後更爲典弩都尉又有典鎧都尉秩與弩同皆屬積弩又曰撫軍都尉秩比二千石夲校事官始太祖欲廣耳目使盧洪趙逹二人主刺舉洪逹多所䧟入故于時軍中爲之語曰不畏曹公但畏盧洪盧洪尚可趙逹殺我後逹竟爲人迫死魏志曰韓曁爲監冶謁者在職七年器用充實詔書襃歎就加司金都尉班亞九卿呉志曰孫桓字叔武儀容端正器懐聦朗愽學強記能論議應對權常稱爲宗室顔淵擢爲武衛都尉從討關羽於華容誘羽餘黨得五千人牛馬器械甚衆臨海記曰漢元鼎五年立都尉府於候官以鎮撫二越所謂東南一尉者也黃帝占軍氣决曰都尉氣如合抱之榆周紹新論曰散騎侍郎武衛都尉孫竒字仲容年十七以秀才入侍帷幄余作詩一篇美而風之恂恂周公美妙無巳誕姿旣豐丗胄有紀平南之孫奮威之子胡廣邊都尉箴曰巍巍上聖光𬒳八堤矧惟内面罔不來賔季末陵遲王澤壅隔戎狄作難鬼方騷逖桓桓猛將是攘是闢殷宗周宣用顯其績大漢龍興念存治平蕩蕩率土來同門并守撫其民尉典其戎五才並用文武程功奉車都尉韋昭辯釋名曰奉車都尉奉天子乘輿辯云奉車都尉主乗輿乘車尊不敢言主故言奉漢書曰奉車都尉掌御乗輿車騎都尉魏略曰李豐字安國年十七在鄴下名爲清白識别人物明帝時得呉降人問江東聞中國名士爲誰降人云聞有李安國者是時豐爲黄門郎上曰豐名乃播於呉越耶後轉拜騎都尉又曰畢軌字昭先明帝在東宫時䡄在文學中及即位入爲黃門郎拜騎都尉魏志曰徐晃字公明河内東陽人也爲郡吏從車騎將軍楊奉討賊有功拜騎都尉呉志曰駱統字公緒㑹稽烏陽人時飢荒多有困乏統爲飲食衰少其姉仁愛寡歸無子見統甚哀之數問其故統曰士大夫糟糠不足我何心獨飽姉曰誠如是何不告我而自苦若此乃自以私粟與統又以告母母亦賢之遂使分施由是顯名孫權以將軍領㑹稽太守統年二十試爲烏程相民户過萬咸歎其惠理權嘉之召爲功曹行騎都尉又曰孫權遣騎都尉趙咨使魏魏帝問曰呉王何等主也咨對曰聦明仁智雄略之主也帝問其狀咨曰納魯肅於凡器是其聦也拔吕蒙於行陣是其明也獲于禁而不害是其仁也取荆州而不血刃是其智也據三州而虎視天下是其雄也屈身於陛下是其略也又曰顧承字子直嘉禾中與舅陸瑁俱以禮徴權賜丞相雍書曰貴孫子直令問休休至與相見過於所聞爲君嘉之拜騎都尉呉志曰諸葛恪字元遜瑾長子也少知名弱冠拜騎都尉太平御覽卷第二百四十一
