front:
  text: 太平御覽卷第八百七十九咎徴部六
  hash: sha256:09a9c32a38a0158dce4463613923d955e47b811a396f7ae539ff9bda7e957227
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_879-1a}
body:
  text: 晝昬隂旱寒疫晝昬爾雅曰隂而風爲曀史記曰晉烈公二十三年國大風晝昬自旦至中明年太子喜出奔也後漢書曰獻帝時日晝晦董卓擁兵發帝陵晉書曰魏髙貴郷公時司馬景王討母丘儉大風晦暝行者傾伏劉向以爲正晝而瞑隂制陽臣制君之象儉敗見誅又曰晉元帝時京都晝昬風雲並起時公室卑弱又曰懷帝永嘉四年日中昬後劉曜㓂洛川王師敗續帝蒙塵于平陽又曰孝武時大風晦暝其後諸侯違命于戈内侮崔鴻十六國春秋曰前秦符堅時大風從西來俄而晦瞑恒星皆見後爲謝石所敗又曰南燕慕容超太上四年超祠南郊大風暴起天地晝昬至七年超爲晉將劉𥙿所㓕宋書曰孝武時竟陵王誕鎮廣陵將入城晝晦而反見殺又曰晉安王子勛即僞位拜安陵王子綏爲司州其日晦暝俄子勛𬒳殺隋書曰梁元帝承聖中日晝昬天地昬暗明年爲西魏所執遇害隂漢書五行志曰昭帝無嗣立昌邑王賀賀即位天隂晝夜不見日月賀欲出光禄大夫夏侯勝當車諌曰天乆隂而不雨臣下有謀上者陛下欲何之賀怒縛勝以屬吏吏白大將軍霍光光時與車騎將軍張安丗謀欲廢賀光讓安丗以爲泄語安丗實不泄召問勝勝上洪範五行傳曰皇之不極厥罰常隂時則有下人伐上不敢察察言故云臣下有謀光安丗讀之大驚以此益重經術士後數日卒共廢賀此常隂之明効也晉書曰呉孫亮時沉隂不雨三十餘日時將誅孫綝謀泄綝以兵廢亮又曰孫皓時乆隂不雨太史奏將有隂謀皓驚懼時陸凱等欲謀廢不遂皓旣肆虐群下多懷異圗終降晉崔鴻十六國春秋曰前秦符堅時乆隂不雨俄爲符堅廢而殺之隋書曰文帝開皇末乆隂不雨是時獨孤皇后與楊素謀廢太子爲庶人而後殺之立晉王廣爲太子唐書曰睿宗先天二年四月隂至六月一百餘日至七月三日誅竇懐貞等十七家方晴旱尚書洪範咎徴曰僣恒陽若君行僣差常陽順之禮記檀弓下曰歳旱穆公召縣子而問然然之言焉也曰天乆不雨吾欲曝尫而奚若尫者靣向天兾天哀而雨也曰天則不雨而曝人之疾于虐無乃不可乎錮疾人之所哀曝之是虐然則吾欲曝巫而奚若曰天則不雨而望之愚婦人於以求之無乃巳䟽乎徙市則奚若曰天子崩巷市七日諸侯薨巷市三日爲之徙市不亦可乎徙市者庻民之䘮禮也今徙市是憂戚於旱若䘮也左傳僖公曰夏大旱公欲焚巫尫臧文仲曰非旱備也脩城郭貶食省用務嗇勸分嗇儉也勸分有無相濟此其務也巫尫何爲天欲殺之則如勿生若能爲旱焚之滋甚公從之是歳飢而不害不傷害民又昭公時鄭大旱使屠擊有事於桑山有事祭也斬其木不雨子産曰有事於山藝山林也藝養護令繁殖而斬其木其罪大矣奪之官邑春秋考異郵曰旱之言悍也陽驕蹇所致也春秋繁露曰水干土則大旱洪範五行傳曰魯桓公五年大雩旱也先是殺君而立有危亡之心而下有悲懃之氣外結大國娶於齊以爲夫人後比二年天子使大夫來聘桓上得天子之意下得大國之心則有亢陽之意以御臣下興邢丘之役以勞百姓則臣下離心而不從故應是而秋大旱又曰魯宣公十年秋大旱是時公與齊伐萊夫代國亢陽節也師旅百姓所不欲也故應是而大旱也又曰旱所謂常陽不謂常陽而謂旱者以旱爲災也旱之爲言乾也萬物傷於乾而不得水也君持亢陽之節暴虐於下興師旅動衆勞民以起城邑臣下悲怨而心不從故陽氣盛而失度故旱災應也物理論曰陽盈而過故致旱家語曰哀公問孔子曰旱如之何孔子曰㓙年則乗駑馬力役不興馳道不備馳道君祈所行道祈以幣玉有王所祈請用弊及王不用牲也祭事不見不縣不作樂也祀以下牲當用大牢者用少牢此則賢君自貶以救民之禮也史記曰紂未年大旱俄爲武王所殺滅也又曰晉莊伯元年不雨雪二年翟人俄代翼至于晉郊又曰共和十四年大旱火焚其屋伯和篡位立故有火旱其年周厲王莽彘而死立宣王又曰魯莊公三十年冬不雨是歳一年而三築臺于郎夏築臺于薛秋築臺于秦又曰僖公二年三月春夏不雨莊公夫人與公子慶父淫而殺二公國人攻之慶父桓公子莊公弟二公謂子般及閔公又曰襄公五年秋大雩先是宋魚石奔楚楚伐宋取彭城以封魚石八年九月大雩季氏盛二十八年八月大雩晉使荀呉齊使慶封來聘是夏邾子來朝襄公自大應之又曰昭公三年八月大雩公居䘮不哀亢陽失衆六年九月雩先是莒牟夷以二邑來奔莒怒伐魯亢陽動衆之應十六年九月大雩昭公夫人薨昭公不慼又大蒐于比蒲魯有大哀君無慼容殆其失國二十五年七月大雩旱甚又劉歆以爲時君與季氏有隙昭公伐季氏爲季氏所敗出奔齊漢書曰惠帝五年夏大旱江河水少谿水絶先是發男女十四萬人城長安又曰文帝時秋大旱其年濟北王興居反伏誅五年春天下大旱匈奴入上郡雲中烽火通長安三將軍周亞夫劉禮徐厲等岀兵又曰武帝元光六年夏大旱是年衛青李廣公孫賀爲四將軍出匈奴元朔五年春大旱十餘萬衆征匈奴元狩三年夏大旱是歳發天下民吏伐棘上林穿昆明池天漢中頻大旱是年李陵没征和元年夏大旱閉長安城門大搜治巫蠱明年衛皇后太子死又曰宣帝本始三年夏大旱東西數千里先是五將軍二十萬衆征匈奴趙充國范明友等爲將又曰和帝時夏旱傷苗稼其年武靈蠻陬叛宼金城又曰順帝時京師旱楊州六郡賊㓂四十九縣殺其長史又曰桓帝時京師旱郡國飢疫人相食明年皇后崩梁兾用事尤盛又曰献帝興平元年秋三輔旱人相噉食白骨委積郭汜攻李􅔸矢及御前李􅔸逼乗輿幸其營壘魏志曰有白毛玠岀見黥反者妻子靣玠曰使天不雨盖此也太祖大怒収玠付獄大理鍾繇詰玠曰急當隂霖何以反旱玠遂黜免晉書曰武帝太始八年五月旱是時帝納荀朂邪說留賈充不復西鎮上下皆蔽之應也又李喜魯芝李㣧等並在散職又曰太始十年四月旱去年秋冬採擇卿校諸葛冲等女五十餘人入殿簡選又取小將吏女數十人母子號哭於宮中聲聞於外行人悲酸是始積隂生陽之應又曰永寕元年春夏郡國旱是年三王討趙王倫六旬之中數十戰死者十餘萬又曰懷帝永嘉𥘉大旱河洛漢皆可渉是年東海王越歸京都遣兵入京収中書令繆播殺之又劉元海石勒王彌之徒賊害百姓流血成川又曰明帝時夏大旱是時王敦有石頭之變二宫陵辱大臣誅死王隱晉書曰愍帝建興四年丞相府督軍令史淳于伯刑於建康市百姓諠譁咸曰伯冤於是大旱三年晉中興書徴祥說曰咸和十六年夏旱十七年秋冬旱是時烈宗仁恕信任㑹稽王道子亦舒緩之應又曰隆安二年冬旱且寒甚四年夏五月秋旱時孫恩作亂桓玄疑貳内外騷動兵革方興又曰太元二十年冬無雪亦猶春秋之無氷恒燠之罰也是時任㑹稽王道子縱酒宴樂不䘏政事舒緩之應也宋書曰孝武時頻年大旱人飢死者十有六七時帝造明堂又大興徒南廵校獵盛自矜大故旱災梁書曰武帝時大旱米升五千文人多餓死時與魏交兵前後連年百姓勞弊魏書曰静帝天平年諸州大旱人多流散是歳齊武與魏戰於沙苑死者數十萬又曰武定年冬春大旱西魏師入洛齊神武親帥軍大戰於北邙死者數萬隋書曰北齊文宣天保年夏大旱時大發卒築長城四百餘里乾明年春旱先是發卒數十數築金鳯聖應崇光三臺窮極侈麗不恤百姓又曰後主河清年夏大旱突厥二十萬衆毀長城㓂恒州内外纂嚴又曰隋煬帝時大旱人疫死死人如山明年楊玄感反于時群盗烽起天下離叛之應又發卒百餘万築長城百姓失業至八年天下旱百姓流亡時發四海兵親征髙麗六軍凍餧死者十八九至十三年天下大旱時郡縣郷邑悉築長城男女無少長皆就役管子春不収枯骨朽胔伐枯木而去之則夏旱至矣晏子春秋曰齊大旱景公召羣臣問曰天不下雨乆矣民皆有飢色吾使人卜之崇在髙山廣澤寡人欲賦歛以祠靈山可乎羣臣皆莫對者晏子進曰不可祠此無益也夫靈山固以石爲身以草木爲毛髪天不雨髪將礁將熱彼獨不欲雨乎祠之何益公曰不然吾欲祠河伯可乎晏子曰不可河伯以水爲國以魚鼈爲民天乆旱不雨水泉將下百川將竭國亡民將滅矣彼獨不欲雨乎祠之何益景公曰今爲之柰何晏子曰君試避宫殿曝露與山河共憂其幸而雨景公即出曝露三日天果大雨隨巢子曰幽厲之時天旱地拆尸子曰湯之救旱也素車白馬布衣身嬰白茅以身爲牲當此時也絃歌鼓舞者禁之韓子曰晉平公使師曠奏清徴師曠曰清徴不如清角平公曰清角可得聞乎師曠曰君德薄不足以聽之將恐有敗平公曰寡人老矣所好者音願遂聽之師曠不得巳而鼓一奏之有雲從西北方起再奏之大風至大雨隨之裂帷幕破俎豆墮廊瓦坐者散走平公恐懼伏于室晉國大旱赤地三年公之身遂病焉師曠占曰歳欲旱旱草先生旱草者蒺䔧也京房別對災異曰乆旱何人君無施澤惠利於下人則旱不救蝗䖝害榖又君亢陽暴虐興師動衆下人悲怨陽氣盛隂氣沉故旱万物根死數有火災此金失其性若夏大旱則雩祀之以素車白馬布衣以身爲牲或云誅䜛佞之臣於市則三日之雨降於天矣說苑曰湯之時大旱七年雒川竭煎沙爛石於是使人持三足鼎祀山川教之祝曰政不節耶使民疾耶苞苴行耶䜛夫昌耶宫室營耶女謁盛耶何不雨之甚也黄帝占書曰日中三足烏見者大旱赤地寒京房易傳曰有徳遭險兹謂逆命厥異寒洪範五行傳曰聽之不聦是謂不謀厥罰恒寒史記曰秦始皇九年四月大寒人凍死時嫪毒及大臣二十餘人車裂以殉夷㓕宗族遷四千餘家於房陵晉中興書徴祥說曰太興四年冬大寒民凍死是時王敦肆亂天子弗能禁魏書曰静帝武平年二月大寒人畜凍死疫史記曰秦始皇三年䖝起東方蔽天而下年爲大疾漢書曰哀帝永𥘉六年夏大疫疫者邪亂之氣所生延光四年冬京師大疫有絶門者人懼又曰桓帝元康元年正月京都大疫二月九月廬江又疫獻帝建安二十二年大疫至二十五年禪位於魏晉書曰魏文帝黄𥘉四年三月宛許大疫死者數万又曰明帝青龍二年四月大疫蜀相諸葛亮出斜谷卒于渭南又青龍三年正月京師大疫六韜曰人主好聚歛人則多疫死太平御覽卷第八百七十九
