front:
  text: 太平御覽卷第二百七十三
  hash: sha256:bf9c507cdf4c09d58241efe14ac2de91356273803070025bb81a99016359a927
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_273-1a}
body:
  text: 兵部四將帥吕氏春秋曰管子言於桓公曰墾田大邑辟土生粟盡地之利臣不若寗邀邀乃戚也請置以爲大田登降辭讓進退閑習臣不若隰朋請置以爲大行蚤入晏出犯顔進諌以忠不避死亡不重貴冨臣不若東郭牙請置以爲大諌平原廣城車不結轍士不旋踵鼓之而三軍之士視死如歸臣不若王子城父請置以爲大司馬决獄折中不殺不辜不誣無罪臣不若弦章章賔胥無請置以爲大理君若欲理國彊兵則五子者足矣君若欲霸王則夷吾在此桓公善令五子皆任其事以受於管子十年九合諸侯一匡天下管子人臣也用不能長之而盡以五子之能又况於人主乎淮南子曰中將上不知天道下不知地利專用人與勢雖未能萬全勝鈐必多矣下將之用兵也愽聞而自亂多知而自疑居則恐懼發則猶豫是以動爲人禽矣今使兩人接刃巧拙不異而勇士必勝者何也其行之誠也又曰鼓不與於五音而爲五音主水不與於五味而爲五味調將軍不與五官之事而爲五官督故能調五音者不與五音也能調五味者不與五味者也是故將軍之心滔滔如春曠曠如夏湫漻如秋典凝如冬典常凝正也常正於冬也因刑而與之化隨時而與之移夫景不爲曲物直響不爲清音濁觀彼之所以來各以其勝應之是故扶義而動推理而行掩節斷割掩覆也覆其節制断割之也因資而成功使彼知吾所岀而不知吾所入知吾所舉而不知吾所集始如狐狸彼故輕來合如兕虎敵故奔走也又曰將者必有三隧四義五行一守所謂三隧者上知天道下習地形中察人情凢此三事者人所從偃隧所謂四義者便國不負兵爲主不顧身見難不畏死决疑不辟罪所謂五行者柔而不可卷也剛而不可折也仁而不可犯也信而不可欺也勇而不可枝也所謂一守者神清而不可濁也謀逺而不可慕也操固而不可遷也知明而不可蔽也不貪於貨不淫於物不嚂於辯不推於名不可喜也不可怒也是謂至於窈窈冥冥孰知其情發必中證言必合數動必順時解必中揍揍理通動静之機明開塞之節審舉錯之利害若合符節疾如彍弩勢如發矢一龍一虵動無常體莫見其所中莫知其所窮攻則不可守守則不可攻也抱朴子曰良將去如收電可見不可追留如丘山可瞻不可動又曰大將民之司命社禝存亡於是乎在六韜曰武王問太公曰王者帥師必有股肱羽翼以成威神爲之柰何公曰凢舉兵帥師以將爲命在其通逹不在一術也又曰武王問太公曰論將之道柰何太公曰將有五才十過五才者勇智仁信必也勇則不可犯智則不可亂仁則愛於人信則不欺人必則無二心所謂十過者將有勇而輕死者有急而心速者有貪而喜利者有仁而不忍於人者有智而心怯者有信而喜信人者有廉而不愛人者有智而心緩者有剛毅而自用者有懦而喜用人者是故兵者國之大器存亡之所由也又曰太公曰夜卧早起雖劇不悔妻子之將也長實希言賦物平均十人之將也數行刑戮不避親戚百人之將也訟辯好勝欲正一衆千人之將也知人飢飽念人劇易萬人之將也戰戰慄慄日愼一日十萬人之將也見賢進之行法不枉百萬人之將也知天文悉地理四海如妻子此天師之主也又曰爲將冬日不衣裘夏日不操扇天雨不張蓋又曰武王曰吾欲令三軍親其將如父母攻城則争先登野戰則争先赴聞金聲則怒聞鼔聲則喜爲之柰何太公曰出隘塞犯泥塗將必先下歩士卒皆定將乃就舎軍未舉火將亦不食三略曰軍井未達將不言渇軍竈未炊將不言飢軍幕未辦時不言倦冬不服裘夏不操扇是謂禮也諸葛亮兵要曰人之忠也猶魚之有淵魚失水則死人失忠則凶故良將守之志立而揚名又曰不愛尺璧而愛寸隂者時難遭而易失也故良將之趍時也衣不解帶履不遺躡又曰貴之而不驕委之而不專扶之而不隱免之而不懼故良將之動也猶璧之不汚又曰良將之爲政也使人擇之不自舉使法量功不自度故能者不可敝不能者不可飾妄譽者不能進也桓範要集曰夫事之安危實在於將故曰將不知兵以其主與敵主不擇將以其國與敵也然擇將者不務求其䇿而反先索其勇不取之於威嚴而用之於軟緩此所謂棄本而要其末也又曰昔霸王之戰䇿貴廟勝故曰上兵伐謀而戰勝也吴起臨陣推劒不持項羽𥘉學劒後貴兵略此勇難獨用况無勇乎又曰太公誓師後至斬故云執桴鼓立軍門有不可犯之色也嚴故能行其法威故能著其恩也又曰今之擇將冝叅准徃古古數詭於常時之法得其狀而責任之所謂坐車上而御騏驥不勞而致千里者也又曰古之論將者言長於計䇿而課以料敵言善於治軍則考以事政勇於奮擊則責以戰鬪若無此三者則不委之以境外之任付之以安危之事蔣子萬機論曰知兵之將國之行主民之司命古者重之後世無逮焉吕望雖知孫武雖曉樂毅雖賢白起雖武夫齊之杇骨吴之縻骸燕之消骼秦之腐肉豈可餔其糟粕復得生而使之哉固當出我民之最擇其知勇之長者用其術略也又曰雖有百萬之師臨時呑敵在將也吴子曰凡人之論將恒觀之於勇勇之於將乃萬分之一耳故六韜曰將不仁則三軍不親將不勇則三軍不爲動孫子曰將者勇智仁信又曰三軍之衆百萬之師張設輕重在於一人謂之氣機道峽路險名山大塞十人所守千人不過是謂地機善行間諜分散其衆使君臣相怨是謂事機車堅舟利士馬閑習是謂力機此所謂四機者也又曰夫將可樂而不可憂謀可深而不可疑將憂則内疑將有憂色則内外相疑不相信也謀疑則敵國奮多疑則計亂亂則令敵國奮也以此征伐則可致亂故將能清浄應財曰清不優曰静能平能整能受諌能聽訟能納人受賢於羣英之中若吴納范蠡齊納寗戚之類也能採善言能知國俗能圗山川能裁阨難險難阨皆悉明也能制軍權危者安之懼者懽之叛者還之將有不合去者慰諭還之若蕭何追韓信冤者原之訴者察之卑者貴之士卒若卑賤者貴之昔吴起不與士卒同衣食是也彊者抑之敵者殘之卑中有賤而敵貴者乱上下之礼殘殺之貪者豊之懸賞以豊其心所以使貪欲者使之臨敵將戰有欲立功名有欲利敵人者皆許而使之所謂使勇使貪畏者隠之士卒有所畏懼者隠蔽於後勿使爲軍鋒軍敗由鋒怯謀者近之䜛者覆之有讒闘之覆信之毀者復之官職有毁廢者則修而復之反者廢之撗者挫之服者活之首服罪者活之降者說之說舎獲城者割之賞功臣也獲地者裂之賜功勞者獲國者守之得其囯必封賢以守之昔吴伐越得而不守所以終敗也獲阨塞之獲難屯之獲財散之敵動伺之敵彊下之敵陣彊則下之與戰若齊師伐魯鼓之曹劌不動三鼓破齊也敵凌假之敵之威勢凌我而來冝持重以待之勿與戰楚凌漢求戰一决漢祖知弱不許之是也敵暴安之敵人爲暴虐之行則安之勸之所以怒我衆也昔燕伐齊田單不下燕師掘齊人冡墓田單安勸之是也敵勃義之敵爲勃乱之事則我修義以待之彼勃我義故尅之敵睦携之順舉挫之舉順以挫逆也因勢破之放言過之放過惡言以誣詐敵人以怒已衆也此爲將之道也又曰故將拒諌則英雄散䇿不從則謀士叛善惡同則功臣倦賞罰不明善惡無異則有功之臣皆懈倦也將專巳則下歸咎專巳自任不與下謀衆皆歸罪於將而責之將自臧則下少功臧善也將自伐動忘下自用者故曰少功也將受䜛則下有離必將貪財則姦不禁上貪則下盗也將内顧則士卒淫内頋思妻妾也將有一則衆不服有二則軍無試試法也有三則軍乖背有四則禍及國又曰軍誌曰將謀欲宻士衆欲一將衆如一躰也攻敵欲疾將謀宻則姦心閇士衆一則群心結結如一也攻敵疾則詐不及設軍有此三者則計不奪將謀泄則軍無勢以外窺内則禍不制窺見也謀泄則外見巳情虚實其禍不可制也財入營則衆姦㑹凢爲軍使外人以財貨入營内則姦謀奄集其中也將有此三者軍必敗也又曰將無慮則謀士去將無防慮不能従謀故去之將無勇則吏士恐將怯則下無所恃故恐也將遷怒則軍士懼慮也謀也將之所重勇也怒也將之所用意故曰必死可殺也必生可虜也忿速可侮也廉潔可辱也愛人可煩也此五者將兵之過用兵之災也又曰凢戰之要先占其將而察其才因刑用權則不勞而功興也其將愚而信人可謀而詐貪而忽名可貨而賂輕變可勞而困上冨而驕下貧而磔可離而間將怠士懈可潜而襲智而心緩者可迫也勇而輕死者可暴也急而心速者可誘也貪而喜利者可襲也可遺也仁而不忍於人者可勞也智而心緩者可驚也信而喜信於人者可誑也廉㓗而不愛人者可侮也剛毅而自用者可事也懦心喜用於人者可使人欺也此皆用兵之要爲將之略也何晏韓白論曰此兩將者殆蚩尤之敵蓋開闢所希有也何者爲勝也或曰白起功多前史以爲出竒無窮欲闚滄海白起爲勝若夫韓信断幡以覆軍拔旗以流血其以取勝非復人力也亦可謂竒之又竒者哉白起之破趙軍詐奔而断其粮道取勝之比皆此類也所謂可竒於不竒之間矣安得比其竒之又竒者哉班叔皮王命論曰是時陵爲漢將而母獲於楚任彦昇奏彈曹景宗曰賞茂通侯榮髙列將潘安仁西征賦曰蕭曹魏丙之相辛李衛霍之將衘使則蘇屬國震逺則張愽望屬國蘇武愽望張騫范曄二十八將傳論曰中興二十八將前世以爲上應二十八宿未之詳也然咸能感㑹風雲奮其知勇議者多非光武不以功臣任職至使英姿茂績委而勿用然原夫良圖逺筭固將有以焉尓若乃王道旣晦降及霸德猶能受授惟庸勲賢兼序如管隰之迭升桓世先趙之同列文朝可謂兼通矣降自秦漢世資戰力至於翼扶王運皆武人堀起亦有鬻繒盗狗輕猾之徒或崇以連城之賞或任以阿衡之地故勢疑則隙生力侔則亂起蕭樊且猶縲紲信越終見葅戮不其然乎自兹以降訖于孝武宰輔五世莫非公侯遂使搢紳道塞賢能蔽權故光武鑒前事之違存矯枉之志雖冦鄧之髙勲耿賈之鴻烈分土不過大縣數四所加特進朝請而已觀其治平臨政課職責咎將所謂導之以法齊之以刑者乎永寧年中顯宗追感前世功臣乃圖畫二十八將於南宫雲臺其外又有王常李通竇融卓茂合三十二人故依其大第係之篇末太平御覽卷第二百七十三
