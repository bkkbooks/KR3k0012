body:
  text: 資産部七市說文曰市買賣所也周禮天官下内宰曰凡建國佐后立市設其次置其叙正其肆陳其貨賄岀其度量淳制祭之以隂禮市朝者君所以建國也建國者必面朝後市王立朝而后立市隂陽相承之義又地官下司市曰司市掌市之治教政刑量度禁令量豆區斗斛之屬度丈尺也大市日側而市百族爲主朝市朝時而市啇賈爲主夕市夕時而市販夫販婦爲主市雜聚之處言主者謂其多國君過市則刑人赦夫人過市罰一幕丗子過市罰一帟命夫過市罰一盖命婦過市罰一帷又曰司虣掌憲市之禁令禁其闘囂者與其虣亂者出入相陵犯者以屬遊飲食于市者囂讙也鄭司農云以屬遊飲食羣飲食者若不可禁則搏而戮之又秋官掌戮曰凡殺人者踣諸市肆之三日刑盗于市踣僵尸也肆猶申也陳也凡言刑盗罪惡莫大焉周禮冬官匠人曰左祖右社靣朝後市王宫所居也祖宗廟靣猶郷也王宫當中經之涂也禮記月令仲秋曰是月也易關市來啇旅納貨賄以便民事四方來集逺郷皆至則財不匱上無乏用百事乃遂易關市謂輕其稅使民利之啇旅賈客也匱亦乏也遂猶成也又王制曰有珪璧金璋不粥於市命服命車不粥於市宗廟之器不粥於市犧牲不粥於市戎器不粥於市用器不中度不粥於市兵車不中度不粥於市布帛精麄不中數幅廣狹不中量不粥於市姦色亂正色不粥於市錦文珠王成器不粥於市衣服飲食不粥於市五榖不時果實未熟不粥於市草木不中伐不粥於市代之非時不中用禽獸魚鱉不中殺不粥於市榖之非時不中用又曰命市納賈以觀民之所好惡志淫好辟市典市者賈謂物貴賤厚薄也質則用物貴則侈物貴民之志淫邪則其所者不正又曰爵人於朝與士共之刑人於市與衆弃之必共之者所以審愼之也書曰古明徳愼罰左傳文公曰夫人姜氏歸於齊大歸也惡視之母岀姜也嫌與有罪出者異故復發傳將行哭而過市曰天乎仲爲不道殺嫡立庶市人皆哭魯人謂之哀姜又宣公上曰晉人獲秦諜殺諸絳市六日而蘇又宣公下曰楚子使申舟聘于齊不假道于宋及宋宋人殺之楚子聞之怒投䄃而起履及於室皇劒及於寢門之外車及蒲胥之市秋楚圍宋也又昭公三年曰齊景公欲更晏子之宅曰子之宅近市湫隘囂塵不可以居湫下隘小也囂聲塵土也請更諸爽塏者爽明塏燥辭曰君之先臣容焉先臣晏子之先人臣不足以嗣之於臣侈矣侈奢也且小人近市朝夕得所求小人之利也敢煩里旅於衆也不敢勞衆爲巳宅公笑曰子近市識貴賤乎對曰旣利之敢不識乎又曰昭公十九年楚令尹子瑕言蹶由於楚子曰彼何罪諺所謂室於怒市於色者楚之謂矣言靈王恕呉子而執其弟猶人忿於室家而作色於市人舎前之忿可也乃歸蹶由言楚子能用善言毛詩國風曰東門之枌疾亂也幽公淫荒風化之所行男女棄其舊業亟㑹於道路歌舞於市井爾又曰定之方中衛文公徙居楚丘始建城市而營宫室論語比考䜟曰從善繹繹繦負如歸市爵不失德故耻無道主徙歸茂德之君繹繹相尋及之兒古史考曰神農作市髙陽氏衰市官不脩祝融脩市戰國䇿曰王孫假年十五事閔王王出走失王之處其母曰汝事王王岀走汝不知其處汝尚何歸王孫假乃入市中曰淖齒亂齊殺閔王欲與我者祖右市人從者四百人與之誅淖齒又曰齊桓公宫中九市管仲爲三歸之家以掩桓公之非也漢書曰曹參相齊使者召參去屬其後相曰以齊獄市爲寄愼勿擾也後相曰治無大於此者乎參曰夫獄市者所以并容也今若擾之姧人安所容乎又曰楚王戊與呉通謀申公曰生二子諌不聽乃胥靡之應邵曰詩云若此无罪淪胥以鋪靡刑名也晉灼曰胥相也亦靡隨衣之赭衣使杵臼雅春於市又曰尹翁歸河東平陽人暁習文法大將軍霍光秉政諸霍在平陽奴客持兵入市闘變吏不能禁及翁歸之爲市門吏莫敢犯者又曰何武兄弟五人皆爲郡吏縣敬憚之武弟顯家有市籍租常不入縣數負其課市嗇夫求商辱捕顯家顯怒欲以吏事中商武曰以吾家租賦繇役不衆爲先奉公吏不亦冝乎又曰刺繡文不如倚市門此言末業貧者之資也又曰司隷校尉解光秦王根縱横恣意大治宫室第中起土山立兩市殿上赤墀户下青瑣又曰永平中王尊爲京兆尹拊循貧弱不私豪強長安宿豪大猾東市賈萬城西市萬章箭張禁酒趙放晉灼曰箭張禁酒趙放此二人作酒箭之家尊以正法按誅皆伏其辜又曰人君不理則畜賈游市乗民之不給百倍其本矣後漢書曰㓂恂爲頴川太守執金吾賈復在汝南部將殺人頴川部將謂軍部之下小將也恂捕得繫獄時尚草創軍犯營法率多相容恂乃戮之於市復以爲耻東觀漢記曰樊君重治家産業起治廬舎髙樓閣陂池灌注竹木成林六畜雜果檀漆桑麻門成市又曰江革客東海下邳傭賃以養父母下邳知其孝市買輙與好善者雖無錢任貰與之又曰光武以蔡遵爲市令上家人犯法遵格殺之東觀漢記曰閔仲叔客居安邑老病家貧不能買肉曰買一片猪肝屠或不肯爲斷也安邑令出勑市令遂買得仲叔恠問其子道狀乃歎曰閔仲叔豈以口腹累安邑耶遂去之沛又曰京兆尹閻興召第五倫署督鑄掾領長安市平銓衡正斗其後小民爭訟輒云第五掾平市無姦枉欺詐之巧又曰更始在長安官爵多羣小里閭語曰使兒居市決作者不能得傭之市空返問何故曰今日騎都尉徃㑹日也猶是四方不復信向京師又曰王郎起上在薊郎移檄購上上令王霸至市中募人將以繫郎市人皆大笑舉手㨿揄之霸慙而去又曰竇融請孔奮置議曹掾守姑臧長天下擾亂唯西河獨安而姑臧稱爲冨邑通貨胡羗市曰四合每居縣者不盈數日輙致豐積謝承後漢書曰王充家貧無書常遊洛陽市肆閱所賣書一見輙能誦憶遂博通衆經又曰張楷字公超隱居弘農山中學者隨之所居成市後華隂山南遂有公超市典略曰荆軻者其先齊人也與燕之狗屠及髙漸離爲友軻嗜酒日與狗屠飲於燕市漸離擊筑荆軻和之而歌相泣魏略曰趙岐逃難江淮海岱靡所不歴自匿姓名賣餅北海市中安丘孫嵩年二十遊市見岐察非常人乃停車問曰賣餅幾荅曰賣餅三十嵩曰視子非賣者當有怨者乃載岐歸家魏志曰遼東送袁尚首懸在馬市牽招覩之悲感又曰襄邑劉氏與睢陽李永爲讎典韋爲報之永故富春長備衛甚謹韋乗車載雞酒僞爲候者門開懷匕首入殺永并殺其妻徐出取車上刀㦸步去永居近市一市盡駭追者數百莫敢近又曰袁紹以董昭領魏郡時郡界大亂賊以萬數遣使徃來交易市買昭厚待之因以爲間乗虚掩討輒大克破之又曰顔斐爲京兆太守青龍中司馬宣王在長安立軍市而軍中吏士多侵侮縣民斐以白宣王宣王乃發怒召軍市候便於斐前杖一百時長安典農與斐共坐以爲斐冝謝乃私推築斐斐不肯謝良乆乃曰斐意觀明公受分陜之任乃欲一齊衆庶必非爲不得明公意也宣王遂嚴將吏士自是之後軍營郡縣各得其分又曰梁習爲并州刺史鮮卑大人育延常爲州所畏一旦將其部落五十餘騎詣習求互市習念不聽則恐其怨若聽到州下又恐爲所略於是乃許徃與㑹空城中交市遂勑郡縣自將治中巳下軍徃就之市易未畢而市吏収縳一胡延騎皆驚上馬彎弓圍習數重吏民惶怖不知所施習乃徐呼市吏問縛胡意而胡實侵民習乃使譯呼延延到習責延曰汝胡自犯法吏不侵汝汝何爲使諸騎驚駭耶遂斬之餘胡破膽不敢動呉志曰孫皓愛妾或使人至市賤奪百姓財物司市中郎將陳聲素皓幸臣也恃皓寵遇繩之以法妾以訴皓皓大怒假他事燒鋸斷聲頭投其身於四望之下晉書曰羊祜都督荆州卒而州人正市聞祜卒皆號慟罷市宋書曰申坦坐法當弃市羣臣爲請莫得將行刑始興公沈慶之入市抱坦慟哭曰卿無罪爲朝廷所枉誅我入市亦當不乆市官以白上乃原生命繫尚方尋𬒳宥蕭子顯齊書曰帝於芳樂苑中立市太官毎旦進酒肉雜肴使宫人屠酤貴人潘氏爲市令帝爲市魁執罰爭者就潘氏決判管子曰市者貨之准也是故百貨賤則百利得百利得則百事治百事治則百事用節矣又曰百乗之國中而立市東西南北五十里千乗之國中而立市東西南北百五十餘里又曰桀放虎於市以觀其驚司馬法曰殷戮於市威不善也風賞於朝戮於市勸君子懼小人也列子曰昔齊有欲金者清旦衣冠而之市適鬻金者之所因攫其金而去吏捕問之對曰取金之時不見人徒見金孟子曰市廛不征則天下之商皆恱願藏於市廛市宅也又曰軻少貧母將在墓間識葬埋事又徙在市側軻知市井之利又徙在習學所遂識書禮之義孫卿子曰賈精於市不可以爲市師韓子曰鄭人有買履者先自度其足而置之其坐至入市而忘操之巳得履乃曰吾忘持度反歸取之及反市罷遂不得履又曰衛嗣公使人爲客過市関関市苛難之因事関市以金関吏乃舎之嗣公謂関市曰其時客過而予女金女因遣之関市乃大恐而以嗣公爲明察又曰商太宰使少庶子之市頋反而問之曰何見於市對曰無見也太宰曰雖然何見也對曰市南門之外甚衆牛車僅可以行耳太宰因戒使者無敢告人吾所問於女因召市吏而誚之曰市門之外何多牛矢市吏甚怪太宰知之疾也乃聳懼又曰龐敬縣令也遣市者行而召公大夫而還之公大夫亦遣爲市立有間無以詔之卒遣行不命卒遣去俱不測其由也市者以爲令與公大夫有言不相信以至無姦大夫雖告以命彼亦不信故不敢爲姦也又曰龐㳟與太子質於邯鄲謂魏王曰今一人言市有虎王信之乎王曰不二人言市有虎王信之乎王曰不三人言市有虎王信之乎王曰寡人信之龐㳟曰夫市之無虎也明矣然而三人言而成虎今邯鄲之去魏也逺於市議臣者過於三人願王察之龐㳟從邯鄲反竟不得見六韜曰武王伐殷得二丈夫而問之曰殷國將亡亦有妖灾乎其一人對曰殷君善治宫室大者百里中有九市周書丗紀同春秋後語曰𥘉廉頗之免於長平歸也失勢故人賔客盡去及復用客乃復至頗謝遣之客曰吁君何見之晩也天下市道交君不知之耶君有勢我即進君無勢我即去此固其理君何怒焉春秋後語曰伍子胥橐載而出昭関夜行晝伏至於杜陵無以餬其口坐行匍匐稽首肉祖而鼔腹吹簫乞食於呉市又曰秦孝公使公孫鞅定法令法令旣具恐人不信乃立三丈之木於國都市南門募民有能徙置北門者與十金又曰蘇秦在齊齊大夫多與爭寵而使人刺之不殊而走殊絶齊王求賊不得蘇秦將死乃謂王曰臣死之後王車裂臣殉於市曰蘇秦爲燕作亂於齊如此則刺臣之賊必得矣齊王如其言殺蘇秦者果自出齊王因而誅之又曰始皇𥘉立尊吕不韋爲相國時諸侯多辯士知荀卿之徒著書布天下不韋亦使其客著所聞集論二十餘萬言以爲備天地萬物古今之重號曰吕氏春秋布咸陽市懸千金其上延諸侯遊士賔客有能増損改定一字者與千金莫能有定者桓譚新論曰扶風漆縣之邠亭部言本大王所據其民㑹日相與爲夜市如不爲則有羞風俗通曰市井俗說市井者言至市有所鬻賣當於井上洗濯令其物香㓗然後到市又曰陳留太守泰山呉文章少孤遭憂衰之丗與兄伯武相失別二十年後㑹下邳市爭計共闘伯武歐文章欲報擊之心中惻愴手不能舉大自怪也因投杖於地觀者咸嗤笑之還相問乃眞兄弟也列仙傳曰隂生者長安中渭橋下乞兒也常止於市中乞市中厭若以糞灑長吏試之収繫著桎梏而續在市中乞又欲殺之乃去灑者家室自壞殺十餘人長安中謡曰見乞兒與美酒可以免破家之咎神仙傳曰李阿者蜀人也傳丗見之不老如故常乞於成都市所得隨以與貧者夜去朝還市人莫知其宿處漢名臣奏曰太尉屬應劭司徒屬孫嵩司空掾孔伷議以鮮卑隔在漠北犬羊爲羣無君長之師廬落之居又其天性貪而無信故自漢興至于兹數犯障塞吏民創楚不與交關唯至朝市反成靡服非畏威懷徳實玩中國珎異之故耳三輔黄圖曰元始四年起明堂辟雍長安城南北爲㑹市但列槐樹數百行爲隊無牆屋又爲方市闠門周環列肆啇賈居之都商亭在其外漢宫殿䟽曰交門市在渭橋北頭也李里市在雍門東交道亭市在便橋東細栁倉市在細栁倉華陽國志曰王長文字德㑺陽愚嘗絳衣絳帽牽猪過市乞人與語僞不聞常騎牛同遊陸機洛陽記曰三市大市名金市在大城中馬市在城東陽市在城南衛玠傳曰少時乗白羊於洛陽市舉市共觀咸曰誰家壁人於是家門州黨遂號曰璧人趙書曰豐國市五日一㑹三秦記曰秦始皇作地市與生死人交易令云生人不得欺死者物市吏告始皇云死者陵生人生人走入市門斬斷馬脊故俗云秦地市有斷馬山謙之丹陽記曰京師四市建康大市孫權所立建康東市同時立建康北市永安中立秣陵闘埸市隆安中發樂營人交易因成市也太平御覽卷第八百二十七
