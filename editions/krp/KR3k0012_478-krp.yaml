front:
  text: 太平御覧卷第四百七十八
  hash: sha256:9473cf48a8e5beebf05075a24a8e628ef83a4e565978afbdf6e21f5e8717ff53
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_478-1a}
body:
  text: 人事部一百一十九贈遺毛詩曰鷄鳴刺不說德也知子之來之雜佩以贈之知子之順之雜佩以問之又曰唯士與女伊其相謔贈之以芍藥又曰渭陽康公念母也康公之母晉獻公之女文公遭驪姬之難未返而秦姬卒穆公納文公康公時爲太子贈送文公於渭之陽念母之不見也我見舅氏如母存焉我送舅氏曰至渭陽渭水名秦時都雍至渭陽者盖東行送舅氏於咸陽之地何以贈之輅車乗黄我送舅氏悠悠我思何以贈之瓊魏玉佩禮記曰孔子之衛遇舊館人之䘮入而哭之哀岀使子貢脫驂而賻之子貢曰無乃巳重乎夫子曰余嚮者入而哭之遇於一哀而出涕余惡夫涕之無從也小子行之左傳曰鄢陵之戰卻至三遇楚子之卒必下免胄而趍風楚子使工尹襄問之以弓曰方事之殷有韎韋之附注君子也適見不榖而趍無乃傷乎郄至見客免胄承命又曰越圍呉趙孟使楚隆使於呉王曰黄池之役君之先臣志父得承齊盟曰好惡同之今君在難無恤不敢憚勞非晉國之所能及也使陪臣敢展布之王拜稽首曰寡人不侫不能事越以爲大夫憂拜命之辱與之一簞珠又曰呉公子札聘於鄭見子産如舊相識與之縞帶縞帶大帶也子産獻紵衣焉紆衣禪衣謂子産曰鄭之執政侈難將至矣政必及子子爲政慎之以禮不然鄭國將敗又曰叔鮒欲求貨於衛滛芻蕘者滛放也使欲衛患之而致貨焉衛人使屠伯饋叔向羹與一篋錦屠伯衛大夫曰諸侯事晉未敢携貳况衛在君之宇下屋宇之下喻近而敢有異志芻蕘者異於它日敢請之請正之意叔向受羮反錦受羮示不逆其意且非貨賂也論語郷黨曰康子饋藥拜而受之曰丘未逹不敢嘗饋遺也拜受敬也曰丘未逹言不服之意藥從中制外故當慎也又微子曰齊人饋女樂季桓子受之三日不朝孔子行漢書曰文帝賜趙它書上禇五十衣中禇三十衣遺王上禇下禇謂之多少厚薄祫複之名范曄後漢書曰李恂徴拜謁者領西域副校尉西域殷冨多珎寳諸國侍子及督使賈胡數遺恂奴婢宛馬金銀香罽之屬一無所受東觀漢記曰陳遵爲大司農護軍嘗使匈奴過辭於王丹臨决丹謂遵曰俱遭時反覆唯我二人爲天地所遺今子當之絶域無以相贈贈子以不拜遂揖而別遵甚悅後列曰王丹字仲回資性清白少脩節義時京師大豪陳遵朋友䘮親遵爲護䘮事縳縑數百疋丹懷縑一疋至䘮主前出縑授之謂曰如丹是縑出自機杼遵有慙色閔仲叔太原人好黄老清志㓗行不仕王莽之丗恬静養神弗役於物與周黨相友黨過叔舎共含菽飲水無菜茹黨嘗遺其生麻叔歎曰我欲省煩耳受而不食後列曰光禄勲杜林與馬援郷里親厚援南方還時林馬適死援遣子將馬一疋遺林曰朋友有車馬之餽可以備之居數月林還之後漢書曰或問第五倫曰公有私乎對曰昔人有與吾千里馬者雖不受每三公有所選舉心不能忘而亦終不用也吾兄子嘗病一夜十往退而安寢吾子有病雖不省視而竟夕不眠若是者豈謂無私乎又曰張奐少立志節常與士友言曰大丈夫處丗當爲國家立功邊境及爲將帥果有勲名董卓慕之使其兄遺縑百疋奐惡卓爲人絶而不受呉志曰太史慈字子義曹公聞其名遺慈書以篋封之發省無所道而但貯當歸蜀志曰宗預東聘呉孫權捉預手涕泣而別曰君每銜命結二國之好今君年長孤亦衰老恐不復相見遺預大珠一斛宋書曰王弘之徴爲通直散騎常侍不就從兄敬弘常解貂裘與之即着以採藥又曰王弘之隱居性好釣日夕載魚入徃上虞郭經親故門各以一兩頭置門内而去又曰陶潜傳顔延之爲始安郡經過日日造潜毎往必酣飲致醉臨去留二萬錢與潜潜悉送酒家稍就取酒飲宋書曰郭原平髙陽許謡之居在永興罷建安郡丞還家以綿一斤遺原平不受送而復反者前後數十瑶之乃自往曰今歳過寒而建安綿好以此奉尊上耳原平乃拜而受之齊書庾易徵辟不就以文義自樂安西長史袁彖欽其風通書致遺易以連理机竹翹書格報之又曰張融字思光呉郡呉人也祖禕晉琅邪王國郎中令父暢宋㑹稽太守融年弱冠道士同郡陸脩静以白鷺羽尾扇遺融曰此旣異物以奉異人又曰何點隱居不仕豫章王命駕造門點從後門逃去竟陵王子良聞之曰豫章王尚不屈非吾所議遺點嵇叔夜酒杯徐景山酒鎗以通意范享燕書曰髙祖少有大度雄畧傑出晉安北將軍張華鎮葪惣御諸部髙祖童冠往見華甚異之謂髙祖曰君必爲命時之器匡時濟難者也脫所着幘簮以遺髙祖結殷勤而別崔鴻後燕録曰王猛伐洛陽將發謂慕容垂曰吾將遂清東夏或爲東山之別見物思人卿將何以爲信垂以佩刀遺之崔鴻前秦録曰慕容冲進逼長安符堅遣使送錦𫀆一遺冲使者稱有詔古人兵交使在其間卿逺來草創得無勞乎今送一𫀆以明本懷朕於卿恩分如何而於一朝忽爲此變後魏書曰西域厭逹波斯諸國各因公使並遺任城王澄駿馬一疋請付太僕以充國閑詔曰王廉貞之行有過楚相可勑付厩以成君子大哉之美陳書賀德基少遊學於京邑積年不歸衣資罄乏又耻衣服故弊盛冬止衣裌𥜗袴嘗於白馬寺前逢一婦人容服甚盛呼德基入寺門脫白綸巾以贈之仍謂德基曰君方爲重器不乆貧寒故以此相遺耳德基問嫗姓名不荅而去唐書陸贄以愽學宏詞登科授華州鄭縣尉罷秩東歸省母路由壽州刺史張鎰有時名贄往謁之鎰𥘉不甚知留三日再見與語遂大稱賞請結忘年之契及辭遺贄錢百萬曰願備太夫人一日之膳贄不納唯受新茶一串而巳曰敢不承君厚意又曰陸贄丁母憂東歸洛陽寓居嵩山豊樂寺藩鎮􅉠贈乃別陳餉遺一無所取與韋臯布衣時相善唯西川致遺奏而受之家語曰子路將行辭於孔子子曰贈汝以車乎贈汝以言乎對曰請以言孔子曰不疆不逹不勞無功不忠無親不信無復不恭失禮慎此五者而巳矣子路曰由請終身奉之戰國䇿曰蘇秦說李兊抵掌而談李兊送蘇秦以明月之珠和氏之璧黒狐之裘黄金百鎰蘇秦得以爲用西入於秦又曰張儀爲秦破從連横說楚王遺車百乗獻駭鷄之犀夜光之璧於秦王梁祚魏國統曰𥘉太祖過故人吕伯奢也遂行日暮道逢二人容貌威武太祖避之路二人笑曰觀君有奔懼之色何也太祖始覺其異乃悉告之臨別太祖解佩刀與之曰以此表吾丹心願二賢慎勿言劉向說苑曰田子方使人遺子思狐白之裘恐其不受因謂之曰吾與人也如弃之子思辭曰伋聞妄與不如遺弃於溝壑伋雖貧不忍以身爲溝壑也說苑曰孔子之楚有漁者獻魚孔子不受獻漁者曰天暑市逺賣之不售思慮欲弃之不若獻之君子孔子再拜受謂弟子曰掃除將祭之弟子曰夫人將弃之今夫子將祭之何也孔子曰吾聞之務施而不腐餘財者聖人也今受聖人之賜可無祭乎劉向列仙傳曰安期先生者時人皆言千歳公秦始皇請與語三日三夜賜金璧數十萬岀於阜郷亭皆置去留書以赤玉舄一量爲報曰後千歳求我於蓬萊山下費禕別傳曰孫權以手中嘗所執寳刀贈禕荅曰臣不才何以堪明令然刀所以討不庭禁暴亂者也但願大王勉建功業同奬漢室臣雖闇弱不負采顧蜀王本紀曰蜀王獵於褒谷見秦王以金一笥遺蜀王報以禮物盡化爲士秦王大怒臣下拜賀曰土者地也葛洪西京雜記曰朱買臣爲㑹稽太守懷章綬至金亭而國人未知也所知錢勃見其曝露乃勞之曰得無罷乎遺以紈扇買臣至郡引爲上客雜記曰公孫弘爲國士所推上爲賢良國人郵長贈以生芻一束素絲一繸撲玉一杖孟儀周載曰悼公時晉智伯爲政強暴好侵伐欲謀襲衛乃遺衛君野馬四白璧一以結好韓子曰仲尼爲政於魯齊景公患之黎鉏謂景公遺哀公女樂景公曰善乃以女樂二八遺哀公哀公果怠於政仲尼諌不聽去而之齊又曰晉獻公欲伐虞􅉑乃遺之屈産之乗垂棘之璧女樂二八以榮其心而亂其政孔藂子曰子思居貧其友有饋之粟者受二車焉或獻罇酒束脩子思弗爲當或曰子取人粟而辭吾酒是辭少取多也子思曰伋不幸而貧於財至乃困乏將絶先人祀夫所以受粟爲周乏也酒脯則飲讌方乏於食而乃飲讌非義也吾豈以爲介哉又曰孔子使宰予於楚楚昭王以安車蒙飾因宰予遺孔子焉宰予曰夫子無以此爲也臣竊見其行不離道動不違仁貴義尚德清素好儉仕而有禄不以爲費不合則去退無恡心妻不服綵妾不衣帛車器不彫馬不食粟道行則樂其治不行則樂其身臣知夫子之不用此車也古詩曰客從逺方來贈我一端綺文作雙鴛鴦裁爲合歡𬒳謝惠連詩曰客從逺方來贈我鶴文綾裁爲親身服着以便寢興古詩曰客從逺方來贈我一端綺相去萬餘里故人心尚尓張衡四愁詩曰美人贈我金錯刀何以報之英瓊瑶又云美人贈我翠琅玕何以報之雙玉盤又云美人贈我錦繡叚何以報之青玉案又云美人贈我貂襜䄖何以報之明月珠傳云四愁詩曰美人贈我明月珠何以報之比目魚又云美人贈我蘇合香何以要之翠鴛鴦張載擬四愁詩曰美人遺我緑綺琴何以贈之雙南金琴操曰許由無有杯器手掬水人見由無器以瓠瓢遺之由操飲飲訖掛以樹枝風吹樹動有歷歷聲由以爲煩擾取損之楚辭曰折䟽麻兮瑶華䟽麻神麻也瑶王華將以遺兮離居離居隱者也皇甫䂓與劉司空牋曰明公至德佐國憂丗雖贈兩梁冠及鮐魚一雙服厚尊貺榮施其弘班固集曰竇憲餉身所服物虎頭繡盤囊一雙又遺身所服韈三具錯鏤䥫一魏武帝與楊彪書曰今贈足下青氊床褥三具慕容晃與頋和書曰今致繡鞋一䩫張敞集敞荅朱登書曰登爲東海相遺敞蟹醬敞荅曰蘧伯玉受孔子之賜必以及其郷人敞謹分斯貺于三老尊行者曷敢獨享之太平御覽卷第四百七十八
