  text: 太平御覽卷第七百十
  hash: sha256:c4d1acbb543b23521cb4dab6ffa546b0b669fcccba2dd61fcdaf5ca72893f956
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_710-1a}
body:
  text: 服用部十二几案杖几釋名曰几􅍥也所以􅍥物也􅍥者軌書頋命曰王乃洮頮水相𬒳冕服慿玉几王疾發大命臨羣臣必齊戒沐浴今疾病故但洮與頮靣扶相𬒳以冠冕慿玉几以出命易渙卦九二曰渙奔其几悔亡象曰渙奔其几得願也几承物者詩行葦曰戚戚兄弟莫逺具尓或肆之筵或授之几周禮春官曰司几筵掌五几大朝覲大饗射几封國命諸侯王設左右王几祀先王昨席亦如之諸祭祀右雕几筵國賔于牗前亦如之左彤几國賔老臣也甸役則右􅃮几凢䘮事右素几吉事變几凶事仍几禮記曰謀於長者必操几杖以從之又曰獻几杖者拂又曰大夫七十而致仕若不得謝謝去君貪其徳而留之也則必賜之以几杖又曰乗車必以几又曰龜筴几杖不入公門龜筴問家之吉凶几杖嫌自長老又月令曰八月之節養衰老授几杖又内則曰父母舅姑坐御者舉几歛席又曰始死綴足用燕几傳語曰諸侯之師乆於偪陽荀偃士正請於荀罃曰水潦將降懼不能歸班師班還也智伯怒智伯荀罃投之以几出於其間出偃正之間也又曰蔿啓疆曰聖王務行禮不求恥人設几而不倚爵盈而不飲禮之至也國語楚語曰左史倚相曰倚几有訓誦之戒訓誦上師所誦之諌書之於几漢書曰呉王稱疾不朝驗問不實及後使人爲秋請律春曰朝秋曰請如古諸侯朝聘也上復責問呉使使者曰察見淵中魚不祥張宴曰喻人君不當見臣下之私也於是天子賜呉王几杖又曰朱博遷琅瑘太守齊郡舒緩養名博奮髯抵几曰觀齊兒欲以爲俗耶皆斥罷諸病吏續漢書曰魏文帝賜楊彪几杖以彰舊德東觀漢記曰黄香爲尚書郎以香父尚左賜卧几靈壽杖又曰上𥘉即位先訪求賢茂詔曰前宻令卓茂名冠天下當受天下重賞今以茂爲太傳封裒德侯賜几杖魏志曰太祖爲司空丞相毛玠爲東曹椽太祖平栁城頒所獲物特以素屏風素馮几以賜玠曰君有古人之風故賜古人之物又曰吕布遣陳登因陳布勇而無謀冝早謀之太祖恱始因登求徐州牧不獲及登還布拔㦸斫几責之晉書曰劉毅仲雄以太康六年卒帝撫几驚曰失吾名臣不得生作三公即贈儀同三司又曰魏舒以年老稱疾遜位詔賜几杖不朝及錢百万牀帳簟褥又曰王羲之字逸少嘗徃門生家見棐几滑浄因書之眞草相半後其父誤刮去之門生驚懊累日宋書曰沈麟士字雲禎隱居以篤學爲務恒馮素几鼓素琴呉均齊春秋曰孔靈産爲光禄大夫覽止足之分不肯仕太祖以白麾毛扇素几遺之曰以君有古人風故賜卿古人之物也陳書曰王冲爲太子少傳武帝以冲前代舊臣特申長㓜之敬文帝即位益加尊大嘗從幸司空徐度宅宴筵之上賜之以几後魏書曰咸陽王僖謀逆誅其宫人爲之歌曰可憐咸陽王柰何作事誤金床玉几不能眠夜蹋霜與露莊子曰南郭子綦隱几而坐仰天而嘘嗒焉似䘮其偶孟子曰孟子去齊宿於晝有欲爲王留行者坐而言不應隱几而卧客不恱曰弟子齊宿而後敢言夫子卧而不聽請勿復敢見矣晝齊邑也齊人欲爲君留孟子行孟子不以倚几而卧也山海經曰西王母梯几而戴勝梯謂馮也漢舊儀曰天子用玉几拾遺録曰瀛州南有金巒之觀中蔵寳几覆以雲紈之素漢武帝内傳曰帝受西王母五岳眞形經盛以黄金之几西京雜記曰漢制天子玉几冬則加綈錦其上謂之綈几公侯皆以木爲几冬則以細罽爲囊慿之不得加綈錦之飾於几案㑹稽典録曰葛仙公慿白桐几學數十年白日登仙几化爲白虎三脚兩頭往徃人見之魏武上雜物䟽曰御物三十種有上車􅃮畫重几大小各一枚語林曰任元褒爲光禄勲孫慿翊徃詣之見門吏慿几視之孫入語任曰吏几對客爲不禮任便推之吏荅云得罰體痛以横木枎持非慿几也孫曰直木横施植其兩足便爲慿几何必孤蹯鵠膝曲木抱腰姚信士語曰馬援几而見梁竇子弟文舉坐榻而受徐文高拜戴勝竹林七賢論曰魏朝封文王固譲公卿皆當喻旨司空鄭冲等馳使從阮籍求其文立待之籍時在袁孝尼家宿枎而起書几板爲文無所治定乃冩付信鄴中記曰石虎御座几悉􅃮雕盡皆爲五色花也南岳記曰衡山有石室内有石牀石几異苑曰曆陽石秀之欻有一人着平巾袴褶語秀云聞君巧侔班爾刻几尤妙太山府君相召秀之自陳云劉政能造數旬而殞石氏猶存劉作几有名遂以致斃幽明録曰海中有金臺水出百丈臺其内有金几雕文備制上有百味之食李尤几銘叙曰昔帝軒轅仁智恐事之有闕作几之法張華倚几銘曰倚几之設設而倚作器此成於彼也案說文曰檈似縁切圎案也方言曰陳楚宋魏謂案爲冩楚漢春秋曰項王使武渉說淮隂侯淮隂侯曰臣故事項王位不過中郎官不過執㦸及去項歸漢漢王賜臣玉案食臣具之劒臣背之内愧於心史記曰髙祖過趙趙王張敖自持案進食甚恭上箕踞罵之漢書曰萬石君石奮子孫有過失不誚譲爲便坐對案不食又曰貢禹奏曰見賜杯案畫文金銀飾非當所以食臣下也又曰朱博爲人廉儉自微賤至冨貴不食重味案上不過三杯酒又曰許后五日一朝皇太后於長樂宫親奉案上食東觀漢記曰更始韓夫人嗜酒毎侍飲見常侍奏事輙怒曰帝方對我飲正用此時持事來乎起抵破書案又曰魏覇延平元年仕爲光禄大夫妻死長兄伯爲娶妻送至官舎覇曰年老兒子備具何用空養他家老嫗爲即自入拜其妻手奉案前肉跪曰不敢相屈而妻慙求去又曰尹敏字㓜季與班彪相友每相與談論輙屏案不食又曰梁鴻常賃舂每歸妻爲具舉案齊眉又曰蔡彤素清在遼東三十年衣無儲副賜錢百萬下至杯案食物大小重沓南史曰江秉之爲新安太守在郡作書案一枚去官留以付庫梁書曰郭祖深清儉素木案食不過一肉漢舊儀曰丈二旋案以陳三十六肉九糓飲食東宫舊事曰皇太子犯𥘉拜有􅃮金渡足奏案一枚魏武上雜物䟽曰御物有純銀叅鏤帶􅃮畫案一枚江表傳曰曹公平荆州欲伐呉張昭等皆勸迎曹公唯周瑜魯肅陳距北之計孫權拔刀斫前奏案曰諸將復有言迎北軍與此同也西京雜記曰武帝爲七寳牀雜寳案於桂宫中漢武故事曰武帝時東郡獻短人長五寸上疑是山精常令在案行東方朔問曰巨靈汝何以叛阿母徤否廣陵傳曰呉戒字貴齊性剛直同業生陳升爲賊戒見之升爲設食戒曰汝巳爲賊柰何爲設食因舉按投江中令其趣降神仙傳曰呉興人沈羲爲仙人所迎上見老君玉女以金案玉杯藥賜羲曰此神仙丹不死之藥鄴中記曰石虎以宫人爲女官門下通事以玉案行文書燕丹子曰太子常與荆軻同案而食塩鐵論曰文杯畫案婢妾衣䊵履絲所以亂治也潜夫論曰前羗始叛器械未備虜或以銅鏡以蒙兵或負板案以類楯誠易戰耳異苑曰百丈山上有石房内有案置石書二卷夢書曰夢見杯案賔客到也多客大案少客小案也陸雲與兄機書曰按行曹公器物有奏按五枚又作欹枕以卧視書張衡四愁詩曰羙人贈我錦繡叚何以報之青玉案李尤書案銘曰居則致樂承顔接賔承卷奏記通逹謁刺尊上荅下道合仁義梁簡文帝書案銘曰刻香鏤采纎銀卷足􅃮花曜紫畫製舒録怪廣知平人雕非曲厠質錦帳承芳綺褥披古道今察姦糾俗杖說文曰杖持也大戴禮曰武王踐祚杖之銘曰惡乎失道於嗜欲相忘於冨貴周禮秋官上曰伊耆氏掌國之大祭祀共其杖咸咸讀曰函老臣雖杖於朝事鬼神尚敬去之有司以此函藏之旣事乃換之軍旅授有爵者杖吏卒且以杖尊者將軍杖鉞共王之齒杖王者所以賜老者之杖禮記曰獻杖者執末又檀弓上曰孔子蚤作作起負手曳杖逍遥於門歌曰太山其頽乎梁木其壊乎哲人其萎乎子貢聞之曰夫子殆將病也又曰子夏䘮其子而䘮其明曽子吊之子夏曰天乎余之無罪也曽子怒曰商汝何無罪也吾與汝事夫子於洙泗之間退而老於西河之上使西河之民疑汝於夫子爾罪一也䘮爾親使民未有聞焉爾罪二也䘮爾子而䘮爾明爾罪三也而曰汝何無罪與子夏投其杖而拜曰吾過矣又曰王制曰五十杖於家六十杖於國八十杖於朝傳曰邾莊公與夷射姑飲酒私岀閽乞肉焉奪之杖以敲之論語曰郷人飲酒杖者岀斯岀矣又曰子路從而後遇丈人以杖荷蓧子路問曰子見夫子乎丈人曰四體不勤五糓不分孰爲夫子植其杖而耘史記曰張騫云臣前在大夏時見卭竹杖蜀布問曰安得此大夏國人曰賈人往市之身毒在大夏之東南可數千里續漢禮儀曰三老五更杖玉杖又曰秋之月按户比民年七十者授之以玉杖八十禮有加賜玉杖長九尺端爲飾鳩鳩者不噎之鳥欲老人不噎華嶠後漢書曰嘉平中袁逢爲三賜玉枝魏志曰文帝引漢太尉楊彪待以客禮賜之几杖詔曰夫先王制几杖之錫所以賔禮黄考褒崇元老也昔孔光卓茂並以淑德高年受兹嘉錫其賜公延年杖及慿几又曰周宣爲郡史太守楊沛夢人曰八月一日曹公當至必與君杖飲以藥酒宣占之曰夫杖起弱藥治人病八月一日黄巾賊必滅至時果敗呉書曰全綜年高賜以御杖晉書曰魏帝嘗賜景帝春服帝以賜山濤又以其母老年并贈藜杖一枚又曰阮宣子出行常以百錢掛杖頭毎至酒家輙醉而歸後魏書曰甄琛拜侍中以其衰老詔賜御府杖朝直杖以岀入莊子曰子貢乗大馬軒車不容巷徃見原憲杖藜應門山海經曰夸父與曰競走渇飲河渭不足北走大澤未至道死弃其杖化爲鄧林廣志曰九眞出靈壽杖吕氏春秋曰孔子弟子從逺方來者孔子荷杖而問曰子之父不有恙乎持杖而揖之問曰子之母不有恙乎置杖而問曰子之兄弟不有恙乎杖歩而倚之問子之妻子不有恙乎故孔子以六尺之杖諭貴賤之等辨親踈之義陸賈新語曰夫居髙者自處不可以不安履危者任杖不可以不固自處不安則墜任杖不固則顚是聖人居高處上則以仁義爲巢乗危履傾則以聖賢爲杖也新序曰昌邑王徴爲天子到營陽買積竹刺杖二枚龔遂諫曰積竹刺杖者驕蹇少年杖也大王奉大䘮當柱竹杖風俗通曰漢高祖與項籍戰京索間遁叢薄中時有鳩鳴其上追者不疑遂得脫及即位異此鳥故作鳩杖賜老人也拾遺録曰老子當周之末居山與丗人絶迹唯有黄髪老叟五人手捉青笻之杖岀入室中與老子談又曰縻笁用陶朱計術曰益冨有寳庫千間笁常賑生恤死家馬廐旁有古冢夜聞泣聲㝷之見婦訴云漢末爲赤眉所害剖棺見剥乞更深埋并乞弊衣自掩笁從其言後歴一年復見前婦云君財寳可支一丗應遭火厄今以青廬杖一枚長九尺報君衣棺之惠笁挾杖而歸而後隣家常見笁家有一青氣如龍虵之形又有青衣童子數人來云縻笁家當有火頼君能恤歛枯骨天道不孤君德故來攘却此災使君財物不盡旬日火從庫起燒其珠玉十分遺一火盛之時見青衣童子十數來撲火又有氣如雲覆火上即滅又曰劉向於成帝之末校書天禄閣專精覃思夜有老人着黄衣植藜杖杖扣閣而進向閣中獨坐頌書老人乃吹端火出具以照向具說開闢以前向因受五行鴻範之文恐辭說繁廣向乃裂裳及紳以記其言至曙而去請問姓名荅曰我是太一之精天帝聞金夘之姓有博學者下而觀焉乃出懷中竹牒有天文地圗之書余畧授子焉至向子歆從授術亦不語人焉漢武内傳曰帝先有玉箱杖是西湖母所獻帝甚愛之崩後故以入槨其年人有於枎風郿市中買得者帝時左右侍人識之告有司詰問云見市中有一人賣之實不知賣杖主名也神仙傳曰費長房欲求道而頋家夏壷公乃断一青竹杖與長房身等使懸之舎後家人見以爲縊死大小驚號遂殯葬之長房立其傍人無見者後長房歸家人不信是房房曰往日所葬竹杖耳發冢視杖猶存又曰壷公遣費長房歸以一竹杖與之騎此當到家以杖投葛陂中長房騎杖忽然如睡便到家以杖投葛陂中頋之乃青龍也又曰介象令人騎青竹自呉徃蜀劉根别傳曰孝武皇帝登少室見一女子以九節杖仰指曰閉左目開右目氣且絶乆乃蘇息武帝使問之所行何等女子不荅東方朔曰婦人食日精者劉向别傳曰有騏驎角杖塔寺記曰謝尚夢其父告之曰西南有氣至衝人必死勿當其鋒見塔寺可穣未暇立寺可杖頭刻作塔形見有氣來擬之尚如其言置杖左右果有黒氣衝尚家尚以杖指之氣即廻散闔門獲全氣所經處數里無復孑遺三石僞事曰佛澄死以澄生所服金杖銀鉢内着棺中經後再閔開棺視之不見體骨唯見杖鉢武當山記曰山有石室有板床銅杖長七尺三分交州記曰合浦圍州有石室其裏一石如鼓形見榴木杖倚着石壁採珠人常致祭焉魏文典論曰嘗與平虜將軍劉勲奮威鄧展共食飲宿聞展有手臂暁五兵余與論劒酒酣耳熱方食甘蔗便以爲杖下殿交三中其臂談藪曰後魏河間邢巒字山賔遷殿中侍御史嘗有疾䇿山桃杖帝問此何杖荅曰巨源杖太武諱燾故言焉法顯記曰那竭國有佛錫杖牛頭旃檀上長丈六七許以筒盛之百千人舉不能移又曰秪坦精舎西北四里有榛林名曰得眼夲有五百盲人佛爲說法盡得眼開盲人喜刺杖着地頭靣作禮杖遂生長成榛鄧德明南康記曰南野縣有漢監匠陳憐其人通靈夜嘗乗龍還家其婦懷身憐母疑與外人通宻㸔乃知是憐乗龍至家輙化成青竹杖憐内致户前母不知因將杖去湏臾光彩滿堂俄尓飛失憐失杖乃御雙鵠還搜神記曰漢文帝微服過魯少千少千柱金杖出應門列異傳曰陳留史均字威明嘗得病臨死謂其母曰我得復生埋我杖竪我瘞上若杖抜出之及死埋杖如其言七日徃視杖果抜即掘出之便平復如故神異記曰陳敏孫皓之丗爲江夏太守自建業赴職聞宫亭廟驗言靈驗過乞在任安稳當上銀杖一枚年限旣滿作杖擬以還廟撫捶䥫以爲幹以銀塗之尋徴爲散騎常侍往宫亭送杖於廟中乞即進路日晚降神巠宣教曰陳敏許我銀杖今以塗杖見與便投杖水中當送以還之欺篾之罪不可容也於是取杖看之剖視衆見䥫幹乃置之湖中杖浮在水上其疾如飛遥到敏舫前敏舟遂覆也魏武帝與楊彪書曰今贈足下銀角桃杖一枚崔瑗杖銘云乗危履險非杖不行年老力竭非杖不強諸蔗雖羙猶不可杖人恱巳亦不可相太平御覽卷第七百一十
