front:
  text: 太平御覽卷第九百一十二
  hash: sha256:028c61f24fe98416f0b4ab5b3407b9a8fcce097478f28278f57902d5226969e8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_912-1a}
body:
  text: 獸部二十四狸貂貀􅏈猫獺蝟貍爾雅曰狸子􅡐余至切說文曰狸伏獸也禮曰狸首之班然又曰狸去正脊魏志曰清河令徐季龍使人獵令管輅筮其所得輅曰當獲小獸雖有瓜牙微而不疆雖有文章蔚而不相非虎非雉其名曰狸獵人暮歸果如輅言晉書曰樂廣爲河南尹先是河南官舎多妖恠前尹皆不敢處正寢廣居之不疑甞外户自閉左右皆驚廣獨曰顧見墻有孔使人掘墻得貍而殺之其恠亦絶唐書曰武弘度士彠兄子也父卒廬于墓側晨夕哀號有野貍毎至弘度齋時必來求食往來馴狎無驚懼時以爲孝感玄中記曰鈆錫之精爲狐狸子思子曰謂狐爲狸者非直不知貍也忽得狐復失貍者也琴操曰曽子鼓琴墨子立外而聽之曲終入曰善哉鼓琴身巳成矣而曽末得其首也曽子曰吾晝卧見一貍見其身而不見其頭起而爲之弦因曰殘形操淮南子曰貍頭似䑕以類推也許慎曰狸食鼠又曰狸頭止癙癙寒熱病也鷄頭止瘻抱朴子曰虎尾不負狸身象牙不出䑕穴夲草曰狸肉甘無毒主風濕鬼毒氣皮中如針㓨歸藏曰昔者桀筮伐唐而枚占熒惑曰不吉彼爲貍我爲䑕勿用作事恐傷其父者也風俗通曰汝陽西門習武亭有鬼魅宿者輙死其厭者皆亡髮北部督郵西平郅伯夷到亭上樓宿誦六甲孝經易夲記卧宻抜剱解帶夜有正異者四五尺來覆伯夷以劒帶擊魅脚呼下燈照見一老狸正赤略無毛衣持下燒殺明旦發樓屋得所亡髮人髺百餘因此遂絶神仙傳曰欒巴爲豫章太守先是廬山廟中與人言語飲酒投桮音杯能使宮亭湖中分風行者舉㠶相逢巴未到十數日廟中神不復作聲不知所在巴到自上表說廟鬼詐稱天官欺損百姓積愆日夕罪當窮治乞以事付功曹臣身行捕逐如不治討恐其復遊行天下所在血食枉病良民責以重禱乃至所在推求山川社稷問鬼蹤跡此鬼乃到齊國爲書生齊太守見之旣有容美麗又有才辯學識論經說義時在齊人莫不見知太守亦不知是鬼乃以女妻之生一男巴到與太守相見語畢問聞卿有一女􅡾明五經諸子可得相見不太守請女􅡾詐病辝不出而巴求之不止聓告其婦言吾今日出必死如何女亦恠之不知何以巴知不敢出乃求奏板一枚并筆書符付太守曰以此與賢女􅡾自當出也女􅡾得符流涕與婦辤訣而出望見巴即身體巳變爲狸而靣故是人也巴厲聲呵言死狸敢尓何不正汝真形即盡爲狸巴復曰斬之亦不斬者而狸頭巳斷於地又言取狸子來湏臾太守女所生兒巳復爲狸子即又斬之巴辭還郡搜神記曰博陵劉伯祖爲河東太守所止承塵上有神能語常呼伯祖與語及京師詔書告下消息輙預告伯祖伯祖問其所食啖欲得羊肝買羊肝於前切之臠隨刀不見盡兩羊肝有一老狸眇眇在案前持刀者欲舉之刀斫之伯祖呼止自與着承塵上湏臾大笑曰向者啖肝醉忽失形與府君相見大慙愧後伯祖當爲司隷神復先語伯祖云某月某日詔書當到至期如言及入司隷府神隨逐在承塵上輙言省内事伯祖大恐怖語神曰今職在刺舉君左右貴人聞神在此因以相害神荅曰誠如府君所慮相當相捨去遂即無聲幽明録曰吴興戴眇家僮客姓王有少婦美色而眇中弟恒往就之客私懷忿怒具以白眇中郎作此甚爲無理願尊勑語眇以問弟弟大罵曰何縁有此必是妖鬼勑令朾殺客𥘉猶不敢後來閉户欲縛便變成大狸從䆫中出又曰董仲舒常下帷獨詠有客來詣語遂移日舒知其非常客又云欲雨仲舒因此戲之曰巢居知風穴居知雨卿非狐狸則是鼷䑕客聞此言色動形壞化成老狐狸也隋王度古鏡記曰大業七年五月余自御史告歸河東適遇侯生卒而得一鏡六月余歸長安宿於主人程雄家新授寄一婢頗稱端麗各曰鸎鵡余整冠履引鏡自照鸎鵡遥見便叩頭流血云不敢住余召雄問其故雄曰兩日前有一客携婢從東來來時病困因留寄於此不知婢之由也余疑其精魅以鏡逼之遂自陳云夲是華山廟前長松下千歳老狸乆行變惑罪當至死近爲府君捕逐逃潜河渭之間爲下邽陳思恭義女思恭妻鄭氏見養恩厚嫁鸎鵡與郷人柴華意不相愜逃而去東至韓城遂爲行人李無慠所執無傲麄人也遂刼鸎鵡遊行至此不意天鏡一照自隱無路然爲人巳乆羞復故形願樂飲而因匣鏡置酒悉召雄家類里與共飲宴此婢大醉起舞歌曰寳鏡寳鏡哀哉余命自我離形于今幾姓生雖生可樂死不必傷何爲眷戀守此一方歌畢化爲狸而死述異記曰陳留董逸少時隣女梁瑩年稚色艶逸愛慕傾魂貽椒獻寳瑩亦納而未獲果後逸隣人鄭充在逸許宿二更中門前有叩掌聲充卧望之亦識瑩語逸梁瑩今來逸驚躍出迎把臂入舎逸與瑩寢瑩仍求去逸攬持不置申欵逹旦逸欲留之云爲汝烝㹠作食竟去逸起閉户絶帳瑩因變形爲狸從梁上走去金樓子曰貍之不可棲處牛不可使捕䑕貂說文曰貂䑕属也大而黄黒色出丁零國廣志曰貂出夫餘關山圖曰霍山南岳其獸多赤貂東觀漢記曰建武二十五年烏桓詣闕朝賀獻貂皮魏書曰鮮卑有貂豽女滑切鼲音魂子皮毛柔蠕故天下以爲名裘魏志曰挹婁國出好貂今所謂挹婁貂是也江表傳曰遼東太守遣使詣孫權送貂皮千枚欲舉國歸吴晉書曰趙王倫篡位至於奴卒厮役亦加以爵位每朝㑹貂蟬盈坐時爲之喭曰貂不足狗尾續異苑曰貂岀句麗國常有一物共居穴或見之身貂類人長三尺能制貂愛樂刀子其俗人欲得貂皮以刀挿穴口此物夜出皮置刀邊湏人持皮去乃取刀隋書曰北室韋其俗以捕貂爲業南室韋亦多貂貀女滑切說丈曰貀獸無前足漢津能捕豺貀購百錢爾雅曰貀無前足郭璞注曰晉太康七年石陵扶夷縣檻得獸似狗貀文有角兩脚即此類也或日豹似虎而黒無前兩足也廣雅曰豹貀也唐書曰長慶中河東節度使李聽貢貀三頭貀猛揵之獸也穆宗好畋遊甞詔諸道廣求此獸捜踐山谷郡縣告勞防虞籠檻甚於豺虎及至林苑往往噬人後穆宗亦盡令逐之及敬宗即位聽復獻之􅏈音魂說文曰􅏈䑕岀丁令胡以作裘魏略曰丁靈國出青􅏈子白􅏈子皮江表傳曰魏文帝遣使吴求􅏈皮豹犀群臣以非禮欲不與權勑付使山海經曰獄法之山有獸焉如犬而人面善投見人則笑其名曰􅏈其行如風見則大風山海經圖讃曰山􅏈之獸見乃歡唬厥性善投行如矢激是惟氣精岀則風作猫詩曰孔樂韓土有猫有虎爾雅曰虎竊毛謂之虥土盞切猫郭璞注云竊淺也或曰竊毛鹿毛也禮曰古之君子使之必報之迎貓爲其食田䑕也迎虎爲其食田豕也迎而祭之也尹子曰使牛捕䑕不如猫狌音生之捷北史曰獨狐陁性好左道其外祖母髙氏先事猫鬼轉入陁家毎以子日夜祠之猫鬼所殺人取其財物置於所事猫鬼家鬼若降人則靣正青若𬒳牽曳陁後敗免死唐書曰髙宗廢王后令宮人宣勑示后后拜曰但願大家萬歳昭儀長承恩澤死是吾分也良娣承勑罵曰阿武狐媚飜覆至此百千生願得一日爲猫阿武爲䑕吾扼其喉以報今日即足矣武后聞之不說自是約六宫不許畜猫又曰朱泚軍中有猫乳䑕者泚獻之爲祥代宗使中官示於朝宰臣率百僚皆賀崔祐甫獨否中官詰其故荅曰此之失常也可吊不可賀中官徵其狀祐甫立草之略曰禮云迎猫爲其食田䑕也以能除害故列祀典今反乳之是謂失常且猫受人食養而弃職不修亦何異法吏不勤觸邪疆吏不勤捍敵是天將垂戒故不敢賀衆皆伏代宗嘉其正直獺禮記月令曰孟春之月獺祭魚然後虞人入澤梁說文曰獺如小狗水居食魚偏音編獺屬也遁甲開山圖曰霍山光南岳其獸多柴獺山邊水故有柴獺淮南子曰愛獺而飲之酒欲養之非其道言獺飲酒而敗風土記曰陽羡縣前有大橋下有白獺將有兵動獺出穴口向嘷也魏略曰南蠻皆用獺皮爲其冠塩鐵論曰水有獱音頻獺而池勞國有強禦齊民消也獨頻曰獱群曰獺又如淳博物志曰獱如馬自腰以下似扁蝠毛似獺大可五六十斤淳同郷人吉孟景福中征遼東時爲運舡吏於海中有猵獺跳上舡舡人皆謂海神共叩頭敬禮舡左武令人云但魚獺耳可烹而食之神仙傳曰樊夫人者劉䌉之妻也俱行道術各自言勝䌉於是唾槃中水即作鯉魚夫人乃唾槃中使成獺而食魚䌉每共試術事事不如永嘉地記曰濤山至髙常有拾橡者見上有大湖又有自然石橋多獺異色鳥獸蝟孝經援神契蝟曰蝟多刺故不使超踰抑揚爾雅曰蝟毛刺淮南子曰鵲屎中蝟爛而􅃮見蟹不慘淮南萬畢術曰蝟膏塗鐵柔不折華陽國志曰滇池縣有白蝟山無石而多蝟也北齊書曰成帝夢大蝟攻破鄴城故索境内以蝟膏絶之至後主名緯亡齊之徴廣五行記曰梁末蜀人費祕刈麦值暴風雨隱於巖石間避雨去家數里遥見前路有數婦人皆着紅紫襴古莧切衣歌吟而來祕竊恠野外何因有此心異之漸近寂然無聲去秘數歩乃各住立少時悉轉向祕看之其靣並無七孔唯垂鳥毛而巳祕驚怖仆地至二更祕兒恠父不至把火㝷覔見秘卧在道傍左側有十餘刺蝟見火即争散走秘至家百餘日死太平御覽卷第九百一十二
