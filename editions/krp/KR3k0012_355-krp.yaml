body:
  text: 兵部八十六甲上釋名曰鎧猶塏塏堅重之言也或謂之甲似物孚甲以自禦也廣雅曰凾甲介鎧也說文曰鎧甲也釬音汗臂鎧也錏音叚音鴉金遐頸鎧也丗夲曰杼作甲宋衷曰少康之子輿也甲鎧也墨子同書曰惟口起羞惟甲胄起戎孔安國曰甲鎧也言不可輕教令易用兵又曰魯侯伯禽宅曲阜徐戎並興公曰善􅰴乃甲胄矯乃干言當善簡汝甲鎧兠鍪施汝楯使可用也易說卦曰離爲甲胄詩曰小戎美襄公也備其兵甲以討西戎西戎方疆而征伐不休國人則矜其車甲婦人能閔其君子焉又曰叔于田刺莊公也叔處于京繕甲治兵以岀于田國人說而歸之又曰清人在彭駟介旁旁介胄也又曰豈曰無衣與子同裳王于興師修我甲兵與子皆行禮記曰介胄則必有不可犯之色又曰介者不拜言失容也又曰獻甲者執胄又曰甲若有以前之則執以將命無以前之則袒櫜奉胄鄭玄曰甲鎧也有以前之謂他贄弊也櫜鎧衣也胄兠鍪也祖其衣出兠鍪以致命也又曰國家靡弊則車不彫幾甲不組縢食噐不刻鏤君子不履絲履馬不常秣靡弊賦稅極也彫畫也幾附纒爲圻鄂也組縢以組節之也組以鎧飾也又曰賔牟賈侍坐於孔子言及武樂孔子曰武玉克殷濟河而西車甲衅許靳切而藏之府庫而弗復用然後天下知武王不復用兵也又曰君子耻服其服而無其容耻有其容而無其辭恥有其辭而無其德是故君子端冕則有敬色甲胄則有不可辱之色言色稱其服也又曰儒有忠信以爲甲胄禮義以爲干櫓戴仁而行抱義而處雖有暴政不更其所自立有如此者甲鎧也干櫓者小大楯也周禮曰司甲下大夫二人中士八人甲令時鎧也司兵甲戈楯官也又曰燕之無凾也非無凾也夫人而能爲凾也鄭玄曰言其丈夫人人皆能作是噐不湏國工也燕近強胡胡習作甲胄也又曰凾人爲甲犀甲七属兕甲六属合甲五属属讀如灌注之謂止旅下旅扎續之數也革堅者扎長鄭司農云合甲削革裹肉但取其裘合以爲甲也犀甲壽百年兕甲壽二百年合甲壽三百鄭玄白革堅者支乆也凡爲甲必先爲容服者之形容鄭司農云容謂象式也然後制革裁扎之廣袤也權其上旅與其下旅而重若一鄭司農云上旅謂要以上也下旅謂要以下也以其長爲之圍圍謂扎要廣厚凡甲鍜不摯則不堅巳敝則撓鄭司農云鍜鍜革也贄謂質也鍜革太熟則革敝無強撓曲也左傳曰鄭武公娶于申曰武姜生莊公及共叔叚莊公即位使叚居京謂之京城太叔後太叔治甲兵具卒乗將襲於鄭夫人將啓公聞其期命子封帥車二百乗以伐京又曰狄伐衛衛懿公好鶴鶴有乗軒者將戰國人受甲者皆曰使鶴鶴實有禄位余焉能戰又曰楚成王欲黜太子啇臣其師潘崇曰能行大事乎曰能以宮甲圍成王杜預曰大子宫甲也又曰晉秦師于河曲秦軍掩晉上軍趙穿追之不及返怒曰裹糧坐甲固敵是求敵至不擊將何俟焉乃以其属出又曰宋華元獲于鄭逃歸後宋城華元爲植廵功植將主也城者謳曰睅其目皤其腹棄甲而復睅出目皤大腹弃甲謂亡師也于思于思棄甲復來于思鬚之皃使其驂乗謂之曰牛則有皮犀兕尚多棄甲則郍郍猶何也役人曰縱有其皮丹􅃮若何又曰晉侯飲趙盾酒伏甲將攻之其右提音峙彌明知之趨登曰臣侍宴過三爵非禮也遂扶以下公嗾夫􅋙焉明摶而殺之盾曰棄人用犬雖猛何爲鬪且出提彌明死之又曰晉楚戰於邲楚王乗左廣以逐趙旃趙旃弃車而走林屈蕩摶之得其甲裳下曰裳也又曰齊晉陳於鞍齊頃公曰余姑剪滅此而朝食姑且翦盡不介馬而馳之介郄克傷於矢曰余病張侯曰擐甲執兵固即死也擐貫也即就也病未及死吾子勉之又曰使吕相絶秦曰文公躬擐甲胄跋履山川征東之諸侯虞夏啇周之胤而朝諸秦又曰晉楚戰於鄢陵潘尫之子黨與飬由基蹲甲而射之徹七札蹲聚也一發逹七札以示王曰君有二臣如此何憂於戰也又曰晉胥童夷羊五帥甲八百將攻郄氏長魚矯請無用衆旣殺三郄胥童以甲刧欒書中行偃於朝矯曰不殺二子憂必及君公曰一朝而尸三卿余不忍也又曰楚子重伐吴爲簡之師簡選練也克鳩兹至于衡山使鄧廖帥組甲三百𬒳練三千馬融曰組甲組爲甲裏公族所服𬒳練爲裏甲者所服杜預曰組甲成組文𬒳練練𫀆也以侵吴吴人要而擊之獲鄧廖其能免者組甲八十𬒳練三百而已又曰宋災樂喜爲司城以爲政使皇鄖命校正出馬工正出車備甲兵庀武守又曰諸侯㑹柤遂伐偪陽狄彌建大車之輪而蒙之以甲以爲櫓杜預曰狄彌魯人也蒙覆也櫓大楯也左執之右拔㦸成一隊百人爲隊又曰鄭子孔之爲政也專國人患之乃討西宫之難尉止等作難於西宮子孔知而不言子孔當罪以其甲及子革子良氏之甲守以自守子展子西率國子伐之殺子孔而分其室又曰欒盈帥曲沃之甲因魏獻子以晝入絳又曰崔杼稱疾不視事莊公問崔子問疾遂從姜氏侍人賈舉止衆從者而入閉門爲崔子閉公也甲興公登臺而請弗許請自刄於廟弗許遂殺之又曰楚蔿掩爲司馬子木使庀賦庀治數甲兵閱數也賦車籍馬籍䟽其毛色歳齒以備軍用賦車兵車兵甲士徒甲歩卒甲楯之數使器仗有常數旣成以授子木禮也又曰鄭伯有嗜酒爲窟室而夜飲酒擊鍾焉子晢以駟氏之甲伐而焚之伯有奔雍梁雍梁鄭地聞子皮之甲不與攻巳喜曰子皮與我矣晨自墓門之竇入駟帶率國人伐之伯有死於羊肆又曰諸侯將盟於宋西門之外楚人衷甲甲在衣中欲因㑹擊晉伯州犁固請釋甲子木曰晉楚無信乆矣事利而巳苟得志焉焉用有信太宰伯州犁也告人曰令尹將死矣爲明年子木死又曰鄭徐吾犯之妹美公孫楚聘之楚子南也公孫黒又使強委禽焉禽鴈也紡綵用鴈子南戎服入左右射超乗而出女自房觀之曰抑子美夫言丈夫適子南氏子晢怒旣而槖甲以見子南欲殺之而取其妻子南擊之以戈晢傷而歸又曰楚靈王伏甲饗蔡靈侯醉而殺之刑其士七十人公子弃疾帥師圍蔡傳言楚無道也又曰齊子尾卒子旗欲治其室子旗欒施也欲并治子尾之家政殺梁嬰梁嬰子尾家宰而立子良氏之宰子良子尾之子髙疆也子旗爲子良立宰其臣曰孺子長矣孺子謂子良也而相吾室欲兼我也授甲將攻之桓子善於子尾亦授甲將助之或告于子旗子旗不信則數人告將徃又數人告於道遂如陳氏桓子將出矣聞之而還聞子旗至逰服而逆之去戎備着常遊戯之服請命問桓子所至也對曰聞疆氏授甲將攻子子聞諸乎曰弗聞曰子盍亦授甲無宇請從無宅桓子名也又曰齊惠欒髙氏皆嗜酒欒髙二族皆出惠公也信内多怨疆於陳鮑氏而惡之夏有告陳桓子曰子旗子良將攻陳鮑氏遭子良醉而騁欲及子良醉故駈告鮑文子也遂見文子文子國鮑也則亦授甲矣使視二子二子子旗子良則皆將飲酒桓子曰彼雖不信彼傳言也聞我授甲則必逐我及其飲酒也先伐諸陳鮑方睦遂伐欒髙氏欒施髙強來奔又曰晉荀躒如周籍談爲介王曰闕鞏之甲武所以尅啇也闕鞏國所出鎧唐叔受之以處叅虚匡有戎狄又曰魯昭公伐季平子叔孫氏之司馬􅎦戾言於其衆曰凢有季氏與無於我孰利皆曰無季氏是無叔孫氏也騣凶鬯匕戾曰然則救諸帥徒以徃䧟西北隅以入䧟公圍也公徒釋甲執冰而踞言無戰心也遂逐之逐公徒也公遜于齊又曰吴子光伏甲於窟室而享王僚掘地爲室王使甲坐於道及其門坐道邊至光門門階户席皆王親也又曰楚郄宛直而和國人說之令尹子常賄而譛郄宛焉謂子常曰子惡欲飲子酒子惡郄宛又謂子惡令尹欲酒於子氏無極曰令尹好甲兵子出之吾擇焉擇取以進子常取五甲五兵日寘諸門令尹至必觀之而從以酬之曰無極辭及饗曰惟諸門左張惟張兵甲其中也無極謂令尹曰吾幾禍子子惡將爲子不利甲在門矣子必無徃令尹使視郄氏則有甲焉不徃遂令攻郄氏盡㓕郄氏之族黨又曰齊伐晉夷儀東郭書讓登讓衆使後而巳先登書與王猛息戰訖共止息也猛曰我先登書歛甲曰曩者之難今又難焉歛甲起欲擊猛猛笑曰吾從子如驂之靳靳車中馬也猛不敢與書爭言巳從書争言驂馬之相隨靳也又曰齊伐魯魯孟孺子泄帥右師孺子孟懿子之子武伯也顔羽御邴洩爲右二子孟氏臣冉求帥左師管周御樊遟爲右季氏之甲七千冉有以武城人三百爲巳徒卒老㓜守宫次于雩門之外南城門也五右師從之及齊師戰于郊師獲甲首八十冉求所得齊人不能師又曰哀公㑹吴子伐齊甲戌戰于艾陵展如敗髙子國子敗胥門巢王卒助之大敗齊師獲革車八百乗甲首三千以獻于公公以兵從故以勞公又曰吴王夫差敗越于夫椒遂入越越子以甲楯五千保于㑹稽又曰衛孔文子將攻大叔氏訪于仲尼仲尼曰胡簋之事則甞聞之矣甲兵之事未之聞也退命駕而行又曰侯犯以郈叛武叔懿子圍郈弗克駟赤謂侯犯曰且盍多舎甲於子之門以備不虞侯犯曰諾乃命舎甲焉侯犯請易於齊齊有司觀郈將至駟赤使周走而呼曰齊師至矣郈人大駭介侯犯之門甲以圍侯犯又曰晉周綽射殖綽殖綽齊中大夫肩兩矢夾脰曰止將爲三軍不止將取其衷乃㢮弓而縛郭最皆衿甲靣縛公羊曰成元年始作丘甲何以書譏何譏爾譏始丘使也何休一解曰四井爲邑四邑爲丘甲鎧也譏始使丘民作田鎧也周書曰年不登甲則纓縢宫室不容甲不以組也戰國䇿曰陘山之事趙且與秦伐齊齊王懼蘇代爲齊獻書穰侯曰臣聞徃來者之言曰秦且益起甲兵四萬人以伐齊臣竊必是之弊邑之王曰秦王明熟於計穰侯智而習於事必不益趙甲兵以伐齊也國語曰晉平公射鴳不死使竪衰摶之逸公怒枸將殺之叔向聞之曰君必殺之昔吾先君唐叔射兕于徒林殪以爲大甲今君射鴳不死摶之不得是揚吾君之耻也賈逵注曰以兕革爲大甲鴳音又曰勾踐云今夫差衣水犀之甲者億有三千水犀獸名不患其志行之少耻也而衆之不足也史記曰晉趙鞅取晉陽之甲以逐荀寅與士吉射君側之惡人也漢書曰甲不堅密與袒禓音錫同此將不省兵之禍也又曰周亞父曰介胄之士不拜請以軍禮見天子爲之動容又曰魏氏武卒衣三属之甲操十二石之弩負矢五十後漢書曰朱浮𬒳彭寵攻懷懼上䟽曰今秋稼巳熟復爲漁陽所掠張豐狂勃姧黨曰増連年拒守吏士疲勞甲胄生蟣虱弓弩不可施又曰曹操攻袁譚弟尚曰我鎧甲不精故前爲曹操所敗東觀漢記曰祭遵薨賜朱輪容車遣校尉教騎士四百人𬒳玄甲又曰將軍劉尚擊武陵没議復遣將馬援年六十二自請曰臣尚能𬒳鎧上馬光武試焉旣上馬據鞍左右頋眄上曰矍鑠哉是翁也又曰劉盆子與丞相二十餘萬人詣冝陽降光武積兵甲於冝陽城西髙與熊耳山等魏志曰景元三年肅愼國獻皮骨鐵雜鎧二十領又東夷傳曰漢時夫餘王葬用玉甲常以付玄莬音免郡王死則迎取公孫淵誅得之玄莬庫晉書曰桓伊爲江州刺史卒𥘉伊有馬歩鎧六百領預爲表令死乃上之表曰臣過蒙殊寵受任西藩淮南之捷逆兵奔北人馬噐鎧隨處放散于時收拾破敗不足貫連比年營繕並巳脩整今六合雖一餘燼未滅臣不以杇邁猶欲輸力効命仰報皇恩此志永絶衘恨泉壤謹奉輸馬具裝百具歩鎧五百領並在尋陽請勒所属領受詔曰忠誠不遂益以傷懷乃受其所上之鎧又曰馬隆討凉州或夾道累磁石賊負鐵鎧行不得前隆卒悉𬒳犀甲無所留礙賊咸以爲神轉戰千里殺傷以千數又曰杜曽新野人少驍勇絶人能𬒳甲游於水中凢有戰陣勇冠三軍魏宋傳曰司馬文王秉政徴諸葛誕旣𬒳徴詣諸牙門置酒飲宴謂衆人曰前作千人鎧仗始成欲以擊賊今當還洛不復得用欲蹔出將見人逰戯湏臾還耳諸君且止乃嚴皷將七百人出遂殺樂綝呉曆曰魏文帝與吴王明光鎧王隱晉書曰馬隆爲武威太守之郡惡虜窟局樹機能等斷道圍隆隆作八陣圖地廣則鹿角車營並進狹則木屋施輪並戰並前智謀從横出其不意以磁石累夾道側賊鎧不得過隆兵着牛皮鎧得過賊以爲神又曰陶侃夢見司馬與侃鎧者長史陳恊以爲司馬者國姓也鎧者杆國之噐也節下當進位俄轉都督湘洲刺史崔鴻後燕録曰符丕遣石越討慕容豐皆勸豐逆擊之豐曰我無兵仗彼有銳鉀音甲不如待暮一戰而定之三十六國春秋曰太康之𥘉吴冦新殄未盈一紀干戈巳尋蟣虱生乎甲胃鷰雀處於帷幄車頻秦書曰符堅使熊邈造金銀細鏤鎧金爲綖以縲之綖音線宋書曰四年不期爲虜所䧟沈文秀𬒳圍三載外無援兵士卒爲之用命無離叛者日夜戰鬪甲胃生蟣虱隋書曰長孫平爲相州刺史甚有能名在州數年㑹正月十五日百姓大獻戯畫衣裳爲鍪甲之象上怒而覓之俄而念平鎮淮南時事進位大將軍又曰張奫於倫切累破賊有功徴入朝拜大將軍髙祖命升御座而宴之謂奫曰卿可爲朕兒朕爲卿父今日聚集示無外也其後賜綺羅千疋緑沉甲獸文具裝又曰權武少果勁勇力絶人能重甲上馬嘗倒投於井未及泉復躍而出其拳捷如此唐書曰元和中以尚書左丞吕膺撿校工部尚書充東都留守舊例命留守必賜旗甲與萬鎮略同及元膺受任竟無所賜朝論以東有冦虞時用元膺九不當削其儀制以沮威望諌官上䟽曰華汝壽三州例賜戎械居守之重固冝寵借上曰此數處並不當與其後遂皆停五代周史曰唐景思爲偏將顯德𥘉河東劉崇帥衆來冦丗宗親揔六師以禦之及陣於髙平景思於丗宗馬前距踊數四且曰願賜臣堅甲一聮以觀臣之効用丗宗由是知其名因以髙平陣所得降軍數千人署爲効順指揮命景思董之使屯于淮上三年春丗宗親征淮甸景思繼有戰功太平御覽卷第三百五十五
