body:
  text: 皇王部四十唐文宗昭獻皇帝武宗昭肅皇帝宣宗獻文皇帝懿宗恭惠皇帝文宗昭獻皇帝唐書曰文宗昭獻皇帝諱昻穆宗第二子也母曰貞獻皇后蕭氏元和四年十月生長慶元年封江王𥘉名涵寳暦二年十二月敬宗遇弑賊蘇佐明等矯制立綘王勾當軍國事樞宻使王守澄中尉梁守謙率禁軍討賊誅綘王迎上于江邸癸夘見宰臣于閤内下教處分軍國事宰臣百寮三上表勸進乙巳即位於宣政殿景午上赴西宫成服丁未宰臣百寮上表請聽政三表許之戊中尊聖母爲皇太后已酉敕鳯翔淮南先進女樂二十四人並放歸本道庚戍以兵部侍郎翰林學士韋處厚爲中書侍郎同中書門下平章事大和元年二月乙巳御丹鳯樓大赦改元六月詔元和長慶中皆因用兵權以濟事所下制敕難以通行冝令尚書省取元和巳來制敕參詳刪定訖送中書門下議定聞奏甲戍以旱放繫囚七月李同捷除兖海不受詔結幽鎮謀叛徐州王智興請全軍討之帝自撰集尚書中君臣事迹命畫工圖冩於太液亭朝夕觀覽三年五月巳夘栢耆斬李同捷於將陵滄景平丁亥御興安樓受滄州所獻俘九月敕兩軍諸司内官不得着紗縠綾羅等衣服帝性儉素不喜華侈駙馬韋處仁載夾羅巾帝謂之曰比慕卿門地清素以之選尚如此巾服從他諸戚爲之唯卿非所冝也十一月甲午帝親祀昊天上帝於南郊禮畢御丹鳯門大赦禁止竒貢四方不得以雜様織成非常之物爲獻十二月蠻䧟卭雅等州戊午以右領軍衛大將軍董重質充神䇿西川行營都知兵馬使蠻䧟成都府入梓州西郭門下營又詔促諸鎮兵救援兩川乙巳郭釗奏蠻退遣使賜蠻帥蒙􅓕㒹國信四年四月詔曰儉以足用令出唯行著在前經斯爲理本朕自臨四海愍元元之乆困日􅉴忘食宵興疚懷雖絶文繡之飾尚愧茅茨之儉示喻卿士形于詔條如聞積習流弊餘風未革車服第室相髙以華靡之制資用貨寳固啓於貪冒之源有司不禁侈俗滋扇盖朕教條之未敷使兆庻昧於恥尚也其何以足用行令臻于致理歟永念慙歎迨兹申敕自今内外班列職位之士各務素朴弘兹國風有僣差尤甚者御史糾上主者宣示知朕意焉上承長慶寳暦奔靡之風銳意懲革躬行儉素以率厲之五年春正月庚子朔以積隂旬浹罷元㑹太原旱賑粟十萬石二月神䇿中尉王守澄奏宰相宋申錫與漳王謀反即令追捕庚子詔貶宋申錫爲太子右庻子壬寅左常侍崔玄亮及諌官等十四人伏奏玉陛北軍所告事請不於内中鞫問乞付法司帝曰吾謀於公卿矣卿等且退崔玄亮泣涕陳諌乆之帝改容勞之曰朕即與宰臣啇議玄亮等方退癸夘詔漳王庭湊可降爲巢縣公宋申錫開州司馬同正𥘉京師恟恟以宰相實聮親王謀逆三四日後方知誣搆人士側目於守澄鄭注故諌官號泣論之申錫方免其禍四年春正月乙未朔以乆雪廢元㑹壬子詔朕聞天聽自我人聽天視自我人視朕之菲德渉道未明不能調序四時導迎和氣自去冬已來踰月雨雪寒氣尤甚頗傷于和念兹庻民或罹凍餒無所假貸莫能自存中宵載懷旰食興歎怵惕若厲時子之辜思弘惠澤以順時令天下死罪囚除官典犯贓故意殺人外並降從流流巳下遞降一等七年正月詔曰朕承上天之睠佑荷列聖之丕圖宵旰憂勞不敢暇逸思致康乂八年于兹而水旱流行疾疫作沴兆庻艱食扎瘥相仍盖德未動天誠未感物一類失所其過在予載懷罪巳之心深軫納惶之慮如聞關輔河東去年亢旱秋稼不登今春作之時農務尤切若不能賑救懼至流亡京兆府賑粟十萬石河中府綘州各賜七萬石同華陜􅉑晉等州各賜十萬石並以常平義倉物充七月以旱命京城諸司䟽决繫囚閏七月乙夘詔曰朕嗣守丕圖覆嫗生類兢業夤畏上承天休而隂陽失和膏澤愆候害我稼穡災于黔黎有過在予敢忘咎責從今避正殿减供膳停教坊樂廐馬量减蒭粟百司厨饌亦冝權减隂陽鬱堙有傷和氣冝出宫女千人五坊鷹犬量湏减放内外修造事非急務者並停八月甲申御宣政殿冊皇太子永是日降詔應犯死罪降從流流巳下遞减一等九年冬十月内出曲江新造紫雲樓彩霞亭額左軍中尉仇士良以百戯於銀臺門迎之時鄭注言秦中有災冝興土功以猒之乃濬昆明曲江二池上好爲詩每誦杜甫曲江行云江頭宫殿鏁千門細栁新蒲爲誰緑乃知天寳巳前曲江四岸皆有行宫臺殿百司廨署思復昇平故事故爲樓殿以壯之王涯獻搉茶之利乃以涯爲搉茶使茶之有稅自涯始十一月壬戍中尉仇士良率兵誅宰相王涯賈餗舒元輿李訓王璠郭行餘鄭注羅立言李孝本韓約等十餘家皆族誅時李訓鄭注謀内官詐言金吾仗舎石榴樹有甘露請上往觀之内官先至金吾仗見幕下伏甲遽扶帝輦入内故訓等敗流血塗地京師大駭旬日稍安十二月庚辰上御紫宸殿謂宰相曰坊市之間人漸安未李石奏曰人情雖安然刑殺過多致此隂沴又聞鄭注在鳯翔募兵不少今皆𬒳刑戮臣恐乗此生事切冝原赦以安之上曰然鄭覃又陳理道上曰我每思貞觀開元之時觀今日之事往往憤氣瑱膺耳開成元年正月辛丑帝常服御宣政殿受賀遂宣詔大赦天下改元乙巳上御紫宸對宰臣李石奏曰陛下改元御殿人情大恱全放京兆一年租賦又停四節進奉恩澤所該實當要切帝曰朕務行其實不欲崇長空文石曰赦書湏内留一本陛下時看之又十道黜陟使發日更付與公事根本令向外與長吏詳擇施行方盡利害之要矣二年三月戊辰夜彗長八丈有餘西北行東指在張十四度壬申詔曰朕嗣守丕搆對越上玄䖍恭寅畏于今一紀何甞不宵衣念道􅉴食思愆師周文之小心慕易乾之夕惕懼德不類貽列聖羞將欲俗致和平時無殃咎然誠未格物謫見于天仰愧三靈俯慙庻彚思獲攸濟浩無津涯昔宋景發言星因退舎魯僖納諌飢不害人取鑒往賢深惟自勵載軫在予之責冝降恤辜之恩式表殷憂兾荅昭誡天下死罪降從流流巳下並釋放三年九月上以皇太子慢遊敗度欲廢之中丞狄兼謨垂涕切諌是夜移太子於少陽院殺太子宫人左右數十人十月皇太子薨于少陽院謚曰莊恪十一月乙夘夜彗孛東西竟天壬戍詔曰上天蓋髙感應必由乎人事寰宇雖廣理亂盡繫於君心從古巳來必然之義朕嗣膺寳位十有三年常尅巳以䖍恭每推誠於衆庻將以導迎休應漸致輯熈期克荷於宗祧思保寧於華夏而德有所未至信有所未孚災氣上騰天文謫見再周朞月重擾星躔當求衣之時覩垂象之變兢懼惕厲若蹈泉谷是用舉成湯之六事念宋景之一言詳求譴咎之端採聽銷禳之術必有精理藴於衆情兾屈法以安人爰恤刑而原下應犯死罪並降從流流已下遞減一等五年春正月戊寅上不康不受朝賀辛巳崩于大明宫之太和殿謚曰元聖昭獻皇帝廟號文宗葬章陵武宗昭肅皇帝唐書曰武宗昭肅皇帝諱炎穆宗第五子母曰宣懿皇后韋氏元和九年六月十三日生於東宫長慶元年三月封潁王本名瀍𥘉文宗追悔莊恪太子殂不由道乃以敬宗子陳王成美爲皇太子開成四年冬十月宣制未遑冊禮五年正月文宗暴疾宰相李與樞宻劉弘季奉宻旨以皇太子監國兩軍中尉仇士良魚弘志矯詔迎頴王於十六宅曰朕自嬰疾疹有加無瘳懼不能躬揔萬機日釐庻政稽于古訓謀及大臣用建親賢以貳神器親弟潁王瀍昔在藩邸與朕嘗同師訓動成儀矩性禀寛仁俾奉昌圗必諧人欲可立爲皇太弟應軍國政事便令權勾當百辟卿士中外庻臣冝竭乃心輔成子志陳王成美先立爲皇太子以其年尚冲㓜未漸師資比日重難不遑冊命廻踐諸邸式恊至公可復封陳王四日文宗崩宣遺詔皇太弟冝於柩前即皇帝位宰相楊嗣復攝冢宰十四日受冊於正殿年二十七二月制穆宗妃韋氏追謚宣懿皇太后帝之母也上御正殿降徳音以開府右軍中尉仇士良封楚國公右軍中尉魚志弘爲韓國公太常卿崔鄲户部尚書判度支崔珙並本官同中書門下平章事帝在藩邸時頗好道術修攝之事是秋召道士趙歸眞八十一人入禁中於三殿修金籙道埸乃幸三殿於九天壇親受法籙右拾遺王哲上䟽言王業之𥘉不冝崇信過當䟽奏不省㑹昌元年正月庚戍有事于郊禮畢御丹鳯樓大赦改元二月以淮南節度使李紳爲中書侍郎同平章事二年四月司空平章事李德𥙿等上章請加尊號曰仁聖文武至神大孝皇帝戊寅御宣政殿受冊八月廻鶻烏介可汗過天德至𣏌頭烽北俘掠雲朔北川詔劉沔出師守鴈門諸關廻鶻首領屈武降幽王授左武衛將軍詔以廻鶻犯邊漸侵内地或攻或守於理何安令少師牛僧孺陳夷行與公卿集議可否以聞僧孺曰今百寮議狀以固守關防俟其可擊則用兵宰相李徳𥙿議以廻鶻所恃者嗢没赤心耳今巳離叛其彊弱之勢可見戎人獷悍不頋成敗以失二將乗忿入侵出師急擊破之必矣守險恃弱虜無由退擊之爲便天子以爲然乃徴發許蔡汴滑等六鎮之師以太原節度使劉沔爲廻鶻南靣招討使以張仲武爲幽州盧龍節度使充廻鶻東靣招討使以李思忠爲廻鶻西南靣招討使皆㑹軍於太原十月幸涇陽校獵白鹿原諌議大夫髙少逸鄭朗等於閤内論陛下校獵太頻出城稍逺萬機廢㢮晨出夜歸方用兵師且冝停止上優勞之諌官出上謂宰相曰諌官甚要朕時聞其言庻幾减過三年春正月以宿師于野罷元㑹二月太原劉沔奏至大同軍遣石雄襲廻鶻牙帳大敗廻鶻於殺胡山其烏介可汗𬒳瘡而走已迎得太和公主至雲州是日御宣政殿百寮稱賀三月太和公主至京師百官班于章敬寺迎謁仍令所司告憲宗穆宗二室四月昭義節度使劉從諌率三軍以從諌姪稹爲兵馬留後上表請授節鉞尋遣中使賫詔潞府令稹護從諌之䘮歸洛陽稹拒朝旨尋以成德軍節度使王元逵魏博節度使何弘敬並以本官充招討澤潞使四年三月以道士趙歸真爲左右街道門教授先生時帝志學神仙師歸真歸真乗寵每排毀釋氏言非中國之教蠧耗生靈盡冝除去帝頗信之七月王元逵奏邢州刺史裴問別將髙元武以城降洺州刺史王釗磁州刺史安玉皆以城降何弘敬山東三州平潞州大將郭誼張谷陳掦廷遣人至王宰軍請殺劉稹以自贖王宰以聞乃詔石雄率軍三千入潞州郭誼斬劉稹首以迎雄澤潞五州平八月王宰傳稹首與大將郭誼等一百五十人露布獻於京師上御安福門受俘百寮樓前稱賀十月車駕幸鄠縣十一月幸雲陽五年正月宰臣李德𥙿杜悰等率文武百寮上徽號曰仁聖文武章天神功神德明道皇帝辛亥有事於郊廟禮畢御承天門大赦天下秋七月庚子勑併省天下佛寺所拆寺四千六百餘所還俗僧尼二十六萬五百人收充兩稅戸拆招提蘭若四萬餘所收膏腴上田數千萬頃收奴婢爲兩稅戸十五萬人六年三月壬寅上不豫制改御名曰炎帝重方士頗服食修攝親授法籙至是藥躁喜怒失常旣篤旬日不能言宰相李德𥙿等請見不許中外莫知安否人情危懼是月二十三日宣遺詔以皇太叔光王柩前即位是日崩年三十三謚曰至道昭肅孝皇帝廟號武宗葬端陵宣宗獻文皇帝唐書曰宣宗獻文皇帝諱忱憲宗第十三子母曰孝明皇后鄭氏元和五年六月生於大明宫長慶元年三月封光王名怡㑹昌六年三月武宗疾篤宣遺詔立爲皇太叔權勾當軍國政事翌日即帝位改今名時年三十七帝外晦而内㓪嚴重寡言視瞻特異㓜時宫中以爲不惠十餘歳時遇重疾沉綴忽有光輝燭身蹶然而興正身拱揖如對臣寮乳媪以爲心疾穆宗往視之撫其背曰此吾家英物非心憊也賜以玉如意御馬金帶甞夢乗龍昇天言之於鄭太后乃曰此不冝人知母幸勿復言歴大和㑹昌朝愈事韜晦羣居游處未嘗有言文宗武宗幸十六宅宴集彊誘其言以爲戯劇謂之光叔武宗氣豪尤不爲禮及監國之日哀毀滿容接待羣寮决斷庻務人方見其隱德焉四月辛未釋服尊母鄭氏曰皇太后以兵部侍郎翰林學士承旨白敏中同中書門下平章事大中元年正月有事於郊廟禮畢御丹鳯門大赦改元帝雅好儒士留心貢舉有時微行人間採聽輿論以觀選士之得失每山池曲宴與學士詩什屬和公卿出鎮亦賦詩餞行凡對臣寮肅然拱揖鮮有輕易之言大臣或獻章䟽即燒香盥手受而覽之當時以大中之政有貞觀之風焉閏三月勑㑹昌季年併省寺宇雖云異方之教無損爲理之源中國之人乆行其道釐革過當事體未弘其靈山勝境天下州府應㑹昌五年四月所廢寺宇如有宿舊名僧復能修創一任住持所由不得禁止七月太子少保分司東都衛國公李德𥙿爲人所訟貶潮州司馬貟外置二年春正月宰相率文武百寮上徽號曰聖敬文思和武光孝皇帝御宣政殿受冊三年春正月涇原節度康季榮奏吐蕃宰相論恐熱以秦原安樂三州及石門等七關之兵民歸國詔太僕卿陸躭往喻旨仍令靈武節度使朱叔明邠寧節度使張景緒各出本道兵馬應接六月康季榮奏收復原州城及石門驛藏木峽制勝六盤石峽等六關訖邠寧張景緒奏收復蕭關勑於蕭關置武州改樂安爲威州七月三日七關軍人百姓皆河隴遺黎數千人見于關下上御延喜門撫慰令其解辮賜之冠帶共賜絹十五萬疋八月鳯翔節度使李玼奏收復秦州制曰自昔皇王之有國也何甞不文以守成武以集事叅諸二柄歸于大寧朕猥荷丕圖思弘景運憂勤戒惕四載于兹每念河湟土疆綿亘遐闊洎天寳末犬戎乗我多難無方禦姦遂縱腥羶不逺京邑事更十葉時近百年進士試能靡不竭其長䇿朝廷下議皆亦聽其直詞盡以不生邊事爲永圖且守舊地爲明理荏苒於是收復無由今者天地儲祥祖宗垂祐左祍輸欵邊壘連降刷恥建功所謀必尅實頼樞衡妙筭將帥雄稜副玄元不爭之文絶漢武逺征之悔甌脫頓空於内地斥候全據於新封莫大之休指期而就况將士等擳沐風雨暴露郊原披荆榛而刀斗夜嚴逐豺狼而穹廬曉破動皆如意古無與京念此誠勤冝加寵賞涇原冝賜絹六萬疋靈武五萬疋鳯翔邠寧各四萬疋嗚呼七關要害三都膏腴候館之殘趾可尋唐人之遺風尚在追懷往事良用興嗟夫取不在廣貴保其金湯得必有時詎計於遲速今則便務修築不進干戈必使足食足兵有備無患載洽亭育之道永置生靈之安中外臣寮冝體朕意十二月追謚順宗曰至德大聖大安孝皇帝憲宗曰昭文章武大聖孝皇帝𥘉以河湟收復百寮請加徽號帝曰河湟收復繼成先志朕欲追尊祖宗以昭功烈白敏中等對曰非臣等愚昧所能及至是上御宣政殿行事及冊出上俯僂目送流涕嗚咽四年春正月以追尊二聖御正殿大赦天下五年八月汝州刺史張義潮遣兄義潭以瓜沙伊肅等十一州戸口來獻自河隴䧟蕃百餘年至是悉復隴右故地八年正月陜州黄河清二月南蠻進犀牛詔還之十一年九月右𥙷闕陳嘏左拾遺王譜右拾遺薛廷傑上䟽諌遣中使往羅浮山迎軒轅先生上曰朕以萬機事繁躬親庻務訪聞羅浮山處士軒轅集善能攝生年齡亦壽乃遣使迎之或兾有少保理也朕每觀前史見秦皇漢武爲方士所惑常以之爲誡卿等位當論列職在諌司閱示來章深納誠意仍謂崔愼由曰爲吾言於諌官雖少翁欒大復生不能相惑如聞軒轅生髙士欲與之一言耳十二年春正月羅浮山人軒轅集至京師上召入禁中謂曰先生遐壽而長生可致乎曰徹聲色去滋味哀樂如一德施周給自然與天地合德日月齊明何必別求長生耶留之月餘堅求還山十三年五月上不豫月餘不能視朝八月宣遺詔立鄆王爲皇太子勾當軍國事是日崩于大明宫聖壽五十謚曰聖武獻文孝皇帝廟號宣宗葬貞陵懿宗恭惠皇帝唐書曰㦤宗恭恵皇帝諱漼宣宗長子母曰元昭皇太后晁氏大和七年十一月生於藩邸㑹昌六年十月封鄆王本名温大中十三年八月遺詔立爲皇太子監國改今名十三日即帝位時年二十七帝姿貌瑰傑有異稠人藩邸時甞經重疾郭淑妃侍醫藥見黄龍出入於卧内旣間妃以異告帝曰愼勿復言又甞大雪數尺而帝寢室之上獨無人皆異之宣宗製㤗邊陲樂曲詞有海嶽晏咸通之句又大中末京城小兒疊布漬水紐之向日謂之拔暈帝果以鄆王即大位以咸通爲年號九月釋服追尊母后晁氏爲太后謚曰元昭咸通元年春正月上御紫宸受朝十一月丁未有事於郊廟禮畢御丹鳯門大赦改元二年九月林邑蠻㓂安南府遣神䇿將軍康承訓率禁軍及江西湖南之兵赴援三年春正月左僕射門下侍郎平章事杜悰率百寮上徽號曰睿文明聖孝德皇帝四年春正月庚午有事于圎丘禮畢御丹鳯門大赦五年四月南蠻㓂邕管以秦州經略使髙駢率禁軍五千赴邕管㑹諸道之師禦之五月制朕以寡昧獲承髙祖太宗之丕搆六載於兹矣罔畋遊是娱罔聲色是縱罔刑戮是濫罔邪侫是惑蚤夜悚惕以憂以勤庻幾乎八表用康兆人以㤗而西戎𣢾附北狄懷柔獨唯南蠻姧宄不率侵䧟交阯突犯㓪寧爰及嶲州亦用攘㓂勞我士卒興吾甲兵騷動黎元役力飛輓每一軫念憫然疚懷顧惟生人罹此愁苦冝布自天之澤俾垂及物之仁如聞湖南桂州是嶺路係口諸道兵馬綱運無不經過頓遞供承動多差配凋傷轉甚冝有特恩應潭桂兩路各賜錢三萬貫以助軍錢以充館驛息利本錢其江陵江西鄂州三道比於潭桂徭配稍簡冝令本道觀察使詳其間劇准此例與置本錢黎嶲等州因蠻㓂煞傷冝令本道收拾埋瘞六年秋髙駢自海門進軍破蠻軍收復安南府自李琢失政交阯䧟没十年蠻軍北㓂邕容界人不聊生至是方復故地七年十月安南都護髙駢奏蠻㓂悉平十一月御宣政殿大赦以復安南故也九年七月徐州赴桂林戌卒五百人官健許結趙可立殺其主將王仲甫以粮料判官龐勛爲都頭剽掠湘潭衡山兩縣有衆千人擅還本鎮九月甲午龐勛䧟宿州知州判官焦璐奔歸于徐乙未龐塤䧟徐州十年九月賊宿州守將張玄稔以城降有兵萬人馬舉率師赴之龐勛聞之以其衆將攻玄稔玄稔賊之勁將也遂與舉合勢急圍徐州許佶登城拒守者三日佶敗出走稔收復徐州龐勛方來赴援聞城巳拔欲南趨濠州馬舉追及渙河擊敗之勛溺水而死蕭縣主蔣又斬許佶首來降徐㓂悉平十一月南詔蠻驃信坦綽酋龍率衆二萬冦嶲州十二月勑荆南節度使杜悰據司天奏有小孛星氣經歴分野恐有外夷兵水之患縁邊藩鎮最要隄防冝訓習師徒増築城堡凡関制置以其事聞十一年八月同昌公主薨追贈衛國公主謚曰丈懿主郭淑妃所生上尤鍾念悲惜異常以待詔韓宗紹等醫藥不効殺之收捕其親族三百餘人繫京兆府宰相劉贍京兆尹温璋上䟽論諌行法太過上怒十二年春正月宰相路巖率文武百寮上徽號曰睿文英武明德至仁大聖廣孝皇帝御含元殿冊禮畢大赦五月庚申勑愼恤刑獄大易格言語曰如得其情則哀矜而勿喜而獄吏苛刻務在舞文守臣因循罕聞視事以此械繫之輩溢於狴牢追捕之徒繁於簡牘實傷和氣用致沴氛况時属熇蒸化先茂育並赦罪戾式順生成應天下所禁繫罪人除十惡五逆故意殺人外餘並冝踈理釋放十四年六月帝不豫七月戊寅疾大漸制立普王儼爲皇太子權勾當軍國政事辛巳遺詔曰皇太子儇性禀寛和生知忠孝德苞睿哲聖表徇齊必能掦祖宗之重光荷邦家之不搆冝令所司具禮於柩前即皇帝位是日崩于咸寧殿聖壽四十一謚曰睿文昭聖恭惠孝皇帝廟號懿宗葬于簡陵太平御覽卷第一百一十五
