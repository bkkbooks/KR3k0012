  - {type: variant, offset: 1098, length: 369, content: 丁亥發丁男十一萬修築長城三旬而罷七年春正月癸巳有事於太廟乙未制諸州歲貢三人丁巳祀朝日於東郊已巳陳遣兼散騎常侍王亨兼通直散騎常侍王眘來聘壬申車駕幸醴泉宫是月發丁男十萬餘修築長城二旬而罷夏四月巳酉幸晉王第庚戍於楊州開山陽瀆以通運漕八年冬十月甲子將伐陳有事於太廟命晉王廣秦王俊清河公楊素並爲行軍元帥以伐陳九年春正月巳巳白虹夾日辛未賀若弼拔陳京口韓擒虎抜陳南豫州癸酉以尚書右僕射虞慶則爲右衛大將軍景子賀若弼敗陳師於蔣山獲其將蕭摩訶韓擒虎進師入建業獲其將任蠻奴獲陳主叔寳陳國平得州三十郡一百縣四百癸巳遣使持節廵撫之夏四月巳亥幸驪山親勞旋師乙巳三軍凱入獻俘於太廟拜晉王廣爲太尉五月巳夘以吏部尚書蘇威爲尚書右僕射六月乙丑以荆州㹅管楊素爲納言丁丑以吏部侍郎盧愷爲禮部尚書時朝野物議咸願登封秋七月景午詔曰豈可命一將軍除一小國遐邇注意便謂太平予以薄德而封名山, WYG: 乃}
