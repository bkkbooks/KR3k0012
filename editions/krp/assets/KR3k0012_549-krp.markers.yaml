  - {type: variant, offset: 391, length: 336, content: 又曰吳兵入郢伍子胥求昭王旣不得乃掘楚平王墓出屍鞭之三百又曰呉王取子胥屍盛以䲻夷應劭曰取馬皮以爲䲻夷形也浮之江呉人憐之爲立祠於江上因命曰胥山魏志曰宣王討王陵乃窮治其事發陵及令狐思冡剖棺暴屍於所近市三日王隱晉書曰王浚在幽州謡曰幽州城門似藏户中有伏屍王彭祖又曰趙王倫害張華之時洛中震悚唯閻纉敢獨詣東市號哭弔屍而撫之曰早語君遜位而不肯去今果不免禍車頻奏書曰𥘉慕容暐在鄴居石虎宫夢虎齧其臂募人求虎殯所在女子李葂告暐在東明觀下掘得之屍僵不毀暐祼而罵之曰死胡敢夢生天子鞭撻毀辱投之漳河河流迅疾終不移轉暐後爲臣虎所執乃悟而悔焉符堅以李葂無狀無少長悉坑之李固別傳梁冀誅固而露屍於四衢命有敢臨者加其罪固弟子汝南郭況年始成童遊學洛陽乃左提章鉞右秉鈇鑕詣闕上書乞収固屍不許往臨哭陳辭於前遂守䘮不去, WYG: ''}
