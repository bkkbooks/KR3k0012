  - {type: variant, offset: 4060, length: 0, content: '', WYG: 孔演漢魏春秋曰許禇之為人長八尺餘大十圍容貌甚雄勇力絶人漢末賊起褚在汝南與少年相聚及宗族數千家共堅壁相保曹公脩兵汝南褚以其衆歸公公見而壯之曰此樊噲也即日拜都尉引入宿衛諸從禇俠客皆為虎士出入周旋不離左右軍中以禇力如虎癡勇號曰癡虎至今天下稱之皆謂其姓名也吳均齊春秋曰戴僧静㑹稽永興人臨湘侯副太祖在淮隂雅有人鑒見而賞之㑹匈奴卒至僧静應募出戰單刀直前虜騎奔退又斬三級時天盛寒乃脱衣口䘖三頭以刀挿背拍浮而還臨湘侯大賞之曰殺三人亦可反命矣進之於太祖石頭之役功冠諸将遂至貴顯蕭方等三十國春秋曰苻洛雄勇多力猛氣絶人坐制奔牛射洞犁耳苻堅深憚之故常為邉守又曰劉陽少驍猛甚有勇力手曵牛尾却行百歩又曰趙将麻秋令黒槊龍騰三千人馳擊謝艾軍艾左右擾動李偉勸艾乘馬艾不從乃下踞胡􅇃而麾衆趙人以為有伏懼而不進}
