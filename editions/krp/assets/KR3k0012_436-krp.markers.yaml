  - {type: variant, offset: 3025, length: 336, content: 孔演漢魏春秋曰許禇之爲人長八尺餘大十圍容貌甚雄勇力絶人漢末賊起禇在汝南與少年相聚及宗族數千家共堅壁相保曹公脩兵汝南禇以其衆歸公公見而壯之曰此樊噲也即日拜都尉引入宿衛諸從禇俠客皆爲虎士出入周旋不離左右軍中以禇力如虎癡勇號曰癡虎至今天下稱之皆謂其姓名也呉均齊春秋曰戴僧静㑹稽永興人臨湘侯副大祖在淮隂雅有人鑒見而賞之㑹匈奴卒至僧静應募出戰單力直前虜騎奔退又斬三級時天盛寒乃脫衣口銜三頭以刀揷背拍浮而還臨湘侯大賞之曰殺三人亦可反命矣進之於太祖石頭之役功冠諸將遂至貴顯蕭方等三十國春秋曰符洛雄勇多力猛氣絶人坐制奔牛射洞犁耳符堅深憚之故常爲邊守又曰劉陽少驍猛甚有勇力手曳牛尾却行百歩又曰趙將麻秋命黒槊龍騰三千人馳擊謝艾軍艾左右擾動李偉勸艾乗馬艾不從乃下踞胡牀而麾衆趙人以爲有伏懼而不進, WYG: ''}
