  - {type: variant, offset: 164, length: 0, content: '', WYG: 春秋左傳曰趙穿攻靈公於桃園宣子未出山而復太史書曰趙盾弑其君以示於朝宣子曰不然對曰子為正卿亡不越境返不討賊非子而誰宣子曰嗚呼我之懷矣自貽伊戚其我之謂矣孔子曰董狐古之良史也書法不隱又襄四曰太史書崔杼弑其君崔子殺之其弟嗣書而死者二人嗣續其弟又書乃舎之南史氏聞太史盡死執簡以往聞既書矣乃還又曰魯昭公二年晉韓宣子聘魯觀書於太史氏見易象與魯春秋曰周禮盡在魯矣周禮春官下曰太史掌建國之六典太史日官也春秋傳曰天子有日官諸侯有日卿大戴禮曰太子既冠成人免於保傅則有司過之史春秋文耀鈎曰楚立唐氏以為史官蒼雲如蜺圍軫七蟠中有}
