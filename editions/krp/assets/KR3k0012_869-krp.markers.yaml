  - {type: variant, offset: 708, length: 0, content: '', WYG: 衘火以夾之六韜曰軍不舉火将亦不食荘子曰木與木相摩則燃金與火相守則流隂陽錯行則天地大絯於是乎有雷有霆水中有火乃焚大槐又曰利害相摩生火甚多内熱故也衆人焚和衆人遺利則和若利害在人則其和焚矣又曰曾子居衛緼袍無表三日不舉火十年不製衣又曰孔子窮於陳蔡之間七日不火食又曰指窮於為薪火𫝊也窮盡也為薪猶前新也前薪以指指盡前薪之理故火𫝊而不滅不知其盡也又曰以火救火以水救水名之曰益多又曰山木自冦也膏火自煎也又曰馬血為燐人血為野火}
