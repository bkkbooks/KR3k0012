  - {type: variant, offset: 632, length: 12, content: 宗慤征林邑圍區粟城林邑王, WYG: 融十嵗隨父詣京師聞漢中李公清節直諒慕之欲徃觀其為人遂造公門謂門者曰我是公通家子孫也門者白之公曰髙明父祖常與孤遊乎跪而應曰先君孔子與明公先李老君同徳比義而相師友則融與公累世通家坐中數十人莫不歎息咸曰異童子也太中大夫陳煒後至曰人小了了或未能佳少府尋聲答曰君子之幼時豈當惠乎李公撫抃大笑顧少府曰髙明長大必為偉器}
  - {type: page-break, offset: 632, content: '', id: KR3k0012_WYG_287-3a, image: WYG0895/WYG0895-0514a.png}
  - {type: variant, offset: 645, length: 11, content: 陽邁遣將范毗沙逹率萬餘, WYG: 曄後漢書云詣李膺也何晏别傳曰晏時小養魏宫七八歲便慧心天悟衆無愚智莫不貴異之魏武帝讀兵書有所未解試以問晏晏分散所疑無不氷釋邴原别傳曰原字根矩十一喪父家貧早孤隣舍有書原過其傍而哭師問曰童子何罪原曰一則願其不孤二則羡其得學師亦哀原之言而為之勸童子苟有志我徒相教不求費也於是遂就書一歲之間誦孝經論語管輅别傳曰輅年八九歲便喜仰視星辰得}
