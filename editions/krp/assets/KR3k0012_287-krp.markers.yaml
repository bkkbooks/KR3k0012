  - {type: variant, offset: 725, length: 132, content: 泛海陵山至八象浦有大渠南來注浦宋師沮渠置陣林邑王傾國來逆沮渠不得渡以具裝𬒳象諸將憚之請待前後軍進然後擊之慤曰不然吾巳屠其堅城破其銳衆我氣方厲彼巳破膽一戰可定何疑焉慤以爲外國有師子威服百獸乃制其形與象相禦象果驚奔衆因此潰亂慤率兵直度渠奮擊陽邁遁走其衆一時奔散遂尅林邑, WYG: ''}
