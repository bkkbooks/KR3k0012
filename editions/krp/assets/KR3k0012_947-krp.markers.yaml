  - {type: variant, offset: 2176, length: 0, content: '', WYG: 鰲焉唐史劍南本無蠍嘗有人任主簿將之至今呼為主簿䖝莊子曰老􅔶曰三皇之知上悖日月之明下暌山川之精中隳四時之施其智潜於躉之尾而猶自以為聖人不亦可恥乎唐景龍文館記曰上已日上幸於渭濵宴侍臣其日賜侍臣等柳棬各一云帶之寛躉毒辟濕氣干寳捜神記曰安陽城南有亭宿者輒死有書生入亭宿明掘得蠍大如琵琶毒長數尺亭遂安静葛洪方曰蠍中國最多江東即無也稽含遇蠆賦曰元康二年余中夜遇躉客有戲余曰俗語云過滿百為躉所螫斯言信哉雖内省不疚而逢此害喟然而嘆遂作賦蟻焦贛易林震之蹇曰蟻封戸穴大雨將集又復之萃曰蚍蜉戴粒不能上山却推跌蹶損傷其顔韓詩外傳曰夫吞舟之魚大矣蕩而失水則為蟻所制大戴禮曰十二月𤣥駒賁蟻也賁者走於地中也周官曰饋食之豆蜃蚳醢􅜹蛤也蚳蟻之子也禮記檀弓曰子張喪公明儀為志焉禇幕丹質蟻結於四隅鄭𤣥曰畫禇之四角其文如蟻行往來相交錯也蟻蚍蜉也殷之蟻結似今之虵文􅀞也又内則曰蚳醢蚳蚍蜉子也又學記曰蛾子時術之其此之謂乎蛾蚍蜉也蚍蜉之子微虫耳時術蚍蜉之所為其功乃復成大垤也爾雅曰蚍蜉大螘俗呼為馬蚍蜉小者蛘齊人呼蟻為蛘蠪音龍朾直耕切螘赤駮蚍蜉螱音尉飛螘有翅其子曰蚳蚳蟻卵周禮曰蜃蚳醢爾雅曰蚹蠃䗂蝓郭璞曰即蝸牛也張揖廣雅曰蠡蠃蝸牛䗂蝓也莊子曰有國於蝸之左角者曰觸氏有國於蝸之右角者曰蠻氏時相與爭地而戰伏尸數萬逐北旬有五日而後反許慎説文曰蝸一曰䗂蝓山海經曰清安之山北望河曲是多倮纍郭璞曰倮纍蝸牛也陶洪景集註本草經曰䗂蝓味鹹寒無毒一名陵蠡一名土蝸一名附蝸生泰山池澤生隂地沙中垣下䗂蝓入三十六禽限又是四種角蟲之類營室星之精蠍毛詩魚藻彼都人士曰彼君子女卷髪如蠆毛詩義疏曰蠆一名杜伯河内謂之蚊幽州謂之蠍左傳僖公上臧文仲曰䗬蠆有毒而况國乎又昭公二年鄭人謗子産曰其父死於路已為蠆尾大戴禮曰神人國有蜂蠆不螫嬰兒張揖廣雅曰杜伯蠧蠆蠍也説文曰蠍毒蟲也魏志曰彭城夫人夜之厠蠆螫其手呻呼無賴華佗令温湯近熱漬手其中卒可得寢但旁人數為易湯令煖其日即愈北史曰齊後主詔鏁南陽王綽赴行在所至宥之問在其州何者最樂對曰多取蠍令咀人㸔時極樂後主即夜索蠍一斗比曉得二三升置諸浴斛使人祼卧斛中號呌宛轉帝與綽臨觀喜噱不已謂綽曰如此樂事何不早馳驛奏聞綽由是大為後主所寵}
