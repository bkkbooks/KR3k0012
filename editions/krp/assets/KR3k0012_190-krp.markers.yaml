  - {type: variant, offset: 1010, length: 548, content: 不求易事不避難臣之職也不遇盤根錯節何以別利器乎始到河内太守馬稜勉之曰君儒者當謨謀廟堂之上反在朝歌邪詡曰𥘉除之日士大夫皆見弔勉詡籌之知其能爲也朝歌者韓魏之郊背太行臨黄河去敖倉百里而青兾之人流亡万數賊不知開倉招衆刧庫兵守成臯斷天下右臂此不足憂也今其衆新盛難與爭鋒兵不厭權願寛假轡䇿勿令有所舉閡而巳及到官設令三科以募求壯士自掾吏巳下各舉所知攻刧者爲上偷盗爲次帶喪服而不事家業者爲下收得百餘人詡爲之饗會悉負其罪使入賊中誘令劫掠乃伏兵以待之遂殺賊數百人及潜遣貧民能縫者傭作賊衣以綵縫其𥚑爲幟幟記也續漢書曰以縫縷其𥚑也有市里者吏輙擒之賊由是駭散咸稱神明魏志曰袁渙字耀卿爲魏國郎中令及卒太祖爲之流涕以榖二千斛一敎以太倉榖千斛賜郎中令家一敎以垣下榖千斛與曜卿家外不解其意敎曰以太倉榖者官法也垣下榖者新舊也呉書曰建康宫城即呉苑城城内有倉名曰苑倉故開北瀆通轉運於倉所時人亦呼爲倉城晉咸和中修苑城爲宫惟倉不毀故名太倉在西華門内道北晉書鄭黙出爲東郡太守值歲荒人飢黙輙開倉賑給乃舎都亭自表待罪朝廷嘉黙憂國詔書褒歎比之汲黯班告天下若郡縣有此比者聽出給入爲散騎常侍又曰王渾武帝受禪加揚烈將軍遷徐州刺史時年荒饑渾開倉賑贍百姓頼之又曰王藴爲呉興太守民飢輙開倉贍䘏主簿請先列上待報藴曰行仁義敗無恨坐違科免官士庶詣闕左降晉陵太守郡國誌, WYG: ''}
