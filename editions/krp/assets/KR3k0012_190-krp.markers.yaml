  - {type: line-break, offset: 655, content: '', id: KR3k0012_SBCK_190-2b07}
  - {type: variant, offset: 661, length: 348, content: 皆築倉以榖賤時増其價而籴以利農榖貴時減其價而粜以利人名曰常平倉百姓利之也後漢書曰韓韶字仲黄潁川舞陽人也少仕郡辟司徒府秦山賊公孫舉僞號歴年守令不能破多爲坐法尚書選三府掾屬能治劇者乃以韶爲羸長羸縣故城在今兖州塼城縣東北也賊聞其賢相戒不入羸境餘縣多𬒳㓂廢耕桑其流入縣界求索衣粮者甚衆韶愍其飢困乃開倉賑之所廪贍万餘户主者爭謂不可韶曰長活溝壑之民而以此伏罪含笑入地矣太守素知韶名徳竟無所坐又曰隗嚻旣敗公孫述欲安衆以成都郭外有秦時舊倉述改名白帝倉述以色尚白故改之自王莽巳來常空述即使人言白帝倉出榖如山陵百姓空市里徃觀之述乃大㑹羣臣問曰白帝倉竟出榖乎皆對言無述曰訛言不可信道隗王破者復如此矣俄而嚻將王元降述以爲將軍又曰虞詡時朝歌賊寗季等數千人攻殺長吏屯聚連年州郡不能禁乃以詡爲朝歌長故舊皆弔詡曰得朝歌何衰詡笑曰, WYG: ''}
