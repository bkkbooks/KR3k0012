  - {type: variant, offset: 2103, length: 0, content: '', WYG: 魏志曰袁渙為魏國郎中令及卒太祖為之流涕以穀二千斛一教以太倉穀千斛賜郎中令家一教以垣下穀千斛與曜卿家外不解其意教曰以太倉穀者官法也垣下穀者新舊也吳書曰建康宫城即吳苑城城内有倉名曰苑倉故開北瀆通轉運於倉所時人亦呼為倉城晉咸和中修苑城為宫惟倉不毁故名太倉在西華門内道北晉書鄭黙出為東郡太守值歳荒民饑黙輒開倉賑給乃舎都亭自表待罪朝廷嘉黙憂國詔書褒歎比之汲黯頒告天下若郡縣有此比者聴出給入為散騎常侍又曰王渾武帝受禪加揚烈将軍遷徐州刺史時年饑荒渾開倉賑贍百姓賴之又曰王藴為吳興太守民饑輒開倉贍䘏主簿請先列上待報藴曰行仁義敗無恨坐違科免官士庶詣闕左降晉陵太守又食貨志曰漢宣帝時年豐人少利時大司農中丞耿夀昌上計令郡國皆築倉以穀賤增其價而糴以利農穀貴減其價而糶以利人名曰常平倉百姓利之後漢書曰韓韶字仲黄潁川舞陽人也少仕郡辟司徒府泰山賊公孫舉偽號厯年守令不能破多為坐法尚書選三府掾屬能治劇者乃以韶為嬴長嬴縣故城在今兖州塼城縣東北賊聞其賢相戒不入嬴境餘縣多被寇廢耕桑其流入縣界求索衣糧者甚衆韶愍其飢乃開倉賑之所贍萬餘户主者爭謂不可韶曰長活溝壑之民而以此伏罪含笑入地矣太守素知韶多徳竟無所坐又曰隗囂既敗公孫述欲安衆以成都郭外有秦時舊倉述改名白帝倉述以色尚白故改之自王莽以来常空述即使人言白帝倉出穀如山陵百姓空市里往觀之述乃大會羣臣問曰白帝倉竟出穀乎皆對言無述曰訛言不可信道隗王破者復如此矣俄而囂将王元降述以為将軍又曰虞詡時朝歌賊甯季等數千人攻殺長吏屯聚連年州郡不能禁乃以詡為朝歌長故舊皆弔詡曰得朝歌何衰詡笑曰志不求易事不避難臣之職也不遇盤根錯節何以别利器乎始到河内太守馬稜勉之曰君儒者當謨謀廟堂之上反在朝歌邪詡曰初除之日士大夫皆見弔勉詡籌之知其無能為也朝歌者韓魏之郊背太行臨黄河去敖倉百里而青冀之人流亡萬數賊不知開倉招衆刧庫兵守成皋斷天下右臂不足憂也今其衆新盛難與爭鋒兵不厭權願寛假轡䇿勿令有所舉閡而已及到官設令三科以募求壮士自掾吏以下各舉所知攻刧者為上偷盜為次帶喪服而不事家業者為下収得百餘人詡為之饗會悉貰其罪使入賊中誘令刧掠乃伏兵以待之遂殺賊數百人又潜遣貧民能縫者傭作賊衣以綵縫其裾為幟幟記也續漢書曰以綘縷縫其裾也有入市里者吏輒擒之賊由是駭散咸稱神明}
