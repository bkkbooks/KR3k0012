  - {type: variant, offset: 2200, length: 552, content: 矣又曰孟軻問子思曰尭舜文武之道可力而致乎子思曰彼人也我人也稱其言履其行夜思之晝行之滋滋焉汲汲焉如農之趍時商之趍利惡有不致者乎又曰穆公問子思曰吾國可興乎子思曰可公曰爲之柰何對曰苟君與大夫慕周公伯禽之治行其政化開公家之惠杜私門之利結恩百姓脩禮鄰國其興也勃矣又曰衛君問子思曰寡人之政何如荅曰無非君曰寡人不知其不肖亦望其如此也子思曰希㫖容媚則君親之中正弼非則君䟽之夫能使人冨貴貧賤者君也在朝之士孰肯舎其所以見親而取其所以見䟽乎是故競求射君之心而莫有非君之者此臣所謂無非也公曰然乎寡人之過也今知改矣荅曰君弗能焉口順而心不懌者臨事必痝君雖有命臣未敢受也又曰信陵君問曰古之善爲國至於無訟其道何由荅曰由乎政善也上下勤德而和德無不化俗無不和衆之所譽政之所是也衆之所毁政之所非也毁譽是非與政相應所以無訟也又曰子順相魏改嬖寵之官以事賢才奪其不任之禄以賜有功諸䘮職者不恱造謗言文咨以告且曰夫不善前政而有成孰與變之而起謗哉子順曰民之不可與慮始乆矣古之善爲政者其𥘉不能無謗子産相鄭三年而後謗止吾先君之相魯三月而後謗止今吾爲政日新雖不及聖賢庸知謗止獨無時乎文咨曰子産之謗嘗亦聞之未識先君之謗何也子順曰先君𥘉相魯魯人頌曰麛裘而芾投之無戾芾而麛裘投之無郵及三月政化旣行民又作頌曰衮衣章甫實獲我所章甫衮衣恵我無私文咨喜曰乃今知先生不異乎聖賢, WYG: ''}
