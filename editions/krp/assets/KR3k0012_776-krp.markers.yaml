  - {type: variant, offset: 329, length: 0, content: '', WYG: 謝靈運送孔令詩曰河流有急瀾浮驂無緩轍豈伊川途念宿心愧将别顔延年贈王太常詩曰林閭詩宴開亟廽長者轍陸韓卿荅兄希聲詩曰駿足思長坂柴車畏危轍傅武仲舞賦曰或踰埃赴轍霆駭電滅軸説文曰軸持輪也周禮曰軸有三理一者以為媺音美也二者以為久也三者以為利也釋名曰軸複也重複非一之言也又曰伏免在軸上似之也左傳曰齊侯執陽虎將東之陽虎願東陽虎欲西奔晉知齊必反已故詐以東為願也乃囚諸西鄙盡借邑人之車鍥若結切其軸麻約而歸之載葱音忩靈寢於其中葱靈輜車名而逃追而得之囚}
