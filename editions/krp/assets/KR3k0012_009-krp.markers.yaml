  - {type: variant, offset: 2596, length: 0, content: '', WYG: 風言怖懼也常以六七月興未至時三日雞犬為之不鳴大者或至七日小者一二日外國以為黒風盛宏之荆州記曰宜都佷山縣山有風穴張口大數尺名曰風井夏則風出冬則風入風出之時吹拂左右常淨如掃暑月經之凛然有衣裘想宜都山記曰袁山松以六月至此穴便思衣裘}
