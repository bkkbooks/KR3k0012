  - {type: variant, offset: 2597, length: 0, content: '', WYG: 沮陽縣黃竹山常肅肅有風名}
  - {type: variant, offset: 2598, length: 0, content: '', WYG: 風門西京雜記曰董仲舒曰太平之世風不揺條開甲破萌而已老子曰飄風不終朝莊子曰列子御風而行泠然善也旬有五日而後返司馬彪曰列子鄭人列禦㓂也御近也泠然凉貌又北溟有魚其名曰鯤化而為鳥其名曰鵬摶扶揺而上者九萬里司馬彪曰扶揺上行風也風之積也不厚則其負大翼也無力故九萬里則風斯在下矣又}
