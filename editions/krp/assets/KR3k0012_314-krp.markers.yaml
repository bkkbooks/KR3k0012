  - {type: variant, offset: 229, length: 355, content: 又曰袁尚征袁譚於平原使其將審配守鄴曹公攻鄴城尚聞鄴急弃平原而永入城以計事者主簿李孚請行尚曰當何所辦李曰今鄴圍甚急多人則不可孚乃自選温信者三人不示其謀各給駿馬令釋戎器著平上冠持問事杖投暮直􅔰鄴下自稱曹公都督廵歴圍壘所過呵責失候者輙捶之自東歴西徑出曹公營當城門復怒守闈者収縛之因開圍馳入城下配以縋引之孚得入城中皷噪皆呼萬歲守圍者以狀聞公笑曰此非徒入方且復出孚計事訖欲還而外圍益急謂配曰城中糓少無用老弱爲不如駈出之省榖配乃夜簡得一千人皆令秉白幡持脂燭從三門而出請降孚所將來騎隨降人而出時守圍吏聞城中悉降火光照曜但共觀火不復視圍孚出北門突圍而歸尚明日曹公聞乎以得去曰果如吾言又曰公孫瓉除遼東屬國長史常從數十騎出行塞下卒逢鮮卑數百騎瓉乃退入空亭納其從者曰今不奔之則死盡矣乃自持兩刃矛馳出衝賊殺傷數十人瓉左右亦亡其半遂得免, WYG: ''}
