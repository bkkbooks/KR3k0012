  - {type: variant, offset: 1876, length: 0, content: '', WYG: 吕氏春秋曰今有人於此断頭以易冠殺身以易衣世必惑也是何也冠所以飾頭衣所以飾身今殺所飾而要所以飾則不知所為矣世之趨利似此亦不知所為也帝系譜曰神農牛首伏羲人頭蛇身黄帝素問曰頭者精明之主也董卓别傳曰卓知所為不得逺近意欲以力服之遣兵於雒陽城時遇二月社民在社下飲食悉就㫁頭駕其車馬載其婦女財物以㫁頭繫車轅軸還雒云攻敗大獲稱萬嵗入闗雒陽城門焚燒其頭神仙傳曰曹公捕左慈數日得之便㫁頭以白曹公公大喜曰果慈頭定視是一束茅耳捜神記曰南方有落頭民吳時将軍朱桓得一婢毎夜卧後頭輙飛去或從狗竇或從天窓中出入以耳為翼将曉復還數數如此旁人怪之夜照視惟有身無頭其體㣲泠氣息裁属乃蒙之以被至時頭還礙被不得安再三墮地噫咤甚愁而躰氣急急疾若将死者乃去被頭復起轉頸得安復如常人時南征大将亦往往得之又嘗有覆以銅盤者頭不得進遂死愽物志同又曰渤海太守史良好一女子許而不果良㫁其頭而歸投於竈下曰當令火葬頭語曰使君我相從何圖當耳吳苑曰管寧避難遼東還汎海遭風船垂傾没寕思􅄽曰吾嘗一朝科頭三晨晏起今天怒猥集過恐在此}
