  - {type: variant, offset: 877, length: 430, content: 燕丹子曰荆軻謂樊於其曰今得將軍之首與燕地圖秦王必喜而見軻軻將左手把其䄂右手椹其匈則將軍積忿除矣於是起扼腕執刀曰是日夜所欲而今聞命於是自刎頭墮背後兩目不瞑以凾盛於其首與軻入秦吕氏春秋曰今有人於此斷頭以易冠殺身以易衣丗必惑也是何也冠所以飾頭衣所以飾身今殺所飾而要所以飾則不知所爲矣丗之趨利似此亦不知所爲也帝系譜曰神農牛首伏羲人頭蛇身黄帝素問曰頭者精明之主也董卓別傳曰卓知所爲不得逺近意欲以力服之遣兵於雒陽城時遇二月社民在社下飲食悉就斷頭駕其車馬載其婦女財物以斷頭繫車轅軸還雒云攻敗大獲稱萬歳入關雒陽城門焚燒其頭神仙傳曰曹公捕左慈數日得之便斷頭以白曹公公大喜曰果慈頭定視是一束茅耳搜神記曰南方有落頭民呉時將軍朱桓得一婢每夜卧後頭輙飛去或從狗竇或從天䆫中出入以耳爲翼將曉復還數數如此旁人恠之夜照視唯有身無頭其體微冷氣息裁屬乃蒙之以𬒳至時頭還礙𬒳不得安再三墮地噫咤甚愁而體氣急疾若將死者乃去𬒳頭復起傳頸得安復如常人時南征大將亦徃徃得之又甞有覆以銅盤者頭不得進遂死博物志同, WYG: ''}
