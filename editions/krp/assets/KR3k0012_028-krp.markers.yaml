  - {type: variant, offset: 2430, length: 872, content: 西域諸國志曰天笁國以十一月六日爲冬至冬至則麥秀管子曰以冬至之日始數四十六冬盡春始教民鑚燧謹竈泄所以壽人也淮南子曰冬至之日北宫御女黒色衣黒采擊磬石水王北方故處北宮其鎩其畜彘鍛者即内象彘彘水畜又曰陽氣爲火隂氣爲水水勝故夏至濕火勝故冬至慘慘故灰重日冬至井水盛盆水溢鵲始巢八尺之脩日中而景文三尺又曰天文曰冬至日數來歳正月朔日滿五十者民食足不滿五十者减一升餘日日益一升其爲歳伺也伺候也吕氏春秋曰冬至後五旬七日菖蒲百草之先生也於是始耕髙誘注曰菖蒲水草也又曰冬至日行逺道周四極命之曰玄明天又曰仲冬命之曰暢月陽氣在上人民空閒無所事作故日暢月太玄經曰冬至及夜半以後者近玄之象也進而未極往而未至虚而未滿故謂之近玄也玄以子午爲晝夜分冬至夜半以前癸亥之日出玄道好謙夜半以後大道始邁雖進未極雖往未至猶在冲虚而未盈滿也是爲近玄則休也釋文曰冬至斗指子夜半時加午者也又曰調律者度竹爲管蘆莩爲灰列之九間之中漠然無動寂然無聲微風不起纎塵不形冬至夜半黄鍾以應白虎通曰廣莫風冬至斷其大辟行刑獄也又曰冬至前後君子安身静體百官絶事不聽政擇吉辰而後省事又曰冬至陽始起反大寒何也隂氣推而上故大寒玉燭寳典云十一月建子周之正月冬至日極南影極長隂陽日月萬物之始律當黄鍾其管最長故有履長之賀神農書曰冬至隂陽合精天地交譲天爲尸濕地爲不凍君爲不朝百官爲不親事不可出遊必有憂悔符瑞圖曰冬至東北方融風至一名焱風崔寔四人月令曰冬至之日薦黍羔先薦玄冥以及祖禰其進酒尊老及謁賀君師耆老如正旦又曰先後冬至各五日買白犬養之以供祖獮周書時訓曰大雪之日鶡鳥猶鳴者國有訛言虎不交將帥不和挺不出卿士專權冬至之日蚯蚓不結君政不行麋角不解兵不藏水泉不動隂不承陽暦義䟽曰大雪十一月節月之𥘉氣也言太隂之氣以大水凝爲雪故曰大雪冬至十一月之中氣也言冬至者極也太隂之氣上干於陽太陽之氣下極於地寒氣巳極故曰冬至氣當易之是以王者閉門閭啇旅不行以其陽氣乗踊長君壽益長是以冬賀也亦以日之行天至於巽維東南角極之於此故曰冬至顔師古匡謬正俗曰鄭氏箋云鵲之作巢冬至加功至春乃成此言始起冬至加功力爲巢盖直言耳而劉昌宗周讀等音加爲架名從以搆架爲義則不應云架功也, WYG: ''}
