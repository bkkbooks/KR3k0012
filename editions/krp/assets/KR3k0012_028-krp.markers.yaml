  - {type: variant, offset: 1929, length: 0, content: '', WYG: 西域諸國志曰天竺國以十月二十六日為冬至冬至則麥秀管子曰以冬至之日始數四十六日冬盡春始教民鑚燧謹竈泄所以夀人也淮南子曰冬至之日北宮御女黑色衣黑采擊磬石水王北方故處北宮其器鎩其畜彘鎩者却内像隂閉彘水畜又陽氣為火隂氣為水水勝故夏至濕火勝故冬至燥燥故炭輕濕故炭重又曰冬至井水盛盆水溢鵲始巢八尺之臬日中而景三尺吕氏春秋曰冬至後五旬七日菖蒲生百草之先生者於是始耕髙誘註曰菖蒲水草也又冬至日行逺道周四極命之曰𤣥明天又仲冬命之曰陽月陽氣在上人民空閒無所事作故曰陽月太𤣥經曰冬至及夜半以後者近𤣥之象也進而未及往而未至虛而未滿故謂之近𤣥也𤣥以子午為晝夜分冬至夜半以前癸亥之日也𤣥道好謙夜半以後天變雖進未及雖往未至猶在中虛而未盈滿也是為近𤣥則休也釋文曰冬至斗指子夜半時加午者也又調律者度竹為管蘆莩為灰列之九閉之中漠然無動寂然無聲㣲風不起纎塵不形冬至夜半黄鍾以應白虎通曰冬至廣莫風至斷大辟行刑獄也又冬至前後君子安身靜體百官絶事不聽政擇吉辰而後省事又冬至陽始起反大寒何也隂氣推而上故大寒玉燭寳典云十一月建子周之正月冬至日南極景極長隂陽日月萬物之始律當黄鍾其管最長故有履長之慶神農書曰冬至隂陽合精天地交讓天為不温地為不凍君為不朝百官為不親事不可出遊必有憂悔符瑞圖曰冬至東北方融風至一名炎風崔寔四民月令曰冬至之日薦黍羔先薦𤣥𠖇以及祖禰其進酒尊老及謁賀君師耆老如正旦又先後冬至各五日買白犬養之以供祖禰周書時訓曰大雪之日鶡鳥猶鳴者國有訛言虎不交將帥不和荔挺不出卿士專權冬至之日蚯蚓不結君政不行麈角不解冰不藏水泉不動隂不承陽厯義䟽曰大雪十一月節月之初氣也言太隂之氣以大水凝為雪故曰大雪冬至十一月之中氣也言冬至者極也太隂之氣上干於陽太陽之氣下極於地寒氣已極故曰冬至氣當易之是以王者閉關商旅不行以其陽氣乗踊君夀益長是以冬賀也亦以日之行天至於巽維東南角極之於此故曰冬至顔師古匡謬正俗曰鄭氏箋云鵲之作巢冬至加功至春乃成此言始起冬至加功力為巢蓋直言耳而劉昌宗周讀等音加為架名從以構為義則不應云架功也}
