  - {type: variant, offset: 1207, length: 460, content: 京房易妖占曰冬至繕宫殿封倉庫易說曰坎北方也主冬至尚書考靈曜曰冬至日則五星俱起牽牛日月若懸壁五星若編珠孝經説曰斗指子爲冬至至有三義一者隂極之至二者陽氣始至三者日行南至故謂爲至孝經援神契曰冬至陽氣動又曰冬至日在外衡三禮義宗曰十一月大雪爲節者刑於小雪爲大雪時雪轉甚故以大雪名節冬至中者亦有三義一者隂極之至二者陽氣始至三者日行南至故謂之冬至也又曰冬至日祭天於圎丘玉用其蒼璧牲同玉色樂用夾鍾爲宫樂作六變五經通義曰冬至寢兵鼓啇旅不行君不聽政事曰冬至陽氣萌隂陽交精始成萬物氣微在下不可動泄王者承天理故率天下静而不擾也史記曰冬至短極縣土灰孟康曰先冬至三日懸土灰於衡兩端輕重適均冬至日陽氣至則灰重夏至日隂氣至則土重晉灼曰蔡邕律暦記候鍾律權上土灰冬至陽氣應黄鍾通土灰輕而衡仰夏至隂氣應㽔賔通土灰重而衡低進退先後五日之中灰動麋解角蘭根出泉水踊晷以知日至要訣晷景又曰凢候歳美悪候謂歳始或冬至日産氣始萌臘明日人衆卒歲壹㑹歛食發陽氣故曰𥘉歳又曰黄帝得寳鼎宛朐問於臾區對曰帝得寳鼎神筴是歳巳酉朔旦冬至得天子紀終而復始於是黄帝迎日推筴後率世歳復朔旦冬至, WYG: ''}
