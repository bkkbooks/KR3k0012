  - {type: variant, offset: 1741, length: 1, content: 乞, WYG: 女巫祝説如中國祓除而羣隊駞馬旋繞百匝乃止人持一束桞枝回堅之以乳酪灌焉又曰髙車婦人以皮裹羊骸戴之首上縈屈髮髾而綴之髾所交切有似軒冕其死亡𦵏送掘地作坑坐尸扵中張臂引弓佩刀挾矟無異扵生而露坑不掩走馬繞旋多者數百匝男女無大小皆集會之又曰髙車與蠕蠕同唯車輪髙大輻數至多則徙扵鹿渾海西北百餘里部落强大常與蠕蠕爲敵後魏道武帝渡弱洛水西行至鹿渾海襲破之復討其餘種扵狼山又曰道武帝自牛川南引大校獵以髙車爲圍騎徒遮列七百餘里聚雜獸扵其中因駈至平城即以髙車衆起鹿苑南因臺隂北距長城東包白登之西山又曰髙車族有十二姓一曰泣伏利氏二曰吐盧氏三曰乙}
