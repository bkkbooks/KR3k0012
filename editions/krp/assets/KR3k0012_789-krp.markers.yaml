  - {type: variant, offset: 362, length: 0, content: '', WYG: 以驕大遂徙居太和城天寶四載歸義遣孫鳳迦異来朝授鴻臚卿歸國恩賜甚厚又曰閣羅鳳襲封王無何鮮于仲通為劒南節度使張䖍陀為雲南太守仲通􅄶急寡謀䖍陀矯詐遇之不以禮舊事南詔嘗與其妻子謁見都督䖍陀皆私之有所徴求閣羅鳳多不應䖍陀遣人罵辱之仍宻奏其罪惡閣羅鳳忿怨因發兵反圍䖍陀殺之後遣使謝罪仍與雲南録事參軍姜如芝俱来請還其所虜掠具言吐蕃大兵壓境若不許當歸命吐蕃雲南之地非唐有也仲通不許囚其使進軍逼大和城為南詔所敗自是閣羅鳯北臣吐蕃又曰閣羅鳳死其孫異牟尋頗知書有才知善撫其衆吐蕃役賦蠻南重數又奪諸蠻險地城立城堡嵗徴兵以助鎮防牟尋益厭苦之有鄭回者本相州人天寶中授嶲州西瀘}
