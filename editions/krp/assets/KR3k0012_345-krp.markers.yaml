  - {type: variant, offset: 610, length: 0, content: '', WYG: 王後漢書班固與弟超書曰竇侍中遺仲升楚騰陵錯横刀􅀈皂削一枚金錯半垂刀一枚又曰河南尹朱雋董卓陳軍事卓折雋曰我百戰百勝决之於心卿勿妄說且汚我刀續漢書輿服志曰佩刀乗輿黄金通身貂錯半蛟魚鱗金漆錯雌黄室五色諸侯黄金錯環挾半杖墨室公卿百官皆淳墨不半杖小黄門郎雌黄室中黄門郎朱室童子皆虎𤓰文虎賁黄室虎文其將白虎文皆以白珠蛟為標口之飾乗輿者加翡翠山紆嬰其側謝承後漢書曰丹陽方儲為郎中章帝使文郎居左武郎居右儲正住中曰臣文武兼備在所用施上嘉其才以繁亂絲付儲使理之儲㧞佩刀三斷之對曰反經任勢臨事}
