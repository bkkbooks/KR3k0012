  - {type: variant, offset: 402, length: 4, content: 徳榮爲華, WYG: ''}
  - {type: variant, offset: 407, length: 417, content: 聞以妾與馬文子以告孟獻子獻子囚之七日自是子服之妾衣不過七升之布馬餼不過稂莠餼米也稂童粮史記曰黃帝得六相而天地治神明至黃帝得蚩尤而明天道得太常而察地利得奢龍而辨東方得祝融而辨南方得風后而辨西方得后土而辨北方謂之六相又曰堯舉八凱倉舒隤敳檮戭大臨尨降庭堅仲容叔逹爲八凱即垂益禹臯陶之倫也庭堅即臯陶字也使主后土后土地官也以揆百事莫不時叙地平天成揆度成亦平也舉八元伯奮仲堪叔獻季仲伯虎仲熊叔豹季狸爲八元也使布五敎于四方内平外成内諸夏外夷狄謂之十六相亦曰十六族又曰秦悼武王二年始置丞相官樗里疾甘茂爲左右丞相又曰鄭以子産爲相一年竪子不戲狎班白不提挈童子不犁畔二年市不豫賈三年門不夜閇道不拾遺四年田器不歸五年土無尺籍喪期不令而治鄭二十六年而死丁壯號哭老人兒啼子産去我死乎民將安歸又曰公儀休爲魯相客有遺魚者不受客曰聞君嗜魚何故不受相曰以嗜魚故今爲相能自給魚今受而魚誰復給我魚故不受食茹抜其園葵而弃之見布好而出其家婦燔其機云欲令農士工女安其所豈可害其貨乎, WYG: 敢}
