  - {type: variant, offset: 3048, length: 600, content: 條侯免冠謝又曰東方朔詔賜之食於前飯巳盡懐其餘肉持去衣盡汙古史考曰始有燔炙人褁肉燒之曰炮故食取名焉及神農時民食榖釋米加于燒石之上而食及黄帝始有釡甑火食之道成戰國䇿曰蘇秦之楚三月迺得見王談卒辭行楚王曰先王不逺千里而臨寡人曽弗肯留願聞其說對曰楚國食貴於玉薪貴於桂謁者難見於鬼王難見於帝今令臣食玉炊桂因鬼見帝其可得乎漢書曰陸賈勸陳平與太尉綘侯和以謀諸吕平乃以奴婢百人車馬五千乗錢五百万遺賈爲飲食資又曰万石君時賜侯食於家必稽首俯伏而食如在上前子孫有過對案不食又曰有司劾竇嬰矯先帝詔棄市嬰陽病不食欲死或聞上無意殺嬰復食也又曰昌邑王在䘮詔太官上乗轝食如故食監奏未釋服未可御故食也又曰鮑宣上書曰陛下擢臣岩穴誠兾有益毫毛豈徒欲臣美食大官重髙門之地哉晉灼曰高門殿名也又曰太師孔光聖人之後先師之子徳行純淑賜飱十七物服䖍曰食具十七動物也續漢書曰靈帝數遊於西園令後宫采女爲客舎主身爲啇賈行至客舎采女下酒因共飲食東觀漢記曰光武過鄧禹營禹進炙魚上大飡㗖百姓聚觀皆言劉公真天人也又曰汝郁字叔異陳國人年五歳母疾不能飲食郁亦不肯食宗親共竒之因名曰異又曰趙孝字長平建武𥘉天下新定榖食尚少孝得榖炊熟令弟禮夫妻使出比還孝夫妻共茹𬞞菜禮夫妻來歸告言巳食輒獨飯之積乆禮心怪疑後掩伺見之亦不肯後岀遂共𬞞食兄弟怡怡郷里歸徳又曰梁鴻少孤以㓜童詣太學受業治詩禮春秋常獨止不與人同食又曰明德皇后旣處椒房太官上飯累餚膳備副重加幕覆輙徹去譴勑令與諸舎相望也謝氶, WYG: ''}
