  - {type: variant, offset: 2566, length: 0, content: '', WYG: 謂之豕仙其羣臣言於昭王曰是豕無用王命宰夫即膳之豕既死乃見夢於燕相曰今仗君之靈而化吾生也始得為魯津之伯而浮舟者食我以粳粮之珍而欣君之惠将報子焉後燕相遊於魯津有赤龜啣夜光而獻金樓子曰黄金滿笥不以投龜明珠徑寸豈勞彈雀又曰巨龜伏沙嶼間其上生樹木如淵島嘗有商人依以採薪及作食龜被灼熱便還海於是死者數千人又曰陽郡山中有巨龜長八尺腹下有文字前後足下各躡一龜有時踰山越水咸觀異之說苑曰靈龜五色色似玉背隂向陽上隆象天下平法地轉運應四時蛇頭龍頸左精象日右精象月知存亡吉凶之變又曰城濮之戰文公謂子犯曰吾十戰而龜􅑒我迎歳}
