  - {type: variant, offset: 2793, length: 329, content: 後漢書曰光武召桓榮令說尚書甚善之拜爲議郎賜錢十萬使授太子每朝㑹輙令榮於公卿前敷奏經書帝稱善曰得生幾晚特加賞賜後榮入㑹廷中詔賜竒菓授者皆懷之榮獨手捧以拜帝笑之曰此真儒生也以是愈見敬厚常令上宿太子宫後拜太子少傅賜輜車乗馬榮大㑹諸生陳其車馬印綬曰今日所蒙稽古之力也可不勉乎又曰明帝𥘉即位賜天下男子爵人二級漢書音義曰男子者謂户内之長也南輙爲秦制爵二十級又賜爵者罪得贖貧者得賣與人乎三老孝悌力田人三級過公乗得移與子若同子産漢制賜爵自公士也不得上公乗故過者得移授也同産同母兄弟也及流人無名數欲自占者人一級無名數謂文薄也占謂自歸首又曰管陶公主爲子求郎不許而賜錢千萬謂群臣曰郎官上應列宿出宰百里有非其人則人受其殃是以難之又曰永平中顯宗幸宛詔諸李隨安衆宗室㑹見並受賀賜恩寵篤焉, WYG: 原闕}
