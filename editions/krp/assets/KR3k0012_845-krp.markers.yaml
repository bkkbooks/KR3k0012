  - {type: variant, offset: 1387, length: 497, content: 劉表有酒爵三大曰伯雅次曰仲雅小曰季雅伯雅容七升仲雅六升季雅五升又設大針於杖端客有酒輙以􅥵之驗醉醒也博物志曰劉玄石曽於中山酒家沽酒酒家與千日酒飲之至家大醉其家不知以爲死葬之後酒家計向千日徃視之云巳葬於是開棺醉始醒俗云玄石飲酒一醉千日又曰西域有蒲桃酒積年不敗彼俗傳云可至十年欲飲之醉彌日乃解古今記曰烏孫國有青田核得水則有酒味甚淳美如好酒飲盡隨更注水隨成不可乆乆則苦不可飲名曰青田酒丗說曰鍾毓鍾㑹少有令譽其父晝寢因共偷服散酒父時覺且託寐以觀之毓拜而後飲㑹飲而不拜父問其故毓曰酒以成禮不敢不拜問㑹㑹曰偷酒乃非禮所以不拜又曰阮籍遭母憂在晉文王座進酒肉司隷何曽亦在座曰明公方以孝理天下而阮籍以重哀顯於公座飲酒食肉冝流之海外以正風教文王曰嗣宗毁頓如此君不能共憂之冝且有疾而飲酒食肉固䘮禮也籍飲噉不輟神色自若歩兵校尉缺厨中有貯酒數百斛阮籍乃求爲歩兵或云籍與劉靈飲歩兵厨中酒未盡並醉而物故皆好事者爲之籍景元年卒太始中靈猶存焉又曰劉靈縱酒放達或脫衣倮形在室中人見譏之靈曰我以天地爲棟宇室屋爲禈衫諸君何以入我禈中又曰張季鷹縱任不拘時人號爲江東歩兵或謂之曰卿乃縱適一時獨不爲身後名也張荅曰使我有身後名不如即時一杯酒又曰, WYG: ''}
