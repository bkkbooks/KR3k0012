  - {type: line-break, offset: 0, content: '', id: KR3k0012_SBCK_000-1a01}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 御題太平御覽六韻太平誰不喜求實非求名必也勵乾惕還當戒滿盈設徒資黼黻終致詡豐亨宋帝懷慙徳三書弭衆英搜羅雖已富考證未云精四庫翻其目五言寫我情刻太平御覽序宋太宗皇帝太平興國二年三月詔翰林學士李昉等編集太平御覽定為千卷自墳典丘索六經子史稗官藂説前言徃行並録兼收以天文地理人事卉木昆蟲飛走動植類聚羣分綱條目貫具載靡遺使玩索者屬目了心如指諸掌譬猶驅雲霧而仰日月誠古今曠典也粤惟宋世右文稽古闕為先其次為冊府元龜闕然元龜獨紀君臣事實闕詩賦各有偏弊若御覽則探本窮源挈裘舉領求端於經究核於史盡變於子推廣於諸儒之文集不泛不略無弊無偏不惟學士大夫咸所快覩而實可進之經筵以備睿觀者也奈太平興國迨我聖明龍興迄今幾六百載宋世刻本俱已湮滅近世雲間朱氏僅存者亦殘缺過半海内鈔本雖多傳寫展轉訛舛益甚語曰傳之再四必將以白為黒矧魯之為魚亥之為豕乎吾錫士大夫有好文者㑹此文明盛世因閩省梓人用活字校刋始事於隆慶二年至五年纔印其十之一二浩瀚苦難閩人散去於是淛人倪炳伯文篤信好古居業於錫慮斯工未就毅然謀於郡邑二三大夫士協力鳩工鋟諸梨􅀥經之營之三閲寒暑矣度時量力再朞可成先是孫國子虞允一元博學能文力任讐校忽於隆慶六年捐館弗克終事今復苦於舛訛乃吾同年薛憲副應登甲抗志理學㳺心藝文校得善本藏諸家塾其仲子庠生名逢者善繼先志邃意典籍方進未止闕藏本俾倪氏繕寫付刻其公己公人之心詎闕想哉余於憲副又屬姻誼既嘉仲子能成人之美且喜是書得以板行為天下公器故次數語以弁其端云萬厯改元春孟上浣之吉賜進士出身亞中大夫太僕寺卿前淛江道監察御史大理寺左寺丞右左少卿侍經筵講七十准致仕階進大中大夫資治少尹常郡黄正色序太平御覽原序謹按國朝會要曰太平興國二年三月詔翰林學士李昉扈蒙知制誥李穆太子詹事湯悦太子率更令徐鉉太子中允張洎左補闕李克勤左拾遺宋白太子中舎陳鄂光禄寺丞徐用賓太府寺丞吳淑國子監丞舒雅少府監丞李文冲阮思道等同以羣書類集之分門編爲千卷先是帝閱前代類書門目紛雜失其倫次遂詔修此書以前代修文御覽藝文類聚文思博要及諸書叅詳條次分定門目八年二月書成詔曰史館新纂太平編類包羅萬象總括羣書紀厯代之興亡自我朝之編纂用垂永世可改名爲太平御覽帝每聽政之暇日讀御覽三卷有故或闕卽追之雖隆冬短景必及其數大臣請少息帝曰朕開卷有得不以爲勞也凢諸故事可資風敎者悉記之及延見近臣必援引談論以示勸戒焉}
