  - {type: variant, offset: 1474, length: 0, content: '', WYG: 案此則今本前列書目乃宋時官本之舊而襍書古詩賦又不能具録以今考之無傳者十之七八胡公應麟經籍會通則以為是編所引大抵採自類書非其書宋初尚存力駁邁説之誤所言良是然考陳振孫書録解題曰或言國初古書多未亡以御覽所引用書名故也其實不然特因諸家類書之舊耳以三朝國史考之館閣及禁中書總三萬六千餘卷而御覽所引書多不著録盖可見矣是邁所云云振孫己先駁之矣應麟特剿襲其説耳應麟又曰御覽向行抄本十年來始有刻而譌􅍝特甚非老師宿儒即一篇半簡莫能句讀至姓名顛舛世代魯魚初學之士讀之或取為詩文用誤人不尠案此本前有萬厯元年黄正色叙曰太平興國迄今幾六百載宋世刻本俱已湮滅近世雲間朱氏僅存者亦殘缺過半海内鈔本雖多輾轉傳寫訛舛益甚吾錫士大夫有好文者因閩省梓人用活字校刋始事於隆慶二年至五年纔印其十之一二閩人散去於是浙人倪炳伯文謀於郡邑二三大夫協力鳩工鋟諸梨棗孫國子虞允一元力任校讐忽於隆慶六年捐館弗克終事今復苦於舛訛薛憲副應登有校得善本蔵諸家塾其仲子名逢者俾倪氏繕寫付梓云云所言刋本訛􅍝之故大概與應麟合然此書行世實有二本一為活字印本其板心稱共印五百部則正色所云印十之一二散去者其説不確一即倪氏此本二本同出一藁脱誤相類而校手各别字句亦小有異同今以二本㕘校併證以他書正其所可知而仍其所不可知古書義奥文句與後世多殊闕疑猶愈於妄改也宋初去古未逺即所採類書亦皆具有淵源與後來餖飣者逈别故雖蠧蝕斷爛之餘尚可據為出典世所傳宋以前書可考見古籍佚文者僅六七種曰裴松之三國志注曰酈道元水經注曰劉孝標世説新語注曰李善文選注曰歐陽詢藝文類聚曰徐堅初學記其一即此書也殘碑斷碣剥蝕不完歐陽趙洪諸家尚藉之以訂史傳况四庫菁華滙於巨帙獵山漁海採摭靡窮又烏可以難讀廢哉乾隆四十五年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀}
