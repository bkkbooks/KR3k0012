  - {type: variant, offset: 3060, length: 0, content: '', WYG: 又曰齊王北伐太保領太僕安定王賀拔仁馬遲不及前鋒齊王讓之仁對曰御馬超逸羣下不逮齊王大怒免為庻人命之負炭輸於晉陽又曰周裴果字戎昭魏齊州刺史遵之子也従軍征討乘黄驄馬衣青袍毎先登陷陣時人號為黄驄年少又曰周賀若敦與侯􅖰相拒敦軍數有叛人乘馬投􅖰者輒納之乃别取一馬牽以赴船船中逆以鞭鞭之如是再三馬便畏船不上後伏兵於岸招瑱瑱遣兵迎接競來牽馬敦發伏兵掩之盡殪後有亡命奔瑱者猶謂為詐不復納焉又曰梁普通中童謡言有云青絲白馬者侯景乃常乘白馬以青絲為勒用應謠言陳書曰初有童謠曰黄斑青驄馬發自夀陽涘來時冬氣末去日春風始其後陳主果為韓擒虎所敗擒虎黄斑之謂也破建康之始復乘青驄馬徃反時節皆相應隋書曰吐火羅國有穴山中出神馬毎嵗牧牝馬於穴所産必名駒又曰吐谷渾有青海周回千餘里中有小山其俗至冬輙放牝馬於其上言得龍種嘗得波斯草馬放入海因生驄駒日行千里故特稱青海驄馬又曰長孫晟従晉王破突厥王大喜引晟入内同宴極歡有突厥達官來預坐説言突厥之内大畏長孫總管聞其弓聲謂為霹靂見其走馬稱為閃電王笑曰將軍震怒威行域外遂以雷霆為比一何壯哉唐書曰貞觀十三年三月乙巳吉辰廐産白馬朱鬛}
