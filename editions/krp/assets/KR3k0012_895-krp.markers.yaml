  - {type: variant, offset: 2058, length: 446, content: 曰齊主北伐太保領太僕安定玉賀拔仁進馬並非駿足齊王讓之仁對曰御馬超逸羣下不逮齊主大怒免爲庶人命之負炭輸於晉陽又曰周裴果字戎昭魏齊州刺史遵之子也從軍征討乗黃􅍡馬衣青𫀆毎先登䧟陳時人號爲黃􅍡年少又曰周賀若敦與陳侯瑱相拒敦軍數有叛人乗馬投瑱者輙納之乃别取一馬牽以赴舩中人逆以鞭之如是者再三馬便畏舩不上後㐲兵於岸乃遣人乗以招瑱瑱兵迎接競來牽馬敦發伏兵掩之盡殪後有亡命者猶謂爲詐不復納也又曰梁普通中童謡言或云青絲白馬者侯景乃常乗白馬以青絲爲勒用應謡言陳書曰𥘉有童謡曰黄班青􅍡馬發自壽陽涘來時冬氣末去日春風來始其後陳主果爲韓擒所敗擒夲名擒虎黄班之謂也破建康之始復乗青􅍡馬徃反時節皆相應隋書曰吐火羅國有山穴中出神馬毎歲牧牝馬於穴所産必名駒又曰吐谷渾有青海周迴千餘里中有小山其俗至冬輙放牝馬於其上言得龍種甞得波斯草馬放入海因生􅍡駒日行千里故時稱青海􅍡焉又曰長孫晟從晉王破突厥玉大喜引晟入内同宴極歡有突厥逹官來預坐說言突厥之內大畏長孫揔管聞其弓聲謂爲霹靂見其走馬稱爲閃電王笑曰將軍震怒威行域外遂與雷霆爲比一何壯哉, WYG: ''}
