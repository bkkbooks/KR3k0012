  - {type: variant, offset: 2507, length: 515, content: 命之曰敬恭宗廟父母之言夙夜無愆視諸衿鞶去不辭誡不諾盖耻之重去也鄭玄別傳曰故尚書左丞同縣張逸年十三爲縣小史君謂之曰尓有賛道之質玉雖羙湏雕琢而成器能爲書生以成尓志不對曰願之乃遂㧞於其輩妻以弟女列女傳曰邵南申女者申人之女也旣許嫁於農家禮不備而欲迎之女與其人言其人媒氏往求命之者以爲夫婦者人倫之始也不可不正夫家輕我違制不可以行夫家訟之女曰一物不具一禮不備守節持義必死不徃又曰魯師春姜者魯師氏之母也嫁其女三徃而三逐春姜問故以輕其室人也春姜召其女而笞之曰夫婦人以順從爲務貞慤爲首故婦事夫有五平旦纚笄而朝則有君臣之嚴沃盥饋食則有父子之敬報反而行則有兄弟之道必期必誠則有朋友之信寢席之交然後有夫婦之際君子謂春姜曰知隂陽之順逆也楚國先賢傳曰孫㑺字文英與李元禮俱娶太尉桓焉女時人謂桓叔元兩女俱乗龍言得壻如龍也丗說曰王戎儉恡其從子婚與一單衣裁後便責之戎女適裴氏貸錢數萬女歸戎色不說女還錢乃懌丗說曰温嶠從姑劉氏家值亂離唯有一女姑問嶠有求婚意荅云佳壻難得但如嶠比云何姑荅云喪破之餘乞得粗相存活便足慰吾餘年敢希汝比却數日嶠報姑云已得㛰處門地粗可壻身不减嶠因下玉鏡臺一枚姑大喜旣婚交禮女以手披紗扇大笑曰固嫌是此老奴果如所疑玉鏡臺是嶠爲劉越右長史北征劉聦所得也又, WYG: 世説}
