  - {type: variant, offset: 981, length: 700, content: 也臣者君之馬也民者君之輪也勢固則輿安威定則䇿勁臣順則馬良人和則輪利而爲國皆失此有覆輿走馬折䇿敗輪矣又曰爲人君者猶壷也民亦水也壷方水方壷圎水圎吕氏春秋曰魏文侯燕飲皆令諸大夫論巳或言君仁或言君義或言君智至任座曰君不肖君也得中山不封君弟而封君之子是以知君不肖文侯不恱座趍而起次及翟璜曰君賢君也其主賢者其臣之言直今座之言直是以知君賢也又曰善爲君者蠻夷反舌皆服俗淳也水泉深則魚鼈歸之人君賢則豪傑赴之又曰君者仁義以治之愛利以安之忠信以道之務除其災致其福故人之於上也若璽之於塗也抑之以方則方以圎則圎若五種之地必應其類而蕃息百倍此五帝三王之所以無敵也又曰古之王者其所爲少其所爲少因者君術也爲者臣道也爲則擾矣因則静矣因冬爲寒因夏爲暑君奚事焉故曰君道無爲又曰昔太古甞無君其民聚生群處知母不知父無親戚兄弟夫妻男女之別無上下長㓜之道無進退揖讓之禮無衣服履帶宫室畜積之便無器械舟車城郭險阻之備此無君之患故臣之義不可不明也自上丗以來天下亡國多矣而君道不廢者天下利之也又曰齊桓公染於管仲鮑叔晉文染於舅犯郭偃荆莊王染於孫叔敖沈尹承呉闔閭染於伍貟文之義越句踐染於范蠡大夫種此五君者所染當故覇諸侯范吉射染於張栁朔王生中行寅染於籍秦髙強呉夫差染於王孫雄太宰嚭智伯瑶染於智國張武申尚染於魏義偃長宋康王染於唐鞅田不禮此六君者所染不當故國皆殘亡身或死辱爲君非爲君而因榮也非爲君而安也以爲行理也又曰先王用非其有如已之有通乎君道者也君者處虚素服而無智故能使衆智也無能故能使衆能也能執無爲故能使衆爲也無智無能無爲此君之所執又曰鄭君問於𬒳瞻曰聞先生之義不死君信有之乎𬒳瞻對曰有之夫言不能聽道不能行則固不事君也若言聽道行又何死亡故𬒳瞻之不死亡賢於死亡也又, WYG: ''}
