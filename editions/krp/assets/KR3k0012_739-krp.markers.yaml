  - {type: variant, offset: 4876, length: 266, content: 爲熱爲冷甞行從棺底下流度涕而悲王丞相聞之曰此是有情癡應璩新論曰漢末桓帝時郎有馬子侯自謂識音律請客鳴笙竽爲作陌上桑反言鳯將鶵左右僞稱善亦復自揺頭馬子侯爲人頗癡自謂曉音律黃門樂人更往嗤誚子知不知名陌上桑反言鳯將鶵摇頭忻喜賜左右錢帛無復慙也虞翻書曰此中小兒年四歲矣似欲聦哲雖蝦不生鯉子此子似人欲爲求婦不知所向君爲訪之勿怪老癡譽此兒也癎說文曰癎病也續晉陽秋曰大司馬府軍人朱興妻周息男道扶年三歲先得癎病因其病發掘地生埋之爲道扶姑雙女所告正周弃市刑徐羡之議曰自然之愛虎狼猶仁周之凶忍冝加顯戮臣以爲法律之外故當弘通物之理愚謂可特原母命投之遐裔從之, WYG: 為熟}
