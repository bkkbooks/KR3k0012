  - {type: variant, offset: 3107, length: 478, content: 捜神記曰令有縣孫孤城古孤竹君之國也靈帝光和元年遼水中有浮棺人破斫之棺中人語曰我伯夷之弟孤竹君也海水壞我棺椁是以漂汝斫我何爲乃不敢破因爲立祠民有發視者無疾而死捜神記曰北有道人能令人與死人相見其同郡人婦死巳數年聞而徃見之曰願令一見死婦死不恨矣道人曰可然聞鼓聲疾出俄而得見之與婦言語悲喜恩情如生良乆聞鼓音悢悢不能得時出門閇户掩壻壻乃徒岀閇其衣𥚑户間掣絶而去後數歳餘此人死家葬之開塚見婦棺盖下有衣𥚑悢力尚反異苑曰海陵如臯縣東城村邊海岸崩壞一古墓有方頭漆棺以朱題上云百七年墮水元嘉二十載三月墜於懸獻巴蜀志曰獠夷死即立埋棺不卧設盛弘之荆州記曰冠軍縣東一里有張詹墓魏太和時人也刻碑背曰白楸之棺昜朽之裳銅錢不入瓦器不藏嗟爾後人幸勿我傷自胡石之亂墳墓莫不夷毀此墓元嘉𥘉猶儼然六年大水民飢始𬒳發𥘉開金銀錫銅之器爛然畢俻有二朱􅃮棺棺前垂竹薄簾金釘釘之永嘉郡記曰樂成縣石堂水口先時有一􅃮棺逆水入溪十餘里便住有靈下人云是方姥甚有靈驗從征記曰劉表塚在髙平郡表子琮擣四方珎香數十石着棺中蘇合消救之香莫不畢俻永嘉中郡人衡熈發其墓表㒵如生香聞數十里熈懼不敢犯陸機大墓賦曰覩洪檟而爲櫘櫘小棺也, WYG: ''}
