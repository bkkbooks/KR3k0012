  - {type: variant, offset: 4332, length: 440, content: 耳因是太后怒色稍解乃徐說之太后從之又曰趙平原君家樓臨民家民家有躄者盤散行及散音珊平原君羙人居樓上臨見大笑之明日躄者至平原君門請曰臣不幸有跛躄之疾而君之後宫臨而笑臣臣願得笑者頭平原曰諾及躄者去平原君笑曰竪子欲以一笑之故殺吾羙人不亦甚乎終不殺居歳餘門下客稍稍引去過半平原君怪之一人前對曰以君之不殺笑躄者於是平原君斬所笑羙人頭造躄者而謝焉漢書賈誼上書曰天下之勢方病大瘇非徒病瘇又苦􅏓盩􅏓脚掌盩古戾字謂反戾也又曰方今天下又類辟且病痱辟足疾痱音肥風疾也夫辟者一靣痛痱者一方痛又曰哀帝有痿痺如淳曰兩足不能相過曰痿齊書曰始安王遥光字元暉生而躄疾髙帝謂不堪奉拜祭祀欲封其弟武帝諌乃以遥光襲爵足病不得同朝列常乗輿自望賢門入遥光多忌人有餉屐者以爲戲巳大𬒳嫌責爲牋云智不乃葵亦忤旨唐書曰賈直言者父道冲以伎術得罪賜酖於路直言僞令其父拜四方辭上下神祇伺使者視稍怠即取其酖以飲遂迷仆而死明日酖洩于足而後復蘇代宗聞之减父死直言亦自病躄淮南子曰冠難至躄者告盲者負而走兩人皆得其能也故使瘖者語使躄者走大失其所也偏枯, WYG: ''}
