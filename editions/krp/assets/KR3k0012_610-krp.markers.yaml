  - {type: variant, offset: 946, length: 466, content: 禮記有馬融鄭玄二家注馬注今亡唯鄭玄行於丗矣漢書蓺文志曰易曰有夫婦父子君臣上下禮義有所錯而帝王質文丗有損益至周曲爲之防事爲之制言委曲防閑每事爲制也故曰禮經三百威儀三千及周衰諸侯將踰法度惡其害巳皆滅去其籍自孔子時而不具至秦大壊漢興魯髙堂生傳禮十七篇訖孝宣丗后蒼最明戴德戴聖慶普皆其弟子三家立於學官禮古經者出於魯淹中應邵曰淹中里名也及孔氏學七十篇文相似多三十九篇及明堂隂陽王史氏記所見多天子諸侯卿大夫之制雖不能備瘉倉等推士禮而致於天子之說師古曰瘉與愈同愈勝也漢書曰樂以治内而爲同禮以脩外而爲異同則和親異則畏敬也范曄後漢書曰曹褒論曰漢𥘉朝制無文叔孫通頗採禮經叅酌秦法雖適物觀時有救崩弊先王之宏典蓋多闕矣晉書曰韋逞母宋氏家丗儒學其父授以周官音義謂之曰吾家丗學周官傳業相繼此周公所制經紀典誥百官品物備於此矣吾無男汝可授之勿令絶丗後符堅幸太學博士盧壼奏曰廢學巳乆書傳零落比年撰綴唯周官禮注未有其師竊見太常韋逞母宋氏傳其父業得周官晉義今年八十視聽無闕非此母無以傳授後生於是就其家立講堂隔綘紗幔而傳受以宋氏爲文宣君賜侍婢十人周官後學傳於丗時稱韋氏宋母, WYG: ''}
