  - {type: variant, offset: 2418, length: 386, content: 又云劉歆爲左傳學以左氏丘明好惡與聖人同親見夫子而公羊糓梁在七十之後傳聞與親見其詳略不同甞共父向校書父爲糓梁學數以難其父向向不能報也漢書曰春秋所貶損當時有威權者是以隱其書而不宣及末丗口說流行故有公糓鄒夾之傳四家之中公羊糓梁立於學官東觀漢記曰張霸字伯饒以樊鯈刪嚴氏春秋猶多䌓辭乃減爲二十萬言更名張氏學鄭玄別傳曰何休字邵公作公羊解注妙得公羊本意作公羊墨守左氏膏肓糓梁廢疾玄後乃發墨守鍼膏肓起廢疾休見而歎曰康成入吾室操吾矛以伐我乎魏略曰魚豢甞問魏禧左氏傳禧曰左氏相斫書耳不足精意也又曰嚴翰字公仲善於春秋公羊時司隷鍾繇不好公羊而好左氏以左氏爲太官厨公羊爲賣餅家故甞數與辯折長短繇機捷善持論而翰訥口時屈無以應繇曰公羊髙竟爲丘明服矣翰曰直故吏爲明公服尓公羊未肯也蜀志曰孟光字孝𥙿洛陽人博物識古無書不覽尤銳意三長史於漢家舊典好公羊春秋而譏訶左氏毎與來敏争此二義常譊譊讙咋讙許袁切咋音俎格切, WYG: ''}
