  - {type: variant, offset: 241, length: 0, content: '', WYG: 銅梁山左太冲蜀都賦云外負銅梁岩渠張孟注云銅梁山名也按其山有桃枝竹西東亘二十餘里山嶺之上平整逺望諸山而此獨秀也山在州南九里髙梁山江原記云南浦郡髙梁山尾東跨江西首劒閣東西數千里嶺長峻其峯崔嵬於蜀市望之若長雲垂天一日行之乃極其頂俯視衆山泯若平原劒閣銘謂岩岩梁山積石峨峨即述此也九􅉄山四夷郡國縣道記曰九􅉄山東連仲仁西當涇水焉又九􅉄山髙六百六十丈周十五里在咸陽嶻嶭山四夷郡國縣道記曰嶻嶭山在雲陽縣東北十里一名慈峨山勢嵯峨山頂有雲起即雨故里人以為候昔黄帝鑄鼎於此山}
