  - {type: variant, offset: 3132, length: 3, content: 陳於户, WYG: 明堂三朝同用焉其辭並沈約所製是時禮樂制度粲然有序鼔吹宋齊並用漢曲又充庭用十六曲武帝乃去其四留其十二合四時也更製新歌以述功徳天監七年時有事太廟詔曰禮云日齋不樂今親奉始出宫振作鼔吹外可詳議八座承郎叅議請輿駕始出鼓吹從而不作還宫如常儀帝從之遂為定制初武帝之在雍鎮有童謡云襄陽白銅蹄反縳揚州兒識者言白銅為金蹄為馬也白金色及義師之興實以鐡騎揚州之士皆靣縳果如謡言故即位之後更造新聲帝自為之詞三曲又令沈約為三曲以被管絃帝既篤敬佛法又制善哉天樂大歡天道仙道神}
