  - {type: variant, offset: 3076, length: 1, content: 禁, WYG: 等各撰立新歌黄門侍郎王韶之撰歌七首並令施用十二月又奏依舊正朝設樂改太樂諸歌詩王韶之撰二十二章又改正徳舞曰前舞文恱舞曰后武文帝元嘉九年大樂令鍾宗之更調金石至十四年治書令史奚縱又改之二十二年南郊始設登歌詔顔延尚書周官二公𢎞化寅亮天地也上夀酒奏介雅取詩君子萬年介爾景福也食舉奏需雅取易雲上於天需君子以飲食宴樂也徹饌奏雍雅取禮記大饗客以雍徹也並三朝用之犧牲出入宋廢帝元徽二年儀注奏引牲齊及梁初亦同至是改為滌雅取禮記帝牛必在滌三月薦毛血宋元徽三年儀注奏加薦至是為牷雅左氏傳牲牷肥腯北郊明堂太廟並同用降神及迎送宋元徽三年儀注奏昭夏齊及梁初亦同至是改為諴雅取尚書至諴感神皇帝飲福酒宋元徽三年儀注奏加胙至齊不改梁初為永胙至是改為獻雅取記祭統尸飲五澆玉爵獻即今之福酒亦古之獻義也北郊明堂太廟同就燎位宋元徽三年儀注奏昭逺及齊不改就理位齊永明六年儀注奏𨽻幽至是燎埋俱奏禋雅取周禮大宗伯以禋祀昊天上帝也衆官出入宋元徽三年儀注奏肅咸樂齊及梁初亦同至是改為俊雅取禮記司徒選士之秀}
