  - {type: variant, offset: 1853, length: 0, content: '', WYG: 晉國亦未可以貳晉國韓子不可偷也偷薄也若屬有䜛人交鬬其間鬼神而助之以興其凶怒悔之何及吾子何愛扵一環其以取憎扵大國也盍取而與之子産曰吾非偷晉而有二心将終事之是以弗與忠信故也僑聞君子非無賄之難立而無令名之患僑聞為國非不能事大字小之難無禮以定其位之患夫大國之人令扵小國而皆獲其求將何以給之一共一否為罪滋大大國之求無禮以斥之何饜之有吾且為鄙邑則失位矣若韓子奉命以使而求玊焉貪滛甚矣獨非罪乎出一玊以起二罪吾又失位韓子成貪將焉用之且吾以玉賈罪不亦鋭乎鋭細小也韓宣子私覲扵子産以玊與馬曰子命起舎夫玉是賜吾生而免吾死也敢不籍手以拜以玊馬籍手拜謝子産又昭十七年曰鄭禆竈}
