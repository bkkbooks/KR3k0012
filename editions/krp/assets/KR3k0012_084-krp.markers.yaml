  - {type: variant, offset: 443, length: 314, content: 太姜生少子季歷季歷娶大任皆賢婦人生昌有聖瑞古公曰我世當有興者其在昌乎長子太伯虞仲知父欲立季歷古公卒季歷立是爲王季王季修古公之道篤於行義諸侯順之王季卒子昌立是爲西伯西伯曰文王遵后稷公劉之業則古公王季之法篤仁敬老慈少禮下賢者日中不暇食以待士伯夷叔齊太顛閎夭散冝生鬻子辛甲之徒皆歸之崇侯虎譛於紂曰西伯積德諸侯嚮之將不利於帝紂囚西伯於姜里閎夭之徒乃求有莘氏羙女驪戎文馬因殷嬖臣費仲獻之紂乃赦之紂喜賜之弓矢斧鉞使得征伐謂西伯曰愬汝者崇侯虎也西伯乃獻洛西之地以請除炮烙之刑西伯遂爲諸侯决平虞芮人有訟不能决詣周入其界見耕者皆讓畔未見西伯而慙相謂曰吾所爭者周所恥也遂還明年伐犬夷又明年伐宻湏又明年伐崇侯虎而徙都於酆諸侯多歸之都酆明年而薨太子發立, WYG: ''}
