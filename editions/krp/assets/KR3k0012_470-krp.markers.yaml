  - {type: variant, offset: 788, length: 0, content: '', WYG: 孫權拜諸葛恪撫越將軍領丹陽太守授棨㦸武騎三百拜畢令恪備威儀作鼓吹導引歸家時年三十二何法盛晉中興書曰諸葛氏之先出自葛歸漢司𨽻校尉諸葛豐以忠强立名子孫代居二千石三國之興蜀有丞相亮吳有大將軍瑾魏有司空誕名並蓋海内為天下盛族又曰何比干字長卿武帝時為丹陽都尉有隂德嘗獨坐天大雨有一老母詣比干而衣不濕比干怪而敬焉臨去懷中出金册九百九十枚以授比干曰爾子孫當佩印綬如此册數陳書曰征南將軍歐陽頠時頠弟盛為交州刺史次弟邃為衡州刺史合門顯貴威振南土又多致銅鼓生口獻珍異前後委積頗有功於軍國焉司馬彪續漢書曰袁安字邵公桓帝初遷太尉有子逢成隗逢字周陽靈帝時為司空隗字次陽亦至司徒太傅謝承後漢書曰梁冀弟不疑為潁陽侯子允為城父侯冀一門前後七封三皇后六貴人二大將軍夫人女侯邑稱君七人尚公主三人其餘卿將尹校五十七人梁氏在位二十餘年窮極滿盛威行内外百寮側目莫敢違命東觀漢記曰馮異潁川人建武中征賊還過陽翟詔異上冡别下潁川太守都尉及三百里内長吏皆㑹使中大夫致牛酒宗族㑹郡縣給費又曰中元年以竇固為中郎將監羽林左騎破西羗還是時竇氏公侯二千石並在朝廷門内尚三公主賞賜恩賚榮於當世親戚功臣无與為等也又曰鄧訓五子及女弟為貴人立為皇后隲三遷虎賁中郎將車騎將軍儀同三司儀同三司封始自隲也鄧氏自中興後累世寵貴侯者二十九人公二人大將軍以下十三人中二千石十四人州牧郡守四十八人其餘侍中大夫郎謁者不可勝數東京莫與為比又曰耿氏自中興以後訖建安之末大將軍九人卿十三人尚公主三人列侯十九人郎將䕶羗校尉及刺史二千石數十百人又曰章帝崩竇太后臨政竇憲為大將軍食已二萬户弟景執金吾懷將作大匠光禄勲又曰馬防車騎將軍城門校尉加置掾令史位在九卿上絶席詔封防兄弟三人各三千戸防為潁陽侯身帶三綬防子鉅為黄門侍郎肅宗親御章臺下殿陳鼎爼自臨冠之兄弟奴婢各十人已上又曰竇融嗣子穆尚内黄公主而融弟顯親侯竇友嗣子固尚涇陽公主穆長子勲尚東海恭王女竇氏一公二侯三公主四二千石自祖至孫官府邸第相望奴婢千數於親戚功臣莫與為比吳志曰士燮兄弟並為列郡雄長一州偏在萬里威尊無上出入鳴鐘磬備具威儀笳簫鼓吹車騎滿道逺人夾轂焚香者常有數十妻妾乗輜軿子弟從兵騎當時貴重震服百蠻漢書}
