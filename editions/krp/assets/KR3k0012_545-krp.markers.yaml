  - {type: variant, offset: 1, length: 0, content: '', WYG: 君薨而世子生如之何孔子曰卿大夫士從攝主北面於西階南變于朝夕哭位也攝主卿代君聽政者大祝禆冕執束帛升自西階盡等不升堂命毋哭將有事宜清淨祝聲三告曰某之子生敢告升奠幣于殯東几上哭降曾子問曰如已葬而世子生則如之何孔子曰大宰大宗從大祝而告於禰告生三月乃名於禰以名徧告及社稷宗廟山川又曰將冠子冠者至揖讓而入聞齊衰大功之喪如之何冠者賓及賛也孔子曰内喪則廢外喪則冠而不醴徹饌而埽即位而哭如冠者未至則廢又曰昏禮既納幣有吉日女之父母死則如之何吉日有娶女之日}
