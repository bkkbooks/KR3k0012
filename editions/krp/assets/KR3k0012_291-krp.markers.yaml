  - {type: variant, offset: 3602, length: 0, content: '', WYG: 而心緩可襲剛而自用可誘懦志多疑可惑孫子曰軍傍有險阻蔣潢井生葭葦小林翳薈者必謹覆索之此伏奸之所藏處也險者一髙一下之地阻者草蔣水草之藂生潢者池也井者下也葭葦者衆木所居也翳薈者可以屏籠蔽處也此以上相地形此以下察敵情也翳薈草木之相蒙蔽可以藏兵處反覆索之也敵近而静者恃其險也敵逺而挑人者欲人之進也其所處者居易利也所居利也言敵去我近足遣輕佻使前就之其所處者多平利也衆樹動者來也斬拔樹木除道進來故動衆草多障者疑也結草為陣欲使我度稠草中多障蔽者敵必逃去恐追及多作障蔽使人疑有伏也鳥起者伏也下有伏兵住藏觸鳥而驚起獸駭者覆也敵廣張陣兾來覆我故獸驚駭也塵高而鋭者車來也車馬行疾速塵上衝故高也卑而廣者徒來也散而條達者薪採來也塵散衍而條達各行所來也少往來者營軍者也少塵少也辭卑而益備者進也其人來使辭卑使必進來間視之敵増備也辭强而進驅者退也詭詐也來驅馳无所畏是欲退輕車先出居其側者陣也陣兵欲戰也輕車馳車在陣側無約而請和者謀}
