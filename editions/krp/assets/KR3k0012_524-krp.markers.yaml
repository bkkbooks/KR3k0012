  - {type: variant, offset: 1149, length: 0, content: '', WYG: 又五行傳曰六瀰之禮散齋七日致齋三日新器潔以祀用又赤黍三日之朝於中庭祀四方從東方自南至西卒於北方禮曰格祀篇云今亡曰某也方祀曰播國卒相行事其祝也曰若爾神靈洪範六瀰是合神靈位木精靈威仰火精赤熛怒土精含䌔紐金精白招拒水精汁光紀及木帝太皥炎帝火帝土帝黄帝官金帝少昊水帝顓項木官勾芒火官祝融土官后土金蓐收水官𤣥𠖇皆是也又云無差無傾無有不正若民有不敬事神則㑹批之于六瀰言民廣及天下有過者也事六事也㑹合也批推也言天下之有過神靈亦合推内于外天子以為下任者也六事之機以縣示我我民人不敢不敬事上下王祀周禮天官冡宰曰以八則治都鄙一曰祭祀以馭其神祀其先}
