  - {type: variant, offset: 4117, length: 445, content: 其爲元濟執事帳下及厨厩之間者使復其職使之不疑乃屯軍鞠塲以候裴度也又曰石雄爲劉沔禆將㑹昌𥘉回鶻㓂天德詔命劉沔爲招撫迴鶻使三年廻鶻大掠雲朔北邊牙於五原沔以太原之師屯于雲州沔謂雄曰黠虜離散不足駈除國家以公主之故不欲急攻今觀其所爲氣凌我輩若禀朝旨或恐依違我輩捍邊但能除患專之可也公乃選驍徤乗其不意徑趍虜帳彼以疾雷之勢不睱枝梧必弃公主亡竄事苟不捷吾自繼進亦無患也雄受教自選勁騎得沙陁李國昌三部落兼契苾拓㧞雜虜三千騎月暗夜發馬邑徑趍烏介之牙時虜帳逼振武雄旣入城登堞視其衆寡見氊車從十從者皆衣朱碧類華人服飾雄令諜者訊之此何大人虜曰此公主帳也雄喻其人曰國家兵馬欲取可汗公主至此國家也須謀歸路俟其兵合時不得動帳幕雄乃大率城内牛馬雜畜及大鼓夜穴城爲十餘門遲明城上立旗張炬火乃於諸門縱其牛畜鼓譟從之直犯烏介牙帳炬火燭天鼓譟動地可汗惶駭莫測率騎而奔雄率勁騎追之至殺胡山急擊之斬首萬級生擒五千羊馬車帳皆委之而去遂迎公主還又曰黄巢旣䧟長安時鄭畋帳下小校竇玖者驍敢無敵毎夜率敢死之士百人直入京師放火燔諸門斬級而還賊人悚駭, WYG: ''}
