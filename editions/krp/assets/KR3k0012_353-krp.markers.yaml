  - {type: variant, offset: 1877, length: 455, content: 旅賁以先驅也詩曰伯也執殳爲王前驅又曰彼候人兮荷戈與祋候人道路送迎賔客者也荷揭也祋殳也祋丁外切周禮曰車六等之數殳長四尺崇於人四尺謂之四等左傳曰宋張匂與子皮臼任鄭翩殺華多僚子皮華貙也任翩貙家臣華氏居盧門以南里叛公子成以晉師至成前奔晉今還救宋也會晉齊衛救宋與華氏戰于赭立公子城射華豹殪張匂抽殳而下殳長丈二在車邊又曰莒子庚輿將出奔聞烏存執殳而立於道左懼將止苑羊牧之曰君過之烏存以力聞可矣何必弑君成名遂奔齊韓子曰楚國法太子不得乗車至弟門時天雨王急召太子庭中有水太子遂驅車至弟門廷尉舉殳擊馬遂敗其駕焦贑易林曰大過之訟秉鉞執殳挑戰先驅蕭子良古今蒙隷文體曰殳書者伯氏之職也古者文旣記笏武亦書殳也司馬兵法曰兵雜則不利長兵以衛短兵以守太長則犯太短則不及太輕則閱閱則易亂太犯則不濟季氏曰兵長短相爲衛守合同爲用太長太短太輕皆不如法度者也犯者觸推故不濟不及者不還於利閱者不固則破敗故奔北走擾亂煩也故𥘉列即㦸間焉一弓一㦸相間也次列殳矛間焉一殳一矛相間也又曰周左執黃鉞右執白旄所以不進者審察斬殺之威也有司皆執殳戈示諸鞭朴之辱歐使不行不進者也, WYG: ''}
