  - {type: variant, offset: 2822, length: 576, content: 旬之外踰二十日而死不任用非用者罪馬及行則以任齊其行識其所載輕重及道里齊其勞逸乃復用之若有馬訟則聽之訟謂賣買之言相負禁原𧖟者原再也天文辰爲馬𧖟書𧖟爲龍精月直大火則浴其種是𧖟與馬同氣物莫能兩大禁再蠶者爲傷馬與論語曰齊景公有馬千駟死之日民無德而稱焉又憲問曰驥不稱其力稱其德也驥古之善馬也德謂在五御之威儀周書曰其西天子車立馬乗六青馬隂羽鳬旌鳬羽爲旌旄也周公旦主東青馬黒謂之母兒周公主東則太公主西也東青馬則西白矣馬名未聞也又曰義渠以兹白兹白者白馬倨齒食虎豹義渠西戎兹白一名駿也韓詩外傳曰昔者田子方出見老馬於道喟然有志問於御者曰此何馬也御者曰公家畜也罷而不爲用故出放之田子方曰少盡其力老弃其身仁者不爲也束帛而贖之窮士聞之知所歸心焉尚書大傳曰散冝生之犬戎氏取羙馬騘身朱髦雞目者取九六焉陳於紂之庭紂出見之還而觀之曰此何人也散冝生遂趨而進曰吾西蕃之臣昌之使者太公六韜曰商王拘周伯昌於姜里太公與散冝生金十鎰求天下珎物以免君之罪於是得犬戎氏文馬毫毛朱鬛目如黃金項如雞尾名雞斯之乗以獻商王禮斗威儀曰君乗火而王其政頌平南海輸駮馬春秋考異郵曰隂合於八八合陽九八九七十二二爲地地主月月精爲馬月數十二故馬十二月而生人乗以理天下王者駕馬故其字以爲王馬春秋說題辭曰地精爲馬十二月而生應隂紀陽以合功故人駕馬任重致逺利天下月度疾故馬善走淮南子曰八九七十二耦以乗竒竒主辰辰主月月主馬馬十二月而生, WYG: ''}
