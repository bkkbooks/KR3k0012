  - {type: variant, offset: 1856, length: 1, content: 楊, WYG: 左傳昭七年正考父佐戴武宣皆宋君也三命滋益恭三命上卿故其鼎銘曰一命而傴再命而僂三命而俯循墻而走亦莫余敢侮蔡邕銘論曰春秋之論銘也曰天子令德諸侯言時計功大夫稱伐昔肅慎納貢銘之楛矢所謂天子令德者也若黄帝有巾几之法孔甲有盤盂之誡殷湯有甘誓之勒毚鉏咸反鼎有丕顯之銘武王踐祚咨于太師作席几楹杖之銘十有八章周廟金人緘口以慎亦所以勸戒人主朂于令德者也吕尚作周太師封于齊其功銘于昆吾之野獲寶鼎于美陽仲山甫有補衮闕誡百辟之功周禮司勲凡有大功者銘之太常所謂諸侯言時計功者也有宋大夫正考父三命滋益恭而莫侮衞孔悝之祖莊叔隨難漢陽左右獻公衞國賴之皆銘乎鼎晉魏顆獲杜回于輔氏銘功于景鐘所謂大夫稱伐者也鐘鼎禮樂之器昭徳紀功以示子孫物不朽者莫不朽於金石故也近世以來咸銘之于碑揚}
