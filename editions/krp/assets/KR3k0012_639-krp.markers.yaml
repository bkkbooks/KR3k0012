  - {type: variant, offset: 580, length: 0, content: '', WYG: 聴獄訟者又曰掌三刺三宥三赦之法以賛司冦聴獄訟一刺曰訊羣臣再刺曰訊羣吏三刺曰訊萬民訊言也一宥曰不識再宥曰過失三宥曰遺忘不識謂愚民無所識則宥之過失若今時律過失殺人不坐死康成謂識審也若今仇讎當報甲見乙誠以為甲而殺之者過失若舉刃欲斫伐而軼中人者遺忘若間帷薄忘有在焉而以兵矢投射也禮曰分争辯訟非禮不決又曰司冦正刑明辟以聴獄訟司冦秋官卿掌刑者辟罪也必三刺以求民情㫁明其獄訟之中一曰訊羣臣二曰訊羣吏三曰訊萬民有㫖無簡不聴簡誠也有其意無其誠不論以為罪附從輕附施刑也求出之使從􅁿赦從重雖是罪可重猶赦之凡聴五刑之訟必原父子之親立君臣之義以權之權平也意論輕重之序慎測淺深之量以别之意思念也淺深謂俱有罪本心有善惡悉其聰明致其忠愛以盡之盡其情也}
