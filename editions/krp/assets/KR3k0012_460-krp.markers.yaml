  - {type: variant, offset: 1872, length: 0, content: '', WYG: 又曰范雎謂秦王曰大王之國北有甘泉谷口南帶涇渭右隴蜀左闗坂戰車千乗奮擊百萬以秦卒之勇車騎之多以當諸侯譬若施韓盧而逐駑兎也霸王之業可致今反閉闗不敢窺兵於山東者是穰侯為秦謀不忠大王之計過也又曰秦王謂趙使者諒毅曰趙豹平原君數欺弄寡人趙能殺此二人則可若不能殺請率諸侯受命邯鄲城下諒毅曰趙豹平原君寡君之親母弟也猶大王之有華陽涇陽君也大王以孝治聞於天下衣服之便於體膳㗖之嗛於口未嘗不分於華陽涇陽君華陽涇陽君之車馬衣服無非大王之服御者今使臣受大王之令以還報敝邑之君畏懼不敢不行無乃傷華陽君涇陽君之心乎又曰趙且伐燕蘇代為燕謂趙惠王曰今者臣來過川水蚌方出曝而鷸啄其肉蚌掩鷸喙鷸曰今日不雨明日不雨即有死蚌蚌亦謂鷸曰今日不出明日不出必見死鷸兩者不相捨漁者得而併擒之今趙且伐燕燕趙久相持臣恐强秦之為漁父也故願王熟計之惠王曰善乃止}
