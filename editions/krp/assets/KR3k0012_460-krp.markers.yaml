  - {type: variant, offset: 1336, length: 376, content: 又移師攻齊而不知止者身且死爵且偃昭陽車而歸之又曰范雎謂秦王曰大王國之北有甘泉谷口南注涇渭右隴蜀左關阪戰車千乗奮卒數百萬以秦卒之勇車騎之多以當諸侯譬若放韓盧而逐狡兔也霸王之業可致今反閇關不敢窺兵於山東者是穰侯爲秦謀不忠大王之計又曰秦王謂趙使諒貇曰豹平原君數欺弄寡人趙能煞此兩人則可若不能煞請率諸侯受命邯鄲城下諒貇曰趙豹平原君親寡君之母弟也猶大王之有葉陽涇陽君夫以孝悌聞於天下衣服之便於體膳㗖之兼於口未甞不分與焉衣裘無非大王之服今受大王之嚴令以報敝邑之君不敢弗行無乃傷君之心乎戰國䇿曰趙且伐燕蘇代爲燕謂趙惠王曰今者來過川蜯方出曝而鷸啄其肉蜯掩鷸啄鷸曰今日不雨明日不雨蜯將爲脯蜯亦謂鷸曰今日不岀明日不出必見死鷸兩者不相捨漁者得而併擒之今趙且伐燕燕趙乆相持臣恐強秦之爲漁父也故願王熟計之惠王曰善乃止戰國䇿曰昭陽爲楚伐魏移兵而攻齊陳軫爲齊王使見昭陽曰今子旣貴矣王, WYG: 主}
