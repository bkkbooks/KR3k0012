  - {type: variant, offset: 3858, length: 308, content: 烈使國人表其廬而異焉舂說文曰舂擣粟也周禮地官下曰舂人掌供禾物禮記擅弓上曰隣有喪舂不相鄭玄曰相以音聲相助榖梁傳文公曰禮宗廟之事君親割夫人親舂漢書刑法志曰罪人獄巳決充爲城旦舂滿三歳爲鬼薪白粲漢書曰吕后囚戚夫人永巷令舂又曰陳咸爲南陽太守所居以殺伐立威豪猾吏乃大姓犯法論輸府爲地臼木杵舂不中程輒加罪笞又曰江都王建宫人八子有過者輒令羸立或繫居樹上或脫鉗以鈆杵舂不中程輒掠之又曰楚王戊與呉通謀申公曰生諌之不聽乃胥靡之使杵臼雅舂于市晉灼曰胥相靡隨右左坐輕刑名也雅正杵舂南史曰梁武丁貴嬪徳后醋忌遇貴嬪無道使曰舂毎中程若有助者後魏書曰髙祐爲西兖州刺史鎮滑䑓令一家之中自立一碓五家之外共造一井以給行客不聽婦人寄舂取水莊子曰適百里者宿舂糧, WYG: ''}
