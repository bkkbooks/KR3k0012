  - {type: variant, offset: 322, length: 0, content: '', WYG: 也大田之禮簡衆也古者因田習兵閱其車徒之數也大役之禮任衆也築宫邑所以事民力强弱也大封之禮合衆也正封疆溝洫之固所以合聚其民也又曰夏官大司馬之職掌中春教振旅司馬以旗致民平列陳如戰之陳以教坐作進退疾徐疏數之節遂以蒐田中夏教茇舎如振旅羣吏撰車徒遂以苗田中秋教治兵如振旅辨旗物之用遂以獮田中冬教大閱前期羣吏聽􅊎}
