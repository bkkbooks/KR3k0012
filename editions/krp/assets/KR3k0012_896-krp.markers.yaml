  - {type: variant, offset: 3728, length: 410, content: 又曰馬免人於難者其死也葬之以帷牛有德於人者其死也葬之以大車之鹿牛馬有功猶不可忘又况人乎淮南萬畢術曰馬毛犬尾親友自絶取馬毛犬尾置朋友若夫婦衣中自相憎也說苑曰晉平公出田見乳虎乳虎伏而不動平公還謂師曠曰聞之霸王之君岀獵猛獸伏而不敢起今者寡人出乳虎伏而不動此猛獸乎師曠對曰鵲食猬猬食鵕䴊鵕䴊食駮駮食虎夫駮之狀有似駮馬今者吾君必驂駮馬以岀乎平公曰然又曰北塞上之人其馬亡入胡中人皆吊之其父曰此何誰知不爲福居數月其馬將胡駿馬而歸人皆賀之其父曰此何誰知不爲禍家冨馬良其子好騎墮而折髀人皆吊之其父曰此何誰知不爲福居一年胡夷大出丁壯者皆控弦而戰塞上之人死者十九十人戰九人死此子獨以跛故子父相保地鏡圖曰銅器之精見爲馬孔叢子曰衛公子友饋四乗馬於子思曰不以此求交於先生乆降鄙土爲賔至之餼耳又曰公孫龍以白馬爲非馬或曰此辯而毀大道子髙適趙謂龍曰願受業乆不敢先者以白馬爲非馬耳誠能去之則爲弟子龍曰若使去之無以教矣涼州記曰吕光麟嘉五年踈勒王獻火浣布善舞馬, WYG: ''}
