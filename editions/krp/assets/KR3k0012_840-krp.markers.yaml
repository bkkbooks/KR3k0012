  - {type: variant, offset: 2772, length: 467, content: 又曰馬不食脂桑扈不啄粟非廉也又曰未甞稼穡粟滿倉未甞桑虫絲滿囊得之不以道用之横横放也又曰粟得水而熱甑得火而液水中有火火中有水疾雷破石隂陽相薄自然之熱又曰闔盧伐楚五戰入郢燒髙府之粟六韜曰武王入殷發鉅橋之粟以與殷民說苑曰十粟爲一分十分爲一寸又曰墨語禽滑釐曰今凶年與子隋侯珠又與子一鍾粟子將何擇氂曰粟可耳亦具珠部又曰髙平王遣使者從魏文侯貸粟文侯曰湏吾租収邑粟至乃得也使者曰臣𥘉來時見瀆中有魚張口謂臣曰吾窮水魚命在呼吸可得灌乎臣謂之曰待吾南見河堤之君决江河之水灌汝口魚曰謂命在湏臾乃湏決江淮之水比至君還必求吾於枯魚肆今髙平貧窮故遣從君貸速乃湏租收大王必求臣於死人之墓風俗通曰燕太子丹仰歎天爲雨粟賈誼書曰鄒穆公有令食鳬鴈者必以秕無敢以粟於是倉無秕而求易於民二石粟得一石秕民請曰秕食鳬鴈爲無費也今求秕於二石粟而易一石粃食鳬鴈則費甚矣請以粟食之穆公􅒘去非尔所知也夫百姓朐牛而耕暴背而芸勤而不敢隋者豈謂鳥獸哉粟米人之食也柰何以其食養鳥且汝知小計而不知大害晁錯書曰利民欲者莫如用爵致粟能以粟拜爵者皆民之有余者也汜勝之書曰欲知歲冝以布囊盛粟等量埋於隂地冬至, WYG: ''}
