  - {type: variant, offset: 3720, length: 0, content: '', WYG: 又曰馬不食粟桑扈不啄粟非亷也又曰未嘗稼穯粟滿倉未嘗桑蠶絲滿嚢得之不以道用之横横放也又曰粟得水而熟甑得火而液水中有火火中有水疾雷破石隂陽相薄自然之熱又曰闔閭伐楚五戰入郢燒髙府之粟六韜曰武王入殷發鉅橋之粟以與殷民説苑曰十粟為一分十分為一寸又黑子語禽滑釐曰今㐫年與子隋侯珠又與子一鍾粟子将何擇釐曰粟可耳亦見珠部又曰髙平王遣使者従魏文侯貸粟文侯曰須吾租收邑粟至乃得也使者曰臣初來時見瀆中有魚張口謂臣曰吾窮水魚命在呼吸可得灌乎臣謂之曰待吾南見河伯之君決江淮之水灌汝口魚曰謂命在須臾及須決江淮之水比至君還必求吾於枯魚肆今髙平貧窮故遣請君貸粟乃須租收大王必求臣於死人之墓風俗通曰燕太子丹仰歎天為雨粟賈誼書曰鄒穆公有令食鳬鴈者必以秕無敢以粟於是倉無粃而求易於民二石粟得一石秕於民請曰秕食鳬鴈為無費也今求秕於二石粟而易一石秕食鴈則費甚矣請以粟食之公曰去非爾知也夫百姓胊牛而耕暴背而芸勤而不食惰者豈為鳥獸哉粟米人上食也柰何以其食養鳥且汝知小計而不知大害晁錯書曰利民欲者莫如用爵致粟矣能以粟拜爵者皆民之有餘者也汜勝之書曰欲知歳宜以布嚢盛粟等量埋於隂地述異記曰}
