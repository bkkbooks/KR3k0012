  - {type: variant, offset: 621, length: 1, content: 毎, WYG: 之肉而退其蚊有知足者㗱子立切公之肉而退其蚊有不知足者遂長噓短吸而食之及其飽也腹腸為之破潰公曰嗟乎民生亦猶是也孝子傳曰呉猛年七嵗時夏日伏於母牀下恐蚊䖟及父母蕭廣濟孝子傳曰鄧展父母在牖下卧多蚊展伏牀下以自當神異經曰南方蚊翼下有小蜚蟲焉目明者見之每生九卵復成九子蜚而俱出蚊初不知論衡曰蚊䖟不如牛馬之力牛馬困於蚊䖟蚊䖟有勢也搜神記曰呉猛性至孝小兒時在父母邉卧夏時多蚊蚋而終不揺扇恐蚊䖟去已而及父母嶺南異物志曰嶺表有樹如冬青實在枝間形如枇把子每}
