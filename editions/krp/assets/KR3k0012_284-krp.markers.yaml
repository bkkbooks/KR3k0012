  - {type: variant, offset: 477, length: 336, content: 蜀有妖巫維汜弟子單臣傅鎮等復妖言相聚入原武城維或作侯刧吏人自稱將軍於是遣臧宮將北軍及黎陽營數千人圍之賊榖食多數攻不下士卒死傷帝召公卿諸侯王問方略皆曰冝重其購賞時顯宗爲東海王獨對曰妖巫相刧勢無乆立其中必有悔欲亡者但外圍急不得走耳冝小挺緩挺解也令得逃亡逃亡則一亭長足以禽矣帝然之即勑宮撤圍緩賊賊衆分散遂斬臣鎮等又曰岑彭南擊秦豐與其大將蔡宏拒彭等於鄧數月不得進帝怪以讓彭彭懼於是夜勒兵馬申令軍中使明旦西擊山都山都縣名屬南陽郡乃緩所獲虜令得逃亡歸以告豐豐即悉其軍西邀彭彭乃潜兵渡沔水擊其將張楊於阿頭山大破之沔水源出武都東狼谷中即漢水之上源也阿頭山在襄陽從川谷間伐木開道直襲黎丘擊破諸屯兵豐聞大驚馳歸救之彭與諸將依東山爲營豐與蔡宏夜攻彭彭預爲之備出兵逆擊之豐敗走追斬蔡宏又皇甫嵩傳曰, WYG: ''}
