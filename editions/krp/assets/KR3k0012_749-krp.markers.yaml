  - {type: variant, offset: 2320, length: 499, content: 走馹正以篆隷之難不救其速遂作赴急之書蓋今草書也其先岀自杜氏以張爲祖以衛爲父索范者伯叔也二王父子可謂兄弟薄爲庶息羊爲僕隷自而叙之亦不失倉公觀鳥跡之意抑體有踈宻意有倜儻或有飛走流注之勢驚竦峭絶之氣滔滔閑雅之容卓犖調宕之志百體千形而呈其巧豈可一槩而論哉書斷曰如淳云作起草爲藁姚察曰草猶麄書爲夲曰藁蓋剏文議出於此草書之先因於起草又曰晉王逸少妻郄氏甚工書七子獻之最知名玄之凝之徽之操之並工草書凝之妻謝藴有才華亦善書甚爲君舅重焉獻之猶善草書㓜學於父次習於張尓後改變制度別刱其法率尓師心冥合天矩觀其逸志莫之與京齊謝朓字玄暉風華黼藻當時獨歩書甚有聲草殊流美亦猶薄暮川上則餘霞照人晩春林中則飛花滿目宋蕭思話工書學於羊欣得其草妙崗連盡望勢不斷絶雖無竒峯壁立之秀可謂有巧矣袁昂云羊真孔草蕭行范篆各一時之妙也飛白書宋書曰王僧䖍爲尚書令甞爲飛白書題尚書壁曰圎行方止物之定質修之不巳則溢髙之不巳則躓引之不巳則遺是故去之冝疾當時嗟賞以比座右銘唐書曰劉洎除散騎常侍洎性踈俊敢言太宗工王羲之書尤善飛白甞宴三品巳上於玄武門帝操筆作飛白字賜羣臣或乗酒爭取於帝手洎登御座引手得之皆奏曰洎登御牀罪當死請付法帝笑而言曰昔聞婕妤辭軰今見常侍登牀, WYG: 闕}
