  - {type: line-break, offset: 2205, content: '', id: KR3k0012_SBCK_894-5b01}
  - {type: variant, offset: 2205, length: 446, content: 續漢書曰張奐字然明爲安定屬國都尉羌離湳奴感切上奐馬二十疋大豪甞以金渠八枚遺奐奐召主簿張祁入於羌前以酒酹地曰使馬如羊不得以入厩使金如粟不得以入懷盡還不受東觀漢記曰張湛爲光禄勲帝臨朝或有惰容湛輙諌其失常乗白馬上每見湛輙言白馬生復諌矣事具職官部光禄篇又曰呉漢兵守成都公孫𫐠將延岑遣竒兵出呉漢兵後襲擊破漢漢墮水縁馬尾得岀又曰杜林字伯山與馬援卿里素相親厚援從南方還時林馬適死援令子持馬一疋遺林曰朋友有車馬之饋可具以備乏林受之居數月林遣子奉書曰將軍內施九族外有賔客望恩者多林父子兩人食列卿禄常有盈今送錢五萬援受之謂子曰人當以此爲法是伯山所以勝我也又曰上始欲征匈奴與竇固等議出兵調度皆以爲塞外草羙可不湏馬榖其各以固等將兵到燉煌當出塞上請馬榖上以固言前後相違怒不與榖皆言案軍出塞無榖馬故事馬防言宣帝時五將岀征匈奴候騎得漢馬矢見其中有粟知漢兵出以故引去以是言之馬當與榖上善其用意微動勑下調馬榖防遂見親近又曰明徳后詔書流布咸稱至德王主諸處莫敢犯禁廣平鉅鹿樂成王入問起居車騎鞌勒皆純黒無金銀采飾馬不踰六即賜錢五百萬, WYG: ''}
