  - {type: variant, offset: 4593, length: 0, content: '', WYG: 黄石公記曰動為事機舒之彌四海卷之不盈懐柔而能剛則其國彌光弱而能强則其國彌章一簞之醪投之於河令士衆迎飲三軍為其死戰如風發攻如河決軍無財士不來軍無賞士不往香餌之下必有懸魚重賞之下必有死夫犒師左傳曰夏齊師伐我北鄙公使展喜犒師使受命于展禽齊侯未入境展喜從之曰寡君聞君親舉玉趾將辱於敝邑使下臣犒執事又曰三十三年秦師過北門及滑鄭商人弦髙將市於周遇之以乘韋先牛十二犒師商行賈也乘四韋也先韋乃及牛也古者將獻饋於人者必先之曰寡君聞吾子將歩於敝邑敢犒從者不腆敝邑為從者之淹居則具一日之積腆厚也奄乆也積芻米菜薪也行則備一夕之}
