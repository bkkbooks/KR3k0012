  - {type: variant, offset: 2060, length: 192, content: 擢爲吏部郎又曰許彦少孤貧好讀書後從沙門法叡受易世祖𬒳徵以卜筮頻驗遂在左右參與謀議北史曰後魏樂平王丕坐事以憂薨及日者董道秀之死也髙允遂箸筮論曰昔明元未起白臺其高二十餘丈樂平王嘗夢登其上四望無所見王以問日者董道秀筮之曰大吉王默而有熹色後事發王遂憂死而道秀棄市道秀善推六爻以對王曰易稱亢龍有悔窮髙曰亢髙而無人不爲善也夫如是則可上寧於王下保於己福禄方至豈有禍哉今舎於本而從其末咎釁之至不亦冝乎, WYG: 闕}
