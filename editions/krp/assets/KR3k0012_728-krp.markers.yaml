  - {type: variant, offset: 1091, length: 968, content: 載記日秦苻融爲司隷校尉京兆人董豐遊三年而返過宿妻家是夜妻爲賊所殺兄疑豐殺之送豐有司不堪楚掠誣引殺妻融察而疑之問日汝行徃還頗有恠異及卜筮以不豐日初將發夜夢乘馬南渡水返而北渡復自北而南馬停水中鞭策不去俯而視之見兩日在于水下左白而濕右黑而燥寤而心悸以爲不祥還之夕復夢如初問筮者筮者云憂獄訟遠三枕避三沐旣至妻爲具沐夜授豐枕豐記筮者之言皆不從之乃自沐枕枕而寢融日吾知之矣周易坎爲馬爲離三爻同變而成離離爲中女坎爲中男兩日二夫之象坎爲執法吏吏詰其夫婦人被流血而死坎二陰一陽離三陽一陰相承易位離下坎上旣濟文王遇之囚美里有禮而生無禮而死馬左而濕水也左永右馬馮字也兩日昌字也其馮昌殺之乎於是推驗獲昌詰之具首服日本與妻謀殺董豐期以沐新枕爲驗是以誤中婦人宋書日劉休善筮因尚書令吳喜事明帝遂見親賞長直殿内後宫孕者帝使筮其男女無不如占齊書日賀瑒伯祖導飬工卜筮經遇工歌女人病死爲筮之日此非死也天帝召之歌耳乃以土塊加其心上俄頃而蘇南史日梁大同中同泰寺災帝召太史令虞履筮之遇坤之履日無害其繇日西南得朋東北喪朋安貞吉文言日東北喪朋乃終有慶帝日斯魔也酉應見卯金來剋木卯爲陰賊鬼而帶賊非魔孰爲致之酉爲口舌當就說言乎兊故知善言乎冝前爲法事於是人人賛善莫不從風梁書曰鄧元起初爲益州刺史及巴東聞蜀亂使蔣光濟筮之遇蹇喟然歎曰吾豈鄧艾而及此乎後果如筮又阮孝緖傳曰孝緒見善筮者張有道曰見子隱迹而心難明自非考之龜蓍無以驗也及布卦旣揲五爻曰此將爲應感之法非嘉遁之兆孝緖日安知後爻不爲上九果成遁卦有道歎日此所謂肥遁無不利象實應德心迹并也孝緒曰雖獲遁卦而上九爻不發升遐之道便當髙謝又日阮孝緒自筮卦日吾壽與劉著作同年及劉著卒孝緒曰劉侯逝矣吾其幾何其年十月卒後魏書曰任城王澄髙祖外示南討意在謀遷齋於明堂左个詔太常卿王諶親令龜易筮南伐之事其兆遇革髙祖曰此是湯武革順之卦也羣臣莫敢言澄曰革者更也將欲應天順人革君臣之命湯武得之爲吉陛下帝有天下重光累葉今日卜征乃可伐叛不得云革命此非君人卦未可爲吉也高祖厲聲曰此象云大人虎變何云不吉也澄曰陛下龍興旣乆不冝方同虎變高祖勃然作色日社稷我社稷任城而欲沮衆也澄曰社稷誠知陛下之社稷然臣是社稷之臣也務參顧問敢盡愚衷髙祖乆之乃解曰各言其志亦復何傷車駕還宫便召澄未及昇陛遥謂曰向者之革今更欲論之明堂之忿懼衆人竟言沮我計故厲色怖文武耳想解朕意也又曰鄧淵博覽經書長於易筮太祖定中, WYG: ''}
