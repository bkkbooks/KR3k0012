  - {type: variant, offset: 2649, length: 0, content: '', WYG: 滿為陰賊鬼而帶賊非魔孰為致之酉為口舌當就言乎兌故知善言乎冝前為法事於是人人贊善莫不從風梁書曰鄧元起初為益州刺史及巴東聞蜀亂使蔣光濟筮之遇蹇喟然歎曰吾豈鄧艾而及此乎後果如筮又阮孝緒傳曰孝緒見善筮者張有道曰見子隱迹而心難明自非考之龜蓍無以驗也及布卦既揲五爻曰此將為咸應感之法非嘉遯之兆孝緒曰安知後爻不為上九果成遯卦有道歎曰此所謂肥遯無不利象實應德心迹并也孝緒曰雖獲遯卦而上九爻不發升遐之道便當髙謝又曰阮孝緒自筮卦曰吾壽與劉著作同年及劉著作卒孝緒曰劉侯逝矣吾其幾何其年十月卒後魏書曰任城王澄髙祖外示南討意在謀遷齊於明堂左个詔太常卿王諶親令龜卜易筮南伐之事其兆遇革髙祖曰此是湯武革命之卦也羣臣不敢言澄曰革者更也將欲應天順人革羣臣之命湯武得之為吉陛下帝有天下重光累葉今日卜征乃可伐叛不得云革命此非君人卦未可為吉也髙祖厲聲曰此象云大人虎變何云不吉也澄曰陛下龍興既久不冝方同虎變髙祖勃然作色曰社稷我社稷任城而欲沮衆也澄曰社稷誠陛下之社稷然臣是社稷之臣也務參顧問敢盡愚衷髙祖久之乃解曰各言其志亦復何傷車駕還宫便詔澄未及升階遥謂曰向者之革今便欲論之明堂之忿懼衆人競言沮我大計故厲色怖文武耳想解朕意也又曰鄧淵博覽經書長於易筮太祖定中原擢為吏部郎又曰許彦少孤貧好讀書後從沙門法叡受易世祖被徵以卜筮頻驗遂在左右參與謀議}
