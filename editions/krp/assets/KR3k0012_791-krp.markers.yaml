  - {type: variant, offset: 361, length: 601, content: 曰竊聞夜郎所有精兵可得十萬浮舩牂柯出不意此制粤一竒也誠以漢之強巴蜀之饒通夜郎道爲置吏甚易上許之乃拜蒙中郎將將千人從巴莋關入遂見夜郎侯多同多同其侯名厚賜諭以威德約爲置吏使其子爲令夜郎旁小邑皆貪漢繒帛以爲漢道險終不能有也乃且聽蒙約還報乃以爲犍爲郡發巴蜀卒治道自𤏡道指牂柯江蜀人司馬相如亦言西夷卭莋可置郡使相如以中郎將徃諭皆如南夷爲置一都尉十餘縣屬蜀後數歳道不通士罷餓餧離暑濕死者甚衆西南夷又數反發兵興擊耗費亡功上患之使公孫弘徃視問焉還報言其不便上許之罷西夷獨置南夷兩縣一都尉稍令犍爲自保就令自保守且脩成其郡縣也夜郎侯始倚南粤南粤反巳滅還誅反者夜郎遂入朝上以爲夜郎王又曰昭帝始元中牂柯談指同並等二十四邑凢三萬餘人皆反並音伴談指同並後皆爲縣属漢牂柯郡遣水衡郡都尉發蜀郡犍爲兵擊破之後姑繒葉榆人復反鈎町侯亡波率其人擊之有功漢立亡波爲釣町王至成帝河平中夜郎王興與鈎町王禹漏卧侯俞漏卧侯邑名後爲縣属牂柯更舉兵相攻牂柯大守請發兵誅興等議者以道逺不可擊遣太中大夫張匡持節和解並不從杜欽說王鳯曰張匡和解蠻夷王侯王侯不從不憚國威其効可見恐議者選耎復守和解選耎怯不前之意也選音息兖反耎音人兖反太守察動静有變迺以聞如此則復曠一時曠空也一時三月言空廢一時不早發兵也王侯得収獵其衆申固其謀黨助衆多各不勝忿必相殄滅自知罪成狂勃守尉言起狂勃心而殺守尉逺藏温暑毒草之地雖有孫吴將賁育士若入水火徃必焦没智勇俱亡所設施屯田守之費不可勝量冝因其, WYG: ''}
