  - {type: variant, offset: 1538, length: 292, content: 粤巳滅乃使王然于以兵威風諭滇王入朝滇王有衆數萬人其旁東北勞深靡莫皆同姓相杖未肯聽杖猶倚也相依倚爲援而不聽滇王入朝也勞莫數侵犯使者吏卒元封二年天子發巴蜀兵擊滅勞深靡莫以兵臨滇滇王始首善以故弗誅滇王離西夷舉國降請置吏入朝於是以爲益州郡賜滇王印復長其民西南夷君長以百數獨夜郎滇受王印滇小邑也最寵焉後漢書曰滇郡有池周回二百餘里水源深而末更淺狹有似倒流故謂之滇池河土平敞多岀鸚鵡孔雀有塩池田漁之饒金銀畜産之冨人俗豪俠居官者皆冨及累代及王莽政亂益州郡夷棟蚕若豆等起兵殺郡守越嶲姑復夷人大牟亦皆叛莽遣寧始將軍廉丹發巴蜀吏人卒徒十萬擊之連年不尅而還以廣漢文齊爲太守群夷始得其和及公孫述據益土齊固守拒險, WYG: 中所在戰㨗}
