  - {type: variant, offset: 422, length: 0, content: '', WYG: 乾服之則令人與天地相畢或得千嵗二千歳又曰肉芝者謂萬嵗蟾蜍頭上有角頷下有丹書八字以五月五日日中時取之隂乾百日以其足畫地即為流水千嵗蝙蝠色如白雪集則倒懸腦重故也此二物得而隂乾末服之令人夀四萬嵗千嵗烏五色其額上兩骨起似角以羊血浴之乃剔取服之夀千嵗行山中見小人乗車馬長七八寸者乃肉芝也取服之即成仙凡百二十種皆肉芝也漢武内傳曰仙芝上蕊有大虹芝五行論曰章帝時零陵生芝草五本又初稟篇曰朱草之莖如鍼紫芝之􅂒如豆如珠玉者稟氣而生亦猶此也茅君内傳曰句曲山上有神芝五種第一曰龍仙芝似蛟龍之相負服之為太極仙卿第二曰參成芝赤色有光叩之其枝葉如金石之音折而續之即如故服之為太極大夫第三曰燕胎芝其色紫形如葵葉象如燕欲飛狀光明洞徹服之拜為太清龍虎仙君第四曰夜光芝其色青實正白如李夜視其實如月光照洞一室服一株為太清仙官第五曰玉芝色白如玉剖食拜三官真御史也神仙傳曰漆飛黄子張虛字子黄遼人也行𤣥素之道年二百嵗有少容服九英葢芝石象而成道也又曰子舊服赤烏散及夜光芝仙人採芝圖曰芝生於名山食之令人乗雲能上天觀望八極通見神明鳳凰芝草生於名山之上金玉之間石上隂乾始食一年令人羽翼皆生夀千嵗能乗雲與鳳凰俱}
