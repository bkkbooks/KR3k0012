  - {type: variant, offset: 937, length: 490, content: 人凡此草芝又有百二十種隂乾服之則令人與天地相畢或得千歳二千歳又曰肉芝者謂萬歳蟾蜍頭上有角頷下有丹書八宇以五月五日日中時取之隂乾百日以其足畫地即爲流水千歳蝙蝠色如白雪集則倒懸腦重故也此二物得而隂乾末服之令人壽四萬歳千歳龜五色具額上兩骨起似角以羊血浴之乃剔取服之壽千歳行山中見小人乗車馬長七八寸者肉芝也取服即成仙凡百二十種皆肉芝漢武内傳曰仙芝上蘂有大真虹芝論衡曰章帝時零陵生芝草五本又𥘉禀篇曰未草之莖如鍼紫芝之栽如豆如珠玉者禀氣而生亦猶此也茅君内傳曰勾曲山上有神芝五種第一曰龍仙芝似交龍之相負服之爲太極仙卿第二曰名叅成芝赤色有光扣其枝葉如金石之音折而續之即如故服之爲太極大夫第三曰燕胎芝其色紫形如葵葉燕象如欲飛狀光明洞徹服一株拜爲太清龍虎仙君第四曰名夜光芝其色青實正白如李夜視其實如月光照洞一室服一株爲太清仙官第五曰玉芝色白如玉剖食拜三官正真御史也神仙傳曰漆飛黄子張虚字子黄遼人也行玄素之道年二百歳有少容服九英盖芝石象而得道也又曰刁子然服赤烏散及夜光芝仙人採芝圗曰芝生於名山食之令人乗雲能上天觀望八極通見神明鳯凰芝草生於名山之上金玉間文石上隂乾治食一年令人羽翼皆生壽千歳能乗雲與鳯凰俱, WYG: ''}
