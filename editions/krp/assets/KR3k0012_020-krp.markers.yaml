  - {type: line-break, offset: 1263, content: '', id: KR3k0012_SBCK_020-4a01}
  - {type: variant, offset: 1263, length: 510, content: 又曰立春之日下寛大書曰制誥三公方春東作敬始愼微動作順之罪非殊死且勿案驗漢書曰元始中故事兆五帝郊於洛陽四方壇皆三尺無等立春于東郊祭東帝勾芒月令章句日東郊去邑八里木數也車旗服飾皆青歌青陽八佾舞雲翹之舞返因賜文官太愽司徒以下縑各有差漢官名秋曰賜司徒司空帛三十匹九卿十五匹古今注曰建武八年立春勑賜公十匹卿七匹也又曰立春之日皆青幡幘迎春于東郭外令一童男冐青衣先在東郭外野中迎春至自野中則迎者拜之而還弗祭三時不迎又郎顗上䟽曰今立春之後火卦用事當温而寒違反時節由功賞不至而刑罰必加也冝須立秋順氣行罰臣伏案飛候叅察衆政京房作易飛候以爲立夏之後當有震裂涌水之害又曰自司徒居位隂陽多謬時劉折爲司徒至陽嘉二年榮免乆無虚巳進賢之筞天下興議異人同咨咨嗟歎也且立春巳來金氣再見謂元年十二月己丑夜白氣入玉井二年正月巳丑白虹貫日此金氣再見也金能勝木必有兵氣冝黜司徒以應天意又郎顗對問曰方春東作報徳之始元氣開發養導萬物王者因天視聽奉順時氣務崇温柔遵行月令禮祀月令孟春天子命相布德和令行慶施惠下及兆人仲春安萌芽養㓜少存諸孤省囹圄去桎桔止獄訟而今立春之後考事不息秋冬之政行乎春故虹春見掩蔽日曜凡邪氣乗陽則虹蜺在日斯皆執事刻急所致殆非朝廷優寛之本此其變常之咎也, WYG: ''}
