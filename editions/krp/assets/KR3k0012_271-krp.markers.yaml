  - {type: variant, offset: 1547, length: 0, content: '', WYG: 又曰晩世之兵君雖無道莫不設渠傅堞加守傅守也堞城上女墻也攻者非以禁暴除害也欲以侵地廣壤也故至於伏尸流血相支以日而覇王之功不世岀者自爲之故也又曰夫爲地戰者不能立其功舉事以自爲者衆去之衆之所助雖弱必强衆之所去雖大必亡也又曰兵失道而弱得道而强將失道而拙得道而工國得道而存失道而亡所謂道者取員而法方背隂而抱陽左柔而右剛履幽而觀暘地方而無限故莫能窺其門天員而無形象地生長而無計量渾渾沉沉孰知其藏也又曰凡物有朕唯道無朕言萬物可朕也而道不可朕也所以無朕者以其常形勢也轉輪而無窮象日月之行若春秋有代謝若日月有晝夜終而復始明而復晦莫能得其紀制形而無形故政可成象萬物而不物故勝不屈形兵之極也至於無}
