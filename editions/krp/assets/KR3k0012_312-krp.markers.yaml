  - {type: variant, offset: 3048, length: 542, content: 出入數四傍若無人搴旗斬將搴居輦反殺傷甚衆戦及日中評衆大敗俘斬五萬裴子野宋略曰左將軍劉康祖聞虜㓂壽陽自虎牢率七千人來赴虜至者八萬騎康祖令軍中曰顧望者斬首轉歩者斬足士皆用命賊死者萬餘血流没踝流矢貫頸墮馬死宋書鄧琬傳曰殷孝祖屯軍鵲洲沈沖之謂陶亮曰昔孝祖梟將一戰便死孝祖與賊合戰毎戰常以鼓盖自隨軍中人相謂曰殷統兵可謂死將矣今與賊交鋒而以羽儀自顯欲不斃得乎又曰傳弘之字仲度凉僞太子赫連瓌率衆襲長安弘之領歩騎五千大破之瓌又抄渭南弘之又於寡婦渡破瓌獲賊二百及義真東歸赫連佛佛傾國追躡於青泥大戰弘之射貫甲胄氣冠三軍陣敗䧟没佛佛逼令降弘之不爲屈也又髙祖紀曰于時北師始還傷痍未復戰士纔數千賊衆十餘萬舳艫亘千里孟昶諸葛長仁懼欲擁天子過江帝曰今兵士雖少猶足一戰若其克濟臣主同休如其不然不復能草間求活吾計決矣又曰薛安都北征至陜下魏多縱突騎衆軍患之安都怒甚乃脫兠鍪解所帶鎧唯着絳衲兩襠衫馬亦去具裝馳入賊陣猛氣咆勃所向無敵當其鋒者無不應刃而倒如是數四毎入衆無不披靡又曰髙祖義軍進至覆舟東張疑兵以油怶冠株布滿山谷帝先馳之將皆殊死戰無不當百呼聲動天地因風縱火煙熖張天謙等大敗齊書曰薛安都討魯爽及沈慶之濟江安都望見爽便躍馬大呼直往刺之應手而倒左右范雙斬爽首爽丗裊猛咸云萬人敵安都單騎直入斬之而返時人皆云關羽斬顔良不足過也, WYG: ''}
