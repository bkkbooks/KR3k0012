  - {type: variant, offset: 2140, length: 373, content: 走竹傷其足挈履徐歩而歸文士傳曰蔡邕經㑹稽髙遷亭見屋椽竹從東間數第十六可以爲籥取用果有異聲神仙傳曰離婁公服竹汁餌桂得仙又曰壷公欲與費長房俱去長房畏家人覺公乃書一青竹戒曰卿以此竹歸家便稱病以此置卿卧處黙便來還長房如言家人見此竹云是屍哭泣行䘮荆楚歳時記曰夏至節日食糉周豦謂爲角黍人並以新竹爲筒糉練葉揷五絲繫臂謂爲長命縷王子年拾遺記曰蓬山有浮筠之簳葉青莖紫子如大珠有青鸞集其上下有砂礰細如粉暴風至竹條飜起拂細砂如雪霰仙者來觀戯焉風吹竹折聲如鍾磬之音南越志曰羅浮山生竹皆七八圍節長一二尺謂之鍾龍湘州記曰邵陵髙平縣有文竹山上有石牀四面緑竹扶踈常隨風委拂此牀永嘉記曰陽嶼仙山有平石方十餘丈名仙壇有一䈥竹垂壇旁風來輙掃拂壇上東陽記曰崑山去蕪城山十里峯嶺髙峻故老傳云嶺上有圎池魚鼈具有池邊有竹極大風至垂屈掃地恒㓗如人掃之丹陽記曰江寜縣南二十里慈姥山積石臨江生筲管竹, WYG: ''}
