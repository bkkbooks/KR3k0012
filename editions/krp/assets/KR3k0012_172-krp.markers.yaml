  - {type: variant, offset: 1372, length: 474, content: 新州十道志曰新州新興郡古越地秦始皇略取陸梁地置象郡今州即其地也漢爲合浦縣之臨元縣晉穆永和七年分蒼梧郡於此置新寜郡梁隋唐爲新州勤州十道志曰勤州銅陵郡秦屬南海郡二漢屬合浦郡隋屬信安郡唐置勤州或爲銅陵郡竇州十道志曰竇州懷徳郡禹貢楊州之分古越地漢蒼梧郡之端溪縣先管羅竇洞因爲名唐武徳五年置南扶州貞觀八年改爲竇州郡國志曰竇州悉以髙欄爲居號曰千蘭三日一市又曰特亮縣在河洞水北昔有白牛夜出光影照村村人見此牛光號爲特亮也桂州十道志曰桂州始安郡禹貢荆州之域春秋時越地七國時爲楚越之交始皇二十三年甞發逋亡人贅㛰賈人略取陸梁地是爲桂林郡焉二漢屬零陵蒼梧二郡吴分置始安郡晉孝武改爲始建齊復爲始安梁天監六年立桂州於蒼梧鬰林之境無定理處大同六年移桂州於今理隋大業三年罷州唐武徳四年復置桂州始安記曰吴越之境其人好劔輕死易生火耕水耨人食魚稻無千金之家好巫鬼重淫祀十道志曰臨桂縣荔水水源多生桂桂生處不生雜樹昭州十道志曰昭州平樂郡秦桂林郡地二漢屬蒼梧郡宋屬始建國齊屬始安郡隋亦然唐武徳四年置樂州貞觀八年改爲昭州取昭潭爲名盛弘之荆州記曰平樂縣西南數十里有山間有兩目如人眼極大瞳子白黒分明, WYG: ''}
