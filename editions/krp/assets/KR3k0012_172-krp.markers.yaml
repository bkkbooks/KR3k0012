  - {type: variant, offset: 982, length: 0, content: '', WYG: 新州十道志曰新州新興郡古越地秦始皇畧取陸梁地置象郡今州即其地也漢為合浦郡之臨元縣晉穆永和七年分蒼梧郡於此置新寧郡梁隋唐為新州勤州十道志曰勤州銅陵郡秦屬南海郡二漢屬合浦縣隋屬信安郡唐置勤州為銅陵郡竇州十道志曰竇州懷德郡禹貢揚州之域古越地漢蒼梧郡之端溪縣先管羅竇洞因為名唐武德五年置南扶州貞觀八年改為竇州郡國志曰竇州悉以髙欄為居號曰干欄三日一市焉又曰特亮縣在河涸水北昔有白牛夜出光影照村村人見此牛光號為特亮也桂州十道志曰桂州始安郡禹貢揚州之域春秋時越地七國時為楚越之交始皇二十三年嘗發逋亡人贅婿賈人畧取陸梁地是為桂林郡焉二漢屬零陵蒼梧二郡吳置始安郡晉武改為始建齊復為始安梁天監六年置桂州於蒼梧鬱林之境無定理處大同六年移桂州於今理隋大業三年罷州唐武德四年復置桂州始安記曰吳越之境其人好劍輕死易發火耕水耨人養魚稻無千金之家好巫鬼好淫祀十道志曰臨桂縣茘水水源多生桂桂生處不生雜樹昭州十道志曰昭州平樂郡秦屬桂林郡地二漢屬蒼梧郡宋屬始建國齊屬始安郡隋亦然唐武徳四年置樂州貞觀八年改為昭州取昭潭為名盛𢎞之荆州記曰平樂縣西南數十里山間有兩石如人眼極大瞳子黒白分明}
