  - {type: variant, offset: 1564, length: 0, content: '', WYG: 齊也堂堂者大也威盛貌正正者孤特相也言前有孤特之兵後有堂堂之陣必有竒伏詐誘之謀審察待之勿輕邀截此理變詐者也是故朝氣銳晝氣惰暮氣歸善用兵者避其銳擊其惰歸此理氣者也避其精銳之氣擊其懈惰欲歸此理氣者也故曹劌曰夫兵者勇氣也一鼔作氣再而衰三而竭彼竭我盈是以尅之也戰國䇿曰魏武侯問吳起曰暴冦卒至掠吾田野取吾牛馬則如之何起曰暴冦之來必精且强善守勿應潜伏路傍暮去必率車乗重裝驍騎逐擊勢必莫當遇我伏内如雪逢湯也後漢書曰袁尚據鄴率兵徃擊兄譚於南皮畱蘇畱審配守曹公圍鄴尚還救鄴諸將皆以為此歸師人自為戰不如避之公曰尚從大道來當避之若循西山來者此成擒耳尚果循西山來臨滏水為營夜遣兵犯圍公逆擊破走之城中崩潰}
