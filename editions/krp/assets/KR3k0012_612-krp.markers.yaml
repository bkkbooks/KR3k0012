  - {type: variant, offset: 3327, length: 559, content: 又曰吴伐越隳㑹稽獲骨一節專車骨一節其長專車專壇也吴子使來好聘問之仲尼仲尼曰丘聞之禹致群臣於㑹稽之山防風氏後至禹殺而戮之防風汪茫氏君之名違命後至故禹殺之陳尸爲戮其骨專車焉此爲大矣客曰敢問誰守爲神仲尼曰山川之靈足以紀綱天下者其守爲神紀綱天下謂名山大川龍興雲致兩以利天下社稷之守爲公侯封國立社稷而山川之祀者爲諸侯令守之是公侯皆屬於王者客曰防風何守仲尼曰汪茫氏之君汪芒長翟國名守封嵎山者也封封山嵎嵎山在今吴郡永安縣也爲七姓柒汪芒氏之姓在虞夏啇爲汪茫氏於周爲長翟周丗其國北遷爲長翟今爲大人今孔子時客曰人長之極幾何仲尼曰僬僥氏長三尺短之至也僬僥西南蠻之别也長者不遇十之數之極也十之三丈則防風氏又曰仲尼在陳有隼集于陳侯之庭而死楛矢貫之石砮其長尺有咫隼鷙鳥鶚也楛木名砮鏃也石爲之八寸曰咫楛矢貫之墜而死也陳惠公使以隼如仲尼之館問之惠公哀公之孫悼太子之子吴也仲尼曰隼之來也逺矣此肅慎氏之矢也肅慎北夷之國昔武王克啇通道于九夷八蠻使各以其方賄來貢使無忘職業於是肅慎氏貢楛矢石砮其長尺有咫先王欲昭其令德之致逺物也故銘其栝曰肅慎氏貢楛矢以分大姬配虞胡公而封諸侯分矛也大姬武王元安胡公舜後虞遏父之子胡滿古者分同姓以寳玉所以展親也展重若夏后氏氏之璜也異姓以逺方之職貢使無忘服也故分陳以肅慎氏之貢陳僞姓君若使有司求諸故府其可得也故府舊府使求得之金櫝如之, WYG: ''}
