  - {type: variant, offset: 1350, length: 0, content: '', WYG: 聞見此鬱儀奔日結隣奔月二章之篇目三元布經曰南極上上寳秘玉檢之文自無𤣥名帝圗不得見其篇第也及金羽𤣥章經此文隱藏不傳於世自無蘭臺丹字不得見聞靈寳真一訣曰洞𤣥自然經本文出乎太上道也者弥綸無極微妙無形老子曰天下莫柔弱於氣氣莫柔弱於道道之所以柔弱者包乎天地萬物夫柔之生剛弱之生强而使天下莫能知其根本所以生者乎是故有以無為毋無以虛為毋虛以道為毋道者道之根本也人能以自然為道貞則道}
