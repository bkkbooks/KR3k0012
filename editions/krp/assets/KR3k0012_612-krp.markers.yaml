  - {type: variant, offset: 1490, length: 288, content: 昭元年曰晉侯有疾鄭伯使公孫僑如晉聘且問疾叔向問焉曰寡君之疾病卜人曰實沈臺駘爲崇史莫之知敢問此何神也子産曰昔髙辛氏有二子伯曰閼伯季曰實沈居于曠林不相能也日㝷干戈以相征討后帝不臧遷閼伯于啇丘主辰啇人是因故辰爲啇星遷實沈于生疾矣僑又聞之内官不及同姓内官嬪御其生不殖殖長也美先盡矣則相生疾同姓之相與先美矣美極則盡盡則生疾之君子是以惡之故志曰買妾不知其姓則卜之違此二者古之慎也一四時取同姓二者古人所慎男女辨姓禮之大司也辨別也今君内實有四姬焉同姓姬四人其無乃德是也乎若由是二者弗可爲也已爲治也四姬有省猶可無則必生疾矣據異姓去同姓故言省叔向曰善哉肸未之聞也晉侯聞子産之言曰愽物君子也重賄之又, WYG: ''}
