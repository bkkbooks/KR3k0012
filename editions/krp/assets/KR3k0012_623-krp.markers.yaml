  - {type: variant, offset: 844, length: 163, content: 芒刃也權勢法制人主之斤斧也又曰夫三代之所長乆者其巳事可知也巳事巳徃之事然而不能從者是不法聖智也秦丗之所以亟絶者其轍迹可見也然而不避是後車又將覆也夫存亡之變治亂之機其要在是而巳矣夫人之智能見巳然不能見將然夫禮者禁於將然之前而法者禁於巳然之後是知法之用易見而禮之所以爲至難知也若夫慶賞以勸善刑罰以懲惡先王執此之政堅若金石行此之令信, WYG: 劒切玊}
