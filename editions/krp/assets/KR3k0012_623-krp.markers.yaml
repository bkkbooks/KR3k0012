  - {type: variant, offset: 829, length: 0, content: '', WYG: 唐書曰開元八年二月制曰頃者以庸調無慿好惡須準故遣作様以頒諸州令其好不得過精惡不得至濫任土作貢防源斯在諸州送物作巧生端苟欲富於斤兩遂即加其丈尺有至五丈為疋者理甚不然闊尺八長四丈同文共軌其事乆行立様之時須載此數若求兩而加尺甚暮四而朝三宣令所司簡閱有踰于比年常例尺丈過多者奏聞}
  - {type: page-break, offset: 829, content: '', id: KR3k0012_WYG_623-4a, image: WYG0898/WYG0898-0599a.png}
  - {type: variant, offset: 831, length: 4, content: 賈誼上䟽, WYG: 開元二十五年定令諸課户一丁租調準武徳二年之制其調絹絁布並隨鄉土所出絹絁各二丈五尺輸絹絁者綿三兩輸布麻三斤其絹絁為疋布為端綿為屯麻為綟若當户不成疋端屯綟者皆隨近合成其調南毎年支料有餘折一斤輸粟一升與租同受管子}
