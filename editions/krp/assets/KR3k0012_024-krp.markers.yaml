  - {type: variant, offset: 2773, length: 0, content: '', WYG: 尚書大傳曰西方者何也鮮方也鮮訊也訊者始入之貎始入者何以謂之秋秋者愁也愁者萬物愁而入也故曰西方者秋也秋收斂貎尚書中候曰周文王為西伯季秋之月甲子赤雀銜丹書入豐都止於昌户乃拜稽首受取曰姬昌蒼帝子亡殺商紂也尚書考靈曜曰虛星為秋候昴星為冬期隂氣相位德乃弗邪子助母合子符虚星北方宿也昴星西方宿也隂氣在秋冬助子母令符之弗邪也又曰政失於秋太白出入不常毛詩傳曰壯士悲秋感隂氣也詩含神霧曰秦地處仲秋之位男懦弱女髙瞭瞭明也落消切白色音中商其言舌舉而仰聲清而揚三禮義宗曰九月大享帝於明堂之中孝經云宗祀文王於明堂是也又秋曰庚辛者庚更也辛新也言物皆改更而新也又周祫以秋者萬物新成可以奉薦宗廟故合先祖之神而祭之故祫宜在秋也又九月寒露為節者九月之時露氣轉寒故謂之寒露節霜降為中露變為霜故以為霜降節春秋繁露曰秋之為言猶湫湫者憂悲之狀又曰秋怒氣故殺春秋元命苞曰堯為天子季秋下旬夢白帝遺以鳥喙子其母曰扶始升高丘白帝上有雲如虎感已生臯陶索扶始問之如夢言又淮南子云臯陶鳥喙}
