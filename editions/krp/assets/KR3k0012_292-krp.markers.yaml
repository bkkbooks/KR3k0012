  - {type: variant, offset: 276, length: 0, content: '', WYG: 視我我知之因厚賂重許反使為我間也蕭世淳曰言敵使人來候我佯不知而示以虛事前却期㑹使歸相語是故曰反間也死間者為誑事於外令吾間知之而待於敵間也作詐誑之事於外佯漏泄之使吾間知之吾間至敵中為敵所得必以誑事輸敵從而備之吾所行不然間則死矣又一云敵間來間以我誑事而持歸然皆非所圖也二間皆不能知幽隠深宻故曰死間也蕭世誠云所獲敵人及已叛軍有重罪繫者故貸免相􅃯勿泄佯為不宻令敵間竊聞之吾因縱之亡亡必歸敵必信焉往必死故曰死間也生間者反報者也擇已有賢才智謀能自開通於敵之親貴察其動静知其事訃彼所為已知其實還報是曰生間也故三軍之親莫親於間若不親撫重以祿賞則反為敵用泄吾情實也賞莫厚於間厚賞之賴其用事莫宻於間間事不宻則為己害非聖智不能用間非仁義不能使間不能得間人之用也非微宻者不能得間之實精微用意宻不泄漏微哉微哉無所不無間也間事不發而先聞其間者與所告者皆死凡軍之所欲擊所欲擊之軍城之所欲攻所欲攻之城人之所欲殺欲殺之人必先知其守將左右謁者門者舍人之姓名守有官職任者謁告也主告事者也門者守門者也舍人守舍之人也必先知之為親舊}
