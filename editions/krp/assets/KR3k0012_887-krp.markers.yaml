  - {type: variant, offset: 759, length: 613, content: 又曰建安中南陽賈偶字文合得病卒亡死時有吏將詣太山同名男女十人司命閱呈謂行吏曰當召某郡文合來何以召此人促遣令去時日暮治下有禁不得舎遂至郭門外大樹下宿有好女獨行無伴文合問之曰子似衣冠家何爲歩行姓字爲誰女曰我三河人也父見爲易陽令昨錯召來今得遣去遂逼日暮懼獲瓜田李下之譏望君之容似類賢者是以停留依慿左右文合曰恱子之心願交歡於今夕女曰聞之諸姑婦人以貞專爲德㓗白爲稱文合與相反覆終無動志天明別去文合死巳再宿停當歛視其靣有色摸心温半日間蘇文合將驗其事遂至易陽問其令則女父也從之因問令某月某日君女寕卒亡而生耶具說女姿顔服色言語相反覆本末令入問女與文合同大驚乃以女配文合又曰臨海松陽人栁榮從張悌拒晉軍病死舩中二日時軍巳上岸無埋之者忽然大呼言人縛軍帥聲激揚遂活人問之言上天北斗門下卒見人縛張軍帥門下人怒榮叱逐使去榮懼怖口餘聲發揚其日悌戰死續捜神記曰武都太守李仲文在郡喪女年十八權假葬郡城北後有張丗之代爲郡丗之男子長年二十侍從在郡中夢一女年可十七八顔色不常自言前府君女不幸早亡㑹今當更生心相愛樂故來相就如此五六夕忽然晝見解衣服薫香殊絶遂爲夫妻寢息衣皆有汚如處女焉後仲文婦遣婢視女墓因過丗之婦相聞入室中見此女一隻履在子長牀下取之啼泣呼言發冢持履歸以示仲文仲文驚愕遣問丗之君兒何由得亡女履耶丗之呼兒具陳本末李張並謂可恠發棺視之女體生肉顔姿如故右脚有履左脚無也自後遂死肉爛不復得生後夕女來曰夫婦情至謂偕老而無狀忘履以致覺露不復得生萬恨之心當復何言泣涕而別, WYG: ''}
