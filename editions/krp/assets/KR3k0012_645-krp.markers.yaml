  - {type: variant, offset: 1070, length: 2, content: 伏誅, WYG: 繫小女年十二起號哭曰平生獄上呼囚數常至九今八而止我君素剛先死者必君果死又曰蕭育當繫乃欲棄官按佩刀曰蕭育杜陵男子何詣曹也東觀漢記曰和熹鄧后京師旱自三月至五月幸洛陽寺省庶獄舉寃囚徒杜洽不殺人自誣榜掠羸困便輿見長吏不敢白吏将去舉頭若有言太后察視覺之即呼進問狀遂得申列即時収令下獄抵罪尹左遷行未還宮澍雨大降又曰和帝永元六年七月京師旱幸洛陽寺録囚舉寃獄未還宫而澍雨又曰馬援為郡督郵送囚至府囚有重罪援哀而縱之亡命遇赦而留}
