  - {type: variant, offset: 2622, length: 476, content: 丗說曰桓宣武之誅袁眞也未當其罪丗以爲冤焉袁眞在壽春甞與宣武一妾姙焉生玄及篡亦覆桓族識者以爲天理之所至轘釋名曰車裂曰轘轘也者散也支體分散傳曰齊人殺子亹而轘髙渠彌車裂曰轘又曰楚子爲陳夏氏亂故伐陳謂陳人無動將討於少西氏遂入陳煞夏徴舒轘之栗門又曰楚觀起有寵於令尹子南未益禄而有馬數十乗楚人患之王煞子南於朝轘起於四境孔藂子曰齊王行車裂之刑群臣諌不聽子髙見齊王曰聞君行車裂之刑夫車裂之刑無道之刑也而君行之臣切以爲下吏之過也王曰寡人耳民多犯法爲法之輕也子髙曰然此誠君之盛意也夫人含五常之性有哀樂喜怒無不過其節節過則毀於義多犯法以法之重無所措手足故也今天下悠悠士無定處有德則徃無德則去欲䂓覇王之業與衆大國爲難而行酷刑以懼逺近國内之民將畔四方之士不至此乃士國之道君之下吏不得以聞是爲自居於中正之地而闇推之君王使同於桀紂也且夫爲人臣見主非而不爭以䧟主於危亡罪之大者也人主疾臣之弼已而惡之資臣以箕子比干之忠惑之大者也齊王曰謹聞命遂除車裂之法焉史記曰秦發兵攻商君殺之於鄭澠池秦惠王車裂商君徇曰莫如鞅反滅商君之家又曰張儀西說趙王曰蘇秦熒惑諸侯以是爲非以非爲是欲反之不可一亦以明矣, WYG: ''}
