  - {type: variant, offset: 949, length: 3, content: 公孫弘, WYG: 前秦録曰池陽民惑其婦言而欲殺母遂車載母辭詣親家入南山母曰汝詣親家何至是也兒曰老婢何言遂下母於溪谷之間脱衣將殺之初婦謂其夫曰不可不得中衣來也兒不欲手脱背坐厲聲令母自脱母泣曰我生養汝得至於今日汝信婦言枉殺我可不乞我此衣兒怒曰老婢復何言母呼曰天神山神當見此否言未卒聲見所持刀忽貫其項而殺投於山穴母乗車却歸昏而反家婦謂其夫還逆問曰得中衣來否母馳告鄰里收其婦送官郡縣以聞堅驚曰宇宙之内乃有此事将非怪乎於是轘而殺之崔鴻南燕録曰慕容超即位太后告超曰左僕射封嵩數殷丹下車訪問嘗具陳奴不當死誅姑女改𦵏孝婦丹如其言天應雨注襄陽耆舊記曰李衡聞羊衜音道有人物往之鑒干之衜曰多事之世尚書劇曹郎才也後數}
