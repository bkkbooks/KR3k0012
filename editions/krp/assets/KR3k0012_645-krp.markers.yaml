  - {type: variant, offset: 941, length: 1, content: 醢, WYG: 餘太祖善之晉書曰曹攄為臨淄令獄有死囚歲夕攄行獄愍之曰卿等不幸致此非所如何新歲人情所重豈欲暫見家耶衆囚皆泣曰若得暫歸死无恨也攄悉開獄出之尅日令還掾吏固争咸謂不可攄曰此雖小人義不可負自謂諸君仕之至日相率而還並无違者一縣歎服號為聖君北史曰後魏元麗拜雍州刺史為政嚴酷吏人患之其妻崔氏誕一男麗遂出州獄囚死及徒流案未申臺者一時放免宋書曰王者累遷宣城内史清謹有恩惠郡人張􅀈吳慶争囚經年不决志到官父老相謂曰王府君有徳政吾鄉里乃有如此争􅀈慶因相攜請罪所訟地遂成閑田後為東陽太守郡獄有罪重囚十餘人至日悉遣還家過節皆反惟一人失期志曰此自太守事王者勿憂明日果至}
  - {type: page-break, offset: 941, content: '', id: KR3k0012_WYG_645-4b, image: WYG0898/WYG0898-0747b.png}
