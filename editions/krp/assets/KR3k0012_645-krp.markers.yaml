  - {type: variant, offset: 1077, length: 260, content: 兾誅李固而露尸於衢令有敢臨者加其罪又曰梁兾專權其同巳者榮顯違迕者劒死同僚側目臺閤機事先以聞兾乃得奏御内外恐懼上下鉗口天子恭巳而巳不有所親任上旣不平之矣兾以私憾專殺議郎邴遵上愈益忿八月癸酉上問小黄門唐衡曰左右誰與梁氏不相得者衡荅曰單超左悺音管上呼超悺入室上曰梁將軍兄弟專朝逼脅内外公卿巳下從其風旨今欲誅之於常侍意如何皆對曰誠國賊當誅之日乆臣等弱少未知聖意如何上曰審然者常侍宻圗之對曰圗之易耳但恐陛下腹中狐疑上曰姦臣脅國當㐲其罪復何狐疑於是命衡呼超等曰陛下今計已决勿得數言恐爲人疑丁丑兾心疑超等使中黄門張惲入省宿以防其變瑗勑, WYG: 宏及掾}
