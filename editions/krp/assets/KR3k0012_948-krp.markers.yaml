  - {type: variant, offset: 2236, length: 0, content: '', WYG: 博物志曰蠐螬以背行者快於用足也祖台志怪曰呉中書郎盛冲至孝母王氏失明冲暫行勑婢食母婢乃蒸蠐螬進之王氏食美然非魚肉母謂冲曰汝試問之既而問婢服實是蠐螬冲抱母慟哭而目立開本草經曰蠐螬一名蟦齊主治血痺螻蛄述異志曰零陵施子然宿田畔夜中見一人著黄練單衣袷直造席捧手與子然語子然問其姓名即答云僕姓盧名鈎家在􅇄溪邊臨水後傭作人掘田塍西溝邊蟻蛭見大坎溝中螻蛄將近斗許而有數頭極壯一箇彌大子然至是始悟曰近曰客盧鈎反音則螻蛄也家在􅇄溪即西坎也悉灌以沸湯自是遂絶搜神記曰廬陵太守平原龎企字子及自}
