  - {type: variant, offset: 1216, length: 366, content: 春秋後語曰楚黃歇說秦昭王曰天下強國莫過於秦楚今聞大王欲伐楚此猶兩虎相與鬪而駑犬受其弊不如善楚也又曰秦惠王謂陳􅎮曰今韓魏相攻朞年不解或謂寡人救之便或曰勿救便寡人不能自爲決願子爲寡人計之􅎮曰亦甞有以卞莊子之刾虎聞於王者乎王曰不聞􅎮曰卞莊子方刾虎而卞竪子止之曰兩虎方食牛牛甘必爭爭必鬪闘則大者傷小者死從傷而刾之一舉必有雙虎之名卞莊子以爲然立而頋之有頃兩虎果鬪大者傷小者死一舉果有雙虎之功今韓魏相攻朞年不解是必大國傷小國亡從傷而伐之一舉必有二實此猶卞莊子㓨虎之類也惠王曰善卒不救待其敗而攻之果大剋也吴越春秋曰吴王塟昌門外金玉精上爲白虎列士傳曰秦召公子無忌無忌不行使朱亥奉璧一雙秦王大怒將朱亥着虎圈中亥瞋目視虎眥裂血出濺虎終不敢動穆天子傳曰有虎在於葭中葭葦七萃之士曰髙奔戎乃生捕虎而獻之天子命爲押押㩜而畜之東虞是曰虎牢因名其地今滎陽成臯縣是也, WYG: ''}
