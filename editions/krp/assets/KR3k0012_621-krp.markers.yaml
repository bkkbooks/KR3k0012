  - {type: variant, offset: 3549, length: 0, content: '', WYG: 又曰欲為君盡君道欲為臣盡臣道二者皆法堯舜而已矣又曰在國曰市井之臣在野曰草莽之臣董子曰上臣事君以人中臣事君以身下臣事君以質韓子曰為臣也北面委質無有二心朝廷不辭賤軍旅不辭難順主之法而無是非也故有口不以私言有目不以私視吕氏春秋曰魏襄王與羣臣飲酒酣王為羣臣祝令群臣皆得志史起興而對曰羣臣或賢或不肖賢者得志則可不肖者得志則不可王曰皆如西門豹之為人臣也史起對曰魏氏之行田也以百畆鄴獨二百畆是田惡也漳水在旁而西門豹不知用是其愚也又曰柱厲叔事莒敖公自以為不知而去居於海上莒敖公有難柱厲叔辭其友而徃死之其友曰子自以為不知故去今又徃死之是知與不知無異别也柱厲叔曰不然自以為不知故去今死而不去是果知我也吾将死之以醜後世之人不知其臣者也所以激君人者之行而厲人臣之節也行激節厲忠臣幸于得察忠臣察則君道固矣淮南子曰周公事文王行無専制事無由己身若不勝衣言若不出口有所奉持于前洞洞屬屬如不能如将失之可謂能子矣及繼文武之業履天子之國則平夷狄之亂誅管蔡之罪無所顧問感動天地聲攝海内可謂能武矣成王長北面致政委質而臣事之請而後行無擅恣之意無矜伐之色可謂能臣矣}
