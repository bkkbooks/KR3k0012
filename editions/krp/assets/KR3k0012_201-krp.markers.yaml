  - {type: variant, offset: 135, length: 0, content: '', WYG: 此未死也臣聞有隂徳者必饗其樂以及子孫今未獲其樂而病甚非死也後愈封為博陽侯東觀漢記曰建武元年詔曰故密令卓茂束身自修執節惇固斷斷無他其心休休焉夫士誠能為人所不能為則名冠天下當受天下重賞故武王誅紂封比干之墓表商容之閭今以茂為太傅封褒徳侯賜安車一乗衣一襲金五百斤討亂定策封漢書在恩澤表漢書曰莽何羅與弟重合侯通謀逆時霍光金日磾上官桀等共誅之功未録武帝病封璽書曰帝崩發書以遺詔封金日磾為秺侯上官桀為安陽侯光為博陸侯文穎曰博大陸平取其嘉名無此縣也食邑北海之河東臣瓉案漁陽有博陸城也皆以前捕反者功封時衞尉王莽子男忽侍中揚語曰帝崩忽常在}
