  - {type: variant, offset: 3695, length: 0, content: '', WYG: 不能食居處號為嚴潔或問其故師貞曰居處不時非孝也師貞偶疾卧其父福暮食不安師貞歘然起號曰是夜食之不精羞果餅生之所致明師貞驚起而愈兄有疾經旬不差師貞衣不觧結日一食為讀道釋經夢神人曰若兄苦風取胡王使者酒漬服愈師貞}
  - {type: variant, offset: 3696, length: 0, content: '', WYG: 求之藥肆皆不曉因夢見其母曰胡王使者羗活也覺而求之兄疾遂愈後考妣繼䘮六年有雙白雀栖飛戸間除筵之日與師貞啁頓翅狀若號咷躃踊久乃}
  - {type: page-break, offset: 3696, content: '', id: KR3k0012_WYG_414-13b, image: WYG0896/WYG0896-0633b.png}
  - {type: variant, offset: 3697, length: 0, content: '', WYG: 續定命録曰賈直言父道冲徳宗朝漏洩禁中事帝怒賜鴆酒直言白中使請自執器以飲父因自飲之立死酒自左足洞出復生使具奏流其父并直言於南海遇赦還以勁直聞為鄆帥以縻郡職劉悟茆東平之强直言之謀也朝廷以功就徵拜諫議大夫悟上表乞留委以戎事太和初授絳郡太守每話所經之事自云}
