  - {type: variant, offset: 3050, length: 1, content: 爲, WYG: 為}
  - {type: variant, offset: 3054, length: 559, content: 爲又先進曰季路曰敢問死曰未知生焉知死鬼神及死事難明語之無益故不荅又季氏曰齊景公有馬千駟死之日民無德而稱焉伯夷叔齊餓于首陽之下民到于今稱之五經通義曰崩薨從何王以來乎曰從周何以言之尚書曰放勲乃殂落舜曰陟方乃死武王旣王是以知武王以前未稱崩薨也至成王太平乃制崩薨之著尚書曰翌日乙丑成王崩釋名曰漢以來謂死爲物故言其諸物皆就朽故史記曰秦武王與孟說舉龍文鼎絶臏而死徐廣曰臏或作脉矣又曰范睢說秦昭王曰夫以烏獲任鄙之力荆成孟賁許慎曰荆成勇士也孟賁衛人慶忌夏育之勇焉而死者人之所必不免也後漢書曰馬援謂孟冀曰方今匈奴烏丸尚擾北邊欲自請擊之男兒要當死於邊野以馬革褁屍還葬耳何能卧牀上在兒女子手中耶冀曰諒爲烈士當如此矣後魏書曰張預每羡古人飡玉之法乃採訪藍田躬徃攻掘得若環璧雜器形者大小百餘至而觀之皆光潤可玩預乃椎七十枚爲屑日服食之餘多惠人後乃聞者更求玉於故處皆無所見馮翊公源懷等得其玉琢爲器珮皆鮮明可寳預服延年云有效驗而世事寢食皆不禁節又加之好酒損志及疾篤謂妻子曰服玉若能屏居山林排棄嗜欲或當大得神力而吾酒色不絶自致於死非藥過也然吾尸體必當有異勿使速殯令後人知飡服之妙時七月中旬長安毒熱預停尸四宿而體色不變其妻常氏以玉珠二枚唅之口閉常謂之曰君自云飡玉有神驗何故不受唅也言訖齒啓納珠因嘘屬其口都無穢氣舉斂於棺堅直不傾委死猶有遺玉屑數升囊盛納諸棺中, WYG: 為}
