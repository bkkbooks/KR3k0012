  - {type: variant, offset: 1784, length: 442, content: 重鄭玄曰重木也懸物也馬曰重木也利斵治之也鑿之爲懸簪孔士重木長三尺也禮記雜記曰重旣虞而埋之就所倚處里之禮記外傳曰重者未葬之前以代主也猶以生事之未忍作木主主以存神也設重於庭懸瓦鬲以養病之米淅之爲沐則煑之爲粥實之重用葦席盖之鬼神依而飲食始死之奠但用但未有黍稷故也黍稷在下之中如生時也殷人作主之後聮其重懸之於廟梁去髙祖之廟親盡則埋之周人將葬重隨柩而朝廟之外柩而埋之於階間而後作主也凶門南史孔琳之議曰凶門栢裝不岀禮典起自末代積習生常遂成舊俗兄人士䘮儀多岀閭里每有此須動十數萬損人財力而義無所取至於寒庶則人思自竭雖復室如懸磬莫不傾産殫財所謂葬之以禮其此之謂乎冝一罷凶門之式王肅䘮服要記曰魯哀公葬父孔子問寧設衰門乎哀公曰衰門起於禹禹治水故表其門閭以紀其功吾父無功何用此焉韋弘與蔡謨牋問凶門曰父在母䘮應立凶門不又問與父别止立凶門愚意猶所疑厭於父故也今於父大門之内别立凶門便爲父一家有二門以名義言之門者父之有也今子復立門豈合聖人之典訓苟不岀於禮其所不曰故以諮白蔡荅曰禮以二瓦器盛始死之祭擊木裏之葦席置於, WYG: ''}
