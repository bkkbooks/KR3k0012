  - {type: variant, offset: 568, length: 0, content: '', WYG: 無所得終以為怯邊將日得賞賜而不用皆願一戰於是乃具戰車得千三百乗選騎得萬三千疋千金之士五萬人彀弓弩者十萬人悉勤習戰大縱畜牧人衆滿野匈奴小入佯北不勝以數千人委之單于聞之大喜率衆來入牧多為竒陣張左右翼擊大破之殺匈奴十餘萬騎單于奔走十餘嵗不敢近邊也又曰韓魏相攻齊將田忌率兵伐魏魏將龎涓聞之去韓而歸魏孫臏謂田忌曰彼三晉之兵素悍勇而輕齊齊為張怯善戰者因其勢而利導之兵法百里而趨利者蹶上將蹶猶挫也五十里走者軍半至使舉軍入魏地為十萬竈明日為五萬竈又明日為二萬竈龎涓行三日大喜曰我故知齊軍怯入吾地三日士卒亡者過半矣乃棄其歩兵與其輕銳倍日并行逐之并畢正切孫子度其行暮當至馬陵馬陵}
