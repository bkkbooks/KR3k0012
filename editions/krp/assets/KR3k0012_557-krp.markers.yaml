  - {type: variant, offset: 1632, length: 0, content: '', WYG: 又曰原涉自以先人墳墓儉約非孝也廼大治冡舎周閣重門初武帝時京兆曹氏葬茂陵傍謂之為京兆阡涉慕之廼買地開道立署曰南陽阡人不肯從謂之原氏阡東觀漢記曰帝感李通首創大謀每幸南陽常遣使者以太牢祠通冡又曰建武三年以皇祖皇考墓為昌陵後改為章陵因以舂陵為章陵縣二十六年春正月初作夀陵將作大匠竇融上言園陵廣寰無慮所用帝曰古帝王之葬皆陶人瓦器木車茅馬使後世之人不知其處太宗始終之義景帝能遵孝道遭天下反覆而獨完其福豈不美哉今所制地不過二三頃無為陵地裁令流水而已又曰祭彤字次孫早孤以至孝稱值天下亂野無烟火而彤獨在塜側每賊過見其尚㓜而有志節竒而哀之後漢書曰楊震字伯起改葬華隂逺近畢至先葬日有鳥髙丈餘喪前悲鳴葬畢乃去於是立石鳥像於其墓所又曰郭伋徵大中大夫卒時年八十六帝親臨賜塜塋地又曰种暠上音冲下音杲為遼東郡薨并凉邊民咸為發哀匈奴聞暠卒舉國傷惜單于每入朝賀見墳墓輙哭祭又曰帝祠章陵過湖陽祠樊重墓追爵謚為夀張敬侯立廟於湖陽車駕每南廵帝幸其墓賞賜大會又曰韓稜遷南陽太守特聴得過家上冡郷里以為榮又曰蔡順母平生畏雷自亡後每有震雷順輙圜冡泣曰順在此後太守鮑衆舉孝亷順不能逺離墳墓遂不就又曰温序拜謁者遣護𦍑校尉序行部至襄武為隗囂别將荀字所拘刼伏劒而死序主簿韓遵從事王忠持屍歸殮光武聞而憐之命忠送喪到洛陽城傍為冡地賜榖千}
