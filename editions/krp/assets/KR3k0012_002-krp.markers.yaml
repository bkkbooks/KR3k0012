  - {type: variant, offset: 1905, length: 0, content: '', WYG: 之形者有三一曰渾天二曰蓋天三曰宣夜宣夜之說未嘗聞也後有虞昺作穹天論姚信作昕天論虞喜作安天論衆形殊象參差其間蓋天之說}
  - {type: variant, offset: 1906, length: 0, content: '', WYG: 有三體一云天如車蓋遊乎八極之中一云天形如笠中央髙而兩邊下一云天如欹車蓋南髙北下桓譚新論曰通人揚子雲因衆儒之說以天為蓋常左旋日月星辰隨而東西乃圖畵形體行度叅以四時厯數昏明晝夜欲為世人立紀律以垂法後嗣余難之曰春秋晝夜欲等平旦日出於卯正東方暮日入於酉正西方今以天下人占視之此乃人之卯酉非天卯酉天之卯酉當北斗極北斗極天樞樞天軸也猶蓋有保斗矣蓋雖轉而保斗不移天亦轉周匝斗極常在知為天之中也仰視之又在北不正在人上而春秋分時日出入乃在斗南如蓋轉則北道近南道逺彼晝夜數何從等乎子雲無以觧也後與子雲奏事坐白虎殿廊廡下以寒故背日曝背有頃日光去背不復曝焉因以示子雲}
