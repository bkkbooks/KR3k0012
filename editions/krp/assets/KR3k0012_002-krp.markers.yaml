  - {type: variant, offset: 2594, length: 541, content: 五經通義曰神之大者昊天上帝即耀魄寳也又曰天皇大帝亦曰太一又曰其佐曰五帝東方青帝靈威仰南方赤帝赤熛怒西方白帝白招拒北方黑帝汁光紀中央黃帝含樞紐又曰天所以有雷霆風雨霜雪霧露何欲以成歲潤萬物因以見災異也鄒衍大言天事號談天衍虞昺穹天論曰天形穹隆如笠而冒地之表浮元氣之上譬覆奩以抑水而不没者氣充其中也日遶辰極没西南還東不入地中也天文録曰古人言天地之形者有三一曰渾天二曰蓋天三曰宣夜宣夜之說未甞聞也後有虞昺作穹天論姚信作昕天論虞喜作安天論衆形殊象參差其間蓋天之說又有三體一云天如車蓋遊乎八極之中一云天形如笠中央髙而四邊下亦云天如欹車蓋南髙北下桓譚新論曰通人揚子雲因衆儒之說天以爲蓋常左旋日月星辰隨而東西乃圖畫形體行度叅以四時暦數昏明晝夜欲爲世人立紀律以垂法後嗣余難之曰春秋晝夜欲等平旦日岀於夘正東方暮日入於酉正西方今以天下之占視之此乃人之夘酉非天夘酉當北斗極北斗極天樞樞天軸也猶蓋有保斗矣蓋雖轉而保斗不移天亦轉周匝斗極常在知爲天之中也仰視之又在北不正在人上而春秋分時日出入乃在斗南如蓋轉則北道近南道逺彼晝夜數何從等乎子雲無以解也後與子雲奏事坐白虎殿廊廡下以寒故背日曝背有頃日光去背不復曝焉因以示子雲曰天即蓋轉而日西行其光影當照此廊下而稍東耳無乃是反應渾天家法焉子雲立壞其所作則儒家以天爲左轉是也, WYG: ''}
