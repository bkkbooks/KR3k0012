  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書太平御覽卷八百四十九宋李昉等撰飲食部七食下鬻子曰禹嘗據一饋而七起日中不暇飽食曰吾不畏士留道路吾恐其留吾門庭四海民不至也晏子曰晏子相景公食脱粟之食炙三弋五卵菜耳公曰噫夫子家如此甚貧乎而寡人之罪對曰脱粟之食飽士之一足也炙三弋士之二足也菜五卵士之三足也嬰無倍人之行而有三士之食君之賜厚矣嬰之家不貧再拜而辭又曰晏子相齊三年政平民悦中食而肉不足景公曰封晏子以都晏子辭不受又曰寡婦樹蘭生而不芳繼子得食肥而不澤}
