  - {type: variant, offset: 420, length: 441, content: 黨五百餘人皆當死䂊悉見慰喻破械遣之諸囚叩頭願効即相報語群賊解散呉志曰陳表傾意待士皆樂爲用命時有盗官物者疑施明明壯悍収考極毒雖死不伏廷尉以聞權以表使自以意求其情實表便破械沐浴易其衣服厚設酒食欲以誘之明乃首服晉書曰范廣爲堂邑令丞劉榮坐事當死郡以付縣榮即縣人家有老母至節廣輒蹔還榮亦如期而返縣堂爲野火所及榮脫械救火事畢還自着械又曰并州刺史司馬騰執諸胡於止東賣充軍實將詣兾州兩胡一枷石勒亦在中又載記曰符丕敗徐義爲慕容永所獲械堙其足將殺之義誦觀丗音經至夜圡開械脫出於重禁之中若有人脫之者遂奔後魏書曰孝文太和𥘉時法官及州郡縣多爲重枷復以縋石懸於囚頸傷肉至骨勒以誣服吏以爲能帝聞而傷之乃制非大逆有明證而不疑辭者不得大枷又曰宋飜爲河南令縣舊有大枷時人號曰方結切尾青及飜爲縣主吏請焚之飜曰且置南墻下以待豪猾未幾有内監楊小駒詣縣請事辭色不遜飜命取青尾以鎮之小駒旣免入訴於宣武宣武大怒勑河南尹推之飜具自陳伏詔曰卿固違朝法豈不欲作威以買名飜對曰造具亦非臣所以留者非敢施於百姓欲待兇暴之徒如駒者耳由是威振京師, WYG: 職}
