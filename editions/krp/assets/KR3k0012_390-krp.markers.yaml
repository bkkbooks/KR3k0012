  - {type: variant, offset: 171, length: 0, content: '', WYG: 尚書益稷曰帝曰来禹女亦昌言咎繇謀九徳故呼禹使亦陳昌言也又無逸曰其在髙宗時舊勞於外爰暨小人作其即位乃或諒闇三年不言其唯不言言乃雍又秦誓曰予誓告汝羣言之首毛詩雨無正曰哿矣能言巧言如流俾躬處休箋云巧猶善也謂以事類風切如水之流急忽然而過之故不悖逆使身居安休如之也亂世之言順而為上也又小弁曰君子毋易由言耳屬於垣箋云猶用也王毋輕用䜛人之言將有屬耳于垣壁聽也又巧言曰巧言如簧顔之厚矣又魚藻都人士曰彼都人士狐裘黄黄其容不改出言有章又蕩之什曰白珪之玷尚可磨也斯言之玷不可為也禮記玉藻曰動則左史書之言則右史書之}
