  - {type: variant, offset: 4284, length: 0, content: '', WYG: 白虎通曰所有社稷何為天下求福報功人非土不立非榖不受土地廣博不可遍敬五祀衆多不可一一而祭故封立社而示五尊榖之立稷而祀之祭而得隂陽和氣而為用又多故為長嵗再祭之又曰祭社稷者有樂乎禮記曰金石之樂用之于宗廟社稷又曰王者諸侯必有戒社何示存亡也明為善者得之而惡者失之春秋公羊傳曰亡國之社掩其上柴其下郊特牲記曰喪國之社屋之示與天絶也蔡邕獨㫁云天子大社五色土為壇皇子封為王者受之大社之土所以封之方籍以白茅歸國以立社故謂之茅社也陳留風俗傳曰東昏縣者位地故陽武之户牖鄉也漢相陳平家焉少為社下宰令民祀其社邴原别傳曰原避地遼東以虎為患自原之洛獨無虎患嘗行而得遺錢拾以繋樹枝比錢不見取繫錢日愈多原問其故荅者謂之社樹原惡其由已而成望犯乃辯之于是里中遂歛其錢以為社供里老為之誦曰邴君行仁洛邑無虎邴君行廉路樹為社列異傳曰大司馬河南陵㽔字聖卿少時病瘧逃社中有人呼社郎聖卿應曰諾起至户中人曰取此書去得素書一卷譴劾百鬼所劾輒効}
