  - {type: variant, offset: 3082, length: 404, content: 白虎通曰王者所有社稷何爲天下求福報功人非土不立非榖不食土地廣愽不可遍敬五祀衆多不可一一而祭故封土立社祀而之示尊五榖之長立稷而祀之稷者得隂陽和氣而爲用又多故爲長歳再祭之又曰祭社稷有樂乎禮記曰金石之樂用之於宗廟社稷又曰王者諸侯必有戒社何示存亡也明爲善者得之爲惡者失之春秋公羊傳曰亡國之社奄其上柴其下郊特牲記曰喪國之社屋之示與天地絶也葵邕獨断云天子太社五色土爲壇皇子封爲王者授之太社之土以所封之方色藉以白茅歸國以立社故爲之茅社也陳留風俗傳曰東昬縣者衛地故陽武之户牖郷也漢相陳平家焉少爲社下宰今民祀其社邴原别傳曰原避也遼東以虎爲患自原之落獨無虎患甞行而得遺錢㭘以繫樹枝比錢不見取繫錢者逾多原問其故荅者謂之社樹原惡其由巳而成妄祀乃辯之於是里中遂歛其錢以爲社供里老爲之誦曰邴君行仁落邑無虎邴君行廉路樹成社列異傳曰大司馬河内陵㽔字聖卿少時病虐逃社中有人呼社邸社邸聖卿應曰諾起至户中人曰取此書去得素書一卷譴劾百鬼法所劾輙効搜, WYG: 捜}
