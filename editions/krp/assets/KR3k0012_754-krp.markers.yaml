  - {type: variant, offset: 393, length: 0, content: '', WYG: 范􅁮後漢書曰耿恭為戊巳校尉恭至部移檄烏孫示漢威徳昆彌以下皆遣使獻名馬及奉宣帝所賜公主愽具願遣子入侍又曰客星經帝座或問趙延因上封事曰河南尹鄧萬有龍潜之舊封為通侯恩重公卿恵豐宗室加禮引見與之對􅀶上下渫黷有虧尊嚴魏畧曰孔桂性便妍曉愽奕太祖愛之每在左右又曰杜畿與衛固少相狎侮共愽争道畿曰我今作河東也固發衣罵之及畿之官而固為功曹晉中興書曰桓𤣥强與人博奕取其田宅穆天子傳曰天子北入邴與井公博三日而決梁冀别傳白冀好格五六博}
