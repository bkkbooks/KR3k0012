  - {type: variant, offset: 603, length: 0, content: '', WYG: 以寛罰無及嗣賞延于世宥過無大刑故無小罪疑惟輕功疑惟重刑疑附輕賞疑從重忠厚之至與其殺不辜寧失不經好生之徳洽於民心兹用不犯于有司辜罪也經常也司主也臯陶因帝勉已遂稱帝之徳所以明民不犯上也寕失不常之罪不犯無辜仁愛之道又臯陶謨曰天討有罪五刑五用哉言天以五刑罰有罪用五刑宜必當又吕刑曰穆王訓夏贖刑吕侯以穆王命作書訓示夏禹贖刑之法更從輕以布告天下作吕刑甫刑後為甫侯故或稱甫刑惟吕命王享國百年耄荒言吕侯見命為卿時穆王以享國百年耄亂荒忽穆王即位過四十矣言百年大期雖老而能用賢以揚名度作刑以詰四方度時世所宜訓作贖刑以治天下四方之民尚書大傳曰子張曰堯舜之王一人刑而天下治何則教誠而愛深也今一夫而被此五刑子龍子曰未可謂能為書二人俱罪吕侯之説刑也被此五刑喻犯數罪也孔子曰不然也五刑有此教教然耳犯數罪猶以上一罪刑之}
