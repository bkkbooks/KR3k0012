  - {type: variant, offset: 1357, length: 291, content: 神精易上繫曰男女構精萬物化生禮記祭義曰衆生必死死必歸土此之謂鬼骨肉斃于下隂爲野土其氣發揚于上爲昭明焄蒿悽愴此百物之精也神之著也唐書曰睿宗子申王撝之𥘉生則天嘗以示僧萬廻曰此兒是西域大樹之精養之冝兄弟則天甚恱始令列於兄弟之次管子曰故涸澤數百歳谷之不徙水之不絶者生慶忌慶忌者其狀若人其長四寸衣黄衣冠黄冠戴黄盖乗小馬好疾馳以其名呼之可使千里外一日反報此涸澤之精也涸川水之精者生于蟡于蟡者一頭而兩身其狀如虵其長八尺以其名呼之可以取魚鼈此涸川水之精也列異傳曰桂陽太守張叔髙家居鄢陵里中有樹大十圍遣客斫之樹大血出客驚怖叔髙曰樹老汁赤耳斫之血大流出空處有一白頭翁出走髙以刀斫殺之所謂木石恠夔蝄蜽乎搜, WYG: 捜}
