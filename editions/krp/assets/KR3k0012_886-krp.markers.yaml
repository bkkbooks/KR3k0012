  - {type: variant, offset: 926, length: 259, content: 異苑曰新野庾寔妻滎陽毛氏女義熈中五月曝曬席忽見女在席下薦上以驚怛便女真形在別牀如故不旬日而夭也仲夏忌舉牀第兹驗矣襄陽耆舊記曰羊公與鄒潤甫登峴山垂泣曰自有宇宙便有此山由來賢逹勝士登此逺望如我與卿者多矣皆湮滅無聞不可得知念此使人悲傷我百年後魂魄猶當登此山十洲記曰聚窟洲在西海中申未地洲上有大樹與楓木相似華葉香聞數百里名此爲反魂樹叩其樹樹亦能自聲聲如牛吼聞之者皆心震神駭伐其根心在玉釡中煑取汁更微火熟煎之如黒飴令可丸名驚精香或名之爲震靈丸或名之爲反生香或名之爲鳥精香或名之爲却死香一種五名斯靈物也香氣聞數百里死尸在地聞仍活博, WYG: 愽}
