  - {type: variant, offset: 1119, length: 0, content: '', WYG: 中規矩繩墨無敢出聲者於是武使使報王曰兵已整王可試下觀之惟王所欲用之雖赴水火無不可也王曰將軍請就舎寡人不願下觀武曰王徒好其言不能用其實於是闔閭知孫子能用兵卒以為將西破强楚入郢北威齊晉又文帝後六年匈奴大入邊乃以宗正劉禮為將軍軍霸上祝滋侯徐厲為將軍軍棘門以河内守周亞夫為將軍軍細栁以備胡上自勞軍直馳入將以下騎送迎已而之細桞軍士吏卒被甲銳兵刄彀弓弩持滿天子先驅不得入先驅曰天子且至軍門都尉曰軍中但聞將軍令不聞天子詔居無何上至又不得入於是上乃使持莭詔將軍吾欲入勞軍亞夫乃傳言開壁門士卒謂從車騎曰將軍約束軍中不得驅馳於是天子乃按轡徐行至軍中營將軍亞夫持兵揖曰介胄之士不拜請以軍禮見應劭曰禮}
