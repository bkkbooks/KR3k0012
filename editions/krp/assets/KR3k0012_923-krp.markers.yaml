  - {type: variant, offset: 4329, length: 392, content: 漢書曰成帝河平元年太山有鳶焚其巢子墮地黒色東觀漢記曰馬援擊交阯下潦上霧毒氣上蒸仰視烏鳶跕跕丁兼切墮水中梁書曰永安侯蕭礭字仲正少好弓馬人有笑者礭謂之曰吾當爲國家破賊故預習之毎臨陣對敵意氣安祥帶甲據鞍自朝至夕馳驟徃返不以爲勞侯景愛之恒在左右常從景出獵見飛鳶景衆射之莫能中礭射之應弦而落自是王偉忌之隋書曰崔彭善射逹頭可汗遣使於上曰請得崔將軍一與相見上曰此必善射聞於虜庭所以來請耳遂遣之及至匈奴中可汗召善射者數十人因擲肉於野以集飛鳶遣其善射者射之多不中復請彭射之連發數矢皆應弦而落突厥相頋莫不歎服可汗留彭不遣百餘日上賂以繒綵然後得歸又曰長孫晟引啓民可汗歸附賜射於武安殿選善射者十二人分爲兩列啓民曰臣有長孫大使得見天子今日賜射願入其列許之給晟箭六隻發皆入鹿啓民列竟勝時有鳶羣飛上曰公善彈爲我取之十發俱中應丸而落是日百官獲賚晟獨居多博物志曰漢舊使綦國送鳶卵給太官晉中興書徴祥說曰永和九年呉郡獻白鳶, WYG: ''}
