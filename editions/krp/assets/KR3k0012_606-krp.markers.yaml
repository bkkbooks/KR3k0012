  - {type: line-break, offset: 601, content: '', id: KR3k0012_SBCK_606-2b01}
  - {type: variant, offset: 601, length: 0, content: '', WYG: 䇿廣雅曰策謂之簡釋名曰策書教令於上所以驅策諸下也漢制約勅封侯曰册册賾也勅使釐賾不犯之也史記曰百名以上則書於策春秋序曰大事書之於䇿小事簡牘而已後漢書曰何敞父比干字少卿為汝隂縣獄吏决曹掾平活數千人後為丹陽都尉獄無寃囚征和三年三月辛亥天大隂雨比干在家日中夢車騎滿門覺而語妻語未竟而門有老嫗求寄避雨雨甚而衣不霑雨止送出門語比干曰公有隂徳天賜君以䇿以廣公之子孫因出懷中符策狀如簡長九寸凡九百九十枚以授比干曰子孫佩印綬者如此數比干年五十八有六男又生三子本始元年}
