  - {type: line-break, offset: 511, content: '', id: KR3k0012_SBCK_505-2a03}
  - {type: variant, offset: 511, length: 0, content: '', WYG: 齊豫章王嶷為揚州徴為議曹從事不應又曰樓恵明字智逺立性貞固有道術居金華山舊多毒害自恵明居之無復辛螫之苦藏名匿迹人莫知之宋明帝召不至齊髙帝徴又不至文恵太子在宫苦延方至仍又辭歸俄自金華輕棹西下及就路迴之豐安旬日間俄賊起唯豐安獨全時人以為有先覺齊武帝勅為立館又曰漁父者不知姓名亦不知何許人也太康孫􅃡為潯陽太守落日逍遥渚際見一輕舟凌波隠顯俄而漁父至神韻瀟洒垂綸長嘯緬甚異之乃問有魚賣乎漁父笑而答曰其釣非釣寧賣魚者耶􅃡忿怪焉遂褰裳涉水謂曰竊觀先生有道者也終朝鼔枻良亦勞止吾聞黄金白璧重利也駟馬髙盖榮勢也今方王道文明守在海外隱淪之士靡然向風子胡不贊緝熈之美何晦其用若是也漁父曰僕山海狂人不達世務未辯貴賤無論榮貴乃歌曰竹竿籊籊河水悠悠相忘為樂貪餌吞鈎非夷非恵聊以忘憂於是悠然鼔棹而去又曰顧歡字景伯吳興鹽官人也家世寒賤父祖並務農歡獨好學年六七嵗知推六甲家貧父使田中驅雀歡作黄雀賦而歸雀食稻過半父怒欲撻之見賦乃止鄉中有學舍歡貧無以受業於舍壁後倚聽無遺忘者夕則燃松節讀書自照及長篤志不倦聞吳興東遷邵𤣥之能𫝊五經文句假為書師從之受業同郡顧凱之臨縣見而異之遣諸子與遊從豫章雷次宗諮𤣥儒諸義母亡水漿不入口廬於墓側遂隠不仕於剡天台山開館聚徒受業者常近百人歡早孤讀書至哀哀父母生我劬勞輒執書慟哭由是受業者廢蓼莪篇不復講焉}
