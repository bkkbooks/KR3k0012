  - {type: variant, offset: 1119, length: 532, content: 樓惠明字智逺立性貞固有道術居金華山舊多毒害自惠明居之無復辛螫之苦藏名匿跡人莫之知宋明帝召不至齊髙帝徴又不至文惠太子在宫苦延方至仍又辞歸俄自金華輕棹西下及就路廻之豐安旬日聞俄賊起唯豊安獨全時人以爲有先覺齊武帝勑爲立館又曰漁父者不知姓名亦不知何許人也太康孫𬗟爲尋陽太守落日逍遥渚際見一輕舟凌波隱顯俄而漁父至神韻蕭灑垂綸長嘯𬗟甚異之乃閑問有魚賣乎漁父笑而荅曰其釣非釣寧賣魚者耶𬗟益恠焉遂褰裳渉水謂曰竊觀先生有道者也終朝鼓枻良足勞止吾聞黄金白壁重利也駟馬髙蓋榮勞也方今王道文明守在海外隱鱗之士靡然向風子胡不賛緝熈之羙何晦其用若是也漁父曰僕山海狂人不逹丗務未辨貴賤無論榮貴乃歌曰竹竿籊籊河水悠悠相忘爲樂貪餌吞釣非夷非恵聊以忘憂於是悠然鼓棹而去又曰顧歡字景怡呉興塩官人也家丗寒賤父祖並爲農歡獨好學年六七歲知推六甲家貧父使田中駈雀歡作黄雀賦而歸雀食稻過半父怒欲撻之見賦乃止郷中有學舎歡貧無以受業於舎壁後倚聽無遺忘者夕則燃松節讀書或燃糠自昭及長篤志不倦聞呉興東遷邵玄之傳五經文旬假爲書師從之受業同郡顧凱之臨縣見而異之遣諸子與逰從豫章雷次宗諮玄儒諸義母亡水漿不入口廬于墓側遂隱不仕於剡天台山開館聚徒受業諸生常近百人歡早孤讀詩至哀哀父母生我劬勞輙執書慟哭由是受學者廢蓼莪篇不復講焉又曰, WYG: ''}
