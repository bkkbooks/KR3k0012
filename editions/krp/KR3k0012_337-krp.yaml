front:
  text: 太平御覽卷第三百三十七
  hash: sha256:b16add3410f7dc986942a07ba0fbbce8067b03083ead3dbfcef29fc5e8978a77
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_337-1a}
body:
  text: 兵部六十八攻具下旝鹿角箛槍弋攻具下通典衛公兵法攻城戰具篇曰作四輪車上以繩爲脊生牛皮蒙之下可藏十人填隍推土回切之直抵城下可以攻掘金火木石所不能敗謂之轒輼車凢力有餘者攻先絶諸國之交使無外救粮多而人少攻而勿圍粮少而人多圍而勿攻又曰以大木爲牀下置六輪上立雙牙牙有檢梯節長丈二尺有四桄音光桄相去三尺勢微曲遞牙相檢飛於雲間以窺城中有上城梯首冠雙轆轤枕城而上謂之飛雲梯又曰大木爲牀下安四獨輪床上建雙陛間撗括中立獨竿首如桔槹狀其竿髙下長短大小以城爲凖竿首以窠盛石大小多少隨力所制人挽其端投之其推轉逐便而用之亦可埋脚著地而用其旋風四脚亦隨事而用之謂之抛車又曰作轉軸車車上定十二石弩以䥫鈎縄連轉車行軸轉引弩持滿弦挂牙上弩爲七衢中衢大箭一鏃刄長七寸廣五寸箭簳長三尺圍五寸以鐵鍱音業爲羽左右各三箭次小於中箭其牙一發諸箭齊起及七百歩所中城壘無不摧隕樓櫓亦顚墜謂之車弩又曰以木爲脊長一丈徑一尺五寸下安六脚下闊而上尖髙七尺内可容六人以濕牛皮蒙之人蔽其下舁直抵城下木石鐵火所不能敗用攻其城謂之尖頭木驢又曰於城外起土爲山乗城而上古謂之土山今之壘道用生牛皮作小屋并四面蒙之屋中置運土人以防攻擊者土山則孫子所謂距閩鑿地爲道行於城下用攻其城徃徃建柱積薪於柱間而燒之柱折城摧謂之地道又曰以八輪車上樹髙竿竿上安轆轤以䋲挽板屋上竿首以窺城中版屋方四尺髙五尺有十二孔四面列布車可進退圜城而行於營中逺視亦謂之巢車如鳥之巢即今之版屋也以版爲慢立桔橰於四輪車上懸幔逼城堞間使趫捷者大白隂經曰使趫卒蔽之蟻附而上矢石所不能及謂之木幔又守城篇曰禽滑釐問墨翟守城之具墨翟荅以五六十事皆煩冗不便於用其後韋孝窺守晉州羊偘守臺城皆約封胡子伎巧之術法古不妙非合今之用也今述所便於事者如後渭浚湟深池増城修堞懸門懸板爲重門也又曰突門於城中對敵營自鑿城内爲闇門多少臨事令五六寸勿穿或於中夜或於敵𥘉來營列未定精騎從突門躍出擊其無俻襲其不意又曰塗扇以泥塗城門扇厚可三寸俻火又曰鑿門爲敵所逼門先自鑿門扇爲數十孔出強弩射之長矛刺之則敵不得近門又曰塗棧以泥塗門上木棧厚可五寸俻火又曰轉關橋一梁爲橋梁端着撗括去其橋轉人馬不得渡皆傾水中秦用此橋而殺燕丹又曰積石備抛石大小隨事又曰樓櫓却敵上建候樓以板爲之跳出爲櫓笓籬戰隔於女墻上跳出椓去墻三尺内着撗括㧻端安轄以荆柳編爲之長一丈闊五尺懸椓端用遮矢石又曰布㡢以複布爲幄以弱竿懸挂於女墻外去墻外七八尺以折抛石之勢矢石不復及墻又曰木弩以黄連桑柘爲弩弓長一丈二尺徑七寸兩弰二寸以絞車張之大矢一發聲如雷吼敗隊之卒又曰鷰尾炬縛葦草爲炬尾分爲兩歧如鷰尾狀以油臈灌之加火從城墜下便騎木驢而燒之又曰松明以木明燒之夜以鐵鏁縋下廵城照敵人乗城而上又曰脂油燭炬燃燈秉燭於城中四衢要路門户晨夜不得絶明用備非常又曰行爐融鐡汁爐舁行於城上以灑敵人又曰遊火以鐵筐盛火加脂臈鐵鏁懸縋下燒穴中孔城人又曰灰越糠粃因風於城上擲之以眯敵人目因以鐵汁灑之又曰連捧如打禾連拁狀用打女墻外上城敵人又曰扠竿如槍刄爲兩歧用义飛梯及人又曰鈞竿如槍刄兩旁有曲刄可以鈎塔又曰油囊盛水於城上擲安火車中嚢敗火盛又曰天井敵攻城爲地道來乃自於城道上直下穿井以邀之積薪安井中以火薫之敵人自焦灼又曰地聽於城内八方穿鑿井各深二丈令頭覆戴新甕於井中坐聽則城外百歩之内有孔城地道者並聲聞甕中而辯知方所近逺矣又曰䥫莢杖狀如䥫蒺䔧要路水中置之以刺人馬又曰䧟馬坈坈長五尺闊一尺深三尺坈中埋鹿角槍竹籖其坈十字相交狀如鈎鏁以覆芻草葦木加之土種草實令生苗蒙覆其上軍城營壘要路皆設之衛公兵法曰坈如亞字相連以草及細塵覆其上又曰拒馬槍以木徑一尺長短隨事十字鑿孔從撗安槍一作檢長一丈銳其端可以塞城門要路巷人馬不得奔馳又曰木柵爲敵所逼不及築城壘或因山河險勢多石少土不住版堞乃建立木柵方圎髙下隨事深埋木根重複弥縫其闕内重加短木爲閣道柱外重長出四尺爲女墻皆泥塗之内七尺又立閣道内柱上布板木爲棧立欄竿行於柵上懸門擁墻壕壍拒馬防守一如城壘法太白隂經曰蜀钁鐵塹鏨蜀钁短柄钁也鐵鏨鑿井鏨城也旝許愼說文曰旝建大木置石其上發爲機以拒敵也從方㑹聲一云從衣會声左傳曰周桓王伐鄭鄭爲三拒命二拒曰旝動而鼔社預注曰旝旗也執以爲号令魏武本紀曰上與袁紹軍於官度賊射營中行者皆𬒳田衆皆恐上令傳言旝動而鼔說文曰旝發石車也乃造發石車擊紹櫓一日盡壞紹衆號之礕礰車沈懷文宋侍中趙倫之碑曰君戮力以致誠吐規以會機一鼔則㓂騎雲徹旝動則敵車霧消鹿角袁曄漢獻帝春秋曰揚州刺史劉馥上言荆州牧劉表與會稽太守孫權謀襲京城遂壍許設鹿角砦王沈魏書曰李通拜汝南太守劉備與周瑜圍曹仁於江陵與諸將擊之通親下馬入圍抜鹿角勇冠諸將軍魚豢魏略曰夏侯霸字仲權爲偏將軍大和中在長安及子午之役霸占爲前鋒蜀人望知其是霸也指下兵攻之霸手戰鹿角間頼救然後解魏志曰徐晃討關羽於樊羽自將歩騎五千出戰晃擊之退走遂追與俱入圍破之或自投沔水死魏太祖令曰賊爲塹鹿角十里將軍致戰全勝遂䧟賊圍將軍之功踰孫武穰苴虞溥江表傳曰曹公出濡須甘寕抜曹公鹿角踰壘入斬數十人王隠晉書曰馬隆爲武威太守之郡作八陣圖地廣則鹿角車營進攻則木屋抱輪並戰並前虜弗能逼于寳晉紀曰曹爽留車駕宿伊水南伐木爲鹿角發屯田兵數千人以爲衛習鑿齒漢晉陽秋曰曹芳謁曹叡墓於大石山曹爽兄弟皆從於是司馬懿閇四城遂與太尉蔣濟俱屯洛水南浮橋奏罷爽兄弟不知所爲芳還宿伊水南發屯田數千人樹鹿角爲營晉惠帝起居注曰王浚乗勝追石超軍於斥丘超持重不與戰以鹿角爲營一云以鹿角歩安立營晉起居注曰義熈六年築壘起城于祖浦石頭城施鹿角以禦盧循司馬彪戰略曰遼東太守公孫淵反明帝召太尉司馬公討之軍到襄平公圍之北面東面有圍不合連車置水中積石鎮其上以鹿角塞之魏武帝表曰臣前遣討河内獲嘉諸屯獲生口辭云河内有一神人宋金生令諸屯皆云鹿角不湏守吾使狗爲汝守不從其言者即夜聞有軍兵聲明日視屯下但見虎跡臣輙部武猛都尉吕納將兵掩捉得生口輙行軍法諸葛亮教曰前到武都一日鹿角壞刀斧千餘枚頼賊巳走若未走無所復用晉宣帝教曰今日當將作四千人東爲三軍作營壍壘又當將斧三百枚破樹木作鹿角塞諸郵漏處諸葛亮軍令曰敵以來進持鹿角兵悉却在連衝後敵巳附鹿角裏兵但得進踞以矛㦸刺之不得起住起住妨弩魏武軍䇿令曰夏侯淵今月賊燒都鹿角鹿角去本營十五里淵將四百兵行鹿角因使士捕之賊山上望見從谷中卒出淵使兵與闘賊遂繞出其後兵退而淵未至甚可傷淵本非能用兵也軍中呼爲白地將軍爲督帥尚不當親戰况𥙷鹿角乎王曠與楊州論討陳敏計曰賊今下屯固横江又云復據烏江皆壍壘彭排鹿角歩安嚴峻以襲歴陽諸軍辛昞洛戍時與桓郎牋曰桓振武今下官將千二百人奄襲營值天洪雨器仗沾濕壍廣深丈餘鹿角五重樓櫓嚴設自四更三唱攻逼至小食時不尅箛搶張揖廣雅曰謂之箛槍箛音孤服䖍通俗文曰剡葦傷盗謂之槍何承天纂文曰音就箛槍也謝靈運自理表曰星言奔馳歸骨陛下及經山隂方衛彰赫彭排馬搶斷截衢巷宋起居注曰泰始二年有司奏賊帥劉胡等從南城蘭道領馬歩萬餘人樹排槍陌山從東五道直來攻營杜預奏秦州軍事曰臣甞聞邊人說虜專以騎爲㓂穿壍不如作馬塪馬塪法坈方三尺錯平穿之虜騎非下馬平治則終不得入又其外蹊要路亦可隨作塢施槍著塪中訖薄覆其上如此則虜當築地而行不敢輙徃來也蔡謨與何驃騎書曰公失櫓上人吾亦具之矣在深草中立櫓無故以櫓自標令賊見之而自不得見賊賊不病癡何故不來取邪今令數百歩内皆露見布竹箛如蝟毛賊不能飛何得卒至邪弋張揖埤蒼曰拱大弋也許愼說文曰擑弋也麋弋也太公六韜曰委環鐡弋長三丈千三百左傳曰齊人戰獲臧堅使宿沙衛喭之曰無死堅曰使刑臣禮於士以弋抉其傷而死司馬彪戰略曰遼東太守公孫淵反太尉司馬公討之軍到襄乎去城百歩穿重壍堅連柵安諸營立樓櫓其近水沙地不得作圍壍而車輪以大弋㧻穿中又堅輪障其前韋昭呉書曰賀齊討賊陳僕於林歴山山四面壁立不可攻齊乃隂作鐵弋於賊不備處以弋拓山爲道夜潜上破賊太平御覽卷第三百三十七
