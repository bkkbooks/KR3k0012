front:
  text: 太平御覽卷第三百
  hash: sha256:bb15da4dcc4d27d69f19ed59799ab6cc984c35d86c8acfd736958c16fc654861
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_300-1a}
body:
  text: 兵部三十一卒騎卒說文曰隷人給事者爲卒衣有題識者也玉篇曰卒衆之名也屯戍之兵也桂苑曰卒隷人也管子曰管仲相齊作内政而寄軍令二百人爲卒卒有正卒聚也韻海曰南楚謂卒爲弩父卒主檐弩導因以爲名也又行鞭杖者也皆赤幘絳褠左傳曰齊侯來逢丑父三入三岀毎出齊師以帥退入于狄卒狄卒者狄人從晉討齊也狄皆抽戈盾冒之又曰楚令尹子重將爲陽橋之役赦罪悉師王卒盡行彭名御戎蔡景公爲左許靈公爲右又曰晉侯將伐鄭楚子救鄭六月晉楚遇於􅋣陵苗賁皇言於晉侯曰楚之良在中軍王族而巳請分良以擊其左右而三軍萃於王卒必大敗又曰宣子謂鞅曰矢及君屋死之鞅用劒以帥卒而欒氏退攝車從之又曰楚伐舒鳩呉人救之楚子彊子息桓子駢子子孟五人以其私卒先擊呉師呉師奔登山以望見楚師不繼復逐之傳諸其軍又曰齊爲鄎故國書髙無夲帥師伐我及清季孫謂其宰冉求曰齊師在清必魯故也季氏之甲七十冉有以武城人三百爲巳徒卒老㓜守宫次于雱門之外五日右師從之又曰蔡衞不拔固將先奔旣而萃於王卒可以禁事從之又曰子玉使伯棼請戰曰非敢必有功也願以間執䜛慝之口王怒少與之師唯西廣東宫與若敖之六卒實從之又曰狐毛狐偃以上軍夾攻子西楚左師潰楚師敗績子玉收其卒而止故不敗史記項羽夲紀曰是時吕后兄吕侯爲漢將兵居下邑漢王間徃從之稍稍收其士卒漢書曰呉王劉濞傳曰呉王先起兵誅漢吏二千石以下膠西膠東王爲渠率與甾川濟南共攻圍臨甾趙王遂亦隂使匈奴與連兵七國之發也呉王悉其士卒下令國中曰寡人年六十二身自將少子年十四亦爲士卒先諸年上與寡人同與少子等皆發二十餘萬人也又司馬迁傳曰且陵提步卒不滿五千深踐戎馬之地足歴王庭垂餌虎口横挑強胡陵李陵也又刑法志曰戰國之時轉相攻伐齊愍以伎擊強魏惠以武卒奮秦昭以銳士勝又五行志曰成帝綏和二年八月鄭通里男子王褒衣綘衣小冠帶劒入北司馬門上前殿解帷組結佩之自云天帝使我居此收縳考問故公車大誰卒病狂易不自知入宫下獄死大誰者非常之人名大姓誰是也本以誰何爲稱因用名官有大離長今此卒即長所領之卒也又食貨志曰董仲舒說武帝曰今荒滛越制踰侈以相髙邑有人君之尊里有公侯之冨小民焉得不困又加月爲更卒巳復爲正一歲屯戍三十倍於古更工衡切更卒謂給郡縣一月而更也又胡建傳曰建字子孟河東人也孝武天漢中守軍正丞貧亡車馬常歩與走卒起居所以尉薦走卒甚得其心尉者自上安之也薦者舉藉之也晉書天文志曰積卒十三星在房心南主爲衛也又謝万傳曰万乃召集諸將都無所說直如意指四座云諸將皆勁卒諸將益恨之又劉元海載記曰元海薨和嗣立呼延攸等恨不叅顧命也說和曰先帝不惟輕重之計而使三王揔強兵於内大司馬握十萬勁卒居于近郊陛下今便爲寄坐禍難未可惻也又劉曜載記曰劉岳攻石生于洛陽配以近郡甲士五千宿衛精卒一萬濟自盟津鎮東呼延讓荆州之衆自崤澠而東莊子曰孔子徃見盗跖盗跖乃方休卒太山之陽膾人肝而餔之魏武歩戰令曰嚴鼔一通歩騎士悉裝再通騎上馬歩結屯三通以次出之隨幡所指住者結屯幡後聞急鼔音整陣斥候者視地形廣狹從四角面立表制陣之冝諸部曲各自按部陣兵曹舉不如令者斬陳孔璋檄呉將校部曲文曰又使征西將軍夏侯淵等帥精甲五萬巴漢銳卒又曰城都屠勾踐武卒散於黄池曹植求自試表曰伏見先帝武臣宿兵年耆即丗者有聞矣雖賢不乏丗宿將舊卒猶習戰也阮嗣宗爲鄭冲勸晉王牋曰東誅叛逆全軍獨尅擒闔閭之將斬輕銳之卒以萬計威加南海名懾三越于寳晉紀論曰將相侯王連頭受戮乞爲奴僕而猶不獲免嬪嬙妃主虜辱於戎卒豈不哀哉陸士衡辨亡論曰告類上帝拱揖羣后虎臣毅卒循江而守劉孝摽辨命論曰楚師屠漢卒睢河鯁其流秦人坑趙士卒沸聲若雷霆班孟堅西都賦曰列卒周匝星羅雲布左太冲呉都賦曰雕題之士鏤身之卒又魏都賦曰簿戍綿羃無異蛛蝥之網弱卒瑣甲何異螳蜋之衛王仲宣從軍詩曰汎舟盖長川陳卒𬒳隰坰謝靈運擬魏太子鄴中集應瑒詩曰官度厠一卒烏林預艱阻賈誼過秦篇曰率罷散之卒將數百之衆轉而攻秦斬木爲兵掲竿爲旗又曰信臣精卒陳利兵而誰何顔延年楊給事誄曰立于將卒之間以輯華裔之衆騎釋名曰騎歧也兩脚歧别也史記曰韓信伐趙未至井陘選輕騎二千人人持一赤幟從間道而望趙軍又曰今上爲膠東王時韓嫣與上學書相愛及上爲太子愈益親嫣善騎射上即位欲事伐匈奴而嫣先習胡兵以故益尊貴漢書曰霍去病年十八爲侍中善騎射又曰趙充國字公孫隴西上邽人也始爲騎士以六郡良家子服䖍曰金城隴西天水安定北地上郡也善騎射對𥙷羽林後漢書曰景丹從擊王郎將倪宏等於南蠻郎兵迎戰漢軍追却續漢書曰南蠻賊迎擊上營得上鼓車輜重數乗丹等縱突騎擊大破之追奔十餘里死傷者從横丹還丗祖謂曰吾聞突騎天下精兵今乃見其戰樂可言耶遂從征河北又曰吕布爲曹操所敗布見操曰今日巳徃天下定矣操曰何以言之布曰明公之所患不過於布今巳服矣令布將騎明公將歩天下不足定也東觀漢記曰鄧禹攻赤眉輙不利吏士散巳盡禹獨與二十四騎還詣雒陽又曰叚熲移於徒中爲并州刺史徵還京師馬騎五萬餘疋又曰馬魴將緹騎宿玄武門張璠漢記曰蔡雍上書靈帝曰幽州突騎兾州強弩天下精兵也魏志曰曹休字文烈太祖族子太祖指休謂左右曰此吾家千里駒也使與文帝同居止見待如子常從征伐使領虎豹騎又曰太祖哀曹眞少孤占養與諸子同使與文帝共止甞獵爲虎所逐顧射應聲而倒太祖壯其勇使將虎騎又曰光和中涼州賊起發幽州突騎三千假公孫瓉都督行軍事討之呉志曰孫堅領豫州刺史遂治兵於魯陽城當進軍討董卓遣長史公仇稱將兵從事還州督軍粮施帳幔於城東門外祖道送稱官屬並㑹卓遣歩騎數萬人逆堅輕騎數十先到堅方行酒談笑勑部曲整順行陣無得妄動後騎漸益堅徐罷坐導引入城乃謂左右曰向所以不即起者恐兵相蹈襲諸君不得入耳卓兵見堅士衆甚整不敢攻城乃引還又曰孫䇿騎士有罪逃入袁術營隱於内廐䇿指使人就斬之訖詣術謝術曰兵人好叛當共疾之何爲謝耶蜀志曰曹公入荆州先主奔江南曹公追之及於當陽之長阪先主弃妻子奔使張飛將二十騎據水斷橋瞋目横矛曰張益德也可來共決死敵皆無敢近者又曰趙雲字子龍隨先主爲先主主騎晉書載記曰符堅伐晋捨大軍于項城以輕騎八千兼道赴之令軍人曰敢言吾至壽春者拔舌而族之宋書曰傅弘之素善騎射髙祖至長安弘之於姚泓馳道内緩服戯馬或馳或驟徃反二十里中甚有莭制羌胡聚觀者數十人並惋驚歎息梁書曰曹景宗謂所親曰我昔在郷里騎快馬如龍與年少軰數十騎拍弓絃作礕礳聲箭如餓鴟叫平澤逐麞數肋射之後周書曰太祖甞從數騎於野忽聞簫鼓之音以問從人皆莫之聞也唐書曰貞觀中左右屯營始置飛騎揀材力驍捷善騎射者爲之太宗時出遊幸則從馬衣五色𫀆乗六閑駿馬賜猛獸皮韀以摽異之又加階級廩食各有差五代周史曰顯德中丗宗車駕至濠州城下戊子親破十八里灘砦在濠州東北淮水之中四面阻水上令甲士數百人跨駞以濟太祖皇帝以騎軍浮水而渡遂破其砦虜其戰艦而廻三國典略曰陳韋翽字子羽有志操以孝著稱先㝷以爲驍騎將軍領朱衣直閣驍騎之職舊領營兵梁丗巳來其任逾重􅔘素有名望毎大事恒令俠侍左右時人榮之號曰俠御將軍祢衡別傳曰衡着官布單衣以杖捶地數罵責操及其先祖無所不至操乃勑外具上廐驎馬三疋并騎二人須臾外給啓馬辨曹公謂孔文舉曰祢衡小人無狀乃尔孤今殺之無異䑕雀耳顧此子有異才逺近聞之孤今殺之將謂孤不能容劉景升天性險急不能容受此子必當殺之乃以衡置馬上兩騎挾送至南陽也㑹稽典録曰朱育謂鍾離曰大皇帝以神武之姿欲得五千騎乃可有圖今騎無從出而懷進取之志將何計收曰大皇以中國多騎欲得騎以當之呉神鋒弩射三四里洞三四馬騎敢近之乎鄴中記曰石虎皇后出女騎千人皆着五綵靴鄴城故事記涼馬臺一名閱焉臺亦名戯馬臺案鄴中記云趙王虎建武六年造涼馬臺在城西漳水之南約坎爲臺虎常於此臺簡練騎卒虎牙宿衛號雲騰黒矟騎五千人毎月朔晦閱馬於此臺乃於漳水之南張幟鳴鼔列騎星羅虎乃登臺射􅐴箭一發五千騎一時奔走從漳水之南齊走集於臺下隊督巳下皆班賚虎又射一箭其五千騎又齊走於漳水之北其五千流散攅促若數萬人騎皆以􅃮矟從事故以黒矟爲號季龍又常以女騎一千人爲鹵簿皆着紫綸巾熟錦袴金銀鏤帶五文織成靴遊于臺上六韜曰選士之法取年四十以下長七尺五寸以上材輕捷疾力過倫等能馳彀騎射前後左右周旋進退超越溝塹馳山陵險阻絶大澤越強敵亂大衆者名曰武騎之士不可不厚也三略曰欲知敵形色可勝之符先以二十八騎感之騎象二十八宿也淮南子曰夫善游者溺善騎者墮各以其所好反自爲禍禍害也是故好事者未甞不中中傷也好爲情欲之事者未甞不自傷也爭利者未甞不窮也通典曰孫臏云用騎有十利一曰迎敵始至二曰乗敵虚背三曰追散亂擊四曰迎敵前擊後使敵奔走五曰遮其糧食絶其軍道六曰敗其津關發其橋梁七曰掩其不備卒擊其未振八曰攻其靜怠岀其不意九曰燒其積聚市里十曰掠其田野係纍其子弟此十者騎戰利也夫騎者能離能散能集百里爲期千里而赴出入無間故名離合之兵也太平御覽卷第三百
