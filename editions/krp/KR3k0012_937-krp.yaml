  text: 太平御覽卷第九百三十七鱗介部九
  hash: sha256:ef1325cb8b205feb0d8b69ebc6ca2a07475891e7cda1153411e68918fe63cc35
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_937-1a}
body:
  text: 魴魚鱮魚鯈魚鯋魚鱨魚鮒魚鮊魚鱯魚鱒魚鱧魚鯽魚嘉魚鰽魚鮆魚鱸魚鯔魚鱓魚魴魚爾雅曰魴魾郭璞注曰江東呼魴爲鯿一名魾音毗山海經曰大鯾居海中鯾即魴也音緶毛詩宛丘衡門曰豈其食魚必河之魴又關睢汝墳曰魴魚赬尾王室如燬又七月九罭曰九罭之魚鱒魴陸機毛詩䟽義曰魴鱞今伊洛濟潁魴魚也廣而薄脆甜而少肉細鱗魚之美者也漁陽泉州刀口遼東梁水魴特肥而厚尤美於中魴故其郷語曰居就梁水魴說苑曰陽書謂宓子賤曰吾少也賤不知理民之術有釣道二焉夫投綸餌迎而吸之者陽橋也其爲魚也薄而不美若存若亡若食不食者魴也其爲魚也薄而厚味宓子賤曰善具釣部宋玉釣賦曰左挾魚罶右執橋竿精不離乎魚喙思不出乎鮒鯿鱮魚毛詩曰其釣維何惟魴及鱮音叙毛詩義䟽曰鱮似魴而大頭魚之不美者故里語曰買魚得鱮不如啖茹徐州謂之鰱音連或謂之水經曰沔水北流注于漢漢水又左得度口水出陽平北水山有二源一曰清檢出佳鱮二曰濁撿出好鮒常以二月取之美珎常味潘岳西征賦曰素鱮楊鬐鯈魚音稠爾雅曰鮂里鰦郭璞注曰即白鯈也江東呼爲鮂因兹二音莊子曰莊子與惠子遊於豪梁水上莊子曰鯈魚出遊從容是魚樂也惠子曰子非魚安知魚之樂耶莊子曰子非我安知我不知魚之樂耶惠子曰我非子故不知子矣子固非魚也子之不知魚全矣山海經曰帶山茈葫之水其中多鯈魚其狀如鷄而赤毛三尾六足四首其音如鵲食之巳憂又圖經讃曰泊和損乎莫慘於憂詩詠萱草山經則鯈儔條二音何敬祖詩曰屬耳聽鳴鶯流目玩鯈魚鯋魚爾雅曰鯋鮀郭璞曰今吹沙小魚體圓而有點文也沙陁二音毛詩魚麗曰魚麗于罶鱨鯋鯋鮀也廣志曰吹沙魚大如指沙中行鱨魚毛詩曰魚麗于罶鱨鯋鱨楊也音常毛詩義䟽曰鱨一名楊今黃頰魚是身形厚而長大頰骨正黄鮒魚周易井卦曰井谷射鮒王肅注曰鮒小魚也廣雅曰鯖鮒也莊子曰莊周家貧徃貸粟於監何侯侯曰我將得邑今貸子二百金可乎莊周忿然曰周昨來有中道而呼者周視車轍中有鮒魚焉曰我東海之波臣也君豈有升斗之水而活我哉周曰諾我且南遊呉越之王激西江之水而迎之可乎鮒魚忿然作色曰吾得升斗之水可活耳君乃言此不如早索我於枯魚之肆又曰夫掲竿累趣灌竇守鯢鮒其於得大魚難矣吕氏春秋曰魚之美者有洞庭之鮒說苑曰魏楚㑹於晉陽將以伐齊齊王患之使人召淳于髠曰魏楚欲伐齊願先生共寡人憂之髠曰臣見隣人之祠田也以一篋飯與一鮒魚其祝曰下田洿邪得榖百車臣笑其所祠者少所求者多王曰善立爲上卿神異經曰東南海中有恒洲有温湖鮒魚生焉長八尺食之冝暑而辟風寒盛弘之荆州記曰荆州有美鮒踰於洞庭温湖古樂府罩辭曰罩𥘉何得端來得鮒小者如手大者如屨孝子持歸遺我公姬安得此魚適與罩迕從今以後但當求鮒劉邵七華曰洞庭之鮒出于江岷弘膄青顱朱尾碧鱗鮎魚爾雅曰鮎别名鯷江東通呼鮎爲鮧鮧音提廣雅曰鮷音提鯷音逓鮎也魏武四時食制曰蒸鮎永嘉郡記曰漈湖溪中多大鮎昔有流得一死者鬚大五六圍廣五行記曰則天如意中著作郎路敬淳㽵在濟源有水碾一柱壞以他柱易之家人取故者爲樵中得一鮎魚長尺餘尚活至後敬淳坐綦連輝𬒳殺鱯魚廣志曰鱯音畫魚似鮎大口鱒魚爾雅曰鮅音必鱒才損切似鯶子赤眼鯶音混毛詩九罭曰九罭之魚鱒魴鱒魴大魚也毛詩䟽義曰鱒魴鱒似鯢魚鱗細於鯢也赤眼多細文唐書曰吐蕃國有臧何去邏些三百里東南流衆水湊焉南入崑崙國其中有魚似鱒而無鱗張衡七辨曰鞏洛之鱒割以爲分芒折縷細亂䖟足鱧魚爾雅曰鱧郭璞注曰鱧鮦也自亦依鱺也毛詩魚麗曰魚麗于罶魴鱧鱧魚也陸機毛詩䟽義曰魴鱧爾雅曰鱧鮦音同也許以爲鯉魚機以爲鯉狹而厚梁書曰林邑王逸死奴文夲篡立文夲曰南西捲縣夷帥范㓜家奴常牧牛於山澗得鱧魚二而化爲鐵因以鑄刀刀成文向石呪曰若斫石入者文當王此國因斫如斷芻藁文心異之范㓜常使之啇賈至林邑王作宫室及兵車器械王寵任之後乃䜛言諸子咎奔餘國及王死無嗣文爲於憐國迓王子置毒於漿中殺遂䝱國人自立林邑國記曰范文得鱧魚變爲鐵斫石如斬盧世傳魚刀鲫魚水經曰青林湖有鯽魚食之肥美辟寒暑南夷志曰蒙舎地有鯽魚大者重五斤西洱河及昆池南接滇池冬月多鯽魚楊衒之洛陽伽藍記曰王肅初入國不食羊肉及酪等常飯鯽魚羮嘉魚水經曰丙穴出嘉魚常以三月岀十月入穴口廣五六尺去地七八尺水泉懸注魚自穴下透入水穴口向丙故曰丙穴任像益州記曰嘉魚細鱗似鱒魚蜀中謂之拙魚蜀郡山處處有之年年從石孔岀大者五六尺雲南記曰雅州丙穴岀嘉魚所謂嘉魚生於丙穴大抵雅州諸水多有嘉魚似鯉而鱗細或云黃河中味魚此類也博物志曰江陽縣北有魚穴二所常以二月八月岀魚魚曰丙穴嶺表録異曰嘉魚形如鱒岀梧州戎城縣江水口甚肥美衆魚莫可與比最冝爲䱓他頂切毎炙以芭蕉葉隔火盖慮脂滴火滅耳河陽有味魚赤此類左思蜀都賦曰嘉魚岀於丙穴􅪓地名有穴三所鰽魚字由切異物志曰鰽魚仲夏始從海中泝流而上腹下如刀長尺餘有細骨地鳥毛在肉中又有鳥腎在腹立夏有白鳥似鷖羣飛謂之鰽烏至仲夏鳥藏魚出變化所生也鮆魚音薺爾雅曰鮤鱴刀今之鮆魚也亦呼爲魡魚列蔑二音山海經曰浮玉之山山北望具區荅水岀于其隂其中多鮆魚郭璞注日鮆魚狹薄而長鬚一名刀魚大湖中饒異苑曰蝴蝶變作鮆鱸魚後漢書曰左慈字元放曽在曹操座操曰恨少呉松江鱸魚耳慈因求銅盤貯水以竹竿釣於盤中湏臾引一鱸岀操曰一魚不周乃更沉釣復引岀皆長三尺餘操使目前膾之世說曰張季膺爲齊王掾在洛水秋風起因思吴中菰菜羮鱸魚膾遂命駕便歸俄而齊王敗時人以爲見機杜寳大業拾遺録曰六年吴郡獻松江鱸魚乾繪鱸魚肉白如雪不腥所謂金韲玉鱠東南之佳味也鯔魚神仙傳曰介象與吴王共論鯔魚爲上乃於殿前作方坎汲水滿之并求釣起餌之湏臾得鯔魚王驚喜乃使膾之異物志曰鯔魚長者六七尺嶺表録異曰跳䱓乃海味之小魚䱓也以鹽藏鯔魚兒一斤不啻千箇生擘點䤃下酒甚有羙味余遂問蹺名之義則曰捕魚者中春於髙處卓望魚兒來如陣雲闊二三百歩厚亦相似者旣見報漁師遂摪舡爭前而迎之舡衝魚陣不施罟網但魚兒自驚跳入舡逡廵而滿以此爲䱓故名之跳又云舩去之時不可當魚陣之中恐魚多壓沉故也即可以知其多矣鱓魚與䱉同音善山海經曰大樂之野夏后啓於此舞九代焉女滅在其北居雨水間滅操魚䱉䱉魚屬也祭操爼肉祀也汲冢周書王㑹曰甌人鱓虵鱓虵順食之羙東越甌人也此交州虵特多爲上謝承後漢書曰楊震常客於湖不荅州郡禮命數十年衆人謂之晩貴而震志愈篤後有鸛雀銜三鱣魚飛集講堂前都講取魚進曰虵鱣者卿大夫服之象也數三者法三台也先生自此升矣時年過五十乃始仕州郡梁書曰邵陵王綸攝南徐州事遨遊市里雜於厮隷甞問賣䱉者曰刺史何如對者言躁虐綸怒令吞䱉以死百姓惶駭道路以目淮南子曰今鱓之與虵𧖟之與蠋狀相類而愛憎異人愛鱓與蠶畏地與蠋故曰異也抱朴子曰田地旣有自然之鱓而有荇筮芩根土龍之屬化爲鱓韓子曰䱉似虵而漁者取䱉而畏虵利之所在皆爲賁育顔氏家訓曰江陵劉氏以賣鱓羹爲業後生一兒頭目是鱓自頸巳下方爲人耳又曰後漢書云鸛雀銜三鱓魚音善多假借爲鱣鮪之鱣俗之學士因謂爲鱣魚按魏武帝四時食制鱣魚大如五升奩長一丈郭璞注爾雅云鱣長二三尺安有鸛雀能勝一者况三頭乎鱣又純灰色無文章也鱣魚長者不過三尺大者不過三指黃地黒文故都講云虵鱓卿大夫服之象也續漢記及搜神記亦說此事皆作鱓字孫卿云魚鼈鱣鰌及韓非說苑皆曰鱣似虵𧖟似蠋並作鱣字假鱣爲鱓其來乆乎周處風土記曰陽羡俗五月以薤蒸䱉而食凢䱉魚夏岀冬蟄亦以將氣養和實時節也徐表南方草物狀曰白鱓生溪邊土穴中長五尺所大三寸里民刺取細槿二寸苦酒煑食之滋味如黃鱓味交阯九真有之劉敬叔異苑曰盧循以義熙五年自廣州下泊舡江西衆多疲死事平之後人徃蔡州皆死人髪變而爲鱓今上鎮西叅軍與府司馬張逝瞻湖際有一棺棺頭有曹衆試令撥看即是髮亦有未都化者一說云生以潘沭死則髮爲䱉又昔有人食不能無䱉死後改棺䱉滿中又曰㑹稽石亭埭大有空中楓樹毎雨水輙滿溢有啇旅載生䱉聊放一頭着孔中以爲狡獪後村民咸謂是神乃依樹起屋宰牲祭事未甞輟因遂名䱉父廟人有祈請及穢慢禍福立至估客後返見其如此即取作臛於是遂絶太平御覽卷第九百三十七
