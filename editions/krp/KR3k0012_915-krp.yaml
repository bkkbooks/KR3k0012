body:
  text: 羽族部二鳯鸑鷟鶵鵕䴊鳯春秋演孔圖曰鳯火精春秋元命苞曰火離爲鳯禮運曰鳯以爲畜故鳥不獝况必切又曰升中于天而鳯皇降龜龍假又曰四靈爲畜何謂四靈麟鳯龜龍之謂又曰無水旱昆蟲之灾凶飢妭孳之疾故天不愛其道地不愛其寳人不愛其情則鳯凰在郊藪其餘鳥獸卵胎皆可俯而窺也左傳曰陳大夫卜妻敬仲妻占之曰吉鳯皇于飛和鳴鏘鏘有嬀之後將育于姜又曰我髙祖少皡摯之立也鳯鳥適至故紀於鳥爲鳥師而鳥名鳯鳥氏司暦者也杜預注曰鳯知時故以名暦官詩曰鳯皇于飛翽翽其羽亦傅於天鳯皇鳴矣於彼髙崗梧桐生矣于彼朝陽又䟽曰鳯皇一名鸑鷟非梧桐不栖非竹實不食書曰蕭韶九成鳯皇來儀論語曰鳯鳥不至河不出圖吾巳矣夫又曰鳯兮鳯兮何德之衰爾雅曰鶠鳯其雌皇郭璞注瑞應鳥雞頭蛇頸燕領龜背魚彩色髙六尺大戴禮曰羽蟲三百六十而鳯皇爲之長禮斗威儀曰君乗土而王其政太平則鳯集於林菀春秋感精符曰王者上感皇天則鸞鳯至春秋繁露曰恩及羽蟲則鳯皇翔春秋運斗樞曰天樞得鳯皇翔春秋合成圖曰黄帝遊玄扈雒上與大司馬容光等臨觀鳯皇衘圖置帝再拜受圖又曰堯坐舟中與太尉舜臨觀鳯皇負圖授堯圖以赤玉爲柙長三尺廣八寸厚五寸黄玉檢白玉檢白玉繩封兩端其章曰天赤帝符璽五字吕氏春秋曰帝嚳有聖德作樂六英乃令人卞使鳯皇鼓翼而舞又曰黄帝聽鳯皇之鳴以別十二律又曰鷰雀爲鴻鵠鳯皇慮則必弗得矣其所求者瓦孔之間隟屋之翳蔚也韓詩外傳曰黄帝即位施聖仁恩承天明命一道脩德唯仁是行字内和平未見鳯皇乃召天老而問之曰鳯皇何如天老對曰夫鳯象鴻前而麟後虵頸而魚尾龍文而龜身䴏􅟀而鷄喙首戴德頸揭義背負仁心入信翼採義足履正尾繫武小音金大音鼓延頸奮翼五光備舉食有質飲有儀住即文來則喜游必擇所飢不妄下其鳴也雄曰節節雌曰足足昏鳴曰固常晨鳴曰發明晝鳴曰保章舉鳴曰上翔集鳴曰歸昌夫唯鳯爲能究萬物通天地象百物逹乎道律五音成九德覽九州觀八極則有福備文武王下國故得鳯象之一則鳯過之得鳯象之二則鳯翔之得鳯象之三則鳯集之得鳯象之四則鳯春秋下就之得鳯象之五則鳯没身居之黄帝曰於戲允哉朕何敢與焉於是黄帝乃服黄衣帶黃紳戴黄冠齊于中宮鳯乃蔽日而至黄帝降于東階西靣再拜稽首皇天降祉不敢不承命鳯乃止帝東園集梧樹食竹實没身不去尚書考靈曜曰通天文者明於明天道也審地理者昌昌猶盛也盛於万物明者天之時也昌者地之財也明王治鳯皇下之尚書中候曰黄帝時天氣伏通五行期化鳯皇巢阿閣讙樹注曰阿榮名宮中之御門曰閣鳯皇於榮屋徒而出讙鳴於朝廷之樹又曰堯即政七十年鳯皇止庭伯禹拜曰黃帝軒提象鳯皇巢阿閣又曰帝舜云朕惟不乂百獸鳯晨百獸率舞鳯皇司晨鳴也又曰周文王作豐一朝扶老至八十萬户草居陋然歌即曰鳯皇下豐也尚書帝命驗曰舜授終赤鳯來儀尚書大傳曰舜好生惡殺鳯皇巢其樹論語摘襄聖曰鳯有六像九苞一曰頭像天二曰目像日三曰背像月四曰翼像風五曰足像地六曰尾像緯九苞一曰頭符命二曰眼合度三曰耳聦逹四曰舌詘伸五曰色彩光六曰冠短周七曰距銳鈎八曰音激揚九曰腹文户行鳴曰歸嬉上鳴曰提扶夜鳴曰善哉晨鳴曰賀丗飛鳴曰即都知我者唯黄持竹實來故子欲居九夷從鳯嬉宋均注曰緯五緯也度天度數也周當作朱米色好也户所由出入隂陽出入亦閉户善哉應天下興平也賀丗慶賀於時也黄帝中通理者也鳯遇亂則潜居夷狄也孝經援神契曰王者德至鳥獸則鳯皇翔孝經鈎命决曰孝悌之至通於神明則鳯皇巢樂動聲儀曰鎮星不逆行則鳯皇至樂計圖曰五音克諧各得其倫則鳯皇至冠類鷄頭䴏喙虵頸龍形麟翼魚尾五彩不喙生蟲帝王丗紀曰黄帝服齊于中宫坐于玄扈洛上乃有大鳥鷄頭䴏喙龜頸龍形麟翼魚尾其狀如鶴體備五色三文成字首文曰順德背文曰信義膺文曰仁智不食生蟲不履生草或止帝之東園或巢阿閣其飲食也必自歌舞音如簫笙又曰國安其主好文則鳯皇翔史記曰四海之内咸戴舜功興九韶之樂而鳯皇翔天下明德自虞帝始漢書曰昭帝始元三年鳯皇集東海遣使祠其處又曰宣帝幸河東之明年春鳯皇集於所集處得玉寳迺下詔赦天下又曰鳯皇集上林乃作鳯皇殿以荅嘉瑞又曰幸甘泉郊㤗畤改元曰五鳯論衡云宣帝時鳯皇五至又曰本始元年鳯皇集膠東十四年鳯皇集魯群鳥從之詔曰威鳯爲寳鳯皇有威儀也神爵四年鳯皇十一集社稷又曰帝祠后土鸞鳯翶翔又曰五鳯三年鸞鳯又集長樂宮東園樹上飛下至地文章五色留十餘刻吏民並觀之東觀漢記曰光武生於濟陽先是鳯皇集濟陽故宫皆畫鳯皇聖瑞始於此又曰建武十七年鳯皇五髙八九尺毛羽五群采集頴川郡鳥從之盖地數頃留十七日乃去章帝時鳯皇三十九見又曰安帝延光三年鳯皇集濟南臺丞霍穆舎樹上賜帛各有差魏略曰文帝欲受禪郡國奏鳯皇十三見明帝鑄銅鳯皇髙三丈餘置殿前吴暦曰太元元年有鳥集苑中似鴈髙足長尾毛羽五色咸以爲鳯皇改年爲鳯皇元年晉書曰荀朂自中書監遷守尚書令朂乆在中書專管機事及失之甚罔罔悵悵或有賀之者朂曰奪我鳯皇池諸君賀我耶晉陽春秋曰升平四年鳯皇將九子見鄖郷之豐城冬復見衆鳥從焉宋書曰王曇首與兄弟集㑹子孫任其戲適僧逹跳下地作彪子僧䖍累十二博基旣墜落亦不重作僧綽採蠟燭珠爲鳯皇僧逹奪取於懷亦復不惜伯父弘稱其長者又曰王僧䖍子慈少與從弟儉共書謝鳯子超宗甞候僧䖍仍往東齊詣慈正學書未即放筆超宗曰卿書何如䖍乃荅曰慈書比大人猶雞之比鳯又曰謝鳯子超宗有文辭盛得名譽選𥙷新安王子鸞國常侍王母殷淑儀卒超宗作誄奏之帝大嗟賞謂謝莊曰超宗殊有鳯毛時右衛將軍劉道隆在御坐出候超宗曰聞君有異物可見乎超宗曰懸罄之室復有異物耶道隆武人無識正觸其父名曰旦侍宴至尊說君有鳯毛超宗徒跣還内道隆謂檢覔毛至闇待不得乃去又曰元嘉十四年春鳯皇二見干都下衆鳥隨之改其地曰鳯皇里又曰何承天爲著作佐郎年巳老而諸佐郎並名家年少頴川荀伯子嘲之常呼爲妳母承天日卿當云鳯皇生九子妳母何言耶齊書曰江夏王鋒年五歳性方整好學書髙帝使學鳯尾詔一學即工髙帝大恱以玉騏驎賜之曰以騏驎賞鳯尾矣梁書曰武帝𥘉平東昏入于閲武堂是日鳯皇見又曰天監𥘉鳯皇見建康縣同夏里又集南蘭陵崔鴻十六國春秋前秦録曰永興三年九月鳯皇集于東闕民因歌之曰鳯皇于飛其羽翼翼淵哉聖后其齡萬億陸翽鄴中記曰石季龍與皇后在觀上爲詔書五色紙著鳯口中鳯旣衘詔侍人放數百文緋繩轆轤佪轉鳯皇飛下鳯以木作之五色􅃮畫脚皆用金又曰鳯陽門五層樓去地三十丈安金鳯皇二頭石虎將衰一頭飛入漳河㑹晴日見於水中一頭以鐡釘釘足今存二石僞事曰石昆降說鄴中有鳯皇將九鶵在延明門外道西後魏書曰彭城王勰與帝昇金墉顧見堂後桐竹曰鳯皇非梧桐不栖非竹實不食今桐竹並茂詎能降鳯乎勰曰鳯皇應德而來豈桐竹能降帝曰朕亦望降之唐書曰薛收從子元敬選部郎邁之子也亦有文學爲收之亞𥘉大業末薛德音及收元敬俱有才名時人謂之河東三鳯又曰武德九年海州言鳯見于城上群鳥數百隨之東北飛向蒼梧山又曰太宗時莒州言鳯皇二見群鳥隨之其聲若八音之奏又曰太宗甞追思王業艱難佐命之臣乃作威鳯賦以賜長孫無忌其辭曰有一威鳯憇翮朝陽晨遊紫霧夕飲玄霜資長風以舉翰戾天衢而逺翔徐整正暦曰黄帝之時以鳯爲雞莊子曰老子見孔子從弟子五人問曰前爲誰對曰子路勇且多力其次子貢爲智曽子爲孝顔回爲仁子張爲武老子歎曰吾聞南方有鳥名爲鳯所居積石千里天爲生食其樹名瓊枝髙百仞以璆琳瑯玕爲寳天又爲生離珠一人三頭逓起以伺琅玕鳯鳥之文戴聖嬰仁右智左賢文子曰主有積道德天與之地助之神鬼輔之則鳯皇翔其庭也孫卿子曰古之王者其政好生惡殺鳯在列樹又曰鳯鳥啾啾其翼若竿其聲若簫有皇有鳯樂帝之心此聖不蔽福也韓子曰昔者黄帝合鬼神於西大山鳯皇覆上作爲清角淮南子曰鳯皇之翔至德必也過崑崙之䟽圃飲砥柱之涔瀬邅廻濛汜之渚當此之時鴻鵠蒼鶴莫不憚驚伏竄注喙江介又况䴏雀之類乎昔者二皇鳯至於庭二皇宓羲神農三代鳯至於門三折代堯舜禹周室鳯至於澤德弥确所至弥逺德弥精所至弥近抱朴子曰夫木行爲仁爲青鳯頭上青故曰戴仁也金行爲義爲白鳯纓白故曰纓義也火行爲禮爲赤鳯赤故曰負禮也水行爲智爲黒鳯匈黒故曰尚智也土行爲信爲黄鳯足下黄故曰蹈信也古者太平之丗鳯皇常居其國而生乳焉又曰夫麟鳯以形爲別始食鳯卵而鳯去則鳯有種明矣又曰鸞鳯競粒於庭則授辱於鷄䳱也鶡冠子曰鳯火鳥鶉火之禽陽之精也德能致之其精畢至任子曰鳯爲羽族之美麟爲毛類之俊龜龍爲介蟲之長楩楠爲衆材之最是物之貴也山海經曰軒轅之丘鷰鳥自歌鳯鳥自舞皇卵民食之又曰丹穴之山有鳥焉其狀如鶴五采而文名曰鳯鳥首文曰德翼文曰順背文曰義膺文曰仁腹文曰信是鳥也飲食自歌自舞見則天下大安楚辭曰鳬鴈皆唼夫梁藻兮鳯逾翶而髙舉衆鳥皆有所登棲兮鳯獨皇皇而無所集欲衘枚而亡言兮甞君之渥洽驥不驟進而求服兮鳯亦不貪餧而忘食又曰爲鳯皇作鶉籠雖歙翼而不容又曰獨不見鸞鳯之髙翔大皇之野循四極而周囬見盛德而後下宋玉對曰聞鳯鳥上九千里絶雲霓負蒼天呼窈冥之中藩籬之鷃豈能與之料天地之髙哉說文曰鳯神鳥也天老曰鳯像麟前鹿後虵頸魚尾龍文龜背燕頷鷄喙五色備舉出東方君子之國翶翔四海之外過崑崙砥柱濯羽弱水暮宿丹穴見則天下安寜從鳥凢聲也飛則群鳥從以萬數故古鳯作鵰字鷗鳥也其雌皇一曰即鳯皇也鳯者羽蟲之長也漢武内傳曰西王母曰仙之上藥有九色鳯腦次藥有蒙山白鳯之脯白虎通曰鳯皇禽之長上有明王太平乃來西京雜記曰楊雄讀書有語之曰無爲自若苦玄故難傳忽不見雄着太玄經夢吐白鳯皇集其項上而滅楊子法言曰鳯鳥蹌蹌匪堯之庭或問君子在治曰若鳯治則見亂則隱太元經曰鸞鳯不遷甘於竹實騶虞不移於生物醜婦以明鏡爲害無所逃其陋論衡曰瑞指篇鳯皇麒麟爲聖人來即是聖人之禽也桉聖人遊於人間麟鳯亦應與衆鳥同何故逺去中國處於邊外崔贛易林曰神鳥五色鳯凰爲主集於王谷使君得所又曰鳯有十子同巢共母懽以相保又曰鳯生五鶵長于南郭君子康寜恱樂身榮括地圖曰孟虧人首鳥身其先爲虞氏馴百禽夏后之未丗民始食卵孟虧去之鳯凰隨焉止于此山多竹長千仞鳯凰食竹實孟虧食木實去九疑萬八千里十洲記曰鳯麟洲在西海之中四靣有弱水繞之鴻毛不浮不越也上多鳯麟數萬餘群仙家煑鳯喙及麟角合煎作膠名之爲集絃膠或名連金泥能連弓弩斷弦連刀剱斷斫蔡邕琴操曰周成王時天下大治鳯皇來舞於庭成王乃援琴而歌曰鳯皇翔兮於紫庭余何德兮以感靈列仙傳曰簫史教弄玉作鳯鳴居數十年吹簫作鳯聲鳯皇來至其屋爲作鳯臺夫婦止其上一日一夜皆隨鳯皇飛去王子年拾遺記曰周昭王以青鳯之毛爲二裘一曰燠質二曰暄肌常以禦寒至厲王末猶寳此物及厲王流于彘人得而珎之人罪有䧟大辟者以青鳯毛贖罪免死片毛則准千金異苑曰東莞劉穆之字道民素居京口晉隆安中鳯皇集其庭相人韋藪調之曰子必恊賛大猷李彤四部曰吊鳥山俗傳曰鳯死於上歳七月至九月群鳥常來集其上鸑鷟國語曰周之興鸑鷟鳴于歧山說文曰鸑鷟鳯屬神鳥也三輔决録注曰太史令蔡衡云毛色多紫者爲鸑鷟後漢書曰永平中有神雀集宫殿官府冠羽有五采色帝異之以問臨邑侯劉復復不能對薦賈逵博物多識帝乃召見逵問之對曰昔武王終父之業鸑鷟在歧鸑鷟鳯之別名也周大夫内史過對周宣王曰周之興也鸑鷟鳴歧山事見國語宣帝威懷戎狄神雀仍集此胡降之徵也唐書曰張鷟字文成聦警絶倫書無不覽爲兒童時夢紫色大鳥五色成文降于家庭其祖謂之曰五色赤文鳯也紫文鸑鷟也爲鳯之佐兒當以文章瑞於明廷因以爲名字鵷鶵山海經曰南禺之山其鳥鵷鶵莊子曰惠子相梁莊子徃見之惠子恐代其相搜國中三日三夜莊子伏主人馬棧下徃見之曰南方有鳥名鵷鶵南海而飛之北海非梧桐不栖非竹實不食非醴泉不飲於是鴟得腐䑕鵷鶵過仰而視之曰嚇子欲以梁國嚇我耶鵕䴊倉頡解詁曰鵕䴊神鳥飛竟天漢以爲侍中冠雜字解詁曰鵕䴊似鳯凰史記曰孝惠郎中皆冠鵕䴊南越志曰曽城縣多鵕䴊鵕䴊山鷄也利距善闘光色鮮明五色炫燿楚辭曰曵彗星之皓肝兮撫朱雀與鵕䴊朱雀鵕䴊神俊之鳥也動以神物自喻當差鵕䴊飛能冲天司馬相如子虚賦曰掩翡翠射鵕䴊太平御覽卷第九百一十五
