front:
  text: 太平御覽卷第七百八十八四夷部九南蠻四
  hash: sha256:ec7e82cd0da4002a930cee5544b1456d321a3f5f136f26f102cb2845c7fed260
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_788-1a}
body:
  text: 頓遜國毗騫國丹丹國東謝西趙蠻南平蠻羅刹國投和國附國邊斗四國殊奈國甘棠國金利毗逝國墮和羅國陁洹國墮婆登國多篾國多摩國哥羅舎分國杜薄國烏篤國薄㓨國頓遜國南史曰頓遜國在海﨑上崎音析曲岸也地方千里城去海十里有五王並羈属扶南頓遜人東界通交州諸賈人其西界接天笁安息徼外諸國徃還交易其市東西交㑹日有萬餘人珎物寳貨無所不有唐書曰頓遜國出霍香挿枝便生葉如都梁以裛衣國有區撥等花十餘種冬夏不衰日載十車貨之其花燥更芬馥亦末爲粉以傳身焉南州異物志曰典遜在扶南三千餘里本爲別國扶南先王范蔓有勇略討服之今属扶南笁芝扶南記曰頓遜國属扶南國主名崑崙國有天笁胡五百家兩佛圖天笁婆羅門千餘人頓遜敬奉其道嫁女與之故多不去唯讀天神經以香花自洗精進不捨晝夜疾困便發願鳥葬歌舞送之邑外有鳥啄食餘骨作灰甖盛沉海鳥若不食乃藍盛火葬者投火餘灰凾盛埋之祭祠無年限又酒樹有似安石榴取花與汁停甕中數日乃成酒羙而醉人毗騫國南史曰毗騫國俗有室屋衣服噉粳米其人言語小異扶南國内不受賈客有徃者殺而噉之是以啇旅不敢至王常樓居不血食不事鬼神其子孫生死如常人唯王不死扶南王數使與書相報荅常遺扶南王純金五十人食器形如圎盤又如瓦塸名爲多羅受五升又如椀者受一升竺芝扶南史紀曰毗騫國去扶南八千里在海中國王身長三丈頸長三尺自古以來不死知神聖未然之事亦有子孫子孫生死如常人唯此王不死耳号曰長頸王食器皆純金金如此間之石無央限也不聽妄取有偷者知則殺食之長頸王亦能作天竺書自道宿命所經與佛語相似作書可三千言皆道是事其國法有罪者共在王前食之平常不噉人也丹丹國梁書曰丹丹國中大通二年其王遣使奉表送象牙及畫塔二軀并献火齊珠古貝雜香藥大同元年復遣使献金銀琉璃雜寳香藥等物隋書曰丹丹國在多羅摩羅國西北振州東南振州今廷德郡朱雀同島上王姓刹利名尸陵伽理所可二萬餘家亦置州縣以相統領王每晨夕二時臨朝其大臣八人号曰八座並以婆畢朝其之王毎以香粉塗身冠通天冠掛雜宝瓔珞身衣朝霞足履皮屨近則乗輿逺則馭象其攻伐則吹蠡擊皷兼有幡旗其刑盗賊無多少皆殺之土出金銀白檀蘇方㯽榔其榖唯稻畜有沙牛羖羊猪雞鵝鴨麞鹿鳥有越鳥孔雀果蓏力果切有蒲桃石榴瓜瓠菱蓮菜有䓤䔉蔓菁東謝唐書曰東謝蠻其地在黔州之西數百里内南接守宫獠西連夷子北至白蠻土冝五糓不以牛耕但爲畬田毎歳一易俗無文字刻木爲契散在山洞間依樹爲層巢而居汲流以飲皆自營生業無賦稅之事謁見貴人皆執鞭而拜有功勞者以牛馬銅皷賞之有犯罪者小事杖罰大事殺之盗物倍還其贓婚姻之禮以牛酒爲娉女歸夫家皆母自送之女夫慙逃避經旬乃岀讌聚則擊銅皷吹大角歌舞以爲樂好帶刀劒未常捨離丈夫衣服有衫襖大口袴以綿紬及布爲之右肩上斜束皮帶裝以螺蚾虎豹猿狖及犬羊之皮以爲外飾坐皆蹲踞男女椎髻以緋向後垂下其首領謝元深旣丗爲酋長其部落皆尊畏之謝氏一族法不育女自云姓髙不可下嫁故也貞觀三年元深入朝冠烏熊皮冠若今之旄頭以金銀絡額身披毛帔韋皮行滕而著履中書侍郎顔師古奏言昔周武時天下太平逺國歸欵周史乃集其事爲王㑹篇令萬國來朝至今如此輩章服實可圖冩今請撰爲正㑹圖從之以其地爲應州仍拜元深爲刺史隷黔州都督府又曰南謝首領謝強與西謝隣共元深俱來朝見爲南壽州刺史後改爲莊州貞觀十三年正月西南畨大酋長蠻州刺史資陽郡開國公宋鼎卭州刺史謝汕音訕蠻州巴江縣令宋万傳牂州録事叅軍謝文經黔中經略招討觀察使王礎奏前件刺史三年一度朝今年懇訴稱州接牂牁同𬒳聲教獨此排擯竊自慙恥謹遣隨牂牁刺史授官其牂牁兩州户口殷盛人力強大隣側諸蕃悉皆敬憚請比兩州每三年一度朝賀仍依牂牁輪環差定并以才幹位望爲衆推者元勑從之西趙蠻唐書曰西趙蠻在東謝之南其界東至夷子西至昆明南至西洱河洱音珥山洞阻深莫知道里南北十八日行東西二十三日行其風俗物産與東謝同首領趙氏丗爲酋長有户萬餘貞觀三年遣使入朝二十一年以其地置明州即以首領趙磨爲刺史南平蠻唐書曰南平蠻北與涪州接部落四千餘户男子左祍露髪徒跣婦人横布兩幅穿中而貫其首名爲通裙其人美髪爲髻髾垂於後以竹筒如筆長三四寸斜貫其耳貴者亦有珠璫土多女少男爲婚之法女氏必先貨求男族貧人無嫁資女多賣與冨人爲婢俗皆婦人執役其王姓朱氏号爲劒荔王貞觀中遣使内附以其地隷渝州羅刹國隋書曰羅刹國在婆利之東其人極陋朱髪黒身獸牙鷹爪時與邑人作市輙以夜晝日則掩其靣煬帝大業三年使常駿等使赤土國致羅刹國投和國隋書曰投和國在南海大洲真獵之南自廣州西南水行百里至其國王姓投和羅名脯邪乞遥理所城覆屋以瓦並爲閣而居屋壁皆以彩畫之城内皆王室城外人居可萬餘家王宿衛之士百餘人毎臨朝則衣朝霞冠金耳挂金環頸挂金涎衣叙連切足履寳裝皮履官属有朝請將軍惣知國政又有叅軍功曹主簿城局金威將軍賛理賛府等官分理文武又有州及郡縣州有叅軍郡有金威將軍縣有城局爲其長官𥘉至各選官僚助理政事刑法賊盗多死者輕者穿耳及頰私鑄銀錢者截腕國無賦稅俱隨意貢奉無多少之限多以農商爲業國人乗象及馬一國之中馬不過千疋又無鞍轡唯以繩穿頰爲之節制音樂則吹蠡擊皷死䘮則祠祀哭泣又焚屍以甖盛之沉於水中若父母之䘮則截髮爲孝其國市六所貿易皆用銀錢小如榆莢有佛道有學校文字與中夏不同訊其耆老云王無姓名齊杖靡王所坐塔圎以佛塔以金飾之門皆東開坐亦東向唐書曰貞觀中投和國遣使奉表以金凾盛之又献金榼苦盍反金鎻寳帶犀象海物等數十品附國隋書曰附國者蜀郡西北二千餘里即漢之南夷也有嘉良夷即其東部所居種姓自相率領土俗與附國同言語少殊不相統一其人無姓氏附國王字冝繒其國南北八百里西千五百里無城柵近川谷傍山險俗好復讎故疊石而居以避其患髙至十餘丈下至五六丈每級丈餘以木隔之基方三四歩其上方二三歩狀似浮圖於下級開小門從内上通夜必關閉以防賊盗國有二萬家号令自王岀嘉良夷政令擊之酋師重罪者死輕者罰牛人皆輕捷便擊劒􅃮皮爲牟甲弓長六尺以竹爲弦妻其群母及其㛐兒弟死父兄亦納其妻好歌舞皷吹長笛有死者無服制置屍髙牀之上沐浴衣服𬒳以牟甲覆以獸皮子孫不哭帶甲舞劒而呼云我父爲鬼所取我欲報冤殺鬼自餘親戚哭三聲而止婦人哭必以兩手掩面死家殺牛親属以猪酒相遺共飲噉而瘞之死後十曰而大葬必集親賔殺馬動至數十疋立其祖父神而事之其俗以皮爲帽形圎如鉢或戴羃䍦衣多毛毼皮裘爲靴頂繫䥫鎻手貫䥫釧王與酋師金爲飾胷前懸一金花徑三寸其土髙氣候凉多風少雨土冝小麥青科山岀銀銀多白雉水有嘉魚長四尺而鮮細大業四年其王遣使素福等八人入朝明年又遣其弟子冝林率嘉良夷六十人朝貢欲献良馬以路險不通請開山道脩職貢煬帝以勞人不許嘉良有水闊六七十丈附國有水闊百餘丈並南流用皮爲舟而濟邊斗四國隋書曰邊斗國一云班斗都昆國一作都雅拘利國一作九雅比嵩國並扶南度金隣大灣南行三千里有此國其農作與金隣同其人多白色都昆出好棧香藿香及硫黃其藿香樹生千歳根本甚大伐之四五年木皆朽敗唯中節堅貞芬香獨存取爲香殊奈國唐書曰貞觀二年殊奈國遣使貢方物殊奈者崑崙人也在林邑南去交阯海行三月餘日俗習文字與婆羅門同路絶逺古未常朝中國至是始通甘堂國唐書曰甘堂國在大海之南崑崙人也貞觀十年與未俱婆國同日朝貢太宗謂侍臣曰南荒西城自逺而至其故何也房玄齡對曰當中國人安帝德逺𬒳也太宗曰誠如公言向使中國不安何縁至朕何德以堪之金利毗逝國唐書曰金利毗逝國在京西南四萬餘里東去致物國二千里西去赤土國一千五百里南去波利國三千里柳衢國三千里其國有城邑庭舎衣朝霞白疊毎食先泥上鋪席而後座國王名本多楊牙前有隊伩甲鍪貝多樹皮及其風俗物産與真臘同墮和羅國唐書曰墮和羅國南與盤盤國北與迦邏舎佛東與真臘接西隣大海去髙州五月日行貞觀十三年其王遣使貢方物二十三年又遣使献象牙火珠請賜好馬詔許之陁洹國唐書曰陁洹國在林邑西南大海中東南與墮和羅接去交阯三月餘行賔服於墮和羅其王姓察失利字婆郍土無蠶桑以白疊朝霞布爲衣俗皆樓居謂爲千欄貞觀十八年遣使來朝二十一年又遣使獻白鸚鵡毛羽皓素頭上有紅毛數十莖與翅齊及婆律膏仍請馬及銅鍾詔並給之墮婆登國唐書曰墮婆登國在林邑南海行二月東與訶陵西與迷黎車接北界大海風俗與訶陵同種稻毎月一熟有文字書於貝多葉其死者口實以金又以金釧貫於四支然後加以婆律膏及檀沉龍腦等香積薪以燔之貞觀中遣使獻金花等物王之所居堅木爲城造大屋重閣覆以㯶櫚皮所坐床悉以象牙爲之亦以象牙爲席食以手檈之音古患反又以椰樹花爲酒飲之亦醉有山穴海湧而出鹽國人取食其國人有毒與常人同止宿即令身生瘡與之交㑹便死若涎液霑著草木即枯其人身死不臭不爛多蔑國唐書曰多蔑國貞觀時通焉在南海外國界周廻可一月行南阻大海西俱遊國北波利利刺國東真陁桓國户口極多置三十州不役属他國有州郭宫殿樓櫓並用瓦木以十二月爲歳其物産有金銀銅鐵象牙犀角朝霞朝雲等布其俗交易用金銀朝霞等爲賈百姓二十而稅一五榖菜𬞞與中國不殊多摩國唐書曰多摩國長居國長居於海島東與婆鳯西與多隆南與半反䟦華言五山也北與訶陵等國接其國界東西可一月行南北可二十五日行其王子先龍子也名骨利骨利得大鳥卵剖之得一女子容色殊妙即以爲妻其王尸羅劬傭伊說即其後也顯慶中遣使貢獻其俗無姓王居以稱爲城以板爲屋坐師子座東向衣物與林邑同勝兵二萬人無馬有弓刀甲矟婚姻無同姓之别其食器銅鐡金銀所食尚酥乳駱沙糖石蜜其家畜有羖水牛野獸有麞鹿等死亡無䘮紀之制以火焚其屍其音樂略同天竺有波郍婆宅護遮奄磨石榴等菓多甘蔗從其國經薛盧都思訶盧林邑等國逹於交州哥羅舎分國唐書曰哥羅舎分國在南海之南接墮和羅勝兵二萬人其王蒲越伽摩顯慶五年遣使朝貢杜薄國唐書曰杜薄國在扶南東漲海中直渡海數十日至其人色白晢皆有衣服國有稻田女子作白疊華布出金銀䥫以金爲錢出雞舌香可含以香不入服雞舌其爲水也氣辛而性厲禽獸不能至故未可識其樹者華熟自零隨水而出方得之杜薄洲有十餘國城皆稱王烏篤國唐書曰烏篤國在中天竺南一名烏伏郍地方五千餘里百姓殷實人性愞弱頗詭詐尤工禁術篤信佛法文字禮儀略同天笁自古不通中國貞觀中其王逹摩因陁訶斯遣使献龍腦麝香等薄刺洲唐書曰薄刺洲隋時聞焉在拘利南海灣中其人色黒而齒白眼正赤男女並無衣服一名勃焚洲抱朴子云勃焚洲在薫縁水膠所出楓脂矣所以不可多得者正患狤握獸啖人狤音詰偓音屋此獸大者重十斤狀如水獺其頭身及他處了無毛唯從鼻上以竟脊至尾上有毛廣一寸許青長三四分許其無毛處則如韋囊人張捕得之斬刺不傷積薪烈火縛以投火中薪盡而此獸不焦湏
