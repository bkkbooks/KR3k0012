front:
  text: 太平御覽卷第四百一十六
  hash: sha256:3e9d6c956f6d2175b16d8b7e9516685600576345e1150fb8368d9a795b3996e9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_416-1a}
body:
  text: 人事部五十七友悌周禮大司徒曰六行孝友睦姻任恤禮記曲禮曰親戚稱其慈也寮友稱其悌也又禮運曰兄良弟悌夫義婦聽家之肥也又檀弓上曰子路有姉之喪可以除之矣而弗除也孔子曰何弗除也曰吾寡兄弟而弗忍也孔子曰行道之人皆弗忍也子路聞之遂除之春秋左傳曰君義臣行父慈子孝兄友弟敬所謂六順毛詩葛屨陟岵曰陟彼崗兮聸望兄兮兄曰嗟予弟行役夙夜必偕偕俱也又鹿鳴棠棣曰棠棣燕兄弟也閔管蔡之失道故作棠棣焉周公吊二叔之不咸而使兄弟恩䟽召公爲作此詩而歌以親之也棠棣之華蕚不韡韡箋云承華曰蕚不當作拊拊蕚足得華之光明其貌韡韡然盛也興者喻弟以敬事兄兄以榮覆弟恩義之敬亦韡韡然也凢今之人莫如兄弟又邶栢舟二子乗舟曰二子乗舟思伋壽也衛宣公之二子爭相爲死國人傷而思之而作是詩也二子乗舟汎汎其景二子伋壽也宣公爲伋娶於齊女而美公奪之而生壽及朔朔與其母訴伋於公公全伋之齊使賊先待於隘而殺之壽竊其節而先徃賊殺之伋至曰君命殺我彼何罪焉又殺之國人傷其渉危遂徃如乗舟而無所薄也又曰惟此王季因心則友則友其兄則篤其慶尚書君陳曰惟孝友于兄弟克施有政論語曰孝悌也者其爲仁之夲與又曰孝乎惟孝友于兄弟又曰兄弟怡怡如也爾雅曰善兄弟爲友漢書曰卜式河南人也以田畜爲事有少弟式脫身出獨取羊百餘口田宅財物盡與弟式入山牧十餘年羊致千餘頭買田宅而弟盡破其産式輙復分與之又曰王啇字子威涿郡蠡吾人也啇爲太子中庶子以肅敬敦厚稱父薨啇嗣爲侯惟財以分異母諸弟身無所受東觀漢記曰魯恭字仲康扶風人恭憐弟丕小欲先就其名託疾不仕郡數以禮請謝不肯應母強遣之恭不得巳而西因留新豊教授丕舉方正恭乃始爲郡吏又曰汝南王琳字巨尉弟季出遇赤眉將爲所捕琳請自縳先季死賊憐而放遣之又曰趙孝字長平建武榖食尚少孝得榖炊將熟令弟禮夫妻出比還孝夫妻共𬞞食禮夫妻歸告言巳食輙獨飲之積乆禮心恠之疑後掩伺見之不肯食出遂共𬞞食兄弟怡怡郷里歸德又曰孔奮篤於骨肉弟竒在雒陽爲諸生分禄奉以供給其糧用四時送衣下至脂燭每有所食甘美輙分减以遺竒謝承後漢書曰許荆兄子常報讎殺人怨家㑹衆操兵至荆家欲殺之㑹荆始從府休歸與相遇因岀門解劒長跪曰前無狀相犯咎皆在荆不能相教兄旣早沒一子爲嗣如令死者傷其㓕絶今願殺身代之塞咎雖死巳徃猶謂更生怨家扶起荆曰許掾郡中稱爲賢吾何敢相侵因遂委去又曰李鴻字奉遜禮性仁孝友于兄弟弟育爲人所侵辱育後隂結客報怨爲執法吏所得當伏罪時未有立嗣鴻爲太尉掾在京師傷育以養刷恥門户斷絶因分代育遂刻印還㱕欲過家恐見妻子虧移其意到縣北亭預作記乞代育通記便飲酖而之縣令省記怛然驚感矣司馬彪續漢書曰山陽張儉以忠正爲中常侍侯覽所忿疾覽爲刑章下州郡召捕儉儉與孔融兄褒有舊亡投遇褒岀時融年十五六少之不下告也融知儉長者有窘迫色謂曰吾獨不能爲君主乎因留舎藏之後以人客發洩斍知國相巳下密就掩儉得脫走登時收融及褒送獄融曰保納藏舎者融也融當坐之褒曰彼來投我罪我之由非弟之過我當坐之兄弟爭死郡縣疑不能決乃上讞詔書令褒坐焉融由是著名范曄後漢書曰姜肱字伯淮彭城廣戚人也家丗名族肱與二弟仲海季江俱以孝行著聞其友愛天性常共卧起及各娶妻兄弟相恋不能別寢以継嗣當立乃逓徃就室又曰鍾皓字季明潁川長社人少以篤行稱公府連辟爲二兄未仕避隠宻山王隱晉書曰徐苗字叔胄髙宻淳于人弟亡臨殯口中有癰潰膿血苗含去之晉中興書曰顔含字弘都瑯瑘人含次㛐繁氏老而失明含奉養必束帶躬親甞省㛐病困湏得蚺虵膽爲藥而求不能得平晝獨坐有一童子持一青囊授含含開視虵膽也童子逡廵出户化成青鴻飛去得膽藥成嫂病即愈又曰鄧攸字伯道爲石勒叅軍勒過泗水攸與郷人河東陳嘏平陽馬恬共謀叛勒破車以牛馬負妻子入草中又遇賊掠牛馬去攸語妻曰吾弟早亡唯有一息今當歩走誓兩兒恐盡死不如棄我兒抱弟子遺民婦乃從之崔鴻十六國春秋前趙録曰上郡王雋字玄英有幹藝之稱儁年七八歳隨兄宻子元直西如涼州路中糧匱宻留元直於途乞丐民間比還儁爲賊所掠元直逃免宻乃將元直追賊叩頭求哀曰人情自當皆愛其子但此弟未生家君見背孤遺相長以至于今請以元直易儁賊相謂曰以子易弟義之大也於是以儁密受元直而去宻後亡儁勺飲不入口者五日雖服喪朞年而心喪六載又前燕録曰有司奏中山浦隂民劉洛縣差充征弟興私代背軍逃㱕州以夲名捕斬興詣郡列稱逃是興身請求代洛死洛又曰固陳巳實正名冝從憲辟兄弟爭命詳刑有疑暐曰洛應征輙留興冒名逃役俱應極法但兄弟競死義情可嘉冝特原之南燕録曰有司奏沙門僧知夜入臨淄人冷平舎淫其寡嫂李氏平與弟安國殺之郡縣桉平兄弟以殺人論而平安國各引手殺譲生競死義形急難後秦録曰姚㐮與李雄戰馬中流矢死弟萇下馬以授襄曰汝可以免萇曰兄濟此竪子安敢害萇㑹救至俱免後魏書曰房景先沉敏方正事兄恭謹出告反面晨昏叅省側立移時兄亦危坐相敬如賔客兄曽寢疾景先侍湯藥衣冠不解形容毁瘁親友者莫不哀之後周書曰裴寛字長寛弱冠爲州里所稱與二弟漢尼並知名親沒撫諸弟以篤孝聞榮陽鄭穆甞謂其從弟文直曰裴長寛兄弟天倫篤睦人之師表吾愛之重之汝可與之遊處梁書曰張弘榮兄弟友愛不忍蹔離雖各有室常同卧起丗比之姜肱兄弟唐書曰張嘉貞爲并州長史開元𥘉因奏事至京師上聞其善政數賞慰嘉貞因奏曰臣少孤兄弟相依以至今日臣弟嘉祐今授鄯州別駕與臣各在一方同心離居魂絶萬里乞移就臣側近臣兄弟盡力報國死無所恨上嘉其友愛特改嘉祐爲忻州刺史又曰東都未平梁宋間群盗連聚或至二千餘衆攻䧟城邑李瀾守蘄縣力屈爲盗所執將害之瀾弟渤詣盗請代兄死瀾又請殺身留弟兄弟争死俱爲盗所害又曰社佑子式方性孝友弟兄尤睦季弟從郁少多疾病式方躬自煎調藥膳水飲非經式方之手不入於口及從郁夭䘮終年號泣殆不勝情士友多之又曰白居易弟行簡字知退文筆有兄風詞賦尤稱精宻文士皆師法之居易友愛過人兄弟相待如賔客行簡子龜皃多自教習以至成名當時友悌無以比焉蕭廣濟孝子傳曰陳玄字子元陳侯太子七歳䘮母父更娶周氏有子曰昭周氏䜛玄侯將殺玄昭欲先死玄不聽引白羊誓曰孝者羊血逆上一丈三尺一如誓後又䜛之侯恕令玄自殺玄投遼水有大魚負之玄曰我罪人也魚乃去昭從後來問漁者云投水死矣昭氣絶良乆曰吾兄也又投水而死周景式孝子傳曰古有兄弟忽欲分異出門見三荆同株接葉連隂歎曰木猶欲聚況我兄弟而欲殊哉遂還相爲雍和矣宋躬孝子傳曰孫棘彭城人事母至孝母臨亡以小兒薩属棘特深友愛宋大明五年上募軍仵薩求代棘及後軍期應死棘薩爭死妻許氏又遥属棘曰君當門户豈可委罪小郎且大家臨終以小郎属君竟未有妻息君巳二兒死復何恨太守張岱表聞詔牓門宋世祖感其悌友乃普増諸弟封秩列女傳曰㑹稽石師安妻者同郡吕氏之女也名軍其兄遂犯法軍匿之知不能免乃請智者爲辭乞代兄遂之命因自經縣門縣官嘉有義乃捨遂罪又曰齊義繼母者齊二子之母也當宣王時有人闘死道者吏侯之二子立其傍吏問之兄曰我殺之弟曰非兄乃我殺之朞年不決言於相相不能決言於王王曰若皆赦之是縱有罪若皆殺之是誅無辜其母必知子之情善惡聽其所殺活相召而問之其母泣而對殺少子相曰小子人所愛今所殺之何也對曰少者妾之子長者前妻之子相言之於王王美其義皆赦其子又曰郃陽友娣者郃陽邑任延壽之妻也字季兒有三子季兒兄季宗與延壽争事延壽與其友田建隂殺季宗建獨坐死延壽㑹赦乃以告季兒季兒曰嘻殺夫不義事兄之讎亦不義何面目以生季兒乃告大女曰汝父殺吾兄義不可以留又終不嫁矣吾去而死善視汝弟遂自經死海内先賢傳曰范舟字史雲清髙亮直讓財千萬與三弟㑹稽先賢傳曰陳業字文理業兄渡海傾命同時依止者五六十人骨肉消爛而不可記別業仰皇天誓后土曰聞親戚者必有異焉因割臂流血以灑骨應時飲血餘皆流去汝南先賢傳曰繆彤字豫公郃陽人兄弟四人各求分異至有争訟之言彤黙閇戸自撻大自罵曰繆彤汝修身謹行將齊正風俗如何近一家之中不能使之和恊耶鞭兩髀皆瘡於是諸姉及弟叩頭自責不復分矣張瑩漢南記曰隂慶爲鮦陽侯其弟貟及丹皆爲郎慶以明尚書修儒術推居弟園田奴婢錢悉分與貟丹慶但佩印綬而巳當代稱之陳壽益部耆舊傳曰李孟元修昜論語大義略舉質性恭順與叔子就同居就有痼疾孟元推所有田園悉以讓就夫婦紡績以自供給江微陳留志曰李銓平丘人也少聦慧有至行銓兄前母子後母甚不愛也而衣食皆使下銓銓始年五歳覺巳衣服勝兄即脫不着湏兄得已同然後服之其母遂不得有偏及長銓内匡順母外奉其兄故閨門雍睦爲群族所稱杜預汝南記曰李充兄弟六人貧無擔石之儲昜衣而出并日而食而妻竊謂充曰今貧如是我有私財可分異獨居人多費極無爲空自窮也充請呼諸隣里室家相對前跪觴告其母便頋其妻叱而遣之婦行泣出門去顔延之庭誥曰將責弟悌務念爲友太平御覽卷第四百一十六
