front:
  text: 太平御覽卷第四百八十人事部一百二十一
  hash: sha256:e3562603a7ef259ad78b5ba3db7756f65620175ae1c0696a7c8a0c98d84b560a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_480-1a}
body:
  text: 盟誓質盟誓說文曰誓約束也尚書甘誓曰大戰于甘乃召六卿王曰嗟六事之人予誓告汝有扈氏威侮五行怠棄三正天用勦絶其命今予惟龔行天之罰左弗攻于左汝弗龔命左軍左之主射攻治之其職也右弗攻于右汝弗龔命衘非其馬之正汝弗龔命三者有失皆不奉我命也用命賞于祖弗用命戮于社天子親又載社主謂之社土不用命則戮于社也予則孥戮汝又㤗誓王曰王乃徇師而誓曰嗚呼西土有衆咸聽朕言予有亂臣十人同心同德雖有周親不如仁人周禮司盟曰掌盟載之法載盟辭也凢邦有疑㑹同則掌其盟約之載及其禮儀北靣詔明神旣盟則貳之貳之者冩副當之授六官之也􅉀萬民之犯命者詛其不信者亦如之左傳曰陳五父如鄭蒞盟㰱如忘薛伯曰五父必不免不頼盟矣又曰莊公許孟任以爲夫人割臂以盟又曰子犯以壁授公子曰臣負羈紲從君廵於天下臣之罪多矣請由此亡公子曰所不與舅氏同心者有如白水子犯重耳舅氏言與舅氏同心之􅉀如此白水也投其璧於河又曰王子虎盟諸侯于王庭要言曰皆奬王室無相害也有渝此盟明神殛之俾墜其師無克祚國又曰寗武子與衛人盟于宛濮曰天禍衛國君臣不恊以及此憂今天誘其衷使皆降心以相從也不有居者誰守社稷不有行者誰扞牧圉有渝此盟以相及者明神先君是糾是殛國人聞此盟也而後不貳又曰楚師將去宋申犀稽首於王之馬前曰無畏知死而不敢廢王命王棄言焉王不能荅申叔僕曰築室反耕者宋必命從人宋之懼使華元夜入楚師登子反之牀而起之曰寡君使元以病告曰弊邑易子而食折骸以爨雖然城下之盟有以國弊不能從也去我三十里唯命是聽子反懼與之􅉀而告王退三十里宋及楚平華元爲質盟曰我無爾詐爾無我虞楚不詐宋宋不備楚也又曰晉士爕㑹楚公子罷許偃盟于宋西門之外曰凢晉楚無相加戎好惡同之同恤災危備救凶患交贄往來道路無壅謀其不恊而討不庭也又曰秋七月盟于毫范宣子曰不愼必失諸侯乃盟載曰凢我同盟無藴年藴積年榖而不分定無壅利無姦保藏罪人也無留慝救災患恤禍亂同好惡奬王室也又曰鄭大夫􅉀于伯有氏禆諶曰是盟也其與㡬何言其不能乆也禆諶鄭大夫也詩曰君子屢盟亂是用長又曰小邾射以句繹來奔曰使季路要我吾無盟矣以子路信誠故得與相要誓而不湏盟也子路即季路使子路子路辭季康子使冉有謂之曰千乘之國不信其盟而信子之言子何辱焉公羊傳曰莊公㑹齊侯盟于柯曹子進曰君之意何如莊公曰寡人之生則不若死曹子曰然則君請當其君臣請當其臣莊公曰諾於是㑹桓公莊公升壇曹子手劒而從之管子進曰君何求曹子曰城壞厭境齊数侵取魯邑以喻侵近君不圖歟願請汶陽之田管仲顧曰君其許諾桓公曰諾巳盟曹子􅋆劒而去之要盟可犯而桓公不欺曹氏可讎而桓公不怨桓公之信著乎天下自柯之盟始也糓梁傳僖公曰葵丘之盟陳牲而不殺牘書加於牲上曰母㰌水母訖糴訖止母以妾爲妻使婦人與國事又成公曰溴梁之㑹諸侯失政諸侯㑹而曰大夫盟政在大夫也諸侯在而不曰諸侯之大夫大夫不臣也三禮圖曰方􅉀木方四尺設六色東青西白南赤北黒上玄下黄設六玉上圭下璧南方璋西方琥北方璜東方圭方􅉀者上下四方之神明天之司􅉀史記曰呉起東岀衛郭門與其母別齧指而盟起不爲卿相不復入衛也又曰秦之圍邯鄲趙使平原君求救於楚門下有毛遂者前自賛於平原君曰遂願備貟而行平原君曰夫賢士之處丗也若錐處囊中其末立見今先生處勝之門下三年於此矣左右未有所稱遂曰臣乃今日請處囊中尔使早處囊必頴脫而出非特其末見而巳平原君與楚合從言其利害日出而言日中不决遂按劒而前曰從之利害兩言而决耳今日出而言日中不决何也楚王叱曰胡不下遂按劒而前曰今十歩之中王不得恃楚國之衆王之命懸於遂今楚地五千里持㦸百萬此覇王資白起小竪子耳率數百萬之衆一戰而舉鄢郢再戰而燒夷陵三戰而辱王之先人此百丗之怨也楚王曰謹奉社稷以從遂奉銅盤北靣跪進之定於殿上遂招堂下十九人曰公等碌碌因人成事者也漢書曰王陵爲右丞相惠帝崩髙后欲立諸吕爲王問陵陵曰髙皇帝刑白馬而盟曰非劉氏而王者天下共擊之今王諸吕非約也東觀漢記曰隗囂字季孟天水人也以王莽簒逆復漢之祚乃立髙祖太宗之廟稱臣執事史奉壁而告祝畢有司穿坎於庭割牲而盟魏志曰臧洪字子原廣陵射陽人也張邈起兵請洪與計事又致之於劉兖州公山孔豫州公緒乃設壇場方共盟誓諸州郡相讓乃共推洪洪乃升壇操盤血而盟晉中興書曰符洪第三子徤隂圖關中陽使其徒種麥示無西意有微知其計不肯耕種者徤殺之後十餘日師衆西行到孟津作浮橋渡河使弟雄歩騎五千人入潼關兄子青軹關入河東誓曰若事不捷汝死河北我死河南爲鬼無相見也王義之爲㑹稽内史慨然稱疾去郡於父母墓前自誓曰維永和十一年二月九日小子羲之敢昭告尊靈義之不天夙遭閔凶不遂過庭之訓母兄鞠育得漸庻幾遂因人之力蒙國寵榮進無忠孝之節退違聖賢量力之義將憂及宗祀豈在微身是用寤寐永嘆若墜淵谷羲之旣去官與東士人士盡山水之遊弋釣爲娯與道士許玄度共脩服食採求藥石不逺千里朝廷以其誓苦亦不徴又曰祖逖說中宗以掃平中原於是以逖爲前鋒都督奮威將軍豫州刺史給布三千疋逖乃逕北渡江中流誓曰祖逖不清中原而復濟者如此江蕭子顯齊書曰王敬則爲曁陽令縣有一部刼逃柴山中爲民患敬則遣人致意刼師悉可出首當先申論治下廟神甚酷烈百姓畏之敬則引神爲誓必不相負刼師旣出敬則於廟中設酒㑹於坐収縛之曰吾先啓神若負誓還神十牛今不得違誓即殺十牛併斬諸賊百姓恱之漢書春秋曰梁皇后崩桓帝獨呼小黄門唐衡至北户如厠問左右梁兾不相得者皆誰衡對曰單起左悺前詣河南尹不疑禮敬小簡不疑収其兄弟送雒陽獄於是帝與入室定謀齧起臂岀血以爲􅉀乃誅梁兾髙士傳曰胡昭𥘉晉宣帝爲布衣時與昭有舊昭同郡周士等謀害帝昭聞而歩險邀士於濟澠之間止士士不肯昭泣以示誠士感義乃止昭斫棗樹共士盟而別昭雖有隂德於帝口終不言時人莫知華陽國志曰昭王時有一虎傷害千餘人昭王乃募有能殺虎者賞時巴夷廖仲作白竹之弩乃射殺虎昭王刻石盟要曰秦犯夷輸黄龍一雙夷犯秦輸清酒一鍾夷人安之晏子春秋曰崔杼殺莊公盟於國者㦸鈎其頸劒承其心晏子不與􅉀而出上車其僕將馳晏子撫其手曰鹿生於山命懸於厨命有所懸矣成節而去黄庭經曰黄庭爲不死之道受者齋九日或七日或三日然後授之者爲師受者奉焉結盟立誓期以勿泄古者􅉀用玄雲之錦九十尺金簡鳯文之羅四十尺竹林七賢論曰劉伶常病酒渇求酒於其妻妻捐酒毀器泣而諌曰君酒過非攝生之道也必冝断之伶曰善吾不能自禁唯酒當禮鬼神自誓以断之耳便可具酒肉妻敬聞命供酒肉於前請伶祝誓伶跪而祝曰天生劉伶以酒爲名一飲一斛五斗解酲婦人之言愼不可聽仍引酒御肉隗然而巳復醉矣孫卿子曰盟詛不及五帝誓誥不及三王交質不及五伯榖梁二傳交質不及二伯淮南子曰胡人彈骨胡人之􅉀約置酒人頭骨中飲以相咀也越人㓶臂中國唼盟所由名異其於信一也質左傳曰鄭武公莊公爲平王卿士賈逵曰卿士也有事者六卿也王貳于􅉑鄭伯怨王王曰無之故周鄭交質王子狐爲質於鄭鄭公子忽爲質於周王子狐周平王之子鄭子忽鄭莊公太子忽也王崩周人將卑􅉑公政夏鄭祭仲帥師取温之麥温周地也蘇氏邑也秋又取成周之禾周鄭交惡君子曰信不由中質無益也又曰楚子圍鄭旬有七日鄭人卜行成不吉卜臨于大宮且巷出車吉賈逹曰臨哭也巷也車陳於巷街示雖困不降必欲戰也國人大臨守陴者皆哭陴城堞也楚子退師鄭人脩城進復圍之三月克之入自皇門至於逹路皇門鄭城門也鄭伯肉袒牽羊以逆曰孤不天不爲天所佑也不能事君使君懷怒以及弊邑孤之罪也敢不唯命是聽其俘諸江南以實海濵亦唯命其翦以賜諸侯使臣妾之亦唯命若不泯其社稷使改事君君之惠也孤之願也非所敢望也敢布腹心左右曰不可得國無赦王曰其君能下人必能信用其人矣庸可兾乎退三十里而許之平潘尫入盟子良出質潘尫楚大夫師叔守也子良鄭公子也糓梁曰晉大夫敗齊師于鞌郄克曰與我紀侯之甗甗齊襄滅紀所得邑且以蕭同叔子爲質史記曰越王勾踐欲使范蠡治國政對曰兵甲之事種不如蠡鎮撫國家親百姓蠡不如種於是舉政屬種而使蠡與大夫柘稽行成爲質於呉也又曰蔡昭侯十年朝楚昭王持善裘二獻其一於昭王而自衣其一楚相子常欲之弗與子常䜛蔡侯留之於楚三年蔡侯知之獻其裘子常受之乃言歸蔡侯蔡侯歸而之晉請與晉伐楚夏晉滅沈楚怒攻蔡昭侯使其子爲質於呉謀共伐楚後與呉王闔閭遂破楚入郢又曰張儀說楚王曰大王誠能聽臣臣請使秦太子入質於楚秦女爲大王箕箒之妾効萬里之都以爲湯沐之邑戰國䇿曰濮陽人吕不韋賈於邯鄲見秦質子異人謂其父曰耕田之利幾倍曰十倍珠玉之羸幾倍曰百倍立主定國之羸幾倍曰無數曰今力田疾作不得煖衣餘食今建國立君澤可以遺後願往事之太子異人質於趙處於聊城故往說之又曰楚相王太子之時爲質王崩太子辭歸齊王曰與我東地五百里則子得歸太子入致命曰敬獻地五百里齊王歸楚太子太子歸即位爲王齊使車五十乗來取東地於楚王朝群臣曰寡人之得來及主墳墓復群臣歸社稷以東地五百里許齊今求地爲之柰何上柱國子良曰王不可不與也王身出玉聲許強萬乗之齊而弗與則不復信不可以約結諸侯又曰楚王死太子在齊質蘇秦謂薛公曰君不如留楚太子以市其下東國薛公曰君不如不我留太子郢中立王君因謂其新王曰與我下東國吾爲王殺太子不然則吾將與三國共立之然則下東國必可得矣又曰趙太后新用事秦急攻之趙氏求救於齊齊曰必以長安君爲質兵乃出太后不肯大臣強諌太后謂左右言有復今長安君爲質老婦必唾其靣左師觸龍言曰今媪尊長安君之位而封之以膏腴之地與之重器不令有功於國若山陵崩長安君何以自託於趙老臣以媪爲長安君計短也太后曰諾於是爲長安君約車百乗質於齊齊兵乃出也東觀漢記曰隗囂負隴城之固納王元之說雖遣子春卿入質猶持兩端丗祖於是稍黜其禮正君臣之義晉中興書曰諸葛誕叛遣子靚入質於呉呉亡入洛自以父誕爲太祖所斬誓不見太祖叔母琅耶武王妃靚之姉也帝後因靚在姉間往就見焉靚逃于厠帝又逼之靚流涕曰臣不能􅃮身吞炭復覩聖顔燕丹子曰太子丹質於秦秦王遇之無禮不得意欲歸秦王不聽謬言曰令烏白頭馬生角乃可丹仰天而歎烏即白頭馬爲生角秦王不得巳而造機發之橋欲䧟丹丹過之橋爲不發也太平御覽卷第四百八十
