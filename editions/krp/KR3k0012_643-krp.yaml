  text: 太平御覽卷第六百四十三
  hash: sha256:fcb8499dc53af1e3e3cb5f70abe30bafd361c6014ea6e6db3a600a3826fea0ed
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_643-1a}
body:
  text: 刑法部九獄釋名曰獄确胡角也也言确人情僞也又謂之牢言所在堅牢也又謂之圜土言築土表墻其刑圜也又謂之囹圄囹領也圄禦也領録囚徒禁禦之也急就篇曰臯陶造獄說文曰獄謂之牢易曰澤上有風中孚君子以議獄緩死又曰山下有火賁君子以明庻政無敢折獄又曰山上有火旅君子以明愼用刑而不留獄詩小宛曰哀我填寡冝岸冝獄岸赤獄郷亭之繫曰犴也詩含神霧曰杓爲天獄主天殺也禮曰孟春之月命有司省囹圄去桎梏止獄訟孟秋之月命有司脩法制繕囹圄具桎梏鄭玄注曰囹圄所以禁守繫者則令之獄矣周禮秋官司㓂曰以圜土聚教罷民圜土獄城也春秋元命苞曰爲獄圓者象斗還合宋均注曰作獄圎者象斗運國語曰温之㑹晉人執衛成公歸之于周晉侯將煞之王曰不可夫政自上下也上作政而下行之不逆故上下無怨今叔父作政而不行無乃不可乎不行謂不順也夫君臣無獄獄訟也無是非曲直獄訟之義也今元咺雖直不可聽也君臣皆獄父子將獄是無上下也而叔父聽之一逆矣又爲臣殺其君安庸刑庸用刑法布刑而不庸再逆矣一合諸侯而有再逆政余懼其無後也在魯僖三十年無後無以復合諸侯不然余何私於衛侯晉人乃歸衛侯史記曰趙髙案治李斯李斯拘執束縛居囹圄中仰天而歎曰嗟乎悲夫不道之君何可爲計哉又曰蕭何卒召曹叅叅去囑其後相曰以齊獄市爲寄慎勿擾也又曰周勃爲丞相十餘月乃免相就國嵗餘每河東守尉行縣至絳絳侯勃自畏恐誅常𬒳甲令家人持兵以見之其後有上書告勃反下廷尉勃恐不知置辭吏稍侵辱之勃以千金與獄吏吏乃書牘背示之曰以公主爲證公主者孝文女也勃子勝之尚公主故獄吏教引爲證薄太后亦以勃無反事文帝朝太后以冒絮提文帝曰絳侯綰皇帝璽將兵於北軍不以此時反今居一小縣頋反耶文帝使持節赦絳侯復爵邑絳侯旣岀曰吾嘗將百萬軍然安知獄吏之貴也又曰鈎弋夫人得幸武帝乃生昭帝帝立時年五歲衛太子廢後上幸甘泉宫命畫工圗畫周公負成王於是左右群臣知帝欲立少子後數日帝譴責鈎弋夫人夫人脫簮珥叩頭帝曰引持去送掖庭獄夫人還顧帝曰趣行汝不得活夫人死雲陽宫時暴風揚塵百姓感傷使者持棺徃葬之封識其處後帝閑居問左右曰人言何左右對曰人言且立其子何去其母乎帝曰然是非兒曹愚人所知也往古國家所以亂者由主少母壯也女主獨居驕蹇淫亂自恣莫能禁也汝不聞吕后耶故諸爲武帝生子者無男女其母無不譴死豈可謂非賢聖哉漢書曰韓安國坐法抵獄吏田甲辱安國安國曰死灰獨復不燃乎田曰燃即溺之居無幾安國爲梁内史田甲亡安國曰甲不就官我滅尔宗田甲肉袒謝安國歎曰公等足與治乎卒善遇之又曰孝宣帝𥘉生号曰皇孫生數月遭巫蠱事収繫郡邸邴吉爲廷尉監望氣者言長安獄中有天子氣上遣使者分條中都官獄繫者輕重皆煞之内謁者令郭攘夜至郡邸獄吉拒關使者不得入皇曽孫賴吉得全又曰張湯杜陵人父爲長安丞出湯爲兒守舎䑕盗肉父怒湯湯掘燻得䑕及餘肉劾䑕掠笞并取䑕與肉具獄磔堂下父見之文辭如老獄吏大驚遂使書獄又曰夏侯勝爲議不許宣帝尊武帝廟下獄及丞相長史黄覇坐不舉劾俱下獄覇欲從勝受經勝辝以罪死覇曰朝聞道夕死可矣勝賢其言遂授之繫更再冬講論不怠又曰有罪當械者皆頌繫應劭注曰頌者容也言見寛容但處曹吏不入狴牢又曰尹賞鉅鹿楊氏人長安中姦多閭里少年群軰煞吏受財執仇相與探丸得赤丸斫武吏黒者斫文吏白者主治䘮城中薄暮塵起剽刼行者賞以三輔髙弟選守長安令治獄穿地方深各數丈餘乃以大石覆其口名虎牢輕薄惡子鮮衣㓙服𬒳鎧扞持刀兵者捕得數百人内虎牢中數日一發視皆枕藉死長安中遂無盗賊又曰天文志曰勾圜十五星屬杓曰賤人之牢星實則囚多虚則開出續漢書曰范滂字孟博坐繫黄門北寺獄吏謂曰凡坐繫皆祭臯陶滂曰臯陶賢者古之直臣知滂無罪持理之上帝如有其罪祭之何益衆人由此止也又曰武帝置中都獄官二十六所丗祖皆省唯廷尉及洛陽有詔獄又曰虞詡字叔卿陳留圉人祖爲獄吏嘗俲于公之治獄及詡生經曰吾雖不及于公子孫至丞相兾得爲九卿故字詡曰叔卿至尚書令又曰李業字距游廣漢人王莽居攝太守劉咸聞業有德辟業業稱疾咸怒教曰賢者不避害猶殻射市中命薄者先死令業詣獄飬病客有說咸者乃出業謝承後漢書曰赤眉入長安時式侯恭以弟盆子爲赤眉所尊故自繫赤眉至更始奔走式侯從獄中叅械出街中逢京兆尹解惲呼曰解君載我我更始之忠臣也即帝敗我弟又爲赤眉所立惲使後車載之前行見定陶王劉禮解其械言帝在渭中舡上遂相隨見更始范曄後漢書曰許揚爲都水掾使典復鴻欲陂𥘉豪右大姓因縁陂役竟欲辜較在所楊一無所聽乃共譛楊取受財賂遂收楊下獄而械輒自解獄吏見恐遽即夜出楊時天雨隂晦道中若有火光照之時人異焉又曰杜篤字季雅居羙陽與羙陽令遊從數請託不諧頗相恨令怒収篤送京師㑹大司馬呉漢薨光武詔諸儒誄之篤於獄中爲誄辭最髙帝羙之賜帛免之東觀漢記曰崔篆爲新建大尹篆歎曰吾生值澆羿之君上有老母下有兄弟安得獨㓗巳而危所生哉乃單車到官稱疾三年不視事行縣門下掾倪敝諌篆乃強起班春所至之縣獄犴填滿篆垂涕曰嗟乎刑罰不中乃䧟民於穽此皆何罪於是乎遂平理所出二千餘人掾吏叩頭諌曰誠仁者之心然獨爲君子將有悔乎篆曰邾文公不以一人易其身君子謂之知命如煞大尹贖二千人盍所願也遂稱疾去又曰鮑昱爲泚陽長縣人趙堅殺人繫獄其父母詣昱自言年七十餘唯有一子適新娶今繫獄當死長無種類涕泣求哀昱憐其言令將妻入獄解止宿遂任身有子衛宏漢舊儀曰郡邸獄理天下郡國上計屬大鴻臚東市獄屬京兆尹王隱晉書曰太康五年夏六月𥘉置黃沙獄晉書曰武帝置黃沙獄以典詔囚以髙光歴丗明法用爲黃沙御史又曰帝至平陽爲劉聦所幽辱麹允伏地號哭不能𧺫聦大怒幽之於獄允發憤自殺聦善其忠烈贈車騎將軍節愍侯又曰喬智明爲殁㓂將軍隆慮共二縣令愛之号爲神君部人張兊爲父報仇母老單身有妻無子智明愍之停其獄嵗餘令兊將妻入獄兼隂縱之人有勸兊免兊曰有君如此吾何忍累之縱吾得免作何面目視息丗間於獄産一男㑹赦得免又曰霍原字休明燕國廣陽人也少有智力叔父坐法當死原入獄訟之毒備加終免叔父晉令曰獄屋皆當完固厚其草蓐家人餉饋獄卒爲温暖傳致去家逺無餉饋者悉給􅮇獄卒作食寒者與衣疾者給醫藥宋書曰漑撝明帝立擢爲太子洗馬撝資籍豪冨厚自奉養供一身一月十萬宅宇山池妓妾姿藝皆窮上品才調流贍善納交遊愛妓陳玉珠明帝遣求不與逼奪之撝頗怨帝令有司誣奏將殺之撝入獄數宿鬚皆白免死繫尚方蕭子顯齊書曰戴僧静㑹稽永興人也少有膽力便弓馬於都載錦爲歐陽式所得繫兖州獄太祖遣薛深餉僧静酒食以刀子置魚腹中僧静與吏飲以刀刻械手自折鎻發屋而出歸太祖送止之齋内以其家貧年給粟千斛崔鴻後趙録曰石季龍幽中書令徐光于襄陽國詔獄光在獄中注解經史十餘萬言三國典略曰周諜入于齊爲楊州刺史平鍳所獲繫之獄妻生男鑒因喜醉檀放免之旣醒知非上啓自劾齊主特原其罪隋書曰裴政爲襄州緫管妻子不之官所受秩奉散給寮吏民有犯罪罪者隂悉知之或竟歲不發至再三犯乃因都㑹時於衆中召出親案其罪五人處死徒流者甚衆合境惶懾令行禁止小民蘇息稱爲神明尓後不修囹圄殆無爭訟又曰薛胄爲兖州刺史及到官繫囚數百冑剖斷旬日便了囹圄空虚又曰枊儉拜蓬州刺史獄訟者庭遣不爲文書約束縱容而巳獄無繫囚唐書曰太宗行次靈石縣指獄而謂皇太子曰此何謂皇太子對曰此所謂圎獄將繫罪人太宗因曰文王作罰刑兹無赦而漢文帝志在輕刑但以詳平爲佳非謂有罪而釋也濫繫無辜則政道缺乆滯有罪則怨氣生圎土之中仰視青天有同懸鏡而鏁械虜體欝結其中夫循諸己者可以知物傳曰其恕乎由此言之不言不愼又曰陽城爲道州刺史觀察使判官督其賦至州恠城不出迎以問州吏吏曰刺吏聞判官來以爲有罪自囚於獄不敢出判官大驚馳入謁城於獄曰使君何罪某奉命來候安否耳留一二日未出去城因不復歸館門外有故問扇撗地城晝夜坐卧其上判官不自安辭去晏子春秋曰景公籍重而獄多拘者蒲圄怨者滿朝晏子諌不聽淮南子曰君不入獄爲恩也論衡曰獬豸者一角之羊也性知有罪臯陶治其罪疑者令羊觸之有罪則觸無罪則不斯盍天生一角聖獸助獄爲驗故臯陶禮羊跪坐事之此則神竒瑞應之類風俗通曰易噬嗑爲獄獄十月之卦從犬言聲二犬亦存以守也廷者陽也陽尚生長獄者隂也隂主刑煞故獄皆在庭北順其位又曰詩云冝犴冝獄犴司空也周禮凢萬民之有罪過巳離於法者桎梏以上坐諸嘉石役諸司空仐平易道路也又曰周禮三王始有獄夏曰夏臺言不害人若遊觀之臺桀拘湯是也殷曰姜里言不害人若於閭里紂拘文王是也周曰囹圄令圄舉也言人幽閉思愆改惡爲善因原之也今縣官録囚皆舉也三輔黄圗曰長安有九市二十四獄扶南傳曰扶南俗理訟無牢獄鞭杖唯以探湯捧鑕没水爲信先使沐浴齋戒乃令以手内湯或捧熱鑕或没水中無罪者不爛不燋不沒罪者即驗也㑹稽典録曰鍾離意爲堂邑令縣民房廣爲父報仇繫獄其母病死廣聞之號泣獄意爲之悽惻出廣見之曰今欲出若歸家殯歛有義則還無義則巳丞掾諌以爲不可意曰不還之罪令自受之廣臨殯畢即自獄以狀表上詔減死一等又曰盛吉字君逹山隂人司徒虞延辟西曹掾時隴西太守鄧融以贓罪徴詣廷尉前後考驗歴歲不服明帝下三府遣精能掾屬更就彈劾吉到詔獄但勑主者供湯沐飲食不去問事明日復徃解融桎梏安徐以情責君若無贓強見誣枉冝具列辭當相伸理如審有罪不得誣罔國家融感吉意即移辭首服又曰黄昌爲蜀郡太守宻捕得盗師一人悉使䟽諸縣強盗宻往捕録其諸小盗皆原其死讁作棧道以代民役由是道不拾遺獄至連年無有重囚又曰髙豊字文林爲鄼縣獄吏刺史虞孟行部到旬日鄼縣僻勑鄼長將囚徒就所在録見林𬒳文書閉獄下籥不肯送徒自詣諌曰明使君乗法駕騑驂衘命理冤當縣縣乃至今乃遥召囚徒欲省更煩盍普天之下莫非王土率土之濵莫非王臣鄼獄非漢地乎囚徒終不出縣特望朱軒廻輪向鄼孟遂到鄼㐮陽耆舊記諸葛亮出關中使馬謖統大衆在前爲魏將張郃所破坐下獄死時年四十九臨終與亮書曰明公視謖猶子謖視明公猶父願推殛鯀興禹之義使平生之交不虧謖雖死無恨於黄泉博物志曰夏曰念室殷曰動止周曰稽留三代之異名也又狴犴者亦獄别名韓陽天文要集曰貫索貴人之牢中星實則囚多虚則開出搜神記曰漢武帝東遊未岀凾谷關有物當道其身數丈其狀像牛青眼而矅精四足入土動而不死百官驚懼東方朔乃請酒以灌之灌之十斛而物消帝問其故荅曰此名爲患憂之物氣之所生此必秦之獄地不然則罪人徒作者之聚夫酒忘憂故能消之也帝曰吁博物之士至於此乎東方朔曰孝武皇帝時幸甘泉至長平坂上馳道中央有䖝覆而赤如生肝狀頭目口齒鼻耳盡具先軀旄頭馳還以聞曰道不可御於是上止車遣侍中馳往視之還盡莫知也時東方朔從在後屬車上召朔使馳徃視之還對曰恠哉上曰何謂也朔對曰秦始皇時拘繫無罪幽殺無辜衆庻怨恨無所告訴仰天而歎曰恠哉感動皇天此憤氣之所存也故名之曰怪哉是地必秦之獄處也上有詔使丞相公孫弘案地圗果秦之獄處也上曰善當何以去之朔曰夫積憂者得酒而去之以酒置中立消靡上大笑曰東方生真所謂先生也何以報先知之聖人哉乃賜帛百疋異苑曰建康陵欣景平中死於楊州作部尅辰當葬作部督夢欣云今爲獄公姥祖夕有期莫由自反勞君解謝今得放遣督不信夜後又夢言辝轉切因歌一曲云生時丗上人死作獄中鬼不得還墳墓灰没有餘罪督覺爲謝神從此便絶劉義慶幽明録曰晉廬陵太守寵企字子及上祖坐事繫獄而非其罪見螻蛄行其左右相謂曰使尓有神能活我死不當善乎因投飰與螻蛄食盡去有頃復來形體稍大意異之復與食數日其大如豚及當行刑螻蛄掘璧根爲大孔道得從此出亡後遇赦得活矣齊諧記曰呉當陽縣董昭之泛舡過錢塘江江中見一蟻著一短蘆惶遽畏死使以繩繫蘆著舡舡至岸蟻得出中夜夢見一人烏衣來謝云僕是蟻中王君有急難當見先語歴十餘年江左刼盗縱撗録昭之爲刼主繫餘姚獄昭之自惟蟻王夢云緩急當告今何處告之獄囚言但取兩三蟻著掌中祝之昭之如其言暮果夢昔烏衣人云可急去入餘杭山天下旣赦命不乆也於是便覺蟻齧械巳盡因得岀獄過江投餘杭山遇赦遂得免桓子新論曰近哀平間道士臨淮董仲君坐繫獄病死數日目䧟生䖝吏捐弃之便更活去太平御覽卷第六百四十三
