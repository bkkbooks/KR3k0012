front:
  text: 太平御覽卷第九百一十一
  hash: sha256:a863b00a5d7b9561442dbece4db7b1559225048aa0e59258f74654197e1e5dad
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_911-1a}
body:
  text: 獸部二十三䑕昜說卦曰艮爲䑕春秋運斗樞曰玉衡星散而爲䑕說文曰䑕穴蟲揔名也䶅下各切䑕出胡地䶉竹䑕也如犬鼨音終豹文䑕也鼷小䑕也鼩精鼩其俱切胡地風䑕也鼢䑕地中行伯勞之所化也䶄䑕䑕䶄令䑕也䶄音萍爾雅曰鼢䑕地中行者鼸䑕以頰裏藏食鼷䑕有螫毒者􅽕䑕夏小曰鼩則穴二者斯鼬䑕今鼬似鼦赤黄色大尾啖䑕江東呼爲鼪者主鼩䑕音劬小鼱鼩也鼫䑕形大如䑕頭似兎尾有毛青黄色好在田中食栗豆關中呼爲鼩鼠鼤䑕鼨䑕豹文鼮䑕音廷文彩如豹鼳䑕音孤覔切似鼠而大蒼黑色在樹上又鼯䑕夷由狀如小狐似日旦乳亦謂之蝙蝠肉翅飛飛生音如人呼廣志曰白援尾長白腹善縁登若家䑕小異者鼢䑕深目而短尾苗䑕者野䑕也小而短尾夭䑕以皮爲裘今當名其裘爲天鹿裘黄䑕在田野䑕爲群害榖夌善走凢狗不得唯鼠狼能得之左傳曰齊侯將爲臧紇田與之邑臧紇聞之見齊侯與之言伐晉對曰多則多矣抑君似䑕夫䑕晝伏夜動不穴於寢廟畏人故也今君聞晉之亂而後作焉寜將事之非䑕而何乃弗與田詩曰誰謂䑕無牙何以穿我墉誰謂汝無家何以速我訟又曰碩䑕刺重歛也碩䑕碩䑕無食我黍又曰相䑕刺無禮也衛文公能正其羣臣而刺在位承先君之化無禮儀也相䑕有皮人而無儀人而無儀不死何爲大戴禮曰正月田䑕出田䑕者鼸䑕也詩義䟽曰尓雅鼫䑕許愼云五伎䑕也今之河東有石鼠大能人立交前兩脚於頭上跳善鳴食人禾稼逐則走入樹空中亦有五伎或謂雀䑕其形大故云石䑕也詩言其方物冝謂此䑕非今之䑕也又䑕不食禾苗夲又謂螻蛄爲碩䑕亦有五技古今工名虫鳥物異名同故記巳史記曰李斯少時爲郡小吏見吏舎厠中䑕食不潔近人犬數驚恐之入倉見倉中䑕食積粟居大廡下無人犬之憂乃歎曰人賢不肖譬如䑕在所自處耳又曰張湯杜陵人也其父爲長安丞出湯爲守舎還而䑕盗肉其父怒乃笞湯湯掘得盗䑕及肉鞫掠訊輷論報并取䑕與肉具獄磔堂下其父見之視其文辭如老獄吏大驚遂使書獄漢書曰古馮翊韓延夀有罪下獄楊惲上書訟延夀郎中丘常謂惲曰聞君侯訟韓馮翊當得活乎惲曰事何容易我不能自保直人所謂䑕不容穴衘窶藪故也又曰蘇武使匈奴匈奴徙武北海上掘野䑕草實而食之又曰廣陵王胥將作亂䑕舞王后庭又曰燕刺王旦將作亂䑕舞殿端門魚豢魏略曰大秦國有辟毒䑕魏志曰臧洪爲袁紹所圍粮乏乃掘䑕而食之又曰太祖時用刑嚴重太祖馬鞍在庫爲䑕所囓庫吏懼罪必死議欲面縛首罪猶慮不免其咎鄧王哀冲謂曰待三日中然後自歸冲於是以刀穿單衣如䑕嚙者謬爲失意貌有愁色太祖問之冲對曰丗俗以爲䑕嚙衣者其主不吉今單衣見嚙是以憂戚太祖曰此妄言耳無所苦也俄而庫吏以嚙鞍聞太祖笑曰衣在側尚囓况馬鞍懸在乎一無所問晉陽春秋曰大興中衡陽歐純作䑕市四方丈餘開四門門有一木人縱四五䑕於中欲出門木人輙以椎椎之北史曰盧昶爲散騎常侍時洛陽縣獲白䑕昶奏以爲案瑞典外鎮刺史二千石令長不祗上命刻暴百姓怨嗟則白䑕至因陳時政多所勸誡詔書褒美其意三國典略曰齊將誅斛律光有三䑕遊於光寢光毎投食與之一朝俱死床下唐書曰吐蕃有草石速古芒葉長二寸狀如針蒿毎莖不過三四葉其莖蔓其花黄其根連珠如麦門冬有䑕長於常䑕毎二三十同一穴至秋秋䑕皆收此草爲藏多者至數石俗亦掘草根食之而留給䑕粮其國禁殺䑕殺者輙加罪俗亦愛之不殺也洞林曰郷里人栁休祖婦病䑕瘻積年不差及困垂命令兒來從吾乞卦占得頥之復案卦應得人師姓石者而治之當以䑕出而愈者也休祖兒歸有一賤家奴姓石自言由來能治此病且炙其三處而止歸㝷差有一老鼠色正蒼黄逕就其前伏而不動呼狗嚙殺之䑕頭上有炙處病便差玄中記曰百歳䑕化爲神鄭氏玄中記曰百歳之䑕化爲蝙蝠京房易飛候曰䑕舞國門厥咎亡鼠舞於庭厥咎誅死風角要占曰長居官厭盗法七月以生䑕九枚置籠中埋子地稱九百斤土覆坎深各二尺五寸築之令堅固地鏡圖曰青玉之像爲女人黄金之見爲火及白䑕百恠書曰䑕咋人衣領有福莊子曰且鳥髙飛以避矰弋之患鼷䑕深穴於神丘之下以避薫灌之患又曰惠子相梁莊子往見之或謂惠子曰莊子來欲代子相於是惠子恐搜於國中三日王夜莊子見之曰南方鳥其名鵷鶵子知之乎鵷鶵發南海而飛渡北海非梧桐不止非竹實不食非醴泉不飲於是鴟得腐䑕鵷鶵過而仰視之曰嚇今子欲以梁國相嚇我耶又曰鼹䑕飲河不過滿腹文子曰腐䑕在阼燒香於堂尹文子曰鄭人謂玉未理者爲璞周人謂䑕未腊者爲璞周人乃懷璞問鄭賈曰欲買璞乎賈曰欲因出其璞視之乃䑕也因謝不取淮南子曰栁下惠見餳曰可以養老盗跖見餳曰可以粘䑕又曰孟賁探䑕穴無時死必噬其指失其勢孟賁勇士爲探䑕於穴故曰失其勢又曰季春之月田䑕化爲鴽淮南萬畢術曰孤目里腦䑕其穴以塗䑕穴即去𬒳髮向北呪殺巫䑕夜有巫𬒳髮北向禹歩况日老䑕不祥過自受其殃又曰投䑕者機動釣魚者浮抗動發也發則得䑕浮釣浮也抗動也動則得魚也又曰虞氏者梁冨人也登髙樓臨大路設樂陳酒蒱摶其上遊俠相隨行於樓下博者射明張中友雨㯓音楬而笑䳒墮腐䑕而中遊俠俠相與語曰虞氏冨人矣常有輕人之志乃辱我以腐䑕請滅其家其夜乃攻於虞氏大滅其家此謂類而非也抱朴子曰南海有白䑕大者重數斤毛長三寸居空木中其毛可續爲布又曰陳安丗年十三𥘉爲管叔夲客得道叔夲年七十猶拜安丗曰得道者當師吾不羞弟子之禮矣死王樂生䑕雖爲帝王死不及生䑕又曰玉筞記稱䑕壽三百歳滿者則色白善慿人而卜名曰仲仲能一年之中吉凶及千里外之事皆知也典語曰狻獹之狗吠於朝門社稷之䑕竄於宮側春秋後語曰趙惠文王二十九年秦韓相攻軍於閼與上黨有閼與聚閼烏連反與音預成音余王召廉頗問曰可救不對曰道逺險狹難救也又問樂乘對曰如廉公言又問趙奢趙奢對曰道逺險狹譬兩䑕闘於穴中將勇者勝王乃令奢救之晏子春秋曰景公問晏子治國何患對曰社䑕者不可燻不可灌之君左右出賣寒熱入則比周此國之社䑕者山海經曰丹熏之山有獸焉其狀如䑕而兔首麋耳以其尾飛名曰耳䑕可禦百毒郭璞山海經圖飛䑕讃曰或以尾翔或以髯凌飛䑕鼓翰倐然皆騰固無常所唯神所慿夲草曰鼷䑕一名隱䑕形如䑕大而無尾黒色長鼻賈誼書曰鄙談云欲投䑕而忌器此善喻也䑕近於器尚憚不投况貴大之臣近於帝王乎郭璞注尓雅曰漢文帝宫中得一䑕豹文光彩熒熒以問群臣下子廉郎終軍荅曰鼨䑕文帝賜縑東方朔神異經曰北方有氷萬里厚百丈有鼷䑕在氷下出焉其形如䑕食草木肉重千斤可以作脯食之巳熱除熱病也其毛長可八尺可爲蓐卧之可以却寒治風病也其皮可以柔致其聲聞千里有美尾可來䑕此所尾毛所在䑕斬輙入此聚說苑云梁上䑕飽聞長者論論衡曰人生天地猶魚生泉蟣虱於人風氣而生焉食䑕膓脹䑕子水午火馬金亦勝木雞何不喙兔火亦勝金蛇何不食猴又曰䑕踐一篋捐不食博物志曰䑕食巴豆三年重三十斤束晢發蒙記曰西域有火䑕之布東海有不灰之木語林曰簡文爲撫軍時所坐床上坐塵不聽左右掃去見䑕行跡視以爲佳異物志曰䑕母頭脚似䑕毛蒼口銳大如水牛而獨畏狗水田時有水灾起於䑕西域諸國志曰有䑕王國䑕大如狗着金鏁小者如兎或如此間䑕者沙門過不呪願白衣不祠祀輙害人衣器異苑云釋道安昔西方適見此俗喭云䑕得死人目精則爲王于寳搜神記曰晉太康中㑹稽郡憉蜞及蟹皆化爲䑕大食稻爲災始成者有肉而無骨幽明録曰吴北寺終祚道人卧齊中䑕從坎出言終祚復數曰必當死終祚呼奴令買犬䑕云亦不畏此也但令犬入此户必死湏臾犬至果然終祚乃下聲語其奴曰明日市雇十檐水來䑕便巳逆知之云正欲水澆取我我穴周流無所不至竟日澆灌了無所獲宻令奴更借三十人䑕云吾上屋居柰我何至時處在屋上奴名同䑕云阿同盗二十萬錢試開庫實如所言奴亦叛去終祚常爲啇估閉其户而謂䑕曰汝正欲使我冨耳今逺行勤守吾房中勿令有所零失也時桓玄在南州禁殺牛甚急終祚載數萬竊買牛皮還東貨之得二十萬還室猶閉一無所失後遂冨積二三千万列異傳曰中山王周南正始中爲襄邑長有䑕衣冠出㕔事語曰尓某日當死周南不應至期復出冠幘綘衣語曰爾日中當死復不應入復更出日適中䑕曰周南汝不應我死我復何道遂㒹蹷而死即失衣冠視如常䑕也述異記曰宋車騎大將軍南譙王劉義宣鎮荆州府吏蔡鐡者其人善卜公嘗在内齋見一白䑕縁屋梁上乃命左右射得之内置凾中召鐡旣至使卜凾中何物卜兆成笑曰巳具知矣公曰狀之鐡爲之狀曰兊色之䑕背明户彎弧射之絶其左股䑕孕五子三雄而兩雌若不見信剖腹而立知公乃使剖䑕腹皆如鐵言也賜錢一萬劉敬叔異記曰景平中東陽大水永康蔡喜夫避徃南壟夜有大䑕浮水而來伏喜夫奴牀角奴恐而不犯毎以飰與之水勢旣退喜夫旣得返故居䑕以前脚棒青紙裏三斤許珠著奴牀前啾啾如欲語也又曰南陽趙度少好術藝度有白米爲䑕所盗及𬒳頭把刀晝地作獄四靣開門向東長嘯群䑕俱到呪之曰凢非噉者過唯止者十餘乃剖腹看臟有米在焉竇氏家傳云竇攸治尓雅舉孝廉爲郎丗祖與百寮大㑹於靈臺得䑕身如豹文熒熒有光煇問群臣莫有知者唯攸對曰此名䑕詔何以知之攸曰見尓雅曰詔案視書果如攸言賜帛百疋詔諸臣子弟皆從受尓雅許邁別傳曰邁小名映有䑕嚙映衣乃作符占䑕莫不畢至於中庭映曰齧衣者留不齧衣者去群䑕並去唯一䑕獨住伏於中庭而不敢動梁州記曰仙人唐公房祠有碑一所廟北有大坑碑文云是其舊宅處公房舉宅登仙故爲坑焉山有易膓䑕一月吐易其膓束廣所謂唐䑕者也慱物志曰唐房外仙鷄犬去唯以鼠惡不將䑕自悔一月三岀腹劉欣期交州記曰竹風䑕如小狗子食竹根出封溪縣秦州記曰乞佛虜乾歸未移枹罕金城見䑕有數萬頭將諸小䑕各銜焉屎群移而度洮麗二水悉上抱罕自是二年而乾歸徙焉晉太康地記曰鳥䑕之山在隴西首陽縣穴入三四尺䑕在内鳥在外鄧德明南康記曰南康山石室號金堂内金色有金䑕時見也金樓子曰齊鬰林王夜中與官者共刺䑕至曉夜輙得數十藍又曰晉寧縣境内出大䑕䑕狀如牛土人謂之偃䑕天時將失䑕則從山出遊畎畝散落其毛悉成小䑕五稼必盡耗也後魏盧元明劇䑕賦曰嗟乎在物最爲可賤毛骨莫充於玩賞脂肉不登於俎膳其爲狀也僣悮且吁雎離睒上濫切賜音釋鬚似麦穟半垂眼如豆角中劈耳類槐葉𥘉生尾若杯酒餘瀝乃有老者羸寛寛申骨二音疥瘠偏多姦計衆中無敵社託忌器妙解自惜深藏厚閉巧能推覔或㝷䋲而下或自地髙擲登机縁匱盪扉動弈切切終朝轟轟竟夕是以詩人爲辝寔云其碩盗干湯之珎俎傾留髦之香澤傷繡領之斜製毀羅衣之重襞曹舒由是獻䂓張湯爲之𬒳讁亦有閑居之士倦游之客絶慶吊以養真素笄左右而㝷詩易庭院肅清房攏虚寂尓乃羣䑕乗間東西挑擲或牀上將髭或户間出額貌甚舒暇情無畏惕又領其黨與欣欣奕奕欹覆箱奩騰踐菌席共相侮慢特無冝適訝天壤之含弘
