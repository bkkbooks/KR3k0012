front:
  text: 太平御覽卷第五百八十一
  hash: sha256:f643b69de8b608b01bbe3562c24b746f10b82838b6d9216970853c96a83c208b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_581-1a}
body:
  text: 樂部十九簫笳笙竽簧塤簫釋名曰簫肅也其聲肅肅清也爾雅曰大簫謂之䇾小者謂之筊郭璞注曰䇾二十二管長尺四寸筊十六管長尺二寸簫一名籟也博雅曰簫大者二十三管無底小者十六管有底通禮義纂曰伏犧作簫十六管蔡邕曰簫編竹有底大者二十三管小者十六管長則濁短則清以宻蠟實其底而増减之則和然則邕時無洞聲者矣易說曰夏至之樂𥙷以簫簫長四寸鄭玄曰簫亦管形似鳥翼鳥火禽也火數七夏時火用事二七十四簫之長由此也三禮圖曰雅簫長尺四寸二寸四彄頌簫二寸十六彄仲夏之月令樂師均管簫簫長則濁短則清以宻蠟實其底而増减之則和管成而音定無所復調當與琴瑟相叅風俗通曰舜作簫其形參差象鳯翼十管長尺二寸白虎通曰簫者中吕之氣也尚書益稷曰簫韶九成鳯凰來儀毛詩臣工有瞽曰旣備乃奏簫管備舉春秋說曰夏至作樂聞以簫笙周禮春官小笙師曰小笙師掌吹簫史記曰五子胥鼔腹吹簫乞食於呉市也又曰周勃吹簫給䘮事謝承後漢書曰靈帝善皷琴吹洞簫丹陽記曰江寕縣南三十里有慈姥山積石臨江生簫管竹王褒洞簫賦所稱即此也其竹圎緻異於衆處自伶倫採竹嶰谷其後唯此簳見珎故歴代掌給樂府而俗呼曰皷吹涼州記曰吕纂咸寕二年有盗發張駿墓得白玉罇玉笛紫玉簫列仙傳曰簫史者秦繆公時人善吹簫能致孔雀白鶴繆公女弄玉好之以妻焉其後隨鳯去故秦人作鳯女祠於雍宫代有簫聲江表傳曰孫權攻合肥不下而還休兵皆上道權與吕蒙等在後魏將張遼奄至皷吹驚怖不能復鳴簫唱甘寕援刀欲斫之於是始作之莊子曰南郭子綦謂顔成子遊曰汝聞人籟曰而未聞地籟汝聞天籟郭象曰天籟簫也秦子曰一人執規十手自負一人吹簫長短皆應傳子曰馬先生能使木人吹簫比妙般輸墨翟不劣古矣笳杜䞇笳賦序曰昔伯陽避亂入戎戎越之思有懷土風遂建斯樂羙其出於戎貉之俗有大韶夏之音曹嘉之晉書曰劉疇曽避亂塢壁賈胡百數欲害之疇無懼色援笳而吹之爲出塞入塞之聲動其遊客之思於是群胡皆泣而去蔡琰別傳曰琰字文姬先適河東衛仲道夫亡無子歸寕于家漢末大亂爲胡騎所獲在左賢王部伍中春月登胡殿感笳之音晉先蚕儀注曰車駕住吹小菰發大菰即笳也又曰胡笳漢舊録有其曲不記所出夲末笳者胡人卷蘆葉吹之以作樂也故謂曰胡笳夏仲御別傳曰激南楚吹胡笳風雲爲之揺動星辰爲之變度世說曰劉越石爲胡騎所圍數重城中窘迫無計越石始乗月登樓清嘯胡賊聞之皆悽然長嘆中夜奏胡笳賊皆流涕人有懷土之切向曉又吹之賊並棄圍奔走笙釋名曰笙生也象物管地而生以匏爲之其中空以受簧爾雅曰大笙謂之巢小者謂之和郭璞曰大笙列管匏中施簧也管端大者十九簧小音十三簧犍爲舎人曰大笙音聲衆而髙也小者音相和也白虎通曰笙之言施也牙也萬物始施而牙笙者太簇之氣也象萬物之生也故曰笙有七正之節焉有六合之和焉天下樂之故謂之笙古之善吹笙者有王子晉見列仙傳周靈王之太子也毛詩鹿鳴曰我有嘉賔皷瑟吹笙吹笙皷簧承筐是將尚書益稷曰笙鏞以間鳥獸蹌蹌孔安國曰間迭也吹笙擊鍾鳥獸仰德相率而舞蹌蹌然也禮記檀弓上曰孔子旣祥五日彈琴而不成聲十日而成笙歌五日彈十日笙歌除曲外也琴以手笙歌以氣也又曰女媧之笙簧周禮曰春官笙師掌教吹笙郷飲酒曰笙入奏南陔白華邯鄲綽五經折疑曰夫笙者法萬物始生導逹隂陽之氣故有長短黄鍾爲始象法鳯凰蔡邕月令章句曰季秋之月上丁入學習吹笙所以通氣也管簫笙竽塤箎皆以吹鳴者也穆天子傳曰西王母吟月吹笙皷簧簧在笙中衷心翔翔民之子惟天之望吕氏春秋曰墨子見荆王衣錦吹笙竽易通卦驗曰冬至吹黄鍾之律間音以竽竽長四尺二寸鄭玄曰管類也竹爲之形參差象鳥羽也周禮曰笙師掌教吹竽竽三十六簧也禮記月令曰仲夏之月命樂師調笙竽風俗通曰謹案禮記竽竹簧長四尺二寸今二十三管世夲曰隨作竽楚辭曰代奏鄭衛鳴竽張伏獻駕辯楚勞啇伏羲作琴造駕辯之曲楚人自作勞啇之歌皆妙曲也通禮義纂曰漢武帝時丘仲作竽笙三十六管樂府雜録曰將竽形類小鍾以手捋之即鳴樂府圖曰吹竽有以知法度竽音調則度數得見列仙傳曰啇丘子骨者髙邑人也好牧豕吹竽年七十不取婦而老邑人乃竒怪之從受道問其要言但食木菖蒲根飲水不飢不老如此傳世見之三百餘年貴戚冨室聞之取而服之不能終歳輙止墯慢矣謂將復有匿術也文心雕龍曰林籟結響諷如竽琴淮南子曰孟夏南方御女衣赤采吹笙竽煦也立春之氣煦生萬物也管三十六宮管在左右和十三宮管在中今之竽並以木代瓠而􅃮之無復八音矣荆梁之南尚仍古制桓譚新論曰成少伯工吹竽見安昌侯張子夏皷瑟謂曰音不通千曲以上不足以爲知音韓子曰齊宣王使人吹竽有三百人南郭處士請爲王吹粟食與三百人等宣王死文王即位一一聽之處士走或云韓昭侯田巖使一一聽之乃知其濫吹也新序曰楚王使謁者徐光迎方與盲人能吹竽者龔遂乃止簧毛詩曰巧言如簧又曰君子陽陽左執簧右招我由房陽陽無所用其心也漢書内傳曰西王母命侍女許飛瓊皷震簴之簧世夲曰女媧作簧宋均曰女媧黄帝臣也三禮圖曰雅簧上下各六神仙傳曰王遥有竹篋未甞開後將茅子擔篋入石室室中有二人遥自取一枚以二枚與室中人對共皷之潜夫論曰簧削銳其頭有傷害之象塞蠟宻有口舌之類皆非吉祥善應也塤丗夲曰塤暴新公所造亦不知何人周畿内有暴國豈其時人乎夲作壎音許袁切圍五寸半長三寸半凢六孔宋均注云暴公國平王諸侯也樂書曰壎者喧也周平王時暴辛公燒土爲之說文云壎爲樂器亦作塤也壎謂聲濁而喧喧然今雅樂部用也爾雅釋樂曰大壎謂之􅑧即塤也銳上平底形象秤鍾大者如鵝子聲合黄鍾大吕也小者如鷄子聲合太簇夾鍾也皆六孔與箎聲相諧故曰壎箎相應風俗通曰塤燒土爲也圍五寸半長一寸半有四孔其二通凢六孔也塤一作壎字也太平御覽卷第五百八十一
