front:
  text: 太平御覽卷第九百七十八菜茹部三
  hash: sha256:b6450995da3f6018b1b7ab8fbc7ea76ac4d6ce2712af414ecba697698d965534
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_978-1a}
body:
  text: 瓜易夬卦曰九五以𣏌瓠瓜含章有隕自天𣏌木之柔者瓜之果大者龍魚河圗曰瓜有兩鼻者煞人詩曰文王之興夲由太王也綿綿瓜瓞民之𥘉生自土沮􅃮興也箋云瓜之本實継先歳之瓜必小狀似瓞故謂之瓞綿綿然若將無長大時興者喻后稷乃帝嚳之曹封於部其後公劉失職遷于幽居沮􅃮之地歷丗亦綿綿然至太王而得其民心而生王業故本周之興云于沮􅃮也耳大戴禮曰五月乃瓜乃者治瓜之辭也瓜也者始食瓜八月剥瓜蓄瓜時也禮曰爲天子削瓜者副之巾以絺副拆也旣削四祁之乃横断而巾覆焉爲國君華之巾以綌華中製之不四折也爲大夫累之果倮也倮不巾覆也士㚄之不中裂横断去㚄而巳音帝庶人齕之不横断又月令曰仲冬之月行秋令則天時雨汁瓜瓠不成雨汁者水雪䕌下左傳曰齊侯使連稱管至父戊葵丘瓜時而徃曰及瓜而代朞戍公問不至請代不許故謀作亂春秋運斗樞曰逺雅頌著倡優則李生瓜論語曰子路曰佛盻以中牟叛子之欲徃也如之何子曰然有是言不曰堅乎磨而不磷不曰白乎涅而不緇吾豈匏瓜也哉焉能繫而不食爾雅曰瓞大結切瓝歩角切其紹瓞郭璞注曰俗呼折瓜爲瓞紹者瓜蔓緒亦著子但小如瓝耳史記曰邵平者故秦東陵侯秦破爲布衣貧種瓜長安城東瓜美故丗謂東陵瓜漢書地理志曰燉煌古瓜州地生美瓜續漢書曰牽牛星荆州謂之河鼔主開梁織女主瓜果又曰安帝元𥘉三年有瓜異夲共生一瓜蔕時以爲瓜者外焉離夲而實女子外屬之象也是時閻皇后與外親耿寳共譛太子廢爲濟隂王更外迎濟北王子犢立之袁山松後漢書曰建和二年河東瓜兩體共蔕後漢書曰施建字君子沛人也家貧母老常鬻力供養種瓜自給應劭漢官儀曰太官菓丞官別在外掌菓瓜菜茹吴志曰歩騭字子山臨淮淮隂人避難江東單身窮困與廣陵衛旌同年相善俱以種瓜自給晝勤四體夜誦經傳㑹稽焦征羌郡之豪族呉録曰征羌名矯甞爲征羌令人客放縱騭與旌求食其地懼爲所侵乃共脩刺奉瓜也吴録曰姚翁仲甞種瓜菜灌園以供衣食時人或餉一無所受晉書曰咸寜二年嘉瓜同蔕生於成都又曰皇甫謐年二十不學遊蕩無度或以爲癡甞得瓜果輒進叔母任氏任氏曰孝經云三牲之養猶爲不孝汝今年餘二十目不存教心不入道無以慰我皇甫謚自叙同又曰桑虞仁孝自天年十四䘮父毀瘠過禮虞有園宅北數里瓜菓𥘉熟有人踰垣盗之虞以園援多棘㓨恐偷見人驚走而致傷損乃使奴爲之開道及偷負瓜將出見道通聞虞使除之乃送所盗瓜叩頭請罪歡然盡以瓜與之齊書曰建元𥘉武帝即位郅撝爲司徒左長史先是武帝與撝同從宋明帝射雉郊野渴倦撝得青瓜與上對剖食之又曰竟陵王子良夏月客至爲設瓜飲又曰郭原平以種瓜爲業大明七年大旱瓜瀆不復通舡縣令劉僧秀愍其窮老開瀆下水與之原平曰普天大旱百姓俱困豈可㓕漑田之水以通運瓜之舡乃歩他道徃錢塘貨賣沈約齊紀曰韓靈敏早䘮父兄靈珎至孝母亡家貧無以葬與靈珎種爪靈敏朝採暮還復生未甞减耗葬事由此舉孝子傳同梁書曰任昉卒武帝間問方食西菀緑沉瓜投之於盤悲不自勝因屈指曰昉少時常恐不滿五十今四十九可謂知命又曰郭祖深清儉常服故布衣素木按食不過一肉有姥餉一青瓜祖深報以疋帛有冨人効之以貨鞭而徇衆朝野憚之又曰鄭灼字茂昭勵志好學多苦心熱若瓜時輙偃卧以瓜鎮心起便讀誦其篤志如此北齊書曰蘭欽爲廣州刺史前刺史新渝侯映之夢南安侯恬權行州事兾得即真及聞欽至嶺厚貨厨人塗刀以毒削瓜進之欽及愛妾俱死帝聞大怒檻車収恬削爵土後魏書曰楊愔典選多以言㒵取人時謗詞云尚書典選似貧人買瓜唯取大者又曰郭祚以夲官領太子少師祚曽從丗宗幸東宫肅宗㓜弱祚懷一黄㼐出奉肅宗時應詔左右趙挑弓深爲丗宗所信祚私事之時人謗祚者号爲挑弓僕射黄㼐少師後周書曰王羆性儉率甞有客與羆食瓜客削瓜侵膚稍厚羆意嫌之及瓜皮落地乃引手就地取而食之客甚有愧色又曰趙王招知隋文欲遷周鼎宻欲圗之藏兵刃於帷席之間後院亦伏壯士文帝從者多在閣外唯楊弘元坐於戸側招以佩刀割瓜㗖隋文未之疑元胄覺變扣刀而入招迺以大觴親飲胄酒北史曰宋瓊字普賢以孝稱母曽病季秋月思瓜瓊夢想見之求而遂獲時人異之隋書曰文帝用法定制行署取一錢巳上聞見不告言者坐至死自此四人共盗一榱桶三人同竊一瓜事發即時行決又曰秦孝王俊奢侈過甚頗好於内妃崔氏性妬甚不平之遂於瓜中進毒俊由是遇疾徴還京師上以其奢縱免官以王就弟唐書曰杜如晦薨後太宗食瓜美愴然思之遂輟其半使置之於靈座又曰髙宗子八人武后所出者自爲行第長曰孝敬皇帝監國仁明爲后所忌而鴧之次曰雍王賢爲太子次曰中宗次曰睿宗及孝敬遇害諸第甞所不安晨夕懷懼雖父母之前無由敢言乃作黄䑓瓜詞令樂人歌之欲微悟上意歌曰種瓜黄䑓下瓜熟子離離一摘使瓜好再摘令瓜稀三摘尚由可四摘抱蔓歸然太子竟亦流竄於黔州又曰徳宗建中𥘉誤以髙力士養女楊氏婦爲沈太后是時沈氏故老巳盡無識太后者上宻使中人就洛陽視髙氏年狀頗同曩時太后甞削瓜哺上刃傷左拇指髙氏甞剖瓜亦傷左拇指中人皆閹官女子且非審識太后見上仁孝有殊喜莫敢沮者髙氏辭曰實非太后具陳族姓内外以自明又曰貞元四年夏右神䇿軍獻瑞瓜三蔓各爲一蔕而生三瓜莊子曰朽瓜化爲魚物之變也墨子曰今有入人塲園取人瓜者得罰今之諸侯攻伐踰竊人瓜者數千萬而自曰義也秦子曰食瓜者雖去蔕何以連其根孫卿子曰臯陶之色如削瓜抱扑子曰五原蔡誕入山而還欺家人云至崑崙山有玉瓜其形如丗間瓜但爲光明洞徹而堅須以玉井水洗之便軟而可食又曰曽參鋤瓜三足烏集其冠孝故也家語曰曽子芸瓜而誤斷其根曽晢怒以大杖擊其背曽子仆地有頃乃蘇孔子聞之告門弟子曰參來勿内也曽子使人請孔子孔子曰舜之事瞽瞍小捶則受大捶則走參委身以待暴怒旣身死䧟父於不義不孝孰大焉古文竒字曰秦改古文爲大篆及隷字周人多誹謗怨恨秦苦天下不從而諸生到者拜爲郎凡七百人蜜種瓜於驪山􆀹谷中温處瓜實成使上書曰瓜冬有實有詔下博士諸生說之人人各異說則皆使徃視之而爲伏機諸生賢儒皆至焉方相難不泱因發機從上填之以土皆壓終古文璅語曰𥘉刑史子臣謂宋景公從今巳徃五月五日臣死後五年五月丁巳吴亡以後五祀八月辛巳君薨刑史子臣至死日朝見景公夕死後吴亡景公懼思刑史子臣之言將至死日乃逃於瓜圃遂死之求得巳䖝矣賈誼新書曰昔梁大夫宋就爲邊縣令與楚隣界梁亭楚亭皆種瓜梁亭劬力數灌其瓜羙楚人窳而稀灌其瓜惡楚令以梁瓜之美怒其瓜之惡因徃夜竊搔梁瓜皆有焦者矣梁亭覺請其尉欲執搔楚瓜宋就曰是構怨分禍之道也令人竊爲楚亭夜灌其瓜令勿知也楚亭旦而徃瓜則巳灌瓜日以美楚亭徃而察之則梁亭之爲也楚令大恱因以聞楚王楚王聞之恱梁之隂讓也乃謝以重幣而友於梁王新序同裴淵廣州記有瓜冬熟號爲金叙味乃甜美廣志曰瓜之所出以遼東廬江燉煌之種爲美有鳥瓜狸頭瓜蜜䇶瓜女臂瓜龍蹄瓜羊髓瓜又有魚瓜犬瓜如斛出涼州陽城瓜有青登瓜大如三升魁有桂枝瓜長二尺餘蜀地温食瓜至冬熟有春日瓜細小小瓣冝藏正月種三月成有秋泉瓜秋種十月熟形如羊角色蒼黒列仙傳曰溪人者南郡編人居山間有仙人常止其家從之買瓜教之練瓜與附子桂實服之一年能飛登山入水徃來海邊又曰服閭者不知何許人常徃來海邊諸祠中有三仙於祠中博賭瓜雇閭使擔黄瓜數十頭令瞑目乃上方大山神仙傳曰葛公冬爲客設生瓜漢武内傳曰西王母謂上元夫人曰後造朱炎山陵食靈瓜其味甚好頋此未乆巳七千歳矣又曰仙之上藥有空同靈瓜四刼一實也道學傳曰禇雅字玄通人與共居常取水洒掃或夏月種瓜恣人來取㐲侯古今注曰孝平帝元年武陵縣生瓜花如䓗紫色實如小麥墮地復生郭子横洞冥記曰有龍肝瓜長一尺花紅葉素生於氷谷所謂氷谷素葉之瓜零陵仙賢傳曰李融宇元者承陽人固始侯相使其爲政得吏民心屢致祥瑞甘瓜六子共莖璽書慰勞遷廣漢太守南岳夫人内傳曰夫人姓魏名華存性樂神仙季冬之月夜半清明有四真人並可年二十餘天姿秀頴至静室因設酒肴陳玄紫撩降實靈爪太上黄庭内景經注曰大霍山下有洞䑓司命君之府也中有神靈瓜食之者至玄也荆楚歲時記曰七月七日設瓜果於庭中以乞巧有喜子布網於瓜上則爲得巧劉向別録曰尹都尉書有種瓜篇鄭玄別傳曰民有獻嘉瓜者異夲同實縣欲表府文詞鄙略君爲改作又著頌一篇侯相髙其才吴越春秋曰吴夫差爲越所敗遁而去得自生之瓜其實巳熟掇而食之問左右曰是乃冬有瓜近道而人不食何也左右曰盛夏之時人食生瓜起居道傍瓜子復生故人惡食夏侯曽先㑹稽記曰曹娥父溺死娥見瓜浮其豦即得父屍博物志曰人以冷水自漬至膝可頓啖數十枚瓜漬至腰啖轉多至頸可啖百餘枚所漬水皆作瓜氣瓜味搜神記曰吴時有徐光常行幻術於市里從人乞瓜其主弗與便從索瓣種之俄而瓜蔓延生花實乃取食之因賜觀者及視所賫皆亡耗矣幽明録曰安定人周敬種瓜時亢旱鬼爲槤音輦水澆瓜瓜大滋䌓問姓名不荅還白父甞有惠於人否父曰西郭樊營先作郡吏償官數百斛米我時以百斛助之其人巳死又曰孫鍾冨春人堅父也與母居至孝篤信種瓜爲業有三少年容服妍麗詣鍾乞瓜愛樂無巳爲設食出瓜禮敬殷勤臨去曰我等司命感郎見接之厚送出門三人曰山中可作塜復言欲連丗封侯爲數丗天子鍾曰數丗天子言訖悉化成白鵠列異傳曰遼東丁伯昭自說其有客字次節旣死感見待㤙常爲本家致竒異物試臈月中從索瓜得美瓜數枚來在前不見形也𫐠異記曰䂊章郡有盧松村羅根生於此村側墾荒種瓜又於外立一神壇瓜始引蔓清晨行之忽見壇上有新板墨書曰此是神地所遊處不得停止種殖可速去根生拜謝跪呪曰竊疑村人利此熟地生苗容或假託神旨以見驅斥審是神教願更朱書賜報明早徃㸔向板猶存悉以朱代墨任昉𫐠異記曰漢章帝元年上虞獻雙蔕瓜一實五色又曰吴桓王時㑹稽生五色瓜今吴有五色瓜歳充貢獻五行記曰梁吏部尚書何敬容夏患瘧疾寄在蔣山道士館時忽見一人玄衣大帽立在帳側自稱楊胡靈將瓜四枚云與公少時言訖因不見後數月敬容以罪免官夲草經云瓜一名土芝吴氏夲草曰瓜子一名瓣七月七日採可作靣脂劉禎瓜賦曰禎在曹植坐厨人進瓜禎爲立成辭曰含金精之芳流冠衆瓜而作珎設諸清流一浮一藏片以金刀四剖三離承之雕盤幕以纎絺甘侔蜜房冷甚氷圭嵇含甘瓜賦序曰丗云三芝瓜處一焉謂之土芝張載瓜賦曰羊骹虎掌桂枝蜜䇶玄表丹裏呈素念紅豊敷外偉緑瓤内醲傅玄瓜賦曰白者如素黒者如􅃮黄踰金箱青侔含翠舊有蜜䇶及青括樓嘉味溢異鮮類寡疇一齧之頃至三揺頸細飢蜜理多瓤少瓣豐旨絶異食之不䬼音烏懸切陸機瓜賦曰夫其種族頭數則括樓定挑黄扁白搏金釵蜜䇶小青大班玄骭音幹素腕狸首虎磻東陵出於秦谷桂髓起於巫山夏侯孝若梁田賦曰入果林造瓜田摘虎掌拾黄班落蔕離母漬以寒泉左思蜀都賦曰其圃有瓜疇芋區王廙洛都賦曰瓜則桂枝括樓緑瓤青飢消暑湯䬼解渴療飢樂府歌詩曰君子防未然不處嫌疑間瓜田不納履李下不整冠古詩曰甘瓜抱苦蔕美草生荆棘愛利防有刀貪人自還賊阮籍詩曰昔聞東陵瓜近在青門外連畛短阡陌母子相拘帶張華真人篇曰朱李生東苑甘瓜出西郊曹植求祭先王表曰乞請水瓜五枚太平御覽卷第九百七十八
