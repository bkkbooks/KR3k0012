front:
  text: 太平御覽卷第八百二十三資産部三
  hash: sha256:22b95a83b6fd13eccdc8856703cb7d426d7a033728cd36dbd3dd0acf1d431cdb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_823-1a}
body:
  text: 耒耜犂耦種殖耘耔耨钃耰銍銚鏄耒釋名曰耒耜也古史考曰神農作耒耜世夲曰咎繇作耒耜周禮冬官考工下曰車人爲耒庇長尺有一寸中直者三尺有三寸上句者二尺有二寸鄭司農云耒謂耜耒庇讀為其顙有庇之庇謂耒下歧玄謂庇讀爲棘刺之刺耒下前曲接耜自其庇縁其外以至於首以弦其内六尺有六寸與歩相中也縁外六尺有六寸内弦六尺應一歩之尺數耕者以田器爲度冝耜異材不在数中堅地欲直庇柔地欲句庇直庇則利推句庇則利發倨句磬折謂之中地中地之耒其庇與直直者如磬折則調矣調則弦六尺禮記月令季冬曰氷巳入令告人出五種命農計耦耕事脩耒耜具田器氷旣入而令有司告人出五榖之種明大寒氣過農將興修田器韓詩曰三月之時可預取耒耜脩繕之至於四月始可以舉足而耕也魏志曰叚灼上䟽理鄧艾曰昔姜維有斷隴之志艾修治備守積榖彊兵值歳凶旱又爲區種身𬒳鳥衣手執耒耜以率將士上下相感莫不盡力梁書曰賀革字文明少以家貧躬耕供養年二十始輟耒就父受業精力不怠唐書曰永徽三年髙宗親享先農躬御耒耜淮南子曰清英之美始於耒耜清英酒也耜釋名曰耜齒也如齒之斷物也周禮地官下山虞曰凡服耜斬季材以時入之季猶稺也服與耜冝用穉材尚柔刃也服此服車之材又秋官下曰薙氏掌殺草春始生而萌之夏日至而夷之秋繩而芟之冬日至而耜之鄭玄謂萌之者以兹其斫其生者夷之以鈎鎌迫地芟之也若今取茭矣含實曰䋲芟其䋲則實不成熟耜之以耜測凍士剗之禮記禮運曰治國不以禮猶無耜而耕也無以入也毛詩國風曰三之日于耜四之日舉趾同我婦子饁彼南畝田畯至喜三之日夏正月也豳士晚寒于耜始脩耒耜也四之日周四月也民無不舉足而耕矣又小雅大田曰以我覃耜俶載南畝覃利也時至民以其利耜熾菑發所受之地趨農巳急也又周頌曰良耜秋報社稷也畟畟良耜俶載南畝播厥百榖實函斯活畟畟猶測測也箋云良善也農人測測以利善之耜熾菑是南畝也種此百穀其種皆成好含生氣言得其時王隱晉書曰徐苗少孤家貧好學書晝執耒耜夜不廢讀誦後魏書曰趙琰遣人買耜刄得剰利六百即命送還刃主刃主髙之義而不受琰命委之而去唐書曰髙宗行籍田之禮躬執耒耜而九推焉禮官奏陛下合三推上曰朕以身率下自當過之恨不終於千畝耳𥘉將籍田先止于先農之壇因閱耒耜有雕刻文飾者謂左右曰田器農人執之在於朴素心豈貴文飾乎及乃命徹之國語曰周制有人曰民無懸耜言常用入士曰耜耜柄曰耒野無奥草皆墾辟與深也吕氏春秋曰六尺之耜所以成畝其博八寸所以成畎髙誘注曰六尺爲畝三尺爲畎犂釋名曰犂利也利則發土絶草根也魏略曰皇甫隆爲燉煌太守民不曉作樓犂用工甚費隆乃教作樓犂省力過半又曰弘農太守劉類多市犂鎋載所部貿絲管子曰距國門以外窮四竟之内丈夫二犂童子五尺一犂以爲三日之功令農始作服于公田鹽鐵論曰庶人乗馬者足以代勞而巳故行則服軛止則就犂下種軛樓皆取備焉日種一頃至今三輔猶頼其利遼東耕犂轅長四尺廻轉相妨旣用兩牛兩人牽之一人耕一人種二人軛樓凡用兩牛六人一日則種二十五畝其懸絶如此陳留耆舊傳曰蕭令陳弇字叔明躬自握犂種五種榖有黄雀隨犂翔上崔寔政論曰武帝以隨遇爲搜粟都尉教民耕植其法三犂共一牛一人將之唐書曰天寳𥘉開砥柱之險以通流石中得古鐵犂鏵有平陸縣字因改河北縣名爲平陸縣後唐史明宗上顧謂侍臣曰朕昨日出城觀稼見百姓父子三人同曳犂耒者力農如是深軫子懷可賜耕牛二頭耦說文曰耦耕廣五寸爲伐二伐爲耦周禮地官下曰里宰以歳時合耦于耡以治稼穡趨其耕耨行其秩叙以待有司之政令而徴斂其財賦考工記日耜廣五寸二耜爲耦此言兩人相助耦而耕也鄭司農云耡讀爲籍杜子春云耡讀爲助謂相佐助又冬官曰匠人爲溝洫主通利田間之水道耜廣五寸二耜爲耦一耦之伐廣尺深尺謂之􅍒田首倍之廣二尺深二尺謂之遂古者耜一金兩人併發之其壟中曰􅍒畎上日伐伐之言發也􅍒畎也今之耜岐頭兩金象古之耦也毛詩周頌曰駿發爾私終三十里亦服爾耕十千維耦私民田也言上欲冨其民而讓於下欲民之大發其私田耳終三十里言各極其望也於是民大事耕其私田萬耦同時舉也國語曰呉王還自伐齊乃誶申胥誶吉讓也曰昔吾先王體徳聖明逹于上帝先王闔廬上帝天也譬如農夫作耦以刈殺四方之蓬蒿爲言子胥佐先王猶耕者之有耦以成其事董仲舒云禹見耕者五耦而軾過十室之邑而下見山仰之見谷俯之種殖周禮地官大司徒之職曰辨十有二壤之物而知其種以教稼穡樹藝禮記月令曰孟春行冬令則水潦爲敗首種不入舊說云首種謂稷也又仲秋曰是月也勸人種麥無或失時又禮運曰爲禮不夲於義猶耕而弗種也嘉穀無由生也尚書洪範五行曰土爰稼穡種曰稼斂曰穡土可以耕可以歛稼穡作甘甘味生於百穀尚書酒誥曰妹土嗣爾股肱純其藝黍稷奔走事厥考厥長今徃當使妺土之人繼汝股肱之教爲純一之行其當勤種黍稷奔走土其父兄也尚書考靈耀曰春鳥星昏中以種稷鳥朱鳥謂鶉火夏火星昏中以種黍菽火大火也孝經援神契曰土黃白冝種禾黒墳冝黍麥蒼赤冝菽汙泉宜稻說文曰禾之秀實曰稼莖節爲禾從禾家聲一曰稼家事也一曰在野曰稼史記曰棄爲兒時其游戯好種樹麻菽漢書曰景帝三年春正月詔曰農天下之夲也黃金珠玉饑不可食寒不可衣以爲弊用不識其終始間歳或不登意爲末者衆農民寡也其令郡國務勸農桑益種樹可得衣食物吏發民若取庸採黃金珠玉者坐贓爲盗二千石聽者與同罪又曰王莽篡位二年興神仙事以方士蘇樂言起八月臺於宫中臺成萬金作樂其上順風作液湯如淳言藝丈志有液湯經其義未聞又種五梁禾於殿中或日五色禾也先鬻鶴髓鬻音煑也瑇瑁犀玉二十餘物漬種計粟斛成一金言此黃帝榖仙之術以樂爲黄門郎令主之東觀漢記曰范充爲桂陽太守俗不種桑無蚕織絲麻之利類皆以麻枲頭緼着衣民墮窳少麄履盛冬皆以火燎充令屬縣教民益種桑柘養蚕桑織履復令種紵麻數年之間人刺其利衣履温煖呉㑹分地記曰卞山者勾踐於此山鑄銅銅不鑠埋之生馬箠勾踐遣使者取徙於南社種之飾治以爲馬箠獻於呉陳書曰陳靈洗爲重安公性好播植躬勤耕稼至於水陸所冝刈穫早晚雖老農不能及也淮南子曰夫樹林者灌以梁水疇以肥壤疇壟也梁或作潦也一人養之十人㧞之林必無餘枿又曰昬􅓡中則務種糓二月昬時􅓡星中於南方朱鳥之宿也大火中則種黍菽大火東方蒼龍之宿四月建巳中南方也菽豆也虚中則種粟麥北方玄武之宿也八月建酉中於南方也又曰古者民茹草飲水食樹木之實蠃蚌之肉多疹毒傷之患患害於是神農乃始教民播五穀相土地原隰燥濕肥墝髙下百草之滋味水泉甘苦令民知避就當此之時一日而七十毒又曰文公種米吕氏春秋曰氷凍方固后稷不種后稷之種必待春論衡曰后稷爲兒種藝爲戲汜勝之書曰稗水旱無不熟之時又特滋盛易得蕪穢良田畝得二三十斛宜種之以備凶年又稗中有米熟時一可擣取炊之不減粢米又可釀作酒武帝時令典農種之一頃収二千斛斛得米三升大儉可磨食之又曰三月榆莢雨時髙地強土可種禾薄田不能糞者以原蚕矢雜禾種之則禾不虫又取馬骨莝之一石以水三石煑之三沸漉去滓以汁漬附子五枚漬三四日去附子以汁和蚕矢撓如粥先種二十日以溲種曝勿令濕至種時以餘汁溲而種之則不蝗虫無馬骨汁亦可用雪雪者五榖之積也常以冬藏雪汁器盛埋地中治種如此則収萬倍又曰種傷濕鬱熱則生虫取麥種候熟可穫䆁穗大彊者秆束立場之髙燥處無令有白魚取乾艾雜藏之欲知歳所宜以布囊盛粟諸物種平量埋隂垣之下冬至後五十日發取量之息㝡多者歳所冝又曰凡田種麥爲首傷於太稠者鋤而稀之秋以鋤以棘柴曵之以壟麥根故曰子將欲富黃金覆士至春凍解棘柴曵之絶其乾葉到榆莢雨時候土白復鋤如此収必倍冬雨雪止掩雪勿令從風飛去後雪復如此麥能旱多實春凍解耕和土種遊麥麥生成茂大鋤如宿麥也又曰黍者暑也未生心天雨灌其心必傷無實初種時天霧令兩人對持長索戞去其露日出乃止種黍覆出鋤治如禾法欲稀於禾又曰大豆保歳易爲冝古之所備凶年也大豆生載甲而出種土不可厚厚則折項不能上達屈於土中而死又曰種稻春凍解地氣和時耕冬至後百三十日種大稻時也又曰種麻預軟和田二月下旬三月上旬傍雨種其秕又曰種葈春凍解耕治其土春草生布糞田復耕平摩之又曰種小豆忌夘稻忌辰禾忌丙黍忌丑麻忌辰秫忌未寅小麥忌戍大麥忌子大豆忌甲凡九穀忌日不種之避其忌不可敗傷諸事忌禁日此非空言也其道自然若燒黍穰則害瓠也崔寔四民月令曰正月可種葵四月可収冬葵子六月六日可種葵中伏之後可種冬葵八九月可種乾葵物理論曰稼借種也古今之言云余夫稼農之夲也耘說言曰耘除田間穢也左傳昭元年曰晉趙文子曰譬如農夫是穮是蓘穮耘也壅苗爲蓘毛詩甫田曰或耘或耔黍稷薿薿又周頌曰載芟載旅其耕澤澤千耦其耘徂隰徂畛論語曰子路從而後遇丈人以杖荷蓧色曰丈夫老人也蓧竹器子路問曰子見夫子乎丈人曰四體不勤五穀不分孰爲夫子包曰夫丈人云不勤勞四體不分殖五榖誰爲夫子而索之邪植其杖而芸孔曰植倚也除草曰芸宋書曰柳元景顔師伯甞詣沈慶之㑹其逰田元景等鳴笳列卒滿道慶之獨與左右一人在田見之悄然改容曰夫貧賤不可畢富貴亦難守吾與諸公並出貧賤因時際㑹筞貴至此唯當共思損挹之事老子八十之年目見成敗者巳多諸君炫此車服欲何爲於是揷杖而耘不爲之顧元景等徹侍褰裳從之管子曰萬室之都必有萬鍾之藏藏鏹千萬千室之都必有千鍾之藏藏鏹百萬春以奉耕夏以奉耘孟子曰人病舎其田而芸人之田所求於人者重而所以自任者輕賈誼書曰鄒穆公有令食鳬鴈必以秕吏請以粟公曰夫百姓呴牛而耕曝背而芸勤而不敢惰者豈爲鳥獸哉粟養人也何以其養鳥也耔說文曰耔壅禾夲也晉書曰陶潜歸去來曰懷良辰以孤徃或植杖而耘耔耨釋名曰耨似鋤以耨禾也左傳僖公下曰初臼季使過冀見冀缺耨其妻饁之曰季胥臣也冀晉邑耨鋤也野饋曰饁敬相待如賔與之歸言諸文公曰敬德之聚也能敬必有德德以治民君請用之爾雅曰斪斸謂之定郭璞曰鋤屬也犍爲舎人曰拘􅠁名定廣雅曰定耨纂又曰養苗之道鋤耨如銍柄長三尺刃廣三寸以封地除草也魏書曰公孫淵官屬上書曰七營虎士五部蠻夷各懷素飽不謀同心奮臂大呼排門遁出近郊農民釋其耨鏄淮南子曰耨者剡耜而耕摩蜃蜃大蚌也摩令利用耨除草也又曰茢先稻熟農夫耨之者不以小利害大穫茢稈又曰聖人之用兵若櫛髮耨苗所去者少所利者多吕氏春秋曰先生者美米後生者爲秕是故其耨也長其兄而去其弟養大殺小不知稼者其耨也去其兄而養其弟不収其粟而収其秕钃釋名曰钃誅也主以誅除物根株也說文曰钃斫也齊謂兹基一曰斤柄性自曲者也管子曰美金以鑄戈劒矛㦸試諸狗馬惡金以鑄斤斧鉏夷屬欘試諸木士夷鉏類也屬欘钁類又曰匠人有感斤欘故繩可得斷也孟子曰齊人有言曰雖有智慧不如乗勢雖有鎡基不如待時兹基田器耰說文曰耰摩田器也論語曰長沮桀溺耦而耕孔子過之使子路問津焉桀溺曰子爲誰曰爲仲由曰是魯孔丘之徒與對曰然滔滔者天下皆是也誰以易之且而與其從辟人之士也豈若從辟丗之士哉耰而不輟賈誼書曰秦民借父耰鋤猶有德色銍廣雅曰銍謂之刈綦文曰江湖以銍爲刈也尚書禹貢曰二百里納銍銍刈謂禾穗也說文曰銍穫禾短鎌釋名曰銍穫禾鐵也銍銍斷禾穗聲也銚說文曰錢銚也古田器也世夲曰倕作銚管子曰一農之事必有一銚然後成農鏄釋名曰鏄亦鋤類迫也迫地去草也毛詩周頌良耜曰其饟伊黍其笠伊紏其鏄斯趙以荼蓼又周頌臣工曰命我衆人庤乃錢鏄奄觀銍艾庤其錢銚鑄銍穫也箋云奄觀多也教我庶民具女田器終乆必多銍艾觀之也太平御覽卷第八百二十三
