front:
  text: 太平御覽卷第二百六十八
  hash: sha256:2a9b432179c68186ed74f4bf13111188cf0cebb631510130a5dff86501c1780c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_268-1a}
body:
  text: 職官部六十六良令長下崔鴻十六國春秋北凉録曰張譚字元慶武威姑臧人也爲和寧令政以德化爲本不務威刑民有過者讀孝經及忠臣孝子傳訓導之百姓愛之如父母號曰慈君又後趙録曰王謨字思賢甕鼻言不清暢尫短無威儀將拜曲陽令石勒疑之問長史張賔賔曰請試可勒從之政教嚴明百城尤最出爲都部從事守宰去官者十五人又後趙録曰申録字道時爲廣昌令白烏巢其庭樹甘露降其㕔事後爲三公北齊書曰郎茂除衛國令時有擊囚二百茂親自究審數日擇免者百餘人歴年辭訟不詣州省魏州刺史元暉謂曰長史言衛國人不敢申訴者畏明府耳茂曰人猶水也法令爲隄防不固必致奔突茍無决溢使君何患哉暉無以應後周書曰辛昻行成都令昻到縣便與諸生祭文翁學堂因共歡宴謂諸生曰子孝臣忠師嚴友信立身之要如斯而巳若不事斯語何以成名冝自勉克成令譽昻言切理至諸生等深感悟歸而告其父老曰辛君教誡如此不可違之於是井邑肅然咸從其化陳書曰禇玠山隂縣多豪猾前後令皆以贓汙免髙宗患之謂中書舎人蔡景歴曰稽隂大邑乆無良宰卿文士之内試思其人景歴進曰禇玠廉儉有幹用未審堪其選不髙宗曰甚善卿言與朕意同乃除山隂令隋書曰魏徳深遷貴郷長爲政清浄不嚴而治㑹興遼東之役徴稅百端使人往來責成郡縣于時王綱㢮紊吏多贓賄所在徴歛下不堪命唯德深一縣有無相通不竭其力所求皆給百姓不擾稱爲大治㝷轉館陶長貴郷吏人聞之皆歔欷流涕語不成聲及將赴任傾城送之號泣之聲道路不絶旣至館陶闔境老㓜皆如見其父母有猾人貟外郎趙君寔與郡丞元寳藏深相交結前後令長未有不受其指麾者自德深至縣君寔屏處於室未甞輙敢出門逃竄之徒歸來如市貴郷父老冒渉險難詣闕請留德深有詔許之舘陶父老復詣郡相訟以貴郷文書爲詐郡不能决㑹持節使者韋霽杜整等至兩縣詣使訟之乃斷從貴郷貴郷吏人歌呼滿道互相稱慶舘陶衆庻合境悲哭因而居住者數百家隋書曰蘇威薦房恭懿授新豐令政爲三輔之最上聞而嘉之賜物四百叚恭懿以所得賜分給窮乏未幾復賜米三百石恭懿又以賑貧人上聞而止之時雍州諸縣令毎朔朝謁上見恭懿必呼至榻前訪以理人之術又曰房彦謙遷長葛令甚有惠化百姓號爲慈父仁壽中上令持節使者廵行縣察長吏能不以彦謙爲天下第一超授鄀州司馬吏民號哭相謂曰房明府今去吾屬何用生爲其後百姓思之立碑頌德又曰劉曠不知何許人也性謹厚毎以誠恕應物開皇𥘉爲平郷令單騎之官人有争訟者輙丁寧暁以義理不加繩劾自各引咎而去所得俸禄賑施窮乏百姓感其德化更相篤勵曰有君如此何得爲非唐書曰李大亮授土門令屬百姓饑荒盗賊侵冦大亮遂賣所乗馬分給貧弱勸以墾田歳因大稔躬捕冦盗所擊輙平時太宗在藩廵撫北境聞而嗟歎下書勞之又曰賈敦頥弟敦實貞觀中爲饒陽令政化清静老㓜懷之時敦頥復授瀛州刺史舊制大功以上不復連官朝廷以其兄弟在職俱有能名遂不遷替又曰髙宗以尚乗奉御權懷恩爲万年令賞能也時有奉乗安畢羅善於調馬上頗狎之懷恩因奏事遇畢羅在左右言戯無禮懷恩旣退執而杖之上知而嗟賞謂侍臣曰懷恩乃能不避強禦真良吏也即日遷擢又曰景雲中長安縣令李朝隱加太中大夫朝隱之宰京縣也政刑畢舉權豪懾憚有内寺伯非禮千忤朝隱叱擊于獄上喜焉故有此命又曰路嗣恭京兆三原人始名劒客歴仕郡縣有能名後授神烏令考績上上而爲天下最玄宗以其能嗣魯恭賜改其名又曰韋景駿開元中爲肥郷令縣人有母子相訟者景駿謂之曰吾少孤毎見人養親自痛終天無分汝幸在温凊之地何得如此錫類不行令之罪也因垂泣嗚咽仍取孝經與之令習讀於是母子感悟各請改悔遂稱慈孝累轉趙州長史路由肥郷人吏驚喜竟來犒餞留連經日有童稚數人年甫十餘歳亦在其中景駿謂曰計吾去此時汝軰未生旣無舊恩何慇勤之甚也咸對曰比聞長宿傳說縣中廨宇學堂舘舎堤橋並是明公遺跡將謂古人不意親得瞻覩不覺欣戀倍於常也其爲人所思如此又曰馮伉遷尚書膳部貟外郎李抱真卒充弔贈使抱真男遺伉帛數百疋不納又專送至京伉因表奏固請不受屬醴泉闕縣令宰臣進人名上意不可謂宰臣曰前使澤潞不受財帛者此人必有清政可以授之遂改醴泉縣令患百姓多昏猾爲著諭蒙十四篇大指明忠孝仁義勸學務農毎郷給一卷俾其傳習又曰元徳秀字紫芝河南人也爲魯山令先是墮車傷足不任趨拜汝郡守以客禮待之部人爲盗吏捕之繫獄㑹縣界有猛獸爲暴盗自陳曰願格殺猛獸以自贖德秀許之胥史曰盗詭計苟免擅放官囚無乃累乎德秀曰吾不欲負約累則吾坐必請不及諸君即破械出之翌日格猛獸而還誠信化人大率此類又曰王敬則爲曁陽令時軍荒後縣有一部刼逃入山中頗爲人患敬則遣人致意刼帥使出首當申論郭下廟神甚酷烈百姓信之敬則引神爲誓必不相負刼帥旣出敬則於廟中設酒㑹於座收縳曰吾啓神若負誓還神十牛今不得違誓即殺十牛解神并斬諸刼百姓恱之晉史曰壽張令趙賡考滿之外量留二年以飛蝗避境故也廣州先賢傳曰黄豪字子微交阯人除外黄令豪約已儉節麄衣𬞞食所得俸秩悉賜貧吏一縣稱平益部耆舊傳曰羅衡字仲伯爲万年令誅鋤姦黨縣界肅然民夜不閉門繫牛馬於道旁曰以屬羅公又曰趙珜字孫明少好遊俠行部帶劒過亭長亭長譴之乃歎曰無大志故爲竪吏所輕耳於是解劒掛壁曰珜不乗輜車佩紱不復帶劒因之京師詣太學受業治春秋變行厲操名德遂稱除野王令乃解劒帶之官治官清約以身率下烟火不舉常食乾糒又曰閻憲字孟度爲綿竹令治以禮讓爲首寛猛相濟其聽察甚明簡選吏職甚得其人男子杜成夜於路得遺裝一囊開視有錦二十五疋迄明詣吏曰縣有明君不能慙心故也又曰楊球字仲宣爲茂陵令寛和多惠以至誠接下爲民所愛比縣連歳蝗災曲折不入茂陵長沙耆舊傳曰祝良字邵卿爲洛陽令貴戚歛手桴鼓稀鳴時亢旱天子祈雨不得良乃暴身階庭告誠引罪紫雲沓起甘雨乃降陳留風俗傳曰昭帝時蒙人焦貢爲小黄令路不拾遺囹圄空虚詔遷貢百姓揮涕守闕求索還貢天子聽増貢之秩千石貢之風化猶存其民好學多貧此其風也海内先賢傳曰公沙穆遷弘農令界有蝗虫食禾稼百姓惶懼穆設壇謝曰百姓有過咎在典掌罪穆之由請以身禱玄雲四集雨下霶霈自日中至晡不知蝗虫所在百姓稱曰神明魯國先賢傳曰孔翊爲洛陽令置水於前庭得私書皆投其中一無所發彈理貴戚無所廻避汝南先賢傳曰黄浮字隱公陽安人年二十在於民伍曽爲墟里所差次當給亭於是感激學書慨然長歎曰黄浮非郷里所知因隨人到京師求學歳餘除昌慮長濮陽令同歳子爲都市掾犯罪當死一郡盡爲之請浮曰周公誅二弟石碏討其子今雖同歳子浮所不能赦也治政清明號爲神君又曰陳曄邵陵人也體尚篤烈學通古今除巫令民張遺腹子年十五爲父報讎吏捕得之曄愍曰嗟乎今殺遺腹之孤絶人繼嗣是不仁也法復讎之子是不義也不仁不義焉可以爲人君長哉遂解印綬逃亡遇赦乃出鍾玩良吏傳曰髙玩字伯珎蜀郡人也除曲陽令乃徴還送者不使出界布𬒳緼裘猶去時之服朝野歸其清又曰司馬儁字元異𥙷洛陽令豪右挫氣京都號曰卧虎又曰陳登字元龍廣漢人也爲東陽長視民如子崔氏家傳曰崔瑗爲汲令乃爲開溝造稻田薄鹵之地更爲沃壤民頼其利長老歌之曰天降神明君錫我慈仁父臨民布德澤恩惠施以序穿溝廣漑灌决渠作甘雨殷氏傳曰殷裒爲滎陽令先多淫雨百姓飢饉君乃穿渠入河三十餘里䟽導原隰用致豊年民頼其利號殷溝而頌之鍾離意別傳曰意遷東平瑕丘令男子倪直勇悍有力便弓弩飛射走獸百不脫一桀悖好犯長吏意到官召署捕賊掾勑謂之云令昔甞破三軍之衆不用尺兵甞縛暴虎不用尺繩但以良詐爲之耳掾之氣勢安若冝愼之因復召直子渉署門下將游徼私出入寺門無所關白收渉鞭之直走之寺門吹氣大言言無上下意氣勑直能爲子屈者自縛誡令不則鞭殺其子直果自縛意告曰令前告汝甞縛暴虎不用尺繩汝自視何如虎自縛耶勑獄械直父子結連其頭對榜愽壯切欲死掾吏陳諌乃貸之由是相率爲善所謂上德之政鷹化爲鳩暴虎成狸此之謂也荀氏家傳曰荀貌除太原榆次令爲政以德人懷之時有鳯凰集其境内晉武帝下詔褒美太始三年卒吏人如喪親戚爲之樹碑其序曰仰之如日月敬之如神明愛之如父母樂之如時雨典略曰韓攸字仲潢潁川人爲嬴長時民大飢而太守未至攸因發倉賑之吏白言太守垂至軍糧重事可湏來到攸言民命懸急令以擅出榖受罪合眼入地不以爲恨也後竟不坐吏民蒙濟者數千人㑹稽典録曰徐引字聖通爲汝隂令縣俗剛強大姓兼并引到官誅剪姦桀豪右歛手啇旅路宿道不拾遺童歌之曰徐聖通政無雙平刑罰姦宄空華陽國志曰王長文字德儁元康𥘉試守江源令縣收得盗馬賊及發冢賊長文引見誘慰時適臘晦皆遣歸家獄先有繫囚亦遣之謂曰教化不厚使汝等如此長史之過也蜡節慶祚歸就汝上下善相懽樂過節來還當爲汝思他理郡吏惶懼争請不許㝷有赦令無不感恩又曰景毅字文堅梓潼人爲髙陵令立文學以禮讓化民遷侍御史吏民守闕請之三年不絶捜神記曰徐栩字敬卿吴曲拳人少爲獄吏執法詳平爲小黄令時屬縣大蝗野無生草至小黄界飛過不集山公啓事曰温令許竒等並見稱名雖在職各日淺冝顯報大郡以勸天下詔曰案其資歴悉自足爲郡守各以在職日淺則冝盡其政績不冝速他轉也愽物志曰太子望爲灌壇令朞年風不鳴條文王夢見一婦人甚麗當道而哭問其故婦人言曰我東海太山神女嫁爲西海婦欲東歸灌壇令當吾道太公有德吾不敢以暴風疾雨過也文王夢覺明日召太公三日果有疾風暴雨去者皆西來也說苑曰晏子治東阿三年景公召而數之曰吾以子爲可而使子治東阿今子治而亂子退而自察也寡人將加大誅乎晏子曰臣請改道易行而治東阿三年不治臣請死之景公許之於是明年上計景公迎而賀之曰善矣子之治東阿也晏子對曰前臣之治東阿屬託不行貨賂不至陂池之魚以利貧民當此之時民無飢者而君反以罪今臣之治東阿也屬託行貨賂至事左右陂池之魚入權家民之貧飢者過半君反迎而賀臣臣願乞骸骨景公乃下席而謝曰子強復治之東阿者子之東阿也寡人無復與焉新序曰昔子竒年十八齊君使之治阿旣行矣悔之使使追曰未至阿及之還之巳至勿還也使者及之而不還君問其故對曰臣見使與共載者白首也夫以老者之智以少者之决必能治阿矣是以不還又曰魯君使宓子賤爲單父宰子賤辭去因請借善書者二人其憲法教品魯君與之至軍父使書子賤從旁引其肘書醜則怒之欲好則引之書者患之請辭而去歸以告魯君魯君曰子賤苦吾擾之使不得施其善政也乃命有可無得擅徴發單父單父大治故孔子曰君子哉若人魯無君子者斯焉取斯美其德也太平御覽卷第二百六十八
