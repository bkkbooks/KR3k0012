front:
  text: 太平御覽卷第九百一
  hash: sha256:07276b7e0e2c2a04483ca079395245661b2a979fde032437cdd74a9ac69f7222
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_901-1a}
body:
  text: 獸部十三驢騾橐駞驢說文曰驢似馬長耳也何承天纂文曰驢一曰漠驪其子曰􅐒史記曰匈奴竒畜即驢騾也漢書西域傳曰烏桓國有驢無牛後漢書曰薊子訓漢末入市投主人家停其驢忽死時夏月蛆從驢口中出主人見之白訓訓曰無苦遂徃驢邊舉杖驢忽走起又曰永平中更用驢輦歲省億萬計全活徒士數千人又曰戴良字叔鸞其母喜驢鳴常學之以娯樂晉書曰王濟卒將葬時賢無不畢至孫楚雅敬濟而後來哭之甚悲客莫不垂涕哭畢向靈牀曰卿嘗好我作驢鳴我爲卿作之體似聲真賔客皆笑楚頋曰諸君不死而令王濟死乎丗說曰王仲宣好驢鳴旣葬魏文帝臨其喪頋語同遊曰王好驢鳴可各作一聲以送之赴客皆作驢鳴呉志曰諸葛恪父瑾長面似驢孫權大㑹群臣使人牽一驢入長檢其面題曰諸葛子瑜也恪對跪乞請筆益兩字續其下曰之驢舉坐欣笑以驢賜恪晉陽春秋曰晉文帝親阮籍恒與譚戯任其所欲不迫以職事籍從容嘗言曰平生曽遊東平樂其士風願得爲東平太守文帝大恱即從其意籍便騎驢徑到郡至皆壞府舎諸壁鄣使内外相望然籍教令清整常留十餘曰便乗驢去又曰胡威字伯虎父質爲荆州威自京都省之家貧無車馬僮僕威自駈驢單行拜見告歸每至客舎自放驢取樵㸑食畢復隨侣而進晉書曰石苞旣定夀春以威惠服物淮南監軍王環輕苞素微又聞童謡曰官中大馬幾作驢大石壓之不得舒因是宻表苞與呉人交通又曰王導諸葛恢曰人言王葛不言葛王恢曰人言驢馬不言馬驢豈驢勝馬也沈約宋書曰後廢帝昱於耀靈殿上飬驢數十又曰吏部尚書庾仲文荀萬秋嘗詣仲文逢一客姓夏侯主人問有好牛不言無問有好馬不又言無正有佳驢耳仲文便荅云甚是所欲客出門遂與相問索之齊書曰劉祥傳才慠物常謂一驢曰汝弩力如汝人才俱爲令僕矣又曰謝超宗爲人仗才使酒齊髙帝問以北方事超宗對失儀出爲南郡王中軍司馬人或問曰聞有朝命定是何府荅曰不知是司馬爲復是司驢旣是驢府正應是司驢爲有司所奏以怨望免後魏書曰元坦慠很凶麁安豊王延明每切責之曰昔宋有東海王禕志性凡劣人號曰驢王我熟觀汝所作亦恐不免驢當時聞者號爲驢王三國典略曰東魏静帝遷都鄴尚書郎巳下盡令乗驢又曰齊蕭慤爲太子洗馬慤字仁祖常患腰痛昡不堪馳馬齊主令乗驢以從見者笑之北史曰公孫䡄拜尚書賜爵郡公出爲武牢鎮將𥘉太武將北征發驢以運粮使䡄部調雍州䡄令驢主皆加絹一百疋乃與受之百姓語曰驢無弱負絹自壯衆共嗤之又曰後魏車駕徃征蠕蠕司馬楚之與濟隂公盧中山等督運以繼大軍時鎭北將軍封沓亡入蠕蠕說令擊之以絶運蠕蠕乃潜遣覘楚之軍截驢耳而去有告失驢耳者楚之曰必覘賊截之爲驗耳賊將至矣乃伐栁爲城水灌令凍城立而賊至不可攻逼乃走散太武聞而嘉之唐書曰郭英乂鎮劒南取女人令乗驢擊毬以寳鈿爲驢鞌賞賜巨萬以爲笑樂風俗通曰靈帝於宫中西園駕四白驢躬自操轡駈馳周旋以爲大樂於是公卿貴戚轉相倣至乗軿以爲騎從價與馬齊又曰凢人相罵曰死驢醜惡之稱也董卓陵虐王室執政皆如死驢漢志曰靈帝駕四驢親自操轡驢者服重征逺上下山谷野人之所用耳何有帝王君子而驂駕之乎天意若曰國且大亂賢愚倒植凡執政者皆如驢焉金樓子云漢靈帝飬驢數百頭常自騎之駈馳遍京師有時駕四驢入市符子曰有驢仙者享五百嵗負乗而不輟歴無定主大驛於天下丗說曰孝武帝未嘗見驢謝太傅問陛下遥想其形當何所似孝武掩口而笑荅曰頭當似猪續搜神記曰石虎中有一胡道人知呪術乗驢作賈客於外國深山中行下有絶澗窅然無底忽有惡鬼偷牽此道人驢下入澗道人㝷跡呪誓呼諸鬼王湏臾即驢物如故國朝傳記曰武后𥘉稱周恐下心不安乃令人自舉供奉官正貟外多置裏行拾遺𥙷闕御史至有車載㪷量之詠有御史臺令史將入室值裏行御史數人聚立門内令吏不下驢衝過其間諸御史大怒將杖之令史云今日之過實在此驢乞先數之然後受罰御史許之謂驢曰汝伎藝可知精神極鈍何物驢畜敢於御史裏行於是羞𧹞而止楚辭曰驥垂兩耳中阪蹉跎蹇驢服駕無用日多又曰駕蹇驢而無䇿又何路之能極臧彦吊驢文曰爰有竒人西州之馳驅者體質強直禀性沉難聦敏寛詳髙音逺暢真驢氏之名駒也宋袁淑俳諧文曰驢山公九錫曰若乃三軍陸邁粮運艱難謀臣停筭武夫吟歎尓乃長鳴上黨忼慨應官﨑嶇千里荷囊致飱用捷大勲万丗不刋斯實爾之功也音隨時興晨夜不黙仰契玄象俯叶漏刻應更長鳴毫分不却雖挈壷著稱未足比德斯復爾之智也若乃六合昏晦三辰幽冥猶憶天時用不應聲斯又爾之鳴也青脊綘身長頰廣額脩尾後垂巨耳雙礫斯又爾之形也嘉麥旣熟寔湏精麺負磨廻衡迅若轉電惠我衆庶神祇獲薦斯又爾之能也爾有濟師旅之勲而加之以衆能是用遣中大夫廬丘加廬尓使銜勒大鴻臚班脚大將軍宫亭侯以楊州之廬江江州之廬陵呉國之桐廬冷浦之朱盧封爾爲中驢公騾廣志云騾北方或曰罔說文曰騾驢父馬母也崔豹古今注曰驢為牡馬爲牝即生騾馬爲牡驢爲牝即生騰􆄄史記曰大將軍衛青圍匈奴匈奴薄暮乗六騾壯騎可數百冒圍去追之不及漢書曰髙昌性難伏乃作歌曰驢非驢馬非馬言髙昌似騾也三國典略曰齊陽休之嘗乗騾遊於公卿門略無慙色又曰侯莫陳恱旣敗與其子弟及麾下數十騎遁走至牽屯山不知所趣乃弃馬山谷乗騾而去唐書曰呉元濟叛其將有董重質者守洄曲其部下乗騾即戰號騾子部㝡爲勁悍官軍恒警備之吕氏春秋曰趙簡子有兩白騾而甚愛之陽城胥渠豦黃門之官夜欵門而謁曰主君之臣胥渠有疾醫教之曰得白騾肝病則止不得則死謁者入通董安于御於側愠曰譆胥渠也欺君請即刑焉簡子曰夫殺人以活畜不亦不仁乎殺畜以活人不亦仁乎於是令庖人殺白騾取其肝以與陽城胥渠豦無㡬何趙興兵而攻翟黄門之官左七百人右七百人皆先登而獲甲首人主胡可以不好士抱朴子曰丗不信騾乃驢馬所生云各自有種况乎仙者難知之事哉魯女生别傳曰李少君死後百餘日後人有見少君在河東蒲坂乗青騾帝聞之發棺無所有洞冥記曰脩弥國多神馬騾驢驢髙十丈毛色皎然能行水上有兩翼或飛於海上常與牝馬合則生神騾又曰元封四年脩弥國獻駮騾髙一丈毛色赤班皆山毛旋成日月之象常以金珤物器盛蒭以飼之置於黄門廐東方朔曰此六畜之下者無爲深愛昔夏侯淫于原獸以亡其國况戎翟獻其鄙獸費財毀德非所以示天下也楚莊好馬叔敖知其失政願陛下省物全國家之機事騾鄙獸冝置之於負乗不用則弃之於野上乃放之後野人見有赤虵自天屬地有雲氣來繞地及雲除虵復變爲赤龍騎之入雲有人來告上曰滑稽児使我失龍矣朔曰龍何難值恐陛下費金珤終化爲驢騾耳帝納其言而深忌之呉暦曰朱據討沓中獲驢騾二千餘頭晉書曰乗傳使者賣官出使遭周親䘮以上皆自表聞聽得白服乗騾車晉諸公讃曰劉禪降乗騾車詣鄧艾神仙傳曰葪子訓齊人也到京師諸貴人欲見之子訓曰我非有重曈八采欲見我見我亦無所道遂去諸貴人皆逐之問人云適去東陌上乗騾者是乃各走馬逐之望見子訓騾徐行而名馬逐之不及乃各罷歸橐駞淮南子曰橐駞之本出泉渠廣志曰天笁以北多馲駞山海經曰號山陽之光山獸多槖駞善行流沙中日三百里負千斤史記匈奴傳曰其竒畜則橐駞又曰蘇秦傳曰蘇秦說楚威王曰大王誠能用臣之愚計則燕代橐駞良馬必實外廐漢書西域傳曰鄯善國多馲駞東觀漢記曰河西太守竇融遣使獻橐駞南單于上書獻橐駞單于歲祭三龍祠走馬鬪橐駞以爲樂事華嶠後漢書曰南單于遣使詣闕奉蕃稱臣入居於雲中遣使獻橐駞南史曰四夷傳滑國有兩脚槖駞野驢有角後魏書曰髙祖不飲洛水常以千里足名駞更牙向恒州取水以供贍焉後周書四夷傳曰旦未西北有流沙數百里夏日多熱風爲行旅之患其風欲至唯老駞知之即預鳴而聚立埋其口於沙中人以爲候即以氊擁其鼻口其風迅速湏臾即過不尓則至危斃鹽鐡論曰齊陶之縑南漢之布中國以一端縵得匈奴累金之物驢騾駱駞可使銜尾入塞愽物志曰燉煌西渡流沙千餘里中無水時時伏流豦人不能知皆乗駱駞駞知水脉遇其處輒停不肯行以足蹋地人於蹋處掘之輙得水外國曰大秦國人長一丈五尺猨臂長脅好騎駱駞洛中記曰有銅駞二枚在宫之南四㑹道頭髙九尺號銅駞路陸翽鄴中記曰二銅駞如馬形長一丈髙一丈足如牛尾長二尺脊如馬鞍在中陽門外夾道相向異苑曰西域苟夷國山下有石駱駞腹下出水以金鐡及手承取即便對過瓠蘆盛之者即得飲之令身體香浄而昇仙其國神秘不可數遇楚辭曰鼃黽遊乎華池腰褭奔亡勝駕橐駞腰褭駿馬郭璞山海經圗槖駞讃曰駞惟竒畜肉鞍是𬒳迅騖流沙顯功絶地潜識泉源微乎其智太平御覽卷第九百一
