  text: 太平御覽卷第一百二十八偏霸部十二
  hash: sha256:78ba20976d837dce34ad6de5547e58e959dac5b918246bdb7bdfe0df49d3f8fe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_128-1a}
body:
  text: 宋劉𥙿劉義符劉義隆劉劭劉駿劉子業劉彧劉昱劉准宋劉𥙿徐爰宋書曰髙祖武皇帝姓劉氏諱𥙿彭城綏輿里人夜生有神光之異是夕甘露降于墓樹嘗遊下邳遇一沙門于逆旅沙門言及中原事故因云江表㝷當喪亂髙祖曰便遂至亂亡當有拯之者不沙門曰拯之者其在君乎其意甚至𥘉髙祖患手瘡積年未瘳沙門曰此瘡難治先有良藥當以相與因出懐中黄散褁留之沙門旣去髙祖追而望之倐忽不見以黄散治瘡一傳而愈餘散寳録之𬒳金瘡輙用有驗晉陵人韋叟少以占相爲事其言多驗嘗相髙祖曰君當立主方伯乆之又曰君相輙進貴不可言唯願冨貴無相志晉末妖賊孫恩作亂前將軍劉牢之東討牢之請髙祖參軍事牢之命髙祖覘賊逺近將勇士數十人㑹遇賊至仍迎擊之賊衆數千髙祖所將人多死而戰意方酣奮長刀所殺傷甚衆牢之子敬宣疑髙祖淹乆恐爲賊所殺乃輕騎赴之旣而衆騎並至賊遂大崩髙祖爲流矢所傷通中信宿而愈自後屢𬒳重傷皆弗以爲患軍中益加敬憚恩北走海鹽髙祖追而翼之築城于海鹽故治恩知城弗可下乃進向滬髙祖復弃城追之恩乗風浮海奄至丹徒師衆數萬鼓噪登于蒜山居民皆荷檐而走髙祖率所領奔擊大破之投巘赴水死者甚衆恩顚沛僅得還船雖𬒳摧破猶恃衆力遂徑向京師朝廷震懼以髙祖爲建武將軍下邳太守帥舟師討恩于郁洲復大破之桓玄從兄循以撫軍將軍鎮丹徒以髙祖爲中軍參軍玄簒帝位循入朝玄髙祖從至京師玄旣宿憚髙祖威名又恱髙祖之風儀姿貌語司徒王謐曰昨見劉𥙿卿不得獨擅其清或說玄曰劉𥙿龍行虎歩瞻視不凡恐必不爲人下宜早爲其所玄曰我方欲平蕩中原使𥙿以萬人爲前驅關隴不足定也事定之後當更議之耳髙祖乃與弟道規沛郡劉毅東海何無忌潜謀匡復桓循弟弘以征虜將軍領廣陵以道規爲中兵參軍劉毅先亦爲弘吏佐遭母憂還京口是至住江北與道規共集義徒髙祖託遊獵㑹無忌及任城魏詠之髙平擅慿之及從弟蕃等同謀二十七人并願從者百餘人是時大風暴起丙辰詰朝城門開義衆馳入稱有詔齊聲大呼吏士驚散即獲桓循斬而徇之與桓弘主簿平昌孟昶等帥壯士六十人斬弘于廣陵城因収衆濟江玄遣頓丘太守呉甫之右衛將軍皇甫敷北拒義軍或曰𥙿等衆力甚弱豈有辦成陛下何慮之甚玄曰劉𥙿足爲一丗之雄劉毅家無檐石之儲樗蒱一擲百萬何無忌劉牢之甥酷似其舅共舉大事何謂無成衆推髙祖爲盟主移檄京邑遇呉甫之於江乗甫之玄驍將也其兵甚銳髙祖躬執長刀徑入其陣衆皆披靡即斬甫之進至羅落橋髙祖望賊旗鼓誓衆馳進挺劒指麾光矅如電將士皆莫敢仰視但慿神武爭爲先登殊死而戰無不一當百呼聲動天地風火竝起鉦鼓之音震駭京邑桓謙等諸軍一時土崩髙祖鎮石頭留臺百官群僚宿衛各率其職於是推髙祖爲使持節都督楊徐兖豫青冀幽并八州諸軍事鎮軍將軍徐州刺史桓玄經潯陽江州刺史郭昶之備乗輿法服以資之収略二千餘人挾天子奔于江陵冠軍將軍劉毅輔國將軍何無忌帥諸軍南討破玄大將軍郭鈴等于桑落洲玄弃衆復挾天子西走𥘉益州刺史毛璩遣弟子循之誘玄以入蜀至於枚回州益州督護馮遷斬玄首傳于京師天子反正詔進位侍中都督中外諸軍事髙祖固讓加録尚書封豫章公邑萬戸絹三萬匹鮮卑慕容德僭號於青州德死從子超襲僞位公抗表北討屠廣因超踰城走獲之戮其王公以下約口萬餘馬二千匹夷其城隍獻超于京師斬于建康市盧循㓂南康廬陵豫章諸郡守皆委任奔走馳使徴公公至下邳留船運輜重自帥精銳歩歸孟昶諸葛長民懼㓂之深也欲擁天子過江公弗聽昶窮窘無餘圗飲藥而卒群賊大至公悉出輕利帝躬提幡鼓命軍衆齊力擊之賊衆大敗追奔逮夜乃収兵而歸循等還潯陽公更簡練三軍將進攻討循聞大軍至欲遁還豫章乃悉力柵斷左里丙申大軍至左里將戰公麾以進兵幡竿折遂沉于水衆皆失色公自忻笑曰徃年覆舟之戰亦幡竿折今復然賊必破矣衆乃大恱即攻柵並進循兵雖死戰猶弗能禁諸軍乗勝擊之循單舸走劉蕃孟懷玉斬徐道覆于始興傳首京師交州刺史杜慧度斬盧循父子函七首送都劉毅爲荆州刺史矜功驕縱公表請討之䝘單騎出自隘道側分遣諸軍伐蜀以朱齡石爲益州刺史公授以謀略遂平成都斬僞蜀王譙縱荆州刺史司馬休之僭結雍州刺史魯宗之宗之得書響應公帥衆軍西討休之不敢戰乃弃城走奔僞羗僞主姚興死子泓新立人情騷擾公乃抗表北伐諸軍入關及姚泓戰大破之泓肉袒稽首公至長安長安豐䄒帑藏盈積後宫數千人公先収彛器渾儀土圭之屬獻于京師其餘珍寳珠王悉以班諸將士執姚泓歸之有司斬于建康市公至洛陽常有紫雲見於軍上晉帝乃命有司禪位于王改元熈二年爲永𥘉元年三年正月崩于西陵年六十沈約宋書曰髙祖諱𥙿字德輿漢楚元王交之後也小字寄奴𥘉髙祖家貧嘗負刁逵社錢三萬經時無以還逵執録甚嚴王謐造逵見之乃宻以錢代還由是得釋髙祖名微位薄盛流皆不與相知唯謐交焉桓玄將篡謐手解安帝璽紱爲玄佐命功臣及義旗事建衆並謂謐宜誅唯髙祖保持之上清簡寡欲嚴整有法度不視珠玉輿馬之飾後庭無絲竹之音寧州嘗獻虎魄枕光色甚麗時將北征以虎魄治金瘡上大恱命擣碎分付諸將卒關中得姚興從女有盛寵以之廢事謝晦諌即時遣出錢帛皆付外府内無私藏宋臺建有司奏東西堂施局脚牀銀塗釘上不許使用直脚牀釘用鐵孝武帝大明中壞上所居隂室於其處起王燭殿與群臣觀之牀頭土鄣璧上掛葛燈籠麻繩紼侍中袁覬盛稱上儉素之德故能光有天下克成大業者焉宋書髙祖遊京口竹林寺獨卧講堂前上有五色龍章衆僧見之驚以白帝帝獨喜曰上人無妄言也述異記曰宋髙祖微時嘗遊㑹下過孔静宅正晝卧有神人衣服非常謂之曰起天子在門旣而失之静遽岀適與帝遇延入結交贈遺臨別執帝手曰卿後必當大貴願以身嗣爲託帝許之及定京邑静自山隂令擢爲㑹稽内史劉義符徐爰宋書曰少帝諱義符髙祖長子也髙祖崩五月即皇帝位廬陵王義真明雋秀令朝野屬望而司空徐羡之尚書僕射傳亮領軍謝晦等貪弄朝權深相忌憚乃共誣罔搆成其釁是日上䟽収義真徙于新安郡徐羡之王弘傳亮謝晦檀道濟等守門露仗入殿時上在華林園寢舟中兵士競進殺侍御者二人遂扶上出東閤廢爲滎陽王一依漢昌邑晉海西故事遂徙干呉郡六月徐羡之等使邢安大殺滎陽王於金昌亭年十九沈約宋書曰羡之等將謀廢立而廬陵王義眞輕動多過不任主四海乃先廢義真然後廢帝侍中程道惠勸立第五皇帝恭羡之不許遣使殺眞於新安殺帝於呉縣帝穾走出門追者以門關擊之倒地然後加害劉義隆沈約宋書曰太祖文皇帝諱義隆小字車兒武帝第三子也授西中郎將荆州刺史長七尺五寸博渉經史善隷書少帝廢百官備法駕奉迎即皇帝位改元元嘉元年三年司徒録尚書令揚州刺史徐羡之尚書令護軍將軍傳亮有罪伏誅遣中領軍到彦之征北將軍檀道濟討荆州刺史謝晦上親帥六師擒晦於延頭送京師伏誅京師疾疫遣使存問給醫藥死者若無家屬賜以棺木十二年大水京邑乗舡二十四年貨貴制大錢一當兩三十年三月遇弑于􅍭光殿年四十七劉劭沈約宋書曰劉劭字休逺文帝長子六歳拜爲皇太子二十七年有巫嚴道育自言通靈天爲刧没入奚官劭姊東陽公主應閤婢王鸚鵡白公主云道育有異術主乃白上求入道道育自言服食主及劭皆惑之始興王濬與劭並多過失使道育祈請令不上逹遂誣蠱事泄道育叛亡變服爲尼逃柬宫濬徃京口復載將去三十年二月濬自京口入朝復載還東宫有告上云京口有一尼服食出入征北内似是嚴道士上使掩捉得二婢云道育隨濬還都上乃使京口送道育二婢頃至撿覆廢劭賜濬死母潘淑妃具以告濬濬馳報劭劭因是有異謀其月二十一日召前中庶子蕭斌告以逆事明旦與斌同載從萬春門入張超之手行殺逆又使人殺潘淑妃濬屯中堂劭即僞位改元嘉三年爲太𥘉元年丗祖及南譙王義宣隨王誕並舉義兵劭以事委王羅漢魯秀以拒義軍三月十九日義軍至新林二十一日至新亭二十二日劭衆連敗相繼散降四月四日義軍薛安都等並入殿臧質從廣莫門入同㑹大極殿劭穿西垣入武庫井中即從井中牽出縛劭於馬上防送軍門斬于牙下濬劭及四子並梟首曝屍於市投劭濬屍于江張超之爲亂兵所剖腹刳心臠食其肉焚其頭骨道育鸚鵡並都街鞭殺於石頭西望山下焚屍揚灰于江後史官目劭爲元凶劉駿沈約宋書曰丗祖孝武皇帝諱駿字休龍小字道民文帝第三子遷南中郎將江州刺史元凶殺逆以爲征南將軍加散騎常侍上帥衆入討荆州刺史南譙王義宣雍州刺史臧質並舉義兵元嘉三十年四月上至于新亭即皇帝位五月尅京城孝建元年春新祠南郊改元大赦詔凡諸守莅親民之官可申詳舊條勸畫地利力田善蓄者具以名聞更鑄四銖錢立皇子業爲太子賜爲父後者爵一級大明元年正月大赦改元四月京師疾疫遣使案行賜給醫藥死而無収斂者官爲斂埋諸王及妃王庶姓位從公者喪事聽設凶門餘悉斷司空南州刺史竟陵王誕有罪貶爵誕不受命據廣陵反上親御六師車駕出頓宣武堂三年七月尅廣陵城斬誕𥘉立馳道自閶闔門至朱雀門又自朱雀門至於玄武湖七年於博望山立雙闕八年閏五月帝崩於玉燭殿年三十五沈約宋書曰丗祖遊幸無度太后六宫常乗副車在後沈懷文與王景文毎諫不宜數出後同從坐松樹下風雨甚驟景文曰卿可以言矣懷文曰獨言無係宜相與諌之江智淵卧草側亦謂言之爲善俄而𬒳召俱入雉埸懷文曰風雨如此非聖躬所宜冒景文又曰懷文所啓宜從智淵未及有言上乃注弩作色曰卿欲效顔峻耶何以恒知人事又曰顔峻小子恨不得鞭其靣目劉子業沈約宋書曰前廢帝諱子業小字法師孝武帝長子也丗祖入伐元凶𬒳囚於侍中下省將見害者數矣卒得無恙丗祖崩其日太子即皇帝位罷南北二馳道孝建以來所改制度還依元嘉是歲諸郡大旱甚米一斗數百京邑亦至百餘永光元年春改元大赦八月帝自率宿衛兵誅太宰江夏王義恭尚書令驃騎大將軍柳元景尚書左僕射顔師伯廷尉劉德願改元爲景和元年以宫人謝氏爲貴嬪夫人加虎賁鞁㦸鸞輅龍旗出警入蹕時帝凶悖日甚誅殺相繼内外百司不保首領先訛言湘中出天子帝將南廵荆湘二州以厭之先欲誅除諸叔然後發太宗與左右阮佃夫王道隆李道兒宻結帝左右壽寂之姜産之等十一人謀共廢帝戊午夜帝於華林園竹林堂射鬼時巫云見此堂有鬼故帝自射之壽寂之懷刀入姜産之爲副帝欲走寂之追而殞之時年十七帝㓜而狷急在東宫毎爲丗祖所責丗祖西廵子業啓參起居書跡不謹上譲之子業啓事陳謝上荅曰書不長進此是一條耳聞汝素業都懈狷戾日甚何以頑固爾耶帝少好讀書頗識古事自造丗祖誅及雜篇章往往有辭彩沈約宋書曰前廢帝景和末召南平王鑠妃江氏入宫使左右於前逼迫之江氏不受命謂之曰若不從當殺汝三子江氏猶不肯於是遣使於第殺敬猷敬淵等杖一百其夕廢帝亦殞劉彧沈約宋書曰太宗明皇帝諱彧字休炳小字榮期文帝第十一子也爲雍州刺史景和末上入朝𬒳留停廢帝誅害宰輔殺戮大臣恒慮有圖之者疑畏諸父並拘之殿内収上付廷尉一宿𬒳原將加禍害者前後非一旣而害上意定明旦便應就禍害上先與腹心阮佃夫李道兒壽寂之等密共合謀殞廢帝於後堂建安王休仁便稱臣引升西堂御坐召見諸大臣于時事出倉卒上失履跣至西堂猶著烏帽㘴定休仁呼主衣以白帽代之引備羽儀雖未即位凡衆事悉稱令書施行上即皇帝位大赦天下改景和元年爲太始元年鎮軍將軍江州刺史晉安王子勛舉兵反鎭軍長史鄧琬爲其謀主雍州刺史袁顗帥衆赴之車駕親御六師出頓中興堂司徒建安王休仁帥衆軍大破賊斬僞尚書僕射袁顗進討江郢荆雍相五州平定之晉安王子勛並賜死同黨皆伏誅太豫元年四月上大漸袁粲禇淵劉勔蔡興宗沈攸之同𬒳頋命上崩于景福殿年四十四帝少而和羙風姿端雅早失所生飬於路太后房内大明丗諸弟多𬒳㺓忌唯上見親常侍路太后醫藥好讀書愛文義在藩時撰江左以來文章志又續衛瓘所注論語二卷行丗及即大位四方反叛以寛仁待物諸將帥有父兄子弟同逆者並授以禁兵委任不異故衆爲之用莫不盡力平定天下逆黨多𬒳全宥其才者並見授用有如舊臣才學之士多蒙引進參攷典籍應對左右於華林園茆堂講周易常自臨聽末年好鬼神多忌諱近䜛慝剪落皇技宋氏之業自此衰矣沈約宋書曰王景文爲揚州刺史上旣有疾而諸弟並已見殺唯桂楊王休範人才夲下不見疑出爲江州刺史慮一旦晏駕皇后臨朝景文自然成宰相門族強盛籍元舅之重歲暮不爲純臣太豫元年春上疾篤乃遣使送藥賜景文死手詔曰與卿周旋欲全卿門户故有此處分劉昱沈約宋書曰廢帝諱昱字德融小字慧震明帝長子也太宗諸子在孕皆以周易筮之即以得之卦爲小字故帝字慧震立爲皇太子太宗崩太子即位元徽元年正月改元二年太尉江州刺史桂陽王休範舉兵反賊奄至攻新亭壘齊王拒擊大破之越騎校尉張苟兒斬休範五年七月戊子夜帝殞於仁壽殿𥘉帝在東宮年五六歲時始就書學而墮業好嬉戯主師不能禁好縁􅃮帳竿去地二丈餘如此者半食乃下年漸長喜怒無節左右有失旨者輙手加撲打徒跣蹲踞以此爲常主師以白太宗上輙敕昱所生嚴加捶訓及嗣位内畏太后外憚諸臣猶未得肆志自加元服變態轉興内外稍無以制三年秋冬間便好出遊行太妃毎乗青篾車隨相撿攝漸自放恣太后不復能禁單將左右棄部伍或十里二十里入市里或徃營署旦出日暮乃歸四年春夏此行弥數自京城尅定意志轉驕於是無日不出與左右人解僧智張立鬼恒自馳逐夜出承明門夕去晨反旦去暮歸從者並執鋋矛行人男女及馬驢值無免者民間憂懼晝日不敢開門道上行人殆絶常着小袴未嘗服衣冠有白棓數十枚各有名號鉗鑿錐鋸之徒不離左右嘗以鐵錐錐人隂破左右人見歛眉者昱大怒令此人祖臂正立以矛刺臂洞骨於耀靈殿上飬驢數十頭所自乗馬飬於御床側先是民間訛言謂太宗不男昱是李道兒子昱每出入去來常自稱劉統或自號李將軍與右衛翼輦營女子私通毎從之遊持百數十錢供酒肉之費輅車一乗其上施蓬乗以出入從者不過數十人羽儀追之恒不及又各慮禍亦不敢追㝷惟整部伍别在一處瞻望而巳凡諸鄙事過目即能能鍜金銀裁衣作帽莫不精絶未嘗吹箎執管便韻天性好殺以此爲忻一日無事慘慘不樂齊王濳圗廢立與直閣將軍王敬則謀之七月七日昱乗露車從二百許人無復鹵簿羽儀徃青園尼寺曉至新安寺就曇渡道人飲酒醉扶夕還仁壽殿東阿氊幄中卧時昱出入無禁大内諸閣夜皆不閇廂下畏相逢值無敢出者宿衛竝逃避内外無相禁攝王敬則先結昱左右楊萬年等二十五人謀共取昱其夕王敬則出外楊玉夫見昱醉熟無所知乃與萬年同入氊幄内以昱防身刀斬之提昱首依常行法稱敕開承明門出以首與敬則馳至領軍府以首付齊王齊王乃戎服率左右數十人稱行還開承明門入昱他夕每開門門者震懼不敢視至是弗之疑齊王旣入曉乃奉太后令奉迎安成王劉准沈約宋書曰順皇帝諱准字仲謨小字知觀明皇帝第三子也封安成王廢帝殞奉迎王入居朝堂壬辰即皇帝位昇明元年改元大赦齊王出鎮東城輔政作相三年加相國揔百揆備九錫之禮四月禪位于齊王壬辰帝遜于東邸旣而遷居丹陽宫封爲汝陰王殂于丹陽謚曰順皇帝時年十三史臣曰聖王膺録自非接亂承微則天暦不至也自三五以來受命之主莫不乗淪亡之極然後符樂推之運水德遷謝其來乆矣豈止於區區汝陰揖讓而巳哉太平御覽卷第一百二十八
