body:
  text: 人事部六十三義下義婦義下戰國䇿曰孟甞君出記問門下諸客誰能爲文収債於薛者馮驩曰能於是載劵契而行辭曰収債畢何市而反孟甞曰視吾家所寡有者乃爲之至薛召諸民當償債者悉來合劵遍合乃矯命以債賜諸民燒其劵民稱萬歳長驅到齊晨而求見孟甞恠其疾正衣冠而見之曰債畢收乎來何疾也何市而反驩曰君云視吾家所寡有者臣竊計君宫中珎寳滿内府狗馬實外廐美人充後宫君家所寡有者義耳竊以爲君市義曰市義柰何曰今君有區區之薛不能撫愛其民因而賈利之臣竊矯君命以債賜諸民因燒其劵民稱萬嵗乃臣所以爲君市義也孟甞君不恱曰諾先生休矣後朞年孟嘗就國於薛未至百里民扶老擕㓜迎君道中顧謂驩曰先生所爲文市義者乃今日見之又曰秦縮髙鄢陵人也其子仕秦秦以爲管守魏信陵君攻之不下乃使人謂鄢陵君曰遣縮髙來吾將仕之使爲持國尉鄢陵君曰小國不能必其民使者自徃請使吏導使者至縮髙曰君之命髙也將使攻管也夫父攻子守人之大笑也見臣而下是背主也父殺子背亦非君善敢再辭使者以報信陵君大怒遣使謂鄢陵君曰鄢陵之地亦猶魏也今吾攻管而不下則秦兵不返社稷必危矣願君生束縮髙而致之若君弗致吾將十萬之師以造君城下鄢陵君曰吾先君成侯受詔襄王以守此地受太府之憲曰子殺父臣殺君有常不赦國雖大赦降城亡子不得預焉今縮髙不受大利以全父子之義而君曰生致之是使我負襄王之詔而廢太府之憲雖死終不敢行也縮髙聞之曰信陵君爲人悍而自用此辭反必爲國禍吾以全巳爲人臣之義矣豈可使吾君有魏患乎乃之使者舎自刎頸而死信陵君聞之大驚縞素出舎使使者謝鄢陵君曰無忌小人也困於思慮敢再拜釋罪英雄記曰袁紹以臧洪爲東都太守時曹操圍張超於雍丘洪始聞超𬒳圍乃徒跣號泣並勒所領將赴其難從紹請兵而紹竟不聽之超城遂䧟張氏族滅洪由是怨紹絶不與通紹増兵急攻洪城中粮盡厨米三升使爲薄糜遍頒衆又殺其愛妾以食兵將咸流涕無能仰視男女七八千相枕而死莫有離叛城䧟生執洪紹謂曰臧洪何相負若是今日服未洪據地瞋目曰諸袁事漢四丗五公可謂受恩今王室衰弱無輔翼之意而欲因際㑹觖望非兾惜洪力劣不能推刃爲天下報仇何爲服乎紹乃命殺之洪邑人陳容在坐見洪當死起謂紹曰將軍今舉大事欲爲天下除暴而先誅忠義豈合天意紹慙遣人牽出謂曰汝非臧洪儔歟空復尓爲容顧曰夫仁義豈有常所蹈之則君子背之則小人今日寧與臧洪同日死不與將軍同日生遂復見殺在紹坐者無不歎息又曰袁譚旣死弟熈尚爲其將焦觸張南所攻奔遼西烏桓觸自號幽州刺史陳兵數萬殺白馬盟曰違命者斬各以次㰱至別駕代郡韓珩曰吾受袁公父子厚恩今其破亡智不能救勇不能死北靣曹氏所不能爲也一坐爲珩失色觸曰舉大事當立大義事之濟否不待一人可卒珩志以厲事君曹操聞珩節甚髙之屢辟不至又曰公孫瓉字伯珪爲上計吏部太守劉基爲事𬒳徴伯珪御重到洛陽身執徒飬基將徙日南伯珪具豚米於北邙上祭先人觴醊祝曰昔爲人子今爲人臣當詣日南多障氣恐或不還與先人辭於此再拜慷慨而起觀者莫不歔欷在道得赦俱還魏略曰郭憲字㓜簡西平人以仁篤爲一郡所歸韓約失衆從羗中還依憲衆人多欲取約以邀功而憲責之言人窮來歸我云何欲危之遂擁護厚遇之其後約病死而田樂楊逹等就斬約頭當送之逵等欲條䟽着憲名憲不肯在名中言我常不忍生圖之豈忍取死人以要功乎逵等乃止時太祖方攻漢中在武都而逵等送約首到太祖宿聞憲名及視條䟽恠不在中以問逵逵等具以情對太祖歎其至義乃表例與逵等並賜爵關内侯列士傳曰羊角哀左伯桃二人相與爲死友欲仕於楚道遥山阻遇雨雪不得行飢寒無計自度不俱生也伯桃謂角哀曰天不我與深山窮困併在一人可得生官俱死之後骸骨莫収内手捫心知不如子生恐無益而弃子之器能我樂在樹中角哀聽伯桃入樹中而死得衣粮前至楚楚平王愛角哀之賢嘉其義以上卿禮葬之竟角哀夢見伯桃曰蒙子之恩而獲厚葬然正苦荆將軍家相此欲役使吾吾不能聽也與連戰不勝今月十五日當大戰以决勝負得子則勝否則負矣角哀至期日陳兵馬詣其冡上作三桐人自殺下而從之君子曰執義可爲丗規唐新語曰陸南金博渉經史言行修謹開元𥘉太常少卿盧崇道犯罪自嶺南逃歸匿于南金家俄爲讎人所發詔侍御史王旭按之崇道辭引南金旭處以極法南金弟趙壁請代兄死南金執稱弟實自誣身請當罪兄弟爭死旭問其故趙壁曰兄且是嫡又能幹家亡母未葬小妹未嫁自惟㓜劣生無所益身自請死旭列上其狀玄宗嘉而宥之張說陸象先等咸相欽重累遷庫部貟外郎南金祖士季爲隋越王侗記室兼侍讀侗稱制授著作郎時王丗充將行簒奪侗謂士季曰隋有天下三十餘載朝廷文武豈無忠烈者乎士季對曰見危授命臣之宿心今請因其啓事便加手刃後事洩充遂停士季侍講貞觀𥘉爲太學博士而卒矣又曰畢構性至孝丁継母憂有兩妹皆在繈褓構乳飬嫁遣之及其亡也二妹𥘉聞哀慟氣絶者乆之言曰雖兄弟無三年之禮吾倚鞠飬豈同常人遂行三年服朝野聞之莫不稱歎構弟栩任太府主簿留司東都聞構疾星馳赴京侍毉藥者累月旣而哀毁骨立變服視事踰年未嘗言笑深爲朝野所重構嘗爲益州長史兼按察使多所舉正風俗一變玄宗降璽書慰之曰卿孤㓗獨行有古人之風自臨蜀川弊化頓易覽卿前後執奏何異破枉求姦諸使之中在卿爲㝡終户部尚書又曰李愻爲貝州刺史甘露徧於庭樹邑人曰美政所致請以聞愻謙退寢其事歴官十七政俸禄先兄弟㛐姪謂其子曰吾厚汝曹以衣食不如厚之以仁義勿辭弊也天下莫不嗟尚之又曰姚崇少不慕學年踰弱冠嘗過所親見修文殿御覽閱之甚喜遂躭墳史以文華著名歴牧常楊吏人並建碑紀德再秉衡軸天下欽其公直外生任并任异少孤長於崇家乃與之立家産謂之曰汝與吾無間然矣惜殊宗而代踈命與其子連名兾無以別也時人美之又曰孟景休事親以孝聞丁母憂毁瘠踰禮殆至㓕性弟景偉年在襁褓景休親乳之乳爲之豊及葬時屬祁寒跣履雪霜脚指墮而復生如𥘉景休進士擢第歴監察御史鴻臚丞爲來俊臣構䧟遇害時人傷焉義婦南史孝義傳吳興秉公濟妻姚氏生二男而公濟及兄願公乾伯並卒各有一子姚飬育之賣田宅爲取婦自與二男寄止隣家明帝詔爲其二子婚表閭復徑役又㑹稽永興呉翼之母丁氏少喪夫性仁愛遭年荒分衣食以飴里中飢餓者隣里求借未嘗違同里陳攘父母死孤單無親戚丁収飬之及長爲營婚娶又同里王禮妻徐荒年客死丁隂爲買棺器自往歛葬元徽末大雪啇旅斷行村里比室飢餓丁自出鹽米計口分賦同里任僑家露四喪無以葬丁爲辦冡椁有三調不登者代爲遂丁長子婦王氏守寡執志不再醮州郡上言詔表門閭租稅崔鴻十六國春秋前趙録曰冠軍喬晞攻界休尅之其令賈潭抗節不降晞怒殺之其妻宗氏年二十餘有姿色晞欲納之宗罵曰屠各奴何有害人之夫而欲加無禮于尓母乎何不促殺我遂仰天大哭亦殺之唐書獨孤武都謀叛王丗充歸于我其子師仁方三嵗丗充以其㓜不殺乳母王英蘭髠鉗求入保飬丗充許之英蘭扶乞所得與師仁唯自啖土飲水而竟爲採拾竊師仁至京師髙祖嘉之封永壽郷君又曰陽三安妻李氏雍州涇陽人也事舅姑以孝聞及舅姑亡没三安亦死二子孩童家至貧窶李晝則力田夜便紡緝數年間葬舅姑及夫并夫之叔姪兄弟七喪深爲逺近所嗟尚太宗聞而異之賜帛二百叚遣州縣恤存之又曰鄭義宗妻盧氏幽州范陽人也盧彦衡之女也略渉書史事舅姑甚得婦道甞夜有強盗數十人持扙鼔譟踰垣而入家人悉逃竄唯有姑獨在堂盧冒白刃往至姑側爲賊捶擊之幾至於死賊去後家人問曰羣凶擾撗人盡奔逃何獨不懼荅曰人所以異於鳥獸者以其有仁義也昔宋伯姬守義赴火流稱至今吾雖不敏安敢忘義且比隣有急尚相赴救况在姑而可弃委若萬一危禍豈冝獨生其姑每云古稱歲寒然後知松栢之後凋吾今乃見盧新婦之心矣身觀中卒又曰兾州鹿城女子王阿足者早孤無兄弟唯姉一人阿足𥘉適同縣李氏末有子而夫亡時年尚少又多娉之爲姉年老孤寡不能捨去遂誓不嫁以飬其姉毎晝營田業夜便紡績衣食所湏無非阿足出者如此二十餘年及姉亡葬送以禮郷莫不稱其義行竟令妻女求與相識後數歲竟終于家又曰楚王靈龜妃上官氏上邽人也父懷仁右金吾將軍上官氏年十八歸於靈龜繼楚哀王後夲生具存朝夕侍奉恭謹弥甚凡有新味非舅姑噉訖未曾先嘗經數載靈龜薨及將葬其前妃閻氏嫁不踰年而卒又無近族衆議欲不舉之上官氏曰夫神而有靈寧可使孤魂無記於是備禮同葬聞者莫不嘉歎服終諸兄弟姉謂曰妃年尚少又無所生改醮異門禮儀恒範妃思之掩泣對曰丈夫以義烈摽名婦人以守節爲行未能即先犬馬殉溝壑寕可復飾粧祇服有他志乎遽將截鼻割耳以自誓諸兄姉知其志不奪歎息而止㝷卒說苑曰齊遣兵攻魯見一婦人將兩小兒走抱小而挈大顧見大軍且至抱大而挈小使者甚怪問之婦人曰大者妾夫兄之子小者妾之子夫兄子者公義也妾之子者私義也寧濟公而廢私耶使者帳然賢其辝即罷軍還對齊王說之曰魯未可攻也匹婦之義尚如此何况朝廷之臣乎列女傳曰衛宗二順者衛宗室靈主之夫人及傳妾也秦滅衛君角封靈主丗家使奉其祀靈主死夫人無子而守寡傳妾有子代後夫人謂傳妾曰孺子飬我甚謹子奉祭祀而妾事我我不聊願出居外傳妾泣曰夫人豈欲使靈氏受三不祥耶公不幸蚤終是一不祥夫人無子而妾有子是二不祥今夫人將出居外妾居内是三不祥欲自殺其子止之不聽夫人懼遂終年供飬不替又曰魯孝義保者魯孝公稱之保母𥘉孝公父武公與長子恬中子戲朝周宣王宣王立戲爲魯大子武公薨戲立是爲懿公孝公于時號公子稱恬之子伯御與魯人作亂攻殺懿公而自立求稱於宫中將殺之義保聞伯御欲殺稱乃衣其子以稱之衣卧於稱之卧處伯御之義保遂抱稱以逃周天子殺伯御立稱爲孝公魯人髙義保之義故謂之義保又曰河南貞義者樂羊子之妻羊子出學將友人歸貞義截髮賣以供其費後羊子得遺金一餅以與貞義貞義曰妾聞君子不以利汙行羊子慙而弃之又曰𣏌梁名殖齊人也爲大夫莊公襲莒約車五乗載士殖不與歸而不食母曰汝生有義死有名五乗盡汝下也殖遂至莒獲甲首公止之曰共同齊國殖曰不與五乗少吾勇也臨敵止吾以利汙吾行也遂進至莒城下殺二十七人而死莒人築尸城爲京觀妻往迎喪向之哭土爲之崩得喪於是公使弔葬之葬畢曰婦人有三從之義令吾外無夫以立節内無子以見志吾何歸乎乃赴水而死又曰梁節姑姉者梁之婦人其室失火兄子與其子三人在内中欲取兄子輙得其子火盛不得復入婦人將自赴火其夫止之婦人曰梁國豈可户告人曉也𬒳不義之名何靣目以見兄弟國人哉吾欲復投吾子爲失母之恩吾勢不可以生遂赴火而死又曰㑹稽右師安妻者同郡吕氏之女也名軍少寡無子守義不遷其兄遂犯法軍匿之知不能免乃泣曰少遭家不造兄弟單少門宗唯兄爲主而復罹此禍我有一計猶足免難將詣縣陳之兄曰其計若何軍曰臨時從冝不可先言也乃請智者爲辭乞代兄遂之命因自剄縣門官嘉其義乃捨遂罪又曰齊義継母者齊二子之母也當宣王時有人闘死於道者吏視之𬒳一瘡二子立其傍吏問之兄曰我殺之弟曰非兄也我殺之朞年不决吏言之於相相不能决言於王王曰皆赦之是縱有罪皆殺之是誅無辜也其母必知其子之善惡聽所欲殺活相召而問之其母泣而對曰殺少子相曰少子人之所愛今欲殺之何也對曰少者妾之子也長者前妻之子也雖痛乎獨謂義何泣下沾襟相言之於王王美其義皆赦二子號曰義母又曰天水姜叙母者同郡楊阜之姑也阜爲州史馬超殺刺史太守叙屯暦城阜徃見之戲欷悲甚叙曰何爲乃尓阜曰守城不能完君亡不能死何以視息於天下乎君擁兵專制無討賊之心此趙盾所以書殺也叙母慨然勑叙從阜計遂起兵於歴城超聞之襲歴城得叙母母罵之曰若背父之逆子殺君之桀賊天地豈乆容若何不早死敢以面目視人超即殺之杜預女記曰王氏之母者漢丞相安國侯王陵之母漢王擊項羽陵以兵屬漢王項羽得陵母置軍中漢使至則東向坐陵母欲以招陵陵母私送使者爲之泣曰爲老妾語陵善事漢王漢王長者也無以老母故懷二心言妾巳死乃伏劒而死以固勉陵定命録曰賈直言妻莫知姓氏貞元中其舅道得罪賜酖直言欲代父死奪酖飲之不死流于嶺徼直言妻一志事姑髽髻絶膏沐自三二年蟣虱蔽其肉厥後如枯蓬之植燥上無復蟣虱迨十五載直言遇赦歸妻始一沐其髻自斷絶墯于泔盆終爲秃婦直言後歴諌議大夫出刺兩郡傳記李如璋爲夏陽令素輕其妻鄭氏如璋因醉誤殺人母其子入縣將復讎如璋與鄭以床拒門讎者推䆫而入鄭急以身蔽如璋舉手乗刃右臂旣落復舉其左臂讎復斷之猶乞以身代夫死時方懷姙讎者以刃鑠其腹胎出而殞乃害如璋及其二子州司以聞坐死者數十人太平御覽卷第四百二十二
