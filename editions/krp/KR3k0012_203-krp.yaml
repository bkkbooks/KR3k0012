front:
  text: 太平御覽卷第二百三
  hash: sha256:f9a94a59bd0d7ff9b203669e1a53dacdfef6654d524f8aac452558a56b71b001
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_203-1a}
body:
  text: 職官部一揔叙官禮記曰有虞氏官五十夏后氏官百殷二百周三百天子立六官三公九卿二十七大夫八十一元士以聽天下之外治以明章天下之男教又王制曰天子百里之内以共官千里之内以爲御謂此地之田稅所給也千里之外設方伯五國以爲屬屬有長十國以爲連連有帥三十國以爲卒卒有正二百一十國以爲州州有伯八州八伯五十六正百六十八帥三百三十六長八伯各以其屬屬於天子之老二人分天下以爲左右曰二伯春秋曰昭四年郯子來朝公與之宴昭公問焉曰少皡氏以鳥名官何故少皡金天氏黃帝子巳姓之祖也問何故以鳥爲官也郯子曰吾祖也我知之昔黃帝氏以雲紀故爲雲師而雲名黃帝軒轅氏姬姓之祖也黃帝受命有雲瑞故以雲紀事百宫師長皆以雲爲名號也炎帝氏以火紀故爲火師而火名神農姜姓之祖也有火瑞故以火紀事名官也共工氏以水紀故爲水師而水名共工以諸侯覇九州者在神農前太吴後亦受水瑞以水名官也太暭氏以龍紀故爲龍師而龍名太暭伏羲氏風姓之祖也有龍瑞故以龍命官也我髙祖少暭摯之立也鳯鳥適至故紀於鳥爲鳥師而鳥名自顓頊以來不能紀逺乃紀於近爲民之師而命以民事則爲不能故也又曰國家之敗由官邪也官之失德寵賂彰也尚書堯典曰乃命羲和欽若昊天曆象日月星辰敬授人時羲氏和氏丗掌天地四時之官使敬順天時以授人也分命羲仲宅嵎夷曰晹谷羲仲居治東方之官宅居也東表之地稱嵎夷寅賔出日平秩東作使敬導出日平均次序東作之事以務農也申命羲叔宅南交羲叔居治南方之官南交言夏與春交平秩南訛敬致訛化也平序南方化育之事敬行其教以致其功分命和仲宅西曰昧谷居治西方之官寅餞納日平秩西成餞送也西方万物成平序其政助成物也申命和叔宅朔方曰幽都平在朔易都謂所聚也易謂歳改易於北方平均在察其政以順天常允釐百工庻績咸熈定四時成歳以告時授事則衆功皆廣又舜典曰咨四嶽有能奮庸熈帝之載奮起也有能起發其功廣堯之事也使宅百揆亮采惠疇亮信惠順也使居百揆之官信立其功順其事者誰乎僉曰伯禹作司空禹入爲天子司空治水有功言可用也帝曰俞咨禹汝平水土惟時懋哉稱禹前功以命之惟居是百揆勉行之禹拜稽首讓于稷契曁臯陶帝曰俞汝徃哉不許其讓使徃宅百揆又曰成王旣黜殷命滅淮夷還歸在豐作周官王曰若昔大猷順古大道制治于未亂保邦于未危曰唐虞稽古建官惟百內有百揆四岳外有州牧侯伯庶政惟和萬國咸寜夏啇官倍亦克用乂湯禹建官二百亦能用治言不及唐虞之清要今予小子祗勤于徳夙夜不逮立太師太傅太保兹惟三公論道經邦爕理隂陽少師少傅少保曰三孤貳公弘化寅亮天地敬信天地之教冢宰掌邦治統百官均四海司徒掌邦教敷五典擾兆民擾安也宗伯掌邦禮治神人和上下司馬掌邦政統六師平邦國司宼掌邦禁詰姦慝刑暴亂司空掌邦土居四民時地利士農工啇使順天時六卿分職各率其屬以倡九牧阜成兆民以倡導九州牧伯爲政大成兆民之性命又曰俊乂在官俊徳治能之士皆在官百僚師師百工惟時僚工皆官也師師相師法百官皆是言政無非撫于五辰庻績其凝言五官皆順五行之時衆功皆成又曰無曠庶官天工人其代之位非其人爲空官言人代天理官不可以天官私非其才又曰任官惟賢材左右惟其人臣爲上爲徳爲下爲民言臣奉上布德順下訓民不可官所私任非其人又曰官不及私昵惟其能不加私昵惟能是官爵罔及惡德惟其賢非賢不爵周禮曰惟王建國辨方正位體國經野設官分職以爲民極極中也令天下之人各得其中又周官曰宗伯以九儀之命正邦國之位一命受職受職治職事再命受服受服受祭衣服爲上士三命受位列位於王臣也王之上士亦三命也四命受器受祭器爲上大夫也五命賜則則法也六命賜官此王六命之卿賜官者使得自置其臣治家如諸侯也七命賜國出就侯伯之國八命作牧謂侯伯有功德者加命得專征代於諸侯九命作伯上公有功德者加命爲二伯得征伐五侯九伯也鄭司農云長諸侯爲方伯也尚書大傳曰古者天子三公每一公三卿佐之每一卿三大夫佐之每一大夫三元士佐之故有三公九卿二十七大夫八十一元士所與爲天下者若此而巳自公至元士凡百二十此夏時之官也家語曰古之御天下者以六官揔治焉冢宰之官以成道治官所以成道司徒之官以成德敎官所以成德宗伯之官以成仁禮官所以成仁司馬之官以成聖政官所以成聖聖通官正所以平通天下司宼之官以成義刑官所以成義司空之官以成禮事官所以成禮也非事不立也六官在手以爲轡東觀漢記曰更始所置官爵多羣小長安爲之語曰竈下飬中郎將爛羊胃騎都尉爛羊頭關內侯後漢書曰建武六年詔曰百姓遭難户口耗少而官吏尚繁於是司隷州牧條奏并省有四百餘縣吏職减損十置其一漢書儀曰古法雖聖猶試故設四科之辟一科曰德行髙妙志節清白二科曰學通行修經中博士三科曰明曉法令足以決疑能案章覆問文中御史四科曰剛毅多略遭事不惑明足以照姦勇足以決斷才任三輔令皆試以其能然後官之後魏書曰天興元年置八部大夫散騎常侍待詔等官其八部大夫於皇城四維面置一人以擬八坐謂之八國常侍侍直左右出入王命三年置仙人博士官典煑練百藥天錫元年八月初置六謁官准古六卿其秩五品屬官有大夫秩六品大夫屬官有元士秩七品元士屬官有署令長秩八品令長屬官有署丞秩九品又减五等之爵始分爲四曰王公侯子除伯男二號初帝欲法純質每於制定官號多不依周漢舊名或取諸身或取諸物或以民事皆擬遠古雲鳥之義諸曹走使謂之鳬鴨取飛之迅疾也以伺察候占官謂之白鷺亦取其延頸遠望也自餘之官義皆類此神瑞元年春置八大人官大人下置三屬官揔理万機故丗號八公太常二年夏置六部大人官有天地東西南北部皆以諸公爲之大人置三屬官自太祖至髙祖其內外百官屢有减置或事出當時不爲常目如萬騎飛鴻常忠直意將軍之徒是也賈誼新書曰王者官人有六等一曰師二曰友三曰大臣四曰左右五曰侍御六曰厮役知足以爲源泉行足以爲儀表問焉則應求焉則得者謂之師智足以爲礲礪行足以爲輔助明於進賢敢於退不肖內相匡正外相楊羙謂之友智足以謀國事行足以爲民率仁足以合上下之忻國有法則退而守之君有難則能死之者大臣也脩身正行不愆於郷曲言語談說不怍於朝廷智能不困於事業服一介之使能合兩君之忻執㦸居前能舉君之過失不難以死持之者左右之臣也不貪於財不淫於色事君不敢有二心居則不敢泄君之謀君有過失雖不能正諌以其死持之而愁悴有憂色者侍御之臣也唯䛕之行唯言之聽以睚眦之間事君者厮役也通典曰唐開元中刋定職次著之爲格蓋尚書省以統會衆務舉持綱目門下省以侍從獻替規駮非冝中書省以獻納制冊敷揚宣勞祕書省以監録圖書殿中省以供修膳服內侍省以承㫖奉引尚書門下中書祕書殿中内侍凡六省御史臺以肅清僚庻九等太常光禄衛尉宗正太僕大理鴻臚司農太府爲九寺五監少府將作國子軍器都水爲五監以分理羣司六軍左右羽林左右龍武左右神武爲六軍十六衛左右衛左右驍左右武左右威左右領軍左右金吾左右監門左右千牛爲十六衛以嚴其禁禦一詹事府三春坊有左右春坊又有内方掌閣内事三寺守令率更太僕等三寺十率左右衛左右司禦左右清道左右監門左右内凡十率府俾又儲宫牧守督護分臨畿服京府置牧餘府州置都督都護太守說苑曰應侯與賈子坐聞有鼓琴之聲應侯曰今之琴一何悲也賈子曰夫張急調下故使之悲耳急張者良材也調下者官卑也取夫良材而官卑之安能無悲乎應侯曰善仲長子昌言曰官之有級猶階之有等升階越等其歩也亂亂登朝級敗禮傷法是以古人之初仕也雖有賢才皆以級次進焉賈生有言治國取人務在求能故裁國之無利器猶鏤以鈆刀而望其巧不亦踈乎楊泉物理論曰吏者理也所以理萬機平百揆也武士宰民物猶使狼牧羊鷹養鶵也是以人主務在審官擇人李重集雜奏議曰古之聖玉建官垂制所以體國經治而功在簡易自帝王而下丗有増損舜命九官周分六職秦采古制漢仍秦舊倚丞相任九卿雖置五曹尚書令僕之職始於掌封奏以宣内外事任尚輕而郡守牧民言故漢宣稱所與爲治唯良二千石其有殊效者輙璽書勉勵或賜爵進秩禮遇豐厚得爲治大體所以逺蹤三代也及至東京雖漸優顯令僕丗爲郡守鍾離意黄香胡廣是也郡守入爲三公虞延第五倫鮑昱是也自魏朝名守杜畿滿寵田預胡質等郡或二十年或秩中二千石假節猶不去郡或還不易方此亦古人苟善其事雖没丗不徙官之義也漢魏以來内官之貴於今最隆太始以前多以散官𥙷臺郎亦經𥙷黃門中書郎而今皆數等而後至衆職率亦如此陵遲之俗未及篤尚之風未洽百事等級遂多遷𥙷轉徙如流能否無以著黜陟不得彰此爲治之大弊也漢法官人不得眞秩京房爲魏郡太守以八百石居之魏𥘉用輕貧先亦試守不稱則繼以左遷然則儁才登進無能降退此則所謂有知必試而使人以器者也臣以爲今冝大併郡守等級使同古者明試守左遷之例官人之理盡則士必量能而受爵矣桓温集略表曰今天下分崩喪亂殄瘁雖道隆中興而户口彫寡近方漢時不當一郡之民民户旣少則勢不多而當必同古制百官備職實非大易隨時之冝且設官以理務務寡則官省官省以國治則職顯而人清故光武𥘉興多所併省諸葛亮相蜀簡才併官此皆逹治之成規今日之所先也冝從權制併官省職愚謂門下三省祕書著作通可減半古以九卿綜事不專尚書故重九棘也今事歸内臺則九卿爲虗設之位唯太常廷尉職不可闕其諸貟外散官及軍府叅佐職無所掌者皆併若車駕郊廟籍田之屬凡諸大事於禮冝置者臨時權兼事訖則罷職旣併則官少而才精職理則無害民而治道康矣太平御覽卷第二百三
