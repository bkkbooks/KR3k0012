front:
  text: 太平御覽卷第六百六十
  hash: sha256:d8a3c1954318c72bff3c5bce162f85192c065356e0fc6ab82acf72da7f917bae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_660-1a}
body:
  text: 道部二眞人上太上經曰大微天中有二十四氣混黃雜聚結有名無氣變化爲眞人道之積成托形立影與時翺翔有名無體謂之眞人八素眞經曰若精勤得道者皆當書以蘂簡刻以瓊文位爲上淸左眞公又曰龍衣鳳帔虎帶皆是羣眞所獻於帝皇眞誥曰中皇君者天帝君之弟子也生知長生之要天仙之法夙㑹玄感於是太上授以帝君九眞之經八道祕言之章道成授書爲太極眞人又曰清虚眞人於太素眞人受三奔之道桐柏眞人脩解劒之法有太上奔日之文得爲下元眞人又曰不知廻元隱道者不得刻名上眞廻元者太上更新之日也常以其日思存吉事又曰虚妄者德之病華衒者身之災執滯者失之由恥辱者行之玷遣此四者然後可以問道耳有淫衒之心不可行上眞之道也昨見清虚宫正除落此輩人名又考付三官推之可不愼乎紫微眞仙之才内明外知録名太極金書東州内累旣息積之勿休又曰審道之本則爲上清眞人仙眞妙方能盡梗槩之道者便爲九宫眞人若各備具其道則爲太極眞人又曰練形於太陰易皃於三官受學化神濯景易氣俯仰四運得爲眞人金根經曰天圗玉關主監衆眞遊宴之所也又曰天關上有六層玉臺太上眞人集宴之處也又曰玉保青宫北殿上有金格格上有金章鳳璽玉札丹青羽蓋升仙法服以給成眞之人大有經曰玉華青宫有寶經玉訣應有爲眞人者授之又曰太上素靈洞玄經上化三眞又大洞眞經云道有三眞不可去身紫霞變景三光映眞大洞玉經曰太無山中有洞宮玉戸在峨嵋之上諸得道眞仙之名刊列此宫也又曰云上淸有宫門有兩闕左金闕右玉闕有羽衣守士内有玉芝流霞之泉刻金題衆眞飛仙之號又云玉淸中有太暉殿玉眞遊宴之所也又曰九眞仙伯上帝司禁之君濯纓帝川之池也又曰太一上元君者萬仙之司主方岳眞氣太上眞人步五星之道以致降于室大洞眞經日赤城朱牎上清絕境乃帝一内宅三眞寶堂又曰上淸眞人揔仙大司馬長生法師登大帝滄浪山洞臺中雙玉穴酣飲紫明芝液又曰長生存神者好山水之人仁知動靜所依也依仁者靜而壽依智者動而樂當投簡送名俾崇仁智朱書白簡移籍太清發爐拜手用青紙青絲裹絡巖石上詣水泛舟中流讀簡以名係之必能降眞也上淸九眞中經内訣曰有玉保公太素遣下迎九眞之人也又曰欲行九眞之法者齋戒淨室並爲天帝君所見記録也太眞科曰羽仙侍郎上都官興格列其職位都統玉眞太上眞人在五岳華房之内非有仙籍不得聞見丹簡校定名入南宫又曰虛皇金闕玉帝最貴最尊號曰自然莫能使之然莫能使之不然也和光於人似同而異惟得道者乃能知之又曰上淸禹餘天有三官眞人主治過刑殺伐陰賊不軌嫉害賢哲心懷進退穢慢眞人之罪者玉淸隱書曰玉名金格當爲上眞三天眞皇佩神虎之符在太極上位上眞則飛龍翼轅中眞則紫毛持節下眞則太極參軒又曰太微天帝君命太微上眞勑使群靈又曰上皇玉帝命玄羽眞人出迎太微天帝又命太上眞人開瓊珠之篋出玉眞隱書玄羽之經以傳太微天帝之君内音玉字經曰眞人散香於玉庭又云飛散百和之香流五雲之華以觀飛天眞人又曰四極眞人主人命籍常乘蒙眞之車校人罪籙又曰九華眞人治於南上宫中校人功過善惡三官列言又曰天眞皇人日諸天内音自然玉字其大𣑽隱語上帝命天眞皇人注解其正音足以開度天人登眞隱訣曰崑崙瑶臺刋定眞經之所也上品居上淸擬帝皇之尊中品處中道皆公卿之位下品居三元之末並大夫之流三眞品經各有條次又曰三昧眞人乗風雲龍車下衛齋戒之土太素眞人辟始學者惡夢之法金華眞人刻大洞上經於天帝紫微宮玄琳玉殿東壁牖上太虚眞人說鴻鳥之經太極眞人誦王母之辭典禁眞人察人之善惡妙行眞人推劫㑹之數又曰太極眞人常以立春日日中會諸仙人於太極宫刻王簡記仙名至春分之日日中崑崙瑶臺太素眞人會諸仙人刊定眞經也崑崙瑶臺是西母之宮所謂西瑶上臺天眞祕文盡在其中矣太素眞人治白水沙洲之上定其眞經也至立夏日日中上淸五帝㑹諸仙於紫微宫見四眞人論求道之功罪至夏至日日中天上三官會于司命河候校定萬民罪福增減年筭至立秋日日中五岳諸眞人詣中央黃房定天下祀圗靈藥至立冬日日中陽臺眞人會集列仙定新得道人始入名仙録至冬至日日中諸仙詣方諸宫東海青童君刻其仙籙金書内字凡學道之人常以夕半日中謝罪罪名自除尅身歸善以求長生神仙秋分之節氣處清虚太和正日也衆眞諸仙是日聽訟又刺姦吏及部内諸仙官並糾奏在處道士之功過及含生有罪應死生者故仙忌眞記日子欲升天愼秋分罪無大小皆上聞此朱火丹陵宫仲陽先生之要言也又云此辭出列紀是青童君述古眞人之言以傳龔氏言罪福纖介刻于丹城之籍也伏匿之善惡陰德之細功無不縷陳也又曰上眞人之道有七第一太上鬱儀奔日文二太上結隣奔月章三太上八素奔辰章四太微飛天上經五髙上太洞眞經六金闕靈書紫文七九眞中經也上眞之位爲諸天帝行則三七色節萬眞前導中眞又道有六大丹隱書九眞玄文太上金䇿方諸上經三皇内文紫書訣籙中眞之位上淸卿相之列也紫毛持節玉帝參轅下眞之道有八上淸七變隱地八術玄皇玉書神州洞經紫庭中方降籙黃道素奏中章上元玉書下眞之位上淸大夫之流五色節旄飛行倒景又曰有得見聖列紀者玄籙書名奏之上淸位爲仙卿若能行金闕眞事則拜爲大夫此謂列紀重於紫文也旣見之非眞受佩而已謂知其中經目之輕重求道之梯級依此尋學故勝於守紫文之單事也上皇玉籙曰二十四眞人有佩玉籙以行山川者則河海上神奉迎啓道靈寶隱書日中極眞人主人命籍九華眞人主九幽之下宿對生死太元眞人受天之符度長夜之魂太極眞人治赤城玉洞之府司校太山死生之籙三元眞人主紫微行道赤書玉訣經曰凡月十四日上帝眞皇勅太一使者下與北酆都伯使者同行天地司察人神功過深淺列言上官又勑太一八神使者下與三官司察天人善惡列言也又遣九部刺姦周行五岳三宫水府條正鬼事司人功過列言上天白羽經曰太眞丈人登白鸞之車篤黑鳳於九源自天已下莫不範德又太極眞人有仙眞相好者要在慈心觸物以輔相好然後得仙矣不能忍性則仙相敗矣故修道會眞必以精思爲本神爲本存神入觀尅以靜念爲先大刼經曰上景眞人將天下力士元洪水母決逆萬川海空經曰何監者天人之隱名處玉樓之上列眞仙之館又髙眞者體有眞氣玉眸詵詵南眞傳曰昨與叔甲詣清虚宫校定眞仙得失之事近頓除落四十七人復上三人耳内明眞正乃良材也九宫眞人出入皆從黃闕絳臺中閒爲道故以道之左右置臺闕者以伺非常之氣眞人往來者太上正法經曰九眞者九天之眞氣凝而成也上中下三眞生於太清是元始之澄氣也各置宮室次第上淸宫衛之官太上大道君萬眞之主也居玉殿造上帝之章以爲寶經於玉淸宫中以度後學得眞之士三元品戒經曰紫微宮有延生之儀格又云赤帝玉司君玉景度治南方朱陽之臺揔統上眞之士景林眞人曰勤感累世念眞期靈皇鑒其用思太極注名玉劄於是細書紫虚之宫朱書東華之閣刻名上淸丹文錦籍空洞靈章曰眞人彈雲璈吹九鳳之簫神州之笙其音逸響流激千尋後聖列紀曰上淸金闕後聖君少好道樂眞紫微上眞天帝玉淸宮賜紫蘂剛丹鳯璽得在上淸中遊太極下治諸天封掌兆民仙誌曰凡修行太一之事眞人之道不得有所拜伹心拜而巳不形屈也思眞行道通而無窮顯驗應期登眞必速也黑籙上篇曰聖眞仙者共行道德俱宗太玄戒文經曰太上眞人居仙府中世人得仙者皆先過此自然玉字經曰七寶林中有上眞之遊圃眞人之戲園太霄琅書曰元皇玉靈之胄位登太眞理二儀於玄圃掌玉籙於萬仙揔地司於五岳領上眞於三關上統無涯下攝洞源自天以下莫不咸隷又曰太素三元君稟靈和玉宸上氣故結生虚無含眞秀景機洞妙無神齊廣暉道周九玄呼吸未兆觸物對應太上之凝結也太上四明玉經曰眞仙之道以耳目爲主淫色則目闇廣愛則耳閉此二病從中來而外奔也非復有他今令其聦明益易耳但不爲之當洗心絶念放弃淫貪所謂嚴其始矣保利雙闕啓徹九門朝液泥丸列爲上眞視徹甚逺聽於絕響此眞仙之高不但明耳目而已三洞珠囊曰髙上玉淸刻石隱銘曰酆都山在北内有空洞洞中有六宮書此銘於宫北壁制檢群凶不使橫暴生民學者得佩此刻石文則北鄷落名南宫度命爲其眞人太平經曰後學得道各有品階至于指極聖眞仙人定眞玉籙經曰凡欲定心當受上皇民籍定眞玉籙此至要爲學之先也先能定心仙名乃定是三天正一先生所佩以定得仙之名太上經曰玉淸者如玉堅不可毁淨不可汚也堅淳無變穢累都盡一而無雜故名爲眞人太上丹簡曰凡學道居眞人之位者名入南宫三五順行經曰合德入道號曰眞人太上遣四極眞人來迎授三天靈籙之文於上清宫上淸八景經曰精思百日眞人降形也葛玄五千文序曰精思逺感而上逺則太上遣眞人下授希微之旨又云靜思期眞則衆妙感會内觀形影則神氣長有體洽道德則百神震服大洞雌一篇曰金姿曜於東華玉形恱於帝門神映五老騰躍三元頂負寶曜浮遊九晨分形散景位爲上眞昇玄經曰惟須忠直尋道求眞改惡從善得爲眞人三元玉檢經曰歲庚寅九月九日甲辰元始於上淸宫告􅉀授三元玉檢使付後學有玄名應爲上淸眞人者太平御覽卷第六百六十
