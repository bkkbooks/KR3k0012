front:
  text: 太平御覽卷第九百四十六
  hash: sha256:4ae0b82768116b6924b5272193b003a85eb02c334b8cef6872d07f2559016d1f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_946-1a}
body:
  text: 蟲豸部三莎雞螽斯蜙蝑蝙蝠守宫蜣蜋白魚螗蜋蝍蛆莎雞毛詩豳七月曰六月莎雞振羽莎雞羽成而振之陸機毛詩䟽義曰莎雞如蝗而斑色翅數重下翅正赤或謂之天雞六月飛而振羽索索聲幽州人謂之蒲錯也爾雅曰翰天雞也孫炎注曰小蟲黑身赤頭一名莎雞郭璞注曰一名樗雞也廣志曰莎雞似蠶蛾而五色亦曰犨雞螽斯毛詩螽斯曰螽斯后妃子孫衆多也言若螽斯不妬忌則子孫衆多也螽斯羽詵詵兮螽斯蜙蝑也毛詩豳七月曰五月斯螽動股斯螽蜙蝑也蜙蝑陸機毛詩䟽義曰爾雅云螽蟴蜙宣龍切蝑相魚切也楊雄云舂黍也幽州謂之舂箕角長青色斑黒其股似瑇琩文五月中以兩股相瑳作聲間數十歩毛詩題網曰螽斯名蜙蝑一名舂黍似蝗而小青色長股而鳴喻后妃之性不妬忌子孫衆多爾雅白蜇音斯螽蜙蝑郭璞注曰蜙䗥也俗呼蝽蝙蝠春秋運斗樞曰揺光携則服翼兩頭並翔廢江淮山瀆之祠揺光不明服翼九足服翼附䑕也孝經援神契曰蝙蝠伏匿故夜食爾雅曰蝙蝠服翼也齊人呼爲蟙䘃或謂之仙䑕職墨二音抱朴子曰千歳蝙蝠色如白雪集則倒懸䐉重故也此物得而隂乾末服之令人壽四萬歳玄中記曰百歳伏翼其色赤止則倒懸千歳伏翼色白得食之夀萬歳水經曰交州丹水亭下有石穴甚深未甞測其逺近穴中蝙蝠大者如烏多倒懸得而服之使人神仙荆州記曰冝都夷道縣有石穴穴中有蝙蝠如烏多倒懸崔豹古今注曰蝙蝠一名仙䑕又曰飛䑕五百歳則色白腦重集物則頭垂故謂爲倒挂䑕食之得仙幽明録曰淮南郡有物髠人髪太守朱誕曰吾知之矣多置黐音離以塗壁夕有數蝙蝠大如雞集其上不得去殺之乃絶屋簷下巳有數百人頭髻范汪治瘧方曰蝙蝠七枚合擣五百發雞鳴服一丸禺中一丸遇發乃與粥清一升耳守宫毛詩節正月曰哀今之人胡爲虺蝪蝪螈也虺蜴之性見人則走陸機毛詩䟽義曰蜴一名榮原水蜴也或謂之䗂蜼音濉蛇醫如蜥蝪青緑色大如指形狀可惡也春秋考異郵曰土勝水故守宫食蠆宋均曰守宫生於土蠆藏物屬坎水也爾雅曰蠑螈􅔼蝪􅔼蝪蝘蜓蝘蜓守宫也轉相解慱異語别四名也漢書東方朔傳曰武帝置守宫盆下使射之朔曰臣以爲龍又無角謂之爲蛇又有足跂跂脉脉善縁壁若非守宫即􅔼蝪上曰善賜帛十匹抱朴子曰謂蜥蝪爲神龍者非但不識神龍亦不識􅔼蝪又曰沙礫無量而珠壁甚尠鴟隼屯飛而鸞鳯罕出虺􅔼盈藪而虬龍希覿王充論衡曰禹南濟於江黃龍負舟舟中人人五色無主禹乃咲而稱曰我受命於天竭力以勞萬民生寄也死歸也視龍猶蝘蜓也龍去而亡患楊雄方言曰秦晉西夏謂之守宫其在澤者謂之􅔼蝪南楚謂之蛇毉或謂之蠑螈北燕謂之祝蜓桂林之中守宫大能鳴者謂之蛤蠏許愼說文曰榮蚖蛇毉以注鳴者也在壁曰蝘蜓在草曰蜥蝪蜥蝪守宫也淮南萬畢術曰守宫塗齊婦人无子取守宫一枚置甕中及蛇衣以新布密褁之懸於隂処百日治守宫蛇衣分等以唾和之塗婦人齊磨令温即无子矣又曰守宫飾女臂有文章取守宫新合隂陽巳牝牡各一藏之甕中隂乾百日以飾女臂則生文章與男子合隂陽輙㓕去又曰取七月七日守宫隂乾之治合以井花水和塗女人身有文章則以丹塗之不去者不淫去者有姦徐懷逺南越志曰成陽縣樹多守宫大者能鳴謂之蛤蠏郭義㳟廣志曰守宫鱗色如虵而四足似蝘蜓有尺餘蝘蜓有屋壁間者有草野者有石上者博物志曰蜥蝪或蝘蜓以器養之食以朱砂躰盡赤所食满七斤擣萬杵以點女人支躰終身不滅故号曰守宫崔豹古今注曰蝘蜓一曰守宫一曰龍子善於樹上捕蟬食之其長細五色者名爲蜥蝪其短大者名爲蠑螈一曰蛇毉大者長三尺其色玄紺善魅人一曰玄螈一名緑螈曹叔雅異物志曰魚跳躍則蜥蝪從草中下稍相依近便共浮水上而相合事竟魚還水底蜥還草中于寳捜神記曰淮南書佐劉雅夢見青􅔼蝪從屋棟落其腹内因苦腹痛夢書曰守宫爲寡婦着垣牆也夢見守宫憂寡婦人也呉氏夲草經曰石龍子一名守宫一名石蜴一名山龍子楊子雲解嘲曰今子乃以鴟梟而咲鳯皇執蝘蜓而謿龜龍不亦病乎蜣蜋爾雅曰蛣蜣蜣蜋也郭璞曰黑甲蟲噉糞者也張揖廣雅曰天柱蜣蜋也一作天社許愼說文曰蜣蜋一曰天柱衝波傳曰蜣蜋無鼻而聞香抱朴子曰玄蟬㓗飢不羡蜣蜋穢飽郭義㳟廣志曰交州無蜣蜋崔豹古今注曰蜣蜋能以土包糞轉而成丸莊周所謂蛣蜣之智在於轉丸者也一名蜣蜋一名結蜣一名弄丸一名轉丸夢書曰蜣蜋爲憂財輔矣行者夢見蜣蜋憂財粮也白魚爾雅曰蟫音淫白魚也衣書中蟲一名蛃魚音丙張揖廣雅曰白魚蛃魚也齊書曰明帝𥘉有疾無輟聽覽羣臣莫知及疾篤勑臺省府署求白魚以爲藥外始知之夲草經曰白魚一名衣魚治婦人疝疵小便不利小兒頭中風項彊皆冝摩之生咸陽呉氏夲草經曰衣中白魚一名蟫范汪方曰治小便不利取白魚二七擣之令糜爛分爲數丸頓服之即通也螳蜋易通繫卦曰螳蜋搏蟬之蟲乗寒而殺物自隱蔽而有所害捕搏之象也周書時訓曰芒種之日螳蜋生不生是謂隂息韓詩外傳曰齊莊公出獵有螳蜋舉足将搏其輪問其御曰此何蟲對曰此螳蜋也爲蟲知進而不知退不量力而輕就敵公曰此爲天下勇士矣廻車避之勇士歸焉淮南子同又曰楚莊王将伐晉告士大夫有諌者死孫叔敖曰臣園中有榆榆上有蟬蟬方奮翼悲鳴不知螳蜋在後欲攫而食之螳蜋方取蟬不知黄雀在其後也禮記月令曰仲夏之月螳蜋生蔡邕月令章句曰螳蜋蟲名食蟬殺蟲鄭禮記注曰螳蜋螵蛸母也王瓉曰爾雅云莫貈螳蜋同類物色也今沛魯以南謂之螳蜋燕趙之際謂之食肬齊兖以東謂之馬敷爾雅曰莫貈螳蜋蛑螳蜋有斧蟲江東呼爲石蜋蛑音謀貈户各反不過蟷蠰螳蠰螳蜋别名堂襄二音其子蜱蛸一名折蟭螳蠰卵也蜱音禆音搏蟭音焦張揖廣雅曰羊羊蛻蚘堂蜋也博焦夷冒焦螵蛸也華嶠後漢書曰蔡雍在陳留其鄰人有以酒食召雍者比至而酒酣焉客有彈琴於屏雍至門潜聽之曰嘻以樂召我而有殺心何也遂反将命者告主人曰蔡君向來至門而去主人遽自追而問其故雍具以告彈琴者曰我向鼓絃見螳蜋方向鳴蟬蟬将去未飛螳蜋爲之一前一却吾心聳然唯恐螳蜋失之也此豈爲殺心而形於声者乎雍曰此足以當之矣呉越春秋曰呉王夫差令於邦中曰寡人欲伐齊敢有諌者死太子友因諷諌以激於王以清且懷丸挾彈從後園而來衣浹履濡呉王夫差怪而問之太子對曰臣遊後園聞秋蟬之鳴往而觀之秋蟬登髙樹自以爲安不知螳蜋超枝縁條曳要舉刃欲哺其形也螳蜋貪心務進志在有利不知黄雀盛縁茂林俳徊枝葉欲啄螳蜋也莊子曰莊周游於雕陵之樊覩一異鵲自南方來者執彈而留之宿留伺其便也覩一蟬方得美䕃而忘其身螳蜋執翳且搏之執草以自翳見得而忘其形異鵲從而利之見利而忘其眞眞身也莊周怵然曰噫物固相累二類相召也捐彈而反走又曰螳蜋怒臂以當車轍不知不勝任也是才之美者也司馬彪曰非不有美才顧不勝任耳楊雄方言曰螳蜋謂之髠或謂之丁或謂之羊羊郭璞曰江東呼齕折按爾雅丁應下屬方言依此失其旨許愼說文曰螳蜋不過也一名蟷蠰一名研父邯鄲氏笑林曰楚人居貧讀淮南方得螳蜋伺蟬自鄣葉可以隱形遂於樹下仰取葉螳蜋執葉伺蟬以摘之葉落樹下樹下先有落葉不能復分別掃取數斗歸一一以葉自鄣問其妻曰汝見我不妻始時怕荅言見經日乃厭倦不堪紿云不見嘿然大喜賫葉入市對面取人物吏遂縛詣縣縣官受辝自說夲末官大笑放而不治夢書曰螳蜋爲亡人蔽匿草也夢見螳蜋憂亡命者范子許然曰螵蛸岀三輔上價三百呉氏夲草經曰桑蛸條蝕一名害焦一名致神農鹹無毒成公綏螳蜋賦曰戢翼應時延頸鵠望推翳俟前翹翼髙抗鳥伏蛇騰鷹擊隼放俯飛蟬而奮猛躍蟪蛄而逞壯距車輪而軒翥固齊侯之所尚郭璞螳蜋讃曰螳蜋氣蟲揮斧奮臂當轍不迴勾踐是避勇士致斃勵之以義蝍蛆春秋考異郵曰土勝水故蝍蛆搏蛇宋均曰蝍蛆生土虵藏物屬於坎坎水也爲隱伏爾雅曰蒺䔧蝍蛆郭璞曰似蝗大腹長角能食虵腦張揖廣雅曰蝍蛆呉公也荘子曰蝍蛆甘帶司馬彪曰帶小蛇也蝍蛆喜食其眼抱朴子曰南人入山皆以竹管盛活呉公呉公知有蛇之地便動作於管中如此則草中便有蛇也呉公見蛇能以氣禁之蛇即死淮南子曰月照天下蝕於蟾蜍螣蛇游霧而殆蝍蛆蟾諸月中蝦蟇也食月故曰食於蟾諸蝍蛆蓋呉公也殆猶畏者也沈懷逺南越志曰綏定縣多呉公其大者能以氣吸蜥蝪劉欣期交州記曰大呉公岀徐聞縣界取其皮可以冠皷宋永𥘉記亦同沈瑩臨海異物志曰晉安東南呉嶼山呉公千萬積聚或云長丈餘者以作脯味似大蝦嶺南異物志曰珠崖人毎晴明見海中逺山羅列皆如翠屏而東西不定悉呉公也嶺表録異曰蜈蚣南越志云大者其皮可以鞔皷取其肉曝爲脯美於牛肉又云長數丈能噉牛人或遇之則鳴皷燃火炬以驅逐之陶潜續搜神記曰曇遊道人清苦沙門也剡縣有一家事蠱人噉其食飲无不吐血死遊詣之主人下食遊依常呪願一雙呉公長尺餘便於拌中跳走遊快飲食安然无他王琰冥祥記曰沙門安法開者北人也甞見呉公長三尺自屋墮地旋徊而去葛洪遐觀賊曰呉公大者長百歩頭如車箱可畏惡越人獵之屠裂取肉白如瓠稱金爭買爲羹炙太平御覧卷第九百四十六
