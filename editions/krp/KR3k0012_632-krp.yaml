front:
  text: 太平御覽卷第六百三十二治道部十三
  hash: sha256:4453acc106c2a6935647df9bccff0149f55df8c71a2f79d9c0d6b44eadc41823
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_632-1a}
body:
  text: 薦舉下唐書曰杜如晦少聦悟精彩絶人太宗引爲秦府兵曹俄改陜州長史房玄齡白太宗曰餘人不足惜杜如晦聦明敏逹王佐之才若大王守藩無所用之必欲經營四方非此人莫可太宗乃請爲秦府掾封延平縣男𥙷文館學士貞觀𥘉爲右僕射又曰李大亮隋末爲賊所獲同軰百餘人皆死賊帥張弼見而異之獨釋與語遂定交於幕下大亮旣貴毎懷張弼之恩貞觀末弼爲將作丞自匿不言大亮遇諸途識之持弼手而泣悉推家産以遺弼弼辭不受大亮言於太宗曰臣有今日榮貴乃張弼之恩力也乞廻臣之官爵以授之太宗即日以弼爲中郎將俄迁代州都督又曰岑文本𥘉事蕭銑江陵平就授祕書郎直中書省李靖驟稱其才擢拜中書舎人漸蒙恩遇時顔師古諳練故事長於文誥時無迨者兾復用之太宗曰我自舉一人公勿憂也乃以文本爲中書侍郎專典樞宻又曰狄仁傑授汴州判佐工部尚書閻立本黜陟河南仁傑爲人誣告立本驚謝曰仲尼觀過知人足下可謂海曲之明珠東南之遺寳特薦之遷并州法曹又曰張柬之進士擢第爲清源丞年且七十餘永昌𥘉自免復應判䇿試畢有傳柬之考入下科柬之歎曰余之命也乃委歸襄陽時中書舎人劉允濟重考䇿自下昇甲科爲天下第一擢拜監察御史累遷荆州長史長安中則天問狄仁傑曰朕要一好人任使有乎仁傑對曰陛下則何任使則天曰朕方待以將相仁傑曰料陛下若求文章資歴則今之宰相李嶠蘇味道亦足爲文吏矣豈非文士齷齪思得大才以用之以成天下之務者乎則天恱曰此心也仁傑曰荆州長史張柬之其人雖老眞宰相材也且乆不遇若用之必盡忠於國家則天召以爲洛州司馬他日又求賢仁傑曰臣前言張柬之猶未用也則天曰巳遷之矣仁傑曰臣薦之請爲相也今爲洛州司馬非用之也乃遷秋官侍郎及姚崇將赴靈武則天令舉内外堪爲宰相者崇曰張柬之沉厚有謀能斷大事且其人年老惟陛下急用之登時召見爲同鳯閣鸞臺平章事年巳八十與桓彦範敬暉等誅二張興復社稷忠冠千古功格皇天又曰張嘉貞落拓有大志亦不自異亦不下人自平郷丞免歸鄉里布衣環堵之中蕭然自得時人莫之知也張循憲以御史出使還次蒲州驛循憲方復命使務有不决者意頗病之問驛吏曰此有客乎驛吏以嘉貞對循憲召以相見咨以使事積時凝滯者嘉貞隨機應之莫不豁然乃命草表又出其意外他日則天以問循憲其以實對因請以巳官讓與之則天曰卿能讓賢美朕豈無一官自進賢耶乃召見内殿隔簾與語嘉貞儀㒵甚偉神彩俊傑則天甚異之因奏曰臣生居草萊目不覩朝廷之事陛下過聽引臣天庭此萬代一遇也然咫尺之間若隔雲霧臣恐君臣之道有所未盡則天曰善遽命卷簾翌日拜監察御史開元中用之爲相又曰姜皎薦源乹曜玄宗見之大恱驟拜爲相謂左右曰此人儀形莊肅類蕭至忠朕故用之左右曰至忠以犯逆死陛下何故比之玄宗曰我爲社稷計所以誅之然其人信美才也又曰李勣少與郷人翟讓聚衆爲盗推李宻爲主言於宻曰天下大亂夲爲飢苦若得黎陽一倉大事濟矣遂襲取之時在飢餓就食者數十萬人魏徴髙季輔杜正倫郭孝恪軰客遊勣一見便加禮敬引之卧内談論忘疲及虎牢獲戴胄亟相推薦咸至大官時稱勣有知人之鑒又曰李義府僑居于蜀袁天綱見而竒之曰此郎貴極人臣但壽不長耳因請舎之託其子曰此子有七品相願提拔之義府許諾因問天綱壽幾何對曰五十二此外非所知也安撫使李大亮侍中劉洎等連薦之召見拜監察御史後位至宰相白虎通曰諸侯所以貢士於天子者進賢稱善者也天子躬求之者貪義也治國之道夲在得賢得賢即治失賢即亂孔叢子曰子髙見齊王王問誰可臨淄宰稱管穆焉王曰穆也容皃陋民不敬者子髙荅曰夫見敬在德且臣所稱其才也君王聞晏子趙文子乎晏子長不過六尺面狀醜惡齊國之上下莫不宗焉趙文子其身如不勝衣其言如不岀口非但體陋辭氣又訥其相晉國以寧諸侯敬服皆德故也以穆軀形方諸二子猶悉賢之昔臣甞行臨淄市見屠啇焉身長八尺鬚髯如㦸面正紅白市之男女未有敬者無德之故也王曰是所謂祖龍始者也誠如先生之言於是乃以管穆爲臨淄宰韓子曰趙武薦四十六人於其君及武之死也四十六人皆就賔位無私德若此武薦曰屋之士六十餘家戰國䇿曰淳于髠見七人於宣王王曰子來也寡人聞千里一士是比肩相望百丗一聖若隨踵而至者也今子一日而見七士不亦衆乎髠曰不然夫鳥同翼者聚居獸同足者俱行今求茈葫桔梗於沮澤則累丗不得一焉若求之梁甫之隂則連目夫物有等今髠賢者之儔王求士於髠譬如挹水於河而求火於燧也言易得也國語曰文公使原季爲卿原季趙襄文公二年爲原大夫辭曰夫三德者偃之岀也三德先披先斬咠臣也偃狐偃也三子皆偃所進以德紀民其章大矣不可廢也使狐偃爲卿辭曰毛之智賢於臣其齒又長毛偃之兄齒年毛也不在位不敢聞命乃使狐毛將上軍狐偃佐之又曰趙宣子言韓獻子於靈公以爲司馬河曲之役趙孟使人以其車乗于行秦與晉戰在魯文十二年獻子執而戮之衆咸曰韓厥必不没矣其主朝升之而暮戮其車其誰安之宣子召而禮之曰吾聞事君者比而不黨夫周以舉義比也舉以其私黨也夫軍事無犯犯而不隱義也吾言汝於君懼汝不能也舉之而不能黨孰大焉勉之長臨晉國者非其誰勉之告諸大夫曰司賀我矣吾舉厥也而中吾乃今知免於罪矣免失舉之罪韓詩外傳曰魏文侯之時子質仕而獲罪焉去而北遊謂簡主曰吾所樹朝廷之大夫半所樹邊境之人亦半今堂之士惡我於明君朝廷大夫中我於法邊境之人劫我以兵是以不復樹德於人簡主曰噫子言過矣春樹桃李夏得䕃其下秋得食其實春樹蒺䔧夏不得採其葉秋得其刺焉由此觀之在所樹也今子之所樹非其人耳吕氏春秋曰管仲病桓公徃問之曰仲父之病矣言其病困如漬甚國人弗諱寡人將誰屬國管仲對曰昔者臣盡力竭智猶未足以知之也今病在於朝夕之中臣奚能言桓公曰此大事願仲文教之寡人也管仲敬諾曰誰欲相欲用誰相公曰鮑叔牙可乎管仲對曰不可夷吾善鮑叔牙牙之爲人也清廉㓗直視不已若者不比於人一聞人之過終身不志勿已則隰朋其可乎隰朋之爲人也上志而下求醜不若黄帝而哀下巳若者自醜其徳不如黄帝又恐不若巳也其於國也有不聞不求聞而善求在利國而已矣其於物也有不知也物事也非事職不求知知其於人也有不見也務在齊民不求見也勿巳則隰朋可矣夫相大官也處大官者不欲小察不欲小智故曰大匠不斵但規模而已不復自斵削大庖不豆調和五味不復自列大虜不聞又曰魏公叔座疾惠王徃問之曰公叔之病甚矣將柰社稷何對曰臣之庶子鞅者願王以國聽之若不能聽勿使岀境王不應岀謂左右曰豈不悲哉夫以公叔之賢今謂寡人必以國聽鞅悖也公叔死公孫鞅西遊秦秦孝公聽之秦果強魏果弱又曰百里奚之未遇時至虢而虜飯牛於秦練以鬻五叛之皮公孫披得恱之獻諸繆公三日請屬事焉公曰買之五羊皮而臣之無乃爲天下笑乎披曰倍賢而任之君之明也讓賢而下之臣之忠也君爲明臣爲忠彼信賢也境内將服敬國且畏夫誰暇笑哉用之謀無不當舉必有功說苑曰田子方渡西河遇翟黄乗􅎮車子方曰子何以致此乎曰昔西河無守臣進吴起鄴無令臣進西門豹酌無令臣進北門可君欲攻中山臣進樂羊魏於天下難治臣進李克進此五大夫爵位於此又曰子貢問孔子曰今之臣孰賢孔子曰齊有鮑叔鄭有子皮子貢曰齊無管仲鄭無子産者乎孔子曰吾聞鮑叔之進管仲子皮之進子産未聞管仲子産有所進也又曰孟嘗君進客於齊王三年不見用故客反見曰不知臣之罪耶君之過耶孟甞君曰寡人聞縷因鍼而入不因針而急女因媒而嫁不因媒而畜夫子之才必薄矣當怨寡人哉客曰臣聞韓盧天下疾狗也見兔而指屬則不失兔望見而放狗非不能屬者罪於是孟嘗復屬齊王王遂使爲相又曰蘧伯玉使之楚逢公子哲濮水之上接草而侍曰聞上士可以託邑中士可以託辭下士可以託才三言固可得託也伯玉曰謹受命伯玉見楚王使事畢坐從容言士王曰何國最多士伯玉曰楚多士而楚不能用王曰是何言也伯玉曰子胥生於楚而吴善用之賁皇生於楚而晉善用之今者臣之來逢子哲曰上士可以託邑中士可以託言下士可以託才三言者固可得託於是楚王發使追公子哲濮水之上子哲還重於楚伯玉之功也劉向新序曰楚莊王罷朝而晏樊姬問其故莊王曰與賢相語不知晏者也樊姬曰賢相爲誰王曰虞丘子樊姬掩口而笑王乃問其故曰虞丘子爲相數年未嘗進一賢不知賢是不智知而不進是不忠不忠不智安得爲賢明日朝王以樊姬之言告虞丘子虞丘子稽首曰如姬之言於是辭位而進孫叔敖叔敖相楚而莊王覇樊姬之力海内先賢傳曰潁川鍾皓字季和爲郡功曹太丘長陳寔爲西門亭長皓深獨敬異歳常禮待與同分義㑹辟公府臨辭太守問誰可代君曰府君欲得其人西門亭長可用寔卒爲海内髙名之臣歸以公相之位三輔决録曰頴陽游殷爲郡功曹有童子張旣爲書佐殷察畏之具設賔饌以子楚託之後魏王以問旣稱楚文武兼學王遂以爲漢興郡管輅别傳曰趙孔耀至冀州見裴使君問顔色何以清减孔耀曰體本無藥石之疾然見清河内有一騏驥拘繫後厩歴年去王良伯樂百八十里不得聘其足以起風塵以此憔悴耳使君言騏驥今何所在孔耀言平原管輅字公明年三十六雅性寛大與丗無忌觀天則能同妙甘公石申俯覽同異則能齊司馬季主遊歩道術開神無窮抱荆山之璞懷衣光之寳而爲清河郡所録北黌文學可爲痛心疾首者裴使君聞言恱慨曰如此便相爲取之即檄召輅爲文學從事一相見清論終日不覺罷倦天時大熱移床於廷前樹下乃至鷄鳴向晨復出再相見便轉爲鉅鹿從事三相見轉爲治中四相見轉別駕前至十月舉爲秀才文士傳曰張華薦成公綏曰竊見處士東郡成公緩年二十五字子安體珪璋之質資不器之量知深慮明足以妙見研恩篤好則仲舒之精引之丗貞幹足以敦風篤俗淵才逹學足以弘導丗教固逸倫之殊俊搢抻之檢式也荀爽與郭叔都書曰陳季方才德秀出超丗逸羣金相玉質文章席美終軍賈誼誠無以加冝遂貢之宰朝盛其龍光塩車之驥自非伯樂無以顯名採光剖璞以獨見寳實爲足下利之孔融薦祢衡表曰伏見處士平原祢衡淑質貞亮英才卓犖𥘉涉蓺文登堂覩奥目所一見輙傳於口耳所一聞不忘於心性與道合思若有神若得龍躍天衢奮翼雲漢足以明近署之多士増四門之穆穆應璩薦賁伯偉文詣曹公曰璩聞景雲浮則應龍翔治道明則儁乂臻是故良哉之歌興於唐堯之丗多士之頌形於周文之朝竊見太子舎人賁琳字伯偉禀性純和體素清慤冝授以千里之塗任以列曹之職陸機薦賀循郭訥表曰伏見武康令賀循德量邃茂才鑒清逺丞陽令郭訥風度簡曠器識朗㧞准其才望資品循可尚書郎訥可太子洗馬又陸機薦戴若思文曰蓋聞䌓若登御然後髙墉之功顯孤竹在肆然後降神之曲成伏見處士廣陵戴淵年三十字若思心智足以研幽才鑒足以辨物固窮樂志無風塵之慕砥節立行有渫井之㓗誠東南之貴寳聖朝之竒璞也楊方爲虞領軍薦張道順文曰盖聞驪龍之珠必沉紫泉之裏垂天之翼必翔青冥之表竊見處士呉國張道順天挺珪璋明逹清秀下筆掩彫龍之文登言吐掞天之藻慕西道之楊生希北卷之顔回若得清水淬其鋒鉞砥礪其鍔必騰躍天路出覿聖丗琴操曰史魚者衛靈公之相時蘧伯玉執清廉之節脩仁義之方史魚乃薦伯玉於靈公公曰諾其後未用史魚復入曰臣聞抱玉朝君不如貢賢夫國危者則思仁思安者則急賢公何嫌疑靈公謂史魚以庭褒虚飾良乆乃應之史魚岀謂其子曰我薦伯玉於公公以我言爲不信將自殺以明之我死後勿厚歛也用伯玉乃歛語畢進藥自殺靈公聞之曰痛哉寡人謂史魚徒謙退欲進士者也不意乃至於身死臨䘮拜伯玉代史魚公泣曰寡人負史魚悔焉無及者也太平御覽卷第六百三十二
