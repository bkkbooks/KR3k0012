front:
  text: 太平御覽卷第七百九
  hash: sha256:64e6a3b56481e53d802ded7c0c77e34dbb09ed43c7402fbf9df4b1b0613300df
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_709-1a}
body:
  text: 服用部薦蓆說文曰蓆籍也禮天子諸侯蓆有黼繡純又曰筵竹蓆也又曰蒻蒲子也可以爲薦釋名曰薦所以自薦藉也蒲平以蒲作之其體平也蓆釋也可卷可釋也書曰牗間南嚮敷重篾蓆黼純華玉仍几篾桃枝竹白黒雜繒縁之華彩色華玉以飾慿几因因也因生時几不改作西序東嚮敷重底席綴純文貝仍几東西廂謂之序底蒻革綴雜綵有文之具飾矣東序西嚮敷重豐蓆畫純雕玉仍几豐莞彩色爲畫雕刻鏤此養國老饗羣臣之坐西序南嚮敷重荀蓆玄紛純􅃮仍几荀蒻竹玄紛黒綬此親屬私宴之坐詩邶栢舟曰我心匪席不可卷也席雖平尚可卷禮曲禮上曰羣居五人則長者必異席席以四人爲節爲人子者坐不中席又曰有憂者側席而坐側猶持也有䘮者專席而坐專猶單也侍坐於所尊敬無餘席必盡其近者尊之端爲其後來也又曰姑姊妹女子子巳嫁而反兄弟不與同席而坐不與同器而食又曰奉蓆如橋居廟切横奉之令左昂古低如有首尾然橋井上􅥱槹衡上低昂請蓆何郷請祍何趾順折者所安也祍卧席也坐問郷卧問趾因於隂陽也席南郷北郷以西方爲上東郷西郷以南方爲上若非飲食之客則布席席間凾丈謂講問客也凾猶容也講問冝相對客文足以指畫也飲食之客布席於牗前主人跪正席客跪撫席而辭客徹重席主人固辭客踐席乃坐又檀弓下曰仲尼之畜狗死使子貢埋之曰丘也貧無蓋與之以席傳曰大輅越活音席昭其儉也服䖍曰越席紀草爲席又曰臧文仲不仁者三下展禽廢六關妾織蒲杜預曰家人敗席與民爭利周禮天官玉府曰王廂府掌王之袵愼鄭司農云袵席許曰純袵席軟弱布也又春官曰司几筵掌五席大朝覲大饗射凡封國命諸侯王位設黼依依前南郷設莞筵紛純加繅席畫純加次席黼純鄭司農云紛白繡也純縁純也謂紛有文如綬而狹者也繅席削蒲編以五彩若今合歡也畫謂雲氣也次者有文次列之也諸侯祭祀席蒲筵繢純加莞席紛純右彫几昨席莞筵紛純加繅席畫純筵甸役則設熊席凡䘮事設葦席大戴禮曰武王踐祚席前左端之銘曰安樂必敬前右端之銘曰無行所悔後左端之銘曰一反一側尓不可忘後右端之銘曰所鑒不逺視尓所代也論語曰席不正不坐君賜食必正席先嘗之史記曰蘇秦激張儀令相秦以馬薦席坐之又曰任安田仁俱爲衛將軍舎人居門下衛將軍從此兩人過平陽至主家令兩人與騎奴同席而食此二子拔刀斷席而坐主家皆怪而惡之莫敢問也又曰陳平以弊席爲門漢書曰文帝以莞蒲爲席又曰元帝病史丹以親宻侍疾候上獨寢直入卧内頓首伏青蒲上服䖍曰青緑蒲席也應劭曰以青䂓地曰青蒲自非皇后不得至此孟康曰以蒲青席弊地也後漢書曰更始至長安居長樂宫升前殿郎吏以次列庭中更始羞怍俛首刮席不敢視又曰來歙征隗囂徑至洛陽隗囂守將固保其城囂乃悉兵圍洛陽築堤灌城歙固守矢盡發屋斷木爲兵上自將上隴囂衆潰走於是置酒髙㑹勞賜歙班坐絶席在諸將之上又曰鄧訓於閨門甚嚴兄弟莫不敬憚諸子進見未當賜席接以温色又曰趙丙有術曽至渡頭求舡不得乃布席於水而坐呼風乃過又曰李恂遷武威太守坐事逸織席自給東觀漢記曰郭丹師事公孫昌敬重常持蒲編席人異之又曰王常爲横野大將軍位次與諸將絶席又曰黄香家貧躬執勤苦盡心供養暑則扇床枕寒則自温席又曰張禹爲太傳尚書鄧太后以殤帝𥘉育欲令重臣居禁内乃詔禹與三公絶席又曰宣秉建武元年拜御史中丞上特詔御史中丞與司隷校尉尚書令㑹同並專席而坐故京師號曰三獨謝承後漢書曰戴慿徴博士詔公卿大㑹羣臣皆就席慿獨立丗祖問其意慿對曰博士說經皆不如臣而坐居臣上是以不得就席令與諸儒難說善之後正旦朝賀令群臣說經更相難詰義有不通輙奪其席以益通者慿重五十席京師議曰解經不窮戴侍中又曰殷亮爲博士講學大夫諸儒論勝者賜席亮重八九席帝曰學不當如是也又曰許敬字鴻卿其郷吏有誣君者㑹於縣令坐敬拔刀斷席曰敬不忍與惡人同席又曰汝南薛惇字子禮爲北海長史家貧坐無完席妻曰君無俸禄給子孫復無完席耶惇以善與妻自坐敗者又衛良字叔賢拜尚書令病罷官還家家無完席賔客省之者坐桑下談論飲水去典略曰袁尚袁熈奔遼東公孫康先置精勇於廏中請熈尚熈尚入乃縛之坐於凍地尚寒求席熈曰頭顱方行萬里何席之爲蜀志曰先主少孤母販履織席爲業晉書曰王渾爲將軍鎮壽陽虚懷撫士坐無空席王隱晉書曰陶侃字士衡親人過侃宿時大雪無草侃母湛撤牀雜蔣手剉給客牛馬晉陽春秋云蔣薦也晉中興書曰王敦死褁以席塗以蠟埋齋中晉建武起居注曰立敬后廟薦席不用緑縁晉前燕書曰高祖廆年十五出避難追者急走避民家入其屋以席自障追者入屋發視無所見遂免宋書曰林邑王陽邁𥘉在孕其母夢生兒有人以金席籍之其色光麗夷人謂金之精者爲陽邁中國云紫磨者因以爲名宋起居注曰元嘉中劉禎爲御史中丞奏風聞廣州刺史韋朗於州部作白蒐席三百二十領請以事追免朗官呉均齊春秋曰劉璡字子璥耿介好禮嘗與故人共車於津陽内見一女子容質甚麗盻睞之璡因抽坐席懸車中以隔絶之其正如此唐書曰代宗時晉州男子郇摸以麻辨髪持竹筐􅓗席哭於東市三十字論時政每字條一事上即召見又曰玄宗子頴王璬爲劒南節度大使玄宗將幸蜀遣璬先赴夲郡渡綿州江乗舡見以綵縁席而籍者頋曰此可以爲寢處柰何賤之令撤去六韜曰桀紂之時婦人坐文綺之席衣以紈綺之夜家語曰明王之守也則必折衡千里之外其征也還師袵席之上漢書儀曰祭天紫壇紺席登地用六彩席六重吕氏春秋曰衛靈公天寒鑿池宛春諌曰天寒起土恐傷民曰天寒乎哉宛春曰公衣狐裘坐熊席陬隅有竈是以不寒莊子曰申屠嘉兀者也與鄭子産同師伯昏瞀人合堂同席而坐也魯連子曰人君所察者三不可以不知不知行與不行譬以方爲輪也不知冝與不冝譬以錦縁薦也列子曰陽朱南之沛之梁而過老子老子曰睢睢盱盱而誰與居夫太白若辱盛德如不足楊朱曰聞命矣其徃也舎者避席其來也焬者與之争竈席晏子曰景公獵休坐地而食晏子後至戍葭而席公不恱曰子猶席何也對曰臣聞介胄坐陳不席獄尸不席二者皆憂也臣故不敢以憂侍坐公曰善令大夫皆席又曰景公飲酒移於晏子晏子曰夫鋪薦陳簠有人臣不敢與焉又移於司馬穣苴曰鋪薦席陳簠簋者有人臣不敢與焉范子計然曰六尺蘭席出河東上價七十蒲席出三輔上價百子思子曰舜不降席而天下治桀紂不降席而天下亂韓子曰趙簡子謂左右曰車席泰羙夫冠雖惡頭必戴之履雖善足必履之金車如此其太羙也吾將何以履之且夫羙而耗上方義之道也又曰衛嗣公時縣有人於令左右縣令發褥而席弊嗣公令人遣席曰吾聞汝發褥而席弊其賜汝席縣令大驚以君爲神又曰孟獻伯相魯不坐重席又曰禹爲蔣席頗縁此弥侈矣而國不服者三十三殷作茵席彫文弥侈矣國之不服者五十三又曰文公至河令席袵捐之咎犯聞之曰席蓐所卧也而君弃之臣不勝其哀說苑曰孔子困於陳蔡之間居環堵之内席三經之席塩鐵論曰古者庻人蒲席以草經及後踐蒲蒻複筵方薦帛縁者也又曰古者大夫複薦草縁蒲平單莞今富者繡茵崔豹古今注曰草名虎鬢者江東織以爲席曰西王母席也東宫舊事曰太子有獨坐龍鬢席赤皮花經席一領山海經曰鵲山至箕尾山其神皆鳥身龍首祠之用白管爲席西京雜記曰昭陽殿設縁熊席毛皆長一尺餘眠而雍毛自弊望之者不能見也坐則没膝其中雜薫諸香一坐此席餘香百日不歇也又曰趙飛鷰爲皇后其女弟上遺廻風席漢武帝内傳曰帝齊於尋真臺紫羅薦地夜二更後西王母至也王子年拾遺録曰軒皇使百辟羣臣受教者先列珪玉於蘭蒲席上又曰蕖葉草髙五丈葉色如紺葉形如半月之勢亦曰半月花草無實其質温柔可以爲蓆又曰方丈山有草名濡䓸葉色如紺莖色􅃮細軟可縈海人織以爲薦蓆卷之不盈一手舒之列又曰崑崙山有葭紅色可編爲席温柔如毯毳焉又曰瀛州南有金巒之舘有青珤几覆以雲紈之素席用香水柔莞又曰岱與山有草名莽音莽煌葉圎如荷去之十歩炙人衣服則蕉鳥獸不敢近也刈以爲席方冬弥温以枝相磨則火出矣又曰穆王時西王母來敷碧蒲之席黄莞之薦莞色若金又曰燕昭王設麟文席麟文者錯雜寳飭席爲雲霞麟鳯之狀神仙傳曰淮南王爲八公設象牙席異苑曰庾寔妻毛氏五月曬暴薦蓆忽見其三歳女在蓆下薦上卧驚怛便滅女眞形在别床如故不旬日而夭丗傳仲夏忌移床搜神記曰羅威字徳行以至孝母老天寒以身温席而後授其處鄴中記曰石虎作席以錦裏五雜香以五綵綖編蒲皮縁之錦范汪荆州記曰安城郡今屬江州岀桃枝蓆成公興内傳曰登白鹿山延成君入爲敷魚鬢之席文士傳曰張􅌂朱異張純三人共詣驃騎將軍朱據聞三人才名告各爲賦然後乃坐純席曰蓆爲冬設簟爲夏施揖譲而坐君子攸冝皇甫謐髙士傳曰嚴君平成都市賣卜詔徴不起蜀有冨人羅仲與君平善問何以不徃曰無車粮中即爲具車焉粮籼平君曰吾病身非不足也我有餘而子不足也我有餘而子不足柰何以不足奉有餘也仲曰吾一席直萬金子無檐石乃云有餘謬矣又曰老萊子親没隱䝉山之陽枝木爲床薦艾爲蓆益部耆舊傳曰張充爲州治中從事刺史每自坐高床爲從事設單蓆於地鍾玩良吏傳曰呉隱之字處黙鄄城人也轉廣州刺史返舟之日唯身而巳宅有茅茨六間坐無完蓆以蓬爲屏風㑹稽先賢讃曰董昆字文通爲太農帑丞坐無完蓆盧毓兾州論常山爲林大陸曰澤兼葭蒲葦雲母御蓆地産不爲無珎也汝南先賢傳曰鄭敬以茅葭爲蓆常隨𣏌桞之隂㑹稽典録曰隆脩字奉遷爲豫章太守㕔事薦編絶不改以郡風俗不整常卷坐蓆唯徐穉李贄數詣問乃待以殊禮丗說曰管寜與華歆同蓆嘗讀書有乗軒冕過門者廢書出看寧割蓆分坐曰子非吾友也楚辭曰瑶蓆兮玉鎮楊雄甘泉賦云靡薜荔以爲蓆兮折瓊枝以爲芳魏劉禎清慮賦曰布玳瑁之蓆設蟕蠵之筵蠵恱吹切蟕蠵大亀也太平御覽卷第七百九
