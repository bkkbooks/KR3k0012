front:
  text: 太平御覽卷第七百五十三
  hash: sha256:5a6b6eebcff312921c7f6d6cfe2900b92afee23c90603d4a94a07cb40d8f1e9f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_753-1a}
body:
  text: 工藝部十圍碁投壷圍碁左傳曰寗喜許納衛獻公太叔文子曰今寗子視君不如弈碁弈者舉碁弗定不勝其偶而況置君弗定乎弈圍碁也九丗之卿族一舉而滅之可哀也哉魏志曰王粲觀人圍碁局壞壞謂白黒旣亂粲復爲之碁者不信以𫀆蓋局便更以他局爲之用相比校不誤一道魏氏春秋曰孔融𬒳誅二子碁而不起左右曰尓父見報不起何也二子曰安有巢毀而卵不破者乎蜀志曰費禕與來敏圍碁于時羽撽交馳人馬擐甲嚴駕巳訖而禕留意對戲色無厭倦禕至敵遂退呉志曰孫權太子和常言甞丗士人冝講修術學習射御以周丗務而但交逰博弈以妨事業非進取之謂也後羣僚侍宴言及博弈以爲妨事費日而無益於用勞精損思終無所紀非所以進德修業積累功緒也人情猶不能無嬉娯嬉娛之好亦在飲宴琴書射御之間何必博弈可以爲欣乃命侍坐者八人各著論以矯之於是中庶子韋曜退而奏論和以示賔客時蔡欵好弈故以諷之呉録曰嚴武字子卿圍碁莫與爲輩謂之八絶晉書曰王質入山斫木見二童圍碁坐觀之及起斧柯巳爛矣又曰賈謐甞與太子弈碁争道成都王熲在坐正色曰皇太子國之儲君賈謐何得無禮也又曰符堅率衆號百萬次于淮淝京師震恐加謝安征討大都督兄子玄入問計安夷然無懼色荅曰巳別有㫖旣而寂然玄不敢復言及令張玄重請安遂命駕岀墅親朋畢集方與玄圍碁賭别墅安常碁劣於玄是日玄懼便爲敵手而又不勝安頋謂其甥羊曇曰以墅乞汝又曰王導與其子恱弈碁争道導笑曰相與有瓜葛那得爲尓耶又曰祖納爲軍諮祭酒納好弈碁王隱謂之曰禹惜寸隂不聞數碁對曰我以忘憂耳鄧粲晉紀曰阮籍母死與人圍碁如故對者求止籍不肯留決勝焉晉中興書曰王恬字敬豫與濟陽江霖俱善弈碁爲中興第一又曰陶侃在荆州見佐吏博弈戯具投之於江曰圍碁者堯舜以敎愚子博者啇紂所造諸君並懷國器何以爲此一本爲牧猪奴戯晉起居注曰鎭東司馬顔延之坐圍碁免官沈約宋書曰羊玄保爲黄門侍郎善弈碁碁品第三太祖亦好玄數䝉引見與太祖賭郡戲勝得𥙷宣城太守又曰徐羡之沉密寡言不以憂喜見色頗工弈碁當丗以此推之又曰謝弘微性無愠色末年與人圍碁西南有碁死勢有人曰南風急或覆舟人悟救之弘大怒投局於地識者知其莫年齊書曰能碁人琅耶王抗爲第一品呉郡禇思莊㑹稽夏赤松第二品赤思速善於鬭碁宋文帝丗羊玄保戯因製局圖還於帝前覆之太祖使思莊與王抗官賭自食時至日暮一局始竟上倦遣還省至五更方决抗睡於局後思莊逹暁不寐丗或以思莊所品第致髙縁其用思深乆人不能對也又曰武帝好圍碁碁甚拙去格七八道物議共欺爲第三品與第一品王抗圍碁依品賭戲抗毎饒借之曰皇帝飛碁臣抗下能斷帝終不覺以爲信然好之愈篤又曰武陵王曄少年時貧無碁局乃破荻爲片縱横以爲碁局指點行勢遂至名品燕書曰羅騰字叔龍工圍碁究盡其妙獨歩當時俄而右北平樂抄少携出與齊焉後魏書曰甄琛舉秀才入都積歳頗以弈碁弃日至乃通夜不止有蒼頭者常令秉燭或時睡即大加其杖如此非一奴後不勝楚痛乃白琛曰郎君辭父母仕宦京師若爲讀書執燭不敢暫非乃以圍碁日夜不息豈是向京之意而肆加杖罰不亦理乎琛惕然慙感遂從許赤虎假書研習聞見益優陳書曰梁武帝詔校定碁品到漑朱异巳下並集陸瓊時年八歳於客覆局由是京師號曰神童唐書曰順宗朝罷翰林隂陽星卜醫相射覆碁弈諸待詔三十二人𥘉王叔文以碁待詔旣用事惡其與巳儕類相亂故罷之江表傳曰吕範討山越還白事於孫䇿從容獨與圍碁因論軍旅西京雜記曰杜夫子善弈碁爲天下第一或譏其費日夫子曰精其理者足以大禆聖教又曰戚夫人侍兒賈佩蘭後出爲扶風人假儒妻說在宫内時常以八月四日出雕房北户竹下圍碁勝者終年有福負者終年疹病取絲縷就北辰祈求延命乃免述異記曰朱道珍常爲孱陵令南陽劉廓爲荆州叅軍每與圍碁日夜相就局子略無暫輟道珎以宋元徽三年六月亡至九月廓坐齋中忽見一人以書授廓云朱孱陵書廓開書㸔是道珍手跡云每思碁聚非意致闊方有來縁想能近領廓讀書畢失信所在失其書信寢疾尋亡孟子曰弈秋通國之善弈者也使弈秋誨二人弈其一人專心致志惟弈秋之爲聽一人雖聽之一心以爲有鴻鵠將至思援弓繳而射之雖與之俱學弗若之矣抱朴子曰葛洪體鈍性駑所寡玩好見人博戲曽不目眄至今不知碁局幾道又曰善圍碁者丗謂之碁聖故嚴子卿馬綏明有碁聖之名也淮南子曰行一碁不足以見智彈一弦不足以見裴尹文子曰以智力求者喻如弈碁進退取與攻刼放捨在我者也陳留志曰阮簡字茂弘爲開封令縣有劫賊外白之甚數簡方圍碁長嘯吏云刼急簡曰局上刼亦甚急其髙率如此揚子法言曰圍碁擊劒反目胲形亦皆自然也愽物志曰堯造圍碁丹朱善之新語曰丗言圍碁或言兵法之類上者張置踈逺多得道而勝中者務相遮絶争便求利下者守邊隅趨作罫古買反線間方因也猶薛公之言黥布反也上計取呉楚廣地中計塞成臯遮要争利下計據長江以臨越守邊隅趨作罫者也俗說曰羊玄保作吏部郎數𬒳召見後有傳詔來始入門其兒靈孫年十許歳見傳詔語其父云兒知也正當圍碁耳語林曰王中郎以圍碁是坐隱亦以圍碁爲手談又曰王武子與武帝圍碁孫皓在側武子問孫歸命何以好剥人面皮皓曰見無禮於君者則剥之乃舉碁局下故譏之又曰豫章太守顧劭是丞相雍之子在郡卒時雍方盛集僚屬圍碁外信至而無兒書雖神意不變而心料有故賔客旣散方歎曰巳無延州之遺累寧有䘮明之責耶於是豁情散哀顔色自若方言曰圍碁者自關東齊魯之間謂之弈班固弈指曰北方之人謂碁爲弈弘而說之舉其大略義亦同矣局必方正象地則也道必正直體明德也其有黄黒隂陽分也駢羅列布效天文也四象旣陳行之在人蓋王政也法則臧否爲仁由巳道之正也夢書曰夢圍碁者欲鬪也魏粲圍碁賦序曰清靈體道稽謨玄神圍碁是也魏應瑒弈勢曰蓋碁弈之制所由來尚矣駱驛雨集魚鱗鴈峙奮維闔翼固衛邊鄙㓂動北疊備在南尾晉劉恢圍碁賦序曰司空從事中郎庾仲𥘉性好圍碁終不逹碁旨言文則觸類而至對局則冥然而窮何所解如彼之易所礙如此之難哉投壷禮記曰投壷之禮主人奉矢司射奉中使人執壷投壷射之類也主人請曰某有枉矢哨且醮切哨不正貌壷請樂賔賔曰子有旨酒嘉肴旣受賜矣又重以樂敢辭主人曰抂矢哨壷不足辭也敢固以請賔曰某旣賜矣又重以樂敢固辭主人曰枉矢哨壷不足辭也敢固以請賔曰某固辭不得命敢不敬從下得命不以命見許賔再拜受主人般還曰辟賔再拜受受矢也主人阼階上拜送賔般還曰辟拜送送矢也巳拜受矢進即兩楹間退反位揖賔就筵司射進度壷間以二矢半反位設中東面執八筭興設中亦賔也八筭於中横委其餘於中西執筭而立以請賔俟投請賔曰順投爲入比投不釋勝飲不勝者正爵旣行請爲勝者立馬一馬從二馬三馬旣立請慶多馬請主人亦如之請猶告也順投矢夲入也比投不捨也勝飲不勝言以能養不能也禮記曰壷頸脩七寸腹脩五寸口徑二寸半容㪷五升壷中實小豆焉爲其矢之躍而出也壷去席二矢半矢以柘若棘母去其皮取其堅且重也或言去其皮節也左傳曰晉侯以齊宴中行穆子相投壷晉侯先穆子曰有酒如濰有肉如坘寡君中此爲諸侯師中之齊侯舉矢曰有酒如澠有肉如陵寡人中此與君代興東觀漢記曰祭遵薨范淑上䟽曰遵爲將軍取士皆用術對酒設樂必雅歌投壷魏略曰邯鄲淳字元淑作投壷賦千餘言奏之文帝以爲工賜帛十疋又曰游楚好投壷自娯晉書曰石崇有妓善投壷隔屏風投之王弼別傳曰弼性和理樂遊宴解音律善投壷崔寔傳曰投壷者皆以多筭飲少筭西京雜記曰武帝時郭舎人善投壷以竹爲矢不用棘也古之投壷取中而不求還故實小豆惡其矢躍而出也郭舎人則激矢令還一矢百餘反語之爲驍言如博之堅於軰中爲驍傑毎爲武帝投壷輒賜金帛獻帝春秋曰袁紹聞魏郡兵反與黒山賊等數萬人共覆鄴城殺郡守坐中家在鄴者憂怖失色或起而啼泣紹觀督引滿投壷言笑容旨自若晉陽秋曰王胡之善於投壷言手熟閉目神異絶經曰東荒山中有大石室東王公居焉與一玉女投壷設有入不出者天爲之笑張華曰天笑者開口流光藝經曰投壷法十二籌以象十二月之數投壷變曰謂之投壷者取名蓨他由切藪漸而轉易鑄金代焉逮之于後人事生矣壷底去一尺其下筍以龍玄玄月中蝦蟇隨其生死也横日筍龍蛇之類運之以皫平表切蝦謂龍下皫蝦也燕尾鷰識候而歸人來去有恒投而歸人自數之極也矢十二數之極也長二尺八寸法於甞矣古用拓棘古
