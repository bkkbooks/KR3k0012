front:
  text: 太平御覽卷第五百五十五禮儀部三十四
  hash: sha256:6d09952502a9a67e7138ec1bdc1fa75c85fb24a932230a81bb3510b9fa08932a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_555-1a}
body:
  text: 葬送三晉中興書曰東海王越妃裴氏痛越棺柩𬒳焚乃招魂葬越於丹徒中宗以爲非禮下詔曰夫冡以藏形廟以安神今世招魂葬者是埋神也其禁之後魏書曰韓延字顯宗爲虎牢鎭將初延曽徃栢谷塢有魯宗之墓有終焉之志因謂子孫曰我不勞向北代葬也即可就此子孫從其言崔鴻後燕録曰趙秋字武汲郡朝歌人也輕財好施隣人李玄度母死家貧無以葬秋謂其兄曰赴死救不足仁之本也家有二牛以一牛與之玄度得以葬他年秋夜行見一老母遺秋金一餅曰子能葬我是以相報子五十已後當富貴不可言勿忘玄度也宋書曰謝方明父冲爲孫恩所殺伯父邈守呉興又爲孫恩黨害之方明體素羸弱而勇決過人結邈門生討其黨悉擒手刃之時亂後吉凶禮廢方明合門遇禍資産無遺而營舉之功盡力數月葬送並畢平世備禮無以加也南史曰王思逺少無仕心宋建平王景素辟南徐州主簿深見禮景素𬒳誅左右離散思逺親視殯葬手種松栢與盧江何昌寓上表理之宋書曰王徽少好學弟僧謙亦有才譽爲太子舎人遇疾徽躬自處療而僧謙服藥失度遂卒徽深自咎恨發病不復自療哀痛僧謙不能巳以書告靈僧謙卒後四旬而徽終遺令薄葬不設轜旐鼓挽之屬施五尺床爲靈二宿便毀又曰范泰卒𥘉議贈開府殷景仁曰泰素望不重不可擬議台司竟不果及葬王弘撫棺哭曰君生平重殷鐵今以此爲報沈約宋書曰呉逵呉興烏程人經荒饉繼以疾病父母兄弟嫂及郡羣從小功之親男女死者十三人唯逵夫妻獲全家徒四壁立冬無𬒳袴晝則傭賃夜則伐木燒塼妻亦同逵此誠朞年中成七墓十三棺亦出中興書王韶孝子傳南史曰顧憲之仕齊爲衡陽内史先是郡境連歳疾疫死者太半棺椁尤貴悉褁以葦席弃之路傍憲之下車分告屬縣求其親黨悉令殯葬其家人絶滅者憲之出公禄使綱紀營護之又土山人有病輒云先亡爲禍皆開冡剖椁水洗枯骨名爲除祟憲之曉諭爲陳生死之別事不相由風俗遂改又曰王儉領中書監參掌選事其年疾上親視薨年三十八詔衛軍文武及臺所給兵仗悉停待葬又詔追贈太尉加羽葆鼓吹増班劒爲六十人葬禮依太宰文簡公禇彦回故事齊書曰𥘉豫章王嶷葬金牛山文惠太子葬夾石竟陵王子良臨送望祖硎山悲感歎曰北瞻吾叔前望吾兄死而有知請葬兹地及薨葬焉又曰何點哀樂過人嘗行逢葬者歎曰此哭者之懷豈可思耶於是悲慟不能禁梁書曰到漑臨終託子孫薄葬之禮曰氣絶便歛歛以法服歛竟便葬不須擇日凶事心存約儉孫姪不得違言便屏冢人請僧讀經噆唄及卒顔色如恒手屈二指即佛道所云得果也又曰顧憲之臨終爲制勑其子曰夫出生入死理兼晝夜生即不知所從死亦安識所徃延陵云精氣上歸于天骨肉下歸于地魂氣則無不知良有以也雖復茫昧難徴要若非妄百年之期迅若馳隙吾今預焉終制瞑目之後念並遵行勿違吾志也莊周澹臺逹生者也王孫士安矯俗者也吾進不及逹退無所矯常謂中都之制允理愜情衣周於身示不違禮棺周於衣足以蔽臭入棺之物一無所須載以輴車覆以麄布爲使人勿惡也崔鴻三十國春秋夏録曰赫連昌發二百里内民二萬五千人鑿嘉平陵七千人繕清廟於契呉𥘉昌父勃北遊契呉昇髙而歎曰美哉斯阜臨廣澤而帶清流吾行地多矣未有若斯之美昌以勃平昔之意也故立廟焉葬勃曰於城西十五里起行宫摸冩統萬宫殿飾以金銀珠璣葬訖楚之殺駿馬數千疋唐書曰貞觀十年葬文德皇后於昭陵因山爲墳不封不樹太宗懲秦漢巳來厚葬以致發掘因序平生之志刻於石以誡將來又曰髙宗以頻年飢儉召雍州長史李義琛謂曰庶人之徒啇賈雜類竟爲厚葬違越禮度雍州列郡之首四方取則卿爲嚴禁勿復使然也又曰𥘉玄宗因拜橋陵至金粟山覩㟵巒有龍盤鳯翥之勢謂左右曰吾千秋後宜葬此地羣臣乃追先旨築陵此山曰泰陵又曰蘇頲葬上遊咸宜宮將出獵聞頲䘮出愴然曰蘇頲今日葬吾寧忍娯遊遂還宫又曰𥘉涇原節度使劉昌之領涇州也平涼盟㑹所亡殁將士骸骨在焉乃令聚而坎瘞之因感夢於昌有媿謝之意遂以聞由是下詔深自剋責仍遣秘書少監孔述睿及中官以御厨饌物及内造衣服數百襲令劉昌収其骸骨以歸大將三十人將士一百人皆具棺櫕歛以衣服葬於淺水原置二塜其大將曰旌義塜將士曰懷忠冡詔翰林學士撰二冡誌文及祭文其曰劉昌盛陳兵於葬所具牢饌祖祭之禮昌及大將皆素服臨之焚其屍及𥿄錢千幅又立三堠題以冡名表於道傍師人觀之莫不感泣穆天子傳曰甲辰天子南葬盛姬於樂池之南即玄池也天子乃命盛姬之䘮視皇后之葬法河濟之間共事供給葬事七萃之事抗即車舉棺以就車御日月之旗七星之文今旒上畫日月及北斗星周禮日月爲當旗亦通名也鼓鍾以葬山海經曰秋山帝堯葬于陽今堯冡在濟隂陽城縣也帝嚳葬于隂爰有熊文虎雕虎文王皆葬其所文王墓今在畢也案帝王冡墓有定處而山海經徃徃偏見之者盖以爲聖人在於其位仁化廣及恩沾鳥獸至於殂亡四海若䘮考妣無思不哀故絶域殊類之聞天子崩各自立廟祭起土爲冡也又曰務隅之山帝顓頊葬于陽冡在頓丘城門外廣陽里中也九殯葬于隂婦嬪又曰赤水之東蒼梧之野舜與叔均之所葬也叔均啇均墓今在九疑山中也其中有九疑山舜所葬在長沙零陵界中九疑山九谿其山皆相似又曰邢天與帝爭神帝斷其首葬之常羊山及乃以乳爲目以臍爲口玄中記又載晏子曰景公成路寢之基逢於何遭晏子再拜前日於何之母死兆在路寢之臺牖下願請合骨晏子入白公公作色曰自古及今子亦甞聞請葬人主之宫者乎對曰古之人君不奪生人之居不殘死人之墓故未嘗聞請葬人主之宫也嬰聞之生者不安命之曰畜憂死者不葬命之曰畜哀畜憂者怨畜哀者危君不如許之公曰諾逢於何遂葬路寢之䑓牖下墨子曰古者聖人制爲葬埋之法曰棺三寸足以朽體衣衾二領足以覆惡者昔堯北教八狄道死卬卬之山衣衾二領滿坎無封巳葬牛馬乗之舜西教犬戎道死南紀之市旣葬而市人乗之禹東教於越葬於㑹稽之山桐棺三寸皆下不及泉上無通臰三王者豈財用不足哉以爲葬埋之法也孟子曰滕文公卒葬有日矣天大雨雪甚至牛目羣臣請㢮期太子不許惠公諌曰昔王季葬滑山之尾欒水齧其墓見棺前和文王曰先君欲見羣臣百姓矣乃出爲張三日而後葬令太子亦曰先王以留而撫社稷故使雪㢮其期更爲日此文王之義也太子曰善莊子曰莊子將死弟子欲厚葬之莊子曰吾以天地爲棺椁日月爲連璧星辰爲珠璣萬物爲齊送吾葬具不備耶何以加此弟子曰吾恐烏䳒之食夫子也莊子曰在上爲烏䳒食在下爲螻蟻食奪彼與此何偏耶又曰莊子送葬過惠子之墓顧謂從者曰郢人有漫以堊汚其鼻端若蠅翼使匠石斵之運斤成風堊盡而鼻不傷自夫子之死吾無質矣吾無與言之矣韓子曰墨者之葬也冬日冬服夏日夏服桐棺三寸執䘮二日世主以爲儉而尤之儒者破家而葬債子而償執䘮三年毀而扶杖世主以爲孝而禮之也又曰齊國好厚葬布帛盡於衣衾材木盡於棺椁桓公患之以告管仲曰布帛盡則無以爲幣材木盡則無以爲守備而人厚葬之不休柰何管仲對曰凡人之有爲也非名之則利之也乃下令曰棺椁過度者僇其尸罪夫當裘者夫僇死無名罪當䘮者無利人何故爲之也尸子曰禹之䘮法死於陵者葬於陵死於澤者者葬於澤桐棺三寸制䘮三日舜西教平七戎道死葬南巴之中衣衾三領欵木之棺葛以緘之吕氏春秋曰孝子之重其親也慈親之愛其子也痛於肌骨性也所重所愛死而弃之溝壑人之情不忍爲故有葬死之義葬者藏也藏淺則狐狸迫之深則及於泉故凡葬必於髙陵之上以避狐狸之患水泉之濕此則善矣又曰審知生聖之要審知死聖之極也知生者不以害生養生之謂也知死者不以害死此葬死之謂也二者聖人之所獨決也凡生於天地之間其必有死所不免也淮南子曰禹之時天下水禹身執畚挿當此之時死陵者葬陵死澤者葬澤節財薄葬焉又曰馬免人於難者死也葬之以帷幪爲衾牛有德於人其葬之大車之箱牛馬有功猶不可忘又況人乎又曰禹有洪水之患陂塘之事陂蓄水塘池也故朝死而暮葬此皆聖人之所以應時設教見而施宜者也典略曰秦始皇十年華陽君卒與孝文王合葬壽陵襄王母夏太后别葬杜東臨死時曰東望我子西望我夫後百年旁當有萬家邑及漢有天下宣帝果起陵邑焉西京雜記曰曹敞在呉章門下徃徃好斥人過以爲輕薄世人皆以爲然章後見殺全無有敢収葬者敞乃稱呉章弟子収葬其屍方知其亮直者不見容於凡軰矣平陵人文生爲碑於呉章墓側在龍首山南暮嶺上又曰何武葬北邙薄龍阪王嘉冡東北一里許又曰楊貴字王孫京兆人也生時厚自奉養死卒祼葬終南山下其孫掘土鑿石深七尺而反奢又曰安定嵩真玄莬曹元禮並明筭術皆成帝時人眞常以筭自克其壽七十三眞曰綏和元年正月二十五日晡時死矣書其壁以誌之至二十四日晡時死妻曰眞筭時見長下一筭欲以告之慮脫其旨故不告今校一日也又曰北芒青龍隴上孤檟之西四尺所鑿之七尺吾欲筭此地也眞死依言徃掘得古時空椁即以葬之又曰漢帝及諸侯王葬皆珠琥玉匣形如鎧甲連以金縷匣上皆鏤爲蛟龍鸞鳯龜麟之象時謂蛟龍玉匣又曰杜子夏葬長安北四里臨終作文曰魏郡杜鄴立身忠欵犬馬未陳奄先草木骨肉歸於土塊氣則無所不知何必故丘然後即化封長安北郭此焉安息及死命刋石埋墓前陳留風俗傳曰小黄縣者宋地故陽武東黄郷也因黄水以名縣沛公起兵野戰䘮皇妃於黄郷天下平定使使者以梓宫招魂幽野於是有丹虵在水自洒濯入于梓宫其浴處有遺髮謚曰昭靈夫人盧植别傳曰植初平三年卒臨困勑其子儉葬於山足不用棺附體單帛而巳鄭玄別傳曰玄卒遺令薄葬自郡守以下嘗受業者衰絰赴者千餘人郭翻别傳曰翻字道翔武昌人遺令儉葬唯以兩卷老子示存道德杜祭酒別傳曰君年五十二當其終亡安庴先塋帛布轜車䘮儀儉約執引者皆三呉令望及北人賢流虞氏家記曰潭母大夫人薨宜都府君即世五十九載改殯修􅌟窀穸靈柩住而莫前羣從咸以䘮事有徃無反不應遷移潭以昔文王之葬王季旣定而洪水出截冢棺椁文王乃設張屋出柩三日羣臣臨之然後葬此則上聖之遺令載在篇籍遂奉遷神柩權停幕屋使子孫展哀晨夕宗族相臨允合張屋之儀也天子給太夫人徘徊車謁者送䘮禮儀光備合葬於舊壙衛玠别傳曰君卒丞相王公教曰衛洗馬明當改葬此君風流名士海内民望可修三牲之祭以敦舊好太平御覽卷第五百五十五
