  text: 太平御覽卷第四百六十四
  hash: sha256:f5ac023751a5f5f87630c077df33127dfecaf27d3f66220cce294b5e815db474
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_464-1a}
body:
  text: 人事部一百五辯下訥辯下晉書曰王衍姒善玄理唯談莊老爲事毎捉玉柄塵尾與手同色義理有所不安隨即改更世號口中雌黄朝野翕然謂之一世龍門矣又曰謝安常賞袁宏機對辯速安爲楊州刺史宏自吏部郎出爲東陽郡及祖道於治亭時賢皆集安欲以卒迫試之臨別執宏手頋左右取一扇而授之曰聊以贈行宏應聲荅曰輙當奉楊仁風慰彼黎庻又曰華譚或問曰諺云人之相去如九牛毛寜有此理乎譚對曰昔許由讓天子之貴市道小人争半錢之利此相去何啻九牛毛也聞者稱善又曰吕珩問袁甫曰卿名能辯豈知壽陽巳東何以恒水甫曰壽陽巳東皆是呉人夫亡國之音哀以思鼎足疆邦一朝失職憤歎甚積積憂成雨雨乆成水故其城恒澇也又曰祖納謂梅陶及鍾雅曰君汝潁之士利如錐我幽兾之士鈍如椎持鈍椎棰君利錐皆當摧矣陶雅並稱有神錐不可得摧納曰假有神錐必有神椎陶雅無以對又曰武帝始登祚探策得一王者世數繼此多少帝旣不怡羣臣失色莫能有言者侍中裴揩正容儀進曰臣聞天得一以清地得一以寜侯王得一以爲天下貞帝意恱群臣歎服又曰李宻字令伯犍爲武陽人蜀朝舊臣數使於呉應機當義呉人稱其才辯蜀平以太子洗馬召張華問曰安樂公何如宻曰可次齊桓華問其事宻曰齊得管仲而霸得竪刀而流士安樂公得諸葛亮而抗魏後任黄皓而喪國成敗一也又曰釋道安俊辯有髙才自北至荆州與習鑿齒𥘉相見道安曰弥天釋道安鑿齒曰四海習鑿齒宋紀曰孝武常賜謝莊寳劒莊以與預州刺史魯爽後反叛孝武因宴集問劒所在荅曰昔以與魯爽別竊爲陛下杜郵之賜上甚恱當時以爲知言蕭子顯齊書曰張融字思光吳郡人也玄義無師法而神王過人白黒談論鮮能抗拒又曰周顒字彦倫汝南人音辭雅麗出言不窮啇較朱紫發口成句毎賔友㑹同顒虚席晤語聲如流聽者忘倦䔥方等三十國春秋曰劉𥙿爲太尉中書監𥙿旣拜朝賢畢至僕射謝混後來衣冠傾縱頗有傲慢之容𥙿甚不平乃謂之曰何謂旁若無人混對曰明公將隆伊周之化方使四海解衿謝混何人而敢獨異乎乃以手板披撥其衿領悉皆解散𥙿大恱魏収魏書曰李諧字䖍和博學才辯天平中以諧兼散騎常侍爲聘梁王衍遣主客郎范胥當接胥曰黄旗紫盖夲岀東南君臨萬拜故冝在此諧荅帝王符命豈得與中國比隆紫盖黄旗終於入洛無乃自害邪陳書曰簡文在東宮召戚衮講論又甞置宴集玄儒之士先命道學玄相質難次令中庻子徐摛馳騁大義間以劇談摛辭辯縱横難以荅抗諸人懾氣皆失次序衮時騁義摛與徃復衮精采自若對荅如流簡文深加歎賞隋書曰呉興沈重名爲碩學髙祖甞令辛彦之與重論議重不能抗於是避席而謝之曰辛所謂金城湯池無可攻之勢髙祖大恱又曰蘇䕫字伯尼少聦敏有口辯煬帝甞從容謂宇文述虞世基等曰四夷率服觀禮華夏鴻臚之職須歸令望寕有多才多藝羙容儀可以接對賔客者爲之乎咸以䕫對是日拜鴻臚少卿又曰柳誓爲東宮學士毎召入卧内與之宴謔誓尤俊辯多在侍從有所頋問應荅如響唐書曰薛収歸國秦府記室房玄齡薦之於太宗即日召見問以經畧収辯對縱横皆合旨要授秦王府主簿又曰文宗嘗於誕節召白居易與僧惟澄道士趙常盈對御講論於麟徳殿居易論難鋒起辭辯泉注上疑宿構深嗟挹之列子云子夏問於孔子孔子對曰賜辯賢於丘賜也能辯不能訥吾兼有之所以事吾也矣莊子曰孔子舎於沙丘見主人曰辯士也子路曰夫子何以識之曰其口窮踦其鼻空大其服博戲其㫸流撝其舉足也髙其踐地也深鹿與而牛舎又曰公孫龍辯者之徒飾人之心易人之意能勝人之口不能服人之心辯者之囿也又曰古者王天下者智雖絡天地不自慮也辯雖彫萬物不自說也魯連子曰齊之辯者田巴辯於狙丘議於稷下毁五帝罪三王訾五伯離堅白合同異一日而服千人有徐刼者其弟子曰魯連謂刼曰臣願得當田子使之不敢復談可乎徐刼言之田巴曰刼弟子年十二耳然千里之駒也願得侍議於前田巴曰可魯連曰臣聞堂上之糞不除郊草不芸白刃交前不救流矢何則急者不救則緩者非務楚軍南陽趙氏伐高唐燕人十萬之衆在聊城而不去國亡在旦暮耳先王將柰何田巴曰無柰何魯連曰夫危不能爲安亡不能爲存則無爲貴學士矣今臣將罷南陽之師還高唐之兵却聊城之衆爲所貴談談者其若此也先生之言有似梟鳴岀聲而人惡之願先生之勿復談也田巴曰謹聞教明日見徐刼曰先生之駒乃非兎騕褭也豈特千里哉於是杜口易業終身不復談淮南子曰智絡天地明照日月辯解連環澤潤玉石抱朴子曰飛清機之英麗言約暢而判滯辯人也太公六韜曰辯言巧辭善毁譽者曰飛言之士皇甫謐髙士傳曰趙惠文王好劒士夾門而客三千人太子悝患之募有能止王者與千金左右曰莊子必能太子使人奉周周見王曰臣有三劒唯所用焉天子之劒賔諸侯正天下諸侯之劒如雷霆之威震四封之内無不賔服庶人之劒上絶頸領下脫肺肝而此無異於闘雞而争一旦之命也今大王有天子之位而好庶人之業臣竊爲大王薄之王不出宮三月劒客皆伏韓詩外傳曰鳥之羙羽勾啄者鳥共畏之人之利口巧辯者人共畏之是以君子避三端文士筆端辯士舌端武士鋒端又曰子貢曰兩國構難壯士列陳塵埃張天錫不持尺兵斗粮解兩國之難用賜者存不用賜者亡孔子曰辯士哉語林曰諸葛靚字仲思在吴於朝堂大㑹孫皓問曰卿字仲思爲欲何思之曰在家思孝事君思忠朋友思信如斯而巳王子年拾遺録曰張儀蘇秦二人遞翦髪以相活或傭力寫書行遇聖人之文無以題記則以墨書於掌中及股裏夜還折竹寫之二人假食於路剥樹皮爲囊以盛天下良書毎息大樹之下假息而寐有一先生問曰二子何勤苦若是而儀秦共與言論曰于是何人荅曰吾死生歸於山谷世論謂余歸谷子也秦儀後遊學復逢歸谷子乃請其學術則教以干世俗之辯乃探胸中韋祑三卷書言輔時之事故儀秦學之以終身也古史考云儀秦受術鬼谷先生歸之聲與鬼相亂故也桓譚新諭曰公孫龍六國時辯士也爲堅白之論假物取譬謂白馬為非馬非馬者言白所以名色馬所以名形也色非形形非色世說曰郭象議如懸河㵼水注而不竭劉向別録曰鄒奭者頗采鄒衍之術迂大而閎辯文具難勝齊人美之頌曰談天鄒說苑曰林旣衣韋而朝齊景公景公日君子之服也小人之服也林旣作色曰夫服何足以揣士行乎昔荆爲長劒危冠令尹子西岀焉齊短衣而管仲隰朋岀焉越文身剪髮而范蠡大夫種出焉如君言衣狗裘者當犬號衣羊裘者當羊鳴今君衣狐裘而朝得無為變乎文士傳曰劉禎字公幹年八歲能誦論及賦數萬言性辯捷文帝嘗請同好爲主人使甄夫人岀拜坐者皆伏而禎獨平視如故武帝使人觀之見禎大怒命收之主者案禎大不恭應死減一等輪作部使磨石武帝嘗輦至尙方觀作者見禎故環坐正色磨石不仰武帝問曰石何如禎因得喻巳自理跪對曰石出自荆山玄巖之下外有五色之章内含卞氏之珎磨之不加瑩彫之不増文禀氣堅貞受兹自然頋理枉屈紆繞獨不得申武帝頋左右大笑即日還宮赦禎復署吏又曰華譚字令思年十四舉秀才入洛㑹宣武塲座有卞者嘲南人諸君楚人亡國之餘有何秀異忽應斯舉衆無荅譚在下行遥曰當今六合齊䡄異人並出吾聞大禹岀於東夷文王生於西羗賢聖之所在豈常之有昔武王伐紂遷啇頑民於洛邑得無吾子是其苗裔時咸改視辯者無以應也王瑱之童子傳曰孔林魯國人年十歲詣臺魯相劉公客有獻鴈者歎曰天之於人生五榖以爲之食有魚鳥以爲之肴衆賔咸曰誠如公旨林曰不然夫萬物所生各禀天氣事不必爲人人徒以智得之故蚊蚋食人蚓虫噉土非天爲蚊蚋生人爲蚓生土公曰童子辯焉郭子曰梁國楊氏子年九歳甚聦慧孔君平詣其父父不在乃呼兒出爲設菓有楊梅孔指示兒此君家果兒應聲荅曰未聞孔崔是夫子家禽王弼別傳曰弼年十餘歳好老莊通辯能言者列女傳曰袁次陽妻者扶風馬季長之女也下車禮畢次陽問曰爲婦之道貞順而巳何輜軿僮婢數十黼黻玄黄珠璣之飾耶夫人荅曰女有三從之義在家係於父母情愛無巳欲其豊麗故不敢逆命今君欲擬鮑子子都之風不受婦家之送此乃清高異行也妾亦欲察君志悉還所有以成君之髙不亦可乎次陽又問曰弟先足舉猶以爲鄙髙士不爲也賢姉未嫁而新婦先行有何汲汲乎荅曰家姉有宋伯姬之風梁髙之行節操槩於青雲貞介皦於白日家君庶堯之配舜孔子妻公冶之義丗乏此賢故且躊躇妾固陋不才遭人則可次陽嘿然悵恨外聽者曰使君努力何爲新婦所困之有傅玄七禮曰辯論鋒起探虎摩龍徐幹七喻曰戰國之際秦儀之徒智畧兼人辯利軼軌倜儻挾義觀釁相時圖爵位則佩六紱謀貨財則輸海内一怒而諸侯懼安居而天下憇人主見弄於股掌之上而莫之知惡也班固荅賔戲曰子雖馳辯如濤波摛藻如春華猶無益於殿最劉邵趙都賦曰辯論之士則智凌狙兵材過東里分摘滯義割擗纎理論折堅白辯藏三耳張衡西京賦曰其都遊說辯論之士街談巷議彈射臧否剖析豪釐擘肌分理張華縱横篇曰蘇秦始爲交同學鬼谷先生辯說剖毫釐變詐入無形巧言惑正理人主莫不傾聽王廙子貢畫讃曰端木英辯才清吐口敷華發音楊馨訥說文曰訥言難也易曰吉人之辭寡禮記曰趙文子其言内内若不岀諸其口論語曰君子欲訥其言而敏於行又曰剛毅木訥近仁矣史記曰周勃爲人木強少文然可屬大事又曰司馬相如口吃而善著書漢書曰曹叅爲相遵蕭何之約採擇郡國長史訥於文辭謹厚長者即召除爲丞相史又曰李廣訥口少與人言居則畫地以爲陣東觀漢記曰呉漢爲人質厚少文造次不能以辭語自逹鄧禹及諸將多所薦舉又曰楊雄好著書而口吃不能劇談范曄後漢書曰呉漢自建武時常居上公之位終始親愛諒猶質簡而強力也子曰剛毅木訥近仁斯豈漢之方乎又曰劉昆字恒公陳留人建武五年舉孝廉除江陵令時縣連火災昆輙向火叩頭多能降雨止風遷弘農太守虎皆負子渡河徴爲光禄勲詔問前在江陵何德而政致是耶對曰偶然耳左右皆笑其質訥帝曰此長者之言頋命書諸䇿又曰高彪字義方呉郡無錫人也家夲單寒至彪爲諸生遊太學有雅才而訥於言續漢書曰何休任城樊人朴訥而精研六經丗儒無及者魏畧曰嚴翰善春秋公羊司隷鍾繇不好公羊而好左氏謂左氏爲太官而謂公羊爲賣餅家故常數與翰辯短長繇爲人機捷善持論而翰訥臨時屈無以應晉書曰郭林宗謂劉儒口訥心辯有珪璋之質張詮南燕書曰慕容納沉静深邃外訥内敏北史牛恒訥於言而敏於行上甞令其宣敕至陛下不能言退還拜謝云並忘之上曰傳語小辯故非宰臣任也愈稱其質直隋書范陽祖君彦齊尚書僕射孝徴之子也容貌短小言訥澁有才學大業末官至東平郡書佐老子曰大辯若訥管子曰吾畏事不敢事畏言不爲言行年六十如老吃耳張騭文士傳曰左思字太冲貌惡不揚口訥不能給談黙而心解又曰成公綏口訥不能談論嘿而内朗人有劇問以筆墨荅之裴啓語林曰鄧艾口吃常云艾艾宣王曰爲云艾艾終是幾艾荅曰譬如鳯兮鳯兮故作一鳯耳玄晏春秋曰予朴訥不好戲弄口又不能戲談崔琰述𥘉賦序云琰性頑口訥年十八不能㑹問好擊劒尚武事紀騭表孫皓曰臣禀氣淺薄體不及衆形容短陋訥口弱顔太平御覽卷第四百六十四
