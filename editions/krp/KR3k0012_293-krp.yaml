front:
  text: 太平御覽卷第二百九十三兵部二十四
  hash: sha256:9dd7949d1441afee4374bf7cd2a26f846a3503e507ead074b525df6840137297
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_293-1a}
body:
  text: 示緩務速示緩戰國䇿曰秦伐韓軍於閼與趙王召問趙奢對曰道逺險狹難救譬猶兩䑕鬪於穴中也將勇者勝王令奢救之軍邯鄲三十里而令軍中曰有軍事諌者死秦軍武安西秦軍鼔譟勒兵武安屋瓦盡震軍中候有一人言急救武安奢立斬之堅壁留二十八日不行復益壘秦間來奢善食遣之間以報秦將大喜曰夫去國三十里而軍不行乃增壘閼與非趙地也趙奢旣巳遣秦間乃卷甲而行趨之二日一夜至令善射者去閼與五十里而軍壘成秦人聞之悉甲而至奢縱兵擊破之閼與圍解通典曰曹公進軍攻袁尚將審配於鄴先鑿塹圍城周廻四十里𥘉令淺示若可越審配遥見笑而不出爭利曹公令一夜濬之廣深二丈決漳水以灌之數月城中餓死過半尚將馬延臨陣降遂尅鄴城又曰魏將司馬宣王征公孫文懿賊保襄平宣王進軍圍之㑹霖潦大水平地數尺三軍恐懼欲移營宣王令軍中敢有言徙者斬都督令史張静犯令斬之軍中乃定賊恃水樵牧自若諸將欲取之皆不聽司馬陳珪曰昔攻上庸八部並進晝夜不息故能一旬之半拔堅城塹孟逹今者逺來而更安緩愚竊惑焉宣王曰孟逹衆少而食支一年吾將士四倍於逹而糧不淹一月以一月圖一年安可不速今賊衆我寡賊飢我飽水雨乃爾功力不設雖當促之欲何所爲自發京師不憂戰攻但恐賊糧垂盡而圍落未合掠其牛馬抄其樵採此故驅使走也夫兵者詭道善因事變賊慿衆恃雨故雖飢因安肯束手當示無能爲之若取小利以驚之非計也旣而雨止遂合圍起土山地道楯櫓鈎橦竟發矢石雨下晝夜攻而抜之又曰万俟醜奴稱亂關右魏將賀拔岳討之軍於汧渭之間宣告逺近曰今氣候漸熱非征討之時至秋涼更圖進取醜奴聞之遂以爲實分遣諸軍散營農於歧州之北百里細川因險立柵其千人以下爲柵者亦有數處且田且守岳知其勢分乃密嚴備晡時潛遣輕騎先行斷路於後諸軍盡發昧朝攻圍元進柵抜之諸所俘執皆放之自餘柵悉降岳宣言徑趣涇州其刺史侯長貴亦以城降醜奴乃弃平亭而走晉書曰安平獻王爭傳曰呉諸葛恪圍新城以孚督諸軍二十萬禦之孚次壽春遣母丘儉文欽等討之諸將欲速擊之孚曰夫攻者借人之力以爲攻且當詐巧不可爭力也故稽留月餘乃進軍呉師望風而退宋書曰臨烈王道規曰兵法屈申有時不可苟進諸桓丗居西楚羣小皆爲竭力桓振勇㓂三軍難以爭勝且可頓兵養銳徐以計䇿縻之不憂不尅也務速孫子曰乆則頓兵挫銳攻城則力屈頓弊屈盡乆暴師則國用不足夫頓兵挫銳力屈貨殫音單則諸侯乗其弊而起雖有智者不能善其後故兵聞拙速雖拙有速勝也未有工之乆也夫乆兵而國利者未之有也左傳曰先􅎮曰一日縱敵數丗之患也又曰楚子伐隨隨少師謂隨侯曰必速戰不然將失楚師又曰武城黒謂常曰呉用木也我用革也不可乆也不如速戰魏志曰夏侯淵性果悍進軍疾速人歌曰夏侯淵三日六百五日千晉書吕光載記曰光行至髙昌聞堅晉光欲更須後命部將杜進曰節下任全方靣赴機冝速何不了而留乎又曰杜預破呉衆議且俟來冬預曰兵威巳振譬如破竹數節之後迎刀而解乃平之也崔鴻十六國春秋曰後秦姚萇與符登相持萇將荀曜據逆萬堡密引符登萇與登戰敗於馬頭原收衆復戰姚碩德謂諸將曰上愼於輕戰每欲以計取之今戰旣失利而更逼賊者田也萇聞之而謂碩德曰登用兵遲緩不識虚實今輕兵直進遥據吾東必荀曜竪子與之速結也事乆變成其禍難測所以速戰者欲使竪子謀之未就好之未深散敗其事耳果大敗之又曰姚萇與符登相持未解登將魏褐飛自稱大將軍衝天王率玄胡萬人攻萇將姚當於杏城萇將雷惡地叛應褐飛攻萇將姚漢得於李潤萇議將討之羣臣咸曰陛下不憂六十里符登乃憂六百里褐飛萇曰登非可卒殄吾城亦非登所能卒圖惡地多智非常人也南引褐飛東結董咸甘言美說以成姦謀若得杏城李潤惡地據之控制逺近相爲羽翼長安東北非復吾有於是潛軍赴之萇時衆不滿二千褐飛惡地衆至數萬互胡赴之者首尾不絶萇毎見一軍至輙有喜色羣下怪而問之萇曰今同惡相濟皆來㑹集吾得乗勝席卷一舉而覆其巢穴東北無復餘也褐飛等以萇兵少盡衆來攻萇固壘不戰示之以弱潛遣子崇率騎數百出其不意以乗其後褐飛兵擾亂萇遣將王超等率歩騎擊之褐飛衆大潰斬褐飛惡地請降萇待之如𥘉通典曰後漢末荀攸從曹公征吕布至下邳布敗固守攻之不拔連戰士卒疲曹公欲還攸與郭嘉說公曰吕布勇而無謀今三戰皆北其銳氣衰三軍以氣爲主主衰則軍無奮意且布之謀主陳宫有智而遲今及布氣衰而未復宫謀之未定進急攻之布可拔也乃引沂泗灌城城潰生擒布又曰蜀將諸葛亮伐魏魏將司馬宣王郭淮等禦亮張郃勸宣王分軍住雍郿爲後鎭宣王曰料前軍能獨當之者將軍言是也若不能當而分爲前後此楚之三軍所以爲黥布擒也遂進軍隃音舒縻亮聞大軍且至乃自帥衆將芟上邽之麥諸將皆懼宣王曰亮慮多決少必安營自固然後芟麥吾得二日兼行足矣於是卷甲晨夜赴之亮覩塵而遁宣王曰吾倍道疲勞此曉兵者之所忌也亮不敢據渭水此易與耳進次漢陽與亮相遇宣王列陣以待之使將牛金輕騎餌之兵纔接而亮退也又曰蜀將孟逹之降魏也魏朝以逹領新城太守假節逹於是連呉固蜀潛圖中國謀洩將舉兵司馬宣王秉政恐逹速發以書安之逹得書猶與不决宣王乃潛軍進諸將皆言逹與二賊交搆冝審察而後動宣王曰逹無信義此其相疑之時也當及其未定往決之乃倍道兼行八日到其城下呉蜀各遣其將救逹宣王分諸將以拒之𥘉逹與諸葛亮書曰宛去洛八百里去吾千二百里聞吾舉事當表上天子比相返覆一月間也則吾城巳固諸軍足辦吾所在深險司馬公不自來諸將來吾無患矣及兵到逹又告亮曰吾舉事八日而兵至城下何其神速也上庸城三靣阻水逹於城外爲水柵以自固宣王度其水破其柵直造城下八道攻之旬有六日逹甥劉賢將李輔等開門出降遂斬逹又曰東魏荆州刺史辛纂據穰城西魏將楊忠從獨孤信討之纂迎戰敗退走信令忠爲前驅馳至其城北叱問者曰今大軍巳至城中有應尓等求活何不避走聞者盡散忠乗而入彎弓大呼纂兵衛百餘人莫之敢禦遂斬纂以徇城中懾伏唐書曰隋末髙祖義兵發太原次靈石縣賈胡堡隋將宋老生率精兵二萬屯霍邑以拒之㑹乆雨糧盡與長史裴寂及諸將議曰宋老生頓霍邑屈突通鎭河東二人同心非造次可進欲還太原以圖後舉太宗曰夲興大義以救蒼生當須先入咸陽號令天下今遇小敵便即班師將恐義從之徒一朝解體還守太原一城之地此爲賊耳何以自全髙祖乃止太宗引師赴霍邑遂平老生也又曰武德中太宗征薛仁果其將宗羅侯來拒大破於淺水原因率左右二十餘騎追奔直趣折摭以乗之仁果列陣城下太宗據涇水以臨賊賊徒氣沮無敢進戰其騎將澤幹等數人臨陣來降請還取馬太宗縱遣之於是各乗良馬須臾並至仁果大懼嬰城自守太宗具知賊中虚實將夕大軍繼至四靣合圍因縱辯士諭以禍福仁果遂開門降旣而諸將奉賀因問曰始大王野戰破賊其主尚保堅城王無攻具輕騎騰逐不待歩兵徑薄城下咸疑不尅而竟下之何也太宗曰此以權道迫之使其計不暇發以故尅也羅侯恃往前之勝兼復養銳日乆見吾不出意在相輕今喜吾悉出兵來戰吾雖破之擒殺盖少若不急躡還走投城仁果收而撫之則便未可得矣且其兵衆皆隴西人一敗𬒳追不及廻頋散歸隴外則折摭自虚我軍隨而迫之所以懼而降也此乃成筭諸君盡不見耶又曰武后𥘉徐敬業舉兵於江都稱匡復皇家以盩厔尉魏思温爲謀主問計於思温對曰明公旣以太后幽縶少主志在於匡復兵貴拙速但冝早度淮北親率大衆直入東都山東將士知公有勤王之舉必以死從此則指日刻期天下必定敬業將從其䇿薛璋又說曰金陵之地王氣巳見冝早應之兼有大江設險足可以自固請且攻取常潤等州以爲王霸之業然後率兵北上鼔行而前此則退有所歸進無不利實爲良筭也敬業以爲然乃自率兵四千人南度以擊潤州思温密謂杜求仁曰兵勢冝合不可分今敬業不知并力渡淮率山東之衆以取洛陽必是無能成事命也可知敬業㝷亦悔之所以遂敗吕氏春秋曰凢兵欲急疾捷不可乆處所以兎起鳬舉喻急疾也雖有江河之險則陵之雖有太山之塞遂踰之衛公兵法曰用兵上神戰貴其速簡練士卒申明号令曉其目以麾幟習其耳以鼔金嚴賞罰以戒之重芻豢以養之浚溝塹以防之指山川以導之召才能以任之述竒正以敎之如此則雖敵人有雷電之疾而我亦有所待也若兵無先備則不應卒卒不應則失於機失於機則後於事後於事則不制勝而軍覆矣故吕氏春秋云凢兵者欲急疾捷所以一決取勝不可乆而用之矣或曰兵之情唯主速乗人之不及然敵將多謀戎卒輯睦令行禁止兵利甲堅氣銳而嚴力全而勁豈可速而犯之耶荅曰若此則當卷迹藏聲蓄盈待竭避其鋒勢與其持乆安可犯之哉廉頗之拒白起守而不戰宣王之抗武侯抑而不進是也太平御覽卷第二百九十三
