  text: 太平御覽卷第六百七十七
  hash: sha256:3d6713edd7d447c056c217f3cd56023ec68b92ff207b5a6b2d07fc576436409e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_677-1a}
body:
  text: 道部十九几案輿輦闕殿堂臺閣樓觀宫室房舎䆫户門庭壇府几案十洲記曰瀛州金巒觀中有青離玉几覆以雲紈之素刻水碧爲倒龍之牀玉光八景經曰衆眞宴禮大帝屈節於几前太一洞眞玄經曰太微紫房中有一童子名于景精字㑹元當帝君之前捧赤玉案上有所主命籍又曰太一公子白元司命桃君五人皆著朱衣絳巾各捧一白玉案上有所主簡玉清隱書曰太微天帝君進拜於帝皇之几又曰上皇帝君乃推几偃詠虚眺太空吟玉淸之隱書歌元景之靈章揚音霞際清微玉桭太洞經日太微小童五符命籍捧持玉案帝君所臨主通諸神變化經曰有金光立空之案又曰元始拊几髙詠嘯㓪太空玉珮金璫上經曰九老仙都捧金精之案上請寳文以授衆眞也洞神經曰拂拭几案置經于前也像名經曰東方上尊凭七寳鳯文之曲几敷說道要眞經法輪經曰三眞立空之案以七寳懸覆經上衆篇經曰元始上尊凝眞遐想撫几髙抗命召五帝論定隂陽推數刼㑹移校河源檢籙天度洞神經曰有局脚案以置經符也太上黄素經曰凢修受大洞眞經雌一竒文者恒置經於几格㓗静之處九幽經曰帝尊在九清妙境三元宫中御三氣之華寳雲玉座惣校圖籙拔濟諸苦二十四生圗曰披九光玉藴出金書紫字玉文丹章三部八景二十四生圗盛以白玉立空之按九色之中飛文錦蓋懸覆經上龍飛尺素隱訣曰太微天帝君命羽仙侍郎捧金案以請飛行羽章也上淸眞文王經朝文曰有流明大靈侍言玉案十二枚又始内傳曰諸天各奉蓮華座以寳蓋覆之神仙傳曰黄老遣仙官玉女持金案玉杯盛藥以賜沈羲又曰淮南王爲八公進金玉之几執門弟子之禮四極科曰凢寳經之具几案巾秩不可妄借於人太玄經曰老子傳授經戒籙儀注訣日以局脚小案置經綵巾覆上洞眞玄經曰太一洞眞玄經者別爲囊笈封以寳器盛之几上無量經曰太上座髙三丈又於紫臺之宮布一髙座六尺金眞玉光經曰九天之帝施玉几金牀山海經曰西母悌几戴勝悌凭也戴者戴其玉勝也他說西母頭類戴勝甚失之夲際經曰元始上尊在長樂舎寳飾髙座雖有座形不障於物人所徃來亦無隔礙復有小琉璃座行列兩邊悉髙五尺茅君内傳曰白玉龜山連玉牀帳西母處之太上黄素方曰青精執在紫巫之山化王之室内有玉案也洞眞七聖玄記曰左仙上䟽九天帝王七聖几下飛行羽經曰修存三一道法坐金牀王几金爐玉匕太眞人詩曰太微啓玉案列仙傳曰太室山中有地仙卭䟽卧牀几案眞誥曰鹿迹山中有絶洞洞中自有石牀石榻曲夾輿輦太上飛行羽書曰玉清則上清之髙眞上清則太清之髙神太清則飛仙之髙靈凢行玉清之道出則諸天侍衛建七色之節駕紫雲軒十二玉輪六師啓路飛龍翼轅行上清之道出則五帝侍衛建紫毛之節駕飛雲丹車位准上清左右仙卿行太清之道出則五帝侍衛建五色之節駕龍輿白虬啓道太極叅軒又曰王惣眞爲茅盈召朱冠使者二人乗流景之輿蒼虵把緑節仗瓊竿羽旄横曰朱雲翳景使者並繡衣芙蓉冠持紫素之書各百字以付茅盈二弟固衷是以固有地眞上仙定籙神君之號衷有司三官保命仙君之位各依紫素之命封莅所任神宫上府亦隨事而資給二君焉漢平帝元壽二年八月巳酉南岳眞人西城王君龜山王母方諸青童君並乗緑景之輿駕神虎之軿同造茅盈於句曲之山金璮之隂又曰飛仙祕道招五辰之晨常能行之十五年則南極老人丹陵上眞迎以緑雲之輦西極老人素靈子期迎以黄颷之車北極老人玄上仙皇迎以玄景之龍東極老人扶陽公子迎以青軿之輦中元老人上玄子迎以曲晨之蓋五老㑹合俱升紫虚此五老蓋五星之眞人也非如裴君星中五帝之公又異乎雲牙五方之老上學之法順之者飛仙也又曰八道祕言者道有八條其言髙妙閑心静室寥㓪虗眞亦將得見丹景之氣三素飛雲八輿朱輦紫霞瓊輪上清静眄廻轡三元髙皇秉節靈童攀轅太素擁蓋南極臨軒於是溟光外映象燭太虚子能見之不煩凝霜濯華玄腴金丹也一道祕言曰以八節日清朝北望清朝小早於清且也有紫緑白雲者是爲三元君三素飛雲也其時三元君乗八輿上詣天帝玉清君也子候見當再拜自陳乞侍輪轂二道祕言曰以八節日夜半東北望有玄青黄雲者是爲太極天帝君乗八景之輿上詣髙上玉皇三道祕言曰以甲子上旬戊辰巳巳之日清旦西北望有紫青黄雲者是爲太極眞君三素雲也其時太極眞君及上眞人乗玄景緑輿上詣紫微宫四道祕言曰以甲戍上旬戊寅巳夘之日清旦東南望有赤白青雲者是爲扶桑太帝君三素雲也其時扶桑太帝君乗光明八道之輦上詣紫微宮五道祕言曰以甲申上旬戊子巳丑之日清旦正西望見白赤紫雲者是爲太素上眞白帝君三素雲也其時太素上眞人白帝君乗脩條玉輦上詣玉天玄皇髙眞也六道祕言曰甲午上旬戊戍巳亥之日清旦正南望有青赤黄雲者是爲南極上眞赤帝君其時乗絳琳碧輦上詣閬風臺七道祕言曰以甲辰上旬戊申巳酉之日清旦西南望見緑紫青雲者是爲上清眞人時乗玄景八光丹輦上詣髙上天帝八道祕言曰以甲寅上旬戊午巳未之日清旦正東望有朱碧黄雲者是太虚上眞人其時乗徘徊玉輿上詣大帝君八節日見三素雲者紫雲在上緑雲次之白雲在下共相沓也子謹視之移度經曰眞皇叅駕黄霞周行四方飛盖緑軿上造金闕靈寳赤書曰詣天眞人乗碧霞玉輿太洞眞經曰太上乗一景之輿受九暉太晨隠符上清隠書龍文經曰王母乗九蓋華輿衆眞侍衛紫文經曰方諸東玄東海青童大君齊戒於丹闕黄房之内三年乗碧雲輿太元眞人傳曰有班龍之輿金眞玉光經曰有玉輦又上清三天列紀有紫輦太洞玉經曰青童君乗雕玉之軿司禁眞伯乗日月之軿又曰太極元君乗陵羽之車太上經曰有白鸞之車茅君内傳曰東海青童君乗飈車葛玄傳曰鶴鳴山石室中設自然座有金華蓋又曰五帝眞人並乗八景玉輿二十四生圖經曰後聖李君遊西河歷觀八方值元始乗八景玉輿駕玄龍而來李君問天書玉字未究妙章元始俾極道眞於是吐洞玄内觀玉符以授之變化經曰景輿丹軿紫軒九天帝王所乗也上清訣曰玄母乗三素之輿又曰元父所控赤羽飛車左御絳鸞右駕紫鳯尸素訣曰太微天帝君登白鸞之車駕黒羽之鳯遊碧水之境大洞玉經曰皇上帝乗明玉之輪轉宴於日中矣茅君内傳曰無上道君成給八景瓊輿鳯璽金眞曲晨飛蓋又曰青華小童道君乗碧霞之輿又曰上眞君赤帝乗絳琳碧輦又曰太清眞君乗青龍紫羽蓋又曰太元眞人杖紫雲之節乗班龍之轝白虎之軿曲晨寳蓋又曰太素眞君乗虎旗虎輦金蓋玉輪仗九色之節出入太清金眞上光經曰太上大道君乗瓊輿碧輦和太道君乗白雲之車又云玄和道君驂駕玄龍太洞玉經曰八皇老君乗黄琅之車把紫鳯之節入太老之室万華先生乗三素之景羽明之軿宴寢万乗之室八素章曰四老廻錦軿万仙朝帝房茅君内傳曰朱官使者駕蒼虬把緑杖眞誥曰紫元夫人乗羽寳雲車駕九龍女騎九千披錦服青羽裙自然經曰龍轡昻昻雲蓋巍巍仙童玉女與我昇龍太上眞經曰東方青帝九龍雲輿空洞經曰元始天尊從諸天人並乗玉輦瓊輪元始五老赤書玉篇眞文序曰太上道君十方至眞乗五色玉輪九色龍妙行眞人乗象雲玉輦上詣玉都中極眞人常乗象輪車上飛眞人常乗九色龍遊玉清雲中飛天之神乗碧霞之輂遊於玉隆之天黒帝君乗四景之輿三元布經曰元始上尊乗紫輦茅君内傳曰王君乗九蓋之輦洞天經曰靈景道君乗赤雲車太上飛行羽經曰中和之眞駕錦輿茅君内傳曰王母乗緑景輿玉光八景經曰東方始景道君乗青雲之車駕蒼龍又曰南方玄景道君乗五色雲車駕鳯皇又曰南方靈景道君乗赤雲車西南方元景道君乗紫雲車駕六龍西方明景道君乗曰雲車駕白虎北方玄和道君乗珠玉之車金根經曰玉帝君乗碧霞九鳯飛行之輿玉清隱書曰太微君登八瓊之輦傾蓋霞城又曰東北方道君葛獻乗八輿飛龜車下治人泥丸宫登眞隠訣曰太元眞人乗白虎輿有八色雲軿眞誥曰仙人許玉斧乗一新青犢車又曰王眉壽小妹中候夫人乗白牛車上清九眞中經内訣曰南極老人丹陵上眞迎以緑雲之輿盖西極老人素靈于期迎以黄颷車人元老人中央上玄迎以曲晨之盖五老一合俱升紫靈王君傳曰王君乗虎輦金蓋玉輪出入上清受事太素南岳魏夫人傳曰夫人乗虎輦玉輿隠輪之車眞誥曰南岳夫人駕九蓋之軿捜神記曰玉女成智瓊駕輜軿車從八婢闕五符經曰鐘止上有金臺七寳紫闕元氣之所舎天帝君所治處也殿太洞玉經曰大暉者玉清天中殿名也上皇王眞之所遊處也太平經曰大空瓊臺洞眞之殿金華之内侍女衆眞之所處靈書紫文上經曰有太空瓊臺丹玕之殿靈寳赤書曰妙行眞人詣元始受赤書五篇眞文於是元始命衆眞入太定金臺玉寳之殿九光華房紫書金根經曰有黄金殿玄妙内篇曰有七寳殿堂太洞玉經曰有羽景之堂在太無之庭玉容者太上之明堂也洞景金玄經曰玉帝命太微天帝君坐万靈於房軒散華香於玉宇留連八瓊之室曲宴九琳之堂外國放品經曰有光碧之堂臺大洞玉經訣曰西田之瑶臺大帝所處有玉清臺也又有散花臺太上玉京經曰玉京有七寳宫宮有七寳玄臺即太上治所又有天寳臺上清經曰有紫碧玄臺大洞眞經曰上清眞人惣仙大司馬長生法師登太常滄浪山洞臺中雙玉穴酣飲紫明芝液眞誥曰有玉華室有刻石眞人五勝文曰駕飛龍於西華之臺謁拜帝眞赤書玉訣經曰太玄上宫太素眞人常以春分之日㑹諸仙官於崑崙瑶臺校定靈寶眞經又曰陽臺眞人常以立冬之日㑹諸仙官玉女於靈寳陽臺之上校定學道簿籙夲行經曰有㝷眞玉臺衆篇經曰帝尊引衆眞人集太空金臺内音玉字經曰九層之臺處乎玉京之山煥乎玄都之上有太眞玉印又曰馥朗天中玉京玄臺之別號西靈眞人常誦無量洞章遊行其上大洞玉經曰九天之上有明眞臺茅君内傳曰辰中眞人帶廷生符於滄浪之臺導引三光經曰定光眞人在皇曽天絶觀臺中導引元氣又曰九變眞人在玉完天誥陽無臺中又曰導仙眞人在何童天華林䕃雲臺中又曰雲華眞人在平育天玄唱寳蓋臺中又曰陽王眞人在太眞臺中又曰法氣眞人在飛臺中又曰澤嬰眞人在越衡天無極觀臺中眞誥曰白玉龜臺九靈太眞元君封此閣三皇經曰人皇所受皇文帝書赤玉爲簡黄玉爲文安之青宫閉之紫閣太洞眞經曰凢天縱仙才名刋金閣金玄羽章曰紫閣之下受事於玉清九有玉閣黄閣青閣樓歷藏中經曰崑崙山有金城九重玉樓十二神仙所治也龜山元籙曰龜山上有十二玉樓峩峩曜景太清有金華樓諸眞仙玉籙皆在金樓之中觀靈書經曰有洞靈之觀金字題觀四面又有九靈之觀紫陽之觀又紫微上宫有通陽之觀主得度之人功德輕重宫三元品戒經曰九氣始凝三光發明結青黄白之氣置上元三宫太洞王經曰太𥘉有華陽之宮㑹方之宫小有眞天中有万華之宫玉君之治所玉晨宫中有玉映之宮又有元君六淵之宫黄老圎華之宫上清眞陽之宫太極上宫主衆仙誦詠室大洞玉經曰太霞之中有白雲之室太虚元君所處三皇經曰蜀郡西峩嵋山石室舊有三皇文此文不與天下衆文同百万人中未有一人得者龜山元籙曰有瓊瑤之室外國放品經云有瓊華之室洞景金玄經曰八瓊之室又三華寳曜内眞上經曰玉室上清經有碧室房大洞玉經曰三華城者玉清之房名也在玉城之中陽安元君所處無上眞人内傳曰有流雲九色之房仙公内傳曰崑崙山上有積石瑶房太上紫書籙曰白玉母入於龜山王闕處於青玉宫中朱紫之房靈寳赤書曰有九光華房外國放品經曰紫翠丹房舎道典曰道之清浄者吾舎也道因天清而清之因地静而静之因日月之光而明之因星辰之行而正之因萬物之性而消息之萬物中人爲貴能使形無事神無體以清浄致無爲之意即道爲舎也䆫諸天内音經曰天眞皇人開寒靈之䆫又曰南極玄䆫主諸得道人受錬品目户諸天内音經曰九玄丈人封於玉京紫户之内洞景金玄經有玉户門大洞玉經曰太素在幽玄之上九宫列金門於太素之天瓊羽之門蘭室上清宮中門户名也大上有瓊羽之門四明門者上清玉帝之南門也紫書金根經曰東華方諸青童宮有六門門内周迴三千里東有青華門西有玉洞門北有瓊門東北有寒水門東南有天關門庭二道順行經曰洞陽之宫下有流火之庭大洞玉經曰廣寒宮中有寒庭太一之所處又有雲珠之庭太上眞文曰上帝朝眞金童楊烟流薰紫庭壇二十四生圗曰元始敷五色金爲壇王皇譜籙曰元始丈人登玉虗之壇受九天譜籙上皇寳經玉符祕章府龜山元籙曰元始丈人在上清瓊天府大清府開清府玉寳洞元府金融府丹明府重冥府鳯生府太平御覽卷第六百七十七
