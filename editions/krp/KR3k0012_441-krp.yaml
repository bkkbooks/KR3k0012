front:
  text: 太平御覽卷第四百四十一
  hash: sha256:f64d2df3b00fc106585b9e204721de9e9fa9296f43f2c99eee0c68d38abec598
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_441-1a}
body:
  text: 人事部八十二貞女下列女傳曰張氏妻者丹陽魯輝之女名潛旣適張氏㑹其家門伏誅以潛女弱姑老故得不死然資産没官單罄壁立昏晨力作供養甚謹猶應配適士伍之限無妻者國有常法知終不免毎與姑言有必死之志姑曰夫亡改適悠悠皆是人當隨時之冝何至於此潛曰悠悠之爲非妾心也後至當配果自經死又曰代趙夫人者趙襄子之姊也襄子誘代王殺之因舉兵平代取地而迎夫人夫人曰吾受先君之命事代之君今代巳亡吾將奚歸吾聞婦人之義無二夫欲迎我何之以弟慢夫非義謂慢棄不爲立節以夫怨弟非仁也自殺於磨笄之地又曰沛王母王陵之母也陵始爲縣邑豪豪俊也及髙祖起沛陵亦聚黨數千人屬漢王項羽與漢爲敵國得陵母置軍中漢使至則東向坐陵母欲以招陵陵母私送使者泣曰爲老妾語陵善事漢王漢王長者也必得天下無以妾故懷持二心言妾巳死也乃伏劔而死又曰蜀朱叔賢妻者張氏之女字昭儀賢爲郡督郵軍襲郡城城門閇賢兄弟謀踰城出事泄伏誅乃配嫁昭儀泣曰誅我夫而逼嫁我此寜夫婦平生之願乎乃竊刀割咽而死又曰巴趙娥者趙萬之妻郡縣遭亂萬得足疾不能行爲賊所殺賊欲將娥娥守䘮不去賊舉矛指娥欲以怖之娥知賊必欲刼略乃以身赴矛貫心逹背而死又曰九江王孝謙妻者同郡袁氏之女字貴女與母俱流移共止孝謙好酒兇悖無子􅡾之禮貴女毎涕泣諌喻不能匡改母怨孝謙之爲貴女輙悲哀不食言於鄰人曰爲子致母於辱非孝也事無道之人非義也昔秋胡之妻不忍見不義之人我何爲於世間哉乃自殺又曰沛周明都妻有衛尉趙長平之女也名阿長平德行純粹海内知之阿少習儀訓長閑婦道而都驕淫暴躁不式上命都父衛謂阿曰新婦賢者女也當以禮法匡􅡾都之不改新婦之過也阿旣拜命退謂左右曰我無樊衛二姬之行故君以責我我言而不用君必謂我不奉教則罪在巳爲生如此亦何願哉乃自殺劉向列女傳曰楚昭貞姜者齊侯之女楚昭王之夫人也昭王出遊留夫人漸臺之上而去王聞江水大至使者迎夫人忘持符使者至謂夫人出夫人曰大王與宫人約命召宫人必以符今使者不持符妾不敢從使者而行妾聞之矣貞女之義不犯約勇者不畏死守節而巳矣妾知從使者必生留必死也然妾不敢弃約越義而求生水大至而死乃號曰貞姜又曰楚白貞姬者楚白公勝之妻也白公死其妻紡績不嫁呉王聞其羙使人操金百鎰白壁一雙以娉焉因以輜軿三十乗迎之將以爲夫人妻辭曰白公無恙之時妾幸得充後宫執箕帚衣裳履拂枕席爲妃今白公不幸而死妾願守其墳墓奉其祠祀以終天年今王賜金璧之娉夫人之位非遇妾之所妾聞之忠臣不借人以力貞女不假人以色豈獨事生若此哉於死亦然妾旣不位位猶仁也不能從死今又去而嫁不亦大甚乎遂辭娉而不行呉王賢其節而有義􅉑曰楚白貞姬又曰魯陶寡嬰者魯陶門之女少寡養㓜孤無強昆弟紡績爲産魯人或聞其義將永焉嬰聞之恐不得免乃作歌明巳之不二也其詩曰悲黄鵠之蚤寡兮十年不雙宛頸戢翼兮不與衆同時則非鳴兮獨行惸惸天命令然兮愧獨永傷感鳥愠巳兮淚下成行嗚呼悲兮死者不可忘飛鳥尚然兮何况貞良雖有賢雄兮終不重行魯人聞之曰斯女不可得也遂不敢復求之嬰寡終身又曰衛寡夫人者齊侯之女也嫁於衛至城門而衛君死保母曰可以還矣女不聽遂入行三年之䘮畢弟立謂曰衛小國也不容二庖請願同庖唯夫妻爲同庖夫人不聽衛君乃使愬於齊兄弟皆欲與後君使人告女女終不聽乃作詩曰我心匪石不可轉也我心匪席不可卷也又曰邵南申女者申人之女也旣許嫁於豐夫家禮不備而欲迎之女蓋與其人言以爲夫婦者人倫之始也嫁娶者所以傳重承業繼續先祖爲宗廟主夫家輕禮違制不可以行遂不肯徃夫家訟之於理致之於獄女終以一物不具一禮不備守節持義必死不徃而作詩曰雖速我訟亦不汝從言夫婦之禮不備足也君子以爲得婦道之冝與詩說小異故再出又曰蔡人之妻者宋人女也旣嫁於蔡夫有惡疾其母將改嫁之女曰夫之不幸乃妾之不幸也奈何去之適人之道壹與之醮終身不改夫不幸遇惡疾不改其意且夫采芣苢之草雖甚臭惡猶始於將采之終於懷頡之浸以益親况於夫婦之道終不聽其母而作芣苢之詩又曰魯秋㓗婦者魯秋胡子之妻也秋胡子旣納之五日而去官於陳五年乃歸未至家見路傍有一羙婦人方採桑秋胡子下車謂曰苦暴採桑吾行道逺願託桑隂下餐婦人採桑不輟秋胡子謂曰力田不如逢年力桑不如見郎今吾有金願與夫人曰嘻夫採桑力作紡績織以衣食奉二親飬夫子而巳矣吾不願人之金也収子之資與子笥金秋胡還家奉金遺母母使人呼其婦婦至乃向採桑者婦曰君辭家逺仕五年方還當乍驅楊塵疾至今也乃恱道旁婦人是忘母不孝好色淫佚是汙行也妾不忍見不義不孝之人子改娶矣妾亦不嫁遂去東走自投於河而死又曰梁寡髙行者梁之寡婦榮於色敏於行早寡不嫁梁貴人争欲取之不能得梁王聞之使相娉焉髙行曰妾之夫不幸先犬馬塡溝壑妾冝以身薦其棺槨守養㓜孤不得專意妾聞婦人之義壹徃不改以全貞信之節今忘死而趨生是不信也見貴而忘賤是不貞也棄義而從利無以爲人乃援鏡操刀以割其鼻曰妾巳刑矣所以不死者不忍㓜嗣之重孤也刑餘之人殆可釋矣王髙其節乃復其身號曰梁髙行皇甫謐列女傳曰天水姜叙母者同郡楊阜之姑也阜爲州吏馬超殺刺史太守叙屯歷城阜徃見之歔欷悲悵叙曰何爲乃爾阜曰守城不能完君亡不能死何以視息於天下乎君擁兵專制而無討賊之心此趙盾所以書弑也叙母慨然勒叙從阜計遂起兵於鹵城超聞之襲歷城得叙母母罵之曰若背父之逆子殺君之桀賊天豈乆容若何不早死敢以面目視人乎超即殺之超敗隴右平定魏武令曰姜叙之母明智乃爾雖楊敞之妻蓋不過也又曰留子直妻者歷陽人漢末擾攘隨夫之從父客居豫章從父通郡牧族之妻年少有色太守客請以爲妻守死不從十餘日客以還太守夷殺之臨死不變口無言郡吏及客憐之更還救請旣得活乃自割耳乆之太守聞其夫在遂還其妻又曰下邳陳悝妻者同郡呉氏之女漢末喪亂流寓東城東城令戚竒欲北就吕布焚城疊虜人衆聞女有容色善史書能彈琴瑟遂殺悝住車令僕者接女上車女謂竒曰君隳壞都城虜略士女殺人之夫欲以人婦爲妻何酷逆之甚願守志而死不願無行而生遂自刎竒猶有哀慙殯葬乃去又曰戎士陳南妻丹者戴氏之女羙而早寡事舅姑恭篤同伍之人咸樂其賢色求者甚多守死不嫁後之娉者告其軍主軍主命之知不得巳乃自經死韓詩外傳曰魯公甫文伯死其母不哭季孫聞之曰公甫文伯之母貞女也子死不哭必有方矣使人問焉對曰昔是子也吾使事仲尼仲尼去魯送之不出魯郡贈之不以家珎且吾聞君子貴義而賤利是子病不見士來視死不見士之流涕死之日宫女縗絰從者十人不足於士而有餘於婦人吾是以不哭陳壽益部耆舊傳曰廣漢德陽王上妻者同縣袁氏女也名福年二十適上舅姑旣没復遭上喪悲傷感切不妄言笑有二子養育遺孤執心純篤及叔父愍其窮困私以許張奉掩迫合婚其旦計欲殺奉恐禍及母叔孤兒永棄死讎必生忼慨流涕自殺而死益部耆舊傳曰犍爲楊鳯珪妻者蜀郡臨卭陳氏女也名姬珪早亡時姬産子適生六月躬喪事育㓜孤三年喪訖兄弟宗親哀其子少年壯謀議更配以許蜀中豪姓姬聞仰天歎息引刀割咽幾死於是九族驚愕遂敬從其節又曰犍爲南安周繕紀妻者同縣曹氏女也名禁字敬姬年十七適周氏二年而夫亡隕時禁懷姙數月後産子元餘喪事闋遂移居依託父母欲必守義育養孤弱父愍其年少子稚黙以許同縣狐賔遣車馬衣服來欲迎禁父乃告禁勃然作色悽愴言曰依近父母夲不圖此因流涕忼愾乃自投舎後流水於是舉家競赴救出而氣息已絶積二日一夜乃復蘇息二親由是知其至誠謝賔解婚禁欷歔長歎乃更將子還依夫第居止㓗身執操非禮不動又曰廣漢新都便敬妻者同縣王氏女也名和年十七適敬敬亡和育養遺孤闔門守節不隨宗家宴樂嘉㑹居理甚脩蜀郡何玉因媒問和兄著取和遂相聽許著深曉其夫死子小冝有改圖加貧衰無以自立何氏公族必據福祚和自陳說斷計決分守全孤弱辭言未訖忼慨涕淚哀慟左右然著終受玉幣因欲迫脅和乃斷耳示著以信至見聽請以死謝舉宗敬重哀其大義又曰巴三貞者閬中馬眇新妻義西充國王元憤妻姬皆䦘中人也閬中趙蔓君妻華西充國人也姬早失夫介然守操中平五年黄巾餘類延益州賊帥趙蕃據閬中城抅迫衣冠令人婦女爲質義姬華等隨比入城後賊類爭勢攻破閬中時人或死或奔家室相失義姬華隨類出城走傳聞後賊或抅略婦女於是三人自度窮迫恐不免於據逼乃相與自沈水而死郷黨聞之莫不感傷號曰三貞又曰蜀郡廣都公乗士㑹妻者同縣張氏女也㑹早卒年壯無嗣欲有問者親戚將以許之發憤忼愾斷髮割耳事姑盡禮肅恭供養養族子以承宗廟列女傳爲熊氏女断髪割耳同又曰廣漢廖伯妻者同縣殷氏女也名紀年十六適伯伯早卒紀性聦敏逹於詩書女傳進退閑暇又有羙色見貪割面告誠以全其節曰求生害仁仁者不爲紀生見禮義豈獨使古人擅名者哉因作詩三章以風父母而舉縣嘉其才麗媒介滋繁遂援刀斷指明情邵氏家傳曰虞建武都尉邵夫人字義姬鴻臚之第二女夫人少而寡虞氏及夫人之宗哀夫人辛苦欲更爲圖婚然重夫人宿操慮不可以非禮逼亦知夫人潛佩刀誓以必死故不敢生意夫人自以虞氏凶短繼丗無子常獨處一室絶書學非祭祀墳墓不出紡績輙貨以供祭稱其多少不求豐厚于寳搜神記曰東越閩中有庸嶺髙數十里其下北濕中有大蛇長七八丈大十圍常病治都尉及屬城長吏多有死者祭以牛羊故不得福或與人夢或下喻巫祝欲得啖童女年十二三者都尉令長並共患之然氣厲不息共請求人家生婢子有罪家女養之八月朝祭送蛇輙夜出吞噬之累年如此前後巳用九女尓時豫募賫未得將樂縣李誕有六女無男其小女寄應募欲行父母不聽寄曰父母無相生女六人雖有如無無有緹縈濟父之功不能供養消費夜食生無所益不如蚤亡賣寄之身可得少錢父母終不聽寄自潛發不可禁止寄乃行請好劔及咋蛇犬先作數石米餈用蜜灌之以置穴口蛇夜便出頭大如囷目如三尺鏡聞餈香氣先啖食之寄便放犬犬就噬咋寄從後斫得數創蛇因踊出至庭而死寄入視其穴得九女髑髏悉舉出緩歩而歸越王聞之娉寄爲后拜其父爲將樂令母及姊皆有賜自是東冶無復祅邪之物其歌謡至今存焉杜預女記曰二寡婦者淑也昺也淑喪夫守寡兄弟將嫁之誓而不許爲書曰蓋聞君子導人以德矯俗以禮是以列士有不移之志貞女無迴二之行淑雖婦人竊慕殺身成義死而後巳夙遘禍罰䘮其所天男弱未冠女㓜未笄是以僶俛求生將欲長育二子上奉祖宗之嗣下繼祖禰之禮然後覲于黄泉永無慙色仁兄德弟旣不能厲髙節於弱志發明德於闇昧許我他人逼我于上乃命官人訟云簡書夫智者不可惑以事仁者不可脅以死晏嬰不以白刄臨頸改正直之辭梁寡不以毀形之痛忘執節之義髙山景行豈不思齊計兄弟備託學門不能匡我以道博我以文雖曰旣學吾謂之未也祖冲之述異記曰晉元興末魏郡民陳氏女名琬家在查浦年十六飢疫之歳父母相係死没唯有一兄傭賃自活女容色甚艶隣中士庻見其貧弱竟以金帛招要之女立操貞槩未嘗有許後值盧循之亂賊衆將加凌逼女厲然不迴遂以𬒳害杜預女記曰大女緱玉者陳緱氏之女也夫之從母兄弟殺其父玉乃爲父報讎其殺巳至親縛玉付吏獄竟當行刑有名士申徒子龍者緱玉同縣人也嘉其義勇奏記於縣曰伏聞大女緱玉爲父報讎獄巳決不勝感悼之情敢陳所聞昔太原周黨感春秋義辭師復讎當時論者猶髙其節况玉女弱耳無所聞心無所激内無同生之謀外無交遊之助直推父子之情奮發怒之心手刄刺讎僵尸流血當時聞之人無勇怯莫不強膽増氣輕身殉義攘𬒮髙談稱羡今聞玉幽執牢檻罪名巳定皆心低意沮悵恨長歎蟠雖愚竪以爲玉之節義歷代未有定足以感無恥之孤激忍辱之子假玉不值明時尚望追旌閭墓顯異後嗣况事在清聽不加八議哀矜之貸誠爲朝廷痛之申屠蟠字子龍又曰新野公主者光武皇帝姊也少有節行姿容嫁爲新野人鄧晨妻生一男三女王莽地黄三年光武起兵攻破棘陽至小長安爲莽兵所敗弃車走時天大霧還永室家道得小妹伯姬與共騎前行復見新野公主命使上馬主以手麾上曰行矣文叔努力早建大功追兵方至不能相救無爲兩没也上駐馬重呼之主曰不駃馳但志免我更當三人死也且急自脫我身何在㑹追兵至上遂驅馬而去主即遇害裴啓語林曰王經少處貧苦仕至二千石其母語之汝夲寒家兒仕至二千石可止也經不能止後爲尚書助魏不忠於晉𬒳牧流涕辭母曰恨昔不從勑以致今日母無戚容謂曰汝爲子則孝爲臣則忠有可負哉虞預㑹稽典録曰孟淑上虞人也父質中郎將淑年十七當出適聘禮旣至爲盗所刼淑祖父操刄對戰不敵見害淑思慕哀慟憔悴毀形以致盗由巳乃喟爾歎曰微淑之身禍誠不生以身害祖茍活何顔於是遂自經而死太平御覽卷第四百四十一
