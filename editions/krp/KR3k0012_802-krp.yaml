body:
  text: 珎寳部一寳珠上寳尚書湯誓曰遂伐三朡俘厥寳玉孔安國日俘取也玉以禮神使無水旱之災故取而寶之誼伯仲伯作典寳二臣作典寳一篇言國之常寳也又盤庚曰無緫于貨寳孔安國注曰無緫貨寳以求位也又旅􅋙曰分寳玉于伯叔之國時庸展親孔安國注云以寳玉分同姓之國是用誠信親親之道弗寳逺物則逺人格不侵奪其利其來服所寳惟賢則邇人安寳賢任能則近人安近人安則逺人安也又顧命曰越玉五重陳寳於東西序坐北列玉五重又陳先王所寳之器物赤刀大訓引璧琬琰在西序大玉夷玉天球河圖在東序胤之舞衣大貝鼖鼓在西房兊之戈和之弓垂之竹矢在東房皆歴代所傳之寳毛詩嵩髙曰王遣申伯路車乗馬錫爾介珪以作爾寳寳瑞詩含神霧曰聖人受命必順斗張握命圖授漢寳宋均曰聖人謂髙祖也受天命而王必順旅衡法故張良受兵鈐之圖命以授漢爲珎寳也禮記檀弓曰南弓敬叔反必載寳而朝敬叔魯孟僖子常失位去魯得反載其寳來朝君也夫子曰若是其貨也喪不如速貧之愈也又曰天不愛其道地不愛其寳又曰儒有不寳金玉而以忠信爲寳左傳莊公曰齊人來歸衛寳文姜請之也又莊公曰王及鄭伯入于鄭遂入成周取其寳器而還又文下曰宋昭以盡以寳行又襄公曰宋人得玉獻諸子罕子罕不受曰我以不貪爲寳爾以玉爲寳若與秋皆喪寳也不若人有其寳也又昭六曰吴太子諸樊入鄖諸樊吴王僚之太子取楚夫人與其寳器以歸公羊傳僖公曰虞公貪而好寳及爲晉所滅抱寳牽馬而去又定公曰盗竊寳玉大弓盗者何陽虎也史記曰趙簡子告諸子曰吾藏寳符於常山之上先得者賞諸子馳之常山上求無所得母䘏還曰巳得符矣登常山而臨代代可取也又曰晉使郄克以車八百乗伐齊陳于鞍於是晉軍追齊至馬陵齊侯請以寳器謝不聽必得笑克者蕭同叔子又曰魯昭公八年楚靈王就章華臺召昭公往焉賜昭公寳器巳悔復詐取之又曰衛叔名封成王長用事舉康叔爲周司㓂賜衛寳祭器又曰秦逐客李斯書曰陛下致崑山之玉有隨和之寳乗明月之珠服太阿之劒乗纎離之馬建翠鳯之旗樹靈鼉之鼓此數寳者秦不生一焉而陛下說之又曰樂毅伐齊入臨淄盡取齊寳也又曰梁惠王與齊威王㑹田於梁問齊王亦有寳乎威王曰無有梁王曰若寡人國小尚有徑寸之珠照車前後各十二乗者十枚柰何以萬乗之國而無寳乎威王曰寡人以爲寳與王異吾臣有檀子者使守南城則楚人不敢爲㓂東取泗上十二諸侯皆來朝吾臣有䀎子者使守髙堂則趙人不敢東漁於河吾更有黔夫者使守徐州則燕人祭北門趙人祭西門齊之北門也言燕趙之人畏其侵伐故祭以求福徙而從者七千餘家吾臣有種首者使備盗賊則道不拾遺將以照千里豈特十二乗哉梁惠王慙不懌而去梁或作魏字漢書曰沛公西入武關欲擊秦嶢下軍張良曰臣聞其將者賈竪子易動以利令酈食其持重寳㗖秦將秦將果欲連和沛公乃擊秦軍大破之謝承後漢書曰鄭引爲鄒令縣人王逢得路遺寳物懸於衢道求主還之後漢書曰丗祖遣衛尉銚期持珎寳繒帛賜隗囂期至鄭𬒳盗張璠漢記曰朱儁爲郡吏太守尹端有罪應死儁爲買珎寳賂主章吏端得免死范曄後漢書曰帝常召見諸郡計吏問其風俗及前後守令能不蜀郡計椽樊顯進曰漁陽太守張堪昔在蜀其仁以惠下威能討姦前公孫述破時珎寳山積捲握之物足冨十丗而堪去職之日乗折轅車布𬒳而巳帝聞良乆歎息魏氏春秋載袁紹檄州郡文曰曹操父嵩乞丐擕養因贓假位輿金輦寳輸貨權門魏志曰陳㤗爲匈奴中郎將京邑貴人多寄寳貨因市奴婢㤗皆掛於壁及徵爲尚書悉以還吴志曰士爕爲交阯太守每遣使詣權致雜香細葛輙以千數明珠大貝琉璃翡翠瑇瑁犀象之珎竒物異果蕉耶龍眼之屬無歳不至晉中興書曰姚萇試諸子謂曰吾有一寳物萬金不易汝等伎藝勝者吾以與之諸子皆索好馬欲於父前試之唯略不動萇以爲賢故越諸兄立爲嗣子晉安帝記曰桓玄尤愛珎寳常玩弄珠玉不離於手晉書殷仲文傳曰桓玄爲劉𥙿所敗仲文隨玄西走其寳玩悉藏地中皆變爲土晉書吕纂載記曰即序胡安據盗發張駿墓見駿貌如生得真珠簾琉璃榼白玉樽赤玉簫紫玉笛珊瑚馬鞭馬腦鍾水陸竒珎不可勝紀齊書曰始興王鑑鎮益州於州園地得古冢無復棺但有石槨銅器十種並古形玉璧三枚珎寳甚多不可皆識金銀爲蠶形者數萬計又以朱砂爲阜水銀爲池左右咸勸取之鑑曰皇太子昔在雍有發古冢者得玉屏風玉匣之属皆將還都吾意甞不同乃遣功曹何佇之爲起墳諸寳物一不得犯梁書曰羊侃大同中魏使陽斐與侃在比嘗同學有詔令侃延斐同賞賔客三百餘人食器皆金玉雜寳奏三部女樂至夕侍婢百餘人俱執金花燭崔鴻十六國春秋前趙録曰曜平陳安長駈至于西河張茂懼遣使稱蕃獻諸珎寳珠玉不可勝紀後魏書曰元乂旣專政乃於禁中自別作庫掌握之寳充牣其中北史曰齊神武後以孝武帝后配彭城王孫韶魏室竒寳多隨后入韶家有二玉鉢相盛轉而不可出馬瑙榼三斗玉縫之皆稱西域鬼作也北齊書曰髙德正嘗辭疾除兾州刺史即起顯祖怒禁門下其妻出寳物滿四牀欲以寄人帝掩見大怒曰我府藏無此物詰其得由皆諸元賂之帝乃斬德正并妻子伯堅隋書曰𨳩皇十二年突厥遣使獻七寳埦唐書曰師子國在西海之中出竒寳啇賈到則不見人但置寳物價直於洲上寳依價質之而去以能養師子故以爲國名又曰天寳中師子國遣婆羅門僧灌頂三藏來獻金寳瓔珞老子曰我有三寳保而持之一曰慈二曰儉三曰不敢爲天下先輕敵則幾喪吾寳晏子春秋曰和氏之璧井里之朴耳良工脩之則爲荐國之寳孫卿子云井里之璞又云玉人琢之爲天下寳魯連子曰楚王成章華臺酌諸侯酒魯君先至與之大曲之弓不琢之璧旣而悔之伍舉見魯君曰大曲之弓不琢之璧楚王之寳也吴求之弗與舉兵伐楚魯懼奉而歸之墨子曰周公見申徒狄曰賤人強氣則罰至申徒狄曰周之靈珪出於土楚之明月出􅑕蜃五象出於汙澤和氏之璧夜光之珠三棘六里此諸侯所謂良寳也淮南子說山云周之簡珪産於石大象神龜出於溝壑孟子曰諸侯之寳三土地人民政事寳珠玉者殃必及身淮南子曰夫夏后氏之璜不能無考考班璺明月之珠不能無纇夜光之珠白似月光故日明月纇若絲之有結纇也然天下寳之者何也小惡不及妨大美傳子曰夫齎不貲之寳獨宿曠野其危甚於累卵比之秦猶㤗山之安也戰國䇿曰周有砥阨宋有結緑梁有懸犁楚有和璞此四寳者玉之所美也巳爲天下名器國語曰晉定公享楚王孫圍趙簡子鳴玉以相問圍曰楚之白珩猶在乎爲寳也幾何對曰未甞爲寳也楚有觀射父能作訓辭以行諸侯有左史倚相能道訓典以叙百物有夢曰雲金木竹箭之生也此楚國寳也若白珩先王之玩何寳焉夢澤也穆天子傳曰天子西征至陽紆之山河伯無夷所都是惟河宗氏乃至於崑崙之丘觀舂山之寳吕氏春秋曰世皆以珠玉爲寳寳逾多而民逾貧失其所寳也陸賈新語曰聖人不用珠玉而寳其身也鹽鐵論曰汝漢之合鐵誘外國鈎羗胡之寳也說文曰琛寳也犍爲舎人日美寳爲琛說苑曰經侯過魏左帶玉具劒右帶環佩左光照右右光照左太子不視又不問經曰魏國亦有寳乎太子曰主信臣忠百姓戴上此魏國之寳也經左解玉具右解佩委之而起阮子曰雖金玉滿堂明珠滿室飢不爲寳非國之用新序曰晉平公浮西河中流而歎曰嗟乎安得賢士大夫與共此憂樂乎船人固桑對曰夫劒産於越珠産江漢玉産崑崗此三寳者皆無足而致今君苟好士則賢士至矣西京雜記曰武帝以七寳牀雜寳案厠寳屏風列寳帳設於桂宫時人謂之四寳宫也又曰髙祖入咸陽宫行庫藏見有琴長六尺十三絃二十六徽皆用七寳飾之銘曰渥璵之樂漢武故事曰上雜錯天下珎寳爲帳其次甲乙三輔黄圖曰金寳一銀二龜三貝四布寳五泉寳六凡寳貨六種二十八品地鏡圖曰夫寳物在城郭丘牆之中樹木爲之變視柯偏有折枯是其候也視折枯所向寳在其方凢有金寳常變作積蛇見此輦便脫隻履若衣以擲之溺之即得凢藏寳忘不知處以大銅盤盛水着所疑地行照之見人影者物在下也又曰視屋上瓦獨無霜其下有寳藏蔡氏化清論曰經云寳者衆之所利也苟利其利害必存焉郭璞奏曰臣以爲珎竒靡麗之物誠是玩弄之所寳然非經國之至寳張衡東京賦曰所貴惟賢所寳惟糓明皇雜録曰楊國忠驕奢僣侈之態復紛然未滿持盈公主玉葉冠􅉑國夫人夜光枕楊國忠鏁子帳皆希代之寳莫能計其直珠上說文曰珠蚌之隂精也尚書禹貢曰徐州厥貢淮夷蠙蛛淮夷二水出蠙蛛也周禮天官玉府曰若王合諸侯則共珠盤玉敦鄭玄曰敦盤類珠玉以爲飾左傳哀公曰衛太叔疾出奔宋臣向爲宋向魋臣納美珠焉與之城鉏城鉏宋邑宋公求珠魋不與由是得罪又哀下曰越圍吴晉趙鞅使楚隆告于吴王曰寡君之老無恤使陪臣隆敢展謝其不共展陳也黄池之役君之先臣志父得承齊盟曰好惡同之今君在難無恤不敢憚勞非晉國之所能及也使陪臣敢展布之王拜稽首曰寡人不侫不能事越以爲大夫憂拜命之辱與之一簞珠簞小笥爾雅曰西方之美者有霍山之多珠玉焉霍山今在平陽永安縣東北也尚書考靈曜曰夘金出􅎮握命孔符赤用藏龍吐珠也鄭玄注曰藏祕也珠寳物俞道也赤漢將用天之秘道尚書考靈曜曰甲子冬至日月五緯俱起牽牛日月若編珠春秋保乾圖曰吐珠於澤誰能不含宋均注曰珠岀於野澤之中誰能不含取以爲寳也禮斗威儀曰王者政平德至淵泉則江海出明珠又戴禮曰玉居山而木能潤淵生珠而岸不枯韓詩外傳曰良珠度寸雖有百仞之水不能奄其耀也韓詩内傳曰漢女所弄珠如荆鷄卵孝經援神契曰神靈滋液百寳用則珠母見珠母璣鏡宋均曰事神明得則大珠有光可以爲鏡德至淵則海出名珠史記曰樂毅遺燕王書曰齊王遁走莒僅以身免珠玉財寳盡收入於燕又曰魏王與齊威王㑹田於郊魏王曰若寡人國小尚有徑寸之珠照車前後各十二乗者十枚柰何以萬乗國而無寳乎事具寳門又曰漢王賜張良金百溢白珠二升良具以獻項伯又曰鄒陽上書曰臣聞明月之珠夜光之璧以闇投人於道路人無不案劒相盻者何則無因而至前也漢書景帝詔曰黄金珠玉飢不可食寒不可衣吏發民若取黄金者坐贓爲盗又曰董偃與母賣珠爲事偃十三隨母養館陶公主家左右言其姣好召見曰吾爲養之得幸又地理志曰武帝時使使入海市明珠到國圍二寸巳下又曰霍光廢昌邑王太后𬒳珠𥜗坐武帳召王伏前聽詔又曰成帝時王章死妻子皆徙合浦王啇輔政曰還章妻子故郷其家属皆採珠致産數百萬范曄後漢書曰光武耳不聽鄭衛之音手不持珠玉之玩又曰董卓擅朝政吕布斬之長安中民悉賣珠玉市酒肉相慶填滿街肆又曰馬援在交阯常餌薏苡實及軍還載之一車後有上書譛之者以爲前所載還皆明珠文犀也司馬彪續漢書曰天笁國一名身毒出琉璃珠璣又曰扶風人士孫奮居冨而性恡梁兾認奮母爲其守藏婢云盗白珠十斛也後漢書曰珠蚌中隂精也玓瓅明珠色也璣珠不圎也夫餘出珠大如酸棗東觀漢記曰永建四年漢陽太守文礱獻大珠詔曰海内頗有災異而礱不推忠竭誠而喻明珠之瑞求媚今封珠却還又曰顯宗時鍾離意爲尚書時交阯太守坐贓千金徴還伏法以其資物頒賜羣臣意得珠璣悉以委地而不拜賜上恠而問其故對曰臣聞孔子忍渴於盗泉之水曽參廻車於勝母之閭惡名也此贓穢之物誠不敢拜帝嗟嘆曰清乎尚書之言乃更以庫錢三十萬賜意又曰和熹后時新遭大憂法禁未設宫中亡大珠一篋主名不立太后乃親自臨見宫人一一間䦧察其顔色開示㤙信宫人盗者即時首服謝承後漢書曰孟甞爲合浦太守郡俗舊採珠以易米先時二千石貪穢使人採珠積以自入珠忽徙去合浦無珠餓死者盈路孟甞化行一年之間去珠復還又曰汝南李敬少時遷趙相奴於䑕穴中得繫珠及璫珥相連以問主簿主簿曰前相夫人昔亡珠不知所在疑其子婦竊之因去婦敬送珠付前相慙乃還去婦又曰豫章黄向辰歩路中得珠琪一囊可直三百餘萬求主還之主欲以半物謝向向委去不顧也魏書曰卞皇后性儉約不尚華麗無文繡珠玉器皆黒􅃮太祖甞得名璫數具命后自選一具后取其中者太祖問其故對曰取其上者爲貪取其下者爲僞故取其中者魏志曰文帝問蘇則曰前西域通使燉煌獻徑寸大珠可復求市得不則曰若陛下德流沙漠不求自至求而得之不足貴也帝黙然又曰公孫淵以遼東叛遣田豫以本官督青州刺史程喜喜内懷不服軍事之際多相違錯喜知帝寳愛明珠乃宻上豫雖有戰功而禁令寛㢮所得器仗珠銀甚多放散不皆簿管由是功不見列又曰文帝作終制曰飯含無以珠玉無施珠𥜗玉押典略曰臨淄侯曹植與楊脩書曰今丗作者可略而言人人自謂握靈虵之珠魏略曰大秦國出夜光珠真白珠夫餘出珠大如酸棗魏志曰東夷俗以瓔珠爲財寳或以綴衣爲飾或以懸頸垂耳至於𬒮不以金銀錦罽爲珎又曰倭國女王壹與遣大夫率善等獻真白珠五十孔青大勾珠二枚也蜀志曰秦宻奏記益州牧劉焉薦儒士任定祖曰甫欲剖蚌求蛛今乃隨和炳然復何歎哉又曰宗預復東聘吴孫權握預手曰今君年長孤亦衰老恐不復相見遺預大珠一斛吴録地理志曰朱崖珠宫縣出明月珠又曰袁慱字君遊爲淮陵長其女得壞牆中璫珠百餘博封上之詔以賜博吴志曰魏文帝遣使以馬求易明珠翡翠權曰此皆孤所不用而可得馬何若而不聽其交易王隠晋書武帝詔曰御府内省珠玉玩好之物皆以賜王公也晉書陶璜自交州上表曰合浦郡土地墝埆無有田農百姓唯以採珠爲業啇賈去來以珠貿米而吴時珠禁甚嚴慮百姓私散好珠禁絶來去人以飢困又所調猥多限每不充今請上珠輸二次者輸一麤者蠲除自十月訖二月非採珠之時聽啇旅往來如舊並從之晉令曰士卒百工不得服眞珠璫珥沈約宋書曰文帝詔太史令錢樂之作小渾天安二十八宿中外以白真珠及青黄三色珠爲三家星日月五星悉居黄道南史曰中天笁國在大月支東南數千里出火齊狀如雲母也色如紫金有光耀列之則蟬翼積之則如紗縠之重沓也崔鴻十六國春秋前秦録曰建元十年正月懸珠簾於正殿後魏書曰尓朱丗隆將敗洛中先謡曰三月末四月𥘉陽灰簸土覔真珠至是並驗又曰畢衆敬以篤老乞還桑梓朝廷許之衆敬臨還獻真珠璫四具太平御覽卷第八百二
