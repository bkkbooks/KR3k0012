front:
  text: 太平御覽卷第二十七
  hash: sha256:5907113e036cde73bf30c1691040d027cce755cd71e50e3c1b016d7d6f50a217
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_027-1a}
body:
  text: 時序部十二冬下吕氏春秋曰冬之德寒寒不信其地不成剛地不成剛則凍閉不開天地之大四時之化而猶不能以不信成物又况人乎周書時訓曰小寒十二月節鴈北郷鴈不北郷即臣不懷忠鵲始巢鵲不巢即邊方不寧又云一國不寜野雞始雊野雞不雊即國乃大水又云不雊來年雷乃收聲又曰大寒十二月中雞始乳雞不乳即媱婦亂男鷙鳥厲疾鳥不厲疾即國不除人水澤腹堅不腹堅即言無所從梁元帝纂要曰冬日玄英亦曰安寧亦曰玄冬三冬九冬天曰上天風曰寒風勁風嚴風厲風哀風隂風景曰冬景寒景時曰寒辰節曰嚴節鳥曰寒鳥寒禽草曰寒卉黄草木曰寒木寒柯素木寒條又曰十月孟冬亦曰上冬亦曰陽月此時純隂用事嫌其無陽故日陽月十二月季冬亦曰暮冬杪冬餘月暮節暮歳風俗通曰夏宫冬律雨雹必降冬宫夏律雷必發聲夫音樂至重所感者大故曰知禮樂之情者能作識禮樂之文者能述又曰趙仲讓爲梁兾從事中郎冬月坐庭中向日解衣捕虱又曰十月之應鍾何應者應也鍾者動也言萬物應陽而動不藏也論衡曰隂氣動於下而隂氣應之也又曰十二月律謂之大吕何大者太也吕拒也言陽氣欲出其隂不許也吕之言拒也依即拒難之也太玄經曰岡北方也冬也未有形也岡無也未有形故爲岡也言冬萬物深藏黄泉莊子曰魯遽弟子曰我得夫子之道吾能冬㸑鼎而夏造冰矣魯遽曰是直以陽召陽以隂召隂非吾所謂道也又曰古者民不知衣服夏多積薪冬則焬之故命之曰知生之民又曰宋人有善爲不龜手之藥者世世以洴澼絖爲事吴人有百金買不龜手之藥以說吴王越有難吴王使之將令與越人水戰大敗越人裂地而封能不龜手一也或以封或不免於洴澼絖則所用之異也按絖古纊字絮也洴澼浣溧斫絮於水中也洴扶經切澼普歴切太公金匱曰夏桀之時有芩山之水桀常以十月發民鑿山穿陵通於河民諌曰孟冬鑿山穿陵是泄天氣發地之藏天子失道後必有敗桀殺之朞年芩山崩爲大澤湯率諸侯伐之文子曰冬冰可折夏條可結又曰國有飢者食不重味民有寒者冬不𬒳裘與民同苦樂即天下無哀民列子曰瓠巴學琴於師襄當冬而叩徴絃以激㽔賔陽光熾烈堅冰立散孟子曰子産聽治國之政以其乗輿濟人於溱洧孟子曰子産惠而不知爲政歳十一月徒杠音江成十二月輿梁成民未病渉也徒杠獨木小橋可通徒行與梁通車之橋十一月夏九月十二月夏十月鶡冠子曰斗柄北指天下皆冬鄧析子曰爲君自當若冬日之陽夏日之隂萬物自歸莫之使也恬卧而功自成優游而政自治豈在振目搤腕手操鞭朴而後爲治歟管子曰冬作土功發地藏則夏多暴雨秋霖不止鄒子曰冬取槐檀之火尸子曰冬爲信北方爲冬冬終也北方伏方也是萬物冬皆伏貴賤若一美惡不伐信之至也傳子曰夏令披裘冬令披褐雖有嚴令終不肯從者逆時也韓子曰帝堯之王天下冬月鹿裘又曰管仲隰朋從桓公而伐孤竹春往冬返迷惑失道管仲曰老馬可用也乃放老馬而隨之遂得道行山中無水隰朋曰蟻冬居山之陽夏居山之隂蟻壤一寸而仞有水乃掘地遂得水荀卿子曰天不爲人之惡寒而輟其冬淮南子曰以冬鑠膠以夏造冰天道無私就也無私去也能者有餘拙者不足言以非時鑠膠造氷難也成天道無私就無私去能行道者有餘不能者不足又曰貧人冬則羊裘蔽體短褐不掩形而煬竈口冬日之陽夏日之隂萬物歸之而莫使之然冬日仁物歸陽夏日猛物歸隂非使之然自如是之也又曰稷辟土墾草以爲百姓力農然不能使禾冬生豈其人事不至哉其勢不可也又曰孟冬之月招摇指亥㸑松燧火改火也又曰冬爲權權者所以權萬物也又曰閶闔風四十五日不周風至四十五日廣莫風至坎卦之風不周風至則修宫室繕邊城立冬節土功其始故治宫室繕修邊城備冦難也廣莫風至則閉關梁斷罰刑象冬閉藏不通關梁也罰刑之凝者於是順時而决之又曰古之君人者其慘怛於民也國有飢者食不重味民有寒者而冬不𬒳裘與同飢寒冬伐薪蒸大者日薪小者日蒸以爲民資資用又曰北方水也其帝顓頊顓頊黄帝之孫以水德王天下號曰髙陽氏死託祀北方也其佐玄冥執權而治冬又曰冬行春令泄象春氣布散發泄也行夏令旱旱象陽炎行秋令霧秋氣隂故亂霧又曰太隂理秋則欲修備繕兵金德斷剛故修兵也太隂理冬則欲猛毅剛強純陽閉固水澤冰故剛強又曰北方之極自九澤窮夏晦之極北至令正之谷九澤北方之澤夏大也晦暝也有凍寒積冰雪雹霜霰漂潤群水之野顓頊玄冥之所司者萬二千里顓頊黄帝之孫也以水徳王天下號爲髙陽氏死爲北方水㯖之帝其神玄冥者金天氏有適子曰昧爲玄冥師死祀爲主水之神也月令曰申群禁固閉藏修障塞繕關梁禁外徙斷罰刑守門閭大捜客止交遊禁夜樂早閉晏開以索姦人巳得報之必固天節巳幾刑殺無赦雖有盛尊之親斷以法度母發藏毋釋罪應隂殺也又曰十月失政四月草木不實實長也語林曰羊稚舒冬日釀酒令人抱甕湏臾復易人速成而味好說苑曰衛靈公天寒鑿池宛春諌曰天寒起役恐怠民也公曰寒乎春曰公衣狐裘坐熊席是以不寒民寒甚矣公乃罷役世說曰石崇爲客冬天設萍虀王愷乃宻賄崇帳下都督及御車人問所以對曰萍虀是搗韭根雜以麥苗耳殷芸小說曰晉孝武帝即位時年十三四冬天晝日不着複衣但着單絹裙衫五六重夜則累茵褥謝公云體冝令有常陸下晝過冷夜過熱非攝養之術帝曰夜静故也謝公歎曰上理不減先帝崔鴻前趙録曰王延九歳事母母冬月思生魚杖延流血延㝷汾河扣凌而哭得魚而饋母山海經曰鍾山之神名曰燭隂燭龍也是燭九月因名云視爲晝暝爲夜吹爲冬呼爲夏不飲不食不息息則爲風息氣息也身長千里地鏡經曰十二月中草木獨有枝葉垂者下有美玉蔡邕月令章句曰冬終也萬物於是終也崔寔四人月令曰十月農事畢五糓旣登家備儲畜乃順時令也祠令曰季冬藏冰仲春開冰並用黒牡秬黍祭司寒之神於冰室其開冰加以桃弧棘矢設於神座又曰七祀祀行以冬漢桓譚新論曰太原民以隆冬不火食五月雖有疾病急緩猶不敢犯爲介之推故也漢崔寔政論曰僕前爲五原太守土地不知緝績冬積草伏卧其中若見吏以草纏身令人酸鼻吾乃賣儲峙得二十餘萬詣鴈門廣武迎織師使巧手作機乃紡以教民織漢書于定國飲酒至數石不亂冬月治獄請讞飲酒益精明後漢書虞詡祖父經爲郡縣獄吏案法平正務存寛恕毎冬月上狀恒流涕隨之甞稱曰東海于公髙爲里門而其子定國卒至丞相吾决獄六十年矣雖不及于公其庻乎子孫何必不爲九卿耶故字詡昇卿晉皇甫謐玄晏春秋曰余家貧晝則愍於作勞夜則甘於寢寐以三時之務卷帙生塵篋不解緘唯季冬末纔得一旬學尓晉嵇康集序曰孫登於汲郡北山土窟中住夏則編草爲裳冬則𬒳髪自覆論衡曰夫雲出於丘山降散則爲雨矣人見從上則謂之天雨水冬日天寒則雨凝爲雪皆由雲氣發於丘山不從天降集於地明矣瑞應圖曰芝草常以六月生春夏紫秋白冬黒暦義䟽曰小寒月之𥘉氣也小極故曰小寒大寒月之中氣也言十二月巳半隂氣大極故曰大寒三輔决録曰孫辰字允公家貧不仕居杜城中織箕爲業明詩書爲郡公曹冬月無𬒳有槀一束暮卧其中旦收之㑹稽典録曰盛吉爲廷尉毎至冬月罪囚當断其妻執燭吉持丹筆相向垂泣齊民要術曰孟冬之月天氣上騰地氣下降天地不通閉塞而成冬勞農以休息之黨正屬民飲酒正齒位次序也荆楚歳時記曰十二月八日沭浴轉除罪瘴于寳搜神記曰漢代十月十五日以豚酒入靈女廟擊筑奏曰上絃之曲連臂蹋地歌赤鳯來乃巫俗也皇覽塚墓記曰蚩尤塚在東郡壽張縣闞城中人常以十月說云毎有氣如匹綘自上屬下號曰蚩尤旗獨異志曰晉武帝哭羊祐冬月涕泗交下凝鬚爲冰慱物志曰宋國有田夫常衣黂緼僅以過冬曁春毎自曝於日不知天下之有廣厦奥室綿纊狐狢顧謂其妻曰負日之暄人莫知者以獻吾君將有重賞乙巳占曰人君當以冬時候辰星之政則辰星見伏以時天子當以冬時賞死事䘏孤獨察阿黨謹盖藏修積聚坯城郭戒門閭修鍵閉愼管籥固封疆備邊境防要害謹關梁塞蹊徑飾䘮紀不爲淫泆命伏藏之處講武習射御角力戰事省婦事則辰星順行矣人君淫泆非道縱恣不禁近習不䘏刑獄起衆發徴開池藏氣則辰星失行伏見不常而有芒角則民多疾疫隨之以喪亡國不昌也人君以冬時行春令則歳星之氣干之色青而君憂刑獄變動生死不當地踈不宻人乃流亡虫蝗爲災水泉咸竭民多疥癘胎夭多傷國多固疾斷獄官凶以冬行夏令則熒惑之氣干之色赤而小昧刑禍並起兵旱荐臻國多暴風方冬不雪不寒氛霧冥昧雷迺發聲以冬行秋令則太白之氣干之色白而必有野戰並作獄訟軍旅同時而興霜雪不時小兵時起土地侵削四鄙入堡輦下歳時記曰此月户部奏大閲天下貢物於都堂其日放朝宰相與百官皆赴户部宴饌一時特盛開元中曽以大閱一日貢物賜李林甫九州任土盡歸人臣之家國史書其事也晉陸機感時賦曰悲夫冬之爲氣亦何􅉃懔以蕭索天悠悠而弥髙霧鬱鬱而漠漠夜綿邈其難終日晼晚而易落敷曽雲之萎㽔墜零露之揮霍寒冽冽而浸興風謖謖而屢作謖起也所六切陸雲歳暮賦曰淪重陽於潜户徴積隂於司寒袁宏北征賦曰于時天髙地涸木落水凝繁霜夜灑勁風晨興日曖曖其巳頽月亭亭而虚昇鮑昭舞鶴賦曰窮隂殺節急景凋年涼沙振野箕風動天巖巖苦霧皎皎悲泉冰塞長河雪滿群山旣而昬雰夜歇景物澄廓星飜漢迴曉月將落感寒雞之早晨憐霜鴈之違漠臨驚風之蕭條對流光之照灼傳玄詩曰季冬時慘烈猛寒不可勝嚴風截人耳素雪墜地凝林上飛霜起波中自生冰未夕結重衾崇朝不敢興鮑昭登峴山詩曰孟冬十月交殺盛隂欲終風冽無勁草寒甚有凋松軍并冰晝結士馬氈夜重晨登峴山首霜霧凝未通王褒歳暮詩曰歳晚悲窮侓他郷念索除寂寞灰心盡推殘生意餘産空交道絶財殫宻戚踈空悲趙一賦還著虞卿書太平御覽卷第二十七
