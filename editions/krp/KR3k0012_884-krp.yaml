front:
  text: 太平御覽卷第八百八十四神鬼部四
  hash: sha256:f023e257838b2da6658f5bb21068c5a8bf96e1c26cdf4ae33902577a3245b412
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_884-1a}
body:
  text: 鬼下異苑曰廣州治下有黄文鬼出則爲祟所著衣帽皆黄至人家張口而笑必得疫狀長短無定隨籬髙下自不出巳十餘年土俗畏怖惶恐不絶又曰陸機𥘉入洛次河南之偃師時夕望道左若有民居因往逗宿見一年少神姿端逹與機言玄門妙物機心伏其能無以酬抗機提緯古今緫驗名實此年少不甚欣解旣暁便去機稅驂逆旅逆旅嫗曰此東數十里無村落正有山陽王家墓耳機乃怪悵然還睇昨路空野霾雲拱木蔽日知所遇者信王弼也又曰晉宣王誅王陵寢疾日見陵來賈逹亦爲祟少日遂薨𥘉陵𬒳執經賈逵廟呼曰賈梁道王陵魏之忠臣及永嘉之亂有覡見宣王宣王涕泗云家國傾覆是曹爽夏侯玄訴冤得伸故也又曰夏侯玄爲司馬景王所誅宗人爲之設祭見玄來靈坐上脫頭於膝取食物酒載之屬以内頭中畢還自安頭而言曰吾得請於帝矣子元無嗣也又曰謝靈運以元嘉五年忽見謝晦手提其頭來坐別床血淋落不可忍視又所服豹皮裘血淹滿篋及爲臨川郡飯中歘有大䖝謝遂𬒳誅又曰丗有紫姑古來相傳云是人妾爲大婦所姤誣以穢事相役正月十五日感激而死故丗人以其日作其形夜於厠間或豬欄邊迎之呪曰子胥不在曹失亦歸曹即其大婦也小姑可出戯捉者覺重便是神來奠設酒果赤覺貌輝輝有色即跳躁不住能占衆事卜行來蚕桑又善射鈎好則大舞惡即仰眠平昌孟氏恒不信躬試往捉自躍穿帳頂而去永失所在也丗說曰㑹稽賀思令善彈琴嘗夜在月中坐臨風鳴彈忽有一人形器甚偉着械有慘色在中庭稱善便與共語自云是嵇中散謂賀云卿手下極快但於古法未備因授以廣陵散賀遂傳之于今不絶又曰阮脩字宣子論鬼神有無或以人死有鬼宣子獨以爲無曰今見鬼者云着生時衣服若人死有鬼衣服有鬼耶論者服焉列異傳曰南陽宗定伯年少時夜行逢鬼問曰誰鬼曰鬼也鬼曰卿復誰定伯欺之言我亦鬼也欲至宛市鬼言我亦欲至宛市共行數里鬼言歩行太極可共迭相擔也定伯乃大喜鬼便先檐定伯數里鬼言卿太重定伯言我新死故重耳定伯因復擔鬼鬼略無重如是再三定伯復言我新死不知鬼悉何所畏忌鬼荅曰唯不喜人唾於是共道遇水定伯命鬼先渡聽之了無聲定伯自渡漼漼有聲鬼復言何以作聲定伯曰新死不習渡水耳勿怪行欲至宛定伯便擔鬼至頭上急持之鬼大呼聲咋咋索下不復聽之徑至宛市中着地化爲羊便賣之恐其變化乃唾之得錢千五百乃去于時名宗定伯賣鬼得錢千五百又曰任城公孫逹甘露中爲陳郡卒官將歛兒及郡吏數十人臨喪公逹有五歳兒欻作靈音聲若父呵衆人云哭止吾欲有所道呼諸兒以次教戒兒悲哀不能自勝乃慰之曰四時之運猶有終人物短脆焉當無窮如此數千語皆成文章兒乃問曰人死皆無知大人聦明殊特獨有神靈耶荅曰存亡之事未易可言鬼神之事非人知也索𥿄作書辭義滿𥿄投地云封書與魏君宰暮有信來即以付之其暮君宰果有信來又曰北海營陵有道人能令人與死人相見同郡人婦死巳數年聞而往見之曰願令我一見死亦不恨道人敎其見之於是與婦相見言語悲喜恩情如生時良乆乃聞皷聲遂别而去捜神記曰漢九江何敞爲交趾刺史行部到蒼梧暮宿鵠奔亭夜未半有一女子從樓下呼曰妾本居廣信縣脩里人早失父母無兄弟嫁與同縣施氏薄命先死有雜繒百二十疋及婢致冨一人妾孤窮羸弱不能自振欲之傍縣賣繒從同縣男子王伯賃車牛一乗載繒妾乗車致冨執轡乃以前年四月到亭外時日暮行人斷絶不敢復進因止致冨暴得腹痛妾之亭長舎乞漿火而亭長龔壽操刀㦸來至車傍問妾曰夫人何從來車上所載丈夫何在何故獨行妾應曰何問之壽持妾臂曰年少愛有色兾可樂也妾懼怖不應壽即持刀刺脅下一瘡立死又刺致冨亦死壽掘樓下合埋妾在下婢在上取財物而去殺牛燒車車釭及牛骨貯在亭東井中妾旣冤死痛感皇天無所告訴故來自歸於明使君敞曰今欲發之汝何以爲驗女子曰妾上下着白衣青絲屨皆未杇也妾姓蘇名娥願訪郷里以散骨歸死夫敞乃馳還令吏捕壽考問具服問廣信縣與娥語合壽父母兄弟皆捕繫獄敞表壽常律殺人不至於族然壽爲惡隱宻經年王法自所不免今鬼神訴者千載無一請皆斬之以明鬼神以助隂教又曰盧充范陽人家西三十里有崔少府墓充年二十先冬至一日出宅西獵戯見麞便射中之麞倒而起充遂逐不覺逺忽見道北一里許髙門瓦屋四周有如府舎不復見麞門中鈴下唱客前有一人投一襆新衣曰府君以此繫郎充便着已進見少府語充曰尊府君不以僕門鄙近得書爲君索小女爲㛰故相迎耳便以書示充父亡時充雖小然已識父手跡便即歔欷無復辭便勑内盧郎巳來可使女郎莊嚴至黄昏内白女郎莊嚴竟崔語充君可至東崔婦下車立席頭即共拜時爲三日畢崔謂充曰君可歸去女若生男當以相還生女當留養勑外嚴車送客充便辭出至家母見問其故充悉以狀對別後四年三月充臨水戯忽見傍有犢車乍沉乍浮旣而上岸四坐皆見而充往問其車後户見崔氏女與三歳男共載女抱兒以還充又與金盌忽然不見充後乗車入市賣盌兾有識者有一婢識此還白大家曰市中見一人乗車賣崔氏女郎棺中金盌大家即崔氏親姨母也遣兒視之果如婢言乃語充曰昔我姨姉少府女未出而亡家親痛之贈一金盌着棺中可說得盌本末充以事對此兒亦爲悲咽賫還白母母即令詣充家迎兒還諸親悉集兒有崔氏之狀又復似充之貌兒盌俱驗姨母曰我外生也即字温休温休者是幽㛰也遂成令器歷郡守其後植子毓有名天下又曰麋笁嘗從路歸未至家數十里見路次有新婦從麋求寄載行一十餘里新婦謝去謂笁曰我天使也令往燒東海麋笁家感君載故以相語笁請之曰不得不燒君快去我緩行日中必發火笁乃急行至家使出其財物明日日中果火大發又曰臨川間諸山有妖物來常因大風雨有聲如嘯能射人有頃便腫大毒有雌雄雄急而雌緩急者不過半日間緩者經宿其方人常有以求之求之小晩則死俗名曰刀勞鬼又曰永昌郡不韋縣有禁水水有毒氣唯十一月十二月可渡渉自正月至十月不可渡渡輙病殺人其氣有惡物不見其形作聲如有所投擊中木則折中人則害人俗名鬼彈文士傳曰左思𥘉作蜀都賦曰鬼彈飛丸以䃒礰後又改易無此語又南中八部志曰永昌郡有禁水水有惡毒氣中物則有聲中樹木則折名鬼彈中人則奄然青爛又曰下邳周式嘗至東海道逢一使持一卷書求寄載行十餘里謂式曰吾蹔有所過留書寄舡中愼勿發之去後式盗發視書皆諸死人録下條有式名湏臾使還式首道視書吏怒曰故以相告而勿視之式叩頭流血吏良乆曰感卿逺相載此書不可除卿今日巳去還家三年勿出門可度也勿道見吾書式還不出巳二年餘家皆恠之鄰人卒父怒使吊之式不得巳適出門便見此吏吏曰吾令汝三年勿出今而奈何吾求汝不見連相爲得鞭杖今巳見汝無可奈何三日中當相取也式還涕泣具道如此父故不信母晝夜與相守涕泣至三日日中時即死續搜神記曰淮南胡茂回能見鬼雖不喜見而不可止後行至楊州還歷陽城東有神祠中正值民將至祝祀之湏臾群鬼叱曰上官來迸走出祠去囬頋見二沙門來入祠中諸鬼兩兩三三相抱持在祠邊草中望沙門皆怖懼湏臾沙門去鬼皆還祠中囬於是遂少奉佛又曰王伯陽家在京口家東有大冢傳是魯肅墓伯陽婦䘮乃平其墳以葬後數年伯陽白日在㕔事見一貴人乗平肩輿將從數百人往來坐謂伯陽曰身是魯子敬安冢在此二百許年君何敢遽毀壞身冢因目左右何不舉手左右牽伯陽下牀以刀環築之數伯而去伯陽良乆乃蘇其處皆發疽疽潰尋死又曰㑹稽句章人東野還暮不及門見路傍小屋燃火投宿止有一少女不欲與丈夫共宿呼隣人家女自伴夜共彈箜篌戯歌曰連綿葛上藤一緩復一組汝欲知我姓姓陳名阿登明至東郭外有賣食母在肆中此人寄坐因說昨夜所見母聞阿登驚曰是我女近亡葬於郭外又曰施續爲尋陽督能言論有門生亦有理意嘗秉無鬼論忽有人單衣白祫來言及鬼客詞屈曰僕便即鬼何以言無使來取君門生酸苦求之鬼問有似君者不門生云施續下都督與僕相似鬼許之俄而督亡語林曰宗岱爲青州刺史著無鬼神論甚精莫能屈後書生詣岱談次及鬼論書生乃拂衣而去曰君絶我軰血食二十餘年以君有青牛髯奴所以未得相困今奴巳叛牛巳死今得相制言絶而失來日岱亡鄧德明南康記曰山都形如崑崙人通身生毛見人輙閑眼張口如笑好在深澗中飜石覔蟹噉之又曰木客頭靣語聲亦不全異人但手脚爪如鈎利髙巖絶峯然後居之能斫榜牽著樹上聚之昔有人欲就其買榜先置物樹下隨量多少取之若合其意便將去亦不横犯也但終不與人靣對交語作市井死皆知殯歛之不令人見其形也葬棺法毎在髙岸樹杪或藏石窠中南康三營代舡兵往說親覩葬所舞倡之節雖異於丗聽如風林汎響聲頻歌吹之和義熈中徐道覆南出遣人伐榜以裝舟艦木客乃獻其榜而不得見𫐠異記曰南康有神名曰山都形如人長二尺餘黒色赤目髪黄𬒳之於深山樹中作窠窠形如堅鳥卵髙三尺許内甚澤五色鮮明二枚沓之中央相連士人云上者雄舎下者雌室旁悉開口如規體質虚輕頗似木筒中央以鳥毛爲褥此神能變化隱身罕覩其狀盖木客山㺑之類也贛縣西北十五里有古塘名余公塘上有大梓樹可二十圍樹老中空有山都窠宋元嘉元年縣治民哀道訓道虚兄弟二人伐倒此樹取窠還家山都見形謂二人曰我處荒野何豫汝事巨木可用豈可勝數樹有我窠故伐倒之今當焚汝宇以報汝之無道至二更中内外屋上一時火起合宅蕩盡志怪曰㑹稽郡常有大鬼長數丈腰大數十圍髙冠玄衣郡將吉凶跂于雷門示憂喜之色謝氏一族憂喜必告弘道未遭母難數月鬼晨夕來臨及後轉吏部尚書拊掌三節舞自大門至中庭尋而遷問至又曰夏侯弘忽行江陵逢一大鬼投弓㦸急走小鬼數百從之弘畏懼下路避之大鬼過後捉一小鬼問此是何物曰廣州大殺弘曰以此矛㦸何爲曰以此殺人若中心腹者輙死中餘處不至於死弘曰治此病者有方不鬼曰殺烏雞薄心即差弘曰今欲行何鬼曰當荆楊二州爾時此二州皆行心腹病略無不死者弘在荆州教人殺烏雞薄之十得八九今中惡用烏雞自弘之由也本草曰梟桃在樹不落者殺百鬼也張衡東京賦曰度索作梗守以鬱壘神荼副焉對操索葦上古有神荼與鬰壘昆弟二人能執鬼度朔山鬼所出入太平御覽卷第八百八十四
