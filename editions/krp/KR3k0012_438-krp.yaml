front:
  text: 太平御覽卷第四百三十八
  hash: sha256:08a95dc45324fefd38ef9fd9a04b27444959d006e47578b6e9d724122e4ef7c6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_438-1a}
body:
  text: 人事部七十九烈士禮記曰戰于郎郎魯邑也公叔禺人遇負杖入保者息曰使之雖病也任之雖重也君子不能爲謀也士弗能死也不可我則旣言矣與其鄰重汪踦徃皆死焉重當爲童姓汪名踦魯人欲勿殤重汪踦問於仲尼仲尼曰能執干戈以衛社稷雖欲勿殤不亦可乎又曰齊大饑黔敖爲食於路以待餓者而食之有餘者蒙𬒮輯屨貿貿然來黔敖左奉食右執飲曰嗟來食揚其囙而視之曰予唯不食嗟來之食以至於斯也從而謝焉終不食而死曽子聞之曰微與其嗟也可去其謝也可食又曰魯莊公及宋人戰于乗丘縣賁父御馬驚敗績公隊賁父曰他日不敗績而今敗績是無勇也遂死之圉人浴馬有流矢在白肉公曰非其罪也遂誅之史記曰齊人或毀孟嘗君於涽王曰將爲亂及田甲刼涽王王意之孟嘗乃奔魏前有獲粟於孟嘗之賢者聞之乃上言言孟嘗不作亂請以身爲盟遂自剄以明孟嘗涽王乃知孟嘗君果無謀又曰漢髙帝旣立以田撗兄弟夲定齊齊人賢者多附焉今在海中不收後爲亂乃使赦罪召之撗乃與其客二人乗傳詣雒陽至尸郷尸郷在偃師廐置置馬以傳驛也撗謝使者曰人臣見天子當洗沐因止留謂其客曰撗始與漢王俱南靣稱孤今漢王爲天子而撗爲亡虜北靣事之其耻甚矣且吾烹人之兄與其弟比肩而事主縱彼畏天子詔不敢動我獨不愧於心乎且陛下欲見我者不過欲見吾靣貌耳今陛下在雒陽斬吾頭馳三十里間形容未敗猶可觀也遂自剄二客亦自殺從之髙帝聞大驚以田撗客皆賢聞其餘五百人在海中使召之至聞撗死又皆自殺是知田撗兄弟皆得士也又曰楚下滎陽生得周苛項王謂苛爾從我我以公爲上將軍封三萬戸苛罵曰若不趣降漢漢今虜若若非漢敵也項王怒烹苛又曰李廣從衛青伐匈奴失道後至大將軍使長史急責廣之幕府對簿廣曰校尉無罪乃我自失道謂其麾下曰廣結髪與匈奴大小七十餘戰今幸從大將軍出接單于兵而大將軍又徙廣部行回逺而又迷失道豈非天哉且廣年六十餘矣終不能復對刀筆之吏遂引刀自刎軍士大夫皆哭漢書曰髙祖時告趙王張敖反者貫髙對曰獨吾屬爲之王不知也吏按笞數千刺爇身無完者終不復言廷尉以貫髙辭聞上曰壯士誰知者以私問之中大夫洩公曰臣素知此趙國立名義不侵爲然諾者也上使洩公持節問之髙曰人情豈不各愛其父母妻子哉今吾三族皆巳論死豈以王昜吾親哉顧爲王實不反獨吾等爲之具道夲指所以不知狀於是洩公具以報上上乃赦趙王上賢髙能自立然諾使洩公赦之告曰張王巳出上多足下故赦足下髙曰所以不死者白張王不及耳今王巳出吾責塞矣且人臣有篡弑之名何靣目復事上哉乃仰絶吭而死又曰丞相王嘉數上言不冝封董賢上怒詔嘉詣廷尉詔獄使者至府掾吏涕泣和藥進嘉嘉引藥杯擲地謂官屬曰丞相宰得備位三公奉職負國當伏刑都市以示萬衆豈兒女子耶何謂呾藥而死嘉遂乗吏小車去盖不冠隨使者詣廷尉二十餘日不食歐血而死又曰田延年有罪霍光使徃就獄延年曰幸縣官寬我耳何靣目入牢獄使衆人指笑我卒徒唾吾背乎即閉閣獨居持刀東西歩聞皷聲及自刎死范曄後漢書曰趙苞遷遼西太守明年遣使迎母及妻子爲鮮卑鈔掠苞率歩騎與賊對陣賊出母示苞苞悲號謂母曰爲子無狀欲禄奉養朝夕不圖爲母作禍母遥謂苞曰人各有命何得相顧以虧忠義昔王陵母向漢使伏劔以固其志爾其勉之苞即時進戰賊悉摧破其母妻皆遇害苞殯歛母畢白上歸葬帝遣䇿弔慰葬訖苞歐血而死東觀漢記曰温序字次房爲隗囂别將苟宇所刼宇謂序曰子若與我并威同力天下可圖也序素有氣力大怒叱宇等曰虜何敢迫脅漢將因以節撾殺數人賊衆爭欲殺之宇止曰此義士也可賜以劔序受劔銜鬚顧左右曰賊所迫殺無令鬚汙土遂伏劔而死又曰馬援曰方今匈奴烏桓尚擾北邊欲自請擊之男兒要當死於邊野以馬革褁尸還墓耳何能卧床上在兒女子手中耶故人孟兾曰諒爲烈士當如此矣又曰永和八年匈奴遣使求和親上遣鄭衆持節使匈奴衆素剛烈至北庭虜欲令拜衆不爲屈單于大怒圍守閉之不與水火欲脅服衆衆拔刄自誓單于恐而止又曰漢圍隗囂囂窮困其大將王捷登城呼漢軍曰爲隗王城守者皆必死無二心願諸軍亟罷請自殺以明之遂刎頸而死謝承後漢書曰濟隂戎良字子恭年十八爲郡門下吏良儀容偉麗太守諸葛豊使閤裏冩書從者誣良與婢通刳腹引出腸肝示豊漢末英雄記曰袁尚使審配守鄴曹操攻之操出行圍配伏弩射之幾中及城䧟生獲配操謂曰吾近行圍弩何多也配曰猶恨其少操曰即忠於袁氐不得不爾志欲活之配意氣壯烈終無撓辭遂斬之魏志曰龐㳙字子異酒泉人𥘉以凉州從事守破羌長㑹武威太守張猛反殺刺史邯鄲啇猛令敢有臨啇䘮死不赦㳙聞之弃官晝夜奔走號哭喪所訖詣猛猛知其義士遣不殺由是以忠烈聞又曰夏侯惇字元讓沛國譙人夏侯嬰之後年十四就師學人有辱其師者惇殺之由是以烈氣聞又曰大將軍司馬文王斬諸葛誕傳首夷三族誕麾下數百人坐不降見斬皆曰爲諸葛公死不恨其得人心如此又曰賈逵𥘉爲郡吏守絳邑長郭援之攻河東所經城邑皆下逵堅守援攻之不拔及召單于井軍急攻之城將潰絳父老與援要不害逵絳人旣潰援聞逵名欲使爲將以兵刼之逵不動左右引逵使叩頭逵叱之曰安有國家長吏爲賊叩頭援將斬之絳吏民聞將殺逵皆乗城呼曰負要殺我賢君寧俱死耳左右義逵多爲請遂得免韋昭呉書曰頴熈使魏辭意不屈魏留之熈懼見迫乃引刀自刺中乳房上聞嘉之賜鹽米復其國蜀志曰義陽傳彤先主與呉戰退軍􅊮斷後距戰兵人死盡呉將語彤令降罵曰呉㺃何有漢將軍降者遂戰死晉書曰太守陳楚迫韋忠爲功曹㑹山羌攻郡楚携子走出賊射之中三創忠冒刄伏楚以身捍之泣曰韋忠願以身代君乞諸王哀之亦遭五矢賊相謂曰義士也舎之忠於是負楚以歸又曰辛勉累遷侍中及洛陽䧟隨帝至平陽劉聦遣其黄門侍郎喬度賫藥酒逼之勉曰大丈夫豈以數年之命而虧髙節事二姓下見武皇帝哉引藥將飲度遽止之曰主上相試耳君貞士也歎息而去習鑿齒晉春秋曰後主將從譙周筞北地王諶怒曰若數窮力屈禍敗必及便當父子君臣背城一戰同死社稷以見先帝可也後主不納遂送璽綬是日諶哭於昭烈之廟先殺妻子然後自殺沈約宋書曰薛安都反傳靈越奔逃爲沈慶之軍人所擒厲聲曰我傳靈越也汝得賊何不即殺生送詣何勔勔躬自慰詰其叛逆對曰九州唱義豈獨在我勔又問四方阻逆無戰不擒主上皆加曠蕩即其才用卿何不早歸天闕乃逃命草間乎靈越荅薛公舉兵淮北威震天下不能專任智勇委付子姪敗之由實在於此然事之始末備皆叅豫人生歸於一死實無面求活勔壯其意送還京師太宗欲加原宥靈越辭對如一終不回改乃殺之隋書曰張季珣大業末爲鷹擊郎將其府據箕山爲固與洛口連接及李宻翟讓攻䧟倉城遣人呼之李珣罵宻極口宻怒遣兵攻之三年粮用盡士卒羸病不能拒戰遂爲所䧟季珣曰吾雖爲敗軍之將猶是天子爪牙之臣何容拜賊也宻壯而釋之翟讓從之求金不得遂殺之時年二十八又曰許善心母范氐梁太子中舎人孝才之女也少寡養孤博學有髙節髙祖知之勑尚食每獻時新常遣分賜嘗詔范入内侍皇后詣讀封永樂郡君及善心遇禍范年九十有二臨喪不哭撫柩曰能死國難我有兒矣因卧不食後十餘日亦終唐書曰屈突通聞京師平家屬盡没乃留顯和鎮潼關率兵東下將如洛陽通適進路而顯和降於劉文静遣副將竇琮叚志玄等率精騎與顯和追之及於稠桑通結陣以自固竇琮縱通子壽令徃諭之通大呼曰昔與汝爲父子今與汝爲仇讎命左右射之顯和呼其衆曰京師䧟矣汝並命關西人欲何所去衆皆釋仗通知不免乃下馬東南向再拜號哭曰臣力屈兵敗不負陛下天地神祇實所鑒察遂擒通送干長安髙祖謂曰何相見晚耶通泣對曰通不能盡人臣之節力屈而至爲夲朝之辱髙祖曰隋室忠臣也命釋之授兵部尚書封蔣國公又曰劉世讓字元欽雍州醴泉人也爲定安道行軍惣管率兵以拒薛舉戰敗世讓及弟寳俱爲舉軍所獲舉將至城下令紿說城中曰大將軍五道巳趣長安冝開門早降世讓僞許之因告城中曰賊兵多少極於此矣冝益自固以圖安全舉重其執節終不之害又曰新興王良孫晉先天中爲殿中監兼雍州長史甚有威名始封新興王㝷附㑹太平公主伏誅𥘉晉之就誅寮吏皆奔散唯司功李撝徒歩不失在官之禮仍哭其屍姚崇聞之曰欒布之儔也擢爲尚書郎又曰徐晦由進士第登直言科爲櫟陽尉皆自楊慿所薦及慿得罪貶官臨賀縣尉親交無敢祖送獨晦至藍田與慿言别時故相權德輿與慿交分㝡深知晦之行因謂晦曰今日送臨賀誠爲厚矣無乃反爲累乎晦曰晦自布衣沐楊公之知今日不一送他日相公爲姧邪所讃烏可不送相公乎德輿大慙因稱之於人不數日御史中丞李夷簡請爲監察晦至之日白夷簡曰晦不由公門公何所取信而見奬拔於千萬人中哉荅曰君送楊臨賀寧肯負國乎由是名益振吕氐春秋曰要離旣殺王子慶忌呉王大恱請分國要離曰不可殺妻子焚而揚其灰爲不仁爲故主殺新主爲不義不可以生伏劔而死韓詩外傳曰楚昭王有士曰石奢公正而好直王使爲理於是有殺人者石奢追之則其父也還反於庭曰殺人者父也以父成政非孝也不行君法不忠也遂伏鈇鑕曰命在君君曰追而不及庸有罪乎子其治事石奢曰不然死罪而生不㢘也君赦之上之惠臣不失法下之義遂不去鈇鑕而死乎庭中㑹稽典録曰魏朗字少英㑹稽人靈帝即位竇武陳蕃等欲誅官官謀泄反爲所害朗以黨𬒳徴乃慷慨曰丈夫與陳仲舉李元禮俱死得非乗龍上天乎於丹陽牛渚自殺海内列名八俊張鄢文士傳曰陸機爲大都督請孫承爲司馬成都王旣害機兄弟收承付刺姧獄考掠千餘兩踝骨見終不自誣獄吏知承烈士諌承曰二陸之痛誰不知枉君何不惜身乎承乃仰而歎曰吾亡不能濟死而相誣非吾徒也獄吏作承服辭謀反狀成都乃下令夷承三族劉丗叔異苑曰潯陽周虓字孟威寜康中鎭于巴西爲符堅所獲守節不屈堅使使清道虓躬治逹陌謂使者云煩君語氐賊符堅何至取國士如此堅聞之曰貉子正欲覔死殺之適足成其名耳及苦加栲楚不食而卒堅怒猶未歇剖棺臨視虓欻運眸斷何斤反齒鬚鬢張列精暗明亮廻盼矋堅乃厚加賵贈劉向新序曰崔杼弑莊公申蒯漁於海而後至將入死其御止之曰君之無道聞於天下不可死也申蒯曰告我晚子不早告我吾食亂吾之食而死治君之事乎子勉之子無死其御曰子有亂主猶死之我有治長奈何勿死至於門曰申蒯聞君死請入守門者以告崔子曰勿内申蒯曰汝疑我乎吾與汝臂乃斷其臂以予其門者門者以示崔子崔子陳八列曰令入申蒯拔劔呼天三踊乃闘殺七列未及崔子一列而死其御亦死之門外吾子聞之曰蒯可謂守節死義矣又曰白公勝欲殺楚惠王出云令尹司馬皆死勝拔劔而屬之矜屈盧曰子與我舎子不與我將殺子屈盧曰詩有之曰莫莫葛藟肄于條枚愷悌君子求福不回今子殺子父而求福於盧也可乎且吾聞之知命之士見利不動臨死不恐爲人臣者時生則生時死則死是謂人臣之禮故上知臣道其有可刼乎胡不推之白公勝乃入其劔又曰白公勝旣殺令尹司馬欲立王子閭以爲王王子閭不肯刼以刄王子閭曰王孫輔相楚國扶正王室后自庇焉閭之願也今子假威以暴王室殺伐以亂國家吾雖死不子從也白公強之不可遂殺之常璩華陽國志曰張飛攻破巴郡獲將軍嚴顔謂曰大軍至何以不降敢逆戰乎顔對曰卿等無狀侵奪我州但有斷頭將軍無降將軍也飛怒曰牽去斫頭顔正色曰斫頭便斫何爲怒也飛義之引爲賔客又曰章明字公儒繁人王皓字子離江夏人也明爲太中大夫莽篡位歎曰不以一身事二主遂自殺皓爲美陽令去莽歸蜀公孫述僣號髙之使聘之皓乃自刎以頭付使者述慙怒誅其妻子又曰李業字巨遊梓潼人少執志清白太守到咸慕其名辟爲功曹十命不詣咸怒欲殺之業徑詣獄咸釋之公孫述累徴聘不應述怒遣鴻臚尹融持藥酒逼業業笑曰名可成不可毀身可殺不可辱遂飲藥死述耻殺善士贈錢百萬子舋逃匿不受建武中察孝廉太平御覽卷第四百三十八
