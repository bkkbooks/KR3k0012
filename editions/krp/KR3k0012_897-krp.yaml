front:
  text: 太平御覽卷第八百九十七獸部九
  hash: sha256:ec242393b236213440f2002a94253c0c22eb106fd7aa58dc0672b8293b1707c7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_897-1a}
body:
  text: 馬五古今注曰秦始皇有七名馬一曰追風二曰逐兎三曰躡影四曰追電五曰飛翮六曰銅雀七曰晨鳬崔豹古今注曰曹真有駃馬名爲驚㠶言其馳驟如烈風之舉㠶也風俗通曰馬一疋俗說馬比君子與人相疋或曰馬夜行目明照前四丈故曰一疋或說度馬從橫適得一疋或說馬死賣得一疋帛或云春秋左氏說諸侯相贈乗馬束帛束帛爲疋與馬之相匹耳又曰疲馬不能度繩俗說馬之疲羸不能復度繩索言其極也或云不能度畦塍也謹按齊有繩水裁三四歩馬疲不能度此水耳又曰殺君馬者路傍兒也語云長吏食重禄芻藁豐羙馬肥希岀路傍小兒觀之却驚致死按長吏馬肥觀者快馬之走驟也騎者驅馳不足至於瘠死金樓子曰鳥與鳥遇則相躅獸與獸遇則相觸馬與馬遇則趹蹄相傷天之生此物多其力而少其智也傅子曰九日養親一日餓之寜可言飽飽多飢少同爲孝子榖馬一日餓之馬肥不損於義無傷非可同之夏侯子曰一舟之覆無一毫不濕一馬之走無一毛不動故大同萬物不一也又曰魯人有善相馬者與余俱遊夜方寐聞馬有行者魯人驚曰七百里也吾恐此暗中耳符子曰齊景公好馬命畫工圗而訪之殫百乗之價朞年而不得像過實也今使愛賢之君考古籍以求其人雖期百年不可得也又曰吾與玄子觀東海釋駟而升乎􅵺山未中路而忘馬符子使人求之不獲使鬼索之而獲符子曰六合不可忘故知良馬在其中矣請以六合之觀觀之也鄒子曰董仲舒三年不闚園圃乗馬不知牝牡諸葛教曰昔孫叔敖乗馬三年不知牝牡稱其賢也常璩華陽國志曰神馬四疋岀滇音顛池河中三國典略曰神馬者河之精也代馬隂之精也西京雜記曰文帝自代還有良馬九疋皆天下駿足也名曰浮雲赤電絶羣逸驃紫鷰騮緑螭􅍡龍子驎駒絶塵號爲九逸又曰衛將軍生子或有獻騧馬者乃命其子爲騧字叔馬東方朔傳曰驃騎難諸愽士朔對曰騏驎緑耳蜚鴻華騮天下良馬也將以捕䑕於深宫之中曾不如跛猫神異經曰西南大宛有馬其大二丈髯至膝尾委地蹄如升踠可握日行千里至日中而汗血乗者當以絮緾頭以避風病其國人不緾揚子法言曰或問治巳曰治巳以仲尼問治巳何用益以用孔子之道或曰治巳以仲尼奚寡矣言學孔子道多而成者何少也曰率馬以驥不亦可乎又曰希驥之馬亦驥之乗也希顔之人亦顔之徒也桓譚新諭曰顔淵所以命短者慕孔子所以傷其年也若庸馬良馬相追至暮共列宿所良馬鳴食如故庸馬垂頭不復食何異顔淵與孔丘優劣又曰衛后園有送塟時乗輿馬十疋吏卒養視善飲不能乗而馬皆六十歲乃死又曰薛翁者長安善相馬者也於邊郡求得駿馬騎以入市去來人不見也後勞問之因請觀馬翁曰諸卿無目不足示也論衡曰儒書稱孔子與顔淵俱登魯東山望呉昌門謂曰氽何見曰見一疋練前有生藍孔子曰噫此白馬盧芻使人視之果然王子年拾遺記曰周穆王即位廵行天下馭八龍之駿名曰絶地翻羽奔霄越影踰暉超光騰霧挾翼又曰曹洪與魏武帝所乗之馬名曰白鶴時人諺曰慿空虚躍曹家白鸖洞冥記曰脩弥國有馬如龍騰虚逐日兩足倚行或藏形於空中唯聞聲耳時得天馬汗血是其類也又曰畢勒國有小馬如駒日行千里毛垂至地東王公常騎此馬朝發湯泉夕飲虞淵一日一夕徃返七八度亦言馬毛長於空中自放則吹之或東或西也又曰東方朔遊吉雲之地越扶桑之東得䄂馬一疋髙九尺股裏有旋毛如日月之狀如月者夜光如日者晝光毛色隨四時之變漢朝之馬見之即垂頭振毛一國衆獸見皆避之帝問東方朔是何獸也朔曰昔西王母乗靈光之輦以適東王公之舎稅此馬於芝田及食芝草王公怒弃馬於清津天岸臣至王公之壇因騎而返繞日三匝此馬入漢關關猶未掩臣於馬上睡眠不覺遂至帝曰其馬名云何朔曰因事爲名則歩景抱朴子曰韓子治甞以地黃甘草哺五十歲老馬以生三駒又百三十歲乃死又曰李南乗赤馬行道逢他人乗白馬者白馬先鳴而南赤馬鳴應之南謂從者曰彼馬言汝今當見一黃馬左目盲者是吾子可爲告使駛行相及從者不信行二里所果逢黃而左目盲南之馬先鳴而盲馬應之問其主果向白馬子也論衡曰廣漢翁偉能聽鳥獸之音乗蹇馬之野而田間有放馬者相去數里鳴聲相聞翁偉謂其衘曰彼放馬目眇其衘曰何以知之曰罵此轅中馬蹇馬蹇馬亦罵之曰眇馬御者不信使徃視之馬目果眇鹽䥫論曰騏驥負鹽車垂頭於太行之坂屠者持刀睨之又曰古者諸侯不秣馬天子有命以車就牧庶人之乗馬者足以代勞而巳故行則服軛止則就犁一馬服櫪當中家六口之食孔融論曰馬之駿者名曰騏驥犬之駿者名曰韓盧犬之有韓盧馬之有騏驥人之聖也名號等設使騏驥與韓盧並走寧能頭尾相當八脚如一無有先後之覺矣英雄記曰公孫瓉每聞邊警輙厲色作氣如赴讎常乗白馬又白馬數十疋選騎射之士號爲白馬義從以爲左右翼胡甚畏之相告曰當避白馬長史曹暪傳曰吕布有駿馬名赤兎常騎乗之時人爲之語曰人中有吕布馬中有赤兎袁淮正書曰牛馬之爲人駕乗者非樂負千鈞之重行千里之險鞭䇿痛矣桓公丗論曰朝鮮之馬𬒳鬛踶齧能使其成騏驥者習之故也愽物志曰穢貃國南與辰韓北與句麗沃沮接東窮大海海中岀班魚皮陸岀文豹又出果下馬髙三尺漢時獻之駕輦車正始六年樂浪太守劉茂帶方太守弓遵領東穢屬勾麗伐之舉邑降博物志曰唐公有驌驦項羽有騅馬華陽國志曰元馬日行千里死於蜀今元馬冢是也縣有元馬祠馬牧山下或産駿駒元馬子也長沙耆舊傳曰虞芝州命部南陽從事太守張忠連姻王室罪名入重芝依法執按刾史畏勢召芝芝曰年徃志盡譬如八百錢馬死生同價且欲立效於明時耳遂投傳去三輔决録曰安陵有項仲山飲馬渭水先投三錢襄陽記曰中盧山西去襄陽一百三里有一地道漢時甞有數疋白馬出其中遂名其地爲白馬穴陸遜攻襄陽又值此穴中數十疋馬岀戰還建鄴蜀使有五部兵家滇音顚池者識其馬色云是巳亡父所乗對之流涕丗語曰劉備屯樊城劉表禮焉憚其爲人不甚信用曾諸宴會荆越蔡瑁欲因會取備備覺之僞如厠潛遁出行所乗馬名爲的顱騎的顱走墮襄陽城西檀溪水中溺不得岀備急曰的顱今日厄可不努力的顱乃一踴三丈遂得過異苑曰符堅爲慕容冲所襲堅馳馬墮澗追兵幾及計無由出馬即踟蹰臨澗垂控與堅堅不能及馬又跪而授焉堅攀之得登岸西走廬江七賢傳曰陳衆辟州從事楊州部有賊擊之多死衆請取之因單車乗白馬徃賊束身歸降遂生爲立祠號曰白馬從事竹林七賢論曰王戎簡脫不持儀形好乗巴􅗬馬雖爲三司率爾私行廵省園田不從一人以手巾揷腰戎故吏多至大官相逢戎輙下道避之搜神記曰昔秦人築城於武州塞内以備胡城將成而崩者數焉有馬馳走周旋反覆父老異之因依以築之爲城乃定遂名爲馬邑又曰呉先主殺武衛兵錢小小刑見大街頋借賃人呉永使永送書與桁南廟借木馬二疋以酒噀之皆成好馬鞍勒全耳志怪集曰孫弘常自云見鬼神與其言語委曲衆未之信鎭西將軍謝尚常所乗馬忽暴死會弘詣尚尚愛惜至甚弘謂尚曰我爲公活馬何如尚常不信弘荅曰卿若能令此馬更生者卿真實通神矣弘於是便下床去良乆還語尚曰廟神愛樂君馬故耳向我詣神請之𥘉殊不許後乃見聽馬即便活尚時甚不信怪其所言須臾其馬忽從門外走還衆咸見之莫不驚惋旣至馬屍應時能動有頃奮迅呼鳴尚於是歎息述異記曰東平畢衆寳家在彭城有一􅍡馬甚快常乗岀入至所愛惜宋大明六年衆寳夜夢見其亡兄衆慶曰吾有戎役方置艱危而無得快馬汝可以􅍡馬見與衆寳許諾旣覺呼同宿客說所夢始畢仍聞馬倒聲遣人視之裁餘氣息狀如中惡衆寳心知其故爲試治療向晨馬死衆寳還卧如欲眠聞衆慶語云向聊求馬汝治護備至將不惜之今以相還别更覔也至曉馬活食時復常續搜神記曰趙固常乗一疋赤馬以征戰甚所愛重常所繫㸔齋前忽腹脹少時死郭璞從北過因徃詣之門吏云將軍將馬今死甚愛惜今盛懊惋景純使語門吏云入通道吾能活此馬則必見我門吏聞驚喜即啓固固踊躍令門吏走迎之始交寒温便問卿能活我馬不璞曰馬可活耳固忻喜即問須何方術璞云得卿同心健兒二三十人皆令持長竹竿於此東行三十里當有丘陵林樹狀若社廟有此者便以竿攪擾打拍之當得一物便急持歸旣得此物馬便活矣於是命左右驍勇之士五十人使去果如璞言得大藂林有一物似猴而非走岀人共逐得便抱持歸入門此物遥見死馬便跳梁欲徃璞令放之此物便自走徃馬頭間嘘吸其鼻良乆馬即起噴鼻奮迅鳴喚便不復見此物固厚資給璞得過江靈鬼志曰陳安爲河間王顒給使甚壯健常樂一馬駿駃非常後馬死雙赤蛇岀其鼻列異記曰胡司隷校尉上黨鮑子都少時舉上計於道遇一書生卒得心痛子都下車爲按摩奄忽不知姓字有素書一卷銀十餅即賣一餅以資殯殮其餘以枕之素書着腹上埋之謂曰子若魂靈有知當令子家知子在此末至京師有􅍡馬隨之唯子都得近子都歸行失道遇一關内侯家住宿侯問曰君何以致此馬子都因說之侯乃驚愕曰此吾兒也侯迎喪開棺視銀書如言侯乃舉送詣闕上薦子都辟公府侍御史䂊州牧司隷校尉至子永孫昱俱爲司隷其在公皆復乗􅍡馬故京師歌之曰鮑氏􅍡三入司隷再入公馬雖瘦行歩工傳玄乗輿馬賦曰徃日劉備之𥘉降也太祖賜之駿馬使自至廐選之歴名馬以百數莫可意者次至下厩有的顱馬委弃莫視瘦悴骨立劉備撫而取之衆莫不笑之馬超破蘇氏塢塢中有駿馬百餘疋自超巳下俱爭取肥好者而將軍龐恩獨取一騧馬形觀旣醜衆亦笑之其後劉備奔於荆州馬超戰於渭南逸足電發追不可逮衆乃服焉傳玄馳射馬賦曰耳小易使鼻大勢怒來徃若鷹鷂超騰如逸虎劉琬馬賦曰吾有駿馬名曰騏雄龍頭鳥目麟腹虎匈尾如雲彗耳如挿筒太平御覽卷第八百九十七
