front:
  text: 太平御覽卷第三百三
  hash: sha256:d47ab52ccaae773e03d880425865063d1042ee1bfcfb6cb91abe1bfe1724adb4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_303-1a}
body:
  text: 兵部三十四征伐上釋名曰伐豁也所向莫敢當前豁然破散也易曰髙宗伐鬼方三年克之書曰葛伯仇餉湯𥘉征自葛東征西夷怨南征北狄怨曰奚獨後予又曰惟十有一年武王伐殷一月戊午師渡孟津詩曰東山周公東征也我徂東山慆慆不歸昔我徃矣楊柳依依今我來思雨雪霏霏又曰六月宣王北伐也六月棲棲戎車旣飾四牡騤騤載是常服薄伐玁狁以奏膚功有嚴有翼共武之服又曰采芭宣王南征也蠢尓蠻荆大邦爲柔又曰赫赫南仲薄伐西戎又曰浩浩昊天不駿其德降䘮飢饉斬伐四國又曰篤生武王保祐命尓爕伐大啇􅝂和也又曰維師尚父時維鷹揚諒彼武王肆伐大啇㑹朝淸明肆疾也又曰文王有聲繼伐也武王能廣文王之聲卒其伐功也又曰撻彼殷武奮伐荆楚罙入其阻襃荆之旅傳云罙深也箋云有鍾鼓曰伐罙冒也殷道衰而楚人叛啇宗撻然奮楊威武出兵伐之也禮記曰呉侵陳斬祀殺厲祀神謂有屋樹者厲􅔂病師還岀境陳太宰嚭使於師夫差謂行人儀曰是夫也多善言盍甞問焉師必有名人之稱斯師者則謂之何大宰行人官名太宰嚭曰古之侵伐者不斬祀不殺厲不獲二毛獲猶係虜之人二毛髪鬢班白者今斯師也殺厲與其不謂之殺厲之師與欲微切之故其言似若不審也曰反尓地歸尓子則謂之何曰君王赦弊邑之罪又矜而赦與有無名者也又微之終其意也呉楚晉號稱王周禮曰大司馬之職以九伐之法正邦國馮弱犯寡則眚之賊賢害民則伐之暴内侵外則墠之野荒民散則削之負固不服則侵之賊殺其親則正之犯令侵政則杜之放殺其君則殘之外内亂鳥獸行則滅之大戴禮曰明主之所征必道之所廢者也彼廢道而不行然後誅其君改其政吊其民而不奪其財也故曰明主之征也猶時雨也至則民說左傳曰夏鄭人侵許凡師有鐘鼓曰伐無曰侵輕曰襲又曰呉子諸樊伐楚門于巢攻巢門也巢牛臣曰呉王勇而輕若啓之將親門啓開門也我獲射之必殪殪死是君也壃其少安呉子門焉牛臣隱於短墻以射之卒又曰晉師伐楚至於邲楚師出陣楚將孫叔敖曰進之寧我薄人無人薄我詩云元戎十乗以先啓行先人也元戎戎車在前軍言王者軍行必有戎車十乗在前開道先人爲備御之也軍志曰先人有奪人之心薄之也奪敵戰也遂疾進師車騎卒奔乗晉師荀林父不知所爲鼔於軍中曰先濟者有賞中軍下軍爭舟舟中之指可掬也兩手曰掬下軍禆將趙嬰齊使其徒先具舟于河故敗而先濟又曰晉伐齊齊侯駕將走郵棠郵棠齊邑郵羽求切太子與郭榮扣馬太子光也榮齊大夫曰師速而疾略也言欲行略其地無乆攻意將退矣君何懼焉且社稷之主輕則失衆君必待之將犯之太子抽劒斷鞅乃止於是晉師東侵至濰南及沂齊侯納太子諌故獲不敗也又曰鄭伯侵陳大獲徃歳鄭伯請成于陳成平陳不許五父諌曰親仁善鄰國之寳也君其許鄭陳公也陳侯曰宋衛實難可畏難也鄭何能爲遂不許君子曰善不可失惡不可長其陳桓公之謂乎長惡不悛從自及也雖欲救之其將能乎又曰齊君之無道也興師而伐逺方㑹之又曰君姑脩政而親兄弟之國庶免於難隋侯懼而脩政楚不敢伐又曰𥘉北戎病齊諸侯救之鄭公子忽有功焉齊人餼諸侯使魯次之以周班後鄭鄭人怒請師於齊齊人以衛師助之故不稱侵伐又曰呉伐郯郯成季文子曰中國不振旅蠻夷入伐而莫之或恤又曰晉侯復假道於虞以伐􅉑宫之竒諫曰􅉑虞之表􅉑亡虞必從之晉不可啓㓂不可翫一之爲甚其可再乎謂二年假晉道伐夏陽也諺所謂輔車相依脣亡齒寒者其虞􅉑之謂也輔頰輔車牙車也公不聽後遂爲晉所滅又曰晉侯使太子申生伐東山臯落氏衣之偏衣珮之金玦先友曰衣身之偏握兵之要又何患焉弧突曰尨凉冬殺今寒玦離胡可恃也里克曰師在制命而巳禀命則不威專命則不孝將焉用之也又齊侯伐楚楚使與師言曰君處北海寡人處南尓唯是風馬牛不相及也不虞君之渉吾地何故也管仲對曰昔召康公命我先君太公曰五侯九伯汝實征之賜我先君履東至于海西至于河南至于穆陵北至于無棣尓貢苞茅不入王祭不供寡人是徴昭王南征不復寡人是問對曰貢之不入敢不供給昭王不復君其問諸水濵又曰衛人以燕師伐鄭鄭祭足原繁泄駕以三軍軍其前曼伯與子元潜軍軍其後燕人畏鄭三軍而不虞制人君子曰不備不虞不可以師又曰十年公㑹鄭伯伐宋壬申公敗宋師于管庚午鄭師入郜辛未歸于我鄭伯後期而公獨敗宋師故鄭獨進兵以入郜入而不貪命魯取之推功上爵讓以自賛也君子謂鄭莊公曰於是乎可謂正矣以王命討不庭不貪其土以勞王爵又曰衛大旱寗莊子曰周飢克殷而年豐今邢方無道諸侯無伯伯長也天其或者欲使衛討邢乎從之師興而雨又曰公伐邾取湏句公卑邾不設備而禦之卑小也臧文仲曰國無小不可易也蜂蠆有毒而況國乎弗聽及邾戰于升陘我師敗績又曰楚子以諸侯伐呉使屈申圍朱方朱方呉邑齊慶封所封也屈申屈蕩之子也克之執慶封而盡滅其族慶封以襄二十八年奔吴也將戮慶封椒舉曰臣聞無瑕者可以戮人其肯從於戮乎言不肯默而從戮也王不聽負之斧鉞以徇於諸侯使言曰無或如齊慶封弑其君而弱其孤以盟其大夫齊崔杼弑其君慶封其黨也故以弑君罪責之慶封曰無或如楚㳟王之庶子圍弑其君兄之子麋而伐之以盟諸侯王使速弑之又曰四月鄭人侵衛收收衛邑也經書夏四月葬衛桓公今傳直言夏而更以四月附鄭人侵衛牧者於下事冝得月以明事之先後故不復備舉經文也以報東門之役東門役在四年又曰秋衛伐邢以報免囿之役邢不速退所以獨見伐也又曰夏趙盾救焦遂自隂地有諸侯之師侵鄭以報大棘之役又曰晉荀息請屈産之乗與垂棘之壁假道於虞以伐􅉑公曰是吾寳也對曰若得道於虞猶外府也公曰宫之竒在對曰宫之竒爲人懦不能強諌且少長於君君暱之雖諫將不聽乃使荀息假道於虞曰兾爲不道入自㒹軨伐鄍三門兾之旣病則亦唯君故今號爲不道保於逆旅侵弊邑之南鄙敢請假道以請罪於􅉑虞公許之又曰晉侯伐曹假道于衛曹在衛東故也衛人不許還自南河濟從汲郡南度岀衛南而東也侵曹伐衛公羊曰及鄭師伐宋丁未戰于宋戰不言伐何避嫌也又曰二月公侵宋曷爲或言侵或言伐觕音鹿者曰侵精者曰伐注云精猶精宻也推兵入境伐擊之益深用意稍精宻者也論語曰孔子曰天下有道則禮樂征伐自天子岀又曰季氏將伐顓臾冉有曰今夫顓臾固而近於費今不取後丗必爲子孫憂孔子曰求君子疾夫逺人不服而不能來也邦分崩離析而不能守也而謀動干戈於邦内吾恐季孫之憂不在顓臾而在蕭牆之内也韓詩外傳曰楚王欲伐晉告士大夫有諌者死叔敖曰臣園中有榆榆上有蟬蟬方奮翼悲鳴不知螗蜋在其後欲獲而食之螗蜋取蟬不知黄雀在其後又曰脩武屬河内本殷之寗邑武王伐紂勒兵於寗改曰脩武今懷州也家語曰孔子言於定公曰大夫家無藏甲邑無百雉之城髙丈長丈曰堵三堵曰雉古之制也今三家過制請皆損之乃使季氏宰仲由隳三都叔孫輙不得意於季氏因費宰公不狃率費人以襲攻之入及臺側子命申勾湏樂頎勒士衆下伐之費人北遂隳之強公室弱私家尊君卑臣政化大行又曰孔子曰明王之征猶時雨之降行地弥博得親弥衆是還師於祍席之上也國語曰呉伐越王勾踐請嫡女執箕箒嫡男奉盥􅓢以隨諸御􅓢沃盥噐也春秋貢獻不懈王府呉王曰吾將許越成申胥諌曰申胥楚臣伍胥不可許也大夫種勇以善謀將還玩呉國於股掌之上以得其志呉王不聽乃許盟將伐齊申胥諌曰越之在呉猶人有腹心之疾今非越是圖而齊魯爲憂夫齊魯譬諸疾疥癬也豈能渉江淮與我争此地哉王弗聽又曰謀甫諌曰不可先王之於民懋正其德而厚其性阜其財求利其噐用明利害之郷以文脩之使務利而避害懷德而畏威故能保丗以滋大昔我先王后稷以服事虞夏及夏之衰也弃稷不務我先王不窋用失其官而自竄于戎狄之間不敢怠業時序其德纂脩其緒脩其訓典朝夕恪勤守以惇篤奉以忠信奕丗載德不忝前人至於武王昭前人之光明而加之以慈和事神保民莫不欣喜商王帝辛大惡於民庶民不忍欣戴武王以致戎于商牧是先王非務武也勤恤民隱而除其害也夫先王之制國内甸服國外侯服侯衛賔服夷蠻要服戎翟荒服甸服者祭侯服者祀賔服者享要服者貢荒服者王日祭月祀時享歳貢終王先王之訓也有不祭則脩意有不祀則脩言有不享則脩文有不貢則脩名有不王則脩徳序成而又不至則脩刑於是乎有刑不祭伐不祀征不享讓不貢告不王於是乎有刑罰之辟有攻伐之兵有征討之備有威譲之令有文告之辭布令陳辭而又不至則又増脩其徳無勤民於逺矣是以近無不至逺無不服今自大畢伯士之終也犬戎氏以其職來王天子曰予必以不享征之且觀之兵其無乃廢先王之訓而王幾頓也吾聞夫犬戎樹惇率舊德而守終純固其有以禦我矣王遂征之得四白狼四白鹿以歸自是荒服者不至又曰文公即位二年欲用其民用用征伐子犯曰民未知義未知尊上之義盍納天子以示之義時天子之子帶之難在鄭地氾乃納襄王于周曰可矣乎對曰民未知信乃伐原謂信上令以五日之糧糧盡不降命去之曰可矣乎對曰民未知禮盍大蒐備師尚禮以示之蒐所以明尊卑順少長習威儀也乃大蒐于𬒳廬𬒳廬晉地作三軍使郄縠將中軍以爲大政大掌國政郄溱佐之溱晉大夫郄至之先子犯曰可矣可用也遂伐曹衛岀榖戍釋宋圍敗楚師于城濮於是乎遂伯穀齊地也戰國䇿曰趙且伐燕蘇代謂燕惠王曰今者臣來過易水見蜯方出曝而鷸啄其肉蜯合而拑其啄鷸曰今日不雨明日不雨即有蜯脯蜯亦曰今日不出明日不出必見死鷸兩者不能相捨而漁者併擒之今趙且伐燕不相支以弊大衆㠯恐強秦之爲漁父也願大王熟計之惠王曰善乃止又曰蘇秦謂秦惠王曰戰車萬乗奮擊百萬可以并諸侯呑天下稱帝而治願大王少留意臣請奉其郊王曰寡人聞毛羽不豐滿不可以髙飛文章不成者不可以誅罰道德不厚者不可以使民政教不順者不可以煩大臣秦曰臣固疑大王不能用也昔者神農伐捕逐黄帝伐涿鹿堯伐驩兠舜伐三苗禹伐共工湯伐有夏文王伐崇武王伐紂齊王戰而伯天下由此觀之罔有不戰者也夫五帝三王五伯明主賢君常欲坐而致之其勢不能故以戰續之寛則兩軍自攻迫則杖㦸相踵兵勝於外義強於内威在於上民伏於下今欲并天下陵萬乗黜敵國制海内㠯諸侯非兵不可太平御覽卷第三百三
