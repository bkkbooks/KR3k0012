  text: 太平御覽卷第二百三十九
  hash: sha256:fa7089cf73f33efc78e5450297ece4f45cd96cf3054711afe23a33924d2e8ffa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_239-1a}
body:
  text: 職官部三十七四征將軍征東將軍征西將軍征南將軍征北將軍四鎭將軍鎭東將軍鎭西將軍鎭南將軍鎭北將軍四安將軍安東將軍安西將軍安南將軍安北將軍四平將軍平東將軍平西將軍平南將軍平北將軍雜號將軍上鎭軍將軍撫軍將軍征虜將軍冠軍將軍輔國將軍領軍將軍護軍將軍中軍將軍游擊將軍積射將軍積弩將軍強弩將軍殿中將軍貟外將軍直閣將軍征東將軍魏志曰張遼字文逺爲征東將軍征孫權𬒳甲戰先䧟陣衝壘入至權麾下又曰满寵字伯寜爲征東將軍詔曰君典兵在外專心憂公賜田十頃糓五百斛錢二十萬以明清忠儉約之節晉書王渾平呉轉征東大將軍復鎮夀陽渾不尚刑名處㫁明允時呉人新附頗懷畏懼渾撫循羇旅虚懷綏納座無空席門不停賔於是江東之士莫不恱附征西將軍東觀漢記曰馮異爲征西將軍入關征赤眉又曰耿秉爲征西將軍領撫單于及薨南單于舉國發䘮犁面流血魏志曰夏侯淵字妙才爲征西將軍守漢中後魏書曰陸眞代人也少善騎射數從征伐所在摧鋒䧟陣前後以功爲征西將軍征南將軍魏志曰夏侯尚字仁伯淵從子也文帝與之親友太祖定兾州尚爲軍司馬常從征討遷征南將軍又曰曹仁爲征南將軍􅋣陵侯彰北征烏丸文帝在東宫爲書戒彰曰爲將奉法不當如征南耶晉書曰羊祐爲征南將軍寢疾求入朝旣至洛陽㑹景獻梓宫在殯哀慟至篤中詔申諭扶疾引見命乗輦入殿無下拜甚見優禮後魏書曰司馬景之字洪略晉汝南王亮之後太宗時歸封蒼梧公加征南大將軍征北將軍魏志曰杜恕爲幽州刺吏時征北將軍程嘉屯薊尚書袁偘等戒恕曰程申伯今俱杖節共屯一城冝深有以禮之沈約宋書曰衡陽王義季爲征北將軍徐州刺史鎭東將軍魏志曰臧霸字宣髙太山華隂人也亡命東海以壯勇聞太祖募索得霸見而恱之以爲琅瑘相文帝即位遷鎭東將軍鎭西將軍魏志曰曹眞字子丹文帝即位以眞爲鎭西將軍蜀志曰馬超父騰靈帝末與邊章韓遂等俱起居事於西州初平三年遂騰率衆詣長安漢朝以遂爲鎭西將軍遣還金城騰爲征西將軍屯郿鄔鎭南將軍蜀志曰黃權字公衡伐呉敗於白帝旣附魏文帝曰君捨逆順欲追蹤陳韓耶權曰臣降呉不可歸蜀無路是以歸命敗軍之將免死焉幸何古人之可纂帝善之拜鎭南將軍呉志曰吕岱旣定交州進討九眞斬獲萬數又遣從事南宣國化及徼外扶南林邑堂明諸王各遣使奉貢權嘉其功進拜鎭南將軍晉書曰杜預爲鎭南將軍繕兵甲曜威武乃簡精銳襲呉西陵督張政大破之以功増封三百六十五户政呉之名將也據要害之地耻以無備取敗不以所喪之實告于孫皓預欲間呉邊將乃表還所獲之衆於皓皓果召政遣武昌監劉憲代之故大軍臨至使其將帥移易以成傾蕩之勢預處分旣定乃啓請伐呉之期後魏書曰唐和詣闕丗祖優之待以上客髙宗以和歸誠先朝拜鎭南將軍鎭北將軍魏氏春秋曰許元字士宗爲鎭北將軍都督河北諸軍事蜀志魏延字文長先主大㑹群臣問延曰今委卿以重任卿居之欲云何延對曰若曹操舉天下而來請爲大王距之偏將十萬之衆至請爲大王呑之先主稱善衆咸壯其言先主踐尊號進拜鎭北將軍晉書曰何曽爲鎭北將軍文帝使武帝齊王攸送之帝又過其子曽先勑劭曰客必過汝汝當預嚴劭不冠帶停帝良乆曽深以爲譴劭曽見崇重如此安東將軍王隱晉書曰武帝伐呉以王渾爲安東將軍晉公卿禮秩曰世祖以扶風王駿爲安東大將軍安西將軍魏志曰曹仁字子孝太祖從弟也少好弓馬弋獵俊豪並起仁亦隂結少年周遊淮泗之間遂從太祖爲别部司馬太祖討馬超以仁行安西將軍安南將軍謝承後漢書曰光武以岑彭爲安南將軍安北將軍沈約宋書曰劉秀之東莞莒人少孤貧有志操爲安北將軍雍州刺史上車馬幸新亭視秀之發引平東將軍王隱晉書曰武帝伐呉以王濬爲平東將軍平西將軍蜀志曰馬超聞先主圍劉璋於成都宻書請降先主遣人迎超超將兵徑到城下城中震怖璋即稽首以超爲平西將軍沈約宋書曰臨川王義慶爲平西將軍平南將軍王隱晉書曰武帝伐呉以胡奮爲平南將軍平北將軍魏志曰太祖征兾州張燕求佐軍拜平北將軍雜號將軍上鎭軍將軍魏志曰黄𥘉七年魏文以陳群爲鎭軍大將軍録尚書事受顧命又曰甘露元年以石苞爲鎭軍將軍沈約宋書曰齊王攸爲鎭軍驃騎上後復舊撫軍將軍魏志曰黃𥘉四年以司馬宣王爲撫軍大將軍輔政又曰齊王嘉平三年以司馬景王爲撫軍大將軍輔政語林曰簡文爲撫軍時坐牀上生塵不聽左右拂去見䑕行跡視以爲嘉有叅軍見䑕以手板格煞之撫軍謂曰無乃不可乎征虜將軍東觀漢記曰祭遵爲征虜將軍廉㓗奉公光武歎曰安得憂國奉公如祭征虜者乎魏志曰太祖以臨淄侯植爲征虜將軍遣救曹仁呼有所勑而植醉於是罷之又曰南陽周太好立功善用兵以爲征虜將軍沈約宋書曰征虜將軍世號金紫將軍冠軍將軍史記曰楚義帝以宋義卿子冠軍漢書曰武帝以霍去病征匈奴功冠三軍封冠軍侯魏志曰正始中以文欽爲冠軍將軍楊州刺史晉起居注曰武帝泰始七年詔曰議郎胡奮開爽忠亮有文武才幹歴位外内渉練戎事威略之聲著于方外其以奮爲冠軍將軍齊書曰劉悛嘗從駕登蔣山上數歎曰貧賤之交不可忘糟糠之妻不下堂顧謂悛曰此况卿也世言冨貴好改其素情吾雖有四海今日與卿盡布衣之適悛起拜謝遷冠軍將軍晉書載記曰符堅㓂晉以姚萇爲龍驤將軍督益梁州諸軍事謂萇曰朕夲以龍驤建業龍驤之號未曽假人今特以相授山南之事一以委卿堅左將竇衝進曰王者無戯言此將不祥之徴也惟陛下察之堅黙然車頻秦書曰符堅與符徤西入關堅時年十二未有軍號徤夢有天神遣使者朱衣武冠拜堅爲龍驤將軍後加此官以應神夢羊祐別傳曰先時呉童謡云阿童復阿童衘刀浮渡江不畏岸上虎但畏水中龍祜聞之曰此必水軍有功即表王濬爲龍驤將軍謀伐呉輔國將軍晉書王導爲輔國將軍導上牋曰昔魏武逹政之主也荀文若功臣之最也封不過亭侯倉舒愛子之寵贈不過别部司馬以此格萬物得不局跡乎今者臨郡不問賢愚豪賤皆加重號輙有鼔盖時有不得者或爲恥辱天官混雜朝望頺毀導忝荷重任不能崇浚山海而開創亂源饕竊名位取紊彛典謹送鼔盖加崇之物請從導始庶令雅俗區别群望無惑王隱晉書曰王濬爲輔國將軍又曰羊琇以輔國將軍開府儀同領軍將軍魏志曰文帝即位拜曹休爲領軍將軍晉書曰紀瞻轉領軍將軍當時服其嚴毅雖恒疾病六軍敬憚之瞻以乆病請去官不聽復加散騎常侍及王敦之逆帝使謂瞻曰卿雖病但爲朕卧護六軍所益多矣晉陽秋曰韓康伯年四十九拜領軍疾病占候者云不冝此官固請徙之何法盛晉中興書曰陶囬拜領軍將軍加散騎常侍性方範不畏強禦丹陽尹桓景頗以佞事司徒王導導甚眤之囬常慷慨謂景非正人不冝親狎㑹熒惑守南斗經旬王公語囬曰南斗楊州分而熒惑守之吾當遜位以厭此讁囬荅曰公以明德作鎭輔弼聖主當親忠貞逺邪佞與桓景造膝熒惑何由退舎導深愧之梁書曰胡曽祐拜領軍將軍厚自封植以所加鼔吹恒置齋中對之自娯人曰此是羽儀公名望隆重不冝若此荅曰我性愛之恒湏見耳或出遊亦以自隨人士笑之唐書曰貞元十一年以前太子賔客李愿爲左領軍大將軍李慿爲右威衛大將軍依前兼中丞皆太尉晟之子以免䘮故晟諸子同日授官者凢九人護軍將軍王隱晉書曰王敦將復作逆明帝問曰何如應詹厲然慷慨荅詔曰陛下冝奮赫斯之威臣等當負戈從戎以順討逆誠社稷之計也即以詹爲護軍將軍同心滅敦中軍將軍漢書曰馮奉世字子明元帝以爲中軍屯首陽魏志曰曹真持節都督中外諸軍事中軍將軍受顧命王隱晉書曰太始元年以羊祐爲中軍將軍惣宿衛游擊將軍史記曰漢髙祖以陳狶爲游擊將軍漢書曰太祖太𥘉元年以蘇建韓說爲游擊將軍袁宏漢紀曰建武二年以鄧隆爲游擊將軍助朱浮攻彭寵魏志曰卞闌少有才學爲游擊將軍加散騎常侍山濤啓事曰游擊將軍諸葛冲精果有文武擬𥙷兖州詔荅曰冲領兵未欲出之積射將軍後周書曰于謹除積射將軍又隨廣陽王元深征鮮于脩禮停軍中山侍中元晏言於靈太后曰廣陽王以宗室之重受律專征今乃盤桓不進坐圖非望又有于謹者智略過人爲其謀主風塵之隟恐非陛下純臣矣靈太后詔於尚書省門外立牓募能獲謹者許重賞謹聞之乃謂廣陽王曰今女主臨朝取信讒佞脫不明白殿下素心便恐禍至謹請束身詣闕歸罪有司披露心腹深遂許之謹遂到牓下曰吾知此人衆共詰之謹曰我即是也有司以聞靈后引見之大怒謹備述廣陽忠欵兼陳停軍之狀靈后意解捨之世語曰積射將軍樊震對武帝稱鄧艾之忠積弩將軍沈約宋書曰積弩將軍晉官也齊職儀曰積弩將軍品第四銀章青綬武冠絳朝服佩水蒼玉晉太康十年立積弩積射營各二千五百人並以將軍領之強弩將軍漢書曰元狩元年以李沮爲強弩將軍伐匈奴又曰太初二年以路博德爲強弩將軍又曰神雀二年以許延夀爲強弩將軍遷大司馬傳暢晉讃曰晉文王晉臺置強弩將軍掌宿衛殿中將軍玄中記曰漢桓帝時出遊河上忽有一青牛從河中出直走盪桓帝邊人皆走太尉何公爲殿中將軍有勇力輙走逆之牛見公徃乃反走還河未至河公及牛乃以手拔牛左足脫以右手持斧斫牛頭殺之此青牛者是萬年木精也語林曰庾公欲伐王公先書與郄公曰老賤賊轉欲輈張殿中將軍舊用才學士以廣視聽而頃悉内面牆人是欲蔽主之明便欲勒數州之衆以除君側之惡今年之舉篾不濟矣貟外將軍後魏官氏志曰貟外將軍從第八品直閣將軍後魏書曰楊曄字延季弘農華隂人也性雅厚頗有文學起家奉朝請稍遷直閣將軍蕭子顯齊書曰王敬則晉陵南沙人也生而紫胞年長而腋下生乳各長數寸夢騎五色師子明帝即位爲直閤將軍齊書曰劉善明爲直閣將軍五年青州没虜善明母䧟北虜移置桒乾善明布衣𬞞食哀慼如持䘮明帝每見爲之歎息時人稱之太平御覽卷第二百三十九
