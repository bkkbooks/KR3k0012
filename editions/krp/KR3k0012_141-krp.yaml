body:
  text: 皇親部七唐髙祖竇皇后太宗長孫皇后除妃附髙宗廢王皇后中宗趙皇后廢韋皇后上官昭容睿宗劉皇后竇皇后玄宗廢王皇后武皇后楊貴妃楊皇后肅宗張皇后呉皇后代宗沈皇后獨孤皇后德宗王皇后韋賢妃順宗王皇后憲宗郭皇后女學士宋尚宫附穆宗王太后穆宗蕭皇后敬宗郭貴妃昭宗何皇后髙祖竇皇后唐書髙祖太穆皇后竇氏京兆始平人隋定州揔管神武公毅之女也后母周武帝姊襄陽長公主后生而髮垂過頸三歲與身齊周武帝特愛重之養於宫中時武帝納突厥女爲后無寵后尚㓜竊言於帝曰四邊未靜突厥尚強願舅抑情撫慰以蒼生爲念但得突厥之助則江南關東不能爲患矣武帝深納之毅聞之謂長公主曰此女才貌如此不可妄以許人當爲求賢夫乃於門屏畫二孔雀諸公子有求婚者輙與兩箭射之濳約中目者許之前後數十軰莫能中髙祖後至兩發各中一目毅大恱遂歸于我及周武帝崩后追思如䘮所生隋文帝受禪后聞而流涕自投於床曰恨我不爲男以救舅氏之難毅與長公主遽掩口曰汝勿妄言滅吾族矣后事元貞太后以孝聞太后素有羸疾時或危篤諸姒以太后性嚴懼譴皆稱疾而退唯后晝夜扶侍不脫衣履者動淹旬月焉善書學類髙祖之書人莫能辨工篇章而好存規誡大業中髙祖爲扶風太守有駿馬數疋常言於髙祖曰上好鷹愛馬公之所知此堪進御不可乆留人或言者必爲身累願熟思之髙祖未決竟以此獲譴未㡬后崩於涿郡時年四十五髙祖追思后言方爲自安之計數求鷹犬以進之俄而擢拜將軍因流涕謂諸子曰我早從汝母之言居此官乆矣初葬壽安陵後祔葬獻陵上元元年八月改上尊號曰太穆順聖皇后太宗長孫皇后唐書曰太宗文德順聖皇后長孫氏長安人隋右驍衛將軍晟之女也后少好讀書造次必循禮則年十三嬪于太宗武德元年冊爲秦王妃九年冊拜皇太子妃太宗即位立爲皇后后性尤儉約凡所服御取給而巳太宗彌加禮待十年六月巳夘崩于立政殿時年三十六葬於昭陵后甞撰古婦人善事勸戒十卷名曰女則自爲之序又著論駮漢明德馬皇后以爲不能抑退外戚令其當朝貴盛乃戒其龍馬水車此乃開其禍源而防其末事耳且誡主守者曰此吾以自防閑耳婦人著述無條貫不欲至尊見之愼勿言崩後宫司以聞太宗覽而増慟以示近臣曰皇后此書足可垂於後代我豈不逹天命而不能割情乎以其毎能規諌𥙷朕之闕今不復聞善言是内失一良佐以此益令人哀耳上元元年改上尊號曰文德順聖皇后徐妃附唐書曰太宗賢妃徐氏名惠右散騎常侍堅之姑也生五月而能言四歳誦論語毛詩八歳好屬文其父孝德試擬楚辭云山中不可以乆留詞甚典羙自此遍渉經史手不釋卷太宗聞之納爲才人其所屬文揮翰立成詞華綺贍儀拜婕妤再遷充容時軍旅凾動宫室互興百姓頗倦勞役上䟽諌之太宗善其言優賜甚厚及太宗崩追思顧遇之恩哀慕愈甚發疾不自醫病甚謂所親曰吾荷顧實深志在早殁魂其有靈得侍園寢吾之志也因爲七言詩及連珠以見其志永徽元年卒時年二十四詔贈賢妃陪葬於昭陵之石室髙宗廢王皇后唐書曰髙宗廢后王氏并州祁人也父仁祐同安長公主即后之從祖母也公主以后有美色言於太宗遂納爲晉王妃髙宗登儲冊爲皇太子妃永徽初立爲皇后初武皇后貞觀末隨太宗嬪御居於感業寺后及左右數爲之言髙宗由是復召入宫立爲昭儀俄而漸承恩寵遂與后及良娣蕭氏遞相譛毀帝終不納后言而武昭儀寵遇日厚后懼不自安密與母栁氏求巫祝厭勝事發帝大怒斷栁氏不許入宫將廢后長孫無忌禇遂良等固諌乃止俄又納李義府之䇿永徽六年廢后及蕭良娣皆爲庶人囚之别院武昭儀令人皆縊殺之中宗趙皇后唐書曰中宗和思皇后趙氏京兆長安人父瓌尚髙祖女常樂公主中宗爲英王時納后爲妃旣而妃母公主得罪妃亦坐廢幽死於内侍省則天臨朝瓌爲壽州刺史坐與越王貞連謀𬒳誅公主亦坐死神龍元年贈后謚爲恭皇后及中宗崩將葬于定陵追謚后爲和思莫知瘞所以皇后禕衣於陵所寢宫招魂置衣於魂轝以太牢告祭遷衣於寢宫舒於御榻之右覆以夷衾而祔葬焉中宗廢韋皇后唐書曰中宗韋庶人京兆萬年人也中宗爲太子時納后爲妃仍擢后父玄貞爲豫州刺史嗣聖元年立爲皇后其年中宗見廢后隨從房州時中宗懼不自安毎聞制使至惶恐欲自殺后勸王曰禍福倚伏何常之有豈失一死何遽如是也累年同艱危情義甚篤所生懿德太子永㤗永壽長寧安樂四公主安樂最㓜生於房州帝自脫衣裹之遂名曰裹兒特寵異焉及中宗復立爲太子又立后爲妃中興初復立爲皇后帝在房州時常謂后曰一朝見天日誓不相禁忌及得志乃受上官昭容邪說引武三思入宫中升御牀與后雙陸帝爲點籌以爲歡笑醜聲日聞于外景龍四年六月帝遇毒暴崩后懼秘不發喪及臨淄王勒兵入内后惶駭遁入殿前飛騎營及武延秀安樂公主皆爲亂兵所殺追貶爲庶人上官昭容唐書曰中宗上官昭容名婉兒西臺侍郎儀之孫也父庭芝與儀同𬒳誅婉兒時在襁褓隨配入掖庭及長有文詞明習吏事則天時婉兒忤旨當誅則天惜其才不殺但黥其靣而已自聖曆巳後百司表奏多令叅決中宗即位又令專掌制命深𬒳信任㝷拜爲昭容婉兒旣與武三思淫亂毎下制勑多因事推尊武氏而排抑皇家節愍太子深惡之及舉兵至肅章門扣閤索婉兒婉兒大言曰觀其此意即當次索皇后以及大家帝與后遂激怒并將婉兒登玄武門樓以避兵鋒俄而事定婉兒常勸帝廣置昭文學士盛引當朝詞學之臣數賜遊宴賦詩唱和婉兒每代帝及后長寧安樂二公主數首並作辭甚綺麗時人咸諷誦之婉兒俄又通於吏部侍郎崔湜引知政事湜嘗充使開啇山新路功未半而中宗崩婉兒草遺制曲叙其功而加襃賞及韋庶人敗婉兒亦斬於旗下睿宗劉皇后唐書曰睿宗肅明順聖皇后劉氏父延景陜州刺史儀鳯中睿宗居藩納后爲孺人㝷立爲妃生寧王憲壽昌代國二公主睿宗即位冊爲皇后及降爲皇嗣后從降爲妃長壽中與昭成皇后同𬒳譴爲則天所殺景雲元年追謚肅明皇后招魂葬於東都城南陵曰惠陵睿宗竇皇后唐書曰睿宗昭成順聖皇后竇氏父孝諶潤州刺史后姿容婉順動循禮則睿宗爲相王時爲孺人甚見禮異光宅元年立爲德妃生玄宗及金仙玉真二公主長壽二年爲户婢團兒誣讚與肅明皇后厭蠱呪詛正月二日朝則天皇后於嘉豫殿旣退而同時遇害梓宫秘宻莫知所在睿宗即位謚曰昭成皇后招魂葬於都城之南陵曰靖陵玄宗廢王皇后唐書曰玄宗廢后王氏同州下邳人梁兾州刺史神念之後上爲臨淄王時納后爲妃上將起事頗預宻謀賛成大業先天元年立爲皇后以父仁皎爲太僕卿后兄守一以后無子嘗懼有廢立導以符厭之事有左道僧明悟爲祭南北斗刻霹靂木書天地字及上諱合而佩之且呪曰佩此有子當與則天皇后爲此事發上親究之皆驗下制廢爲庶人守一賜死其年十月庶人卒以一品禮葬於無相寺寳應元年雪冤復尊爲皇后玄宗武皇后唐書曰玄宗貞順皇后武氏則天從父兄子恒安王攸正女也攸正卒後后尚㓜隨例入宫上即位漸承恩寵及王庶人廢後特賜號爲惠妃宫中禮秩一同皇后惠妃開元初産夏悼王及懷安哀王上仙公主並襁褓不育上特垂傷悼及生壽王瑁不敢養於宫中命寧王憲於外養之又生盛王琦咸冝太華二公主惠妃以開元二十五年薨年四十餘楊貴妃唐書曰玄宗楊貴妃父玄琰蜀州司户妃早孤養於叔父玄璬開元初武惠妃特承寵遇故王皇后廢黜二十四年惠妃薨帝哀悼乆之後庭數千無可意者或奏玄琰女姿色冠代冝蒙召見時妃衣道士服號曰太眞旣進見玄宗大恱不朞歳恩禮如惠妃太眞姿質豐艷善歌舞通音律智筭過人每倩盻承迎動移上意宫中呼爲娘子禮數實同皇后有姊三人皆有才貌玄宗並封國夫人天寳中安禄山大立邊功上深寵之禄山來朝帝令貴妃姊妹與禄山結爲兄弟禄山母事妃每宴賜錫賚稠沓及禄山叛露檄數國忠之罪河北盗起玄宗以皇太子爲天下兵馬元帥監撫軍國事國忠大懼諸楊聚哭貴妃衘土陳請帝遂不行内禪及潼關失守從幸至馬嵬禁軍大將陳玄禮宻啓太子誅國忠父子旣而六軍不散玄宗遣力士宣問對曰賊夲尚在盖指貴妃也力士復奏帝不獲巳與妃決遂縊死於佛室時年三十八瘞於驛西道側玄宗楊皇后唐書曰玄宗元獻皇后楊氏弘農華隂人后景雲元年八月選入太子宫時太平公主用事尤忌東宫宫中左右持兩端而濳附太平者必隂伺察事雖纎芥皆聞於上太子心不自安后時方娠太子宻謂侍讀張說曰用事者不欲吾多息裔恐禍及此婦人其如之何密令說懷去胎藥而入太子於曲室躬自煑藥醺然似寐夢神人覆鼎旣寤如夢如是者三太子異之告說說曰天命也無冝他慮旣而太平誅后果生肅宗皇帝太子妃王氏無子后班在下后不敢母肅宗王妃撫鞠慈甚所生開元中肅宗爲忠王后爲妃又生寧親公主張說以舊恩特承寵異說亦竒忠王儀表心知運曆所鍾故寧親公主降說子垍開元十七年后薨葬細栁原肅宗張皇后唐書曰肅宗張皇后本南陽西鄂人後徙家昭應祖母竇氏玄宗母昭成皇太后之妹也昭成爲天后所殺玄宗㓜失所恃爲竇姨鞠養景雲中封鄧國夫人父去逸天寳中選入太子宫爲良娣后辯惠豐碩巧中上旨禄山之亂玄宗幸蜀太子與良娣俱從車駕渡渭百姓遮道請留太子收復長安肅宗姓仁孝以上皇播越不欲違離左右宦者李靖忠啓太子請留良娣賛成之白於玄宗太子如靈武時賊巳䧟京師從官單寡道路多虞毎太子次舎宿止良娣必居其前太子曰捍禦非婦人之事何以居前良娣曰今大家跋履險難兵衛非多恐有倉卒妾自當之大家可由後而出庶幾無患及至靈武産子三日起縫戰士衣太子勞之曰産忌作勞安可容易后曰此非妾自養之時須辦大家事肅宗即位冊爲淑妃贈父去逸左僕射母竇氏封義章縣主乾元元年冊爲皇后肅宗崩太子監國遂移后於別殿幽宫崩肅宗呉皇后唐書曰肅宗章敬皇后呉氏濮陽人后父坐事没入掖庭開元二十二年玄宗幸忠王邸見王服御蕭然傍無媵侍命將軍髙力士選掖庭宫人賜之而呉后在籍中容止端麗性多謙抑寵遇益隆明年生代宗皇帝二十八年薨葬於春明門外代宗即位羣臣以肅宗山陵有期准禮以先太后祔代宗沈皇后唐書曰代宗睿眞皇后沈氏呉興人丗爲冠族父易直秘書監開元末以良家子選入東宫賜太子生男廣平王天寳元年生德宗皇帝禄山之亂玄宗幸蜀諸王妃主從幸不及者多䧟於賊后𬒳拘於東都掖庭及代宗破賊收東都見之留后於宫中方經略北征未暇迎歸長安俄而史思明再䧟河洛及朝義敗復收東都失后所在莫測存亡代宗遣使永訪十餘年寂無所聞德宗即位下詔遥尊爲皇太后代宗獨孤皇后唐書曰代宗貞懿皇后獨孤氏父頴左威衛録事叅軍后以羙麗入宫嬖幸專房故長秋虚位諸姬罕所進御后始冊爲貴妃生韓王迥華陽公主大曆十年五月薨追謚曰貞懿皇后殯於内殿累年不忍出宫十三年十月方葬命宰臣常衮爲哀冊德宗王皇后唐書曰德宗昭德皇后王氏父遇官至秘書監德宗爲魯王時納后爲嬪上元二年生順宗皇帝特承寵異德宗即位冊爲淑妃貞元二年妃病十一月甲午冊爲皇后是日崩於兩儀殿韋賢妃唐書曰德宗韋賢妃不知氏族所出初爲良娣貞元二年冊爲賢妃性敏惠言無苟容動必由禮德宗深重之六宫師其德行及德宗崩請於崇陵終喪紀因侍於寢園元和四年薨順宗王皇后唐書曰順宗莊憲皇后王氏瑯瑘人父顔衛尉卿后㓜以良家子選入宫爲才人順宗在藩時代宗以才人賜之時年十三大曆十三年生憲宗皇帝立爲宣王孺人順宗升儲冊爲良娣后言容恭謹宫中稱其德行順宗即位疾恙未平后供侍毉藥不離左右屬帝不能言冊禮將行復止及永貞内禪冊爲太上皇后中和元年正月順宗晏駕五月尊太上皇后爲皇太后冊禮畢憲宗御紫宸宣赦太后居興慶宫后性仁和㳟遜深抑外戚無絲毫假貸訓厲内職有母儀之風焉元和十一年三月崩於咸寧殿謚曰莊憲憲宗郭皇后唐書曰憲宗懿安皇后郭氏尚父子儀之孫駙馬都尉曖之女母代宗長女昇平公主憲宗爲廣陵王時納后爲妃以母貴父祖有大勲於王室順宗深寵異之貞元十一年生穆宗皇帝元和元年冊爲貴妃時帝後庭多私愛以后門族華盛慮正位之後不容嬖幸以是冊拜後時穆宗嗣位冊爲皇太后敬宗即位尊爲太皇太后宣宗繼統即后之諸子也恩禮愈異於前朝大中年崩於興慶宫謚曰懿安祔葬於景陵后歷位七朝五居太母之尊人君行子孫之禮福壽隆貴四十餘年雖漢之馬鄧無以加焉女學士宋尚宫附唐書曰女學士尚宫宋氏者名若昭貝州清陽人父庭芬丗爲儒學至庭芬有詞藻生五女皆聦惠庭芬始敎以經藝旣而課爲詩賦年未及笄皆能屬文長曰若華次曰若昭若倫若憲若荀若華若昭文尤淡麗性復貞素閑雅不尚芳華之飾嘗白父母誓不從人願以藝學揚名顯親若華教誨四妹有如嚴師著女論語十篇其言摸倣論語以韋逞母宣文君宋氏代仲尼以曹大家等代顔閔其間問荅悉以婦道所尚若昭注解皆有理致貞元四年昭義節度使李抱眞表薦以聞德宗俱召入宫試以詩賦兼問經史中大義深加賞歎德宗能詩與侍臣唱和相屬亦令若華姊妹應制每進御無不稱善嘉其節槩不羣不以宫妾遇之呼爲學士先生庭芬起家受饒州司馬習藝館内教賜第一區給俸料元和末若華卒贈河内郡君自貞元七年巳後宫中記注簿籍若華掌其事穆宗復令若昭代司其職拜尚宫姊妹中若昭尤通暁人事自憲穆敬三帝皆呼爲先生六宫嬪媛諸王公主駙馬皆師之爲之致敬進封梁國夫人寳曆初卒將葬詔所司供鹵簿敬宗復令若憲代司宫籍文宗好文以若憲善屬文能論議奏對尤重之大和中坐駙馬沈􅔲事幽若憲於外第賜死穆宗王太后唐書曰穆宗㳟僖皇太后王氏越人父紹卿婺州金華令后少入太子宫元和四年生敬宗穆宗皇帝即位立爲妃長慶四年二月尊爲皇太后文宗即位之初號寳曆太后穆宗蕭皇后唐書曰穆宗貞獻皇后蕭氏福建人𥘉入十六宅爲建安王侍者元和四年生文宗皇帝寳曆三年敬宗崩中尉王守澄率兵討賊迎江王即位文宗踐祚之月奉冊上尊號曰皇太后武宗即位供養彌謹徙居積慶殿號積慶太后㑹昌中崩謚曰貞獻敬宗郭貴妃唐書曰敬宗郭貴妃父義右威衛將軍長慶末以姿貌選入太子宫敬宗即位爲才人生晉王普帝以少年有子復以才人容德冠絶特寵異之俄冊爲貴妃及昭愍遇盗宫闈變起文宗即位尤憐晉王有若巳子故貴妃禮遇不衰昭宗何皇后唐書曰昭宗積善皇后何氏東蜀人侍壽王邸婉麗多智特承恩顧生德王輝王昭宗即位立爲淑妃乾寧中車駕在華州冊爲皇后自乾符巳後盗滿天下妖生九重宫廟榛蕪奔播不暇景福之際姧臣內侮后於蒙塵薄狩之中嘗膳禦侮不離左右天祐初朱全忠逼遷輿駕東幸洛陽其年八月昭宗遇弑翌日宰相栁璨獨孤損等詐宣皇后令云帝爲宫人所害輝王祚冝昇帝位仍尊后爲皇太后遭罹變故迫以兇威宫中哭泣不敢聲聞于外明年十二月全忠將僭位先行九錫然後受禪全忠牙將蔣玄暉在洛陽宫知樞密宣徽副使趙殷衡素與不叶且欲代知樞密事因使于梁誣吿云玄暉私於何太后相與盟詛誓復唐室不欲王受九錫全忠大怒即日遣使至洛陽誅玄暉大后亦𬒳害於積善宫又殺宫人阿秋阿䖍仍廢太后爲庶人太平御覽卷第一百四十一
