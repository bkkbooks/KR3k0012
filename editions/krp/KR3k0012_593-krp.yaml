front:
  text: 太平御覽卷第五百九十三
  hash: sha256:4ceeb88bfa10a91a2ac85e7dfa66944a36007988f2af98a0d9e59769e8ce4392
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_593-1a}
body:
  text: 文部九詔䇿誥教誡詔釋名曰詔照也人闇不見事則有所犯以此照示使照然知所由也蔡邕獨斷曰制詔制者王者之言必爲法制也詔猶告也告教也三代無其文秦漢有也文心雕龍曰皇帝馭寓其言也神淵嘿負扆而響盈四表其唯詔䇿乎昔軒轅唐虞同稱爲命命之爲義制性之本也其在三王事兼誥誓誓以訓誡誥以敷政降及七國並稱曰命命者使也秦并天下改命曰制漢𥘉定儀則有四品一曰䇿書二曰制書三曰詔書四曰戒勑勑戒州郡詔告百官制施赦令䇿封王侯䇿者簡也制者裁也詔者告也勑者正也觀文景以前詔體浮雜武帝崇儒選言弘奥䇿封三王文同典訓勸戒淵雅垂範後代及光武撥亂留意詞采而造次喜怒時或偏濫曁明章崇學雅詔間出和安政㢮禮閣鮮才每爲詔敕假手外請建安之末文理代興潘朂九錫典雅逸群衛覬禪誥符采炳耀不可加也自魏晉䇿誥職在中書劉放張華管于斯任施令發號洋洋盈耳魏文以下詞義多偉至於作威作福其萬慮之一弊乎晉氏中興唯明帝崇才以温嶠文清故引入中書自斯巳後體憲風流矣夫王言崇祕大觀在上所以百辟其刑萬邦作孚故授官選賢則義炳重離之暉優文封䇿則氣含雲雨之潤勑戒恒誥則筆吐星漢之華啓戎變伐則聲存洊雷之威青災肆赦則文有春露之滋明詔勑法則詞有秋霜之烈此詔䇿之大畧也漢制度曰帝之下書有四一曰䇿書二曰制書三曰詔書四曰誡勑䇿書者編簡也其制書二尺短者半之篆書起年月稱皇帝以命諸侯王三公以罪免亦賜䇿而以隷書用尺一木兩行惟此爲異也制書者帝者制度之命其文曰制詔三公皆璽封尚書令即重封露布州郡者詔書也其文曰告某官云如故事誡勑者謂勑其官他皆類此漢書曰誡勑刺史太守及三邊營官𬒳勑文曰有詔勑某官是爲誡勑世皆名此爲䇿書失之甚也又曰淮南王安傳曰武帝方好藝文以安屬於諸父辨愽善爲文辭甚尊重之每爲報書及賜師古曰書賜之也常召司馬相如等視草迺遣東觀漢記曰第五倫毎見光武詔書常歎曰此聖主也當何由一得見快矣等軰笑之曰汝三皇時人也說將尚不能動萬乗主耶倫曰未遇知巳道不可故耳范曄後漢書曰隗囂賔客掾史多文才士每所有事當世才士大夫皆諷誦之故帝有所荅尤加意焉魏志曰明帝疾欲以燕王字爲大將軍帝引見劉放孫資入卧内問之放資對曰燕實自不堪大任帝曰曹爽可代宇不放資因賛成之又深陳冝速召太尉司馬宣王以網維帝室納其言即以黃𥿄授放作詔放資旣岀帝意復變詔止宣王又曰蔣濟上萬機論帝嘉之入爲散騎常侍時有詔詔征南將軍夏侯尚曰卿腹心重將當使恩施足死惠愛可懷作威作福殺人活人尚以示濟濟旣至帝問曰卿所聞見天下風教何如濟對曰未有它善但見亡國之語耳帝忿然作色而問其故濟具以荅因夫作威作福書之明戒天子無戯古人所愼唯察之於是帝意解追取前詔王隱晉書曰武帝泰始四年班五條詔書于郡國一曰正身二曰勤民三曰撫孤寡四曰敦本息華五曰去人事又曰楚王瑋旣誅汝南王亮㝷又詔云瑋矯詔行斬刑臨死出其懷中青𥿄以示監刑尚書劉頌流涕而言此詔書也受此而行謂爲社稷今更爲罪託體先帝枉受如此幸見申列晉書楊駿傳曰武帝疾篤未有頋命佐命功臣皆巳没矣朝臣惶惑計無所從而駿盡斥群公親侍左右因輙改易公卿樹其心腹㑹帝少間見所用者乃正色謂駿曰何得便尓乃詔中書以汝南王亮與駿夾輔王室駿恐失權寵從中書借詔觀之得便藏匿中書監華廙恐懼自徃索之終不肯與信宿之間上疾遂篤又曰齊王冏入宫稱詔廢賈后后曰詔當從我出何詔也晉中興書曰初顯宗㓜冲見王導恒拜又帝與導手詔則敬白中書作詔則曰敬問於是以爲永制又曰桓玄左右稱玄爲桓詔桓㣧諌曰詔者施於辭令不以爲稱謂也漢魏之主皆無此言願陛下稽古帝則令萬世可法玄曰此詔以行今宣勑罷之後周書曰兾儁善隷書特工摸冩魏文昌𥘉爲賀扷岳墨曹叅軍及岳𬒳害太祖引爲記室時侯莫陳恱阻兵隴右太祖志在平之乃令儁僞作魏帝勑書與費也頭令將兵助太祖討恱儁依舊勑摸冩及代舎人主書等署與眞無異太祖說費也頭巳曾得魏帝勑書及見此勑不以爲疑遂遣歩騎一千受太祖節度隋書後齊正日侍中宣詔慰勞州郡國使詔牘長一尺三寸廣一尺雌黃塗飾上冩詔書三計㑹日侍中依儀勞郡國計吏問刺史大守安不及糓價麥苗善惡人間疾苦又班五條詔書於諸州郡國使人冩以詔牘一枚長二尺五寸廣一尺三寸亦以雌黃塗飾上冩詔書正㑹日依儀宣示使人使人歸以告刺史二千石一曰政在正身在愛人去殘賊擇良吏正决獄平徭賦二曰人生坐勤勤則不匱其勸率田桑無或煩擾三曰六極之人務加寛養必使生有以自救没有以自給四曰長吏華浮奉客以求小譽逐末捨本政之所疾冝謹察之五曰人事意氣干亂奉公内外溷淆綱紀不設所冝糺劾又曰陳梁制諸用官式吏部先爲白牒録數十名吏部常叅掌人共署奏勑或可或不其不用者更銓量奏請隨才𥙷用以黃𥿄録名八座通署奏可即出付典名而典以名書召怗鶴頭板整威儀送徃得官之家其有特發詔授官者即宣付詔誥局作詔草奏聞勑可黃𥿄冩出門下門下詔請付外施行又曰周武平齊得李德林嘗謂群臣云我常曰唯聞李德林名及其與齊朝作詔書移檄我正謂其是天上人豈言今日得其驅使復爲我作文書極爲大異神武公紇豆毅荅曰臣聞明王聖主得騏驎鳯凰爲瑞是聖德所感非力能致之瑞物雖來不堪使用如李德林來受驅䇿亦陛下聖德所感致有大才用無所不堪勝於騏驎鳯凰逺矣武帝大笑曰誠如公言唐書文苑傳曰徐安貞開元中爲中書舎人集賢學士毎上屬文作手詔多令安貞視草風俗通曰光武中興以來五曹詔書題郷亭壁歳輔正多有關謬永建中衮州刺史過翔箋撰卷別改着板上一勞而九逸崔元始正論曰俚語曰州郡記如霹靂得詔書但挂壁永平中詔禁吏卒不得繫馬宫外樹爲傷害其枝葉又詔今雒陽幘工作幘皆二尺五寸圍人頭各有大小不可同度此詔不可從也蔡質漢儀曰延熹中京師遊俠有盗發順帝陵者賣御物於市市長追捕不得周景以尺一詔召司隷校尉左雄詣臺與三日期擒賊曹植說灌均上事令曰孤前令冩灌均所上孤章三臺九府所奏事及詔書一通置之座隅孤欲朝夕諷詠以自警誡也語林曰明帝函封詔與庾公信誤致與王公王公開詔末云勿使冶城公知導旣視表荅曰伏讀明詔似不在臣臣開臣閉無有見者明帝甚愧數月不能見王公石虎鄴中記曰石虎詔書以五色𥿄着鳯鶵口中䇿蔡邕獨斷曰䇿者簡也禮云不備百文不書於䇿其制長二尺短者半之其次一長一短兩編下篆書起年月以命諸侯三公薨及以罪免悉以䇿書隋書曰諸王三公儀同尚書令五等開國太妃公主拜冊軸一枚長二尺以白練衣之用竹簡十二枚六枚與軸等六枚長尺二寸文岀集書皆篆字哀冊贈冊亦同唐書曰劉廼字氷夷爲司門貟外崔祐甫秉政素與迺友善㑹加郭子儀尚父以冊禮乆廢至是復行之祐甫令兩省官撰冊文未稱旨召迺至閣草之立就詞義典雅祐甫歎仰乆之後唐書曰同光三年太常奏呉越王錢鏐冊禮案禮文用竹冊上優其禮勑以玉爲之議者以玉冊帝王受命之重數不可假之非禮之冝也殷洪小說曰魏國𥘉建潘朂字元茂爲䇿命文自漢武巳來未有此制勗乃依商周憲章唐虞辭義温雅與典誥同風于時朝士皆莫能措一字勗亡後王仲宣擅名於當時時人見此䇿羙或疑是仲宣所爲論者紛紜及晉王爲太傳臈日大會賔客朂子蒲時亦在焉宣王謂之曰尊君作封魏君䇿髙妙信不可及吾曾問仲宣亦以爲不如朝廷之士乃知朂作也誥尚書商書曰湯旣黜夏命復歸于亳作湯誥又周書曰武王崩三監及淮夷叛周公相成王將黜殷作大誥又曰成王旣伐管叔蔡叔以殷餘民封康叔作康誥又曰康王旣尸天子尸主也主天子正號遂誥諸侯作康王之誥李充翰林論曰誡誥施于弼違後周書曰蘇綽自有晉之季文章競爲浮華遂成風俗太祖欲革其弊因魏帝祭廟群臣畢至乃命綽爲大誥奉行之其詞曰惟中興十有一年仲夏庶邦百辟咸㑹於王庭柱國洎群公列將罔不來朝時迺大稽百憲敷乎庶邦用綏我王度詞多不載自是之後文筆依此體三國典略曰周太祖大饗群臣史宫栁虬執簡書告于廟曰廢帝文皇帝之嗣子年七歳文皇帝託於安定公曰是子也才由公不孝不才亦由公勉之公旣受兹重寄居元輔之任又納女爲皇后遂不能訓誨有成致令廢黜負文皇帝付囑之意此咎非安定公而誰太祖乃令太常盧辨作誥喻公卿曰嗚呼我群后曁衆士維文皇帝以襁褓之嗣託於予訓之誨之庶厥有成而予罔能弗變厥心庸曁乎廢墜我文皇帝之志嗚呼兹咎予其焉避予實知之矧尔衆人心哉惟予之顔豈惟今厚將恐後世以予爲口實唐書曰孫逖掌誥八年制勑所岀爲時流歎服議者以爲自開元巳來蘇頲齊澣蘇晉賈曾韓休許景先及逖爲王言之最逖尤苦思文理精練晉史曰髙祖令制誥之辭不得虚飾冗長必湏陳其實行以正王言教尚書舜典曰帝曰契汝作司徒敬敷五教在寛春秋元命苞曰天垂文象人行其事謂之教教俲也言上爲而下俲也文心雕龍曰教者俲也言出而民効也故王侯稱教昔鄭弘之宁南陽條教爲後所述乃事緒明也孔融之守北海文教麗而罕施乃治體乖也若諸葛孔明之詳酌庾稚㳟之明斷並理得而詞中教之善也漢書曰京非尹王遵岀教令誡文心雕龍曰戒卿爲文實詔之切者魏武稱作勑戒當指事而語勿得依違曉治要矣及晉武勑戒備告百官勑都督以兵要戒州牧以董司警郡守以恤隱勒牙門以禦衛有訓典焉戒者愼也禹稱戒之用休君父至尊在三同極漢髙之勑太子東方朔之戒子亦頋命之作也及馬援以下各貽家戒班姬女戒足稱母師矣太公金匱曰武王曰五帝之誡可得聞乎太公曰黃帝曰余君民上揺摇恐夕不至朝故爲金人三緘其口愼言語也東方生傳曰朔誡其子以上容應劭日容身避容也首陽爲拙柱下爲工飽食安歩以仕易農依隱玩世詭時不逢後漢書曰馬援兄子嚴敦並喜譏議而通輕俠客援在交阯還書誡之曰聞人之過失如聞親名耳可得聞而口不得言也好論人長短妄有善惡者寕死不願聞子孫有此行也龍伯髙敦厚周愼謙約節儉吾愛之重之願汝曹效之杜季良豪俠好義憂人之憂樂人之樂有䘮致客數郡畢至吾愛之重之不願汝曹效之效伯髙不得猶爲謹勑士所謂刻鵠不成尚類鶩者也效季良不得䧟爲天下輕薄子所謂盡虎不似反類狗也裴松之以爲援此誡可謂切至之至不刋之訓矣杜恕家事戒曰張子臺視之似鄙樸人然其心中不知天地間何者爲惡毅然如與隂陽合德作人如此冨貴禍害何由而生陶淵明道誡曰夫天地賦命有生必有終自古賢聖誰能獨免汝輩旣稚小不同生當思四海皆爲兄弟之義鮑叔管仲分財無猜歸生伍舉班荆道舊遂能以此爲成因䘮立功它人尚尔况共父之人哉潁川韓元長漢末名士身處卿佐八十而終兄弟同居至于没齒濟北氾雉春晉時操行人也七丗同家人無怨色詩云髙山仰止景行行止汝其愼哉顔延年廷詰云喜怒者有性所不能無常起於𥚹量而止於弘識然喜過則不重怒過則不威能以恬漠爲體寛愉爲器則爲美矣大喜蕩心微抑則定甚怒煩性稍忍即歇故動無堡容舉無失度則爲善也欲求子孝必先爲慈將責弟悌務念爲友雖孝不待慈而慈能植孝悌非期友而友亦立悌夫和之不備或應以不和猶信不足焉必有不信儻知恩意相生情理相岀可使家有參差人皆由損枚叔有言欲人勿聞莫若勿爲禦寒莫若重裘止謗莫若自脩論語云内省不疚何憂何懼太平御覽卷第五百九十三
