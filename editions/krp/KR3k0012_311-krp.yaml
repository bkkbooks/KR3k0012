body:
  text: 兵部四十二請戰挑戰决戰上請戰左傳曰帥師以來固敵是永敵至不擊將何俟矣又曰晉師至于靡笄之下齊侯使請戰又曰子玉使伯棼請戰曰非敢必有功也願以間執䜛慝之口又曰晉侯逆秦師使韓簡視師韓簡晉大夫韓萬之孫復曰師少於我闘士倍於我公曰何故對曰出因其資請奔梁求秦也入用其寵爲秦所納飢食其粟三施而無報是以來也今又擊之我怠秦奮倍猶未也公曰一夫不可狃況國乎狃忲也言避秦則使忲來遂使請戰曰寡人不侫能合其衆而不能離也君若不還無所逃命秦伯使公孫枝對曰君之未入寡人懼之入而未定列猶吾憂也苟列定矣敢不承命又曰子玉使鬪勃請戰曰請與君之士戯君慿軾而觀之得臣與寓目焉晉侯使欒枝對曰煩夫子謂二三子戒爾車乗敬爾軍事詰朝將見榖梁曰請一戰不克請再再不克請三三不克請四四不克請五五不克舉國而授於是而與之盟史記楚丗家曰六年秦使白起伐韓於伊闕大勝斬首三十四萬秦乃與楚王書曰楚倍秦秦且率諸侯伐爭一旦之命願王之飭士卒得一樂戰楚頃襄王患之乃謀與秦平後漢書王霸傳曰霸軍中壯士路潤等數十人斷髮請戰挑戰孫子曰忿速可侮急疾之人可忿怒而致死忿速昜怒者也主不可以怒而興軍不可以愠而致戰合於利而用不合於利而止人主聚衆興軍以道理勝負之計不可以巳之私舉兵則以䇿不可以愠恚之故而合戰也怒而可以復喜愠而可以復恱亡國不可以復存死者不可以復生主怒興伐人無素謀明計則破亡矣將愠怒而鬪倉卒而合戰所傷殺必多怒愠復可以恱喜言亡國不可復存死不可復生言當湏憤之也故曰明王慎之良將儆之此安危之道也儆戒也左傳曰趙旃求卿未得且怒於失楚之致師者請挑戰弗許請召盟許之左傳曰楚許伯御樂伯攝叔爲右以致晉師許伯曰吾聞致師者御靡旍摩壘而還靡近也靡於馳也樂伯曰吾聞致師者代御執轡御下兩馬掉鞅而還叔曰吾聞致師者右入壘折馘馘断耳也執俘而還皆行所聞而復晉人逐之左右角之樂伯左射馬而右射人角不能進矢一而已麋興於前射麋麗龜戰國䇿曰魏武侯問呉起曰兩軍相常不知其將欲擊何如起曰令賤而勇者將而擊銳交合而北告而勿罰觀敵進取一來一起其政以理奔北不追見利不取此將有謀若其衆追北旗幟雜亂自止自行或縱或横貪利務得凢若此類將令不行史記曰呉丗家曰夏呉伐越越王勾踐迎擊之雋李賈逵曰越地也越使死士挑戰三行造呉師自頸左傳曰使罪人三行屬劒亦頸呉師觀之因伐呉敗之姑蘇又曰漢王項羽相與臨廣武間而語項羽欲與漢王獨身挑戰漢王數項羽十罪大怒伏弩射中王匈漢王捫足曰虜中吾指又曰王翦代李信擊荆荆兵數挑戰終不出乆之翦使人問軍中戯乎曰方投石超距翦曰士卒可用矣漢書曰項羽使人謂漢王曰天下匈匈以吾兩人願與王挑戰㳏雌雄無徒罷天下父子爲漢王笑謝曰吾寧闘智不闘力羽令壯士出挑戰三合樓煩輙射殺之羽大怒自𬒳甲挑戰樓煩欲射羽嗔目叱之樓煩目不能視手不能發走還入壁不敢復出漢王使問之廼羽漢王大驚又曰楚漢相持彭城數絶楚粮道項羽欲討越謂其將曹咎曰謹守成臯即漢欲挑戰愼勿與戰無令得東我十五日必誅彭越定梁地漢果數挑戰楚軍不出使人辱之五六日曹咎怒度兵汜水漢擊之大破楚軍盡得楚國貨賂曹咎自刎汜水上後漢書曰張堪爲謁者使送委輸縑帛并領騎七千疋詣大司馬呉漢代公孫𫐠在道追拜蜀郡太守時漢軍餘七日粮隂具舡欲遁去堪聞之馳往見漢說述必敗不冝退師之䇿漢從之乃示弱挑敵果自出戰死城下又曰王霸討蘇茂賊衆衆挑戰霸堅不出方饗士作倡樂茂雨射營中中霸前酒樽安㘴不動軍吏皆曰茂前日巳破今易擊也霸曰不然蘇茂客兵逺來粮食不足故數挑戰以徼一切之勝徼要也一切猶權時也令閇營休士所謂不戰而屈人之兵善之善者也茂旣不得戰乃引還營又曰董憲叛馬成拜揚武將軍發㑹稽丹陽九江六安四郡兵擊憲進圍憲於野令諸軍各深溝髙壘憲數挑戰成堅壁不出守之歲餘至六年春城中食盡乃攻之遂屠舒斬憲魏志曰公西征馬超進軍度渭超等數挑戰不許公乃剋日㑹戰先以輕兵挑之戰良乆乃縱虎騎夾擊大破之魏氏春秋曰諸葛亮遇司馬宣王因挑戰致巾幗婦人之飾以怒宣王魏略曰太祖在漢中而劉備栖於山領使劉封下挑戰太祖罵曰賣履舎長使假子拒汝公乎呼我黄鬚兒來令擊之乃召曹彰晨夜進追西到長安而太祖巳還崔鴻十六國春秋曰姚襄據黄落前秦符堅遣將黄眉鄧羌等率歩騎討之襄深溝髙壘固守不戰鄧羌說黄眉曰傷弓之鳥落於虚發襄頻爲晉將桓張平所敗銳氣喪矣今固壘不戰是窮冦也襄性剛很易以剛動若長駈鼔行且壓其壘襄必忿而出師可一戰擒也黄眉從之遣羌追騎三千軍於襄壘果怒盡銳出戰羌僞不勝引騎而退襄追至于三原羌廻騎拒襄俄而黄眉至大戰斬之盡俘其衆宋書曰沈攸之反自江陵舉兵東下分兵出夏口據魯山攸之旣至郢以郢城弱小足攻宋郢州今江夏郡遣人告郢州守將栁丗崇曰𬒳太后令當蹔還都卿旣相與奉國想得此意丗崇荅曰東下之師乆承聲問郢城小鎮自守而巳攸之將去丗崇遣軍於西渚挑戰攸之果怒令諸軍登岸燒郭邑築長圍攻之丗崇隨冝拒應衆皆披却攸之軍因之敗潰隋書曰陳茂從髙祖與齊師戰於晉州賊甚盛髙祖將挑戰茂固止不得因捉馬鞚髙祖忿之抜刀斫其額流血𬒳面詞氣不撓髙祖感而謝之厚加禮敬又曰竇榮定之擊突厥也史萬歲詣轅門請自効榮定素聞其名見而大恱因遣人謂突厥曰士卒何罪過令殺之但當各遣一壯士決勝負耳突厥許諾因遣一騎挑戰滎定遣萬歲出應之萬歲馳斬其首而還突厥大驚不敢復戰遂引軍而去唐書曰髙祖𥘉起師次霍邑隋將宋老生拒之上謂諸將曰老生若嬰城自守當即攻之主客勢懸卒難致力其計若何太宗進曰老生勇而無謀請以輕兵挑之必出戰則成擒矣從之太宗以數騎詣其城下舉鞭指麾若將圍城者老生果怒開門出兵太宗馳白髙祖曰事諧矣髙祖因謂隴西公建成曰汝看兩陣將交引左軍直趨東門命太宗引右軍直趨南門以斷其歸路老生之軍背城而陣髙祖以中軍與建成合陣於城東太宗及柴紹陣於城南老生麾兵疾進先薄髙祖而建成墜馬老生乗之中軍與左軍咸却太宗自南原遥見塵起知義師退率二百騎馳下峻坂殺一賊將遂衡斷其軍出于陣後表裏齊譟響若崩山隋師大潰各捨杖而走懸門發老生不得入城乃棄馬投壍甲士斬之致其首於麾下流血數里僵死屍相枕四面乗勝進薄其城時無攻具士卒縁矟而上一時攀堞無敢當者遂平霍邑撫其餘衆而用之又曰杜伏威旣敗隋師煬帝又遣將軍陳稜討之稜不敢戰伏威知其怯懦因遺稜婦人之服以激怒之稜果大怒恚率衆而至伏威逆拒殺數千人稜僅以身免又曰竇建德自滎陽西上太宗以數百騎出武牢關二十餘里以挑之往往設伏比至賊營纔四騎而巳謂左右曰賊見我而旋是其上計乗險逐我是其下䇿賊𥘉見騎少疑爲斥候太宗謂曰我秦王也因引弓射之斃其一將賊以兵六十騎並援槍而至從者咸失色太宗謂之曰爾但前去我自殿後於是按轡徐行賊至引弓射之斃一將賊懼而止止而復來如是再三毎來必斃賊乃不敢復逼太宗且挑且還伏兵相次而發合擊破之獲其大將殷秋石瓉斬首數百級決戰上六韜曰周武王將伐紂問太公曰今敵人圍我斷後絶糧吾欲徐以爲陣以敗爲勝奈何太公曰不可此天下困兵也暴用之則勝徐用之則敗可爲四衝陣以驍騎驚其親君左軍疾左右軍疾右中軍迭前迭後徃敵之空吾軍疾擊鼓而當之又曰敵踈其陣又逺其後跳我流矢以弱我弓弩勞我士卒爲之奈何太公曰發我銳士先擊其前車騎獵其左右引而分隊以隨其後三軍疾戰凢以少擊衆避之於易要之於險避之以晝取之於夜故曰以一擊十莫善於阨以十擊百莫善於險以千擊萬莫善於阻用衆者務易用少者務阨也左傳曰晉師伐齊陣于莘所臻切晉解張御郄克鄭丘緩爲右及戰郄克傷於矢流血及屨未絶鼔音中軍將自執旗鼓故雖傷而擊鼓不息也曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之丘緩曰自始合苟有險余必下推車子豈識之然子病矣以其不識巳推車也張曰師之耳目在吾旗鼓進退從之此車一人殿之可以集事殿鎭也集成也若之何以病敗君之大事也擐甲執兵固即死也擐貫即就也擐音患病未及死吾子勉之左并轡并畢正切右援抱音桴而鼓馬逸不能止師從之晉師從郄克車齊師敗績又曰齊侯伐晉夷儀敝無存之父將室之辭以與其弟無存齊人也室之爲取婦曰此役也不死反必娶於髙國髙氏國氏齊貴族也無存欲必有功還取卿相之女也先登求自門出死於霤下旣入城夷儀人不服故闘死於門屋霤下也齊侯克夷儀謂夷儀人曰得敝無存者以五家免給五家不使役乃得其尸公三禭之禭衣也比殯加禭深厚禮之也與之犀軒直盖犀軒卿車直盖髙盖也親推之三齊候自推喪車輪三轉也國語曰齊莊公且伐莒爲車五乗之賔而𣏌梁華舟獨不與焉故歸而不食其母曰汝生而無義死而無名則雖非五乗孰不汝笑也生而有義死而有名則五乗之賔盡汝下也趣食乃行𣏌梁華舟同車侍於莊公而行至莒莒人逆之𣏌梁華舟下闘獲甲首三莊公止之曰子止與子同齊國𣏌梁華舟曰君爲五乗之賔而舟梁不與焉是少吾勇也臨敵渉難止我以利是惡吾行也深入多殺者臣之事也齊國之利非吾所知也遂進闘壞軍䧟陣三軍不敢當戰國䇿曰齊上將田單率師將攻狄魯仲連子曰將軍攻狄必不能下矣單曰單以破亡餘卒破萬乗之燕今攻狄而不能下何也上車不謝而去遂攻狄三月不克齊嬰兒謡曰大冠若箕修劒柱歸單乃懼問仲連子對曰將軍在即墨之時坐即織簣立即杖挿爲士卒唱當此之時將軍有死之心而士卒無生之氣聞是言莫不掩泣奮臂而欲戰此所以破燕也當今將軍東有掖邑之封西有淄上之寳足以樂生而惡死此以不勝也田單明日結髮勵氣立於矢石間引抱而鼓之狄人乃下漢書曰御史大夫韓安國曰魏其言灌夫父死事荷㦸駈不測之呉軍身𬒳數十創名冠三軍此天下壯士也非有大惡爭杯酒不足引他過以誅之後漢書曰劉伯升起兵光武守昆陽莽將王㝷王邑來討兵號百萬先至昆陽巳十萬圍數重時伯升巳㧞宛三日而光武尚未知乃僞使持書報城中云宛下兵到而佯墮其書㝷邑得其書不喜諸將旣經累捷膽氣益壯無不一當百光武乃與敢死者三千人從城西水上衝其中堅㝷邑陣亂乗勢崩之遂殺王㝷城中亦鼔噪而出中外合勢震呼動天莽兵大潰走者相騰踐又曰郟令馮魴力戰死帝曰此徤令又曰呉漢率兵圍蘇茂於廣樂劉永將周建來救漢將輕迎戰不利墮馬傷膝還營諸將謂漢曰大敵在前而公傷卧衆心懼矣漢乃勃然褁瘡而起椎牛饗士令軍中曰賊衆雖多皆刼掠群盗勝不相讓敗不相救非有杖節義者也今日封侯之秋諸君勉之於是軍士激怒人倍其氣明日建茂出兵圍漢選四部精兵三千餘人齊鼓而進建軍大潰還奔城漢長驅追擊大破之李陵荅蘇武書曰昔先帝授陵歩卒五千出征絶域五將失道陵獨遇戰單于謂陵不可復得便欲引還而賊臣敎之遂便復戰故陵不得免耳司馬遷報任少卿書曰且李陵提歩卒不滿五千深踐戎馬之地足歴王庭垂餌虎口横挑強胡億萬之師與單于連戰十有餘日所殺過當太平御覽卷第三百一十一
