body:
  text: 皇王部三十五唐髙宗天皇大帝則天皇后中宗孝和皇帝睿宗玄真皇帝髙宗天皇大帝唐書曰髙宗天皇帝諱治太宗第九子也母曰文德順聖皇后長孫氏以貞觀二年六月生於東宫之麗正殿五年封晉王七年遥授并州都督㓜而𡵨嶷端審寛仁孝友𥘉授孝經於著作郎蕭德言太宗問曰此書中何言爲善對曰夫孝始於事親中於事君終於立身君子之事上也進思盡忠退思𥙷過將順其羙臣救其惡太宗恱曰行此足以事父兄爲臣子矣及文德皇后崩晉王時年九歳哀慕感動左右太宗屢加慰撫由是特深寵異尋拜右武候大將軍十七年皇太子承乾廢魏王㤗亦以罪黜太宗與長孫無忌房玄齡李世勣等計議立晉王爲皇太子太宗每視朝常令在側觀决庻政或令參議太宗數稱其善十八年太宗將伐髙麗命太子留鎮定州及駕發有期悲啼累日因請飛驛遞表起居并遞勑垂報並許之及軍旋太子從至并州時太宗患疽太子親吮徂兖切之扶輦歩從數日二十三年五月己巳太宗崩六月甲戌皇太子即皇帝位時年二十二詔大赦天下内外文武賜勲官一級永徽元年春正月辛丑朔上不受朝詔改元景午立妃王氏爲皇后二年春正月戊戌詔曰去歳關輔之地頗弊蝗螟音冥天下諸州或遭水旱百姓之間致有罄乏此由朕之不德兆庻何辜矜物罪已載深憂惕今獻歳肇春東作方始糧廪或空事資賑給其遭蟲水處有貧乏者量以正義倉賑貸五年春三月戊午幸萬年宫辛未曲赦所經州縣繫囚以工部尚書閻立德領丁夫四萬築長安羅郭八月大理奏决死囚揔有七十餘人六年九月庚午尚書右僕射禇遂良以諌立武昭儀貶授潭州都督乙酉洛州大水毀天津橋冬十月已酉廢皇后王氏爲庻人立昭儀武氏爲皇后大赦天下七年正月辛未廢皇太子忠爲梁王立代王弘爲皇太子壬申大赦改元爲顯慶元年五月巳夘太尉長孫無忌進史館所撰梁陳周齊隋五代史志三十卷五年八月庚辰蘇定方等討平百濟靣縛其王扶餘義慈國分爲五部郡三十七城二百户七十六萬以其地分置熊津等五都督府麟德元年三月辛亥展大射禮十二月景戍殺西臺侍郎上官儀戊子庻人忠坐與儀交通賜死二年十月司禮太常伯劉常道上䟽請封禪癸亥髙麗王髙藏遣其子福男來朝丁夘將封泰山發自東都是歳大稔米㪷五錢麰音牟麥不列于市麟德三年春正月戊辰朔車駕至泰山頓是日親祀昊天上帝於封祀壇以髙祖太宗配饗已巳帝昇山行封禪之禮庚午禪於社首祭皇地祇以太穆太皇太后文德皇太后配饗皇后爲亞獻越國太妃燕氏爲終獻辛未御降禪壇壬申御朝覲壇受朝賀改麟徳三年爲乾封元年正月景戍發自泰山甲午次曲阜縣幸孔子廟追贈太師増修祠宇以少牢致祭其襃聖侯德倫子孫並免賦役二月己未次亳州幸老君廟追號曰太上玄元皇帝創造祠堂改谷陽縣爲眞源縣縣内宗姓特給復一年夏四月甲辰車駕至自泰山先謁太廟而後入庚寅改鑄乾封泉寳錢冬十月己酉司空英國公勣爲遼東道行軍大揔管以伐髙麗三年二月戊寅以明堂制度歴代不同漢魏以還彌更訛舛遂増損古今新制其圖下詔大赦改元爲緫章元年二月戊寅幸九成宫九月癸巳司空英國公勣破髙麗拔平壤城擒其王髙藏及其大臣男建等以歸境内盡降其城一百七十上元二年三月丁巳天后親蠶於邙山之陽時帝風疹不能聽朝政事皆决於天后自誅上官儀後上每視朝天后垂簾於御座後政事大小皆預聞之内外稱爲二聖帝欲下詔令天后攝國政中書侍郎郝處俊諌止之調露元年十月單于大都護府突厥阿史德温傳及奉職二部相率反叛二年八月甲子廢皇太子賢爲庻人幽於別所乙丑立英王哲爲皇太子改調露二年爲永隆元年大赦天下二年閠七月庚申上以服餌令皇太子監國景寅雍州大風害稼米價翔踊是月裴行儉大破突厥史伏念之衆伏念爲程務挺急追來降行儉於是盡平突厥餘黨行儉執伏念振旅凱旋永淳二年春正月甲午朔幸奉天宫遣使祭嵩嶽少室箕山具茨等山西王母啓母巢父許由等祠十一月丁未自奉天宫還東都上疾甚宰臣巳下並不得謁見十二月丁巳詔改永淳二年爲弘道元年將宣赦書上欲親御則天門樓氣逆不能上馬遂召百姓於殿前宣之禮畢上問侍臣曰民庻喜否曰百姓蒙赦無不感恱上曰蒼生雖喜我命危篤天地神祗若延吾一兩月之命得還長安死亦無恨是夕帝崩於貞觀殿時年五十六謚曰天皇大帝廟號髙宗文明元年八月葬于乾陵天寳十三載改謚曰天皇大弘孝皇帝則天皇后唐書曰則天皇后武氏諱明空并州文水人也父士彠憂縛切隋大業末爲鷹楊府隊正髙祖行軍於汾晉每休止其家義旗𥘉起從平京城貞觀中累遷工部尚書荆州都督封應國公𥘉則天年十四時太宗聞其美容止召入宫立爲才人及太宗崩遂爲尼居感業寺大帝於寺見之復召入宫拜昭儀時皇后王氏良娣蕭氏頻與武昭儀争寵㸦讒毁之帝皆不納進號宸妃永徽六年廢王皇后而立武宸妃爲皇后髙宗稱天皇武后亦稱天后后素多智計兼渉文史帝自顯慶巳後多苦風疾百司表奏皆委天后詳决自此内輔國政數十年威勢與帝無異當時稱爲二聖弘道元年十二月大帝崩皇太子顯即位尊天后爲皇太后旣將簒奪是日自臨朝稱制嗣聖元年春正月甲申朔改元二月戊午廢皇帝爲廬陵王幽于別所仍改名哲巳未立豫王輪爲皇帝令居於別殿大赦天下改爲文明皇太后仍臨朝稱制庚申廢皇太孫重照爲庻人九月栁州司馬徐敬業殺楊州長史陳敞之舉兵移檄天下左玉鈐衛大將軍李孝逸討平之垂拱四年五月皇太后加尊號曰聖母神皇秋七月大赦天下八月壬寅博州刺史瑯瑘王冲據博州起兵命左金吾大將軍丘神勣爲行軍揔管討之庚戍冲父豫州刺史越王貞又舉兵與冲相應九月命内史岑長倩鳯閣侍郎張光輔左監門大將軍麴崇裕率兵討之景寅斬貞及冲等傳首神都改姓爲虺音卉氏曲赦博州韓王元嘉魯王靈夔元嘉子黄國公譔音選靈夔子左散騎常侍范陽王藹霍王元䡄及子江都王緒故虢王元鳯子東莞音管公融坐與貞通謀元嘉靈䕫自殺元䡄配流黔州譔等伏誅改姓虺氏自是宗室諸王相繼誅死者殆將盡矣其子孫年㓜者咸配流嶺外并誅其親黨數百餘家載𥘉元年春正月神皇親享明堂大赦天下依周制建子月爲正月改十二月爲臘月改舊正月爲壹月大酺三日神皇以曌字爲名遂改詔書爲制書秋九月革唐命改國號爲周改元爲天授大赦天下乙酉加尊號爲聖神皇帝降皇后帝輪爲皇嗣景戍立武氏七廟追尊神皇父士彠爲孝明皇帝證聖元年春正月加尊號曰慈氏越古金輪聖神皇帝大赦天下改元大酺七日二月上去慈氏越古尊號秋九月親祀南郊加尊號天冊金輪聖神皇帝大赦天下改元爲天冊萬歳大辟罪已下及犯十惡常赦所不原者咸赦除之大酺九日萬歳登封元年臘月甲申上登封于嵩嶽大赦天下改元大酺九日丁亥禪于少室山聖歴元年正月親享明堂大赦天下改元大酺九日三月召廬陵王哲於房州九月景子廬陵王哲爲皇太子令依舊名顯大赦天下神龍元年春正月大赦改元上不豫制自文明元年巳後得罪人除楊豫博三州及諸逆魁首咸赦除之癸夘麟臺監張易之與弟司僕卿昌宗謀反皇太子率左右羽林軍桓彦範敬暉等以羽林兵入禁中誅之甲辰皇太子監國大赦天下是日上傳皇帝位于皇太子徙居上陽宫戊申皇帝上尊號曰則天大聖皇帝冬十一月壬寅則天將大漸遺制祔廟歸陵令去帝號稱則天大聖皇后是日崩于洛陽宫之仙居殿年八十三謚曰則天大聖皇后祔葬于乾陵中宗和皇帝唐書曰中宗孝和皇帝諱顯髙宗第七子母曰則天順聖后顯慶元年十一月生於長安明年封周王授洛州牧儀鳯二年徙封英王改名哲授雍州牧永隆元年章懷太子廢其年立爲皇太子弘道元年十二月髙宗崩皇太子即帝位皇太后臨朝稱制改元嗣聖元年二月皇太后廢帝爲廬陵王幽於別所其年五月遷於均州尋徙居房陵聖暦元年召還東都立爲皇太子依舊名顯時張易之與弟昌宗潜圖逆亂神龍元年鳯閣侍郎張柬之鸞臺侍郎崔玄暐音韋左羽林將軍敬暉右羽林將軍桓彦範司刑少卿袁恕巳等定䇿率羽林兵誅易之昌宗迎皇太子赦天下鳯閣侍郎韋承慶正諌大夫房融司禮卿崔慶等下獄甲辰命地官侍郎樊忱音諶往京師告陵廟乙巳則天傳位於皇太子景午即皇帝位於通天宫大赦天下唯易之黨與不在原限二月甲寅復國號依舊爲唐社稷宗廟陵寢郊祀行軍旗幟服色天地日月等字臺閣官名並依永淳已前故事甲子立妃韋氏爲皇后大赦天下詔九品巳上及朝集使極言朝政得失兼舉賢良方正直言極諌之士景龍三年十一月乙丑親祀南郊皇后登壇亞獻左僕射舒國公韋巨源爲終獻大赦天下四年五月丁夘前許州司兵參軍燕欽融上書言皇后干預國政安樂公主武延秀宗楚客等同危宗社帝怒召欽融庭見撲殺之時安樂公主志欲皇后臨朝稱制而求立爲皇太女由是與后合謀進鴆六月壬午帝遇毒崩于神龍殿年五十五祕不發䘮皇后親揔庻政立温王重茂爲皇太子甲申發䘮于太極殿宣遺制皇太后臨朝大赦天下改元爲唐隆丁亥皇太子即帝位時年十六皇太后韋氏臨朝稱制大赦天下常赦所不原者咸赦除之内外兵馬令諸親王掌仍令韋温揔知時召諸府折衝兵五萬人分屯京城列爲左右營諸軍子姪分統之庚子夜臨淄王諱舉兵誅諸韋諸武皆梟首於安福門外韋太后爲亂兵所殺九月丁夘上謚日孝和皇帝廟號中宗葬定陵天寶十三載二月改謚日大和大聖大昭孝皇帝睿宗玄眞皇帝唐書日睿宗玄眞皇帝諱旦髙宗第八子中宗母弟龍朔二年六月己未生於長安其年封殷王遥領兾州大都督單于大都護右金吾衛大將軍及長謙恭孝友好學工草隸尢愛文字訓詁之書乾封元年徙封豫王緫章二年徙封兾王上初名旭輪至是去旭字上元二年徙封相王拜右衛大將軍儀鳯三年遷洛州牧改名旦徙封豫王嗣聖元年則天臨朝廢中宗爲廬陵王立豫王爲皇帝仍臨朝稱制及革命改國號爲周降帝爲皇嗣令依舊名輪徙居東宫其僟一比皇太子聖暦元年中宗自房陵還帝數稱疾不朝請讓位於中宗則天遂立中宗爲皇太子封帝爲相王又改名旦授太子右衛率長安中拜司徒右羽林衛大將軍自則天初臨朝及革命之際王室屢有變故帝每恭險退讓竟免于禍神龍元年以誅張易之兄弟功進號安國相王遷太尉加實封其年立爲皇太弟固辭不受景龍四年夏六月中宗崩韋庶人臨朝引用其黨分握政柄忌帝望實素髙潛謀危害庚子夜臨淄王與太平公主子薛崇簡前朝邑尉劉幽求長上果毅麻嗣宗宫苑揔監鍾紹京等率兵入北軍誅韋溫紀處訥宗楚客武延秀馬秦客葉靜能趙履温楊均等諸韋武黨與皆誅之辛丑帝挾少主御安福門樓慰諭百姓大赦天下其日王公百寮上表咸以國家多難冝立長君以帝衆望所歸請即尊位甲辰少帝詔日叔父相王髙宗之子昔以天下讓于先帝孝友寛簡彰信兆人神龍之初已有明旨將立太弟以爲嗣君爲王懇辭未行冊命所以東宫虚位至于厯年撤綴渉衛切在辰禍變倉卒然後稱制計立沖人欽奉前懷願遵理命上申先聖之旨下遂蒼生之心俯稽圖緯之文仰峻祖宗之烈起今日請叔父相王卽皇帝位朕退守本藩歸于舊邸凡百卿士敬承朕言克賛我天人之休期光我有唐之勲業布告遐邇咸使聞知相王上表讓日臣以宗社事重國家情深誅鋤巨逆奉戴嗣主今承制旨猥推宸極在臣虚薄不敢祗膺循環震驚無任感哽制荅日皇極大寶天下至公王者臨之蓋非獲己王先聖舊意蒼生推仰龍光紫宸實允係望請遵前旨勿或讓推於是少帝遜于別宫是日卽皇帝位御承天門樓大赦天下景雲三年春正月辛未朔親謁太廟癸酉上始釋慘七糝切服御正殿受朝賀甲戌并汾絳三州地震壞人廬舎辛巳親祀南郊戊子躬耕籍田己丑大赦天下改元爲太極二月丁亥皇太子釋奠於國學追贈顔回爲太子太師曾參爲太子太保每年春秋釋奠以四科弟子及曾參從祀列干二十三賢之上八月庚子帝傳位于皇太子自稱日太上皇帝五日一受朝于太極殿自稱日朕三品已上除授及大刑獄並自決之其處分事稱誥令皇帝每日受朝於武德殿自稱日予三品已下除授及徒罪並令決之其處分事稱制勑甲辰大赦天下改元爲先天二年秋七月甲子太平公主與左僕射竇懷貞侍中岑羲等謀逆事覺皇帝率兵誅之窮其黨與太子少保薛稷左散騎常侍賈膺福右羽林將軍李慈李欽中書舎人李猷中書令崔湜尚書左丞廬藏用太史令傅孝忠僧惠範等皆誅之兵部尙書郭元振從上御承天門樓大赦天下自大辟罪已下無輕重咸赦除之翌日太上皇誥日朕將高居無爲自今後軍國刑政一事已上並取皇帝處分開元四年夏六月甲子太上皇帝崩于百福殿時年五十五謚曰大聖眞皇帝廟曰睿宗冬十月葬于橋陵天寳十三載改謚曰玄眞大聖大興孝皇帝太平御覽卷第一百一十
