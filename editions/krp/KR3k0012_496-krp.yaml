  text: 太平御覽卷第四百九十六
  hash: sha256:28187cd58cc5a7d02ec64522c06b233b67bfd4065ce05d719e4c838e480bda0d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_496-1a}
body:
  text: 人事部一百三十七諺下鬪爭諺下漢晉春秋曰諸葛亮卒楊儀整軍而出宣王不逼百姓諺曰死諸葛走生仲逹梁祚魏國統曰王昶字文舒戒兄子云諺曰救寒無若重裘止謗莫若自脩斯言信矣張勃吴録曰陸稠字伯嬴爲廣陵太守姦吏歛乎廣陵諺曰解結理煩我國陸君韓詩外傳曰夫知惡往古之所以危亡而不知積其所以安存則無以異乎却行而求逮於前人也鄙語曰不知爲吏視已成事或曰前車覆後車戒江表傳曰諸葛亮表都護李嚴嚴少爲郡職吏用性深尅茍利其身郷里爲嚴諺曰難可狎李鱗甲又曰典韋容貌魁傑名冠三軍其所持手㦸長幾一尋軍中爲之語曰帳下壯士有典軍手提雙㦸八十斤又曰郭典字君業爲鉅鹿太守與中郎將董卓攻黄巾賊張寳於曲陽典作圍塹卓不肯典獨於西當賊之衝晝夜進攻寳由是城守不敢出時人爲語曰郭君圍壍董將不許幾令狐狸化爲豺虎頼我郭君不畏強禦轉機之間敵爲窮虜猗猗惠君保完疆土又曰栁琮字伯騫所抜進皆爲時所稱致位牧守郷里爲諺曰得黄金一笥不如爲栁伯騫所識皇甫謐逹士傳曰繆斐字文雅代脩儒學繼踵六愽士以經行脩明學士稱之故時人謂之語曰素車白馬繆文雅王祥别傳曰晉受禪時廊廟之士莫不懽容而祥色不加怡時人爲之語曰王公恨恨有送故之情也張方賢楚國先賢傳曰諺曰黄尚爲司隷姦慝自弭左雄爲尚書令天下慎選舉荀氏家傳曰荀䆳夫人有至行時歳荒毎來糴者夫人恒叩其斛糴者歸量輙過其本時人號曰掾斛夫人陳留風俗傳曰許晏守偉君授魯詩於琅邪王改學曰許氏章句列在儒林故諺曰殿上成群許偉君曹操别傳曰吕布梟勇且有駿馬時人爲之語曰人中有吕布馬中有赤兔文士傳曰江應元時人諺曰嶷然希言江應元又曰留侯七丗孫張讃字子卿𥘉居吴縣相人里時人諺曰相里張多賢良積善應子孫昌習鑿齒襄陽記曰黄承産謂諸葛亮曰身有醜女才堪相配即載送之郷里語曰孔明擇婦正得外醜也和苞漢趙記曰陳安奮刀左右俱發隴上語曰隴上壯士有陳安丈八虵矛左右槃西京雜記曰韓嫣好彈以金爲丸一日所失者十餘長安爲之語曰若飢寒逐彈丸京師兒童每聞嫣岀彈輙隨之望丸所落便拾取焉英雄記曰袁紹父成字文開貴盛自梁兾以下皆與交言無不從京師諺曰事不諧詣文開三輔决録曰馮豹字仲文後母遇之甚酷豹事之愈謹時人爲之語曰道德彬彬馮仲文又曰五門子孫凡民之伍門今在河南西四十里澗榖洛三水之交傳聞馬氏兄弟五人共居此地作五門客舎因以爲名主養猪賣豚故民爲之語曰苑中三公舘下二卿五門嚾嚾但聞豚聲又曰賈彪兄弟三人並有髙名彪最優故天下稱曰賈氏三虎偉節最怒又曰游殷字㓜齊爲胡􅎮所害月餘􅎮得病但言伏伏游㓜齊將鬼來於是遽死關中諺曰生有知人之明死有貴神之靈臨海異物志曰安家夷皆好噉猴頭羹諺言人寧負人千石之粟不願負人猴頭羮臛又曰䱥魚肥炙食甚美諺曰寧去累丗田宅不去䱥魚額風俗通曰趙王好大眉人間半額楚王好廣領國人没項齊王好細腰後宫有餓死者又曰延嘉中常侍單超左琯徐璜具瑗唐衡在帝左右縱其姦逸時人爲之語曰左迴天徐轉日具獨坐唐應聲言信用甚於轉圓也又曰里語曰縣官漫漫怨死者半六韜曰天下攘攘皆爲利往天下熈熈皆爲利來列子曰周諺曰田父可坐殺晨岀夜入自以性之恒啜菽茹藿自以味之極一朝處以軟毛綈薦以梁肉蘭味心㾓體煩内熱生病矣又曰揚朱曰古語有之生相怜死相捐此語至矣又曰趙子文曰國諺有言察見淵魚者不祥智料隱逸者殃且君欲無盗莫若舉賢而任之孟子曰齊人有言雖有智慧不如乗勢雖有鎡基不如待時齊人之諺語也乗勢居冨貴之勢也鎡錤田器耒耜之属也孔叢子曰平原君與子髙飲強子髙酒曰昔有遺諺堯舜千鍾孔子百觚子路嗑嗑尚飲百榼古之賢聖無不能飲也吾子何辭焉韓子曰鄙諺曰長䄂善舞多錢善賈此言多資之易爲工又曰古有諺曰爲政猶沭也雖有棄髪之廢而有長髪之利也慎子曰諺云不聦不明不能爲王不瞽不聾不能爲公蔣子萬機論曰學者如牛毛成者如鱗角又曰猛虎不處卑勢勁鷹不立垂枝抱朴子曰桓靈曰舉秀才不知書察孝廉父别居寒素清白濁如泥髙第良將怯如蠅又曰古人欲逹勤誦經今丗圖官勉治生啇君書曰公孫鞅謂秦孝公曰臣聞之疑行無名疑事無功君亟定變法之慮殆猶天下之議語曰愚者暗於成事智者見於未萌邯鄲氏笑林曰桓帝時有人辟公府椽者倩人作奏記文人不能爲作因語曰梁國葛龔者先善爲記文自可冩用不煩更作遂從人言冩記文不去龔名姓府公大驚不荅而罷歸故時人語曰作奏雖工冝去葛龔賈誼新書鄙諺曰欲投䑕而忌器此善喻也䑕近於器尚憚而弗投恐傷器也况貴大之臣近於主帝乎桓子新論曰關東諺語曰人聞長安樂則出門而西向笑知肉味美則對屠門而大嚼又諺曰侏儒見一節而長短可知孔子言舉一隅足以三隅反觀吾小時二賦亦足以揆其能否崔寔政論曰毎詔書所欲禁絶雖重懇惻罵詈極筆由復廢捨終無悛意故里語曰州郡記如霹靂得詔書但掛壁又曰一歳再赦奴兒噫唶况不軌之民熟不肆意應劭漢官儀曰里語云仕官不止車生耳蔡邕獨断曰古幘無巾王莽頭秃乃始施巾故語曰莽頭秃幘如屋王㓪貧窶語曰諺曰魯班雖巧不能爲乞丐者顔魏武選令曰諺曰失晨之雞思𥙷更鳴昔季闡在白馬有受金取婢之罪棄而弗問後以爲濟北相以其能故曹植令曰諺云相門有相將門有將夫相者文德昭將者武功烈鬭爭左傳隱公曰鄭伯將伐許授兵於太宫公孫閼與頴考叔争車頴考叔挾輈以走輈車轅也子都拔㦸以逐之又襄五年曰秦伯之弟鍼如晉脩成叔向命召行人子貟欲使荅秦行人子朱曰朱也當御御進也言當次行三云叔向不應子朱怒曰班爵同同爲大夫何以黜朱於朝無劒從之叔向曰秦晉不和乆矣今日之事幸而集晉國頼之不集三軍暴骨子貟道二國之言無私子常易之姦以事君者吾所能御也拂衣從之人救之平公曰晉其庻乎庻幾於治吾臣之所爭者大師曠曰公室懼卑臣不心競而力爭不務德而爭善私欲巳侈能無卑乎又襄五年曰楚伐鄭至于城䴢鄭皇頡戍之出與楚師戰敗穿封戍囚皇頡公子圍與之爭之正於伯州犂正曲直也伯州犂曰請問於囚乃立囚伯州犂曰所爭君子也其何不知上其手曰夫子爲王子圍寡君之貴介弟也下其手曰此子爲穿封戍方城外之縣尹也誰獲子上下手以道囚意囚曰頡遇王子弱焉弱敗也言爲王子所得戍怒抽戈逐王子圍史記曰藺相如功大拜爲上卿位在廉頗右頗曰我爲趙將有攻城野戰之功相如徒以口舌爲勞位居我上吾不忍爲之下必辱之相如聞之不肯與㑹毎朝常稱病不欲與頗爭列於是舎人請辭去相如曰強秦不敢加兵於趙者徒以吾兩人在也今兩虎共闘勢不俱生所以先國家之急而後私讎也又曰彭越字仲常漁鉅野中爲羣盗陳勝項梁起少年或謂越曰豪傑相立叛秦仲可效之越曰兩龍方鬪且待之又曰婁敬說上曰天與人鬪不搤其亢張晏曰亢嚨喉拊其背未能全其勝也今陛下入關而都案秦之故此亦搤天下亢而拊其背也又曰孔子去陳過蒲㑹公叔氏以蒲叛蒲人止孔子弟子公良孺者有勇力謂曰昔從夫子遇難於匡今遇難於此命也吾寧鬪而死鬭甚疾蒲人懼謂曰無適衛吾出子也漢書曰項羽謂漢王曰天下匈匈以吾兩人願與王挑戰决雌雄漢王笑曰吾寧鬪智不能鬪力也又曰大將軍霍光秉政諸霍在平陽奴客持刀兵入市吏不能禁及尹翁歸爲市吏莫敢犯者又曰邴吉常出逢群鬪者死傷撗道吉過之不問掾史獨怪之吉曰民闘相殺傷長安令京兆尹職所當禁也宰相不親小事又曰原渉遣奴至市買肉奴乗渉氣與屠者爭言斫傷屠者又漢書張耳賛曰張耳陳餘丗所稱賢始居約時相然信死豈顧問哉及據國爭權卒相㓕亡勢利之交古人羞之續漢書曰孝靈皇帝於後宫人爲列肆販賣使相偷盗争闘上臨視之以爲樂東觀漢記曰執金吾賈復在汝南部將殺人頴川捕得㓂恂乃戮之於市復以爲耻過頴川謂左右曰吾今見恂必手劒之恂知其謀不欲與相見恂曰昔藺相如屈於廉頗者爲國也乃勑屬縣盛供具一人皆兼二人之饌恂乃出迎於道稱疾還賈復勒兵欲追之而吏士皆醉遂過去恂以狀聞上乃徴恂恂至引見時復先在座欲起相避上曰天下未定兩虎安得私闘又曰周黨字伯况太原人郷佐發黨傜道於人中辱之黨學春秋長安聞復讎之義輟講下辭歸到與郷佐相聞期闘日卿佐多從兵往使郷佐先拔刀然後與相擊郷佐服其義勇袁崧後漢書曰劉盆子居長樂宫赤眉諸將日㑹論功名自言欲爲某王欲得某官爭言號呼拔劒相擊英雄記曰吕布字奉先劉備屯小沛袁術遣將紀靈歩士三萬攻備備求救於布布率騎千餘馳赴之遣人招備并請靈等饗因謂靈曰布性不喜合闘但喜解闘耳蜀志曰劉封與孟逹分爭不和封奪逹鼓吹逹遂降魏山海經曰刑天與帝爭神帝断其首葬之常羊之山神異經曰東北荒中有獸焉其狀如羊一角毛青四足似熊性忠而直見人闘則觸不直聞人論咋不正名曰獬豸一名任法今御史用法冠俗曰獬豸冠也續搜神記曰晉太原中北地人陳良與沛郡民李焉共爲賈後大得利焉殺良取物死十許日良忽蘇活得歸家說死時見周旋人劉舒舒乆巳亡謂良曰去年春社日祠祀家中闘爭吾實忿之作一兕於庭前良故往報舒家其怪亦絶皇甫士安逸士傳曰髙鳯隣里有爭財闘者兵刄相加鳯脫衣巾爲叩頭曰仁義遜讓不可廢也爭財者投兵謝之而罷東觀漢記又載又曰管寜所居屯落㑹有汲者或男女雜錯或爭井鬪䦧寧患之乃買器分置井傍汲以待之各自相責不復闘也㑹稽典録曰夏香字曼卿門側有大井上有瓦盆里中兒童各競飲牛爭水共闘香豫爲汲多置盆器由是無爭費禕别傳曰魏延與楊儀並坐爭論延或舉刄擬儀儀涕泣撗集禕常入坐其間諫喻分别石勒別傳曰勒微時居與邑人李陽相近陽性剛愎毎輕勒與爭漚麻池共相打楪㸦有勝負吴越春秋曰伍子胥始吴時遇專諸於途專諸方與人闘將就之適其怒有萬人之氣其妻一呼即還子胥怪而問其狀專諸曰夫屈一人之下必伸萬人之上列子曰昔共工與顓頊爭爲帝怒觸不周之山折天柱絶地維胡非子曰胡非子脩墨子教有屈將子恃勇聞墨者非闘帶劒危冠往見胡非子刼而問之曰將聞先生非闘而好勇有說則可無說則死胡非子爲言五勇屈將子恱服尸子曰魯人有孝者三爲母北魯人稱之彼其闘則害親不闘則辱羸矣不若兩降之韓子曰鄭人有相與爭年者一人曰吾與堯同年一人曰吾與黄帝兄同年訟此不决以後息爲勝吕氏春秋曰楚之邊邑名曰卑梁其處女爭桑於境上戯而傷卑梁之女卑梁人以讓吴人吴人應不恭怒而殺之吴人往報之盡屠其家於是吴楚大爭淮南子曰佐祭者得甞救鬪者得傷又曰三人同舎二人相與爭爭者各自以爲直不能相聽一人雖愚必從而决之非以智也以不爭也說苑曰秦始皇太后不謹幸郎嫪毒封爲長信侯專國事與侍中左右貴臣俱愽飲酒醉爭言而闘瞋目大呼桓子新論曰余前爲典樂大夫有鳥鳴於庭樹上而府中門下皆爲憂懼後余與典樂謝侯爭闘俱坐免去風俗通曰臨淮有一人持一疋縑到市賣之道遇雨披戴後人求共庇廕授與一頭雨霽當別因共爭各云我縑詣府自言丞相薛宣呼騎吏中斷縑各與半後人濫受因前撮之縑主稱怨宣然後知責之具服又曰俗說二人共澡手令人闘爭良無異器當共澡者其祝曰人相愛狗相嚙言狗闘時灑之以水便自解也又曰坐不移罇俗說移罇令人闘爭典論曰汝南許劭與族兄靖俱避地江東保吴郡爭論於太守許貢座至於手足相及郭璞易洞林曰殷鴻喬令吾作卦得大壯之夬語之云慎勿與許姓者共事田作也必闘相傷殷還宣成遂與許姓共田田熟有所爭此人舉杖欲撞之喬退思中間之戒辭謝僅乃得休夢書曰鶉鷃爲闘夢見鶉鷃憂閑闘也嵇康太師箴曰若㑹酒坐見人爭語其形勢似欲轉盛便當捨去此闘之兆也太平御覽卷第四百九十六
