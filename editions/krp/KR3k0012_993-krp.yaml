front:
  text: 太平御覽卷第九百九十三
  hash: sha256:fa27637d72998dd879696fd03c3fbf2df4e84536c66e7fc210058c849315cd32
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_993-1a}
body:
  text: 藥部十桔梗巴豆鬼臼莽草忍冬淫羊霍狼牙香蒲爵李腐婢落石鬼箭房葵麻黄茈葫亭歴紫苑女萎蓍實地椹黄環莵絲石芸甘遂馬刀女青王孫因塵淮木百部千歳垣中膚皮缺葐蒱隂實桔梗廣雅曰犁如桔梗管子曰五沃之土生桔梗范子計然曰桔梗岀河東洛陽戰國筞曰淳于髠一日而見七士於宣王王曰寡人聞千里之一士是比肩而相望百丗一聖若隨踵而生也今子一朝而見七士士不亦衆乎淳于髠曰夫鳥同翼者聚飛獸同足者俱行今求桔梗於沮澤累丗不能得一之臯黍梁父之隂則却車載耳王求士於髠譬挹水於河取火於燧也建康記曰建康岀桔梗極精好搜神記曰鄱陽趙壽有犬蠱有陳岑詣壽忽有大黄犬六七群岀吠岑後余伯婦與壽婦食吐血幾死屑桔梗以飲之乃愈本草經曰桔梗味辛微温生山谷治胸脅痛膓鳴驚悸生嵩髙呉氏本草經曰桔梗一名符蔰一名白藥一名利如一名梗草一名盧茹神農醫和苦無毒扁鵲黄帝鹹歧伯雲公甘無毒季氏大寒葉如薺苨莖如筆管紫赤二月生巴豆廣雅曰巴菽巴豆也蜀志曰犍爲南安縣岀巴豆晉書曰賈后使太醫令程據合巴豆杏子丸矯詔使黄門孫慮齎至許昌以害太子列仙傳曰玄俗河間人餌巴豆雲英賣一丸七錢盛弘之荆州記曰朐䏰縣有巴子城地多巴豆廣志曰犍爲𤏡道縣岀巴豆愽物志曰䑕食巴豆三年重三十斤本草經曰巴豆一名巴菽味辛温生川谷主治温瘧傷寒熱破癖瘕結堅通六府去惡肉除鬼毒邪注殺蟲生巴蜀郡范子計然曰巴菽出巴郡吴氏本草經曰巴豆一名菽神農歧伯桐君辛有毒黄帝甘有毒李氏主温熱寒葉如大豆八月採鬼臼呉氏本草經曰一名九臼一名天臼一名雀犀一名馬目公一名解毒生九真山谷及冤句二月八月採根莽草范子計然曰莽草岀三輔青色者善淮南萬畢術曰莽草浮魚取莽草葉并陳粟米合濤之以内水魚皆死本草經曰莽草味辛温生山谷治風頭癰乳疝瘕結氣疥瘙疽瘡生還谷呉氏本草經曰莽一名春草神農辛雷公桐君苦有毒生上谷山中或冤句五月採治風忍冬本草經曰忍冬味甘乆服輕身滛羊霍本草經曰淫羊霍一名蜀前味辛寒治隂痿傷中益氣強志除莖痛利小便生上郡陽山呉氏本草經曰淫羊霍神農雷公辛季氏小寒堅骨狼牙本草經曰狼牙一名牙子味寒生川谷治邪氣去白蟲疥痔生淮南建康記曰建康出狼牙范子計然曰狼牙出三輔色白者善呉氏本草經曰狼牙一名支蘭一名狼齒一名犬牙一名抱牙神農黄帝苦有毒桐君鹹歧伯雷公扁鵲苦無毒或生冤句葉青根黄赤六月七月華八月實黒正月八月採根香蒲本草經曰香蒲一名睢蒲味甘平生池澤治五藏心下邪氣堅齒明目聦耳乆服輕身能老生南海呉氏本草曰醮一名醮石一名香蒲神農雷公甘生南海池澤中爵李本草經曰郁核一名爵李腐婢本草經曰腐婢小豆花也落石本草經曰落石一名鯪石味苦温生川谷治風熱乆服輕身明潤目澤好色不老延年生太山呉氏本草經曰落石一名鱗石一名明石一名縣石一名雲華一名雲珠一名雲英一名雲丹神農苦小温雷公苦無毒扁鵲桐君甘無毒季氏大寒云藥中君採無時鬼箭廣雅曰鬼箭神箭也本草經曰衛矛一名鬼箭味苦寒生山谷治女子崩中下血腹滿汗岀除邪殺鬼毒生霍山呉氏本草經曰鬼箭一名衛與神農黄帝桐君苦無毒葉如桃如羽正月二月七月採隂乾或生野田房葵愽物志曰房葵與狼毒相似本草經曰房葵一名犁盖味辛冬生川谷乆服堅骨髓益氣生臨淄呉氏本草經曰房葵一名梁盖一名爵離一名房苑一名晨草一名利如一名方盖神農辛小寒桐君扁鵲無毒歧伯雷公黄帝苦無毒莖葉如葵上黒黄二月生根根大如桔梗根中紅白六月花白七月八月實白三月三日採根麻黄廣雅曰龍沙麻黄也麻黄莖狗骨也本草經曰一名龍沙味苦温生川谷治中風傷寒出汗去熱邪氣破堅積聚生晉地范子計然曰麻黄岀漢中三輔呉氏本草經曰麻黄一名卑相一名卑監神農雷公苦無毒扁鵲酸無毒季氏平或生河東四月立秋採慕容晃與頋和書曰今致麻黄五斤茈葫柴胡二音本草經曰茈葫一名地重味苦平生川谷治心腹祛膓胃結氣乆服輕身明目益精生弘農呉氏本草經曰茈葫一名山來一名如草神農歧伯雷公苦無毒生冤句二月八月採根亭歴爾雅曰蕇音典亭歴實葉皆似芥一名狗薺淮南子曰亭歴冬生周髀曰凡北極左右物有朝生暮穫謂亭歴冬生之類紫苑遊名山志曰石室紫苑呉氏本草經曰紫苑一名青苑女萎本草經曰女萎一名左眄一名玉竹味辛生川谷乆服輕身能老生太山蓍實本草經曰蓍實味苦酸平無毒主益氣充肌膚明目聦慧先知乆服不飢不老輕身生少室山谷八月九月採實日乾地椹本草經曰地椹一名石龍芮一名食果能味苦平生川澤治風寒乆服輕身明目不老生太山范子計然曰石龍芮出三輔色黄者善吴氏本草經曰石龍芮一名薑苔一名天豆神農苦平歧伯酸扁鵲李氏大寒雷公鹹無毒五月五日採黄環本草經曰黄環一名凌泉一名大就味苦生山谷主治蟲毒鬼魅邪氣欬逆寒熱生蜀郡范子計然曰黄環出魏郡黄色者善呉氏本草經曰蜀黄環一名生蒭一名根韭神農黄帝歧伯桐君扁鵲辛一經味苦有毒二月生𥘉出正赤高二尺葉黄貟端大莖葉有汁黄白五月實貟三月採根根黄從理如車輻解治蠱毒莵絲爾雅曰唐蒙女蘿莵絲也廣雅曰女蘿松蘿也菟丘莵絲也史記龜筞傳曰下有伏苓上有莵絲博物志曰女蘿菟絲寄草上根不着地吕氏春秋曰或謂菟絲無根非無根也其不屬也伏苓是也淮南子曰莵絲無根而生伏苓抽莵絲死抱朴子曰案仙方中自有合離草一名獨摇一名離母所以謂之合離下根如芋魁有遊子十二枚周環之大魁數尺雖相湏生而實不連以氣相屬耳如莵絲之草下有茯莵之根無此莵在下則絲不得生於上又曰𥘉生之根其形似兎掘取刻其血以和丹服之立變化在意所作呉氏本草經曰兎絲實一名玉女一名松蘿一名鳥蘿一名鴞蘿一名複實一名赤䋞生山谷劉楨詩曰青青女蘿草上依髙松枝幸蒙庇眷恩爲惠不可訾石芸爾雅曰茢勃茢也郭璞注曰一名石共音列范子計然曰石芸出三輔甘遂廣雅曰陵旱甘遂也建康記曰建康出甘遂本草經曰甘遂味苦寒生川谷治大腹疝瘕脹滿面目浮腫除留飲宿食岀中山范子計然曰甘遂出三輔呉氏本草經曰甘遂一名主田一名日澤一名重澤一名鬼醜一名陵藁一名甘藁一名苦澤神農桐君苦有毒歧伯雷公有毒湏二月八月採馬刀本草經曰馬刀味辛微寒生池澤治𥙷中漏下赤白留寒熱破石淋殺禽獸賊䑕生江海范子計然曰馬刀岀河東呉氏本草經曰馬刀一名齊􅧳古納切神農歧伯桐君鹹有毒扁鵲小寒太毒生池澤江海採無時也女青夲草經曰女青一名雀翾味辛平生山谷治蠱毒逐邪殺鬼生朱崖羅浮山記曰又有男青似女青吴氏本草曰女青一名霍由祇神農黄帝辛夲草經曰王孫味苦平治五藏邪氣濕痺四支疼酸生海西呉氏本草經曰黄孫一名王孫一名蔓延一名公草一名海孫神農雷公苦無毒黄帝甘無毒生西海生谷及汝南城郭垣下􅟵延赤文莖葉相當因塵爾雅曰因塵馬生也本草經曰因塵蒿味苦治風濕寒熱邪氣結黃疽乆服輕身益氣能老生太山吴氏本草曰因塵神農歧伯雷公苦無毒黄帝辛無毒生田中葉如藍十一月採淮木吴氏本草曰淮木神農雷公無毒生晉平陽河東平澤治乆欬上氣傷中羸虚𥙷中益氣百部抱朴子内篇曰百部黄似㧞揳治咳殺風博物志曰百部與門冬相似千歳垣中膚皮吴氏本草曰千歳垣中膚皮得薑赤石脂共治葐爾雅曰茥音奎葐覆葐也實似莓而小可食吴氏本草曰缺一名决盆蒱隂實吴氏本草曰蒱隂實生平谷或圃中延􅟵如瓜葉實如桃七月採止温延年太平御覽卷第九百九十三
