front:
  text: 太平御覽卷第二百七十九
  hash: sha256:88c897897468dd5503c62b4e0a2612037babf12af90f5ed80b2c83dfb618d36c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_279-1a}
body:
  text: 兵部十威名信義威名史記曰李廣居右北平匈奴聞之號曰漢飛將軍避之數嵗不敢入右北平界漢書曰郅都爲鴈門太守匈奴素聞名節舉邊爲引兵去竟都死不近鴈門匈奴爲偶人像都令馳騎射之莫能中者其見憚如此後漢書公孫瓉傳曰瓉字伯珪遼西令支人𥘉平二年青徐黄巾三十万衆入渤海界欲與黒山合瓉率歩騎二万人逆擊於東光南大破之東光令滄州縣斬首三万餘級賊棄輜重數万兩奔走渡河瓉因其半濟薄之賊復大破死者數万流血丹水収得生口七万餘人車甲財物不可勝筭威名大震拜奮武將軍又曰瓉爲降虜校尉討烏桓毎聞有警瓉輙厲色憤怒如赴讎敵望塵奔逐或継之以夜戰虜識聲憚其勇莫敢抗犯又曰瓉征烏桓常與善騎射之士數十人皆乗白馬以爲左右翼自號白馬義從烏桓更相告語避白馬長史乃畫作瓉形馳射之中者咸稱万嵗虜自此之後遂逺竄塞外又曰承宫名播匈奴時北單于遣使求得見宮顯宗勑自整飾宮對曰夷狄眩名非識實者也臣狀醜不可以示逺冝選有威容者續漢書承宫傳曰夷狄聞臣虚稱故欲見臣臣醜陋形寢不如選長有威容者示之也帝乃以大鴻臚魏應代之又曰武王縯音引字伯升丗祖之長兄也慷慨有大節進圍宛城中自號天柱大將軍王莽素聞其名大震懼使長安中宫署及天下郷亭皆畫伯升豫於塾旦起射之東觀漢記曰耿秉性勇壯而簡易於事軍行常自𬒳甲在前休止不結營部然逺斥堠明要誓有警軍陣立成事卒皆樂爲死匈奴聞秉卒舉國號哭魏志曰吕布字奉先便弓馬膂力過人號爲飛將又曰龐徳將所領南屯樊討關羽曰今年我不殺羽羽當殺我親與羽交戰射羽中額時徳常乗白馬羽謂之白馬將又曰張遼爲孫雄所圍遼潰圍出復入雄衆破走由是震威江東兒啼不肯止其父母以遼恐之晉書曰鄧遐勇力絶人氣盖當丗時人方之樊噲桓引以爲叅軍數郡號爲名將宋書曰劉胡夲名拗胡以其顔靣拗黒似胡故以爲名及長以拗胡難道單呼爲胡出身群將捷口善處分稍至隊主討諸蛮往無不捷蠻甚畏憚之小兒啼語之曰劉胡來便即止又曰沈慶之伐沔北結蛮大破之威震諸山群蛮皆稽顙慶之患頭風着狐皮帽群蛮惡之號曰蒼頭公後魏書曰李崇沉深有將略寛厚善御衆在揚州凢經十年常養壯士數千人宼賊侵邊所向摧破號曰卧虎賊甚憚之後周書曰韓杲從大軍破稽胡於北山胡地險阻人迹罕至杲進兵窮討散其種落稽胡憚杲勁徤號爲著翅人太祖聞之笑曰著翅之名寕減飛將又曰蔡祏與齊神武遇戰於邙山祏時著明光鐵鎧所向無前敵人咸曰此是鐡猛獸也皆遽避之又曰裴寛在孔城十三年與齊洛州刺史獨孤永業相對永業有計謀多譎詐或聲言春發秋乃出兵或揜敵消息倐忽而至寛毎揣知其情出兵邀擊無不克之永業常戒其所部曰但好愼孔城自外無足慮其見憚如此又曰怡峯字景阜遼東人也從征役以驍勇聞當時號爲驍將又曰梁武勑蕭續曰賀抜勝北間驍將汝冝愼之又曰郝玼爲刺史始玼以臨涇地冝當畜息蕃戎毎爲宼即屯其地甞白其帥願以城控之前帥不從其後叚祐爲節度使玭復白祐祐多其䇿乃表請城之故詔玼鎮其地自是西戎無敢犯涇者玼自行間前無強敵在邊上三十年生得蕃人輙刳剔而歸其屍蕃人畏之如神下令得玼者賞以等身金蕃中小兒啼號者但連呼郝玼以怖之又曰張万福帶和州刺史鎮咸陽因留宿衛李正巳反將断江淮路令兵守埇橋渦口淮進奉舡千餘隻江泊渦下不敢過德宗以万福爲濠州刺史召見謂曰先帝改作名正者所以褒卿也朕以爲江淮草木亦知卿名若從先帝所改恐賊不知是卿也復賜名万福慰遣之万福馳至渦口立馬岸上發進奉舡淄青兵馬倚岸睥睨不敢動諸道舡繼進呉越春秋曰呉公子慶忌呉王僚子也勇捷爲人所聞筋力果勁万人之敵也丗說曰桓石虎小字鎮惡常從征枋頭車騎冲没左右莫能先救宣武問汝叔落賊汝知否虎聞氣甚奮䇿馬於万衆中置冲還三軍歎服河朔遂以其威時有患瘧者怖之多愈因斷瘧焉燉煌實録曰宋質直破虜有威名兒啼恐之即止虜相恚曰使汝行逢宋都督信義左傳曰曹衞告絶於楚子玉怒從晉師晉退軍吏曰以君避臣辱也且楚師老矣何故退子犯曰師直爲壯曲爲老豈在乆乎微楚之惠不及此重耳過楚楚成王有贈送之惠退三舎避之所以報也一舍三十里初楚子云若反國何以報我故以退三舎爲報又曰晉文公圍原命三曰之粮原不降命去之諜出曰原將降矣軍吏請待公曰信國之寳也民之所庇也得原失信何以庇之所亡滋多退三舎而原降又曰晋將荀呉伐鮮虞圍鼓鼔白狄之别也鼓人或請以城叛呉曰吾聞諸叔向好惡不愆民知所適事無不濟也愆過適㱕或以吾城叛吾所甚惡也人以城來吾獨何好焉賞所甚惡若所好何無復加所好也若其弗賞是失信也何以庇民力能則進否則退量力而行吾不可以欲城而邇姦也所喪滋多使鼓人殺叛人而繕守備圍鼓三月鼓人或請降使其民見曰猶有食色軍吏曰獲城而不取勤民而頓兵何以事君呉曰所以事君也獲一邑而教民怠將焉用邑邑以賈怠不如完舊完猶保守也賈音估完户官切賈怠無卒卒終棄舊不祥鼓人能事其君我亦能事吾君德義不爽爽差好惡不愆城可獲而民知義所知義所在也荀呉必其能獲故因以示義有死命而無二心不亦可乎鼓人告食竭力盡而後取之尅鼔而返不戮一人史記曰秦末天下兵起范増說項梁曰陳勝敗固當夫秦滅六國楚最無罪自懷王入秦不返楚人憐之至今曰楚雖三户亡秦必楚今陳勝首事不立楚後而自立其勢不長今君起江楚蜂起之將皆争附君者以君丗丗楚將爲能復立楚之後也乃求楚懷王孫心立爲懷王以從民欲也又曰漢楚相持之際項羽擊陳留外黄外黄不下數日降羽悉令男子年十五以上詣城東欲坑之外黄令舎人兒年十三令之舎人兒也以其㓜弱故孫其父徃說羽曰彭越強刼外黄強音其兩反外黄恐故且降待大王大王至又皆坑之百姓豈有所歸心哉從此以東梁地十餘城皆恐莫肯下矣羽然其言迺赦外黄當坑者而東至睢陽聞之皆争下又曰漢王至洛陽新城三老董公遮說漢王以義帝死請發喪漢王從之髙祖大哭遂爲義帝發喪臨三日發使者告諸侯曰天下共立義帝北靣事之今項王放殺義帝江南大逆無道寡人親爲發喪諸侯皆縞素發國内兵収三河士南浮江漢以下願從諸侯王擊楚之殺義帝者於是諸侯多從之後漢書曰更始𥘉光武爲蕭王定河北諸賊銅馬餘衆降封其渠帥爲列侯降者猶不自安光武知其意令各歸營勒兵乃自乘輕騎案行部陣降者更相語曰蕭王推赤心置人腹中安得不投死乎投死猶言致也由是皆服蜀志曰明帝自征蜀至長安遣張郃諸軍勁卒四十餘万向劒閣諸葛亮有戰士万二千時魏軍始陣兵適交叅佐咸以敵衆強多非力所制控權停下兵并聲勢亮曰吾聞用武行師以大信爲夲得原失信古人所惜去者束裝以待期妻子企踵而計日乃勑速遣於是去者感恱願留一戰徃者憤踊咸思致命臨戰之日莫不抜刄争先以一當十殺張郃却司馬宣王一戰大尅此之由也呉志曰孫皎嘗遣兵候魏獲魏邊將吏美女以進皎皎更其衣服送還之也晉書曰武帝有㓕呉之志以羊祐爲督荆州諸軍事假節散騎常侍衛將軍如故祜率營兵出鎮南夏開設庠序綏懷逺近得江漢之心與呉人開布大信降者欲去皆聽之又曰羊祜爲征南大將軍督荆州諸軍事祜以孟獻營武牢而鄭人懼晏嬰城東陽而萊子服乃進據險要開建五城収膏腴之地奪呉人之資石城以西盡爲晉有自是前後降者不絶乃増修德信以懷柔𥘉附慨然有吞呉之心毎與呉人交兵尅日方戰不爲掩襲之計將帥有欲進譎詐之䇿者輙飲以醇酒使不得言人有掠呉二兒爲俘者祜遣送還其家後呉將夏詳邵頭等來降二兒之父亦率其屬與俱呉將陳尚潘景來宼祜追斬之美其死節而厚加殯歛景尚子弟迎喪祜以禮遣還呉將鄧香掠夏口祜募生縳香旣至宥之香感其恩率部曲而降祜出軍行呉境刈糓爲粮皆計所侵送絹償之毎㑹衆江沔遊獵常止晉境若禽獸先爲呉人所傷而爲晉兵所得者皆封還之於是呉人翕然恱服稱爲羊公不之名也祜與陸抗相對使命交通抗稱祜之徳量雖樂毅諸葛孔明不能過也抗嘗病祐饋之藥抗服之無疑心士多諌抗抗曰羊祜豈酖人者時談以爲華元子反復見於今抗毎告其戍曰彼專爲德我專爲暴是不戰而自服也各保分界而巳無求細利孫皓聞二境交和以詰抗抗曰一邑一郷不可以無信義况大國乎臣不如此正是彰其徳於祜無傷也又曰羊祜在軍常輕裘緩帶身不𬒳甲鈴閤之下侍衛者不過十數又曰劉道規爲荆州刺史桓玄餘黨荀林屯江津桓謙軍屯枝江二宼交逼乆絶都邑之問荆楚旣桓氏義舊並懷異心道規乃㑹將士告之曰桓謙今在近畿聞諸君頗有去就之計吾東來文武足以濟事若欲去者夲不相禁因夜開城門逹暁不閉衆咸憚服莫有去者又曰劉𥙿爲將北伐後秦姚泓烏宏反以擅道濟爲前鋒至洛陽凢㧞城破壘俘四千餘人議者謂應以戮爲京觀道濟曰伐罪吊民正在今日皆釋而遣之於是戎夷感恱相率歸之者甚衆崔鴻後燕録曰遣將慕容白曜伐宋無塩城尅之將盡以其人爲軍實副將酈範酈音暦也曰齊四履之地號爲東秦不逺爲經略恐未可定也今皇威始𬒳民無霑澤連城有懷二之將比邑有拒守之失冝先信義示之䡄物然後民心可懷二州可定白曜從之進次肥城白曜將攻之範曰肥城雖小攻則淹日得之無益軍聲失之有損威勢且無塩之卒死者塗炭成敗之機足爲鑒矣若飛書告喻可不攻自伏縱其不降亦當逃散白曜乃以書曉之肥城果潰也北史曰西魏將王羆之守華州也今馮翊部西魏師與東魏師戰河橋不利東魏卒趙青雀據長安城所在莫有固志羆乃大開州門召城中軍民謂之曰如聞天子敗績不知吉㐫諸人相驚咸有異心王羆受委於此以死報恩諸人若有異圖可來見殺必恐城䧟没者亦任出城如有忠誠能與王羆同心者可共固守軍民見其誠信皆無異志後魏書曰李爲爲荆州刺史輕將數十騎到上洛宣詔綏慰當即帖然㝷勒邊戍掠得蕭賾人者悉令還之南人感德仍送荆州之口二百許兩境交和無復烽燧之警隋書曰桂州人李光仕舉兵作亂隋將周法尚討之光仕帥勁兵保白石洞法尚捕得其弟光略光度大獲家口其黨有來降附輙以妻子還之居旬日降者數千人法尚遣兵列陣以當光仕親率奇兵蔽林設伏兩陣始交法尚馳擊其栅栅中人皆走敗光仕大潰追斬之唐書曰武德中李靖旣尅江陵降蕭銑時諸將咸云銑之將帥與官軍拒戰罪狀旣重請籍没其家以賞將士靖曰王者之師義在吊罰且犬吠非其主無容同叛逆之科此蒯通所以免大戮於漢祖也今新定荆郢冝弘寛大以慰逺近之心降而籍之恐非救焚拯溺之義但恐自此南城鎮各堅守不下非計之善於是遂止江漢之城聞之莫不争下又曰裴度旣平淮西蔡人大恱舊令途無偶語夜不燃燭人或以酒食相過從者以軍法論度乃約法唯盗鬪殺外餘盡除之其徃來者不復以晝夜爲限於是蔡之遺黎始知有生人之樂又曰裴度旣平淮西以蔡卒爲牙兵或以爲反側之子其心未安不可自去其備度笑而荅曰吾受命爲彰義軍節度使元惡就擒蔡人即吾人也蔡之父老無不感泣申光之民即時平定又曰李愬襲蔡州旣獲李祐又解其縛而客禮之愬乘間常召祐及人而語義亦降將也夲名憲愬改之軍中多以諌愬愬益親祐始募敢死者三十人以爲突將愬自教習之將襲元濟㑹雨水自五月至七月所在陂澤潰溢不可行營諸軍皆以愬不殺祐爲言慮其誘覆官軍簡牒日至且言得賊諜具事愬無以止之乃持祐泣曰豈天不欲平此賊何尓我一身而見奪於衆口愬亦慮諸軍先以謗聞則不能全之矣乃械祐送京師先表請釋且言必殺祐則無與成功者比至京詔釋以還愬愬喜甚署爲散兵馬使授刀佩之夜則倚以廵警或使入愬帳中言事愬因留對舉酒往往逹旦竊聽者時聞祐泣涕聲㝷署爲六院兵馬使說苑曰晉文公伐楚歸國行賞狐偃爲首或曰城濮之事先􅎮之謀文公曰城濮之事偃說我無失信不背三舎之約先􅎮所謀軍事吾用之以勝然此一時之說偃言万丗之功奈何以一時之利而加万丗功乎是以先之衆人恱服莊子曰市南冝僚弄丸兩家之難解孫叔敖秉羽而郢人投兵彪曰冝僚善弄丸白公脅之弄丸如故孫叔敖秉羽之舞郢人無所攻故投兵韓詩外傳曰簡子薨未葬中羊叛之葬五日興師攻之圍未匝而城自壞者十文襄子擊金而退之曰吾聞君子不承人於利不阨人於險使脩其城然後攻之中牟聞其義請降吕氏春秋曰夏后與有扈戰於甘澤而不勝曰戰而不勝是吾德薄而教不善也於是處不重席食不貳味琴瑟不脩女子不飾尊賢使能朞年而有扈氏服太平御覽卷第二百七十九
