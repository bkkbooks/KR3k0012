front:
  text: 太平御覽卷第六百
  hash: sha256:481ca7fab966e9e6579cd192ebc2736afebcd11deab75007931192f5bfbf9d6d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_600-1a}
body:
  text: 文部十六思疾思遟思疾漢書曰枚臯年十七上書曰自陳乗之子上得大喜武帝春秋二十九乃得皇太子臯與東方朔作皇太子生賦臯爲文疾受詔輙成司馬相如善爲文而遟故所作少亦具賦門中又曰淮南王安作内篇新出上愛祕之使作離騷傳且受詔日食時上魏志曰陳思王植年十餘歳讀誦持論及辭賦數萬言善屬文太祖嘗視其文謂植曰汝倩人耳植跪曰出言爲論下筆成章願當靣試柰何倩人時銅雀臺新成太祖悉將諸子登臺使各爲詩植援筆立成太祖異之文帝嘗欲害植以其無罪令植七歩爲詩若不成加軍法植即應聲曰煑豆燃豆箕豆在釡中泣夲是同根生相煎何太急文帝善之又曰王粲善屬文舉筆便成無所改定人常以爲宿構齊書曰蕭文琰蘭陵人丘令揩呉興人江珙音拱濟陽人竟陵王子良嘗夜集學士刻燭爲詩四韻者刻一寸以此爲率文琰曰頓燒一寸燭成四韻詩何難之有乃與丘令揩江珙等共打銅鉢立韻響滅則詩成皆可觀覽又曰髙祖目裴子野曰其形甚弱其文甚壯俄又勑爲書喻魏相文其夜受旨子野謂可待旦方奏未之爲也及五鼓勑促令送上子野徐起操筆昧爽便就旣奏髙祖深嘉焉自是凢文檄皆令具草南史曰朱异音怡又音異遷散騎常侍异容皃魁梧能舉止雖出自諸生甚閑軍國故實自周捨卒後异代掌機宻其軍旅謀謨方鎮改換朝儀國典詔誥勑書並典掌之四方表䟽當局簿領諮詳請斷填委於前异屬辭落𥿄覽事下議縱横敏贍不暫停筆頃刻之間諸事便了又曰蔡景暦陳武帝鎮朱方素聞其名以書要之景歴對使人荅書筆不停綴文無所改帝得書甚加欽賞即日板授北府中記室叅軍崔鴻十六國春秋南凉録曰秃髮傉内㓇切檀子禮年十三命爲髙昌殿賦援筆即成影不移漏傉檀覽而異之擬於曹子建北齊書曰魏収鉅鹿人以文章見知曽奉詔爲封禪文収對曰封禪者帝之盛事昔司馬長卿尚絶筆於此以臣下材何敢擬議臣雖愚淺敢不竭作乃於御前下筆便就不立藁草文將千言黄門侍郎賈思問侍立深竒之白帝曰雖七歩之才無以過此自武定二年以後國家大事詔命軍國文詞皆収所作每有警急不停有同宿構速敏之工邢温之所不逮梁書范雲少機警其識具善屬文便尺牘下筆輙成未嘗定藁時人疑其宿構蕭介傳曰𥘉武帝延後進二十餘人置酒賦詩臧盾以詩不成罰酒一斗盾飲盡顔色不變言笑自若介染翰便成文無加點帝兩美之曰臧盾之飲蕭介之文即席之美也三國畧曰髙澄嗣渤海王聞謝挺徐陵來聘遣中書侍郎陸昂於滑臺迎勞於席賦詩昂必先成雖未能盡工亦以敏速見美梁庾肩吾少勤學能鼓琴善屬文宋子仙破㑹稽購得肩吾謂之曰吾昔聞汝能作詩今可作若能當貰汝命肩吾便操筆立成詩曰髪與年俱暮愁將罪共深聊持轉風燭蹔映廣陵琴子仙乃釋之又曰隂鑑字子堅梁右衛將軍子春之子也徐陵言之於陳主陳主召使賦新成安樂宫鏗援筆便就陳主甚歎賞之北史曰隋韋正玄舉秀才楊素志在試退乃手題使擬司馬相如上林賦王褒聖主得賢臣頌班固燕然山銘張載劒閣銘白鸚鵡賦謂曰我不能爲君住宿可至未時令就玄正及時並了素讀數遍大驚隋書曰楊素周武帝以爲車騎大將軍儀同三司漸見禮遇帝命素爲詔書下筆立成詞義兼美帝嘉之頋謂素曰善自勉之勿憂不冨貴素應聲荅曰臣但恐冨貴來逼臣臣無心圖富貴唐書曰太宗征遼岑文本卒于行驛召許敬宗令草駐􅵖山破賊詔書敬宗立於馬前俄項而就詞甚典麗深見嗟賞唐賀知章晚年尤加縱誕無復規撿自號四明狂客遨遊里巷醉後屬詞動成卷軸文不加點咸有可觀又曰王勮其御切長壽中累除太子典膳丞知鳯閣舎人事時壽春王成器衡陽王成義五王𥘉出閣同日受冊有司撰儀注不載冊文及百寮在列方知闕禮宰臣相頋失色勮立召小吏五人各執筆口授分授冩一時俱畢詞理典贍時人歎服之㝷除鳯閣舎人兼弘文館學士又曰韋承慶遷鳯閣舎人兼掌天官選事承慶屬文敏捷雖軍國大事下筆輙成未嘗起草又曰遜逖㓜而英俊文思敏速始年十五謁雍州長史崔日用日用小之令爲土火爐賦握翰即成辭理典贍曰用覽之駭然遂爲忘年之交以是價譽益重又曰玄宗度曲欲造樂府新詞亟召李白白嗜酒已卧於肆矣召入以水灑靣即令秉筆頃之成十餘章帝頗嘉之又曰韋温綬之子也以書判拔萃調𥙷祕書省校書郎時綬致仕田園聞温登第愕然曰判入髙等在群士之上得非交結權幸而致耶令設席於庭自出判目試兩節温命筆即成綬喜曰此無愧也李端登進士第工詩大曆中與韓翃錢起盧綸等文詠唱和馳名都下號大曆中十才子時郭尚父少子曖尚代宗昇平公主賢明有才思尤喜詩人而端等十人多在曖之門下毎宴集賦詩公主坐視簾中詩之美者賞曖因拜官㑹十子曰詩先成者賞時端先獻警句云薫香荀令偏憐小傳粉何郎不解愁主即以百縑賞之錢起曰李校書誠有才此篇宿構也願賦一韻正之請以起姓爲韻端即襞牋而獻曰方塘似鏡草芊芊𥘉月如鈎未上弦新開金埒教調馬舊賜銅山許鑄錢曖曰此愈工也令狐楚爲太原從事自掌書記至節度判宮歷使下侍御史楚才思俊麗德宗好文毎太原奏至能辦楚之所爲頗稱之鄭儋都含切在鎭暴卒不及處分從事軍中喧譁將有急變中夜忽十數騎持刃迫楚至軍門諸將環之令草遺表楚在白刃之中榒管即成讀示三軍無不感泣軍情乃安自是聲名益重唐中書舎人陸扆文思敏速𥘉無思慮揮翰如飛文理具愜同舎服其能天子頋待特異嘗金鑾作賦命學士和扆先成帝覽而嗟挹之曰朕聞貞元時有陸贄呉通玄兄弟能作内廷文書後來絶不相繼今吾得卿斯文不墜矣又曰李巨川登進士第巨川乾符中應進士屬天下大亂流離奔播切於禄仕乃以刀筆從諸侯府王重榮鎮河中辟爲掌書記時車駕在蜀賊據京師重榮匡合諸潘叶力弥㓂軍書奏請堆案盈几巨川文思敏速翰動如飛傳之藩隣无不聳動重榮収復之功巨川之助也及重榮爲部下所朝議罪叅佐貶爲漢中掾時楊守亮帥興元素知之聞巨川至喜謂客曰天以李書記遺我也即命管記室累遷幕職金樓子曰劉備叛走曹操使阮瑀爲書與備馬上立成有以此爲能者吾以爲兒戯耳文士傳曰劉楨坐厨人進瓜楨爲賦立成又曰潘尼曽與同僚飲主人有流璃盆使客賦之尼於坐立成國朝傳記曰李德林爲内史令與楊素共執朝政素功臣豪侈後房婦女錦衣玉食千人德林子百藥夜入其室則其寵妾所召也素拘執於庭將斬之百藥年未二十儀神儁秀素意惜之曰聞汝善爲文所作詩自叙稱吾意者當兔汝死解縳授以𥿄筆立就素覽之欣然以妾與之并資從數千萬楊德祖荅臨淄侯牋曰又嘗親見執事握牘持筆有所造作若成誦在心借書於手曽不斯湏少留思慮仲尼日月無得而踰焉脩之仰望殆如此矣且以對鶡而作暑賦弥日而不獻見西施之容歸憎其白者也曹植曽作鶡鳥賦命脩作脩辭不爲也又命作暑賦脩雖造終日不敢獻思遟西京雜記曰枚臯文章敏疾長卿製作淹遟而盡延譽然長卿首尾温麗枚臯時有累句故知疾行無善迹矣楊子雲曰軍旅之際戎馬之間飛書走檄而用枚臯廊廟之下朝廷之中文髙典冊而用相如後漢書曰張衡字平子少遊大學善屬文太始時天下自公侯以下莫不踰侈衡乃擬班固兩都遂作二京賦因以諷諌思十年始成魏志曰甘露二年帝幸辟雍㑹命群臣賦詩侍中和逌音由尚書陳騫等制作稽留有司奏免官詔曰吾以門昧愛好文雅廣延詩賦以知得失乃爾紛紜良用惻然乃共原逌等晉書曰左思字太冲齊郡臨淄人思少而好學年四十未仕潜思爲三都賦十年而成貴勢之家競傳相冩又案郭伯通衛瓘爲思傳曰思爲三都改易死乃止宋書曰顔延之與陳郡謝靈運俱以詞彩齊名而遟速懸絶文帝嘗各勑擬樂府北上篇延之受詔輙成靈運乆之乃就梁書曰武帝宴壽光殿令劉孑焉正張率賦詩時率與孑焉正並未及成帝取孑焉正手板戯題之曰張率東南美劉孑焉正洛陽才覽筆便應就何事乆遟廻隋書曰薛道衡授内史侍郎加上儀同三司道衡每至構文必隱空齊蹋壁而卧聞户外有人便怒其沉思如此李翰天寳中寓居陽翟爲文精宻用思苦澁常從陽翟令皇甫曽求音樂毎思涸則奏樂神逸則著文唐李建字杓直德宗聞其名擢充翰林學士未幾罷爲它官髙郢爲御史大夫表授殿中侍御四遷兵部郎中知制誥自以草詔思遟不願當其任談藪曰盧思道與庾知禮作詩知禮詩成而思道未就知禮曰盧詩何太春日思道曰自許編苫疾如他織錦遟太平御覽卷第六百
