front:
  text: 太平御覽卷第六百九十九
  hash: sha256:aa8fe159fe7428545e49969ad88c3ddcccc3c2a356b45a3e5e2750250c3d9326
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_699-1a}
body:
  text: 服用部一帳幔幌幬牀幨青廬帳釋名曰帳張也張施於牀上也小帳曰斗形如覆斗也尔雅曰幬謂之帳史記曰丞相公孫弘燕見上或時不冠至如汲黯不冠不見也上嘗坐武帳中黯前奏事上不冠望見黯避帳中使人可其奏其見敬禮如此漢書曰東方朔曰陛下誠能用臣朔之計推甲乙之帳甲乙帳名瓉曰造甲乙之帳終以隨珠燔之於四達之衢東觀漢記曰馮魴永平中上行幸諸國勑魴車駕發後將緹騎宿玄武門複道上詔南宫複道多悪風寒老人居之且病靡音肥風病苦内者多取惟悵東西竟塞諸䆫望令致宻漢官儀曰祭天有紺幄帳魏略曰大秦國金織成五色帳又以明月夜光珠爲帳又呉時外國傳云斯條國王作白珠交結帳魏志曰吕布將辭袁紹還洛紹欲殺之明日當發紹遣甲兵三十人辭以送布布使止於帳側僞使人於帳中鼓筝紹兵卧布無何岀去而兵不覺夜半兵起亂斫布床𬒳謂爲巳死明旦紹訊問知布尚在事見樂部又曰太祖幃壞即𥙷納又曰典韋拜都尉太祖引置左右將親兵數百人常繞帳晝立侍終日夜宿帳左右又曰曹爽從帝朝髙平陵司馬宣王語弟孚曰陛下在外不可露宿促送帳幔詣行在所也又曰吐谷渾王河南其國多善馬有屋宇雜以百子帳即穹廬也隋書曰煬帝北巡欲誇戎狄令宇文愷爲大帳其下坐數千人帝大恱賜物千叚又造觀風行殿上容侍衛者數百人離合爲之下施輪軸推移倐忽有若神功戎狄見之莫不驚駭唐書曰髙祖時呉王杜伏威獻竹帳上以勞人不受又曰始畢可汗衙帳無故自破高祖曰此何祥也内史令蕭瑀進曰昔魏文帝幸許昌城門無故自壞帝悪之而返其年文帝崩始畢帳壞即其類也髙祖然之抱朴子曰蔡伯喈到江東得論衡中國諸儒覺其談論更逺嫌得異書求其帳中隱處果得之傳子曰太祖武皇帝魏武帝愍嫁娶之僣上公主適人不過皂帳郭子曰許侍中頋司空俱作王丞相從事常夜在丞相許戲二人歡極丞相便使入巳帳中眠頋至曉猶展轉不得熟寐許上床便大鼾丞相語諸客曰此中亦是難眠處耳東宮舊事曰皇太子納妃有熟絳綾帳絳絹幄又曰東齊夏施烏紗單帳四率坊洗馬坊烏練帳三輔事曰秦時奢侈綈帳綺繡土木朱紫漢武故事曰上以瑠璃珠玉明月夜光雜錯天下珎寳爲甲帳其次爲乙帳甲以居神乙以自居桓譚新論曰李少君置武帝李夫人神影於帳中令帝觀見之燕丹太子曰秦始皇置髙漸離於帳中擊筑又時外國傳曰斯調王作白珠交結帳金牀上天笁佛精舎天笁王見珠圎好意欲留焉臣下諫乃止拾遺録曰蜀先主甘后坐於白絹帳中於外望之如月下聚雪益部耆舊傳曰翟酺上事云漢文帝連上事書囊以爲帳惡聞紈素之聲神仙傳曰茅君當受神靈之職衆賔皆至忽然有素縑帳於屋下敷數重白氈金案玉柸人皆飽醉又曰茅君仙去民爲立廟茅在帳中與人言鄴中記曰石虎御床辟方三丈冬月施熟錦流蘇斗帳四角安純金龍頭衘五色流蘇或用青綈光錦或用緋綈登髙文錦或用紫綈大小錦絮以房子錦百二十斤白綈爲裏名爲裏複帳帳四角安純金銀鑿金香爐以石墨燒集和名香帳頂上安金蓮花花中懸金薄織成椀囊春秋但錦帳表以五色緫爲夾帳夏用紗羅或綦文丹羅或紫縠文爲單帳鄧德明南康記曰陽道士葬巖室經數年尸猶儼然葛帳覆之幽明録曰晉朱黄祖奉親至孝母病篤天漢開明有一老翁將小兒持箱自通即以兩丸藥賜母服之患頓消因停宿夜中㕔事上有五色氣祭天琴歌清好祖徃視之翁坐斗帳裹四角及頂上各有一大珠形如鵝子明彩炫耀馬融別傳曰融爲通儒善鼓琴好吹笛逹生任性不拘儒者節居宇器服多在侈飾常坐髙堂施絳紗帳前授生徒後列女樂弟子次相傳授鮮有入其室者風俗通曰靈帝好胡服帳京師皆竟爲之後董卓擁胡兵掠宫掖語林曰劉植詣石崇如厠見有絳文帳大牀茵褥甚麗不得行乃更如他厠俗說曰桓玄在南州妾當産畏風應須帳桓曰不湏作帳可以到夫人故帳與之丗說曰郗超爲桓温叅軍時謝安王坦之嘗詣温温令超帳中卧聽論事風動帳開見超安笑曰郄生可謂入幕之賔矣又曰卞範爲丹陽羊孚於南州蹔還徃卞許云卞疾動不堪坐卞便開帳􅰩褥羊逕上卞大床枕入𬒳下乃迴坐傾膝移辰逹暮羊去卞執手曰我弟一理其卿卿莫負我魏武遺令曰吾與妓女皆着銅雀臺上施六尺牀練帳月朝十五輙向帳作樂古詩曰紅羅複斗帳四角垂香囊柴子大七折曰錦衾内設羅幬繢帳也江淹别賦曰春宫悶此青苔色秋帳含兹明月光孔稚珪北山文曰蕙帳空兮夜鶴怨山人去兮暁猨驚離騷曰翡翠羽帳飾髙堂劉玄休詩曰羅帳延秋月幔說文曰幔幕也釋名曰幔幔相連綴之言也廣雅曰幔掩也東觀漢記曰岑彭與呉漢圍隗囂壅谷水以縑幔盛土爲堤灌城宋書曰晉安王子勛叛逆取所乗車除脚以爲輦其夕有鴞集其幔梁書曰曹景宗爲揚州刺史性躁動不能沉黙岀行常欲褰車帷幔左右輙諌以位望隆重人所具瞻不冝然景宗謂所親曰我昔在郷里平澤中逐麞數助射之此樂使人忘死不知老之將至今來楊州作貴人動轉不得路行開車幔小人輙言不可開置車中如三日新婦此悒悒使人無氣又曰栁惔音談甚重婦頗成畏憚性愛音樂女妓精麗畧不敢視僕射張稷與惔狎宻而爲惔妻賞敬稷每詣惔必先相聞夫人惔每欲見妓但因稷請奏其妻隔幔坐妓然後出惔因得留目六韜曰將冬不服裘夏不操扇天雨不張帳盖名曰禮將不躬禮無以知士卒寒暑也軍令曰戰時皆取舡上布幔布衣漬水中積聚之賊有炬火火箭以掩滅之拾遺録曰周穆王時鸞章錦幔者摩連國獻焉錦文如鸞翔又曰呉主趙夫人巧妙無雙權居昭陽宫倦暑乃褰紫絹之帷夫人曰此不足貴也權使夫人厝其思焉荅曰妄欲窮慮盡思能使下絹帷而清風自入視外無有蔽礙列侍者飄然自凉若馭風而行權稱善夫人乃扸髮以神膠續之神膠出鬰夷國接弓弩之弦百絶百續乃織爲羅縠累月而成裁之爲幔内外視之飄飄如煙氣輕動而房内自凉時權尚軍旅常以此幔自隨以爲征幕舒之則廣縱一丈卷之内文漆忱中謂之絲絶秦記曰符堅以太常韋逞母宋傳其父業得周官音義乃就家立講堂書生百人隔紗幔而授業焉陸機别傳曰機夢黒幔繞車手决不開至明見誅丗說曰庾太尉亮有兒年數歲温太真常隱幔怛怛驚也之此兒神色恬然乃徐跪曰君侯何以爲論者乃謂不减亮王融詠幔詩曰幸得與珠綴羃歴君之楹日暎不辭卷風來輙自輕每聚金鑪氣時駐玉琴聲但願置撙酒蘭釭當夜明幌說文作櫎說文曰櫎帷屏風之屬晉惠帝起居注曰有雲母幌鄴中記曰石虎太武殿西有崑華殿閣上輙開大䆫皆絳紗幌華延雋洛陽記曰洛陽城十八觀皆籠雲母幌幬說文曰幬單帳也謝承後漢書曰黄昌夏多蚊貧無幬傭債爲作幬又曰羊續爲廬江太守卧一幅布幬幬穿敗糊𥿄𥙷之淮南子曰楚將子發求伎道之士楚有善爲偷者願以伎自効子發禮之後齊伐楚偷乃夜解齊將之幬獻之子發因複還之齊將懼而退楚辭曰翡翠幬髙堂紗版玄玉梁又曰翡翠珠𬒳𬒳爛衾齊光弱何拂壁羅幬張馬融廣成頌曰張雲㠶施蜺幬曹植九詠曰蕙幬兮荃牀牀幨通俗文曰障牀曰幨昌塩切釋名曰牀前帷曰幨幨垂也東宫舊事曰皇大子納妃有録石綺絹裏牀幨二青廬丗說曰魏武帝少時常與袁紹好爲遊俠觀人新婚因潜入主人園中夜叫呼云偷青廬中人皆岀觀帝乃抽刀刼新婦與紹還岀失道棘林中紹不能動帝復大叫偷人今在此紹惶迫自擲岀遂俱免唐書曰建中中議公主岀降之儀曰近代設氊帳擇地而置此乃北胡穹廬之制不可以爲佳冝於堂室中置帳以紫綾縵爲之太平御覽卷第六百九十九
