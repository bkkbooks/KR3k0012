front:
  text: 太平御覧卷第八百三十七百榖部一
  hash: sha256:0c43b0916a1c19d73934cdfc945b72a31adc931c809f463524fb200d258e693a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_837-1a}
body:
  text: 榖周易曰日月麗乎天百榖草木麗乎土尚書曰稷降播種農食嘉穀毛詩谷風信南山曰旣沾旣足生我百榖毛詩甫田曰播厥百榖旣庭且碩曽孫是若周禮天官曰太宰以九職任萬民一曰三農生九穀鄭曰農云九榖稷黍秫稻麻大小豆大小麦凡王之膳食用六穀鄭司農云稻黍稷梁麥菰菰彫胡也藥養其病鄭玄注五榖麻黍稷麥豆又夏官曰職方氏掌天下之圗辯其邦國都鄙九榖之數楊州荆州其榖冝稻䂊州并州其糓冝五稷鄭玄云黍稷麥稻菽青州其榖冝稻麥兖州其穀冝四種黍稷稻麥雍州冀州其榖冝稷幽州其榖冝三種稷黍稻禮記月令曰孟春天子乃以元日祈榖于上帝孟夏驅獸無害五榖獸䴢鹿之屬食糓苗驅之令勿害也孟秋農乃登穀天子甞新先薦寢廟黍稷之屬於是始熟又王制曰五榖不時不鬻於市又樂記曰夫古者天地順而四時當民有德而五榖昌疾疹不作而無妖祥德盛而教尊五榖時熟然後賞之以樂大戴禮曰黄帝播百榖草木節用水火財物生而民得其利百年民畏其神百年亡而民用其敎百年故曰三百年又曰食氣者神明而壽食榖者智惠而考不食者不死禮斗威儀曰君乗木而王則草木豐茂嘉榖並生也左傳襄公曰㤗伯之弟鍼謂趙文子曰鍼聞之國無道年榖和熟天賛之也鮮不五稔又曰晉范宣子爲政賦黍苗季武子興再拜稽首曰小國之仰大國也如百榖之仰膏雨也榖梁傳襄公二十四年曰京師大飢五榖不升爲大飢升成也一榖不升謂之嗛嗛不足貌二榖不升謂之飢三穀不升謂之饉四榖不升謂之康康虐也五榖不升謂之大侵春秋繁露曰金干土則五榖傷土干金則五榖不成春秋佐助期曰咸池主五榖爾雅曰中有岱岳與其五榖魚鹽生焉榖不熟爲飢仍飢爲荐郭璞注曰言㤗山有魚鹽之饒也不熟五榖不成荐連歲不成也周書曰凡禾麥居東方黍居南方稻居中央粟居西方菽居北方史記曰黃帝考定星暦立五行民神易業敬而不黷故神降之嘉生嘉榖也又曰齊桓公欲封禪管仲曰今鳯皇不來嘉榖不生而還蓬蒿䔧莠茂鴟梟數至又曰留侯性多病即導引不食榖服辟榖藥而靜居行氣漢書晁錯曰粟米布帛生於地長於是聚於力非可一日成也數石之重中人弗勝不爲姧邪所利一日弗得而飢寒至是故明君貴五穀而賤金玉今海内爲一土地人民之衆不減湯禹加以亡天灾數年之旱而蓄積之未及也何也地有遺利民有餘力生榖之土未盡墾山澤之利未盡出也游食之人未盡歸農也又曰宣帝即位歲數豐穰榖至石五錢東觀漢記曰永平十五年上始欲征匈奴與竇固等議出兵調度皆以爲塞外草美可不須榖馬案軍出塞無穀馬故事馬防言常與榖上曰何以言之防對曰宣帝時五帝出征案其奏言匈奴候騎得漢矢見其中有粟知漢兵出以故引去以是言之馬當與榖上善其用意微緻即下調馬穀防遂見親也又曰建武𥘉榖食尚少趙孝得榖炊將熟令弟禮夫妻岀北還孝夫妻共𬞞食茹菜禮夫妻來輙獨飴之積乆禮心疑恡後同掩見亦不復肯岀兄弟怡怡鄉里歸德華嶠後漢書曰馬援在河西有榖數萬斛乃歎曰凡殖財者貴以施也否則守錢虜耳袁宏漢紀曰赤眉亂後關中大饑黄金一斤易五升榖後漢書曰董卓築塢於郿髙原七丈號曰萬歲塢今案塢舊基高一丈周廻一里一百歩也積穀爲三十年儲自云事成雄據天下不成守此足以畢老又曰王莽末天下大飢建武二年天下野穀旅生麻菽尤盛魏志曰自遭荒亂率乏糧榖曹公曰夫定國之術在於強兵足食秦人以急農兼天下孝武以屯田定西域此先丗之良式也是歳乃募民屯田許下得榖百萬斛於是郡列置田官所在積榖又曰袁曜卿爲魏國郎中令及卒太祖爲之流涕賜榖二千斛一教以太倉榖千斛賜郎中令家一教以垣下榖千斛與曜卿家外不解其意教曰以太倉穀者官法也以垣下榖者親舊也又曰袁譚以王循爲别駕太祖破鄴藉没審配等家財物貲以萬數破南皮閱循家榖不滿十斛又曰髙堂隆諌禄賜穀帛人主之所以惠養吏民而爲之司命若令有廢是奪其命又曰甄皇后三歳失父後天下兵亂飢饉百姓皆賣金銀珠金寳物時后家大有儲榖頗以買之后年十餘歳白母曰今丗亂而多買寳物匹夫無罪懷璧爲罪又左右皆飢乏不如以榖振給親族鄰里廣爲恩惠舉家稱善曹暪傳曰太祖甞賦廪榖不足私謂主者如何主者曰可以小斛以足之後軍中言太祖欺衆太祖謂主者曰借汝一死厭衆乃殉曰小斛盗官穀即斬之江表傳曰諸葛亮聞恪代徐詳書與陸遜曰家兄年老而恪性踈今使典主粮榖糧榖軍之要㝡僕雖在逺竊用不安足下特爲啓至尊轉之王隱晉書曰鄧攸爲吴郡太守吴人飢荒攸輙出䑓倉穀振之後𬒳効攸曰善不可爲也三國典略曰後梁有何山者其射之妙人莫能及有烏噪於庭樹蕭察悪之謂山曰射中者賜一車榖其烏巢並於枝上山曰脫一箭中兩請賜兩車臣無車牛願官爲送察許之於是山射中其二項察甚欣恱即令載榖送之後魏書曰韋珎遷顯武將軍郢州刺史在州有聲績朝廷嘉之遷龍驤將軍賜驊騮二疋帛五十五疋榖三百斛珎乃召集州内孤貧者謂曰天子以我能綏撫卿故賜以穀帛吾何敢獨當遂以所賜悉分與之北史曰盧義僖寛和畏愼不妄交欵性情儉素不營財利少時幽州頻遭水旱先有數萬石榖貸人義僖以年穀不熟乃燔其契州閭恱其恩德雖居顯位毎至困乏麥飯𬞞食忻然甘之唐書曰長壽二年元日大雪其夜質明而晴上謂侍臣曰俗云元日有雪則百榖豐末知此語有何故實文昌左丞姚璹對曰汜勝書云雪是五榖之精以其汁和種則年榖大穰又宋孝武帝大明五年元日降雪以爲嘉瑞上曰朕臨御萬方心存百姓如得年登歲稔此即可爲大瑞雖獲麟鳯亦何用爲墨子曰一榖不收謂之饉二榖不收謂之旱三榖不収謂之凶四榖不收謂之五榖不收謂之饑饉則大夫以下損禄五分之一旱則三凶則四饑則盡禄廪食而己孔叢子曰魏王問子愼曰寡人聞昔上天神異后稷而爲之下嘉穀周遂以興住中山之地無故有榖非人所爲云天雨之反以亡國何荅曰天雖至神自古及今未聞其下榖與人也詩美后稷能大教民種善榖以利天下所謂稷降播種農殖嘉榖其義一也若中山之榖妖怪之事非所謂天祥也管子曰常山之東河汝之間早生而晚殺五榖之所蕃熟也陳子要言曰食榖而鄙田衣帛而笑𧖟是惑也范子計然曰五榖者萬民之命國之重寳也是故無道之君及無道之臣皆不能積其盛有餘之時以待其衰不足星經曰八榖八星在五車北主黍稷稻粱麻麥烏麻星明俱熟師曠曰杏多實不蟲者來年秋喜五榖之先欲知五榖但視五木擇其木盛者來年益種之京房五星占曰五榖俱傷何君無德也京房易逆刺曰天雨榖歳大熟淮南子曰木勝土土勝水水勝火火勝金金勝水故禾春生秋死禾木也木王而生金王而死也菽夏生冬死菽火也火王而生水王而死也麥秋生夏死麥金也金王而生火王而死也薺冬生仲夏死薺水也水王而生土王而死也又曰稷墾草發甾糞土樹榖使五榖之五種各得冝因地之勢也又曰女夷鼔歌女夷天帝之女下司時和春陽喜樂鼔歌也以司天和以長百穀禽獸草木孟夏之月以享穀夲雄鳩長榖爲帝候歲雄鳩養長榖之鳥也金樓子曰鬻官者欲民之死蓄榖者欲歳之飢船漏水入囊洞内虚也說苑曰楚魏㑹於晉陽將以伐齊王患之使人召淳于髠曰楚魏謀欲伐齊願先生與寡人共之淳于髠大笑而不應三問而不應王怫然作色曰先生以寡人國爲戯乎淳于髠對曰臣不敢以王國爲戯也臣笑隣之祠田也以篋飲與一鮒魚其祝曰下田洿耶得榖百車㙰户買反塊口對反者冝禾臣笑其所以祠者少而求者多王曰善賜之千金革車百乗立爲上卿山海經曰都廣之野百榖自生冬夏播琴郭璞注曰其城方三百里盖天地之中素女所出也播琴猶播殖方俗言耳楊雄方言曰凡以火乾五榖之類岀自山東齊楚以徃曰熬隴兾以徃曰平力切秦晉之間曰焣創眇切楊泉物理論曰榖氣勝元氣其人肥而不壽養性之術常使榖氣少則病不生矣粱者黍稷之惣名也稻者漑種之惣名菽者衆豆之惣名三榖各二十種爲六十䟽果之實助穀各二十斤爲百榖故詩曰播厥百榖榖者衆種之大名也說文曰稑音六疾熟也榖續也百榖惣名也賈誼書曰至于神農甞百草之實察容鹹苦之味教民食榖汜勝之書曰雪者五榖之精又曰小豆忌夘稻麻忌辰禾忌田秫忌未小麥忌戍大麥忌子桓譚新論曰丗俗咸言漢文帝澤加黎庶榖至石數錢論譚曰謂天雨榖從天而下應變而生非也夫雲岀於山散而爲雨人見從天墜謂雨水也夏日則雨冬寒則凝爲雪發於丘山不從天降明矣榖從地起與疾風俱飄集於地人謂天之雨也建武三十一年陳留雨榖蔽地視榖形如米而黒此夷狄地所生榖也夷狄不食榖生於草野成熟委於地遭疾風之俱飛衰榖集中國中國見之謂天雨榖丗要論曰學不勤則不知道耕不力則不得榖又曰服一綵則念女工勞御一榖則恤農夫勤兵書曰軍中地生五榖將軍得天道大吉夢書曰五榖爲財飲食物夢見榖得財吉五榖入家家當盛殷氏丗傳曰殷謖字伯起遭丗䘮亂埋榖數百石後謖爲賊所執見掠責具以榖告之賊猶嫌其未實欲刃焉謖乃詈曰卿行劫害當知人心豈有出財還自殺耶則知其誠遂免羊祜別傳曰祜周行賊境七百餘里徃反四十餘日刈賊榖以爲軍糧皆計湏畝送絹還直使如榖價風俗通曰建武之𥘉旅榖弥望野繭𬒳山盛弘之荆州記曰桂陽郡西北接耒陽縣有温泉其下流百里恒資以漑灌常十二月一日種至明年三月新榖便登重種一年三熟博物志曰馬食榖則足重不能行又曰扶海洲上有草焉名曰蒒其實食之如大麥從七月稔熟民歛穫至冬乃訖名曰自然谷或曰禹餘糧又曰孝元竟寧元年南陽山都雨榖小者如黍粟而青黒味苦大者如米豆赤黃味如麥下三日生根葉狀如大豆𥘉生時幽明録曰琅耶諸葛氏兄弟二人寓居晉陵家甚貧耗常假乞自給榖在囷中計日用未應盡而早以空罄始者謂是家中相竊盗復封檢題識而耗如𥘉後有宿客逺來際夕至巷口見數人擔榖從門出客借問諸葛在否荅云悉在客進内言語之後因問卿何得大糶糓主人云告乞少榖欲充口云何復得糶之客云吾向來逢見數人擔糓從門岀若不糶者爲何事主人兄弟相視竊自疑怪試入㸔封題儼然如故試開囷量視即無十許斛知前後所失非人爲之異苑曰凉州張駿時天雨五榖殖之悉生因名爲天麥張衡東京賦曰所貴唯賢所寳唯糓曹植謝賜榖表曰詔書念臣經用不足以船河邸閣糓五千斛賜臣謝玄書奉白糧榖十斛是釣池上之所種太平御覽卷第八百三十七
