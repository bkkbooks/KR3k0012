  text: 太平御覽卷第六百三十三治道部十四
  hash: sha256:baef60409803a3f529e91e1d00c2fee6ec77ef4f9e7f8415317dd8b9f7c9daa8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_633-1a}
body:
  text: 賞賜說文曰賞賜有功也傳曰蔡公孫歸主謂楚令尹子木曰善爲國者賞不僣刑不濫賞僣則懼及滛人刑濫則懼及善人若不幸而過寜僣無濫與其失善寧其利淫無善人則國從之啇頌有之曰不僣不濫不敢迨遑命于下國封建厥福此湯所以獲天福也古之理民者勸賞而畏刑恤民不倦賞以春夏刑以秋冬將賞爲之加膳加膳則飫賜此所以知其勸賞也將刑爲之不舉不舉則徹樂以此知其畏刑也又曰晉荀林父滅潞晉侯賞林父狄臣千室亦賞士伯以瓜衍之縣曰吾獲狄土子之功也微子吾喪伯氏矣羊舌職恱是賞也曰周書所謂庸庸祇祇者此物物事也也士伯庸中行伯君信之亦庸士伯此謂明德文王造周不是過也注云邲之敗晉侯欲殺林父士渥濁諫而止之又曰􅉑公晉侯朝王王饗醴命之宥皆賜玉五瑴馬三疋非禮也雙玉爲瑴王命諸侯名位不同禮亦異數又曰晉侯伐鄭鄭人賂晉侯女樂八人晉侯以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧請與子樂之魏絳辭曰夫和戎狄國之福也九合諸侯君之靈也二三子之勞也臣何力之有抑臣願君安其樂而思其終也公曰子之教敢不承命夫賞國之典也藏在盟府不可廢也子其受之魏絳於是始有金石之樂禮也周禮太宰以八柄馭群臣三曰予以馭其幸注云幸謂言行偶合於善則有以賜予以勸後也又曰以九式均節財用八曰匪頒之式注曰式謂財用之節度也匪分也頒賜也謂分賜群臣又曰太府以敝餘之賦以待賜予禮記曰天子賜諸侯樂則以祝將之伯子男樂則以鼗將之將謂執以致命諸侯賜弓矢然後專征賜鈇鉞然後專殺賜珪瓉然後爲鬯未賜珪瓉則資鬯於天子又曰君賜車馬乗以拜賜衣服服以拜君未有命弗即乗服凡賜君子與小人同此賞賜之義也又曰若賜之食而君客人則命之祭然後祭鄭玄曰雖見賔客猶不敢備禮也待食則不祭也君若賜之爵則越席再拜稽首受登席祭之飲卒爵而俟君卒爵然後受虚爵不敢先君盡爵詩曰陳錫哉周注云言文王能布陳大利以錫書曰德懋懋官功懋懋賞又曰用命賞于祖弗用命戮于社又曰罰弗及嗣賞延于丗又曰功多有厚賞弗迪有顯戮史記曰紂囚西伯羑里西伯之臣閎夭之徒求美女竒物以獻紂紂乃赦西伯而賜弓矢斧鉞使得征伐又曰武王滅紂乃罷兵西歸封諸侯班賜宗彛作分殷之器物鄭玄曰宗彛宗廟彛樽也作分器著王之命及物也巳於是封功臣謀士而師尚父爲首封封尚父於營丘曰齊封弟周公旦於曲阜曰魯封召公奭於燕封弟叔鮮於管封叔度於蔡餘各以次受封又曰禹平水土巳成帝錫玄珪禹受曰非予能成亦大費爲輔帝舜曰咨爾費賛禹功其錫爾皂游音流爾後嗣將大出遂妻之姚姓之曰玉女皇甫謐曰賜之玄玉妻姚姓之女史記曰晉人請公賞從巳者臣壺叔曰君三行賞賞不及臣敢請罪文公報曰夫導我以仁義防我以德惠此受上賞輔我以行事卒我以成立此受次賞矢石之難汗馬之勞此復次賞若以力事我而輔吾缺者此復受次賞三賞之後故及子晉人聞之皆說音悅又曰晉楚戰于城濮晉侯渡河北歸國行賞狐偃爲首或曰城濮之事先􅎮之謀文公曰城濮之事偃說我母失信先􅎮曰軍事勝爲右吾用之以勝然此一時之說偃言萬丗之功奈何以一時之利而加萬丗之功乎是以先之又曰三國攻晉陽引汾水灌其城城不没者三版城中懸釡而炊易子而食群臣皆有外心禮益慢唯髙共一作赫不敢廢禮襄子懼乃夜使張孟同私於韓魏韓魏與合謀三月丙戍三國反滅智氏共分其地於是襄子行賞髙共爲上張孟同曰晉陽之難共無功襄子曰方晉陽急群臣皆懈唯共不敢失臣禮是以先之又曰漢五年已殺項羽定天下即皇帝位論功行封以蕭何功最盛封爲鄼侯列侯軍已受封奏位次皆曰平陽曹叅身𬒳七十創攻城略地功最多冝第一上巳撓功臣多封蕭何至位次未有以復難之然心欲何第一関内侯鄂君進曰羣臣議皆誤夫曹叅雖有野戰略地之功此特一時之利耳夫上與楚相拒五歳甞失軍亡衆逃身遁者數矣然蕭何常從関中遣軍𥙷其處非上所詔令召而數萬衆㑹上之乏絶者數矣夫漢與楚相守滎陽數年軍無見粮蕭何轉漕関中給食不乏陛下雖亡山東蕭何尚全關中以待陛下此萬丗之功也今雖亡曹叅等百數何缺於漢漢得之不必待以全奈何欲以一旦之功而加萬丗之功哉蕭何第一曹叅次之髙祖曰善於是乃令蕭何第一賜帶劒履上殿入朝不趍上曰吾聞進賢受上賞蕭何功雖髙得鄂君乃益明於是因鄂君故食関内侯邑封爲安平侯又曰項藉死天下定上置酒上折隋何之功謂何腐儒爲天下安用腐儒隋何跪曰夫陛下引兵攻彭城楚王未去齊也陛下發歩兵卒五萬人騎五千能以取淮南乎上曰不能隋何曰陛下使何與二十人使淮南至如陛下之意是何之功賢於歩卒五萬騎五千也然而陛下謂何腐儒爲天下安用腐儒何也上曰吾方圖子之功乃以隋何爲護軍中尉又曰漢文帝𥘉即位赦天下賜民爵一級女子百户牛酒蘇林曰男子賜爵女子賜牛酒也皇帝曰吕産自置爲相國吕禄爲上將軍擅矯遣灌將軍嬰將兵擊齊欲伐劉氏嬰留滎陽弗擊與諸侯合謀以誅吕氏吕産欲爲不善丞相陳平與太尉周勃謀奪吕産等將軍朱虚侯劉章首先捕吕産等太尉身率襄平侯通持節承詔入北典客劉揭身奪趙王軍宫吕禄益封太尉勃萬户賜金五千斤丞相陳平灌將軍嬰邑各三千户金二千斤朱虚侯劉章襄平侯通東牟侯劉興居邑各二千户金二千斤封典客揭爲陽信侯賜金千斤漢書曰夏侯嬰自上𥘉起沛常太僕竟髙祖以太僕事惠帝及髙后德之脫孝惠魯元於下邑間也乃賜嬰北第第一師古曰此第者近北闕之第嬰最第一也曰近我以尊異之又曰景帝賜衛綰劒綰曰先帝賜臣劒凢六不敢奉詔上曰劎人之施易獨至于今乎綰曰具在上使取六劒劒嘗盛未甞服也後遷爲御史大夫代桃侯舎爲丞相然自𥘉官以至相終無可言上以爲敦厚可相少主尊寵之賞賜甚多又曰伏日詔賜從官肉太官承日晏不來東方朔獨拔劒割肉謂其同官曰伏日當蚤歸請受賜即懷肉去太官奏之朔後入上曰昨賜肉不待詔以劒割肉而去之何也朔免冠謝上曰先生起自責也朔來受賜不待詔何無禮也抜劒割肉一何壯也割之不多一何廉也歸遺細君又何仁也上笑曰使先生自責乃反自譽復賜酒一石肉百斤歸遺細君又曰王成不知何郡人也爲膠東相治甚有聲宣帝先褒之地節三年下詔曰盖聞有功不賞有罪不誅雖唐虞不能以化天下今膠東相成勞求不息民流自占八萬餘口師古曰隱度名數而來附業也治有異等之致其賜成爵関内侯秩中二千石又曰黄霸爲頴川太守是時鳯凰神雀數集郡國頴川尢多天子以霸治行終長者下詔稱揚曰頴川太守霸宣布詔令百姓郷化孝子弟悌貞婦順孫日以衆多行者讓路道不拾遺飬視鰥寡贍助貧窮獄無重囚而吏民郷于教化可謂賢人君子矣書不云乎股肱良哉其賜覇爵関内侯黄金百斤秩中二千石而頴川孝悌有行義民三考力田皆以差賜爵及帛又曰𥘉霍氏奢侈茂陵徐生曰霍氏必亡夫奢則不遜不遜必侮上侮上者逆道也在人之石衆必害之霍氏秉權日乆衆欲害之而又行以逆道不亡何待乃上䟽言霍氏太盛陛下即愛厚之冝此時抑制無使至亡書三上輙不報間其後霍氏誅滅而告霍氏者皆封侯人爲徐生上書曰臣聞客有過主人者見其竈直突傍有束薪客謂主人更爲曲突逺徙其薪不者且有火患主人嘿然不應俄而家果失火鄰里共救之幸而得息於是殺牛置酒謝其鄰人灼爛者在於上行餘各以功次不録言曲突者人謂主人曰郷使聽客之言不費牛酒終亡失火之患今論功而請賔曲突徙薪亡恩澤燋頭爛額爲上客即主人乃寤而請之今茂陵徐福上書言霍氏且有變冝防絶之郷使福說得行則國亡裂土岀爵之費臣亡逆亂誅㓕之敗徃事旣已而福不蒙其功唯陛下察之貴徙薪曲突之䇿使居焦髪灼爛之右上乃賜福帛千疋後以爲郎後漢書曰光武召桓榮令說尚書甚善之拜爲議郎賜錢十萬使授太子每朝㑹輙令榮於公卿前敷奏經書帝稱善曰得生幾晚特加賞賜後榮入㑹廷中詔賜竒菓授者皆懷之榮獨手捧以拜帝笑之曰此真儒生也以是愈見敬厚常令上宿太子宫後拜太子少傅賜輜車乗馬榮大㑹諸生陳其車馬印綬曰今日所蒙稽古之力也可不勉乎又曰明帝𥘉即位賜天下男子爵人二級漢書音義曰男子者謂户内之長也南輙爲秦制爵二十級又賜爵者罪得贖貧者得賣與人乎三老孝悌力田人三級過公乗得移與子若同子産漢制賜爵自公士也不得上公乗故過者得移授也同産同母兄弟也及流人無名數欲自占者人一級無名數謂文薄也占謂自歸首又曰管陶公主爲子求郎不許而賜錢千萬謂群臣曰郎官上應列宿出宰百里有非其人則人受其殃是以難之又曰永平中顯宗幸宛詔諸李隨安衆宗室㑹見並受賀賜恩寵篤焉又曰郭伋爲并州牧過京師謝恩帝並召皇太子諸王讌語終日賞賜車馬衣服什物又曰肅宗納梁竦女爲貴人生和帝竇皇后養以爲子諸竇遂譛殺貴人而䧟竦等死獄中家屬徙九具和帝立後貴人姉南陽樊調妻嬺於計切上書自訟曰妾同産女弟貴人前充後宫蒙先帝厚恩得見寵幸誕生聖明爲竇憲兄弟所見譛訴使妾父竦冤死老母孤弟逺徙萬里今值陛下神聖之運親統萬機群物得所憲兄弟姦惡旣伏辜誅妾乃敢昧死自陳所丐帝覽章感悟乃下掖庭令驗問之嬺辭證明審遂得引見具陳其狀乃留嬺止宫中連月乃出賞賜衣𬒳錢帛第宅旬月之間累貲千萬嬺素有操行帝益愛之乃號梁夫人楚漢春秋曰髙帝𥘉封侯者皆賜丹書鐵劵曰使黄河如帶太山如礪漢有宗廟尓無絶丗漢魏春秋曰天子以曹公典任守外臨時之賞或冝速乎乃命公得承制拜諸侯守相曰夫軍之大事在兹賞罰勸善懲惡冝不旋時故司馬法曰賞不踰月者欲民速覩爲善之利也昔在中興鄧禹関承制拜君祭酒李文爲河東太守來歙又承制拜髙峻爲通路將軍察其夲傳皆非先請明臨時刻印也斯則丗祖神明權逹盖所用速示威懷而克成洪勲者也且春秋之義大夫岀疆專命之事荀可以利社稷安國家而巳况君秉任二伯師尹九有實征夷夏軍行蕃甸之外得失在於斯須之間停賞後許以滯時務固非朕之所圗也自今巳後臨事所甄當加寵號者其便刻印章假校咸使忠義得共奬勵勿有疑焉魏志曰太祖攻城邑靡麗之物則悉賜有勲功勞其賞不恡千金無功望施分毫不與又曰袁煥卒太祖賜榖二千斛一教以大倉榖千斛賜郎中令家一教以垣下榖千斛與耀卿家煥字耀卿外不解其意教曰以大倉榖者官法也以垣下榖者親舊也又曰公令曰昔趙奢竇嬰之爲將也受賜千金一朝散之故能濟成大功永丗流聲吾讀其文未甞不慕其爲人也與諸將士大夫共從戎事幸頼賢人不愛其謀群士不遺其力是以夷險平亂而吾得竊大賞户邑三萬追思趙竇散金之義今分所受租與諸侯掾屬及故戍於陳蔡者庻以酬荅衆勞不擅大惠也又曰鎮東將軍母丘儉上言昔諸葛恪圍合肥新城中遣士劉整岀圍傳消息爲賊所得考問所傳整曰欲殺我者便速殺之終無它辭又遣士鄭像岀城傳消息恪遣騎尋迹索得縛將繞城勑像大呼言大軍已還洛不如早降像不從其言更大呼城中曰大軍近在圍外壯士努力賊以刀築其口使不得語整像爲兵能守義執節子弟冝有差異詔曰夫顯爵所以褒元功重賞所以寵列士整像占募通使越六軍蹈重圍冒突白刃輕身守信不幸見獲抗節弥厲楊六軍之大勢安城守之懼心臨難不顧畢志傳命今追賜整像爵関中侯各除士名使子襲爵如部曲將死事科又曰夏侯惇從征孫權還使都督軍留居巢賜伎樂名倡令曰魏絳以和戎之功猶受金石之樂况將軍乎又曰太祖平柳城班所獲器物特以素屏風素机賜毛玠曰君有古人之風故賜君古人之服玠居顯位撫育孤兄子甚篤賞賜以施貧族家無所餘又曰文帝在東宫賜鍾繇五熟金爲之銘曰於赫有魏作漢藩屏厥相惟鍾寔幹心膂靖恭夙夜匪皇般耳百寮師師楷兹矩度又曰薛䕫黄𥘉中爲秘書丞帝與之推論書傳未甞不終日帝視其衣薄解𫀆賜之晉春秋曰清河崔祖思死家無餘財有書八千卷上聞嗴歎良乆之以葛屯榖五百斛賜其家曰葛屯亦吾之垣下令後丗知其見異晉書曰王沈爲豫州下教曰能陳長史可否說百姓所患者有賞言刺史得失倍賞主簿禇君曰上好下應今示以賞恐拘介之士憚賞不言貧昧之人慕利妄舉沈從之宋書曰謝方明爲桓玄著作佐郎後從兄景仁舉爲宋武中軍主簿方明知無不爲帝謂曰愧未有瓜衍之賞且當與卿共豫章國禄屢加賞死蕭子顯齊書太祖竒張融賜衣曰見卿衣服麤交尓籃縷亦虧朝望令送一通衣意謂雖故乃勝新是吾之所着巳令裁减稱卿之體又曰孔靈産爲光禄大夫覽止足之分不肯仕太祖以白毛扇素机遺之曰卿有古人之風故賜以古人之服當代榮之北齊書曰唐邕字道和太原人邕少明敏有治丗之才斛律金啓太后云唐邕強幹一人當千顯祖常解其所着青䑕皮裘賜邕云朕意與卿共幣家語曰孔子曰自季孫之賜我千鍾也而交友益親得季孫千鍾之賜以施於衆故交友日益親也自南宫敬叔之乗我車也而道加行孔子欲見老聃西觀周室敬叔言於魯君給孔子車馬問禮於老子孔子歴郊廟自周而還弟子四方來集也故道雖貴必有時而後動德雖髙必有勢而後行微夫二子之賜則丘之道殆於廢矣太公金匱曰賞一人而千人喜者賞之賞二人而萬人喜者賞之賞三人而三軍勸者賞之管子曰明賞不費明刑不暴賞罰明德之至也司馬法曰殷戮於市周賞於朝勸君子懼小人也鶡冠子曰進賢者受上賞則下不蔽善爲政賞人不多而民喜罰人不多而民畏言賞罰中尹文子曰禄薄者不可以經乱賞輕者不可以入難此處上者所冝慎者也慎子曰孔子云有虞氏不賞不罰夏后氏賞而不罰殷人罰而不賞周人賞且罰罰禁也賞使也文子曰善賞者費少而勸多故聖人賞一人而天下趍之是以至賞不費也韓子曰司城子罕謂宋君曰慶賞賜與者民之所好也君自行之誅罰教戮者民之所惡也臣請當之於是戮細而誅大君子與子罕議之居朞年知死生之命制於子罕故一國歸焉又曰襄子圍於晉陽中岀圍賞有功者四人髙赫爲賞首張孟談曰晉陽之事赫無大功今爲賞首何也襄子曰晉陽之事國危社禝殆矣群臣無不有驕侮之意者唯赫不失君臣之禮是以先之仲尼聞之曰善賞哉襄子賞一人而天下爲人臣者莫能失禮也又曰韓昭侯使人藏蔽衿侍者曰君亦不仁矣蔽衿不以賜左右而藏之昭侯曰非子之所知也吾聞明君之愛一嚬有爲嚬一笑有爲笑今夫衿豈特嚬笑哉衿之與嚬笑相去逺矣吾必待之有功故藏之末有與也言不謬賞尹子曰范獻子遊於河頋問欒氏之子舟人捨檝對曰君不修政舟中之人皆欒氏之子君能反是欒氏之子其如君何獻子稱善乃賜舟人田百畒以田易言也淮南子曰忠臣之事君也計功而受貴不爲苟得量力而受官不貪爵禄其所能者受之勿辭也宋玉等並造集小言賦云楚王旣登雲陽之臺乃命諸侯大夫景差唐勒宋玉等並造大言賦卒而宋玉受賞王曰復能爲小言賦者與之雲夢之田玉又爲賦王曰善遂賜雲夢之田說苑曰晉文公亡時陶淑狐從文公反國行三賞而不及陶淑狐見咎犯曰吾從而亡十有三年顔色黎黒手足眡胼今吾君反國三賞而不及我也意者君亡我歟我有大故歟子試爲我言之於君咎犯言之文公文公曰嘻我豈忘是子哉夫髙明至賢徳行全成躭我以道說我以仁暴顯我行昭明我名使我爲成人者吾以爲上賞防我以禮諌我以義蕃授我不得爲非數引我而請於賢人之門吾以爲次賞夫勇壯強禦難在前則居前難在後則居後免我於患難之中者吾又以爲之次且子獨不聞乎死人者不如存人之身亡人者不如存人之國三行賞之後而勞苦之士次之夫勞苦之士子固爲首矣吾豈敢忘子哉周内史叔興聞之曰文公其覇乎昔先王先德而後力文公其當之矣詩云率禮不越此之謂也又曰衛君問於田讓曰寡人封侯盡千里之地賞賜盡御府綿帛而士不至何也田讓乃對曰君之賞賜不可以功及也君之誅伐不可以理避也言不賞功不辨理也猶舉杖而呪狗張弓而呪雞矣雖有香餌而不能致害之必也又曰齊宣王遊於社山有閭丘先生長老十三人於路拜謁宣王王賜之田不租無徭役諸老皆拜閭丘先生獨不拜王曰何也對曰來見大王所望者三願賜臣夀願賜臣冨願賜臣貴王曰夫生殺有時命有長短非寡人之所制無以壽先王倉粟豐盈備災而畜無以冨先王大官無缺小官卑賤無以貴先王閭丘先生曰此非謂也臣所望者願王選吏平法度政無苛如此臣少得壽焉春夏秋冬使之以時役無煩擾臣少得冨焉願王岀令使少者敬長長者敬老如此則臣得貴矣今王賜臣田不租則倉廪虚無徭役則官無所使非臣所望也王曰願屈先生爲相可乎先生曰臣願足矣焉用相乎又曰趙襄子問王離曰國之所以亡者何也對曰君恡而能忍是以亡尓襄子曰何以爲然也曰恡則不能賞賢忍則不能罰罪賢者不賞罪者不罰不亡何也又曰佛盻於中牟叛置鑊於庭召大夫而盟曰從我者賞之不從我者罰之田英曰吾聞義死者不避鈌鉞之威義窮者不受軒冕之賜無義而生不如有義而死吾不從也乃褰裳就鑊佛盻止之及襄子旣復中牟之叛聞田英義召而賞之英辭不受曰一人受賞衆人有慙色英若受賞則中牟之士盡愧矣又曰蘇秦至齊齊王厚待之諸大夫嫉之使人刺秦而不死齊王出珎寳賞募求賊不得蘇秦垂死謂齊王曰王誠能爲臣求賊者臣死後請車裂臣屍於市詢之曰蘇秦爲燕欲乱齊今日其死寡人甚喜故裂之若得其殺王重封賞之如此刺臣者必岀矣齊王從其言裂屍而詢之刺秦者果出求賞新序曰晉文公獵於澤有漁父諌曰夫鴻鵠厭江海而移入小澤則有矰繳之患今君弃宫殿遊至於此何徃之矣文公納諌而還請賞之漁父辭曰君能尊天事地敬神固國愛人薄賦徭役以時則臣亦冨矣君若不能雖有重賞亦不能保也吕氏春秋曰昔晉文公與楚人戰於城濮召咎犯而問焉楚衆我寡柰何咎犯曰臣聞繁禮之君不足於交繁戰之君不足於詐君亦詐之而已文公又問雍季雍季曰以詐導民亦一時之利也用咎犯之言而敗楚人於城濮反而爲賞雍季在上左右諌曰城濮之功咎犯之謀也君用其言而賞後其身或者不可乎文公曰雍季之言百丗之利也咎犯之言一時之務也焉有一時之務先百世之利乎又曰晉文將伐鄴趙襄言所以勝鄴之術文公用之果勝還將行賞襄曰君將賞其夲乎賞其末乎賞其末則驕乗者存賞其夲則臣聞之郤虎公召虎曰襄言所以勝鄴鄴旣勝將賞之曰蓋聞之於子請賞子虎曰言之易行之難臣言之者也公曰子母音無辭虎乃受凢行賞其愽也則多助今虎非親言者也賞猶及此䟽逺者所以盡能竭智者也晉文亡乆矣歸而因大乱之餘猶能以霸其用此歟風俗通曰俗說有功得賜金者皆黄金案孫子法曰費千金百萬錢陳平間楚千金賜二踈金五十斤此真黄金也亦爲一萬錢裴氏新書曰舟㳙有一言之善晉侯賜萬頃田辭而不受晉侯曰以此田易彼言也於子猶有所亡寡人猶有所得周生列子曰行賞不洽於仁是春半半生也行罰不威是秋半半死也半生之春不洽於仁半死之秋不專於義太平御覽卷第六百三十三
