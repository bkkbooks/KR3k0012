front:
  text: 太平御覽卷第九百九十五
  hash: sha256:49e1ae8da8ebdc2ef19f53b54a395dbe60fc562a89be77591d9b2cd29afc80d5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_995-1a}
body:
  text: 百卉部二麻葛藤女羅莵瓜烏杷羊齒牛蘈狗毒馬帚羊桃羊蹄䑕耳䑕尾芄蘭麻爾雅曰黂符云切枲實禮記曰苴麻之有黂枲麻別二名也茡麻母苴麻盛子者廣雅曰黂麻也毛詩黍離丘中有麻曰丘中有麻彼留子嗟又鷄鳴南山曰藝麻如之何横從其畝又東門之池曰東門之池可以漚麻又宛丘東門之枌曰不績其麻市也婆娑績麻者婦人之事也疾其今不爲禮記内則曰女子十年不出母教婉娩聽從婉謂言語也娩之言媚也謂容貌也執麻枲治絲蠒春秋說題辭曰麻之爲言微也隂精寢密女作纎微也麻生於夏夏衣物成禮儀故麻可以爲衣陽成於三物以化故麻三變縷布加也宋均注曰麻須隂以成夏秓葉成謂之衣麻亦夏生可作衣也三變謂麻生成形之變也漚取皮一變也績成爲縷三變也華嶠後漢書曰崔寔爲五原太守地冝麻枲而民不知種植又不能緝績率無衣𬒳冬月止種細草卧其中吏以草衣其身乃得出寔至教之績織晉中興書曰石勒昔居與李陽相近陽性剛愎毎歳與争漚麻池共相打撲沈約宋書曰孝武帝大明中上所居隂室於此處起玉燭殿與群臣觀之床頭有土鄣壁上挂葛燈籠麻縄拂侍中袁顗盛稱上儉素之德故能光有天下莊子曰顔回曰願得郭内之田十畝以爲絲麻不仕也淮南子曰汾水濛濁而冝麻列女傳曰河内二義者張伯仁仲仁之妻也兄弟少孤共居伯仁敦厚謙苦仲仁驕戾不節二婦紡績得好枲麻輙別異之以爲仲仁衣服越絶書曰麻林山勾踐欲伐呉種麻以爲弓絃也漢武内傳曰鸚鵡食麻子晉令曰其上黨及平陽輸上麻二十二斤下麻三十六斤當絹一疋課應田者枲麻加半畝崔寔四民月令曰二月三月可種苴麻二月可粜麻子夲草經曰麻蕡一名麻勃味平辛生川谷治七傷利五藏下血氣多食令人見鬼狂走乆服輕身通神明麻子𥙷中益氣乆服肥徤不老生太山呉氏夲草經曰麻子中人神農歧伯辛雷公扁鵲無毒不欲牡厲白薇先藏地中者食殺人麻藍一名麻蕡一名青羊一名青葛神農辛歧伯有毒雷公甘畏牡厲白薇葉上有毒食之殺人麻勃一名麻花雷公辛無毒畏牡厲風俗通曰蓬生麻中不扶自直葛爾雅曰拔蘢葛也似葛􅟵生有莭江東呼爲龍尾亦謂之虎葛細葉赤莖廣雅曰女青葛也毛詩閞睢葛覃曰葛之覃兮施于中谷維葉萋萋毛曰覃延也葛所以爲絺綌毛詩黍離葛藟曰綿綿葛藟在河之滸葛也藟也生於河之厓得其潤澤以長大而不絶又黍離採葛曰採葛懼䜛也彼採葛兮一日不見如三月兮葛所以爲絺綌也事雖小一日不見於君憂懼於䜛矣又蟋蟀葛生曰葛生蒙楚蘝蔓于野周書曰葛小人得其葉以爲羹君子得其材以爲絺綌以爲君子朝廷夏服吴越春秋曰採葛之婦人傷越王用心之苦也作苦何之歌其辭曰葛不連蔓葉台台甞膽不苦味苦飴令我採葛以作絲說文曰葛絺綌草也夲草經曰葛根一名鷄齊根味甘平生川谷治消渇身大熱嘔吐諸痺起隂氣解毒生汶山吴氏夲草曰葛根神農甘生太山說苑曰綿綿之葛在於曠野良工得之以爲絺綌良工不得枯死於野楚辭曰石磊磊兮葛蔓蔓思公子兮悵忘歸君思我兮不得聞藤爾雅曰諸慮山櫐今江東呼櫐爲藤似葛而麁大也攝虎櫐今虎豆也纏蔓林樹而生英有尾㓨今江東呼之爲獵攝二音渉也廣雅曰藟藤也易困上六曰困于葛虆于臲卼王弼注曰困於極而乗於剛下无其應行則愈繞居不穫安故曰困于葛纍于臲卼者也毛詩南有樛木曰南有樛木葛藟纍之注云興也南南土也木下曲曰樛南土之葛藟茂盛箋云木枝以下垂之故葛也藟也得纍而蔓之而上下俱盛興者喻后妃能以意下逮衆妾詩義䟽曰纍蔓也似燕薁連蔓生蔓白色子赤可食酢而不羙也幽州謂之推藟也山海經曰卑山其上多櫐郭璞注曰今虎豆狸豆之屬櫐也齊書曰解叔謙字楚梁鴈門人也母有疾叔謙夜於庭中稽顙祈福聞空中語云此疾得丁公藤治便差即訪毉及草注皆無識者乃求訪至冝都遥見山中一老公伐木問其所用荅云此丁公藤療風尤驗叔謙便拜伏流涕具言來意此公愴然以數叚與之并示以漬酒法叔謙受之尋視此人不復知處依法爲酒母病即差梁書曰周弘正與子豫玄俱載入東郡乗小渡岸見藤花弘正挽而䚗覆俱溺僅免豫玄遂得心驚疾汝南先賢傳曰蔡順字君仲至孝所居井桔橰歳乆欲易之爲在母年上不敢一旦忽生扶老藤遶之有鳩巢其上金樓子曰合浦有康頭山山有一頭鹿額上載科藤一枚四條直上各長一丈許雲南記曰雲南出藤其色如朱小者以爲馬䇿大者可爲柱杖崔豹古今注曰酒盃藤出西域藤大如臂去實皆可以酌酒自有文章映徹可愛實大如杯味如荳􅛌香羙消酒土人提酒來至藤下摘花酌酒以其實消酒其國人寳之不傳於中國張騫大宛國得之事在張騫出關志南方草物狀曰沉藤生子大如韲甌正月華苞仍連著實十月臘月熟色赤生食之甜酢生交趾九真事毦至藤生山中大如苹蒿蔓衍居民採取剥之以作毦然不多出興古合浦簡子藤生縁樹木正月二月華四五月熟實如梨赤如雄鷄冠核如魚鱗取生食之味淡泊無甘苦出交趾合浦野聚藤縁樹木二月華苞仍連著實五六月熟子大如羮甌里民煑食其味甜酢出蒼梧科藤生金封山烏滸人徃徃賣之其色正赤又云以草染之出興古陳祈暢異物志曰葭蒱藤類延蔓他樹以自長飬實大小長短如蓮菆側尤切着枝格間實外有殻又無核剥乃食之煑而暴之甜羙食之不飢臨海異物志曰鍾藤附樹作根軟弱湏縁樹而作上下條此藤旣纏裹樹樹死且有惡汁藤盛成樹若木自然大者或至五十圍異物志曰科藤圍數寸重於竹可以爲杖篾以縛舩及以爲席勝於竹也始興記曰黄溪出科藤王韶之始興記曰晉中朝有質子將歸忽有人寄其書告曰吾家在觀亭庿石間有懸藤君扣藤家人必自出歸者如言果有二人出水取書并曰江伯令君前入水見屋舎甚麗今俗咸言觀亭有江伯神也水經又載顧徽廣州記曰科藤如栟櫚葉踈外皮青多棘㓨髙五六丈者如五六寸竹小者如筆管竹破其外青皮得息即科藤藤類有十許種續斷草藤也一曰諾藤一曰水藤山行渇則止断取汁飲之治人體有損絶沭則長髮去地一丈断之輙更生根至地永不絶異苑曰隋郡永陽縣有山壁直千仞巖上有石室古名爲神農窟窟前有百藥藂茇莫不畢備又别有異物藤花形如菱菜朝紫中緑脯黄暮青夜赤五色迭耀劉欣期交州記曰含水藤破之得水行者資以止渇裴淵廣州記曰力陳嶺民人居之伐舩爲業隨樹所居就以成槽皆去水艱逺動有數山生一草名曰膏藤津汁軟滑無物能比導地牽之如流五六丈舩數人便運嶺表録異曰南土多野鹿藤苗有大如鷄子白者細於筯採爲山貨流布海内儋臺瓊管百姓皆制藤線編以爲幕其妙者亦挑紋爲花藥魚鳥之狀業此納官以充賦稅女蘿爾雅曰唐䝉女蘿女蘿兎絲别曰名也詩曰爰采唐矣毛詩頗弁曰蔦與女蘿施于松栢蔦寄生也女蘿莵絲松蘿也莵瓜爾雅曰蔩莵瓜也郭璞注曰似土瓜也孫炎曰一名瓜裂也烏杷爾雅曰攫烏階也郭璞注曰即烏杷也子連相着狀如杷齒可以染皂羊齒爾雅曰綿馬羊齒郭璞注曰草細葉葉生而毛有似羊齒者以取璽緒牛蘈爾雅曰藬大廻切牛蘈也郭璞注曰今江東呼牛蘈者髙尺餘許方莖葉長而銳華紫縹色可淋以爲飲孫炎曰車前草一名牛蘈狗毒爾雅曰蘻音繫狗毒焚光云俗語若如繫馬帚爾雅曰茾音蓱馬帚也郭璞曰似蓍可爲掃篲羊桃爾雅云長楚銚也今羊桃也或曰鬼桃葉似桃花白子如小麥毛詩羔裘隰有萇楚曰隰有萇楚猗儺其枝萇楚銚戈也說文曰長楚銚弋一名羊桃山海經曰豐山有木多羊桃而芳莖郭璞注曰一名鬼桃治皮腫越詩義䟽曰楊州謂羊蹄爲蓫廣雅曰蓽菎羊蹄夲草經曰羊蹄一名東方宿一名連蟲陸一名鬼目味苦寒生川澤治頭秃疥瘙隂熱無子生陳留䑕耳廣雅曰無心䑕耳也廣志曰䑕耳葉如耳縹色也䑕尾爾雅曰䑕尾孫炎曰䑕尾可染皂也巨盈切吴氏夲草曰䑕尾一名一名山陵翹治痢也芄蘭爾雅曰雚芄蘭也郭璞注曰蔓生斷之有白汁可噉也毛詩芄蘭曰芃蘭刺惠公也驕而無禮大夫刺之芄蘭之支芄蘭草也柔弱恒蔓延於地有所依縁則起詩義䟽曰芄蘭摩羅也幽州謂之爵瓢太平御覽卷第九百九十五
