front:
  text: 太平御覽卷第三百二十九
  hash: sha256:5adcd63d456067ae003b95e6528ecd01b11d424729e330af1c9d2a6cf072e773
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_329-1a}
body:
  text: 兵部六十徴應神兵徴應漢書曰貳師將軍李廣利𬒳圍水絶廣利抜刀刺山飛泉涌出又曰王莽出軍祖都門外天雨沾衣長老歎曰是謂泣軍王隠晉書曰咸康元年督護王隨領三千人討寜州賊三角皆裂軍人惡之隨曰裂者破也當破賊而不得土地也到西平郡界兩道討賊賊守馬羡犇走民皆歸降晉書桓温傳云郭璞爲䜟曰有人姓李兒專征戰譬如車軸脫作在一靣兒者子也李去子木存車去軸爲亘合成桓字也又曰成都王潁師次朝歌每夜矛㦸有光若火其壘井中皆有龍象前軍大敗又曰時有重謠云阿童復阿童衘刀浮渡江不畏岸上虎但畏水中龍㑹益州刺史王濬小字阿童表請加龍驤將軍令造舟檝又曰謝艾出師振武夜有二梟鳴於牙艾曰六博得梟者勝今梟鳴牙中尅敵之兆果勝之又曰王澄爲荆州時京師危逼澄率衆軍將赴國難而飄風折其節柱㑹王如㓂襄陽澄前鋒至冝城爲如黨嚴嶷所獲又載記曰吕光伐西域進及流沙三百餘里無水將士失色光曰吾聞李廣利精誠玄感飛泉湧出吾等豈獨無感致乎皇天必有濟諸君不足憂也俄而大雨平地三尺又曰石勒拒劉曜勒統歩騎四万赴金墉濟自大堨先是流澌風猛軍至冰泮清和濟卑流澌大至勒以爲神靈之助也命曰靈昌津宋書曰王仲徳𥘉欲南歸奔太山追騎急夜行忽見前有猛炬導之乗火行百許里以免又曰元兇弑逆孝武率衆入討荆州刺史南譙王義宣雍州刺史臧質並舉義兵三月乙未建牙軍門是時多不悉舊儀有一翁班白自稱少從武帝征伐頗悉其事因使指麾事畢忽失所在自冬至春常東北風連隂不霽其日牙立之後風轉西南景色開霽有紫雲隂于牙上北齊書曰侯景遣將任約伐湘東王於江陵陸法和自請征之至赤沙湖與任約相對縱大舫於前而逆風不便法和執白羽以麾風即返於是大潰約逃竄不知所之後周書曰太祖旣繼賀抜岳起事將刑牲盟誓同奬王室𥘉賀抜岳營於河曲有軍吏獨行忽見一老公鬢眉皓素謂之曰賀抜雖復據有此衆然無所成當有一宇文家從東北來後必大盛言訖不見此吏恒與所親言之至是方驗隋書曰張祥開皇中累遷并州司馬仁壽末漢王諒舉兵反遣其將劉建略地燕趙至井陘祥勒兵拒守建攻之後縱火燒其郭下祥見百姓驚駭其城側有西王母廟祥登城望之再拜涕泣而言曰百姓何罪致此焚燒神有靈可降雨相救言訖廟上雲起須臾驟雨其火遂滅士卒感其至誠莫不用心城圍月餘李雄援軍至賊遂退走又曰竇榮定以佐命功拜上柱國寜州刺史未幾復爲武安侯大將軍㝷除泰州惣管賜呉樂一部突厥沙鉢㓂邊以爲行軍元帥率九惣管歩騎三万出源州與虜戰於髙越原兩相持其地無水土卒渇甚至刺馬血而飲死者十二三榮定仰天太息俄而澍雨軍乃復振於是進擊數挫其鋒沙鉢突厥憚之請盟而去唐書曰開元中降胡叛勑王睃帥并州兵濟河以討之睃乃間行倍道以夜繼晝卷甲捨幕而徃㑹夜於山中忽遇風雪甚盛睃恐失期仰天誓曰睃若事君不忠天討有罪明靈所殛固自當之而士衆何辜令此艱苦誠心忠烈天鍳孔明當止雪廽風以濟戎事言訖風廽雪止時叛者分爲兩道睃追及之殺一千五百餘人生獲一千四百餘人駞馬牛羊甚衆又曰𥘉肅宗行至豐寜南見河夫壍之固欲整軍北渡將詣豐寕忽大風飛沙礫數歩之間不辨人馬由是廽軍東趍靈武風沙頓止天地廓清又曰肅宗至平源郡路傍遇一伏兎命左右索弓箭因謂左右曰吾若破賊射則中之不然則否一發而斃左右咸稱万歳又曰建中三年哥舒曜欲攻李希烈於許州師次潁橋大電雷而雨營中震不能言者三四十人驢馬死者有七曜惡之乃退又曰田恱爲魏王受冊之日其軍上有雲物稍異馬燧等望而笑曰此雲無知乃爲賊瑞又曰田恱稱魏王其營地前二年土長髙三尺餘魏州戸曹韋稔爲土長頌曰公益土之兆也管子曰桓公北征孤竹未至卑耳之谿十里援弓而射射未發也謂左右曰見前人乎對曰不見公曰寡人見人長尺而人物具焉冠冠右祛衣馬前疾走寡人其不濟乎管仲曰祛衣示前有水也右示渉也至卑耳之谿從左渉深及冠從右方深至膝已渉大濟公拜曰仲父之聖若此也山海經曰鹿臺之山有鳥焉如雄雞而人靣名曰島溪其鳴自呼見則有兵小决之山有獸焉如猨白首赤足見則有兵能山之穴恒出神人夏啓而冬閉是穴也冬啓乃必有兵郭璞注曰今鄴西北有石鼔鳴乃有兵即北類淮南子曰人主有伐國之志邑犬群噑雄雞夜鳴庫兵動而戎馬驚戎馬兵馬也雞夜鳴而兵馬起氣之感動也六韜曰三軍無故旌旗皆前指金鐸之聲楊以清鞞鼔之音宛而鳴此得神明之助大勝之徴也又曰紂爲無道武王於是東伐紂至于河上雨甚雷疾王之乗黄振而死旗旌折陽侯波周公進曰天不祐周矣意者君徳行未盡而百姓疾怨故天降吾禍於是太公援罪人而戮之於河三鼔之率衆而先以造于殷天下從之甲子之日至于牧野舉師而討之紂城俻設而不守親擒紂縣其首於白旗又曰武王伐紂諸侯巳至未知士民何如太公曰天道無親今海内陸沉於殷乆矣百姓可與樂成難與慮始伯夷叔齊曰殺一人而有天下聖人不爲太公曰師渡孟津六馬仰流赤烏降白魚外入此豈非天所命也師到㙁音牧野天暴風電前後不相見車蓋發越轅衡摧折旌旄三折旗幟飛揚者精銳感天也雨以洗吾兵雷電應天也吴越春秋曰越王追攻吴兵欲入骨門未至六里望吴南城見伍子頭眉若車輪目垂光烈髮鬢四張耀於十數里大懼留兵即日夜半暴風疾雨雷電鳴沙石飛射疾於弓弩越軍壞敗桓譚新論曰維四月太子發上祭于畢下至孟津之上此武王已畢三年之喪欲卒父業升舟而得魚則地應也㷈祭降烏天應也二年聞紂殺比干囚箕子太師少師抱樂器奔周甲子日月若連壁五星若連珠昧爽武王朝至于南郊牧野從天以討紂故兵不血刃而定天下三國典略曰東魏以平鑒爲懷州刺史鑒乃於軹開道築城以防于我㝷而太祖遣驃騎將軍楊􅋆儀同長孫慶明率兵東伐是時新築之城少粮乏水衆情大懼南門内有一土井隨汲即竭鑒乃具夜冠俯井而祝俄而泉湧城内皆足楊水示􅋆􅋆無功而還􅋆疋眇切又曰周帝問齊王延宗曰鄴城若爲可取延宗辭曰亡圍曰巳殺竟同夢者數十百焉陳書曰髙祖討侯景軍次大雷軍人社稜夢雷池君周何神自稱征討大將軍乗朱航陳甲仗稱下征侯景須臾便還去已殺景隋書曰漢王諒餘黨據晉絳等三州未下詔羅㬋行絳晉呂三州諸軍事進兵圍之爲流矢所中卒于師時年六十曰送柩還京行數里無故輿馬自止䇿之不動有飃風旋遶焉絳州長史郭雅稽顙呪之曰公恨小㓂未平耶㝷即除殄無爲戀恨於是風静馬行見者莫不悲歎其年秋七月子仲隠夢見羅㬋曰我明日當戰其靈座所有弓箭刀劒無故自動若人帶持之狀絳州城䧟是其日也唐書曰髙祖𥘉起師次霍邑隋武牙郎將宋老生陳兵拒險義師不得進屯軍於賈胡堡㑹霖雨積旬餽運不給髙祖患之忽有白衣人詣軍門見曰霍山神遣語大唐皇帝若向霍山邑當東南傍山取路八月雨止我當助爾破之髙祖𥘉哂之遣人東南視地果有微道髙祖笑曰此神不欺趙襄子豈負吾耶時有訛言云突厥將襲太原又軍粮且盡髙祖命旋師太宗切諌乃止八月己夘雨果霽髙祖太恱以大牢祭霍山辛巳引師從傍山道趨霍邑去城十餘里有陣雲起軍北東西竟天髙祖謂裴寂曰雲色如此必當有慶又曰貞元𥘉江西都團練使李兼奏建中四年鄂州刺史逆賊李希烈之將董侍召率衆襲鄂州順風縱火邑屋將焚臣乃禱於城隍神倐忽風廽火烈賊潰遂擊破之連狀黄沔三州請付史官以荅神意從之三國典略曰齊髙緯發晉陽開府薛榮宗甞云能使鬼兵言於齊主曰臣巳發遣斛律明月將大兵在齊主信之經介休見一古冢榮宗謂舎人元行恭曰是誰冢也行恭戯之曰郭林宗是誰曰郭元貞父榮宗即啓云臣向見郭林宗從冢出着大帽吉莫鞾揺馬鞭問臣我阿貞來否又曰侯景西逼陸法和率白服弟子頓于安南乞征任氏湘東許之乃召諸蠻子弟八百人在江津二日便登艦大笑曰无量兵馬江陵舊多神祠俗恒祈禱自法和軍出无復一驗人以諸神皆行從故也又曰梁臨汝侯蕭猷嘗爲呉郡太守與楚廟神交飲至一石而神亦有酒色所禱必從後遷益州刺史江陽人齊茍兒反率衆攻城猷乃遥禱請救將戰之日有田老逢一騎絡鐵從東來問去城幾里曰四十時巳晡騎舉稍曰後人來可令之疾馬欲及日破賊俄有數百騎如風一騎請飲田老問爲誰曰呉興楚王來救臨汝侯此時廟中祈禱无復有驗十餘曰後乃見侍衛土偶泥濕如汗於是茍兒乃平太平御覽卷第三百二十九
