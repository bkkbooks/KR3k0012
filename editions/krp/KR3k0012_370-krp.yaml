front:
  text: 太平御覽卷第三百七十
  hash: sha256:2850ed678d4f9279f200a06d138199a804ac0066f39e2e0e89e36f929507de7d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_370-1a}
body:
  text: 人事部十一手掌指爪手釋名曰手須也事業之所湏也毛詩碩人曰手如柔荑如荑之新生也又魏葛屨曰撡撡女手可以縫裳又曰衛風曰執子之手與子偕老又邶栢舟北風曰北風其凉雨雪其䨦普康切惠而好我携手同行莫赤匪狐莫黒匪烏惠而好我携手同車又緇衣遵大路兮撡執子之手兮禮曲禮曰長者與之提携則兩手捧長者之手又檀弓上曰孔子蚤作負手曵杖逍遥於門又檀弓下曰原壤之母死夫子助之沭槨原壤登木歌曰貍首之班然執女手之卷然又玉藻曰手容恭髙且正也又表記曰后稷天下之爲烈也豈一手一足烈業也言后稷造稼穡天下世以爲業豈一手一足喻用之者多無數也傳曰宋武公生仲子仲子生而有文在其手曰爲魯人夫故仲子歸於我又閔公曰成季之生也有文在其手曰友又宣上曰晉靈公不君宰夫臑熊蹯不熟殺之寘諸畚音本使婦人載以過朝趙盾士季見其手問其故而患之又曰楚侵鄭穿封戍囚皇頡公子圍與之争之正於伯州犂伯州犂上其手曰夫子爲王子圍寡君之貴介弟也下其手曰此子爲穿封戍方城外之縣尹也上下手以遵囚意又曰邑姜方娠太叔夢帝謂己余命而子曰虞將與之唐屬諸叅而蕃育其子孫及生有文在其手曰虞遂以命之又曰齊魯戰于炊鼻舟堅射陳武子中手舟堅季氏臣也失弓而罵武子罵也以告平子曰有君子白晳黰鬚眉甚口甚口多口平子曰必子彊也子彊武子又曰昔叔向適鄭唆口鬲篾惡欲觀叔向從使之收器者而往立於堂下一言而善叔向將飲酒而聞之曰必唆口鬲明也下執其手以上又曰衛侯爲靈臺於籍圃與諸大夫飲酒焉禇師聲子襪而登席右者見君解襪公怒辭曰臣有病異於人足存創疾若見之君將歐敵嘔吐也許角切公愈怒禇師出公㦸其手曰必斷其足論語摘輔象曰仲弓鈎文在手是謂知始宰我手握户是謂守道子游手握文雅是謂敏士公冶長手握輔是謂習道子貢手握五是謂受相公伯周手握直期是謂疾惡孝經援神契曰舜手握褒宋均注曰手中有褒字也喻從勞苦起受褒飾致天祚漢書曰蕭何聞韓信亡不及以聞自追之人有言上曰承相何亡上怒如失左右手又曰孝武帝鈎弋趙婕妤家在河間帝廵狩過河間望氣者言有竒女天子氣使使召之旣至女兩手皆拳上自披之手即時伸由是得幸號爲拳夫人生昭帝又曰鮑永辟鮑恢爲從事京師語曰貴戚歛手避二鮑後漢書曰劉寛欲朝婢飜羮汚朝衣手收之寛曰徐徐羮爛汝手又曰郭玉者廣漢人也學方侯之伎和帝竒異之乃試令嬖臣美手腕者與女子雜處其中使玉各侯一手玉言左陽右隂脉有男女疾若異人臣疑其故帝歎稱善東觀漢記曰公孫述自言手文有竒瑞數移書中國上賜述書曰瑞應手掌成文亦非吾所知張璠漢記曰董卓於衆座中生斬人手足百姓嗷嗷魏略曰鄧雄鳴詣太祖太祖執其手曰孤方入關夢得神人即汝耶乃厚賜之王隱晉書曰𥘉武帝未爲太子文帝問裴秀曰人有相不秀曰中撫軍伸手過膝非人臣之相也又曰愍懷太子名遹字熈𥘉惠帝晚成世祖遣才人謝玖給惠帝生愍懷與諸王子共戲惠帝來朝謂諸王子也執其手世祖曰是汝兒也乃縮手又曰髙平劉柔卧䑕嚙其左手中指意甚惡之以問淳于智筮之曰䑕本欲殺君而不能當爲使之反死乃以朱書其手腕横文後三寸爲田字辟方一寸二分使夜露手以卧其明有一大䑕伏死手前又曰郭文字文舉入餘杭山蘇峻未亂之前詣臨安山中臨安令萬寵迎着縣中養病及峻黨破餘杭山臨安如故人始異之自後不復語但舉手指麾以宣其意病甚寵問先生可復得幾日文三舉其手果以十五日終晉中興書曰范宣陳留人也年十歳能誦詩書甞以乃傷手捧手改容人問痛耶荅曰不足爲痛但受全之體而致毀傷不可處耳家人以其年㓜而異焉崔鴻前趙録曰劉翌驍幹過人能一手舉殿柱跳過平陽門三十六國春秋曰劉淵父豹母呼延氏淵生而左手有文曰淵遂以命之又曰彭神符生而有文在其手曰神符梁書曰武帝手文曰武三國典略曰梁劉之遴字思貞文範先生虬之子也博綜文史尚書令沈休之深敬器之右手偏直不得屈伸每晝則以紙就筆唐書曰承乾數引侯君集入内問以自安之術君集以承乾劣弱意欲乗亹以圖之遂賛成不軌常舉手謂承乾曰此好手當爲殿下用之老子曰代大匠斵希有不傷其手莊子曰曽子居衛緼𫀆無表手足胼胘墨子曰今謂人曰與子冠履而斷子手足必不爲何則冠履不若手足貴也争一言以相殺是義貴於身孟子曰㛐溺則援之以手乎曰㛐溺不援是豺狼㛐溺則援之以手權也反於經而善者曰權韓子曰名實相湏而成形體相應而生故一手獨抃雖疾無聲故曰左手畫圎右手畫方則不兩成吕氏春秋曰客有言伍貟於王子光惡其容貌以告伍貟曰願王子居重帷見衣若手請因說之王子光許之子胥說之半舉惟搏其手而與之坐燕丹子曰太子與荆軻置酒美人鼔琴軻曰好手太子即断其手以玉盤奉之又王曰秦王断荆軻兩手軻踞而罵曰吾坐輕易爲竪子所欺太元經曰九體一爲手足山海經曰柔利國爲人一手野人國面目手足盡異一臂國爲人一手神仙傳曰金筒玉札内經皆云太上老子足踏二五手把十文鄭玄別傳曰玄唯有一子益恩有遺腹子玄以其手文似巳名曰小同李郃別傳曰公長七尺八寸多鬚髯手握三公之字幽明録曰石勒問佛圖澄劉曜可擒兆可見不澄令童子齊七日取麻油掌中研之燎旃檀而呪有頃舉手向童子掌内粲然有異澄問有所見不曰唯見一軍人長大白哲以朱絲縛其肘澄曰此即曜也其年果生擒曜異苑曰陶侃左手有文直逹中指至上撗節便絶占者以爲此文若過位在無極侃針挑令徹血流彈壁乃作公字又取紙裹公迹愈明搜神記曰周暢少孝獨與母居每出入母欲呼之常自齧其手暢即應手痛而至治中從事未之信候暢時在田母齧手而暢即歸班固幽通賦注曰齊桓公倚柱歎曰天下竒珎易得但未得食人肉耳易牙歸断其兒手以啖於君也掌釋名曰掌言可以排掌也春秋元命苞曰掌圎法天以運動孝經鈎命決曰仲尼虎掌是謂威射論語摘輔象曰澹臺滅明歧掌是謂正直戰國䇿曰蘇秦說李兊明曰復見抵掌而說兊送秦以明月之珠和氏之璧九州春秋曰公孫瓉爲袁紹所圍曰天下兵起我謂可唾掌而決今視之兵革方始不如休兵積糓魏志曰上攻吕布於濮陽焚其東門布騎犯青州兵奔陣亂趨門門巳燒上乗馬突火出墮馬燒左手掌司馬樓異扶上馬乃出魏略曰京兆鮑出有文才值丗飢餓出求食飲噉人賊以繩貫其母手掌驅去走追擊賊得其母還孟子曰行不忍人之政治天下可運之掌上孫卿勸學曰有子惡卧而卒倉韋切其掌可謂能自忍矣桓範丗要論曰有君好卧而刺其掌南方異物志曰烏滸人以人掌蹠爲珎重以食長老指春秋元命苞曰指五者法五行傳曰楚人獻黿於鄭靈公公子宋與子家將入見公子宋子公也家子歸生也子公之食指動第二指也以示子家曰他日我如此必甞異味及入宰夫將解黿相視而笑公問之子家以告及食大夫黿召子公而不與子公怒染指於鼎甞之而出又曰晉楚戰于邲楚孫叔敖乗晉軍桓子不知所爲鼓於軍中曰先濟者有賞中軍下軍争舟舟中之指可掬又曰吴伐越越子勾踐禦之陳于擕音醉李靈姑浮以戈擊闔閭靈姑浮越大夫闔廬吴王也傷將指取其一履將指中大指亦曰大拇指還卒于陘去擕李七里史記曰髙祖過趙趙王張敖自持案進食禮甚恭髙祖箕踞罵之是時趙午等數十人皆怒謂張王曰今遇王如是臣等請爲死王齧指出血曰君何言之誤且先人失國頼陛下德流子孫公等柰何言若是漢書曰髙祖與匈奴連戰㑹於樓煩十月寒冰墮指十二三後漢書曰蔡順少孤養母甞出求薪有客卒至母望順不還乃噬其指順即心動棄薪馳歸跪問其故母曰有急客來吾噬指以悟汝耳謝承後漢書曰梁國車章爲本縣功曹令黄奉爲人所誣章證其無罪下筆立辭乃以斧斫左手五指閉口死於獄中晉書曰武帝與胡貴嬪爭樗蒲傷其指帝怒曰此固將種也嬪曰北伐公孫西拒諸葛非將種而何唐書曰太宗甞閑宴顧謂李勣曰朕將屬以㓜孫思之無越卿者公往不遺於李密今豈負於朕哉勣雪涕致詞因噬指流血俄而沉醉乃解御服覆之莊子曰駢栂枝指出乎性哉而侈於德枝於手者樹無用之指也又曰以指喻指之非指不若以非指喻指之非指也又曰指窮爲薪而火傳也窮盡以爲薪猶前薪以指指盡前薪之理故火傅而不滅黒子曰桀有勇力之人大戲紂有勇力之人費仲惡來崇侯虎並指畫殺人孟子曰養其一指而失肩背而不知也則爲狼疾人矣醫養人疾治其一指而不知其害之此爲也狼籍亂不知治疾之人也肩背之有疾以至於抱朴子指測海指極則謂水盡猶目察百歩而云見極也吴越春秋曰夫差聞孔子至吴微服觀之或人傷其指王怒欲索國而誅之子胥諌乃止吕氏春秋曰倕巧人也不愛倕之指而愛巳之指搜神記曰曽子從仲尼在楚而心動辭歸問母曰思之齧指孔子聞之曰曽之至誠也精感萬里孝子傳曰樂正者曽參門人也來候參參採薪在野母嚙右指旋頃走歸見正不語入跪問母何患母曰無參曰負薪右臂痛薪墮地何謂無母曰向者客來無所使故嚙指呼汝耳參乃悲然列仙傳曰漢武帝廵太山禝丘君冠章甫擁琴來拜曰陛下勿上上必傷足及上數里右足指果折上諱之故但祠而還列女傳曰廣漢龐伯妻叚有美色早寡父母欲嫁之援刀割指以自誓陳留耆舊傳曰吴祐爲膠東相安丘男子母丘長共母到市遇醉客罵母長怒殺之爲吏所得繫獄祐問知無子令妻入遂有身臨刑齧指斷吞之謂妻曰若生男名曰吴生云我臨死吞指爲誓屬子報吴君世說曰范宣年八歳後園桃菜誤傷指大啼人問痛也荅曰非爲痛也但身體髮膚不敢毀傷是以啼耳班固幽通賦注曰管仲射小白中其鈎白陽僵鮑叔割指血塗之傾蓋以覆之哭曰吾君死矣魯攝兵爪釋名曰爪紹也䈥極爲爪以紹續指端詩鴻鴈祈父曰祈父予王之爪牙胡轉予于恤靡所止居史記曰成王少時病周公乃自剪其爪沉之河以祀於神曰王少未有識干神命者乃旦也亦藏䇿於府成王病瘳乃成王用事人或譖周公周公奔楚成王發見周公之禱書乃泣而歸周公謝承後漢書曰㑹稽戴就爲郡倉曹掾太守爲州所奏就見收持鐵針刺手爪中使以把土就十爪皆墮地終無撓辭魏略曰臨樂國王生浮屠身色黄髮青如絲爪赤如銅續晉陽秋曰義熈九年羣盗發卞壼墓剖棺虜略壼屍僵鬚髮蒼白靣如生人兩手悉拳爪甲乃長穿逹手背焉三國典略曰齊主誅諸元姻黨死者凢七百二十一人悉投屍於漳水剖魚者得人爪甲鄴都爲之不食魚也南史曰羊偘有妓着七寸鹿角爪彈筝一時無對韓子曰韓昭侯除爪而陽亡一爪求之甚急左右因取爪而效之昭侯以此察左右之不誠淮南子曰古將之出鑿凶門設明衣剪指爪許慎注曰明衣遺終衣也剪手足指爪者是必死也帝王世紀曰湯伐桀後大旱七年遂齊戒剪髮斷爪以巳爲犧牲禱於桑林之社夏侯湛新論曰爪生於肉去爪而肉不知列異傳曰神仙麻姑降東陽蔡經家手爪長四寸經意曰此女子實好佳手願得以搔背麻姑大怒忽見經頓地兩目流血劉欣期交州記曰刺史陶璜晝卧覺見一女子枕其臂始欲捉之以爪㨯呼郭切其手痛不可忍放之遂飛去太平御覽卷第三百七十
