front:
  text: 太平御覽卷第六百二十三
  hash: sha256:e7ed0a9741b6c727ae22f78e69594c910502e91bac809e5f072678f9db3fecf2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_623-1a}
body:
  text: 治道部四治政二史記曰魯公伯禽𥘉受封之魯三年而後報政周公周公曰何遟伯禽曰變其俗革其禮䘮三年然後除之故遟太公亦封於齊五月而報政周公曰何疾也曰吾簡其君臣禮從其俗爲也及後聞伯禽報政遟乃歎曰嗚呼魯後丗其北面事齊矣夫政不簡不易民不近平易近民民必歸之又曰齊威王召即墨大夫而語之曰自子之居即墨也毀曰至然吾使人視即墨田野辟民人給官無留事東方以寕是子不事吾左右以求譽也封之萬家召阿大夫語曰自子之守阿譽日聞然使人視阿田野不辟民人貧苦昔趙氏攻甄子弗能救衛取薛陵而子不知是子以幣厚吾左右以求譽也是日烹阿太夫及左右嘗譽者於是齊國震懼人人不敢飾非務盡其誠齊國乃大治又曰公孫鞅西入秦因孝公寵臣景監以求見孝公孝公旣見鞅語事良乆孝公時睡弗應罷而去孝公怒景監曰子之客妄人耳安足用耶景監以讓鞅鞅曰吾說孝公以帝道其志不開悟後五日復求見鞅鞅復見孝公益愈然而未中旨罷而去孝公復讓監監亦讓鞅鞅曰吾說公以王道而未入也請復見鞅鞅復見孝公善之而未甚也罷而去孝公謂景監曰汝客盖可與語矣鞅曰吾說孝公以霸道其意欲用之矣誠復見我我知之矣鞅復見孝公公與語不自知膝之前於席也語數日不厭景監曰子何以中吾君吾君之驩甚也鞅曰吾說君以帝王之道而吾君曰乆逺吾不能待安能邑邑待數十百年而成王道之業乎故吾以強國之術說君君說之然亦難以比德於殷周矣漢書曰曹叅相齊召長老諸先生問以安集百姓而齊故諸儒以百數言人人殊叅未知所定聞膠西有盖公善治黄老使人厚幣請之旣見盖公盖公爲言治道貴清静而民自定推此類具言之叅於是避正堂舎盖公焉其治要用黄老術故相齊九年齊國安集大稱賢相及叅去齊屬其後相曰以齊獄市爲寄愼勿擾也後相曰治無大於此乎叅曰不然夫獄市者所以并容也今君擾之姦人安所容乎吾是以先之又曰陸賈時時說詩書髙帝罵之曰乃公居馬上得之安事詩書賈曰馬上得之寕可以馬上治乎且湯武逆取而順守文武並用長乆之術也昔者呉王夫差智伯極武而亡夫差呉王闔閭子也好用兵卒爲越所滅智伯晉卿荀瑶也攻趙襄子㐮子與韓魏反而䘮之秦任刑法不變卒滅趙氏秦之先封於趙郷使秦巳并天下法先聖陛下安得而有之又曰賈誼上䟽曰夫仁義恩厚人主之芒刃也權勢法制人主之斤斧也又曰夫三代之所長乆者其巳事可知也巳事巳徃之事然而不能從者是不法聖智也秦丗之所以亟絶者其轍迹可見也然而不避是後車又將覆也夫存亡之變治亂之機其要在是而巳矣夫人之智能見巳然不能見將然夫禮者禁於將然之前而法者禁於巳然之後是知法之用易見而禮之所以爲至難知也若夫慶賞以勸善刑罰以懲惡先王執此之政堅若金石行此之令信如四時據此之公無私如天地耳豈顧不同哉顧反也爲人主計者莫如先審取舎取舎之極定於内安危之萌應是外矣安者非一日而安也危者非一日而危也以禮義治之者積禮義以刑罰治之者積刑罰刑罰積而民怨背禮義積而民和親故丗主欲民之善同而所以使民善者或異或道之以德教或􅛷之以法令道之以德教者德教洽而民氣樂􅛷之以法令者法令極而民風哀哀樂之感禍福之應也秦王之欲尊社廟而安子孫湯武同然而湯武廣大其徳行六七百歳而不失秦王治天下十餘歳則大敗此亡他故矣湯武之定取舎審而秦王之定取舎不審也夫天下大器也今人之置器置諸安處則安置諸危處則危天下之情與器無以異在天子之所置之湯武置天下於仁義禮樂而德澤洽於禽獸草木廣𥙿累子孫數十丗秦王置天下於法令刑罰德澤亡一有禍幾及身子孫誅絶此天下所共見也又曰董仲舒對䇿曰夫人君莫不欲安存而惡危亡然而致亂危者甚衆所任者非其人而所繇音由者非其道也是以政日以仆㓕也夫周道衰於幽厲非道亡也幽厲不繇也至宣王明文武之功業周道粲然復興詩人美之上天佑之爲生賢佐行善之所致也孔子曰人能弘道非道弘人故理亂興廢在於巳非天降命也臣聞天之所大奉使之王者必有非人力所能致而自至者此受命之符也天下之人同心歸父母故天瑞應誠而至白魚入于王舟有火復于王屋流而爲烏復歸也皆積善累德之效也及後丗淫逸不能統理羣生廢德教而任刑罰刑罰不中則生邪氣邪氣積於下怨惡畜於上上下不和隂陽繆盭而妖孽生焉此災異所縁起也臣聞命者天之令也性者生之質也情者人之欲也或夭或夀或仁或鄙陶冶而成之不能粹美有治亂之所生故不齊也堯舜行德則民仁夀桀紂行暴則民鄙夭夫上之化下下之從上猶泥之在鈞唯甄者之所爲猶金之在鎔惟冶者之所鑄綏之斯來動之斯和也又曰董仲舒論時政曰爲政不行甚者必變而更化之譬諸琴瑟不調必解而更張之當更張而不更張雖有良工不能善調也當更化而不更化雖有大賢不能善治也又曰蕭望之上䟽曰夫民凾隂陽之氣亟與含同有仁義欲利之心在教化之所助雖堯在上不能去民欲利心而能令其欲利不勝其好義也雖桀在上不能去民好義之心而能令其好義不勝其欲利也故堯桀之分任於義利而已故道民不可不愼也又曰匡衡上書言政治曰五帝不同樂三王各異教民俗殊務所遇之時異也比年大赦而姦邪不爲衰止盖保民者陳之以德義示之以好惡觀其失而制其冝也朝廷者天下之禎幹也公卿大夫相與循禮恭讓則民不争好仁樂施則下不暴上義髙節則民興行寛柔和惠則衆相愛四者明王所以不嚴而成也又曰元帝時京房問上曰幽厲之君何以危所任者何人也上曰君不明而所任者巧佞房曰知其巧佞而任之也将以爲賢也上曰賢之房曰然則今何以知其不賢也上曰以其時亂而君危知之房曰若是任賢必治不肖必亂必然之道也幽厲何不覺寤而更求賢曷爲卒任不肖以至於是上曰臨亂之君各賢其臣令皆覺寤天下安得危亡之君房曰齊桓公秦二丗亦甞聞此二君而非笑之然則任竪刀趙髙政治日亂盗賊蒲山何不以幽厲之王而覺悟乎上曰唯有道者能以徃知來耳房因免冠謝曰春秋記二百四十二年灾異以示萬丗之君今陛下即位巳來日月失明星辰錯行山崩泉湧地震石隕夏霜冬雷水旱螟蟲民人飢疫盗賊不禁刑人滿市春秋所記災異盡備陛下視今爲治耶爲亂耶上曰亦極亂耳尚何道房曰今所任者誰歟上曰然幸其瘉於彼又以爲不在此人也瘉與愈同愈勝也言其勝於彼也房曰夫前丗之君亦皆然矣臣恐後之視今猶今之視前也後漢書曰桓譚上䟽曰國之廢興在於政事得失由乎輔佐有國之君俱欲興化建善然而治道未洽者所謂賢者要也且設法禁者非能盡塞天下之姦皆合衆人之欲也大底取便國利民多者則可矣夫張官置吏以理萬民懸賞設罰以别善惡惡人誅傷則善人蒙福矣魏志曰袁渙字曜卿爲梁相每勑諸縣曰丗治則禮備丗亂則禮簡方今難以禮化在吾所以爲政又曰太祖破袁氏領兾州牧辟崔琰爲別駕從事請琰曰昨案户籍可得三十萬衆故爲大州也琰曰今天下分崩九州幅裂二袁兄弟親㝷干戈兾方蒸庻暴骸原野未聞王師仁聲先路存問風俗救其塗炭而較計兵甲唯此爲先豈彼州士女所望於明公哉太祖改容謝之晉書武帝𥘉受禪駙馬都尉傳玄上䟽曰先王之治天下也明其大教長其義節道化行於上清議隆於下上下相奉人懷義心亡秦蕩滅先王之制以法術相御而義心亡矣近者魏武好法術而天下貴刑名魏文慕通逹而天下賤守節其後綱維不攝而虚無放誕之論盈於朝野使天下無復清議而亡秦之弊復發焉崔洪春秋前凉録曰張天錫時小府長史紀瑞上䟽論時政曰臣聞東野善馭而敗其駕秦氏冨強而覆其國馬力巳盡求之弗休人旣勞竭役之無巳故也造父之御不盡其馬虞舜之治不窮其人故造父無失御虞舜無失人唐書曰魏徴上䟽曰君人者誠能見可欲則思知足以自誠將有作則思知止以安人念髙危則思冲謙而自牧懼驕滿則思江海下百川樂盤游則思三驅爲度恐懈怠則思愼始而敬終慮擁塞則思虚心以納下想䜛邪則思正身以黜惡恩所加則思無喜以謬賞罰所及則思無怒以濫刑然後簡能而任擇善而從之智者盡其謀勇者竭其力仁者播其惠信者効其忠文武争馳在君無事可以盡豫遊之樂可以養松喬之壽鳴琴垂拱不言而化何必勞神苦思代下司職役聦明之耳目虧無首之大道也又曰陳子昂上書言政理曰元氣者天地之始萬物之母王政之大端也天之道莫大乎隂陽萬物之尊莫大乎黔首王政之貴莫大乎安人故人安則隂陽和則天地平而元氣正矣是以古先帝王見人之通於天地天人相感隂陽相和災害之所不生嘉祥之所以作也遂則象於天則成於地輔相天地之冝以左右民於是養成羣生奉順天德故人得安其俗樂其業甘其食美其服隂陽大和元氣巳正天地降瑞風雨以時矣又曰景雲二年監察御史解琬陳時政曰臣聞國之安危在於爲政若爲政以法雖暫安而必危爲政以德雖不便而終治夫法者智也智所謂權冝道可以長乆陛下登位今巳逾年上封事者多言明聖述太平或曰功巍巍德赫赫非唯不禆於政化亦乃陛下之厭聞臣以爲當今風俗未甚振理政令未息煩勞隂陽未調和帑藏未充牣流離者尚相望於道路犯禁者猶繼踵於狴牢耳未聞康哉之聲目未覩太平之事且貞觀永徽之天下亦今日之天下相去幾何而風俗淳季相反由理之失也夫霸者任智失德與人故大僞縁生矣然巧智之士浮詭之徒智忠者爲立身之階識仁義爲百行之夲託之以求進假之以取容口是而心非言同而意反明君哲后亦何盡能察哉趍競之吏巧知之人欲宻網以爲至公殊不知網宻而犯者衆用苛細爲勤事殊不知事細而擾愈煩賞貪冒以強能鄙貞正而孤介隨波浮沉者題之以黠剛毅正直者目之曰愚歳月漸漬日致澆浮朴散淳離流宕忘反若不匡救其弊何由使風俗淳質厥人以康哉太平御覽卷第六百二十三
