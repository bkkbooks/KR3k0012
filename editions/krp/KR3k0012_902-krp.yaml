front:
  text: 太平御覽卷第九百二
  hash: sha256:b36f87a098667eaaa01fd9c50fcda5ebbcdf0031876814738504fc4f10cc190a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_902-1a}
body:
  text: 獸部十四羊說文曰羊祥也象四足角尾之形孔子曰牛羊之字以形舉又曰羔羊子也羜五月生羔也􅧌亡具六月生羔也羍七月生羊也䍮雉矯羊未卒嵗也䍧牝羊也羒扶分壯羊也羠音夷乗羊也羳扶貟黄腹羊也羥揩間羊名也廣雅曰呉羊牝一歲曰䍮三歲曰羝其一歲曰㹀三歲曰䍧呉羊犗居八切曰䍸蒲各羖羊搳曰羯羍􅧌􅳶䍻思䆓羔也爾雅曰麢大羊似羊大角貟銳在山崖間羱如羊音元似呉羊羊壯羒音汾牝䍧夏羊黑羖䍽也牡羭音揄黑羝羖角不齊觤一短一長角三觠羷觠卷三匝羳羊黄腹未成羊羜絶有力奮郭義恭廣志曰犬尾羊細毛薄皮尾上旁廣重且十斤出康居又曰驢羊似驢字林曰䍲女奚切羺女溝切胡羊也羫口弄切羊也似羊四耳九尾目在背䍺音還似羊無口􅱤乙間切群羊相積一日羊羴𥘉莧切羊相厠也羴羊臭也羴式延切玄中記曰千嵗之樹精爲青羊崔豹古今注曰羊一名羙髯鬚主簿禮記曲禮下曰祭廟羊曰柔毛又曰大夫無故不殺羊又月令曰孟春天子食麥與羊又内則曰羊泠毛而毳羶詩小雅無羊曰誰謂爾無羊三百維群之羊子爲政今日之事我爲政與入鄭師故敗又宣下曰楚子圍鄭鄭伯肉袒牽羊論語曰子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮又曰葉公語孔子曰吾黨有直躬者其父攘羊而子證之攘盗史記曰武王克殷微子持其祭器肉袒面縛左牽羊把茅膝行而前又曰卜式者河南人式入牧百餘羊十餘嵗羊致千餘上曰吾有羊在上林中欲令子牧之乃拜式爲郎布衣草蹻而牧羊蹻音脚歲餘羊悉肥上過其羊善之式曰非獨羊也治民亦如是也拜緱氏令又曰秦襄公始用羝羊祠西畤漢書曰楚懷王孫心在人間爲人牧羊項梁立爲懷王又曰蘇武使匈奴匈奴知武不可降使北海上無人處牧羝羊乳乃得歸武在海上廩食不至掘野鼠草荄而食之杖漢節牧羊卧起持節節旄盡落東觀漢記曰甄宇北海人爲州從事徴拜愽士每臘詔書賜愽士一羊羊有大小肥瘦時博士祭酒議欲殺羊稱分其肉宇曰不可又欲投鈎復耻之云甄愽士宇先自取其冣瘦者猶是不復有争訟後召㑹詔問瘦羊甄愽士後漢書曰更始二年至長安尤嗜酒不聽政事所任皆賈竪膳夫庖人長安爲之語曰竈下飬中郎將爛羊胃騎都尉爛羊頭關内侯又曰廣陵思王荆傳曰光武崩大行在殿荆哭不哀而作飛書令蒼頭詐稱東海王彊舅况書與彊􅌟爲大逆其辝曰當秋霜無爲檻羊秋霜肅殺於物檻羊受制於人崔鴻十六國春秋後録曰羌抑摩獻羊六角二口四角八口北史曰隋漢王諒爲并州揔管潞州有官羊生二角相背以爲諒之咎徴帝王丗紀曰湯問葛伯何故不祀曰無以供犧牲湯遺之以羊穆天子傳曰犬戎胡觴天子于雷首之阿乃獻良馬四六天子使孔牙受之曰雷水之平爰有黒牛白角爰有黒羊白血又曰天子飲于文山乃獻豪牛四節有豪又曰舂山大羊食鹿豕山海經曰錢來之山有獸如羊而馬尾名曰鍼羊周易是謀類曰太山失金雞西嶽亡玉羊鄭玄注曰金雞玉羊二嶽之精春秋說題辭曰羊者祥也合三而生以飬王也故羊髙三尺雜五行書曰懸羊頭門上除盗賊春秋䌓露曰凡贄卿用羔羔飲之其母必跪類知禮者故羊之爲言祥故以爲贄莊子曰臧與榖二人相與牧羊而俱亡羊問臧奚事則挾䇿讀書榖奚事則愽塞以游二人事業不同其亡羊均也又曰善飬生者如牧羊後者鞭之墨子曰齊莊公之臣王國卑中里撽者訟三年而獄不断恐失有罪使二人共一羊盟齊之社二子相從以羊血灑社讀王國卑之祠巳盡終里撽之辭未半祭羊起而觸中里撽齊人以爲有神驗列子傳曰楊朱見梁王言治天下如運諸掌王曰先生有一妻一妾而不能治三畒之園而不能芸言治天下何也曰君見夫牧羊者乎百羊而群使五尺童子荷箠而隨之欲東而東欲西而西使堯牽一羊舜荷箠而隨之則不能前矣孫卿子曰仲尼爲魯司㓂沈猶氏不敢朝飲其羊尸子曰羊不任駕塩車椽不可爲楣棟龍魚河圗曰羊有一角食之殺人周書曰夏桀德衰夷羊在牧飛蛤滿野韓詩外傳曰魯哀公使人穿井三月不得泉得一玉羊焉公以爲玉羊使祝皷舞之欲上於天羊不能上孔子見曰水之精爲玉土之精爲羊願無恠之此羊肝土也公使殺之視肝即土矣國語曰季桓子穿井獲如土缶其中有羊符子曰魏文侯見宋陵子三仕不頋文侯曰何貧子曰王見楚冨者牧羊九十九而願百嘗訪邑里故人其隣人貧有一羊冨者拜之曰吾羊九十九今君之一盈我成百則牧數足矣隣者與之從此觀焉冨者非冨貧者非貧也吕氏春秋曰百里奚未遇時亡虞飯牛於秦傳鬻以五羖羊之皮公孫枝得獻諸繆公繆公用之謀無不當舉必有功淮南萬畢術曰阿羊九頭更食國亂乃出楊雄法言曰敢問質曰羊質虎皮見草而恱見豺而戰忘其皮之虎也王充論衡曰獬者一角之羊也性知有罪臯陶治獄其罪疑乃令羊觸之山海經曰羬羊尾如馬出錢來之山羬羬音折玉篇作古咸反瑞應圗曰鍾律和調則玉羊見白澤圖曰羊有一角當頂上龍也殺之震死博物志曰胡蕙蜀中夲無也洛中人有驅羊入蜀其子着羊毛蜀人取種因名禾羊負來又曰隂夷山有淫羊一日百遍脯不可食但着床席間巳自驚人又有作淫羊脯法取羖􅳶各一别繫令裁相近而不使相接食之以地黄竹葉飲以麥汁未潘百餘日後解放之欲交未成便牽兩殺之膊以爲脯男食􅗑女食􅳶則並如狂好醜亦無所避其勢數日乃歇治之方煑茱茰菖蒲汁飲之又以水銀宫脂塗隂男子即痿宫脂鹿脂也杜預奏事曰臣前在南聞魏興北山有野羊大者數百十斤試令固求今者各得一枚并頭角蹄案其形不與土羊相似然是野獸土所希有新言曰𥘉年懸羊頭磔鷄頭以求冨余以問河南服君服君曰是月草木萌羊能嚙草雞啄五榖故懸二物助陽氣今人殺羊鷄自作不祥凉州異物志曰有小羊稱若斥頗熱峭山如壁上下無跌又曰有羊大尾車推乃行用累其身又曰封羊其背如駞宋永𥘉山川記曰九真都龍縣有麢羊大如牛春秋後語曰張儀謂楚王曰夫爲從者無異驅群羊而攻生虎虎之與羊不格亦明矣格鬪也羊不能與虎明矣今王不與虎而與羊臣竊以爲大王之計過衛玠别傳曰玠少時乗白羊車於洛陽市共觀咸曰誰家璧人述異記曰羊而不角呼蛟羊一名胡髯郎一名青烏又曰周成王時東夷進六角羊周厲王元年外國貢三角羊尹喜内傳曰老子與喜别曰尋吾於成都市青羊之肆喜後求而得之葛洪神仙傳曰皇𥘉平年十五家使牧羊有道士見其良謹將至華山石室中四十年不誤念其家其兄𥘉起行索𥘉平見道士引至山與弟語畢問平羊何在平曰近東𥘉起視不見羊但見白石却謂平曰山東無羊平曰兄自不見尔與兄俱徃平乃叱之白石一時皆起成羊數萬頭𥘉起曰弟得仙道以如此遂弃妻子服松栢伏苓五萬日遂得仙易姓爲赤松子又曰曹公収左慈慈走入群羊失慈之所在追者疑化爲羊乃令人數羊羊夲千口簡之長一口知化爲羊乃謂曰若是左公者但出無苦也有一羊跪言詎如許追者欲執之於是群羊皆長跪曰詎如許追者乃去搜神記曰宣帝時隂子方者至孝有仁恩正當臘日晨炊而竈神形見子方再拜家有黃羊因以祠之又曰南陽宗定伯少年夜行忽逢一鬼鬼問爲誰定伯乃欺之曰我亦鬼也遂相與爲侣向逺行極困相檐問鬼曰鬼何所畏曰唯不喜人唾欲至宛便檐鬼着頂上徑詣宛市化爲羊恐其變亟唾之賣之得錢千五百買者繫之明視之但繩在時人名宗定伯賣鬼得千五百列仙傳曰葛由者羗人周成王時好刻木作羊賣之一旦騎羊而入蜀中王侯貴人追之上綏山在峨嵋山西南髙無極隨之者不得還皆得仙道山上有桃故里諺曰得綏山一桃雖不得仙亦足以豪又曰昔有攘羊者以羊遺叔嚮叔嚮母埋之不食後三年攘羊事發追捕嚮家檢羊骨肉都盡唯有舌在國人異之遂以羊舌爲族矣續搜神記曰頋霈者呉之豪士送客於昇平亭時有一沙門在坐是流俗道人主常欲殺羊羊繩斷便走來入此道人膝中穿頭入袈裟下道人不能救即將去而殺之旣行炙主人先割以啖道人道人食炙下喉炙便自走行道人皮中痛毒不可忍呼醫來針之以數針貫之炙猶動揺乃破岀之故是一臠肉耳道人於是得病作羊鳴吐沬還寺少時便死劉義慶幽明録曰洛下有澗穴婦欲殺夫推下經多時至底乃得一穴宫館金飾明踰三光人長三丈如此九處最後至告飢長人指樹下一羊令跪將羊鬚𥘉得一珠長人取之次亦取後令噉即療饑請問九處名求停不去荅云君不得停續異記曰呉興俞亮以永明八年𥙷護軍府史於常眠處聞有羊聲疑爲神恠竊於户窺之見其牀下有一羊可髙二尺毛色若丹光耀滿室金樓子曰脩羊公於華隂山以道干景帝禮遇之數嵗道不可得有詔問脩羊公能何發語未訖於床上化爲白石羊題其曰脩羊公謝天子後置石羊於通靈臺嶺表録異曰嘗有人自青社泛海歸閩爲惡風所飄五日夜不知行幾千里也至一島忽見群羊人向之亦不驚避𥘉疑人所放牧而絶無人迹乃知野生者舡人方餒因取食之太平御覽卷第九百二
