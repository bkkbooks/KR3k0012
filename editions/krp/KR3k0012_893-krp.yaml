front:
  text: 太平御覽卷第八百九十三
  hash: sha256:c532e2979f7e2af7053c75d8858c658d13ffc80f656469778c99432e955e3538
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_893-1a}
body:
  text: 獸部五馬一說文曰馬怒也武也馬一歲曰馵音環二歲曰駒三歲曰駣音兆八歲曰􅦩音八髙六尺曰驕七尺曰騋音來八尺曰龍騊音陶駼音途北野之良馬也驁駿馬也以壬申日死乗馬者忌之爾雅曰騊駼馬野馬北海內有獸狀如與名騊駼青色騊駼一名野馬昆蹄趼善升甗甗山形似甑上大下小時有昆蹄之馬蹄平如研善升甗甗山嶺也研音吟燕切甗音魚徤切昆賖枝蹄研善升甗小領盗驪盗驪千里馬也領頃也昆駼之馬枝蹄如牛而下平小領馬種一名盗驪絶有力駥馬髙八尺膝上皆白馵馵後左脚白音注也四骹音𫾣皆白驓骹膝下也四蹢皆白首俗呼爲折雲馬蹢蹄也前足皆白騱下鷄切後足皆白翑巨俱切前右足曰啓左傳曰啓服也左白踦後右足白驤左白馵音注駵音流馬白腹騵魚袁切驪馬白跨驈驪黒色跨髀間白州驠州竅於見切尾夲白騴尾抹白也尾白駺音郎馰顙白顚載星馬也白逹素懸素鼻莖也俗所謂漫髗徹齒面顙皆白惟駹顙額回毛在膺冝乗樊光曰俗謂之宮府馬伯樂相馬法旋毛在腹下如乳者千里馬也在肘後減陽在翰茀方幹脅在背闋廣皆别旋毛所在之名逆毛居馬毛逆刺騋音來牝驪牡馬七尺巳爲騋玄駒􅒁驂玄駒小馬别名褭驂耳或曰此即騕􅒁古之良馬牡曰騭今江東呼駮馬爲騭牝曰騇草馬名也駵白駁黃白騜詩云騜駮其馬駵馬黃脊騝竒連切驪馬黃脊騽青驪駽今之鐵􅍡青驪驎驒色有淺深斑駮隱驎今連錢􅍡也青驪繁鬣騥驪白雜毛鴇今之烏騘黃白雜毛駓今之桃花馬隂白雜毛駰隂淺黒今之泥騘也蒼白雜毛騅彤白雜毛騢彤赤也今之赭白馬白馬黒鬣駱白馬黒脣駩七全切黒喙騧一目白􅳌音閑二目白魚似魚眼也旣差我馬宗廟齊毫尚純也戎事齊力田獵齊足周易說卦曰乾爲馬又坤卦彖曰牝馬地類行地無疆又說卦曰震其於馬也爲善鳴爲馵音注足爲作足爲的顙又曰乾爲良馬爲老馬爲瘠馬爲駁馬又屯卦曰六四乗馬般如匪㓂婚媾徃吉無不利又下繫曰服牛乗馬引重致逺以利天下盖取諸隨又曰坤元亨利牝馬之貞王弼文言注曰以龍叙乾以馬明坤隨事義而取象也禮記月令曰孟春之月天子駕蒼龍孟夏之月天子駕赤駵孟秋之月天子駕白駱孟冬之月天子駕鐵驪又學記曰始駕馬反之車在馬前又内則曰馬黒脊而般臂漏漏當爲螻如螻蛄奥也又曰大夫士卒下公門式路馬乗路馬必朝服歩路馬必中道蹙路馬芻有誅路馬死埋之以帷詩國風卷耳曰陟彼崔嵬我馬虺隤又曰陟彼髙岡我馬玄黄虺隤玄黄皆病又魯頌曰駉頌僖公也僖公能遵伯禽之法務農重榖牧于垧野而史克作是頌史克魯人也駉駉牡馬在垧之野駉駉良馬也垧逺野也薄言駉者有驈有皇有驪有黃以車彭彭驪馬白跨曰驈黃白曰皇純黒曰驪黄騂曰黄彭彭有容力也駉駉牡馬在坰之野薄言駉者有騅有駓有騂有騏以車伾伾倉白雜毛曰騅黄白雜毛曰駓赤黄曰騂倉祺曰騏伾伾有力也駉駉牡馬在坰之野薄言駉者有驒有駱有駵有雒以車繹繹青驪驎曰驒白馬黒折曰駱赤身黒曰駵黒身白曰駱繹繹善走也駉駉牡馬在坰之野薄言駉者有駰有騢有驔有魚以車祛祛隂白雜毛曰駰彤白雜毛曰騢豪骭曰驔二目白曰魚祛祛彊徤也又曰叔于田乗乗馬執轡如組兩驂如舞叔于田乗乗黃四馬皆黄兩服上襄兩驂鴈行又白駒曰皎皎白駒食我埸藿縶之維之以永今夕皎皎白駒在彼空谷空大生芻一束其人如玉左傳僖十五年曰秦晉戰于韓晉惠公乗小駟鄭入也鄭獻馬名小駟慶鄭曰古者大事必乗其産生其水土而知其人心安其教訓而服習其道唯所納之無不如志今乗異産以從戎事及懼而變將與人易亂氣狡憤隂血周作張脉僨興外疆中乾進退不可周旋不能君必悔之弗聽及戰公戎馬旋濘而止公號慶鄭鄭曰愎諌違卜固敗是求遂去之又曰晉侯伐齊齊師夜遁邢伯告中行伯曰有班馬之聲夜道馬不相見故鳴斑别也齊師其遁又昭四年傳曰魯使椒舉如晉求諸侯晉侯欲勿許司馬侯曰不可公曰晉有三不殆其何敵之有國險而多馬齊楚多難有是三者何郷而不濟對曰侍險與馬而虞鄰國之難是三殆也四嶽三塗陽城大室荆山中南九州之険也是不一姓兾之北土馬之所生無興國焉恃險與馬不可以爲固也又宣上曰宋人以文馬百駟以贖華元於鄭半入華元逃歸又昭七年曰衛侯來獻其乗馬曰啓服啓服馬名壍而死墮壍死也公將爲之櫝爲作棺也子家曰從者病矣請以食之乃以帷裏之又定三年曰唐成公如楚有雨肅爽馬子常欲之成公唐惠侯之後肅爽駿馬名弗與三年止之唐人或相與謀請代先從者許之飲先從者酒醉之竊馬而獻之子常子常歸唐侯自拘於司敗竊馬者自拘曰君以弄馬之故隱君身隱憂約也弃國家羣臣請相夫人以償馬必如之相助也夫人謂養馬者唐侯曰寡人之過也二三子無辱皆賞之又定下曰衛公子地有白馬四公嬖向魋向魋欲之向魋司馬桓魋公取而朱其尾鬛以與之與桓魋也地怒使其徒扶魋而奪之魋懼將走公閉門而泣之目盡腫榖梁傳僖公曰晉獻公將伐虢荀息請以屈産之乗垂棘之璧假道於虞公曰此晉寳也荀息曰是取中府藏外府取中廐藏外厩也後舉虞荀息牽馬操璧而前曰璧猶是馬齒長矣周禮夏官下曰校人掌王馬之政政謂差擇養乗之數也月令日班馬政辨六馬之屬種馬一物戎馬一物齊馬一物道馬一物田馬一物駑馬一物種謂上善似母者以次差之玉路駕種馬戎路駕戎馬金路駕齊馬象路駕道馬田路駕田馬駕馬給宫中之役天子十有二閑馬六種邦國六閑馬四種家四閑馬二種降殺之差毎廐爲一閑諸侯有齊馬道馬田馬大夫有田馬各一閑其駑馬則皆分爲三焉凡馬特居四之一欲其乗之性相似也物同氣則心一鄭司農云四之一者三牝一牡春祭馬祖執駒馬祖天駟也孝經說云房爲龍馬鄭司農云執駒無令近母猶攻駒也二歳曰駒三歳曰駣玄謂執猶拘也春通淫之時駒弱血氣未定爲其乗正傷也夏祭先牧頒馬攻特先牧始養馬者其人未聞夏通淫之後攻其特爲其蹄不可乗用鄭司農云攻特謂騬之秋祭馬社臧僕馬社始乗馬者丗夲作曰相士作乗馬鄭司農云臧僕謂簡練馭者令皆善也玄謂僕馭五路之僕冬祭馬歩獻馬講馭夫馬歩神爲災害馬者献馬見成馬於王也馭夫馭貳車從車使車者也講猶簡習凡大祭祀朝覲會同毛馬而頒之毛馬齊其色也頒授當乗之飾幣馬執朴而從之鄭司農云校人主飾之也幣馬以馬遺人當幣處者也聘禮曰馬則北靣奠幣于其前士喪礼下篇曰薦馬纓三就入門北靣交轡圉人夾牽之馭者執榮立于馬後凡賔客受其幣馬賔客之幣馬來朝聘而享王者大喪飾遣車之馬及葬埋之言埋之則是馬塗車之芻靈田獵則師驅逆之師猶將也凡將事于四海山川則飾黃駒四海猶四方也王廵守過大山川則有殺駒以祈沈禮與王人職有宗祀以黄金勺前馬之禮凡國之使者共其幣馬使者所用私覿凡軍事物馬而頒之物色齊其力又曰圉師掌敎圉人養馬春除蓐釁廐始牧夏庌馬冬獻馬射則充椹質茨牆則翦闔蓐馬兹也馬旣出而除之新釁焉神之也春秋傳曰凢馬日中而出日中而入故字庌爲訝鄭司農云當爲庌玄謂庌廡也廡所以庇馬凉也充猶居也茨蓋也闔苫也椹質翦闔圉人所習也杜子春讀椹爲齊人言缺椹之椹椹質所射者習射處圉人掌養馬芻牧之事以役圉師役者圉師使令焉凡賔客喪紀牽馬而入陳賔客之馬王所以賜之者詩云雖無子之路車乗馬喪紀之馬啓後所薦焉廞馬亦如之廞馬遣車之馬人棒之赤牽而入陳又夏官上曰馬質掌質馬馬量三物一曰戎馬二曰田馬三曰駑馬皆有物賈此三馬買以給官府之使無種也鄭司農曰皆有物賈皆有物色及賈直網惡馬鄭司農云網讀爲以亢其讎之亢書亦或爲亢亢御也禁也禁去惡馬不畜也玄謂網以縻索維網狎習之凡受馬於有司者書以齒毛與其賈馬死則旬之內更旬之外入馬耳以其物更外其否鄭司農云更謂償也玄謂旬之内死者償以齒毛與賈受之日淺養之惡也旬之外死入馬耳償以毛色不以齒賈任之過其任也其外否旬之外踰二十日而死不任用非用者罪馬及行則以任齊其行識其所載輕重及道里齊其勞逸乃復用之若有馬訟則聽之訟謂賣買之言相負禁原𧖟者原再也天文辰爲馬𧖟書𧖟爲龍精月直大火則浴其種是𧖟與馬同氣物莫能兩大禁再蠶者爲傷馬與論語曰齊景公有馬千駟死之日民無德而稱焉又憲問曰驥不稱其力稱其德也驥古之善馬也德謂在五御之威儀周書曰其西天子車立馬乗六青馬隂羽鳬旌鳬羽爲旌旄也周公旦主東青馬黒謂之母兒周公主東則太公主西也東青馬則西白矣馬名未聞也又曰義渠以兹白兹白者白馬倨齒食虎豹義渠西戎兹白一名駿也韓詩外傳曰昔者田子方出見老馬於道喟然有志問於御者曰此何馬也御者曰公家畜也罷而不爲用故出放之田子方曰少盡其力老弃其身仁者不爲也束帛而贖之窮士聞之知所歸心焉尚書大傳曰散冝生之犬戎氏取羙馬騘身朱髦雞目者取九六焉陳於紂之庭紂出見之還而觀之曰此何人也散冝生遂趨而進曰吾西蕃之臣昌之使者太公六韜曰商王拘周伯昌於姜里太公與散冝生金十鎰求天下珎物以免君之罪於是得犬戎氏文馬毫毛朱鬛目如黃金項如雞尾名雞斯之乗以獻商王禮斗威儀曰君乗火而王其政頌平南海輸駮馬春秋考異郵曰隂合於八八合陽九八九七十二二爲地地主月月精爲馬月數十二故馬十二月而生人乗以理天下王者駕馬故其字以爲王馬春秋說題辭曰地精爲馬十二月而生應隂紀陽以合功故人駕馬任重致逺利天下月度疾故馬善走淮南子曰八九七十二耦以乗竒竒主辰辰主月月主馬馬十二月而生孝經援神契曰德至山陵則澤出神馬龍魚河圖曰白馬玄頭食之殺人下病食馬肉亦殺人無以賣馬錢娶婦洞林曰殷鴻業來作卦身在申夲命酉乗馬南行西北走逕趨木家化爲狗頼子救之不成咎鴻業丁酉生後八月中有急事借馬南出行數里馬欻驚更西北走向戌地入李家遂落地馬因齧之主人出救得免不見傷也尚書中候曰堯沉璧於河龍馬衘甲赤文緑色臨壇吐甲圖鄭玄曰龍象馬也赤文而緑色廣雅曰飛兎飛鴻野麋娥鹿騶吾走狐桃􅷪音黎金喙馬屬也方言曰馬食橐關西曰掩囊掩音䳺或曰掩兠或曰樓兠字林曰驫方問切衆馬走也𩥇知扇切馬卧土中也䩥音但馬帶也鞚馬勒也鞚口貢切太平御覽卷第八百九十三
