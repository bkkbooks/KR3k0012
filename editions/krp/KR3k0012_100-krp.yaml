front:
  text: 太平御覽卷第一百皇王部二十五
  hash: sha256:dc3f1068a8964e8abc9eadc4aa33a17da76689364c46823511478d9cbd4efaba
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_100-1a}
body:
  text: 東晉安皇帝桓玄恭皇帝安皇帝晉書曰安皇帝諱徳宗孝武帝長子也㤗元十二年立爲皇太子二十一年九月庚申孝武崩辛酉太子即位大赦癸亥以司徒㑹稽王道子爲太傳攝政隆安元年春正月巳亥朔帝加元服改元増文武位一等太傳㑹稽王道子歸政四月甲戍兖州刺史王㳟豫州刺史庾揩舉兵以討尚書左僕射王國寳建威將軍王緒爲名甲申殺國寳及緒以恱于㳟㳟乃罷兵二年七月兖州刺史王㳟豫州刺史庾揩荆州刺史殷仲堪廣州刺史桓玄南蠻校尉楊佺期等舉兵反八月江州刺史王愉奔于臨川九月加太傅㑹稽王道子黄鉞遣征虜將軍㑹稽王元顯等討桓玄等輔國將軍劉牢之次新亭使子敬宣擊敗恭㳟奔曲阿長塘湖湖尉收送京師斬之㝷遣太常殷茂諭仲堪及玄玄等走于㝷陽三年十一月妖賊孫恩䧟㑹稽内史王疑之死之吴國内史桓謙等並委官而遁遣衛將軍謝琰等逆擊走之四年五月孫恩㓂浹口謝琰爲孫恩所䧟死之恩轉㓂臨海六月輔國司馬劉𥙿破恩于南山恩將盧循䧟廣陵元興元年正月庚午朔大赦改元以後將軍元顯爲驃騎大將軍征討大都督鎮北將軍劉牢之爲元顯前鋒將軍譙王尚之爲後部以討桓玄二月景午帝戎服餞元顯于西河丁巳遣兼侍中齊王柔之以騶虞幡宣告荆江二州丁卯桓玄敗王師于姑孰壬申桓玄自爲侍中丞相録尚書事二年春二月辛丑建威將軍劉𥙿破徐道覆于東陽乙卯桓玄自稱大將軍丁巳兾州刺史孫無終爲桓玄所害秋八月玄又自號相國楚王九月南陽太守庾庂起義兵爲玄所敗冬十一月壬午玄遷帝于永安宫癸未移太廟神主于琅耶國十二月壬辰玄纂位以帝爲平固王辛亥帝蒙塵于㝷陽三年春二月帝在㝷陽庚寅夜濤水入石頭漂殺人户乙夘建武將軍劉𥙿帥沛國劉毅東海何無忌等舉義兵景辰斬桓玄所署徐州刺史桓脩于京口及青州刺史桓弘于廣陵丁巳義師濟江三月戊午劉𥙿斬玄將呉甫之于江乗斬皇甫敷於羅落巳未桓玄衆潰而逃庚申劉𥙿置留臺具百官壬戌桓玄司徒王謐推劉𥙿行鎮軍將軍徐州刺史都督楊徐兖豫青兾幽并八州諸軍事假節劉𥙿以謐領楊州刺史録尚書事辛酉劉𥙿誅尚書左僕射王愉及愉子荆州刺史緩司州刺史温詳辛未桓玄逼帝西上景戍宻詔以幽逼於玄萬機虚曠令武陵王遵依舊典承制揔百官行事加侍中餘如故并大赦謀反大逆巳下唯桓玄一祖之後不宥夏四月巳丑大將軍武陵王遵稱制緫萬機庚寅帝至江陵庚戌輔國將軍何無忌振武將軍劉道規及桓玄將庾稚何澹之戰于湓口大破之玄復逼帝東下五月癸酉冠軍將軍劉毅及玄戰于崢嶸洲又破之巳卯帝復幸江陵辛巳荆州别駕王康産南郡太守王騰之奉帝居于南郡壬午督護馮遷斬桓玄於南貊盤洲乗輿反正于江陵閏月巳丑桓玄楊武將軍桓振䧟江陵帝復蒙塵于賊營義熈元年正月帝在江陵太守魯宗之起義兵襲破襄陽巳丑劉毅次于馬頭桓振以帝屯于江津辛卯宗之破振將温揩于祚溪進次紀南爲振所敗振武將軍劉道規擊桓謙走之乗輿反正帝與琅耶王幸道規舟二月丁巳留臺備乗輿法駕迎帝于江陵三月桓振復襲江陵荆州刺史司馬休之奔于襄陽建威將軍劉懷簡討振斬之帝至自江陵六年十二月劉𥙿破盧循于豫章七年春二月右將軍劉藩斬徐道覆于始興傳首京師夏四月盧循走交州刺史杜慧斬之十二年八月劉𥙿及琅耶王徳文率衆伐姚泓景午大赦冬十月景寅姚泓將姚光以洛陽降巳丑遣兼司空髙宻王恢之脩謁五陵十三年秋七月劉𥙿尅長安執姚泓收其彛器歸京師十四年十二月戊寅帝崩于東堂在位二十三年時年四十七葬休平陵帝不慧自少及長口不能言雖寒暑之變無以辨也凡所動止皆非巳出故桓玄之纂因此獲全桓玄晉書曰桓玄字敬道一名靈寳大司馬温之孽子也其母馬氏甞與同輩夜月下坐見流星墜銅盆中忽爲二珠璨然明静􅔡以瓢接取馬氏得而吞之若有感遂有折及生有光照室占者竒之故小名曰靈寳妳媪毎抱詣温輙昜人而後至其重兼常兒温甚愛異之臨終命以爲嗣襲爵年七歳温服終府州文武辭其叔父冲冲撫玄頭曰此汝家故吏也玄因涕淚𬒳面衆並異之及長形皃瓌竒風神踈㓪博綜藝術善屬文常負其才地以雄豪自處時咸憚之年二十三拜爲太子洗馬時議謂温有不臣之迹故折玄兄弟而爲素官後出𥙷義興太守鬰鬰不得志甞登髙望震澤歎曰父爲九州伯兒爲五湖長弃官歸國自以元勲之門而負謗於丗乃上䟽曰臣聞周公大聖而四國流言樂毅王佐而𬒳謗騎刧巷伯有豺獸之慨蘇公興飄風之刺惡直醜正何代無之先臣蒙國殊遇姻婭皇極西平巴蜀北清伊洛使竊號之㓂繫頸北闕園陵修復大恥載雪飲馬灞滻懸旌趙魏勤王之師功非一捷泰和末皇基有潜移之懼遂奉順天人翼登聖朝晉室之機危於殷漢先臣之功髙於伊霍矣至於先帝龍飛九五陛下之所以繼明南靣請問談者誰之由也若陛下忘先臣大造之功信具錦萋斐之說臣等自當奉還三封受戮市朝然後下從先臣歸先帝玄宫耳䟽寢不報玄在荆楚積年優逰無事荆州刺史殷仲堪敬憚之及中書令王國寳用事謀削弱方鎮内外騷動知王㳟有憂國之言玄潜有意於功業乃說仲堪冝興晉陽之師以内匡朝廷巳當悉荆楚之衆順流而下推王㳟爲盟主此桓文之舉也俄而王㳟信至招仲堪及玄匡正朝廷國寳旣死於是罷兵詔以玄爲廣州刺史其年王恭又與庾揩起兵討江州刺史王愉及譙王尚之兄弟玄仲堪謂恭事必尅捷一時響應仲堪令玄與楊佺期爲前鋒玄至盆口獲王愉詔以玄爲江州各西還屯于㝷陽共相結約推玄爲盟主後荆州大水仲堪振恤飢者倉廩空竭玄乗其虚而伐之至江陵仲堪數道拒之不尅佺期自襄陽來救期敗走殷仲堪亦見害於是平荆雍詔以玄督八州荆州牧玄於是樹腹心兵馬日盛其後孫恩逼京師玄建牙旗聚衆外託勤王實欲觀釁以兄偉爲冠軍江州刺史留偉守江陵抗表率衆下至㝷陽移檄京邑罪狀元顯玄旣興師犯順慮衆不爲用恒有廻斾之計旣過㝷陽不見王師意甚恱將吏亦振先使其將馮該等攻譙王尚之敗之劉牢之遣子敬宣降玄至新亭元顯自潰玄入京師矯詔加巳揔百揆爲丞相加黄鉞羽葆鼓吹府置官属乃徙太傅道子于安成害元顯于市多戮朝望改昜百官各置所親大赦改年爲大亨玄將出居姑孰其中書令王謐對曰公羊有言周公何以不之魯欲天下一乎周也願静根本以公旦爲心玄善其對而不從遂大築城府乃岀鎮焉大政皆諮之小事則决其僕射桓謙及卞範之後諷朝廷封諸子弟爲公自知怨满天下欲速定纂逆殷仲文卞範之等又共催促之於是先改授郡司其黨皆三公又矯詔封十郡爲楚王加九錫備物楚國丞相以下一遵舊典又諷天子御前殿而䇿授焉玄屬僞讓詔遣百僚敦勸乃就命玄僞上表求歸藩又自作詔留之遣使宣旨玄又上表固請又諷天子作詔固留十一月矯制加其備天子禮服御禮樂皆僣焉又矯詔使王謐兼太保奉皇帝璽禪位於巳岀居永安宫移晉神主于琅耶廟𥘉玄恐帝不爲手詔又慮璽不可得逼臨川王寳請帝自爲手詔因奪取璽比臨軒璽巳乆出玄甚喜百官到姑孰玄僞讓朝臣固請玄乃於城南七里立郊壇以玄牡告天百僚陪列而儀注不備妄稱萬歳遂升壇燎于南郊大赦改元永始𥘉僞詔改年爲建始右丞王攸之曰建始復是王莽始執權之歳也其兆號不祥冥符僣逆如此國號大楚以南康平固縣奉晉帝爲平固王車旗正朔如舊典遷居㝷陽依陳留王處鄴宫故事追尊其父温宣武皇帝諸子皆爲王玄入建康宫逆風迅激旌旗儀飾皆傾及小㑹西堂設妓樂殿上施絳綾帳鏤黄金爲顔四角作金龍頭銜五色羽葆旒蘇群臣竊相謂曰此頗似轜車亦王莽仙蓋之流也玄以其妻劉氏爲皇后更造大輦容三十人坐以二百人舁之性好畋逰以體大不堪乗馬又作徘徊輿施轉閞令廻動無滯玄自纂盗之後驕奢荒侈遊獵無度以夜繼晝性又急暴呼召嚴速直官咸繫馬省前禁内雜亂無復朝廷之體於是百姓疲苦朝野勞悴怨怒思亂者十室八九焉劉𥙿劉毅何無忌等共謀克復𥙿等斬桓脩于京口斬桓引于廣陵𥙿率義軍至竹里玄遣呉甫之皇甫敷北距義軍𥙿等於江乗與戰臨陣斬敷及甫之玄聞之大懼乃召諸道術人推筭數爲厭勝之法乃問衆曰朕其敗乎曺靖之對曰神怒人怨臣實懼焉玄曰人或可怨神何爲怒對曰移晉宗廟飄泊無所失楚之祭不及於祖此其所以怒也玄曰卿何不諌對曰輦上君子自以爲堯舜之丗何敢妄言玄愈忿懼使桓謙何澹之屯東陵卞範之屯覆舟山西衆二萬拒義軍𥙿至蔣山使羸弱登山分張旗幟數道並前玄偵候還云𥙿軍四塞不知多以玄益憂惶于時東北風急義兵放火煙塵張天鼔譟之音震駭京邑劉𥙿執鉞麾而進謙等諸軍一時奔潰玄率親信數千人聲言赴戰遂出南掖門西至石頭使殷仲文具船相與南莾或勸其戰玄不暇荅直以䇿指天而經日不得食左古進以麄飯咽不能下其子昇時年數歳抱玄胷而撫之玄悲不自勝劉𥙿以武陵王遵攝萬機立行臺揔百官遣劉道䂓躡玄玄至㝷陽江州刺史郭昶之給其器用殷仲文自後至望見玄舟旌旗輿服備帝者之儀歎息曰敗中復振故可也玄於是逼乗輿西上於道作起居注叙其拒義軍之事自謂經略指授筭無遺䇿諸將違節度以致虧䘮非戰之罪玄至江陵石康納之未三旬衆盛謂其群黨曰卿等並清塗翼從朕躬都下竊位者方應謝罪軍門其觀卿等入石頭並雲霄中人也玄遣何澹之守湓口何無忌劉道䂓等破之帥舟艦二百發江陵以徐放爲常侍遣說無忌等解軍謂放曰諸人不識天命致此妄作遂懼禍屯結卿三州所信可明示朕心若退軍解甲當與之更始授任江水在此朕不食言時道䂓巳至玄與戰於崢嶸州于時義軍數千玄兵甚盛而玄懼敗常漾輕舸於舫側故其衆莫有闘心義軍乗風縱火盡銳争先玄衆大潰玄留永安太后及皇后於巴陵殷仲文時在玄艦求出别船収集散軍因叛玄奉二后奔于江陵玄欲岀投漢州而制令不行左右於闇中斫之不中前後相殺交撗玄僅免於是荆州別駕王康産奉帝入南郡時益州刺史毛璩使其從孫祐之送帝璠喪葬江陵有衆二百璩弟子脩之先爲玄校尉誘玄以入蜀幸枚回洲祐之迎擊玄矢下如雨玄𬒳箭其子昇拔去之益州督馮遷抽刃而前玄拔頭上玉簮與之仍曰是何人邪敢殺天子遷曰欲殺天子之賊耳遂斬首時年三十六自篡逆至敗凡八旬矣恭皇帝晉書曰恭帝諱徳文安帝母弟也𥘉封琅耶王歴中軍將軍散騎常侍衛將軍開府儀同三司加侍中領司徒録尚書六條事元興𥘉遷車騎大將軍桓玄執政事進位太宰加衮冕之服緑綟綬玄篡位以帝爲石陽縣公與安帝俱居㝷陽及玄敗隨至江陵玄死桓振奄至躍馬奮戈直至堦下瞋目謂安帝曰臣門户何負國家而屠滅若是帝乃下牀謂振曰此豈我兄弟意耶振乃下馬致拜振平復爲琅耶王又領徐州刺史㝷拜司馬領司徒加殊禮義熙五年置左右司馬長史從事中郎四人加羽葆鼔吹十二月戊寅安帝崩是日即帝位大赦元熈元年春正月壬辰朔改元以山陵未厝不朝㑹立后禇氏甲午徴劉𥙿還朝二年夏六月壬戌劉𥙿至于京師傳亮承𥙿宻旨諷帝禪位草詔請帝書之帝欣然謂左右曰桓玄之時天命已去爲劉公所延二十載矣今復何恨乃書赤𥿄爲詔甲子遂遜于琅耶第劉𥙿以帝爲零陵王居于秼陵行晉正朔車旗服色一如其舊有其文而不備其禮宋永𥘉二年九月崩于内房時年三十六謚㳟皇帝葬冲平陵續晉陽秋曰𥘉安皇不慧起居動止不自巳帝毎侍左右消息涼温飢飽之中而恭謹備焉時人稱其順悌又雅信佛法鑄貝貨十萬造丈六金像於瓦官寺外國齊日迎像宫歩從十許里安皇帝歸陵有詔當出送八座奏諌以爲冝加珎攝乃止沈約宋書曰禇秀之妹爲恭帝后兄弟並盡忠孝髙祖恭帝每生男轍令方便殺焉或誘賂内人或宻加毒害前後如此非一恭帝居秼陵宫帝懼見禍與禇后共止一室慮酖毒自煑食於床前髙祖將殺之不欲遣人入内令禇淡之兄弟侍禇后出別宫官相見兵人乃踰垣而入進藥於恭帝帝不肯飲曰佛教自殺者不得復人身乃以𬒳掩殺之中興書曰昔中宗以丁丑之歳始稱晉王改築宗廟使郭璞筮之云載祀二百曁今禪代庚申之歳凡百有二年而天禄永終璞精於數術理無乖二抑以百四期促故謬其嗣爲二百乎史臣曰安帝即位之辰鍾無妄之日道子元顯並傾朝政主昬臣亂未有不亡者也雖有手握戎麾心存舊國囬首無良忽焉簫散於是桓玄承釁勢踰飈指六師咸泯隻馬徂遷是以宋髙非典午之臣孫恩豈金行之㓂若乃丗遇顛覆則恭皇斯甚於越之民詎燻丹穴㑹稽之侣寕歎入臣去黄屋而歸來灑丹書而不恨夫五運攸革三微數盡猶髙秋凋候理之自然觀其零落人有爲之流涕者也太平御覽卷第一百
