front:
  text: 太平御覽卷第六十八
  hash: sha256:787d96e5526037f16c03c7d8dc562ac95e008b150ab87364f219e002c2276ac9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_068-1a}
body:
  text: 地部三十三氷潮川氷說文曰氷水堅也澌流氷也易曰𥘉六履霜堅氷隂始凝也馴致其道至堅氷也又曰乾爲寒爲氷易通卦驗曰大雪魚負氷鄭玄注曰負氷上近氷也詩曰二之日鑿氷冲冲鑿氷聲也三之日納于凌隂周禮曰凌人掌氷祭祀供氷鑑鑑如甀大口藏氷以御温氣也賔客供氷大䘮供夷盤氷夷盤大盤夏班氷賜羣臣也又曰凌人掌氷正歳十有二月令斬氷三其凌三其凌三倍其氷禮曰孟冬之月水始氷地始凍仲冬之月氷益壯地坼鶡鳥不鳴􅍑始交又曰立春之日東風解凍又五日蟄虫始振又五日魚上氷風不解凍號令不行魚不上氷兵甲不藏傳曰楚子使薳子馮爲令尹遂以疾辭方暑闕地下氷而牀焉重璽衣裘蠒抱也禮玉藻曰續爲蠒緼爲袍鮮食而寢楚子使醫視之復曰病則甚矣而血氣未動又曰春無氷梓愼曰今兹宋鄭其饑乎隂不勝陽也又曰日在北陸而藏氷西陸朝覿而出之其藏氷也深山窮谷固隂沍寒於是乎取之其出之也朝之禄位賔食喪祭於是乎用之其藏之也黒牡秬黍以享司寒其出之也桃弧棘矢以除其災祭司寒而藏之獻羔而啓之火岀而畢賦自命夫命婦至於老疾無不受氷山人取之縣人傳之輿人納之隷人藏之夫水以風壯而以風出而藏之也周其用之也徧則冬無愆陽夏無㐲隂春無淒風秋無苦雨人不夭札孝經援神契曰髙山之巔無樹深海之淵無氷剛太燥温太柔也家語曰霜降而婦功成娶者行焉季秋霜降氷冸而農桑起㛰禮殺焉史記曰姜嫄爲帝嚳元妃出里見巨人跡恱欲踐之踐而身動如孕期而生子以爲不祥弃渠氷上飛鳥以翼覆薦之薛瑩後漢書曰靈帝光和六年冬北海東萊琅邪井氷厚丈餘又曰光武至薊上王郎使者至上發薊晨夜馳騖至曲陽呼沲河道吏還言河流澌無舡不可渡遣王霸徃視實然霸念恐驚衆即還曰冰堅可渡比至冰可乗帝遂得渡漢書曰晁錯上書曰夫胡貉之地積隂之處也木皮三寸氷厚六尺臧榮緒晉書曰王祥字休徴後母朱氏思生魚時河水氷堅祥朝朝冒厲風於河涯伺魚一朝忽氷開小穴有雙鯉跳出王隱晉書曰慕容皝上言正月十二日躬征平郭逺假陛下天地之威將士竭命精誠感靈海爲氷結凌行海中三百餘里臣問故老初無海氷之歲平郭盖近昌黎城也北齊書曰文宣時周人常懼齊兵之西度恒以冬月守河椎氷及後主即位朝政多紊齊人椎氷懼周兵之逼斛律光憂曰國家常有吞關隴之志今日至此東方朔神異經曰北方有氷萬里氷厚百丈鼷䑕在氷下土中焉其毛長八尺可爲褥却風寒王子年拾遺録曰東海貟嶠山有氷𧖟長七寸有鱗角以霜雪覆之始爲蠒其色五采織爲文錦入水不濡投火不燎南燕録曰慕容德正月渡黎陽津流澌氷合鄴令韓䡄言於徳曰昔光武渡呼沲氷澌自合今大王濟河天橋自成德乃大悅異苑曰石勒伐劉曜於洛陽從大河南濟時河凍將合軍至而氷自冸舟檝無閡遂生擒曜謂是神靈之助又曰髙平閭丘孝婦以元嘉中懐娠生一團氷得日便消液成水也呉越春秋曰越王念復呉怨非一旦也苦思勞心夜以接日冬寒則抱氷夏熱則握火趙書曰劉曜攻石勒將戰曜欲乗大乗大赤馬無故蹢躅不可近於是退赤馬及合陣敗走曜體素壯馬小不勝䧟氷爲石堪所擒也慱物志曰削氷令貟舉以向日艾承其影則有火西京雜記曰漢制以酒滴爲書取其不氷以玉爲硯亦取其不氷也陸機洛陽記曰氷室在宣陽門内恒有氷天子用賜王公衆官戴延之西征記曰凌雲臺有氷井延之以六月持去經日猶堅也述征記曰冰井在凌雲臺北古舊藏氷處鄧析書曰明君之御民若乗奔而去轡履氷而負重晏子曰景公伐魯得東門無澤問之魯年糓何如對曰隂水凝陽氷厚五寸晏子曰如是則寒温節也寒温節則政平政平則年糓熟請禮魯以息怨也老子曰渙若氷將釋莊子曰夏蟲不可以語於氷者篤於時也曲士不可以語於道者束於教也又曰朝受命而夕飲氷我其内熱歟孫卿子曰氷生於水而寒於水淮南子曰淮海有不死之草北方有不釋之氷又曰夫水向冬則凝而爲氷迎春則釋而爲水氷㢮易乎前後又曰知一葉之落知歲將暮覩瓶中之氷而知天下之寒以近諭逺也論衡曰夫燻一炬火爨一鑊水終日而不熱也倚一尺氷置庖厨中終夜而不寒也風俗通曰積氷曰凌壯氷曰凍氷流曰澌氷解曰泮魏子曰居危殆之國治不善之民是猶薄氷當白日藂毛過猛火也枹朴子曰五玉不染而堅寒氷不礱而㓪又曰蹈薄氷以待夏日登杇枝而須勁風新論曰畫水鏤氷與時消釋潮水說文曰潮朝也從水朝風土記曰俗說鯢一名海鰌長數千里穴居海底入穴則水溢爲潮出穴則水入潮退出入有節故潮水有期祖台之志恠曰隆安中陳悝於江邊作魚䇻正匪切潮去於䇻中得一女人長六尺有容色無衣服水去不能動卧沙中與語不應人有就辱之悝夜夢云我是江黄昨失道落君䇻小人遂見加凌今當白尊神殺之悝不敢移潮來自逐水去姧者㝷病死呉越春秋曰呉賜子胥劒而死乃投之江中子胥因掦波成濤隨潮徃來博物志曰東海中有牛魚其魚形如牛剥其皮懸之潮水至則毛起潮去則復也臨海異物志曰石鷄清響以應潮慧軀輕逝以逺縶石鷄形似家鷄在海中山上每朝水將至輒羣鳴相應若家雞之向晨也裴淵廣州記曰石洲在海中名爲黄山山北日一潮山南日再潮枹朴子曰糜氏云潮者據朝來也言夕至也一月之中天再東再西故潮水再大再小也又夏時日居南宿隂消陽盛而天髙一萬五千里故夏潮大也冬時日居北宿隂盛陽消而天卑一萬五千里故冬潮小也又春日居東宿天髙一萬五千里故春潮漸起也秋日居西宿天卑一萬五千里故秋潮漸減也又曰天河從北極分爲兩頭至於南極其一經南斗中過其一經東斗中過兩河隨天轉入地下過而與下水相得又與海水合三水相蕩而天轉排之故激涌而成潮水又曰濤水者潮取物多者其力盛來逺者其勢大今潮水從東地廣道逺乍入狹處陵山觸岸從直赴曲其勢不泄故隆崇涌起而爲濤俗人云濤是五子胥所作妄也子胥始死耳天地開闢巳有濤水矣川說文曰川貫穿通流水也釋名曰川者穿地而流也易曰地險山川丘陵也王公設險以守其國又曰利渉大川書曰予決九川距四海王肅曰九川者九州之川也又曰若濟大川用汝作舟檝又曰九山刋旅九川滌源禮曰天降時雨山川出雲周禮曰楊州其川三江荆州其川江漢䂊州其川滎洛青州其川淮泗兖州其川河泲雍州其川涇汭幽州其川河濟兾州其川漳并州其川呼沲又曰兩山之間必有川焉大川之間必有途焉大戴禮曰聖人有國則川澤不竭蔡邕月令章句曰衆流注海曰川國語曰幽王二年三川皆震又曰厲王虐國人謗王邵公告王曰民不堪命矣王怒得衛巫使監謗者以告則殺之國莫敢言道路以目王喜告邵公曰吾能弭謗矣乃不敢言邵公曰是鄣之也防民之口甚於防川川壅而潰傷人必多民亦如之是故爲川決之使導爲民宣之使言語曰子在川上曰逝者如斯夫不舎晝夜竹書記年曰藍田川有漢臨江王榮塜景帝以罪徴之將行祖於江陵北門車軸折父老泣曰吾王不反矣榮至都中尉郅都急切責王王年以恐而自殺葬於是川有䴏數萬銜土置塜上百姓憐之水經注曰龍魚川澤漲不測出五色雲俗以爲靈而莫敢採捕因謂是水爲龍魚水自下亦通謂之龍魚川又曰祥川者漢戚夫人所生處也髙祖得而寵之改其地爲祥川用表夫人載誕之休祥也秦州記曰枹罕原北有鳯林川川中則黄河水東流莊子曰昔者禹之堙洪水決江河而通四夷九州名川三百攴川三千小者無數方輿記曰清凉川在興道縣北唐史云德宗皇帝以朱泚之難幸梁洋中書舎人齊映從駕至此川見旌旗蔽野上心駭謂泚之追兵疾路至此見梁帥嚴震具軍容拜馬前叙君臣離亂流涕乆之上喜令震登馬與朕作主人映曰嚴震與至尊導馬御膳自有所司湏之上次洋州行宫召映責以儒生不逹兵機煙塵時務姑息主帥映奏曰山南士庶只知有嚴震不知有陛下且今天威親臨令巴蜀士民知天子之尊亦足以盡嚴震爲臣子之節上歎之良乆震聞特拜謝映時議多之即此川也太平御覽卷第六十八
