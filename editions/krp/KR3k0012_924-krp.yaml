body:
  text: 鸚鵡白鸚鵡赤鸚鵡五色鸚鵡孔雀翡翠鷓鴣白鷼鶡䳺鶉萬春鳥舎利鳥兵曹鳥巢衣鳥鸚鵡禮記曰鸚鵡能言不離飛鳥漢書曰献帝興平元年益州蠻夷獻鸚鵡三詔曰徃者益州獻鸚鵡三枚夜食三升麻子今榖價騰貴此鳥無益有損可付空西將軍陽定國令歸本土江表傳曰孫權曽大㑹有白頭鳥集殿前權曰此何鳥諸葛恪對曰白頭公張昭自以坐中最老疑恪以鳥名戲之因曰恪欺陛下未甞聞鳥名白頭翁者試使恪復索白頭母恪曰鳥名鸚䳇未必有對試使輔吴復求鸚父也昭不能荅山海經曰黄山有鳥焉其狀如鶚青羽赤啄人舌能言名曰鸚鵡郭璞曰鸚鵡舌似児扶南徼外有色如赤有純赤赤者大如鴈也又曰鸚鵡慧鳥栖林啄蘂四指中分行則啄地淮南子曰鸚鵡能言而不可使長官是得其所言不得所以言說文曰鸚䳇能言鳥也文士傳曰黄祖丗子射賔客大㑹有獻鸚鵡鳥射舉巵酒扵禰衡曰願先生爲之賦事具賦門成公綏鸚鵡賦曰小鳥以其能言解意故育以金籠昇之堂殿然未得鳥之性張華鷦鷯賦曰鸚鵡慧而入籠傳咸荅李斌書曰吾作左丞未幾而以吾爲京兆雖心知此爲不合然是家親郷里自願便𣣔從耳時足下問吾當去否吾荅鸚鵡子言阿安樂今到阿安樂何爲不去宣驗記曰有鸚鵡飛集山中禽獸輙相愛重鸚鵡不可乆也便去後月山中大火鸚鵡遥見便入水沾羽飛而洒之天神言汝雖有志何足云也鸚鵡曰猶知不能然甞僑是山禽獸行善皆爲兄弟不忍見耳天神嘉感即爲滅火南方異物志曰鸚鵡鳥有三種一種青大如鳥臼一種大如鴟鶚一種五色大如青而小於白者交州以南盡有之白及五色出杜薄州凡鳥四指三向後此鳥兩向前兩指向後異於凡鳥也行則以口啄地然後足從之又曰廣管雷羅春勤等州多鸚鵡野者翠毛丹觜可效人言但稍小不及隴山者毎羣飛皆數百隻山果熟者遇之立盡南中云養之切忌以手捫摸其背犯者即不飲不啄病而卒余寓畨禺曽遊新㑹縣遇安南歡好使麴將軍名承美見代爲交趾使也見養一鸚鵡背尾有深淺翠毛臆前淡紫嫰紅間出兩腋別垂黄毛翅尾甚竒雲南行記曰瞿笇館磴道﨑危又過兩重髙山上下各十四五里山頂平四望無人煙多鸚鵡又曰新安城路多縵山盡是松林其上多鸚鵡飛鳴周宣夢書鸚鵡爲亡人居宅也夢見鸚鵡是亡人也其在堂上憂豪賢白鸚鵡笁法眞登羅浮山記曰山中有純白鸚鵡異苑曰張華字茂先有一白鸚鵡華毎行還鳥輙說僮使善惡後寂無言華問其故鳥云見藏瓮中何由得知公後在外令喚鸚鵡鸚鵡曰昨夜夢惡不出户公猶強之至庭爲鸇所撥敎其啄鸇脚僅而獲免南史曰婆皇國宋大明三年獻赤白鸚鵡又曰婆利國梁普通三年其王頻伽遣使珠智獻白鸚鵡隋書曰杜正玄㓜聦敏愽渉多通開皇末舉秀才㑹林邑獻白鸚鵡僕射楊素促召正玄使作賦正玄倉卒之際援筆立成素見文不加點始異之又曰獨孤師受蕃客鸜鵡帝察知遂斬之唐書曰貞觀中陁洹國王察失利多婆末郍遣使獻白鸚鵡毛羽皓素頭上有紅毛數十垂與翅齊并五色鸜鵡各一明皇雜録曰開元中嶺南獻白鸚鵡養之宫中歳乆頗聦慧洞曉言詞上及貴妃皆呼雪衣女性旣馴擾常假其飲啄飛鳴然亦不離屏帷間上令以近代詞臣詩篇授之數遍便可諷誦上毎與貴妃及諸王博戲上稍不勝左右呼雪衣娘必飛入局中一鼔舞以亂其行列或啄嬪御及諸王手使不能争道忽一日飛上貴妃鏡臺語曰雪衣娘昨夜夢爲鷙鳥所搏將盡於此乎上使貴妃授以多心經記誦頗精熟日夜不息若懼禍難有所攘者上與貴妃出於別殿貴妃致雪衣娘於歩輦竿上與之同去旣至上命從官校獵於殿下鸚鵡方戲於殿檻瞥有鷹至立時而斃上與貴妃歎息乆之遂命瘞於苑中爲立冢呼爲鸚鵡塜赤鸚鵡沈約宋書曰謝莊爲太子庶子時南平王鑠上赤鸚鵡普詔羣臣爲賦太子左衛率袁淑文冠當時作賦畢賫以示莊莊賦亦竟淑見而歎曰江東無我卿當獨秀我若無卿亦一時傑也遂隱其賦南史曰西南夷訶羅陁國宋元嘉七年遣使貢金指環赤鸚鵡五色鸚鵡吴時外國傳曰扶南東漲海中有洲出五色鸚鵡曽見其白者如母鷄廣志同唐書曰玄宗有五色鸚鵡能言育於宫中上命左右試牽御衣鳥輙瞋目吨咤歧王能文學因獻鸚鵡篇以賛其事上以示百寮尚書左丞相張說上表賀曰伏見天恩以靈異鸚鵡及所述篇出示朝列臣按南海異物志有時樂鳥鳴皆太平天下有道則見臣験其圖丹首紅臆朱冠緑翼與此鸚鵡無異而心聦性辯護主報恩故非常品凡禽實瑞經所謂時樂鳥也歧王雖叙其事未正其名望編國史以彰聖瑞又曰元和十年訶陵國遣使獻五色鸚鵡頻伽鳥嶺表異録曰容管廉白州産秦吉了大約似鸚鵡觜脚皆紅兩眼後夾腦有黄肉冠善效人言語音雄大分明於鸚鵡以熟鷄子和飰如棗飼之或云容州有純白色者俱未之見也孔雀春秋元命苞曰火離爲孔雀周書曰成王時方獻孔雀方亦戎別名漢書曰罽賔國出孔雀又曰尉佗獻文帝孔雀二雙續漢書曰西南夷魚池出孔雀又曰西域條支國出孔雀張璠漢記曰條支國臨西海出師子孔雀江表傳曰魏文帝遣使於吴求孔雀羣臣以爲非禮欲不與孫權勑付使魏文帝與朝臣詔曰前于寘王所上孔雀尾萬枚文采五色以爲金根車盖遥望耀人眼吴志曰孫休永安五年使察獸到交趾調孔雀大猪又曰薛綜上䟽曰日南逺致孔雀充備寳玩不抑其賦以益中國吴録地理志曰交阯西子縣多孔雀在山草中郡内及朱崖皆有之晉書公卿賛曰丗祖時西域獻孔雀解人語彈指應聲起儛晉書公孫皓時交趾太守孫諝貪累爲百姓所患㑹察獸鄧荀至擅調孔雀三千頭人畜一頭遣送秣稜和旣苦逺役咸思爲亂郡吏吕興殺諝及荀以郡内附齊書曰武帝年十三夢人以筆畫身左右爲兩翅又着孔雀羽衣裳空中飛舉又曰文惠太子長懋製珎翫之物織孔雀毛爲裘光采金翠過於雉頭逺矣後魏書曰龜兹國地多孔雀羣飛山谷人取養及食乳如雞鶩唐書曰髙祖穆皇后少時父母私相謂曰我女貌非常不可妄以許人當爲之求賢夫矣乃於門屏畫二孔雀相對公子有求婚者輙與兩箭令射之父母潜相謂曰若中孔雀之目者即以妻之前後射者數千人莫能中髙祖後至發各中一目肅公大恱因即與㛰山海經曰南方多孔鳥郭璞曰孔雀也列仙傳曰蕭史吹簫致孔雀西京雜記曰魯恭王好闘鴨鴈養孔雀鵁鶄奉榖一年二千石鹽鐵論曰南越以孔雀珥門户今貴其所饒非所以厚中國也太玄經曰孔鴈之義可法則也虞翻注曰鴈飛成列亦成行故可法則也郭子曰梁國陽氏子年九歳甚聦慧孔君平詣其父不在乃呼兒岀爲之設果有楊梅孔指以示兒此實君家果應聲荅曰未聞孔雀是夫子家禽南越志曰義寧縣杜山多孔雀爲鳥不必疋合止以音影相接便有孕楚辭曰孔雀盖兮翠旌王延曰以孔雀之翅爲車盖登九天兮撫慧星華陽國志曰雲南郡出孔雀常以二月來翔月餘而去異物志曰孔雀其大如鴈而足髙毛皆有班文采捕得畜之拍手則舞又曰孔雀形體旣大細頸隆背似鳯凰自背及尾皆作珠文五彩光耀長短相次羽毛末皆作貟文五色相繞如帶千錢文長二三尺頭戴三毛長寸以爲冠足有距栖遊岡陵迎晨則鳴相和傳巽奢儉論曰豐狐以赤色禍身翡翠孔雀亦灾斯文楊孝元交州異物志曰孔雀人指其尾則儛劉欣期交州記曰孔雀色青尾長六七尺能舒舞足爲節出諸處嶺南異物志曰交趾郡人多養孔雀或遺人以充口腹或殺之以爲脯腊人又養其鶵以爲媒傍施網罟捕野孔雀伺其飛下則牽網横掩之採其金翠毛裝爲扇拂或全株生截其尾以爲方物云生取則金翠之色不減耳翡翠爾雅曰翠鷸也郭璞注曰似鷰紺色出鬰林孝經援神契曰神靈滋液則翠羽曜周書曰成王時蒼梧獻翡翠漢書曰尉佗獻文帝翠鳥千又曰燕刺王旦郎中侍從豸羽黄金附蟬晉灼曰以翠羽飾冠徐廣車服注曰天子輅金根車翠羽盖皇后首飾歩摇八雀九革加翡翠吴録曰薛綜上䟽曰日南逺致翡翠充備寳玩晉令曰翡鳥不得西度隴倉頡解詁曰鷸翠別名也說文曰翡翠青赤雀也異物志曰翠鳥似鷰翡赤而翠青其羽可以爲飾南州異物志曰翠唯六翮毛長寸餘青茸翡大於鷰小於烏曰楊孝元交趾異物志曰翠鳥先髙作巢及生子愛之恐墜稍下作巢子生羽毛復益愛之又更下作巢也南中八郡異物志曰翠大如鷰腹背純赤民捕食之不知貴其毛羽也廣志曰翡色赤紺背出交趾興古縣交州記曰翡翠出九真頭黒腹下赤青縹色似鷓鴣太玄經曰翡翠狐䑕好作也離騷曰翾飛兮翠層曽舉也言巠舞工巧翾然若翠舉楚辭曰翡翠幬王逸注曰翡翠之羽彫飾幬帳宋玉登徒子賦曰眉如翠羽司馬相如子虚賦曰錯翡翠之葳蕤以翡翠之飾歩置之䈂頭也左司吴都賦曰山鷄歸飛而來栖翡翠列巢以重行劉邵七華曰剪儁陵之縹翠承䓤嶺之碧鷄秦書曰符堅時西域獻翠鳥四頭雄雌各二籠盛之月餘並死左傳曰鄭子臧好聚鷸冠戰國䇿曰趙且伐燕蘇代謂燕惠王曰今者臣來過水蚌方岀曝而鷸啄其肉蚌合而拑其啄鷸曰今日不雨明日不雨即見蚌脯蚌亦謂鷸曰今日不岀明日不岀必有死鷸蚌鷸兩不肯解漁者併擒之今趙且伐燕燕趙乆相支以弊衆臣恐強秦之爲漁父也范子計然曰計然者蔡丘濮上人晉三公子姓辛氏字文子博學無所不通范蠡知其賢人卑身事之請受道藏於石室乃刑白鷸而盟焉鷓鴣崔鴻蜀録曰蜀連有災天雨血地仍震地生毛鷓鴣集城下異物志曰鷓鴣其形似雌雞其志懷南不思北其名呼飛但南不北其肉肥美冝炙可以飲酒爲諸膳也嶺表録異曰鷓鴣臆前有白圎點背上間紫赤毛其大如小野雞多對啼南越志云鷓鴣雖東西廽翔然開翅之始必先南翥亦胡馬嘶北之義也其鳴自呼社薄州本草云自呼鈎輈格􅣭李群玉山行聞鷓鴣詩云方穿詰曲﨑嶇路又聽鈎輈格磔聲白鷼西京雜記曰南越王獻髙帝白鷼黒鷼各一隻後漢書班固傳西都賦曰招白鷼下雙鵠榆文竿出比目王彪之閩中賦曰林鷼繡白謝惠連雪賦曰白鷼失素南雲記曰韋齊休使至雲南其國饋白鷼皆生致之鶡說文曰鶡似雉出上黨列子曰黄帝與炎帝戰以鵰鶡爲旗幟漢書曰京兆尹張敞言鶡雀飛集丞相府丞相黄霸以爲神雀欲以上聞敞劾奏之霸大慙續漢書輿服志曰虎賁武騎皆鶡者勇雉也其鬪死乃止故趙武靈王以表武士焉晉八王故事曰張方將移惠帝於長安入殿奉迎自領五千騎皆捉鐵纏槊二節髮眊繫兠鍪皆用凉州白鶡毛望之若茶天子見之大驚山海經曰惲諸之山其鳥多鶡郭璞注曰以雉而大者色有毛角角徤鬪至死乃止蘇子曰帶方寸之印施丈尺之組載貂鶡之尾建千丈之城此丗俗之冨貴也䳺爾雅曰鴇母也其子鸋郭璞注曰䳺青州呼鷄母廣雅曰鴽䳺也說文曰䳺鶉属也一曰牟母一曰鴽吕氏春秋曰季春之日桐始華䑕化爲鴽桐梧也是月故曰始華田鼠化鴽幽州謂之䳺鶉詩曰鶉之奔奔刺衛宣姜也鶉之奔奔鵲之疆疆人之無良我以爲兄又曰不狩不獵胡瞻爾庭有懸鶉兮爾雅曰鷯鶉其雄鶛牝庫其子文郭璞曰鶉䳺属者也春秋運斗樞曰機星散爲鶉德義少殘百家則鶉生狗大戴禮夏小正曰三月田䑕化爲鴽鴽鷯也化而之善故盡其辭也鴽爲䑕化而不善故不盡其辭也廣志曰宛鶉以供御孔元舒在窮記曰趙太龍以鶉二十枚奉上老母南方草物狀曰短頭細黄魚以九月中因秋風而變成鶉上圃吏民捕取鹽炙食滋味肥美出交趾合浦郡東方朔別傳曰占人𬒳召見人以罔求鶉鶉飛入罔知必有罪非入罔罪字故也莊子曰田䑕化爲鶉淮南萬畢術曰蝦蟇得瓜平時爲鶉注云取瓜去辨置生蝦蟇其中敎鶉以血塗瓜堅塞之埋東垣北角深三尺其平日發出之矣爲鶉矣賈誼新書曰宋康王時有雀生鶉占之曰小生巨必霸天下康王大喜射天笞地斬杜焚之爲齊所滅徐幹中論曰俗士之牽逹人猶鶉鳥之欺孺子鶉之性善近人飛不迅行不速似將可獲故孺子逐之不巳俗士以將可悟終難可移逹人所以緩脣鳴聲而不捨也周書時訓曰清明之日又五日田䑕化爲鴽䑕不化國多貪殘兵書曰兩敵相當鶉華壁上軍十五日敗于寳晉記曰趙王倫篡位有鶉入太極前殿有雉集於東堂楚辭曰鸇鷂兮軒軒鶉䳺兮甄甄哀我兮寡獨靡有兮疋倫窮神祕苑曰安定原上築時奠祭以觚爵忽有一鶉飛於觚之上因名鶉觚之城後魏文帝天統中立爲鶉觚縣夢書曰鶉鷃爲闘相見怒也夢見鶉鷃憂闘也劉欣期交州記曰武寜縣秋九月黄魚上化爲鶉鳥三國典畧曰北齊髙緯時有萬春鳥見齊仙都苑上爲造萬春堂以應嘉瑞舎利鳥隋書曰婆利國有鳥名舎利解人語大業十年遣使入貢後遂絶兵曹鳥唐書曰崔希喬爲并州兵曹㕔前叢葦有小鳥如鷦鷯來巢孕卵五色且如鷄子數日􅑹毀鶵見巳踰於母月餘五色成文大如鷄馴擾閑暇頃之飛翔時歸舊所人到令号兵曹鳥巢衣鳥洞冥記曰漢武帝時忽有細鳥集於帷帟或集人衣襟因名曰巢衣鳥宮内嬪好皆恱之有鳥集其衣者輙蒙愛幸至武帝末稍自死人猶愛其皮服其皮者多爲丈夫所媚王莽末猶有一兩箇去來莽羅得之太平御覽卷第九百二十四
