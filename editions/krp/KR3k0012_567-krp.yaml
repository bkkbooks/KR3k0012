body:
  text: 樂部五皷吹樂四夷樂皷吹樂樂志曰何承天云皷吹盖短簫饒歌軍樂也黄帝使歧伯所作以楊德建武漢曲有朱鷺思悲艾如張上之回擁離戰城南巫嵩上陵將進酒君馬黄芳樹有所思雉子班聖人出上耶臨髙䑓逺如期石留務成玄雲黄鶴釣竿魏改十二曲爲之平戰滎陽獲吕布克官渡舊拜定功平南荆平開中應帝期邕熈太和晉武改爲靈芝祥宣受命征遼東景龍飛平玉衡因時運惟庸蜀天序金靈運夏苗畋狄弥田順天道至梁周隋各述夲朝功業隨而改之以自揚其勲烈又曰横吹有雙角即胡樂以從軍也張博望入西凉傳其法於西京𥘉得摩呵兠勒一曲李延年因胡曲更造新聲二十八解晉以來有黄鵠隴頭出閞入閞出塞入塞折楊抑落梅花黄潭子赤枝楊望行人十曲崔豹古今注曰漢樂有黄門皷吹天子所以宴樂群臣短簫饒歌皷吹之常亦以賜有功諸侯也唐㑹要曰大和中太常禮院奏謹按凱樂皷吹之歌曲也周官大司樂王師大献捷奏凱樂注云献功之樂也又司馬之職師有功則凱樂献于社注云兵樂曰凱司馬法曰得意則凱樂所以示喜也左氏傳載晉文公勝楚振旅凱以入魏晉巳來皷吹曲章多述當時戰功是則歴代献捷必有凱歌太宗平東都破宋金剛其後蘇定方執賀魯李勣平髙麗皆俻軍容凱歌入京都謹撿貞觀顯慶開元禮書並無儀注今叅酌古今俻其陳設及奏歌曲之儀如後凡命將征討有大功献俘馘者其名曰俻神䇿兵衛於東門外如献俘常儀其凱樂用鐃吹二部笛畢簘笳鐃皷每色二人歌工二十四人樂工等乗馬執樂器次第陳列如鹵薄之式皷吹令丞前導分行於兵馬俘馘之前將入都門皷吹振作迭奏破陣樂應聖期賀朝歡君臣同慶樂等四曲破陣樂詞曰折受律辝元首相將討叛臣咸歌破敵樂共賞太平人應聖期詞曰聖德期昌運雍熈方寓清乾坤資化育海岳共休明開土欣耕稼銷戈遂偃兵殊方歌帝澤執贄賀升平賀朝歡詞曰四每皇風𬒳千年德永清戎衣更不着今日告功成君臣同慶樂詞曰主聖開昌暦臣忠奉大猷君看偃革後便是太平秋俟行至太社及太廟門工人下馬陳列於門外據周礼大司樂注云献於祖大司馬云先凱樂于社謹詳礼儀則社廟之中似合奏樂伏以尊嚴之地鐃吹讙諽旣無明文或乖肅敬今請並於外門陳設不奏歌曲俟告獻禮畢復導引奏曲如儀至皇帝所御樓前兵仗旌門外二十歩樂工皆下馬徐行前進兵部尚書介曽執鉞於旌門内中路前導周礼師有功則大司馬左執律右秉鉞以先凱樂注曰律所以聽軍声鉞所以示將威吹律聽声其術乆廢請以秉鉞以存礼文次恊律郎二人公服執麾亦於門外分導皷吹令丞引樂工等至位立定太常卿於樂工之前跪具官臣某奏事諸奏凱樂恊律郎舉麾皷吹大振作遍奏破陣樂等四曲樂闋恊律郎偃麾太常卿又跪奏樂畢兵部尚書太常卿退樂工等並於門外立訖然後引俘馘入献及稱賀如別儀晉書曰衛瓘領太子少傳加千兵百騎皷吹之府又曰汝南王亮母伏太妃常有小疾祓於洛水亮兄弟三人侍從並持節皷吹震耀洛濵武帝登凌雲䑓望見曰伏妃可謂富貴矣又曰劉毅字仲雄轉司隷校尉皇太子朝皷吹將入東掖門毅以爲不敬止於門外奏劾保傳以下詔赦之然後得入又曰謝尚累位江夏義陽隨三郡太守徃諮事安西將軍庾翼於武昌翼呼共射曰君若破的當以皷吹相賞尚應聲中之翼即以副皷吹給之王隱晉書曰陶侃平蘇峻除侍中太尉加羽葆皷吹晉中興書曰漢武時南平百越始置交阯九眞日南合浦南海􅓹林蒼梧凡七郡立交趾刺史以州邊逺山越不賔冝加威重故刺史輙假節七郡皆加皷吹齊書武帝時壽昌畫殿南閣置白鷺皷吹二部乾光殿東西頭置鍾磬兩箱皆宴樂處也又曰王敬則臨淮射陽人也僑居晉陵南沙縣母爲女巫常謂人云敬則生時胞衣紫色後應得鳴皷角人笑之曰汝子得爲人吹角可矣又曰張敬兒將拜三司謂其妻㛐曰我拜後應開黄閤因口自爲皷吹聲𥘉得皷吹羞便奏之南史綦母珎之貴倖珎之母隨弟欽之作曁楊令欽之罷縣還珎之迎母至湖孰輙將靑􅌁百人自隨皷角横吹都下當人追從者百數又曰桓崇祖𥘉於淮隂見髙帝便自比韓白唯上獨許之後爲豫州刺史建元二年魏攻壽春崇祖破之啓至上謂朝臣曰崇祖恒自擬韓白今眞人也進爲都督崇祖聞陳顯逹李安人皆増給軍儀乃啓求皷吹上勑曰韓白何可不與衆異給皷吹一部又曰張興丗致位給事中興丗父甞謂興丗曰我雖田舎老公樂聞皷角汝可送一部竹田時欲吹之興丗素恭謹畏法譬之曰此是天子皷角非田舎公所吹梁典曰髙祖衍生秣陵三樓橋宅生曰有異光頂有五岳骨當還宅范雲聞皷吹之聲雲蒙𬒳出視乃髙祖也雲乃深自結託梁書侯景即位乃以廣栁車載皷吹橐駞馬負犧牲輦上置筌蹄垂脚坐焉又曰胡僧祐字顯果爲天水天門二郡太守性好葺綴文詞又多鄙拙多𬒳戯謔自矜尤甚後隨伐侯景廻拜領將軍常以所加皷部置齋中對之人或獻言此乃羽儀公望隆重不當如此荅曰我愛之人莫不笑之陳書劉仲舉字德言爲長安令政號廉平陳文帝居郷里甞詣仲舉時天降雨仲舉獨坐齋内聞外有簘皷聲俄而帝至仲舉異之乃深自結託北史尓朱榮少時父新興曽與榮遊池上忽聞簫皷音謂榮曰古老相傳聞此聲皆至公輔吾年老當爲汝耳隋書皷吹車上施層樓四角金龍衘流蘇羽葆凡皷吹陸則樓車水則樓舡在殿庭則畫筍簴爲樓上有翔鷺棲烏或爲鵠形又曰蔡徴拜吏部尚書啓後主借皷吹後主謂所司曰皷吹軍樂有功乃授蔡徴不自量揆紊我朝章然其父景歴旣有締構之功冝且如啓唐書平陽公主葬特給皷吹太常議婦人無皷吹髙祖曰徃者公主於司竹園舉兵應義親執金皷有克定之功冝特加之又曰中宗時皇后上言自妃主及五品以上母妻請從婚葬之日特進皷吹宫官亦准此左臺御史唐紹上䟽諌曰竊聞皷吹之作夲爲軍容昔黄帝涿鹿有功以爲警衛故鉦皷有靈䕫孔雀雕鶚争石墜崖壯士怒之類自昔功臣俻禮適得用之假如郊祀天地唯有宫懸而無案架故知軍樂之用尚不給於神祀豈容接於閨閫哉鄧德明南康記曰雩都縣君山絶峯髙崿逺望以舟舡上有玉臺方廣數丈周廻盡是白石柱上自然石覆如屋形風雨之後景氣明浄頗聞山上有皷吹之聲吴質別傳曰質爲北中郎將朝京師喜遟其到詔列鹵簿作皷吹至闕而止江表傳曰孫䇿賜周瑜皷吹爲治館舎䇿令曰周公瑾英俊異才與孤有惣角之好骨肉之分前在丹陽發衆及舡粮以濟大事論德酬功此未足報也鄴中記曰石虎正㑹置三十歩皷吹三十歩輙置一部十二人皆在平閣上去地丈餘又有女皷吹贄虞新禮儀志曰漢魏故事將葬設吉凶鹵簿皆皷吹新禮以禮吉事無凶事無樂冝除吉鹵簿凶服皷吹虞按禮葬有客車郎吉駕之明文也徐廣車服注曰中朝公主有皷吹幽明録曰晉臨川太守謝摛夜中聞皷吹聲兄澡曰夜者隂間不及存將在身後及死贈長水校尉加皷吹丗說曰三都二京五經皷吹俗說曰桓公作詩思不來輙作皷吹旣而得思云鳴鵠響長阜歡曰皷吹固自來人思語林曰陸士衡爲河北督日巳𬒳間搆内懷憂懣聞衆軍警角皷吹曰我今聞此不如華亭鵠戻魏武帝令曰孤所以能常以少兵敵衆者常念増戰士忽餘事是以徃者有皷吹而使歩行爲戰士愛馬也不樂多署吏爲戰士愛糧也王渾表曰吴國臨戰牙門將張秦黄辰騎督綦母倪勇揵效武破賊制勝此三人之所致也秦辰巳亡今倪獨在昔伐蜀有小戰功牙門數人便加皷吹至於滅吴一國而有未得皷吹者臣愚昧謂聖詔賜倪皷吹存録猛將以盡武人之力也陸機皷吹賦曰原皷吹之所始蓋禀命於黄軒四夷樂毛詩谷風皷鍾曰以雅以南以籥不僭爲雅爲南舞四夷之樂大德德廣所及也東夷之樂曰昧北夷之樂曰禁西夷之樂曰離南夷之樂曰任以爲籥舞若是和而不僣矣周禮春官鞮鞻氏曰鞮氏掌四夷之樂與其歌聲又曰旄人掌散樂舞夷樂夷樂四夷之樂散樂野人爲之善者又曰春官韎師曰韎師掌教韎樂祭祀則帥其属而儛之舞東夷之舞也周禮春官鞮鞻氏掌四夷之樂鄭玄注曰東方曰昧南方曰任西方曰朱离北方日禁禮記明堂位曰昧東夷之樂也任南蠻之樂也納蠻夷之樂於太廟言廣魯於天下也後漢書曰永寜𥘉年西南夷禪國王獻樂及幻人明年元㑹作之於庭安帝與群臣共大竒之又曰陳禪字紀山爲諌議大夫西南禪國王獻樂及幻人能吐火自支解易牛馬頭大㑹作之庭禪離席舉手曰帝王之庭不冝作夷狄之樂五經通義曰東夷之樂持矛舞助時之生南夷之樂持羽舞助時之養又舞四夷之樂明澤廣𬒳四表也東夷之樂曰侏離南夷之樂曰任西夷之樂曰禁北夷之樂曰昧東方所謂侏離者何陽始通萬物之属離地而生故謂之侏離南方所以謂任者何陽氣盛用事萬物懷任故謂之任西方所以謂之禁者何西方隂氣用事禁止萬物不得長大故謂之禁北方所以謂之昧者何北方隂氣盛用萬物暗昩不見故謂之昧四夷之樂何以作之於廟陳於户王子年拾遺記曰成王之時南垂之南有扶婁夷國或於掌中備百獸之樂婉轉屈曲於指間人形或長數分神怪歙忽樂府傳此末代猶在焉風土記曰越俗飲讌即皷拌以爲樂取大素圜柈以廣尺五六者抱以着腹以右手五指更彈之以爲節舞者蹀地擊掌以應柈節而舞樂部樂志曰龜兹起自吕光滅龜兹因得其聲樂記有竪箜篌琵琶五絃笙笛簫觱篥毛圎皷都荅臘皷腰皷羯皷谿婁皷銅抜貝等十五種爲一郭工二十人歌曲有善善摩尼解曲娑伽兒舞曲小天踈勒監天笁起自張重華據涼州重四譯来貢樂器鳯首箜篌琵琶五絃笛銅皷毛圎都曇銅抜貝等九種爲一部工十三人歌曲有沙石彊舞曲有文曲康國起自周閔帝娉北狄爲后得其所獲西戎狄伏因得其聲集器有笛正皷銅枝等四種爲一部工七人歌曲有三殿農和去舞曲有賀蘭體鼻始末䟽勒安國髙麗並起後魏平馮氏通西域因得其伎繁㑹其聲踈勒樂器有竪箜篌琵琶五絃笛簫觱篥荅臘鼓腰鼓羯鼓谿婁鼓十種爲一部工十二人歌曲有元利死讓樂舞曲有逺解曲有鹽曲安國樂器箜篌琵琶五絃笛簫雙觱篥正鼓和銅枝等簫小觱篥桃皮觱篥腰鼓齊鼓檐鼓貝等十四種爲一部工十八人歌曲有歌芝栖舞曲有舞芝栖北狄樂皆馬上樂也鼓吹夲軍旅之音馬上奏之故自漢以來北狄樂㧾歸鼓吹署後魏樂府始有北歌即魏史所謂真人歌是也代都時命掖庭宮女晨夕歌之周隋代興西涼樂雜奏今存者五十三章其名因可解者六章慕容可汗吐谷渾部落稽鉅鹿公主白浄王太子企俞也其餘不可解或可汗之詞按今大角即後魏代簸邏逈是也其曲亦多可汗之詞北虜之俗皆呼主爲可汗吐谷渾又慕容別種知此歌是燕魏之際鮮卑歌詞虜音不可曉梁有鉅鹿公主歌似是姚萇時歌詞華音與此歌不同梁樂府鼓吹又有大白浄皇太子小白浄皇太子企俞等曲隋鼓吹有白浄王太子曲與北歌校之其音皆異唐書樂志曰樂安樂後周武帝平齊所作也行列方正象城郭周代謂之城舞者八十人刻木爲面㺃喙獸耳以金飾之垂線爲髮畫襖皮帽舞蹈姿制作猶胡狀唐㑹要曰驃國樂貞元十八年正月驃國王來獻凡一十二曲以樂工三十五人來朝樂曲皆演釋氏經綸之詞驃囯在雲南西南以天笁囯相近故樂多演釋氏之詞每爲曲皆齊声㗩各以两手十指齊歛爲赴節之狀一低一仲未甞不相對有類中囯柘枝舞驃一作僄其西別有彌臣囯樂舞亦與驃囯同子習此伎以樂后制使袁滋郗土美至南詔並皆見此樂唐㑹要曰南詔樂貞元十六年正月南詔異牟等作奉聖樂舞因西川押雲南八國使韋臯以進時御麟德殿以閱之又曰髙昌樂西魏與髙昌通始有此樂至隋開皇六年來獻聖明樂曲至太宗朝伐其國盡得其樂事見十部伎門也又曰扶南天笁二國樂隋代全用天笁列於樂部不用扶南因煬帝平林邑國獲扶南工人及其匏琴朴陋不可用但以天笁樂轉冩其聲又曰龜兹樂自吕光破龜兹得其聲吕氏云其樂分散至後魏有中原復獲之至隋有西國龜兹之號凢三部開元中大盛於時曹婆羅門者累代相承傳其業至務妙逹尤爲北齊文宣愛之毎彈常自擊胡皷和之及周武帝娉突厥女爲后西域諸國皆來媵遂荐有龜兹踈勒康國安國之樂又曰百濟貞觀中滅二國盡得其樂至天后時髙麗樂猶二十五曲貞元末唯能習一曲衣服亦漸變其土風矣其百濟至中宗時工人死散開元中歧王爲太常卿復奏置焉又曰踈勒樂工人皂絲布頭巾白絲布𫀆錦衿褾白絲布袴舞二人白襖錦䄂赤皮鞾赤皮帶樂用竪箜篌琵琶五絃琵琶横笛簫觱篥荅臘鼔腰鼓雞樓鼓康國樂工人皂終布頭巾緋布𫀆錦領舞二人緋襖錦䄂緑綾淩渾襠褲赤皮鞾白袴帑舞急轉如風俗之胡旋乞寒者夲西國外蕃之樂也神龍二年三月并州清源縣尉吕無泰上䟽曰臣謹按洪範八政曰謀時寒若能謀事則時寒順之何必倮露形體澆灌衢路鼓舞跳躍而索寒也禮曰立秋之月行夏令寒暑不節隂陽不調政令之失也休咎之應君臣之感也理均影響可不戒哉至景雲二年左拾遺朝曰宗諌傳曰辛有適伊川見𬒳髪於野祭者曰不及百年此其戎乎其禮先亡矣後秦晉遷陸渾之戎於伊川以其中國之人習戎狄之事一言以貫百代可知今之乞寒濫觴胡俗伏願三思籌其所至先天二年十月中書令張說諌曰韓宣適魯見周禮而歎孔子㑹齊數倡優之罪列國如此况天朝乎今外國請和選使朝謁所望接以禮樂示以兵威雖曰戎狄不可輕易焉知無駒支之辯由余之賢哉且乞寒潑胡未聞典故倮躰跳足盛德何觀揮水投泥失容斯甚法殊魯禮襲比齊優恐非干羽柔逺之義罇爼折衝之道願擇芻言特罷此戲至開元元年十二月勑臘月乞塞外蕃所出漸浸成俗因循巳乆自今巳後無問蕃漢即冝禁斷樂府雜録曰舞有骨鹿舞胡旋俱於一小圎毯子上舞縱横騰擲兩足終不離於毯上其妙若皆夷舞也太平御覽卷第五百六十七
