body:
  text: 禮儀十五封禪河圖眞紀鈎曰王者封太山禪梁父易姓奉度繼興崇功者七十二君尚書中候曰維歳二月候在東舘鄭玄注曰維辭也侯齊桓公舘舎嘆曰於戲仲父寡人聞古霸王封太山刻石紀號立顯象今寡人名爲何君管子曰衛困于狄案兵湏㓕乃存之仁不純名爲霸君昔古聖王功成道洽符出乃封太山今比目之魚不至鳯凰不臻麒麟遯未可以封禮記禮噐曰是故因天事天天髙因髙者以事也因地事地地下因下者以事也因名山升中于天名猶大也升上也中猶成也謂巡守至於方嶽燔柴祭天告以諸侯之成功也孝経說曰封乎㤗山考績燔燎禪乎梁甫刻石紀號也升中于天而鳯皇降龜龍假功成而太平隂陽氣和而致象物禮記逸禮曰三皇禪云云盛意也五帝禪云云特立於身也三王禪梁父連延不絶父死子繼也春秋漢含孳曰天子受符以辛日立號帝宰奉圖帝人共觀九日悉見後丗之過方來之害以告天受符謂應期之人當起者之符代行其録運者也曰請封禪到岱宗晝期過數告諸命封封太山禪禪梁父孝經鈎命決曰封乎太山考績燔燎禪乎梁父刻石紀號煥炳巍巍教化顯著五經通義曰易姓而王太平必封太山禪梁父何天命巳爲王使理羣生也或曰封以黄金爲泥以銀爲繩經無明文以義說之所以正封岱太山者五嶽之長羣神之主故獨封於太山告太平於天報羣神之功也禪梁父者太山之支屬能配太山之德也史記封禪書曰齊桓公旣霸會諸侯於葵丘而欲封禪管仲曰古者封太山禪梁父者七十二家而夷吾所記者十有二焉昔無懷氏封太山禪云云宓羲封太山禪云云神農封太山禪云云炎帝封太山禪云云黄帝封太山禪亭亭顓頊封太山禪云云帝嚳封太山禪云云堯封太山禪云云舜封太山禪云云禹封太山禪㑹稽湯封太山禪云云周成王封太山禪社首應劭曰山名在博縣晉灼曰在鉅平南卜三里也皆受命然後得封禪桓公曰寡人北伐山戎過孤竹西伐大夏渉流沙束馬懸車上卑耳之山南伐至邵陵登熊耳山以望江漢兵車之㑹三而乗車之㑹六九合諸侯一匡天下諸侯莫違我者三代受命亦何以異乎於是管仲相桓公不可窮以辭因設之以事曰古之封禪鄗上之黍北里之禾應邵曰鄗上山也鄗音曤蘇林曰鄗上北里皆地名所以爲盛江淮之間一茅三脊所以爲藉也東海致比目之魚西海致比翼之鳥然後物有不召而自至者十有五焉今鳯皇麒麟不來嘉榖不生而蓬蒿藜秀茂䲻梟數至而欲封禪無乃不可乎桓公乃止又曰始皇旣并天下即位三年東巡狩郡縣祠邹嶧山頌秦功業於是徴齊魯之儒生博士七十人至於太山下或議曰古者封禪爲蒲車惡傷山之土石草木掃地而祭席用𦵔稭言其易遵也始皇聞此議各乖異難施用由此絀儒生而遂除車道上自太山陽至巔立石頌秦始皇帝德明其得封也從隂道下禪於梁父其禮頗採太祝之祀雍上帝所用而封藏皆祕之丗不得而記也始皇之上太山中阪遇風雨暴至休於大樹下因封其樹爲五大夫又曰今天子即位尤敬鬼神之祀元年漢興以六十餘歳矣天下乂安搢紳之屬皆望天子封禪改正度也而上郷儒術招賢良趙綰王臧等以文學爲公卿欲議古立明堂城南以朝諸侯革巡狩封禪改暦服色事未就㑹竇太后治黄老言不好儒術諸所興爲皆廢是時李少君亦以祠竈榖道却老方見上上尊之少君言上曰祠竈則致物致物而丹砂可化爲黄金黄金成以爲飲食器則益壽益壽而海中蓬萊僊者乃可見見之以封禪則不死黄帝是也上與公郷諸生議封禪封禪用希曠絶莫知其儀禮而群儒采封禪尚書周官王制之望祀射牛事上於是乃令諸儒習射牛草封禪儀羣儒旣不能辯明封禪事又牽拘於詩書古文而不能騁於是上盡罷諸儒遂東幸緱氏禮登中嶽太室從官在山下聞若有言萬歳云於是以三百户封太室奉祠遂東巡海上四月還至奉髙上令諸儒及方士言封禪人人殊不經難施行天子至梁父禮祠地主乙夘令侍中儒者皮弁薦紳射牛行事封太山下東方如郊祀太一之禮封廣丈二尺髙九尺其下則有玉牒書書秘禮畢天子獨與侍中奉車子侯上太山亦有封其事皆禁明日下隂道丙辰禪太山下趾東北肅然山如祭后土禮天子皆親拜見衣上黄而盡用樂焉江淮間一茅三脊爲神藉五色土益雜封縱逺方竒獸蜚禽及白雉諸物頗以加禮兕牛犀象之屬不用皆至太山祭后土封禪祠其夜若有光晝有白雲起封中天子從禪還坐明堂羣臣更上壽漢書曰公孫弘議欲倣古巡狩封禪之事諸儒對者五十餘人未能有所定先是司馬相如病死有遺書頌功徳言符瑞足以封太山上竒其書以問倪寛對曰陛下躬發聖德統揖群臣宗祀天地薦禮百神精誠所嚮徴兆必報天地並應符瑞帝王之盛節也冝順承天慶垂萬丗之基上然之乃自制儀采儒術以文焉又郊祀志曰𥘉上欲治明堂奉髙旁未曉其制度濟南人公玉帶上黄帝時明堂圗於是上令奉髙作明堂汶上如帶圖及是歳脩封則祠太一五帝於明堂上坐令髙皇帝祠坐對之公玉帶又曰黄帝時雖封太山然風后封鮌歧伯令黄帝封東太山韋昭曰别有小太山在陰一名介山臣瓉安鄭志朱虚界中有小太山是也汾隂子推所焚故名介山也不以介爲大也禪凡山合符然後不死天子旣令設祠具至東太山太山卑小不稱其聲乃令祠官禮之而不封焉其後令帶奉祠候神物復還太山脩五年之禮如前而加禪祠石閭石閭者在太山下趾南方方士言僊人閭也故上親禪焉其後五年復至太山脩封還過祭恒山自封太山後十二歳而周遍於五嶽四瀆矣後五年復至太山脩封武帝五脩封又曰太𥘉元年十二月禪蒿里服䖍曰山名在太山下太𥘉三年春正月東巡海上夏四月還脩封太山禪石閭天漢三年受計還幸北地祠常山瘞玄玉鄧展曰瘞埋也又曰太始四年春三月甲申脩封丙戍禪石閭夏四月幸不其如淳曰其音基不其山名因以爲縣祠神人于交門宫應劭曰神人蓬萊仙人之屬也晉灼曰瑯瑘縣有交門宫武帝所造若有嚮坐拜者作交門之歌師古曰如有神人景象嚮祠坐而拜也又曰司馬相如旣病免家居茂陵天子曰相如病甚可徃從悉取其書若不然後之矣使所忠徃而相如巳死家無遺書問其妻對曰長卿未嘗有書也時時著書人又取去長卿未死時爲一卷書曰有使來求當奏之其遺扎書言封禪事所忠奏焉天子異之續漢書祭志曰建武中群臣上言即位三十年冝封禪太山詔書曰即位三十年百姓怨氣蒲腹吾誰欺欺天乎曽謂太山不如林放何事太山汙七十二代之編録三月上幸魯過太山太山守以上過故承詔祭太山及梁父時虎賁中郎將梁松議封禪事上許松等奏乃求元封時封禪故事議封禪所施用有司奏當用方石再累置壇中皆方五尺一枚厚一尺用玉牒書藏方石牒厚五寸長尺三寸廣五寸有玉牒十枚列於方石旁東西南北各三皆長三尺廣一尺厚七寸檢中刻三處深四寸方五寸有盖檢用金鏤五周以水銀和金爲泥刻玉璽一枚方寸一分一枚方五寸石四角有距石皆再累一枚長一丈厚一尺廣二尺皆在壇上其下用距十八枚皆髙三尺厚一尺廣二尺如小碑環壇立之去三歩距石下皆有石跗入地四尺又用石碑髙九尺廣三尺五寸厚尺二寸立壇丙地去壇三尺以刻書上以用石功難又欲及二月封故詔松因故封石空檢更加封而巳松上䟽爭之以爲登封之禮今告功皇天垂後無窮以爲萬民也丞天之敬章圗書之瑞尤冝顯著今因舊封竄寄故石下恐非重命之義受命中興冝當特異以明天意遂使太山郡及魯趣石工直取完青石無五色時以印工不能刻玉牒欲用丹􅃮書之㑹求得刻玉者遂刻書書秘刻方石中令容玉牒二月上至奉髙遣御史與蘭臺令史將工先上山刻石碑文二十二日辛夘晨燎祭天於太山下南方群臣皆從用樂皆如南郊諸王王者二公孔子後襃成君皆助祭在位畢將升封或曰太山雖已從食於柴祭今親升告功冝有禮祭於是使謁者以一特牲於常祠太山處告祠太山如親耕􅓔劉先農虞故事至食時上御輦升山日後到山上即位於壇南北面羣臣以次陳後西上畢帝升壇尚書令奉玉牒檢皇帝以寸二分璽親封之訖太常命人發壇上石尚書令奉藏玉牒巳復石覆訖尚書令以五寸印封石檢事畢皇帝拜群臣稱萬歳令人立所刻石碑乃復道下二十五日甲午禪祭地於梁隂以髙后配山川羣神從如元始中北郊故事東觀漢記曰中元元年正月群臣復奏言登封告成爲民報德百王所同陛下輙距絶不許臣下不敢頌功𫐠德謹按河雒䜟書赤漢九丗當巡封太山凡三十六事陛下遂以仲月令辰巡岱嶽之正禮奉圖雒之明文以祈靈瑞以爲兆民於是許焉至太山乃復議曰國家德薄災異仍至圖䜟盖如此邪上東巡狩至太山有司復奏河圖䜟記表章赤漢九丗尤着明者後凡三十六事司馬彪續漢書曰河圖㑹昌符云漢太興之道在九代之王封乎太山刻石着紀禪于梁父退省考功典略曰建武三十年有司奏封禪詔曰災異連仍日月薄蝕百姓怨歎而有事於太山汙七十二代編録以羊皮雜貂裘何彊顔耶晉書禮志曰魏明帝黄初中護軍蔣濟表曰夫帝王大禮巡狩爲先昭祖楊禰封禪爲首是以自古革命受符未有不蹈梁父登太山刋無竟之名紀天人之際者也冝下公卿廣撰其禮卜年考時昭告上帝以副天下之望帝詔曰聞蔣濟斯言使吾汗出流足自開闢以來封禪者七十餘君耳故太史公曰雖有受命之君而功有不洽是以中間其逺者千有餘年近者數百載其儀闕不可得記吾何德之脩敢庶兹乎濟豈謂丗無管仲以吾有桓公登太山之志乎吾不敢欺天也濟之所言華則榮矣非助我者也公卿侍中尚書侍省之而巳勿有所議天子雖拒濟議而實使髙堂隆草封禪之儀以天下未一不欲便行大禮㑹隆卒不復行之魏志曰帝聞隆没歎曰天不欲成吾事堂生捨我亡也又曰武帝平吴混一區宇太康元年衛瓘等上表請封禪詔曰此盛德之事所未議也又表曰唐虞三代濟丗弘功之君莫不仰承天休俯恊人志登圎丘履梁父未有辭焉者蓋不可讓也今陛下勲髙百王德無與二茂績宏規巍巍之業固非臣等所能究論而聖旨勞謙屢自抑損時至弗應推美不居闕皇代之上儀塞靈祗之欵望使大晉之典謨不同風於三五臣等誠不敢奉詔詔曰方當共思弘道以康庶績且俟他年無所紛紜也沈約宋書禮志曰永𥘉三年髙祖將北掃戎狄渾一天宇㑹計洛陽秩禮名嶽羣臣竊相謂曰湏王振旅飲至隴朔無塵當議奏封禪脩升中之禮搢紳聞者咸曰冝然自漢光武登封之後斯絶矣孫嚴宋書曰袁淑爲吏部郎太祖元嘉二十六年大舉北討淑侍座從容曰盛王令典廢壞永乆今當鳴鑾中嶽席卷趙魏檢玉岱宗今其時也臣逢千載之㑹願上封禪書一篇使聲齊七十二代帝曰盛德之事何足以當之隋書志曰封禪者髙厚之謂也天以髙爲尊地以厚爲德増太山之髙以報天也厚梁甫之基以報地也昭天之所命功成事就有益於天地若天地之更髙厚云漢光武中興聿遵其故晉宋齊梁及陳皆未遑其議後齊有廵狩之禮并登封之儀竟不之行也開皇十四年群臣請封禪髙祖不納晉王又率百官抗表固請帝命有司草儀注於是牛弘辛彦之等創定其禮奏之帝逡巡其事曰此事體大朕何德以堪之但當東狩因拜岱山耳十五年春行幸兖州遂次岱山爲壇如南郊唐書曰貞觀中房玄齡議曰漢建武中封禪用元封故事封太山於圜臺上四面皆立石闕並髙五丈有方石再累藏玉牒書石撿十枚於四邊括之東西各三南北各二外設石封髙九尺上加石盖周設石距十八枚如碑之狀去壇三步其下石跗入地數尺今按封禪者本以成功告於上帝天道崇質義取醇素故藉用藁秸罇以瓦甒近代此法不在經誥又乖淳朴之道定議除之按梁甫是謂梁隂近代設壇於山下乃乘處隂之義今定禪禮改壇位於山北又曰貞觀六年文武百官以𥘉平突厥盛德𬒳於海内又年榖累登表封太山太宗謂侍臣曰朕毎見衆議以封禪爲盛事勸朕行之如朕本心但使天下太平家給人足雖闕封禪之禮亦可以比徳於堯舜昔始皇爲合天心自稱皇帝登封岱宗奢侈自矜漢文竟不登封而躬行儉約刑措不用今皆稱始皇爲暴虐之主漢文爲有德之君以此而言無假封禪又曰髙宗麟德二年十月司禮太常伯劉祥道上䟽請封禪丁夘將封太山發自東都三年正月戊辰朔車駕至太山親祀昊天上帝於封祀壇以髙祖太宗配饗己巳帝升山行封禪之禮庚午禪於社首祭皇地祇以太穆太皇太后配饗皇后爲亞獻越國太妃燕氏爲終獻辛未御降禪壇壬申御朝覲受朝賀改元乾封又曰麟德三年登封太山先是皇后抗表曰封禪舊儀祭皇地祗以太后昭配而皆以公卿行事詳求至理有紊徽章望以展禮之日㹅率六宫内外命婦親奉奠獻從之至時遂以皇后爲亞獻越國太妃燕氏爲終獻帝行𥘉獻之禮畢執事者皆趨下而䆠者執帷皇后率六宫以升行禮登歌帷外王公巳下就位於山足帷皆用錦繡在位者瞻望或誚焉又曰永淳二年上以風眩轉加停封中嶽上自東封之後皇后盛賛行中嶽之禮毎下詔輙年飢㓂至而罷於是嵩山之下營奉天宫以爲有事之漸時有童謡曰嵩髙凡幾層不畏登不得但畏不得登及是禮物畢備竟以疾加而還又曰則天后萬歳登封元年臘月甲申上登封于嵩嶽大赦天下改元大酺丁亥禪于少室山又曰開元登封祀昊天上帝于太山以髙祖神堯皇帝配享上冕裘升壇奉珪璧奠獻命有司享五帝百神于山下壇禮畢上乃飲福酒中書令張說進稱天賜皇帝太一神䇿周而復始永綏兆人帝拜稽首山上作圎臺四階謂之䃭王中金泥䃭際以天下同文之印封之然後焚柴燎發群臣稱萬歳傳呼從山頂至山下振動天地鑾輅還山下之齊宫有慶雲隨馬祥風繞輅中書令張說等賀上曰朕以薄德恭膺大寳雲物休祐皆是卿輔弼之力君臣相保勉副天心長如今日不敢矜怠說等又曰聖心誠懇昨夜齋則息風収雨今朝封祀則天清日暖復有祥風助樂卿雲引燎靈迹盛事千古未聞辛夘祀皇地祗于社首之太折壇睿宗皇帝配享藏玉冊於石䃭如封祀壇之儀𥘉上登山至齋宫其夕隂雲慘冽勁風四起裂幕折柱寒氣功骨上露立祈請仰天自誓曰某身有過請即降罰萬人無福亦請某爲當罪應時風上天地清晏及升壇休氣四塞登封飄若天外及禪社首五色雲見日重輪又曰開元十三年登封太山上因問玉牒之文前代帝王何故秘之賀知章曰玉牒本是通於神明之意前代帝王祈求各異或禱年筭或思神仙其事微密故外人莫知之上曰朕今此行皆爲蒼生祈福更無秘請冝將玉牒出示百寮其詞曰有唐天子臣某敢昭告于昊天上帝天啓李氏運興土德髙祖太宗受命立極髙宗升中六合殷盛中宗紹復繼體不定上帝眷祐錫臣忠武厎綏内難推戴聖父恭承大寳十有三年祗若天意四海晏然封祀岱嶽謝成于天子孫百禄蒼生受福風俗通曰封禪必於岱宗者長萬物之始隂陽交代觸石而出膚寸而合不崇朝遍雨天下唯太山乎封禪之制石髙丈二尺刻之曰事天以禮立身以義事父以孝成民以仁四夷八蠻咸貢其職也白虎通曰封禪王者易姓而起必升封太山何敎告之義也始受命之時改制應天天下太平功成封禪以告太平也所以必於太山何萬物之所交代之處也必於其一何因髙告順其類也故升封者増髙也下禪梁甫之基廣厚也刻石記號者著巳之功迹也天以髙爲尊地以厚爲德故増太山之髙以放天附梁甫之基以報地明天之所命功成事就有益天地若髙者加髙厚者加厚矣或曰封者金泥銀繩或曰石泥金繩封以印璽故孔子曰升太山觀易姓而王可得而數者七十餘君風俗通曰封太山禪梁父說岱宗上有金篋玉䇿能知人年壽脩短武帝探得十八倒讀曰八十其後果用考長桓譚新論曰太山之上有刻石凡千八百餘處而可識知者七十有二袁准正論曰封禪之言唯周官有三大封之文齊桓公欲封禪聞管仲言而止焚燎祭天皆王者之事非諸侯之所爲也是以學者疑焉後秦一主漢二君脩封禪之事其制爲封土方丈餘崇於太山之上皆不見於經秦漢之事未可專管仲云禹禪㑹稽告天則同祭地不得異也㑹稽而可禪四嶽皆可封也夫洛陽者天地之所合嵩髙者六合之中也今處天地之中而吿於嵩髙可也奚必於太山王嬰古今通論曰太山上爲天門值户户爲明堂聖帝受天官之宫也王者即位三十年功成治定則告成於天登封太山刻石紀號張華封禪議曰臣聞肇自生民則有后辟載祀之數莫之能紀立德濟丗楊暉仁風以登封太山者七十有四家其謚號可知者十有四也晉太康地記曰奉髙者以事五嶽帝王禪代之處也故有明堂在縣西南四里漢武立太壇於東山以祭天示増髙也南史曰齊髙帝幸華林宴集使各効伎藝禇彦囬彈瑟琶王僧䖍柳丗隆彈琴沈文季歌子夜來張敬兒舞王儉曰臣無所解唯知誦書因跪上前誦相如封禪文上笑曰此盛德之事吾何以堪之太平御覽卷第五百三十六
