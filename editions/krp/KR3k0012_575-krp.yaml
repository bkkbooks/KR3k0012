front:
  text: 太平御覽卷第五百七十五
  hash: sha256:8d6643c9f0f5deacecb2b228869ab8f38f504b7498c39e9452ff07dd44f37cdf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_575-1a}
body:
  text: 樂部十三鍾錞于鍾釋名曰鍾空也空内受氣多故聲大說文曰鍾秋分之音物鍾成也易通卦驗曰人主冬至日縱八能之士擊黄鍾之宫則人主敬善公卿大夫誠信禮記曰知悼子卒未葬平公飲酒師曠李調侍鼓鍾杜蕢自外來聞鍾聲曰安在曰在寢杜蕢入寢歴階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北面坐飲之又樂記曰鍾聲鏗鏗以立号号以立横横以立武君聽鍾聲則思武臣周禮冬官鳬氏曰鳬氏爲鍾鏄薄厚之所震動清濁之所由出侈弇之所由興有說說由意鍾已厚則石大厚則声不發巳薄則播大薄則声散侈則柞柞讀爲棹咋咋然之咋爲声大外也弇則鬰声不舒揚長甬則震鍾棹則声不正鍾小而短則聲疾而短聞淺則驂驂昜竭也鍾小而長則其聲舒而逺聞深則安安則息又曰鳬氏爲鍾兩欒謂之銑又曰磬師掌教擊編鍾又春官曰鍾師掌教金奏擊金以爲奏節金謂鍾鏄也左傳襄二曰莒人伐我東鄙圍台季武子救台遂入鄆取其鍾以爲公盤又襄六年曰吴公子札自衛如晉將宿於戚戚孫文子之邑聞鍾聲曰異哉吾聞之辯而不德必加於戮夫子獲罪於其君以在此也懼猶不足而又何樂夫子之在此也猶鷰之巢於幕上也君又在殯而可以樂乎献公卒未葬也又曰鄭伯有嗜酒爲窟室而夜飲酒擊鍾焉朝至而未巳又曰鄭人賂晉侯歌鍾二肆注曰肆列也懸鍾十六爲一肆二肆三十二枚又昭五曰天王將鑄無射周景王無射鍾名律中無射泠州鳩曰樂天子之職夫音樂之輿也而鍾音之器也天子省風以作樂器以鍾之鍾聚也以噐聚音輿以行之小者不窕大者不槬窕則不感不充滿瓜人心也挎則不容心不堪容也心是以感感實生疾今鍾摦矣王心不堪其能乆乎又曰宋左師每食擊鍾又曰鄭伯始朝于楚楚子賜之金旣而悔與之盟曰無以鑄兵故以鑄三鍾爾雅大鍾曰鏞其中謂之剽音瓢其小者謂之棧音醆郭璞醆曰鏞一曰鏄國語曰晉克潞之役魏顆以身却退秦于輔氏親止杜囬其勲銘之景鍾又曰周景王二十三年鑄無射而爲之大林鍾成伶人告和王謂冷州鳩曰鍾果和矣對曰上作噐民樂之則爲和今民莫不怨恨諺曰衆心成城衆口鑠金臣不知其和賈逵曰大林無射副也漢書曰髙祖廟有十鍾受千石撞之聲聞百里後漢書鄭司農曰于鍾脣之上祛也皷所擊處也舞縣謂之旋旋蟲謂之斡旋属鍾柄所以懸之魏志曰𥘉漢鑄鍾銅工柴玉巧意多所造作杜夔令工鑄鍾其聲清濁多不法故毀改作王甚厭之白太祖太祖取所鑄鍾雜錯更試然後知䕫爲精而玉之妄也晉書裴頠令荀藩終父勗之志鑄鍾鑿磬以俻郊廟宋書曰漢中城固縣漢水崖際有聲如雷俄頃崖崩有銅鍾十二趙書曰將軍張珎領郡縣民丁萬人徙洛陽六鍾猛簴九龍翁仲銅駞飛廉鍾一没盟津中蕭子顯齊書曰張瓌字祖逸吴郡吴人父永右光禄大夫曉音律宋孝武問永以爲太極殿前鍾聲嘶永荅曰鍾其處鑿而去之聲遂清越十六國春秋曰石勒耕輙聞鍾鐸之音或在前後懼以問翼伽伽曰作勞耳鳴無不祥也勒至平原常在平人師驩家爲奴有老父謂勒曰君魚龍髮際際四道巳成當貴爲人主甲戍之歳王彭祖可圗勒曰若如公言不敢忘德忽然不見每耕又聞皷角之聲勒又告諸奴又聞之因曰吾𥘉在家恒聞如是諸奴白驩驩竒而免之至是衆歸焉莊子曰梓慶削木爲鐻見者驚猶鬼神魯侯問其術對曰臣將爲鐻未甞敢以耗氣齊七日忘吾四支然後入山林觀天性區別見成鐻然後加手鐻似夾鍾也管子曰黄帝作五聲以正五鍾一曰青鍾大音二曰赤鍾心三曰黄鍾洫光四日景鍾昧其明五曰黒鍾隠其帝五聲旣調然後作五行尸子曰鄭公謂子産曰飲酒之不樂鍾皷不鳴寡人之性也國家之不乂朝廷之不理與諸侯交之不得志也子之任也子無入寡人之樂寡人無入子之朝自是以來子産理鄭城門不閉國無盗賊道無餓人孔子曰若鄭公之好樂也雖抱鍾而朝可也戴延之西征記曰陜縣城西北二面帶河河中對城西北角水涌起銅鍾翁仲頭髮常岀水上漲減恒與水齊晉軍當至髮不復出唯見水異嗟嗟有聲聲聞數里翁仲本在城内大司馬門外爲賊所徙當西入關至此而沒吕氏春秋曰晉平公鑄爲鍾使工聽之皆以爲調矣師曠日不調請更鑄之公曰吾皆以爲調矣師曠曰後丗有知音者知鍾不調也臣竊耻之至於師㳙而果知鍾之不調也慎子曰魯莊公鑄大鍾曹翽入見曰今國𥚹小而鍾大君何不圖之鬻子曰大禹治天下也以五聲聽之政曰教寡人以義者擊之鍾韓子曰叔孫相魯有子曰孟丙竪牛妬之叔孫爲丙鑄鍾鍾成丙不敢擊使竪牛請之叔孫竪牛不爲之請又欺之曰吾巳爲尓請之矣使尓擊之叔孫聞之曰丙不請而擅擊鍾遂怒之丙出奔齊尸子曰鍾皷之聲怒而擊之則武憂而擊之則悲喜而擊之則樂其意變其聲亦變意誠感之逹於金石而况人乎晏子曰景公爲大鍾將懸之仲尼伯常騫晏子三人俱朝曰鍾將毀之撞之果毀公見三子問之晏子對曰鍾大不以禮故曰將毀仲尼曰鍾大懸下氣上薄故曰將毀伯常騫曰今日庚申雷日也隂莫勝於雷故曰將毁韓子曰智伯欲伐仇由而道難不通鑄大鍾遺之方車二軌仇由大恱除塗將内之赤草曼支諌曰此小所以事大也今以大事小兵必隨之仇由君不聽曼支因斷轂而馳至齊十月仇由亡淮南子曰闔閭伐楚破九龍之鍾許愼注曰刻簴爲九龍懸鍾也賈于云毀十龍之鍾又曰齊景公族鑄大鍾撞之於庭下郊雉皆雊許愼注曰族聚也鍾聲如雷震雉皆應之又曰孟秋之日西舘御好白色白綵撞白鍾故處西宫又曰鍾之與磬也近之則鍾音亮逺之則磬音彰磬石也音清明逺聞而彰著物固有近不若逺逺不若近者山海經云豊山者有鍾霜降則鳴又曰炎帝之孫伯崚伯崚生鼔延是爲鍾吕氏春秋曰黄帝又命伶倫鑄十二鍾和五音始奏之曰咸池東方朔傳曰漢武帝未央宫殿前鍾無故自鳴三日三夜不止大恠之召待詔王朔問之朔對曰有兵氣上更問東方朔朔對曰王知其一不知其二臣昔聞銅土之子以隂陽氣類言之子母相感山恐有崩㢮者故鍾先鳴昜曰鳴鶴在隂其子和之上曰應在㡬日朔曰在五日内居三日南郡太守言有山崩延袤二十餘里上大笑賜帛三十疋郭縁生𫐠征記曰洛陽太極殿前大鍾六枚父老云曽有欲移此鍾者聚百數長絙挽之鍾聲震地咸懼不敢復犯陸翽鄴中記大面廣外一丈二尺小面廣七尺或作蛟龍或作鳥獸繞其上何法盛晉中興書曰義熈十一年霍山崩毁出銅鍾六枚上有文古科斗書人莫能識晉潘岳開中記曰漢昭帝平陵宣帝杜陵二陵鍾在長安夏侯征西欲徙詣洛陽重不能致懸在清明門門裏道南其西者平陵鍾東者杜陵鍾也王子年拾遺記曰帝顓頊居位文德者則錫以鍾磬武德者錫以干戈戴延之西征記曰鍾大者三十二博山頭形瓌紐作師子頭鍾大者三十二博山頭二丈厚八尺大面廣一丈二尺小面七尺或作蛟龍或作鳥獸周繞其外唐雜制曰凢私家不設鍾磬三品巳上女樂五人五品巳上不過三人也虞喜志林曰吴時於江水中得鍾有百餘字募求讀者並無人曉樂什圖徴曰君子鑠金爲鍾四時九乳是以撞鐘以知君鍾調則君道得宋均注曰九乳法九州又曰聖王徃承天定爵禄人者不過其能尊卑有位位有物物有冝功成者賞功敗者罰故樂用鍾宋均注曰不過能謂量能授爵也有罪鳴鍾以攻之也白虎通日鍾之爲言動也隂氣用事萬物動成鍾爲氣用金聲也鏄者時之聲也節度之所生也有節度則萬物昌無節度則萬物亡異苑曰魏時殿前鍾忽鳴張華曰蜀銅山崩說苑曰鼓法天鍾法地秦始皇建千石之鍾立萬石之簴傳玄歌辭曰雷師鳴鍾鼓風伯吹笙簧西母出穴聽王父吟東廂三禮圖曰凢鍾十六枚同爲一筍簴爲編鍾特懸者謂之鏄又曰鏄鍾之大者也形如鍾但大耳其在簴亦一枚而巳三輔黄圖曰始皇簴髙三丈鍾小者千石通禮義纂曰鍾磬半爲堵全爲肆軒懸三面歌鍾三肆判慿懸兩面歌鍾二肆特懸一面唯磬而巳又曰圎鍾夾鍾也於位在卯氣生於房心爲宫天帝之明堂故奏樂先奏圎鍾爲宫又曰駕入撞蕤賔之鍾左右鍾皆應者案蕤賔位居午午主陽陽主動象王自外動而入方居之始故先作之而東廂應者東爲陽陽主動明以静主動使之相應也駕出撞黄鍾右五鍾皆應黄鍾位居子子爲陽陽主動象王自内動而出方行之始故先作之而西廂應者西爲隂隂主静明以動告静使之相和也廣古今五行記曰㑹稽人陳清於井中得小鍾長七寸二分上有古文十八字其四字可識云㑹稽岳命郭璞云愍懷䘮覆元帝中興之應自宣帝至恭帝數十人又曰陜州黄河有銅鍾在水水大小恒自浮岀每晦朔隂雨之日輙鳴聲響悲亮行客聞之莫不愴然又曰晉中朝有人懸銅爲盤晨夕恒鳴如人扣打以白張華華曰此盤與洛鐘宫啇相諧故聲相應可錯令輕則韻乖自止古今樂録曰髙廟中四鍾皆奏時廟鍾也重十二萬斤明帝徙二鍾在南宫張衡東京賦曰發鯨魚鏗華鍾薛綜注曰天子出則鳴滿牢海中大魚名鯨海島中又有大獸名蒲牢畏鯨魚鯨魚一擊蒲牢輙大嗚呼凢鍾欲令大鳴故作蒲牢於上所以擊之者鯨魚有篆刻文故曰華鍾也戴延之西征記曰洛陽太極殿前左右各三銅鍾相對鍾大者三十二圍小者二十五圍唐書曰唐太宗召張文収於太常令與少卿祖孝孫叅定雅樂有古鍾十二近代唯用其七餘有五鍾俗号啞鍾莫能通者文収吹律調之聲皆響徹時人咸服其妙錞于周禮曰以金錞和皷宋史云廣漢什邡人叚祖以錞于獻始興王鑑其器髙三尺六寸六分圍二尺四寸圎如筩色黒如􅃮甚薄上有銅馬以䋲懸馬令去地尺餘灌之以水又以噐盛水於下以芒當心跪注錞于以手振芒則其聲如雷清響良乆乃絶後周書斛斯徴遷太常卿樂有錞于者近代絶無此器或有自蜀得之皆莫之識徴見之曰此錞于也衆弗之信徴遂引于寳周禮注以芒筒捋之其聲極振衆乃歡服徴乃取以合樂焉樂書曰錞于者以銅爲之其銅象鐘頂大腹􅰐口弇上以伏獸爲鼻内懸子鈴銅舌凢作樂振而鳴之與鼓相和又曰凢金爲樂器有六皆鍾之類也曰鍾曰鏄曰錞曰鐲音濁曰鐃奴交切曰鐸大各切鏄如鍾而大錞于也圎如椎頭上大下小所謂金錞和皷鐲鉦也形如小鍾軍行爲鼓節鐃鈴而無舌有柄而執之鐸如大鈴太平御覽卷第五百七十五
