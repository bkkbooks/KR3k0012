front:
  text: 太平御覽卷第九百三十五鱗介部七
  hash: sha256:0ad3e3efdc5fc7b09f67df6b4225be860fd0e80006acfc38e3b3f597f958a5ae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_935-1a}
body:
  text: 魚上星經曰天魚一星在尾後河中星明則河海岀大魚周易姤卦曰包有魚義不及賔也又中孚曰豚魚吉信及豚魚也又明象曰筌者所以在魚得魚而忘筌也毛詩曰潜季冬薦魚春獻鮪也冬魚之性定春鮪新來冝薦又魚藻曰魚在在藻有頒其首毛云頒大首皃也禮記曲禮曰凢登宗廟槀魚曰啇祭鮮魚曰脡祭尚書益稷曰曁鳥獸魚鼈咸若注微物咸順之左傳昭元劉子曰善哉禹功明德逺矣微禹吾其魚乎又昭元曰魚鹽蜃蛤弗加於海春秋運斗樞曰四方煩擾小民失恩虎銜魚爾雅曰魚有力者強大多力者音暉魚枕謂之丁枕在魚頭骨中形似篆書丁字可作印魚膓謂之乙魚尾謂之丙此皆似篆書字因以名焉禮記曰魚去乙然則魚之骨體盡似丙丁之屬因形名之史記周本紀曰武王渡河中流白魚躍入舡中武王俯取以燎之漢書曰陳勝呉廣爲屯長領兵戍漁舉大討威兵士以丹書帛曰陳勝王置所􅊻人魚腹中兵買魚見書東觀漢記曰世祖率鄧禹等擊王郎橫野將軍劉奉大破之上過禹營禹進炙魚上飱㗖勞勉士吏威嚴甚厲衆皆竊言劉公真天人也謝承後漢書曰㑹稽陳囂少時於郭外水邊捕魚人有盗取之者囂見避之草中追以魚遺之盗慙不受自是無復盗其魚後漢書曰羊續爲南陽太守府丞嘗獻其生魚續受而懸於庭丞後又進之續乃出所懸者以杜其意魏志曰黃初六年帝東征呉文德郭后留譙時后從兄弟欲遏水取魚后曰今奉車所不足豈此魚乎呉志曰孫權時謡云寧飲建鄴水不食武昌魚寧還建鄴死不止武昌居晉書曰王延性仁孝繼母卜氏甞盛冬思生魚勑延求而不獲杖之流血延㝷汾叩凌而哭忽有一魚長五尺躍出水上延取以進母卜氏食之積日不盡於是心悟撫延如巳生又曰五部單于左賢王劉豹妻呼延氏魏嘉平祈子於龍門俄而有一大魚頂有二角軒鬐躍鱗而至祭所乆之而去巫覡皆異之曰此嘉祥也其夜夢旦所見魚變爲人左手把一物大如半鷄子光景非常授呼延曰此是日精服之生貴子寤而告豹豹曰吉徴也自是十三月而生元海又曰錢唐杜子恭有秘術甞就人借爪刀其主求之恭曰當即相還耳旣而刀主至嘉興有魚躍入舡中破魚得瓜刀又曰呉隱之爲廣州刺史帳下人進魚毎剔去骨存肉隱之覺其用意罰而黜焉宋書曰王弘之性好釣上虞江有一處名三石頭弘之常垂綸於此經過者不識之或問魚師得魚賣不弘之曰亦不得得亦不賣日夕載魚入上虞郭經親故各以一兩頭置門而去沈約宋書曰明帝太始二年幸華林園天淵池白魚躍入御舟齊書曰中興元年義師下未至竟陵三十里魚長三尺躍入御舡中梁書曰張昭字德明㓜有孝性父漠常患消渇嗜鮮漁昭乃身自結網捕魚以供朝夕又曰王固甞聘魏因晏饗昆明池魏人以南人嗜魚大設罟網固以佛法呪之遂一鱗不獲崔鴻十六國春秋前凉録曰金城太守胡勗叛張䡄遣都護宗毅治中令狐瀏討之濟河中流白魚入舡瀏曰魚鱗物虜必解甲歸我矣勗請降軌宥之後魏書曰髙祖幸清徽堂因之流化池髙祖曰此地中亦有佳魚任城王澄曰此所謂魚在在藻有頒其首髙祖曰且取王在靈沼於牣魚躍北史曰陸政性至孝其母呉人好食魚北土魚少政求之甞苦難得後宅忽有泉出而魚遂得以供膳時人因謂其泉爲孝泉隋書曰虞孝仁性奢華常以駱駞負凾盛水養魚而自給又曰大業中納言楊逹言於遼水造御舟有白魚躍入舟内又曰乞伏慧爲潭桂二州緫管其俗輕剽慧躬行朴素以矯之風化大洽曾見人以簺音賽捕魚者出絹買而放之唐書曰真臘國地饒瘴癘毒蠚音適海中大魚半出望之如山又曰太宗幸蒲州刺史趙元楷課父老服黃紗單衣迎謁路左又潜飼羊百餘口魚數百頭將餽貴戚太宗知而數之又曰太宗觀漁於西宫見魚躍焉問其故漁者曰此當乳也於是中網而止又曰開元二十一年衢州獲魚有鉻獻之侍中裴光庭等奏曰魚龍爲圖河洛所出比之盛明彼何足云又曰吐蕃國在吐谷渾西界其春夏軍粮資海魚以給之國語曰周文太子發耆鮑魚太公爲其傅曰鮑魚不登爼豆豈有非禮而可養太子老子曰魚不可脫於淵國之利噐不可以示人文子曰川廣者魚大山髙者獸脩故魚不可以無餌釣獸不可以空器召又曰因所貴而貴之物無不貴因所賤而賤之物無不賤故不放魚於木沉鳥於淵鄧析書曰夫水濁則無掉尾之魚政苛則無逸樂之士列子曰八紘之北有溳海魚廣千里其長稱焉孟子曰有餽生魚於子産子産使校人畜之池反命曰始舎之圉圉焉少則洋洋焉子産曰得其所哉校人曰孰謂子産智吾旣烹而食之矣又曰故爲淵敺魚者獺也爲叢敺雀者鸇也魯連子曰古善魚者宿沙習子使魚生於山則雖十宿沙不得一魚焉宿沙非闇於魚道者彼山非魚之所生也莊子曰泉涸魚相與處於陸相煦以濕相濡以洙不如相忘於江湖也又曰莊子與惠子遊於濠梁之上莊子曰儵出遊從容是魚之樂也惠子曰子非魚安知樂莊子曰子非我安知我不知魚之樂也又曰吞舟之魚蕩而失水則螻蟻能制之故鳥飛不厭髙魚鱉不厭深又曰朽爪化爲魚物之變也又曰任公子蹲㑹稽釣東海朞年而大魚食之公子得若魚淅河以東蒼梧以北無不厭若魚者又曰井魚不可語海夏蟲不可語氷符子曰太公㳙釣於隱溪五十有六而未嘗得一魚魯連聞而觀焉太公㳙跽而隱崖不餌而釣仰咏俯吟暮則釋竿其膝所處石皆若曰其跗觸崖若路魯連曰釣所本以在魚無魚何釣太公曰不見康王父之釣耶念蓬萊釣巨海摧岸投輪五百年矣未嘗得一魚方吾猶一朝耳顧子曰昔宋人臨萬仞之淵釣數寸之鱗魚將食釣不知膝之自進有頃墮而死利能誘也韓子曰公儀休相魯而嗜魚一邦皆爭買魚而獻之公儀子不受曰夫唯嗜魚固不受也淮南子曰夫水濁則魚噞政苛則民亂又曰火上㝷水下流故鳥動而髙魚動而下又曰上求材臣殘木上求魚臣乾谷又曰欲致魚者先通水欲致鳥者先樹木水積而魚聚木茂而鳥集又曰林中不賣薪湖上不鬻魚有所餘也又曰爼之先生魚豆之先㤗羮此皆不快於耳目不適於口腹而先王貴之先本後末也又曰使葉落者風揺之使水濁者魚撓之又曰惠子從車百乗以過孟諸莊子見之而棄餘魚疾惠故也又曰月者隂之宗是以月毀則魚腦減又曰楚王亡其猨而林木爲之殘猨捷躁依木而處故殘林以求之也宋君亡其珠而池魚爲之殫殫盡也又曰爲魚德者非挈而入淵爲猨賜者非負而縁木縱其所之而已又曰畜池魚者必去猵音編獺養禽獸者必去豺狼又曰臨河羡魚不若歸家織網羡願也又曰爭魚者濡逐獸者趨非樂之也故至言去言至爲無爲又曰故天之且風草木未動而鳥巳翔矣鳥巢知風也其且雨也隂曀未集而魚巳噞矣魚潜知雨也又曰燿蟬者務在明其火釣魚者務在芳其餌明其火者所以燿而致之也芳其餌者所以誘而利之也又曰季子治亶父三年季子子賤而巫馬期衣短褐易容貌徃觀化焉易服而徃微以視之也見夜魚者釋之巫馬期問焉曰凢子所爲魚者欲得也今得而釋之何也魚者對曰季子不欲人取小魚也所得者小魚是以釋之巫馬期歸以報孔子曰季子之德至矣抱朴子曰取一把礜丸内一活魚口與無藥者俱投沸膏中猛火之上其衘藥者浮戯瀺灂不死又曰丹陽水有丹魚先夏至十日夜伺之魚先浮水側赤光上照取此魚血以塗足可以歩行水上金樓子曰專諸學炙魚香聞數里王僚索魚炙專諸持一利剛刀藏着魚腹中晏子春秋曰景公射質堂上唱善者一口弦章入公曰吾失晏子未甞聞吾不善章曰臣聞君好臣服君嗜臣食尺蠖食黃身黃食蒼身蒼君其食謟人言乎公曰善賜弦章魚五十乗弦章歸魚車塞途章撫其僕曰曩之唱善者皆欲此魚也固辭不受戰國䇿曰靖郭君將城薛齊人有請一言者靖郭君見之趨進曰海大魚因反走君使更言之曰海大魚網不能止釣不能牽蕩而失水則螻蟻得意今齊亦君之水也靖郭君乃止又曰魏王與龍陽君共舡而釣龍陽君得十餘魚而涕下曰臣之始得魚也臣甚嘉之後得大者令臣且欲棄前所得者今以臣之㓙惡也而得爲王拂枕席夫四海之内其美人亦甚多聞臣之得幸於王也畢褰裳而趨王視臣亦曩臣之所棄魚也王於是令四境之内有敢言美人者族家語曰孔子之楚有漁者獻魚孔子不受漁者曰天暑市逺無所鬻之思慮棄之糞壤不若獻之君子孔子曰再拜而受掃地祭之吕氏春秋曰竭澤而漁豈不得魚而明年無魚焚藪而畂豈不得獸而明年無獸又曰善釣者出魚于十仞之下餌香也善弋者下鳥于百仞之上弓良也又曰宋桓司馬有寳珠抵罪出亡宋王問珠之所在曰投之池中於是竭池取珠魚皆死矣呉越春秋曰越王旣棲㑹稽范蠡等曰臣竊見㑹稽之山有魚池上下二處水中有三江四瀆之流九溪六谷之廣上池冝於君王下池冝於民臣畜魚三年其利可以致千萬越國當冨盈新序曰楚人有獻魚於楚王者曰今日漁獲食之不盡賣之不售棄之又惜故來獻之左右曰鄙哉辭也楚王曰子不知漁者仁人也盖聞囷倉粟有餘者國有饑民後宫多幽女者下民多曠夫餘衍之蓄聚於府庫者境内多貧乏之民皆失君之道故庖有肥肉廐有肥馬民有饑色亡國之君藏於府庫寡人聞之乆矣未能行也漁者知之其以喻寡人也且今行之矣於是乃遣使恤鰥寡故漁者獻餘魚而楚國頼之風俗通曰城門失火禍及池中漁俗說池中漁人姓字居近城門城失火延及其家謹案百家書宋城門失火因汲取池中水以沃灌之池中空竭魚悉露死喻惡之滋并中傷重謹也又曰伯魚之生適有饋孔子魚者嘉以爲瑞故名鯉字伯魚論衡曰釣者刻木爲魚丹漆其身迎水浮之水動作魚似真真魚並來㑹聚士龍之象何必不能致雨耶又曰彭蠡之濵以魚食犬顔氏家訓曰山中人不信有大魚大如木海上人不信有大木大如魚又曰江陵髙偉隨顔之推入齊地凢數年向幽州淀中捕魚後病見羣魚囓之而死三輔故事曰武帝作昆明池學水戰法後昭帝小不能復征討於池中養魚以給諸陵祠餘付長安市魚乃賤先賢傳曰蔡君仲至孝母䘮居墓側天旦下神魚四頭置墓前以祭蕭廣濟孝子傳曰巴郡杜孝後在成都母喜食生魚孝於官得生鮮截竹銅盛魚一頭置江中妻得之笑曰是我壻寄乃以進母又曰陳玄陳太子也後母譖之陳侯令自投遼水魚負之以出玄曰我罪人也故求死耳魚乃去西京雜記曰昆明池刻石爲魚每雷雨魚甞鳴吼鬐尾皆動漢代祈雨徃徃有驗又曰昔人有東海遊者隨風浪莫知所之一日一夜得一孤洲共侣歡然下石植纜登洲煑食食未熟而洲没在舡者斫纜舡復飄蕩向者孤洲大魚也怒棹楊鬐吹波吐浪去疾風雲在洲上死者十餘人神山傳曰葛玄見賣大魚者玄謂曰蹔煩此魚到河伯處魚主曰魚已死玄曰無苦乃以丹書𥿄内魚口中擲水中有頃魚還躍上岸得書青黒如木業又與吴王坐樓上見作請雨社人玄曰雨易得耳即書符着社中一時之間大雨流潦帝曰水中可有魚乎玄復書符擲水中湏臾有大魚數百頭使人治食之水經曰魚復溪中有魚其頭似羊豐肉少骨美於餘魚又曰扶南國有鮮色魚黒身長五丈頭如馬首伺人入水便來爲害廣志曰武陽小魚大如針號一斤千頭蜀人以爲醬太平御覽卷第九百三十五
