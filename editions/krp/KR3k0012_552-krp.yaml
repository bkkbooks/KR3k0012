front:
  text: 太平御覽卷第五百五十二禮儀部三十一
  hash: sha256:37c4e473cc8b1492911dbcf1b6eeda0583775464089feea9f3945c183e407032
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_552-1a}
body:
  text: 椁櫕蒭靈明器明衣祖載翣紼旅旒旐挽歌方相椁周禮地官閭師曰凡庶民不樹者不椁禮記檀弓上曰有子曰昔者夫子居於宋見桓司馬自爲石椁三年而不成夫子曰若是其靡也死不如速朽之愈也死之欲速朽爲桓司馬言之禮記檀弓下曰孔子之故人曰原壤其母死夫子助之沐椁沐治也原壤登木曰乆矣予之不託於音也木椁材也託寄也謂叩物以作音也歌曰狸首之班然執女手之卷然說人亂也夫子爲弗聞也者而過之從者曰子未可以巳乎夫子曰丘聞之親者無失其爲親也故者無失其爲故也又䘮大記曰君松椁大夫栢椁士雜木椁椁謂周棺者也天子栢椁以端長六尺夫子制於中都使庶人之椁五寸五寸謂端方也棺椁之間君容祝大夫容壷士容甒間可以藏物因以爲節左傳定上曰魏獻子屬伇於韓簡子原壽過簡子韓起孫不信也壽過周大夫也而田於大陸焚焉還卒於寗寗今脩武魏也范獻子去其栢椁以其未復命而田也范獻子伐魏子爲政去其栢椁是貶廣雅曰椁廓也史記曰始皇葬驪山發北山石爲椁又曰愼夫人鼓瑟上自倚瑟而歌意悽愴悲懷顧謂羣臣曰嗟乎北山石爲椁用紵絮斮一作錯陳􅃮其間紵絮以漆著其間豈可動哉左右曰善張釋之前曰使其中有可欲者雖錮南山猶有郄使其中無可欲者雖無石椁又何慼焉文帝稱善古史考曰禹作土堲以周棺湯作木椁昜土堲漢書曰始皇石椁中爲逰又劉向上書曰棺椁之作自黄帝始也臣瓉注曰殷人作棺椁也始皇葬於驪山後牧兒亡羊羊入其藏牧者持火照求羊失火燒其藏及椁續漢禮儀志曰侯王公主將軍特進薨使者治䘮作栢椁東觀漢記曰明帝自制石椁廣丈二尺長二丈五魏志曰夫餘國厚葬有椁無棺東沃沮其葬作大木椁長十餘丈開一頭作户舉家皆共椁刻木爲數魚豢魏略曰髙麗其死葬有椁無棺停䘮百日也越絶書曰闔閭葬銅椁三重二石僞事曰佛圖澄死時衆官皆殯歛以生所服錫杖鉢終内着棺中爲其理石作椁葬畢經年冉閔後故發椁開棺視之了不見醴骨處所唯見杖鉢存焉莊子曰衛靈公死卜葬沙丘而吉掘之數仞得石椁焉有銘曰不馮其子靈公奪而埋之郭縁生述征記曰桓魋石椁在九里山之東北也椁有二重門間隱起青石方淨如鏡門扇數四博物志曰漢滕公薨公卿送至東都門四馬悲鳴掊地不行於蹄下得石椁有銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室豫章記曰艾縣有一塜鑿青石以爲椁制度非常號曰楊栁塜歷代乆逺莫知其誰櫕禮記䘮大記曰君殯用輴櫕至于上畢塗屋大夫殯以幬櫕置于西序塗不墍於棺士殯見衽塗上帷之鄭玄注云攅猶藂也釋名曰塗曰櫕櫕木於上而塗之也蒭靈周禮春官塚人曰及葬言鸞車象人鸞遣車也象人以蒭草爲人言問其不如法度也禮記檀弓曰塗車蒭靈自古有之蒭靈束茅爲人馬謂之靈者神之明器之道也言與明器同孔子謂爲蒭靈者善謂爲俑者不仁不殆於用人乎哉俑偶人也有靣目機發有以於生人孔子善古而非周釋名曰束草爲人馬以神靈名之也續漢書禮儀志曰天子崩蒭靈三十六尺王肅䘮服要記曰魯哀公葬父孔子問曰寧設桐人乎哀公曰桐人起於虞卿虞卿齊人遇惡繼母不得養父死不得葬知有過故作桐人吾父生得供養何用桐人爲陸機士庶挽歌辭曰埏埴爲塗車束薪作蒭靈明器周禮春官冡人曰大䘮入藏凶器凶器明器周禮夏官司兵曰大䘮廞五兵廞興作也興作明器之共禮記檀弓上曰宋襄公葬其夫人醯醢百甕曽子曰旣曰明器矣而又實之言名之爲明器與祭器皆實之是亂鬼器與人器也又曰旣殯旬而布材與明器木工冝乾暗且預成材椁材也又曰之死而致死之不仁而不可爲也之死而致生之不知而不可爲也之徃也死之生之謂無知與有知也爲猶行也是故竹不成用瓦不成沬木不成斵成猶善也竹不可善用謂邊無滕味當作沫沬靧也琴瑟張而不平竽笙備而不和無宫啇之調有鍾磬而無簨簴不縣之也横日簨植曰簴其曰明器神明之也言神明死之也神明者非人所知拆其器如此又曰仲憲言於曽子曰夏后氏用明器示民無知也所謂致死之仲憲孔子弟子原憲殷人用祭器示民有知也所謂致生之周人兼用之示民疑也言使民疑於無知與有知曽子曰其不然乎其不然乎非其說之非也夫明器鬼器也祭器人器也夫古之人胡爲而死其親乎言仲憲之言三者皆非此或用鬼器或用人器又檀弓下曰孔子謂明器者知䘮道矣備物而不可用也哀哉死者而用生者之器不殆於用殉乎哉其曰明器神明之也神明死者異於生人也釋名曰送死之器曰明器神明之器異於人鹽鐵論曰古者明器有形無實示人不用也今厚資多藏器用如生人並衣綈紈江逌表曰宣皇帝顧命終制山陵不設明器以貽後則景帝奉遵遺勑逮文明皇后崩武皇帝亦承前無所設施唯酺醢之奠瓦器而巳昔康皇帝玄宫内寳奩烏粥此盖太妃因巳之情實違先志累世之法今永欲以爲故事用此二物明衣說文曰褮鬼衣也褮讀如葛壘榮之縈穆天子傳曰贈用文錦明衣祖載周禮春官䘮祝曰掌大䘮及朝御柩乃奠朝將葬朝於祖考廟及祖飾棺及載遂御之祖將葬祖於庭禮記檀弓曰殯於客位祖於庭所以即逺也儀禮旣夕曰旣夕哭請啓期告于殯宿興設盥于祖廟門外祖王父也下土祖拆共廟有司請祖期將行而飲食曰祖祖始也白虎通曰祖於庭何奪孝子之恩也祖始始載於庭也乗車辭祖禰故爲祖載也翣周禮夏官曰御僕大䘮持翣翣棺飾也持之者夾蜃車禮記檀弓下曰周人廧置翣鄭玄注云廧栁衣翣者車飾也又禮器曰天子七月而葬五重八翣諸侯五月而葬三重六翣大夫三月而葬再重四翣此以多爲貴也又䘮大記曰飾棺君黼翣二畫翣二大夫黼翣二畫翣二士畫翣二古史考曰周公作翣齊書曰張緒卒日無宅以殯遺命凶事不設栁翣莊子曰戰而死者其人之葬也不以翣資翣者武之所資也戰而死者無武也翣將安施耳世夲曰武王作翣董勛荅問曰翣似屏風人持隨䘮車前後左右也紼禮記雜記曰諸侯䘮執紼五百人四紼皆衘枚紼引車索釋名曰從前引曰紼紼發也發車使行續漢書禮儀志曰禮登遐中黃門虎賁執紼又曰公卿巳下子弟凡三百人執紼白素幘委貌冠杜預要集曰凡挽天子六紼諸侯四大夫二士一旅旒賀循葬禮曰大夫五旒吉韋車之所建也通而已下不爲龍畫旐周禮春官曰司常大䘮供銘旌建廞車之旌銘旌王則太常也禮記檀弓上曰銘明旌也以死者爲不可別也故以其旗識之續漢書禮儀志曰禮登遐大旂之制長三刃十有二斿曵地畫日月昇龍書旐曰天子之柩賀循葬禮曰杠今之旐也古者以緇布爲之命以絳繒題姓字而巳不爲畫飭也禮論曰問下殤葬墓有旐否徐邈荅曰旐以題柩耳無不有旐晉書曰魏明悼后崩議書名旌或欲去姓而書魏或欲兩書安平王子孚以爲經典正義皆不應書凡帝王皆因夲國之名以爲天下之號而與徃代相别耳非爲擇美名以自光也天稱皇天則帝稱皇帝地稱后土則后稱皇后此乃所以同天地之大號統無二之尊名不待稱國號以自表不俟稱氏族以自彰挽歌左傳哀上曰呉與齊戰齊人公孫夏將戰命其徒歌虞殯杜預注曰虞殯送葬歌曲示必死纂文曰薤露今人挽歌續漢書禮儀志曰禮登遐羽林孤兒巴俞櫂歌者六十人續漢書曰大將軍梁啇三月上巳日㑹洛水倡樂畢極終以薤露之歌座中流涕其年八月而啇薨晉公卿禮秩曰安平王葬給挽歌六十人諸公及開府給三十人晉書禮志曰漢魏故事大䘮及大臣之䘮執紼者挽歌新禮以爲挽歌岀於漢武帝役人之勞歌聲哀灱遂以爲送終之禮雖音曲摧愴非經典所制違禮衘枚之義方在號慕不冝以歌爲名除挽歌摯虞以爲挽歌因倡和而爲摧愴之聲衘枚所以全哀此亦以感衆雖非經典所載是歴代故事詩稱君子作歌惟以告哀以歌爲名無所嫌冝定新禮如舊續晉陽秋曰袁山松作行路難辭句婉麗聽者莫不流淚呉曇善倡樂桓伊能挽歌時稱爲三絶又曰武陵王晞未敗四五年喜爲挽歌自揺鈴使左右和之語林曰張湛好於齊前種松栢養鴝鵒袁山松岀遊好令左右挽歌時人謂張屋下陳尸袁道上行殯謝綽宋拾遺録曰太祖嘗召顔延之傳詔頻曰㝷覔不值太祖曰但酒店中求之自當得也傳詔依旨訪覔果見延之在酒肆躶身挽歌了不應對他日酒醒乃徃宋書曰范曄爲吏部郎元嘉元年彭城王太妃薨將葬祖夕僚故並集東府曄與司徒左曹屬王深及弟司徒祭酒廣夜中酣飲開北牖聽挽歌爲樂彭城王義康大怒左遷宜城太守梁書曰謝幾卿普通六年詔西昌侯藻督衆軍北侵幾卿啓求行擢爲藻軍師長史軍至渦陽退敗幾卿坐免官居自揚石井宅中交好者載酒從之客恒滿坐時左丞庚仲容亦免歸二人意相得並肆情誕縱或乗露車歴遊郊野酔則執鐸挽歌不屑物議莊子曰紼謳所生必於斥苦司馬彪注云紼引柩索也斥踈緩若用力也引紼所有謳者爲人用力慢緩不齊促急之也風俗通曰京師賔㛰嘉㑹酒酣之後續以挽歌譙周法訓曰挽歌者髙帝召田撗至尸郷自斃從者不敢哭而不勝其哀故作此歌以寄哀音焉于寳捜神記曰挽歌者䘮家之樂執紼者相和之聲也挽歌詞有薤露蒿里二章岀田橫門人橫自殺門人傷之爲悲歌言人如薤上露昜晞滅也亦謂人死精魂於蒿里古辭曰薤露朝露何昜晞明朝更復露人死一去何時歸二章曰蒿里誰家地聚斂精魂無賢愚鬼伯一何相催促人命不得少踟蹰至李延年乃分爲二曲薤露送王公貴人蒿里送士大夫庶人使挽柩者歌之又有長歌短歌言壽命長短不可妄求魏繆襲挽歌辭曰生時遊國都死没弃中野朝發髙堂上墓宿黄泉下白日入虞淵縣車息駟馬造化雖神明安能復存我形容稍歌滅齒髮行當墮自古皆有然誰能離此者陸機挽歌辭曰魂衣何盈盈旟旐何習習父母拊棺號兄弟扶筵泣靈轜動轇龍首矯崔嵬挽歌挾轂唱嘈嘈一何悲浮雲中容與飄風不能廻淵魚仰失梁征烏俯墜飛又曰中闈且勿諠聽我薤露詩生死各異倫祖載當有時舎爵兩楹位啓殯進靈轜餞飯觴莫舉出宿歸無期又曰重阜何崔嵬玄廬竄其間磅礴云四極穹崇効蒼天側聽隂溝涌卧觀天井懸壙霄何遼廓大暮安可晨人徃有返歳我行無歸年昔居四人宅今爲萬鬼隣昔爲七尺體今成灰與塵金王昔所佩鴻毛今不振豐肌享螻蟻形體永夷泯壽堂延魑魅虚無自相賔螻蟻爾何怨魑魅我何親撫心痛荼毒永歎莫爲陳宋陶潜挽歌辭曰荒草何茫茫白楊亦蕭蕭嚴霜九月中送我岀逺郊四靣無人居髙墳正嶕嶤馬爲仰天鳴風日自蕭條幽室一巳閉千年不復朝千年不復朝賢逹無柰何向來相送人各亦歸其家親戚或餘悲他人亦巳歌死去何所道託體同山阿又曰有生必有死早終非命促昨暮同爲人今旦在鬼録魂氣散何之枯形寄空木嬌兒索父號良友撫我哭顔延之挽歌辭曰令龜告明兆撒奠在方昏戒徒赴幽麥祖駕出髙門行行去城邑遥遥首丘園息鑣竟平𡑞稅駕列巖根北齊祖孝徴挽歌辭曰驅駟馬謁帝長楊宫旌懸白雲外騎獵紅塵中今來向漳浦素蓋轉悲風榮華與歌笑萬事盡成空隋盧思道鼓城王挽歌辭曰旭且禁門開隱隱靈輿發纔看鳯樓逈稍視龍山没猶陳五營騎尚聚三河卒容衛儼未歸空山照秋月又樂平長公主挽歌辭曰粧樓對馳道吹臺臨景舎風入上春朝月滿涼秋夜未言歌笑畢巳覺先榮謝何時洛水湄芝田解龍駕方相周禮夏官曰方相氏掌蒙熊皮黃金四目玄衣朱裳執戈楊揗帥百隷大䘮先匶及墓入壙以戈擊四隅歐方良壙穿中也方良罔兩也蔡質漢官儀曰隂太后崩前有方相及鳯皇車晉公卿禮秩曰上公薨者給方相車一乗安平王孚薨方相車駕馬幽明録曰廣陵露白村人毎夜輒見鬼恠或有異形醜惡怯弱者莫敢過村人恠如此疑必有故相率得十人一時發掘入地尺許得一朽爛方相頭訪之故老咸云嘗有人冒雨葬至此遇刼一時散走方相頭䧟没泥中風俗通曰俗說亡人魂氣浮揚故作魌頭以存之言頭體魌魌然盛大也或謂魌頭爲觸壙殊方語也太平御覽卷第五百五十二
