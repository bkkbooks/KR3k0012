front:
  text: 太平御覽卷第九百八十一香部一
  hash: sha256:20eed83178454eddb12a97efb24f0794ad6c05836d495ffced3953420eec93d9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_981-1a}
body:
  text: 香麝葳香欝金鷄舌龍腦雀頭香書曰至治馨香感于神明左傳曰黍稷非馨馨者香之逺聞明德惟馨說文曰香芳也吴志曰士爕兄弟並爲列郡雄長一州車騎滿道胡人夾轂焚香者常有數千丗說曰桓車騎時有陳莊者入武當山學道所居恒有白烟香氣聞徹續晉安帝紀曰王鎮惡亡經曰魏興太守郭宣之晝坐忽見陳莊來因叙舊事相對悲泣勸營功德去後郡内悉聞香狀如芳烟流散晉書曰杜太后傳曰海西公之丗太后復臨朝稱制桓温之廢海西公也太后方在佛屋燒香内侍啓云外有急奏太后乃出尚倚户前視奏宋書曰范曄撰和香方其序之曰麝夲多忌過分必害沉實易和盈斤無傷零藿虚慘詹唐黏濕甘松蘇合安息欝金奈多和羅之属並𬒳珎於外國無取於中道又棗膏昏鈍甲煎淺俗非唯無助於馨烈乃當弥増於尢疾也所言悉以比類朝士麝夲多忌比庾仲丈零藿虚慘比何尚之詹唐黏濕比沈演之棗膏昏鈍比羊玄保甲煎淺俗比徐湛之甘松蘇合比慧琳道人沉實易和以自比也齊書曰韓懷明上黨人也客居荆州十歳母患尸疰毎發輙危殆懷明夜於星下稽顙祈禱時寒甚切忽聞香氣空中有人曰童子母須臾永差無勞自苦未曉而母平復梁書曰庾詵尢遵釋教宅内立道埸環繞禮懴六時不息誦法華經毎日一遍後夜中忽有一道人自稱願公容止甚異呼詵爲上行先生授香而去又曰梁武帝祀南郊先是一日景夜南郊令解除之等到郊所履行忽聞異香隨風而至及將行事奏樂迎神有異光圎滿壇上朱紫黄白雜食頃乃滅又曰王琛夲無令問爲太子中舎人謟事何敬容爲其階前種植香草脫履躡其草根敬容意以爲善郭子曰陳騫以韓壽爲椽毎㑹聞壽有異香氣是外國所貢一着衣歷日不歇騫計武帝唯賜巳及賈充他家理無此香嫌壽與巳女通考問左右婢具以實對騫以女妻壽壽時未婚晉書云賈充女切香與韓壽金樓子曰齊東婚以錦石爲殿内開千門万户又有和香香氣紛馥聞之使人歡恱生諸雅態兼令睡眠又曰昔玉池國有民軰面十二醜婦國色鼻齆壻乃求媚此婦終不肯廻頋遂徃西市無價名香而燻之還入其室婦旣齆矣豈分香臭哉吕氏春秋曰懷腐而欲香入水而惡濡漢武故事曰上作栢梁䑓悉以香栢香聞數十里也漢官典職曰尚書郎懷香握蘭神仙傳曰淮南王爲八公張錦綺之帳燔百和之香佛圗澄傳曰澄以鉢盛水燒香呪之須臾生青蓮花林邑記曰朱吾以南有文狼野人居無室宅依樹止宿食生肉採香爲業與人交市若上皇之民矣鄴中記曰石虎作流蘇帳頂安金蓮花花中懸金簿織成綩音苑囊囊受三升以盛香注帳之四面上十二香囊采色亦同竺法登真羅山䟽曰越王擣薫陸香扶南傳曰頓遜國人恒以香花事天神香有多種區撥葉逆花途致各遂花摩夷花冬夏不衰日載數十車於市賣之燥乃益香亦可爲粉以傳身體𫐠征記曰北芒有張母墓舊說是王氏妻塟有年載後開墓而香火猶十洲記曰漢武時長安大疫人死日以百數帝乃試取月氏國神香燒之於城内死未滿三日者活芳氣經三月不歇帝始信神物也乃祕録餘香郭子横洞冥記曰漢武帝於招仙閣燒靡離之香屑如粟一粒香氣三月不歇又曰跋塗闍者胡人也剪髮祼形不食糓唯飲清水食都夷香如棗核食一斤則歴月不飢以一粒如粟大投清水中俄而滿大孟也博物志曰西域使獻香漢制献香不蒲斤不得受西使臨去又發香器如大豆者試着宫門香氣聞長安四面數十里中經月乃歇捜神記曰渤海史良好一女子許嫁而未果良怒殺之後夣見曰還君物覺而得昔所與香纓金釵之属又曰𥘉鈎弋夫人有罪以譴死殯尸不臰而香又曰合淝有一大白舡覆在水中漁人夜宿其傍聞箏笛之音又香氣非常相傳云曹公載妓舡覆於此任昉𫐠異記曰魏武帝陵中有泉謂之香水古詩云安得香水泉濯郎衣上泉塵一說香水在并州香山其氷㓗香浴之去病吴故宫有香水溪俗云西施浴處又呼爲脂粉塘吴王宫人濯莊於此溪上源至今馨香又曰南海出百歩香佩之聞於千歩也今海隅有千歩香是其種也葉似杜若而紅碧間雜貢藉云日南郡貢千歩香漢雍仲子進南海香物拜爲涪陽尉時人謂之香尉日南郡有香市啇人交易諸香處南海郡有香户日南郡有千畝香林名香出其中香洲在朱崖郡洲中出諸異香徃徃不知其名千年松香聞十里亦謂之十里香也夣書曰夣得香物婦女歸也曹植洛神賦曰踐椒塗之郁烈歩蘅音衡薄而流芳魏武令曰昔天下𥘉定吾便禁家内不得香薫後諸女配國家爲其香因此得燒香吾不好燒香恨不遂所禁今復禁不得燒香其以香藏衣着身亦不得秦嘉荅婦徐淑書曰令種好香四種各一斤可以去穢淑荅書曰未得侍帷帳則芬芬不設陸機吊魏武文曰余爲著作郎遊祕閣見魏武令曰餘香可分與諸夫人諸舎中無所爲學作履組賣也吊曰紆家人於履組塵清慮於餘香麝尓雅曰麝父麋足郭璞注日脚似􅍪臍有香許慎說文曰麝如小麋臍有香從鹿射聲黒色也義熈起居注曰倭國獻貂皮人參等詔賜細笙麝香齊書曰東昏侯鑿金蓮花帖地令潘妃行其上曰此歩歩蓮花也塗地皆以麝香唐書曰波斯國人皆以麝香如蘇塗鬚點額及於耳鼻用以爲敬抱朴子曰辟虵法入山以麝香丸著足爪中皆有効又麝香及野猪皆啖蛇故以壓之也又作筆墨法曰作墨用雞子白真珠麝香合以和墨冝用九月二日南夷志曰南詔有婆羅門波斯闍婆渤泥崑崙數種外道交易之處多珠珍寳以黄金麝香爲貴貨嵩髙山記曰有人在嶺上聞異聲清和雅妙尋不復聞唯見一麝香在嶺上側足䨥跳忽失所在荆州圗記曰臨澧縣南有龍寄山有獸多麝西京雜記曰趙飛鷰爲皇后女弟在昭陽殿遺飛鷰書曰今日嘉辰貴姉懋膺洪冊上三十五條以陳暐曜之志焉榔葉扇同心梅合枝李青木香香螺出南海一曰丹螺申九真雄黄麝香沉水香續搜神記曰桓哲字明期居豫章時梅玄龍爲太守巳病哲徃省之語梅曰吾昨夜忽夢作卒迎卿來作太山府君梅聞之愕然曰吾亦夢見卿爲卒着衣來迎我數日復同夢如先云二十八日當拜至二十七日晡後桓忽中惡腹脹滿遣人就梅索麝香丸梅聞便令作凶具桓便亡八日而梅卒夲草經曰麝香味辛辟惡殺鬼精生中䑓山也秦嘉與婦書曰今奉麝香一斤可以辟惡氣嵇康養生論曰麝食柏而香葳香孫氏瑞應圗曰葳者禮備至則生一曰王者愛人命則生一名葳香也欝香說文曰欝芳草也十葉爲貫築以煑之爲鬯一合而釀之以降神也周禮春官上曰鬱人掌祼器祼噐謂彛及舟與瓉凡祭祀賔客之祼事和鬱鬯以實彛而陳之築鬱金煑之以和鬯酒鄭司農云鬱金草名七葉爲貫百二十賈爲築以煑之鑊中停於祭前鬱爲草若蘭後周書曰秦國出鬱金後周書曰波斯國大月氏之別種也地出毹翟俞二音玄麞皮及薫陸欝金蘇合青木香等胡椒畢撥石蜜千年棗香附于訶黎勒無食子塩緑雌黄等物唐書曰天竺國卑濕暑熱稻歳四熟有金剛似紫石英百錬不銷可以切玉又有旃檀欝金諸香通於大秦又曰太宗時伽毗國獻欝金香似麦門冬九月花開狀似芙蓉其色紫碧香聞數十歩花而不實欲種者取根文士傳曰朱穆字公叔作欝金賦曰英熠爍以焜煌似九日之普照逺而望之粲若星羅出雲嶠近而觀之曄若丹桂耀湘涯應劭地理風俗記曰周禮欝人掌祼器凡祭醊賔客之祼事和欝鬯以實樽彛欝芳草也謂用百草之華煑以合釀黒黍以降神香也或說今欝金香是也南州異物志曰欝金者出罽賔國國人種之先取上佛積曰萎熇乃載去之然後取欝金色正黄細與芙蓉華裏披蓮者相似可以香酒鷄舌應劭漢官儀曰桓帝侍中廼存年老口臰上岀鷄舌香與含之鷄舌頗小辛螫不敢咀咽嫌有過賜毒藥歸舎辭决就便冝家人哀泣不知其故僚友求眡其藥出在口香咸嗤笑之吴時外國傳曰五馬洲出鷄舌香抱朴子曰或以鷄舌黄連乳汁煎之注之諸有百疹之在目愈而更加精明倍常俞益期牋曰外國老胡說衆香共是一木木花爲鷄舌香南洲異物志曰鷄舌出在蘇州云是草花可含香口廣志曰雞舌出南海中及剽國蔓生實熟貫之續捜神記曰王廣豫章人年少未昏至田舎見一女云我是何叅軍女年十四而夭爲西王母飬使與下土人交廣與之纏綿其日於席上得手巾褁鷄舌香其母取巾燒之乃是火浣布龍腦唐書曰正觀中烏萇國遣使獻龍臘香夲草曰龍腦香味苦微寒主心腹邪氣風濕積聚出婆律國形似白松脂作杉木氣明浄者善云合粳米灰相思子貯之則不耗樹似杉言婆律膏是樹根下清脂龍腦是樹中乹脂子似豆冦雀頭江表傳曰魏文帝遣使於吴求雀頭香太平御覽卷第九百八十一
