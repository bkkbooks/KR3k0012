front:
  text: 太平御覽卷第四百
  hash: sha256:49ac9964b3c795768013eb7abdd9004f830f6ef4b197009ed316752c9ed305a2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_400-1a}
body:
  text: 人事部四十一凶夢禮記檀弓曰夫子蚤作負手曳杖逍遥於門歌曰㤗山其頽乎梁木其壊乎哲人其萎乎旣歌而入當户而坐子貢聞之曰㤗山其頽則吾將安仰梁木其壞哲人其萎則吾將安放夫子殆將病也遂趨而入夫子曰賜爾來何遟也夏后氏殯於東階之上則猶在阼也殷人殯於兩楹之間則與賔主夾之也周人殯於西階之上則猶賔之也而丘也殷人也子疇昔之夜夢坐奠於兩楹之間夫明王不興而天下其孰能宗子子殆將死也盖寢疾七日而没左傳成公上曰晉侯夢大厲𬒳髮及地搏膺而踊呼曰殺余孫不義厲鬼趙氏之先祖也餘得請於帝矣壞大門及寢門而入公懼入于室又壞户公覺召桑田巫巫言如夢巫言鬼怒如公所夢公曰何如曰不食新矣六月丙午公欲麦使甸人獻麦將食張如厠䧟而卒小臣有晨夢負公以登天及日中負晉侯出諸厠遂以爲殉又成公下曰晉楚將戰吕錡夢射月中之退入於泥占之曰姬姓日也異姓月也必楚王也射而中之退入於泥亦必死矣及戰射恭王中目王召養由基與之兩矢使射吕錡中項伏弢以一矢復命言一發而中之又成下曰𥘉聲伯夢渉洹洹水岀汲縣林慮縣東北至魏郡長樂縣入清水也或與己瓊瑰瓊王瑰珠也食之泣而爲瓊瑰盈其懐淚下化爲珠玉蒲懷從而歌曰濟洹之水贈我以瓊瑰歸乎歸乎瓊瑰盈吾懐乎懼不敢占也還自鄭至于貍脤而占之曰余恐死故不敢占也今衆繁而從余三年矣而無傷也言之至暮而卒繁多也傳誡數占夢又襄王曰齊侯伐我北鄙中行獻子將伐齊夢與厲公說弗勝厲公獻子所殺者公以戈擊之首墜於前跪而戴之奉之以走見梗陽之巫臯梗陽晉邑也在太原臯巫名也夢并見之他日見諸道與之言同巫亦夢見獻子與厲公訟巫曰今兹主必死若有事於東方則可以逞獻子許諾又昭二曰𥘉穆子去叔孫氏及庚宗成十六年避僑如之難奔齊庚宗魯地遇婦人使私爲食而宿焉適齊夢天壓已弗勝穆子夢也顧而見人黒而上僂深目而猳喙號之曰牛助余乃勝之及反魯所宿庚宗之婦人獻以雉獻穆子問其姓問有子不對曰余子長矣能奉雉而從我矣召而見之則所夢也未問其名號之曰牛曰唯皆召其徒使視之遂使爲竪竪官傳言從夢未必吉又哀上曰𥘉曹人或夢衆君子立於社宫而謀亡曹曹叔張鐸請待公孫疆許之振鐸曹始祖也旦而求之曹無之戒其子曰我死爾聞公孫疆爲政必去之及曹伯陽即位好田弋曹鄙人公孫疆好弋獲白鴈獻之且言田弋之說因訪政事大恱之有寵使爲司城以聽政夢者之子乃行疆言覇說於曹伯從之乃背晉而攻宋宋人伐曹晉人不救而曹亡又哀下曰衛侯夢于北宫見人登昆吾之觀衛有觀在古昆吾氏之虚𬒳髮北靣而譟曰登此昆吾之虚綿綿生之瓜綿綿瓜𥘉生也余爲渾良夫叫天無辜公親筮之胥弥赦占之赦衛筮史曰不害與之邑寘之而逃奔宋言衛侯無道卜人不敢以實對懼難而逃國語曰晉獻公伐􅉑􅉑公夢在廟有神人靣白毛虎爪執鉞立於西河之下公懼而走神曰無走帝命使晉襲于爾門公拜稽首覺召使囂占之對曰如君之言則蓐收也天之形神也公使囚之且使國人賀夢舟之僑告其族曰衆謂􅉑亡不乆矣吾今乃知之外内無親其誰救之吾不忍俟將其族適于晉六年􅉑乃亡史記曰始皇夢與海神闘如人狀乃令人入海賫捕鉅魚具而自以連弩候大魚岀射之遂並音旁海西至平原津而病又曰秦二丗夢白虎齧其左驂馬殺之問占夢人曰涇水爲崇二丗乃齋望夷宫閻樂殺之更立子嬰爲王又曰𥘉趙盾在時夢見叔帶持要而哭甚悲巳而笑拊手而歌盾卜之兆絶而後好趙史援占曰此甚惡非君之身乃君之子然亦君之咎至趙翔𬒳殺下宫及趙武還故位漢書曰昌邑王夢見青蠅之矢積殿東西階王乃問龔遂對曰詩云營營青蠅止于蕃愷悌君子無信䜛言陛下察之王終不改續漢書曰鄭玄夢孔子造曰起今年歳在辰來年歳在巳旣悟以䜟占之知命當終有頃寢疾而卒又曰周盤字伯堅朝㑹集諸生講論終日因令其二子曰吾日者夢見先師東里先生與我講於隂堂之奥旣而長歎豈吾齒之盡乎其月望日無病忽終東觀漢記曰公孫述夢有人語之曰公子系十二爲期覺語其妻對曰朝聞道夕死尚可况十二乎魏志曰鄧艾字士載𥘉艾當伐蜀夢山上而有流水以問弥虜護軍爰邵邵曰案易卦山上有水曰蹇蹇繇利西南不利東北孔子曰蹇利西南徃有功也不利東北其道窮也徃必克蜀殆不還乎艾憮然不樂又曰文帝問周宣曰吾夢殿屋兩瓦墮地化爲鴛鴦此何謂耶宣對曰後宫當有暴死者帝曰吾詐卿耳宣對曰夫夢者意耳苟形言便占吉凶言末卒而黄門令奏宫人相殺蜀志曰魏延字文長義陽人延夢頭上生角以問占夢趙直直詐延曰夫騏驎有角而不用此不戰而賊自破之象也退而告人曰角之爲字刀不用也頭上用刀其凶甚矣延後果誅又曰關羽𥘉出軍圍樊夢猪齧其足語子平曰今年衰矣果尋𬒳殺晉書曰郭瑀燉煌人也符氏之末略陽王穆起兵酒泉以應張預遣使招瑀瑀與同郡索蝦應之穆後信䜛欲誅蝦瑀諌不從旦夕祈死夜夢乗青龍上至屋而止寤而歎曰龍飛在天今止于屋屋之爲字尸下至也龍飛至尸吾其死也古之君子不卒内寢况吾正士乎遂還酒泉南山赤崖閣飲氣而卒又曰惠帝時陸機爲長沙王乂征河間王果夜夢黒幕三重繞車機擘出不得明旦𬒳殺其日大風抜木時人以爲陸氏之冤又曰張華方晝卧忽夢見屋壊覺而惡之是夜難作稱召華遂與裴頠俱𬒳収又曰僞趙石虎晝寢永安宫夢羣羊從東北負魚而來鄴東北土髙丈餘魚羊滿其上寤乃問佛圖澄曰不祥也國其敗乎又曰温嶠爲驃騎鎮武昌至牛渚磯水深不可測云其下多恠嶠遂燬犀角而照之湏臾見水族萬品其夜夢人謂嶠曰與君幽明道隔何意相照嶠惡之忽中風至鎮旬曰而卒又曰揚雄爲舂陽令舉兵拒王敦城䧟爲敦所擒𥘉雄𬒳執之曰其夜夢乗車挂肉其傍占曰夫肉必有筋斤也車傍於斤吾其戮乎尋爲王敦害之續晉陽秋曰符堅之遣慕容垂侍中權翼諌不聽於是翼乃夜私遣壯士要路而擊之垂是夜夢行路路窮頋見孔子墓傍墳有八覺而心惡之召占夢者占之曰行路窮道盡也不可行孔子名丘八以配丘此兵字路必有伏兵深冝慎之於是垂遂別路而進翼伏兵遂不擒之前凉録曰張駿十二年五月駿有疾夢出遊不識其處見一玄龜向之張口而言更九日當有嘉問遂經九日而卒前趙録曰劉曜末年夢三人金靣丹脣東向逡廵不言而退曜拜履其跡太史令任義曰三者歴運之極東爲震王者之始次也金爲兊物衰落也脣丹不言事之畢也逡廵揖讓舎之道也爲之拜者屈伏於人履跡而行慎不岀疆兵必大起逺志三年曜爲石勒所擒前燕録曰慕容儁夜夢石虎齧其臂覺遂痛惡之曰死胡安敢夢生天子使掘之數其罪鞭其尸投之漳水俄寢疾而死沈約宋書曰少帝凶暴日甚沈慶之猶盡言諌争遣慶之從子攸之賫藥賜慶之死時年八十𥘉慶之夢有人以兩疋絹與之謂曰此絹足度慶之語人曰老子今年不免兩疋八十尺也度無盈餘矣後魏書曰元熈於任城王澄薨前夢有人告之曰任城當死死後二百日外君亦不免若其不信試看任城家熈夢中頋瞻任城第舎四靣牆崩無遺堵焉熈惡之覺而告所親及熈之死果如所夢又曰崔浩搆害李順基萌巳成夜夢秉火爇順寢室火作而順死浩與室家羣立而觀之俄而順弟息號哭而岀曰此軰吾賊也以戈擊之悉投於河悟而惡之以告館客馮景仁景仁曰此真不善也非復虚事夫以火爇人暴之極也且兆始堊者終殃積不善者無餘慶厲階成矣公其圖之浩曰吾方思之而不能悛至後而族三國典略曰齊李鉉字寳鼎渤海南皮人也春夏務農秋冬入學經䟽之多發自於鉉嬰疾在牀夜夢孔子忿其廣爲䟽例繫而捶之旣寤之後其䟽例焚尋而病愈齊書曰武帝𥘉登位夢金翅鳥下殿食小龍子無數乃飛上天及明帝即位誅髙武子孫並盡明帝名鸞故也又曰武帝時雍州刺史張敬兒未貴夢所居村社樹歘髙數十丈爲雍州又夢社樹直上至天俄反伏誅梁書曰武帝𥘉沈紂齊末建議廢齊和帝後夢和帝以刀斷其舌約大懼召巫言與夢同竟憂卒唐書曰太宗時徐慶爲征遼判官有一典不得姓名慶在軍忽夢巳化爲羊爲典所殺覺懼流汗至暁典判案慶問曰汝夜有夢否典云夢公爲羊某屠之由是慶不食羊則天時慶至司農少卿雍州司馬時典巳任大理獄丞後慶𬒳誣與内史令裴炎通謀應接英公徐敬業楊州反𬒳執送大理忽見丞押獄慶流涕謂曰征遼之夢今當應之及𬒳戮竟是丞引之又曰杜牧知命年得病自爲墓志祭文又甞夢告曰尔改名畢踰月奴自家來告曰炊將熟而甑裂牧曰皆不祥也俄又夢書片𥿄曰皎皎白駒在彼空谷寤而歎曰此過隙也吾生於角昴畢於角爲第八宫吾之甚厄也予自湖守迁舎人木還於角足矣其年以疾終又曰韋温爲宣歙觀察使明年瘍生於首謂愛􅡾張復魯曰予任校書郎時夢二黄衣人賫符來追及滻將渡一人續至曰彼墳至大功湏萬日遂不涉而寤計今萬日矣與公訣矣明日卒又曰崔湜與尚書右丞盧藏用同配流俱行湜謂藏用曰家弟承恩或兾寛宥因遟留不速進行至荆州夢於講堂照鏡鏡者明象吾當爲人主所明也以告占夢人張申申退曰講堂者受法之所鏡者於文爲立見金此其吉徴其日追使至縊於驛中唐新語曰母煚俱永切直集賢無何以熱疾暴終𥘉煚夢着衣冠上北邙山親友相送及至山頂迴顧不見一人意甚惡之及卒僚友送葬北邙山咸如所夢吕氏春秋曰齊莊公之時有士曰賔卑聚夢有壯士從而叱之唾其靣惕然而寤然夜坐自不快明日召其友而告之曰吾年六十而無所挫辱吾將索之得之則可不得將死之每朝立乎衢三日不得退而自殺桓譚新論曰博士弟子韓生連三夜有惡夢以問人人教晨起厠中祝之三旦人告以爲祝詛捕治數日死玄晏春秋曰十二月乙丑夕夢至京師自廟出見車騎甚衆以物呈廟云誅大將軍曹爽寤以告梁析析曰君欲曹人之夢乎朝無公孫疆子曰爽無叔振之請苟失天機則籬矣何待於疆益部耆舊記曰何祇甞夢井中生桑以問占夢趙直直曰桑非井中之物然桑字四十下有八君夀恐不過此後果如直言管輅別傳曰輅見何尚書何曰頃連夢青蠅數十來在鼻上驅之不肯去何也輅曰夫鼻者艮也天中之山而蝇集之位峻者危輕豪者亡後遂𬒳誅捜神記曰吴時嘉興徐伯始病使道士吕石安神座石有弟子戴夲王思二人居在海鹽伯始迎之以助石晝卧夢上天北斗門下見外鞍馬三疋云明日當以一迎石一迎夲一迎思石夢覺語本思如此死期至可急還與家別不卒事而去伯始恠而留之曰懼不見家也間一日三人同日死續捜神記曰㑹稽謝奉與永嘉太守郭伯猷善謝忽夢郭與人於浙江上争樗蒲錢爲水神所責墮水死巳營理郭凶事旣覺便徃郭許共圍碁良乆謝云卿知吾來意不因說所夢郭聞之悵然云信與人争如卿所夢何期太的也湏臾如厠便倒氣絶謝斷理之如所夢異苑曰符堅將欲南師也夢葵生城内明以問婦婦曰若征軍逺行出難爲將也堅又夢地東南傾復以問云江左不可平也君無南行必敗之應也堅不從卒敗又曰陳郡殷靈均義熈中爲桂陽太守夢人縛將去形神乖散復有一人云且置在作衡陽當取之殷驚寤惆悵永𥘉三年除衡陽郡知冥理難避辞不免尋寢疾而亡𫐠異記曰陶繼之爲秣陵令殺劫其中一人是大樂伎不爲劫而陶逼殺之將死曰我實不作劫遂見枉殺若有鬼必自訴理少時陶夢見此伎來云訴天得雪今來相取遂跳入陶口中仍落腹而倒俄而陶遂病死又曰姚萇旣殺符堅與符登相拒於隴東萇夜夢堅將天帝使者勒兵馳入萇營以予刺萇正中其隂萇驚覺隂腫痛明日遂死又曰張駿有疾夢岀遊觀不識其處甘泉涌出有一玄龜向駿張口言曰更九日當有嘉問好消息忽然而覺自書記之封在筒中人不知也因寢疾經九日而死幽明録曰魏武帝猜忌晉宣帝子非曹氏純臣又甞夢三疋馬在一糟中共食意尤憎之因召文明二帝告以所見並云防理自多無爲撗慮帝然之後果害族移噐悉如夢焉又曰王丞相茂弘夢人欲以百萬錢買大兒長豫丞相甚惡之潜爲祈禱者備材作屋得一窖錢料之百萬億大懼一皆藏閉俄而長豫亡又曰隴西秦嘉字士㑹雋秀之士婦曰徐淑亦以才羙流譽桓帝時嘉爲曹掾赴洛淑歸寕于家晝卧流涕覆靣㛐恠問之云適見嘉自說徃津鄉亭病亡二客俱留一客守䘮一客賫書還日中當至舉家大驚書至事事如夢集異記曰陽平宋堇善解夢有孫氏求官睡得夢雙鳯集其兩拳以問堇堇曰鳳皇非梧桐不栖非竹實不食卿當大凶非苴杖即削杖也後孫氏果遭母䘮又曰張天錫在凉州夢一緑色狗形甚長從城東南欲齚張張牀上避一匝乃墮地後符堅遣狗長徃破張着緑地錦𫀆從東南門入皆如夢焉太平御覽卷第四百
