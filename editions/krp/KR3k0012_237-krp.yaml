front:
  text: 太平御覽卷第二百三十七職官部三十五
  hash: sha256:13856502ecaa5ee8a5a312a3d62ffda37df6b3998de81a42663d9a4c42f658f4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_237-1a}
body:
  text: 揔叙將軍左右衛將軍諸衛將軍附左右金吾衛將軍諸衛上將軍揔叙將軍石氏中官占曰河鼓星主軍鼔一曰三星主天子三將軍中央大星爲大將軍左星爲左將軍右星爲右將軍所以備關梁而距難也周禮夏官上大司馬曰凢制軍万有二千五百人一郷之民也凢起從役家一人也王六軍六郷之數也郷始文教軍定武功其道皆兼三才而兩之故數俱六也大國三軍公侯之封也成國不過半天子之一軍次國二軍諸伯之封小國一軍子男之封軍將皆命卿位視六事之人司於六郷之大夫春秋之時列國有正卿爲將軍又以亞卿一人爲佐猶執政者貪其權遂以陵遲皆非周公之舊也左傳襄二年曰晉蒐于綿上以治兵使士丐將中軍辭曰伯游長昔臣習於知氏以佐之非能賢也請從伯游使荀偃將中軍士丐佐之使韓起將上軍辭以趙武孝經左契曰將軍順虎衘珠大夫正海出魚史記曰齊景公召穰苴與語大恱以爲將軍將兵扞燕又曰孝文後六年匈奴入上郡周亞夫爲將軍居㶚上祝兹侯徐廣曰表作松兹姓徐名悍也軍棘門以備胡漢書曰楚王召宋義計事而恱之因以爲將軍范曄後漢書曰靈帝時望氣者以爲京師當有大兵兩宫流血大將軍司馬許源說何進曰太公六韜有天子親於兵事可以威壓四方詔進大發兵講武於平觀下起大壇上建十二重五綵華盖髙十丈壇東北有小壇復九重華盖髙九丈引歩兵騎士數万人結營爲陣天子親出臨軍住大華盖下進住小華盖下禮畢帝躬擐甲上馬稱無上將軍行陣三匝而還魏志云太祖令曰司馬法將軍死綏魏書曰綏却也有前一尺無却一寸也尸子曰十万之軍無將軍必亂左右衛將軍諸衛將軍附六典曰左右衛將軍之職掌統領宫庭驚衝衛之法令以督其屬之隊仗而惣諸曹之職務焉其左右驍衛左右武衛左右威衛左右領軍衛將軍所掌之職皆如之晉書曰羊琇爲晉臺左衛將軍又曰呉隱之遷左衛將軍雖居清顯禄賜皆班親族冬月無𬒳嘗澣衣乃披絮勤苦同於貧庶何法盛晉中興書曰南頓王宗字延祖拜左衛將軍爲肅祖所眤委以禁旅又曰王坦之字文度領左衛少有風格尚刑名之學嘗著廢㽵論又曰虞譚陳略曹毗毛安之並爲左衛將軍沈約宋書曰左右衛將軍晉文建國所置隋書曰薛世雄性廉謹凡所行軍破敵之處秋毫無犯帝由是嘉之帝嘗從容謂群臣曰我欲舉好人未知諸君識否群臣咸曰臣等何能測聖心帝曰我欲舉者薜世雄群臣皆稱善帝復曰世雄廉正節槩有古人之風於是超拜右翊衛將軍煬帝改左右衛爲之唐書曰元和中以前靈塩等節度使王佖爲右衛將軍佖在鎮無智略以馭下居常猜忌及多殺人以懼之衆益不附乃召至踰月而授以衛將軍凢將相出入皆翰林草制謂之白麻佖始以責罷中書草制隋書曰來護兒煬帝即位遷右驍衛大將軍帝甚親重之大業六年從駕江都賜物千叚令上先人塚宴父老州里榮之魏志曰許禇從太祖戰大破馬起等乃遷武衛中郎將武衛之號自此始也文帝踐阼遷武衛將軍又曰曹爽自散騎常侍轉武衛將軍爽秉政又以弟訓爲武衛將軍王敦別傳曰敦子應字安期官至武衛將軍隋書曰獨孤盛爲左屯衛將軍宇文化及之作亂也裴䖍通引兵至成象殿宿衛者皆釋仗而走盛謂䖍通曰何物兵形勢太異也䖍通曰事勢巳然不預將軍事愼無動盛大罵曰老賊是何物語不及𬒳甲與左右十餘人逆拒之爲亂兵所殺唐書曰咸通中以伶官李可及爲威衛將軍曹確執奏曰臣覽貞觀故事太宗𥘉定官品令文武官共六百四十三貟顧謂房玄齡曰朕設此官貟以待賢士工啇雜色之流假令術踰儕類止可厚給財物必不可超授官秩與朝賢君子比肩而立同坐而食大和中文宗欲以樂官尉遲璋爲王府率拾遺竇詢直極諌乃改授光州長史伏乞以兩朝故事別授可及之官帝不之聽又曰髙祖以李粲爲左監門大將軍禮髙年也𥘉髙祖問粲年幾對曰八十髙祖曰公清幹之譽聞於隋曰今年齒雖邁筋力未衰但監門之職非公莫可意欲相委如何粲以年老辭讓髙祖曰藉公處分耳豈欲煩公筋力耶於是詔粲自非殿庭皆乗蜀馬論者榮之又曰王及善除右千牛衛將軍髙宗謂曰朕以卿忠敬故與卿三品要職他人非搜辟不得至朕所卿佩大撗刀在朕側知此官貴否又曰李聽元和中爲羽林將軍有名馬穆宗在東宫令近侍諷聽献之聽以職惣親軍不敢從及即位之始幽兾不廷太原與二鎭接境方議易帥宰臣進擬上皆不允謂宰臣曰李聽爲羽林將軍不與朕馬是必可任五代史云周廣順二年十二月詔改左右威衛復爲左右屯衛避太祖諱也左右金吾衛將軍六典曰左右金吾衛大將軍之職掌宫中及京城晝夜廵警之法以執禦非違百官表云秦有中尉掌徼循京師如淳曰所謂逰徼徼循禁俻盗賊也顔師古曰徼謂遮繞之也音工釣反漢武帝太𥘉元年更名執金吾應劭曰吾者禦也常執金革以禦非常也顔師古曰金吾鳥名也主辟不祥天子出職主先導以備非常故執此鳥之象因以名官也緹騎二百人輿服導從車騎滿路群僚之中斯最壯矣舊掌京師盗賊考按疑事漢郅都寗成王温舒滅宣等皆截理横噬虎而冠者也止切理辨亦旋誅黜又置執金吾丞後漢掌宫外戒司非常水火之事衛尉廵行宫中金吾徼循宫外爲表裏以擒姦討猾日三繞行宫外及主兵器自中興但專徼循不與他政又有執金吾吏文學執金吾佐執金吾貟吏魏武秉政復爲中尉晉𥘉罷直至後周置武環率武候率下大夫各二人隋置左右武候府大將軍一人將軍三人掌車駕出入先驅後殿晝夜廵察執捕姦非烽候道路水草所冝廵狩田師則掌其營禁煬帝大業三年改爲左右武候衛所領軍事名佽飛漢官表曰漢有左戈令武帝太𥘉元年更名佽飛掌戈射属少府光武省之隋氏採舊名唐𥘉又爲左右武候府貞觀十年十二月馬周奏京城諸街置鼓罷傳呼龍朔二年改爲左右金吾衛置大將軍一人所掌與隋同將軍二人副其事領官屬並隋置大唐因之後漢書曰𥘉光武適新野聞隂后美心恱之後至長安見執金吾車騎甚盛因歎曰仕宦當作執金吾娶妻當得隂麗華漢官宰尹下曰吾禦也常執金革以禦非常緹騎二百人輿馬導從充满於路世祖微時歎曰仕宦當作執金吾是也漢書百官公卿表曰秦名曰中尉掌徼循京師有兩丞候司馬兵千人武帝太𥘉元年更名執金吾又曰母將隆爲執金吾時侍中董賢方貴上使中黃門發武庫兵前後十軰送賢及上乳母王阿金隆奏武庫兵噐天下公用國家武俻繕治造作皆度大司農錢蘇林曰用度皆出大司農大司農錢自非乗輿不以給供養勞賜一出少府盖不以夲藏給未用不以民力供浮費別公私示正路也又曰郅都爲中尉丞相條候至貴倨也而都揖丞相是時民樸畏罪自重而都獨先嚴酷行法不避貴戚列侯宗室見都側目而視號曰蒼鷹也東觀漢記曰馬防字孝孫拜執金吾性矜嚴公正上事處議多見用續漢書曰隂識拜執金吾位特進入則極言正諌至與賔客語不及國事常慕仲山甫匪躬之節所用掾史皆得天下俊哲虞詡傳賢等是也又曰朱浮字叔元爲執金吾帝以二千石長吏不堪任時有纎微之過者必見斥罷交易紛擾百姓不寧六年有日蝕之異浮因上䟽切諌自是州郡奏長吏二千石不任位者事皆先下三公遣掾史案然後黜退又曰秩中二千石掌外司非常水火之事旦三繞行宫外及主兵器丞一人比千石華嶠後漢書曰賈復爲執金吾更始郾王尹尊及諸將反上召諸將議以檄叩地曰郾最強宛次之復率尓對曰臣請擊郾上笑曰執金吾擊郾吾復何憂耶又曰耿秉爲人威重有謀略拜執金吾毎行幸秉恒領宿衛謝承後漢書曰梁兾執金吾歳朝託疾不朝司隷楊雄治之詔以二月俸贖罪漢雜事曰辛慶忌明略威重任國柱石爲執金吾魏書曰臧覇與曹休討呉破賊吕範於洞浦徵爲執金吾毎有軍事帝咨訪焉又曰崔琰遷中尉琰聲姿髙暢眉目踈㓪鬚長四尺七寸有威重朝士瞻望太祖亦嚴憚焉又曰徐弈太祖以爲中尉手令曰昔楚有子玉文公爲之側席汲黯在朝淮南爲之折謀詩稱邦之司直君之謂也唐書曰髙祖以徐世勣爲右武候大將軍隋大業三年及唐𥘉並爲左右武候至龍朔二年復爲左右金吾詔曰念功襃善哲王彛訓紀德親賢有國通典黎州惣管曹國公世勣夲自黎陽擁徒歸順任以藩岳誠効克彰節義不渝夷險無變信同金石操擬松筠冝加寵命用超恒序可賜姓李氏又曰趙道興真觀𥘉歷遷左武候中郎將明閑宿衛號爲稱職太宗嘗謂之曰卿父爲隋武候將軍甚有當官之譽卿今克傳弓冶可謂不墜家聲因授右武候將軍其父時廨宇仍舊不改時人以爲榮又曰裴諝爲右金吾將軍建中𥘉上以刑名理天下百吏震悚時十月禁屠殺以甫近山陵禁益嚴尚父汾陽王郭子儀隷人殺羊以門者覺之諝列奏狀上以爲不畏強禦累遣宣喻或謂諝曰郭公有社稷功豈不爲盖之諝笑曰非爾所解且郭公威儀權太盛上新即位必謂黨附者衆今發其細過以明不弄權耳吾上以盡事君之道下以安大臣不亦可乎又曰臧希讓爲金吾大將軍骯髒好談時政屢以理體上于公卿詔令集賢院待制希讓無學術及處近地從容公卿間強引文言以自賢而所聞知多道途得之發必差謬頗爲士子所笑諸衛上將軍唐通典曰魏黄𥘉中始有上大將軍以曹眞爲之呉亦以陸遜爲上大將軍後周建德四年増置上大將軍隋並以爲武散官不理事上大將軍從二品又曰唐武德𥘉秦王旣平王世充及竇建德髙祖以秦王功殊古今自昔位號不足以爲稱乃特置天䇿上將軍以拜焉位在王公上又曰貞元二年九月詔曰六軍先巳各置統軍一人今十六衛冝各置上將軍一人秩從其品繇是上將軍之官始列於品位太平御覽卷第二百三十七
