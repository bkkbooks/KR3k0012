front:
  text: 太平御覽卷第八百八十八
  hash: sha256:29b278881642f77c050cf95f69ad2959967b6bfe0892b579f6a2e8a8a206b4b9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_888-1a}
body:
  text: 妖異部四變化下莊子曰夫白鶂之相視眸子不運而風化蟲雄鳴於上風雌應之於下風而風化鶂以眸子相視蟲鳴以聲相因不待合而便生子故曰風化也淮南子曰夫歷陽之都一夕反爲湖勇力聖智與怯不肖者同命歷陽屬九江郡歷陽縣中有老嫗常行仁義有兩諸生過之謂曰此國當没爲湖嫗視東城閫有血便走上山勿反顧也自此嫗數徃視閫門吏問之對如其言暮門吏殺雞以血塗門閫明日嫗徃視門見血便走上山因没爲湖又曰有牛哀者病七日化而爲虎兄啓户而入哀搏而殺之又曰雌雄相接隂陽相薄羽者爲雛鷇毛者爲駒犢軟者爲皮肉堅者爲齒角人不恠也水生蚌蜃山生金玉人不恠也老槐生火乆血爲燐人弗恠也水生罔象木生畢方井生墳羊人恠之聞見鮮而所識淺也論衡曰天地不變日月不易星辰不没正也人受正氣故體不變男化爲女女化爲男由髙岸爲谷深谷爲陵也應政爲變非常恠也蠐螬化爲復育轉而爲蟬蟬生翼翼不類蠐螬凡諸螟類多化也抱朴子曰周穆王南征一軍盡化君子爲楥爲鵠小人爲蟲爲沙又曰案老子玉䇿云松脂入地千年變爲伏苓伏苓千年變爲虎魄虎魄千年變爲石膽石膽千年變爲威喜千歳之狐豫知將來千歳之狸變爲好女千歳之猨變爲老人又曰伍𬒳記八公造淮南王安𥘉爲老公不見通湏臾皆成少年又墨子五行書云墨子能變形易貌坐在立亡蹙面則成老人含笑則成女子踞地則成小兒博物志曰化民食桑二十七年以絲自裹九年死又曰吴王江行食膾棄於中流化而爲魚今魚有名王餘者長數寸大如箸猶有膾形又曰無䏿民穴居食土無男女死埋之其心不朽百年還化爲人又曰埋蜻蜓頭於西向户下則化成青珠也又曰江漢有貙人能爲虎俗云貙虎化爲人好着葛衣其足無踵有五指者皆貙也越隍之國老者時化爲虎寜州南見有此物王子年拾遺録曰崑崙者西方曰湏彌山最下層有螭潭百里多龍螭皆白色千歳一蛻其五藏潭側有五色石云是白螭之膓化爲此石又曰因墀國去王都十六萬里有解形之民放其身於空潭先使頭飛於南方次使左手飛於東方次使右手飛於西方自齊以下兩足孤立至暮頭還於體兩手不至遇疾風吹兩手於北海玄洲上化爲五足之獸則一指爲一足也蜀王夲紀曰蜀王之先名𧖟叢後代名曰栢濩後者名魚鳬此三代各數百歳皆神化不死其民亦頗隨王化去王獵至湔山便仙去今廟祀之於湔時蜀民稀少後有一男子名曰杜宇從天墮止朱提有一女子名利從江源地井中出爲杜宇妻宇自立爲蜀王號曰望帝治汶山下邑郫化民徃徃復出望帝積百餘歳荆有一人名鼈靈其尸亡去荆人求之不得鼈靈尸至蜀復生蜀王以爲相時玉山出水若堯之洪水望帝不能治水使鼈靈决玉山民得陸處鼈靈治水去後望帝與其妻通帝自以薄徳不如鼈靈委國援鼈靈而去如堯之禪舜鼈靈即位號曰開明竒帝生盧保亦號開明天爲蜀王生五丁力士能徙蜀山王死五丁輒立大石長三丈重千鈞號曰石井千人不能動萬人不能移蜀王據有巴蜀之地夲治廣都後徙治成都秦惠王時蜀王不降秦秦亦無道出於蜀蜀王從萬餘人東獵褒谷卒見秦惠王惠王以金一笥遺蜀王蜀王報以禮物物盡化爲土秦王大怒臣下皆再拜賀曰土者土地秦當得蜀矣秦王恐亡相見處乃刻五石牛置金其後蜀王以爲金便令五丁拖牛成道致三枚於成都秦道乃得通石牛之力也武都人有善知蜀王者將其妻女適蜀王居蜀之後不習水土欲歸蜀王愛其女留之乃作伊鳴之聲六曲以樂之或曰前是武都丈夫化爲女子顔色美好蓋山之精也蜀王取以爲妻不習水土疾病欲歸蜀王留之無幾物故蜀王發卒於武都檐土於成都郭中葬之盖地數畝髙七丈號曰武擔以石作鏡一枚表其墓於是秦王知蜀王好色乃獻美女五人與蜀王愛之遣五丁迎女還至梓潼見一大蛇入山穴中五丁共引蛇山崩壓五丁五丁大呼秦王五女及送迎者上化爲石蜀王登臺望之不來因名五婦候臺蜀王親理作冡皆致方石以誌其墓列異傳曰昔鄱陽郡安樂縣有人姓彭丗以捕射爲業兒隨父入山父忽蹶然倒地乃變成白鹿兒悲號追鹿超然逺逝遂失所在兒於是終身不捉弓至孫復學射忽得一白鹿乃於鹿角間得道家七星符并有其祖姓名年月分明覩之惋悔乃燒去弧矢又曰武昌新縣北山上有望夫石狀若人立者傳云昔有貞婦其夫從役逺赴國難婦携弱子餞送此山立望而形化爲石丹陽記曰孫皓寳鼎元年丹陽宣騫之母年八十因浴於後湖化爲黿搜神記曰千歳之雉入海爲蜃百年之雀入江爲鴿千歳龜黿能與人語千歳虵斷而復續百年之䑕能相卜數之至也春分之日鷹變爲鳩秋分之日鳩變爲鷹時之化也故腐草之爲螢也朽葦之爲蚕也麥之爲蛺蝶也羽翼生焉眼目成焉心知存焉此自無知而化爲有知而氣易也䳰之爲也虵之爲鼈也蛬之爲蝦也不失其血氣而形性變也又曰土蜂名曰蜾今丗謂之蝄䗸細腰之類也其爲物純雄而無雌不交不産常取桑蟲之子而育之則皆化成巳子焉又曰麥之爲蝶由于濕也爾則萬物之變皆有以也農夫止麥之化者區之以灰聖人理萬物之化者濟之以道又曰南方有落頭民其頭能飛其種人部有祭祀號曰蠱落故因取名焉吴時將軍朱桓得一婢毎夜卧後頭輒飛去或從狗竇或從天䆫中出入以耳爲翼將曉復還如此傍人恠之夜中照視唯身無頭其體微冷氣息裁属乃蒙之以𬒳至時頭還礙𬒳不得安兩三墮地噫咤甚愁而其體氣急狀若將死乃去𬒳頭復起傳頸有頃平和桓以爲巨恠畏不敢畜乃放還之旣而詳之乃知天恠也時南征大將亦徃徃得之又甞有覆以銅盤者頭不得進死又曰昔者髙陽氏有同産而爲夫婦帝殺之於崆峒之野相抱而死神鳥以不死草覆之七年男女同體而生二頭四足手是爲蒙雙氏續捜神記曰尋陽縣北山中蠻人有術能使人化作虎毛色爪牙悉真虎郷人周眕有一奴使入山伐薪奴有婦及妹亦與俱行旣至奴語二人云汝旦上髙樹視我所爲如其言旣而入草湏臾見一大黃班虎從草出奮迅吼喚甚爲可畏二人大怖良乆還草中少時復還爲人語二人曰歸家愼勿道後遂向等軰說之周得知乃以淳酒飲之令熟醉使人解其衣服及身體事事詳視了無所異唯於髻中得一𥿄畫作大虎虎邊有符周宻取録之奴旣醒喚問之見事巳露遂具說夲末云先甞於蠻中告糴有一蠻師云有此術以三尺布數升米麺一赤雄雞一升酒受此法又曰清河宋士宗母以黄𥘉中夏天於浴室裏浴遣家中子女盡出户獨在一室中良乆家人不解其意於壁穿中闚不見人正見木盆水中有一大鼈遂開户大小悉入乃與人相承當先着釵猶在頭上相與守之積日轉懈遂自投出户外其去甚駛逐之不及遂便入水後數日忽還廵行宅舎如平生了無所言而去時人謂士宗應行喪治服士宗以母形雖變而生理尚存竟不治喪與江夏黃母相似異苑曰豫章郡吏易抜義熈中受畨家違道不及郡遣追見拔言語如常亦爲施設使者催令莊束抜因語曰汝看我面仍見眼目角張身有黄斑便結一足徑出門去家先依山爲居至林麓變成三足大虎所竪之脚即成其尾又曰邵陵髙平黄秀以元嘉三年無故入山經日不還其兒根生尋覔見蹲空樹中從頭毛生色如熊問其何故荅云天讁我如此汝但自去哀慟而歸踰年伐山人見之其形盡爲熊矣又曰符堅建元年中長安樵人於城南見金走白堅堅遣載取倒化爲銅鼎入門又變成大鐸又曰隆安中東海錯魚皆化虎上岸食人異物志云東海有虎錯或時變成虎將是此耶吴都賦所謂沉虎潜鹿也越嶲河有魚皆人形而着冠幘俗語曰故没郡人悉變而爲魚也又曰司馬䡄之字道爰善射雉太元中將雉下翳此雉屢雊野雉亦應試令尋覔所應者頭翅巳成雉半身後故是虵晉中朝武庫内忽有雉時人咸謂爲恠張司空云此虵之所作耳即使搜除庫中果得蛇蛻又曰太元中汝南人入山伐一竹中央虵形巳成枝葉如故吴郡桐盧民甞伐竹遺竹一宿見竿化雉頭頸盡就身猶未變化亦竹爲虵爲雉也又曰隆安中有青雌雞化而爲赤雄形尾都變冠綵皆具唯不能鳴又曰元興二年衡陽有雌雞化爲雄八十日冠綏後桓玄篡八旬而敗幽明録曰冝陽縣有女子姓彭名娥父母昆弟十餘口爲長沙賊所攻時娥負噐出汲於溪聞賊至走還正見塢壁巳破不勝其哀與賊相格賊縛娥驅出溪邊將殺之溪際有大山石壁髙數十丈娥仰天呼曰皇天有神不我爲何罪而當如此因奔走向山山開廣數丈平路如砥群賊亦逐娥入山山遂崩合泯然如𥘉賊皆壓死山裏頭出山外娥遂隱不復出娥所捨汲器化爲石形頭似雞土人因號曰雞山其水爲娥潭齊諧記曰義熈四年東陽郡大未縣吴道宗少失父單與母居未有婦道宗收債不在家隣人聞其屋中砰礚之聲闚不見其母但有烏班虎在其屋中郷曲驚怛恐虎入其家食其母便鳴皷㑹人以徃救之圍宅突進不見有虎但見其母語如平常不解此意兒還母語之曰宿罪見追當有變化事後一月日便失其母縣界内虎灾屢起皆云烏班虎百姓患之發人格擊之殺數人後人射虎中膺并㦸刺中其腹然不能即得經數日後虎還其家故床上不能復人形伏床上而死其兒號泣如葬其母法朝暝哭臨又曰太元元年江夏郡安陸縣薛道恂年二十二少來了了忽得時行病差後發狂百藥治救不損乃復病狂走猶劇忽失蹤跡遂變作虎食人不可復數有一女子樹下採桑虎徃取之食食竟乃藏其釵釧著山石門後還作人皆知取之經一年還家爲人遂出都仕官爲殿中令史夜共人語忽道天地變恠之事道恂自云吾昔常得病發狂遂化作虎噉人一年中兼便叙其處所并人姓名其同坐人或有食父子兄弟者於是號泣捉以付官遂餓死建康獄中顧微廣州記曰湞陽縣俚民有一家牧牛牛忽蚳此兒蚳處肉悉自俄而死其家葬此兒殺牛以供賔客凢食此牛肉男女二十餘人悉變作虎太平御覽卷第八百八十八
