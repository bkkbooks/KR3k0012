  text: 太平御覽卷第三百四十三兵部七十四
  hash: sha256:78e9363e9e237a499de92ddae0138ddf0fcbbaf8505526857f16951ce74d8446
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_343-1a}
body:
  text: 劒中吴越春秋曰越王允常聘歐冶子作名劒五枚三大二小一曰純鈞二曰湛盧三曰豪曹或曰盤郢四曰魚膓五曰鉅闕秦客薛燭善相劒王取豪曹示之薛燭曰非寳劒也夫寳劒五色並見今豪曹五色黯然無華殞其光亡其神矣王復取鉅闕示之薛燭曰非寳劒也夫寳劒金錫和同氣如雲煙今其光巳離矣王復取魚腸示之薛燭曰夫寳劒者金精從理至本不逆今魚膓倒本從末逆理之劒也服此者臣弑其君子弑其父王取純鈞示之薛燭矍然而望之曰光乎如屈陽之華沈沈如芙蓉始生於湘觀其文如列星之芒觀其光如水之溢塘觀其色渙如冰將釋見日之光此純鈞者也王曰是也客有買此劒者市之郷三十駿馬千疋千户之都二其可與乎薛燭曰不可臣聞王之𥘉造此劒赤董之山破而出錫若耶之溪涸而出銅雨師灑道雷公發皷蛟龍捧爐天帝壯炭太一下觀於是歐冶子曰天地之精悉其伎巧造爲此劒吉者冝王凶者可以遺人凶者尚直萬金况純鈞者耶取湛盧薛燭曰善哉衘金鐵之英吐銀錫之精竒氣託靈有遊出之神服此劒者可以折衝伐敵人君有逆謀則去之他國允常乃以湛盧獻吴吴公子光殺吴王僚湛盧去如楚昭王寤而得之召風胡子問之此劒直㡬何對曰赤董之山巳合若耶之溪深而不測群神上天歐冶巳死雖有傾城量金珠玉不可與况駿馬萬户之都乎又曰越王問范蠡用兵行陣對曰越有處女出於南林之中願君王問以手戰之道立可見也處女將見道逢老人自稱袁公袁公曰聞子善爲劒願一觀之女曰妾不敢有隱袁公即跪拔林之竹處女即捷其末公操其本而刺處女處女因舉杖擊之袁公即飛上樹變爲白猿女別去見越王越王大恱乃命五校之隊長髙才習之以教軍人當此之時皆稱越女劒又曰干將者吴人與歐冶同師俱作劒前獻劒壹杖闔閭得而寳之以故使干將造劒二枚一曰干將二曰莫耶莫耶者干將之妻名也干將作劒採五山之精合六合之英候天伺地隂陽同光百神臨觀天氣下降而金鐵之精未流莫耶曰子以憘爲劒聞於王王使子作劒三年不成者其有意乎干將曰吾不知其理莫耶曰夫神物之化湏人而成今夫子作劒得無當得人而後成干將曰昔吾師之作冶也金鐡之頴不消夫妻俱入冶鑪之中莫耶曰先師親爍身以成物妾何難也於是干將夫妻乃断髪揃音剪指投之鑪中使僮女一作子三百皷槖裝炭金鐡乃濡遂以成劒陽曰干將而作龜文隂曰莫耶而作漫理干將匿其陽出其隂而獻之闔閭闔閭甚惜之又曰伍子胥過江解劒與漁父曰此劒中有七星北斗文其直千金越絶書曰楚王召風胡子而問之曰寡人聞吴有干將越有歐冶子此二人寡人願賫邦之重寳皆以奉子因吴王請此二人爲鐡劒可乎風胡子曰善於是乃令風胡子之吴見歐冶子干將使之爲鐡劒歐冶子干將鑿茨山洩其溪取其鐵英爲劒三枚一曰龍淵二曰太阿三曰工市劒成風胡子奏之楚王楚王見之精神太恱見風胡子問之曰此三劒其名爲何風胡子曰一曰龍淵二曰太阿三曰工市楚王曰何爲龍淵太阿工市風胡子對曰欲知龍淵觀其狀如登髙山臨深淵欲知太阿觀其鍔巍巍翼翼如流水之波欲知工市觀其鍔從文間起至脊而止如珠而不可枉文若流而不絶晉鄭聞此三劒而求之不得興師圍楚之城三年不解倉榖盡庫無兵革於是引太阿之劒登城而麾之三軍破敗士卒迷惑流血千里晉鄭之頭畢白楚王於是大恱曰此劒威耶寡人力也風胡子對曰劒之威也因大王之神楚王曰夫劒鐵耳固能有精神如此乎風胡子曰神農以石爲兵黄帝以玉爲兵禹以銅鐵爲兵天下皆服此亦鐵之神也王之德也又曰闔閭冡吴縣昌門外名曰白虎丘磐郢魚腹之劒在焉十萬人治之葬三日白虎居上號曰虎丘又曰伍子胥走吴至江上見漁者曰來渡我漁者知其非恒人即載入舡子胥即解其劒以與漁者曰吾先人之劒直百金請以與子也漁者曰吾聞荆王有令曰能得伍子胥者購之千金吾欲得荆王之千金何以子百金之劒爲漁者渡千斧之津曰亟飡而去無令遣追者及子也子胥行即覆舡伏匕首自刎而死琴操曰聶政父爲韓王冶劒過期不成王殺之時政未生壯問母知之乃上太山遇仙人學皷琴􅃮身爲厲吞炭変音七年琴成入韓逢其妻從置櫛對妻而笑妻泣曰君何似政齒政曰天下人齒相似反入山援石擊落其齒以刀内琴中刺韓王列士傳曰干將莫耶爲晉君作劒三年而成劒有雄雌天下名器也乃以雌劒獻君留其雄者謂其妻曰吾藏劒在南山之隂北山之陽松生石上劒在其中矣君若覺殺我尓生男以告之及至君覺殺干將妻後生男名赤鼻具以告之赤鼻斫南山之松不得劒思於屋柱中得之晉君夢一人眉廣三寸辭欲報讎購求甚急乃逃朱興山中遇客欲爲之報乃刎首將以奉晉君客令鑊煑之頭三日三日跳不爛君往觀之客以雄劒倚擬君君頭墮鑊中客又自刎三頭悉爛不可分別分葬之名曰三王冡列異傳曰莫耶爲楚王作劒藏其雄者搜神記亦曰爲楚王作劒餘悉同也孝子傳曰眉間赤名赤鼻父干將母莫耶父爲晉王作劒藏雄送雌母孕尺父曰男當告之曰出户望南山松上石上劒在其巔及産果男母以告尺尺破柱得劒欲報晉君客有爲報者將尺首及劒見晉君君怒烹之首不爛王臨之客以擬王王首墜湯中客因自擬之三首盡麋不分乃爲三冢曰三王冡也文士傳曰魏文帝愛楊脩才脩誅後追憶脩脩曽以寳劒與文帝文帝後佩之告左右曰此楊脩劒也周斐先賢傳曰許嘉給縣功曹儀小吏常持劒侍臣功曹月朔晨朝并持炬火嘉於是忿然歎曰男兒爲吏不免賤役即投火於地以劒帶槐樹趨謁府門南記曰魏應字尹伯任城人明魯詩章帝重之數進見論難於前特受賞賜劒玦衣服先賢行狀曰王烈字彦考通識逹道時國中有盗牛者牛主得之盗者曰我邂逅迷惑從今巳後將改過子旣巳赦宥幸無使王烈聞之人有以告烈者烈以布一端遺之或問此人旣有盗畏君聞之反與布何也烈曰昔秦穆公人盗其駿馬食之巳而賜之酒盗者不愛其死以救穆公之難今此盗人能悔其過懼聞之知是耻惡則善心將生故與布勸爲善也一年之中行路老父檐重人代擔行數十里欲至家置而去問姓字不以告頃之老父復行失劒於路有人行而遇之欲置而去懼後人得之劒主永失所取而購募或能差錯遂守之至暮劒主還見之前者代檐人也老父欖其𬒮曰子前者代吾檐不得姓名今子復守吾劒于路未有若子之仁子請告吾姓名將以告王烈乃語之而去老父以告烈烈曰丗有仁人吾未見之使人見之乃昔時盗牛人也雷煥別傳曰煥字孔章鄱陽人善星暦卜占晉司空張華夜見異氣起牛斗華問煥見之乎煥曰此謂寳劒氣華曰時有相吾者云君當貴遶身佩寳劒此言欲效矣乃以煥爲豐城令煥至縣移獄掘入三十餘尺得青石亟一枚中有雙劒文采未甚明煥取南昌西山黄白土用拭劒光豔照曜乃送一劒并少黄土與華自留一劒華得劒并土曰此干將也莫耶巳復不至然天生神物終當合耳乃更以華隂赤土一斤送與煥煥得磨劒鮮光愈亮及華誅劒亡玉匣莫知所在後煥亡煥子爽帶劒經延平津劒无故墮水令人没水逐覔見二龍長數丈盤交湏臾光采微發曜日映川說苑曰經侯往過魏太子左帶玉具劒右帶環珮左光照右右光照左又曰西閭過渡河而溺焉能說諸侯過曰干將莫耶拂鍾不錚以之攝履曽不如兩錢之錐錚楚庚切又曰齊遣淳于髠到楚髠爲人頭小楚王甚薄之謂曰齊無人耶而使子來子何長也髠對曰臣無所長腰中七尺之劒欲斬无狀王王曰止吾但戯子耳即與髠共飲酒􅐭鐵論曰所謂利兵者非謂吴楚之鋌干將之劒也以道德爲城以仁義爲郭莫之敢攻莫之敢入文王是也以道德爲胄仁義爲劒莫之敢當莫之敢禦湯武是也今不建不攻之城不可當之兵而任匹夫之役而行三尺之刄亦細矣魏文帝典論曰余好擊劒善以短乗長選兹良金命彼國工精而錬之至于百辟其始成也五色駭鑪巨槖自皷又曰建安二十四年二月丙午魏太子丕造百辟寳劒長四尺二寸重一斤十有五兩淬以清漳厲以礛音監䃴音諸飭以文玉表以通犀光似流星名曰飛景礛䃴青礪石也丗說曰王子喬墓在京陵戰國時人有盗發之者覩无所見唯有一劒停在室中欲進取之劒作龍鳴虎吼遂不敢近俄而徑飛上天又曰鍾㑹是荀濟北從舅二人情好不協荀有好寳劒可直百萬常在母鍾太夫人許㑹善書學荀手跡作書與母取劒仍竊去不還荀深知是鍾无求得求思所以報之鍾會兄弟共以千萬起新宅始成甚精䴡未得移住荀善畫於是潜往畫鍾門堂並作太傳形像衣冠狀皃如乎生二鍾來入門便大感慟於是宅遂空廢陶弘景刀劒録曰夏禹字髙宻在位十年以庚戌八年鑄一劒長三尺九寸後藏之㑹稽秦望山腹上刻二十八宿文有背靣靣記星辰背記山水日月又曰啓子少康在位二十九年歳次辛夘三年春鑄一銅劒上有八方靣長三尺一寸頭方又曰孔甲在位四十年以九年歳次甲辰採牛頭山鐡鑄一劒銘之曰夾古文篆長四尺一寸又曰太田在位三十二年以四年歳次甲子鑄一劒長二尺九寸文曰定光古文篆書又曰武丁在位五十九年歳次戊午鑄一劒長三尺銘曰照膽大篆書又曰周昭王瑕在位五十一年二年歳次壬午鑄五劒各投五岳鎮方岳大篆書長五尺又曰簡王夷在位十四年歳次癸酉鑄一劒銘曰日駿長三尺大篆書又曰秦昭王在位五年元年丙午鑄一劒長三尺銘曰誡大篆書又曰始皇在位三十七年三年丁巳採北祇銅鑄二劒銘曰定秦李斯小篆書李斯刻一口埋在阿房闕下一口埋在日觀䑓長六尺又曰前漢劉季在位十二年季以始皇三十四年於南山得一鐡劒長三尺小篆書銘曰赤霄及貴常服之此即斬白蛇之劒也又曰文帝恒在位二十三年以𥘉元十九年庚午鑄三劒各長三尺三寸銘曰神龜形以應大撗之兆帝崩命入玄宫又曰武帝徹在位五十四年以元光五年乙巳鑄八劒各長三尺六寸銘曰八服小篆書嵩霍衡華太山皆埋之又曰宣帝詢在位二十五年太始四年鑄兩劒各長三尺一曰毛二曰貴以應足下毛之祥皆小篆書又曰平帝衍在位五年元始元年辛酉掘得一劒上有帝名因服之大篆書又曰新室王莽在位十八年建國五年庚午造威㪷及神劒皆錬五石爲之銘曰神勝萬國伏小篆書長三尺六寸又曰劉更始聖公在位二年自造一劒銘曰更國小篆書又曰後漢光武劉秀在位三十三年未貴時在南陽鄂水中得一劒文曰秀覇小篆書帝服之又曰漢明帝在位十八年元和元年戊午鑄一劒上作龍形沉之于洛水洛水清往往有人見又曰章帝烜在位十三年建𥘉八年鑄一金劒投之伊水中以厭膝人之恠弘景按水經伊水有一物如人膝頭有人浴輙引之投水又曰安帝祐在位十九年永𥘉七年鑄一劒藏峨嵋山擬山王也又曰順帝寳在位十九年永建元年鑄一劒長三尺四寸小篆書銘曰安漢後遂爲年號又曰靈帝宏在位二十二年以建和三年鑄四劒銘曰中興一劒無故而失又曰曹武帝曹操以建安二十年於谷中得一劒三尺六寸上有金字銘曰孟德王常服之又曰齊王芳正始六年造一劒常服之無故失其刃但有空匣又曰吴主孫權黄武五年採武昌山銅鐵作十口劒萬口刀各長三尺九寸刀頭方皆是南鋼越炭作之上有大吴篆字又曰吴孫權赤烏中有人得淮隂侯韓信劒帝賜周瑜又曰孫亮建興二年鑄一劒銘曰流光小篆書又曰孫皓建𥘉元年鑄一劒銘曰皇帝吴主小篆書又曰蜀後主劉禪延熈二年造大金劒長一丈二尺鎭劒口山往往人見輝光後人處處求覔不得又曰宋劉昱元徽二年於蔣山頂造一劒銘曰永蜀小篆書又曰蜀主劉備章武元年辛丑採金牛山鐵鑄八鐵劒各長三尺六寸一備自佩一與太子一與梁王理一與魯王永一與諸葛亮二與張飛關羽一與趙雲並是亮書作風角處所又曰晉懷帝名熾永嘉元年造一劒長五尺銘曰歩光篆字又曰東晉司馬衍咸和元年造劒十三口銘曰興國又曰東晉司馬昌明太元十年於金華山頂埋一劒銘曰神劒又曰後魏道武帝登國元年於阿理鑄二劒一銘曰鎮山一銘曰沈水並隷書又曰明元帝以太常元年造一劒長四尺銘背曰太常又曰太武帝至真君元年有道士継天師自爲帝造劒因改元爲真君劒長三尺六寸隷書又曰梁武帝蕭衍天監元年即位至普通中歳在庚申命弘景造神劒十三口用金銀銅鐵錫五色合爲此劒長短各依劒洞術法一曰凝霜道家三洞九真劒上刻真人玉女名字二曰宫儀備齋六宫有劒神名無刄刻宮宿星皇后服之三曰摛光備非常御斬刺長三尺六寸上刻風伯雨師形名四曰九天出軍行師君執授將長五尺金鏤作蚩尢神形五曰伐形刻符籙道家登真圖口決六甲神長五尺六曰四目突宮闈茵𬒳卧止小室幄帳中長三尺五寸七曰五威靈光長二尺許半身有刃上刻星辰北斗天市天魁二十八宿服此除百邪魑魅去厭即伏用之八曰風烏有惡鳥鳴起鎮之上有黄帝呪法禹歩形勢用之九曰司命行刑煞罰者執之賜萬姓自裁者寸曰禮劒生畜男子弧矢縠劒則用之十二曰永昌鎮國安社用之長七尺十三曰閠劒長六尺所以作十三口象閠月故也取上元甲子時加斗魁加歳正月旦合合之取風雷雨震日止環偏長八寸文曰服之者永治四方小篆文太平御覽卷第三百四十三
