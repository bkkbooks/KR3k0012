body:
  text: 前秦符堅符丕符登符堅崔鴻十六國春秋前秦録曰符堅字永固健弟雄之子趙建武中母苟氏祈西門豹祠歸而夜夢與神交遂孕十二月而生有神光之異自天屬庭背有赤文隱起成字曰艸音草付臣又土王咸陽祕而莫之傳也姿貌魁傑臂垂過膝目有紫光祖洪竒而愛之名堅頭因而謂健曰此兒頭大重身長任大足短安下非常相趙右光禄大夫司隷校尉髙平徐統有知人之鑒遇堅於路異之執其手曰符郎此官之御街小兒敢戲統頋左右曰此兒有霸王之相後復遇之統下車謂曰符郎當大貴僕不及如何堅曰若如公言不敢忘德八歳請就師學洪曰尚小未可吾年十三方欲求師時人猶以爲速成健之入關次于曲沃夢天神遣使朱衣赤冠命拜堅爲龍驤將軍旦而爲壇於曲沃拜堅泣謂曰先王昔始受此號汝父次爲之今若若汝也復爲神明所授可不勉之性至孝有器度博學多才藝年十一便有經略大志堅旣殺符生永興元年六月去皇帝之號僭稱大秦天王即位太極殿誅董龍等二十餘人改壽光三年爲永興元年追尊父爲文桓皇帝丗子宏爲皇太子兄清河王法爲丞相東海公永安公符侯爲太尉諸王皆貶爵爲公符抑爲尚書令封弟融爲陽平公雙河南公子丕爲長樂公暉爲平原公熈爲廣平公李威爲左僕射梁平老爲右僕射席寶爲丞相長史王猛爲中書令侍郎權翼爲黃門郎諸公卿爲生所誅者悉復本官十月丞相東海公法以疑忌賜死苟太后之意也堅性友愛與法訣於東堂慟哭嘔血二年四月堅如雍祀五畤音止六月如河東祀后土八月自臨晉登龍門頋謂羣臣曰美哉山河之固權翼對曰呉起有言在德不在嶮深願陛下追蹤唐虞懷逺以德山河之固不足恃也堅大悅至韓原觀晉魏顆鬼結草抗秦軍之處賦詩而歸甘露元年正月起明堂禪音善南北郊六月甘露降乃大赦改年八月堅下書曰咸陽内史猛聲彰出納所在著績有卧龍之才冝入賛百揆絲綸王言可徴拜侍中中書令領京兆尹中丞鄧羗性鯁直與猛協規齊志於是百僚肅整豪右屏氣風化大行堅歎曰吾今始知天下之有法也以猛爲吏部尚書遷太子詹事十一月以猛爲司隷侍中領選如故猛上䟽曰伏見陽平公融明德懿親光禄西河任羣忠貞淑愼處士朱彤博識聦辯竝宜左右彌綸暉賛九棘愚臣庸鄙請避賢路堅曰機務俟才允屬明哲朝野所望豈容致辭所舉融等㝷别銓授於是以融爲侍中中書監右僕射任羣爲光禄大夫領太子家令朱彤爲中書侍郎領太子庶子三年九月鳳皇集于東閣大赦天下初將爲赦與左僕射猛右僕射融議於露堂悉屏左右堅自爲文猛融進紙筆有一大蒼蠅入自牖間鳴聲甚大集于筆端駈而復來堅惡之乆而乃去俄而長安街巷市里民相告曰官今大赦有司以聞堅驚謂融曰事何從而泄勑外窮推咸言有一小人衣黒衣呼於市曰官今大赦須臾不見堅歎曰其向蒼蠅乎聲狀非常吾固惡之四年七月黃龍見於成紀梁山崩五年白虎見天水六年遣鴻臚拜張天錫爲大將軍涼州牧西平公建元元年正月雍州秀才叚鏗對䇿上第拜吏部郎中孝廉通經者十餘人皆拜令長五年六月晉大司馬桓温伐燕次于枋音方頭燕師屢敗遣散騎侍郎樂嵩來乞師請賂秦以虎牢以西之地八月遣將軍苟也洛州刺史邵羗帥歩騎二萬救燕温敗歸是月京兆民王攸上書獻十略一曰君道宜明二曰臣尚忠敬三曰子貴孝養四曰民生在勤五曰教無偏黨六曰養民在惠七曰延聘耆賢八曰懲惡顯善九曰伐叛柔服十曰易簡弘大堅納之以攸爲諫議大夫十一月燕車騎呉王垂來奔桓温旣走慕容暐音葦悔割河洛之地以賂秦乃曰行人失辤分灾救患理之常也堅大怒六年令輔國王猛帥鎭南楊安虎牙將軍張蚝音次建節鄧羗等歩騎六萬討平燕兾八月猛攻尅壺關暐遣太傅上庸王評等帥四十萬屯於潞川猛覘丑艶切覘候也知評賣水鬻樵不撫將士大笑謂楊安等曰慕容評眞奴才雖億兆之衆尚不足爲慮況數十萬乎今破之必矣甲戌陳於渭原猛誓衆曰王景略受國厚恩任兼内外今與諸君深入賊地冝各勉進不可退也受爵明君之朝慶觴父母之室不亦美乎衆皆勇奮破釡弃糧大呼競進猛望燕師之衆惡之謂鄧羗曰今日之事非將軍莫可以捷也成敗之機在斯一舉羗曰若以司隷見與公無以爲憂猛曰此非吾所及必以安定大守萬户侯相處羗不悅而退俄而兵交猛召羗羗寢而不應猛乃馳就許之羗於是飲與張蚝徐成等跨馬馳入傍若無人搴音愆又居輦切舉也旗斬將燕師敗績進師圍鄴猛之未至鄴也劫盗公行及猛之至逺近怗然十一月堅自帥精銳十萬攻鄴七日而至於安陽故宅引諸耆老語及祖父舊事泫然流涕猛濳如安陽迎堅堅謂曰昔亞夫不出軍迎漢文將軍何以臨敵而背衆乎猛曰臣每覽亞夫之事常謂前却人主以此而爲名將竊未多之臣奉陛下神笇擊垂亡之虜若摧枯拉音獵朽何足憂也戊寅尅鄴慕容暐岀奔將軍郭慶執暐於髙陽送之辛巳堅入鄴宫大赦閱其圗籍郡百五十七縣一千五百七十九戸二百四十五萬八千九百六十九以王猛爲都督諸軍事車騎大將軍開府儀同兾州牧鎭鄴封清河郡侯以僞太宰恪太傅評之第盡賜之加美妾五人上女妓十人中女妓三十八人猛辭堅曰昔魏絳和戎猶有金石絲竹之賞山甫翼周實受四牡之錫卿功超二子任過管葛安得辭也其敬受之無逆朕命以鄧羗爲散騎常侍安定太守眞定郡侯邑三千户賞潞川之功七年七月堅如洛陽下書曰士死知己猶來格模故喬公一言魏祖追慟趙司隷髙平徐統往在鄴都識朕於童稚毎思其殷勤之言弗敢忘也可召其子孫詣行所八年五月以髙平徐攀爲琅邪太守攀統之少子以舊恩拔之也六月兾州牧猛入爲丞相中書監司隷校尉猛固辭丞相改授司徒又固辭不拜乃停司徒之授四月天鼔鳴彗出于尾箕長十餘丈或名蚩九旗太史令張猛言於堅曰尾燕之分野而掃東井東井秦之分灾深禍大十年之後燕滅秦之象二十年之後燕當爲岱所滅慕容暐父子兄弟亡虜也而布列朝廷貴盛莫二宜除渠帥以寧皇秦若旦誅鮮卑不夕滅客彗者臣請就妖言之戮堅不納更以暐爲尚書垂爲京兆尹冲爲平陽太守十年三月侍中太尉李威卒威字伯龍漢陽人荀太后姑子少與符雄結刎頸之交符生屢欲誅堅賴威之免堅深德之事威如父誅符生及法皆威與太后潛決大謀遂有辟陽之寵雅重王猛勸堅以國事任之堅常謂猛曰李公知卿猶鮑叔之於夷吾罕虎之於子産猛兄事之夏四月堅下書曰巴夷嶮逆宼亂益州招引呉軍爲脣齒之勢特進鎭軍將軍護羗校尉鄧羗可帥甲士五萬星言赴討五月蜀人張育楊光等起兵二萬以應巴獠音老晉威逺將軍栢石帥衆三萬入據墊音店江張育自號蜀王稱蕃于晉八月鄧羗敗晉師于涪音浮西擊張育楊光於綿竹皆斬之益州平羗勒銘于岷山而還十二月羗至自成都堅引見東堂謂之曰將軍之先仲華遇漢丗祖於前將軍復逢朕於後何鄧氏之多幸羌曰臣常謂光武之遇仲華非獨仲華之遭光武堅笑將軍蓋以自貺非直將軍之幸亦朕之遇賢十一年正月以徴士樂陵王忻爲國子祭酒堅雅好文學英儒畢集純博之精莫如忻也終于太子少傳五月猛寢疾堅親祈南北郊宗廟社稷分遣侍臣禱河岳諸神無不周備以猛少瘳赦殊死七月堅臨省疾問以後事猛曰晉僻陋呉越乃正朔相承臣没之後願不以晉爲圖鮮卑羗虜我之仇讎終爲大患宜漸除之以便社稷言終而卒時年五十一堅哭之慟謂太子宏曰天不欲使吾平一六合何奪吾景略之速也贈侍中丞相餘如故謚武侯朝野巷哭三日十二年正月癸巳髙陸民穿井得龜大三尺六寸背有八卦文命太卜池養之食之以粟四月堅下書曰涼州刺史張天錫雖稱蕃受位而臣道未純可歩兵校尉姚萇等自石城津伐天錫率勁勇五萬來拒戰于赤岸涼師大潰天錫率騎數千奔還姑臧牋降于萇甲午大軍至姑臧天錫素車白馬靣縛舁襯降于軍門萇釋縛焚襯送之長安諸郡悉降涼州平九月以梁熈爲西中郎將涼州刺史鎭姑臧徒豪右七千户於關中封天錫重光縣之東寜郷二百户號歸義侯拜比部尚書遷右僕射萇之征也堅爲天錫立第旣至如㱕十三年正月太史奏有星見于外國之分當有聖人之輔中國得之者昌堅聞西域有鳩摩羅什襄陽有釋道安竝遣求之十七年正月不雨至于六月徹樂減膳出宫女以迎和氣八月堅収起居注及著作所録而觀之見苟太后李威之事慙怒乃焚其書著作郎董朏音斐雖更書時事然十不留一八年三月徙鄴銅駞銅馬飛廉翁仲于長安十月堅引羣臣於太極殿議曰東南一隅未賔王化今欲起天下兵討之計其兵仗精卒九十七萬吾將先啓行薄伐南裔此行也朕與陽平公之任非諸將之事左右僕射權翼沙門道安陽平公融尚書石越等上書靣諌前後數十堅終不納十九年晉車騎桓冲率衆十萬攻襄陽遣其前將軍劉波攻河北堅大怒遣其子征南鉅鹿公叡冠軍慕容垂佐衛毛當等將歩卒五萬救襄陽堅下書曰吳人敢恃江山屢冦王境宜時進討以淸宇内便可戒嚴速脩戎備發州民則十丁遣一兵若門在灼然者爲崇文義從朕將登㑹稽復禹績伐國存君義同三王其以司馬昌明爲左僕射謝安爲吏部尚書桓冲爲侍中勢還不逺可並爲起第八月戊午遣征南大將軍陽平公融騎從張蚝撫軍大將軍髙陽公符方衛軍梁成平南慕容暐冠軍慕容垂歩騎二十五萬爲前鋒甲子堅發長安戎卒六十餘萬騎二十七萬前後千里九月堅至項城涼州之兵始達咸陽蜀漢之軍順流而下幽兾之衆至于彭城東西萬里水陸齊進融等攻壽春晉遣都督謝石徐州刺史謝玄豫州刺史桓伊水陸七萬敗堅于淝水堅爲流矢所中單騎遁還於淮北頋謂夫人張氏曰朕用朝臣之言豈見今日之事耶何靣目復臨天下泫然流涕堅諸軍悉潰及慕容垂一軍獨全比至洛陽百官威儀軍容粗備未及関而垂有貳志說堅請巡撫燕代并求拜墓堅許之權翼固諌以爲不可堅不從堅至自淮南次于長安東之行宫入告罪于太廟丁零翟斌反于河南樂公符丕遣慕容垂及符飛龍討之垂南結丁零殺飛龍盡坑其衆垂引丁零烏丸之衆二十餘萬爲飛梯地道以攻鄴城慕容暐弟泓先爲北城長史聞垂攻鄴亡奔關東收諸馬牧鮮卑衆數千還屯華隂暐乃濳使諸弟及宗人起兵于外堅遣將軍強永擊之爲泓所敗泓自稱大都督雍州牧濟北王推叔父垂爲丞相大司馬兾州牧呉王堅謂權翼曰將若泓何翼曰慕容垂正可據山東爲亂不暇近逼今暐宗族盡在京師鮮卑之衆布在畿甸實社稷之憂冝遣重將討之堅乃以廣平公符熈鎭蒲坂符叡爲都督配兵五萬姚萇爲司馬討泓于華陽平原太守慕容冲起兵河東有衆二萬進攻蒲堅命竇衝討之符叡勇果輕敵戰于華隂叡敗績𬒳殺堅大怒萇懼誅遂叛竇衝大破慕容冲于河東冲奔于泓泓衆至十萬餘遣使謂堅曰秦師傾敗將欲興復大燕呉王以定關東可速資備大駕奉送家兄皇帝返鄴都與秦以虎牢爲界分王天下堅大怒召暐責之暐叩頭流血陳謝堅曰此自三竪之罪非卿之過復其位待之如初命暐以書招諭垂及泓冲使息兵暐密遣使謂之曰今秦數巳終當不能復乆吾籠中之人必無還理勉建大業以興復爲務泓於是進向長安堅卒歩騎二萬討姚萇於北地萇率衆七萬來攻堅爲萇所敗聞慕容冲去長安二百餘里退師而㱕使符方戍驪山符暉都督中外諸軍事配兵五萬拒冲暉師敗績堅又以尚書姜宇與符琳率衆三萬擊冲于霸上爲冲所敗宇死之琳中流矢冲遂據阿房城進逼長安堅登城觀之歎曰此虜從何出也吾不用王景略陽平公之言使白虜敢以至於此長樂公符丕在鄴粮竭馬又無草削松木而食之㑹丁零叛慕垂引師去鄴始具西問知長安危逼遣從弟求救於謝玄二十一年慕容冲僭稱尊號于阿房改年更始冲率衆登城堅身貫甲胃督戰拒之飛矢滿身流血𬒳體時雖兵冦危逼馮翊諸堡猶有負粮冒難而至者多爲賊所殺先是言天或導余留汝兼緫戎政勿與爭利吾當出隴収兵運粮以給汝自將張夫人及中山公詵率騎數百出如五將山六月太子宏將母妻數千騎出奔冲入據長安堅至五將山姚萇遣將軍呉忠圍之堅衆奔散獨侍御十數人而已神色自若召宰人進食俄而忠執堅以歸新平縣幽之别室萇求傳國璽於堅曰萇次應符曆可以爲惠堅叱之曰小羗乃敢干逼天子豈以傳國璽授汝羗乎五胡次序無汝羗名違天不祥其能乆乎璽巳送晉不可得也萇遣右僕射尹偉說堅求爲堯舜禪代之事堅曰姚萇叛賊柰何擬之古人因問偉曰卿於朕朝作何官對曰尚書令史堅歎曰卿宰相才也王景略之流而朕不知卿云也不亦冝乎八月縊堅於新平佛寺中時年四十八張夫人中山詵等皆自殺三軍莫不哀慟萇欲匿煞堅之名乃謚爲莊列天王長樂公稱尊號僞謚堅爲丗祖宣昭皇帝𥘉太子之奔也假道歸晉歷位輔國將軍桓玄篡位以爲梁州刺史晉書曰堅在位二十七年符丕崔鴻十六國春秋前秦録曰符堅字永叙堅之長庶子少而聦惠好學堅與之言將略嘉之才幹亞于符融爲將善収士卒時出鎭于鄴東夏安之堅敗㱕長安爲慕容垂所逼自鄴奔于枋頭堅之死也建元二十一年丕復入鄴城將収兵趙魏而赴長安㑹平州刺史符冲帥幽并之衆擊慕容垂頻爲垂將帶方等所敗乃率衆三萬進屯壷関使招丕丕乃去鄴率男女六萬進如潞州驃騎將軍張蚝并州刺史王騰迎之入據晉陽始知長安不守堅爲姚萇所煞乃舉哀于晉陽僣即皇帝位于晉陽南立堅行廟大赦改建元二十一年爲太平元年九月置百官是月安西吕光自西城還師二年正月慕容垂僣稱尊號二月慕容冲左將軍韓延煞冲立叚隨爲燕王改年昌平正月丕以吕光爲車騎將軍梁州牧酒泉公是月姚萇僣稱尊號氐有啖青者謂諸將曰狄道長符登雖王室踈屬而志略雄明請共立之以赴大駕於是推登爲使持節督隴右雍河二州牧率衆五萬東下隴右據南安馳使請命八月丕以登爲征南大將軍開府儀同南安王持節雍州牧因其所稱而授之九月丕下書鮮卑慕容永我之騎將首亂京畿禍傾社稷其遣丞相王永帥禁衛虎旅覆而取之十月與慕容永戰于襄陵王師大敗丕懼帥騎數千南奔東垣晉揭威將軍馬該自陜要擊斬之送丕首于江東符登稱尊號謚爲哀平皇帝符登崔鴻十六國春秋前秦録曰符登字文髙丕之族子父敞太尉司馬登少勇有壯氣建元元年初拜殿中將遷羽林監長安令㘴事黜爲狄道長太平二年與姚萇戰於胡奴塠大破之十一月丕子渤海王懿自吉城奔登登乃具丕死問於是爲丕發喪行服爲壇于隴東僭即皇帝位改太平二年爲太初元年十二月立堅神主于軍中引師而告堅神主曰今収合義旅衆餘五萬星言電邁直造賊庭庶上報皇帝酷怨下雪民人大恥二年登次于凡亭九月進據胡空堡戎夏歸之者十有餘萬姚萇掘堅屍鞭撻無數裸剥衣裳附之以棘坎土埋之三年登次朝郍姚萇據武都相持累戰㸦有勝負萇以登戰勝謂堅神像所助亦於軍中立堅神主謂曰往年新平之禍非萇之罪陛下假臣龍驤曰朕以龍驤建業卿其勉之明詔昭然言猶在耳豈假手符登而圖臣忘前征時言耶今爲陛下立神像可歸休于此勿計神過聽臣至誠四年正月登昇樓謂萇曰自古安有殺君反立神像大呼曰殺君賊姚萇出來與汝決之何爲枉害無辜萇憚而不應萇自立堅神像戰未有利軍毎夜驚乃斬像首送登六年三月登自雍攻長安七月登攻新平姚萇救之登引退八年十二月姚萇薨九年登聞萇死喜曰姚興小兒吾折扙以笞之於是大赦盡衆而東四月登從六陌趣廢橋興將軍尹緯據橋以待登與緯大戰爲緯所敗登單馬奔雍初登之東也留太子崇守胡空堡崇聞登敗弃城出奔登至無歸乃奔平涼収集遺兵入馬毛山七月興攻登于馬毛登遣子崇質於隴西鮮卑乞伏乾歸結㛰請援乾歸遣騎二萬救登登引軍出迎與興戰于山南爲興所敗死之時年五十二子崇奔隍中復稱尊號改年延初謚登爲髙皇帝十月崇爲乾歸所逐奔于楊定與崇帥衆二萬攻乾歸爲乾歸所敗崇定皆死之自符健皇始元年歳在辛亥晉永和七年是歳歳在甲午四十四年晉太元十九年也晉書曰登在位九年始健以穆帝永和七年僭立至登伍丗凡四十有四年以孝武帝太元十九年滅太平御覽卷第一百二十二
