  text: 太平御覽卷第二十六
  hash: sha256:99dc59c853a3207f1862bd55a32f3314ff1d25ecdcdb20bd9fc7ac263437aba2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_026-1a}
body:
  text: 時序部十一冬上釋名曰冬曰上天其氣上騰與地絶也故月令曰天氣上騰地氣下降又曰冬終也物終成也說文曰冬終也盡也字從升古終字從仌古冰字書曰申命和叔宅朔方曰幽都平在朔易北稱朔亦稱方則三方見矣北稱幽則南方稱明從可知也都謂所聚也易謂歳耿易於此也平均在察其政以從天常上揔言羲和敬順昊天此分别仲叔各有所掌也日短星昴以正仲冬日短冬至之日也昇白虎中星以七星並見正冬之三節厥民奥鳥獸氄毛奥室也民改歳入此室處以避風寒鳥獸皆生毛細毛以自温之又曰冬祁寒小民亦惟曰怨咨詩曰我有㫖蓄亦以禦冬又曰豊年之冬必有積雪又曰十月納禾稼黍稷穜稑上音童下音陸禾麻菽麥又曰二之日鑿冰沖沖冰盛水腹堅命取冰於山林中冲冲鑿冰之音二之日夏之十二月也又曰冬日烈烈飄風發發箋云烈烈猶栗烈也發發疾貌言王爲酷虐慘毒之政如冬之日烈烈矣又曰坎其擊鼓宛丘之下無冬無夏值其鷺羽值時也鷺鳥之羽可以爲翳箋云翳舞者所持以指麾坎其擊缶宛丘之道無冬無夏值其鷺翿翿亦翳也禮月令曰十月之節日在房立冬爲十月節昬虚中曉張中斗建亥位之𥘉其日壬癸壬癸属水主冬其帝顓頊其神玄冥昔顓頊氏以水德繼天而王故爲冬帝水正日玄冥故玄冥爲水神佐顓頊於冬其蟲介北方玄武介蟲之長九有甲之類皆属於水故曰其蟲介介甲也其音羽三分啇去一以生羽羽數四十八属水以爲最清物之象也冬氣和則羽聲調樂記曰羽乱則危其財匱律中應鍾十月氣至則應鍾之律應應鍾者姑洗之所生三分去一管長四寸七分其味鹹其臭杇凢臭味鹹杇者皆屬於水其祀行祭先腎冬隂氣盛寒於外祀之於行從辟除之類行謂道也祭先腎者隂謂在下腎亦在下凢祀行俎先進腎立冬之月水始冰後五日地始凍後五日野雞入大水爲蜃食黍與鴈冬味之冝其器閎以掩太史以先立冬三日謁于天子曰某日立冬盛德在水天子乃迎冬於北郊迎冬爲祀黒帝汁光紀於北郊以顓頊配坐以玄冥恒星三辰七宿從祀可以築城郭造宫室穿竇窖修囷倉謂改築城郭創造宫室修囷倉以備積貯天子始裘謂𥘉衣寒衣又曰十月中氣日在尾小雪爲十月中氣昬危中曉翼中斗建亥位之中小雪之中虹藏不見後五日天氣上騰地氣下降後五日閉塞而成冬謹關梁塞蹊徑蹊徑謂山澤禽獸道又曰十一月之節日在箕大雪爲十一月之節昬營室中曉軫中斗建子位之𥘉律中黄鍾十一月氣至則黃鍾之律應黄鍾者律之始也管長九寸其日其音其數並同孟冬大雪之日鶡鳥不鳴後五日虎始交後五日茘挺出十一月中氣日在南斗冬至爲十一月中氣昬東壁中曉角中斗建子位之中冬至之日蚯蚓結後五日麋角解後五日水泉動是月也祀昊天上帝於圎丘謂冬至日祀昊天上帝於圎丘以髙祖神堯皇帝配坐以五方帝及日月星辰及内外星官等從祀於壇命有司祭馬歩謂仲冬祭馬步於大澤用剛日伐木取竹箭此時堅成可伐取又曰十二月之節日在南斗小寒爲十二月之節昬奎中暁亢中斗建丑位之中律中大吕十二月氣至則大吕之律應大吕者㽔賔之生三分益一管長八寸四分其日其音其數並同孟冬小寒之日鴈北郷後五日鵲始巢後五日野雉始雊天子乃命將帥講武習射角力講武角力校武士材力所以備畋獵之禮天子乃厲飾執弓挾矢以獵厲飾謂衣戎服尚威武以獵修祭禽之禮謂所獵得禽獸以供䄍祭又曰十二月中氣日在湏女大寒爲十二月中氣昬婁中曉氐中斗建丑位之中大寒之日雞始乳後五日鷙鳥厲病後五日水澤腹堅天子親徃嘗魚時魚㓗美冰方盛取而藏之春秋傳曰月在北陸而藏冰計耦耕修耒耜寒氣過農事將興出土牛以示農耕之早晚若立春在十二月望則䇿牛人近前示其農早也立春在十二月晦及正月朔則䇿牛人當中示其農平也立春近正月望則䇿牛人近後示其農晚也天子乃與公卿大夫共飾國典論時令以待來歳之冝周官建寅之月懸法於象魏以示人四時之令皆以此爲準故以建丑之月與公卿先飭之命有司大儺旁磔以送寒氣大難爲歳終逐除隂疫以送寒氣故周官命方相氏率百隸索室駈疫以逐之旁謂磔犬於門春磔九門冬禮大故徧磔於十二門所以扶陽抑隂之義犬属金冬盡春興春爲木故殺金以助木氣禮曰季冬之月命告人出五種命農計耦耕修耒耜具田器又曰是月也日窮于次月窮于紀星廽于天數將幾終歳且更始專其農人無有所使又曰孟冬之月天子乃祈來年于天宗注云天宗日月星辰也又曰孟冬命有司循行積聚坯城郭戒門閭又曰夫爲人子之禮冬温夏清又曰冬之爲言中也中者藏也又曰國子冬夏教以詩書秋冬學羽籥又曰儒有居處齊莊其坐起恭敬言必誠信行必篤敬道途不争險易之利冬夏不爭隂陽之和又曰昔者先王未有宫室冬則居營窟夏則居曽巢大戴禮曰季冬聽獄論刑者所以正法又曰方冬三月草木落庻虞藏五糓必入于倉於時有事蒸于皇祖考息國老六人以成冬事又曰司空司冬以制度制地事准揆山林規表衍沃畜水行表灌浸以節四時之事理地逺近以任民力以節民食又曰古者天子常以季冬考德以觀治亂德盛者治也德不盛者亂也德盛者得之也德不盛者失之也周禮曰小司冦孟冬祀司民獻民數於王王拜受之以圖國用而進退之司民星謂軒轅角也又曰凌人掌冰正歳十有二月斬冰三其凌正歳季冬火星中大寒冰方盛之時春秋傳曰火星中而寒暑退凌氷室也三之者爲消釋度也三其凌三倍其冰又曰占夣職季冬聘王夣獻吉夣于王王拜而受之聘問也夣者事之祥吉凶之占在日月星辰季冬日窮于紀星迴于天數將幾終於是發弊而問焉若休慶之云尔獻群臣之吉夣於王㱕美焉詩云牧人乃夣衆維魚矣旐維旟矣此所獻吉凶又曰天府掌季冬陳王以貞來歲之美惡鄭玄注曰問事之正曰貞問歳美惡謂問於龜又曰大吕丑之氣十二月建丑而辰在玄枵又曰冬官其屬六十掌邦事又曰以玉作六器以禮天地四方以玄璜禮北方注日禮北方謂黑精之帝顓頊玄冥配食焉半璧日璜象冬閉藏地上無物唯天半見又曰冬見曰遇遇者偶也義取不期而偶至大行人云冬遇以偽諸侯之慮傳曰公叔定叔出奔衛三年而復之曰不可使共叔無後使以十月入曰良月也就盈數焉傳曰鄷舒問於賈季曰趙衰趙盾孰賢對曰趙衰冬日之日趙盾夏日之日冬日可愛夏日可畏爾雅曰冬爲上天言時無事在上臨下孫炎曰冬天藏物物伏于下天清于上又曰冬爲玄英氣黒而清英又曰冬爲安寧四時之别名尸子以爲太平祥風名又曰冬獵爲狩狩守也冬物畢成圍守取無簡擇易通卦驗曰大雪魚負冰鄭玄曰魚冰上近冰也易通統圖曰日冬行北方黒道曰北陸京房易曰冬至坎王廣莫風用事人君决大刑斷獄訟繕宫殿尚書大傳曰殷以季冬爲正月又曰周以仲冬爲正又曰北方者何也伏方也伏方也者萬物之方伏物之方伏則何以爲之冬冬者中也中也者物方藏於中也故曰北方冬也陽盛則吁荼萬物而養之外也隂盛則吁吸萬物而藏之内也吁茶氣出而温吁吸氣入則寒温則生寒則殺也故曰吁吸者也隂陽之交接萬物之終始尚書大傳曰冬者昴昬中可以收歛盖藏田獵斷伐當告乎天子而天子賦之民故天子南靣而視四星之中知民之緩急急則不賦籍不舉力役籍公家之常徭故曰敬授民時此之謂也又曰辯在朔易曰短朔始也傳曰天子以冬命三公謹盖藏閉門閭固封境入山澤日臘以順天道以佐冬固藏也詩含神霧曰魏地處季冬之位土地平夷又曰唐地處孟冬之位得常山太岳之風音中羽其地磽确上苦交切下苦角切而收故其民儉而好畜此唐堯之所起三禮義宗曰冬日壬癸者壬任也癸揆也言萬物更任生於黄泉皆有法度也又曰十二月小寒爲節者亦刑於大寒故爲之小言時寒氣猶未是極也大寒爲中者上刑於小故謂之大自十一月一陽支𥘉起至此始徹隂氣出地方盡寒氣併在上寒氣之逆極故謂大寒也逸禮曰冬則衣黒衣佩玄玉乗玄輅駕鐵驪載玄旗以迎冬于北郊其祭先豕居明堂後廟啓北户春秋繁露曰冬氣衰故藏又曰木有變春凋冬榮此傜役衆賦歛重也春秋考異郵曰冬風曰廣莫風春秋感精符曰天統十一月建子天始施之端也謂之天紀者周以爲正漢書記律黄鍾爲天統史記曰漢髙祖旣定天下叔孫通定朝儀群臣朝十月儀於長樂宫執㦸尊卑次序諸侯王巳下莫不震恐帝曰吾迺今日知爲皇帝之貴也前漢書曰魏相上書曰北方之神顓頊乗坎執權司冬張晏曰水爲智智者謀謀者重故爲權又曰東方朔上書云臣朔年十三讀三冬文史足用又曰冬民旣入婦人同巷相從夜績女工一曰四十五日必相從者所以省費燎火同巧拙而合習俗也又曰龔遂爲渤海太守勸民冬益収果實菱芡民皆頼之續漢書曰嚴延年字次卿爲河内太守冬月傳属縣囚㑹府下流血數里河南號爲屠伯又曰宋均爲九江守五日一聽事冬以日中夏以平旦後漢律暦志曰日行北陸謂之冬又曰季冬之月星廻歳終隂陽以交勞農大臘先臘一日大儺謂之逐疫漢舊儀曰顓頊有三子而去爲疫鬼一居江水是爲一居苦水爲罔虺蜮一居人宫室區隅善驚小兒月令章句曰日行北方之宿北方大隂恐爲所抑故命有司大儺所以扶陽抑隂也盧植注禮記曰所以逐衰而迎新也又曰是月也立土牛六頭於國都郡縣城外丑地送大寒月令章句曰是月之㑹建丑丑牛寒將極是故出其物類形象以示送逹之旦以升陽者也後漢書曰鍾離意辟大司徒侯覇掾詔曰部送徒詣河内時冬寒徒病不能行路過引農輒移属縣使作徒衣縣不得巳與之上書言狀意亦具以聞光武得奏以見覇曰君所使椽何乃仁於用心誠良吏也又曰汝南舊俗十月饗㑹百里内縣皆賫牛酒到府讌飲又曰叚熲對桓帝討先零東羗術略曰三冬兩夏足以破之又曰黄香父兄爲郡五官貧無奴僕香身執勤苦冬無袴而親極滋味魏略曰顔斐字文林爲京兆尹課民當輸租時車各因便致薪兩束爲冬寒冰炙筆硯風化大行又曰賈逵世爲著姓少孤貧冬常無袴又曰吉茂字叔暢從少至長冬則披裘夏則短褐臣役妻子室如懸磬又曰邴原就師學一冬講孝經論語自在齠齓有異及長金玉其行又曰董遇好學人從學遇不肯教曰當先讀書百遍義自見從者云苦難得暇日遇曰當以三餘冬歳之餘夜隂日之餘吴志曰左臺御史孟宗有孝道母性嗜筍及母亡冬節至宗入林哀泣而筍生得以供祭祀晉書曰王敦素憚周顗每見輒靣熱雖復冬月扇靣不得休又曰吴隠之冬月無𬒳常澣衣乃披絮勤苦同於貧庶隱之時爲牧守又曰公孫鳯字子鸞隠昌黎之九城冬夜草布寢處山林彈琴吟詠陶然自得又曰劉殷母王氏盛冬思堇而不言食不飽者一旬矣殷怪而問之母言其故殷時年九歳乃於澤中慟哭聲不絶者半日於是忽若有人云止聲殷收涙視地便有堇生焉因得斛餘而歸宋書曰朱百年與孔凱友善百年家室素貧母以冬月亡衣並無絮自此不衣綿帛甞寒時就凱宿衣悉裌布飲酒眠凱以卧具覆之百年不覺也旣覺引卧具去體謂凱曰綿定竒温因流涕悲慟凱亦爲之傷感也齊書曰沈瑀爲掦州從事湖熟縣方山埭髙峻冬月公私行旅以爲艱明帝使瑀循行乃開四港斷行客就作三日便辦又齊孝子王虚之庭中楊梅樹隆冬三實又每夜所居白光如燭墓左樹㮏一冬再實時人咸以爲孝感所致梁安城王蕭秀爲郢州刺史務行德義毎冬月常作袴𥜗以賜貧凍者又任昉素清貧卒後其子西華冬月著葛帔練裙道逢平原劉孝摽泫然矜之謂曰我當爲卿作計乃著廣絶交論以譏其舊交也吴越春秋曰越王念復吴怨非一旦也苦身勞心夜以接日卧則切之以蓼足漬之以水冬則抱冰韓詩外傳曰冬不浴非惡水清有餘也穆天子傳曰季冬甲戍天子東遊飲于留祁射于麗虎讀書于菞丘君舉必書也菞音犁獻酒于天子奏廣樂天子遺其靈鼓乃化爲黄虵周禮曰靈鼓四靣洪範所謂鼓妖嵇康髙士傳曰善卷古之賢人也舜以天下讓之善巷曰予立宇宙之中冬則衣皮毛夏則衣絺葛何以天下爲哉汝南先賢傳曰周舉爲并州刺史太原一郡舊俗以介子推焚骨有龍忌之禁至其亡月咸言神靈不樂舉火由是土人每至冬中輙一月寒食莫敢煙㸑老少不堪歳多死者舉旣到乃作弔書以置子推之廟言盛冬止火殘損人命非賢者之意以宣示愚民使還温食於是衆惑稍解風俗頗革列士傳曰孟常君食客三千人齊市有乞食馮煖經冬無袴靣有飢色皇甫謐髙士傳曰焦先字孝然冬夏不着衣卧不設席祢衡別傳曰十月朝黄祖於艨衝舟上㑹設黍臛衡年少在坐黍臛至先自飽食畢摶弄戯擲其輕慢如此列仙傳曰丁次都不知何許人爲遼東丁氏作人丁氏甞置葵問曰冬何有葵云從月南買來神仙傳曰王仲都漢中人少修道術元帝時常以隆冬單衣載駟馬車於上林昆明池環水而馳御者狐裘猶寒振欲死而都無變色背上蒸氣休休然休休氣盛皃師覺孝子傳曰王祥少有德行早失母後母憎而譛之祥孝弥謹盛寒河水堅冰網罟不施母欲得生魚祥解褐扣冰求之忽冰小開有雙魚出游祥垂綸而獲之時人謂之至孝所致也宗躬孝子傳曰何子平事母至孝母喪年六十有孺子之慕夏避清涼冬不衣絮盛引之荆州記曰冝都銀山有風穴大數尺名風井夏則風出冬則風入樵人有冬過者置笠穴口風吸之經日還長陽溪而得笠太平御覽卷第二十六
