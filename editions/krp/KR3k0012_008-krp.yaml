body:
  text: 天部八雲霄漢霞雲釋名曰雲猶云云衆盛也說文曰雲大澤之潤氣也又曰雲山川氣也從雨云象回轉形也霠於金反雲覆日也霃音沉渰於檢反雲乆隂也凄雨雲起也雨雲貌也詩云有渰凄凄興雨祁祁易曰雲行雨施品物流形又曰雲從龍風從虎聖人作而萬物覩又曰召雲者龍又曰雲上於天需又曰坎爲雲又曰宻雲不雨自我西郊宻静也雲靜止不加雨渝紂恩澤不加於民也不雨之灾自其君也西郊亦謂文王也詩曰薈兮蔚兮南山朝躋注曰薈蔚雲興貌南山曹南山躋升雲也又曰上天同雲雨雪紛紛又曰英英白雲露彼菅茅英英白雲皃露亦有雲言天地之氣無微不着無不覆養也禮曰天降時雨山川出雲又曰山林川谷丘陵能出雲爲風雨周禮曰保章氏以五色雲物辨吉凶之祲象占視曰旁雲氣青爲䖝白爲䘮赤爲兵荒黒爲水黄爲豊傳曰凡分至啓閉必書雲物爲備故也分謂春秋分至謂冬夏至啓立春夏也陽氣用事爲啓閉立秋冬也隂氣用事爲閉雲五雲也風氣日月星辰也分至啓閉天地之大節隂陽之分也故遂登觀臺望氣以審祅祥變禍亂之氣先見於八節書其雲物之形言其所致務爲之備也又曰魯哀公五年有雲如衆赤鳥夾日以飛三日楚使問周太史太史曰其當王身乎日爲君祅氣守之雲在楚若上禍不及他國也若禜之可移於令尹司馬也王曰除心腹之疾而寘諸股肱何益終不禜孔子曰楚昭王知天道矣不失國冝哉又曰黃帝氏以雲紀官故爲雲師而雲名有景雲之瑞公羊傳曰觸石而出膚寸而合不崇朝而徧雨乎天下者惟㤗山雲爾語曰不義而冨且貴於我如浮雲易通卦驗曰冬至陽雲岀箕如樹木之狀小寒合凍蒼陽雲出氐大寒降雪黑陽雲出心立春青陽雲出房如積水雨水黃陽雲出亢驚蟄赤陽雲出翼春分正陽雲出張如積白鵠清明白陽雲出奎榖雨大陽雲岀張如車蓋立夏常陽雲出觜赤如珠小滿上陽雲岀七星芒種長陽雲岀維夏至少隂雲出如水波小暑雲五色岀大暑隂雲出南赤北蒼正秋濁隂雲岀如赤繒處暑赤雲岀白露黃隂雲出秋分白隂雲出寒露正隂雲岀如冠纓霜降大隂雲出上如羊下如磻石立冬隂雲岀而黒大雪隂雪出而分冬至日謹候見雲送迎從其郷來歲美民和京房易飛候曰凡候雨有黒雲如羣羊奔如飛鳥五日必雨又曰視四方常有大雲五色其下賢人隱也青雲潤澤蔽曰在西北爲舉賢良黃雲如覆車大豐也又曰凡候雨以晦朔弦望有蒼黒雲細雲如杼軸蔽日月五日必雨尚書中候曰堯沉壁於河白雲起迴風摇落又曰周成王舉堯舜禮沉璧于河白雲起而青雲浮至乃有蒼龍負圖臨河也尚書大傳曰舜爲賔客禹爲主人百工相和而歌卿雲于時八風循通卿雲藂䕺注言和氣應也䕺或爲族又曰五岳皆觸石岀雲膚寸而合不崇朝而雨又曰舜時卿雲見於時百工和歌舜歌曰卿雲爛兮糺漫漫或以雲爲岀岫迴薄而難以名狀也禮統曰雲者運氣布恩普博也禮斗威儀曰人君乗水而王其政和平則景雲見也又曰景明也言雲氣光明也又曰周成王治平觀於河青雲浮於河也春秋文耀鈎曰楚有蒼雲如霓圍軫七蟠中有荷斧之人向軫而蹲於是楚唐史畫遺灰而雲滅故曰唐史之䇿上滅蒼雲宋均注曰軫楚分也雲水氣灰火氣畫遺灰故雲滅春秋元命苞曰隂陽聚爲雲春秋說題辭曰雲之爲言運也觸石而起謂之雲含陽而起以精運也春秋合誠圖曰帝堯之母曰慶都生而神異常有黃雲覆上春秋孔演圖曰舜之將興黃雲升於堂又曰湯將興白雲入房白雲金精入湯房也孝經援神契曰王者德至山陵則景雲見又曰天子孝則景雲見史記曰若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂卿雲卿雲喜氣也又曰髙祖過沛擊筑自爲歌曰大風起兮雲飛楊威加海内兮歸故郷安得猛士兮守四方又曰范曽云髙祖之上有雲爲龍虎之形此天子氣也又曰黃帝與蚩尤戰於涿鹿之野常有五色雲氣金枝玉葉正於帝上有花葩疋加反之象因作華蓋漢書郊祀志曰武帝封㤗山夜有光晝有白雲起於封中又曰封㤗山後雲氣成宫闕漢書曰相如作大人賦帝覽之飄飄有凌雲之氣又曰武帝迎汾隂鼎至甘泉宫黃雲蓋其上又曰宣帝祠甘泉有頃紫雲從西北來散於殿前范曄後漢書曰樊英隱於壷山之陽曽有暴風從西方起英謂學者曰成都市火甚盛因含水西向漱之時客有從蜀郡來者云是日大火有黒雲卒從東方起湏臾大雨火滅魏志曰文帝生於沛國譙縣上有雲氣青色而圎蓋終日乃解望氣者以爲至貴人之證非人臣之氣蜀志曰劉備爲兒戯於桑樹下上有雲覆童童如車蓋晉書曰樂廣有風姿衛瓘曰此人若披雲霧而覩青天又曰阮咸性曠逹不拘顔延年五君詠曰仲容青雲器又曰咸和元年雲鬪聲如暴風雨宋書曰大明八年宣太后陵前後數有光及五色雲芳香四滿又五采雲在松上如車蓋又曰孝康建元二年二月乙未日上有雲如錦文光色潤澤又曰丗祖在江州起義建牙軍有紫雲二叚落于身上穆天子傳曰天子觴西王母於瑶池之上王母爲謡曰白雲在天丘陵自出道路悠逺山川間之赤内青謂之矞雲雲二色曰矞亦瑞雲也矞以律反雨雲曰油雲孟子曰油然作雲霈然下雨雪雲曰同雲詩云上天同雲雨雲雰雰同雲謂雲隂竟天同爲一色雲師曰屏翳吕氏春秋曰屏翳曰雨師雲將亦雲之師司馬彪注莊子云雲將雲之主師劉澄之揚州記曰婁縣有馬鞍山天將雨輙有雲起來映此山山出雲應之乃大雨枹朴子玉䇿記曰千歳之龜五色具焉浮於蓮葉之上或在藂蓍之下其上時有白雲風土記曰烏程縣音卞山望氣云有黃氣紫雲大呉故改葬焉王子年拾遺記曰崐崘山有九層從上來一層有雲氣五色從下望之皆有城闕之象又曰崑崙者西方曰須彌山九層其第七層有景雲出以映朝日又曰爛石色紅似肺燒之有香煙聞數百里煙氣昇天則成香雲香雲遍潤則成香雨捜神記曰薊子訓至洛見公卿數十處去後皆白雲起王韶之始興記曰堯山長嶺望之如雲張野廬山記曰有白雲冠帶峯巖呼爲山帶洞冥記曰吉雲之國俗常以雲占吉凶有吉事則滿室五色照人着草木皆成五色露莊子曰廣成子謂黃帝白汝治天下雲氣不待族而雨草木不待黃而落奚足語至道又曰華封人謂堯曰夫聖人鶉居而鷇飲鳥行而無章章𫐠天下有道與物皆昌千歳厭丗去而上仙乗彼白雲至於帝郷抱朴子曰俗有見逰雲西馳而謂月之東行孟子曰油然作雲霈然下雨又曰湯一征自葛始天下從之人望之若大旱之望雲霓淮南子曰周雲之巃力孔反嵸七孔反尞力交反摷土交反彭歩光反薄而爲雨周雲宻也尞摷彭薄藴積之貌又曰伯益作井而龍登玄雲龍在黄泉下恐害及故去又曰山雲蒸柱礎潤又曰八極之雲是雨天下吕氏春秋曰山雲草莾水雲魚鱗旱雲煙火雨雲水氣無不比類其所生以示人又曰至亂之化君相賊其雲狀有若犬馬若白鵠車者遁甲開山圖曰遼東有襄平山多饒鬼目之菜生而有神虎龍虵大魚守之雲氣覆之食之令人不飢榮氏注曰鬼目菜形似魚守芝草常有氣如龍虎虵魚之狀河圖帝通紀曰雲者天地之本也河圖始開曰黃泉之埃上爲黃雲青泉之埃上爲青雲赤泉之埃上爲赤雲白泉之埃上爲白雲玄泉之埃上爲玄雲河圖括地象曰崑崙山出五色雲氣兵書曰有雲如丹虵隨星後大戰殺將又曰韓雲如布趙雲如牛楚雲如日宋雲如車魯雲如馬衛雲如犬周雲如輪秦雲如羙人魏雲如䑕齊雲如絳衣越雲如龍頭蜀雲如囷言當處雲似之又曰雲如雄雉或如雄雞臨城其城必降魏武兵書節要曰孫子稱司雲氣非雲非煙非霧形似禽獸客吉主人忌韋頻秦書曰符堅時有黃雲五色時以爲瑞賜民酺五日黃子發相雨書曰四方有濯魚雲疾者立雨濯魚雲遟者雨少難至江漢雲疾者即日雨洛書曰蒼帝起青雲扶日赤帝起赤雲扶日黃帝起黄雲扶日白帝起白雲扶日軍國占候曰若王子曰有黒雲似一疋布者其國兵起天文要集曰河有黒雲狀似船若一疋布維河不出十日大雨又曰北斗者不欲雲覆之有黒雲覆之天大雨地圖曰望石氣如浮雲其珠玉之精也京房風角要訣曰候雨法有黒雲如一疋帛日中即一日大雨二疋爲二日雨三疋爲三日雨黃帝岐伯經曰岐伯乗絳雲之車駕十二白鹿遊於蓬萊之上徐幹中論曰文王遇姜公於渭陽灼然如披雲見白日孫氏瑞應圖曰景雲者太平之應也一曰非氣非煙五色氛氲謂之慶雲瑞應圖曰矞雲瑞雲也有狀外赤内黃歸藏曰有白雲自蒼梧入大梁論衡曰龍無雲雨不能叅天吳範占候風氣祕訣曰有青雲如雉兎臨城營軍敗走山海經曰符陽之山怪雲所岀陸賈新語曰邪臣之蔽賢猶浮雲之障日月也宋玉髙唐賦叙曰楚襄王與宋玉遊雲夢之臺髙唐之觀上有雲氣須臾之間變化無窮問曰此何氣也玉曰朝雲也昔者先王甞遊髙唐殆而晝寢夢見婦人曰妾巫山之女也爲髙唐之客聞君遊髙唐願薦枕席王因幸之去而辭曰妾在巫山之陽髙丘之岨旦爲朝雲暮爲行雨朝朝暮暮陽臺之下旦朝視之如言故爲立廟號曰朝雲孫卿雲賦曰圎者中䂓方者中矩又曰託地而㳺宇反風而下雨楚詞曰青雲衣兮白電裳又曰冠青雲之崔巍漢武帝秋風辭曰秋風起兮白雲飛司馬相如封禪頌曰自我天覆雲之油油雲行皃魏文帝詩曰西北有浮雲亭亭似車蓋應瑒詩曰清朝浮四海日暮歸故山張孟陽詩曰流波戀舊浦行雲思故山傳玄詩曰浮雲含愁氣悲風坐自嘆又玄歌詩曰青雲徘徊謂我愁又曰雲爲車兮風爲馬玉在山兮蘭在野雲無期兮風有止思心多端誰能理陸機雲賦曰望九畿以逺肆明皇極而永舒蔽陽光於晹谷闇天文於帝居齊濛荒於無極等渾昧於太初又浮雲賦曰若層臺髙觀重樓疊閣或如種首之鬰律乍似塞門之寥廓若靈園之列樹攅寳耀之炳粲金柯分玉葉散龍逸蛟起熊厲虎戰鸞翔鳯翥鴻鶴驚奮成公綏雲賦曰舒則弥綸覆四海卷則消液入無形狎獵鱗次叅差交錯狀崔巍其不安吁可畏而欲落龍伸蠖屈蜿蟬逶迤連翩鳯飛虎轉相隨或繡文錦章衣微要妙綿邈凌虚輕翔縹緲陶潜歸去來曰雲無心而出岫鳥倦飛而知還霄關令尹喜内傳曰當喜在胎之始其母夢絳霄流繞其身有長人謂曰汝咽之旣覺口盈味屋生雙光若日飛流滿堂良乆不知所在枹朴子曰凌厲九霄淮南子曰隂陽爲騶乗雲凌霄與造化俱廣雅曰赤霄常霄氣與造化俱許愼注曰霄其霧雜字詁訓曰霄摩天赤氣也楚辭曰若王喬之乗雲載赤雲而陵青霄楊雄甘泉賦曰騰青霄而軼浮景孫楚鶴賦曰假使此鳥生島崑崙長於丹穴遊遨玄圃縹霄之際左思蜀都賦曰干青霄而透出舒丹氣而爲霞郭璞遊仙詩曰㝷仙萬餘日今乃見子喬振髮戴翠霞解褐披絳霄漢詩曰倬彼雲漢昭回于天倬明也又曰倬彼雲漢爲章于天傳曰昭公四年星孛及漢水祥也賈逵解曰天漢水也或曰天河爾雅曰析木謂之津箕斗之間漢津也郭璞注曰津漢津也箕龍尾斗南斗天漢之津梁大戴禮曰夏小正月七日漢案户漢天河也案户言直南北也孝經援神契曰河者水之伯上應天漢史記天官書曰漢者金之散氣其夲曰水漢星多則多水少則旱孟康曰漢河漢也水生於金也漢書曰項羽封髙帝爲漢王帝不恱蕭何謀曰語曰天漢其稱甚羙願大王王漢撫其民還定三秦天下可圖也搜神記曰謝端少䘮父母爲隣人所養年十七未婚後感天漢中白水素女潜爲其炊以備飲食端後怪而潜候之得見言曰天哀忍孤貧恭順使我相爲守舎今旣見便去留不可博物志曰舊說天河與海通近丗有居海者年年八月有人浮查來甚大徃反不失期此人乃多賫粮乗查去忽忽不覺晝夜奄至一處有城郭居舎望室中多見織婦見一丈夫牽牛渚次飲之驚問此人何由至此此人即問爲何處荅曰君可詣蜀嚴君平此人還問君平君平曰某年某月有客星犯斗牛即此人到天河也枹朴子曰天河從北極分爲兩頭至于南極其一經南中過其一經東井中過河者天之水也隨天而轉入地下過張衡靈憲曰水精爲天漢河圖括地象曰河精上爲天漢三輔黄圖曰始皇都咸陽端門四逹以則紫宫渭水貫都以象天河撗橋南渡以法牽牛物理論曰星者元氣之英水之精也氣發而升精華上浮宛轉隨流名之曰天河一曰雲漢衆星岀焉集林曰昔有一人㝷河源見婦人浣紗以問之曰此天河也乃與一石而歸問嚴君平云此織女支機石也古詩曰河漢清且淺相去詎㡬許盈盈一水間脉脉不得語傳玄擬天問曰七月七日牽牛織女時㑹天河唐宋之間明河篇曰明河可望不可親願得乗槎一問津更將織女支機石還訪成都賣卜人霞漢武内傳曰上元夫人謂西王母曰阿瓊有六甲之術用之可以遊景雲之宫登流霞之堂十洲記曰崑崙山之上有瓊華之室紫翆丹房景雲燭日朱霞九光王子年拾遺曰燕昭王二年海人乗霞舟獻龍膏又曰崑山第八層有五色霞枹朴子曰咀六氣於丹霞楚辭曰漱正陽而含朝霞河圖曰崙崑山有五色水赤水之氣上蒸爲霞而赫然論衡曰河東蒲坂項曼都好道學仙去三年而反家問其狀都曰欲飲食仙人輒飲我以流霞毎飲一柸數日不飢楊雄甘泉賦曰吸青雲之流霞兮飲若木之露英王延壽魯靈光殿賦曰霞駮雲蔚若隂若陽魏文帝辭曰丹霞蔽日彩虹垂天曹子建洛神賦曰逺而望之皎若太陽昇朝霞阮籍清思賦曰厭白玉以爲面霏丹霞以爲裳左思蜀都賦曰舒丹氣而爲霞陸機列仙賦曰即絳闕于朝霞陸機雲賦曰外聚紫霞郭璞江賦曰撫凌波而鳬躍吸翠霞而夭矯孫綽天台山賦曰赤城霞起以建摽張孟陽詩曰朝霞迎白日丹氣臨暘谷郭璞遊仙詩曰朝霞升東山朝日何晃朗嵇含恱晴詩曰朝霞炙瓊林夕影映靈芝太平御覽卷第八
