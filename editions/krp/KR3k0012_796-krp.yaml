  text: 太平御覽卷第七百九十六
  hash: sha256:276f88c0e06f33d1c13976d8868475bcd5cfc7f2235277bbc6a73090677f7e56
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_796-1a}
body:
  text: 四夷部十七西戎五莎車波知栗弋悉居半越底延波路三童蒲山刼國獠丁令且弥陁羅伊羅賖弥澤散女國呼得曹國漕國何國短人小人軒渠温宿朱俱波尉頭滑國姑黙疊伏羅阿鈎羗葱茈羗莎車漢書曰莎車王治莎車城去長安九千九百五十里有鐵山出青玉又曰宣帝時烏孫公主小子万年莎車王愛之莎車王無子死時万年在漢莎車國人計欲自託於漢又欲得公孫心即上書請万年爲莎車王漢許之遣使者奚充國送萬年万年𥘉立暴惡國人不說莎車王弟呼屠微殺万年并漢使者自立爲王約諸國背漢㑹衛侯馮奉丗使送大宛客即以便冝發諸國兵擊殺之更立他昆弟子爲莎車王又曰馮奉丗至宛宛聞其斬莎車王禮之異於他使得其名馬象龍而還焉形如龍帝甚恱下議封奉丗関内侯少府蕭望之以奉丗矯制發諸國兵雖有功効不可以爲後代法若即封奉丗則爲使者利以奉丗爲比爭逐發兵要功萬里之外爲國家生事於夷狄漸不可長不冝授封帝善其議以奉丗爲光禄大夫波知北史曰波知國在鉢和西南土狹人貧依託山谷其王不能揔攝有大池傳曰大池有龍王次者有龍婦小者有龍子行人經之設祭乃得過不祭多值風雪之困栗弋通典曰栗弋後魏通焉在葱嶺西大國一名栗特一名拘夢出名馬牛羊珎菓蒲陶酒其土地水美故也有大禾髙丈餘子如胡豆在安息北五千里附庸小國四百餘城太武帝時遣使朝貢悉居半北史曰悉居半國故西夜國也一名子合其王號子治呼揵在于闐西去代萬二千九百七十里後魏大延𥘉遣使來獻自後不絶越底延通典曰越氐延國隋時聞焉治辛頭河北西北去賖弥國千餘里東北至瓜州五千四百里其婆羅門種類户數萬餘有弓矢刀矟皮甲國法不殺人重罪流輕者杖國無課稅其俗事佛王及庻人剪髮衣錦𫀆不開縫貧者自疊婦人爲髻衣帬衫帔長巾俗清㓗氣候温多稻有羊馬牛鍮石訶梨勒石蜜折皮細疊等波路北史曰波路國在阿鈎羗西北去代一萬三千九百里其地濕熱有蜀馬土平物産國俗與阿鈎羗同三童通典曰三童國在軒渠國西南千里人皆眼有三精珠或有四舌者能爲一種聲亦能俱語常貨多用犀象作金幣率効國王之靣亦効王后之面若丈夫交易則用國王之靣者王死則更鑄蒲山北史曰蒲山國故皮山國也居皮城在于闐南去代一萬二千里其國西南三里有凍凌山後役屬于闐刼國通典曰刼國隋時聞焉在葱嶺中南西與俱賖弥國界接西北至悒怛國去長安萬二千里有户數萬氣候熱有稻麥粟豆羊馬出洛沙青黛婚姻同突厥死亡弃於山谷又曰大唐武德二年遣使貢寳帶金鏁頗梨水精盃各一頗梨四百九十枚大小有差獠魏書曰獠之𥘉也出自梁益之間種類甚多散居山谷略無氏族之別依樹積水以居其上名曰干蘭干蘭大小隨其家之口數往往推一長者爲王父死則子継若中國之黨族也僚王各有鼓角一雙使其子弟自吹擊之好相殺害多仇怨不敢逺行性同禽獸至於忿怒父子不相避唯手有兵刃者先殺之若殺其父走避於外求得一狗以謝其母然後敢歸母得狗謝不復嫌恨若報死心相攻擊必殺而食之平常刼掠責取猪狗而巳親戚比隣指授相賣土兒女哭止便不復追思唯執楯持矛不識弓矢用竹爲簧群聚鼓之以爲音節能爲細布色鮮浄大狗一頭買一生口其俗畏鬼神尤尚淫祀所殺之人美髯髯者剥其面皮籠之於竹及燥號曰鬼鼓舞祀之以求福也北史曰獠者蓋南蠻之別種自漢中逹于卭笮川洞之間所在皆有種類甚多所生男女無名字唯以長㓜次第呼之其丈夫稱阿謩阿叚婦人阿夷阿等之類皆語之次第稱謂也鑄銅爲器大口寛腹名曰銅㸑旣薄且輕易於熟食建國中李勢在蜀諸獠始出巴西渠川廣漢陽安資中攻破郡縣爲益州大患自桓温破蜀之後蜀人東流山險之地多空獠遂挾山傍谷與夏人叅居者頗輸租賦在深山者不爲編户梁益二州歳伐獠以禆潤公私頗藉爲利正始中夏侯道遷舉漢中内附宣武遣尚書邢蠻爲梁益二州刺史以鎮之近夏人者安堵樂業在山谷者不敢爲㓂其後朝廷以梁益二州控攝嶮逺方乃立巴州以統諸獠後以巴酋嚴始欣爲刺史又立隆城鎮所綰獠二十萬户及周文平梁益令在所撫慰然天性暴亂旋致擾動毎歳命隨近州鎮出兵討之獲其生口以充賤隷謂之爲厭獠焉永昌郡傳曰獠民喜食人以爲至珎美不自食其種類也怨仇乃相害食耳能水中潜行行數十里能水底持刀刺捕取魚其人以口嚼食並以鼻飲水死人有棺其葬竪棺埋之丁令丁音㒹令音連後魏書曰丁令在康居北勝兵六萬人隨畜牧依處土出貂䑕皮貚子皮西南去康居界二千里又曰丁令北有馬腦國其人音聲似鴈騖從膝以上至頭人也膝巳下生毛馬腦馬蹄走疾於馬勇徤敢戰且弥北史曰且弥國都天山東臨於大谷在車師北去代一萬五百七十里本役屬車師陁羅伊羅通典曰陁羅伊羅國隋時聞焉在烏蔡國北大雪山坡上縁梯登山接七百梯方到其國賖弥北史曰賖弥國在波知之南山居不信佛法專事諸神亦附嚈噠東有鉢盧勒國路嶮縁鐵鏁而度下不見底後魏熈平中宋雲等使終不能逹澤散通典曰澤散國魏時聞焉屬大秦其治在海中央㝡與安息城谷相近西南詣大秦不知里數女國北史曰女國在葱嶺南其國丗以女爲王姓蘇毗字末羯在位二十年女王夫号曰金聚不知政事國内丈夫唯以征伐爲務山上爲城方五六里人有萬家王居九層之樓侍女數百人五日聽朝復有小女王共知國政其俗婦人輕丈夫而性不妬忌男女皆以彩色塗面一日中或數度變改之皆披髮以皮爲鞋課稅無常氣候多寒以射獵爲業出鍮石朱砂麝香犛牛騘馬蜀馬猶多塩恒將塩向天笁興販其利數倍亦數與天笁党項戰争其女王死國中厚歛金錢求死者族之中賢女二人一爲女王次爲小王貴人死剥皮以金屑和骨内置瓶中埋之經一年又以其皮内䥫器埋之俗事阿修羅神又有樹神歳𥘉以人祭或用猕猴祭呼得通典曰呼得魏時聞焉在葱嶺北烏孫西北康居東北勝兵萬餘人隨畜牧出名馬多貂䑕曹國北史曰曹國都郍蜜水南數里舊是康居之地也國無主康國王令子烏建領之都城方三里勝兵千餘人國中有得悉神自西海以東諸國並事之其神有金人馬金波羅闊丈有五尺髙下相稱毎月以駞五頭馬十疋羊一百口祭之南去康國百里大業中遣使貢方物漕國北史曰漕國在葱嶺之北漢時罽賔國也其王姓昭武字順逹康國王之宗族也都城方四里勝兵萬餘人國法嚴峻俗重淫祠葱嶺山順天神者儀制極華以金爲屋以銀爲地祠者曰有千餘人祠前有一魚骨其孔中通馬出入國王戴金牛頭冠坐金烏座土多稻粟豆麥饒象馬封牛金銀􅣱鐵氍㲣朱砂青黛安息青木等香黒塩阿魏東去刼國七百里大業中遣使貢方物何國隋書曰何國都郍宻水南數里舊是康居地也其王姓昭武亦康國王之族類都城方二里勝兵千人其王坐金羊床東去曹國百五十里西去安國三百里大業中遣使貢方物短人通典曰短人魏時聞焉在康居西北男女皆長三尺人衆甚多去奄蔡諸國甚逺康居長老傳聞嘗有啇旅行北方迷惑失道而到此國國中甚多真珠夜光明月珠其國去康居可萬餘里突厥本末記云自突厥北行一月有短人國長者不踰三尺亦有二尺者頭少毛髮若羊胞之狀突厥呼爲羊胞頭其傍無它種類相侵俗無㓂盗但有大鳥髙七八尺恒祠短人啄而食之短人皆持弓矢以爲之備按此亦在西北即魏略之短人國也小人通典曰小人在秦之南軀纔三尺其耕稼之時懼鵠所食大秦之南毎衛助之小人竭其珎貨以酬報軒渠通典曰軒渠國多九色鳥青口緑頸紫翼紅膺紺頂丹足碧身緗背玄尾亦名九尾鳥亦名錦鳯其青多紅少謂之繡鸞恒從弱水西來或云是西王母之禽也其國幣貨同三童國温宿北史曰温宿國居温宿城在姑黙西北去代一萬五百五十里朱俱波通典曰朱俱國後魏時通焉亦名朱居槃國漢子合國也今并有西夜蒲犁依耐德若四國之地在於闐國西千餘里其西至葱嶺二百里其王渇槃國南至女國三千里北至踈勒九百里南至葱嶺二百里其王本䟽勒國人後魏宣武永平中朱居槃國遣使朝貢其言音與于闐相似其間小異人貌多同華夏亦類踈勒大唐武德以後頻遣使朝貢尉頭北史曰尉頭國居尉頭城在温宿北去代一萬六百五十里滑國通典曰滑國車師之別種後漢順帝永建𥘉八滑從班勇擊北虜有功漢以八滑爲後部親漢侯自魏晉以來不通中國至梁武帝普通𥘉其王厭帶夷粟陁始遣使献黄師子白貂裘波斯錦物等後魏之居桑乾也滑猶小國屬蠕蠕後稍強大征其傍國波斯渇槃罽賔龜兹踈勒姑墨于闐等國焉其獸有師子兩脚駞人皆善騎射着小䄂長身𫀆用金王爲帶女人𬒳裘頭上刻木爲角長咫尺以金銀飾之兄弟共妻無城以氈屋爲居東向開户其王金床隨太歳轉無文字以木爲契與旁國通用胡書羊皮爲紙無職官事天神火神毎曰出祀神而後食其跪一拜而止死以木爲槨父母死其子截一耳葬訖即吉其言語待譯然後通至後魏時謂之嚈噠國或云髙車之别種或云大月氐之種其源出於塞北自金山至後魏文帝時巳八九十年矣在于闐之西東去長安萬一千里衣服類胡加以纓絡頭皆剪髮其語與蠕蠕髙車及諸諸胡不同部衆可十萬依隨水草其國無車輿多駞馬用刑嚴急盗無多少皆腰斬盗一責十死者冨家累石爲藏貧事者掘地而埋隨身諸物皆置塚内又兄弟共聚一妻無兄弟者其妻戴一角帽若有兄弟者依其多少之數更加帽角焉西城康居于闐沙勒安息及諸小國三十許皆役屬之号爲大國毎遣使朝貢孝明帝熈明中遣使伏子統宋雲使西域所經諸國不能知其本末及山川里數今舉其略云至隋時又謂挹怛國都烏滸水南二百餘里大月氐之種類也勝兵五六萬人俗善戰先時國亂突厥遣通設字誥強領其國俗同吐火羅南去漕國千五百里東去瓜州六千五百里大業中遣使來貢按劉璠梁典滑國姓嚈逹後裔以姓爲國号轉訛又謂之悒怛焉姑黙北史曰姑黙國居南城在龜兹西去代一萬五百里疊伏羅通典曰疊伏羅後魏時通焉去代三萬一千里國中有勿悉城城北有壃竒水西流有白象土冝五榖宣武時遣使獻方物阿鈎羗通典曰阿鈎羗後魏時通焉在莎車西南國西有縣度山其間四百里中往往有棧道下臨不測之深人行以䋲索相持而度山有五糓諸菓市用錢爲貨居止立宫室有兵器葱茈羗茈音紫通典曰燉煌西西城之南山中從婼羗西至葱嶺數千里有月氐餘種日葱茈羗白馬羗黄牛羗各有酋豪北與諸國接不知其道里廣狹傳聞黄牛羗種類孕身六月生南與白馬羗隣並魏時聞焉太平御覽卷第七百九十六
