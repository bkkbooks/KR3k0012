  text: 太平御覽卷第七百七十七
  hash: sha256:4dc761a6a76bb86301e92e72a65dbdbf8ffe26b8aafb9bc6bc6b7bcf900ee02b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_777-1a}
body:
  text: 奉使部一奉使上周禮小行人曰使適四方恊九儀賔客之禮朝覲宗遇㑹同君之禮也存覜省聘問臣之禮也又掌邦國之禮籍以待四方之使者凢四方之使者大客則擯小客則受其弊而聽其辤凡使爲旌節禮曰凢爲君使者己受命君言不宿於家君言至則主人出拜君言之辱使者歸則必拜送於門外又若使人於君所則必朝服而命之使者反則必下堂而受命也詩曰四牡勞使臣之來也有功而見知則說矣四牡騑騑周道逶遟豈不懷歸王事靡盬我心傷悲又曰皇皇者華君遣使臣也送之以禮樂言遠而有光華也皇皇者華于彼原隰駪駪征夫毎懹靡及左傳曰齊使仲孫湫來省難仲孫歸曰不玄慶父魯難未已公曰若之何而去之對曰難不己將自斃君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以爲夲也臣聞之國將亡夲必先顛而后枝葉從之魯不弃周禮未可動也君其務寧魯難而親有禮因重固能重固者因而成之間携貳覆昏亂霸王之器也又曰齊孝公伐我北鄙公使展喜犒師使受命于展禽栁下惠也齊侯未入境展喜從之曰寡君聞君親舉玉趾將辱弊邑使下臣犒執事又曰晉侯及秦伯圍鄭以其無禮於晉且貳於楚也晉軍凾陵秦軍汜南佚之孤言於鄭伯曰國危矣若使燭之武見秦君師必退公從之又文下曰秦伯使西乞術來聘且言將伐晉襄仲辭王曰君不忘先君之好照臨魯國鎮撫其社稷重之以大噐寡君敢辭玉賔荅曰不腆先君之敝噐而使下臣結二國之好是以敢致之襄仲曰不有君子其能國乎國無陋矣厚賂之又宣十五年曰楚子圍宋宋人使樂嬰齊告急于晉晉侯使解楊如宋使無降楚曰晋師悉起將至矣鄭人囚之而獻於楚楚子厚賂之使反其言不許三而許之登諸樓車使呼宋人而告之遂致君命楚子將殺之使與之言曰爾旣許不榖而反之何故非我無信汝則棄之速即爾刑對曰臣聞之君能制命爲義臣能承命爲信信載義而行之爲利謀不失利以衛社稷民之主也義無二信信無二命義不行两信不受二命也君之賂臣不知命也奉命以出有死無霣音殞又可賂乎臣之許君以成命也成其君命也死而成命臣之禄也寡君有信臣矣下臣獲考死又何求楚子舎之以歸考城又曰晉侯使郄克徴㑹于齊齊頃公惟婦人使觀之郄子登婦人笑於房獻子怒出而誓曰所不此報無能涉河郄克請伐齊晉侯弗許至成公三年衛孫桓子臧宣叔亦乞師以伐齊晉侯許之又曰齊叔老爲季武子介自是晉人輕魯弊而益敬其使又曰呉公子札來聘見叔孫穆子說之謂穆子曰子其不得死乎好善而不能擇人吾聞君子務在擇人吾子爲魯宗卿而任其大政不慎所舉何以堪之禍必及子聘于齊說晏平仲謂之曰子速納邑與政無邑無政乃免於難齊國之政將有所歸未獲所歸難未歇也故晏子因陳桓子以納政與邑是以免於欒髙之難難在昭八年聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉大帶也吴地貴縞鄭地貴紵故各獻己所貴示損己而不爲𬒳貨利謂子産曰鄭之執政侈難將至矣政必及子爲政慎以禮不然鄭國必敗敗謂伯有也又曰韓宣于如楚送女叔向爲介鄭子皮子太叔勞諸索氏太叔謂叔向曰楚王汰侈己甚子其戒之叔向曰汰侈己甚身之災也焉能及人若奉吾幣帛愼吾威儀守之以信行之以禮敬始而思終終無不復行而不失儀敬而不失禮導之以訓詞奉之以舊法考之以先王度之以二國雖汰侈若我何又曰費楚無極譛太子建王使城父司馬奮楊殺太子建未至而使遣之太子奔宋王召奮楊使城父人執己以至王曰言出於余口入於耳爾誰告建也對曰臣告之君王命臣也事建如事余臣不佞不能苟貳奉𥘉以還不忍後命故遣之旣而悔之亦無及也己王曰而敢來何也對曰使而失命召而不來是再姧也逃無所入王曰歸從政如他日姧犯也論語曰使於四方不辱君命可謂士矣又曰蘧伯玉使人於孔子孔子與之坐而問焉曰夫子欲寡其過而未能也使者出子曰使乎使乎史記曰呉季札之爲使北過徐君徐君𥘉好札劒口雖弗言季札知之爲使上國未獻還至徐君徐君巳死乃解其寳劒繫徐君塜樹而去從者曰徐君己死當誰與乎曰不然始吾心己許之豈以死背吾心哉又曰趙平原君使人於春申君趙使欲夸楚爲瑇瑁簮刀劒室悉以珠飾之春申君三千餘人上客皆鑷珠履以見趙使大慙又曰陸賈楚人以客從髙祖定天下名爲有口辨士居左右常使諸侯時中國𥘉定尉佗平南越因王之髙祖使賈賜佗印爲南越王佗魋結箕倨見賈賈因說佗曰足下欲以區區之越與天子杭衡爲敵國禍且及身矣佗廼蹶然起㘴謝賈曰生長蠻夷中乆殊失禮義因問賈曰我與蕭何曹叅韓信孰賢賈曰王似賢之復問曰我與皇帝孰賢賈曰皇帝起豐沛討暴秦誅強楚爲天下興利除害繼五帝三王之業統理中國中國之人以億計地方萬里居天下之膏腴人衆車轝萬物殷冨政由一家自天地剖判未始有也今王衆不過數十萬皆蠻夷﨑嶇山海間譬若漢一郡王何乃比於漢佗笑曰吾不起中國故王此使我居中國何遽不若漢廼大說至孝文帝元年詔丞相陳平舉可使南越者平言陸賈先帝時曽使南越乃召爲太中大夫徃使因讓佗自立爲帝賈至南越王甚怒爲書謝於是乃下令國中曰吾聞兩雄不俱立兩賢不並丗皇帝賢天子也自今己後去帝制黄屋左纛賈還報文帝大恱又曰汲黯爲謁者東越相攻上使黯徃視之不至至呉而還報曰越人相攻固其俗不足以辱天子之使河内失火燒千餘家上使黯徃視之還報曰家人失火屋比延燒不足憂也臣過河南貧人傷水旱萬餘家或父子相食臣謹以便冝持節發河南倉粟以賑貧民臣請歸節伏矯制之罪上賢而釋之又曰司馬相如爲郎數歲㑹唐蒙使略通夜郎西𤏡中發巴蜀吏卒千人郡又多爲發轉漕萬餘人用興法誅其渠而巴蜀民大驚恐上聞之乃使相如責唐蒙等因喻告巴蜀民以非上意還報天子乃拜相如爲中郎將建節持四乗之傳因巴蜀弊物以賂西夷至蜀太守以下郊迎縣令負弩矢先驅蜀人以爲寵於是卓王孫臨卭諸公皆因門下而獻牛酒又曰淳于髠者齊之贅壻也壻也者女之夫比於子餘剩故曰贅壻長不满七尺滑稽音骨乱也稽者同也多辨數使諸侯未嘗詘辱威王八年楚大發兵加齊齊王使淳于髠之趙請兵賫金百斤馬千駟淳于髠仰天大笑冠纓索絶王曰先生少之乎髠曰何敢王曰先生笑豈有說乎髠曰今者臣從東來見道旁有穰田者操一肫蹄酒一盃而呪曰甌寠滿篝篝籠也音構甌寠猶柸樓也言豊年菜樹易可满篝汚耶滿車行耶下地田也則下地田之中有薪菜可满車也五糓蕃熟穰穰满家臣見所持者狹而欲者大奢笑於是齊王乃益賫黄金千鎰白璧十雙車馬百駟髠辭而行至趙趙與之精兵十萬革車千乗楚聞之夜引兵而去威王大恱漢書曰漢王曰孰能爲我使淮南使之發兵背楚留項王於齊數月我之取天下可萬全隨何曰臣請使之乃與二十人俱使淮南至太宰主之淮南太宰作内主也三日不得見隨何因說太宰曰王之不見何必以楚爲強以漢爲弱使何得見言之而是耶是大王所欲聞言之而非耶使何等二十人伏斧質淮南市以明背漢而與楚也太宰乃言之王王見之隨何說淮南王王曰請奉命隂許叛楚與漢未敢泄楚使者在方急責布發兵隨何直入曰九江王歸漢楚何以得發兵布驚曰何至是楚使者岀何曰事己搆可殺楚使無使歸而疾走漢併力布從之遂歸漢又曰張騫漢中人建元中爲郎時匈奴降者言匈奴破月支氏擒其王以其頭爲飲器月支遁而怨匈奴無與共擊之漢方欲滅胡聞之乃募使者騫應募與堂邑氏奴甘父俱徃匈奴不聽去乃留騫十餘歲娶胡妻有子然騫持漢節不失居匈奴西騫因與其屬亡嚮月氏西走數十日至大宛後單于死國亂騫與胡妻及堂邑父俱亡歸漢拜騫太中大夫騫爲人寛信蠻夷愛之騫曰臣在大夏時見卭竹杖蜀布問安得此國人曰吾賈人往市之身毒國一名天竺國在大夏東南數千里人乗象以戰臣度大夏去漢萬二千里有蜀物其去蜀不逺矣於是漢復事西南夷騫從大將軍擊匈奴嘗諳知水草處軍湏不乏封博望侯又曰張騫使至安息王令將二萬騎迎於東界東界至王都數千里北至王都過數十城人民相屬甚衆使還即發使來隨欲觀漢廣大以大鳥卵㴝軒善眩人献於漢及宛西小國皆隨漢使獻見天子又曰傳介子昭帝使通西域樓蘭嘗邀漢使殺之後使介子往而讓衣旋謂将軍霍光曰彼王反覆不誅無以懲其惡臣嘗遇之近人易就耳願旦徃刺之以示諸國光曰可矣遂奏介子行具卒乗賷重幣揚言賜外國而志在樓蘭樓蘭王意不親介子介子陽引去至其西界使譯者謂王曰漢使持重寳行賜諸國王不來我之西矣即出金幣以示譯譯者還報王王貪漢物來見介子與坐飲陳物示之飲酒皆醉介子謂王曰天子使我私報王王隨介子入帳中屏語壯士二人從後刺之刃交胷立死其貴人左右皆散走介子告諭以王負漢罪天子遣我來誅王當更立前太子質在漢者爲王漢兵方至無得輙動動則滅國矣遂持王首而還詣闕朝廷嘉之封介子爲義陽侯食邑七百户又曰蘇武字子卿建次子也少以父任爲郎中武帝遣以爲中郞將使持節送匈奴使留在漢者武與副中郎將張勝友假吏常惠等募士斥堠百餘人俱旣至匈奴致幣遺單于單于益驕非漢所望也方欲發使送武等㑹緱王與長水虞常等謀反匈奴中緱王是昆耶王姊子與昆耶王俱降漢後隨浞野侯沒胡中及衛律所將降者隂相與謀刼單于母閼氏歸漢㑹武等至匈奴虞常在漢時素與張勝善私候勝曰聞漢天子甚怨衛律常能爲漢伏弩射殺之吾母與弟在漢幸蒙爵賞張勝許之事敗單于怒欲殺漢使左伊秩訾曰冝皆降之單于使衛律召武受辭武謂常惠曰屈節辱命雖生何面目以歸漢乃引佩刀自刺衛律大驚召醫瘡單于乃鑿地爲坎置煴火覆武其上蹈其背以出血氣絶半日復息惠勝等號哭單于壯其節朝夕遣人候問武愈單于逾欲降之武不能屈乃幽武大窖中絶食天雨雪武卧囓雪與氊毛并咽之數日不死匈奴以爲神乃徙武北海令牧羊不得食掘野䑕去草實食之杖漢節旄盡落積五六年昭帝即位與匈奴和親求武匈奴紿言死後漢使復至匈奴常惠請其守者夜見漢使教使謂單于曰天子射上林中得鴈足有係帛書具言武在北海大澤中牧羊使者如惠語以讓單于單于視左右大驚謝漢使曰武等實在乃召武相隨官屬等九人歸漢武以元始六年春至京師拜典屬國常惠等皆爲郎又曰鄭吉㑹稽人累遷衛司馬神爵中日逐王亂匈奴欲降漢使人與吉相聞於是漢使吉迎之日逐王并口萬二二千隨吉至河曲遂將詣京師吉旣破車師降曰逐王威震西城遂護車師以西故號都護都護之置自吉始焉又曰陳湯爲人沉勇有大慮多謀䇿喜竒功所過城邑山川常登望逺以觀形勢常患位卑權輕不决匈臆之謀時西方郅支單于常殺漢使侵撗諸國朝廷患之谷吉上書願徃諭王遇害乃遣湯與甘延壽使于西域陽謂延壽曰郅支單于結怨諸夷屈辱漢使朝廷患之乆矣雖然蠻夷無金城湯池之固堅弩之噐恩義不行彼可取也若舉屯田吏士并發烏孫兵直抵城下彼亡無所保千載之功可致也延壽然之請奏湯曰不可不如矯詔而發之延壽不從㑹延壽疾卧湯因矯制發城郭諸國兵胡漢四萬餘騎置官吏而發也己行延壽聞而驚起止之湯按劒叱之曰大衆己集竪子胡敢沮衆耶乃上䟽自劾矯制之狀因分兵葱領赤谷兩道鼓行而西去單于城三十里止而營單于恠之使人問之曰漢兵何來湯曰見單于亡國夲屈意康居故來護單于耳單干不知意旨猶豫無備因夜進兵圍城遟明㧞之斬郅支單于以歸又曰盖寛饒字次公魏郡人也明經爲郡文學以孝廉爲郎舉方正對䇿髙第遷諌議大夫寛饒爲衛司馬有厚徳宣帝嘉之以寛饒爲太中大夫使行風俗多所稱舉貶黜奉使稱旨擢爲司隷校尉刺舉無所廻避小大輙舉所劾奏衆多廷尉處其法半用半不用以其峻刻故有不用者公卿貴戚及郡國吏繇使至長安皆恐懼莫敢犯禁京師爲之清平又曰終軍從濟南當詣博士歩入關關吏予軍繻軍問以此何爲吏曰爲復傳還當以合符軍曰大丈夫西遊終不復傳還弃繻而去軍後爲謁者使行郡國建節東出關關吏識之曰此使者廼前弃繻生也軍行郡國所見便冝以聞還奏事上甚恱太平御覧卷第七百七十七
