  text: 太平御覧卷第四百一十四
  hash: sha256:b046e62ed3063d281c7fc63a0761373bdba41805fe27304eca0e4a31fdf4d2b1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_414-1a}
body:
  text: 人事部五十五孝下禄養孝下汝南先賢傳曰薛苞字孟甞西平人好學篤行喪母以至孝聞父娶後妻而憎苞分之岀宅苞日夜泣不能去𬒳歐杖不得已廬於外旦入洒掃父怒又逐之乃廬於里門晨昏不廢積歳餘父母慙而還之後行六年䘮䘮過于哀旣而弟子求分異居苞不能止乃中分其財奴婢引其老者曰與我共事乆居不能使也田廬取其荒者曰吾少時所治意所戀也器物取杇敗者曰我素所服食身口所安弟子數破其産續復賑給又曰李篤字君淵汝南上蔡人家貧夜賃冩書爲母買肉一斤梁米一升妻子茹菜有室無蕃又曰周盤字堅伯安成人江夏都尉遺腹子也居貧約而養母儉薄誦詩至汝墳末章慨然而歎又曰李鴻字太孫上蔡人閨門孝友弟仲爲從父非報讎繫獄鴻便割髮詣縣通記乞代弟即自殺仲得减死子先亦以孝稱父喪甞於牀間得父亂髮投而狂走號叫躃踴先後坐事當刑詔以鴻先義孝一切减死又曰殷燀音闡字子徵上蔡人生而有謹愿之性其有襁負母育之不勞少歳出得瓜果可食之物輙進與其母未甞先食郭林宗別傳曰茅容字季偉陳留人年四十餘耕於野時與等輩避雨樹下衆皆夷倨容獨危坐惟林宗見而竒異與共言因請寓宿旦日容煞雞爲饌林宗爲已誤旣而以供其母自以菜𬞞與容同飯林宗起拜之曰卿賢乎哉因勸令學卒以成德師覺授李子傳曰趙狗㓜有孝性年五六歳時得甘美之物未常敢獨食必先以哺父岀輙待還而後食過時不還則倚門啼以候父至數年父没狗思慕羸悴不兾成人哭泣哀號居於塚側郷族嗟稱名聞流著漢安帝時官至侍中周斐汝南先賢傳曰蔡順字君仲有至孝之心少喪父奉養母甘口之物不敢先甞母至婚家因飲酒變吐順恐中毒乃甞其吐母生瘡岀膿以口嗽之海内先賢傳曰陳寔之子故大鴻臚紀字元方紀至德絶俗才逹過人烝烝色養不離左右豫州刺史嘉其至行表上尚書畫像百城以厲風俗焉孫盛逸人傳曰丁蘭者河内人也少喪考妣不及供養乃刻木爲人髣髴親形事之若生朝夕定省後鄰人張叔妻從蘭妻借看蘭妻跪投木人木人不恱不以借之叔醉疾來酣罵木人杖敲其頭蘭還見木人色不懌乃問其妻具以告之即奮劒殺張叔吏捕蘭蘭辝木人去木人見蘭爲之垂淚郡縣嘉其至孝通於神明圖其形像於雲臺也孝子傳曰蔡邕性純孝母常帶病三年邕自非寒暑變節未甞解襟帶不寢寐者七旬又曰鮑得小子曰昴至孝過人𥘉得疾經渉數年常俯伏左右衣不解帶又蕭廣濟孝子傳曰施延字君子少盡色養之道赤眉之際將母到吴郡海塩賃爲半路亭毎取卒月直以供養督郵馮敷知其賢與飲食論道餉錢並不受王烈之安成記曰縣有孝子符表以孝聞天下年十六其母姜氏有疾侍省晝夜數十日母一食表亦一食母不食表亦不食見母將絶至性感咽而至於殯俄頃母父亦沒一日二䘮在殯葬於四望岡太守王府君樹雙土闕以表其墓唐新語曰劉審禮儀鳯中爲工部尚書時吐蕃入宼命審禮率兵十八萬與吐蕃將論欽陵戰于青海王師敗績審禮沒焉諸子詣闕自拘請入蕃以贖其父詔許之次子歧州司兵易從徃蕃中省侍比至而審禮巳卒易從晝夜泣血吐蕃哀其志性還其父屍易從跣足萬里護櫬㱕葬於彭城故塋朝廷嘉之贈兵部尚書謚曰僖審禮刑部尚書德威之子也少喪母爲祖母所養祖母元氏有疾審禮親甞藥膳及事繼母亦以孝聞與再從兄弟同居家無異㸑闔門二百餘口人無間言易從後爲彭州長史爲周興所䧟將刑百姓荷其仁恩􅔡解衣投于地曰爲長史祈福有司平準直千餘萬易從一門仁孝而撗遇冤酷海内痛之子昇年十餘歳配流嶺表後六道使誅流人昇以言行忠信爲首領所保持僅而獲免又曰長孫從直趙公無忌之玄孫年二十餘父元適爲延州膚施令從直隨之官膚施近邊多蕃部落徃徃刼掠城邑前後不能制元適𥘉至果遇蕃騎數十刼掠縣下元適所從人吏二百人追之及於近郊賊皆歇鞍解甲元適攻之而所將人吏無甲反爲所敗從者皆走還元適猶與戰遂爲所執縛之於樹將加屠戮從直聞之遂跣至父所不懼鋒刃以身蔽父群賊集矢射之身如蝟毛又中數十刃體無完處從直死之而州兵大至父乃免國史𥙷曰杜羔有至性其父爲河北一尉而卒母非嫡經亂不知所之羔常抱終身之戚㑹兄爲澤潞判官常鞫獄於私第有老婦辨對見羔時出入竊謂人曰此少年狀類吾夫語問之乃羔母也自此迎侍而㱕又徃求先人之墓邑中故老已盡不知所詢館於佛寺日夜悲泣忽視屋柱煙煤之下見字數行拂而視之乃其父遺迹言我子孫若求吾墓當於某村某家問之羔號泣而徃果有老父八十餘指其丘壠因得㱕葬羔官至工部尚書致仕朝野僉載曰蘇頲爲中書舎人父右僕射瓌卒頲哀毀過禮有敕起復頲表固辭不起上使黄門侍郎李日知就宅喻旨終坐無言乃奏曰臣見瘠病嬴瘦殆不勝哀臣不忍言恐其殞絶上惻然不之逼也故時人語曰蘇瓌有子李嶠無兒語録曰韋温文宗朝欲以爲翰林學士韋以先父遺命懇辭上後謂次對官日韋温朕每欲用之皆辭訴又安用韋温聲色俱厲户部侍郎崔蠡進曰韋温禀其父遺命耳上曰温父不令其子在翰林是亂命也豈謂之理乎崔曰凢人子能遵理命已是至孝况能禀亂命而不改者此則尢可嘉之陛下不可怪也上曰然乃止又曰路隋年在齠齓䘮其父至十許歳其母問曰識爾父否隋嗚咽無言不識也母曰只爾一面隋後殞絶以至成人終身不攬鏡加以至行純古士大夫推之朱崖慕其德以愛女適隋之子李太尉家有路郞隋之子也官至當州守生資唯有琴十張史係曰盧昭美字子明范陽人五歳念孝經論語與童輩爲師事之禮至於父母字坐則起而言母劉因徃兄之家飲酒㱕夜連吐昭美憂形于色取其吐甞之或詰其故昭美對曰母自外食寕不知其毒邪行超撫而歎曰盧氏之家有曽子矣時同里大稱河東裴安特異之比昭美於蔡順過之母卒父蚤亡家貧無以葬殯訖乃傭爲無極酒家保得月資學女弟令備奠祭酒家怪其衣服藍縷得直不以時價古鬻字責之昭美且以情對言發涕泗從撗酒嫗爲之咄嗟輟食謂其四子曰我爲乃家婦生不貧矣又幸不以若父鎡錤上音兹下音其鋤也方成衣食而日日意錢顧乃家財充若費乎我卒若必不如此月傭摧辱爲母也四子俯伏母盡以縁身衣𬒳釵釧與昭美令葬其母赦其傭免之昭美歸悉以營奉母祔焉又計其祥禫所費市之餘金復齎還酒嫗其妻欲止之奚不留爲給家財盡復爲傭兒乎昭美恕欲出其妻其兄深勸止之然雖同室終不面焉妻亦悔過發憤而卒又曰孟元方字弘規東平鉅野人八歳聦悟過人父友南陽鄧恪來省㑹其父出遊鄰縣母命元方接對恪見群犬互噪戲元方曰郞子姓孟近犬心猛爲余叱之元方曰尊客之前不叱狗悟曰小兒解書語元方曰鄧老樹村中來真田舎則不知書恪大慙後至父來謂之曰爲孺子所辱頼無人見元方應曰子見父知豈無人乎年十八明經擢第父母相次而卒元方五十日未甞有笑容唯以讀書爲業頌詩至􅖋莪篇必哀咽號咷情慕不已則必徑徃冢所抱樹而哭或日暮則止拪栢庭亦無恐懼之色㑹昌末有盗發其塚而元方在河内夜夢告之徃到鉅野修奉畢捕其盗手殺以祭而郷里以爲元方殺人鉅野令收捕之搒音彭又甫孟切掠無一辭盗塜家愈稱冤移獄及郡將按致其罪㑹賊家鬻物於市爲他塜家所識又擒其弟焉太守然後知元方無罪赦之而責其令或問元方曰何不自明元方曰手殺之何故自明後終于家又曰毛摽字表玄宣城漂水人少八歳潁悟異於衆子日誦五百言母鍾氏連年病疾摽日夜祗奉諸兄悉寢唯摽在母床側隨呻吟之聲至于枕前衣不解帶蓬頭垢面畿虱盈身曽不搔視親戚大嗟異迎名醫嚴顒與母侯脉才言不濟摽號哭頓地顒佯言可救郞中善祗奉顒退而告曰嗟乎此子孝德若是而親疾不可救天道奚處嗟歎良乆翌日母終摽伏母手號哭不食三日家人倉卒之際遺燭致焚舉家岀避火唯摽抱其柩涕泣火爲之飛去鄰舎柩得免莫不異之將葬摽嬴瘠杖不能起扶持方行猶蹈雪跣歩四十里太守命縣宰就視致粟帛給遺及摽病革誡其子貞曰吾以家門修飾遂及於此吾生無益於人死固不害於人唯冝薄葬止於周身貞奉其教行之郷里稱焉又曰夏侯珮字儀玉譙郡人三歳而孤養於丗母崔氏九歳孝謹過人同祖兄弟皆虧失於崔崔撫珮歎息而泣曰若三歳䘮母而我養汝若孝於我過於我生諸曹百歳後若善爲我殯焉珮涕泣不勝方知㓜失父母因日夜涕泣問母封樹崔引至其城珮慟哭而絶崔遽救之抱而歸再慟猶謂在塚畔年十九歳崔亡若喪其母崔氏之數子皆不終喪制飲酒食肉而珮最孤㓜群兄咸惡之或夜相聚携持珮釂以酒㗖以肉珮入而復吐數四群兄笑以爲樂珮涕泣不自勝皆曰僧兒強而復吐猶爲悲珮曰誠感鞠育之恩得遂庶幾終天之報所以不覺沾襟因大哭群兄忍人也皆爲之流涕毎禘甞之禮於丗母神座别致敬焉年二十五卒于家里人謂其封爲夏侯孝子之墓又曰盧操字安節河東人㓜勤學九歳通孝經論語隨義解釋黌音撗中父老謂之聦明兒事繼母張氏以孝聞張有三子而操同産二人張氏厚於三子命操常執勤主炊爲三子設席操弟多以疾辭卧舎不出而操服勤不以勞倦張誨其子讀書咸以驕志三人毎出張命操隨驢以摧之操執鞭引繩如僮僕三子復謂曰隨驢何如我讀書操曰不讀書所以逐驢後三子嗜酒佚蕩不敢抵忤於人或至及門詬詈詞及母氏而操爲涕泣拜而解之惡少年咸曰不謂三賊有令弟某無故及長者門羅拜操而去繼母終其二子已亡而操訓飬踰於未亡日哀毀過禮廬於墓側毎夕有狐狸羅列散於廬左右欲且而去者三年時人以操在野野獸爲之衛侍非孝感通於神明其孰能逮於此服闋明經擢第歸上塚盡以報揚名之義里巷榮之調爲臨渙縣尉毗佐以寛仁吏民至今稱焉操以官舎都屋尊老所處不敢寧居唯西廡而已都屋設几筵神座祀之出必告反必面過其庭鞫躬如也入門㳟謹其家居常若奉尊者無大噱咄責之音同寮服之操每旦具冠帶搢紳讀孝經一篇然後視事忌日則増其數讀至喪親章號咽不勝哀追感之心如新丁故操子昭有文名於丗次子雲恭謹有父風髙尚好學又曰劉師貞字文通彭城人也蚤失其母及長不記容狀哀慕之心不拘月制至忌辰終日涕泣未甞寢食忽夢見其狀謂之曰我乃母也若孝通神明故我得建乃處師貞夢中大哭多覺哀號逾甚乃作偶人象以事之朝夕起居反告如常毎薦親新然後食時人語曰孝於何通幽明漢有丁蘭唐有師貞父福年老患目師貞朝夕膳食非手則福自去始飲鴆志在必死岑然覺毒㳂五内至支節其痛愈於鑚灼摩頂旋踵不可名狀天隂則又甚焉􅪊其䏶及足脛色皆如墨有傍攻出六膿液紫瘀臭敗逆搶人鼻逹數十歩外唯食啖無减始知何遜之好不誣矣自降除壽春竟終天年七十有六禄養韓詩外傳曰曽子曰吾甞仕爲吏禄不過鍾釡猶欣欣而喜者非爲多也樂其養親也親没之後吾甞南遊於楚得尊官焉堂髙九仞榱題三尺數轂百乗然猶北向而泣涕者非爲賤也悲不見吾親家語曰子路見孔子曰負重致逺不擇地而行家貧親老不擇禄而仕後漢書曰廬江毛義有孝行南陽張奉慕其名徃候之坐定而府撽至義捧撽而入喜動顔色奉心賤之及義母死去官行服數徴不至奉歎曰賢者固不可測徃者之喜乃爲親屈也斯盖所謂家貧親老不擇禄而仕也謝承後漢書曰周盤自堅伯居貧養母儉薄不充誦詩至汝墳之卒章慨然而歎乃解韋帶就孝㢘之舉黄㳟廣記曰南吴甫舉茂才累年不遷甫有老母年九十有餘乃上書自乞减品爲四百石長庶得其俸以養母詔聽除𥙷南陽新蔡長遂以甫爲准率减交趾茂才皆爲四品也晉書羅企生字宗伯多才藝𥘉拜左著作郎以家貧親老𥙷臨汝令丗說曰李弘度甞歎不𬒳遇殷楊州知其家貧問君能屈志爲百里不李荅曰北門之歎乆巳嘗聞窮猨豈睱擇木遂作剡縣太平御覧卷第四百一十四
