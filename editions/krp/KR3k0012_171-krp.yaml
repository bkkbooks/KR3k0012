  text: 太平御覽卷第一百七十一州郡部十七
  hash: sha256:7d8e6f78d5dc3c4425ea12e72420848214bc53e52e4a4ffc4fbe2af15cdd97b0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_171-1a}
body:
  text: 江南道下越歙明台處温婺衢潭岳衡永道郴連邵黔思費辰錦溪叙施播珎夷葉溱越州十道志曰越州㑹稽郡禹貢楊州之域春秋時越國春秋元命苞曰牽牛流爲楊州分爲越國史記曰越王勾踐其先禹之苗裔夏后少康之庶子也封於㑹稽以奉守禹之祀文身断髮披草萊而邑焉吴志曰㑹稽南靣連山萬重北帶滄海千里輿地志曰順帝時陽羡人周嘉上書請分淅江以西爲吴郡東爲㑹稽郡宋略曰㑹稽山隂編户三萬號爲天下繁劇王羲之云毎行山隂道上如鏡中遊王獻之望鏡湖澄澈清流㵼注乃云山川之羙使人應接不暇郡國志曰越王北面以事吴後終滅吴漢志曰㑹稽郡秦置髙帝六年爲荆國十二年更名吴景帝四年屬江都領曲阿等縣三十六吴越春秋曰禹巡行天下歸還大越㑹計脩國之道以㑹計名山仍爲地號也漢志曰剡縣屬㑹稽莽曰盡忠南史曰張稷爲剡令至􅌘亭生子因名􅌘字四山漢志曰諸曁縣屬㑹稽郡莽曰䟽虜十道志曰縣有曁浦諸山因以爲名㑹稽志曰龜山之下有東武里即琅耶東武縣山一夕移於此東武人皆從此故里不動歙州十道志曰歙州新安郡禹貢楊州之域春秋時屬越秦屬丹陽郡漢志曰歙都尉治屬丹陽郡漢志曰􅉳縣屬丹陽郡浙江水出焉成帝鴻嘉二年爲廣德國王莽曰愬虜師古曰􅉳音伊字與黟同晉書曰孔愉字敬康㑹稽人永嘉之亂避地入新安山谷中以稼穡讀書爲業信著郷里後奄忽而去人皆以爲神爲之立廟孔靈村梁書曰任昉爲新安太守調楓香二石始入三兩便止不欲遺之後人及下任唯有桃花米二十石圖經曰續溪縣以界内乳溪與徽溪相去一里廻轉屈曲並流離而復合謂之續溪縣因名焉圖經曰任昉爲新安太守因行春至此愛其雲溪縁源㝷幽累日不返百姓因名其溪爲昉溪村名昉村又曰新安貢柿心墨木􅉳之字縣職此之由又曰祈門縣本名閶門著於秦漢之代縣有巨石夾流水兩相對其狀似門故號閶門又曰㜈源縣本晉休寜縣東陽記曰上應㜈女故名之明州十道志曰明州餘姚郡古舜爲餘姚之墟史記曰越王勾踐平呉徙夫差於甬東漢志曰餘姚屬㑹稽郡本鄮縣之地風土記曰舜支庶所封故曰餘姚輿地志曰邑人以其海中物産於山下鄮易因名鄮縣圖經曰鄮縣有角東及句章故城台州十道志曰台州古越州㑹稽郡之地禹貢楊州之域春秋時越國秦屬閩中郡後越王無疆七代孫閩君揺率越人佐漢伐秦惠帝録其功封姚爲東越王都於甌山海經曰甌在海中郭璞注云今臨海永寜縣即東甌故地也若在南海中鬱林郡爲西甌吴地記曰漢書閩越圍東甌東甌告急於天子天子遣太中大夫嚴助發兵徃救未至閩越止兵東甌乃舉國徙中國處之江淮間而後遺人徃徃漸岀乃以東甌地爲回浦縣漢志曰回浦東部都尉理屬㑹稽郡揚雄解嘲曰東南一尉西北一候十道志曰唐武徳四年討平李子通於臨海縣置海州五年改海州爲台州處州圖經曰處州縉雲郡古縉雲之墟也秦爲㑹稽郡地漢𥘉爲東甌地後以爲回浦縣光武更名章安晉分爲永嘉郡輿地志曰永嘉郡本㑹稽東郡地晉明帝太寜元年分臨海等五永嘉郡圖經曰麗水縣有惡道惡道有突星瀬謝靈運與弟書曰聞惡道溪中九十九里有五十九灘永嘉記曰王右軍遊惡道歎其竒絶遂書突星瀬於石輿地志曰松陽縣本章安南郷漢末立爲縣吴地記曰縣東南臨大溪有松陽樹大八十一圍腹中空可容三十人坐故取此爲名王右軍嘗徃看之永嘉記曰青田縣有草葉似竹可染碧名爲竹青此地所豐故名青田浮丘公相鶴經曰青田之鶴温州十道志曰温州永嘉郡㑹稽之東境也漢永建四年置永寜縣郡國志曰永嘉爲東甌鬱林爲西越斯地蠶一年八熟圖經曰永嘉縣漢冶縣之地後漢改爲章安縣漢志曰冶本閩越地屬㑹稽郡㜈州十道志曰㜈州東陽郡禹貢楊州之域春秋時爲越之西界秦屬㑹稽郡漢𥘉屬荆吴二國郡國志曰婺州正得東越之地漢時其地屬㑹稽爲東楊州人俗輕躁少信行好淫祀鄭緝之東陽記曰此境於㑹稽西部嘗置都尉理於此吴寳鼎元年始分㑹稽置東陽郡隋平陳置婺州蓋取其地於天文爲婺女之分野異苑曰東陽顔烏以淳孝著聞群鳥助銜土塊爲墳烏口皆傷一境以爲至孝所致因以縣名烏傷十道志曰唐武徳七年改烏傷爲義烏衢州十道志曰衢州信安郡土地所屬與㜈州同唐武德四年平李子通於信安縣置西有三衢山因以爲名輿地志曰後漢獻帝𥘉平三年分太末縣立新安縣晉太康元年以弘農有新安改名爲信安左傳曰越伐吴王孫彌庸觀越見姑蔑之旗杜注云今東陽太蔑縣是輿地志曰太蔑秦漢爲太末縣今龍丘乃春秋東陽太末縣也潭州十道志曰潭州長沙郡禹貢荆州之域春秋及戰國時爲黔中地之南境晉懷帝永嘉元年分荆州置湘州隋平陳改湘州爲潭州史記天官書曰翼􅎮爲楚分傍一小星爲長沙星漢書曰髙帝封畨君吴芮爲長沙王又曰長沙定王發景帝二年立以母微無寵故王卑濕貧國應劭注曰景帝後二年諸王來朝有詔更前稱壽歌儛定王但張䄂小舉手左右笑其拙怪問之對曰臣國小地狹不足廽旋帝乃以武陵零陵桂陽屬焉郡國志曰炎帝神農氏葬於長沙長沙之尾東至江夏謂之沙羡是其地十三州志曰西自湘江至東萊萬里故曰長沙湘州記曰始皇二十五年併天下分黔中以南之沙郷爲長沙郡以統湘川蓋取星以名焉遁甲經曰長沙之地雲陽之墟可以長生可以避丗湘中記曰其地有舜之遺風人多純朴今故老猶彈五絃琴好爲漁父吟湖南風土記曰長沙下濕丈夫多夭折俗信鬼好淫祀第蘆爲室頗雜越風岳州十道志曰岳州巴陵郡禹貢荆州之域古三苗國地春秋及戰國時屬楚秦屬長沙郡晉分長沙之巴陵置建昌郡在巴陵齊武封子倫爲巴陵王梁封齊明帝子寳義爲巴陵王奉齊後以備三恪隋平陳改爲岳州㝷江記曰羿屠巴虵於洞庭其骨若陵故曰巴陵淮南子曰斬脩蛇于洞庭十道志曰巴陵縣本漢下雋縣之巴丘地漢書地理志曰下雋縣屬長沙郡十道志曰華容縣本漢孱陵縣衡州十道志曰衡州衡陽郡春秋時屬楚秦屬長沙郡漢爲􅌕縣地屬長沙國吴分長沙之東部立爲湘東郡隋平陳罷郡爲衡州因衡山以取名尚書禹貢曰荆及衡陽惟荆州甄烈湘州記曰宋大明中望氣者云湘東有天子氣遣日者巡視斬崗以厭之㝷乃湘東王爲天子即明帝也圖經曰荼陵縣者所謂陵谷生茶茗焉永州十道志曰永州零陵縣禹貢荆州之域春秋及戰國時楚之南境秦屬長沙郡漢屬長沙國晉以零陵屬湘州隋平陳置永州因永水爲名梁書曰孫謙字長遜爲零陵太守有善績吏人安之先是部多猛獸謙至絶迹及去官之夜猛獸即害居人甄烈湘州記曰石鷰山石形似鷰大小如一山明淨即頡頑飛翔羅含湘中記曰石鷰在泉陵縣雷風則群飛然其土人稀有見者按十道志曰零陵縣本漢泉陵縣道州十道志曰道州江華郡禹貢荆州之域春秋及戰國時屬楚漢屬長沙國唐貞觀八年爲道州圖經曰昔舜封象有鼻國即其地郴州十道志曰郴州桂陵郡禹貢荆州之域春秋及戰國時屬楚秦屬長沙郡漢髙祖二年分長沙南境立桂陽郡屬荆州部居郴梁元帝爲盧陽郡屬衡州隋平陳改爲郴州史記曰項羽徙義帝於長沙都郴連州十道志曰連州連山郡春秋時楚地秦爲長沙郡之南境二漢爲桂陽郡之桂陽縣吴屬始興郡晉因之宋於此立宋安郡後省齊如之梁爲陽山郡唐武德四年改爲連州以郡南黄連嶺爲名邵州十道志曰邵州邵陽郡禹貢荆州之域春秋時屬楚秦爲長沙郡漢爲昭陵縣屬零陵郡呉分零陵北部爲邵陵郡屬荆州即今州也晉武改昭陽爲邵陽唐貞觀十年改爲邵州又曰邵陽縣本漢昭陵縣地屬長沙國黔州十道志曰黔州黔中郡禹貢荆州之域戰國爲楚黔中地秦昭王伐楚置黔中郡其地又屬焉漢武陵郡之酉陽縣地武陵五溪蠻之西界也周武帝保定四年蠻帥田思鶴以地内附置奉州建德三年改爲黔州吴録曰黔陽屬武陵郡黔陽今辰州三亭縣西故城是也思州十道志曰思州寜夷郡禹貢荆州之域春秋楚地隋開皇十八年始置務川縣屬庸州唐武徳元年以務川當䍧牁要路置務州貞觀八年改爲思州因思卭水爲名費州十道志曰費州涪川郡禹貢荆州之域春秋時屬楚漢武帝元鼎六年通牂牁道置牂牁郡其地屬焉江山阻逺爲俚獠所居多不臣附周宣政元年獠王元殊多質等歸國遂立州取費水爲名九州要記曰九丘之外有費州辰州十道志曰辰州盧溪郡禹貢荆州之域春秋時屬楚其地即古蠻夷之地秦昭王使白起伐楚略取蠻夷置黔中郡漢改黔中爲武陵郡隋開皇平陳改爲辰州沅陵記曰五溪十洞頗爲邊患自馬伏波征南之後雖爲郡縣其民叛擾代或有之蓋恃山險所致十道志曰壷頭山後漢馬援征五溪蠻取壷頭山賊乗髙守險水迅舡不得進士卒多疫死援亦中病穿岸爲室以避炎氣遂卒干此武陵記曰山邊有石窟即馬援所穿室也室内有大虵如舡云是援之餘靈十道志曰故老云楚子滅巴巴子兄弟五人流入黔中漢有天下名曰酉辰巫武沅等五溪爲一溪之長故號五溪錦州十道志曰錦州盧陽郡歷代土地與辰州同唐武徳𥘉以辰州之地析置錦州溪州十道志曰溪州靈溪郡禹貢荆州之域歷代土地所屬與辰州同唐武德中立溪州蓋取五溪相㑹於此又曰大郷縣本漢沅陵零陵二縣地屬武陵郡梁分立大郷縣三亭縣本漢靈陽縣地屬武陵郡唐分大郷縣縣有小酉山黔山大酉山叙州十道志曰叙州潭陽郡古蠻夷之地戰國時爲楚黔中地唐貞觀八年爲巫州天授三年以巫山不在州界改爲沅州以沅江水爲郡名開元十三年仍舊爲巫州至大暦五年爲叙州五溪記曰民多射生而鼻飲噉虵䑕捕鰕蠏朝營夕用故無宿給施州十道志曰施州清江郡禹貢荆州之域春秋時巴國七國時爲楚巫郡地秦昭王伐楚置黔中郡巫地屬焉周武帝建德二年酋長向邹兄弟四人相率内附置施州又曰清江縣本漢巫縣地屬南郡巫縣今䕫州巫山縣是也吴晉及周爲沙渠之地隋於此置清江縣播州十道志曰播州播川郡秦夜郎縣之西南隅惠王十四年欲得楚黔中地以武關之外易之今隷黔府即惣謂黔中地漢武元鼎六年平西南夷置牂牁郡其地屬焉以且蘭有掾舡牂牁因此立郡以名焉貞觀九年於北界置郎州後省十三年又於其地置播州以其地有播川因名焉漢書曰唐蒙上書說武帝曰聞夜郎國有精兵可十餘萬浮舟䍧牁岀其不意以制越此一竒也珎州十道志曰珎州夜郎郡古山獠夜郎國之地晉永嘉五年分牂牁置夜郎郡兼置充州唐貞觀十七年廓闢邊夷置播川鎮後因川中有降珎山因以鎮爲珎州取山名郡也九州志曰夜郎自古非臣伏州郡之地漢武開拓南邊始置夜郎縣屬牂牁郡即牂牁都尉居之後漢書曰衣郎者臨牂牁江江廣百餘歩足以行舡十三州志曰牂牁者江中山名也夷州十道志曰夷州義泉縣古徼外蠻夷之地漢置牂牁郡歷代恃險不聞臣附隨大業七年始招慰置綏陽縣屬明陽郡唐武德四年置夷州葉州十道志曰葉州龍溪郡古蠻夷之地唐置葉州或爲龍溪郡溱州十道志曰溱州溱溪郡古蠻夷之地唐貞觀八年開拓南蠻於榮懿縣立溱州地多貢象牙後或爲溱溪郡太平御覽卷第一百七十一
