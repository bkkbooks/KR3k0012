body:
  text: 谿尚書大傳曰吕尚釣於磻溪得魚腹中有五璜春秋說題辭曰谿者隱也深虚繞山令得博也宋均曰無水曰谷有水曰谿爾雅曰水注川曰谿桓彛別傳曰彛字茂倫明帝丗彛與當時英彦名徳庾亮温嶠羊曼等共集青谿池上郭璞預焉乃援筆属詩以白四賢并自序武昌記曰樊山東有山谿夏時凛凛恒有寒氣故謂之寒谿王韶之始興記曰連水下流有斟谿一日十溢十竭盛弘之荆州記曰酈縣北五十里有菊谿源出石澗山有甘菊村人食此水多壽又曰零陵郡西有九渡谿山獸從數十里徃飲之經越他水皆不飲傍有半石坑上石形極方峭名爲仙人樓又曰桂陽郡桂横谿谿水甚深冬夏不乾俗謂之爲貪泉也郡西南五十里有萬歳山有石室出鍾乳山上悉生靈壽木下有一谿名爲千秋水其傍有居民即號萬歳村管子曰桓公北征孤竹廻未至卑耳之谿授弓而射未敢發謂左右曰見前人乎對曰不見公曰寡人見人長尺而人物具焉管仲曰臣聞霸王之君興而登山神見公拜曰仲父之聖若此俗說曰郗僧施青谿中汎舟一曲處輙作一篇詩謝益壽見詩嘆曰青谿中曲復何可窮水經注曰磻溪即太公釣所也石壁深髙幽泉䆳宻林障秀阻亦人罕交東南隅有石室盖太公所居也水次平石即太公垂釣之處也其水清冷神異北流注于渭又曰長陽谿源石穴中有神魚大者二尺小者一尺居民釣魚先陳所須多少拜而請之拜訖投釣得魚過數者水輙波涌暴風卒起樹木催折水側生異花路人欲摘者皆當先請不得輙取又曰白馬谿水出冝陽山有大石厥狀似馬故谿澗以物色受名也又曰向城有水二源俱北流合爲一川名天漿谿又曰閩中有徐登者女子化爲丈夫與東陽趙昞並善越方時遭兵亂相遇於谿各矜其所能登先禁谿水爲不流昞次禁枯柳爲生荑二人相視而笑登年長昞師事之後登身故昞東入章安百姓未知昞乃升茅屋榰鼎而㸑主人驚怪昞笑而不應屋亦不損又甞臨水求渡舡人不許昞乃張盖坐中長嘯呼風亂流而濟於是百姓神服從者如歸又曰山隂縣西四十里有二溪東溪廣一丈九尺冬暖夏冷西溪廣三丈五尺冬冷夏暖二溪北出行三里至徐村合成一溪廣五丈餘而温凉不雜盖山經所謂茗水也又曰朐䏰縣有龜溪出靈龜咸熈元年獻龜於相府言出自此溪也郡國志曰豫州呉房縣呉王闔閭之第夫槩王朝楚楚封之於堂溪又曰王昭君秭歸人也有香溪即昭君遊處又曰資陽縣有環溪百丈池所謂溪流如鐶池深百丈也又曰陵陽山在石碌縣北三里按輿地志陵陽令竇子明於溪側釣魚一日釣得白龍子明隣而放之後數年又釣得一白魚割其腹中乃有書教子明燒煉食餌之術三年後白龍來迎子明遂得上昇其溪環遶山足今有仙壇醮祭不絶信州圖經曰師溪水源出黄蘗山北面在弋陽縣東南一百一十里昔有隠士胡超居此衆人師之故名師溪越絶書曰薛燭對越王曰若耶之溪涸而出銅也古歐冶子鑄劒之所故戰國䇿云涸若耶以取銅破堇山而岀錫又郡國志云歐冶子鑄劒處下有孤潭深而清有孤石聳出潭上有大櫟樹謝客兒與弟惠連作詩連句刻於樹上呉興記曰前溪在縣南東流入太湖謂之風渚夾溪悉生箭箬後溪在市北東出餘不亭晉車騎將軍沈充作前溪歌曲傳者以爲指此溪也裴氏廣州記曰百管谿周廻丈餘水極沸涌如猛火煎油聲臨海圖經曰銅溪在縣西北五十里其水黄色狀似銅故號銅溪也孫興公天台山賦云過靈溪而一濯是也善歌録曰武溪水源出武山東南流注于沅故爲歌曰武溪深復深飛鳥不能渡遊獸不能臨又曰下潦上霧看飛鳥墮水中即此也壑周易略例曰隆墀永歎逺壑必盈禮記曰大蜡之祭辭曰土反其宅水歸其壑山海經曰東海之水有大壑列子曰渤海之東不知幾億萬里有大壑實惟無底之谷曰歸塘莊子曰夫壑之爲物注焉而不滿取焉而不竭又曰藏舟於壑藏山於澤謂之固矣然則夜半有力者負之而趨昧者不知孟子曰志士不志在溝壑太平御覽卷第六十七
