seq: 67
front:
  text: 爲池齊雖衆無所用之史記封禪書曰秦始皇遊海上祠名山大川及八神仙人羡門之属八神一曰天齊祠天齊天池名臨南郊山漢書曰昆明池漢武帝元狩三年所穿也𥘉漢欲求身毒國爲昆明池夷所閉昆明有滇池方三百里名曰滇河漢將伐昆明以通身毒使謫卒伐棘上林象滇河作昆明池以習水戰池周廻四十里漢武帝平昆明以其地爲益州郡其滇水原深廣末反淺狹有似倒流故日滇河潘岳關中記曰昆明池漢武習水戰也中有靈沼神池云堯時理水訖停舡此池盖堯時巳有汚池漢代因而深廣耳曺毗志怪云漢武鑿昆明池極深悉是灰墨無復土舉朝不觧以問東方朔朝曰臣愚不足以知之可試問西域胡帝以朔不知難以核問至後漢明帝時外國道人入來洛陽時有憶方朔言者乃試以武帝時灰墨問之胡人云經云天地大刧將盡則刼燒此刼焼之餘乃知朔言有旨又曰昭帝元始元年春三月黄鵠下建昌宫太液池又曰宣帝詔曰池籞未御幸者蘇林日折竹以䋲綿連若禁籞使人不得徃来也假與貧民郡國宫館勿復脩治又曰宣帝神爵元年詔曰金芝生于涵德殿銅池中銅作池魏志曰太祖還鄴作玄武池以肄舟師晉書曰山簡優遊卒歲唯酒是躭諸習氏荆土豪族有佳園池簡毎出嬉遊多之池上置酒輙醉名之曰髙陽池時有童兒歌曰山公出何許徃至髙陽池日夕倒載歸酩酊無所知時時能騎馬倒着白接離舉鞭向葛疆何如并州兒彊家在并州簡愛將也又曰荀勗乆在中書􅌹管機事失之甚怏怏或有賀之者勗曰奪我鳯皇池諸君何賀我耶後魏書曰文明皇太后馮氏與髙祖幸靈泉池醼羣臣太后忻然歌髙祖亦和歌歌者九十人唐書曰蔣鎭爲諫議大夫時户部侍郎判度支韓滉上言河中鹽池生瑞鹽實土德之上瑞上以秋霖稍多水潦爲患不冝生瑞命鎭馳馹檢行之鎭奏與滉同仍上表賀請宣付史館并請置神祠錫其號寳應靈慶池又曰文宗用鄭注言即命左右神䇿軍差人淘曲江昆明二池仍許公卿士大夫之家於江頭立亭舘以時追賞遁甲開山圖榮氏解曰降北有陽石山中有神龍池黄帝時遣雲陽先生養龍於此帝王歷代養龍之處國有水旱不時祀池請雨晉宫閣名曰靈芝池廣長百五十歩深二丈上有連樓飛觀四岀閣道釣臺中有鳴鶴舟指南舟袁山松冝都記曰佷山縣東六十里有山名下魚城四面絶崖唯兩道可上皆峻嶮山上周廻可二十里有林池水民田種於山上昔永嘉亂土人登此避賊賊守之經年食盡取池魚擲下與之示不窮賊遂退散因名此爲下魚城辛氏三秦記曰昆明池通白鹿原人釣魚綸絶而去夢於漢武求去其鈎明日戯於池見大魚御鈎帝去其鈎而放之間三日帝復遊池濵得明珠一雙武帝曰豈昔魚之報也湘州記曰湘南縣有架山下有小池常涸竭民齋戒徃請自然而滿事訖還乾雷次宗豫章記曰去洪井六七里有風雨池山嶠水出激着樹木星散逺灑如風雨焉襄陽記曰峴山南有習郁太魚池依范蠡養魚法當中築一釣臺將亡勑其兒曰必葬我近魚池山季倫毎臨此輙大醉而歸臨川記曰崇仁縣有鹹池桉陳書司空黄法氍音翟字仲昭崇仁縣巴山人也侯景亂法氍於卿里聚徒以助髙祖有功薨墓在崇仁縣巴山郷故老相傳法氍有竒術常欲變置鹽池於家山之下愊貟六十餘畒至今水味獨鹹於他水而湛然清澈禽畜不敢觸之西京雜記曰梁孝王好宫室苑囿之樂作曜華之宫築兎園園中有靈山山安膚寸石又有鴈池池中鶴洲鳬渚竒果異樹瑰禽恠獸畢備王日與宫人及賔客弋釣其中又曰積草池中有珊瑚樹髙一丈二尺一云三柯上四百六十二條是越國王趙他所進號爲烽火樹至夜光景照焉述征記曰廣陽門北有魏明帝流杯池穆天子傳曰天子西征于玄池天子三日休于玄池之上天子乃樹之竹種竹池邊是曰竹林又曰天子觴西王母于瑶池上西王母爲天子謡三輔故事曰漢武帝作昆明池武帝崩後於池中養魚以給諸陵祠餘付長安市池有二石人如牽牛織女像又曰未央宫西有食池池中有臺王莽死於是也廣州先賢傳曰丁宻字靖公蒼梧人遭父艱哭泣三年飛鳬一雙游宻廬傍小池郡國志曰晉州臨汾縣臭水池下畜不飲一名飜鑊池即煑眉間赤頭處鑊飜因成池今水上猶有脂潤又曰成都郡秦惠王二十七年使張儀築城以象咸陽沃野千里號曰陸海有萬歲池是築城取土處又曰合浦海曲出珠號曰珠池又有夷人號越㐌多採甲香爲業吕氏春秋曰衛靈公天寒鑿池宛春諌曰天寒公曰天寒乎宛春曰公衣狐裘坐熊席陬隅有竈是以不寒淮南子曰隂氣極則下至黄泉故不可鑿池穿井丗說曰晉明帝欲作池臺元帝不許之明帝爲太子養武士一夕中作比暁便成即今謂太子池是也又曰太原王國寳治宅因浚池忽見一物如酒杓形長四尺許飛去水經注曰隴西神馬山有淵池龍馬所生即是水西流謂之馬池又曰蔡州西即蔡倫故宅傍有蔡子池倫漢黄門即順帝之丗始檮故魚網爲𥿄用代簡素自其始也又曰滇池中有神馬家馬交之則生駿駒日行五百里顧子曰與子華遊於東池子華曰水有四德池爲一焉沐浴羣生流澤萬丗仁也揚清激濁盪滌塵穢義也弱而難勝勇也導江䟽河變盈流謙智也顧子曰我得汝於池上矣方輿記曰興元府南鄭縣天池山上有池方二十里冬夏不竭乆飲之可愈痼疾故號天池又曰梅福池一名風雨池梅福種蓮池福歎曰生爲我酷身爲桎梏形爲我辱智爲我毒於是弃南昌縣尉去妻子入洪崖山得道爲神仙代代有人見或在玉笥山逢之今西山有梅君壇南昌開元觀有梅君堂焉又曰明月池在興道縣西北中有一臺云是漢髙所營注水經云形如偃月故號明月池又曰七女池昔有人無男而養七女父亡七女負土葬父取土之處今成一池號曰七女池今池邊又有七女塜
