body:
  text: 獸部八馬四戰國䇿曰汙明見春申君曰夫驥之齒至矣服鹽車而上太行漉汁洒地白汗交流中坂遷延負轅不能上伯樂遭之下車攀而哭之解紵衣而幕之驥於是俯而噴仰而鳴聲造於天欣見伯樂之知已也漢書音義曰騕褭者神馬也赤喙黒身穆天子傳曰天子命駕八駿之乗右服華騮而左緑耳右驂赤驥而左白義天子主車造父爲御次車之乗右服渠黃而左踰輪右驂盗驪而左山子伯天子主車叅百爲御奔戎爲右天子乃遂東南翔行馳驅千里至于巨蒐巨蒐之人用其牛馬之湩以洗天子之足湩乳音東又曰祝沉牛馬豕羊河宗命乎皇天子加皇者尊之天子受命南面再拜柏友旣致河典乃乗黃之乗爲天子先所乗馬盡黄色爲先驅也以極西土又曰天子北征舎于珠澤此澤出珠因名之也以釣于㳅水因獻食馬三百可以供厨膳者牛羊二千又曰辛丑天子渇于沙衍沙中無泉水求飲未至七萃之士曰髙奔戎刺其左驂之頸取其清血以飲天子又曰天子東遊于黃澤宿于曲洛洛水文廻曲曰黃之池其馬歕沙歕音普問切皇人威儀黃之澤其馬歕王皇人夀榖郭璞注穆天子傳曰竹書曰北唐之君來見以一驪馬是生緑耳魏時西卑獻千里馬白色而兩耳黄名之爲黃耳山海經曰滑水中多水馬如馬而文臂臂前脚牛尾其音如呼又曰天帝之山有草焉狀如菜臭如糜蕪名曰杜蘅可以走馬帶香草令便馬或曰馬得之健走也又曰犬戎之國有文馬縞身朱鬛縞猶素也犬傳云駮身朱鬛目若黃金名曰吉壃或作良乗之壽千歳又曰夸父山北有林名桃林廣圎三百里其中多馬桃林今弘農湖縣南北名饒野馬又曰大樂之野夏后啓於此舞九代馬九代馬名也莊子曰馬蹄可以踐霜雪毛可以禦風寒齕草飲水翹足而陸此馬之眞性也雖有儀臺路寢無所用之及至伯樂曰我善治馬燒之剔之刻之駱之連之以羈絆編之以皂棧馬之死者十二三矣飢之渴之馳之驟之整之齊之前有橛飭之患後有鞭䇿之威而馬之死者巳過半矣又徐無鬼曰吾相馬直者中繩曲者中鈎方者中矩圎者中䂓是國馬也而未若天下馬也天下馬有成材若䘏若泆若喪若一若是者超軼絶塵不知其所老子曰天下有道却走馬以糞天下無道戎馬生於郊列子曰秦穆公謂伯樂曰子之年長矣子姓有可使求馬乎伯樂對曰良馬可以形容䈥骨相也天下之馬者若滅若没若亡若失臣之子皆下才也臣有所與九方臯其於馬非臣之比也穆公之見使行求馬三月而反報曰巳得之在沙丘穆公曰何馬對曰馬牝而黃使人徃取之牡而驪公不恱召伯樂曰敗矣子之所使求馬者色物牝牡弗能知又何馬之能知也伯樂曰若臯之所觀天機也得其精忘其麤在其内而忘其外馬至果天下之馬也淮南子曰九方禋餘同晏子春秋曰景公遊於紀得金壷發而視之有丹書曰勿食反魚無乗駑馬晏子曰食魚無反無盡民力也不乗駑馬無致不肖於側也公曰紀有此書何以亡晏子曰紀有此書藏之於壷不亡曷待又曰景公使人養所愛馬馬病死公怒令人殺養馬者晏子請數之曰尒有三罪使汝養馬殺之一當死也又殺公所㝡善馬二當死也使公以一馬之故而殺人百姓必怨叛諸侯輕伐吾國三當死也公喟然曰赦之家語曰孔子相魯齊人患其霸也欲敗其正名乃選女子八十人衣以文衣而舞容璣容璣舞曲及文馬四十駟以遺魯君陳女樂列文馬于魯城南髙門外季桓子微服徃觀之再三將受焉魯君爲周道遊觀觀之終日殆於政事子路言於孔子孔子遂行又曰魯定公問於顔回曰子亦聞東野畢之善御乎對曰善則善矣雖然其馬將必佚定公色不恱頋謂左右曰君子故有誣人耶顔回退後三日校來報之曰東野畢之馬佚兩驂曳兩服入于厩公聞之越席而起促駕召顔回顔回至公曰前日寡人問吾子以東野畢之善御而子曰羙矣其馬將佚不識吾子奚以知之對曰以政知之昔者帝舜巧於使民而造父又巧於使馬舜不窮其民而造父不窮其馬故舜無佚民而造父無佚馬今東野畢之御也升馬執轡衘體正矣馬冝爲車歩驟馳騁朝禮畢矣馬歩驟馳騁盡朝礼之舞歷險致逺馬力盡矣然而其心猶乃求馬不巳臣以此知之也公曰善哉誠若子之言也春秋後語曰蘇代欲見齊王齊王怨蘇秦欲困蘇代不肯見代代乃說淳于髠曰人有賣駿馬欲賣之比三旦立於市人莫知之徃見伯樂曰臣有駿馬欲賣之比三旦立於市人莫與言願子還而視之如旋去而頋之臣請獻一朝韓子曰昔紂爲甲百萬左飲馬於湛右飲馬於洹洹水竭湛水不流武王甲卒三千破而王之又曰鈆陵卓子乗蒼龍排父之乗鈎飾在前錯綴在後馬欲進則鈎餝禁之退則錯綴貫之造父見而泣曰猶人處急丗而不知所由也或云乗瞿父之乗又曰桓公伐孤竹春徃冬還迷惑失道管仲曰老馬之智可用乃放老馬而隨之遂得道又曰如耳說衛嗣君嗣君恱之左右曰公何爲不相也公曰夫馬似鹿者而千金有千金之馬無一金之鹿者何也馬爲人用而鹿不爲人用今如子雖辯者亦不爲寡人用吾是以不相也又曰伯樂教其憎者相千里馬教其愛者相駑馬以千里馬丗一有其利少駑馬多其利多也孫卿子曰伯樂不可欺以馬君子不可欺以人又曰驊騮騏驥纎離緑耳古之良馬也又曰君子善其言而類焉者應矣故馬鳴而馬應之非知也其勢然也又曰驥一日而千里駑馬十駕則亦及之矣伯樂相馬經曰馬生下墮地無毛行千里尿舉一脚行五百里䦨䈥竪者千里馬膝如團麴千里三軍莫逐但知所發不知所宿也又曰江淮津督徐成字子長兄弟蒙寵於府君治馬方以報千金不傳號淮津方尋陽丞陽朱君方最良豫州從事沛國蕭跣方最良也又曰馬相歲上下齒二十四歲齒黄三十三歲齒白口中欲紅色如日月光者行千里汗溝欲深脊欲如伏龜兩邊有廻毛曰騰蛇殺主口邊有廻毛曰衘禍妨主口中有黑者烏銜馬短壽又曰素下去飛䖟四寸行千里驟而不起骨勞起而不振皮勞振而不噴氣勞耳欲小而促也食有三芻飲有三時也白額入口名曰榆冩一名的盧奴乗客死主乗弃市廻毛在目下名曰承涙不利人也又曰馬頭爲王欲得方目爲丞相欲得明脊爲將軍欲得強腹爲城郭欲得張一曰脅爲城郭四下爲令欲得長一曰膝下爲令一曰四下眼欲得髙巨一曰欲其端正眼睛欲如懸鈴紫艶光明下卧蚕懸鑿欲得成鼻孔欲得大鼻頭有王火字一曰鼻欲得撗䈥鼻上文如王火欲得明口中欲得赤膝骨圎而張耳欲相近而堅小而厚雍一寸三百里三寸千里伏龍骨欲得成頸欲得長雙扶欲得大而突蹄欲得厚腹下欲得平有八字馬頭欲得髙而成尾骨髙而垂也凢相馬之法先觀三羸五駑乃相其餘大頭小頸一羸也弱脊大腹二羸也小脛大蹄三羸也謂五駑者大頭緩耳一駑也長頸不折二駑也短上長下三駑也大骼短脅四駑也淺寛薄脾五駑也馬援銅馬相法曰水火欲明水火在鼻兩孔間上唇欲急而方口中欲紅而有光此馬千里頷下欲深下唇欲緩牙欲去齒一寸則四百里牙劒鋒則千里目欲滿而澤膓欲充膁小肋欲長懸薄欲厚而緩懸薄服股也腹下欲平滿汗溝欲深長而膝本欲起肘腋欲開膝欲方蹄欲厚三寸堅如石鬃欲戴中骨髙三寸鬃中骨也頰欲開而膺下欲廣一尺以上能乆走鞅欲方頸前匈欲直而岀脾骨前向鳬間欲開望視之如雙鳬楚辭曰却騏驥而不乗兮䇿駑駘而取路當丗無騏驥兮誠莫之能善御見執轡者非其人兮故駒跳而逺去符瑞圖曰王者貴人而賤馬則白馬朱鬛集又云車馬有節則見騰黃騰黃者神馬也其色黄一名乗黃亦曰飛黄或曰吉黃或曰翠黃一名紫黄其狀如狐背上有兩角出白氏之國乗之壽三千歳黃帝乗之孫氏瑞應圗曰玉馬者王者清明尊賢則至又曰乗黄王者輿服有度則出騕褭者神馬也與飛兎同以明君有德也又曰飛兎者日行三萬里禹治水土勤勞歷年救民之害天應其德則至駃蹄者后土之獸也自能言語王者仁孝於民則出禹治水有功而來又曰龍馬者仁馬河水之精也髙八尺五寸長頸骼上有翼旁乗毛鳴聲九音有明王則見吕氏春秋曰秦繆公車敗失左驂自徃求焉見野人殺將食之繆公笑曰食駿馬肉而不飲酒余恐其傷性也遍飲之而去又曰伯樂學相馬所見無非馬者又曰古相馬者有寒風能相口齒麻朝能相頰女厲能相口管青能相脣吻陳裴能相股脚秦牙能相前賁君能相後並知其一也又曰今有千里之馬於此非得良工猶若弗取良工相馬之工良工之與馬也相得然後成譬之若枹之與鼓夫士亦有千里髙節死義此士之千里也能使士行千里者其唯賢者乎又曰凢爲善難任善易奚以知之今與驥俱走則人不勝驥矣居於車上而任驥則驥不勝人矣又曰良劒期乎斷不期乎莫耶莫耶良劒也取其能断無取於名也故曰不期莫耶良馬期乎千里不期乎驥驁驥千里馬名也王有乗也遊驁因曰驥驁也又曰宋人有取道者其馬不進剄而投之􅗌水剄殺投弃又復取道其馬不進又剄而投之􅗌水如此者三雖造父之所以威馬不過此矣不得造父之道而徒得其威無益於御人主之不肖有似於此不得其道而徒多其威威逾不用又曰飢馬盈厩嗼然未見芻也飢狗盈宫嗼然未見骨也見骨與芻動則不可禁動猶争也亂丗之民嗼然未見賢者也見賢人則徃不可止又曰得十良馬不若得一伯樂得地千里不若得一聖人又曰小方大方之類也小馬大馬之類也小知非大知之類也又曰青龍之疋遺風之乗也髙誘曰皆馬名疾若遺風也非先爲天子不可得而具具備具也燕丹子曰太子有千里馬荆軻謂太子曰千里馬肝羙太子即進肝又曰丹質於秦秦王遇之無禮欲求歸秦王曰烏頭白馬生角乃許尔歸丹仰天而歎烏即頭白馬即生角秦王乃放歸淮南子曰聖人之治猶造父之御也和輯乎銜轡之際而緩急於脣吻之和正度乎匈臆之中而執節於掌握之間内得於中心而外合於馬志故能取道致逺而氣力有餘誠得其術也是故執權者人主之車輿也大臣者人主之四馬也體離車輿之安而手失四馬之心而能無危者古今未之見也又曰天下有道飛黄服皁又曰黄帝時飛黄服皁也皁與皂同又曰王良造父之御也上車攝轡投足調均勞佚若一丗之斷非而行之必謂之亂断猶治也又曰夫馬之爲草駒之時跳躍揚蹄翹尾而走人不能制齕咋足以噆肌碎骨蹶蹄足以破盧䧟匈噆罕也及至圉人擾之良御敎之掩以衡扼連以轡銜則雖歷險超塹弗敢辭也故其馬之不可化其可駕御教之所爲也馬聾蟲聾蟲無知也而可以通氣志猶待教而成又况人乎又曰夫待腰䮍飛莵而駕之則丗莫乗車矣腰䮍飛莵皆行萬里其行若飛因曰飛莵也待西施落纂而爲妃則終身不蒙矣又曰日之行也不見其移也騏驥背日而馳草木爲靡懸峰未薄而日在其前矣懸峰馬蹄下雞舌也又曰馬免人於難者其死也葬之以帷牛有德於人者其死也葬之以大車之鹿牛馬有功猶不可忘又况人乎淮南萬畢術曰馬毛犬尾親友自絶取馬毛犬尾置朋友若夫婦衣中自相憎也說苑曰晉平公出田見乳虎乳虎伏而不動平公還謂師曠曰聞之霸王之君岀獵猛獸伏而不敢起今者寡人出乳虎伏而不動此猛獸乎師曠對曰鵲食猬猬食鵕䴊鵕䴊食駮駮食虎夫駮之狀有似駮馬今者吾君必驂駮馬以岀乎平公曰然又曰北塞上之人其馬亡入胡中人皆吊之其父曰此何誰知不爲福居數月其馬將胡駿馬而歸人皆賀之其父曰此何誰知不爲禍家冨馬良其子好騎墮而折髀人皆吊之其父曰此何誰知不爲福居一年胡夷大出丁壯者皆控弦而戰塞上之人死者十九十人戰九人死此子獨以跛故子父相保地鏡圖曰銅器之精見爲馬孔叢子曰衛公子友饋四乗馬於子思曰不以此求交於先生乆降鄙土爲賔至之餼耳又曰公孫龍以白馬爲非馬或曰此辯而毀大道子髙適趙謂龍曰願受業乆不敢先者以白馬爲非馬耳誠能去之則爲弟子龍曰若使去之無以教矣涼州記曰吕光麟嘉五年踈勒王獻火浣布善舞馬太平御覽卷第八百九十六
