front:
  text: 太平御覽卷第六百八十五
  hash: sha256:73a397b3fc2224604d8604202c8fc019f7ba8e2c14b36d99b78bf1fe43661d6b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_685-1a}
body:
  text: 服章部二通天冠進賢冠逺遊冠章甫冠牟追音堆収哻羽切委貌冠髙山冠法冠武弁鶡冠却敵冠却非冠巧士冠方山冠長冠樊噲冠通天冠三禮圖曰通天冠一曰髙山冠上之所服蔡邕獨斷曰天子冠通天漢制之秦禮無文祀天地明堂平冕鄙人不識謂之平天冠徐廣輿服雜注曰天子通天冠髙九寸黒介幘金博山徐爰釋問曰通天冠金博山蟬謂之金顔進賢冠三禮圖曰進賢冠前髙七寸長八寸後髙三寸一梁下大夫一命所服兩梁再命大夫二千石所服三梁三命上大夫公侯之服董巴漢輿服志曰進賢冠古緇布冠文儒者之服也前髙七寸後三寸長八寸公侯三梁中二千石巳下至愽士兩梁千石巳下至小史私學弟子皆一梁宗室劉氏亦兩梁蔡邕獨斷曰進賢冠文官服之漢制尚書兩梁禮無文徐廣輿服志雜注曰天子雜服介幘五梁進賢冠太子諸王三梁進賢冠北齊書曰文襄嗣業以前司徒侯景進賢冠賜李繪曰卿但直心事孤當用卿爲三公勿學侯景叛也逺遊冠三禮圖曰逺遊冠諸王所服徐廣輿服雜注曰天子雜服逺逰冠太子及諸王逺遊冠制似通天也天子五梁太子三梁董巴漢輿服志曰逺遊冠制如通天有展䇶横之于前無山張鏡宋東宮儀記曰皇太子逺遊冠翠緌魏文帝與于禁詔曰昔漢髙脫衣以衣韓信光武解綬以帶李忠誠皆人主當時貴敬功勞今以逺遊冠與將軍梁書曰天監十四年正月朔旦帝臨軒冠太子于太極殿舊制太子着逺遊冠金蟬翠緌纓至是詔加金博山淮南子曰楚莊王通梁組纓髙誘曰通梁逺遊冠羅浮山記曰王方平着逺遊冠五色綬章甫釋名曰章甫殷冠名甫大夫也殷以之表章大夫也白虎通曰殷統十二月爲正其飾微大故爲章甫儀禮士冠禮曰章甫殷道也鄭玄曰章明也殷質言以表明大夫也甫或爲斧所以服行道也禮記儒行曰孔子曰丘長居宋冠章甫之冠論語先進曰赤爾何如對曰宗廟之事如㑹同端章甫願爲小相焉莊子曰宋人有資章甫而適於越越人斷髮文身無所用之孔藂子曰先君相魯三月政化旣行頌曰褒衣章甫實獲我所章甫襃衣惠我無私列仙傳曰稷丘君㤗山下道士漢武帝東廵君乃冠章甫擁琴而見之牟追釋名曰牟追牟冐也言其刑冐髪追追然也周禮春官曰追帥掌王后之首服爲副編次追衡笄鄭司農云追冠名也禮曰牟追夏后氏之道也副者婦人之首服衡維持冠者儀禮士冠禮曰母追夏后氏之道也白虎通曰夏正十三月其飾最大故爲無追無追者言其追大也制冠法天天色玄不失其質夏之冠色純玄収釋名曰収夏后氏冠名也言収歛髮也白虎通曰夏収而祭謂之収者十三月陽氣収本舉生萬物而逹出之故謂之収禮王制曰夏后氏収而祭燕衣而養老又郊特牲曰周弁殷􅒐夏収五經通義曰王冠夏曰収以入宗廟長尺六寸廣八寸前起史記曰堯黄衣純冠􅒐詩曰殷士膚敏祼將于京厥作祼將常服黼􅒐黼白與黑也􅒐殷冠也白虎通曰殷􅒐而祭謂之􅒐者十二月施氣受化􅒐張而後得牙禮王制曰殷人􅒐而祭縞衣而養老委貌冠釋名曰委貌其形委曲之貌上小下大儀禮士冠禮曰委貌周道鄭玄曰委猶安也言以安正容貌也三禮圖曰玄冠一曰委貌今之進賢則其遺象也夏曰母追殷曰章甫周曰委貌後丗轉以巧意改易其名耳國語曰周襄王賜晉文公命晉侯端委而入孔朝曰玄端之衣委貌之冠也白虎通曰委貌者何周朝廷理正事行道徳之冠名所謂委貌者周統十一月爲正萬物始萌冠飾最小故爲委貌言委曲有貌也董巴漢輿服志曰委貌冠以皂絹爲之大射辟雍公卿諸侯大夫冠委貌續漢輿服志同神異經曰西荒有人不讀五經而意合不觀天文而心通不誦禮律而精當天賜其衣男朱衣縞帶委貌冠女碧衣戴勝皆無縫髙山冠三禮圖曰髙山冠一曰側注髙九寸鐵爲卷梁秦制行人使者所服今謁者服之續漢輿服志曰安帝立太子太子謁髙廟洗馬冠髙山冠侍御史奏謂不冝事下有司尚書陳忠奏洗馬職如謁者服其服先帝之舊也奏可謁者古一名洗馬董巴漢輿服志曰髙山冠一曰側注如通天謁者僕射所服太傳南郡胡廣說曰髙山冠蓋齊王冠也秦滅齊以其君冠賜近臣謁者服之傳子曰魏明帝以髙山制似通天逺遊乃毀變先形令行人使者服之㑹稽先賢像讃曰綦母文後爲交阯刺史詔賜髙山冠法冠三禮圖曰法冠一曰柱後惠文一曰獬豸冠柱髙五寸以縱裹鐵柱卷秦制法官服之禮不記蔡邕獨斷曰法冠秦制執法者服之天子冠通天漢制之侍中中常侍皆冠惠文加貂附蟬董巴漢輿服志曰太傳胡公說春秋左氏傳有南冠而縶者則楚冠也秦滅楚以其服賜執法近臣御史服之又曰武冠一曰武弁大冠侍中中常侍加黄金璫附蟬爲文貂尾爲飭謂之趙惠文冠國語曰定王使單襄公聘於宋假道於陳陳靈公與孔寜儀行父南冠以如夏氏留賔不見單子歸告王曰陳侯弃衮冕而南冠以出不亦彛簡乎簡略彛常也言簡略常服犯先王之令國其亡乎賈逵曰南冠楚冠也漢書曰張敞弟武爲梁相敞遣吏送之曰何以治梁武曰馭黠馬者利其銜榮當以柱後惠文彈治之耳秦獄吏冠柱後惠文冠如淳曰蟪蟬也冠細如蟬翅今御史冠也又曰昌邑王賀短衣大袴冠惠文冠服䖍曰武冠也趙惠文所服故號惠文應劭漢官儀曰侍御史周官也爲柱下史冠法冠一曰柱後以鐵爲柱言其審固不撓或說古有獬豸獸主觸不直故執憲者以其角形爲冠耳唐書曰侍御史朱放請復置朱衣豸冠於内廓有犯者御史服以彈後御史張著服之以彈京兆尹嚴郢武弁三禮圖曰武弁大冠也士服之或曰千歲涸澤之神名慶忌冠大冠乗小車馬好疾馳齊人服之董巴漢輿服志曰武冠一曰武弁大冠武官冠之侍中常侍加黄金璫附蟬爲飾謂之趙惠文冠蔡邕獨斷曰武冠或曰繁冠今謂之大冠魏志曰陳思王植上䟽曰臣若得辭逺遊戴武弁解朱組佩青紱乃臣之至願也徐爰宋志曰武弁世謂籠冠也鶡冠應劭漢官儀曰虎賁冠挿鶡尾鶡鷙鳥中之果勁者也毎所攫撮應瓜摧碎尾上黨所貢董巴漢輿服志曰武冠加雙鶡尾爲鶡冠羽林虎賁冠之鶡鷄勇鬪死乃止故趙武靈王以表武士秦施用之劉向七畧曰鶡冠子常吾深山以鶡爲冠故號冠子却敵冠三禮圖曰却敵冠前廣四寸後三寸衛士服之董巴漢輿服志曰却敵冠制似進賢衛士服之却非冠三禮圖曰却非冠宫殿門僕射服髙五寸禮不記又司馬彪續漢書云挿以鷰尾董巴漢輿服志曰却非冠似長冠巧士冠三禮圖曰巧士冠前髙五寸後相通掃除從官服之禮不記董巴漢輿服志曰巧士冠髙七寸不常服唯郊天黄門從官四人冠之在鹵簿中次乗輿車前以備䆠者四星方山冠三禮圖曰五彩方山冠各以其綵縠爲之祠廟天子八佾樂五行舞人所服董巴輿服志曰方山冠似進賢冠以五彩縠爲之漢書五行志曰昌邑王賀爲王時冠方山冠長冠三禮圖曰長冠竹裏髙七寸廣三寸漢髙祖以竹皮作之丗云劉氏冠楚制禮不記蔡邕獨斷曰小史祠宗廟則長冠樊噲冠周遷輿服雜事曰樊噲冠楚漢㑹於鴻門項羽圖危髙祖樊噲聞急乃裂衣苞楯戴以爲冠排入羽營董巴漢輿服志曰樊噲造次所冠以入項羽軍廣九寸前後各出四寸制似冕司馬殿門衛士服之太平御覽卷第六百八十五
