front:
  text: 太平御覽卷第九百三十
  hash: sha256:c67b62ec77ab51835a111415ccb3424afe21bd6ffc7498028b265cf1cf45f39e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_930-1a}
body:
  text: 鱗介部二龍下蚊螭龍下孫氏瑞應圖曰黃龍者神之精四龍之長也王者不漉池而漁德逹深淵則應氣而游池沼酈善長水經注曰浮圖澄別傳曰石虎時自正月不雨至六月澄詣滏口祠稽首曝露即日二白龍降於祠下於是雨遍千里又曰石勒時天旱沙門佛圖澄於石井崗掘得死龍長尺餘漬之以水良乆乃蘇呪而祭之龍騰空而上天即雨降因名龍崗又曰交州丹淵有神龍毎旱村人以􅞒草置淵上流魚則多死龍怒當時大雨豫章記曰呉猛坐郭璞事𬒳収寄載徃南令舩勾開戸船主聞船下有聲如在樹杪試窺之有二龍負舩一宿至宫亭湖還豫章三秦記曰河津一名龍門臣靈跡猶存去長安九百里水懸船而行旁有山水陸不通龜魚之屬莫能上江海大魚集門下數千不得上下即爲龍故云曝鰓龍門垂耳轅下又曰龍首山長六十里頭入於渭尾逹樊川頭髙二十丈尾漸下髙五六尺土赤不毛云昔有黒龍從山南出飲渭其行道因成土山故因名也西河記曰張駿立謙光殿成後池中水有五龍晝日見移時乃滅水通變緑色駿即爲銅龍以猒之駿卒不勝此殿廣雅曰有鱗曰蚊龍有翼曰應龍有角曰虬龍無角曰螭龍方言曰龍未昇天曰蟠龍齊諧記曰蛟龍畏練樹葉五色絲漢武帝内傳曰王母乗紫雲之輦又駕九色之班龍葛洪神仙傳曰費長房與壷公俱去後壷公謝而遣之長房憂不能到家公與所用竹杖騎之忽然如睡巳到家以所騎竹投葛陂中顧之乃青龍也管輅别傳曰龍者陽精以潜于隂幽靈上通和氣感神二物相扶故能興楚國先賢傳宋玉對楚王曰神龍朝發崑崙之墟暮宿於孟諸超騰雲漢之表婉轉四瀆之裏夫尺澤之鯢豈能料江海之大哉王子年拾遺録曰方文山一名蠻雉山東有龍塲方千里有龍皮骨如山阜膚血如流水燕昭王時以龍膏爲燈光清澄若水光𦦨五色人以爲瑞沈懷逺南越志曰蟠龍身長四丈青黒色赤帶如錦文常隨水而下入于海有毒傷人即死人物志曰龍神不處罔罟之水鳯凰不翔罻羅之郷博物志曰昔禹平天下㑹羣臣於㑹稽之野防風氏後至殺之夏德之盛二龍降之禹使范成光御之以行域外旣周而還至南海經防風防風之神見禹使怒而使射之有迅雷風雨二龍昇去二臣恐以刃自貫其心而死禹哀之乃拔其刃療以不死之草而皆活是爲穿匈民又曰龍肉以醢漬之則文章生異苑曰陶偘嘗捕魚得一織梭還挂於壁有頃雷雨梭變成赤龍從屋騰躍而去任昉述異記曰漢和帝元年大雨有一青龍墯於宫中帝命烹之賜羣臣龍羮各一柸故李尤七命曰味兼龍羮楊衒之洛陽伽藍記曰西方烏塲國西有池龍王居之池邊有一寺五十餘僧龍王毎作神變國王祈請以金玉珎寳投之池中在後涌出令僧取之北寺衣食恃龍而濟丗人名曰龍王寺又曰西方不可依山甚寒冬夏積雪山中有池毒龍居之昔五百啇人止宿池側值龍忿怒汎殺啇人槃陁王聞之捨位與子向烏塲國學婆羅門呪四年之中善得其術還復王位就池呪龍龍變爲人悔過向王王乃捨之楚辭曰神龍失水而陸居爲螻蟻之所裁蛟禮記月令曰季秋伐蛟取鼉史記曰劉媪嘗息大澤之陂夢與神遇是時雷電冥晦太公徃視則見蛟龍於其上巳而有身遂産髙祖漢書曰武帝元封五年帝自潯陽浮江親射蛟江中獲之晉書曰周處字子隱義興陽羡人也父魴呉鄱陽太守處少孤未弱冠膂力絶人好馳騁田獵不脩細行縱情肆慾州里患之處自知爲人所惡乃慨然有改勵之志謂父老曰今時和歳豐何苦而不樂耶父老歎曰三害未除何樂之有處曰何謂也荅曰南山白額猛獸長橋下蛟并子爲三矣處曰若此爲患吾能除之父老曰子若除之則一郡之大慶非徒去害而巳處乃入山射殺猛獸因投水搏蛟蚊或浮或沉行數十里而處與之俱經三日三夜人謂之死皆相慶賀處果殺蛟而反家語曰竭澤而漁則蛟不處其淵山海經曰蛟似虵而四脚小頭細頸有白嬰大者十數圍卵生子如一二斛甕能吞人又曰禱過山有虎蛟魚身蛟尾音如鴛鴦淮南子曰蛟龍寢於泉而卵剖陵又曰一淵不兩蛟蛟魚之長其皮有珠今丗以爲刀劒之口是也一說魚二千斤鮫也一捿不兩雄一則定兩則爭以喻日月不得並明一國不可兩君也又曰流源千里深淵百仞非爲蛟龍也又曰山致其髙而雲雨起焉水致其深而蛟龍生焉君子致其道而福禄歸焉又曰君子之居民上若以腐索御奔馬雍容恐失民意若展足薄冰蛟在其下蛟龍屬皮有珠能害人故曰蛟在其下孫卿子曰積水成川蛟龍生焉吕氏春秋曰前有佽飛者得寳劒於干將遂還及渉江至於中流有兩蛟夾繞其舩佽飛仗寳劒曰此中腐骨朽肉也赴江刺蛟殺之荆王聞之仕以執珪馬明生別傳曰明生捕賊爲賊所傷道間見神女以肘後管中一丸藥與服即愈隨女入岱宗山石室金床玉几安期生從六七仙人見神女稱下官請陽九百六之數神女曰自頃四海水減溟湖成山連城之鯨萬丈之蛟不逹斯運之度唯叩天索水辭訟紛紜有於上府三反煩於省察司隂亦疲於謹案矣西京雜記曰瓠子河決有蛟龍從九子自決中逆上人河濆沬流波凢數十里又曰董仲舒夢蛟龍入懷乃作春秋繁露裴淵廣州記曰新寧郡東溪甚饒蛟及時害人曽於魚梁上得之其長丈餘形廣如楯脩頸小頭匈前赭背上青班脇邊若錦㝷陽記曰城東門通大橋常有蛟爲百姓害董奉䟽一符與水中少時見一蛟死浮出博物志曰澹臺子羽賫千金之璧渡河河伯欲之陽候波起兩蛟夾舩子羽左操璧右操劒擊蛟皆死旣濟三投璧於河河伯三躍而歸之子羽毀璧而去又曰荆佽飛渡江兩蛟夾其舩佽飛下劒盡斷其頭而風波静又曰東海上有勇士菑丘訢者過神淵強使飲馬馬沉訢朝服拔劒入水三日三夜殺二蛟一龍而出雷電隨而擊之七日七夜眇其左目韓詩外傳同又曰燕太子丹質於秦見遣而爲機橋於渭將殺之蛟龍夾舉機不得發又曰人食鷰肉者不可入水爲蛟龍所吞王子年拾遺録曰漢昭帝常遊渭水使羣臣漁釣爲樂時有大夫任緒釣得白蛟長三丈若大虵無鱗甲頭有一角長二尺軟如肉焉牙如脣外帝曰此魚䱉之類非珎祥也乃命太官爲鮓骨青肉紫味甚美帝後思之使􅊻者復覔終不得也郭子横洞冥記曰文犀國去長安萬里在日南之南人長七尺𬒳髮至踵乗犀象以爲車舩乗象入海底取寳宿蛟人之舎夕得淚珠則蛟人所泣淚而成珠也亦曰泣珠續齊諧記曰屈原五月五日投汨羅而死楚人哀之毎至此日以竹筒貯粉米祭之漢武建中長沙區回白日怱見一士人自稱三閭大夫謂曰聞君常見祭甚善但常年所遺爲蛟龍所竊若今有惠可以練葉塞其上五色絲縛之此二物是蛟龍所憚說文曰蛟龍屬也魚滿三千六百歳蛟爲之長率魚而飛去㓜童傳曰魏太祖年十歳浴於譙水蛟來逼自奮水擊蛟乃退畢浴而還王韶之始興記曰雲水源有湯泉下流多蛟害厲濟者遇之必笑而没盛弘之荆州記曰襄城北汚水極深有蛟爲害太守鄧遐勇果時人方樊噲抜劒入水蛟遶其足遐自揮劒截蛟數叚流血丹水自此無害劉敬叔異苑曰承陽人李増行經大溪見兩蛟在川引弓射之中一即死増歸因復出市有一女子素服衘涕捉所射箭増怪之問焉荅曰何用問爲若是君箭便以相還授矢而滅増惡而驟返未逹家暴死於路劉義慶幽明録曰晉安帝隆安𥘉曲阿民謝盛乗舩入湖採菱見一蛟來向舩舩廻避蛟又從其後盛便以义殺之懼而還家經年無患至元興中普天亢旱盛與同旅數人歩至湖中見先义在地拾取之云是我义人問其故具以實對行數歩乃得心痛還家一宿便死續捜神記曰長沙有人忘其姓名家住邊江有女子渚次澣紗覺身中有異復不以爲患遂妊身生三物皆如鮧夷提二音魚甚憐異之乃着藻槃水中養之經三月此物遂大乃是蛟子字大者爲當洪次者名破祖小者名揉岸天暴雨水三蛟一時俱出遂失所在後天欲雨此物輙來女亦知當來便岀望之蛟子亦出頭望母良乆方復去經年後女亡三蛟子至其墓所哭之經日乃去聞其哭聲狀如狗號又曰安城平都縣尹氏居在郡東十里日黄屯尹佃舎在焉元嘉二十三年六月中尹兒年十三守舎見一人可年二十許騎白馬張繖及從者四人衣並黄色從東方而來於門呼尹兒來暫寄息因入舎中庭下坐牀一人捉繖覆之尹兒看其衣悉無縫馬五色班似鱗甲而毛有頃雨氣至此人上馬去顧遇尹兒曰明日當更來尹兒觀其去西行躡虚而漸升湏臾雲四合白晝爲之晦暝明日大水暴岀山谷沸涌丘壑淼漫將掩尹舎怱見大蛟長三丈餘盤屈庇其舎頭焉任昉述異記曰夏桀之末宮中有女子化爲龍不可近俄而復爲婦人甚麗而食人桀命爲蛟妾吿桀吉凶之事唐明皇雜録曰開元中有黃門奉使自交廣而至方拜舞於殿下時國毉紀周顧之謂上曰此人腹中有蛟龍明日當産一子則不可活也上驚問黃門曰有疾否曰臣馳馬大庾嶺時當大熱旣困且渴因於路傍飲野水遂腹中堅痞如石周即以消石雄黃煑而飲之立吐一物不數寸其大如指細視之鱗甲具備楚辭曰麋何食兮庭中蛟何爲兮木上螭淮南子曰乗雲車雲雷之車服應龍服轅中也應龍有翼之龍叅青蟉青虬青龍屬絶瑞蓆蘿圖蘿圖車上蓆也雲黃路雲黃所乗路車前白螭白螭先導後賁虵吕氏春秋曰季孫氏刦公家奪公家政事而自專孔子欲論術則見外孔子欲以進而見逺外於是受飬而便說孔子欲受其飬而季子便說魯國以訾孔子訾毀孔子曰龍食乎清而游乎清螭食乎濁而游乎濁魚食乎濁而游乎濁今丘上不及龍下不若魚丘螭耶夫欲立功者豈得中繩哉救溺者濡追逃者趨王子年拾遺録曰崑崙山第三層有螭潭百里多龍螭皆白色千歳一蛻其五藏此潭左側有五色后石云是白螭之膓化爲石楚辭曰乗水車兮荷蓋駕兩龍兮驂螭又曰駕青虬兮驂白螭吾與重華遊兮瑶之圎宋玉髙堂賦曰乗玉于兮駟蒼螭九百三十卷
