front:
  text: 太平御覽卷第一百九十五
  hash: sha256:164ddff38350bd223c7699b87f31ab47f04e2c69d022e171dea4934ecfc09b84
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_195-1a}
body:
  text: 居處部二十三逆旅道路馳道塗阡陌街巷逆旅左氏傳僖公上曰荀息假道於虞曰今虢爲不道保於逆旅以侵弊邑之南鄙史記曰師尚父東就國道宿行遟逆旅之人曰吾聞時難得而易失客寢處安殆非就封者也太公聞之夜衣而行至國萊侯來伐與之爭營丘漢武帝故事曰上甞至栢谷夜投亭宿亭長不内乃宿於逆旅逆旅翁謂上曰汝長大多力當勤稼穡何忽帶劒羣聚夜行動衆此不欲爲盗則淫耳上黙然不應因乞漿飲翁曰吾正有溺無漿也有頃還内上使人覘之見翁方要少年十餘人皆持弓矢刀劒令主人嫗出安過客嫗歸謂其翁曰吾觀此丈夫乃非常人也且亦有備不可圖也不如因禮之其夫曰此易與耳鳴鼓會衆討此羣盗何憂不尅嫗曰且安之令其眠乃可圖也翁從之時上從者十餘人旣聞其謀皆懼勸上夜去上曰去必致禍不如且止以安之有頃嫗出謂上曰諸翁子不聞主人翁言乎此翁好飲酒狂悖不足計也今日具令公子安眠無他嫗因還内時天寒嫗酌酒多與其夫諸少年皆醉嫗出謝客殺雞作食平明上去是日還宫乃召逆旅夫妻見之賜嫗金十斤其夫爲羽林郎自是懲戒希復微行續漢書五行傳曰靈帝數遊戲於西園中令後宮采女爲客舎主身爲啇賈服行至舎采女下酒食因共飲食以爲戲樂東觀漢記曰第五倫自度仕䆠牢落遂將家屬客河東變易姓名自稱王伯齊常與奴載鹽北至太原販賣每所止客舎去輙爲糞除道上號曰道士開門請求不復責舎宿直范曄後漢書曰周防字偉公父楊少孤微常脩逆旅以供過客而不受其報郭林宗別傳曰林宗每行宿逆旅輙躬洒掃及明去後人至見之曰此必郭有道昨宿處也晉書曰桑虞甞行寄逆旅同宿客失脯疑虞爲盗虞黙然無言便解衣償之主人曰此舎數失魚肉雞鴨多是狐狸偷去君何以疑人乃將脯主至山冢間㝷求果得遺脯以衣還虞虞投之不顧說苑曰鄭桓公會封於鄭暮舎於宋東之逆旅逆旅之叟從外來曰客將焉之曰㑹封於鄭逆旅之叟曰聞之時難得而易失也今客之寢安殆非就封者也鄭桓公聞之援轡自駕行十日十夜至即有與之爭封者楚辭七諫曰路室女之方桒路室客舎孔子過之以自侍言孔子岀遊過於客舎其女方採桒一心不視善其貞信故以自侍潘岳客舎議曰尚書勑客舎廢農姧淫亡命敗亂法度皆當除壞十里安一官舎使老小貧民守之又差吏掌主依官舎收錢數春農事興求湏冬閑謹案客舎逆旅乆矣其所由來矣行者賴以頓止居者薄收其直交易貿遷各得其所官無役賦而因民成利惠加百姓而公無所費語曰許由辭帝堯之命而舎於逆旅自唐到今未有不得客舎之法道路爾雅曰廟中路謂之唐一逹謂之道路二逹謂之枝旁三逹謂之劇旁今南陽冠章孫卿數通交錯道路呼之五劇郷四逹謂之衢五逹謂之康六逹謂之莊七逹謂之劇驂三道復一道𡵨出者北海極縣有此道八逹謂之崇期四道交岀九逹謂之逵四者交道岀復有旁通者又曰大路謂之奔說文曰一逹謂之道路又曰馗九逹道也似龜背故謂之馗易曰艮爲徑王廙注曰物始故爲徑路又曰何天之衢道大行也又曰憧憧徃來朋從爾思詩曰道之云逺曷云能來又曰行路遟遟中心有違又曰踧踧周道鞠爲茂草又曰路阻且躋躋升又曰周道逶遟歷逺貌又曰周道如砥貢賦均平又曰有杖之杜行彼周道又曰遵大路兮摻執子之祛兮又關雎兎罝曰肅肅兎罝施于中逵周禮夏官曰合方氏掌天下道路又曰司險掌九州之圖以周知其山林川澤之阻而逹其道路又夏官候人曰各掌其方之道禮記檀弓曰哀公使人弔蕢尚遇諸道於路畫宫而受弔焉哀公魯君也盡宫畫地爲宫象曾子曰蕢尚不如𣏌梁之妻知禮也又月令曰三月開通道路又曰道路男子由左婦人由右車從中央左傳曰公孫閼與潁考叔爭車潁考叔挾輈以走子都拔㦸以逐之及大逵弗及子都怒又曰盟諸王父之衢史記曰文帝行至霸陵愼夫人從上示愼夫人新豐道曰此走邯鄲道也東觀漢記曰逢萌𬒳徴上道迷不知東西云朝所徴我者爲聦明叡智有益於政方面不知安能濟政即駕而歸國語曰夫辰角見而除道故夏令曰九月除道賈逵注曰辰角大辰倉龍之龍角星名也家語曰武王克啇通道于九夷八蠻魏晉春秋曰阮籍有時率意獨行不由徑路車跡所窮輙慟哭而返陸機洛陽記曰宫門及城中大道皆分作三中央御道兩邊築土牆髙四尺餘外分之唯公卿尚書章服道從中道凡人皆行左右左入右出夾道種榆槐樹此三道四通五逹也淮南子曰楊朱見歧路而哭曰可以南可以北又曰聖人之道如衢設罇過者斯酌之博物志曰文王以太公爲灌壇令其年風不鳴條文王夢一婦人甚麗當道哭問其故曰我東山女嫁爲西海婦行必以暴風雨今灌壇令當道有德吾不敢以風雨過也十洲記曰天帝君之城仙眞之人岀道徑自有一路内到鍾山海阿門外天帝君揔九天之維貴無比焉崔豹古今輿服注曰警蹕所以戒徒行蹕路也謂行者警於途路列子曰堯治天下未知其天下治歟不治歟微服遊於康衢聞兒童謡曰立我烝民莫匪尓極任豫益州記曰江油左檐道案圖在隂平縣北於成都爲西其道至阻自北來者檐在左扃不得度檐也鄧艾束馬懸車處郡國志曰雍州軹道在通化門東北十里又曰朱超石與兄書曰洛下道路夲好青槐䕃暎可愛列子曰楊子之隣亡羊旣率其黨又謂楊子之竪追楊子曰亡一羊何追者衆曰多歧路旣反問獲羊乎曰亡之矣歧路之中又有歧焉吾不知所之而反楊子曰大道以多𡵨亡羊學者以多方喪生韓子曰魯以五月起衆爲長溝子路私爲漿飲要作溝者於五甫之衢孔子譏其不知禮也楚辭曰心不怡之長乆憂以之相接惟郢路之遼逺兮江與夏之不可渉古樂府詩曰相逢狹路間道隘不容車古詩曰驅車駕言邁悠悠渉長道馳道史記賈山曰秦爲馳道東窮燕齊南極呉楚江湖之上瀕海之觀畢逹道廣五十歩三丈而樹厚築其外隱以金樵以鐵錐築之隱於靳反樹以青松十里一亭亭有長十亭一郷郷有三老有秩嗇夫游徼三老掌敎化嗇夫職聽頌收賦稅游徼徼循盗賊秦制也漢書曰江充出逢館陶長公主行馳道中充聞之公主曰有太后詔充曰獨公主得行車騎皆不得盡劾没入官充從上甘泉逢太子家使乘車馬行馳道中充以屬吏太子聞之使人謝充曰非愛車馬誠不欲令上聞之以敎勑亡素者唯江君寛之充不聽遂白奏上曰人臣當如是矣大見信用威震京師又曰惠帝爲東朝長樂宮作複道方築髙帝廟南叔孫通曰陛下何築複道髙帝寢衣冠月出遊髙廟奈何令子孫宗廟道上行哉惠帝懼曰急壞之通曰人主無過舉今巳作百姓皆知矣願陛下爲原廟渭北衣冠月游之益廣宗廟大孝夲也帝從之又曰元帝即位成帝爲太子上甞召太子出龍樓門不敢絶馳道至直城門得絶乃度上遟之問其故以狀對上乃令太子𬒳召得絶馳道又曰上居雒陽南宫從複道望見諸將徃徃數人偶語上曰此何語良曰陛下不知乎此謀反耳上曰天下屬安定何故而反良曰陛下與此屬取天下今陛下己爲天子而所封皆蕭曹故人所誅者皆平生仇怨今軍吏計功天下不足以徧封又恐見疑過失及誅故相聚謀反耳上迺憂曰爲將奈何良曰上平生所憎羣臣所共知誰最甚者上曰雍齒與我有故數窘辱我良曰今急先封雍齒以示羣臣則人人自堅矣於是置酒封雍齒爲什方侯而急趣丞相御史定功行封羣臣皆喜曰雍齒且侯我屬無患矣塗易震卦曰震大塗王廙注曰大塗万物所岀論語陽貨曰道聽而塗說德之弃也尓雅曰堂塗謂之陳路依塗吕氏春秋曰孔子用魯三年男行乎塗左女行乎途右財物之遺者民莫之舉司馬相如上林賦曰長塗中宿阡陌史記曰啇鞅相秦孝公壞井田開阡陌漢書游俠傳曰原渉迺大治冢舎周閣重門𥘉武帝時京兆尹曹氏葬茂陵民謂其道爲京兆阡渉慕之迺買地開道立署曰南陽阡人不肯從謂之原氏阡趙書曰佛圖澄建武末卒葬鄴西紫陌先造生墓已數年矣三輔故事曰文王武王周公召公皆葬畢陌南北風俗通曰南北曰阡東西曰陌曹植詩曰東西經七陌南北越九阡陸機詩曰廻渠繞曲陌通波扶直阡街說文曰街四通道也漢書曰張敞無威儀罷朝㑹走馬章臺街瓉曰在長安建章臺下街也郡國志曰雍州司天臺西北有香室街又曰夕隂街在右扶風南東觀漢記曰建武時天下墾田皆不實詔下州郡檢實時州郡各遣使奏事帝見陳留史牘上有書視之云潁川弘農可問河南南陽不可問帝詰史言於長夀街得之漢官典職曰洛陽有二十四街街一亭華氏洛陽記曰兩銅駞在官之南街東西相對髙九尺漢時所謂銅駞街洛陽又有香街三輔故事曰太上皇在長安香街南髙廟在長安城門街東太常街南漢宮殿䟽曰長安有八街九市風俗通曰京師有長壽街万歳街土馬街若此非一街者携也離也四出之路携離而別巷毛詩緇衣曰子之丰兮俟我乎巷兮巷門外也又曰叔于田巷無居人叔于狩巷無飲酒叔適野巷無服馬又曰姜嫄始生后稷誕寘之阨巷牛羊腓字之論語孔子曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂爾雅曰宫中謂之壺漢書曰陳平家貧負郭窮巷以弊席爲門門外多長者車轍晉書曰紀瞻性靜黙少交遊好讀書或手自抄冩凡所著述詩賦牋表數十篇兼解音樂殆其妙厚自奉養立宅於烏衣巷館宇崇麗園池竹木有足賞翫焉丹陽記曰七戰巷者庾亮與蘇峻戰宣陽門外峻𥘉小退㝷復來攻交戰者七亮乃南奔故有此名啇君書曰窮巷多恠曲學多辯也尸子曰舜之方陶不能利其巷也及南靣而君天下蠻夷皆𬒳其福太平御覽卷第一百九十五
