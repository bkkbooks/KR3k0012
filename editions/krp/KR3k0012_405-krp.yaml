front:
  text: 太平御覽卷第四百五
  hash: sha256:17c16b2f5c35ff734d2d7eb9a96cb4b90fef46a97b822794328dbd38eb494c37
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_405-1a}
body:
  text: 人事部四十六賔客尚書大傳曰舜爲賔客禹爲主人于時卿雲聚俊乂集百工相和而歌卿雲尚書洪範曰三八政七曰賔禮賔客無不敬周禮天官上曰太宰之職以八統詔王八曰禮賔小宰以官府之六聮合邦治二曰賔客之聮事凡朝覲㑹同賔客以牢禮之法掌其牢禮委積又曰膳夫凢王祭祀賔客食則徹王之胙爼又春官大宗伯職曰以饗燕之禮親四方之賔客賔客朝聘者也禮記曲禮上曰凢與客入者毎門讓於客客至於寢門則主人請入爲席然後岀迎客客固辭主人肅客而入粛進也進謂導也主人入門而右客入門而左禮記王制曰天子諸侯無事則歳三田一爲乾豆二爲賔客左傳曰襄四曰季武子無適子公彌長而愛悼子欲立之誘於臧紇曰飲我酒吾爲子立之季氏飲大夫酒臧紇爲客爲上賔旣獻臧孫命北面重席新樽絜之召悼子降逆之又昭元曰趙孟叔孫豹曹大夫入于鄭鄭伯兼享之及享具五獻籩豆於幕下趙孟辭私於子産曰武請於冡宰矣乃用一獻趙孟爲客禮終乃宴又昭六曰㑹于黄父謀王室也王室有子朝亂謀定之趙簡子令輸王粟具戍人明年將納王納王於王城也宋樂大心曰我不輸粟我於周爲客二王後後爲賔客若之何使客史記曰孟甞君名文姓田氏父曰靖郭君田嬰使主家待賔客賔客日進名聲聞於諸侯嬰卒文代立是爲孟甞君孟嘗君在薛招致賔客以故傾天下之士食客數千人無貴賤一與文等孟甞君待客坐語而屏風後甞有侍史主記君所與客語問親戚居處客去孟嘗君己使使存問獻遺其親戚孟甞君曽待客夜食有一人蔽火光客怒以飯不等輟食辭去孟甞君起自持其飯比之客慙自刎士以此多歸孟甞君客無所擇皆善遇之人人各自以爲孟甞君親己又曰平原君趙勝者趙之諸公子也諸子中勝最賢喜賔客賔客蓋至者數千人又曰魏公子母忌者魏昭王少子安釐王異母弟也公子爲人仁而下士士無賢不肖皆謙而禮交之士以此方數千里爭往歸之致食客三千人當是時諸侯以公子賢多客不敢加兵謀魏十餘年又曰春申君者楚人也名歇姓黄氏考烈王元年以黄歇爲相是時齊有孟甞趙有平原魏有信陵方爭下士招致賔客以相傾奪輔國權是時楚復彊趙平原君使人於春申君春申君舎之於上舎趙使欲夸楚爲瑇瑁簮刀劒室以珠玉飾之請命春申君客春申君客三千餘人其上客皆躡珠履以見趙使趙使大慙又曰吕不韋陽翟大賈人也秦太子政立爲王尊不韋爲相國是時魏有信陵君楚有春申君趙有平原君齊有孟甞君皆下士喜賔客以相傾不韋以秦之強羞不如亦招致士厚遇之至食客三千人是時諸侯多辯士如荀卿之徒著書布天下不韋乃使其客人人著其聞集論曰吕氏春秋又曰單父人吕公善沛令避仇從之客因家沛焉沛中豪傑吏聞令有客皆徃賀蕭何爲主吏孟康曰主吏功曹也主進文潁曰主歛禮進諸大夫曰不滿千錢坐之堂下髙祖爲亭長素易諸吏乃紿爲謁曰賀錢萬實不持一錢又曰司馬相如字長卿素與臨卭令王吉善吉曰長卿乆客旅遊不遂可來過我舎於是相如後往臨卭中富人卓王孫程鄭相謂曰令有貴客爲具召之戰國䇿曰汙明見春申君候間三月而後得見談卒春申君大說之汙明欲復談春申君曰僕己知先生悉矣汙明慨然曰臣請爲說之君之賢實不如堯臣之能不及舜夫以賢舜事聖堯三年而後乃相知也今君一旦而知臣是君聖於堯而臣賢於舜也春申君曰善乃召門吏爲先生著客籍五日一見漢書曰蒯通見曹相國曰婦人有夫死三日而嫁者有幽居守寡不嫁者足下即欲求婦何取曰取不嫁者通曰然則求臣亦猶是也彼東郭先生梁石君齊之俊士也隱居不嫁未甞卑節下意以求仕也願足下使人禮之曹相國曰敬受命以爲上客又曰公孫弘徒歩數年至宰相封侯於是起客館開東閣以延賢人與叅謀議弘身食一肉脫粟之飯故人賔客仰衣食奉禄皆以給之家無所餘其後李蔡與石慶爲丞相府客館丘墟而己又曰蘇建甞責大將軍至尊重天下之賢士大夫無稱焉願將軍觀古名將所招選者勉之哉青謝曰自魏其武安之厚賔客天子常切齒彼親待士大夫招黜賢不肖者人主之柄也人臣奉法遵職而己何與招士又曰大將軍旣益尊姉爲皇后然汲黯與抗禮或說黯自天子欲群臣下大將軍大將軍尊貴誠重君不可以不拜黯曰夫以大將軍有揖客反不重也大將軍聞愈賢黯大將軍衛青也又曰樓護字君卿爲人短小精辯論聽之者皆竦然與谷永俱爲五侯上客又曰成都侯王啇子邑爲大司馬貴重啇故人皆敬事邑唯樓護自安如舊節邑亦父事之不敢有闕時請召賔客邑居樽下稱賤子上壽坐者百數皆離席伏唯護獨東向正坐又曰鄭當時爲太子舎人毎五日洗沐常置驛馬諸郊請謝賔客以夜繼日常恐不遍年少官薄然其知交皆天下名士又曰鄭當時始與汲黯列爲九卿中廢賔客益少當時死家亡餘財先是下邳翟公爲廷尉賔客亦填門及廢門外可設雀羅後復爲廷尉賔客欲往翟公大署其門曰一死一一生乃知交情一貧一冨乃知交態一貴一賤交情廼見又曰陳遵嗜酒毎大飲賔客滿堂輙関門取客車轄投井中雖有急終不得去又曰張竦免官以列侯居長安貧無賔客時時好事者從之質疑問事論道經書而巳又曰張楷治嚴氏春秋古文尚書門徒常數百人賔客慕之自父黨宿儒皆造門謝承後漢書曰傳賢遷廷尉賢素廉正自掌法官無私賔客袁山松後漢書曰陳蕃遷䂊章在郡下接賔客獨坐一室唯徐孺子來爲置對榻去則懸之及徴爲尚書令送之者亦不岀郭門東觀漢記曰崔瑗愛士好賔客盛修殽膳殫極滋味不問餘産張璠漢記曰孔融拜太中大夫雖居家失勢賔客日滿其門愛才樂士常若不足每歎曰坐上客常滿樽中酒不空吾無憂矣英雄記曰袁紹居雒陽西北陬不妄通賔客非海内知名不得相見魏略曰劉備屯於樊城諸葛亮見備備以諸生意待之坐集旣畢衆賔皆去而亮獨留備亦不問其所言備性好毦時適有旄牛尾與備者備因手自結之亮乃進曰明將軍當復有逺志但結毦而巳備知亮非常人乃投毦而荅由此知亮乃以上客禮之魏志曰蔡邕貴重朝廷常車騎填巷賔客盈里坐聞王粲在門外倒屣迎之蜀志曰簡雍字憲和涿郡人少與先主有舊隨從先主至荆州雍與麋笁孫乹共爲從事中郎常爲談客吴志曰孫權以魯肅諸葛瑾等爲賔客又曰諸葛融每㑹賔合鐏促席問衆客所能或有博弈或有樗蒲投壷於是甘菓繼進清酒徐行融周流觀之終日不倦王隱晉書曰嵇喜爲太僕廐長馮陵知其英俊待以賔友之禮以狀表上宋書曰袁粲字景倩陳郡人閑黙寡言善吟諷獨酌園庭以此自適居負南郭時䇿杖獨遊素寡往來門無雜客文士過見不過一兩人南史曰謝瞻兄晦時宋臺右衛權遇已重於彭城還都迎家賔客輻湊時瞻在家驚駭謂晦曰吾家以逺退爲業汝遂勢傾朝野此豈門户福耶蕭子顯齊書曰謝超宗坐公事免詣東府門自通其日風寒慘厲太祖謂四座曰此客至使人不衣自暖矣超宗旣坐飲酒數甌辭氣横岀太祖對之甚欣抜爲驃騎􅖴議及即位轉黄門郎後魏書曰崔道固爲劉義隆諸子叅軍事使向青州募人長史已下皆詣道固道固諸兄逼道固所生母自致酒炙於客前道固驚起接取謂客曰人家無力老親自執劬勞諸客皆知其兄等所作咸起拜謝其母母謂道固曰我不足以報貴賔汝冝荅拜諸客皆歎美三國典略曰周獲梁俘王褒王克劉㲄宗懔殷不害等至長安太祖喜曰晉氏平吴之利二陸而已今定楚之功羣賢賢畢至可謂過之矣乃謂褒及克曰吾即王氏甥也卿等並吾之舅氏當以親戚爲情勿以去郷分意皆厚禮待引爲賔客尹文子曰康衢長者字僮曰善搏字犬曰善噬賔客不過其門者三年長者恠而問之人以實對於是改之賔客復往淮南子曰客有見人於孚子者客出孚子曰子之客獨有過望我而笑之是慢也談論而不稱師是叛也交淺而言深是亂也客曰望君而笑是公也談論不稱師是通也交淺而言深是忠也故客一體也或以爲君子或以爲小人從視之異說苑曰魏文侯與大夫飲酒使公乗不仁爲觴政曰飲不釂子曜切者浮以大白文侯飲而釂公乗不仁舉白浮君君視而不應侍者曰不仁退君己醉矣公乗不仁曰前車覆後車誡蓋言其危爲人臣者不易爲君亦不易今君己設令令可不行乎君曰善白而飲之以公乗不仁爲上客又曰燕昭王問於郭隗曰寡人地狹民寡齊人削取八城匈奴駈馳樓煩之下以孤之不肖得承宗廟恐亡社禝存之有道乎隗曰帝者之臣其名臣也其實友也覇者之臣其名臣也其實僕也危國之臣其名臣也其實虜也今王將東面目指氣使以求臣則厮役之臣至矣南面聽朝不失揖讓之禮求臣則人臣之臣至矣北面等禮相亢下之以色不乗勢以求臣則朋友之臣至矣西面拘指逡廵而退以求臣則師傳之才至矣王誠欲興道隗請爲天下之士開路於是燕王常置郭隗爲上客三輔決録曰頻陽游殷字季齊𥘉爲郡功曹有童子張旣者時末知名爲郡書佐殷察異之勑旣過家具設賔饌及旣至妻笑曰君甚㪍乎張徳容童昬小皃何異客哉殷曰卿勿怪乃方伯之器也殷遂與論霸王之事饗訖以子楚託之列女傳曰孟甞君食客三千人厨有三列上客食肉中客食魚下客食菜齊市中有乞食人馮煖經冬無袴面有飢色願得上厨又曰漢中楊子拒妻字大英子仲珎有高名常請客母盛爲供具從牎中窺客罷讓之曰吾視汝所交皆不及己此自損之道也後歳餘復請賔客皆耆德秀士母觀之喜曰吾無憂矣華陽國志曰任熈字伯逺開門待賔客朝無少長必有供膳陸績別傳曰孫策在吴張紘爲上客共論四海未安當用武治而平之績年少未坐遥大聲言曰昔管仲相齊桓公九合諸侯一匡天下不用兵車孔子曰逺人不服修文徳以來之今論者不務道徳之術而唯當用武績雖童蒙竊所末安世說曰孫長樂兄弟就謝公宿言至駿雜劉大夫在壁後聽之具聞其論謝公明還問劉昨客何以劉荅曰亡兄未有如此賔客謝深有愧色郭子曰桓大司馬病篤桓温字子元也謝公省病謝安字安石也從東門入桓遥瞩而歎曰吾門中不乆復見如此客蘇州志曰通賢橋東有吴丞相頋雍宅自雍至孟名著四代常居此宅門無雜賔投刺攝齊者不過一時英俊俗說曰謝僕射陶太常詣吴領軍坐乆吴留客作食曰己申使婢賣狗供客比得一頓食殆無復氣可語太平御覽卷第四百五
