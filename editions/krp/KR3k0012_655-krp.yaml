front:
  text: 太平御覽卷第六百五十五釋部三
  hash: sha256:7c64e1d587adf28095e7abff055dba9a7d3fe012b6b9a8e85ed89600c5fa01dc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_655-1a}
body:
  text: 僧玄僧上僧宋書僧道生彭城人㓜而聦悟年十五便能講經及長有異解立頓悟義時人推服元嘉十一年卒於廬山又曰徐湛之爲南兖州刺史招集文士盡遊玩之適時有沙門釋休善属文湛之與之甚厚孝武命使還俗姓湯位至楊州從事又曰沙門慧琳秦郡秦縣人姓劉氏少出家住治城寺有才章兼内外之學爲廬陵王義真所知甞著均善論頗貶裁佛法云有白學先生以爲中國聖人經綸百丗其徳弘矣智周萬變天人之理盡矣道無隱旨教罔遺筌聦迪哲何負於殊論哉有黑學道士陋之謂不照幽冥之途弗及來生之化雖尚虛心未能虛事不逮西域之深也爲主客酬荅其歸以爲六度與五教並行信順與慈悲齊伍論行於丗文帝見論賞之元嘉中遂叅懽要朝廷大事皆與議焉權侔宰相㑹稽孔顗常詣之慨然歎曰遂有黑衣宰相可謂冠履失所矣齊書曰趙僧岩北海人寥廓無常人不能測後忽爲沙門栖遟山谷常挈一壷自隨一旦謂弟子曰吾今夕當死壷中大錢一千以通九泉之路蠟燭一鋌以照七尺之尸至夜而亡時人以爲知命建康實録曰沙門支遁字道林常隱跡東山不遊人事好飬鷹馬而不乗放人或譏之遁曰貧道爱其神駿耳卒後戴安道常經其墓歎曰徳音未逺而拱木巳積盖神理綿綿不與氣運俱盡耳支遁傳云本姓關氏陳留人或云河東林慮人㓜有神理聦明秀徹𥘉至京師太原王濛甚重之曰造微之功不減輔嗣又曰王坦之𥘉與沙門笁法仰甚厚毎共論幽冥報應使要先死者當報其事後經歳師忽來云貧道巳死罪福皆不虚唯當勤修道徳以升濟神明爾言訖不見坦之尋亦病卒梁書曰有惠岩惠議道人並住東安寺學行精整爲道俗所推時闘塲寺多禪都下爲之語曰闘塲禪師窟東安談議林髙僧傳曰攝摩騰中天笁人漢明帝遣郎中蔡愔等徃天笁尋訪佛法於彼見摩騰乃要還漢地明帝甚加賞接於城西門外立精舎以處之漢地有沙門之始也大法𥘉傳未有歸信故藴其深解無所宣述後卒於洛陽騰譯四十二章經一卷𥘉緘在蘭臺騰所住處今雒城西白馬寺是也又曰笁法蘭亦天笁人自言誦經論數萬章爲天笁學者之師時蔡愔旣至蘭與摩騰共契遊化遂相隨而來昔漢武穿昆明池底得黒灰問東方朔朔云不經可問西域胡後法蘭至衆人追以問之蘭云丗界終盡刼火洞燒此灰是也後卒於雒又曰康僧㑹其先康居人吴地𥘉染大法風化末全僧㑹欲使道振江左乃杖錫東遊以吴赤烏十年𥘉達建業營立䒢茨設像行道時吴𥘉見沙門疑爲矯異有司奏曰有胡人入境自稱沙門容服非常事應檢察權曰昔漢明帝夢神號稱爲佛彼之所事豈非其遺風耶即召僧㑹詰問有靈驗否㑹曰如來遷逝忽逾千載遺骨舎利神曜無方昔阿育起塔八萬四千塔寺之興以表遺化也㑹乃㓗齋静室以銅瓶加几燒香禮請三七日果獲舎利權大歎服即爲建塔號建𥘉寺名其地爲佛陁里又曰帛尸梨宻多羅此云告攴西域人呼爲髙座傳云國王之子當承継丗而以國讓弟遂爲沙門宻天姿髙朗風神超邁晉亦嘉𥘉始到中國值亂仍過江上建𥘉寺丞相王導一見而竒之以爲吾之徒也宻常在石子崗東行道頭陁旣卒因葬于此成帝懷其風爲樹刹於塚後有關右沙門來遊乃於家處起寺陳郡謝混賛成其業仍曰髙座寺也又曰釋道安姓衛氏常山扶柳人也形雖不逮於人而聦俊罕儔七歳讀書再覽能誦年至十三出家日誦萬言師敬異之爲受具戒至鄴遇佛圖澄而見嗟賞與語終日因事澄爲師澄講安覆疑難鋒起安挫銳解紛行有餘力後避地南投襄陽時襄陽習鑿齒鋒辯天起籠罩當時其先籍安髙名早以致書通好及聞安至即徃修造旣坐稱言四海習鑿安曰彌天釋道安時人以爲名荅安常注諸經恐不合理乃誓曰若所說不甚違理願見瑞相乃夢見胡道人頭白眉毛長語安云君所注經殊合道理我不入泥洹住在西域當相助弘通可時設食後至逺公乃知和上所夢賔頭盧也以晉太元十年卒年七十二羅什在西國聞安風謂是東方聖人恒遥禮之𥘉安生而便左臂有一皮廣寸許着臂上可得上下之唯不得出手時人謂之爲印手菩薩又曰惠逺姓賈鴈門樓煩人也屇尋陽見廬峯清靖足以息心始住龍泉精舎刺史桓伊乃爲逺又於山東立房殿即東林是也絶塵清信之賔並不期而至鼓城劉遺民豫章雷次宗鴈門周續之新蔡畢頴之南陽宗炳等並弃世遺榮依逺遊止著法性論羅什見而歎曰邊國未有經便闇與理合豈不妙哉逺卜居廬阜三十餘年影不出山迹不入俗每送客常以虎溪爲界焉惠逺集云隆安六年桓玄遣書於惠逺言沙門令致敬王者惠逺荅書論不可致之意又言袈裟非朝廷之服鉢盂非廊廟之器軍國非沙門之像竊所未安遂著沙門不敬王者論五篇一論家二論出家三論出求宗不順化四論躰不兼應五論形盡神不滅著是五論以明出家之法不合同俗以致敬於王者又曰笁道生姓魏鉅鹿人㓜而頴悟聦哲若神𥘉入廬山幽栖七年後還都止青園寺王弘范泰顔延之並挹敬風猷從之問道生曰夫象以盡意得意則忘象言以詮理入理則言息自經典東流譯人重阻多守滯文鮮見圎義若忘筌取魚始可與言道矣於是校閱真俗研思因果廼言善不受報頓誤成佛剖析經理洞入幽微廼說阿闡提人皆得成佛于時大部未傳舊學以爲邪說譏憤滋甚後涅槃大本至于南京果稱闡提悉有佛性與前所說若合符契又曰釋惠觀姓崔清河人十歳便以慱見馳名晚適廬山諮稟惠逺什公入關乃自南徂北訪覈異同詳辨新舊風神秀雅思入玄微時人稱之曰通情則生融上首精難則觀肇第洛陽伽藍記曰融斍寺比丘曇謨最善於釋學講涅槃花嚴僧徒千人天笁國胡沙門菩提流支見其徒禮之號爲苦薩流支解佛義知名西土西土諸夷號爲羅漢流支讀曇謨㝡大乗義章毎彈栺賛歎唱言微妙即爲胡書冩之傳於西域西域沙門常東向遥禮之號爲東方聖人又曰僧肇法師制四論合爲一卷曽呈廬山逺大師大師歎仰不已又呈劉遺民歎曰不意方𫀆復有平叔方𫀆之語出遺民也又曰佛耶舎此云覺明日誦三萬言洞明三藏與羅什法師情好共岀毗婆沙論及四分律爲人髭赤時號爲赤髭三藏談藪曰北齊髙祖多殺戮有稠禪師者以業行著稱箴之曰陛下羅刹化臨水必自見之如其言果見群羅刹在其後於是乃禁断鷹鷂造佛寺断屠殺不食肉又曰汝南周捨清信士也學通内外兼有口才謂沙門法雲曰孔子不飲盗泉之水法師何以捉鍮石香鑪荅曰檀越旣能載纛貧道何爲不執鍮僕射徐孝嗣修緝髙座寺多在𬒳宴息法雲曰法師亦治蕭寺日夕逰此二寺隣椄而不相徃來嗣常謂法師常在髙座不遊髙座寺荅曰檀越旣事蕭門何不至蕭寺又曰魏李恕聘梁沙門重公椄恕曰向來全無𦵔膎户佳切恕父名諧以爲犯諱恕曰短髪粗踈重公曰貧道短髪沙門種類以君交聘二國不辨膎諧重公常謁髙祖問曰弟子聞在外有四聲何者爲是重公應聲荅曰天保寺刹及出向劉孝綽道以此爲能綽曰何如道天子萬福髙僧傳曰三藏法師玄奬陳留人姓陳氏貞觀𥘉肇自咸京誓徃西國窮覽聖迹經六載至摩伽陁城凢十二年備歴聖君龍庭之文就嶺之祕皆研機覩奥矣又造伽葉結集之墟千聖道成之樹䖍心頂禮焚香散花設大施㑹於是五天億衆十八國王獻氈投珠積如山岳咸稱法師爲大乗也及東歸太宗詔留於弘福道塲乃召名徳僧靈潤等二十人譯梵自萻薩戒至摩訶般若㹅七十四部一千三百餘軸法師身長八尺眉目踈朗九所遊歴一百二十八國長阿含經曰凢沙門衣鉢隨身譬如飛鳥四十二章經曰僧行道如牛負深泥中疲極不敢左右頋增一阿含經曰沙門皆草蓐爲床又曰四河入海無復河名四姓爲沙門皆稱釋種無爲經曰沙門有三坐禪爲上軰誦經爲中軰助衆爲下軰道安傳曰𥘉魏晉沙門依師爲姓故姓各不同安以爲大師之本莫尊釋迦乃以釋命氏後獲增一阿含經果稱四河入海無復河名旣懸與經符遂爲永式異僧上晉書曰鳩摩羅什天笁人也丗爲國相父鳩摩炎聦懿有大節將嗣相位乃辭出家東度葱領龜兹王聞其名郊迎之請爲國師王有妹年十二才悟明敏諸國交聘並不許及見炎心欲當之乃逼以妻焉旣而羅什在胎其母慧解倍常及年七歳母遂與俱出家羅什從師受經曰誦千偈義亦自通年十二其母携到沙勒國王甚重之遂停沙勒一年慱覽五經爲性率達不拘小檢專以大乗爲化諸學者共師焉年二十龜兹王迎之還國廣說諸經四逺學徒莫之能杭西域諸國咸伏羅什神雋符堅聞之乃遣吕光率兵伐龜兹謂光曰若獲羅什即馳驛送之光還至涼州聞符堅爲姚萇所害於是竊號河右羅什在涼州積年姚興破吕隆乃迎羅什待以國師之禮甞講經于草堂寺忽下髙座謂興曰有二小兒登吾肩欲鄣湏婦人興以宫女進之生二子焉又曰沙門曇瞿秃髪傉檀時從河南來持一錫杖令人跪曰此是波若眼奉之可以得道或人藏其錫杖曇瞿大哭數聲開目湏臾起而取之咸竒其神異莫能測也後兵亂不知所如又曰佛圖澄天笁人也姓白氏少學道妙通玄術永嘉四年來適洛陽自云百有餘歳常服氣自養能積日不食善誦神呪能役使鬼神以油麻雜茵支塗掌千里外事皆徹見掌中如對面焉腹旁有一孔常以絮塞之毎夜讀書則拔絮孔中出光照于一室又常齋時平旦流水側從腹旁孔中引出五藏六腑洗之還内腹中卒於鄴宫寺復有沙門從雍州來稱見澄西入關石季龍掘而觀之唯有一石而無尸季龍悪曰石者朕也葬我而去吾將死矣明年季龍死梁書曰沙門釋寳誌不知何許也於宋太始中見之出入鍾山徃來都邑年巳五六十矣宋齊之交稍顯靈迹𬒳髪徒跣語嘿不論或𬒳錦𫀆飲啖同於凡俗恒以鏡銅剪刀鑷属柱杖負之好爲懴記所謂志公符是也天監十三年卒將死忽移寺金剛像出置户外語人云菩薩當去旬日無疾而終先是琅瑘王筠至莊嚴寺寳誌遇之與交言歡飲至亡勑令筠爲碑蓋先覺也洛陽伽藍記曰沙門寳公不知何許人也刑皃寢陋心識通逹過去未來預覩三丗發言似䜟不可得解事過之後始驗其實胡太后問以丗事寳公曰把粟與雞喚朱朱時人莫解建義元年后爲爾朱榮所害始驗其言又曰法雲寺西域烏長國胡沙門曇摩羅所立摩羅聦惠利根學窮釋氏至中國即曉魏言及隷書凡所聞見無不通解京都沙門好胡法者皆就摩羅授持之戒行真苦秘呪神驗呪枯樹能生枝葉呪人變爲驢馬見者莫不驚怖西域所賫舎利骨及佛牙經像皆在此寺髙僧傳曰耆域天笁人以晉惠之末至于洛陽見洛陽宫城云髣髴似忉利天宮但自然之與人事不同耳又曰匠此宫者從忉利天來成便還天上矣又曰犍陁勒者夲西域人來至洛陽積年雖敬其風操而終莫能測後謂衆僧曰洛東南有槃鴟山山有寺廟處基摭猶存可共修立衆未之信試遂撿視入山到一處四靣平坦勒示云此山寺基也即掘之果得寺下石基後示講堂僧房處如言皆驗衆咸驚歎因共修立焉又曰釋曇始關中人晉孝武太元末賫經律數十部徃遼東宣化顯授三乗髙句驪聞道之始也義熈𥘉復還關中始足白於靣雖跣渉泥水未常沾濕天下咸稱白足和尚又曰釋法成涼州人十六出家學經律不餌五糓唯食松脂隱居岩穴習禪爲務後小疾便告衆云亡常誦寳積經於是自力誦之始得半卷氣劣不堪乃令人讀之一遍裁竟合掌而卒侍疾十餘人咸見空有紺馬負金棺昇空而逝又曰笁曇猷燉煌人少苦行習禪定逰江左止剡之石城山乞食坐禪後有神見形詣猷曰師威徳旣重來止此山弟子輙推室以相奉天台山懸崖峻峙峯嶺切天古老相傳云上有釋舎得道者居之雖有石槗跨澗而撗石断之自終古以來無得至者猷行至槗所聞空中聲曰知君誠篤今未得度却後十日自當來也猷毎恨不得度石洞開度槁少許覩精舎神僧果如前所說因共燒香中食食畢神僧謂猷曰却後十年自當來此今得住於是而返又曰釋曇諦其先康居人母黄氏晝寢夢見一僧呼黄爲母寄一塵尾并鐵鏤書鎮二枚眠覺見兩物具存因而懷孕生諦諦年五歳以塵尾等示之諦曰秦王所餉母曰汝置何處荅曰不億至年十歳出家學不從師悟自天發後見僧㗉音畧法師㗉曰即先師弘覺法師㗉晚入吴居虎丘寺唐髙僧傳曰萬廻姓張氏閿郷人其形如愚蒙其跡乃神聖苦樂貴賤不關其心歌哭隱顯不恒其性剃髪褐衣遊伽藍年十歳有兄戍遼陽其母憶甚飰僧祈福師忽然裏齋餘出門徑去晚際執兄書至母驚問其由黙然而無對後兄來還言是日萬迴云從家來啖齋餘取書而反始知其靈神焉中宗賜號玄通大居士封雲誨公太平御覽卷第六百五十五
