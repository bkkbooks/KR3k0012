front:
  text: 太平御覽卷第二百九
  hash: sha256:1803d8bc70953cc3145854bc797c43077219eeb60ef031d8e309c6c8a9320e39
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_209-1a}
body:
  text: 職官部七大司馬三公府掾屬大司馬韋昭辯釋名曰大司馬馬武也大揔武事也大司馬掌軍古者兵車一車四馬故以馬名官周禮夏官曰大司馬之職掌建邦國之九法以佐王平邦國平成也制畿封國以正邦國封爲立封立彊爲界設儀辨位以等邦國儀謂諸侯之儀也别尊卑之位進賢興功以作邦國作起也起其勸善樂業之心使不廢也建牧立監以維邦國牧州牧也監監一國謂君也維聮結也制軍詰禁以均邦國語猶窮治也均猶正也施貢分職以任邦國職謂賦稅也任猶事事以其力之所堪也簡稽郷民以同封邦國簡謂比數之以稽猶訓也均守平則以安邦國均之者尊者守大卑者守小也則法也比小事大以和邦國比猶親也使大國親小國小國事大國相合和也以九伐之法正邦國諸侯有違王命則出兵以征伐所以正之尚書曰司馬掌邦政統六師平邦國也毛詩曰圻父圻父司馬也予王之爪牙春秋運斗樞曰黃帝與大司馬容光觀鳯皇銜圖置黃帝前尚書中候曰禝爲大司馬舜爲太尉尚書大傳曰蠻夷猾夏冦賊姦宄則責之司馬韓詩外傳曰故隂陽不和四時不節星辰失度灾變非常則責之司馬河圖録運法曰黃帝坐玄扈閣上與大司馬容光左右輔將周昌等百二十人觀鳯皇銜書家語曰賢能而失官爵功勞而失賞禄士卒疾怨兵弱不用曰不平不平則飭司馬飭謂整攝史記曰楚大司馬景舎帥軍伐蔡蔡侯奉社稷而歸之楚發其賞舎辭曰發誠布令而敵退是王威也相攻而敵退是將威也戰而敵退是衆威也臣不冝以衆威受賞漢書曰元狩四年上命大將軍衛青驃騎將軍霍去病各兵五万騎數十万出塞斬首捕虜有功廼置大司馬又曰董賢爲大司馬是時賢年二十二雖爲三公常給事中領尚書百官因賢奏事單于來朝宴見羣臣上前單于怪賢年少以問上令報曰大司馬年少以大賢居位單于乃起拜賀漢得賢臣又曰孝元王皇后成帝母也家凡十侯五大司馬外戚莫盛焉又曰成帝綏和元年賜大司馬金印紫綬置官屬禄比丞相東觀漢記曰更始欲以近親廵行河北大司徒賜言上第一可用更始以上爲大司馬遣之河北又曰䜟云孫咸征狄命以平狄將軍孫咸行大司馬事後漢書曰丗祖北擊羣賊呉漢常將突騎五千爲軍鋒數先登䧟陣及河北平漢與諸將奉圖書上尊號丗祖即位拜漢爲大司馬又曰上疾瘳召見隂興欲以代呉漢爲大司馬興叩頭流涕固讓曰臣不敢惜身誠虧損聖德不可苟冒至誠發中感動左右帝遂聽之漢官序曰三司之職司馬主兵漢承秦曰太尉武帝改曰大司馬無印綬官兼加而已丗祖改曰太尉呉志曰赤鳥九年秋九月以車騎朱然爲左大司馬衛將軍全琮爲右大司馬晉書曰石苞泰始之初拜大司馬舊叅軍於都督無敬故孫楚抗衡於苞苞以楚傲更相表理故叅軍有敬自楚始也又曰齊王冏之盛也有一婦人詣大司馬府求寄産吏詰之婦人曰我截臍便去耳識者聞而惡之又曰陳騫咸寜初轉大司馬騫因入朝言於帝曰胡列牽弘皆勇而無謀強於自用非綏邊之材將爲國恥願陛下詳之時弘爲楊州刺史不承順騫命帝以爲不恊相搆於是徴弘旣至復以爲凉州刺史騫竊歎息以爲必敗二人後果失羌戎之和皆𬒳宼喪没征討連歳僅而得定帝乃悔之晉武帝太始官名曰大司馬石苞開通爽悟秉意不碎晉公卿禮秩曰司馬兵官也魏氏大司馬大將軍各自爲官在三司上晉以石苞爲大司馬次三司下晉諸公賛曰義陽王爲大司馬時父孚爲太宰父子居上公中代以來未之有也晉中興書曰王猛少貧賤鬻畚爲事常至洛陽貨畚有人於市貴買其畚云家近在此可隨我取直猛隨去忽至深山此人曰且住當先啓道君湏臾猛進見一公踞胡牀頭白侍從十許人有一人引猛云大司馬公可進猛因拜老公公曰王公何縁拜即十倍售畚直遣人送猛出山顧視乃嵩髙山也齊職儀曰大司馬品第一秩中二千石金章紫綬武冠絳朝服佩山玄玉其在少昊則雎鳩氏之任顓頊以司馬主火堯命羲叔爲司馬夏官也虞夏二代以司夏官棄居其職周成王以畢公髙爲司馬楚漢之際曹叅周勃始居其職又曰大司馬府舊爲闕王莽篡位故貶去闕焉後魏書曰安定王休領大司馬髙祖親行諸軍遇休以三盗人徇於六軍斬之有詔救之休執曰陛下將逺親衡霍故親御六師跋渉野次軍行始尓巳有姧竊如其不斬何以息盗詔曰大司馬執憲誠如是但因縁㑹朕王者之體亦時有非常之澤雖違軍法可特原之休乃奉詔髙祖謂司徒誕曰大司馬嚴而秉法君不可不慎於是六軍肅然後周書曰夏官謂之大司馬卿掌邦政以建邦國之九法佐皇帝平邦國大祭祀掌其宿衛廟社則奉犧牲管子曰昔黃帝得大封辨乎四方故使爲司馬又曰凉風至白露下天子命左右司馬全組甲厲士衆傳子曰曹大司馬之勇賁育弗加也曹仁博物志曰太公望爲灌壇令文王夢見婦人當道哭問其故曰吾泰山之神嫁爲西海婦灌壇令當吾道夢覺召太公三日果疾風暴雨文王乃拜太公爲大司馬班彪上事曰元狩六年罷太尉置司馬時議以北軍中候有千人司馬故加之爲大司馬所以別小大司馬之號也三公府掾屬太尉長史應劭漢官儀曰太尉司徒司空長史秩比千石號爲毗佐三台助和鼎味太尉掾汝南先賢傳曰李宣字公休爲太尉黃瓊所辟時寒暑不和瓊見掾屬曰是太尉無德願諸掾有以匡之次及宣宣曰明公𬒳日月之衣居上司之位輔弼天子處諌諍之職未有對楊謇謇之言其所旌命不授巖谷之士小掾私所以於邑廣州先賢傳曰鄧盛字伯眞蒼梧人爲太尉諸曹掾彭城相左尚以贓罪三府掾屬栲驗踰科不竟更選盛覆栲盛到獄洗沐尚解械賜席乃謂尚曰君受國重恩而所坐事理如此今遇君子不可以小人道相待尚感盛至意對曰今使君相於如此尚獨何心敢不以死相歸乎即引筆具對衛玠別傳曰玠字叔寳陳留阮千里有令聞當年太尉王君見而問曰老莊與聖教同異阮曰將無同太尉善其言而辟之爲掾丗號曰三語掾君見而謿之曰一言可辟何假三阮曰苟是天下民望可無言而辟復何假於一言崔寔政論曰且三公天子之股肱掾屬則三公之喉舌天子當恭巳南面於三公三公亦委䇿掾屬以荅天子太尉從事中郎後魏書曰郭景尚字思和渉歷書傳遷太尉從事中郎善事權寵丗呼爲郭尖于寳司徒儀曰從事中郎之職各掌其所治之曹而紀綱其事維正大體叅輔謀議太尉主簿後魏書曰元慶智性貪鄙爲太尉主簿事無大小得物然後判或十錢二十錢得便取之府中號曰十錢主簿廣州先賢傳曰鄧盛字伯直爲秭歸令聞母病解印綬決去太尉馬公嘉其所履服竟辟之初入府爲主簿司徒長史東觀漢記曰呉梁爲司徒長史以清白方正稱于寳晉紀曰傳咸爲司徒長史多所執正齊書曰到撝爲司徒左長史宋丗上數遊㑹撝家同從明帝射雉郊野渴倦撝得早青瓜與上對剖食之上懷其舊德意眄良厚至是一歳三遷梁書曰禇球字仲寳爲司徒左長史加貂自球始也于寳司徒儀曰右長史職掌撿其法憲明其分職司徒掾漢書曰武帝時司徒奏州郡農桑未有賞罰制冝遣掾屬循行詔遂使司徒督察州郡播殖有所循者増掾屬十人謝承後漢書曰虞延辟司徒侯霸府正旦百官朝賀上望見延在公府掾屬中馳小黃門問曰故陳留督郵虞延非耶對曰是遂前召見漢雜事曰陳寵爲司徒掾先是公府掾多不親事但以交接爲務寵常獨親事魏書曰王粲字仲宣年十八司徒掾辟遷黃門不就晉書曰魏舒爲司徒時陳留周震累爲諸府所辟辟書旣下公輙喪亡僉號震曰殺公掾莫有辟者舒固辟之而竟無患識者以此稱其逹命又曰周馥遷司徒左曹掾司徒王渾奏曰馥理識清正有才幹主定九品檢括精詳臣委任責成褒貶允當請𥙷尚書郎許之于寳司徒儀曰掾屬之職敦明教義肅厲清風非禮不言非法不行以訓羣吏以貴朝望各掌其所治之曹鍾離意别傳曰司徒侯霸辟意署議曹掾以詔書送徒三百餘人到河北遭遇隆冬盛寒徒衣𬒳單手足不能復行到弘農縣使令出見錢爲徒作𥜗袴令曰不𬒳詔意曰使者奉詔命寕私行耶出錢便上尚書使者亦當上之光武皇帝得上狀見霸曰所使掾何仁恕爲國用心乎誠良吏也司徒屬東觀漢記曰司徒侯霸辟閔仲叔到與相見勞問之不及政事仲叔曰始𬒳明公辟且喜且懼及奉見明公喜懼皆去所望明公問屬何以爲政羙俗成化以仲叔爲不足耶不當辟也如以爲任用而不使陳之則爲失人是以喜懼皆去便辭而出晉中興書曰殷融字洪逺司徒王導以爲左西屬融飲酒善舞終日嘯詠未嘗以事務自嬰導甚相親恱焉司徒從事中郎晉中興書曰頴川荀組字大章司徒王渾表曰左西屬荀組文義貞素清識見稱冝轉從事中郎陶氏家傳曰迴字恭淵爲大司徒王導從事中郎爲人正直不撓導亦以此重焉每言曰陶中郎有輔佐之才眞國器也司徒諮議叅軍晉中興書曰廬江何充字次道爲司徒王導諮議叅軍後魏書曰李系爲主客郎齊文襄王攝選以系爲司徒諮議叅軍因謂之曰自郎署此所謂不次以卿人才故有此舉耳司徒主簿三國典略曰齊許悙護之子也性識敏速逹於從政嘗爲司徒主簿以能判時人號爲入鐡主簿司空掾魏志曰國淵字子尼太祖辟爲司空掾屬每於公朝論議常直言正色退無私宴又曰太祖爲司空丞相毛玠常爲東曹掾與崔琰並典選舉其所舉用皆清正之士雖時有盛名而行不由夲者終莫得進務以儉率人由是天下之士莫不以廉節自勵雖貴寵之臣輿服不敢過度太祖歎曰用人如此使天下自治吾復何憂哉邴吉別傳曰原字根矩魏武皇帝初爲司空辟署議曹掾請見禮畢上送至門中原辭直去不顧上還語左右孤甚敬此人與其辭逺送之謂其尚顧而終不顧此人誠髙士也人謂曰君冝謝公公望君一日辭不顧揖原勃然曰夫何謝哉夫揖讓者謂其敵耳吾人臣也公人君也君尊臣卑揖讓何施且孔子反命曰賔不顧矣吾何謝哉人以語
