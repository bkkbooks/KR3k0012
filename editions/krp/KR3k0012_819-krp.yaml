front:
  text: 太平御覽卷第八百一十九
  hash: sha256:debe875a57393cd4783e8cad9b04fe76d91e46fbbb1f777005300ca107addbcb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_819-1a}
body:
  text: 布帛部六綿絮牽離紈組納綸縞絺絺巾綿說文曰纊絮緼也禮記玉藻曰纊爲繭緼爲𫀆衣也著之異名也纊謂今之新綿也緼謂今纊及舊絮也又䘮大記曰屬纊以俟絶氣纊今之新綿易動摇置口鼻之上以爲候又内則曰婦事舅姑左佩紛帨箴管線纊施鞶佚左傳宣下曰楚子伐蕭蕭潰申公巫臣曰師人多寒王廵三軍拊而勉之三軍之士皆如挾纊纊綿也言恱以忘寒也謝承後漢書曰徐稚不就諸公之辟及有䘮者萬里赴吊常於家預炙雞一隻以一兩綿絮漬酒中曝乾至門以綿絮置水中候有酒氣以雞置前祭畢便去范曄後漢書曰張奐遺命曰吾前後仕進十腰銀艾不能和光同塵爲讒邪所忌通塞命也始終常也但地下冥冥長無曉期而復纏以綿纊牢以釘宻爲不喜耳今幸有前穿朝殞夕下橫屍露床幅巾而巳晉陽秋曰有司奏依舊調房子睢陽綿武帝不許宋書曰郭原平孝行旣著髙陽許瑶之罷建安郡丞還家以綿一斤遺之不受瑶之乃自往曰今過寒而建安綿好以此奉尊上耳原平乃拜而受之也又曰朱百年隱居山隂家室素貧母以冬月亡衣並無絮自此不衣綿帛嘗寒時就孔凱宿衣悉裌布飲酒醉眠凱以卧具覆之百年不覺引卧具去躰謂凱曰綿定竒温因流涕悲動凱亦爲之傷感齊書曰阮孝緒年十六父䘮不服綿纊雖𬞞食有味亦吐之英雄記曰吕布爲曹公所攻甚急乃求救於袁術術先求布女布恐術爲女不至故不遣救也即以綿纏女身縛着馬上夜自送女出與術太祖守兵相觸格射不得過復還城語林曰謝万就人乞裘云畏寒荅曰君妄語正欲以爲豪具耳若畏寒無復勝綿者以三十斤綿與謝陸氏異林曰鍾繇常數月不朝或問其故云常有好婦來美麗非凢問者曰必是鬼物不可不殺之婦人後往不即前止戸外繇問何以曰公有相殺意繇曰無此勤勤呼之乃入繇有不忍心然猶斬之傷胛婦人即出以新綿拭血竟路明日使人㝷跡至一大塜木中有好婦人形體如生人着白練丹繡兩當傷一脚以兩當中綿拭血酈善長水經注曰房子城西出白土細滑如膏可用濯綿霜鮮雪曜異於常綿世俗言房子之纊也抑亦類蜀郡之錦得江津矣故歲貢其綿以充御府絮史記曰人有上書告周勃反下廷尉薄太后以爲無反事文帝朝太后以冒絮提文帝曰絳侯綰皇帝璽將兵北軍此時不反今居一小縣顧欲反也帝乃出之又貨殖傳曰絮千乗家漢書曰帝以公主爲老上單于閼氏使官者燕人中行說傳公主說旣至因降單于單于愛幸之其得漢之繒絮以馳草棘中衣袴皆裂弊以示不如旃裘堅善也司馬彪續漢書曰光武建武二年野蚕成繭民収其絮東觀漢記曰建初二年詔齊相其止勿復送氷紈方空縠吹綸絮也漢舊儀曰皇后親蚕還獻繭凢蚕絲絮織室作祭服其皇帝得以作縷縫衣皇后間以作巾絮而巳魏志曰曹公定鄴臨祠袁紹墓哭之流涕慰勞紹妻還其家人寳物賜雜繒絮廪食之呉書曰顧悌字子通父亡孫權作布衣一襲皆擘絮着之強令悌釋服晉中興書曰王敦害周顗籍其家政見素簏數枚中有故絮也晉書曰佛圖澄腹傍有一孔常以絮塞之每夜讀書則披絮孔中出光照于一室宋書曰顔竣丁父憂起爲丹陽尹遣中書舎人戴明寳抱竣登車載之郡舎賜以布衣一襲絮以綵綸遣主衣就衣諸體又曰阮長之元嘉十一年除臨海太守在官常擁敗絮齊書曰江革𥙷國子生王融謝朓嘗行還過候革時大寒雪見革弊絮單席而耽學不倦嗟歎乆之又曰卞彬蚤虱賦序曰余之多病起居甚踈縈寢敗絮不能自釋莊子曰宋人有善爲不龜手之藥者世世以洴䌟絖爲事客聞之請買其方百金聚族而謀曰我世世洴䌟絖不過數金今一朝鬻伎百金請與之淮南子曰藡苗類絮而不可以爲絮藡苗藿秀也楚人謂藡又讀音敵古今注曰元帝永光四年東萊郡東牟山有野蚕爲蠒蠒生娥蛾生卵卵着石収得万餘石民人以爲絲絮五年長安雨絮垣屋上皆白民衣之管寜别傳曰管寜性至孝恒布裳貉裘唯祠着單衣絮巾也呉越春秋曰呉王將死曰吾以不用子胥言以至於此死者無知則巳死者有知何靣目見子胥也遂蒙絮覆靣而自刎愽物志曰蜀人以絮巾爲帽絮裴淵廣州記曰蠻夷不蚕採木綿爲絮盧毓兾州論曰房子好綿地産不爲無珎也皇甫規與馬融書曰與𬒳絮一雙以通微心陸雲與兄機書曰一日案行視曹公器物見拭目黃絮有垢黒目淚所沾汚孝子傳曰閔子騫㓜時爲後母所苦冬月以蘆花衣之以代絮其父後知之欲出後母子騫跪曰母在一子單母去三子寒父遂止世說曰王文度在西州與林法師講韓孫諸人並在㘴林公理每欲小屈孫公曰法師今日似着弊絮在荆棘中觸地掛閡牽離說文曰絓蠒滓絓頭也一曰牽離釋名曰煑蠒曰莫莫幙也貧者著衣可以幕絮也或謂之牽離煑熟爛牽引使離散如綿也紈釋名曰紈煥也細澤有光煥然也漢書曰齊俗作氷紈容如氷也又曰齊韓延壽衣黃紈方領又曰白縠衣表薄紈之裏天子之服也東觀漢記曰楚王英奉送黄縑三十五疋白紈五疋入蜀楚相以聞詔書還蜀縑紈以助伊蒲塞桒門之盛饌漢舊儀曰乗輿冠髙山冠飛羽之纓幘赤丹紈裏范子計然曰白紈素出齊魯王子年拾遺録曰􅌡洲有金巒之觀中有瑶几覆以雲紈之素繁欽定情詩曰何以合歡欣紈素三條裠組說文曰組綬屬其小者以爲纓也禮記檀弓上曰有子盖旣祥而絲屨組纓禮記玉藻曰玄冠朱組纓天子之冠也玄冠丹組纓諸侯之冠也又曰弟子縞帶并細約用組又曰天子佩白玉而玄組綬公侯佩山玄玉而朱組綬大夫佩水蒼玉而緇組綬世子佩璆玉而綦組綬士佩瓀珉而緼組綬孔子佩象環五寸而綦綬又少儀曰國家靡弊則車不雕幾甲不組縢幾附纏爲沂鄂也組滕以飾左傳襄三年楚子重伐呉爲簡之師克鳩兹至于衡山使鄧廖帥組甲三百𬒳練三千史記曰秦王子嬰係頸以組降沛公軹道旁漢書曰錦繡纂組害女工穆天子傳曰天子見西王母好獻錦組百純又曰盛姬之䘮叔㛗贈用茵組茵褥也叔姓穆王女墨子曰昔楚莊王鮮冠組纓絳衣愽衮以治其國韓子曰呉起示其妻以組曰子爲我織組令如是組妻織組果善呉起曰非戒也使之衣而歸妻兄請之起曰起家無虚言吕氏春秋曰邾之爲甲常以帛公息忌謂邾君曰凡甲所以爲固者以滿竅也今竅滿矣而任力者半組則不然竅滿則盡任力矣邾君以爲然曰將何所得組公息忌對曰上用之則民爲之矣邾君曰善下令令官爲甲必以組公息忌知說之行也令其家皆爲組人有傷之者曰公息忌之所以欲用組者其家多爲組也邾君不恱於是乎止官無以組邾君有所尤也爲甲以組而便公息忌雖多爲組何損以組不便公息忌雖無爲組亦何益爲組與不爲組不足以累公息忌之說用組之心不可不察劉梁七舉曰華組之組從風紛絃應璩報燕中尉樊彦皇書曰登輿北踐燕路方當化銀龜以爲黃變青組以爲紫又報平陸長賁瑋伯書曰從此辭矣何敢復飛蟬於惠文鳴玉於緺組哉納魏武令曰吾衣皆十歳也歳歳解浣𥙷納之耳魏志曰太祖幃帳壞即𥙷納汲太子妻李氏與夫書曰并緻納一端宋書曰徐逵之尚㑹稽長公主𥘉武帝微時貧過甚常自新洲伐荻有納布衣襖等皆是敬皇后手自作武帝旣貴以此衣付主曰後世若有驕奢不節者可以此衣示之主子湛之爲大將軍彭城王義康所愛與劉湛之等頗相附及劉湛之得罪事連主子文帝大怒將致大辟湛之憂懼無計以告公主公主即日入宫及見文帝因號哭下牀不復施臣妾之禮以錦囊盛武帝納衣擲地以示上曰汝家夲貧賤此是我母爲汝父作此納衣今日有一頓飽食便欲殘害我兒子上亦號哭湛之由此得全南史曰齊張欣㤗爲直閣歩兵校尉領羽林監欣㤗通渉雅俗交結多是名素下直輙著鹿皮冠納衣錫杖挾素琴有以啓武帝帝曰將家兒何作此舉止又曰沙門寳志在建康寳亮欲以納𬒳遺之未及有言寳志忽來牽𬒳而去陳書曰大軍侵魏造陜城魏兵大合輕騎挑戰侯安都瞋目横矛單騎突陣四向奮擊左右皆披靡殺傷不可勝數於是衆並鼓噪俱前魏多縱突騎衆軍患之安都怒甚乃脫兠䥐解所帶鎧唯着絳衲兩襠衫馬亦去具裝馳入賊陣猛氣咆勃所向無當其鋒者莫不應刃而倒綸釋名曰綸倫也作之有倫理也說文曰綸紏青絲綬也禮記曰王言如絲其出如綸王言如綸其出如綍後漢書仲長統書曰井田之變豪人貨殖舘舎布於州郡田畒連於方國身無半通青綸之命而切三辰龍章之服續漢書輿服志曰百石青紺綸一采宛轉繆織長丈二尺東觀漢記曰建初二年詔齊相其上勿復送吹綸絮鄭玄注禮記曰綸今有秩嗇夫所佩也鄴中記曰石虎皇后出女騎一千冬月皆著紫綸巾齊書曰徐龍駒常住含章殿著黃綸帽𬒳貂裘南靣向案代帝書勑世說曰謝万詣簡文無衣幘可前簡文曰但前不湏衣幘即呼使入萬着白綸布而前旣見共談移日孟達與諸葛亮書曰貢白綸帽一以示微意縞尚書禹貢曰海岱及淮惟徐州厥篚玄纎縞玄黑繒也縞白縞也二物皆當細也毛詩緇衣曰出其東門有女如雲縞衣綦巾聊樂我云願室家得相樂禮記王制曰殷人况羽反而祭縞衣而養老又玉藻曰朝服之以縞也自季康子始也左傳襄六曰季札聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉史記曰新城三老董公說漢王以義帝死故漢王遂發䘮臨三日告諸侯曰天下共立義帝北靣事之今項羽攻殺大逆無道寡人親發䘮諸侯皆縞素歸漢韓子曰魯人身善織屨爲履之也而越人縞欲冠之也而越人𬒳髪欲無窮可得乎淮南子曰鈞之縞也一端以爲冠一端以爲絑冠則戴之絑則履之司馬相如子虚賦曰𬒳阿緆緰紵縞阿細繒緆細練也緆音錫緰音臾也曹洪與魏文帝書云我軍入漢中若駭鯨之决細網奔兕之觸魯縞未足以喻其易也締絺巾說文曰絺巾粗葛也絺細葛也縐絺之細者也尚書禹貢曰海岱惟青州厥貢鹽絺周禮地官下曰掌葛掌以時徴絺綌之材于山農禮記月令曰孟夏之月天子始絺又曲禮上曰爲天子削瓜者副之巾以絺副折也旣削又四折乃撗断而巾覆之爲國君者華之巾以綌華中列之不四折也又曲禮下曰縝絺綌不入公門縝單也必表而出爲其也浴用二巾上絺下綌也又檀弓縣子曰綌衰繐裳非吉也非時尚輕凉慢禮毛詩關睢葛覃曰葛之覃兮施于中谷維葉莫莫是刈是穫爲絺爲綌服之無斁又緑衣曰絺兮綌兮凄其以風凄寒風也箋云絺絺巾所以當暑也以待寒諭失所我思古人實獲我心又君子偕老曰蒙𬒳縐絺是紲袢父蕃反也絺之美者爲縐是當暑細袢之服也論語郷黨曰當暑縝絺綌必表而出之縝單也暑月單衣葛爲其形䙝也必有以表之若今單衣出漢書曰江都王建謀反與閩越通越遺建荃葛服䖍注曰細葛也東觀漢記曰耿純字伯山率宗族賔客二千人皆繒䄡絺巾迎上於費上大恱又曰馬嚴爲陳留太守嚴病遣功曹史李龔奉章詣闕上親召見龔問疾病形狀以黃金葛絺賜嚴又曰黃香爲郎召詣安福殿賜錢三萬黄白葛各一端魏武封魏王詔曰今以君爲魏王青絳皂黃白各二疋葛越一端徃欽哉呉曆曰孫䇿送華歆還洛并送布越香葛時多盗賊歆渡牛渚悉封還諸物江表傳曰魏文帝遣使於呉求細葛君臣以爲非禮欲不與孫權勑付使梁書曰任昉卒後子西華冬月着葛帔練裠道逢平原劉孝標泫然矜之謂曰我當爲卿作計後周書曰賀蘭祥梁雍州刺史岳陽王蕭察欽其節儉乃以竹屏風絺綌之屬及經史贈之祥難違其意取而付諸所司太祖後聞之並以賜祥隋書曰袁充少警悟年十餘歳其父黨至門時冬𥘉充尚衣葛衫客戲充曰袁郎子絺兮綌兮凄其以風充應聲荅曰唯絺與綌服之無斁以是大見嗟賞穆天子傳曰天子筮獵苹澤其卦遇訟逢公占之賜之駿馬十六絺紵三十篋帝王世紀曰堯見舜於二宫設饗禮逆爲賔主南靣而問政然後賜以絺衣琴瑟必築宫室封之於虞韓詩外傳曰孔子南逰楚至阿谷有處女珮璜而浣孔子曰彼婦人可與言矣抽絺綌五兩以授子貢曰善爲之辭以觀其辭子貢曰吾北鄙之人也將南適楚於此有絺綌五兩吾不敢置之水浦婦人對曰行客之行嗟然永乆分其資財棄之野鄙吾年甚少何敢取之子不早去竊有狂夫守之者矣說苑曰綿綿之蔓在於曠野良工得之以爲絺絺巾良工不得枯死於野服䖍通俗文曰細葛謂之㲔翅稽康髙士傳曰善卷曰予立宇宙之中冬衣皮毛夏綌葛劉槙瓜賦曰承之雕盤羃以纎絺夏侯孝若大暑賦曰珠汗沾夫絺葛左思呉都賦曰焦葛升越弱於羅紈庾翼與燕王書曰今致細練十端竹練三端王褒聖主得賢臣頌曰服絺綌之凉者不苦盛暑之鬱悒叚氏蜀記曰卭州鎭南蕉葛上者一疋直十千諸葛恢表曰天恩罔極特賜纎絺細竹顔測集大司馬江夏王賜絹葛啓曰氷紈風綌事膺盛服太平御覽卷第八百一十九
