front:
  text: 太平御覽卷第二百四十九職官部四十七
  hash: sha256:b0924fdbf75eae342a13435f9dea0a452c416fd208d7f2a40e5966de0531b146
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_249-1a}
body:
  text: 從事中郎府椽府屬諮議叅軍公府舎人記室叅軍府叅軍從事中郎諸府附魏志曰韓嵩字德髙義陽人少好學貧不改操知丗將亂不應三公之命與同好數人隱居於酈西山中黄巾起嵩避難南方劉表逼以爲從事中郎吴志曰嚴畯字㬅才彭城人也少躭學善詩書三禮避亂江東與諸葛瑾歩隲齊名有善性質純厚其於人物忠告善導志存𥙷益張昭進之於孫權權以爲騎都尉從事中郎晉書曰祖納字士言㝡有操行能清言文義可觀性至孝少孤貧常自炊㸑以養母平北將軍王敦聞之遺其二婢辟爲從事中郎有戲之曰奴價倍婢納曰百里何必輕於五叛皮耶又曰稽紹字延祖方直儒雅爲衛軍從事中郎虞預晉書曰劉隗字大連彭城人學渉有具爲祕書郎避亂南渡遂爲中宗從事中郎甚見器遇何法盛晉中興書曰謝萬少而才器儁秀太宗聞其名取爲鎮軍從事中郎抱朴子曰友人稽君道爲廣州刺史其弟應静爲太傅從事中郎別於襄陽君道泣而應静不泣抱朴子以爲丈夫冝然府掾諸府附史記曰倪寛爲廷尉史爲人温良有廉智張湯以爲長者數稱譽之及湯爲御史大夫而寛爲掾漢書曰陳遵爲公府掾公府掾史率皆羸車小馬不尚鮮明而遵獨極輿馬衣服之好門外車騎交錯東觀漢記曰吴良以清白方正稱東平王蒼辟爲西曹椽數諌正蒼多善䇿蒼上表薦良續漢書曰府掾比古之元士皆三命也漢舊注曰或曰漢𥘉掾史辟皆上言故有祑皆比命士其所不言則爲百石屬其後皆自辟故通爲百石云魏志曰董㝷字文奥爲人忠直爲軍謀掾青龍中上大興宫室羣臣皆負土㝷上書諌曰今臣自知言必死而臣自譬於牛之一毛生旣無益其死何損且比夲不生矣是以發筆流涕心與丗辭臣有八子臣死之後以累陛下魏略曰令狐劭字孔叔在安邑毛城中㑹太祖攻破鄴遂圍毛城城破劭等軰十餘人皆當斬太祖閱見之疑其衣冠也問其祖考而識其父乃解於署軍謀掾蜀志云馬良字季常爲左將軍掾後使吴良謂亮日今衘國命恊穆二家幸爲良介於孫將軍亮曰君試自爲文良即草曰寡君遺掾良通好以紹昆吾豕韋之勲其人吉荆楚之令鮮於造次之華而有克終之美願降心納以慰將命權善待之吴志曰張温父允以輕財重士名顯州郡爲孫權東曹掾晉中興書曰荀闓字道明有清稱京師爲之曰洛中英英荀道明大司馬齊王囧辟以爲掾又曰王珣弱冠而陳郡謝玄俱辟大司馬桓温語人曰謝掾年三十必擁旄仗節王掾當作黒頭公皆未易才也典略曰趙戩除萬年令遂遭三輔亂客荆州劉表以爲賔客是時白衣平原祢衡髙論冠丗來遊京師詆䚹朝士及南見戩歎之曰所謂鐵則干將莫耶木則椅桐梓漆人則顔冉仲弓後辟魏王相國掾殷氏家傳曰殷秦字子平爲大皇帝車騎掾委以書記上歎曰非唯秋兎之毫乃是鷹鸇之爪郭子曰王仲祖謝仁祖同爲王公掾在坐長史云謝掾能作異舞王命爲之謝便起舞神意甚暇王公熟視頋謂諸客曰使人思安豐安豐王戎封也語林曰王藍田少有癡稱王丞相以地辟之旣見無所他問問來時米幾價藍田不荅直張目視王公王公云王掾不癡何以云癡府屬諸府附漢書曰谷永字子雲爲長安吏後博學經書有茂才除𥙷御史大夫屬華嶠後漢書曰陳寵以時俗三府掾屬不肯親事但出入養虚故寵獨勤心於事又以法令繁冗吏得生因縁以致輕重乃置撰科牒辝訟比例使事類相從以塞姧源其後公府奉以爲法魏志曰蔣濟字子通辟丞相主簿西曹屬令曰舜舉臯陶不仁者逺臧否得中望於賢屬又曰胡質字文德少與蔣子通俱知名於江淮間仕州郡濟爲別駕使見太祖太祖問曰胡通逹長者寜有子孫不濟曰有子曰質䂓摹大略不及父至於精良綜事過之太祖辟爲丞相屬臧榮緒晉書云劉沈字道真丗爲北州名族博學好古辟衛瓘屬范亨燕書曰鮮于休有才器伎幹辟爲左光禄大夫曹屬諮議叅軍諸府附齊書曰張岱歴爲三府諮議與典籖主帥共事事舉而情得或謂岱曰主王旣以執事多門而毎能緝和公私云何致此岱曰古人言一心可以事百君我爲政端平待物以禮悔吝之事無由而及明闇短長更是才用之多少耳南史曰栁叔夜年十六爲新野太守甚有名績𥙷遥光諮議叅軍及事敗左右扶上馬欲與俱亡荅曰吾巳許始安以死豈可負之耶遂自殺公府舎人史記曰李斯上蔡人也爲丞相吕不韋舎人漢書曰爰盎字絲楚人也爲將軍吕禄舎人又曰田叔字子仁以壯勇爲衛將軍舎人衛青也後使刺三河奏事稱意爲京輔都尉干寳晉紀云閻纉爲人鯁直不畏強禦𥘉仕爲太傳楊畯舎人記室叅軍諸府附魏志曰太祖以陳琳阮瑀管記室軍國書檄多琳所作鍾㑹以中郎在大將軍管記室事爲心腹之任時人謂之子房吴志曰孫惠以書干東海王越詭其姓名自稱南岳逸民秦祕之勉之以勤王匡丗之略辭義甚美越省書牓題道衢招求其人惠乃出見越即以爲記室叅軍專掌文䟽豫叅謀議毎造書檄越或驛馬催之應命立成皆有辝旨何法盛晉中興書曰王丞少而冲淡弱冠知名太尉王衍雅重之以比南陽樂廣司空東海王越以爲記室叅軍雅相敬重勑子毗曰夫學之所益者淺體之所安者深閑習禮度不如式瞻儀形諷味遺言不如親承音旨王叅軍人倫之表汝其師之又曰殷浩字淵源弱冠與京兆杜乂並有美譽善言玄理論難精微故風流清談皆歸之征西將軍庾亮引爲記室叅軍又曰孔寅字舒元中宗命爲安東叅軍專掌記室時書命殷積寅毎稱職沈約宋書曰孔顗署衡陽王義季記室奉牋固辭曰記室之局實惟華要自非文行秀敏莫敢居之顗學不綜實性又踈惰何可以屬知秘記秉筆文闈假吹之尤方斯非濫三國典略曰顔晃字克明瑯邪臨沂人也少孤貧有詞彩解褐梁邵陵王綸兼記室叅軍時東宫學士庾信常使于府王使晃接對信輕其尚少曰此府兼記室幾人晃荅曰猶少於宫中學士杜龕爲吴興太守專好勇力梁元患之及使晃管其書翰仍謂龕曰顔晃文學之士使相毗佐造次之間必冝諮禀後周書曰郁慶領記室時北雍州獻白鹿羣臣欲草表陳賀尚書蘇綽謂慶曰近代巳來文章華靡逮于江左彌復輕薄洛陽後進祖述不已相公柄民䡄物君職典文房冝製此表以革前弊慶操筆立成辝兼文質綽讀而笑曰枳橘猶自可移况才子也隋書曰魏澹專精好學愽渉經史善屬文詞采贍逸齊愽陵王濟聞其名引爲記室唐書曰李巨川字下巳隴右人國𥘉十八學士道玄之後故相逢吉之姪曽孫父循大中八年登進士第巨川乹符應進士屬天下大亂流離奔播切於禄仕乃以刀筆從諸侯府王重榮鎮河中辟爲掌書記時車駕在蜀賊據京師重榮匡合諸藩叶力殄㓂軍書奏請堆案盈几巨川文思敏速翰動如飛傳之藩鄰無不聳動重榮収復之功巨川之助也典略曰阮瑀字元瑜陳留人以才自護曹洪聞其有才欲使報荅書記瑀不肯榜笞瑀瑀終不屈洪以語曹公公知其無病使人呼瑀瑀終惶怖詣門公見之謂曰卿不肯爲洪且爲我作之瑀曰諾遂爲記室丗說曰太原孫楚字子荆爲大司馬石苞記室叅軍又曰郄超王珣並以儁才爲桓温大司馬所眷珣爲主簿超爲記室叅軍桓時爲荆州超爲人多鬚珣形狀短小于時西人爲之歌曰髯叅軍短主簿能令公喜能令公怒府叅軍諸府附魏志曰張范叅丞相軍事甚見敬重太祖征伐常謂文帝曰舉動必咨此人丗子執子孫禮又曰董昭等謂太祖冝進爵國公備九錫以彰殊勲密以諮荀彧彧以爲太祖夲興義兵以匡朝寜國秉忠貞之誠守退讓之實君子愛人以德不冝如此太祖由是心不平㑹征孫權表請彧勞軍于譙國留彧以侍中光禄大夫持節叅丞相軍事太祖軍至濡湏彧疾留壽春以憂薨時年五十又曰曹休字文烈劉備遣將呉蘭屯下辯太祖遣曹洪征之以休叅洪軍事太祖謂休曰汝雖叅軍其實帥也洪聞此令恒委事於休又曰于禁屯頴隂樂進屯陽翟張遼屯長社諸將任氣多共不恊使趙儼并叅三軍毎事誨諭遂相親睦又曰太祖征馬超文帝留守使程昱叅軍田銀蘇伯等反河間遣將軍賈信討之賊有千餘人請降議者皆以爲如舊法昱曰誅降之意臣以爲不可誅也縱誅之冝先啓聞衆議曰軍事有專無請昱不荅文帝起入特引見昱昱日凡專命者謂有臨時之急呼吸之間者耳今此賊制在賈信之手無朝夕之變故老臣不願將軍行之文帝荅曰君慮之善即白太祖太祖果不誅太祖還聞之甚恱謂昱曰君非徒明於軍計也又善處人父子之間晉書曰魏舒字陽元爲相國叅府朝碎事未甞不見是非至廢興大事衆人旣下意然後徐爲之多出衆議莫不敬從晉王日魏舒堂堂人之領䄂也又曰孫楚字子荆爲佐著作郎叅石苞驃騎軍事楚旣負其才器頗侮易苞𥘉至揖曰天子命我叅卿軍𥘉叅軍不敬府主楚旣輕苞遂制施敬自楚始也又曰李㳙字宣伯容皃簡素頺然若不足者而智度沉邃言必有中髙祖爲大將軍㳙再叅軍上信重之臧榮緒晉書曰庾敳字子嵩叅太傳軍事從子亮少時見敳在太傳府僚佐多名士皆一丗秀異敳處其中常自䄂手晉中興書曰郄超字景興少而卓犖不羈有曠丗之度俶儻髙雋籠盖當時時人爲之語曰楊州獨歩王文度盛徳絶倫郗景興交遊士林毎在勝抜又精於理義大司馬桓温取爲叅軍英氣盖丗罕有所推與超相見常謂不能測也又曰薛兼爲軍祭酒言於中宗曰臣邑人張闓才幹堪任當今之良器願垂引納以綜朝事中宗即召闓爲安東叅軍又曰郭璞爲尚書郎大將軍王敦以璞有術取爲叅軍璞畏不敢辭又曰中宗之爲安東取周訪爲叅軍在散輩中未之識也府進鎮東訪隨例爲叅軍時府叅軍譙國周訪有罪當死誤収訪訪自列無罪而吏不察訪窮蹙乃身自執使仗奮擊収捕數十人皆被創披散訪得逸走歸府聞中宗大驚怒不問格闘之罪又曰蘇峻反范汪逃遁西歸時庾亮温嶠治兵潯陽咸以衆少賊強未敢即路且信使阻絶不相知聞及汪經過嶠等訪焉汪曰賊政令不一貪暴縱横滅亡巳兆雖強易弱朝廷倒懸冝時進討嶠等納之是日護軍平南二府交命始解褐叅護軍事又曰阮孚字遥集咸子也避亂渡江中宗以爲安東叅軍蓬髮飲酒不以王務嬰心又曰鎮南將軍劉弘以陶侃爲長史謂侃曰我昔爲羊太傳叅軍羊公見語云君後當居我身處我今相察亦復然也沈約宋書曰宗越隨栁元景北伐領馬幢主隷栁元怙有戰功在景後還𥙷後軍叅軍督護隨王誕戲之曰汝何人遂得我府四字越荅曰征伐未死不憂不得諮議叅軍誕大笑宋書曰王瞻字明逺一字叔鸞負氣傲俗好貶裁人物仕宋爲王府叅軍甞詣劉彦節直登榻曰君侯是公孫僕是公子引满促膝唯余二人彦節外跡雖酬之意甚不恱梁史曰沈警字丗明惇篤有行業學通左氏春秋家累千金後將軍謝安命爲叅軍甚相敬重警内足於財爲東南豪士無進仕意謝病歸安固留不止乃謂曰沈叅軍卿有獨善之志不亦髙乎警曰使君以道御物前所以懐德而至旣無用佐時故遂飲啄之願耳還家積載以墳素自娱後秦記云姚襄遣叅軍薛瓉使桓温温以胡戲瓉瓉曰在北曰狐居南曰狢何所問也後周書曰梁昕以三輔望族上謁太祖見昕容貌瓌偉深賞異之即授右府長流叅軍文章志云頋凱之字長康愽學有文章性遟鈍爲桓温叅軍甚𬒳親昵温甞語人云凱之體中有癡黠各半合而論之只得平平耳于寳司徒儀曰行叅軍之職掌凡使命及督察覆行之事彈劾𥙷遺獻納聞見以逹視聽丗語曰王子猷作桓温車騎叅軍桓謂王曰卿在府乆此當相斷理𥘉不荅直髙視以手板柱頰云西山朝來致有爽氣又曰郝隆爲桓公南蠻叅軍三月三日作詩不能者罰三升隆𥘉以不能受罰旣飲覽筆便作其一句云娵子瑜反隅躍清池桓問娵隅是何語荅云蠻名魚爲娵隅桓公曰作詩何以爲蠻語隆荅曰千里投君始得爲府叅軍那得不作蠻語魏武選令曰今詔書省司隷官鍾校尉材智决洞通敏先覺可上請叅軍事以輔闇政俗說曰陶夔爲王孝伯叅軍三日曲水集陶在前行坐有一叅軍督護在坐陶於坐作詩隨得五三句後坐叅軍督護隨冩取詩成陶猶更思𥙷綴後坐冩其詩者先呈陶詩經日方成王怪陶叅軍乃復冩人詩陶愧愕不知所以王後知陶非濫遂彈去冩詩者諸葛亮與叅軍掾属教曰任重才輕固多闕漏前叅軍董㓜宰每言輙盡數有諌云雖性鄙薄不能悉納㓜宰叅署七年事有不至至于十反未有忠於國如亮可以少過矣孫綽爲功曹叅軍駮事牋曰綱紀居管轄之任以糺司外内駮議彈射誠無所拘然亦所以献可替否舉直䋲違而巳太平御覽卷第二百四十九
