front:
  text: 太平御覽卷第八百一十四布帛部一
  hash: sha256:a5d095a57fc37583897ac0ae4ca5fb51d775f6642c71e740ae796c272a554de1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_814-1a}
body:
  text: 絲素繒纈綵染絲尚書禹貢曰濟河惟兖州厥貢􅃮絲海岱惟青州厥篚檿絲檿桑絲中琴瑟絃周禮天官下典絲曰典絲掌絲入而辨其物以其賈楬之掌其藏與其出以待興功之時頒絲于外内皆以物受之凡上之賜子亦如之又冬官考工記曰㡛氏湅絲以涗水漚其絲七日去地尺暴之故書涗作湄鄭司農云折水温水也玄謂涗水以灰所湅水也漚漸也楚人日漚齊人曰涹晝暴諸曰夜宿諸井七日十夜是謂水湅禮記月令曰季春之月蚕事旣登分繭稱絲又内則曰子能言敎男唯女俞男鞶絲鞶小囊也男用韋女用繒有飾縁也又曰王言如絲其出如綸又曰少儀曰國家靡幣則君子不履絲幣賦稅亟也左傳隱公曰公問於衆仲曰衛州吁其濟乎對曰臣聞以德和民不聞以亂以亂猶治絲而棼之也絲見棼緼益所以乱春秋考異郵曰四月蚕餌絲毛詩鵲巢羔羊曰羔羊之皮素絲五紽羔羊之革素絲五緎羔羊之縫素絲五総又鵲巢何彼穠矣曰其釣惟何惟絲伊緍又柏舟緑衣曰緑兮絲兮女所治兮又鄘柏舟干旄曰子孑干旄在浚之郊素絲紕之良馬四之又淇澳氓曰氓之蚩蚩抱布貿絲匪來貿絲來即我謀又曰淑人君子其帶伊絲其弁伊騏又絲衣曰絲衣其紑芳浮反二載弁俅俅絲衣祭服也俅音求又曰雖有絲麻無弃菅蒯謝承後漢書曰丹陽方儲爲郎中章帝使文郎居左武郎居右儲正住中曰臣文武兼備在所施用上嘉其才以繁亂絲付儲使理儲抜佩刀三斷之對曰反經任勢臨事宜然袁宏漢記曰郭泰傳童子魏照永入其房供給洒掃泰曰當精義講書何來相近照曰經師易獲人師難遭欲以素絲之質附近朱藍魏略曰文帝欲受禪野蚕成絲晉陽秋曰武帝時有司奏以青絲爲牛靷詔以青麻代之晉書曰吕光竊號河右中書監張資病光博營救療有外國道人羅又云能差資病光喜給賜甚重羅什知又誑詐告資曰又不能爲益徒煩費耳冥運雖隱可以事試也乃以五色絲作绳結之燒爲灰末投水中灰若出水還成繩者病不可愈湏臾灰聚浮出復爲繩又療果無效少日資亡宋書曰諸葛闡上言夫歳時有利害之収而蚕桑有經常之苦機杼居不變之勤而民用有奢儉之異今南至有五絲命縷之服仲夏北至比肆連行糾繩縻無用之工玄黃侵衣章之費飾綵雖貴始無所入尺絶寸分終於捐弃部一邑以推百城其費博矣謹率愚管謂冝禁革後魏書曰幽州刺史張亮𥘉有薛琡夢亮於山上桂絲覺而告亮且占之曰山上絲幽字君爲幽州乎未朞而受管子曰齊桓公伐楚濟汝水踰方城使貢絲於周室墨子見染絲者歎曰染於蒼則蒼染於黄則黄五入則爲五色故染不可不愼非獨染絲治國亦然淮南子曰蚕餌絲則啇弦絶商金聲春蚕吐絲金死故絶也山海經曰歐絲之野有一女子跪樹而歐絲郭璞注曰蚕類也吕氏春秋惠子曰使女工化爲絲不能治絲大匠化爲木不能治木家語曰子張問入官子曰脩身返道故夫女工必自擇絲麻良匠完材賢君選左右論衡曰蚕含絲而商弦絶桉子生而父氣衰新絲旣登故體者自壞耳桓譚新論曰昔神農始削桐爲琴繩絲爲絃以逋神明之徳合天地之叙風俗通曰五月五日色續命絲俗說益人命正部曰皎皎練絲爲藍則青得丹則赤得蘖則黄得泥則黒士緯曰絲俱生於蚕爲繒則賤爲錦則貴神仙傳曰仙人用五色絲作續命幡幡安五色竹林七賢論曰鬲令袁毅爲政貪濁賂遺朝廷以營虚譽遺山濤絲百斤衆人莫不受濤不欲爲異乃受之命内閤之梁上而不用也後毅事露驗吏至濤所濤於梁上下絲巳數年塵埃黄黒封印如𥘉以付吏西京雜記曰公孫弘以元光五年爲國所推上爲賢良國人鄒長倩贈以素絲一禭爲書以遺之曰五絲爲躡倍躡爲升倍升爲緎倍緎爲記倍記爲緵倍緵爲禭此自少之多自微之著也士之立功勲効名節亦復如之勿以小善爲不足脩而不爲也王子年拾遺記曰成王時因祗國致女工一人善織新輕素以五色絲内口中手引而結之則成文錦神仙傳曰園客者濟隂人皃美而良邑人多欲以女妻之客終不娶常種五色香草積數十年服食其實忽有五色蛾集香草之上客収而薦之以布生華蚕焉至蚕時有一女自來助客養蚕亦以香草食之蚕収得蠒百二十枚蠒大如甕每一蠒繰六七日絲乃盡繰訖此女與園客俱去梁四公記曰扶桑國使貢方物有黄絲三百斤即扶桑蚕所吐桑灰汁所煑之絲也帝有金鑪重五十斤係六絲以懸鑪絲有餘力楚辭曰茅絲兮同綜冠履兮共處宋玉釣賦曰夫玄淵之釣也以三尋之竿八絲之綸荀卿蚕賦曰食桑而吐絲前亂而後治嵇康琴賦曰絃以園客之絲徽以鍾山之玉枚乗七發曰龍門之桐高百尺而無枝斬以爲琴野繭之絲以爲絃古樂府歌詩曰羅敷善蚕桑採桑城南隅青絲爲籠繩桂枝爲籠鈎何用識夫壻白馬紫驪駒青絲繫馬尾黄金絡馬頭蔡扈廣連珠曰叅絲之絞以絃琴緩張則撓急張則絶陸凱奏事曰諸曁永安出御絲素釋名曰素樸素也巳織則供用不復加功飾也史記曰蘇代遺燕王書云齊紫敗素而賈十部敗素染以爲紫也東觀漢記曰鄭據建𥘉五年辟司徒府拜侍御史上疏詔書下官府賜據素六十疋漢書儀曰天地鬼神璽皆以武都紫泥封都布囊白素裹漢官儀曰印綬盛以篋篋以緑綈表白素裹魏志曰學者資於人猶藍之染素范子計然曰白素出三輔疋八百孟子曰陳相道許行之言孟子曰許子必種粟而後食乎曰然許子冠乎曰冠曰奚冠曰冠素曰自織之與曰否以粟易之日許子奚爲不自織曰害於耕也韓子曰齊桓公好衣紫國人皆好服之至五素不得一紫事具綵門鹽鐵論曰縞素不能自分於緇墨賢聖不能自治於亂丗班固與弟書云今賷白素三百疋欲以市月支焉宋玉美人賦曰腰如束素徐幹團扇賦曰惟合歡之竒扇肇伊洛之纎素古詩曰新人能織縑故人工織素織縑日一疋織素五丈餘以縑特比素新人不如故班婕妤詩曰新裂齊紈素鮮潔如霜雪裁爲合歡扇團團象明月楊雄荅劉歆書曰天下上計孝㢘及内郡衛卒㑹者雄常把三寸弱翰筆齎油素四尺以問其異方語歸即以鈆㰅次之於鈆槧七念反三十七歲於今矣繒史記曰烏氏倮以繒遺戎王戎王十倍報之帝王丗紀曰末喜好聞裂繒之聲桀爲發繒裂之漢書曰灌嬰睢陽販繒者又曰廣川王去立昭信爲后幸姬陶望卿爲脩美人主繒帛昭信譛望卿日與我無禮衣服常鮮於我盡取善繒丐諸宫人獻帝紀曰是時新遷都宫人多亡衣服帝欲發御府繒以作之李􅔸不欲曰宫中有衣服胡爲復作耶詔賣廐馬百餘疋御府大司農出雜繒二萬疋與所賣廐馬直賜公卿巳下及貧民不能自存者李􅔸曰我邸閣儲跱少乃悉載置其營賈詡曰此上意不可距也􅔸終不從又曰李􅔸時合羌胡數千人先以御物繒綵與之晉書曰單道開燉煌人常衣麤褐或贈以繒服皆不着宋書曰朱百陽居山隂有時出山隂爲妻買繒綵三五事好飲酒遇醉或失之後周書曰梁主蕭巋朝於鄴髙祖與之宴大恱賜雜繒万叚良馬數千疋并賜齊後主妓妾及常所乗五百里駿馬以遺之纈西河記曰西河無蚕桑婦女着碧纈裙上加細布裳且爲戎狄性着紫纈𥜗袴以外國色錦爲袴褶後魏書曰封回爲都官尚書兾州大中正滎陽鄭雲諂事長秋卿劉騰貨紫纈四百疋得爲安州刺史除書旦出晚徃詣回㘴未定問安州興生何事便回曰卿荷國寵恩位至方伯雖不能㧞園葵去織婦冝思方略以濟百姓如何見造問興生乎封回不爲商賈何以相示雲慙失色綵尚書禹貢曰徐州厥篚玄纎縞荆州厥篚玄纁玄黑繒縞白繒纎細也纎在中明物皆當細禮記玉藻曰無君者不貳綵非列綵不入公門列綵正服史記曰通邑大都采千疋比千乗家漢書曰孝文六年遺單于赤綈緑繒各四十疋東觀漢記曰光武起拜朱和建義大將軍賜絳八百疋又曰光武𥘉起義與諸李市弓弩絳衣赤幘謝承後漢書曰陳重同舎郎有歸寜者誤持隣舎郎絳去嫌重取重不申曲直置絳還之去郎還得絳甚愧於重袁山松後漢書曰劉盆子拜竟復從劉仲卿居仲卿爲盆子制絳單衣張璠漢記曰朱儁少孤母以販繒綵爲事同郡周起負官債百萬縣催責之儁竊母帛爲起解債魏志曰景𥘉中賜倭女王蒨絳五十疋紺青五十疋呉書曰陸遜破曹休當還西陵上賜遜繒綵丹􅃮梁書曰張譏㓜䘮母有錯綵經帕母之遺製及有所識家人具以告之毎歳時輙對帕哽噎不能自巳唐書曰武德中太宗平并州悉復故地上恱置酒含章殿宴羣臣極歡遣入御府賜繒綵皆盡重而出韓子曰齊桓公好服紫一國盡服紫五素不得一紫公患之管仲曰君勿衣紫也謂左右曰吾惡紫臭公曰諾三日境内莫有衣紫風俗通曰夏至着五綵辟兵題綵曰游光厲鬼知其名無温疾五采辟五兵也桉取新断織繫户亦此類也丗語曰王經彦偉𥘉爲江夏太守大將軍曹爽附絳二十疋令交市於呉經不納書弃官歸崔寔四民月令日八月清風戒寒趣染綵也摯虞决疑曰古者男子皆衣綵有故乃素服秦漢以來服色轉變令唯朝廷五服用綵裴玄新言曰五月五日集五綵繒謂之辟兵不解以問伏君伏君曰青赤白黒爲之四面黄居中央名曰襞方綴之於複以示婦人養蚕之工也傳聲者誤以爲辟兵李陵與蘇武詩曰有鳥西南飛熠熠似蒼鷹朝發天地隅暮宿曰南陵欲寄一言書託之箋綵繒張載擬四愁詩曰佳人贈我筒中布何以報之流黄素蔡邕女誡曰禮女始行服纁纁絳也上正色也紅紫不以爲䙝服緗緑不以爲上繒貴厚而色尚深爲其堅紐也母丘儉報弟書曰令別致絳二百疋可以供送葬之事染周禮天官下曰染人掌染絲帛凡染春暴練夏纁玄秋染夏官獻功又地官下曰掌染草掌以春秋歛染草之物染草茅蒐橐蘆豕首紫茢之屬以權量受之以待時而頒之權量以知輕重多少時染夏之時又冬官考工記曰鍾氏染羽以朱湛丹秫三月而熾之鄭司農云湛漬也丹秫赤粟玄謂湛讀如斬車帷裳之漸熾也羽所以飾旌旌及王后之車淳而漬之淳沃也以炊下湯沃其熾烝之以漬羽漬猶染也三入爲纁五入爲緅七入爲緇染纁者三入而成又再染以黒則爲緅今禮俗文作爵言如爵頭色也又復再染以黒乃成緇矣禮記月令曰季夏命有司染綵黼黻文章必以法故無或差貸黒黄蒼赤莫不質良無敢詐僞以給郊廟祭祀之服以爲旗章以別貴賤等級之度質正也良善也所用染者當得其眞綵正善爾雅曰一染謂之縓彫絹反再染謂之頳三染謂之纁青謂之䓗黒謂之􅉳漢書王莽傳曰更始元年拜置百官莽聞之愈恐欲外示自安乃染其鬚髪吴録曰九眞移風縣有赤絮膠人規土知蟻穴墾發以木枝挿其中則蟻縁而生􅃮折􅃮以染絮其色正赤宋書曰陶季直五歳喪母哀若成人𥘉母未病令於外染衣卒後家人始贖季直抱之號慟聞者莫不酸感吕氏春秋曰素染於青染於黄五入而五色堯舜三王染於賢聖而治桀紂幽厲染於凶佞而亡博物志曰蕪蘇子染法蕪蘇子一升可染一疋直以水浸之耳釋名曰緗桑葉𥘉生色也廣志曰烏丸與匈奴同俗丈夫婦人爲木幘朱染之如杆盆以沓頭神仙傳曰昌容者啇王女也脩道於常山食逢蔂根二百餘年能致紫草賣與染家得錢以與貧病者環濟要略曰正色有五謂青赤黄白黒也間色有五謂
