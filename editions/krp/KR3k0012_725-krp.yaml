body:
  text: 方術部六卜上說文曰灼龜也象兆之縱橫也周禮天官太宰職曰祀五帝則掌百官之誓戒與其具脩前期十日帥執事而卜日遂戒前期前所諏之日也十日容散齊七日致齋三日執事宗伯太卜之屬也旣卜又戒百官以始齋又春官嘗之日涖卜來嵗之芟卜者問後歲冝芟不獮之日涖卜來歲之戒秋田爲獮卜者問後歲兵冠之備社之日涖卜來歲之稼卜問後歲稼所冝矣又曰太卜掌三兆之法一曰玉兆二曰瓦兆三曰原兆兆者灼龜發於火其形可占者原原田也象似玉瓦原之璺罅是用名之焉其經兆之體皆百有二十其頌皆千有二百又卜師職曰卜師掌開龜之四兆一曰方兆二曰功兆三曰義兆四曰弓兆開開出其占書也經兆百二十體言此四兆者分之爲四部若易之二篇書金滕曰開篇見書是也又曰龜人掌六龜之屬各有名物天龜曰靈屬地龜曰繹屬東龜曰果屬西龜曰靁屬南龜曰獵屬北龜曰若屬各以其方之色與其體辨之上春釁龜祭祀先卜釁者殺牲以血之神之也鄭司農云祭卜其曰與性也又曰占人掌占龜以八筮占八頌以八卦占筮之八故以􅢂吉凶凡卜筮君占體大夫占色史占墨卜人占圻禮記曰正月命有司釁龜策占兆審卦吉凶周禮龜人上春釁龜謂建寅之月曲禮曰凡筮日旬之外曰逺某日旬之内曰近某日喪事先遠日吉事先近日曰假爾泰龜有常假爾泰筮有常侖龜筮辭龜筮於吉凶有常大事卜小事筮卜筮不遇三卜筮不相襲龜爲卜筮爲筮卜筮者先聖王之所以使民信時日敬鬼神畏法令也所以使民決嫌疑定猶與也故曰疑而筮之又檀弓下曰不駘仲卒駘仲衛大犬石碏之族無適子有庶子六人卜所以爲後者曰沐浴佩玉則兆言齊潔則得吉兆也五人皆沐浴佩玉石祁子曰孰有執親之喪而沐浴佩玉者乎不沐浴佩玉石祁子兆衛人以龜爲有知也又禮運曰龜爲前列先知也龜知事情者陳於庭在前又郊特牲曰卜郊受命于祖廟作龜于禰宫尊祖親考之義也受命謂告之退而卜卜之日王立于澤親聽誓命受教諌之義也又曰國君世子生三日卜士負之又玉藻曰卜人定龜史定墨視兆坼君定體視兆所得也又少儀問卜筮曰義與志與義則問志則杏大卜問來卜筮者也義正事也志私意也又曰雜記曰大夫之喪太宗人相小宗人命龜卜人作龜又祭義曰昔者聖人建隂陽天地之情立以爲易易抱龜南面天子卷音衮冕北面雖有明知之心必進斷其志焉示不敢專以尊天也善則稱人過則稱已教不伐以尊賢也立以爲易謂作易易抱龜易官名周禮曰大卜大卜主兆三易三夢之吉又曰表記曰南人有言曰人而無恒不可以爲卜筮古之遺言與龜筮猶不能知也而況於人乎又曰子言之昔三代明王皆事天地之神明無非卜筮之用不敢以其私䙝事上帝言動任卜筮也神明謂群神也是故不犯日月不違卜筮日月謂冬夏至及四時也所不違者日與牲尸也卜筮不相襲也襲因也大事則卜小事則筮也大事有時日大事有事於大神有常時常曰也小事無時日有筮外事用剛日内事用柔曰不違龜筮左傳曰楚伐鄖莫敖曰盍請濟師於王鬪廉曰師克在和不在衆商周之不敵君之所聞也成軍以岀又何濟焉莫敖曰卜之對曰卜以決疑不疑何卜遂敗鄖師於蒲騷又曰初懿氏卜妻敬仲其妻占之曰吉事具筮門又僖上曰初晉獻公欲以驪姬爲夫人卜之不吉筮之吉公曰從筮卜人曰筮短龜長不如從長又僖中曰狐偃言於晉侯曰求諸侯莫如勤王諸侯信之且大義也繼文之業而信宣於諸侯今爲可矣使卜偃卜之曰吉遇黃帝戰于阪泉之兆又曰晉惠公之在梁也梁伯妻之梁嬴孕過期卜招父與其子卜之杜預注日卜招梁太卜也其子曰將生一男一女招曰然男爲人臣女爲人妾故名男曰圉女曰妾及子圉西質妾爲宦女焉又曰夏四月卜郊不從乃免性非禮也諸侯不得郊天魯以周公故得用天子禮樂故郊爲魯常祀猶三望亦非禮也禮不卜常祀而卜其牲日牛卜日曰牲牲成而卜郊上怠慢也望郊之細也不郊亦無望可也又曰衛遷于帝丘卜曰三百年又文下曰邾文公卜遷于繹史曰利於民而不利於君邾子曰苟利於民孤之利也天生民而樹之君以利之也民旣利矣孤必與焉左右曰命可長也君何弗爲邾子曰命在養民死之長短時也民苟利矣遷也吉莫如之遂遷于繹五月邾文公卒君子曰知命也又曰春齊侯戒師期而有疾醫曰不及秋將死公聞之卜曰尙無及期惠伯令龜卜楚丘占之齊侯不及期非疾也君亦不聞令龜有咎二月丁丑公薨又宣上曰郊牛之口傷改卜牛牛死乃不郊又宣下曰楚子圍鄭旬有七日鄭人卜行成不吉卜臨于大宫且巷出車吉國人大臨守陴者皆哭楚子退師又成上曰鼷鼠食郊牛角改卜牛又襄元曰夏四月三卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啓蟄而郊郊而後耕今旣耕而後卜郊冝其不從也又襄二曰鄭皇耳帥師侵衛楚令也亦兼受楚之勑命也皇耳皇戍子孫文子卜追之獻兆於定姜姜氏問繇曰兆如山陵有夫岀征而喪其雄姜氏曰征者喪雄禦宼之利也大夫圖之衛人追之孫蒯獲鄭皇耳于犬丘又曰晉侯還及著雍疾卜桑林見事具樂部又曰鄭石㚟言於子囊曰先王卜征五年先征五年而卜吉凶也征謂廵狩而歲習祥祥習其則行不習則増脩德而改卜又襄五日廬蒲癸王何卜攻慶氏示子之兆曰或卜攻讎敢獻其兆子之曰克見血慶封田于萊陳無宇從文子使召之請曰無宇之母疾病請歸慶季卜之示之兆曰死奉龜而泣乃使歸又昭二曰越大夫常壽過帥師㑹楚子於瑣瑣楚地也聞吳出師薳啓疆帥師從之從吳師也遽不設備呉人敗諸鵲岸廬江舒縣有鵲尾渚楚子以馹至於羅汭馹傳也羅水名吳子使其弟蹶由犒師犒勞楚人執之將以釁皷王使問焉曰汝卜來吉乎對曰吉寡君聞君將治兵於弊邑卜之以守龜曰余亟使人犒師請行以觀王怒之疾徐而爲之備尙克知之龜兆吉吉曰克可知也君若驩焉好逆使臣滋弊邑休怠休解而忘其死亡無日矣今君奮焉震電憑怒憑盛也虐執使臣將以釁皷則吳知所備矣敞邑雖羸若早脩完其可以息師難易有備可謂吉矣且吳社稷是卜豈爲一人使臣獲釁軍皷而弊邑知備以禦不虞其爲吉孰大焉國之守龜其何事不卜一藏一否其誰能常之城濮之兆其報在邲今此行也其庸有報志乃弗殺又昭三曰公卜使王黑以靈姑鉟音丕率吉請斷三尺焉而用之靈姑鉟公旗也斷三尺不敢與君同又昭四曰楚召觀從曰唯爾所欲對曰臣之先佐開卜乃使爲卜尹佐卜人開龜兆又曰初靈王卜曰余尚得天下不吉投龜詬天而呼曰是區區者而不余卑余必自取之民患王之無厭也故從亂如歸又曰吳伐楚陽匄爲令尹卜戰不吉司馬子魚曰我得上流何故不吉且楚故司馬令龜我請改卜令曰魴也以其屬死之楚師繼之尚大克之吉戰于長岸子魚先死楚師繼之大敗吳師又昭六曰初臧昭伯如晉臧㑹竊其寶龜僂句僂句龜所出地名以卜爲信與僭僭吉又定下曰晉車干乘在中牟衛侯將如五氏卜過之龜焦衛侯曰可也衛車當其半寡人當其半敵矣乃過中牟又哀上曰楚子在城父將救陳卜戰不吉卜退不吉王曰然則死也再敗楚師不如死弃盟逃讎亦不如死死一也其死讎乎命公子申爲王不可則命公子結亦不可則命公子啓五辭而後許將戰王有疾庚寅昭王攻大冥卒于城父又曰楚昭王有疾卜曰河爲祟王弗祭事具江部又曰晉趙鞅卜救鄭遇水適火水火之兆占諸史趙史墨史龜皆晉史也史龜曰是謂沈陽火陽得水故沈可以興兵兵陰類也故可以興兵利以伐姜不利子商姜齊姓也子商謂宋伐齊則可敵宋不吉史墨曰盈水名也子水位也名位敵不可于也炎帝爲火師姜姓其後也水勝火伐姜則可史趙曰是謂如川之滿不可游也鄭方有罪不可救也救鄭則不吉不知其他陽虎以周易筮之遇泰之需曰宋方吉不可與也微子啓帝乙之元子也宋鄭甥舅也祉禄也若帝乙之元子歸妹而有吉禄我安得吉焉乃止毛詩曰升彼虚矣以望楚矣望楚與堂景山與京降觀于桑卜云其吉終然允臧龜曰卜違囯必卜之又曰爾卜爾筮體無咎言又曰君曰卜爾萬壽無疆又曰卜筮偕止㑹言近止征夫邇止卜之筮之㑹人占之箋云或卜或筮俱占之言於繇爲近征夫如今近耳又曰我龜旣厭不我告猷卜筮數而瀆龜龜靈厭之不復告其所圖之吉凶言雖不兆占繇不中又曰爰始爰謀爰契我龜又曰考卜維王宅是鎬京維龜正之武王成之又曰哀哉塡寡冝岸冝獄握粟岀卜自何能穀哀我窮盡寡財之民仍有獄訟之事持粟行卜求其勝負從何能得生尚書大禹謨曰枚卜功臣惟吉之從帝曰禹官占惟先蔽志昆命于元龜朕志先定詢謀僉同鬼神其依龜筮恊從卜不習吉又洪範曰七稽疑擇建立卜筮人龜曰卜蓍曰筮乃命卜筮曰雨曰霽龜兆形也有似雨者又有似雨止曰蒙曰驛氣落驛不連屬曰克曰貞曰悔兆相交錯五者卜兆之常法内卦曰貞外卦曰悔凡七卜五占用二衍忒立時人作卜筮三人占則從二人之言汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮汝則從龜從龜從鄕士從庶民從是之謂大同身其康彊子孫其逢吉汝則從龜從筮從卿士逆庶民逆吉卿士從龜從筮從汝則逆庶民逆吉庶民從龜從筮從汝則逆卿士逆吉汝則從筮從筮逆卿士逆庶民逆作内吉作外凶龜筮共違于人用靜吉用作凶又金縢曰旣克商二年王有疾弗豫伐紂明年武王有疾不恱豫二公曰我其爲王穆卜周公曰未可以戚我先生穆敬也戚近也召公太公言王疾當卜吉凶周公言未可以死近我先王相順之辭公乃爲三壇同墠乃卜三龜一習吉習因也以三王之龜卜一相因而吉也又大誥曰寧王遺我大寶龜紹天明即命我有大事休朕卜并吉天休于寧王興我小邦周寧王惟卜用克綏受兹命又洛誥曰予惟乙卯朝至于洛師致政在冬本其春來至洛衆說始卜定都之意我卜河朔黎水我乃卜㵎水東瀍水西惟洛食我使人卜㵎􅬖之閒南近洛吉我又卜瀍水東亦惟洛食伻來以圖及獻卜史記曰宋元王二年江使神龜使於河至泉陽漁者豫且舉網得而囚之置籠中夜而見夢於元王曰我爲江使於河豫且得我我不能去身在患中莫可告語王有德義故來告愬元王召愽士衛平問之平乃援式而起仰天視月之光觀斗所指定日處鄕規矩爲輔副以權衡四維以定八卦相望視其吉凶介蟲先見乃對曰今昔斗壬子宿在牽牛河水大㑹神鬼相謀漢正南北江河固期南風新至江使先來白雲擁漢萬物盡留斗柄指日使者當囚玄服而乘輜車其名爲龜使人問泉陽令取龜獻使者載行岀於泉陽又門正晝無見風雨晦暝雲蓋其上五采靑黃雷雨並起將入端門見於東箱身如流水潤澤有光望見元王延頸而前三步而止縮頭而却復其故處元王見而恠之問衛平平對曰龜在患中而終夕囚王有德義使人活之今延頸而前以當謝也縮頸而却欲亟去也元王曰善哉趣駕送龜母令失期平對曰龜者是天下之寶先得此龜者爲天子且十言十當十戰十勝生於深淵長於黄土知天之道明於上古遊三千歲不岀其域安平靜正動不用力壽蔽天地莫知其極與物變化四時變色居而自匿伏而不食春蒼夏黄秋白冬黑明於陰陽審於刑德先知利害察於禍福以言而當以戰而勝王能寶之諸侯盡服王勿遣也王大恱於是向日而謝再拜而受擇日齋戒甲乙最良乃刑白雉以血灌龜於壇中央以刀刳之身全不傷脯酒禮之横其腹腸荆支卜之必制其瘡程達於理文相錯迎使工占之所言盡當又曰沛父老率子弟共殺沛令開城門迎劉季欲以爲沛令父老皆曰平生所聞劉季奇恠當貴且卜筮莫如劉季於是乃立爲沛公又曰陳平等遣人迎代王欲立爲帝代王卜之龜卦兆得大横占曰大横庚庚余爲天王夏啓以光曰寡人固已爲王矣又何王卜人曰所謂天王廼天子也又曰常以月旦祓龜先以淸水澡之以卵祓之乃持龜而遂之若常己卜不中皆祓之以卵東鄕立居取生荆枝及堅木堅木枝燒之斬取熱處以灼龜所卜處灼以荆若卵指之者三持龜以卵周環之祝曰今日吉謹以梁卵祓去玉靈之不祥玉靈必信以誠知萬事之情辯兆皆可占不信不誠則燒玉靈揚其灰以懲後龜又曰竇皇后弟廣國字少君年四五歲時家貧爲人所略賣至冝陽爲其主入山作炭寒卧岸岸崩獨得脫下死自卜數日當爲侯又曰司馬季主楚人也卜於長安東市宋忠爲中大夫賈誼爲愽士俱出洗沐相從論議誦習先王聖人之道術究徧人情相視而歎賈誼曰吾聞古之賢人不居朝必在卜醫之中今吾巳見三公九卿朝士大夫皆可知矣試之卜數中觀采其人二人卽同與之市游於卜中天新雨道少人司馬季主閒坐弟子三四人侍方辨天地之道日月之運陰陽吉凶之本二大夫再拜謁司馬季主季主觀其狀貌類有道者卽禮之使弟子延之坐坐定司馬季主復理前語分别天地之終始日月星辰之紀差次仁義之際列吉凶之符語數千言莫不順理宋忠賈誼瞿然而悟獵纓正衿危坐曰吾望先生之狀聽先生之辭小子竊觀於世未嘗見也今何居之卑何行之汙也司馬季主捧腹大笑曰觀大夫之貌類有道術者今何言之陋也何辭之野也今夫子所賢者誰也所高者何也公何以卑汙長者乎二君曰尊官厚禄之所高也賢材處之今所處非其地故謂之卑言不信行不驗取不當故謂之汙夫卜筮者世之所賤簡也世皆言曰夫卜者多言誇嚴以得人情虚髙人禄命以說人志擅言禍災以傷人心矯言鬼神以盡人財厚求拜謝以私於已此吾之所恥故謂之卑汙也司馬季主曰公且安坐公見夫被髮童子乎日月照之則行不照則止然問日月疵瑕吉凶則弗能理也今夫卜者必法天地象四時順於仁義分策定卦旋式正棊然後别天地之利害事之成敗昔者先王定國必先龜策日月而後乃敢代也正時日乃後入家産子必先占吉凶後乃有之自伏犧作八卦周文王演三百八十四爻而天下治越王勾踐倣周文王八卦以破敵國霸天下由是觀之卜筮有何負哉且夫卜者掃設坐位正其冠帶然後乃言事此有禮也言鬼神或以饗忠臣以事其上孝子以養其親慈父以畜其子此有德者也而以義置數十百錢病者或以愈且死或以生患或以勉事或以成嫁子娶婦或以養生此之爲德豈直數十百錢哉此老子所謂上德不德是以有德今夫卜筮者利大謝少老子之言豈異於是乎莊子曰君子内無飢寒之患外無劫奪之憂居上而敬居下而不爲害君子之道也今夫卜筮者之爲業也積之無聚委藏之不用府庫徙之不用車輜負裝之不重止而用之無盡索之時持不盡索之物游於毋窮之世雖莊氏之行未能増也子何故而云而可卜哉天不足西北星辰西北移地不足東南以海爲池日中必移月滿必虧先王之道乍存乍亡公責卜者言必信不亦惑乎公見夫談士辨人乎慮事定計必是人也然不能一言說人主意故言必稱先王語必道上古慮事定計飾先王之成功語其敗害以恐憙人主之志以求其欲多言誇嚴徐廣曰一作險莫大於此矣然欲强國成功盡忠於上非此不立今夫卜者導惑教愚也夫愚惑之人豈能以一言知之哉言不厭多故騏驥不能與罷驢爲駟鳯皇不與燕雀爲羣而賢者亦不與不肖者同列故君子處卑隱以避衆自匿以避倫微見德順以除衆害以明天性助上養下多其功利不求尊譽公等喁喁者也何知長者之道乎漢書曰谷口有鄭子眞蜀有嚴君平皆脩身自保非其服弗服非其食弗食成帝時元舅大將軍王鳳以禮聘子眞子眞遂不詘而終君平卜筮於成都市以爲卜筮賤業以惠衆人有邪惡非正之問則依蓍龜爲言利害與人子言依於孝與人臣言依於忠各因其勢道之以善又曰張禹字子文父徙家蓮勺上音輦下音酌禹爲兒數隨家至市憙觀於卜相者前乆頗曉其別蓍布卦意時從旁言卜者愛之又奇其面貌謂禹父是兒多知可令學經及禹至長安學從沛郡施讎受易謝承後漢書曰姜肱桓帝時再以玄纁聘不就卽拜太中大夫詔書至門肱使家人對云乆病就醫遂羸服閒行竄伏靑州界中賣卜給衣召命得斷家亦不知其處厯年乃還又曰田戎擁衆夷陵聞秦豐被圍懼大兵方至欲降而妻兄辛臣諌戎曰今四方豪傑各據郡國洛陽地如掌耳不如按甲以觀其變戎不從乃留辛臣守夷陵自將兵㳂江泝沔止黎丘刻日當降而辛臣於後盜戎珍寶從閒道先降於岑彭而以書招戎戎疑必賣已乃灼龜卜降兆不吉中折遂止不降又曰范丹字史雲朝議欲以爲侍御史因遁身逃命於梁沛之閒徒行弊服賣卜於市魏志管公明傳曰洛中有一小人夫婢輅爲卦教明旦東明城門中倒擔豚人牽與共鬪具如其言豚逸走卽追之豚入人舎突破主人甕婢從甕中出輅在田舎時嘗候遠鄰主人患失火輅卜教使明日於陌上伺有一角巾書生駕黑牛故車必引留宿此能除之卽從輅語得書生遂留宿意甚不安主人罷入生乃抱刀出門薪積歘有一小物直來如獸手中持火以口吹之生舉刀斫斷腰視之狐也自此無復火災太平御覽卷第七百二十五
