front:
  text: 太平御覽卷第三百九十四
  hash: sha256:ba8939316c3a1e22dd9c6ebea4d27864d20563fa74532be266798af0668d2e20
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_394-1a}
body:
  text: 人事部三十五行歩趨走跳蹲行易困卦曰臋無膚其行趑趄毛詩谷風曰行道遲遲中心有違遲遲舒行㒵又黍離曰彼黍離離彼稷之苗行邁靡靡中心搖搖又載驅曰汶水湯湯行人彭彭又我行其野曰我行其野蔽芾其樗昬􅊚之故言就爾居又蟋蟀枤杜曰獨行蝺蝺禮記仲尼燕居曰行則有隨行而無隨則亂於塗也又王藻曰君與尸行接武尊者尚徐蹈半迹大夫繼武迹相及也士中武迹間容迹端行頥霤如矢弁行剡剡起屨凡行容惕惕直疾㒵也凡行謂道路也左傳襄五曰衛獻公使與寗喜言寗喜告蘧伯玉伯玉曰瑗不得聞君之岀敢聞其入遂行從近關岀論語述而曰子曰三人行必有我師焉史記曰伍子胥曰爲我謝申包胥吾日暮途逺吾故倒行而逆施之譬如人行前塗尚逺日勢巳暮在㒹倒疾行何得責吾順行禮漢書曰袁盎使吴見守從史適在守盎校爲司馬司馬曰君第去臣亦且亡辟吾親君何患廼以刀决帳盎解節旄履歩行七十里着屐歩行而逃亡吴書曰孫䇿討山越斬其渠帥悉令左右分行逐賊獨騎與虞翻相得山中翻曰危事也令䇿下馬此草深卒有警急馬不及人翻善用矛請在前行得平地勸䇿乗馬䇿曰卿無馬奈何荅曰飜能歩行日可三百里明府試鞭馬翻能䟽歩屬之東方朔別傳曰武帝問朔曰公孫丞相倪大夫等先生自視何與此哉朔曰臣觀其臿齒牙樹頰胲音改吐脣吻擢項頥結股肱連脽音誰凥逶虵其迹行歩偊旅臣朔雖不肖尚兼此數子神仙傳曰黄盧子者姓葛名越年二百八十歲行及走馬王眞者上黨人也年十七八乃學道服食胎息之術行及走馬力兼數人河上公者莫知其姓名也又能行及走馬頭上常有五色氣髙丈餘孔安者魯人也行氣服鈆丹有陳和者樂安人也重之求事安遂受其方合藥服之二百餘年頭色轉黒氣力百倍行及走馬也列仙傳曰沈建者丹陽人也丗爲長史建獨好導引服食之術一日行五百里能舉千斤葛仙公別傳曰孫堅欲害仙公馳馬徃遂見仙公徐行逐之不及歩釋名曰徐行曰歩歩捕也如有所司捕務安詳也爾雅曰堂下謂之歩禮記王制曰古者以周尺八尺爲歩今以周尺六尺四寸爲歩又祭義曰故君子跬歩而弗敢忘孝也漢書曰息夫躬曰匈奴飲馬於渭水邊境雷動四野風起京師雖有武􅑣音鋒精兵末有能窺左足而先應者也窺音跬丰歩曰跬歩也言一舉足也又曰蔡義河内温人也以明經爲給事大將軍幕府家貧常歩行禮不逮衆門下好事者相合爲義置犢車令乗之又曰盖寛饒爲人剛直髙節家貧俸禄數千半以給吏人爲耳目爲司隷常歩行續漢書曰李固少有儁才雅志好學爲三公子常躬歩行驅驢負書從師范曄後漢書曰楊震轉涿郡太守子孫常𬞞食歩行魏志曰崔林字德儒清河東武城人也除鄢陵長家貧無單車疋馬歩行之官莊子曰壽陵餘子學歩於邯鄲未得其能失其故歩匍匐而歸以此効彼兩失之白虎通曰人踐三尺法天地人也再舉足爲歩備隂陽也郭子曰王丞相拜司空廷尉作兩角髻葛裙柱杖臨路邊窺之歎曰人言阿龍超導小名赤龍阿龍故自超不覺歩至䑓門方言曰半歩爲跬丗說曰阮宣子常歩行以百錢桂杖頭至酒店上便獨酌酣暢趨說文曰趨低頭疾行也赴直行也釋名曰疾行曰趨趨赴也赴所斯也毛詩魚藻曰綿蠻黃鳥止于丘隅豈敢憚行畏不能趨禮記曲禮曰遭先生於道趨而進正立拱手不與之言則趨而退又曰帷薄之外不趨堂上不趨執玉不趨論語郷黨曰没階趨進翼如也爾雅曰門外謂之趨漢書曰上欲自擊陳周昌泣曰始皇攻破天下未曽自行今上行是無人可使者乎上以爲愛我賜入殿門不趨又曰萬石君諸子入里門趨至家走釋名曰疾趨曰走走奏也促有所奏至禮記玉藻曰凡君召以三節二節以走一節以趨節所以明信也使使召臣急則持三緩則持一周礼曰鎮圭以檄守其餘末聞也如今漢使者持之節左傳僖下曰衛叔武將沐聞君至而喜捉髮走出前驅射而殺之又昭七年曰荀躒以晉侯之命唁公且曰寡君使躒以君命討於意如意如不敢逃死君其入也公日君惠顧先君之好施及亡人將使歸糞除宗祧以事君則不能見夫人已能見夫人有如河夫人謂季孫也荀躒掩耳而走公羊傳定公曰陽虎竊寳玉而走又哀公曰齊景公謂陳乞曰吾欲立舎何如陳乞曰君欲立臣請立之陳乞欲言不可恐景公殺陽生陽生曰吾聞子將不立我也陳乞曰吾不立子者所以生子也與之玉節而走之節信也折王與陽生爲後當迎之爾雅曰中庭謂之走史記曰周昌常入奏事髙帝方擁戚姬昌還走帝逐得騎昌項問曰我如何主也昌仰曰桀紂主也東觀漢記曰上降頴陽雖得入意不安門下有擊馬着皷者馬驚硠音郎礚音搕鄧晨起走出視之乃馬也魏略曰曹眞字子丹沛郡人夲姓秦養曹氏或云其伯父南宿與太祖善共平袁術部黨與太祖相攻刼太祖出爲寇所追走入秦氏伯南開門受之寇問所在荅云我是寇遂害之由此太祖思其功遂變其姓江表傳曰陸遜破劉備於夷陵備捨舡歩走燒皮鎧以斷道使挽車走入白帝晉書曰陳安字虎侯驍壯果毅武幹過人多力善射持七尺刀貫甲奔及馳馬又曰唐彬字儒宗魯國鄒人也少便弓馬好遊獵身長八尺走及奔鹿強力絶人後魏書曰伊馛扶拂切代人也少而勇徤走及奔馬善射多力曳牛却行趙書曰劉靈陽平人也年二十餘常厮役於縣走及馳馬前秦録曰符堅大敗爲流矢所中遁走甚飢民有進壷飱豚髀者堅食之大恱隋書曰麦鐡杖始興人也驍勇有膐力日行五百里走及奔馬毎以漁獵爲事不治産業吴越春秋曰慶忌僚子也勇爲人所聞走及奔馬吴氏春秋曰今與驥俱走則人不勝驥矣居其車上則驥不勝人又曰有莘氏女子採桑得嬰兒於空桑之中獻之其君令養之察其所以然曰其母居伊水之上孕夢神告曰臼出水而東走千里邑盡爲水身化爲空桑故命之曰伊尹戰國䇿曰昔曽參處費魯人有與曽參同姓名者殺人人告其母曰曽參殺人曽參母投杼踰牆而走楚漢春秋曰淮隂武王反上自擊之張良居守上躰不安卧輼車中行三四里留侯走東追上簮墮𬒳髮及輼車排户曰陛下即弃天下欲以王葬乎以布衣葬乎上罵曰若翁天子也何故以王及布衣葬乎良曰淮南反於東淮隂害於西恐陛下倚溝壑而終也莊子曰藏舟於壑藏山於澤謂之固矣然則夜半有力者負之走而昧者不知荀卿子曰伯禽將歸國周公謂之曰君子力如牛不與牛爭力走如馬不與馬争走智如士不與士争智淮南子曰漁者走淵木者走山又曰躄者見虎不走非勇也又曰飛不以尾挫尾則飛不能逺走不以手縳手則走不能疾抱朴子曰柠木實之赤者餌之一年老者少昔道士梁湏年七十服之年百三十歲能夜讀書走及馬柠丁吕切又音楮丗說曰鍾㑹撰四夲論始畢甚欲使嵇公見一置懷中旣詣定畏其有難不敢相示因出户遥擲靣便走俗說曰桓公豹奴善騎乗亦有極快馬時有一諸葛郎自云能走與馬等桓車騎以百疋布置埒頭令豹奴乗與諸葛竟走先至者得布便俱走諸葛常與馬齊欲至垀頭去布三丈許諸葛一跳坐布上遂得之魯女生別傳曰魯女生長樂人也少好學道𥘉服餌胡麻乃永絶榖八十餘年日更少壯面如桃花日行三百里走及麞鹿跳釋名曰跳條也如草木枝條務上行也左傳僖下曰魏犫束匈見使者曰以君之靈不有寜也距躍三百曲踊三百距躍超越也曲踊跳踊也崔鴻十六國春秋前趙録曰劉翌驍幹過人能一手舉殿柱跳過平陽門出神仙傳曰壷公者不知何許人也從逺方來賣藥得錢與飢凍者常懸一壺於坐上日入後跳入壷市掾費長房於樓上見之知非常人身爲掃除并進餅餌公令房共跳入壷中但見樓觀重門侍者數十人蹲王隱晉書曰王長文字德叡州辟別駕不就追求之乃於成都賣熟市見長文蹲地齧胡餅州知不屈乃送還家山海經曰大荒之外有大人之堂有一大人踆其上張其兩臂踆古蹲字郭璞遊仙詩曰安見山林士擁膝對巖蹲王褒僮約曰奴入市不得夷蹲旁卧悪言醜罵太平御覽卷第三百九十四
