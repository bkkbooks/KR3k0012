front:
  text: 太平御覽卷第三百九十
  hash: sha256:7a01aeb715d28f7ff3d1cb87bbe11e95680ab97e1458620278f4df5ed0319ab2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_390-1a}
body:
  text: 人事部三十一言語說文曰直言曰言語議曰語釋名曰言宣也宣彼此之意也語叙也叙巳所欲說述也易繫辭曰同心之言其臭如蘭又曰子曰書不盡言言不盡意又曰君子出其言善則千里之外應之况其迩者乎出其言不善則千里之外違之况其迩者乎言出乎身加乎民行發乎迩見乎逺言行君子之樞機樞機之發榮辱之主也又曰將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈又少儀曰言語之羙穆穆皇皇又中庸曰故君子語大天下莫能載焉語小天下莫能破焉君子言頋行行頋言也又表記曰天下無道則言有枝葉又曰子曰事君大言入則望大利小言入則望小利大言可以立大事小言可以立小事立謂君受故君子不以小言受大禄不以大言受小禄又緇衣曰子曰王言如絲其出如綸王言如綸其出如綍故大人不倡遊言逰浮也不可用之浮也可行也不可言也君子弗言也可言也不可行也君子弗行也則民言不危行而行不危言也左傳僖中曰介子推曰言身之文也身將隱矣焉用文之求顯也又襄四年曰仲尼曰言以足志文以足言足猶成也不言誰知其志言之無文行而不逺左傳昭公曰晉叔向適鄭鬷薎惡欲觀叔向從収器者立於堂下一言而善叔向聞之曰必􅎦明也又定上曰鄭子太叔卒晉趙簡子爲臨甚哀曰黄父之㑹賈逹解曰黄父㑹在昭五年夫子語我九言曰無始亂無爲乱始無怙冨無恃寵無違同無慠禮無驕能無復怒無謀非德無犯非義又哀上曰呉舎衛侯衛侯歸効夷言子之尚㓜曰君必不免其死於夷乎執焉而又說其言從之固矣論語曰詩三百一言以蔽之曰思無邪又曰君子欲訥於言而敏於行又曰定公問一言而可以興邦有諸孔子對曰言不可以若是其幾也人之言曰爲君難爲臣不易如知爲君之難也不幾乎一言而興邦乎又曰言語宰我子貢又曰群居終日言不及義好行小恵難矣哉又曰君子不以言舉人不以人廢言又曰有德者必有言有言者不必有德又曰可與之言而不與言失人不可與言而與之言失言智者不失人亦不失言又曰侍於君子有三愆言未及之而言謂之躁言及之而不言謂之隱末見顔色而言謂之瞽又曰子曰予欲無言疾時利口多言無賢也子貢曰子如不言則小子何述焉子曰天何言哉四時行焉百物生焉天何言哉孝經曰口無擇言身無擇行言滿天下無口過家語曰仲孫何忌問於顔回曰仁者一言而必有益於仁智可得聞乎顔回曰一言而有益於智莫若蒙一言而有益於仁莫如恕又曰顔回問孔子曰小人之言有同乎君子者不可不察也子曰君子以行言小人以舌言又曰孔子北遊登農山子路子貢顔回侍側孔子四望喟然歎曰二三子各言尓志子路進曰由願得白羽若月赤羽若日鍾鼓之音上振于天旌旗紛紛下蟠於地由當一隊而敵之必也攘地千里搴旗執馘使二子者從我焉夫子曰勇哉子貢復進曰賜願使齊楚合戰兩壘相當旗鼓相望埃塵連接挺刃交兵賜縞衣白冠陳說其間推論利害使二國釋患唯賜能之使夫二子者從我焉夫子曰辨哉回曰願得明王聖主而相之敷其五教導以禮樂使城郭不修溝池不越鑄劒㦸爲農器放牛馬於原藪室家無離曠之思千載無闘戰之患使由無所施其勇賜無所用其辯孔子曰羙哉德之大也史記曰孔子適周問禮於老子老子曰子所言者其人與骨皆巳朽矣獨其言在耳辭去而老子送之曰吾聞富貴者送人以財仁人者送人以言吾不能富貴竊仁人之號送子以言曰聦明深察而近於死者好議人之非也博辨宏大而危其身者發人之惡者也爲人子者無以有巳也家語同又曰沛公至灞上召秦父老曰秦苛法誹謗者族偶語弃市漢書曰漢王與項羽臨廣武間而語又曰太尉周勃迎代王請間宋昌曰所言公公言之所言私王者無私又曰石建奏事於上前即有可言屏人乃極切至庭見如不能言上以是親而禮之又曰袁盎求見丞相申屠嘉良乆乃見因跪曰願請間丞相曰使君所言公事之曹與長史掾議之吾且奏之則私吾不受私語盎即起東觀漢記曰馬援謂官屬曰吾從弟少遊常哀吾慷慨大志曰士生一丗乗下澤車御欵叚馬爲郡掾史守墳墓郷曲稱善人斯可矣當吾在浪泊里間虜未㓕之時下潦上霧毒氣熏蒸仰視烏鳶跕丁愜切跕墮水中卧念少遊平生時語何可得也蜀志曰龐統字士元襄陽人少時朴鈍未有識者頴川司馬徽清雅有人倫鑒統弱冠往見徽徽採桑樹上統桑下共語自晝逹夜徽甚異之稱統當爲南州士之冠冕由是顯名晉書曰武帝問孫皓曰聞南人好汝語頗爲不皓因舉觴奉帝而言曰昔爲汝國隣今爲汝國臣勸汝一杯酒願汝壽萬春帝悔之沈約宋書曰謝莊孝建元年迁左衛將軍𥘉丗祖嘗賜莊寳劒以與豫州刺史魯爽别後叛丗祖因宴集問劒所在荅曰昔與魯爽别竊爲陛下杜郵之賜上甚恱也當時以爲知言鄧析書曰一言而非駟馬不能追一言而急駟馬不能及晏子曰曽子將行晏子送之曰君子贈人以軒不若贈人以言老子曰多言數窮不如守中善言無瑕讁又曰信言不羙羙言不信又曰天之道不言而善應墨子曰子禽問曰多言有益乎墨子曰蝦蟇蛙黽日夜而鳴舌乾擗然而不聽今鶴雞時夜而鳴天下振動多言何益唯其言之時也孫卿子曰贈人以言重於金石珠玉傷人以言重於刀㦸觀人以言羙於黼黻文章聽人以言樂於鍾鼓琴瑟又曰金人銘曰周大廟右階之前有金人焉三緘其口而銘其背曰我古之愼言人也戒之哉無多言無多事多言多敗多事多害皇覧云出太公金匱家語說苑又載莊子曰言者所以在意也得意而忘言吾安得忘言之人與之言哉說苑曰梁君出獵見白鴈群梁君下車彀弓欲射之道有行者觀勸梁君止鴈群駭梁君怒欲殺行者其御公孫龍下車對曰昔者齊景公之時天旱三年卜之曰必以人祠乃雨景公曰吾昔所以求雨者爲吾民也今以人祠乃雨寡人將自當之言未卒天大雨方千里今主君以白鴈故而欲殺之無異於狼虎梁君援其首與上車歸入郭門呼萬歳曰樂哉今日獵也獨得善言子思子曰同言而信信在言前申子曰明君治國三寸之機運而天下定方寸之謀正而天下治一言正而天下定一言倚而天下靡淮南子曰人有多言者百舌之聲也又曰得萬人之兵不若聞一言之當新序曰晉文逐麋而失迹問農夫老古曰麋何在老古以足指曰如是行往公曰寡人問子子以足指何也老古振衣而起曰虎豹之居也厭閑而之近故得魚鱉之居也厭深而之淺故得諸侯之居也厭衆而逺遊故亡其國公恐歸曰寡人逐麋而失之得善言故有恱色欒武子曰其人安在公曰吾未與來也欒武子曰取人之言而弃其身盗也公曰善遂載老古與俱歸楊子曰大哉聖人言之至也開之廓然見四海之内閑之寂然不覩墻垣之裏良玉不彫至言不文賈誼新書曰言有四術言敬以禮朝廷之言也文言有序祭祀之言也并氣折聲軍旅之言也言若不足喪紀之言也郭子曰孫安國盛字安國徃殷中軍許共語殷名浩也徃返精苦客主無間左右進食冷而復煖者數四彼我奮擲塵尾毛悉隨落滿飡飰中賔主遂至暮忘飡殷方語孫卿曰公勿作強口馬我當併卿控孫亦曰卿勿作穴鼻牛我當穿卿頰尸子曰言羙則響羙言惡則響惡五帝夲紀曰黄帝弱而能言神仙傳曰老子生而能語衛玠别傳曰太尉王君見阮千里而問曰老莊與聖教同異阮曰將無同太尉善其言辟之爲掾丗號曰三語掾王君嘲之曰一言可辟何假於三阮曰苟足天下民望亦可無言而辟復何假於一管輅别傳曰裴兾州何鄧二尚書及郷里劉太常潁川兄弟輅曰自與此五君共言論使人精神清發至昏不暇寐自此巳下殆白日欲寢陵零先賢傳曰張飛嘗就劉巴宿巴不與語遂忿恚諸葛亮謂巴曰張飛雖實武人敬慕足下足下雖天素髙亮冝少降意曰丈夫處丗當交四海英雄如何與兵子語備聞之怒曰孤欲定天下而子𥘉專亂之括地圗曰太極山採華之草一日服之通萬里語丗說曰晉文王稱阮嗣宗天下之至愼每與之言言及玄逺未甞臧否人物又曰諸葛瑾爲豫州遣别駕到臺語云小児知談卿可與語於張輔呉座中相遇别駕呼恪咄咄郎君恪因嘲之曰豫州亂矣何咄咄有荅曰君明臣賢未聞有亂恪復云昔唐堯在上四凶在下荅曰非唯四凶亦有丹朱又曰或問王濟云昨遊有何語議濟曰張華善說史漢裴逸民叙前言徃行衮衮可聽王戎道子房季扎之間陶然玄著又曰郝隆爲桓公南蠻參軍三月三日作詩不能者罰酒隆攬筆作一句云娵隅躍清池桓曰娵隅是何物荅曰蠻名魚爲娵隅桓曰作詩何以作蠻語隆曰千里投公始得蠻府叅軍那得不作蠻語又曰裴僕射時人謂言談之林藪又曰殷中軍浩嘗至劉尹所惔字真長殷理屈而遊詞不巳劉亦不復荅殷去乃言曰田舎児學人作爾馨語又曰陸士龍荀鳴鶴未相識俱㑹張茂先座張介令共語以其並有大才可勿作常談陸抗手曰雲間陸士龍荀曰日下荀鳴鶴陸曰旣開青雲覩白雉何不張尓弓挾尓矢荀曰夲謂雲龍騤騤乃是山鹿野麋獸微弩強是以發遲張乃拊手大笑又曰王武子孫子荆各言郷里土地人物之羙王云其地坦而平其水澹而清其人廉且貞孫云其山崔嵬以嵯峨其水㳌渫而揚波其人礧砢而英多又曰宋處宗甚有思理才常買得一長鳴雞愛養之甚至恒籠盛着䆫間雞遂作人語與處宗談語極有言思終日不輟處宗因此言遂大進又曰謝太傅一生語未嘗誤每共說退後叙說向言皆得次第後忽一悞自知當必死其年而薨又曰桓南郡與殷荆州語次因作了語頋愷曰火焼平原無遺燎桓曰白布纒棺樹旒旐殷曰投魚深淵放飛鳥次復作危語桓曰矛頭浙米劒頭炊殷曰百歳老翁攀枯枝頋曰井上轆轤安嬰児殷有一參軍在㘴云盲人騎瞎馬臨深池殷曰咄咄逼人仲堪眇目故也蘇彦語箴曰利輕春露害重冬霜蘧蒢充室戚施滿堂孫楚反金人銘曰晉太廟左偕前有石人焉大張其口而書其匈曰我古之多言人也無少言少言少事則後生何述焉夫唯立言名乃長乆胡爲塊然㘴緘其口太平御覽卷第三百九十
