front:
  text: 太平御覽卷第二十八
  hash: sha256:1e9fdf08348a39f259046e48feb407e4823f23aff80dd9d5f7b768941d9c2a87
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_028-1a}
body:
  text: 時序部十三立冬冬至立冬禮記月令曰孟冬之月是月也以立冬先三日太史謁於天子曰某日立冬盛德在水天子乃齊立冬之日親率公卿大夫以迎冬於北郊還反賞死事恤孤寡左傳曰仲足問郯子曰丹鳥氏司閉者也以立秋來立冬去易說曰乾西北也主立冬易通卦驗曰立冬不周風至水始冰薺麥生鷰雀入水爲蛤京房易占曰立冬乾王不周風用事人君當興邊兵治城郭行刑决罪三禮義宗曰十月立冬爲節者冬終也立冬之時萬物終成爲節名小雪爲中者氣叙轉寒雨變成雪故以小雪爲節後漢書續禮儀志曰立冬之日夜漏未盡五刻京都百官皆衣皂迎氣於北郊家語曰魚游於水鳥游於雲故立冬則鷰雀入於海化爲蛤符瑞圖曰八風循通八方之風應時而至也立冬北方廣莫風至一名寒風周書時訓曰立冬十月節水始冰水若不冰即隂之有負地始凍地若不凍即災咎之徴野雞化蜃若不爲蜃即時多媱婦五行休王論云立冬乾王坎相艮胎震没巽死离囚坤廢兊休冬至周易曰先王以至日閉關啇旅不行后不省方謂夏至日冬至日也尚書曰日短星昴以正仲冬孔安國注曰日短冬至日也昴白武星亦以七星並見以正冬之三節也禮記曰仲冬之月日短至隂陽爭諸生蕩爭者隂方盛陽欲起也君子齋戒處必掩身身欲寜去聲色禁嗜慾安形性事欲静以待隂陽之所定周禮曰冬至日在牽牛景長一丈三尺夏至日在東井景長尺有五寸又曰薙氏去草冬日至而夷之秋繩而芟之冬日至而耜之若欲其化也則以水火變之謂以火燒其所芟薙之草巳而水之則其土亦和美矣月令季夏乃燒薙行水利以殺草奴以熱湯是其一時著之又曰司徒職曰日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所㑹也隂陽之所和也然則百物阜安乃建王國焉制其畿方千里而封樹也景尺有五寸者南載日下萬五千里地輿星辰四遊升障於三萬里之中是以半之得地之中也畿方千里取象於日一寸爲正樹樹木溝上所以表助阻固也鄭司農云土圭之長尺有五寸以夏至之日立八尺之表其景適與土圭等謂之地中今頴川陽城地爲然春秋左傳曰僖五年春王正月辛亥朔日南至周正今十一月冬至之日日南極公旣視朔遂登觀臺以望而書禮也視朔親告朔也觀臺臺上攝屋可以逺觀者也朔旦冬至暦數之所始治暦者因之則可以明其術數審别隂陽叙事訓民魯君不能常脩此禮故善公之得禮凢分至啓閉必書雲物分春秋分也至冬夏至也啓立春立夏閉立秋立冬雲物氣色災變也傳重申周典不言公者曰官掌其職爲備故也素察妖祥逆爲之備易通卦驗曰冬至之日見雲送迎從下嚮來歳美人民和不疾疫無雲送迎德薄歳惡故其雲赤者旱黒者水白者爲兵黄者有土功諸從日氣送迎其徴也又曰冬至始人主致八能之士或調黄鍾或調六律或調五行或調律暦或調隂陽或調正德鄭玄注曰致八能之士者言選於人衆之中取習曉者使之調焉諧調和之也又曰冬至始人主與羣臣左右從樂五日天下之衆亦家家從樂五日以迎日至之禮鄭玄注曰從者就也冬至君臣俱就大司樂之宮臨其肆樂祭天圜丘之樂以爲祭事莫大於此又曰冬至成天文鄭玄注云天文謂之三光運照行天下冬至而數訖於是時也祭而成之所以報也又曰冬至之日立八神樹八尺表日中視其晷如度者則歳美人和順晷不如度者歳惡晷入則水晷退則旱進二寸則月食進尺則日食進謂長於度也京房易妖占曰冬至繕宫殿封倉庫易說曰坎北方也主冬至尚書考靈曜曰冬至日則五星俱起牽牛日月若懸壁五星若編珠孝經説曰斗指子爲冬至至有三義一者隂極之至二者陽氣始至三者日行南至故謂爲至孝經援神契曰冬至陽氣動又曰冬至日在外衡三禮義宗曰十一月大雪爲節者刑於小雪爲大雪時雪轉甚故以大雪名節冬至中者亦有三義一者隂極之至二者陽氣始至三者日行南至故謂之冬至也又曰冬至日祭天於圎丘玉用其蒼璧牲同玉色樂用夾鍾爲宫樂作六變五經通義曰冬至寢兵鼓啇旅不行君不聽政事曰冬至陽氣萌隂陽交精始成萬物氣微在下不可動泄王者承天理故率天下静而不擾也史記曰冬至短極縣土灰孟康曰先冬至三日懸土灰於衡兩端輕重適均冬至日陽氣至則灰重夏至日隂氣至則土重晉灼曰蔡邕律暦記候鍾律權上土灰冬至陽氣應黄鍾通土灰輕而衡仰夏至隂氣應㽔賔通土灰重而衡低進退先後五日之中灰動麋解角蘭根出泉水踊晷以知日至要訣晷景又曰凢候歳美悪候謂歳始或冬至日産氣始萌臘明日人衆卒歲壹㑹歛食發陽氣故曰𥘉歳又曰黄帝得寳鼎宛朐問於臾區對曰帝得寳鼎神筴是歳巳酉朔旦冬至得天子紀終而復始於是黄帝迎日推筴後率世歳復朔旦冬至漢書曰宦者淳于陵渠覆太𥘉暦晦朔望最宻五星如連珠應劭注云謂太𥘉上元甲子夜半朔朝冬至七曜皆㑹牽牛又曰冬至陽氣起君道長故賀夏至隂氣起君道消故不賀司馬彪續漢書曰天子常以冬夏至日御前殿合八能之士陳八音聽樂均度晷景候鍾律權土灰俲隂陽也續漢書禮儀志曰冬至前後君子安身静體百官絶事不聽政擇吉辰而後省事絶之日夜漏未盡五刻京都百官衣皂聽事之日百官皆衣綘後漢書曰傳賢字仲舒遷廷尉毎冬至断獄遲廻流涕魏文帝黄𥘉元年冬至日黄雀集于文昌殿前見曹植表左思魏都賦云翩翩黄雀衘書來誶綦母氏云黄鳥衘書具吾臺後魏崔浩女儀曰近古婦人常以冬至日上履襪於舅姑踐長至之義也晉書曰周嵩母李氏常冬至致酒舉觴賜三子曰吾夲渡江託足無所不謂爾等並貴列吾目前吾復何憂嵩起曰恐不如尊旨伯仁志大而才短名重而識闇好乗人之弊此非自全之道嵩性抗直亦不容於世唯阿奴碌碌當在阿母目下耳阿奴謨小字也後果如其言沈約宋書曰魏晉冬至日受萬國及百寮稱賀因小㑹其儀亞於歳朝也又曰冬至朝賀享祀皆如元日之儀又進履襪崔駟襪銘有建子之月助養元氣之事後魏北京司徒崔女儀云近古婦人常以冬至日進履襪於舅姑皆其事也襪亦作袜並亡伐反作赤豆粥荆楚記云共工氏有不才子以冬至日死爲人厲畏赤豆故作粥欀之南史曰梁傳𡵨爲始新令有囚當死㑹冬至𡵨乃放其還家獄曹掾固争曰古者有此今不可行𡵨曰其若負信縣令當坐竟如期而反太守深相歎異遽以狀聞梁書曰席闡出爲東陽太守在郡有能名冬至悉放獄中囚依期而至齊書曰庫狄伏連冬至之日親表稱賀其妻爲設豆餅伏連問此豆何因而得妻對曰於馬豆中分减伏連大怒唐玄宗實録曰上御含元殿受朝太史奏曰朔日至暦數之元嘉辰之㑹按樂計圖徴云朔日冬至聖主厚祚又按春秋精符云冬至隂雲祁寒有雲迎日者來歳大美此並聖德光𬒳上感天心請付有司以彰嘉瑞從之荆楚歳時記曰十一月冬至日作赤豆粥洽聞記曰赤土國直崖州南渡海經雞籠島冬至之日影在北夏至之日影在南開户皆向北西域諸國志曰天笁國以十一月六日爲冬至冬至則麥秀管子曰以冬至之日始數四十六冬盡春始教民鑚燧謹竈泄所以壽人也淮南子曰冬至之日北宫御女黒色衣黒采擊磬石水王北方故處北宮其鎩其畜彘鍛者即内象彘彘水畜又曰陽氣爲火隂氣爲水水勝故夏至濕火勝故冬至慘慘故灰重日冬至井水盛盆水溢鵲始巢八尺之脩日中而景文三尺又曰天文曰冬至日數來歳正月朔日滿五十者民食足不滿五十者减一升餘日日益一升其爲歳伺也伺候也吕氏春秋曰冬至後五旬七日菖蒲百草之先生也於是始耕髙誘注曰菖蒲水草也又曰冬至日行逺道周四極命之曰玄明天又曰仲冬命之曰暢月陽氣在上人民空閒無所事作故日暢月太玄經曰冬至及夜半以後者近玄之象也進而未極往而未至虚而未滿故謂之近玄也玄以子午爲晝夜分冬至夜半以前癸亥之日出玄道好謙夜半以後大道始邁雖進未極雖往未至猶在冲虚而未盈滿也是爲近玄則休也釋文曰冬至斗指子夜半時加午者也又曰調律者度竹爲管蘆莩爲灰列之九間之中漠然無動寂然無聲微風不起纎塵不形冬至夜半黄鍾以應白虎通曰廣莫風冬至斷其大辟行刑獄也又曰冬至前後君子安身静體百官絶事不聽政擇吉辰而後省事又曰冬至陽始起反大寒何也隂氣推而上故大寒玉燭寳典云十一月建子周之正月冬至日極南影極長隂陽日月萬物之始律當黄鍾其管最長故有履長之賀神農書曰冬至隂陽合精天地交譲天爲尸濕地爲不凍君爲不朝百官爲不親事不可出遊必有憂悔符瑞圖曰冬至東北方融風至一名焱風崔寔四人月令曰冬至之日薦黍羔先薦玄冥以及祖禰其進酒尊老及謁賀君師耆老如正旦又曰先後冬至各五日買白犬養之以供祖獮周書時訓曰大雪之日鶡鳥猶鳴者國有訛言虎不交將帥不和挺不出卿士專權冬至之日蚯蚓不結君政不行麋角不解兵不藏水泉不動隂不承陽暦義䟽曰大雪十一月節月之𥘉氣也言太隂之氣以大水凝爲雪故曰大雪冬至十一月之中氣也言冬至者極也太隂之氣上干於陽太陽之氣下極於地寒氣巳極故曰冬至氣當易之是以王者閉門閭啇旅不行以其陽氣乗踊長君壽益長是以冬賀也亦以日之行天至於巽維東南角極之於此故曰冬至顔師古匡謬正俗曰鄭氏箋云鵲之作巢冬至加功至春乃成此言始起冬至加功力爲巢盖直言耳而劉昌宗周讀等音加爲架名從以搆架爲義則不應云架功也黄帝針炙經云冬至日風從南來者名爲虚賊傷人也周角書曰候赦法冬至後盡丁巳之日有風從巳上來滿三日以上必有大赦養生要集曰南陽張平子云冬至陽氣歸内腹中熱物入胃易消化又曰通曆數家筭法推考其紀從上古天元來訖十一月甲子夜半朔冬至日月若連璧魏武帝明罰令曰聞太原上黨西河鴈門冬至後百有五日皆絶火寒食云爲介子推晉潘尼長至詩曰渾儀賦四氣玉衡運招揺靈晷脩期夕日南始今朝宋鮑昭冬至詩曰景移風度改日至晷遷換眇眇負霜鶴皎皎帶雲鴈長河夜闌干層冰如玉岸哀哀故老容慘慘愁歳暮陳新塗妻李氏冬至詩曰靈象㝷數廽四氣慿時散隂律鼓微陽大明將啓旦感興時來多心隨逝花難式宴集中堂嘉賔盈朝舘魏曹植冬至獻襪頌表曰伏見舊儀國家冬至獻履貢韈所以迎福踐長先臣或爲之頌臣旣玩其嘉藻願述朝慶千載昌期一陽嘉節四方交㤗万彚昭蘇亞歳迎祥履長納慶不勝感節情繫帷幄拜表奉賀并獻紋履七量襪若
