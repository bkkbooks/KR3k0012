front:
  text: 太平御覽卷第一百九十一
  hash: sha256:9b220246c44089003500f075079c9f191446625a21c9ee6f78989f2c5d30da65
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_191-1a}
body:
  text: 居處部十九府庫藏廐市府庫藏釋名曰庫舎也物在舎也齊魯謂庫爲舎也說文曰庫兵車所藏也帑金幣所藏也府文書所藏也禮記曰季秋之月命百工審五庫之量蔡邕月令章句曰五庫者一曰車庫二曰兵庫三日祭器庫四曰樂器庫五曰宴器庫又月令曰季春命有司開府庫出幣帛聘名士周禮曰太府掌九貢九賦九功之貳以受其貨賄之入頒其貨于受藏之府頒其賄于受用之府凡萬民之貢以充府庫太府下大夫若今之司農又曰玉府掌王之金玉玩好兵器凡良貨賄之藏共王之服玉佩玉珠玉含玉諸侯則共珠盤玉敦又曰内府掌受九貢九賦九功貨賄良兵器以待邦之大用凡四方之幣獻之金玉齒革兵器凡良貨賄入焉又曰外府掌邦布之出入以供百物而待邦之小用注布帛之藏帛曰布小用賜也又天官玉府曰合諸侯則供珠盤鄭玄注曰以注飾盤承牛耳又春官天府曰天府掌祖廟之守藏與其禁令凡國之玉鎭大寳器藏焉若有大祭大丧則出而陳之旣事藏之凡官府郷州及都鄙之治中受而藏之以詔王察羣吏之治察貳其黜陟也治中謂治簿書之要尚書曰武王克殷散鹿臺之財紂所積之府庫曰鹿臺春秋文曜鈎曰咸池天潢五星五帝車舎也宋均注曰舎庫也五帝庫府曲禮天子六府曰司土司木司水司草司器司貨典六職注謂主藏物之稅也左傳曰晉侯之竪頭湏守藏者也及公子出也竊藏以逃盡用以求納之求納文公論語曰魯人爲長府藏貨曰府閔子騫曰仍舊貫如之何何必改作漢書曰漢髙祖七年蕭何立東闕前殿武庫又曰立武庫以藏禁兵又曰枚乗諫呉王曰夫漢并二十四郡十七諸侯轉輸錯岀軍行數千里不絶於郊其珍怪不如東山之府如淳曰呉王之府藏也謝承後漢書曰靈帝光和中武庫屋自壞司隷許冰上書曰武庫禁兵所在國之禁爲災深矣魏志曰嘉平中二魚集於武庫屋上晉書曰武庫封閉甚密忽有雉雊張華曰此必蛇化爲雉視之果有蛇蛻也又曰趙王倫旣還謟事賈后因求録尚書事後又求尚書令張華與裴頠皆固執不可由是致怨倫秀疾華如讎武庫火華懼因此變作列兵固守然後救之故累代之寳及漢髙斬蛇劒王莽頭孔子履等盡焚焉時華見劒穿屋而飛莫知所向又曰裴楷有知人之鑒目鍾㑹云如觀武庫森森但見矛㦸在前啇君書曰湯武破桀紂海内無患遂築五庫藏五兵偃武也鍾會蒭蕘論曰國之稱富者在乎豐人非獨謂府庫盈倉廪實非上天所降皆資之於人人困則國虚矣洞冥記曰元狩四年將夕有黄髪叟懐内探徑尺玉以授帝帝以玉還寳庫即龍玉也王子年拾遺記曰縻笁用陶朱公計術日益億萬之利貲擬王家有寳庫千間丗說曰郄公大聚歛錢數千万嘉賔甚不同甞朝旦問訊郗家法子弟不坐因倚語移時遂及錢貨事郗云汝正當欲得我錢耳乃聽一日開庫任意用郗公始止謂損數百万許嘉賔遂一日中乞與人都盡郗公聞之驚怪不能巳拾遺録曰太上皇以寳劒賜髙祖及吕后藏於珤庫守者見白氣從户中出如龍虵吕氏更珤庫名曰靈金藏及諸吕擅權白氣亦滅惠帝即位以此貯禁兵名曰靈金府韓詩外傳曰晉平公藏寳之臺燒救火三日三夜公子晏賀曰臣聞王者藏於天下諸侯藏於百姓農夫藏於囷倉啇賈藏於篋匱今百姓乏於外而賦歛無巳者是桀紂殘賊而爲天下戮今皇天降災於藏臺是君之福也莊子曰天地有官隂陽有藏魏都白藏之藏注曰白藏庫在西城有屋一百七十四間爾雅秋爲白藏因以爲名列子曰范氏之藏大火啇丘開入火徃還無難色埃不漫身不燋子華之客乃謝之晉摯虞武庫屋銘曰有財無義惟家之殃無愛糞土以毀五常張衡西京賦曰武庫禁兵設在蘭錡曹毗魏都賦曰百藏之庫戎儲攸歸潘岳詩曰微火不戒延我寳庫廏說文曰廏馬舎也釋名曰廏鳩也聚也牛馬之所聚也詩曰乘馬在廏左傳曰莊二十九年新作延廏書不時也凡馬日中而出日中而入注日中春秋分也治廏當以秋分今以春作不時也榖梁傳曰二十九年新延廏延廏者法廏注周禮天子十二閑言法廏者六閑之舊制又曰晉獻公欲伐虢荀息曰何不以屈産之乗垂棘之壁假道于虞也公曰此晉之寳也息曰是我取之中府而藏之外府取之中廏而藏之外廏禮記雜記曰廏焚孔子拜郷人爲火來者拜之士一大夫再亦相予之道也論語郷黨曰廏焚子退朝曰傷人乎不問馬史記曰夏侯嬰爲沛廏司御每送客還過髙祖語未甞不移日東觀漢記曰順帝漢安元年始置承華廏舎令又曰靈帝光和四年𥘉置緑驥廏領受郡國調馬調謂徴發漢舊儀曰天子六廏未央廏承華廏皆方匹三輔黃圖曰未央宫有金廏輅軨廏大廏果馬廏乾廏騎馬廏大宛廏胡河廏騊駼廏九在城内孟子曰廏有肥馬野有餓殍是率獸而食人也郡國誌曰雍州霸昌廏在長安西二十五里王莽使司徒王㝷發長安宿此春秋佐助期曰廏星傳令神名詩時市古史考曰神農作市丗夲祝融作市說文曰市買賣之所也古今注曰闤市垣也闠市門也風俗通曰俗言市井者言至市鬻賣當湏於井上洗濯令物鮮㓗然後市案二十畝爲一井今因井爲市禮記曰用器不中度不鬻於市布帛精麤不中數幅廣狹不中量不鬻於市姧色亂正色不鬻於市也周禮曰大市日􅻈而市百族爲主朝市朝時而市啇賈爲主夕市夕時而市販夫販婦爲主法云主者言其多也百族百姓也又曰凡國凶荒札喪則市無征又曰國君過市刑人赦夫人過市罰一幕丗子過市罰一帟命夫過市罰一蓋命婦過市罰一帷注曰市者交利而行刑之處也君子無故不遊觀焉史記曰吕不韋撰春秋成牓於秦市曰有人能改一字者賜金三十斤後漢書曰張楷字公超通嚴氏春秋古文尚書門徒常數百人賔客慕之自父黨夙儒皆造門焉車馬填街黃門及貴戚之家皆起舎巷次以候過客來徃之利楷疾其如此輙徙避之家貧無以爲業常乗驢車至縣賣藥足給食者輙還郷里司隷舉茂才除長陵令不之官隱居弘農山學者隨之所居成市後華隂山中遂有公超市又曰王充家貧無書甞遊洛陽市閱所賣書一遍而誦之晉書曰羊祐疾漸篤乃舉杜預自代㝷卒時年五十八帝素服哭之甚哀是日大寒帝涕淚霑鬚皆爲冰南州人方市聞祜喪莫不號慟罷市巷哭者聲相接呉守邊將士亦爲之泣其仁徳感人如此韓子曰龐共與魏太子質於邯鄲共謂魏王曰今一人言市有虎王信乎王曰否二人言王信乎曰否三人言王信乎王曰寡人信矣共曰夫市無虎明矣三人言成市虎今邯鄲去魏逺於市謗臣者過於三人願王察之越絶書曰伍子胥至呉徒跣𬒳髮乞於呉市三日市正疑之而導於闔閭曰市中有非常人徒跣𬒳髮乞於呉市三日呉闔閭曰吾聞荆王殺其臣伍奢而非其罪其子胥勇且智彼必經諸侯之邦可以報其父之讎者王即使召子胥入呉王下堦迎而唁數之曰吾知子非常人也何素窮如此子胥跪而垂泣曰胥父無罪而楚王殺之并其子子胥得道遁逃出走唯可以歸骸骨者唯大王哀之呉王曰諾上殿與語三日語無復者王乃令邦中無貴賤長少有不聽子胥敎者猶不聽寡人之罪至死不赦又曰呉市者春申君所造闕兩城以爲市在湖里班固兩都賦曰内則街衢洞逹閭閻且千九市開埸貨別隧分人不得顧車不得旋闐城溢郭傍流百㕓紅塵四合煙雲相連宫闕記云長安市有九所各方二百六十六歩六市在道西三市在道東西里爲市凡九市致九州之人在突門夾横橋大道南又有當市觀又曰旗亭樓在社門大道南又有當市觀張衡西京賦云郭開九市通闤帶闠旗亭五重俯察百隧是也又按郡國誌云長安大俠萬子夏居柳市司馬季主卜東市西市在醴泉坊隋曰利人市因有西市署洛陽記曰三市大市名也金市在大城西南市在大城南馬市在大城東按金市在臨啇觀西兊爲金故曰金市馬市在東舊置丞焉又酈道元注水經云馬市即嵇康爲司馬昭所害之處蜀夲紀曰老子爲關令尹喜著道經臨別曰子行道千日後於成都青羊肆㝷吾今爲青羊觀是也郡國志曰幽州有邠亭新論云添縣邠亭夲大王所部其人相與夜市不爲則有重害焉又曰始皇陵有銀蠶金鴈以多竒物故俗云秦王地市又曰郢城内有市名蒲胥故南齊校尉府也又曰越州梅市即梅福爲市門卒之所又曰齊桓公宫内有七市韓娥東之齊乏粮過雍門鬻歌於市乃此也又曰雍州富平西南十五里有直市城秦文王造物無二價以直市爲名西京記曰東京豐都市東西南北居二坊之地四面各開三門邸凡三百一十二區資貨一百行𥘉築市掘得古冢上藏無塼甓棺木陳朽觸之便散屍着平上幘朱衣得銘曰筮道居朝龜言近市五百年間於斯見矣當時逹者叅驗其文魏黃𥘉二年所葬也又曰大業六年諸夷來朝請入市交易煬帝許之於是修飾諸行葺理邸店皆使甍宇齊正卑髙如一瓌貨充積人物華盛時諸行鋪􅔡崇侈麗至賣菜者亦以龍鬚席藉之夷人有就店飲敢皆令不取直胡夷驚視􅐛以爲常又曰西市隋曰利人市市西北隅有海池長安中僧法成所穿分永安渠以注之以爲放生之所穿池得古石銘云百年爲市而後爲池自置都立市至是時百餘年矣太平御覽卷第一百九十一
