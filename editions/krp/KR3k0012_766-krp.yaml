front:
  text: 太平御覽卷第七百六十六雜物部一
  hash: sha256:7d353012828215d3f0861c43822a4edf0a072a3290b5b08b446ef15496f6131d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_766-1a}
body:
  text: 膠􅃮䗶黄屑皮䈥角齒羽毛蘧蒢筣笓笪繩膠周禮曰凡相膠欲朱色而昔昔也者深瑕而澤紾而搏廉搏圜也廉瑕嚴利也鹿膠青白馬膠赤白牛膠火赤䑕膠黒魚膠餌犀膠黄皆謂煑用其皮或用角也禮曰脂膠丹􅃮無或不良監工日號無作淫巧以蕩上心史記曰趙奢死藺相如病篤使廉頗攻秦秦敗趙軍秦之間言曰秦之所惡獨畏趙奢之子趙括爲將耳趙王因以括代廉頗相如曰王以名而使括若膠柱而鼓瑟耳括徒能讀父書傳不知合變也趙王不聽遂將之漢書曰晁錯上書曰欲兵威者始於折膠秋至膠可折弓弩司用匈奴可以出軍謝承後漢書曰雷義與陳重爲交郷人爲之語曰膠􅃮雖堅不如雷與陳帝王世紀曰昭王濟漢船人惡之以膠船進王中流膠舡解王没于水中洲記曰鳯麟州以鳯啄及麟角合煎作膠名曰集弦膠一名連金泥膠青色如碧玉漢武時西王母使獻靈膠四兩帝不知其妙以付庫帝幸上林苑射虎而弩弦斷使從駕因取一分膠口濡以集弦射虎而帝使武士對挽終不脫勝未集時吕氏春秋曰桓公使人告魯曰管夷吾寡人之讎也願生得而親加手焉魯君許諾乃使吏鞹其拳膠其目以革囊其手也盛之以鴟夷置之革車孔融同歲論曰阿膠徑寸不能止黄河之濁本草經曰膠一名鹿角膠味甘平治傷中勞絶腰痛瘦𥙷中益氣婦人無子曹植樂府歌曰膠􅃮至堅浸之則離皎皎素絲隨染色移君不我棄䜛人所爲􅃮書曰兖州厥貢􅃮絲豫州厥貢􅃮枲詩曰樹之榛栗椅桐梓􅃮史記曰豫讓爲智伯報趙襄子吞炭􅃮身又曰秦二丗立又欲􅃮其城優旃曰善上雖無言固將請之􅃮城城滑蕩蕩㓂來不能上欲就之易爲􅃮耳難爲隂室於是二丗笑而止戰國䇿曰三晉分智氏趙襄子怨智伯􅃮其頭以爲飲噐漢書殖貨志曰􅃮千大斗亦比千乗之家范曄後漢書曰樊重欲作器先種􅃮而郷人笑之積以歳月皆得其用向之笑者皆取給焉莊子曰山木自㓂也膏火自煎也桂可食故人伐之􅃮可用故人割之人皆知有用之用而莫知無用之用也韓子曰舜作食器斬山木而財之削鋸循其迹流􅃮墨其上諸侯以爲益侈國之不服者十三又曰堯無膠􅃮之約於當丗而道行山海經曰英鞮之山其上多岀􅃮列仙傳曰丁次卿欲還峨眉山語主人丁氏云當相爲作􅃮以甖十枚盛水覆口從次唾之百日乃發皆成􅃮也一蕭廣濟孝子傳曰申屠勲字君遊少失父與母居家貧傭力供飬作壽器用􅃮五六斛十年乃成何晏九州論曰平安好棗中山好栗真定好梨共汲好􅃮續述征記曰古之􅃮園在中牟今猶生􅃮樹也梁王時莊周爲􅃮園吏則斯地南越志曰綏寜白水山多􅃮樹髙十餘丈刻􅃮常上樹端雞鳴日出之始便刻之則有所得過此時隂氣淪陽氣升則無所獲也凢刻􅃮别有氏族以爲業膺前縁木處胼胘如人脚也䗶晉中興書曰王敦死祕不發喪褁屍以席塗之以䗶埋於齋中諸葛瑶等日縱酒淫樂慱物志曰荒年暫辟榖法伹食䗶半斤輙支十日不飢東阿王嘗録甘始同寢處百日不食而容體自若此術術世說曰石季倫以䗶燭炊黄屑南方草物狀曰黄屑在山中藤生蔓延縁着樹木以九月中刮取根皮乾暴曰南黄屑最黄好歳以獻皮書曰梁州厥貢熊熊狐狸織皮左傳曰皮之不存毛將安傳又曰無綏子嘉父使孟樂如晉因孟莊子納虎豹之皮以和諸戎又曰齊莊公爲勇爵殖綽郭最欲預焉自以爲勇州綽曰東閭之役臣左驂迫還於門中識其枚數可以與於此乎然二子者譬於禽獸臣食其肉而寢處其皮矣爾雅曰東北之羙者斥尺舎切山之文皮焉郭璞曰虎豹之屬皮有縟綵論語曰子曰文猶質也質猶文也虎豹之鞹猶犬羊之鞹也漢書曰元狩四年有司言用度不足請収銀錫白金及皮幣以足用應劭曰時國用不足以白鹿皮爲幣朝覲以薦壁又曰荅布皮千石亦比千乗之家范曄後漢書曰李恂爲兖州刺史以清約率下席羊皮卧布𬒳遷張掖太守有威重名文子曰木強即折革強即裂神異經曰北方有曽氷萬里厚百文有䑕在土中焉食氷下草木肉重萬斤可以作脯食之巳熱除熱病也其皮可以蒙鼓其聞千里有羙尾可以來䑕此尾所在䑕即聚搜神記曰舊說大古時有人逺征家唯有一女并馬一疋女思父乃戯馬曰爾能爲我迎得父吾將嫁汝馬乃絶軮而去至父所父疑家中有故乗之而還後馬見女輙怒而奪擊父恠之宻問女女具以告父父乃射殺馬曝皮於庭女之皮所以足蹙之曰爾馬而欲爲婦自取屠割何如言未竟皮蹶然忽起卷女而行父還失後大樹之間得女及皮盡化爲蠶績於樹上其蠒厚大異於常蠶隣女取食飬之其収亦倍今世或謂蠶爲女兒古之遺語也真子曰廊廟之材蓋非一木之枝也狐白之裘蓋非一狐之皮也韓子曰翟人獻豊狐玄豹之皮於晉文又曰西門豹性急佩韋以緩巳董安于心緩佩弦以自急常皮也楊子法言曰羊質虎皮見草而恱見豺而戰忘其皮之虎也䈥角周禮曰凡相角秋閷音殺者厚春閷者簿稺牛之角直而澤老牛之角紾而昔紾徒展切昔讀爲交錯之錯疚疾險中牛有乆疾則角裏傷瘠牛之角無澤少潤氣也角欲青白而豐末豐大也角長二尺有五寸三色不失理謂之牛戴牛三色本白中青末豐也牛戴牛角一直牛也又曰凢相筋欲小簡而長大結而澤則其爲獸必剽以爲弓則豈異於其獸筋欲敝之敝嚼之當孰也禮曰祭天地之牛角蠒栗宗廟之牛角握賔客之牛角尺左傳曰鼷䑕食郊牛角爾雅曰北方之羙者幽都之筋角焉幽都山名謂野牛筋角也魏略曰大秦國岀駭雞犀角晉書曰王凱以帝舅奢豪有牛名八里百駿駭常瑩其蹄角後魏書曰桓帝英傑魁岸馬不能勝常乗安車駕大牛角容一石吕氏春秋曰寗戚飰牛扣角而歌淮南萬畢術曰燒角入山虎豹自逺東方朔占曰昔武帝亡劒不知取者誰無主名請朔徃入宫見人持兩刺手中復持小牛角朔曰陛下宫中當有親林名字魚者取之帝曰有之即収考子魚服岀劒帝曰朔何其工乎且說其占朔對曰入宫時見人持二刺手中復持小牛角因占之二木林字故知名字魚者取之齒書曰揚州厥貢齒革羽毛荆州厥貢毛齒詩曰元龜象齒大賂南金周禮曰荆州其利齒革禮曰季春之月令百工審五庫之量筋角齒羽無或不良左傳曰晉韓宣子爲政諸侯之幣重鄭子産謂之曰象有齒以焚其身賄也宣子恱乃輕幣元嘉起居注曰彈廣州刺史韋朗象牙三十九枚羽毛書曰仲夏鳥獸希革夏時鳥獸毛羽希少改易革改也仲秋鳥獸毛毨毨理也毛更生整理仲冬鳥獸氄毛鳥獸皆生䎡毳細毛以自温焉又曰楊州荆州皆貢羽毛周禮曰九祈全羽爲旒祈羽爲旌左傳曰范宣子假羽毛於齊而弗歸齊人始貳析羽爲旌因謂之羽毛尚書大傳曰夏成五服齒革羽毛器乃備魏志曰平原太守劉乂取印囊及山雞毛著器中令管輅筮之輅曰内方外圎五色成文含寳守信出則有章此印囊也髙丘巖巖有鳥朱冠羽翼玄黄鳴不失晨此雞毛也列女傳曰老萊子隨其妻至於江南而止曰鳥獸之觧毛可續而衣也陸機羽扇賦曰昔楚襄王㑹於章臺之上宋玉唐勒侍皆操白鵠之羽以爲扇張載羽扇賦曰有翔雲之素鳥體自然之至㓗飄縞羽毛清風擬妙姿於白雪蘧蒢方言曰簟粗者謂之蘧蒢晉書曰慕容暐見符堅曰暫屈鑾駕幸臣私第堅許之暐出王嘉曰推蘆作蘧蒢不成文章㑹天大雨不得殺羊堅與羣臣莫之能解是夜大雨晨不果出三輔故事曰哀帝崩王莽奏發傳太后冡以蘧蒢褁屍還定陶倉庫令曰諸輸米麦二十斛蘧蒢一畨皇甫謐篤終論曰死以蘧蒢褁屍麻繩約二頭筣笓上音狸下音毗魏略曰裴潜爲尚書令妻子貧乏織筣笓以自供傳咸効事曰令史張濟案行城東見有新立屋間筣笓障二十文推問是少府夏侯俊所作請免俊官笪丁葛切方言曰荇户當切篖音當自關而東周洛楚魏之間謂之倚佯自關而西謂之荇篖南楚之外謂之篖郭璞曰荇簷以蘧蒢直文而粗江東呼爲笪繩通俗文曰合繩曰紏單展曰紉女隣切織繩曰辮大繩曰絙古怕切易曰上古結繩而治後世聖人易之以書契書曰予臨兆民懔乎若朽索之馭六馬爲人上者奈何不敬又曰木從繩則正后從諌則聖左傳曰吴伐齊齊公孫綽揮命其徒曰人㝷約吴髮短約䋲也八尺爲㝷吴欲以繩貫其首漢書曰龔遂爲渤海太守盗賊不寧上問遂曰君欲何以息其盗賊遂曰選用賢良固欲安之臣聞治亂國猶治亂繩不可急唯緩之然後可治東觀漢記曰吴漢等圍朱鮪岑彭說鮪鮪從上下索曰必信可乗上彭趣索欲上鮪見其誠即許降後二日鮪將輕騎詣彭又曰許皇后父廣漢爲官者丞上官桀謀反時廣漢部索其殿中廬有索長數尺可以縛人者數千枚滿人篋緘封廣漢索不得他吏徃得之廣漢坐論爲鬼薪輸掖庭後爲暴室嗇夫晉書曰劉寔字子真平原人少貧苦賣牛衣以自給然好學手繩口誦博通古今清身㓗色州舉秀才皆不行後魏書曰楊大眼武都民王難當之孫少驍捷髙祖征南李沖典選統校大眼徃求冲不許大眼曰下官岀一技便岀長繩三丈繫於髻走繩直如絃馬馳不及冲曰千載巳來未有若此遂用爲軍主頋謂同僚曰吾之今日所謂蛟龍得水之秋不復與諸軍齊列矣武冠六軍淮泗之人以名止小兒蹄卒荆州刺史老子曰善繫者無繩約而不可解家語曰子貢問治民於孔子孔子曰懔焉如腐索之御忓馬文子曰夫繩之爲度也可卷而懷之可引而伸之可直而布之長而不撗短而不窮直而不剛故聖人體之葛洪神仙傳曰樊夫人者劉剛妻也俱行道術各自言勝剛行見虎不敢起適欲捉徃即嘘之夫人徃捉虎以面迫地不視夫人以繩就繫虎頸曵之以歸幽明録曰曲阿有一人忘姓名從京還逼暮不得至家遇雨宿廣屋中雨止月朗遥見一女子來至屋簷下便有悲歎之音仍解腰中綣去逺切繩懸屋桷自絞又覺屋簷上如有人牽䋲此人宻以刀斷卷繩又斫屋上見一鬼西走向曙女氣方蘇能語家在前持此人將歸向女父母說其事或是天運使然因以女嫁與爲妻異記曰武康徐氏宋太元中病瘧連治不斷有人告之曰可作數團飯出道頭呼傷死人姓名云爲我斷瘧今以此團與汝擲之徑還勿反顧也病者如言乃呼晉故車騎將軍沈充湏臾有乗馬導從而至問汝爲何人而敢名官家因傳將去舉家㝷覔經日乃於塜側叢棘下得之繩猶在時瘧遂獲痊傳玄九曲詩曰歳暮景邁時光絶安得長繩繫日月古詩曰直如朱絃繩淸如玉壷水太平御覽卷第七百六十六
