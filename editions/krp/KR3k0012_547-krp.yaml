front:
  text: 太平御覽卷第五百四十七禮儀部二十六
  hash: sha256:ec2f1efc60c7ce51dfc525499660c624183015f18d9658a43144a15d73a1e330
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_547-1a}
body:
  text: 䘮服衰冠絰帶䘮服周禮春官司服曰凡凶事服弁服服弁䘮冠也其服斬縗齊縗也凡弔事弁絰服弁絰者如爵弁而素加環絰也論語日羔裘玄冠不以弔絰大如緦之絰其服錫衰疑衰疑衰也者諸侯及大夫亦以錫衰爲弔也凡䘮爲天王斬縗爲王后齊縗王后小君也諸侯爲之折杖朞也王爲三公六卿錫縗爲諸侯緦縗爲大夫土疑縗其首服皆弁絰君爲臣服也疑衰十四升疑之擬擬於吉也儀禮䘮服曰䘮服斬衰裳苴絰杖絞帶冠繩纓菅屨者爲父諸侯天子君父爲長子爲人後者妻爲夫女子子在室爲父女子子嫁及在父之室爲父公士大夫之衆臣爲君布帶繩屨又曰䟽衰裳齊壯麻絰冠布纓削杖布帶䟽屨三年者父卒則爲母繼母慈母如母母爲長又曰䟽衰裳齋壯麻絰冠布纓削杖布帶䟽屨朞者父在爲其母妻出妻之子爲母卒繼母嫁從爲之服報不杖麻屨者祖父母世父母叔父母又曰䟽衰裳齋壯麻絰無受者無受者服足而除不以經服而受也寄公爲所寓丈夫婦人爲宗子宗子之母妻爲舊君之母妻庶人爲國君大夫在外其長子爲舊國又曰大功布衰裳壯麻絰無受者子女子子之長殤中殤叔父之長殤中殤姑姊妺之長殤中殤昆弟之長殤中殤夫之昆弟之子女子子之長殤中殤嫡孫之長殤中殤大夫之庶子爲嫡昆弟之長殤中殤公爲嫡子之長殤中大夫爲嫡子之長殤中殤其長殤皆九月纓絰其中殤七月不纓絰大功布衰裳壯麻絰纓布帶三月受以小功衰即葛九月者姑姊妹女子子適人者又曰繐衰裳壯麻絰旣葬除之者傳曰繐衰者何以小功之繐也諸侯之大夫爲大子傳曰何以繐衰也諸侯之大夫以時接見乎天子小功布衰裳澡麻帶絰五月者叔父嫡孫昆弟之下殤又曰小功布衰裳壯麻絰即葛五月者從祖祖父母從祖父母報從祖昆弟從父姊妺孫適人者爲人後者爲姊妹適人者爲外祖父母又曰緦麻三月者族曽祖父母族祖父母族父母族昆弟庶孫之婦庶孫之中殤又曰公子爲其母練冠麻麻衣縓縁爲其妻縓冠葛絰帶麻衣縓皆旣葬除之又曰凡妾爲私兄弟如邦人大夫弔於命婦錫衰命婦弔於大夫亦錫衰禮記檀弓上曰䘮服兄弟之子猶子也盖引而進之㛐叔之無服盖推而逺之姑姊妹之薄也盖有受我而厚之者欲其一心厚之者姑姊妹嫁大功夫爲妻期又檀弓曰成人有兄死而不爲衰者聞子臯將爲成宰遂爲衰成人曰蠶則績而蟹有匡范則冠而蟬有緌兄則死而子臯爲之衰蚩兄死者言其衰之不爲兄死如蟹有匡蟬有緌不爲𧖟之績范之冠也范蜂也蟬蜩也緌謂蜩喙長在賜下又䘮服小記曰近臣君服斯服矣其餘從而服不從而稅除䘮者先重者易服者易輕者斬衰之葛齊衰之葛與大功之麻同又曰服問曰三年之䘮巳練矣有朞之䘮旣葬矣則帶其故葛帶絰朞之絰服其功衰有大功之䘮亦如之小功無變也無所變於大功齊斬之服不用輕累重麻之有夲者變三年之葛有本謂大功以上也小功以下澡麻斷本旣練遇麻斷夲者於免絰之旣免去絰毎可以絰必絰旣絰則去之禮統曰天子諸侯皆爲貴臣妾服三月適夫人爲八妾服三月八妾爲夫人服與舅姑同家語曰門人疑所以服夫子者子貢曰昔夫子之喪顔淵若喪子而無服喪子路亦然請喪夫子若喪父而無服於是弟子皆服而加麻出有所之則猶絰孔叢子曰秦莊子死孟武伯問於孔子曰古者同僚有服乎曰然同僚有相友之義貴賤殊等不爲同官聞諸老聃昔虢叔閎夭友太顚散冝生南宫括五臣者同僚比德以賛文武及虢叔死四人者爲服友之服古逹禮者行之又曰子思居衛魯穆公卒縣子使乎衛聞喪而服謂子思曰子雖未臣魯父母之國也先君宗廟在焉奈何弗服子思曰吾豈愛乎禮弗得也縣子曰請問之荅曰臣而出國君不掃其宗廟則不爲之服又曰司徒文子改葬其叔父問服於子思子思曰禮父母改葬緦旣葬而除不忍無服送至親也非父母無服無服則弔服加麻又曰魯人有同歳上計而卒欲爲之服問於季立季立曰思好者其緦乎昔諸侯大夫共㑹事于王及以君命同盟霸主其死也則皆有哭臨之禮今之上計上覲天子有交醼之忻同名綈素上記先君下禄子弟相敦以好相厲以義又數相徃來特有思親比之朋友不亦重乎白虎通曰弟子爲師服者弟子有君臣父子朋友之道也故生竭敬而親之死則哀痛之恩深義重故爲之服入則絰出則否習鑿齒漢晉春秋曰𥘉文帝之崩也羊祜謂傳玄曰三年之喪雖貴遂服自天子逹而漢文除之毀禮傷義常以爲歎今上天縱至孝有曽閔之性雖奪其服而實行喪禮喪禮行除服何爲耶若因此革魏之薄而興先王之法以敦厚風俗垂之百代不亦美乎玄曰漢文以來丗乃淺薄不能行國君之喪因而除之數百年一旦復古恐難行也祜曰就不能使天下如禮且使主上遂服不猶善乎玄曰若主上不除而下除此爲但有父子無君臣三綱之道虧矣君子曰傳玄知無君臣之傷教而不知兼無父子之爲重豈不蔽惑哉漢廢君臣之喪不降父子之服故四海黎庶莫不盡於其新三綱之道二服恒用於私室而王者獨盡廢之豈所以孝治天下乎詩云猶之未逺其傳玄之謂也摯虞新禮議曰虞謹案古者諸侯臨君其國臣諸父兄之諸侯未同于古未同于古則其尊未全不冝使絶朞之制而令傍親服斬衰之重也諸侯旣然則公孫之爵亦冝如舊又曰喪無弟子爲師服之制新禮弟子爲師衰臣虞謹案自古無服師之禮故仲尼之喪門人疑所服子貢曰昔夫子喪顔淵若喪子而無服請喪夫子若父而無服遂心喪三年此則懷三年之哀而無齊衰之制也出則絰居則否所謂弔加麻也先聖爲禮必易從而可傳師從之義誠重而服制之若歷代相襲不以爲疑冝定親新禮無服如舊摯虞決疑要注曰禮故臣爲舊君齊衰三月謂䇿名委質稱臣吏者也見察舉而不爲吏者弔服加麻衰冠毛詩羔裘曰素冠刺不能三年也庶見素冠兮棘人欒欒兮箋云時無三年之恩於父母廢其喪禮故兾幸一見素冠急於哀慼也周禮春官小宗伯曰王崩懸衰冠之式于路門之外肆師之職大喪禁外内男女之衰不中法者又夏官太僕曰大喪懸首服之法于宫首服之法謂免髽笄緫長短之數於宫門示四方也又天官内司服曰共后之衣服及九殯丗婦凡命婦共其服共喪衰亦如之儀禮喪服曰斬衰者不緝也冠繩纓條屬冠六升外畢鍜而勿灰齊衰者緝也又曰䟽衰裳齊傳曰問者曰何冠也曰齊衰大功冠其衰也緦麻小功冠其衰也帶縁各視其冠又曰緦者十五升抽其半有事其縷無事其布曰緦也錫衰者何也麻之有錫者也者十五升抽其半無事其縷有事其布曰錫又曰凡衰外削幅裳内削幅幅三枸削殺也若齊裳内衰外貟廣出於適寸貟在背上適辟領也貟出於辟領外傍一寸也適博四寸岀於衰衰長六寸博四寸禮記檀弓曰衰與其不當物也寧無衰惡其亂禮不當物謂精麄廣狹不應法制齊衰不以邊坐又檀弓曰古者冠縮縫今也衡縫縮從也今禮制衡讀爲横今冠横縫以其辟積多故喪冠之反吉非古也解時人之惑喪冠縮縫古冠耳又間傳曰斬衰三升齊衰四升五升六升大功七升八升九升小功十升十一升十二升緦麻十五升去其半有其事縷無事其布曰緦此哀之發於衣服者也禮記外傳曰凡言斬衰者以六寸之布廣四寸爲衰帖於心前剪而不緝也衰者言悲摧也緝者縫綆之名齊之言齊也加針縷其裳下之縫使齊半也凡言有事其縷者先加灰錫治其麻縷爲布則不治也哀在外故有事其布者則不治其縷哀在内也爲布之後即先治也緦者如絲也錫衰者先緝錫白之謂也疑衰者疑其布是絲也疑衰錫衰二者君之弔服也又曰吉冠之布倍於衣也朝服十五升則冠三十升是也今喪冠升數少喪禮簡斬衰三升冠六升升者登也轉祖訓耳凡麻八十縷爲十升至六升即爲成布也凡言受以成布者旣葬之後漸去麄受細齊衰四升冠七升又有䟽衰即三升半之衰也䟽亦麄也其布在齊斬之間左傳僖上曰許僖公見楚子於武城許男面縛衘壁大夫衰絰士輿櫬櫬棺楚子問諸逢伯對曰武王克殷微子啓如是又襄六曰魯昭公立十九年矣猶有童心比及葬三昜衰衰袵如故衰言其嬉戲無度呉録曰諸葛恪將誅有着衰衣入其閣令人詰荅曰不自知入時外内守備亦不見也鄭玄别傳曰玄卒受業者衰絰于餘人郭子曰劉王共在􅟘南酣宴謝鎭西徃尚書墓還是葬後三日諸人欲要之眞長云仁祖應來便遣要之果即廻駕諸人迎之把臂便下裁得脫幘酣宴半坐乃覺未得脫衰釋名曰衰摧也絰實也傷摧實也斬衰下緝其末翦斬而巳也大功其布加麄大之功不善治之也小功精細之小功轉有飾也緦絲也錫也治其麻使滑易也繐繐如流如繐也絰帶周禮夏官曰弁師王之弁經弁而加環絰弁絰王吊所服也其弁如爵弁而素所謂素冠也而加環絰環者大如緦之麻絰纒而不紏司服識曰凡弔事弁絰事儀禮䘮服曰苴絰者麻之有蕡者也苴絰大搹搹手搹圍九寸左夲在下去五分一以爲帶齊衰之絰斬良之帶也去五分一以爲帶絞者垂帶也鄭玄注曰凡服上曰衰下曰裳在首在腰皆曰絰絰之言實也首絰象幘布冠之幘腰絰象大帶又有絞帶革帶也壯麻者枲麻也壯麻絰右本在上又曰斬衰絞帶七寸三分齊之帶五寸六分大功之帶四寸五分小功之帶三寸七分緦麻之帶二寸九分鄭注絞帶象革帶斬之絰五分去一以爲帶繩帶也禮記外傳曰絰者實也表其有䘮慼之情實也䘮服衰之與絰因象平裳之時冠帶吉凶相變也有首絰有腰絰有絞帶斬衰首絰圍九寸向下皆五分去一用爲腰絰則七分五分五分去一者從斬至緦縁有五服相减窮其數也然則絞帶又小於腰絰齊衰首絰七寸五分之一腰絰五寸八分大功首絰五寸八分腰絰四寸六分小功首絰三寸七分緦首絰三寸七分腰絰二寸九分左傳僖下曰晉襄公擊秦師於殽子墨衰絰晉文公未葬故襄公稱子以凶服從戎故墨之又襄四曰晉侯有姻喪王駙使宣子墨縗冒絰晉自郩之役遂常墨衰絰也二婦人輦以如公奉公以如固宮後漢書曰胡廣年八十三熹平元年薨故吏自公卿大夫博士議郎以下數百人皆衰絰殯位自終及葬漢興巳來人臣之盛未嘗有也宋書曰王誕爲吳國史母憂去職武帝伐劉毅起爲輔國將軍誕固辭以墨絰從行太平御覽卷第五百四十七
