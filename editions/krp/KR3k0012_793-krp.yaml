body:
  text: 西戎二罽賔條支安息大月氏大宛踈勒康國副貨安國鳥萇鳥郍曷渴槃陁鉢和大夏米國鄧至安息乙弗獻伏盧尼石國宕昌鏺汙色知顯伽色尼白蘭乾陁史國師子穆國奄蔡何國嚈噠罽賔漢書曰罽賔國王治脩鮮城去長安萬二千二百里地平温和有目蓿雜草花木檀櫰梓竹􅃮種五榖蒲陶有金銀銅錫以金銀爲錢文爲騎馬幕爲人面師古曰幕即漫也出封牛水牛象大狗沐猴孔爵珠璣珊瑚虎珀璧琉瑠自武帝始通唐書曰貞觀十六年罽賔國遣使献褥特䑕啄尖而尾赤能食蛇有𬒳蛇螫者䑕輙嗅而尿之其瘡即愈條支漢書曰條支國臨西海暑濕田冝稲有大鳥卵如甕後漢書曰條支國城在山上周廽四十餘里臨西海水曲環其南及東北三靣路絶唯西北隅通陸出師子犀牛安息漢書曰安息國王治番兠城去長安萬一千六百里風氣物類與罽賔同亦以銀爲錢文獨爲王靣幕爲夫人面王死輙更鑄錢有大馬大爵其属小大數百城方數千里最大國邑臨嬀水商賈車舩行旁國畫革旁行爲書記師古日今西方胡國書皆横行不直下也武帝始遣使至安息王令將將二萬騎迎於東界東界至王都數千里行北過數十城民人相属因發使隨漢使者來觀漢地以大鳥及卵來獻天子大恱後漢書曰章帝章和元年安息王遣使獻師子符㧞符㧞形似麟無角也北史曰周武天和二年其王遣使朝獻大月氏漢書曰大月氏國治監氏城去長安萬一千六百里物類民俗與安息同岀一封橐馳師古曰脊上出一封也控弦十餘万故強輕匈奴師古曰侍其強盛而輕易匈奴也至冒頓單于攻破月氏以其王頭爲飲器月氏乃逺去過大宛西擊大夏而臣之北史曰大月氏北與蠕蠕接數爲所侵遂西徒都薄羅城其王寄多羅勇武遂興師越太山南侵北天竺自乾陁羅以北五國盡属之後魏太武時其國人啇販京師自云能鑄石爲五色瑠璃於是採礦山中於京師鑄之旣成光澤羙於西方來者乃詔爲殿容百人光色映徹自此中國琉璃遂賤異物志曰月氏俗乗四輪車或四牛或八牛可容二十人王稱天子大宛漢書曰大宛國王治貴山城去長安萬二千五百五十里以蒲萄爲酒冨人藏酒至萬餘石乆者至數十歳不敗俗嗜酒焉嗜曰宿宛別邑七十餘城多善馬馬汙血言其先天馬子也孟康曰言大宛國有髙山其上有馬不可得因取五色母馬置其下與集生駒皆汗血因号曰天馬子云張騫始爲武帝言之上遣使持金馬以請宛王不肯於是天子遣貳師將軍李廣利將兵伐宛連四年死人斬其王母寡首獻馬三千匹漢軍乃還又曰宛王蟬封與漢約歳獻天馬二疋漢使采蒲陶苜蓿種歸天子以天馬多益種蒲陶目蓿離宫館旁極望焉異物志云大宛馬有肉角數寸或有解人語及知音舞與鼓節相應西域圖記曰其烏馬騮馬多白耳白馬騘馬多赤耳黄馬赤馬多黒耳踈勒漢書曰踈勒國王治踈勒城去長安九千三百五十里後漢書曰耿恭爲戊巳校尉引衆入踈勒城城中乏水穿井十五丈不得水恭整衣服向井拜飛泉湧出賊遂退之後魏書曰踈勒國髙宗末其王遣使送釋迦佛袈娑長二丈餘廣丈餘髙宗以審是佛衣應有靈異遂燒之以驗虚實置於猛火之上經日不燃觀者莫不悚駭後每使朝貢隋書曰踈勒國都白山南百餘里其王字阿你厥手足皆六指産子非六指者不育王戴金師子多稻粟麻夌銅䥫銀雌黄唐書曰踈勒國王姓裴俗事祅呼切神有胡書文字貞觀九年遣使獻名馬又曰開元六年玄宗遣使冊立其王裴安定爲踈勒王康國隋書曰康國者康居之後也遷徙無常不恒故地然自漢以來相承不絶其本姓温月氏人也舊居祁連山北昭武城因𬒳匈奴所破西踰葱嶺遂有其國支庻各分王故康國左右諸國並以昭武爲姓示不忘本也王字代失畢爲人寛厚甚得衆心其妻突厥逹可汗女也都於薩寳水上阿禄連城城多衆居大臣三人共掌國事其王索髪冠七寳金花衣綾羅錦繡白疊其妻有髻幪以帛巾丈夫剪髪錦𫀆名爲強國而西域諸國多歸之又曰有胡律置於祅祠决罰則取而断之重罪者族次重者死賊盗截足人皆深目髙鼻多鬢髯善於啇賈諸夷交易多湊其國有大小皷琵琶五絃箜篌笛婚姻䘮制與突厥同國立祖廟以六月祭之諸國皆來助祭俗奉佛爲胡書氣候温冝五榖勤修園𬞞樹木滋茂岀馬駞驢騾封牛黄金碙砂甘香阿薩郍香瑟瑟麖皮氍㲣錦疊多蒲桃酒富家或致千石連年不敗大業中始遣使貢方物後遂絶焉唐書曰康居人多嗜酒好歌舞於道路生子必以石密内口中以膠置掌内欲其成長口嘗甘言掌持錢如膠之粘物又曰以十二月爲歳首有婆羅門爲之占星候氣以定吉凶頗有佛法至十一月皷舞乞寒以水相潑盛爲戯樂又曰貞觀九年遣使貢師子太宗嘉其逺至命袐書監虞丗南爲之賦自此朝貢至十一年又獻金桃銀桃詔令植之於苑囿又曰萬歳通天年中則天封其大首領篤婆鉢提爲康國王仍拜左驍衛將軍又曰開元六年遣使貢獻鏁子甲水精盃馬腦鉼駞鳥夘之類副貨北史曰副貨國去代一萬七千里東至阿冨使且國西至没誰國中間相去一千里南有連山不知名北至竒沙國相去一千五百里國中有副貨城周匝七十里冝五榖蒲桃唯有馬駞騾國王有黄金殿殿下有金駞七頭各髙三尺其王遣使朝貢安國隋書曰安國漢時安息國也王姓昭武氏與康國王同族字設力登妻康國王女也都在郍密水南城有五里環以流水宫殿皆爲平頭王坐金駞座髙七八尺毎聽政與妻相對大臣三人評理國事風俗同於康國唯妻子姊妹及母子逓相禽獸此爲異也煬帝即位之後遣司隷從事杜行滿使於西域至其國得五色塩而返國之西百餘里有畢國可千餘家其國無君長安國統之大業五年遣使貢獻後遂絶焉鳥萇北史曰鳥國在賖弥南北有葱嶺南至天竺婆羅門胡爲其上族婆羅門多解天文吉凶之數其王動則訪决焉土多林菓引水灌田豐稻夌事佛多諸寺塔寺極華麗人有爭訴服之以藥曲者發狂直者無恙爲法不殺犯死罪唯徙於靈山西南有檀特山山上立寺以驢數頭運食山下無人控御自知徃來鳥郍曷隋書曰鳥郍曷國都鳥許水西舊安息之地王姓昭武亦康國種類字佛食都城方二里勝兵數百人王坐金羊座北去安國四百里西北去穆國二百餘里東去瓜州七千五百里大業中遣使貢方物渴槃陁北史曰渴槃陁國在葱嶺東朱駒波西河經其國東北流有髙山夏積霜雪亦事佛道附於嚈噠通典曰渴槃陁後魏時通焉亦名漢陁國亦名渴槃羅陁國理葱嶺中在朱俱波國西西至護密國北至䟽勒國其王本䟽勒人累代相承居此國有户二千餘有懸度山在國南四百里懸度者名山也谿谷不通以繩索相引而度其間四百里中徃徃有棧道因以爲名今按懸度葱嶺邐迤相屬郵置所絶道阻且長故行人由之莫能分別然法明宋雲所經即懸度山也又有頭痛山在國西南向罽賔歷大頭痛小頭痛之山赤土身熱之坂宋膺異物志曰大頭痛小頭痛山皆渠搜之東䟽勒之西經之者身熱頭痛夏不可行行則至死唯冬可行尚嘔吐山有毒藥氣之所爲冬乃枯歇故可行也鉢和北史曰鉢和國在渴槃陁西其土尤寒人畜同居穴地而處又有大雪山望若銀峯其人唯食餅麨飲夌酒服氈裘有二道一道西行向嚈噠一道西南趣烏長亦爲嚈噠所属大夏史記曰大夏在大宛西南二千餘里嬀水南其俗土著有城屋與大宛同俗無大君長徃徃城邑寡小其兵弱畏戰善賈及大月氏西徙皆臣畜大夏大夏民多可百餘萬其都曰藍市城有市販賣諸物東南有身毒國張騫曰臣在大夏時見笻竹杖蜀布問曰安得此大夏國人曰吾賈人徃市之身毒身毒國在大夏東南可數千里米國隋書曰米國都郍蜜水西舊康居之地也無王其城主姓昭武康國王之支庻字閉拙都城方二百里勝兵數百人西北去康居百里大業中頻貢方物鄧至通典曰鄧至羗之別種也後魏時與焉有像舒者代爲白水酋帥因地名爲號稱至王其地自千亭以東平武以西汶嶺以北宕昌以南風土習俗與宕昌同自舒理至十代孫舒彭附後魏孝文帝封甘松縣子鄧爲王西魏恭帝𥘉其主檐術因亂來奔周文帝遣兵送還自後無聞安息北史曰安息國在葱嶺之西都蔚捜城西與波斯相接東去長安一萬七百五十里周武天和二年其王遣使來獻乙弗獻通典曰乙弗獻後魏時聞焉在吐谷渾國有屈海周廻千餘里衆有萬落風俗與吐谷渾同然不識五榖唯食魚與蘇子狀若中國苟𣏌子或赤或黒西有契翰一部風俗亦同土特多狼伏盧尼北史曰伏盧尼都伏盧尼城在波斯國北去代二萬七千三百二十里累石爲城東有大河南流中有鳥其形似人亦有如橐駞鳥者皆有翼常居水中出水便死城北有云尼山出銀珊瑚琥魄多師子石國隋書曰石國居藥殺水都城方十餘里其王姓石名泥國城之東南立屋置座於中正月六日七月十五日以王父母燒餘之骨金甕盛之置于牀上廵遶而行散以花香雜菓王率臣下設祭焉禮終王與夫人岀就別帳臣下以次列坐享宴而罷有粟夌多良馬其俗善戰曽貳於突厥射匱可汗興兵㓕之令特勒甸職攝其國事大業五年遣使朝貢其後不復至宕昌通典曰宕昌差後魏時興焉亦三苗之嗣與先零燒當罕开諸部姓別自立師皆有地分不相統攝宕昌即其一也俗皆土著居有棟宇其屋織氂牛及羖羊毛覆之無法令徭賦唯征伐之時乃相屯聚不然則各事生業不相來徃皆衣裘褐牧飬氂牛羊豕以供其食俗有蒸報無文字但取木榮落以記歳時三年一相聚殺牛羊以祭天俗重虎皮以之送死有梁勤者代爲酋帥得羗毫心乃自稱王其界自仇池以西千里席水以南北八百里地多山阜部衆二萬餘落至其孫弥忽如遣使於後魏太武帝拜爲宕昌王七葉孫弥秦皆授南北兩朝封爵後見兩魏分隔永熈末種人企定乃引吐谷渾㓂金城後企定㓂石門戍周武帝天和中詔大將軍田恒討平之以其地爲宕州鏺汗鏺音普喝切隋書曰鏺汙國都葱嶺之西五百餘里古渠捜國也王姓昭武守阿􅃮都城方四里勝兵數千人王坐金羊床妻戴金花俗多朱沙金䥫東去踈勒千里大業中遣使貢方物色知顯北史曰色知顯國都色知顯城在􅊖万斤西北去代一萬二千九百四十里土平多五菓伽色尼北史曰伽色國都伽色尼城在悉萬南去代一萬二千五百里土出塩多五菓白蘭通典曰白蘭羗之别種後周時興焉東北接吐谷渾風俗物産與宕昌同周武帝保定元年朝獻使至乹陁北史曰乹陁國在鳥萇西本名業波爲嚈噠所破因改焉好征戰與罽賔鬪三年不罷人怨苦之有鬪象七百頭十人乗一象皆執兵仗象鼻縛刀以戰所都城東南七里有佛塔髙七十丈周三百歩即所謂雀離佛圖也史國隋書曰史國都獨莫水南十里舊康居之地也其王姓昭武字逖遮亦康國王之支庻也都城方二里勝兵千餘俗同康國北去康國二百四十里南去吐火羅五百里大業中遣使朝貢師子通典曰師子國東晉時通焉天笁旁國也西海之中延袤二千餘里多出竒寳其地和適無冬夏之異五榖隨人所種不湏時節其國舊無人止有鬼神有龍居之諸國啇估來共市易鬼不見其形但岀珎寳明其所堪價啇人依價取之諸國人聞其土樂因此􅔡至或有停住者遂成大國能馴飬師子遂以爲名風俗與婆羅門同而尤事佛法安帝義熈𥘉遣使獻玉佛像像髙四尺二寸玉色㓗潤形制殊特殆非人功歷晉宋代在建康瓦官寺又曰宋文帝元嘉五年其王刹利摩訶南遣使貢獻梁武帝大通元年後王迦葉伽羅訶犁耶亦使使貢獻穆國北史曰穆國都鳥滸河之西亦安息之故地與鳥郍曷爲隣其王姓昭武亦康國王之種類也字阿濫密都城方三里勝兵二千人東北去安國五百里西去波斯國四千餘里大業中遣使貢方物奄蔡通典曰奄蔡漢時通焉西接大秦東南二千里與康居接去陽關八千餘里控弦十餘萬與康居同俗而役属康居土氣温和臨大澤無涯岸多楨松白草及貂畜牧逐水草盖近北海至漢改名阿蘭郍國後魏時白粟特國一名温郍沙何國北史曰何國都郍宻水南數里舊是康居地也其王姓昭武亦康國王之族類都城方二里勝兵者千人其王坐金羊座東去曹國百五十里西去小安國三百里東去瓜州六千七百五十里大業中遣使貢方物嚈噠北史曰嚈噠國大月氏之種類也亦髙車之别種其原出於塞北自金山而南在于闐之西都鳥許水南二百餘里去長安一萬一百里其王都㧞底廷城盖王舎城也其城方十里餘多寺塔皆飾以金寳風俗與突厥略同兄弟共一妻無兄弟者依其多少之數更加帽焉衣服類加以纓絡頭皆剪髪其語與蠕蠕髙車及諸胡不同衆可有十万無城邑依隨水草以氈爲屋夏遷凉土冬逐暖處其王分其諸處妻各在別所相去或一二里巡歴而行毎月一處冬寒之時三月不徒王位不必傅子弟堪者死便受之其國無車輿多駞馬用刑嚴急偷盗無多少皆腰斬盗一責十死者冨家累石爲藏貧者掘地而埋隨身諸物皆置冡内人凶悍能鬪戰西域唐居于闐安息及諸小國三十許皆役属之居號爲大國又曰後魏明帝熈平中遣宋雲沙門法力等使西域訪求佛經時有沙門慧生者亦與俱行正光中還慧生所經諸國不能知其本末及山川里數盖舉其略云太平御覽卷第七百九十三
