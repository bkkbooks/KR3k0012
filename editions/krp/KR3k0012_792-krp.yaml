body:
  text: 西戎一惣序西戎婼羗婼而庻切鄯善于闐大秦龜兹龜音丘兹音茨天竺惣序西戎易曰髙宗伐鬼方三年克之鬼方西羗也書曰西戎即叙羡禹功也詩曰在其板屋亂我心曲西戎板屋也又曰自彼氐羗莫敢不來王爾雅曰西至於邠國極逺之國又曰西至日所入爲太蒙即蒙汜也太蒙之人信禮曰西方曰戎𬒳髮衣皮有不粒食者矣傳曰辛有適伊川見𬒳髮而祭於野曰不及百年此其戎乎其禮先亡矣又曰秦晉遷陸渾之戎於伊川漢書曰西域以孝武時始通本三十六國其後稍分至五十餘皆在匈奴之西烏孫之南南北有大山中央者河東西六千餘里南北千餘里東則接漢限以玉門陽關西則限以葱領漢史曰出陽關自近者始曰婼羗婼音而遮切婼羗國王號去胡來王言去離胡戎來附漢也又曰漢武帝征和中貳師將軍李廣利以軍降匈奴帝旣悔於征伐而捜粟都尉桑弘羊與丞相御史奏言故輪臺以東捷枝渠梨皆故國也輪臺渠地名今在交河北庭界廣饒水草有漑田五千頃以上處温和田美可益通溝渠種五榖與中國同時熟田一歳有積榖募人壯徤有累重敢徙者詣田所累重謂妻子家属也就畜積爲本業墾漑田稍築列亭連城西以威西國帝深陳旣徃之悔乃下詔曰前有司奏欲益人賦三十助邊用每口取錢三十是重困老弱孤獨也由是不復出軍而封丞相車千秋爲冨民侯以明休息思冨飬人也後漢書曰西羗之本出自三苗盖羗姓之別其國近南嶽及舜流四凶徙之三危河關之西南羗地是也濵於賜支至於河首綿地千里賜支者禹貢所謂析支者也南接蜀漢所居無常依隨水草地少五榖以産牧爲業其俗人民氏族無定或以父名母姓爲種號三二丗後相與㛰姻父没則妻後母兄亡則納婺嫂寡嫂日婺故國無鰥寡種類繁熾不立君臣無相長一強則分種爲角酋豪弱則爲附落更相抄暴以力爲雄殺人償死無他禁令其兵長在山谷短於平地不能持乆而果於觸突以戰死爲吉利病終爲不祥甚耐寒苦同之禽獸雖婦人産子亦不避風雪性堅固勇猛得西方金行之氣焉王政修則賔服德教失則㓂亂又曰昔夏后氏太康失國四夷背叛及后相即位乃征畎夷七年然後來賔又曰武乙暴虐犬戎㓂邊周古公踰梁山而遊于歧下及子季歷遂伐西落鬼戎又曰文王爲西伯西有昆夷之患北有獫狁之難遂攘戎狄西戎之國莫不賔服又曰穆王時戎狄不貢王乃西征犬戎獲其五王又得四白鹿四白狼王遂遷戎于太原又曰平王之末自隴山以東及乎伊洛徃徃有戎於是渭有狄䝠䝠音邽兾之戎涇北有義渠之戎洛川有大荔之戎渭南有驪戎伊洛間有楊拒泉臯之戎潁川以西有蠻氏之戎又曰晉文公欲修霸業乃賂戎狄通道以扶王室秦穆公得戎人由余遂霸西戎開地千里又曰陸渾之戎叛晉晉令荀吴㓕之楚執蠻氏而盡囚其民又曰周貞王八年秦厲公㓕大荔取其地趙亦㓕代戎代戎即地戎也韓魏復共稍并伊洛隂戎滅之其遺脫者皆迯奔西踰汧隴自是中國無戎宼後漢書曰武帝時西域内屬有三十六國漢爲置使者校尉領護之宣帝改曰都護元帝又置戊巳校尉屯田於車師漢官儀曰戊巳中央鎮覆四方也哀平間自相分割爲五十五國又曰建武中西羗皆遣使求内属願請都護丗祖以天下𥘉定未遑外事訖不許之又曰明帝命將北征匈奴取伊吾盧地置冝禾都尉以屯田遂通西域于闐諸國皆遣子入侍又曰建𥘉元年春酒泉太守叚彭大破車師於交河城章帝不欲疲弊中國以事夷狄乃迎還戊巳校尉不復遣都護二年復罷屯田又曰和帝永元三年班超遂定西域因以超爲都護治龜兹復置戊巳校尉領兵五千人治車師又曰六年班超復擊破焉耆於是五十餘國悉納質内属其條支安息諸國至于海濵四方里外皆重譯貢獻又曰九年班超掾甘英窮臨西海而還皆前丗所不至山經所未詳莫不備其風土傳其珎恠焉於是逺國蒙竒兠勒皆來歸服班固西戎論曰孝武之代圖制匈奴患其兼從西國結黨南羗從音子容反乃表河西列四郡開玉門通西域以断匈奴右臂隔絶南羗月氏單于失援由是逺遁而幕南無王庭因文景玄黙飬人天下豐冨財力有餘士馬彊盛故能賭犀布瑇瑁則建朱崖七郡惑蒟音矩醬竹杖則開牂柯越嶲聞天馬蒲陶則通大宛安息自是之後萬里相奉師旅之費不可勝計至於用度不足乃榷酒酤筦塩䥫鑄曰金皮弊筭至車舩租及六畜人力屈財竭困之加凶年群盗並起自以末年遂弃輪臺之地而下哀痛之詔豈非仁聖之所悔哉且西域近有龍堆逺則葱嶺身熱頭痛懸度之阨淮南杜欽楊雄之論皆以爲此天地所以界别區域絶外内也書云西戎即序禹就而序之非止威服致其貢物也魏徵西戎論曰自古開逺夷通絶域必因宏放之主皆起好事之臣張騫鑿空於前班超投筆於後或結之重寳或攝之利劒投軀萬死之地以立一朝之功皆由主尚來逺之名臣徇輕生之節是知上之所好下必有甚焉者也煬帝規摹宏侈掩吞漢外裴矩方進西域圖記以蕩其心故萬乗親出玉門關置伊吾且末郡而關右暨於流沙騷然無聊生矣古哲王之制方五千里務安諸夏不事要荒豈威不能加德不能𬒳盖不以四夷勞中國不以無用害有用也是以秦成五嶺漢事三邊或道殣相継或户口减半隋室恃其強盛亦狼狽於青海此皆一人失其道故億兆罹其毒也說文曰羗西婼羗戎牧羊人從人牧羊漢書曰出陽關自近者始曰婼羗國王號去胡來王去陽關千八百里去長安六千三百里西接且末隨畜逐水草不田作仰鄯善且末榖山有䥫自作兵有弓矛服刀劒劉德曰服刀拍髀也師古曰指音貊髀音俾又音陛鄯善漢書曰鄯善國本名樓蘭王治杆泥城杆音鳥輔國侯却胡侯鄯善都尉擊車師都尉左右且渠撃車師君各一人譯長二人又曰鄯善地沙鹵少田寄田仰榖旁國國出玉多葭葦檉栁胡桐白草孟康曰白草草之白者也胡桐似桑而多曲師古日胡桐涙可以汗金銀今工匠皆用之民隨畜牧逐水草有驢馬多橐佗師古曰佗古他字也又曰武帝遣從票侯趙破奴將属國騎及郡兵數万擊姑師虜樓蘭王破如師於是漢列亭鄣至玉門矣又曰樓蘭國最在東垂近漢當白龍堆乏水草常主發導負水擔粮送迎漢使又曰元鳯四年大將軍霍光白遣平樂監傳介子徃刺其王介子輕將勇敢士齎金幣楊言以賜外國爲名旣至樓蘭詐其王欲賜之王喜與介子飲醉將其王屏語壯士二人從後刺殺之貴人左右皆散走介子告諭以王負漢罪天子遣我誅王當更立王弟尉屠耆在漢者漢兵方至母敢動自令㓕國矣介子遂斬王嘗歸首嘗歸者其王名也馳傳詣闕懸首北闕下封介子爲義陽侯乃立尉屠耆爲王更名其國爲鄯善爲刻印章賜以宫女爲夫人備車騎輜重丞相將軍百官送至横門外撗音光祖而遣之北史曰鄯城方一里地多沙鹵少水草北即白龍堆路後魏孝文太和四年遣其弟素延耆入侍于闐漢書曰于闐國王治西域去長安九千六百七十里于闐之西水皆西流注海其東流注澤河源出焉多玉石玉石玉之璞也後漢書曰于闐去洛陽万一千七百里建武末莎車王賢強盛攻并于闐徙其王俞林爲驪歸王明帝永平中于闐將休莫覇及莎車自立爲于闐王休莫覇死兄子廣德立後遂㓕莎車其國轉盛北史曰于闐國在葱嶺之北二百餘里所都城方八九里城東三十里有首㧞河中出玉石土冝五榖并桑麻山多美玉有好馬駞騾其刑法殺人者死也又曰于闐俗重佛法寺塔僧尼甚衆王尤信尚毎設齋日必親自灑掃饋食焉城南五十里有賛摩寺即昔羅漢比丘盧旃爲其王造覆瓮浮圖之所石上有辟支佛跣處雙跡猶存西有比摩寺云是老子化胡成佛之所又曰于闐城東二十里有大水北流號樹枝水即黄河也又曰後魏文獻末蠕蠕㓂于闐于闐患之遣使素目伽上表求救帝詔以遐阻不行又曰後周武帝建德三年其王遣使獻名馬隋大業中頻遣朝貢其王姓王字早示門練錦帽金䑕冠妻戴金花其王髪不令人見俗言若見王髪其年必儉梁書曰武帝天監十三年王遣使獻娑羅婆歩鄣十八年又獻瑠琉甖唐書曰其國出羙玉王姓尉遟名屋宻貞觀六年遣使獻玉帶太宗優詔荅之大秦後漢書曰大秦國一名黎鞬在海西地方數千里以石爲城郭列置郵亭堊墍之又曰民俗力田蠶桑㫮髠頭而衣文繡乘輜軿白蓋小車岀入擊鼔建旌旗幡幟又曰王宫室皆以水精爲柱食器亦然又曰其人民皆長大平正有類中國故謂之大秦國多金銀竒寳有夜光璧明月珠駭雞犀珊瑚虎魄琉璃瑯玕織成金縷罽雜色綾作黄金塗火浣布又曰合㑹諸香煎其汁以爲蘇合以金銀爲錢銀錢十當金錢一又曰桓帝延熹九年大秦王安敦遣使自日南徼外獻象牙犀角瑇琩始一通焉又曰其國無盗賊而道多猛獸師子遮害行旅不百餘人齎兵器輙爲所食又有飛橋數百里可度海魏略曰其國中山出九色次玉石一曰青二曰赤三曰黃四曰白五曰黒六曰緑七曰紫八曰紅九曰紺多神龜朱鬣馬玄熊赤白黒黃青縁紺縹紅紫十種瑠璃通典曰國之西南漲海中可七八百里行到珊瑚淵水底有盤石珊瑚生其上大秦人常乗大舶載䥫網令工没先入視之可下綱乃下𥘉生白而漸漸似薗生茅中歷歳許出網目間變作黃色枝條交錯髙極三四尺大者圍尺餘三年色乃赤好後没視之知可採便以䥫鈔發其根乃以索繫網使人於舶上絞車舉去還國理載恣意所作若失時不舉便蠧敗龜兹龜音丘兹音茨北史曰龜兹國在尉犁西北白山之南一百七十里王姓白即後凉吕光所立白震之後其王頭繫綵帶垂之於後坐金師子床又曰出細氈饒銅䥫鈆麋皮氍毹沙塩緑雌黃胡粉安息香等又曰其國北大山中有如膏者流岀成川行數里入地狀如醍醐服之髪齒巳落者能令更生癘人服之皆愈唐書曰龜兹有城郭男女皆剪髪垂與項齊唯王不剪髪以錦蒙頂着錦𫀆金寳帶坐金師子床有良馬封牛饒蒲萄酒又曰貞觀四年遣使來獻馬太宗賜以璽書撫慰甚厚自此朝貢不絶又曰貞觀二十年太宗遣左驍衛大將軍阿史郍杜尓安西都護郭孝恪率五將軍發䥫勒十三部兵以伐龜兹禽其王及大將羯獵顚等并破其大城五所虜男女數萬口勒石紀功而旋俘其王訶黎布失畢及郍利羯獵顚等献於社廟㝷以訶黎布失畢爲左武翊衛中郎將郍利以下授官各有差又曰先是太宗旣破龜兹移置安西都護府於其國城以郭孝恪爲都護兼統于闐踈勒碎葉謂之四鎮髙宗嗣位不欲廣地勞人復命有司弃龜兹等四鎮移安西依舊西州又曰長壽元年武威軍惣管王孝傑阿史郍忠節大破吐蕃克復龜兹于闐等四鎮自此復於龜兹置安西都護府用漢兵三萬人以鎮之則天時有田楊名中宗時有郭元振開元𥘉則張孝嵩杜暹等爲安西都護皆有政績爲夷人所伏天笁後漢書曰天竺國一名身毒在月氏東南數千里卑濕暑熱其國臨大水乗象而戰脩浮圖道不殺伐遂以成俗出象犀瑇瑁金銀諸香石宻黒塩等又曰明帝夢見金人長大項有光明以問群臣或曰西方有神名曰佛其形長丈六尺而黄金色帝於是遣使天竺問佛道法遂行於中國圖畫形象焉南史曰梁天監𥘉王來貢獻王有螺髻於頂餘剪之穿耳垂璫俗多徒跣衣重白色有文字或善天文筭暦之術其人皆學悉曇章書於貝多葉樹之北史曰天竺國去代三萬一千五百里有伏醜城周匝十里城中出摩尼珠珊瑚城東三百里有拔賴城城中出黄金白真檀赤檀石蜜唐書曰中天竺其都城周回七十餘里北臨禪連河云昔有婆羅門領徒千人隷業於樹下樹神降之遂爲夫婦宫室自然而立僮㒒甚盛於是使役百神築城以統之經曰而就此後有阿育王頗行苛政置炮烙之刑謂之地獄今城中見有迹焉又曰武德中其國大亂其嗣王尸羅逸多練兵聚衆所向無敵象不解鞍人不釋甲居六載而四天竺之君皆北面以臣之威勢逺振政刑甚肅貞觀十五年尸羅逸多自稱摩伽陁王遣使朝貢太宗降璽書慰問尸羅逸多大驚問諸國人曰自古曽有摩訶振且使人至吾國乎皆曰未之有也乃膜拜而受詔書因遣使朝貢太宗以其地逺禮之甚厚復遣衛尉丞李義表報使尸羅逸多遣大臣郊迎傾都邑以縱觀焚香夾道逸多率其臣下東面拜受勑書復遣使獻大珠及鬰金香菩提樹又曰貞觀十年沙門玄奘至其國將𣑽本經論六百餘部而歸先是遣右率府長史王玄䇿徃使天笁其四天笁王咸遣使朝貢㑹中天竺王尸羅逸多死國中大亂其弟阿羅郍順篡立乃盡發胡兵以拒玄䇿玄䇿戰不敵乃抜身宵遁走至吐蕃發精銳一千二百人并埿婆羅國七千餘騎以從玄䇿與副使蔣師仁率二國兵進至中天笁國城連戰三日大破之斬首三千餘級赴水溺死者且萬人阿羅郍順弃城而遁師仁進兵擒獲之虜男女萬二千人牛馬三萬餘頭疋於是天笁震懼俘阿羅郍順以歸二十二年至京師太宗大恱命有司告宗廟因謂群臣曰夫人耳目玩於聲色口鼻躭於臭味此乃敗德之源若婆羅門不劫掠我使人豈爲俘虜邪昔中山以貪寳取弊蜀侯以金牛致㓕莫不由之拜玄䇿朝散大夫是時就其國得方士郍羅邇婆寐自言壽二百歳云有長生之術太宗深加禮待館之於金颷門内造延年之藥令兵部尚書崔敦禮監主之發使天下採諸竒藥藥成竟服不效後放還本國又曰開元八年南天竺國遣使獻五色能言鸚鵡異物志曰天竺大國也方三萬里佛道所在其國王治城郭宫殿皆彫文刻箋鍾皷音樂跳丸躍劒通典曰後魏宣武時南天竺國遣使獻駿馬云其國出師子䝍䝍胡昆切有火齊如雲母而色紫列之則薄如蟬翼積之則如紗縠之重呇有金剛似紫石英百錬不銷可以攻玉太平御覽卷第七百九十二
