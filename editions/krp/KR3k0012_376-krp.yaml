body:
  text: 人事部十七心肝肺脾腎膽胃腸膀胱死心釋名曰心纎也所識纎微無物不貫也禮記禮運曰欲惡者心之大端也人藏其心不可測度也羙惡皆在其心不見其色也欲一以窮之舎禮何以哉又祭義曰致樂以治心則易直子諒之心油然生矣易直子諒之心生則樂樂則安安則乆乆則天天則神天則不言而信神則不怒而威致樂以治心者也又緇衣曰子曰民以君爲心君以民爲體心莊則體舒心肅則容敬心好之身必安之君好之民必欲之心以體全亦以體傷君以民存亦以民亡又大學曰欲脩其身者先正其心左傳莊公曰楚武王伐隨入告夫人鄧㬅曰余心蕩矣鄧㬅歎曰王禄盡矣盈而蕩天之道也故臨武事將發大命而蕩王心焉若師徒無虧王薨於行國之福也王遂行卒於樠音門木之下又昭公五年曰周景王鑄無射泠州鳩曰王其以心疾死乎毛詩柏舟曰我心匪石不可轉也我心匪席不可卷也又谷風曰習習谷風以隂以雨黽勉同心不冝有怒又小弁曰我心憂傷惄焉如擣又巧言曰他人有心予忖度之周易上繫曰二人同心其利斷金尚書仲虺之誥曰以義制事以禮制心又太甲下曰有言逆于汝心必求諸道人以言咈違汝心必以道義求其意勿拒逆之又說命曰啓乃心沃朕心又泰誓曰受有臣億萬惟億萬心人執異心不和諧予有臣三千惟一心三千一心言同欲又曰斮朝渉之脛剖賢人之心又酒誥曰誕惟厥縱淫泆于非彛用燕喪威儀民罔不䀌傷心又周官曰作徳心逸日休作僞心勞日拙爲德直道而行於心逸豫而各日羙爲僞飾巧百端於心勞苦而事日拙不可爲論語曰七十而縱心所欲不踰矩又曰回也其心三月不違仁史記曰呉公子季札𥘉使北過徐君好季札劒口弗敢言季札心知之爲使上國未獻還至徐徐君巳死於是乃解其寳劒繫之徐君塚樹而去從者曰徐子巳死尚誰予乎季子曰不然始吾心巳許之豈以死倍吾心哉戰國䇿曰蘇秦爲趙合從於楚威王曰秦虎狼之國不可親寡人卧不安席食不甘味心揺揺然如懸旌無所終薄漢書張耳傳曰上從東垣過柏人欲宿心動帝曰柏人者迫於人也不宿而去又鄭崇傳曰尚書令趙昌佞謟素害崇知其見䟽因奏崇與宗族通疑有姧請治上責崇曰君門如市人何以欲禁切主上崇曰臣門如市臣心如水東觀漢記曰許輔平原人爲縣門下小吏縣令劉雄爲賊所攻欲以矛刺雄輔前叩頭以身代雄賊等遂㦸刺輔貫心洞背即死東郡太守捕得賊具以狀上詔書傷痛之蜀志曰劉琮聞曹公來征遣使請降先主在樊聞之率衆南行請葛亮與友人徐庶並從爲曹公所追獲庶母庶辭先主而指其心曰夲欲與將軍共圖王覇之業者以此方寸之地也今失老母方寸亂矣無益於事請於此別遂詣曹公晉書曰張華𬒳誅華曰臣先帝老臣中心如丹臣不愛死懼王室之難禍不可測也又曰阮咸與籍爲竹林之遊太原郭弈髙爽爲衆所推見咸而心醉不覺歎焉又曰顧和王導爲楊州辟從事月旦當朝未入停車門外周顗遇之和方釋風夷然不動顗旣過顧指和心曰此中何所有和徐應曰此中最是難測地顗入謂導曰卿州吏中有一令僕才導亦以爲然齊書曰陸惠曉匪躬清恪風神俊朗何點每歎曰惠曉心如明鏡遇形觸物無不朗然又曰南陽宋元卿有志行早孤爲祖母所養祖母病元卿在逺輙心痛大病則大痛小病小痛以此爲常南史曰賀道養工下筮經遇工歌女人病死爲筮之曰此非死也天帝召之歌耳乃以土塊加其心上俄頃而蘇唐書曰憲宗問宰臣爲理之要何先裴垍對曰先正其心上深然之又曰魏州節度使田布以牙將吏憲誠離間三軍度衆終不爲用乃密表陳情號哭拜授其從事李石乃入啓父靈抽刀刺心曰上以謝君父下以示三軍言訖而絶又曰昭宗龍紀元年杭州刺史錢鏐攻宣州下之擒劉浩剖心以祭周寳國語曰觀其容而知其心矣又曰諺曰衆心成城老子曰聖人無常心以百姓心爲心管子曰心之在體君之位也九竅之有職官之分也心處其道九竅修理故曰上離其道下失其事晏子春秋曰景公田於署梁十八日不返晏子徃見公曰夫乎何遽得無有故乎對曰國人皆以君安野而好獸公曰夫以獄訟不正則太士子牛存焉社稷宗廟不享則太祝子游存矣倉廪不實申田存矣國家之有餘不足騁乎則吾子存焉寡人有吾子猶心有四支故心得佚晏子曰若心有四支而得佚則可令四支一日無心乎公罷田而返又曰崔杼殺莊公敢不盟者㦸鈎其頸劒承其心晏子不與盟而出上車其僕將馳晏子撫其手曰鹿生於山野命懸於庖厨嬰命有所懸矣成節而去又曰一心可以事百君百心不可以事一君仲尼聞之曰小子記之晏子以一心事百君文子曰心者形之主也神者心之寳也列子曰魯公扈趙嬰齊同見扁鵲鵲曰公扈志強而氣弱足於謀而寡斷嬰齊志弱而氣強故少於慮而傷於專若換汝之心則均於善矣遂飲二人毒酒迷死三日剖胸探心易而置之救以神藥旣寤如𥘉於是公扈反嬰齊之室而有其妻子妻子不識嬰齊反公扈之室而有其妻子妻子亦不識也又曰龍叔謂文摯曰吾有疾子能巳乎文摯乃命龍叔背明而立文摯從而向明理望之旣而曰噫見子之心矣方寸之地虚矣幾聖人也子心六孔通流一孔不逹舊說聖人心有七孔今聖智爲病者或由此乎孟子曰人皆知糞其田莫知糞其心糞田不過苗利得粟糞心易行而得所欲何謂糞心博學多聞何謂易行一欲止淫又曰見孑焉正子入井皆有惻隠之心非子父母也無此心者非人也無善惡之心非人也莊子曰孔子曰凡人心險於山川難知於天又曰萬惡不可納於靈臺司馬注曰心爲神聖之臺又曰至人之用心若鏡郭象注曰鑒物無錯不將不迎應而不藏來即應去即止韓子曰西門豹性急佩韋以自緩巳董安于心緩佩弦以自急子思子曰百心不可得一人一心可得百人孫卿子曰君子之學入乎耳著乎心布乎四支動静皆可爲法公孫尼子曰心者衆智之要物皆求於心淮南子曰夫心者五藏之主也所以制使四支流行血氣馳騁于是非之境而出入于百事之門户者是也抱朴子曰昔西施心病卧於道側蘭麝芬芳見者咸美其容篤論曰杜恕與宋瓘書曰吾年五十不見廢棄者遭明逹君子亮其夲心若不見亮便刳心着地正數斤肉耳何足有所明耶傳子曰心有管籥須言而發又曰人皆知滌其器而莫知洗其心異苑曰鄭玄師馬融三載無聞融鄙而遣還玄過樹隂下假寐夢見一父老以刀開其心謂曰子可學矣於是寤而即反遂精洞典籍融歎曰詩書禮易皆巳東矣列女傳曰王子比干諌紂以爲妖言妲巳謂曰吾聞聖人之心有七竅竅有九毛遂剖視之括地圗曰無咸民食土死即埋之其心不朽百年復生去玉関四萬六千里風俗通曰俗說無恙無病也凡人相問無病也案易傳上古露宿患恙虫噬食人心凡相訪問曰無恙乎非謂病也丗說曰魏武云人欲危巳巳輙心動因語所親小人曰汝懷刀密來我側我必心動使戮汝但勿言當厚相報懷刀者信焉遂斬之謀逆者挫氣又曰簡文帝入華林園顧左右曰會心處不必在逺翳然林木便自有濠梁想覺魚鳥自來見親諸葛亮書曰吾心如秤不能爲人作輕重肝說文曰肝火藏也釋名曰肝幹也於五行屬木故其體狀有枝幹也凡物以木爲幹也樂動聲儀曰五藏肝仁肝所以仁者何肝木之精也仁者好生東方者陽也萬物始生故肝象木色而有枝葉史記曰盗跖日殺不辜肝人之肉暴戻恣睢聚黨數千人橫行天下竟以壽終漢書曰蒯通說韓信曰今劉項分爭使人肝腦塗地流離中野不可勝數又曰息夫躬絶命辝曰涕泣流兮雚蘭心結愲音骨兮傷肝魏末傳曰諸葛誕殺文欽及城䧟欽子鴦虎先入殺誕噉其肝續晉陽秋曰㑹稽太守謝琰拒孫恩恩帳下都督張猛於後斫馬琰墮地遂殺之髙祖左里之捷生禽猛送琰小子混混刳肝生食之崔鴻十六國春秋北涼録曰馬權兄爲涼將綦母詡所殺權後殺詡食其肝括地圗曰細民肝不朽死八年復生穴處衣皮莊子曰盗跖居太山膾人肝而食之吕氏春秋曰衛懿公有臣弘演有所使翟人攻衛殺懿公盡食其肉獨舎其肝弘演至報使見肝盡哀而止曰臣請爲襮音博因自殺先出其肝内公之肝齊桓公聞之復衛髙誘注曰襮表也賈子曰武王伐紂紂闘而死棄之王門外民蹈其腹蹙其腎踐其肺履其肝武王以幃守之民褰而入以石抵之者猶未止唐書曰天寳三年有星如月墜于東南墜後有聲京師訛言官遣棖捕人肝以祭天狗人相恣畿縣尤甚發使安之談藪曰徐摛好爲躰語甞躰一人病㿈曰朱血夜流黄膿晝冩斜看紫肺正視紅肝肺說文曰肺水藏也釋名曰肺勃也其氣勃鬱也毛詩蕩桒柔曰自有肺腸俾民卒狂博物志曰鏐音留民其肺不朽百年復生白虎通曰肺所以義者何肺者金之精義者断決西方亦殺成萬物故肺象金色白繫於鼻脾說文曰脾金藏也釋名曰脾禆也在胃下禆助胃氣主化榖也陳思王辨道論曰甘始論車師之西國兒生劈背出脾欲其食少而努行也白虎通曰脾之爲言併也所以併積氣又曰脾所以信何脾者土之精土尚任養萬物無所私信之至也故脾象土色黄繫於舌腎說文曰腎水藏也釋名曰腎屬水主引水氣灌注諸脉也尚書盤庚曰今我其敷心腹腎腸歴告尓百姓于朕志布心腹言輸誠於百姓以吿志文子曰腎主鼻白虎通曰腎所以智何腎者水之精智者進止無所疑惑水亦進而不惑北方水故腎黒隂故腎雙居膽說文曰膽連肝之府也史記曰呉旣赦越王勾踐返國苦身焦思置膽於坐卧即仰飲膽曰汝忘㑹稽之恥乎魏志曰樂進字文謙陽平衛國人容貌短小心膽烈從太祖爲帳下吏又曰袁紹在黎陽將南渡時程昱有七百兵守鄄城太祖使人告昱欲益二千兵昱不肯曰袁紹擁十萬衆自以所向無前今見昱兵少必不來攻太祖從之紹果不徃太祖謂賈詡曰程昱之膽過於賁育又曰袁紹旣并公孫瓉兼四州地衆十餘萬諸將以爲不可敵公曰紹志大而智小色厲而膽薄土地雖廣糧食豐適所以爲奉吾也呉志曰吕蒙病篤孫權問曰卿如不起誰可代者對曰朱然膽有餘愚以爲可任蒙卒權假朱然節鎮江陵又曰朱然長不過七尺氣候分明内行修㓗其所文彩唯施軍器餘皆質素終日欽欽常存戰埸臨急膽定尤過絶人管輅別傳曰輅年十五琅耶太守單子春雅有才度欲見輅輅造之客百餘人有能言之士輅謂子春曰府君名土加有雄貴之姿輅旣年少膽未堅剛若欲相觀懼失精神先飲三升清酒然後而言子春大喜酌三升獨使飲之於是輅與人人荅對言皆有餘趙雲別傳曰雲字子龍先主入益州雲留守營曹公爭漢中地運米北山下數千萬囊黄忠以爲可取過期不還雲將數十人出圍視忠值曹公揚兵大出爲前鋒所擊且却公軍散走巳復合雲䧟敵還入營更大開門偃旗鼔公疑雲有伏兵引去雲鼔震以戎弩於後射公軍公軍驚駭因相蹂踐墮漢水死者甚多先主明日自來視昨戰處曰子龍一身都爲膽宋書曰太學生㑹稽魏淮以才學爲王融所賞旣欲奉子良而淮鼔成其事太學生盧義丘園賔竊相謂曰竟陵才弱王中書無断敗在目中矣及融誅召淮入舎人省詰問遂懼而死舉體皆青時人謂淮膽破唐書曰武懿宗安撫河北諸州先是百姓有脅從賊者後得歸來懿宗以爲同反盡生刳取其膽然後行刑流血盈前言笑自若又曰孫思邈對盧昭隣曰膽欲大而心欲小黄帝素問曰膽者中心之官断決出焉白虎通曰膽者肝之府肝者木之精主仁仁者苦不忍故以膽斷是以仁者有勇故膽斷也肝膽異處何以其相爲府也肝者木精木之爲言牧也人怒無不色青目振張者是其效也西京雜記曰秦有方鏡廣四尺髙五尺九寸表裏有明人直來照之影則倒見以手掩心而來即見腸胃五藏歴然人有疾病在内即掩心照之即知病之所在女有邪心則膽張心動秦始皇帝以照宫人膽張心動者則殺之丗說曰姜維死時見剖膽大如斗胃說文曰胃榖府也釋名曰胃圍也受食物也春秋元命苞曰胃者脾之府主禀氣胃者榖之委故脾禀氣也魏略曰陳思王精意著作食飲損减得反胃病也物理論曰腹胃五藏之府陶冶之大化也腸說文曰腸大小腸也釋名曰腸暢也暢胃氣去滓穢也史記曰聶政刺殺韓累因自披面抉眼自屠出腸遂以死又曰衛綰爲中郎將郎官有譴常蒙其罪不與他將爭有功常讓他將上以爲廉忠實無他腸後漢書曰董卓將兵擊韓遂詔徴卓爲少府不肯就上書言所將湟中義從及秦胡兵牽挽臣車使不得行羌胡弊腸狗態言羌胡心腸弊悪情態如狗也臣禁不能止魏略曰丁沖爲司􅊢校尉後數歲遇諸將飲羙不能止醉爛腸而死呉書曰孫堅母懷堅夢腸出繞呉昌門寤而懼之告隣母母曰安知非吉徴梁書曰王偉甞爲候景作撽撽湘東王及景敗獲偉王怒釘其舌抽其腸而死抱朴子曰欲得長生腸中清欲得不死腸無屎白虎通曰大賜小腸心之府也主禮禮有分理腸亦大小相承受也王子年拾遺録曰北有浣腸之國從口中引腸出出而浣濯之更遞易其五藏浣畢嘯慠而飛焉楚辭九章曰惟郢路之遼逺腸一夕而九廻膀胱廣雅曰膀胱謂之脬音胞釋名曰胞歩交切也鞄虚空之言也主以虚承水汋也或曰膀胱言體短而横廣也脬與胞同音春秋元命苞曰膀胱者肺之府也肺者断決膀胱亦常張有勢故膀胱決難也凥說文曰睢凥也脽音誰釋名曰凥廖也所在寥牢深也漢書曰文帝甞夢欲上天不能有一黄頭郎推之上天顧見其衣凥帶後穿師古曰衣凥帶後謂衣當凥上而居革帶之下處也覺而之漸臺以夢中隂目求推者郎見鄧通其衣後穿夢中所見也召問其姓名文帝甚恱尊幸之王隠晉書曰成都王攻洛大駕幸北城上觀看孟豺軍人擘凥面天子豺士皆切後降長沙王以豺軍人辱帝東市斬之晉中興書曰胡母輔之子謙之醉與父語常呼父字輔之亦不怪也常窺輔之厲聲曰彦國老年不得爲尔將令我凥背東壁輔之遽呼入與共飮酒其爲放逹如此京房易妖占曰人生子無凥國主以仇亡淮南子曰北方人下凥太平御覽卷第三百七十六
