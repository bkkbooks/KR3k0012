front:
  text: 太平御覽卷第六百九十服章部七
  hash: sha256:1c5e130c9bbfc25cf74273fdbfd912b09485c751acc15e498aa161f05bdd7c64
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_690-1a}
body:
  text: 衮衣鷩衣毳衣絺衣玄衣禕衣䄖狄䄖音摇闕翟鞠衣展衣展渉扇切檀禒衣禒通貫切袗衣朱衣衮衣說文曰衮天子享先王卷音衮龍繡於下幡一龍蟠阿上嚮釋名曰衮卷也畫卷龍於衣也書曰帝曰予欲觀古人之象孔安國曰欲觀衣法象衣服制日月星辰山龍華蟲日月星爲三辰華象草華蟲雉也畫三辰山龍華蟲於衣服施旌旗作㑹宗彛㑹㑹五采也以五采成此畫焉宗廟彜尊亦以山龍華蟲爲飾藻火粉米黼黻絺繡藻水草有文者火爲火字粉若粟米若聚米黼若斧形黻爲兩巳相背葛之精者曰絺五色備曰繡也以五采彰施于五色作服汝明以五色明施五采作尊卑服汝制之也尚書大傳曰山龍青華蟲黄作繢黒宗彛白藻火赤天子五服詩曰九罭之魚鱒魴我覯之子衮衣繡裳又曰君子來朝何錫予之雖無予之路車乗馬又何予之玄衮及黼又曰衮職有闕仲山甫𥙷之左傳曰諸侯伐楚許男斯卒于師凡諸侯薨于朝㑹加一等死王事加二等於是以衮斂衮衣公服也謂加二等禮曰有以大爲貴者天子龍卷諸侯黼大夫黻士玄衣纁裳郊特牲曰祭之日王𬒳衮以象天戴冕藻十有二旒則天數也又明堂位曰衮冕立於阼周禮春宮上司服曰王之吉服亨先王則兖冕又夏官下曰節服氏掌祭禮朝覲衮冕六人維王之太常鄭玄曰服冕者從王服也維維之以縷王旌十二旒兩兩也縷綴連其旁三人持之禮天子旌曳地儀禮覲禮曰天子衮冕負斧扆漢書曰韋孟詩云肅肅我祖家自豕韋衮衣朱黻四牡龍旂後秦記曰姚襄夢弟萇上御座着衮服謂官屬曰此兒或能大起吾族齊書曰陸澄兼左丞泰始六年詔皇太子朝賀服衮冕九章澄與議曹郎丘仲起議服冕以朝實着經文秦除六冕漢明還備魏晉巳來不欲令臣下服冕故位公者加侍官今皇太子禮絶群臣冝遵聖王盛典革近代之制唐書曰代宗時渤海質子盜衮龍服捕得之詞云慕中國衣服上赦之董巴漢輿服志曰上古衣毛而冒皮後世聖人易之以絲麻觀翬翟之文榮華之色乃染帛以効之始作五采成以爲服黄帝堯舜垂衣裳蓋取諸乾坤有文故上衣玄而下裳黄秦以戰國則天子位滅去禮學郊祀之服皆以初玄漢承掌故至顯宗初服冕旒衣章以祀天地養三老五更於三雍三公九卿郊祀天地明堂皆冠冕垂旒衣裳玄上纁下乘輿備文日月辰星十二章三公諸侯用山龍九章九卿以下用華蟲七章皆五采衣裳乘輿刺史公候九卿已下皆織成陳留襄邑獻之續漢輿服志曰聖人處天子位服日月昇龍所以福其德章其功也賢人佐聖封國愛民黼黻文繡降龍所以顯其仁光其能也環濟要略曰天子龍冕諸侯黼大夫黻白與黒謂之黼黒與青謂之黻青與赤謂之文赤與白謂之章五色備謂之繡諸侯去日月星辰服山龍華蟲卿大夫去山龍華蟲服藻火服粉米摰虞决疑要注曰秦除衮冕之制唯爲玄衣絳裳一具而巳漢興亦如之中興後明帝永平中使諸儒案古文依圖書始復造衮冕之服至于今用之榖梁傳序曰一字之褒賞逾華衮片言之貶誅深斧鉞六韜曰昔帝堯王天下黼衣絓履不弊盡不更爲也傅子曰魏明帝疑三公衮冕之服似天子减其采章陳留風俗傳曰襄邑縣南有渙水有睢水傳曰雎渙之水出文章故有黼黻藻錦日月華蟲以奉天子宗廟御服焉鷩衣釋名曰鷩雉山雉也鷩憋并列切也性急憋不可生必自殺故畫其形於衣以象人執耿介之節也周禮春官上司服曰王之吉服享先公饗射鷩冕鄭玄曰先公謂后稷之後也饗射饗食及與諸侯射也鷩畫以雉也三禮圖曰鷩冕服者王祭先公及饗射之服也以朝天子助祭玄衣纁裳以華蟲火宗彞三章畫以爲績裳藻粉米黼黻四章薾歩里切以爲繡凢七章毳衣釋名曰毳芮也畫藻文於衣象水草之毳芮温暖而潔也詩曰大車檻檻毳衣如菼毳衣大夫之服菼騅也蘆之𥘉生者也古者天子大夫服毳冕以廵行大車啍啍他昆切毳衣如璊璊頳也音門周禮春官上司服曰王之吉服祀四望山川則毳冕鄭玄曰毳其衣三章裳三章也三禮圖曰毳冕王祀四望山川服也子男服以朝天子絺衣周禮春官上司服曰王之吉服祭社稷五祀則絺冕鄭玄曰絺或作繡字之誤也繡刺粉采無畫也玄衣詩曰緇衣美武公之德父子並爲周司徒善於其職國人冝之緇衣之冝兮弊予又改爲兮緇衣黒色上卿聽朝之正服也周禮春官上司服曰王之吉服祭群小祀玄冕鄭玄曰群小祀林澤墳衍四方百物之屬也玄者衣無文裳刺黻而已凡冕服玄衣纁衣也禮玉藻曰天子玄端而朝日於東門之外鄭玄曰端當爲冕字之誤朝日春分時也魏臺訪議曰禮天子大夫玄冕而執鴈今秩中二千石六百石者可使玄冕而執鴈禕衣釋名曰王后之上服曰褘衣畫翬雉之文於衣也伊洛而西雉青質五色備曰翬也周禮天官下內司服曰內司服掌王后之六服禕衣王后之服刻繒爲翬之形而采畫之綴於衣從王祭先王則服褘衣也禮明堂位曰夫人副褘立于房中鄭玄曰副首飾也今之步摇是也周禮追師掌王后之首服爲副禕王后之上服也唯魯及王者之後夫人服之諸侯夫人自䄖翟而下也又曰祭義曰歲旣單世婦獻繭于夫人夫人副褘而受之董巴漢輿服志曰太皇太后入廟服紺上皂下后謁廟服白上皂下皆深衣製徐廣云深衣卽單衣公卿列侯中二千石夫人入廟佐祭者服皂絹上下皆深衣制穆天子傳曰吉日戊午天子大服冕禕冕冠禕衣王后之上服今帝服之未洋也授河宗璧䄖狄釋名曰摇翟畫雞雉之文於衣也江淮而南雉素質五采皆備成章周禮天官下内司服曰内司服掌王后之六服䄖狄鄭玄曰䄖狄闕狄畫羽飾也玄謂䄖狄青也三禮六服圖曰䄖翟王后從王祭先公之服也侯伯之夫人服以從君祭宗廟闕翟釋名曰闕翟翦闕繒爲翟雉形以綴衣也詩曰委委蛇蛇象服是冝義曰象服者謂䄖狄闕狄也周禮天官下内司服曰内司服掌王后之六服闕狄鄭司農曰褕狄闕狄畫羽飾也鄭玄曰闕狄刻而不畫者也此三者皆祭服玄謂今世有袿衣者盖三狄之遺象也以推次其色闕狄赤也三禮六服圖曰闕翟王后從祭群小祀服也亦子男夫人服以從君祭宗廟鞠衣釋名曰鞠衣如菊花色也周禮天官下内司服曰内司服掌王后六服鞠衣鄭司農曰鞠衣黄桑服也色如鞠座像桑葉始生三禮六服圖曰鞠衣王后桑之服也孤之妻服以從助君祭董巴漢輿服志曰太皇太后皇太后𧖟服青上縹下深衣制貴人助𧖟服純縹上下深衣制公卿列侯中二千石夫人助𧖟服縹絹上下深衣制自二千石夫人巳上至皇后皆以𧖟衣爲朝服徐廣輿服雜注曰晉先蠶儀注皇后衣純青之衣特進卿丗婦二千石命婦助蠶則青絹上下展衣周禮天官下内司服掌王后之六服展衣展衣白衣三禮六服圖曰展衣王后以禮見王及賔客之服也卿大夫之妻以從助君祭釋名曰䄠展字或作此坦也坦然正白無文采也禒衣通貫反釋名曰禒衣禒然黒色也詩邶柏舟禒衣曰禒兮衣兮禒衣黄裏禒間色黄正色義云禒兮衣兮禒衣自有禮制也諸侯大夫祭服之下鞠衣爲上展衣次之衆妾亦有貴賤之等服鞠衣黄屒衣白禒衣黒皆以素紗爲裏非其制故以喻妾上僣焉禒兮衣兮禒衣黄裳義云婦人之服不殊衣裳同色今衣黒裳黄喻亂嫡妾之禮也周禮天官下内司服曰内司服掌王后六服禒衣素紗禒衣御於王者之服也亦似燕居君子之褖衣黒則是亦黒也袗衣三禮圗曰傅母㛰禮從者袗衣古者傅母選無夫與子而老賤曉習婦道者使之應對也朱衣應劭漢官儀曰虎賁中郎衣紗縠單衣續漢志同晉令絳紗縠東觀漢記曰光武起義衣絳單衣赤幘𥘉伯升之起諸家子弟皆曰伯升殺我及見上絳衣大冠乃驚曰謹厚者亦復爲之晉義熈起居注曰安帝自荆州至新亭詔曰諸侍官戎行之時不備朱服悉令袴褶從也宋元嘉起居注曰治書侍御史朱興啓彈朝請向騰之坐同僚㑹故貟外散騎侍郎楊珎之䘮侍兵唱變服然後唱衆官下陪位而騰之着單衣在朱衣上於禮有虧請免所居官詔可齊書曰吕安國爲右衛將軍加給事中後改封湘郷侯武帝即位累遷光禄大夫加散騎常侍安國欣有文授謂其子曰汝後勿袴褶駈使單衣猶恨不稱當爲朱官也神異經曰西荒有一人不讀五經而意合不觀天文而心通不誦禮律而精當天賜其衣男朱衣縞帶委皃冠女碧衣戴金勝皆無縫墨子曰楚莊王絳衣愽𫀆語林曰何平叔靣絶白魏文帝疑其着粉夏日喚與熱餅旣噉大汗出以朱衣自拭色轉皎然時帝始信之班彪便冝事曰可選師傅將相子孫有行好學者以備絳衣舎人班固與竇憲牋曰將軍哀憐賜固手迹告以中軍冝鮮明乃賜以瑇瑁簪絳紗單衣太平御覽卷第六百九十
