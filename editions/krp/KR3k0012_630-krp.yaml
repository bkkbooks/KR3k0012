body:
  text: 治道部十一薦舉上禮記檀弓下曰趙文子知人所舉於晉國管庫之士七十有餘家管庫之士府史以下官長所置也舉之於君以爲大夫士也管鍵也庫物所藏禮記雜記曰管仲遇盗取二人焉上以爲公臣曰其所與遊僻也可人也言此人可也但居惡人之中使之犯法又儒行曰儒有内稱不避親外舉不避怨程功積事推賢而逹逹之不望其報苟利國家不求冨貴其舉賢援能有如此者左傳莊公曰鮑叔帥師來言曰子糺親也請君討之鮑叔乗勝而進軍志在生得管仲故言不忍之辭管召讎也請受而甘心焉管仲射桓公故曰讎甘心言欲快意戮殺之乃殺子紏于生竇召忽死之管仲請囚鮑叔受之及堂阜而稅之堂阜齊地或日鮑叔解夷吾縛於此因以爲名歸而以告曰管夷吾治於髙傒髙傒齊卿髙敬仲也言管仲治理政事之才多於敬仲使相可也公從之又僖中曰晉侯問原守於寺人勃鞮對曰昔趙衰以壷飱從徑餒而弗食言其廉且仁不忘君也徑猶行也故使處原從披言也衰雖有大功猶簡小善以進之示不遺勞又僖下曰楚子將圍宋使子文治兵於暌終朝而畢不戮一人暌楚邑自旦及食時爲終朝復使子玉治兵於蔿終日而畢鞭七人貫三人耳蔿邑自旦及夕爲終日國老皆賀子文子文飲之酒蔿賈尚㓜後至不賀子文問之對曰不知所賀子之傳政於子玉曰以靖國也靖諸内而敗諸外所獲幾何子玉之敗子之舉也舉以敗國將何賀焉又曰𥘉臼季使遇兾見兾缺耨其妻饁之敬相待如賔與之歸言諸文公曰敬德之聚也能敬必有德德以治民請君用之公曰其父有罪可乎對曰舜之罪也殛鯀其舉也興禹管仲桓公之賊也實相以濟康誥曰父不慈子不祗兄不友弟不恭不相及也詩曰採葑採菲無以下體君取節焉可也文公以爲下軍大夫又曰晉蒐于𬒳廬作三軍謀元帥趙襄曰郤縠可臣亟聞其言矣說禮樂而敦詩書詩書義之府也禮樂德之則也德義利之夲也夏書曰賦納以言明試以功車服以庸君其試之乃使郤縠將中軍又曰秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還遂覇西戎用孟明也君子是以知秦穆之爲君也舉人之周也周備也不偏以一堊弃其善與人之壹也一無二心孟明之臣也其不解也能懼思也子桑之忠也其知人也能舉善也子桑公孫枝舉孟明者詩曰于以采蘩于沼于沚于以用之公侯之事秦穆有焉夙夜匪解以事一人孟明有焉詒厥孫謀以燕翼子子桑有焉言子桑有舉善之謀又曰晉蒐于夷舎二軍使狐射姑將中軍趙盾佐之陽處父至自温改蒐于董易中軍陽子成季之屬也故黨於趙氏且謂趙盾能曰使能國之利也是以上之宣子於是乎始爲國政又文下曰昔髙陽氏有才子八人髙陽帝顓頊之號八人其苗裔蒼舒隤敳檮戭大臨尨降庭堅仲容叔逹此即垂益禹臯陶之倫庭堅即臯陶字齊聖廣淵明允篤誠天下之民謂之八愷髙辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍髙辛帝嚳之號此八人稷契朱虎熊羆之倫忠肅共懿宣慈惠和天下之民謂之八元此十六族也丗濟其美不隕其名以至于堯堯不能舉舜臣堯舉八愷使主后土以揆百事莫不時序地平天成舉八元使布五教于四方父義母慈兄友弟恭子孝内平外成是以堯崩而天下如一同心戴舜以爲天子以其舉十六相去四㓙也又襄三曰祁奚請老老致仕晉侯問嗣焉嗣續其職者稱解狐其讎也將立之而卒解狐卒又問焉對曰午也可午祁奚子於是羊舌職死矣晉侯曰孰可以代之對曰赤也可赤職之子伯華於是使祁午爲中軍尉羊舌赤佐之各祁其父君子謂祁奚於是能舉善矣稱其讎不爲謟立其子不爲比舉其偏不爲黨啇書曰無偏無黨王道蕩蕩其祁奚之謂矣解狐淂舉未得位故曰得舉祁午得位伯華得官建一官而三物成一官軍尉物事也能舉善也夫唯善故能舉其類詩云惟其有之是以似之祁奚有焉又襄六曰鄭子皮授子産政辭曰國小而偪偪近大國族大寵多不可爲也子皮曰虎帥以聽誰敢犯子子善相子之國無小言在治政小能事大國乃寛爲大所恤故也論語子夏曰冨哉言乎舜有天下選於衆舉臯陶不仁者逺矣湯有天下選於衆舉伊尹不仁者逺矣又曰仲弓爲季氏宰問政子曰先有司赦小過舉賢才曰焉知賢才而舉之曰舉爾所知爾所不知人其舎諸孔曰女所不知者人將自舉之各舉其所知則賢才無遺又曰公叔文子之臣大夫僎與文子同升諸公孔曰大夫僎本文子家臣薦之使與巳並爲大夫同升在公朝子聞之曰可以爲文矣孔曰言行如是可謚爲文史記曰秦繆公以羖羊皮贖百里奚釋其囚與語國事百里奚讓曰臣不及臣友蹇叔蹇叔賢而丗莫知臣甞遊困於齊而乞食銍人蹇叔収臣困而欲事齊君無知蹇叔止臣臣得脫齊難遂之周周王子頽好牛臣以養牛干之及頽欲用臣蹇叔止臣臣去得不誅事虞君蹇叔止臣臣知虞君不用臣臣誠私利禄爵且留再用其言得脫一不用及虞君之難是以知其賢於是繆公使人厚幣迎蹇叔以爲上大夫又曰秦孝公下令曰賔客群臣有能出竒計強秦者吾且尊官與之分土衛鞅聞是令下西入秦因景監求見孝公說孝公變法脩刑内務耕稼外勸戰士明行賞罰孝公善之卒用鞅法百姓便之乃拜鞅爲左庻長又曰王稽使於魏問鄭安平魏有賢人可與俱西乎安平曰臣里中有張禄先生欲見君言天下事王稽知其范雎乃載以入秦又曰趙烈侯好音謂相國公仲建曰寡人有愛可以貴之乎公仲曰冨之則可貴之則否烈侯曰然夫鄭歌者槍石二人吾賜之田人萬畝公仲曰諾不與居一月烈侯問歌者曰公仲曰求未有可者有頃復問公仲終不與乃稱疾不朝畨吾君謂公仲曰君實好善而未知所持今公仲相趙四年亦有進士乎曰未也畨吾君曰牛畜荀欣徐越皆賢可公仲乃進三人牛畜侍烈侯以仁義約以王道明日荀欣侍以選練舉賢任宫使能明日徐越侍以節財儉用察度功德所與無不充君悅乃使使謂相國曰歌者之田且止官牛畜爲師荀欣爲中尉徐越爲内史賜相國衣二襲史記藺相如者趙人也爲趙官者令繆賢舎人趙惠文王時得楚和氏璧秦昭王聞之使人遺趙王書願以十五城請易璧趙王與諸大臣謀欲與秦恐秦城不得見欺欲勿與即患秦兵之來計未定求人可使報秦者未得官者令繆賢曰臣舎人藺相如可使王問何以知之對曰臣甞有罪竊計欲亡走燕舎人藺相如止臣曰君何以知燕王臣語曰臣甞從大王與燕王㑹境上燕王私握臣手曰願結交以此知之故欲徃相如謂臣曰夫趙強而燕弱而君幸於趙王故燕王欲結交於君今君乃亡趙走燕燕畏趙其勢必不敢留君而束君歸趙矣君不如肉袒伏斧鑕請罪則幸得脫矣臣從其計大王亦幸赦臣臣竊以爲其人勇士有智謀冝可使於是王召問藺相如以爲賢遂使奉璧入秦又曰趙奢趙之田部吏也收租稅而平原君家不肯出趙奢以法治之殺用事者九人平原君怒將殺奢奢因說曰君於趙爲貴公子今縱君家而不奉公則法削法削則國弱國弱則諸侯加兵是無趙也君安得有此冨乎當以君之貴奉公如法則上下平上下平則國強國強趙固而君爲貴戚豈輕於天下耶平原君以爲賢言之於王王用之治國賦太平民冨而府庫實卒爲名將又曰陳平亡楚歸漢因魏無知求見漢王與語而說之乃拜爲都尉使爲叅乗典護軍諸將盡讙後絳侯灌嬰等咸䜛平曰臣聞平居家時盗其嫂事魏不容亡歸楚歸楚不忠又忘歸漢今日大王尊官之令護軍臣聞平受諸將金多者得善處金少者得惡處平反覆亂臣也願王察之漢王疑召讓魏無知無知曰臣所言者能也陛下所問者行也今有尾生孝巳之行而無益於勝負之數陛下何暇用之乎楚漢相距臣進竒謀之士顧其計誠足以利國家不耳且盗嫂受金又何足疑乎王乃厚賜平拜爲護軍中尉盡護諸將後髙祖定天下與平剖符丗丗勿絶爲户牖侯平辭曰此非臣之功也上曰吾用先生謀計戰勝尅敵非功而何平曰非魏無知臣安得進上曰若子可謂不背本矣乃復賞魏無知漢書曰韓信投漢蕭何等巳數言上不用即亡何聞信去不及以聞自追之人有言上曰丞相何亡上怒如失左右手一二日何來謁上見怒且喜罵何曰若亡何也曰臣非敢亡追亡者耳上曰亡者誰曰韓信上曰亡者十數公無所追追信詐也何曰信國士無雙王必欲長王漢中無所事信張晏日無事用信也必欲争天下非信無可與計事者又曰叔孫通降漢從弟子百餘人然無所進專言諸故群盗壯士進之弟子皆曰事先生數年幸而得從降漢今不進臣等專言大猾何通乃言曰漢王方蒙矢石争天下諸生寕能闘乎故先言斬將搴旗之士諸生且待我我不忘之又曰張釋之字季南陽人與兄中同居以貲爲騎郎事孝文帝十年不得調亡所知釋之曰乆宦減仲之産不遂欲免歸中郎將爰盎知其賢惜其去乃請徙釋之𥙷謁者又曰賈誼年十八以能誦詩書屬文稱於郡中河南守呉公聞其秀才召置門下甚愛幸文帝𥘉立聞河南守呉公治平爲天下第一故與李斯同邑而甞學事焉徴以爲廷尉廷尉乃言誼年少頗通諸家之書文帝召以爲博士又曰武帝𥘉即位是時丞相田蚡毎入奏事移日所言皆聽薦人或起家至二千石權移主上上迺曰君除吏盡未吾亦欲除吏也又曰韓安國爲人多大畧知當丗取捨而出於忠厚貪嗜財貨然所推舉士皆賢於己者又曰張安丗甞有所薦人來謝弗復爲通有郎功髙不調自言安丗應曰君之功髙明主所知人臣執事何長短而自言乎絶不許已而郎果遷幕府長史辭去之官安士問以過失長史曰將軍明主股肱而士無所進論者以爲譏安丗曰夫明主在上賢不肖較然臣下自脩而巳何知士而薦之其欲匿名迹逺權勢如此又曰朱買臣隨上計吏爲卒將重車至長安詣闕上書乆不報待詔公車粮用乏上計吏卒更乞與之㑹邑子嚴助貴幸薦買臣召見說春秋言楚辭帝甚恱之拜買臣爲大夫與嚴助俱侍中又曰前將軍韓増舉馮奉丗以衛侯使持節送大宛諸國客至伊修城都尉宋昌言莎車與旁國攻殺漢使奉丗與其副嚴昌計遂以節諭諸國王發其兵進擊莎車攻拔其城莎車王自殺傳其首詣長安諸國悉降威振西域奉世乃罷兵以聞宣帝召見韓増曰賀將軍所舉得人又曰王章奏王鳯不忠天子感悟謂章曰微京兆言吾不聞社稷計且唯賢知賢君誠爲朕求可以自輔者於是章奏封事薦中山孝王舅瑯瑘太守馮野王上欲以代鳯章於此爲鳯所忌又曰何武爲人仁厚好進士奬稱人之善爲楚内史厚兩龔在沛郡厚兩唐及爲公卿薦之朝廷此人顯於丗者何侯之功也丗以此多焉又曰大將軍王鳯用事上遂謙讓無所專左右甞薦光禄大夫劉向少子歆通逺有異材上乃召見誦讀詩賦甚恱之欲以爲中常侍召取衣冠臨當拜左右皆曰未曉大將軍又曰王鳯病天子數自臨問親執其手垂涕曰將軍病如有不諱平阿侯譚次將相矣鳯頓首泣曰譚等雖與臣至親行奢僣無以率遵百姓不如御史大夫音臣敢死保之𥘉譚等倨不肯事鳯而音敬鳯卑恭如子故薦之又曰哀帝有詔舉太常王莽私從何武求舉武不敢舉後數月哀帝崩太后即日引莽入収大司馬董賢印綬詔有司舉可代司馬者莽故大司馬辭位辟丁傅衆庶稱以爲賢又太右近親自大司徒孔光以下舉朝皆舉莽武爲前將軍素與大將軍公孫禄相善二人獨謀議以爲徃時孝惠孝昭少主之外戚吕霍上官持權幾危社稷今孝成孝哀比世無嗣方當選立親近輔㓜主冝令異姓大臣持權親踈相錯爲國計便於是武舉公孫禄可大司馬而禄亦舉武太后竟自用莽爲大司馬莽諷有司劾奏武公孫禄㸦相稱舉皆免又曰王嘉薦儒者公孫光蒲昌及能吏蕭咸薛脩皆故二千石有名稱天子納而用之續漢書曰虞詡以左雄有忠公節上䟽薦之曰伏見議郎左雄數上封事至引陛下身遭危難以爲警戒實有王臣蹇蹇之節周公謨成王之風冝擢在喉舌之官必有匡弼之益由是拜雄尚書又曰陳蕃胡廣等上䟽薦徐稺等曰臣聞善人天地之紀治之所由也伏見處士豫章徐稺城陽姜肱汝南袁閬京兆韋著潁川李曇徳行純備著於民聽若使擢登三事恊亮天工必能翼宣盛美増光日月矣桓帝乃以安車玄纁徴之又曰橋玄遷司空轉司徒素與南陽太守陳球有隙及在公位而薦球爲廷尉又曰皇甫規字威明安定人拜度遼將軍尚書薦中郎將
