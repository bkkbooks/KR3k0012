front:
  text: 太平御覽卷第六百七十五
  hash: sha256:124461b1f80aa160576c8c78297c8598804705fd9a7e1f1af57f40fdeed09a24
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_675-1a}
body:
  text: 道部十七冠幘帔褐䄜𫀆裘衣珮綬板笏帬鈐杖節履舃帷帳席冠眞誥曰有一老人着繡裳戴芙蓉冠倚赤九節杖而立芙蓉冠即禮之爵弁粗欲相似但不知眞人以何物作之耳自非巳成眞不得冠此又曰逺遊冠桐栢眞人戴此冠女眞巳笄者亦戴冠惟西王母首戴玉勝又女眞未笄者則三環角結或飛雲編結餘髪垂兩肩至腰中也龍冠金精巾虎巾青巾虎文巾金巾此天眞冠巾之名不詳其製又曰男眞冠眞並飛天交結道學傳曰王母二玉女侍王母上殿戴太眞晨纓之冠履玄瓊鳯文之舃又曰孟景翼字輔明義嘉構難景翼星夜徃赴經行失道時一人黄衣黄冠在其前引路旣得道乃失所在海空經曰眞仙道士並戴玄冠披翠帔太眞科曰解褐披絳綃之衣釋巾著逺遊之冠又曰人皇著七寳珠冠上清經曰元始皇上丈人戴紫曜之冠佩九色自然之綬又曰髙靈九天建金華七曜之冠又曰王眞九天丈人建飛精百變之冠佩九元道眞之䇿又曰上三天玉童建三華寳曜洞天玉冠四明科曰凢脩上清道經大洞眞經入宣之日當身冠法服又曰凢女子學上清之法受寳經玉訣脩行大洞皆元君夫人之位入宣之曰當冠元君之服万眞束帶玉童玉女各二十人其掌法服無此服不得升於上清洞神經曰受道之人皆玄冠草履傳授經曰老子去周左慈在魏並葛巾單裙不著褐又曰陸先生云對上下接謂之俯仰之格披褐二服也又云冠戴二儀衣𬒳四象故謂之法服道學傳曰西母結大華之髻戴太眞晨纓之冠履玄瓊鳯文之舃上清變化經云紫映玉霄眞玉建建華天冠帶交金之鈎又曰上皇玉靈君建七曜華冠佩舟文紫綬又曰皇上帝君建七色朱精華冠又曰太素髙虗上極紫皇建七寳冠帶神精交蛇之綬又曰虚明紫蘭中元髙嵉君建三華之冠帶流金紫章又曰太素眞君建紫晨巾乗靑龍紫羽蓋玉珮金璫經曰元始天王披九色離羅之帔帶寳冠又曰太帝建七氣朱冠又曰太岳君建三寳九光夜冠又曰華山君建六元通神飛冠佩交靈之綬又曰嵩髙君建中元黄晨玉冠佩黄神中皇之章又曰玉佩帝君建紫冠眞誥曰上元夫人服赤霜𫀆披靑毛錦裘頭作三角髻散髮至於腰戴元晨夜月之冠帶六山火玉之佩腰鳯文琳華太綬執流黄揮精之釼上清變化經曰太元眞人巾芙蓉冠上清元籙曰九天元父戴寳天之冠太上五帝内眞經曰青帝君建九天通天冠又曰赤帝君建三氣玄梁寳冠又曰白帝君建七氣明光寳冠又曰黒帝君建五氣玄晨之冠又曰黄帝建黄晨通天冠佩黄晨越元之䇿帶靈飛紫綬太上飛行羽經曰九晨君建飛精玉冠衣九色之鳯帔又曰元晨君建飛天玉冠衣九龍天衣又曰蓋晨君建三晨寳冠衣丹錦飛裳又曰上晨君建玄精玉冠衣玄羽飛裳又曰華晨君建飛晨寳冠衣青羽飛裳太上飛行羽經曰靈妃元皇夫人建晨纓寳冠昇玄經曰仙人定子明着黄褐玄巾大洞玉訣曰皇𥘉紫元天中眞人披朱錦之服巾緑霞之冠山西經曰玉女建白冠洞神經曰天皇君戴九元冠地皇君戴二晨玉冠執元皇定籙䇿人皇君戴七色冠執上皇保命玉䇿又曰上清瓊宫南極玉眞赤帝君建進賢之冠又曰北極玉眞黒帝君建玄寳之冠西極王眞白帝君建通天寳冠中極玉眞黄帝君建通元五氣之冠土精眞訣曰東方九靈眞人戴九氣冠南極眞人戴進賢冠衣絳章之衣西方素靈眞人戴三寳玄冠北方玄靈眞人戴玄冠中央惣元三靈眞人戴黄晨玉冠玉光八景經曰東元景道君冠七色耀天玉冠躡九色之履金根經曰九天元父戴七色朱玉之幘無極進賢之冠又曰九天玄母著青寳神光錦繡霜羅九色之綬戴紫元玄黄寳冠大有經曰玉清之母戴七神朱玉之髻巾無極進賢之冠著玄黄素靈之綬在太極朱宫又曰九天眞女戴玄黄七稱進賢之冠又曰上清眞女戴玉冠著九色之綬居太幽宫中又曰太極帝妃冠無極進賢之冠衣五色鳯文之綬在太清極玄宫中又曰太上君戴三寳玉冠著九色之綬在無極眞宫中又曰啓明天君冠青精進晨玉冠太一洞眞玄經曰三素老君服錦衣建龍虎冠又曰太一公子白元司命桃君五人皆着朱衣絳巾典主符籍在太微紫房宫中登眞隱訣曰太玄上丹霞玉女戴紫巾又戴紫華芙蓉巾及金精巾飛巾虎文巾金巾龜山元籙曰元始皇上文人冠九氣紫曜之冠衣九光錦𫀆佩九色無縫自然之綬帶六山火玉在上清之上又帶九天仙錬之劒衣九色班文𫀆常乗十二飛麟帶金虎鳯文之綬金眞玉光經曰元景道君曵玄黄之綬建七色玉冠又曰元景道君衣丹錦之綬戴進賢玉冠乗玄景緑與叅駕鳯皇又太陽上府紫微宫中道君曵絳錦丹綬戴玉冠躡九色之履執制魔之章又元景太一君曵玄黄素綬戴七寳冠執命神之䇿乗玉輦五采蓋紫雲車叅駕六龍又曰桐栢山眞人王子喬年甚少整頓非常建芙蓉冠着朱衣以白珠綴衣縫帶劒多論金庭山中事言於衆眞太上素靈經曰太上神仙戴飛晨寳冠又戴青精辰玉冠遊雲寳冠玉精寳冠通天玉寳冠三玄寳冠上清仙公並建扶華沓霞大冠道君冠九德之冠太極左仙公起居注曰太上三天錫仙公芙蓉晨冠靈飛六甲經曰上清瓊宮東極玉眞建九氣通精之冠玉京眞人戴通陽玉晨冠少陽眞人戴通曜之冠太素三元君建寳琅扶晨羽冠紫素元君建太眞晨纓之冠三角髻餘髮散之於腰太極金書曰元始建洞天之冠上君建青精天玉之冠太眞丈人建三寳玉冠三天童建三華寳曜洞天玉冠太洞玉經云紫元眞人𬒳朱錦之服巾緑霞之冠五岳眞形圖曰東岳太山戴倉碧七稱之冠南岳衡山戴九丹日精之冠中岳嵩山冠黄玉太玄之冠西岳華山建太𥘉九流之冠北岳恒山建太冥靈隂之冠青城丈人戴蓋天之冠昇玄經曰昔有仙人豆子明建黄褐玄巾幘紫書金根經曰九天元父戴七稱珠玉之幘敷齊經曰正一功曹冠朱陽之幘帔太極金書曰元始天帝𬒳九色羅帔丹絳之𥚑珠繡霞帔太極左仙公起居注曰太上三天錫仙公丹錦繡帔靈書紫文經曰青童太君衣飛青翠羽龍帔雌一五老經曰太素三元君服紫氣浮雲錦帔又紫繡毛帔又鳯文錦帔無上眞人内傳曰九色錦繡華文之帔太元眞人茅君内傳曰繡羽紫帔九眞中經云青玉錦帔絳玉素玉玄玉黄玉錦帔又云青華丹蘂玉白琳四出龍帔玄玉九道雲錦帔黄雲山文錦帔褐仙公請問經曰太極眞人曰夫學道當㓗浄衣服備巾褐制度名曰道之法服靈寳眞一自然經訣曰至眞巳得道人披九光七色法服靈飛六甲經曰南極玉眞着緋羅法服上清紫宸經曰修七轉之道者上皇君以法服飛仙羽章授之仍戴以紫元飛霜七色之冠䄜上清經曰髙上玉皇衣玉文明光飛雲之褵龜山元籙曰九天玄母衣霜羅九色之䄜又衣青羅之䄜五岳眞形圖曰五岳使者服緋䄜三元布經曰紫素元君衣紫錦裌䄜曰素元君衣白錦光明之䄜龜山元籙曰九色飛雲錦䄜九色自然之䄜玉文明光飛錦之䄜九色珠絳雲光錦䄜丹錦七色文光之䄜𫀆太極金書曰元始披霜珠之𫀆上清經曰三天玉童衣青黄錦𫀆五岳眞形圖曰東岳君服朱光𫀆龜山元籙曰有明光飛錦珠𫀆五色雲羅之𫀆七色鳯雲之𫀆九色班文羽𫀆茅君内傳曰有赤霜之𫀆裘大洞玉經曰司禁眞伯乗日月之軿披虎文之裘八表經曰白素元君衣黄縁曜光雲文之裘五帝内眞經曰有玄文明光之裘九色班裘龜山元籙曰有雲文丹錦之裘衣三道順行經曰玉景眞人衣玄雲錦衣老子歷藏中經曰東父者清陽之氣万神之先衣五采衣龜山元籙曰有明光錦九朱飛文法衣三素飛文錦衣五色班衣九色龍衣又有青黄紫三色羽衣又有九色鳯衣亦有九天鳯衣珮大戒經曰太極眞人曰凡謹事法服則者冠冕玉珮三元布經曰六山大玉之珮綬八素經曰太素元君衣流光雲文綬始素元君衣紫光雲文素綬玄素元君衣飛雲九變綬紫素元君衣玄黄九色素羅之綬黄素九君衣飛雲素錦之綬三元布經云紫素元君交帶靈飛大綬白素元君珮文琳華之綬太上飛行羽經曰九鈴之綬飛靈紫綬六山飛晨之綬九光之綬金眞玉光經云紫青之綬丹錦之綬絳丹綬玄黄素綬白文素靈之綬玄靈五色之綬元始經曰九天玄母帶流蘇紫綬又曰九元光延紫綬靈飛紫綬交靈素綬九色自然之綬金虎鳯文之綬又曰太上九氣命靈之章帶翠羽交靈之綬板昇玄經曰太上曰十方奉經眞官五帝眞事符童傳言謁者皆冠帶垂纓齊執玉板羅列鹵簿對我前後左右笏昇玄經曰太上勑陵陽監受教稽首而起執笏户東面西而立帬太上飛行羽經曰上君衣鳯衣班文虎帬太上素靈經曰太上神仙衣青錦單帬青綾帬雲錦絳章丹帬絳衣飛帬黄雲錦帬三元布經曰太素三元君服九色龍錦羽帬紫素元君衣飛霜羅帬太極左仙公起居注曰太上三天錫仙公緋羅帬龜山元籙曰有丹錦飛帬九色龍錦羽帬太上飛行羽經曰七色夜光雲錦帬九眞中經曰蒼華飛羽帬丹華飛羽帬白羽飛華帬亦有黒羽黄羽飛華帬又曰翠龍華文飛羽帬朱華鳯帬素羽冩章帬黒羽龍文帬緑羽鳯華繡帬鈐移度曰南方眞皇君垂靈霜鳯華龍鈐帶虎書建玄晨之冠飛青錦衣乗丹霞絳輿龜山元籙曰有玉鈴又有晨光明月之鈴列仙傳曰北元中玄道君李慶賔女爲靈昭夫人着紫錦衣帶神虎符握流金鈴有兩侍女侍女年可二十許夫人年可十三四聞呼一侍女名隱暉侍女皆青綾衣捧赤玉箱二枚青帶絡之題白玉檢曰太上章一撿曰太上文夫人帶青玉色綬如丗人帶章囊狀隱章當長五丈許大三四尺又曰太極有四眞人中黄君處其左佩神虎之符帶流金之鈴執紫毛之節頂金精之巾又曰仙道有紫繡毛帔丹青飛裙翠羽華衣金鈴青帶曲晨飛盖御之自飛杖龜山元籙曰冬三月三天玉童化爲老人手把九節金枚洞耀玉清之中聖紀經曰有老人握青竹杖與老子談天地之數赤書玉訣上經曰當取靈山向陽竹令長丈有七節作神杖使長上下通直甘竹乃佳印以元始之章動息坐起恒以自隨有五帝眞符吏輔翼上眞茅君傳曰朱官使者把緑節杖瓊干羽旄又曰太素眞人把八景飛杖九色之節出入上清三天玉童頭連三角黄巾手把九節金杖節列仙傳曰太元眞人杖紫毛之節紫微王夫人與一神女俱降神女着雲錦樆上丹下青文采相照腰有緑繡帶帶係十餘小鈴鈴青色黄色更相叅厠左帶玉珮珮如人間珮珮但幾小耳衣服倐倐有光照映室内如日中視雲母也雲髮鬒鬢整頓絶倫髻在頂中垂餘髮至腰指着金鐶白珠約臂視之年可堪十三四左右两侍女其一侍女着朱衣帶青章囊手中又持一錦囊囊長尺餘以盛書十餘卷以白玉檢上刻字云玉清神虎内眞紫元丹章其一侍女着青衣捧一白箱以絳帶絡之箱似象牙箱形二侍女年可堪十七八整飾非常又曰裴眞人從者持青毛之節一童帶繡囊周君從者持黄毛之節無囊二君各有六童又曰東卿大臣見降侍從七人一人執紫毛節一人執華幡一名十絶靈幡一人帶緑章囊三人捧牙箱一人握流金鈴侍者並朱衣東卿形甚少於二弟二弟著青錦繡帬紫毛帔巾芙蓉冠二弟並同來倚立東卿命坐言語良乆時乙丑歳晉興寜三年七月四日降於楊君之家也又曰先道有三十七種色之節以給仙人履九眞中經曰凢學道者勿令人犯屐履行道尤多禁忌金眞玉光經曰有五色九色師子之履玉光八景經曰東北始陽宫牛元景足躡五色履舃龜山元籙曰領仙王奉元始命使資晨纓玉冠鳯雲之舃給上眞仙母又有神雲鳯舃列仙傳曰安期先生賣藥海邊時人言千歲翁秦始皇召見與語三日夕賜金壁數千万出於峊郷亭皆置去留書以赤玉舄一量爲報曰後千歳永我蓬萊山下始皇即遣使者入海未至蓬萊山輙風波而還上眞元籙曰九天元父曵神雲鳯舄帶素雲之綬帷帳神州經曰九河帝君坐玉床五色帷帳内外光明玉珮千垂席玉珮金璫經曰仙人鄭叚者坐玉華之席太平御覽卷第六百七十五
