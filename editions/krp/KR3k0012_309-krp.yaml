body:
  text: 太平御覽卷第三百九兵部四十戰中後漢書曰呉漢討公孫𫐠乃進軍攻廣都拔之光武戒漢曰成都十餘萬衆不可輕也但堅據廣都待其來攻勿與爭鋒若不敢來公轉營迫之須其力疲乃可擊也漢乗利遂自將歩騎二萬餘進逼成都去城十餘里阻江北爲營作浮橋使副將劉尚將萬餘人屯於江南相去二十餘里帝聞大驚使讓漢曰公旣輕敵深入又與尚別營事有緩急不復相及賊若出兵綴公而大衆攻尚尚破公即破矣急引兵還廣都詔書未到𫐠果使其將謝豐袁吉攻漢使別將攻尚漢敗入壁豐圍之漢乃召諸將勵之曰今與劉尚二處受圍勢旣不接其禍難量欲潜師就尚於江南并兵禦之若能同心一力人自爲戰大功可立如其不然敗必無餘成敗之機在此舉也於是饗士秣馬閇營三日不出乃多掛幡旗使煙火不絶夜衘枚引兵與尚合軍豐等不覺明日分兵拒水北自將攻江南漢悉兵迎戰自晨至晡遂大破之斬謝豐袁吉獲甲首五千餘級於是引還廣都尚拒𫐠帝報曰公還廣都甚得其冝述必不敢畧尚而擊公也畧猶過也若先攻尚公從廣都五十里悉歩騎赴之適當值其疲困破之必矣自是漢與述戰於廣都之間八戰八克又曰涼州賊王國圍陳倉不拔而去皇甫嵩進兵擊之董卓曰不可兵法窮宼勿迫歸衆勿追今我追國是迫歸衆追窮㓂也困獸猶闘蜂蠆有毒況大衆乎嵩曰不然前吾不擊避其銳也今而擊之待其衰也所擊疲師非歸衆也國衆且走莫有闘志以整擊亂非窮宼也遂獨進擊之使卓爲後拒連戰大破斬首萬餘級國走而死又曰曹操擊陶謙還過拔取睢陵夏丘皆屠之殺男女數十萬人雞犬無餘泗水爲之不流又曰廉范遷雲中太守㑹匈奴大入塞烽火曰通故事虜入過五千人移書傍郡吏欲傳檄求救范不聽自率士卒摧之范兵不敵乃令軍中蓐食晨往赴之斬首數百級續漢書曰耿弇字伯照扶風人少學詩禮見郡督尉試騎士建旗鼓肆馳騁由是心善將率後上聞弇爲張步所攻欲自往陳俊曰歩兵盛可且閉營待上至弇曰上且到臣子當擊牛釃酒以待百官反欲以賊虜遺君父耶遂合戰破之蜀志曰夏侯淵敗曹公爭漢中地運米北山下數千萬囊黄忠以爲可取趙雲遣兵隨忠取米雲將數十人輕行出圍行視忠等值曹公揚兵大出雲勢逼且鬪且却入營更大開門偃旗鼓公軍至疑有伏兵雲雷鼓於後射公公軍驚駭自相蹂踐墮漢水死者甚多先主明旦自來至雲營圍視昨戰處曰子龍一身都爲膽子龍趙雲字也作樂飲宴至暝晉中興書曰桓温歩騎四萬自江陵向關中伐僞立荆州刺史郭敬進擊青泥皆破之至于灞上戎首多降居民皆壷漿路側耆老或泣曰不圗今日復見官軍兵師符徤以五千人守長安小城時運道艱難而關中大飢温率衆還詔遣侍中黄門慰勞於襄陽犒軍十一年温進征討大都督司兾諸軍事委以專征之任温乃合衆治兵七月率衆伐羌十月温次伊水羌師姚襄來逆軍屯于北遣使詣温奉身歸命願勑前鋒小却當拜伏路左温荅曰我自脩復中原展敬山陵無豫君事欲來相迫何復求却於是方軌齊進襄率驍勇萬餘人距水前戰温命小弟沖及諸將奮擊襄大敗奔北自相殺害死者數千越北芒而奔走温屯故太極殿前賊周成率衆降温徙入金墉謁先帝諸陵𬒳侵毁者皆繕復之選陵令守護又曰謝玄進號冠軍將軍加領徐州刺史還于廣陵以功封東興縣侯八年玄至符堅傾國大岀衆號百萬先遣符融慕容煒張蚝符方四師至潁口梁成王先等守洛澗詔加衛將軍安爲征討大都督玄爲前鋒都督徐兖青三州楊州之晉陵幽州之燕國諸軍事與叔父征虜將軍石從弟輔國將軍琰西中郎將桓伊龍驤將軍玄等拒之衆凡八萬玄先遣廣陵劉牢之五千人直指洛澗邸斬梁成及成苐雲歩騎崩潰争赴淮水斬首萬級生擒五千餘人十月符融進屯壽陽玄與琰等選精銳八千人決戰肥水南臨陣斬符融俘獲萬計得僞輦及雲母車其餘寳器山積錦罽數萬端牛馬驢騾駱駞十萬疋又曰符堅率衆五十萬向壽春謂融曰晉人若知朕來便一時還南固守長江雖百萬之衆無所用之今祕吾來令彼不知彼顧江東在此必當戰若其潰敗求守長江不復可得則吾事濟矣乃秘不言堅自來於是以小將旗列屯肥北晉征虜將軍謝石冠軍將軍謝玄輔國將軍謝琰西中郎將桓伊等並阻水南一時渉渡肥水融曰及呉未成列擊之必克也堅曰不然我長於歩彼便於水今捨歩入水是以所短擊其所長非良䇿矣可須彼過水一時擊之彼旣背水進退無術乃可盡殺然後船舫渡江直指㑹稽觀禹朝萬國之處不亦樂乎列陣以待晉軍晉軍旣濟戰于肥北堅𬒳重瘡三軍潰亂堅馳還長安晉書曰劉毅泝江追桓玄戰於崢嶸洲于時官軍數千玄兵甚盛而玄懼有敗衂常漾輕舸於舫側故其衆莫有闘心官軍乗風縱火盡銳爭先玄衆大潰又曰將軍王敦反兵至石頭欲攻晉將劉隗五罪切其將杜弘曰劉隗死士衆多未易可剋不如石頭其守將周禮少恩兵不爲之用必敗禮敗隗自走敦從之禮果開城門納弘諸將與敦戰晉師大敗又曰前秦符堅率兵來伐晉將軍謝石謝玄拒之堅遣其尚書朱序說石等以衆盛欲脅而降之序謂石曰若秦百萬之衆皆至則莫可以敵也及其衆未集冝在速戰若挫其前鋒可以得志晉將遣使請戰許之堅師列陣逼肥水晉師不得度晉將使謂堅將符融曰君懸軍深入置陣逼水此持乆之計豈欲戰者乎若小退師令將士周旋僕與君公緩轡而觀之不亦羙也堅衆皆曰冝阻水莫令得上我衆彼寡勢必萬全堅曰但却軍令得過我以鐵騎向水逼而殺之不然因其濟水而覆之於是麾軍却陣軍遂奔退制之不可止玄以八千精卒度肥逼之融馳騎略陣馬倒𬒳殺軍遂大敗晉師乗勝追擊死者相枕堅爲流矢所中單騎遁走又慕容超載記曰於是賀頼盧公孫五樓爲地道出戰王師不利崔鴻十六國春秋曰前秦符堅遣將吕光領兵伐龜兹光軍其城南五里爲營深溝髙壘廣設疑兵以木爲人𬒳之以甲羅之壘上龜兹王帛純嬰城自守乃傾國財寳請諸國來救温宿尉頭等國王合七十餘萬衆以救之胡便弓馬善矛矟鎧如連鏁射不可入衆甚憚之諸將咸欲毎營結陣按兵以拒之光曰彼衆我寡衆營又相逺勢分力散非良䇿也於是遷營相接陣爲勾鏁之法精騎爲遊軍彌縫其闕戰于城西大敗之純遁走王侯降者三十餘國又曰西魏末東魏遣將侯景髙敖曹等圍西魏將獨孤信於洛陽東魏大將齊神武繼後西魏大將周文帝率軍救信進軍瀍東景等夜解圍去及晨周文率輕騎追之至於河上景等北據河橋南屬邙山爲陣與諸軍合戰周文馬中流矢驚逸遂失之因此軍中擾亂都督李穆下馬授周文帝以復振於是大捷斬髙敖曹虜其甲士万五千赴河死者以萬數是日置陣旣大首尾懸逺從辰至未戰數十合氛霧四塞莫能相知獨孤信李逺居右趙貴恰峯居左戰並不利又不知周文所在皆棄其卒先歸開府唐公等爲後軍遇信等退即與俱還由是乃班師洛陽亦失守大軍至弘農守將皆巳棄城西走又曰後魏末賊莫折後熾所在宼掠州人李賢率郷兵與涇州刺史史寧討之後熾列陣以待賢謂寧曰賊聚結歳乆徒衆甚多數州之人皆爲其用我若揔爲一陣併力擊之彼旣同惡相濟理必揔萃於我勢旣不分衆寡莫敵我便救首尾無以制之今若令諸軍分爲數陣多設旗鼓犄角而前以脅諸柵以別統精兵直指後熾按甲而待莫與交鋒後熾欲前則懼我疑兵令其進不得戰退不得走以俟其懈擊之必破後熾一敗則衆栅不攻自拔矣寧不從屢戰頻北賢乃率數百騎徑入後熾營収其妻子僮隷五百餘人并輜重等屬後熾與寧戰勝方欲追奔忽與賢遇乃棄寧與賢接戰賊遂大敗後熾單騎遁走北史曰後魏孝文南伐齊齊將陳顯逹率衆拒戰元嵩身備三仗免胄直前勇冠三軍將士從之顯逹奔潰帝大恱曰任城康王大有德福文武頓出其門以功賜爵髙平縣侯後周書曰天和六年宇文憲帥衆二萬出自龍門齊將新蔡王康德以憲兵至濳軍霄遁憲乃西歸仍掘移汾水水南堡復入於齊人謂略不及逺遂㢮邊備憲乃渡河攻其伏龍等四城二日盡拔又進攻張辟克之獲其軍實夷其城壘斛律明月時在華谷不能救之乃北攻姚襄城䧟之時汾州又見圍日乆糧援路絶憲遣柱國宇文盛運粟以饋之憲自入兩乳谷襲克齊相杜成進軍姚襄齊人嬰城固守以爲汾州之援齊平亰王叚孝先蘭陵王髙長恭引兵大至憲命將士陣而待之大將軍韓歡爲齊人所乗遂以奔退憲身自督戰齊衆稍却㑹日暮乃各収軍又曰齊神武遂度河逼華州刺史王羆嚴守知不可攻渉洛軍於許原西太祖據渭南徵諸州兵皆㑹乃占諸將謂之曰髙歡越山度河逺來至此天亡之時也吾欲擊之何如諸將咸以衆寡不敵請待歡更西以見其勢太祖曰歡若得至咸陽人情轉騷擾今及其新至便可擊之即造浮橋於渭令軍人齎三日糧輕騎度渭輜重自渭南夾渭而西冬十月壬辰至沙苑距齊神武軍六十餘里齊神武聞太祖至引軍來㑹癸巳旦候騎告齊神武軍且至望太祖軍少竟馳而進不爲行列揔萃於左軍兵將交太祖鳴鼓士皆奮起于謹等六軍與之合戰李弼等率鐡騎横擊之絶其軍爲二遂大破之斬六千餘級臨陣降者二萬餘人通典曰後周末隋文帝作相輔少主相州㹅管尉遲逈舉兵不從隋文遣將韋孝寛討之逈男惇率衆十萬入武德軍於沁東拒之與孝寛隔水相持乃布兵二十餘里麾軍小却欲待孝寛軍半度而擊之孝寛因其却乃鳴鼓齊進惇遂大敗又曰後周末隋文帝遣將韋孝寛率兵討尉遲逈於相州軍進至州逈悉出其卒十三萬陣於城南逈舊習軍旅雖老猶𬒳甲臨陣其麾下三千兵皆關中人爲之力戰孝寛等軍失利而却鄴中士女觀者如堵髙頻與李詢乃整陣先犯觀者因其擾而乗之逈衆大敗遂㧞其城又曰後漢末曹公征張魯於漢中使張遼與樂進李典等將千餘人守合肥教與護軍薛悌署邊曰賊至乃發俄而呉主孫權率十萬衆圍合肥乃共發教教云若權至者張李將軍出戰樂將軍守護軍勿得與戰諸將皆疑遼曰公征在外比救至敗我必矣是以教及其未合逆擊之折其盛勢以安衆心然後可守成敗之機在此一戰諸君何疑李典亦與遼同於是遼夜募敢死之士得八百人椎牛饗將士明日大戰平旦遼𬒳甲持㦸先登䧟陣殺數十人斬二將大呼自若衝壘入至權麾下權大驚衆不知所爲走登髙塜以長㦸自守權不敢動遥見所將衆少乃聚圍遼遼左右麾圍直前急擊圍開遼將麾下數十人得出餘衆號呼曰將軍棄我乎遼復還突圍拔出餘衆權人馬皆披靡披疋靡反無敢當者自朝戰至日中呉人奪氣還脩守備衆心乃安諸將咸服權攻合肥十餘日城不可拔乃引退遼率諸軍追擊之幾復獲權孫盛曰夫兵固詭道竒正相資若郡師不知則弃師之道也至於合肥之守懸弱無援專任勇者則好戰生患專任怯者則懼心難保且彼衆我寡心必懷貪堕以致命之兵擊貪墮之卒其勢必勝勝而後守則必固是以魏武雜選武力叅以周同異爲之宻教宣其用事至是而應若合符契妙矣北齊書曰慕容紹宗與侯景戰於渦陽大破景軍溺死於渦水水不爲流景走淮南太平御覽卷第三百九
