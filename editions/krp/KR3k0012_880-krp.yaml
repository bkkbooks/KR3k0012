front:
  text: 太平御覽卷第八百八十咎徴部七
  hash: sha256:c5af7d5cd9aae9143d3eae191d04fa46d1a828319b0e73fadbf96a07b5c62fbe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_880-1a}
body:
  text: 地震地裂地䧟地㓙土踊地生毛地震京房易占曰地動隂有餘左傳曰南宫極震南言極王子朝之卿士也萇弘謂劉文公曰君其勉之先君之力可濟也先君謂劉献公文公父也献公亦欲立子猛不欲令子朝得國今南宫極震死爲天所弃先君之功事可成也周之亡也其三川震今西王之大臣亦震天弃之也西王謂子朝也子朝居王城故爲之西王也東王必大克東王敬王居狄泉秋泉在王城之東故日東王也史記曰周幽王二年三川震太史伯陽甫曰周將亡矣天地之氣不過其序亂人之兆陽伏而不能岀隂迫而不能昇於是也震陽失而在隂隂原必塞原塞必國亡昔伊雒竭而夏亡河竭而啇亡今周如二代之季其川原又塞塞必川竭山崩夫國必依山川山崩川竭國亡之徴也漢書五行志曰魯文公九年地震劉向以爲周襄王失道楚穆王啇臣殺父成王諸侯皆不肖權傾於下臣下強盛將動爲害京房曰臣事雖正專必震於水水則波於木木則揺於屋則瓦落於山則岀水湧嗣子無德臣專禄不順動丘陵水湧出又曰魯襄公十六年地震其後崔氏專齊欒盈專晉良霄傾鄭􅕡殺呉子燕逐其君楚滅陳蔡又曰魯昭公十九年城震劉向以爲是時季氏將有逐君之變又曰昭公三十三年地震劉向以爲是時周景王崩劉子單子立王子猛尹氏立王子朝季氏逐昭公黒肱叛邾呉殺其君僚宋五大夫晉二大夫皆以地叛又曰哀公三年地震仲尼見弃而季氏強又曰趙幽王五年代地大動自樂徐以西北至平隂臺屋墻垣太半壞地坼東西百三十歩六年大飢秦滅之漢書曰惠帝時地震隴西壓四百餘家時諸吕用事又曰武帝時地震壓殺人明年皇后陳氏廢宣帝時地震河南以東四十九北海琅邪壞祖宗廟城郭殺人千餘後又京師地震至北邊郡國三十餘壞城郭殺四百餘人後霍顯禹反誅清河王遷房陵皇后霍氏廢又曰元帝建昭四年藍田地震沙石流擁㶚水安陵岸崩擁水水逆流時石顯用事後漢書曰光武時地震裂至後年南郡蠻武陵蠻叛後詔捕王侯賔客坐死者數千人隂氣盛之應也又曰和帝時郡國十三地震時將軍竇憲謀逆伏誅後又地裂及震其年北海王威有罪自殺又曰安帝時郡國十六地震明年郡國十二地震京師人相食帝冲㓜鄧氏執政後又郡國九地震明年海賊張伯路與平原劉文何周文光等攻戰厭次殺令長後三年郡國十八地震淮南人飢明年鄧太后崩帝失政又曰順帝時京師頻地震岸崩及地䧟其年呉郡丞羊珎反郡府後二年凉州地百八十震山谷坼裂是日徐楊賊攻燒邑城殺掠民吏又曰冲帝時京師地震三郡沙湧土裂時帝年二歲母后臨朝郡盗大起發掘憲陵攻燒城邑又曰桓帝時京師地震荆楊人多飢死後又震憲陵寢屋瓦宫廟瓦落盡時梁兾專政又曰靈帝時地震海水溢又震鴻都府門時閹堅專政又曰𥘉平二年并州牧董卓焚燒洛陽挾天子遷長安自爲太師號尚父京師地震卓問著作郎蔡邕邕對曰地動隂盛大臣踰制又太史上言當有大臣戮死卓遣人言太尉張温與袁紹交通遂殺温二年司徒王允僕射士孫瑞及卓將吕布謀誅卓殺之又曰獻帝時雍州地頻震三輔大旱粟一石五十萬人相食續漢書曰建康元年九月丙午京都地震時順帝崩太后攝政爲順帝作陵制度奢廣多瓌吏民塜槨尚書欒巴諌太后怒癸夘詔収巴下獄欲殺之丙午地震太后乃出巴免爲庶人漢獻帝春秋曰𥘉平二年地震董卓問蔡邕邕曰天爲陽故轉運於上地爲隂故安静於下而震是失其性以隂而陽也明公車不當青盖冝改之以應變卓改爲緑蓋晉書曰魏明帝時京都地震隱隱有聲揺動屋瓦明年公孫文懿叛自立魏髙堂隆曰地震臣下強盛地故震動兾所以警悟人主不可不深思是災及少帝繼廢竟禪晉又曰齊王芳時頻年地震時曹爽專政遷太后於永壽宫太后與帝相泣而别故頻震又曰蜀劉禪時地震時黄皓專政閹官無陽施猶婦人也此皓見任之應是年冬蜀亡又曰呉孫權時頻年地震時吕一專政又權信䜛廢太子和歩騭上書曰伏見按事吹毛求瑕欲䧟人成其威福故地連震又曰晉武帝時頻年地震是時賈充楊駿逓弄朝權又曰惠帝元康四年郡國地震淮南洪水出或山崩地䧟壞城府殺百餘人此賈后使楚王瑋殺汝南王亮及太僕衛瓘隂道盛陽道衰微之應又曰愍懷帝時頻年地震時司馬越專政石勒㓂汲郡又曰元帝大興元年頻地震或水湧山崩殺人時江南淮北有大兵劉曜石勒僣位又曰成帝時咸和四年頻年地震時蘇峻作亂又曰穆帝永和九年十年頻地震或有聲如雷鷄雉皆鳴時帝㓜母后專政石季龍僣號王師頻敗又曰十一年四月五月又頻地震是時姚襄入許昌百姓愁苦之應哀帝及海西公簡文孝武時皆頻地震是時人主㓜弱群小弄權兵役連年海西見廢又曰孝武太元年夏震含章殿四柱并侍者二人後年符堅畧襄陽又曰安帝義熈年頻地震或有聲如雷時太尉劉𥙿謀逆宋書曰孝武大明元年地震有聲自河北來魯郡山揺地動彭城女墻四百八十丈墜屋傾兖州地裂泉湧二年不巳其後兖州刺史夏侯祖懽卒齊書曰廢帝東昏侯時地震一年不止其年護軍崔惠景反兵圍城帝閉門以拒之隋書曰梁武太清二年八月侯景舉兵反於豫州登壇㰱盟地震及圍城死者太半又曰太清三年建康地再震時侯景自爲大丞相崔鴻十六國春秋曰前趙劉聦建元元年三月平陽城震崇明觀䧟爲池水赤氣至天有赤龍奮迅而去十一月地震二年八月平陽地震汾水大溢流漂數百家聦死子粲立爲劉曜所殺曜自立又曰前秦符堅時秦雍二州地震裂泉湧長安大風震電壞屋殺人堅懼而愈修德政焉俄而符雙等伐長安㝷爲戰敗又曰後秦姚泓時秦州地震三十二殷殷有聲山崩舎壊識者以爲秦州泓之故郷將滅之徴後宋髙祖入長安執於建康斬之又曰姚興四年所在地震前後一百五十六公卿百司抗表請罪興曰災譴之來咎在元首近代或歸罪三公甚非也朕當考躬省巳思宋景之義公等何愆冝悉冠履復位後魏書曰太祖道武天賜六年夏地震其年帝愛姬萬人與清河王紹通作亂帝𬒳紹及萬人殺之又曰宣武延昌元年沁州地震䧟殺人甚衆又累年沁州秀容敷城鴈門山鳴地震不止其年幽州沙門劉僧紹反明年胡太后臨朝後天下大兵太后少帝爲尓朱榮投於河隋書曰北齊武成清河年并州地震是時和士開專恣之應又曰隋文帝開皇二十年廢太子勇以晉王廣爲皇太子將冊之夜烈風大雪地震山崩人舎多壞殺人太子卒與僕射楊素弑帝吕氏春秋曰周文王寢病五日而地動東西南北不出國郊百吏皆請曰臣聞地之動爲主也羣臣皆悲曰請移之興事動衆以増國城文王曰我必有罪故天示此以罰我今動衆以増國城是重吾罪不可無幾疾瘳也地裂尚書說曰黄帝將亡則地裂春秋考異郵曰臣恣盛地裂坼戰國䇿曰齊閔王莽莒淖齒數之曰羸博之間地坼至泉地以告也而王不知戒何得無誅乃殺之書紀年曰夏桀末年社坼裂其年爲湯所放後漢書曰安帝時緱氏地裂後郡國地坼或泉湧越雋夷殺長吏燒城邑又曰南地坼長百八十二里廣五十六里又洛陽新城地裂又緱氏地䧟裂京師地䧟時帝㓜冲官者用事又曰建康元年隴西漢陽張掖北地武威地百八十震山谷坼裂壊城又曰冲帝𥘉即位葬順帝是日鴈門京師太原三郡地震沙湧土裂又曰桓帝時河東地裂明年京師雲陽地震時閹竪用事皇后梁氏崩後八年緱氏頻年兵革又李膺等二百餘人受誣下獄又上黨地裂是時㓂賊弥盛又曰靈帝時河東地裂十二處長十里是時閹竪用事政在私門續漢書曰和帝永和七年趙國易陽地裂京房易傳曰地拆裂者臣離相從也是時南單于衆乖離相從也是時南單于衆乖離漢軍追討崔鴻十六國春秋曰西秦乞伏乾歸太𥘉十九年苑川地裂後四年乾歸爲兄子公府所殺抱朴子曰軍中地裂急徙居不測軍敗地震心大戰或有謀反墨子曰三苗欲滅時地震泉湧地䧟今古五行記曰夏桀末年瞿山地䧟一夕爲大澤深九丈其年爲湯所放晉書曰武帝太康八年宣帝廟地䧟其年七月殿前地䧟方丈深數丈中有破舡是時帝不用和嶠之言而信賈充之佞至十一年惠帝立王室大亂又曰惠帝時五月城中地䧟方三十丈殺人六月又地坼家人䧟死八月地裂廣三十六丈長八十四丈人大飢又上庸四處山崩地䧟廣三十丈長百三十丈大水岀殺人時賈后亂政又夜暴雷雨賈謐齋屋柱䧟入地壓床悵明年謐誅天下兵亂帝室從此微矣又曰懷帝時洛陽地歩廣里地䧟出鵝三又當陽地裂三廣三丈長三百歩時司馬越專政王室離敗死者計萬又曰安帝時山隂地䧟方四尺有聲如雷後二年西明寺門穿湧水毀門大尉劉𥙿矯詔殺害朝士俄而禪宋隋書曰梁武帝普通二年始興郡石鼓村地自開成井方六尺深三十丈侯景篡梁昇御床床脚䧟入地後景𬒳殺崔鴻十六國春秋曰前凉張天錫三年四月延興地震䧟水岀又曰前趙劉聦末年武庫地䧟深一丈五尺時中常侍王沉中宫僕射郭猗皆寵幸用事聦遊宴後宫或百日不岀沉等奢僣貪殘賊害良善御史大夫陳元逹諌聦不從元逹自殺又曰前秦姚泓永和元年秦州地䧟裂巖嶺崩墜人舎壞是年爲宋髙祖所擒斬於建康市又曰前秦符堅末年洛陽地䧟堅後伐晉敗焉又曰安帝末年桓玄篡晉昇太極殿殿無故䧟旬月宋髙祖殺之又曰北凉沮渠茂乾永和七年太廟階䧟六月城門崩其年九月茂乾面縛降于魏又曰西凉李歆嘉興元年三月燩煌謙德門䧟至四年歆爲沮渠蒙遜所敗又曰夏赫連勃勃鳯翔七年六月太廟基䧟其年八月勃勃死隋書曰北齊後主末年穆后如晉陽向北宫辭胡太后所乘七寳車無故䧟入地半没四足是年齊滅后與帝俱入長安又曰隋煬帝大業十三年十二月洛州乾陽門内地䧟周闊丈餘至十四年帝遇殺天下大亂異苑曰晉武帝太康五年宣帝廟地欻䧟梁無故自折凢宗廟所以承祖先嗣永丗不刋安居摧䧟是煙絶之祥也地㓙漢書曰光武時岑彭伐蜀去成都數十里軍營北有地名曰彭亡彭聞之欲移㑹日暮是夜彭爲公孫述刺客詐爲逃奴刺殺之魏志曰太祖圍吕布大司馬楊固救布爲其將楊醜所殺楊將眭固又殺醜屯兵射犬巫誡之曰將軍字白兎而邑名射大兎見必驚冝急移去固不從明日遂戰死晉書曰建業太社西宫地呉時右司馬丁奉宅吴後主孫皓殺之流徙其家晉元帝𥘉爲僕射周顗宅顗爲王敦所害後爲冠軍將軍蘇峻宅峻反𬒳誅殺後爲索恱宅爲㑹稽王道子所親眤縁道子見殺又爲章武王司馬秀宅秀亦凶至宋孝武時爲雍州刺史臧質宅質反見殺故代稱充㓙地宋史部尚書王僧綽常謂宅無吉㐫請以爲第始造未居爲元㐫所害王隠晉書曰祖約爲豫州刺史府中地忽赤如丹約竟敗見殺土踊紀年曰梁惠成王七年地忽長十丈有餘髙尺半周隱王二年齊地暴長長丈餘髙一尺漢書曰成帝河平四年臨淮縣土踊起髙二丈時王莽專政崔鴻十六國春秋曰前凉張寔五年祁山地震從中陶原坂三里冒覆下川忽如見掩坂上草木存焉地生毛晉書曰武帝太始中皇甫晏爲益州刺史西討屯兵人咸死之地生白毛俄𬒳牙門將所殺又曰成帝時地生毛時天下大兵而中原擾亂百姓疲怨又曰孝武時京都地生毛而氐賊圍繞襄陽彭城征戍連年不解又京都地生毛符堅滅後人勞役後又江陵交戰不解又曰安帝義熈十年地生白毛連年征討勞優之應京房曰以爲人勞之異金失其性地生毛常璩華陽國志曰晉武帝太始八年蜀地生毛長七八寸生數里李勢欲亡地又生毛崔鴻十六國春秋曰後秦姚興時乞伏乾歸鎮州地震生毛而乾歸太𥘉十九年七月爲兄子公府所殺又曰北燕馮跋太平十五年龍城地生白毛長一尺二寸月餘乃滅後遼西太守髙潜謀反伏誅隋書曰梁武帝大同年地生白毛長二尺時築浮山堰功垂就而潰百姓苦之又曰陳後主末年地生白毛時功役不息卒爲隋滅又曰北齊武成清河年𥘉滄州及長安地生毛時北築長城内興三臺人苦役焉唐書曰則天天授𥘉淮南地生毛或白蒼長者尺餘或遍居人床下揚州尤甚大如馬尾焚之如毛氣著作郎韓琬寓于揚州親掇之其年稱制太平御覽卷第八百八十
