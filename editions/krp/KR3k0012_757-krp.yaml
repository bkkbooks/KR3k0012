front:
  text: 太平御覽卷第七百五十七
  hash: sha256:8d8377fa9768dc351a95ac86552214394bd0ebbae98386f9e976687003c1c296
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_757-1a}
body:
  text: 器物部二鑊釡鬲鐺鎢錥銚鑪甑箄甑帶鑊周禮曰烹人掌供鼎鑊所以煑肉反魚腊之器旣熟乃辱於鼎脣音蒸儀禮曰雍人陳三鼎在羊鑊之西二鼎在豕鑊之西史記曰藺相如謂秦王曰今以秦之强而先割十五都與趙趙豈敢留壁而得罪於大王乎臣知欺大王當誅臣請就湯鑊唯大王羣臣熟計議之晉書曰張平自稱豫州刺史樊雅自號譙郡太守元帝皆版爲四品將軍豫州刺史祖逖出屯廬洲遣叅軍殷乂詣平雅乂意輕平視其屋云當持作馬厩見大鑊云欲鑄作鐵器平曰此是帝王大鑊天下定後方當用之奈何打破乂曰卿能保頭而不惜大鑊耶平大怒於坐斬乂阻兵固守歳餘逖攻平殺之而雅據譙城文子曰養魚於沸鑊之中棲鳥於炎鑪之上雖欲其生養理失矣陸機洛陽記曰宫牆外以大鐵鑊盛水以救火鑊受百斛百歩一置楊龍驤洛陽記云鐵鑊合一百八十枚也搜神記曰武帝從南岳著廬江濳霍山之上無水廟有四鑊可受四十斛至祭時水輙自滿用之足了事畢即空塵土樹葉莫之汙也積五十歳歳作四祭後但作三祭一鑊自敗朱崖傳曰朱崖大家有銅鑊多者五三百積以爲貨南越志曰龍川縣營崗北有巨鑊恒有懸泉注之終歳不滿嘗有採薪者欲推動之忽然震電迷失路十許日乃至家湘州記曰伍子胥廟中有大銅器元嘉中沙門釋亮啓乞此廟器鑄丈六金像始廟所有大銅鑊可容三百斛許即䧟入地中僧亮夢神語云今捨此器相與發願免此神形殷斌當山記曰魏興反照山上有三公鐵鑊常有數十斛雖大旱而不減長老云有天子女欲來此山愁思而死三公衛送故於此烹之羅浮山記曰有名鑊容千餘斛溢爲瀑布墨子曰守死曰二十五歩一竈竈有鐵鑊容二石以上爲湯釜說文曰鍑音富如釡而大口釜也一曰鼎大上下若甑曰鬵音㝷三足釡也方言曰釡自關而西或謂之釡或謂之鍑鍑亦釡之揔名也廣雅曰錪他典切鉼音餅鬲音曆鍑音富鏕音鹿饅鍪漫牟二音折音規錡釡也埤蒼曰鎢䥈小釡也易說卦曰坤爲釡詩曰于以湘之維錡及釡錡釡屬也有足曰錡又曰誰能烹魚漑之釡鬵鬵釡屬也左傳曰筐筥錡釜之器潢汙行潦之水三禮圖曰釜制度云三斛或曰二斛春秋繁露曰夏求雨曝釡於術音遂十日史記曰項籍救鉅鹿沉舡破釡甑以示必死古史考曰黄帝始造釜甑戰國䇿曰蔡澤入韓魏遇奪釡鬲於途東觀漢記曰梁鴻少孤詣太學受業同房先炊巳呼鴻及熱釜炊鴻曰童子不因人熱者也滅竈更燃火又曰鄧遵破匈奴得釡鑊二三千枚謝承後漢書曰范丹爲萊蕪長遭黨錮有時絶糧閭里歌之曰釡中生魚范萊蕪又曰胡邵爲淮南太守使鈴下閣外炊曝作乹飯閣中不設釡竈潁川馮暹爲徐州刺史以小銅釜甑十日一炊後漢書曰王莽納言將軍嚴尤欲據宛伯升乃陳兵誓衆焚積聚破釡甑鼓行而前破釡甑示必死也魏略曰鍾繇爲相國以五熟鼎範因太子鑄之釜成太子與繇書曰昔有黄三鼎周之九寳咸以一體調一味豈若斯釡五味時芳蓋鼎之烹餁以享上帝今之嘉釡有踰兹義晉諸公讃曰尚書杜預欲爲平底釡謂於薪火爲省黄門郎賈彛於丗祖前靣質預曰釡之尖下以備沃洗今若平底無以去水預亦不能折之前秦録曰處士張忠隱于太山鑿石爲釡容六斗四升河圖曰漢髙祖觀汶水見一黄釡驚却反化爲一翁責言曰劉季何不受河圖莊子曰曽子再仕而心再化曰吾及親仕三釡而心樂仕三十鍾不洎親吾心悲韓子曰智伯圍襄子於晉陽决晉水以灌之城中巢處懸釡而炊吕氏春秋曰晉文公反國介之推不肯受賞或遇之山中負釡淮南子曰鈆不可以爲刀木不可以爲釜又曰太王亶父處邠狄人攻之杖䇿而去百姓負釡甑踰梁山而國乎歧淮南萬畢術曰牛膽鳴取牛膽以塗熱釡即自鳴矣風俗通曰俗說齊人有空車行魯人有負釡者便特置車中二三百里臨別取釡不相問爲誰亦不謝後車家繫獄當死釡不相問爲誰主徑徃募人取之穿壁未逹車者怒不肯出釡主慙欲俱死明日主者以事白齊君義而原之魏子曰鼎以爲希出而丗貴之釡鬲常用而丗輕之兵書曰𥘉出軍行日三炊釡不得覆覆釡軍敗物理論曰堯丗洪水民登木而栖懸釡而㸑茅君内傳曰欲合九轉先作神釡郭文傳曰文以石爲釡婁承先別傳曰昔山越民反所過殘毀望婁氏之里徃中庭顧見釡甑尚省於竈曰恐他逺宼取之仍爲取洗沈著井中而去婁家後還皆盡得之朱崖傳曰朱崖俗多用土釜南蠻獠民格曰諸告言伯叔外祖父母裴淵廣州記曰東官郡煑鹽織竹爲釡以牡蠣屑泥之燒用七夕一易異苑曰長山朱郭夫妻恒採藻澗濵見二銅釡㳂流而下取之而歸有圎蓋滿中銅器光輝輝目自然作聲郭懼運著北山埋之而後賣釡與人主載出爲貨舡無故自覆失釡所在又曰薛願家有虹飲釡中水盡以酒灌之便吐金滿釡而願因之豐富離騷曰黄鍾毀棄瓦釡雷鳴鬲音曆爾雅曰鼎疑足者謂之鬲郭璞曰曲脚也或曰疑定也犍爲舎人曰鼎足相去䟽曰鬲方言曰鍑或謂之鏤呉揚之間謂之鬲周禮曰鬲實五觳苦角切厚半寸脣寸漢書曰空足之間蘇林曰足中空不實家語曰魯有儉者瓦鬲煑食祀之自謂甚美盛之土鉶之器以進孔子孔子受之欣然有恱如受大牢子路曰瓦甂音邊陋器也夫子何喜如此乎孔子曰夫食美者念其親以其食美者而念其我思也盛弘之荆州記曰湘東隂山縣西有鬲口溪昔有大鬲容百斛出於此水故因爲名鐺與鎗同通俗文曰鬴音輔有足曰鐺齊書曰明帝毎存儉約鑄壊太官元日上壽銀酒鐺尚書令王晏等咸稱盛德蕭頴曹曰朝庭盛禮莫過三元此一路器旣是舊物不足爲侈帝不恱預曲宴銀器蒲席頴曹曰陛下前欲壞酒鐺恐冝移在此器也帝甚慙唐書曰薛大鼎爲滄州太守政化大行百姓利之賈敦頥爲瀛州刺史鄭徳本爲兾州刺史俱有異政時人號曰鎗脚刺史東宫舊事曰皇太子𥘉拜給銅龍頭鎗孝子傳曰陳遵母好食鐺底焦飯孔氏志恠曰有人苦心腹病死後剖視之得銅鐺一枚容數合許疾病部廢門中備云其事述異記日諸葛景之亡後宅上常聞語聲當酤酒還而無温鎗鬼云卿無温鎗那得飲酒即見一銅鎗從空中來續齊諧記日王敬伯夜見一女子命婢取酒須臾持一銀酒鎗笑林日太原人夜失火欲出銅鎗設得熨斗便大驚怪日異事火未至已𬒳燒失腳梁王筠以服散鎗贈殷鈞别詩日玉鉉布交文金丹煥仙說九沸翻成緩七輔良爲切執以代踈麻長貽故人别鎢錥烏育二音廣雅日鎢錥謂之銼􅟋說文日銼才禾切􅟋力禾切鍑也纂文日秦人以鈷䥈爲銼􅟋魏略日徐晃性嚴驅使將士不得閑息于時軍中爲之語日不得餉屬徐晃晃聞此語笑日我槌破汝鎢錥耶杜預奏事日藥杵臼澡槃熨斗釡瓮銚槃鎢錥皆亦民閒之急用也江逌表曰昔康皇帝玄宮内金烏育銚廣雅日鋗血㳙切謂之銚說文日銚温器也嵩髙山記日岳左右有古人住處銅銚器物猶存衡山記日有人採藥暮宿石室中見一銅銚是煑藥處蠻人聞之取銚還用舉村盡病送返乃己夢書日夢見得新銚鋗取婦好也魏武上獻帝表日臣祖騰有順帝賜器今上四石銅鋗四枚五石銅鋗一枚御物有純銀粉銚一枚束晳貧家賦曰執偏隳之漏鋗鑪說文曰鑪方鑪也鏇似絹反圜鑪也周禮曰宫人掌王之六寢凡寢中之事掃除執燭共鑪炭凡勞事勞事勞䙝之事也左傳曰邾子在門臺臨廷閽以缾水沃庭邾子望見之怒閽曰夷射姑旋焉旋小便也命執之弗得滋怒自投于牀廢廢墮也于鑪炭爛遂卒魏略曰孫權上書稱臣稱說天命太祖以權書示外曰是兒欲路吾著爐炭上耶崔豹古今注曰漢成帝顧成廟有二眞金爐拾遺録曰周靈王出於宣昭之臺望東方雲氣蓊鬱俄而有二人乗飛遊之輦上帝酣其一人能爲霜雪坐者皆噤乃命青金洪鑪青金洪者出青零淵石色皆如紺中有金鑄爲大鑪異苑曰龐猗義熈中爲冝都太守御人牧馬於野見一銅鑪上焰帶鏁而行持歸以呈猗遂檻盛送下荆州至郡北界夜忽風雨有呌聲光火燭天徑來趨舡失鑪所在鹽鐵論曰歐冶能因國君之銅鐵以爲金鑪大鍾而自不能爲壷鼎盤盂無其用也桓譚新論曰元帝求方士漢中送人王仲都大暑日使暴坐又環以十鑪不言熱論衡曰當風鼓箑向日燃爐而天終不爲冬夏易氣又曰推無益之能納無𥙷之說似以夏進鑪以冬奏扇賈誼鵩鳥賦曰且夫天地爲鑪兮造化爲工隂陽爲炭兮萬物爲銅甑說文曰窐户圭切甑空也古史考曰黄帝始作甑方言曰甑自關而東謂之獻魚蹇切或謂之鬵或謂之酢餾力救切爾雅曰䰝與甑同謂之鬵鬵鉹也郭璞注曰凉州呼鉹音侈周禮曰陶人爲甗實二鬴厚半寸脣寸甑實二鬴厚半寸脣寸七穿量六斗四升曰鬴鄭司農云甗無底甑也左傳曰晉師從齊師入自丘轝擊馬陘齊侯使賔媚人賂以紀甗杜預注曰甗王甑也滅紀所得漢書曰項羽引兵渡河皆沈舡破釜甑燒廬舎示士卒勝去不勝死無廻心後漢書曰范史雲爲萊蕪長時人歌曰甑中生塵范史雲袁山松後漢書曰荀淑與陳寔神交棄官常命駕相就令元方侍側季方作食甞一朝食遟季方跪曰向聞大人與荀君言甚善竊聽之甑壞飯縻寔曰汝聽談解乎荅曰解令說之不誤一言公恱韓詩外傳曰舜甑無羶淮南子曰粟得濕而熯音罕甑得火而液白虎通曰王者德至山陵丹甑見京房易逆刺曰天雨釜甑歳一熟益部耆舊傳曰任文公知有王莽之變悉賣竒物唯存銅甑蓑笠郭林宗别傳曰鉅鹿孟敏容居太原林宗見而問之對曰甑巳破矣視之無益林宗以其分決勸使學果爲美士郭文傳曰文以竹爲甑録異傳曰隆安中呉縣張君林忽有鬼來助其驅使林家甑破無可用鬼乃撞盆底穿以充甑錢塘記曰石姥莫𥙷切山有甑大數十圍下有三石支足一人摇之輙動縱使千百人引之與一人不異離騷曰珪璋雜於甑窐窐士甑孔也箄說文曰箄蔽也所以蔽甑底也淮南子曰明鏡可鑑形蒸食不如竹箄裴玄論云尹氏鏡蒸食不如三錢竹箄夢書曰夢見新箄婦女憙孔融同歲論曰弊箄徑尺不足以救鹽池之鹹甑帶淮南子曰琬琰之玉汗泥土之中雖廉者弗釋琬琰美玉釋捨也弊箄甑瓾在旃茵之上雖貪者不搏瓾甑帶也搏取也瓾讀鼃黾之也美之所在雖汙辱丗不能賤惡之所在雖髙隆丗不能貴夢書曰夢見甑欲娶婦夢見甑帶煤灼來太平御覽卷第七百五十七
