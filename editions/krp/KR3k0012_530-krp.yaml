front:
  text: 太平御覽卷第五百三十禮儀部九
  hash: sha256:98100be5257e0c4da7ed27c4b2129c0060ccbb0c3cb37ef402c149e7ce5e0884
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_530-1a}
body:
  text: 齋戒儺齋戒昜上繫曰明於天之道而察於民之欲故興神物以前民用聖人以此齋戒洗心曰齋防患曰戒也周禮天官冢宰曰祀五帝則掌百官之誓戒與其具脩祀五帝謂四郊及明堂誓戒要之以刑重失禮也明堂位所謂各楊其職百官廢職服大刑是其辭之略也具所當共修掃除糞洒前期十日帥執事而卜日遂戒前期前所諏之日也十日客散齋七日致齋三日執事宗伯大卜之屬旣卜又戒百官以始齋禮記曲禮曰齋者不樂不吊爲哀樂則失正散其思也又檀弓曰是故君子非有大故不宿於外大故謂哀憂非致齋也非疾也不晝居於内内正寢之中又王制曰天子齋戒受諌歳中羣臣奉歳事諌王當所改爲也司㑹以歳之成質於天子司㑹冢宰之屬掌計要者成計要也質猶平也平其計要冢宰齋戒受質賛王受之大樂正大司㓂市三官以其成從質於天子大樂正於周宗伯之屬市司市也於周司徒之屬從從於司㑹也大司徒大司馬太司空齋戒受質百官各以其成質於三官大司徒大司馬大司空以百官之成質於天子百官此三官之屬百官齋戒受質受平報也又郊特牲曰孔子曰三日齋一日用之猶恐不敬二日伐鼔何居居讀爲姬語之助何居怪之也伐猶擊也齋者止樂而二日擊鼔則是成一日齋也又郊特牲曰齋之玄也以隂幽思也故君子三日齋必見其所祭者齋三日者思其居處思其笑語思其志意思其所樂則見之也又玊藻曰將適公所宿齋戒居外寢又祭義曰古者天子諸侯必有養獸之官及歳時齋戒沐浴而躬朝之犧牲祭牲必於是取之敬之至也又祭義曰致齋於内散齋於外齋之日思其居處思其笑語思其志意思其所樂思其所嗜齋三日乃見其所爲齋者又祭統曰及時將祭君子乃齋齋之爲言齊也齋不齊以致齋者也是故君子非有大事也非有恭敬也則不齋不齋則於物無防也嗜欲無止也及其將齋也防其邪物訖其嗜欲耳不聽樂故記曰齋者不樂言不敢散其志也心不茍慮必依於道手足不茍動必依於禮是故君子之齋也專致其精明之徳也故散齋七日以定之致齋三日以齊之定之之謂齋齋者精明之至也然後可以交於神明也定者定其志意是故先期旬有一日宫宰宿夫人夫人亦散齋七日致齋三日宫宰守宫官也宿讀爲肅肅猶戒也戒輕肅重也君致齋於外夫人致齋於内然後㑹於太廟又坊記曰子云七日戒三日齋承一人焉以爲尸過之者趍走以教敬也戒謂散齋也承猶事也又表記曰子曰齋戒以事鬼神擇日月以見君恐民之不敬也禮記外傳曰凡大小祭祀必先齋敬事天神人鬼也齋者敬也齋其心思其皃然後可以入廟齋必變食去其葷羶也居必遷坐易其常處也故散齋於外致齋於内外者公寢也内者寢中小室大祀散齋七日祭曰猶逺客意散致齋三日致者至也就祭日近則十日齋矣祭前旬外之日則有司戒告内外内外百官齋謂之夙戒夙早也中祀七日則散齋四日小祀三日月令秦書也當戰國之急大小祭祀唯三日散齋二日致齋一日春秋合誠圗曰黄帝請問太一長生之道太一曰齋戒六丁道乃可成丁取能丁寕常戒懼也家語曰季桓子將祭齋三日而二日鍾鼔之音不絶冉有問於孔子子曰孝子之祭也散齋七日慎思其事致齋三日而一用之精一而用之也猶恐不敬而二日伐鼔何其論語郷黨曰齋必有明衣布明衣親身名所以自㓗清也其物以布爲之齋必變食居必遷坐又述而曰子之所慎齋戰疾此三者人所不能慎而夫子慎之史記曰藺相如謂秦王曰趙送璧時齋五日今大王亦冝齋遂許齋五日舎相如廣成傳舎秦王齋五日後乃設九賔於庭引相如又曰秦二丗夢白虎囓其左驂馬殺之心不樂問占夢人曰涇水爲止示二丗乃齋望夷宫閻樂殺之更立子嬰爲王漢書曰蕭何薦韓信於漢王何曰王冝擇日齋戒設壇場具禮乃可拜爲大將軍至拜乃韓信也一軍大驚也又曰宣帝詔曰迺者鳯凰甘露降集京師嘉瑞見脩興太一五帝后土之祠祈爲百姓蒙福鸞鳯萬舞集止千旁齋戒之暮神光顯著薦鬯之夕神光交映或降于天或登于地或從四方來集于壇上帝嘉饗海内承福續漢書曰殤帝崩太后與兄車騎將軍鄧騭定䇿禁中其夜使騭持節以王青蓋車迎安帝齋于殿中范曄後漢書曰周澤字稚都爲太常甞卧疾齋宫其妻哀澤老病就問所苦澤大怒以妻子犯齋禁遂収送謝罪當丗疑其詭譎時人語曰生丗不諧作太常妻一歳三百六十日三百五十九日齋一日不齋醉如泥于寳晉紀曰劉毅爲司隷校尉常齋而疾其妻岀看之表解齋唐書曰貞元九年冬德宗以是歳有年蠻夷朝貢思親告郊廟於祀事尤重慎及將散齋謂宰臣曰在禮散齋歸正寢攝心奉祭不可聞外事其常務勿奏乃齋於別殿及命皇太子諸王行祭者皆受誓一日又曰貞元中徳宗方有事於郊廟詔以皇太子爲亞獻親王終獻上令問栁冕當受誓戒否冕奏准開元禮並以前七日受誓戒詞云各揚其職不供其事國有常刑冕以誓皇太子更其詞云各揚其職肅奉常儀又曰憲宗元和中南郊隂氣凝閉浹旬不開宰臣議請改日上曰郊廟事重吾齋戒有日豈可廢乎至享獻之際景物澄淸人情大恱鬼谷子曰周有豪士居鬼谷號爲鬼谷先生蘇秦張儀徃見之先生曰吾將爲二子陳言至道子其齋戒擇日而學後秦儀齋戒而徃莊子曰顔回曰吾無以進矣敢問其方仲尼曰齋吾將語若顔回曰回之家貧唯不飲酒不茹葷者數月矣若此則可以爲齋乎曰是祭祀之齋非心齋也回曰敢問心齋仲尼曰若一志無聽之以耳而聽之以心無聽之以心而聽之以氣唯道集虚虚者心齋也又曰梓慶削大木爲鐻鐻成見者驚猶鬼神魯侯曰子一何巧矣何術以至此日臣工人何術之有雖然有一焉臣爲鐻未甞敢以耗氣也必齋以静心器之所以凝神者其是與又曰祝宗人玄端以臨牢筴說曰汝奚惡死吾將三月犧汝十日戒十日齊藉白茅加汝肩尻于彫爼之上韓子曰燕王欲巧衛人請以棘刺之端爲猴成功人曰君欲觀之半歳不入宫不飲酒食肉雨霽日出視之晏隂之間而棘刺之母猴乃可見也燕王固養之不能觀也捜神記曰王業和帝時爲荆州刺史毎岀行部沐浴齋㓗以祈于天地當啓佐愚心無使有枉百姓在州七年惠風大行苛慝不作儺禮記月令季春日命國儺九門磔攘以畢春氣洪範傳曰言之不從則有犬禍犬屬金也故磔之於九門所以抑金扶木畢成春功東方三門不桀春位不殺其盛徳所在無所攘又月令仲秋曰天子乃儺以逹秋氣此儺之陽氣恐陽暑至此不衰害亦將及故儺以通秋氣方欲助秋故不犬又月令季冬曰命有司大儺旁磔以送寒氣大儺爲歳終逐隂除疫以送寒氣故周官命方相氏率百隷索室驅疫以逐之旁謂王城四旁十二門也磔謂磔犬於門也春磔九門冬禮大故偏磔於十二門所以扶陽栁隂之義犬屬金冬盡春興春爲木故殺金以助木氣又郊特牲曰卿人禓揚強鬼也謂時儺索室歐疫逐強鬼也禓或爲獻或爲儺孔子朝服立于阼存室神也神依人也禮記外傳曰方相氏之官歳有三時率領群隷駈索癘疫之氣於宫室之中亦攘送之義也天以一氣化萬物五帝各行其德餘氣留滯則傷後時謂之不和而災疫興焉大儺者貴賤至於邑里皆得駈疫命國儺者但於國城中行之耳名之儺者取群隷爲儺儺之聲周禮夏官曰方相氏掌蒙熊皮黄金四目玄衣朱裳執戈楊盾帥百隷而時儺以索室歐疫蒙冐也冐熊皮者以驚歐疫癘之鬼如今魌頭也時儺四時作方相氏以儺却凶悪也月令季冬命國儺索搜也續漢書曰先臘一日大儺謂之逐疫其儀選中黄門子弟十二巳下百二十人爲侲子皆赤幘皂製執大鼗方相氏服如周制及十二獸裳衣毛角中黄門行人冗從僕射之以逐惡鬼于禁中設桃梗欝壘葦茭畢執事者皆罷葦㦸桃枝以賜公卿將軍特進諸侯禮緯曰顓頊有三子生而亡去爲疫鬼一居江水是爲虐鬼魃鬼一居人宫室區隅善驚人小兒於是常以正歳十二月令禮官方相氏蒙熊皮黄金四目玄衣纁裳執戈楊楯帥百隷及童子而時儺以索室而駈疫鬼以桃弧葦矢土鼓且射之以赤丸五糓播洒之以除疫殃後魏書曰髙宗和平三年十二月因歳除大儺之禮遂耀兵武更爲制令歩兵陣於南騎士陳於北各擊鍾鼔以爲節度其歩兵所衣青赤黄黒別無部隊楯矟矛㦸相次周廻轉易以相赴就有飛龍騰虵之變爲函箱魚鱗四門之陣凡十餘法跽起前却莫不應節陣畢南北二軍皆鳴鼓角衆盡大譟各令騎將交去來挑戰歩兵更進退以拒擊南敗北捷以爲盛觀自後踵以爲常唐書曰舊駈儺侲子等金吾將軍並具欄笏引入閤門謹按大儺者所以駈除羣厲合資威武盛其光儀欄笏之制常叅朝服舊制未稱今請各依錦繡具帑祙帶儀力部引出入建康實録曰孫興公甞着戯爲儺至桓宣武家宣武覺其應對不凡推問之乃興公宣城記曰吴時洪巨爲廬陵太守有清稱徴還舩輕皆戴土時歳暮除逐人就乞見土而去莊子曰游島問雄黄曰今逐疫岀魅擊鼔呼噪何也雄黄曰黔首多疾黄帝氏立巫咸使黔首沐浴齋戒以通九竅鳴鼔振鐸以動其心勞形趍歩以發隂陽之氣飲酒茹葱以通五藏夫撃鼔呼噪逐疫出魅鬼黔首不知以爲魅祟也張衡東京賦曰卒歳大儺駈逐羣厲方相秉鉞巫覡操茢侲子萬童丹首玄裳桃弧棘矢所發無臬飛礫雨散㓻殫畢斃惶火馳而星流逐赤疫於四裔然後淩天地絶飛梁囚耕父於清泠溺女魃於神潢廉品大儺賦曰於吉日之上戊將大蜡于臘烝先兹日之酉乆宿㓗静以清澄乃班有司聚衆大儺天子坐華殿臨朱軒凭玉几席文旃率百隷之侲子羣鼔噪於宫垣太平御覽卷第五百三十
