front:
  text: 太平御覽卷第六百四十刑法部六
  hash: sha256:7f4330a0a70ee48a6145c3a8e182888627936834668d11d720e10cc2d2b10782
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_640-1a}
body:
  text: 决獄易曰澤上有風中孚君子以議獄緩死信發於中雖過可亮傳曰晉邢侯與雍争鄐田乆而無成士景伯如楚亡景伯晉理官叔魚攝理攝代景伯韓宣子命斷舊獄罪在雍子雍子納其女於叔魚叔魚蔽罪邢侯蔽斷也邢侯怒殺叔魚與雍子於朝宣子問其罪於叔向叔向曰三人同罪施生戮死可也施行罪也雍子自知其罪而賂以賈直鮒也鬻獄邢侯專殺其罪一也巳惡而掠羙爲昬掠取也昬亂也貪以敗官爲墨墨不潔之稱殺人不忌爲賊夏書曰昬墨賊殺臯陶之刑也請從之乃施邢侯而尸雍子與叔魚於市漢書曰髙帝詔曰獄之疑者吏或不敢决有罪者乆而不下公共也今法如是更重之是法不信於民也且方其時上使誅之則巳今巳下廷尉廷尉天下平也一傾天下用法皆爲之輕重民安所措其手足惟陛下察之帝良乆曰廷尉是也又曰于定國父于公决獄平羅文法者于公所决皆不恨郡中爲立生祠東海有孝婦少寡無子養姑甚謹姑告隣人曰孝婦養我勤苦哀其無子守寡我老乆累丁壯柰何遂自死姑女告吏婦殺我母吏捕孝婦孝婦自誣服于公以爲不殺争之弗能乃抱其獄具哭於府上太守竟殺婦郡中枯旱三年後太守至卜筮其故于公曰咎其殺孝婦太守殺牛祭孝婦墓天乃大雨後于公令髙大門閭容駟馬髙蓋車我治獄多隂德子孫必有興者至定國爲丞相于定國爲廷尉人自以不冤張釋之爲廷尉天下無冤人又曰班固云今之聽獄者求所以殺之古之聽獄者求所以生之與其殺不辜寕失有罪今之獄吏上下相驅以刻爲明深者獲功名平者多後患諺曰鬻棺者欲歳之疫非憎人欲殺之利在於人死也今治獄吏欲䧟害人亦猶此矣續漢書曰郭躬字仲孫頴川人辟公府以明法律特預朝議時有兄弟共以繩絞殺人各持一端辜不可分中常侍孫章傳詔命兄不教導弟報兄重弟減死章誤言兩報重獄巳斷尚書奏矯制當斬上問躬躬曰當罰金上曰矯殺人如何罰金躬曰法令有故有誤章不故指傳命誤即報重是故爲無所放也周道如砥其直如矢君子不逆詐王法大刑不可委曲生意上曰善後魏書曰吴良爲議郎永平中車駕近岀而信陽侯隂就于突禁衛車府令徐匡鈎就車収御者送獄鈎留也詔書遣匡乃自繫良上言曰信陽侯就倚持外戚干犯乗輿無人臣禮爲大不敬匡執法守正反下于理臣恐聖化由是而㢮帝雖赦匡猶左轉良爲即丘長又曰寒㓪字伯竒永平中以謁者守侍御史與三府掾共按楚獄顔忠王平辭及隧郷侯耿建曲成侯劉建等辭未甞與忠平相見是時顯宗怒甚吏皆惶恐諸所連及率一切䧟入無敢以情恕者朗心傷其冤試以建等物色獨問忠平而二人錯愕不能對㓪知其詐乃上言建等無姦專爲忠平所誣疑天下無辜類多如此帝曰即如是四侯無事何不早奏乆繫至今耶㓪曰臣恐海内別有發其姦者故未敢時上怒罵曰吏持兩端促提下左右方引去㓪曰願一言而死小臣不敢欺欲助國耳臣見拷囚者咸共言妖惡大故臣子所冝同嫉今出之不如入之可無後責是以考一連十考十連百又公卿朝㑹陛下問以得失皆言舊制大罪禍及九族陛下大恩纔上於身天下幸甚及其歸舎口雖不言而仰屋竊歎臣今所陳誠死無悔帝意解詔遣㓪出後二日車駕幸洛陽獄録囚徒理岀者千餘人又曰虞翊爲司隷校尉臨終謂其子曰吾爲朝歌長殺賊數百其中必有冤者自此二十餘年家門不増一口斯獲罪於天也又曰法雄爲青州刺史毎行部録囚徒察顔色多得情僞長吏不奉法者皆解印綬去又曰三府舉袁安能理劇拜楚郡太守是時楚王英反辭所連及繫者數千人顯宗怒甚吏案之急迫痛自誣死者甚衆安到郡不入府先徃案獄理其無明驗者條上出之府丞掾史皆叩頭争以爲阿附反虜法與同罪不可安曰如有不合太守自當坐之不以相及也遂分別具奏帝感悟即報許得岀者四百餘人又曰郭躬家代衣冠父弘習小杜律前書杜周武帝時爲廷尉御史大夫断獄深刻少子延年亦明法律宣帝時又爲御史大夫對父故言小太守冦恂以弘爲决曹掾斷獄至三十年用法平諸爲弘所决者退無怨情郡内比之東海于公年九十五卒晉書曰周處爲廣平太守有三十年滯獄一到悉㹅决遣之理無不當又曰安帝義熈中劉毅鎮姑熟甞岀行南陵縣吏陳滿射鳥箭誤中直師雖不傷人處法棄市何承天議曰獄貴情斷疑則從輕昔有驚漢文帝乗輿馬者張釋之断以犯蹕罪止罰金何者明其無心於驚馬也故不以乗輿之重而加異制今滿意在射鳥非有心於中人按律過誤傷人三歳刑况不傷乎後魏書曰眞君中以獄訟留滯始令中書以中經義斷諸疑事髙允據律評刑三十餘載内外稱平允獄者民之命也常嘆曰臯陶至德也其後英蓼先亡劉項之際英布黥而王經丗雖乆猶有刑餘之釁况凢人能無咎乎宋書曰謝㽵爲都官尚書奏改定刑獄曰舊官長竟囚畢郡遣督郵案驗仍就施刑督郵賤吏非能異於官長雖有案驗之名而無研窮之實愚謂此制冝革自今入重之囚縣考正畢以事言郡并送囚身委二千石親臨覆辯必収聲吞亹然後就戮若二千石不能决乃度廷尉神州統外移之刺史有疑亦歸臺獄必令死者不怨坐者無恨又曰沛郡相縣唐賜徃比村彭家飲酒還因得病吐蠱䖝二十餘物賜妻張從賜臨終言死後親刳腹視五藏悉縻碎以張忍行刳剖賜子副又不禁止論妻傷夫五歳刑子不孝父母弃市並非科例三公郎劉勰議賜妻痛徃遵言兒識謝及理孝事源存心非忍害謂冝哀矜頋覬之議以爲妻子而行忍酷不冝曲通小情謂副爲不孝張同不道詔如覬之議隋書曰裴藴授御史夫夫與裴矩虞丗基叅掌機宻善候伺人主微意若欲罪者則曲法順情假成其罪所欲宥者則附從輕典因而釋之是後大小之獄皆以付藴憲部大理莫敢與奪必禀進止然後决㫁藴亦機辯所論法理言若懸河或重或輕皆由其口剖析明敏時人不能致詰又曰裴政爲少司憲用法寛平無有冤濫囚徒犯極刑者乃許其妻子入獄就之至冬將行决皆曰裴大夫致我於死死無所恨其處法詳平如此又曰郎茂衛國令時有繫囚二百茂親自究審數日釋免百餘人歷年辭訟不詣州省魏州刺史元暉謂茂曰長史言衛國民不敢申訴者畏明府耳茂進曰民猶水也法令爲隄防隄防不固必致奔突苟無决溢使君何患哉暉無以應之又曰于仲文字次武爲安固太守始州刺史屈突尚宇文護之黨也先坐事下獄無敢繩者仲文至郡窮治遂竟其獄蜀中爲之語曰明斷無雙有于公不避強禦有次武未幾徴爲御正下大夫又曰梁敬眞大業之丗爲大理司直時帝欲成光禄大夫魚俱羅之罪令敬真治其獄遂希旨陷之極刑未幾敬真有疾見俱羅爲之厲數日而死唐書曰貞觀𥘉太宗謂侍臣曰死者不可再生用法務從寛恕古人云賣棺者願歳之病非憎於人利棺之售耳今司覆一獄必求深刻欲成其考課作何道理令得平允侍中王珪曰但任公正善人爲法官若斷獄允當則増祑賜金如此則姦僞息矣太宗曰古者斷獄必訊於三槐九棘之官今三公九卿是也今後大辟罪結正更取公卿議之如是四年斷死刑二十九人天下幾致刑措矣又曰吏部尚書長孫無忌甞𬒳召不解佩刀入東上閣門待罪僕射封德彛議云監門校尉不之覺罪當死無忌誤帶刀入罰銅二十斤從之大理卿帶胄執奏曰校尉不覺與無忌帶入同爲誤耳臣子之於尊極不得稱悞准律云供御湯藥飲舟舡悞不如律者皆死陛下若録其功非憲司所决若當據法罰銅未爲得理太宗嘉之免校尉死又曰李曰知天授中遷司刑丞時用法嚴急日知獨寛平無冤濫甞免一死囚少卿胡元禮斷請殺之與日知徃復至于數四元禮怒曰元禮不離刑曹此囚終無生禮荅曰日知不離刑曹此囚終無死法竟以兩狀列上日知果直又曰潤州刺史竇孝諶妻龐氏爲奴誣告云夜解祈福則天令給事中薛季昶鞠之季昶斷錬成其罪龐氏坐斬侍御史徐有功執論龐氏罪不至死季昶又劾有功黨惡逆法司結刑有功當棄市方視事令史垂泣以告有功曰豈吾獨死諸人長不死耶乃徐起而歸則天覽法司所劾召有功誥之曰卿此斷獄失出何多耶對曰失岀臣下之小過好生聖人之大德願陛下捨小過弘大德則天下幸甚則天黙然龐氏竟减罪流于嶺表又曰杜景佺爲司刑丞天授年與徐有功來俊臣侯思正專理制獄時人稱云遇徐杜者必生遇來侯者必死又曰李勉爲膳部貟外時関東獻俘百人詔並處斬囚有仰天歎者勉偶過問之對曰某𬒳脅制守官非逆者勉哀而上言曰元惡未殄遭點汚者半天下皆欲澡心歸化若盡殺之是駈天下以資兇逆也肅宗遽令奔騎宥釋由是歸化日至又曰顔真卿爲監察御史五原有冤獄乆不决眞卿至辨之天方旱獄决乃雨郡人呼之爲御史雨又曰寳曆中京兆人有姑以小過鞭婦至死者府上其獄刑部郎中竇叅斷合償死刑部尚書栁公綽議曰尊歐卑非鬪且其子在以妻而戮其母非教也竟從公綽之議得减死又曰竇叅爲奉先尉縣人曹芬隷北軍素兇暴與弟歐其女弟芬父救之不得遂投井死叅捕理芬兄弟當死衆官皆請俟免䘮叅曰子因父生父由子死若以䘮延罪是殺父不坐也皆正其罪而殺之一縣皆伏又曰德宗於朝堂別置三司以决庻獄辨争者輙擊登聞鼓裴諝上䟽曰夫諌鼓謗木之設所以逹幽枉延直言今輕猾之徒援桴鳴鼓始動天聽竟因纎微若然者安用吏理乎上然之悉歸有翁司風俗通曰南郡讞女子何侍爲許逺妻侍父何陽素􅒬酒從逺假求不悉如意陽數罵詈逺謂侍汝翁復罵者吾必揣之侍曰共作夫妻柰何相辱揣我翁者搏若母矣其後陽復罵逺遂揣之侍因上堂搏姑耳再三下司徒鮑宣决事曰夫妻所以養姑者也今􅡾自辱其父非姑所使君子之於凢庸不遷怒况所尊重乎當减死論又曰趙相汝南李統爲兾牧阮况奏統耳目不聦冝免職任無幾兾州有疑獄章帝問統統處當尅厭上心帝曰君大聦明刺史不親君耳即日免况拜統侍中董仲舒决獄曰甲父乙與丙争言相闘丙以佩刀刺乙甲即以杖擊丙誤傷乙甲當何論或曰毆父也當梟首議曰臣愚以父子至親也聞其闘莫不有怵悵之心扶伏而救之非所以欲詬父也春秋之義許止父病進藥於其父而卒君子原心赦而不誅甲非律所謂歐父也不當坐又曰甲夫乙將舡㑹海盛風舡没溺流死亡不得葬四月甲母丙即嫁甲欲當何論或曰甲夫死未葬法無許嫁以私爲人妻當棄市議曰臣愚以爲春秋之義言夫人歸於齊言夫死無男有更嫁之道也婦人無專刺擅恣之行聽從爲順嫁之者歸也甲又尊者所嫁無淫衍之心非私爲人妻也明於决事皆無罪名不當坐太平御覽卷第六百四十
