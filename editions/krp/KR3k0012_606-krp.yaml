front:
  text: 太平御覽卷第六百六
  hash: sha256:4dd243a07ff5e3ee3ab6c9c6a116e77182ea518ba901e19ae0e8c30829ca7cae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_606-1a}
body:
  text: 文部二十二簡䇿牘札牒板刺函衮槧槴封書泥水滴器簡說文曰簡牒也釋名曰簡書編也言間也爾雅曰簡謂之畢郭璞曰今簡札也毛詩鹿鳴曰豈不懷歸畏此簡書張璠漢記曰呉祐父恢爲南海太守欲以殺青冩書祐年十二諌曰海濵多珎玩此書若成載必盈兩昔馬援以薏苡興謗王陽以書槖邀名疑惑之戒先賢所愼恢大喜范曄後漢書曰大夫司徒鄧禹西征定河東張宗詣禹自歸禹聞宗多權謀乃表爲將軍禹軍到恂邑赤眉大衆且至禹以恂邑不足守欲引師進就堅城而衆人多畏賊追憚爲後拒禹乃書諸將名於竹簡署其前後亂著笥中令各探之宗獨不肯探曰死生有命宗肯辭難就逸乎禹歎息謂曰愚聞一卒畢力一百人不當万夫致死可以横行宗今擁兵數千以承天威何遽其必敗乎魏畧曰宣王討王陵陵靣縛迎遥謂太傳曰卿直以折簡召我我當不至耶而引軍來乎太傳曰以卿非肯逐折簡者也瀬郷記曰老子母碑曰老子把持仙録玉簡金字編以白銀紀善綴惡楚國先賢傳曰孫敬編楊栁簡以爲經本晨夜誦習劉向別傳曰孫子書以殺青簡編以縹絲繩文士傳曰人有嵩山下得竹簡一版上有兩行科斗之書中外傳示莫能知張華以問束晢晢曰此明帝顯節陵中䇿文也驗校果然風俗通曰劉向別録殺青者直治竹作簡書之耳新竹有汁善折蠧凢作簡者皆於火上炙乾之陳楚間謂之汗汗者去其汁也呉越曰殺亦治也劉向爲孝成皇帝典校書籍二十餘年皆先書竹改易刋定可繕冩者以上素也由是言之殺青者竹斯爲明矣神仙傳曰隂長生裂黄表冩丹經一通封以文石之函著嵩髙山一通黄櫨簡染之書封以青玉之函著華山一通黄金之簡刻而書之封以白銀之函著蜀綏山自汝隂徙平陵代爲名族呉暦曰孫皓時呉郡民掘地得物似銀長一尺三寸刻畫有年月字因改年爲天䇿唐書曰貞觀中房玄齡議封禪儀玉䇿四枚各長一尺三寸廣一寸五分厚五分每䇿五簡俱以金編其一奠太祖一奠地祇一奠髙祖穆天子傳曰癸巳至於群玉之山阿平無險言邊無險阻也四徹中繩言皆平直先王之謂䇿府言往古帝王以爲藏書策之府家語曰哀公問政於孔子孔子曰文武之政布於方䇿牘說文曰牘謂書板也釋名曰牘睦也身執之以進見所以爲恭睦也史記曰文帝遺單于尺一寸牘單于以尺二寸牘荅又曰東方朔𥘉入長安至公車上書凡用三千奏牘公車令兩人共持舉其書僅能勝之人主使從上方讀之止輙記其處讀之二月乃盡詔拜以爲郎東觀漢記曰時天下墾田多不實詔撿覆覈百姓嗟怨諸郡遣使帝見陳留吏牘上有書視之云潁川弘農可問河陽南陽不可問上得之怒時東海公年十二在幄後言曰吏受郡勑欲以懇田相方耳帝曰即如此何故言河陽南陽不可問對曰河南帝城多近臣南陽帝郷多近親田宅踰制不可爲准帝令虎賁詰問吏吏首服遣謁者栲實具知姦狀夢書曰牘札爲薦舉夢得牘札欲薦舉也韓詩曰趙簡子太子名伯魯小子名無恤簡子自爲二牘親自表之書曰節用聽聦敬賢勿慢使能勿賤與二子使恒誦之居三年簡子坐青臺之上問二子書所在伯魯亡其表令誦不能得無恤出其書於左𬒮令誦習焉乃黜伯魯而嘉無恤韓詩外傳曰趙簡子有臣周舎立於門下三日三夜簡子問其故對曰臣爲君諤諤之臣秉筆操牘從君之後伺君過而書之札劉熈釋名曰札櫛也編之如櫛齒相比也晉令曰郡國諸户口黄籍籍皆用一尺二寸札巳在官役者載名漢書曰司馬長卿未死時爲一卷書曰有使來求奏之其遺札書言封禪事又曰谷永字子雲便於筆札故時人云子雲之筆札婁君卿之脣舌後漢書曰樊崇等西攻更始百萬之衆而無稱號欲立帝求軍中景王後者得七十餘人唯盆子與茂及前西安侯爲最崇等議曰聞古天子將兵稱上將軍乃書札爲符曰上將軍又以兩空札置笥中札簡也笥篋也遂於鄭北設壇埸祠城陽景王諸三老從事皆大㑹陛下列盆子三人居中立以年次探札盆子最幼後探得符諸將乃皆稱臣續漢書曰賈逵字景伯時有神雀入宫章帝勑蘭臺給筆札使逵作神雀頌晉張華有文雅之才晉儀禮釐革制度勑有司給筆札多有損益晉陽秋曰梁國張惲字義元爲郡吏入值太守圍棊投札於地惲曰知府君患風取以支户太守輟棊令坐漢武故事曰上崩後有一人騎馬馬異於常馬持一尺札賜將作大匠丞文曰汝績克成賜汝金十斤因忽不見札變爲金稱之重十斤抱朴子曰魏武帝以左慈爲妖妄欲殺之使人収之慈故欲見而不去欲栲之而獄中有七慈形狀如一不知何者爲真以白武帝帝使人盡將殺之湏臾七慈盡化爲札而一慈徑出走赴群羊詩云有客從南來貽我一書札上叙長相思下言乆離別牒說文曰牒札也文心雕龍曰牒者葉也如葉在枝也短簡爲牒議事未定故短牒諮謀牒之尤宻謂之籖左傳昭六年曰趙簡子令諸侯大夫輸王粟宋樂大心曰我不輸粟我於王爲客二王後爲賓客晉士伯曰自踐土以來宋何役不㑹而何盟不同王室子焉避之右師不敢對受牒而退右師樂大心也漢書曰路温舒字長君鉅鹿東野人父爲里監門使温舒牧羊取澤中蒲截爲牒編用冩書板釋名曰板昄昄平廣也昄半旱切春秋演孔圖曰孔子曰丘作春秋天授演孔圖中有大玉刻一版曰珽璣一低一昻是七期驗敗毀滅之徴也蜀志曰譙周勸劉禪降後元熈二年夏巴郡文立從洛還過見周周語次因書板示立曰典午忽兮月酉没兮典午者謂司馬也月酉八月也至八月而司馬昭果崩王隱晉書曰惠帝時謡曰二月盡三月𥘉桑生裴雷柳葉舒荆筆楊板行詔書宮中大司馬作幾驢而楊駿荆王反幽明録曰王文度鎮廣陵忽見二騶持鵠頭板來召之王大驚問騶我作何官云尊作平北將軍徐兖二州刺史王曰吾巳作此官何故復召耶鬼云此人間耳且令所作是天上官也王大懼亦㝷見迎官玄衣人及鵲衣小吏甚多王㝷疾薨桂陽先賢畫讃曰胡滕部南陽從事遇大駕南廵求索揔猥滕表曰天子無外乗輿所幸便爲京師臣請荆州刺史比司隷臣比都官從事帝竒其才悉許大將軍西曹椽亡馬召滕因作都官鵠頭板召百官敬服相板經曰板有芒角形勢上狹下廣右薄左厚光采流澤文色調逹木理通直皆爲吉反是㓙板細理輕蹙其人性簡逹周正其人寛博板有横節爲病在靣内䘮在背外䘮板有蝎穿及節對過其人凶板中字皆令筆迹調利有形勢字欲當右行空中不用對對則多牽制又上官多憎之官字欲令故官字小新官字大有波勢墨色分明板形平通無絶傷刀迹是元吉官字無形勢點染不分明皆免官或不到官官字小它字墨散入材理中必入獄死板色欲類其姓角家板色青爲吉亦不冝子白不利官屬墨不利父母黄不利妻財凢齎板來者其人姓名善爲喜祥不善則否也相板時要以手持板之若手近板後則板前低而落此則左遷板有病累皆可治改治之用庚申寅曰庚更也申伸也寅引也言更引吉祥也刺釋名曰畫姓字於奏上曰畫刺作再拜起居字皆逹其體使書盡邊徐引筆書之如畫者也下官刺長書中央一行而下也又有爵里刺書其官爵及郡縣郷里也典畧曰王符字節信安定人感激著書名曰潜夫論故渡遼將軍皇甫規去官歸安定或有人前以貨買鴈門太守者亦去官歸畫刺規規卧不迎使人呼入旣坐問啖鴈美乎又以其刺刮髀有湏聞王節信在外規乃驚起衣不及帶倒履而出援其手而還與同席坐大設賔日暮別去人或歎曰何有二千石之賤不如諸生之貴乃如此耶魏名臣奏曰黄門侍郎荀俁奏曰今吏𥘉除有二通爵里刺條䟽行狀夏侯榮傳曰榮字㓜權淵第五子㓜聦明經目輙識文帝聞而請焉賔客百餘人一奏刺悉書其郷邑姓名丗所謂爵里刺示之一過而使之遍談不謬一人帝竒之長沙耆舊傳曰夏侯叔仁氏族單微丁母憂居䘮過禮同郡徐元休弱冠知名聞而弔焉旬日之中積刺盈案呉録曰孟宗爲豫章太守謂倉掾曰君昔負太守一刺寕識之否掾曰不識宗曰吾昔家貧親老爲官賃運以刺詣君感見發遣何乃乆屈耶雜事曰髙彪字義方呉郡人志尚甚髙遊太學博覽經史善屬文嘗詣大儒馬融辭不見彪覆刺其書曰伏聞髙問爲日乆矣兾一見龍光叙腹心之願以啓其蔽不圗辭之以疾昔周公父文王兄武王九命作相以尹華夏猶握沐吐食以接白屋之士天下歸德歷載邈矣今君不能相見冝哉融省大愧遣人辭謝追請徑去不肯還郭林宗別傳曰林宗名益顯士争歸之載刺常盈車祢衡別傳曰衡𥘉遊許下乃懷一刺旣到而無所之適至於刺字漫滅幽明録曰一士人姓王坐齋中有一人通刺詣之題刺云舒甄仲旣去疑非人㝷刺曰是予舎西士瓦中人令掘果於瓦器中得一銅人長尺餘函呉志曰張温字惠恕使蜀謂先主曰謹奉所賫函書封晉安帝紀曰朱齡石伐蜀太尉與齡石書署函曰至白帝乃發書曰衆悉從外水取成都臧燾於中水出廣漢使嬴弱乗髙艦十餘由内水向黄虎傳子曰太祖徴劉曄授以腹心之任毎有疑事輙以函令問曄乃一夜數十至袠說文曰秩書衣也晉中經簿曰盛書有縑袠靑縑袠布袠絹袠後漢書曰楊春卿臨命戒子統曰吾綈袠中說文曰綈厚繒也綈音提有先祖所傳祕記爲漢家用尓其修之統感父遺言服闋辭家從捷爲周脩學習先法又就同郡鄭伯山受河洛書及天文推歩之術益部耆舊傳曰廣漢王棠妻文拯其前妻子博學好冩書拯嘗爲手自作袠常過其意宋謝靈運書祑銘曰懷幽卷頥戢妙抱宻用舎以道舒卷不失亮唯勤翫無或暇逸梁昭明太子詠書帙詩曰擢影免園池抽莖淇水側幸雜緗囊用聊因班女織槧說文曰槧牘牒也釋名曰槧板長三尺者也槧漸也言漸漸然長也論衡曰断木爲槧楊雄荅劉歆書曰以鈆擿松槧二十七年矣西京雜記曰楊子雲好事嘗懷鈆提槧從諸計吏訪殊方絶俗四方之語㨭後漢杜篤書㨭賦曰惟書㨭之麗容象君子之淑德載方矩而履規加文藻之修飾能屈伸以和禮惟髙下而消息雖轉旋而屈橈時傾邪而返側抱六蓺而卷舒敷五經之典式封泥書春秋說曰龍圖赤玉匣封泥如黄珠又曰黄龍五采負圗黄玉匣黄金繩縷黄芝泥王子年拾遺曰元封元年浮折國貢蘭金之泥此金湯淵盛夏之時水常沸湧有若湯火飛鳥不能過國人行者見水邊有人治此金爲器混混若泥如紫磨之色百錬其色變白如銀名曰銀燭嘗以此泥封諸函匣令諸宮門鬼魅不敢干當漢丗上將出征多以泥爲印封衛青張騫蘇武傳介子之使皆受金泥之壐封也續漢書曰光武封禪乃求元封封禪事奏用玉牒玉撿以水銀和金爲泥東觀漢記曰鄧訓嘗將黎陽營兵屯狐奴後迁護烏桓校尉黎陽故吏最貧羸者舉國志訓嘗所服藥北州少乏又知訓好青泥封書從黎陽歩推鹿車於洛陽市藥還趙國昜陽并載青泥一襆至上谷遺訓其得人心如是西京雜記曰漢以武都紫泥爲壐室加綈其上水滴器西京雜記云晉靈公冡甚瑰壯器物皆杇不可別唯玉蟾蜍一枚大如拳腹空容五合如新玉取以成水滴硯傳玄水龜銘曰鑄兹靈龜躰象自然含源未岀有似清泉潤彼玄墨染此弱翰申情冩意經緯群言太平御覽卷第六百六
