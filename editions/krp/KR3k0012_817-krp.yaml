front:
  text: 太平御覽卷第八百一十七
  hash: sha256:44d248257d3458fee068639d5657f67d9118d03cf7651d3a306872dbb704f014
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_817-1a}
body:
  text: 布帛部四絹廣雅曰繁繐鮮文縠絹也說文曰絹似霜釋名曰絹䋌也其絲䋌厚而䟽也東觀漢記曰南陽太守杜謂㘴遣客爲弟報仇𬒳徴㑹病卒䘮無所歸詔使持䘮郡國邸􅉠絹絹千疋謝承後漢書曰陳留夏馥避黨事遁迹黒山弟靖載絹徃餉之於深陽縣客舎見馥顔色衰毀不復識聞其聲乃覺之華嶠後漢書曰李􅔸等大戰弘農百官士卒死者不可勝數董承宻招白波帥李樂等率衆來共擊􅔸等大破之乗輿乃得進承夜潜過曰先具舟舩爲應帝歩出營臨河岸高不得下時中官伏徳扶中宫一手持十疋絹乃取德絹連續挽而下餘人匍匐岸側或自投死亡又曰陳寔在郷閭平心率物有盗夜入其室止於梁上寔見呼命子孫訓之曰不善之人未必本不慈習與性成如梁上君子是也盗驚自投地寔徐譬之曰視君狀皃不似惡人冝深克巳反善然當由貧今遺絹二疋自是一縣無復盗竊魏略曰文帝在東宫嘗從曹洪貸絹百疋洪不及洪犯法自分必死後遂得原魏志曰趙儼爲朗陵長時袁紹舉兵南侵遣招誘䂊州諸郡多受其命唯陽安郡不動而都尉李通急録户調儼見通曰方今天下未集諸郡並叛懷附者復収其緜絹小人樂亂能無遺恨且逺近多虞不可不詳也通曰紹與大軍相持甚急左右郡縣皆叛乃爾若緜絹不調送觀聽者必謂我顧望有所須待也儼曰誠亦如君慮然當權其輕重小緩調當爲君釋此患乃書與荀彧又曰孫禮爲楊州刺史呉大將全琮帥數萬衆來侵冦時州兵在者無幾禮躬勤禦之戰於芍陂禮犯䧟白刃馬𬒳數創手秉桴鼔奮不顧身賊衆乃退詔書慰勞賜絹七百疋魏略曰鮮卑素利等數來多以牛馬遺田䂊䂊輙送官胡以爲所䂊物顯露不如持金乃宻懷金三十斤謂䂊曰願辟左右我物有所遺豫從之胡因跪曰我見公貧故前後遺公牛馬公輙送官今宻以此上公可以爲家資豫張䄂受之荅其厚意胡去後悉皆付外具以狀聞於是詔褒之曰昔魏絳開懷以納戎今卿舉䄂以受狄朕甚嘉焉乃即賜絹五百疋豫得賜分以其半藏小府後胡復來以半與之又曰田豫罷官歸居魏縣會汝南遣徤歩詣征北感豫宿恩過拜之豫爲殺雞炊黍送詣陌頭謂之曰罷老苦汝來過無能有益若何徤歩愍其貧羸涕流而去還爲故吏民說之汝南爲具資絹數千疋遣人餉豫豫一不受魏志曰景初中賜倭士王白絹五十疋魏文帝詔曰今與孫驃騎和通啇旅當日月而至而百賈偷利喜賤其物平價又與其絹故官逆爲平凖耳官豈少比物軰耶呉志曰丹陽太守李衡每欲治家妻輙止之衡宻遣客十人於武陵龍陽洲上作宅種甘千株臨死勑兒曰汝母惡吾治家故窮如是然吾州里有千頭木奴不責汝衣食歳止一疋絹亦足用耳衡亡後二十餘日以問母曰此當是種甘也汝家失十戸客七八年必汝父遣爲宅汝父嘗稱太史公言江陵千樹橘當封君吾荅人患無徳貧方好耳用此何爲呉末衡甘成歳得絹數千疋家道殷足呉録曰袁博爲太守黄君舉爲孝廉爲業令以俸禄市縑絹餉黃君家黄氏負郷里債債家到門輙應云待葉令家餉王隱晉書曰王尼見太傅越曰公負尼物越荅初不識此事尼曰昔楚人失布謂令尹盗者以令尹執政不能奉禮率法至使盗賊公行是與自盗無異也尼舎資財軍㓂輙略公爲宰輔未能禁賊令尼窮困是亦明公負物也越意解大笑與尼絹五十疋王隱晉書曰劉實爲伐蜀人作爭功得千疋絹又曰蘇節從兄韶亡後著青黃絹單衣來與節言虞預晉書曰武帝論平呉功唯羊祐王濬張華三人各賜絹万疋其餘莫得比此于寳晉紀曰華譚依周馥及琅邪王遣甘卓攻馥譚先於卓有恩卓募人入城求譚入者至舎問華侯在不吾甘楊威使也譚曰不知華侯所在抽絹二疋授之使人還以告卓曰是華侯也晉陽秋曰有司奏依舊調編絹武帝不許又曰荆州刺史庾氷中子襲嘗貸官曹絹十疋氷怒撻之市絹還官又曰胡威字伯虎父質之爲荆州也威自京都省之停中十餘日告歸臨辭質賜其絹一疋爲道路粮威跪曰大人清髙不審於何得此絹質曰是吾俸之餘故以與汝耳又曰桓温入蜀聞有善星人招致之獨執其手於星下問國祚脩短星人曰太微紫微文昌三宫氣候决無憂虞五十年外不論耳温不悅送絹一疋錢五千與之晉中興書曰翟楊字道淵㝷陽人太守于寳遣船餉之勑吏曰翟公廉讓卿致書訖便委船還楊無人送致乃更貨易絹物因寄還寳宋書曰沈慶之年八十夢有人以兩疋絹與之謂曰此絹足度寤而謂人曰老子今年不免矣兩疋八十尺也足度無盈餘矣是歳果卒又曰李安人行南徐州事叅軍王廻素爲安人所親盗絹二疋安人流涕謂曰我與卿契闊備甞今日犯王法乃卿負我也於軍門斬之又曰孝武時齊庫上絹年調鉅万疋綿亦稱此期嚴限峻人間買絹一疋至二三千緜一兩三四百貧者賣妻子甚者或自縊死沈懷文具陳人困由是緜絹薄有所減又曰阮佃夫佞幸專權有人餉絹二百疋嫌少不荅書齊書曰䂊章王嶷拜陵還過延陵季子廟觀沸井有水牛突部伍直兵執牛推問嶷不許取絹一疋撫繫牛角放歸其家又曰蕭赤斧遷給事中太子詹事卒於家貧無絹衾衣梁書曰吉士瞻少時嘗於南蠻國中擲塼無禈褰露爲儕軰所侮及平魯休烈軍得絹三萬疋乃作百禈於外並賜軍土不以入室又曰劉孝綽爲吏部郎坐受人絹一束爲餉者所訟左遷信威臨賀王長史又曰任昉爲義興太守及𬒳代登舟止有絹七疋米五石至都無衣鎭軍將軍沈約遺裠衫迎之又曰費昶善爲樂府甞作皷吹曲武帝重之勑曰才意新拔有足嘉異昔邯鄲博物卞蘭巧辭束帛之賜實惟勸善可賜絹十疋又曰周石珎建康之廨􅊢也世以販絹爲業又曰傅昭爲臨海太守縣令甞餉栗寘絹于簿下昭笑而還之又曰裴邃爲北梁秦二州刺史復開創屯田數千頃倉廩盈實省息邊運人吏獲安乃相率餉絹千餘疋邃從曰汝等不應爾吾又不可逆汝納其二疋而巳後魏書曰李崇在官和厚明於决斷然性在財賄販肆聚歛上令王公巳下從者百餘人皆令任負布絹即以賜之多者過二百疋少者百餘唯長樂公兩手持絹二十疋而出亦不異衆而當世稱其廉儉尚書令任城王澄疾不起賜絹百疋崇與章武王融以所負過多顛仆於地崇乃復腰融至損脚時人爲之語曰陳留章武傷腰折股貪人敗類穢我明主又曰爾朱榮之奉莊帝召百官悉至河隂素聞元順數諫諍惜其諒直謂朱端曰可語元僕射但在省不須來順不達其旨聞害衣冠遂便出走馬爲鮮于康奴所害家徒四壁無物歛尸令史王才逹裂裳覆之帝勑侍中元祉曰宗室䘮亡非一不可周贍元僕射清苦之節死乃益彰特贈絹百疋又曰楊津除歧州刺史巨細躬親孜孜不倦有武功人賞絹三疋去城十里爲賊所刼時有使者馳馹而至𬒳刼人因以告之使者到州以狀白津津乃下教云有人着某色衣乗某馬在城東十里𬒳殺不知姓名若有家人可速収視有一老母行哭而出云是巳子於是遣騎追収并絹具獲自是闔境畏服又曰楊津爲華州刺史先是受調絹度尺特長在事因縁共相進退百姓苦之津乃令依公尺其輸物尤好者賜以杯酒而出其所輸少劣者爲受之但無酒以示其耻於是競相勸勵官調更勝又曰趙柔有人遺柔鏵數百枚者柔與子善明鬻之市有人從柔買索絹二十疋有啇人知其賤與柔三十疋善明欲取之柔曰與人交易一言便定豈可以利動心遂與之搢紳之流聞而敬服又曰陸馥爲相州刺史發姦擿伏事無不驗百姓以爲神明無敢刼盜者在州七年家至貧約徴爲散騎常侍百姓乞留馥千餘人獻文不許謂羣臣曰馥之著政雖古人何以加之賜絹五百疋又曰李元忠去任歸李魚川孝莊時盜賊蠭起清河有五百人西戎還經南趙郡以路梗共投元忠奉絹千餘疋元忠唯受一疋殺五牛以食之遣奴爲導曰若逢賊但道李元忠遣如言賊皆舎避又曰韓麒麟爲齊州刺史立性恭愼恒置律令於㘴傍臨終之日唯有俸絹數十疋清貧如是又曰陽平王子衍轉徐州刺史至州病重帝勑徐成伯乗傳療疾差成伯還帝曰卿定名醫賚絹三千疋成伯辭請受一千帝曰詩云人之云亡邦國殄瘁以是而言豈惟三千疋乎又曰穆再轉汝陽太守遇水澇人飢上表請輕租賦帝從之遂勑汝陽一郡聽以小絹爲調又曰髙允卒詔給絹一千疋布二千疋綿五百斤錦五十疋雜綵百疋榖千斛以助喪用也又曰王靈字羅漢爲南兖州刺史取官絹因染遂有割易御史糺劾㑹赦免又曰宋鴻貴爲定州北平府叅軍送戍兵於荆坐取兵絹四百疋兵欲告之乃斬兵十人又曰公孫軌爲武牢鎮將初太武將北征發驢以運粮使軌部調雍州䡄令驢主皆加絹一疋乃與受之百姓語曰驢無強弱負絹自壯衆共嗤之北齊書曰崔暹遷尚書左僕射儀同三司時調絹以七尺爲丈暹言之乃依舊焉又曰孝昭常賜百官射王晞中的當得絹爲不書箭有司不與晞陶陶然曰我今可謂武有餘文不足矣隋書曰庫狄士文嘗入朝遇上置酒高㑹賜公卿入左藏任取多少人皆極重士文獨口衘絹一疋兩手各持一疋上問其故士文曰臣口手俱滿餘無所須上異之别加賞物勞而遣之唐書曰侍御史馬周上䟽云徃者貞觀之𥘉一疋絹纔得一斗米而天下怗然百姓知陛下甚憂憐之故人人自安曽無怨讟自五六年來頻歳豐稔一疋絹得粟十餘石而百姓皆以爲陛下不憂憐之咸有怨言又今所營爲樂多不急之務故也又曰太宗初即位風聞諸曹案典受賂乃遣左右試以財物遺之有司聞令史受餽絹一疋上將殺之裴短進諌曰此人受賂誠合重誅但陛下以物試人則行極法所謂固入其罪恐非導德齊禮之義上善之又曰髙宗朝詔自今巳後天下嫁女受財三品巳上之家不得過絹三百疋四品不過二百疋六品七品不得過百疋皆充所嫁女之資裝等用其夫家不得受陪門之財又曰文宗大和六年賜故衛國公李靖五代孫前鳯翔司録叅軍芳絹二百疋衣笏一副并還先奏髙祖太宗書詔及官告衣物等後唐史曰賜宰相李愚絹百疋錢百緡鋪陳物一十三什時愚病上令中使宣問愚所居寢室蕭然四壁卧弊氊而巳中使具言其事上曰嘻宰相月俸錢幾何而委頓如此故有是賜四王起事曰張方移惠帝於長安兵人入殿取物特調御絹二尺幅自魏晉之積將百餘萬疋三日取之尚不缺角四王起事曰惠帝於鄴與成都王還洛陽出城倉卒上下無持資食之調道中有駈羊二百餘口者便勒將至洛得以爲糧至洛盧志啓以右藏絹倍還羊主捜神記曰永嘉中有天笁胡人能取絹與人各執一頭剪斷之巳而取兩叚合持之則復還連緜可練無異故體也又曰呉先主病遣人於門觀不祥巫啓見一鬼著絹巾似是大臣將相其夜先主夢見魯肅來入衣巾如之述異記曰清河崔基寓居青州朱氏女姿容絶倫崔頃懷招賢約女爲妾後三更中忽聞扣門外崔披衣出迎女雨淚嗚咽云適得暴疾䘮亡忻愛永奪悲不自勝女於懷中抽兩疋絹與崔曰近自織此絹欲爲君作禪衫未得裁縫今以贈離崔以錦八尺荅之女取錦曰從此絶矣言畢豁然而滅至旦告其家女父曰女昨夜忽心痛夜亡崔曰君家絹帛無零失耶荅云此女舊織餘兩疋絹在箱中女云之始婦出絹欲裁爲送終衣轉眄失之崔因此具說事狀先賢行狀曰范郃字孝悌少時㑹省外家逢掠者駈其牛取衣物去郃還車知賊不得席後三疋絹乃追呼令取之賊知長者悉還所取而辭謝焉三輔决録曰平陵士孫奮貲至一億七十萬冨聞京師而性儉􅪟從子瑞辟梁兾掾奮送絹五疋食以乾魚鄴中記云石虎以辰曰臘子曰祖祖於殿庭立五仙人高數丈五綵幢蓋大㑹羣臣於太武殿上祖曰探三探乃有得絹百疋者有得數十疋者有得土者虎輙大笑以爲樂孔舒元在窮記曰太安二年六月賊遂來入門時家見有絹布三千餘疋及衣𬒳器物皆令婢使輦出著庭中恣其所取魏武帝令曰今清時但當盡忠於國効力王事雖私結好於他人用千疋絹萬石糓猶無所益又曰東曹掾田疇言前以無功橫𬒳封賞之賜以實自歸教從所執昨到下車見絹三千疋糓五千斛驚愕恠懼未敢自寧乞還藏府以爲軍儲世語曰王經字彦律初爲江夏太守大將軍曹爽附絹二十疋令交布於呉經不發書弃官歸母問歸狀經以實對母以經典兵馬而擅去對送吏杖經五十爽聞不復罪經世說曰范宣年八歳後園挑葉誤傷指大啼人問痛耶荅曰非爲痛也但身體髮膚不敢毁傷是以啼耳宣㓗行廉約韓豫章遺絹百疋終不肯受後韓與范同車就車裂二丈韓云寧可使婦無裩也范笑而受之孝子傳曰董永父終貧不遂葬以身質錢一萬旣葬就後逢一女子求與永爲妻云能織絹永詣主人主人令織一旬三百疋債足女辭去曰我天之織女也帝見君孝使我共償耳因遂不見事具孝感門太平衘覽卷第八百一十七
