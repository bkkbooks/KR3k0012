body:
  text: 皇王部八殷帝成湯帝外丙帝仲壬帝太甲帝沃丁帝太庚帝小甲帝雍巳帝太戊帝仲丁帝外壬帝河亶甲帝祖乙帝祖辛帝沃甲帝祖丁帝南庚帝陽甲帝盤庚帝小辛帝小乙帝武丁帝祖庚帝祖甲帝廩辛帝庚丁帝武乙帝太丁帝乙帝紂殷帝成湯史記曰殷之祖契音薛母曰簡狄有娀氏之女爲帝嚳次妃三人行浴見玄鳥墯其卵簡狄取吞之因孕生契契長佐禹治水有功舜乃命契曰百姓不親五品不遜汝爲司徒而敬敷五敎在寛封於啇賜姓子氏契興於唐虞大禹之際功業著於百姓百姓以平契卒子昭明立昭明卒子相土立相土卒子昌若立昌若卒子曹圉立曹圉卒子冥立子冥卒子振立子振卒子微立微卒子報丁立報丁卒子報乙立報乙卒子報丙立報丙卒子主壬立主壬卒子主癸立主癸卒子天乙立是爲成湯帝王丗紀曰成湯一名帝乙豐下兊上指有胼倨身楊聲長九尺臂四肘有聖德諸侯有不義者湯從而征之誅其君吊其民天下咸恱故東征則西夷怨南征則北狄怨曰奚爲而後我故仲虺誥曰徯我后后來其蘇者也凡二十七征而德施於諸侯焉及夏桀無道湯使人哭之桀囚湯於夏臺而後釋之諸侯由是咸叛桀附湯同日貢職者五百國三年而天下悉服湯自伐桀後大旱七年洛川竭使人持三足鼎祝於山川曰慾不節耶使民疾耶苞苴行耶䜛夫昌耶宫室營耶女謁行耶何不雨之極也殷史卜曰當以人禱湯曰吾所爲請雨者民也若必以人禱吾請自當遂齋戒剪髪斷爪以巳爲牲禱於桑林之社曰唯予小子履敢用玄牲告于上天后土曰萬方有罪罪在朕躬朕躬有罪無及萬方無以一人之不敏使上帝鬼神傷民之命言未巳而大雨至方數千里河圗曰扶都見白氣貫月感生黒帝湯詩含神霧帝王丗紀並同雒書靈准聽曰黒帝子湯長八尺一寸或曰七尺連珠庭臂二肘春秋元命包曰湯臂二肘是謂神剛又曰湯之時其民大樂其救之於患害故樂名大護護者救也尚書琁璣鈐曰湯受金符金符禹録白狼銜鈎入殷朝鈎縛束之要明湯得天下之要也尚書中候曰天乙在亳諸隣圖襁負歸德東觀乎洛降三分沉璧降下也以厚三分之璧玉沉雒水退立榮光不起沉畢退而立侯神榮光不起黄魚雙躍出濟于壇魚者無足翼言桀孤時無黨可伐也黄者所以遏水今土歸湯則金助矣濟上也雖祭猶爲位告神故有壇黒鳥以雄隨魚亦止黑鳥黒帝叶光紀之使以用也化爲黒玉赤勒曰玄精天乙受神福伐桀克化变也勒劾也玄水也三年天下悉合諸侯悉合歸之又曰玄鳥翔水遺卵于流娀簡拾吞生契封商玄鳥鷰也翔水徘徊於水上娀娀氏也簡二狄也契母名商國名詩云天命玄鳥降而生商是也書曰伊尹相湯伐桀升自陑遂與桀戰于鳴條之野又曰自契至于成湯八遷湯始居亳從先王居尚書大傳曰湯之君民聽寛而獄省又曰夏人飲醉者持不醉者不醉者相和而歌曰盍歸于亳盍歸于亳亳亦大矣故伊尹退而間居深聽樂聲思其故也是時伊尹仕桀更曰覺兮較兮吾大命格兮覺兮爲先知者較兮謂直道者也格至也去不善而就善何樂兮伊尹入告于桀曰大命之亡有日矣桀啞然笑曰天之有日猶吾之有民也日亡吾亦亡矣是以伊尹遂去夏適湯又曰湯放桀也居中野士民皆奔湯桀與其屬五百人南徙千里止於不齊不齊民徃奔湯桀與其屬五百人徙於魯魯士民復奔湯桀曰國君之有也吾聞海外有人與五百人俱去又曰湯放桀而歸於亳三千諸侯大㑹湯取天子之璽置之於天子之坐左復而再拜從諸侯之位湯曰此天子之位有道者可以處之矣夫天下非一家之有也唯有道者之有也唯有道者冝處之湯以此三讓三千諸侯莫敢即位然後湯即天子之位韓詩内傳曰湯爲天子十三年年百歲而崩葬於徴今扶風徴陌是也春秋演孔圖曰夏民不康天果命湯白虎戯朝白雲入房白虎白雲皆金精也逸書曰成湯自契至湯八遷湯始居亳紀年曰湯有七名而九征說苑曰湯欲伐桀伊尹請且乏貢職以觀夏動桀怒起九夷之師伊尹曰未可彼尚能起九夷之師是罪在我也湯乃謝服入貢職明年又乏貢職桀起九夷之師九夷之師不起伊尹曰可矣湯乃興師越絶書曰湯行仁義敬鬼神天下皆一心歸之孟子曰湯居亳與葛伯爲隣葛伯不祀湯使人問曰何爲不祀曰無以供犠牲湯遺之牛羊葛伯得而食之又不祀湯又問之曰無以供粢盛湯使亳民爲之耕老弱饋食葛伯率衆要其酒肉黍稻者遮而奪之不授則殺之有童子以黍肉餉殺而奪之書曰葛伯仇餉此之謂也爲其殺是童子湯乃興師伐葛四海之内皆曰非冨天下也爲疋夫疋婦復讎言湯不今見天下冨爲一夫報仇也又曰湯始征自葛始十一征而無敵於天下東征而西夷怨南征而北夷怨曰奚爲後我民望之若大旱之望雨也歸市者不止耕者不變誅其君吊其民如時雨降民大恱書曰徯我后后來其無罰尸子曰湯之救旱素車白馬布衣身嬰白茅以身爲牲當此時也絃歌鼔舞者禁之吕氏春秋曰湯見祝網者置四面其祝曰從天墜者從地出者從四方來者皆羅吾網湯曰嘻盡之矣非桀其孰能爲此湯収其三面置其一面更教之祝曰昔蛛蝥作網罟今之人學紓欲左者左欲右者右欲髙者髙欲下者下吾取其犯命者漢南之國聞之曰湯之德及禽獸矣於是四十國同時歸之夫人置四面未必得鳥湯去三面以網四十國非徒網鳥也又曰成湯之時有榖生於庭夜而生比旦而大拱史請卜其故湯曰吾聞祥者福之先也見祥而爲不善則福不至妖者禍之先也見妖而爲善則禍不至於是早朝晏退問疾吊䘮鎮撫百姓三日而榖亡又曰湯誅桀功名大成乃命伊尹作爲大護歌晨露脩九韶六列以見其善淮南子曰湯夙興夜寐以致聦明輕賦薄歛以寛民泯布德施惠以賑困窮吊死問疾以養孤霜百姓親附政令流行帝外丙史記曰帝外丙即位三年崩立外丙之弟是爲帝仲壬紀年曰外丙勝居亳帝仲壬史記曰帝仲壬即位四年崩伊尹乃立太丁之子太甲成湯嫡長孫也璅語曰仲壬崩伊尹放太甲乃自立四年帝太甲史記曰帝太甲立三年不明暴虐不遵湯法伊尹放之桐宫伊尹攝行政當國以朝諸侯太甲居桐宫三年悔過自責反善於是伊尹乃迎帝太甲而授之政帝太甲脩德諸侯咸歸殷百姓以寜伊尹嘉之乃作太甲三篇襃帝太甲稱太宗尚書曰太甲旣立不明伊尹放諸桐三年復歸于亳思庸念帝道也帝王丗紀曰太甲反位又不怨故更尊伊尹曰保衡即春秋傳所謂伊尹放太甲卒爲明王是也太田脩政殷道中興號曰太宗孔藂所謂憂思三年追悔前愆起而即政謂之明王者也一名祖甲享國三十三年帝王紀曰桐宫蓋殷之墓地有離宫可居在鄴西南杜預春秋後序曰紀年稱殷仲壬即位居亳其卿士伊尹仲壬崩伊尹放太甲于桐乃自立也伊尹即位於太甲十年太甲潜岀自桐殺伊尹帝沃丁史記曰帝沃丁之時伊尹卒旣葬伊尹於亳咎單遂訓伊尹事作沃丁紀年曰沃丁絢即位居亳帝王世紀曰伊尹卒大霧三日沃丁塟以天子禮資之三年以報大德帝太庚史記曰帝太庚在位二十五年崩子帝小甲立紀年曰小庚辯即位居亳即大庚也帝小甲史記曰帝小甲在位十七年崩弟雍己立紀年曰小甲髙即位居亳帝雍巳史記曰帝雍巳在位十二年崩弟太戊立紀年曰雍巳伷即位居亳帝太戊書叙傳曰伊陟相太戊伊陟伊尹子也亳有祥桑榖共生于朝祥妖恠也二木合生七曰供不恭之罰詩序曰烈祖祀中宗也祀中宗殷王太戊湯之玄孫也嗟嗟烈祖有秩斯祜秩常也嗟嗟歎美之深也史記曰帝太戊立亳有祥桑穀共生於朝一暮大拱帝太戊懼問伊陟伊陟曰臣聞妖不勝德帝之政其有闕歟帝其脩德太戊從之而祥桑枯死殷復興諸侯歸之故稱中宗中宗在位七十五年帝仲丁史記曰帝仲丁遷于敖河亶甲居相值祖乙遷于刑帝仲丁在位十一年紀年曰仲丁即位元年自亳遷于嚚帝王丗紀曰仲丁徙嚚或曰敖今河南之敖倉是也帝外壬史記曰帝外壬在位五年崩弟河亶甲立紀年曰外壬居嚚帝河亶甲書叙傳曰河亶甲居相孔安國曰相地在河北史記曰帝河亶甲時殷復衰河亶甲在位九年崩子帝乙立紀年曰河亶甲整即位自嚚遷于相征藍夷再征班方帝祖乙書叙傳曰祖乙圯于耿曰圯於祖遷于耿也河水所毁曰圯也帝王丗紀曰今河東皮氏有耿郷史記曰帝祖乙立殷復興巫賢任職祖乙在位十九年紀年曰祖乙勝即位是爲中宗帝王丗紀曰帝祖乙以乙日生故謂之帝乙孔子所謂五丗之外天之錫命䟽可同名者也是以祖乙不爲諱蓋殷禮也帝祖辛史記曰帝祖辛在位十六年崩弟沃甲立帝沃甲史記曰帝沃甲在位二十五年崩立祖辛之子祖丁紀年曰帝開甲踰即位居庇帝祖丁史記曰帝祖丁在位三十二年崩立沃甲之子是爲南庚紀年曰祖丁即位居庇帝南庚史記曰帝南庚在位二十九年崩立祖丁之子陽甲紀年曰南庚更自庇遷于奄帝陽甲史記曰帝陽甲之時殷衰自仲丁以來廢嫡而更立諸弟子弟子或爭相代立比九丗亂諸侯莫朝帝陽甲在位十七年紀年曰陽甲即位居奄帝盤庚書曰盤庚五遷將治亳殷自湯至盤庚凡五遷都治亳殷也民咨胥怨胥怨也民不欲徙乃咨嗟憂愁相與怨其上也史記曰帝盤庚之時殷巳都河北盤庚渡河南復居成湯之故國乃五遷無定處殷民咨胥眥怨不欲徙遂渉河南治亳行湯之政然後百姓由寜殷道復興諸侯來朝以其遵成湯之徳也在位十八年紀年曰盤庚旬自奄遷于北蒙曰殷帝王丗紀曰帝盤庚徙都殷始改商曰殷又曰亳殷今偃師是也然則殷有三亳二亳在梁國一亳在河南糓熟爲南亳即今都也蒙爲北亳即景亳湯所盟地偃師爲西亳即盤庚所徙者帝小辛史記曰帝小辛殷道復衰百姓思盤庚乃作盤庚三篇小辛在位二十一年紀年曰小辛頌位居殷帝小乙史記曰帝小乙在位二十年崩子武丁立紀年曰小乙歛居殷帝武丁書叙傳曰髙宗夢得說盤庚弟小乙子也名武丁夢得賢相其名說使百工營求諸野得諸傳巖書大傳曰桑糓俱生于朝一日而大拱兩手撿之曰拱武丁召其相而問焉其相曰吾雖知之吾不能言也問諸祖乙曰桑榖野草也此木也而云草未聞劉民以爲屬草妖野草生于朝亡乎武丁側身修行思昔先王之政興滅國繼絶世舉逸民明養老之禮諸侯重譯來朝者六國九州之外國武丁祭成湯有飛雉升鼎耳而雊武丁問祖乙祖乙曰野鳥不當升鼎欲爲用也則逺方將有來朝者乎三年編髮重譯來朝者六國孔子曰吾於髙宗肜日見德有報之疾肜日尚書篇名史記曰帝武丁即位思復興殷而未得其佐三年不言政事事决定於冡宰以觀國風武丁夜夢得聖人名曰說以夢所見視群臣百吏皆非也於是使百工營求之野得說於傅巖中是時說爲胥靡築於傅巖見於武丁武丁曰是也得而與之語果聖人舉以爲相殷國大治武丁祭成湯明日有飛雉登鼎耳而雊武丁懼祖巳曰王勿憂先修政事祖巳乃訓王武丁崩祖巳嘉其德立其廟爲髙宗帝王世紀曰武丁即位諒闇居凶廬百官揔巳聽於冡宰三年不言旣免䘮猶不言群臣諌武丁於是思建良輔夢天賜賢人姓傅名說乃使百工冩其像求諸天下見築者胥靡衣褐帶索執役于虞􅉑之間傅巖之野名說登以爲相享國五十有九年年百歳𥘉髙宗有賢子孝巳其母早死髙宗惑後妻之言放而死天下哀之帝祖庚史記曰帝祖庚在位七年崩弟祖甲立紀年曰祖庚躍居殷帝祖甲史記曰帝祖甲滛亂殷復衰在位十六年崩子廪辛紀年曰帝甲載居殷帝王世紀曰春秋外傳所謂玄王勤商十有四世帝甲亂之七世而隕是也帝廪辛史記曰帝廩辛在位六年崩弟庚丁立紀年曰馮辛先君殷帝庚丁史記曰帝庚丁在位三十一年崩子武乙立殷復去亳徙河北紀年曰庚丁居殷帝武乙史記曰帝武乙無道爲偶人謂之天神與之博令人爲行天神不勝乃戮辱之爲革囊盛血仰而射之命曰射天武乙獵於河渭之間暴雷震死子太丁立紀年曰武乙即位居殷三十四年周王季歴來朝武乙賜地三十里玉十㲄馬八疋帝王丗紀曰帝武乙復濟河北徙朝歌帝太丁史記曰帝太丁在位三年崩子帝乙立紀年曰太丁三年洹水一日三絶帝王丗紀曰帝文丁一日大丁帝乙史記曰帝乙立殷益衰帝乙長子曰微子啓母賤不得嗣少于辛辛母正后辛爲嗣帝乙崩子辛立天下謂之紂紀年曰帝乙處殷二年周人伐商帝王丗紀曰帝乙有二妃正妃生三子長曰微子啓中曰微仲行小曰受庶妃生箕子年次啓皆賢𥘉啓母之生啓及行也尚爲妾及立爲后乃生辛帝乙以啓賢且長欲以啓爲太子史據法爭之帝乙乃立辛爲太子帝乙即位三十七年帝紂書曰武王戎車三百兩虎賁三百人與受戰于牧野周書曰商王紂取天智王琰五班環身以自焚天智王之上羙者班環身以自原之春秋文耀鈎曰牧野之戰鬼哭牧地鬼先哭喻纣將死語曰子貢曰紂之不善不如是之甚也是以君子惡居下流天下之惡皆歸焉史記曰紂資辯捷疾聞見甚敏材力過人手格猛獸智足以拒諌言足以飾非矜人臣以能髙天下以聲以爲人皆出巳之下好酒淫樂嬖於婦人愛妲巳使師㳙作淫聲北里之舞靡靡之樂厚賦稅以實鹿臺之錢而盈鉅橋之粟鹿臺臺名鉅橋倉名以西伯昌鬼侯邢侯爲三公鬼侯有女入之紂鬼侯女不憘希記㤸淫紂殺之而醢鬼侯邢侯爭之并脯之西伯昌聞之竊歎崇侯虎知之以告紂紂囚西伯姜里及武王伐紂紂兵敗績入登鹿臺衣其寳玉衣赴火而死紀年曰帝辛受居殷帝王丗紀曰帝紂能倒曵九牛撫梁昜柱有蘇氏叛紂因伐蘇蘇人以羙女妲巳奉紂紂大恱赦蘇而納妲巳爲妃常與沉醉于酒所譽者貴所憎者誅淫縱愈甚始作象著箕子爲父師歎曰象著不必更於土匭必將犀玉之柸食能蹯豹胎必不衣短褐處茅屋之下必將衣文繡之衣遊於九層之臺居於廣室之中矣居五年紂果造傾宫作瓊室瑶臺飾以美玉七年乃成其大三里其髙千丈其大宫百其小宫七十三處宫中九市車行酒馬行炙以百二十日爲一夜六月發民獵於西山居朞年天下大風雨飄牛馬壊屋樹天火燒其宫兩日並或鬼哭或山鳴紂不懼愈慢神誅諌士爲長夜之飲七日七夜失忘曆數不知甲乙問於左右莫知使問箕子謂其私人曰爲天下主而一國皆失日天下危矣一國不知而我其危矣亦亂以醉熊蹯不熟紂怒殺宰人斮朝渉之脛而視其髓刳孕婦之腹而觀其胎又殺人以食虎諸侯或叛妲己以罰輕紂欲重刑乃先爲大熨斗以火爇之使人舉輒爛手不能勝紂怒乃更爲銅柱以膏塗之加于爇炭之上使有罪者縁焉足滑跌墮火中紂與姐巳笑爲樂名曰炮烙之刑武王乃率諸侯來伐紂紂有億兆夷人起師自容閭至浦水與同惡諸侯五十國凡十七萬人距周于商郊之牧野紂師皆倒戈而戰紂即位三十三年正月甲子敗績赴宮登鹿臺蒙寳衣玉席自投于火而死周武王封其子武庚爲殷後六韜曰武王伐殷得二大夫而問之曰殷國將亡亦有妖乎一人曰殷國常雨血雨灰雨石小者如雞子大者如箕嘗六月而雨雪深尺餘武王曰大哉妖也一人對曰非殷國之大妖也殷國大妖三十七章殷君喜射人喜以人食餒虎喜剖人心喜殺孕婦以信者爲不信以誣者爲眞以忠者爲不忠忠諌者死阿䛕者賞以君子爲下以小人爲上以佞辯爲相以女子爲政急令暴取萬民愁苦喜田弋走狗試馬出入不時不避大風甚雨不避寒暑喜修治池臺日夜無巳喜爲酒池糟丘飲者三千飲人爲輩坐起之以金皷無長㓜之序貴賤之禮聽䜛用譽無功者賞無德者冨所愛專制擅令無禮義無聖人無賢士無衡槪無升斛無尺寸無錙銖有罪放無罪誅此殷國之大妖者其餘不可勝數臣言不能盡墨子曰昔殷王紂貴爲天子冨有天下上訶天侮鬼神不殃傲天下萬民武王遂奔入王宫誓紂而岀擊之赤鐶載之白旗以爲天下諸侯僇又曰紂之時十日雨土干亳有鬼霄吟有男女爲孟子曰桀紂逆天暴萬物故天棄之故民去之湯武從天理萬物故天下欲之故民歸之紂昏昏以亡武王諤諤以昌淮南子曰紂之城左東海右流沙前交阯後幽都師起容閭至浦水億有餘萬武王左操黃鉞右執白旄而麾之則瓦解而走遂土崩而亡有南靣之名而無一人之譽此失天下也夏侯孝若新論曰紂亂大熟爛矣武王乃徃伐之太平御覽卷第八十三
