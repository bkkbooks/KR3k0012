front:
  text: 太平御覧卷第九百四十七蟲豸部四
  hash: sha256:62c3ea114d6a3fb8ac90955aee222084f9e8241dd6464ad258f9623311cebdca
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_947-1a}
body:
  text: 蚯蚓螔蝓蠍蟻蚯蚓河圖說徴曰黄帝起大蚓見大戴禮曰蚓無爪牙之利筯脉之強上食埃土下飲黃泉用心一也文子孫卿淮南子同禮記月令曰孟夏螻蟈鳴後五日蚯蚓出冬至之日蚯蚓結孝經援神契曰螾無食勞無勢故無心爾雅曰螼羌引切蚓蜸苦顯切蚕他典切即䖤蟺也江東呼寒蚓後漢書曰王元說隗囂曰神龍失勢還與蚯蚓同帝王丗紀曰黄帝時螾大如虹淮南子曰太隂在上蚯蚓結爲陽候抱朴子軍術曰蚯蚓見軍中尤多者軍罷又冝備反叛愼子曰騰蛇遊霧飛龍乗雲雲罷霧除與蚯蚓同失所乗故也吕氏春秋曰黄帝時而見大螾土氣勝故其色尚黄髙誘曰螾蚯蚓也淮南萬畢術曰苓皮螾脂魚鼈自聚注曰取苓皮之漬水斗半燒石如炭狀以淬螾脂中巳置苓皮水中七日巳置沼則魚鼈自聚矣楊泉物理論曰撿身止欲莫過於蚓此志士所不及也郭義恭廣志曰閩越江北山間蛮夷啖蚯蚓脯爲羞崔豹古今注曰蚯蚓一名䖤蟺一名曲蟺善長吟於地中江東謂爲歌女或謂鳴砌䖤蟺苑善二音述異記曰劉德願兄子太宰從事中郎道存景和元年五月忽有白蚓數十登其齋前砌上通身白色人所未甞見也蚓並張口吐舌大赤色其年八月與德願並誅劉敬叔異苑曰孟州王雙宋文帝元嘉𥘉忽不欲見明常取水沃地以菰蔣覆上眠息飲食悉入中云有女着青裙白領巾來就其寢母聽聞薦下歴歴有声發之見一青色白領蚯蚓長二尺許云此女常以一奩香見遺氣甚清芬奩乃螺殻香則菖蒲根于時咸謂雙暫同阜螽矣廣五行記曰陳後主時隋軍至江蚯蚓盡岀森然如植箭陳氏水郷蚯蚓土蟲象陳氏自稱土德盡出明傾其窟穴以曲歸直是歳隋平陳又曰隋煬帝大業中河南有婦人養姑不孝姑兩目暗婦切蚯蚓爲羹以食之姑恠其味竊藏一脔以示兒兒還見欲送婦詣縣未及而雷震其婦俄而從空落身如故而易頭爲白狗頭郭景純蚯蚓讃曰蚯蚓土精無心之蟲交不以分媱於阜螽觸而感物無乃常雄呉氏夲草經曰蚯蚓一名白頸螳螾一名附引葛洪療喉卒腫方曰用白頸蚯蚓十四枚擣以塗喉外立愈陶洪景集注夲草經曰白頸蚯蚓一名土龍生蜚谷平土白頸者是其老大耳螔蝓尚書大傳曰鉅定螺鄭玄曰鉅定澤也今屬樂安故有縣屬齊螺蝸牛也禮記内則曰蝸醢而苽食爾雅曰蚹蠃螔蝓郭璞曰音移臾即蝸牛也張揖廣雅曰蠡蠃蝸牛螔蝓也荘子曰有國於蝸之左角者曰觸氏有國於蝸之右角者曰蠻氏時相與爭地而戰伏尸數萬逐北旬有五日而後反許愼說文曰蝸一曰螔蝓山海經曰清要之山北望河曲是多倮纍郭璞曰倮纍蝸牛也陶洪景集注夲草經曰螔蝓味鹹寒無毒一名陵蠡一名土蝸一名附蝸生泰仙池澤生隂地沙石垣下螔蝓入三十六禽限又是四種角之例營室之精矣蠍毛詩魚藻彼都人士曰彼君子女卷髪如蠆毛詩義䟽曰蠆一名杜伯河内謂之蚊幽州謂之蠍左傳僖二臧文仲曰䗬蠆有毒而况國乎又昭二曰鄭人謗子産曰其父死於路巳爲蠆尾大戴禮曰神人國有蜂蠆不螫嬰兒張揖廣雅曰杜伯蠧蠆蠍也說文曰蠆毒蟲也魏志曰彭城夫人夜之厠蠆螫其手呻呼無頼華佗令温湯近熱漬手其中卒可得寢但旁人數爲昜湯令煖其日即愈北史曰齊後主詔鏁南陽王綽赴行在所至而宥之問在州何者最樂對曰多取蠍将咀漢看時極樂後主即夜索蠍一斗比暁得二三升置諸浴斛使人祼卧斛中號叫宛轉帝與綽臨觀喜噱不巳謂綽曰如此樂事何不早馳驛奏聞綽由是大爲後主寵唐史曰劒南夲無蠍甞有人任主簿将之至今呼爲主簿蟲荘子曰老聃曰三皇之知上悖日月之明下暌山川之精中隳四時之施其智􅉃音慘於蠆蠍之尾而猶自以爲聖人不可恥乎唐景龍文館記曰上巳日上幸於渭濵宴侍臣其日賜侍臣等栁棬各一云帶之免蠆毒辟温氣于寳搜神記曰安陽城南有亭宿者輙死有書生入亭宿明掘得蠍大如琵琶毒長數尺亭遂安静葛洪方曰蠍中國屋中多江東即無也稽含遇蠆賦序曰元康二年余中夜遇蠆客有戲余曰俗諺云過满百爲蠆所螫斯言信哉雖内省不疚而逢此害喟然而歎遂作賦蟻焦贛易林震之蹇曰蟻封户穴大雨将集又復之萃曰蜱蜉戴怨不能上山却推趹蹶損傷其顔韓詩外傳曰夫吞舟之魚大矣蕩而失水則爲蟻所制大戴禮曰十二月玄駒賁蟻也賁者走於地中也周官曰饋食之豆􅜹蚳醢􅜹蛤也蚳蟻子也禮記檀弓曰子張之喪公明儀爲志焉禇幕丹質蟻結于四隅鄭玄曰畫禇之四角其文如蟻行徃來相交錯也蟻蚍蜉也殷之蟻結似今虵文畫也又内則曰蚳醢蚳蚍蜉子也又學記曰蟻子時術之其此之謂乎蚳蚍蜉也蚍蜉之子微蟲耳時蜉之所爲其功乃復成大垤也爾雅曰蚍蜉大螘俗呼爲馬蚍蜉小者螘齊人呼蟻蟻蛘龔音龍朾直耕功螘赤駮蚍蜉螱音尉飛螘有翅其子蚳蚳蟻夘周禮曰蜃螘醬後漢書曰鉅鹿張角賊起皆着黄巾爲摽幟時人謂之黄巾亦名爲蛾賊蛾音魚綺切即蟻字論賊衆多故以爲名張勃吴録曰九眞移風縣有赤絮膠人視土知有蟻因墾發以木枝挿其中則蟻縁而生􅃮堅凝如螳蜋子螵蛸也折􅃮以染絮其色正赤所作赤絮則此膠也孟子曰羊肉不慕蟻蟻慕羊肉羊肉羶也莊子曰凾牛之鼎沸蟻不得置一足焉喻聖主之法明姧至不敢蹈之又曰東郭子問荘子曰道安在荘子曰道在螻蟻又曰吞舟之魚蕩而失水則螻蟻能苦之孫卿子曰不食者蟻不飲者蜉蝣韓子曰桓公伐孤竹行山中無水隰朋曰蟻冬居山之陽夏居山之隂蟻壤寸而有水乃掘遂得水又曰千丈之堤以螻蟻之穴而潰又曰以骨去蟻蟻愈多以肉驅蠅蠅愈至吕氏春秋曰吞舟之魚陸處不勝螻蟻淮南子曰千里之堤以螻蟻之穴漏而百尋之屋以突隙之熛焚突竈突也抱朴子曰雞有專栖之雄雉有擅澤之鷮音嬌蟻有兼弱之智蜂有攻寡之計人相役御亦猶是耳又曰周髀家云天圎如張蓋地方如棊局而旁轉如推磨左行日月右行隨而左轉如推於磨蟻行磨石之上磨左旋而蟻右去磨疾而蟻遲故不得不隨磨以左迴焉又曰百㝷之山焚於分寸之飈千丈之陂潰於一蟻之穴符子曰東海有鼇焉冠蓬萊而浮游於凔海騰躍而上則千雲之峯類邁於羣岳沉没而下則隠天之丘潜嶠於重川有蚳蟻聞而恱之與羣蟻相要乎海畔欲觀鼇焉月餘日鼇潜未岀羣蟻将反遇長風激浪崇濤萬仭海水沸地雷震羣蟻曰此将鼇之作也數日風止雷黙海中隠如岳羣蟻曰彼之冠山何異我之戴粒逍遥封壤之巔伏乎窟穴也山海經曰朱蟻其狀如蟻郭璞曰蟻蚍蜉在崐崘之墟京房易妖占曰蟻無故當道若門户城郭聚土水且傷人揚雄方言曰蚍蜉齊魯之間謂蚼蟓音䮀養西南梁益之間謂之玄駒燕謂之蛾咩楚郢以南蟻土謂之封王充論衡曰人坐樓臺之上察地之螻蟻尚不見其體安能聞其聲何則螻蟻之體細不若人形夫聲音孔氣不能逹也今天之崇髙非直樓臺人體比於天非若螻蟻於人也謂天聞人之言隨善惡爲吉凶誤矣揚子法言曰食如蟻衣如華不以泰乎劉義慶丗說曰殷仲堪父病虚悸聞牀下蟻動云是牛鬪孝武不知殷父問有一殷病如此不仲堪流涕而起曰臣進退惟谷郭義恭廣志曰有飛蟻有木蟻古曰玄駒者也又有黒黃大小數種之蟻劉欣期交州記曰大和中人有至武嶺穴中有大蚍蜉甚大西京記曰長安化度廢寺内有礓音畺石徑二尺餘孔穴通連若欄椅樓臺之狀號曰蟻宫常云於中見蟻金色其大若蜂動逾萬計乃掘及泉因得此石張茂先博物志曰蟻知将雨伏侯古仐注曰漢光武建武元年山陽有小蟲類人形甚衆明日皆懸樹枝而死乃大蟻也崔豹古今注曰牛亨問蟻曰玄駒何也荅曰河内人無何而見有人馬數千萬騎皆大如黍米旋動徃來從朝至暮家人以火燒殺之人皆是蚊蚋馬皆成大蟻故今人呼蚊蚋曰黍民蟻曰玄駒楊子法言曰吾見玄駒是也揚孚異物志曰鯪鯉吐舌蟻附之因吞之又開鱗甲使蟻入其中乃奮迅則䑛取之劉敬叔異苑曰桓謙字敬祖太元中忽有人皆長寸餘悉𬒳鎧持槊乗具裝馬塪中出縁机登竈㝷飲食之所或有切肉輙來叢聚力所能勝者以槊刺取徑入穴蔣山道士朱應子令以沸湯澆所入處寂不復出因掘之有斛許大蟻死在窟中謙後以門釁同滅古今五行記曰後魏顯宗天安元年六月兖州有黒蟻與赤蟻交鬪長六十歩廣四寸赤蟻斷頭而死黒主北赤主南時齊明帝殺少帝子業而自立大爲魏軍所破東魏孝静帝武定四年鄴下有黄蟻與黑蟻鬪黄東魏戎衣色黒西魏戎衣色是時黄蟻盡死時髙歡圍玉壁五旬不拔歡疾班師而薨嶺表録異曰嶺南蟻類極多有席袋貯蟻子窠䰞於市者蟻窠如薄絮囊皆連帶枝葉蟻在其中和窠而賣有黄色大於常蟻而脚長者云南中甘子樹無蟻者實多蛀故人競買之以養甘子又曰交廣溪澗間酋長得収蟻卵淘擇令浄鹵以為醬或云其味酷似肉醬非官客親友不可得也夢書曰蚍蜉爲小盗銜食行也夢見蚍蜉小盗衆也神光占曰行造酒家蟻聚中庭急去之應璩百一詩曰大魏承衰弊復欲密其羅蚍蜉猶見得何云鰌與鰕狴犴旣巳備欻復置黄沙楚辭招䰟曰南方赤蟻若象玄蟻若靈壷應璩與曹昭伯牋曰空城寥廓所聞者悲風所見者鳥雀昔陳司空爲邑宰所在幽閑獨坐愁思幸頼遊蟻以娛其意以今况之知不虚矣郭璞蚍蜉賦曰飾殷人之喪輿在四隅而交結濟齊桓之窮師由山東之髙垤感萌陽以潜歩知将雨而封穴伊斯蟲之愚昧乃先識而似哲又蚍蜉讃曰蚍蜉瑣劣蟲之不才感陽而出應雨講臺物之蕪壞自然知來太平御覽卷第九百四十七
