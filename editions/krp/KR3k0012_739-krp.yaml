body:
  text: 疾病部二惣叙疾病下狂陽狂人謂之狂癲癡癎惣叙疾病下吕氏春秋曰身盡府種筋骨沉滯血脉壅塞九窮寥寥曲失其冝髙誘曰府腹疾也種首疾也極三關之欲以病其身故九窮寥寥然虚曲失其適以害其生也雖有彭祖猶不能爲也太公金匱曰丁侯不朝武王乃畫丁侯三旬射之丁侯病大劇使人卜之祟在周恐懼乃遣使者請之於武王願舉國爲臣虜武王許之歸爲太師尚父謂使曰歸矣吾巳告諸神言丁侯前畔義今巳遣人來降勿復過也使者辭去歸至丁侯病稍愈四夷聞之皆懼各以其職來貢六韜曰欲伐大國行且有期王寢疾十日不行太公負之而起之曰行已有期君不發天子聞之國亡身死胡不勉之王允焉如無病者說苑曰邴吉有隂德於孝宣帝微時及即位衆莫知亦不言帝將封之㑹吉病甚將使人加封及其生也太子太傅夏侯勝曰此未死也臣聞有隂德必饗其樂以及子孫病果愈封爲博陽侯丗說曰衛玠緫角時嘗問樂廣夢樂云是想衛曰神形所不接而夢豈是想曰因也衛思因經日不得遂病樂聞故命駕爲剖折之衛病小小而差樂歎曰此兒胸中當必無膏肓病又曰衛玠從豫章下都人乆聞其姿容觀者如堵墻玠先有羸疾不堪勞遂發病死時人謂之㸔殺語林曰王仲祖病劉真長爲稱藥荀令則爲量水矣又曰孔君平病困庾司空爲㑹稽省之問訊甚至爲之流涕孔慨然曰丈夫將終不問安國寧家之術而反作兒女相問庾聞廻還謝之請其語言桓譚新語曰余少時見楊子雲之麗文髙論不自量年少新進而猥欲逮及嘗激一事而作小賦用精思大劇而立感病子雲亦言帝上甘泉詔使作賦爲文卒暴及倦卧夢其五藏岀在地以手收内及覺大少氣病一歲卒王符潜夫論曰夫理丗不得真賢譬由治疾不得真藥也治病當得真人參反得羅菔當得麦門冬反得蒸穬麥巳而不識真合而服之病以浸劇不自知爲人所欺也乃反謂方不誠而藥皆無益於療病因棄後藥弗敢復飲而更求巫覡者雖死可也論衡曰子夏䘮明曾子責以有罪按伯牛有疾仲尼以爲命也或是䘮子數哭因中風耳風俗通曰無恙俗說恙病也凢人相見及書問者曰無疾病邪案上古之時草居野宿恙噬䖝也善食人心凡相勞問曰無恙乎非爲病也白虎通曰天子疾稱不悆諸侯稱負子大夫稱負薪士稱犬馬不悆者不復預政也負子者諸侯子民今不復子民也負薪犬馬皆謙也楊泉物理論曰凢病可治也人不可治也體羸性弱不堪藥石或剛暴狷急喜怒不節或情慾放縱貪淫嗜食此皆良醫不能加功焉夫君子病也猶可爲也必使無病也不可爲矣蓋謂節其飲食量其多少也又曰穀氣勝元氣其人肥而不夀元氣勝榖氣其人瘦而夀飬性之術常使糓氣少則病不生矣葛洪神仙傳曰茅君治於茅山人有疾病徃請福常煑雞子十枚以内帳中湏臾茅君皆一二擲雞子還之歸破之皆無復黃者病人當愈若中有土者不愈以爲常候雞子如故無開處也漢武故事曰𥘉霍去病微時數自禱神君乃見其形自脩飾欲與去病交接去病不肯神君亦慙及去病疾篤上命爲禱神君神君曰霍將軍精氣少夀命不長吾嘗欲以太一精𥙷之可得延年霍將軍不曉此意遂見斷絶今疾必死非可救也去病竟薨西京雜記曰髙祖𥘉入咸陽宫周行庫有方鏡廣四尺髙五尺九寸表裏有明人疾病在内照揜心則知其病之所在皇甫謐髙士傳曰安丘望之病弟子公沙都來㸔之舉丘於庭樹下安丘曉然有痊開目見雙赤李着枯枝都仰手承李安丘食之所苦盡除皇甫謐自序曰士安每病母輙推燥居濕以複易單何顒别傳曰張仲景過山陽王仲宣謂曰君體有病後年三十當眉落仲宣時年十七以其言貰逺不治後至三十疾果眉落三輔决録曰趙𡵨𥘉名嘉年三十餘有重疾卧蓐七年自慮奄忽乃爲遺令勑兄子可立一貟石於吾墓前刻之曰漢有逸民姓趙名嘉有志無時命也奈何劉楨與曹植書曰明使君始垂憐哀意眷日崇譬之疾乃使炎農分藥𡵨伯下鍼疾雖未除就没無恨何者以其天醫至神而榮魄自盡也狂書曰狂恒雨若君行誑妄則常雨順之尚書多方曰周公曰惟聖罔念作狂唯狂克念作聖毛詩曰不見子都乃見狂且又東方未明曰折栁樊圃狂夫瞿瞿論語子路曰不得中行而與之必也狂狷乎狂者進取狷者有所不爲也中行行能得中者狂者進取於善道狷者守節無爲又子在陳曰歸歟歸歟吾黨之小子狂簡斐然成章不知所以裁之又楚狂接輿歌而過孔子曰鳯兮鳯兮何德之衰徃者不可諌來者猶可追已而已而今之從政者殆而國語晉語曰下邑之役董安于多下邑晉邑安于趙簡子家臣趙簡子賞之固辭賞之對曰今臣一旦爲狂疾而曰必賞汝言戰闘爲凶事猶人有狂易之疾是以狂疾賞也如亡趨而出乃釋之漢書曰昌邑王賀衣服言語跪起清狂不慧蘇林曰凢狂者隂陽脉盡濁不狂似狂也故言清狂或曰清狂如今白癡也又曰盖寛饒曰無多酌我我乃酒狂丞相魏侯笑曰次公醒而狂何必酒也次公寛饒字又曰王莽時長安狂女子碧呼道中曰髙皇帝大怒趣歸我國不者九月必殺汝莽收捕殺之東觀漢記曰郅惲字君章上書諌王莽令就臣位莽大怒即收繫惲難即害之使黃門脅導惲令爲狂疾惚恍不自知所言惲曰所言皆天文非狂人所造作呉志曰全琮爲督議欲分別諸將有所掩襲朱桓素髙氣恥見部伍遂託狂發詣建業治病王隱晉書曰吴彦給役陸抗抗欲拔之患衆不聽乃悉請當爲將者入坐以試勇怯有一狂人拔刀跳梁來向坐中餘者皆走唯彦獨坐舉抗禦之狂人乃退衆服其勇沈約宋書曰袁愍孫著妙德先生傳曰嘗謂周旋人曰昔有一國國中一水號曰狂泉國人飲此水無不狂也唯國君穿井汲獨得無恙國人旣狂謂主不狂爲狂於是聚謀共執國主療其狂疾火艾針藥莫不必具國主不任其苦於是到泉所酌水飲之飲畢便狂君臣大小其狂若一衆乃懽然我旣不狂難以獨立比亦欲試飲此水宋書曰顔延之文帝嘗問以諸子才能延之曰竣得臣義躍得臣筆測得臣文奐得臣酒何尚之嘲曰誰得卿狂荅曰其狂不可及鬻子曰昔魯周公曰吾聞之於政也知善不行者謂之狂知惡不改者謂之惑夫狂與惑者聖人之戒也老子曰馳騁田獵令人心發狂韓子曰心不能審得失之地則謂之狂又曰狂者東走逐者亦東走其走則同其所以東走之爲則異淮南子曰谷氣多痺立氣多狂又曰今夫狂者無憂聖人亦無憂不知禍福也又曰不知道者釋其所巳有而求其所未得故福至則喜禍至則怖不悔巳之所生乃反怨人不喜則憂謂之狂生又曰士有禍則詘有福則盈有過則悔有功則矜遂不知反此之謂狂傳子曰惡劉曄於魏明帝曄不盡忠善伺上意所趣而合之帝如言以驗之果得情從此踈焉曄遂發狂出爲大鴻臚以憂死諺曰巧詐不如拙誠信矣抱扑子曰食莨蕩令人狂荒不可謂人本有荒狂山海經曰觀水多鰩音遥魚其味酸食之巳狂越絶書曰慧種生聖癡種生狂桂實生桂桐實生桐禰衡别傳曰衡爲皷吏祼身辱曹操孔融復見操說衡狂疾令求得自謝裴揩別傳曰石崇嘗與裴揩孫綽酣宴而綽慢節過度崇責之揩曰季舒酒狂四海所知足下飲人狂藥責人正禮王韶之始興記曰觀亭峽下有神廟傍巖向江經道不恪者必狂走或變而爲虎丗說曰阮德如嘗與親友逍遥河側歎曰大丈夫不能使僕從䧟於河橋非丈夫也坐者或曰德如以髙素致名不應發此言必將病之候俄而性理果僻欲逸走家人嘗以一細繩撗繋之户前以維之每欲岀礙䋲輙反時人以爲名士狂黃帝八十一問曰狂顛之疾何以别荅曰狂之始發少卧少飢自賢自貴妄笑好樂神異經曰西方有人飲食𬒳髮東走其婦追之不止怒亦𬒳髮名曰狂一名顛一名狷一名風此人夫妻與天俱生狂走東西没晝夜魏武帝令曰昔吾同縣有丁㓜陽者其人衣冠良士又學問材噐吾愛之後以憂恚得狂病即差愈徃來故當共宿止吾常遣歸謂之曰昔狂病儻發作持兵刃我畏汝俱共大笑輙遣不與共宿陽狂周書曰太公曰知與衆同者非人師也大知似狂不癡不狂其名不彰不狂不癡不能成事史記曰箕子紂庶兄也諫紂不聽或曰可以去矣箕子曰爲人臣諫不聽而去是彰君惡而自恱民吾不忍爲乃𬒳髮陽狂而爲奴又曰蒯通說韓信信不從通乃陽狂爲巫東觀漢記曰丁鴻讓國於弟盛逃去鴻𥘉與九江人鮑駿同事桓榮甚相友善及鴻亡駿遇於東海陽狂不識駿駿乃止而讓之曰今子以兄弟私恩而絶父不滅之基可謂智乎鴻感愴垂涕歎息乃還就國謝承後漢書曰雷義字仲公舉茂才讓於友陳重刺史不聽義陽狂𬒳髮走不應命晉書曰王衍字夷甫神情明秀風姿詳雅陽駿欲以女妻焉而衍恥之遂陽狂自免又素輕趙王倫之爲人及倫篡衍陽狂斫婢以自免王隱晉書曰王長文字德叡廣漢郪人丗爲郡守少放蕩不羇撿益州五辟公府再辟皆不就陽狂不詣郡縣舉致改服逃岀舉州追求乃於成都賣熟布弟見長文蹲踞地嚙胡餅刺史知其不居禮送還家英雄記曰向栩字甫興性卓詭不倫恒讀老子狀如學道又似狂生好𬒳髮着幓頭常於竈北坐板牀上如是積乆板乃有膝踝足指之處楚國先賢傳曰石偉字公操南郡人仕吴拜光禄大夫吴建威將軍王戎親詣偉太康二年詔以偉僞議郎加二千石秩以終厥身偉遂陽狂及盲不受晉華陽國志曰犍爲費昭不肯仕公孫述乃􅃮身爲厲陽狂以避之人謂之狂史記曰東方朔人主左右諸郎半呼之狂人人主聞之曰今朔在事無爲是行者若等安能及之哉朔行殿中郎謂之曰人皆以先生爲狂朔曰若朔等所謂避丗於朝廷間者漢書曰酈食其陳留髙陽人也沛公畧地陳留沛公麾下騎士適食其里中子騎士歸食其謂曰吾聞沛公有大略吾所願從若見沛公謂曰臣里中有酈生人皆謂之狂生自謂我非狂騎士如所戒沛公召之後漢書曰延熹末黨事將作袁閎遂散髮絶丗欲投迹深林以母老不冝逺遁乃築土室四周於庭不爲户自牖納飲食而已旦於室中東向拜母母思閎時徃就視母去便自掩閉兄弟妻子莫得見也及母殁不爲制服設位時莫能名或以爲狂生范曄後漢書曰仲長統倜儻不務小節語嘿無常時人謂之狂生南史曰王僧逹所爲非法坐免官後孝武獨召見慠然了不陳遜唯張目而視及出帝歎曰王僧逹非狂如何乃戴靣向天子後魏任城王澄傳髙肇當朝猜忌賢戚澄爲肇間搆常恐不令乃終日昏飲以示荒敗所作詭越時謂爲狂唐書曰蘇丗長甞從髙祖幸涇陽校獵至髙陵合圍是日大獲陳禽獸於旌門髙祖入御營頋謂朝臣曰今畋樂乎丗長進曰陛下遊獵薄廢萬機不滿十旬未爲大樂髙祖色變旣而笑曰狂態發耶又對曰爲臣私計則狂爲陛下國計則忠墨子曰周公旦人謂之狂後丗稱其德尉繚子曰太公望行年七十屠牛朝歌賣食棘津遇七十餘主不聽人皆曰狂丈夫莊子曰宋桓侯行未岀城門其前驅呼避至於家家人止之以爲狂也呼避使人避道也家人謂狂止而不聽此乃言聞其所未聞則以爲狂也丗說曰諸葛厷在西朝少有清譽尤爲王夷甫所重時論亦以擬王氏後爲繼母族黨所䜛論之爲狂將逺徙友人王夷甫之儔詣檻與别厷問王曰朝廷何以徙我王曰言卿狂逆厷曰逆則冝殺狂則何所徙繆襲撰仲長統昌言表稱統曰統性俶儻敢言不拘小節毎州郡命召輙稱疾不就語黙無常時人或謂之狂癲說文曰癲病也莊子曰流脉並作則爲驚怖陽氣獨上則爲癲病風俗通曰俗說卧枕户砌鬼䧟其頭令人病癲癡左傳曰晉周子有兄不慧不能辨菽麥盖所謂白癡也後漢書曰光武見劉盆子曰宗室無蚩者蚩癡也魏志曰許楮以勇力常從太祖征伐軍中以楮力如虎而癡故謂之癡虎魏略曰寒貧者本姓石字徳林𥘉客三輔關中亂南入漢中後還長安遂癡愚不復識人食不求味冬夏常衣弊布連結衣人問其姓名口不肯言故號之曰寒貧也或徃存䘏之輙跪拜人復謂其不癡晉書王述字懷祖年三十尚未知名人或謂之癡司徒王導始辟爲中軍叅軍旣見無他言唯問以江東米價𫐠但張目不荅導曰王掾不癡人何言癡也南史曰沈昭略字茂隆性狂儁不事公卿使酒氣無所推下甞醉晚日負杖携家賔子弟至婁湖苑逢王景文子約張目視之曰汝是王約耶何乃肥而癡約曰汝沈昭略耶何乃瘦而狂昭略撫掌大笑曰瘦巳勝肥狂又勝癡奈何王約奈汝癡何魏志曰明悼毛皇后父嘉本典虞車工卒暴冨貴帝令朝臣㑹其家飲宴其容止舉動甚癡騃語輙自謂侯身時人以爲笑晉書曰頋愷之字長康晉陵無錫人尤善丹青甞以畫一厨糊題其前寄桓玄皆深所珍者玄乃發其厨後竊取畫而緘閉如舊以還之紿云未開愷之見封題如𥘉但失其畫真云妙畫通靈變化而去猶人之登仙了無怪色玄甞以一栁葉紿之曰此蟬所翳葉也取以自蔽人不見巳愷之喜引以自蔽玄就溺焉愷之甞在桓温府甞云愷之體中癡黠各半而論之正得其平耳故俗傳愷之有三絶才絶癡絶畫絶後魏書曰太祖謂尚書崔玄伯曰蠕蠕而蠢反之民昔來號爲頑囂每來抄掠駕牸牛奔遁驅犍牛隨之牸牛伏不能前異部人教其以犍牛易之者蠕蠕曰其母尚不能行而况其子終於不易遂爲敵所虜隋書曰楊玄感司徒素之子也體皃容偉羙鬚髯少時晚成人多謂之癡其父每謂所親曰此兒不癡也及長好讀書便騎射以父軍功位至柱國唐書曰竇威家丗勲貴諸昆弟並尚武藝而威躭玩文史介然自守諸兄哂之謂爲書癡又曰雜端御史最爲雄劇食坐之南設一横榻謂之南牀殿中監察不得坐其榻亦謂之癡牀言處其上者皆驕慠自得使人如癡故謂之癡床又曰李益與李賀齊名然少有癡病而多猜忌防閑妻妾過爲苛酷而有散灰扃户之譚時謂妬癡風俗通曰夜糴俗說市買者當清旦而行日中交易所有夕時便罷今乃夜糴明其癡騃不足郭子曰王長史求東陽王蒙字仲祖撫軍不肯用晉太宗簡文皇帝先爲撫軍大將軍王後疾篤臨終撫軍哀歎曰吾將負仲祖於此乃命用之長史曰人言㑹稽王癡真癡也㑹稽王簡文先封丗說曰任育字長年少時甚有令名自過江便失志下飲人問云此爲茶爲茗覺有怪色乃自中名云向問飲爲熱爲冷甞行從棺底下流度涕而悲王丞相聞之曰此是有情癡應璩新論曰漢末桓帝時郎有馬子侯自謂識音律請客鳴笙竽爲作陌上桑反言鳯將鶵左右僞稱善亦復自揺頭馬子侯爲人頗癡自謂曉音律黃門樂人更往嗤誚子知不知名陌上桑反言鳯將鶵摇頭忻喜賜左右錢帛無復慙也虞翻書曰此中小兒年四歲矣似欲聦哲雖蝦不生鯉子此子似人欲爲求婦不知所向君爲訪之勿怪老癡譽此兒也癎說文曰癎病也續晉陽秋曰大司馬府軍人朱興妻周息男道扶年三歲先得癎病因其病發掘地生埋之爲道扶姑雙女所告正周弃市刑徐羡之議曰自然之愛虎狼猶仁周之凶忍冝加顯戮臣以爲法律之外故當弘通物之理愚謂可特原母命投之遐裔從之太平御覽卷第七百三十九
