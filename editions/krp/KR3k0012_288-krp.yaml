front:
  text: 太平御覽卷第二百八十八
  hash: sha256:19a74f32e954f3d11c154d14916324826e93815e3e01180e8dec55ac4a99716f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_288-1a}
body:
  text: 兵部十九機略七三國典略曰周賀若敦陳侯瑱相拒于湘州敦恐瑱知其粮少乃於營内聚土覆之以米召其側近村人揚有所訪令其遥見瑱聞以爲實乃據守要險以老敦師敦又増修壁壘示以持乆土人乗輕騎載米粟籠鷄鴨以向瑱軍敦患之乃僞爲土人裝舡内甲士其中瑱兵見舡至送米爭取敦甲士出而擒之後周書曰太祖以王羆爲大都督鎭華州魏孝武西遷拜驃騎大將軍加侍中開府嘗脩州城未畢梯在外齊神武遣韓軌司馬子如從河東宵濟襲羆羆不之覺比曉軌衆以乗梯入城羆尚卧未起聞閤外洶洶有聲便袒身露髻徒跣持一白挺大呼而出敵見之驚逐至東門左右稍集合戰破之軌衆遂投城遁走又曰陸騰陵州木籠獠恃險麤獷毎行抄刼詔騰討之獠旣因山爲城攻之未可拔騰遂於城下多設聲樂及諸雜技示無戰心諸賊果弃其兵仗或携妻子臨城觀樂騰知其無備密令衆軍俱上諸賊惶懼不知所爲遂縱兵討擊盡破之又曰楊忠梁雍州刺史岳陽王蕭察雖稱藩附而尚有二忠自穰城觀兵於漢濵易旗逓進實騎二千察登樓望之以爲三萬懼而服焉又曰韓襃爲汾州刺史界北接大原當千里徑先是髙齊㓂數入人廢耕桑前後刺史莫能防扞襃至適㑹宼來襃乃不下屬縣人旣不及設備以故多𬒳抄掠齊人喜相謂曰汾州不覺吾至先未集兵今者之還必莫能追躡我矣由是益懈不爲營壘襃已先勒精銳伏北山中分據險阻邀其歸路乗其衆怠縱伏擊之盡獲其衆又曰東魏宼龍門屯軍蒲坂造三道浮橋渡河又遣其將竇泰趣潼關髙敖曹圍洛州太祖出軍廣陽召諸將曰賊今椅吾三面又造橋於河示欲必渡是欲綴吾軍使竇泰得西入耳乆與相持其計得行非良䇿也且歡起兵以來泰每爲先驅其下多銳卒屢勝而驕今出其不意襲之必克克泰則歡不戰而自走矣諸將咸曰賊在近捨而逺襲事若差跌悔無及也太祖曰歡前襲關吾軍不過霸上今者大來兵未出郊賊顧謂吾但自守耳無逺鬪意又忸於得志有輕我之心乗此擊之何徃不克賊雖造橋未能徑度比五日中吾取竇泰必矣公等勿疑庚戍太祖率騎六千還長安聲言欲保隴右辛亥謁帝而潛出軍癸丑旦至小關竇泰卒聞軍至惶懼依山爲陣未及成列太祖縱兵擊破之盡俘其衆萬餘人斬泰傳首長安髙敖曹適䧟洛州執刺史泉企聞泰之殁焚輜重弃城走齊神武亦撤橋而退通典曰後周末隋文帝爲丞相益州揔管王謙舉兵拒命隋文遣將梁睿討之進至龍門謙將趙儼秦㑹擁衆十萬據嶮爲營周亘三十里睿令將士銜枚出間道四靣奮擊破之王謙又令髙阿郍壞逹奚惎惎渠記切等以盛兵攻利州聞梁睿將至惎分兵據開逺睿顧謂將士曰此虜要欲遏吾兵勢吾當出其不意破之必矣遣一將趨劒閣一將指巴西一將水軍入嘉陵睿遣將分道攻惎自午及申破之惎奔歸于謙睿進逼成都謙令逹奚惎城守親率精兵五萬背城結陣睿擊之謙不利將入城惎以城降謙將麾下三十騎遁走斬之又曰後周將法尚𥘉自陳來歸陳將樊猛濟江討之法尚遣部曲督韓朗詐爲背已奔于陳僞告猛曰法尚部兵不願降北人皆竊議盡欲叛還若得軍來必無鬪者自當於陣倒戈耳猛以爲然引師急進法尚乃佯爲畏懼自保於江曲猛陣兵挑戰法尚先伏輕舡於浦中又伏精銑於古村之北自張旗幟逆流拒之戰數合僞退登岸投古村猛捨舟逐之法尚又疾走行數里與村北軍合復前擊猛猛走退赴舡旣而浦中伏舡取其舟檝建周旗幟猛於是大敗僅以身免又曰後周末隋文帝輔政周大將尉遲逈在河北拒命河南州縣多從逈遣將檀讓屯成武别將髙士儒屯永昌隋將于仲文詐移書州縣曰大軍將至可移積粟讓謂仲文未能卒至方搥牛享士仲文知其怠選精騎襲之一日便至遂拔成武逈將席毗羅衆十萬屯於沛縣將攻徐州其妻子住金郷仲文遣人詐爲毗羅使者謂金郷城主徐善淨曰檀讓明日午到金郷將宣蜀公令即尉遲逈賞賜將士金郷人謂爲信然皆喜仲文簡精兵僞建逈旗幟倍道而進善淨遥見仲文軍且至以爲檀讓乃出迎謁仲文執之遂取金郷諸將多勸屠之仲文曰此城是毗羅起兵之所當寛其妻子其兵可自歸如即屠之彼意絶矣衆皆稱善於是毗羅恃衆來薄官軍仲文背城結陣岀軍數里設伏於麻田中兩陣纔合伏兵發俱曳柴鼔噪塵埃蔽夭毗羅軍大潰仲文乗之賊皆投漆水而死水爲之不流獲檀檻送京師河南悉平又曰後周末隋文作相遣將于仲文先以兵定關東破尉遲逈將檀讓𥘉仲文在蓼隄諸將皆曰軍自逺來士馬疲弊不可決勝仲文令三軍趣食列陣大戰旣而破賊諸將皆請曰前兵疲不可交戰竟而尅勝其計安在仲文笑曰吾所部皆山東人果於進不冝持乆乗勢擊之所以制勝諸將皆以爲非所及又曰後周將逹奚長儒圍陳將吴明徹於吕梁陳遣驍將劉景率勁勇七千來爲聲援長儒於是取車輪數百繫以大石沉之清水連轂相次以待景軍景至舡盤礙輪不得進長儒乃縱竒兵水陸俱發大破因檎明徹又曰後周遣將率突厥之衆逼齊晉陽齊將叚韶禦之時大雪之後周人以歩卒爲前鋒從西山而下去城二里諸將咸欲逆擊之韶曰歩人氣力勢自有限今積雪旣厚逆戰非便不如陣以待之彼勞我逸破之必矣旣而交戰大破之敵前鋒盡殪無復孑遺自餘通霄奔遁又曰後周遣將計髙圍洛齊將叚韶禦之韶登邙坂聊欲觀周軍形勢至太和谷便值周軍即遣馳告諸營與諸將結陣以待之周軍以歩人在前上逆戰韶以彼徒我騎且却且引待其力弊乃遣下馬擊之短兵始交周人大潰洛城之圍並即奔遁又曰西魏末岷州羗據州城反魏將獨孤信討之勒兵向萬年頓三交谷口賊併力拒守信因詭道趨綢松嶺綢直由切賊不虞信兵之至觀風奔潰乗勝逐北徑至城下賊岀降又曰西魏末涼州刺史宇文仲和據州不受代魏將獨孤信率兵討之仲和嬰城固守信夜令諸將以衝梯攻其東北信親帥壯士襲其西南遲明克之遟直吏切未明也天未明之時湏已襲之事畢然後天明明遅於事耳又曰西魏末蠕蠕侵魏魏大將元纂禦之蠕蠕遂逃岀塞纂令將于謹率二千騎追之至郁郅原前後十七戰盡降其衆率輕騎出塞覘賊屬鐡勒數千騎奄至謹以衆寡不敵退必不免乃散其衆騎使匿叢薄間又遣人升山指麾若分部軍衆者賊遥見雖疑有伏兵旣恃其衆不以爲慮乃進軍逼謹謹常乗駿馬一紫一騧賊先所識乃使二人各乗一馬突陣而出賊以爲謹也皆爭逐之謹乃率餘軍擊其追騎賊遂奔走因得入寨又曰西魏末遣將史寕與突厥木汗可汗同伐吐谷渾俱㑹於青海寜謂木汗曰樹敦賀眞二城是吐谷渾巢穴今若抜其夲根餘種自然離散此上䇿也木汗從之即分爲兩軍木汗從北道向賀眞寜趣樹敦吐谷渾婆周王率衆逆寜寜擊斬之踰山履險遂至樹敦即吐谷渾之舊都多諸珎藏而其主先巳奔賀眞留其征南王及數千人固守寜進兵攻之僞退果開門逐之因廻兵奮擊門未及闔寜兵遂得入生獲其征南王俘虜男女財寳盡歸諸突厥又曰東魏西荆州爲梁將曹義宗所圍東魏召人赴救慕容儼應募赴之時東魏北淯太守宋帶劒謀叛淯音育儼乃輕騎出其不意直至城語云大軍巳到太守何不出迎帶劒造次惶恐不知所爲便岀迎儼即執之一郡遂定又曰東魏𥘉齊神武破尓朱兆兆奔保秀容分兵守險岀入鈔掠神武每揚聲云欲討之師岀復止如此者數四神武揣兆歳首必應㑹飲使將竇泰率精騎先一日一夜行三百里兆軍人因宴休墯忽見泰軍莫不奪氣因而尅之又曰東魏將齊神武率兵伐西魏大軍濟河集諸將議進趣之計斛律羌舉曰宇文黒獺雖聚凶黨強弱可知若固守無粮援可恃今揣其情以同困獸若不然其戰而逕趣長安空虚可不戰而尅拔其根夲彼無所歸則黒獺之首懸於軍門矣諸將議有同遂戰於渭曲大敗而歸齊神武違之故敗也又曰東魏末齊神武薨子澄立侯景叛歸梁而圍彭城澄遣慕容紹宗討之將戰紹宗以梁人剽悍恐其衆之撓也一一引將卒而誑之曰我當佯退誘梁人使前汝可擊之皆申明誡之景又命梁人逐北勿過二里㑹戰紹宗實敗走梁人不用景言乗敗深入魏人以紹宗言爲信爭共掩擊遂大破之又曰東魏遣將斛律金㓂西魏洛陽師至于河北周文帝患其度河乃於上流縱火舩而下以燒河橋金先備小艇半盛以水鐵鎻連之亘絶中流火舡至而不前湏臾火滅而橋獲存遂進軍洛陽又曰東魏將齊神武伐西魏軍至許原西周文帝至渭南徴諸州兵皆來㑹乃召諸將謂之曰髙歡越山度河逺來至此天亡之時也今及其新至便可擊之即造浮橋於渭令軍人齎三日粮輕騎度渭南夾渭而軍至沙苑距齊神武軍六十餘里齊神武聞周文至引軍來㑹覩周文軍少竟馳而進不行列揔萃於左軍兵將交周文鳴鼔士皆奮起其將于謹等六軍與之合戰李弼等率鐡騎横擊之絶其軍爲二遂大破之斬六千餘級臨陣降者二萬餘人齊神武夜遁追至河上復大尅獲前後虜其卒七萬留其甲士二萬餘悉縱歸又曰齊神武大舉伐西魏將渡蒲津其將薛琡曰琡吕六切西賊連年飢饉但宜置兵諸道勿與野戰比及來年麥秋人衆盡應餓死西賊自然歸降願無渡河也侯景亦曰今者之舉兵衆極大萬一不捷卒難収歛不如分爲二軍相繼而進前軍若勝後軍全力前軍若敗後軍承之神武皆弗納遂有沙苑之敗又曰齊神武與魏孝武帝搆隙自太原舉兵逼洛陽帝遣將元斌之斛斯椿鎮武牢椿丑倫切遣使吿周文帝文帝謂左右曰髙歡數日行八九百里曉兵者所忌正須乗便擊之而主上以萬乗之重不能度河決戰方縁津據守且長河萬里扞禦爲難若一處得度大事去矣果知其言帝西奔長安孝武違而敗也太平御覽卷第二百八十八
