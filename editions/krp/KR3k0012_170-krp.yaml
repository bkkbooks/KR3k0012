front:
  text: 太平御覽卷第一百七十州郡部十六
  hash: sha256:3bc985d2b94a304fc6f5d511c1b508aed1e2971ceea6b553c2bc290e8a65c7ed
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_170-1a}
body:
  text: 江南道上昇宣池潤常蘇湖杭睦鄂饒信江洪撫吉袁䖍建福泉漳汀南昇州圖經曰昇州古楊州之地也春秋時爲吴地戰國時越滅吴爲越地後楚滅越其地又屬楚𥘉置金陵邑秦併天下改金陵爲秣陵屬鄣郡漢元封二年改鄣郡爲丹陽郡漢志曰故鄣屬丹陽郡王莽曰侯望金陵圗云昔楚威王見此有王氣因埋金以鎮之故曰金陵秦併天下望氣者言江東有天子氣鑿地断連岡因改金陵爲秣陵吴志曰孫權欲興都未定長史張紘勸都之後劉備宿於秣陵亦勸權都之遂定議都秣陵建康圖曰西晉亂元帝自廣陵渡江此城荒落以府第居縣北幕府之名自此而立㝷以江寕爲琅耶國蓋襲帝始封之名也歷宋齊梁陳六代皆都之輿地志曰金陵有東府城晉安帝時築其城西本簡文爲㑹稽弟其東則丞相㑹稽王道子府謝安石薨以道子代領楊州州在弟故時人號爲東府西州圖經曰金陵有古冶城本吴鑄冶之地也晉書曰元帝太興初以王導疾乆方士戴洋曰君本命在甲申地有冶金火相爍遂移冶於石城宣州十道志曰宣州宣城郡禹貢楊州之域春秋時屬吴後屬越越爲楚所併戰國時又屬楚秦爲鄣郡地漢爲丹陽郡地理志曰武帝元狩元年改鄣郡爲丹陽郡屬楊州理宛城即今郡是也吴書曰孫皓以牛渚爲督以何植爲使而禦晉軍當塗有牛渚山桓玄傳曰玄居南州大築齋第以郡在國南故曰南州齊州郡志曰梁承聖元年置南豫州十道志曰隋開皇中改南豫州爲宣州漢志曰涇縣屬丹陽郡韋昭曰涇水出蕪湖圖經曰南陵縣有赭圻屯在縣西北晉書曰哀帝以桓温入叅朝政自荆州還至赭坼詔止之遂城赭圻鎮十道志曰南陵有鵲洲春秋左氏傳曰昭五年楚以諸侯伐吴吴敗之於鵲岸吴地也廬江舒縣有鵲尾渚是漢志曰漂陽縣屬丹陽郡漂水所出也又曰當塗侯國屬九江郡莽曰山聚應劭曰禹娶塗山有禹墟焉春秋左氏傳曰禹㑹諸侯於塗山晉書州郡志曰西晉愍懷之亂琅耶王出鎮楊州因渡江南卜金陵建大業衣冠禮樂州郡邑名並隨渡江從北地當塗來江南自東晉始也金陵記曰姑熟之南淮曲之陽置南豫州六代英雄迭居於此以斯地爲上游焉池州圖經曰池州池陽郡禹貢楊州之域春秋及秦漢爲鄣郡之地吴爲石城縣隋爲秋浦縣唐武德中置池州三國志曰吴黄武二年封韓當爲石城侯輿地志曰梁昭明太子以其水出魚美故名其水爲貴池又曰梁大同二年置石埭因貴池源有兩小石埭堰溪水遂以爲名潤州十道志曰潤州丹陽郡禹貢楊州之域春秋時吴國地謂之朱方吴爲越所併地屬越戰國時越爲楚所滅復屬楚秦併天下爲㑹稽鄣二郡之地漢𥘉爲荆國故荆王劉賈所都之地吴王濞誅以其地併入江都國武帝又分屬丹陽㑹稽二郡之地左氏傳曰襄王二十八年齊慶封奔吴吴句餘予之朱方後漢書曰建安中吴大帝自吴徙都於京十六年遷都秣陵復於京口置京督以鎮焉吴志曰京督所統蕃衛尤要是以吴爲重鎮圖經曰其城因山爲壘縁江爲境尓雅曰丘絶髙曰京因謂之京口吴録地理曰秦時望氣者云其地有天子氣始皇使赭衣徒三千人鑿坑敗其勢改云丹徒圖經曰丹陽本漢曲阿縣也漢志曰曲阿故雲陽莽曰風美屬㑹稽郡史記曰秦始皇改雲陽爲曲阿輿地志曰曲阿縣屬朱方南徐之境秦有史官奏東南有王氣在雲陽故鑿北岡截直道使曲以猒其氣故曰曲阿又曰丹徒界内土堅緊如蠟諺云生東吴死丹徒言吴多産出可以攝生自奉養丹徒地可以葬吴志曰岑昏鑿丹徒至雲陽而杜野小辛間皆斬絶陵襲功力艱辛杜野屬丹徒小辛屬曲阿圖經曰唐垂拱四年立金山縣後改名金壇取邑界句曲之山金壇之陵以爲號眞誥曰地胏似洛中北邙山土水似長安丹鳯門外井泉之味河圖曰乃有地胏土良水清句曲之山金壇之陵常州十道志曰常州毗陵郡禹貢楊州之域春秋時屬吴後屬越戰國屬楚秦漢爲毗陵縣屬㑹稽郡輿地志曰晉陵縣春秋時吴之延陵邑也季札譲位耕於此因以封之漢改爲毗陵漢志曰毗陵縣屬㑹稽郡季札所居舊爲延陵漢改之也莽曰毗壇輿地志曰東海王越丗子名毗中宗爲越所表遣渡江故改此爲晉陵又曰吴越之間謂荆爲楚秦以子楚改爲陽羡其地本名小震居在荆溪之北故云陽羡周處風土記曰陽羡本無荆溪吴郡郡境震澤之㑹也其地理則三江之雄潤五湖之腴表吴越春秋曰周改爲陽羡漢志曰無錫屬㑹稽郡莽曰有錫周處風土記曰周武王追封周章於吴又封章小子斌於無錫也圖經曰昔有䜟述其地云無錫寕天下平有錫兵天下爭故名之蘇州十道志曰蘇州吴郡禹貢楊州之域周爲秦吴國至闔閭強盛始都於此後爲越所滅秦併天下爲㑹稽郡釋名曰吴虞也太伯封於此以虞志也郡國志曰俗好用劔輕死蓋湛盧钃鏤干將要離之遺風焉東北有海鹽縣復有章山之銅擅三江五湖之利亦江東一都會也越絶書曰闔閭起姑蘇臺三年聚材五年乃成髙見三百里漢志曰吴屬㑹稽郡周太伯所邑也具區澤在其西王莽曰秦位十道志曰嘉興縣本秦由拳縣也漢志曰由拳屬㑹稽郡應劭曰古之檇里檇子遂反吴録地里志曰吴王時此地本名長水秦改曰由拳續漢志曰屬呉郡呉黄龍五年嘉禾生於由拳改縣曰禾興後以太子名和改曰嘉興圖經曰華亭縣本嘉興縣地天寳十年置因華亭谷爲名晉書曰陸機𬒳誅臨刑歎曰華亭唳鶴不可得聞輿地志曰吴大帝以陸遜爲華亭侯以其所居爲封也華亭谷出佳魚蓴菜故陸機云千里蓴羹未下鹽䜴湖州十道志曰湖州吴興郡禹貢楊州之域防風氏之國也春秋時爲吴地後屬越越爲楚所滅後屬楚秦漢屬㑹稽郡國語魯語曰吴伐越隳㑹稽獲骨節專車骨節長專檀一車也吴子使來好聘且問於仲尼曰骨何爲大仲尼曰禹戮防風氏其骨節專車客曰防風何守也仲尼曰汪芸氏之君也守封禺之山汪芒長翟國名封嵎山在吴郡永安縣郡國志曰五湖之表州以爲名也漢志曰烏程屬㑹稽郡有歐陽亭郡國志曰古有烏氏程氏居此能醖酒故以名縣地理志曰武康縣本烏程之餘下郷地漢末童謡曰天子當興東南三餘之間吴乃改㑹稽之餘曁爲永興分餘不爲永安以恊謡言吴興記曰長城縣吴王闔閭使弟夫槩居此築城狹而長晉武帝置縣因長城以名縣杭州十道志曰杭州餘杭郡禹貢楊州之域春秋時吴越地秦漢屬㑹稽郡史記曰楚威王伐越殺王無疆尽取故吴地至浙江又曰始皇三十七年東遊丹陽至錢塘漢志曰錢塘屬㑹稽郡西部都尉治王莽曰泉亭劉道眞錢塘記曰昔縣境逼近江流縣在靈山下至今基趾猶存郡議曹華信乃立塘以防海水募有能致土石者即與錢及成縣境蒙利乃遷此地於是爲錢塘縣漢志曰於朁屬丹陽郡朁音潜吴録地里志云縣西朁山蓋因山以立名舊朁字無水至隋加水漢志曰餘杭屬㑹稽郡莽曰進睦吴興記曰秦始皇三十七年將上㑹稽塗出此因立爲縣郡國志曰夏禹東去捨杭登陸於此仍以爲名十道志曰鹽官本漢海由拳二縣境漢志曰海鹽屬㑹稽郡故武原郷有鹽官睦州十道志曰睦州新定郡禹貢楊州之域春秋時越國秦屬丹陽郡漢爲歙縣地吴志曰大帝以後漢建安十三年使威武中郎將賀齊討丹陽􅉳歙山賊平定之分歙始新新定黎陽休陽四縣并􅉳歙六縣圖經曰隋置睦州取俗阜人和内外輯睦爲義十道志曰桐廬縣吴黄武四年分冨春置以桐溪側有大椅樹垂條偃蓋傍䕃數畝逺望似廬因謂之桐廬縣漢志曰冨春屬㑹稽郡莽曰誅歲鄂州十道志曰鄂州武昌郡禹貢荆州之域春秋時楚地秦屬南郡漢分置江夏郡晉安帝義熈元年冠軍劉毅表以爲夏口二州之中地居形要控接湖川邊帶溪沔請荆州刺史劉道䂓鎮夏口隋爲江夏郡唐武德四年爲鄂州尚書禹貢曰江漢朝宗于海十道志曰江漢二水㑹於州乏西界左傳曰吴伐楚沈尹射奔命于夏汭丗紀曰楚子熊渠封中子紅於鄂今武昌縣地江夏記曰一名夏口亦名魯口沙陽夏汭鄂渚新興釣渚皆其地名武昌記曰大帝築城於江夏以程普爲太守遂欲都鄂州改爲武昌郡其民謡曰寕飲建業水不食武昌魚寕歸建業死不向武昌居繇是徙都建業齊書曰劉懷珎言於髙帝夏口兵衝要地冝得其人遂令栁丗隆鎮焉十道志曰江夏縣本漢沙羡縣饒州十道志曰饒州鄱陽郡禹貢楊州之域春秋時爲楚東境秦爲畨縣地屬九江郡漢爲畨陽屬豫章郡隋開皇九年爲饒州地理志曰城即吴芮爲鄱君時所築漢書貨殖傳曰譬猶戎狄之與干越不相入明矣韋昭注曰干越今餘干縣越之別名又曰淮南王安陳伐閩越之利上書云越人欲爲變必先守餘干中可積食而有材可治舡慮越人有伐材積食之患徐湛鄱陽記曰北有尭山常以堯爲號又以地饒衍遂加食爲饒圖經曰以山川藴物珎竒故名饒信州圖經曰唐上元元年正月江淮轉運使元載以此邑川原夐逺關防襟帶冝置州制可賜名信州以信美所稱爲郡之名鄱陽記曰界内之山出銅及鈆鐵者有玉山江州十道志曰江州㝷陽郡禹貢楊荆二州之境尚書禹貢彭蠡旣瀦又曰九江孔殷周景式廬山記曰柴桑彭澤之郊古三苗國舊廬江地㝷陽記曰春秋時吴之西境後吴爲楚滅更爲楚地秦屬廬江郡漢屬淮南國晉武太康十年因江水之名而置江州成帝咸和元年移理湓城即今郡是晉地道記曰㝷陽陸通五嶺北導長江逺行岷漢亦一都㑹也洪州十道志曰洪州豫章郡禹貢楊州之域春秋時吴地秦爲九江郡漢爲豫章郡豫章記曰太康中望氣者云豫章廣陵有天子氣故封愍懷大子爲廣陵王領鎮軍以鎮豫章後永興中懷帝遂以豫章王登天王位隨平陳罷郡爲洪州撫州十道志曰撫州臨川郡禹貢楊州之域春秋時吴地秦屬九江郡漢立南昌縣今州即南昌縣地後漢分南昌立臨汝縣吴太平二年分豫章之臨汝南城縣立臨川郡即今州也隋平陳置撫州晉書曰王羲之嘗爲臨川内史置宅於郡城東偏旁臨廽溪時據層阜荀伯子臨川記曰王右軍故宅其地爽塏山川若畫每至重陽日二千石巳下多遊萃於斯舊井及墨池並在漢地理志曰髙帝六年命大將軍灌嬰立洪州其年分洪州南境立南城縣以其在郡城之南故曰南城吉州十道志曰吉州廬陵郡春秋時爲吴地戰國屬楚秦併天下屬九江南部都尉理漢爲廬陵縣屬豫章郡雷次宗豫章記曰靈帝末楊州刺史劉遵上書請置廬陵鄱陽二郡獻帝𥘉平二年始立郡圖徑曰隋平陳改廬陵郡置吉州以吉陽山爲郡名袁州十道志曰袁州冝春郡禹貢楊州之域春秋時吴地秦屬九江郡漢爲豫章郡之冝春縣晉武改冝春爲冝陽隨平陳分洪州之冝陽立袁州漢書曰武帝封長沙定王子爲冝春侯吴録曰冝春縣出羙酒毎歳上貢封酒親付計吏䖍州十道志曰䖍州南康郡春秋時吴地秦屬九江郡漢爲贑縣地屬豫章郡後漢興平二年分豫章立廬陵郡而贑縣屬焉晉太康三年立爲南康郡隋平陳立䖍州以䖍化水而得名也圖經曰贑縣章貢二水雙流至縣合爲贑水其間置邑因以名縣十道志曰南康縣本漢南野地吴録曰南野縣有大庾山九嶺嶠以通廣州建州十道志曰建州建安郡古閩越之地秦閩中郡漢屬㑹稽吴分置建安郡陳屬閩州隋平陳屬泉州唐武德四年置建州因建溪爲名方輿志曰浦城縣本漢東候官之北郷也吴永安三年改爲吴興縣圖經曰晉尚書陸邁梁尚書郎江淹皆爲吴興令按淹自序云吴興地在東南嶠外閩越之舊境是也福州福州圖經曰勾踐六代孫爲楚所併其後有無諸以其境南泉山之地因而都之稱閩越王至孫繇又以東海隅之地稱越王俱是㑹稽之域遂有三越之稱圖經曰梁承聖二年封蕭基爲長樂侯於此十道志日福州長樂郡亦閩越地秦爲閩中郡漢髙帝立無諸爲閩越王都於此晉置晉安郡陳置閩州唐開元十三年爲福州開元録曰閩州越地即古東甌今建州亦其地皆蛇種有五姓謂林黄等是其裔郡國志曰漢武元鼎六年立都尉居候官以禦兩越所謂東北一尉西南一候也泉州十道志曰泉州清源郡秦漢土地與長樂同東晉南渡衣冠士族多萃其地以求安堵因立晉安郡宋齊以後因之唐景雲二年置泉州天寳𥘉爲清源郡乹元元年又爲州漳州十道志曰漳州漳浦郡歷代土地與長樂郡同唐分其土地置漳州郡國志曰梁山有漳浦水一云漳溪水汀州十道志曰汀州臨汀郡歷代土地舊與長樂郡同唐開元二十六年分置汀州𥘉置在雜羅縣以其地瘴居者多死大曆中移理長汀白石村南州十道志曰南州南川郡禹貢梁州之域周省梁入雍戰國時巴國之地秦漢爲巴郡之境太平御覽卷第一百七十
