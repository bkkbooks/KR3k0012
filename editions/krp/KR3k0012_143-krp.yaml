front:
  text: 太平御覽卷第一百四十三
  hash: sha256:cbfab52e9ebaae51f151cc38dbcc5a960e8847f009f1652f931cd3d2db55a58b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_143-1a}
body:
  text: 皇親部九齊蕭道成母陳后蕭道成劉后蕭昭業母王后蕭昭業何妃梁蕭衍母張后蕭衍郗后丁貴嬪阮脩容蕭䌉王后蕭繹徐妃陳陳霸先章后陳蒨沈后陳頊栁后陳叔寳沈后張貴妃北齊髙歡婁后爾朱太后髙澄元后髙洋李后髙演元后髙湛胡后髙緯斛律后齊蕭道成母陳后蕭子顯齊書曰宣孝陳皇后諱道正臨淮東陽人后生太祖太祖年二歳乳人乏乳后夢人以兩甌麻粥與之覺而乳大出異而說之宣帝從任在外后常留家治事教子孫有相者謂后曰夫人有貴子而不見之后歎曰我三兒誰當應之呼太祖小字曰正應是汝太祖雖從宦而家業夲貧爲建康令時髙宗等冬月猶無縑纊而奉膳甚厚后毎撤去兼肉曰我於此過足矣殂于縣舎年七十三建元元年重追尊孝皇后蕭道成劉后蕭子顯齊書曰髙昭劉皇后諱智容廣陵人也父壽之貟外郎后母桓氏夢呑玉勝生后時有紫光滿室后寢卧家人常見上如有雲氣焉年十餘適太祖嚴整有禮法家庭肅然宋泰豫元年殂葬宣帝墓側今泰安陵也門生王清與墓工始下鍤有白兎跳起㝷之不得及墳成兎還棲其上建元元年尊謚昭皇后蕭昭業母王后蕭子顯齊書曰文安王皇后諱寳明琅耶臨沂人建元元年爲南陽王妃四年爲皇子妃無寵太子爲宫人製新麗衣服及首飾而后牀帷陳故古舊釵鑷十餘枚永明十一年爲皇太孫太妃鬱林王即位尊爲皇太后稱宣德宫蕭昭業何妃蕭子顯齊書曰鬱林王何妃名婧英廬江灊人撫軍將軍戢之女后將拜鏡在牀無因墮地其冬與太后同日謁太廟后禀性媱亂爲妃時與外姦通左右栁珉之與同寢處如伉儷又與帝相愛䙝故帝恣之迎后親戚入宫賞賜人數十萬以丗祖耀靈殿處后家屬帝𬒳廢后貶爲王妃梁蕭衍母張后梁書曰太祖獻皇后張氏諱尚柔范陽方城人也祖次惠宋濮陽太守后母蕭氏即文帝從姑宋元嘉中嬪於太祖生長沙宣武王懿永陽昭王敷次生髙祖𥘉后嘗於室内忽見庭前菖蒲生花光彩照灼非丗中所有后驚視謂侍者曰汝見不對曰不見后曰常聞見者當冨貴因遽取吞之是月産髙祖將産之夜后見庭内若有衣冠陪列焉次生衡陽宣王暢義興昭長公主令嫕宋泰始七年殂於秣陵縣同夏里舎葬武進縣東城里山天監元年五月甲辰追上尊號爲皇后謚曰獻蕭衍郗后髙祖德皇后郗氏諱徽髙平金郷人也祖紹宋國子祭酒領東海王帥父燁太子舎人早卒𥘉后母㝷陽公主方娠夢人云當生貴子及生后有赤光照于室內器物盡明家人皆怪之巫言此女光適有所妨乃於水濵祓除之后㓜而明慧善隷書讀史傳女工之事無不閑習宋後廢帝將納爲后齊𥘉安陸王緬又欲結婚郗氏並辭以女疾乃止建元末髙祖始娉焉生永興公主玉姚永丗公主玉婉永康公主玉嬛建武五年髙祖爲雍州刺史先之鎭後乃迎后至州未幾殂於襄陽官舎時年三十二明年歸葬南徐州武進縣二年齊朝進髙祖位相國封梁公詔贈后爲梁公妃髙祖踐祚追崇爲皇后丁貴嬪梁書曰髙祖丁貴嬪諱令光譙國人也丗居襄陽貴嬪生于樊城𥘉産有神光之異紫煙滿室故以爲名相者云此女當大貴髙祖臨州丁氏因人以聞嬪時年十四髙祖納焉𥘉貴嬪生而有赤誌在左臂治之不滅至是無何忽失所在事德皇后小心祇敬甞於供養經案之側髣髴若見神人心獨異之髙祖義師起昭明太子始誕育貴嬪與太子留在州城京邑平乃還京都天監元年五月有司奏爲貴人未拜其年八月又爲貴嬪位在三夫人上居于顯陽殿阮脩容髙祖阮脩容諱令嬴夲姓石㑹稽餘姚人也齊始安王遥光納焉遥光敗後入東昏宫建康城平髙祖納爲綵女天監六年八月生丗祖㝷拜爲脩容常隨丗祖出蕃大同六年六月薨于江州内寢時年六十七歸葬江寧縣通望山謚曰宣丗祖即位追崇爲文宣太后蕭䌉王后梁書曰太宗簡皇后王氏諱靈賔瑯瑘臨沂人也祖儉太尉南昌文憲公后㓜而柔明淑德叔父暕見之曰吾家女師也天監十一年拜晉安王妃生哀太子大器南郡王大連長山公主䂮妙大通三年十月拜皇太子妃太清三年三月薨于永福省時年四十五其年太宗即位追崇爲皇后謚曰簡大寳元年九月葬莊陵蕭繹徐妃梁書曰元帝徐妃諱昭佩東海郯人也祖孝嗣齊太尉枝江文忠公父緄侍中信武將軍妃以天監十六年十二月拜湘東王妃生丗子方等益昌公主含貞妃無容質不見禮帝三二年一人房妃以帝眇一目毎知帝將至必爲半面裝以俟帝見則大怒而出妃性嗜酒多洪醉帝還房必吐衣中旣而貞惠丗子方諸母王氏寵愛未幾而終元帝歸咎於妃及方等死愈見疾太清三年遂逼令自殺妃知不免乃投井死帝以屍還徐氏謂之出妻葬江陵瓦官寺陳陳霸先章后陳書曰髙祖宣皇后章氏諱要兒呉興烏程人也夲姓劒父景明爲章氏所養因改姓焉景明梁代官至散騎侍郎后母蘇氏嘗遇道士以小龜遺巳光彩五色曰三年有徴及期后生而紫光照室因失龜所在后少而聦慧美容儀手爪長五寸色紅白每有朞功之服則一爪先折后善書計能誦詩及楚詞髙祖自廣州南征交阯命后與衡陽王昌隨丗祖由海道歸于長城侯景之亂髙祖下至豫章后爲侯景所囚景平髙祖爲長城縣公后拜夫人及髙祖踐祚永定元年立爲皇后髙祖崩后與中書舎人蔡景歷定計秘不發哀召丗祖入纂丗祖即位尊后爲皇太后下令黜廢帝爲臨海王命髙宗嗣位太建元年冊尊后爲皇太后二年三月景申崩于紫極殿時年六十陳蒨沈后陳書曰丗祖沈皇后諱妙容呉興武康人也父法深梁安州事叅軍后年十餘歳以梁大同中歸于丗祖髙祖之討侯景丗祖時在呉興景遣使收丗祖及后景平乃獲免髙祖踐祚永定元年后爲臨川王妃丗祖即位立爲皇后陳頊栁后陳書曰髙宗栁皇后諱敬言河東解縣人也曽祖丗隆侯景之亂與弟盼徃江陵依梁元帝以長城公主之故待遇甚原及髙宗赴江陵元帝以后配焉承聖二年后生後主於江陵明年江陵䧟髙宗遷于關右后與後主留穰城天嘉二年與後主還朝后爲安城王妃髙宗即位立爲皇后后美姿容身長七尺二寸手垂過膝初髙宗居郷里先娶呉興錢氏女及即位拜爲貴妃甚有寵幸后傾心下之毎尚方供奉之物其上者皆推於貴妃而巳御其次焉髙宗崩始興王叔陵爲亂後主頼后與呉媪救而獲免後主即位尊后爲皇太后宫曰弘範當此之時新失淮南之地隋師臨江又國遭大喪後主病瘡不能聽政其誅叔陵供大行喪事邊境防守及百司衆務雖假以後主之命實皆決之於后後主瘡愈乃歸政焉陳亡入長安隋大業十一年薨于東都時年八十三葬洛陽之芒山陳叔寳沈后陳書曰後主沈皇后諱婺華儀同三司憲侯君之女也母髙祖女㑹稽穆公主主早亡時后尚㓜而毀瘠過甚服畢毎至歳時朔望恒獨坐泣涕哀慟左右内外咸敬異焉太建三年納爲皇太子妃後主即位立爲皇后后性端静寡嗜慾聦敏強記渉獵經史工書翰𥘉後主在東宫而后父君理卒后居憂處别殿哀毀逾禮後主遇后旣薄而張貴妃寵傾後宫後宫之政並歸之后澹然未嘗有所忌怨而居處儉約衣服無錦繡之飾左右近侍纔百許人唯㝷閱圖史佛經爲事陳亡與後主俱入長安及後主薨后自爲哀詞文甚酸切隋煬帝毎所廵幸恒令從駕及煬帝爲宇文化及所害后自廣陵過江還郷里不知所終張貴妃陳書曰後主張貴妃名麗華兵家女也家貧父兄以織席爲業後主爲太子選入宫是時龔貴嬪爲良娣貴妃年十歳後主見而恱焉因得幸遂有娠生太子深後主即位拜爲貴妃妃性聦惠甚𬒳寵遇後主每引見貴妃與賔客遊宴貴妃薦諸宫女預焉後宫等咸德之競言貴妃之善由是愛傾後宫又好厭魅之術假鬼道以惑後主置淫祀於宫中聚諸妖巫使之皷舞因叅訪外事人間有一言一事妃必知之以白後主由此益重妃内外宗族多𬒳引用及隋軍䧟臺城妃與後主俱入井隋軍出之晉王廣命斬妃於青溪中橋北齊髙歡婁后北齊書武明皇后婁氏諱昭君贈司徒内于之女也以明悟強族多娉之並不肯行及見神武於城上執役驚曰此眞吾夫也乃使婢通意又數致私財使以娉巳父母不得巳而許焉神武旣有澄清之志傾産以結英豪密謀秘䇿后恒叅預及拜渤海王妃閫闈之事悉決焉后髙明嚴斷雅遵儉約徃來外舎侍從不過十人性寛厚不妬忌神武姬侍咸以恩待神武嘗將西討出師后夜㝈生一男一女左右以危急請追告神武后弗聽曰王出統大兵何得以我故輕離軍幕死生命也來復何爲神武聞之嗟嘆良乆沙苑敗後侯景言請精騎二萬必能取之神武恱以告于后后曰若如其言豈有還理得獺失景亦有何利乃止文襄嗣位進爲太妃文宣將受魏禪后固執不許帝所以中止天保初尊爲皇太后宫曰宣訓濟南即位尊爲太皇太后尚書令楊愔等受遺詔輔政踈忌諸王太后密與李昭及諸大將定䇿誅之令廢立孝昭即位復爲皇太后孝昭帝崩太后又下詔立武成帝大寧二年春太后寢疾衣忽自舉用巫媪言改姓氏四月辛丑崩於北宫年六十二合葬義平陵爾朱太妃北齊書彭城太妃爾朱榮之女魏孝莊后也神武納爲别室敬重踰於婁妃見必束帶自稱下官神武迎蠕蠕公主還尓朱迎於木井北與蠕蠕公主前後别行不相見公主引角弓仰射翔鴟應弦而落妃引長弓邪射飛烏亦一發而中神武喜曰我此二婦並堪擊賊後爲尼神武爲起佛寺天保初爲太妃及文宣狂酒將無禮於太妃太妃不從遂遇禍髙澄元后北齊書文襄敬皇后元氏魏孝靜帝之姊也孝武帝時封馮翊公主而歸於文襄容德兼美曲盡和敬初生河間王孝琬時文襄爲丗子三日而孝靜幸丗子第贈錦綵及布帛萬疋丗子辭求通受諸貴禮遺於是十屋皆滿次生兩公主文宣受禪尊爲文襄皇后髙洋李后北齊書曰文宣皇后李氏諱祖娥趙郡李希宗女也容德甚美初爲太原公夫人及帝將建中宫髙隆之髙德正言漢婦人不可爲天下母冝更擇美配楊愔固請依漢魏故事不改元妃而德正猶固請廢后而立叚昭儀欲以結勲貴之援帝竟不從而立后焉帝好捶撻嬪御乃至有殺戮者唯后獨蒙禮敬天保十年改爲可賀敦皇后孝昭即位降居昭信宫號昭信皇后髙演元后北齊書曰孝昭皇后元氏開府元蠻女也初爲常山王妃天保末賜姓歩六孤孝昭即位立爲皇后帝崩梓宫之鄴始渡汾橋武成聞后有竒藥追索之不得使閹人就車頓辱降居順成宫武成旣殺樂陵王元𬒳閟隔不得與家相知宫闈内忽有飛語帝令檢推得后父兄書信元蠻由是坐免官后以齊亡人入周氏宫中隨文帝作相放還山東髙湛胡后北齊書曰武成皇后胡氏安定胡延之女其母范陽盧道約女初懷孕有胡僧詣門曰此宅瓠蘆中有月旣而生后天保初選爲長廣王妃産後主日鴞鳴於産帳上武成崩尊爲皇太后髙緯斛律后北齊書曰後主皇后斛律氏左丞相光之女也初爲皇太子妃後主受禪立爲皇后武平三年正月生女帝欲恱光詐稱生男爲之大赦光誅后廢在别宫後令爲尼太平御覽卷第一百四十三
