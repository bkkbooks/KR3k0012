front:
  text: 太平御覽卷第六百六十一
  hash: sha256:5d7eba8728686820f00ffa15285e12f617083c24c24dd19389aeabd653545a2c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_661-1a}
body:
  text: 道部三眞人下集仙録曰王母者龜山金母也西華至精之氣化而生金母生而飛翔處極陰元位配西方母養群品所居宫闕在舂山崑崙之圃閬風之苑有城千里樓十二非飈車羽輪不可到也蓬髮虎齒非西母之眞形蓋金方之神也元始授以萬天元統龜山九光之籙使制召萬靈統括衆眞揔諸天之羽儀天帝朝宴之會上淸寶經三洞玉書凡所授度咸所關預黃帝在位王母遣使乘白鹿集帝庭授以地圖其後舜在位遣使獻白玉環及益地圖遂廣黃帝九州爲十二州又遣獻舜玉琯吹之以和八風又尚書帝驗期曰王母之國在西荒凡得道授書者皆朝王母於崑崙之闕王襃字子登齋戒三月王母授以瓊花寶曜七晨素經茅盈從西城王君詣白玉龜臺朝謁王母求長生之道王母授以玄眞之經又授寶書童散四方洎周穆王駕黿鼉魚鼈爲梁以濟弱水而升崑崙玄圃閬苑之野而會于王母歌白雲之謡刻石紀迹于弇山之下而還漢武帝好長生之道元封元年登嵩岳築尋眞之臺齋戒思道王母於七月七日乘紫雲之輦駕九色斑龍帶天眞之䇿佩金剛靈璽黃錦之服金光奕奕結飛雲文綬戴天太眞晨纓之冠躡方瓊鳯文之履天姿奄藹眞絶世之人也下車扶二侍女登床東向而坐命侍女取桃以玉盤盛至七枚四與帝食母自食三帝欲收核種之母曰此桃三千歲一實中土地薄種之不生問長生之道母曰賤榮樂卑自復佳爾養性之道理身之要在不怠耳欲長生者先取諸身堅守三一保靈根青白分明適泥丸三宫備衛在絳宫黃庭戊己無流源此所謂呼吸太和保守自然眞要之道也至若太上靈藥上帝之奇物也下陰生重雲妙草皆神仙之藥也得上品者後天而老乃太上之所服非中仙之所寶其中品者有得服之後天而遊乃天眞之所服非下仙之所及其次藥有九丹金液紫虹華英太淸九轉五雲之漿玄霜絳雪騰躍三黃東瀛白香玄洲飛生八石千芝威喜九光西流石膽東滄靑錢髙丘餘粮積石瓊田太靈還丹盛以金蘭長光絳草雲童飛于此飛仙之所服非地仙之所聞也其下藥茯苓昌蒲巨勝黄精之類服之可以延年雖不得長享無期亦以身生光澤得爲地仙求道者要先憑此階漸而能致逺勝也者能呼吸服御保固神氣此上品自然之要道也且夫一人之身天付之以神地付之以形道付之以氣萬物草木亦如之身以道爲本豈可不養神固氣以全爾形也形神俱全上聖所貴王母命上元夫人出八㑹之書五岳眞圗五帝六甲靈飛之符凡十二事以授帝不能用其道而多所惑焉後三祠王母復下降所授之書置柏梁臺上爲天災所焚李少君解形而去巫蠱事起帝愈悔恨又大茅君盈南治句曲之山元壽二年八月已酉南岳眞人赤君西城王君方諸葛青童並從王母降於茅盈之室又王母命上元夫人授盈二第茅固茅衷太霄隱書其後紫靈元君魏華存齋戒於陽洛山隱元之臺王母與金闕聖君降於臺中乘八景之輿同詣淸虚上宮傳玉淸隱書四卷以授魏夫人時太虚眞人等歌太極歌王母曰逍遥玄精際萬流無暫停哀此去留㑹刼盡天地傾當尋無中景不死亦不生體被自然道寂觀合大冥南岳挺眞幹玉映耀頴精有任靡其事虚心自受靈嘉㑹絳河曲相與樂米央王母復還龜臺三一經曰黃帝遊靈臺青城山絶巖之下見天眞皇人以蒼玉爲屋黃玉爲狀翠羅之帷侍者皆天人又曰高丘子商時人也好道入六景山積年但讀黃素道經服餌木後服鴻丹得陸仙遊行五岳復飲金液爲中岳眞人又曰郭崇子商時人也彭眞人弟子嘗山行盜困崇諸子弟欲追擒之崇子曰縱去其盜後仕官而崇子譽之數數往彼謝之日我昔盜也不可受大君子之譽遂自殺後崇子得道太極眞人以爲有殺人之罪不得爲眞人此爲善之過尚致人自斃況爲惡乎又曰楚莊公時市長宋萊子常洒掃一市乆時有一乞食翁入市經日行歌道中曰天庭發雙華山源彰陰邪清晨案天馬來詣太眞家眞人無奈隱又以滅百魔常歌此乞食市人無解此者獨萊子悟疑其眞人然未全解其歌耳遂師此翁而去積十餘年翁遂授以中仙之道萊子今在中岳也乞食翁者西岳眞人馮延壽周宣王時人也天庭任兩眉之下是徹視之津梁亦謂之華庭也山源是鼻下人中之本側在鼻下小入谷中也天馬手也以手按鼻下則杜絶百邪又曰眞人尹喜周大夫也爲關令少好學善天文祕緯鬼神無以匿其情狀瓌傑不檢榮戚不形於色志懷逍遥天性玄湛忽登樓四望見東極有紫氣西邁喜日夫陽數度盡九星度值合歲月並正應有異人過此乃齋戒掃道以俟之及老子度關喜先誡關吏曰若有翁乘青牛薄板車者勿聽過止以白之果至吏白願少止喜帶印綬設師事之禮老子重辭之喜曰願爲我著書說大道之意得奉而行焉於是著道德經上下二篇喜於是俱去玄洲上卿蘇林傳曰林字子玄濮陽曲水人也父秀含德隱曜居於恒山林少稟異操至趙師琴髙先生授鍊氣益命之道又師華山仇先生授還神之術曰子眞人也當學眞道乃致林於㳙子末遂告林眞訣先生曰必作地上眞人當先去三尸林後授紫陽眞人道訣凡二百餘事至于守玄丹洞房三元眞人具標上焉林爲中岳眞人茅君傳曰盈字叔申咸陽人也父祚有三子盈固衷也盈少稟奇操矯俗抗邁不求聞達不交非類入恒山讀老易餌术潜影在山中六年精思念道誠感密應夢太玄玉女持玉劄而擕之曰西城有王君得眞道可爲師明發乃尋求至西城齋戒三月果見王君盈乃叩頭再拜勤懇乞長生之術乃得在西城洞臺之中金玉上宫親侍旦夕執巾屨之役積十七年專一不懈復二年王君命駕造白玉龜山謁王毋於青琳宫將盈同行王君見西王母稽首於前盈乃叩頭再拜自陳於王母前得治身之要道行其事歸家數十年以漢元帝時天官下迎來渡江東治句曲山於是天皇大帝遣授黃金紫玉策爲太元眞人東岳上卿司命神君仗紫毛之節十絕靈幡巾藕華冠繡羽紫帔丹青飛羣斑龍輿素虎軿曲晨寶蓋瓊帷縁寶執神流火雙珠月明錦旌白羽玄千金鍾玉磐紫琳之腴玉漿金甖治赤城山玉洞之府上編上淸下宴太極封掌吳越司校太山死生籙朝籍衆眞定䇿金名領授學道試校群仙時茅君弟吏二千石當之官鄕人多送之茅君亦在座日余亦有職某月日當之官賔客曰願奉送茅君言不須有所損費吾有以供帳至期大作宴㑹皆靑縑帷幄下鋪重白氊奇饌異果羅列妓樂合奏聞數里從者千餘人文吏則朱衣素帶武吏則戎備曜日茅君乃登羽蓋車去以晉興寧三年七月四日夜初降楊君家着青錦繡裙紫毛帔巾芙蓉冠侍從七人入戸一人執紫毛節一人執十絕幡一人帶綠章囊一人握流金鈴三人奉白牙箱並朱衣以後數數來降弟子迎候仙人李遵撰傳光顯于世閒也三洞珠囊日王褒字子登前漢王陵七世孫服靑精䭀飯趍步峻峰如飛鳥無津梁直度積水又服雲碧晨飛丹腴視見甚逺太上大道君遣正一左玄執蓋郎封瑋音賜王君素明瓊玕丹紱綿旌號淸虚眞人眞誥曰赤松子黃帝時雨師號太極眞人又曰九疑眞人韓偉逺昔師中岳宋德玄德玄者周宣王時人也服靈飛六甲得道能逺行數變隱得玄靈之道今在嵩山偉逺乆而隨得其道九疑眞人又曰裴玄仁右扶風陽夏人也漢文帝二年始生焉裴君得道將入室弟子鄧雲亦得道將鄧登太華山入西洞玄石室中積三十二年怱見五老人賜裴君神芝之術亦號淸虚眞人又曰中岳眞人王仲甫少好仙道常吸引二景及飡霞法四十餘年都不覺益其子亦服之十八年仙去後南眞人忽降仲甫家而教之曰子朏衆虧減津液不注雖接眞景以飡霞故未爲身益仲甫遂因藥治病兼修眞道又積年方成今在玄洲受書爲中岳眞人領九玄之司又曰范伯慈桂陽人也家本事俗忽得狂病經年不愈聞沈道士治病多驗乃弃家求療五十日病愈後入天目山餌胡麻精思十七年又服丹砂得道爲玄一眞人又曰許謐字思玄一名穆晉簡文皇帝以爲護軍長史雖外混俗務而内修眞學得爲上淸眞人又曰紫虚元君領上眞司命南岳魏夫人玉清虚弟子名華存楊司命之師也任城人晉司徒文康公魏舒之女年二十四適南陽劉幼彦幼彦爲汲縣修武夫人齋戒念道入室百日十二月夜半靑童君及王君四眞人同降授上經三十一卷至洛陽亂夫人渡江居豫章隨于璞往江州安城郡因居彼年八十三以成帝咸和九年青童淸虚又降授劒解之道稱疾隱化乘颷車往陽洛山明日有四十七眞人降教道法積十六年西母與金闕南極同降迎夫人北詣上淸宫玉闕下受神鳳章龍衣虎帶丹飛裙十絕華幡流金火鈴九蓋芝軿九色之節雙珠月明神虎之符錦旂虎旌給西華玉女八景飛輿玄景九龍又受扶桑大帝君玉劄金文位爲紫虚元君領上眞司命主諸學道死生圗籍攝御三官關校罪考又受金闕聖君青瓊板丹籙文位爲南缶夫人給曲晨飛蓋治天台大霍山洞臺中下訓奉道教授當爲眞仙者一月再登玉淸三登太素四謁玉晨遨宴扶桑仰招天眞揔括神籙刊書九天佐命東華叶翼帝晨飛步太霞參轡九虚以興寧中降揚君又授許掾上經自此後數數來降也玉清虚令弟子范邈作内傳顯于世也又曰紫淸上宮九華安眞妃晉興寧三年年十三四着雲錦裙上丹下青腰絲繡帶右帶係十餘小鈴鈴子青色又黃色相閒左帶玉珮指着金鐶白珠約臂作髻在頂中餘髮垂至腰一侍女朱衣帶青章襄長尺餘以盛書書可十餘卷白玉檢囊口上刻字玉淸神虚内眞紫元丹章一侍女赤衣捧白玉箱絳帶絡之年並十七八自此後數數來降授書作詩眞人傳曰馬明生者齊國臨淄人也本姓帛名和字君賢爲縣吏捕賊所傷遇太眞元君與藥卽愈隨至太山石室中金床玉几珎物奇偉人跡所不能及事之勤亦至矣太眞乃授以長生之方曰我所受服太和自然龍胎之體適所以授三天眞人不可以教始學者後隨安期先生服餌仙去爲眞人裴眞人弟子三十四人其十八人學眞道餘學仙道太平御覽卷第六百六十一
