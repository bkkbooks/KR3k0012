front:
  text: 太平御覽卷第六百八十三儀式部四
  hash: sha256:60fc3ee8343552ca081023dbded29605bde2837f1faf0db93973218b0c542d0c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_683-1a}
body:
  text: 印許愼說文曰印執政所持信也劉熈釋名曰印信也所以封物爲驗也亦言因也封物相因付也史記蘇奈曰使我有洛陽負郭田二頃豈能佩印乎又曰犀首司馬彪曰魏官名也如今虎牙將軍也姓公孫名衍張儀卒後犀首入相秦佩五國相印爲從約長又曰漢王與酈食其謀撓楚權食其曰今秦失德弃義侵伐諸侯滅六國之後無立錐之地聞陛下德義莫不嚮風慕義願爲臣妾莫若立六國後漢王曰善趣刻印先生因行佩之矣張良從外謁漢王方食具以酈生語告子房曰誰爲陛下畫此計者陛下事去矣漢王曰何哉良曰臣請借前箸爲大王籌之漢王輟食吐哺罵曰竪儒幾敗廼公事令趣銷印又曰酈寄與典客劉掲說吕禄曰帝使太尉守北軍欲足下之國急歸將印辭去不然禍且起吕禄遂解印屬典客而以兵授太尉太尉將之行令軍中又曰欒大言方伎乃拜大爲五利將軍居月餘得四印佩天士將軍地士將軍大通將軍印又封大樂通侯天子刻玉印曰大通將軍使者衣羽衣夜立白茅上五利亦衣羽衣立白茅上受印以示不臣也數月佩六印貴振天下漢書蓺文志曰六體者古文竒字篆書隷書繆書蟲書師古日繆篆謂古文屈曲纏繞所以摹印章也皆所以通知古今文字摹印章書幡信也又曰酈食其說齊王曰項氏爲人刻印玩而不能授臣瓉日項羽恡於爵賞玩惜侯印不能封人韓信傳作刑義兩通又曰張耳責讓陳餘餘怒曰不意君之望臣深也豈以臣重去將哉乃脫解印綬與耳耳不敢受餘走如厠客有說耳天予不取返受不祥急取之耳乃佩其印遂収其兵由此大有隙又曰夏侯嬰從捕虜降卒得印一匱又趙堯傳曰御史大夫周昌爲趙相髙祖持御史大夫印弄之曰誰可以爲御史大夫者熟視堯曰無以昜堯遂拜爲御史大夫又曰嚴助曰陛下以方寸之印丈二之組鎭撫方外不勞一卒不損一㦸而威德並行如使越人蒙死徼倖以逆執事之顔行文頴日顔行爲鴈行在前故日顔也斯輿之卒有一不備而歸者雖得越王之首臣猶竊爲大漢羞之又曰武帝遺詔以討莽何羅功封金日磾爲秺侯日磾以帝少不受封輔政歳餘病困大將軍光自封日磾卧受印綬又曰王莽篡位遺謁者即拜龔勝太子師友祭酒以印綬就加勝輒推不受曰吾受漢家厚恩無以報今老矣旦暮入地豈冝以一身事二姓下見故主哉又曰王莽簒位遣五威將王駿率甄阜等六人多齎金帛遺單于諭暁以受命代漢狀因昜單于印故文曰匈奴單于璽莽更曰新匈奴單于章詔命令上故印左姑夕侯蘇從旁謂單于曰末見新印文冝勿與單于曰印文何由變更遂解故印綬奉上將率受著新綬不能視印飲食至夜廼罷右率陳饒謂諸將率曰嚮者姑夕侯疑印文幾令單于不與人如令視印見其變改必求故印此非辭說所能距也即引斧椎壞之明日單于果遣右骨都侯當白將率曰漢賜單于璽言璽不言章又無漢字諸王以下廼有漢言章今即去璽加新與臣下無别願得故印將率示以故印謂曰新室順天制作單于冝承天命奉新室之制當還白單于知巳無可柰何又多得賂遺即遣弟右賢王奉馬牛隨將率入謝又曰王莽簒位莽皇孫功崇公宗坐自畫容貌𬒳服天子衣冠刻印三一曰維祉冠存巳夏處南山藏薄氷祉福也冠存巳夏處南山就隂凉也藏薄氷亦隂二曰肅聖寳繼莽自謂舜後能肅敬得天寳龜宗欲繼之也三曰德封昌圗宗自言以德見封當昌熾受圖籍也後事發案驗宗自殺東觀漢記曰更始立以上爲太常偏將軍時無印得定武侯家丞印佩之又曰馬援上書曰印書成睪令而睪爲白下羊丞印四下羊尉印白下人人下牛正一縣長吏文不同恐天下不正者多符印所以爲信冝齊同事下大司空正郡國印章奏可又叚熲上書曰掠得羗侯君長金印三十一錫印一枚皆簿入後漢書曰㓂恂𥘉爲功曹太守耿况甚重之王莽敗更始立使使者徇郡國曰先降者復爵位恂從耿况迎使者於界上况上印綬使者納之宿無還意恂勒兵入見使者就請之使者不與曰天王使者功曹欲脅之邪恂曰非敢脅使君君者尊之之稱也竊傷計之不詳也今天下𥘉定國信未宣使君建節衘命以臨四方郡國莫不延頸傾耳望風歸命今始至上谷而先隳大信隳毀也沮向化之心生離叛之隙將復何以號令它郡乎且耿府君在上谷乆爲吏人所親今易之得賢則造次未安不賢祗更生亂爲使君計莫若復之以安百姓使者不應恂叱左右以使者命召况至恂進印綬帶於况使者不得巳乃承制誥之况受而歸又曰獻帝遷許徐璆以廷尉徴當詣京道爲袁術所刼術死軍破璆送前所假汝南東海二郡印綬司徒趙温謂璆曰君遭大難猶存此邪璆曰昔蘇武困於匈奴不墜七尺之節况此方寸印乎又曰延熹八年沛國戴異得黄金印無文字遂與廣陵人龍尚等共祭井作符書稱太上皇伏誅又曰張魯在漢中民有地中得玉印者羣下欲尊魯爲漢寧王功曹閻諌以必爲禍先魯從而止魏志曰袁紹欲立幽州牧劉虞爲帝太祖拒之紹又嘗得一玉印於太祖坐中舉向其肘太祖笑而惡焉又曰楊奉以天子都安邑醫師走卒皆爲校尉御史刻印不供乃以錐畫示有文字或不時得又曰許允善相印出爲鎭北將軍將拜以印不善使更刻之如此者三允曰印雖始成而巳𬒳辱問送印者果懷之而墜于厠又曰平原太守劉邠取印囊及山鷄毛着器中使管輅筮之輅曰内方外圎五色成文合寳守信出則有章此印囊也又曰咸熈元年鎮西將軍衛瓘上雍州兵於成都縣得璧玉印各一印文似成信字依周成王歸禾之義宣示百官相國府呉志曰劉禪襲位諸葛亮秉政與權連和時事所冝權輙輙令陸遜報語并刻權印以置其所權毎與禪亮書常過示遜輕重可否有所不安便令改以封行之晉書曰孔愉封餘不亭侯愉曽行經餘不亭見籠龜於路者買而放之溪中流左顧者數四及是鑄侯印而左顧三改如𥘉印工吿愉愉悟乃佩焉又曰趙王倫僣位而以苟且之惠取恱人情金銀冶鑄不給於印故有白板之侯君子耻服其章宋書曰孔琳之爲尚書左丞楊州中從事史所居著績時責衆官獻便冝琳建言曰夫璽印者所以辨章官爵立契符信官莫大於皇帝爵莫尊於公侯而傳國之璽歷代遞用襲封之印弈世相傳貴在仍舊無取改作今丗唯尉一職獨用一印至内外羣官每遷悉改討㝷其義私所未逹若謂官各異姓與傳襲不同則未若異代之爲殊也若論其名器雖有公卿之貴未若帝王之重若以或有誅夷之臣忌其㐫穢則漢用秦璽延祚四百未聞以子嬰身戮國亡而棄之不佩帝王公侯之尊不疑於傳璽人臣衆僚之卑何嫌於即印載籍未聞其說推别自乖其准而終年刻鑄䘮功消實金銀銅炭之費不可稱言非所以因循舊貫昜簡之道愚請衆官即用一印無煩改作若新置官官多印少又或零失然後乃鑄則仰禆天府非唯小益齊書曰巴西人趙續伯反奉其郷人李弘爲聖王弘乗佛輿以五綵裹青石誑百姓云天與巳玉印當王蜀後敗梁書曰何思澄自廷尉正遷治書侍御史宋齊巳來此職甚輕天監𥘉始重其選車前依尚書二丞給三騶執盛印青囊舊事糺彈印綬在前故也又曰王瑩拜將軍印工鑄其印六鑄而龜六毁旣成鎭空不實𥙷而用之居職六日暴卒後魏書曰祖瑩爲散騎侍郎孝昌中於廣干王第掘得古玉印勑召瑩與黄門侍郎李琰之令辨何世之物瑩云此是于闐國王晉太康中所獻乃以墨塗字觀之果如瑩言時人稱爲慱物又曰髙祖詔軍警給雀印傳符次給馬印又曰髙祖承明元年上谷郡人獻玉印有蛟龍之文唐書曰朱泚遣其將韓旻領兵三千趣奉天時奉天未有武備泚召叚秀實與謀秀實詐從之乃與將吏謀殺泚且欲追韓旻兵廻竊姚令言印不遂乃以司農寺印倒印符牒旻莫辨其印遑遽而廻應劭漢官儀曰印者因也正所以虎紐者陽類虎獸之長取其威猛以執伏群下龜者隂物隨時蟄藏以示臣道功成而退也孝武皇帝元狩四年令通官印五分王公侯金二千石銀千石以下銅漢舊儀曰諸侯王黄金橐駞印文曰璽列侯黄金龜紐文曰之印丞相大將軍黄金印龜紐文曰章御史大夫章匈奴單于黄金印槖駞紐文曰章御史二千石銀印龜紐文曰章千石六百石四百石皆銅印鼻紐文曰印章二百石以上皆爲通官印續漢禮儀志曰印璽柙金鏤大貴人長公主銅鏤江表傳曰呉歷陵縣有名山臨水髙百丈其上三十丈有七穿相傳謂之石印石印神有三郎時歷陵長表言石印文發孫皓大喜遣使祭歷陵使者以髙梯上省印文詐以朱書曰楚九州都楊作天子還以印文啓皓皓曰太平之主非孫復誰以印綬拜三郎爲王又曰諸葛恪𬒳誅弟融刮金龜印服之而死抱朴子曰古之入山者佩黄神越章印其闊四寸其字百二十以封泥著所住之四方各百歩則虎狼不敢近崖豹古今注曰奏劾者絺爲囊盛印於前示奉法而行非奏劾者以青繒爲囊盛印於後郭子曰大將軍王敦起事丞相導兄弟詣門謝甚有憂色尚書周顗始入丞相呼顗曰伯仁以百口頼卿顗直過不應旣入苦相申救甚至旣釋顗大恱飲酒致醉而出導等猶在門又呼顗顗不與言顧左右曰今年殺諸賊奴當取一金印如斗大繫肘也列仙傳曰方囬者堯時人至夏桀末爲官士爲人所刼閇之宫中從求道因化而得去更以方囬印封其户時人言得方囬一丸泥門户不可開拾遺録曰禹治水黄龍曵尾於前玄龜負青泥於後玄龜河精之使者龜頷下有印文皆古文作九州山水之字禹所穿鑿之處皆使青泥封記其所使玄龜印其上今之人聚土爲界乃遺象也又曰王溥即王吉之後也傭書於洛羙形皃又多文辭來僦其書者丈夫贈其衣冠婦人遺其珠玉一日之中衣寳盈車而歸積粟十廪九族莫不仰其衣食洛陽稱其爲善而得冨也溥先時家貧穿井得鐵印銘曰傭力得冨錢至億庾一土三田軍門主簿後以一億庾錢輸官得中壘校尉三田一土壘字也中壘校尉掌北軍壘門故曰軍門主簿也善積降福明神之報也慱物志曰常山張顥爲梁相天新雨後有烏如山鵲飛翔近地令人擿之墮地爲圎石顥令椎破得一金印文曰忠孝侯印顥上之藏之秘府後議郎汝南樊行校書東觀表上言堯舜之時舊有此官今天降印冝可復置述異記曰張軌字士彦爲使持節護羗校尉凉州刺史客相印曰祚傳子孫長有西夏關洛傾䧟而凉土獨全在職十三年傳國三世八主一十六載風土記曰豫章新淦縣令刻印而誤作塗相印書曰相印法本出陳長文長文以語韋仲將印士楊利從仲將受法以語許士宗私以法術占吉㐫十可八九仲將問長文從誰得法長文曰本出漢世又印工宗養以法語程申伯相印經曰印有八角十二芒印欲得周正上稳下平光明潔清如此皆吉夢書曰印鈎爲人子所保也夢見印鈎人得子含吞印鈎懷姙婦也失印子傷墮傳玄印銘曰惟昔先王配天垂則乃設印章作信万國取象晷儀是銘是刻文明慎宻直方其德本立道生歸乎玄黒太平御覽卷第六百八十三
