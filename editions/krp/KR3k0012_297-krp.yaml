front:
  text: 太平御覽卷第二百九十七兵部二十八
  hash: sha256:086c0b27a0ad49bacf2bba1cfaaadde1b3c95a2917c66e910020e20de1fb169e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_297-1a}
body:
  text: 訓兵孫子曰言不相聞故爲鼓鐸鐸金鉦也聽其音聲以爲耳候也視不相見故爲旌旗瞻其指麾以爲目候夫金鼓旌旗者所以一人之耳目也齊一耳目之視聽使知進退之度人旣專一則勇者不得獨進怯者不得獨退齊之以法教使強弱不得相踰紛紛紜紜間亂而不可亂旌旗亂也示敵若亂以金間之紛紛旌旗像紜紜士卒貌言旌旗翻轉一合一離士卒進退或徃或來視之若擾觀之若亂然其法令素定度幟分明各有分數擾而不亂也渾渾沌沌形圎而不可敗車騎齊轉也形圓者出入有道齊整也渾渾車輪轉行沌沌歩騎奔馳視其行陣縱横圓而不方然其指趣各有所應故王子日將欲内明而外暗内理而外軍所以示敵之輕巳者也渾外本切沌徒損切周禮曰太宗伯以軍禮同邦國同謂威其不協僣差者軍禮之别五也太師之禮用衆也用其義勇也大均之禮䘏衆也均其地政地守地職之賊所以憂民於蔿終日而畢鞭七人貫三人耳國老皆賀子文蔿賈不賀曰子玉剛而無禮過三百乗其不能以入矣子玉之敗子之舉也舉以敗國將何賀焉又曰苗賁皇徇曰蒐乗𥙷卒秣馬利兵脩陣固列蓐食申禱明日復戰乃逸楚囚又曰宣子曰我若受秦則賔也不受㓂也旣不受矣而復緩師秦將生心先人有奪人之心軍之善謀也逐㓂如追逃軍之善政也訓卒利兵秣馬蓐食潜師夜起戊子敗秦師于令狐至于刳首又曰宣榭火宣榭講武室也論語曰子曰善人教民七年亦可以即戎矣可􅈬兵攻戰也又曰不教民戰是謂弃之後漢書曰靈帝時望氣以爲京師有大兵兩宫血流以爲太公六韜有天子將兵事可以威厭四方帝乃講武於平樂觀下起大壇建五采盖天子擐甲介馬稱無上將軍何進領兵屯於觀下置西園八校尉袁紹曹操等爲之唐書曰太宗𥘉即位突厥入㓂欲諸軍皆習騎射毎退朝即引諸衞將習射于顯德殿庭謂將軍巳下曰古突厥與中國更有盛衰若軒轅善用五兵即能北逐獯虜周宣驅駕方召亦能制勝太原下至漢晉之君洎于隋代不使兵士素習干戈突厥來侵莫能抗禦遣中國生民塗炭於㓂手我今不使汝等穿池築苑造諸淫費農民恣令逸樂兵士唯習弓馬若無賊來我則爲汝博士敎汝等武藝優長若有賊來我即爲汝將師領汝鬪戰亦望使汝等前無横敵於是日引數百人於殿庭敎射太宗親自臨試毎坐或至午時射中者隨賞弓力布帛統帥加上考朝臣咸諌云不冝引卑碎之人挾狐矢於軒陛之側上曰率土之内皆吾臣子我所恨不能將我心遍置人腹中豈有相疑之道哉由是一二年間兵士盡便弓馬又曰李抱真領澤潞觀察留後抱眞密揣山東當有變上黨且當兵衛是時乗戰餘之地土塉賦重人益困無以養軍士乃籍户丁男三選其一有材力者免租傜給弓矢令之曰農之隙則分曹角射歳終吾當㑹試及期按簿而徴之都試以示賞罰復命之如𥘉比三年則皆善射抱眞曰軍可用矣於是舉部内之卿得成卒二萬前旣不廪費府庫益實乃繕兵甲爲戰具遂雄視山東是時稱昭義歩兵冠諸軍又曰德宗即位以馬燧爲太原尹北都留守河東節度觀察度支營田使是時承鮑防自百井敗軍之後兵甲寡弱騎士少燧乃悉召將吏牧馬厮役得數千人悉𥙷騎卒教之數月皆爲精騎造甲者必令長短三等稱其所衣以便進趨又造戰車以狡猊象刺㦸於後行則載兵甲止則爲營陣或塞險阨以遏奔衝器械無不犀利居一年陳兵三萬開廣場以習戰陣敎其進退古司馬兵法曰凢戰非陣之難使人可陣難非可使陣難使可用難使人盡心效力用必勝也非知之難行之難敎習使人知進退之便左右之利事事自行之者難又曰天子之義必純取於天地而觀於先聖天子奉天地之道謂和隂陽四時之氣順先王之法度也士庶之義必奉於父母而正於君長士庶必從父母之敎君長之命故雖有明君士不先敎不可用也雖有明君士不教習不可以受敵也古之教民必立貴賤之經綸使髙下不相凌德義不相踰材伎不相掩勇力不相犯故力同意和古者國容不入軍軍容不入國故德義不相踰治國以仁德軍事以勇德以從化義以法斷以國容入軍則軍敗軍容入國則國亂也呉起敎戰法曰短者持矛㦸長者持弓弩強者持旌旗勇者持金鼓弱者給厮養智者爲謀士郷里相比什伍相保一鼓整兵二鼓戰陣三鼓趣食四鼓然辨五鼔就行聞鼓聲合然後舉旗六韜曰敎戰之法必明告吏士三令五申敎其操兵起居進止旌旗指麾陣而方之坐而起之行而止之左而右之列而合之絶而解之無犯進止之節無失飲食之冝無絶人馬之力令吏士一人學戰敎成十人十人學戰敎成百人百人學戰敎成千人千人學戰教成萬人萬人學戰教成三軍之衆大戰之法百萬之師故能成大功也衛公兵法曰諸兵士將戰身貌尫弱不勝衣甲又戎具所施理須堅勁須簡取強兵并令試練器仗兵須徹扎䧟堅皆須取甲試令所射然始取中又曰毎營中兩廂置土馬十二疋大小如常馬眞鞍令士卒檈甲胄櫜弓矢櫜音髙佩刀劒持矛楯左右上下以便習其事又敎旗法曰凢教旗於平原曠野登髙逺視處大將居其上南向左右各置鼓一十二靣角一十二具左右各樹五色旗六纛居前列旗節次之左右衙官駐隊如偃月形爲後騎下臨平野使士卒目見旌旗耳聞鼓角心存號令乃命諸將分爲左右皆去兵刃精新甲胄幡幟分爲左右廂各以兵馬使爲長班布其次陣間容陣隊間容隊曲間容曲以長叅短以短叅長迴軍轉陣以後爲前以前爲後進無奔迸退無趨走以正合以竒勝聽音覩麾乍合乍離於是三令五申白旗點鼓音動則左右廂齊合朱旗點角音動左右廂齊離離之與合皆不離中央之地左廂陽向西旋右廂隂向東旋左右各復夲𥘉白旗棹鼓音動左右各雲蒸鳥散弥川絡野然而不失部隊之踈密朱旗棹角音動則左右各復夲𥘉前後左右無差尺寸散則法天聚則法地如此三合而三離三聚而三散不如法者吏士之罪從軍令於是大將出五彩旗一十二口各樹於左右廂陣前毎旗命壯勇士五十人守旗選壯勇士五十人奪旗左廂奪右廂右廂奪左廂鼓音動而奪角音動而止得旗者勝失旗者負勝賞而負罰離合之勢聚散之形勝負之理賞罰之信因是而敎之太白隂經曰春秋末並爲戰國増講武之禮以爲戲樂以相誇視而秦更名爲角抵故國雖大好戰必亡天下雖平亡戰必危天下旣平春蒐秋獮振旅理兵所以不忘戰今邊軍更名曰敎旗使士卒識金鼓别旗幟任行列知部分一軍之節制也又曰古之諸侯畋獵者爲田除害也上所以供承宗廟下所以閑習武事太古之時人食禽獸之肉坐其皮後代之人浸多時禽獸寡少衣食不足於是神農敎其植榖導以紡績自是之後禽獸復盈山林下平土害禾稼爲人所害於是王公秋冬無事畋獵閑習兵革奮揚威武以戒非常李冬之月獵日隂用事萬物畢成蟄虫巳伏乃具卒乗從禽于山澤以教部伍分進退之儀一人守圍地三尺十二時守三萬六千尺積尺得六千歩積歩得一十五里餘六十歩圍中徑闊得地五里餘二十歩以左右決勝將爲交頭其决勝左右將各主士仵爲行列皆以金鼓旌旗爲節制其𥘉起圍張翼隨山林地勢無逺近部分其合圍地虞候先擇定訖以善弧矢者爲圍中騎其歩卒槍旗幡守圍有漏禽獸坐守圍吏如大獸公之小獸私之以觀進止管子曰凉風至而白露下天子命左右司馬令組甲厲士衆啇君書曰民之見戰如飢狼之見虎則民可用矣吕氏春秋曰丗有言曰驅市人而戰可以勝人之厚禄敎卒老弱罷民罷與疲同可以勝人之精士練材離散係絫音累可以勝人之行陳陳與陣同整齊鉏耰白挺可以勝人之長銚利兵此不通乎兵者之論今有利劒於此以刺則不中以擊則不及與惡劒無擇爲是鬪因用惡劒則不可簡選精良兵械銛利發之則不時縱之則不當與惡卒無擇爲是戰因用惡卒則不可王子慶忌陳午猶欲劔之利也陳午齊人慶忌呉公子二人皆勇有捷力簡選精良兵械銛利令將將之王者有以霸者矣湯武齊桓晉文呉闔閭是也又曰故凡勢險阻欲其便也兵甲器械欲其利也選練角材欲其精也將率士民欲其敎也此四者義兵之助也時變之應也又曰闔閭試其民於五湖劔皆加於肩地流血幾不可止勾踐試其民於寢宮民爭入火死者千餘遽擊金而退之賞罰充實也鄴城故事曰凌霄觀成案石季龍永和三年命其子石宣祈于山川因而遊獵乗大輅羽葆華蓋建天子旌旗十有六軍戎卒十八萬出自金明門季龍從後宫昇觀望之笑曰我家父子如是自非天崩地䧟當復何愁但抱子弄孫日爲樂耳文選曰三令五申敎逹禁城謝承與歩子山書曰示攻戰進取之方敎進退疾徐之莭也劉向别傳曰蹵鞠者傳言黄帝所作或曰起戰國之時蹹音沓鞠兵勢所以陳之知武材也皆因熈戲而講習也太平御覽卷第二百九十七
