body:
  text: 地部六㑹稽山天台山茅山廬山羅浮山蔣山九疑山玉笥山㑹稽山呉越春秋曰禹廵天下歸還越㑹稽脩國之道以㑹計名山又曰禹廵行天下歸還大越登茅山以朝四方群臣觀中州諸侯防風後至斬以徇衆示天下悉以臣屬也乃大㑹計治國之道更名茅山曰㑹稽越絶書亦載傳曰勾踐以甲楯五千保於㑹稽史記曰始皇本紀曰三十七年上㑹稽祭大禹望于南海而立石刻頌秦徳九土文括略曰禹禪此山有一石穴委曲黄帝藏書於此禹得之孔靈符㑹稽記曰㑹稽山在縣東南其上石狀似覆釡禹夢玄夷倉水使者却倚覆釡之上是也今禹廟在下秦始皇甞配食此廟又曰山有石室云是仙人射堂東髙巖有射的石逺望的的如射候形圎視之如鏡土人常以占糓食貴賤射的明則米賤暗則米貴諺曰射的白斛一百射的玄斛一千夏侯曽先志曰此山有石㠶壁立臨川湧石亘山遙望芃芃有似張㠶也下有懸巖名爲射堂傳云仙人常射於此使白鶴取箭此是㑹稽東峯郡國志曰山上有草莖赤葉青人死覆之便活山海經曰㑹稽之山四方上多金玉下多碔砆上有禹冢及井天台山臨海記曰天台山超然秀出山有八重視之如一㠶髙一萬八千丈周廽八百里又有飛泉懸流千丈似布故登眞隱訣云此山有桐柏後四明東南三百里啓蒙記注曰天台山去人不逺路經福溪溪水梁險清冷前有石橋路逕不盈尺長數十丈下臨絶冥之澗唯忘其身然後能濟濟者梯巖壁捫蘿葛之莖度得平路見天台山蔚然綺秀列雙嶺於青霄上有瓊樓玉閣天堂碧林醴泉仙物畢具晋隱士白道猷得過之獲醴泉紫芝靈藥神異經曰餘姚人虞洪入山採茗遇一道士牽三青羊引洪至天台瀑泉曰吾丹丘子也聞子善具飲常思見惠山中有大茗可以相給祈子他日有甌犧之餘不相遺也因立奠祀後常與家人往山獲大茗焉晉書曰許邁與王羲之書云自山隂至臨海多有金庭玉堂仙人芝草異苑白㑹稽天台山遐逺自非忽生忘形不能躋也赤城阻其逕瀑布激其衢石有莓苔之嶮淵有不測之深幽明録曰漢明帝永平五年剡縣劉晨阮肇共入天台山取糓皮迷不得返經十餘日粮食之盡飢餒殆死遥望山上有一桃樹大有子實而絶巖邃澗了無登路攀葛乃得至噉數枚而飢止體充復下山持杯取水欲盥漱見蕪菁葉從山腹流岀甚鮮新復一杯流出有胡麻糝相謂曰此必去人徑不逺度山出一大溪溪邊有二女子姿質妙絶見二女人持盃岀便笑曰劉阮二郎捉向所失流杯來晨肇旣不識之二女便呼其姓如似有舊相見忻喜問來何晚耶因要還家家筒瓦屋南壁及東壁下各有一大牀皆施絳羅帳角懸鈴上金銀交錯牀頭各十侍婢便勑云劉阮二郎經渉山阻向雖得瓊實猶尚虚弊可速作食有胡麻飯山羊脯甚羙食畢行酒有群女來各持三五桃子笑而言賀汝壻來酒酣作樂劉阮忻怖交并至暮令各就一帳宿女往就之言聲清婉令人忘憂至十日後欲求還去女云君巳來是宿福所牽何復欲還耶遂留半年氣候草木是春時百鳥鳴呼更懷土求歸甚苦女曰當如何遂呼前來女子有三四十人集㑹奏樂共送劉阮指示還路旣出親舊零落邑屋全異無復相識問得七丗孫傳聞上丗入山迷不得歸孔靈符㑹稽記曰赤城山土色皆赤岩岫連沓狀似雲霞懸霤千仞謂之瀑布飛流灑散冬夏不竭山谷絶澗峥嶸無底長松蔓藟幽藹其上又曰赤城山内則有天台靈嶽玉室璿臺又曰天台山舊居五縣之餘地五縣者餘姚鄞句章剡始寜也孫綽天台山賦曰濟楢谿而直進落五界而迅征啓蒙記曰天台山石橋路徑不盈尺長數十歩至滑下臨絶溟之澗續捜神記曰㑹稽剡縣民袁栢桹碩二人獵經深山重嶺甚多見一群山羊六七頭遂經一石橋橋甚狹而峻羊玄桹等亦隨渡向絶崖崖正赤壁立名曰赤城上有水流下廣狹如疋布剡人謂之瀑布羊徑有山穴如門豁然而過旣入内甚平敞草木皆香有一小屋二女子住中年皆十五六容色甚羙着青衣一名瑩珠見二人至忻然云早望汝來遂爲室家忽二女出行云復有得壻者往慶之曵屐於絶巖上行琅琅然二人思歸潜去歸路二女巳知追還乃謂曰自可去乃以一腕囊與桹語曰愼勿開也於是得歸後出行家人開其囊囊如蓮花一重去復一重至五盡中有小青鳥飛去桹還知此悵然而巳後桹於田中耕家依常餉之見在田中不動就視但有皮殻如蟬蛻也茅山茅君内傳曰句曲山秦時名爲華陽之天三茅君居之因而爲名外有金山因壇爲號矣周時名其源澤爲句曲之穴案山形曲折後人名爲句曲之山山間有金陵之地四十七八頃是金壇之地肺也居其地必得度丗許邁别傳曰延陵之茅山是洞庭西門潜通五岳茅山記曰大茅山獨髙處玄帝命東海神埋大銅鼎於山頂深八尺上有盤石鎭之顓頊水徳故號玄帝又曰秦始皇三十七年遊㑹稽還於此山北埋白壁一雙深七尺李斯刻篆壁文云始皇聖德平章山河廵狩蒼川勒名素壁又曰王莽地皇三年七月遣使者章邕陳獻銅鍾五口黄金百鎰贈之於三茅君又曰中茅山其山獨處司命君埋玉門丹砂六千斤鎭於此山深二丈上有盤石鎭之其山左右泉流下皆小赤色飲之延年益壽左眞人就司命乞得一十二斤以合九華丹山頂石壇石按香爐今存今三陽百姓聞多有長壽者蓋太陽北陽朱陽三材耳又曰小茅山漢光武帝以建武元年三月遣使呉倫賫金五十斤陳獻三茅君今山頂有埋金處存焉上有聚石又曰開成中髙修女眞侯仙姑絶糓六十餘年壽逾百歲常棲息此山入洞府獲覩徴祥又曰咸通中東海蓬萊觀龔道者𥘉入此山斷榖茹芝十餘年後因正月朔旦焚香洞門恍惚之間得入洞中經由一十三日備見洞府巖壁山川星辰日月靈異難詳又曰昔仙人捧一大石臨嶮峻是謂神設一人推之若欲崩墜百人推之亦復如故眞誥曰中茅前一長嶺直抵大茅山後古多積金寳故因此著名貞白依東流水合神丹遺壇竈存疊玉峯大茅山東南三山積疊亦有洞穴俗多呼疊石石與玉猶爲同類山作三角又呼三角山殊無影響今去葛仙翁壇相近廬山廬山記曰山髙二千三百六十丈周廻二千五十里東南三十二里張僧鑒㝷陽記云匡俗周武王時人屢逃徴聘結廬此山後登仙空廬尚在弟子等呼爲廬山又名匡山蓋稱其姓又接豫章匡俗字君孝父共鄱陽令吴芮佐漢定天下封俗鄱陽廬君兄弟七人皆好道術遂寓精爽於洞庭之山故丗謂廬山漢武帝南廵親見神靈封俗爲文明公一云匡俗漢人一云周武時人未知誰是逺法師廬山記曰山海經曰廬江天子都有匡俗先生者出自殷周之際隱遁避丗潜居其下或云俗受道於仙人而共遊其嶺遂記室懸岫即巖成館故時人謂其所止爲神仙之廬西南有石門似雙闕壁立千餘仞而瀑布流焉述異記曰廬山上有三石梁長數十丈廣不盈尺俯眄杳然無底咸康中江州刺史庾亮迎吴猛將弟子登山遊觀因過此梁見一老公坐桂樹下以玉杯承甘露與猛猛遍與弟子又進至一處見崇臺廣厦玉宇金房琳琅焜燿煇彩眩目多珎寳玉器不可識見數人與猛共言若舊相識周景式廬山記曰登廬山望九江以觀禹之跡其兹峯乎東南隱諸嶺不得駢曯自廬山人迹所曁逈望無後出此者毎雨其下成潦而上猶皎日逺法師遊山記曰自託此山二十二載凢再詣石門四遊南嶺東望香爐秀絶衆形北眺九流神覽視四巖之内猶觀之掌焉傳聞有石井方湖足所未踐張野廬山記曰廬山天將雨則有白雲或冠峯巖或亘中嶺俗謂之山帶不出三日必雨㝷陽記曰廬山頂上有一池水池中有三石鴈霜落則飛山北有五老峯於廬山最爲峻極横隱蒼穹積石巖巉逈壓彭蠡其形勢如河中虞郷縣前五老之形故名之又曰上霄峯在山東南秦皇登之與霄漢相接因名之髙處有刻名之字大如掌背隱起焉僅百餘言又曰王敦誅術士吴猛附舡日行千里追者但見龍附其舡猛令舡人閇目人聞曳撥林木之聲懼而開目龍知人見遂委舟山頂今艑底在紫霄峯上又曰陶潜栗里今有平石如砥縱廣丈餘相傳靖節先生醉卧其上在廬山南神仙傳曰董奉字君異候官人少有道術居此山多救人疾苦種杏於此山十數年杏有十數萬株結實奉乃多倉廪宣言人買杏多少不須來報但一器糓一器杏多者則爲猛獸所害人懼無敢欺者得糓悉賑貧乏羅浮山南越志曰此山夲名蓬萊山一峯在海中與羅山合因名焉山有洞通句曲又有濬房瑶室七十二所裴淵廣州記曰羅浮二山隱天唯石樓一路是可登矣晉中興書曰葛洪上羅浮山中錬丹在山積年忽與廣州刺史鄧岱書云當欲逺行岱得書狼狽而洪巳亡顔色如平生體輕弱如空衣時咸以爲神仙茅君内傳曰羅浮山之洞周五百里名朱明燿眞之天羅浮山記曰羅羅山也浮浮山也二山合體謂之羅浮在層城博羅二縣之境有羅水南流注于海舊說羅浮髙三千丈長八百里有七十二石室七十二長溪神湖神禽玉樹朱草相傳云浮山從㑹稽來今浮山上猶有東方草木又曰鮑静字子玄上黨人愽究仙道爲南海太守晝臨民政夜來羅浮山騰空徃還裴淵廣州記曰羅山隱天唯石樓一路時有閑遊者少得至山際大樹合抱極目視之如薺菜在地山之陽有一小嶺云蓬萊邊山浮來著此因合號羅浮山名山略記曰羅浮山有阿育王塔三十二所雜道書南海郡傳曰羅山諸仙人所遊之山也惡人不得妄上惡人上此山有獸即擊之投於巖下蔣山輿地志曰蔣山舊名金陵山因此山立名金陵徐爰釋問曰諸葛亮以爲鍾山龍盤即蔣山也金陵圖曰後漢末蔣子文爲秣陵尉逐盗鍾山北爲賊傷額而死常謂青骨死當爲神至呉大帝下都子文乗白馬慘搔頭執白羽見形故令史白呉王爲立廟不尓當百姓大疫大帝猶未信又翊日見於路當令飛蟲入人耳後如其言帝乃立廟鍾山封子文爲蔣侯改爲蔣山即此是也沈約宋書云蕭思話領左衛常從太祖登鍾山北嶺石上彈琴因賜以銀鍾酒謂曰相賞有松石間意焉梁書曰武帝時旱甚詔於蔣山神求雨十旬不降帝怒命載荻焚廟并其神影白日開㓪將起火當神上忽有雲如繖蓋須臾驟雨臺中宫殿皆自震動帝詔使停山謙之丹陽記曰京師南北並有連嶺而蔣山獨崖崫峻異其形象龍實楊都之鎭也孫權葬山南因爲名號曰孫陵又曰出建陽門望鍾山之與覆舟似上東門首陽之與北邙也金陵地記曰秦始皇時望氣者云金陵有天子氣乃東廵埋金玉雜寳於鍾山仍斷其地更名曰秣陵又曰蔣山夲少林木東晉令刺史罷還都種松百株郡守五十株又曰周顒字彦倫隱居蔣山出爲臨海令還罷都欲游舊居孔稚珪作北山移文以譏之曰鍾山之英草堂之靈馳煙驛霧勒移山庭九疑山山海經曰九疑山舜所葬爲永陵在長沙零陵界秦始皇三十七年十一月行至雲夢望祀虞舜於九疑山漢書曰武帝元封五年南廵狩至於盛唐望祀虞舜於九疑山山海經曰南山蒼桐之丘蒼桐之淵其中有九淵焉舜之所葬在長沙零陵界湘中記曰九疑山在營道縣九山相似行者疑惑因名九疑盛弘之荆州記曰九疑山盤基數郡之界連峯接岫競逺争髙含霞卷霧分天隔日郡國志曰九疑山有九峯一曰丹朱峯二曰石城峯三曰樓溪峯形如樓四曰娥皇峯峯下有舜池池傍春月百鳥生卵人取之則迷路致本處可得還五曰舜源峯此峯最髙上多紫蘭六曰女英峯舜墓於此峯下七曰簫韶峯峯下即象耕鳥耘之處八曰紀峯馬明生遇安期生授金液神丹之處九曰紀林峯周義山字秀通開石凾得李山經讀之得仙也有九水七則流歸嶺北二則翻注廣南淮南子曰九疑之南陸事寡而水事多王歆之神境記曰九疑是舜之葬處也有青澗中有黄色黄蓮花芳氣竟谷此山之表復有二峯望之乃似人形映出雲端如玉積髙於諸山頂有飛泉如帶舜廟在山之陽玉笥山福地記曰此山土地肥美冝糓辟兵又天監起居注云廬陵太守王希聃於此山龍淵獲劒二口大眞白龜山經曰夲名群玉山胚渾𥘉分此山積五色氣而成形覩若群玉之狀皆虚無之貌浮焉至炰犧氏之時山乃堅實委地變爲五色遂號爲群玉山至夏殷之丗人多採其玉百靈慮損其山形遂化爲五色土石而生叢木今溪澗之中五色碧赤之石皆古玉變也玉笥山記曰漢武好仙察衆山之跡知此山爲靈感之司遂於山頂致降眞壇日夕祈禱天乃降白玉笥置壇上武帝遣使取至其壇側飄風大振卷玉笥而去因封爲玉笥山又漢武時邑民伐材於山爲廨館闕殿中梁一條邑民相謂曰欲精仙館在其梁棟未可以凢木爲之經數旬未獲忽一衣震雷風烈天降白玉梁一條光彩瑩目至今下有玉梁觀至魏武時遣人取之至其山門亭午之際雷霆大震化爲白龍擘煙霧而去晉永嘉中有人見在都木巖下梁黄門侍郎蕭子雲聿來棲上兼撰立館碑經五載忽有一人來謂之曰館之東北有洞曰都木坑水自東注可以乆居矣子雲遂徙家居之後全家隱洞中不知所之大暦𥘉有道士謝修通者冝春人也此山不出凢四十年如野人後遇一人引入溪源於溪中得一碑長三尺乃蕭侍郎清虚之館碑更行行半里見宅基古塼瓦石皆異遂結庵居之長慶𥘉入都木坑偶見一宅重扉湏臾有一青衣童子招修通入見一人紫綬峩冠珮劒立堂之左一人碧綬素簡立堂之右童子曰左者蕭君右者梅君即梅福也通乃叩頭再拜求住修通好食小䔉二君子曰子乃葷腥之人安能住此賜修通嘉禾五穗松葉半斤令頓服之服之中半二君乃令歸精神似不足眼目睢盱門人相謂曰師修行不出凢七十年爲邪氣所亂大道何昧乎通至寳暦𥘉夢人告曰造一精舎待君旣寤曰旦日我當死矣七日而卒門人求備棺櫬空見衣冠而巳年九十八太平御覽卷第四十一
