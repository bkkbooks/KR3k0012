front:
  text: 太平御覧卷第四百七
  hash: sha256:3f9da419d615df135bb97ee492cd0ecff00a9896aba488151cb07904dbf4863f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_407-1a}
body:
  text: 人事部四十八交友二范曄後漢書曰孔融宙之子也十歳從父詣京師時河南尹李膺簡重勑外云自京非當世才藝英賢通家子孫輙不得進融故造其門云我與公積代通家子孫膺乃召見問父祖甞與僕有恩舊曰然吾先君孔子與君先人李老君同徳比義而相師友融與君豈非積代通家也衆竒之又曰第五倫始以營長詣郡尹鮮于褒見而異之署爲吏後褒坐事左轉髙唐令臨去握臂訣曰恨相知晚又曰肅宗始脩古禮巡狩方岳崔駰上四廵頌帝歎之謂侍中竇憲曰知崔駰乎對曰班固數爲臣說之然未見帝曰公愛班固而忽崔駰葉公之好龍也可試見駰候憲憲倒屣迎笑謂駰曰吾受詔交公何得薄我哉遂揖入也又曰鍾皓字季明潁川長社人皓少以篤行稱同郡陳寔年不及皓皓引與爲友又曰張叔升字彦真陳留尉氏人也有大志歎曰人生於世白駒過隙耳安能曲道媚世俗哉守外黄令遇黨錮去官道逢友人班荆而語曰今闕下閹䆠專權因相向而泣有老父過之曰嗟乎二大夫何泣之悲龍不隱鮮鳯不藏翼一世網羅泣將何及二人欲與之言不頋而退升竟以黨錮下獄死又曰任末字叔夲遊京師教授友人董奉徳於洛陽病亡末躬推車載奉徳致於墓所由是知名也又曰梁鴻友人髙恢字伯逹少好老子隱華隂山及鴻東遊思恢作詩逺不復相見恢亦髙抗終身不仕又曰陳蕃李膺之敗何顒與蕃膺善遂爲官者所䧟乃改名姓亡匿汝南間所至皆親其豪傑有聲荆䂊之域袁紹慕之私與往來結爲奔走之交又曰孔奮字君魚扶風茂陵人也守姑臧長治貴仁平太守梁統深相敬待不以官屬禮之常迎於大門引入見母又曰李爕字徳公所交皆捨短取長好成人之美潁川荀爽賈彪雖俱知名而不相能爕並交二子情無適莫世稱其正又曰王允字子師同郡郭林宗一見竒之曰王生一日千里王佐才也遂定交謝承後漢書曰范式爲荆州刺史友人南陽孔嵩貧有親老乃變名姓傭於新野縣縣吏遣嵩爲式導騶式見而識之呼嵩把臂謂曰子非孔仲山耶對之歎息式勑縣代嵩嵩以傭未竟不肯去又曰陳蕃旣𬒳害友人陳留朱震時爲銍令聞而弃官哭而収葬又曰許敬字鴻卿汝南人與同郡周伯靈爲交友伯靈早亡卿育飬其子又曰馬寔字伯騫勤結英雄所欲友接負笈荷檐不逺萬里山陽王暢未仕時寔慕嵩名往見之届暢門投刺欲不肯見使從者拒之云行歴未旋寔留連日日往伺之謂從者曰夫孝子事親行不踰日而至今不歸非孝子也欲待與相見如㓙於路往而不友哭之以爲死交暢聞其言歎息壯志因執其手揖引與入美談畢請入見母飲宴定好而別寔臨退執暢手訣曰太上立徳其次立功幸俱生盛明之世危塼瓦之姿託爲丈夫當建名後載不可爲空生徒死之物穢天壤之間又曰雷義字仲公豫章人舉茂才讓友人陳重字景公刺史不聽義遂陽狂𬒳髪走不應命郷里爲之語曰膠􅃮自謂堅不如雷與陳又曰范式字巨卿山陽金郷人少遊太學與汝南張劭爲友劭字元伯二人並告歸郷里式謂元伯曰後二年當還將過拜尊親見孺子焉乃共尅期至日巨卿果到升堂拜母飲盡懽而別後元伯寢疾篤同郡郅君章啇子微晨夜省視元伯臨盡曰恨不見死友尋卒式夢元伯玄冕垂纓而呼曰吾死當以某日葬子豈能相及式覺而悲赴之便服朋友之服投其葬日未届而䘮巳發引至壙將窆而柩不肯進其母撫之曰元伯豈有望也停柩移時見有素車白馬哭而來母曰必巨卿也旣至叩䘮言曰行矣元伯死生異路永從此辭㑹葬者千人皆揮涕式執紼引柩乃前進式留止塚次修墳樹而退又曰范式甞至京師受業太學時諸生長沙陳平子同在學與式未相見而平子𬒳病曰山陽范式列士也可託死吾殁但以尸埋巨卿户前乃裂素爲書遺巨卿旣終妻從其言式行適還有書見瘞愴然感之向墳揖哭爲死友乃營護妻兒身自送喪於臨湘未至四五里乃委素書於柩上哭別而去袁山松後漢書曰吴祐放猪長垣澤中誦經而行北海公沙穆遊太學資乏變服爲傭與祐賃舂遂爲交於杵臼之間華嶠後漢書曰洛陽慶鴻慷慨好義廉范與爲刎頸之友時人稱曰前有管鮑後有慶廉司馬彪續漢書曰李膺性簡亢無所交接唯以同郡荀淑陳寔爲時友東觀漢記曰楊政甞過馬武稱疾見政對几據牀欲令政拜牀下入户前排武徑上牀坐武恨言語不懌政因把武臂責之曰卿蒙恩稱蕃臣不思求賢報國而驕天下英俊㑹信陽侯至責數武合爲朋友也又曰尹敏字幼季與班彪相厚毎相興談常對案不食晝至暝夜即徹具又曰朱暉同縣張堪有名徳毎與相見常接以友道暉以堪宿望盛名未敢安之堪至把睴臂曰欲以妻子託朱生暉舉手不敢荅堪後仕爲漁陽太守暉自爲臨淮太守絶相聞見時南陽饑堪妻子貧窮暉乃自往候視其困分所有以賑給之又曰郅惲友人董子張者父先爲郷人所害及子張病將終惲往候之子張病涕視惲不能言惲曰吾知子不悲天命而病讎不復也子張但目擊而已惲即起將客遮仇人取其頭以示子張見而氣絶又曰趙喜爲赤眉兵所圍迫急乃亡走與友人韓仲伯等數十人携小弱越山出武閞仲伯以婦色美慮有强暴者而已受其害欲棄之於道喜怒不聽以泥塗仲婦面載以鹿車身推之毎逢賊欲逼奪喜輙言病以此得免又曰閔仲叔恬靜養神弗役於物與周黨相友黨每過仲叔共含菽飲水又曰應順字仲華汝南人少與同郡許敬善敬家貧親老無子爲敬去妻更娶魏志曰荀攸彧從弟也太祖令曰孤與荀公逹周旋二十餘年𥘉無毫毛可非者又曰公逹賢人也所謂温良恭儉讓以得之孔子稱晏平仲善與人交乆而敬之公逹即其人也又曰曹真字子丹太祖族子也真少與宗人曹遵郷人朱讃並事太祖遵讃早亡真愍之乞分所食邑封遵讃子詔曰大司馬有叔向撫孤之仁篤晏嬰乆要之分君子成人之羙聽分真邑賜遵讃子爵閞内侯各五百户又曰崔琰字季珪清河東武成人也少撲訥好繫劒尚武事琰友人公孫方早卒琰撫其孤息若已子又曰陳矯字季弼爲郡功曹過太山太山守薛悌異之結爲親友戯矯曰以郡吏交二千石不亦可乎悌後爲魏郡及尚書令皆代矯魏略曰趙歧字臺卿藏匿避難賣餅市中孫嵩見歧非常人呼而問之遂與俱歸嵩先入白母曰岀行乃得死友迎上堂享之極欣藏歧複壁中又曰華歆字子魚平原人靈帝時與北海邴原管寜俱遊學三人相善故時人號三人爲龍謂原爲龍腹寜爲龍尾歆爲龍頭魏氏春秋曰稱康寓居河内與之遊者未甞見其喜愠之色與陳留阮籍河内山濤向秀籍兄子瑯瑘王戎沛人劉伶相與友善遊於竹林號曰七賢吴志曰孫䇿創業命張昭爲長史撫軍中郎將升堂拜母如比肩之舊文武之事一以委昭又曰吴範字文則與親故接有終始素與魏滕同邑相善爲交滕甞有罪吴王權責怒甚敢有諌者處死範謂滕曰與汝偕死滕曰死而無益何死範曰安能慮此坐觀汝耶乃髠頭自縛詣門下使鈴下以聞鈴下不敢曰必死不可範曰汝有子耶曰有曰使汝爲吴範死子以屬我鈴下諾力排閤入言未卒權大怒欲投以㦸逡廵出走範因突入叩頭流血言與涕并良乆權意釋免滕又曰周瑜長壯有姿皃孫堅議興兵討董卓徙家於舒堅子䇿與同年獨相友善瑜推道南宅以舎䇿升堂拜母有無共通又曰魯肅字子恭臨淮東城人周瑜知其竒也遂相親結定喬札之分又曰魯蕭代周瑜之當陸口過吕蒙屯下肅意尚輕蒙或說肅曰吕將軍功曰顯不可以故意待也君冝順之肅遂往詣蒙酒酣蒙問肅曰君受重任與關羽爲隣將何計略以備不虞因爲晝五䇿肅於是越席就之拊其背曰吕子明吾不知卿才略所及乃至於此遂拜蒙母結友而别恕吴録曰張温字惠怒英才瓌偉遂以禮躬延見召對詞雅淹潤帝改容前席拜中郎聘蜀與諸葛全結金蘭之好焉蜀志曰馬謖音縮字㓜常才氣過人好論軍計謖臨終與諸葛亮書曰明公視謖猶子謖視明公猶父願深殛鯀興禹之義使平生之交不虧此謖雖死無恨於黄泉也于時十萬之衆爲之流涕亮自臨祭待其孤遺若平生又曰張裔字君嗣蜀郡成都人也少與犍爲楊恭友善恭早死孤遺未數歳裔分居事恭母如恭息長大爲之娶妻買宅産業使立門户又曰楊戯字文然爲人篤於舊故與巴西韓儼黎韜童㓜相親後儼痼疾廢頓韜無行見損戯經紀振䘏恩好如𥘉晉書曰王龔字孝伯清操過人才地自負恒有宰相之望與王沉齊名友善又曰桓温字元子宣城太守彛之子也與庾翼友善恒相期以寜濟之事翼薦温於明帝曰桓温少有雄略願勿以常人遇之又曰陸機吴人也文章冠代至太康末與弟雲造太常張華華素重其名如舊相識曰伐吴之役利獲二俊又曰周馥字祖宣馥少與友人成公簡齊名俱起家爲諸王友學又曰紀瞻慎行好施老而彌篤少與陸機兄弟相親善及機𬒳誅瞻䘏其家及嫁女資送同於所生又曰鄭衮字叔林滎陽開封人也少孤隨叔父渾避難江東時華歆爲豫章太守渾往依之歆素與衮父㤗友善撫養衮如已子晉中興書曰郗超所交皆一時秀美雖寒門後進亦抜而友之死之日貴賤操筆爲誄者四十餘人其爲物所宗貴如此又曰胡母輔之字彦國少髙名有王尼者出寒微輔之庾顗王澄等共爲美談尼以門役送護軍府輔之等乃齎羊酒詣門吏以聞護軍曰諸名士以羊酒來當有以旣入先過尼尼已給府養馬輔之等坐廐下與尼炙羊飲酒而去竟不見護軍大驚乃與尼長假又曰東甌沃壤名士多樂居之太傳謝安未仕時亦居東土共王羲之孫綽李充許詢道林皆文義冠世共相友昵又曰魯公賈謐叅管朝政京洛人士無不傾心渤海石崇之徒年皆長謐並以文才降節事謐共相朋昵號曰二十四友又曰羊曼字祖延頽縱宏狂飲酒誕節與温嶠庾亮阮放桓彛同志友善並中興名臣時州里稱陳留阮放爲宏伯髙平郗鑒爲方伯太山胡母輔之爲逹伯濟隂卞壷爲裁伯陳留蔡謨爲朗伯陳留阮孚爲誕伯髙平劉綏爲秀伯而曼爲黠伯凢八伯蓋懝古之八雋又曰薛兼與同郡紀瞻廣楊閔鴻吴郡顧榮㑹稽賀循同志友善𥘉入洛司空張華見而歎息曰南金也又曰華譚所友人袁甫者字公胄歴陽人少能言議與譚齊名友善太安中入洛譚與甫書曰誠以枯澤非應龍之淵棘林非鸞鳳之窟昔食其自匿監門非髙祖不長揖孔明躬稼南陽非劉氏不馳驅望雲雷而遇翮見鴻漸之輕羽瞻長塗而髙鳴知騏驥之迅足又曰王濛少而不覊不爲郷閭所齒晚節尅修遂有風流羙譽與沛國劉恢齊名友善時人以濛比袁耀卿恢比苟奉倩何法盛晉中興書曰庾翼字雉恭時京兆杜乂陳郡啇浩並才名冦世而翼弗之重每語人曰此輩宜束之髙閤俟天下平然後議其所任耳唯與桓友善在揔角之中便相期終始又曰肅祖之在東宫與温嶠庾亮並布衣之好晉陽秋曰陸抗羊祐魏邊將推喬劄之好抗甞遺祐酒祐亦饋抗藥各推心服之太平御覽卷第四百七
