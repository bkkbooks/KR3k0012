front:
  text: 太平御覽卷第二十四
  hash: sha256:b73ae2d956ff88bea88dc9abd5ee93bcca7a4705e66c96960f6d125cd13f6cb0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_024-1a}
body:
  text: 時序部九秋上釋名曰秋者緧音秋也緧迫萬物使得時成也又曰七月謂之夷則何夷者傷也則者法也言萬物始傷𬒳刑法也又曰八月謂之南吕何南者任也言陽氣尚有任生薺麥也說文曰天地反物爲秋字從禾燋省聲易曰兊正秋也萬物之所說也王弼注曰秋萬物成所以恱也書曰分命和仲宅西曰昧谷寅餞納日平秩西成霄中星虚以殷仲秋厥民夷鳥獸毛毨毨理毛更生整理也詩曰秋日凄凄百卉具腓腓病也凉風用事而衆草皆病興也貪殘之政行而万民因病又曰七月流火流下也火星中而寒暑退又曰彼采蕭兮一日不見如三秋兮禮曰七月之節日在張立秋爲七月之節昬尾中曉婁中斗建申位之𥘉其日庚辛庚辛属金主秋故云其日庚辛其帝少皡其神蓐収昔少皡氏以金徳繼天而王故爲秋帝金正曰蓐收故蓐収爲金神佐少皡於秋其蟲毛西方白虎毛蟲之長凢有毛之類昔属於金故曰其蟲毛其音啇三分微一益以生啇商數七十二属金以其濁次宫臣之象也秋氣和則啇聲調樂記曰啇乱則陂其官壞律中夷則七月氣至則夷則之律應夷則者大吕之所生三分去一管長五寸六分其數九金生數四成數九但言九者㪯其成數其性義其事言洪範五行傳曰西方金其性義其事言言曰從從作者王者言從義和則神龜至其味辛其臭腥凢臭味辛腥者皆属於金其祀門祭先肝秋隂氣出祀之於門外隂也祭先肝者秋爲隂中於藏值肝凢祀門爲俎先進肝立秋之日涼風至後五日白露降後五日寒蟬鳴天子居緫章左个乗白輅駕白駱載白旂衣白衣服白玉食稻與魚其器廉以深緫章左个當申上之室乗白輅衣白衣從秋色也食稻與魚秋味之冝也其器廉以深象金傷害物入藏太史以先立秋三日謁於天子曰某日立秋盛德在金天子乃齋立秋之日天子親率諸侯大夫以迎秋於西郊迎秋爲祖白帝白招拒於西郊以少皡配坐以蓐収太白三辰七宿從祀還乃賞軍帥武人於朝乃命將帥選士勵兵簡練傑俊專任有功以征不義詰誅暴慢以明好惡順彼逺方詰謂問其罪順禉服也又曰七月中氣日在張處暑爲七月中氣昬箕中曉夘中斗建申位之中處暑之日鷹乃祭鳥後五日天地始肅後五日禾乃登修宫室坯垣墻爲經夏雨損立秋後修𥙷又曰八月之節日在翼白露爲八月之節昬南斗中曉畢中斗建酉位之𥘉律中南吕八月氣至則南吕之律應南吕者大蔟之所生三分去一管長五寸三分其日其音其數並同孟秋白露之日鴻鴈來後五日玄鳥歸後五日羣鳥養羞是月也養衰老授几杖行糜粥飲食行猶鷄也天子乃儺以達秋氣此儺儺陽氣恐陽暑至此不衰害亦將及人故儺以通秋氣方欲助秋故不磔犬命樂正習吹春夏尚舞秋冬尚吹習之爲將釋奠又曰八月中氣日在軫秋分爲八月中氣昬南斗中曉東井中斗建酉位之中秋分之日雷乃收聲後五日蟄蟲坯户後五日水始涸是月也祀夕月於西郊秋分日祭之命有司享壽星於南郊秋分日祭壽星於南郊壽星南極老人星日夜分則同度量平權衡因秋分晝夜平則正之祭馬社謂仲秋祭馬社於大澤用剛日又曰九月之節日在角寒露爲九月之節昬牽牛中曉東井中斗建戍位之𥘉律中無射九月氣至則無射之律應無射者夾鍾之所生三分去一管長四寸九分其日其音其數並同孟秋寒露之日鴻鴈來賔後五日雀入大水化爲蛤後五日菊有黄花是月也命有司伐蛟取鼍登龜取黿四者甲類秋乃堅成故是月登取又曰九月中氣日在氐霜降爲九月中氣昬湏女中曉栁中斗建戍位之中霜降之日豺乃祭獸後五日草木黄落後五日蟄蟲咸俯是月也霜始降則百工休謂膠膝之作停天子嘗稻先薦寢廟稻𥘉熟藏帝藉於神倉祗敬必飾重祭祀之榖是月也乃伐薪爲炭伐必因殺氣又曰秋歛冬藏義也又曰西方者秋秋之爲言愁也周禮曰大司馬之職仲秋教理兵掌建邦國之九法以佐王平邦國又曰司裘掌爲大裘以供王祀天之服仲秋獻良裘季秋獻功裘又曰籥章氏掌仲秋擊土鼓吹豳詩以迎寒氣鄭玄注曰迎寒以夜來諸侯也又曰司矢仲秋獻矢箙弓弩成於秋矢箙成於堅箙盛矢器也以獸皮爲之箙音服又曰南吕酉之氣八月建焉而辰在壽星又曰秋見曰覲覲之言勤也其勤王之事大行人云秋覲以比天下功也又曰秋獻龜魚又曰司爟音貫掌行火之政令季秋内火九月黄昏心星伏在戍上使民内傳曰歳云秋矣我落其實而取其材爾雅曰秋爲白藏又曰秋曰收成又曰秋爲旻天李廵日秋万物成熟皆有文章郭璞云旻愍也万物凋可愍又曰秋獵曰獮獮殺也順秋氣漢書曰太白西方秋金義也言也義虧言失逆秋令傷金氣罰見太白又曰秋如淳曰音樵也物歛乃成熟也漢書曰八月賜大臣羊酒以助衰氣後漢書曰范式字巨卿與汝南張元伯爲友二人春别京師以暮秋爲期元伯以九月十五日殺雞以待巨卿母曰相去千里汝何信之也言未卒而巨卿至相隨上堂再拜母極歡恱續漢書曰仲秋祀老人星于國南郊孟康漢書義律曰春曰朝秋曰請如古諸侯朝聘也師古曰請音才性反吴王濞不朝使人爲秋請是也晉書曰袁宏孤貧運租自業謝尚時鎮牛渚秋夜乗月泛江㑹宏在舫中諷詠遣問即其詠史之作尚迎昇舟與談申旦不寐自此名譽日茂梁書曰朱异除中書郎時秋日始拜有飛蟬正集异武冠上時咸謂蟬珥之兆焦贑易林曰秋風生哀花落悲心易通統圖曰日行西方白道曰西陸尚書太傳曰萬物非秋不収又曰寅餞入日辯秩西成傳曰天子以秋命三公將率選士厲兵以征不義决獄訟斷刑罰趣收歛以順天道以佐秋殺又曰西方者何也鮮方也鮮訊也訊者始入之貌始入者何以謂之秋秋者愁也愁者物方愁而入也故曰西方者秋也秋收歛貌尚書中候曰周文王爲西伯季秋之月甲子赤雀㗸丹書入豊鄗止于昌户乃拜稽首受取曰姬昌蒼帝于亡殷者紂也尚書考靈曜曰政失於秋太白出入不常尚書考靈曜曰虚星爲秋候昴星爲冬期隂氣相佐德乃弗邪子助母母合子符虗星北方宿也昴星西方宿也隂稱母也毛詩傳曰壯士悲秋感隂氣也詩含神霧曰秦地處仲秋之位男懦弱女髙膫膫明也落瀟切白色身音中啇其言舌舉而仰聲清而揚三禮義宗曰九月大享帝於明堂之中孝經云宗祀文王於明堂是也三禮義宗曰秋曰庚辛者庚更也辛新也言物皆改更而新也又曰周祫以秋者萬物新成可以奉薦宗廟故合先祖之神而祭之故祫冝在秋也又曰九月寒露爲節者九月之時露氣轉冷故謂之寒露節霜降爲中露變爲霜故以霜降爲中春秋繁露曰秋之爲言猶湫湫者憂悲之狀又曰秋怒氣故殺春秋元命包曰堯爲天子季秋下旬夣白帝遺吾鳥喙子其母索扶始升髙丘白帝上有雲如虎感巳生臯陶索扶始問之如尭言又淮南子云臯陶鳥彖春秋感精符曰霜殺伐之表季秋霜始降鷹隼擊王者順天行誅以成肅殺之威穆天子傳曰仲秋甲戍天子東遊次雀梁一宿爲舎再宿爲信過信爲次蠹書于羽陵謂暴書蠹蟲因曰蠧書也聖賢記曰馮夷弘農潼郷隄首里人服八石得道爲水仙河伯又一說華隂人八月上庚日渡河溺死天帝署爲河伯荆楚歳時記曰八月十日四民並以朱點小兒頭名爲天灸以厭疾也又曰以綿綵爲眼明囊赤松子以八月囊承栢樹露爲冝服後世以金薄爲之遞相餉遺西京雜記曰賈佩蘭云在宫時八月四日出彫房北户竹林下圍碁勝者終年有福負者終年疾病又曰漢宗廟八月飲酎用九十牢王子年拾遺記曰漢武嘗以季秋之月泛靈鶂之舟於淋池之上窮夜逹晝以晝達夜於桂臺之下以香金爲鈎縮紉絲爲輪以丹鯉爲餌不踰旬釣一白蛟長三四丈若大虵無鱗甲帝曰非龍也於是付太官爲鮓而肉紫骨清香美無倫詔賜臣下時以上爲神感所獲後更不得續齊諧記曰弘農鄧紹八月朝入華山見一童子以五色囊承取栢葉下露露皆如珠子亦云赤松先生取以明目今八月朝作眼明囊像此也鄧明德南康記曰平固縣有湖中有石鴈浮在湖中毎至秋石鴈飛鳴如候時也莊子曰舜以天下讓善卷曰余立於宇宙之中冬日衣皮毛夏日衣葛絺春耕種足以勞秋收之足以休日出而作日入而息逍遥於天地之間何以天下爲哉入深山莫知其處又曰荆之南有冥靈者以五百歳爲春五百歳爲秋上古有大椿者以八千歳爲春以八千歳爲秋管子曰東方曰歳星其時曰春其氣曰風風生木南方曰日其時曰夏其氣曰陽陽生火西方曰辰其時曰秋其氣曰隂隂生金北方曰月其時曰冬其氣曰寒寒生水管子曰秋三月以庚辛之日發五政一政曰禁博賽二政曰無見五兵之刃三政曰愼旅農趨聚收四政曰𥙷缺坼修垣墻謹門閭五政曰徇時五糓之皆入也又曰歳有四秋春農事旣成農夫賦耜鐵此春之秋夏至蠶纊之所作此夏之秋秋成五糓之所㑹此謂大秋冬營室中女事紡績之所作此謂冬之秋文子曰日月欲明浮雲盖之藂蘭欲茂秋風敗之又曰政失於秋大白出入無常文子曰因春而生因秋而殺所生不德所殺不怨即幾於道矣春秋無心生殺有時人主無爲當罰必當逺違其理近合其道又曰唯神化爲貴精至爲神精之所動若春氣之生秋氣之殺其生也暄然如春物得其生死也肅然如秋物終於死故生不祈報死無歸怨生之死之以其無心也幽求子曰秋風晨厲則慘然多悽抱朴子曰南海之中蕭丘之上有自生火火常以秋起而秋减鄒子曰秋取柞楢之火淮南子曰春氣發而百草生正得秋而萬物成實又曰春女怨秋士悲感物化矣又曰至秋三月青女乃出降霜雪青女乃天神青霄玉女主霜雪又曰一葉落而知天下秋又曰太隂治秋則欲脩備繕兵金徳断割故脩兵也又曰孟秋之月西宫御女白色白采橦白鍾其兵鉞其畜狗八月官尉其樹柘九月官候其樹槐又曰秋爲矩者所以方物也又曰九月失政三月春風不濟濟止也又曰時則曰六合孟春與孟秋爲合仲春與仲秋爲合季春與季秋爲合孟夏與孟冬爲合仲夏與仲冬爲合季夏與季冬爲合孟春始盈孟秋始縮仲春始出仲秋始内二出月播植也内八月收歛也季春大出季秋大内孟夏始緩孟冬始急緩四月陽炎急十月寒肅仲夏至脩仲冬至短夏至北極冬至南極季夏德畢季冬刑畢德畢陽施窮也刑畢隂殺盡也又曰西方金也其帝少昊其佐蓐収執矩而治秋其神爲太白又曰西方之極自崐崘絶流沙沉羽西至三危之國流沙盖在崐崙之西南也石城金室飲氣之民不死之野少昊蓐收之所司者萬二千里其令曰審用法誅必辜備冦賊禁姦邪飾羣牧謹着聚脩城郭𥙷决竇塞蹊徑遏溝瀆擁谿谷守門閭陳兵甲選百官誅不法應金断也鶡冠子曰斗柄西指天下皆秋尸子曰秋爲禮西方爲秋秋肅也萬物莫不肅敬禮之至也啇子曰螟螣春生秋死出而民失食今一民耕而百人食焉螟螣大矣吕氏春秋曰秋早寒冬必暖春多雨夏必旱太玄經曰酉西方也秋也物皆成象而就也有形則復於無形故曰冥也謂物終藏太平御覽卷第二十四
