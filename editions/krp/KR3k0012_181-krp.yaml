front:
  text: 太平御覽卷第一百八十一
  hash: sha256:95a645b930b45fd703d9dad5a88c6c94ab8d2f554cbeb6d85a3f1610a5f17511
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_181-1a}
body:
  text: 居處部九第邸屋家舎廬屠蘇附庵第漢書曰髙祖詔列侯食邑者皆賜大第室二千石受小第室注云有甲乙次第故曰第又曰出不由里門面大道者名曰第史記騶奭者齊諸鄒子亦頗采騶衍之術以紀文於是齊王嘉之自如淳于髠以下皆命曰列大夫爲開第康莊之衢髙門大屋尊寵之覽天下諸侯賔客言齊能致天下賢士也漢書霍去病益貴上爲治第辭曰匈奴不滅無以家爲又曰髙后徳夏侯嬰脫孝惠魯元於下邑賜北第一上曰近我以尊異之注云第以北爲尊又曰平恩侯許伯入第司隷校尉蓋寛饒徃賀酒酣仰視屋曰羙哉冨貴無常忽則易人此如傳舎所閱多矣唯謹慎爲得乆居侯可不誡哉晉書青溪橋東南臨淮水周三里九十歩太宗舊第後爲會稽文孝王道子宅謝安薨後道子領楊州刺史於此理事時人呼爲東府至是築城以東府爲名其城東北角有靈秀山即道子宅内山嬖臣趙牙所築也齊書劉瓛姿狀纎小而儒學冠於當朝京師貴遊士子莫不下席受業瓛性謙下不以髙名自居住檀橋有屋數間上皆穿漏學徒不敢斥呼爲青溪焉竟陵王子良親徃謁表世祖爲瓛立館以楊烈橋故主第給之生徒皆賀瓛曰室羙豈爲人哉華宇豈吾宅哉未及徙居遇疾卒唐書叚綸兵部尚書綸少任俠落拓不脩細行仕隋左親衛隱太子見而恱之妻以瑯琊長公主舎髙祖之舊第數聞鼔吹之音視之無所覩綸謂主曰聞圖䜟李氏當王命今於第内有此禎祥必而家應籙之徴也又曰張延賞東都舊第在思順里亭館之麗甲於都城子孫五代無所加工時號三相張氏云魏王奏事爵雖列侯食邑不滿萬户不得作第其舎在里中皆不稱宅荀氏家傳曰荀彧字文若太祖旣定兾州爲公起大第於鄴諸將各以功次受居地太祖親游之笑曰此亦周禮六勲之差也文選蜀都亦有甲第當衢向術童隧西京賦北闕甲第當道直啓邸史記曰代王馳入北邸史記封禪書曰方士多言古帝王有都甘泉者其後天子又朝諸侯甘泉甘泉作諸侯邸陸機洛陽記曰百郡邸在洛城中東城下歩廣里中屋說文曰屋居也釋名曰大屋曰廡廡撫也覆也亦謂之正也屋之正大者通俗文曰客堂曰庌五下反聲類曰廡堂下周也釋名曰屋奥也其中温奥易豐卦曰豐其屋蔀其家闚其户閴其無人王弼注云屋藏䕃物也以䕃處極而㝡在外際自藏䕃者也旣豐其屋又覆其家闇之甚也棄其所處而深自藏闚户無人詩鵲巢行露曰誰謂雀無角何以穿我屋又曰於我乎夏屋渠渠注夏大也渠渠猶勤勤也又車轔小戎曰在其板屋亂我心曲注西戎版屋心曲心之委曲也又曰瞻烏爰止于誰之屋周禮冬官廬人曰殷重屋堂脩七㝷崇三尺四阿重屋考工記茸屋三分瓦屋四分注各分其脩以其一爲峻尚書大傳曰武王伐紂觀兵於盟津有火流於王屋化爲赤烏三足禮記曰冨潤屋左傳清廟茅屋昭其儉也又曰宋灾樂嘉爲政火所未至撤小屋塗大屋注大屋難撤故就塗之又曰欒氏乘公門宣子謂趙鞅曰矢及君屋死之鞅用劒以帥卒欒氏退又昭六年傳曰叔孫婼聘於晉一日必葺其牆屋去如始至東觀漢記曰鍾離意爲堂邑令𥘉到無屋意乃岀俸錢作屋民賫柱趣作浹日而成畢爲民士祝曰興功役者令也如有禍祟令當之民大恱又曰王覇建武𥘉連徴不至覇安貧賤居常茅屋蓬户䔧藿不厭然樂道不怠以壽終呉志曰吴儀字子羽爲人不治産業造屋舎纔容足隣家起大宅孫權岀望見起屋左右曰昊儀家權曰昊子羽儉必非也令人親至果是隣舎又曰魚宗爲將軍朱據史將母在營夜雨屋漏宗起涕泣謝母母曰但當勉之何足泣也晉記曰左將軍王廙中宗姨弟也爲母起屋違制上流涕責廙皇甫謐列女傳曰衛農與妻宿客舎遇雷雨妻夢虎齧其足驚起相謂曰我此行未冝天欲戮我夫妻出中夜叩頭屋壞壓殺數十人家語曰孔子厄於陳蔡從者七日不食子貢以貨竊犯圍岀糴於野人得米一石焉顔回仲由炊之壤屋之下有埃塵墨墮飯中顔回取而食之子貢自井望見之不恱以爲竊食吕氏春秋亦載又曰周公居冢宰之尊而猶下白屋之士日見百七十人新語堯舜之人可比屋而封桀紂之人可比屋而誅漢武故事曰上起神屋九間雖崑崙玄圃不之過也又曰武帝四歳封膠東王長主抱膝上問曰兒欲得婦長主指左右長御百餘人皆云不用因指其女問曰阿驕好不笑對曰云好若得阿嬌作婦當作金屋貯之長主大恱乃苦要上遂定㛰漢官典職曰南北宫相去七里中間作大屋複道三行天子案行中央臺官從左右崔凱䘮服節曰禮人君宫室之制爲殷屋殷屋四夏屋也卿大夫爲夏屋隔半以北爲正室中半以南爲堂正室齋室也神異經曰西北金闕北荒有百屋齊長四十丈畫以五色戴延之西征記曰洛陽城有鬰金屋廣志曰大秦國以青水精爲屋郡國誌秦州俗尚氣力不耻㓂盗弓馬射獵以爲工能其居八板爲屋故詩云在其板屋脩我甲兵及車轔轔四鐵小戎皆言田狩之事論衡曰豐屋知名家喬木知舊都鴻文在國聖世之驗又工伎之書起宅蓋屋必擇吉日夫屋覆人形宅居人躰何患害於歳月而必擇之亦如以彰蔽人身者神要之則夫裝車治船亦當擇日世說曰蔡司徒說在洛陸機兄弟住叅佐廨中數間瓦屋士龍住東頭士衡住西頭又曰庾闡作楊都賦成以示庾亮亮云可三二京四三都謝安云不得爾此是屋下架屋耳事事擬學而無不儉狹景陽詩蜘蟵網四屋七啓曰雲屋皓旰音旱閑宮顯敝陶潜集少無適俗韻性夲愛丘山方宅十餘畝草屋八九間劉義恭啓事曰洪恩潭𬒳賜臣息伯􅕛檉屋二間楚詞九歌曰魚鱗屋兮龍堂家說文牖户之間謂之扆其内謂之家易家人有嚴君焉父母之謂也又家人嗃嗃未失也婦子嘻嘻失家節也易家人女正位乎内男正位乎外詩刑于寡妻至于兄弟以御于家邦言文王自家刑國後漢李通嚴毅治家如官庭舎說文曰市居曰舎禮記有客弗能館不問其所舎左傳秦獲晉侯以歸晉大夫反首拔舎而從之注反首亂頭髮反下垂也㧞舎草止也漢書曽城舎班婕妤居之又曰成帝趙皇后女弟絶幸爲昭儀居昭陽舎桓子新論董賢女弟爲昭儀居椒風舎後漢朱祐𥘉學長安帝徃候之祐不得相勞苦而先昇講舎後車駕幸其第帝因笑曰主人得無舎我講乎以有舊恩數蒙賞賴謝承後漢書曰趙昱請處士綦母君公立精舎受公羊傳又曰楊震客居湖縣立精舎家貧常以種藍自業又曰楊竒字公挺震之玄孫少有志節不以家勢爲名交結英彦不與豪右相交通於河南緱氏界中立精舎門徒常二百人又曰陳寔字仲弓詣太學郭林宗陳仲舉爲親友歸家立精舎講授諸生數百人又曰周磐字堅伯𥘉爲安陵令以從弟暢爲司隷縣屬州部換陽平令復換重合令磐巳歴二縣耻復經三城遂去還家立精舎教授守先人冡廬逺方知名又曰張奐字然明弘農華隂人詣太學受業愽通五經隱處在扶風郿縣界中立精舎斟酌法喬卿之雅訓畫誦書傳暮習弓馬魏武令曰孤夲欲自立精舎今遂爲國討賊後漢書張湛稱疾不朝拜太中大夫居中東門侯舎故時人號曰東門君齊書周顒字彦倫汝南城安人也智林道人遺書顒於種山西立隠舎休沐則歸之古今注野人爲貟舎如蝸牛之殻故曰蝸舎廬說文曰廬寄也春夏居秋冬去釋名曰寄此爲廬周禮凡國野之道十里有廬廬有飲食漢書武帝賜嚴助書曰制詔會稽太守君厭承明之廬張晏日承明廬在石渠閣外直宿山曰廬也勞侍從之事懷故土出爲郡吏會稽東接於海南近諸越北抗大江間者闊焉乆不聞問具以春秋對無以從横說華嶠後漢書曰汝南薛苞字孟甞父取後妻憎苞分之出外日夜號泣不能去𬒳歐杖不得巳廬於門外旦入洒㴆進食父怒逐之又廬於里頭晨昏不廢積歳餘父母慙而還之東觀漢記曰耿純率宗族歸光武純兄歸燒家廬舎上以問純純曰恐宗人賔客卒有不同故焚燒廬舎絶其反頋之望上大笑又曰李恂爲武威太守後坐事免無田宅財産居山澤結草爲廬魏略曰楊沛前後宰歴城守不以私計介意後家無餘積無他奴婢占河南席陽亭部荒田二頃分牛廬居止其中魏志曰管寜至遼東乃廬於山谷時避難者多居郡南而寜居北示無迁志晉書征虜將軍石崇河南金谷澗中有別廬冠絶時輩引致賔客日以賦詩諸葛亮表先帝不以臣卑鄙三頋臣於草廬之中諮臣以當世之事郡國誌廬山周武王時有匡俗先生字君孝兄弟七人皆有道術結廬於此仙去空廬尚存故曰廬山皇甫謐髙士傳曰世莫知焦先所出或言生漢末無父母兄弟見漢衰乃不言常結草爲廬冬夏袒露垢汙如泥後野火燒其廬先因露寢遭冬雪大至先祖卧不移人以爲死就視如故洛陽故宮名曰侍中廬在南宮中屠蘇附通俗文曰屋平曰屠蘇廣雅曰屠蘇庵也魏略曰李勝爲河南尹㕔事前屠蘇懷令人治之釋名曰圜屋曰庵庵掩也自覆掩也太平御覽卷第一百八十一
