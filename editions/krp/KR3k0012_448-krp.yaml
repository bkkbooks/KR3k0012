body:
  text: 人事部八十九權謀上說文曰慮難曰謀易曰人謀鬼謀百姓與能言謀爲善謀助之百姓能與巳尚書曰汝則有大疑謀及乃心謀及卿士謀及庶民謀及卜筮將舉事而汝則有大疑先盡汝心以謀慮之次及卿士衆民然後卜筮以决之又曰爾有嘉謀嘉猷則入告爾后于内爾乃順之於外詩曰載馳載驅周爰諮謀禮記曰謀於長者必操几杖以從左傳曰齊師伐我公將戰曹劌請見其郷人曰肉食者謀之又何間焉肉食在位者也一間猶與之位也劌曰肉食者鄙未能逺謀乃入見公與之乗戰于長勺公將鼓之劌曰未可齊人三鼓劌曰可矣齊師敗績又曰楚師背酅而舎酅丘陵之限也晉侯患之聽輿人之誦曰原田莓莓舎其舊而新是謀髙平日原莓莓羙厚貌詩曰周原莓莓堇茶如飴舎其舊而謀新也言仰楚舊惠爲利薄謀楚之新權其利厚衆欲之意也又曰晉人患秦之用士㑹也趙宣子曰隨㑹在秦賈季在狄難曰至矣若之何乃使魏壽餘僞以魏叛者以誘士㑹執其孥於晉使夜逸請自歸于秦秦伯許之履士㑹之足於朝奈伯師于河西魏人在東壽餘曰請東人能與夫二三有司言者吾與之先使士㑹士㑹辭曰晉人虎狼也若背其言臣死妻子爲戮無益於君不可悔也奈伯曰若背其言所不歸爾孥者有如河又曰晉悼公歸謀所以息民魏絳請施舎巳責輸積聚以貸自公巳下茍有積者盡出之國無滯積亦無困人公羊傳曰權者反於經後有善者也行權有道自貶損以行權不害人以行權殺人以自生亡人以自存君子不爲也論語曰爲人謀而不忠乎又曰君子謀道不謀食也史記曰人有上書告楚王韓信謀反上問左右左右爭欲擊之用陳平計乃僞遊雲夢㑹諸侯於陳楚王迎因即執又曰魏伐趙趙急請救於齊齊王欲將孫臏臏辭謝曰刑餘之人不可於是乃使田忌將兵而徃直走梁魏將龐㳙聞之去韓而歸齊軍巳過而西矣孫子謂忌曰彼三晉之兵素悍而齊號爲怯善戰者因其勢而利導之兵法百里而走利者蹶上將魏文帝曰蹶猶挫也軍半至使齊軍入魏地爲十萬竈明日爲五萬竈明日爲二萬竈龐㳙行三日大喜曰我固知齊卒怯入吾地三日士卒亡者過半矣乃弃其歩兵與其輕輓亡辨反倍日并行逐之孫子度其暮當至馬陵馬陵道狹而傍多阻險可伏兵乃大斫樹白而書之曰龐㳙死此下於是令齊軍善射者萬弩夾道而暮見火舉而俱發㳙夜至斫木下見白書乃鑚火燭之讀未畢齊軍万弩共發軍大亂相失㳙自知計窮兵敗遂自剄曰遂成竪子之名漢書曰髙祖十年陳豨反上親征之師次邯鄲令周昌選趙壯士堪爲將者得四人及見上上罵曰竪子能爲將乎四人慙𧹞俯伏上各封千户任以爲將左右諌曰從陛下入蜀漢破強楚定海内轉鬪數千里瘡痍遍體而功賞未行今四人何功而遽封千户上曰非尓所知也今陳豨反趙代地皆豨之有也吾以羽檄徴天下兵未有至者今唯獨邯鄲中兵耳吾何愛四千户不以慰趙子弟乎左右曰善又聞豨將皆啇賈人髙祖曰吾知其易與之矣啇人尚利乃以金購豨將多降者又曰景帝三年呉楚七國反太尉周亞夫將東擊師次㶚上趙渉遮說亞夫曰將軍東擊呉楚勝則宗廟安不勝則天下危能用臣言乎亞夫下車禮而問之渉曰呉王素富懷輯死士乆矣此知將軍且行必置間人於崤澠阨狹之間且兵事尚神密將軍何不從此右去趨藍田出武關抵洛陽間不過二三日直至武庫擊鳴鼓諸侯聞之以謂將軍從天而下也如其謀至洛陽使人索崤澠間果得伏甲以渉爲護軍竟滅呉楚又曰周勃等旣誅諸吕使迎代王郎中令張武等議皆曰不可信願稱疾無行以觀其變中尉宋昌進曰羣臣之議皆非也夫以吕太后之嚴立諸吕爲三王擅權專利然而太尉以一節入北軍一呼士皆左袒爲劉氏叛諸吕卒以滅之此乃天授非人力也内有朱虚東牟之親外畏呉楚淮南琅耶齊代之強方今髙帝子獨淮南王與代王代王又長賢聖仁孝聞於天下故大臣因天下之心而欲迎立大王大王勿疑也又曰上擊韓王信從晉陽連戰乗勝逐北至樓煩㑹大寒士卒墮指者十二三遂至平城爲匈奴所圍七日用陳平祕計得出應劭曰平畫圖美人形遺閼氏恐漢女美奪已寵因謂單于曰漢天子亦有神靈得其士地非能有也於是匈奴開其一角得突出以計鄙祕不傳也又曰七國反條侯將乗六乗傳㑹兵滎陽至洛陽問故父絳侯客鄧都尉曰䇿安出客曰呉楚兵銳難與爭鋒楚兵輕不乆方今爲將軍計莫若引兵東北壁昌邑以梁委呉呉必盡銳攻之將軍深溝髙壘使兵絶淮泗口塞呉饟道而粮食竭乃以全制其弊破呉必矣條侯曰善乃從其䇿又曰陳平將終曰我多隂謀道家所禁吾即廢亦巳矣終不能復起以吾多隂禍也又曰諸吕擅權丞相陳平患之平甞燕居深念不見陸賈賈曰何念深也陳平曰生揣我何念賈曰足下位爲上相食三万户侯可謂極富貴無欲矣然有憂念不過患諸吕少主耳陳平曰然爲之奈何賈曰天下安注意相天下危注意將君何不交於太尉深相結友陳平用其計迺以百金爲絳侯壽厚具樂飲太尉亦報如之兩人深相結友吕氏謀益壞陳平又以奴婢百人車馬五十乗錢五百萬遺賈爲食飲之費賈以此時遊漢庭公卿間名聲籍甚及誅吕氏立孝文賈頗有力又曰髙祖旣誅黥布聞朱建諌不聽賜建號平原君爲人㓻直行不苟合義不取容辟陽侯行不正得幸吕太后欲知建建不肯見建母死貧未有發䘮陸賈素與善乃賀辟陽侯曰平原君母死何乃賀我陸生曰前君侯欲知平原君義不知君以母故今其母死君誠厚送喪則彼爲君死辟陽侯迺奉百金稅韋劭曰衣服曰稅稅當爲襚也列侯貴人以辟陽侯故徃􅉠凡五百金或人毀辟陽侯惠帝大怒下吏欲誅之太后慙不可言大臣多害辟陽侯行欲遂誅之辟陽侯急使人欲見建建辭曰獄急不敢見君建迺求見孝惠幸臣閎藉孺說曰君所以得幸帝天下莫不聞今辟陽侯幸太后而下吏道路皆言君䜛欲殺之今日辟陽侯誅旦日太后怒亦誅君君何不肉袒爲辟陽侯言帝帝聽君出辟陽侯太后大忻兩主俱幸君君冨貴益倍矣於是閎藉孺大恐從其言帝果出之辟陽侯之囚也欲見建建不見辟陽侯以爲背之大怒及其成功出之乃大驚又曰韓信巳拜大將軍漢王曰丞相數言將軍將軍何以敎寡人計䇿信再拜曰臣嘗事項王請言項王爲人不能任屬賢將此特匹夫之勇又背約而逐義帝所過無不殘滅雖爲霸實失天下心大王之入武關秋毫無害除秦苛法與民約法三章秦民無不欲大王王奈者今王舉兵而東三秦可傳檄而定也於是漢王大喜自以爲得信晚遂聽信計部署將舉兵東出陳倉定三秦又曰韓信張耳以兵數万欲東下井涇擊趙趙王及成安君陳餘聞漢且襲之聚兵井陘口號稱二十萬廣武君李左車說成安君曰聞漢將韓信乗勝去國逺鬪其鋒不可當臣聞千里餽粮士有飢色撨蘇後㸑師不宿飽仐井陘之道車不得方軌騎不得成列行數百里糧食必在後願足下假臣竒兵三万人從間路絶其輜重足下深溝髙壘勿與戰彼前不得鬪退不得還吾竒兵絶其後野無所掠不至十日兩將之頭可致麾下成安君常稱義兵不用詐謀竒計韓信旣破趙令軍有生得廣武君購千金湏臾有縛至者信解其縳而師事之曰僕欲北攻燕東伐齊何如廣武君辭曰臣聞亡國之大夫不足以圖存敗軍之將不可以語勇若臣者何足以權大事乎信曰百里奚居虞而虞亡之秦而秦霸非愚於虞而智於秦也用與不用聽與不聽耳使成安君聽子計僕亦擒矣僕委心歸計願子勿辭廣武君曰足下虜魏王禽夏說不旬朔破趙二十萬衆誅成安君名聞海内威震諸侯士庶莫不傾耳以待命者然衆勞兵罷其實難用也今足下與倦弊之兵埍堅城之下臣愚竊以爲過矣韓信曰然則何由廣武君對曰當今之計不如偃甲休兵百里之内牛酒日至以饗士大夫北首燕路然後發一乘之使持咫尺之書以使燕燕必不敢不聽從燕而東臨齊雖有智者不能爲齊計矣知如此則天下事可圖也兵固有先聲後實者此之謂也信曰敬奉敎於是用廣武君䇿發使燕燕隨風而靡又曰惠帝崩太后發喪而泣不下留侯子張辟彊爲侍中年十五謂丞相陳平曰太后獨有帝今哭而不悲君知其解未陳平曰何解辟疆曰帝無壯子太后畏君等今拜吕台産爲將將兵居南北軍及諸吕皆爲官居中用事如此則太后心安君等幸脫禍矣丞相以辟彊計請之太后恱其哭也迺哀又云藝文志云權謀者以正守國以竒用兵兵先計而後戰范曄後漢書曰袁紹旣兼河朔之地有驕氣曹操敗於張繡紹與操書甚倨慢大怒欲先攻之所患力不敵訪於荀彧彧量紹雖強終爲操所制乃說取吕布然後圗紹操從之又曰袁紹引沮授爲別駕因謂授曰今賊臣作亂朝廷遷弑吾歴丗受寵志竭力命興復漢室今欲與卿勠力將何匡之授曰將軍弱冠登朝播名海内值廢立之際忠義奮發單騎出奔董卓懷懼濟河而北渤海稽服擁一郡之卒撮兾州之衆威凌河朔名重天下若舉軍東向則黃巾可埽還討黒山則張燕可滅迴師北首則孫瓉必擒震脅夷狄則匈奴立定撗大河之北合四州之地収英雄之士擁百万之衆迎大駕於長安復宗廟於洛邑號令天下誅討未服以此爭鋒誰能禦之比及數年其功不難紹喜曰此吾心也又曰劉表寵後妻爲小子琮娶蔡氏遂愛琮而長子琦不自寜嘗與諸葛亮謀自安之術亮𥘉不對後乃共外髙樓因令去梯謂亮曰今日上不至天下不至地言出子口而入吾耳可以言未亮曰君不見申生在内而危重耳居外而安琦意感悟因規出又曰馮異字公孫潁川城父人通左氏春秋孫子兵法歸丗祖授大將軍與赤眉戰不利異乃令各更夜色伏於道傍戰移時伏兵卒起衣服相亂衆驚大敗降赤眉男女八万餘衆𥘉爲丗祖主簿王郎起河北丗祖自葪南馳至饒陽蕪蔞亭時天寒烈衆皆飢疲異上豆粥明旦丗祖謂諸將曰昨得公孫豆粥飢寒俱解至南宫遇大風雨丗祖引車入道傍空舎異復進麥飯兎肩從破王郎封應侯異爲人謙退不伐行能諸將論功異常獨坐屏樹下軍中號曰大樹將軍丗祖即位封夏節侯東觀漢記曰光武發邯鄲晨夜馳騖傳聞王郎軍在後吏士惶恐至下曲陽呼沲河導吏還河水流澌無船不可渡官屬益懼上不然也遣王霸徃視之實然王霸恐驚衆即還曰冰堅可渡士衆大喜上笑曰果妄也比至河河流澌巳合上令霸護渡以沙土汾冰上遂得渡渡未畢軍冰解上謂霸曰安吾衆能濟者卿力也謂官屬曰王霸從我勞苦前連水變權時以安吏士是天瑞也爲善不費賞無以勸後即日以霸爲軍正賜爵關内侯又曰隗囂死其將髙峻擁兵據髙平帝入關將自征之宼恂時從上議遣使降之帝乃謂恂曰卿前止吾此舉今爲行也若峻不即降引耿弇等五營擊之恂奉璽書至髙平峻遣軍師皇甫文謁辭禮不屈恂怒將誅文諌曰髙峻精兵万人卒多強弩西遮隴道連年不下今欲降之反戮其使無乃不可乎恂不應遂斬之遣其副歸告峻曰軍師無禮巳戮之矣欲降急降不欲固守峻惶恐即日開城降諸將皆賀因曰敢問戮其使而降城何也恂曰皇甫文峻之腹心其所計事者也今來不屈無心降耳諸將皆曰非所及也又曰朱勃上書理馬援謀如涌泉勢如轉圜謝承後漢書曰靈帝時楊琁爲零陵太守時蒼梧桂陽猾賊攻琁力弱吏民憂恐琁乃特製馬車數十以排囊盛石灰於車上繫布索於馬尾㑹戰乃令馬車居前從風鼓灰賊不得視以火燒布布燃馬驚奔突賊陣大破之太平御覽卷第四百四十八
