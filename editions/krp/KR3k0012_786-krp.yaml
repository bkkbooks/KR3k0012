  text: 太平御覽卷第七百八十六四夷部七南蠻二
  hash: sha256:b3df81db3cb400340ad059e002a0fa7e7e47d6d70d58647abaa1f449eb62873b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_786-1a}
body:
  text: 哀牢烏滸林邑扶南真臘叅半國白頭國哀牢後漢書曰哀牢夷者其先有婦人名沙壹居牢山嘗捕魚水中觸沉木若有感因懷姙十月産子男十人後沉木化爲龍岀水上沙壹忽聞龍語曰若爲我生子今悉何在九子見龍驚走獨小子不能去背龍而坐龍因䑛之其母鳥語謂背爲九謂坐爲隆因名其子曰九隆沙壹將九隆居龍山下後九隆長大諸兄以九隆能爲父所䑛而黠遂共推以爲王後牢山下有一夫一婦復生十女子九隆兄弟皆娶以爲妻後漸相滋長種人皆刻畫其身象龍文衣皆著尾九隆死世世相繼乃分置小王徃徃邑居散在谿谷絶城荒外山川阻深生人以來未嘗交通中國建武二十三年其王賢栗遣兵乗箄舩箄音蒲佳切南下江漢擊附塞夷鹿茤音多鹿茤人溺爲所擒獲於是震雷疾雨南風飄起水爲逆流飜涌二百餘里箄舩沉没哀牢之衆溺死者數千人賢栗復遣六王將萬人以攻鹿茤鹿茤王與戰殺其六三哀牢耆老共埋六王夜虎復出其尸而食之餘衆驚怖立引去賢栗惶恐謂其耆老曰我曹入邊塞自古有之今攻鹿茤輙𬒳天誅中國其聖帝乎天祐助之何其明也二十七年賢栗等遂率種人詣越嶲太守鄭鴻降求内属光武封賢栗等爲君長自是歳來朝貢又曰永平十二年哀牢王柳邈遣子率種人内属顯宗以其地置哀牢愽南二縣割益州郡西部都尉所領六縣合爲永昌郡始通博南山渡蘭倉水行者苦之歌曰漢德廣開不賔度博南越蘭津渡蘭倉爲他人又曰西部都尉廣漢鄭純爲政清㓗化行夷貊天子嘉之即以爲永昌太守純與哀牢夷人約邑豪歳輸布貫頭衣二領鹽一斛以爲常賦夷俗安之九州記曰哀牢人皆儋耳穿鼻其渠帥自謂王者耳皆下肩三寸鹿人則至肩而己土地沃羙冝五榖蠶桑知染綵文繡有蘭于細布獠言紵也織成文章如綾錦有梧桐木華績以爲布幅廣五尺潔白不受垢汚先以覆亡人然後服之有濮竹節相去二丈地岀銅䥫鈆錫金銀光珠琥珀水精瑠璃軻蟲蚌珠孔雀翡翠犀象猩猩豹獸唐書曰麟徳元年五月於昆明之挵㨂川置姚州都督府毎年差兵募五百人鎮守武太后神功二年蜀州刺史張柬之上表曰姚州者古哀牢之舊國也夲不與中國交通前漢唐蒙開夜郎滇笮而哀牢不附至光武季年始請内属漢置永昌郡以統理之稅其鹽布氈罽以利中土其國西通大秦通交阯竒珎進貢歳時不闕及諸葛亮五月渡瀘水収其金銀鹽布以益軍儲使張伯歧選其勁卒以増武備前代置郡其利頗深今鹽布之稅不供珎竒之貢不入而空竭府庫駈率平人受役蠻夷肝腦塗地漢以得利旣多更置博南哀牢二縣蜀人愁怨行者作歌今於國家無絲髮之利在百姓受終之酷伏乞省罷姚州使肄嶲府歳時朝覲同之畨國烏滸後漢書曰交阯西有噉人國生首子輙解而食謂之冝弟味旨則以遣其君君喜而賞其父取妻羙則譲其兄今烏滸人是也南州異物志曰交廣之界民曰烏滸烏滸地名東界在廣州之南交州之北恒出道間伺候二州行旅有單逈軰者輙岀擊之利得人食之不貪其財貨也地有棘竹厚十餘寸破以作弓長四尺餘名狐弩削竹爲矢以銅爲鏇長八寸以射急疾不凢用也地有毒藥以傳矢金入則撻皮視未見瘡頋盻之間肌肉便皆壞爛湏臾而死尋問此藥云取䖝諸有毒螫者合着管中曝之旣爛因取其汁日煎之如射肉在其内地則裂外則不復裂也烏滸人便以肉爲殽爼又取其髑髏破之以飲酒也其伺候行人小有失軰出射之若人無救者便止以火燔燎食之若人有伴相救不容得食力不能盡相檐去者便断取手足以去尤以人手足掌蹠爲珎異以飴長老出得人歸家合聚隣里懸死人中當四面向坐擊銅鼓歌舞飲酒稍就割食之奉月方田尤好出索人貪得之以祭田神也異物志曰烏滸取翠羽採珠爲産又能織班布可以爲帷幔族類同姓有爲人所殺則居處伺殺主不問是與非遇人便殺以爲肉食也裴淵廣州記曰晉興有烏滸人以鼻飲水口中進噉如故林邑國南史曰林邑國大漢日南郡象林縣古越裳界也伏波將軍馬援開南境北縣其地從廣可六百里餘城去海百二十里去日南界四百餘里北接九德郡其南界地北水歩道二百餘里有西圖夷亦稱王馬援所植二銅柱表漢界處也其國有金山石皆赤色其中生金金夜則出飛狀如螢火又出瑇瑁貝齒古貝沉木香貝者樹名也其花成時如鵝毳抽其緒紡之以作布布與紵布不殊亦染成五色織爲班布沉木香者土人斫断積以歳年朽爛而心節獨在置水中則沉故名曰沉香次浮者棧香漢末大亂功曹區連殺縣令自立爲王數丗其後王無嗣外甥范熊代立死子逸嗣晉成帝咸康三年逸死奴之簒立文夲曰南西捲縣夷帥范㓜家奴常牧牛於山澗得鯉魚二化而爲䥫因以鑄刀刀成文向石呪曰若斫石破者父當王此國因斫石如断蒭藳文心異之范㓜甞使之啇賈至林邑因敎林邑王作兵車器械王寵任之後乃䜛言諸子各奔餘國及王死無嗣大於隣國迓王子置毒於漿中殺之遂脅國人自立又曰林邑王文敵爲扶南王子當根純所殺大臣范諸農平亂自立爲王諸農死子陽邁立陽邁𥘉在孕其母夢生兒有人以金席藉之其色光麗夷人謂金之精者爲陽邁若中國云紫磨者因以爲名宋永𥘉二年遣使貢獻以陽邁爲林邑王陽邁死子咄立慕其父復曰陽邁其國俗居處爲閤名曰干䦨門户皆北向書樹葉為𥿄男子皆以横幅古具繞腰己下謂之于漫亦曰都漫穿耳貫小環貴者着革屣賤者跣行自林邑扶南諸國皆然也其王着法服加纓珞如佛像之飾出則乗象吹螺擊皷罩古貝繖以古貝爲幡旗國不設刑法有罪者使象蹋殺之其大姓號婆羅門嫁娶必用八月女先求男由賤男而貴女同姓還相㛰姻使婆羅門引壻見婦掘手相付呪曰吉利吉利爲成禮死者焚之中野謂之火葬其寡婦孤居散髮至老國王事竺乾道鑄金銀人像大十圍元嘉陽邁侵暴日南九德諸郡交州刺史杜弘之建牙欲討之聞有代乃止又曰宋帝元嘉二十二年使交州刺史檀和之振武將軍宗慤伐林邑和之遣司馬蕭景憲爲前鋒陽邁聞之懼欲輸金一萬斤銀十萬斤銅三十萬斤還欲略日南户其大臣䓯音毒僧逹諌止之乃遣太師范扶龍戌其北界區栗城攻城尅之乗勝即尅林邑陽邁父子並挺身逃奔獲其珎異皆是未名之寳又銷其金人得黃金數萬斤又曰齊永明中林邑王范文賛遣使貢獻梁天監中文賛子天凱奉表獻白猴自此貢獻不絶北史曰林邑國延袤數千里土多香木金寳物産大抵與交趾同以塼爲城蜃炭塗之皆開北户以向日或東西無定尊官有二其一曰西郍婆帝其二曰蕯婆地歌其属官三等其一曰倫多姓次歌倫致帝次乙地伽蘭外官分爲二百餘部其長曰弗羅次曰可倫如牧宰之差也王戴金花冠形如章甫衣朝霞布珠璣纓絡足躡革履時服錦𫀆良家子侍衛者二百餘人皆執金裝兵有弓箭刀槊以竹爲弩傳毒於矢樂有琴笛琵琶五絃頗與中國同毎擊皷以驚衆吹蠡以即戎其人深目高鼻髮拳色黒俗皆徒跣以幅布纒身冬月衣𫀆婦人稚髻書樹葉𥿄施椰葉爲席王死七日而葬有官者三日庻人一日以凾盛屍鼔舞導從輿至外次積薪焚之収其餘骨王則内金甖中沉之於海有官者以銅甖沉之海口庻人以瓦送之於江男女皆截髮哭至水次盡哀而止歸則不哭毎七日燃香散花復哭盡哀而止百日三年皆如之皆奉佛文字同於天笁隋書曰林邑之先因漢末交趾女子徴側之亂内縣功曺子區連殺縣令自號爲王無子其甥范熊代立死子逸立日南人范文因亂爲逸僕遂教之築宫室造器械逸甚信任使文將兵極得衆心文因間其子弟或奔或徙及逸死國無嗣文自立爲王其後范佛爲晉楊威將軍戴桓所破宋交州刺史檀和之將兵擊之深入其境至梁陳亦通使徃來其國延袤數千里髙祖旣平陳乃遣使獻千物其後朝貢遂絶時天下無事群臣言林邑多竒寳者仁壽末上遣大將劉方爲驩州道行軍惣管卒欽州刺史寗長直驩州刺史李暈開府秦雄步騎萬餘及犯罪者數千人擊之其王𣑽志率其徒乗巨象而戰方軍不利方於是多掘小坑草覆其上因以兵桃之𣑽志悉衆而陳方與戰僞北𣑽志逐之至坑所其衆多䧟轉相驚駭軍遂亂方縱兵擊之大破之頻戰輙敗遂弃城而走方入其都獲其廟主十八枚皆鑄金爲之盖其有國十八葉矣方班帥𣑽志復其故地遣使謝罪於是朝貢不絶唐書曰貞觀中林邑王𣑽頭利死率國人共立頭利女王諸葛地頭利之始子女王獨任國中不寜大臣可倫翁定乃立地爲王妻之以女主其國乃定諸葛地自立後遣使可倫因地盤献火珠狀如水精日午時正以珠承影取艾衣之火見云得之於羅刹國令之環土國主即𣑽志之後在日南郡西陸行二十餘日方至扶南國蕭子顯齊書曰扶南國男子截錦爲横幅女爲貫頭貧者以布自蔽鍜爲鐶鏆環貫音銀器伐木起屋國王居重閣以木柵爲城海邊生大葉長八九尺編其業以覆屋國王行乗象婦女亦能乗象無牢獄有訟者則以金指環若鷄子沸湯中令探之又燒鑕令赤着手上捧行七步有罪者手皆燋爛無罪者不傷又令没水直者入即沉不直者不沉又曰扶南在日南之南大海西灣中廣袤三千餘里有大江水西海入海其先有女人爲王名柳葉又有激國人名混填夢神賜弓一張故乗舩入海填晨起於神廟樹下不得弓即乗舩向扶南栁葉見舩卒衆欲禦之混填舉弓遥射貫舶一靣通中人柳葉怖遂降混填娶以爲妻惡其躶露形體乃穿疊布貫其首遂治其國子孫相傳南史曰扶南王混盤死國人共㪯大將軍范蔓爲王蔓勇健有權略復以兵威攻伐旁國咸服屬之自號扶南大王乃作大舩窮漲海開國十餘闢地五六千里蔓死後大將范尋殺其子長而代立更繕國内起觀閣遊戯之朝且中脯三四見客百姓以蕉蔗龜鳥爲禮國無牢獄於城溝中養鰐魚門外圈猛獸有罪者輙以餧猛獸及鰐魚魚獸不食爲無罪三日乃放之鰐魚大者長三丈餘狀如鼉有四足喙長六七尺兩邊有齒利如刀劒常食魚遇得麞鹿及人亦噉之蒼梧以南及外國皆有之又曰扶南王憍陳如夲天笁婆羅門也有神語曰應王扶南憍陳如心恱南至盤盤扶南人聞之舉國欣迎戴而立焉復改制度用天笁法憍陳如死後王持梨陁跋摩宋文帝元嘉中三奉表獻方物齊永明中王憍陳如闍邪䟦摩遣使送珊瑚佛像并獻方物詔授安南將軍扶南王其國人皆醜黒拳髮所居不穿井數十家共一池引汲之俗事天神以銅爲像二面者四手四面者八手手各有所持或小兒或鳥獸或日月其王岀入乗象嬪侍亦然王生則偏踞翹膝垂左膝至地以白疊敷前設金盆香炉於其上國俗居䘮則剃髮除鬚死者有四葬水葬則投之江流火葬則焚爲灰爐土葬則瘞埋之鳥葬則弃之中野人性貪恡無禮義男女恣其奔隨隋書曰扶南國王遣貢獻其王姓古龍諸國多姓古龍訊耆老言崑崙無姓氏崑崙之訛抱朴子曰扶南國出金鋼可以刻玉狀似紫石英其所生在百丈水底盤石上如鍾乳人没水取之竟日乃出以鐵槌之不傷鐵反自損以羖羊角扣之漼然冰泮外國傳曰扶南人若户中亡器物者即以米一升詣神廟乞神見盗者以米着神足下明日取米呼户中奴婢分令囓之盗者口中血出米完不碎不盗者入口即敗從日南至徼外悉尓又曰扶南之東漲海中有大火洲洲上有樹得春雨時皮正黒得火燃樹皮正白紡績以作手巾或作燈注用不知盡又曰扶南國人最大居舎雕文刻鏤好布施多禽獸王好獵皆乗象一去月餘日南州異物志曰扶南國在林邑西三千餘里自立爲王諸属皆有官長及王之左右大臣皆號爲崑崙真臘隋書曰真臘國在林邑西南夲扶南之属國也去日南郡舟行六十日而南接車渠國西有朱江國其王姓刹利氏名質多斯郍自其祖漸己強盛至質多斯郍遂兼扶南而有之死子伊奢郍先代立居伊奢郍城郭下二萬餘家城中有一大堂是王聽政之所其王三日一朝坐五香七寳床上施寳帳帳以文木爲竿象牙金鈿爲壁狀如小屋懸金光熖有同於赤土前有金香炉二人侍側王着朝霞古貝暪絡腰腹下垂至脛頭戴金寳花冠披眞珠瓔珞足履革屣耳懸金璫常服白疊以象牙爲屩有五大臣一曰孤落支二曰髙相慿三曰婆阿多陵四曰舎磨陵五曰髯羅婁及諸小臣朝於王者輙於階下三稽首王喚上階則跪以兩手抱膊遶王還坐議政事訖跪伏而去其國與參半朱江二國和親數與陁桓林邑二國戰争其人行止皆持甲仗若有征伐因而用之其俗非王妻子不得爲嗣王𥘉立之日所有兄弟並刑殘之或去一指或劓其鼻別處供給不得仕進人形小而色黒婦人亦有白者悉拳髮垂耳性氣捷勁居處器物頗類赤土以右手爲浄左手爲穢毎旦澡洗以楊枝浄齒讀頌經呪又澡洗乃食食罷還用楊枝浄齒飲食多蘇酪沙糖粇粟米餅欲食之時先取雜肉羮與餅相和手擩而食男㛰禮畢即與父母分財別居父母死小兒未婚者以餘財與之若婚畢財物入官其䘮葬兒女皆七日不食剔髮而哭僧尼道士親故皆來聚㑹音樂送之以五香木燒屍収灰以金銀瓶盛送于大水之内貧者或用瓦而以彩色畫之亦有不焚送屍山中任野獸食者其國北多山阜南有水澤地氣尤熱無霜雪饒瘴癘毒蟲土冝稻與日南九真相類異者有婆耶郍娑樹無花葉似冬瓜菴羅樹花葉以棗實似李毗野樹花似木瓜葉似杏實似楮婆田羅樹花葉實並似棗而小異歌畢他樹花似李葉似榆而厚大實似李其大如升海中有魚名建同四足無鱗其鼻如象吸水上噴髙五六十尺有浮胡魚其形如䱉觜如鸚鵡有八足多大魚半身岀水望之如山毎五六月中毒熱氣流行即以白猪牛羊於城西門外祠之不然者穀不登六畜多死近都有陵伽鉢婆山上有神祠毎以兵二千人守衛城東有神名婆多利祭用人肉毎年殺人以夜祀禱大業十三年遣使貢獻帝厚礼之其後亦絶唐書曰真臘國貞觀二年又與林邑國俱來朝獻太宗嘉其歴逺疲勞錫賚甚厚南方人謂真臘國爲吉篾國自神龍以後真臘分爲二半以南近海多陂澤處謂之水真臘半以北多山阜處謂之陸真臘亦謂之文單國髙宗則天玄宗朝並遣使朝貢水真臘國其境東西南北約皆八百里東至奔陁浪州西至墮羅鉢底國南至小海北即陸真臘其王所居城號婆羅是㧞國之東界有小城皆謂之國其國多象元和八年遣李摩郍等來朝貢叅半國唐書曰武德中叅半國遣使朝貢其國在真臘西南千餘里城臨大海土地下濕風俗物産並與林邑國同自頭國唐書曰貞觀中扶南來獻白頭國二人於洛陽云其國在扶南之西男女皆素首身又凝白居山洞之中四面巖險故人莫至與叅半國相接太平御覽卷第七百八十六
