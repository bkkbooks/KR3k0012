front:
  text: 太平御覽卷第二百三十
  hash: sha256:b37d78016e0e101ffbeba73d1475ef390ef969633976325ae2f59c0ca8b0dd74
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_230-1a}
body:
  text: 職官部二十八衛尉卿武庫令守宫令公車令宗正卿宗正少卿宗正丞太僕卿乗黄令廐令車府令衛尉卿六典曰衛卿之職掌邦國器械文物之事揔武庫武器守宫三署之官屬少卿爲之貳凢大祭祀大朝㑹則供具羽儀節鉞金㦸帷弈茵蓆之屬漢書百官表曰衛尉秦官也掌宫門衛屯兵漢因之景帝𥘉更名中大夫後元年改爲衛尉東觀漢記曰光武二十三年太尉鮑昱兼衛尉永元三年司徒丁鴻兼衛尉後漢書曰銚音遥期字次况頴川人也拜衛尉卿期重於信義憂國憂主其有不得於心必犯顔諌諍續漢書曰隂興爲衛尉每諸將出征伐身行勞問無所愛惜又曰馬光字叔山爲衛尉卿上以光謹勑小心周宻畏慎特親異之又曰竇固字孟孫爲衛尉卿兩宫宿衛見重當時仁厚謙恭甚有名稱又曰趙喜字伯陽爲衛尉盡心事上夙夜匪懈母没上䟽乞守服不許遣使釋服又百官志曰衛尉卿秩中二千石掌官服衛士公車令百官衛士左右都虞候宫掖門司馬皆屬焉魏志曰辛毗爲衛尉清平與徐邈胡質皆以憂國忘私不營産業賜糓二千斛錢三十萬布告天下又曰田預爲并州刺史徴爲衛尉屢乞遜位司馬宣王以預克壯書諭未聽預書荅曰年過七十而以居位譬猶鐘鳴漏盡夜行不休是罪人也遂因稱疾又曰辛毗字佐治爲衛尉卿帝方修殿舎毗諌曰詩云民亦勞止汔可小康吴志曰嚴畯爲孫權立吴及稱尊號畯常爲衛尉禄賜皆散之親戚知故家常不充晉書曰石崇拜衛尉與潘岳謟事賈謐謐與之親善號二十四友廣成君每出崇降車路左望塵而拜其佞如此宋書曰南郡王義宣子恢爲侍中領衛尉晉氏過江不置衛尉世祖欲重城禁故復置衛尉自恢爲始也唐書官品志曰衛尉卿位視侍中掌宫門屯兵卿每月丞每旬行宫徼糺察不法統武庫令公車司馬令漢官解詁曰衛尉主宫闕之内衛士於垣下爲廬各有貟部凢居宫中者皆置籍於門按其姓名有毉巫僦人當入者本官長吏爲封啓傳審其印信然後内之人有籍者皆復有符用木長二寸以所長官兩字爲䥫印分符當出入者案籍畢復齒符乃引内之也其有官位得出入者令執御者各傳呼前後以相通昬至晨分部行夜夜有行者輙前曰誰誰若此不懈終歳更始所以重慎宿衛也漢書舊儀曰衛尉寺在京内胡廣云宫闕之内衛士於周垣下爲廬者若今之伏宿屋矣武庫令六典曰武庫令掌藏邦國之兵仗器械辨其名數以備國用承爲之貳漢書百官表曰執金吾属官有武庫令又曰杜欽爲大將軍武庫令職閑無事欽所好也又曰武庫令一人昔武王伐紂散牛放馬倒載干戈韜以虎皮而藏諸武庫武庫之職由來尚矣續漢書曰武庫令一人秩六百石主兵器晉書曰樂廣欲㑹荆揚士人武庫令黄慶進陶侃於廣人或非之慶曰此子終當逺到復何疑也守官令六典曰守官令掌邦國供帳之屬辨其名物㑹其出入凢大祭祀大朝㑹及廵幸則設王公百官位於正殿南門外續漢書曰少府属官有守官令丞主御𥿄筆墨及財物諸用并封書泥之事魏志曰荀彧字文若年少時南陽何顒異之曰王佐才也舉孝廉拜守宫令董巴漢中宫傳曰守官禁内署令秩千石在省内用中人省外士人齊職儀曰守宫周掌宫之職王行爲帷宫即其任也公車令漢書曰張釋之爲公車令續漢書曰公車司馬令掌宫南門凢吏民上書四方貢獻及徴詣公車者皆掌之又曰周垂字子居拜侍御史公車司馬令不畏強禦以是見怨於幸臣應劭漢官儀曰公車司馬令周官也秩六百石冠一梁掌殿司馬門徼夜宫中天下上事及闕下凢所徴召皆揔領之李郃以公車司馬入爲侍宗正卿六典曰宗正卿之職掌九族六親之属籍以别昭穆之序并領崇玄署少卿爲之貳漢書曰宗正秦官也應劭曰周成王時形伯入爲正掌親屬又曰劉德字路叔修黄老術有智略少時數言時事召見甘泉宫武帝謂之千里駒昭帝𥘉爲宗正丞後爲宗正卿徳妻死大將軍欲以女妻之德不敢畏盛滿也又曰劉向字子政元帝時蕭望之周堪薦向宗室忠直明經有行爲宗正東觀漢記曰劉般字伯興遷宗正在朝廷竭忠盡節勤身憂國夙夜不怠數納嘉謀州郡便冝清浄畏愼受職脩治振施宗族又曰劉平字公子以仁孝著聞永平三年爲宗正卿後漢書曰劉􅎮字君文梁孝王㣧爲宗正卒官遂代掌宗正焉續漢書曰宗正卿一人秩二千石掌序録王國嫡庶之次及諸宗室親屬逺近郡國歳計上宗室名籍晉起居注曰咸寧元年以太中大夫王覽爲宗正卿又曰太始二年以侍中中書監朱整爲宗正卿後魏書曰杜銓𥘉宻太后父豹䘮在濮陽丗祖欲命迎葬於鄴謂司徒崔浩曰天下諸杜何處望髙浩對京兆爲美丗祖曰朕今方改葬外祖意欲取京兆杜中長老一人以爲宗正命營護㐫事浩曰中書博士杜銓其家今在趙即是杜預之後於今爲諸杜最即命詔之及見銓器貌瓌雅丗祖感恱謂浩曰此真吾所欲也以爲宗正唐書官品志曰宗正卿位視列曹尚書主皇室外戚之籍以宗室爲之石氏星經曰宗正二星在帝座東南山公啓事曰羊祜忠篤寛厚然不長理劇宗正卿缺不審可轉作否宗正少卿後魏職令曰宗正卿第四品上第二請用懿清和識叅教典者先盡皇宗無則用庶姓宗正丞六典曰宗正丞掌判寺事太僕卿六典曰太僕卿掌邦國廐牧車輿之政令㹅乗黄典廐典牧章府四署及諸監牧之官屬少卿爲之貳凢國有大禮及大駕行幸則供其五輅属車之属尚書冏命曰穆王命伯冏爲周太僕正伯冏戌名爲太僕作大御中大夫也作冏命曰昔在文武聦明齊聖小大之臣咸懷忠良今予命汝作大僕正正于羣僕侍御之臣周禮曰太僕正掌王之服位出入王之大命掌諸侯之復逆王眡朝前正位而退入亦如之建路皷于太寢之門外而掌其政以待逹窮者與遽令聞鼔聲則速逆御僕與御庶子祭祀賔客䘮紀正王之服位詔法儀賛王牲事王出入則自在左馭而前駈漢書曰灌嬰自上𥘉起沛常爲太僕竟髙祖以太僕事惠帝崩以太僕事髙后髙后崩代王之來嬰與東牟侯入清宫以天子駕迎代王共立文帝復爲太僕又曰百官表曰太僕輿馬属官有大廐未夾央廐象馬三令又車府路軨音靈騎馬駿馬四令又龍馬閑駒槖泉騊駼丞華五監長丞又邊郡六牧苑令各三丞又収槖昆蹄令丞皆属焉東觀漢記曰祭側界切彤膂力過人常貫三百斤弓入爲太僕從帝過孔子講堂帝指子路室曰太僕吾之禦侮也後漢書曰徴祭􅊮爲太僕􅊮在遼東幾三十年衣無兼副顯宗旣嘉其功又美􅊮清約拜日賜錢一百万馬三疋衣𬒳刀劒下至居屋什物大小無不悉備續漢書曰趙歧字臺卿獻帝以爲太僕持節安慰天下又百官志曰太僕秩中二千石掌車馬天子出奉駕大駕則馭魏志曰國淵字子尼遷太僕居列卿位布衣𬞞食禄賜散之舊故宗族以恭儉自守又曰潘尼字正叔侍中爲太僕造乗輿箴漢舊儀曰太僕牧師諸苑三十六所分布北邊以郎爲苑監官奴婢三萬人分養三十萬頭擇取給六廐牛羊無數以給牲犧漢雜事曰石慶爲太僕卿出上問車中幾馬慶以䇿數馬䇿舉手曰六馬慶以兄弟中最爲簡易而猶如此又曰公孫賀以太僕爲丞相子敬聲代爲太僕晉諸公賛曰郭展爲太僕留心於養生是以廐馬充牣其後征吴得以濟事唐書官品志曰太僕卿位視黄門侍郎統南馬牧左右牧龍廐内外廐丞乗黄令六典曰乗黄令掌天子車輅辨其名數與馴馭之法丞爲之貳宋書曰乗黄令晉官也主乗輿金根車及安車追鋒諸衆車馬齊職儀曰乗黄令獸名也龍翼馬身黄帝乗之而仙後人以名廐廐令六典曰典廐令掌繫飼馬牛給養雜畜之事丞爲之貳漢書曰太僕屬官有大廐未央廐象馬三令各五丞一尉又車府輅軨騎馬駿馬四令丞晉約日漢儀注大廐名也主馬萬疋也又龍馬閑駒槖泉如淳日廐在槖泉宫下騊駼丞革五監長丞牧槖昆蹄令丞應劭曰槖槖駞昆蹄好馬名也如淳曰因以名厩也武帝太𥘉元年更名象馬爲桐馬應劭日主乳馬取其汁桐洛之味酢可飲因以名官相動又曰蘇武爲栘中監移中厩名音移又曰上官桀遷未央厩上躰不安及愈見馬瘦上怒曰汝以我不復見馬耶桀曰聖體不安曰夜憂懼意誠不在馬言未卒泣數行下上以爲忠齊職儀曰諸厩有圉師牧人養馬之官校人掌王之馬正也車府令六典曰車府令掌王公巳下車駱辨其名數及馴馭之法丞爲之貳史記曰趙髙爲秦車府令漢書百官表曰太僕屬官有車府令一人六百石丞一人東觀漢記曰永平中車駕出信陽侯隂就干車騎突鹵薄車府令齊國徐匡就車収送獄詔書譴匡自繫不出吴良上書信陽侯驕慢干突車騎無人臣禮大不敬匡執法守正而下獄臣恐陛下政化由是隳矣於是詔出匡左遷即丘長齊職儀曰車府署周有巾車典輅之職辨五輅之制太平御覽卷第二百三十
