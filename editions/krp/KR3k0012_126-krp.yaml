front:
  text: 太平御覽卷第一百二十六
  hash: sha256:aa7c6df0aa647b9651dfe1f701f9f99117e1dfbae9b9db768b9d148fb4c941cd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_126-1a}
body:
  text: 偏霸部十南涼秃髪烏孤秃髮利鹿孤秃髪傉檀南燕慕容德慕容超秃髪烏孤崔鴻十六國春秋南涼録曰秃髪烏孤河西鮮卑人也八丗祖疋孤自塞北遷于河西孤卒子壽闐立闐孫機能壯果多謀略晉太始中殺秦州刺史胡烈於萬斛堆敗涼州刺史蘇愉于金山又殺涼州刺史楊欣於丹嶺盡有涼州之地武帝爲之肝食能死從弟務丸代立丸死孫推斤立斤死子思復鞬立部落轉盛遂據涼土鞬卒子烏孤襲位養民務農循結隣好吕光進封孤廣武郡公益州牧左賢王太𥘉元年正月改元自稱大將軍大單于西平王以弟鹿孤爲驃騎將軍傉擅爲車騎將軍二年改稱武威王三年正月徙治樂都八月孤因酒走馬馬倒傷脇笑曰幾使吕光父子大喜俄而患甚頋謂羣臣曰方難未靖冝立長君言終而薨謚武王廟號烈祖晉書曰秃髪烏孤其先與後魏同出八丗祖疋孤率其部自塞北遷于河西其地東至麥田牽屯西至顯羅南至澆河北接大漠疋孤子壽闐之在孕母胡掖氏因寢而産於𬒳中鮮卑謂𬒳爲秃髪因而氏焉秃髪利鹿孤崔鴻十六國春秋南涼録曰利鹿孤烏孤弟太𥘉三年八月即位大赦改治西平建和元年正月大赦改年延耆老訪政治二年羣臣固請即尊號不許乃僣稱河西王三年三月寢疾令曰昔我諸兄弟傳位非子者蓋以泰伯三讓周道以興故也武王創踐寳暦垂諸樊之試終能克昌家業者其在車騎乎吾寢疾惙頓是將不濟内外多虞國機務廣其令車騎經惣百揆以成先王之志薨謚康王葬西平陵秃髪傉檀崔鴻十六國春秋南涼録曰傉檀利鹿孤弟也少機警有才略建和三年襲位徙號涼王遷于樂都改爲弘昌元年秦遣使拜車騎將軍廣武公四年六月秦遣授河右諸軍事涼州刺史鎮姑臧七月醼羣寮于宣德堂仰視而歎曰古人言作者不居居者不作信矣前昌松太守孟禕進曰張文王築城苑繕宫廟構此堂爲貽厥之資萬丗之業秦師濟河漼然瓦解此堂之建年垂百載十有三主唯信順可以乆安仁義可以永固願大王勉之檀曰非君無以聞讜言也八月以鎮南大將軍文攴鎮姑臧檀遷于樂都雖受制於秦車服禮制一如王者十一月遷于姑臧嘉平元年十一月僣即涼王位於南郊大赦改年嘉平置百官立丗子虎臺爲太子二年正月以子明德歸爲南中郎將領昌松太守歸儁爽聦悟檀甚寵之年始十三命爲昌髙殿賦援筆即成影不移漏檀覽而善之擬之曹子建七年傉檀議欲西征乙弗孟愷諌曰連年不収上下飢弊南逼熾盤北迫蒙遜今逺征雖尅後患必深傉檀曰孤將略地卿無沮衆謂其太子武臺曰今不種多年内俱窘事宜西行以拯此弊蒙逰近去不能卒來旦夕所慮唯在熾盤彼名微衆寡易以討禦吾不過一月自足周旋汝謹守樂都無使失墜傉檀乃率騎七千西襲乙弗大破之獲牛馬羊四十餘萬熾盤乗虗來襲一旦而城潰安西樊尼自西平奔告傉檀傉檀謂衆曰今樂都爲熾盤所䧟卿等能與吾藉乙弗之資取契汗以贖妻子者所望也遂引師而西衆多逃反遣鎮北叚荀追之荀亦不還於是將士皆散傉檀曰熾盤昔委質於吾今而歸之不亦鄙乎四海之廣無所容其身何其痛哉吾老矣寧見妻子而死遂歸熾盤六月至西平盤遣使郊迎以上賔之禮歲餘爲熾盤所鴆謚景王時年五十一武臺亦爲熾盤所害少子保周歸魏魏以爲張掖王自烏孤太𥘉元年歲在丁酉至檀薨之歲甲寅十有八歲晉書曰烏孤以安帝隆安元年僣立至傉檀三丗凡十九年以安帝義熈十年滅南燕慕容德崔鴻十六國春秋南燕録曰慕容德字玄明皝之少子皝每對諸宫人言婦人姙娠夢日入懷必生天子公孫夫人方娠夢日入臍中獨喜而不敢言晉咸康二年晝寢生德左右以告方寤而起皝曰此兒易生似鄭莊公長必有大德遂以德爲名年十二而皝薨哀毀過禮年十八長八尺二寸額上有日月兩角下偃月重文元璽𥘉封梁公建熈𥘉進號安北將軍封范陽王入爲魏尹秦滅燕徙於長安秦伐涼德請征自效後爲張掖太守符堅伐晉垂請德爲副堅敗德乃隨垂如鄴垂稱燕王復封范陽王建興元年爲司隷校尉八年拜司徒垂臨薨謂太子寳曰鄴是舊都宜委范陽王永康元年以德鎮鄴及寳失中山奔龍城以德爲丞相領冀州承制南夏德曰中山旣没魏必乗勝來攻鄴元年正月德率户四萬三千車二萬七千乗自鄴徙滑臺黎陽魏軍垂至三軍危懼欲堡據黎陽昬日流澌冰合是夜濟訖冰亦㝷消德大恱改黎陽津爲天橋津德入滑臺趙王麟等九十八人上言今中山傾䧟龍都蕭條趙魏遺黎鵠企皇澤伏願仰承俯順以安宗廟謹上皇帝尊號德許之令曰今假順來議且依燕元故事統符行帝制奏詔而巳改永康三年爲元年大赦殊死巳下置百官封進有差寳自龍城南奔至黎陽城西數里伏于河西遣中黃門趙思告北地王鍾曰上以去二月得丞相表即自南征叚速骨作逆于乙連今失據來此呼丞相奉迎鍾馳使白狀寳遣思之後見採樵者知德稱帝懼而北奔𥘉符登旣滅登弟廣率所部三千來降拜冠軍將軍處之乞活壍至是復叛稱秦王德留撫軍魯陽王和守滑臺德率衆攻廣斬之和長史李辨殺和以滑臺降魏德曰符廣雖平撫軍失據進有強敵退無所託計將安出尚書潘聦曰滑臺四通八逹非帝王之居青齊沃壤號曰東秦地方二千里戸餘十萬四塞之固可謂用武之國德猶預未決於是遣牙門蘇撫問沙門㓪公報曰山拪絶俗之士不應預問朝議但有待之累非有託無以立陛下今來即㓪之檀越敬覽潘尚書之議可謂興邦撫又問以年丗㓪以周易筮之曰燕衰庚戍撫曰幾何曰年則一紀丗則及子撫曰何其促乎朗曰卦兆然也豈關人哉撫祕不敢言德大恱三月德引歸而南五月次薛城八月入廣固即皇帝位于南郊大赦改元爲建平元年又曰漢宣憫吏民犯諱故改名朕今増一備字以爲複名庶開臣子避諱之路於是叙賞有差褒德任賢新舊咸恱十月太極端門並就以公匠張剛爲材官將軍尚方令二年十月徐州刺史潘聦青州刺史鞫仲來朝讌于延賢堂酒酣德嘆謂羣臣曰朕雖寡薄拱巳南靣在上不驕夕惕于位可稱自古何等主也仲曰陛下中興之聖后少康光武之儔也頋命左右賜仲帛千匹仲疑多陳讓德曰卿知調朕朕不知戲卿乎卿飾對非實故亦虚言相賞不賞謬加何足謝也韓範進曰臣聞天子無戲言忠臣無妄對今日之論可謂君臣俱失德大恱賜範絹五十匹三年三月德如齊城登營丘望見晏嬰塜頋左右曰禮大夫不逼城葬平仲古之一賢人逹者而生居近市死葬近城豈有意乎青州秀才晏謨對曰孔子稱臣先人平仲賢矣豈不知髙其梁豐其禮蓋政在家門故儉以矯丗存居湫隘卒豈擇地而葬乎所以不逺門者猶冀悟平生意也德恱之三月以太牢祀漢城陽景王廟遂北登社首山東望鼎足因目牛山問謨以齊之山川賢哲故事謨暦對詳辨畫地成圖德深嘉之拜尚書郎五年二月夜地震在栖之雞皆驚擾飛散三月德疾動經旬幾於不振㑹前尚書右丞曹黙自冀州來奔以白酒解之乃瘳以黙爲御史中丞封永熈侯六年正月兄子超自秦還九月汝水竭十一月德疾篤夜夢皝曰汝旣無子何不早立超爲太子不尓惡人生心戊午引見羣臣于東陽殿議立超爲太子俄而震起百寮驚越德亦不安還宫疾甚呼叚后公主及超申以後事執超手曰若得至暁更見公卿頋託以汝死無所恨舉目視公主欲有所言竟遂不能叚后大言今日召董中書造誥立超開目頷之是夕薨于顯安宫年七十爲十餘棺夜分出門潜瘞山谷莫知其屍所在虚葬于東陽陵謚獻武皇帝廟號丗宗在位五年慕容超崔鴻十六國春秋南燕録曰慕容超字祖明德兄北海王納之子秦滅燕以納爲廣武太守數歲去官與母公孫太妃就弟德於張掖德從符堅南征留金刀辭母而去及垂起山東張掖太守符昌誅納及德之諸子公孫大妃以耄不合刑納妻叚氏以懷姙未決執于郡獄獄掾呼延平德故吏也將公孫叚氏逃于羗中而生超焉公孫氏臨卒授超金刀曰聞汝伯巳中興於鄴都吾杇病將没相見理絶汝脫得東歸可以此刀還汝叔也後因吕隆歸秦秦徙涼州民於長安超因而東歸母謂超曰母子得全濟者呼延氏之力也惠而不報天不祐人平今雖死吾欲爲汝納其女以荅厚惠於是納之超至長安佯狂行乞由是徃來無禁濟隂人宗正謙善卜相西至長安賣術于路超行而遇之因就謙相謙竒其姿貌超乃内断于心不告母妻辭母詣霸上乃與謙俱歸至諸關禁自稱張伏生二十日逹梁父建平六年四月至廣固呈以金刀且宣祖母臨終之言德撫之號慟超身長八尺腰帶九圍姿器魁傑有類於德德愛之名之曰超封北海王拜侍中驃騎大將軍司隷校尉開府置佐十一月立爲太子巳未僣即皇帝位大赦改建平六年爲太上元年三年七月遣中書令韓範聘秦姚興許還超母妻八月秦使兼貟外散騎常侍韋宗還聘贈以千金超復遣右僕射張華給事中宗正元聘秦送大樂伎一百二十人姚興大恱還超母妻十月華發長安宗正元馳先反命超大恱遣征虜公孫五樓率騎二千迎于境上超親率六宫迎於馬耳關四年正月大赦尊父北海穆王爲穆皇皇帝母叚氏爲皇太后居長樂宫妻呼延氏爲皇后五年二月晉相劉𥙿率衆來伐三月晉師渡淮超聞晉軍之盛自率衆四萬距戰大敗奔還廣固徙郭内民入堡小城晉攻䧟大城長圍列守超請爲藩臣以大峴爲界𥙿不許六年正月超登天門朝羣臣于城上殺馬以饗將士十一月尚書恱壽開門納晉師超出奔爲晉所執送建康市斬之時年二十六殺鮮卑王公巳下三千餘人以男女萬餘口爲軍賞始德建平元年歲在巳亥僣號居齊至爲劉𥙿所滅在已酉凡二十一年晉書曰超在位六年𥘉德以安帝隆安四年僣立至超二丗凡十一年以義熈六年滅太平御覽卷第一百二十六
