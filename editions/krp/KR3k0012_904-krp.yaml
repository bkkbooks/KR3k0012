front:
  text: 太平御覽卷第九百四
  hash: sha256:4a90b177367a06675bd1bbe526298db3d00e540ac0ad268bc6feb6331c7d9c6b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_904-1a}
body:
  text: 獸部十六狗上爾雅曰犬生三猣音宗二師一音祈未成毫狗長喙獫音廉又音險短喙猲音歇獢許嬌切狗絶有力狣音兆尨狗也狗四尺爲􅋙說文曰犬狗之有懸蹄者也孔子曰視犬之字如畫狗也又曰狗叩也叩氣吠以守也又曰尨犬之多毛者也猲短喙犬也獫黒犬黄頭也往之句切黃犬黒頭也猈音罷短腦狗也㺌胡斬切犬吠不止也􅋙犬如人心可使也狾居丗切狂犬也狄亦犬也又曰狡少狗也匈奴有狡犬巨口而黒身吕忱字林曰獹韓良犬也㹱音鵲宋良犬也􅜏五見切逐虎犬也何承天纂文曰守犬爲獖扶夲切隴西以犬爲猶酉㺜乃切折乃居切㲰乃庾切皆多毛犬也獟五校切猘居例切也䂏音彫屈尾犬也廣雅曰殷虞晉獒楚茹黄韓盧宋鵲並犬屬廣志曰狗有懸蹄短尾之號古今注曰狗一名黄羊易說卦曰艮爲狗詩國風盧令曰盧令令其人羙且仁盧田犬令令環聲盧重環其人羙且鬈又曰國風野有死􅍪曰無撼我恱兮無使尨也吠尨狗也禮記曲禮曰馬効羊者右牽之効犬者左牽之又曲禮曰凢祭祀犬曰羮獻又内則曰狗赤股而躁臊又檀弓曰仲尼之畜狗死使子貢埋之曰吾聞之弊帷不弃爲埋馬也弊蓋不弃爲埋狗也丘也貧無蓋於其封也亦與之席無使其首䧟焉封當爲窆䧟謂没於圡尚書洪範曰西旅獻獒西戎逺國貢大犬太保作旅􅋙召公也左傳宣上曰晉侯飲趙盾酒伏甲將攻之其右提弥明知之趍登曰臣侍君宴過三爵非禮也遂扶以下公嗾大敖焉明搏而殺之盾曰弃人用犬雖猛何爲又曰襄三曰國人逐瘈狗瘈狗入於華臣氏國人從之華臣懼遂奔陳又曰昭六曰二十三年遂取邾師獲鉏弱地邾人愬干晉晉人來討叔孫婼如晉乃舘諸箕使人與叔孫居於箕者請其吠狗弗與及將歸殺而與之食示下愛公羊宣公曰靈公食趙盾公曰聞子劒利以示我盾將起進劒彌明曰何故㧞劒於公所盾知之躇而淮躇猶超遽不暇以次公有周狗可與比周所指如意謂之􅋙而屬之獒亦躇階從弥明逆而踆之以足逆蹋之曰踆絶頷趙盾顧曰君之􅋙不若臣之􅋙也史記淮隂傳云髙祖詔齊捕蒯通通至上曰若教淮隂侯反乎對曰然臣固教之跖狗吠堯堯非不仁固吠非其主當是時臣獨知韓信非知陛下也又徐偃王志云徐君宫人任娠而産夘以爲不祥弃於水邊孤獨老母有犬名鵠倉獵於水濵得所弃夘衘以來歸獨母以爲異覆煖之遂􅭨蝍成小兒生時正偃故以爲名徐君宫中聞之乃更録取収飬長而仁知襲君徐國後鵠倉臨死更生角而九尾實黄龍也偃王葬之徐梁界中今見有狗壟云又曰范蠡之齊遺大夫種書蜚鳥盡良弓藏狡兎死走狗烹又曰范睢說秦昭王曰夫以秦而治諸侯譬若縱韓盧而愽蹇兎也閉關十五年不敢窺兵於山東者是穰侯不忠而大王之計有所失也漢書五行志曰文帝後五年六月齊雍城門外有狗生角又曰成帝河平元年長安男子石良劉晉相與同居有如人狀在其室中擊之爲狗走復至數人𬒳甲持弓至良家等擊之或傷皆狗也自二月至六月乃止其於洪範皆犬禍也後漢書曰岑熈爲魏太守無爲而化視事二年輿人歌之曰我有枳棘岑君伐之我有蟊賊岑君遏之吠狗不驚足下生氂又曰靈帝於西園弄狗着進賢冠帶綬續漢書曰靈帝寵用便嬖弟子轉相汲引賣關内侯直五百萬令長強者貪如豺狼弱者略不類物實狗而冠也又曰昌邑王見狗冠方山冠龔遂曰王之左右皆狗而冠魏志曰太祖云我有丁斐猶人家有盗狗盖捕䑕雖小損而完囊儲又曰公孫淵未亡家數有怪犬冠幘綘衣上臺又曰朱建平善相術謂應璩云君年六十三位爲常伯當有厄先此一年當獨見一白狗而旁人不見也據六十一爲侍中直内省歘見白狗問之衆人悉無見者於是遊觀田里飲宴自娯過期一年年六十三卒魏略曰丁溢外似踈濫而内明慧雖與何晏鄧颺等同列而皆少之唯聲勢屈於曹爽爽亦教之言無不從故于時謗書謂臺中三狗嘊喍不可當一狗慿點作蛆囊三狗謂何鄧丁也點者爽小字也其意言三狗皆欲囓人而畜蛆也呉志曰孫峻謀誅諸葛恪恪將見之夜精爽擾動通夕不寢嚴畢趍出犬銜引其衣恪曰犬不欲我行乎還坐有頃乃復起犬又銜其衣恪令從者逐犬遂升車晉書曰當陽侯杜預𥘉攻呉呉人憚其智以瓠繫狗頸示之預恨之及平盡殺之又曰齊王囧入廢賈后后呼帝曰陛下有婦使人廢亦行自廢又問囧曰起事者誰囧曰梁趙后曰繫狗當繫頸今反繫其尾何得不然又曰呉隱之爲奉朝請謝石請爲衛將軍主簿隱之將嫁女石知其貧素遣女必當率薄乃令移厨帳助其經營使者至方見婢牽犬賣之此外蕭然無辦又曰庾翼常令郭璞筮其后璞曰卿后並貴盛然有白龍者㓙徴至矣後庾氷子藴爲廣州刺史其妾産犬子不令藴知狗轉長大藴入見狗眉目分明而異形於衆後失所在藴慨然曰殆白龍乎後爲桓氏所滅又藝術傳曰嚴卿㑹稽人也善卜筮郷人魏序欲暫東行荒年多抄盗令卿筮之卿筮曰君愼勿東行必遭暴害之氣而非刼也冝有以穰之可索西郭外獨母家白雄狗繫着舩前求索正得駮狗卿曰其色不純當有小毒正及六畜尔無復憂序行半路狗忽有聲甚急如𬒳人擊比視巳死吐黒血斗餘其夕序墅上白鵝數頭無故自死而家無恙後魏書蠻夷傳云獠性同禽獸若殺其父求得一狗以謝其母不懷嫌恨又以大狗一頭買一生口北史曰齊南陽王綽始十餘歲留守晉陽愛波斯狗尉破胡諌之綽歘然斫殺數狗狼籍在地破胡驚走不敢復言後有婦人抱兒在路走避入草綽奪其児飼波斯狗婦人號哭綽怒又縱狗使食狗不食塗以児血乃食焉後周書曰張元琮性仁孝村陌有狗子爲人所弃者元見即収而飬之其叔父怒曰何用此爲將欲更弃之元對曰有生之類莫不重其性命若天生殺自然之理今爲人所弃而死非其道也若而不收飬無仁心也是以収而飬之叔父感其言遂許焉未幾乃有狗母衘一死兎置元前而去三國典略曰齊髙緯以波斯狗爲赤虎儀同逍遥郡君常於馬上設蹬褥以抱之鬪鷄亦号爲開府馬皆籍以氊罽𬒳以金玉号爲蛟龍儀同其將合牝壯則設青盧黼帳牢具過於諸王婚禮齊主常親視焉又曰齊廣寧王孝珩嘗畜一犬守外人不得趣近孝珩毎射令其取箭亦解呼召左右牽衣而進又曰徐之才嘗與朝士出遊望郡犬並走諸人令目之之才應聲曰爲是宋鵲爲是韓盧爲逐李斯東走爲負帝女南徂陳書曰張彪敗後與妻楊氏去唯常所飬一犬黄倉在彪前後未曽捨離乃還入若邪山中沈㤗說陳文帝遣章昭逹領千兵重購之并圗其妻彪眠未覺黄倉驚吠刼來便噬一人中喉即死及彪𬒳害黄倉嘷叫宛轉血中唐書曰貞觀中弥泥孰可汙李思摩部落濟河於故定襄城爲牙帳户三萬勝兵四萬馬九萬疋思摩之𥘉建也詔錫其土南至大河北有白道川而白道收田處龍荒之㝡突厥咸競其利思摩以北接延陁種落𥘉集其力尚微未敢北徙至是始還其國因上言曰非分蒙恩立爲落長實望子孫竭誠奉國作國家一狗北門守吠若延陁侵逼請家口徙入長城詔許之郭頒魏晉丗語曰郊天壇下有白狗髙三尺光色鮮明恒卧見人則去周書曰渠溲大者露犬也能飛食虎豹春秋考異郵曰七九六一三陽氣通故斗運狗三月而生宋均注曰狗斗精之所生也又曰狗三月而生陽至於三故狗各髙三尺穆天子傳曰􅜑韓之人獻天子良犬七十􅜑之然切又曰天子之狗走百里執虎豹山海經曰隂山有獸焉其狀如狸白首其名天狗又曰犬戎國黃帝之後弄明生白犬二頭自爲牝牡故爲此國也又曰金門之山有赤犬名曰天犬下則有兵又曰蜪音陶犬如犬而青食人從首始白澤圗曰黒狗白頭耳長卷尾龍也國語曰趙簡子田于螻晉君之囿史黯聞之以犬待於門晉太史史黯也簡子見之何爲曰有所得大欲試之兹囿簡子曰何以不告對曰君行臣不從爲不順譏簡子曰獵君囿不從君而自行也主將適螻而麓弗聞麓主君苑囿之官傳曰山林之木衡麓守之臣敢煩當日當日謂直日者也主將之君囿不煩麓以告君臣亦不敢煩主之直日以自白也簡子乃還覺所譏也戰國策曰齊欲伐魏淳于髠謂齊王曰韓子盧者天下之壯犬也東郭逡者海内之狡兎也韓子盧逐東郭逡環山者三騰山者五兎極於前犬疲於後犬兎俱罷各死其處田父見之無勞倦之苦而擅其功今齊魏乆相持頓其兵疲甚衆臣恐強秦大楚承其後而有田父之功齊王懼謝將休士說苑同也春秋後語曰貂勃常惡田單曰安平君小人也安平君聞之故爲酒而召貂勃曰單何以得罪於先生常見惡貂勃曰然跖之狗吠堯非貴跖而賤堯狗自吠非其主也且公孫子賢而徐子不肖然而公孫子與徐子闘徐之狗攫公孫子之腓而噬之獸以足曰攫攫音居縛切腓腨膓也音肥噬囓也若乃得去不肖爲賢者狗豈特攫而噬之哉安平君曰敬聞命矣明日單任之於王漢武故事曰公孫卿至東萊云見一人長五丈自稱巨公牽一黄犬把一黄雀欲謁天子因忽不見東方朔别傳曰天下之良馬將以捕䑕深宫之中曽不如跛犬也西京雜記曰楊萬年有獵狗名青骹賣直百金又曰茂陵少年李亭好馳駿狗逐獸或以鷹鷂兎皆以爲佳名狗則有脩毫釐脻白望青曹之名太平御覽卷第九百四
