front:
  text: 太平御覽卷第六百八十八服章部五
  hash: sha256:8baa40629f5672af687670b8c5b4ad9f7841ab1c759fc97377abe9c0d172f0d0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_688-1a}
body:
  text: 貂蟬簮導白筆帢幍幓頭纏鬢䋲附貂蟬徐廣車服雜注曰蟬取清髙飲露而不食貂取紫蔚温潤而光彩不彰灼又曰武官皆惠文冠夲趙服也一名武弁大冠凢侍臣加貂蟬愚謂北土寒凉本以貂皮煖附施於冠因遂變而成飾也應劭漢官儀曰侍中金蟬左貂金取堅剛不朽蟬居髙食潔貂内勁悍而外温潤貂蟬不見傳記者因物論義予覽戰國䇿乃知昔趙武靈王胡服也其後秦始皇破趙得其冠以賜侍中髙祖滅秦亦復如之末侍中皇權叅乗問貂璫何法不知其說復問地震云不爲災還宫左遷議郎又曰中常侍秦官也漢興或用士人銀璫左貂丗祖以來專用宦者石貂金璫漢書曰燕王旦郎中侍從着貂羽黄金附蟬又曰劉向上封事曰今王氏一姓乗朱輪華轂者二十三人皆青紫貂蟬充盈幄内又曰王莽簒位更漢黒貂爲黄貂又改漢正朔臘日太后命其官屬黒貂至漢家正臘日獨與其左右相對飲酒食肉晉書曰趙王倫簒位同謀者咸超階越次不可勝紀至於奴卒厮役亦加以爵位每朝㑹貂蟬盈坐故時喭曰貂不足狗尾續又曰劉聦破洛城將壞帝還平陽作赦書以六月十一日破洛羣王十二束手軍門貂蟬羽葆以充王府又曰阮孚字遥集爲安東府叅軍蓬髮飲酒不以王務嬰心後拜散騎常侍性旣嗜酒常以金貂換酒爲所司所彈帝宥之蕭子顯齊書曰侍中丗爲親近職魏晉選用稍増華重宋文帝元嘉中王曇首殷景仁等並爲侍中情任親宻景仁與帝接膝共語貂拂帝帝手抜貂置案上語畢復手挿之又曰王儉以朝儀草創衣服制則未有定凖議曰漢景六年梁王入朝中郎謁者金貂出入殿門左思魏都賦云藹藹列侍金貂齊光此藩國侍臣有貂明文又曰張敬兒𬒳收敬兒脱冠貂投地曰用此物誤我又曰武陵昭王曄武帝即位歷中書祠部尚書巫覡或言曄有非常之相以此自負武帝聞之故無寵未嘗處方岳於御座曲宴醉伏地貂抄肉柈帝笑曰汙貂對曰陛下愛其順毛而踈其骨肉帝不恱又曰何戢爲侍中上欲轉戢領選問尚書令禇彦回以戢資重欲加散騎常侍彦回曰宋時王球從侍中中書令單作吏部尚書資與戢相似領選職方昔小輕不容頓加常侍聖旨毎以蟬冕不冝過多臣與旣巳左珥若復加戢則八座便有三蟬若帖以驍游亦不爲少廼以戢爲吏部尚書加驍騎將軍又曰江淹累遷秘書監侍中衛尉卿𥘉淹年十三時孤貧嘗採薪以養母曽於樵所得貂蟬一具將鬻以供養其母曰此故汝之休徴也汝才行若此豈長賤耶可留待得侍中著之至是果如母言又曰周盤龍爲東平太守求解職見許還爲散騎常侍武帝戯之卿著貂蟬何如兠鍪盤龍曰此貂蟬從兠鍪中生耳梁書朱异除中書郎時秋日始拜有飛蟬正集异武冠上時咸謂蟬珥之兆後果如其言又曰王䂓爲晉安王長史王立爲太子仍爲散騎常侍太子中庶子侍東宮太子賜以所服貂蟬并降令書恱是舉也又曰陸雲善弈棊常夜侍坐武帝冠觸燭火帝笑謂曰燭燒卿貂帝將用爲侍中故以此戯之後魏書曰神龜元年詔加女侍中貂蟬同外侍中之飾任城王澄上表諌曰髙祖世宗皆有女侍中官未見綴金蟬於象珥極鼲貂於鬚髮江南僞晉穆何后有女尚書而加貂璫此乃衰亂之世妭妄之服請依常儀追還前詔帝從之鄴中記曰石虎征討所得婦女美色萬餘選爲女侍中着貂璫直皇后劉楨荅魏文帝牋曰貂鼲之尾挂侍臣之幘潘岳興賦曰登春臺之熈熈珥金貂之熲熲成公綏七唱曰金鐺煌煌貂珥峩峩也孫楚㑹王侍中座上詩曰顯允君子時惟英邵玄貂左移華蟬増曜簮導釋名曰簪連也所以簪冠於髮也導所以導掠鬢髮使入巾幘之裏也或曰掠鬢以事名之也服䖍通俗文曰幘導曰簪史記曰趙平原君使人於春申君趙使欲夸楚爲玳瑁簪春申君客三千餘人上客皆玳簪躡珠履趙使大慙也又曰李斯上書曰宛珠之簪傳璣之珥漢書曰上從館陶公主飲上曰頋謁主人公主乃下殿去簪珥徒跣頓首謝自引董君董君隨主前伏殿下又劉向列女傳曰周宣姜后齊女也宣王常晏起姜后脫簪珥待罪於永巷也又佞幸傳曰景帝没入鄧通家財一簪不得著身燕書曰髙祖慕容廆晉安北將軍張華雅有人鑒鎮薊撫御諸部髙祖童兒徃見華甚異之謂髙祖曰君後爲命世之器匡難濟時者也脱所著幘簪以遺髙祖結慇懃而别梁書曰羊侃家妓孫荆玉能反腰帖地衘得席上玉簪後魏書曰胡太后幸闕口温水登鷄頭山自射象牙簪一發中之董巴漢輿服志曰太皇太后入朝服紺上皂下簪以瑇瑁爲樀長一尺端爲華勝上爲鳯凰爵以翡翠爲毛羽下有白珠垂黄金鑷左右各一橫簪之以安幗結諸簪珥又曰公卿列侯中二千石夫人紺繒幗黄金龍首銜白珠魚湏長尺爲簪江表傳曰魏文帝遣使於呉求通犀簪群臣曰貢有常典魏所求非法冝勿與孫權曰彼在諒闇之中而所求若此寧可復與言禮皆備以付使韓詩外傳曰孔子遊少原之野有婦人央澤而哭夫子恠之使弟子問焉婦人對曰向看刈蓍薪而忘簪是以哀孔子曰刈蓍而忘簪有何悲焉婦人曰非傷忘簪吾所悲者不忘故也淮南子曰楚將子發好伎道之士有善爲偷者徃見子發子發禮之無幾何齊伐楚子發將師當之兵三却齊師逾強於是善偷則夜出取幘明夕取枕明夕又取簪悉歸之齊師大駭謀曰今夕不去楚軍恐取吾首還師而去之故伎無細能無薄在人君用之也鹽鐵論曰禹理水過門不入當此之時墮簪不顧郭子横洞冥記曰帝好微行於長安城西夜見一玉螭遊於路董謁曰昔桀媚末嬉於膝上以金簪貫玉螭腹爲戯弄今螭腹有金穿痕安知非此耶神仙傳曰左慈能分盃飲酒曹公聞試之慈抜簪以畫盃即斷其間相去數寸幽明録曰孫權時南方遣吏獻簪吏過宮亭湖廬山君廟請福下教求簮吏叩頭曰簪獻天子必乞哀念神云臨入石頭當相還吏遂去達石頭有三尺鯉魚跳入舡吏破腹得之呉均續齊諧記曰東海蔣潜嘗至不其縣於林野中見一死人烏來食之輙見一小兒長三尺許來駈烏乃起去潛乃徃看之見有犀導乃㧞取衆鳥争集無復駈者夢書曰簪者爲身簪者巳之尊也夢着好簪身歡喜班固與竇憲牋曰將軍哀憐賜以玉躬所喜駭玳瑁簪絳單衣以魯縞之質𬒳服鸞鳯之彩飾諸葛恢集詔荅恢曰今送一犀導小物耳然是情發於中而寄乎物班固與弟超書令遺仲叔瑇瑁黒犀簪西京雜記曰武帝過李夫人就取玉簪搔頭宫中爭効之玉價倍貴漢鐃歌有所思曲曰有所思乃在大海南何以爲問遺雙珠玳瑁簪白筆魏略曰明帝時嘗大㑹殿中御史簪白筆側階而坐上問左右此何官侍中辛毗對曰此謂御史舊簮筆以奏不法今但備官耳徐廣車服雜注曰古者貴賤皆執笏有事則書之常簪筆今之白筆是其遺象帢苦洽切服䖍通俗文曰帛幘曰帢王隱晉書曰陳舒議至尊臨温公夫人䘮議曰今白帢深衣當古弔服至尊臨弔謂深衣而已崔鴻十六國春秋西凉録曰燉煌父老令狐熾夢白頭公衣帢謂熾曰南風動吹長木胡桐椎不中轂言訖忽然不見李歆小字桐椎至期而亡南史曰何胤夢見神女二十許人並衣帢行列在前俱拜牀下覺又見之便命營㐫具旣而疾困不復􅪜後魏書曰宋遊道與頓丘李㢡一面便善㢡曰我年位巳髙㑹用弟爲佐史令弟北靣於我足矣遊道曰不能旣而㢡爲河南尹辟遊道爲中正使者相屬以衣帢待之握手歡謔謔潘京别傳曰陳躭𥘉爲州主簿司空何次道帢偏岸謿躭頓帢有所蔽也應聲報曰躭頓以蔽有明府岸以示無冝都山川記曰塩水上有石室民駱都到室邊採蜜見一仙人裙衫白帢坐見都凝瞻不轉傅子曰漢末魏太祖以天下㐫荒資財乏匱擬古皮弁裁縑帛以爲帢合乎簡昜隨時之義以色别貴賤于今施行可謂軍容非國容也世說曰陸雲好笑著帢暎水見影笑不能止髙惠文婦與惠文書曰今奉緫帢拾枚幍傳子云幍先未有岐荀文若巾觸樹成𡵨時人慕之因而弗改今通爲慶弔之服白紗爲之或單或裌𥘉婚冠送餞亦服之後魏書曰太和中文明太后崩齊遣其散騎常侍裴昭明謝峻等弔欲以朝服行事主客不許昭明等執志不移孝文勑尚書李冲選一與識者更與論執冲奏遣成淹昭明言不聽朝服行禮議出何典淹言玄冠不弔童孑焉正共聞昔季孫將行請遭䘮之禮千載之下猶共稱之卿方謂議出何典何其異哉昭明言唯賫袴褶不可以弔幸借衣幍以申國命敕送衣幍給昭明等明旦引入皆令文武盡哀後魏書裴植傳曰植母夏侯道遷姉也性甚剛峻於諸子皆如嚴君長成後非衣幍不見小有罪過必束帶伏門經五三日乃引見之督以嚴訓唯少子衍得以常服見之幓頭取遥反釋名曰幓鈔也鈔髮使上或謂之陌頭言其從横陌而前也齊人謂之奄髮使上也禮記玉藻曰士練帶率下辟士以下皆禪不合而經積如今作澡頭爲之東觀漢記曰建武中徴周黨黨著短布單衣榖皮幓頭待見尚書欲令更服黨曰朝廷夲以是故徴之安可復更遂以見自陳願守之所志上聽之後漢書曰向栩河内朝歌人少爲書生性卓詭不倫恒讀老子狀如學道又似狂生好𬒳髮着絳幓頭呉越春秋曰勾踐與妻入臣呉王衣獨鼻幓頭夫人衣無縁衣裳左開之𥜗以養馬古詩曰羅敷好養蠶採桑城南隅少年見羅敷脫巾著綃頭繁欽定情詩曰何以結相於金薄畫幓頭太平御覽卷第六百八十八
