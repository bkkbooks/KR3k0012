  text: 太平御覽卷第八百三十三資産部十三
  hash: sha256:2ef6757951dd91190c97e4a5bbf0915abda8785517f8d1170e4522aec234448f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_833-1a}
body:
  text: 陶冶鍜牧漁陶禮記檀弓曰有虞氏瓦棺始不用薪也有虞氏上陶夏后氏堲周火熟曰堲燒士冶以周於棺也或謂之士周又䘮大記曰甸人爲垼于西牆下陶人岀重鬲左傳襄公二十五年鄭子産曰昔虞閼父爲周陶正以服事我先王閼父舜之後當周之興閼父爲武王陶正我先王頼其利器用也與其神明之後也舜聖故謂之神明庸以元女大姬配胡公庸用也元女武王之長女胡公閼父之子滿也而封諸陳以備三恪周得天下封夏殷二王後又封舜後謂之恪并二王後爲三國其體轉降示敬而巳故曰三恪毛詩文王綿曰古公亶甫陶復陶穴未有家室續漢書曰董卓欲遷都長安楊彪不從卓作色曰楊公欲沮國家計耶關東方亂所在賊起崤函險固國之重防又隴右取材功夫不難杜陵南山下有孝武故陶處作塼瓦一朝可辦宫室官府蓋何足言吴書曰鄭泉宇文淵臨卒謂同類曰必葬我於陶家之側庶百歳之後化而成土幸見取爲酒壷實獲我心矣宋書曰文帝欲誅徐羡之羡之乗内人問訊車岀郭歩走至新林入陶竈中自經而死尸子曰昆吾作陶吕氏春秋同淮南子曰陶人埏埴也其取之地而以爲盆盎也無離於地其巳成器而破碎漫瀾而復歸其故也與其爲盆盎無以異矣周書曰神農耕而作陶吕氏春秋曰夫舜遇堯天也舜耕於歴山陶於河濵釣於雷澤天下恱之列仙傳曰寗封子者黄帝時人爲黄帝陶正有人過之爲其掌火能出入五色煙乆則以教封子積火自燒而隨煙氣上下視其灰燼猶有骨時人葬之北山中謂之寗封子焉嶺表異録曰廣州陶家皆作土鍋鑊燒熟以土油之其潔浄則愈於鐡器尤冝煑藥一斗者纔直十錢愛護者或得數日若迫以巨熖涸之則立見破烈斯亦濟貧之物冶禮記學記曰良冶之子必學爲裘仍見其家錮𥙷穿鑿之器也𥙷器者其金柔乃合有似於爲裘史記曰邯鄲郭順以鐡冶業與王者埓冨又曰宛丘氏之先梁人也用鐡冶爲業秦代魏遷孔氏南陽大鼓鑄規陂池連車騎遊諸侯因通啇賈之利有游間公子之名又曰魯人邴氏以鑄冶起冨至巨萬然家自父兄子弟約頫有拾仰有取師古曰頫古俯字也俯仰必有取捨無巨細字惡也張璠漢記曰杜詩爲太守爲冶作水排教化大行魏志曰韓曁字公至辟爲丞相土曹属後遷樂陵太守徙監冶謁者舊時冶作馬排每一熟石用馬百疋更作人排又費功力曁乃因長流爲水排計其利益參倍於前在職七年器用充實詔書襃歎就加司金都尉晉書曰王沉字彦伯作釋時論云融融者皆趨熱之士得其爐冶之門者唯挾炭之子苟非斯人不如其巳南史曰齊袁彖監吴興郡事彖到郡坐逆用禄錢免官付東冶彖妹爲竟陵王子良妃子良丗子昭胄時年八歳見武帝而形容慘悴帝問其故昭胄流涕曰臣舅負罪今在尚方臣母悲泣不食已積日臣所以不寧帝曰特爲兒赦之旣而帝遊孫陵遥望東冶曰中有一好貴囚數日與朝臣幸冶履行庫因宴飲賜囚徒酒肉勑見彖與語明日釋之梁書曰侯景據壽陽懷反計以䑓所給仗多不能精啓請治鍜工欲更營造勑並給之後魏書曰崔鑒爲東徐州刺史於州内銅冶爲農且丘人獲利北史曰後周薛善爲行䑓郎中時欲廣置屯田以供軍費乃除善司農少卿領同州夏陽縣二十七監又於夏陽置鐵冶復令善於監毎月役八千人營造軍器善自督課兼加慰撫甲兵稍利而皆忘其苦焉唐書曰侍中魏徴乞解所職請爲散官陪奉左右拾遺𥙷闕太宗曰朕㧞卿於讎虜之中任卿以樞要之職見朕之非未甞不諌公獨不見金之在鑛也何足貴哉良冶鍛而爲器便爲人所寳朕方自比於金以卿爲良匠卿雖有疾未爲衰老豈得便尓耶徴乃止尸子曰造冶者蚩尤也淮南子曰夫宋工畫呉冶刻形鏤法其爲微妙尭舜之聖不能及也列仙傳曰陶安公者六安冶師也數行火一旦散上紫色衡天安公伏冶下求哀湏臾朱雀至冶上曰安公冶安公冶與天通七月七日迎汝以赤龍至時龍到安公騎之東南上來武昌記曰北濟湖夲是新興冶塘湖元嘉𥘉發水冶水冶者以水排冶令顔茂以塘數破壞難爲功力茂因廢水冶以人鼓排謂之歩冶湖曰因破壞不復脩治冬月則涸王子年拾遺記曰漢太上皇微時甞佩一刀長三尺有銘其字雖難識疑是殷髙宗伐鬼方時作此物也上皇遊鄷沛山中遇有人冶鑄上皇息其旁問曰此鑄何物工笑曰爲天子鑄劒愼勿泄上皇謂爲戲辭無疑色工曰今所鑄鐡剛厲製器難成若得公腰間佩刀雜而治之即成神器可以剋定天下皇精爲輔佐以殱三猾木長火盛此爲興兆上皇曰余此物名爲匕首其利難儔水斷虵龍陸斬虎兕工曰若不得此匕首雖歐治專精越砥歛鍔終爲鄙器上皇即解腰間匕首投於爐中俄而煙炎衝天日爲之晦及劒成釁以三牲工問上皇何時得匕首上皇曰秦昭襄王時余行逢一野人於野授余云是殷時物丗丗相傳上有古字記其年月工人視之其鏌耶尚在叶前疑也工人持劒授上皇上皇以賜髙祖又曰漢郭況光武皇后之弟也累金數億家僮四百人黄金爲器功冶之聲震於都鄙時人謂郭氏之室不雨而雷言鑄鍜之聲盛也曹毗詠冶賦曰冶石爲器千爐齊設鍜箋曰鍛石可以爲質魏略曰太祖遣邯鄲淳詣臨淄侯植植得淳喜延入坐不與談先爲五椎鍜鄧粲晉紀曰嵇康曽鍜於長林之下鍾㑹造焉康坐坐以鹿皮嶷然正容不與之酬對㑹恨而去文士傳曰嵇康性巧能鍜家有栁樹乃激水以圍之夏月甚清凉居其下傲戯及自鍜禰衡傳曰衡字正平十月朝黃祖在艨衝舟上賔客皆㑹作黍臛旣至先在衡前衡得便飽食𥘉不顧左右旣畢復搏弄以戯時江夏有張伯雲亦在座調之曰禮教云何而食此正平不荅弄黍如故祖曰處士不當荅之也衡謂祖曰君子寜聞車前馬䊧祖呵之衡熟視祖罵曰死鍜錫公祖大怒令五伯將岀欲杖之而罵不止遂令絞殺黃財來救無所復及悽愴流涕曰此有異才曹操及劉荆州不殺大人柰何殺之祖曰人罵汝父作鍜錫公柰何不殺向秀別傳曰秀甞與嵇康偶鍜於洛邑與吕安灌山於山陽収其餘利以供酒食之費韓子曰椎鍛者所以平不夷也榜檠者所以矯不直也聖人之爲法也所以平不夷矯不直也牧周禮地官曰牧人掌牧六牲而阜蕃其物以共祭祀之牲牷六牲謂牛馬羊豕犬雞鄭司農云牷純也玄謂牷體完具又夏官曰牧師掌牧地皆有厲禁而頒之頒馬授圍者所牧處孟春焚牧焚牧地以除陳生新草中春通淫中春隂陽交萬物生之時可以合馬之牝牡也禮記月令季春曰是月也乃合累牛騰馬遊牝于牧累繫也騰躍也其牝欲遊則就牧而合仲夏曰是月也命有司祭先牧謂仲夏祭先牧於大澤用剛日毛詩小雅曰無羊宣王考牧也厲王之時牧人之職廢宣王始興而復之至此而成謂復先王牛羊之數誰謂爾無羊三百維羣誰謂爾無牛九十其犉黄牛黒唇曰犉箋云爾女也宣王復古之牧法汲汲於其數故歌此詩以解之也爾羊來思其角濈濈聚其角而息濈濈然云此者美冨産得其所爾牛來思其耳濕濕動其耳濕濕然或降于阿或飲于池或寢或訛訛動也言此者美其無所驚畏爾牧來思何蘘何笠或負其餱何揭也蘘所以備雨笠所以御暑言此者美牧人寒暑飲食有備三十維物爾牲則具又魯頌曰駉頌僖公也僖公能遵伯禽之法儉以足用寛以愛民務農重榖牧于坰野魯人尊之於是季孫行父請命于周而史克作頌季孫行父季文于也史克魯史也駉駉牧馬在坰之野駉駉良馬腹幹肥張也坰逺野也箋云必牧於坰野者辟知民居與良田者也史記曰卜式河南人少與弟别居脫身岀分獨取畜羊百餘田宅財物盡與弟式入山牧羊十餘歲羊致千餘上召之曰吾有羊上林中欲令子牧之乃布衣牧羊歳餘羊悉肥上過見其羊善之式曰非獨羊也治民亦猶是也以時起居惡者輙去無令敗羣上以式爲竒拜爲郎又曰衛青平陽人也其父爲平陽侯家給使與妾通生青爲侯家人少時歸其父父使牧羊民母之子皆奴畜之不以爲兄弟又曰范増說項梁曰以君代爲楚將必能立楚之後梁乃求懷王孫在人間爲人牧羊立以爲楚懷王後從人望也又曰公孫弘淄川人家貧牧豕海上年四十餘乃學春秋雜記漢書曰蘇武使匈奴欲降之乃徙武北海上無人處使牧羝羊曰羊乳乃得歸武仗漢節牧羊卧起操持節旄盡落又曰路温舒字長君鉅鹿人父爲里監門使温舒牧羊又曰王尊宇子貢涿郡髙陽人少孤歸諸父使牧羊澤中後漢書曰馬援轉遊隴漢間常謂賔客曰文夫爲志窮當益堅老當益壯因處田牧至有牛馬羊數千頭榖數萬斛旣而歎曰凡殖貨財産貴其能施賑也否則守錢虜耳仍盡散以班昆弟故舊身衣羊裘皮袴又曰承宫年八歳爲人牧猪郷里徐子威明春秋授諸生數百人宫過其廬下見諸生誦好之因亡其猪猪主欲笞諸生禁乃止之謝承後漢書曰孫期字仲式事母至孝牧豕於大澤中賣之以奉供養逺人從其學者皆執經遣於澤畔范瞱後漢書曰梁鴻字伯鸞扶風平陵人也家貧牧豕上林苑中曽誤遺失火延燒及他舎鴻乃尋訪燒者問所失去悉以豕償之其主者猶以爲少鄰家耆老見鴻非常人乃共責讓主人於是始敬異焉悉還豕鴻不受魏志曰楊俊字季才避地并州同郡王象孩少孤特爲人僕隷年十七八見使牧羊而私讀書用獲箠楚俊嘉美其才質即贖象着家娉娶立屋然後與別也晉書曰張華字茂先少家貧常以牧羊爲事三十國春秋曰沮渠蒙遜其先丗爲匈奴左沮渠因以官爲氏少牧羊卧息田畔忽見沙門以手摩其頭曰尔後當王此土不乆苦焉言終而滅崔鴻前趙録曰李景字延祐少貧見養叔父常使牧羊景見其叔子講誦羡之後從博士乞得百餘字牧羊之睱折草木書之叔乃誤曰吾家千里駒也而令騏驎乆躓塩坂乃爲娶妻教學又曰姜宇天水兾北人也少孤貧爲河北陳不識家牧羊年十五身長七尺九寸聦惠美風儀不識竒之妻之以女後魏書曰游明根字志逺㓜年遭亂爲櫟陽王氏奴主使牧羊明根以漿倩人書字路邊書地學之長安鎭將竇瑾見之呼問知其姓名乃告游雅使人贖之列子曰楊朱見梁惠王言治天下猶運諸掌王曰先王有一妻一妾而不能治言天下何也對曰君見夫牧羊者乎百羊爲羣使五尺童子荷箠而隨之欲東而東欲西而西使尭牽一羊舜荷箠而隨之則不能矣符子曰漢王聞宋勝子方牧羊于巨澤鼓而歌南風之詩使者進謂宋勝子曰漢王聞先生之賢使使者致命于先生而委國政焉宋勝子矍然而頋謂使者曰是何言歟今漢王待四海之士與十羣之羊其於職司也奚以異乎而大王廢牧羊之任委以四海之政是錯亂天位倒置人倫勝不願爲也乃逃于隂山之陽公孫尼子曰舜牧羊於潢陽還堯舉爲天子說文曰羌西戎牧羊人也字從羊人列仙傳曰啇丘子瑕吹笙牧豕七十不娶妻而死呉越春秋曰婁門外雞墟者呉王牧雞處陳武別傳曰武休屠胡人也常騎驢牧羊諸家牧竪十數人或有和歌者武遂學太山梁父吟及行路難之属也漁說文曰漁捕魚也周禮天官上曰􅘋人掌以時䱷爲梁月令季冬命漁師爲梁鄭司農云梁水偃也偃水爲關空以笱承其空詩日敝笱在梁春獻王鮪王鮪鮪之大者辨魚物爲鱻薧以共王膳羞鮮生也薧乾也凡祭祀賔客䘮紀共其魚之鱻薧凡䱷者掌其政令凡䱷征入于玉府鄭司農云漁征魚者之租稅漁人主収之入千王府禮記月令季冬曰命有司始漁天子親徃甞魚先薦寢廟天子親徃視魚非常事重之此時魚潔美又坊記曰故君子仕則不稼田則不漁左傳隱公曰公將如棠觀漁臧僖伯諌公曰吾將略地焉遂徃陳漁而觀之又襄公二十五年曰崔杼弑其君申蒯待漁者侍漁監取魚之官退謂其宰曰免是反子之義也與之皆死反死君之義周易下繫曰庖犧氏之王天下也結䋲而爲網罟以田以漁蓋取諸離尚書大傳曰舜漁雷澤之中後漢書曰明帝時下令禁人二業而吏下檢結多失其實百姓患之劉般上言郡國以官禁二業至有田者不得漁捕今濵江湖郡率少𧖟桑人資漁採以助口實且以冬春閑月不妨農事夫漁獵之利爲田除害有助榖食無關二業也北史曰後周裴俠除河北郡守此郡舊制有漁獵夫三十人以供郡守俠曰以口腹役人吾不爲也乃悉罷之管子曰漁人入海海深百仭就波逆流乗危百里宿夜不岀者利水也故利之所在雖千仭之山無不上焉深源之下無不入焉魯連子曰古善漁者宿沙瞿子使漁于山則雖十宿沙子不得一漁焉宿沙非闇於漁道也彼山者非魚之所生尸子曰燧人之丗天下多水故敎人之漁文子曰尭使水處者漁山處者木事冝其械械冝其人吕氏春秋曰雍季對晉文公曰竭澤而漁豈不獲得而明年無魚矣家語曰宻子賤治單父三年孔子使巫馬期徃觀政焉期隂免衣弊裘入界見䰻者得漁輙捨之期問焉曰凡漁者爲得也何以得魚却捨之曰魚之大者名爲鱄䲖吾大夫愛其小者名爲鱦鱄冝爲鱣新序作鱦者魚之懷仁也吾大夫欲長之是以得二者輙捨之期返告孔子曰宓子之德至矣使民暗行若嚴刑之於一方也訪問宓子何行而得於此子曰吾甞與之言曰誠於此者刑於彼宓子志行此術於單父也又曰孔子之楚有漁者獻魚焉孔子不受漁者曰天暑市逺無處鬻焉思欲弃之糞壤不若獻之君子故取以進之於是夫子再拜受之使弟子掃地將以祭享焉門人曰彼將弃之矣而夫子祭之何也子曰吾聞惜其腐餘欲以務施者仁人之偶也惡有受仁人之饋而無祭者乎劉向新序曰楚人有獻餘魚於王者曰今日獲魚食之不盡賣之不售弃之可惜故來獻王也楚王曰漁者仁人也境内多貧寡人聞之未能行漁者知之以此喻寡人也乃岀倉粟去後宫以妻寡夫郭璞江賦曰蘆人漁于儐落江山衣則羽褐食惟䟽鱻忽忘夕而宵歸詠採菱以扣舷倣自足於一區尋風波以窮年太平御覽卷第八百三十三
