front:
  text: 太平御覽卷第五百八十六
  hash: sha256:2a6955452f6e139a5b36eeae559e9b6cb7147f9cbc10133427b55f8720fe5f3b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_586-1a}
body:
  text: 文部詩文心雕龍曰詩者持也持人情性三百之蔽義歸無邪持之爲訓有符焉爾人禀七情應物斯感感物吟志莫非自然堯有大唐之歌虞造南風之詩觀其二文詞逹而巳及大禹成功九序惟歌少康敗德五子咸諷順羙匡惡其來乆矣自啇曁周雅頌圎備四始彪炳六義環深子夏鑒絢素之章子貢悟琢磨之句故啇賜二子可以言詩自王澤弥竭風人輟采春秋觀志以諷誦舊章酬酢以爲賔榮吐納而成聲文逮楚國諷怨則離騷爲刺秦王滅典亦造仙詩漢𥘉四言韋孟首唱匡諌之義継䡄周人孝武愛文栢梁列韻嚴馬之徒屬詞無方至成帝品録三百餘篇朝章國采亦云周備而詞人遣翰莫見五言所以李陵班婕見擬於前代按邵南行露始肇半章孺子滄浪亦有全曲暇䂊優歌逺見春秋邪淫童謡近在成世閱時取徵則五言乆矣又古詩佳麗或稱放叔其孤竹一篇則傳毅之詞比采而推固兩漢之作乎觀其結躰散文直而不野宛轉附物惆悵切情實五言之冠冕也至於張衡怨篇清典可味仙詩緩歌雅有新聲曁建安之𥘉五言騰踴文帝陳思縱轡以聘節王徐應對望路而争驅並隣風月狎池苑述思榮序酣宴慷慨以任氣磊落以使才造懷指事不求纎宻之巧驅詞逐皃唯取昭晣之能此其所用也及正始明道詩雜仙心何晏之徒率多浮淺唯嵇志清峻阮旨遥深若乃應璩百一獨立不懼詞譎義具魏之遺直也晉世群才稍入輕綺張左潘陸比肩詩衢采縟於正始力柔於建安或折文以爲武或流靡以自研此其大略也江左篇製溺於玄風羞笑徇務之志崇盛忘機之談袁孫巳下雖各有雕采而詞趣一揆莫與争雄所以景純仙篇挺拔而爲㑺也宋初文詠體有因革嚴老告退而山水方滋儷采百家之偶争價一句之竒情必極貌以冩物必窮力而追新此近代之所竟也故鋪觀列代而情變之數可鑒撮舉同異而綱領之要可明矣若夫四言正體則雅潤爲本五言流調則清麗居宗華實異用惟才所安故平子得其雅叔夜合其潤茂先擬其清景陽振其麗若兼善則子建仲宣徧羙則太冲公幹然詩有恒裁思無定位隨性適分鮮能圎通若妙識所難其易也將至忽以爲易其難也方來矣至於三六雜言則出自篇什離合之發則萌於啚䜟逥文所興則道原爲始聮句共韻則栢梁餘製巨細或殊情理同致緫歸詩囿故不繁云列子曰堯微服遊於康衢聞兒童謡曰立我蒸民莫匪尓極不識不知順帝之則堯問曰孰教尔爲此言童兒曰我聞之大夫問大夫大夫曰古詩也文章流别論曰詩言志歌永言古有採詩之官王者以知得失古詩之四言者振鷺于飛是也漢郊廟歌多用之五言者誰謂雀無角何以穿我屋是也樂府亦用之六言者我姑酌彼金罍是也樂府亦用之七言者交交黄鳥止于桑是也於俳諧倡樂世用之古詩之九言者浻酌彼行潦浥此注兹是也不入歌謡之章故世希爲之夫詩雖以情志爲本而以聲成爲節顔延之庭誥曰荀爽云詩者古之歌章然則雅誦之樂篇全矣是以後之詩者率以歌爲名及秦勒望岳漢祀郊宫辭著前史者文變之髙制也雖雅聲未至弘麗難追矣逮李陵衆作揔雜不類是假託非盡陵制至其善篇有足悲者摯虞文論足稱優洽栢梁以來継作非一纂所至七言而巳九言不見者將由聲度闡誕不恊金石至於五言流靡則劉楨張華四言側宻則張衡王粲若夫陳思王可謂兼之矣鍾嶸詩評曰古詩李陵班婕妤曹植劉楨王粲阮藉陸機潘岳張恊左思謝靈運等十二人詩皆上品曹植詩其原岀於國風其骨氣髙竒辭彩華茂情兼雅怨躰備文質粲然逸古卓尔不群嗟乎陳思之文章也譬人倫之有周孔鱗羽之有龍鳯音樂之有笙竽女工之有黼黻若孔子之門用文則公幹升堂思王入室王陽潘陸自可坐於廊廡之間劉楨文躰出於古詩伏氣愛竒動多震絶楨骨氣凌霜髙風跨俗但氣過其文彫潤恨少然自陳思巳徃楨稱獨歩張恊字景陽詩其原出於王粲文章華静實少病累又巧構形似之言雄於潘岳靡於太冲風流調逺實曠代之髙才其辭彩葱蒨音韻鏗鏘使人味之亹亹不倦阮籍詩其原出於小雅雖無彫斵之巧而詠懷之作可以陶性靈發幽致言在耳目之内情寄八荒之表洋洋乎㑹於風雅矣陶潜詩其原出於應璩又恊左思風力文躰省净殆無長語篤意真古辭興婉媚至如歡言酌春酒日暮天無雲風華清靡豈直田家語邪古今隱逸詩之宗也漢書曰王褒字子淵蜀人也宣帝時修武帝故事講論六藝劉向張子僑等待詔金馬門褒有俊材使褒作中和樂職如淳曰言王政中和在官者樂其職宣布詩蓺林曰宣帝詩歌之名選好事者依鹿鳴之聲習而歌之魏書曰李康字蕭逺性介立不和俗爲郷里所嫉故官不進甞作遊九嶷詩明帝異其文問左右斯人安在吾欲擢之因起爲隰陽長卒晉書載記曰李壽奢侈殺人以立威其臣龔壯作詩七篇託言應璩以諷壽壽報曰省詩知意若今人所作時賢之話言也古人所作死鬼之常辭耳又曰桓玄旣簒欲引用孟昶問其人於劉邁邁曰臣在京口不聞昶有異能但父子紛紛更相贈詩爾玄笑之而止宋書曰顔延之與陳郡謝靈運共以詞彩齊名而遟速懸絶文帝甞各勑擬樂府比上篇延之受詔便成靈運乆之乃就延之甞問鮑昭巳與靈運優劣昭曰謝五言如𥘉發芙蓉自然可愛君詩若鋪錦列繡彫繪滿眼鍾嶸詩評云靈運詩其原岀於陳思雅有景陽之躰嶸謂若人學多才博寓目輙書内無文思外無遺物其繁且冨冝哉然名章秀句處處間起妙曲新聲駱驛奔發類青松㧞木白玉映竹未足以貶髙才也又曰謝惠連方明之子也十歳能屬文族兄靈運嘉賞之云每有篇章對惠連輙得佳語甞於永嘉西堂思詩竟日不就忽夢惠連則得池塘生春草大以爲工常云此語有神工非余語也趙書曰徐光字季武年十四五爲將軍秣馬光但書馬枊吾浪反柱爲詩頌不親馬事梁書曰丘遟字希範辝采麗逸時有鍾嶸詩評云范雲婉轉清便如流風廻雪遟詩點綴映媚似落花依草雖義淺文通而秀於敬子其見稱如此三國典略曰周文州氏酋反制鄜州刺史髙琳討平之軍還帝宴群公卿士命賦詩言志琳詩云寄言竇車騎爲謝霍將軍何以報天子以漠静妖氛帝大恱曰獯獫陸梁未時欵塞卿言有驗國之福也又曰齊蕭慤字仁祖爲太子洗馬甞於秋夜賦詩其兩句云芙蓉露下落楊柳月中踈曰蕭仁祖之斯文可謂雕章間岀昔潘陸齊䡄不襲建安之風顔謝同聲遂革太乙之氣自漢逮晉情賞猶自不諧河北江南意製本應相詭顔黄門云吾愛其蕭散宛然在目而盧思道之徒雅所不愜箕畢殊好理冝固然又曰王睎爲常山王司馬睎恬憺寡欲不以世務爲累時謂之方叔司馬常遊晉祠賦詩曰日落應歸去魚鳥見留連時常山王遣使召睎睎不時至明日承相西閤祭酒盧思道問睎昨巳朱顔得無魚鳥致恠乎睎笑曰昨陶然以酒𬒳責卿軰亦是留連之一物豈直魚鳥而巳哉又曰辛德源甞於邢邵座賦詩其十字曰寒威漸離風春色方依樹衆咸稱善後王昕逢之謂曰今日可謂寒威離風春色依樹隋書曰楊素甞以五言詩七百字贈畨州刺史薛道衡詞氣宏拔風韻秀出亦爲一時盛作未幾而卒道衡歎曰人之將死其言也善豈若是乎唐書文苑傳曰元萬頃乾封中從英國公李勣征髙麗爲遼東道管記時别帥馮本以水軍援禆將郭封舡破失期封欲作書與勣恐髙麗知其救兵不至乗危迫之乃令萬頃作離合詩贈勣勣不逹其意大怒曰軍機急切何用詩爲必斬之萬頃解釋之乃止又曰錢起能五言詩𥘉從郷薦家寄江湖甞於客舎月夜獨吟遽聞人吟於廷曰曲終人不見江上數峯青起愕然懾衣視之無所見矣以爲鬼恠而志之及起就試之年李暐所試湘靈皷瑟詩題中有青字起即以鬼謡十字爲落句暐深嘉之稱爲絶唱是歳登第又曰元稹聦警絶人年少有才名與太原白居易爲友工爲詩善狀詠當時風態物色當時言詩者稱元白焉自衣冠士子至閭閻下俚悉傳諷之號爲元和體穆宗在東宫有妃嬪左右甞念及稹篇詠者宫中呼爲元才子至是極承恩遇甞爲長慶宫詞數十百篇閭里竟爲傳唱又曰劉禹錫晚年與少傳白居易友善居昜詩筆文章時無在其右者甞與禹錫唱和徃來因集其詩而序之曰彭城劉夢得詩豪者也其鋒森然少敢當者予不量力徃徃犯之夫合應者聲同交争者力敵一徃一復欲罷不能一二年來曰㝷筆硯同和贈荅不覺滋多大和三年春巳前𥿄墨所在者凢一百三十八首其餘乗興仗醉率然作者不在此數甞戯微之云僕與足下二十年來爲文友詩敵幸也亦不幸也吟詠情性播揚名聲其適遺形其樂忘老幸也然江南士女語才子者多云元白以子之故使僕不得獨歩於呉越閭此亦不幸也今垂老復遇夢得非重不幸耶夢得文之神妙莫先於詩若妙與神則吾豈敢如夢得雪裏髙山頭白早海中仙果子生遟沉舟側畔千㠶過病樹前頭萬木春之句之類真謂神妙矣在在處處應有靈物護持豈止兩家子弟秘藏而巳性說曰夏侯孝若作周詩成示潘岳曰此文非徒温雅乃見孝悌之性潘因此遂作家風詩又曰孫秀収石崇潘岳先送石棄市潘後至石謂潘曰安仁卿亦復尔耶潘曰可謂白首同所歸潘金谷詩云投分寄石友白首同所歸乃成其詩又曰孫子荆除婦服作詩以示王武子曰未知文生於情情生於文覽之悽然憎伉儷之重文士傳曰張秉自知短命乃作千年歌詩以自傷顔氏家訓曰王籍入若邪溪詩云蟬噪林逾静鳥鳴山更幽江南以爲文章斷絶物無異議簡文吟詠不能忘之金樓子云有何贈智者常於任昉座賦詩而其詩言不類任云卿詩可謂髙厚其人大怒曰遂以我詩爲狗號國朝傳記曰薛道衡聘陳爲人日詩云入春纔七日離家巳二年南人嗤之曰是底言語誰謂此虜解作詩及云人歸落鴈後思發在花前乃喜曰名下固無虚士國朝雜記曰沈佺期以工詩著名燕公張說甞謂之曰沈三兄詩直湏還他第一國史𥙷曰德宗以二月一日爲中和節宴百寮賦詩群臣奉和詔冩本賜戴叔倫於容州天下榮之又曰杜佑在淮南進崔叔清詩百篇上曰此惡詩焉用進時人謂之淮勑惡詩陸機文賦曰詩縁情而綺靡太平御覽卷第五百八十六
