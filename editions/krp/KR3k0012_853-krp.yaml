  text: 太平御覽卷第八百五十三
  hash: sha256:37b0c7abf9a57a21b6ebc536dd96466eec16cb06f817bdb28d194ee792fcd78c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_853-1a}
body:
  text: 飲食部十一􅦑饊麹蘖麩􅦑於月切方言曰腕謂之餚以豆屑雜餳也蒼頡解詁曰􅦑飴中着豆屑也說文曰􅦑豆飴也饊先但切廣雅曰浮􅦴也􅦴音流說文曰饊熬稻張饘也急就篇曰饊飴餳盧諶祭法曰四時皆用饊麹蘖書曰若作酒醴爾惟麹蘖記曰仲冬之月乃命有司稻必齊麹蘖必時左傳曰楚子伐簫還無社與司馬夘言􅉑申叔展還無杜蕭人也司馬夘申叔展皆楚大夫叔展曰有麥麹乎曰無麥麴所以御濕也有山芎藭乎曰無方言曰音器折音才䴳干八切麰音牟大夌麹也折音脾細麵麴也折音蒙有衣麴䴹麹小麦爲麴即麴耳自関而西秦豳之間曰晉之舊都曰䴭今河東人呼麴爲才齊右河濟曰䴳北燕曰䴹麹其通語也說文曰麹酒母也䤓生衣也䤁熟麹也蘖牙米也通俗文曰麥麹曰音壷音故版切釋名曰麹朽也鬰之使生衣朽敗也蘖缺也漬麥覆之使生牙關缺也史記曰文帝遺匈奴蘖又曰通邑大都蘖麹塩䜴千荅也東觀漢記曰順帝詔禁民無得酤賣酒麹漢晉陽春秋曰愍帝在長安爲劉粲所攻粮盡太倉有麹數十餅屑之爲粥以供奉帝麹屑盡遂降列子曰子産有兄公孫朝聚酒千鍾積麹成封劉伶酒德頌曰枕麹藉糟崔寔四民月令曰七月七日作麹麩蒼頡解詁曰麺細麸也說文曰麸小麥皮屑也史記曰陳平爲人長大美色或謂陳平貧何食而肥若是其嫂疾平之不視家産曰亦食糠覈孟康曰麦糠中之不破者晉灼曰京師謂慶屑爲紇頭呉書曰袁術旣爲雷薄等所距留住三日士衆絶粮乃還至江亭去壽春八十里問厨下尚有麥屑三十斛劉謙之晉記曰王莽誅童謡曰昔年食麥屑今年食䝁豆䝁豆不可食使我枯嚨喉崔寔四民月令曰五月五日至後可糴麸至冬以養馬太平御覽卷第八百五十三
