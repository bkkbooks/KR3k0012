front:
  text: 太平御覽卷第二十三時序部八
  hash: sha256:1d281a7266f1257f3d2e3b80bcde2501b3d89fbaf3a701b698e834a18d52f075
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_023-1a}
body:
  text: 夏下立夏夏至夏下淮南子曰中央土其帝黄帝黄帝以土徳王夫下號日轅氏死託祀於央之其佐后土執繩而制四方止其神爲鎮星其獸黄龍土色黄也其音宫其日戊巳音土也戊已土日也又曰孟夏之月南宫御女赤色衣赤采吹竽笙大生南方故處南宫也竽笙空中象陽故吹其兵㦸㦸有枝幹象陽布散也四月官田其樹桃四月勉農事故官田也桃說與杏同五月官相其樹榆是月養氣長養故官相佐也榆說聞未也季夏之月中宫御女黄色衣黄采其兵劒季夏中央也劒有兩刃喻無所不主也又曰貧人則夏𬒳褐帶索含菽飲水支暑熱冬則羊裘蔽體短褐不掩形而煬竈口又曰鄒衍事燕惠王盡忠左右譛之繫之仰天而哭夏五月天爲之降霜又曰陽氣爲火隂氣爲水水勝故夏至濕火勝故冬至燥八尺之表影脩尺有五寸影脩則隂氣勝短則陽氣勝隂氣勝則爲水陽氣勝則爲旱又曰南方之極自北户孫之外北户孫國名也日在其北皆爲北向户貫顓頊之國南至委火炎風之野夏赤又曰夏赤帝祝融之所司者萬二千里赤帝炎帝少典之子號爲神農南方火徳之帝也祝融顓頊之孫老童之子吴廻也名一黎爲髙辛氏火王號爲祝融死爲火神也其令曰爵有功賞有德惠賢良救飢渴舉力農振貧窮惠孤寡憂罷音疲疾出大賞起毀宗立無後封建侯立賢輔應陽施也又曰夏行春令則多風象春木氣多風又曰孟夏招揺指巳盛德在火又曰六月失政十二月草木不脫不脱葉著樹不零落也又景風至則施爵位賞有功夏至隂氣在下陽盛於上象陽布施故賞有功封建諸侯又曰夏治以衡衡者所以平萬物也衡之爲度也緩而不後平而不怨施而不德匝而不責常平民禄以繼不足勃勃楊楊唯得是行養長化育萬物蕃昌以成五糓以實封疆其政不失天地乃明明理也吕氏春秋曰杜厲叔事莒閔公以爲不知去居海上夏食菱芡冬食橡栗吕氏春秋曰季夏之月令漁師伐蛟升龜漁師掌漁官蛟有能害人難得故言伐龜神可以決吉凶入宗廟尊之故言外蛟則害龜則神也傅玄𫐠夏曰四月維夏運臻正陽和風穆而扇物麥含露而飛芒鳯皇昇而王萯秀王萯草名龍辰中而螢火翔魏文帝詩曰夏時饒温和避暑就清凉北坐髙閣下延賔作名倡嘉餚重疊來珎菓在一傍棊局縱撗陳愽弈合雙揚功拙更平聲勝負歡美樂人膓從朝至日夕安知夏節長賈誼􅨱鳥賦曰單閼音遏之歳兮四月孟夏庚子日斜兮􅨱集予舎立夏禮記月令曰四月之節日在昴立夏爲四月節昬翼中曉牽牛中斗建巳位之𥘉其日丙丁立夏之日螻蟈鳴太史以先立夏三日謁於天子曰某日立夏盛德在火天子乃齋立夏之日天子親率三公九卿大夫迎夏於南郊還乃賞公卿諸侯大夫於朝慶賜遂行無不欣恱命相賛傑俊遂賢良舉長大賛猶揚也遂猶逺也傑俊謂才兼於人者行爵出禄必當其位無虚授也易說曰立夏清明風至而暑鸛鳴愽糓飛電見龍外天龍心星名易通卦驗曰立夏雨螻蛄鳴三禮義宗曰四月立夏爲節者夏大也至此之時物巳長大故以爲目小滿爲中者物之生長小得並滿故以小滿爲名也孝經緯曰糓雨後十五日斗指辰東南維爲立夏後十五日斗指巳爲小滿續漢書禮儀志曰立夏之日夜漏未盡五刻京師百官皆衣赤至季衣黄抱朴子曰或問不熱之道荅曰立夏之日或服玄冰丸或服飛霜散及六壬六癸之符則不熱㓜伯子王仲都此二人衣之以重裘曝之於夏日之中周以十爐之火口不稱熱身不流汗盖用此方者也淮南子曰春分加四十六日而立夏大風濟濟止也音比夾鍾夾鍾二月也萬物去隂夾陽而生也加十五日指巳則小滿滿冐也音比太蔟太蔟正月律也蔟之言隂襄陽發萬物蔟地而生周書時訓曰立夏之日螻蟈不鳴水潦淫澷蚯蚓不出臣奪后命王瓜不生害于百姓小滿之日苦菜不秀仁人潜伏靡草未死國從盗賊小暑不至是謂隂匿劉玄之行軍月令曰立夏日得金五糓不成夏旱多風得木夏寒草生得火多妖言兵戈起得土逺臣不朝國無政令得水上下相和順天下安寧登真隠訣曰立夏之日日中五帝㑹諸仙人於紫微宫見四眞人論求道之功罪五帝之位諸宮皆有之此五方之帝非三十六天帝限也亦主學道者故詣太極紫微宮奉見四真人論扷其功罪之多少夏至周易復卦曰雷在地中復先王以至日閉關啇旅不行后不省方冬至隂之復也夏至陽之復也左傳曰昭二十一年秋七月壬午朔日有食之公問於梓愼曰是何物也禍福何爲物事也對曰二至二分二至冬至夏至二分春分秋分日有食之不爲災日月之行也分同道也至相過也二分日夜等故言同道二至長短極故相遇其他月則爲災陽不克也故常爲水隂侵陽是陽不勝隂傳曰少昊氏鳥名官伯趙氏司至者也伯趙伯勞也以夏至鳴冬至止周禮地官曰夏至日影尺有五寸鄭氏云土圭之長也尺有五寸夏至日立八尺表其影適與土圭等謂之地中今潁川陽城地爲然又春官大司樂曰孤竹之管雲和之琴瑟冬至日於地上圎丘奏之孫竹之管空桑之琴瑟夏至日於澤中方丘奏之隂竹之管龍門之琴瑟於宗廟奏之雲和空桑龍門皆山名又曰宗伯以夏至致地祗物鬽音魅以禬國之凶荒民之禮喪禬除也又曰柞氏夏至令刋陽木而火之冬至令剥隂木而水之又曰薙氏掌殺草夏日至而夷之易通卦驗曰夏至景風生蟬始鳴螳蜋生鹿角解木槿滎又曰夏至小暑蝦蟇無聲又曰鹿者獸中隂也貴臣之象鹿應隂解角也夏至大陽始屈隂氣始昇隂陽相向君之象也今失節不解臣不承君之象故爲貴臣作姦也又曰離南方也夏夏日中赤氣出直離此正氣也氣出右萬物半死氣出左赤地千里又曰夏至之日清明風至易稽覽圖曰夏至後三十日極温易稽覽圖曰夏至景風至蟬始鳴螗螂生京房占易曰夏至离王去聲景風用事人君當爵有德封有功春秋感精符曰冬日至成天文夏日至成地理春秋考異郵曰夏至井水躍五經通義曰夏至隂始動而未達故寢兵鼔不設政事所以助微氣之養也三禮義宗曰五月芒種爲節者言時可以種有芒之糓故以芒種爲名夏至爲中者至有三義一以明陽氣之至極二以明隂氣之始至三以見日行之北至故謂之至又曰夏至之時祭崑崙之神於澤之中配以后土孝經說曰夏至之日在内衡又曰斗指午爲夏至續漢書禮儀志曰夏至日浚井改水冬至鑚燧改火可去温病也又曰夏至隂氣萌作恐物不成以朱索連以桃印文以施門户代世所以尚爲飾也故漢以五月五日朱索五色印爲門户飾以止惡氣宋書元嘉四年斷夏至日五絲縷之屬南史曰沈林子父穆夫爲沈預所䧟死林子與兄田子還東報讎五月夏至節日至預家正大集㑹子弟盈堂林子兄弟挺身直入斬預首男女無論老㓜悉屠之以預首祭祖父墓周處曰風土記曰夏至之日雨名曰黄梅雨荆楚歳時記曰夏至日取菊爲灰以止小麥䖝蠹按于寳變化論乃云稻成蛩麥爲蛺蝶其驗乎輿地志曰郭弘常夏至於射的釣魚供母將餌聞笳角聲魚躍而去管子曰夏而麥熟天子祈天宗其盛以麥盛粢盛也麥者榖之始抱朴子曰魏武收左元放左慈字元放桎梏之而自解盖或用夏至日霹靂㰇音杉也又曰見潮來去或有早晚輙言有參差非也水從天邊來一月之中天再東再西故潮再大再小也夏至天髙故夏潮大也冬時天卑故潮水小也范子曰周髀云冬至三光微夏至三光盛淮南子曰夏至則斗南中繩陽氣極隂氣萌故曰夏至爲刑刑始殺也又曰夏至則火從之故五月火正而水漏火正火王也故漏水二說火星正中地漏濕也陽氣爲火隂氣爲水水勝故夏至濕又曰夏至而流黄澤石精氣流黄土之精也隂氣作於下故流澤而出也石精五色之精也蟬始鳴半夏生蚊䖟不食駒犢鷙鳥不摶黄口五月微隂在不未成駒犢黄口肌血脆弱未成故鷙鳥應隂不食不摶也又曰毛羽者飛行之類也故屬於陽故曰夏至日鹿角解又曰夏至加十五日指丁斗杓指丁則小暑音比大吕加十五日指未則大暑音比太蔟加十五日指庚背陽之維則夏節盡風俗通曰夏至著五綵辟兵題曰游光厲鬼知其名者無温疾五綵辟五兵也按人取新斷織繫户亦此類也謹案織取始斷二三寸帛綴着衣衿以巳織絍告成於諸姑也後世弥乆易以五綵又永建中京師大疫云厲鬼字野重游光亦但流言無指見之者其後歳歳有病人情愁怖復増題之兾以脫禍今家人織縑新皆取着後嫌絹二寸許繫户上此其驗也抱朴子曰子祖郴爲汲令以夏至日請主簿杜宣賜酒北壁上有懸赤弩照於盃中形如虵宣惡之及飲得疾後郴知之使宣於舊處設酒盃中猶有虵因謂宣曰此弩影耳宣遂意解古今暦術曰夏至之日晝六十五刻夜三十五刻酈道兀注水經日丹水出丹魚先夏至前十夜伺之魚浮水側赤光上照如火神異經曰北方荒中有石湖方千里無凸徒結切凹校交反平滿無髙下岸深五丈餘御名冰維夏至左右五六十日解其暦䟽曰芒種謂榖芽始出故曰芒種夏至其日日之行天至於艮維東北角言曰行極於北故曰夏至笁法真羅山䟽曰荔枝以冬青夏至日子始赤六七日可食雜說曰百舌鳥一名反舌春則囀夏至則止唯食蚯蚓正月以後凍開則來蚯蚓出故也十月巳後則藏蚯蚓蟄故也物之相感不知所由酉陽雜俎曰猫目睛旦暮圎及午竪歛如綖其鼻端常冷唯夏至一日暖蔡邕獨斷曰夏至隂氣始起鹿角解故寢兵鼓身欲寜志欲静不聽事送迎五日又曰夏至隂氣起君道衰故不賀又曰夏至之日离卦用事日中時南方有赤雲如馬者离氣至也冝黍离氣不至日月無光五榖不成人病目疼冬中無冰應在十一月内夏至之日風從离來爲順其年大熟夏至前一日夏至後十日十六日爲窮日月令占候圖曰夏至朔日夏至并二日三日至六日夏至五糓熟二十二日二十四日夏至五糓不熟二十五日三十日夏至時價平和晦日夏至五糓貴天文録曰大寒在冬至後二氣積寒而未温也大暑在夏至後二氣積暑而未歇也寒暑和乃在春秋分後二氣寒暑即未平也譬如火始入室未甚温弗事加新乆而愈熾旣遷之猶有餘熱也冬至之日日出辰入申晝行地上百四十六度強夜行地下二百一十九度少弱故晝短夜長也夏至之日日出寅入戍晝行地上二百一十九度少弱夜行地下一百四十六度強故晝長夜短春秋之日日出夘入酉晝行地上夜行地下皆一百八十二度半強晝夜長短同也太平御覽卷第二十三
