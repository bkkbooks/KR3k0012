body:
  text: 人事部十四毛髮鬢髺毛釋名曰毛貌也冒也在表所以別形貌且以覆冒也左傳僖中曰君子不禽二毛二毛頭白有二色又襄五曰宋芮司徒生女子赤而毛弃諸堤下共姬之妾取以入名之曰弃長而美漢書曰宣帝身足下有毛卧居數有光耀師古曰遍身及足下有有毛列子曰禽子問揚朱曰去子體一毛以濟一世爲之乎揚子曰世故非一毛所濟出以語孟孫孟孫曰積一毛以成肌膚積肌膚以成一節一毛故萬分之一物柰何輕之山海經曰毛民爲人身生毛郭璞注曰臨海東南海中有毛人晉永嘉四年得之也列仙傳曰偓於角切佺此縁切食松實形體生毛長數寸又曰毛女字玉名姜在華隂山世世見之形體生毛所止巖中恒有鼔琴聲自稱秦皇時宫人也神仙傳曰劉根學道入嵩髙山石室中冬夏不衣身毛長三尺神異經曰八荒中有毛人長七八尺身形頭上皆毛毛如猕猴長尺餘見人則口開吐舌名髯公一名髯猑音昆尋陽記曰桓穆遣人尋廬山下嶺見毛人長大體悉毛語不可解山居道士亦時見此臨海異物志曰毛人洲在張嶼毛長短如熊周綽得毛人送詣秣陵髮釋名曰髮拔也拔擢而出歸藏啓筮曰共工人面蛇身朱髮易說卦曰巽其於人也爲寡髮毛詩鄘栢舟曰鬒髮如雲不屑髢也鬒黒髮也如雲言美長也又魚藻曰彼都人士臺笠緇撮彼君子女綢直如髮其情性密緻操行正直髪之夲末無隆殺之彼都人士垂帶而厲彼君子女卷髮如蠆蠆螫蟲也尾赤捷然似婦人髪末曲上卷然又采緑曰終朝采緑不盈一掬予髮曲局薄言歸沭局卷也婦人夫不在則不容飾今曲卷其髪憂思之甚也禮斗威儀曰君乗木而王爲人美髮左傳僖中曰𥘉平王東遷辛有適伊川見𬒳髮而祭于野者曰不及百年此其戎乎其禮先亡矣僖公二十二年秦晉遷陸渾之戎於伊川又昭元年曰齊侯田于莒盧蒲嫳見泣且請曰余髮如此種種余奚能爲嫳慶封之黨種種短也放之于境自言衰老不能復爲之公曰諾子雅曰彼其髮短而心甚長其或寢處我矣嫳普篾切又昭七年曰昔有仍氏生女黰黒有仍古諸侯也美髮為黰而甚美光可鑑髮膚光色可以照人名曰玄妻以髮黒故又哀上曰公㑹吴子伐齊將戰公孫夏命其徒歌虞殯虞殯送葬歌曲示死也陳子行命其徒具唅玉唅玉亦示必死公孫揮命其徒曰人尋約吴髮短約䋲也八足爲尋呉髮短欲以䋲貫其首又哀上曰太伯端委以治周禮仲雍嗣之斷髮文身臝以爲飾豈禮也哉言其權時制冝以辟灾害非以爲禮也又哀下曰𥘉衛侯自城上見巳氏之妻髮美使髠之以爲吕姜吕姜莊公夫人髭髮也糓梁傳哀公曰呉夷狄之國斷髮文身斷髮避蛟龍也論語憲問曰子曰微管仲吾其𬒳髮左袵矣孝經曰身體髮膚受之父母不敢毁傷孝之始也史記曰箕子諌紂不聽乃𬒳髮佯狂爲奴又曰范睢先事魏中大夫須賈賈使齊睢從齊王聞睢辯賜金及牛酒須賈以爲睢持隂事告齊旣歸以告魏相魏相魏齊大怒使笞擊范睢睢旣相秦號曰張禄而魏弗知使須賈於秦睢謂賈曰汝罪有幾曰擢賈之髮續賈之罪未足也又曰太伯虞仲知古公欲立季歴以傳昌二人亡如荆蠻文身斷髪以讓季歴又曰藺相如使秦相如持壁却立倚柱怒髪上穿冠又曰衛皇后字子夫與武帝侍衣得幸頭解上見其髪鬢恱之因立爲后漢書曰蘇武留匈奴凡十九歳始以強壯出使及還鬢髮盡白又王莽傳曰更始元年置百官莽聞之愈恐欲外示自安乃染其髮鬢楚漢春秋曰上敗彭城薛人丁固追上上𬒳髮而顧曰丁公何相急之甚乃罵而去上即位欲陳功上曰使項失天下是子也爲人臣兩心非忠也下吏笞殺之東觀漢記曰明德馬后美髮爲四起大髻但以髮成尚有餘繞髺三匝又曰和熹鄧后六歳諸兄持后髮后曰身體髮膚受之父母不敢毀傷孝之始也何弄人髮乎又曰劉盆子年十五𬒳髮徒跣卒見衆拜恐怖啼泣謝承後漢書曰汝南李光字伯明爲兖州母亡後歸視牀處得亡母亂髮光持悲號氣絶復續又曰獻帝幸弘農郭汜虜略百官婦女有美髮者皆斷取之又曰曹操逼獻帝廢伏后以尚書令華歆郗慮副勒兵入宫收后后閉户藏壁中歆就牽后出時帝在外殿后𬒳髮徒跣行泣過訣曰不能復相活耶帝曰我亦不知命在何時魏志曰曹仁討關羽於樊于禁助仁秋大霖雨漢水溢禁等軍没禁遂降吴文帝踐祚權遣還引見禁鬢髮皓白形容憔悴拜安逺將軍欲遣使呉先令謁髙陵帝預於陵屋圗禁降伏之狀禁見慙恚發疾薨魏略曰明帝旣嗣立追痛甄后之薨故郭太后以憂暴崩甄后臨没以帝屬李夫人夫人說甄后見譖之禍不獲大歛𬒳髮覆面帝哀恨流涕命殯葬太后皆如甄后故事魏氏春秋曰明帝天姿秀出立髪委地口吃少言而沉毅好斷吴志曰留賛爲將臨敵必𬒳髮叫天自抗音而歌左右應之戰無不捷王隱晉書曰陶侃爲吏鄱陽孝廉與親人過侃宿母截髮以供賔諸客歎曰非賢母不生此子也又曰顧恱之與簡文帝同年而髮早白上問故對曰松栢之姿經霜猶茂蒲栁之質望風先凋又曰𥘉武帝未爲丗子文帝問裴秀曰人有相不秀曰中撫軍垂髮至地伸手過膝非人臣之相也又曰故中牟令蘇韶字孝先咸寜𥘉亡諸子迎䘮到襄城第九子節夢見鹵簿行列甚肅見韶曰卿犯鹵簿應髠刑節俛受剔覺循見頭髪視截如指大後又夢見韶截之節素美髮五截而盡沈約宋書曰臨川王義慶招集文士何長瑜自國侍郎至平西記室參軍常於江陵寄書與宗人何朂以韻語序義慶州府僚佐云陸展染鬢髮欲以媚側室青青不解乆星星行復出北齊書王琳字子衡山隂人也琳體貌閑雅髮垂委地齊書曰徐寅甞有罪繫旦日原之而髮皓白武帝問其故曰臣思愆於内而髮變於外當時稱之唐書曰髙祖竇皇后生而髮垂過頸三歳髮與身齊又曰龜兹國男女皆剪髪垂與項齊唯王不剪髮新羅國其婦人髮繞頭以綵爲飾髮甚長美家語曰顔回魯人字子淵年二十九髮早白韓子曰文公時宰人上炙而髮繞之事具炙門又曰昔齊桓宫中有三市婦倡三百𬒳髮而御婦人淮南子曰萬術曰理髮竈前婦安夫家帝王世紀曰老聃𥘉生而髮白故號老子吕氏春秋曰殷湯尅夏而大旱湯乃以身禱於桑林剪其髮自以爲犧牲祈福於上帝山海經曰脩般民白民其人𬒳髮曹瞞傳曰太祖甞行過麥中令士卒無敗麥犯者死騎士皆下馬持麥以相付時太祖馬騰入麥中太祖曰制法而自犯之何以帥下然孤爲軍帥不可殺請自刑因援劒割髮置地許逵別傳曰薊子訓齊人有神術人髮白者請子訓但與對坐共語宿昔間髮皆黒樊英別傳曰英𬒳髮忽拔刀斫舎中妻問故曰郄生道遇鈔郄生還云道遇賊頼𬒳髮老人相救得全郄生名廵字仲信陳郡夏陽人能傳英業黄庭經曰髮神名蒼華列仙傳曰容成公黄帝善𥙷導事髪白更黒寗先生稷丘君髮白更黒寗先生𬒳髮鼓琴赤斧餌丹砂毛髮皆赤阮丘𬒳髮覆耳成璜道士兒丘與老子黄庭經讀三遍通之俱入浮陽山白髮更黒鬚長三尺餘神異經曰東荒山中有大石室東王公居之長一丈頭髮皓白身人形而虎尾與一玉女更投壷又曰西方有人焉不欲不食𬒳髮東走巳往覆來其婦恒追掔録之不肯聽止婦頭亦𬒳髮名曰狂一名㒹一名覆此人夫妻與天地俱生狂走東西以投晝夜異苑曰有人誤呑髮便得病但欲咽猪脂張口時喉中有一頭出受膏乃取小鈎餌而引之得一物長二尺餘其形似蛇而悉是脂縣於屋間旬日融盡唯髮在焉列女傳曰吴伯陽妻顧昭君早寡剪髪以明志又曰樂羊學書其妻貞義截髮以供其費又曰廣漢馮季宰妻者李氏之女名珥字進早寡無嗣奉養繼姑守心純固以義自防珥母愍其孤苦隂有所許珥斷髮自明郷人稱之陳留風俗傳曰小黄縣者宋地陽武東黄郷也因黄水以名縣沛公起兵野戰喪皇妣于黄郷天下平定乃使使者梓棺招魂幽野於是丹蛇在水自洒濯入梓棺其浴處有遺髮故謚曰昭靈夫人益部耆舊傳曰蜀郡公乗㑹妻同縣張氏女也㑹早卒後欲問者女乃斷髮割耳以明不嫁車頻秦書曰符堅建元十八年新羅國獻美女國在百濟東其人多美髮髮長丈餘林邑國記曰朱崖人多長髮漢時郡守貪殘縛婦女割頭取髮由是叛亂不復賔伏廣志曰黄頭夷髮黄如苕菷戴延之西征記曰陜縣大城西北角水漫湧起勃鬱方數十丈有如物居水中父老云銅翁仲頭髮常與水齊晉軍至髮不復出唯見水黒嗟嗟有聲聲聞數里翁仲夲在大司馬門外爲賊所徙至此而没譚藪曰後魏盧景𥙿生而頭髮白有四十九莖因名曰白頭王子年拾遺録曰帝嚳髙辛氏娶於諏氏女女生而髮與足齊墜地能言乃納於帝又曰張儀蘇秦二人共遞剪髮以相活或傭力冩書行遇聖人之文無以題記則以墨畫於掌内及股裏夜還更以竹冩之晉左思白髮賦曰星星白髮生於鬢垂雖非青蠅穢我光儀䇿名觀國以此見疵將鑷將拔好爵是縻白髮將拔惄然自訴禀命不幸值君年暮逼迫秋霜生而皓素如覽明鏡惕然見惡朝生晝拔何罪之故觀橘觀柚一皜一曄貴其素華匪尚緑葉願戢子手攝子之鑷咨亦白髮觀丗之塗靡不追榮貴華賤枯赫赫閶闔藹藹紫廬弱冠來仕童髦獻謨甘羅乗軒子竒剖符英英終賈髙論雲衢拔白就黒此自在吾白髮臨拔瞋目號呼何我之冤何子之愚甘羅自以辯惠見稱不以髮黒而名著賈生自以良才見異不以厚鬢而獲舉聞之先民國用老成二老歸周周道肅清四皓佐漢漢德光明何必去我然後要榮咨尔白髮事各有以尓之所言非不有理曩尊耆耋今薄舊齒皤皤榮期皓首田里雖有二毛河清難俟隨時之冝見歎孔子白髮辭盡誓以固窮昔臨玉顔今從飛蓬髮膚至昵尚不克終聊用擬辭比之國風鬢說文曰鬢頰髮也釋名曰其上連髮曰鬢鬢賔也賔崖也爲面額之崖岸也晉書曰魏造凌雲殿榜未題匠誤釘之使韋仲將縣撜書之比訖髮鬢盡白還戒子孫冝絶此法橙音鐙神仙傳曰薊子訓郷曲諸老鬢髮白者使宿昔之間皆黒崔豹古今注曰魏文帝宫人絶所愛者有莫瓊樹薛夜來陳尚衣陳巧笑瓊樹始制爲蟬鬢望之縹緲如蟬翼故曰蟬鬢述異記曰尹雄年九十左鬢生角長半寸呉質表曰質巳四十三矣白髮生鬢髺說文曰髺結髮也漢書曰尉他魋髺服䖍注曰今兵推頭結也續漢書五行志曰桓帝元嘉中京師婦女作墮馬髺墮馬髺者側在一邊自梁兾家所爲京師皆效天戒若曰兾婦女將收捕吏卒頓曵令髺傾邪東觀漢記曰梁鴻妻樵髺着布衣操作具而前鴻大喜曰此真梁鴻妻也能奉我矣字之曰德曜孟光又曰馬廖上表長樂宫曰長安語曰城中好髙髺四方髙一尺王隱晉書曰賈后作頡子髺太子見頡之象于寳晉紀曰𥘉賈后造首紒以繒縛其髺天下化之名頡子紒也紒户計切搜神記曰元康中婦人結髺者旣成以繒急束其環名曰纈子髻始自中宫天下翕然化之及其末年有愍懷之事唐書曰田悅旣敗謂其下曰吾不能自剄公當斬吾首以取功勲衆皆憐之曰死生以之恱曰吾雖死寜忘厚意於城下乎乃自割一髻以爲要誓於是將士各斷其髪結爲兄弟誓同生死唐書曰中天笁國人皆爲螺髺於頂餘髮剪之使拳丗說曰王曇孫年十四便歌謝公召至曇孫作兩丸髪梁兾別傳曰兾未誅時婦人作不聊生髺神仙傳曰麻姑至蔡經家是好女子年十八許作髺餘髮散垂之至腰枚乗梁苑園賦曰若乃採桑之婦連䄂方路摩陁長髺便姢數顧太平御覽卷第三百七十三
