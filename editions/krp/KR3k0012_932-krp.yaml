front:
  text: 太平御覽卷第九百三十二鱗介部四
  hash: sha256:292e6c7e1948fa7e3685870e2f0ca01880bc233458f9b5c674956ff7dc7d61a0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_932-1a}
body:
  text: 鼈黿鼉吊鼈易說卦曰離爲鼈爾雅曰鼈三足能今呉興陽羡縣君山上有池中出三足鼈周書曰成王時長沙獻鼈蜃周禮天官鼈人曰鼈人掌取玄物以時藉魚鼈蜃鄭司農云藉謂以杖刺泥中搏取之春獻鼈蜃禮記曲禮上曰水潦降不獻魚鼈不饒多也又樂記曰土敝則草木不長水煩則魚鼈不大魏略舊志曰昔北方有槖離之國者其王侍婢有身王欲殺之婢云有氣如鷄子來下我故有娠後生子王捐之於溷中猪以氣嘘之徙馬欄馬以氣嘘之王疑之以天子乃命其母収畜之名曰東明常令牧馬東明善射王恐奪其國欲殺之東明走南至淹水以弓擊水魚鼈浮爲橋東明得渡而魚鼈解散追兵不得渡東明因都王夫餘之地後魏書曰夫餘之臣以朱蒙善射欲殺之朱蒙母以告朱蒙與烏連二棄之夫餘東南走遇一大水欲濟無梁蒙告水曰我是河伯外孫今逃追兵垂及如何於是魚鼈並浮爲成橋朱蒙得渡追騎不得渡蒙至絶升骨城遂居焉隋書曰崔弘度毎誡其寮吏曰人當誠恕無得欺誑皆曰諾後嘗食鼈侍者八九人弘度一一問之曰鼈美乎人懼之皆云鼈美弘度於是大罵曰傭奴何敢誑我汝𥘉未食鼈安知其美俱杖之八十官屬百工見之莫不流汗無敢欺隱孫卿子曰跬歩不休跛鼈千里淮南子同莊子曰塪井之跬謂東海鼈曰吾跳梁井幹之上入沐鈌甃之岸樂亦至矣子奚不時來入觀乎海鼈左足未入而右膝巳墊矣於是逡廵而却告之曰夫海千里之逺不足舉其大千仞之髙不足極其深禹時十年九潦而水不爲加益湯時八年七旱而岸不加損夫不爲湏臾推移不以多少進退者此亦東海之大樂也於是蛙聞之適適然驚規然自失韓子曰鄭縣人卜子毒妻之市買鼈以歸潁水以爲渇因縱而飲之遂失鼈淮南子曰鼈無耳而目不可以瞥精於明也不可以瞥瞥則見又曰王子慶忌足躡麋鹿手縛兕虎置之冥室之中不能摶龜鼈勢不便也慶忌呉王僚之子也又曰大生小多生少天之道也故立阜不能生雲雨縈水不能生魚鼈者小也又曰殺戎馬而求狐狸援兩鼈而失靈龜斷右臂而爭一毛折鏌鎁而爭鷄刀用智如此豈足髙乎髙猶貴也又曰忠信形於内感動應於外故禹執干戚儛於階之間而三苗服三苗畔禹禹風以禮樂而服也鷹翔川魚鼈沉禹以徳服三苗猶鷹翔川上魚鼈恐皆深飛鳥揚鳥見鷹而揚去必逺實也鷹懷欲害之心故鳥魚知其情實故逺之說苑曰曾子有疾曽元抱首曽華抱足曽子曰吾無顔氏之才何以告汝雖無能君子務益夫華多實少者天也言多行少者人也夫飛鳥以山爲卑而層巢其巔魚鼈以淵爲淺而穿穴其中然所以得者餌也君子苟能無以利害身辱安從至乎國語曰公父文伯飲南宫敬叔酒以露賭父爲客賭父曾大夫客上客也羞鼈焉小賭父怒相延食鼈辭曰將使鼈長而後食之遂岀文伯之母聞之怒曰吾聞之先子曰祭養尸饗飬上賔言祭祀之禮尊養尸饗宴之禮養上賔鼈於何有而使夫人怒曰遂逐之五日吕氏春秋曰水之深則魚鼈歸之樹之盛則飛鳥歸之庶草美則禽獸歸之人主賢則豪傑歸之晏子春秋曰齊大旱景公召羣臣問曰寡人欲祀河伯可乎晏子曰不可河伯以水爲國以魚鼈爲民彼獨不欲雨乎祀之何益山海經曰從山多三足鼈顧譚新言曰呉之翫水若魚鼈蜀之便山若禽獸神仙傳曰汝南郡中常有鬼恠歳輙數出過時導從威儀如太守入府打鼓周行内外乃還去甚以爲患後費長房詣府君而正值此鬼來到府君門常徑入獨此來至門而巳不敢前欲去長房厲聲呼使促前來鬼化作老公乃下車把板伏庭中叩頭乞得自改長房曰汝死老鬼不念良善無故導從盪突官府知當死不復汝真形此鬼湏臾即成大鼈如車輪頸長一丈許長房復令還就人形以一札符付之令送與葛陂君鬼叩頭流涕持一札符去使人追視之至陂邊以頸繞株而死王子年拾遺記曰容山下有水多丹鼈魚皆能飛躍星經曰天鼈十三星在南斗主水蟲南越志曰海中有朱鼈狀如肺有眼六脚而常吐珠見則天下大旱崔豹古今注曰鼈一名河伯從事愽物志曰九竅者胎化八竅者卵生龜鼈黿此諸類皆卵生而影伏又曰大腰無雄龜鼉類也無雄與虵通氣則孕又曰鼈剉令如棊擣赤莧汁和合厚以茅苞五六月中作投於池澤中經旬臠臠成鼈志恠曰昔有人與奴俱得心腹病治不能愈奴死乃刳腹視之得一白鼈赤眼甚鮮淨以諸藥内鼈口中終不死後有人乗白馬來者馬溺濺鼈縮頭藏脚乃試取馬溺灌之豁然消成水病者頓飲一升即愈淮南萬畢術曰青泥殺鼈得莧復生黿禮記月令曰季秋登龜取黿左傳宣上曰楚人獻黿於鄭靈公公子宋與子家將見子公之食指動以示子家曰他日我如此必嘗異味及入宰夫將解黿相視而笑公問之子家以告及食大夫黿召子公而弗與也子公怒染指於鼎嘗之而岀廣雅曰海黿大􅩔重千鈞續漢書曰靈帝時江夏黃氏之母浴而化爲黿入于深淵其後時時出見初浴簮一銀釵及見猶在其首唐史曰韋丹少在東洛嘗至中橋見數百人喧集水濵乃漁者網得大黿繫之橋柱引頸四顧有求救之意丹問曰幾錢可贖曰五千丹曰吾驢直三千可乎曰可於是與之放黿於水徒歩而歸淮南子曰桀之力别觡伸釣洛骨也索鐵操金椎移大戯大戯軍之大旗水殺黿鼉陸捕熊羆又曰積力之所舉則無不勝也衆智之所爲則無不成也塪井之所無黿鼉隘也園中之無脩木小也又曰髙山險阻深林藂薄虎豹之所樂也人入之而畏川谷通原積水重淵黿鼉之所便也人入之而死魏子曰夫樹樹異風人人異心不可以一檢量故黿鼉得水則生虎豹得水則死晏子春秋曰齊三子爭桃古冶子曰吾嘗濟河黿衘左驂而入砥柱流冶潜行逆流百歩從流九里得黿頭鶴躍而出若冶之功可以食桃枹朴子曰在頭水有大黿常在深潭號爲黿潭此能作魅行病呉有道士戴炳者能視見之以越章封泥遍擲潭中良乆有大黿徑長丈餘浮出不敢動乃格殺之而病者並愈又有小黿出羅列死於渚上甚多書紀年曰穆王三十七年起師至九江以黿爲梁也璅語曰范獻子獵占之曰此其繇也君子得黿小人遺冠獻子獵而不得遺其豹冠列仙傳曰廬山頂上有湖湖廣數頃黿鼉盈於水中博物志曰屠黿解其肌肉唯膓連於頭而經日不死猶能齧物鳥徃食之則爲所得漁者或以張鳥雀崔豹古今注曰黿爲河伯使者捜神記曰齊景公渡于江沅之河黿衘左驂没之衆皆惕懼古冶子於是拔劒從邪行五里逆三里至于砥柱之下乃黿也左手持黿頭右手俠左驂鷰躍鵠踴而出仰天大呼水逆流三百歩觀者皆以爲河伯也淮南万畢術曰黿暗得火可以燃鐵取黿殺之燒鐵如炭狀以卒其脂中鐵自燃燒黿致鼈取黿燒之鼈自至楚辭曰乗白黿兮逐漁言河伯遊鈸近則乗黿也宋玉髙唐賦曰黿鼉鱣鮪交積縱橫鼉毛詩文王靈臺曰鼉皷逢逢禮記月令曰季秋之月伐蛟取鼉說文曰鼉水蟲似蜥蝎長丈所從龜單聲汲冡周書王㑹曰㑹稽似鼉注其皮可以冠鼔呉志曰孫亮𥘉公安有白鼉鳴瑶曰鼉鳴龜背平南郡城中可求生守死不去來無成明年諸葛恪敗弟融鎮公安𬒳収融刮金印龜背一服而死江表傳同莊子曰孔子觀於吕梁懸水三十仞流沬三十里黿鼉不得游見一丈夫游之數百歩而出孔子請問曰有道乎丈夫曰吾長於性成乎命從水之道而無私焉吕氏春秋曰帝顓頊令飛龍作八風之音以祭上帝乃會爲樂昌鼉乃偃寢以其尾擊腹其音美也捜神記曰榮陽張福舡行夜有女子乗小舟來投福云日暮畏虎不敢夜行福戯調之遂就福寢中夜月照乃見一白鼉枕福臂而卧福驚起鼉便去乗之舡乃枯槎也郭義恭廣志曰鼉魚長三尺有四足髙尺餘尾加蝘蜓而大南方嫁娶必得食之魏武赤壁還所掘得之是也支僧載外國事曰私訶條國全道遼山有毗呵羅寺寺中有石鼉至有神靈衆僧飲食欲盡寺奴輙向石鼉作禮於是食具許氏志恠曰沙門竺僧瑶得神符尤能治邪廣陵王家女病邪召瑶治之瑶入門便瞋目大罵老魅不守道敢干犯人女在内大喚云人殺我夫鬼在側曰吾命盡於今可爲痛心因歔欷悲啼又曰此神也不可爭傍人悉聞於是化爲老鼉走出中庭瑶入撲殺之幽明録曰宋髙祖永𥘉中張春爲武昌太守時人有嫁女未及昇車忽便失性岀外歐擊人乗玄巳不樂嫁俗人巫云是邪魅乃將女江際擊皷以術祝治療春以爲欺惑百姓制期湏得妖魅後有一青虵來到巫所即以大釘釘頭至日中復見大龜從江來伏前更以赤朱書背作符更遣入立至暮有大白鼉從江中出乍沉乍浮向龜隨後催逼鼉自忿死昌來先入慢與女辭訣女慟哭云失其因好自此漸差或問巫曰魅者歸於何物巫云虵是傳通龜是媒人鼉是其對所獲三物悉示春春始知靈驗吊裴氏廣州記曰吊虵頭鼉身亦水宿亦水栖俗謂爲吊膏至輕利以銅瓦器貯之浸岀而唯鷄卵盛之不漏磨治諸毒腫絶驗也太平御覽卷第九百三十二
