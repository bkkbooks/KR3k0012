front:
  text: 太平御覽卷第四百七十六
  hash: sha256:d738f5c8df155cda01fb21da468ce06fb9309f71ef691f081dcbffd108a9bccb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_476-1a}
body:
  text: 人事部一百一十七施恩上周易曰見龍在田德施普也雲行雨施天下治也周禮曰小司徒以歳時廵國野而賙萬人之艱阨以王命施惠左傳曰冬晉荐饑使乞糴于秦秦伯謂子桑曰與諸乎對曰重施而不報其民必携携而討焉無衆必敗謂百里曰與諸乎對曰天災流行國家代有救災恤憐道也行道有福是以輸粟于晉自雍及絳相繼命之曰汎舟之役傳曰晉侯逆秦師使韓簡視師復曰師少於我闘士倍我公曰何故對曰出因其資入用其寵飢食其粟三施無報是以來也傳曰宋公子鮑禮於國人宋飢竭其粟而貸之年七十以上無不饋詒也時加羞珎異無日不數於六卿之門國之賢人無不事也親自桓以下無不䘏也公子鮑美而艶襄夫人欲通之鮑適祖母而不可乃助之施傳曰鄭子皮即位於是鄭飢而未及麥民病子皮以子展之命餼國人粟戸一鍾是以得鄭國之民故罕氏常掌國政以爲上卿傳曰楚子伐蕭申公巫臣曰師人多寒王廵三軍拊而勉之三軍之士皆如挾纊傳曰晉公子重耳及曹僖負羈之妻曰吾觀晉公子從者皆足以相公子必反其國若反其國必得志於諸侯而誅無禮曹其首也子盍早自貳焉乃饋盤飡置壁焉公子受飡反璧傳曰子西曰昔闔廬有國天有災厲親廵孤寡而供其乏困在軍熟食者分而後敢食語曰子華使於齊冉子爲其母請粟子曰與之釡請益曰與之庾冉子與之粟五秉子曰赤之適齊也乗肥馬衣輕裘吾聞之君子周急不繼冨史記曰范蠡之陶修産積居十九年中三致千金再散分與貧交友兄弟此謂冨好行其德者也又曰田常以大斗出貸以小斗收齊人歌之曰嫗乎採芭歸乎田成子又曰蘇秦爲從約長并相六國北報趙王乃行過雒陽周顯王使人郊勞於是蘇秦散千金以賜宗族貧友漢書曰韓信釣於城下諸母漂漂水擊挐爲漂有一母見信飢飯信竟漂數十日信謂漂母曰吾必重報母怒曰大夫不能自食吾哀王孫而進食蘇林曰如言公子也豈望報乎前列曰呉楚反竇嬰爲大將軍賜金千斤嬰言袁盎欒布諸名賢士在家進之所賜金陳廊廡下軍吏過輙令財取爲用蘇林曰自令裁取爲用金無入家者又曰李廣歷七郡太守前後四十年得賞賜輙分其麾下飲食與士卒共之家無餘財終不言生産事前列曰婁護字君卿爲諌議大夫使郡國護貸多持幣帛至齊上書永上先人冡因會宗族人各以親踈與束帛一日散百金之費使還奏事事稱㫖擢夫水太守前列曰韋玄成字少翁以父任爲郎少好學脩父業尤謙遜下士出遇相識歩行輙下從者與載送之以爲常其接人貧賤者益加由是名譽日廣以明經擢爲諌議大夫遷大河都尉前列曰張臨安丗曾孫亦謙儉毎登閣殿常歎曰桑霍爲我戒豈不厚且死分施宗族故舊薄葬不起墳又曰蘇武爲右曹典屬國所得賞賜盡以施與昆弟故人又曰未邑爲人惇篤於故舊以愛和爲行居處儉節賜以供九族郷黨家無餘財後漢書曰趙典兄子温字子恭𥘉爲京兆郡丞歎曰丈夫當雄飛安能雌伏遂弃官去遭歳大飢散家粮以賑窮餓所活萬餘人後列曰劉詡字子相頴川人家丗豊産常能周施而有不其惠嘗行於汝南界中有陳國張季禮逺赴師䘮遇寒冰車毀頓滯道路詡見而下車與之不告姓名自䇿馬去季禮意其子相也後故到頴隂還所假乗詡閇門辭行不與相見後黄巾賊起郡縣飢荒詡救給乏絶資粮者數百人又逢知故困餒於路不忍委去因殺所駕牛以救之衆人止之詡曰視没不救非志也遂俱餓後列曰折像字伯式廣漢雒人父國有資財二億家僮八伯人像㓜有仁心不殺昆虫不折萌牙能通京氏易好黄老言及國卒感多藏厚亡之義乃散金帛資産周施親踈自知亡日召賔客飲食辭訣忽然而終又曰廖扶逆知歳荒乃聚糓數千斛悉用周給宗族姻親又歛葬遭疫死亡不能自収者常居先人冡側未曾入城市人因號爲北郭袁宏後漢書曰种暠字景伯父爲定陶令有財三千萬父卒暠皆以賑郷里貧賤者其進趣名利者皆不與交通東觀漢記曰鄧弘収恤故舊無所失父所厚同郡郎中王臨年老貧乏弘常居業給足乞與衣裘輿馬施之終竟後列曰馬援少年處處田牧至有牛馬羊數千頭糓萬斛旣而歎曰凢殖貨財産貴其能施賑也否則守錢虜耳乃盡散以班昆弟故舊又曰崔駰學於太學而粮盡鄧衛尉欲餼焉而未果季彦九歳以其父命往見衛尉曰施不必豊期於救乏崔生臣父之執也不幸而貧公許賑之有日矣嘉貺未至或欲豊之然後乃致之乎荅曰家物少湏租入曰是猶古人欲決江海以救牛蹄之類也鄧公曰諾又曰鄧琳字叔孫西羌反破郡縣上乃拜綝謁者屯田三輔琳臨發之日散千金之産分與兄弟甥舅親族各有差品又曰朱暉建𥘉四年南陽大飢米石千錢𥘉同縣張堪有名德每與相見常接以友道暉以堪宿望成名未敢安也堪至把暉臂曰欲妻子託朱生暉舉手不敢荅後堪仕至蜀郡漁陽太守物故暉自爲臨淮太守後遂絶不復相聞南陽飢時聞堪妻子貧窮暉乃自往候視困厄分所有以賑之又曰王丹字仲回京兆人王莽時連徴不至家累千金隱居養志好施周急巳具冨部後列曰宼恂經明行脩名重朝廷所得秩俸盡施朋友故人及所從吏士常曰吾因士大夫以致此其獨享之乎時人稱其長者後爲宰相又曰竇固乆歴大位甚見尊貴而性謙儉愛人好施士以此稱之又曰梁啇飢年穀貴民餒輙遣蒼頭去幘着巾車載米塩菜錢於四城門與貧乏不語主人知其隂德伏恩絶不望報匿名隱譽皆此類也司馬彪續漢書曰郭伋字細侯并州牧徴爲太中大夫賜宅一區及帷帳錢糓伋輙散與宗親九族無遺餘又曰張純字奮少好學節儉行義常分損租奉貽䘏宗親雖至傾匱而施與不怠又曰伏湛字惠公更始元年拜爲平原太守遭倉卒兵起莫不驚擾而湛燭安然教授謂妻子曰一糓不升國君徹膳今人皆飢柰何獨飽且食麄糲盡分奉禄以賑活郷里來客者百餘家司馬彪續漢書曰獻帝𥘉百姓飢荒張儉資計差温乃傾竭財産與邑里共之頼其差温故存者以百數又曰肅宗崩廉范奔起敬陵時廬江郡掾嚴麟奉章俱㑹於路麟乗小車塗深馬死不能自進范見而愍然命從騎下馬與之不告而去麟事畢不知馬所歸乃㳂路訪之或謂麟曰故蜀郡太守廉叔度好周人窮今奔國䘮獨當是耳麟亦素聞范名以爲然即牽馬造門謝而歸之丗伏其義魏志曰楊俊字秀才以兵亂方起而河内處四逹之衢必爲戰場乃扶老弱去詣京宻問同行者百餘家俊賑濟貧乏通共有無宗族如故爲人所畧作奴僕者凢六家俊皆傾財贖之魚豢魏畧曰趙喜字伯陽爲平原太守百官大食光武問喜在郡何如咸稱喜政有跡時親家諸夫人皆㑹會罷諸大夫言喜篤義多恩從長安還收護妾等衣食生活使得䝉今日之冨貴非獨能臨人也呉志曰魯肅字子敬大散財貨摽賣地以賑窮人結士爲務甚得郷邑忻心周瑜爲居巢長將數百人故過候肅并求資粮肅家有兩囷米各三千斛肅乃指一囷與瑜瑜益知其竒也遂相親結定僑札之分又曰朱據字子範呉郡人有姿皃膂力絶人又能論難黄武𥘉徴拜五官中郎權遷建業據尚公拜左將軍封雲陽侯謙虚接士輕財好施呉志曰駱公緒時年八歲與親客歸㑹稽事母甚謹時飢荒多有困乏公緒爲之飲食衰少其姉仁愛有行寡歸無子見甚哀之數問其故公緒曰丈夫糟糠不足我亦何必獨飽姉曰誠如是何不告我而自苦若此乃自以私粟與公緒又以告母亦覺之遂使分施由是顯名晉書郄鑒時所在饑荒州中之士素有感其恩義者相與資贍鑒復分所得以恤宗族郷曲孤老頼而全濟者甚多又曰紀瞻少與陸機兄弟親善及機𬒳誅瞻䘏其家周至及嫁女資送同於所生王隱晉書曰潘朂字元茂值年荒部曲之家徤兒渠帥皆素服重名共相率送迎道路所在爲儲以供行資朂隨主人多少口率均分無有尊卑優劣若所賦巳盡偶有不足則推巳之分以周未遍父老有頌之曰且貴且冨有南山之壽吾仍得與潘元茂又曰恩不可忘無如我潘郎晉中興書曰應詹以孝稱年㭘餘歳祖父母亡家冨於財而詹年稚弱乃請宗中單貧者與共爲居弱冠知名太宰何邵見而稱之曰質文之士也晉紀曰祖逖梗㮣有大志年十五不知書輕財好施每至諸田舎輙稱兄意散帛以是嘉焉太平御覽卷第四百七十六
