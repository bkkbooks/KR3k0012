front:
  text: 太平御覽卷第六百三十七刑法部三
  hash: sha256:4cbc2f56fd02b25307600c865d918d7796b7420177b2368071ab7857b998714b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_637-1a}
body:
  text: 律令上書曰王曰嗚呼凢我有官君子欽乃攸司慎乃岀令令出惟行弗惟反有官君子大夫巳上歎而誡之使敬汝所司慎汝出令從政之夲令岀必惟行之不惟反改若二三其令亂之道也韓詩曰古者必有命民民有能敬長憐孤取舎好讓者命於其君然後得乘飾車駢馬未得命者不得乗車乗車皆有罰故其民雖有餘財侈物而無禮義功德即無所用其餘財侈物故其民皆興仁義而賤不爭貴強不陵弱衆不暴寡是唐虞之所以象典刑而民莫敢犯也論語子路曰子曰其身正不令而行其身不正雖令不從令教令也國語曰越王勾踐令民壯者無娶老婦老者無娶壯婦女子十七不嫁丈夫二十不娶其父母有罪將勉者勉乳以吿公令醫守之醫乳醫也生男二壷酒一犬生女二壷酒一豚生三人與之乳母生二人與之餼三子力不能獨養故與乳母家語曰孔子𥘉仕爲中都宰制爲養生送死之節長㓜異食強弱共任男女別塗路不拾遺器不彫僞市不二價行之一年而四方諸侯皆則焉定公謂孔子曰學子之法以治魯國何如孔子對曰雖天下可也何但魯國而巳哉爾雅曰柯憲刑範辟律矩則法也詩曰伐何伐柯其則不逺論語曰不踰矩也釋言曰坎律銓也易坎卦主法法律皆所以銓量輕重釋名曰法逼也人莫不欲從其志逼正使有所限也令領理使不相犯也律䉂音累也囚人心使不得放肆也史記曰啇鞅定法秦人𥘉言令不便者以千數於是太子犯法衛鞅曰法之不行自上犯之将法太子太子君嗣也不可施刑刑其傅公子䖍黥其師公孫賈明日秦人皆趍令行之令𥘉下有言令不便者有來言令便者衛鞅曰此皆亂化之人也盡遷於邊城其後人莫敢議令漢書曰髙祖𥘉入関約法三章曰殺人者死傷人及盗抵罪蠲削煩苛兆民大恱其後四夷未附兵革未息三章之法不足以御姦於是相國蕭何捃摭秦法取其冝於時者作律又曰惠帝四年除挾書律如淳曰秦始皇令敢有挾詩書偶語者俱爲城旦也又曰漢王下令軍士不幸死者吏爲衣衾棺歛轉送其家四方歸心焉又曰元帝爲太子壯好經書寛博謹慎𥘉居桂宫上甞急召太子出龍樓門張晏曰門樓上有銅龍若曰鶴飛廉者也不敢絶馳道應邵曰馳道天子道若中道然古禁甚重西至真城門晉灼曰黄圖西岀南頭第二門得絶乃度之還入作室門上遟之問其故以狀對上大恱乃著令令太子得絶馳道又曰元帝柔仁好儒見宣帝多用文法吏以刑名繩下大臣楊惲盖寛饒等坐刺譏語而誅甞侍燕從容言陛下持刑太深冝用儒生宣帝作色曰漢家自有制度本以霸王道雜之柰何純任德教用周政乎姬周之政且俗儒不逹時冝好是古非今使人眩於名實眩亂視也音胡睊反切不知所守何足委任乃歎曰亂我家者太子也及即位下詔曰法令者欲其難犯而易避也今律令煩多典文者不能分明是欲罪元元之不逮豈中刑之意哉中常也其議律令可蠲除輕减又曰成帝河平中詔曰甫刑云五刑之屬三千大辟之罰其屬二百今大辟罪千有餘條律令煩多百有餘萬言奇下朝奏暮召入見所言九事其八者爲律令也又曰朱博遷瑯瑘太守文學儒吏時有奏稱說云云愽見謂曰如太守漢吏奉三尺律令以從事耳亡柰生所言聖人道何也言不能用也且持此道歸尭舜君岀爲陳說之遷廷尉職典决疑當讞平天下獄愽恐爲官屬所誣視事召見正監典法掾史謂曰廷尉夲起於武吏不通法律幸有衆賢亦何憂然廷尉治郡斷獄以來且二十年三尺律令人事出其中言可以人情知人掾史試與正監共撰前丗决事吏議難知者數十事持以問廷尉得爲諸覆意之如淳曰但欲用意覆之也正監以爲愽苟強意未必能然即共條白焉愽皆召掾史並坐而問爲平處其輕重十中八九官属咸服愽之踈略才過人也後漢書曰光武蕭王時在河北祭遵爲軍市令帝舎中兒犯法遵格殺之帝怒収遵主簿陳副諌曰明公常欲衆整齊今遵奉法不避是故令行也帝乃賞之以爲刺姦將軍謂諸將曰當避祭遵吾舎中兒犯法尚殺之必不私公等又曰桓譚上書言法令决事輕重不齊或一事殊法同罪異論姦吏得因縁爲市欲活則岀生議所欲䧟則與死比是爲刑開二門也命可令通義理明習法律者校定科比科謂事條比謂類例一其法度班下郡國蠲除故條如此天下知方而獄無怨濫矣又曰馬援在南條越律與漢律駮者十餘事駮乖事也與越人申明舊制以約束之自後南越奏行馬将軍故事又曰王符論明帝時公車反支日不受章奏凢反支日用月朔爲正戌亥朔四日反支申酉朔二日反支午未朔三日反支辰巳朔四日反支寅夘朔五日反支子丑朔六日反支見隂陽書也帝聞而怪曰人廢農桑逺來詣闕而復拘以禁忌豈爲政之意乎於是遂蠲其制令又曰建𥘉中有人侮辱人父者而其子殺之肅宗貰其死刑而降宥之自後因以爲比是時遂定其議以爲輕侮法張敏駮議曰夫輕侮之法先帝一切之恩不有成科班之律令也夫死生之决冝從上下猶天之四時有生有殺若開相容恕著爲定法者則是故設姦萌生長罪隙又輕侮之比浸以䌓滋至有四五百科轉相顧望弥復堪甚難以垂之万載臣聞師言救文莫如質故髙帝去煩苛之法爲三章之約建𥘉詔書有改於古者可下三公廷尉蠲除其弊又曰有兄弟共殺人者明帝以兄不訓弟故報兄重報論也重死制而減弟死中常侍孫章宣詔言兩報重尚書奏章矯制罪當腰斬帝問郭躬躬曰法今有故誤章傳命之謬於事爲誤誤者其文則輕當罰金帝曰章與囚同縣疑其故躬曰周道如砥其直如矢詩小雅如砥貢賦平如矢賞罰中君子不逆詐君王法天刑不可以委曲生意帝善之遷躬廷尉躬家代掌法務在寛平及典理官决獄斷刑多依矜恕乃條諸重又可從輕者四十一事奏之事皆施行著于令又曰陳寵鈎校律令條法溢於甫刑者奏除之鈎猶勘也前書曰鈎校得其姦賊鈎音工侯切溢出也孔安國注尚書曰吕侯後爲甫侯故或稱甫刑也曰臣聞禮經三百威儀三千故甫刑太辟二百五刑之屬三千禮之所去刑之所取去禮之人刑以加之故曰取也失禮則入刑相爲表裏者也今律令死刑六百一十耐罪千六百九十八耐者輕刑之名也贖罪以下二千六百八十一溢於甫刑者千九百八十九其四百一十大辟千五百耐罪七十九贖罪春秋保乹圖曰王者三百年一蠲法漢興以來三百二年憲令稍増科條無限又律有三家其說各異冝令三公廷尉平定律令應經合義者可使大辟二百而耐罪贖罪二千八百并爲三千悉刪除其餘令與禮相應又曰卓茂爲宻令人常有言部亭長受其米肉遺者部謂所部也茂辟左右問之曰亭長爲從汝求乎爲汝有事嘱之而受乎將平居自以恩意遺之乎人曰徃遺之耳茂曰遺之而受何故言邪人曰竊聞賢明之君使人不畏吏吏不取人今我畏吏是以遺之吏旣卒受故來言耳茂曰汝爲弊人矣凢人所以貴於禽獸者以有仁愛知相敬事也今鄰里長老尚致饋遺此乃人道所以相親况吏與民乎吏顧不當乗威力強請求耳凢人之生群居雜處故有經紀禮義以相交接汝獨不欲修之寧能髙飛逺走不在人間邪亭長素善吏歳時遺之禮也人曰苟如此律何故禁之茂笑曰律設大法禮順人情今我以禮教汝汝必無怨惡以律治汝何所措其手足乎一門之内小者可論大者可殺也且歸念之於是人納其訓吏懷其恩又曰獻帝𥘉應劭又刪定律令撰具律夲章句尚書舊事廷尉板令决事比例司徒都目五曹詔書及春秋獄凢二百五十篇又集議駮三千篇以類相從凢八十二事於是舊事在焉又曰鄭弘建𥘉中爲尚書令舊制尚書郎限滿𥙷縣長令史𥙷承尉弘奏以爲臺職雖尊而酬賞甚薄請使郎𥙷二千石令史爲長帝從其議弘前後所陳有𥙷益王政者皆著之南宫以爲故事東觀漢記曰陳寵曽祖父咸成哀間以明律令爲侍御史王莽篡位父子相將歸郷里閉門不出入乃収家中律令文書璧藏之以俟聖主咸常勑戒子孫爲人議法當依輕者雖有百金之利無與人重故丗謂陳氏持法寛魏書曰司馬景王輔政時犯大逆者其法誅乃巳出之女母立儉之誅其子甸妻荀氏應坐死其族兄顗通表魏帝以乞其命詔聽離婚荀氏所生女芝爲頴川太守劉子元妻亦坐死以懷姙繫獄荀氏辭詣司隷校尉何曽乞恩求没爲官婢以贖之命曽哀之使主簿程盛上議曰臣以爲女人有三從之義無自專之道岀適他族降父母之服所以明外成之節也而父母有罪則追刑夫黨見誅又隨戮一人之身内外受辟女旣産育則它族之母無辜受戮傷孝子之心且男旣不得罪於他族而女獨嬰戮於二門臣以爲在室冝從父之誅旣醮可隨夫之罰於是有詔改定律令魏志曰公軍進令曰吾起義兵爲天下除暴亂舊土人民死䘮略盡國中終日行不見所識使吾悽愴傷懐其舉義兵已來將士絶無後者求親戚以後之授上田官給耕牛置學師教之爲立廟使記其先人魂而有靈吾百年之後何恨哉吴志曰孫權下令諸将曰夫存不忘亡安必慮危古之善教昔雋不疑漢之名臣於安平之丗而刀劒不離於身盖君子之於武備不可以已今處身壃畔狄虜交接而輕忽不豫思變難哉頃聞諸將出入各尚謹多不從人甚非備虜愛身之謂夫保巳遺名安君親孰與危辱冝深警戒副孤意焉晉書曰賈充所定新律旣班天下百姓安之詔曰漢氏以來法令嚴峻故自元成之丗及建平嘉平之間咸欲辯章舊典刪革刑書述作體大歷年無成先帝愍元元之命䧟於密網親發德音釐正名實車騎將軍賈充將大用聖意諮詢太愽鄭冲又與司空荀顗中書監荀朂中軍將軍羊祜中護軍王業及廷尉杜友河南尹杜預散騎都尉成公綏尚書郎柳軌等典正其事朕每監其用心常慨然嘉之今法律旣成始班天下刑寛禁簡足以克當先旨昔蕭何以定律受封叔孫通以制儀爲奉常賜金五百斤子弟皆爲郎夫立功立事古之所重自太傳車騎以下皆加禄賞其詳依故典又曰杜預與車騎將軍賈充等定律令旣成預爲之注解乃奏之曰法者盖繩墨之断例非窮理盡性之書曰故文約而例直聽省而禁簡例直則易見禁簡則難犯易見則民知所避難犯則幾於刑措古之刑書銘之鐘鼎鑄之金石以塞異端絶異理也然後人知恒禁吏無滛巧也今所注皆網羅法意格之以名分使用之者執名例以審趣舎伸繩墨之直去析薪之理也晉朝雜事曰秦始四年歳在戊子正月二十日晉律成宋書曰劉秀之爲尚書右僕射請改定制令疑部人煞長吏科議者謂值赦冝加徒秀之以爲律文雖不明部人煞官長之旨若值赦但止徒遂使與悠悠人曽無一異人敬官長比之父母行害之身雖遇赦謂冝付尚方窮其天命家口令𥙷兵從之太平御覽卷第六百三十七
