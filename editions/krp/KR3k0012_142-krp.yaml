front:
  text: 太平御覽卷第一百四十二
  hash: sha256:99e7d3ff3304e548afa0f1ff8a96f36958c09af2fcf02981e38c4a39c23976a2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_142-1a}
body:
  text: 皇親部八蜀劉備甘后穆后劉禪張后小張后呉孫堅呉后孫權歩后二王后潘后謝妃徐妃孫亮全后孫休朱后孫皓母何太后孫皓滕后前趙劉淵母呼延妃劉淵張后劉聦呼延后二劉后劉曜劉后後趙石勒劉后後燕慕容垂叚后宋劉𥙿臧后胡婕妤劉義隆袁后劉駿母路后劉駿王后劉彧母沈婕妤劉彧王后陳妃劉昱江后劉准母陳昭華劉准謝后蜀劉備甘后蜀志曰先主甘皇后沛人産後主值曹公軍至追先主於當陽長坂于時困逼弃后及後主頼趙雲保護得免於難后卒追謚皇思夫人遷葬於蜀未至而先主殂殞丞相亮上言皇思夫人冝號昭烈皇后與大行皇帝合葬制曰可穆后蜀志曰先主穆皇后陳留人也兄呉壹素與劉焉有舊是以舉家隨焉入蜀焉有異志而聞善相者使相后云當大貴焉時將子瑁自隨遂爲瑁納后瑁死寡居先主旣定益州而孫夫人還呉羣下勸先主聘后先主疑於與瑁同族法正進曰論其親踈何與晉文之於子圉乎於是納后延熈八年薨合葬惠陵劉禪張后蜀志曰後主敬哀皇后車騎將軍張飛長女章武元年納爲太子妃建興元年立爲皇后小張后蜀志曰後主小張皇后飛小女隨後主遷于洛陽呉孫堅呉后呉志曰孫堅呉夫人權之母也夲呉人徙錢塘早失父母與弟居孫堅聞其才貌欲娶之呉氏親戚嫌堅輕狡將距焉堅甚慙恨夫人謂親戚曰何愛一女以取禍乎如有不遇命也於是遂許爲婚生四男一女及權少年統業夫人助理國政甚有𥙷益建安七年臨薨引見張昭等囑以後事孫權歩后呉志曰呉主權歩夫人臨淮淮隂人也以羙麗得幸於權寵冠後宫夫人性不嫉妬多所推進故乆見愛權爲王及帝意欲以爲后羣臣議在徐氏權依違者十餘年然宫內皆稱皇后親戚上䟽稱中宫及薨臣下縁權旨請追正名號乃贈皇后印綬二王后呉志曰呉主權王夫人琅瑘人也夫人以選入宫得幸生孫和權將立爲后而全公主素憎夫人數加譖毀及權寢疾言有喜色由是權深責怒以憂死呉志曰呉主權王夫人南陽人也生孫休及和爲太子和母貴諸姬有寵者皆出居外夫人出在公安卒因塟焉休即位遣使追尊曰敬懷皇后改葬敬陵潘后呉志曰呉主權潘夫人㑹稽句章人父爲吏坐死夫人與姊俱輸織室權見而異之召充後宫得幸有身夣有以龍頭授巳者巳以蔽膝受之遂生孫亮夫人爲皇后性妬媚容自始至卒譖害甚衆權不豫夫人使問中書令張昭吕后專制故事侍疾疲勞因以羸病諸人伺其昏卧共縊殺之託言中惡後事泄坐死者六七十人權㝷薨合葬蔣陵謝妃呉志曰呉主權謝夫人㑹稽山隂人也權聘以爲妃愛幸有寵後權納姑孫徐氏欲令謝下之謝不肯由是失寵早卒徐妃呉志曰呉主權徐夫人呉郡富春人也初適同郡陸尚尚卒權娉以爲妃使母養子登後權以夫人妬忌廢之以疾卒孫亮全后呉志曰孫亮全夫人全尚女也立爲皇后孫綝廢亮爲㑹稽王隨亮之國呉録曰亮妻惠解有容色呉平乃歸永寧中卒孫休朱后呉志曰孫休朱夫人朱據女孫綝廢亮休立夫人爲皇后休卒羣臣尊夫人爲皇太后孫皓即位月餘貶爲景皇后稱安定宫孫皓母何太后呉志曰孫和何姬丹陽句容人也父遂夲騎士孫權嘗遊幸諸營而何姬觀於道中權望見異之命宦者召入以賜子和生男權喜名之曰彭祖彭祖即皓也後徙和居新都遣使賜嫡妃張氏自殺何姬曰若皆從死誰當養孤遂撫育皓及其王弟皓即位尊和爲昭獻皇帝何姬爲昭獻皇后月餘進爲皇太后焉孫皓滕后呉志曰孫皓滕夫人故太常胤之族女也胤夷滅夫人父牧以踈逺徙邊郡孫休即位大赦得還以牧爲五官中郎皓旣封烏程侯娉牧女爲妃皓即位爲皇后封牧髙密侯拜衛將軍録尚書事時人以牧尊戚頗推令諫爭而夫人寵漸衰皓滋不恱皓母何恒左右之又太史言於運歷中后不可易皓信巫覡故得不廢常供養昇平宫長秋官僚備貟而巳受朝賀表䟽如故皓内諸寵姬佩皇后璽者多矣天紀四年隨皓遷于洛陽前趙劉淵母呼延妃崔鴻三十國春秋前趙録曰左賢王妃呼延氏魏嘉平中祈子於龍門俄而一大白魚頭有二角軒髯躍鱗於龍門而至於祭所乆之乃去巫覡皆異之曰此嘉祥也其夜夢旦所見魚變爲人左手把一物大如半雞子光影非常授延氏曰此是日精服之生貴子自是十三月而生淵劉淵張后崔鴻三十國春秋前趙録曰劉淵皇后張氏夣日入懷寤而告淵淵曰吉徴也愼勿言之自是十五月生聦劉聦呼延后崔鴻三十國春秋前趙録曰劉聦皇后呼延氏淵后之從父妹有美色恭孝稱於宗族淵后愛聦姿貌故以配焉毎謂聦曰父終子紹古今之大典陛下自承髙祖之嗣太弟何爲者哉陛下百年後粲兄弟必無種也願陛下深思之聦亦信之曰然吾當爲計后曰事留變生太弟見粲兄弟並大必有不安之志矣或有小人構間其中未必不禍發于今日妾常聞陛下說魯隱公事一何相似竊爲陛下寒心聦深然其言於是相圖之計起矣大劉后崔鴻三十國春秋前趙録曰劉聦皇后劉氏殷長女也字麗芳以左貴嬪立爲皇后聦將起䳨儀殿廷尉陳元逹諌聦大怒將斬之后時在後堂聞而密遣中常侍勑左右停刑於是手䟽啓曰伏聞勑旨將爲妾營殿今四海未一禍難猶繁廷尉之言社稷之計當賞以美爵而反欲誅之陛下此怒由妾而起廷尉之禍由妾而招自古國敗家喪未始不由婦人妾毎覽古事忿之不忘何意今日妾自爲之後人觀妾猶妾之視前人復何靣目仰侍巾櫛請歸死此堂以塞陛下誤惑之過聦覽之色變曰朕此來得微風之患意怒不自由元逹忠臣命其冠履就坐引元逹以劉后表示曰外輔如公等内輔如此后朕亦何憂矣小劉后崔鴻三十國春秋前趙録曰聦后劉氏殷小女字麗華童齒聦惠膚髮異常晝營女工夜誦書傳母每止之敦翫彌甚與諸兄爭論經義理旨超然諸兄常深歎謝性孝友善風儀進止如珪璋焉以貴嬪立爲皇后殷二女四孫皆姿色超丗女德冠時聦並納之自是六劉之寵傾於後宫建元中流星起於牽牛入紫微龍形委蛇其光照地落平陽北十里視之則肉臰聞于平陽肉傍常有哭聲晝夜不止聦甚惡之劉后産一蛇一虎各害人而走㝷之不得頃見隕肉之傍劉氏卒僞謚武宣皇后乃失此肉哭聲亦止劉曜劉后崔鴻三十國春秋前趙録曰劉皇后侍中暟女年十三長七尺八寸手垂過膝髮與身齊姿色才徳邁於列后後趙石勒劉后崔鴻三十國春秋後趙録曰石勒劉皇后侍中閏之妹後部胡人也勒納之於胡關美色有特寵張枰反於襄城后抽劒斬之勒頼后而濟后性惠有幹助理軍國之務有吕氏輔漢之風然嚴整貞婉容𥙿不妬忌過之也石弘即位尊爲皇太后與彭城王堪謀殺石虎謀泄虎殺之後燕慕容垂叚后崔鴻三十國春秋後燕録曰垂皇后叚氏字元妃光禄大夫儀之女后少而婉惠有節操嘗謂妹季妃曰我終不能爲庸人之妻季妃曰妹亦不爲庸夫之婦鄰人聞而笑之內黄人張定善相見儀二女大驚曰君家大興當由二女儀深異之至年二十餘而不嫁儀子麟謂儀曰張定何知而拒求者儀曰吾女軰志行不凡故且踟蹰以擇良配垂稱燕王垂納元妃爲繼室遂有殊寵范陽王德亦娉季妃焉姊妹俱爲垂德皇后卒如其志宋劉𥙿臧后沈約宋書武敬臧皇后諱愛親東莞人也后適髙祖生㑹稽宣長公主髙祖以儉正率下后恭謹不違及髙祖興復晉室居上相之重而后噐服麤素不爲親屬請謁晉義熈四年正月甲午卒於東城時年四十八追贈豫章公夫人還葬丹徒胡婕妤宋書武帝胡婕妤諱道安淮南人義熈初爲髙祖所納生文帝五年𬒳譴賜死時年四十二髙祖踐祚追贈婕妤大祖即位上尊號曰章皇太后劉義隆袁后沈約宋書曰文帝袁皇后諱齊嬀陳郡陽夏人左光禄大夫湛之庶女也太祖初拜冝都王妃生太子劭及東陽獻公主英娥上待后恩禮甚篤袁氏貧薄后每就上求錢帛以贍與之上性節儉所得不過三五十疋因此恚恨甚深稱疾不復見上上每入必他處廻避上數掩伺之不能得疾篤上執手流涕問所欲言后視上良乆乃引𬒳覆面崩于顯陽殿時年四十六上甚悼痛之詔永壽太守顔延之爲哀䇿文其文甚麗也劉駿母路后沈約宋書曰文帝路淑媛諱惠男丹陽建康人也以色貌選入後宫生孝武拜爲淑媛年旣長無寵常隨丗祖出藩丗祖入討元兇淑媛留守㝷陽上即位有司奉尊號曰皇太后第休之並超顯職太后頗豫政事賜與休之等財物家累千金居處器服與帝子相侔㝷崩時年五十五遷殯東宫改東宫門題曰崇憲宫劉駿王后沈約宋書曰孝武文穆王皇后諱憲嫄琅邪臨沂人元嘉二十年拜武陵王妃生廢帝山隂公主丗祖在藩后甚有寵上伐凶逆與太后同還京都立爲皇后大明四年率六宫躬桑于西郊廢帝即位尊曰皇太后宫曰永訓其年崩于含章殿時年三十八祔葬景寜陵劉彧母沈婕妤沈約宋書文帝沈婕妤諱容姬納後宫爲美人生明帝拜爲婕妤元嘉三十年卒時年四十丗祖即位追贈湘東國太妃太宗即位上尊號爲皇太后劉彧王后沈約宋書曰明恭王皇后諱貞風瑯瑘臨沂人也上嘗宫內大集而祼婦人觀之以爲懽笑后以扇鄣面獨無所言帝怒曰外舎家寒乞今共爲笑樂何獨不視后曰爲樂之事其方自多豈有姑姊妺集聚而祼婦人形體以爲樂外舎之爲懽適實與此不同帝大怒遣后令起廢帝即位尊爲皇太后元徽五年五月五日太后賜帝玉柄毛扇帝嫌其毛柄不華因此欲加酖害巳令太醫煑藥左右止之曰若行此事官家便應作孝子豈復得出入交㑹帝曰汝語有大理乃止孝建元年薨于第時年四十四陳妃沈約宋書曰明帝陳貴妃諱妙登丹陽屠家女也太妃家在建康縣東家貧有草屋兩三間上出行見之賜錢三萬令起瓦屋尉自送錢與之家人並不在唯太妃在家時年十二三尉見其容質甚美即以白丗祖於是迎入宫賜太宗始有寵一年許衰歇以乞將軍李道兒㝷又還生廢帝故民中皆呼廢帝爲李氏子廢帝踐祚號曰皇太妃輿服一如晉孝武太妃故事置家令一人改諸國太妃曰大姬劉昱江后沈約宋書曰後廢帝江皇后諱簡珪濟陽考城人太始五年太宗求太子妃而雅信小數名家女多不合后弱小門無強廕卜筮最吉爲太子納焉太子即位爲后帝旣廢降爲蒼梧王妃劉准母陳昭華沈約宋書曰明帝陳昭華諱法容丹陽人也太宗晚年諸弟姬人有懷孕者輙取入宫及生男殺其母而與六宫所愛者養之順帝桂陽王休範子也以昭華爲母焉順帝即位進爲皇太妃劉准謝后沈約宋書曰順帝謝后諱𣑽境光禄大夫莊孫女也昇明二年立爲皇后順帝禪位降爲汝隂王妃太平御覽卷第一百四十二
