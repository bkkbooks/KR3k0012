front:
  text: 太平御覽卷第三百三十九兵部七十
  hash: sha256:0036eb055a7fc1d261c338daafa0167f65baaf178e9575af6d89af0e2e933443
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_339-1a}
body:
  text: 叙兵器牙叙兵器禮記曰冕弁兵革藏於私家是謂脅君周禮曰司兵掌五兵五兵者戈殳㦸矛牟夷左傳曰孔文子將攻太叔訪于仲尼仲尼曰胡簋之事則嘗聞之矣兵甲之事未之學也春秋佐期曰太尉主甲卒神名辯㑹曰庫兵動鼓自鳴諸侯得衆也漢書曰兵不銳利與空手同甲不堅宻與袒裼同弩不及逺與短兵同射不能中與亡矢同中不能入與亡鏃同此將不省兵之禍也又曰韓延壽在東郡試騎士治飾兵車畫龍虎建幢棨植羽葆鼓車又取官銅候月蝕鑄作刀劒倣効尚方蕭望之以爲僣上不道弃市又曰李陵至浚稽山與單于相值圍陵陵軍居兩山間以車爲營陵引士營外爲陳前行持㦸楯後行持弓弩東觀漢記曰盆子降鎧甲兵弩積城西門髙與熊耳山等又曰王莾之遣王㝷王邑也欲盛威以震山東甲衝輣干戈旌旗甚盛又曰鄧遵永𥘉中遷度遼將軍討擊羗虜斬首八百餘級得鎧弩刀矛㦸楯匕首二三千枚又曰呉漢性忠厚篤於事上自𥘉從征伐常在左右兵有不利軍營不如意漢常獨繕激揚吏士呉志曰賀齊性奢侈尤好軍事兵甲器械極爲精好干櫓戈矛葩瓜文畫弓弩矢箭咸取上材王隱晉書曰羊祜表伐呉曰勁弩長弓不如中國長矛楯㦸不如中國馬騎淩厲又不如中國呉唯便水戰一入其地則長江非復呉有晉起居注曰成帝咸和元年四月乙丑詔曰作琅邪王大車斧六十枚侍臣劒八枚將軍手㦸四枚三國典略曰梁邵陵王綸篤好書史妙工草隷爲丹陽尹擅造甲仗梁武知之綸並沉于江中及後出征器械並闕乃獨歎曰吾昔聚仗本備非常朝廷見疑逼使分散今日討逆卒無所資太公六韜曰春以長矛在前夏以大㦸在前秋以弓弩在前冬以刀楯在前此四時應天之法也太公金匱曰武王曰五帝之時無守戰之具國存者何大公曰守戰之具皆在民間耒耜者是其弓弩也鋤􅐡者是其矛㦸也簦坐者是其兠鍪也鎌斧者是其攻戰之具也雞狗者是鉦鼓也古司馬兵法曰兵不雜則不利長兵以衛短兵以守太長則犯太短則不及太輕則銳銳則易亂太犯則不齊兵長短相衛太短太輕皆不如法也犯者觸柱也故不齊不及者逺於利也銳者不固則破故奔北擾亂也又曰弓矢圍殳矛守戈㦸助凢五兵當長以衛短短以救長迭戰則乆皆戰則彊李氏曰迭更也言更戰更息則可堪乆悉舉軍戰衆多者彊軍令曰始出營竪矛㦸舒幡旗鳴鼓角行三里辟矛㦸結幡旗鳴鼓角未至營三里復竪矛㦸舒幡旗鳴鼓角至營復結幡旗止鼓角違令者髠吕氏春秋曰古之至兵士民未合而威巳諭矣敵巳服矣豈必用枹鼓干戈哉淮南子曰兵革錞摩錞祺名也金鼓鈇鉞所以飾怒也錞市均切又曰所謂兼國有地者伏尸數十萬破車以千百數傷弓弩矛㦸矢石之創者扶輿於路故丗至枕人頭食人肉𦵔人旰飲人血甘之於猫豢牛羊猫牛肉豢豕肉故自三代以後者天下未嘗得安其情性而樂習俗保其脩命而不夭於人虐也所以然者何諸侯力政天下不合而爲一家也又曰齊桓公將欲征伐甲兵不足令有重罪者出犀甲一㦸犀甲取其堅也㦸車㦸也長丈六尺犀或作三直出三甲也有輕罪者贖以金分輕小以金分出金匱隨罪輕重有分两也說而不勝者出一束箭不勝猶不直也箭十二爲束也百姓皆說乃矯箭爲矢矢箭之竿好者也鑄金而爲刄刄五刄也刀劒矛㦸矢也以伐不義而征无道遂霸天下崔寔政論曰兵器精利有蔡太僕之弩龍亭之劒至今擅名天下陸機要覽曰東弓南矛西㦸北劒中鼓亦曰四兵塩鐵論曰強楚勁鄭有犀兕之甲堂谿之揵内據金城外任利兵是以威行諸夏強伏敵國故孟賁畜臂衆人輕之怯夫有備其氣自倍以呉楚之士儛利劒蹶強弩以與狢虜騁於中原一人當百不足道也邯鄲五經折疑駮曰矢絶於弦不可追止㦸執在手制之在人山海經曰天地東西二萬八千里南北二萬六千里出銅之山四百六十七出鐵之山三千六百九十此天下之所分壤樹糓也戈矛之所發也刀鎩之所起也能者有餘拙者不足于寳搜神記曰晉元康中婦人以金銀象角瑇瑁爲斧鉞戈㦸而戴之以當笄蓋妖之大者也樊文淵七經義綱格論曰車上五兵戈殳車㦸酋矛牟夷歩卒五兵戈殳車㦸酋矛矢魏文典論曰昔周有雍孤之㦸屈盧之矛狐父之戈上丗名器又曰抱朴子曰劒㦸不皆於縫佳饌不可擊斷牛馬又曰陳呉之徒奮劒而大呼劉項之倫揮戈而飈駭又曰或問辟五兵之道抱朴子荅曰呉大皇帝曽從介先生受要道云但知北斗姓字及日月名字便不畏白刄大皇帝以試告左右數十人常爲先登䧟陳皆不傷也鄭君云但誦五兵名亦驗矣刀名大房虚星主之矢名防徨熒惑王之弓名曲張角星主之弩名逺望張星主之㦸名大將參星主之臨戰時嘗細祝之或以五月五日作赤靈符着心前或丙午日日中作燕軍龍虎三囊符歳易之歳符歳易月符月易日符日易或佩西毒兵信符或佩南極鑠金符或取牡荆以作六隂神將符指敵人或以月蝕時刻三歳蟾蜍候下之有八字者血以書所將之刀劒或交鋒之際乗魁履㓻呼四方之長亦有明効也魏文帝校獵賦曰抗冲天之素旄兮靡格擇之脩循旃雄㦸趪音皇而躍厲兮黄鉞扈而楊鮮又曰千乘亂擾万騎奔走經營原隰騰越峻岨􅊮弓斯彀戈鋋具舉徐幹齊都賦曰矢流鏑絓胡卦切張羅作合切飛鋋抱雄戈繆襲籍田賦曰靈旂蔚以燾奡兮雄㦸偈以嵯峨彎枉矢於狼狐兮建黄鉞於匏爪繁欽征天山賦曰有漢丞相武平侯曹公杖節東征觀六軍於三江浮五湖以曜武左駢雄㦸右攅干將彤弧朱矰舟羽絳房望之如火映奪朝陽應璩詩曰放戈釋甲胄乗軒入紫微從容待帷幄光輔日月暉崔駰安豊侯詩曰𬒳兕甲兮跨良馬擇長㦸兮彍強弩彍音霍曹植詩曰皇考建世業余從征四方櫛風而沐雨萬里蒙露霜劒㦸不離手鎧甲爲衣裳魏文帝董桃行曰晨背大河南轅跂渉遐路澷澷師徒百萬譁諠戈矛若林成山旌旗拂日蔽天應璩書曰左執屈盧之勁矛右秉于將之雄㦸髙冠拂雲長劒耿介簫管振音厥聲載路馮軾虎視清風震疊可謂堂堂乎難與並爲仁也太白隂經曰工欲善其事必先利其器器之於事如影之隨形嚮之應聲其相須如左右手故曰器械不精不可言兵五兵不利不可舉事上古庖犧氏之時弦木爲弓剡木爲矢神農氏之時以石爲兵故砮石中矢鏃黄帝之時以玉爲兵蚩尤之時爍金爲兵割革爲甲始制五兵建旗幟樹䕫鼓又曰鼓以佐軍威又曰纛六口大將中營建出引六軍右者天子六軍諸侯三軍今天子十二諸侯六軍故纛有六以主之又曰門旗二口色紅八幅大將牙門之旗出引將軍前列又曰門搶二根以豹尾爲刄搕出居紅旗後止居帳門前左右安立又日五方旗五口各具方色大將中營建出六纛後在營亦於纛後隨方而建又曰嚴警鼓一十二靣大將營前左右行列各六靣在纛後又曰角十二具於鼓左右後列各六具以代金又曰隊旗二百五十靣尚色圖禽與本陣同五幅又曰認二百五十口尚色圖禽與諸陣不同各自爲誌認旗出居隊後恐士卒交雜又曰陣將門旗各任所色不得以紅恐雜大將軍又曰陣將鼓一百二十五靣恐設疑驚敵用又曰甲六分七千五百領又曰戰𫀆四分五千領又曰搶十分一萬二千五百根恐揚兵縳筏用又曰牛筋牌二分二千五百面馬軍以團牌代四分支又曰弩二分絃三副箭一百分二千五百張弩七千五百條弦二十五萬隻箭又曰弓十分弦三副箭一百五十分一萬二千五百張弓三萬七千五百條弦三十七萬五千隻箭射甲箭五萬隻又曰生箭二萬五千隻長箭垜箭疋栔切又曰弓袋胡鹿張弓袋並一萬二千五百副又曰佩刀八分一萬口又曰陌刀二分二千五百口又曰棓二分二千五百張馬軍及陌刀並以啄錐鉞代各四支分又曰搭索二分二千五百條馬軍用也牙兵書曰牙旗者將軍之精凢始竪牙必以制日制日者謂上尅下日也立牙之日吉氣來應大勝之徴凶氣先應破軍殺將黄帝出軍决曰始立牙之日喜氣來應旗幟指敵或從風舉暉暉終日不繞竿勇氣奔逸是謂堂堂之陣此大勝之徴又曰有所攻伐作五采牙旗青牙旗引住東赤牙旗引住南白牙旗引住西黒牙旗引住北黄牙旗引住中又曰始立牙之日凶氣先應旗幟皆垂或逆風滂浡牙竿摧折旗幡絶烈還繞繳竿如此終日勢弱又曰將軍出兵有所討伐引兵出城門望見白雲及白水者舉白牙旗五色牙旗隨天氣四時也真人水鏡經曰凢軍始出立牙竿必令皃堅若有折將軍不利牙旗竿軍之精也即周禮司常職云軍旅㑹同置旌門是也抱朴子曰軍始舉牙立旗風氣和調憣校飄飄終日不息者其軍有功魏志曰典韋𥘉爲張邈士屬司馬趙寵牙門長大其能勝韋一手建之寵異其才力呉志曰陸遜爲右部督會丹陽賊帥費棧扇動山越權遣遜討棧棧支黨多所往兵少遜乃益施牙幢分布鼓角夜潜出谷間鼓譟而前應即破散又曰黄武八年夏黄龍見樊口於是權稱尊號因瑞改元又作黄龍大牙常在中軍諸軍進退視其所向命胡綜作賦呉書曰賀齊從上討合肥時城中出戰徐盛失牙齊别拒擊得盛所失牙晉書曰陸機始臨戎而牙旗折意甚惡之後戰軍果大敗後魏書曰奚斤代人也魏𥘉大將行師唯長孫嵩拒劉𥙿及斤征河南獨給漏刻及十二牙旗呉胡綜大牙賦曰狼狐垂曜實惟兵精聖人觀法是效是營始作器械爰求厥成明明大呉實天生德乃律天時制爲神軍取象太一五將三門疾則如電遲則如雲進止有度約而不煩四靈旣布黄龍處中周制日月實曰太常桀然特立六軍所望後漢滕輔祭牙文曰恭羞太牢絜薦遐靈推轂之任寔討不庭天道助順正直聦明晉袁宏祭牙文曰天生五才治道所司廢一不可静亂輔時赫赫晉德乃武乃文中丗不競王度暫屯戎狄猾夏䖍劉生民蠢尓東胡𬒳髪左𬒮思我皇澤稽首海裔受爵納貢服膺累丗後嗣不恭實叛實戾侵我神畿隔我嘉惠哀彼黎民嬰此彫殘况荷大寵任其艱難慨然發憤撫劒忘飡敢建髙牙烈烈桓桓晉頋愷之祭牙文曰維年月日録尚書事豫章公𥙿敢告黄帝蚩尤五岳之靈兩儀有正四海有王晉命在天丗德重光烈烈髙牙闐闐伐鼔白氣經天簡揚神武宋王誕伐廣固祭牙文曰敬建崇牙顯兹威靈使鳴金輟釁无戰有寕皇風幽𬒳凱斾歸旌宋鄭鮮祭牙文曰㓗牲先事薦兹敬祭崇牙旣建義縫增厲人鬼一揆三才同契帷兹靈鑒庻必有察逆順幽辯忠孝顯節使凶醜時殱主寧臣恱振旅上京凱歸西蕃神器増暉四境永安唐陳子昂禡牙文曰盖先王作兵以討有罪姦匿竊命戎夷不龔則必肆諸市朝大戮原野皇家子育万國寵綏百蠻青雲干吕自環入貢乆有年矣契丹凶羯敢亂天常乃蜂聚丸山豕食遼塞宴安鴆毒作爲攙槍天厭其凶國用致討皇帝命我肅將王誅今大軍己集告辰叶應旄頭首建羽斾前列夷貊感威將士聽誓方俟天命爲民殄災惟尓有神尚殱乃醜召太一㑹雷公翼白虎乘青龍星流彗掃永清朔裔使兵不血刄戎夏大同以昭我天子之德允乃神之功豈非正直克明無縱大讎以作神羞太平御覽卷第三百三十九
