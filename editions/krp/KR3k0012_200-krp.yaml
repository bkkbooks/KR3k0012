  text: 太平御覽卷第二百
  hash: sha256:5c467c4f7bfe90861def99daccc43d858fbd925539f2ee7ae9e85ad93bccd1f1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_200-1a}
body:
  text: 封建部三以公相封功臣封以公相封漢書在恩澤表魏氏羣臣封併見此篇也漢書曰髙祖撥亂誅暴庶事草創行賞授位以能爲次叙至于孝武元功宿將略盡上亦興文學進抜幽隱公孫弘自海濵而登宰相自是之後宰臣畢侯又曰漢帝以列侯爲丞相唯公孫弘無爵爲丞相上於是下詔封丞相平津侯其後以爲故事丞相封侯自弘始也又曰武帝時車千秋爲髙廟郎上書訟衛太子冤上亦頗知太子惶恐感悟召千秋曰父子之間人所難言此髙廟神靈使公敎我當遂爲吾輔拜千秋大鴻臚數月爲丞相封富民侯又曰朱愽以丞相封二千五百户上書故事不過千户還千五百户魏志曰王朗字景興文帝即位授司空進封平郷侯子肅嗣𥘉文帝分朗邑封一子列侯朗乞封兄子詳又曰崔林爲司空封陽安亭侯邑六百户三公封列侯自林始也臣松之有爲漢封丞相巳爲荀恱所譏魏封三公其末同也又曰曹爽以大將軍輔政封武安侯邑萬二千户又曰陳羣以鎭軍録尚書受遺詔進封頴隂侯又曰何夔字叔龍爲太子少傅太僕文帝踐祚封陽亭侯三百户病乞遜位詔曰以親則君有輔弼之勲以賢則君有淳固之茂又曰劉放字子棄爲中書監掌機密進封魏壽亭侯孫資爲中書令封樂陽亭侯太和末資決䇿伐公孫淵進左郷侯遼東平定又以叅謀之功各封大縣放方城侯資中郡侯齊王即位以决定大謀並増邑子一人亭侯又曰衛覬爲漢侍中勸讃禪代之義爲文誥之命文帝踐祚封陽告亭侯明帝即位進閿郷侯又曰桓楷爲尚書令封亭郷侯及病文帝自臨省謂之曰吾方託六尺之孤寄天下之命卿勉之徙封安樂郷侯又曰胡質薨家無餘財唯賜衣書篋而巳追封陽陵亭侯又曰盧毓衛臻徐宣陳矯和洽常林杜襲裴濳韓曁髙文惠王觀辛毗劉靖王基並以列卿尚書封侯又曰漢制凡人君特所寵念皆賜之封邑及丞相𥘉拜亦錫茅土號曰恩澤出自私情非至公之封也中興以來無有封者功臣封周禮夏官曰司勲司勲掌六卿賞地之法以等其功王功曰勲國功曰功民功曰庸事功曰勞治功曰力戰功曰多克敵岀竒若韓信陳平者凡有功者銘書於王之太常史記曰古之人功有五品以德立宗廟定社稷曰勲以言曰勞用力曰功明其等曰閥積功曰閱又曰太公望文王立以爲師文王作酆邑天下三分有其二及武王克紂太公之謀居多於是武王封尚父於齊營丘成王時及管蔡作亂淮夷叛周乃使邵康公封太公東至海西至河南至穆陵北至無捸五侯九伯汝實征之齊由此得征伐爲大國二十八丗又曰邵公奭與周同姓武王之滅殷封邵公於燕其在成王時自陜以西邵公主之自陜以東周公主之四十三丗秦始皇滅之又曰楚出自帝顓頊髙陽後呉廻居火正爲祝融呉廻生陸終陸終子六人少曰季連季連之苗胤曰鬻子鬻子事周文王早卒當成王之時舉文武勤勞之嗣乃封其後熊繹於楚以子男之國三十丗至負芻而秦滅楚又曰魏者畢公髙之後畢公髙與周同姓武王封之於畢其後曰畢萬事晉獻公伐霍耿魏滅之因以魏封畢萬爲大夫卜偃曰畢萬之後必大萬盈數也魏大名也以是始賞天啓之矣其後魏獻子並爲晉卿至魏文侯爲諸侯子武立與韓趙共滅晉而三分其地又七丗至王假秦滅魏又曰韓與周同姓其後丗事晉得封於韓原曰韓武子武子三丗有韓厥從封姓爲韓氏六丗至景侯䖍始列爲諸侯及孫哀侯與趙魏共滅晉三分其地八丗至王安而秦滅韓又曰趙氏之先與秦共祖造父事周穆王攻徐破之乃賜以趙城七丗叔帶去周入晉趙氏五丗而至趙夙夙生襄襄生盾並爲大夫其後趙鞅是爲簡子始大又四丗而至列侯籍始立爲諸侯三丗至敬與韓魏共滅晉分其地又七丗至幽王繆降秦而趙滅又曰陳完者陳厲公他之子完後奔齊爲田氏齊懿氏欲妻之卜之曰是謂鳯皇于飛和鳴鏘鏘有嬀之後將育于姜八丗之後莫之與京卒妻之完卒謚爲敬仲六丗而至田常田常殺齊敬公立簡公弟平乃割齊安平以東爲巳封封邑大於齊至曽孫和遂遷齊康公於海上而田和立爲齊侯五丗至王建爲秦所滅又曰西戎與申侯伐周殺幽王驪山下爲秦㐮公將兵救周周避犬戎難東徙雒邑㐮公以兵送周平王平王封㐮公爲諸侯賜之歧以西之地於是始國與諸侯通又曰樂毅并趙楚韓魏燕之兵以伐齊破之追至于臨淄齊涽王走保於莒樂毅獨留徇齊攻入臨淄盡以寳貨財物祭器輸之燕昭王大恱親至濟上勞軍行賞饗士封毅於昌國號爲昌國君漢書曰項羽佯尊懷王爲義帝實不用其命二月羽自立爲西楚霸王王梁楚地九郡都彭城背約更立沛公爲漢王王巴蜀漢中四十一縣都南鄭三分關中立秦三將章邯爲雍王都廢丘縣名今槐里是司馬欣爲塞王韋昭曰在長安東名桃林塞也都櫟陽董翳爲翟王文頴曰夲上縣秦所置項羽更名爲翟也都髙奴楚將瑕丘申陽爲河南王都雒陽趙將司馬卬爲殷王都朝歌當陽君英布爲九江王都六懷王柱國共敖爲臨江王夲南郡改爲臨江國都江陵畨君呉芮爲衡山王都邾文頴曰邾音朱縣名故齊王建孫田安爲濟北王徙魏王豹爲西魏王都平陽徙燕王韓廣爲遼王燕將臧荼爲燕王都薊徙齊王田市爲膠東王齊將田都爲齊王趙歇爲代王趙相張耳爲常山王也又曰漢四年立韓信爲齊王後徙爲楚王五年以九江王英布爲淮南王盧綰爲燕王韓王信爲代王彭越爲梁王又曰尅項八載天下乃平始論功侯者四十有三人時人民散亡大侯不過萬家封爵之誓曰使黄河如帶太山如礪於是申以丹書之信重以白馬之盟藏諸宗廟副在有司迨文景四五丗間流民旣歸户口亦息列侯大者三四萬户小國自倍其後子孫驕恣忘其先祖之艱難多䧟法禁訖干孝武後元之年靡有孑遺又曰漢封功臣張良未甞有戰闘功髙帝曰運籌䇿帷幄中决勝千里外子房功也乃封良爲留侯與蕭何等俱封六年上巳封大功臣二十餘人其餘日夜爭功未決未得行封上在雒陽南宫從複道如淳曰上下有道故謂之複也韋昭曰間道也望見諸將徃徃相與坐沙中語上曰此何語留侯曰此謀反耳上曰爲之奈何留侯曰上平生所憎羣臣所共知誰最甚者上曰雍齒數甞窘辱我留侯曰今急先封雍齒以示羣臣於是上置酒封雍齒爲什方侯皆曰雍齒且侯我屬無患矣又曰髙祖以蕭何功最盛封爲鄼侯所食邑多功臣皆曰蕭何未甞有汗馬之勞反居臣等上何也帝曰諸君知獵乎追殺獸者狗也而發蹤指示獸處者人也今諸君徒能得獸耳功狗也至如蕭何發蹤功人也且諸君獨以隨我多者兩三人何舉宗數十人皆隨我功不可忘也皆曰平陽侯曹叅身𬒳七十創攻城略地功最多冝第一鄂君進曰羣臣議皆誤陛下雖亡山東何常全關中以待陛下此萬丗之功奈何以一旦之功而加萬丗之功哉蕭何第一曹叅次之上曰吾聞進賢受上賞蕭何功雖髙得鄂君乃益明封鄂君故所食關内侯邑封爲安平侯又曰髙祖封項伯等四人爲列侯賜姓劉氏又曰項羽𬒳十餘瘡顧見漢騎司馬吕馬童曰若非吾故人乎馬童面之指王翳曰此項王也羽迺曰吾聞漢購我頭千金邑萬户吾爲公得之乃自剄王翳取其頭亂相蹂蹈爭羽相殺者數十人最後楊喜吕馬童吕勝楊武各得一體故分其地以封五人皆爲列侯又曰陳豨反上自至邯鄲喜曰豨不南據邯鄲北阻漳水吾知其無能爲矣上令周昌選趙壯士可令將者因見四人上嫚罵曰竪子能爲將乎四人慙皆伏地上封各千户以爲將又曰淮隂侯韓信舎人樂說告信反封順陽侯又曰文帝詔曰方大臣諸吕迫朕朕狐疑皆止朕唯中尉宋昌勸朕朕巳得保守宗廟已尊昌爲衛將軍其封昌爲壯武侯又曰韓王信入匈奴與太子俱至頽當城生子因名頽當至孝文時降封弓髙侯頽當孽孫嫣貴幸顯當時丗嫣弟說以校尉征匈奴封龍額侯又曰景帝封功臣衛綰直不疑等十九人綰封建陵侯不疑塞侯又曰張賀爲掖庭令而宣帝以皇曽孫時收養掖庭恩甚密焉及宣帝即位而賀巳死宣帝追恩乃封其家爲恩德侯置守冢二百人東觀漢記曰光武功臣鄧禹等二十八人皆爲侯封餘功臣一百八十九人又曰李通上司空印綬以特進奉朝請乆之有司奏請付諸皇子上感通首創大謀因封通少子雄爲邵陵侯又日建武二年定封景丹櫟陽侯上謂丹曰今關東故王國雖數縣不過櫟陽萬户富貴不歸故郷如衣錦夜行故以封卿又詔封竇融曰行河西五郡大將軍凉州牧張掖屬國都尉竇融執志忠孝扶微救危仇疾反虜隗囂率厲五郡精兵羌胡畢集兵不血刃而虜土崩瓦解功旣大矣篤意分明斷之不疑吾甚嘉之其以六安安豐陽原蓼安凡四縣封融爲安豐侯又曰三輔豪傑入長安攻未央宫杜虞殺莽於漸臺東海公賔就得其首傳詣宛封猾侯又曰申屠志以功封汝隂王上書以非劉氏還王璽改爲頳陽侯又曰班超定西域五十餘國乃詔封超爲定逺侯後漢書曰單超左綰徐璜貝瑗唐衡桓帝時共誅梁兾同日封侯謂之五侯於是朝庭日亂超薨之後其四侯轉横天下爲之語曰左廻天具獨坐徐卧虎唐雨墮魏志曰夏侯淵字妙才以功封博昌亭侯太祖下令曰夏侯淵虎歩関右所向無前仲尼有言吾與爾俱不如也後戰死黄𥘉太和中賜淵子五人皆爵関内侯又太祖令曰吾起義兵誅暴乱於今十九年所征必尅豈吾功哉乃賢士大夫之力也天下雖未悉定吾要與賢士大夫共定之而專饗其勞吾何以安焉其保定功行封於是大封功臣二十餘人皆爲列侯其餘各以次受封及復死事之孤輕重各有差又曰曹洪字子廉以功封野王侯文帝時坐事削明帝即位更封樂成侯又曰曹沐字文烈自荆州北歸太祖曰此吾家千里駒也文帝録前後功封爲東亭侯又曰曹眞字子丹以功封邵陵侯眞少舉宗人遵郷人朱讃並事太祖遵讃早亡眞愍之乞分食邑封遵子等詔曰大司馬有叔向撫孤之仁晏平乆要之分聽分賜遵等子爵開内侯及眞薨明帝悉封眞五子皆列侯又曰太祖自栁城還稱荀攸前後謀謨曰昔髙祖使張子房自擇齊三萬户今孤亦欲君自擇所封又曰太祖見賈詡執手曰使我信重於天下者子也表爲執金吾封都亭侯文帝即位又封詡小子訪爲列侯又曰郭嘉字奉孝兾州平封齊陽亭侯及薨太祖表曰臣策未决嘉輔成之平定天下謀功爲最増邑并前千户又曰張旣字德容詔曰卿勲非但破胡乃永寧河右使吾長無西顧之念徙封西郷侯又曰任峻字伯逺爲典農中郎大興屯田軍國致饒太祖以峻功髙表封都亭侯又曰張遼字文逺為盪冦將軍以功封都亭侯又討陳蘭梅成等入灊山中蘭等壁其上遼力戰平之太祖論諸將功曰登天山以取蘭成盪寇功也乃増邑文帝又分封兄汎及一子列侯帝踐祚進封晉陽侯及薨詔曰合肥之役遼以歩卒八百破賊十萬自古未之有也其分遼邑賜一子爵関内侯又曰太祖表封荀攸曰前尅敵皆攸之謀也於是封攸陵樹亭侯又曰太祖謂于禁曰淯水之難吾焉能也將軍在亂能整雖古之名將何以加之乃録前後功封壽亭侯又曰文帝踐祚進張郃爲鄭侯明帝詔曰賊亮以巴蜀之衆將軍所向克定乃益户并前四千三百户郃前後有功明帝分郃戸封四子列侯又曰朱靈字文博先封鄃侯文帝詔曰將軍佐命先帝威過方邵平生所志願勿難色靈謝曰髙唐宿所鎭乃更封髙唐侯又曰龐惠以衆降太祖聞其驍勇封関内亭侯爲関羽所得罵羽而死太祖悲之封其二子爲列侯又曰徐邈字景山西域流通荒戎入貢皆邈勲也以功封都亭侯又曰王昶字文舒討諸葛誕誕誅詔曰昔孫臏佐趙直湊大梁兵驟進亦所以成兵勢也増邑四千七百户矣呉志曰駱統字公緒𥘉曹仁攻濡湏使別將常雕等襲中洲統與嚴圭共拒破之封新陽亭侯晉書曰符堅南冦桓伊與冠軍將軍謝玄輔國將軍謝琰俱破堅於肥水以功封永循縣侯進號右軍將軍賜錢百萬𫀆表千端王隱晉書曰封宣帝爲武平侯公孫淵平又増封舞陽昆陽二縣又曰封文帝爲髙都侯太始元年詔曰昔唐虞三代之盛曁于漢魏創制襃崇元勲班爵行賞與國同禮施禄逮下萬邦咸乂朕以寡德登于天位託于王公之上腹心股肱文武之臣光齊帝業余嘉乃勲慶賞之行其用冝速又曰張華傳曰華以建䇿加華右光禄大夫開府儀同三司固辤不受府詔聽乃更論平呉之功封華郡公三千户王者擇近郡平土詳依典制施行華讓前後十餘頻繁懇誠詔不聽遂受封晉中興書曰元帝以佐命功封周玘烏程公又封王敦武昌公又曰孔愉字敬康以討華軼功封餘不亭侯𥘉愉少時甞得一龜放於餘不溪中流左顧者數過及鑄侯印而龜左顧更鑄猶然印工以聞愉悟遂佩焉又曰明帝以平錢鳯功封始興公温嶠建寧公庾亮永昌公郗鑒南平公卞壷建興公蘇峻邵陵侯劉􅡄泉陵侯應詹觀寧侯卞郭益陽侯趙胤湘南侯又曰成帝以平蘇峻功封公者三人侯者八人又以討郭黙功者三人穆帝以平蜀功封桓温臨賀公又曰哀帝以平關洛功封桓冲豐城公海西公以平袁眞功賜桓温子偉爲西昌公又曰安帝以興復功封劉𥙿等二十三人𥙿唱謀封豫章公萬户劉毅南平公五千户何無忌安成公劉道規華容公晉起居注曰太康元年詔曰張華前與故太傅創謀大計部分方笇有謀謨之勲封廣武侯邑萬户又曰惠帝追封衛瓘爲郡公㑹稽典録曰鄭吉旣破車師降日逐威震西域日逐并護車以北道故號都護之置自吉始焉上嘉其效乃下詔曰都護西域騎都尉鄭吉撫循外蠻宣明威信功效茂著其封吉爲安逺侯華陽國志曰漢髙帝滅秦爲漢王王巴蜀閬中人范自有恩信方略爲帝募發賨民西與定秦地旣定封自爲長安建章郡侯帝將征關東賨民皆思歸嘉其功難傷其意遂聽還謂曰富貴不歸故郷如衣繡夜行可徙封自閬中慈郷侯自固辤乃封度汗縣侯太平御覽卷第二百
