front:
  text: 太平御覽卷第六
  hash: sha256:1a053bc68afc63fc9b8fca587be7213e19d679f1408f95f57c65ff55e35a7144
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_006-1a}
body:
  text: 天部六星中天文録曰格擇星狀如炎火下大上銳色黃白起地而上占曰格擇星見不種而獲不有土功必有大害又曰歸邪如星非星如雲非雲名曰歸邪司馬遷天官書曰歸邪見必有歸國者又曰六甲六星主分隂陽而紀節候故在帝旁所以布政教而授民則也又曰平星論語䜟曰平星主法合誠圖曰主建廷平主平天下之獄事若今廷尉之象又曰魚星主理隂陽事知雲雨之期也故讃曰漢中魚星知雲雨也占曰魚星明大河海水皆岀又云魚星明則大隂陽氣和魚星忽不明而在則魚多魚星亡則少魚又曰郎位一曰哀烏郎府也注曰郎位周官之元士漢官之光禄中散諌議三署郎中是其職也或曰郎位今尚書也大象列星圖曰北極五星一名天極一名北極其第一星爲太子第二星最明者爲帝第三星爲庶子餘二後宫屬也並在紫微宫中央故謂之中極其占明大則吉若變動則有憂今觀象之始始於中極者先尊以及卑自中以周外也其一人爲首謂極第二星爲首也又曰四輔四星在紫微宫中抱之細星也此爲輔臣之位賛於萬機其占以小而明則吉若微闇則官不理又曰鈞陳六星在紫微宫中華蓋之下天帝所居之宫亦護軍將軍之象占以明則吉又曰華蓋七星其杠九星合十六星如蓋狀在紫微宫臨鈞陳以䕃帝坐占若正則吉若傾則凶也又曰女史一星在紫微宫内柱史北此婦人之官掌記宫中之事占以明則爲記史直詞若不明則反是又曰柱下史一星在紫微宫内近尚書此左右掌記君之過其占以明則爲史直詞若不明則詞不依過無眞實也又曰尚書五星在紫微宫門内東南之隅此八座大臣之象故讃曰尚書納言夙夜諮謀占以小而明則君臣和又曰北斗七星近紫微宫南在太微北是爲帝車以主號令運乎中央而臨制四方建四時均五行移節度定諸紀皆繫於北斗其魁四星爲璿璣其杓三星爲玉衡故書云在璿璣玉衡以齊七政又其魁第一星爲樞亦曰正星主陽德天子之象二曰璿亦曰法星主隂刑女主之位三曰璣亦曰令星主禍四曰權亦曰伐星主天理伐無道五曰衡亦曰殺星主中央助四旁殺有罪六曰開陽亦曰應星又一主天二主地三主火四主水五主土六主木七主金又一主秦二主楚三主梁四主呉五主隋六主燕七主齊又曰文昌六星在北斗魁前如匡形故史遷曰斗魁戴匡其第六星名曰司禄此天之府計集所㑹也又曰宦者四星次帝座西南主侍者帝旁閹人也占以不明則吉若明則内臣專權又曰勢四星在太陽西北主刑餘人而用事者也占以不明爲吉若明則閹官用權又曰輔一星附北斗杓第六星大臣之象也占欲其小而明則吉若大而明則臣奪君政若小而不明則臣不任職若明大與斗合者則國兵暴起又曰八榖八星在紫微蕃之外五車之北其八星一主稻二主黍三主大麥四主大豆五主小豆六主小麥七主粟八主麻子占其明則八榖成若暗則不成若一星不見則一榖不登若八星不見則國人有糊口之憂又曰房四星去氐十五度爲明堂布政之宫占若移徙則國流逆均明則天下大同又曰傅說一星在尾後河中也蓋後宫女巫也主祝祠神靈祈禱以求子胤占若大而明則後宫多禱祈又曰杵三星在箕南主舂杵之用占若其縱則爲豐若其撗則爲飢又曰農丈人一星在南斗南主農正官也占明則爲豐稔若暗則爲飢歉又曰南斗六星去牽牛二十六度四分之一爲天廟丞相太宰之位主薦賢良授爵禄又主兵機魁南二星爲天梁中央二星爲天相北二星杓曰天厨庭亦爲夀命之期將有天子之事占其斗星盛明則王道和平爵禄行若不然反是也又曰河鼔三星在牽牛北主軍鼔蓋天子三將軍也中央大將軍也其南左星左將軍也其北右星右將軍也所以備關梁而拒難也昔傳牽牛織女七月七日相見者則此是也故爾雅云河鼔謂之牽牛又古歌曰東飛伯勞西飛鷰黃姑織女時相見其黃姑者即河鼓也爲呉音訛而然今之言者謂是列舎牽牛而㑹織女故爲此分析令知斷其疑焉又曰􅍫四星在人星東南主舂􅍫占若覆則歲中人飢荒若仰則天下熟又曰内杵三星在人星旁主軍糧占若正直下對曰口則吉若偏與曰不相當則軍糧絶又曰漸臺四星屬織女左足主晷刻律吕占若明正則隂陽調而律吕和不然則否也又曰弧九星在狼東南謂天弓也主備賊盗常屬矢向狼星又曰天錢十星在北落西北主錢帛所聚占若明則府藏盈若不明則爲虚耗又曰東壁二星去營室十六度天子圖書之袐府也占若明則圖書集道術行小人退君子入若不然則天子好武臣賤文士稽古忠正之臣隱親黨邪曲之人用也又曰羽林四十五星三三而聚在壘壁南主天軍占若星聚明則國安寧若星稀而動揺則兵革出又曰進賢一星在太微宫東華門東平道之西主訪賢薦士也占若明則賢人進若不明則否也又曰太微宫垣十星在翼珍北主天子之宫庭五帝之座十二諸侯府也其外藩南二星間名曰端門東第一星爲左執法廷尉之象也又曰軒轅十七星在七星北如龍之體主雷雨之神後宫之象隂陽交感震爲雷激爲電和爲雨怒爲風亂爲霧凝爲霜散爲露聚爲雲氣立爲虹蜺離爲背矞分爲抱珥此十四變皆軒轅主之又曰天街二星在畢昴間主國界也街南爲華夏之國街北爲戎夷之國又曰玉井四星在參西主水泉石氏星經曰卷舌六星在昴北主䜛佞言語之吏若移動多口舌兵起星繁天下兵亂星少兵廢又曰天䜛星在卷舌中亦主誹謗又曰天禀四星在昴南主積聚黍稷供享祀及御膳星明豐暗儉又曰天苑十六星在昴畢如環狀主天子苑囿五星守犯牛馬死又曰參旗九星在參畢間一曰天弓星不欲明明則白衣㑹邊兵動又曰闕丘二星在南河主天子門闕諸侯之兩觀也又曰文昌六星如半月形斗魁前爲天府主天下集計事第一星名上將第二名次將第三名貴相第四名司録第五名司命第六名司法星光潤則天下安又曰大理四星在斗中亦爲貴人牢又爲執法之宫又曰庫樓十五星在左角南器府東一名天庫兵車之府星芒角兵起又曰招揺一星在梗河北主逺狄芒角則兵起又曰貫索九星在七公前爲賤人牢口一星爲門門欲開開即有赦星惣見獄事繁豫章列士傳曰周騰字叔逹爲御史桓帝欲南郊平明出叔逹仰首曰王者象星今宫中宿䇿馬星不出動帝何岀焉四更皇子卒遂止關令内傳曰北斗一星面百里相去九千里置二十四氣四宿行四時五方立五星主五岳也黄石公記曰黃石鎭星之精也王子年拾遺記曰禹鑄九鼎擇雌金爲隂鼎雄金爲陽鼎太白星見九日不没莊子曰夫道可傳而不可受可得而不可見傳說得之以相武丁奄有天下乗東維騎箕尾而比於列星列子曰星積氣之中有光耀者抱扑子曰辰星水精生玄武歲星木精生青龍又曰人𥘉受氣皆應列宿之精值聖宿則聖值賢宿則賢也尸子曰自井中視星所見不過數星自丘上以望則見始岀也非明益也勢使然也私井中也公丘上也淮南子曰太微者太一庭也紫宫者太一之居也軒轅者帝妃之舎也咸池者水魚之囿也天河者羣神之闕也天河星名也闕猶門也又曰令雨師灑道使風伯掃塵髙誘注曰雨師畢星也風伯箕星也又曰歳星之所居五榖豐昌其對爲衡歲乃殃又曰四守者所司賞罰許愼注曰四守紫宫軒轅咸池天河也家語曰巫馬期爲單父令戴星出入以理人劉向說苑曰玄象著明莫大於日月察變之動莫著於五星也又曰秦胡亥立日月薄食山林淪亡枉矢光夜熒惑襲月景帝通紀曰彗星者天地之旂也國精符曰地爲山川山川之精上爲星各應其州城分野爲國作精神符驗也五姓占曰君薄德義懦弱不勝任則太白失度經天作變易之象樂汁圖曰天宫紫微宫也鈎陳後宫也大當正妃也大當鈎陳末大星也閣道北斗輔天理貴人牢爲貴人作牢獄也文昌宫天五曹㑹府也玄戈招揺也皆備兵難之星梗河天矛也梗河一名天矛織女連營賤人牢連營貫索咸池五車五車咸池别名天關叅旗伐也觜觹天廟也奎天豕也天矢婁也胃天倉也狼弧魚陵天船天苑卷舌天老人皆西方星名也栁主材木栁星主材木也鄭玄注曰日月遺其珠囊珠謂五星也遺其囊者盈縮失度也黃石公隂謀祕訣法曰熒惑者火之精御史之象主禁令刑罰蔡邕月令章句曰天官五獸之於五事也左有蒼龍大辰之㒵右有白虎大梁之文前有朱雀鶉火之體後有玄武龜蛇之質中有大角軒轅麒麟之信風俗通曰月與星並無光日照之乃光耳如以鏡照日則影見壁月初見西方月望後光見東北一照也又曰東方朔太白星精黃帝時爲風后堯時爲務成子周時爲老子越爲范蠡齊爲鴟夷言其變化無常也祖台之志怪曰呉未亡前常有紫赤氣見牛斗之間星官及諸善占者咸憂呉方興唯張茂先於天文尤精獨知爲神剱之氣非江南之祥太平御覽卷第六
