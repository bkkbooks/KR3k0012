body:
  text: 皇王部四黃帝軒轅氏少昊金天民顓頊髙陽氏黄帝軒轅氏史記曰黃帝者少典之子姓公孫名軒轅諸侯有不順者從而征之未甞寜居東至于海登丸山及岱宗西至崆峒登雞頭山南至江登熊湘北極葷粥合符釡山而邑于涿鹿之阿遷徙無常處以師兵爲營衛官名皆以雲置左右大監監于萬國獲寳鼎舉風后力牧常先大鴻以治民有土德之瑞故號曰黃帝有二十五子其得姓者十四人黄帝居軒轅之丘而娶於西陵氏之女是爲嫘音縲祖爲正妃生二子其後皆有天下其一曰玄囂是爲青陽降居江水其二曰昌意降居弱水昌意娶蜀山氏女曰昌㒒生髙陽髙陽有聖德焉黄帝崩葬橋山其孫昌意之子髙陽立是爲帝顓頊又封禪書曰黃帝採首山銅鑄鼎於荆山下鼎旣成有龍垂胡髯下迎黃帝黃帝上騎龍羣臣後宫從上者七十餘人餘小臣不得上乃悉持龍髯龍髯拔墮墮帝之弓百姓仰望帝旣上乃抱其弓與龍髯而號故後丗因名其處曰鼎湖其弓曰烏號又曰漢武帝北廵狩還祭黄帝冢上曰吾聞黄帝不死今有冢何也或對曰黄帝巳僊上天羣臣塟其衣冠耳帝王丗紀曰黄帝有熊氏少典之子姬姓也母曰附寳其先即炎帝母家有蟜氏之女丗與少典氏婚故國語兼稱焉及神農氏之末少典氏又取附寳見大電光繞北斗樞星照郊野感附寳孕二十五月生黄帝於壽丘長于姬水龍顔有聖德受國於有熊居軒轅之丘故因以爲名又以爲號與神農氏戰于阪泉之野三戰而克之力牧常先大鴻神農皇直封鉅人鎮大山稽鬼臾區封胡孔甲等或以爲師或以爲將分掌四方各如巳視故號曰黄帝四目又使歧伯嘗味百草典醫療疾今經方夲草之書咸出焉其史倉頡又取像鳥跡始作文字史官之作蓋自此始記其言行䇿而藏之名曰書契黄帝一號帝鴻氏或曰歸藏氏或曰帝軒吹律定姓有四妃生二十五子在位百年而崩年百一十歳又曰神農氏衰黄帝脩德化民諸侯歸之黄帝於是乃擾馴猛獸與神農氏戰于阪泉之野三戰而克之又徴諸侯使力牧神皇直討蚩尤氏擒之于涿鹿之野使應龍殺之于凶黎之丘凢五十五戰而天下大服或傳以至仙或言壽三百歳塟于上郡陽周之喬山鬻子曰黄帝年十歳知神農之非而改其政春秋内事曰軒轅氏以土德王天下始有堂室髙棟深宇以避風雨孝經鈎命决曰附寳出降大靈生帝軒附寳帝軒母也電黄精軒轅氣也軒黄帝名附或作付也古史考曰有熊氏巳姓或曰姓公孫山海經曰有人衣青名曰黄帝女妖青魅旱魃也蚩尤作兵伐黄帝黄帝乃令應龍攻之兾州之野兾州中土應龍蓄水蚩尤請風伯雨師從大風雨黄帝乃下天女曰妖雨止遂殺蚩尤歸藏曰昔黄神與炎神爭鬪涿鹿之野將戰筮於巫咸巫咸曰果哉而有咎易下繫曰黃帝垂衣裳而天下治蓋取諸乾坤河圖握拒曰黃帝名軒北斗黃神之精母地祇之女附寶之郊野大電繞斗樞星耀感附寳生軒胷文曰黃帝子河圖挺佐輔曰黃帝修德立義天下大治乃召天老而問焉余夣見兩龍挺日圖即帝以授余於河之都覺昧素喜不知其理敢問於子天老曰河出龍圖雒出龜書紀帝録州聖人所紀姓號興謀治平然後鳯皇處之今鳯皇以下三百六十日矣合之圖紀天其授帝圖乎黃帝乃祓齋七日衣黄衣黄冠黃冕駕黃龍之乗戴蛟龍之旗天老五聖皆從以逰河洛之間求所夣見者之處弗得至於翠嬀之淵大盧魚泝流而至乃問天老曰子見天中河流者乎曰見之頋問五聖皆曰莫見乃辭左右獨與天老跪而迎之五色畢具天老以授黃帝帝舒視之名曰録圖龍魚河圖曰黃龍附圖鱗甲成字從河中出付黃帝令侍臣自冩以示天下又曰黄帝攝政前有蚩尤兄弟八十一人並獸身人語銅頭鐵額食沙石子造立兵杖刀㦸大弩威振天下誅殺無道不仁不慈万民欲令黃帝行天子事黃帝仁義不能禁止蚩尤遂不敵乃仰天而歎天遣玄女下授黃帝兵信神符制伏蚩尤以制八方蚩尤没後天下復擾亂不寜黃帝遂畫蚩尤形象以威天下天下咸謂蚩尤不死八方万邦皆爲殄伏尚書中候曰帝軒提像配永循機軒軒轅黃帝名永長也循順也黃帝軒轅觀攝提之像配而行之以長爲順升機爲政天地休通五行期化休美也天地美氣相通行應四時之期而變化河龍圖出龍衘圖而出也洛龜書威龜負書而出威則也赤文像字以授軒轅韓詩外傳曰黃帝召天老而問鳯像何如天老曰夫鳯像鴻前而麟後虵頸而魚尾龍文而鷄身鷰頷而鷄喙黃帝乃齋于中宫鳯蔽日而至黃帝降于東階西面再拜稽首皇天降祉敢不承命鳯乃止帝東園詩含神霧曰大電繞樞炤郊野感附寳生黃帝大戴禮曰宰我問於孔子曰昔者子問諸榮君黃帝三百年請問黃帝者人也抑非人耶何以至於三百年孔子曰黃帝少典之子也曰軒轅生而神靈弱而能言教熊羆貔貅豹虎以與赤帝大戰于阪泉之野三戰然後得行其志黃帝斧拂衣大帶斧裳乗龍駕雲勞懃心力耳目節用水火財物生而民得其利百年死而民得其神百年亡而民用其教百年故曰三百年傳曰黃帝以雲紀故爲雲師而雲名春秋元命苞曰黃帝龍顔得天庭陽上法中宿取象文昌戴天履隂秉數制剛顔有龍像以軒轅也庭陽太微庭也戴天天文在首履陰隂字在足下也制剛紀也紀正四輔也管子曰黃帝得蚩尤而明乎天道得太常而察乎地利得蒼龍而辨乎東方得祝融而辨乎南方得大卦而辯乎西方得后土而辯乎北方黃帝得六相天下治又曰黃帝鑚燧生火以熟葷臊民食之無膓胃之病列子曰黃帝即位十有五年竭聦明進智力營百姓燋然肌色皯古厚切黣音妹昏然五情爽惑用聦明未足以致治祗足以乱神也黃帝乃喟然歎曰朕之過淫矣淫當作深養一巳其患如此治萬物其患如此唯任而不養縱而不治則性命自反天下自安於是放萬機舎宫寢去直侍撤鐘懸减厨膳退而閑居大庭之舘齋心服形心無欲則形自服矣三月不親政事晝寢而夣將明至理不可以淸求故寄之於夢聖人無夢也逰於華胥氏國華胥氏國在弇州之西台州之北不必便有此國也明至理必如此耳淮南子云正西曰弇州西北曰合州不知斯齊國幾千萬里斯離也齊中也蓋非舟車足力之所及神逰而已舟車足力形之貟者耳神道恍惚不行而至也其國無師長其民無嗜慾不知樂生不知惡死故無夭傷不知親已不知踈物故無憎愛不知背逆不知向順故無利害理無生死故無所樂悪理無愛憎故無所親疎理無逆順故無所利害也都無所愛憎都無所畏忌入水不溺入火不熱斫撻無傷痛至和者無物能傷溺熱痛癢實由矜懼也乗空如履實寢虚若處床雲霧不閡其視雷霆不亂其聽羙悪不汨其心山谷不躓其歩神行而已黃帝旣悟然自得又二十有八年天下大治幾若華胥氏之國而帝登假假當爲遐莊子曰北門成問於黃帝張咸池之樂於洞庭之野吾所聞之而懼復聞之而惑帝曰吾奏之以人徴之以天行之以義禮建之以太清以人奏之以天徴之天人合折乃知以春爲禮以秋爲義太清乃又曰黃帝將見大隗于具茨之山方明爲御昌寓驂乗張若隰明前馬昆閽滑稽後車至於襄城之野七聖皆迷無所問途適遇牧馬童子問途焉曰若知具茨之山乎曰然黃帝曰異哉小童非徒知具茨之山又知大隗之所存乎曰然黄帝曰吾子之事雖然請問爲天下小童辭黄帝又問小童曰天下者亦奚以異乎收馬者㦲亦去其害馬者而巳矣馬以過分爲害黃帝再拜稽首稱天師而退又曰黃帝聞廣成子在於崆峒之上故徃見之曰敢問至道之精廣成子曰自而治天下雲氣不待族而雨草木不待黃而落日月之光益以荒矣又奚足以語至道黃帝退捐天下築特室席白茅間居三月復往邀之廣成子南首而卧黃帝從下風膝行而進再拜稽首而問曰聞吾子逹於至道敢問治身柰何而可而以長乆廣成子蹷然而起曰善哉問乎來吾語汝至道之精窈冥冥至道之極昏黙黙無視無聽抱神以静形將自正我修身千二百歳矣吾形未嘗衰黃帝再拜稽首曰廣成子之謂天矣尸子曰子貢曰古者黃帝四面信乎孔子曰黄帝取合已者四人使治四方不計而耦不約而成此之謂四靣韓子曰師曠謂晉平公曰黃帝合鬼神於西太山之上駕象車六交龍畢方並館蚩尤居前風伯進掃雨師洒道乃作爲清角之樂淮南子曰黃帝治天下而力牧太山稽輔之力牧太山稽輔則黃帝之師也孟子曰王者師臣也以理日月星辰之治隂陽之氣節四時之度正律曆之數明上下等貴賤使強不得暴寡人民保命不夭安能性命不夭逰也歳時熟而不凶不凶無災害也百官正而無私皆在公也上下調而無尤君調臣和無尤過也法令明而不闇輔佐公而不阿卿土公正不阿意曲從田者不侵畔漁者不爭隈隈曲深處無所聚也道不拾遺市不䂊價城郭不關關閉邑無盗賊商旅之人相讓以財狗彘吐菽粟於道路而無忿爭之心於是日月精明星辰不失其道風雨時節五糓登熟虎豹不妄噬鷙鳥不妄摶鳯凰翔於庭麒麟擾於郊青龍進駕飛黃伏皂飛黃出西方扶状如狐頂上有角乗之壽千歳皂櫪也諸北儋耳之國莫不獻其貢職皆北極之夷國論衡曰謚法静民則法曰黃帝者安民之謚非得道之稱也蔣子萬機論曰黃帝之𥘉養性愛民不好戰伐而四帝各以方色稱號交共謀之邊城日驚介胄不釋黃帝歎曰夫君危于上民安于下主失於國其臣再嫁厥病之由非養冦耶今處民萌之上而四盗亢衡逓震于師於是遂即營疊以滅四帝向令黃帝若不龍驤虎變而與俗同道則其民臣亦害于四帝矣抱朴子曰黃帝生而能言役使百靈可謂天授自然之體者猶復不敢端坐而得道故陟王屋而受丹經到鼎湖而飛流珠登崆峒而問廣成上具茨而事大隗適東岱而奉中黃入金谷而諮老子論道養則質玄素二女精推歩則訪山稽力牧講占候則詢風著體侯則受雷歧審攻戰則納五音之䇿窮神姧則記曰澤之亂相地理則書青烏之說救傷殘則綴金冶之術故能畢記祕要窮盡道眞又曰昔黃帝東到青丘過風山見紫府先生受三皇内文以劾召萬神南到負隴䕃建木觀百靈之所登採若㦸之華飲丹巒之水西見中黃子受九品之方過崆峒從廣成子受自然之經北到洪隄上具茨見大隗君黃蓋童子授神芝圖還陟王君居得神丹注說到峨嵋山見皇人於玉堂又曰汲郡塚中竹書言黃帝旣仙去其臣有左徹者削木爲黃帝之像帥諸侯朝奉之故司空張茂先撰博物志亦云黃帝仙去其臣思戀罔極或刻木立像而朝之或取其衣冠而塟之或立廟而四時祠之孫綽子曰黃帝之逰天衢奏鈞天之鼔建日月旗乗琱雲之輿駕八翼之龍彭祖前駈松喬挾轂先景流而不返長風逐而不及發軔紫宫不崇朝而匝六合也符子曰黃帝將適昆虞之丘中路逢容成子乗翠華之蓋建日月之旗驂紫虬御雙鳥黃帝命方明避路謂容成子曰吾將釣于一壑栖于一丘又曰黃帝謂其友無爲子曰我勞天下矣疲於形役請息駕於玄圃子且代之焉能弃我之逸而爲君之勞哉乃攀龍而俱去晉牽秀黄帝頌曰邈矣軒轅應天載靈通幽逺覽觀象設形誕敷厥訓彛倫攸經德從風流化與雲征皇猷允塞地平天成爰登方岳封禪勒成紛然鳯舉龍騰太清違落九土陟彼髙冥民斯攸慕涕泗沽纓遐而不墜式頌德聲有巢氏巳降至黃帝爲三皇號中古少昊金天氏帝王世紀曰少昊帝名摯字青陽姬姓也母曰女節黃帝時有大星如虹下流華渚女節夣接意感生少昊是爲玄囂降居江水有聖德邑于窮桑以登帝位都曲阜故或謂之窮桑帝以金承土帝圖䜟所謂白帝朱宣者也故稱少昊號金天氏在位百年而崩河圖曰大星如虹下流華渚女節氣感生白帝朱宣宋均生云朱宜少昊氏也古史考曰窮桑氏羸姓也以金德王故號金天氏或曰宗師太昊之道故曰少昊遁甲開山圖曰帝少昊死塟雲陽山傳曰魯昭公十七年郯子來朝昭子問焉曰少皡氏鳥名官何也曰郯子曰吾祖也我髙祖少皥摯之立也鳯鳥適至故紀於鳥爲鳥師而鳥名鳯鳥氏歷正也玄鳥氏司分者也伯趙氏司至者也青鳥氏司啓者也丹鳥氏司閉者也祝鳩氏司徒也瞗鳩氏司馬也鳲鳩氏司空也爽鳩氏司冦也鶻鳩氏司事也五鳩鳩民者也五雉爲五工正利器用正度量夷民者也九扈爲九農正扈民無淫者也魏曹植少昊賛曰祖自軒轅青陽之裔金徳承土儀鳯帝丗官鳥號名官殊職别系農正扈民各有品制顓頊髙陽氏史記曰顓頊静淵以有謀䟽通而知事養材以任地載時以像天依鬼神以制義治氣以教化絜誠以祭祀生子曰窮禪顓頊崩而玄囂之孫髙辛立是爲帝俈與嚳同古史考曰髙陽氏妘姓以水德王帝王丗紀曰帝顓頊髙陽氏黃帝之孫昌意之子姬姓也母曰景僕蜀山氏女爲昌意正妃謂之女樞金天氏之末女樞生顓頊於若水首戴干戈有聖德父昌意雖黃帝之嫡以劣降居若水爲諸侯顓頊生十年而佐少昊十二年而冠二十而登帝位平九黎之亂以火事紀官命南正重司天以属神北正黎司地以属民於是神民不雜萬物有序始都窮桑後徙商丘命飛龍効八風之音作樂作五音以祭上帝納勝墳氏女娽音禄生老童有才子八人號八凱顓頊在位七十八年年九十一歳歳在鶉火而崩塟東郡頓丘廣陽里河圖曰瑶光之星如蜺貫月正白感女樞幽房之宫生黒帝顓頊大戴禮曰宰我曰請問帝顓頊孔子曰顓頊黃帝之孫昌意之子乗龍而至四海北至幽陵南至交阯西濟於流沙東至於蟠木動静之物大小之神日月所照莫不砥礪春秋元命苞曰顓頊併幹上法月參集威成紀以理隂陽併猶重也水精主月參伐主斬刈成功兼此月職重助賛以爲表也山海經曰黃帝妻嫘祖生昌意降處若水生幹流取倬子曰河女生帝顓頊又曰顓頊死即復蘇淮南子曰顓頊之法婦人不避男子於路者祅之於四逹之衢祅音弗除其不祥魏曹植帝顓頊賛曰昌意之子祖自軒轅始誅九黎水德統天以國爲號風化神宣威暢八極靡不祗䖍太平御覽卷第七十九
