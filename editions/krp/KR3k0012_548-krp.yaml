front:
  text: 太平御覽卷第五百四十八禮儀部二十七
  hash: sha256:391855a9abe80c5624fd10767fb92b288cef9551a60c3d73b02088cb3938c3ba
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_548-1a}
body:
  text: 杖屨幗髽廬重凶門附死杖屨儀禮䘮服曰苴杖竹也削杖桐也各齊其心皆下本杖者何爵也非爵而杖者何擔主也非主而杖者何輔病童子何不杖不能病也婦人何以不杖不能病也又曰斬齊裳菅屨者菅菲也公士大夫之衆臣爲其君繩屨者繩菲也䟽衰裳齊䟽屨者藨蒯之菲也禮記䘮服小記曰虞杖不入室附杖不升堂鄭玄注曰哀益衰敬多也婦人不爲主而杖者姑在爲夫杖姑不厭婦母爲長子削杖嫌服男子當杖竹也母爲長子服不可以重於子爲巳也女子子在室爲父母其主䘮者不杖則子一人杖女子子在室亦童子也無男昆弟使同姓爲攝主不杖則子一人杖謂長女也許嫁二十而笄笄爲成人成人正杖也又䘮服小記曰庶子不以杖即位下適子也位朝夕哭位也父不主庶子之䘮則孫以杖即位可也祖不厭孫孫得神也父在庶子爲妻以杖即位可也舅不主妾之䘮子得神也又雜記上曰古者貴賤皆杖叔孫武叔朝見輪人以其杖關轂而輠輪者於是有爵而后杖也又䘮大紀曰大夫之䘮三日之朝旣殯主人主婦室老皆杖大夫有君命則去杖大夫之命則輯杖內子爲夫人之命去杖爲丗婦之命授人杖大夫有君命去杖此指大夫之子也而云大夫者通實大夫有父母之䘮也授人杖與使人執之同也士之䘮二日而殯三日之朝主人杖婦人皆杖於君命夫人之命如大夫於大夫丗婦之命如大夫士二日而殯者下大夫也士之禮死與徃日生與來日此二日於死者亦得三日也婦人皆杖謂主婦容妾爲君女子子在室者子皆杖不以即位才謂凡庶子也不以即位與去秋同也大夫士哭殯則杖哭柩則輯杖哭殯謂旣塗也哭柩謂啓後也大夫士之子於父父也尊近哭殯可以杖子哭諸侯之子於父父也君也尊逺杖不入廟門也棄杖者斷而棄之於隱者杖以䘮至尊爲人得而褒之又問䘮曰或問曰杖者何也怪其義各異曰竹桐一也故爲父苴杖竹也爲母削杖削桐也言所以杖者義一也顧所用異耳或問曰杖者以何爲也怪所爲施曰孝子䘮親哭泣無數服勤三年身病體羸以杖扶病也言得杖乃能起也則父在不敢杖矣尊者在故也堂上不杖辟尊之處也堂上不趨示不遽地此孝子之志也人情之實也禮義之經也非從天降也非從地出也人情而巳矣父在不杖謂爲母也尊者不杖辟尊渚之處不杖有事不趨皆爲其感動使之憂歳也矣又䘮服四制曰杖者何也爵也三日授子杖五日授大夫杖七日授土杖或曰擔主或曰輔病婦人童子不杖不能病也白虎通曰所以杖竹桐何取其名也竹慼也桐痛也父以竹母以桐竹陽也桐隂也竹斷而用之質故爲隂也韓子曰儒執䘮三年大毀扶杖丗主以爲孝而禮之幗髽儀禮䘮服曰女子子在室爲父布緫箭笄髽衰三年緫束髽也調緫者旣束其本又緫其未箭篠也髽露紒也猶男子之括髽以麻則髽上用麻也用麻者自頭交額上却繞紒如若折頭小記曰男子冠而婦人笄男子免而婦人髽但言衰不言裳者婦人不雖裳也又曰女子子之適人者爲其父母婦人爲舅姑惡笄有首以髽卒哭子折笄首以笄布緫傳曰笄有首者惡笄之有首也惡笄者􅌨笄也折笄首者折吉笄之首也吉笄者象笄也禮記檀弓上曰南宫縚之妻之姑䘮孔子誨之髽曰爾無從從爾爾無扈扈爾誨教也爾汝也縱縱謂太髙扈扈謂太廣爾語又檀弓上曰魯婦人之髽而弔自敗於臺鮐也時家家有䘮髽而相弔去纚而紒曰髽也禮記外傳曰髽者婦人有䘮者髽古人重髽男子吉時皆有縱以韜其髽然後加笄加冠也去纚而髽曰髽魯婦人遭升陘之戰也露髽相弔以代䘮冠也有麻髽女子在室遭父母之䘮用麻合髽以對兄弟括髽時也有布髽齊衰巳下以布束髪也髽者開散之名也旣去有縱髽形葩髽左傳襄公曰臧紇救􅤂侵邾敗於狐駘國人逆䘮者皆髽魯於是乎始髽髽麻髮合結也遭䘮者多故不能備凶服髽而巳廣雅曰幗謂之帺音忌魏氏春秋曰諸葛亮挑司馬宣王戰致巾幗婦人之飭以怒宣王廬周禮天宫宫正曰掌王宫之戒令大䘮則授廬舎辯其親踈貴賤之居鄭玄注曰廬舎堊室也親者貴者居倚廬踈者賤者居堊室儀禮䘮服傳曰䘮服斬衰居倚廬寢苦枕塊馬融曰倚木以爲廬於東墻下西向開北端也禮記雜記曰大夫居廬士居堊室又喪大記曰父母之喪居倚廬不塗寢苫枕􅒘非喪事不言君爲廬宫之大夫士䄠之宫謂圍障旣葬柱楣塗廬不於顯者君大夫士皆宫之不於顯者不塗見面又曰問䘮成壙而歸不敢入處室居於倚廬哀親之在外也白虎通曰父母之䘮倚廬於中門外東墻下户北又曰婦人不居倚廬天子七日諸侯五曰卿大夫三日而成服居門外東壁爲廬王肅䘮服要記曰魯哀公葬父孔子問曰寧設菰廬乎哀公曰菰廬起太伯太伯出奔聞古公崩還赴䘮故作菰廬以彰其尸吾父無太伯之罪何用此爲孝子傳曰王琳汝南上蔡人十歲失父母弟季年七歳兄弟二人哭泣哀聲不絶在冡側作廬不妄岀入餘見孝部重㐫門附儀禮士䘮禮曰重木刋鑿之甸人置重于中庭參分庭一在南夏祝取鬻餘飯盛用二鬲于西牆下幂用䟽布乆之擊用靲懸于重幂用葦席北靣左祍帶用靲賀之結于後祝取銘置于重鄭玄曰重木也懸物也馬曰重木也利斵治之也鑿之爲懸簪孔士重木長三尺也禮記雜記曰重旣虞而埋之就所倚處里之禮記外傳曰重者未葬之前以代主也猶以生事之未忍作木主主以存神也設重於庭懸瓦鬲以養病之米淅之爲沐則煑之爲粥實之重用葦席盖之鬼神依而飲食始死之奠但用但未有黍稷故也黍稷在下之中如生時也殷人作主之後聮其重懸之於廟梁去髙祖之廟親盡則埋之周人將葬重隨柩而朝廟之外柩而埋之於階間而後作主也凶門南史孔琳之議曰凶門栢裝不岀禮典起自末代積習生常遂成舊俗兄人士䘮儀多岀閭里每有此須動十數萬損人財力而義無所取至於寒庶則人思自竭雖復室如懸磬莫不傾産殫財所謂葬之以禮其此之謂乎冝一罷凶門之式王肅䘮服要記曰魯哀公葬父孔子問寧設衰門乎哀公曰衰門起於禹禹治水故表其門閭以紀其功吾父無功何用此焉韋弘與蔡謨牋問凶門曰父在母䘮應立凶門不又問與父别止立凶門愚意猶所疑厭於父故也今於父大門之内别立凶門便爲父一家有二門以名義言之門者父之有也今子復立門豈合聖人之典訓苟不岀於禮其所不曰故以諮白蔡荅曰禮以二瓦器盛始死之祭擊木裏之葦席置於庭中近南名爲重今之凶門是其象也禮旣虞而作主今未有主故以重當主夲爲䘮設非以表其門恐不應以尊卑厭降也禮命士以上父子異宫今卑私之䘮皆别開門亦不知今人如此者皆有凶門不范堅荅凶門問曰簿帳似不出禮文何由行此荅曰凶門非禮禮有縣重於庭以席覆之其形似凶門後岀之於門外表䘮由比俗遂行之耳禮論曰問改葬立凶門否蔡謨荅云改葬若停䘮謂應有凶門死周禮春官大宗伯曰以䘮禮哀死亡禮記曲禮上曰天子曰崩諸侯曰薨大夫曰卒士曰不禄庶人曰死鄭玄注曰山巔壞曰崩薨崩之聲也卒終也不禄不充其禄也死之言澌也精神澌盡也死㓂曰兵異於凡人當饗禄其後也壽考曰卒短折曰不禄老而死從大夫之稱少而死從士之稱也又檀弓下曰孔子過太山側有婦人哭於墓者而哀使子路問之曰子之哭也一似重有憂者而曰然昔者吾舅死於虎吾夫又死焉今吾子又死焉夫子曰何爲不去也曰無苛政夫子曰小子識之苛政猛於虎也又䘮大記曰男子不死於婦人之手婦人不死於男子之手君夫人卒於路寢大夫世婦卒於適寢内子未命死於下室士之妻死於寢左傳定下曰齊侯伐晉敝無存之父將室之辭以與其弟曰此役也不死反必娶於髙國先登求自門出死於霤下又哀上曰簡于廵列曰畢萬匹夫也七戰皆獲有馬百乗死於牖下畢萬晉獻公卿也死於牖下言得壽中羣子勉之死不在宼言有命也又哀下曰太子聞之懼下石乞盂壓敬子路以戈擊之斷纓子路曰君子死冠不免結纓而死孔子聞衛亂曰柴也其來乎由其死矣及哀下曰晉荀瑶帥師圍鄭人浮􅈶魁壘賂之以知政閉其口而死榖梁傳隱公曰髙厚曰崩尊曰崩天子之崩以尊之也其崩之何也以在民上故崩之也春秋說題辭曰天子曰崩崩之爲言殞也諸侯稱薨薨之爲言奄然而亡大夫曰卒精輝終卒卒之爲言絶絶於邦也士曰不禄失其忠也不禄之言削名章也庶人曰死魂魄去心死之爲言精爽窮也白虎通又載爾雅曰崩薨無禄卒殂落殪死也論語里仁曰子曰朝聞道夕死可矣言將至死不聞世之有道又子罕曰子疾病子路使門人爲臣病間曰乆矣哉由之行詐也且予與其死於臣之手也無寧死於二三子之手乎且子縱不得大葬予死於道路乎又先進曰顔淵死子曰噫天喪予天喪予子哭之慟從者曰子慟矣曰有慟乎非夫人之爲慟而誰爲又先進曰季路曰敢問死曰未知生焉知死鬼神及死事難明語之無益故不荅又季氏曰齊景公有馬千駟死之日民無德而稱焉伯夷叔齊餓于首陽之下民到于今稱之五經通義曰崩薨從何王以來乎曰從周何以言之尚書曰放勲乃殂落舜曰陟方乃死武王旣王是以知武王以前未稱崩薨也至成王太平乃制崩薨之著尚書曰翌日乙丑成王崩釋名曰漢以來謂死爲物故言其諸物皆就朽故史記曰秦武王與孟說舉龍文鼎絶臏而死徐廣曰臏或作脉矣又曰范睢說秦昭王曰夫以烏獲任鄙之力荆成孟賁許慎曰荆成勇士也孟賁衛人慶忌夏育之勇焉而死者人之所必不免也後漢書曰馬援謂孟冀曰方今匈奴烏丸尚擾北邊欲自請擊之男兒要當死於邊野以馬革褁屍還葬耳何能卧牀上在兒女子手中耶冀曰諒爲烈士當如此矣後魏書曰張預每羡古人飡玉之法乃採訪藍田躬徃攻掘得若環璧雜器形者大小百餘至而觀之皆光潤可玩預乃椎七十枚爲屑日服食之餘多惠人後乃聞者更求玉於故處皆無所見馮翊公源懷等得其玉琢爲器珮皆鮮明可寳預服延年云有效驗而世事寢食皆不禁節又加之好酒損志及疾篤謂妻子曰服玉若能屏居山林排棄嗜欲或當大得神力而吾酒色不絶自致於死非藥過也然吾尸體必當有異勿使速殯令後人知飡服之妙時七月中旬長安毒熱預停尸四宿而體色不變其妻常氏以玉珠二枚唅之口閉常謂之曰君自云飡玉有神驗何故不受唅也言訖齒啓納珠因嘘屬其口都無穢氣舉斂於棺堅直不傾委死猶有遺玉屑數升囊盛納諸棺中文子曰老子曰聖人同死生愚人亦同死生聖人之同死生知於分理也愚人同死生不知利害所在莊子曰人之生氣也聚則爲生散則爲死又曰夫大塊載我以形勞我以生佚我以老息我以死故善吾生者乃所以善吾死也又曰莊子之楚見空髑髏髐然有形檄以馬捶因而問之曰夫子貪生失理而爲此乎將子有亡國之事鈇鉞之誅而爲此乎於是語卒援髑髏㭠而卧夜半髑髏見夢曰子之談者似辯士諸子所言皆生人之累也死則無此矣子欲聞死之說乎莊子曰然髑髏曰死無君於上無臣於下亦無四時之事縱然以天地爲春秋雖南面王樂不能過也說苑曰齊景公岀而見殣謂晏子曰此何死對曰餧而死公曰噫寡人之無德也亦甚矣晏子曰君之德著而不彰何爲無德景公曰何謂也對曰君之德及後宫與臺榭之玩君之鴈食以菽粟君之宫內自樂延及後宫之族何爲其無德也顧臣有請於君由君之意自樂之心推與百姓同之則何殣之有又曰子貢問孔子人死有知將無知也孔子曰吾欲言死人有知也恐孝子妨生以送死也吾欲言死人無知也恐不孝子孫棄親不葬也賜欲知人死有時將無知也死徐自知之猶未晩也又曰魯哀公問孔子曰有智者壽平對曰然人有三死而非命也者人自取之也夫寢處不時飲食不節勞逸過度者疾共殺之居下位而上干其君嗜酒欲物而求不止者刑共殺之少以犯衆弱以侮強忿怒不量力者兵共殺之此三死者非命也又曰民有五死聖人能去三不能除其二飢渇死者可去也凍寒死者可去也雖五兵死者可去也壽命死者不可去也癕疽死者不可去也三者可去二者不可去論衡曰人之死也猶火之滅也而燿不照人死而智不慧二者不齊論者猶謂死有知惑也又曰王莽之時省五經章句皆爲二十萬博士弟子郭略夜定舊說死於燭下精思不任脉絶氣滅也楊泉物理論曰人含氣而生精盡而死猶澌也滅也譬如火焉薪盡而火滅則無光矣故滅火之餘無遺炎矣人死之後無遺魂矣太平御覧卷第五百四十八
