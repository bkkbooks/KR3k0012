front:
  text: 太平御覽卷第五十六
  hash: sha256:efc3b0cbc001a7f50ac01d9081f6d242d22dbbc7895dbf6ab72fa6d2a895ec91
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_056-1a}
body:
  text: 地部二十一陸京阿峴隴堆墟培塿陸釋名曰髙平曰陸陸漉也川流漉而去也說文曰陸髙平地也周易曰鴻漸于陸夫征不復婦孕不育㓙利禦寇王弼曰陸髙之頂也進而之陸與四相得不能復反者也又曰莧陸夬夬中行無咎易坤靈圖曰聖人受命瑞應先於河瑞應之至聖人殺龍龍不可殺皆感氣也君子得衆人之助瑞應先見於陸瑞應之至君子殺虵虵不如龍陸不如河焦贑易林曰山没丘浮陸爲水魚燕雀無巢民無室廬又曰鳬池水廉髙陸爲海江河橫流魚鱉成市尚書曰恒衛旣從大陸旣作孔安國曰二水巳治從其故道大陸之地巳可耕作也毛詩曰考盤在陸碩人之軸又曰鴻飛遵陸公歸不復於女信宿毛萇曰陸非鴻所冝處也周禮曰作車以行陸作舟以行水此皆聖人之作樂動聲儀曰土肥饒原陸隘狹斯生奢侈之俗也漢書曰禹陸行載車又曰秦地有鄠杜竹林號曰陸海又曰鄒陽奏書呉王曰髙皇帝水攻則章邯以亡其城陸擊則荆王以失其地魏名臣奏曰執金吾龐延秦其山居林澤有火耕畬種而平地平陸雖有往古耒耜區種之法就其収者適可䟽食不足實食也關令内傳曰關令尹喜生時其家堂陸地自生蓮華光色鮮盛文子曰却走馬以糞車軌不接於逺方之外是謂坐馳陸汎老子曰蓋聞善攝生者河上公曰攝養也陸行不遇兕虎自然逺避害不干也入軍不𬒳甲兵莊子曰泉涸魚相與處陸相煦以濕相濡以洙不若相忘于江湖王充論衡曰夫知古不知今謂之陸沉然則儒生所謂陸沉者也應劭風俗通曰荆鱉令死亡隨水上荆人求之不得也鱉令至岷山下邑起見蜀望帝使鱉令鑿巠山然後蜀得陸處望帝自以德不如以國禪與鱉令爲蜀王號曰開明傳傳子曰堯遭洪水而貴陸湯大旱而重水又曰陸田命懸於天人力雖脩苟水旱不時則一年之功棄矣六韜曰天下之人陸沉於殷乆矣傳咸扇賦曰水不䇿驥陸不乗舟世無爲而爼豆設時有虞而干戈脩夏侯湛春可樂曰春可樂兮樂崇陸之可娱登夷岡以逈眺兮超矯駕乎山嵎又秋可哀曰秋可哀兮哀南畒之菜荒旣採蕭於大陸兮又刈蘭乎崇岡又梁田賦曰嬉于夷寕之廣陸歩于大野之長京察田疇之疆畔兮觀遊雉之逸形京說文曰京人所爲絶髙丘也毛詩曰升彼墟矣以望楚矣望楚與堂景山與京毛萇曰京髙丘也又曰曽孫之稼如茨如梁曽孫之庾如玹如京又曰依其在京侵自阮疆陟彼髙岡無矢我陵爾雅曰丘之髙絶者曰京張揖廣雅曰四起曰京應劭風俗通曰京謂非人力所能成天地性自然也京師義亦取此阿說文曰大陵曰阿一曰阿曲阜也毛詩曰無矢我陵我陵我阿無飲我泉我泉我池鄭玄曰文王侵阮國阮之兵無敢當其陵及阿又無敢飲於泉及池者也又曰有卷者阿飃風自南毛萇曰惡人𬒳化而消猶飃風之入曲阿也愷悌君子來游來歌以矢其音又曰誰謂爾無羊三百維群誰謂爾無牛九十其犉或降于阿或飲于池又曰陟彼中阿言採其䖟又曰考盤在阿碩人之薖又曰菁菁者莪在彼中阿又曰綿蠻黃鳥止于丘阿張揖廣雅曰曲陵曰阿史記曰黃帝披山通道而邑于涿鹿之阿帝王丗紀曰蚩尤氏強與榆岡爭王於涿鹿之阿穆天子傳曰天子西征升于九阿郭璞曰今新安縣十里九坂也嵆康聖賢髙士傳讃曰許由養神宅于箕阿德眞體全擇日登遐樂資春秋後傳曰阿旁宫未成成更欲擇令名名之作宫阿旁故天下謂之阿旁宫漢武内傳曰西王母命侍女歌云仰上升絳庭下遊日窟阿頋盻八落外逺指九空遐董覽呉地志曰曲阿秦時名雲陽太史云東南有天子氣在雲陽之間故鑿北岡令曲而阿因名曲阿桓寛鹽鐵論曰晉有河華九阿而奪於六卿齊有㤗山巨海而脅於田常孫楚王驃騎誄曰逍遥芒阿闔門下帷研精六藝採頥鈎微湛方生詩曰發鞌踞平陸秣馬青山阿濁酒炙枯魚鼎食何必過袁宏採菊詩曰息足廻阿圎坐長林披榛即澗藉草依隂酈炎詩曰靈芝生河洲動揺困洪波秋蘭榮河晚嚴霜瘁其柯哀哉二芳草不殖太山阿摰虞遷宅誥曰惟大始三年九月上旬渉自洛川周于原阿乃卜昌水東黃水西背山靣隰惟此良陸機逸民賦曰相荒土而卜居兮度山阿而考室又緩齊歌行曰遨仙聚靈族髙讌曽城阿長風萬里舉慶雲欝嵯峨峴從征記曰青峴沙峴一名小峴木多櫨杏續述征記曰莵頭峴雖無峭嶮然連林脩坂數十里中行者固亦宻勿矣伏琛齊地記曰萊蕪谷有銅冶峴古鑄銅處朱虚城西有山峴逺而峻今名半車峴白淵之齊道記曰黃丘北十里有鸑鷟峴下帶長澗東北流經牛山山去此水八十餘里今號曰牛頭水是齊景公所登而歎處劉楨京口記曰去城九里有白在峴江乗地記曰城東四十五里竹里山王途所經途甚傾嶮行者號爲飜車峴也武昌記曰城東南有金牛崗崗西有石鼔峴上有三石鼔鼔鳴天必雨隴方言曰秦晉之間冢謂之隴說文曰隴天水天坂也廣志曰泳沙在玉門關外東西數百里有三断名曰三隴也三秦記曰隴西開其坂九廽不知髙幾里欲上者七日乃越髙處可容百餘家下處數十萬户上有清水四注俗歌曰隴頭流水鳴聲幽咽遥望秦川心肝断絶去長安千里望秦川如帶又關中人上隴者還望故郷悲思而歌則有絶死者秦州記曰隴西郡東一百六十里得隴山南北亘接不知逺近東西廣百八十里其髙處可三四里登此嶺東望秦川四五百里極目茫然墟宇桒梓與雲霞一色東人西役升此而頋瞻者無不悲思其上懸巖吐霤於嶺中淵停名曰萬石淵溢流散下皆注於渭故北人升此而歌始興記曰盧水合武水甚險名曰新隴有太守周昕廟即始開此隴者行者放雞散米以祈福而忌着濕衣入廟堆爾雅郭璞注曰江東呼地髙堆者爲敦說文曰阜小阜也又曰巴蜀山岸脅之堆傍欲落者曰坁坁崩聲聞數百里漢書曰楊雄上書曰往者圖西域豈爲康居烏孫踰白堆而寇西邊哉乃以制匈奴也堆形如土龍無頭尾髙者二三丈水經注曰緱氏山仙者昇焉言王子晉控鶴斯阜靈王望而不得近舉手謝而去其處得遺屣焉俗謂爲父堆又曰凾關直北隔河有層阜巍然獨秀孤峙河陽世謂之風陵戴延之所謂風埏者也又曰瞿堆南絶壁峭峙孤嶮雲髙望之形若覆唾壷髙二十餘里羊腸蟠道三十六廻開山圖謂之仇夷所謂積石嵯峨嶔岑隱阿者也上有平田百頃煑土成塩因以百頃爲號山上豊水泉所謂清泉湧沸潤氣上流者也漢武帝元狩六年開以爲武都郡天地大澤在西故以都爲目矣長安圖曰髙望堆在延興門南八里潘岳西征賦曰慿髙望之陽隈梁州記曰南鄭城泝漢上五十里水邊有漢武堆漢武嘗遊此以爲鈎臺後人覩其崇基謂之漢武堆述異記曰當陽縣南有龍川鳯川云漢帝時八龍五鳯常遊於此亦呼爲五鳯堆安定圖經曰振履堆者故老云夸父逐日振履於此故名之墟說文曰墟大丘也崐崘謂之㠊史記曰成王伐管蔡以殷餘人封康叔爲衛君居故啇墟漢書曰元城郭東有五鹿之墟即沙麓之地也越絶書曰千里墟者闔廬以鑄干將劒處又曰呉門外鷄坡墟故呉王所畜鷄處也新序曰齊桓公出見遺墟問諸野人野人曰是􅉑之墟公曰􅉑氏何爲亡對曰善不能行惡不能去所以爲墟矣風俗通曰謹案尚書舜生姚墟又曰姚墟在濟隂城陽縣帝顓頊之墟閼伯之墟是也培塿說文曰附婁小土山也左傳曰培塿無松栢方言曰冢秦晉之間謂之培塿墨子曰培塿之沉則生松栢民衣焉食焉家焉死焉地終不責德故以爲仁風俗通曰培塿者即阜之類也今齊魯之間田中小髙者名之爲培塿矣太平御覽卷第五十六
