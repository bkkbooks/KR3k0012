body:
  text: 皇王部三十四唐太宗文皇帝唐書曰太宗文皇帝諱世民髙祖第二子也母曰太穆順聖皇后竇氏隋開皇十八年十二月戊午生於武功之別舘時有二龍戯於館門之外三日而去髙祖之臨𡵨州太宗時年四歳有書生自言善相謁髙祖曰公貴人也且有貴子因見太宗曰龍鳯之姿天日之表年將二十必能濟世安民矣髙祖懼其言大將殺之忽失所在隂採濟世安民之義以爲名焉太宗㓜聦叡玄鑒深逺臨機果斷不拘小節時人莫能測也大業末煬帝於鴈門爲突厥所圍太宗應募救援隷屯衛將軍雲定興營將行謂定興曰必賫旗鼓以設疑兵且始畢可汗舉國之師敢圍天子必以國家倉卒無援我張軍容令數十里幡旗相續夜則鉦鼓相應虜必謂救兵雲集望塵而遁矣不然彼衆我寡悉軍來戰必不能支矣定興從之師次崞音郭縣突厥候騎馳告始畢曰王師大至由是解圍而遁及髙祖之守太原太宗時年十八有髙陽賊帥魏刀兒自號歴山飛來攻太原髙祖擊之深入賊陣太宗輕騎突圍而進射之所向皆披靡拔髙祖於萬衆之中適㑹歩兵至髙祖與太宗又奮擊大破之時隋祚巳終太宗潜圖義舉每折節下士推財養客及義兵起乃率兵略徇西河尅之拜右領大都督右三軍皆隷焉封燉煌郡公大軍西上賈胡堡音保隋將宋老生率精兵二萬屯霍邑以拒義師㑹乆雨糧盡髙祖與裴寂議且還太原以圖後舉太宗曰本興大義以救蒼生當湏先入咸陽號令天下遇小敵即班師將恐從義之徒一朝解體還守太原一城之地以爲賊耳何以自全髙祖不納促令引發太宗遂號泣於外聲聞帳中髙祖召問其故對曰今兵以義動戰則必尅退還則必散衆散於前敵乗於後死亡湏臾而至是以悲耳髙祖乃悟而止八月已夘雨霽髙祖引師趣霍邑太宗恐老生不出戰乃將數騎先詣其城下舉鞭指麾若將圍城者以激怒之老生果怒開門出兵背城而陣髙祖與建成合陣於城東太宗及柴紹陣於城南老生麾兵疾進先薄髙祖而建成墜馬老生乗之髙祖與建成軍咸却太宗自南原率二騎馳下峻坂衝斷其軍引兵奮擊賊衆大敗各捨仗而走懸門發老生引繩欲上遂斬之平霍邑至河東關中豪傑争走赴義太宗請進師入關取永豐倉以賑窮乏収群盗以圖京師髙祖稱善太宗以前軍濟河先定㴘北三輔吏民及諸豪猾詣軍門請自効者日以千計扶老携㓜滿於麾下收納英俊以備僚列逺近聞者咸自託焉師次于涇陽勝兵九萬破胡賊劉鷂子以并其衆留殷開山劉弘基屯長安故城太宗自趣司竹賊帥李仲文何潘仁向善志等皆來㑹頓于阿城獲兵十三萬長安父老賫牛酒詣旌門者不可勝紀勞而遣之一無所受軍令嚴肅秋毫無所犯尋與大軍平京城髙祖輔政授唐國内史改封秦國公㑹薛舉以勁卒萬人來逼渭濵太宗親擊之大破其衆追斬萬餘級略地至于隴坻義寧元年十二月復爲右元帥揔兵十萬徇東都及將旋謂左右曰賊見吾還必相追躡設三伏以待之俄而隋將叚逹率萬餘人自後而至度三王陵發伏擊之叚逹大敗追奔至于城下因於冝陽新安置熊糓二州戍之而還徙封趙國公髙祖受禪拜尚書令右武侯大將軍進封秦王加授雍州牧三年七月揔率諸將攻王世充於洛邑師次榖州世充率精兵三萬陣於慈澗太宗以輕騎挑之時衆寡不敵䧟於重圍左右咸懼太宗命左右先歸獨留後殿世充驍將單雄信數百騎夾道來逼交搶競進太宗幾爲所敗太宗左右射之無不應弦而倒獲其大將燕頎世充乃拔慈澗之鎮歸于東都太宗遣行軍揔管史萬寳自冝陽南據龍門劉德威自太行東圍河内王君廓自洛口斷賊糧道又遣黄君漢夜從孝永河中下舟師襲廻洛城尅之黄河巳南莫不響應城堡相次來降大軍進屯邙山九月太宗以五百騎先觀戰地卒與世充萬餘人相遇㑹戰復破之斬首三千餘級獲大將陳智略世充僅以身免其揔管楊慶遣使請降遣李世勣率師出轘轅道安撫其衆榮汴洧豫九州相繼來降世充遂求救於竇建德四年二月又進屯青城宫營壘未立世充率衆二萬自方諸門臨榖水而陣太宗以精騎陣於北邙山令屈突通率歩卒五千渡水以擊之因誡通曰待兵交即放煙吾當率騎軍南下兵纔接太宗以騎衝之挺身先進與通表裏相應賊衆殊死戰散而復合者數焉自辰及午賊衆始退縱兵乗之俘斬八千人於是進營城下世充不敢復出但嬰城自守以待建德之援建德以兵十餘萬來援世充至于酸棗蕭瑀音禹屈突通封德彛皆以腹背受敵恐非萬全請退師榖州以觀之太宗曰世充糧盡内外離心我當不勞攻擊坐收其弊建德新破孟海公將驕卒惰吾當進據武牢扼其襟要賊若冒險與我爭鋒破之必矣如其不戰旬月間世充當自潰若不速進賊入武牢諸城新附必不能守二賊併力將若之何通又請解圍就險以就其變太宗不許於是留通輔齊王元吉以圍世充親率歩騎三千五百人趣武牢建德自滎陽西上築壘於板渚太宗屯武牢相持二十餘日謀者曰建德伺官軍芻盡俟牧馬於河北因將襲武牢太宗知其謀遂牧馬於河北以誘之詰朝建德果悉衆而至陳兵汜水世充將郭士衡陣於其南綿亘數里鼓譟諸將大懼太宗將數騎升髙丘以望之謂諸將曰賊起山東未見大敵今度險而囂是無政令逼城而陣有輕我心我按兵不出彼廼氣衰陣乆卒饑必將自退追而擊之無往不尅吾與公等約必以午時後破之建德列陣自辰至午兵士饑倦皆坐列又争飲水逡廵欲退太宗曰可撃親率輕騎誘之衆繼至建德廻師而陣未及整列太宗先登擊之所向皆靡俄而衆軍合戰囂塵四起太宗率史大奈程䶧金秦叔寳宇文歆等纏幡而入直突出其陣後張我旗幟賊顧見之大潰追奔三十里生擒建徳於陣太宗數之曰我以于戈問罪本在王世充得失存亡不預汝事何故越境犯我兵鋒建德股慄而言曰今若不來恐勞逺取乃將建德至東都城下世充懼率其官屬二千餘人詣軍門請降山東悉平太宗入據宫城令蕭瑀竇䡄等封守府庫一無所取令記室房玄齡收隋圖籍於是誅其同惡叚逹等五十餘人大饗將士班賜有差髙祖令尚書左僕射裴寂勞於軍中六月凱旋大宗親𬒳金甲鐵馬一萬騎甲士三萬人前後部鼓吹俘二僞主及隋氏器物輦輅獻于太廟髙祖大恱行飲至禮以享焉髙祖以自古舊官不稱殊功乃別表徽號用旌勲德十月加號大䇿上將軍陜東道大行臺位在王公上増邑二萬户通前三萬户賜金輅一乗衮冕之服玉壁一雙黄金六千斤前後部鼓吹及九部之樂班劒四十人于時海内漸平太宗乃銳意經籍開文學館以待四方之士行臺司勲郎中杜如晦等十有八人爲學士每更直閣下降以温顔與之討論經義或夜分而罷八年加中書令九年皇太子建成齊王元吉謀害太宗六月四日太宗率長孫無忌尉遲敬德房玄齡杜如晦等於玄武門誅之甲子立爲皇太子庻政皆斷决八月癸亥髙祖傳位於皇太子太宗即位于東宫顯德殿遣司空裴寂柴告于南郊大赦天下癸酉放掖庭宫女三千餘人景子立妃長孫氏爲皇后巳夘突厥㓂髙陵辛巳行軍揔管尉遲敬德與突厥戰於涇陽大破之斬首千餘級癸未突厥頡利至于渭水便橋之北遣其酋帥執失思力入朝爲覘自張形勢太宗命囚之親出玄武門馳六騎幸渭水之上與頡利隔津而語責以負約俄而衆軍繼至頡利見軍容旣盛又知思力就拘由是大懼遂請和詔許焉即日還宫乙酉又幸便橋與頡利刑白馬設盟突厥引退九月景戍頡利獻馬三千疋羊萬口帝不受令頡利歸所掠中國户口丁未引諸軍衛騎兵統將等習射于顯德殿庭謂將軍以下曰自古突厥與中國更有盛衰若軒轅善用五兵即能北逐獯鬻周宣驅馳方邵亦能制勝太原至漢晉之君逮于隋代不使兵士素習干戈突厥來侵莫能抗禦致遣中國生民塗炭於㓂手我今不使汝等穿池築苑造諸淫費農民恣令逸樂兵士唯習弓馬庻使汝鬪戰亦望汝前無撗敵於是每日引數百人於殿前教射帝親自臨試射中者隨賞弓刀布帛自是後士卒皆爲精銳十月癸亥立中山王承乾爲皇太子貞觀元年春正月乙酉改元三月癸已皇后親蚕十二月壬午上謂侍臣曰神仙事本虚妄空有其名秦始皇非分愛好遂爲方士所詐乃遣童男女數千人隨其入海求仙藥方士避秦苛虐因留不歸始皇猶海側以待之還至沙丘而死漢武帝爲求仙乃將女嫁道術人旣無驗便行誅戮旣此二事神仙不煩妄求也二年春二月景戍靺羯上音末下音曷内屬三月丁夘遣御史大夫杜淹廵関内諸州出御府金寳贖男女自賣者還其父母庚午大赦天下夏四月巳夘詔骸骨暴露者令所在埋瘞景申契丹内屬𥘉詔天下州縣並置義倉六月庚寅皇子治生三年春正月辛亥契丹渠帥來朝戊午謁太廟癸亥親耕籍田四月辛巳太上皇徙居太安宫甲子太宗始於太極殿聽政六月戊寅以旱親録囚徒遣長孫無忌房玄齡等祈雨於名山大川中書舎人杜正倫等往関内諸州慰撫又令文武百官各上封事極言得失是歳户部奏言中國人自塞外來歸及突厥前後内附開西夷爲州縣者男女一百二十餘萬口四年春正月乙亥李靖大破突厥獲隋皇后蕭氏及煬帝之孫正道送之京師二月癸亥幸温湯甲辰李靖又破突厥于隂山頡利可汗輕騎逺遁甲寅大赦賜酺五月三日庚辰大同道行軍副揔管張寳相生擒頡利可汗獻于京師甲午以俘頡利告於太廟夏四月御順天門軍吏執頡利以獻捷自是西北諸蕃咸請上尊號爲天可汗於是降璽書冊命其君長則兼稱之九月庚午令收瘞長城之南骸骨仍令致祭壬午令自古明王聖帝賢臣烈士墳墓無得蒭牧春秋致祭冬十月壬辰幸隴州曲赦𡵨隴二州給復一年十日校獵於貴泉谷十三日校獵於魚龍川自射鹿獻於太安宫甲子至自隴州戊寅制决罪人不得鞭背以明堂孔穴針炙所失髙昌王麴文㤗來朝是歳斷死刑二十九人㡬致刑措山東至于海河南至于嶺皆外户不閉行旅不賫糧焉六年十二月辛未親録囚徒歸死罪者二百九十人于家令明年秋末就刑其後應期畢至詔悉原之是歳党項諸羗前後内屬三十萬口八年二月乙巳皇太子加元服景午賜天下酺三日三月庚辰幸九成宫五月丁丑上𥘉服翼善冠貴臣服進德冠九年五月太上皇崩于太安宮七月甲寅増修太廟爲六室冬十月庚寅葬髙祖於獻陵十三年春正月乙巳朔謁獻陵曲赦三原縣及行從大辟罪四月戊寅幸九成宫甲申阿史郍結社爾犯御營伏誅壬寅雲陽石燃者方丈晝如灰夜則有光投草木於上則焚歴年而止十二月壬辰狩于咸陽是歳滁州言野蚕食檞音解葉成繭大如柰其色緑凢收六千五百七十石髙麗新羅西突厥吐火羅康國安國波斯棘勒于闐焉耆髙昌林邑昆明及荒服蠻酋相次遣使朝貢十五年詔以來年二月有事太山所司詳定儀制五月壬申并州僧道及老人等抗表以太原王業所因明年登封巳後願特臨幸上於武成殿賜宴因從容謂侍臣曰朕少在太原喜羣聚博戯暑往寒逝將三十年矣時㑹中有舊識上者相與道舊以爲笑樂因謂之曰他人之言或有靣䛕公等朕之故人實以告朕即日政教於百姓何如人間得無疾苦耶皆奏即日四海太平百姓歡樂陛下力也臣等餘年日惜一日但眷戀聖化不知疾苦因固請過并州上謂曰飛鳥過故郷猶躑躅徘徊况朕於太原起義兵定天下復少小遊觀誠所不忘岱禮若畢或兾與公等相見於是賜物各有差六月戊申詔天下諸州舉學綜古今及孝悌淳篤文章秀異者並以來年二月揔集㤗山巳酉有星孛于太微犯郎位景辰停封㤗山避正殿以思咎命尚食减膳秋七月甲戍孛星滅十六年冬十一月景辰狩于岐山辛酉使祭隋文帝陵丁夘宴武功士女於慶善宫南門酒酣上與父老等涕泣論舊事老人等遞起爲舞争上千萬歳壽上各盡一柸庚午至自岐州十二月癸夘幸温湯甲辰狩于驪山時隂寒晦冥圍兵斷絶上乗髙望見之欲捨其罰恐虧軍令乃廻鑾轡入谷以避之十七年正月戊申詔圖畫司徒趙國公無忌等勲臣二十四人於凌煙閣三月丁巳熒惑守心前星十九日而退夏四月皇太子承乾有罪廢爲庻人景戍立晉王治爲皇太子大赦賜酺三日巳丑加司徒長孫無忌太子太師司空房玄齡太子太傅特進蕭瑀太子太保兵部尚書李勣爲太子詹事仍同中書門下三品庚寅上親謁太廟以謝承乾之過五月乙丑手詔舉孝廉茂才異能之士十八年十一月命太子詹事英國公李勣爲遼東道行軍揔管出栁城禮部尚書江夏郡王道宗副之刑部尚書鄖國公張亮爲平壤道行軍揔管以舟師出萊州左領軍常何瀘州都督左難當副之發天下甲士召募十萬並趣平壤以伐髙麗十九年春二月庚戍上親統六軍發洛陽乙夘詔皇太子留定州監國髙士廉攝太子太傳與侍中劉洎中書令馬周太子少詹事張行成太子右庻子髙季輔五人同掌機務以吏部尚書安德郡公楊師道爲中書令贈殷比干爲太師謚曰忠烈命所司封墓葺祠堂春秋祀以少牢上自爲文以祭之三月壬辰上發定州以司徒長孫無忌中書令岑文本楊師道從夏四月癸夘誓師於幽州城南大饗六軍以遣之癸亥李丗勣攻盖牟城破之五月丁丑車駕渡遼東甲申上親率鐵騎與丗勣㑹圍遼東城因烈風發火弩斯湏城上屋及樓皆盡麾戰士令登乃拔之六月景辰師次安市城丁巳髙麗別將髙延壽髙恵真帥兵十五萬來援安市以拒王師李丗勣率兵奮擊上自髙峯引軍臨之髙麗大潰殺獲不可勝紀延壽等以其衆降因名所幸爲駐蹕山刻石紀功焉賜天下大酺二日秋七月李世勣進軍攻安市城至九月不尅乃班師冬十月景辰入臨渝關皇太子自定州迎謁戊午次漢武臺刻石以紀功德十一月幸幽州癸酉大饗還師十二月幸并州二十年春正月上在并州遣大理卿孫伏伽黄門侍郎禇遂良等二十二人以六條廵察四方黜陟官吏庚辰曲赦并州宴從官及起義元從賜帛給復有差三月車駕至京師六月遣兵部尚書固安公崔敦禮特進英國公李世勣擊破薛延陁於鬱督山北前後斬首五千餘級虜男女三萬餘人二十一年正月詔以來年二月有事泰山甲寅賜京師酺三日八月詔以河北大水停封禪辛未骨利幹國遣使貢名馬二十三年三月辛酉大赦丁夘太宗以不䂊勑皇太子於金液門聽政是月日赤無光夏四月巳亥幸翠微宫五月巳巳上疾甚令草遺詔有頃崩於含風殿年五十二遺詔於皇太子即位於柩前䘮紀冝依漢制祕不發䘮庚午遣舊將統飛騎勁兵從皇太子先還京發六府甲士四千人分列於道及安化門翼從乃入大行與從官侍御如常壬申發䘮六月甲戍殯于太極殿謚曰文皇帝廟號太宗葬昭陵上元元年改上尊號曰文武聖皇帝天寳十二載改上尊號爲文武大聖大廣孝皇帝太平御覽卷第一百九
