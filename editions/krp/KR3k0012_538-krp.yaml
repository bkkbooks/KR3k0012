front:
  text: 太平御覽卷第五百三十八
  hash: sha256:f8a497970d90a0f050b960137e7ecdc5bafc777caf4d062d6ac5d4513f6599a0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_538-1a}
body:
  text: 禮儀部十七朝聘尚書周官曰六年五服一朝五服侯甸男来衛六年一朝㑹京師又六年王乃時廵考制度于四嶽諸侯各朝于方嶽大明黜陟毛詩小雅曰采菽刺幽王也侮慢諸侯諸侯來朝不能錫命以禮數徴㑹之而無信義君子見微而思古焉幽王徴㑹諸侯爲合義兵征討有罪旣徃而無之是於義事不信也君子見其此知其後必見攻伐將無救也采菽采菽筐之筥之興也菽所以芼大牢而待君子也羊則苦豕則薇箋云菽大豆也采之者采其葉以爲藿三牲牛羊豕芼以藿王饗賔客有牛俎乃用羮故使采之君子來朝何錫予之雖無予之路車乗馬君子謂諸侯也箋云賜諸侯以車馬言雖無予之尚以爲薄也周禮天官上宰夫曰宰夫之職掌朝覲㑹同賔客以牢禮之法掌其牢禮與其陳數又春官上宗伯曰春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰㑹殷見曰同此六禮者諸侯見王爲文也六服之内四方以時分来或朝春或宗夏或覲秋或遇冬者殊禮異更逓而折朝猶朝也欲其來之早也宗尊也欲其尊王也覲之言勤也欲其勤王之事也遇猶偶也欲其若不期而俱至也時見者無常期也諸侯有不順服者王將以征討之事則旣朝覲王爲壇於囯外合諸侯有而命焉春秋傳曰有事而㑹不恊而鹽是也殷猶衆也十二歳王如不廵狩則六服盡朝朝礼旣畢王亦爲壇命諸侯以命改焉所命之政如王廵狩殷見四方四時分來終歳則徧矣時聘曰問殷覜曰視時聘者亦無常期天子有事乃聘之焉境外之臣旣非朝歳不敢爲小禮殷覜謂一服朝之歳以朝者少諸侯乃使卿以大禮衆聘焉一服朝在元年七年十一月終也又秋官下大行人曰大行人掌大賔之禮大客之儀以親諸侯大賔要服以内諸侯也大客謂其孤卿也春朝諸侯而圖天下之事秋覲以比邦國之功夏宗以陳天下之謨冬遇以恊諸侯之慮時㑹以發四方之禁殷同以施天下之政此六事者以王見諸侯爲文時聘以結諸侯之好殷覜以除邦國之慝此二事者亦以王見諸侯之使來者時爲文間問以諭諸侯之志歸脤以交諸侯之福賀慶以賛諸侯之喜致禬以𥙷諸侯之烖此四者主使臣於諸侯之禮也間問者間歳一問諸侯謂存省之屬也諸侯之志者言語諭書名其類也交或徃或來者也賛助也致禬凶禮之吊禮禬禮也𥙷諸侯栽者若春秋澶淵之㑹謀歸宋財凡太國之孤執皮帛以継小國之君凡諸侯之卿其禮各下其君二等以下及其大夫士皆如之九州之外謂之蕃國丗壹見各以其所貴寳爲贄九州之外夷服鎮服藩服也凡諸侯之拜交歳相問也殷相聘也丗相朝也小聘曰問殷中也乆無事又於殷朝者及而相聘也儀禮覲禮曰諸侯覲天子爲宮方三百歩四門壇十有二尋深四尺上介皆奉其君之旂置於宫尚左公侯伯子男皆就其旂而立禮記曲禮曰天子當依而立諸侯北面而見天子曰覲天子當宁而立諸公東面諸侯西面曰朝諸侯春見曰朝受摯於朝受享於廟生氣文也秋見日覲一受之於廟殺氣質也朝者位於内朝而序進覲者位於廟門外而序入王南面立於依宁而受焉夏宗依春冬遇依秋春秋時齊侯言魯昭公以遇禮相見取易略也覲禮今存朝野宗遇禮今亡諸侯未及期相見曰遇相見於卻地曰㑹諸侯使大夫問於諸侯曰聘又王制曰諸侯之於天子也比年一小聘三年一大聘五年一朝北年每歳也小聘使大夫大聘使卿朝則君自行天子無事與諸侯相見曰朝事謂征伐又中庸曰繼絶丗舉廢國治亂持危朝聘以時厚徃而薄來所以懷諸侯也又經解曰聘覲之禮廢則君臣之位失諸侯之行惡而背畔侵陵之敗起矣又聘義曰聘禮上公七介侯伯五介子男三介所以明貴賤也此皆使卿出聘之介數也介紹而傳命君子於其所尊質敬之至也故天子制諸侯比年小聘三年大聘相厲以禮使者聘而設主君弗親饗食也所以愧厲之也諸侯相厲以禮則外不相侵内不相陵此天子之所以養諸侯兵不用而諸侯自爲正之具也比年小聘所謂歳相問也三年大聘所謂殷相聘也左傳隠公曰十一年滕侯薛侯來朝爭長薛侯曰我先封滕侯曰我周之卜正薛庶姓也我不可以後之公使羽父請於薛侯曰周之宗盟異姓爲後寡人若朝于薛不敢與諸任齒乃長滕侯又莊公曰􅉑公晋侯朝王王饗醴命之宥玉之覲群后始則行饗禮先置醋酒示不忘古飲宴則以幣物宥助也所以助歡敬之意言備誤也皆賜玉五㲄馬三匹非禮也雙玉爲瑴王命諸侯名位不同禮亦異數不以禮假人又莊公曰夫禮所以整民也故㑹以訓上下之則制財用之節朝以正班爵之義帥長㓜之序又文上曰穆伯如齊始聘焉禮也穆伯公孫教也凡君即位卿出並聘踐脩舊好要結外援踐猶子履行女事隣國以衛社稷忠信卑讓之道也忠德之正也信德之固也卑讓德之基也又宣公上曰晉靈公不君賈逹曰不君無君道也趙宣子驟諌公患之使鉏麑賊之晨徃寢門闢矣盛服將朝尚早坐而假寐麑退歎曰不忘恭敬民之主也賊民之主不忠弃君之命不信有一於此不如死矣觸槐而死又宣公曰孟獻子曰臣聞小國之免於大國也聘而獻物於是乎有庭實旅百朝而獻功於是乎有容貌采章嘉淑而有嘉貨獻其理國若征伐之功於牧伯又襄公曰晉侯使韓宣子聘于周王使請事對曰晉士起將歸時事於旅無他事矣王聞之曰韓氏其昌阜於晉乎辭不失舊又曰襄二十二年晉人徴朝于鄭召鄭使朝鄭人使少正公孫僑對曰在晉先君悼公九年我寡君於是即位即位八月而我先大夫子駟從寡君以朝于執事執事不禮於寡君言朝執事謙不敢斥晉侯寡君懼因是行也我二年六月朝于楚因朝晉不見禮生朝楚心晉是以有戯之伇楚人猶一􅔡而申禮於敝邑敝邑欲從執事而懼爲大尤曰晉其謂我不共有禮是以不敢攜貳於楚我四年三月先大夫子蟜又從寡君以觀釁於楚晉於是乎有蕭魚之伇謂我敝邑邇在晉國譬諸草木吾臭味也而何敢差池以大國政令之無常國家罷病不虞荐至無日不惕豈敢忘職大國若安定之其朝夕在庭何辱命焉又昭二曰康有酆宫之朝鄷在始平折縣東有靈臺康王於是朝諸侯又昭四曰明王之制使諸侯歳聘以志業志職也歳聘以脩其職業間朝以講禮三年而一朝正班爵之義率長㓜之序再朝而㑹以示威六年而一㑹以訓上下之則制財用之節再㑹而盟以顯昭明十二年而一盟所以昭信義也凡八聘四朝再㑹王一巡狩盟于方嶽之下志業於好講禮於等示威於衆昭明於神春秋說題辭曰朝者不占而到諸侯秉政尊卑有序各來朝講文德明禮讓天下法制四方受度㑹者所以興德明義考遺廢於天下史記曰子貢結駟連騎束帛之幣以聘享諸侯所至國君無不郊迎與抗禮者漢書武紀曰元年春正月朝諸侯王於甘泉宫又曰宣帝甘露二年呼韓邪單于𣢾五原塞願奉國珎朝三年春呼韓邪單于朝天子于甘泉宫漢寵以殊禮位諸侯王上賛謁稱藩臣而不名賜以璽綬冠帶衣裳使有司導單于先行就邸長安宿長平上自甘泉宿池陽宫上登長平阪詔單于母謁及諸夷蠻君長王侯迎者數萬人夾道陳上登渭橋咸稱萬歳後漢書曰竇融將朝㑹於髙平先遣從事問㑹見儀適是時軍旅代諸將與三公交錯道中或背使者交私語帝聞融先問禮儀甚善之以宣告百僚乃置酒髙㑹引見融等待以殊禮孟子曰諸侯朝天子曰述職一不朝則貶其爵再不朝則削其地三不朝則六師移之白虎通曰所以制朝聘之禮何所以尊君父重孝道也夫臣之制君猶子之事父欲同臣子之恩一統尊君故必朝聘也謂之聘何聘者問也謂之朝何朝者見也因用朝時見故謂之朝又曰言諸侯時朝於天子朝用何月皆以夏之孟四月因留助祭朝禮柰何諸侯將至京師使人通㑹於天子天子遣大夫迎之百里之郊遣丗子迎五十里之郊矣又曰諸侯以月旦告朔於廟者縁生以事死故國君月朔朝宗廟存神受政又曰諸侯來朝天子親與之合瑞信者正君臣重法度也五經異義曰古春秋五氏說閏以正時時以作事事以厚生生民之夲於是乎在不告閏朔弃時政也弃時政則不知其所行故閏月不以朝者諸侯歲遣大夫之京師受十二月之政還藏於太廟月旦朝廟存神有司因告曰今月當行某政至於閏月藂殘餘分之月無政故不以朝經書閏月猶朝之者是也摯虞决疑要注曰漢制正㑹於建始殿晉制大㑹於太極殿小㑹於東堂其㑹則五時朝服庭設金石虎賁旄頭文衣繡尾廣州記曰尉他所都處築髙臺以朝漢室圎基千歩直峭百丈螺道登進頂上朔望拜號爲朝臺左思呉都賦曰昔夏后氏朝群臣於兹土而執玉帛者萬國盖先王之髙㑹四方之䡄則也太平御覽卷第五百三十八
