front:
  text: 太平御覽卷第三百六十
  hash: sha256:51801f8686abab8d0d551eb8ce45691c51db4b4862c775db2ced6939a3f5ffcb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_360-1a}
body:
  text: 人事部一叙人孕叙人釋名曰人仁也生物也易下繫曰天地氤氲萬物化醇男女搆精萬物化生醇厚也又叙卦曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦又說卦曰立人之道曰仁與義尚書泰誓曰惟天地萬物父母惟人萬物之靈禮記禮運曰何謂人情喜怒哀懼愛惡欲七者弗學而能何謂人義父慈子孝兄良弟悌夫義婦聽長惠㓜順君仁臣忠十者謂之仁義講信脩睦謂之人利争奪相殺謂之人患故聖人所以治人七情脩十義講信脩睦尚辭讓去争奪舎禮何以治之又曰飲食男女人之大欲存焉死亡貧苦人之大惡存焉故欲惡者心之大端也人藏其心不可測度也美惡皆在其心不見其色也欲一以窮之舎禮何以哉故人者其天地之德隂陽之交鬼神之㑹五行之秀氣也故人者天地之心也五行之端也食味別聲𬒳色而生者也此言兼氣性之効也又樂記曰人生而静天之性也感於物而動性之欲也物至知知然後好惡形焉左傳昭二年鄭子産曰人生始化曰魄魄形也旣生魄陽曰魂陽神氣也用物精多則魂魄彊物權勢是以有精爽至于神明爽明也春秋元命苞曰五氣之精交聚相加以迎陽道人致和五氣五行之氣又曰隂陽之性以一起人副天道故生一子又曰天人同度正法相授天垂文象人行其事謂之教教之爲言效也上爲下效道之始也又曰仁者情志好生愛人故其爲仁以人其立字二人爲仁二人言不專於巳念施與也又曰聖人一其德智者循其轍長生乆視一其德言盡得其帝之精氣也循其轍言不違其帝所尚也知是則皆得長生乆視言所行當天也不以命制則愚者悖慢智者無所施其術殘物逆道天不殺故立三命以垂䇿所以尊天一節三者法三道之術不以命制愚慢之人則賢智道術不得施行勢相反命者天之令也所受於帝行正不過得壽命壽命正命也起九九八十一帝天帝也八十一陽氣相乗之極有隨命隨命者隨行爲命也援神契曰隨者逆天道常善之行則隨其暴虐行以教之有遭命遭命者行正不誤逢丗殘賊君上逆亂辜咎下流灾譴並發隂陽散忤暴氣雷至滅曰動地夭絶人命紗鹿襲邑是也忤錯也襲猶淪也河氷淪沙鹿之邑溺殺人也春秋孔演圖曰正氣爲帝間氣爲臣宫商爲姓秀氣爲人正氣謂若木人則得蒼龍之形靈威仰之氣火人得朱鳥之形赤熛怒之氣以生之比也間氣則不苞一行各受一星以生若蕭何感昴精樊噲感狼精周勃感冗精者也又繁露曰唯人獨偶天地人有三百六十節偶天之數形體骨肉偶地之厚上有耳目聦明日月之象也體有空竅理脉川谷之象也心有哀樂喜怒神氣之類故小節三百六十六副日數也大節十二分副月數也内有五藏副行數也外有四胑副時數也乍視乍瞋副晝夜也乍柔乍剛副冬夏也乍哀乍樂副隂陽也樂動聲儀曰中元者人氣也氣以定萬物通於四時者也爾雅曰太平之人仁東至日所出爲太平丹穴之人智距齊州以南戴日爲太穴太蒙之人信西至日所入爲太蒙崆峒之人武孝經曰天地之性人爲貴人之行莫大於孝家語曰魯哀公問於孔子曰人之命與性何謂也孔子對曰分於道謂之命始得爲人也故下句曰命者性之始也形於一謂之性人各受隂陽剛柔之性故形於一化於隂陽象形而發謂之生化窮數盡謂之死故命者性之始也死者生之終也有始則必有終矣人始生而不具者有五焉目無見不能食不能行不能言不能化及生三月而微煦煦晴轉也然後有見八月生齒然後能食朞而生臏然後能行三年顋合然後能言十有六而精通然後能化隂窮反陽故隂以陽變陽窮反隂故陽以隂化是以男子八月生齒八歳而齓十有六而化女子七月生齒七歳而齓十有四而化一隂一陽竒偶相配陽數竒陰數偶然後道合化成性命之端形於此也又曰堅土之人剛弱土之人柔墟土之人大沙土之人細息土之人美㘪土之人醜㘪耗字也息土細緻㘪土麄䟽者也倮蟲三百六十而人爲之長又曰孔子遊太山見營啓期鹿裘帶索皷琴而歌孔子問曰先生所以爲樂者何也對曰吾樂甚多天生萬物唯人爲貴而吾得爲人是以一樂男尊女卑吾得爲男是二樂人生有不見日月不免繦緥者吾巳行年九十是三樂也貧者士之常死者人之終處常得終當何憂哉又曰人有五儀有庸人有士人有君子有賢人有聖人審此五者則理道畢矣漢書曰司馬遷曰凡人所以生者神也所託者形也神大用則竭形大勞則弊神離則死死者不可復生離者不可復返故聖人重之鬻子曰天地闢萬物生人爲正焉人化而爲善禽獸化而爲惡人而不善者謂之禽獸老子曰人法地地法天天法道道法自然文子曰人之情欲平嗜慾亂之精氣爲人人受天地變化而生一月而膏𥘉形骸如膏脂二月而脉漸生筋脉三月而肧肧胞也三月如水龍狀也四月而胎如水中蝦蟆之胎五月而䈥氣積而成䈥六月成骨血化肉肉化脂脂化骨七月成形四肢九竅成八月而動動作九月而躁動數如前十月而生形骸乃成五藏乃形又曰昔者中黄子曰天有五行地有五方聲有五音物有五味色有五章人有五伍五伍二十五故天地之間有二十五等人上伍有神人眞人道人至人聖人次伍有德人賢人智人善人辯人中伍有公人忠人啇人平人直人下伍有衆人奴人愚人視肉人小人上伍之與下伍猶人之與牛馬也又曰智出於萬人者謂之俊百人者謂之傑十人者謂之豪列子曰戴髮含鹵倚而趨謂之人管子曰人水也男女精合而水流形二月而咀咀者五味也五味是五藏酸生脾鹹生肺辛生腎苦生肝甘生心藏巳具而後生五肉脾生髓肝生骨腎生䈥肺生革心生肉肉巳具然後生九竅脾爲鼻肝爲目腎爲耳肺爲口心爲下竅五月而成十月而生淮南子曰古未有天地之時惟象無形窈窈冥冥鴻洞莫知其間有二神經營天地二神隂陽之神也於是乃別隂陽離爲八極剛柔相成萬物乃形煩氣爲蟲精氣爲人是故精神天之有也骨骸地之有也精神入其門而骸反其根又曰言無常是行無常冝者小人也察於一事通於技者中人也若覆而并有之技能而裁使之者聖人也裁制也度其技能而裁制使也又曰故頭之圎也象天足之方也象地有四時五行九解九解者八方中央也三百六十六日人亦有四肢五藏九竅三百六十骨節天有風雨寒暑人亦有取與喜怒故膽爲雲脾爲風腎爲雨肝爲雷以與天地相叅也而心爲之主是故耳目者日月也公孫尼子曰人有三百六十節當天之數也形體有骨肉當地之厚也有九竅脉理當川谷也血氣者風雨也白虎通曰男女者何謂男男任也任功業也女者如也如從人也風俗通曰天地𥘉開未有人女媧擣黄土爲人力不暇乃引絙於泥中以爲人冨貴黄土人也貧賤凡庸絙人也人物志曰夫精欲深微質欲懿重志欲弘大心欲謙小精微所以入神妙也麄則失神懿重所以崇德宇也躁則失身志大所以堪任物也小則不勝小心所以慎咎悔也大則驕陵由此論之小心而志大者豪傑之俊也心大而志小者傲蕩之類也心小而志大者拘愞之人也任子曰木氣人勇金氣人剛火氣人強而躁土氣人智而寛水氣人急而賊傅子曰人之性如水焉置之圎則圎置之方則方澄之則淳而清動之則流而濁孕易漸卦曰鴻漸于陸夫征不復婦孕不育凶王弼注曰夫婦邪醜則非夫而孕故不育尚書泰誓曰啇王受焚炙忠良刳剔孕婦左傳僖中曰晉惠公之在梁也梁伯妻之梁嬴孕過期卜招父與其子卜之其子曰將生一男一女招曰然男爲人臣女爲人妾故名男曰圉女曰妾及子圉西質妾爲䆠女焉大戴禮曰周后任成王於身立而不跂坐而不差獨處不倨雖怒不詈胎教之謂也書之玉版藏之金匱置之宗廟爲後丗戒史記曰后稷名弃母有邰氏女曰姜嫄爲帝嚳元妃出野見巨人跡心說頋之乃踐之身動如孕者居期而生后稷又曰秦之先顓頊之苗孫曰女脩玄烏隕卵脩取吞之有孕生子大業又曰昔夏氏之將衰也有二龍止於夏庭龍亡漦在櫝而藏之至周厲王發而觀之漦化爲玄龜入王後宫宫妾未齓而遭之旣笄而孕無夫而生子懼而弃之即褒姒也漢書曰張倉妻妾百數甞孕者不復幸又曰鈎弋夫人懷昭帝十四月乃生上以堯十四月而生今鈎弋亦然乃命門曰堯母門又曰𥘉王禁妻李親任政君在身夢月入其懷范曄後漢書曰鮮卑檀名槐者其父投鹿侯𥘉從匈奴軍三年其妻在家生子投鹿侯恠欲殺之妻言㑹行聞雷震仰天視而雹入口因呑遂任身十月而産子又曰靈帝王美人任娠畏何后乃服藥欲除之而胎安堅終自不動又夢見負日而行四年乃生皇子恊后遂酖殺美人帝大怒欲廢后諸䆠官固請得止董太后自養恊號董侯東觀漢記曰張奐爲武威太守其妻懷孕夢見帶奐印綬登樓而歌乃訊之於占者曰必生男復臨兹邦命終此樓旣而生猛以建安中爲武威太守殺刺史邯鄲商州兵圍之急猛恥見擒乃登樓自焚而死魏略曰昔北方有髙離國者其王侍婢有身王欲殺之婢云有氣如雞子來下我故有身後生子王捐之於溷中豬以喙嘘之徙於馬䦨中馬以氣嘘之王疑以爲天生乃令其母收畜之名之曰東明帝令牧馬東明善射王恐奪其國欲殺之東明走至淹水以弓擊水魚鱉浮爲橋東明因得渡魚鼈散追兵不得渡東明因都王夫餘之地也又曰黄牛羗種孕身六月生吴録曰武烈皇帝姓孫名堅字文臺母有身夢膓繞呉閶門又曰長沙桓王名䇿字伯符武烈長子母吴氏有身夢月入懷晉書曰賈后酷以㦸擿諸宫人孕子皆隨刄以死晉陽秋曰𥘉太宗諸子繼天諸姬絶孕令扈謙卜繇云後房當有女誕三男一女終大盛於是盡出後宫及諸婢悉見之織坊中有一人色黒宫人謂之崑崙相者驚曰此是也帝以大計幸之生烈宗車頻秦書曰符堅母苟氏浴漳水經西門豹祠歸夜夢若有龍虵感巳遂懷孕而生堅三國典略曰周太祖宇文泰之母曰王氏𥘉孕五月夜夢抱子昇天纔不至而止窹以告德皇帝皇帝喜曰雖不至天貴亦極矣列子曰思士不妻而感思女不夫而孕后稷生乎巨跡伊尹生乎空桑莊子曰舜之治天下使民心競民孕婦十月而生子子生五月而能言教之速不至乎孩而始誰誰者別人之意未孩巳擇人言競教速成則始又有夭矣吕氏春秋曰有侁氏女子采桑得嬰兒于空桑之中獻之其君察其所以然曰其母居伊水之上孕夢有神告之曰臼岀水而東走母顧明日視臼水告其隣東走十里而顧其邑盡爲水身因化爲空桑伊尹母化也淮南子曰孕婦見兎其子缺脣見麋而子必四目帝王世紀曰庖犧氏風姓也母曰華胥燧人之代有大迹出雷澤胥履之生庖犧又曰帝堯陶唐氏祁姓也母曰慶都孕十四月而生堯於丹陵名曰放勛遁甲開山圖榮氏解曰女狄暮汲於石紐山下大祠前水中得月精如雞子愛而含之不覺而吞遂有身十四月而生夏禹括地圖曰大人國其民孕三十六年而生兒生兒長大能乗雲蓋龍類玄㑹稽四萬六千里外國圖曰方丘之上暑濕生男子三年而死其潢水婦人入浴出則乳矣是去九疑二萬四千里列女傳曰簡狄者帝嚳之次妃也妃有娀氏之女與姊妹浴於玄丘水之上有玄鳥銜卵而墜五色甚好相與競取之簡狄得而吞之有孕遂生契先結切又曰大任者文王之母性專一及其有身目不視惡色耳不聽惡聲口不出惡言以胎教也㑹稽先賢傳曰吴侍中闞澤字德潤在母胞八月叱聲震外蜀郡記曰諸山夷獠子任七月生生時必臨水兒出便投水中浮則取養沉乃弃之華他别傳曰甘陵相夫人有胎六月腹痛十餘日大極請他視脉他曰有兩胎一巳死便手摹其胎在左男也在右女也右死即爲湯下之便愈洞冥記曰東方朔母田氏寡居夢太白星臨其上因有娠田氏歎曰無夫而娠人將棄我乃移向代都東方里爲居五月旦生朔因以所居里爲氏朔爲名博物志徐君宫人有娠而生卵以爲不祥棄於水濵獨狐母有犬名鵠倉獵於水濵得所棄卵衘以來歸獨母以爲異乃覆燸之遂成兒兒生而偃故以爲名徐君宫中聞之乃更録取長而仁智襲君徐國後鵠倉臨死生角而九尾實黄龍也偃王葬之徐界中今見有狗壟又曰婦人任娠不欲見醜惡物異鳥獸食亦當避異常味欲見熊虎豹射御食牛心白犬肉鯉魚頭正席而坐割不正不食聽誦詩書諷詠之聲不聽淫聲不視邪色以此産子子賢明端正壽考所謂胎教之法異苑曰瞽瞍生舜徴在生孔子其有胎教也哉婦人妊娠未滿三月著聓冠衣平旦左繞井三匝映井水許見影而去勿返顧勿令聓見必生男又曰魏興李宣妻樊氏義熈中懷任過期不孕而額上有創兒穿之以出長爲將今猶存名胡兒又曰太原温盤石母懷身三年然後生墮地便坐而笑髮覆靣牙齒皆具續搜神記曰袁眞在豫州遣妓女紀陵送阿薛阿郭阿馬三妓與桓宣武至經時三人半夜共出庭前觀望忽見一流星夜從天直墮盆水中囧然明浄薛郭二人更以瓢酌水皆不得阿馬㝡後取星正入瓢中便飲之即覺有娠遂生桓南郡幽明録曰譙郡胡馥之娶婦李氏十餘年無子而婦卒哭慟云竟無遺體遂喪此酷何深婦忽然起坐曰感君藏悼我不即杇君可瞑後見就依平生時隂陽當爲君生一男語畢還卧馥之如言不取燈燭暗而就之交接後歎曰亡人亦無生理可別作屋見置瞻視滿十月然後殯尓來覺婦身微暖如未亡旣及十月果生一男男名靈産論衡曰后稷之母衣帝嚳之服坐息帝嚳處而任身又曰傳言黄帝任二十月而生生而神靈弱而能言語林曰張衡之𥘉死蔡邕母始孕此二人才貌相類時人云邕是衡之後身太平御覽卷第三百六十
