front:
  text: 太平御覽卷第二百二十八職官部二十六
  hash: sha256:d3f026ae35223c60d84613b8d59b6dbdadb80502e98030e141f38e3fcc1c6d21
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_228-1a}
body:
  text: 叙卿太常卿叙卿韋昭辨釋名曰卿慶也言萬國皆慶頼之也帝王世紀曰九卿者所以叅三公也白虎通曰卿章也善明理也韋昭辨釋名曰漢置十二卿一曰太常二曰太僕三曰太衛尉四曰光禄五曰宗正六曰執金吾七曰大司農八曰少府九曰大鴻臚十曰廷尉十一曰大長秋十二曰將作大匠辨云漢正卿九一曰太常二曰光禄勲三曰衛尉四曰太僕五曰廷尉六日鴻臚七曰宗正八曰司農九曰少府是爲九卿通典曰後漢九卿而分属三司太常光禄勲衛尉三卿並太常所部太卿廷尉大鴻臚三卿並司徒所部宗正大司農少府三卿並司空所部尚書周官曰六卿分職各帥其属以倡九牧阜成兆民六卿各帥其属官大夫止治其所分之職倡遵九州牧伯爲政大成兆民之性命漢官儀曰卿中秩二千石綬青地桃花三彩又曰衣裳公侯華蟲卿大夫藻火左傳曰齊侯使敬仲爲卿辭曰覉旅之臣幸若獲宥宥赦及於寛政赦其不閑於教訓而免於罪戾㢮於負檐君之惠也所獲多矣敢辱髙位以速官謗請以死告以死爲誓又曰卿非君命不越境又曰晉蒐于𬒳盧命趙衰爲卿讓於先軫杜預日先軫晉下軍之佐原軫周禮曰朝士掌外朝之法左九棘孤卿大夫位焉樹棘以爲位者取其赤心而外刺象赤心三刺春秋漢含孳曰故三公象五岳九卿法河海三公在天法三台九卿法北斗國語曰晉悼公使張老爲卿辭曰臣不如魏綘之智能治大官其仁可以利公室若在卿位外内必平漢官曰司馬安巧官四至九卿謝承後漢書曰李叔諌更始曰夫三公上應台宿九卿下括河内梁書曰武帝天監七年以太常卿加置宗正卿以司農爲司農卿三卿是為春卿加置太府卿以少府爲少府卿加太僕卿三卿是爲夏卿以衛尉卿廷尉卿將作大匠卿三卿是爲秋卿以光禄勲爲光禄卿大鴻臚爲鴻臚卿都水使者爲大舟卿三卿是爲冬卿凢十三卿皆置丞及功曹主簿北齊書曰以太常光禄衛尉宗正太僕大理鴻臚司農太府是爲九寺莊子曰楚昭王迎屠羊說以珪之位馬彪日諸侯三卿皆執珪說苑曰秦繆公使賈人載塩於衛賈人買百里奚使將軍至秦繆公勸塩見百里奚牛肥公問之對曰臣牛食之以時使之不暴是以肥也公知其君子以爲上卿又曰九卿者不失四時通於溝渠𥙷隄防種樹木美五榖如是舉以爲九卿之事常在於徳又曰齊桓公使管仲治國對曰賤不能臨貴桓公以爲上卿而國不治對曰貧不能使冨桓公賜之齊市租一年而國不治桓公曰何故對曰踈不能成近桓公立以爲仲父國大安孔子曰管仲之貴不得此權者亦不能使其君面南而伯矣太常卿六典曰太常卿之職掌邦國禮樂郊廟社稷之事以八音分而理焉一曰郊社二曰太廟三曰諸陵四曰太極五曰鼔吹六曰大醫七曰太卜八曰廪犧揔其属行其政令尚書堯典曰伯夷汝作秩宗典朕三禮周禮春官曰大宗伯一人掌天地神祇人鬼之禮史記曰髙祖滅秦登尊號群臣飲争功醉或怨妄呼抜劒擊柱上患之於是叔孫通進說遂爲綿蕝子恱切野外習之月餘通曰可試觀上使行禮帝輦出房百官執職傳警引諸侯王以下次奉賀莫不震恐肅敬諸侍坐殿上皆伏抑首以尊卑起上壽觴九行謁者言罷御史執法與不儀者趣輙引去竟朝置酒無敢讙譁失禮者於是髙祖曰吾今日乃知爲皇帝之貴也拜通太常賜金五百斤通因進言曰諸弟子儒生隨臣乆矣與共爲儀願陛下官之髙帝悉以爲郎通出皆以五百斤金賜諸生諸生曰叔孫生聖人也知當世務漢書曰太常古官云伯夷秩宗典三禮欲令國家盛大社稷常存故稱太常又曰奉常官掌宗廟禮儀有丞景帝六年更名太常又曰杜業有才能選爲太常數言得失不事權貴又曰宣帝地節四年任官爲太常坐盗茂陵園中物免又曰武帝元鼎四年鄼侯蕭壽成爲太常坐犧牲不如令論又孝武帝元朔元年孔臧爲太常坐南陵橋壞衣冠道絶免東觀漢記曰周澤少脩髙節耿介特立好學問治嚴氏春秋門徒數百人隱居山野不汲汲於時俗拜太常果敢數有直言朝廷嘉其清廉後漢書曰桓榮拜太常榮𥘉遭倉卒與族人桓元卿同饑厄而榮講誦不息元卿嗤榮白但自苦氣力何時復施用乎榮笑不應及爲太常元卿歎曰我農家子豈意學之爲利乃若是哉乗輿嘗幸太常府令榮坐東西設几杖㑹百官驃騎將軍東平王蒼以下及榮門生數百人天子親自執業旣罷悉以太官供具賜太常家其恩禮若此又曰桓榮及子郁皆爲太常𥘉榮受學章句减其煩辭後郁又刪之由是有桓君大小太常章句又曰靈帝欲以羊續爲太尉時拜三公者皆輸東園禮錢千万令中使督之名爲左騶騶騎土也其所之往輙迎致禮敬厚加贈賂續乃坐使人於單席舉緼𫀆以示之曰臣之所資唯斯而巳左騶白之帝不恱以此故不登位而徴爲太常又曰楊賜以病罷居無何拜太常詔賜御府衣一襲衣單服具曰襲所服冠幘綬玉壷革帶金錯鈎佩金錯以金間錯其文續後漢書曰張奐字然明拜太常卿奐有清節可否之間強禦不敢奪也該覽群籍古今詳備又百官志曰太常卿每祭祀先奏禮儀及行事則賛天子大射養老䘮皆奏其禮儀秩比中二千石華嶠後漢書曰劉愷爲太常論議常弘正大義諸儒爲之語曰難經伉伉劉太常魏書曰和洽字士陽汝南西平人轉爲太常清貧守約至賣田宅以自給明帝聞之加賜糓帛又曰常林從光禄勲爲太常晉宣王以林郷邑耆老每爲之拜或謂林曰司馬公貴重君冝且止之林曰司馬公自欲敦長㓜之序以爲後生之法貴非吾之所制也言者慙而蹜蹜又曰刑顒字子昇時人稱徳行堂堂刑子昇文帝以爲太常晉書曰鄭黙字思元遷太常山濤欲舉一親爲博士見黙語曰卿尹翁歸令吾不敢復言謂其柔而能整也又曰張華爲太常以太廟屋棟折免官臧榮緒晉書曰咸熈五年詔曰華表字偉容清賢履道内貞外順歴位忠恪言行不玷其以表爲太常卿晉起居注曰安帝三年太常臨川王寳啓府舎窄狹不足移家母鍾年髙違離靡寜乞還第攝事詔聽之晉中興書曰蔡謨字道明拜太常咸康四年臨軒門下奏非祭祀宴饗則無設樂謨奏冝有金石顯宗納焉臨軒作樂自此始也又曰建元元年詔曰太常職典天地兼掌宗廟其爲任也謂重矣是以古今選建未嘗不妙簡時望兼之儒雅㑹稽王叔履尚清虚志道無倦優游諷議朕所諮仰其以王領太常本官如故又曰元帝以賀循爲太常而散騎常侍如故循以九卿舊不如官唯拜太常而巳中宗踐祚下令曰循氷清玉㓗行爲俗表加以位處上卿服物盖身而巳屋裁庇風雨孤常造其廬特以爲賜以六尺床席褥并錢二十萬以表至徳齊書曰張瓌以雍州刺史拜太常自謂閑職武帝曰卿軰未冨貴謂人不與旣冨貴復欲委去之瓌曰陛下御臣等若養馬無事就閑廐有事復牽來帝猶怒遂以爲散騎常侍北齊書曰趙彦深五歳母傳氏謂之曰家貧兒小何以能濟彦深泣而言曰若天哀矜兒大當仰報傳感其意對之流涕及彦深拜太常卿還不脫朝服先入見母跪陳㓜小孤露蒙訓得至於此母子相泣乆之然後改服後周書曰長孫紹逺爲太常廣召工人制樂器土木絲竹各得其冝唯黄鍾不調紹逺每以爲意常因退朝經韓使君佛寺前過浮圖三層之上有鳴鐸焉忽聞其音雅合官調取而配奏方始克諧又曰斛斯徴遷太常卿自魏孝武西遷雅樂廢缺徴博採遺逸稽諸典故創改舊方始備焉又樂有淳音淳于者近代絶無此器或有自蜀得之皆莫之識徴見之曰此錞于也衆弗之信徴遂徴于寳周禮注以芒茼將之其聲極振衆乃歎服徴乃取以合樂焉又曰建六官置太宗伯卿一人掌邦禮以佑皇帝和邦國是爲春官唐書曰趙宗儒長慶𥘉爲太常有師子樂備五色之方非㑹朝聘享不作㓜君荒誕伶官縱肆中人掌教坊者移牒取之宗儒宰相以宗儒懦怯不事改太子少師又曰崔邠拜太常卿故事太常卿𥘉上大閱四部樂於官署觀者縱焉邠自私第去帽親導母轝公卿避之文宗以樂府之音鄭衛太甚欲開古樂命王涯詢於舊工取開元時重按之名曰雲韶樂樂曲成涯與太常丞李廓少府監庾丞憲押樂工獻於黎園亭帝按之於會昌殿上恱賜涯等錦綵又曰竇誕爲太常奏用音聲博士皆爲太樂鼔吹官僚於後彈胡琵琶胡人白胡逹竹伯夷積勞計考並至太官自是以聲伎入流品者盖以百數應劭漢官曰北海周澤爲太常恒齊其妻憐其年老瘦弱窺内問之澤大怒以爲干齊掾吏扣頭争之不聽遂収送詔獄并自劾論者非其激發諺曰居代不諧爲太常妻一歳三百六十日三百五十九日齊一日不齊醉如泥旣作事復低迷漢官典職曰惠帝改太常爲奉常景帝復爲太常蓋周官宗伯也漢官解詁曰太常社稷郊祀事重職尊故在九卿之首衛宏曰太常主導賛助祭皆平冕七旒玄上纁下華䖝七章漢陵屬三輔太常月一行漢書注顔師古曰太常者王之旌也畫日月焉王有大事則建以行禮官主奉持之故曰奉常後改曰太尊大之義也齊職儀曰太常卿一人品第三秩中二千石銀章綬進賢兩梁冠絳朝服佩水蒼玉王朗云西京太常行陵赤車千乗益部耆舊傳曰趙典字仲經爲太常雖身處上卿而布𬒳瓦器梁陸陲爲光禄讓太常表曰昔者楚徳方盛叔敖濯衣漢道克昌王陽結綬故拜命無辭受爵不讓况宗卿清重歷選所難漢晉巳降莫非素範辭爵則桓郁張奮讓封則丁鴻劉愷潘尼音夷之文雅純深華表之從容退嘿自此迄兹風流繼軌以臣况之曽無等級陳沈烱爲周弘正譲太常表曰臣聞玉舄雕楹不取材於蟠木丹朱繡黼豈襲冕於薜蘿何則適用各有其冝朝野不可一指叔孫之野外定禮資典實刁恊之躬爲唱引豈易其儀儻九賔闕相對禪失儀責以司存云誰之咎况南史
