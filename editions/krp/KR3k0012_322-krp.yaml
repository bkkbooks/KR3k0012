front:
  text: 太平御覽卷第三百二十二
  hash: sha256:f38c55021de2044aad63c82ca087d3262c6c38db9f4444261ac939c72d3b3592
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_322-1a}
body:
  text: 兵部五十三勝孫子曰夫未戰而廟勝者得筭多也未戰而廟不勝者得筭少也多筭勝少筭而況無筭乎吾以此觀之勝勢見也吾以此道觀之是兵無成勢無常形臨時變化不可預傳故曰料敵在心察機在目也又曰昔之善戰者先爲不可勝以待敵之可勝不可勝在己守備之可勝在敵自循理以備敵之虚解故戰者能爲不可勝不能使敵必可勝也又曰見勝不過衆人之所知非善之善也戰勝而天下曰軍善非善之善也交争勝也太公曰争勝白刃之中非良將也故舉秋毫不爲多力見日月不爲明目聞雷霆不爲聦耳見易聞也古人所謂善戰者勝勝易勝者也原微易勝攻其可勝不攻其不可勝也故善戰者之所勝也無勇攻敵兵形未成服之無赫赫之功也又曰善戰者立於不敢敗之地而不失敵之敗勝者也故勝兵先勝而後求戰敗兵先戰而後求勝善用兵者脩道而保法故能爲勝攻之政善用兵者先自脩理不可勝之道保法度不失敵之乱敗也又曰勝可知而不可爲也敵雖衆可使無鬪故䇿之而知得失之計候之而知動静之理形之而知死生之地角之而知有餘不足之處角量之也故兵形之極至於無形無形則深淵不能闚也而智者不能謀也因形而作勝於衆衆不能知也因地形而立勝人皆知我所以勝之形而莫知吾所以制勝之形也人皆知吾所以勝莫知吾因敵形制此勝也故兵戰勝不復不量重復而應形無窮動而應也又曰知勝有五知可戰與不可以戰者勝能料知敵情審其虚實者勝知衆寡之用者勝言兵之形有衆而不可擊寡或可以弱制強而能変之者勝也春秋傳曰師克在和不在衆上下同者勝言君臣和同勇而欲戰者勝也故孟子曰天時不如地利地利不如人和以虞待不虞者勝虞度也以我有法度之師擊彼無法度之兵故春秋傳曰不備不虞不可以出師將能而君不御者勝司馬法曰進退唯時無曰寡人將旣精能曉練兵勢君能專任事不從中御也此五者知勝之道故曰知已知彼百戰不殆審知彼強弱之勢雖不至百戰實無危殆也不知彼知巳一勝一負雖不知敵之形勢恃巳能尅之者勝負各半也不知彼不知巳每戰必殆外不料敵内不知巳用戰歩危也知地知天勝乃可全知地形之便知天時孤虗向皆晦暝風雲之譎詭也左傳曰楚屈瑕將盟貳􅎮貳􅎮二國名也鄖人軍於蒲騷楚莫敖曰莫敖官名盍請濟師盍何也何不濟益師對曰師克在和不在衆也啇周之不敵君之所聞也武王有乱臣十人紂有億兆之衆莫敖曰卜之對曰卜以决疑不疑何卜遂敗鄖師于蒲騷又曰秦伯以壁祈戰于河注禱河求勝也戰國䇿曰魏武侯問呉起曰兵以何勝曰以理爲勝曰不在衆乎起曰法令不明賞罰不信聞鼔不進聞金不止雖有百萬之師何益於用所爲理者居則有禮動則有威進不可當退不可追前却如節左右應麾雖絶成陣雖散成行投之無所徃天下莫敢當又曰韓魏之君不朝于齊邹忌爲齊相田忌爲將使田忌伐魏三戰三勝又曰或說齊閔王曰臣之所聞戰攻之道於師者雖有百萬之軍比之堂上雖孫呉之將擒之户内千丈之城㧞之罇爼之間百尺之衝折之袵席之上史記曰張儀東說齊閔王曰臣聞之齊與魯三戰而魯三勝國以危亡隨其後雖有勝之名而有危之實是何也齊大而魯小也又曰魏以太子申爲上將軍伐齊過外黄徐子謂太子曰自將攻齊太子曰勝則冨不過有魏貴不益爲王若戰不勝齊則萬丗無魏矣此臣之百戰百勝也漢書曰廣武君謂韓信曰成安君有百戰百勝之計一日而失之軍敗鄗下身死汦水上又曰髙祖置酒雒陽南宫上曰吾所以有天下者何項氏之所以失天下者何王陵對曰陛下嫚而侮人項羽仁而敬人然陛下使人攻城略地所降下者因以與之天下與同利也項羽妬賢疾能有功者害之賢者疑之戰勝而不與人功得地而不與人利此則所以失天下也上曰公知其一未知其二夫運籌䇿於帷幄之中决勝於千里之外吾不如子房鎭國家撫百姓給饋餉不絶糧道吾不如蕭何連百萬之軍戰必勝攻必取吾不如韓信三者皆人傑也吾能用之此吾所以取天下也後漢書曰河南尹朱儁爲董卓陳軍事卓折儁曰我百戰百勝决於心卿勿妄說且汙我刀儁曰昔武丁之明猶求箴諌况如卿者而欲杜人之口乎卓曰戯之耳儁曰不聞怒言可以爲戯卓謝儁又曰呉漢與公孫述戰於廣都成都之間八戰八尅遂軍其郭中又光武詔曰將軍鄧禹與朕謀謨帷幄决勝千里魏志曰鍾㑹爲鎭西將軍假節都督關中諸軍事詔曰㑹所向摧弊前無強敵緘制衆城綱運羅送蜀之豪帥靣縛歸命謀無遺䇿舉無廢攻凢所降誅動以萬計全勝獨尅有征無戰拓平西夏方隅清晏以㑹爲司徒㑹喜之又曰魏國初建荀攸爲尚書令攸深宻有智防自從太祖征伐常謀謨帷幄時人及子弟莫知其所言呉志曰魏使司馬曹仁將歩騎數萬向濡須僞欲東攻羡溪朱桓赴羡溪仁進軍拒濡須桓聞追羡溪兵未到而仁兵奄至諸將各懼桓喻之曰凡兩軍相對勝負在將不在衆寡因與諸軍共據髙城臨大江北背山陵以逸待勞爲主制客此百戰百勝之勢桓因偃旗鼓外示虚弱以誘仁仁果分遣將軍王雙等乗油舡襲中洲桓身自距之生獲雙等送武昌晉書曰王濬爲平東將軍假節都督梁益諸軍事率兵伐呉濬兵不血刃攻無堅城夏口武昌無相支抗又曰征西將軍庾亮以石勒新死欲移鎭石城爲滅賊之漸事下公卿蔡謨議曰自石勒初起則季龍爲牙瓜百戰百勝遂定中國又曰嵇紹字延祖爲侍中從駕至湯隂紹之行也侍中秦准謁曰今日向難卿有佳馬不嵇正容曰大駕親以正伐邪理必有征無戰若皇輿失守臣節有在駿馬何爲聞者莫不歎息漢晉春秋曰諸葛亮至南中所在戰捷聞孟獲者爲胡漢所服募生致之旣得使觀於營陣之間問曰此軍何如獲曰不知虚實故敗定易勝耳亮縱使更戰七縱七擒傳巽别傳曰衛臻領舉傳巽爲兾州刺史文帝曰巽吾腹心臣也不妨與其籌筭帷幄之中决勝千里之外不可授以逺任蕭方等三十六國春秋曰西凉從事中郎將張顗言於凉王曰太祖以天挺神姿應桓文之運流􅞎万里於西夏所推平索嗣兵不血刃取酒泉有易俯拾爲殿下開創崇規貽厥孫謀者也又曰秦王堅下書曰呉人敢恃江山僣稱大號輕率犬羊屢窺王境朕將廵狩省方登㑹稽而朝諸侯復禹績而定九州今王師所擬必有征無戰伐國存主義同一又曰夏王㪍㪍自號貞興元年夏刻石都南頌其功曰我皇誕命丗之期應天縱之德仰恊時來俯從民望屬姦豪鼎峙之際群㐫岳立之秋故運籌命將舉無遺䇿親御六戎即有征無戰五稔之間而治風弘闡矣春秋齊後語曰騶忌與田忌不相善公孫閱謂騶忌曰何不令人操十金卜於市曰我田忌之人也吾三戰三勝聲威天下欲爲大事亦吉乎卜者出因令人捕之驗其辭於王之所騶忌從之田忌懼無以自白遂以其徒襲攻臨淄欲殺騶忌不勝而奔梁後略曰君子普通之未邊壃告驚㓂虜𤇺煽擊拆相聞上皇乃運籌帷中邁曹王之逺略决勝千里超光武之懸謀故能師不疲勞献捷相係老子曰善勝敵者不爭又曰戰勝則以喪禮處之管子曰天時地利其數多少其要必出於計數故凡攻伐之爲道也計必先定於内然後兵出乎境計未定而出兵是則戰之自毀也故不明敵人之政不能加也未可加兵不明敵人之積不能約也不能約誓不明敵人之士不先陣是故以衆擊寡以理擊乱以冨擊貧以能擊不能以教卒練士擊歐衆白徒故百戰百勝也孫卿子曰舜伐有苗禹伐共工湯伐有夏文王伐崇武王伐紂逺方慕義兵不血刃墨子曰墨子爲守使公輸般服而不肯以兵知墨子雖善爲兵而不肯以知兵聞也善持勝者以強爲弱故老子曰道冲而用之有弗盈也鄧析子曰百戰百勝黄帝之師也韓詩外傳曰孔子歎平仲云身不出罇俎之門而折衝千里之外注云衝衝車也謂敵人設此以臨城大臣謀於廟堂遥以折之古司馬兵法曰大捷不賞上下皆不伐善捷勝也一軍皆勝上下俱不取功也上苟不伐善則不驕矣下荀不伐善則不差矣上下不伐善此讓之至也大敗不誅上下皆以不善在巳也敗者負也一軍奔北人皆有罪故不誅上下俱過上苟以不善在巳必悔其上過上下分惡若此讓之至也又曰凡戰以力乆以氣勝有力者任重則可乆可乆即可怠以固乆以危勝營壘次舎器械具備行陣堅守可以乆也乗危乃以死易生戰攻之心定矣夲心固新氣勝无褁疑心本堅固飬而不勞故能制勝以甲固以兵勝甲以杵矣兵以斬敵甲堅則困兵利則勝也凡車以宻固徒以坐勝車卒衆則宻陣歩卒衆則坐陣兼以重固以輕勝車歩兼也以重卒持堅以輕卒攻取故勝也吕氏春秋曰凢兵也者貴其因也因也者因敵之險以爲巳固因敵之謀以爲巳事能審囙而加勝則不可窮矣勝不可窮之謂神神則能而不可勝矣夫兵不貴勝而貴不可勝不可勝在巳可勝在彼聖人必在巳者不在彼故執不可勝之術以遇不勝之敵若此則兵無失矣又曰趙襄子攻翟勝左人中人使者使謁之下左人中人城今盧奴西山中有二城也襄子方食搏飯有憂色左右曰一朝而下兩城此人之所喜今君有憂色何也襄子曰江河之大也大長也不過三日焱風暴雨日中不湏臾今趙氏之德行所積又一朝而兩城下亡其及我乎孔子聞之曰趙氏其昌乎夫憂所以爲昌也喜所以爲亡也勝非其難者也持之其難昔賢主以此持勝故其福及後丗齊荆呉越皆甞勝矣而卒取亡不逹乎持勝也唯有道之主能持勝淮南子曰文王知而好問故聖武王勇而好問故勝夫乗衆人之智則無不任也用衆人之力則無不勝也三輔故事云婁敬爲隴西太守過洛陽見曰臣之䇿能不血刃坐羈匈奴頭著陛下前衛公兵法曰夫決勝之䇿者在乎察將之材能審敵之強弱料地之形勢觀時之冝利先勝而後戰守地不失是謂必勝之道也若上驕下怨可離而間營乆卒疲可掩而襲昧去迷就士衆猜嫌可振而走重進輕退遇逢險阻可邀而取若敵人旌旗屢動士馬數顧其卒或縱或撗其吏或行或止追北恐不利見利恐不獲渉長途而未息入險地而不疑勁風劇寒剖冰濟水烈景炎熱倍道兼行陣而未定舎而未畢若此之勢乗而擊之此所謂天賛我也豈有不勝乎張恊詩曰疇昔懷微志惟幕竊所經何必操干戈堂上有竒兵陸士衡辯正論曰攻無堅城之將戰無交鋒之虜又曰由是二邦之將䘮氣挫鋒勢衂財匱而呉宛然坐乗其弊太平御覽卷第三百二十二
