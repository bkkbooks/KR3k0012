front:
  text: 太平御覽卷第六百六十九
  hash: sha256:8b108b200f67d50e0c1963ff021dae074092c99159510cc7b6a893fcf1915552
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_669-1a}
body:
  text: 道部十一服餌上神農經曰上藥令人身安命延又云餌五芝丹砂曽青雲母太一禹餘粮各以單服令人長生中藥養性下藥除病此上聖之至言方術之實録也仙藥之上者丹砂次者黄金白銀衆芝五玉五雲明珠也黄精與术餌之却粒或遇㓙年可以絶粒謂之米脯西極明科曰上清金液丹經九鼎神圗太一九轉大丹等凢一百四十卷五符經曰胡麻夲生大宛又名巨勝服之不息與丗長存五糓之長也服之可以知萬物通神明又曰眞人謂黄精獲天地之淳精依山寄居神化者也天仙名此爲戊已芝玉訣經曰元始五常氣以陽光𥘉明散元始之暉眞人食其景而無窮三光經曰三光者仙道錬胎之術也泥丸者體形之上神也吐納經曰八公有言食草者力食肉者勇食糓者智食氣者神仙經曰丹爲金服之上士也茹芝導引咽氣者中士也食餌草木者下士也食金丹大藥雖未去丗百邪不近也若但服草木及餌八石適可令疾除命益耳不足却外禍也惟守眞一則劇性不犯昔仙公各服一物以得數百年乃合神丹金液韓衆服菖蒲十三年身生毛日視書萬言皆誦之冬袒不寒又菖蒲生湏石上一寸九節巳上紫花者尤善又曰煑石方東府左卿白石先生造也皆眞人所授但未見眞夲丗有兩夲以省少者爲佳又東華眞人食石法即東府也亦是太清法又曰紫微夫人撰术序其畧曰吾俱察草木之勝負若速益於已者並已不及木之多驗乎所以長生乆視逺而更靈我非謂諸物皆當减於术也眞以术之用今之所要末丗多疾冝當服餌夫道有内足猶畏外事之禍有外足者亦或中崩之弊我見山林隱逸得服术者千年八百年此肩五岳矣今撰术數方以傳好尚若必信用庶無橫暴之災矣又曰南陽酈縣山中有甘谷水所以甘者谷山左右皆生甘菊菊花墮其中歴丗弥乆臨此谷中居民皆不穿井悉食甘谷水食者無不壽髙者百四五十歳下者不失八九十歳故司空王暢太尉劉寛太傅袁隗皆爲南陽太守毎到官常使酈縣月送甘谷水四十斛以爲飲食此諸公多患風痺及眩冐皆得愈但不能大得其益如甘谷上居民從㓜便飲食此水又菊花與薏花相似直以甘苦別之耳菊甘而薏苦今眞菊甚少耳率多生於水側緱氏山與酈縣最多仙方所謂曰精更生周盈皆一菊而根莖花實異名矣其說甚美而近來服之者畧無所効正由不得眞也八素經曰太上曰飛錬之法未可得眞人之門户又四極明科云金液丹經九鼎神圖並眞仙之祕書藏于名山太上太霄㓪書曰除欲减私服御吐納上清列紀曰中黄之書皆白帝君所藏於瑶臺說丹藥祕法非有眞籙不得其道也太上丹簡墨籙曰修金液之術當得太清丹經太丹隱書曰感召靈跡則天人下降上學之士服日月黄華金精飛根黄氣五厨經曰修奉和太不虧不盈天交上經曰太古之人所以壽考者不食糓也身安神樂修道易成五符經云食月之精可以長生食星之精上升太清登眞隱訣云服雲牙可絶糓去尸虫也可修眞一之道裴眞人曰喜怒損志哀樂損性榮華减德隂陽冦身皆學道之大忌仙法之所嫉也莫若知而不爲爲而不敢散此仙之要道生生之夲業也欲得延年當吞日華食物多飲愼便卧多則生病卧則蕩心心蕩則失性病生則藥不行學道者愼此劉向列仙傳曰務光夏時人好琴服蒲韮根又彭祖多服水桂雲母中岳人蘇林字子玄夲衛人靈公末年師仇公教以服氣之法又尹喜之長沙服巨勝實又曰劉奉林周時人也學道嵩髙山積年後之委羽山能閉氣三日不息但服黄連已及千歳不能有所役使又曰董威輦不知何許人晉武帝末在洛陽白社中藍縷不蔽恒吞一石子終日不食南岳魏夫人内傳曰夫人名華存字賢安任城人也晉成帝時服金屑得道太元眞人茅盈内傳曰金闕聖君命太極真人使正一玄玉郎王忠鮑丘等與茅盈四節燕胎流明神芝長躍雙飛夜光洞草使拜而食之佩璽服衣正冠北首帶符握鈴畢四使者告盈日食太極四節隱芝者位爲眞卿食金闕燕胎玉芝者位爲司命食東宫流明金英者位爲司禄食長躍雙飛者位爲眞伯食夜光洞草者位爲主㹅左右御史之任子今盡食之矣壽畢天地位當爲司命上眞東岳卿君都統呉越之神仙眞人周君内傳曰紫陽眞人周義山字季通汝隂人也漢丞相勃七世孫父浚官至陳留内史君年十六隨浚在郡爲人沉重喜怒不形好獨坐静處精思微宻常以平旦出日之𥘉面東嗽日服氣旦旦知此眞誥曰衡山張正禮漢末受西城君虹景神丹方患丹砂難得去廣州爲道士仙去颷室爲上仙又曰張玄賔定襄人也魏武帝時曽舉茂才歸郷里師事西河葪公受服餌术方後遇眞人樊子明於少室授以遁變隱景之道昔在天柱山今來華陽内爲理禁伯又曰廬江潜山中有學道者鄭景世張重華並以晉𥘉受仙人孟德然口訣以入山行守五藏含日法兼服胡麻又服玄丹又曰平仲節河東人也劉聦亂中夏仲節度江入括蒼山體有眞氣服餌仙去又曰趙廣信陽城人魏末渡江入剡小白山受李法服氣又受左君守玄中之道如此積年或賣藥人間多來都下市丹砂作九華丹仙去又曰虞翁生㑹稽人也受仙人介君食日精法吳時來隱狼伍山兼行雲氣廻形之道精思積乆仙去又曰朱孺子呉末入赤水山中服窮華及术後遇西歸子從乞度世西歸子授以要言仙去又曰明星王女者居華山服玉漿山中頂上有石龜其廣數畝髙且三仞其側有梯磴逹龜背見玉女祠前有五石曰号曰玉女洗頭盆其中水碧緑澄澈雨不加溢旱不减耗内有玉女馬一疋又曰華隂山中有學道者尹受子張石生李方回並晉武帝時人受仙人管成子蒸丹餌术法又授蘇門周壽陵服丹霞之法又曰范㓜冲遼西人恒服三氣法青白赤氣各如綖服之十年遂得仙此髙元君太素内景法旦旦爲之視日益佳其法簡其事驗又曰姜伯眞在大橫山服石腦石腦如石小班色而軟又大茅山東亦有形狀貟小如曽青而色似鐘乳繁陽子昔亦服此裴君内傳曰佛靣道人支子元裴君授以長生内術又云尋藥之與存思雖致道同津而關源異緒服藥所以保形形康則神安存思所以安神神通則形保二理乃成相資而有道學傳日許邁字叔玄少名映後改名逺遊與王羲之父子爲世外之交羲之亦辭榮養生毎造逺弥日忘歸詩書徃復多論服餌又曰上清左卿黄觀子學道服金丹讀大洞經得道東府左卿白玉生有煑石方文德石仙監張叔隱受青精方太清右公李抱祖岷山人受青精飰方葛洪神仙傳曰劉京從邯鄲張君受餌雲丸又曰封君逹隴西人入鳥䑕山服餌年百餘歳常乗青牛又曰衛叔卿中山人也服雲母又曰孔元許昌人常服松脂伏苓又曰焦先字孝然河東人也常食白石以分人熟如煑芋又曰靈壽光扶風人年七十餘乃得未央丸方服之年二百餘歳不老又曰中候上仙范邈字度世舊名冰服虹景丹得道撰魏夫人傳又曰清虚眞人王褒字子登前漢安國侯王陵七世孫主仙道君以雲碧陽水晨飛丹腴二斗賜褒服之視見甚逺坐在立亡役使群神太平御覽卷第六百六十九
