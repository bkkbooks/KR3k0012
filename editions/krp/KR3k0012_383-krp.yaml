body:
  text: 人事部二十四壽老說文曰老考也釋名曰六十曰耆耆指也不從力役指事使人也七十曰耄頭髮耄耄然也八十曰耋耋鐡也皮膚變黒色如䥫也九十曰鮐背背有鮐文也或曰黄耇鬢髮變黄也耇垢也皮色驪悴恒如有垢也或曰胡耇皮如雞胡也或曰凍梨皮有班黒如凍梨色也或曰鬼齒大齒落盡更生細齒如小兒齒也百年曰期頥頣飬也老惛不復知服味善惡孝子期於盡飬道也老朽也老不死曰仙仙遷也遷入山也周禮夏官司馬曰中春羅春鳥獻鳩以飬國老是時鷹化爲鳩鳩與春鳥變舊爲新以冝養左助生氣也禮記曲禮上曰六十曰耆指使七十曰老而傳八十曰耋九十曰耄百年曰期頥鄭玄注日耄昏忘也期要也頤養不知衣服食味孝子盡飬之道也又曰大夫七十而致仕若不得謝行役以婦人從適四方乗安車自稱曰老夫又檀弓上曰子夏喪其子而喪其明曽子吊之子夏哭曰天乎予之無罪曽子怒曰吾與汝事夫子於洙泗之間退而老於西河之上使西河之民疑汝於夫子尓罪一也又曰王制曰飬耆老以致孝又曰凢飬老有虞氏以燕禮夏后氏以饗禮殷人以食禮周人脩而兼用之五十飬於郷六十養於國七十養於學逹於諸侯天子諸侯養老同也五十異糧六十宿肉七十貳膳八十常珍九十飲食不離寢膳飲從於遊可也五十始衰六十非肉不飽七十非帛不煖八十非人不煖九十雖得人不煖矣又曰五十杖於家六十杖於郷七十杖於國八十杖於朝九十者天子欲有問焉則就其室以珍從尊養之七十不俟朝二夫士之差者揖君則退八十曰告存每月致膳九十曰有秩秩常也有常膳有虞氏養國老於上庠養庶老於下庠夏后養國老於東序養庶老於西序殷人養國老於右學養庶老於左學周人養國老於東膠養庶老於西膠又曰君子耆老不徒行庶人耆老不徒食矣又曰文王丗子曰文王謂武王曰汝何夢矣武王對曰夢帝與我九齡帝天也文王曰古者謂年齡齒亦齡也我百爾九十吾與爾三焉文王九十七而終武王九十三而終又祭義曰先王之所以治天下者五貴有德貫貫貴老仁長慈㓜爲其近於親也又曰虞夏殷周天下之盛王也未有遺年者年之貴乎天下乆矣次乎事親也又曰天子廵守諸侯待于竟天子先見百年者左傳隱公曰石碏使告于陳曰衛國𥚹小老夫耄矣無能爲也又僖公上曰王使宰孔賜齊侯胙將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜又僖公下曰秦晉圍鄭佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退公從之辤曰臣之壯也猶不如人今老矣無能爲也又襄公六曰晉悼夫人食與人之城𣏌者綘縣人或年長矣無子而往興於食有與疑年使之年使言其年曰臣小人也不知紀年臣生之歲正月甲子朔四百有四十五甲子矣其季於今三之一也吏走問諸朝師曠曰魯叔仲惠伯㑹郤成子于承匡之歲也七十三年矣又曰穆叔至自㑹見孟孝伯語之曰趙孟將死矣其語偷不似民主且年未盈五十而諄諄焉如八十九十者弗能乆矣又昭元曰天王使劉定公勞趙孟於潁館於洛汭劉子曰羙哉禹功子盍亦逺績禹功而大庇民乎對曰老夫罪戾是懼焉能恤逺吾儕偷食朝不謀夕何其長也劉子歸以語王曰諺所謂老將至而耄及之者其趙孟之謂也又曰齊侯田於莒蘆蒱嫳見泣且請曰余髮如此種種余奚能爲種種短也自言衰老不能復爲害又昭公四曰楚靈王至乾溪聞羣公子之死也自投于車下曰人之愛其子也亦如余乎侍者曰甚焉小人老而無子知擠于溝壑矣尚書盤庚曰汝無侮老成人無弱孤有㓜又洪範曰五福一曰壽百二十年又無逸曰自時厥後立王生則逸生則逸不知稼穡之艱難不聞小人之勞惟耽樂之從自時厥後亦罔或克夀以耽樂之故從是其後亦無有能壽考又吕刑曰惟吕命王享國百年耄荒言吕侯見命爲卿時穆王以享國百年耄乱荒怱雖老而能用賢以揚名論語里仁曰父母之年不可不知一則以喜一則以懼孔子曰見其壽老則喜見其衰老則懼又微子曰齊景公待孔子曰若季氏則吾不能以季孟之間待之曰吾老矣不能用也孔子行爾雅曰耆老也尚書中候曰齊桓公欲封禪謂管仲曰寡人日暮仲父年艾韓詩外傳曰楚丘先生見孟常君孟常君曰先生老矣春秋髙矣多遺忘矣何以教文先生曰使我投石超距追車赴馬逐麋鹿搏虎豹吾則老矣使我探計謀設精神决嫌疑出正辤尚諸侯吾乃始壯耳何老之有孟常君勃然汗出至踵曰文過耳又曰齊桓公見敏丘人曰叟年幾何對曰臣年八十三公曰羙哉壽也論語䜟曰仲尼曰吾聞堯舜等遊首山觀河渚乃有五老遊河渚一老曰河圗將來吿帝期二老曰河圗持龜告帝謀三老曰河圗將來吿帝書四老曰河圗將來告帝圗五老曰河圗將浮龍衘玉包金泥玉檢封盛書五老飛爲流星上入昴宋均注曰浮龍浮於水周書曰文王在鄗召太子發曰嗚呼我身老矣吾語汝我所保與我所守汝勤之我傳之子孫吾厚德而廣惠信忠而志愛不爲驕役不爲㤗靡括柱而茅茨爲民愛費也戰國䇿曰昔者秦魏爲國齊楚約攻魏魏使人求救於秦冠盖相望秦救不出魏人有唐祖者年九十餘謂魏王曰老臣請西說秦令兵出可乎曰敬諾遂約車遣之見秦王秦遽發兵救之史記曰秦使百里傒子孟明視蹇叔子西乞術將兵行行日百里傒蹇叔二人哭之繆公聞而怒二老曰臣非敢沮君軍軍行臣子與往臣老遟還恐不相及故哭耳又曰蔡澤從唐舉戯之乃曰富貴吾所自有吾所不知者夀也願聞之唐舉曰先生之壽從今以徃者四十三歲蔡澤笑而謝去謂其御曰吾持梁齧肥躍馬疾驅懷黄金之印結紫綬於腰揖讓人主之前食肉富貴四十三年足矣又曰王翦傳曰始皇問李信吾欲攻荆用幾何人而足信曰不過用二十萬人始皇問王翦翦曰非六十萬人不可始皇曰王將軍老矣何怯也李將軍壯勇其言是也王翦因謝病歸老於頴陽又曰上置酒太子侍四人從太子年皆八十有餘鬢眉皓白衣冠甚偉上恠之問曰彼何爲者四人前對各言名姓曰東園公角里先生綺里季夏黄公上乃大驚曰吾求公數歳公避逃我今公何自從吾兒游乎四人皆曰陛下輕士善罵臣等義不受辱故恐而亡匿竊聞太子爲人仁孝恭敬愛士天下莫不延頸欲爲太子死者故臣來耳上曰煩公幸卒調護太子又曰伏生者伏生名勝濟南人故秦博士也孝文欲求能治尚書者天下無有聞伏生能治召之是時伏生年九十餘老不能行乃詔太常掌故朝錯徃受之又曰武帝使束帛加璧安車駟馬迎申公弟子二人乗軺傳從見天子天子問治亂之事申公時巳八十餘對曰爲治者不至多言頋力行何如耳又曰李少君以祠竈却老方見上自謂七十嘗從武安侯飲㘴中有年九十餘老人少君乃言與其大父游射處老人爲兒時從其大父行識其處一㘴盡驚漢書曰文帝元年詔老者非帛不煖非肉不飽今歲首不時使人存問長老又無布帛酒肉之賜將何以佐天下子孫孝養其親哉具爲令有司請令縣道八十以上賜米人月一石肉二十斤酒五斗其九十以上又賜帛人二疋絮三斤賜物及當廪鬻米者長吏閱視丞若尉致之又曰馮唐趙人也以孝著爲中郎署長應劭曰此云孝子郎事文帝文帝輦過問唐曰父老何自爲郎家安在具以實對又曰張蒼食乳女子爲乳母妻妾百數曽孕子者不復幸猶是百餘歲乃卒又曰張安丗宣帝下詔曰安丗守職秉謙以安宗廟著節老臣令朝朔望號稱祭酒又曰石建爲中郎令建老白首萬石君尚無恙毎五日洗沐歸謁親入子舎竊問侍者取親中裙厠牏身自澣洒復予諸侍者子孫咸孝然建特爲甚又曰貢禹上書曰臣禹犬馬之齒八十一血氣衰竭耳目不聦非能復有𥙷益所謂素飡尸禄汚朝之臣也乞骸及身生歸郷里死無恨矣續漢書曰仲秋之月縣皆案户比民年七十者授之王杖長九尺端以鳩爲飾鳩者不咽之鳥欲老人不咽所以受民也是月也祠老人星於國南逺郊東觀漢記曰馬援字文淵建武二十年武陵五溪蠻夷深入軍没援因復請行年六十二帝愍其老未許之援自請曰臣尚能𬒳甲上馬帝令試之援據鞌頋盻以示可用帝笑曰矍鑠哉是翁也遂遣援又曰閔仲叔客安邑老病家貧不能買肉日買一片猪肝署或不肯爲斷安邑令候之問諸子何飯食對曰但食猪肝屠者或不肯與令出勑市吏後買輙得叔恠問其子道狀乃歎曰閔仲叔豈以口腹累安邑耶遂去之又曰班超自以乆在絶域年老思土上䟽曰臣常恐年衰奄忽僵仆不敢望到酒泉郡但願生入玉門關魏志曰田豫爲并州刺史徴爲衛尉屢乞遜位太傅司馬宣王以豫尅壯書喻未聽豫書荅曰年過七十而以居位譬猶鍾鳴漏盡而夜行不休是罪人也遂稱疾篤拜太中大夫食卿禄年八十二薨晉書曰華表太始中遷太常卿數歲以老病乞骸骨詔以表清貞履素有老成之羙而以疾固辭今聽如所上禄賜與卿同又曰劉寔字子眞少貧賣牛衣好學歴吏部尚書封脩陽子懷帝復授太尉辤以老九十一薨又曰祖逖進鎮雍丘略定河外躬自勸督農桑剋巳施下百姓感恱置酒大㑹耆老中㘴流涕曰某等老矣更得父母死將何恨又曰周訪少時遇善相者陳訓謂訪與陶侃曰二君皆位至方岳功名略同但陶上壽周下壽優劣在年耳齊書曰虞玩之字茂瑶年老有疾請退表曰四十仕進七十懸車壯即驅馳老冝休息知足不辱臣知足矣後魏書曰畢衆敬篤老乞還桑梓朝廷許之臨還獻其珠璫四具銀裝劒一口刺虎矛一枚仙人綾百疋文明太后與髙租引見於皇信堂賜酒饌車一乗馬三疋絹二百疋勞遣之又曰羅結代人丗祖𥘉爲散騎常侍遷侍中㹅三十六曹事年一百七歲精爽不衰丗祖以其忠慤甚見信待詔聽歸老賜太寧東川以爲居業并爲築城即號曰羅侯城至今猶在又曰刀雍以耆年特見優禮錫以几杖杖履上殿因致珎羞焉嘗經篤疾幾死見有神明救之言福門子當享長年後卒於洛州刺史又曰尉元許致仕詣闕謝老引見於庭命昇殿勞宴賜以玄冠素肥又詔充三老給上公之禄唐書曰太宗將伐遼東召李靖入閤賜坐御前謂曰公南平吴㑹北清沙漠西定慕容唯東有髙麗未服公意如何對曰臣徃者慿藉天威簿展微効今殘年朽骨唯擬此行陛下若不棄老臣病其瘳矣帝愍其羸老不許又曰嚴綬材器不踰常品事兄嫂過謹爲時所稱常以寛柔自持位躋上公年至大耋前後統臨三鎮皆號雄藩所辟士親暏爲將相者凢九人其貴壽如此周史曰蕭愿字惟恭梁宰相頃之子也𥘉愿之曽祖倣唐僖宗朝入相接客之次愿爲兒童効倣傳呼之聲倣謂客曰余豈敢以得位而喜所幸弈丗壽考吾今又有曽孫在目前矣及愿長事父母以孝稱後爲兵部郎卒之時年七十餘母猶在堂一門壽考人罕及者矣鬻子曰鬻子年九十見文王文王曰嘻老矣鬻子曰若使臣捕虎逐鹿則老矣使臣䇿國事則臣年尚少因立爲師莊子曰盗跖曰人上壽百歲中壽八十下壽六十孟子曰老吾老以及人之老又曰伯夷避紂居北海之濵太公避紂居東海之濵聞文王作興曰盍歸乎來吾聞西伯善養老者二老者天下之大老也而歸之是天下之父歸之天下之父歸之其子焉徃抱朴子内篇曰余亡祖鴻臚少卿時嘗爲臨沅令云此縣有廖氏家丗壽老或出百年或八九十徙去生子孫轉多夭折人有居其故宅復累丗壽由此覺是宅所爲疑其井水殊赤乃試掘井左右得古人埋丹砂數十斛去井數尺此丹砂汁因泉水漸洿入井是以飲其水而得壽况乃持丹砂而服之乎六韜曰文王祖父壽百二十而没王季百年而没文王壽九十七而没國語曰齊宣王出遊路見閭丘先生長老十三人謁齊王王賜之田衆老皆拜閭丘先生獨不拜又賜無役諸老復拜閭丘先生又不拜宣王疑而問之對曰來見大王所望者三願賜臣壽賜臣富賜臣貴王曰天命有長短非寡人所制無所壽先生倉粟雖盈備災畜無以富先生大官無闕小官卑賤無以貴先生先生曰所望願王選良吏臣少得壽焉使人以時役無煩苛此臣所以得富焉使少者敬長者長者敬老者此臣所以得其貴也王賜臣田田不租倉廪虛賜臣無役則官無所使非所望也王曰賜先生爲相可乎先生曰臣得三願足矣安用爲相又曰子竒年八十齊君任爲東阿旣行而君悔焉使人追之嘱使者曰未至追令還巳至勿追未至東阿使者反之齊君問故使者曰臣見子竒同載者皆白首矣夫老者之智少者之決此必能治東阿矣王曰善哉又曰昔衛武公年九十五儆於國曰苟在朝者無謂我老耋而舎我也必恭恪於朝夕以儆我聞一二之言志誦納之以訓道漢武故事曰上甞輦至郎署見一老髭鬚皓白衣服不完上問曰公何時爲郎何其老矣對曰臣姓顔名駟江都人也文帝時爲郎上問曰何不遇也駟曰文帝好文臣好武景帝好老臣又少陛下好少臣巳老是以三丗不遇上感其言拜爲㑹稽都尉新序曰孔子見宋榮啓期年老白首衣弊服鼓琴自樂孔子問曰先生老而窮何樂也啓期曰吾有三樂天生萬物以人爲貴吾得爲人一樂也人生以男爲貴吾得爲男二樂也人生命有傷夭吾年九十餘是三樂也貧者士之常死者人之終居常以守終何不樂乎說苑曰楚文王伐鄭使王子革子露居二子出遊老人戴畚從而乞食焉不與摶而奪之畚又曰晉平公問師曠曰吾年七十欲學恐晚如何對曰暮不炳燭耶臣聞少而學者如日出之陽壯而學者如日中之光老而學者如炳燭之明炳燭之明孰與昧行乎公曰善哉善哉申鑒曰學壽不至壽可以盡命新論曰余前爲王翁典樂大夫見樂家書記文帝時得魏文侯時樂人竇公百八十歳兩目皆盲文帝竒之問何能服食而至此耶對曰年十三失明父母哀之教使鼓琴日講習以爲常事臣不能道引無所服餌也譚以爲少盲恒逸樂所以益性命也神仙傳曰淮南王安好道術八公乃詣門門者見其垂白不進八公皆化成童子色如桃花門吏白王王迎之登思仙之臺張錦綺之帷設象牙之床燔百和之香進碧玉之几執弟子禮八公還成老人授之要道及郎中雷𬒳譛安安與八公昇天所踐石皆䧟今人馬之跡在焉王子年拾遺録曰昔老聃當周之末居及景日室之山與丗人絶迹唯有黄髮老叟五人或乘虎豹或乘鴻鵠衣毛羽之服眉覆於目耳垂至肩兩眸子皆黒方靣玉㓗手握青筠之杖出入于日室之中與老子談天文之數述異記曰尹雄年九十頭生角角半寸丗說曰頋恱與簡文同年而早白簡文問曰卿何以先老荅曰蒲柳之姿望秋而先落松栢之質逢霜而弥盛應璩詩曰昔有行道人陌上見三叟年各百餘歲相與鋤禾莠住車問三叟何以得此壽上叟前置辤室内嫗麄醜中叟前置辤量腹節所受下叟前置辤暮卧不覆首要哉三叟言所以能長乆太平御覽卷第三百八十三
