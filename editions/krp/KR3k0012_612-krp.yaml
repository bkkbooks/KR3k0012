  text: 太平御覽卷第六百一十二
  hash: sha256:a354655879bdd8faab568b32b182135310c911e6f8fa76cab833a6b2de616e5c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_612-1a}
body:
  text: 學部六博學博物博學論語曰大哉孔子博學而無所成名禮記曰君子之學也傳其服也郷易大畜卦云君子以多識前言往行以畜其徳續漢書曰班固字孟堅九歳能屬文誦詩賦及長遂博覽載籍九流百家之言無不窮究東觀漢記曰楊震字伯起受歐陽尚書於桓郁明經博覽無不窮究諸儒爲之語曰關西孔子楊伯起謝承後漢書曰王充字伯任好學博覽常遊洛陽市閱所賣書一見輙能誦憶遂博通衆流百家之言又曰黄香知古今羣書無不渉獵帝以香先帝所異毎有疑帝時特訪問又詔香詣東觀讀所未甞見書又曰賈逵字景伯弱冠誦左氏語云問事不休賈長頭也王隱晉書曰皇甫謐羸病手不釋卷歴觀今古無不皆綜又曰張華博覽圖籍四海之内若指諸掌丗祖問華千門萬户畫地而成晉書曰何劭惠帝即位𥘉建東宫太子年㓜欲令親萬機以劭爲太子師劭博學善屬文陳說近代事若指諸掌三國典略曰陳遺兼通直散騎常侍姚察聘於周沛國劉臻竊於公舘訪漢書疑事十餘條並爲剖析皆有經據臻謂所親曰名下定無虚士齊書曰賈希鏡宋孝武時青州人發古冢銘云青州丗子東海女郎帝問學士鮑昭徐爰蘇寳生並不能悉希鏡對曰此是司馬越女嫁茍晞兒檢訪果然由是見遇又崔慰祖傳曰國子祭酒沈約吏部郎中謝眺甞於吏部省中賔友俱集各問慰祖地理中所不悉十餘事慰祖口吃無華辭而酬據精悉一座稱服之眺歎曰假使班馬復生無以過此蕭子顯齊書曰王儉自以博聞多識讀書過陸澄澄曰僕少小來無事唯以讀書爲業其年巳倍今君少便鞅掌王務雖復一覽便諳然見卷軸未必多僕儉集學士何寧等盛自啇略澄待儉詩畢然後談所遺漏數百千條皆儉所未覩儉乃敬服儉在尚書省出巾箱机案新服飾令學士隷事多者與之人各得一兩物澄後來更出諸人所不知事復各數條并奪物將去梁書曰韋叡子稜字威直性恬素以書史爲業博物強記當代之士咸就質疑隋書曰王邵𥘉在齊時祖孝徴魏收陽休之等甞論古事有遺忘討閱不能得因呼邵問之邵具論所出取書驗之一無舛誤自是大爲時人所許稱其博物唐書曰李守素尤爲譜學妙諳人物自晉宋以降四海士流及周魏以來諸貴勲等華戎閥閱靡不詳究時號爲肉譜甞與虞丗南等六人同直學舘其夜七夕内出珎饌有教賦詩因共談人物𥘉言江左東南猶相酬對及言北臺諸姓次第如流顯其歴葉皆有據證丗南但撫掌而笑不復能荅旣而歎曰肉譜定可畏許敬宗因謂丗南曰李倉曹以善人物乃得此名雖爲美事然非雅號曰君旣言成准的冝有以改之荅曰卿言是也昔任彦昇善談經籍梁代稱爲五經笥今目倉曹爲人物志可乎杜如晦等咸以爲佳又曰蔣乂㓜好學德宗甞幸凌煙閣見左壁頽剥上有殘缺文記毎行可辯三五字命録之以問宰臣宰臣卒然無以對遽召乂訪之對曰此聖歴年侍臣圖賛也暗誦諷不失一字宰臣上奏德宗歎曰虞丗南暗冩列女傳無以加也國語曰晉文公使趙衰爲卿辭云欒枝貞慎先􅎮有謀胥臣多聞皆可以爲輔也孟子曰人皆知糞其田而莫知糞其心何謂糞心博學多聞也莊子曰惠施多方其書五車稱連環可解袁子正書曰學莫大於博行莫過於約聖人者天下之至智也博學以聚之兼聽而辯之抱朴子曰洪年十六始習孝經論語易但貪廣覽於衆書曽披渉自正經諸史百家之言近將萬卷又曰夫周公上聖而日讀百篇仲尼天縱而韋編三絶墨翟大賢載文盈車仲舒命世不窺園圃倪寛帶經以芸鋤路生截蒲以冩書黄覇桎梏以受業寗子夙夜以倍功故能究覽玄奥窮測微言典論曰孔融陳琳王粲徐幹阮禹應瑒劉楨七子者於學無所遺於文無所假文士傳曰張華窮覽古今甞徙居有書三十乗金樓子曰丘遟出爲永嘉郡公祖道於東都亭敬子沈隱侯俱至丘云少來捜集書史頗得諸遺書無復首尾或失名姓凡有百餘卷皆不得可知今併欲焚之二客乃謂主人云可皆取出共看之傳金紫末至二客以向諸書示之傳乃發擿剖判皆究其流出所得三分有二賔客咸所恱伏國朝傳記曰太宗甞出行有司請載副書以從上曰不湏虞丗南在此行祕書又曰太宗稱虞監博聞德行書翰詞藻忠直一人而巳兼是五善博物家語曰夫子曰子産於民爲惠主於學爲博物吾以兄事之也左傳昭元年曰晉侯有疾鄭伯使公孫僑如晉聘且問疾叔向問焉曰寡君之疾病卜人曰實沈臺駘爲崇史莫之知敢問此何神也子産曰昔髙辛氏有二子伯曰閼伯季曰實沈居于曠林不相能也日㝷干戈以相征討后帝不臧遷閼伯于啇丘主辰啇人是因故辰爲啇星遷實沈于生疾矣僑又聞之内官不及同姓内官嬪御其生不殖殖長也美先盡矣則相生疾同姓之相與先美矣美極則盡盡則生疾之君子是以惡之故志曰買妾不知其姓則卜之違此二者古之慎也一四時取同姓二者古人所慎男女辨姓禮之大司也辨別也今君内實有四姬焉同姓姬四人其無乃德是也乎若由是二者弗可爲也已爲治也四姬有省猶可無則必生疾矣據異姓去同姓故言省叔向曰善哉肸未之聞也晉侯聞子産之言曰愽物君子也重賄之又昭七年傳曰子産聘于晉晉侯有疾韓宣子逆客私焉私語曰寡君寢疾於今三月矣並走羣望晉所望祀山川皆走往祈禱有加而無瘳今夢黄熊入於寢門其何厲鬼也對曰以君之明子爲大政其何厲之有昔堯殛鯀于羽山羽山在東海祝其縣西南其神化爲黄熊以入于羽淵實爲夏郊三代祀之鯀禹父夏家郊祭之歴殷周二代又通在羣神之數并見祀晉爲盟主其或者未之祀乎言周衰晉爲盟主得佐天子祀羣神韓子祀夏郊祀鯀晉侯有間間差也賜子産莒之二方鼎方鼎莒所貢漢書曰張安丗字子孺給事尚書上幸河東亡書三篋詔問莫能知唯安丗識之具作其事後求得書以相校無所遺失上竒其材擢尚書令晉書張華傳曰人有得鳥毛長三丈以示華華見慘然曰此謂海鳬毛也出則天下亂矣陸機甞餉華鮓于時賔客滿座華發器便曰此龍肉也衆未之信華曰試以苦酒濯之必有異旣而五色光起機問鮓主果云園中茅積下得一白魚質狀殊常以作鮓過美故以相獻武庫封閉甚宻其中忽有雉雊華曰此必虵化爲雉開視雉側果有虵蛻焉吴郡臨平岸崩出一石鼓槌之無聲帝以問華華曰可取蜀中桐材刻爲魚形扣之則鳴矣於是如其言果聲聞數里𥘉吴之未滅也斗牛之間常有紫氣道術者皆以吴方強盛未可圖也唯華以爲不然及吴平之後紫氣愈明華聞豫章雷焕妙逹象緯要之宿因登樓仰觀煥曰寳劒之氣耳在豫章豊城因以煥爲豊城令使求之煥到縣掘獄屋基得雙劒其夕斗牛間氣不復見焉煥以南昌西山北巖下土以拭劒光芒艶發遣使送一劒并土與華留一自佩華以南昌土不如華隂赤土因以華隂土一斤致煥煥更以拭劒倍益精明又魏時殿前鍾忽大鳴震駭者華云此蜀山毀故鍾鳴㝷蜀郡上其事也又曰武帝常問摯虞三日曲水之義虞對曰漢章帝時平原徐肇以三月生三女至三日俱亡材人以爲怪乃招携之水濵洗祓遂因水以泛觴其義起此帝曰必如所談便非好事束晳進曰虞小生不足以知臣請言之昔周公城新威斗王莽三公亡皆賜之一在冢外一在冢内時三台江左者唯甄邯爲大司徒必邯之墓俄而又啓冢内更得一斗復有一石銘大司徒甄邯之墓蕭子顯齊書曰東海王摛亦史學博聞歴尚書左丞竟陵王子良校試學士唯摛問無不對永明中天忽黄色照地衆莫能解摛云是榮光丗祖大恱梁書裴子野傳曰時西北逺邊有白題及滑國遣使由岷山道入貢此二國歴代弗賔莫知所出子野曰漢潁隂侯斬胡白題將一人服䖍注曰白題胡也又漢定逺侯擊虜入滑此其後乎時人服其博識又曰樂藹爲御史中丞時長沙宣武王將葬而車府忽於庫失油絡欲推主者藹曰昔晉武庫火張華以爲積油萬石必燃今庫若有灰非吏罪也旣而檢之果有積灰時稱其博物引恕三國典略曰齊徐之才見有人以五色班蘭骨爲刀把者之才曰此人瘤也問所得處云於塚見髑髏骨長數寸試削視有文理故用之又曰周平蜀還得樂器者皆莫之識太常少卿斛斯瀓直陵切見之曰此錞于也人弗之信瀓遂依于寳周禮注以芒筒捋之其聲極振衆乃歎服瀓取以合樂焉隋書曰崔頥大業四年從駕汾陽宮次河陽鎮藍田令王曇於藍田山得一玉人長三尺四寸着大領衣冠幘奏之詔問群臣莫有識者頥荅曰謹案漢文以前未有冠幘即是文帝以來所制作也臣見魏大司農盧元明撰嵩山廟記云有神人以玉爲形像長數寸或出或隠出則丗延長伏惟陛下應天順民定鼎嵩雒岳神自見臣敢稱慶因再拜百官畢賀天子大恱賜縑二百國語曰海鳥爰居上於魯東門之外三日臧文仲使國人祭之文仲不知以爲神展禽曰越哉臧孫之爲政也越迂也言其迂闊不知所要也夫祀國之大節也而節政之所成也故慎制祀以爲國典今無故而加典非政之冝也夫聖王之制祀也功施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能扞大患則祀之非是族也不在祀典今海鳥至巳不知而祀之以爲國典難以爲仁且智矣夫仁者講功而智者處物無功而祀之非仁也不知而不問非智也今兹海其有災乎夫廣川之鳥獸恒知而避其災也是歳也海多大風冬煖爰居所避文仲聞栁下季之言使書以爲三筴筴簡書也三篋三卿卿一通也謂司馬司徒司空又曰季桓子穿井獲如土缶其中有羊焉使問之仲尼曰吾穿井而獲狗何也獲羊言狗者以孔子博物測也對曰以丘之所聞羊也丘聞之木石之怪曰䕫蝄蜽水之恠曰龍罔象土之恠曰墳羊又曰吴伐越隳㑹稽獲骨一節專車骨一節其長專車專壇也吴子使來好聘問之仲尼仲尼曰丘聞之禹致群臣於㑹稽之山防風氏後至禹殺而戮之防風汪茫氏君之名違命後至故禹殺之陳尸爲戮其骨專車焉此爲大矣客曰敢問誰守爲神仲尼曰山川之靈足以紀綱天下者其守爲神紀綱天下謂名山大川龍興雲致兩以利天下社稷之守爲公侯封國立社稷而山川之祀者爲諸侯令守之是公侯皆屬於王者客曰防風何守仲尼曰汪茫氏之君汪芒長翟國名守封嵎山者也封封山嵎嵎山在今吴郡永安縣也爲七姓柒汪芒氏之姓在虞夏啇爲汪茫氏於周爲長翟周丗其國北遷爲長翟今爲大人今孔子時客曰人長之極幾何仲尼曰僬僥氏長三尺短之至也僬僥西南蠻之别也長者不遇十之數之極也十之三丈則防風氏又曰仲尼在陳有隼集于陳侯之庭而死楛矢貫之石砮其長尺有咫隼鷙鳥鶚也楛木名砮鏃也石爲之八寸曰咫楛矢貫之墜而死也陳惠公使以隼如仲尼之館問之惠公哀公之孫悼太子之子吴也仲尼曰隼之來也逺矣此肅慎氏之矢也肅慎北夷之國昔武王克啇通道于九夷八蠻使各以其方賄來貢使無忘職業於是肅慎氏貢楛矢石砮其長尺有咫先王欲昭其令德之致逺物也故銘其栝曰肅慎氏貢楛矢以分大姬配虞胡公而封諸侯分矛也大姬武王元安胡公舜後虞遏父之子胡滿古者分同姓以寳玉所以展親也展重若夏后氏氏之璜也異姓以逺方之職貢使無忘服也故分陳以肅慎氏之貢陳僞姓君若使有司求諸故府其可得也故府舊府使求得之金櫝如之家語曰楚昭王渡江江中有一物大如斗貟而赤直觸王舟舟人取之王大怪之徧問群臣莫能識使使聘於魯問孔子孔子曰此萍實也唯覇者爲能獲之使者返王食之大美乆之使來以告魯大夫大夫因子游問曰何以知其然曰吾昔之鄭過陳之野聞童謡曰楚王渡江得萍實大如斗赤如日剖而食之甜如蜜此是武王之應也益部耆舊傳曰蜀郡張寛漢武帝時爲侍中從祀甘泉至渭橋有女子浴於渭水乳長七尺上怪其異遣問之女曰帝後第七車知我所來時寛在第七車對曰天皇主祭祀者齋戒不嚴則女人見郭璞注山海經曰漢宣帝使人上郡發盤石石室中得一人徒祼𬒳髮反縛裓一足以問群臣莫能知劉子正對曰昔貳負之臣曰免與貳負殺窫窳帝乃括之於踈屬之山括繫縛也音适桎其右足反縛兩手繫之山上盤石之下宣帝大驚於是時人争學山海經國朝傳記曰潤州得玉磬十二以獻張率更叩其一曰是晉某歳所造又有人於古墓中得銅物似琵琶而身正圎元行冲云此阮咸所造事並具樂部太平御覽卷第六百一十二
