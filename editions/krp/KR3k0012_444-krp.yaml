front:
  text: 太平御覽卷第四百四十四
  hash: sha256:ecbedcea32c85f6527a6db2fccde72b53585c9842548674d7d878dc8740e30ae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_444-1a}
body:
  text: 人事部八十五知人下唐書曰王珪㓜孤性雅澹少嗜慾志量沉深能安於貧賤體道履正交不茍人叔父頗當時通儒有人倫之鍳嘗謂所親曰門户所寄唯在此兒耳又曰裴行儉有人倫之鑒自掌選及爲大惣管凡遇賢俊無不甄採毎制敵摧兇必先期捷日時有後進楊烱王勃盧昭隣駱賔王並以文章見稱吏部侍郎李敬玄盛爲延譽引以示行儉行儉曰才名有之爵禄蓋寡楊應至令長餘並鮮能令終是時蘇味道王勮未知名因調選行儉一見深禮異之仍謂曰有晚年子息恨不見其成長二公十數年當居衡石願記識此軰其後相繼爲吏部皆如其言行儉嘗所引偏禆有程務挺張䖍朂崔智𧦬王方翼党金毗劉敬同郭待封李多祚黒齒之盡爲名將位至刺史將軍者數十人其所知賞多此類也又曰狄仁傑授汴州判佐時工部尚書閻立夲爲河南道黜陟使仁傑爲吏人誣告立本見而謝曰仲尼云觀過知仁矣足下可謂海曲之明珠東南之遺寳薦授并州都督府法曹又曰張守珪儀形瓌壯善騎射性慷慨有節義時盧齊卿爲豳州刺史深禮遇之常共榻而坐謂曰足下數年外必節度豳凉爲國之良將方以子孫相託豈得以寮屬常禮相期耶又曰李勉以故吏前密縣尉王晬子對切勤幹俾攝南鄭令俄有詔處死勉問其故乃爲權倖所誣勉詢將吏曰上方藉牧宰爲人父母豈以譖言而殺不辜乎即亭詔拘晬飛表上聞晬遂獲宥而勉竟爲執政所非追入爲大理少卿謁見靣陳王晬無罪政事修舉盡力吏也肅宗嘉其守正即日除太常少卿王晬後以推擇拜大理評事龍門令終有能名時稱知人又曰李晟德宗之幸山南旣入駱谷謂渾瑊曰渭橋在賊腹内兵勢懸隔李晟可辦事乎瑊對曰李晟秉義執志臨事不可奪以臣計之破賊必矣帝意始安又曰楊嗣復字繼之僕射於陵之子也𥘉於陵十九登進士第二十再登博學宏詞科調𥙷潤州句容尉浙西觀察使韓滉有知人之鍳見之甚恱滉有愛女方擇佳婿謂其妻柳氏曰吾閱人多矣無如楊生貴而壽生子必爲宰相於陵秩滿寓居楊子而生嗣復後滉見之撫其首曰名位果踰於父楊門之慶也因字曰慶門竟如其言又曰于邵傳云樊澤嘗舉賢良方正邵一見之於京師謂樊將相之材也不五年擇爲節將又曰李德𥙿與牛僧孺有隙或以韋温厚於牛僧孺言於德𥙿𥙿曰此人堅正中立君子也又曰劉三復長慶中李德𥙿拜浙西觀察使三復以德𥙿禁密文臣以所業文詣郡干謁德𥙿閱其文倒屣迎之乃辟爲從事後魏書曰崔亮傳云崔亮字敬儒清河東武城人也時隴西李冲當朝任事亮從兄言之於冲冲與亮語因謂亮曰比見卿先人相命語使人胸中無復怵迫之念竒之延爲館客冲謂兄子竒曰大崔寛和篤雅汝冝友之小崔生峭整清徹汝冝敬之二人終將大至孔叢子曰魏安釐王問子順馬回之爲人雖少文然梗直有丈夫之節吾欲以爲相可乎荅曰知臣莫若君何有不可至於亮直之節臣未之明也曰何故荅曰臣聞諸孫卿其爲人長目而永視者必體方而心圎毎以其法相人千百不失臣見回非不偉其體幹然甚疑其目王卒用之三月王果以謟得罪淮南子曰寗戚欲干齊桓公困窮無以自逹於是爲啇旅將牛車暮宿於郭門之外桓公郊迎客夜爝火甚盛從者甚衆戚飯牛車下望見桓公而悲擊角而疾啇歌桓公聞之撫其㒒之手曰異哉歌者非常人也命後車載之賜衣冠說苑曰楚令尹虞丘子復相莊王曰臣聞奉公行法可以得榮能淺行薄無望上位臣爲令尹十年矣國故不治獄訟不息臣竊選國俊士孫叔敖秀才多能其性無欲君舉而授之政則國可使寜而士民可使附莊王從之虞丘子萊田三畒號曰國老以孫叔敖爲令尹虞丘子家干法叔敖執而戮之虞丘子喜曰叔敖果可使持正矣傳子曰劉備襲蜀丞相掾趙幾曰劉備其不濟乎拙於用兵毎戰毎敗奔亡不暇何以圖人徴士傳朝曰劉備寛仁有度能得人死力諸葛亮逹治知變正而有謀而爲之相張飛關羽勇而有義皆万人之敵而爲之將此三人者皆人傑也以劉備之略三傑佐之何爲而不濟也郭子曰兾州刺史楊淮字彦清二子喬髦有識俱緫角爲成器淮與裴頠樂廣友善遣見之頠謂淮曰喬當及卿髦小減也廣謂淮曰喬自及卿髦尤精出淮笑曰我二兒之優劣乃裴樂之優劣議者皆許之又曰王仲祖云眞長知我勝我自知又曰王渾妻鍾生女甚賢明令武子爲妹擇嘉壻而未有其人兵家子有才欲以妻之獨與母議初不告事定乃白母曰誠是地也自可貴要當令我見之於是武子令此兵與羣小雜處使母帷察之母曰刑衣者汝可抜乎武子曰是母曰此才足以抜萃然地寒非長年不足展其才用觀其形骨恐不可與婚數年果死吕氏春秋曰魏公叔座疾惠王徃問之曰公叔之病甚矣將奈社稷何對曰臣之御庶子鞅也願王以國聽之若不能聽勿使出境王不應出而謂左右曰豈不悲哉以叔之賢而今謂寡人以聽鞅悖也公叔死公叔鞅西遊秦秦孝公聽之秦果強魏果弱竹林七賢論曰山濤與阮籍嵇康皆一靣而契若金蘭濤妻韓氏嘗以問濤濤曰當年可爲友者唯此二人耳妻曰負羇之妻亦觀狐趙意欲一窺之可乎濤曰可也二人至妻勸濤留之宿其酒食夜穿牖而窺之濤入曰所見何如吾妻曰君才殊不如也正當以識度相友濤曰然伊軰亦當謂我識度勝丗說曰袁宏少貧常爲人傭載運謝鎭西常夜泊舟江渚清風明月聞賈客舫上有詠聲甚有清致聽所詠詩又所未嘗聞歎羙不能巳即遣人委曲訊問乃是袁宏自誦其詠史詩遂厚相賞重又曰郄太尉遣門生與王丞相書永女壻曰請徃東齊中選之門生歸白郄云王家諸郎亦皆可然聞覔女壻咸自矜持唯有一郎在東床上坦腹食如不聞郄云此正嘉壻旣而訪焉乃逸少也又曰顧和始爲楊州從事月旦當朝停車州門外周侯詣丞相歴和車邊過和覔虱夷然不動周旣過返還指顧心曰此中何所有頋擇虱如故徐應曰此中最是難量地周侯旣入語丞相曰卿州吏有一令僕才語林曰夏少明在陳國不知名聞裴逸民知人乃褁粮寄載入洛從之未至裴家少許見一人着黄皮袴褶乗馬將獵夏問逸民家逺迩荅曰君何以問夏曰聞其名知人故從會稽來投之裴曰身是逸民明可更來明徃逸民果知之又嘉其志局乃用爲西門候於此遂知名又曰魏武將見匈奴使自以形陋不足雄逺國使崔季珪代乃自捉刀立牀頭坐旣畢使僕問曰魏王何如使荅曰魏王信自雅望非常然牀頭捉刀人此乃英雄魏王聞之馳遣殺此使丗說曰王濬冲裴叔則二人於緫角時詣鍾士季湏臾去後客問向二童子是誰曰裴王客曰何如鍾曰裴楷清通王戎簡要湏三十年此二賢當爲吏部尚書兾尓時天下無復滯才崔鴻前燕録曰慕容廆㓜而魁岸羙姿貌身長八尺雄桀有大度晉安北張華一見竒之謂廆曰君長必爲命丗之器定難濟時者也遺廆冠簪以結慇懃崔鴻前秦録曰姜宇字子居天水兾人也少孤貧爲河北陳不識家牧羊年十五身長七尺九寸聦惠羙風儀毎夜專讀書睡則縣頭于屋梁逵旦而止不識竒之將妻以女其妻弗聽不識乃置酒引宇令女潛觀之問女曰姜宇人士才明吾欲以汝妻之汝母難曰宇家之牧人汝意云何女曰觀宇之姿才豈復爲人牧羊也遂妻之宇後歷位京兆尹御史中丞郭林宗別傳曰郭㤗字林宗入頴川則友李元禮至陳留則結符偉明之外黄則親韓子助過蒲亭則師仇季智止學舎則収魏德公觀耕者則抜茅季偉皆爲名士至汝南見袁閎不宿而去從黃憲三日乃去過新蔡薛懃問之曰足下見袁奉髙不宿而去從黃叔度乃弥曰何也㤗曰奉髙之流雖清而昜挹叔度汪汪若千畒之陂澄之不清撓之不濁難測量也何顒別傳曰顒字伯求有人倫鍳同郡張仲景緫角造顒顒謂曰君用思精而韻不髙將爲良毉卒如其言顧和別傳曰和字君孝緫角時頋榮曰此吾家驥興衰宗必此子也頋珠亦有令問榮謂珠曰卿速歩君孝超卿矣孟嘉别傳曰庾亮抜孟嘉爲勸學從事禇褒爲豫章太守出朝亮正旦大㑹州府人士率嘉集坐第甚逺問亮曰江州有孟嘉其人何在亮曰在坐卿但自覔襃歷觀之乆指嘉謂亮曰此君小異將無是乎衛玠別傳曰劉眞長謝仁祖並知名時人啇略中朝人士或問弘治可得方衛洗馬不謝曰安得相比其間可容數人三輔決録曰龐知伯名勃爲郡小吏東平衛農爲書生窮乏乃客鍜於勃家知伯知其賢尤加禮待雇直過償及去送十里過舅家復貸錢贈之農不肯受勃曰不受令勃不告農乃受曰爲馮翊乃相報後果爲馮翊太守勃子爲門下書佐又曰游殷字㓜齊與司隷校尉胡􅎮有隙輕誣構殺之𥘉殷爲郡功曹有童子張旣者時未知名爲郡書佐殷察異之旣過家具設賔饌及旣至殷妻笑曰君甚勃乎張德容童昏小兒何異殷曰卿勿恠乃方伯之器也殷遂與旣論霸王之事饗訖以楚子託之􅎮害殷月餘得病目脫但言伏罪游㓜齊將鬼來於是遂死諺曰生有知人之明死有鬼靈之驗又曰王諶字子嗣博學有才辨洛陽种景伯武原呉季髙未知名諶數稱二人於朱伯厚有宰輔之器退語二人曰卿必爲公而景伯至司徒季髙至司空丗以是服諶之知人也會稽典録曰盛憲字孝章嘗出行逢一童容貌非常憲恠而問之是魯國孔融融時年十餘歳憲下車執手載以歸舎與融談宴知其不凢便結爲兄弟因升堂見親汝南先賢傳曰薛勤字恭祖仕郡功曹陳仲舉時年十五爲父賫書詣勤勤見而察之明日徃造焉仲舉父出見勤勤曰足下有不凡子吾來候之不從卿也言議盡日乃歎曰陳仲舉有命丗才王才之具又見黃叔度於童㓜云當爲内盛德其後二賢英名並耀於丗又曰謝甄禀氣聦爽明識逹理見許子將兄弟弱冠之歳曰平輿之淵有二龍出焉察其昐睞則賞其心覩其頋歩則知其道襄陽耆舊記曰劉備訪丗事於司馬德操操曰儒生俗士豈識時務哉此間自有伏龍鳯鶵備問誰曰諸葛孔明龐士元也並用爲軍師中郎又曰潘記見温習十數歳時曰此兒名士必爲吾州里議主勑子弟與善温後果爲荆州太公平令又曰李衡字叔平漢末父將走入呉以下户調爲武昌渡民聞羊衜有人物徃干之衜曰多士之丗尚書劇曹郎才也勸習筮仕以女配之太平御覽卷第四百四十四
