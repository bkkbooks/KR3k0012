  text: 太平御覽卷第六十六地部三十卜
  hash: sha256:626bc404d8c52f34fcbff144d895b1082cceafe95a02ea58a1c69e5f378767a8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_066-1a}
body:
  text: 湖潭湖廣雅曰湖池也說文曰湖大陂也史記曰三苗氏左洞庭右彭蠡德義不修舜滅之此在德不在險晉書曰陳訓少學天文孫皓以爲奉禁都尉知皓必敗時錢塘湖開或言天下當太平青盖入洛皓以問訓對曰臣能望氣不逹湖開塞退告友曰青盖入洛將有舁襯衘璧之事非吉祥也宋書曰㑹稽太守孟顗事佛精懇而爲謝靈運所輕嘗謂顗曰得道應湏惠業文人生天當在靈運前成佛必在靈運後顗深恨之㑹稽東郭有廻踵湖靈運求决以爲田顗堅執不與又求始寜岯崲湖爲田顗又固執靈運謂顗非存利民正慮決湖多害生命言論毀傷與顗遂搆讐隙唐書曰禇無量字弘度杭州鹽官人也㓜孤貧厲志好學家近臨平湖時湖中有龍鬪傾里閈就觀之無量時年十二讀書晏然不動風俗通曰湖都曰流瀆四靣所隈都也周官楊州其浸五湖案張勃呉録五湖者太湖之別名以其周行五百餘里故以五湖爲名虞翻又云太湖有五道别謂之五湖或說以太湖射貴湖上湖洮湖洮湖一名長塘湖在義烏滿户伯切湖爲五湖案國語呉越戰於湖直在笠澤一湖中戰耳則知或說非也隋大業記曰五月夏至前三五日呉郡太湖中白魚向湖側淺水菰蒲之上産子民得採之隋時貢於洛楊州記曰太湖一名震澤一名笠澤一名洞庭史記三苗之國左洞庭右彭蠡裴駰注云今湖中苞山有石穴其深洞無知其極者名洞庭洞庭對曰彭蠡則知因此穴之名通呼洞庭彭蠡即宫庭湖名也越絶書云太湖周三萬六千里在呉興也荆州記曰宫亭即彭蠡澤也謂之彭澤湖一名匯孩賄切澤在豫章郡青草湖一名洞庭湖洞庭湖亦謂之太湖在巴陵郡雲夢澤一名巴丘湖凢此並昭昭尤著又廣大也干寳捜神記曰由權縣秦時長水縣始皇時童謡曰城門有血城當䧟没爲湖有嫗聞之朝徃窺門將欲縛之嫗言其故後門侍以犬血塗門嫗見血走去忽有大水欲没縣主簿令幹入白令令曰可忽作魚幹曰明府亦作魚遂淪爲湖鄭緝之永嘉記曰懷北縣有蔣公湖父老云先代有祭祀祈請者湖輙下大魚與之秦州記曰武都郡前有湖義熈𥘉有白龍於湖升天盛弘之荆州記曰宫亭湖廟神甚有靈驗塗旅經過無不祈禱能使湖中分風而忛南北又曰巴陵南有青草湖周廻數百里日月出没其中湖南有青草山故因以爲名劉澄之荆州記曰華容縣東南有雲夢澤一名巴丘湖荆州之藪也劉澄之豫州記曰陳縣地有芍陂湖魏將王陵與呉將張休交戰處也黄閔武陵記曰有湖名爲丹陂周廻數百頃清波澄映洲嶼相望武昌記曰武昌長湖通江夏有水冬則涸于時靡所産植陶太尉立塘以遏水於此常自不竭因取瑯琊郡隔湖魚菱以着湖内菱甚甘美異於他故所産鮒魚乃長三尺劉道眞錢塘記曰明聖湖在縣南去縣三里父老相傳有金牛時見神化莫測故以明聖垂名西京雜記曰顧翶少失父事母好食雕胡飯常帥子女躬自採擷還家導水鑿川供養毎有盈儲家近太湖湖中乃生雕胡無復雜草蟲鳥不敢至焉遂得以爲養郡縣表其閭舎江乗地記曰滆湖中有嘉魚美蓴劉欣期交州記曰有一湖去舎浦四十里毎隂雨日百姓見有銅舩出水上又有一牛在湖中以鷄酒爲祭便大獲魚若此禮不設唯得牛糞而巳述征記曰桓冲爲江州刺史遣人周行廬山兾覩靈異旣陟崇巘有一湖匝生桑樹有白鵠湖中有赤鱗魚使者渴極欲徃飲水有赤鱗魚張鬐向之使者不敢飲南康記曰空山上有平湖湖中有艑音便底浮在湖中動揺便起風雨鄭緝之東陽記曰北山去郡三十餘里有赤松廟故老相傳云其下有居民曰徐公者甞登嶺至此處見湖水二人共博於湖間自稱赤松子安期先生有一壷酌酒以飲徐公公醉而寐其側比醒不復見劉澄之豫州記曰城父縣有巢湖湖周五里湖中有三山湖南有四鼎山戰國䇿曰秦與荆戰大破之取洞庭五渚呉地記曰呉王葬女取土成湖又郡國志云三女墳在郭西云闔閭食蒸魚羮留半賜三女三女怨自殺王痛之葬於郭西文石爲槨金印玉牒銀樽朱盤悉以送葬又云盤郢之劒或曰湛鑪之劒夜飛適楚以水繞墳因名女墳湖又云葬女時有白鶴舞呉市因入羡門悉化爲犬錢塘記曰去邑十里有詔息湖古老相傳昔秦始皇廵狩經塗暫憇因詔以息爲名周景式廬山記曰山頂有一窮湖湖足頳尾鯉鬐皆傷剥而又有一故艑槽崇山峻逺非舟檝所㳺豈深谷爲陵而此物不與丘壑同遷乎顧微廣州記曰廬山上有一湖至甲戌日輙聞山有鼔角聲劉澄之揚州記曰新城縣東有俱山山上有湖湖中有白鵝一隻時時飛來不可常見劉楨京口記曰龍目湖秦王東游觀地勢云此有天子氣使赭衣徒鑿湖中長岡使斷因改爲丹徒今水北注江也梁典曰武帝望京峴山盤紆似龍掘其右爲龍目二湖徐州先賢傳曰句踐滅呉謂范蠡曰吾將與子分國而有之蠡曰君行令臣行意乃乗扁舟浮五湖而不返水經注曰武強縣耆宿云邑人有行於途有一小虵疑其有靈持而養之名曰檐生長而吞噬人里中患之遂捕繫獄檐生負而奔邑淪爲湖縣長及吏咸爲魚矣今縣東北半許里有淵謂之郎君淵耆宿又言縣淪之日其子東奔又䧟於此故淵得郎君之目矣神異經曰北方荒外有湖方千里平滿無髙下有魚長七八尺刑狀如鯉而目赤晝在湖中夜化爲人刺之不入煑之不死以烏梅二七煑之即熟食之可以愈邪病又曰北方荒中有石湖方千里無凸凹上直結反下於交反平滿無髙下岸深五丈餘恒氷唯夏至左右五六十日解耳又曰東南海中烜洲上有温胡其中唯有鯽魚焉長八尺食之宜暑而避寒郡國志曰潤州遏陂有湖名龍目湖京口出好酒人習戰故桓温云京口土瘠人窶無可戀唯酒可飲兵可用耳㑹稽記曰漢順帝永和五年㑹稽太守馬臻創立鏡湖在㑹稽山隂兩縣界築塘蓄水髙丈餘田又髙海丈餘若水少則洩湖灌田如水多則開湖洩田中水入海所以無凶年堤塘周逥三百一十里漑田九千餘頃又㑹稽記云創湖之始多淹塜宅有千餘人怨訴於臺臻遂𬒳刑於市及臺中遣使按鞠㹅不見人驗籍皆是先死亡人之名又按輿地志云山隂南湖縈帶郊郭白水翠巖㸦相映發有若圖畫南徐州記曰子英常於芙蓉湖捕魚得赤鯉持歸以榖養一年遂生角翅魚云我來迎汝子英騎之即乗風雨騰而上天故列仙傳云毎經數載来歸見妻子魚復來迎如是數十迴而不還芙蓉湖即射貴湖也又名上湖呉地記曰臨平湖在臨平山南呉志曰歸命侯天璽元年呉郡言臨平湖自漢末草穢擁塞今更除平古老相傳云此湖塞天下亂此湖開天下平又湖邊得石函凾中有小石青色長四寸廣二寸餘刻上作皇帝字於是改年大赦俄而晉平呉孫盛以爲元皇中興之符歙縣圖經曰黄墩湖在縣西南其湖有蜃常與吕湖蜃闘程靈銑好勇而善射夢蜃化爲人告之曰吾爲吕湖蜃所厄君能助吾必厚報束帛練者吾也明日靈銑彎弧助之正中後蜃不知所之後人名其處爲蜃灘時有一道人詣靈銑母求食食訖曰勞母設食今當爲求善墓地使母隨行上山以白石識其地曰葬此可以暴貴矣靈銑因移父葬其所侯景亂靈銑率郡郷萬餘衆保新安因隨陳武帝有竒功及陳武受梁禪靈銑以佐命功臣與周文昱侯安都爲三傑按靈銑宅在湖東二里徐爰釋問曰玄武湖夲桑泊晉元帝創爲北湖宋以隷舟師京都記云從北望鍾山從宫亭湖望廬岳齊武帝理水軍於此中號曰昆明池故沈約登覆舟山詩云南瞻儲胥館北望昆明池即此尓永嘉末有龍見於湖内故改爲玄武湖豫章記曰檐石湖在州東北其湖水中有兩石山有孔如人穿擔狀古老云壯士擔此兩石置湖中因以爲名輿地志曰安成有蜜湖中有絲蓴鯽魚爲時所重并有石窟容百人㘴其魚味甘如蜜因此爲名在縣東二十里淮南子曰夫歷陽之都一夕化而爲湖勇力聖智與不肖者同命無遺脫也荆南志曰髙沙湖在枚迴洲上翠澤平皛胡了切水陸彌曠芰荷殷生鱗羽滋阜湖南林野清曠可以栖託故徴士宗炳昔常家焉北有小水自湖通江謂之曽口是也渚宫故事曰江陵城西二十里髙沙湖其中多魚又曰五葉湖昔湖測有主人張披五葉同居因以爲名九江記曰彭蠡湖在㝷陽縣東南與都昌縣分界湖心有大孤山案郡國志彭蠡湖周廽四百五十里内有石髙數十丈大禹刻其石以記功焉又有乞烏隨船行舟人擲搏飯接之髙下不失一粒今此烏㳂江靈廟多有不獨在彭蠡湖尓郡國志曰鶴門湖者陶侃微時䘮母忽有二客來吊化爲雙白鶴飛去後因以爲名丹陽記曰呉孫皓寶鼎元年丹陽縣宣騫之母年八十浴於後湖化爲黿後湖又名練湖在縣北百二十歩輿地志曰曲阿出名酒皆云後湖水所釀故醇烈也今按湖水上承丹徒陳驪覆船山馬林溪水色白味甘輿地志云練塘陳敏所立遏髙陵水以溪爲後湖語林曰禇公遊曲阿後湖狂風忽起船傾禇公巳醉乃曰此舫人皆無可以招天譴者唯有孫興公多塵滓正當以厭天欲耳便欲捉孫擲水中孫懼無計唯大呼曰季野卿念我褚公禇彦回也季野彦回字也伏滔登故臺詩序曰夫差姑蘇臺東有丹湖萬頃内有金銀塘方輿記曰銅船湖馬援鑄銅船五隻一留此湖中四隻將過海征林邑潭幽明録曰碩縣下有眩潭以視之眩人眼因以爲名傍有田陂昔有人舡行過此陂見一死蛟在陂上不得下無何見一人長壯烏衣立於岸側語行人云吾昨下陂不過而死可爲報眩潭行人曰眩潭無人云何可報烏衣人云但至潭便大言之行人如其旨須臾潭中有號泣聲又曰晉元熈中桂陽郡有一老翁常以釣爲業後清晨出釣遇大魚食餌掣綸甚急船人奄然俱没家人㝷䘮於釣所見老翁及魚並死爲釣綸所纒魚腹下有丹字文曰我聞曽潭樂故從檐潭來磔死弊老翁持釣數見欺好食赤鯉鱠今日得汝爲荆州圖記曰武當縣西北六里江中名佷字潭潭中有石磧洲長六十丈丗傳佷子未曽從父命父臨終欲葬山上故謬曰葬我水中佷子唯從此命習鑿齒記云佷子是漢時人家在山東五女徼鄧德明南康記曰梓潭有梓樹洪直巨圍葉廣丈餘垂柯數畝又曰贑潭在郡下昔有長者於此潭以釣爲事恒作漁父歌其聲慷慨忽聞綸動須臾一物形似小水牛眼光如鏡或言水犀浮躍逐綸角帶金繅釣客因引得鏁出水數十丈鏁斷餘數丈盡是珎寳羅浮山記曰牛潭深洞無極北岸有石周圍三丈許漁人見牛自水而出盤於此石枹朴子曰昔石頭水有大黿常在潭中因名此爲黿潭能作魅行病於人呉有道士戴昞者乃以越章封埿偏投潭水中良乆有大黿徑長丈餘浮出不敢動乃格殺之而病人並愈又有小黿出羅列死於水渚甚多南康記曰梓潭山在雩都縣之東南六十九里其山有大梓樹呉王令都尉蕭武伐爲龍舟艚斫成而牽引不動占云須童男女數十人爲歌樂乃當得下依其言以童男女牽拽艚没于潭中男女皆溺其後毎天晴㓪浄髣髴若見人船焉夜宿潭邊或聞歌唱之聲因號梓潭焉鄱陽記曰懷蛟水一名孝經潭在縣南二百歩江中流石際有潭徃徃有蛟浮出時傷人焉毎至五月五曰郷人於此江水以船競渡俗云爲屈原攘災承前郡守縣綵以賞之刺史張拪貞以人之行莫大於孝懸孝經摽竿上賞之而人知勸俗號爲懷蛟水或曰孝經潭湘州記曰益陽有昭潭其下無底湘洲最深處也或謂周昭王南征不復没於此潭因以爲名太平御覽卷第六十六
