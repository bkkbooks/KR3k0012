front:
  text: 太平御覽卷第二百六十五職官部六十三
  hash: sha256:6ca2ee5211d79d933bf70298ed55c9eb7e5d39dc62eff63adeaaa04803326f32
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_265-1a}
body:
  text: 州主簿從事中正州主簿韋昭辯釋名曰主簿主諸簿書簿普也普關諸事漢書曰王尊遷東郡太守水盛泛􅪶溢瓠子金堤尊躬率吏民沉白馬劾水神河伯尊親執珪璧使巫祝請以身填金堤因止宿廬于堤上及水盛堤壞吏民皆走唯二主簿位在尊旁尊立不動而水波稍却廻還吏民嘉壯尊之勇節白馬三老朱英等奏其狀東觀漢記曰周喜仕郡爲主簿王莽末群賊入汝陽城喜從太守何敞討賊爲流矢所中謂賊衆曰卿曹皆民隷也豈有還害其君者耶喜請以死贖君命因仰天號泣賊於是相視曰此義士也給其車馬遣送之後漢書曰朱儁㑹稽人也太守尹端以儁爲主簿熹平二年端坐討賊許昭失利爲州所奏罪應弃市儁乃羸服閒行輕賫數百金到京師賂主章吏還得刋定州奏故端得輸作左校端喜於降免而不知其由儁亦終無所言魏志曰盧毓字子家涿郡人也崔琰舉爲兾州主簿時天下草創多逋逃故重士亡法罪及妻子亡士妻白等始適夫家數日皆未與夫相見大理奏弃市毓駮之曰夫女子之情以接見而恩生成婦而義重故詩曰未見君子我心傷悲亦旣見止我心則夷又禮未廟見之婦而死即葬女氏之黨以未成婦也今白等生有未見之悲死有非婦之痛而吏議欲肆之大辟若同牢合卺之後罪何所加卺音謹且記曰附從輕言附人之罪以輕者爲比也又書云與其殺不辜寧失不經恐過重也茍以白等皆受禮聘巳入門庭刑之爲可殺之爲重太祖曰毓之所執是也又引經典有意使孤歎息又曰龐㳙字子異太守徐揖請爲主簿後郡人黄昂反圍城㳙弃妻子夜踰城圍告急於張掖燉煌二郡𥘉疑未發兵㳙欲伏劒二郡感其義遂興兵軍未至而郡邑以䧟陣死㳙乃收歛揖喪送還本郡行服三年乃還又曰崔林字德孺清河人少時晚成宗族莫知唯從兄琰異之太祖定兾州擢爲州主薄蜀志曰杜微字國輔梓潼涪人丞相領益州牧以微爲主簿微固辭輿而致之旣至亮引而微自陳謝亮以微不聞人言於座上作書與之吴録曰苞咸字子良爲郡主簿太守黄君行春留咸守郡君縁棲採雀卵咸責數以春月不冝破卵杖之三十王隱晉書曰陶侃字士衡鄱陽人爲郡主簿夫人病欲使主簿迎醫於數百里天大寒雪各辭疾召侃使行侃曰資於事父以事君夫人亦當次母安有父母之病而聞迎醫不便行也晉書曰潘京字世長武陵漢壽人也弱冠郡辟主簿太守趙廞甚器之甞問曰貴郡何以名武陵京曰鄙郡本名義陵在辰陽縣界與夷相接數爲所攻光武時移東出遂得全完共議易號傳曰止戈爲武詩稱髙平曰陵於是名焉州所辟因謁見問䇿探得不孝字刺史戯京曰辟士爲不孝耶京舉板荅曰今爲忠臣不得復爲孝子其機辯皆此類又曰易雄長沙劉陽人也仕郡爲主簿張昌之亂也執太守万嗣將斬之雄與賊爭論曲直賊怒叱使牽雄斬之雄趍出自若賊人又呼問之雄如𥘉如此者三賊乃捨之嗣由是獲免雄遂知名又曰潘京武陵人也郡辟主簿後太廟立州郡皆遣使賀京白太守曰夫太廟立移神主應問訊不應賀遂遣京作文使詣京師以爲永式又曰習鑿齒字彦威爲桓温荆州主簿親遇隆宻時語曰徒三十年看儒書不如一詣習主簿也宋書曰王思逺宋建平王景素辟南徐州主簿深見禮遇景素𬒳誅左右離散思逺親視殯葬手種松栢與廬江何昌㝢上表理之事感朝廷景素女廢爲庶人思逺分衣食以相資贍年長爲備笄緫訪求偶對傾家送遣三國典略曰梁李膺字公胤廣漢人也西昌侯藻爲益州以爲主簿使至建康梁武恱之謂曰卿何如昔日李膺對曰勝問其故對曰昔事桓靈之主今逢堯舜之君梁武嘉其對以如意擊席者乆之後魏書曰裴安祖弱冠州辟主簿民有兄弟争財詣州相訟安祖召其弟兄以禮義責讓之此人兄弟明日相率謝罪郡内欽服之又曰韋朏字尊顯少有志業年十八辟州主簿時属歳儉朏以家粟造粥以餌飢人所活甚衆唐書曰顔杲卿以䕃受官性剛直有吏幹開元中爲魏州録事參軍振舉綱目政稱第一又曰杜暹𥙷婺州參軍秩滿將歸州吏以𥿄萬餘張以贈之暹唯受一百畨餘悉還之時州寮別者見而嘆曰昔清吏受一大錢復何異也三輔决録曰韋元將年十五身長八尺五寸爲郡主簿楊彪稱曰韋主簿年雖少有老成之風昻昻千里之駒陳留耆舊傳曰戴斌爲郡主簿送故將喪歸郷里蠡吾里人距之孝子臣吏脫絰叩頭求哀終不見聽斌乃投絰放縗操手劒瞋目厲聲距踊而前曰哭不哀者郎君也喪車不前者戴斌也里人服其義乃内之廣陵列士傳曰劉儁爲郡主簿郡將爲賊所得儁知言辭不能動賊因叩頭流血乞得代之賊不聽前斫府君儁因投身投之正與刃㑹斫儁左肩瘡尺餘賊又欲更下刃儁號呼抱持不置賊因相謂曰此義士殺之不祥遂俱縱遣黄義仲交廣二州記曰合浦之士有尹牙爲郡主簿太守荅云重仇未執牙即變姓易名爲執之天子竒其義因赦不問俗說曰謝景仁爲豫州主簿在玄閤下桓聞其善彈筝便呼之旣至取筝令彈謝即理弦撫筝因歌秋風意氣殊邁桓大以此竒之從事漢書曰邴吉字少卿爲廷尉右監坐法失官歸爲州從事又曰趙廣漢涿郡人爲州從事以嚴絜通敏下士爲名又曰楊雄數爲朝廷在位賢者稱嚴君平德杜陵李強爲益州牧喜謂雄曰吾真得嚴君平矣雄曰備禮以待之彼人可見而不得詘也強心以爲不然及至蜀致禮與相見卒不敢言以爲從事乃歎曰楊子雲誠知人也東觀漢記曰鮑永爲司隷校尉矜嚴公正平陵鮑恢爲從事恢亦抗直詔曰貴戚且歛手以避二鮑又曰樊凖字㓜陵爲州從事臨職介正不發私書又曰班彪避地河南大將軍竇融以爲從事深敬待後接以師友之道後漢書曰朱震字伯厚爲州從事奏濟隂太守贓罪之數諺曰車如鷄栖馬如狗疾惡如風朱伯厚續漢書曰楊球爲幽州從事部分邊塞職事脩理謝承後漢書曰陳衆辟州從事有劇賊淳于臨等數千人攻縣殺吏光武遣司空李通率師擊之州牧惶怖恐獲罪戾衆於是自請以恩信曉喻降之乗單車駕白馬徃到賊所以義告諭臨素服名德即降服民生立祠曰白馬從事華嶠後漢書曰衛羽爲州從事時中常侍單超兄子匡爲濟隂太守負其勢大爲貪放刺史第五種欲取之聞羽素抗厲乃召羽謂曰聞公不畏強禦今欲相委以重事若何對曰願庻幾於一割羽出遂馳至定陶閉城門收匡賔客親吏四十餘人七日中起發其贓五六千萬種即舉奏一州震慄魏志曰賈洪字叔業家貧好學應州辟其時州中自叄事以下百餘人唯洪與嚴苞字文通才學最髙故衆爲之語曰州中曅曅賈叔業辯論胷胷嚴文通又曰袁紹領兾州從事沮綬喜曰吾心也又曰張遼字文逺鴈門馬邑人本聶壹之後以辟怨變姓漢并州刺史丁原以遼武力過人召爲從事又曰邢顒太祖辟爲兾州從事時人稱之德行堂堂邢子昻蜀志曰張松說劉璋交通先主從事廣漢王累自倒懸於門以諌璋無所納又曰馬謖字㓜常以荆州從事隨先主入蜀材力過人好論軍計又曰譙周字尹南身長八尺體貌素朴推誠不識無造次辯論之方然潜識内敏建興中丞相亮領益州牧命周爲勸學從事王隱晉書曰山濤字巨源河内人年四十始爲州郡部河南從事又曰劉毅辟爲司州都官從事京邑肅然彈河南尹事司隷徐不過曰躩虎之犬鼷䑕蹈其背毅曰旣能躩虎又能殺䑕何損於犬投傳而去晉中興書曰華譚字令思生未朞而父殁母年十八執節養譚弱冠知名揚州刺史周俊禮辟署從事史愛其才器以爲賔友陳留耆舊傳曰髙愼字孝甫敦質少華口不能劇談嘿而好沉深之謀爲從事號曰卧虎故人謂之嶷然不語名髙孝甫益部耆舊傳曰李弘字仲元爲州從事楊雄稱之曰不屈其志不累其身不夷不惠可否之間見其貌肅如也觀其行穆如也聞其言戚如也又曰巴郡任文公有道術爲州從事時越嶲欲反州遣五從事案虚實止傳舎食未半有風發案文公起曰當有逆變因促駕去諸從事未能發爲郡兵所殺鍾離意别傳曰楊州刺史夏君三辟意九江從事三府側席夏君見意曰刺史得京師書聞從事有令問刺史何惜王家之爵不貢賢者乃表上尚書李固别傳曰益州及司隷辟皆不就門徒或稱從事掾固曰未曽受其位不冝獲其号孟嘉别傳曰庾亮辟嘉爲勸學從事亮盛脩學斆髙選儒官正旦大㑹禇襃問亮嘉何在亮曰但自覓之褒歴觀之指嘉曰將無是乎亮欣然羅含别傳曰含字君章刺史庾􅘙以親賢之重作鎮方岳捜揚楚楚匪蘭弗刈仍辟含荆州部從事潜夫論曰孝明帝時荆州舉茂才過闕謝恩賜食旣訖問何異聞對曰巫地有劇賊九人刺史不能得帝曰汝非部郡從事耶對曰是也帝乃振怒曰賊發部中而不能擒何以爲茂才乃捶數百而切讓州郡十日之間賊即伏誅由此觀之擒盗賊在明法不在數赦世說曰顧和爲州從事月旦朝未入停車周侯歴和車邊過和風皃夷然不動周指頋心曰此中何有徐應曰此中最是難測地周人遇丞相曰卿州吏中有令僕才又曰羅含爲宣武從事謝鎮西作江夏使往檢校之羅旣至𥘉不問郡家事乃遥就謝數日飲酒而還桓公問何事羅云未審公謂謝尚是何似人桓公荅仁祖是勝我許人羅云豈有勝公人而有行非者故一無所問桓公竒其意而不責王丞相集教曰丹陽從事陳耽器局弘正可轉主簿吴興從事謝鸞才幹正直可轉西曹中正魏略曰時苗字德胄鉅鹿人也爲太官令領其郡中正定九品至於叙人才不能寛大然紀人之短雖在乆逺衘之不置吴志曰習温爲荆州太平公太平公即州都也後潘秘爲尚書僕射代温爲太平公甚得其譽晉書曰楊晫陶侃共載詣顧榮州大中正温雅責晫與小人共載晫曰江州名少風俗卿巳不能養進寒儁且可不毀之楊晫代雅爲大中正舉侃爲鄱陽小中正又曰諸葛瞻領丹陽宣城新安三郡大中正時中州人士多寓焉又曰劉毅字仲雄年七十巳告老後舉爲青州大中正尚書以毅懸車致仕不冝勞以碎務孫尹曰司徒魏舒司隷嚴詢與毅年齒相近管四十萬户州兼董司百寮揔攝機要舒所統殷廣兼執九品銓十六州議者不以爲劇昔鄭武公年過八十入爲司徒毅志氣聦明一州品第不足勞其思慮毅遂爲州都銓正人流清濁區別其所彈貶自親貴始又曰解結問別駕治中河北白壤髙良何故少人士每以三品爲中正皆云不審陳頵對曰詩稱惟岳降神生甫及申英偉大賢多出山澤河北地平氣均蓬蒿裁六尺不足成林故也又曰于寳稱晉宣帝除九品置大中正晉令云大小中正爲内官者聽月三㑹議上東門外設幔陳席又曰劉毅上表刺史𥘉臨州大中正史若吏部選内猶下中正問人事所在父祖位狀晉起居注曰僕射諸葛恢各稱州都大中正爲吏部尚書及郎司徒左長史屬掾皆爲中正臣今領吏部請解大中正以爲都中正職局司理不冝兼者也蕭子顯齊書曰張緒字思蔓呉郡人轉太子中庶子本州大中正長沙王晃屬選用吴興聞人邕爲州議曹緒以資藉不當執不許晃遣書佐固請之緒正色謂晃曰信此是家州卿殿下何得見逼梁書曰沈約遷侍中光禄大夫領太子詹事揚州大中正關尚書八條事後魏書曰房堅遷齊州大中正髙祖臨朝令諸州中正各舉所知千秋與幽州中正楊尼各舉其子髙祖曰昔有一祁名垂往史今有二奚當聞來牒北齊書曰乾明中邢邵爲中壽監同郡許惇與邵競夲州中正遂慿附宋欽道出邵爲刺史三國典略曰陳以孔奐爲御史中丞領揚州大中正晉令宋齊以來爲大都奐清白自守妻子並不之官所得秩俸隨即分贍孤寡郡中大恱號曰神君襄陽耆舊傳曰晉朝以江表始通人物未悉使江南別立大中正通典曰魏司空陳群以天臺選用不盡人才擇州之才優有昭鑒者除爲中正自較人才銓定九品州郡皆置吴有太平公亦其任也郭子曰孫子荆應上品拔王武子時爲大中正謂訪聞此人非卿能拔自爲之目曰天才英雄亮拔不羣傅子曰魏司空陳群始立九品之制郡置中正平次人才之髙下各爲軰目州置都而揔其議晉宣帝除九品州置大中正議曰案九品之狀諸中正旣未能料究人才以爲可除九制州置大中正曹羲集九品議曰伏見明論欲除九品而置州中正欲檢虚實一州闊逺略不相識訪不得知㑹復轉訪本郡先逹者耳此爲問州中正而實决於郡人孫楚集奏曰九品漢氏夲無班固著漢書序先往代賢智以爲九條此蓋記鬼録次第耳而陳群依之以品生人又魏武拔竒决於胷臆收才不問階次豈頼九品而後得人今可令長守爲小大中正各自品其編户也劉毅集論九品曰臣聞用治理者以官才爲夲官才有三難而治亂之所由人物難知一也愛憎難防二也情僞難明三也今立中正定九品操人主之威福奪天朝之權柄上品無寒門下品無勢族今職名中正實爲姦府事名九品而有八損冝罷中正除九品弃魏弊法更立一代之美制荀勗集曰袁讓豫州大中正曰𬒳勑以臣爲豫州大中正臣與州閭郷黨𥘉不相接臣本州十郡方於他州人數倍多品藻人物以正一州清論此乃臧否之夲風俗所重傅暢自序曰時請定九品以余爲中正余以祖考歴代掌州郷之論又兄宣年三十五立爲州都令余以少年復爲此任故至於上品以宿年爲先是以郷里素滯屈者漸得叙也應璩新論曰百郡立中正九州置都士州閭與郡縣希踈如馬齒生不相識靣何縁別義理太平御覽卷第二百六十五
