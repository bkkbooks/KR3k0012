front:
  text: 太平御覽卷第三百四十二兵部七十三
  hash: sha256:0e1f47798781d88150c7ffadd74f16d2b54b010948153539c331f53fd861d54e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_342-1a}
body:
  text: 劒上釋名曰劒撿也所以防撿非常也又歛也以其在身拱時歛在臂内地其旁鼻曰鐔音㝷鐔尋也帶所貫㝷也其末曰鋒末之言也韻集曰鐔音覃劒口也方言曰鞘音肖謂之室說文曰韜謂之衣亦曰襓襓音遶字林曰􅮿直例反劒鼻也禮記曰武王克商後散軍而郊射左射狸首右射騶虞而貫革之射息也禆冕搢笏而虎賁之士脫劒又曰進劒者左首尊也又曰受弓劒以𬒮敬也周禮曰周官桃氏爲劒臘廣二寸有半寸臘謂兩刃音臘兩從半之劒脊兩殺趍鍔者以其臘廣爲之莖圍長倍之莖謂劒天人之所握以上中其莖設其後謂從中以却稍大之身長五其莖長重九鋝音刷謂之上制上士服之身長四其莖長重七鋝謂之中制中士服之身長三其莖長重五鋝謂之下制下士服之今之上首也各以形皃大小帶之士勇士也又曰鄭之刀宋之斤魯之削呉越之劒遷乎其地而弗能爲良地氣然也左傳曰𥘉虞叔有玉虞叔虞公之弟虞公求旃弗獻旣而悔之曰周諺有之疋夫無罪懷壁其罪吾焉用此以賈害也乃獻之又求其寳劒叔曰是無厭無厭將及我遂伐虞故虞公出奔洪也洪池地名又曰莒子庚輿虐而好劒苟鑄劒必試諸人國人患之又將叛齊烏存帥國人以逐之烏存莒大夫也又曰吴公子光伏甲於掘室而享王掘地爲室王使甲坐於道及其門門階户席皆王親也夾之以鈹羞者獻體改服於門外進羞者獻體解衣也執羞者坐行而入執鈹者夾承之承執羞者也光僞足疾入法掘室恐難作王黨殺巳䂊避之也專諸寘劒魚中以進遂殺王又曰吴將伐齊越子率其衆以朝吴人皆喜唯子胥懼曰是豢吴也吴王聞之使賜之属鏤以死属鏤劒也又曰楚太子建爲鄭人殺之其子勝在鄭晉人伐鄭楚救之與之盟勝怒曰鄭人在此讎不逺矣勝自厲劒子平見之曰王孫何以自厲也曰將以殺汝父也又曰宋殺申再楚子聞之劒及寢門之外怒也家語曰子路戎服見孔子拔劒舞之曰古之君子以劒自衛子曰古之君子忠以爲質仁以爲衛不出環堵之室而知千里之外有不善則以忠化之宼暴則以仁圉之何必持劒子路曰由乃得聞此言也請攝齊以受教又曰顔回曰願鑄劒㦸爲農器戰國䇿曰韓卒之劒皆出於冥山棠谿墨陽宛馮龍泉太阿皆陸断馬牛水擊鴻鴈當敵於甲盾耳此天下名器也國語曰齊桓公問曰齊國寡甲兵爲之若何管子曰小罪讁以金美金以鑄劒㦸試諸狗馬惡金以鑄鉏夷試諸壤土乃甲兵大足也史記曰吴季札之𥘉使北過徐君好季扎劒口弗敢言季扎知之爲使上國未獻還至徐徐君巳死乃解其寳劒繫徐冢樹而去從者曰徐君巳死當誰予乎曰不然始吾心巳許之豈以死背吾心哉又曰平原君及毛遂與楚合從言其利害日出而言日中不決遂按劒而上請平原君曰從者利害兩言而决耳令日出而言日中不決何也楚王謂平原君曰客何爲者也平原君曰是勝之舎人也楚王叱之胡不下吾乃與君言汝何爲者也毛遂按劒而前曰今十歩之内王不得恃楚國之衆也王之命懸於遂且遂聞湯以七十里之地而王天下文王以百里之壤而臣諸侯今楚地方五千里持㦸百萬此覇王之資也白起小竪子耳率數萬之衆興師以與楚戰一戰而舉鄢郢再戰而燒夷陵三戰而辱王之先人此百丗之怨而趙之所羞而王弗知惡合從者爲楚非爲趙也吾君在前叱者何也諸侯乃定從又曰范雎傳云秦昭王臨朝歎息應侯進曰臣聞主憂臣辱主辱臣死今大王中朝而憂臣敢請其罪王曰吾聞楚之鐵劒利而倡優拙夫鐵劒利則士勇倡優拙則思慮逺夫以逺思慮而御勇士恐楚之圖秦也又曰李斯上書云今陛下服太阿之劒乗纎離之馬此數寳者秦不生一焉又曰陳平間行杖劒亡渡河舡人見其美丈夫獨行疑其亡將腰中當有金寳目之欲殺平平恐乃解衣躶而佐刺舡舡人知無有乃止又曰邹陽上書梁王云臣聞明月之珠夜光之璧以闇投人於道路人無不按劒相眄者何則無因而至前也又曰髙祖送徒驪山夜徑澤中令一人行前行前者還報曰前有大蛇當徑願還髙祖曰壯士行何畏乃前拔劒斬蛇又曰髙祖置酒雒陽宫曰吾有三傑而能用之故吾以布衣提三尺劒取天下也項羽有一范増而不能用所以爲吾擒也又曰髙祖擊英布時爲流矢所中髙祖問毉曰病可治於醫曰可治於是髙祖慢罵之曰吾以布衣提三尺劒取天下此非天命乎命乃在天雖扁鵲何益又曰伍貟奔吴舡人濟之貟感其德解寳劒賜之舡人曰子逹吴勿相忘劒則不敢以當又曰魏相爲丞相好武皆令諸吏有奏事者帶劒而前奏或有不帶劒者入奏事乃借錯劒而方敢入又曰荆軻衛人之燕燕人謂之軻卿軻卿好讀書學擊劒以術說元君元君不用又曰司馬相如好讀書學擊劒故母名曰犬子漢書曰雋不疑字曼倩渤海人治春秋爲郡文學進退必以禮名聞州郡武帝末暴勝之爲直指使者衣繡衣素聞不疑賢至渤海遣吏請與相見不疑冠進賢冠帶攂具劒應劭日攂具摽首之攂磊落壯大之㒵又曰時中國𥘉定尉他平南越回王之髙祖使中大夫陸賈賜他印爲南越王王賜賈橐中裝千金賈有五男廼出所使橐中裝賣千金分其子子二百金賈常乗安車駟馬從歌皷瑟侍者十人寳劒直百金謂其子曰與汝約過汝汝給人馬酒食極歡十日而更約所死家得寳劒其遊漢庭名聲籍甚言狼籍甚盛也又曰朱博奏王莽爲庶人莽就國南陽太守以莽貴重選門下掾孔休守新都伯休謁見莽莽盡禮自納休亦聞其名莽後疾休候之莽縁恩意進其玉具劒欲以爲好休不肯受莽因見誠見君靣有瘢美玉可以滅瘢休復辭譲莽曰君嫌其價耶遂椎碎自裹以進休乃受之又曰朱雲曰臣願請上方斬馬劒斷倿臣一人首上問誰對曰安昌侯張禹上怒又曰龔遂爲渤海太守務農勸人賣劒買牛曰可爲佩牛乎又曰沛公從百餘騎見羽於鴻門羽因留沛公飲范増數目羽擊沛公羽不應范増起出謂項㽵曰君王爲人不忍汝入以劒舞因擊殺之㽵入爲壽壽畢曰軍中無以爲樂請以劒舞因拔劒起舞項伯亦起舞常以身翼蔽沛公獲免又曰孝景帝賜衛綰曰先帝賜臣劒凢六不敢奉詔上曰劒人之所施獨亦至今乎綰曰具在上使取六劒尚盛未嘗服之也又曰質氏以治削而鼎食注治刀劒也又曰王莽使武賁以斬馬劒挫音剉董忠又曰梁兾帶劒入省尚書張凌呵叱令出兾跪謝凌不應因劾奏詔以一歳俸贖罪楚漢春秋曰上過陳留酈生求見使者入通公方洗足問如何人曰狀類大儒上曰吾方以天下爲事未暇見大儒也使者出告酈生瞋目按劒入言髙陽酒徒非儒者也後漢書曰韓稜爲尚書令與㒒射郅壽尚書陳寵同時俱以才能稱肅宗嘗賜諸尚書劒唯此三人特以寵劒自手署其名曰韓稜楚龍泉晉太康記曰汝南西平縣有龍泉可淬刀劒特堅利汝南即楚分野也郅壽蜀漢文陳寵濟南椎成椎音直追切漢官椎成作鏗成時論者爲之說以稜深有謀故得龍泉壽明逹有文章故得漢文寵敦朴善不見外故得椎成謝承後漢書曰延熹中詔應奉曰蠻夷叛逆作難積惡放恣鑊中之魚火熾湯盡當急燋爛以刷國恥朝廷以奉昔守南土威名播越故復式序重任奉之廢興期在於今賜奉錢十萬駮犀方具劒金錯把刃劒革帶各一奉其勉之又曰吴郡張業字仲叔爲郡門下掾逐太守歸郷里至河内遇賊業拔劒與賊交戰而死子武時㓜不識父傷父䘮不還毎至節日持業遺劒至河内到業死處醊祭悲哀感動路人東觀漢記曰丗祖十三年王國有獻名馬寳劒直百金馬以駕皷車劒以賜騎士又曰馮石襲母公主封獲嘉亦爲侍中稍遷衛尉能取恱當丗爲安帝所寵帝嘗幸其府留飲十數日賜駮犀具劒紫艾授玉玦各一又曰建武二年遣馮異西擊赤眉平關中上自河南賜異乘輿七尺玉具劒又曰光武有駭犀之劒以賜陳遵魏志曰文帝爲太子時與鄧展飲酣論及劒術不决時方食甘蔗因以習之下殿數交三中其臂魏略曰嚴翰字公仲噐性重厚篤好擊劒魏氏春秋曰魏武過城臯故人吕伯奢伯奢不在家人爲供王聞其食噐聲疑其圖巳夜手劒殺八人旣見食飲而悽愴曰寕我負人無令人負我吴書曰太史慈臨亡歎息曰丈夫生丗當帶七尺之劒以升天子之階今所志未從奈何而死乎權甚悼惜之晉書曰上公九命則劒履上殿又曰張䡄遣主簿令狐亞聘南陽王模甚恱遺䡄以帝所賜劒謂䡄曰自隴巳西征伐断割悉以相委如此劒矣又曰武庫火歷代之寳孔子履漢髙斬白蛇劒王莽頭皆失所在張華見龍劒排户而飛去又曰何攀除兖州刺史錫班劒赤舄又曰王如𥘉聚衆作逆敗王敦弟稜愛驍武請敦配麾下稜甚加寵遇如數與敦將角射闘爭爲過稜杖之如甚以爲耻𥘉敦有不臣之迹稜每諌之敦常怒異色乃密使人激怒如勸令殺稜因稜閑晏如請劒儛爲勸稜從之如於是儛刀爲戯漸來前稜惡而呵之不止遂直前斬稜敦聞而佯驚亦捕如誅之又曰張華傳吴之未滅也斗牛之間常有紫氣道術者皆以吴方強盛未可圖也唯司空張華以爲不然及吴平之後紫氣愈明華聞豫章人雷煥妙逹緯象乃要煥宿屏人曰可共尋天文知將來吉凶因登樓仰觀煥曰僕察之乆矣唯牛斗之間頗有異氣華曰是何祥也煥曰寳劒之精上徹於天耳華曰君言得之吾少時有相者言吾年出六十位登三事當得寳劒佩之斯言效歟因問曰在何郡煥曰在豫章豊城華曰欲屈君爲宰密共尋之可乎煥許之華大喜即𥙷煥豊城令煥到縣掘獄屋基入地四丈餘得一石凾光氣非常中有雙劒並刻題一曰龍泉一曰太阿其夕斗牛間氣不復見焉煥以南昌西山北巖下土以拭劒光芒豔發太盆盛水置劒其上視之者精芒炫目遣使送一劒并土與華留一自佩或謂煥曰得兩送一張公豈可欺乎煥曰大朝將亂張公當受其禍此劒當繫徐君墓樹耳靈異之物終當化去不永爲人服也華得劒寳愛之常置坐側華以南昌土不如華隂赤土報煥書曰詳觀劒文乃干將也莫邪以復不至雖然天生神物終當合耳因以華隂土一斤致煥煥更以拭劒倍益精明華誅失劒所在煥子華爲州從事持劒行經延平津劒忽於腰間躍出墮水使人沒水取之不見劒伹見兩龍各長數丈蟠縈有文章沒者懼而返湏臾光彩照水波浪驚沸於是失劒華歎曰先君化去之言張公終合之論此其驗乎華之博物多此類又曰載記云劉曜自以形質異衆恐不容于俗隱迹管涔山以琴書爲事嘗夜閑居二童子入跪曰營涔王使小臣奉謁趙皇帝獻劒一口置前再拜而去以燭視之劒長二尺光澤非常赤玉爲室背有銘云神劒服御除衆毒曜遂服之劒隨四時變爲五色崔鴻後趙録曰張賔闊逹有大節嘗自謂昆弟曰吾自言智笇鑒識不後張子房但不遇髙祖耳勒與諸將下山東賔曰吾歷覽諸將獨胡將軍可與共成大事者乃提劒軍門大呼請見宋書曰𥘉丗祖嘗賜謝㽵寳劒㽵以與豫州刺史魯爽别後爽反叛丗祖因宴集問劒所在荅曰昔以與魯爽别竊爲陛下杜郵之賜上甚恱當時以爲知言梁書曰天監五年廬陵太守王希聃於髙昌縣獲銅瑞劒二口以聞曰薄伐凶醜而龍淵耀質凶奴將滅白旗表徵又曰七年㑹稽太守衡陽王元簡上言餘姚縣掘地得劒二口又於縣東江水中得劒一口文漫若雌雄又曰羊侃𥘉爲尚書郎以勇聞魏帝嘗謂曰郎官謂卿爲虎豈羊質虎皮乎試作虎狀侃因以手抉殿柱没指魏帝壯之賜以珠劒三國典略曰侯景簒位遷豫章王揀别宫白虹貫日三重其夜月入太微掩帝坐景所帶劒水精標無故墜落景身自俯拾心極惡之五代周史曰鄭仁誨字日新晉陽人父覇累贈太子太師仁誨㓜事唐驍將陳紹光紹光恃勇使酒嘗乗醉抽佩劒將剚刃於仁誨左右無不奔避唯仁誨端立以俟略無懼色紹光因擲劒於地謂仁誨曰汝有此噐度必當享人間冨貴太平御覽卷第三百四十二
