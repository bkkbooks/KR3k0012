front:
  text: 太平御覽卷第五百九十七
  hash: sha256:d826e18c9f74d9eef6ad5f08051aba0a3def801f40725b0dcb0720af998c8ece
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_597-1a}
body:
  text: 文部十三檄移露布附檄說文曰檄二尺書也釋文曰檄激也下官所以激迎其上之書也李充翰林論曰盟檄發於師旅相如喻蜀老可謂德音矣起居誡曰軍書羽檄非儒者之事曰一家奉道法言不及殺語不虚誕而檄不切厲則敵心陵言不誇壯則軍容弱請姑舎之以待能者文心雕龍曰昔有虞氏始戒於國夏后𥘉誓於軍殷誓軍門之外周將交刃誓之故知帝丗戒兵三王誓師宣訓我衆未及敵人也至周穆西征祭公謀父稱古有威讓之令有文誥之詞即檄之本源也及春秋征伐自諸侯出懼敵不服故兵出湏名振此威風曝彼昏亂劉獻公所謂告之以文詞董之以武師者齊桓征楚詰菁茅之闕晉厲伐秦責箕郜之焚管仲吕相奉詞先路詳其意義即今之檄文曁乎戰國始稱爲檄檄者皦也宣布於外皦然明白也張儀檄楚書以尺二明白之文或稱露布夫兵以定亂莫敢自專天子親戎稱㳟行天罰諸侯禦師則云肅將王誅故分閫推轂奉詞伐罪非唯致果爲毅抑亦厲詞爲武使聲如衝風所擊氣似攙搶所掃奮其武怒揔其罪人徴其惡稔之時顯其貫盈之數揺姦兇之膽訂信順之心使百尺之衝摧折於咫書萬雉之城顚墜於一檄者也觀隗囂之檄亡新布其三逆文不雕飾而意切事明隴右文得檄之士得檄之體也陳琳之檄壯於骨骾雖姧閹携養章實太甚發丘摸金誣過其虐然抗詞書釁皦然曝露鍾㑹檄蜀徴驗甚明桓温檄胡觀釁尤切並壯筆也凢檄之大體或述休明或叙否剥指天時審人事驗強弱角權勢摽蓍龜於前驗懸鞶鑑於巳然雖本國信實叅兵詐譎詭以馳旨煒曄以騰說凡此衆作莫之或違者也故其植義颺詞務在剛徤挿羽以示迅不可使詞緩露板以宣衆不可使義隱必事昭而理辨氣盛而詞斷此其要也若曲趣宻巧無所取才矣史記曰張儀魏人嘗從楚相飲相亡璧意儀盗之掠笞數百後儀旣相秦爲檄告楚相曰吾從汝飲不盗汝璧善守汝國我且盗汝城漢書曰申屠嘉爲丞相鄧通在上旁怠慢嘉奏事因言曰陛下幸愛群臣則冨貴之至於朝廷之禮不可以不肅上曰君勿言吾私之罷朝嘉爲檄召通曰不來且斬通恐又言於上上曰速徃吾今召汝通至丞相府免冠徒跣頓首謝嘉嘉不爲禮責曰朝廷者髙帝朝廷也通小臣戯殿上大不敬當斬决勑史令行斬之通頓首血出不解文帝度嘉巳困通持節召通而謝嘉曰此吾弄臣君釋之東觀漢記曰光武數召諸將置酒賜坐席之間以要其死力當此之時賊檄日以百數憂不可勝上猶以餘間講經藝又曰盧江毛義性恭儉謙約家貧以孝行稱南陽張奉聞其名徃候之坐有頃府檄到當守令義攝檄持入白母喜甚事具孝門後漢書曰耿㳟爲戊巳校尉移檄烏孫示漢威德大昆弥己下皆喜遣使獻名馬又曰隗囂故宰府椽吏善爲文書每上移檄士大夫莫不諷誦魏書曰陳琳作檄草成呈太祖太祖先苦頭風是日疾發卧讀琳所作翕然而起曰此愈我疾病太祖平鄴謂陳琳曰君昔爲本𥘉作檄書但罪孤而巳何乃上及父祖乎琳謝曰矢在弦上不得不發太祖愛其才不咎又曰劉放善爲書檄三祖詔命有所招喻多放之所爲張華别傳曰駕西征鍾㑹次長安華兼中書侍郎從行掌軍中書䟽表檄文帝善之晉書曰易雄長沙人也爲㫪陵令刺史譙王承旣拒王敦將謀起兵以赴朝廷雄承符馳檄逺近列王敦罪西城䧟爲其所虜意氣慷慨神色無怍送到武昌敦遣人持檄示雄而數之雄曰此實有之惜雄位微力弱不能救國之難王室如燬安用生爲今日即戮得作惡鬼乃所願也敦憚其辭正釋之衆人皆賀雄笑曰昨夜夢乗車掛肉其傍夫肉必有筋筋者斤也車傍有斤吾其戮乎㝷而敦遣殺之當時見者無不傷惋又曰張䡄爲涼州刺史時晋昌張越涼州大族䜟言張氏覇涼自以才力應之越𥘉爲梁州刺史而志在涼州遂託病歸河而隂謀伐䡄乃遣兄鎭及曹祛麴佩移檄廢䡄䡄遣主簿奉表詣闕將歸老冝陽長史王融叅軍孟暢蹋折鎭檄排閣入諌䡄黙然從之又曰元帝遣揚威將軍甘卓建威將軍敦逸攻周馥于壽春安豐太守孫惠卿衆應之使謝擒爲檄擒馥之故將馥見檄流涕曰必謝擒之辭擒聞之遂毀草旬日馥衆潰續晉陽春秋曰何母忌母劉牢之姉也無忌與髙祖謀夜於屏風裏製檄文母潜於屏風上窺之旣知其謀大喜謂曰汝能如此吾讎耻雪矣嵇氏丗家曰含字君道爲中書郎書檄雲集含不起草北齊書曰髙祖西討命中外府司馬李義深知相府城局李士略共作檄文二人皆辭請以孫搴自代髙祖引搴入帳自爲吹火催促之搴援筆立成其文甚羙髙祖大恱即署相府主簿專典文筆梁書曰元帝擒宋子仙及丁和送之江陵並下于獄子仙檄湘東曰旣瞎且尰尔勇伊何即書記沈烱之文也有司焚毁湘東弗知僧辯購烱獲之酬錢十萬烱旣不敢謁見遂謟事于僧辦自此軍書咸岀於烱又曰偉玉洛陽人也學通周易甞在准陽賦詩曰平明聽戰皷薄暮叙存亡楚漢方龍鬪秦關陣未央旣至江陵繫之於獄以詩贈湘東嬖人曰趙壹能爲賦鄒陽解獻書何惜西江水不救轍中魚又上五十韻詩以希不死湘東愛其詞翰猶欲未誅左右嫉之乃曰偉前作檄文言詞不順湘東所視其檄云項羽重瞳尚有烏江之敗湘東一目寧爲赤縣所歸湘東大怒釘其舌於柱剜其臍抽其腸出乃斬之陳書曰趙知禮渉獵文史善書翰武帝之討元景仲也或薦之引爲記室知禮渉文贍速每召製書下筆便就率皆稱旨又曰頋野王博識洽聞侯景之㓂郡將衣君正舉兵赴援文檄皆以委之口占便就未甞立草國朝記傳曰元万頃𥘉爲契苾何力征髙麗管記作檄書云不知守鴨緑之險莫離支報云謹聞命矣遂移兵固守官軍不得入万頃坐流嶺南唐書曰李巨川爲華州掌書記時李茂貞犯京師天子駐蹕於華韓建以一州之力供億万乗慮其不濟遣巨川傳檄天下請助轉餉同臣王室完葺京城西方書檄酬報輻湊巨川灑翰陳叙文理俱愜昭宗深重之時巨川之名聞於天下移文心雕龍曰移者易也移風易俗令徃而人隨者也相如之難蜀尤文曉而喻博有檄移之骨焉詞剛而義辨文移之首也陸機之移百官言簡而事顯武移之要者也故檄移爲用事兼文武其在金革則逆黨用檄順衆資移所以洗濯民心堅明符契意用小異而體大同也漢書曰劉歆字子駿成帝時與父向俱領校書講六藝傳記後王莽簒位爲京兆尹哀帝時與五經博士講論諸儒愽士不肯置對歆因移書太常博士後漢書曰韓馥見民情歸袁紹忌方得衆恐將圖巳常遣從事守紹門不聽發兵橋瑁乃詐爲三公移書傳驛州郡說董卓罪惡企望義兵以釋國難馥於是方聽紹舉兵齊書曰孔稚珪字德璋㑹稽人也周彦倫隱於北山後應詔出爲塩官令欲過北山乃假山靈之意移書於北山三國典略曰衛襄字叔遼河東人脩行至孝州郡嘉之時有白波賊衆數萬人官兵誅伐不能乎賊曰使叔遼要我願散於是襄爲移書即平定王隱晉書曰毛寳據邾城䧟寳尸沉江不出戴洋移告河伯死尸立岀梁裴子野傳曰普通七年大舉北侵勑子野爲移魏文受詔立成武帝以其事體大召尚書僕射徐勉太子詹事周捨鴻臚卿劉之遴中書侍郎朱异集壽光殿以觀之時並歎服武帝目子野曰其形雖弱其文甚壯勑爲書喻相元乂其夜受旨子野謂可待旦方奏未之爲也及五皷勑催令遣上子野徐起操筆撰之昧爽便就人奏武帝深嘉焉自是凢諸符檄皆令具草子野爲文典而速不尚靡麗制多法之古與今文體異當時或有詆訶者及其末翕然重之或問其文速者子野荅言曰云人皆成於手我獨成於心露布文心雕龍曰露布者盖露板不封布諸視聽也後漢書曰鮑永爲司隷校尉子昱復拜焉後詔昱詣尚書使封胡降檄光武遣小黃門問昱有所怪不對曰臣聞故事通官文書不着姓又當司徒露布怪使司隷下書而著姓也帝報曰吾故令天下知忠臣之子復爲司隷也後漢書曰邢巒從征漢北巒後至髙祖曰至此以來未擒滅城隍土崩想在不逺所以緩攻孝正待中書爲露布耳又曰髙祖每歎曰上馬能擊賊下馬作露板唯傅脩耳魏書曰髙祖車駕南伐以韓顯宗統大軍破蕭鸞軍斬其將髙法援等顯宗至新野髙祖曰卿破賊斬師殊益軍勢朕方攻堅何爲不作露布也顯宗曰臣頃聞王肅獲賊二三疋驢馬皆爲露布臣布東親私每哂之近雖仰慿威靈得摧醜虜斬擒不多脫復髙曵長縑虚張功捷尤而効之其罪弥甚所以歛毫卷帛解上而巳又曰彭城王勰從征齊軍帝令勰爲露布露布者布於四海露之群臣以臣小才豈足大用帝曰汝亦才逹但可爲之及就尤類帝文人咸謂御筆帝曰非兄即弟誰能辨之勰對曰子夏𬒳嗤於先聖臣又荷責於今來後魏書曰宇文神舉幽州人盧昌期祖英伯等聚衆據范陽反詔神舉率兵討擒之齊黃門侍郎盧思道亦在反中賊平見獲解衣將伏法神舉素欽其才名乃釋而禮之即令草露布其待士禮賢如此又曰周人吕思禮好學有文才雖務兼軍國而手不釋卷晝理政事夜則讀書令蒼頭執燭燭燼夜有數升沙苑之捷命爲露布食頃便成周文歎其工而且速北齊書曰杜弼從髙祖破西魏於卬山命爲露布弼即書絹曽不起於草丗說曰桓武北征時袁虎從𬒳責免官㑹湏露布文喚表倚馬前令作手不蹔輟俄頃得七𥿄殊可觀王東亭亦在側絶歎其才國史𥙷曰李晟破朱泚德宗覽收城露布云臣巳肅清宫禁祇謁寢園鍾􅙇不移廟皃如故上感涕失聲左右六宫皆嗚咽論者以國朝捷書露布無如此者于公異之詞也公異後爲陸贄所忌誣以家行不至賜孝經一卷壈坎而終太平御覽卷第五百九十七
