body:
  text: 飲食部二酒中魏略曰太祖時禁酒而人竊飲之故難言酒以白酒爲賢人清酒爲聖人又曰王陵表滿寵年過躭酒不可居方任帝將召寵給事中郭謀曰寵爲汝南太守豫州刺史二十餘年有勲方岳及鎮淮南呉人憚之若不如所表將爲所闘可令還朝問以方事以察之帝從之寵旣至進見飲酒至一石不亂帝慰勞遣還又曰華歆能劇飲至石餘不亂衆人微察常以其整衣冠爲異又曰烏桓東胡俗能作白酒而不知作麴蘖常仰中國九州春秋曰曹公制酒禁而孔融書嘲之曰夫天有酒旗之星地列酒泉之郡人有旨酒之德故堯不先千鍾無以成其聖且桀紂以色亡國今令不禁㛰姻也太祖外雖寛容之内不能平御史大夫郄憲知旨以免融官呉志曰孫權於武昌臨釣臺飲酒大醉令人以水灑群臣曰今日酣飲唯醉墮臺中乃當止耳張昭正色不言出外車中坐權遣人呼昭還謂曰爲共作樂耳公亦何爲怒乎昭對曰昔紂爲糟丘酒池長夜之飲當時亦不以爲惡也權黙然有慙色又曰孫權常令中書郎詣頋雍有所咨訪若合雍意事可施行即與相反覆究而論之爲設酒食如不合意雍即正色改容黙然不言無所施郎退造權曰頋公歡恱是事合冝也其不言者是事未平也孤當重思之其見敬信如此又曰孫權嘗命諸葛恪行酒至張昭前昭先有酒色不肯飲曰此非養老之禮也權曰卿其能令張公辭屈乃當飲之耳恪難昭曰昔師尚父九十擁旌仗鉞猶未告老也今軍旅之事將軍在後酒食之事將軍在先何謂不養老也昭卒無辭遂爲盡爵又曰曹公出濡湏甘寧爲前部督受勑斫敵前營權特賜米酒衆肴寕刀特賜手下百餘人食之畢寕先以銀盌酌酒自飲兩盌乃酌與其都督不時肯持寕引刀置膝上呵謂之曰卿見知於至尊孰與甘寕尚不惜死卿何以獨惜死都督見寕色厲即起拜持酒及通酌兵各一兩盌至二更時銜枚出斫敵敵驚動遂退寕益貴重又曰孫皓毎饗宴無不竟日坐席無能不率以七升爲限雖不悉入口皆澆灌取盡韋曜素飲酒不過二升𥘉見禮異時常爲裁減或宻賜茶茗以當酒至於寵衰更見逼強輙以爲罪又於酒後使侍臣難折公卿以嘲弄侵尅發擿私短以爲歡笑焉又曰笮融督廣陵運漕大起浮圗祠每浴佛多設酒飯布席於路經數十里民人來觀及就食且萬人費以巨万計蜀志曰簡雍拜昭德將軍時天旱禁酒釀者有刑吏於人家索得釀具論者欲令與作酒者同罰雍從先主遊觀見一男子行於道謂先主曰彼欲淫何以不縛先主曰卿何以知之對曰彼有其具與欲釀者同先主大笑而原欲釀者晉書曰王戎嘗如阮籍飲時兖州刺史劉昶字公榮在坐籍以酒少酌不及昶昶無恨色戎異之他日問籍曰彼何如人荅曰勝公榮不可不與飲若減公榮則不敢不共飲惟公榮可不與飲晉書曰山濤飲酒至八斗方醉帝欲試之以酒八斗飲之宻益其酒濤極本量而止又曰陸抗與羊祜推之好抗嘗遺祜酒祜飲之不疑抗有疾祜饋之藥抗亦推心服之于時以爲華元子反復見於今又曰阮孚爲散騎常侍以金貂換酒爲有司所彈又曰謝弈爲桓温司馬謂之方外司馬因以酒逼温走入南康王門避之主曰君無狂司馬何由得相見弈遂引温一兵卒於㕔事共飲曰失一老兵得一老兵亦何所恠又曰陸納字祖言爲呉興太守將之郡先至姑熟辭桓温因問温曰公致酒可飲幾升食肉多少温曰年大來飲三升便醉白肉不過十臠卿復云何曰素不能飲正可二升肉亦不足言後伺温閑曰外有微禮方守逺郡欲與公一醉以展下情温欣然納之時王坦之刁協在座及受禮唯有酒一斗鹿肉一拌座客驚愕納徐曰明公近云飲酒三升納正可二升今有一斗以備杯酌餘瀝温及賔客並歎其眞率温更勑中厨設精饌酣宴極歡而罷又曰何充字次道能飲酒雅爲劉恢所貴恢毎云見次道飲令人欲傾家釀言其能温克也又曰陶侃毎飲酒有常限歡有餘而限巳竭殷浩更勸少進侃悽然曰年少時甞誡之乃巳宋書曰王弘爲江州刺史欲識陶潜不能致也潜甞往廬山弘令潜故人龐通之遺酒於半道栗里要之潜有脚疾使一門生二兒舉籃轝及至欣然便共飲酌俄頃弘至亦無忤也先是顔延之爲劉柳後車功曹在㝷陽與潜情欵後爲始安郡經過潜毎徃必酣飲致醉延之臨去留二萬錢與潜潜悉送酒家稍就取酒嘗九月九日無酒出宅邊菊叢中坐乆之逢弘送酒至即便就酌醉而後歸潜不解音聲而畜素琴一張毎有酒適輙撫弄以寄其意貴賤造者有酒輙設潜若先醉便語客我醉欲眠卿可去其真率如此郡將候潜逢其酒熟取頭上葛巾漉酒畢還復着之又曰頋憲之爲建康令清儉強力爲政甚得人和故都下飲酒者醇旨輙號爲頋建康謂其清且美焉又曰孔顗爲江夏内史性便酒毎醉輙彌日不醒居常貧罄無有豊約未嘗關懷爲府長史典籖諮事不呼前不敢前不令去不敢去雖醉日居多而曉明政事醒時判决未嘗有擁衆咸云孔公一月二十九日醉勝丗人二十九日醒也又曰顔延之好騎馬遨遊里巷遇舊知輙據鞍索酒得必傾盡欣然自得又曰沈文季出爲呉興太守文季飲酒至五斗妻王氏飲亦至三斗常對食竟日而視事不廢又曰袁粲爲丹陽尹嘗歩􅓏白揚郊野間道遇一士大夫便呼與飲酣明日此人謂𬒳知頋到門求進粲曰昨飲酒無偶聊相要耳竟不與相見又曰蕭思話嘗從文帝登鍾山北嶺中道有盤石清泉上使於石上彈琴因賜以銀鍾酒謂曰相賞有松石間意又曰彭城王義康傳曰㑹稽長公主於兄弟爲長文帝所親敬上嘗就主宴集甚歡主起再拜頓首悲不自勝上不曉其意起自扶之主曰車子歳暮必不見容特乞其命因慟哭上亦流涕指蔣山曰必無此慮若違今誓便是負初寕陵即封所餘酒賜義康曰㑹稽姉飲憶弟所餘今封送車子義康小字也齊書曰髙帝幸東宫召諸王宴飲因遊玄圃園長沙王晃捉華盖臨川王暎執雉尾扇聞喜公子良持酒鎗南郡王行酒武帝與豫章王嶷及王敬則自捧肴饌髙帝大飲賜武帝巳下酒並大醉盡歡日暮乃去又曰謝朏爲呉興太守與弟瀹於征虜渚送別朏指卄瀹口曰此中唯冝飲酒卄瀹建武之朝専以長酣爲事與劉瑱沈昭畧交飲各至數斗朏旣至郡致卄瀹數斛酒遺上曰力飲此物勿豫人事卄瀹嘗與劉悛飲推辭乆之悛曰謝莊兒不可云不能飲卄瀹曰茍得其人自可沉湎千日悛甚慙無言又曰王琨儉於財用酒不過兩爵輙云取酒難遇之梁書曰𥘉梁武帝揔延後進二十餘人置酒賦詩臧盾以詩不成罰酒一斗飲盡顔色不變言笑自若蕭介染翰便成文無加點帝兩美之曰臧盾之飲蕭介之文席之美也又曰隂鏗嘗與賔友飲宴見行觴者因廻酒炙以授之衆坐皆笑鏗曰吾儕終日酣飲而執爵者不知其味非人情也及侯景之亂鏗嘗爲賊擒或救之獲免鏗問之乃前所行觴者又曰張纉爲湘州刺史𥘉呉興呉規頗有才學邵陵王綸引爲賔客深相禮遇及綸作牧郢藩䂓隨從江夏遇纉岀之湘鎮路經郢服綸餞之南浦纉見䂓在坐意不能平忽舉盃曰呉䂓此酒慶汝得陪今宴䂓尋起還其子翁孺見父不恱問而知之翁孺因氣結尓夜便卒䂓恨纉悲慟而憤哭兼至信次之間又殞䂓妻深痛夫子翌日又亡時人爲張纉一盃酒殺呉氏三人南史曰南海有頓遜國在海﨑上有酒樹似安石榴採其花汁停瓮中數日而成酒後魏書曰太宗引崔浩論事語至中夜太宗大悅賜浩縹醪酒十斛水精戎塩一兩曰朕味卿言若塩酒故與卿同其味也又曰髙允𬒳勑論集往丗酒之敗德以爲酒訓孝文覽而恱之又曰胡叟少孤毎言及父母則淚下若孺子之號春秋常祭之前則先求旨酒時燉煌汜潜家善釀酒毎節送一壷與叟論者以潜爲君子又李元忠拜南趙郡太守好酒無政績及莊帝崩弃官潜圖義舉㑹齊神武東岀元忠便乗露車載濁酒以奉迎神武聞其酒客未即見之元忠下車獨坐酌酒擘脯食之謂門者曰夲言公招延豪傑今聞國士到門不能吐哺輟洗其人可知還吾刺勿復通也門者以告神武遽見之又曰齊神武自太原來朝見朱遊道曰此人是遊道邪常聞其名今日始識其面遷遊道別駕後日神武之司州饗朝士舉觴屬遊道曰飲髙歡手中酒者大丈夫卿之爲人合飲此酒又曰魏帝宴華林園謂神武曰自頃所在百司多有貪暴朝廷中有能公平直言彈劾不避親戚者王可勸酒神武降階跪言唯御史中尉崔暹一人謹奉明旨敢以酒勸并臣所射賜物千叚乞以廻賜帝又褒美之又曰劉藻字彦先父宗之廬江太守涉獵群籍美談笑善與人交飲酒至一石不亂藻爲平東別將辭於洛水之南孝文曰興卿石頭相見藻對曰臣雖才非古人度亦不留賊虜而陛下輙當釃曲阿之酒以待百姓帝大笑曰今未至曲阿且以河東數石賜卿又曰裴粲傳元顥入洛以粲爲西兖州刺史㝷爲濮陽太守崔巨倫所逐棄州入嵩髙山節閔帝𥘉復爲中書令後正月晦帝出臨洛濵粲起御前再拜上壽酒帝曰昔北海入朝蹔竊神器尓曰卿誡之以酒今欲我飲何異於往情粲曰北海志在沈湎故諌其所失陛下齊聖温克臣敢獻微誠帝曰甚愧來譽仍爲命酌又曰齊郡王簡性好酒不能理公私之事妻常氏燕郡公喜女也文明太后以賜簡幹綜家事頗節簡酒乃至盗竊求乞婢侍卒不能禁又曰阮孚性機辯好酒貌短而秃周文帝偏所眷顧常於室内置酒十缾餘一斛上皆加帽欲戯孚孚適入室見即驚喜曰吾兄弟軰甚無禮何爲竊入王家匡坐相對冝早還宅也因持酒歸周文撫手大笑北齊書曰叚韶尤嗇於財雖親戚故舊畧無施與其子孫尚公主并省丞郎在家佐事十餘日事畢辭還人唯賜一杯酒又曰髙季式豪率好酒又恃舉家勲功不拘儉節與光州刺史李元忠生平遊欵在濟州夜飲憶元忠開城門令左右乗驛馬持一壷酒徃光州勸元忠朝廷知而容之又曰齊河南王孝瑜武成禮遇特隆帝在晉陽手勑之曰吾飲汾清二盃勸汝鄴酌兩盌其親愛如此也又曰齊皇甫亮性質朴純厚終無片言矯飾属有勑下司各列勤墮亮三日不上省文宣王親詰其故亮曰一日雨一日醉一日病酒文宣以其實優容之又曰周文帝聞韋夐養髙不仕辟之不能屈明帝即位禮敬逾重乃爲詩願時朝謁帝大悅勑有司日給河東酒一斗號之曰逍遥公唐書曰定州㹅管李玄通性剛烈無所屈撓𥘉城䧟爲劉黒闥所囚其故吏有以酒食餽之者玄通謂之曰諸君哀吾困辱故以酒食來相寛慰耳吾要當爲諸君一醉可乎遂與樂飲因請劒起舞舞畢以劒潰腹而死又曰蒲桃酒西域有之前代或有貢獻及破髙昌收馬乳蒲桃實於苑中種之并得其酒法上自損益造酒酒成味兼醍盎旣頒賜羣臣京師識其味又曰麟徳元年九月壁州刺史鄧弘慶制酒令平索看精四序又曰張鎮州拜舒州都督舒州即其夲邑鎮州乃多市酒肴就望江舊宅盡召故人親戚與之酣宴散髮箕踞敦疇昔之歡十日贈以錢帛旣而垂泣謂親賔曰比者張鎮州與故人爲歡今日以後舒州都督治百姓耳君民禮隔不得交遊因與之訣自是親戚有犯法一無所縱州境因兹肅然又曰李景伯景龍中爲諌議大夫中宗嘗與宰臣貴戚内宴酒酣遞唱廻波樂甚諠雜失禮次至景伯歌曰廻波尓時酒巵微臣職在箴規禮飲只合三爵君臣雜混非冝席爲之散時人稱之又曰李適之雅好賔友飲酒一斗不亂夜則宴賞晝决公務廷無留事管子曰桓公飲管仲酒仲弃其半公問其故對曰臣聞酒入舌出舌出言失言失身弃臣弃身不如弃酒桓公笑焉晏子曰景公飲酒移於晏子之家晏子立於門曰國德無有故乎君今何爲非時而夜辱公曰酒醴之味金石之聲願與夫子樂之晏子曰臣不敢與焉公乃移於司馬穰苴之家穰苴荅如晏子公復移於梁丘據據左執琴右擁竽行歌而至公曰樂哉無彼二子何以持國無此一臣何以樂身孫卿子曰醉者越百歩溝以爲跬歩也俯而出城門以爲萬丈之門酒亂其神也太平御覽卷第八百四十四
