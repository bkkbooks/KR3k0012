body:
  text: 人事部十六肉皮膚骨䈥脉髓腦血膏肉說文曰脢音挴背肉也胂音身夾脊肉也瘜寄肉也瘜音息釋名曰肉柔也禮記檀弓下曰延陵季子適齊長子死塟於嬴博之間號之曰骨肉歸於土魂氣無不之左傳宣公十二年曰楚子北師次于郔將飲馬於河而歸聞晋師旣濟王欲還嬖人伍叅欲戰令尹孫叔敖弗欲曰昔歳入陳今兹入鄭不無事矣戰而不捷叅之肉其足食乎叅曰若事之捷孫叔爲無謀矣戰若不捷叅之肉將在晉軍可得食乎史記曰晉公子重耳在齊五年趙衰等謀醉重耳載以行行逺而覺重耳引戈欲殺咎犯咎犯曰殺臣成子偃之願也重耳曰事不成我食舅氏之肉咎犯曰事不成犯肉腥臊何足食乃止偃咎犯名也吕氏春秋曰齊有人一居東郭一居西郭幸而相遇飲酒曰須肉各抽刀自割相啖乃至于死交州名士傳曰張重字仲䔍舉計漢明帝易重問何短小重曰陛下欲得其才將稱骨度肉也唐書曰先天中有王知道母患骨蒸醫云湏得生人肉食之知道遂密割股上肉半斤許加五味以進母食之便愈黄帝素問曰脾主肉乆坐傷肉脾熱者色黄而肉軟楚辝大招曰豐肉微骨躰更狷皮膚釋名曰皮𬒳也𬒳覆躰也膚布也布在表也禮記曰古者深衣盖有制度以應規矩繩權衡短母見膚衣取蔽形長無𬒳土毛詩碩人曰手如柔荑膚如凝脂孝經曰身躰髮膚受之父母不敢毀傷孝之始也莊子曰藐姑射之山有神人居之肌膚若冰雪啇子曰上丗之士衣不煖膚食不滿腹苦其心意勞其四胑抱朴子曰素顔紅膚惑其目清啇流徴乱其聽列異傳曰蔡經與神交神將去家人見經詣井上飲水上馬而去視井上俱見經皮如虵蛻遂不還西京雜記曰文君姣好眉色如望逺山臉際常若芙蓉肌膚柔滑如脂十七而寡爲人放誕風流恱長卿之才而越禮焉新論語曰髪生於皮去髪而皮不知王子年拾遺録曰燕昭王三年廣延之國去燕七萬里或云在扶桑之東献善儛者二人一名提波一名携漢並玉晢凝膚骨輕氣馥綽約婉妙絶古無倫語林曰賈充問孫皓何以剥人面皮皓曰憎其顔之厚也骨說文曰骨躰之質也肉之核也釋名曰骨堅而滑也似木枝格孝經援神契曰周道衰路有飢骨血成池史記曰楚圍宋五月不解宋城中急無食華元乃夜私見楚將子反告莊王王問曰城中何如曰析骨而炊易子而食又曰孔子適周將問禮於老子老子曰子所言者其人與骨皆巳朽矣獨其言在耳帝王丗紀曰殷時有仙女名昌容隔肉見骨東觀漢記曰陳寵字昭公爲廣漢太守先是雒縣城南毎隂雨常有鬼哭聲寵使案行昔歳倉卒時骸骨不塟者多寵乃勑縣塟埋由是即絶晉書曰桓温生未期温嶠見曰此兒有竒骨相可使啼嶠曰眞英物也因名温尸子曰徐偃王有䈥無骨公孫尼子曰多食甘者有益於肉而骨不利燕丹子曰田光曰竊觀太子客無可用者武陽骨勇之人怒而面白賈子曰文王晝卧夢人登城呼曰我東北陬槁骨也速以人君塟我文王曰諾覺召吏令以人君塟之吏曰以五大夫塟之文王曰吾夢中巳許之民聞之曰我君不以夢故背槁骨況生人乎乃下信其上孔叢子曰孔附謂陳王曰梁人有揚由者伎巧過人骨騰肉飛國語曰呉伐越隳㑹稽獲骨焉一節專車使問仲尼曰禹致羣臣於㑹稽防風氏後至戮之其骨專車此爲大矣新序曰文王之塟枯骨無益衆庶衆庶恱之恩義動人也列仙傳曰寗封黄帝時陶正有神人過之爲其掌火能出五色煙乆之教封子積火自燒而隨煙氣上下視其灰燼猶有骨時人塟之謂之封子列異傳曰蔣子文漢末爲秣陵尉自謂骨青死當爲神西京雜記曰戚姬以百錬金爲彄環照見指上骨彄革侯王子年拾遺録曰沭胥國人忽復化爲老叟俄而即死臰爛盈屋人有除燒其骸骨於糞土之中復還爲人矣搜神記曰有談生無婦有女來爲其婦三年生一兒曰愼勿以火照我三年後可照生盗照之腰巳上皆肉腰以下但枯骨婦求去續搜神記曰司徒蔡謨親有王蒙者單獨常爲蔡公所收養蒙長纔五尺似爲無骨登牀輙令抱上扶南傳曰頓遜國人死鳥塟或火塟鳥塟者病困便歌舞送郭外有鳥如鵝緑色飛來萬許啄食都盡歛骨焚之沉於海水此必生天上鳥若不食自悲傷乃就火塟取骨埋之丗說曰王右軍目陳玄伯塊壘有正骨司馬相如羙人賦曰皓躰陳露弱骨豐肌䈥說文曰䈥躰之力也可以相連属作用也釋名曰䈥力也肉中之力氣之元也禮記曲禮曰老者不以䈥力爲禮左傳哀公上曰衛太子禱曰敢告無絶䈥無折骨無面傷以集大事無作三祖羞公孫尼子曰多食苦者而䈥不利多食辛者有益於䈥而氣不利韓子曰淖齒之用齊擢閔王之䈥縣之廟梁宿昔而死論衡曰命冨之人䈥力自強命貴之人才智自髙物理論曰夫清忠之士乃千人之表萬人之英得其人則事易於反手不得其人則難於拔䈥脉釋名曰脉幕也絡一躰也史記曰扁鵲以長桒君言飲藥三十日視見垣一方人以此視病盡見五藏病結特以侯脉爲名耳又曰趙簡子爲大夫專國事簡子疾五日不知人於是召扁鵲扁鵲入視病出董安于問扁鵲扁鵲曰血脉治也而何怪秦穆公甞如此七日而窹今主君之病與之同不出三日必間居二日半簡子寤又曰扁鵲過虢虢太子死扁鵲至虢宫門下曰聞太子不幸而死臣能生之中庶子曰先生得無誕乎何以言太子可生也扁鵲曰越人之爲方也不待切脉望色聽聲冩形言病之所在子以吾言爲不誠試入侯太子當聞其耳鳴而鼻張揗其兩股以至於隂當尚温也中庶子聞入報虢君虢君大驚出見扁鵲於中闕扁鵲曰若太子病者所謂尸蹷者也是以陽脉下遂音隊隂脉上爭㑹氣閉而不通隂上而陽内行下内鼔而不起上外絶而不爲使上有絶陽之絡下有破隂之細破隂絶陽色廢脉乱形靜如死狀太子未死也又曰扁鵲過齊齊桓侯客之入朝見曰君有疾在血脉不治恐深桓侯曰寡人無疾又曰齊太倉公淳于意少而喜醫更師同郡元里陽公受其脉曹上下經五侯竒音羇咳音咳術揆度隂陽侯病知人死生漢書曰王莽得翟義黨王孫度使太醫與巧屠共刳剥之量度五藏以竹筳音庭導其脉知其所終始云可以治病後漢書白郭玉爲人善別脉知人生死章帝令童男着女子之衣詐云其病使玉侯脉玉曰此女雖言病據脉陽盛隂微臣謂非女子帝善之三國典略曰周武帝不豫止於雲陽宫内史柳昇私問姚僧坦曰至尊貶膳日乆脉候何如對曰天子上應天心非愚所及凡庶如此萬無一全鶡冠子曰魏文侯問扁鵲曰子昆弟三人並醫其孰最善扁鵲曰長兄視神故名不出家仲兄視毫毛故名不出閭鵲針人血脉救人生死名聞天下燕丹子曰田光竊觀太子客無可用者宋意脉勇之人怒而面青論衡曰王莽時省五經平章句弟子郭略夜定舊記死於燭下精思不任脉絶氣滅崔元始正論曰風俗者國之脉侯也年糓如其肌膚肌膚雖和而脉侯不和亦未爲休也髓說文曰髓骨中脂也史記曰扁鵲過齊桓侯客之後五日復見望桓侯而退走桓侯使人問其故扁鵲曰疾之居腠理也湯熨之所能及在血脉鍼石所能及在腸胃酒醪之所能及其在骨髓雖司命無奈之何也今疾在骨髓臣是以無請也後五日桓侯躰病使人召扁鵲鵲巳逃去桓侯遂死又曰勾踐頓首再拜荅子貢曰孤甞不料力乃與呉戰困於㑹稽痛入於骨髓帝王丗紀曰紂斬朝渉之脛而觀其髓􅐱善長水經注曰淇水歴汲郡西南出朝歌城西北東南逕朝歌臺下俗謂之陽河水也紂在臺見老人晨將渡水而沉吟難濟紂問其故左右曰老者髓不實故畏寒紂乃於此斮脛而視髓腦左傳僖下曰晉文公夢與楚王摶楚子伏巳而盬其腦子犯曰吉我得天楚㐲其罪吾且柔之矣杜預注云腦能柔物春秋元命苞曰腦之爲言在也人精在腦韓詩外傳曰禽息秦大夫薦百里奚不見納繆公出當車以頭擊闑五結切腦乃精出曰臣生無𥙷於國不如死也繆公感寤而用百里奚秦以大化史記曰昔趙襄子以其姉爲代王妻後與王遇於句注之塞厨人進斟因反斗以擊代王殺之王腦塗地三國典略曰齊南陽王綽與齊主俱五月五日生武成以綽母李夫人非嫡故貶之爲弟俗云其日生者腦不壞爛死後踰一年方許收殮毛髮不落如生人焉神異經曰西荒中有人長短如人着百結敗衣手足虎瓜各摸豹見人獨自輙就人欲食腦先捕虱人伺其卧舌出槃地丈餘便燒石投其舌於是絶氣而死若不如此寤而輙食人腦列異傳曰陳倉有得異物其形不類猪不似羊莫能名以献秦穆公道遇二童子曰此名爲蝹述常在地下食死人腦若欲殺之以柏燒其頭蝹音襖西京雜記曰廣陵王胥有勇力恒於別囿學格熊後遂空手搏之䧟腦而死血釋名曰血濊也流濊濊也濊乎會切禮記檀弓曰髙子臯之執親之喪也泣血三年左傳莊公八年曰齊侯田于貝丘傷足喪屨反誅屨於徒人費弗得鞭之見血又成公上曰齊晉將戰郤克傷於矢流血及屨未絶鼔音張侯曰余病矣郤至曰自師始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之張侯解張也朱血色血色乆則殷令人謂朱黒殷也言血多汙車輪後不敢息也春秋考異郵曰龍門之下血如江宋均曰龍門戰在魯桓十三年易屯卦曰乗馬班如泣血漣如尚書武成曰紂前徒倒戈攻于後以北血流漂杵孔安國注曰流漂㫪杵論語季氏曰君子有三誡血氣未定誡之在色血氣方剛誡之在鬭血氣旣衰誡之在得漢書曰申屠嘉爲丞相鄧通居上傍怠慢嘉爲撽召通責曰朝廷者髙帝朝廷也通小臣戯殿上大不敬當斬通頓首血出不解文帝度嘉巳困通持節召通而謝嘉漢書曰息夫躬坐訊詛下獄仰天大呼血從鼻出食頃而死東觀漢記曰逢萌隠琅瑘不勞山非禮不動聚落化之北海太守遣吏奉謁萌不諾太守遣吏捕之民相率以石擿吏皆流血奔走又曰耿秉爲征西將軍鎭撫單于以下及薨南單于舉國發哀犁面流血謝承後漢書曰呉郡嬀皓字元起父爲南郡太守坐事繫獄皓懷小石至公卿間輙出石叩頭其上流血覆面父繫得免虞預晉書曰元康元年河間成都二王舉兵向京都朝廷北討徴嵇紹爲侍中王旅不振敗績於蕩隂百官侍衛莫不潰散唯紹以身捍冦兵突御輦飛矢雨集紹遂𬒳害於帝側血濺御服及定左右欲浣衣帝曰此嵇侍中血勿去又曰丞相府斬督運令史淳于伯血逆流着柱終柱末二丈三尺旋復流下四尺五寸百姓咸稱其冤晉書張軌傳曰漢末金城人陽成逺殺太守以叛郡人馮忠赴屍號哭歐血而死又曰桓温父彜爲韓晃所害涇令江播預焉温時年十五枕戈泣血志在復讎崔鴻十六國春秋後趙録曰伏都有膂力善尺牘攻石閔不剋爲閔所殺橫屍相枕血流成渠誅諸胡羯無貴賤男女皆斬之死者二十餘萬于時髙鼻多鬚至有濫死者又北燕録曰馮跃讌郡僚忽有血流左臂跃惡之從事中郎王乗因陳符命之應跃戒其勿言南史曰蕭叡明母病風積年沉卧叡明晝夜禱祈時寒下淚爲冰叩頭血出亦爲冰不溜陳書曰呉明徹殺王琳有一叟以酒脯來至號酹盡哀收其血懷之而去三國典略曰齊主於凉風堂召孝昭第二子百年遣左右亂捶擊之又令曵以遶堂所行之處血皆遍地又曰齊主將殺開府髙徳正召而謂之曰聞尓病我爲尓針以刀子刺之血流霑地又曰周師圍江陵謝荅仁請守子城梁主即授城内大都督旣而召王裒謀之裒以爲不可荅仁請入不得歐血而去唐書曰王君廓鎭幽州㑹突厥入冦君廓邀擊破之髙祖大恱徴入朝賜以御馬令於殿庭乗之而出因謂侍臣曰吾聞藺相如叱秦皇目眥出血君廓徃擊竇建徳將出戰李勣逼之君廓發憤大呼目及鼻耳一時流血此之壯氣何謝古人不可以常例賞之復賜錦袍金帶又曰輔公祏據江東反發兵冦壽陽命李孝恭爲行軍元帥以擊之孝恭自荆州趣九江將發與諸將宴集命敢水忽變爲血在坐者皆失色孝恭舉止自若徐諭之曰禍福無門唯人所召自顧無負於物諸君何見憂之深公祏惡積禍盈今承廟筭以致討盌音捥中之血乃公祏授首之徴又曰李思摩頡利族人也授右衛將軍從征遼東爲流矢所中太宗親爲吮血又曰李子愼誣告其舅以獲五品其母見其着緋衫覆面牀下泣涕曰此是汝舅血染者耶又曰玄宗幸蜀次馬嵬召左相韋見素見素出店爲亂兵所撾頭血流地上遽令夀王傳詔止之又曰天寳十五年安禄山下將蔡希徳攻䧟常山郡執太守顔杲卿長史袁履謙殺掠人吏萬餘人城中流血又曰竇軌毎臨戎對冦或經旬月身不解甲其部衆無貴賤少長不恭命即立斬之每日𬒳事多所鞭撻流血滿庭見者莫不股慄又曰劉審禮丁父憂去職及葬跣足隨車流血灑地行路稱之又曰牛徽爲吏部貟外郎巢賊犯京師父蔚方病徽與其子自扶籃音藍輿投竄山南閣路險狹盗賊縱橫谷中盗擊徽破首血流𬒳體而捉輿不輟莊子曰萇弘死乎蜀藏其血三年化爲碧燕丹子曰竊觀太子客無可用者夏扶血勇之人怒而面赤賈子曰炎帝黄帝異母兄弟各有天下之半戰於涿鹿之野血流漂杵山海經曰禹堙洪水殺相其血腥臰不可生五榖以其地爲臺相一名相仰春秋後語曰燕太子丹豫求天下名利匕首得趙人徐夫人匕首取之百金使工以藥淬之以試人血濡縷無不立死者裴駰曰言以匕首傷人血出霑濡絲縷便立死讀如儒也說苑曰蔡威公閉門而哭三日泣盡而繼之以血幽明録曰王伯陽亡其子營墓得三􅃮棺移置南堈夜夢魯肅瞋云當殺汝父尋復夢見伯陽云魯肅與弟爭墓後於坐褥上見數升血疑魯肅殺之故也墓今在長廣橋東一里汝南先賢傳曰陽安令趙規與朗陵太守黄萌爭水規割指詛曰隨血所流入陽安界萌忿殺規小吏王朔復刺殺萌朗陵官屬又殺朔民於京山上爲朔作祠壇毎水旱輙徃祈禱博物志曰戰鬭死亡處有人馬血積年化爲燐燐着地及草木如霜露略不可見人行或有觸着體便有光拂拭便分散無數又細咤聲如沙豆住乆乃㓕其人忽忽如失魂經日乃差憐音鄰又音吝三輔舊事曰武帝發兵攻太子連鬭五日白虎闕前溝中血没足丗說曰阮歩兵居喪不率禮而志孝稱當葬母先食肫飲酒然後臨訣而哭直云人言窮我將窮矣因吐血一升氣絶不知人弥時乃蘇
