front:
  text: 太平御覽卷第四百六十八
  hash: sha256:a5303878475a4d9ef592e5259005c412cd3853aa8768db96e1d5f34d678a0a42
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_468-1a}
body:
  text: 人事部一百九樂憂上樂說文曰樂極也歡也易曰樂天知命故不憂毛詩曰王在在鎬凱樂飲酒禮記曰傲不可長欲不可從志不可満樂不可極又曰樂者樂也君子樂得其道小人樂得其欲又曰子貢觀於蜡孔子曰賜也樂乎對曰一國之人皆若狂賜未知其樂也子曰百日之蜡一日之澤非尔所知也左傳曰公入而賦大隧之中其樂也融融姜氏出而賦大隧之外其樂也洩洩論語曰有朋自逺方來不亦樂乎又曰飯𬞞食飲水曲肱而枕之樂亦在其中矣又曰樂然後笑人不厭其笑又曰在陋巷人不堪其憂回也不改其樂又曰不仁者不可以長處樂戰國策曰魏文侯與虞人期獵是日飲酒樂天雨文侯出左右曰飲酒樂天又雨君將焉之文侯曰吾與虞人期獵雖樂豈可不一㑹期哉乃徃身自罷之魏於是始強又曰梁王魏嬰㑹諸侯於蘭臺酒酣請魯君舉觴魯君避席曰昔楚王登疆臺而望崇山左江右湖以臨方皇其樂忘死曰後代必有以髙臺陂池亡國者今君前夾林後蘭臺疆臺之樂可無誡乎東觀漢記曰光武發薊還士衆喜樂師行鼔舞歌詠雷聲又曰東平王張蒼曰爲善最樂袁宏後漢紀曰光武甞聽朝至于日側講經至於夜半皇太子從容曰陛下有禹湯之明而失黃老養性之道今天下又安願省思慮養精神優遊以自寛上荅曰吾以爲樂也王沈魏書曰太祖告歸郷里築室城外習讀書傳秋冬弋獵以自娯樂裴子野宋畧曰廢帝於華林園爲列肆親自酤賣又開瀆與左右引舡唱呼以爲歡樂管子曰桀放虎入市樂人之驚晏子春秋曰景公飲酒數日去冠破裳自鼓盆問左右曰仁人者亦樂此乎晏子曰人所以貴於禽獸者以有禮也君無禮何以臨下景公請易衣冠也又曰景公飲酒移於晏子前駈欵門曰君至晏子立於門曰國家得微有故乎君何爲非時而夜辱公曰酒醲之味金石之聲願與夫子樂之晏子曰夫鋪薦席陳簠簋者有人臣不敢預焉又移司馬穰苴穰苴介胄操㦸立門曰鋪薦蓆陳簠簋者有人臣不敢預焉又移於梁丘據據左援琴右挈竽行歌而至公曰樂哉今夕吾飲微二子何以治吾國微此一臣何以樂吾身也文子曰秦楚燕魏之歌異傳而皆樂也列子曰仲尼間居子貢入侍而有憂色子貢不敢問岀告顔回回援琴而歌孔子問曰若奚敢獨樂回曰吾昔聞諸夫子樂天知命故不憂回所以樂也又曰孔子遊太山見榮啓期行乎郕之野鹿裘帶索鼔琴而歌孔子曰先生所爲樂何也對曰吾樂甚多天生萬物人爲貴吾旣得爲人一樂也男女之別男尊女卑吾旣得爲男二樂也人生有不見日月不免襁褓吾行年九十是三樂也貧者人之常死者命之終處常待終當何憂哉孔子曰自寛者也又曰林類年且百歳晨㫪被裘拾遺穗於故畦並歌並進孔子適衛望之謂子貢曰彼叟可與言子貢逆之壠端面之歎曰先生曽不悔乎乃仰而應曰吾何悔邪吾所以爲樂人皆有之而反以爲憂少不勤行長不競時故能夀若此老無妻子死期將至故能樂若此莊子曰古之得道者窮亦樂通亦樂所樂非窮通也道德於此則窮通爲寒暑風雨之序矣又曰與人和者謂之人樂與天和者謂之天樂又曰莊子與惠子遊濠梁水上莊子曰鯈魚出遊從容是魚樂也惠子曰子非魚安知魚之樂也莊子曰子非我安知我不知魚之樂又曰孔子謂顔回曰回來家貧居卑不仕乎對曰不願仕回有郭外之田五十畝足以給饘粥郭内之田十畝足以爲絲麻以道自樂回不願仕也孟子曰君子有三樂父母俱存兄弟無故一樂也仰不愧天俯不怍人二樂也得天下英才而教育之三樂也又曰樂人之樂人亦樂其樂憂人之憂人亦憂其憂從獸無厭謂之荒樂酒無厭謂之亡又曰梁惠王立沼上頋鴻鵠麋鹿曰賢者亦樂此乎孟子曰賢者而後樂此不賢者雖有此不樂荀子曰子路問於孔子曰君子亦有憂乎孔子曰君子其未得也則樂其意旣巳得之又樂其治是以有終身之樂無一日之憂小人其未得則憂不得之旣得之又恐失之是以有終身之憂而無一日之樂又曰鳯烏啾啾其翼若竽其聲若簫有皇有鳯樂帝之心淮南子曰令尹子佩請飲莊王莊王許諾子佩之於京臺莊王不徃明日子佩跣揖北面立於殿下曰昔君王許之今不果徃意者臣有罪乎莊王曰吾聞子具於京臺京臺者南望獵山以臨方皇左江而右淮其樂忘歸若薄徳之人不可以當此樂也恐流不能反又曰吾所謂樂者人得其得者也夫得其得者不以奢爲樂不以慊爲悲與隂俱閉與陽俱開與子夏心戰而曜道勝而肥聖人不以身徇物不欲人爲之而以自樂也頋子曰遇其樂也則欲荒淫流湎逮其喜也則欲歡笑鼓舞荒流則傷義鼔舞則虧風又曰子謂子華曰爾有四樂頗知之乎子華曰未之知也子曰二親具存是爾一樂兄弟無故是爾二樂夫和妻柔是爾三樂披褐懷玉是爾四樂子華曰華乃有五遇千載之㑹而登夫子之堂則華之五樂也又曰或曰夫人三墳五典八索九丘蓋聖人之陳迹耳子何好焉子曰上紀五帝之盛下述百王之義粲粲如列宿落落如連珠雖復退居窮處簞食瓢飲未始失其樂矣予可得無好乎賈誼書曰宓子治單父於是齊人攻魯道自單父始父老謂曰麥巳熟矣今迫齊冦民不及刈穫請令民人自刈刈傅郭者歸可以益食不資冦三請宓子不聽俄而麥畢資乎齊冦季孫聞之怒使人讓宓子宓子曰今年失麥明年可樹令不耕者得穫是樂有冦也且一歲之麥於魯不加強䘮之不加弱令民有自取之心必數年不息季孫聞之慙曰使穴可入乎吾豈忍見宓子哉楊雄連珠曰臣聞天下三樂焉隂陽和調四時不忒年豊物遂無有夭折灾害不生兵戎不作天下之樂也聖明在上禄不遺賢罰不偏罪君子小人各處其位衆人之樂也吏不茍暴役賦不重財力不傷安土樂業民之樂也劉向說苑曰楚昭王欲之荆臺遊司馬子棊進諌曰荆臺之遊左洞庭之陂右彭蠡之水南望獵山下臨方淮其樂使人遺老而忘死人君遊者盡以亡其國願大王勿徃遊焉又曰齊景公遊海上樂之六月不歸令左右敢言歸者死顔蠋諌曰君樂治海不樂治國彼至有治國者且安得樂此海也譙周法訓曰或曰君子處陋巷之中奚樂也曰樂得其親樂得其友樂聖人之道也劉向列女傳曰楚昭越姬者越王勾踐之女也昭王燕遊蔡姬在左越姬驂乗駟以馳逐登附莊之臺以望雲夢之囿乃頋謂二姬曰樂乎吾願與子生死若此蔡姬曰故願生俱樂死同時頋謂史書之楚辭曰樂莫樂於新相知劉伶酒德頌曰先生乃捧􅎆承槽衘杯漱醪無思無慮其樂陶陶曹子建箜篌引曰樂飲過三爵緩带傾庶羞主稱千金壽賔奉萬年酬憂上說文曰憂愁也易曰作易者其有憂患乎又曰當其憂悔吝之時纎介不可慢也毛詩曰踧踧周道鞠爲茂草我心憂傷惄焉如檮假寐永歎惟憂用老又曰知我者謂我心憂不知我者謂我何求又曰未見君子我心則憂左傳曰有喜而憂如有憂而喜乎又曰呉公子札來聘請觀周樂爲之歌邶鄘衛曰美哉淵乎憂而不困史記曰秦昭王臨朝歎息應侯進曰臣聞主憂臣辱主辱臣死今大王中朝而憂臣敢請其罪昭王曰吾聞楚之䥫劒利則士勇倡優拙則思慮逺矣以逺思慮而御勇士恐楚之圖秦也今武安君死鄭安平叛内無良將外多敵國吾是以憂又曰懷王使屈原造爲憲令草藁未定尚上官大夫見而欲奪之不與因䜛之曰王使平爲令衆莫不知每一令出平伐其功王怒而踈平平疾䜛謟蔽明也邪曲之害公也方正之不容也故憂愁幽思而作離騷蜀志曰曹公征孫權呼先主自救先主遣使告劉璋曰曹公征呉呉憂危急孫氏與孤夲爲脣齒又曰進在青泥與關羽相距今不徃救進必尅轉侵州界其憂有甚於魯魯自守之賊不足慮沈約宋書曰武帝起桓玄聞便憂懼無復計或曰劉𥙿等衆力甚弱豈能有成陛下何慮之玄曰劉𥙿自足爲一丗之雄劉毅家無檐石之儲樗蒲一擲百萬何無忌劉牢之之甥酷似其舅共舉大事何謂無成吴越春秋曰越王欲復怨於呉冬寒則抱氷夏熱則握火憂苦其志懸膽於户岀入甞之不絶於口華陽國志曰蜀中傳相告曰井中有人學士靳普言客星入東井益州之分憂刺客入耳山海經曰牛首山有草名曰鬼目其葉如萊而莖赤其秀如禾服之不憂又曰霍山有獸如狸而白尾有鬛名曰朏朏可以亡憂又曰茈湖之水其中多儵音稠魚其狀如鷄而赤毛白尾六足四首其音如鵲食之亡憂又曰顔淵東之齊孔子有憂色子貢下席問曰小子回東之齊夫子憂色何耶孔子曰善哉汝問昔管子有言丘甚善之曰禇小者不可以懷大綆短者不可以汲深是爲命有所成而形有所適不可損益也吾恐回與齊侯言堯舜黄帝之道而重以燧人神農之言彼將内求於巳而不得則惑也列子曰孔子謂顔回汝徒知樂天知命之無憂未知樂天知命之有憂之大也吾始知詩書禮樂無救於治亂而未知所以革之方此樂天知命者之所憂也孟子曰憂以天下太平御覽卷第四百六十八
