front:
  text: 太平衘覧卷第八百六十九
  hash: sha256:a3b377050ad206c8fd5ba299a148928fec7e526de303b9602d3841e0c6a3547f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_869-1a}
body:
  text: 火部二火下西京雜記曰惠帝七年夏震南山火木林數千株皆火燃至末其下數十畝地草皆燋黄其後百許日家人就其間得龍骨一具鮫骨二具又曰樊將軍噲問陸賈曰自古人君皆云受命於天云有瑞應豈有是乎賈曰有之夫目而辰切則得酒食火華則得錢財故目則祝之火華則拜之况天下大寳人君重位非天命何以得之哉王子年拾遺記曰岱山東有貟淵千里孟夏之月水騰沸以金石投之則爛如土矣孟冬之月稍燋涸中有黄色烟從地中出起數文烟色萬变山人掘之入地數尺得燋石如炭或有碎火如俗聞之火有草名莽煌葉圎如荷去之十歩炙人衣服則燋鳥獸不敢近也刈以爲席冬弥温以枝相歴磨則火出又曰昔伯禹隨山濬川起自積石鑿龍門至窒穴𥘉入窒穴之時孔八尺稍入幽闇丕可復行禹乃圎火而入有黒虵長十丈頭有角衘夜明之珠以遵於禹又曰貟嶠之山名環丘有雲石廣五百里或四五十里扣之片片則蓊然雲出俄而徧潤天下有木名曰倚桑亦有冰蚕長七寸黒色角有鱗以霜雪覆之然後作􅗀長一尺其色五綵織爲文錦入水而不濡其質輕軟柔滑以之投火則經宿不燎唐堯之世海人獻之又曰始皇好神仙之事求天下異術有宛渠之民乗蠡舟泛黒水而至於雍部始皇與之語及天𥘉開之時子如親見始見問曰聞子明於見逺願聞其術對曰臣之國去咸池日没之所九萬里焉日月之所不照以萬歳爲夜其晝則天豁然中開闊數百丈萬歳還合則爲一日也及其爲夜琢燃石以代日光此石出於然山其土石皆自光明鑚斬皆火岀大如栗則輝曜一室昔炎帝時火食國人獻此石也又曰申弥國去都萬里有燧明國不識四時晝夜其人不死厭世則升天國有火樹名燧木屈盤萬識雲霧出於中間折枝相鑚則火出矣後世聖人变腥臊之味遊日月之外以食救萬物乃至南垂目此樹表有鳥若鴞以口啄樹粲然火出聖人成焉因取小枝以鑚火號燧人氏在庖羲之前則火食起乎兹矣又曰郅寄字君珎䘮親盡禮去墓一百里每夜行常有鳥又曰堯讓天下於許由曰日月出矣而爝火不息其於光也不亦難乎列子曰趙襄子率徒十萬狩於中山籍芿音仍燔林扇赫百里有一人從石壁中從燼上下衆謂鬼物火過徐行而出若無所經渉襄子怪而留之徐而察之形色七竅人也氣息音聲人也問奚道而入火其人曰奚物而謂石奚物而謂火襄子曰嚮之來所出者石也而嚮之所渉者火也其人曰不知也管子曰黄帝作鑚燧出火以熟葷臊韓子曰魯燒積澤天北風火南倚恐燒國哀公懼自將衆趣而救火左右無人盡逐獸而不救火乃召問仲尼仲尼曰夫逐獸者樂而無罰救火者苦而無賞此火所以不救也事急不及以罰救火者盡賞之則舉國不足以賞於民請徒行罰乃下令曰不救火者比降北之罪令下未遍火己滅矣淮南子曰火上尋水下流又曰南方火也其帝祝融其佐朱明執衡而治夏衡平其神爲熒惑其獸爲朱鳥其音徴其日丙丁又曰十一月水正而隂勝陽陽氣爲火隂氣爲水水勝故夏至濕通合反火勝故冬至燥燥故慘炭輕濕故炭重又曰練土生木練治也練木生火練火生雲雲金氣也練雲生水練水生土又曰火熯則水滅之金堅則火消之又曰失火而遇雨失火則不幸遇雨則幸也故禍中有福也又曰槁竹有火弗鑚不㸐土中有水弗掘無泉掘猶窮也㸐音然又曰𬒳蓑而救火毀瀆而止水乃愈益多又曰畜火井中操鈎上山掲斧入淵欲得所求難也又曰甑得火而液水中有火火中有水疾雷破石隂陽相薄自然之勢又曰夫救火者汲水而趍之或以甕瓴或以盆盂其方圎鋭撱勑果反不同盛水各異其於滅火均也又曰順風從火紫芝與蕭艾俱死蕭蒿也又曰今人放燒或操火徃益之或雨者皆未有功而相去亦逺矣又曰聖王之養民非求用之也性不能己若火之自熱水之自寒夫有何脩焉及恃其九頼其功者若失火舟中言舟中之人同心救火其用為易又曰夫狂者之不能避水火之難而越溝瀆之嶮者豈無形神氣志哉然而用之異也與人異也又曰夫寒之與煖相反大寒地坼水凝火弗爲衰其暑大熱礫石流金火弗爲益其烈寒暑之變無損益於己質有之也又曰木甞灼也而不敢握火者見其有所燒也木甞傷而不敢擢刃者見其有所害也又曰老槐生火乆血爲燐人弗怪也血精在地暴露百日則爲燐遥望若野火也又曰炎帝於火死而爲竈炎帝神農以火帝王天下死託祀於竈神抱朴子曰案河洛之文皆云水火者隂陽之餘氣也夫言氣則其不能生日月可知也若水火是日月所生亦何必盡如日月之方圎乎今火出於陽燧而火不圎也水出於方諸而水不方也又陽燧可以取火於日而無取日於火之理則日精之生火明矣方諸可以取水於月而無取月於水之道則月精之生水可知矣又曰南海之中蕭丘之上有自生之火火常以春起而秋滅丘方千里當火起之時滿此丘上純生一種木火起正著此木木离爲火所著但小燋黒人或得以爲薪者火著如常薪但不成炭炊熟則灌滅之後復更用如此無窮又夷人取木華績以爲火浣布木皮亦剥以灰煑爲布但不及華細好耳白䑕大者重數斤毛長三寸居空木中其毛亦可績爲布故火浣布有三種焉又曰暗非火積水非魚屬然暗竭則火滅水涸則魚死伐木而寄生蔓草莵絲萎又曰立夏日服六壬六癸之符或服飛霜之散則不熱㓜伯子王仲都此二人衣之以重裘𦢊之於夏日之中周以十爐之火口不稱熱身不流汗盖用此方也傅子曰管寕之遼東而歸海中遇暴風餘舡皆波唯寕舡自若夜晦舡人盡惑莫知泊所忽望見火光趣之得島一無居人又無火爐行人感異焉以爲神光之祐皇甫曰積善之應也尸子曰燧人上觀辰星下察五木以爲火也隂符經曰火生於木禍發必尅孫子兵法曰凢火攻有五一曰火人二曰火積三曰火輜四曰火庫五曰火燧吕氏春秋曰齊桓公使人告魯曰管夷吾寡人之讎也願生得之魯君許諾乃使轉其拳滕其耳置之匣中至齊境桓公使以朝車迎之㧞以爟火爟火所以祓除不祥也爟讀自灌又曰鷰雀處一屋之下自以爲安竈突决火棟將焚鷰雀不知禍將至也又曰伊尹說湯五味九沸九變火爲之紀博物志曰燧人鑚木而造火又曰臨卭有火井一所縱廣五尺深二三丈在縣南百里昔人以竹木投之以取火諸葛丞相徃觀視後火轉盛以盆著井上煑塩得塩熟後人以家燭火投井中火即滅迄今不復然也又曰臨卭有火井深六十餘丈火光上出人以筒盛火行百餘里猶可燃也蜀王夲紀亦同又曰魏明帝丗河東有焦光者祼而不衣處火不燋處寒不凍又曰積油萬石則自然生火晉㤗始中武庫火積油所致南越志曰廣州有大樹可以禦火山北謂之慎火南無霜雪故成樹也風俗通曰城門失火禍及池魚案百家書宋城門失火汲取池中水以沃之魚悉露見但就取之說云司門尉姓池名魚城門火救之燒死故云然耳又曰臧仲英家欲炊而失釡火從篋中起衣服盡燒而篋不損山海經曰符愚之山其鳥名音旻其狀如翠而赤喙翆以燕而紺色可以衛火畜之辟災又曰翠山之上其鳥多鸓音壘其狀如鵲赤黒而兩首可以衛火又曰山弇嵫之山上多丹木其葉如榖其實如瓜赤符而黑理食之可以衛火又曰帶山之上有獸焉其狀如馬而一角其名曰曜音歡䟽可以衛火又曰令丘之山無草木其上多火又曰崌音居山之上有鳥焉其狀如鴞而赤身白首名曰竊脂可以衛火又曰西海之南流沙之濵赤水後黒水前有山名曰崑崙之丘其外有炎火之山投物即然今扶南東万里有耆蒲國東復五千里有火山國其雖霖雨火常撚火有白䑕常岀山邊求食人捕之以毛作布而今之火浣布此類也又曰厭火國人獸身黒色火出其口中言能吐火神異經曰南荒外有火山焉長四十里廣四五里其中生木晝夜火燃得暴風雨火不滅火中有䑕重百斤毛長七尺餘細如絲可以作布新論曰漢元帝廣求方術之士漢中道人王仲都云但能忍寒暑耳以隆冬單衣於上林昆明池上無變色至夏大暑使暴坐環以十爐火不汗出三輔黄圖曰秦始皇塟驪山六年之間爲項籍所發放羊兒墮羊冢中然火求羊燒其槨藏魏武帝明罰令曰聞太原上黨西河鴈門冬至之後百五日皆火寒食云爲介子推子胥沉江呉人未有絶水之事至於子推獨爲寒食豈不偏乎河圖挺佐輔曰伏羲禪於伯牛錯木作火春秋潜潭巴曰火從井出有賢士從民間起宋均注曰火明賢者象賢者屈滯從井出禮含文嘉曰燧人始鑚木取火炮生爲熟令人無腹疾遂天之意故爲燧人也陸景典語曰衝風之槯枯枝烈火之炎寒草武王伐紂勢然也古今注曰宣帝地節元年上郡沙中夜中有火如粟出不熱又曰陽燧以銅爲之形如鏡向日則火生以艾炷承之得火也璅語曰智伯旣敗將出走夢火見於西方及夫出奔秦又夢見於南方遂奔楚也張衡靈憲曰日疋火月疋水火則外光水則含影河圖汴光篇曰陽精散而分布爲火括地圖曰神丘有火穴光照千里笑林曰某甲夜暴疾門人鑚火其夜隂暗未得火催之急門人忿然曰君責人亦大無道理今闇如􅃮何以不把火照我當得覔鑚火具潘尼箴曰夫水火者所以佐理天地清成大化也在天則日月麗焉在地則水火存焉太平御覽卷第八百六十九
