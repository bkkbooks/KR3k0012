front:
  text: 太平御覽卷第九百七十六菜部一
  hash: sha256:abe9f95434196263a3a8d2814990cdc9288922f612ed343470bfb522fc789514
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_976-1a}
body:
  text: 菜韭菜詩曰我有旨畜亦以御冬旨美御禦也蓄聚菜以禦冬月乏無時也又曰其蔌音速伊何維筍及蒲蔌菜殽也周禮春官曰入學釋菜合舞八學必釋菜禮先師也菜蘋蘩之属儀禮婚禮曰舅姑旣没則婦入三月乃奠菜没終也奠菜者韭祭菜也蓋用薫稱婦之姓曰某氏來婦敢奠嘉菜始爲皇舅禮曰仲秋之月命有司趣民収歛務蓄菜始爲禦冬之備也左傳曰蘋蘩藴藻之菜可薦於鬼神可羞於王公爾雅曰菜謂之蔌𬞞不熟爲饉蔌菜揔名見詩凡草菜可食通名爲𬞞也論語曰雖𬞞食菜羹瓜祭必齊如也又曰飯𬞞食飲水曲肱而枕之樂亦在其中矣尚書大傳曰煞君之室雖生羙菜有義之士弗食後漢書曰劉平與母俱匿野澤中平朝出求食逢餓賊將烹之平叩頭曰今旦爲老母求菜母老將平爲命願得先歸食音嗣下同母畢還就死因涕泣賊見其至讓而遣之平還旣食母訖因白曰属與賊期義不可欺遂還詣賊衆皆大驚相謂曰常聞烈士乃今見之子去矣吾不忍食子於是得全又曰崔瑗愛士好賔客盛脩肴膳殫極滋味不問餘産居常𬞞食菜羹而巳謝承後漢書曰汝南鍾南嚴海君少時郷人有入其園竊菜者明日拔菜悉遺郷里郷里人相約無復取菜者又曰彭城刀曜字子卿爲漁陽相前相所種菜悉付還外魏志曰倭國地温冬夏食生菜吴書曰趙咨使魏魏人曰聞江東有耑音端蹄菜作若爲食咨曰當得倉助庾切鰷以作羹王隱晉書曰皇甫咨姑子梁栁爲城陽太守或勸諮曰栁爲布衣過吾吾送迎栁不出門食不過塩菜貧不以酒肉爲禮也今而送是貴城陽太守而賤梁鴻季也豈中古人之道哉又曰邵續爲石勒所執身灌園鬻菜以供衣食勒屢遣察之歎曰此真髙人矣不如是安足貴乎嘉其清苦賜榖帛毎臨朝嗟歎以勵群官又曰桓温性儉毎讌唯下七奠拌菜果而巳又曰吴隱之母䘮哀毀嘗醎𦵔以其味旨輟而弃之及爲廣州清操踰勵常食不過菜及乾魚而巳帷帳器服皆付外庫時人頗謂其矯然亦始終不易宋書曰張敷父在吴興亡成服凡十餘日始進水漿葬畢不進塩菜遂毀瘠成疾又曰宋慤以軍功封洮陽侯先是郷人庾業家豪冨侈侯服玉食與賔客相對膳必方丈而爲慤設粟飯菜𦵔謂客曰宗上車串噉麄食慤致飽而退𥘉無異辭至是爲慤長史帶梁郡慤待之甚厚不以昔事爲嫌又曰栁元景爲三公時在朝勲貴多事産業唯元景獨無所營南岸有數十畝菜得錢三萬還宅元景怒曰我立此園采以供家啖耳乃復賣以取錢奪百姓之利耶乃以錢乞守園人又曰王玄謨栁元景桓護之雖並北人而玄謨獨受老傖之目凡諸稱爲四方書䟽亦如之甞爲玄謨作四時詩曰堇茹供春膳粟漿充夏飡匏醬調秋菜白醝解冬寒又曰朱脩之姉在郷里飢寒不立脩之貴爲刺史末曽供膳徃姉爲設菜羹麄飯以激之齊書曰晉永嘉五年曲陽縣市黄慶宅左右有園東南廣數文毎種菜輙鮮異雖加採㧞更生夜恒有白光似懸絹道士傳徳占使人掘之三尺獲玉印文曰長承萬福又曰冝都王鏗生三歳䘮母及有識問母所在左右告以早亡便思慕𬞞食自悲不識母又曰江泌性仁孝食菜不食心以其有生意唯食老葉而巳南史隱逸傳曰沈道䖍辟州府凡十二命皆不就有竊園菜者外還見之仍自逃隠待竊者去後乃出梁書曰武帝太官常膳唯以菜𬞞圎案所陳不過三盞又武帝詔曰今雖無復牲腥猶有脯脩之類即之幽明義爲未盡可更詳定悉薦時𬞞左丞司馬筠等叅議大餅代大晡餘悉用𬞞菜帝從之三國典略曰梁蕭棟宇吉豫章安王權之子也侯景以法駕迎棟時棟與其妃執鋤種菜忽然見逼駭愕乆之後魏書曰甄琛母曹氏有孝性夫氏去家路踰百里毎得魚肉菜菓珍羮口實者必令僮僕走奉其母乃後食焉又曰髙閭曽造胡叟短褐曳柴從田歸舎爲閭設濁酒𬞞食皆手自辦案其館宇卑陋園疇𥚹局而飯菜精潔醯醬調羙見其二妾並年衰跛眇衣布穿弊閭見其貧約以衣服直十餘疋贈之亦無辭媿又曰盧義僖性清儉不營財利雖居顯位毎至困乏夌飯𬞞食忻然甘之三國典略曰北齊主以鄴清風園賜穆提婆於是官無𬞞菜賖買於人負錢三百萬其人訴焉斛律光曰此園賜提婆一家足不賜提婆百官足又曰庫狄士文爲貝州刺史性清苦不受公料家無餘財其子甞噉官厨餅士文枷之繫獄累日杖之一百歩送還京僮隷無敢出門所買菜必於外境凡有出入皆封署其門親故絶迹慶吊不通隋書曰姚察陳亡入隋詔授秘書丞別勑成梁陳二史又勑於朱華門長叅文帝察𬞞菲别曰召入内殿賜果菜指謂朝臣曰朕聞姚察學行當今無比我平陳只得此一人唐書曰太宗回次易州界司馬陳元璹令百姓種𬞞坈上而微火煦之欲其速生以擬供進太宗聞之責其謟媚詔免官又曰太宗時徤逹獻佛土菜一莖五葉花赤中心正黄而蘂子紫色泥婆羅獻波稜菜葉類紅藍實如蒺䔧火熟之能益食味又有酢菜狀似芹而味香渾提葱其狀猶葱而甘辛又曰髙宗時司農欲以冬藏餘菜賣之百姓以墨勑示僕射蘇良嗣良嗣判曰昔公儀相魯抜去園葵况臨御萬邦而敗𬞞鬻菜事遂不行又曰王昇爲刑部尚書性貪恡不常在公乃鬻公廨菜園収其價錢以自潤甚爲時論所醜又曰中書園𬞞日給於衆官者主事白常衮減其數崔祐甫怒訶主事曰此相公之命祐甫大詬曰門下侍郎安得理中書之𬞞叱左右踣主事而拽之自是與衮常不平又曰貞元七年冬司農卿李摸免官𥘉司農當供三官冬菜二千車以度支給車直稍賤又阻雨菜敗模以度支爲辭上責其不先聞故免之先是模奏司農菜不足請京兆府市之尹薛玨萬年令韋彤乃禁人私賣上命奪珏俸一月彤俸三月又曰貞元中奚陟爲中書舎人以所得雜給均分省内官又躬親庶務下至園𬞞皆悉自點閱人以爲難而陟處之無倦莊子曰宣尼窮於陳蔡之間顔回擇菜孔藂子曰菜謂之𬞞金樓子曰秦始皇聞鬼谷先生言因遣徐福入海求金菜玉𬞞說苑曰楚文王伐鄧使王子革王子靈共桾菜二子出見老丈人戴畚乞焉不與搏而奪之王聞之令皆拘二子將煞之大夫辭曰取畚信有罪然煞之非其罪也君若何煞之言卒丈人造軍而言曰鄧爲無道故伐之今君公之子搏而奪吾畚無道甚於鄧乎天命而君聞之群臣之曰討有罪而横奪非所以禁暴也恃力虐老非所以教㓜也愛子棄法非所以保國也私二子滅三行非所以從政也丈人舎之矣謝之軍門之外又曰楚莊王賜虞丘子菜田三百號曰國老以孫叔敖爲令尹吕氏春秋曰菜之羙者壽木之華枯姑之東赤木玄木之葉餘瞀之南有菜名嘉樹其色若碧桓譚新論曰董仲舒專精於𫐠古年至六十餘不窺園井菜論行亦云山東六賢傳曰袁下字叔隰陬慮人種菜一園左右竊取度溝瀆下乃爲之橋其敦義如此漢武内傳曰西王母云上仙之藥有碧海之狼菜孝子傳曰北平陽公輦水作漿兼以給過者公𥙷履屩不取其直天神化爲書生問云何不種菜曰無菜種即與數升公種之化爲白璧餘皆爲錢公得以娶婦廣州先賢傳曰丁宻蒼梧人非家織布不衣非巳耕種菜菓不食杜蘭香別傳曰香降張碩賫瓦榼酒七樏多菜而無他味亦有丗間常菜輙有三種色或丹或紫一物與海蛤相類并有非時菜碩云食之亦不甘然一食七八日不飢荆楚歳時記曰正月七日謂爲人日採七種菜以爲羹兩京記曰隋大業六年諸夷來朝請入市交易煬帝許之於是修飾邸店皆使甍宇齊正卑髙如一環貨充積人物華盛競崇侈麗至賣菜者亦以龍鬚席籍之魏王花木志曰吴郡邊海諸山悉生紫菜崔豹古今注曰𦵔荆楊州人謂𦵔爲戢杜寳大業拾遺録曰徐孝頴性仁孝甞在園中晝卧見人盗菜徐徐轉身向裏恐偷者見之仁行退讓皆此類也漢張竦奏曰古叛逆之國潴其宫室以爲汙池名曰凶墟雖生菜𬞞而民不食韭詩曰四之日其蚤獻羔祭韭可曰庶人春薦韭韭曰豊本爾雅曰霍山韭今山中多有孔菜皆如人家所種者說文曰菁韮華韭菜一種乆而生也象形在地上北也通俗文曰韭根曰荄古人切山海經曰遏春山雞山韭丹重之山其草多韭榖梁傳曰古者公田爲井居竈䓗韭盡取焉漢書曰龔遂爲㴾海太守民口種一畦韭晉書曰石崇爲客作豆粥咄嗟便辦毎冬得韭蓱音并韲王愷毎以此事爲恨乃宻貨崇帳下問其所以荅云豆至難煑豫作熟有客來作白粥以投之耳韭蓱韲是擣韭根雜以麥苗耳又曰温嶠滅王敦先是童謡曰剪韭剪韭断楊栁河東小子令我與子以爲賊如韭栁尋得復生也晉書後略曰成都王圍京邑城中無菜採陳韭芥以爲善菜齊書曰周顒隱鍾山王儉謂曰卿在山中何所食荅曰赤米白塩緑葵紫蓼又問何者㝡佳曰春𥘉旱韭秋暮晚菘又曰庾呆之字景行爲丗祖征虜功曹清貧食唯韭𦵔卄瀹韭雜菜或戯之曰誰言庾郎貧食鮭甞有二十七種韭言三九也三國丗略曰北齊太上後宫無限衣皆珠玉一女歳費萬金寒月盡食韭牙莊子曰徐無鬼見武侯武侯曰先生居山食芋壓䓗韭今老病欲酒肉之味耶無鬼曰君爲萬乗之主苦國以義耳目君病矣何勞吾乎列子曰老韭爲莧老羭爲猿魯連子曰市處者僕娈膾炙而食市饒也壅泉沃韭織屨之士從兄弟室父徃而不得粗糒音俻焉非愛其僕妾惡其室父也此其饒羡之與不足也說苑曰衛有一夫負缶入井灌韭終日一區鄧晢過教之曰有機重後輕前命曰桔橰終日訖九百區丈夫曰有機智必有機心我非不知不欲爲也正論曰小民髪如韭剪復生頭如雞割復鳴吏不必可畏從來必可輕奈何欲望致州厝乎漢武内傳西王母曰仙次藥有八阮赤韭繆襲祭儀曰春祀和羹芼以韭水經曰交州平樂山多龍穴傍生野韭人徃乞者神許則風吹制分隨偃而拔不得過越不偃而抜輙凶也楊衒知洛陽茹藍記曰李崇爲尚書令儀同三司冨傾天下僮僕千人而性多儉恡惡衣麄食食常無肉止有韭茹韭𦵔崇家客李元祐語人云李令公一食十八種人問其故元祐曰二九十八聞者大笑丗以此爲譏諸葛亮教張君嗣曰去婦不頋門萎韭不入園以婦人之性草菜之精猶有所耻想忠壯者意何所之太平御覽卷第九百七十六
