body:
  text: 居處部八宅釋名曰宅擇也言擇吉處而營之也說文曰宅人所託也周禮曰凡任地國宅無征鄭注云國宅城中無征稅也禮記曰獻田宅者操書契左傳曰初景公欲更晏子之宅曰子之宅近市湫隘嚚塵不可以居請更諸爽塏者辭曰君之先臣容焉臣不足以嗣之及晏子如晉公更宅反則成矣旣拜乃毀之如里室皆如其舊則使人反之且諺曰非宅是卜惟隣是卜二三子先卜隣矣卒復其舊宅漢書曰蕭何買田宅必居窮僻處曰令後世賢師吾儉不賢母爲勢家所奪又曰魯恭王餘好治宫室苑囿壊孔子舊宅以廣其宫聞鍾磬琴瑟之聲遂不敢復壞於其壁中得古文經傳吴志曰周瑜與孫䇿同年相友善瑜推道南大宅以舎䇿升堂拜母有無通共晉書曰裴楷性寛厚與物無忤不持儉素每遊榮貴輙取其珎玩雖車馬器服宿昔之間便以施諸窮乏甞營别宅基構甚麗與兄共遊行床帳儼然櫺軒踈㓪兄心甚願之而口不言也楷心知其意便使住又曰杜后母裴氏爲廣徳縣君裴氏名穆長水校尉綽孫太傅主簿遐女太尉王夷甫外孫中表之美髙於當世遐隨東海王越遇害無子唯穆渡江遂享榮慶立第南掖門外世所謂杜姥宅云又曰有奏王公國家京城不冝有田宅未暇作諸國邸當使有徃來之處今限京師得有宅一所又書曰劉繪字士彰彭城人也太常悛弟父勔宋末權貴門多客繪解褐爲著作郎太祖見歎曰劉公爲不亡矣繪聦警善隷書爲竟陵王後進賔客時張融周顒並有五言融音旨緩韻顒辭致綺捷繪之言吐又頓挫風氣時人謂語曰劉繪貼宅别開一門言在二家之中也又朝野爲語曰三人共宅夾清漳張南北劉中央言處二人間王隱晉書曰魏舒字陽元㓜䘮父母爲外寗氏所養寗氏起宅相者云當出貴外甥外祖父母以寗氏甥小而慧謂應相也舒荅當爲外家成此宅相又曰上黨鮑瑗家多䘮禍貧苦淳于智卜之卦成謂曰爲君安宅者女子工耶曰是也又曰此人巳死耶曰然智曰此人安宅失冝旣害其身又令君不利君舎東北有大桑樹君徑入市門數十歩當有一人折新馬鞭者便就請買還懸此樹三年當得物瑗承言詣市果得馬鞭懸之三年後浚井中得數十萬銅錢雜器復可二十餘萬於是家業用展病者亦愈晉書曰孔愉營山隂湖南侯山下數畝地爲宅草屋數間便弃官居之送資數百萬悉無所取又曰桓玄得志常欲以謝安宅爲營謝混曰邵伯之仁猶惠及甘棠文静之徳更不保五畝宅耶玄聞慙而止宋書曰𥘉太社西空地一區吴時丁奉宅孫皓流徙其家晉有江左𥘉爲周顗蘇峻宅其後爲袁真宅又爲章武王司馬秀宅皆㓙敗後給臧燾亦頻遇䘮禍故世稱惡地王僧綽常以正逹自居謂宅無吉凶請爲第始就築未居而敗又顔延之傳曰竣旣貴重權傾一朝凡所資供延之無所受器服不改宅宇如舊見竣起宅謂曰善爲之無令人笑汝拙也齊書曰齊世祖武皇帝諱賾字宣逺太祖長子也小字龍兒生於建康青溪宅其夜陳孝后劉昭后同夢龍據屋上故字上焉梁書曰髙祖宋大明八年甲辰生于秣陵縣同夏里三橋宅後魏書曰徳興反於營州使尚書盧同往討之大敗而反屬侍中穆紹與元順侍坐因論同之罪同先有近宅借紹頗欲爲言順勃然曰盧同終將無罪太后曰何得如侍中之言順曰有好宅與要勢侍中豈慮罪也紹慙不敢復言又邦巒傳曰孝文因行樂至司空府南見巒宅謂巒曰朝行樂至此見卿宅乃佳東望徳館情有依然巒對曰陛下移構中原方建無窮之業臣意在與魏昇降寧容不務永寧之宅帝謂司空穆髙僕射李冲曰巒之此言其意不小五代史晉史曰羅紹威前唐時甞建第洛陽福善里莊宗同光中始賜明宗梁租庸使趙巖宅雖華以趨內逺乃召紹威子周敬昜其第後明宗即位一日夢中見一人儀形瓌秀若素識者上夢中曰此得非前宅主羅氏乎及寤訪其子孫左右對曰周敬見列明廷召至果符夢中所見上謂侍臣曰朕不欲使大勲之後乆無土地因授左馮翊非承家爲善何以致此五代史周書曰漢𥘉以晉入蕃將相第宅賜隨駕大臣以趙瑩第賜太祖太祖召瑩子前刑部郎中昜則告之曰所賜第除素屬版籍外如别有契劵巳所置者可歸本直即以千餘緍遺易則易則惶恐辭讓太祖堅之乃受孔子家語曰魯哀公問於孔子曰寡人聞東益宅不祥信有之乎孔子曰不祥有五而益宅不與焉夫損人而自益身之不祥也弃老而取㓜家之不祥也釋賢而任不肖國之不祥也老者不教㓜者不學俗之不祥也聖人伏匿愚者擅權天下之不祥也不祥有五而益宅不與焉淮南子曰魯哀公欲西益宅史爭之爲西益宅不祥哀公作色怒左右數諌不聽乃以問其傳曼折睢對曰天下三不祥而西益宅不與焉哀公大恱復問何爲三不祥對曰不行禮義一不祥嗜慾無止二不祥不聽正諫三不祥哀公喟然自反不益宅風俗通曰宅不西益俗說西者爲上上益宅者妨家長也原其所以西益者禮記曰南向北向西方爲上爾雅曰西南隅謂之隩尊長之處也不西益者恐動摇之耳審西益有害増廣三面豈能獨吉乎國語魯文公欲㢮孟文子之宅文公魯僖公之子㢮毁也孟文子魯大夫公孫敖之子文伯榖也宅有司所居公欲毁之以益宫也使人謂之曰吾欲利子於外之寛者對曰夫位政之建也署位之表也車服表之章也宅章之次也禄次之食也君議五者以建政爲不昜之政也今有司未命昜臣之署與其車服而曰將昜而次爲寛利也夫署所以朝夕䖍君命也臣立先臣之署服其車服爲利故而昜其次是辱君命也不敢聞命若罪也則請納禄與車服而違署唯里人之所命次公弗取臧文仲聞之曰孟孫善守矣其可以蓋穆伯而守其後於魯乎穆伯文子之父公孫敖也淫乎魯出奔而死折於齊今文子守官不失禮故可掩蓋其父惡守其後嗣也公欲㢮郈敬子之宅亦如之公文公郈敬子魯大夫郈惠伯玄孫之孫敬伯回也亦如之者亦謂之欲利子於外之寛者也對曰先臣惠伯以命於同里甞禘烝享之所致君昨者世有數矣出入受事之幣以致君之命者亦有數矣今命臣更次於外無乃違乎請從司徒以班從次亦弗取孟子曰五畒之宅樹牆下以桑匹婦蠶之則老者足以衣帛韓子曰有與猛者鄰欲賣宅避之人曰是其貫將滿矣子姑待之荅曰吾恐以我滿貫也遂去之淮南子曰任一人之能不足以治三畝之宅循道里之數因天地之固然則六合不足均也抱朴子曰葛盧佐光武有大功受爵立宅舎於博望里于今基址石礎存焉郡國誌曰􅉑州楊震宅西有龍望原南崖有太尉公藏書窟太元初人逐獸入穴見古書二千餘卷又曰洛陽董卓宅在永和里掘地輙得金玉寳玩後魏邢欒掘得丹沙及錢銘曰董太傳之物後夢見卓索欒不與經年而卒又曰洛陽石崇宅有緑珠樓今謂之狄泉又曰洛陽蘇秦宅在利仁里後魏髙顯業毎夜見赤光於光處掘得金百斤銘曰蘇家金業爲之造寺又曰幹山南許詢宅又曰長沙南寺賈誼宅亦陶侃宅在焉又曰婁縣山下有巫咸故宅在焉又曰鄂州西塞山黄琬宅丁固宅又曰尋陽郡湓城亭有陶潜宅又曰郴州城東北有仙人蘇耽宅又曰淯陽有小長安東場城有范蠡祠即故宅也又曰恒州九門縣新市城西藺相如宅又曰鄧州梅溪出紫山南道百里奚故宅基在焉又曰宻州髙宻西有鄭玄宅亦曰鄭城玄後移葬於屬阜墓側有稻田萬頃斷水造魚梁歲収億萬世號萬疋梁輿地誌云縣東南白沙有龐士元宅於漢水之北司馬徳橾宅於漢水之南隔魚梁州街對宇歡情自接毎至相思則褰裳渉水樓承先別傳曰樓玄到廣州宻求虞仲翔故宅處遂徘徊躑䠱哀咽慺愴不能自勝耳三輔决録曰郭詳爲太尉長史起大宅在髙陵城西世稱曰長史宅瀬郷記曰老子祠在瀬郷曲仁里譙城西岀十里老子平生時教化學堂故處也漢桓帝修建屋宇爲老子廟廟北二里李夫人祠是老子所生舊宅也劉楨京口記曰糖頺山山周廻二里餘山南隔路得郗鑒故宅五十餘畝又曰長村東太瀆瀆北有謝玄故宅戴延之西征記曰東陽門外道北吴蜀二主第宅去城二里墟基猶存又曰潼關北去蒲坂城六十里城中有舜廟城外有宅井及二妃壇南去城二十里有山舜所耕山也述征記曰豐水西九十里有漢髙祖宅又曰山陽縣城東北二十里魏中散大夫嵆康園宅今悉爲田墟而父老猶謂嵆公竹林地以時有遺竹也成都記曰成都縣南百歩有嚴君司馬相如揚雄宅今草玄亭餘跡尚存陳留耆舊傳曰董宣爲北海太守大姓公孫舟造起大宅卜工占之云宅成當出一喪舟使其子取行人殺之以塞咎宣收舟考殺之世說曰鍾㑹荀濟二人情好不恊荀有寳劒可直百萬常在母鍾太夫人許㑹善書學荀手跡作書與母取劒仍竊去不還荀後知是鍾而無由得永思所以報之㑹鍾兄弟共以千萬起新宅始成甚精麗未得移住荀善畫於是潜徃畫鍾門堂並作太傳形像衣冠狀貌如平生之容鍾來入門便感慟於是宅遂空廢徐邈别傳曰邈字仙民舉世􅖴承傳爲定範舊疑歳神在夘此宅之左即彼宅之右地何得俱忌邈以爲太歳之属自是遊神譬如日出之時向東皆逆非爲定體水經注曰齊城門外有晏嬰宅盛弘之荆州記曰新野郡西七里有楊溪源出紫山南流入淯故耆老傳云溪西有百里奚宅又曰新野郡南有越相范蠡祠蠡宅三户人傳云祠處即是宅又曰襄陽范蠡祠南有晉河南尹樂廣宅周廻十餘畝曩舊井猶未頺檀道濟置邏其中即名爲樂宅又曰襄陽西北十許里名爲隆中有諸葛孔明宅又曰宛城有伍子胥宅范注荆州記曰義陽六安縣有光武宅枕白水所謂龍飛白水蘇州記曰周文學科孔子弟子言偃宅在常熟縣西史記云言偃吴人也字子游又吴地記云宅有井井邊有監洗石周四尺輿地志云梁蕭正德爲郡太守爲蕭將去莫知所在吴地記曰云陸氏宅在長谷谷在吴縣東北谷名華亭谷水下通松江昔陸遜陸凱居此谷吴志云漢廬江太守陸康與袁術有隙使姪遜與其子績率宗族逺此避難居于是谷谷東有崑山父祖墓焉故陸機思郷詩曰髣髴谷水陽婉孌崑山隂列仙傳云歷陽有彭祖宅禱祠風雨應期而至襄沔記曰郡南晉永興中鎮南將軍襄陽郡守劉弘至隆中觀亮故宅立碣表閭使太傳掾犍爲李興爲文又曰繁欽宅王粲宅並在襄陽井臺猶存又曰長流解西有梁曹儀同景宋栁儀同慶逺韋儀同叡諸宅並相隣次郭城西門韋叡少時有南陽人蔡郍善相相叡宅應出三公刺史貴不可言時叡宅上有草屋十間郍宅在城南悉是瓦屋求叡換宅疑而不許叡兩兄闡纂有令問位望在叡之右郷里謂此人應班槐棘其後闡纂相繼而終叡奉龍飛遂成宅相簡文徴書旣至遊憇此宅望氣之言殆有徴矣丹陽記曰有張子布宅在淮水南對瓦官寺門張侯橋所也橋近宅因以爲名仲雍荆州記曰秭歸縣有屈原宅伍子胥廟擣衣石猶存韋述兩京記曰東京冝人坊自半本隨齊王􅌔宅煬帝愛子初欲盡坊爲宅帝問宇文愷曰里名爲何愷曰里名冝人帝曰旣號冝人柰何無人可以半爲王宅又曰仁和坊兵部侍郎許欽明宅欽明户部尚書圉師猶子與中書令郝處俊郷黨親族兩家子弟類多醜陋而盛飾車馬以遊里巷京洛爲之語曰衣裳好儀觀惡不姓許即姓郝又曰崇仁坊西南隅長寜公主宅旣承恩盛加雕飾朱樓綺閣一時勝絶又有山池别院山谷虧蔽勢若自然中宗及韋庶人數遊於此第留連弥日賦詩飲宴上官昭容操翰於亭子柱上冩之韋氏敗公主隨夫爲外官𥘉欲岀賣木石當二千萬山池別舘仍不爲數遂奏爲觀請以中宗號爲名詞人名士競入遊賞又曰延壽坊東隅駙馬裴巽宅髙祖末裴行儉居之自行儉以前居者輙死自儉卜居有狂僧突入髠其庭中大栁樹中有豕走岀徑入北隣其家數月暴死盡此宅清晏又曰永興坊西門北魏徴宅本宇文愷宅及徴居之太宗幸焉時將營小殿賜徴爲堂又曰通化坊東南鄖公殷開山宅西北顔師古宅又有歐陽詢宅時人謂之吴兒坊又曰延壽坊北門之西有中書令閻立本宅宅内西亭有立本畫水之跡又曰明教坊龍興觀西南隅開府宋璟宅南門之東國子司業崔融宅璟造宅悉東西相對不爲斜曲以避惡名融爲則天哀䇿用思精苦不直馬過其門不覺文就而卒又曰尚善坊東南隅歧王範宅宅有薛稷畫鶴世稱妙絶又曰勸善坊東北隅太子太師鄭公魏徴宅山池院有進士鄭光乂畫山水爲時所重又曰宣風坊北街之西中書令蘇味道宅宅有三十六柱亭子時稱巧絶禄山事跡曰禄山舊宅在道政坊玄宗以其隘陋更於親仁坊選寛爽之地出内庫錢更造宅焉勑所司窮其華麗不限功力財物堂皇院宇重復窈窱周匝誥曲戸牖交䟽髙臺臨池苑若天造帷帳幔幕充剏其中至九年八月禄山獻俘至京方命入此新宅春秋内事曰隂宅以日竒陽宅以月偶隂宅先内男子當令竒陽宅先内女子當令偶乃吉隂宅内男子三人陽宅内女子二人地鏡圖曰人望百家宅法中有赤氣者家有汎財白氣入人家有財不保黒氣有五其伏在宅中青氣者有銀地寳也嵆康宅無吉凶論曰設爲三公之宅而命愚民居之必不爲三公可知也夫壽夭之不可求甚於貴賤然則擇百年之宫而望殤子之壽孤逆魁忌以速彭祖之夭必幾矣然則果無宅也是性命自然不可求矣樓觀本記曰隋之開皇元年勑旨樓觀者本尹先生卜居之勝宅老君說經之聖跡乃玄教根源福田之首冝令所司别作圖様開拓舊居太平衘覽卷第一百八十
