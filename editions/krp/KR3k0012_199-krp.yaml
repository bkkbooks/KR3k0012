  text: 太平御覽卷第一百九十九
  hash: sha256:95c77008701c7fa234492489f7bc1325b33444ee618cfacb42ca7f8f6e725b4c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_199-1a}
body:
  text: 封建部二公封侯封伯封子封男封同姓封外戚封公封韋昭辯釋名曰公直也取其正直無私易師卦曰大君有命開國承家周書能移於衆與百姓同之謂公周禮地官曰大司徒職曰諸公之地封土方五百里其食半又春官曰太宗伯職曰公執桓圭晉書曰陶侃有善相者師圭謂侃曰君左手中指有堅理當爲公若徹於上貴不可言侃以針決之見血灑壁而爲公字以𥿄裛手公字愈明後魏書曰許洛陽爲鴈門太守家田三生嘉禾皆異壟合頴丗祖善之進爵北地公魏咸熈元年相國晉王奏建五等諸公地方七十五里邑一千八百戸置相一人典祠典書典衛典禮各一人妾六人車前司馬十人旅賁四十人侯封周易豫卦曰豫利建侯行師彖曰豫順以動故天地如之而况建侯行師乎又比卦曰地上有水比先王以建萬國親諸侯又屯卦曰盤桓利居貞利建侯周書曰能樹名生物與天道俱謂之侯周禮春官大宗伯職曰侯執信圭又典命職曰諸侯伯七命其國家宫室車旗衣服禮儀皆以七爲節漢書解詁曰列侯金印紫綬以賞有功功大者食縣邑小者食郷亭後漢書曰馮石襲母公主封獲嘉侯亦爲侍中稍遷衛尉能取恱當代爲安帝所寵帝幸其府留飲十許日賜駮犀貝劒佩刀以班犀飾劒也紫艾綬艾即盭緑色也其色以艾玉玦各一半環曰玦以飾帯也又曰丁綝建武元年拜河南太守及封功臣帝令各言所樂諸將皆占豐邑美縣唯綝願封夲郷或謂綝曰人皆欲縣子獨求郷何也綝曰昔孫叔敖勑其子受封必受墝埆之地今綝能薄功微得郷亭厚矣帝從之封爲定陵新安郷侯食邑五千戸後徙封陵陽侯又曰韓歆封扶陽侯好直言無隱諱帝每不能容甞因朝㑹聞帝讀隗囂公孫述相與書歆曰亡國之君皆有才桀紂亦有才帝大怒以爲激發歆又證歳將飢凶指天畫地言甚剛切坐免歸田里帝猶不釋復遣使宣詔責之又曰建武二年定封景丹櫟陽侯帝謂丹曰今關東故王國雖數縣不過櫟陽萬戸邑夫冨貴不歸故郷如衣繍夜行故以封卿耳前書武帝謂朱買臣之詞也丹頓首謝又曰光武下詔封諸將愽士丁恭議曰古帝王封諸侯不過百里故利以建侯取法於雷又曰隂興遷侍中賜爵關内侯帝後召興欲封之置印綬於前興固讓曰臣未有先登䧟陣之功而一家數人並蒙爵士令天下觖望誠爲盈溢臣蒙陛下責之恩深至厚冨貴巳極不可復加至誠不願帝嘉興之讓不奪其志又曰傅昌嗣建𥘉中遭母憂因上書以國貧不願之封乞錢五十萬爲關内侯肅宗怒貶爲關内侯竟不賜錢魏志曰張魯自巴中將其餘衆降封魯及五子皆爲列侯又曰文帝黄𥘉二年分三公户邑封子弟各一人爲列侯又咸熈元年晉王奏建五等諸侯地七十里邑千六百户官屬同諸公妾五人車前司馬八人旅賁三十六人呉志曰全琮字子璜劉備將關羽圍逼襄陽琮上䟽陳羽可討之計權時已與吕蒙隂議襲之恐事泄故寢琮表不荅及擒羽權置酒公安顧謂琮曰君前陳此孤雖不相荅今日之捷亦君之功也於是封華亭侯晉書曰髙貴郷公將攻文帝召王沈及王業告之沈馳白帝以功封安平侯邑二千户沈旣不忠於主甚爲衆論所非又曰衛瓘都督幽州以其離間二虜功賜子亭侯瓘乞以封弟未受命而亡子客受封爲亭侯瓘六男無爵悉讓於弟逺近稱之隋書曰李崇字永隆英果有籌筭膽力過人後周元年以父賢勲封廻樂縣侯時年尚小拜爵之日親族相賀崇獨泣賢恠而問之對曰無勲於國而㓜少封侯當報主恩不得終於奉養是以悲耳賢由是大竒之伯封周書曰率衆時作謂之伯周禮春官太宗伯職曰伯執躬圭孝經援神契曰伯白也魏志曰咸熈元年春晉王奏建五等作地方六十里邑千二百户妾四人車前司馬八人旅賁二十八人後周書曰王勇論討茹茹功別封永固縣伯邑五百户時有別封者例聽廻授次子勇獨請封兄子元興時人義之子封周禮春官典命職曰子男五命其國家宫室車旗衣服禮儀皆以五爲節又曰春官大宗伯職曰子執榖璧魏志曰蔣愷濟之孫也咸熈中開建五等以濟著勲前朝改封愷爲下蔡子又曰咸熈元年相國晉王奏五等諸子地方五十里邑八百户相一人典詞令典書丞典衛丞各一人妾三人車前司馬四人旅賁二十人齊書曰王敬則封重安縣子邑三百五十户敬則少時於草中射獵有虫如烏豆集其身擿去乃脫處皆流血敬則惡之詣道士卜道士曰不湏憂此封侯之瑞也敬則聞之喜故出都自效至是如言環濟要略曰子獨孳孳栖下之稱也男封周禮地官大司徒職曰諸男之地封疆方百里其食者四之一又春官典命職曰男執蒲璧環濟要略曰男任也任治事受王命爲君也魏志曰咸熈元年相國晉王奏建五等男地方三十五里邑四百户相一人典祠長典書丞各一人妾二人車前司馬二人旅賁十二人又次國男方二十五里邑二百户同姓封毛詩駉閟宫曰乃命魯公俾侯于東奄有龜蒙遂荒大東左傳僖中曰昔周公弟二叔之不咸故封建親戚以蕃屏周管蔡郕霍魯衛毛聃郜雍曹滕畢原鄷郇文之昭也文昭十六國也邘鄑應韓武之穆也武穆四國凡蔣邢茅胙祭周公之㣧也周公㣧六國也又昭公上曰武王邑姜娠大叔夢天謂巳余命而子曰虞將與之唐及生文在手曰虞遂以命之史記曰呉太伯太伯弟仲雍皆周大王之子而季歷之兄二人知大王欲立季歷乃適荆蠻以避季歷義而歸之千餘家立爲呉太伯太伯無子而仲雍代立五丗武王尅啇求太伯仲雍之後得周章周章巳君呉因而封之又曰武王封呉周章之弟虞仲於虞列爲諸侯十二丗而爲晉所滅又曰周公旦武王之弟佐武王平紂而封於少皥之墟曲阜是爲魯公凡四十四丗而楚考烈王滅魯又曰管叔鮮蔡叔度武王之弟武王巳尅殷封鮮於管封度於蔡周公誅武庚殺管叔放蔡叔蔡旣遷而死其子曰胡胡乃改行率德周公言於成王復封于蔡凡二十五丗至侯齊而楚惠王滅蔡又曰曹叔振鐸者武王弟也武王巳尅殷封振鐸於曹凡二十四丗至伯陽而宋滅曹又曰衛康叔者武王弟也周公以成王之命伐武庚放蔡叔殺管叔以殷餘民封康叔爲衛君凡三十九丗至君角而秦并天下廢爲庶人又曰晉叔虞者成王之弟成王與叔虞戲削桐葉爲珪以唐封汝史佚因言請擇日立叔虞成王曰吾與之戲耳史佚曰天子無戲言遂封叔虞於唐唐在河汾之東三十五丗至靖公而韓魏趙三分其地又曰鄭桓公友者周厲王庶子封於鄭二十四丗至鄭君乙而韓哀侯滅鄭併其地又曰越王勾踐其先苗胤夏后少康之子封㑹稽以奉守禹之祀斷髮文身二十餘丗至子勾踐立滅呉稱霸後十丗閩君揺佐諸侯平秦髙祖以揺爲楚王漢書曰漢興之𥘉尊王子弟大啓九國京師内史凡十五郡公主列侯頗邑其中而國大者跨州兼郡小者連城數十也又曰髙祖封兄喜爲代王匈奴入代廢爲合陽侯子濞爲呉王又曰吕后封楚王郢爲下邳侯齊王肥子章朱虚侯興居東牟侯又曰孝文封齊王肥子十人爲侯淮南王長子四人爲侯後改封王又曰孝景封楚王子四人爲侯梁王子二人爲侯又曰淮南厲王死後孝文憐淮南王有子四人年皆七八歳廼封子安爲阜陵侯子勃爲安陽侯子賜爲陽周侯子良爲東城侯又曰梁孝王死竇太后泣極哀不食帝哀懼不知所爲與長公主計之迺分梁爲五國盡立孝王男五人爲王女五人皆令食湯沐邑奏之太后太后迺恱爲帝一食又曰孝武帝令諸王推恩分子弟諸王子孫一百七十七人爲侯又曰武帝以子弘爲齊王子旦燕王子胥廣陵王子髆昌邑王髆子賀爲昭帝後即位二十七日廢歸故縣又曰武帝使御史大夫張湯䇿立子閎爲齊王曰於戲小子閎受兹青社朕承祖考維稽古建爾國家封於東土丗爲漢蕃輔立子旦爲燕王曰小子旦受兹玄社建爾國家封于北土子胥爲廣陵王曰小子胥受兹赤社建爾國家封于南土又曰宣帝詔曰蓋聞象有罪舜封之其封昌邑王賀爲海昏侯又曰宣帝封子厥爲淮陽王宇爲東平王囂爲楚王竟爲中山王廣陵王子胥弘爲髙密王又曰昭帝封諸王子孫十二人宣帝封六十三人元帝封四十八人成帝封四十三人哀帝封九人平帝封四十八人爲侯續漢書曰靈帝封河間王子庾爲濟南王奉帝父孝仁祀魏志曰明帝大和六年春二月詔曰古之帝王封建諸侯所以藩屏王室也詩不云乎懷德惟寧宗子維城秦漢繼周或強或弱俱失厥中大魏創業諸王開國隨時之冝未有定制非所以永爲後法也其改封諸侯王皆以郡爲國晉起居注曰武帝詔皇子𥙿生七歳矣得疾封始平王又曰武帝詔安平獻王孫承昔以父早亡不建大祚以縣封之今以三縣封爲武邑王又曰惠帝詔侍中司馬討楊駿之功封東海王食六縣晉百官名曰武帝以齊王㽔爲遼東王紹皇弟定國後賛爲廣陵王紹弟廣德後陳留風俗傳曰周成王戲其弟桐葉之封周公曰君無二言遂封之於唐唐侯常愼其德其詩曰媚兹一人唐侯愼德是也華陽國忘曰武帝封子頴爲成都王以蜀廣漢犍爲汶山十萬户爲王國易蜀都太守號爲成都内史外戚封史記曰武帝衛后弟青封長平侯四子皆封侯貴震天下天下歌曰生男無喜生女無怒獨不見衛子夫霸天下漢書曰文帝封太后弟薄昭爲軹侯又封王舅駟鈞爲侯又曰景帝封太后弟姪竇廣國爲章武侯竇彭祖爲竇嬰以破呉楚功封魏其侯后弟王信爲益靖侯又曰武帝封太后同母弟田蚡爲武安侯勝周陽侯皇后弟衛青以伐匈奴封長平侯皇后姊子霍去病以伐匈奴封冠軍侯漢書曰元帝封王皇后父禁爲平陽侯薨長子鳯嗣又曰王音旣以從舅越親用事小心親職歳餘上下詔封音爲安陽侯食邑與五侯等俱三千户又曰成帝封太后兄子莽爲新都侯宣帝悼皇考皇舅孫史丹爲武陽侯皇后兄趙欽爲新成侯父趙臨爲成陽侯太后姊子淳于長定陵侯中山王舅馮叅爲冝陽侯又曰哀帝欲封祖母傅太后從弟啇鄭崇諌曰孝武皇帝封親舅五侯天爲赤黄晝昏日中有黒氣今祖母從昆弟二人已侯許皇后父髙武侯以三公封尚有因縁今欲復封啇壞亂制度逆天人心非傅氏之福東觀漢記曰封馬防兄弟三人各六千户爲頴陽侯特以勲勞綏定西羌以襄城美亭一千二百户増防防身帶三綬寵貴至盛又曰鄧訓自中興後累丗寵貴凢侯者二十九人貴盛莫比後漢書曰明德馬后詔不得封外戚章帝省詔悲歎復重請曰漢興舅氏之封侯猶皇子之爲王也太皇誠存謙虚奈何令臣獨不加恩三舅乎且衛尉年尊兩校尉有大病衛尉太后兄瘳兩校尉兄防兄光也如令不諱使臣長抱刻骨之恨冝及吉時不可稽留太后報曰吾反覆念之思令兩善豈徒欲獲謙讓之名而使帝受不外施之嫌哉以恩澤封爵外家爲外施也昔竇太后欲封王皇后之兄竇太后文帝后也王皇后景帝后也兄即王信後封爲蓋侯丞相條侯言受髙祖約無軍功非劉氏不侯條侯周亞夫也前書曰髙帝與功臣約非劉氏不王非功不侯如違約天下共擊之今馬氏無功於國豈得與隂郭中興之后等耶後漢書曰隂識封隂郷侯二年以征伐軍功增封識讓曰天下𥘉定將帥有功者衆臣託屬掖庭乃加爵邑不可以示天下帝甚美之魏志黄𥘉二年詔曰后族之家不得横受茅土之爵以此詔傳後丗若有違背天下共誅之魏志曰明帝追封甄后父逸安成郷侯兄豫襲封後改爲魏昌侯子暢嗣父封暢弟温韡豔皆列侯又以後亡從孫黄合葬帝愛女淑追封黄列侯呉志曰孫皓元年十二月封后父滕牧爲髙密侯舅何等三人皆列侯王隱晉書曰武帝封楊后父鎭軍將軍楊駿爲臨晉侯后母太原龐爲安昌郷君太學生王鈴曰侯稱臨晉後必制國也駿漸驕傲胡奮語駿曰卿恃女更豪耶人與天家婚未有不滅門者早晚事耳駿曰卿女復不在天家耶奮曰我女與卿女作婢何能増損又曰楊駿以父超居重位自鎭軍將軍遷車騎將軍封臨晉侯識者議之曰夫建諸侯所以藩屏王室也后妃所以供粢盛弘内敎也后父始封而以臨晉爲侯兆於亂也太平御覽卷第一百九十九
