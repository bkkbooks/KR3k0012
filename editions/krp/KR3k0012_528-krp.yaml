front:
  text: 太平御覽卷第五百二十八禮儀部七
  hash: sha256:cfaaec4db82cf46684c3a8eec492213d68f41e94d6c2b778ab72a33023ba77fb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_528-1a}
body:
  text: 迎氣禘祫六宗迎氣禮記月令曰孟春立春之日天子親率三公九卿大夫迎春於東郊蔡邕章句曰迎春者禮昊天句芒之神也於東郊就其位也邑外爲郊去邑八里内因木數也周禮建國之神位兆五帝於四郊以蒼珪禮東方以赤璋禮南方以白琥禮西方以玄璜禮北方皆有牲幣各放其方之色樂奏太蔟歌青陽冕執于戚舞雲翹育命所以導牧時和也孟夏迎夏於南郊章句曰迎夏者禮炎帝祝融神也於南郊七里因火數也王用赤璋牲幣各放其色樂奏中宫歌朱明其他皆如孟春也孟秋迎秋於西郊章句曰迎秋者禮少昊蓐收之神於西郊九里因金數也玉用白琥牲幣各放其色樂奏夷則歌自藏其他如孟夏之禮孟冬迎冬於北郊章句曰迎冬者禮顓頊玄冥之神也於北郊六里水數玉用玄牲幣各放其色樂奏應鍾歌玄英其祀皆如孟秋之禮續漢書禮儀志曰立春之日百官皆衣青迎氣青郊郡縣皆青服幘立青幡施土牛耕人於門外以示兆民立夏之日百官皆衣赤迎氣赤郊立秋之日百官皆衣白迎氣白郊立冬之日百官皆衣皂迎氣黒郊又祭祀志曰縣邑常以立春之日皆青幡青幘迎春於郭外令一童男帽青巾衣先在郭外迎春者至自野中岀迎者拜之而還皇覽禮天子迎四節日天子迎春夏秋冬之樂又順天道是故距冬至日四十六日則天子迎春於東堂距邦八里堂髙八尺堂階八等青稅八乗旂旐尚青田車載矛號曰助天生倡之以角舞之以羽此迎春之樂也自春分數四十六日則天子迎夏於南堂距邦七里堂髙七尺堂階七等赤稅七乗旂旐尚赤田車載弓號曰助天養倡之以徴舞之鼔鞉此迎夏之樂也自夏至數四十六日則天子迎秋於西堂距邦九里堂髙九尺堂階九等白稅九乗旂旐尚白田車載㦸號曰助天收倡之以啇舞之以于戚此迎秋之樂也自秋分數四十六日則天子迎冬於北堂距邦六里堂髙六尺堂階六等黒稅六乗旂旐尚黒田車載甲號曰助天誅倡之以羽舞之以籥此迎冬之樂也所以迎四時樂養九志於西堂冬養九勝於北堂養後三月而止天子行殺必順天道宋書禮志曰漢明帝據月令有五郊迎氣服色之禮因採元始中故事兆五郊于洛陽祭其帝與神車服各順方色魏晉依之江左以來未遑脩建禘祫毛詩清廟雍曰雍禘太祖也禘大祭有來雍雍至止肅肅相維辟公天子穆穆又啇頌曰長發大禘大禘郊祭天也禮記曰王者禘其祖之所自出以其祖配之是謂也濬哲維啇長發其祥洪水芒芒禹敷下土方外大國是疆幅隕旣長箋云長猶久也隕當作圎圎謂周也深知乎維啇家之徳也乆發見其禎祥矣乃用洪水禹敷下土正四方定諸夏廣大其竟界之時始有王天下之萌兆歷虞夏之丗故爲乆也禮記曽子問曰當七廟五廟無虚主虚主唯天子崩諸侯薨與去其國與祫祭於太祖爲無主耳禮記大傳曰禮不王不禘王者禘其祖之所自出以其祖配之凡大祭曰禘自由也大祭其先祖所由生謂郊祭天也王者之祖先皆感太徴五帝之精以生背用正月郊祭之盖特尊焉孝經曰郊祀后稷以配天宗祀文王於明堂以配上帝凡配五帝也周禮宗伯職曰以肆獻祼享先王以饋食享先王以祠春享先王以禴夏享先王以甞秋享先王以烝冬享先王宗廟之祭有此六享肆獻祼饋食在四時之上則是祫也禘也禮稽命曜曰三年一祫五年一禘以衣服想見其容色三日齋思親志意想見所好意喜然後入廟左傳昭四曰十五年春將禘于武公戒百官杜預注曰戒齋也梓慎曰禘之日其有咎乎吾見赤黒之祲非祭祥也喪氛也祲妭氣也在其莅事乎公羊傳文上曰祫者何也合祭也其合祭柰何毀廟之主陳乎太祖未毀廟之主皆升合食於太祖爾雅曰禘大祭也郭璞注曰五年大祭白虎通曰祭宗廟所以禘祫何尊人君貴功徳廣孝道位尊徳盛所及彌逺五經異義曰今春秋公羊說祠宗廟筮而不卜傳曰禘祫不卜又曰謹案叔孫通宗廟有月祭之禮知古而然也三歳一祫此周禮也五歳一禘疑先王之禮也又曰古春秋左氏說古者先王日祭於祖考月薦於曽髙時享及二祧歳禱於壇禘及郊宗石室五經通義曰王者諸侯所以三年一祫五年一禘何三年一閏天道小備故三年一祫祫者皆取未遷廟主合食太祖廟中五歳再閏天道大備故五歳一禘禘者諦也取巳遷廟主合食太祖廟中禮記外傳曰禘祫謂之殷祭殷多盛也祫大而禘小祫合也合毀廟之主岀而陳列之親廟之主升入大廟功臣又得配享其禮大也禘則各於宫神主不出廟也祭大何以名祫祭卑不敢降尊也春秋之經有禘而無祫經云大事於大廟又云有事於其廟即是禘也此是國之大事時云有事毀廟無時祭時祭月祭皆近廟耳玄孫之子於髙祖親盡也但五年有二殷祭耳祭及逺祖象年再閏也神主入廟先爲一禘爲將逓遷徧告之也明年春禘而又祫祫後二年一禘禘後三年一祫自此爲常漢書曰元始五年春正月祫祭明堂諸侯王二十八人列侯百二十人宗室子九百餘人助祭禮畢皆益戸賜爵及金帛増秩𥙷吏各有差又劉歆曰春秋傳曰日祭月祀時享歳貢終王祖禰則日祭曽髙則月祀二祧則時享壇墠則歳貢張晏曰去祧爲壇掃地祭之也大禘則終王服䖍曰夷蠻經王乃入助祭各以珎貢以助大祫之祭也彌逺彌尊故禘爲重矣續漢書祭祀志曰建武二十六年詔問張純禘祫之禮奏三年一祫五年一禘禘之言諦諦昭穆尊卑之義以夏四月陽氣在上隂氣在下故正尊卑之義祫以冬十月五糓成熟故骨肉合聚飲食漢雜事曰元帝時匡衡貢禹以經義毀先帝親盡之廟髙帝爲太祖孝文爲太宗孝武爲世宗孝宣爲中宗祖宗廟皆世世奉祀其餘惠景以下皆毀五年而再殷祭猶古之禘祫王隱晉書曰太康中太廟成遷神主於新廟上帥百官奉迎於道左遂親禘祫後魏書曰世宗景明二年夏六月祕書丞孫思蔚上言古之祭法時祫並行天子先祫後時諸侯先時後祫此施當世在今則煩且禮有升降事有節文適時之制聖人弗違當祫之月减時祭以從要省制可十一月壬寅改築圎亡於伊水之陽乙卯仍有事焉宋書禮志曰凡禘祫大祭則神主悉出廟堂爲昭穆以安坐不復停室也又志曰博士徐道娱上議曰太廟烝甞儀注皇帝行事畢出便坐三公巳上獻太祝送神于門然後至尊還拜百官賛拜乃退謹㝷清廟之道所以肅安神也禮曰廟者貌也神靈所慿依也事亡如存若恒在也旣不應有送神之文自陳豆薦爼車駕至止並弗奉迎夫不迎而送送而後辭闇矩之情實用未逹博士江邃議在始不迎明在廟也卒事而送節孝思也若不送而辭是舎親也辭而後送是違神也故孝子不忍違其親又不忍違神是以祝史送神以成烝甞之義又禮志曰禘祫之禮三年一五年再公羊所謂五年再殷祭也在四時之間周禮所謂凡四時之間禮也盖歷歳節月無定天子諸侯先後弗同禮天子祫甞諸侯蒸祫有田則祭無田則薦鄭注天子先祫後祭諸侯先時祭然後祫有田者既祭又薦新祭以首時薦以仲月然則大祭四祀其月各異天子以孟月殷仲月蒸諸侯孟月甞仲月祫也齊書禮志曰右僕射王儉議按禮記王制天子先祫後時祭諸侯先時祭後祫春秋魯僖二年祫明年春禘自此以後五年再殷禮緯稽命徴曰三年一祫五年一禘經記所論禘祫與時祭其言詳矣唐書曰元和中太常上言按禮祭不欲數太廟禘祫祭禮重於時饗時饗與禘祫同月即其月但行禘祫祭不行時饗盖不欲煩是禮先重者今時饗重於朔望薦食稽求禮情叅酌輕重請毎至時及臘但行饗禮其月朔望薦食請停如告廟日與朔望薦食日同請先行告禮然後薦食六宗尚書舜典曰禋于六宗鄭注曰六宗謂星辰司中司命風雨師也尚書大傳曰萬物非天不生非地不載非春不動非夏不長非秋不収非冬不藏故書曰禋于六宗此之謂也五經異義曰今尚書歐陽夏侯說六宗者上不及天下不及地旁不及四方居中央恍忽無有神助隂陽變化有益於人郊天并祭之又曰古尚書說六宗者天地屬神之尊者謂天宗三地宗三天宗日月北辰也地宗岱山河海也日月爲隂陽宗北辰爲星宗岱爲山宗河爲水宗海爲澤宗也祀天則天文從祀地則地理從也續漢書祭祀志曰安帝以尚書歐陽家說云六宗者在天地四方之中爲上下四方之宗以元始故書謂六宗亦六子之氣日月雷風山澤者爲非三月更立六宗祠於洛陽城西北地禮比太社東觀漢記曰光武即帝位燔燎告天禋于六宗李郃别傳曰郃侍祠南郊不見六宗祠奏曰按尚書肆類於上帝禋于六宗漢興於甘泉汾陽祭天地亦禋六宗至孝成時匡衡奏立北郊復祠六宗至建武都洛陽制郊祀不道祭六宗由是廢不血食今冝復舊上從公議由是遂祭六宗張純六宗表曰臣竊以十一家凡有六統而所據各異考之經禮大義不通臣謂禋于六宗祀祖考所尊者六宗則三昭三穆也魏書曰明帝問王肅六宗竟幾對曰坎爲水離爲火震爲雷巽爲風艮爲山兊爲澤此乾坤六甲子也太平御覽卷第五百二十八
