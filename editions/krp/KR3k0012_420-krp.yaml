body:
  text: 人事部六十一義上釋名曰義者冝也裁制事物使合冝也說又曰義者巳之威儀也易下繫曰理財正辭禁民爲非曰義禮記經解曰除去天地之害謂之義尚書曰以義制事左傳隱公曰君子曰石碏純臣也大義㓕親論語里仁曰君子喻於義小人喻於利喻猶曉也又曰君子之於天下無適也無莫也義之與比又曰見義不爲無勇也史記曰趙朔將下軍娶晉成公姉爲夫人景公三年屠岸賈欲誅趙氏賈始有寵於靈公至景公時爲司㓂將作難乃治靈公之賊韓厥告趙朔趨亡朔不肯曰子必不絶趙祀朔死不恨韓厥許諾稱疾不出賈不請而擅攻趙氏於下宫殺趙朔趙同趙括趙嬰齊皆㓕其族趙朔妻成公姉有遺腹走公宫匿趙朔客曰公孫杵臼杵臼謂朔友人程嬰曰胡不死程嬰曰朔之婦有遺腹若幸而男吾奉之即女也吾徐死耳居無何而朔婦免身生男屠岸賈聞之索於宫中夫人置兒袴中祝曰趙宗滅乎若號旣不滅若無聲及索兒竟無聲巳脫程嬰謂公孫杵臼曰今一索不得後必索之奈何杵臼曰立孤與死孰難程嬰曰立孤難耳杵臼曰趙氏先君遇子厚子爲其難者吾爲其昜者請先死乃謀取他人嬰兒負之衣以文葆匿山中程嬰出􅍝謂諸將曰嬰不肖不能立趙孤孰予我千金吾告其處諸將皆喜許之發師隨程嬰攻公孫杵臼殺之諸將以爲趙氏孤兒巳死皆喜然趙氏真孤乃反在程嬰卒與俱匿山中居十五年晉景公疾卜之大蔡不遂者爲祟景公問韓厥知趙孤在乃曰大業之後絶祀者其趙氏乎夫自中衍者皆嬴姓也中衍人面鳥噣降佐殷帝大戊及周天子皆有明德下及幽厲無道而叔帶去周適晉事先君文侯至于成公世有功德未甞絶祀今吾君獨㓕趙宗國人哀之故見龜䇿唯君圖之景公問趙向有後乎韓厥具以實告景公乃與韓厥謀立趙孤兒召而匿之宫中諸將入問疾景公因韓厥之衆以脅諸見趙孤名武諸將不得巳乃曰昔下宫之難屠岸賈爲之矯以君命非然孰敢作難微君之疾群臣固且請立趙後今君有令群臣之願也於是召趙武程嬰遍拜諸將諸將遂反與趙武程嬰攻屠岸賈㓕其族復與武田邑如故及趙武冠爲成人程嬰乃辭諸大夫曰昔下宫之難皆能死我非不能死我思立趙氏之後今趙武旣立成人復故位我將下報宣孟與公孫杵臼趙武啼泣頓首固請曰武願苕筋骨以報子至死而子忍去我死乎程嬰曰不可彼以我爲能成事今不報爲不成遂自殺趙武服齊衰三年爲之祭邑春秋祠之世世勿絶又曰項王巳死楚地皆降漢獨魯不下漢乃引天下兵欲屠之爲其守禮義主死節乃持項王頭示魯父兄乃降即以魯公禮葬項王又曰樂毅去燕之趙趙王欲圖燕毅泣曰臣事昭王猶事大王若獲戾施在他國終身不敢謀趙之徒隷况燕昭王後嗣乎又曰欒布梁人也彭越爲家人時常與布游及漢誅彭越夷三族梟首雒陽下詔有收視者輙捕之布時爲越使齊還奏事彭越頭下祠而哭之吏捕以聞上召罵布若與彭越反耶吾禁人勿收若獨祠而哭之與反明矣趣烹之方提趣湯頋曰願一言而死上曰何言布曰方上之困彭城敗滎陽成臯間項王所以不能遂西徒以彭王居梁地與漢合從苦楚也當是之時彭王一顧與楚則漢破與漢則楚破且垓下之㑹微彭王項氏不亡天下巳定彭王剖符受封亦欲傳之萬世今漢一徴兵於梁彭王病不得從而疑以爲反反形未見以苛細誅之臣恐功臣人人自危今彭王巳死臣生不如死請就烹上乃釋布拜爲都尉漢書曰樓護有故人吕公無子歸護託身護與吕公及妻吕嫗同食護妻子頗厭吕公護聞之流涕責子曰吕公以窮老託身於我義所當奉遂養吕公終身又曰衛青曰衰而霍去病日貴青故人門下多事去病輙得官爵唯獨任安不去又曰卜式河南人𥘉以田畜爲事弟竒忽請於式欲分財異居式便脫身出唯取羊百頭遂入山放牧經十餘年十倍於𥘉却買田宅居焉弟竒悉破其産矣式輙復分與之續漢書曰李固𬒳誅梁兾乃露固屍於四衢令有敢臨者加其罪固弟子汝南郭亮年始成童左提章鉞右秉鈇鑕詣闕上書乞收固屍不許因徃臨哭陳辭於其前遂守喪不去夏門亭長呵之亮曰含隂陽氣以生戴乹履坤義之所重豈知生命何爲以死相懼太后聞而不誅乃聽得禭歛歸葬之又曰梁兾諷有司劾杜喬遂執繫之死獄中與李固俱暴屍於城北故人莫敢視者喬故掾陳留楊匡聞之號哭星行到洛託爲夏門亭吏守衛屍䘮驅護蠅蟲都官從事執之以聞太后義而不罪使於是帶鈇鑕上書詣闕乞杜李二公骸骨太后許之成禮殯殮送喬䘮還家葬送行服隱匿又曰袁忠子秘爲郡門下議生黄巾起祕從太守趙謙擊之軍敗祕與功曹封觀等七人以身扞刃皆死於陣謙以得詔復祕等門閭號曰七賢又曰陳蕃旣𬒳害友人陳留朱震時爲銍令聞而棄官哭之收葬蕃屍匿其子逸於甘陵界中事覺繫獄合門桎梏震受栲掠誓死不言故逸其得免又曰史弼遷河東太守斷絶書屬中常侍侯覽遣諸生齎書請之并求假鹽稅弼大怒乃付安邑獄栲殺之覽遂詐作飛章下司隷誣弼誹謗檻車徴前孝廉魏劭毁變形服詐爲家僮瞻護於弼弼遂受誣事當棄市劭與同郡人賣郡邸行賂於覽得减死罪一等論輸左校時人或譏曰平原行貨免君無乃甚乎陶丘洪曰文王羑里閎散懷金史弼遭患義夫獻寳亦何疑焉議者乃息又曰李爕字德公𥘉李固旣䇿罷知不免禍乃遣三子歸郷里時爕年十三有頃難作下郡收固三子二兄受害爕姉文姬乃告父門生王成曰今委君以六尺之孤李氏存㓕其在君矣成乃將爕入徐州界中變名姓爲酒家傭而成賣卜於市隂相徃來梁兾旣誅而灾眚屢見明年史官上言冝有赦令又當存録大臣冤死者子孫於是求固後爕乃以夲末告酒家酒家具車重厚遣之後王成卒爕以禮葬之感傷舊恩毎四節爲誤上賔之位而祠焉又曰李膺門生皆禁錮侍御史景毅子寔爲膺門徒未有録牒故不譴毅慨然曰本謂膺賢遣子師之豈可以漏脫名籍茍安而巳遂自表免歸時人義之後漢叚潁討羗涼州刺史郭閎貪其功稽留潁軍義從者日役乆戀郷悉反叛於閎罪歸潁潁坐徴輸左校羗涼覆沒營埸吏人守門訟潁詔問狀潁謝罪不敢枉京師稱之爲長者焉又曰雷義字仲翁爲尚書郎同時郎坐事當居刑義黙自表取罪論免同臺郎覺之委位白上乞贖義罪順帝皆除其罪東觀漢記曰杜林弟成物故隗囂乃聽林持䘮東歸旣遣而悔追令刺客楊賢於隴底遮殺之賢見林身推鹿車載致弟䘮乃歎曰當今之丗誰能行義雖小人何忍殺義士乃亡去又曰鮑永字君長爲司隷校尉行縣到京兆灞陵過更始冢引車入陌欲下從事諌止之永曰親北靣事人過其墓雖以獲罪司隷不辭也遂下車哭盡哀西至右扶風推牛上茍諌冢上問公卿曰奉使如此何如時太中大夫張堪對曰仁者百行之宗忠者禮義之至也仁不遺舊忠不忘君行之髙者也上恱又曰肅宗崩廉范奔赴敬陵時廬江郡嚴麟奉章弔國俱㑹於路麟乗小車塗深馬死不能自進范見而愍然命從騎下馬與之不告而去麟事畢不知馬所歸縁路訪之或謂麟曰故蜀郡太守廉叔度好賙人窮今奔國䘮當是耳麟亦素聞范名以爲然即牽馬造門謝而歸之丗伏其好義又曰李善字次孫南陽人夲同縣李元蒼頭建武中疫疾元家相繼死沒唯孤兒續始生數旬而有資財千萬諸奴婢私共計議欲謀殺續分財産善乃潜負續逃亡隱山陽瑕丘界中親自哺養乳爲生續孩抱奉之不異長君有事輙長跪請白然後行之閭里感其行皆相率修義續年十歳善與歸夲縣修理舊業告奴婢於長吏悉收殺之時鍾離意爲瑕丘令上書薦善行狀又曰索盧放字君陽東郡人署門下掾更始時使者督行郡國太守有事當斬放前對曰方今天下苦王氏之虐政戴仰漢德傳車所過未聞恩澤而斬郡守恐天下惶懼各自疑也使有功不如使有過遂解衣而前願代太守斬使者義而赦之由是顯名又曰魏譚字少聞王莽末政亂盗賊起人民相食譚爲夷所得等軰數十皆縛束當稍就噉見譚貌謹勑獨放令主炊飬有夷長公哀譚謂曰汝曹皆當以次死哀縱汝急冝去譚不肯去叩頭曰我常爲諸君主炊飬食馨肉肌香餘皆菜食羸痩肉腥臊不可食願先等軰死長公義之即相謂此兒有義可哀縱也賊遂皆放之數十人皆得脫又曰更始即位舞隂大姓李氏擁城不下更始遣柱天將軍李寳降之不肯云聞宛之趙氏有孤孫喜信義著聞願得降之更始徴喜使詣舞隂李氏遂降又曰桓典字公雅舉孝廉爲郎中居無幾國相王吉以罪𬒳誅故人親戚莫敢至者典獨棄官收斂歸葬服䘮三年負土成墳爲立祠堂盡禮而去又曰劉平字公子楚郡人更始時天下亂平弟仲爲賊所殺其後賊忽然而至平扶侍其母奔走逃難抱仲遺腹女而棄其子母欲還取之平不聽曰力不能两活仲不可以絶類遂去不顧與母俱匿野澤中平朝出求食逢餓賊將烹之叩頭曰今旦爲老母求菜老母待歸爲命願得歸食母畢還就因涕泣賊哀而遣之平還食母訖因白曰屬與賊期義不可欺遂還詣賊衆皆大驚相謂曰常聞烈士今乃見之去矣吾不忍食子於是得全又曰汝南王琳字巨尉年十餘歳弟季出遇赤眉賊將爲所哺琳自縛請先季死賊矜而放遣謝承後漢書曰天下亂人相食趙孝弟禮爲餓賊所得孝聞之即自縛詣賊曰禮乆饑羸痩不如孝肥飽賊大驚放之謂曰可歸更持米糒來孝求不能得復徃報賊願就烹衆異之遂不害又曰姜肱字伯淮彭城人肱與二弟仲海季江俱以孝著聞肱常與季江謁郡夜於道遇盗欲殺之兄弟争死賊遂兩釋但奪衣資旣至郡中見肱無衣恠問肱託以他辭終不言盗聞而感悔後乃就精廬求見徴君肱與相見皆叩頭謝罪而還所略物肱不受勞以酒食而遣之又曰劉翊字子相陳國人也張季禮甞弔師䘮大冰寒車毀牛病不能進罷曵道路翊行於汝南界中逢之素與䟽闊下馬與語便推所乗牢車強牛與之供其資糧不告姓名又曰梁國車章爲縣功曹令黄拳爲人所誣章證其無罪當下筆立辭乃以斧斫右手五指閇口死獄中又曰㑹稽戴就爲郡倉曹掾太守爲州所奏見收持吏以䥫針刺手爪中使以把土就十爪皆墮地終無撓辭又曰張儉爲東部督郵時中甞侍侯覽殘暴百姓儉舉劾覽遏絶章奏並不得通遂上書告儉與同郡二十四人爲黨儉得亡命止李篤家外黄令毛欽操兵到門篤引欽謂曰張儉知名天下而亡非其罪縱儉可得寧忍執之乎欽因起撫篤曰籧伯玉耻獨爲君子足下如何自專仁義篤曰篤雖好義明延今日載其半矣欽歎息而去又曰彭修州辟從事時賊張子林等數百人作亂修與太守俱岀討賊賊望見車馬競交射之飛矢雨集修以身障扞太守而爲流矢所中死太守得全賊素聞其恩信即殺弩中修者餘悉皆降散言曰自爲彭君故降不爲太守服也魏志曰閻温字伯儉天水西城人守上邽令馬超奔上邽郡人任養等舉衆迎之温止之不能禁乃馳還州超復圍州甚急乃遣温宻岀告急於夏侯淵賊圍數重温夜從水中潛岀明日賊見其跡遣追逐得之執温還詣超解其縛謂曰今成敗可見若從吾言反謂城中東方無救此轉禍爲福之計也不然今爲戮矣温僞許之超乃載温詣城下温向城大呼曰大軍不過三日至勉之超怒數之曰足下不爲命計耶温曰夫事君有死無貳而公乃欲令長者出不義之名吾豈苟生者乎超遂殺之又曰董卓遷帝長安幽州牧劉虞署田疇爲從事奉使得報馳還未至虞已爲公孫瓉所害疇至謁祭虞墓陳發章表哭泣而去瓉聞之大怒購求獲疇謂曰汝何哭劉虞墓而不送章報於我疇荅曰漢室衰頽人懷異心唯劉公不失忠節音報所言於將軍未美恐非所樂聞故不進也且將軍方舉大事以求所欲旣㓕無罪之君又讎守義之臣誠行此事則燕趙之士將皆東海而死豈忍從將軍者瓉壯其對不誅又曰𥘉濟隂王思與梁習俱爲西曹令史思直日白事失太祖㫖太祖大怒教召主者將加重辟時思近出習代徃對巳𬒳收執思乃馳還自陳巳罪罪應受死太祖歎息之不言嗟思之識分曰何意吾軍中有義士二人乎又曰牽招字子經袁紹辟招爲督軍從事紹卒又事子尚後遼東送袁尚首懸在馬市牽招覩之悲感設祭頭下太祖義之又曰龐濟字子異𥘉以涼州刺史從事守破羗長㑹武威太守張猛反殺刺史邯鄲啇猛令敢有臨䘮死不赦濟聞之棄官晝夜奔走號哭䘮所訖誼猛門懷匕首欲因見以殺猛猛知其義士勑遣不殺由是以忠烈聞魏略下脂習除大醫令與孔融親善㑹融𬒳誅當時許中與融善者莫敢收恤而習獨徃撫而哭之曰文舉卿捨我而死復當與語者哀歎無巳大祖收習欲理之尋以其事直見原蜀志曰曹公東征擒關羽以歸拜爲偏將軍禮之甚渥曹公壯羽爲人而察其無乆留意謂張遼曰卿試以情問之遼以問羽羽歎曰吾極知曹公待我厚然吾受劉將軍恩誓以共死不可背之吾終不留吾要當立効以報曹公而後乃歸遼以羽言報曹公公曰事君不忘其夲天下義士也度何時去遼曰受公恩必効力而後去也及羽殺顔良曹公知其必去重加賞賜羽拜書告辭而奔先主左右欲追之曹公曰彼爲其主勿追也吴志曰陸琩同郡徐愿居㑹稽素不相識臨死遺琩書託孤琩爲起墳收導其子飬之王隱晉書曰鄧攸遭石勒亂負母妻行入草遇賊失牛馬攸語其妻吾弟早亡唯有遺民今當歩擔兩兒便當盡死不如自棄兒抱遺民吾後猶當有兒婦乃從之又曰趙王倫害張華之時洛中震悚唯閻績詣東市號哭弔屍而撫之曰早語君遜位而不肯去今果不免禍于宝晉紀曰宣王討王陵發令狐遇冢暴屍兖州武吏東平馬隆託廬三年種植松栢一州之士愧之漢晉春秋曰文王誅鍾㑹爲功曹向雄收葬王召而責之雄曰昔先王掩骸埋胔仁流枯骨當時豈先卜其功罪而後葬哉今王誅旣加於法巳備雄感義收葬法教無闕法立於上教弘於下以此訓物雄曰可矣何必使雄背死違生以立於時殿下讎忿枯骨捐之中野百歳之後爲臧獲所笑豈仁賢所掩哉王恱與宴談而遣之三十國春秋曰成都王㯋禦長沙王乂於建春門陸機敗遁走㯋誅機及弟雲夷三族機呉人而在寵族之上人多惡之成都王嬖人孟玖素不快於雲及機建門之敗機衆多喪牽秀譛之於㯋言機持兩端孟玖復􅌟之於内使牽秀斬機𥘉機之專征請孫承爲後軍司馬至是收承下獄考捶數百兩髁骨見終言機冤吏知承義烈謂承曰二陸之痛誰不知枉君何不愛身承仰天曰陸君兄弟世之竒士有顧於吾吾危不能濟死復相誣非吾徒也乃夷三族承門人費慈自詣潁明承之冤承喻之曰吾唯不負二陸死自吾分卿何爲尔邪慈曰僕又安負君而求生乎固明承冤玖又疾之亦并見害太平御覽卷第四百二十
