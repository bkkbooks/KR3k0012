front:
  text: 太平御覽卷第四百九人事部五十
  hash: sha256:b51b84b53bcc609f80ea4cd9342d6d01b90189dfa18d4058c9c6ef7741e4100c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_409-1a}
body:
  text: 交友四莊子曰子祀子輿子梨子來四人相與語曰孰能知死生存亡之體吾與之友矣四人相視而笑莫逆於心遂相與爲友又曰孔子與柳下季爲友又曰桑扈孟子琴張三人相與爲友孟子曰舜上見帝帝館于貳宫迭爲賔主是天子交匹夫也史記曰管夷吾鮑叔牙二人相友管仲曰吾始困時甞與鮑叔賈分財利多自與鮑叔不以我爲貪知我貧也吾甞爲鮑叔謀事而更窮困鮑叔不以我爲愚知時有利不利也吾甞三仕三見逐於君鮑叔不以我爲不肖知我不遭時也吾嘗爲君三戰三北鮑叔不以我爲怯知我有老母也生我者父母知我者鮑叔也傳子曰杜畿至許見侍中耿紀共語終夜尚書令荀彧家與紀屋相比夜聞畿言異之至旦遣謂紀曰有國士何以居位旣見畿如舊相識遂進畿於朝郭子曰兾州刺史楊准二子喬字國彦髦字士彦清平有識俱揔角爲成器准與裴頠樂廣友善遣見之頠謂准曰喬及卿髦小減也廣謂准曰喬自及卿髦尤精岀准笑曰我二兒之優劣乃裴樂之優劣論者許之魯連子曰舜耕於歴山而交益陶於河濵而交禹孔叢子曰子髙遊趙平原君客之有鄒文節與子高相友善及將還魯諸故人訣旣畢文節送行三宿臨別文節流涕交頥子髙徒抗手而已分背就路其徒問之曰先生與彼之子善彼有戀戀之心悽愴流涕而先生厲聲高揖無乃非親親之謂乎子髙曰始吾謂之大丈夫乃今知其婦人也人生則有四方之志豈鹿豕也哉而常群聚乎又曰秦莊子死孟武伯問孔子曰古者同寮有服乎荅曰聞諸老􅡭昔虢叔閎夭太㒹散冝生南宫括五者同寮比徳以賛文武及虢叔死四人爲服古之逹禮者行之韓詩外傳曰宋玉因其友事襄王王待玉亦無異江表傳曰吴有程普者頗以年長數凌侮周瑜瑜折節下容終不之與交普後自敬服而親重之乃告人曰與周公瑾交若飲醇醪不覺自醉袁宏山濤別傳曰陳留阮籍譙國嵇康並髙才逺識少有陪其契者濤𥘉不識一與相遇便爲神交列士傳曰六國時羊角哀與左伯桃爲友聞楚王賢俱徃仕至梁山逢雪粮盡度不兩全遂併粮與角哀哀至楚楚用爲上卿後來收葬伯桃伯桃墓逼近荆將軍陵而伯桃告云我曰夜𬒳荆將軍伐之哀乃加兵未知勝否云我向地下看之遂自刎死道學傳曰杜京産建武𥘉徴之産曰莊周持釣豈爲白壁所囬避不就㑹稽孔道微亦守志産與友善又曰薛彪之聞陶隱居委紱架石室與蔣負蒭隣居接宇彪歎曰彼二人者可爲道友何爲乆滯東川於是命棹來歸便相就共住日夕講習又曰潘洪字文盛山隂人㓜辭家入山修禀上法陶貞白見而恱之遂與投分共逰諸處尋求真書又曰許邁字逺遊少與髙陽許詢並治高節同志齊名詢能清言兼有詞藻邁博學亦善属文廣州先賢傳曰董正字伯和番禺人也隱士南陽車遂字徳陽聞正令名不逺萬里徑來投正正道同志合恩如伯仲數年中遂得病正爲傾家救恤疾篤命絶停屍於堂殯歛之禮如同生身自送喪於南陽殷氏世傳曰殷褒字元祚渤海府君之子河南鄭廉始出寒賤又未知名見而友之廉父常居肆乃就拜其父於市衆皆驚廉由是顯名位至司徒荀氏家傳曰荀羡與沛國劉真長太原至仲祖陳郡啇洪源並著情契太宗時居阿衡之任虚中誘納賔友賢哲與羡等數人爲布衣之好又曰荀粲簡貴不能與常人交接所交者皆一時雋傑粲卒至葬夕赴者十餘人皆同年名士也哭之感慟路人嵇康髙士傳曰逢萌條房李雲王尊同時相友丗號之四子海内先賢傳曰潁川鍾皓字季明爲郡功曹時陳寔爲西門亭長皓深禮之與同分義皓辤公府太守問誰可代君皓曰明府必得其人西門亭長可也張隱文士傳曰禰衡與孔融作爾汝之交時衡未滿二十融巳五十重衡才秀忘年也向秀别傳曰秀字子期少爲同郡山濤所知又與譙國嵇康東平吕安友善其趍舎進止無不必同造事營生業亦不異常與康偶鍜於洛邑與吕安灌園於山陽收其餘利以供酒食之費或率爾相携觀原野極遊浪之勢亦不計逺近或經日乃歸復脩常業郭林宗别傳曰郭泰字林宗入潁川則友李元禮至陳留則結符偉明之外黄則親韓子助過蒲亭則師仇季智也英雄記曰袁紹不妄通賔客好遊俠與張孟卓何伯求吴子卿許子逺伍德瑜等皆奔走之友不應辟命荆州記曰陸凱與范曄爲友江南寄梅花一枝來諸長安與曄并贈詩曰折花奉驛使寄與隴頭人江南無所得聊贈一枝春虞預㑹稽典録曰盛憲字孝章𥘉爲臺郎常岀遊逢一童子容貌非常憲怪而問之是魯國孔融年十餘歳憲下車執融手載以歸舎與融談宴結爲兄弟升堂拜母曰可賀憲母昔有憲憲今有弟又曰卓恕字公行上虞人也與人期約雖遭暴風疾雨無不至者甞從建鄴辭太傳諸葛恪恪問何當復來恕荅曰某日當復親覲至是日恪停食候恕至時賔客㑹者皆以爲稽建業相去千餘里道隔江湖豈得如期湏臾恕至一坐盡驚又曰賀劭字興伯山隂人也爲人羙姿容動静有常與人交乆而敬之又曰虞倫字孝緒餘姚人也與駱瑗爲彈冠之友吴録曰歩隲與衛於同年相善俱以種瓜自給晝勤四體夜誦經傳三輔决錄曰游殷爲胡軫所害同郡吉伯房郭公休與殷同歳相善爲緦麻三月趙歧三輔决錄曰蔣詡字元卿舎中三徑唯羊仲裘仲從之遊二仲皆雅廉逃名之士華陽國志曰洛陽慶鴻慷慨好義廉范與爲刎頸之交時人稱曰前有管鮑後有慶廉陳留志曰韋庾字宣明襄邑人也常居園中故世謂之園公與河内軹人角里先生綺里季夏黄公爲友皆修道㓗已非義不踐當秦末避代入啇洛山隱居自娱竹林七賢諭曰嵇康字叔夜與東平吕安少相知友每一相思輙千里命駕又曰山濤與阮藉嵇康皆一面契若金蘭濤妻韓氏甞問濤曰吾當年可爲交者唯二人而已崔豹古今注曰鄭弘行䆠京洛未至夜宿一壖如過而縁二切河邊地也於是逢舊友四人四頋荒郊村落絶逺酤酒無處情抱不申仍各以錢投水中依評共飲盡夕酣暢皆得大醉因名沉釀川劉向說苑曰伯牙子鼓琴其友鍾子期聽之方鼓琴而志在於太山鍾子期聽之曰善哉皷琴巍巍乎若太山少選之間而志在流水鐘子期聽之曰善哉鼓琴湯湯乎若流水鍾子期死伯牙子屏琴絶絃終身不鼓以爲時無足爲鼓琴者說苑曰魏文侯歎田子方曰自友子方也君臣益親百姓益附吾是以知友士之功焉世說曰山公與嵇阮契若金蘭山公妻韓氏覺二人異於常欲窺之他日二人來妻竊窺之公曰二人何如妻曰君殊不如正當以識度相及耳公曰伊輩亦當以我爲勝又曰華歆與管寧邴原相友曽共鋤園得金寧以鋤揮之與瓦礫無異歆掘而擲之又曰荀臣伯逺看友人疾值胡賊攻郡臣伯不忍去賊旣至謂臣伯曰大軍至一郡並空汝何男子輕大軍而敢獨止臣伯曰有友人疾不忍委之寧以我身代友人之命賊知其賢自相謂言我輩無義之人而入有義之國疾促軍而還一郡並全又曰陸機赴假還洛輜重甚盛戴淵與年少掠之淵在岸上據胡牀指揮左右皆得其冝淵旣有風摽鋒潁雖處鄙事神氣獨異於衆機於舩屋上遥謂之曰卿才如此亦復作刼淵便流涕投劎歸機辭属非常機彌重之便與定交咋筆薦焉又曰夏侯稱字義權年十六與文帝爲布衣之交毎讌氣凌一座辯士不能荅代之髙者多從之遊又曰支道林喪法慶之後精神殞喪風味轉墜常謂人曰昔匠石廢斤於野人牙生輟絃於鍾子推已外求良不虚也冥契旣逝發言莫賞中心藴結余其亡矣却後一年支遂亦隕又曰王爽與司馬太傳飲酒太傳醉呼王爲小子王曰亡祖長史與簡文帝爲布衣之交亡姉伉儷二宫何小子之有楊松玠談藪曰太原孫伯翳放情物外棲志丘壑與王令君髙范將軍雲爲莫逆之交琴操曰三士窮者其思革子之所作也其思革子户文子叔衍子三人相與爲友聞楚成王賢好士三人俱往見之於豪嶔巖之間卒逢飃風暴雨俱伏於空柳之下衣寒粮乏度不俱活三人相視歎曰與其飢寒俱死豈若并衣粮於一哉二子以革子爲賢推衣與之革子曰生則同樂死則共之固辭二子曰吾相與猶左右手也左傷則右救右傷則左勞子不我受俱死無名可痛乎於是革子受之二子遂凍餓而死其思革子掲衣粮而去往見楚王王知其賢用旨酒嘉郩設鍾鼓樂之革子有憂悲之色楚王乃推樽罷樂外琴而進之其思革子援琴而皷作相與別散之志孫楚牽招碑曰𥘉君與劉備少長河朔英雄同契爲刎頸之交有横波截流柎翼横飛之志俄而委質於太祖備遂鼎足於蜀漢所交非常爲時所忌毎自酌損乎季孟之間蔡邕真定真父碑曰其接友也審辯真僞明于知人度終始而後交情不踈而貌親夏侯湛鮑叔像賛曰鮑子愔愔式昭徳音綢繆陳仲二人同心厥芳猶蘭其堅如金遥遥景迹君子攸欽周祗執友箴曰人亦可言貴則易交利重太山道輕鴻毛乆而益敬見之晏平霜雪旣至勁栢冬青太平御覧卷第四百九
