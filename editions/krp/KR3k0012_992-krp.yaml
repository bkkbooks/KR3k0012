front:
  text: 太平御覽卷第九百九十二
  hash: sha256:1f162e941e359a90f8d6c835182622e1188d7adacaf0f46bd439aa7f77ae1619
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_992-1a}
body:
  text: 藥部九欵冬芫華羊躑躅旋華黄芩恒山蜀􅃮蕪荑秦皮枳實防風大黄石斛半夏射干蓪草牛膝壯丹茵芋獨活紫威大㦸栝樓核地膚貝母海藻豕首當陸敗醬綸布石龍芮虵床雲實𣢾冬爾雅曰莵奚顆凍也注曰欵冬生水紫赤凍音東述征記曰洛水至歳末凝厲則𣢾冬生曽水之中本草經曰欵冬一名槖石一名顆冬一名虎鬚一名莵奚味辛温傅咸欵冬賦曰余曽逐禽登于北山于時仲冬之月也氷凌盈谷積雪𬒳崖頋見欵冬燁然始敷華艶春暉既麗且殊以堅氷爲膏壤吸霜雪以自濡非天然之真貴曷能彌寒暑而不渝芫華本草經曰芫華一名去水味辛温治欬逆上氣殺蟲生淮原建康記曰建康出芫華范子計然曰芫華岀三輔吴氏本草曰芫華一名去水一名敗華一名兒草根一名黄大㦸神農黄帝有毒扁鵲歧伯苦季氏大寒二月生葉青加厚則黒華有子紫赤白者三月實落盡葉乃生三月五月採華芫花根一名赤芫根神農雷公苦有毒生邯鄲九月八月採隂乾乆服令人洩可用毒殺魚羊躑躅廣雅曰羊躑躅决光也建康記曰建康出躑躅本草經曰羊躑躅味辛温生川谷治賊風濕痺惡毒生太行山吴氏本草曰羊躑躅花神農雷公辛有毒生淮南治賊風惡毒諸邪氣旋華本草經曰旋華一名葪根一名羙草去面䵟黑令人色恱澤根主腹中寒熱邪氣生豫州或預章黄芩說文曰菳黄芩也廣雅曰奼眉黄文内虚黄芩也本草經曰黃芩一名腐膓味苦平生非谷治諸熱范子計然曰黃芩岀三輔色黄者善吴氏本草曰黄芩一名黄文一名妬婦一名虹勝一名經芩一名印頭一名内虚神農桐君黄帝雷公扁鵲苦無毒李氏小温二月生赤黄葉兩兩四四相值莖空中或方貟高三四尺四月花紫紅赤五月實黒根黄二月至九月採恒山廣雅曰恒山菜蜀􅃮也漢書地理志曰武陵有佷山縣孟康注曰音恒岀恒山藥遊名山記曰横陽諸山草多恒山永嘉記曰恒山出松陽永寧縣本草經曰一名玄草味苦寒生川谷主治傷寒發温瘧鬼毒胷中結吐逆生益州吴氏本草曰恒山一名七葉神農歧伯苦李氏大寒桐君辛有毒二月八月採蜀􅃮本草經曰蜀漆味辛平治瘡及欬逆寒熱腹癥堅邪氣蠱毒鬼蛀建康記曰建康出蜀􅃮范子計然曰蜀􅃮岀蜀郡吴氏夲草曰蜀漆葉一名恒山神農歧伯雷公辛有毒黄帝辛一經酸如􅃮葉藍菁相似五月採蕪荑本草經曰蕪荑味辛一名無姑一名音殿䕋音唐去三蟲化食逐寸白散腹中嗢嗢喘息秦皮本草經曰秦皮味苦微寒生川谷治風濕痺寒氣除熱目中青翳乆服頭不白輕身生廬江建康記曰建康岀秦皮吴氏本草曰岑皮一名秦皮神農雷公黄帝歧伯酸無毒季氏小寒或生冤句水邊二月八月採淮南萬畢術曰岑皮致水枳實山海經曰北嶽之山其上多枳晏子春秋曰晏子使楚楚王使縛一人過問曰縛者何爲者耶對曰齊人坐盗王視晏子曰齊人故善盗乎晏子對曰橘生江南過北爲枳水土異也今民生於齊不盗入楚則盗得無楚之水土使民盗耶崔寔四民月令曰九月九日収枳實本草經曰枳實味苦寒生川澤治大風在皮膚中如麻豆苦癢除寒熱結止利長肌肉利五藏益氣輕身生河内吴氏本草曰枳實苦雷公酸無毒季氏大寒九月十月採隂乾防風本草經曰防風一名銅芒甘温生川澤治大風頭眩痛目盲無所見煩滿風行周身骨節疼痛乆服輕身生沙苑范子計然曰防風出三輔白者善吴氏本草曰防風一名廻雲一名回草一名百枝一名蕳根一名百韭一名百種神農黄帝歧伯桐君雷公扁鵲甘無毒季氏小寒或生邯鄲上蔡正月生葉細圎青黒黄白五月黄花六月實黒二月十月採根日乾琅邪者良大黄廣雅曰黄良大黄也盛弘之荆州記曰建平出大黄本草經曰大黄味苦寒生山谷治下瘀血閉寒熱破癥瘕積聚留飲宿食蕩滌膓胃安五藏推陳致新通利水榖道調中食生河西吴氏本草曰大黄一名黄良一名火參一名膚如神農雷公苦有毒扁鵲苦無毒季氏小寒爲中將軍或生蜀郡北部或隴西二月卷生生黄赤葉四四相當黄莖髙三尺許三月華黄五月實黒三月採根根有黄汁切隂乾石斛盛弘之荆州記曰隋郡永陽縣有龍石山山上多石斛精好如金環也廬山記曰石門山石間多生石斛范子計然曰石斛出陸安本草經曰石斛一名林蘭一名禁生味甘平生山谷治傷中下氣虚勞𥙷五藏羸瘦乆服除痺膓胃强隂出陸安吴氏本草曰石斛神農甘平扁鵲酸季氏寒半夏禮記月令曰仲夏之月半夏生范子計然曰半夏出三輔色白者善廣州記曰鄣平縣出半夏建康記曰建康岀半夏極精本草經曰一名地文水玉味辛平生川谷生槐里吴氏本草經曰半夏一名和姑生微丘或生野中葉三三相偶二月始生白華貟上射干射音夜廣雅曰鹿廉䳒尾烏蓮射干也易通卦驗曰冬至射干生抱朴子曰千歳之射干其根如生人長七尺刺之有血以其血塗足下可歩行水上不没以塗人鼻入水水爲之開以塗足耳則隠形欲見則拭去之孫卿子曰西方有木名曰射干莖長四寸生於髙山之上臨百仞之淵木莖非能長也所立者然也范子計然曰射干根如安定建康記曰建康岀射干本草經曰射干一名烏扇一名烏蒱味苦辛生川谷治欬逆上氣生南陽吴氏本草曰射干一名黄逺蓪草廣雅曰下父附支蓪草也本草經曰通草一名附支味辛平生山谷去惡蟲除脾胃寒熱利九竅血脉關節不忘生石城建康記曰建康岀通草范子計然曰通草出三輔吴氏本草曰通草一名丁翁一名附支神農黄帝辛雷公苦生石城山谷葉青蔓延止汗自正月採牛膝廣雅曰牛莖牛膝也本草經曰牛膝一名百倍味苦辛生川谷治傷寒濕痿痺四支拘攣膝痛不可屈伸乆服輕身能老生河内建康記曰建康出牛膝吴氏本草曰牛膝神農甘一經酸黄帝扁鵲甘季氏温雷公酸無毒生河内或臨卭葉如夏藍莖本赤二月八月採牡丹廣雅曰白术牡丹也范子計然曰牡丹出漢中河内赤色者亦善遊名山志曰泉山多牡丹本草經曰牡丹一名鹿韭一名䑕姑味辛寒生山谷治寒熱癥傷中風驚邪安五藏出巴郡吴氏本草曰牡丹神農歧伯辛季氏小寒雷公桐君苦無毒黄帝苦有毒葉如蓬相值黄色根如指黒中有毒核二月採八月採日乾可食之輕身益壽茵芋吴氏本草曰茵芋一名卑山共微温有毒狀如莽草而細軟獨活本草經曰獨活一名護羗使者味苦平生益州乆服輕身吴氏本草曰獨活一名胡王使者神農黄帝苦無毒八月採此藥有風花不動無風獨摇紫威本草經曰紫威一名芙華一名陵苕味鹹微寒無毒生川谷治婦人乳餘疾崩㞲癥血寒熱飬胎生西海建康記曰建康出紫威范子計然曰紫威出三輔吴氏本草曰紫威一名武威一名瞿夌一名陵居腹一名鬼目一名芰華神農雷公酸𡵨伯辛扁鵲苦鹹黄帝甘無毒如夌根黒正月八月採或生真定大㦸爾雅曰蕎卭鉅郭璞注曰今藥草大㦸也本草經曰大㦸一名卭鉅栝樓毛詩東山曰我來自東零雨其濛果臝之實亦施于宇果臝栝樓也又唐蟋蟀葛生曰蘝􅟵于野詩義䟽曰蘝栝樓爾雅曰果臝之實栝樓今齊人呼之爲天瓜本草經曰栝樓一名地樓味苦寒生川谷吴氏本草曰栝樓一名澤巨一名澤冶蕤核本草經曰蕤核味甘温生川谷主治心腹邪結氣明目赤痛傷淚出目腫眥爛乆服益氣輕身生凾谷晉宫閣記曰華林園㽔三株吴氏本草曰蕤核一名神農雷公甘無毒平生池澤八月採𥙷中強中強志明耳目乆服不飢地膚本草經曰地膚一名地華一名地脉一名地蔡貝母毛詩鄘栢舟載馳曰陟陂阿丘言採其䖟䖟貝母也爾雅曰􅔾音䖟貝母也郭璞曰根如小貝負而白華葉似韭說文曰􅔾貝母也海藻爾雅曰海藻也藥草也一名海羅如亂髪生海中音覃本草經曰海藻着頸下破散結廣雅曰海羅海藻豕首爾雅曰茢音列薽音真豕首郭璞注曰夲草經曰彘盧一名蠩蘭今江東呼稀首本草經曰豕首一名劇草一名䗍實吴氏本草曰一名澤藍一名豕首神農黄帝甘辛無毒生冤句五月採當陸爾雅曰遂音逐薚音陽馬尾也郭璞注曰江東謂之當陸關西為薚本草經曰啇陸一名夜乎敗醬范子計然曰敗醬出三輔本草經曰敗醬似桔梗其臭如敗豆醬綸布本草經曰綸布一名昆布味酸寒無毒主十二種水腫癭瘤聚結氣瘻瘡生東瘡石龍芮范子計然曰石龍芮岀三輔吴氏本草經曰龍芮一名水薑苔虵床吴氏本草經曰虵床一名虵珠愽物志曰虵床亂蘪蕪雲實本草經曰雲實味辛温生川谷治泄利脹癖殺蟲蠱毒去邪惡多食令人狂走乆服輕身通神明生河間范子計然曰雲實生三輔呉氏本草經曰雲實一名貟實一名天豆神農辛小温黄帝鹹雷公苦葉如麻兩兩相值髙四五尺大莖空中六月花八月九月實十月採太平御覽卷第九百九十二
