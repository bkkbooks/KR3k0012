front:
  text: 太平御覽卷第三百十兵部四十一
  hash: sha256:9695477c8c646e1355b4d538eb15e099142ba5654dcf6ee04d05d5cadeaa5404
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_310-1a}
body:
  text: 戰下戰不顧親戰傷戰下後周書梁臺傳曰時大軍圍洛陽乆而不㧞齊騎奄至齊公憲率兵禦之乃有數人爲敵所執巳去陣二百餘歩臺望見之憤怒單馬突入射殺兩人敵皆披靡執者遂得齊公憲毎歎曰梁臺果毅膽決不可及也又曰田弘討西平反羌及鳯州叛兵等並破之弘毎臨陣摧鋒直前身𬒳一百餘箭破骨者九馬𬒳十矟朝廷壯之又曰李標字靈傑長不盈五尺性果決有膽氣少事爾朱氏累遷右將軍魏孝武以摽從爲太祖帳内都督從復弘農破沙苑摽時跨馬運矛衝堅䧟陣隱身披甲之中敵人見之皆曰避此小兒太祖𥘉亦聞摽驍悍未見其能至是方嗟歎之謂摽曰伹使膽決如此何必要須八尺之軀也又曰賀若敦太祖時群盗鋒起各據山谷大龜山賊張丗顯潜來襲統敦挺身赴戰手斬七八賊乃退走父統大悅謂左右僚屬曰我少從軍旅戰陣非一如此兒年時膽略者未見其人非唯成我門户亦當爲國名將又曰王雅從戰邙山時大軍不利爲敵所乗諸將皆引退雅獨廻騎拒之敵人見其無繼歩騎競進左右奮擊頻斬九級敵衆稍却雅乃還軍太祖歎曰王雅舉身悉是膽也又曰蔡祏字承先從太祖戰於河橋祏乃下馬歩闘手殺數人左右勸乗馬以備急卒祏怒之曰丞相飬我如子今日豈以性命爲念遂率左右十餘人齊聲大呼殺傷甚多敵以其無繼遂圍之十餘重謂祏曰觀君似是勇士但㢮甲來降豈慮無冨貴耶祏罵之曰死卒吾今取頭自當封公何假賊之官號也乃彎弓持滿四面拒之東魏人弗敢逼乃募厚甲長刀者直進取祏去祏可三十歩左右勸射之祏曰吾曹性命在一矢耳豈虚發哉敵人漸進可十歩祏乃射之正中其面應弦而倒便以矟刺殺之因此戰數合唯失一人敵乃稍却祏徐引退是戰也我軍不利太祖巳還祏至弘農夜中與太祖相見祏至字之曰承先尒來吾無憂矣太祖心驚不得寢枕祏股上乃安又曰王雄從晉公護東征至邙山與齊將斛律明月接戰雄馳殺三人明月退走雄追之明月左右皆散矢又盡唯餘一奴一矢在焉雄案矟不及明月者丈餘曰惜尓不殺得但住將尒見天子明月反射雄中額雄馬退走至營而薨又曰耿豪本名令貴沙苑之戰豪殺傷甚多血染甲裳盡赤太祖見之歎曰令貴武猛所向無前觀其甲裳足以爲驗不須更論級數也又曰王勇從討趙青雀平之論功居最除衛大將軍殷州刺史加通直散騎常侍兼太子武衛邙山之戰勇率敢死之士三百人並執短兵大呼直進出入衝擊殺傷甚多敵人無敢當者是役也大軍不利唯勇及王文逹耿令貴三人力戰皆有殊功太祖於是賞帛二千疋令自分之軍皆拜上州刺史以雍州歧州北雍州擬授勇等然州頗有優劣又令探籌取之勇遂得雍州文逹得歧州令貴得北雍州仍賜勇名爲勇令貴名豪文逹名傑以彰其功又曰耿豪從太祖戰於邙山豪謂所部曰大丈夫見賊須右手㧞刀左手把矟直斫慎莫皱眉畏死遂大呼獨入敵人鋒刃亂下當時咸謂豪殁俄然奮刃而還戰數合當豪前者死傷相繼又謂左右曰吾豈樂殺人但壯士除賊不得不尒若不能殺賊又不爲人所傷何異逐坐人也太祖嘉之拜北雍州刺史隋書曰突厥入冦隋將楊素擊之先是諸將與虜戰毎慮胡騎奔突皆戎車歩騎相參舁鹿角爲方陣騎在其内素謂之曰此乃自固之道非取勝之方也於是悉除舊法令諸軍爲騎陣突厥逹頭可汗聞之大喜率精騎十餘萬而至素奮擊大破之素多權略乗機赴敵應變無方然大抵馭戎嚴整有犯軍令者立斬之無所寛貸毎將臨冦求人過失而斬人多者萬餘人少不下千數流血盈前言笑自若及其對陣先令三百人赴敵䧟陣則巳如不能䧟陣而還者無問多少悉斬之又令二三百人復進還如向法將士股慄有必死之心由是戰無不勝時稱名將又曰張須陁將兵拒東郡賊翟讓前後三十餘戰毎破走之轉滎陽守時李宻說讓取洛口倉讓憚須陁不敢進宻勸之譲遂與宻率兵逼滎陽須陁拒之讓懼而退須陁乗之逐北十餘里時李宻先㐲數千人於林木間邀擊須陁軍遂敗績宻與讓合軍圍之須陁潰圍輙出左右不能盡出復躍馬入救之徃來數四衆皆散乃仰天曰兵敗如此何面見天子乎乃下馬戰死時年五十二其所部兵晝夜號泣數日不止又曰麥鐵杖遼東之役將渡遼謂其三子曰阿奴當備淺色黄衫吾荷國恩今是死日我旣𬒳殺爾當冨貴唯誠與孝爾其勉之及濟橋未成去東岸尚數丈賊大至鐵杖跳上岸與賊戰死武賁郎將錢士雄孟金又亦死之左右更無及者帝爲之流涕購得其屍又曰權襲慶仕周從武元皇帝與齊師戰於并州𬒳圍百餘重襲慶力戰矢盡短兵相接殺傷甚衆於是刀矟皆折脫胄擲地向賊大罵曰何不來斫頭也賊遂殺之又曰髙智惠作亂江南史萬歲以行軍揔管從楊素擊之萬歲率衆二千自東陽别道而進踰嶺越海攻䧟浮洞不可勝數前後七百餘戰轉鬪千餘里寂無聲聞者十旬逺近皆以萬歲爲没萬歲以水陸阻絶信使不通乃置書竹筒中浮之於水汲者得之以言於素素大恱上其事髙祖嗟歎又曰宇文慶從周武帝攻河隂先登攀堞與賊短兵接戰良乆中石廼墜絶而後蘇帝勞之曰卿之餘勇可以賈人也復從武帝抜晉州其後齊師大至慶與宇文憲輕騎覘卒與賊相遇爲賊所窘憲挺身而遁慶退據汾橋衆賊爭進慶引弓射之所中人馬必倒賊乃稍却及破髙緯抜髙辟克并州下信都擒髙諧功並居最唐書曰髙祖爲山西河東撫尉大使至龍門縣有賊母端兒衆數千人奄至城下時諸軍無備爲賊所乗髙祖親率十餘騎撗出擊之所射應弦而倒賊大潰逐北數十里伏屍相繼於道時髙祖射七十發明日斬首築爲京觀於屍上盡得所射箭其妙如此又曰至德中冝春郡太守劉秋子率士卒攻賊兵盡矢窮秋子張空拳大呼於軍前死戰而勝詔嘉其忠勇授淮陽太守又曰白孝德胡人也驍悍有膽力乹元中李光弼爲偏禆史思明攻河陽使騎將劉龍仙率鐵騎五十臨河挑戰龍仙勇捷自恃舉右足加馬鬛上手運兩矢嫚罵光弼登城望之諸將皆侍顧曰孰可取者僕固懷恩前請行光弼曰此非大將所爲歴選其次無可於是左右竊議曰孝德可光弼聞之乃招孝德前問可得乎孝德曰得光弼問所加幾何人而可曰獨往則可加人不可光弼曰壯哉終問所欲對曰願備五十騎於壁門候旣入然後進及諸大軍鼓譟以借威他無所用光弼撫其背以遣孝德挾二矛䇿馬截流而渡半濟而懷恩賀曰克矣光弼曰未及何知其克懷恩曰觀其攬跂便辟可萬全者龍仙始見其獨來甚易之足不降鬛稍近將動孝德揺手示之若使其不動然龍仙不測又止孝德呼太尉使予致辭非他龍仙去三十歩與之言䙝罵如𥘉孝德息馬伺便乆之因瞋目曰賊識我乎龍仙曰誰曰我國之大將白孝德龍仙曰是猪狗乎孝德發聲虓然執矛突前城上萬鼓齊噪五十騎以繼進龍仙矢不及發環走堤上孝德以疋馬逐之胡騎五十皆披靡若猛犬之獵群狐也遂斬之提首而歸又曰至難得試衛尉卿至鳯翔爲都知兵馬使兼興平軍事甞有禆將靳元矅當合戰墮馬呼難得難得俯馬救之賊射難得中眉皮穿下蔽目難得乃㧞去箭并皮掣棄之勇冠三軍由是士衆多附之五代周史曰王殷遷奉國右廂都指揮使漢祖受命從征杜重威於鄴下殷與劉詞皆率先力戰矢中於首乆之出折鏃於口中以是漢祖嘉之三國典略曰茹茹㓂肆齊王自晉陽討之虜騎散走大軍遂還齊主率二千餘騎爲殿夜宿黄爪堆茹茹别部數萬騎扣鞍而進四面圍逼麾下齊十二安卧平明方起神色自若指畫軍形潰圍而出虜騎追擊之伏尸二十里獲奄羅辰妻子生口三萬餘令都督髙阿那肱率騎數千塞其走道那肱以兵少請益齊主更減其半那肱騎奮擊亦大剋捷戰不顧親史記曰項王爲髙爼置太公其上告漢王曰今不急下吾烹太公漢王曰吾與項羽俱北面受懷王約爲兄弟吾翁即迺翁必欲烹而翁即幸分我一杯羮項王怒欲烹之項伯曰天下事未可知且爲天下者不顧家雖殺之無益祗益禍耳項王從之後漢書曰邳彤字偉君丗祖拜爲後將軍常從戰攻信都復反爲王郎所置信都王捕擊彤父弟及妻子使爲手書呼彤曰降者封爵不降者族滅彤涕泣報曰事君者不得顧家彤親屬所以至今得安於信都者劉公之恩公方爭國事彤不得復念私也㑹更始所遣將攻拔信都王郎兵敗走彤家得免又曰丗祖遣宗正劉延攻天井關與上黨太守田邑連戰十餘合延不得進邑迎母弟妻子爲延所獲馮衍乃遺邑書邑報書曰僕雖駑怯亦欲爲人者也豈茍貪生而畏死哉聞老母諸弟見執於軍而邑安然不顧者豈非重其節乎若使人居天地壽如金石要長生而避死地可也今百年之期未有能至老壯之間相去幾何誠使故朝尚在忠義可云雖老親受戮妻兒横分邑之願也又曰趙苞字威豪遷遼西太守到官遣使迎母及妻子垂當到郡道經栁城值鮮卑萬餘人入塞㓂鈔苞母及妻子遂爲所刼質載以刼郡苞率歩騎二萬與賊對陣賊出母以視苞苞悲號謂母曰爲子無狀欲與微禄奉養朝夕不圖爲母作禍昔爲母子今爲人臣義不得顧私恩毀忠節唯當萬死無以塞罪母遥謂曰威豪人各有命何得相顧以虧忠義尒其勉之苞即時進戰敗之其母妻皆爲所害東觀漢記曰孔奮爲武都郡丞時在郡爲隗囂餘黨所攻殺太守得奮妻子奮追賊賊推奮妻子於軍前奮年五十唯有一子不顧遂擒賊而其子見屠帝嘉其忠遷武都太守九州春秋曰𥘉清河李雍以鄃叛袁紹而降公孫瓉遣兵衛之紹遣朱靈攻之靈家在城中瓉以靈母弟置城上誘呼靈靈望城上泣曰丈夫一出身與人豈復顧家耶戰遂抜之生擒雍而靈家皆死靈字文傳蜀志曰姜維與母相失孫盛雜記曰姜維得母書并求當歸維曰良田百頃不在一畝但有逺志不見當歸續帝王丗紀曰晉師度峴慕容超使拒之聞晉兵盛自將四萬繼之及晉人戰於臨昭燕兵大敗超畢馬奔入城八月將封融自河北奔晉師使詔誘城内超怒縛其母懸諸城上融曰姜維有言良田百頃不在一畝梁書曰羊侃長子鷟爲侯景所獲執來城下示侃侃謂曰我傾宗報主猶恨不足豈得計此一子幸尒早能殺之數日復持來侃謂鷟曰乆以汝爲死猶在耶吾以身許國誓死行陣終不以汝而生進退因引弓射之賊感其忠義亦不害也戰傷左傳曰齊晉將戰郄克傷於矢流血及屨未絶鼓音魏書曰孫觀遷青州刺史從征孫權於濡須口爲流矢所中穿左足力戰不顧太祖勞之曰將軍𬒳瘡深重而猛氣益奮及瘡甚遂卒魏志曰諸葛亮出祁連山詔張郃督諸軍至雒陽還保祁連山郃追至木門與亮軍交戰飛矢中郃右膝薨又曰夏侯惇字元讓太祖自徐州還惇從征吕布爲流矢所中傷左目又曰公到宛張繡降旣而悔之復反公與戰軍敗爲流矢所中魏書曰公所乗馬名絶影爲流矢所中傷及足并中公右臂蜀志曰先主進圍絡縣龐統率衆攻城爲流矢所中卒三國典略曰陳薛安都引兵破留異成州刺史韓子臯單馬入陣傷頂之左一髻半落安都爲流矢所中血流至踝乗輿車容止不變北史曰彭樂天平四年從神武西討與周文相拒神武欲緩持之樂氣奮請決戰曰我衆賊少不可失也神武從之樂因醉入深𬒳刺膓出内之不盡截去復戰身𬒳數瘡軍勢遂挫不利而還神武每追論以戒之後周書曰河橋之戰王思政下馬用長矟左右撗擊掊數人時䧟陣旣深從者死盡思政𬒳重創悶絶㑹日暮敵亦収軍思政乆經軍旅每戰唯着破弊甲敵疑非將帥故免有帳下督雷五安於戰處哭求思政㑹其巳蘇遂相得乃割衣褁創扶思政上馬夜乆方得還仍鎭弘農思政以玉璧地在險要請築城即自營度移鎮之遷并州刺史仍鎭玉璧又曰韋法保每與敵人交兵每身先士卒單馬䧟陣是以戰必𬒳傷嘗至關南與東魏人戰流矢中頸從口中出當時氣絶輿至營乆之乃蘇又曰李弼從太祖與齊戰於河橋弼深入䧟陣身𬒳七創遂爲所獲弼佯殞絶於地守者稍解弼睥睨傍有馬因躍上西馳得免隋書曰開皇二年突厥葉護及潘郍可汗衆十餘萬㓂掠南詔以逹奚長儒爲行軍揔管率衆二千擊之遇於周槃衆寡不敵軍中大懼長儒慷慨神色愈烈爲虜所衝突厥散而復聚且戰且行轉闘三日五兵咸盡士卒以拳毆之手皆見骨殺傷萬計虜氣稍奪於是解去長儒身𬒳五瘡通中者二其戰士死傷者十八九突厥夲欲大掠秦隴旣逢長儒兵皆力戰虜意大沮明日於戰處焚屍慟哭而去太平御覽卷第三百一十
