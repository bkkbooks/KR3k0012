front:
  text: 太平御覽卷第四十九
  hash: sha256:377c5a2c7629e9cec91b3da2dcdabbac592348d3ae3a108da6857eb552eb8436
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_049-1a}
body:
  text: 地部十四西楚南越諸山景山荆山荆門山勾將山虎牙山孤山髙筐山佷山冝陽山丹山小酉山芋山嵩梁山崇山武山壷頭山天門山黃聞山風門山石忛山虎齒山移山淳于山武陵山平都山陽歧山髙都山君山小廬山静福山方臺山攸縣雲陽山烏龍白騎山文斤山石鷰山萬歳山黃箱山麓山昭山五溪山錢石山采玉山玉山臨賀山馬嶺山彈丸山百丈山灕山隱山獨秀山南溪山龍蟠山堯山雲母山馬鞍山慮山火山浮石山景山盛弘之荆州記曰景山在上洛縣西南二百里東與荆山連接有沮水源岀焉其山一名鴈浮山荆山之首曰景山鴈南翔北歸徧經其上土人由兹改名爲鴈山又爲鴈塞山荆山山海經曰荆山首曰景山金玉是岀此即卞和抱璞之處南連青山北接鴈塞通林交麓峭峙相望雖群峯競起而荆山獨秀卞和得玉於此山獻厲王王使玉人相之曰石也刖其左足厲王薨獻之武王玉人相之又曰石也刖其右足和抱其璞哭荆山之下河圖括地象曰荆山爲地雌上爲軒星荆門山袁山松冝都山川記曰南崖有山名荆門北對崖有山名虎牙二山相對其荆門山在南上合而下空徹山南有像門也勾將山袁山松勾將山記曰登勾將山南望見冝都江陵近在目前沮潭沔漢諸山嵎嵎時見逺眺雲夢之澤皛然與天際四顧揔視衆山數千仞者森然羅列於足下千仞以還者􅐑嵬如丘浪勢焉今在上洛縣西北虎牙山袁山松冝都山川記曰虎牙山有石壁其文黃赤色有牙齒形孤山郡國志曰安遠有陸抗城故城之南有孤山袁山松爲郡嘗登此山以四望見大江如縈帶舟舡如鳬鴈焉髙筐山袁山松勾將山記曰登勾將北見髙筐山嶷然半天荆州圖副云昔堯時大水此山不没如筐因名焉佷山冝都記曰佷山山谷之内有石穴穴出清泉水有神魚大者二尺小者一尺釣者先請多少拜而請之數滿便止水側有異花欲摘如魚請又有異木名千歳葉似棗冬夏青青復有蒼范溪相近冝陽山冝都記曰冝陽山有風井穴大如甕夏岀冬入有樵人置笠穴口風噏之後於長楊溪口得笠則知潜通也丹山冝都記曰丹山時有赤氣籠井如丹故有此名小酉山盛弘之荆州記曰小酉山上石穴中有書千卷相傳秦人於此而學因留之故梁湘東王云訪酉陽之逸典是芋山盛弘之荆州記曰芋山有蹲鴟如兩斛大食之終身能不飢今民取食之嵩梁山盛弘之荆州記曰嵩梁山在澧水之陽望之如香炉之狀今名石門呉永安六年自然洞開玄朗如門三百丈門角上各生一竹倒垂下拂謂之天箒孫休以爲嘉祥置縣因山爲名隨文帝改曰石門山也崇山盛弘之荆州記曰崇山書云放驩兠于崇山崇山在澧陽縣南七十五里武山武陵記云武山髙可萬仞山半有盤瓠石窟中有一石狗形云是盤瓠之遺像又有班蛇四眼身大十圍山有水岀謂之武溪是也在縣之西壷頭山武陵記曰壷頭山在縣東馬援所穿室也室内有蛇如百斛舡云是援之餘靈天門山武陵記曰天門山上有葱如人所種畦壟成行人欲取之先禱山神乃取氣味甚美不然者不可得巖中有書數千卷人見而不可取黃聞山武陵記曰昔有臨沅黃道眞在黄聞山側釣魚因入桃花源陶潜有桃花源記今山下有潭立名黄聞此蓋聞道眞所說遂爲其名也風門山武陵記曰風門山有石門去地百餘丈每將欲風起此門先有黒氣若煙隱隱而上斯須風起竟人石㠶山武陵記曰石㠶山石危起若數百幅㠶形虎齒山武陵記曰虎齒山形如虎齒民嘗六月祭之不然即輙有虎害移山武陵記曰移山在汧陽界本在江北岸因風雨之勢一夕移渡江南岸後以此名之淳于山武陵記曰淳于山與白雉山相近在辰州武陵二郡界絶壑之半有一白雉逺望首尾可二丈申足翔翼若虛中翻飛即上視之乃有一石雉舒翅綴着石上山下有石室數畒望室裏雖闇猶見銅鍾髙丈餘數十枚其色甚光明武陵山武陵記曰武陵山中有秦避世人居之㝷水號曰桃花源敞陶潜有桃花源記又云山上有神母祠平都山神仙傳云後漢延光元年隂長生於馬明生邊求仙法乃將長生入青天山中煑黃土爲金以示之立壇唼血取太清神丹經授之乃別去長生後於平都山白日昇天即此山是也山在南賔縣北二里陽歧山荆南記云石首縣陽歧山山無所岀不足可書本屬南平界范玄平記云故老相承云胡伯始以本縣境無山此山上計偕簿髙都山江源記云楚辭所謂巫山之陽髙丘之阻髙丘蓋髙都山也君山博物志云君山洞庭之山是也帝之二女居之曰湘夫人帝女遣精衛至王母取西山之玉印印東海北山庾穆之湘州記云昔秦皇欲入湘觀衡山而遇風浪溺敗至此山而免因號爲君山又荆州圖副云湘君所遊故曰君山有神祈之則利渉山下有道與呉包山濳通上有美酒數斗得飲者不死漢武帝故事云帝齋七日遣欒賔將男女數十人至君山得酒欲飲之東方朔曰臣識此酒請視之因即便飲帝欲殺之朔曰殺朔若死此爲不驗如其有驗殺亦不死帝赦之小廬山衡山圖經曰小廬山一名浮丘山在縣西一百八里髙六里三十歩東西二十里南北四十里言其山似九江廬山故曰小廬山又古老相傳謂浮丘公上昇之所兼有道觀存焉静福山衡山圖經曰静福山在縣北五十里有梁廖沖者守清虛爲本郡主簿西曹祭酒湘東王國常侍大同三年家於此山先天二年飛昇於此山後刺史蔣防敬慕髙風刻石爲碑方臺山蕭誠荆南志曰華容方臺山山岀雲母土人採之先候雲所岀之處於下掘取無不大獲往往有長五尺者可以爲屏風當掘之時忌有聲響則所得麄惡攸縣雲陽山遁甲經云沙土之地雲陽之墟可以避時可以隱居雲陽氏古之仙人姓氏因號雲陽山在攸縣仙方記云南嶽山有福地有松膏實甘鮮可餌相傳云服食練行之人多來採此松膏而服之不苦澀與餘處松有別烏龍白騎山湘川記云汝城縣東有烏龍白騎山遠望似城有黒石如龍白石如馬羅列號曰烏龍白騎山文斤山湘川記云耒陽文斤山上有石床方髙一丈四面緑竹扶踈常隨風委拂此床天旱則禱雨時應石鷰山甄烈湘州記云石形似鷰大小如一山明雲浄即翩翩飛翔羅含湘中記云石鷰在零陵縣雷風則羣飛翩翩然其土人未有見者今合藥或用萬歳山盛弘之荆州記曰桂陽萬歳山岀靈壽草仙方服之不死又有話石山石有聲如人共話黃箱山盛弘之荆州記曰黄箱山一名黄岑山在東南三十里其山郴水所岀即是五嶺之一從東第二騎田嶺是也又有浪井井三日一涌麓山盛弘之荆州記曰長沙西岸有麓山其下有精舎左右林嶺環廻泉澗精舎傍有礜石毎至巖冬其不上停霜雪宗淵麓山記云山足曰麓蓋衡山之足也昭山宋永初山川記云昭山下有旋潭深無底是湘水最深之處昔有人舟覆於此潭其槽并甑有名題號後於洞庭㝷得即知暗通也五溪山長沙圖經云五溪山在縣西北五十八里髙二里北入朗州界昔吴黃龍三年潘濬將兵五萬討武陵五溪蠻在此山下立營截除徒黨因以爲名按溪水自邵州武剛縣東北流至岳州沅江縣合益水益陽城記云在益水之陽水岀縣北流入資口在縣門橋下皆五溪之下口也又按關羽屯軍資水北岸即一名茱茰江也吴甘寧拒之云聞吾咳唾羽即不敢過江是此處今號爲關羽瀬錢石山湘川記云曲江縣東有錢石山其狀四方有若臺其石三面壁立其上碎石如錢故謂之錢石山采玉山湘川記曰曲江縣有採玉山卉木滋茂泉石澄澈相傳云古採玉於此得名玉山湘川記曰玉山下有廟曽有人得玉瑛於此有銀山白石山越玉山又浮山其地躡一處則百餘歩地動臨賀山盛弘之荆州記曰臨賀山東山中有二竹大數十圍有盤石俓四五丈極方正青如彈棊局兩竹屈垂拂掃石上絶無塵穢未至數十里間風吹簫管之音馬嶺山郡國志郴州馬嶺山本名牛脾山山上有仙人蘇躭壇即郴人也爲兒童時與衆童牧更直守牛毎躭守牛牛不敢散嘗與衆兒獵即乗鹿人笑之曰龍也去郡百二十里母臨食晩往買鮓須臾即還一旦有衆賔來躭啓母曰受性當仙仙人合召躭去今年疾疫甚飲家中井水即無恙又種藥於園梅樹下可治百病賣此水及藥過於供養便去母遽視之衆賔皆白鶴也以躭常乗白馬故號馬嶺山彈丸山水經注曰臨桂彈丸山有湧泉奔流迅激東注于灕水山龕及溪中有石如彈丸因以石名焉驗其山有石竇下深數丈洞穴深逺莫究其極百丈山桂林風土記曰百丈山在郡城東北七十五里一名把杖山疊障深重連延西南數百里四接郡界莫窮逺近自府北驛路徑穿其中俗以﨑嶇險阻故以百丈名之又以林巒深䆳行人皆持兵仗以防猛獸因亦名把扙山灕山桂林風土記曰灕山在城南二里灕水之陽因以名焉一名沉水山其山孤拔下有澄潭上髙三百餘尺傍有洞穴其穴廣數丈南北直透上有怪石欹危藤蘿縈茂世亂民保以避㓂旱或禱祀頗靈隱山桂林風土記曰隱山在州之西郊先是榛莽翳薈古莫知者寳歷𥘉李渤岀鎭遂㝷其源見石門㸦開有水淵澈乃夷䕌蕪穢踈通巖穴石林磴道若天造靈府不可根本因號隱山獨秀山桂林風土記曰獨秀山在城西北一百歩直聳五百餘尺周廻一里平地孤抜秀異下有洞穴凝垂乳竇路通山北傍廻百餘丈豁然明朗宋光禄卿顔延年牧此郡常於北石室中讀書遺跡猶存嘗賦詩云未若獨秀者嵯峨郭邑開是也南溪山桂林風土記曰南溪山在縣之南五里餘其山聳抜千尺煙翠凝空古今所遺其溪東注與桂江合龍蟠山桂林風土記曰龍蟠山本名盤龍山有石洞深致洞中天然石室石床石盆洞門數重人秉燭遊常見龍跡大如椀洞有水水中有魚四足有角如龍形人殺即風雨晦冥立至也前使李渤給事改爲隱山連其所也堯山郡國志云廣州堯山髙四千丈自番禺交阯見之有颶風風發屋折樹翻湖焉雲母山續南越志云天后朝曽城縣有何氏女服雲母粉得道於羅浮山山因所岀以名之馬鞍山南越志云始皇朝望氣者云南海有五色氣遂發卒千人鑿之以断山之岡阜謂之鑿龍今所鑿之處形如馬鞍故名焉慮山裴關廣州記云東官縣有慮山其側有楊梅山桃只得於山中飽食不得取下如下則輙迷路火山嶺表録云梧州對岸西火山山下水澄潭水深無極其火每三五夜一見于山頂毎至一更𥘉火起匝其頂如野花之甚者廣十丈餘食頃而息或言其下水中有寳珠光照于上如火上有茘枝四月先熟以其地熱故謂火山也浮石山交州記云海中有浮石山而峙髙數十丈去永平營百餘里浮在水上昔李遜征朱崖欲審其實否牽長索於山底洞過太平御覽卷第四十九
