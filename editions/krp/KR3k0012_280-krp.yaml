front:
  text: 太平御覽卷第二百八十
  hash: sha256:1865b7b4fa30c23a232e2dbb7e9f666bbec3a92fc1d5b4dafb676be00addd3da
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_280-1a}
body:
  text: 兵部十一撫士上孫子曰視卒如嬰兒故可與之赴深谿視卒如愛子故可與之俱死厚而不能使愛而不能令亂而不能理恩不可專用罰不可獨在譬如驕子不可用也軍䜟曰軍無財則士不來軍無賞則士不徃故香餌之下必有懸魚重賞之下必有勇夫故曰禮者士之所歸也賞者士之所死也昭其所歸示有所死故曰禮有後悔則士不止賞而後悔則士不使禮賞不倦則士進矣左傳曰冬楚師伐宋圍蕭蕭潰楚大夫申公巫臣曰師人多寒楚子於是廵三軍拊而勉之拊撫慰勉也三軍之士皆如挾纊纊綿也言士恱以忘寒又曰聲子詣楚謂令尹屈建曰雍子奔晉以爲謀主彭城之役晉楚遇於靡角之谷雍子曰歸老㓜返孤疾二人役歸一人簡兵蒐乗簡擇蒐閱秣馬蓐食師陣楚次次舍也焚舍示必死明日將戰行歸者而逸楚囚欲使楚知楚師宵潰晉降彭城而歸諸宋楚失東夷子辛死之則雍子之爲也史記曰楚人有饋一簞醪者楚莊王投之於河令將士迎流而飲之三軍皆醉又曰趙括爲將母上書曰始妾事其父王所賞賜者盡與軍吏今括一日爲將所賜金視便田宅買之父子異心不可用王不聽遂請曰有所不稱妾得無隨乎王許諾又曰呉起之爲將與士卒最下者同衣食卧不設席暑不張蓋分率勞苦卒有病疽者起爲吮之又曰田横據有齊地漢將韓信灌嬰平齊地横走歸彭越漢滅項籍後横與其徒屬五百餘人入海居隝中隝音島同帝使使赦横罪而召之曰横來大者王小者乃侯大者謂横耳小者謂徒屬不來發兵加誅乃與其客二人乗傳詣洛陽至户郷廐置之驛馬之所謂其客曰陛下所以欲見我不過欲一見我靣貌耳陛下在洛陽今斬吾頭馳三十里間形容尚未能敗猶可觀也遂自剄令客奉其頭從使者馳奏之髙祖以王者禮葬横旣葬二客穿其冡旁皆自剄餘尚五百人在海中聞横死亦皆自殺於是乃知田横兄弟能得士也漢書曰李廣歴七郡太守前後四十餘年得賞賜輙分其麾下飲食與士卒共之家無餘財終不言生産事將兵之處見水士卒不盡飲不近水士卒不盡飡不甞食士以此愛樂爲用也又曰竇嬰拜大將軍賜金千斤嬰以所賜金陳廊廡下軍吏輙令取爲用金無入家者又曰司馬遷與任少卿書曰愚以爲李陵與士大夫絶甘分少能得人之死力雖古名將不過也又曰袁盎字絲爲中郎以數上諌爲隴西都尉仁而愛士士卒皆爲致死後漢書曰桓帝以叚頴爲破羗將軍征羗每行軍仁愛士卒疾者親自瞻省手爲裹瘡在邊十餘年未甞一日蓐寢與將士同勤苦故皆樂爲死戰又曰皇甫規延熹中爲中郎將持節監討零吾等羗㑹軍中大疫死者十三四規親入菴廬廵視將士三軍感恱東羗遂遣使乞降又曰皇甫嵩平黄巾䘏士卒甚得衆情每軍行頓止須營幔修立然後就舎帳軍士皆食爾乃甞飯吏有因事受賂者嵩更以錢物賜之吏懷慙或至自殺又曰馬援討西羗中流矢貫脛帝以璽書勞之賜牛羊數千頭援盡班諸賔客又曰董卓擊漢陽叛羗破之拜郎中賜縑九千疋卓曰爲者則巳有者則士爲功者雖巳共有者乃士乃悉分吏兵無所留又曰王覇常與臧宫傅俊共營覇獨善撫士卒死者脫衣以斂之傷者躬親以養之又曰光武遣太中大夫賜征西吏士死傷者醫藥棺殮大司馬巳下親弔死問疾以崇謙譲又曰耿恭在䟽勒遣軍吏范羗至燉煌迎兵士寒服又曰袁紹攻臧洪粮盡主簿啓内厨米三斗稍爲饘粥洪曰何能獨此耶使爲薄粥遍班士衆又殺其愛妾以食兵將咸流涕無能仰視魏書曹公令曰趙奢竇嬰之爲將也受賜千金一朝散之故能濟大功永代流聲吾讀其文未甞不慕其爲人也魏志曹真傳曰真毎征行與將士同勞苦軍賞不足輙以家財頒賜士卒皆願爲用又曰諸葛誕守夀春以司馬氏累丗擅權遂舉兵稱匡輔魏室爲辭司馬文王率師討之夀春城䧟誕死文王招其徒不降且招且戰數百人拱手爲列毎斬一人輙遣降之皆云爲諸葛公死無恨以至于盡無一人降時人比之田横呉戍將于詮曰大丈夫受命其主以兵救人旣不能尅又束手於敵吾不取乃免胄冒陣而死其得士心如此呉志曰陸琩字子璋丞相遜弟也少好學篤義先是陳留濮陽逸沛郡朱纂廣陵袁迪等皆單食有志就瑁遊處瑁割少分甘與共豊約蜀志曰鄧艾爲大將二十餘年賞罰明善卹卒伍身之衣食資仰於官素儉終不治私妻子不免飢寒晉書曰祖逖居丹徒之京口賔客義徒皆豪桀勇士逖遇之如子弟時楊土大飢此軰多爲盗竊攻剽冨室逖慰撫問之曰比復南塘一出不或爲吏所䋲逖輙擁護救解之談者以此少逖自若也又曰祖逖據太丘樊雅攻之陳留太守陳川使李頭救之頭力戰有勲逖時獲雅駿馬李頭甚欲之而不敢言逖知其意遂與之頭感逖恩遇毎歎曰若得此人爲主吾死無恨又載記曰劉曜將陳安善於撫納吉凶夷險與衆同之及其死隴上歌之曰隴上壯士有陳安軀幹雖小腹中寛愛養將士同心肝䯀􅍡父馬鐡瑕鞌七尺大刀奮如湍丈八虵矛左右槃十盪十決無當前戰始三交失虵矛棄我䯀􅍡竄巖幽爲我外援而懸頭西流之水東流河一去不還柰子何曜聞而嘉傷命樂府歌之又曰叚灼追理鄧艾表曰留屯上邽承官軍大敗之後士卒破膽將吏無氣倉庫空虚器械殫盡艾欲積糓強兵以待有事是歲少雨又爲區種之法手執耒耜率先將士所統万數而身不避僕虜之勞親執士卒之役又曰周訪練兵簡卒欲宣力中原與李矩郭黙相結慨然有平河洛之志善於撫納晉衆皆爲致死續晉陽秋曰盧循爲廣州州無麺毎得分餉未周遍文武則不食也其仁如此北史曰西魏將梁椿性果毅善撫納所獲賞物分賜麾下故毎踐敵場咸得其死力北齊書曰蘭陵武王長恭其爲將也躬勤細事毎得甘美乃至一瓜數果必與將士共之又曰趙郡王琛薨子叡嗣爲定州刺史詔領山東兵數万監築長城于時盛夏先有氷毎歳藏氷長史宗欽道以叡冒犯暑熱遂遣與氷追送正值日中炎赫叡乃對之歎息云三軍皆飲温水吾以何義獨進寒氷遂至消液竟不一甞兵人感恱遐邇稱數後漢書曰司馬楚之少有英氣能折節待士及宋受禪規欲報復収衆據長社歸之者常万餘人劉𥙿深憚之遣刺客沐謙圖害楚之楚之待謙甚厚謙夜詐疾知楚之必來欲因殺之楚之聞謙疾果自賷湯藥徃省之謙感其意乃岀匕首於席下以狀告之楚之歎曰若如來言雖有所防恐有所失謙遂委身事之其推誠信物得士心皆此類也後周書曰侯莫陳順於渭橋與賊戰頻破之魏文帝還親執順手曰魏橋之戰卿有殊力便解所服金鏤玉梁帶賜之又曰史寧爲凉州刺史遣使詣太祖請事太祖即以所服冠履衣𬒳及弓箭甲矟等賜寧謂其使人曰爲我謝凉州孤解衣以衣公推心以委公公其善始令終無損功名也又曰武帝勝齊出齊宮中金銀寳器珠翠麗服及宫人二千人班賜將士又曰武帝勞謙接下自強不息以海内未康銳情教習至於治兵閱武歩行山谷履渉勤苦皆人所不堪平齊之役見軍士有跣而行者帝親脫鞾以賜之又曰武帝善於撫下毎宴㑹將士必自執杯勸酒或手付賜物至於征伐之處躬在行陣性又果决能斷大事故能得士卒死力以弱制強又曰太祖平侯莫陳恱整兵入上邽収恱府庫財物山積皆以賞士卒毫釐無所取左右竊一銀鏤甕以歸太祖知而罪之即剖賜將士衆大恱又曰武帝大舉伐齊次於晉州𥘉齊攻晉州恐周師卒至於城南穿塹自喬山屬於汾水帝率諸軍八万人置陣東西二十餘里帝常御馬從數人廵陣處分之至輙呼主帥姓名以慰勉之將士感見知之恩各思自勵將戰有司請換馬帝曰朕獨乗良馬欲何所之齊主亦於此塹列陣帝欲薄之以礙塹遂止自旦至申相持不决申後齊人乃填塹南引帝大喜勒諸軍擊之兵纔合齊人便逐北斬首万餘級齊主與其麾下數十騎走還并州於是齊衆大潰隋書曰楊玄感反呉人朱爕晉陵人管崇起兵江南以應之自稱將軍擁衆十餘万帝遣將軍吐万緒魚俱羅討之不能尅王充募江都万餘人擊頻破之每有尅捷必歸功於下所獲軍實皆推與士卒身無所受由此人争爲用功最居多又曰煬帝在藩時嘗觀獵遇雨左右進油衣上曰士卒皆霑濕我獨衣此乎乃令持去唐書曰王丗充未平太宗奏請圍東都髙祖謂使人宇文士及曰歸報爾王今取東都者止欲兵甲休息耳破城之日其乗輿法物圖籍器械非私家所須者委汝収之子女玉帛皆分賜將士又曰貞觀中太宗親征髙麗駕次定州兵士到者幸定州城北門親慰撫之有從卒一人病不能起太宗招至牀前問其疾苦仍勑州縣厚加供給凢在征人欣然縱有病者恱以忘疾師次白巖城將軍李思摩中弩矢太宗親爲之吮血從行文武競思奮勵及軍迴行次柳城詔集戰亡人骸骨設太牢以祭之太宗慟哭盡哀軍人無不灑泣兵士觀者歸家以言其父母曰吾兒之死天子哭之死無所恨又曰司空李勣毎將兵在軍識其臧否聞人片善扼腕而從事捷之日多推功於下前後在軍所得金帛皆散之將士於是人皆爲用所向多尅捷及薨哭之或有嘔血者也又曰秦叔寳隨太宗戰於美良川破尉遲敬德功最多髙祖遣使賜以金瓶而勞之曰卿不顧妻子逺投於我又立功効能朕肉可爲卿用者割以賜卿耳况子女玉帛乎卿當勉之㝷授秦王右統軍太平御覽卷第二百八十
