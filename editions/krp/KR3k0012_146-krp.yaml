body:
  text: 皇親部十二太子一并丗子見周易離卦曰黃离元吉离南方之卦离爲火土記位焉士色黃火之子喻子有明德能附麗於其父之道文王太子發是也愼成其業故吉矣象曰明兩作离大人以繼明照于四方王肅曰兩离相續維明之義也周易鼎卦曰𥘉六鼎顚趾利出否得妾以其子无咎鄭玄曰顚踣也趾足也無事曰趾設陳曰足爻體選爲服𥘉爻在服之下足象也足所以承正鼎也𥘉隂爻而柔與乾同體以否正承乾乾爲君以喻君夫人事君若失正禮踣其爲足之道情無怨則當以和義出之然如否者嫁於天子雖失禮無出道逺之而已逺之子廢坤爲順又爲子母牛在后妃之旁側妾之例也有順德子必賢賢而立以爲丗子又何咎也周易震卦曰震驚百里不喪匕鬯彖曰震驚百里驚逺而懼迩也出可以守宗廟社稷以爲祭主王肅曰在有靈而尊者莫若於天有靈而貴者莫若於王有聲而威者莫若於雷有政而嚴者莫若於侯是以天子當乾諸侯用震地不過一同雷不過百里政行百里則匕鬯亦不喪祭祀國家大事不喪宗廟安矣處則諸侯執其政出則長子掌其祀周易說卦曰震一索而得男故謂之長男又曰震爲長子易經曰震下乾上无妄天精起鄭玄注曰起猶立也乾爲天文震爲長子聖人立爲天子天下之民各得其所也又曰主器者莫若長子故受之以震尚書大傳曰唯四月太子發上祭于畢下至於盟津之上乃告于司馬司徒司空諸節元才予無知以先祖先父之有德之臣左右小子予受先公戰力賞罰以定厥功明于先祖之遺鄭玄注曰四月者周四月也發周武王也卒父業故稱太子也太子發升于舟中流白魚入于舟王跪取出俟以燎羣公咸曰休哉尚書中候曰廢考立發爲太子鄭玄曰定王業也又曰我終之後怛稱太子終卒恒常也稱太子者明非諸侯王事未定矣又曰太子發以紂存三仁附即父位不稱王發武王名也三仁箕子比干微子文王得赤雀丹書故號以應天道未成而崩武王以天誅未行謙不自成故稱太子明統諸而未爲王又曰予稱太子發明愼父以名卒考予我也父死曰考文王命武王我終之後桓稱太子者明愼文王之命也君存稱丗子薨稱太子旣葬稱子踰年稱公今踰年而稱太子發若父業有不成者而將軍周書曰文王受命九年時維暮春在鄗召太子發曰嗚呼吾語女所保所守之哉厚德廣惠忠信志愛人君之行四者君徳不爲驕侈不爲太靡不淫於美括柱茅茨爲民愛費言務儉也因就木枚曰括也春秋演孔圖曰聖人在後曰望陽苞懷至德據少陽文王子也故曰在後嗣文王矣賈誼書曰文王使太公望傅太子發嗜鮑魚不登于俎豈有非禮而可養太子哉帝王世記曰武王納太公之女曰邑姜脩教于内生太子誦尚書頋命曰爾尚明時朕言用敬保元子釗時是也元子釗康王名也弘濟于艱難穆天子傳曰成姬之喪邢侯曹侯來弔内史將之以見天子天子告不䂊而辭焉邢侯曹侯乃弔太子太子哭出廟門以送邢侯再拜勞之侯不荅拜謙不與太子亢也周書曰晉平公使叔譽于周見太子晉與之言叔譽叔向五稱而三窮逡廵而退其言不遂五稱說五事遂終矣歸告公曰太子晉行年十五而臣不能與言師曠見李先稱曰吾聞太子之語髙於太山願一言王子應之曰吾聞太師將來吾心甚喜旣見子喜而又懼吾聞女知人年長短吉凶也曠對曰女聲清女色赤火色不壽太子曰然却後三年吾將上賔於帝所女愼母言殃將及女師曠歸未及三年告死者至也春秋傳曰靈王二十一年榖洛闘將毀王宫王欲壅之太子晉諌曰不可晉聞古之長民者不隳山不崇藪不防川不竇澤列仙傳王子喬周靈王太子晉也好吹笙作鳯皇鳴遊伊洛間有道士浮丘伯引上嵩山仙去尚書大傳曰堯爲天子朱爲太子舜爲左右鄭注曰左右助也若周之冢宰典國事堯知朱之不肖必將壞其宗廟滅其社稷而天下同賊之肖似也堯受運行知天命在受又深知朱之不似不欲命於天誅如桀紂也故堯推尊舜而尚之屬諸侯致天下於大麓之野又曰髙宗有親䘮居廬三年然未嘗言國事而天下無背叛之心者何也及其爲太子之時盡以知天下人民之所好惡是以雖不言國事也知天下無背叛之心家語曰子張問曰書云髙宗諒闇三年不言言乃雍有諸王肅曰雍權貌書言乃雍雍和也孔子曰胡爲其不然古者天子崩則丗子委政於家宰三年成湯旣没太甲聽於伊尹武王旣䘮成王聽於周公其義一也尚書大傳曰太子年十八曰孟侯孟侯者於四方諸侯來朝迎於郊者問其所不知也問人民之所好惡土地所生美珎恠異山川之所有無及父在時皆知之鄭玄注曰十八嚮入大斈爲成人愽問庶事也又曰棄法律逐功臣殺太子以妾爲妻則火不炎上又曰古之帝王者必立太學小學禮記曰斈在公宫之左大斈在郊使公卿太子大夫元士之嫡子十有三年始入小學見小節焉踐小義焉年二十入太學見大節焉踐大義焉故入小學知父子之道長㓜之序入太學知君臣之儀上下之位小師取小學之賢者登之天子天子以爲左右天子當爲太子禮志曰周公居攝踐祚而治亢丗子法於伯禽使之爲成王居欲使成王之知父子君臣長㓜之義所以善成王也尚書洪範五行傳曰心之大星天王也其前星太子也後星庶子也荆州星占曰少微星一名處士星儲君副主之宫韓詩外傳曰五帝官天下三王家天下家以傳子官以傳賢故自唐虞巳上經傳無太子稱號夏殷之王雖則傳嗣其文略矣至周始見文王丗子之制又曰趙簡子太子名伯魯小子名無恤簡子自爲二書牘親自表之書曰節用聽聦敬賢勿慢使能勿賤與二子使誦之居三年簡子坐清臺之上問二書所在伯魯忘其表令誦不能得無恤出其書於䄂令誦習焉乃黜伯魯而立無恤又曰魏文侯封太子擊於中山三年不徃來趙倉唐曰君何不遣人使大國太子曰願之乆矣未得可使者對曰臣願奉使侯何好太子曰侯嗜晨鳬好北犬於是遣倉緤北犬奉晨鳬獻之侯曰擊愛我知我所嗜好說苑又載事具奉使部說苑曰經侯過魏太子左帶羽玉具劒右帶環珮左光照右右光照左太子不視經侯曰魏國有寳乎太子曰主信臣忠百姓戴上此魏國之寳也毛詩曰渭陽康公念母也康公之母晉獻公之女文公遭驪姬之難未返而秦姬卒穆公納文公康公時爲太子贈送文公於渭之陽念母之不見也毛詩曰小弁刺幽王也太子之傳作焉弁彼鸒斯歸飛提提興也弁樂也鸒卑居卑居雅島也提提羣飛貌箋云樂乎技雅烏出食在野其飽羣飛而歸提提然興者喻凡人父子兄弟出入宫庭相與飲食亦提提然樂傷今太子獨不然民莫不榖我獨于罹幽王取申女生太子冝咎又恱褒姒生子伯服立以爲后而放冝咎將殺之箋云榖養也于日也罹憂也天下之人無不父子相養者我太子獨不然日以憂也又曰懷德維寜宗子維城無俾城壞無獨斯畏懷和也箋云斯離也和女德無行酷虐之政以安女國是以爲宗子之城使免於難遂行酷虐則禍及宗子是謂城壞城壞則乖離而散女獨居而畏矣宗子嫡子也周禮曰惟王建國辨方正位于寶注曰辨方謂别東西南北之名以表隂陽也正位謂若君南面當陽臣北靣即隂居於北宫以體太隂居太子於東宫以位少陽之類又曰膳夫掌王之食飲膳羞以養王及后丗子歳終則㑹唯王及后丗子之膳不㑹不㑹計多少優尊者其頒賜諸臣則計之又曰凡其死生鱻薧之物以供王之膳與其薦之物及后丗子之膳羞鄭司農云鮮謂生肉薧謂乾肉也又曰内饔掌王及后丗子膳羞之割烹煎和之事選百羞醬物珎異以俟饋供后及丗子之膳羞又曰籩人爲王及后丗子供其内羞於其飲食以供房中之羞又曰醯人供后及丗子之醬韲葅又曰外府掌邦布之出供王及后丗子之衣服之用又曰國君過市則刑人赦夫人過市罰一幕丗子過市罰一弈市者人之所交利而行刑之處君子無故不遊觀焉若遊觀則施惠以爲說也又曰王之諸子國有大事則帥國子而致於太子唯所用之若有甲兵之事則授之車甲合其卒伍置其有司以軍法治之司馬弗正軍法百人爲卒五人爲伍弗不也國子屬太子司馬雖有軍事不賦之也凡國之政事國子存遊倅使之脩德學道春合諸學秋合諸射以考其藝而進退之遊倅之未仕者斈太斈也射名也王制曰春秋教以禮樂冬夏教以詩書王太子羣子卿大夫元士之適子國之後選皆造焉儀禮聘禮曰遭夫人丗子之䘮君不受使大夫受於廟其他如遭君䘮夫人丗子死君爲䘮主使大夫受聘礼不以凶接吉也其他謂礼所降大戴禮曰古之王者太子生因舉之禮使士負之有司叅夙興端冕見之南郊見之天也過闕則下過廟則趨孝子之道也故自爲赤子則教固以行矣又曰太子旣冠成免於保傳之嚴則有司過之史有虧膳之宰太子有過史必書史之義不得不書過不書過則死過書而宰徹其膳宰之義不得不徹膳不徹膳則死於是有進善之旌誹謗之木敢諌之皷禮記曰大夫士之子不敢與丗子同名鄭玄注曰避僣邪也其先生則亦弗改丗或爲太又曰王太子王子羣后之太子卿大夫元士之適子凡入學以齒皆以長㓜受斈尊卑不同又曰文王之爲丗子朝於王季日三雞初鳴而衣服至於寢門之外問内竪之御者曰今日安不何如内竪小臣之屬掌内外之通令也如今小史直日矣内竪曰安文王乃喜孝子恒兢兢也及日中又至亦如之又復及暮又至亦如之暮夕其有不安節則内竪以告文王文王色憂行不能正履節謂居處故事履蹈地王季復膳飲食安也然後亦復初憂解食上必在視寒煖之節在察食下問所膳所食命膳宰曰末有原應曰諾然後退末猶勿也原再進也勿有所再進爲失餁臭味惡也退反其寢武王帥而行之不敢有加焉庶幾程式之帥循也又曰樂正司業父師司成一有元良萬國以貞丗子之謂也又曰成王㓜不能蒞阼周公相踐阼而治踐履也代成王履阼階攝王位治天下抗丗子法於伯禽欲令成王之知父子君臣長㓜之道抗猶舉也謂舉丗子之法使與成王居而學之也成王有過則撻伯禽所以示成王丗子之道以成王之過擊伯禽則足以感喻焉凡學丗子及學士必時四時各有冝斈士謂司徒論俊選所升於學者春夏學干戈秋冬學羽籥皆於東序又曰凡三王教丗子必以禮樂樂所以脩内禮所以脩外也禮樂交錯於中發形於外是故其成也懌恭敬而温文中心中也懌恱懌也立太傅少傅以養之欲其知父子君臣之道也仲尼曰昔者周公攝政踐阼而治抗丗子法於伯禽所以善成王也聞之曰爲人臣者殺其身有益於君則爲之況于其身以善其君乎周公優爲之于讀曰迂迂猶廣也是故知爲人子然後可以爲人父知爲人臣然後可以爲人君知事人然後能使人成王㓜不能蒞阼以爲丗子則無爲也以爲丗子若爲丗子時也是故抗丗子法於伯禽使之與成王居亦學此禮於成王側欲令成王之知父子君臣長㓜之義也君之於丗子也親則父也尊則君也有父之親有君之尊然後兼天下而有之是故養丗子不可不愼處君父之位覽海内之士而近不能以教其子則其餘不足觀也行一物而三善皆得者唯丗子而巳其齒於學之謂也物猶事也又丗子之記曰朝夕至于大寢之門外問内竪曰今日安否何如朝夕朝朝暮夕也日中又朝文王爲丗子也非禮之制丗子之禮亡此存其記内竪曰今日安丗子乃有喜色其有不安節則内竪以告丗子丗子色憂不滿容色憂憂淺不及文王不能正履也内竪言復初然後亦復初朝夕之食上丗子必在視寒煖之節食下問所膳羞必知所進以命膳宰然後退羞必知所進必知親所食若内竪言疾則丗子親齊玄冠而養親猶自也養疾者玄冠玄端膳宰之饌必敬視之疾者之食齊和所欲或異疾之藥必親嘗之試毒味也嘗饌善則丗子亦能食善謂多於前也甞饌寡丗子亦不能飽又不及武王一飯再飯以至于復初然後亦復初也復常所服禮記曰國君丗子生告於君接以太牢宰掌具接續如捷捷勝也謂食其母使之𥙷虚強氣也凡接子擇吉日雖三日之内尊卑皆必選其吉日也冢子則太牢冢大也庶人特豚士特豕大夫少牢國君丗子太牢皆謂長子又曰丗子生則君沐浴朝服夫人亦如之皆立于阼階西郷丗婦抱子升自西階君名之乃降子升自西階則人君見丗子於露寢也適子庶子見於外寢比適子謂丗子弟庶子妾子也冢子未食而見必執其右手適子庶子巳食而見必循其手未食巳食急正緩庶之義也又曰丗子佩瑜玉而綦組綬左傳桓公曰北戎伐齊齊侯使乞師於鄭鄭太子忽帥師救齊六月大敗戎師獲其二帥大良少良甲首三百以獻于齊於是諸侯之大夫戍齊齊人饋之餼使魯爲其班後鄭鄭忽以其功也怒故有郎之師公之未婚於齊也齊侯欲以文姜妻鄭太子太子忽辭人問其故太子曰人各有偶齊大非吾偶也詩云自求多福在我而巳大國何爲君子曰善自爲謀及敗戎師也齊侯又欲妻之固辭人問其故太子曰無事於齊吾猶不敢今以君命奔齊之急而受室以歸是以師婚也民其謂我何遂辭諸鄭伯又曰九月乙夘子同生服䖍注曰桓太子莊公同以太子生之禮舉之接以太牢接者子初生接見於父卜士負之士妻食之公與文姜宗婦命之又曰曹太子來朝曹太子桓公子莊公射姑賔之上卿之禮曹伯有故使其太子攝而朝曲禮曰諸侯之嫡子攝其君未誓於天子則以皮帛継子男如諸侯之上卿禮也上卿出入三積食三牢牽二年一享一食宴之也饗曹太子𥘉獻樂奏而歎𥘉獻酒如獻爵樂奏人上堂也𥘉獻爵奏樂太子歎而哀歎也施父曰曹太子其有憂乎非歎所也施父魯大夫古之享食所以觀威儀省禍福無䘮而慼憂必及焉曹太子臨樂而歎故曰其有憂乎父將死兆先見之也又曰晉侯使太子申生伐東山臯落氏里克諌曰太子奉冢祀社稷之粢盛以朝夕視君膳者故曰冢子君行則守有守則從從曰撫軍守曰監國古之制也夫帥師專行謀誓軍旅君與國政之所圖也非太子之事師在制命而巳禀命則不威專命則不孝故君之嫡嗣不可以帥師君失其官帥師不威將焉用之且臣聞臯落氏將戰君其舎之舎置置申生勿使將兵也公曰寡人有子未知其誰立焉不對而退里克不對太子帥師公衣之偏衣佩之金玦偏衣偏裝之衣偏異色駮不純裝在中左右各異故曰偏金玦以金爲玦也太子將戰狐突諌曰不可昔辛伯諗周桓公曰内寵並后外寵貳政嬖子配嫡大都耦國亂之夲也周公弗從故及於難今亂夲成矣立可必乎孝而安民子其圖之與其危身以速罪也速召也疾也言太子不去身必危疾召罪狐突知其雖夲旣成而太子拘於一節不逹至孝之義與臯落戰雖勝而歸猶不能免於難而使父有悖惑殺子之罪故傳曰備衆賢之言以迹太子所以死也經在僖公五年晉侯殺其丗子申生又曰㑹于首止㑹王太子鄭謀寕周也惠王以惠后故將廢太子鄭而立王子帶故齊桓帥諸侯㑹王太子以定其位又曰盟㑹於寗母謀鄭故也鄭伯使太子華聽命于㑹言於齊侯曰泄氏孔氏子人氏三族實違君命君若去之以爲成我以鄭爲内臣君亦無所不利焉齊侯將許之管仲曰君以禮與信屬諸侯而以姦終之無乃不可乎子華由是得罪於鄭鄭伯罪之也又曰𥘉鄭公子蘭出奔晉公子蘭鄭文公賤妾燕姞之子穆公也鄭逐羣公子故奔晋也從於晉侯伐鄭請無與圍鄭許之晉善蘭不忘夲國故也故使待命於東待命於鄭東也鄭石甲父侯宣多逆以爲太子以求成於晉晉人許之又曰秦康公送公子雍於晉也康公秦穆公太子罃晉出也曰文公之入也無衛故有吕郤之難吕甥郤芮欲焚公害也乃多與之徒衛衛徒兵也穆嬴日抱太子穆嬴襄公夫人太子靈公以啼于朝曰先君何罪其嗣亦何罪舎嫡嗣不立而外求君將焉寘此寘置也此太子出朝則抱以適趙氏頓首於宣子之門曰先君奉此子而屬諸子曰此子若才吾受子之賜如子爲吾教誨此子使之有賢才知人君之道也明吾受子之賜賜猶惠不才吾唯子之怨材而受賜美其教也不怨子惡其教不至也今君雖終言猶在耳君没未乆其言聲言氣尚在耳而棄之若何宣子與諸大夫皆患穆嬴且畏偪言諸大夫患穆嬴之言以君顧命之言責己也畏偪迫無置靈公一曰畏他公干徒來相逼迫矣乃背先蔑而立靈公以禦秦師又曰郕太子朱儒自安夫鍾自安猶處也夫鍾郎邑國人弗徇徇順也十二年春郕伯卒郕人立君文君改立君不周太子者太子以夫鍾與郕邽來奔郕邽亦邑名也一曰郕邦之寶圭太子父在而自安於夫鍾國人以爲不順故郕伯卒而更立君太子以其國寳輿地夫鍾來奔也又曰齊髙厚相太子光以㑹諸侯於鍾離不敬士莊伯曰髙厚相太子㑹諸侯將社稷是衛而皆不敬髙厚与光俱不敬棄社稷也其將不免乎免脫也言將不脫罪禍不以壽終也傳舉此者爲十九年齊殺其大夫髙原二十五年崔杼弑君光起夲也又曰齊侯娶於魯曰顔懿姬無子其姪鬷聲姬兄子曰姪懿姬所從也顔鬷皆其母姓懿聲謚也傳家從後言之故舉謚也生光以爲太子諸子諸子妾生子氏仲子戎子子嬖二子宋女仲子生牙公子牙也屬諸戎子戎子取牙養之戎子請以爲太子許之齊侯許之仲子曰不可廢常不祥立長爲常立而廢之爲不祥也間諸侯難間犯謂光巳列於諸侯難成光之立也列於諸侯矣謂上數從諸侯北伐盟㑹今無故而廢之是專黜諸侯也專獨也光比與諸侯列於盟不可黜也而以難犯不祥以難成之事犯不善君必悔之公曰在我而巳遂東太子光東徙之東垂也使髙厚傅牙以爲太子夙沙衛爲少傅齊侯疾崔杼微逆光微隱匿也疾病而立之疾困也而立爲太子太平御覽卷第一百四十六
