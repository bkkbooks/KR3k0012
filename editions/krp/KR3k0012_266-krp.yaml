front:
  text: 太平御覽卷第二百六十六
  hash: sha256:34e7c16f239518fdb7ba75eb6f457ee1922d01cc97d7a5dc7862b91d5b007188
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_266-1a}
body:
  text: 職官部六十四令長禮記檀弓下曰季子皐葬其妻犯人之禾申詳以告曰請庚之申詳子張子也庚償也子臯曰孟氏不以是罪予朋友不以是弃予言非故也以吾爲邑長於斯也買道而葬後難繼也恃寵虐民非也左傳曰子皮欲使尹何爲邑子産曰少未知可否子皮曰使夫往而學焉夫亦愈知矣子産曰不可人之愛人求利之也今吾子愛人則以政猶未能操刀而使割也其傷實多子之愛人求傷之巳論語曰子之武城聞絃歌之聲子游爲武城宰夫子莞爾而笑曰割鷄焉用牛刀言治小何湏用大道子游對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也道禮樂也樂以和人人和則易使子曰二三子謂從行者偃之言是也前言戯之耳戯以治小用大道也又曰子夏爲莒父宰問政子曰無欲速無見小利欲速則不達見小利則大事不成又曰子游爲武城宰子曰女得人焉耳乎曰有澹臺滅明者行不由徑非公事未甞至於偃之室也言澹臺㓕明公且方也家語曰子路治蒲請見於孔子曰由願受教於夫子子曰蒲其何如對曰邑多壯士又難治也子曰然吾語汝恭與敬可以攝勇寛而正可以懷強愛而恕可以容困言愛而恕者容困窮温而斷可以抑姦如此而加之以忠潔則政不難矣又曰子路爲蒲宰爲水備與其民修溝瀆以民之煩勞也人與一單食簞同一壷漿孔子聞之使子貢止之子路不恱曰夫子以仁教而禁行仁由不受也孔子曰尓以爲人誠何不白於君發倉廪以給之而私以汝食遺之是尓明君之無惠而見巳之德美也汝速巳則可不巳則汝之見罪必矣晏子春秋曰晏子爲阿宰三年而毀聞於國景公不恱召而免之晏子謝曰嬰知過矣請復治阿三年而譽聞於國公將賞之辭而不受公問其故對曰昔者嬰之所以當誅者當賞而今所以當賞者當誅是故不敢受史記曰齊威王即位召即墨大夫語之曰子居即墨毀日至然吾使人視即墨田野闢民人給官無留事東方以寧是子不事吾左右以求譽也封之萬家召阿大夫語曰自子之守阿譽日聞然吾使人視阿田野不闢民人貧苦是子以幣厚吾左右以求譽也乃烹阿大夫左右甞譽者皆併烹之遂起兵擊諸侯諸侯震懼人人不敢飾非務盡其誠齊國大治漢書曰諸令長皆秦官掌治其縣萬户巳上爲令秩一千石至六百石萬户以下爲長秩五百石至三百石皆有丞尉秩四百石至二百石又曰蕭育字次君爲茂陵令㑹課育第六召詣後曹當以職事對育徑出曹書佐隨牽育拔佩刀曰蕭育杜陵男子何詣曹也又曰薛宣子惠始爲彭城令宣從臨淮遷至陳留過其縣橋梁郵亭不脩宣心知惠不能留彭城數日案行舎中處置什器觀視園菜終不問惠以吏事惠自知治縣不稱宣意遣門下掾送宣至陳留令掾進自從其所問宣不教誡惠吏職之意宣曰吏道以法令爲師可問而知能與不能自有資才何可學也衆人以宣言爲然東觀漢記曰張歆守平臯長有報父仇賊自出歆召因詣閤曰欲自受其辭旣入解械飲食使發遣遂弃官亡命逢赦出由是郷里服其髙義後漢書曰馮魴遷郟令後車駕西征隗囂潁川盗賊群起郟賊延褒等衆三千餘人攻圍縣舎魴率吏士七十許人力戰連日弩矢盡城䧟魴乃遁去帝聞其反即馳赴潁川魴詣行在所帝案行闘處知魴力戰乃嘉之曰此健令也又曰宋飜字飛烏廣平列人也爲河隂令順陽公主家奴爲刼攝而不送飜將兵圍主宅執主婿馮穆歩驅向縣時正炎暑立之日中流汙霑地於是威振京師又曰董宣字少平徴爲洛陽令擊搏豪強莫不震慄京師號爲卧虎又曰公孫述爲清水長父仁以述年少遣門下掾隨之官月餘掾辝歸白仁曰述非待教者也續漢書曰董宣爲雒陽令寜平公主乳母子白日殺人因匿主家吏不能得及主出行以奴驂乗宣於大夏門亭候之乃駐車叩馬以刀畫地數主之失者三叱奴下車格殺之主即馳車入宫上大怒召宣令欲死乎宣叩頭曰臣奉法之吏不敢縱法不欲死也上曰捶之宣曰願一言死無恨上曰何言宣曰陛下聖德中興而縱奴殺良民以奴殺臣臣死之後陛下何以治天下捶殺臣不如臣自殺即以頭橕楹流血𬒳面上令小黄門持之曰癡令令叩頭謝主宣不從上曰頓癡令頭兩手據地不肯低頭上勑強項令出太官賜食又曰虞詡爲朝歌長故舊皆弔曰得此何衰詡曰難者不避易者不從不遇盤根錯節何以別其利器乎華嶠後漢書曰周規除臨湘令長沙太守程徐二月行縣勑諸縣治道規以方春向農民多劇務不欲奪人良時徐出督郵規即委官而去徐憮然有媿色遣功曹賫印綬檄書謝請還規謂功曹曰穆府君愛馬蹄不重民力徑逝不顧漢制曰列侯所食縣曰國皇太后公主所食曰邑有變夷曰道凢縣萬户以上爲令減萬户爲長漢書胡廣注曰秋冬歳盡各計縣户口墾田錢糓出入盗賊多少上集簿丞尉以下歳詣郡課校其功功多尤爲最者於廷尉勞勉之以勸其後負多尤爲殿者於後曹對責以糺怠慢也魏志曰賈逵字梁道河東襄陵人文帝即王位以鄴縣户數萬在都下多不法乃以逵爲鄴令又曰賈逵守綘邑長郭援攻河東所經城邑皆下逵堅守援攻之不拔乃召單于併軍急攻之城將潰綘父老與援要不害逵綘潰援聞逵名欲使將以兵刼之逵不動左右引逵使叩頭逵叱之曰安有國家長吏爲賊叩頭援怒將斬之綘吏民聞將殺逵皆乗城呼曰負要殺我賢君寜俱死左右義逵多爲請遂得免又曰滿寵字伯寜守髙平令縣人張苞爲郡督郵貪穢受取干亂吏政寵因其來在傳舎率吏卒出收之詰其所犯即日考竟遂弃官而歸又曰崔林字德儒除鄔令貧無車馬單歩之官蜀志曰鄧芝字伯苗先主定益州芝爲郫邸閭督先主出至郫與語大竒之擢爲郫令又曰蔣琬字公琰零陵湘郷人也弱冠與外弟泉陵劉敏俱知名琬以州書佐隨先主入蜀除廣都長先主甞因遊觀奄至廣都琬衆事不理時又躭酒先主大怒將加罪戮軍師將軍諸葛亮請曰蔣琬社稷器非百里之才也其爲政以安民爲夲不以修飭爲先願主公重加察之先主雅敬亮乃不加罪倉卒免官而巳吴志曰賀齊字公苗㑹稽山隂人也少爲郡吏守剡長縣吏期從輕俠爲姦齊欲治之主簿諌曰從縣大族山越所附今日治之明日冦至齊聞大怒便立斬從族黨相糾合衆千餘人舉兵攻縣齊率吏民開城門突擊大破之威震山越又曰陶謙除舒令郡太守張盤同郡先輩與謙父友謙耻爲之屈甞舞屬謙謙不爲起固強之乃舞舞又不輕盤曰不當轉耶曰不可轉轉則勝人又曰孟仁字恭武江夏人也爲吴令時皆不得將家之官毎得時物來以寄母常不先食及聞母亡犯禁弃官又曰劉繇字正禮舉孝廉爲郎中除下邑長時郡守以貴戚記之遂弃官而去又曰朱然字義封甞與孫權同書學結恩愛至權統事以爲餘姚長時年十九晉書曰車濟字萬度燩煌人也果毅有壯勇爲金細令爲石季龍將麻秋所䧟濟不爲秋屈秋必欲降之乃臨之以兵濟辭色不撓曰吾雖才非龐德而受任同之身可殺志不可移乃伏劒而死秋歎其忠節以禮葬之晉中興書曰華譚所友袁甫者字公胄歴陽人少能言議與譚齊名友善大安中甫入洛詣中領軍何勗自言能治劇縣勗曰君子法應多冝何以唯欲宰民何不爲一臺職乎甫曰人各有所能否譬由錦繒中之好而不可以爲恰口洽切稻食中之好而不可以爲韲是以孔子曰及其使人也器之茍非大才何能悉備乆之除松滋令宋書曰陶潜字淵明謂親朋曰聊欲絃歌爲三徑之資可乎執事者聞之以爲彭澤令公田悉令吏種秫稻妻子固請種粳乃使二頃五十畝種秫五十畝種粳郡遣督郵至縣吏白應束帶見之潜歎曰我不能爲五㪷米折腰向郷里小兒即解印綬去賦歸去來又曰張融爲封溪令行路經嶂嶮獠賊執融將殺食之融神色不動方作洛生詠賊異之而不害也浮海至交州於海中遇風終無懼色方詠曰乾魚自可還其本郷内脯復何爲者哉齊書曰卞延之弱冠爲上虞令有剛氣㑹稽太守孟凱以令長裁之憤不能容脫幘投地曰我所以屈卿者正爲此幘耳今巳投之卿以一世勲門而傲天下國士拂衣而去梁書曰蕭素爲中書侍郎在位少時求爲諸曁令到縣十餘日掛衣冠於縣門而去後魏書曰髙祖以北平府長史裴聿中書侍郎崔亮並清貧欲以俸禄優之乃以亮帶野王令聿帶温縣令時人榮之北史曰齊因魏宰縣多用廟監至於士流耻居百里元文遥以縣令爲字人之切用之猶恐其披訴揔召集神武門令趙郡王叡宣旨唱名厚加慰諭士人爲縣自此始也三國典略曰陳禇玠爲中書侍郎陳主以山隂縣多豪猾謂舎人蔡景歴曰稽隂大邑乆無良宰卿文士之内試思其人景歴進曰禇玠清廉有幹用陳主曰善乃以爲令縣人張次的王休逹等與諸猾吏賄賂通姦全丁大户多有隱没玠乃鏁次的具狀啓臺陳主手勑慰勞并遣使助玠捜括所出軍人八百餘户時曹義逹爲陳主所寵縣人陳信家冨於財謟事義逹信父顯文恃勢撗暴玠乃遣使執顯文鞭之一百於是吏人股慄莫敢犯者義逹於是譛之玠在任守禄俸而巳去官之後不堪自致因留縣境種𬞞菜以自給或嗤玠以非百里之才玠荅曰吾委輸課最不後列城除殘去暴姦吏跼蹐若謂不能自潤脂膏則如來命以爲不逹從政吾未服也韓子曰晉平公問趙武曰中牟吾國之股肱邯鄲之肩髀也寡人欲其良令也令其空誰使而可趙武曰刑伯子可公曰伯子非子之讎對曰私讎不入公門又問中府之令空誰使而可趙武曰臣子可故曰外舉不避仇讎内舉不避子弟又曰宓子賤爲單父令見有若有若曰子何痩焉宓子曰憂官政也又曰晉文公出亡趙衰挈壺飱而從與文公相失飢而道寢餓而不敢食及文公反國舉兵攻原克而拔之文公曰夫輕忍餓餧之患而必全壷飡者是且不以原叛乃舉爲原令愼子曰立國君以爲國非立國以爲君也夫以立官長以爲官也非立官以爲長也風俗通曰俗說孝明帝時尚書郎河東王喬遷爲葉令喬有神每月朔常詣臺朝明帝怪其來數而無車騎宻令太史候望言臨至時常有䨥鳬從東南來因伏伺見鳬舉羅但得一隻舄使尚方識視四年中所賜尚書官属履也通典曰縣邑之長曰宰曰尹曰公曰大夫晉謂之大夫魯衛謂之宰楚謂之公太平御覽卷第二百六十六
