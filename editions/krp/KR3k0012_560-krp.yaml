front:
  text: 太平御覽卷第五百六十禮儀部三十九
  hash: sha256:01495064500f485d9fb320f09890d424f0f6ecd79183bb74583beab71a05c80d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_560-1a}
body:
  text: 冢墓四禮論曰問郡將臨墓主人先以除身無服將若不哭主人當哭否賀循荅之云凡君臣民皆湏先君哭禮也此祭君冝哭則主人不敢以哭煩君耳又曰問墓中有何靣爲上荀納以爲縁生奉終冝依禮坐蔡謨難據周公明堂位東西以此爲上與納反納又引廟位以荅王濮陽北墓向南以西爲上上黨郡記曰令狐徴君隱城東山中令狐終即云葬焉諸生遵師法而陪葬者三百餘家松三千樹大皆十數圍髙四五十丈今俗名其山曰令狐墓漢史所稱壷關三老令狐茂者是也伏琛齊地記曰臨淄小城北門東二百餘歩有晏嬰冢又曰齊桓公冢齊城之南東十五里在牛山桓公冢西南八里有仲父冢葬於牛山之阿又曰朱虎城東二十里有柴阜其西南隅有魏獨行君子管寧墓石碑猶存城東北三十里柴阜東頭有魏徴士邴原墓石碑猶存又曰牛山西南二里有孫賔墓石碑猶存呉地記曰昌門外女墳者呉王闔閭女墓也乃以文石爲槨藏金王珎玩以人從死髙墳深池池水成湖故名曰女墳亦與虎丘俱見發掘皆無所得也又曰昌門南有要離墓呉王闔閭旣殺王僚而代之僚子慶忌亡奔衛慶忌勇捷過人恐結諸侯還爲國難伍子胥與要離爲行人要離弱而謀於王曰殺臣妻子刑臣左手要離因亡奔衛慶忌聞呉王暴虐如此甚信之遂與俱還圖共襲呉王行及大江要離刺殺慶忌因亦自殺闔閭葬之於昌門南大城内齊門外有慶忌墓丘淵之齊道記曰先是嬴博二縣共界漢武帝封禪合作此縣以供祀故曰奉髙東南三十里有延陵兒冢夲云其髙可隱今乃二丈餘似是後人陪之伍輯之從征記曰齊襄王墓在汝水西墓西有僖公墓東有四田墓傳云倨榮廣布也墓皆方墓圎墳戴延之西征記曰彭城南有亞父范曾冢冢髙四十餘丈東北有隧道其城北三里有劉向墓泗水東三里漢大夫龔勝冢石碣猶存耻登王莾之朝不食而死又曰金郷焦氏山北數里有漢司􅊢校尉魯峻冢前有古石祠堂堂壁皆青石隱起自書契以來忠臣孝子貞婦孔子及弟子七十二人形像皆刻石記之伏滔北征記曰姑熟九井山北十里有呉大將諸葛瑾墓墓墻猶存西北十八里直瀆前墓是呉將甘寧墓也相者云此墓有王氣孫皓鑿其後計里名爲直瀆續述征記曰太公冢在堯山北五里平地爲墳髙十丈曽有發之者冢深數十仞得一銅槨金玉甚多尚父五丗葬周斯寔田和冢也和遷齊居於海上而別爲諸侯亦稱太公也又曰宿預縣水南大徐城古之徐國城北徐君墓季子解劒墳樹則斯地也又曰城陽縣城二里小城二里小城南九里有堯陽自漢迄于晉二千石及丞尉刋名堯即位至永嘉三年二千七百有二十一載記于堯碑城東南六里堯母慶都墓稱曰靈臺堯陵北二里仲山甫墓墓前祠堂石室儼然若新皇覽冢墓記曰顓頊冢在東郡濮陽縣頓丘城外廣陽里中王莽時使使者祠顓頊冢又曰秦始皇冢在驪山古之驪戎國今之所豊也晉獻公伐驪戎獲二女其山隂多黄金其陽多美玉謂藍田是也故貪而葬焉并天下徒七十餘萬穿入地洞三泉而致椁宫觀竒器珎恠諸物藏之令一匠人作機弩人有近穴輙射之以水銀爲百川江河大海金銀爲鳬鸖機關轉相斡終而復始上具畫天文以人魚膏爲燈度乆不滅後宫無子者皆殉從死者甚衆恐工匠知之殺工匠於藏中因閇羡門復土樹草木以像山墳髙五十餘丈周迴五里餘後項籍燒其宫觀關東賊發之後牧羊兒亡羊羊入藏中持火炤羊燔其椁後賊遂取其銅又曰太上皇葬萬年髙帝父也髙帝葬長陵孝惠帝覇陵諸陵皆用瓦器不爲墳王莽之亂天下無道獨無災害孝景帝葬陽陵孝武皇帝葬茂陵孝昭皇帝葬平陵孝宣皇帝葬杜陵孝元帝葬渭陵元帝下詔曰無置從民令天下無騷動之憂自是陵園不置邑孝成帝葬延陵孝哀帝葬義陵孝平帝葬康陵孝文皇帝弟淮南厲王長坐謀反後置園如諸王長好道事八公丗之愚者云長仙醫巫訖曰淮南好道百官皆得仙狗吠雲中雞鳴天上東平思王冢在東平松皆西靡又曰蒼頡冢在馮翊衙縣利陽亭南道傍墳髙六尺學書者皆往上姓名投刺祀之不絶又曰蚩尤冢在東郡壽張縣閿郷城中髙七尺民常十月祀之有赤氣出如一疋絳帛民名爲蚩尤旗又肩髀冢在山陽郡鉅野縣傳言蚩尤與黄帝戰於涿鹿之野黄帝克之身體異處皆葬之又曰奚仲冢在魯國縣東去縣二十五里山上因名奚仲山下亭名奚仲亭又白湯冢在濟陽薄縣北郭冢四方方八十歩髙七丈上平又曰呉太伯冢在㑹稽呉縣北去城十里又曰周文王武王周公冢在京兆長安聚又曰王子黽音猛冢在南陽鄂縣西又曰夏育冢在濟南歴山上又曰秦繆公冢在甘泉宮祈年觀下又曰􅉑公冢在河内温縣東濟水南大冢是也其城南有􅉑公䑓又曰葉公諸梁子髙冢在南郡葉縣西北去城三里所近縣民皆祠之又曰魯大夫叔梁紇冢在魯國東陽聚安泉東北八十四歩名曰防冢民傳言防墳於墳地微髙又曰孔子冢在魯城北便門外南去城一里冢塋方百畝冢南北廣十歩東西十歩髙丈二尺冢爲祠壇方六尺與地方平無祠堂冢塋中樹以百數皆異種魯人丗丗皆無能名其樹者民云孔子弟子異國人各持其國樹來種之孔子塋中不生荆棘及刺人草伯魚墓在孔子冢東與孔子並大小相望子思冢在孔子冢南大小相望又曰伯樂冢在濟隂定陶東南一里冢髙五丈又曰師曠冢在右扶風名曰師曠山人民不敢上其上又曰楚武王冢在汝南郡鯛音紂陽縣葛陂郷城東北民謂之楚王岑又曰鄭相子産冢在河南郡新鄭城外大冢是也又曰靖郭君冢在魯國薛城中東聚孟常冢在魯薛城中又曰文信君吕不韋冢在河南洛陽城北邙山道西大冢是也民傳言吕母冢不韋先墓故其冢名吕母不韋死獲過於始皇矣民傳云不韋好經書皆以葬漢明帝朝公卿大夫諸儒八十餘人論五經誤失符節令宋元上言臣聞秦昭王與不韋好書皆以書葬王至尊不韋乆貴冢皆以黄膓題湊豦地髙燥未壞臣願發昭王不韋冢視未燒詩書又曰亞夫冢在盧江居巢縣郭東居巢亭中又曰齊桓公冢在臨淄城二十里淄水南孟甞君與齊桓公冢同處唐書新語曰開元中集賢學士徐堅葬妻問兆域之制於張說曰長安神龍之祭有黄州僧泓者能通鬼神之意而以人事叅之僕嘗聞其言猶記其要墓欲深而狹深者取其幽狹者取其固平地之下一丈二尺爲土界又一丈二尺爲水界各有龍守之土龍六年而一暴水龍十二年而一暴當其隧者神道不安故深二丈四尺之下可以設窀穸墓之四維謂之折壁欲下闊而上歛其中項謂之中樵中樵欲俯嶔而傍煞墓中末粉爲飾以代石堊不置瓴甋瓷瓦以其近於火不置黄金以其乆而爲恠不置朱丹雄黄譽石以其氣燥而烈使墳上草木枯而不潤不置羽毛其近於屍也鑄鐵爲牛豕之像可以禦二龍王潤而潔能和百神寘之墓内以助神道僧泓之說如此又曰大理卿徐有功持法不濫及其葬也將穿墓筮者曰必有異應以旌善人果獲石堂其大如倉中空外堅四門入牗占曰此天所以祚有德也置之墓中其後終告後優詔褒贈寵及其子圖墓書曰大墓天剛嚴父之門八將之首位處乾尊欲得連堽隱軫狀如亂雲望之􅔘􅔘絶而復連小頓大起千里相牽壽過期頥丗丗登仙又曰望之如飛雷即之如鳥驚法出勇士伏節御兵又曰夫欲依山葬者其山連延百里不絶一髙一下小頓則大起出公卿若三重之山望之似城郭多諸支別者亦出公卿如新月形在腹中葬冢之所若至日没見日光者出封侯又曰凡相山陵之法山望如龜狀葬之出公卿封侯代代不絶山望如龍狀有頭尾蜲虵者葬之出二千石凡依山作冢皆當立在山東爲利得山之形力也山如龜形又巍巍直上如闕狀出二千石又曰欲知貧富堽陵肥薄狀如肥馬草木茂盛色黄紫皆冨也堽陵多傷缺土色赤白地瘠草木黄赤不茂或多細石皆貧相冢書曰冢欲得見郡縣城郭欲得連屬長長無極冢青氣鬰鬰出二千石赤氣出公卿白氣出刑戮黄氣出封侯欲得雌龍地多子孫不用雄龍堽武子堽又曰凡葬於龍耳貴出侯青烏子稱山三重相連名傘山葬之出二千石張載七哀詩曰北邙何纍纍髙陵有四五借問誰家冢皆云漢丗主魏武帝遺令曰汝等時時登銅雀䑓望吾西陵墓田魏文帝爲漢帝置守冢詔曰朕承符運受終革命其敬事山陽公如舜之宗堯有始有卒傳之無窮前羣司奏處正朔欲使一皆從魏制意所不安其令山陽公於其國中正朔服色祭祀禮樂自如漢又爲武昭宣明帝置守冢各三百家宋孝武置自古帝王守冢户詔曰先代帝王因時創業君人建國禮尊南面而歴運推移年代乆逺丘壠殘毀撨牧相趍瑩兆堙蕪封樹莫辨自古以來帝王陵墓可隨近十户蠲其役以供守視宋髙祖脩楚元王墓詔曰夫褒賢崇德千載弥尊敦夲敬始義隆自逺楚元王積仁基德啓藩斯境素風道隆作範後昆夲支之祚實隆鄙宗遺芳餘烈奮于百代而丘封依然墳塋莫翦感逺存徃慨焉永懷夫愛人懷樹甘棠且猶勿翦追甄墟墓信陵尚或不絶况瓜瓞所興開源自夲者乎可蠲復近墓五家長給灑掃太平御覽卷第五百六十
