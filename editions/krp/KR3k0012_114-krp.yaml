body:
  text: 皇王部三十九唐憲宗章武皇帝穆宗文惠皇帝敬宗昭愍皇帝憲宗章武皇帝唐書曰憲宗章武皇帝諱純順宗長子母曰莊憲皇后大暦十三年生於長安之東宫内六七歳時德宗抱置膝上問曰汝誰子在吾懷對曰是第三天子德宗異之貞元四年六月封廣陵王順宗即位之年四月冊爲皇太子八月乙巳即皇帝位於宣政殿先是連月霖雨是日晴霽人情忻恱丁未始御紫宸殿對百僚庚戍詔曰朕以寡昧纂丕洪業永思理本所寳惟賢至如嘉禾神芝竒禽異獸盖王化之虚美也所以光武形於詔令春秋不書祥瑞朕誠德薄思及前人自今巳後所有祥瑞有司不得上聞其珍禽竒獸亦冝停進冬十月壬申貶中書侍郎同中書門下平章事韋執誼爲崖州司馬以交王叔文也元和元年春正月景寅朔皇帝率群臣於興慶宫奉上太上皇尊號丁夘御含元殿受朝賀禮畢御丹鳯樓大赦天下改元癸未詔以太上皇舊恙愆和親侍藥膳權不聽政以髙崇文檢校工部尚書充神䇿行宫節度使甲申太上皇崩乙酉宰相杜佑攝家宰戊子制曰劒南西川疆界素定藩鎮守備各有區分頃因元臣薨謝隣藩不睦劉闢乃因虚搆隙以忿結讎遂勞三軍兼害百姓朕志存含垢務欲安人遣使宣諭委之旄鉞如聞道路擁塞未息干戈輕肆攻圍擬圖吞併爲君之體義在勝殘命將興師蓋非獲巳冝令興元嚴礪東川李康掎音巳角應接神䇿行營節度使髙崇文神䇿兵馬使李元弈率歩騎之師與東州興元之師類㑹進討甲午髙崇文由斜谷路李元弈由􅶴谷路俱㑹于梓潼關辛夘群臣請聽政戊戌上謂宰臣曰前代帝王或怠於聽政或躬覽繁務其道何如杜黄裳對曰帝王之務在於修己簡易擇賢委任不冝怠肆安逸然事有綱領小大常務其逺者大者至如簿書獄訟百吏能否本非人主所自任也但擇人委任責其成效賞罰必信誰不盡心傳稱帝舜之德曰夫何爲哉恭己正南面而已誠以能舉十六相去四凶也豈與勞神疲體自任耳目之主同年而語哉但人主常勢患在不能推誠人臣之弊患在不能自竭由是上疑下詐禮皃或虧欲求致理自然難致苟無此弊何患不至於理上稱善乆之五月辛夘冊太上皇后王氏爲皇太后九月辛亥髙崇文奏收成都擒劉闢以獻癸丑以山人李渤爲左拾遺徴不至二年春正月上親朝獻太清宫御丹鳯樓大赦天下巳酉以户部侍郎武元衡爲門下侍郎同平章事以中書舎人翰林學士李吉甫爲中書侍郎同平章事二月庚午司天造新暦成詔題爲元和觀象暦九月庚申李錡據潤州反殺判官王澹大將趙琦遂令蘇常杭湖睦五州戍將殺刺史修石頭故城欲謀僣逆癸酉潤州大將張子良李奉仙等執李錡以獻十一月斬錡詔削屬籍十二月景辰上謂宰臣曰朕覽國書見文皇帝行事少有過差諌臣論諍往復數日况朕之寡昧渉道未明今後事或未當卿當每事十論不可一二而止巳夘史官李吉甫撰元和國計簿揔計天下方鎮凡四十八管州府二百九十五縣一千四百五十三户二百四十四萬二百五十四其鳯翔鄜坊邠寧振武涇原銀夏靈鹽河東易定魏博鎮兾范陽滄景淮西淄青十五道凡七十一州不申户口每歳賊入倚辦止於浙江東西宣歙淮南江西鄂嶽福建湖南等八道合四十九州一百四十四萬户比量天寳供稅之户則四分有一天下兵戎仰給縣官者八十三萬餘人比量天寳士馬則三分加一率以兩户資一兵其他水旱所損徴科發歛又在常役之外是歳吐蕃廻紇奚契丹渤海牂牁上音藏下音哥南詔並朝貢三年春正月癸巳羣臣上尊號曰睿聖文武皇帝御宣政殿受冊禮畢御丹鳯樓大赦天下庚子涇原叚祐請修臨涇城在涇州北九十里扼犬戎之衝要詔從之四年秋七月御製前代君臣事迹十四篇書於六扇屏風是月出書屏以示宰臣丁未渭南暴水壞廬舎二百餘户口溺死六百人命府司賑給八月安南都護張舟奏破壞王國三萬餘人獲戰象兵械并王子五十九人十月冊鄧王寧爲皇太子癸巳以冊儲肆赦繋囚死罪降從流巳下遞减等工部侍郎歸登給事中吕元膺爲皇太子諸王侍讀五年八月乙亥上謂宰臣曰神仙之事信乎李藩對曰神仙之說出於道家道家所宗老子五千文爲本老子指歸與六經無異前代好恠之流假託老子爲神仙之說故秦始皇遣方士載童女入海求仙藥漢武帝嫁女與方士求不死藥二主受惑卒無所得文皇帝服胡僧長生藥遂致暴疾不救古詩云服食求神仙多爲藥所悮誠哉是言也君人者但務求理四海樂推社稷延永自然長年也上深然之六年十一月乙丑制以户部侍郎李綘爲中書侍郎同平章事十二月辛夘皇太子寧薨謚曰惠昭七年五月上謂宰臣曰卿言吴越去年水旱昨有御史自江淮廻言不至爲灾人非甚困李綘對曰臣得兩浙淮南狀繼言歉旱方隅授任皆朝廷信重之臣御史非良或容希媚此正當姦侫之目况推誠之道君人大本任大臣以事不可以小臣言間之伏望明示御史姓名正之典刑上曰卿言是也朝廷大體以恤人爲本一方不稔即冝賑救濟其飢寒况可疑之耶向者不思而有此問朕言過矣八年三月辛未上以乆旱親於禁中祈雨是夜澍雨霑足六月景寅京師大風雨毀屋飄瓦人多壓死所在川瀆暴漲行人不通辛丑出宫人二百車任從所適以水災故也九年十月甲子制朕嗣膺寳位于兹十年每推至誠以御方夏庻以仁化臻於大和宵衣旰食意屬於此今淮西一道未逹朝經擅自繼襲肆行㓂掠將士等迫於受制非是本心思去三靣之羅庻遵兩階之義冝以山南東道節度使嚴綬兼充申光蔡等州招撫使十年正月嚴綬帥師次蔡州界巳亥制削奪吴元濟官爵六月鎮州節師度使王承宗遣盗夜伏於靖安坊刺宰相武元衡死之刺御史中丞裴度傷首而免十二年五月隨唐節度使李愬奏敗賊於吴房獲賊將李祐七月以裴度守門下侍郎同平章事充彰義軍節度申光蔡觀察處置等使仍充淮西宣慰使十月李愬率師入蔡州執吴元濟以獻淮西平十三年正月御含元殿受朝賀禮畢御丹鳯樓大赦天下七月詔削奪淄青節度使李師道官爵仍令宣武魏博義成等五鎮之師分路進討十二月上謂宰臣曰人臣事君但力行善事自致公望何乃好樹朋黨朕甚惡之裴度對曰君子小人未有無徒者君子之徒則同心同德小人之徒是朋是黨上曰他人之言亦與卿等相似豈易辯之哉度曰君子小人觀其所行當自區別矣上曰凢好事口說則易躬行則難卿等旣言之湏行之勿空言說度等謝曰陛下處分可謂至矣臣等敢不激厲然天下之人從陛下所行不從陛下所言臣等亦願陛下每言之則行之上頗忻納十四年春正月以東師宿野不受朝賀三月上謂宰臣曰聽受之間大是難事推誠選任所謂委寄必合盡心及至所行臨事不無偏黨朕臨御已來歳月斯乆雖不明不敏然漸見物情每於行爲務欲詳審比令學士集前代昧政之事爲辯謗略每欲披閱以爲鑒戒耳崔羣對曰無情曲直辯之至易稍懷欺詐審之實難故孔子有衆好衆惡之論浸潤膚受之說蓋以曖昧難辯故也若擇賢而任之待之以誠糾之以法則人自歸公孰敢行僞陛下詳觀載籍以廣聦明實天下幸甚七月羣臣上尊號曰元和聖文神武法天應道皇帝是日御宣政殿受冊御丹鳯樓大赦天下八月上謂宰臣曰天下事重不可一日曠廢若遇連假不坐有事即詣延英請對崔羣以殘暑方甚目同列將退上止之曰數日一見卿等時雖暑熱朕不爲勞九月上謂宰相曰朕讀玄宗實録見開元𥘉銳意求理至十六年巳後稍似懈倦開元末又不及中年何也崔羣對曰玄宗少歴民間身經迍難故即位之𥘉知民疾苦躬勤庶政加之姚崇宋璟蘇頲盧懷愼等守正之輔孜孜獻納故致治平及後承平日乆安於逸樂漸逺端士而近小人宇文融以聚歛媚上心李林甫以姦邪惑上意加之以國忠故及於亂願陛下以開元𥘉爲法以天寳末爲戒即社稷無疆之福也時皇甫鏄以謟刻欺蔽在相位故羣因奏以諷之上服方士栁泌金丹藥起居舎人裴隣上表切諌以金石含酷烈之性加燒錬則火毒難制若金丹巳成且令方士自服一年觀其効用則進御可也上怒貶隣爲江陵令十五年春正月甲戍朔上以餌金丹小不豫罷元㑹庚子夕上崩于大明宫之中和殿享年四十三謚曰聖神章武孝皇帝廟號憲宗葬于景陵穆宗文惠皇帝唐書曰穆宗文惠皇帝諱恒憲宗第三子也母曰懿安皇后郭氏貞元十一年七月生於大明宫之別殿𥘉名宥封建安郡王元和七年十月冊爲皇太子改今諱十五年正月憲宗崩閏月景午即皇帝位於太極殿東序戊申上見羣臣於紫宸門外辛亥以蕭俛叚文昌爲中書侍郎同平章事上始御延英對宰臣二月丁丑御丹鳯樓大赦天下壬寅勑舉賢良方正直言極諌科目人冝令中書門下尚書省四品巳上於尚書省同試三月壬子召侍講學士韋處厚路隨於太液亭講毛詩關睢尚書洪範等篇旣罷並賜緋九月辛丑大合樂於魚藻宫觀競渡又召李光愬李光顔入朝欲於重陽日宴群臣拾遺李班等上䟽諫云元朔未改園陵尚新雖易月之期俯從人欲而三年之制猶服心䘮夫遏宻施禁蓋爲齊人合樂内庭事將未可不聽十月鎮州王承元以所部四命請命以魏博節度等使田弘正爲鎮州節度使以承元爲滑州節度使長慶元年正月巳亥朔上親薦獻太清宫太廟是日法駕赴南郊日抱珥宰臣賀於前辛丑祀昊天上帝於圎丘即日還宫御丹鳯樓大赦天下改元長慶内外文武及致仕官三品巳上賜爵一級二月景子上觀雜伎樂於麟德殿歡甚謂給事中丁公著曰比聞外間公卿士庻時爲歡宴蓋時和民安甚慰予心公著對曰誠有此事然臣之愚見風俗如此亦不足嘉百司庻務漸恐勞煩聖慮上曰何至於是對曰夫賔宴之禮務逹誠敬不繼以滛故詩人美樂且有儀璘異屢舞前代名士良辰宴聚或清談賦詩投壷雅歌雖以盃酌獻酬不至於亂國家自天寳已後風俗奢靡宴席以諠譁沉湎爲樂而居重位秉大權者優雜倨肆於公吏之間曽無愧恥公私相効漸以成俗由是物務多廢獨聖心求理安得不勞宸慮乎陛下冝頒訓令禁其過差則天下幸甚時上荒于酒樂公著因對諷之頗深嘉納三月幽州劉緫請分割地土入朝公卿皆疑獨上推誠納之以宣武節度使張弘靖爲幽州節度使以緫爲鄆州節度使秋七月壬子羣臣上尊號曰文武孝德皇帝上受冊於宣政殿禮畢御丹鳯樓大赦天下甲寅幽州監軍使奏軍亂囚節度使張弘靖於别館害判官韋雍張宗元崔仲卿鄭塤軍人取朱滔子洄爲留後洄自以年老令軍人立其子克融爲留後八月己巳鎮州監軍宋惟澄奏軍亂節度使田弘正并家屬將佐三百餘口並遇害軍人推衙將王庭湊爲留後二年二月甲子詔雪王庭湊仍授鎮州大都督府長史充成德軍節度等使三軍將士待之如𥘉仍令韓愈往彼宣諭十月詔江淮諸州旱損田苗頗多所在米價不免踴貴眷言疲瘵湏議優矜冝委淮南浙東浙西宣歙江西福建等道觀察使各於當道有水旱處取常平義倉斛斗據時估减半價出糶以惠貧民十一月庚午命景王率禁軍五百騎侍從皇太后幸華清宫又幸石甕寺癸酉上幸華清宫迎太后廵狩于驪山下即日馳還太后翌日方還庚辰上與内官擊鞠禁中有内官歘然墜馬如物所擊上恐罷鞠升殿遽足不能履地風眩就牀自是外不聞上起居者三日十二月丁亥詔五坊鷹隼並解放獵具並毀之庚寅宰臣李逢吉率百僚至延英門請見上不許中外失色與裴度等三上䟽請立皇太子辛夘上於紫宸殿見百官李逢吉奏景王成長請立爲皇太子左僕射裴度又極言之癸巳詔立景王爲皇太子景午上御宣政殿冊皇太子受冊畢百寮謁太子於東宫三年正月丁巳上以疾苦不受朝賀是日大風昏翳竟日四年正月辛亥上御正殿受朝如常儀上餌金石之藥處士張皐上䟽切諌上恱召之求皐不獲辛未上大漸詔皇太子監國事壬申上崩於寢殿時年三十謚曰睿聖文惠孝皇帝廟號穆宗葬于光陵敬宗昭愍皇帝唐書曰敬宗昭愍皇帝諱湛穆宗長子母曰恭僖太后王氏元和四年六月七日生於東内之别殿長慶元年封景王二年立爲皇太子四年正月穆宗崩皇太子即位時年十六二月辛巳朔上縗服見羣臣於紫宸門外癸未貶户部侍郎李紳爲端州司馬辛夘勑没掖庭宫人先配内園宫人並冝放出任其所適巳亥冊大行皇帝皇太后爲太皇太后三月上御丹鳯樓大赦天下天下常貢之外不得進獻六宅十宅諸王女冝令每年於選人中選擇降嫁甲寅始於延英對宰臣甲子故山南東道節度使牛元翼家屬悉爲王庭湊所害上惜其冤横傷悼乆之仍歎宰執非才縱姦臣跋扈翰林學士韋處厚奏曰理亂之本非有他術順人則理違人則亂陛下當食歎息恨無蕭曹今有一裴度尚不能用此馮唐所以感悟漢文雖有頗牧不能用也戊辰羣臣入閤日髙猶未坐有不任立而踣者諌議大夫李渤出次白宰相俄而始坐班退左拾遺劉棲楚極諌頭叩龍墀血流上爲之動容景申賊張韶等百餘人至右銀臺門殺閽者揮兵大呼進至清思殿登御榻而食攻弓箭庫右神䇿軍兵馬使康藝全率兵入宫討平之是日上聞變急幸左軍丁酉上還宫羣臣稱慶諌議大夫李渤以上輕易致盗言甚激切五月制以吏部侍郎李程户部侍郎竇易直並同中書門下平章事十二月廻鶻吐蕃奚契丹遣使朝貢寳暦元年春正月辛亥親祀昊天上帝于南郊禮畢御丹鳯樓大赦改元二月桂管防禦觀察使李德𥙿獻丹扆箴六首上深嘉之命學士韋處厚優其荅詔四月羣臣上微號曰文武大聖廣孝皇帝御宣政殿授冊禮畢御丹鳯樓大赦天下七月甲申拾遺李漢舒元褒薛廷老於閤内論曰近日除授往往不申中書進擬多是内中宣出臣恐紀綱寖壞姧邪恣行伏希詳察上然之詔度支進銅三千斤金薄十萬飜修清思院新殿及昇陽殿圖障二年五月幽州軍亂殺其帥朱克融及男延齡軍人立其第二子延嗣爲留後辛巳神䇿軍苑内古長安城中修漢未央宫掘池獲白玉牀長六尺六月減放苑内役二千五百人帝性好土木自春至冬興作相繼庚申鄆州進驢打毬人石定寛等四人辛酉幸凝碧池令兵士千餘人於池中取大魚送入新池癸亥以旱命京城諸司䟽理繫囚帝好深夜自捕狐狸宫中謂之打夜狐十二月辛丑帝夜獵還宫與中官劉克明田務澄許文端打毬軍將蘇佐明王嘉憲石定寛等飲酒帝方酣入室更衣殿上燭忽滅劉克明等同謀害帝即時殂於室内時年十八謚曰睿武昭愍孝皇帝廟號敬宗葬莊陵太平御覽卷第一百一十四
