front:
  text: 太平御覽卷第七百一十八服用部二十
  hash: sha256:c663874cac5a2631b407d6060072956e3b4a03928049271903ac43a95bc51230
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_718-1a}
body:
  text: 笄釵鑷釵類璫珥釧跳脫附指環笄釋名曰笄係也所以拘冠使不墜也三禮圖曰笄簮也士以骨大夫以象詩曰君子偕老副笄六珈副后夫人之首飾編髮爲之珈笄飾之最盛者白虎通曰男子㓜娶必冠女子㓜嫁必笄禮曰女子許嫁笄而字國語曰司馬子期欲以妾爲子内子卿之嫡妻訪於左史倚相曰吾有妾而愿欲笄之倚相止之又曰范文子暮退於朝武子曰何暮也對曰有秦客瘦辭於朝痩隱也大夫莫之能對也吾知三焉解其三事武子怒曰大夫非不能也讓父兄也尓童子而三掩人於朝吾不在晉國亡無日矣擊之以杖折其委笄春秋後語曰趙襄子之姉爲代王夫人襄子併代殺王平其地其姉聞之泣而呼天磨笄自殺代人憐之名其地爲磨笄山齊淳于髠十酒說曰羅𥜗排門翠笄窺牖釵釋名曰釵枝形也因名之也爵釵者釵頭施爵曹植羙女篇曰頭挿金爵釵續漢書曰靈帝時江夏黄氏母浴而化爲黿入于深淵其後人時見出浴簮一銀釵猶在其首又輿服志曰貴人助蠶瑇瑁釵江表傳曰魏文帝遣使於呉求玳瑁三點釵群臣以爲非禮咸人不與孫權勑付使者晉記云王逹妻衛氏太安中爲鮮卑所掠路由章武臺留書并釵釧訪其家晉令曰六品下得服金釵以蔽髻又曰女奴不得服銀釵晉山陵故事曰后服有瑇瑁釵三十隻沈約宋書曰㤗始三年以皇后巳下六宫金釵千枚班賜北征將士列女傳曰梁鴻妻孟光荆釵布裙洞冥記曰元鼎元年起招靈閣有神女留一玉釵與帝帝以賜趙婕妤至昭帝元鳯中宫人猶見此釵共謀欲碎之明旦視之匣唯見白鷰直升天去故宫人作玉釵因改名玉鷰釵言其吉祥拾遺録曰漢獻帝爲李􅔸所敗帝傷指伏后以繡紱拭血刮玉釵以拂於創應手則愈又曰魏文帝納美女薛靈芸有獻火珠龍鸞釵帝曰珠翠尚不能勝况龍鸞之重乎又曰魏明帝時昆明國貢嗽金鳥鳥常吐金屑如粟用飾釵珮謂之辟寒金宫人相嘲曰不服辟寒金那得帝王心又曰石季倫愛婢翔風別玉聲金色爲倒龍之佩瑩金爲鳯冠之釵言刻玉如倒龍之勢鑄金象鳯皇之狀結䄂繞楹舞於晝夜使聲聲相接謂之恒舞欲有所召者不呼姓名悉聽珮聲視釵色玉輕聲者居前金色艶者居後以爲行次而進也華陽國志曰涪陽大龜其甲可卜其縁可作釵丗號靈釵裴淵廣州記曰豪富女子以金銀爲大釵執以叩銅皷號爲銅鼓釵崔豹古今注曰蟠龍釵梁兾婦所制異苑曰呉郡有徐君廟東陽長山縣吏李瑫義熈中遭事在都婦過廟乞恩拔銀釵爲願未至冨陽有白魚跳婦前剖腹得所願釵夫事㝷解幽明録曰尋陽叅軍夢一婦人前跪自稱先葬近水淪没誠能見救雖不能冨貴可令君薄免禍叅軍荅曰何以爲誌婦人曰君見渚邊上有魚釵即我也叅軍明旦覔果見一毀墳其上有釵移置髙燥處却十餘日叅軍行至東橋牛奔直趣水垂墮忽轉正得無恙也録異傳曰呉人費季客賈去家與諸賈人語曰吾臨行就婦求金釵婦與之吾乃置户楣上忘白婦說妻夢見季死前金釵在户上妻取得發哀一年季却還神仙占曰頭上着釵夜卧墮靴履中者婦人與外夫殺之司馬相如羙人賦曰玉釵掛臣冠羅䄂拂臣衣黄香九宫賦曰剥駭雞以爲釵駭雞犀也古歌辭曰頭上金釵十二行足下絲履五文章陳司馬美女篇曰頭戴金雀釵腰珮翠琅玕崔瑗三子釵銘曰元正上日百福孔靈鬢髮如雲乃象衆星三珠横釵攝㜎讃靈魏陳思王羙女篇曰頭戴合歡釵梁陽濟泄井得金釵詩曰昔日倡家女摘華露井邊摘華還自比挿映還自憐窺窺終不巳笑笑自成妍寳釵於此落從來非一年翠羽成泥去金色尚如先此人今不在此物今空傳秦嘉與婦淑書曰今致寳釵一雙價直千金可以耀首淑荅曰未奉光儀則寳釵不設靈恠曰呉興妖童贈謝府君詩曰玉釵空中墜金鈿色巳歇獨泣謝春風良夜辜明月鑷釵類齊書曰文安王后爲皇太子妃無寵太子爲宫人製新麗衣裳及首飾而后牀惟陳故古舊釵鑷數枚又曰周盤龍爲右將軍建元元年魏攻壽春以盤龍爲軍主假節助豫州刺史桓崇祖拒魏大破之上聞之喜下詔美稱送金釵鑷二十枚與其愛妾杜氏王仲宣七釋曰載明中之羽雀雜華鑷之威㽔孔偉七别曰長䄂隨腕而遺耀紫鑷承鬢而騁輝璫珥說文曰珥瑱也瑱以玉充耳也釋名曰瑱鎭也懸璫耳旁不欲使人妄聽自鎮重也此本出於蠻夷蠻夷婦女輕浮好走以此璫錘之也今中國倣之也風俗通曰耳珠曰璫周書曰武王馳紂啇師大崩帝辛登禀臺取天知王珥及鹿玉衣身以自焚鹿玉則銷天知珥在火中不銷詩曰玉之瑱也象之揥也瑱塞耳也又曰有匪君子充耳琇瑩琇瑩美玉傳曰夏齊侯將納公魯昭公也命無受魯貨申豊從女買以幣錦二两縛一如瑱瑱充耳也縛卷也急卷使如充耳易懷藏史記曰淳于髠謂齊威王曰前有墮珥後有遺簮此可飲八斗又曰武帝譴責鈎弋夫人夫人脫簮珥叩頭魏書曰卞太后性約儉不尚華麗無文繡珠玉器皆黒􅃮太祖嘗得名璫數具命后自選一具后取其中者太祖問其故對曰取其上者爲貪取其下者爲詐故取其中者耳呉録曰袁博出遊其女筞得壊墟齊璫珥百枚於是封上之詔以賜博也晉令曰士卒百工不得服真珠璫又諸葛恪別傳曰范慎不馬耳璫恪荅曰母之於女天下至親穿耳附珠何傷於仁戰國䇿曰齊王夫人有七羙珥韓子曰齊威王夫人死有十孑焉正子所窺者凢十人薛公欲知所立人爲十王珥而羙其一獻於王以付十孑焉正子明曰視羙珥所在乃立之西京雜記曰趙飛鷰爲皇后其女弟上遺合浦圎珠珥夢書曰珠珥爲人子之所貴夢得珠珥得子也魏陳思王洛神賦曰不江南之明璫劉禎魯都賦曰含丹吮素巧笑妍詳挿曜日之笄珥明月之璫繁欽定情詩曰何以致區區耳中雙明珠王粲七釋曰􆄬照夜之明璫煥煜㷍以垂暉傳玄七謀曰佩崑山之羙玉珥南海之明璫釧跳脫附通文俗曰環臂謂之釧東宫舊事曰皇太子納妃有金釧二雙祖台之志怪曰建安中河間太守劉照夫人卒於府後太守至夢見一好婦人就爲室家持一雙金鏆古喚切與太守不能名婦人乃曰此錗竹志切鏆錗鏆者其狀如紐珠大如指屈伸在人太守得置枕中前太守迎䘮言有錗鏆開棺視夫人臂果無復有錗鏆焉甄異記曰樂安章沉病死未殯而蘇云𬒳録到天曹主者是其外兄斷理得免見一女同時𬒳録乃說金釧二雙記沉以與主者亦得還遂共讌接女云家在呉姓徐名秋英沉後尋問遂得之女父母因以女妻沉髙文惠與婦書曰今致金鏆一雙交州記曰波斯王以金釧聘斯調王女也唐書曰交河王麹崇𥙿兄昭少好學嘗有鬻異事書於市者其母將爲買之搜索家財不足其價唯篋中有金釧數枚旣而歎曰何愛此物令吾子不有異聞乎促令貨易此書昭後歷位司膳卿頗以詩詠流譽繁欽定情詩曰何以致契闊繞臂金跳脫指環春秋繁露曰紂刑鬼侯之女取其環五經要義曰古者后妃群妾禮御於君所女史書曰授其環以進退之有娠則以金環退之當御者以銀環進之進者着於左手陽也以當就男故着左手右手隂也旣御而復故此女吏之職漢書儀曰宫人御幸賜銀環後漢書曰孫程等十九人立順帝有功各賜金指釧環晉書曰羊祐年五歳令乳母取所弄玉環乳母曰汝先無此物祐乃於隣人李氏東墻桑樹中探得之李氏見驚曰余亡兒所失物也乳母具言前事李氏悲惋時人異之李氏之子即羊祐前身也又曰傅暢年五歳父友見而戲解暢衣取其金環與左右暢不惜以此賞之後選入侍講東宫宋書曰西南夷元嘉七年遣使獻金剛指環梁書曰武丁貴嬪武帝鎮樊城嘗登樓以望見漢濵五彩如龍丁有女子臂繞紌則貴嬪也帝贈以金環納之時年十四後魏書曰咸陽王禧弟樹字秀和位宗正卿後奔梁武帝尤器之後復歸魏𥘉辭梁其愛妹玉兒以金指環與樹常着之寄以還梁表必還之意朝廷知之俄而賜死拾遺録曰呉王潘夫人以火齊指環桂石榴枝上因其處臺名曰環榴臺時有諫者云今呉蜀争雄還劉之名將爲妖乎權乃翻其名爲榴還臺也西京雜記曰戚姬以百鍊金爲彄照見指上骨惡之以賜侍兒益部耆舊傳曰劉寵䘮母時危亂墳墓發傷寵乃矯母令家貧無財唯有手上金環賣造墓供送免發掘西戎傳曰大宛國人深目多鬢娶婦人以金同心指環爲聘外國雜俗曰諸問婦許婚下全同心指環保同志不改林道記曰林邑王獻金指環於呉主胡俗傳曰始結婚姻相然許便下金同心指環扶南傳曰扶南有訟者煑水令沸以金指環投湯中然後以手探湯其直者手不爛有罪者入湯即燋茅君傳曰勾曲山上有神芝五種求之法當以三月登山賫金環二雙啓以奉誓如此者三以爲盟也必得芝草投環於石間忘頋念集靈記曰王諿琅耶人也仕梁爲南康王記室亡後數年妻子困於衣食歳暮諿見形謂婦曰卿困乏衣食妻因與之酒别而去諿曰我若得財物當以相寄後月小女探得金指環一隻甄異傳曰沛郡秦拊義熈中至曲阿村日暮失路逺見火光投之屋有少女因寄宿曉臨别女以指環與拊拊去廻頋乃是冢焉太平御覽卷第七百一十八
