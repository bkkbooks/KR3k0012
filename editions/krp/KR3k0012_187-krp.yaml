front:
  text: 太平御覽卷第一百八十七
  hash: sha256:2b547bc30781d2589e83b8a91812d2f7dceee0b6666249257713dfcf8d4bd6e0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_187-1a}
body:
  text: 居處部十五牆壁柱梁棟牆壁說文曰垣蔽曰牆又曰壁垣也爾雅曰牆謂之墉廣雅曰墉垣牆也釋名曰墉容也所以蔽隠於形容也壁辟也所以辟斷風寒也牆障也所以自障蔽也垣援也人所阻以爲援衛也易曰公用射隼於高墉之上獲之無不利書曰旣勤垣墉惟其塗蔇茨尚書大傳云賁墉諸侯䟽杼注曰賁大也言大牆正道直也䟽衰也杼亦牆也亦衰殺其上不得正直詩曰百堵皆作又曰築室百堵又曰誰謂鼠無牙何以穿我墉又曰乗彼垝垣以望復關又曰牆有茨篇名衛人刺上也公子頑通于君母而不可道也牆有茨不可掃也箋牆所以防非常也又曰君子無易由言耳屬于垣由用也人將聽之又曰將仲子兮無踰我牆又曰兄弟䦧于牆外禦其務務侮又曰徹我牆屋田卒汗萊毁牆屋不得農也書序秦始皇滅先代典籍焚書坑儒天下學士逃難解散我先人用藏其家書于屋壁至魯恭王時好治宮室壞孔子舊宅以廣其居於壁中得先人所藏古文虞夏啇周之書及傳論語孝經皆科斗文字又曰峻宇雕牆禮曰七月坯牆垣六月小暑後五日蟋蟀居壁周禮曰牆厚三尺崇之注云髙卑爲率足以相爲勝也左傳叔孫曰人之有牆以蔽惡也牆之郤壞誰之咎也注咎在牆也又曰巢牛隠於短垣以射呉子諸樊又曰寺人披伐蒲重耳踰垣而走披斬其祛又曰晉靈公不君厚歛以雕牆論語叔孫武叔謂子貢曰仲尼豈賢於子乎對曰譬之宫牆賜之牆及肩窺見室家之好夫子之牆數仞不得其門而入不見宗廟之羙又曰糞土之牆不可杇也又曰其猶正牆面而立也歟史記曰孝景帝即位晁錯爲内史貴幸用事門東岀不便乃穿一門出太廟煗垣丞相申屠嘉聞之奏請誅錯上愛之曰錯所穿非眞廟垣乃外煗且又我使爲之錯謝而出嘉曰吾悔不先斬錯又曰司馬相如家成都貧家徒四壁立漢書曰貫髙等欲害髙祖置人於複壁中後漢書曰逢萌與同郡徐房平原李子雲王君公相友善並暁逹隂陽懐徳穢行房與子雲養徒各千人君公遭亂獨不去儈牛自隠儈謂平會兩家買賣之事時人語曰避世牆東王君公又曰史叔賔者陳留人也少有盛名郭林宗見而告人曰牆髙基下雖得必失後果以論議阿枉毀名云又曰崔晏仕䆠歴位邊郡而愈貧薄家徒四壁卒無以殯歛光禄勲楊賜太僕袁逢少府叚熲爲備棺椁葬具大將軍袁隗樹碑頌又曰杜安字伯夷少有志節年十三入太學號竒童京師貴戚慕其名或遺之書安不發悉壁藏之及後捕案貴戚賔客安開壁岀書印封如故竟不罹患時人貴之位至巴郡太守呉志曰吕蒙病孫權時在江安迎置内廐治護萬方欲數見顔色又恐勞動常穿壁曕之見其少食則喜不能則咄唶也晉書外國傳大秦國以琉璃爲牆壁齊書曰劉璡字子璥方䡄正直兄瓛夜隔壁呼璡出不荅方下牀着衣立行及簾外然後應瓛問其故璡曰向束帶未竟又曰徐孝嗣𥘉在率府晝卧齋北壁下夢兩童子遽云移公牀孝嗣驚起行數歩而壁崩莊子曰正考父一命而傴再命而僂三命而俯循牆而走孰敢不䡄言人不敢以不軌之事侮之家語曰孔子觀乎明堂覩四門之墉有堯舜桀紂之象各有善惡之狀興廢之誡焉衡山記曰甘泉宫有石壁焉禹所刻文在此洞冥記曰元狩三年帝復起陵霞觀去地九十丈累白玉爲壁以八分篆寫羲皇以來迄周成王封禪之事所謂事登壁間蓋帝王之夲績也孟子知命者不立乎巖牆之下恐頽也淮南子曰舜作宫築牆始也漢官儀曰省中皆胡粉塗壁畫古烈士新序曰諸侯牆有黒堊之色無丹青之彩神仙傳白和事王君王君語曰我暫徃瀛州汝於正北石室熟視北壁當見文字讀之得道矣三年方見壁上有古人所刻太清經讀之得仙魏略曰趙岐避難青州市孫嵩知𡵨避事置𡵨於複壁中西京雜記云匡衡鑿隣家壁偷光讀書宋玉賦云東家羙女登牆窺玉三年玉猶未許焦贛易林曰千仞之牆禍不入門孟奥北征記曰鄴城避雷室西南石溝北有華林牆牆髙九丈方圎一里也柱廣雅曰楹謂之柱釋名曰柱住也楹亭也亭亭然孤立也周書曰文王在鎬召太子發曰吾栝柱而茅茨爲民愛費也左傳曰叔孫豹指楹曰雖惡是其可去乎又曰丹桓宫楹榖梁傳曰丹桓宫楹禮天子丹諸侯􅉳大夫蒼士黈大戴禮曰周時徳澤和洽蒿茂以爲宫柱名曰蒿宮漢書郊祀志曰武帝鑄栢梁銅柱又曰成帝立趙皇后劉輔諌曰朽木不可爲柱卑人不可爲主范曄後漢書曰李膺拜司隷校尉時張讓弟爲野王令貪殘無道至乃殺孕婦聞膺厲威嚴懼罪逃還京師因匿兄讓弟舎柱中膺知其狀率將吏徃破柱付洛陽獄受辭畢即殺之魏略曰大秦國以水精爲室柱呉志曰孫堅爲董卓所攻堅與數十騎馳圍而出竪常著赤罽幘令親近將祖茂著之卓騎爭逐茂急見一柱在草中因脫幘著柱上卓騎望見圍繞數重後覺是柱乃去晉書曰石季龍掘秦始皇冡取其銅柱鑄以爲器又曰太始二年秋營太廟致荆山之材採華山之石鑄銅柱十二塗以黄金鏤以百物綴以明珠曹嘉之晉紀曰諸葛誕以氣勵稱常倚柱讀書雷震其柱誕讀書自若陳書曰𥘉梁侯景焚太極殿及景平至陳武帝議欲營之獨闕一柱至是有樟木大十八圍長四丈五尺流泊後渚因得用之漢武内傳曰上起神屋鑄銅爲柱金塗大五圍帝王丗紀曰桀作金柱三千列女傳曰紂作銅柱以炭火然之有罪者令抱其柱輒墮炭中妲巳觀以爲笑漢官典職曰徳陽殿柱皆金刻鏤作竒禽萬巧間以丹青翡翆竟柱構以水精一柱三帶韜以赤緹應劭漢官曰開陽門始成未有名夜有一柱飛來樓上後琅邪開陽縣上言南門一柱飛去光武使視因刻記其年月以名門焉神異經曰崑崙山有銅柱其髙入天所謂天柱也圍三千里周廻如削下有仙人府與天地同休息男女名曰玉人男即玉男女即玉女無爲配疋而仙道成也三輔决録曰長陵田鳯字季宗爲尚書郎儀皃端正入奏事靈帝目送之因題殿柱曰堂堂乎張京兆田郎伏滔北征記曰廣陵呉王濞所都脩大城得栢柱三皆栢心蓋呉王濞門柱也華延儁洛陽記曰太極殿有四金銅柱焦贑易林旅之咸曰金梁鐡柱又曰家人之升曰髙樓無柱顚僵不乆紂失人主身死牧竪盛弘之荆州記曰巴東城西有一栢柱孤殖大可數圍髙三丈餘相傳是公孫述時樓柱乃云斫之血岀枯而不朽歴代彌固將恐有物慿焉江陵記曰沔城内有赤湖客舎襄陽大道經城中過元嘉十一年連雨城南門沮壞得土中故柟柱長一丈七尺臨川康王取以爲大齋西北柱𥘉時色黒一季後不復黒計此千年列子曰共工觸不周山天柱折晏子春秋曰晏子將死鑿楹納書焉謂妻曰楹記日也子壯而示之燕丹曰荊軻以匕首擿决秦王入銅柱火出淮南子曰柱不可以刺齒蓬不可以持屋丗說曰陸抗𥘉拜司空有人往索酒便自起酌梁柱間祝曰當今乏才以尓爲柱石之任莫傾人棟梁陸笑曰感卿良箴楚辭天問曰八柱何當東南何虧傅玄正都賦曰錦牆雕柱劉良七舉曰緑柱朱榱青璅壁璫李尤楹銘曰幹強體正雖重不移上下相安髙而不危丗說夏侯玄讃曰玄甞倚柱作書霹靈其柱神色無變作書如故俞益期牋曰馬文淵昔立兩銅柱於林邑岸北有遺兵十餘家不反居寜夀靈岸南對銅柱悉姓爲馬自爲婚姻有二百户交州以流寓號曰馬流言語飲食尚與華夏同山川移易銅柱今没在海中正頼此民以識故處日南傳日三銅松也梁爾雅曰棄廇謂之梁郭璞注曰屋大梁呉越春秋曰夏禹廟以梅木爲梁焦貢易於旅之咸曰金梁鐵柱完全不腐漢官典職曰徳陽宮畫屋朱梁曹子建七啓曰彤軒紫柱文榱華梁古歌曰夲自南山松今爲宫殿梁西京賦曰絙雄虹之長梁司馬相如長門賦曰飾文杏以爲梁班固西郊賦曰固瑰材而究竒抗應龍之虹梁楚詞曰玄玉之梁曹植詩文榱華梁棟爾雅曰棟謂之桴郭璞注曰屋檼也廣雅曰檼棟也釋名曰穩稳也似桶也或謂之望髙可望也或謂之林棟中也屋脊曰甍甍蒙也在上覆蒙屋也易大過卦曰棟橈夲末弱也王弼注曰𥘉爲夲而上爲末左傳襄五年曰盧蒲癸刺慶舎王何解其肩猶援廟桶動於甍柱注曰屋棟又曰子産謂子皮曰子於鄭國棟也棟折榱崩僑將壓焉漢武帝故事上起神屋甍附作金鳯軒翥若飛口銜流蘇長十餘丈神仙傳曰左慈共曹公飲飲畢以柸擲屋棟懸着棟動揺似飛鳥淮南子曰郢人買屋棟而與之車轂跪而度之大雖可而長不足也桓子新論曰王公大人則嘉得良師明輔品庶凡民則樂畜仁賢哲士皆國之柱棟而人之羽翼楚辭九歌曰桂棟兮蘭橑新夷楣兮葯房郭璞游仙詩曰雲生梁棟間傅玄棟銘曰國有維輔屋有棟梁室之傾尚可柱也心之傾不可輔也太平御覽卷第一百八十七
