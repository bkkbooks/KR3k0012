front:
  text: 太平御覽卷第一百六十八州郡部十四
  hash: sha256:132a147ff83a41a34ed62e1db8aa30bad619d387714435aebd77d6fa9c91c2af
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_168-1a}
body:
  text: 山南道下梁洋商金房通渠渝涪朗灃巴壁蓬集唐鄧襄均隨梁州圖經曰梁州漢中郡春秋至戰國時楚地秦漢爲漢中郡蜀志曰劉備𥘉得漢中曰曹公雖來無能爲也漢書曰項羽立沛公爲漢王王巴蜀漢中四十一縣都南鄭沛公欲攻楚丞相蕭何諌曰雖王漢之惡不猶愈於死乎且語曰天漢其稱甚美願王漢中鎮撫其民收用巴蜀還定三秦天下可圖也洋州十道志曰洋州洋川郡春秋戰國時並爲楚地秦爲漢中郡地漢志曰成固屬漢中郡今洋源縣地是也又曰安陽屬漢中􅑄谷水所出今黄金縣地啇州十道志曰商州上洛郡禹貢梁州之域周爲豫州之境戰國時屬秦秦併天下爲内史地漢武置上雒縣於此史記張儀說楚懷王曰大王誠能絶約於齊臣請獻商於之地六百里楚於是與齊絶約使一將軍隨張儀至秦儀謂楚使者曰臣有奉邑六里願以獻大王左右楚使者曰臣受命於王以商於之地六百里不聞六里皇甫謐帝王丗紀曰四皓始皇時隱於商山作歌曰英英髙山深谷逶迤曄曄紫芝可以療飢唐虞時逺吾將何歸漢志曰商屬弘農郡秦相衛鞅邑也金州十道志曰金州安康郡禹貢梁州之域於周庸國之地楚之附庸後爲楚地秦爲漢中郡帝王丗紀曰安康謂之嬀墟或謂之姚墟後漢書鄭弘上書曰虞舜出於姚墟夏禹生於石紐頴容釋例曰舜居西域本曰嬀汭漢志曰西域屬漢中郡應劭曰嬀墟在西北舜之所居即今西城縣房州十道志曰房州房陵郡土地所屬與金州同古麋國也左傳曰楚子伐麋成大心敗麋師于防渚杜注防渚在麋地闞駰云防陵即春秋防渚也漢志曰防陵上庸屬漢中郡盛弘之荆州記曰竹山縣有白馬塞孟逹爲新城太守登白馬而歎曰劉封申躭據金城千里而不能守豈丈夫哉通州十道志曰通州通川郡土地所屬與金州同春秋戰國並屬巴子國秦併天下爲巴漢郡漢因之後漢志曰宣漢屬巴郡即漢宕渠地也巴漢記曰和帝分宕渠之東置也圖經曰西魏改爲通州以其居西逹之路故以爲名今爲逹州渠州十道志曰渠州潾山郡土地所屬與通州同漢志曰宕渠屬巴郡輿地志曰梁大通三年於此置渠州左思蜀都賦曰外負銅梁宕渠渝州十道志曰渝州南平郡古巴國也三巴記曰閬白二水東西流曲折三廻如巴字故謂之三巴山海經曰海内西南有巴國昔太皥生咸鳥咸鳥生乗釐乗釐生後昭是爲巴人郭璞曰爲巴始祖李膺益州記曰明月峽在巴縣東壁髙四十丈有圎孔形如滿月因以爲名又曰江津縣西有香草樓昔有仙人於此置樓居植香草於樓下一夕仙去後人指其地爲香草樓涪州十道志曰涪州涪陵郡禹貢梁州之域周爲雍州之地春秋時屬巴國秦爲巴郡漢爲涪陵縣巴漢志曰涪陵巴郡之南鄙本與楚前於之地接朗州十道志曰朗州武陵郡禹貢荆州之域春秋及戰國時屬楚秦爲黔中郡漢髙帝五年更名武陵郡梁湘東王於荆州割武陵郡置武州陳天嘉元年分武陵立沅陵郡隨文改武州爲辰州又改爲嵩州又改爲朗州史記曰秦惠王十四年求以武闕外就楚易黔中地武陵記曰後漢梁松自義陵移郡於若城今州東有張若城是晉書曰潘京武陵漢壽人也弱冠郡辟主簿太守趙廞甚器之嘗問之曰貴郡何以名武陵京曰鄙郡本名義陵在辰陽縣界與夷獠相接數爲所攻光武時移東山遂得全完共議易號傳曰止戈爲武詩稱髙平曰陵於是名焉武陵記曰武陵郡境四千餘里灃州十道志曰灃州灃陽郡春秋戰國時其地屬楚秦屬黔中郡漢改黔中爲武陵郡屬荆州今州即武陵郡之零陽縣地吴分武陵西界立天門郡此即郡之境晉爲南義陽郡隋平陳置松州㝷改爲灃州在灃水之北故取爲名尚書禹貢曰岷山導江東別爲沱又東至于灃豊水名輿地志曰晉末以義陽流人在南郡者立爲南義陽郡寄在荆州十道志曰慈利縣即漢零陽縣地圖經曰界内有零溪水即以爲名隋開皇十八年改零陽爲慈利縣王仲宣贈士孫文始詩曰悠悠澹灃澹灃二水在澧陽縣巴州十道志曰巴州土地所屬與通州同漢爲巴郡宕渠縣四夷縣道記曰李特孫壽時有羣獠十餘萬從南越入蜀漢間散居山谷因斯流布在此地後遂爲獠所據壁州十道志曰壁州始寜郡本漢宕渠縣地後漢分置宣漢縣梁分宣漢置始寜後魏分始寜置諾水縣蓬州十道志曰蓬州咸安郡本漢宕渠縣地周地圖記曰武帝天和四年割巴州之伏虞郡隆州之隆城郡於此置蓬州集州十道志曰集州符陽郡本漢宕渠縣地晉惠帝永寧中李特王蜀其地屬焉梁武改爲東巴州後改爲集州以東北有集水因以爲名又云以萬山所集故也唐州十道志曰唐州淮安縣禹貢豫州之域春秋楚地戰國時屬晉後入韓秦置三十六郡爲南陽郡漢志曰南陽郡有比陽縣比水所出東入蔡左傳僖四年齊師伐楚楚子使屈完如師齊侯陳諸侯之師與屈完乗而觀之齊侯曰以此衆戰誰能禦之以此攻城何城不克對曰君若以德綏諸侯誰敢不服君若以力楚國方城以爲城漢水以爲池雖君之衆無所用之晉太康地記曰自華至沘陽南北連百里號爲方城亦曰長城周地圖記曰湖陽縣光武所封外祖樊重邑又光武封姊爲湖陽公主漢志曰湖陽古廖國也廖音力救反鄧州十道志曰鄧州南陽縣禹貢豫州之域戰國屬韓秦置三十六郡南陽其一也釋名曰在中國之南而居陽地故以爲名漢志曰南陽郡領宛犫等三十六縣秦置莽曰荷墜屬荆州又曰鄧屬南陽故國都尉治應劭曰鄧侯國也史記蘇秦說韓惠王曰韓西有冝陽東有穣淯後漢書曰時天下墾田多不以實詔下郡國撿覆其事時諸郡各遣使奏事帝見陳留吏牘上有書視之云潁州弘農可問河南南陽不可問帝詰吏不肯服時顯宗爲東海公言曰河南帝城多近臣南陽帝郷多近親田宅踰制不可爲凖史記曰秦滅韓徙天下不軓之人於南陽故其俗夸奢尚氣力好商賈漁獵藏匿難制宛西通武關東受淮海都㑹也圖經曰菊潭以界内菊潭水以名縣盛弘之荆州記曰菊水其源傍有芳菊浸潤流其滋液水極芳馨飲之者皆壽考後魏略曰孝文帝南廵至新野臨潭水而見菖蒲花乃歌曰兩菖蒲新野樂遂建兩菖蒲寺以美之楚地記曰漢江之北爲南陽漢江之南爲南郡襄州十道志曰襄州襄陽郡禹貢豫州之南境春秋以來楚地秦南郡之北界二難爲南陽郡獻帝時魏武始置襄陽郡襄陽記曰襄陽本楚之下邑檀溪帶其西峴山亘其南亦楚國之北津也荆州圖副曰建安十三年魏武平荆州始置襄陽郡以地在襄山之陽爲名楚地記曰蜀關羽攻没于禁等七軍兵勢甚盛獨襄陽徐晃屯守不下曹公謂晃曰全襄陽者徐公之功也後吴大帝率兵向西時曹仁鎮之司馬宣王言於魏文曰襄陽水陸之衡禦㓂要地不可失也南雍州記曰永嘉之亂三輔豪族流於樊沔僑於漢側立雍州因人所思以安百姓也宋文帝因之置南雍州焉晉書曰山簡字季倫嘗鎮襄陽郡中有髙陽池毎臨池未嘗不大醉而還人歌之曰山公何所詣徃至髙陽池日暮倒載歸酩酊無所知時時能騎馬倒着白接蘺舉鞭問葛強何如并州兒盛弘之荆州記曰襄陽郡峴首山南至冝城百餘里其間彫牆峻宇閭閻填列漢宣帝末其中有卿士刺史二千石數十家珠軒駢輝華盖連延掩映於太山廟下荆州刺史行部見之雅歎其盛勑號太上廟道爲冠盖里漢志曰筑陽屬南陽郡故榖國今榖城縣也莽曰冝禾應劭曰筑水出漢中房陵東入沔筑音逐圖經曰榖城縣有鄼城漢志曰即蕭何出所封也音讃均州十道志曰均州武當郡禹貢豫州之域春秋時楚地秦置南陽郡漢志曰武當屬南陽郡十道志曰鄖郷古麇國也左傳曰楚潘崇伐麇至于錫穴又地形志曰漢中郡之東界有錫縣即古之錫穴也隨州十道志曰隨州漢東郡春秋隨侯之國秦及兩漢屬南陽郡左傳曰楚武王侵隨鬪伯比言於楚子曰漢東之國隨爲大漢志曰隨屬南陽郡故厲國也左氏傳曰楚伐徐齊師伐厲以救之厲音頼又曰春陵屬南陽郡侯國故蔡陽之白水郷上唐卿漢文帝元朔五年以零陵道之春陵郷封長沙王子買爲春
