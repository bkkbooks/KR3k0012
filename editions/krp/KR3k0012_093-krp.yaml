body:
  text: 魏太祖武皇帝文皇帝魏太祖武皇帝魏志曰太祖武皇帝沛國譙人姓曹名操字孟德漢相國叅之後曹瞞傳曰太祖一名吉利字阿瞞也祖騰漢桓帝時爲中當侍大長秋封費亭侯養子嵩嗣官至太尉莫能審其生出本末曹瞞傳及郭頒丗語並云嵩夏侯氏子夏侯惇之叔父太祖於惇爲從父兄弟也嵩生太祖太祖少機警有權數而任俠放蕩不治行業故丗人未之竒也唯梁國橋玄南陽何顒異焉玄謂太祖曰天下將亂非命世之才不能濟也能安之者其在君乎年二十舉孝廉爲郎除洛陽北部尉遷頓丘令徴拜議郎光和末黄巾起拜騎都尉討潁川賊遷爲濟南相國有十餘縣長吏多阿附貴戚贓汙狼籍於是奏免其八九禁斷淫祀姦宄逃竄郡界整肅乆之徴還爲東郡太守不就稱疾歸郷里𥘉平元年春正月後將軍袁術兾州牧韓馥兖州刺史劉岱㴾海太守袁紹濟北相鮑信等同時俱起衆各數萬推紹爲盟主太祖行奮武將軍董卓聞兵起乃徙天子都長安卓留屯洛陽遂焚宫室是時卓兵强紹等莫敢先進太祖曰舉義兵以誅暴亂大衆巳合諸君何疑向使卓聞山東兵起倚王室之重據二周之險東向以臨天下雖以無道行之猶足爲患今焚燒宫室刧遷天子海内震動不知所歸此天亡之時也一戰而天下定矣不可失也遂引兵西據成臯到滎陽汴水遇卓將徐榮與戰不利士卒死傷甚多太祖爲流矢所中乗馬𬒳瘡從弟洪以馬與太祖得去太徂兵少乃與夏侯惇等詣楊州募兵司徒王允與吕布共殺卓青州黄巾衆百餘萬人兖州劉岱欲擊之鮑信諫岱不從遂與戰果爲賊所殺信乃迎太祖領兖州牧遂進兵擊黄巾追至濟北乞降各受降卒三十餘萬男女百餘萬口収其精銳者號青州兵天子拜太祖兖州牧是歳長安亂天子東遷敗於曹陽渡河幸安邑太祖軍臨武迎天子假太祖節鉞録尚書事獻帝記曰又領司隷校尉洛陽殘破董昭等勸太祖都許車駕出轘轅而東以太祖爲大將軍封武平侯自天子西遷朝廷離亂至是宗廟社稷制度始立時以袁紹爲太尉紹恥班在公下不肯受公乃固辭以大將軍讓紹天子拜公司空行車騎將軍公圍張繡於穰劉袁遣兵救繡以絶軍後公將引還繡兵來追公軍不得進連營稍前公與荀彧書曰賊來追吾雖日行數里吾䇿之到安衆破繡必矣到安衆繡與表兵合守險公軍前後受敵公乃夜鑿險爲地道悉過輜重設竒兵㑹明賊謂公爲遁也悉軍來追乃縱竒兵岀夾攻大破之公還許荀彧問公前何以䇿賊必破公曰虜遏吾歸師而與吾死地戰吾以是知勝矣袁紹旣并公孫瓉兼四州之地衆十餘萬諸將以爲不可敵公曰吾知紹之爲人志大而智小色厲而膽薄忌刻而少威兵多而分畫不明將驕而政令不一土地雖廣粮食雖豐適所以爲吾奉也張繡率衆降公軍官渡劉備殺徐州刺史曹胄舉兵屯沛五年公自征備諸將曰與公爭天下者袁紹也今棄之東若何公曰劉備人傑也今不擊必爲後患袁紹雖有大志而見事遟必不動也遂破備備奔紹紹遣郭圎淳于瓊顔良等攻劉延於白馬紹引兵至黎陽公於是救延荀攸說公曰今兵少不敵分其勢乃可公從之遂擊破斬良紹騎將文醜與劉備將五六千騎前後至公縱竒兵擊大破之斬醜良醜良皆紹名將再戰悉擒紹軍大震八月紹連營稍前進臨官渡起土山地道公亦於内作之以相應紹射營中矢如雨下行者皆蒙楯衆大懼時公粮少與荀或書議欲還許或以爲紹悉衆臨官渡欲與公决勝敗公以至弱當至強若不能制必爲所乗是天之大機也公與紹相距連月雖比戰斬將然衆少粮盡士卒疲乏公謂運者曰十五日爲汝破紹不復勞汝矣冬十月紹遣車運榖使淳于瓊等五人將兵萬餘人逆之宿紹軍營北四十里紹謀臣許攸貪財紹不能足來奔因說公擊瓊等左右疑之荀攸賈詡勸公公乃留曹洪守自將歩騎五千人夜徃㑹明至瓊等望見公兵少出陣門外公急擊之瓊退保營遂攻之紹遣騎救瓊左右或言賊稍近請分兵距之公怒曰賊在背後乃白士卒皆殊死戰大破瓊等皆斬之紹𥘉聞公擊瓊謂長子譚曰就彼破瓊等吾攻抜其營彼固無所歸矣乃使張郃髙覽攻曹洪郃等聞瓊破遂來降紹衆大潰紹及譚棄軍走渡河追之不及盡収其輜重圖書珍寳虜其衆公収紹書中得許下及軍中人書皆焚之紹自軍破後發病歐血死小子尚代譚自號車騎將軍屯黎陽秋公征之連戰譚尚數敗退固守攻其郭乃出戰擊大破之譚尚夜遁譚尚争兾州譚爲尚所敗走保平原尚攻之急譚遣辛毗乞降請救諸將皆疑荀攸勸公許之公乃引軍到黎陽爲子整與譚結婚尚聞公北乃釋平原還鄴公進軍攻鄴尚懼乞降公不許爲圍益急尚夜遁衆大潰尚走中山盡獲其輜重得尚印綬節鉞鄴定公臨祠紹墓哭之流涕慰勞紹妻還其家人寳物賜之雜繒絮廪食之天子以公領兾州牧公讓還兖州公之圍鄴也譚略取甘陵安平渤海河間尚敗還中山譚攻之尚奔固安遂并其衆公遺譚書責以負約與之絶婚女還然後進軍譚懼拔平原走保南皮公入平原略定諸縣攻譚破之斬誅其妻子兾州平袁熈大將焦觸張南等叛攻熈尚熈尚奔三郡烏丸觸等舉其縣降封爲列侯三郡烏丸承亂破幽州略有漢民合十餘萬户𥘉袁紹皆立其酋豪西單于蹹頓尤強爲紹所厚故尚兄弟歸之數入塞爲害公將征之鑿渠自呼陁入孤水名平虜渠引軍出盧龍塞外道絶不通乃壍山堙谷五百餘里經白擅歴平剛渉鮮卑庭東指栁城未至二百里虜乃知之尚熈與蹹頓遼西單于樓班右北平單于能臣抵之等將數萬騎逆軍登白狼山卒與虜遇衆甚盛公車重在後𬒳甲者少左右皆懼公登髙望虜陣不整乃縱兵擊之使張遼爲先鋒虜衆大崩斬蹹頓及名王以下胡漢降者二十餘萬口𥘉遼東太守公孫康恃逺不服及公破烏丸或說公遂征之尚兄弟可擒也公曰吾方使康斬送尚熈首不煩兵矣公引軍自柳城還康即斬尚熈及速僕九等傳其首諸將或問公還而康斬送尚熈何也公曰彼素畏尚等吾急之則并力緩之則自相圖其勢然也關中諸將疑公欲自襲馬超遂與韓遂楊秋李堪成冝等及公迺征之與超夾關爲軍乃與剋日㑹戰先輕兵挑之戰良乆乃縱虎騎夾擊大破之斬成冝李堪等超走凉州楊秋奔安定關中平天子命公賛拜不名入朝不趨劒履上殿加蕭何故事使御史大夫郗慮持節䇿命公爲魏公始建魏社稷宗廟天子娉公三女爲貴人又命公置旄頭宫殿設鍾簴又命公承制封拜諸侯守相冬十月始置名號侯至五大夫與舊列侯關内侯凡六等以賞軍功又進公爵爲王設天子旌旗出入稱警蹕王崩于洛陽時年六十六謚曰武葬髙陵又曰漢桓帝時有黄星見於楚宋之分遼東啇馗善天文言後五十歳當有真人起於梁沛之間其鋒不可當至破袁紹之歳凡五十年天下莫敵矣魏書曰漢末太祖拒董卓命歸郷里過故人成臯吕伯奢伯奢不在其子八人備賔主之禮太徂自以背卓聞其食器聲以爲圖巳夜殺八人而去旣而歎曰寜我負人無人負我又曰太祖自御海内芟夷群醜其行軍用師大較依孫吴之法而因事設竒量敵制勝變化如神自作兵書十餘萬言諸將征伐皆以新書從事臨時又手爲節度從令者尅捷違教者負敗與虜對陣意思安閑如不欲戰然及至决機乗勝氣勢盈溢故毎戰必克知人善察難眩以僞抜于禁樂進於行陣之間取張郃徐晃於亡虜之中皆佐命立功列於名將其餘抜出細微登爲牧守者不可勝數是以創造大業文武並施御軍三十餘年手不捨書晝則講軍䇿夜則思經傳登髙必賦乃造新詩𬒳之管絃皆成樂章才力絶人手射飛鳥躬擒猛獸甞於南皮一日射雉獲六十三頭及造作宫室繕治器械無不爲之法則皆盡其意雅性節儉不好華麗後宫不衣錦繡侍御履不二綵帷帳屏風壤則𥙷納茵蓐取温無有縁飾攻城拔邑得靡麗之物則悉以賜有功勲勞冝賞不恡千金無功望施分毫不與四方獻御與群下共之常以禮送終之制襲稱之數繁而無益俗又過之故豫自爲制終云衣服四篋而巳帝王世紀曰黄𥘉元年追尊號謚曰武皇帝廟號曰太祖曹暪傳曰操少好飛鷹走狗遊蕩無度其叔父數言之於嵩操患之後逢叔父於路及陽敗面喎口叔父恠問其故太祖曰卒中惡風叔父以告嵩嵩驚愕呼操而口皃如故嵩問曰叔父言汝中風巳差乎操曰初不中風但失愛於叔父故見罔耳嵩乃疑焉自後叔父有所告嵩終不復信操於是益得肆意及爲洛陽北部尉初入尉廨繕治四門造五色棒懸門左右各十餘枚有犯禁者不問豪强皆棒殺從數月靈帝愛幸小黄門蹇碩叔父夜行即殺之京師歛迹莫敢犯者近習寵臣咸疾之然不能傷於是共稱薦操故遷爲頓丘令操爲人輕易無威重好音樂倡優在側但以日逹夕𬒳服輕綃身自佩小盤囊以盛手巾細物時或冠祫帽以見賔客毎與人談論戯弄言辭盡無所隠及恍大笑至以頭投杯案中餚膳皆沾汚巾幘其輕易如此然持法峻刻諸將計畫勝出巳者隨以法誅之及故人舊惡亦皆無餘其所刑殺輙對之垂涕嗟痛之終無所活嘗出軍行經麥中令士卒無敗麥犯者死騎士皆下馬指麥以相付時操馬騰入麥中勑主簿議罪主簿對以春秋之義罰不加尊操曰制法而自犯之何以帥下然孤爲軍帥不可殺請自刑因抜刀割髮以置地世語曰魏武將見匈奴自以形陋不足雄逺國使崔季珪代當自捉刀立牀頭坐旣畢令間謂曰魏王何如匈奴使荅曰王雅望非常然牀頭捉刀人此乃英雄也魏王聞之馳遣殺此使博物志曰漢世安平崔瑗瑗子寔弘農張芝芝弟昶並善草書而太祖亞焉桓譚蔡邕善音樂馮翊山子道王九眞郭凱等善圍碁太祖皆與埒能又好養性法亦解方藥招引方術之士廬江左慈譙郡華他甘陵甘始陽城郄儉無不畢至又習噉野葛至一尺亦得少多飲鴆酒世說曰魏武帝甞過曹娥碑不解楊脩讀碑背上題云黄絹㓜婦外孫虀臼魏武謂脩曰卿解未可言待我思之行三十里魏武曰吾巳得令脩別記所如脩曰黄絹色絲也於字爲絶㓜婦少女也於字爲妙外孫女子也於字爲好虀臼受辛也於字爲辭所謂絶妙好辭武帝亦記之與脩言同帝歎曰我才不如卿乃較三十里唐太宗皇帝祭魏武帝文曰夫大徳曰生資二儀以成化大寳曰位應五運而逓昌貴賤廢興莫非天命故龍顔日角顯帝王之符電影虹光表乾坤之瑞不可以智競不可以力爭昔漢室三分羣雄並立夫民離政亂安之者哲人徳喪時危定之者賢輔伊尹之匡殷室王道昏而復明霍光之佐漢朝皇綱否而還泰立忠履節爰在於斯帝以雄武之姿常艱難之運棟梁之任同乎曩時匡正之功異乎往代觀沉溺而不拯視顚覆而不持乖徇國之情有無君之跡旣而三分肈慶黄星之應乆彰五十啓期真人之運斯屬其天意也豈人事乎文皇帝魏志曰文皇帝諱丕字子桓武帝太子太祖崩嗣位爲丞相魏王延康元年十月升壇即祚改延康爲黄𥘉以荆楊江表八郡爲荆州孫權領牧故也荆州江北諸郡爲郢州權破劉備於夷陵𥘉帝聞備兵東下與權交戰樹柵連營七百餘里謂羣臣曰備不曉兵豈有七百里營可以拒敵者乎孫權叛帝自許昌南征諸軍兵並進權臨江拒守幸廣陵故城臨江觀兵戎卒十餘萬旌旗數百里是歳大寒冰舟不得入江乃引還七年春將幸許昌許昌城南門無故自崩帝心惡之還洛陽宫五月帝崩于嘉福殿時年四十帝好文學以著述爲務自所勒成垂百篇又使諸儒撰集經傳隨類相從凡千餘篇號曰皇覽魏書曰帝生時有雲氣青色而圎如車蓋當其上終日望氣者以爲至貴之證非人臣之氣年八歲能屬文有逸才遂博貫古今經傳諸子百家之言善騎射好擊劒州舉茂才不行又曰文帝𥘉在東宫氣疫大起時人凋傷帝深感歎與素所善者大理王㓪書曰人生有七尺之形死爲一棺之土唯立徳揚名可以不朽其次莫如著篇籍疫癘數起士人凋落余獨何人能全其夀故論撰所著論詩賦蓋百餘篇集諸儒於肅成門内講論大義偘偘無倦呉志曰魏文帝出廣陵望大江曰彼有人焉未可圖也乃還博物志曰魏文帝善彈棊能用手巾角時有一書生又能低頭以所冠巾角撇棊典論曰𥘉平之元年董卓弑帝鴆后盪覆王室時余年五歳上以丗方擾亂教余學射六歳而知射教余乗馬八歳而能騎射矣以時之多難故每征伐余乗馬常從建安𥘉上南征荆州至宛張繡降旬日而反亡兄孝廉子脩從兄安民遇害時余十歳乗馬得脫夫文武之道各隨時而用生乎中平之季長於戎旅之間是以少好弓馬于今不衰逐禽輙十里馳射常百歩日夕體倦心毎不厭建安十年始定兾州穢貊獻良弓燕岱獻名馬時歳之暮春勾芒司節和風扇物弓燥手柔草淺獸肥與族兄弟同獵於鄴西終日獲麞鹿九雉兎二十後軍南征次曲蠡尚書令荀彧奉使犒軍見余談論之末或言聞君善左右射此實難能余言執事未覩夫項發口縱俯馬蹄而仰月支也彧喜笑曰乃爾余日射有常徑的有常所雖毎發輙中非至妙也若夫馳平原赴豊草要狡獸截輕禽使弓不虛彎所中必洞胷斯則妙矣時軍祭酒張京在坐顧彧俱拊手曰善余又好擊劒閲師多矣四方之法各異唯京師爲善余於他戯弄之事少所喜唯彈棊略盡其巧少爲之賦昔京師先工有馬合郷侯東方安世張公子常恨不得與彼數子者對上雅好書籍雖在軍旅手不釋卷毎定省從容常言人少學則思專長則忌於長大而能懃學者唯吾與袁伯業耳余是以少誦詩論及長而備歴五經四部史漢諸子百家之言靡不畢覽所著書論詩賦凡六十篇至若知而能愚勇而知怯仁以接物恕以及下以付後之良史太平御覽卷第九十三
