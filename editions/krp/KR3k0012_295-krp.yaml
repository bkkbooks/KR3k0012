front:
  text: 太平御覽卷第二百九十五兵部二十六
  hash: sha256:e1ab98a8596239f00964ad75def798db5fbcdb4e527674f25f246e9e773891e9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_295-1a}
body:
  text: 審察避銳安衆審察孫子曰兵怒而不相迎交而不合又不相去必謹察之備奇伏也左傳曰齊師伐魯敗退魯莊公將逐之曹􅔘曰未可夫大國難測也懼有伏焉恐許而奔也吾視其轍亂望其旗靡故逐之旗靡轍亂怖遽也又曰秦晉戰于羈馬交綏秦行人夜戒晉師曰兩君之士皆未憗也明日請相見也憗缺也魚覲切晉大夫臾駢曰使者目動而言肆懼我也日動心不安言肆声放失常節也將遁矣薄諸河必敗之薄迫也晉禆將胥甲趙穿當軍門呼曰死傷未收而棄之不惠也不待期而薄人於險無勇也乃止秦師果夜遁又曰晉侯伐齊齊侯畏其衆齊師夜遁師曠曰鳥烏之声樂齊師其遁鳥烏得空故樂也邢伯曰有班馬之声夜遁馬不聞見故鳴班列也齊師其遁叔向曰城上有烏齊師其遁又曰晉師伐楚將戰楚子登巢車以觀晉軍巢車車上爲櫓楚將子重使太宰伯州犁侍于王後州黎晉伯宗子先奔楚王曰騁而左右何也騁走曰召軍吏也皆聚於中軍矣曰合謀也張幕矣曰䖍卜於先君也徹幕矣曰將發命也甚囂且塵上矣曰將塞井夷竈而爲行也夷平行户郎切皆乗矣左右執兵而下矣曰聽誓也左將帥右車右竟販楚于􅋣陵㥼音偃後漢書曰劉備遣將呉蘭屯下辯曹公遣曹洪征之備遣張飛屯固山欲断軍後衆議狐疑洪曰賊實断道者當伏兵濳行今反張声此其不能也冝及其未集促擊蘭破則飛自走集兵擊蘭大破之飛果走宋書曰東晉末武帝率兵北伐圍南燕慕容超於廣固未下時後秦姚興遣使告宋武云慕容見與隣好以窮告急今當遣鐡騎一萬遥據洛陽晉軍若不退者便當長驅而進宋武遣興使荅曰語汝姚興我定燕之後息甲三年當平關洛今能自送便可速來劉穆之聞興使入而宋武發遣巳去以興所言并荅具語穆之穆之曰常日事無大小必賜與謀此冝善詳云何率尓便荅未能威敵只增彼怒耳若燕未可拔興救奄至不審何以待之宋武笑曰此是兵機非卿所解故不語耳夫兵貴神速彼若審能遣救必畏我知寕容先遣信命此是其見我伐燕内巳懷懼自強之辝耳興竟不能出師廣固終抜擒慕容超平齊地又曰武帝自京口舉義兵討桓玄玄將桓謙屯于東陵卞範屯覆舟山西以拒之宋武疑賊有伏兵謂小將劉鍾曰此山下當有伏兵卿可率部下往取之鍾應声馳進果有伏兵數百一時奔走又曰雍州刺史袁顗舉兵反㳂流入鵲尾與官軍相持旣义官軍主張興丗越鵲尾上據錢溪顗將劉胡攻之不下遣人傳唱錢溪巳平官軍之衆並懼宋將沈攸之曰不然若錢溪實敗萬人中要應有逃亡得者必是彼戰失利唱空聲以惑衆耳勒軍中不得輙動錢溪信㝷至果大破賊攸之悉以錢溪所送胡軍耳鼻示之顗駭懼急追胡還遂潰走後魏書曰司馬楚之討蠕蠕蠕蠕濳遣姧覘蠕如兖切入楚之軍截驢耳而去有吿失驢耳者諸將莫能察楚之曰必是覘賊截之以爲驗耳賊將至即使軍人伐柳爲城水灌令凍城立而賊至冰峻城固不可攻逼賊乃走散丗祖聞而喜之又曰將韓果性強記兼有權略所行之處山川形勢輙能記憶兼善伺敵虚實揣知情狀有潛匿溪谷欲爲間遉者果登髙視之所疑之處往必有獲通典曰周武帝帥師攻圍髙齊晉州齊後主將兵十万自來援之時柱國陳王純頓千里徑大將軍永昌公椿屯雞棲原大將軍宇文盛守汾水關並受齊王憲節度憲密謂椿曰兵者詭道去留不定見機而作不得遵常汝今爲營勢令兵去之後賊猶致疑不須張幕可伐疑也時齊分軍万人向千里徑又令其衆出汾水關自率大兵與椿對陣宇文盛馳騎告急憲自以千騎救之齊人覩谷中塵起相率遽退盛與柱國侯莫陳芮渉汾逐之多有斬獲俄而椿告齊衆稍逼憲又迴軍赴之㑹𬒳勑追還率兵夜返齊人果謂柏菴爲帳幕也不疑軍退翌日始悟周人說疑齊人不察軍䜟曰夫用兵者必察敵國之情視其倉廪度其餘糧以卜其強弱運糧二百里者無二年之食也運糧三百里者無三年之糧也是謂虚國民貧上下不相親則有離叛心上行暴虐則下刻急相殘賊是爲亡國若進惡不退群賢隱蔽不肖在位國受其害内貪外廉竊公爲㤙飾躬正顔以獲髙官是謂盗端避銳孫子曰少而逃之高壁壘勿与戰也彼衆我師寡不可敵則軍自逃守匿其形也不若則能避之強弱不敵势不相若則引軍避之待利而動故小敵之堅大敵之擒小不能當大言小囯不量其力敢與大邦爲讎雖權時堅城固守然後必見擒獲春秋傳日旣不能強又不能弱所以敗之也無邀正正之旗無擊堂堂之陣此理變者也正正者整通典曰東晉末武帝伐南燕慕容超領南賊盧循徐道覆乗虚襲建業循多疑少決毎欲以万全爲慮謂道覆曰大軍未至晉吏部尚書孟昶便覩風自裁大勢言之自當計日潰亂令决負於一朝旣非必定之道且煞傷士卒不如案兵待之宋武奔還拒守宋武曰賊若新亭直上且當避之廻泊蔡洲乃成擒耳於是登石頭城以覩循軍𥘉見引向新亭宋武顧左右失色旣而廻泊蔡洲道覆猶欲上循禁之使羸老悉乗舟艦向白石宋武慮其從白石歩上乃率劉毅諸葛長民北岀拒之賊遂率數万屯丹陽郡宋武率諸軍馳㱕衆慮賊過江咸謂當徑還拒戰宋武乃先引軍還石頭衆莫之曉是日大熱三軍疲頓旣入城解甲息士洗浴飲食乆之乃出列陣於南塘命叅軍禇叔度朱齡石率勁勇千餘人過淮賊數千皆長刀矛鋋精甲曜日奮躍爭進齡石所領多鮮卑善歩矟並結陣以待之賊短兵弗能抗死傷者數百人乃退走安衆春秋曰晉文公卒將殯于曲沃出綘柩有聲如牛如牛呴声虚苟切卜偃使大夫拜曰君命大事將有西師過軼我擊之必大捷焉秦伯使孟明視等三將襲鄭晉師禦之于殽而敗之声自柩出故曰君命也大事也卜偃聞秦密謀故因柩声以正衆心也史記曰燕使騎劫代樂毅攻齊即墨齊將田單拒守乃令城中人食必祭其先祖於中庭飛鳥悉翔舞城中下食燕人怪之單復宣言曰神來下敎我又令曰當有神人爲我師者有一卒曰臣可以爲師乎因反走田單乃起引還東嚮坐師事之卒曰臣欺君誠無能田單曰子勿言也因師之每出入約束必稱神衆心乃安竟破燕軍又曰秦二丗𥘉天下亂陳勝呉廣起兵於蘄欲收人心謀曰項燕爲楚將數有功愛士卒楚人憐之或以爲在今誠以吾衆爲天下唱冝多應者謂首号令廣以爲然迺行卜卜者知其指意曰足下事皆成功然足下卜之鬼乎卜者云事成有功然須假託鬼神乃可興起耳故勝廣曉其意則爲魚書狐鳴以威衆也勝廣喜念鬼曰此敎我先威衆耳廼丹書帛曰陳勝王置所􅊻魚腹中罾音曾卒買魚烹食得書巳怪之矣又間令廣之所次旁叢祠中夜搆火狐鳴呼曰大楚興陳勝王間謂竊令人行也密於廣所次舎處旁側叢祠中爲之叢謂草木之岑蔚者也祠神祠也構謂結起也呼火故切卒皆夜驚恐朝日卒中徃徃指目勝廣因而號令衆遂從之又曰髙帝巳封大功臣二十餘人其餘日夜爭功不决未得行封帝在洛陽南宮從複道遥見諸將徃徃相與坐沙中語張良曰陛下起布衣以此屬取天下今爲天子而所封皆蕭曹故人及親愛而所誅者皆生平所仇怨今軍吏計功以天下不足遍封此屬畏陛下不能尽封又恐見疑平生過失及誅故即相聚謀反耳帝憂曰爲之奈何良曰帝乎生所憎羣臣所共知誰最甚者帝曰雍齒與我有故怨數常窘辱我我欲殺之爲其功多故不忍良曰今急先封則人人自堅矣於是帝乃置酒封齒什邡侯而急趣丞相御史定功行封羣臣皆喜曰雍齒且爲侯我屬無患矣漢書曰李廣以郎中令將四千騎出右北平博望侯騫將万騎與廣俱異道行數十里匈奴萬騎圍廣軍士皆恐廣乃使其子敢徃馳之敢從數十騎直貫胡騎出其右而還曰胡虜易與耳軍士乃安後漢書曰王郎起光武馳至下曲陽傳聞王郎兵在後從者恐及至呼沲河候吏還白河水流澌澌音斯無舩不可濟官屬大懼光武令霸往視之霸恐驚衆欲且前阻水還即詭曰冰堅可渡官屬皆喜光武笑曰候吏果妄語也遂前比至河河冰亦合乃令霸護渡監護渡也未畢數騎而冰解光武謂霸曰安吾衆得濟免者卿之力也霸謝曰此明公至德神靈之祐雖武王白魚之應無以加此昔武王渡盟津白魚躍入王舟光武謂官屬曰王霸權以濟事殆天瑞也晉書曰李矩守滎陽城劉聦將劉暢討矩奉牛酒詐降謀夜襲之兵士以賊衆皆有懼色矩令郭誦禱鄭子産祠曰君昔相鄭惡鳥不鳴兇胡夏羯何得過庭使巫揚言東里有敎當遣神兵相助將士聞之皆踴躍爭進乃使誦選勇敢千人夜掩暢營獲鎧馬甚多斬首數千級暢僅以身免東里即子産又曰劉𥙿討慕容超圍廣固城數月不拔或說𥙿曰昔石季龍攻曹嶷瞻氣者以爲澠水帶城澠音繩非可攻抜若塞五龍口城必自䧟季龍從之而嶷降慕容恪圍叚龕亦如之而龕降降後無幾又震開之今舊跡猶在可塞之𥙿從其言於是城中男女患脚弱疾者太半時有蒼鵝飛入帳座衆咸驚愕其將曰蒼胡色也鵝者我也胡虜歸我之徵衆大恱將攻城諸將咸諌曰今往亡之日兵家所忌𥙿曰我往彼亡吉孰大焉乃命悉登遂尅平廣固又曰嶺南城盧循㓂建業宋武擊破之走至彭蠡湖乃悉力栅断左里大軍至左里將戰宋武所執麾竿折幡沉水衆並恠懼公歡笑曰徃年覆舟之戰幡竿亦折今者復然賊必破矣即攻柵而進循兵雖殊死戰弗能禁諸軍乘勝奔之循單舸走所殺及投水死凡萬餘人納其降附宥其逼掠遣劉藩孟懷玉輕軍追之循收散卒尚有數千人逕還廣州又秃髮利鹿孤載記曰吕纂來伐使傉檀拒之纂士卒精銳進度三堆三軍擾懼傉檀下馬據胡床而坐士衆心乃安與纂戰敗之斬二千餘級崔鴻十六國春秋曰後趙石勒使將麻秋等伐張重華於武威重華將謝艾曰乞假臣兵七千爲殿下吞之重華以艾爲中堅將軍配歩騎五千擊秋引師岀振武夜有工梟鳴於牙中艾曰梟邀也六慱得梟者勝今梟鳴牙中尅敵之兆於是進戰大破之斬首五千級又曰後燕慕容寳遣將慕容賀麟率三萬餘人宼新市甲子晦後魏道武進軍討之太史令晁崇奏曰昔紂以甲子亡兵家忌不可出帝曰紂以甲子日亡周武不以甲子勝乎崇無以對帝遂進軍新市賀麟退阻派水依漸洳澤以自固漸音子廉切洳音而據切甲戍帝臨其營戰於義臺塢大破之梁書曰庾域爲華陽太守後魏軍攻圍南鄭時糧儲寡少人情忷懼忷許拱切州有空倉數十所域手自封題指示將士云此中粟皆滿足攴二年但弩力堅守衆心以安虜退以功拜羽林監又曰楊公則隨武帝大軍至新林公則自越城移屯領軍府壘北樓與掖門相對嘗登樓望戰城中遥見麾盖縱神鋒弩射之矢貫胡牀左右皆失色公則曰虜㡬中吾脚談笑如𥘉通典曰隋末李密據興洛倉破宇文化及還士卒皆疲倦隋將王充欲乗其弊而擊之恐衆心不一乃假託鬼神云夢見周公乃立祠於洛水上遣巫宣言公欲令今㒒射討李密當有大功不則兵皆疲死充兵多楚俗信妖言以惑之衆皆請戰遂破密唐書曰髙祖爲山西河東撫慰大使行至太平關遇賊數千人時所將兵少左右皆懼髙祖謂之曰此烏合之賊易與耳因率騎十二人岀擊之所向皆靡衆情始定丗說曰曹公軍行失道三軍皆渴公令曰前大梅饒子酸可以解渴士卒聞之口皆水出三國典略曰梁蕭藻有操行以父非命而卒布衣菲食非公坐不聽音樂𥘉爲益州刺史時有焦僧護依亂掩據郫繁衆有數萬藻年未弱冠將自擊之乃乗平肩輿廵行賊城流矢雨下從者舉楯以蔽藻命去之因是物情大安賊夜遁梁武常稱其小字歎曰子弟併如迦葉吾復何憂太平御覽卷第二百九十五
