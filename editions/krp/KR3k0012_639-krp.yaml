body:
  text: 刑法部五聽訟易訟卦曰天與水違行訟君子以作事媒始又豐卦曰雷電皆至豊君子以折獄致刑詩曰蔽芾甘棠勿剪勿伐召伯所苃箋云茇草舎也夫召伯聽男女之訟不重煩勞百姓止舎于棠之下而聽斷焉又曰行露召伯聽訟也周禮曰以兩造禁民訟入束矢於朝然後聽之訟謂以財貨相告者造至也使訟者兩至旣兩至使入束矢乃治之也不至不入束矢則是自服不直者也必入矢者取其直也詩云其直如矢束矢其百个與以兩劑禁民獄入鈎金三日乃致于朝然後聽之獄謂相吉以罪名者劑今劵書也使獄者各齎劵書旣爾劵書及使人鈎金又三日乃治之重刑也不劵書不入金則是自服不直者也夫入金者取其堅也以嘉石平罷民嘉石文石也樹之外朝門左平成也成使善也以肺石逹窮民肺石赤石也窮民天之窮而無告也凡逺近􅑏獨老㓜之欲有復於上而其長弗逹者立於肺石三日士聽其辭以告於上而罪其長又曰凢諸侯之獄訟以邦典定之邦典六典也凢卿大夫之獄訟以邦法斷之邦法八法也凢庶民之獄訟以邦成弊之邦成謂若今時决事之比也又曰以五刑聽万民之獄訟附于刑用情訊之至于旬乃弊之讀書則用法附猶著也訊言也用情理言之兾有可以岀之者十日乃断之以五聲聽獄訟求民情一曰辭聽觀其出言不直則煩二曰色聽觀其顔色不直則赧然三曰氣聽觀其氣息不直則喘四曰耳聽觀其聽聆不直則惑五曰目聽觀其眸子視不直則眊然又曰掌都家聽其獄訟之辭辨其死刑之罪而要之三月而上獄訟于國司㓂聽其成于朝羣士司刑皆在各麗其法以議獄訟成平也獄訟成士師受中書其刑殺之成與其傳曰王叔陳生與伯輿争政二子王卿士王右伯輿右助也王叔陳生怒而岀奔晉侯使士丐平王室王叔與伯輿訟焉争曲直王叔之宰與伯輿之大夫瑕禽坐獄於王庭士丐聽之范宣子曰天子所右寡君亦右之所左亦左之使王叔氏與伯輿合要王叔氏不能舉其契王叔奔晉論語曰子曰聽訟吾猶人也必也使無訟乎又曰片言可以折獄者其由也與片讀爲半片言謂單辭也折断也子路果取所知言必直故可令断獄也又曰孟氏使陽膚爲士師士師典獄之官問於曽子曽子曰上失其道民散乆矣如得其情則哀矜而勿喜漢書曰于定國飲酒至數石不亂冬月治獄請讞飲酒益精明後漢書曰陳寵辟司徒鮑昱府是時三府掾屬專尚交遊以不肯視事爲髙寵常非之獨勤心物務數爲昱陳當代便冝昱髙其能轉爲辭曹掌天下獄訟續漢志曰三公掾屬三十四人有辭曹主辭訟事也其所平决無不厭服衆心時司徒辭訟乆者數十年事類溷錯易爲輕重不良吏得生因縁因縁謂依附以生輕重也寵爲昱撰辭訟比七卷决事科二條皆以事類相從昱奏上之其後公府奉以爲法又曰王渙爲洛陽令以平正居身得寛猛之冝不冤嫌乆訟歷政所不斷法理所難平者莫不曲盡情詐壓塞羣疑又能以譎數發擿姦服譎詐數術也京師稱歎以爲渙有神筭又曰法雄爲青州刺史界内肅清雄每行部録囚徒察顔色知情僞長吏不奉法即解印去之魏書曰廷尉髙柔時護軍營士竇禮近出不還營以爲亡表言逐捕役其妻盈及男女爲官奴婢盈連至州府稱冤自訟莫有省者乃辭詣廷尉柔問曰汝何以知夫不亡盈垂泣對曰夫少單特養一老嫗爲母事甚㳟謹又哀兒女撫視不離非是輕狡不頋室家者也柔重問曰汝夫不與人有怨讎乎對曰夫良善與人交錢財乎對曰甞岀錢與同營士焦子乆求不得時子適坐小事繫獄柔乃見子問所坐言次汝頗曽舉人錢不子曰自以單貧𥘉不敢舉人物也柔察子色動遂曰汝昔舉竇禮錢何言不耶子怪知事露應對不次柔曰汝巳殺禮便冝早服子於是叩頭具首殺禮夲末埋藏處所柔便遣吏卒承子辭徃掘得其屍詔書復盈母子爲平人晉書曰陸雲爲浚儀令雲到官肅然下不能欺市無二價人有見殺者主名不立雲録其妻而無所問十許日遣出宻令人隨後謂曰不出十里當有男子候之與語便縛來旣而果然問之具服云與此妻通共殺其夫聞妻得出欲與語憚近縣故逺相邀候於是一縣稱爲神明又曰鄧攸甞詣鎮軍將軍賈混混以人訟事示攸使决之攸不視曰孔子稱聽訟吾猶人也必也使無訟乎混竒之以女妻之矣又曰符融仕符堅爲司隷校尉京兆人董豐遊學三年而返宿妻家妻爲賊所殺妻兄疑豐殺之送豐有司豐不堪楚掠自誣引殺妻融察而疑之問豐曰汝行徃還頗有怪異及卜筮否豐曰𥘉將發夜甞夢乗馬南渡水返而北渡水馬停水中鞭䇿不去俯而視之見兩日在於水下馬左白而濕右黒而燥寤而心悸竊以爲不祥問筮者筮者曰憂獄訟逺三枕避三沐旣至妻爲具沐夜授豐枕豐記筮者之言皆不從之妻乃自沐枕枕而寢融曰吾知之矣馬左而濕濕水也左水右馬馮字兩日昌字也其馮昌殺之乃獲昌詰之具首服夲與其妻謀董豐期以新沐枕枕爲驗乃悞中婦人也宋書曰傅琰爲山隂令有賣針賣糖嫗争絲各言巳者詣琰琰掛而輕鞭之有鐡屑乃罰賣糖者又有二老争鷄問何食一云食粟一云食豆剖之見粟罰言豆者人畏如神明後魏書曰辛祥爲并州平北府司馬㑹刺史喪朝廷以其公清遂越長史勑行州事祥𥘉在司馬失白璧還兵藥道顯𬒳誣爲賊官屬推處咸以爲然祥曰道顯靣有悲色察獄以色其此之謂乎苦執申之月餘別獲真賊又曰李崇爲揚州刺史先是壽春縣人荀㤗有子三歳遇賊亡失數年不知所在後見在同縣人趙奉伯家㤗以狀告各言巳子並有隣證郡縣不能斷崇曰此易知耳二父與兒各在別處經禁數旬然後遣人告之曰君兒偶患向巳暴死有教解禁可出奔哀也荀㤗即號咷悲不自勝奉伯咨嗟而已殊無痛意察知之乃以兒還㤗詰奉伯詐狀奉伯乃欵引云先亡一子故妄認之又曰裴安祖弱冠州辟主簿民有兄弟争財詣州相訟安祖召其兄弟以禮義責讓之此人兄弟明日相率謝罪州内欽服之又曰唐和爲内都大官評决獄訟不加捶楚欵獲實者甚多丗以是稱之又曰司馬悅字慶宗歷位豫州刺史時有汝南上蔡董毛奴者賫錢五千死於道路郡縣疑人張堤爲刼又堤家得錢五千堤懼掠自誣言殺至州恱觀色疑其不實引見毛奴兄靈之謂曰殺人取錢當時狼狽應有所遺得何物靈之曰唯得一刀削恱取視之曰此非里巷所爲也乃召州内刀匠示之屬有郭門者前曰此刀削門手所作去嵗賣與郭人董及祖悅収及祖詰之及祖欵引靈之又於及祖身上得毛奴所着皂𥜗及祖伏法悅察獄多此類也後周書曰建德二年冬帝聽訟於正武殿自旦及夜繼之以燭又曰栁慶爲雍州別駕有賈人持金二十斤詣京師交易寄人停止每欲出行常自執管鑰無何緘閉不異而失之謂是主人所竊郡縣訊問主人遂自誣服慶聞而歎之乃召問賈人曰卿鑰恒置何處對曰恒自帶之慶曰頗與人同宿乎與同飲乎曰日者曽與一沙門再度酣宴醉而晝寢慶曰主人以痛自誣非盗也彼沙門乃真盗耳即遣吏逮捕沙門乃懷金逃匿後捕得盡獲所失之金又曰柳慶有胡家𬒳刼郡縣按察莫知賊所隣近被囚繫者甚多慶以賊徒旣衆似是烏合旣非舊交必相疑阻可以詐求之乃作匿名書多牓官門曰我等共刼胡家徒侣混雜終恐泄露今欲首懼不免誅若聽先首免罪便欲來告慶乃復施免罪之牓居二日廣陽王欣家奴面縛自告牓下因此推窮盡獲黨與慶守正明察每歎曰昔于公斷獄無私闢髙門可以待封儻斯言有驗吾斯庻幾乎又曰蘇綽爲六條詔書奏施行之其一先修心其二敦教化其三盡地利其四擢賢良其五䘏獄訟其六均賦役文帝甚重之常置諸座右隋書曰韋鼎爲光州刺史有人客遊通主人家之妾及其還去妾盗物於夜逃亡㝷於草中爲人所殺主家知與妾通因告客殺之縣司鞠問具得姦狀因斷客辜獄成上於鼎覽之曰此客實姦而非殺也乃某寺僧詃妾盗物令奴殺之贓在某處即放此客遣掩僧并獲贓物自是部内肅然咸稱其有神又曰辛公義爲牟州刺史下車先至獄中因露坐牢側親自驗問十餘日間决斷咸盡方還大㕔受領詞訟皆不立文案遣當直佐寮一人側坐誶問事若不盡應湏禁者公義即宿廳事終不還閤人或諌之曰此事有程使君何自苦也荅曰刺史無德可以導人尚令百姓係於囹圄豈有禁人在獄而心自安乎罪人聞之咸自欵服後有欲諍訟者其郷閭父老遽相曉曰此盖小事何忍勤勞使君訟者多兩讓而止尚書大傳曰聽獄之術大治有三治必寛寛之術歸於察察之術歸於義察猶審也是故聽而不寛是亂也寛而不察是慢也古之聽獄者言不越辭辭不越情情不越義是故聽民之術怒必思兼怒小罪勿兼怒責也責因之罪必思義謂思其辭思其主思義重大罪求可以出之者也又曰孔子如衛人謂曰公甫不能聽獄公公甫魯大夫子曰不知公甫之不能聽獄也荅而反之公甫之聽獄也有罪者懼無罪者耻民近禮矣春秋元命包曰樹棘槐聽訟於其下棘赤心有刺言治人者原其心不失赤實事所以刺人其情令各歸實槐之言歸也情見歸實也山海經曰夏后啓之臣曰孟徐是祠神于巳人聽其獄訟謂之神主訟干孟徐之所人断之也其衣有血者乃執之㑹稽典録曰郡署鍾離意北部督郵烏程男子孫常常弟烈分居各得田半頃烈死嵗飢常稍以米粟給烈妻子輙追計直作劵没取其田烈兒長大訟常掾史議皆曰烈孫兒遭餓頼常升合長大成人而更争訟非順孫也意獨曰常身爲遺父當撫孤弱是人道正義稍以升合劵取其田懷挾姦路貪利忘義烈妻子雖以田與常困迫之至非私義也請常田俾烈妻子於是衆議無以奪意之理又曰謝夷吾字尭卿山隂人也爲荆州刺史行部到南魯縣遇孝章皇帝廵狩幸魯陽上未常見刺史班秩有詔勑夷吾入傳録見囚徒誡長吏勿廢舊儀上林西廂南面夷吾處東分帷以其中夷吾省録囚徒有亭長姦部民者縣言和姦上意以爲吏姦民何得言和且觀刺夫决當云何頃夷吾呵之曰亭長詔書朱幘之吏職在禁姦今爲惡之端何得言和切讓三老孝悌免長罪其所決正一縣三百餘事與上合章帝歎曰使諸州刺史盡如此者朕不憂天下特遷鉅鹿太守臨發陛見賜車馬劒帶勑之曰鉅鹿劇郡舊爲難治以君有撥煩之才故特授任無毀前勞張斐律序曰情者心也心戚則動情動於中而形於言暢於四支發於事業是故姦人則心愧而面赤内怖而色奪賈誼新書曰梁甞有疑獄群臣半以不當半以爲當罪雖然王亦疑梁王曰陶朱公賢以而問曰梁有疑獄吏半以爲不當半以爲當奈何朱公曰臣鄙民也不知家有一百璧其澤相如也然有其價一者千金一者五百金王曰徑與色澤相如也一者千金一者五百金何也朱曰側而翫之一者厚倍是以千金梁王曰善故疑獄則從去賞疑則從與梁國大恱新序同也淮南子曰越王决獄不當援刀自割而戰士畢死感於恩也又曰秦始皇晝决獄夜理書說苑曰邵公述職當桑蚕時不欲變民事故不入邑中舎乎甘棠之下而聽齗焉風俗通曰沛郡有冨家公貲二千餘萬小婦子年裁數歳頃失其母又無親近其女不賢公痛困思念恐争其財兒必不全因呼族人爲遺令書悉以財屬女但遺一劒云兒年十五以還付之其後又不肯與兒詣郡自言求劒謹案時太守大司空何武也得其辭因録女及􅡾省其手書頋謂掾史曰女性強梁􅡾復貪鄙畏賊害其兒又計小兒正得此則不能全護故且俾與女内實寄之耳不當以劒與之乎夫劒者亦所以决齗限年十五者智力足以自居度此女􅡾必不復還其劒當問縣官縣官或能證察得見伸展此凢庸何能用慮強逺如是哉悉奪取財以與子曰弊女惡􅡾温飽十歳亦以幸矣於是論者乃服又曰臨淮有一人持疋縑到市賣之道遇雨𬒳戴後人求共庇䕃雨霽當別因共争闘各云我縑詣府自言太守薛宣劾實兩人莫肯首服宣曰縑直數百錢耳何足紛紛自致縣官呼騎吏断縑各與半使追聽之後人曰受恩前撮之縑主稱怨宣曰然固知其當尔也因詰責之具服悉俾本主又曰頴川有冨室兄弟同屋兩婦俱懷姙大婦數月胎傷因閉匿之産期至到乳舎弟婦生男夜因盗取争訟三年州縣不能决丞相黄覇出殿前使卒抱兒去兩婦各十餘歩叱婦自徃取之長婦把持甚急兒大啼弟婦恐傷害之因乃放與而心甚悽愴覇曰此弟婦子也責問婦乃伏也太平御覽卷第六百三十九
