front:
  text: 太平御覽卷第五百五十六
  hash: sha256:8c7ae8e4fef821d0c9e44e2e897cbe6e46e6f862abb64df2869bd070b7096a03
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_556-1a}
body:
  text: 禮儀部三十五葬送四呉越春秋曰早平門外麋湖西城者麋王城也與越王遥戰越王殺麋王麋王無頭騎馬還武里乃死因留葬武里城中以午日死至今武里午日不舉火又曰呉王闔閭有子女怨王乃自殺闔閭痛之甚葬於昌門外鑿地爲池積土爲山文石爲椁金鼎銀鐏珠玉之寳皆以送女乃舞白鵠於呉市中令萬民隨觀還使男女與鴶俱入門因塞之又曰呉謀伐齊齊景公使子女爲質於呉呉王因爲太子聘齊女齊女少思齊日夜哭泣發病闔閭乃起北門名曰齊門令女往遊其上女思不止病日益甚至且死女曰令死有知必葬海虞山之顛以望齊國闔閭傷之甚用其言葬於虞山之嶺以瞻望齊國是時太子亦病而死說苑曰盖聞相梁并衛有罪而走齊管仲迎而問曰吾子相梁并衛之時門下使者幾何人曰門下使者三千餘人管仲曰今與幾何人來曰臣與三人俱曰是何對曰其一人父死無以葬我爲葬之一人母死無以葬亦爲葬之一人兄有獄我爲出之是以得三人來桓子新論曰楊子雲爲郎居長安素貧比歳亡其兩男哀痛之皆持歸葬於蜀以此困乏子雲逹聖道明於死生不下季札然而慕戀死子不能以義割恩自令多費而致困貧論衡曰儒書言孔于當泗水而葬爲之却流此言孔子德使水却不湍其墓是故儒者講論皆言孔子之後當封泗水以却流爲證殆虚言也王符潜夫論曰文帝葬於芷陽明帝葬於洛南皆不藏珠寳不起山陵今京師貴戚郡縣豪家生不極養死乃崇喪造起大冢廣樹松柏廬舍祠堂務崇侈僣此無益於終無益於孝徒作煩擾傷害吏民今案畢鎬之郊無文武之陵南城之東無曽晢之冡周公非不忠曽子非不孝也崔寔政論曰送終之家亦大無度至念親將終無以奉遣乃約其供養衣服豫脩巳没之制竭家盡業甘之不恨窮阨旣迫起爲盗賊拘執䧟罪爲丗大戮痛乎此俗之愚民也録異傳曰袁安葬其母逢三書生語其葬處遂至四丗五公其後公路年十八驕豪故常食宻飯諸女以絳爲地道遊行其上此葬地所致也謝綽宋拾遺曰桓温葬姑熟之青山平墳不爲封域於墓傍開𡑞立碑故謬其豦令後代不知所在襄陽耆舊傳曰峴山南有習家魚池者習郁之所作也郁將亡勑其兒煥曰我葬必近魚池煥爲起冡於池之北去池四十歩山謙之丹陽記曰晉車騎將軍王舒令其子曰甚愛漂陽縣死則我欲葬焉故王死之後徙縣治今豦而以昔解爲墓續搜神記曰于寳字令升新蔡人其父有嬖妾母至妬寳父葬時因推着藏中經十年而母喪開墓見棺妾伏棺上衣服如生就視猶暖漸漸有氣息與歸經日乃蘇云父常與之寢接恩情如生在家中范晏隂德傳曰陳翼字春卿廬江舒人也行到縣郭見道上馬傍有卧疾人呼翼與語曰吾是長安魏公卿聞廬江樂土來下道病困不能復前儻可相救翼荅云家有弊廬可俱歸乎公卿曰幸甚即扶與俱到家飬視積日旣困公卿謂翼曰馬上有金千餘餅素二十疋可賣殮餘以相謝言絶而亡翼賣素買衣衾殯殮之葬埋髙敞之地以金置棺下不使人知乗馬去公卿兄長公見翼乗馬謂必殺公卿隂告官収翼具以狀對長公迎喪發棺下得金如數叩頭謝以金投其門中翼送長安還之汝南先賢傳曰袁閎字夏甫延熹末黨事將作閎遂散髪乃築土室四周於庭潜身十八年終于土室之中臨卒勑其子曰勿設殯棺衣衾之備也但着禈衫踈布單衣幅巾襯尸於板床之上五百墼爲藏㑹稽典録曰趙曄字長君山隂人也少爲縣吏奉檄迎督郵曄甚耻之由是委吏到犍爲詣博士杜撫受韓詩撫嘉其精力盡以其道授之積二十年不還家人爲之發喪制服至撫卒曄經營葬之然後歸家又曰張䛕字彦承上虞人也與同郷丁孝正相親葬送過制謏書難之曰吾聞班固善陽孫之省葬惡始皇之飾終夫倮以矯丗君子弗爲若乃據周公之定品依延州而成事取中庸以建基獲美稱於當丗不亦優哉又曰謝夷吾轉下邳令預自尅死日如期果卒勑其子曰漢末甞亂有發掘露骸之禍使縣棺下葬墓不起墳楚國先賢傳曰韓墍將終遺言曰夫俗奢示之以儉儉則節之以禮歴見前丗送終過制失之甚也若曹敬聽吾言歛以時服葬以土藏穿畢便葬送之以瓦器愼勿有増益襄陽耆舊記曰襄陽城南邊大道有諸葛女郞墓者是諸葛仲茂女冢也年十三四亡茂婦憐之不能自逺故近臣葬之日日徃哭又曰秦頡者字𥘉起頡之南陽過冝城中一家東向大道住車視之曰此居處可作冢後喪還至此住處車不肯前故吏爲市此宅葬之今冝城城中大冢前有二碑是也又曰有俍子者家訾萬金而自少小不從父語臨亡意欲葬山上恐兒不從到言葬我着㶆下石磧上俍子曰我田來不奉教從今當從此一語遂盡散家財作冢積土繞之成一洲長數百歩元康中始爲水所壞俍子前漢人也譙周三巴記曰巴國有亂巴國將畢㬅子請師於楚楚人與師㬅子巳平巴國旣而楚遣使請城㬅子曰吾誠許子之君矣持頭徃謝楚王城不可得乃自刎以頭與楚子楚子歎曰吾得臣若巴㬅子何以城爲乃以上卿禮葬㬅子頭巴國葬其身亦然華陽國志曰德陽縣有青石祠山源沃美有澤原之利士女多貞孝車騎將軍鄧芝方之鄧林有終焉之志没遂葬其山博物志曰澹臺子羽渡水而子溺死人將葬之滅明曰此命也吾豈與螻蟻爲親魚鼈爲讎於是遂以水葬之又曰漢滕公夏侯嬰死公卿送葬至東郭門外四馬不行掊地悲鳴即掘馬蹄下得石椁其銘曰佳城鬰鬰三千年見白日于嗟滕公居此室乃葬所地故謂之馬冢焉又曰河内淇園張公老而無子貲財累億求没入官死葬園中于今供祀犧牲永昌郡傳曰建寧郡葬夷置之積薪之上以火燔之烟氣正上則大殺牛羊共相勞賀作樂若遇風烟氣旁邪尓乃悲哭也豫章記曰許子將墓在郡南四里昔子將以中國大亂逺來渡江隨劉繇而卒藏于昌門裏于時漢興平二年也呉天紀中太守呉興沈季白日於㕔事上坐忽然如夢見一人着黄單衣黄巾稱汝南羊與許子將求改葬因忽不見即求其喪不知豦所遂招魂葬之命文學施遐爲招魂文越地傳曰禹井井者法也以爲禹葬以度不煩人衆樂資九州志曰渡之塩官有奉禪山昔始皇過此而美之死因葬焉有廟在平地于今民祠之𫐠征記曰荀氏葬在彭城東岸東岸有一丘民俗謂之荀氏葬或云斯則徐偃王葬后倉者也古徐國宫人娠而生卵弃之水濵有犬名后倉衘而歸伏而成人遂爲徐之嗣君純筯無骨號曰偃王偃王躬行仁義衆國附之得朱弓之瑞周穆王命楚滅之后倉將死生角九尾實黄龍也又曰魚山臨清河舊屬東阿東阿王曹植毎升此山有終焉之志植之所遊池沼溝渠悉存旣葬于山西有二石柱猶存也地今割并榖城鄧德明南康記曰陽道士葬巖石室元嘉中道士過丗臨終語弟子等可送吾置彼石室巾褐香鑪此外無所須也及其亡日謹奉遺命葬經數年尸猶儼然葛巾覆之如𥘉弗朽後忽不復見今舟行者過其山渚尚聞香氣咸異焉解道處齊記曰魏黄𥘉三年文帝弟爕封濮陽王臨終頋命葬近蘧瑗之墓吾常想其爲人願託賢哲之靈扶南傳曰頓愻國人死或鳥葬或火葬鳥葬者病困便歌儛送郭外有鳥如鵝緑色飛來萬計啄食都盡歛骨焚之沉之於海此上行必生天鳥若不食自悲傷乃就火葬取骨埋之是次行也鄴中記曰石勒陵在襄國城西南三十里名髙陵不築墻不種樹立堂皇五間安欑圗勒大臣像又於堂皇東立重樓虎陵在鄴西北角旣葬鄴中便亂其封域故未有名域云尋𬒳掘凡此二陵皆僞葬右勒虎自別於深山風俗通曰王喬爲葉令天下一玉棺於㕔事前令臣吏試入不動揺喬曰天帝獨欲召我沐浴服飾寢其中盖便立覆之宿昔葬於城東土自成墳其夕縣中牛皆流汗吐舌人無知之者皇覽曰舊漢家之葬方中百歩穿築爲方城其中開道足施六馬發三河三輔近郡卒徒十萬數復土姚信士緯曰盖葬於寛平則恐後丗都邑居之葬於陵野則恐民人耕稼及之厚椁大棺人所爲用下一寡材木民人率多發掘以繕其居千墳萬壙無不毀者其唯瓦棺薄葬歛以時服依于髙丘徹于深穽庶乎不辱耳語林曰王太保有二兒喪一兒欲還舊塋一兒欲留葬太保乃垂涕曰不忘故郷仁也不戀夲土逹也唯仁與逹吾二子有焉又曰王武子葬夕孫子荆哭之甚悲賔客莫不爲垂涕哭畢向靈曰卿常好驢鳴今爲卿作驢鳴旣作體似真聲賔客莫不大笑孫聞笑頋謂曰諸君不死令王武子死賔客莫不皆怒須臾之間或悲或笑或怒丗說曰阮藉葬母蒸一肥豚飲酒二斗然後臨决直言窮矣都得一號因吐血良乆又鄧晉記曰籍母將死與人圍棊如故局者求止籍不肯留與決旣而飲酒三升舉聲一號吐血數升也又曰庾文康亡何楊州臨葬云埋王樹着土中使人情何能巳文康庾亮謚也何掦州者何充也又曰晉明帝亦解冢宅聞郭璞爲人葬後微服徃看因問君何以葬龍角此法當滅族主人荅云郭景純云此是葬龍耳不出三年當致天子明帝復問云爲是出天子耶荅非能出招致天子耳相冢書曰凢葬龍耳冨貴出五侯葬龍頭暴得冨貴人不能見葬龍口賊子孫葬龍齒三年暴死葬龍咽死滅門葬龍腮必卒死天子葬髙山諸侯葬連崗庶人葬平地應璩新詩曰野田何紛紛城郭何落落埋葬嫁娶家皆是啇旅客喪側食不飽酒肉紛狼籍晉武帝賜劉廙葬錢詔曰故侍中劉廙以清識明鑒有聲前代昔宣皇帝接以師友之恩廙墓爲盗賊所發甚用惻然其子阜素甚清貧今當殯葬其給轜車銘旌賜錢給作藏人功至時遣使者祭之晉賜王沉葬錢并地詔曰故驃騎將軍王沉忠允篤誠執德弘毅外清方夏内熈衮職歴位着稱厥功茂焉不幸薨殞志業未究今當葬其賜錢三十萬葬田一頃晉賜傳嘏夫人鮑葬錢詔曰故太常傳嘏昔以令德賢才爲先帝所接登龍之際有翼賛盡忠之勲早代殯没不終功業毎念其遺績常存於心今嘏夫人鮑當葬賜錢十萬給作藏人功嘏墓開祭以少牢太平御覽卷第五百五十六
