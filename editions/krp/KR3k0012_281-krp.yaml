front:
  text: 太平御覽卷第二百八十一
  hash: sha256:81bedd5796c494c626383004b349394ef4a36fd79884db85465ffd8cacf15dc2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_281-1a}
body:
  text: 兵部十二撫士下唐書曰太宗征遼車駕次遼澤下詔曰日者隋師渡遼時非天賛從軍士卒骸骨相望遍於原野良可哀歎掩骼之義抑惟先典其令並收葬之又曰建中二年田恱攻臨洺守將張伾以軍事連戰巳苦府藏巳竭私産亦罄而賞之不賙乃飾其愛女出示於衆曰室家所有一女而巳請估而給焉軍中感之曰願以一死鬪不敢言賞遂大破之又曰馬燧旣敗田恱以功加右僕射先戰燧誓於軍中戰勝請以家財行賞旣戰盡其私積以頒將士上聞而嘉之乃詔度支出錢五萬貫行賞還其家財㝷加魏博招討使又曰李晟以神䇿軍討朱泚時神䇿軍家族多䧟於泚晟家妻子僅百口亦同䧟泚左右或有言者晟曰乗輿何在而敢言乎泚又間日使人至晟軍則晟小吏王無忌之婿也因無忌以謁晟且曰公家無恙城中有書問以此誘晟晟怒曰尒敢爲賊傳命耶立斬之時轉輸不至盛夏軍士或衣裘褐晟必同勞苦毎以大義奮激士皆涕流感恱卒無離叛者於是軍士皆角力馳騎超踰爲戲晟知可用又曰德宗在梁州山南地偏及夏尤熱將士未給春服上亦御裌服以視朝左右請御衫上曰將士從我者冬服未易我豈可獨衣衫乎將士聞之無不感涕至五月諸道財賦稍至先令給將士衣服而後御衫又曰李光顔爲陳許節度使㑹討呉元濟詔光顔以夲軍獨當一靣光顔性忠義善撫養士卒士卒樂爲用毎戰甚苦及賊將鄧懷金以郾城兵三千人降光顔益堅平賊之志時韓弘爲汴帥驕矜倔強常恃賊勢索朝廷姑息且惡光顔力戰隂圖撓屈計無所施遂舉大梁城求得一美婦人教以歌舞絃管六愽之藝飾之以珠翠金玉衣服之具計費凢數百萬命使者送遺光顔兾光顏一見恱惑而怠於軍政也使者即賫書先造光顔戰壘曰夲使令公德公私愛憂公暴露欲進一妓以慰公征役之思謹以候命光顔曰今日巳暮明旦納焉詰朝光顔乃大宴軍士三軍咸集命使者進妓妓至則容止端麗殆非人間所有一座皆驚光顔乃於座上謂來使曰令公憐光顔離家室乆捨美妓見贈誠有以荷德也然光顔受國恩深誓不與逆賊同生日月下今戰卒數萬皆弃妻子蹈白刃光顔奈何獨以女色爲樂言訖涕泣嗚咽堂下兵士數萬皆感激流涕乃厚以縑帛酬來使俾令領其妓自席上而迴仍謂使者曰爲光顔多謝令公光顔事君許國之心死無貳矣明日遂大戰兵士無不一當百終殄蔡孽光顔功㝡居多又曰令狐楚爲汴州刺史汴軍素驕累逐主帥前使韓弘兄弟率以峻法繩之人皆偷生未能革志楚長於撫理前鎭河陽代烏重胤重胤移鎮滄州以河陽軍三千人爲牙卒咸不願從中路叛歸又不敢歸州聚於境上楚𥘉赴任聞之乃疾驅赴懷州潰卒亦至楚單騎喻之咸令櫜弓解甲用爲前驅卒不敢亂及蒞汴州解其酷法以仁惠爲治去其太甚軍民感恱翕然從化後竟爲善地又曰栁公綽鎭鄂州時呉元濟叛公綽請討之鄂軍旣在行營公綽時令左右省問其家如疾病養生送死必厚廪給之軍士之妻冶容不謹者沉之于江行卒相感曰中丞爲我軰知家事何以報效故鄂人戰毎剋捷又曰鄭從讜爲北都留守舊府城都虞候張彦球者前帥令率兵三千逐沙陁於百井中路而還縱兵破鑰殺故帥康傅圭及從讜至搜索其魁誅之知彦球善有方略召之開喻坦然無疑悉以兵柄委之又曰烏重㣧爲長帥赤心奉上能與下同甘苦所至立功未甞矜伐而善待寮佐體分周密曲盡禮敬故當時名士咸願依焉殁數日有軍士二十餘人皆割股肉以祭重㣧古之良將無以加也三國典略曰北齊斛律光雖居大將未甞戮人軍士未安終不入幕寒不服裘夏不操扇所得果糒徧分麾下號令不過數句言皆切要毎戰居險爲士卒先有士卒中蠱親嘗其唾三軍感之樂爲致命戰國䇿曰魏以呉起爲將與士卒最下者同衣食卧不設席行不騎乗親羸糧與士分勞羸音盈卒有病疽者呉起爲吮疽七余反卒母聞而哭之或謂之曰母子卒也而將軍自吮其疽何哭矣母曰非然也往年呉公吮其父父戰不旋踵遂死於敵今又吮此子妾不知其所死處矣是以哭之於是擊秦拔其五城吕氏春秋曰勾踐苦㑹稽之耻欲深得民心必致死於呉有酒流之江與人同有甘肥不分不敢食又曰昔秦繆公乗馬而車爲敗右服失而野人取之四馬車兩馬在中爲服詩曰兩服上襄兩在邊爲驂繆公自徃求焉見野人方將食之於歧山之陽繆公笑曰食駿馬之肉不還飲酒余恐其傷汝也偏飲而去之處一年爲韓原之戰晉人巳環繆公之車矣晉梁由靡巳扣繆公之左驂矣扣持晋惠公之右路右奮役而擊繆公其甲之抎者巳六扎矣抎者配隕也文有所失也野人之甞食馬肉者三百有餘人畢力爲繆公疾鬪於車下遂大克晋反獲惠公以歸此詩所謂君子正以行徳愛人則寛以盡其力人主胡可不務行德愛人行徳愛人則民親其上皆樂爲其死符子曰秦穆公伐晉及河將勞師而醪唯飲一鍾蹇叔曰一米可投河而釀也穆公乃以一醪投河三軍醉矣三略曰夫將之爲帥者必同滋味共安危人有遺一簞之醪者使投諸河令士衆向流而挹之夫一簞之醪不能味一河然而三軍之士思爲之死者何也以滋味及巳也又曰用兵之要在於崇禮而重禄崇髙也禄廪食也崇禮則賢士至重禄則戎士輕死賢士至謂若燕禮郭隗而樂毅之徒鱗集也故曰重賞之下必有死夫又曰良將之統軍也恕巳活人推惠施恩士力日親戰如風發攻如河決淮南子曰古人善將者必以其身先之暑不張蓋寒不𬒳裘所以均寒暑也隂陽不乗上陵必下所以齊勞佚也軍食熟然後敢食軍井通然後敢飲所以同飢渇也合戰必立矢射之所及以其安危也故良將之用兵也常以積德擊積怨以積愛擊積憎何故而不勝主之所求於民者二求民爲之勞也欲民爲之死也民之所望於主者三飢者能食之勞者能息之有功者能德之民巳償其二責而失其三望國雖大兵猶且弱也又曰苦者必得其樂勞者必得其利斬首之功必全死事之後必賞死事以軍事死賞其後子孫也四者旣信於民矣主雖射雲中之鳥而釣深淵之魚彈琴瑟聲鍾竿敦六博敦致也投髙嗇兵猶且強令猶且行也是故上足仰則下可用也德足慕則威可立也又曰上視下如子則下事上如父上視下如弟則下事上如兄夫上視下如子則必王四海下事上如父則必正天下上視下如弟則不難爲之死下事上如兄則不難爲之亡是故父子兄弟之宼不可與鬪者積恩先施也故四馬不調造父不能以致逺弓矢不調羿不能以必中君臣乖心則孫子不能以應敵孫子名武呉王闔閭之將也是故内脩其政以積其德外塞其醜以服其威察其勞佚以知其飽飢故戰日有期視死若歸故將必與卒同甘苦共飢寒故其死可得而盡也說苑曰楚莊王賜羣臣酒多燈燭滅乃有人引美人衣者美人援絶其冠纓吿王曰今者燭滅有引妾衣者妾援得其冠纓持之趣火來上視絶纓者曰賜人酒使醉失禮奈何欲顯婦人之節而辱士乎乃命左右曰今日與寡人飲不絶冠纓者不懽羣臣百有餘人皆絶去其冠纓而上火卒盡懽而罷居二年晋與楚戰有一臣常在前五合五獲首却敵卒得勝之莊王怪而問曰寡人德薄又未嘗異子子何故出死不疑如是對曰臣當死徃者醉失禮王隱忍不暴而誅也臣終不敢以䕃蔽之德而不顯報王也常願肝腦塗地用頸血濺敵乆矣臣乃夜絶纓者也遂斥晉軍楚得以強此有隂德者必有陽報也又曰平原君旣歸趙楚使春申君將兵救趙魏信陵君亦矯奪晉鄙軍徃救趙未至秦急圍邯鄲邯鄲急且降平原君患之甚邯鄲傳舎吏子李談謂平原君曰君不憂趙亡乎平原君曰趙亡即勝虜何爲不憂李談曰邯鄲之民炊骨易子而食之可謂至因而君之後宫百數婦妾荷綺縠厨粮餘梁肉士民兵盡或剡木爲矛㦸而君之器物鍾磬自恣若使秦破趙君安得有此使趙而全君誠能令夫人以下徧於士卒間分功作之家所有盡散以饗士方其危苦時易惠耳於是平原君如其計而勇敢之士三千人皆岀死因從李談赴秦軍爲却三十里亦㑹楚魏救至秦軍遂罷李談死封其父爲侯列女傳曰楚子反攻秦軍絶粮使人請於王因問其母母問使者曰士卒無恙乎使者曰士卒分菽粒而食之又問曰將軍無恙乎對曰將軍朝夕蒭豢黍梁子反破秦軍而歸母閉門不内使數之曰子不聞越王勾踐之伐呉耶客有獻醇酒一器者王使人注上流使卒飲下流味不加喙而士卒戰自五也異日又有獻一囊糒王又使以賜軍士分而食之甘不踰嗌而戰自十也今士卒分菽粒而食之子獨
