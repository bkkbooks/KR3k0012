front:
  text: 太平御覽卷第七百四十七
  hash: sha256:d03090839283ea95f5c6a0ce182df0364e2784deda08e58b2b00766a22684901
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_747-1a}
body:
  text: 工藝部四書上釋名曰書庶也紀庶物也亦言著也著之簡編永不滅也說文曰依類象形之謂文形聲相益之謂字著於竹帛之謂書廣雅曰書如紀也易曰上古結繩以治後丗聖人易之以書契百官以治萬民以察蓋取諸夬央决也書契所以决斷万事也家語曰宓子賤字不齊仕魯爲單父令恐君聽用䜛人使巳不得行其政故請君近吏二人與俱至官令二吏書輙掣其手書不善則從而怒之吏患焉辭歸魯子賤曰子書甚不善子勉而歸報於君曰宓子使臣書而掣揺臣肘書惡而又怒臣邑吏皆笑之所以去之而來也君以問孔子孔子曰不齊君子也其材任霸王之佐屈節治單父以自試意者其以此諌乎公寤太息歎曰寡人亂宓子之政而責其善數矣漢書曰陳遵長八尺餘長頭大鼻容貌甚偉略渉傳記贍於文辭性善書與人尺牘主皆藏去以爲榮又曰宣帝時中郎將張彭祖少與帝微時同席研書及帝即尊位彭祖以舊恩封陽都侯又曰田蚡學盤盂諸書孔甲二十六篇雜家書後漢書曰孫敬字文寳少時畫地學書日進焉東觀漢記曰樂成静王黨善吏書喜正文字也魏志曰胡昭善尺牘動見模楷衛覬好古文鳥篆隷草無所不善也晉書曰王羲之甞詣門生家見棐几滑淨因書之真草相半後爲其父刮去之門生驚懊者累日又曰王羲之山隂有道士好養鵝羲之觀焉意甚恱固求市之道士云爲冩道德經當舉羣相贈耳羲之欣然冩畢籠鵝而歸又曰羲之每自稱我書比鍾繇當抗行比張芝猶當鴈行也曽與人書云張芝臨池學書池水盡黒使其人躭之若是未必後之也又曰羲之甞在蕺音戢山老姥持六角竹扇賣之羲之因書其扇各爲五字姥𥘉有愠色乃謂姥曰但言是王右軍書以求百錢姥如其言人􅔡買之他日姥又持扇來羲之笑而不荅又曰王獻之七八歳時學書父羲之從後掣其筆不得歎曰此兒後當復有大名常書壁爲方丈字羲之甚以爲能觀者數百人又曰謝安甞問獻之君書何如君家尊荅曰故當不同安曰外論不尓荅曰人郍得知又曰衛常字巨山轉黄門郎常善草􅊢書爲四體書勢曰昔者在黄帝創制造物有沮側魚切誦蒼頡者始作書契以代結繩蓋覩鳥跡以興思也因而遂滋則爲之字有六義焉一曰指事上下是也二曰象形日月是也三曰形聲江河是也四曰㑹意武信是也五曰轉注老考是也六曰假借令長是也又曰索靖作書狀其辭曰聖皇御丗隨時之冝蒼頡旣生書契是爲科斗鳥篆類物象形叡哲變通意巧滋生損之隷草以崇簡易百官畢脩事業正厲草書之爲狀也婉若銀鈎漂若驚鸞舒翼未發若舉復安䖝虵虬蟉力幽切或徃或還頽阿郍以羸羸欻奮釁而桓桓及其逸遊盻蠁乍正乍邪騏驥暴怒逼其轡海水窳隆揚其波芝草蒲萄還相結棠棣融融反其華玄熊對踞于山岳飛燕相追而差池舉而察之又似乎和風吹林偃草扇樹枝條順氣轉相比附窃嬈奴鳥切廉苫隨體散布紛擾擾以綺靡中持疑而猶豫玄螭狡獸嬉其間騰猿飛鯢相奔趣凌魚奮尾蛟龍反據投空自竄張設㸦距或若登髙望其類或若旣徃而中顧或若倜儻而不羣或若自檢於常度於是多才之英篤藝之彦役心精微躭此文憲守道兼權觸類生變離拆八體靡形不判去䌓存微本象末亂上理開元下周謹按騁辭放手兩行氷散髙音翰厲溢越流漫忽班班而成章言竒妙之煥爛體磥落而壯麗姿光潤以璀璨命杜度運其指使伯英廻其腕著絶勢於紈素垂百丗之殊觀宋書曰劉穆之傳髙祖書素拙穆之曰此雖小事然宣𬒳四逺願公少復留意髙祖旣不能措意又禀分有在穆之乃曰公但縱筆爲大字一字徑尺旣足有所苞且其名亦美髙祖從之一𥿄不過六十字便滿齊書曰太祖善書及登位篤好不巳與王僧䖍賭書畢謂䖍曰誰爲第一僧䖍對曰臣書臣中第一陛下書帝中第一上笑曰卿可謂善自爲謀矣宋書曰謝超宗謂王慈曰卿書可及䖍公慈曰我之不及父猶雞之不及鳯也時人以爲名荅宋書曰江夏王鋒字宣頴髙帝第十三子也四歲好學書畜於母張氏舎張氏無紙乃倚井欄爲書之滿則洗之己而復書如此累月又每晨不肯去䆫塵而就塵書帝甞使學鳯尾詔一學即工帝大恱以玉麒麟賜之曰以麒麟賞鳯尾矣梁書曰武帝論蕭子雲書曰筆力勁駿心手相應巧踰杜度美過崔寔當與元常鍾繇也並驅争先其梁蕭子雲岀爲東陽太守百濟國使人至建業求書逢子雲維舟將發使人於渚次候之望舡三十許歩前行子雲遣問之荅曰侍中尺牘之羙逺流海外今日所求唯在名迹子雲乃爲停舡三日書三十紙與之獲金貨數百萬性恡自非荅餉不書好事者重加賂遺以要其荅又曰顔恊博渉羣書工於草􅊢飛白時吴人范懷約能􅊢書恊學其書殆過真也荆楚碑碣皆恊所書時人有㑹稽謝善勛能爲八體六丈方寸千言京兆韋仲善飛白並在湘東王府善勛爲録事叅軍仲爲中兵叅軍府中以恊優於韋仲而減於善勛善勛飲酒至數升醉後輒張眼大罵雖復貴賤親踈無所擇也時謂之謝方眼而胷襟夷坦有士君子之操焉後魏書曰崔濳爲兄渾誄手筆草夲㑹昌𥘉著作佐郎王遵業買書於市而遇得之計誄至今將二百載寳其書迹深秘藏之武定中遵業子松年以遺黄門郎崔季舒人多摹搨之又曰崔玄伯尤善草􅊢行狎之書爲丗模楷玄伯祖恱與范陽盧諶並以博藝著名諶法鍾繇恱法衛瓘而俱習索靖諶傳子偃偃傳子邈恱傳子濳濳傳玄伯故魏𥘉重崔盧之書唐書曰太宗甞謂侍中魏徵曰虞丗南死後無人可與論書徵曰禇遂良下筆遒勁甚得王逸少體太宗即日召令侍讀甞以金帛購求王羲之書跡天下爭賫古書詣闕以獻當時莫能辯其真僞遂良備論所出一無所誤又曰虞丗南字伯施同郡沙門釋智永智永羲之裔孫善學王羲之書丗南師焉妙得其體由是聲名藉甚又曰栁公權字誠懸㓜嗜學十二能爲詞賦元和𥘉進士擢第釋褐祕書省校書郎李聽鎮夏州辟爲掌書記穆宗即位入奏事帝召見謂公權曰我於佛寺見卿筆蹟思之乆矣即日拜右拾遺充翰林侍書學士遷右𥙷闕司封貟外郎穆宗政僻甞問公權筆何盡善對曰用筆在心心正則筆正上改容知其筆諌也公權𥘉學王書遍閱近代筆法體勢勁媚自成一家當時公卿大臣家碑板不得公權手筆者人以爲不孝外夷入貢皆別署貨貝曰此購栁書上都西明寺金剛經碑備有鍾王歐虞禇陸之體尤爲得意文宗夏日與學士聮句帝曰人皆苦炎熱我愛夏日長公權續曰薰風自南來殿閣生微凉時丁袁五學士皆屬繼帝獨諷公權兩句曰詞清意足不可多得乃令公權題於殿壁字方圎五寸帝視之歎曰鍾王復生無以加焉又曰栁公權大中𥘉轉少師中謝宣宗召昇殿御前書三紙軍容使西門季玄捧硯樞宻使崔巨源過筆一紙真書十宇曰衛夫人傳筆法於王右軍一𥿄行書十一字曰永禪師真草千字文得家法一𥿄草書八字曰謂語助者焉哉乎也賜錦綵缾盤䓁銀器仍令自書謝狀勿拘真行帝尤竒惜之又曰歐陽詢潭州臨湘人也𥘉學王羲之書後更漸變其體筆力險勁爲一時之絶時人得其尺牘文字咸以爲楷範焉髙麗甚重其書甞遣使求之髙祖歎曰不意詢之書名逺播夷狄彼觀其跡固謂其形貌魁梧耶詢形體么麽故髙祖有是言耳又曰歐陽通詢之子也早孤母徐氏教其父書毎遺通錢紿云質汝父書跡之直通慕名甚恱晝夜精力無倦遂亞於詢唐書曰龍朔二年四月上自爲書與遼東諸將謂許敬宗曰許圉師常自愛朕書可於朝堂開示圉師見驚憙私謂朝官曰圉師見古跡多矣魏晉巳後唯稱二王然逸少少力而研子敬研而少力今觀聖跡兼絶二王鳯翥鸞廻實古今書聖又曰太宗甞於晉史右軍傳後論之曰鍾書布纎濃分䟽密霞舒雲卷無所間然但其體古而不今字長而逾制獻之雖有父風殊非新巧䟽痩如陵冬之枯樹槎而無屈伸拘束若嚴家餓隷羈羸而不放縱蕭子雲無丈夫之氣行行如縈春蚓字字若綰秋蛇卧王濛於紙中坐徐偃於筆下以兹播美豈非濫名耶所以詳察古今研精篆素盡善盡美其唯王逸少乎又曰孔若思早孤母禇氏親自敎訓遂以學行知名年少時有人賫禇遂良書跡數卷以遺若思唯受其一卷其人曰此書當今所重價比黄金何不揔取之若思曰若價比金寳此爲多更截去半以還之矣又曰盧知猷器度長厚文詞美麗尤工書一落簡翰人爭摸倣又曰鍾紹京䖍州贑人也𥘉爲司農録事以工書直鳯閣則天時明堂門額九鼎之銘及諸宫殿門牓皆紹京所題又曰王涯旣誅涯家書數萬卷侔於書府前代法書名畫人所保惜者必以厚貨致之不受貨者必以官爵致之厚爲垣竅而藏之覆壁至是人破其垣取之或剔取凾奩金寳之飾與其玉軸而弃之蔡琰別傳曰琰對曹操曰乞給紙筆真草唯命也邴原別傳曰原年五六歳過書舎而泣師曰何泣原曰孤子易傷感夫書者皆有父母也今顧其書故惻然涕零也師哀原言而爲之泣曰欲書不須費也遂就書江偉家傳曰偉性善書人得其手䟽莫不藏之以爲寳神仙傳曰東郭延服靈飛散能夜書言目明又曰王逺字方平東海人也博學尢明天文䜟緯河洛之要逆知天下盛衰之期漢桓帝聞之連徴不岀使郡國逼載詣京師低頭閇口不肯荅乃題官門扇四百餘字皆說方來帝甚恐之使刮去外字復見墨皆徹入版裏石虎鄴中記曰石虎有馬妓着朱衣進賢冠立於馬上馬走而作書字皆端正永嘉郡記曰昔王右軍遊永嘉經於惡道右軍書南邊大石今猶見墨跡而字不甚了了抱朴子曰英葱實天雄鶴腦服之令人夜書孫卿子曰作書者衆而蒼頡獨傳用心一也淮南子曰昔蒼頡作書而天雨粟鬼夜哭髙誘日有書契作詐僞萌生去本趣未弃耕墾之業而務筆刀之利天知其將餓故爲雨粟也鬼恐爲文所劾故哭也鬼或作兔兔恐有取毫是筆害及之故哭又曰明月之光可以逺望而不可以細書也慎子曰書契所以識公信也隋巢子曰史皇産而能書三輔決録曰韋誕字仲將除武都太守以書不得之郡轉侍中典作魏書號散騎書一名大魏書凡五十篇洛陽鄴許三都宫觀始就命誕銘題以爲永制以御筆墨皆不任用因奏曰夫工欲善其事必先利其器用張芝筆左伯紙及臣墨兼此三具又得臣手然後可以逞徑丈之勢方寸千言俗說曰桓玄取羊欣爲征西行軍叅軍玄愛書呼欣就坐仍遣信呼顧長康與共論書至夜良乆乃罷丗論曰鍾㑹有異志宻白鄧艾有反狀又會善效人書於劒閣要艾章表皆易其言令倨傲多有矜伐以疑之論衡曰夫河出圖雒與洛同出書聖帝明王之瑞應也蒼頡作文字筆與天地同指與鬼神合何悪而致雨粟鬼哭之恠哉又曰書官諱丙日云蒼頡以丙日死也丗說曰韋仲將善書魏明帝起殿安牓使仲將登梯題之旣下頭髮皓然因是勑誡兒孫勿復學書王升之懷舊序曰余與從甥孫道濟交好特至昔寓荊州同處一室冬多閑暇長共學書余収而録之欲以爲索居之愛道濟因記紙末曰舅還山之曰覽此相存閑書見其手跡皎若平日悽悵傷心太平御覽卷第七百四十七
