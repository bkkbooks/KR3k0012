body:
  text: 皇王部三十八唐德宗孝文皇帝朱泚附順宗安皇帝德宗孝文皇帝唐書曰德宗孝文皇帝諱适代宗長子母曰睿真皇后沈氏天寳元年四月癸巳生於長安東宫其年十二月拜特進封奉節郡王代宗即位之年五月以上爲天下兵馬元帥改封魯王八月改封雍王廣德二年二月立爲皇太子大暦十四年五月辛酉代宗崩癸亥即位於太極殿六月巳亥朔御丹鳯樓大赦天下八月以門下侍郎平章事崔祐甫爲中書侍郎平章事以道州司馬同正楊炎爲門下侍郎平章事乙巳遣太常少卿韋倫使吐蕃以蕃俘五百人還之示修好也冬十月吐蕃合南蠻之衆號二十萬三道㓂茂州扶文黎雅等州連䧟郡邑發禁兵四千助蜀大破之十二月乙夘立宣王誦爲皇太子建中元年春正月丁夘朔御含元殿改元建中羣臣上尊號曰聖神文武皇帝巳巳朝太清宫庚午謁太廟辛未有事於郊丘還宫御丹鳯門大赦天下自艱難以來徴賦名目頗多今後除兩稅外輒率一錢以枉法論二年三月築汴州城𥘉大暦中李正巳有淄青齊海登萊沂宻德棣曹濮兖鄆十五州之地李寳臣有恒定易趙深兾滄七州之地田承嗣有魏博相衛洺貝澶七州之地梁崇義有襄鄧均房復郢六州之地各聚兵數萬始因叛亂得立雖朝廷寵待加恩心猶疑貳皆連衡盤結以自固先是汴州以城隘不容衆請廣之至是築城五月景寅以軍興十一而稅冬十一月尚書左僕射楊炎貶崖州司馬尋賜死三年四月封朱滔爲通義郡王朱滔王武俊與田恱合從而叛十一月朱滔田恱王武俊於魏縣軍壘各相推獎僣稱王號署官名如國𥘉親王行臺之制丁丑李希烈自稱天下都元帥太尉建興王與朱滔等四盗膠固爲逆四年春正月鳯翔節度使張鎰與吐蕃宰相尚結賛同盟于清水庚寅李希烈䧟汝州執州將李元吉而去東都震駭甲午遣顔真卿宣慰李希烈軍八月丁未李希烈率衆三萬攻哥舒曜於襄城東都危急冬十月詔涇原節度使姚令言率涇原之師救哥舒曜丁未涇原軍出京城至滻水倒戈謀叛姚令言不能禁止上令載繒綵二車遣普王往慰諭之亂兵已陣于丹鳯闕下促神䇿軍拒之無一人至者上與太子諸王妃主百餘人出苑北門右龍武軍使令狐建方教射於軍中聞難聚射士得四百人扈從其夕至咸陽飰數匕而過戊申至奉天己酉元帥都虞候渾瑊以子弟家屬至乃以瑊爲行在都虞候亂兵旣剽京城屯於白華乃於晉昌里迎朱泚爲帥稱太尉居含元殿上以奉天隘欲幸鳯翔壬子鳯翔軍亂殺節度使張鎰乃止癸丑李希烈䧟襄城哥舒曜走洛陽丁巳邠寧節度韓遊瓌與論惟明率兵三千至纔入奉天賊軍亦至乃出拒之王師不利賊攻城愈急矢石雨下死傷者衆人心危蹙上與渾瑊對泣朱泚據乾陵作樂下瞰城中辭多侮慢戊子朔方節度使李懷光遣兵馬使張韶奉表言大軍將至乃令舁韶廵城叫呼歡聲動地賊不之測疑懼緩攻癸巳懷光軍次醴泉是夜賊解圍而去神䇿將李晟自定州率師赴難軍於渭橋興元元年春正月上在奉天詔曰克致興化必在推誠忘巳濟人不恡改過朕嗣服丕搆君臨萬邦失守宗祧越在草莽不念率德誠莫追於旣徃永言思咎期有復於將來明徴其義以示天下予小子懼德不嗣罔敢怠荒然以長於深宫之中暗於經國之務積習易溺居安忘危不知稼穡之艱難不䘏征戍之勞苦澤靡下究情不上通事旣擁隔人懷疑阻猶昧省已遂用興戎徴師四方轉餉千里賦車藉馬逺近騷然行賫居送衆庻勞止力役不息田萊多荒暴令峻於誅求疲民空於杼軸轉死溝壑離去郷閭邑里丘墟人煙斷絶天譴於上而朕不寤人怨於下而朕不知馴致亂階變起都邑賊臣乗釁肆逆滔天曽莫愧畏敢行凌偪萬品失序九廟震驚上累于祖宗下負于蒸庻痛心􅌤靣罪實在予永言愧悼若墜泉谷頼天地降祐人祗叶謀將相竭誠瓜牙宣力羣盗斯屏皇維載張將弘永圖必布新令朕晨興夕惕惟省前非乃者公卿百寮用加虚美以聖神文武之號𬒳蒙暗寡昧之躬固辭不獲俯遂羣議昨因内省良所瞿然自今已後中外書奏不得言聖神文武之號今上元統暦獻歳發祥冝革紀年之號式敷在宥之澤可大赦天下改建中五年爲興元元年李希烈田恱王武俊李納咸以勲舊繼守藩條朕撫馭乖方致其疑懼皆由上失其道而下罹其灾一切並與洗滌復其爵位待之如𥘉仍即遣使宣諭朱滔以泚連坐路逺必不同謀永念舊勲務存弘貸如能効順亦與惟新朱泚反易天常盗竊名器暴犯陵寢所不忍言獲罪祖宗朕不敢赦除泚外並從原宥二月甲子加連城郡王李懷光太尉仍賜䥫劵赦三死罪懷光怒曰凢人臣反逆乃賜䥫劵恕以不死今懷光是反定矣因投之於地上聞懷光將叛令翰林學士陸贄往慰諭之其詞禮益倨悖尋李晟自咸陽移兵東渭橋避懷光也晟以懷光反狀巳明請上幸蜀丁夘車駕幸梁州留戴休顔守奉天三月懷光燒營走歸河中庚寅車駕次城固壬辰至梁州四月辛丑朔時將士未給春衣上猶夾服漢中早熱左右請御暑服上曰將士未易冬服獨御春衫可乎俄而貢物繼至先給諸軍而始御之五月李晟自渭北移軍於光㤗門外賊來薄我軍士奮擊大敗之斬馘千計戊戍晟列陣於光㤗門外遣騎將史萬頃往神䴥村開苑牆二百餘歩賊樹柵當之我軍争拔柵與賊血戰賊黨大敗追擊至白華朱泚姚令言率衆萬餘遁去晟收復京城是日渾瑊與戴休顔亦破賊三千於咸陽韓遊環追朱泚於涇州六月李晟上收城露布上覽之涕下霑襟涇州田希鑒斬姚令言幽州軍士韓旻於彭原斬朱泚並傳首至行在乙巳遣吏部侍郎班宏入京宣慰六月戊午車駕發興元秋七月景子次鳯翔府壬午至自興元辛夘御丹鳯樓大赦天下九月丁亥上頋謂宰臣曰今大盗雖除時猶多難冝廣延納以逹下情近日諌官都無論奏自今每正衙及延英坐日常令朝臣三兩人面奏時政得失庻有弘益也貞元元年正月丁酉朔御含元殿受朝賀禮畢宣制大赦天下改元時關東大飢賦調不入國用益窘關中飢民蒸蝗虫而食之五月分命朝臣禱羣神以祈雨蝗自海而至羣飛蔽天每下則草木及畜毛無復子遺榖價騰踊九月朔方大將牛名俊斬李懷光傳首闕下馬燧收復河中十月上御正殿䇿賢良方正能直言極諌等三科舉人十一月癸夘上親祀昊天上帝於圎丘禮畢御丹鳯樓大赦天下二年四月景寅淮西李希烈爲其牙將陳仙竒所酖并誅其妻子仙竒以淮西歸順九月乙巳吐蕃㓂好畤京師戒嚴李晟部將王佖擊吐蕃於汧陽城敗其中軍辛亥㓂鳯翔李晟出師禦之一夕而退冬十月李晟柭吐蕃摧沙堡十一月冊淑妃王氏爲皇后丁酉右崩謚曰昭德辛丑吐蕃䧟鹽州三年三月河東馬燧來朝時吐蕃相結賛使大將論頰熱卑辭厚意告馬燧請兩國同盟上疑其不誠不允故燧自將論頰熱入朝盛言蕃相請盟可以保信上從之五月辛未侍中渾瑊與吐蕃宰相尚結賛同盟于平凉爲蕃兵所刧瑊遁而獲免崔漢衡巳下將吏䧟没者六十餘人四年春正月上御丹鳯樓大赦天下京師地震辛亥又震壬子又震甲寅地震宴群臣於麟德殿巳朱地震丁夘有司條奏省官其左右常侍太子賔客請依前置四貟從之壬戍加置諌議大夫八貟分中書四貟爲右門下四貟爲左是月吐蕃㓂涇邠寧鄜慶等州焚彭原縣邊將閉城自固賊驅人畜三萬計九二旬而退五年春正月乙夘詔自令冝以二月一日爲中和節以代正月晦日備三令節數内外官司休假一日二月庚子以大理卿董晉爲門下侍郎同平章事以御史中丞竇參爲中書侍郎平章事兼轉運使六年春正月大雪二月戊辰朔百寮㑹宴於曲江亭上賦中和節群臣賜宴詩七韻是日百僚進兆人本業三卷八年四月乙未貶中書侍郎平章事竇參爲郴州別駕以尚書左丞趙憬兵部侍郎陸䞇並爲中書侍郎同中書門下平章事八月以天下水灾命朝臣宣撫賑貸河南河北山南江淮凢四十餘州大水漂溺死者二萬餘人九年正月癸夘𥘉稅茶歳得錢四十萬貫從鹽鐵使張滂所奏茶之有稅自此始五月乙巳韋皐破吐蕃峨和城定廉城通鶴軍凡平堡五十餘所冬十月環王國獻犀牛上令見于太廟十年冬十月御宣政殿試賢良方正能直言極諌等舉人十二月貶中書侍郎平章事陸贄爲太子賔客十二年三月以户部侍郎裴延齡爲户部尚書六月𥘉置左右護軍中尉十三月乙未大雪平地二尺竹栢多死環王國所獻犀牛是冬凍死上著刑政箴一首癸未廻紇南詔劒南西山八國女國王並來朝賀十三年春正月吐蕃賛普遣使修好塞上以聞上以犬戎負約不受其使十六年春正月恒兾易定陳許河陽四鎮之師與賊戰皆不利而退二十一年春正月御含元殿受朝賀是日上不康癸巳㑹羣臣於宣政殿宣遺詔皇太子冝於柩前即位是日崩於㑹寧殿享壽六十四謚曰神武孝文皇帝廟號德宗葬崇陵朱泚附唐書曰朱泚幽州昌平人曽祖利賛善大夫贈禮部尚書祖思明太子洗馬贈太子太師父懷珪天寳𥘉事范陽節度使裴寛爲衙前將授折衝將軍及安禄山史思明反叛累爲管兵將寳應中李懷仙歸順奏爲薊州刺史平盧軍留後栁城軍使卒贈左僕射泚以父資從軍㓜壯偉腰帶十圍騎射武藝亦不出人外若寛和中頗忍忌然輕財好施每征戰所得賞物輒分與麾下將士以是爲衆所推故得濟其兇謀𥘉隷李懷仙爲十將改經略副使朱希採旣殺李懷仙自爲節度以泚宗姓甚委信之希彩爲政苛酷人不堪命大暦七年秋竟爲孔目官李懷瑗所殺倉卒之際未有所從泚營在城北弟滔主衙内兵亦得衆心滔變詐多端潜使可餘人於衆中大言曰節度使非城北朱副使莫可衆旣無從因共推泚泚遂權知留後遣使奉表京師十月拜檢校左散騎常侍兼御史中丞幽州盧龍節度等使八年三月遷幽州盧龍節度等使幽州長史兼御史大夫其年泚上表令弟滔率兵二千五百人赴京西防秋代宗嘉之手詔褒美九年就加檢校户部尚書賜實封百户幽州及河北諸鎮自天寳末便爲逆亂之地李懷仙朱希彩與連境三節度名雖向順未甞朝謁至是泚率先上表請自領部騎三千人入覲詔修甲第以待之九月泚至京師代宗御内殿引見賜御馬兩疋戰馬十疋金銀錦綵甚厚又以器物十牀馬四十疋絹二萬疋衣一千七百襲賜其將士宴犒之盛近時未有泚又上表請留京師從之因授其弟滔兼御史大夫幽州節度留後仍以河陽永平軍防秋兵郭子儀統之决勝軍楊猷兵李抱玉統之淮西鳯翔兵馬璘統之汴宋淄青兵俾泚統焉十一年八月加拜同平章事尋令出鎮奉天行營復賜金銀繒綵并内庫弓箭以寵之十二年加檢校司空代李抱玉爲隴右節度使權知河西澤潞行營兵馬事德宗嗣位加太子太師鳯翔尹實封至三百户建中元年涇州將劉文喜阻兵爲亂加泚四鎮北庭行軍涇原節度使與諸軍討伐涇州平加泚中書令還鎮鳯翔而以舒王謨遥領涇原節度二年又加泚太尉朱滔將反叛隂使人與泚計議以帛書内蠟丸中置髪髻間河東節度馬燧捜獲之以聞并送帛書及所遣使泚惶懼頓首乞歸罪有司上勉之曰千里不同謀非卿之過三年四月以張鎰代泚爲鳯翔隴右節度留後留泚京師加實封至一千户與一子正貟官其幽州盧龍節度太尉中書令並如故四年十月涇原兵叛鑾駕幸鳯天叛卒等以泚甞統涇州知其失權廢居怏怏思亂羣㓂無帥幸泚政寛乃相與謀曰朱太尉乆囚空宅若迎而爲主事必濟矣姚令言乃率百餘騎迎泚於進昌里第泚乗馬擁從北向燭炬星羅觀者萬計入居含元殿明日移處白華但稱太尉朝官有謁泚者悉勸奉迎鑾駕旣不合泚意皆逡廵而退源休至遂屏人移時言多悖逆又盛陳成敗稱述符命勸其僣僞泚甚恱之又李忠臣張光晟繼至咸以官閑積憤樂於禍亂鳯翔涇原大將張庭芝叚誠諌以潰卒三千餘自襄城而至賊泚自謂衆望所集僣竊之心自此而定乃以源休爲京非尹判度支李忠臣爲皇城使叚秀實乆失兵柄故推心委之遂發銳師三千言奉迎乗輿實隂有逆謀秀實與劉海賔謀誅泚且慮叛卒之震驚法駕乃潜爲賊符追所發兵至六日兵乃駱驛而廻因與海賔同入見泚爲陳逆順之理而海賔於靴中取匕首爲其所覺遂不得前秀實知不可以義動遽奪源休象笏挺而擊泚仍大呼曰反虜當斬泚舉臂衛首秀實格拉之恟恟然李忠臣馳助泚泚素多力纔破其靣逆徒譟集秀實海賔遂併見害明日聲言以親王權主社稷士庻競往觀之八日源休姚令言李忠臣張光晟等八人導泚自白華入宣政僣即僞位自稱大秦皇帝號應天元年愚智莫不憤怒侍衛皆卒伍寮吏行列不過十餘人下僞詔曰幽囚之中神器自至豈朕薄德所能經營彭偃之詞也僞署姚令言爲侍中李忠臣爲司空兼侍中源休爲中書侍郎平章事判度支蔣鎮爲吏部侍郎樊系爲禮部侍郎儀禮使許季常爲京北尹洪經綸爲太常少卿彭偃爲中書舎人裴揆崔㓜真爲給事中崔宣爲御史中丞張光晟仇敬忠敬釭張寳何望之叚誠諌張芝杜如江爲節度使仍以其兄子遂爲太子遥封弟滔爲兾王太尉尚書令尋又號皇太弟十月泚自領兵侵逼奉天竊威儀輦輅闐隘道途蟻聚之衆軍勢頗盛以姚令言爲元帥張光晟爲副以李忠臣爲京兆皇城留守居中書省尋以蔣鎮爲門下侍郎李子平爲諌議大夫並平章事泚軍合於城下渾瑊韓遊瓌禦之泚衆大敗死者萬計泚收軍於奉天東三里下營大修攻具明日泚又分兵營於乾陵下瞰城内大震十一月三日杜布全與泚衆戰於莫谷官軍不利自是賊衆驕怠王師乗城而戰人百其勇賊多敗衂或出野戰官軍又獲利焉泚乃大驅百姓填壍夜攻城城中設竒以應之賊乃退縮西明寺僧法堅有巧思爲泚造雲梯十五日辰時梯臨城東北隅城内震駭渾瑊侯仲莊設火坑爲地道䧟之又縱火焚其梯東風起吹我軍衆頗危俄而風廻吹賊軍瑊益薪潑油鼓齊震風火俱熾湏臾雲梯與兇黨同爲灰燼城中三門悉出兵王師又捷其夜兵復出攻泚衆敗績李懷光以五萬人來援自河北至泚衆惶駭因而潰長圍遂解衆以爲懷光三日不至城則危矣二十日夜泚走至京城時姚令言於城造戰格抛樓每坊團練人心大擾泚自奉天廻乃悉令去之日攻戰吾自有計前此每三五日即使人僞自城外來周走號令曰奉天已破百姓聞之莫不飲泣道路閴寂時有入臺省吏人不過十數輩郎官六七人而亦令依常年舉選𥘉有數十人陳狀旬日亦皆屏退泚自號其宅曰潜龍宫悉移内庫珍寳以實之識者曰易稱潜龍勿用此敗徴也無幾百姓剽奪其珍寳泚不能禁止明年正月一日泚改僞國號曰漢稱天皇元年二月李懷光旣圖叛逆遣使與泚通和鑾駕幸梁洋自此衣冠之潜匿者出授僞官十七八焉懷光𥘉與泚徃復通好甚宻以錢榖金帛㸦相饋遺泚與書事之如兄約云削平關中當割據山河永爲隣國及懷光决計背叛逼乗輿遷幸泚乃下僞詔書待懷光以臣禮仍徴兵馬懷光旣爲所賣慙怒㥽恥遂領衆遁歸河中三月李晟駱元光尚可孤之衆悉於城東累敗泚衆四月泚使韓旻宋歸朝張庭芝等㓂武功渾瑊以衆及吐蕃論莽羅大敗旻歸朝殺逆黨萬餘人於武亭川五月泚又使仇敬忠㓂藍田尚可孤擊之大破泚衆擒敬忠斬之李晟駱元光尚可孤悉還師齊進晟屯光㤗門逆徒拒官軍王師累捷二十八日官軍入苑收京師逆黨大潰泚與姚令言張庭芝源休李子平朱遂以數千人西走其餘黨或奔竄或來降泚衆縁路潰散乃奔涇州纔百餘騎而巳田希鑒閉門登陴泚令謂希鑒曰我與爾節度何故背恩希鑒乃使人自城上擲泚所送旌節於外續又投火焚之泚遂過數里息於逆旅泚將梁庭芬入涇州說田希鑒曰我公比日殺馮河清背叛今雖歸順國家必不能乆容公他日不免受禍何如開門納朱公與共成事希鑒以爲然庭芬乃追及朱泚言之泚大恱使庭芬却往涇州庭芬請授巳尚書平章事泚不從庭芬旣求宰相不得不復往涇州從泚至寧州彭原縣西城屯與泚心腹朱惟孝共射泚泚走墜故窖中泚左右韓旻薛綸髙幽巖武震朱進卿董希芝共斬泚使宋應傳首以獻泚死時年四十三姚令言投涇州源休李子平走鳯翔尋並斬獲宋歸朝之敗武功降於李懷光送興元斬之唯不獲朱遂傳爲野人所殺或云與泚子壻爲金吾將軍馬恱潜走党項部落數月得逹幽州泚之僣逆官竪朱重曜頗親宻用事泚每呼之爲兄時賊中以臘月大雨僞星官謂泚曰當以宗中年長者禳其災變泚乃毒殺重曜以王禮葬焉及京師平出其尸而斬之順宗安皇帝唐書曰順宗安皇帝諱誦德宗長子母昭德皇后王氏上元二年正月生於長安之東内大暦十四年封宣王建中元年正月立爲皇太子貞元二十一年正月癸已德宗崩景申即位於太極殿上自二十年九月風病不能言曁德宗不豫諸王親戚皆侍醫藥獨上卧病不能侍德宗弥留思見太子涕咽乆之大行發䘮人情震懼上力疾縗服見百僚於九仙門旣即位知社稷有奉中外始安庚子羣臣上書請聽政二月以吏部郎中韋執誼爲尚書右丞同中書門下平章事壬寅以太子侍書翰林待詔王伾爲左散騎常侍充翰林學士以將仕郎前蘇州司功參軍翰林待詔王叔文爲起居舎人充翰林學士甲子御丹鳯樓大赦天下三月癸酉詔冊廣陵郡王淳爲皇大子改名純赦京城繫囚以給事中陸質中書舎人崔樞並爲太子侍讀七月詔朕承九聖之列荷萬邦之重頋以寡德渉道未明䖍恭畏懼不克負荷恐上墜祖宗之訓下貽卿士之憂夙夜祗勤如臨淵谷而積疾未復至于經時怡神保和常所不暇永惟四方之大萬務之殷不躬不親慮有曠廢加以山陵有日霖潦踰旬是用儆于朕心以荅天戒其軍國政事冝令皇太子勾當時上乆疾不復延納宰臣共論大政事無巨細皆决於李忠臣王伾王叔文物論諠雜以爲不可藩鎮屢上牋於皇太子指三竪之撓政故有是詔以太常卿杜黄裳爲門下侍郎左金吾衛大將軍袁滋爲中書侍郎並同中書門下平章事皇太子見百寮於朝堂八月庚子詔惟皇天祐命烈祖誕受方國九聖儲祉萬邦咸休肆予一人獲纉丕業嚴恭守位不遑暇逸而天祐不降疾恙無瘳將何以奉宗廟之靈展郊禋之禮疇兹庻尹對越上玄内媿于朕心上異于天命夙夜祇慄深惟永圖一日萬機不可以乆曠天工人代不可以乆違皇太子純睿哲温文寛和仁惠孝友之德愛敬之誠通乎神明格于上下是用法皇王至公之道遵父子傳歸之制付之重器以撫兆人必能宣祖宗之重光荷天地之休命奉若成憲永綏四方冝今皇太子即皇帝位朕稱太上皇居興慶宫制稱誥辛丑誥有天下傳歸於子前王之制也欽若大典斯爲至公式揚耿光用體文德朕獲奉宗廟臨御萬方降疾不瘳庻政多闕乃命元子代子守邦爰以令辰光膺冊禮冝以今月九日冊皇帝於宣政殿國有大命恩俾惟新冝因紀元之慶用覃在宥之澤冝改貞元二十一年爲永貞元年天下死罪降從流巳下遞減一等立良娣王氏爲太上皇后良媛董氏爲太上皇德妃壬寅貶王伾爲開州司馬王叔文爲渝州司户元和元年正月景寅朔皇帝率百寮上太上皇尊號曰應乾聖壽甲申太上皇崩于興慶宫之咸寧殿享年四十六謚曰至德大聖大安孝皇帝廟號順宗葬于豐陵史臣韓愈曰順宗之爲太子也留心藝術善隷書德宗工爲詩每賜大臣方鎮詩制必命書之性寛仁有斷禮重師傅必先致拜從幸奉天賊泚逼迫常身先禁旅乗城拒戰督勵將士無不奮激德宗在位歳乆稍不假權宰相左右倖臣如裴延齡李齊運韋渠牟等因間用事刻下取功而排䧟陸贄張滂輩人不敢言太子從容論諍故卒不任延齡渠牟爲相甞侍宴魚藻宫張水嬉綵艦雕靡宫人引舟爲櫂歌絲竹間發德宗歡甚太子引詩人好樂無荒每對於敷奏未甞以顔色假借宦官居儲位二十年天下隂受其賜惜乎寢疾踐祚近習弄權而能傳政元良克昌運祚賢哉太平御覽卷第一百一十三
