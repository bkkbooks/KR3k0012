front:
  text: 太平御覽卷第四百一十八
  hash: sha256:38d66fe5e7b6afee47c71b983345fffb1ab43358727529ed0aef39ac98d8fa97
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_418-1a}
body:
  text: 人事部五十九忠貞管子曰忠者臣下之髙行孟子曰教人以善謂之忠淮南子曰交淺而言深是忠也抱朴子曰竭身命以徇國經夷險而一節者忠臣也說苑曰逆命利君謂之忠又曰卑身賤體夙興夜寐進賢不懈數稱徃古之行事以厲主意庶幾有益以安國家如此者忠臣也禮記文王丗子曰爲人臣者殺其身有益于君則爲之又檀弓曰公叔文子卒其子戍請謚於君君曰昔者衛國有難夫子以其死衛寡人不亦貞乎左傳隱公曰衛州吁弑桓公石厚從州吁如陳石碏使告于陳曰此二人者實弑寡君敢即圗之陳人執之而請莅于衛君子曰石碏純臣也惡州吁而厚與焉大義㓕親其是之謂乎又僖公上曰晉獻公使荀息傳奚齊公疾召之曰以是藐諸孤言其㓜賤與諸子縣藐辱在大夫其若之何對曰臣竭其股肱之力加之以忠貞公曰何謂忠貞對曰公家之利知無不爲忠也送徃事居耦俱無猜貞也又曰僖公中曰晉惠公卒懷公立命從亡人亡人重耳期朞而不至無赦狐突之子毛及偃從重耳在秦不召懷公執狐突曰子來則免對曰子之能仕父教之忠古之制也䇿名委質貳乃辟也貳二心辟罪也今臣之子名在重耳有年數矣若又召之教之貳也父教子貳何以事君又宣公上曰楚子滅若敖氏令尹子文其孫箴尹克黄箴尹官名使於齊還及宋聞亂其人曰不可以入矣其人克黄從臣箴尹曰棄君之命獨誰受之遂歸復命而自拘於司敗又襄公二年曰楚子囊將死遺言謂子庚必城郢楚徙都郢未有城郭君子謂子囊忠君薨不忘増其名謂前年謚君爲恭也將死不忘衛社稷可不謂忠乎忠民之望也又曰晉人執季文子舎之於苕丘范文子謂欒武子曰季孫於魯相三君矣妾不衣帛馬不食粟可不謂忠乎韓詩外傳曰有大忠有次忠有下忠以道覆君而化之大忠也以德調君而輔之次忠也以是諌非而死之下忠也周公於成王可謂大忠管仲於桓公可謂次忠也子胥於夫差可謂下忠也又曰崔杼殺莊公陳不占聞君有難將死之飡則失哺上車失軾僕曰雖徃其有益乎不占曰死君義也無勇私也遂驅車比至公門外聞鍾鼔戰鬪之聲遂駭而死國語曰彘之亂宣王在邵公宫國人圍之邵公乃以其子代宣王王長而立之戰國䇿曰吴入郢楚昌勃蘇羸音盈糧潜行十日而薄秦朝鸖立不轉晝吟宵泣七日不得告水漿無入於口秦王聞而走之冠劒不相及左奉其首右濡其口於是秦救楚退吴師復楚漢書曰𥘉吴王芮髙祖賢之制詔御史長沙王忠其定著甲令臣瓉曰漢以芮忠故特王之非故時令也又曰匈奴求和親群臣議上前愽士狄山曰和親便上問張湯湯曰此愚儒無知狄山曰臣固愚忠若御史大夫湯乃詐忠又曰王莾旣簒使者即拜龔勝爲講學祭酒勝日吾受漢家厚恩無以仰報今年老矣旦暮入地豈一身事二姓下見故主哉勝因勑以棺歛喪事語畢遂不復開口飲食積十四日而死東觀漢記曰上於大㑹中指王常謂群臣曰此家率下江諸將輔翼漢室心如金石忠貞臣也是日遷常爲漢中將軍又曰吴漢性忠厚自從征伐在左右上未安則側足屏息上安然後退舎兵有不利軍營不完漢常獨繕檠其弓㦸閱其兵馬激揚吏士上時令人視吴公何爲還言方作戰攻具上常曰吴公差強人隱若敵國又曰上爲大司馬以王霸爲功曹令史從渡河北賔客隨者數十人稍稍引去謂霸曰頴川從我者皆去而子獨留始驗疾風知勁草又曰鮑昱字文淵拜司隷校尉詔昱詣尚書使封胡降檄上遣小黄門問昱有所恠不對曰臣聞故事通官不着姓又當司徒露布怪使司隷而着姓也帝報曰吾欲令天下知忠臣之子復爲司隷又曰鮑永字君長到京兆㶚陵過更始冢引車入陌欲下從事諌止永曰親北面事人何忍車過其墓雖以獲罪司隷不辭也遂下車哭盡哀而至右扶風推牛上荀諌冡上聞之問公卿曰奉使如此何如時太中大夫張堪對曰仁者百行之宗忠者禮義之主仁不遺舊忠不忘君行之髙者上恱之謝承後漢書曰梁兾奏誅李固固臨命與胡廣趙戒書曰固受國厚恩是以竭其股肱不顧死忘志欲扶王室比隆文王何圖一朝梁氏迷謬公等曲從以吉爲凶成事爲敗漢家衰微從此始矣公等受主厚禄㒹而不扶傾覆大事後之良史豈有所私固身巳矣於義得矣夫復何言廣戒得書悲慙長歎范曄後漢書曰來歙盖延馬成進攻公孫述將王元環安於河池下辯䧟之乗勝遂進蜀人大懼使刺客刺歙未絶馳召盖延見歙因伏悲哀不能仰視歙叱延曰虎牙何敢然今使者中刺客無以報國故呼巨卿欲相属以軍事而反効兒女子涕泣乎刃雖在身不能勒兵斬公邪延收淚強起受所誡歙自書表曰臣夜人定後爲何人所賊傷中臣要害何人謂不知何人也臣不敢自惜誠恨奉職不稱以爲朝廷羞夫理國以得賢爲夲太中大夫叚褒骨鯁可任願陛下裁察又臣兄弟不肖終恐𬒳罪陛下哀憐數賜教督投筆抽刃而絶魏志曰典韋拜都尉太祖引置左右將親兵數百人常繞帳韋性忠至謹重常晝立侍終日夜宿帳左右稀歸私寢英雄記曰曹操圍張超於雍丘臧洪從袁紹請兵將赴其難紹不聽之超城遂䧟張氏族洪由是怨袁紹不與通紹増兵急攻洪殺愛妾以食兵將流涕莫有離叛城䧟生執洪紹問臧洪何相負若是今日服未洪據地瞋目曰諸袁事漢四丗五公可謂受恩今王室微弱因際㑹觖望非兾惜洪力弱不能爲天下推刃報仇何謂服乎紹命殺焉洪邑人陳容在座見洪當死起謂紹曰將軍舉大事而先誅忠義豈合天意紹慙使人牽出日汝臧洪儔寕復汝爲容頋曰夫仁義豈有常所蹈之則君子背之則爲小人今日寧與臧洪同日死不與將軍同日生遂復見殺在紹座者無不歎息蜀志曰先主退軍義陽傳􅊮断後拒戰兵人幾盡吴將語彤令降彤罵曰吴狗豈有漢將軍降者遂戰死子僉爲閞羽都督景曜六年又臨危授命論者嘉其弈丗忠義晉中興書曰王敦欲謗帝以不孝於衆坐明帝罪云温太真在東宫乆最所知悉因厲聲問嶠謂懼威必與巳同嶠正色對曰鉤深致逺小人無以測君子當今諒闇之際唯有至性可稱敦嘿然不恱然憚其居正不敢害之又曰王敦作逆石頭城旣䧟王師敗績周顗徃詣敦敦曰伯仁卿負我顗曰公戎車犯順下官親帥六軍不能其事使王旅摧敗以此負公敦憚其正辭不知所荅顗與戴淵俱𬒳收路經太廟顗大言曰天地先帝之靈臣忠於社稷王敦無道陵虐天下神祗有靈當速殺敦無令縱毒以傾王室語未終人以㦸傷其口不得復言血流至踵顔色不變士庶聚觀皆爲流涕於石頭南門外石上害之蕭子顯齊書曰王敬則轉安城王車騎叅軍蒼梧王狂虐左右人不自保敬則以太祖有威名歸誠奉事毎下直輙徃領軍府夜着青衣扶匍道路爲太祖聽察崔鴻十六國春秋前凉録曰麻秋以書誘致宛成都尉宋矩矩至謂秋曰辭父事君當立功義功義不立當守名節矩終不背主覆宗偷生於丗乃先殺妻子自刎而死秋曰義士也命吏人葬之重華嘉其誠節賜振威將軍又曰前燉煌太守幸慿隴西人也唯有一子髦至狄道省墓遇辛宴反叛爲宴所執慿勸張茂討宴茂曰髦在彼如何慿曰人臣奉主豈顧子乎茂曰汝純臣賜爵閞内侯又前趙録曰王廣永嘉之亂聚族避丗及爲揚州刺史𬒳蠻賊圍一百一十日外救不至糧食罄絶雞大雀鼠靡有將士泣曰將軍忠於夲朝故有今難豈有背將軍理哉衆相枕而死者五千人又南涼録曰振武將軍尉賢政固守浩亹不下熾盤招之曰樂都巳潰卿妻子皆在吾聞孤城獨守何所爲也政曰受涼王厚恩爲國家藩屏雖知樂都巳䧟妻子爲擒先歸獲賞後順受誅然不知主存亡未敢歸命妻子小事豈動懷盤乃遣虎臺手書喻政政曰爲國儲不能盡忠反面縛於人棄父負君虧萬世之業賢政義士豈如汝乎三國典略曰齊平東雍州刺史傳伏堅守不降帝遣韋孝寛將伏子仁寛招伏曰并州巳平故遣公兒來報今授上大將軍武郷郡公以金馬腦二酒鍾爲信公冝急下伏不受謂孝寛日事君有死無貳此兒爲臣不忠爲子不孝願即斬以示天下帝又遣髙阿郍肱等百餘人臨汾召伏伏出軍隔水相見問至尊何在阿郍肱曰巳𬒳捉獲別路入閞伏仰天大哭率衆入城於㕔事前北面哀號良乆乃降帝見之曰何不早下伏流涕而對曰臣三代𬒳任草命不能自死羞見天地帝執其手曰爲臣當若此朕平齊國唯見公一人乃自食一羊肋以骨賜伏曰骨親肉踈所以相付授上儀同也唐書曰隋屈突通與竇琮戰於稠桑通結陣以自固竇琮縱通子壽令徃諭之通大呼曰昔與汝爲父子今與汝爲仇讎命左右射之桑顯和呼其衆曰京師䧟矣汝並閞西人欲何所去衆皆釋仗通知不免乃下馬東南向再拜號哭曰臣力屈兵敗不負陛下天地神祇實所鑒察遂擒通送于長安髙祖謂曰何相見晚耶通泣對曰通不盡人臣之節力屈而至此髙祖曰隋室忠臣也命釋之又曰馮立事隱太子太子誅左右悉散立歎曰豈有人生受其恩死逃其難立乃率兵犯玄武門殺將軍敬君弘謂其徒曰微以報太子矣遂解兵而遁俄來請罪太宗數之立對曰岀身事主期之効命當戰之日無所顧憚因歔欷悲不自勝太宗宥之立謂所親曰逢莫大之恩終當以死奉荅俄而突厥至便橋立率數百人力戰殺獲甚衆太宗深嘉歎之又曰安金藏爲太常工人時睿宗爲皇嗣或有誣告皇嗣濳有異謀者則天令來俊臣桉之左右不勝楚毒皆欲自誣唯金藏大呼謂俊臣曰公旣不信金藏言請剖心以明皇嗣不反則引佩刀自剖其匈五藏並出流血𬒳地氣遂絶則天聞之令舁入宮中遣醫人却内五藏以桑白皮縱合之傳藥經宿乃蘇則天臨視歎曰吾有子不能自明不如爾之忠也即令停推睿宗由是獲免新序曰陳恒弑簡公而盟盟者完其家召他入曰不盟是弑父母也盟之是無君臣之禮乃盟以免父母死而自殺以禮其君又曰智伯之時有士曰長兒子魚絶智伯而去之三年將東之魯而道聞智伯死曰吾聞忠臣無餘禄吾聞智伯之死動吾心餘禄加於我至今尚存將徃吾佐之遂反而死之續說苑曰趙苞漢靈帝時爲武威守夷戎畏其果毅母及妻子自郡來遇鮮卑萬騎入塞爲其所掠苞出擊賊陳歩騎二萬鮮卑恐懼岀母示苞苞悲號謂母曰爲子無狀欲以微禄奉養不圖作禍今爲王臣不得顧私母曰人各有命何得毀忠節耶立忠榮親孝莫大焉行矣勉之苞瞋目援桴虜衆碎斬其師伏屍十里母妻子皆爲賊所害苞收母殯歛奏請歸葬天子䇿弔封爲列侯葬訖謂郷人曰食禄避難不忠殺母全義不孝何面目立於天下遂自殺又曰宦者田鵬事齊至内侍中齊主走青州圖入陳岀覘爲周人所獲歐問齊王所在紿云巳去周人折其支每折一支辭色逾厲四支俱絶而死許肅別傳曰肅爲愍帝侍中左衛將軍麴武將與肅齊心拒守而外救巳退城遂䧟沒逼愍帝送于平陽肅後昌難侍左右劉載乃以帝爲歸漢王頃之隂行鴆毒帝因食心悶欲見許侍中肅馳詣賊相見帝巳不復能語肅曰不審陛下尚識臣不帝猶能執肅手流涕肅戯欷登牀帝遂殂於扶抱之中晝夜號泣哀感異類載外欲明已不害乃僞責諸臣欲盡誅之群臣迸竄唯肅獨曰備位故臣願乞得殯殮然後就戮載特聽許事訖詣載曰國亂不能匡君亡弗能死舉目莫非愧耻將何顔以存所以忍辱正以山陵未畢故耳微情已叙甘就刑戮賊議之曰此晉之忠臣冝加甄賞載遂從議故得全免庾珉別傳曰珉字子居位列侍中劉曜作亂京都傾覆珉時直在省謂僚佐曰吾必死此屋内旣天子䝉塵珉與許遐等侍從曜設㑹使帝行酒珉至帝前乃慨然流涕曜曰此動人心即時遇害太平御覽卷第四百一十八
