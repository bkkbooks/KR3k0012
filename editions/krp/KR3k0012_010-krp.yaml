front:
  text: 太平御覽卷第十
  hash: sha256:2373cbae5bdc0b4e793839bf694f3b97638e7b9348dd9242cc45b51583257626
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_010-1a}
body:
  text: 天部十雨上釋名曰雨羽也如鳥羽動則散又曰雨水從雲下也雨者輔也言輔時而生養說文曰零徐雨也音斯小雨裁落也一林本反霖雨也南陽名霖雨曰音酸小雨也子廉反微雨也音資雨聲也溟小雨也澍時雨也滑子八反雨下也易曰宻雲不雨自我西郊又曰匪㓂婚媾遇雨則吉又曰雲行雨施又曰雨以潤之書曰若歲大旱用汝作霖雨又曰洪範休徵曰肅時雨若又曰納于大麓烈風雷雨弗迷詩曰有渰淒淒興雨祁祁雨我公田遂及我私渰隂雲㒵淒淒雲行之㒵祁祁猶徐徐也又曰月離于畢㑭滂沲矣月離隂星則雨又曰我來自東零雨其濛鸛鳴於垤婦歎於室鄭玄注曰將隂則穴處者先知之鸛好水將雨長鳴而喜也又曰習習谷風以隂以雨禮記月令曰仲春之月始雨水孟春行夏令則雨水不時行秋令則暴雨惣至行冬令則水潦爲敗又曰季春行夏令則時雨不降行秋令則淫雨早降又曰時雨將降下水上騰又曰立夏命有司祀雨師又曰孟夏行秋令則苦雨數來又曰六月中氣後五日大雨時行又曰仲秋行春令則秋雨不降又曰仲冬行秋令則天時雨汁瓜瓠不成又曰諸侯朝天子雨霑服失容則止又曰天降時雨山川岀雲又曰風雨不節則飢又曰疾風迅雷甚雨則必變傳曰隱公九年三月癸酉大雨霖以震書始也又曰宋大水魯莊公吊焉曰天作淫雨以害于粢盛若之何不吊又曰如百榖之仰膏雨又曰雨三日以徃爲霖又曰衛旱卜有事於山川不吉寗莊子曰昔周飢克殷而年豐今邢方無道欲使衛討邢焉從之師興而雨又曰臧文仲如晉雨過御叔在其邑將飲酒御叔魯大夫曰焉用聖人武仲多知時人謁聖人也我將飲酒而巳雨行何以聖焉公羊傳曰觸石而出膚寸而合側手爲膚案指爲寸信觸石理而出無有膚寸而不合也不崇朝而遍雨天下者惟太山之雲爾榖梁傳曰春正月不雨者勤雨也欲雨之心勤也夏四月不雨言不雨者閔雨也經一時不雨民之至憂也閔憂六月雨者喜雨也爾雅曰甘雨時降萬民以嘉謂之醴泉又曰暴雨謂之凍小雨謂之霡霂乆雨謂之霪霪雨謂之霖易稽覽圖曰降隂爲雨降隂之雨潤而不破塊京房易飛候曰凡候雨以朔弦望雲漢四塞者皆當雨東風曰當雨有黑雲氣如覆船於日下當雨有黒雲氣如牛彘當雨暴有異雲如水牛不出三日大雨有黒雲如羣羊奔如飛鳥五日必雨有雲如浮船皆爲雨北斗獨有雲不出五日大雨四望見青白雲名曰天塞之雲雨徵也有蒼黒雲細如杼軸蔽日月五日必雨雲如兩人提鼔持桴皆爲暴雨又曰太平之時十日一雨凡歲三十六雨此休徴時若之應尚書說曰淮雨淮暴雨之名也尚書大傳曰五岳皆觸石而出雲不崇朝而雨又曰成王時有越裳氏來朝曰乆矣天之無烈風東西南北來也無澍雨暴雨也意中國有聖人乎禮統曰雨者輔時生養均遍故謂之雨太戴禮曰天地之氣和即雨禮斗威儀曰君乗金而王其政象平則嘉雨時至春秋說題辭曰一歲三十六雨天地之氣宣十日小雨應天文十五日大雨以升運也又曰陽制隂故水爲雨春秋元命包曰隂陽和而爲雨春秋繁露曰木有變則春多雨此徭役衆賦歛重故也史記曰秦始皇時置酒而天雨陛䙉者沾寒優旃見而哀謂之曰汝欲休乎陛䙉者曰幸優旃曰我即行呼汝疾應曰諾居有頃殿上上夀呼万歲旃大呼曰陛楯郎曰諾優旃曰汝雖長何益幸雨立我短幸休居於是使得半相代又曰夫子當行命第子持雨具旣而果雨曰昨夜月不宿畢故知之范曄後漢書曰髙鳯字文通家貧好學不休其家曝麥令鳯守雞以竿授其手中鳯執竿讀書雨大至鳯讀書不覺執竽如故其妻還麥流甚以爲怒鳯亦不愧後漢書曰郭林宗甞於陳梁間行遇雨巾一角蟄時人乃故折角以爲林宗巾其見慕如此謝承後漢書曰百里嵩字景山爲徐州刺史境旱嵩岀巡遽甘雨輒澍東海祝其合郷等三縣父老訴曰人等是公百姓獨不迃降廻赴雨隨車而下東觀漢記曰王郎起光武自薊東南馳及至南宫遇大風雨而引車入道傍舎馮異抱薪鄧禹爇火光武對竈燎衣又曰順帝陽嘉元年立順烈皇后是時自冬至春不雨尊后之日嘉澍沾渥又曰沛獻王輔善京氏易永平五年京師少雨上御雲臺自卦以周易林占之其繇曰蟻封穴户太雨時至上以問輔輔上書曰蹇艮下爲山坎上爲水山雲爲蟻穴居知雨將至故以蟻爲興漢書名臣奏曰天隂雨人之病爲之先動是隂相應而起也天將隂雨又使人睡卧者隂氣也魏志曰曹眞伐蜀從子午道南入諸軍或從斜谷道㑹大霖雨四十餘日棧道断絶詔眞還又曰太祖在長安使曹仁討関羽於樊秋大霖雨漢水溢平地水數丈六軍皆没晉書曰詔以王雅爲太子少傅將拜遇雨請以繖入王珣不許因冒雨而拜又曰樊英隱於壷山甞有暴風從西南起英謂學者曰成都市火甚盛因含水西向漱之乃令記其時日後有從蜀郡來者云是日大火有雲從東起湏臾大雨神仙傳曰欒巴蜀人徴爲尚書大朝得酒不飲西南噀之詔問巴巴曰臣夲縣成都大火臣以酒爲雨救之帝驚驛問咸云是時雨從北來猶有酒氣襄陽傳曰巫山神女朝爲行雲暮爲行雨西京雜記曰董仲舒曰太平之時雨不破塊津莖潤葉而巳又曰董仲舒曰隂陽二氣之𥘉蒸也若有若無若實若虚團攅聚合其體稍重乗虚而墜風多則合速故雨大而踈風少則合遲故雨細而宻湘州記曰零陵山有石鷰遇風雨即飛止還爲石王采安成記曰萍郷西津名玉女崗天當雨輙先涌五色氣於石間俗謂玉女披衣搜神記曰武王伐紂至河上雨甚疾雷晦冥揚波於河衆甚懼武王曰余在天下誰敢干余者風波立濟𫐠異記曰廬山有康王谷北嶺上有一城號劉城天每有雨輒聞山上有鼔角笳簫之聲村人以爲常候武昌記曰武昌城東南有金牛崗西有石鼔山上有三石鼔石鼔鳴天必雨羅浮山記曰山有龜淵淵有神龜龜鼻貫銅鐶若有人穢此淵即注雨周處風土記曰榆莢雨春雨黃雀風濯梅雨六月之風雨也又曰六月有大雨名濯枝雨荆楚歲時記曰六月必有三時雨田家以爲甘澤邑里相賀曰嘉雨王子年拾遺記曰甘雨濛濛似露委草木則滴瀝雨也又曰香雲成香雨帝王世紀曰黃帝遊洛水上見大魚殺五牲以醮天乃甚雨七日七夜魚流始得圖書今河圖是也家語曰孔子將行遇雨不假蓋於子夏護其短也又曰齊有一足之鳥集於殿前舒翅而跳齊侯異之使聘魯訪諸孔子曰此鳥名曰啇羊昔童児有屈一脚振訊兩臂而跳且謡曰天將大雨啇羊鼔舞今齊有之其應至矣急告趣治溝渠脩隄防將有大雨水爲災果大霖雨水溢泛諸國傷害人民唯齊有備不敗景公曰聖人之言信而有徵矣老子曰暴雨不終日莊子曰宋景公時大旱三年卜云以人祀乃雨公下堂頓首曰吾所求雨者爲人今殺人不可將自當之言未卒天大雨方千里又曰堯讓天下於許由許由曰日月出矣而爝火不息時雨降矣而猶浸灌不亦勞乎文子曰若與俗處猶走逃雨也無之而不濡列子曰赤松子神農時雨師也廣成子曰黄帝時雲不待族而雨尸子曰神農理天下欲雨則五日爲行雨旬爲谷雨旬五日爲時雨萬物咸利故謂之神雨孟子曰油然作雲霈然下雨抱朴子曰軍始發大風甚雨起於後大勝之徴也軍始出雨沾衣者是謂潤兵軍有功雨不足沾衣裳是謂泣軍必敗又曰無雲而雨是謂雨血將軍當楊兵講武以應之雨軍中尤甚者將軍戰必無功也管子曰冬作土功發地藏則夏多暴雨秋霖不止又曰春發五政一曰論㓜孤赦有罪二曰賦爵列授禄位三曰脩溝洫復亡人四曰治封壃正阡陌五曰無殺麑卵無絶華萼五政徇時春雨乃來淮南子曰失火遇雨禍中有福又曰人莫鑑於沬雨而鑑於止水者以其淨也沫雨雨潦上沫起覆孟也言其濁擾不見人形也又曰朱鼈浮於水上必大雨又曰天且雨也魚巳噞噞音冝撿反又曰黒蜧神虬潜泉而居將雨則躍蜧音麗鄒子曰朱買臣孜孜脩學不覺雨之流粟韓子曰荆人伐陳呉救之軍間三十里雨十日夜左史倚相謂子期曰雨十日甲輯兵聚吴人必至不如備之乃爲陣未成而呉人至見荆有戒而反傳子曰昔者伯牙子遊於泰山之隂逢暴雨止於巖下援琴而鼔之爲淋雨之音更造崩山之曲毎奏鐘期輒窮其趣曰善哉子之聽也孔叢子曰子思荅懸子曰以子産仁愛譬夫子猶浸水之與膏雨夫浸所及則生不及則死民皆知焉膏雨之所生也廣莫大焉民之受賜也普矣莫識其由也吕氏春秋曰武王伐紂至鮪水使膠鬲候周師問武王曰西伯何時至曰將以甲子日至膠鬲行矣大雨日夜不休武王疾行不輟軍吏諌武王曰吾疾行以救膠鬲之死也楊子法言曰震風凌雨然後知夏屋之帡幪震雨凌暴也夏大也帡彰懞覆廣雅曰雨師謂之屏翳纂要曰疾雨曰驟雨徐雨曰零雨雨乆曰苦雨亦曰愁霖雨晴曰啓雨水曰潦雨雲曰渰雲亦曰油雲戰國䇿曰文侯與虞人期獵是日天雨文侯將出左右諌止曰吾與虞人期不可失乃徃魏於是始強易林變占曰雷君出裝隱隱西行霖雨不止流爲江河周易集林雜占曰占天雨否外卦得隂爲雨得陽不雨其爻發變得坎爲雨得离不雨巽化爲巽先雨後風博物志曰太公爲灌壇令武王夢婦人當道夜哭問之曰吾是東海神女嫁於西海神童今爲灌壇令當道廢我行我行必有大風疾雨大風疾雨是毀君之德也武王覺召太公問之果有疾雨暴風在太公邑外而過六韜曰文王問散冝生卜伐紂吉乎曰不吉鑚龜龜不兆數蓍交加而折將行之日雨輜車至軫行之日幟折爲三散冝生曰此卜四不祥不可舉事太公進曰是非子之所知也祖行之日輜車至軫是洗濯甲兵也師曠占曰候月知雨多少入月一日二日三日月色赤黃者其月少雨月色青者其月多雨常以五夘日候西北有雲如羣羊者即有雨至矣冬戊巳春辰巳日雨蝗蟲食禾稼立春日雨傷五木立秋日雨害五榖常以戊巳日日入時出時欲雨日上有冠雲大者即雨小者少雨天文要集曰北斗之旁有氣徃徃而黒狀似禽獸大如皮席不出三日必雨又曰河有雲黒狀似船若一疋布維河不出十日大雨又曰辰口守心有水災一日大雨不可當又曰北斗者不欲雲覆之黒雲覆之大雨范子計然曰風爲天氣雨爲地氣風順時而行雨應風而下命曰天氣下地氣上隂陽交通萬物成矣劉義慶世說曰謝太傳無嗔喜曽送兄征西葬還日暮雨馭人皆醉不可處分公乃於車中手取車柱撞馭人聲色甚怒劉義慶幽明録曰河南人趙良與其郷人諸生之長安至新安界遇霖雨糧乏相謂曰飢郍得羙食邪應時羮飯備具有人聲語云進踈食黄子發相雨書曰常以戊申日候日欲入時日上有冠雲不問大小視四方黒者大雨青者小雨候日始出日正中有雲覆日而四方有雲黒者大雨青者小雨四方有雲如羊猪雨立至四方北斗中有雲後五日大雨四方北斗中無雲唯河中有雲三枚相連狀如浴猪狶三日大雨以丙丁之辰四方無雲唯漢中有者六十日風雨和常以六甲之日平旦清明東向望日始出時日上有雲大小貫日中青者以甲乙雨赤者丙丁雨白者庚辛雨黒者壬癸雨黄者戊巳日雨六甲日四方雲皆合者即雨以天方雨時視雲有五色黒赤並見者即雹黃白雜者風多雨少青黒雜者雨隨之必滂沛流潦又曰四方有濯魚雲遊疾者即日雨遊遲者雨少至說苑管仲曰吾不能以春風風人夏雨雨人吾道窮矣又曰楚莊王伐陳呉救之雨十日十夜晴左史倚相曰呉師必夜至甲裂壘壊彼必薄我何不行列鼔出待之呉師至見楚軍成陣而還又曰武王伐紂過隧則斬岸過水則析舟示人無反志也至於有戎之隧大風折斾散冝生諌曰此其妖歟武王曰非也天落兵也風霽而乗以大雨散冝生又諌曰此非妖歟王曰非也天洗兵也風俗通曰雨師爲玄冥山海經曰羽山其上多雨將陽之山多恠雨括地圖曰谷山有藂雲甘雨太平御覽卷第十
