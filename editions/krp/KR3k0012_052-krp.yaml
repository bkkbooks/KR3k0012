front:
  text: 太平御覽卷第五十二
  hash: sha256:2395fc32caa4ce5ead340d6ddab8180dba7e8029890f132138889b674e75d8e1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_052-1a}
body:
  text: 地部十七石下西京雜記曰竇太后在家嘗有白鷰䘖石大如指墮后績筐中后取石剖爲二其中有文曰母天地后乃合之遂不復開後爲皇后常并置璽中爲天璽又曰五鹿充宗受學於弥成子弥成子少時常有人遇巳授以文石大如鷄卵成子吞之遂大明悟爲天下通儒成子後病吐出此石授充宗充宗復吞又爲明學又曰漢武昆明池養魚往往飛去後刻石爲鯨魚致水中乃不飛去毎至當雨魚當鳴吼顧凱之啓蒙記曰零陵郡有石鷰得風雨則飛如眞鷰潯陽記曰石鏡山東一圓石懸崖明浄照人毫細必察幽明録曰宫亭湖邊傍石間有石數枚形圎若鏡明可鑑人謂之石鏡後人過以火燎一枚今不復明其人眼遂失明庾仲雍湘州記云應陽縣蔡子池南有石臼云是蔡倫𥿄臼王歆之南康記曰歸美山山石紅丹赫若采繪峩峩秀上切霄隣景名曰女媧石大風雨後天澄氣靜聞絃管聲拾遺記曰貟嶠山東有雲石廣五百里駮落如錦扣之片片蓊然雲起又曰魏明帝時太山下有連理文石髙十二丈狀如枯樹其文色彪發似人雕鏤自下及上皆合百餘歩及魏明帝之始稍覺相近如雙闕也土石隂類魏爲土德斯爲靈交州記曰有浮石山在海中虛輕可以磨脚煑飲之止渇洞冥記元鼎中條支國貢馬石以和九轉丹有髪白者以此石拭之應手而黒顧野王瑞應圖曰石華者石生華也劉澄之江州記曰興平縣蔡子池南有石穴深二百許丈石青色堪爲書硯蜀中記云隗叔通棘人也性至孝母毎食必湏江水通每汲江中石爲之出今江中有石號孝子石十洲記曰流洲在西海中上多積石名爲昆吾石治其石成䥫作釰光明照洞如水精狀割玉物如切泥土焉益州記龍盤山有一石長四十丈髙五丈當中有户及扉若人掩閇古老相傳爲玉女房石虎鄴中記曰孟津河東去鄴城五百里有濟北郡榖城縣有糓城山是黄石公所葬處有人登此山見崩土中有文石石文鮮明虎使採取以治宫殿又免榖城令不奏聞故也㝷陽記曰落星石在宫亭湖中周廻百餘歩髙五丈上生竹木武昌記曰陶太尉廟東有盤龍石舊傳云龍盤於此石梁州記沔陽城泝漢上十五里有諸葛武侯所鎭在漢水南背山向水門前累石以爲陣荆州圖曰冝都有穴穴有二大石相去一丈俗云其一爲陽石一爲隂石水旱爲災鞭陽石則雨鞭隂石則晴即廪君石是也但鞭者不壽人頗畏之不肯治也丹陽記曰石頭城西有唐頽石王敦害周伯仁之所又曰湖熟縣晉惠帝永寧二年湖中有大石去渚二百歩浮來登岸百姓驚觀咸曰石來明年果有石氷入楊州裴淵廣州記曰甘泉縣平野中孤石挺起峯秀入雲連石相接無異棟宇安城記曰石室中有素石數斛狀如雀頭甘潤虚脆殆可噉曹叔邪異物志曰豫章有石黃白色而理踈以水灌之便熱以鼎加其上炊足以熟冷則灌之雷煥以問張華華曰然石也漢官儀曰馬伯苐登泰山見石二枚一是武帝時石用五車載不能上因置山中爲屋號五車石一是刻號記功德立壇上王昭之始興記曰勞口北有逃石一名靈石晉水和中有二飛仙衣冠自來憩此石旬日乃去之盛弘之荆州記曰臨賀郡有青石上有磨刀斧迹春夏明浄秋冬蕪穢云是雷磨石又曰築陽粉水口有一石下不測岀地尺餘圍可三尺色極青其上如斫明可以鑒人相傳以爲殞星縣西有孤石挺出其下臨潭曠有見根者如竹根又曰樊重母畏雷爲石室避之悉以石爲階砌今猶存又曰臨賀馮乗縣東五里有故縣廟相傳漢淮南王安𬒳誅其子奔迸來至一夜忽化爲石人當縣門而立百姓怪而觀之其迫察者手足無不瘡爛述異記曰鏡湖俗傳軒轅氏鑄鏡於湖邊今有軒轅磨鏡石石上常㓗不生蔓草輿地志曰㑹稽秦望山始皇刻石前有石廣數丈云是始皇坐之石兩邊有方坐八所云是丞相巳下坐石故今有丞相石之名玄中記曰天下之強者東海之沃燋石焉方三萬里海水灌之随盡故水東流而不盈又曰玉門之西南有一國國中有山山上有廟國人歳歳岀石子林切數千枚名爲霹靂從春雷而減至秋盡鄱陽記曰錢倉石在饒州西一百里石形如倉囷昔漁人夜宿石下忽見石開窺其石中有錢取之盈艇而去因爲名郡國志云乞子石在馬湖南岸東石腹中岀一小石西石腹中懷一小石故僰人乞子於此有驗因號乞子石又曰思州金雞石每有雞金色鳴於石上又曰仙人石曽有仙人飛下此石一曰仙人牀又曰恊州弄棟縣蜻蛉水下有石猪峯有石猪母子數十頭云夷人昔牧於此猪化爲石今夷人不敢於此牧又曰儋州昌化湖明山山有二石如人形云有兄弟二人向海捕魚因化爲石號曰兄弟石也又曰桂州興安縣有卧石一枚其形似人而舉體青黄隱起而謂之石人可以祈雨小舉則雨小大舉則雨大又曰貴州有洞池周十數丈下有石牛時出池間歳旱民殺牛祈雨以血和泥塗牛即雨盡即晴以爲恒馬嶺山嶠多虺蛇毒殺人有泠石可以解之屑着瘡内即活又曰梁州女郎山張魯女浣衣石上女便懷孕魯謂邪淫乃放之後生二龍及女死將殯柩車忽騰躍昇此山遂葬焉其水旁浣衣石猶在謂之女郎山又曰郴州城北七十里有話石山孤石特竦仙人於此處談話輿地志曰南陵縣有女觀山俗傳云昔有婦人夫官於蜀屢愆秋期憂思感傷登此騁望因化爲石如人之形所牽狗亦爲石今狗形猶存愽物志曰鸛水鳥也伏卵時數入水卵冷取礜周圍繞卵以助暖氣華陽國志汶山有鹹石煎之得塩異苑曰勝滕放太元𥘉枕文石枕卧忽暴雨震其所枕傍人莫不懾而放微覺有聲又曰永康王曠井上有一洗石時見赤氣後有二胡人寄宿忽求買之曠恠所以未及度錢子婦孫氏覩二黃鳥闘於石上疾往掩取變成黃金胡人不知索市逾急旣得橦破内止有二鳥處劉敬叔異苑曰晉武帝時呉郡臨平岸崩岀一石鼓打之無聲以問張華華曰可取蜀中桐材刻作魚形扣之則鳴於是如言之聲聞數十里異物志曰夷州土無銅鐵磨礪青石以作弓矢此石砮楛矢之類物理論曰土精爲石石氣之核也氣之生石猶人筋絡之生瓜牙也博物志曰桃林在弘農湖縣休牛之山有石焉曰帝臺之棊也五色而文狀鶉卵焉遊名山志曰芙蓉渚有聳石頭如初生芙蓉色皆青白山海經曰燕山多嬰石言似玉有采嬰帶所謂燕石也又曰錢來之山多洗石若澡洗可以磢去垢也水經注曰象林郡功曹姓區有子名連攻縣殺令自號爲王值世亂離林邑遂立後乃襲代傳位子孫三國鼎争未有所附呉有交土與之隣接進侵夀泠以爲壃界自區連以後國無文史先其纂代世數難詳宗胤滅絶無復種裔外孫范熊代立人情樂推後熊死子逸立有范文曰南西捲縣夷帥稚夷奴也文爲奴時山邊牧羊於澗水中得兩鯉魚隱藏持歸䂓欲私食郎知檢其魚大慙懼詐云將礪石還非爲魚也郎至魚所見是兩石信之而去文始異之石有䥫文入山中就石治䥫鍜作兩刀舉刃向鄣因呪曰鯉魚變化治石成刀斫石鄣破者是有靈神文當治此爲國君王斫不入者是無神靈進斫石鄣如龍淵干將之斬蘆藁由是人情漸附今斫石尚在魚刀猶傳子孫又曰澧水出武陵充縣東逕臨澧零陽二縣故界水之南岸白石雙丘厥狀類人髙各三十丈周四十丈古老相傳言昔充縣尉與零陽尉共論封境因相傷害化而爲石劉義慶幽明録曰陽羡縣小吏呉龕有主人在溪南嘗以一日掘頭舡過水溪内見一五色浮石取内床頭至夜化成一女子也又曰冝都建平二郡之界有五六峯參差玄岀上有倚石如二人像攘𬒮相對俗謂二郡督郵争界於此楊雄蜀本紀曰秦王獻五美女於蜀王蜀王遣五丁迎五女見大虵入山空中五丁引虵山崩五女上山化爲石又曰武都丈夫化爲女子顔色美好盖山之精也蜀王娶以爲妻無幾物故於成都郭中葬之以石鏡一枚徑一丈髙五尺鄧析書曰譬猶拯溺而硾之以石救火而投之以薪世說曰武昌陽新縣北山上有望夫石狀若人立者傳云昔有貞婦其夫從役遠赴國難携弱子餞送此山立望而化爲石兵書曰軍中地生石將可以乆居史記曰以石投水莫之逆也雜五行書曰婦姑闘諍取石重六十斤埋門外即罷荀伯子臨川記云石原狀似倉廪其内可容千斛廩口開則歳儉閉則年豊又曰石龍山有巖其下有石形隱起似龍頭尾長一丈二尺地理記云有鱗甲因號爲石龍又曰石鼓在冝黄水邊狀如鼔形闊九尺長一丈四尺四寸又云圎浄如鼓因以鼔爲名焉又曰破石髙五尺在冝黄水邊又云有女人水次浣濯爲蛟所牽入石中經數日雷擊石破見死蛟及女人屍浮出因號爲破石又曰浮石其石居汝水中心或水汎漲髙岸皆没此石居然不没因以爲名之又曰落峭石去飛猿館一百一十五里在飛猿水巍峩嵌空數里可望即謝靈運詩云朝發悲猿嶠暮宿落峭石是其處也始興記云營口東岸有石四方而可髙百仞其狀若臺故名臺石又林水岀焉其臺旁有石室室前盤石上行列十甕皆盖以青盆悉是銀製有人過者但得開觀而不可取之則悶絶若死封丘之奴竊二枚爲大虵所害即不知其自永嘉元云永嘉南岸有帖石乃堯之神人以破石推將入惡溪道次置之溪側遥望有似張㠶今俗號爲張㠶溪與天台山相接又郡國志曰東海信郎神破石爲㠶今陳海有信郎祠即是太平御覽卷第五十二
