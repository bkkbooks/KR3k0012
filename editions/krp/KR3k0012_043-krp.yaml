front:
  text: 太平御覽卷第四十三
  hash: sha256:357572961f82451b6da7d7cd9d08eb5e6c202090efb5d02b3a6121236e1bc1b4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_043-1a}
body:
  text: 地部八啇洛襄鄧淮蔡諸山白於山啇山玄扈山望楚山石梁山薤山峴山白馬塞山髙車山桐栢山武當山大狐山石魚山苦菜山大洪山赤岸山莫耶山雲母山濠塘山九闘山塗山八公山蔡山玉鏡山睆山雞籠山梁山都梁山斗山臺子山長圍山白於山水經曰白於山今名女郎山上多松栢下多櫟檀其獸多㸲音昨牛䍫羊鳥多白鴞洛水出于其陽東注于涇也又云洛水源出縣北白於山又曰漢水女郎山山上有女郎冢逺望山墳崔嵬狀髙及即其所裁有墳形山上直路下岀不生草木世人謂之女郎道下有女郎廟及擣衣石言張魯女也啇山盛弘之荆州記曰上洛有啇山班孟堅西都賦所謂啇洛縁其隅髙士傳謂地肺即此也晉書曰董景道少好學千里追略不與人交通永平中知天下將亂隱啇洛山衣木皮葉食樹果彈琴歌嘯以自娱至劉曜時徴拜常辭以壽終玄扈山春秋合成圖曰黃帝遊玄扈上洛與大司馬容光左右輔周昌等百二十人臨之有鳯衘圖以置帝前玄扈山在上洛縣北一百里望楚山襄陽記曰望楚山有三名一名馬鞍山一名災山宋元嘉中武陵王駿爲刺史屢登之鄙其舊名望郢山因改爲望楚山後遂龍飛是孝武望之處時人號爲鳯嶺髙處有三墱即劉弘山簡九日宴賞之所也石梁山襄陽記曰襄州石梁山山起白雲則雨黃雲則風黒雲則蠻多病薤山襄陽記曰襄陽縣薤山山上有竹三年生一笋笋成竹死代謝如春秋焉峴山十道志曰羊祐常與從事鄒潤甫共登峴山垂泣曰自有宇宙便有此山由來賢逹勝士登此逺望如我與卿者多矣皆湮滅無聞不可得知念此使人悲傷我百年後魂魄猶當此山也潤甫對曰公德冠四海道嗣前哲令聞令望當與此山俱傳若湛軰乃當如公語耳後以州人思暮遂立羊公廟并碑於此山白馬塞山盛弘之荆州記曰孟達爲新城太守登白馬塞山而歎曰劉封申眈據金城千里而不能守豈丈夫也爲上渚吟方土今猶傳此聲韻憤激其哀思之音乎遊者云重山疊鄣事亦信然也髙車山髙士傳曰髙車山上有四皓碑及祠皆漢惠帝所立也漢髙后使張良詣南山迎四皓之處因名髙車山也桐栢山河圖括地象曰桐栢山爲地穴上爲維星荆州圖副曰桐栢山禹貢所謂導淮自桐栢者也其山則雲峯秀峙林惟椅栢潜潤吐霤伏流數里武當山山記曰武當山區域周廻四五百里中央有一峯名曰叅嶺髙二十餘里望之秀絶出於雲表清朗之日然後見峯一月之間不見四五輕霄盖于上白雲帶其前旦必西行夕而東返常謂之朝山盖以衆山朝揖之主也又南雍州記曰武當山有石門石室相承云尹喜所棲之地又隂君内傳云君字長生入武當山昇仙是也又郭仲産南雍州記曰武當山廣三四百里山髙巄峻若博山香炉苕亭峻極于霄岀霧學道者常百數相継不絶若有於此山學者心有隆替輒爲百獸所逐山海經曰祭水源伏流三百餘里漢武帝遣殿上將軍戴生之此山採仙藥遂得道不返甄異傳曰歷陽謝允字道通年十五爲蘇峻賊軍王免所掠賣属東陽蔣鳯家嘗行山中見虎檻中狗竊念狗餓以飯飴之人檻方見虎攀木仰看允謂虎曰此檻木爲汝施而我幾死其中汝不殺我我放汝乃開檻出虎賊平之後允詣縣别良善烏程令張球不爲申理桎梏栲楚允夢見人曰此中易入難岀汝有慈心當救拯廻見一少年通身黃衣遥在柵外時進獄中與允言語獄吏知是異人由此不敢枉允蒙理還都西上武當山太尉庾公聞而愍之給其粮資隨到襄陽見道士說吾師戴先生孟盛子非丗間人也勑若有西上欲見我者可將來得無是君允因隨去入武當山齋戒三日進見先生乃是昔日所夢人也問允復見黃童不因賜以神藥三丸服之便不飢渇無所思欲先生亦無常處時有祥雲紫氣䕃其上或聞芳香之氣徹於山谷太狐山水經注曰大胡山在泚陽北如東三十餘里廣圎五六十里張衝賦曰都所謂天封大胡者也胡一作狐南陽圖注曰山有大石如狐石魚山水經注曰石魚山本名立石山髙八十餘丈廣十里石色黒而理若雲母開發一重輒有魚形鱗鰭首尾有若刻畫長數寸魚形備足燒之作魚膏腥因以名之苦菜山郡國志曰苦菜山即黃城山也自葉至泚陽南北相毗連旦百里亦曰長城山即長沮桀溺耦耕處下有東流水即子路問津之所尸子云楚狂接輿耕於方城即此山也春秋曰方城以爲城是也大洪山水經注曰蔡陽縣東南大洪山山在隋郡之西南竟陵之東北盤基所跨廣圎一百餘里峯曰懸鈎處衆阜之中爲諸嶺之秀山下有石門俠鄣層峻岩髙皆數百許仞入石門又得鍾乳穴穴上素崖壁立非人跡所及穴中多鍾乳凝膏下垂望齊冰雪微津細液滴瀝不斷幽穴潜逺行者不窮其深而穴内常有風勢火無能以經乆故也隕水岀于其隕隂初流淺狹逺乃寛廣可以浮舟栰矣時人以隕水所導故亦謂之爲隕山赤岸山南兖州記曰爪歩山東五里江有赤岸山南臨江中羅君章云赤岸若朝霞即此類也濤水自海入江衝激六七百里至此岸側其勢始衰郭景純江賦云鼔洪濤於赤岸莫耶山壽春圖經曰莫耶山長老傳云古者於此山鑄莫耶劒因爲山名史記賈誼吊屈原篇云莫耶爲鈍兮鈆刀爲銛注云莫耶呉大夫姓也王僧䖍呉郡地理志云呉人造劒二陽曰干將隂曰莫耶莫耶其妻名也又淮南記云𪷟水合流千金塘源出縣西莫耶山是也雲母山壽春圖經曰雲母山一名濠上山在州東南四十里按神仙傳云彭祖服食雲母時人共傳採於此山今或有道者採取不巳濠塘山壽春圖經曰濠塘山在縣南六十里有濠水岀焉古老所傳縁山泉灌濠成塘故以爲名山穴多岀鍾乳并有蝙蝠白艾色於穴中倒懸微帶紫色居人或有九月巳後二月巳前採取服之頗益壽九鬪山壽春圖經曰九鬪山一謂隂陵山江表傳云項羽敗烏江取此山過漢遣灌嬰兵追羽至此一日九戰因名九鬪山今石猶有磨刀礪鏃之跡塗山應劭漢地理志曰禹娶塗山塗山有禹墟太康地記曰塗山古當塗國夏禹所娶也山西南又有禹村盖禹㑹諸侯於塗山在禹貢楊州之域今九江當塗縣有禹娶之地今邑界有當塗故城存焉即漢爲縣後廢郡國志曰平阿縣有當塗山淮水岀于荆山之左當塗之右奔流二山之間而楊濤北注也春秋左氏傳曰哀公七年諸大夫對孟孫曰禹合諸侯於塗山執玉帛者萬國杜預注曰塗山在壽春東北非也余案家語曰吴伐越至㑹稽獲骨焉其節專車吴子使使問孔子孔子曰丘聞之昔禹致群臣於㑹稽之山防風氏後至禹殺之其骨專車此爲大也盖丘明親丞聖旨録爲實證矣又案劉向說苑辯物王肅之叙孔子世孫孔鼂所出先人書家語並岀此事故塗山有㑹稽之名考校群書及方土之目疑非此矣盖周穆之所㑹矣八公山水經注曰壽春縣八公山山無樹木唯重阜耳山上有淮南王劉安廟劉安是漢髙帝之孫厲王長之長子也折節下士篤好儒學養方術之徒數千人多神仙祕法鴻寳之道忽有八公皆鬚眉皓素詣門希見門者曰吾王好長生今先生無住衰之術未敢聞八公咸變成童王甚敬之八士並能錬金化丹從有入無乃與安登山埋金於地白日昇天餘藥在器雞犬舐之者俱得上昇其所昇之處踐石皆䧟入焉故山即以八公爲目蔡山懷寕圖經曰蔡山岀大龜尚書云九江納錫大龜即謂蔡山也玉鏡山懷寕圖曰玉鏡山在縣北萬歳郷界貞元二年從睆山東面忽然爆裂皎然如玉行路逺見如鏡懸焉其年刺史吕謂聞奏因山改萬歳爲玉鏡郷其山西隅連睆山東面睆山漢書地理志曰睆山在灊山天柱峯相連其山三峯鼎峙疊嶂重巒拒雲槩日登渉無由山經云睆山東面有激水冬夏懸流狀如瀑布下有九井井有一石床可容百人其井莫知深淺若天時亢旱則殺一犬投其中即降雷雨犬亦流岀鷄籠山歷陽圖經曰鷄籠山在縣西北淮南子云麻湖初陷之時有一老母提鷄籠以登此山因化爲石今山有石狀如鷄籠因爲名也梁山歷陽圖經曰梁山在縣南俯臨江水南之博望山宋書云孝武帝大明七年登梁山大閱水軍于中江是日有雀二集于華盖有司奏請改元爲神雀元年帝不許因立雙闕於梁山都梁山盱眙圖經曰都梁山周廻三十里在縣南按廣志云都梁山生淮蘭草一名梁香草故以爲名在楚州西南二百九里又阮昇之記云都梁山通鍾離郡廣袤甚逺出桔梗芫花䓁藥伏滔北征記云有都梁香草因以爲名又曰隋大業元年焬帝立宫在都梁東隣鬱西枕長淮南望岩峯北瞰城郭其中宮殿三重長廊周廻院之西又有七眼泉涌合爲一流於東泉上作流盃又於宫西南淮側造釣魚臺臨淮髙峯别造四望殿其側又有曲河以安龍舟大舸枕倚淮湄縈帶宫殿至十年爲孟讓賊於此置營遂廢斗山盱眙圖經曰斗山周廻二十里在縣西南與都梁山相連枕淮水險峻名曰斗山臺子山盱眙圖經曰臺子山周廻一十里在縣東一里案宋書云元嘉二十七年宋將臧質引兵下造弩臺以射城中因以爲名按臺子山在楚州西南是長圍山盱眙圖經曰長圍山周廻四里在縣北七里上置軍營將士一千人守捉至德二年節度使髙適置按宋書云元嘉二十七年宋文帝遣藏質拒魏太武帝遂於梁山築長圖城造浮橋絶水路即此山又改爲長圍山當在楚州西南一百八十里太平御覽卷第四十三
