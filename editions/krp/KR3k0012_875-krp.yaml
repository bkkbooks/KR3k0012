  text: 太平御覽卷第八百七十五咎徴部二
  hash: sha256:32f1c6a1d5201a2578b10e85b455c537da59c18e576dd536d11e9ad22984e4a3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_875-1a}
body:
  text: 五星客星孛天狗枉矢蚩尤旗獄漢五殘國皇格澤旬始營頭漢蓬星五星京氏易五星占曰歲星失渡何人君不仁春殺無辜則歳星失度其救也慈仁敬讓廣恩惠施無犯四時則歳星承度熒惑失度何人君内無法禮輕薄房室外行慢易歛奪民財則熒惑失度其救也爵賢位徳養㓜廪孤命樂師趣鞉鼔合歡欣熒惑還度天心得矣太白失度何人君薄恩無義懦弱不勝任則太白失度其救也舉有義任威用武則太白復兵氣消矣鎮星失度何人君内無仁義外多華飾則鎭星失度其救也治社稷修明堂近方直之人此災自消也辰星失度何人君内無仁義外多華飭則辰星失度其救也明刑慎罰審法必中尚書考靈耀曰白經天水决江白大白也金爲水宗故多水也春秋元命苞曰昴畢間爲天街日月五星以出入熒惑守之道不通天下危又曰卷舌主口語熒惑臨之下多亂謀國君以口舌之害起㓂又曰熒惑守軒轅貴妾爭又曰熒惑守營室羣妃闘漢書天文志曰五星所行合散犯守歷陵闘蝕彗孛飛流皆隂之精本於地而發于天也孟康曰合同舎也散謂五星有變則其精散爲妖星也犯七寸之内光芒相及陵相冐過也蝕星月相陵不見者旁日食也韋昭曰白自下徃觸之曰犯居其旁曰守經之爲歴相撃爲闘張晏曰彗所以除舊布新也孛氣似彗飛流謂飛星流星也孟康曰飛絶迹而去之流光跡相連也又曰孝昭元始中太白入太微西藩第一星北出東藩第一星東北下去太微者天庭也太白行其中宫問當閉大將𬒳甲兵邪臣伏誅後有流星下燕萬載宫極東去李竒曰極屋梁也三輔名爲極也法曰國恐有誅其後左將軍上官桀驃騎將軍安與長公主燕刺王謀作亂咸伏誅又曰建始四年七月熒惑踰歳星居其東北半寸所如連李時歳星在関星西四尺所熒惑𥘉從畢口大星東北徃數日至徃疾去遟占曰熒惑與歳星闘有病君飢歳而後旱傷麥民食榆皮二年十月壬申太皇太后避時昆明東觀又曰綏和二年春熒惑守心丞相翟方進欲塞灾異自殺客星左傳曰昭十年春王正月有星出于婺女客星也鄭禆竈言於子産曰七月戊子晉君將死今兹歳在顓頊之虚歳歳星也顓頊之虚謂玄枵姜氏任氏實守其地姜齊姓任薛姓齊二國守玄枵之地居其維首而有妖星焉告邑姜也客星玄枵之維首姜邑齊大公安晉唐叔之母星占婺女爲旣嫁之女織女爲處女邑姜齊之翫嫁女妖星在婺女齊得歳故知禍歸邑姜邑姜晉之妣也天以七紀二十八宿靣七戊子逢公以登星斯於是乎出逄公殷諸侯君齊地者逢公將死妖星岀婺女時非歳星所在故齊自當禍而以戊子曰卒吾是以譏之至時晉平公卒漢書曰元帝𥘉元元年四月客星大如瓜色青白在南斗第二星東可四尺占曰爲水飢其月㴾海水大溢六月關東大飢民多飢死瑯瑘人相食二年五月客星見昴分居卷舌東可五尺青白色炎長三寸占曰天下有妄言者其十二月鉅鹿都尉謝君男詐爲神人論死續漢書天文志曰孝安永𥘉四年六月甲子客星大如李蒼白芒氣長二尺西南指上階星上階爲三公後太尉張禹司空張敏皆免官又曰中平五年六月丁夘客星如三升椀出貫索西南行入天市至尾而消占曰客星入天市爲貴人䘮謝承後漢書曰吴郡周敞師事京房爲趙顯所譛謂敞曰吾死後三十日客星必出天市即吾無辜也死後果如言孛左傳曰文十四年有星孛入于北斗周内史叔服曰不出七年宋齊晉之君皆將死亂又曰昭十七年冬有星孛于大辰西及漢申湏曰彗所以除舊布新也天事象今除於火火出必布焉諸候其有火災乎梓慎曰徃年吾見之是其徴也火出而見今兹火出而章必火入而伏其居火也乆矣其與不然乎火出於夏爲三月於啇爲四月於周爲五月夏數得天若火作其四國當之六物之占在宋衛陳鄭乎宋大辰之虚也陳大皥之虚也鄭祝融之虚也皆火房也星孛及漢漢水祥也衛顓頊之虚也故爲帝丘其星爲大水水火之壯也其以丙子若壬午作乎水火所以合也若火入而伏必以壬午不過其見之月鄭禆竈言於子産曰宋衛陳鄭將同日火若我用瓘犖玉瓉鄭必不火子産弗與後四國皆火春秋孔演圖曰海精死彗星出宋均注曰海精鯨魚彗星出則國樞橛春秋考異郵曰鯨魚死彗星合宋均注曰鯨魚隂物生於水今出而死是時有兵相殺之祥也故天應之以妖彗也春秋合誠圖曰赤彗火精如火曜長七尺孝經鈎命决曰周襄王不能事其母弟彗入斗亡其度孝經内記曰彗星北斗禍大起在三台臣害君在太微君害臣在天獄諸侯作禍彗行所指其國大惡四彗在月中者君有徳天下欣心大豊盛爾雅曰彗星爲攙楚緘切搶楚庾切河圖帝通紀曰彗星者天之旗河圖稽燿鈎曰五星散爲五色之彗戰國䇿曰唐睢謂秦王曰專諸刺王僚彗星襲月史記曰秦始皇十五年彗星四見大者八十日長或竟天其後秦遂滅六王并中國外攘四夷死人如麻漢書曰建元六年彗星見淮南王心怪之以爲上無太子天下有變諸侯並争愈益治攻戰具遂謀反又曰哀帝建平二年二月彗星出牽牛日月五星所從起曆數之元三正之始彗而出之改更之象也其後卒有王莽篡國之禍後漢書曰獻帝建安二十三年正月孛星晨見東方二十餘日夕出西方紀歷五車東井五諸侯文昌軒轅入太微指帝座占曰除舊布新之象續漢書天文志曰王莽地皇三年十一月有孛星于張東南行五日不見孛星者惡氣所生爲亂兵又叅然雲焉兵之類也故名之曰孛孛之爲名猶有所傷害有所妨蔽或謂之彗星所以除穢而布新也張爲周地星孛于張東南行即翼􅰅之分翼爲楚楚地將有兵亂後一年正月光武起兵舂陵都雒居周地除穢布新之象也又曰孝明永平三年六月丁夘彗星岀天舡北長二尺所稍北行百三十五日去天舡爲水彗星出之爲大水是歳伊雒水溢到津城門壞伊橋郡七縣三十二皆大水又曰永和六年二月丁巳彗星見東方長六七尺色青白西南指營室及墳墓營室者天子常官墳墓主死彗星起而向營室至墳墓不出五六年天下有大䘮又曰光和元年八日彗星出亢池入天市中長數尺稍長五六丈赤色經歷十餘宿八十餘日乃消於天苑中彗除天市將徙帝將易都至𥘉平元年獻帝遷都長安又曰孝獻𥘉平九年十月有星孛于東井與鬼魁入軒轅太微十一年正月有孛于斗首在斗中尾貫紫宫及北辰占曰彗掃太微紫宫人主易位其後魏文帝受禪十二月辛夘有星孛于鶉尾荆州分也時荆州牧劉表專據荆州從事周羣以爲荆州牧將死而失士明年秋表卒以小子琮以代曹公將攻荆州琮懼舉軍詣公降晏子春秋曰景公謂晏子曰彗星向吾國我是以悲晏子曰居穿池欲深廣爲臺欲髙大誅戮如仇讎孛又將至彗星容可拒乎懼緩刑罰三十七日彗去尉繚子曰昔楚將軍子心與齊人戰未合夜彗星出柄在齊所在勝不可擊子心曰彗星何知明日與齊人戰大破之淮南子曰鯨魚死而彗星出天狗占曰狗者守禦之類天狗所降以戒守禦也出入無時下則有伏屍流血其流星墮地有聲野雉皆鳴或羣狗皆吠或流散化爲雲一曰流星有聲如雷下地中一曰無雲而雷一曰星赤白有光下地爲狗狗無足一曰如火光炎衡天其上瓮下地如數頃田一曰大流星其有光見人靣墜無音有足一曰星狀如奔星有聲望之如火一曰其色白其熒熒如遺火狀皆曰天狗天狗所下之處万人伏屍狗食血所下之邑大兵起國易政人相食千里流血四方相射破軍殺將兵䘮並起國破㓕巳河圖稽燿鈎曰太白散爲天狗主候兵洪範五行傳曰七國之兵戰於梁地故天狗先降梁壘見以其象也狗者守禦之類也所降以惑守禦也史記曰秦孝公十二年星晝墜有聲至十七年秦韓大戰擒晉惠王又天官書曰天狗狀大如奔星有聲其止地類狗地望之如火光炎炎衝天其下圎如數頃田處上瓮見則有黄色千里破軍殺將洪範五行傳同漢書天文志曰孝昭元年二月乙酉祥雲如狗赤色星三枚夾漢書西行占曰太白散爲天狗爲卒起卒起見禍無時四月昌邑王賀行淫僻大將軍霍光白皇太后廢賀又曰成帝綏和元年四月日晡時天有星殷如雷聲有流星如缶長十餘丈皎然赤白從日下東南去或如盂或如雞子熠熠如雨下至地止郡國皆言星隕爲王者失勢諸侯起伯之異其後王莽專政簒位又曰哀帝建平元年正月日出時有物着天白廣如一疋布長四丈餘西南行聲如雷一刻止名曰天狗又曰後漢光武建武十一年春有流星大如日從太微岀入北斗魁中第六星色白傍有小星射者十餘枚後有聲如雷頃止斗魁主殺伐是年吴漢臧宮破公孫述於成都十二年春有大星如缶出柳西南行入孤將滅時分爲十餘叚如遺火狀湏臾有聲殷殷如雷柳爲周狐爲秦蜀是年使大司馬吴漢從洛陽發南陽卒泝江而上擊蜀白帝公孫𫐠數萬人又曰中元元年冬有大流星從西南向東北行有聲如雷其年中郎將竇固將西征又曰順帝永和三年有流星大如斗從西北東行長八九尺赤黄有聲隆隆如雷是時大將軍梁啇與常侍張逵曹騰孟賁等争權矯制収騰順帝寤逵等奔走或自刺或解貂蟬投草中逃亡之應漢獻帝春秋曰𥘉平四年六月流星起織女東南行天市中虵行有尾長七八丈色赤照地又流星如斛長六七丈小者六七枚隨之光照地又流星西北行有聲如雷望之如火又照地是曰天狗晉書曰惠帝永興元年七月流星有聲二年又有星隕有聲後二年懷帝愍帝蒙塵劉元海石勒攻掠遂亡中夏又曰懷帝永嘉元年有大流星如日自南流于東北小者如斗相隨天盡赤有聲如雷是年汳桑煞東燕王騰明年劉元海僣號又曰穆帝永和十年流星大如斗色赤黄岀織女没造父有聲如雷其年慕容儁據臨漳諸將奔散又曰海西公大和四年十月有大流星西下有聲如雷明年廣漢妖賊李弘反自稱聖王又慕容暐尅鄴盡有地明年桓温廢帝又曰孝武太元十三年天狗東北下有聲占曰此交戰流血是後慕容垂翟遼姚萇符登慕容永並阻兵争強宋書曰後廢帝元徽五年四月星隕于東南有聲如雷崔鴻十六國春秋曰後趙石勒建平四年有流星大如尾足形自北極西南流五十餘丈光明燭地墜于河聲聞九百餘里其年石勒死而季龍殺勒諸子而篡位隋書曰北齊孝昭皇建二年十月天狗下於郿山於其下講武厭之帝將至有兎驚馬帝肥墜馬而死又曰武成清河三年春天狗南流下宋地彭城其年妖人反於鄴入北城刼太師彭城王浟爲主浟不從見害又曰周宣王大象元年五月有流星大如二斗器云從太微端門流入有聲如翻旗其月静帝立隋公楊堅專政俄而禪位又曰静帝大定元年七月有大流星如斗岀五車東北流光明燭地是月趙王招越王盛以謀執政𬒳誅又曰隋煬帝大業十二年八月夜有大流星如斗岀王良閣道聲如頽墻其日又有大流星如瓮岀羽林有聲明年帝幸江都天下大亂山海經曰金門之山有赤犬名曰天犬其所下者有兵郭璞注曰周書天狗所止地湏臾光飛天爲流星長數十丈其疾如風聲如電光吴楚七國反時犬過梁野兵書曰兩敵相望其雲氣如牛馬狀頭低尾仰曰天狗勿與戰也枉矢河圖稽燿鈎曰辰星散爲枉矢流所射所誅河圖曰枉矢東流天下恐尚書運期授曰白帝之治六十四丗其亡也枉矢射叅尚書中候曰夏桀無道枉矢射洪範五行傳曰枉矢者弓矢之象也枉矢之所觸天下之所伐㓕亡之象也春秋運斗樞曰黄帝行失樞則枉矢出射所謀謀易失樞之王故以枉矢射之春秋潜潭己曰枉矢岀臣不忠又曰枉矢或南或北無聚衆伐戰國論語摘輔象曰虚王反度枉矢合史記天官書曰枉天類大流星虵行而蒼黒望之如有毛目又曰項羽救鉅鹿枉矢西流山東遂合從西坑秦人屠咸陽說苑曰秦二丗立枉矢夜光俄而天下大亂二丗𬒳殺晉書曰武帝元康四年枉矢北行竟天次年夜枉矢自北斗魁東南行占曰以亂伐亂北斗主殺伐是後趙王倫殺司空張華廢賈后終自屠滅又曰太熈元年有枉矢西南流懷帝永嘉四年劉聦嘉平三年星起牽牛委曲虵形入紫宫其光照地其年帝爲劉聦所害後三年聦死國亡又曰愍帝建興三年枉矢自文昌北流至斗東如一疋布綘虵行有手足因變爲雲氣如人象二臂一足至五年北平人吴祚聚衆千人立沙門爲天子四年帝降劉曜又曰元帝大興三年枉矢出虚危没翼大寧二年王敦殺譙王承及甘卓又曰穆帝昇平二年枉矢自東南流于西北其長半天時所在擁兵政非己岀隋書曰齊昬侯永光三年春枉矢晝見西方長十餘丈其年梁武舉兵東昬遇害又曰隋煬帝大業十二年枉失二出北斗魁委曲虵形注於南斗後二年宇文化及於江都僣號許王世充於東都殺恭帝僣號鄭蚩尤旗河圖稽燿鈎曰熒惑散爲蚩尤旗主惑亂河圖提劉子曰帝將怒蚩尤出乎四野史記曰天官書曰蚩尤之旗類彗而後曲象旗見則王者征伐四方魏志曰嘉平四年六持節奉法駕迎髙貴郷公元城是歳白氣經天大將軍司馬景王問王蕭其故肅曰此蚩尤之旗也東南其有亂乎君若修己以安百姓則天下樂安者歸徳倡亂者先亡矣明年鎮東將軍母丘儉揚州刺史使文欽果反皇覽冡墓記曰蚩尤冡在東郡壽張縣闕郷城中髙七丈民常十月祠之有赤氣出如降名爲蚩尤旗獄漢河圖稽燿鈎曰塡星散爲獄漢春秋合誠圖曰獄漢主逐王獄漢塡星精所爲史記天官書曰獄漢星孟康曰青中赤下有三彗蹤横亦鎮星之精一名咸漢也岀正北北方之野星去地可六丈而赤數動察之中有青所出非其方其下有兵衡不利五殘河圖稽燿鈎曰鎭星散爲五殘主奔亡春秋合誠圖曰五殘主岀亡春秋考異郵曰五殘類辰星有角見則政在伯史記天官書曰五殘星岀正東方東方之野星狀類辰星去地可五六七文所岀非其方其下有兵衡不利山海經曰西王母是司天之五殘國皇河圖稽燿鈎曰歳星之精流爲國皇主内難春秋考異郵曰國皇大而赤類南極見則兵起天下急宋極均注曰南老人星也續漢書天文志曰靈帝光和中國皇見東南角去地一二丈如炬火十餘日占曰國皇爲内亂外兵䘮其後黄巾張角何進袁紹董卓亂燔燒宫室遷西京格澤廣雅曰格澤妖氣史記天官書曰格澤星者如炎火之狀黄白起地而上下太上兊其見不種而穫不有土功必有大咎旬始河圖稽燿鈎曰填星散爲旬始主招横春秋合誠圖曰旬始主争兵春秋考異郵曰旬始照其下必有滅主廣稚曰旬始妖氣也史記天官書曰旬始岀於北斗旁狀如雄雞其色青黒象㐲鼈楚辭逺遊集曰重陽入帝宮造旬始而觀清都司馬相如大人賦曰垂旬始以爲慘孟康曰旬始氣如雄雞在北斗傍懸於葆卜以爲十二旒慘音所衘切營頭占曰流星晝行亡君之戒一曰流星晝名營頭營頭而下流血滂滂一曰有雲如懷山墮所謂營頭之星其所墮覆軍流血續漢書天文志曰王莽地皇四年遣王㝷王邑將兵至昆陽圍城數重晝有雲氣如懷山墮軍上軍人皆厭所謂營頭之星也占曰營頭之所墮其下覆軍流血三千里是時光武將兵數千人赴救昆陽擊二公㑹天大風飛屋瓦雨如注水二公亂敗死者數萬人晉書曰惠帝大和二年星晝流矢北下光變目有聲如雷占曰爲營首營首所在其下有大亂流血又曰穆帝永和八年日未入有流星大如三斗魁從辰巳上東南行在箕斗間占曰營首之下流血滂沲是年慕容雋稱大燕攻伐無巳漢詩推度災曰逆天地絶人倫則天漢滅見史記天官書曰漢者金氣之散其本漢水中星多則水少即旱書紀年曰晉定六年漢不見于天蓬星漢書天文志曰孝景中三年六月壬戌蓬星見西南在房南大如二升器色白癸亥在心東北甲子在尾北丁夘在箕北近漢稍小且去時大如桃壬申去凡十日占曰蓬星出必有亂臣房心間天子宫也是時梁王欲爲漢嗣使人殺漢諍臣袁盎晉中興書曰太元二十年九月有蓬星如粉絮東行歴女虚色及哭星太平御覽卷第八百七十五
