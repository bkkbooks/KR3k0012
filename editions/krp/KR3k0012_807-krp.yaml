front:
  text: 太平御覽卷第八百七珎寳部六
  hash: sha256:9257dbd3cf39d7bb5e978c4e5fdc665cd4fe195e430470a00d9a110f6a660b27
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_807-1a}
body:
  text: 璋琮璜瓉瑁珊瑚瑇瑁貝璋說文曰璋半圭也尚書顧命曰康王即位太保秉璋以酢孔安囯注曰王已祭太保又祭報祭曰酢也毛詩棫樸曰濟濟辟王左右奉璋半圭曰璋又斯干曰乃生男子載弄之璋又板曰天之誘民如壎如箎如璋如圭如取如擕周禮春官上大宗伯曰以赤璋禮南方又典瑞曰牙璋以起軍旅以治兵革馬融注曰牙璋若今之銅虎符又秋官下小行人曰合六弊順有璋也公羊傳定公八年曰陽虎竊寳玉而走晉寳者何制璋也爾雅曰大璋八寸謂之琡璋半圭也山海經曰招揺之神祠用一璋吕氏春秋曰成功用璋琮說文曰琮瑞玉也八寸似車釭周禮春官上大宗伯曰以黄琮禮地又秋官下小行人職曰合六幣琮以錦又冬官下玉人曰璧琮八寸以頫聘駔琮五寸宗后以爲權駔讀爲鉏大琮十有二寸射四寸厚寸是謂内鎭宗后守之駔琮七寸鼻寸有半寸天子以爲權瑑琮八寸諸侯以享夫人白虎通曰貟中方外曰琮琮起土功位西方吕氏春秋曰大喪用琮璜說文曰璜半璧也尚書中候曰文王由磻谿之水吕尚釣其涯王下拜曰乃今見光景于斯尚曰望釣得玉璜周禮春官上大宗伯曰以玄璜禮北方又秋官下小行人曰合六幣璜以黼左傳文公曰周公相王室以尹天下於周爲睦分魯公以大路大旂夏后氏之璜杜預注曰璜美玉名又哀下曰宋向魋出奔衛公父文伯攻之求夏后氏之璜與之他玉而奔齊白虎通曰璜以徴召位在北方又曰何謂五玉玉謂圭璧琮璜璋又曰孔子卒受魯君璜玉葬墎之北文子夏曰夏后之璜不能無纇淮南子曰夏后氏之璜不能無考考瑕又曰精神可寶非直夏后之璜楚辭曰璜臺十成誰可極焉璜石次玉傅玄歌詩曰有所思兮在天一方何用贈之玉佩珠璜瓉說文曰瓉三玉一石也天子用全純玉也上公用駹四玉一石侯用瓉伯用將玉石半相將也尚書文侯命曰平王錫晉文侯秬鬯圭瓉作文侯之命毛詩文王旱麓曰瑟彼玉瓉黄流在中玉瓉圭瓉也黄金所以流鬯也圭瓉之狀以圭爲柄黄金爲勺青金爲外朱中央毛詩大雅江漢曰釐爾圭瓉秬鬯一卣告于文人釐賜也周禮春官小宗伯曰凡祭祀賔客以時將瓉果將送也猶奉也祭祀以時奉而授王賔客以時奉而授宗伯天子圭瓉諸侯璋瓉又冬官下玉人曰祼圭有瓉以祀廟禮記王制曰諸侯賜圭瓉然後爲鬯未賜圭瓉則資鬯於天子得其器乃敢爲其事圭瓉鬯爵也鬯秬酒也又明堂位曰季夏三月以禘禮祀周公於太廟灌用玉瓉大圭又祭統曰君執圭瓉祼尸大宗執璋瓉亞祼及迎牲左傳昭四曰有星孛于大辰西及漢鄭禆竈言於子産曰宋衛陳鄭將同日火若我以瓘斚玉瓉鄭必不火瓘圭也斚玉斚瓉勺也欲穰火子産不與漢書曰王莽加九命秬鬯圭瓉魏志曰天子命魏文踐祚錫命孫權秬鬯圭瓉北史曰于謹受華州刺史賜秬鬯一卣珪瓉副焉白虎通曰圭瓉鬯宗廟之盛禮也瑁音昌尚書顧命曰乃受同瑁王受瑁爲主受同以祭周禮冬官下玉人曰天子執瑁四寸以朝諸侯玉以君之似梨冠也白虎通曰天子執瑁以朝諸侯瑁之爲言冒也上有所覆下有所冒也珊瑚說文曰珊瑚色赤生於海中或生於山也孝經援神契曰珊瑚鈎瑞寳也神靈滋液百珎寳用則見廣雅曰珊瑚珠也晉書曰石崇王愷爭豪武帝每助愷甞以珊瑚樹賜之髙二尺許枝柯扶踈丗所罕比愷以示崇崇便以鐵如意撃之應手而碎愷旣惋惜又以爲疾已之寶聲色方厲崇曰不足多恨今還卿乃令左右悉取珊瑚有三四尺者六七株條榦絶俗光彩曜日如愷比者甚衆愷怳然自失矣又四夷傳曰大秦國一名犁鞬在西海之西其地東西南北各數千里有城邑其地周廻百餘里屋宇以珊瑚爲挩而琉璃爲牆璧水精爲柱礎也宋書曰劉勔爲鬱林太守勔旣至隨冝剪定大致名馬并獻珊瑚宋紀曰大明六年鬰林郡獻珊瑚連理樹南史曰扶南國梁天監二年跋摩復遣使送珊瑚佛像并獻方物又曰波斯國有鹹池生珊瑚樹長一二尺亦有虎珀馬腦眞珠玟㻁等國内不以爲珎西京雜記曰積草池中有珊瑚樹高一丈二尺一夲云三柯上四百六十二條是南越國王趙他所獻號爲𤇺火樹至夜光景昭然漢武故事曰武帝起神堂前庭植玉樹葺珊瑚爲枝述異記曰鬰林郡有珊瑚市海客市珊瑚處也珊瑚碧色生海底一樹數十枝枝間無葉大者髙五六尺尤小者尺餘鮫人云海上有珊瑚宮漢元封二年鬰林郡獻瑞珊瑚婦人帝命植於殿前謂之女珊瑚忽一旦柯葉甚茂至靈帝時樹死咸以爲漢室將亡徴也海中經曰珊瑚生海中欲取之先作鐵網沉水厎珊瑚貫網而生歲髙二三尺有枝無葉形如小樹因絞網出之珊瑚皆摧折在網中孫氏瑞應圖曰珊瑚鈎者王者恭信則見一夲云不珎玩弄則出廣志曰珊瑚其長者爲御車柱出西海底玄中記曰珊瑚出大秦西海中生水中石上𥘉生白一年黄三年赤四年蟲食敗司馬相如上林賦曰玟㻁碧林珊瑚藂生班固兩都賦曰珊瑚之樹上栖碧雞傅玄紫華賦曰炳叅差以照燿兮何光麗之難形葩艶挺於碧枝兮煥若珊瑚之翠英潘安仁石榴賦曰似長離之栖鄧林若珊瑚之映緑水瑇瑁周書王㑹曰伊尹謂湯曰請以瑇瑁爲獻孝經援神契曰神明滋液則瑇瑁背宋均日背文也春秋考異郵曰承石取鐵瑇瑁吸類相致也芥也音若史記曰趙使使於春申君欲誇楚爲瑇瑁簮劒器悉飾以瑇瑁又曰江南出丹沙犀象瑇瑁珠璣漢書西域傳賛曰故能覩犀布瑇瑁則建珠崖七郡感蒟醬竹枝則開䍧牱越嶲續漢書輿服志曰貴人助蚕瑇瑁釵范曄後漢書曰賈琮傳云交趾土多珎産明璣翠羽象犀瑇瑁異香美木之屬莫不自出前後刺史率多無清行有司舉琮爲交趾刺史又曰和熹鄧皇后臨朝上方珠玉犀象瑇瑁雕鏤之物皆絶又曰天笁國出象犀玳瑁也呉録曰嶺南盧賔縣漲海中玳瑁似龜而大呉録曰魏使以馬求易珠璣翡翠玳瑁孫權曰此皆孤所不用而得馬若何而不聽晉命曰士卒百工不得服犀玳瑁齊書曰少帝夜醉乗馬從西歩廊向北馳走如此兩三將倒臨汝侯坦之諫不從執馬椌帝運拳擊垣之着到地坦之與曹道剛扶抱還壽春殿瑇瑁牀上卧齊書曰廬陵王子卿爲荆州刺史在鎭營造服飾多違制度作瑇瑁乗具詔責之令速送都唐書曰憲宗朝訶陵國獻僧祗女二人瑇瑁榼生犀物等西京雜記曰韓嫣以玳瑁爲牀南方異物志曰玳瑁如龜生南海大者加籧篨背上有鱗大如扇發取鱗因見其文欲以作器則煑之刀截任意所爲冷乃以梟魚皮籍治之後以枯木條葉瑩之乃有光輝廣志曰玳瑁形似龜出南海巨延州司馬相如紫虚賦曰網瑇瑁釣紫貝張衡東京賦曰翡翠不裂玳瑁不簇孫德施南榴枕賦曰委之玳瑁席停之象牙床劉楨清慮賦曰後布玳瑁之席前設觜蠵之筵左思呉都賦曰蠵璧玳瑁金質黒章繁欽寄情詩曰何以表別離取後玳瑁釵班固與竇憲牋書曰明將軍賜固駮玳瑁簮髙文惠與婦書曰今致玳瑁梳一枚貝說文曰貝海介蟲也古者貨貝而寳龜至周而有泉到秦廢貝行泉尚書禹貢曰淮海惟楊州厥篚織貝又顧命曰大貝鼖鼓在西房孔安囯注曰大貝如車渠啇周傳寶之毛詩曰萋兮棐兮成是貝錦又義䟽曰具鼊之屬又有紫貝其白質如玉而紫點爲文皆行列相當大者有徑一尺六寸今九眞交趾以爲杯盤寳物也爾雅曰貝居陸者在水者大者魫小者鰿音積今之細貝亦有紫色暏出南玄貝貽貝黑色貝也餘蚳黄白文音治黄質白文也餘泉白黄文以白爲質黄爲文點今之紫貝以紫爲質黒爲文點也蚆愽而者中央廣兩頭銳大而險險者謂汗簿􅜽小而橢即上小貝橢謂狹而長此皆說貝之形容也春秋運斗樞曰瑶光得江吐大貝尚書大傳曰文王囚於姜里散冝生之江淮之浦而得大貝如車渠以獻紂歸藏曰有人將來遺我貨貝以至則徹以求則得有喜則至漢書曰文帝賜南越王尉他書及衣他因使者獻貝五百又曰王莽時大貝四寸八分已上二枚爲一朋直二百一十六壯貝三寸六分已上一朋直百五十分貝二寸四分已上一朋直三十小貝寸二分巳上一朋直十不盈寸二分不得爲朋率枚直錢三是貨南史曰南海有婆利國在廣州東南二月日行出文螺紫貝有石名蚶貝羅𥘉採之柔軟及刻削爲物暴乾之遂大硬山海經曰隂山濁谷之水注于蕃之澤中多文貝又曰隂山漁水中多文貝邽山濛水多黄具赤水之東蒼梧之野有文貝太公六韜曰商王拘周西伯昌於姜里太公謂散冝生求物以免君罪九江得大具百朋詩作百明鹽鐵論曰敎與俗改弊與丗易夏后以玄貝周人紫石也夲草經曰貝子一名貝齒生東海楚辭九歌曰魚鱗兮龍堂紫貝闕兮朱宫河伯以魚鱗盖畫龍文紫具作闕者丹其宫之義也廣州志曰貝凢有八紫貝㝡爲美者出交州大貝出巨延州與行賈貿易萬震南州異物志曰乃有大貝竒姿難儔大貝文貝也交趾以南海中皆有之素質紫飾文若羅朱不磨不瑩彩輝光浮思雕莫加欲琢靡踰在昔姬伯用免其拘徐哀南方記曰班貝羸大者圍之得六十小者圍之得五十在於海邊捕魚人時有得之者大貝出諸簿巨延州土地採賣之以易絳青劉欣期交州記曰大貝出日南如酒杯小貝貝齒也善治毒俱有紫色南州異物志曰交趾北南海中有大文貝質白而文紫色天姿自然不假雕琢瑩而光色焕爛相貝經曰相經朱仲受之於琴髙琴髙乗魚浮于河海水産必究仲學先於琴髙而得其法獻珠於漢武云不知所以嚴助爲㑹稽太守仲又云遺助以徑尺之貝并致此文於助曰黄帝唐堯夏禹三代之貞瑞靈竒之秘寳其有次此者貝盈尺狀如赤電黒雲謂之紫貝素質紅黒謂之珠貝有青地緑文謂之綬貝黒文黄畫謂之霞貝紫愈疾珠明目綬清氣鄣霞伏蛆蟲不能延齡増壽其禦害一也復有下此者鷹喙蟬脊以逐温去水無竒功貝大者如輪文王請大秦貝徑半㝷穆王得其殻懸於昭觀秦穆公以遺燕黽可以明目逺冝玉冝金南貝如珠璣或曰駮其性寒其味甘巴水毒浮貝使人寡無以近婦人黒白各半是也濯使人善驚無以親童子黄脣點齒有赤駮是也雖貝使病瘧黒鼻無皮是也䂃貝使人胎消勿以示孕婦赤帶通脊是也慧貝使人善忘勿以近熾内殻赤絡是也醟貝使童子愚女淫有青脣赤鼻是也碧貝使人盗脊上有縷句脣是也雨則重霽則輕委貝使志強夜行伏迷鬼狼豹百獸赤中貟是也雨則輕霽則重太平御覽卷第八百七
