  text: 大平御覽卷第八百二十
  hash: sha256:d9e3722889ac22e89596616e638e48204ca09707d8abf619c742b2d41e99bf42
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_820-1a}
body:
  text: 布帛部七布火浣布紵白疊布說文曰細布十五升布也纑布縷也絟細布也繐蜀布也釋名曰布布列諸縷繐慧也齊人謂涼爲慧言服之輕細凉慧也周禮地官下載師曰凡宅不毛者有里布又夏官下職方氏曰正北曰并州其淶易其利布帛禮記月令曰仲夏之月母暴布鄭玄注曰不以隂功于太陽事禮記玉藻曰年不順盛君衣布爲凶年變又冠義曰始冠之冠緇布之冠也太古冠布齋則緇之其緌也左傳閔公曰衛文公大布之衣大帛之冠襄二曰諸侯圍偪陽主人懸布魯孟氏之臣秦堇父登之及堞而絶之偪陽人懸布以試外之勇者墜則又懸之蘇而復上者三主人辭焉乃退主人嘉其勇故辭謝不復懸布帶其斷布以徇於軍三日帶其斷布以示勇也又襄二十八年齊子尾曰且夫冨如布帛之有幅焉爲之制度使無遷也遷移也夫民生厚而用利於是乎正德以幅之言厚利皆人之所欲唯正德可以爲之幅使無黜嫚黜猶放也謂之幅利利過則爲敗吾不敢貪多所謂幅也周易說卦曰坤爲布論語郷黨曰齊必有明衣布史記張騫傳曰臣在大夏時見卭竹杖蜀布問安得此大夏國人曰吾賈人徃市身毒在大夏東南可數千里又曰伏靈在莵絲之下燭之火滅即記其數以新布四尺環置之明即掘取漢書曰太山以布爲貨廣二尺二寸爲幅長四丈爲疋又曰髙帝曰吾奮布衣而取天下又曰文帝徙淮南王長道死時民謡曰一斗粟尚可舂一尺布尚可縫兄弟二人不相容又曰公孫弘爲丞相而卧布𬒳又曰張敞爲京兆尹長安游徼受臧布罪名巳定其母年八十守遺腹子詣敞自陳願乞一生之命敞多其母守節而出教更量所受布狹幅短度中䟽虧二尺賈直五百由此得不死東觀漢記曰廉范年十五入蜀迎祖母䘮及到葭萌渡舡没幾死太守張穆持筒中布數篋與范范曰石生堅蘭生香前後相違不忍行也遂不受又曰建𥘉元年賈逵入北宫虎觀南宫雲臺使出左氏大義書奏上嘉之賜布五百疋衣一襲謝承後漢書曰靈帝時楊珽爲零陵太守時蒼梧滑賊相聚吏民憂恐珽乃特制馬車數十乗以排囊盛石灰於車上繫布索於馬尾從風鼔灰賊不得視因以火燒布燃馬驚奔突賊陣又曰董卓獲山東兵以猪膏塗布十餘疋用纏其身然後燒之先從足起又曰呉郡夲不獻越布陸閎美容儀常衣越布單衣明帝好之因勑郡獻越布由此始也華嶠後漢書曰哀牢夷知染綵紬布織成文章如綾絹有梧木華績以爲布幅廣五尺㓗白不受垢汗先以覆亡人然後服之華陽國志出之與此同又曰王允與吕布及士孫瑞謀董卓有人書回字於布上負而行於市歌曰布乎布乎有告卓者卓不悟范曄後漢書曰馬太后詔曰吾爲天下母而身服大練食不求甘左右但著布布無香薫之飾者欲身率下也又曰元和二年詔令天下大酺五日賜公卿以下錢帛各有差及洛陽民當酺者布户一疋外三户共一疋賜博土弟子見在太學者布人三疋典略曰蘇秦如趙逢其隣子於易水之上從貸布一疋約價千金鄰子不與魏略曰大秦國在安息條支西出細布布織成言用水羊毳名曰海西布又曰大秦國出金塗布緋持竹布發隆火浣布阿羅得布巴則布鹿代布温宿布五色枕布魏文帝詔曰夫珍翫所生皆中國及西域他方物比不如也代郡黃布爲細樂浪練爲精江東太未布爲白故不如白疊故鮮皮也魏略曰皇甫隆爲燉煌太守燉煌婦人作裙率縮如羊膓用布一疋隆禁止之所省復不訾晉書曰王戎性慳從子將㛰遺一單布衣㛰畢却収之又曰蘇峻平後帑藏空竭庫中唯練數千端鬻之不售而國用不給導患之乃與朝賢俱制練布單衣於是人士翕然竟服之練遂踴貴乃令主者出賣端至一金又曰謝尚書江夏相府以布四十疋爲尚造烏布帳尚以爲軍士𥜗袴又曰顧愷之爲殷仲堪荆州叅軍嘗因假還仲堪特以布帆借之至破冡遭大風愷之與仲堪牋曰地名破冡直破冡而出下官平安布帆無恙宋書曰王玄謨侵魏爲前鋒好營貨利一疋布責人八百梨以此倍失人心梁書曰蕭恢爲郢州刺史境内大寧時有進筒中布者恢以竒貨異服即命焚之於是百姓仰德陳書曰姚察自居顯要一不交通嘗有私門生不敢厚餉送南布一端花練一疋察謂曰吾所衣著止是麻布蒲練此物於吾無用旣欲相接欵幸不煩爾此人遜請察厲色驅出自是莫敢饋遺南史曰林邑國出古貝古貝者樹名也其華盛時如鵝毳抽其緒紡之以作布布與紵布不殊亦染成五色織爲班布又曰東夷扶桒國其土多扶桒木故以爲名扶桒爲桐𥘉生如荀國人食之實如梨而赤績其皮爲布以爲衣亦以爲錦燕書曰宋該字宣孔爲右長史太祖㑹羣僚以該性貪故賜布百餘疋令負而歸重不能致乃至僵頓以愧辱之後魏書曰楊大眼爲荆州刺史常縛膏爲人衣以青布而射之召諸蠻渠指示之曰卿等作賊吾正如此相殺也又曰楊椿歸老臨行誡子孫曰國家初丈夫好服彩色吾雖不記上谷翁時事然記清河翁時服飾恒見翁着布衣韋帶嘗自約勑諸父曰汝等後世若冨貴於今日者愼勿積金一斤綵帛百疋巳上用爲冨也北史曰齊鄭述祖爲光州刺史有人入市盗布其父怒曰何惡仁君執之以歸首述祖特原之自是境内無盗唐書曰貞觀十八年命將征遼東安州人彭逋請出布五千叚以資征人上喜之比漢之卜式拜宣義郎晏子春秋曰景公謂晏子曰東海中有水而赤中有棗華而不實何也晏子曰者秦繆公乗龍治天下以黄布褁蒸棗至海而淬其布於波黃布故水赤蒸棗故華而不實公曰吾佯問晏子對曰嬰聞佯問者亦佯對之莊子曰魯君聞顔闔得道之人使人以弊先焉顔闔守門麤布之衣而自飯牛使者致幣顔闔對曰恐聽謬而遺使者罪不若審之使者還反復來求即不得孫卿子曰與人善言煖若布帛與人惡言深於矛㦸韓子曰衛人有夫妻禱而祝曰使我無故得百束布其夫曰何少也妻曰益則子將取妾又曰齊國好厚葬布帛盡於衣衾林木盡於棺椁桓公患之以告管仲曰布帛盡則無以爲幣林木盡則無以爲守備而人厚葬之不休禁之柰何管仲對曰凡人之有爲也非名之則利之也於是乃下令曰棺槨過度者僇其戸罪夫當䘮者夫僇死無名罪當䘮者無利人何故爲之也又曰公儀休相魯其妻織布休曰汝豈與世人争利哉遂燔其機淮南子曰布之新不如紵紵弊而不如布或善爲新或善爲故美由冝也抱朴子曰寸裂之錦黻未若堅完之韋布郭子曰劉道眞嘗爲徒扶風王以五百疋布贖之旣而用爲從事中郎當時以爲美談吕氏春秋曰戎人見暴布者問曰何以爲此莽莽也指麻而示之怒曰此權權何以爲莽莽權權由養治之莽莽長皃也說苑墨子曰古有用無文者禹是也土階三等衣裳細布當此時黼黻無所用務在完堅王子年拾遺記曰周成王六年然丘國遣使貢獻使者衣雲霞之布如今之朝霞布也列女傳曰楚江乙母者當恭王之時乙爲大夫有入王宫盗者令尹以罪乙請於王而黜之處家無幾其母亡布八㝷言令尹盗之王曰令尹在上冦盗在下令尹不知有何罪焉母曰昔日妾子爲郢大夫人盗王宫中之物妾子唑之而黜令尹獨何不以是爲過也王曰善令吏償母之布因賜金十溢母讓金布曰妾豈貪貨而干王哉怨令尹之治也遂不肯受王曰母智若此其子必不愚乃復召江乙而用之先賢行狀曰王烈字彦考通識逹道人皆慕之州閭成風咸競爲善時國中有盗牛者牛主得之盗者曰我邂逅迷惑從今巳後將改過子旣巳見宥幸無使王烈聞之人有以告烈者烈以布一端遺之廣州先賢傳曰丁密蒼梧廣信人也清貧爲節非家織布不衣竹林亡賢論曰王戎爲侍中南郡太守劉肇遺戎筩中布五十端戎不受而厚報其書議者以爲譏世祖患之爲發詔議者乃息越絶書曰葛山者勾踐種葛使越女織治葛布獻於呉玄中記曰玄菟北有山山有花人取紡績葛布南越志曰桂州豐水縣有古終藤俚人以爲布南州異物志曰五色班布以絲布古貝木所作此木熟時狀如鵝毳中有核如珠玽公後切細過絲緜人將用之則治出其核但紡不績在意小抽相牽引無有斷絶欲爲班布則染之五色織以爲布弱輭厚緻上毳毛外徼人以班布文最煩縟多巧者名曰城其次小麤者名曰文辱又次麤者名曰烏驎顧微廣州記曰阿林縣有勾芒木俚人斫其大樹半斷新條更生取其皮績以爲布輭滑甚好裴氏廣州記曰蠻夷不蚕採木緜爲絮皮貟當竹剥古縁藤績以爲布笑林曰沈珩弟峻字叔山有譽而性儉張温使蜀辭峻峻入内良乆出語温曰向擇一端布欲以送卿而無麤者温嘉其能顯非俗說曰桓豹奴善騎乗亦有極快馬時有一諸葛即自云能走與馬等桓車騎以百疋布置埒令豹奴乗馬與諸葛並走至者得布便俱走諸葛恒與馬齊欲至埒馬頭去埒布三尺許諸葛一歩杜寳大業拾遺録曰七年十二月朱寛征留仇國還獲男女口千餘人并雜物産與中國多不同緝木皮爲布甚細白幅闊三尺二寸亦有細斑布幅闊一尺許夏侯開國呉郡賦曰金玉星煩明當霞聚纎絺細越青箋白紵名練奪乎樂浪英葛光乎三輔張載擬四愁詩曰佳人遺我筒中布何以報之流黄素楊雄蜀都賦曰細絺弱折緜繭成衽筩中黄潤一端數金魏武遺令曰銅雀臺上安六尺牀施繐帳月旦十五日向帳作妓汝等時時登銅雀臺望吾西陵墓田曹植表曰欲遣人到鄴市上黨布五十疋作車上小帳帷謁者不聽陸機弔魏武文曰悼繐帳之冥漠怨西陵之芒芒火浣布魏志曰青龍三年西域重譯獻火浣布詔大將軍太尉臨試以示百僚呉録曰日南比景縣有火䑕取毛爲布燒之而精名火浣布崔鴻十六國春秋前秦録曰天笁國獻火浣布南史曰南海諸簿國東千餘里至自然火洲其上有樹生火中洲左近人剥取其皮紡績作布以爲手巾與蕉麻無異而色微青黒若小垢洿則投火中復更精潔或作燈炷用之不知盡列子曰周穆王大征西戎西戎獻崑吾劒火浣布其劒長尺有咫錬銅赤刃用之切玉如泥焉其布浣之必投火中布則火色出而振之皜然疑乎雪也抱朴子曰海中肅丘有自生火常以春起而秋滅丘方十里當火起滿洲洲上純生一種木正暑此木雖爲火所焚而不䴢但小燋黒人或得爲薪者火之俱如常薪但不成灰炊熟則以水灌㓕之後復更用如此不窮夷人取此木華績以爲布其木皮赤剥以灰煑治以爲布但麤不及華俱可以火浣又有白䑕毛長三寸許亦居此洲上空木中入火中不燒灼也其毛又可績以爲布故火浣有三種傳子曰長老說漢桓帝時大將軍梁兾作火浣布單衣㑹賔客行酒公卿朝臣前佯爭酒失杯而汙之僞怒解衣而燒之布得火煒燁赫然而熾如燒凡布垢盡火滅粲然㓗白如氷澣之東方朔神異經曰南荒之外有火山長四十里廣五十里其中皆生不燼之木晝夜火燒得暴風不猛雨不滅火中有䑕重百斤毛長二尺餘細如絲可以作布恒居火中色洞赤時時出外而色白以水逐而沃之即死織以爲布捜神記曰崑崙之墟有炎火之山山上有鳥獸草木皆生長於炎火之中故有火浣布非此山草木之皮枲則其鳥獸之毛也漢世西域舊獻此布中間乆絶至魏𥘉時人疑其有文無實文帝以爲火性酷烈無含育之氣著之典論明其不然曰不然之事絶智者之聽及明帝立詔三公曰先帝昔著典論不朽之格言其利刋石于廟門之外及太學與石經並以爲永示後丗至此西域使至始獻火浣布焉於是刋滅此論而天下笑之臣松之昔從征西洛陽歷觀舊物見典論石在太學者尚存而廟外廡之間諸長老云晉𥘉受禪即用魏廟移此石於太學非兩處立也竊謂此言爲然王子年拾遺記曰晉太康中有羽山之民獻火浣布其國人稱羽山之上有文石生火煙色似隨四時而見也名爲淨火有不㓗之衣投於石火之中雖滯汙淄涅如新浣矣當虞舜時其國獻黃布漢末獻赤布梁兾製爲衣謂之丹衣而史家云單衣則今縫掖也字異聲同未知孰是又曰方丈山東有龍塲地方千里王瑤爲林或云龍常闘此處膏血如水流著物如淳􅃮燕昭王二年海人乗霞舟以彫壷盛膏數斗以獻王坐通雲之堂以火浣布爲纒用龍膏爲燈照耀百里梁四公記曰有啇人賷火浣布三端帝以雜布積之令杰公以他事至於市所杰公遥識曰此火浣布也二是絹木皮所作一是積䑕毛所作以誥啇人具如杰公所說因問木䑕之異公曰木堅毛柔是可別也以陽燧火山隂柘木爇之木皮改常試之果驗異物志曰斯調國有大洲在南海中其上有野火春夏自生秋冬自死有木生於其中而不消也枝皮更滑秋冬火死則皆枯瘁其俗常以冬採其毛以爲布色小青黒若塵垢汙之便投着火中則更鮮明也紵尚書禹貢曰荆河惟豫州西南至荆山北雖河厥貢漆枲絺紵毛詩宛丘東門之池曰東門之池可以漚紵彼美淑姬可與晤語左傳襄六曰季札聘鄭見子産如舊相識與之縞帶子産獻紵衣焉漢書曰賈人不得衣錦繡綺縠絺絺巾紵罽宋書曰戴法興㑹稽之山人家貧父子以販紵爲業華陽國志曰獠人賈言紵爲蘭朱崖傳曰朱崖出入着布或細紵布巾巾四幅其中内頭如領巾象說苑曰呉赤巾使於智氏假道於衛寗文子具紵絺三百製將以送大夫懇曰呉雖大國也亦不壤交假之道則亦敬矣又何禮焉文子不聽遂致之古樂府曰白紵歌盛稱舞好冝及芳時作樂其辭曰白紵質如月輕如雲色如銀製以爲𫀆餘作巾夲呉舞也白疊漢書曰其帛絮細布千鈞紋綵千疋荅布白疊也皮革千石比千乗之家晉令曰士卒百工不得服越疊呉時外國傳曰諸簿國安子織作白疊花布南史曰髙昌國有草實如繭繭中絲如細纑名爲白疊子國人取織以爲布布甚輭白交布用焉呉篤趙書曰石勒建平二年大宛獻珊瑚琉璃翕毛㲪白疊廣志曰白疊毛織出諸薄洲太平御覽卷第八百二十
