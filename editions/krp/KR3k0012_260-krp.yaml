  text: 太平御覽卷第二百六十
  hash: sha256:1ca1c1a07258d197243adacdba5ea86c0ff2bf9811cd07b271cf77cde4cc9bbe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_260-1a}
body:
  text: 職官部五十八良太守上漢書曰黄霸字次公淮陽人也爲頴川太守咸稱神明姧人去入他郡盗賊日少霸力行教化而後誅罰霸以外寛内明得吏民心是時鳯皇神雀數集郡國頴川尤多天子下詔稱揚曰頴川太守霸飬視鰥寡贍助貧窮獄或八年無重罪囚可謂賢人君子矣書不云乎股肱良哉元首明哉其賜霸爵關内侯黄金百斤又曰文翁廬江人也少好學景帝末年爲蜀郡太守仁愛好教化見蜀地僻陋有蠻夷風文翁欲誘進之乃選郡縣小吏開敏有才者張叔等十餘人親自飾厲遣詣京師受業蜀地學於京師者比齊魯焉又曰龔遂字少卿山陽人宣帝問遂曰渤海廢亂朕甚憂之君何以息其盗賊以稱朕意遂曰海濵遐逺不霑聖化其民困於飢寒而吏莫恤今欲使臣勝之將安之上曰選用賢良固欲安之遂曰臣聞治亂䋲不可急唯緩之然後可治願丞相御史無拘臣以文法得一切以便冝從事上許焉遂單車獨行至府郡中翕然盗賊亦皆罷斃民有帶持刀劒者使買劒買牛賣刀買犢所謂帶牛而佩犢乎又曰朱愽遷琅邪太守齊俗舒緩飬名愽新視事右曹掾史皆移病卧愽問對言惶恐故事二千石新到輙遣吏存問致意乃敢起就職愽奮髯抵几曰觀齊兒欲以此爲俗耶乃召見諸曹吏書佐及縣大吏選其可用者出教署之皆斥罷諸病吏郡中大驚又勑功曹官屬多襃衣大祒袑音紹謂大袴也不中節度自今掾史衣皆令去地三寸又曰尹翁歸字子况爲東海太守郡中吏人賢不肖及姧邪盡知之東海大治以髙第入守右扶風滿歲爲真政雖任刑其在公卿之間清潔自守語不及私温良廉退不以行能驕人甚得名譽於朝廷又曰薛宣字貢君東海太守左馮翊滿歳稱職宣爲吏賞罰明用法平而必行所居皆有條教可紀多仁恕愛利愛人而安利之又曰朱邑字仲卿廬江人少時爲舒桐郷嗇夫廉平不苛以愛利爲行未甞笞辱人存問孤寡遇之有恩所部吏民愛敬焉遷北海太守又曰趙喜字伯陽爲平原太守後青州大蝗入平原界輒死歲屢有年百姓歌之又曰汲黯爲東海太守治官好清静擇丞史任之責其大指而巳黯素多病卧閤内不出歳餘東海大治召爲淮陽太守黯辭之上曰君薄淮陽耶吾欲得君卧而治之乃行又曰王尊爲中郡太守河溢堤壞尊執珪請以身填金堤而水稍却又曰王尊字子貢涿郡人也爲安定太守到官出教告屬縣曰令長丞尉奏法守城爲民父母禦強扶弱宣廣澤甚勞苦矣太守以今日至府願諸君自免正身又曰馮立字聖通以任爲郎遷五原太守徙西河上郡立在職公廉治行略與兄野王相似而多知有恩貸好爲條教吏人嘉美野王立相代爲太守人歌之曰大馮君小馮君兄弟繼踵相因循聦明賢智恩惠民政如魯衛德化均周公康叔猶二君後遷爲東海太守土下濕病痺天子聞之徒太原太守更治五郡所居有迹又曰韓延壽字長公燕人爲淮陽太守治甚有名徙頴川多豪強難治延壽教以禮讓令文學校官諸生冠皮弁執爼豆爲吏民行䘮娶禮百姓遵用其敎徙爲東郡太守吏無追捕之苦人無捶楚之憂皆便安之接待下吏恩施甚厚入守左馮翊行縣至髙陵民有昆弟相與訟田延壽大傷之曰幸得爲郡不能宣明教化至令民有骨肉争訟旣傷風化咎在馮翊當先退是日稱病不聽事因入卧傳舎閉閤思過於是訟者宗族傳相責讓此兩昆弟皆自髠肉袒謝終死不敢復爭延壽恩信周遍二十四縣莫敢復以辭訟自言者其志誠吏民不忍欺又曰邵信臣字翁卿九江壽春人也以明經甲科爲郎超爲零陵大守病歸復徴爲諌議大夫遷南陽太守躬勸耕農開通溝渠爲民作均水約束刻石立於田畔以防争吏民親愛之號曰邵父荆州刺史奏信臣爲百姓興利郡以殷冨賜黄金四十斤遷河南太守治行常爲第一又曰班伯爲定襄太守定襄聞伯素貴年少自請治劇畏其下車任威吏民竦息伯請問耆老父祖有故人舊恩者延之滿堂日爲供具執子孫禮諸所賔禮皆名豪懷恩醉共諌伯曰冝頗攝録盗賊具言夲謀亡匿處伯曰是所望於父師矣乃召屬縣長吏選精進掾史分部収捕旬日盡得郡中震懾咸稱神明又曰蕭育字次君哀帝時南郡多盗賊拜育爲南郡太守上以育耆舊名臣乃以三公使車載育入殿中受䇿使車三公奉使之車也如安車加賜黄金二十斤育至南郡盗賊斷絶東觀漢記曰杜詩字君公爲南陽太守性節儉而治清平以誅暴立威信善於計略省愛民役造作水排鑄爲農器用力省見功多時人方於邵信臣故南陽人爲之語前有邵父後有杜母又曰馬援字文淵扶風人爲隴西太守務開寛信恩以待下任吏以職但惣大體而巳賔客故人日滿其門諸曹時白外事輙曰此丞掾任何足相煩若大姓侵小民黠羗欲旅距此乃太守事耳又曰朱暉字文季再遷臨淮太守暉好節槩有所㧞用皆厲行之士吏民畏愛謂之歌曰強直自遂南陽朱季吏畏其威民懷其惠又曰祭彤爲遼東太守􅊮之威聲揚於北方胡夷皆來内附野無風塵乃悉罷縁邊屯兵及彤卒烏桓鮮卑追思無巳毎朝京師過􅊮冡拜謁仰天號泣乃去又曰張堪字君遊遷漁陽太守教民耕種百姓殷冨童謡曰桑無附枝麦穗兩歧張君爲政樂不可支視事八年匈奴不敢犯塞又曰第五倫字伯魚爲㑹稽太守性節儉雖身居二千石位常𬞞食布衣妻自炊㸑𥘉代到當發百姓老小闐府門攀車叩馬啼呼曰捨我何之其得人心見愛如此又曰郭伋爲頴川太守辭去之官光武詔曰郡得賢能太守去帝城不逺何潤九里冀京師并蒙其福也又曰秦彭遷山陽太守時山陽新遭地動後飢旱榖貴米石七八萬百姓窮困彭下車經營勞來爲民四誡以父母夫妻兄弟長㓜之序擇民能率衆以爲郷三老選郷三老爲縣三老令與長吏叅職崇儒雅貴庠序上德化春秋饗射升降揖讓務禮示民吏民畏愛不敢欺犯又曰侯霸字君房爲臨淮太守治有能名及王莽之敗霸保固守卒全一郡更始元年遣使徴霸百姓老弱相携號哭遮使者車或當道而卧皆曰乞侯君復留民乃誡乳婦勿得舉子侯君當去必不能全使者慮霸就徴臨淮必亂不敢受璽書而具以狀聞又曰耿純字伯山鉅鹿人請治一郡盡力自効上笑曰卿乃欲以治民自効乃拜純爲東郡太守後坐事免上過東郡數千人號呼涕泣云願復得耿君上復以純爲東郡太守又曰王阜爲益州太守邊郡吏多放縱阜以法繩正吏民不敢犯禁政教清静百姓安業甘露降白烏見連有瑞應世謂其持法平政寛慈有化所致又曰魏霸爲鉅鹿太守霸性清約質朴爲政寛恕正色而巳不求備於人掾吏有過輙私責數不改休罷之終不暴揚其惡又曰秦彭字伯夲爲山陽太守以禮訓民不任刑名崇好儒雅百姓懷之莫敢欺犯轉潁川太守鳯皇騏驎嘉禾甘露之瑞集於郡境元成間宗族五人同爲二千石故號爲万石秦氏又曰沈豐字聖逹爲零陵太守爲政慎刑重殺罪法辭訟𥘉不歷獄嫌疑不决一斷於口鞭杖不舉市無刑戮僚友有過𥘉不暴揚有竒謀異略輙爲談述曰太守所不及也到官一年甘露降芝草生又曰宗慶字叔平爲長沙太守民飬子者三千餘人男女皆以宗爲名後漢書曰光武南定河内而更始大司馬朱鮪等盛兵據洛陽又并州未安光武難其守問於鄧禹曰諸將誰可使守河内者禹曰昔髙祖任蕭何於關中無復西顧之憂所以得專精山東終成大業今河内帶河爲固户口殷實北通上黨南迫洛陽冠恂文武備足有牧人御衆之才非此子莫可使也乃拜恂河内太守行大將軍事又曰冦恂字子翼爲潁川太守拜執金吾後光武幸潁川百姓遮道曰願陛下復借冦君一年乃留之又曰楊震遷東萊太守當之郡道經昌邑故所舉荆州茂才王宻爲昌邑令謁見至夜懷金十斤以遺震曰故人知君君不知故人何也宻曰暮夜無知者震曰天知神知我知子知何謂無知宻愧而出轉涿郡太守性公廉不受私謂子孫常𬞞食歩行故舊長者或欲令爲開産業震不肯曰使後代稱爲清白吏子孫以此遺之不亦厚乎又曰孟甞遷合浦太守郡不産榖實而海出珠寳與交阯比境常通啇販貿糶糧食先是宰守並多貪穢詭人採求不知紀極詭貴珠遂漸徙於交阯郡界於是行旅不至人物無資貧者餓死於道甞到官革易前弊求人病利曽未踰歲去珠復還又曰任延爲九真太守九真不識父子之性夫婦之道延乃移書屬縣各使男年二十至五十女年十五至四十皆以年齒相配其貧無禮娉令長吏以下各省俸禄以賑助之同時相娶者二千餘人是歲風雨順節榖稼豊衍其産子者始知種姓咸曰使我有是子者任君也多名子爲任又曰陳寵轉廣漢太守西川豪右并兼吏多姧貪訴訟日百數寵到顯用良吏王渙鐔顯等以爲腹心鐔音徒南反訟者日減郡中清肅先是洛縣城南洛縣名故城在今益州雒縣南也毎隂雨常有哭聲聞於府中積數十年寵聞而疑其故使吏案行還言前代衰亂時此下多死亡者而骸骨不得葬寵愴然歎即矜勑縣盡収歛葬之自是哭聲遂絶又曰宋均爲九江太守山陽楚沛多蝗其飛至九江界者輙東西散去又曰劉寵爲㑹稽太守簡除煩苛禁察非法郡中大化徴爲將作大匠山隂縣有五六老叟尨眉皓髪自若耶山谷間出人齎百錢以送寵寵爲人選一大錢受之又曰曹襃爲河内太守時春夏大旱粮榖踊貴襃到乃省吏併職退去姧殘澍雨數降其秋大熟百姓給足流寓皆還又曰鮑德爲南陽太守時歲多荒災唯南陽豐穰吏人愛恱號爲神父又曰廉范遷蜀郡太守其俗尚文辨好相持短長范每厲以淳厚不受偷薄之說成都民物豐盛邑宇逼側舊制禁民夜作以防火災而更相隱蔽焼者范乃毀削先令但嚴使儲水而已百姓爲便乃歌之曰廉叔度來何暮不禁火民安堵平生無𥜗今五袴又曰馬嚴爲陳留太守下車明賞罰發姧匿郡界清静時京師訛言賊從東方來百姓奔走轉相驚動諸郡遑急各以狀聞嚴察其虚妄獨不爲備詔書勑問使驛係道嚴固執無賦後卒如言又曰黄香爲魏郡太守郡舊有内外園田常與人分種収榖歲數千斛香曰田令啇者不農王制仕者不耕王制曰上農夫食九人下士視上農夫禄足以代耕也伐氷食禄之人不與百姓争利乃悉以賊人課令耕種又曰中平三年江夏兵趙慈反叛殺南陽太守奏頡攻没六縣拜羊續爲南陽太守當入郡界乃羸服間行童子一人觀歷縣邑採問風謡然後乃進其令長貧㓗吏民良猾悉迸知其狀郡内驚竦莫不震懾乃發兵與荆州刺史王敏共擊趙慈斬之獲首五千餘級屬縣餘賊並詣續降又曰羊續爲南陽太守續妻後與子秘俱徃郡舎續閉門不内妻而自將秘行其資藏唯有布衾弊祗禂監麥數斛而已說文曰祗裯短衣而巳祗者丁奚反禂音丁勞也顧勑祕曰吾自奉若此何以資爾母乎使母俱歸又曰三府舉主棠治劇拜巴郡太守棠馳兵赴賊斬虜千餘級巴庸清静吏民生爲立祠又曰樊淮拜鉅鹿太守時飢荒之餘人庶流迸家户且盡淮課督農桑廣施方略朞年間榖粟豐賤數十倍而趙魏之郊數爲羗所鈔暴淮外禦冦虜内撫百姓郡境以安又曰伏湛更始立以爲平原太守倉卒兵起天下驚擾而湛獨晏然教授不廢謂子曰夫一榖不登國君撤膳禮記曰年榖不登君膳不祭肺今人皆飢奈何獨飽乃共食麄糲糲麄米者九章筭術曰粟五十糲率三十一斛粟得六斗米爲糲也悉分俸禄以賑郷里來客者百餘家又曰鮑昱後拜汝南太守郡多陂池歲歲决壞年費常三千餘萬昱乃上作方梁石洫洫渠也以石爲之猶今之水門也水常饒足漑田倍多人以殷冨又曰第五訪爲張掖太守歲飢粟石數千訪乃開倉賑給以救其弊吏懼譴争欲上言訪曰若上湏報是棄人也湏待也太守樂以一身救百姓遂出榖賦人順帝璽書嘉之由是一郡得全謝承後漢書曰鄭弘遷淮隂太守消息傜賦政不煩苛行春天旱隨車致雨白鹿方道夾轂而行弘怪問主簿黄國曰鹿爲吉爲凶國拜賀曰聞三公車􅙲畫作鹿明府必爲宰相續漢書曰宋均爲九江太守五日一聽事冬以日中夏以平旦時多虎均曰夫虎豹在山黿鼉在泉物性之所託故江淮之間有猛獸猶江北之雞豚也數爲民害咎在貪殘今退檻穽進忠良虎遂東渡江又曰劉寛字文饒弘農人爲南陽太守温仁多恕遇民如子口不出詈言吏人有過但用蒲鞭罰之示辱而巳又曰羊茂字季寳豫章人爲東郡太守冬坐白羊皮夏處單版榻常食乾飯出界買鹽致妻子不歷官舎華嶠後漢書曰岑熈爲東郡太守好聘禮隱逸顯之於朝與叅政事視事三年人歌之曰我有枳棘岑君伐之我有蝥蠈岑君遏之狗吠不驚足下生釐含哺皷腹焉知凶災我嘉我生獨丁斯時美矣岑君於戲如兹張璠漢記曰宋登字叔楊岀爲潁川太守市無豫價道不拾遺病免卒於家汝陰人配社祀之又曰陳球爲零陵太守球到郡設方略朞月間賊虜消散而州兵朱益等反與桂楊賊胡蘭數萬人轉攻零陵零陵下濕編木爲城不可守備郡中惶恐掾吏白請遣家避難球怒曰太守分國虎符受任一郡豈顧妻孥而坦國威乎重復言者斬乃悉郡内吏民老弱與共城守漢雜事曰蔣滿爲上黨太守長子萬爲北地都尉次子輔爲安定太守滿與萬俱知名並見徴時徴爲二千石者十三人俱引見萬退却不敢與父併詔遣賛謁者曰何以不齊左右曰此父子也上歎息曰乃父子剖符耶即先詔曰上黨太守滿經行篤著信行山東其以滿爲淮陽王相誨導東蕃弘農股肱郡其以萬爲弘農太守父子同日拜於前上嘉之太平御覽卷第二百六十
