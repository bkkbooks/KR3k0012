front:
  text: 太平御覽卷第五百一十七
  hash: sha256:1bf92f17aacd4b140ecb3948c6f01b28d267820d0c5dc14751c4fb736e814f29
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_517-1a}
body:
  text: 宗親部七姊妺舅姑㛐叔娣姒姊妺爾雅曰女子先生爲姊後生爲妹毛詩曰泉水曰問我諸姑遂及伯姊禮記檀弓曰孔子與門人立栱而尚右二三子亦尚右孔子曰二三子之嗜學也我則有姊之䘮故也二三子皆尚左左傳成上曰潞子嬰兒之夫人晉景公之姊也鄷舒爲政而殺之又傷潞子之目晉侯欲伐之諸大夫皆曰不可鄷舒有三雋才不如待後之人伯宗曰必伐之狄有五罪雋才雖多其何𥙷焉遂㓕潞鄷舒奔衛衛人歸請晉晉人殺之又昭元曰鄭徐吴犯之妹美公孫楚聘之矣公孫黒又使強委禽焉犯懼告子産子産曰是國無政非子之患也惟所欲與犯請于二子使女擇焉子晢盛飾而入布弊而出哲公孫黑子南戎服而入左右射超乗而出女自房觀之曰子晢信羙矣抑子南夫也子南公孫楚字夫夫婦婦所謂順也適子南氏焉又定上曰吴伐楚楚昭王取其妹以岀渉濉水鍾建負之以從復國王將嫁季芉季芉辭曰所以爲女子逺丈夫也鍾建負我矣王遂使妻鍾建以爲樂尹春秋感精符曰人主含天地據璣衡齊七政秉八極父天母地兄日姊月史記曰聶政爲嚴仲子殺韓相俠累因自披面披抉眼出膓以死韓取政屍暴於市購之曰有能言殺俠累者與千金政姉嫈聞之乃伏屍哭曰是軹深井里聶政也妾奈何畏殁身之誅滅賢人之名乃大呼天者三遂死於政旁也又曰萬石君石奮髙祖問曰君有何人對曰有姊善鼔琴髙祖乃召爲美人又曰張敬叔姊善皷琴髙祖召爲宫人徙其家就戚里戚里在長安與親戚別居故曰戚里漢書曰李延年妹絶美延年侍上酒酣歌曰北方有佳人絶丗而獨立一顧傾人城再顧傾人國不惜傾城傾國佳人難再得武帝聞之乃召入宫又曰秦彭字伯平爲山陽太守民江伯欲嫁寡姊姊乃引鎌自割伯因前救姊觸鎌傷姊遂亡縣正論法彭曰救無惡志乃輕罪之謝承後漢書曰范冉姊病徃看之姊爲設飰冉留錢一百文姊使人追還之冉竟不受又曰曹壽妻班超之妺也超字仲叔扶風人爲都護在絶域年老思入關妺乃上書曰妾兄超延命沙漠三十餘年骨肉生離不復相識書奏帝乃徴還又曰宋弘字仲子爲司空帝姉胡陽公主新寡帝與論朝臣羙惡以觀其意主曰宋弘容德莫及帝曰方圖之後引弘入令主坐屏風後因謂弘曰貴易交冨易妻人情乎弘曰貧賤之交不可忘糟糠之妻不下堂帝謂主曰事不諧矣又曰汝南袁隗妻馬融之女少有才辨融家丗豐豪裝遣甚盛及𥘉成禮隗謂之曰婦奉箕箒而巳何乃過珍麗對曰慈親垂愛不敢逆命君欲雹宣梁鴻之行者妾亦請從少紹孟光之事又問曰弟先兄舉丗以爲笑今處姊未適人而君先行可乎對曰妾姉髙行殊邈未遇良匹不如鄙薄茍然而巳又問南郡學窮道奥文爲辭宗而所在之識輙以資財爲損何耶對曰孔子大聖不免武叔之毀子路至賢猶有伯寮之愬家君固其冝也蜀志曰𥘉孫權以妹妻蜀先主孫氏性才捷剛猛有諸兄之風侍婢百餘人皆執刀劒而侍立先主心常凛凛然也晉書曰郭奕字大業太原人遷雍州刺史有寡姉隨其之官姉下僮僕多有姧犯而爲人所糺弈按省畢曰丈夫豈當以老姉求名遣而不問又曰桑虞字子深衛人年十四䘮父哀毀過禮以米百粒糝藜藿其姉喻之曰滅性非孝子對曰藜藿雜米足以勝哀又曰凉州刺史羊欣姉䘮末經旬車騎長史韓預強聘其女其妻張酺爲御史中丞貶預以清風俗論者稱之又曰陳統字元方弟絃字偉方俱清秀知名姉妹四人並有才美姉適東莞徐氏生邈及二姉適同郡劉氏文章最盛又曰慕容垂妻叚氏字元妃光禄大夫叚儀女婉惠有志操常謂妹季妃曰我終不作凡人妻季妃曰我亦不作庸夫婦隣人聞笑之後燕王納元妃爲室范陽王德娉季妃並如其言又曰王凝之妻謝氏名道韞安西將軍弈之女也聦明有才辯同郡張玄妹亦有才質滴顧氏謝玄每之以敵道韞有濟尼者遊於二家或問之荅曰謝夫人神情散㓪故有林下之風顧家婦清心玉映自是閨房之秀宋書新野庾彦逹爲益州刺史携姉之官資給中分禄秩西土稱之齊書曰永興中有王氏女年五歲得毒病兩目皆盲性至孝年二十父亡盲女臨屍一呌眼皆血出小妺娥䑛之其左眼即開愈時人皆以爲孝感所致也梁典曰長廣橋者宋武帝姉昔賣紗籴米還橋小不敢過無舡得渡日晚宋武帝大飢乆方見姉負米還乃謂姉曰若異曰冨貴當長廣此橋遂爲名也新子曰梁車新爲鄴令其姉徃見之值暮郭門閉遂踰郭而入梁車新因刖其足趙成侯以爲不慈遂奪璽免官應劭風俗通曰郝廉太原人飢寒不受人衣食曽過姉家飰留五十文置席下而去丗說曰郗嘉賔死婦弟欲迎其姉還姉終不肯歸曰生縱不得與郗郎同室死寜不同穴也又曰袁彦道有二姉一適殷源一適謝祖甞語桓宣武切恨不更有一人配卿也王子年拾遺曰賈逵年六歳其姉聞隣家讀書日日抱逵就籬聽之逵年十歲乃暗誦六經父曰吾未甞教尓安得三墳五典誦之乎對曰姉甞抱于籬邊聽隣家讀書因記得而誦之簫韶太清記曰劉孝儀諸妺文彩艶質甚於神人也荆州圖南北岸曰屈原之郷里原旣流放忽然歸郷人喜恱因名南岸曰歸郷岸原有姉聞原還亦來歸責其矯丗郷人又名其北岸曰姉歸岸舅姑釋名曰夫之父曰舅舅言乆也父老之稱也夫之母曰姑姑言故也爾雅曰婦稱夫之父曰舅稱夫之母曰姑姑舅在則曰君舅君姑殁則曰先舅先姑禮記檀弓曰婦人不飾不敢見舅姑又内則曰婦事舅姑如事父母雞𥘉鳴咸盥漱櫛蹝笄緫衣紳左佩紛恱刀礪小觽金燧右佩箴管線纊施縏袠大觽木燧衿䙬綦屨以適舅姑之所及所下氣怡聲問衣燠寒疾痛苛癢而敬抑搔之又曰婦將有事大小必請於舅姑不敢專行也儀禮婚禮曰舅饗送者以一獻禮酬以束錦姑饗婦人送酬亦如之左傳襄元曰魯齊姜薨𥘉穆姜使擇美檟以自爲櫬與頌琴季文子取以葬君子曰非禮也禮無所逆婦飬姑者也虧姑以成婦逆莫大焉穆姜成公母禮姜成公婦也列女傳曰鄒孟軻旣娶將入室其婦祖而内孟子不恱遂去不入婦辭孟母求去曰妾聞夫婦之道私室不與焉今妾竊惰在室而夫子見妾悖然不恱是客妾也婦人之義盖不客宿請歸於父母姑召軻而謂之曰夫禮將上堂聲必揚所以戒人也將入户視必下恐見人過今子不察於禮而責於妻不亦逺乎孟子遂留其婦謝之君子謂孟母知禮而明姑婦之道㛐叔釋名曰㛐叟也老稱也叟縮也人及物老皆小縮於舊也叔少也㓜者稱也叔亦俶也見㛐俶然却退也爾雅曰女子謂兄之妻爲㛐弟之妻爲婦禮記曲禮曰㛐叔不通問又檀弓曰子思之哭㛐也爲位婦人倡踊又曰㛐叔之無服也盖推之逺之也又雜記曰㛐不撫叔叔不撫㛐史記曰蘇秦洛陽人從鬼谷歸大困窮困兄㛐姉妹妻皆笑之不爲下機秦乃閉室不出讀周書隂符後合六國從約并力相六國北報趙過洛陽車騎輜重擬於王者乃歸昆弟㛐側目不敢仰視秦謂㛐曰何前踞而後恭㛐匍匐以靣伏地謝曰見季子位髙金多也漢書曰髙祖長兄伯妻髙祖微時甞避事時與賔友過其丘㛐丘空也無壻日丘乃寡㛐也㛐厭叔引客來食佯爲羮盡轑釡客去髙祖視釡尚有羮由是怨之後定天下而伯子獨不得封太上皇爲言之髙祖曰非敢忘也但其母不長者耳後七年封爲羮頡侯又曰陳平兄伯常耕田縱平遊學㛐疾之不親家事或問平食何物而肥對曰食糠籺耳㛐曰有叔如此不如無伯聞而逐其妻晉書曰鄭休妻石氏爲九族所重休前妻女旣㓜又休父布臨終生庶子沈休命棄之石氏曰柰何使舅之㣧不存乎遂飬沈及前妻女力不兼舉九年之間三不舉子又曰王渾妻鍾氏字琰生子濟渾甞共琰坐濟趨庭而過渾欣然曰生子如此足慰人心琰曰若新婦得配叅軍爲渾弟淪也生子固不啻如此耳又曰王澄字平子衍季弟也衍妻郭氏性貪鄙令婢於路檐糞澄年十四諌郭郭大怒謂澄曰昔先人臨終之日以小郎囑新婦不以新婦囑小郎因捉其衣𥚑欲杖之澄懼踰䆫而走得脫又曰王凝之妻謝氏字道韞弈之女也聦識有才辨凝之弟獻之嘗與賔客談議詞理將屈道韞使婢白獻之曰新婦欲與小郎解圍乃以青綾歩障自蔽申獻酬之義客遂不能屈也又曰晋中書令王珉與㛐婢私通㛐撻甚苦婢素善歌而珉好執白團扇故製白團扇歌又曰顔含字弘都㛐老而失明含奉飬如親束帶躬侍㛐病困湏蚺蛇膽求之不獲憂歎盈懷方獨坐愁苦忽有一童子持一青囊授含含聞之乃蚺蛇膽也童子出户化爲青鳥飛去含得藥成㛐病遂愈齊書曰吴逹之義興人㛐亡無以具葬乃自賣爲十夫傭以營葬三十國春秋曰晉吏部郎魏衡謂姪舒曰汝後得爲小縣長舒曰堪八百戸長將老便入官舎即斯願畢矣孟子曰淳于髠曰男女授受不親禮與孟子曰禮也曰㛐溺則援之以手乎曰㛐溺不援是犲狼也男女授受不親者禮也㛐溺援之以手者權也逸士傳曰髙鳯爲太守所召恐不得免自言不應爲吏乃與寡㛐僞争田遂免仕丗說曰阮籍㛐甞還家籍見㛐與之別或譏之籍曰禮豈爲我軰設也常璩華陽國志曰汝敦兄弟共居有父母時財物㛐心欲得之敦妻勸敦盡讓田宅奴婢與兄弟出別居敦後耕田得金器妻勸送與兄夫妻共徃㛐性嗇見金器踊躍欲留之兄因感悟即去妻悉讓財物還弟弟又不受相讓積年鄴洛鼎峙記曰盧道䖍後妻元氏升堂講老子道徳經䖍弟元明隔紗帷以聽之娣姒爾雅曰女子同出謂先生爲似後生爲娣同出爲俱嫁事一夫長姉謂稚婦爲娣婦娣婦謂長姉爲姒婦也左傳成下曰魯聲伯之母不聘不聘無婦禮穆姜曰吾不以妾爲姒昆弟之妻相謂爲姒又昭七曰晉叔向欲娶於申公巫臣氏其母不許平公強使取之生伯石伯石始生子容之母走謁諸姑子容母叔向㛐伯華妻也姑視之及堂聞其聲而還曰是豺狼之聲也狼子野心非是莫䘮羊舌氏矣晉書曰王渾妻鍾氏名琰太尉之孫也渾弟湛妻郝氏有德行琰雖貴門不陵郝郝亦不下琰時稱鍾夫人之禮郝夫人之法太平御覽卷第五百一十七
