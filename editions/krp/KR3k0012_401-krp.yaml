body:
  text: 人事部四十二叙聖左傳成公上曰聖人與衆同欲是以濟事又成公下曰春秋之稱微而顯志面晦婉而成章盡而不汗懲惡勸善非聖人誰能修之又曰諸侯將見子臧於王而立之子臧辝曰聖逹節聖人應天命不拘掌禮次守節爲君非吾節也雖不能聖敢失守乎又曰唯聖人能外内無患自非聖人外寜必有内憂驕亢則憂患生也又襄公三年曰臧武仲如晉雨過御叔在邑將飲酒御叔魯御邑大夫曰焉用聖人武仲多智時人謂之聖我將飲酒而己雨行何以聖爲又昭公二曰季武子問於申豊曰雹可禦乎對曰聖人在上無雹雖有不爲灾又曰書曰聖作則逸書則法也又曰臧孫紇有言曰聖人有明徳者若不當世其後必有逹人今其將在孔丘乎又哀公下曰聖人不煩卜筮惠王其有焉不疑故不卜也禮記曰樂記曰作者之謂聖𫐠者之謂明明聖者述作之謂也又坊記曰聖人之制冨貴也使民冨不足以驕貧不至於約貴不慊於上故亂益亡又中庸曰夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉又曰舜其大孝也與徳爲聖人尊爲天子冨有四海之内宗廟饗之子孫保之又曰誠者天之道也誠之者人之道也誠者不勉而中不思而得從容中道聖人也又曰大哉聖人之道洋洋乎發育萬物峻極于天毛詩七月曰狼跋羙周公也周公攝政逺則四國流言近則王不知周大夫羙其不失其聖也不失其聖者聞流言不惑王不知不怨終立其志成周之道致太平復成王之位又節南山巧言曰秩秩大猷聖人莫之周易乹卦曰雲從龍風從虎聖人作而萬物覩又曰其惟聖人乎知進退存亡而不失其正者其唯聖人乎又蒙卦曰蒙以飬正聖功也又豫卦曰聖人以順動則刑罰清而民服又觀卦曰聖人以神道設教而天下服矣又咸卦曰天地感而萬物化生聖人感人心而天下和平又恒卦曰聖人乆於其道而天下化成又鼎卦曰聖人亨以享上帝而大亨以養聖賢又繫辝曰易有聖人之道四焉以言者尚其辝以動者尚其變以制器者尚其象以卜筮者尚其占夫易聖人之所以極深而研幾也唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至子曰易有聖人之道四焉者此之謂也又曰備物致用立成器以爲天下利莫大乎聖人是故天生神物聖人則之天地變化聖人効之天垂象見吉凶聖人象之河出圖洛出書聖人則之易有四象所以示也又曰天地之大徳曰生聖人之大寳曰位又曰上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬又曰昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義尚書伊訓曰敢有侮聖言逆忠直時謂亂風狎侮聖人之言而不行拒逆忠直之規而不納又說命曰股肱惟人良臣惟聖手足具乃成人有良臣乃成聖又洪範曰叡作聖於事無不通謂之聖又曰聖時風若君能通理則時風順之又多方曰惟聖罔念作狂惟狂克念作聖惟聖人無念於善則爲狂人惟狂人能念於善則爲聖人又君陳曰凡人未見聖若不克見旣見聖亦不克由聖論語雍也曰子貢曰如有博施於民而能濟衆何如可謂仁乎子曰何事於仁必也聖乎堯舜其猶病諸又述而曰子曰聖人吾不得而見之矣得見君子者斯可矣又曰子曰若聖與仁則吾豈敢孔子謙不敢自名仁聖又子罕曰太宰問於子貢曰夫子聖者與何其多能也子貢曰固天縱之將聖又多能也又孔子曰君子有三畏畏天命畏大人畏聖人之言小人不知天命而不畏也狎大人侮聖人之言又子貢曰有始有卒者其唯聖人乎孝經曰非聖人者無法春秋潜潭巴曰里社鳴此里有聖人百姓歸之社里之居也鳴則教令折行行教令則唯聖人能行之也大戴禮曰哀公問曰何謂聖人孔子對曰所謂聖人者智通于大道應變而不窮配于天地叅于日月又曰聖人有國則日月不食星辰不孛尚書考靈曜曰五百載聖紀符五百法天地之數也王命長故以爲五百載也符圖書也又曰四千五百六十歳精及天數握命人起河出圖聖受思鄭玄注曰聖謂堯也天握命人當起者河乃出圖堯受而思之以受暦數也尚書大傳曰聖人在位其君子不誦無用之言其工不作無用之器其啇不通無用之物又曰聖人者民之父母也母能生之能食之父能敎之能誨之聖王曲備之者也能生之能食之能教之能誨之也爲之城郭以居之爲之宫室以處之爲庠序之學以教誨之爲之列地制畝以飲食之故書曰作民父母以爲天下王此之謂也韓詩外傳曰舜生于諸馮迁于負夏卒于鳴條東夷之人也文王生于歧周卒于畢郢西夷之人也地之相去千有餘里然得志而行乎中國如合符節孔子曰先聖後聖其揆一也又曰成王之時有三苗貫桑而生同爲一秀比三年果有越裳氏重九譯而至献白雉於周公曰道路悠逺山川幽深故重譯而來朝周公辭曰吾子何以見賜也譯曰吾受命國之黄髮曰乆矣天之不迅風疾雨也海之不波溢也三年於兹矣意者中國殆有聖人盍往朝之又曰辟土殖穀者后稷也决江䟽河者禹也聽獄執中者臯陶也然而有聖名者堯也史記曰周西伯獵遇太公於渭之陽與語大說曰自吾先君太公曰當有聖人適周周以興子真是耶又曰王子比干直言諌紂紂怒曰吾聞聖人之心有竅信有諸乎又曰秦繆公謂内史廖曰吾聞鄰國有聖人敵國之憂也今由餘寡人之患將如奈何又曰唐舉相蔡澤曰吾聞聖人不相殆先生乎管子曰聖人若天然無私覆若地然無私載老子曰絶聖弃智民利百倍又曰聖人無常心以百姓心爲心莊子曰聖人之生也天行其死也物化靜而與隂同德動而與陽同波不爲福先不爲禍始又曰以徳分人謂之聖又曰夫聖人鶉居而􅑹若候切食鳥行而無章天下有道則與物皆昌天下無道則修徳就閑又曰至人無己神人無功聖人無名又曰夫川竭而谷虚丘夷而淵實聖人己死則大盗不起文子曰聖人同死生愚人亦同死生聖人之同死生明於分理也愚人之同死生不知利害所在也又曰聖人隨時而舉事因資而立功守清道拘雌節因循而變應常後而不先又曰聖人以仁義爲繩中繩之謂君子不中繩之謂小人列子曰龍叔謂文摯曰吾有疾子能己乎文摯即命龍叔背明而立文摯向明而望之旣而曰嘻吾見子之心矣方寸之地虚矣幾聖人也子心六孔通流一孔不逹今聖智爲病者或由此乎又曰啇太宰見孔子曰丘聖者歟荅曰丘非聖者三王聖者歟荅曰三王善任智勇者聖則丘弗知曰五帝聖者歟荅曰五帝善任仁者聖則丘弗知曰三皇聖者歟荅曰三皇善因時者聖則丘不知曰然則孰者爲聖孔子曰西方聖者不治而不亂不言而自信不化而自行蕩蕩乎民無能名焉又曰庖犧女媧神農夏后虵身人面牛首此非人之狀而有大聖之德尸子曰聖人之身猶日也夫日圜尺光盈天地聖人之身小其所燭逺矣聖人正巳而四方治故曰天地之大府慎子曰天有明而不憂人之闇地有財而不憂人之貧聖人有德而不憂人之危范子曰聖人之變如水墮形形平則平形險則險隨巢子曰大聖之行兼愛萬物踈而不絶賢則欣之不肖則矜之孫卿子曰神固之謂聖人聖人者道之管也天下之道管此矣又曰天下無二道聖人無二心神人無功聖人無名聖人者天下利器也啇子曰聖人之制民也如髙下制水如燥濕制火也申子曰百世有聖人猶隨踵而生韓子曰伊尹爲宰百里奚爲虜此二人者聖人也然猶不能無役身而進孟子曰子夏子張子游皆有聖人一體冉有伯牛閔子顔淵具體而微自生民以來未有盛於孔子者也又曰孔子曰登東山而小魯登太山而小天下故觀於海者難爲水遊於聖人之門者難爲言鶡冠子曰聖人者後天地而生而知天地之始先天地而亡而知天地之終孔叢子曰懸子問子思曰吾聞同聲者相求同志者相好子之先君見子産則兄事而世謂子産仁愛稱夫子聖人是謂聖通事仁愛乎未喻其人之孰先也子思曰昔季孫問言游亦若子之言也子游荅曰以子産之仁愛譬夫子其猶浸水之與膏雨康子曰子産死鄭大夫捨玦珮婦女捨珠瑱巷哭三月琴瑟不作失子之死吾未之聞魯人之若是也子游曰夫浸水所及也則生所不及則死民皆知焉膏雨之所生也廣莫大焉民之受賜也普矣莫識其由來者也淮南子曰聖人不貴尺壁而重寸隂時難得而易失故聖人守清道而抱雌節清和静也雌柔弱也又曰聖人之道猶中衢樽耶過者斟酌多少各得所冝又曰唯聖人爲能知權言而必信期而必當天下之髙行也又曰聖人若鏡不將不迎又曰文王知而好問故聖又曰孔子無黔突墨子無暖席是故聖人蒙耻辱以干世主者非貪禄慕位欲事天下之利除萬民之害也神農憔悴堯痩臞其俱切舜微黑禹胼胝由此觀之憂勞百姓亦甚矣又曰古者聖人勞形盡慮爲民興利除害焦天下之憂而平海内之事聖人之憂民也如此其明矣河圖曰黃帝曰凡人生一日天帝賜筭三萬六千又賜紀二千聖人得三萬六千十百二十凢人得三萬六千一紀主一歳聖人加七百二十吕氏春秋曰聖人之於事似緩而急緩謂無爲急謂成功似遟而速待時也又曰聖人南面而立以愛利民爲心號令未岀而天下皆延頸舉踵矣則精通乎民矣家語曰所謂聖者德合天地覩者不識其鄰又曰聖人能以天下爲一家以中國爲一人者非意之所爲也必知其利逹於其患然後乃爲之又曰孔子在衛冉求言於季孫曰國有聖人而不能用欲以求治是猶却歩而欲求及前人也神異經曰西南大荒中有人身長一丈腹九尺踐龜虵戴朱鳥左手馮青龍右手馮白虎知河海斗斛識山石多少知天下鳥獸言語識士人所道知百榖可食識草木鹽苦名曰聖俗曰聖人一名哲俗曰睿哲一名先俗曰知先一名通俗曰通逹一名無不逹凡人見拜令人神智此人天下神聖也六韜曰太公曰聖人守無窮之府用無窮之財而天下治說苑曰聖人之於百姓也其猶赤子乎飢者食之寒者衣之育之長之唯恐其不至於大也楊方五經鈎沉曰聖人之生必資於隂陽隂陽之理即聖人所盡但盡隂陽之理則玄照之夲自見此謂不求自知而理盡自然者也楊子法言曰或問孔子之時諸侯有知孔子聖者歟曰知之若知之則曷爲不用曰不能曰知聖而不能用可得聞乎曰用之則弃其所習逆其所從強其所劣損其所能非天下之至聖孰能用之又曰震風陵雨然後知厦屋之爲帡幪也虐政虐世然後知聖人之爲郛郭也又曰聖人之言似於水火測之而益深窮之而益逺火用之而弥明宿之而弥壯又曰聖人之言逺如天賢者之言近如地又曰或曰聖人之道若天天則常矣奚聖人之多變也曰聖人固多變子㳺子夏得其書矣未得所以書也宰我子貢得其言矣未得所以言也顔淵閔子得其行矣未得其所以行也聖人之書言行天也其少變乎又曰聖人虎別其文炳也如虎之別百獸炳然殊異君子豹别其文蔚也有蔚文章次虎辯人狸別其文萃也又曰或問聖人表裏曰威儀文辭表也德行忠信裏也論衛曰上天之心在聖人之胸其譴告在聖人之口世無聖人安得知天變動風俗通曰聖者聲也通也言其聞聲知情通於天地調暢萬物荀恱申鑒曰聖不至聖何以盡性傳子曰聖人之道如天地諸子之異如四時四時相反天地合而通之袁准正書曰聖人之治也若平地焉聾盲跛蹇皆能履之法若丘陵也非有逸足不能超也又曰唯聖知聖唯賢知賢信乎蔣子萬機論曰聖不獨立智不獨治神武之主亦湏佐輔王衍論曰聖人盡衆妙體至當故不求有所示而物自親之姚信土緯曰聖人髙不可極深不可測窮神知化獨見先識仁若春陽信若影響此所禀於天也又曰神州何以專生聖人聖人曽不産於絶域乎推此論之明神州者處乹坤之正鍾日月之精地形爽塏源流清暢其生民也長短應數儀狀端正音聲得節性理調良圖墓書曰青鳥乃黙皆聖人也記人生死所由琴操曰孔子使顔淵執轡到匡郭外顔淵舉策指匡穿垣曰往與陽虎正從此入匡人聞其言孔子旣似陽虎告匡君曰往者陽虎今復來矣乃令桓魋圍孔子數日下解弟子皆有飢色於是孔子仰天而歎曰君子固窮乎子路聞孔子之言悲感悖然大怒張目奮劒聲如鍾鼔孔子曰由來今汝欲闘名爲戮我於天下爲汝悲歌而感之汝皆和我由等唯唯孔子乃引琴而歌音曲甚哀有暴風擊拒軍士僵仆於是匡人乃知孔子聖人瓦解而去太平御覽卷第四百一
