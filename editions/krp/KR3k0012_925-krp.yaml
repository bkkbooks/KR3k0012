  text: 太平御覽卷第九百二十五羽族部十二
  hash: sha256:7ff0cd5732a8af00b16573eb5e21b9d8bc1c7fccf8ec155fd94fa4375ac6a2e2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_925-1a}
body:
  text: 鴛鴦鸂䳵鵁鶄鷗鷺䳭鴒鷁鸊虎白􅖂鴇鶢居鵜鶘鸕鷀婟澤鸛雀鶖鶬精衛水扎鳥鴛鴦歸藏曰有鳬鴛鴦有鴈鷫鷞詩曰鴛鴦刺幽王也思古明王交於萬物有道自奉養有節焉鴛鴦于飛畢之羅之君子萬年福禄冝之鴛鴦在梁戢其左翼君子萬年冝其遐福西京雜記曰趙飛鷰爲皇后其女弟昭儀在昭陽殿遺飛鷰書曰今日嘉辰貴姊懋膺洪冊上檖三十五條以陳踴躍内有鴛鴦𥜗鴛鴦𬒳魏志曰文帝問占夢周宣曰吾夢殿屋兩瓦墮化爲雙鴛鴦此何爲也宣對曰後宫當有暴死者上曰吾詐卿耳宣曰夫夢意也苟以形言便占吉凶言未卒黄門令奏宫人相殺于寳捜神記曰大夫韓慿其妻美宋康王奪之慿怨王囚之慿遂自殺妻乃隂腐其衣王與之登臺自投臺下左右投衣衣不勝手遺書於帶曰願以屍還韓氏而合葬王怒令埋之二塚相對經宿忽有梓木生二塚之上根交於枝下連其上有鳥如鴛鴦雌雄各一恒栖其樹朝暮悲鳴音聲感人古今注曰鴛鴦水鳥鳬類雌雄未甞相離人得其一則一者相思死故謂之疋鳥楚詞曰鴛鴦兮噰噰古詩曰客從逺方來遺我一端綺文彩雙鴛鴦裁爲合歡被又曰入門時左顧但見雙鴛鴦鴛鴦七十二羅列自成行鄭氏婚禮謁文賛曰鴛鴦雌雄相類飛止相疋鸂䳵臨海異物志曰鸂䳵水鳥毛有五彩色食短其在溪中無毒氣劇談録曰河南府尹闕前臨大溪毎僚佐有入臺者則水中沙有小灘漲出石礫金光澄澈可愛牛僧孺爲縣尉一旦忽報灘岀翌日宰邑與同僚列筵於亭上觀之因召老宿備詢其事有老吏云此必分司御史非西臺之命若是西臺灘上當有鸂䳵雙立前後居人以此爲則僧孺潜揣縣僚無出巳者因舉柸曰旣能有灘何惜一雙鸂䳵宴未終俄有鸂䳵飛下不旬日拜西臺御史鵁鶄爾雅曰鳽鶄郭璞注曰似鳬脚髙毛冠江東人家畜之以厭火災鳽音鶂肩反說文曰鳽鵁鶄也一曰鵁䴒西京雜記曰魯恭王好闘鷄鴨養孔雀鵁鶄奉榖一年二千石異物志曰鵁鶄巢於髙樹顛生子未能飛皆衘其母翼飛下地飲食夢書曰夢見鵁鶄居不雙也婦見之此獨居也婿見之恐失妻也雄雌俱行淫佚遊也唐書曰玄宗甞遣中官徃江南採捕鵁鶄及諸水禽汴州刺史倪若水上䟽諌曰方今九扈時忙三農作苦田夫擁耒𧖟婦持桑而以此時採捕竒禽異鳥供國池之翫逺自江嶺逹於京師水備舟舫陸倦擔負飯之以魚肉間之以槄梁道路觀者莫不以陛下賤人而貴鳥也陛下當以鳯凰爲凡鳥麒麟爲凡獸即鵁鶄鸂䳵曷足爲貴也鷗倉頡解詁曰鷖鷗也生藕葉上名水鴞說文曰鷗水鴞也山海經曰玄服國其人食鷗南越志曰江鷗一名海鷗在漲海中隨潮上下常以三月風至乃還洲嶼生夘似鷄夘色青頗知風雲若羣飛至岸必風漁人及度海者皆以此爲候列子曰海上之人有好鷗鳥者毎旦之海上從鷗鳥遊鷗鳥之至者百數而不止其父曰吾聞鷗鳥皆從汝遊取來吾翫之明日之海上鷗鳥舞而不下也晉咸和起居注曰二年正月饗萬國有五鷗集太極殿前晉中與徴祥說曰鷗集太極殿殿非鷗所處湖澤鳥也時蘇峻作逆宫室𬒳焚唐書曰崔湜旣私附太平公主時人咸爲之懼門客陳振鷺獻海鷗賦以諷之湜雖稱善而心實不恱鷺詩曰坎其擊鼔宛丘之下無冬無夏值其鷺羽鷺鳥之羽可以翳舞者所持以指麾又曰振鷺二王之後來助祭也振鷺于飛于彼西雝我客戾止亦有斯容又曰振振鷺鷺于下鼔咽咽醉言舞于胥樂兮毛詩義䟽曰鷺水鳥好白而潔故謂之白鳥齊魯之間謂之春鋤遼東樂浪吴楊人皆云白鷺大小如鷂青脚髙尺七八寸解指尾如鷹尾啄長三寸頂上有毛十數枚長尺餘毿毿然衆毛異甚好將欲取魚時弭之今吴人亦養之好羣飛行楚成王時有朱鷺合沓飛舞則復有赤色舊鼔吹曲有朱鷺是也爾雅曰鷺舂鋤郭璞注曰白鷺也頭翅背上皆有長翰毛江東以取爲接離名之月白鷺穆天子傳曰天子作詩三章以哀民曰有皎者鴼鴼鳥名音路鶣鶣其飛幽明録曰巴東有一道士忘其姓名事道精進入屋燒香忽有風雨至家人見一白鷺從屋中飛出雨住遂失道士所在古金樂録曰吴王夫差時有雙鷺飛出皷中而去南史曰張融年弱冠同郡道士陸修靖以白鷺羽扇遺之曰此異物奉異人䳭鴒詩曰䳭鴒在原兄弟急難毛詩義䟽曰䳭鴒水鳥一名渠梁大如鷃雀脚長尾尖背上青灰色腹下白頸下黒如連錢故桂陽謂之連錢爾雅曰䳭鴒雝渠郭璞注曰折雀屬也飛則鳥行則摇鷁左傳曰正月戊申六鷁退飛過宋都風也莊子曰夫白鷁之相視眸子不運而風化列子曰河澤之鳥視而孕曰鶂録異傳曰弘公者吴興烏程人患瘧經年弘後獨至旁舎瘧發有數小兒或騎公腹或扶公首脚公因佯眠忽起捉得一兒遂化成黄鷁餘者皆走公乃縛以還家暮懸䆫上云明日當殺食之比曉失鷁處公瘧遂斷于時人有得瘧者但依弘便瘧斷晉書曰武帝謀伐吴詔王濬修舟艦濬乃作大舩連舫方百二十歩受二千餘人以木爲城起樓櫓開四出門其上皆得馳馬來徃又畫鷁首怪獸於舩首以懼江神博物志曰白鷁雄雌相視則孕或曰雄鳴上風雌鳴下風則亦孕劉禎魯都賦曰緑鷁葱鶖鸊虎鷉爾雅曰鷉湏羸似鳬而小膏中蜇刀楊雄方言曰野鳬甚小而好没水中者南楚之外謂之鸊鵜大者謂之鶻鵜纂文曰鵅施石撽开零皆野鴨没食曰鵅長頸曰施多白曰开零在山澗曰石撽白􅖂音剥爾雅曰鵅烏􅖂郭璞注曰水鳥也似鶂而短頸後翅紫白色皆上緑色江東呼爲烏􅖂音駮卞敬宗􅖂賦曰烏真野之性備於俯仰之間專視緩歩有自卑之志鴇詩曰鴇羽刺時也晉昭公之後大亂五丗君子下從征役不得養父母也肅肅鴇羽集于苞栩肅肅鴇行集于苞桑肅肅鴇翼集于苞棘禮曰鷄肝鴈腎鴇奥鹿胃鄭玄云奥脾鶢鶋爾雅曰鶢鶋雜縣郭璞注曰漢文帝時琅琊有大鳥如馬駒時人謂之爰居廣志曰馬鳥鶢鶋莊子曰海鳥止於魯郊魯侯觴之於廟奏九韶以爲樂具太牢以爲膳鳥胘視憂悲不敢食一臠不敢飲一杯三日而死此以人養鳥也不如以鳥養鳥司馬彪曰即鶢鶋也國語曰海鳥曰委居止於魯東門之外三日妥居雜縣東門城門臧文仲使國人祭之文仲不知以爲神展禽曰越哉臧孫之爲政也越足也言其迂闊不知政要也夫祀國之大節也節制而節政之所成也言節所以成政故慎制祀以爲國典今無故而加典非政之冝也夫聖王之制祀也功施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能扞大患則祀之非是族也不在祀典今海鳥至巳不知而祀之以爲國典難以爲仁且智矣夫仁者講功而智者處物無功而祀之非仁也不知而不問非智也今兹海其有災乎夫廣川之鳥獸恒知而避其災也是歳也海多大風鵜鶘爾雅曰鵜鶘鴮鸅郭璞注曰今之鵜鶘也折好羣飛入水食魚故名夸睪俗呼爲陶河毛詩䟽曰唯鵜在梁許愼曰鵜鶘也一名汗澤陶河水鳥身形似鴆而極大啄長尺餘直而廣目中赤􅟀下故大如數斗囊若有小水魚便抑水满其湖而棄之令水竭盡魚在陸地乃共食之故曰陶河魏志曰五月有鵜鶘集靈芝地詔曰此詩人所謂汚澤也曹詩㓨㳟公逺君子而近小人今豈有賢智之士處于下位乎否則斯鳥胡爲而至其博舉天下雋德茂材獨行君子以荅曹人之㓨山海經曰憲斯之山沙水出焉其中多鵜鶘如鴛鴦而人足其鳴自呌見國有土功莊子曰魚不畏網而畏鵜鶘網者公平無私鵜鶘有心故魚畏之明主行賞罰如網淮南子曰鵜鶘飲水數升而不足鸕鷀爾雅曰鶿鷧郭璞注曰即鸕鶿也觜角曲如鈎食魚異物志曰鸕鷀不生夘而孕鶵於池澤間又吐生多者八九少者五六相連而出若系緒水鳥而巢髙樹上或在石窟之間隋書曰俀國草木冬青土地膏腴水多陸少以小環挂鸕鷀項令入水捕魚得百餘頭以充食唐書曰貞元十三年四月上以自春巳來時雨未降正陽之月可行雩祀遂幸興慶宫龍堂兆庶祈禱忽有白鸕鷀沉浮水際羣類翼從其後左右侍衛者咸驚異之俄然莫知所徃方悟龍神之變化遂相率蹈舞稱慶至乙丑果大雨逺近滂沱於是宰臣等上表陳賀范汪治咽方曰咽鸕鷀啄即愈治鯁燒鸕鷀羽水服半錢即下若呼鸕鷀鸕鷀亦有下者婟澤户故切爾雅曰紡澤虞孫炎注曰尸鴆或謂紡澤虞其別名郭璞注曰今澤也常在澤中見人輙鳴不去有象主守之官固名之也鸛雀說文曰鸛雀也詩曰我來自東零雨其濛鸛鳴于垤婦歎于室毛詩義䟽曰鸛一名負釡一名背竈一名皂君泥其巢一旁爲池含水滿之取魚置池中食其鶵若殺其子則一村致災旱華嶠後漢書曰楊震字伯起年五十始應州郡之辟衆人謂之晚暮後有鸛雀衘三鱣魚飛集講堂前都講取魚進曰虵魚者卿大夫之服象也數三者法三台也先生自此升矣淮南萬畢術曰天雄鸛胎日行千里取鸛鳥胎於月中暴一日一增天雄一月用三十天雄而井治爲丸大如梧子欲行吞一丸得騰虵膽和大良去天雄乃膳獨即行千里桓譚新語曰昔有鸛郡國皆殺之而三輔俗不敢取取或雷霹靂起原天不獨在彼而在此其殺取時正與雷偶耳抱朴子曰以鸛血塗金丹一丸内衣中以指物隨口變化神農本草曰鸛骨味甘無毒治鬼虫諸疰五尸心腹疾博物志曰鸛水鳥也伏卵時數入水卵冷則不孕取礜石周圍繞卵以助暖氣故方術家以鸛巢中䁔礜石爲眞物列仙傳曰木羽者鉅鹿人母貧賤主助産産探婦婦兒生開目大笑母大怖暮夢見大冠赤幘者守兒言此即司命君當報汝恩使汝子木羽得仙母隂識之生兒字木羽所探兒至年十五夜有車馬來迎之過呼木羽爲我御車遂俱去又二十餘年鸛雀旦以二尺魚着户上母匿不道而賣其魚四十餘年母乃終鶖詩曰有鶖在梁說文曰鶖秃鶖也環氏吴紀曰嗣主問中書令張尚鳥之中大者唯鶴小者雀乎尚曰大者有秃鶖小者鷦鷯嗣主忌勝巳因徙尚楚辭曰鵾鴻群晨雜鶖鶬鵾鵾鷄也鴻鴻吉也鶖秃鶖後魏書曰正光二年八月獲秃鶖扵宫内詔以示崔光崔光表曰蒙示十四日所得大鳥此即詩所謂有鶖在梁解云秃鶖也貪惡之鳥野澤所育不應入扵殿庭昔魏氏黄𥘉中有鵜鶘集于靈芝池文帝下詔以曹恭公逺君子近小人博求賢俊太尉華歆由此遜位而讓管寜也臣聞野物入舎古爲不善是以張臶惡鳥仟賈誼忌鵩鵜鶘蹔集而去前王猶爲至誡况今親入宫禁爲人所獲方𬒳畜養宴然不以爲懼准諸徃義信有殊矣且號饕餮之禽必資魚肉菽麥稻梁時或飡啄一食之費容過斤溢今春夏陽旱榖糴稍貴窮窘之家時有菜色陛下爲民父母撫之如傷豈可棄人養鳥留意於醜形惡聲哉衞侯好鶴曹伯愛鴈身死國滅可爲寒心陛下學通春秋親覽前事何得口詠其行未遵誠願逺師殷宗近法魏祖修德延賢消炎集慶放無用之物弃之川澤取樂琴書頥養神性肅宗覽表大恱即棄之池澤南史曰齊晉安王子勛即僞位於㝷陽其夕有秃鶖鳥集城上唐書曰㑹昌元年六月有秃鶖鳥集于禁苑鶬爾雅曰鶬縻鴰郭璞注曰今呼鶬鴰音箭括一音利也莊子曰大鶬飽食仰天而嘘列子曰蒲且子之弋連雙鶬扵青雲之際楚辭曰酸鵠臇鳥臇小臛也煎鴻鶬江賦曰竒鶬九頭精衛山海經曰炎帝之女名媱游于東海溺而不反是爲精衞常取西山之木石以堙東海述異記曰昔炎帝女溺死東海中化爲精衞其鳴自呼毎衘西山木石以填東海怨溺死故也海畔俗說精衞無雄耦海燕而生生雌狀如精衞生雄狀如海鷰今東海畔精衛誓水處猶存溺扵此川誓不飲其水一名誓鳥一名宛禽又名志鳥俗呼爲帝女雀博物志曰有鳥如烏文首白喙赤足名曰精衞昔赤帝之女名女媱徃遊于東海溺死而不反其神化爲精衞故精衞常取西山之木石以填東海左思衛都賦曰􅢄􅖬音祗精衞衘木償怨左思呉都賦曰精衛衘石而遇繳文鰩夜飛而觸綸水扎鳥南夷志曰水扎鳥出昆明池冬月遍於水際太平御覽卷第九百二十五
