front:
  text: 太平御覽卷第四百一十五
  hash: sha256:3516b65a07f2b5a7dcae257b02b19532eaabd735ad4fcad3521ec2143b12dc10
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_415-1a}
body:
  text: 人事部五十六孝女史記曰淳于緹縈者齊人也父淳于意爲太倉令生女五人縈㝡小父犯罪當刑乃罵其女曰生女不生男緩急非有益也縈自傷涕泣隨父至長安詣北闕上書曰父爲吏齊中皆稱㢘平今坐法當刑妾傷死者不可復生刑者不可復續雖欲改過自新其道無由妾願沒爲官奴以贖父之刑使得自新漢文帝憐悲其意原其父罪漢書曰東海有孝婦少寡無子養姑甚謹姑欲嫁之終不肯姑告鄰人曰孝婦養我勤苦我老乆累丁壯奈何其後姑自縊死姑女告吏曰婦殺我母吏捕孝婦自經服罪于公以爲此婦養姑孝聞必不煞也太守不聽于公争之不能得乃抱其獄哭於府上因辭疾去遂煞孝婦郡中枯旱三年後太守至于公曰孝婦不當死前太守強断之當在是乎於是太守煞牛自祭婦冢天立大雨後漢書和熹鄧皇后諱綏太傳禹之孫也父訓護羗校尉母隂氏光烈皇后從弟女也后年五歳太傳夫人愛之自爲翦髪夫人年髙目眊誤傷后額忍痛不言左右見者怪而問之后曰非不痛也太夫人哀憐爲断髮難傷老人意故忍之耳晉書曰衛瓘及禍太保主簿劉瑶等冒難収瓘而葬之楚王偉之伏誅也瓘女與國臣書曰先君名謚未列無異凡人每怪王國蔑然無言春秋之失其咎安在悲憤感慨故以是意瑶等執黄幡撾登聞鼔上言又曰㑹稽寒人陳氏有三女無男祖父母年八九十老無所知又篤癃病母不安其室遇寒飢女相率於西湖採菱更日至市貨賣未甞虧怠郷里稱爲義門多欲取爲婦長女自傷焭獨誓不肯行祖母尋相繼卒三女自營殯葬爲菴舎屋墓側又曰永興槪中里王氏女年五歳得毒病两目皆盲性至孝年二十父死臨屍一呌眼皆血出小妹娥舐其血左目即開時人稱爲孝感唐書曰劉寂妻夏侯氏滑州胙城人字碎金父長雲爲塩城縣丞因疾䘮明碎金遂求離其夫以終侍養經于五年兼事後母以至孝聞及父卒毀瘠殆不勝喪𬒳髪徒跣負土成墳廬於墓側毎日一食如此者積年貞觀中有制表其門閭賜以粟帛又曰于敏直妻張氏營州都督睆城公儉之女也數歳時父母微有疾即觀察顔色不離左右晝夜省侍宛若成人及稍成長恭順弥甚適延壽公于欽明子敏直𥘉聞儉有疾便即號勇自傷期於必死儉卒後凶問至號哭一慟而絶髙宗下詔賜物百叚仍令史官編録之又曰楊紹宗妻王氏華州華隂人也𥘉年三歳所生母亡爲繼母鞫養至年十五父又征遼而沒繼母㝷亦卒王乃收所生母及繼母屍柩并立父形像招魂遷葬訖又廬於墓側陪其祖母及父墳永徽中詔曰故楊紹宗妻王氏因心爲孝率性成道年迫桑榆筋力衰謝以徃在隋朝父沒遼左招魂遷葬負土成墳又葬其祖父母等竭此老年親加板築痛結晨昏哀感行路永言志行嘉尚良深冝摽其門閭用旌敏德賜物三十叚粟五十碩又曰孝女賈氏濮州鄄城人也始年十五其父爲宗人玄基所害其弟強仁年㓜賈氏撫育之誓以不嫁及強仁成童思共報復乃候玄基煞之取其心肝以祭父墓遣強仁自列於縣有司斷以極刑賈詣闕自陳巳爲請代強仁死髙宗哀之特制賈氏及強仁免罪移其家於洛陽又曰汴州李氏孝女年八歳父卒柩殯在堂十餘載毎日哭泣無限及年長母欲嫁之遂截髮自誓請在家終養及喪母號毁殆至㓕性家無丈夫自營棺槨州里欽其至孝送葬者千餘人葬畢廬於墓側蓬頭跣足負土成墳手植松栢數百株李昶列上其狀制特表其閭賜以粟帛顔氏家訓曰張建女三歳喪母靈牀上屏風平生舊物屋漏沾濕出曝曬之女子一見伏牀流涕家人怪其不起乃徃抱持薦席淚漬精神傷沮不能飲食將以問醫􅪊脉云女膓斷矣因耳便吐血數日而亡中外憐之莫不悲歎宣州圖經曰宛陵管氏女名瑶年十七與母同寢母爲虎所負去瑶哀叫隨之因囓虎耳墮方捨其母瑶即負母歸家氣絶武帝表其門以旌孝行王韶之孝子傳曰周青東郡人母疾積年青扶持左右四體嬴痩村里乃歛錢營助湯藥母痊許嫁同郡周少君少君疾病未獲成禮乃求青母見青嘱託其父母青許之俄而命終青供爲務十餘年中公姑感之勸令更嫁青誓以匪石後公姑並自殺女姑告青害殺縣收栲捶遂以誣欵七月刑青於市青謂監殺曰乞樹長竿擊白幡青若殺公姑血入泉不殺者血上天血乃縁幡竿上天宋躬孝子傳曰賈恩㑹稽諸曁人也母亡在殯爲灾火所燒恩及妻伯號哭赴火火不及去鄰近救助棺器得免恩伯二人髪膚燋烈湏臾俱死元嘉四年牓門曰孝蠲役三丗師斍授孝子傳曰北宫氏女嬰兒子者齊人也無兄弟而父母老遂撤其環瑱誓不適人以奉養父母國人聞之莫不相率以孝請女爲趙王后齊使候問使者曰北宫氏女嬰兒子無恙耶撤其環瑱至老不嫁以養父母此助王率民出於孝者也齊王聞之表其門以顯異焉異苑曰順陽南郷縣楊豊與息女香於田穫粟豐爲虎所噬香年甫十四手無寸刃乃搤虎頸豊因獲免香以誠孝致感猛獸爲之逡廵太守平昌孟肇之賜資榖旌其門閭焉列女傳曰陳寡孝婦者陳之寡婦人也年十六而嫁未有子其夫當從戎属孝婦曰我有老母吾不還汝肯善視吾母乎婦曰諾夫果死婦養姑不衰父母將嫁之孝婦曰受人之託豈可棄哉因欲自殺父母懼不敢嫁之養姑二十八年姑年八十四壽乃盡賣其田宅以葬之列女後傳曰珠崖二義者珠崖令之後妻及前妻女也女名𥘉生十三珠崖多珠継母連大珠以爲係臂及令死當送喪還法内珠於奩入關者死継母棄之其子男九歳取之置其母鏡奩中皆不知也及關候搜索得珠奩中吏曰誰當坐者𥘉謂是其継母取之乃白曰君不幸夫解係臂棄之𥘉心惜之取置夫鏡奩中夫人不知也母亦爲然憐之乃曰此珠妾之係臂也君不幸妾解之心不忍棄而置鏡奩中妾當坐因此哭哀動傍人閞吏執筆書不能就一字閞候垂涕終日不能乃曰母子有義如此吾寧可坐之不忍加文後訪訊乃九歳男兒内焉又曰酒泉龐孝婦者趙君安之女也名俄親君安爲同縣孝壽所殺而娥親兄弟三人一時病亡壽乃喜而自賀以爲莫巳報也娥親聞之隂思欲以報壽備兵以伺壽十數年於縣門前斫殺夀訖詣縣自首守長義之解印綬去欲縱娥親娥親曰讎怨賽身妾之分治獄制罪君之常理何敢苟生以枉公法後遇赦得免太常張奐聞嘉之禮以束帛又曰潁川公孫何者公孫氏之女年十三怨家報其父父走得免何與母俱亡母先得見仇人甚恱争欲取心何便馳出叩頭涕泣曰老母常有篤疾垂沒之人安足殘戮以塞忿哉我是其兒父母所憐不如殺我遂殺之而捨其母㑹稽典録曰孝女曹娥者上虞人父盱能弦歌爲巫五月五日於縣泝江濤迎婆娑神溺死不得屍骸娥年十四歳乃縁江號哭晝夜不絶聲旬有七日遂投江而死縣長改葬娥於道傍爲立碑焉益部耆舊傳曰孝女雄者􅛳爲人父江和爲縣功曹縣長遣江和拜檄謁郡太守乗舡墮湍水物故屍喪不歸雄號泣晝夜心不圖存所生男二人並數歳乃各爲作囊盛珠環以係兒臂數爲訣別之辝家人毎防閑之經百許日後稍懈雄因乗小舡於父墮處慟哭遂自投水死弟賢其夕夢雄告之却後六日當共父出至期伺之果與父相持浮於江上部縣長表言爲雄立碑圖像其形焉續述征記曰梁鄒城西有籠水發源長城山直北流於梁鄒西注濟或云齊之孝婦誠感神明湧泉發室内事具水部晏子春秋曰景公所愛槐令吏守之犯槐者刑傷之者死有不聞令遇而犯之者吏收而拘之將加罪焉其子女徃晏子之家說曰賤妾請有道於相國妾聞明君不爲禽獸傷人今君以樹木之故殺妾父妾恐害明君之義晏子明日早朝而復於君公令吏罷守槐之役岀犯槐之囚紀聞曰吴宣城郡靑陽縣有梅根治孝女李娥庿居曽阜之巔林木秀茂周廽十里土人不敢樵採敬而事之日薦蘋藻娥父吴大帝時爲鐡宫冶以鑄軍器一夕煉金竭鑪而金不岀時吴方草創法令至嚴諸耗折官物十萬即坐斬倍又沒入其家而娥父所損折數過千萬娥年十五痛傷之因火烈遂自投于鑪中赫然属天於是金液沸湧溢於鑪口娥所躡三履浮出於鑪身則化矣其金汁塞鑪而下遂成溝渠泉注二十里入于江水其所收金凢億萬斤溝渠中䥫至今仍存故吴俗毎治銅䥫必先爲娥立祠享而祈福歙州圖經曰章頊歙縣合陽郷人也妻程氏與二女入山採葉程爲暴虎衘囓去二女冤呌挽其衣裙與虎爭力虎乃捨之程由是獲全時刺史劉賛嘉之給湯藥蠲户稅改郷爲孝女宣室志曰鄭邯耕民也天寳中母病人教令啖杏實可愈其妻楊氏曰此非時之物湏勞苦以求之兾上天哀憫而賜子其傭耕侍疾吾欲徧於邑里訪之庶比於解叔謙丁公藤之感也乃至鄰郡昜君子之衣而行忽於道傍莽穢中見一杏實悲喜再拜取之絜滌而歸奉其姑曰他郡有人憫其事遺此一實姑喜食之疾漸瘳明年夏忽一日雷風甚動其屋廬殷殷然不断若在簷宇里人驚慴遁去者不可勝計楊氏泣告其姑曰去冬以莽穢中杏實奉姑紿爲郡人所遺今天將謫妾以死從此別矣乃伸臂立於庭具訴其事詞未畢忽有聲若發其庭者雲物隂晦黙不可辨旣而楊氏覺其臂若捧千金重莫能舉乆方開霽乃視之有二金龍長數尺蟠遶其左右臂龍頂上有字曰賜楊氏自是其家日豊至爲冨室太平御覽卷第四百一十五
