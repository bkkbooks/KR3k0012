body:
  text: 兵部八十九鞍轡鞚勒鏕鞍說文曰鞍馬鞁具也鞁皮彼切漢書曰孝宣許皇后元帝母也父廣漢昌邑王侍郎從武帝上甘泉誤取他郎鞍以𬒳其馬發覺吏劾從行而盗當死者詔下蠶室後爲官者丞司馬彪漢書曰光武徴趙喜引見賜鞍馬待詔公車東觀漢記曰景丹將兵詣上上勞勉丹出至城外兵所下馬坐鞍旃毾㲪上毾音塔㲪音登又曰王莽誅諸謀者季次元聞事發覺𬒳馬欲亡馬駕在轅中惶遽着鞍上馬出門顧車乃自覺止又曰章帝曰明德后時廣平鉅鹿樂成王在邸入問起居朕從上望見車騎鞍勒皆純黒無金銀采飾馬不踰六尺於是以白太后即賜錢各五百萬英雄記曰吕布刺殺董卓與李􅔸戰敗乃將數百騎以卓頭繫馬鞍走出武關魏志曰許禇從討韓遂馬超於潼關太祖將北度臨濟河先度兵獨與禇及虎士百餘人留南岸斷後超將歩騎萬餘人來奔太祖軍矢下如雨禇乃扶太祖上舡賊戰急軍争濟舡重欲沒禇斬攀舡者左手舉馬鞍蔽太祖舡工爲流矢所中死禇右手並棹舡僅乃得度是曰微禇幾危又曰太祖馬鞍在庫爲䑕所齧庫吏懼死鄧哀王冲以刀穿單衣如䑕齧者􅍝有愁色太祖問之冲曰俗以䑕齧衣者其主不吉太祖曰此妄言耳俄而庫吏以齧鞍聞太祖笑曰兒衣在側而齧况鞍懸柱乎魏略曰五官將知王忠昔甞噉人時因從駕出行令取家間髑髏著忠繫馬鞍以爲嬉笑吴志曰曹公破走魯肅先還權大請諸將肅將入閤拜權起禮之謂曰子敬孤持鞍下馬相迎足以顯卿未肅趨進曰未也衆人聞之無不愕然就坐徐舉鞭曰願至尊威加乎四海揔括九州克成帝業更以安車蒲輪徴肅始當顯耳權拊掌欣笑又曰孫權每田獵乗馬射虎甞突前攀持馬鞍張昭變色而前曰將軍何有當尔夫爲人君者謂能駕禦英雄驅使群臣豈謂馳逐於原野挍勇於猛獸者乎如有一旦之患奈天下笑何後魏書曰傳永有氣幹拳勇過人能手執鞍橋倒立馳騁江表傳曰孫䇿討祖郎生獲之䇿謂郎曰尔昔斫孤馬鞍今創軍立事除棄宿恨汝莫怨怖郎叩頭謝罪即破械賜衣署門下賊曹魏百官名曰紫茸題頭髙橋鞍一具三輔决録曰平陵士孫奮冨聞京師梁兾知奮儉恡以鏤衢鞍遺奮從貸五十萬西京雜記曰武帝時身毒國獻白光琉璃鞍在暗室光照十丈又曰武帝得貳師天馬造玟㻁石爲鞍異苑曰昔有人乗馬山行遥望岫裏有二老公相對樗蒲遂下騎造焉以䇿柱地而觀之自謂俄頃視其馬鞭漼然巳爛頋瞻其馬鞍體骸枯朽旣還至家無復親属一慟而絶六韜曰車騎之將軍馬不具鞍勒不備者誅陸景典語曰周丗以膏腴之沃壤豐鎬之寳地大啓封境以封秦釋鞍授鞚假驥他人欲無陵巳其可得乎傳玄馬射賦曰百馬齊興六驥孔閑金銜玉羈文防鏤鞍明珂景服華采鮮古樂府左延年從軍詩曰從軍何等樂一驅乗雙駮鞍馬照人目龍驤自動作謝惠連詩曰挂鞍長林側飲馬脩川湄劉琨扶風歌曰繫馬長松下發鞍髙岳頭魏曹植上銀鞍表曰於光武皇帝代効此銀鞍一具𥘉不敢乗謹奉上宋劉義恭謝金梁鞍啓曰賜臣供御金梁橋鞍制作精巧冝副龍駟聖慈下逮猥垂光賜後漢李尤鞍銘曰驅騖馳逐騰躍覆跩雖其捷習亦有顛沛井羸其瓶罔不斯敗跩丑丗切轡釋名曰轡佛也言牽引佛戾以制馬也詩曰我馬維駒六轡如濡又曰我馬維駱六轡沃若又曰駟鐵孔阜六轡在手周禮曰挈壷氏挈轡以令舎懸轡於當所舎止之處又曰大馭掌馭玉路以祀及犯軷王自左馭馭下祝登受轡犯軷遂驅之家語曰古者天子以内史爲左右手以德法爲銜勒以百官爲轡善御馬者正銜勒齊轡䇿均馬力和馬心故口無聲而馬應轡䇿不舉而極千里善御人者一其徳法正其百官均齊人力和安人心故令不再而人順從刑不用而天下理矣又曰善御馬者正身以緫轡又曰閔子騫爲費宰問政於孔子孔子曰君者人也吏者轡也刑者䇿也人君之政執其轡䇿而巳矣又曰孔子適衛衛將軍文子問曰今齊之以刑而猶弗勝何禮之齊也孔子云禮譬之於御則轡也漢春秋曰大僕公卿奉引大㒒執轡大將軍陪乗光武東京郊祀法駕則河南尹奉引奉車都尉執轡侍中叅乗孔叢子曰夫子云夫政令者人君之銜轡所以制下也管子曰凡赦者小利而大害也故乆而不勝其禍故赦者馬之委轡也無赦者痤疽之礦石也痤作和切疽七余切列子曰凡御者得之於銜應之於轡得之手應於心淮南子曰權衡者人主之車輿爵禄者人臣之銜轡矣又曰王良造父御也上車攝轡馬爲齊整班固東廵頌曰乗輿動色群后屏氣萬騎齊鏕千乗弭轡魏明帝善哉行曰百馬齊轡御由造父後漢李尤轡銘曰轡銜在手急緩必時賞罰在心中和是思馬知良御進取道里人知善政令行禁止鞚張揖埤蒼曰靮音的馬韁也鞚馬勒也音緬䩭音羈勒靻也靻音浙柔皮也服䖍通俗文曰所以制馬口曰鞚環濟呉紀曰大皇帝征合肥未下因撤軍還兵吕蒙等共留津北魏將張遼奄至圍數重蒙等死戰旣破圍上馬出升浮橋南巳絶丈餘無板谷利時爲親近監白曰至尊牢攝鞍緩鞚利當着鞭以増馬勢於是得渡晉書曰温嶠字太眞王敦舉兵内向六軍敗績太子將自出戰嶠執鞚諌太子乃止晉起居注曰冠軍將軍王浹表臣以發許昌城内北人諸將孫凱等謀欲逼臣留身驅遣南人臣𥘉出城門乃相纒繞牽臣馬鞚臣手刄斬截僅乃得出應瑒馳射賦曰放鞚長騁神足奔越終節三驅每不虚發陳林武庫賦曰馬則飛雲絶景直鬐騧駠走駿驚飈歩象雲浮受銜斯遊歛鞚則止傳玄良馬賦曰奮舋沛艾虎據麟跱望雲睇景乗虚四起縱銜則徃攬鞚則止成公綏射兎賦曰収輔車之雙轡舎良馬之長鞚禽迅羽之輕焱截逸足之狡弄盈得獲於後乗充庖厨之所貢夏侯湛征邁辭曰上伊闕兮臨川柎駿馬兮授鞍中衢兮載歎歛鞚兮盤桓閔鴻與劉子雅書曰若能控奔驥以接駑乗則力追者萬群傾脩翅以頋短翮則歸飛者如雲勒劉芳毛詩箋音義證曰轡是御者所執者也不得以轡爲勒且舊語云馬勒不云轡以勒爲轡者蓋是北人避石勒名也今南人皆云馬勒而以鞚爲轡反覆推之此爲明證又詩稱執轡如組又曰六轡在手以所執爲轡審矣今俗儒咸以轡爲勒而曽無寤者家語曰閔子問政於孔子孔子曰不能御民者弃其德法專用刑辟譬猶御馬弃其銜勒而專用箠䇿馬必傷車必敗無德法而用刑民必流國必亡漢書曰呼韓耶單于甘露三年正月朝天子于甘泉宫賜以冠帶衣裳玉具劒鞍勒一具馬十五疋王隱晉書曰愍懷太子好卑雞小馬小牛令左右騎斷羈勒使墮地蕭方等三十國春秋曰凉州胡安據盗發張駿墓得珊瑚馬鞭馬瑙鍾黄金勒鄴中記曰虎諱勒呼馬勒曰轡羅勒曰香菜永昌記曰哀牢王出入射獵騎馬金銀鞍勒加翠毛之飾淮南子曰鴈門之北狄不榖食賤長貴壯各上氣力人不㢮弓馬不解勒便之也髙誘曰不榖曰不榖食折酪而巳北狄鮮卑也㢮舎也便習也說苑曰田子方度西河造翟黄翟黄乗軒車載華蓋黄金之勒約鎭簟席如此者具駟八十乗子方望以爲人君翟黄至而子方曰子人臣也將何以至此對曰此皆君之賜也臣進五大夫禄爵倍以故至於此韓陽天文要集曰造父五星在傳舎南造父洗馬轡勒銜鑣棗據詩曰騏驥伏呉坂不與伯樂俱駑馬同銜勒豈得獨卓殊魏文帝馬腦勒賦曰馬腦玉属也出自西域文理交錯有似馬腦故其方人因以名之或以繫頸或以飾勒余有斯勒美而賦之命陳琳王粲並作詞曰天珎物寄鍾山之崇崗禀金德之靈施含白虎之華章扇朔方之玄氣喜南離之焱陽翕中區之黄采曜東夏之純蒼苞五色之明麗配皎日之流光内炤音照浮景外鮮文繁竒章異采的皪其間尔乃藉彼朱罽華勒用成駢居列跱煥若羅星應瑒馳射賦曰群駿籠茸於衡首咸皆腰褭與飛免攏脩勒而容與並軒翥而厲怒陳琳馬腦勒賦曰五官將得馬腦以爲寳勒美其英綵之光艶也使琳賦之爾乃他山爲錯荆和爲理制爲寳勒以御君子王粲馬腦勒賦曰因姿象形匪彫匪刻厥容應規厥性順徳御丗嗣之駿服兮表騄驥之儀式王沉馬腦勒賦曰厥象伊何如規之盈鮫鱗紆鬰白黒殊形如水之㓗如玉之貞固乾坤之所育兮匪彫鏤而自成尔乃施飾龍首加服鸞鑣和鈴鏘鏘囬景逍遥鑣釋名曰鑣包也所以在傍苞歛其口也說文曰鑣馬銜也銜馬勒口中也爾雅曰鑣謂之钀郭璞曰勒也許掲切又魚列切詩曰游于北園四馬旣閑輶車鸞鑣載險歇驕毛萇曰輴軒也歛歇驕田犬也鄭玄曰軒卑駈逆之車也置鵉於者異於乗車也釋智匠古今樂録曰明帝休成之樂歌曰玉鑣息節金輅懷音文士傳曰山巨源爲吏部郎欲舉嵇康自代康聞與之書曰譬猶禽鹿少見馴育則服教從制長而見羈雖飾以金鑣饗以嘉肴愈思長林而志在豐草魯國先賢志曰黄伯仁龍馬頌曰楊鸞鑣兮揮紅沬之幡飄􅐭鐵論曰古者庶人賤騎繩控草鞮音低皮薦而巳及其後革鞍攻成鐵鑣不飾又曰古者樵車無輪棧車無軛其後木軨不衣長轂數輻今冨者銀黄華左搔以結緌錯鑣塗朱珥勒飛軨楚辭曰絶鑣銜以馳騖兮暮着次而敢止路蕩蕩其無人兮逺不御兮千里棗據詩曰真僞各有分駑驥不齊鑣陶琬之詩曰我服旣暉我駟旣閑楊鑣警路哀籥清綿桓玄集載琬之爲江州主簿宋文帝登景陽樓詩曰士女炫街里軒冕曜都城萬􅎮楊金鑣千舳樹蘭旌袁淑逰新亭曲水詩序曰離榭修幕陵𡑞弥阜鑣容斾綵裛野麗雲鮑昭詩曰飛鑣出荆路騖服入秦川王沉踐行賦曰六龍齊鑣鸞聲振振景動波廽天行星陳張恊玄武館賦曰天子翺翔郊甸順時廵省龍駟騰鑣羽騎遊騁頋流光以桉轡廽鸞旗而時幸李充穆天子賦曰其馬則赤驥盗驪驊騮緑耳楊和齊鑣一瞬千里董子曉乗輿駮馬賦曰軀觀若斯氣勢雲披銜金鑣着玉羈顔延之七繹曰梓工飾雕簟之輿㳙人進龍圖之馬轙駕則眩奪鳯蓋振鑣則圈促凾夏故動軔馳光舉䇿流赭張委九慜曰映金箱之羽蓋鳴玉衡之鸞鑣望天路以振䇿指萬里於崇朝殷淡宣貴妃誅曰嚴位服於旗容尚徽謚於銘䇿節哀路於蕭鍾齊行鑣於輬翟應璩與劉文逹書出㒒頃倦逰談之事欲脩無爲之術不
