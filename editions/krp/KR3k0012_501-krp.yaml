front:
  text: 太平御覽卷第五百一
  hash: sha256:b457790a7105d568238ff88635c01d1b6461c0704532f02e6dbd62dd7783576d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_501-1a}
body:
  text: 逸民部一叙逸民一易曰上九不事王侯髙尚其事最處事上而不累於位不事王侯高尚其事也象曰不事王侯志可則也蠱卦又曰六五賁于丘園束帛戔戔施飾丘園盛莫大焉故賁干束帛丘園乃落賁于丘園帛乃戔戔又曰天下有山遯君子以逺小人不惡而嚴九四好遯君子吉小人否馬融曰好遯君子吉言雖身在外乃心在王室此之謂也小人則不然身在外心必怨也九五嘉遯貞吉象曰嘉遯貞吉以正志也詩曰考盤刺莊公也不能修先公之業使賢者退而窮處也考盤在澗碩人之寛獨寐寤言永矢弗諼考成盤樂也箋云有窮處成樂在此澗者又曰白駒大夫刺宣王也刺其不能留賢也皎皎白駒食我塲苗縶之維之以永今朝宣王之未不能用賢賢者乗白駒而去者乗白駒而來食我場中苗我絆之縶之也禮曰季春之月聘名士禮賢者又曰儒有上不臣天子下不事諸侯愼靜而尚寛強毅以與人愽學以知服近文章砥礪廉隅雖分國如錙銖不臣不仕其規爲有如此者論語曰子曰賢者避丗其次避地其次避色其次避言子曰作者七人矣七人謂長沮桀溺丈人石門荷蕢儀封人楚狂接輿又曰子路曰不仕無義長㓜之節不可廢也君臣之義如之何其廢之欲㓗其身而亂大倫君子之仕也行其義也道之不行巳知之矣逸民伯夷叔齊虞仲夷逸朱張柳下惠少連子曰不降其志不辱其身伯夷叔齊與謂柳下惠少連降志辱身矣言中倫行中慮其斯而巳矣謂虞仲夷逸隱居放言身中清廢中權我則異於是無可無不可漢書曰薛方字子容王莾以安車迎方因使者辤謝曰尭舜在上下有巢許今明王方崇唐虞之德亦猶小臣欲便箕山之節也使者以聞莾說方言不強致也後漢書曰或問汝南范滂曰郭林宗何如人滂曰隱不違親貞不絶俗天子不得臣諸侯不得友吾不知其他又曰隗囂素聞杜林志節深相敬待以爲治書後因疾告去囂復欲留強起遂稱疾篤囂意雖相望且欲復容之乃岀命曰杜伯山伯山林之字也天子所不能臣諸侯所不能友蓋伯夷叔齊不食周粟令且從師友之位林雖拘於囂終不屈節又曰趙歧𥘉名嘉年四十有重疾卧蓐七年慮奄然乃遺令勑兄子曰大丈夫遁無箕山之操仕無伊尹之勲天不我與復何言哉可立一圓石於吾墓側前刻之曰漢有逸人姓趙名嘉有志無時命也奈何又曰樊曄字子融有俊才好黄老不肯爲吏又逢萌字子廉北海都昌人也家貧給事縣爲亭長時尉行過亭萌候迎拜謁旣而擲楯歎曰大丈夫安能爲人役哉遂去之長安學通春秋時王莽殺其子宇萌謂友人曰三綱絶矣不去禍將及人即解冠桂東都城門歸將家属浮海客於遼東萌素明隂陽知莽將敗有頃乃首戴瓦盆哭於市曰新乎新乎因遂潜藏及光武即位乃之琅邪勞山飬志修道人皆化其德北海太守素聞其髙遣吏奉謁致禮萌不荅後詔書徴萌託以老耄迷路東西詔使者云朝廷所以徴我者以其有益於政尚不知方面所在安能濟時乎即便駕歸連徴不起以壽終又曰井丹字大春扶風郿人也少受業太學通五經善談論故京師爲之語曰五經紛紛井大春性清髙未嘗修刺候人建武末沛王輔等五王居北宫皆好賔客更遣請丹不能致信陽侯隂就光烈皇后弟也以外戚貴盛乃詭說五王求錢千萬約能致丹而别使人要刼之丹不得巳旣至就故爲設麥飯葱菜之食丹推去之曰以君侯能供甘旨故來相過何其薄乎更置盛饌乃食及就左右進輦丹笑曰吾聞紂駕人車豈此耶㘴中皆失色就不得巳而令去輦自是隱閉不關人事以壽終又曰髙鳯字文通南陽葉人也少爲書生家以農畒爲業而專精誦讀晝夜不息妻常之田曝麥於庭令鳯護雞時天暴雨而鳯持竿誦經不覺潦水流麥妻還怪問鳯方悟之其後遂爲名儒鄰里有争財者持其兵而鬪鳯徃解之不巳乃脫巾叩頭固請曰仁義遜讓柰何弃之於是争者懷感投兵謝罪鳯年老執志不倦名聲著聞太守連召請恐不得免自言夲巫家不應爲吏又詐與寡嫂訟田遂不仕又曰臺佟音同字孝威魏郡鄴人也隱於武安山鑿穴爲居採藥自建業𥘉中州辟不就刺史行部乃使從事致謁佟病徃謝刺史曰孝威居身如是甚苦如何佟曰佟幸得保終性命存神飬和如明使君奉宣詔書夕惕庻事反不苦耶遂去隱逸終不見又曰韓康字伯林京兆霸陵人常採藥名山賣於長安市口不二價三十餘年時有女子從康買藥守藥價不移女子怒曰公是韓伯林耶乃不二價乎康歎曰我夲欲避名今女子皆知有我遂遁入覇陵山中愽士公車連徴不至桓帝乃備玄纁之禮以安車聘之使者奉詔造康不得巳乃許諾辤安車自乗柴車冒晨先使者發至亭亭長以韓徴君當過方發人牛修道橋及見康柴車幅巾公爲田叟也使奪其牛康即釋駕與之有頃使者至奪牛翁乃徴君也使者欲奏殺亭長康曰此自老子與之亭長何罪康因中道逃遁以壽終又曰矯愼字仲彦扶風茂陵人也少好黄老隱遁山谷因穴爲屋仰慕松喬導引之術汝南呉蒼甚重之遺書以觀其志慎不荅年七十餘竟不肯娶後忽歸家自言死日及期果卒又曰馬瑶矯慎同郡人也隱於汧山以兎置爲事所居俗化百姓說之号馬牧先生又曰陳留老父不知何許人也桓帝代黨錮事起守外黄令陳留張升去官歸郷里道逢友人共班荆而言升曰吾聞趙殺鳴犢仲尼臨河而返覆巢竭淵龍鳯逝而不至今官竪日亂䧟害忠良賢人君子其去朝乎夫德之不建人之無援將性命之不免柰何因相抱而泣老父趍而過之植杖太息而言曰吁二丈夫何泣之悲也龍不隱鱗鳯不藏羽網羅髙懸去將安所雖泣何及乎二人欲與之語不頋而去莫知所終又曰龐公者南郡襄陽人也居峴山之南未常入城府夫妻相敬如賔荆州劉表數延請不能屈乃就候之謂曰夫保全一身孰若保全天下乎公笑曰鴻鵠巢於髙林之上暮而得所栖黿鼉穴於深淵之下夕而得所宿夫趍舎行止亦人之巢穴也且各得其栖宿而巳天下非所保也因釋耕於壠上而妻子耘於前表指而問曰先生苦居畎畒而不肯官禄後代何以遺子孫乎公曰伐人皆遺之以危今獨遺之以安雖所遺不同未爲無所遺也表歎息而去後携其妻子而登鹿門山因采藥不返又曰向長字子平髙士傳向字作尚河内朝歌人也隱居不仕性尚中和好通易老貧無資食好事者更饋焉受之取足而反其餘王莽大司空王邑辟連年乃至欲薦於莽固辭乃止遂求退讀易至於損益卦喟然歎曰吾巳知冨不如貧貴不如賤未知死何如生耳建武中男女嫁娶旣畢勑斷家事勿相關當如我死也於是遂肆意與同好北海禽慶俱逰五嶽名山不知所在又曰王覇字孺仲太原人少有清節及王莽篡位棄冠帶絶交官建武中徴到尚書拜稱名不稱臣有司問其故覇曰天子有所不臣諸侯有所不友司徒侯覇讓位於覇閻陽毁之遂止以病歸隱居守志連徴不至又曰閔叔仲代稱節士雖周黨之㓗清自以弗及也黨見其含菽飲水遺之以生蒜受而不食建武中應司徒侯覇之辟旣而投劾而去復徴愽士不至客居安邑老病家貧不能得肉日買猪肝一斤屠者或不肯與安邑令聞勑市吏常給焉仲叔恠而問之知乃歎曰閔叔仲豈以口腹累安邑乎遂去客沛以壽卒又曰野王二老不知何許人也𥘉丗祖貳於更始㑹關中擾亂遣鄧禹西征送之於道旣反因於野王獵路見二老即禽丗祖問曰禽何向舉手西指言此中多虎臣每即禽虎亦即臣大王勿往也丗祖曰苟有其備虎亦何患二老曰何大王之謬耶昔湯即桀於鳴條而大城於亳武王即紂於牧野而大城於郟鄏彼二王者備非不深也是以即人者人亦即之雖有其備庸可忽乎丗祖悟其旨謂左右曰此隱者也將用之辝去莫知所在又曰嚴光字子陵㑹稽餘姚人少有髙名與丗祖同逰學及丗祖即位光乃變姓名隱身不見帝思其賢乃令以物色訪之齊國上言有一男子披羊裘釣澤中乃備安車玄纁聘之三反而後至車駕即幸其館至光卧所撫光腹曰咄咄子陵何不出相助爲治耶光曰昔唐虞著德巢父洗耳士故有志何至相逼後引光入共偃卧光以足加帝腹上明日太史奏客星犯御座帝笑曰朕故人嚴子陵耳除諌議不屈耕冨春山後名其釣處爲嚴陵瀨范曄後漢書逸民傳序曰易稱遯之時義大矣哉是以堯稱則天不屈潁陽之髙武盡羙矣終全孤竹之㓗自兹以降風流彌繁長徃之軌未殊而感致之數匪一或隱居以求其志或廻避以全其道或静已以鎮其躁或去危以圖其安或垢俗以動其槩或疪物以激其清然觀其甘心畎畒之中憔悴江海之上豈必親魚鳥樂林草哉亦云性所至而巳京房易飛候曰以知賢人隱視四方常有火雲五色具而不雨其下賢人隱莊子曰古之所謂隱士者非伏其身而弗見也非閉其言而不出也非藏其智而不發也時命大謬也又曰刻意尚行離丗異俗此山谷之士誹丗之人也就藪澤處閑曠釣漁閑處無爲而巳矣此江海之士避丗之人閑暇者之所好也皇甫士安髙士傳序曰孔子稱舉逸民天下之人歸心焉是以鴻崖先生創髙於上皇之丗許由善卷不降於唐虞之朝自三代秦漢逹乎魏興受命中賢之主未嘗不聘岩穴之隱追遯丗之民是以易著束帛之義禮有玄纁之制詩人發白駒之歌春秋顯子臧之節故明堂月令以季春之月聘名士禮賢者然則髙讓之士王政所先太平御覽卷第五百一
