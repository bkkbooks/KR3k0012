front:
  text: 太平御覽卷第四百九十三
  hash: sha256:57117b087aa638adee349e63d50b9d8bb7990ce3b4ffc45010567a64440aa555
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_493-1a}
body:
  text: 人事部一百三十四奢說文曰奢張也反儉曰奢從大者言誇大於人也毛詩曹蜉蝣刺奢也昭公國小而迫好奢而任小人將無所依焉蜉蝣之羽衣裳楚楚蜉蝣之翼采采衣服左傳曰丹桓公之楹刻其桷皆非禮也御孫諌曰臣聞之儉德之恭也侈惡之大也先君有恭德而君納諸大惡無乃不可乎又曰襄公五年齊慶封來聘其車美叔孫曰豹聞之服美不稱必以惡終美車何爲又曰吴師在陳楚大夫皆懼子西曰今聞夫差次有臺榭陂池焉宿有妃嬙嬪御焉一日之行所欲必成玩好必從珎異是聚觀樂是務視民如讎而用之日新夫差先自敗也巳安能敗我禮記曰管仲鏤簋而朱絃旅樹而反坫山節而藻梲賢大夫而難爲上也得天子之禮論語曰孔子謂季氏八佾舞於庭是可忍也孰不可忍也又曰子曰相維辟公天子穆穆奚取於三家之堂子曰人而不仁如禮何人而不仁如樂何又曰邦君樹塞門管氏亦樹塞門邦君爲兩君之好有反坫管氏亦有反坫管氏而知禮孰不知禮又曰臧文仲山節藻梲何如其智也魯大夫臧孫辰又曰孔子曰奢則不遜儉則固與其不遜也寧固史記曰趙平原君使春申君趙使欲誇楚爲瑇琩簪刀劒悉以珠飾之春申君客三千餘人上客皆躡珠履以見趙使大慙又曰尹吉甫仕至上卿其家大冨食口數百人時歳大飢曽鼎鑊作粥啜之聲聞數里食訖失三十人覔之乃在鑊中齕取燋粥而巳漢書曰鮑宣上書柰何獨私養外親與幸臣董賢賢使奴從賔客漿酒藿肉視酒如漿視肉如藿蒼頭盧兒皆用致冨非天意也漢名奴蒼頭非銳黒以別良人諸給殿中省所居蒼頭侍從也又曰陳咸爲治倣嚴延年其廉不如所居調發属縣所出食物以自奉養奢侈玉食又曰陳遵爲公府掾公府掾中率皆羸車小馬不上鮮明而遵獨極輿馬衣服之好門外車騎交錯又日出醉歸曹事數廢西曹白請斥遵大司徒馬宫大儒優士謂西曹此人大度士柰何以小丈責之又曰王鳯爲大將軍郡國守相刺史皆出其門又以太僕王音爲御史大夫羣弟爭爲奢侈賂遺珎寳四靣而至後庭姬妾各千人僮奴以千百數又曰張禹爲人謹厚内殖貨財家以田爲業及冨貴多買田至四百頃涇渭漑灌極膏腴上價他財稱是禹性習知音聲内奢滛身居大第後堂作理絲竹管絃又曰自王吉至崇世名清廉然材器名稱稍不能及父而禄位弥隆皆好車馬衣服其自奉養極鮮明而金銀錦繡之物及遷徙去處所載不過囊衣不畜餘財家居亦布衣𬞞食天下服其廉而恠其奢故傳能作黄金又曰哀帝幸舎人董賢寵之累遷爲太尉前後所賜不可勝計哀帝崩群臣白太后収賢斬之時年二十二其家奢侈過於國耳於是乃收董氏財物估價凢四十二億萬貫皆帝所賜之物後漢書曰梁兾爲大司馬行大將軍事害太尉李固及内外忠臣皆兾爲之於是權震中外四方調發歳計先輸於兾然後入國吏人輸金懷璧求官請罪者道路相望兾又遣客出塞外國大壯棟宇加以丹􅃮圖以雲氣仙靈臺榭交通相望駭雞犀夜光璧充實帑藏鳴馳龍馬秣於内廐兾將妻孫氏乗輦青蓋車張羽葆飾以金玉琥珀每遊觀池亭及弟内多從倡優鳴鍾皷吹竽酣樂竟路日夜相繼及桓帝誅兾收其貲産以實國庫詔減天下一歳租稅之半又曰桓帝時誅梁兾封單超徐璜具瑗左悺唐衡五人超薨後四侯轉撗天下爲之語曰左廻天具獨坐徐卧虎唐兩墮皆競起第宅樓觀壯麗窮極技巧金銀罽毦施於犬馬取良民羙女以爲妃妾皆珍飾華侈擬則宫人其僕從皆乗車而從列騎東觀漢記曰馬融才髙博洽爲通儒教養諸生常有千數涿郡盧植北海鄭玄皆其徒也善鼓瑟好吹笛逹生任性不拘儒者之節居宇器服多存侈飾常坐髙堂施綘紗帳前授生徒後列女樂弟子以次相傳鮮有入其室者吴志曰甘寧好遊俠水行則連軒侍從𬒳文錦繡常以繒帛維舟去或割弃之以示奢侈也又曰將軍賀齊性奢好軍事所乗舡彫刻丹鏤青蓋綘䄡蒙衝闘艦望之若山蜀志曰先主定益州以劉琰爲涪陵太守後主立封都郷侯服御飲食侈靡侍婢數十人皆爲聲樂又悉教讀誦魯靈光殿賦又曰麋笁字子真東海人世殖貨財僮僕萬人貲産巨億徐州牧陶謙辟爲別駕謙卒笁奉謙命迎先主牧之及吕布襲破先主虜其妻子笁於是進妹爲夫人乃以二千人金帛貨幣以助軍實先主頼笁之資復振軍威先主後定益州即帝位拜笁爲安漢將軍弟芳爲南郡太守携貳迎孫權敗關羽於是笁乃請罪先主以兄弟罪不相及待之如𥘉晉書曰何曽字頴孝陽夏人其家大冨魏明帝時爲文學武帝踐祚累遷爲太傳性甚奢豪毎赴宴不食太官所設帝命取其食蒸餅上不拆作十字不食日食萬錢猶云無下筯之處人以小𥿄書者勑記室勿報又曰石崇字季倫累遷荆州刺史崇好俠無頼遣吏刧逺使啇客致家大冨有别館在河陽之金谷財産盈積室宇宏麗後房百數皆曵綺紈絲竹之妙皆盡一時之選與貴戚惠帝舅王愷奢靡相尚愷以􅏁燠釡崇以蠟代薪愷作紫絲歩障四十里崇作錦歩障五十里愷以赤石脂塗屋崇以椒塗之武帝助愷珊瑚樹一株髙二尺愷以示崇崇以鐡如意擊破愷不恱崇曰無恨令取六七株還之惠帝知冨無以誇之時外國進火浣布天下更無帝爲衫來幸崇家崇奴僕五十人皆衣火浣布衫祇承帝大慙崇厠屋内置侍婢衣以紈素並以香囊錦袋崇大㑹賔客侍中劉實往厠見厠内燦爛便出謂崇曰幾悮入公室矣崇曰厠也寔更往見侍婢所逼便廽後趙王倫誅崇兄弟妻子無少長悉皆遇害𥘉崇家稻米属地化爲螺人以爲族滅之應也又曰和嶠字長輿汝南西平人中郎將庾凱見嶠歎曰森森若千丈松雖磥砢多節目施之大厦有棟梁之用武帝重之爲黄門侍郎嶠家産豐冨擬於王者杜預封帝以爲和嶠有錢癖又曰王濟性豪侈麗服玉食時洛京地甚貴濟買地爲馬埒編錢滿之時人謂金埒又曰任愷𥘉何邵以公子奢侈毎食必盡四方珎饌愷乃踰之一食萬錢猶云無可下筯處又曰石崇財産豐積室宇宏麗後房百數皆曵紈繡珥金翠絲竹盡當時之選庖厨窮水陸之珍又曰何劭驕奢簡貴亦有父風衣裘服翫新故巨積食必盡四方珎異一日之供以錢二萬爲限時論以爲太官御膳無以加之又曰羊稚舒冬月釀令人抱甕須臾復易人酒速成而味好又曰愷失政遂縱酒極滋味𥘉何邵一身一日任之供必錢二萬爲限及愷有踰於邵宋書曰徐湛之善於尺牘音辭流暢貴戚豪家産業甚厚室宇園池貴遊莫及伎樂之妙冠絶一時門生千餘人皆三吴冨人之子姿質端妍衣服鮮麗毎出入行遊塗巷盈滿泥雨日悉以後車載之太祖嫌其侈縱毎以爲言又曰謝靈運性奢豪車服鮮麗衣裳器物多改舊制丗共宗之咸稱謝康樂也又曰劉穆之性奢豪食必方丈旦輙爲十人饋穆之旣好賔客未甞獨飡毎至食時客止十人以還者帳下依常下食以爲常白髙祖曰穆之家本貧賤贍生有闕自叨忝以來雖每存約損而朝夕所湏徴爲過豐自此以外一毫不以負公又曰阮佃夫通貨賄凢事非賂不行宅舎園池諸王邸第莫及女伎數十藝色冠絶當時金玉錦繡之飾宫掖不逮也每製一衣造一物京邑莫不法效焉於宅内開瀆東出十許里塘岸整潔泛輕舟奏女樂齊書曰劉悛旣藉舊恩尤能恱附人主承迎權貴賔客閨房供費奢廣罷廣司二州悉傾資獻家無留儲在蜀作金浴盆餘金物稱是又曰劉撝彭城人其祖彦之父仲度俱仕明帝時爲户部郎中太子洗馬其家豪冨資財宅宇山池妓妾姿藝皆窮上品有愛妓陳玉明珠明帝求不與逼奪之撝有怨詞帝令有司誣奏將殺之入獄數宿鬢毛皆白免死爲司徒長史明帝射雉郊野渇倦撝得青早瓜進帝帝對割甚嘉之入齊三遷爲御史中丞五爲兵部尚書後魏書曰夏侯道遷譙國人封濮陽侯除䆓州大中正不拜好奢侈宴飲京師珎羞罔不畢備甞於京城西水次大起園池植列花果延招儁彦日往遊適妓妾十餘人當自娱興國秩俸歳入三千疋專供酒饌不營家産毎誦孔融詩曰座上客恒滿罇中酒不空餘非吾之事也識者多之道遷不娉正室又曰郢州刺史韓務獻七寳牀象牙席詔曰昔晉武帝焚雉頭裘朕常嘉之今務所獻亦此之流也竒麗之物有乖素風可付其人家隋書曰裴矩爲給事郎煬帝至東都矩以蠻夷朝貢者多諷帝令都下大戲徴四方竒異陳於端門街衣錦珥金翠店肆悉設帷帳盛酒食遣蠻夷見者嘆其中國以爲神仙唐書曰元載於城中開南北二甲第室宇宏麗冠絶當時又於近郊起亭榭所至之處帷帳什器皆如宿設儲不改供城南膏腴別墅連疆接畛凢數十所婢僕曳羅綺亦百餘人恣爲不法侈僣無度又曰裴冕爲宰相性本侈靡好尚車服及營珎饌名馬在櫪直數百金者常十數每㑹賔友滋味品數坐客有昧於名者自創巾子其狀新竒市肆因而効之呼爲僕射様漢武帝故事曰又起建章宫爲千門萬户其東鳯闕髙二十丈其北太液池池中漸臺髙二十丈池中又爲三山以象蓬萊方丈瀛州削金石爲魚龍禽獸之属其南有玉臺玉堂基與中央前殿等去地十二門階陛皆用玉璧又作神明臺井幹樓髙五十餘丈皆懸閤輦道相属焉其後又爲酒池肉林聚天下四方竒異鳥獸於其中鳥獸能言能歌舞或竒形異態不可稱載傍别造華殿四夷珎寳充之琉璃珠玉火浣布切玉刀不可稱數巨象大雀師子駿馬充塞苑廐自古巳來所未見者必備三輔故事曰秦時奢汰有天下以來不復是過渭水貫都以像天河撗橋南渡以像牽牛中外殿觀百四十五後宫列女萬有餘人鹽鐡論曰今民文柸畫案婢妾衣羅紈履絲所以亂治漢末一筆之押雕以黄金飾以和璧綴以隋珠發以翡翠此筆非文犀之楨必象齒之管豐狐之柱秋兔之翰用之者必𬒳珠繡之衣踐雕玉之履矣晉朝雜記曰洛下少林木炭正如粟狀羊琇驕豪乃擣小炭爲屑以物和之作獸形後何石之徒共集乃以温酒火勢旣猛獸皆開口向人赫赫然諸豪相矜皆服而效之管子曰昔者桀之時女樂三萬人晨譟於端門樂聞於三衢無不服文繡衣裳者晏子春秋曰寸之管無當天下不能足之粟今齊國丈夫耕女子織夜以接日不足以奉上而君側雕文刻鏤之觀比無當之管也又曰古者聖人製衣服冬輕而暖夏輕而清今金玉之履重不可節是過任也列子曰衛端木叔者子貢之世也藉其先貲家累萬金意所欲者無不爲奉養之餘先散之宗族次散之邑里及一國行年六十氣幹將衰弃其家事散其庫藏珎寳車服妾媵一年之中盡焉及其病也無藥石儲及其死也無瘞埋之實一國之受其施者相與賦而藏之禽屈釐聞之曰端木叔狂人也辱其祖矣段干木聞之曰端木叔逹人也過其祖矣韓子曰禹作祭器黒􅃮其外朱畫其内觴酌有笇樽俎有飾此弥侈矣而國之不服者三十二殷作大輅建九旒輅食器彫琢觴酌刻鏤此弥侈矣而國之不服者五十三淮南子曰夏屋綿聮彫琢刻鏤其剞劂然猶未能贍人主之欲也太平御覽卷第四百九十三
