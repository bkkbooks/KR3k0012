front:
  text: 太平御覽卷第三百六十九
  hash: sha256:49ccf664a534c5f931ee3159a63215ec26e8c4d1cc35da48014052dd678ad641
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_369-1a}
body:
  text: 人事部十頸項肩胛臂腕腋肘頸項釋名曰頸徑也徑挺而長也說文曰頸頭莖也脰項也河圖曰黒帝脩頸毛詩碩人曰領如蝤蠐領頸也禮斗威儀曰君乗木而王其民長頸宋均曰以青龍也春秋元命苞曰北方至寒其人形短頸短頸畏寒傳曰晉伐齊齊侯禦諸平隂晉州綽射殖綽中肩兩矢夾頸脰頸也史記曰范蠡遺大夫種書曰越王長頸鳥喙可與共患難不可與共樂又曰沛公軍至灞上秦王子嬰以組係頸降軹道傍漢書曰張耳陳餘相與爲刎頸之交刎頸之交者言託契深重雖断頸絶頭無所顧也又曰周昌甞燕入奏事髙帝方擁戚姬昌還走髙帝逐得騎昌項問曰我何如主也昌仰曰陛下即桀紂主也又曰田蚡取燕王女爲夫人太后詔列侯宗室皆往賀灌夫行酒至臨汝侯灌賢賢方與程不識耳語夫無所發怒廼罵賢坐迺起更衣稍稍去竇嬰去因戲音麾招麾之令出也夫出蚡遂怒曰此吾驕灌夫罪也迺令騎留夫夫不得出籍福起爲謝按夫項令謝夫愈怒不肯順蚡迺戲騎戲亦音麾令縛夫置傳舎後漢書曰董宣旣格殺胡陽公主家蒼頭帝使宣謝公主宣不伏上使人按其項於地宣不肯起因號爲強項侯東觀漢記曰班超字仲升常行遇見相工工謂超曰䴏頷虎頭飛而食肉此萬里封侯相魏書曰文帝旣立爲嗣喜因抱辛毗頸曰辛君知吾喜不魏志曰母丘儉使王傾至海上海上人云得一破舡有生人項有面與語不曉不食而死蜀志曰先主率其屬從校尉鄒靖討賊因有功除安喜尉督郵以公事到縣先主求謁不通直入縛督郵杖二百解綬繫其頸着馬枊五葬切棄官亡命王隱晉書曰杜預𥘉伐吴吴人知預病癭每見大樹似癭者輙以刀斬破白題曰杜預頸唐書曰屈突通或說歸降義軍通泣曰吾蒙國重恩歴事兩主受人厚禄安可逃難有死而巳自摩其頸曰要當爲國家受人一刀耳家語曰孔子其頸似臯陶孔叢子曰子髙遊趙還魯平原君客邹文李節與子髙別文節流涕交頸子髙撫手而已尸子曰禹長頸鳥喙扶南傳曰毗塞國王身長一丈二尺頸長三尺自古不死莫知其年知未然事號爲長頸王繁欽三胡賦曰罽賔之胡面象炙蝟頂須如持囊肩釋名曰肩堅也說文曰肩髆也春秋元命苞曰文王龍顔阜肩左傳昭二十年曰衛公孟縶狎齊豹𥘉齊豹見宗魯於公孟薦逹也爲驂乗焉將作亂而謂之曰公孟之不若子所知也勿與乗吾將殺之對曰吾由子事公孟今聞難而逃是僣子也使子言不信子行事乎吾將死之公孟有事於蓋獲之門外宗魯驂乗齊氏用戈擊公孟宗魯以背蔽之斷肱以中公孟之肩皆殺之又昭二十六年成大夫公孫朝告于齊曰孟氏魯之敝室也敝壞也用成巳甚弗能忍也請息肩於齊齊師圍成又定上曰楚子渉睢七余切濟江入于雲中雲夢澤也王寢盗攻之以戈擊王王孫由于以背受之中肩爾雅曰北方有比肩民焉迭食而迭望此即半躰之人各有一目一鼻一孔一臂一脚亦由魚鳥之相舎也崔鴻十六國春秋後趙録曰𥘉太式殿旣成圖畫自古賢聖忠臣烈士是月皆變爲胡狀旬餘頭悉入肩中喉冠忦音介髣髴微出石虎大惡之國語曰叔魚鳶肩其母曰是必爲賄死莊子曰支離䟽肩髙於頂又曰盧敖見若士深目鳶肩淮南子曰東方之人鳶肩北方人大肩梁兾別傳曰兾鳶肩文傳曰趙壹肩髙二尺髙自抗竦爲郷黨所擯車頻秦書曰符堅生肩背有赤色隱起狀如篆文洛神賦曰肩若削成胛釋名曰胛闔也與匈脇背相㑹闔說文曰髆肩胛也春秋元命苞曰胛之爲言附着也如龍蟠虎伏合附着也吴越春秋曰專諸刺王僚貫胛逹背臂釋名曰臂禆也在傍曰禆也左傳莊公𥘉公築臺臨黨氏見孟任從之閟而以夫人言許之割臂盟公生子般焉又襄公公孫丁射尹公佗貫臂春秋元命苞曰湯臂四肘是謂神剛象月推移以綏四方史記曰吴起東出衛郭門與其母訣嚙臂而盟曰起不爲卿相不復入衛門果如其言漢書曰李廣隴西人援臂善騎射又曰陳湯擊郅支時中寒病臂不屈伸湯入有詔無拜又王莽傳曰甄豐子尋作符命而誅尋手理有天子字莽解其臂入視曰此一太子也或曰一六子也明尋子父當戮死也又曰劉歆上議曰武帝立五廟國伐朝鮮起玄莬樂浪以斷匈奴左臂西伐大宛結烏孫以裂匈奴左臂續漢書曰單超河南人梁兾振動天下延熹二年皇后崩帝呼單超等入謀誅兾及更召徐璜具瑗等五人遂定其議帝嚙超臂出血以爲盟兾及宗親黨與悉誅之後漢書曰楊璇平蒼梧桂陽猾賊荆州刺史趙凱誣奏璇實非身破賊而妄有其功遂檻車徴璇防禁嚴宻無由自訟乃嚙臂出血以書衣爲章具陳破賊形勢以付子弟詣闕通之詔原璇更拜議郎凱受誣人之罪魏志曰太祖所乗馬名絶影流矢所中并中太祖右臂吴志曰太史慈字子義東來人也長七尺美鬚髯猿臂善射蜀志曰先主長七尺五寸自顧見耳垂臂下膝又曰關羽爲流矢所中貫在左臂隂雨常痛伸臂與醫刮骨去毒血流盤器而羽割炙引酒自若晉書曰都官從事濟南劉享奏何曽綺麗華飾瑩牛蹄角後曽辟享爲掾因小事杖享破臂晉中興書曰交州刺史王諒爲州人梁碩所圍城䧟碩逼奪諒節諒不與碩遂斷諒右臂諒正色曰死不畏臂斷何有哉崔鴻十六國春秋後趙録曰石勒引李陽懽酣陽臂笑視之曰卿雖老臂中由有力頗復與人鬪不孤徃日懕卿老拳卿亦飽孤毒手後秦記曰姚襄垂臂過膝三國典略曰陸法和進於巴陵見王僧辯謂之曰貧道巳却侯景一臂更何能爲檀越冝即逐取侯景三國典略曰髙歡營主尉景欲執爾朱兆歡嚙臂止之唐書曰髙宗幸東都太子於京師監國因留薛元超以侍太子臨行謂元超曰朕之留卿如去一臂關西之事悉以委卿列子曰甘蠅古之善射者飛衛學射於甘蝇紀昌學射於飛衛盡飛之術計天下之敵巳一人而巳乃謀殺飛衛相遇於野二人交射矢鋒觸而墜於地飛矢先窮紀昌唯一旣發飛衛以棘刺之端扞之而無差於是二子泣而投弓相拜於途請爲父子剋臂以誓不得告術於人也莊子曰仲尼謂顔淵曰吾終身與汝交臂而失之可不哀與又曰浸假而化子之左臂以爲鷄予因以求時夜浸假而化予之右臂以爲彈予因以求鷄炙又曰韓魏相争侵地子華子見昭僖侯昭僖有憂色子華子曰今使天下書銘於君之前曰左手攫之則右手廢右手攫之則左手廢然而攫之必有天下君攫之乎僖侯曰寡人不攫也子華子曰自是觀之兩臂重於天下也身又重兩臂韓之輕於天下逺矣燕丹子曰荆軻拾瓦投鼃音圭太子令人奏奉盤金軻用竭復進軻曰非爲太子愛金也但臂痛耳淮南子曰羿右臂長而善射新序曰崔杼殺莊公申蒯漁於海將入死之門者以告崔杼令勿内蒯曰汝疑我乎乃斷其左臂以與門者以示杼陳八列令其入蒯拔劒呼天而鬪殺七列不及崔杼一列而死白虎通曰湯臂二肘是謂抑翼攘去不義萬民蕃息璅語曰晉師曠晝侍平公鼓瑟輟而笑曰齊君與嬖人戲墜床傷臂公書記之使問齊侯果如其言山海經曰長臂國人捕魚水中兩手各操一魚又曰竒肱之國其人唯有一臂劉欣期交州記曰儋耳之東人臂一骨外國事曰大拳國人援臂長脇西京雜記曰宣帝𬒳收繫郡邸獄臂上猶帶史良娣合綏宛轉繩係寳鏡一枚幽明録曰有人相羊叔子父墓有帝王之氣叔子於是乃自掘斷墓後相者又云此墓由當出折臂三公叔子工騎乗及爲襄陽縣督盤馬落地遂折臂論衡曰書傳稱曽子孝與母同氣曽子出薪於野客至而欲去曽子母以右手搤左臂曽子左臂立痛即馳至此虚也臂痛曽子臂亦痛母死曽子亦死乎搤於革切俗說曰釋道安生便左臂上一肉廣一寸許着臂如釧將可上下時人謂之印手菩薩楚辭曰九折臂而成醫腕釋名曰腕者言宛屈也左傳定下曰晉師將盟衛侯于鄟澤鄟音專趙簡子曰羣臣誰敢盟衛君者渉佗成何曰我能盟之將㰱渉佗捘衛侯之手及腕捘子對切捘擠也血至於腕衛侯怒腋釋名曰腋繹也言可張翕尋繹也說文曰胳略下也胠腋下也胳音各胠香刧反又去魚二切漢書五行志曰髙后八年三月祓霸上還過軹道見物如蒼狗㦸髙后腋忽不見卜之趙王如意爲祟遂病腋下而崩東觀漢記曰江革爲五官中郎將將朝㑹詔使虎賁迎送扶腋寵遇甚厚孔融上書曰先帝褒厚老臣懼其殞越是故扶接助其氣力三公刺腋近爲憂之非警戒也云備大臣非其類也神仙傳曰老子母感大流星而娠懷之七十歳乃生剖母左腋而出肘釋名曰肘注也可隱注也傳曰師陣于鞌郄克傷於矢曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之又曰欒盈之亂范鞅遇欒樂曰樂免之死將訟汝於天樂射之不中又注則乗槐本而覆或以㦸鈎之斷肘而死春秋後語曰智伯率韓魏之兵以伐趙襄子於晉陽决晉水以灌晉陽之城不没者三板智伯行水魏桓子御韓康叅乗智伯曰吾不知水之可以亡人國乃今知之然汾水可以灌安邑綘水可以灌平陽魏桓子肘韓康子韓康子履桓子之足接於車上而智伯地分身死國亡爲天下笑謝承後漢書曰羊續爲南陽太守志在矯俗裳不下膝彈琴出肘叚龜龍凉州記曰吕光左肘生肉印及征西域印内隱起文字曰巨霸也莊子曰子貢往見原憲憲杖䇿而應正衿肘見又曰支離叔與滑介叔觀於冝伯之丘崑崙之墟黄帝之所休俄而栁生於其左肘其意蹷蹷然惡之支離叔曰子惡之乎滑介叔曰亡予何惡生者假借也假之而生生塵垢也生爲晝夜且吾與子觀化化及我何惡哉吕氏春秋曰密子賤治單父恐魯君聽䜛令巳不得行術將行請迎史二人俱至單父使其書將書密子掣其肘書不善則怒史患之請歸報魯君太息曰密子以此諌寡人自今以去單父非寡人有太平御覽卷第三百六十九
