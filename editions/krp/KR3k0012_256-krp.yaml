front:
  text: 太平御覽卷第二百五十六
  hash: sha256:9727ded9c3c9971b433a9d290567881d830c579987b196067e72770f9b2e4f37
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_256-1a}
body:
  text: 職官部五十四良刺史上漢書曰黄霸爲楊州刺史治有績漢宣詔賜車特髙一尺別駕主簿緹紬屏泥於載前以彰有德也又曰朱愽遷冀州刺史愽夲武吏不更文法及爲刺史行部吏民數百人遮道自言愽駐車決遣四五百人皆罷去如神吏驚不意愽臨事乃至於此又曰何武爲楊州刺史行部必先即學官見諸生試其誦論得失然後入傳舎問墾田頃畒五榖美惡東觀漢記曰郭伋字細侯河南人也在并州素結恩德行部到西河美稷有童兒數百各騎竹馬迎拜伋問曰兒曹何自逺來對曰聞使君到喜故迎諸兒復送到郭外問使君何日當還伋曰別駕從事計日告之行部還入美稷界先期一日伋念負諸童兒遂止于野亭湏期乃入又曰李珣爲兖州刺史所種小麦葫菻悉付從事一無所留清約率下常席羊皮布𬒳後漢書曰郭賀爲荆州刺史顯宗廵狩到南陽特見嗟歎賜以三公之服黼黻冕旒勑行部去䄡帷使百姓見其容服以章有德毎所經過吏人指以相示莫不榮之又曰賈琮爲冀州刺史舊典傳車驂駕垂赤帷裳迎於州界及琮之部升車言曰刺史當逺視廣聽紏察美惡何有反垂帷裳以自掩塞乎乃命御者褰之百城聞風自然竦震其諸贓過者望風解印綬而去又曰王望爲青州刺史甚有威名是時州郡災旱百姓窮荒望行部道見飢者祼行草食五百餘人愍然哀之因以便冝出所在布粟給其廪粮爲作褐衣又曰中平元年交阯屯兵反執刺史及合浦太守自稱柱天將軍靈帝特勑三府精選能吏有司舉賈琮爲交趾刺史琮到部訊其反狀咸言賦歛過重百姓莫不空單京師遥逺告冤無所民不聊生故聚爲盗賊琮即移書告示使安其資業招撫荒散蠲復徭役誅斬渠帥爲大害者簡選良吏使試守諸縣歳間蕩定百姓以安巷路爲之歌曰賈父來晚使我先反今見清平吏不敢飯在事三年爲十三州最又曰郭伋爲并州牧入界所到縣邑老㓜相携逢迎道路所過問民疾苦聘求耆德雅俊設几杖之禮朝夕與叅政事又曰蘇章爲冀州刺史故人爲清河太守章行部按其姧贓乃請太守爲設酒肴陳平生之好甚歡太守喜曰人皆有一天我獨有二天章曰今夕蘇孺文與故人飲者私恩也明日冀州刺史按事者公法也遂舉正其罪州境知章無私望風畏肅又曰張禹拜楊州刺史當過江行部中土人皆以江有子胥之神難於濟渉禹將渡吏固請不聽禹厲言曰子胥如有靈知吾志在理察枉訟豈危我哉遂鼔而過歴行郡邑深幽之處莫不必到親録囚徒多所明舉吏人希見使者人懷喜恱又曰楊秉遷任城相自爲刺史二千石計日受俸餘禄不入私門故吏齎錢百萬遺之閉門不受以廉㓗稱又曰謝夷吾爲荆州刺史第五倫薦之曰受牧荆州威行郡國奉法作政有周邵之風居儉履約紹公儀之後㝷功簡能爲外臺之表聽聲察實爲九伯之冠也續漢書曰种暠爲益州刺史在職三年宣恩逺夷開暁殊俗岷山雜落皆懷服漢德其白狼槃木諸國自前刺史卒後遂絶暠至乃復向化時永昌太守鑄黄金爲文蛇以獻梁冀暠紏發追捕馳傳上言冀由是衘怒又曰周舉爲并州刺史太原舊俗以介子推焚骸有龍忌之禁輒一月寒食莫敢煙㸑老少不堪歲歲多死者舉旣到州乃作弔書以置子推之廟言盛冬去火殘損人命非賢者之意以宣示愚民使還温食謝承後漢書曰陳留百里嵩字景山爲徐州刺史境遭旱嵩行部傳車所經甘雨輙霔東海金郷祝其兩縣僻在山間嵩傳駟不徃二縣不得雨父老干請嵩曲路到二縣入界即雨又曰巴祗字敬祖爲楊州刺史在官不迎妻子俸禄不使有餘積毀壞不復改易以水澡傅墨用之夜與士對坐暗中不燃官燭又曰弟五種遷兖州刺史中常侍單超兄子匡爲濟隂太守負勢貪放種欲収舉未知所使㑹聞從事衛羽素抗直乃召羽具告之曰聞公不畏強禦今欲相委以重事若之何對曰願庶幾於一割羽出遂馳到定陶閉門収匡賔客親吏四十餘人六七日中紏發其贓五六十萬種即奏匡并以劾超魏志曰劉馥字元頴沛國相人也太祖方有袁紹之難謂馥可任以東南之事遂表爲楊州刺史馥旣受命單馬造合肥空城建立州治南懷緒等皆安集之貢獻相繼南懷緒數年恩化大行百姓樂其政流民越江山而歸者以萬數於是聚諸生立學校廣屯田興治芍陂及茄陂七門吴塘以漑稻田官民有稸陂塘之利至今爲用又曰徐邈爲涼州刺史進善黜惡風化大行百姓歸心焉西域通流荒戎入貢皆邈勲也又曰田豫護匈奴中郎將領并州刺史聞其威名相率來獻州界寧肅百姓懷之又曰陳㤗爲并州刺史懷柔民夷甚有威惠京邑貴人多寄寳化因泰市奴婢泰皆挂之於壁不發其封及徴爲尚書悉以還之又曰梁習字子虞爲并州刺史政治常爲天下最太和二年徴拜大司農習在州二十餘年而居處貧窮無方面珍物明帝異之禮賜甚厚又曰王昶字文舒太原晉陽人也遷兖州刺史明帝即位加揚烈將軍賜爵關内侯昶雖在外任心存朝廷以爲魏承秦漢之弊法制苛碎不大釐改國典以准先王之風而望治化復興不可得也乃著治論略依古制而合於時務者二十餘篇又曰司馬㓪字伯逹河内温人也遷兖州刺史政化大行百姓稱之雖在軍旅常惡衣惡食以儉率下魏略云裴潜爲兖州時甞作一胡牀及去留以挂柱吴志曰吕岱爲交州刺史歴年不餉家妻子飢乏孫權聞之歎息以讓羣臣曰吕岱出身萬里爲國勤事家内困而孤不早知股肱耳目其責安在於是加賜錢米絹布歲有常限晉書曰杜元凱爲荆州人號爲杜父舊水道唯㳂漢逹江陵千數百里君乃開陽口起夏水導洪洞逹巴陵徑近千里南土美而謡曰後世無叛由杜翁孰識知名與勇功又曰吴隠之爲廣州州界有貪泉父老云飲此水使廉士變貪隱之先至水酌而飲之賦詩曰古人云此水一飲重千金若使夷齊飲終當不易心王隱晉書曰華軼爲江州刺史得江表之歡心流亡之士赴之如歸時天子孤危四方瓦解軼有匡天下之志毎遣貢獻入洛不失臣節謂使者曰若洛都道斷可輸之琅耶王以明吾之爲司馬氏也又曰山濤爲冀州刺史冀州舊名尅俗略無人士自濤居州捜求賢才旌命所知三十餘人皆顯名當世冀州之士於是爲盛晉陽秋曰劉弘字和季與晉世祖同年居同里以舊恩屢登顯位弘爲荆州刺史值王室多難得專命一方盡其器能推誠御下厲以公義毎有發手書郡國丁寧𣢾宻故莫不感恱顛倒奔赴咸曰得公一紙書賢於十部從事也曹嘉之晉紀云羊曁爲青州刺史曁牛産犢及遷以官舎所生遺之而去晉中興書曰禇裒字季野河南人也弱冠譙國桓彛見而之曰禇季野有皮裏陽秋裒女即獻后也徴拜侍中遷尚書裒以后父苦求外出除江州刺史莅政貞素毎崇清約常使私僮樵採晉桓伊字叔夏譙國人湛隱有武幹又善音律爲中興第一遷都督江州荆州十郡豫州四郡軍事江州刺史伊到鎮以邊境無虞冝以寛恤爲務乃上䟽江州虚耗加連歲不登冝併合小縣除諸郡逋米州治冝還豫章詔荅移州潯陽其餘皆聽伊隨冝拯撫甚得南土清和宋書曰陸徴爲益州刺史䘏隱有方威惠兼著冦盗静息民物殷阜蜀士安恱至今稱之齊書曰臨川王映爲雍州刺史甞至錢還都買物有獻計者於江陵買貨至都廻換可得微有所増映笑曰我是賈客耶乃復求利又曰王琨爲廣州刺史南土沃實在任者常致巨富世謂廣州刺史但經城門一過便得三千萬也琨無所取納表獻禄俸之半州鎮舊有皷吹又啓翰還及罷任孝武知其清問還資多少琨曰臣買宅百三十萬餘物稱之帝恱其對梁書曰安成康王秀都督雍梁南北泰四州諸軍事雍州刺史有疾百姓啇賈咸爲請命旣薨四州裂裳爲曰帽哀哭送之又曰夏侯亶字丗龍弟夔字季龍並任豫州人歌曰我之有州頻仍夏侯前兄後弟布政優優又曰王神念爲青冀二州刺史神念性剛正所更州郡必禁止淫祠時青冀州東北有石鹿山臨海先有神廟妖巫欺惑百姓逺近祈禱縻費極多及神念至使令毀徹風俗遂改太平御覽卷第二百五十六
