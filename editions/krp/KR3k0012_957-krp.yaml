front:
  text: 太平御覽卷第九百五十七木部六
  hash: sha256:fd257b4529a2942b39c3050b05691cd770bdf327589cda152493e2725409787a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_957-1a}
body:
  text: 楊柳下桂杉楓豫樟楊柳下齊書曰阮孝緒建武末青溪宫東門無故自崩大風拔東宫門外楊樹以問孝緒曰青溪皇家舊宅齊爲木東爲木位今東門自壞木其衰矣齊書曰劉俊之爲益州刺史獻蜀柳數株條甚長狀若絲縷武帝植於太昌靈和殿前常翫嗟曰此楊柳風流可愛似張緒當時見賞如此又曰何點性好事聞陸惠曉與張融並宅其間有池池上有二柳樹點歎曰此池便是醴泉此樹便是交讓隋書曰柳機字當時𥘉機在周與族人文成公昻俱歷顯要及此機昻並爲外職楊素時爲納言方用事因上賜宴素戲機曰二栁俱摧孤楊獨聳坐者歡笑機竟無言又曰周𥘉有童謡曰白楊樹頭金雞鳴秪有阿舅無外甥静帝隋氏之甥旣遜位而崩諸舅強盛又曰渤海公髙潁少明敏有器局多渉書史尤善詞令𥘉孩孺時家有栁樹髙百許尺亭亭如蓋里中父老曰此家當出貴人唐書曰司稼卿梁孝仁髙宗時監造蓬萊宫於諸庭院列種白楊將軍契苾何力鐵勒之渠率也於宫内縱觀孝仁指白楊云此木易長三數年間宫中可得䕃映何力一無所應但誦古詩白楊多悲風蕭蕭愁殺人意謂此是塚墓間木非宫中所冝種孝仁遽令柭去更樹梧桐又曰乾元中􅉑州刺史王竒光奏閿郷縣界女媧墳天寳十三載大雨晦暝失所在至今河上側近忽聞雷風聲暁見墳踴出上有雙柳樹下有巨石柳各髙丈餘畫圖進上以示百官又曰吕渭爲禮部侍郎中書省有柳樹建中末枯死興元元年車駕還京其樹再榮人謂之瑞栁以爲賦題上聞而惡之渭因入閣遺失請託文記遂出爲潭州刺史又曰吐蕃土風寒苦物産貧薄所部邏婆川唯有楊柳人以爲資更無草木又曰范希朝鎮振武單于城中舊少樹希朝於他處市柳子命軍人種之至今成林居人頼之春秋後語曰魏哀王以田需爲相需音須甚貴信之惠子謂田需曰子必善事左右今夫樹楊横之則生折而樹之又生戰國䇿曰夫楊横樹之亦生倒樹之亦生說不同故存之也然使十人樹楊一人枝之則無生楊矣夫以十人之衆樹易生之物不勝一人拔者何也樹之難去之易今子雖自樹於王而欲去子者衆則必危矣戰國䇿又載戰國䇿曰楚有養由基者善射楊葉百歩而射之百發百中管子曰五沃之土冝柳莊子曰支離叔觀於冥泊之丘崑崙之墟黄帝之所休俄而柳生其左肘孟子謂告子曰性猶𣏌柳義猶杯棬丘貟切許慎淮南子注曰展禽之家有柳樹身行恵德因號柳下惠一曰邑名抱朴子曰夫木槿楊柳斷殖之更生倒之亦生横之亦生生之易者莫若斯木山海經曰廆山之西有谷焉名均雚谷其木多柳鳯伯之山熊山直陵之山木多柳平丘山爰有楊柳沃民之國有白柳崔豹古今注曰白楊葉圎青楊葉長柳葉亦長細栘時題切楊圎葉弱帶微風則大揺一名髙飛一曰獨摇蒲柳生水邊葉似青楊亦曰蒲楊亦曰栘柳亦曰蒲栘焉水楊即蒲楊也枝勁韌音刃任矢用又有赤楊霜降則葉赤林理亦赤也說文曰楊蒲栁也從木易聲檉河柳也從木聖聲柳小楊也從木夘聲續捜神記曰上虞魏全家在縣北忽有一人着孝服皂笠手巾掩口來詣全家語云君有錢一千萬銅器亦如之大栁樹錢在其下取錢當得耳於君家大不吉僕㝷爲君取於此便去自你出三十年遂不復來全亦不取錢盛弘之荆州記曰縁城堤邊悉植細柳絲條散風清隂交陌三齊略記曰鬲城東南有蒲臺髙八丈始皇所頓處在臺下縈馬至今蒲生猶榮似水楊而堪爲箭孔氏志恠曰㑹稽盛逸甞晨興路未有行人見門内栁樹上有一人長二尺餘朱衣冠冕俯以舌舐樹葉上露良乆忽見逸神意如有驚遽即隱不見丗說曰顧恱之與晉簡文帝同年恱之早白帝問卿何以先老對曰蒲柳之姿望秋而落松栢之質隆冬轉茂廣五行記曰周宣帝大定二年永州得白石剖而爲兩叚中有楊樹之形黄根紫葉廣志曰白楊一名髙飛木葉大於柳崔寔四民月令曰三月三日以及上除採栁絮栁絮愈瘡夲草經曰栁華一名栁絮夢書曰楊爲使者魏文帝栁賦曰昔上與袁紹戰於官渡是時余始植斯柳在余年之二七植斯柳乎中庭始圍寸而髙尺今連拱而九成曹植柳頌曰余以閑暇駕言出遊過友人楊德祖之家視其屋宇寥廓庭中有一柳樹戲刋其枝葉故著斯文桂爾雅曰梫音侵木桂今南人呼桂皮厚者爲木桂桂樹葉似枇杷而大白花花而不着子藂生巖嶺枝葉冬夏長青間無雜木禮斗威儀曰君乗金而王其政訟平芳桂常生春秋運斗樞曰椒桂生合剛陽椒桂陽星之精所生也合猶連體而生也春秋潜潭巴曰宫桂鳴下土諸侯號有聲桂好木植於宫中猶天子封有聲譽者爲諸侯今乃鳴是乃成其聲名於下土之祥山海經曰招揺之山臨乎西海其上多桂桂長丈餘味辛臯塗之山上多桂木桂林八樹在賁隅東八樹成言大也春秋後語曰蘇秦在楚三年乃得見談卒辤行威王曰寡人聞先生若聞古人今先生不逺千里而臨寡人曽不肯留願聞其說蘇秦對曰楚國之食貴於玉薪貴於桂謁者難得見於鬼王難得見於帝今令臣食玉炊桂因鬼見帝何事不去威王曰先生就舎寡人聞命矣漢書陸賈傳曰尉佗獻桂蠧二器桂樹蠧蟲也晉書曰郄詵遷雍州刺史武帝於東堂㑹送問詵曰卿自以爲何如詵對曰臣舉賢良對䇿爲天下第一猶㕁林之一枝崑山之片玉唐書曰垂拱四年三月有月桂子降於台州經十餘日乃止又曰南中有泉流出山洞常帶桂葉好事因謂爲流桂泉後人乃立棟宇爲漢髙之神莊子曰桂可食故斧伐之抱朴子曰桂可以葱涕合蒸作水可以竹瀝合餌之亦可以先知君腦和服之七年能歩行水上長生不死淮南子曰月中有桂樹郭子横洞冥記曰武帝使董謁乗琅霞之輦以昇壇至三更西王母駕玄鸞之輿至壇之四面列種軟條青桂風至枝自拂階上遊塵㝷陽記曰廬山上有三石梁長數十丈廣不盈尺杳然無底吴猛將弟子登山過此梁見一翁坐桂樹下以玉杯承甘露漿與猛廣志曰桂出合浦而生必以髙山之顚冬夏常青類自爲林間無雜樹交阯置桂園列仙傳曰范蠡好食桂賣藥世人徃徃見之神仙傳曰離婁公服竹汁餌桂得仙許由巢父箕山得石丹沙石桂英服之闞子曰魯人有好釣者以桂爲餌黄金爲鈎拾遺記曰岱輿一名浮折北有玉梁千丈駕玄流之上岸旁有丹桂黒紫白可爲舟丗說曰客問陳季方曰君家有何功德而荷天下重名曰吾家君譬如桂樹生泰山之阿上有萬仞之髙下有不測之深上爲甘露所霑下爲川泉所潤當斯之時樹焉知太山之髙川泉之深不知有功德歟金樓子曰夫翠飾羽而體分象羙牙而身䘮􅑕懷珠而致剖蘭含香而遭焚膏以明而遂煎桂以蠧而成疾羅浮山記曰羅山頂有桂山海經所謂賁隅之桂賁隅番隅也臨海記曰白石之山望之如雪山有湖傳云金鵝之所集八桂之所植說文曰桂江南之木百藥之長地理記曰桂陽郡有桂嶺放花遍白林嶺盡香又曰天台山有八桂嶺襟漢武帝悼李夫人賦曰氣沉潜以悽戾兮桂枝落而銷亡漢淮南王安好道感八公共登山攀桂樹安作詩曰攀桂樹兮聊淹留唐景龍文館記曰薫風殿其材木皆用青桂白檀香氣氛氲盈於四逺杉爾雅曰披音彼煔煔或作杉似松生江南可以爲舡及棺材作桂理之不腐也晉咸康起居注曰侍御史秦武奏平陵前道東杉樹一株萎死以栢栽𥙷之請収陵令推劾西京雜記曰太液池中有小池名孤樹池池中有一洲洲上有煔樹一株十餘圍望之如車蓋故取名之鄧德明南康記曰巘山有漢太傳陳蕃墓遥望兩杉樹聳柯出嶺垂隂覆谷劉欣期交州記曰合浦東二百里有一杉樹葉落隨風入洛陽城内漢時善相者云此休徴當出王者故遣千人伐樹役夫多死三百人坐斷株上食過足相容名山志曰華子崗上杉千仞𬒳在崖側楓爾雅曰楓攝攝之葉反天風則鳴故曰攝又樹似白楊葉圎而歧有脂而香今之楓香是後周書曰武帝天和元年秋七月辛丑梁州上言鳯凰集於楓樹羣鳥列侍以萬數山海經曰黄帝殺蚩尤弃其械化爲楓樹金樓子曰楓脂千歳爲虎魄名山記曰天姥山上長楓千餘丈肅肅臨澗水晉宫閣名曰華林園楓香三株南方草木狀曰楓香樹子大如鳥卵二月花色乃連着子八九月熟曝乾可燒唯九眞郡有之異苑曰鳥傷陳氏有女未醮着屐徑上大楓樹顚更危闇顧曰我應爲神今便長去唯左蒼右黃當蹔歸耳家人悉出見之舉手辭訣於是飄聳輕越極睇乃没旣不了蒼黃之意毎春輙以蒼狗秋以黃犬設祀於樹下任昉述異記曰南中有楓子鬼楓木之老者爲人形亦呼爲靈楓嶺表録異曰楓人嶺多楓樹樹老則有瘤癭忽一夜遇暴雷驟雨其樹贅則暗長三數尺南中謂之楓人越巫云取之雕刻神鬼易致靈驗離騷招魂曰湛湛江水上有楓目極千里傷春心豫章左傳昭公曰白公作亂殺子西子期子期曰昔者吾以力事君不可不終抉豫章以殺人而後死陳書曰侯景之平也太極殿𬒳焚承聖中議欲營之獨闕一柱七月有樟木大十八圍長四丈五尺流泊陶家後渚監軍鄒子慶以聞詔書令沈衆兼起部尚書搆太極殿莊子曰騰猿得豫章攬蔓而王長於其間便也淮南子曰䉫藿之生蠕蠕然曰加數寸不可以爲櫨棟加猶益也攎屋也楩柟豫章之生也七年而後知故可以爲棺舟髙士傳曰堯聘許由爲九州長由惡聞洗耳於河巢父見謂之曰豫章之木生於髙山工雖巧而不能得子避世何不藏深地理志曰豫章郡城南有樟樹長數十丈立郡因以爲名至晉永嘉年間尚茂廣志曰豫章生七年外始辨凢木似豫章故待七年當分别神異經曰東方有豫章樹髙千丈有士操斧行斫行合新語曰賢者之處丗猶金石生於沙中豫章産於幽谷水經曰豫章城之南西門曰松楊門門内有樟樹髙七丈五尺大二十五圍枝葉扶䟽垂䕃數畒應劭漢官儀曰豫章郡樹生庭中故以名郡矣此樹常中枯逮晉永嘉中一旦更茂豐蔚如𥘉咸以爲中宗之徴祥也豫章記曰新塗懸封谿有聶友所用樟木戕柯者遂生爲樹今猶存其木合抱始倒植之今枝條皆垂下任昉述異記曰豫章之爲木也生七年而後可知漢武寳鼎二年立豫樟宫於昆明池中作豫樟木殿太平御覽卷第九百五十七
