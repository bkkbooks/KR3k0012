front:
  text: 太平御覽卷第三百二十八兵部五十九
  hash: sha256:f316087a2fc9e3e369559236c1c5fbae3cf17c96dc7d05f0f1630f7605a34f47
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_328-1a}
body:
  text: 從軍羽書占候詩曰伯也執殳爲王前驅自伯之東首如飛蓬豈無膏沐誰適爲容又曰鳵羽刺君子下從征役不得養父母也肅肅鳵羽集于苞栩王事靡盬不遑啓處漢書張良曰良性多病未嘗持兵將常爲畫䇿臣時從行後漢書曰周嘉字惠文仕郡爲主簿王莽未群盗入汝陽嘉從太守何敞討賊爲流矢所中賊圍十重白刃交集嘉以身捍之曰嘉請以死贖君命後太守㓂恂舉爲孝廉拜侍郎引見問遭難之事詔嘉尚公主嘉稱疾不肯當梁書曰曹景宗爲竟陵太守及帝起兵景帝聚族并率五服内子弟三百人從軍後魏書曰張衮字洪龍上谷沮陽人也好學有文才太祖爲代王選爲左長史决䇿幃幄太祖器之禮遇優厚又曰韓茂從討平凉當茂所衝莫不應弦而殪由是丗祖壯之又曰張衮從太祖破賀訥登勿居山聚石爲峰以記功徳命衮爲文又曰豆代田從討平凉擊破赫連定得奚斤等世祖以定妻賜之詔斤膝行授酒於代田勑斤曰全尓命者代田功也進爵長廣公隋書曰郭榮遼東之役以功進位左光禄大夫明年帝復事遼東榮以爲中國疲敝万乗不冝屢動乃言於帝曰戎狄失禮臣下之事臣聞千鈞之弩不爲鼷䑕發機豈有親辱大駕以臨小㓂帝不納復從軍攻遼東城榮親蒙矢石晝夜不釋甲胄王粲從軍詩曰下舡登髙防草露霑我衣廻身赴床寢此愁當告誰身服干戈事豈得念所私又曰從軍有苦樂但問所從誰所從神且武焉得乆勞師鮑明逺東武吟曰始隨張校尉召募到河源後逐李輕車追虜窮塞垣曹子建詩曰從軍度凾谷馳馬過西京嵇叔夜贈秀才入軍詩曰良馬旣閑麗服有輝風馳霓逝躡景追飛凌厲中原頋盻生姿陸機從軍行曰朝食不免胄夕息常負戈苦哉逺征人附心悲如何薛瑩荅華永先詩曰桴鼔常在側筆研永欲捐卷衮不復開干戈以爲權劉義恭擬古詩曰束甲辝京洛負戈事烏孫後軍齊太河築壘黎陽屯旦聞羽檄飛夕見邊驛奔羽書史記曰齊使魯連爲書以箭射之遺燕將曰吾聞之知者不背時而弃利勇士不怯死而滅名忠臣不先身而後君忠廢名滅後代無稱非智也且吾聞效小莭者不能行大威悪小恥者不能立榮名昔管仲曹沬二公者非不能効小莭死小恥也以爲殺身絶代功名不立非智也故業與王覇争流名與天壤相弊公其圗之燕將自殺漢書髙紀曰武臣自立爲趙王沛令欲以沛應之恐有変欲誅蕭曹恐踰城保髙祖乃書帛射城中與沛父老父老乃殺沛令開門迎髙祖後漢書曰隗囂檄告州郡言王莽之罪楚越之竹不足以書其惡魏志曰閞羽圍行征南將軍曹仁於樊趙儼以議郎叅仁軍事儼謂軍將曰今賊猶盛我徒卒單少而仁隅絶不得同力前軍逼圍遣謀通仁使知外救以勵將士然後表裏俱發破楚必矣諸將皆喜便作地道射箭飛書與仁消息晉書曰𥘉安南將軍甘卓與左將軍隋王承書勸使固守當以兵出沔口断王敦歸路則湘圍自解承荅其書略曰足下若能卷甲電赴猶或有濟若其狐疑求我枯魚之肆矣梁後略曰己酉上自長沙寺移住天居寺是日北軍射書城内今者行兵不貪城隍土地不貪子女玉帛志存救弊濟此生民廣訪民人擇善而立梁朝士庶尚未相領解蟻聚窮城寂無求問㝷此異卜良用到惑又曰禇蘿率其下五百人乗大艦於鹿頭後湖以輝水戰北軍聚而觀蘿乃掉艦向岸北軍引去蘿亦廻歸上乃射書北軍大開賞募有能斬送賊帥者封五千户侯賜絹万疋占候孫子曰天者隂陽寒暑莭制也謂順天行誅因隂陽四時剛柔之制故司馬法日冬夏不興師所以兼受愛吾人若細雨沐軍臨機必有捷廻風相觸道還而無功雲類羊群必走之道氣如驚鹿必敗之勢黒雲出壘赤氣臨軍皆敗之兆若烟非煙此慶雲也必勝若霧非霧是泣軍也必敗是知風雲之占其來乆矣孫子占曰三軍將行其旌旗從容以向前是爲天送必亟擊之得其大將三軍將行其旍旗墊音店然若雨是謂天霑其師失三軍將行旍旗乱於上東西南北無所主方其軍不還三軍將陣雨甚是爲浴師勿用陣戰三軍將戰有雲其上而赤勿用陣先陣戰者莫復其迹三軍方行大風飄起於軍前右周絶軍其將亡右周中其師得粮左傳曰晉侯圍上陽問於卜偃曰何時克之對曰童謡云丙子之辰龍尾伏辰均服振振取􅉑之旗鶉之賁賁天䇿焞焞火中成軍􅉑公其奔其九月十月之交乎韓詩外傳曰武王伐紂到刑兵軛折爲三天雨三日不休武王懼召太公而問之曰紂未可伐乎太公曰不然軛折爲三者軍當分爲三也天雨三日者欲洒吾兵也後漢書曰韓遂屯羙陽董卓與戰輙不利十一月夜有流星如火光長十餘丈照遂營中馿馬盡鳴賊以爲不祥欲歸金城卓聞之喜明日乃與右扶風鮑鴻等并兵俱攻大破之斬首數千級又曰王㝷王邑攻南陽積弩乱發矢下如雨城中負户而汲王鳯等乞降不許㝷邑自以爲功在漏刻意氣甚逸夜有流星墜營中晝有雲氣如壞山當營而隕不及尺而散吏士皆厭伏續漢志曰雲如壞山所謂營頭之星也占曰營頭之所墜其下覆軍殺將血流千里厭音一業反晉書載記曰劉曜咸和三年曜夢三人金靣丹脣東向逡廵不言而退曜拜而履其跡旦召公卿巳下議之朝臣咸賀以爲吉祥唯太史令任義進曰三者歴運統之極也人爲震位王者之始次也金爲兊位物衰落也脣丹不言事之畢也逡廵揖讓退舎之道也爲拜者屈伏於人履跡而行愼勿出壃也東井秦分也五車趙分也秦兵必暴起亡主衆師留敗趙地逺至三年近至七百日應不逺願陛下思而防之曜大懼又曰石季龍攻張重華謝艾拒之艾建牙旗盟將士有西北風吹旌東南指日風爲令今旗指之天所賛也破之必矣軍次神鳥王擢與前鋒戰敗遁還河南還討叛虜斯骨眞万餘落破之又天文志曰水與金合爲變謀爲兵夏入太白中上出破軍殺將又曰元興年八月庚子太白犯歳星在上將又曰永興二年四月丙子太白犯狼星占曰大兵起九月歳星守東井占曰有兵井又秦分野是年苟師破公師蕃張方破苑陽王虓關西諸將攻河間王顒奔走東海王迎殺之永和十四年十二月慕容儁遂據臨漳盡有幽并青兾之地縁河諸將奔散河津隔絶又曰戊子月犯牽牛大星占曰牽牛天將也又曰義熈十四年十月癸巳熒惑入太微犯西蕃上將乃順行至左振門又曰辰星甞出不出是謂擊卒兵大起在於房心間地動又曰凢有蝕五星其國皆止歳以飢熒惑以亂鎭以弑太白以強國戰辰星以女亂又曰辰星不出太白爲客其出太白爲主出而與太白不相從乃各出一方爲格野雖有軍不戰隋書曰長孫晟以邊功授上開府儀同三司復遣還大利安撫新附仁壽元年晟表奏曰臣夜登城樓望見磧北有赤氣長百餘里皆如雨足下垂𬒳地謹驗兵書此名灑血其下之國必且破亡欲滅匈奴冝在今日詔楊素爲行軍元帥晟爲受降使者北伐二年軍次北河值賊帥思力侯斤等領兵拒戰與大將軍梁黙擊走之轉戰六十餘里賊衆多降唐書曰武徳中淮南道行臺僕射輔公祏據丹陽反遣趙郡王恭爲行軍元帥討之將發與諸將宴集命取水忽變爲血在座中皆失色恭舉止自若諭之曰禍福無門唯人自召自頋無負於物諸君何憂懼之深公祏惡積禍盈今承廟筭以致討盆中之血乃公祏授首之徴遂盡歡而罷時人服其識度而能安衆竟平公祏焉又曰李晟之將復京師也時熒惑守歳乆之方退賔介或勸晟曰今熒惑巳退皇家之利也可速出兵晟曰天子外次人臣當死節垂象玄逺吾安知天道至是謂叅佐曰前者公勸晟出兵非敢拒也且軍士可用之不可使知之甞聞五緯盈縮無准懼復來守歳則我軍不戰而自潰矣叅佐歎服皆非所及也㝷拜晟爲司徒兼中書令三國典略曰十一月癸未梁主閱戎干津陽門外立二城南爲呉地北爲虜城西北風甚急溥天昬暗幡旗南靡乃移虜軍度南城呉軍度北城以順風也俄而驟雨暴降梁王輕輦還宫至城而霽觀者怪之又曰太原郡王髙洋督兵攻王思政䧟于潁川遂入東魏先是長社夜有聲如車騎從西北向城居二日黒風起於乹地吹水入城城壞風羊角而上又曰侯瑱敗王琳于梁山琳及蕭莊並奔于齊𥘉東關水舟艦得通琳引合肥之衆相次而下瑱與琳合戰琳軍少却退保西岸及夕東北風大起吹其舟艦没于沙中夜有流星墜於琳營及旦風静琳入浦脩舡以鹿角繞岸不敢復出六韜曰周武王伐紂師至泥水牛頭山風雨甚疾鼔旗毀折王之驂乗惶震而死太公曰用兵者順天道未必吉逆之不必凶若失人事三軍敗亡且天道鬼神視之不見聽之不聞智將不發而愚將拘之若乃好賢而能用舉事而得此則不看時曰而事利不暇卜筮而事吉不禱祝而福從遂命駈之前進周公曰今時逆太歳龜灼凶卜筮不吉星變爲災請還師太公怒曰今紂刳比干囚箕子以飛廉爲政伐之有何不可枯草朽骨安可知乎乃焚龜折蓍援抱而鼔率衆先渉河武王從之遂滅紂又曰從孤擊虚髙人無餘一女子當百夫風鳴氣者賊存在十里鳴條百里揺技四百里雨霑衣裳者謂潤兵不霑者謂泣兵金噐自鳴及焦氣者軍疲也又曰武王使散冝生卜伐殷鑚龜龜不兆下占於地數蓍蓍交而折祖行之日雨輜軍至􅎮行至之日幟折爲三冝王曰二四凶不祥不可舉事太公進曰退非子之所及也聖人生天地之間承衰亂而起龜者枯骨蓍者折草何足以辯吉凶祖行之日雨輜車至􅎮是洗濯甲兵也行之日幟旗爲三是軍分爲三如此斬紂之首吉也抱朴子曰晉太康二年京邑始亂三國舉兵攻長沙王人小民張昌反於荆州奉劉尼爲漢主乃遣石水擊定楊州屯於建業宋道衝說冰求爲丹陽太守到郡發兵以攻冰召余爲貯兵都尉余年二十一見軍旅不得巳而就之宋侯不用吾計數敗吾令宋侯從月建住華盖下遂収合餘燼從吾計破石冰焉又曰凢戰觀雲如走鹿形者敗軍之氣也兵法秘訣曰鎭星所在之宿其國不可伐又彗星見大明臣下縱撗民流亡無所食父子坐離夫婦不相得四維有流星前如瓮後如火光竟天如雷聲名曰天狗其下飢荒民疾疫群臣死流星東北行名天岡天海之口必有大水土功又四維有流星入以後有白氣如雲狀似車輪是謂齧食其下大兵中國多盗賊又有星如鬪見北斗名爲旬始天下大亂諸侯争雄玄女兵法曰凢行兵之道天地大寳得者全勝失者必負北斗之中禽有旬始狀像雄雞制百兵之母能得其術何神不使九地九天各有表裏三竒六合王威軍事又曰黄帝攻蚩尤三年城不下募求術士乃得伍骨與之言曰今日余攻蚩尤三年城不下與咎安在伍骨曰此城中之將爲人必白色商音帝始攻時得無以秋之東方行乎今皇帝爲人蒼色角音此雄軍也以戰爲之黄帝曰善爲之若何伍骨曰臣請攻蚩尤三日城必下黄帝大喜其中黄直日帝積三年攻蚩尤而城不下今予欲以三日下之何以爲明伍骨曰不如臣言請以軍法論黄帝曰子欲以何時臣請朱雀之日日正中時立赤色徴音絳衣之軍于南方以輔角軍臣請以青龍之日平旦時立青色角音青衣之軍于東方以輔羽軍臣請以玄武之日人定時立黒色羽音黒衣之將于北方以輔啇軍臣請以白虎之日日入時立白色啇音白衣之將于西方以輔宫軍四將以立臣請爲帝以黄龍之日日中建黄旗於中央以制四方五軍巳具四靣攻蚩尤三日其城果下黄帝即封骨丗丗不絶又曰戰闘不法當從九天之上擊九地之下衆士黙黙人無見者九天者春在青龍夏在朱雀秋在白虎冬在玄武四神爲九天其衝爲九地星占曰太白出髙用兵深入敢戰者吉星出東方中國大利蠻夷大敗兵書曰氣聚如龍如鵠尾者其下軍兵破敗也太平御覽卷第三百二十八
