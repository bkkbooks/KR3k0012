front:
  text: 太平御覽卷第六百一
  hash: sha256:8e39155c70f314524387b53d7d870289ad23c50beabe34f5559a6fd807a14235
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_601-1a}
body:
  text: 文部十七著書上張華博物志曰聖人制作曰經賢者著述曰傳史記太史公自序曰夫詩書隱約者欲遂其志之思也昔西伯拘於羑里演周易孔子厄陳蔡作春秋屈原放逐著離騷左丘明失明厥有國語孫子臏脚而論兵法此人皆意有所鬱結其不得通道也漢書曰公孫弘著公孫子言刑名謂字直百金也又曰淮南王安爲人好書鼓琴不喜弋獵狗馬馳騁招致賔客方術之士數千人作爲内書二十一篇外書甚衆又有中篇八卷言神仙黄白之術亦二十餘萬言𥘉安入朝獻所作内篇新出上愛祕之使爲離騷傳師古曰傳謂解說之若毛詩傳旦受詔日食時上又曰陸賈在髙祖前時時稱說詩書帝罵之曰乃公馬上得之賈曰寜可以馬上治乎湯武逆取而順守之文武並用乆長之術也帝乃令賈著古今成敗之書名曰新語每奏一篇帝未嘗不稱善又曰董仲舒作玉杯繁露清明竹林之書曲臺后倉之書禮射之書又曰王莽傳大司馬護軍褒奏言安漢公遭子宇䧟於管蔡之辜愛至深爲帝室故不敢顧私唯宇遭罪喟然憤發作書八篇誡子宇子孫冝班郡國令學官以教授請令天下吏能誦公誡者以著官薄比孝經師古曰著官者言用之得選舉也後漢書曰梁竦以經書自娯著書數篇名曰七序班固見而稱之曰昔孔子作春秋而賊臣亂子懼梁竦作七序而竊位素飡者慙又曰王充好論說始詭異終有理實以爲俗儒守文多失其真乃閉門潜思絶慶弔之禮戸牗墻壁各置刀筆著論衡八十五篇二十餘萬言後漢書列傳曰荀恱字仲豫儉之子恱志在獻替而謀無所用乃作申監五篇其所論辯通見政體旣成而奏之帝覽而善焉帝好典籍常以班固漢書文繁難省乃令依左氏傳體以爲漢紀詔尚書給筆札辭約事詳論辯多美晉書曰于寳性好隂陽術數留思京房夏侯勝等傳寳父先有所寵侍婢母甚妬忌及亡母乃生埋婢於墓中寳兄弟年少不知審也後十餘年母䘮開墓而婢伏棺如生載還經日乃蘇言其父常取飲食與之恩情如生家中吉凶輙語之考校悉驗地中亦不覺爲惡旣而嫁之生子又寳兄嘗病氣絶積日不冷後遂悟見天地間鬼神事如夢覺不自知死寳以此遂撰集古今神祇靈異人物變化名爲捜神記凢三十卷以示劉惔惔曰卿可謂鬼之董狐也于寳表曰臣前聊欲撰記古今怪異非常之事㑹聚散逸使同一貫博訪知之者片𥿄殘鈌事事各畢又曰孫盛著晉陽秋詞直而理正咸稱良史焉旣而桓温見之怒謂盛子曰枋頭誠爲失利何至乃如尊君所說其子遽拜謝曰請刪定之時盛年老還家性方嚴有軌憲雖子孫班白而庭訓愈峻至此諸子乃共號泣稽顙請爲百口計盛大怒諸子遂尓改之盛冩定兩本寄於慕容雋㤗元中孝武帝博求異聞始於遼東得之以相考校多有不同書遂兩存又曰曹志植之子也帝嘗閱六代論問志曰是卿先王所作耶志對曰先王有手所作自録請歸㝷案還奏曰案録無此帝曰誰作志曰以臣所聞是臣族父所作以先王文髙名著欲令書傳於後是以假託帝曰古來亦有是頋謂公卿曰父子證明足以爲審自今巳後可無復疑又曰王長文字德叡廣漢郪人也少以才學知名而放蕩不羈州府辟命皆不就州辟別駕乃微服竊出舉州莫知之後於成都市中蹲踞齧胡餅刺史知其不出屈禮遣之閉門自守不交人事著書四卷擬易名曰通玄經有文言卦象可用卜筮時人比之楊雄太玄同郡馬秀曰楊雄作太玄唯桓譚以爲必傳後丗晚遭陸績玄道遂明長文通玄經未遭陸績君山耳又曰王隱字處叔太興𥘉典章稍備乃召隱及郭璞俱爲著作郎令撰晉史著作郎虞預私撰晉書而生長東南不知中朝事數訪於隱并借隱所著書竊冩之所聞漸廣是後更嫉隱形于言色預旣豪族交結權貴共爲朋黨以斥隱竟以謗免黜歸于家貧无資用書遂不就乃依征西將軍庾亮供其𥿄筆書乃得成詣闕上之隱雖好著述而文辭鄙拙蕪舛不倫其書次弟可觀者皆其父所撰文體混雜義不可解者隱之作也宋書曰王淮之字元魯晉尚書僕射彬玄孫也曽祖彪之位尚書令博聞多見練悉朝儀自是家丗並記江左舊事緘之有青箱丗謂之王氏青箱學又曰髙平郄紹作晉中興書數以示何法盛法盛有意圖之謂紹曰卿名位貴逹不復俟此延譽我寒士無聞於時如袁宏于寳之徒頼有著述流聲於後冝以爲惠紹不與至書成在齋内厨中法盛詣紹紹不在直入竊書紹還失之无復兼本於是遂行何書齊春秋曰王儉字仲寳以四部衆書盈溢机閣自劉歆七略以來應更區別乃著七志上之時人以比相如封禪焉梁書曰武帝取鍾王真迹授周興嗣令選不重復者千字韻而文之興嗣一宿即上鬢髪皆白大𬒳賞遇後興嗣目疾武帝親爲之合藥又曰劉勰字彦和自齊入梁撰文心雕龍五十篇論古今文體其序畧云予齒在逾立嘗夜夢執丹􅃮之禮器隨仲尼而南行寤而喜曰大哉聖人之難見也乃小子之垂夢歟自生靈巳來未有如夫子者也敷讃聖旨莫若注經而馬鄭諸儒弘之巳精唯文章之用實經典之條枝五禮資之以成文六典因之以致用由是搦筆和墨乃始論文其爲文用四十九篇而巳旣成未爲時流所稱勰欲取定於沈約无由自逹乃負書候約於車前狀若欲貨鬻者約取讀大重之謂深得文理常陳諸几案後周書曰齊王憲嘗以古今兵書繁廣難求指要乃自列定爲五篇表陳髙祖覽而稱善陳書曰陸瓊字伯玉呉人𥘉瓊父雲公奉武帝勑撰嘉瑞記瓊述其旨而續焉三國典畧曰齊主如晉陽尚書右僕射祖珽等上言昔魏文帝命韋誕諸人撰著皇覽包括羣言區分義別陛下聽覽餘日眷言緗素究蘭臺之籍窮䇿府之文以爲觀書貴慱愽而貴要省曰兼功期於易簡前者脩文殿令臣等討㝷舊典撰録斯書謹罄庸短登即編次放天地之數爲五十部象乾坤之䇿成三百六十卷昔漢丗諸儒集論經傳奏之白虎閣因名白虎通竊縁斯義仍曰脩文殿御覽今繕冩巳畢并目上呈伏願天鑒賜垂裁覽齊主命付史閣𥘉齊武成令宋士素録古來帝王言行要事三卷名爲御覽置於齊主巾箱陽休之創意取芳林遍畧加十六國春秋六經拾遺録魏史第書以士素所撰之名稱爲玄洲苑御覽後改爲聖壽堂御覽至是珽等又改爲脩文殿上之徐之才謂人曰此可謂床上之床屋下之屋也三國典畧齊魏収以子姪少年湏誡厲遂著枕中篇以訓之隋書曰杜臺卿嘗採月令觸類而廣之爲書名玉燭寳典十二卷奏之臺卿患聾不堪吏職請脩國史上許之拜著作郎國朝傳記曰虞丗南之爲祕書也於省後堂集羣書中事可爲文用者號爲北堂書鈔今北堂猶存而書益行於代唐書曰太宗以特進魏徴所撰類禮賜皇太子及諸王并藏本於祕府𥘉徴以禮經遭秦滅學戴聖所編條流不次乃刪其所記以類相從爲五十篇合二十卷太宗善之賜物一千叚又曰太宗閱陸德明經典音義美其弘益學者歎曰德明雖亡此書可傳習因賜其家布帛百疋又曰髙宗時太子賢敗太子洗馬劉訥言給事中唐之竒並坐私附庶人配流嶺外訥言博學有文詞以漢書授賢賢甚重之嘗撰續排諧集十五卷賢覽之以爲笑樂及賢廢宫中捜得之上怒曰經典誘人猶恐不能遷善排諧鄙說是導之以邪也遂徙于震州而死又曰天后聖曆中上以御覽及文思博要等書聚事多未周備令麟臺監張昌宗與麟臺少監李嶠廣召文學之士給事中徐彦伯水部郎中貟半千等二十六人増損文思博要勒成一千三百卷於舊書外更加佛教道教及親屬姓氏方域等部至是畢功上親製名曰三教珠英彦伯巳下改官加級賜物又曰天后自咸亨巳後嘗召文學之士周思茂范履氷等入禁中令撰玄鑒百卷青宮要紀少陽政各三十卷孝子傳及列女傳維城典訓鳯樓新誡各二十卷古今内百卷樂書要録十卷百寮新誡五卷垂拱格四卷臣䡄二卷兆人夲業五卷又有文集一百二十卷並藏於祕閣又曰劉允濟善屬文與絳州王勃齊名採摭魯哀公後十二代至于戰國遺事撰魯後春秋一十卷表上之遷左右史又曰許叔牙嘗撰毛詩纂義十卷以進太子賜帛二百叚兼令冩夲付司經局其後御史大夫髙智周謂人曰凢欲言詩者必湏先讀此書始可也又曰大曆中刑部尚書顔真卿以陸法言切韻未弘乃纂九經子史字義著韻海鏡源三百六十卷獻之詔下祕閣及集賢書院貯之又曰馮伉爲醴泉縣令患百姓多猾爲著論䝉十四篇大略指明忠孝仁義勸學務農毎郷給壹卷俾其傳習在縣七年韋渠牟薦爲給事中充皇太子及諸王侍讀召見於別殿賜金紫著三傳異同三卷又曰貞元十三年韓譚進統載三十卷其書採虞夏以來至于周隋録其事跡善於始終者六百六十八人爲立傳又曰路隋爲侍講學士採三代皇王興衰著六經法言二十卷奏之旋拜諌議大夫依前侍講學士將脩憲宗實録復命兼充史職又曰貞元十一年左僕射平章事賈躭進海内華夷圖及古今郡國縣道四十卷圖廣三丈率以寸折成百里權德輿作序又曰韋處厚爲中書舎人侍講學士時穆宗荒恣不親政務旣居納誨之地冝有以啓導情虚乃銓擇經義雅言以類相從爲二十卷謂之六經法言獻之錫以繒帛又曰唐次貶開州刺史在巴峽間十餘年不獲進用西川節度使韋臯抗表請爲副使德宗宻諭臯令罷之次滯蠻荒孤心抑鬰怨謗所積孰與申明乃採自古忠臣賢士遭罹讒謗放逐遂至殺身而君猶不悟其書三篇謂之辨謗略上之德宗省之猶怒謂左右曰唐次乃以吾爲昏主何自諭如此次卒章武帝明哲嫉惡尤惡人朋比傾䧟甞閱書禁中得次所上書三篇覽而善之謂學士沈傳師曰唐次所集辨謗之書實君人者時冝觀之朕思古書中多有此事次編録未盡卿家傳史學以類例廣之傳師奉詔與令狐楚杜元穎等分功脩續廣爲十卷號元和辨謗畧又曰鄭處誨方雅好古勤於著述撰集至多爲校書郎時撰次明皇雜録三篇行於丗又曰裴潾充集賢殿學士集歴代文章續梁昭明太子文選成三十卷目曰大和通選并音義目一卷上之當時文士非素與潾遊者其文章少在其選時論薄之又曰栁玭嘗著書誡其子弟曰夫門地髙者可畏不可恃可畏者立身行巳一事有墜先訓則罪大於它人雖生可以茍取名位死何以見祖先於地下不可恃者門髙則自驕族盛則人之所嫉實蓺懿行人未必信纎瑕微累十手争指矣又數其五條詞多不載御覽卷第六百一
