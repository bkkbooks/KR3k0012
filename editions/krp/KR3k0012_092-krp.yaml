front:
  text: 太平御覽卷第九十二皇王部十七
  hash: sha256:926ed55721d6200adb699e039df8b431294233c352eed614205abf13b982ce4d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_092-1a}
body:
  text: 後漢敬宗孝順皇帝孝冲皇帝孝質皇帝威宗孝桓皇帝孝靈皇帝廢帝弘農王孝獻皇帝敬宗孝順皇帝東觀漢記曰孝順皇帝諱保孝安長子也母早薨追謚恭愍皇后上㓜有簡厚之質體有敦慤之性寛仁温惠始入小學誦孝經章句和熹皇后甚嘉之以爲冝奉大統年六歳永寜元年爲皇太子受業尚書兼資敏逹𥘉乳母王男厨監邴吉爲大長秋江京中常侍樊豐等所譛愬京懼有後害遂共搆太子太子坐廢爲濟隂王安帝崩北郷侯即尊位王廢絀不得上殿臨棺而悲哀泣血不下飡粥北郷侯薨車騎閻顯等議前不用濟隂王今用怨人白閻太后復徴諸王子閉門發兵中黄門孫程等十九人共討賊臣以迎濟隂王於徳陽殿西鍾下即皇帝位漢安元年八月遣侍中杜喬光禄大夫周舉等八人分行州郡頒宣風化舉實臧否建康元年八月帝崩于玉堂前殿在位十九年時年三十遺詔無起寢廟衣以故服珠玉玩好皆不得下務爲節約葬憲陵廟曰敬宗續漢書曰帝爲太子四歳避疾當阿母王聖弟新治乳母王男厨監邴吉以爲犯土忌不可御與江京樊豐及聖二女永等相是非聖永誣譛男吉皆物故太子思戀男等數爲之歎息聖永懼有後害遂與京豐等共構太子坐廢爲王孝冲皇帝東觀漢記曰孝冲皇帝諱炳順帝之少子也年三歳是時皇太子數不幸國副未定有司上言冝建聖嗣建康元年四月立爲太子順帝崩太子即帝位尊皇后梁氏爲皇太后帝㓜弱太后臨朝永熹元年正月帝崩于玉堂前殿在位一年葬懐陵帝王世紀曰孝冲皇帝即位一年年三歳孝質皇帝東觀漢記曰孝質皇帝諱纉章帝玄孫千乗貞王之曽孫也樂安王孫渤海王子也年八歳茂質純淑好學尊師有聞於郡國孝冲帝崩徵封建平侯即皇帝位夲𥘉元年閏六月帝崩于玉堂前殿在位一年時方九歳葬靜陵漢晉春秋曰帝𥘉年㓜小聞梁兾專權於天下每朝岀輙目之曰此跋扈將軍兾聞而大懼遂隂行鴆毒始病呼太尉李固入固前問病帝曰食煑餅令膓中悶得水尚可活兾曰不可語未絶而崩威宗孝桓皇帝東觀漢記曰孝桓皇帝諱志章帝曽孫河間孝王孫蠡吾侯翼之長子也母曰匽音匽夫人年十四襲爵始入有殊於人梁大后欲以女弟妃之太𥘉元年四月徴詣雒陽旣至未及成禮㑹質帝崩無嗣太后宻使瞻察威儀才明任奉宗廟遂與兄兾定䇿於禁中迎帝即位時年十五改元建和元年大將軍梁兾輔政縱横爲亂帝與中常侍單超等五人共謀誅之於是封超等爲五侯五侯暴恣日甚毒流天下白馬令李雲坐直諌誅名臣少府李膺等並爲閹人所譛誣爲黨人下獄死在位二十一年崩年三十六薛瑩漢記賛曰漢徳之衰有自來矣而桓帝繼之以淫暴封殖官竪群妖滿側姦黨彌興賢良𬒳辜政荒民散亡徵漸積逮至靈帝遂傾四海豈不痛哉左傳曰國於天地有與立焉不數世淫不能弊也信矣孝靈皇帝續漢書曰孝靈皇帝諱宏章帝玄孫河間孝王曽孫解瀆亭侯淑之孫萇之子也母曰董姬萇薨上襲爵爲侯永康元年十二月桓帝崩先是數有皇子夭昬不遂太后與父竇武定䇿禁中建寕元年正月徴到止夏門亭以王青蓋車迎入于殿即皇帝位太后臨朝四年正月帝加元服光和元年𥘉置鴻都門生本頗以經學相引後試能爲尺牘辭賦及以王書鳥篆相課試至千人皆尺一勑州郡三公舉用辟召或典州郡入爲尚書侍中封侯賜爵四年於後宫與宫人爲列肆販賣使相偷盗爭鬪上臨視以爲樂又於西園令狗帶綬著進賢冠中平元年𥘉賣官自關内侯以下至虎賁羽林入錢各有差二年収天下田畝十錢以治宫殿發太原河東豫道林木黄門常侍斷截州郡送林文石掌主史譴呼不中退賣之貴戚因縁賤買十倍入官其貴戚所入者然後得中宫室連年不成州郡因増加調發刺史二千石遷除皆責助治宫錢大郡至二千万諸詔所徴皆令西園騶宻約勑號曰中使恐動州郡多受財賂天下騷動起爲盗賊矣是歲又於西園造萬金堂以爲私藏別司農金錢繒帛積之於中又還河間買田業起弟觀上本侯家居貧即位常曰桓帝不能作官家曽無私錢故爲私藏復寄小黄門常侍家錢至數千万又云張常侍是我翁趙常侍是我母由是宦官專朝日盛奢僣無度各起弟宅擬則宫室上甞登永安候臺黃門常侍惡其登髙臺見居處樓殿乃使中大夫尚坦諌曰天子不當登髙登髙則百姓虚自後遂不復登臺榭矣四年又募買關内侯假金紫入錢五百萬六年四月帝崩于嘉徳殿在位二十二年時年三十四葬文陵續漢書五行志曰靈帝好胡服帳胡床胡飯胡箜篌笛胡儛京都貴戚皆競爲之其後董卓多縱胡兵虜掠夜發掘園陵帝又於宫中西園駕四白驢躬自操轡駈馳周旋以爲大樂於是公卿貴戚轉相倣効至相謀奪驢價與馬齊獻帝春秋曰𥘉黄巾賊起靈帝建九重華蓋自稱無上將軍身𬒳介胄講兵京城先是造作角錢猶五銖而有四道連於籩輪百姓有識者以爲妖徵竊言新錢有四道京城將壞而此錢四出散於四方之外乎遂皆如言薛瑩漢記賛曰漢氏中興至于延平而世業損矣冲質短祚孝桓無嗣母后稱制姧臣執政孝靈以支庶而登至尊由藩侯而紹皇統不恤宗緒不祗天命上虧三光之明下傷億兆之望于時爵服横流官以賄成自公侯卿士降於皂隷遷官襲級無不以貨刑戮無辜摧仆忠賢佞䛕在側直言不聞是以賢智退而窮處忠良擯於下位遂至姧邪蜂起法防隳壞夷狄並侵盗賊糜沸小者帶城邑大者連州郡編户騷動人人思亂當斯之時已無天子矣㑹靈帝即世則禍㝷其後宫室焚滅郊社無主危自上起覃及華夏使京室爲墟海内蕭條豈不痛哉典略曰建寜二年帝年時十三歳宦官用事排疾士人熹平四年五月帝自造皇義五十章光和五年帝幸太學自就石碑作賦廢帝弘農王獻帝春秋曰孝靈皇帝何皇后生太子辯帝數失子不敢正名養于道人史子眇家號曰史侯後漢書曰中平六年四月丙辰靈帝崩于南宫嘉徳殿戊午皇子辯即皇帝位年十七太后臨朝八月中常侍叚珪等殺大將軍何進於是虎賁中郎將袁術燒東西宫攻諸宦者庚午張讓叚珪等刧少帝及陳留王幸北宫司隷校尉袁紹勒兵収僞司隷校尉樊陵及諸閹人無少長皆斬之讓珪等復刧少帝陳留王走小平津尚書盧植追讓珪等斬之其餘投河而死帝與陳留王協夜歩逐螢火光行數里得民家露車共乗之還宫九月董卓廢帝爲弘農王英雄記曰董卓在顯陽苑請官僚共議欲有廢立謂袁紹曰劉氏之種不足復遺袁紹曰漢家君天下四百許年恩澤深渥兆民戴之恐衆不從公議卓曰天下之事豈不在我我今爲之誰敢不從紹曰天下健者不唯董公紹請立觀之横刀長揖而去坐中皆驚愕時卓新至見紹大家故不敢害之卓於是遂䇿廢皇太后遷之永安宫其夜崩廢皇帝史侯爲弘農王立陳留王爲皇帝卓聞東方州郡謀欲舉兵恐其以弘農王爲主乃置王閣上荐之以棘召王太傅責問之曰弘農王病困何故不白遂遣兵迫守太醫致藥即日弘農王及妃唐氏皆薨袁山松後漢書曰董卓使弘農郎中令李孝儒進鴆於弘農王曰服此辟惡王曰此必是毒也弗肯強之於是王與唐姬及宫人共飲酒王自歌曰天道易兮我何艱棄萬乗兮退守藩逆臣見迫兮命不延逝將棄爾兮適幽玄唐姬起舞歌曰皇天崩兮后土頽身爲帝王兮命夭摧死生路畢兮從此乖悼我焭獨兮中心哀因泣下坐者嘘欷不自勝王謂唐姬曰卿故王者妃勢不復爲吏民妻也行矣自愛從此長辭遂鴆死孝獻皇帝續漢書曰孝獻皇帝諱恊靈帝少子也母曰王羙人何皇后妬而害之靈帝母永樂太后董氏収養焉故號董侯中平六年四月靈帝崩太子辯即尊位年㓜皇太后詔封上爲渤海王七月徙封陳留王九月董卓廢天子立陳留王是日即皇帝位年九歳董卓秉政𥘉平元年二月天子自雒陽遷都長安興平元年正月帝加元服二年十月上自長安東遷建安元年七月至雒陽八月上自雒陽遷都於許二十五年十月上禪位於魏魏王即帝位對上爲山陽公青龍二年三月薨以天子禮葬禪陵獻帝春秋曰袁紹將兵入宫誅諸黄門張讓等逼迫以尺一詔開大夏門將帝及陳留王出不知所如有螢火照道到􅉀津河上傳國六璽不及自隨百僚分散唯河南中部掾閔貢見天子出率騎追之比暁到河上天子飢渇貢宰羊進之厲聲謂讓曰今不速死吾射殺汝讓等惶怖又手再拜叩頭向天子辭曰臣等死陛下自愛遂投河而死貢扶輦還宫時董卓適至屯顯陽苑聞帝當至率兵迎帝於北邙帝見卓兵振喜不自勝羣公曰有詔却兵卓曰卿爲大臣不能匡輔國朝至令㓜主蒙塵播越何却兵之有遂俱入城帝幸北宫改年號曰昭寧於閣上得六璽失傳國璽又曰興平元年蝗虫起百姓飢穀一斛五六萬錢帝勑主者盡賣厩馬二百餘疋及御府雜繒二萬疋賜公卿巳下及貧民車騎將軍李􅔸不聽盡取以置其邸李􅔸郭汜有隙􅔸使兄子副車中郎將李進勒兵數千統宫使虎賁王曹等三百人以軺車三乗載帝及㐲后幸􅔸營又迎宫人公卿家屬入塢移御府諸署繒綵珍寳上方在廐車馬乗輿器物盡置其邸放兵燒府庫及居民𬒳害者不可勝數五月或欲轉乗輿幸黄白城帝不肯司徒趙温以帝當東歸而􅔸等方亂以忠節責􅔸􅔸怒欲斬温􅔸從弟上軍校尉維故温掾請諫乃止於是閉温與帝同門設反關校尉以監察之十一月車駕東幸到黄卷亭庚午乗輿到弘農張濟欲與董承楊奉交質而留乗輿承奉不肯白帝東行到澗中濟郭汜放兵欲留車駕承奉力戰乗輿得過公卿婦女衣服悉見鈔奪不解帶便斫㓨寒凍死者不可勝計天子得過路次曹陽乗輿到安邑十二月使侍中史跱直里切太僕韓融奉詔詔張濟悉遣宫人公卿以下婦女及乗輿服物車馬諸見略者皆詣安邑建安元年七月乗輿到洛幸城西故中常侍趙忠舎百官𬒳荆棘依故丘墟間侍郎以下皆出葬采四方州郡各擁強兵莫有至者曹操白帝遷都許庚申車駕出洛轘轅而東陽奉韓暹引軍追之輕騎旣至曹操設伏兵要於陽城山峽中大敗之九月車駕到許幸曹操營設有司營宗廟社稷自帝西遷朝廷傾覆王制節度於是始建漢晉陽秋曰獻帝都許守位而巳宿衛近侍莫非曹氏黨舊恩戚議郎趙彦甞爲帝陳言時䇿曹操惡而殺之其餘内外多見誅操後以事入見殿中帝不任其忿因曰君能相輔則厚不爾幸垂恩相捨操失色俛仰求出舊儀三公輔兵入朝令虎賁執刃挾之操頋左右汗流洽背自後不敢復朝請袁山松後漢書曰獻帝﨑嶇危亂之間飄薄萬里之衢萍流蓬轉嶮岨備經自古帝王未之有也觀其天性慈愛弱而神惠若輔之以徳真守文令主也曹氏始於勤王終至䧟天遂力制群雄負鼎而趨然因其利器假而不反廻山倒海遂移天日昔田常假湯武而殺君操因堯舜而竊國所乗不同濟其盗賊之身一也善乎莊生之言竊鈎者誅竊國者爲諸侯之門仁義在焉信矣范曄後漢論曰傳稱鼎之爲器雖小而重故神之所寳不可奪移至今負而趨者斯亦窮運之歸乎天猒漢徳乆矣山陽其何誅焉太平御覽卷第九十二
