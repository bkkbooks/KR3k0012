front:
  text: 太平衘覽卷第一百七十九
  hash: sha256:05e8ee2686bbbf6d10094443c80ac449c709c5bdb7b1eb2351bfeac837f1c7e3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_179-1a}
body:
  text: 居處部七闕觀闕崔豹古今注曰闕觀也於前所以標表宫門也其上可居登之可逺觀人臣將朝至此則思其所闕故謂之闕其上皆畫雲氣仙靈竒禽恠獸以示四方蒼龍白虎玄武朱雀並畫其形釋名曰觀於上觀望也廣志曰闕缺也門兩邊缺然爲道也周禮太宰以正月懸治法於象魏禮記曰昔者仲尼與於蜡賔事畢遊于觀之上喟然而嘆仲尼之歎蓋歎魯也鄭玄云觀闕也左傳曰哀公三年司鐸火踰公宫季桓子至命藏象魏曰舊章不可忘也象魏闕也法令懸之故謂其書爲象魏又曰哀十七年傳云衛侯夢于北宫見人登昆吾之觀注云衛有觀在古昆吾氏之墟也今濮陽城公羊昭二十五年傳云子家駒曰諸侯僣於天子大夫僣於諸侯乆矣昭公曰吾何僭矣哉子家駒曰設兩觀乗大輅注云禮天子諸侯內闕一觀也又定二年傳云夏五月壬辰雉門及兩觀災兩觀微也然則曷爲不言雉門災及兩觀主災者兩觀也漢書曰䍧牱郡有桂浦闕又曰蓬萊方丈瀛洲此三山在海中諸仙人不死藥皆在焉黄金白銀爲闕事具仙部又曰建章宫東鳯闕髙二十丈列女傳曰衛靈公與夫人夜坐聞有車聲至闕而息過又聞車聲夫人曰此必是蘧伯玉公曰何以知之曰妾聞禮下公門軾路馬今蘧伯玉賢者也必不以暗昧廢禮公令人視之果如所言神異經曰東南有石井其方百丈上有二石闕俠東南面上有蹲熊有榜着闕題曰地户西北荒中有金闕髙百丈上有明月珠徑三丈光照千里中有金階西北入兩闕中名天門十洲記曰崑崙山有水精闕水經曰秦孝公築兾闕臨渭水在咸陽西四十里闕中記曰未央宫東有青龍闕北有玄武闕漢書所謂北闕者也建章宫圎闕臨北道鳯在上故號曰鳯闕也閶闔門内東出有折風闕一名别風瀬郷記曰老子廟前有兩石闕大闕髙九尺八寸下三重石鹿闕邊各有子闕山謙之丹陽記曰大興中議者皆言漢司徙許彧墓闕可從施之王茂弘弗欲後陪乗出宣陽門南望牛頭山兩峯曰天闕也豈煩改作帝然之鄧徳明南康記曰南康縣歸美山去縣七百里下有石城髙數丈逺望嵯峨靈闕騰空故老謂之神闕莊子中山公子牟謂瞻子曰身在滄海之上心居魏闕之下奈何瞻子曰重生重生則輕利中山公子曰雖知之未能自勝也瞻子曰不能自勝則從神無惡乎不能自勝而強不從者此之謂重陽重陽人無壽類矣魏文帝歌曰長安城西有雙貟闕上有雙銅雀一鳴五糓生載鳴五榖熟王子年拾遺記曰崑崙第九層山形漸狹小下有芝田蕙囿皆有數百湏羣仙種耨焉傍有瑶臺十二各廣千歩皆五色玉爲臺基最下層有流精闕直上四十丈有風雲雨師闕觀漢書成紀云孝成帝元太子也母曰王皇后帝在太子家生甲觀畫堂應劭注云甲觀在太子宫甲地主用乳生也顔師古曰畫堂但畫飾室中宫殿通有綵畫也又曰甘露二年幸萯陽宫在鄠屬玉觀属玉水鳥似鵁鶄以名觀也後漢書曰丁鴻字孝公肅宗詔鴻與廣平王羡及諸儒樓望成封桓郁賈逵等論定五經同異於北宫立白虎觀廣平王羡明帝子東觀記曰與太常樓望少府成封屯騎校尉桓郁衛士令賈逵等集義白虎門名於門立觀因以名焉使五官中郎將魏應主承制問難侍中淳于恭奏上帝親制臨决鴻以才論最明儒者稱之帝數嗟美焉時人歎曰殿中無雙丁孝公又章帝紀曰永平元年長水校尉儵奏言先帝大業當以時施行欲使諸儒共正經義頗令學者得以自助於是下太常將軍大夫博士議郎郎官及諸王諸儒㑹白虎觀講議五經同異又曰時謂東觀爲老氏藏室注老子爲柱下史四方所記文書皆歸于柱下言東觀多經籍又曰髙彪除郎中校書東觀後遷外黄令畫彪形像以勸學者又曰靈帝起四百尺觀於河亮道造萬金堂於西園又造南宫玉堂築廣城苑魏志曰明帝作凌霄觀始構有鵠巢其上侍中髙堂隆曰起闕而鵠巢不得居之象又曰明帝置崇文觀徴善屬文者以充之吴志孫和傳云和爲太子𬒳廢驃騎將軍朱據尚書僕射屈晃率諸將吏泥首自縛連日詣闕請和權登白爵觀見甚惡之蜀志云李輔字玄政爲牙門討破羗虜築平羗觀于秦亭晉書元紀曰太興元年十一月乙夘日夜出髙三丈中有赤青珥詔曰天災譴誡所以彰朕之不徳也羣公卿士各上封事具陳得失無所諱將親覽焉新作聽訟觀又劉曜載記曰曜立太學於長樂宫東簡百姓年二十五巳下十三巳上五百人選朝賢宿儒明經篤學以教之命起酆明觀西宫建凌霄臺於滈池又曰石季龍載記云太子宣出時季龍於其後宫昇凌霄觀望之笑曰我家父子如是自非天崩地䧟當復何愁但抱子弄孫日爲樂耳又張駿傳云駿境内漸平使其將楊宣帥衆越流沙伐龜兹鄯善於是西域並降鄯善王元孟獻女號曰美人立賔遐觀以處之齊書王儉傳云宋明帝太始六年置㹅明觀以集學士或謂之東觀置東觀祭酒一人㹅明訪舉二人儒玄史四科科置學士十人其餘吏下各有差是歳省㹅明觀於儉宅開學士館以㹅明簿書充之陳書後主紀云帝令采木湘州擬造正寢栰至牛渚機盡没旣而漁人見栰於海上復起齊雲觀國人歌曰齊雲觀㓂來無際畔後魏書髙祖紀下云十五年五月議改律令於東明觀親折疑獄又道武帝紀云天興三年起紫極殿玄武樓風涼觀石池鹿苑臺又匈奴劉聦傳云平陽地震崇明觀䧟爲池水赤如血赤氣至天赤龍奮迅而云輿地志云丹陽郡建康縣臺城齊文惠太子治玄圃有明月觀婉轉橋徘徊廊囿內作浄名精舎又曰丹陽郡枺陵縣新亭隴有逺望樓又名勞勞樓末改爲臨滄觀行人分别之所又曰洛陽有廣望觀閬風觀萬世觀脩靈觀臨啇觀百葉抄魏築惣章觀建翔鳯於其上使八方才人六宫女尚書居之引糓水過九龍殿前玉井綺欄水轉百戯又曰石虎起靈臺九殿女官十有八等又女妓一千爲鹵簿皆着紫綸巾熟錦袴金銀鏤帶五文織成靴遊於戯馬觀漢封禪儀泰山東南有山名日觀鷄一鳴時見日始出長三丈秦觀者望見長安吴觀者望見㑹稽周觀者望見齊三輔黄圖云漢武帝起鳷鵲觀又起神明觀馺娑觀甘泉苑起仙人觀縁山谷行至雲陽三百八十里入右扶風周迴五百四十里又曰武帝起鳷鵲觀神明觀弩法觀集靈觀仙門觀陽禄觀漢宫殿名曰長安有臨山觀渭橋觀仙人觀霸昌觀蘭池觀平樂觀九華觀豫章觀鴻雀觀昆明觀走馬觀華光觀封巒觀走狗觀天梯觀瑶臺觀流渠觀相思觀長平觀冝春觀華池觀射熊觀迎風觀露寒觀當市觀石闕觀白渠觀鼎郊觀潘丘山闕中記云鼎郊觀在上林苑白虎觀懷徳觀三雀觀林木觀温徳觀長平觀華延雋洛陽記曰洛陽城十八觀皆施玄檻鐵籠䟽雲母愰華山記曰南嶺東巖北面有二小山一山有雙石竪立號曰石門一山孤崖特秀上有客觀陟之者逺眺千里阮勝之楊州記云楊子縣有楊子宫宫中有玄珠觀華陽國志云蜀城有逸客觀華延携洛中記云金墉城西南角有昌都觀東北有百尺樓魏都水使者陳熈造建康宫闕簿云啇飈觀在東北十三里籬門亭後亭墩上齊武帝築九日登以晏群臣又曰曽城觀在縣東北七里景雲樓東齊武帝起七月七日夜令宫人登以穿針因曰穿針樓又曰通天觀在縣東北五里一百歩舊臺城内宋元喜中築𬞞圃二十三年更修廣之築池汨天泉造景陽樓大壯觀花光殿設射堋又立鳯光殿醴泉堂又曰洛陽宫中有玄覽觀東汜觀清覽觀髙平觀廣望觀聽松觀見親觀髙樂觀陵雲緫章宣曲萬年等觀又云建業宫有迎風觀在縣南十五里宋武大明中起於石子墩上孫峻殺諸葛恪殷綝殺朱主皆於此又有徼道觀晉潘岳關中記曰柘觀虎圈觀昆池觀上䕡觀朗池觀走馬觀湯禄觀觀則陽觀隂徳觀並在上林苑中陸機洛陽地記曰洛陽南宫有承風觀洛陽北宫有増喜觀洛陽城外有宣楊觀千秋鴻池泉城楊威石樓等觀又曰洛陽城外有鼎中觀輿地志云洛陽西南洛水上有鼎中觀是成王定鼎處唐韋述東京雜記曰東京紫微宫有一柱觀又曰上陽宫有上清觀潘安仁西征賦云圖萬載而不傾奄摧落於十紀擢百尋之曽觀兮今數仞之餘趾左太冲吴都賦云慮紫宫以營室廓廣庭之漫漫寒暑隔闊於邃宇虹蜺回帶於雲觀何平叔景福殿賦云於是碣以髙昌崇觀表以建城峻廬岧嶤岑立崔嵬巒居宋玉髙唐賦序云昔者楚襄王與宋玉遊於雲夢之臺望髙唐之觀魏陳思王七啓曰閑宫顯敞雲屋皓􆇴崇景山之髙基迎清風而立觀沈休文鍾山詩應西陽王教云即事旣多美臨眺殊復竒南瞻儲胥觀西望昆明池沈休文遊沈道士館詩云旣表祈年觀復立望仙宫謝玄暉觀朝雨詩云朔風吹飛雨蕭條江上來旣灑百常觀復集九成臺太平御覽卷第一百七十九
