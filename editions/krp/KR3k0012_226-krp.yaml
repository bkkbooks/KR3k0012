front:
  text: 太平御覽卷第二百二十六職官部二十四
  hash: sha256:62b3eec7af23c6cc75b46a1ef873641bb19bfac806623eee3d70d3133ebd81c5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_226-1a}
body:
  text: 御史中丞下持書侍御史御史中丞下晉書曰熊逺字孝文遷御史中丞中宗每歎其公忠謂逺曰卿在朝政正色不茹柔吐剛忠亮至勁可謂王臣又曰庾峻字山甫爲御史中丞優而不剋又曰周處字子隱爲御史中丞奏征虜將軍石崇大將軍梁王彤等正䋲直筆權豪震肅又曰劉暾他昆切字長升兼中丞奏免尚書僕射等十餘人朝廷嘉之遂以即眞謝靈運晉書曰漢官尚書爲中臺御史爲憲臺謁者爲外臺是爲三臺自漢罷御史大夫而憲臺猶置以丞爲臺主中丞是也晉中興書曰王恬字元逾音俞爲御史中丞值海西公廢太宗即位未解嚴大司馬桓温屯中堂夜吹警角恬奏劾温大不敬請理罪明日温見奏事歎曰此児乃敢彈我眞可畏也又曰熊逺遷御史中丞尚書郎盧綝入直逢尚書刀恊於大司馬門外恊醉使綝避之綝以當直不肯廻恊令人牽綝墮馬至恊車前而後釋逺奏請免恊官詔令白衣領職又曰劉瑀音雨遷御史中丞瑀氣尚人爲憲司甚得志彈蕭惠開云非才非望非勲非地彈王僧逺云廕籍髙華人品冗末朝士莫不畏其筆端又曰蕭惠開拜御史丗祖與劉季之詔曰今以蕭惠開爲憲司兾當稱職但往一服額巳自殊有所震及在任百寮畏憚之八年入爲侍中詔曰惠開前任憲奉法繩不阿權戚朕甚嘉之可更授御史中丞又曰鄭鮮之遷御史中丞明憲直繩甚得直司之體外甥毅權重當時朝廷莫不歸附鮮之盡心髙祖獨不屈意毅甚恨焉又曰荀伯子爲御史中丞莅職勤恪有匪躬之稱立朝正色内外憚之凡所奏劾莫不深相呵毀或延及祖宗其言切直又頗雜嘲戯故丗人以此非之齊書曰王僧處遷御史中丞甲族由來多不居憲職王氏分枝居烏衣者位官微咸僧處爲此官乃曰此是烏衣諸郎坐處我亦可試爲耳又曰江淹爲御史中丞明帝作相謂淹曰君昔在尚書中非公事不妄行在官寛猛能析衷今爲南司足以震肅百寮也曰今日之事可謂當官而行更恐不足仰稱明旨耳於是彈中書令謝朏音斐司徒左長史王綪音茜護軍長史庾弘逺並以託疾不預山陵公事又奏収前益州刺史劉悛梁州刺史隂智伯並贓貨巨萬輙収付廷尉臨海太守沈昭略永嘉太守庾曇隆及諸郡二千石并大縣官長多𬒳劾内外肅然明帝謂曰自宋巳來不復有嚴明中丞君今日可謂近世獨歩梁書曰樂藹遷御史中丞𥘉藹發江陵無故於舡得八車輻如中丞徤歩避道者至是果遷焉又曰王僧孺兼御史中丞僧孺㓜貧其母鬻紗布以自業擕僧孺至市道遇中丞鹵簿駈迫墜溝中及是拜日引騶清道悲感不自勝頃之即眞後魏書曰李彪爲中尉號爲嚴酷以姦欵難得乃爲木手擊其脇腋氣絶而後属者時有汾州叛胡得其兇渠皆鞭靣煞之及彪之病也體上瘡濆痛毒備極又曰李彪遷御史中尉彪爲髙祖所寵性又剛直遂多所彈糺逺近畏之豪右屏氣髙祖嘗呼爲李生又從容謂群臣曰吾之有李生猶漢之有汲黯北齊書曰齊王髙澄用崔暹爲御史中尉宋遊道爲尚書左丞謂之曰卿一人處南臺一人處北省當使天下肅然又曰琅邪王儼字仁威武成第三子累爲御史中丞魏氏制中丞岀清道與皇太子分路行王公皆逕住車去牛頓車於地以侍中丞過其或違遟則赤棒棒之自都鄴後此儀寢絶武成欲雄寵儼乃使一依舊制𥘉從北宫出將上宫丞凢京畿歩騎領軍之官屬中丞之威儀司徒之鹵簿莫不畢備時儼惣領四職帝與胡后在華林園東門外張幕隔青紗歩幛觀之遣中使驟馬趣仗不得入自言奉勑赤棒應聲碎其鞍馬驚人墜帝大笑以爲善更勑令駐車傳語良乆觀者傾京邑陳書曰徐陵除散騎常侍御史中丞時安成王爲司空以帝弟之尊勢傾朝野直兵鮑僧叡假王威權抑塞辝訟大臣莫敢言者陵聞之乃爲奏彈導從南臺官属引奏案而入世祖見陵服章嚴肅若不可犯爲歛容正色坐陵進讀奏狀時安成王殿上侍立仰視世祖流汗失色陵遣殿中御史引王下殿遂劾免侍中中書監自此朝廷肅然隋書曰後魏延昌中王顯有寵於宣武御史中丞請革選衘史此後踵其事每一中尉更置御史自開皇後始自吏部選用依舊入直禁中唐書官品志曰中丞一人掌督司百僚皇太子巳下其在營門行行馬内違法者皆糺彈之雖在馬外而監司不乣亦得奏之專道而行逢尚書丞郎亦得停駐又曰張易之縱恣益撗嘗私引相工李引泰占吉㐫言渉不順御史中丞宋璟音冏請窮究其狀武太后曰易之等巳上聞璟曰謀反大逆無容首免易之等分外承恩臣知言出禍從然義激於心雖死不恨太后不恱内史姚璹音孰恐忤旨遽宣勑令出璟曰天顔咫尺親奉徳音不煩宰相擅宣王命太后意解及収易之等就獄尋詔原之命就宅謝罪璟拒而不見曰公事當公言之若私見法無私也又曰御史中丞姚庭筠奏稱律令格式懸之象魏奉而行之事無不理比見諸司寮寀不能遵守章程事無大小皆悉聞奏臣聞爲君者任臣爲臣者奉法故云汝爲君目將司明也則知萬機務綜不可徧覽也所以設官分職者委任責成百工惟時以成垂拱之化比者或修一水牎或伐一枯木並皆上聞旒扆取断宸衷豈代天理物至公之道也自今巳後若縁軍國大事及牒式無文者任奏取進旨自餘據章程合行者各令准法處分其故生疑滯致有稽失者請令御史隨事糺彈上從之又曰盧弈懷愼之少子也與兄奐音喚齊名天寳十一年爲御史中丞始懷愼及奐並爲此官父子三人爲中丞清節不易時人美之又曰齊映爲御史中丞從徳宗幸梁州每遇險映嘗執轡㑹上馬驚跳奔益甚上懼傷映令捨轡映堅執乆之乃止問其故對曰馬奔踶音弟不過傷臣如捨之或犯清塵雖臣萬死何以塞責上嘉歎無巳又曰御史中丞武元衡奏貞元二年御史中丞竇叅所奏凢諸使兼憲官者除元帥都統節度觀察都團練防禦等使餘並在本官之位其後蘇弁音卞于䪹音頋以度支郎中兼御史中丞鄧求以易州刺史兼御史大夫皆奉進旨令在同類之上伏以前後異同遵守不一臣謹議伏請自今常叅官兼御史大夫中丞者惟檢校省官立在本品同類之上從之又曰元和中御史中丞王播奏監察御史舊例在任二十五月轉准具貟不加今請仍舊殿中侍御史舊例在士二月轉准具貟加至十八月今請减至十五月侍御史舊例在任六月轉准具貟加十三月今請减至十月從之又曰文宗開成𥘉中丞狄兼謩謝官上曰御史中丞朝廷紀綱一臺理則朝廷理朝廷理則天下理無曠厥職兼謩奏曰凢天下有礙法不得中道事臣盡得以彈奏上曰大抵以顧望畏忌爲心者自失職業卿梁公之後將嗣家聲不可不留意又曰文宗謂宰臣曰丁居晦作中丞何如因悉數大臣而品第之歎曰宋申錫堪任此官惜哉又曰牛僧孺可爲大夫宰臣鄭覃曰湏爲中丞未嘗搏擊恐無風望上曰不然鸞鳯與鷹隼事異又曰居晦作此官朕曽以時諺謂杜甫李白軰爲四絶問居晦曰此非君上要知之事常以此記得居晦今所以擢爲中丞又曰㑹昌元年中書門下奏御史中丞爲大夫之貳縁大夫秩崇官不常置中丞常爲憲臺之長今寺監少卿少監司業少尹並爲寺置之貳皆爲四品中丞官名至重見秩未崇望升爲從四品從之又曰薛存誠爲給事中瓊林庫使奏召工徒大廣存誠以爲此者姦人竄名以避征徭不可許咸陽尉袁儋都甘切與軍鎭相競軍人無理遂肆侵誣儋反受罰二勑継至存誠皆執之上聞甚恱命中使嘉勞由是選拜御史中丞又曰孔緯爲御史中丞緯器志方雅嫉惡如讎旣揔憲綱中外不繩而自肅又曰盧坦爲御史中丞裴均爲僕射左班踰位請退之均不受坦曰姚南仲爲僕射例如此均曰南仲何人坦曰南仲是守正而不交權倖者尋罷爲右庶子時人歸咎於均三國典略曰梁張綰字孝卿雍州刺史績之第也梁主䇿其百事綰對闕其六乃號爲百六公常爲御史中丞兄績爲僕射元日朝㑹及百司就列兄弟並導騶兩塗前世未有時人榮之崔鴻十六國春秋前録曰叚凱驍勇善射好讀書爲御史中丞明筆直繩無所阿避號曰老虎傳咸集奏曰司隷中丞得糺太子而不得糺尚書臣所未譬朝廷無以易之梅陶自叙曰余居中丞曽以法鞭皇太子傳親友莫不致諌余笑而應之堂髙由陛下太子所以崇於上由吾奉王者法吾豈枉道曲媚後皇太子特見延請賜以請讌礼之如師袁淑謝中丞章曰竊惟此職昭賛實預損益必湏廉明威正刺骨窮文使權家勲族不敢藉強而侮物戚門右姓不得稱雄以掩衆昔傳咸卧治僚辟戢懼孫寳移疾卿尹皆怠持書御史漢書曰宣皇帝元鳯中路温舒上書宜尚徳緩刑帝深采覽之季秋後讞魚列反又音巘時帝幸宣室齊宫而决事命侍御史二人持書遂置持書御史通典曰御史中丞舊持書御史也國諱改焉後歴代皆同風俗通曰頃者廷尉多墻靣而苟充兹位持書侍御史不復平議讞當糺紛豈一事哉里語曰縣官漫漫冤死者半後漢書曰蔡邕以侍御史轉持書御史遷尚書三日之間周遷三臺續後漢書百官志曰持書御史秩百石掌選明法律者爲之天子疑獄以法律讞是非糺六品巳下桓帝以後不治獄充位而巳魏志曰王觀字偉臺東郡亶丘人也明帝幸許昌召觀爲治音持下同書侍御史典行臺獄時多倉卒喜怒而觀不阿音順旨晉書曰杜預爲鎭南入辭口啓陳壽才史通博冝𥙷黄散也黄黄門侍郎散散騎常侍上曰壽可作治書否預對曰唯在聖詔即手詔用之又曰太始四年置黄沙獄持書御史一人秩與中丞同掌詔獄及廷尉不當皆理之梁書曰謝幾卿天監𥘉除征虜鄱陽王記室尚書三公侍郎尋爲侍御史舊郎官傳爲職者世謂爲南奔幾卿頗失志多陳疾臺事略不復理從爲散騎侍郎後魏書曰髙道恱拜治書御史正巳當官亡憚彈強禦奏舉任城王王澄等免官髙祖詔褒美之隋書曰柳彧遷治書侍御史于時刺史多任武將類不稱職彧上表曰方今天下太平四海清謐共治百姓任其才昔漢光武一代明哲超自布衣備知情僞與二十八將披荆棘定天下及功成之後無所職任伏見詔書以上柱國和干子爲𣏌州刺史其人年垂八十鐘鳴漏盡前任趙州闇於職務政由羣小賄賂公行百姓吁嗟謌謡滿道乃云老禾不早殺餘種穢良田古人有云耕當問奴織當問婢此言各有所能也干子弓馬武用是其所長治民莅職非其所解至尊思治無忘興寢如謂優老尚年自可厚賜金帛若令刺舉所損殊大臣死而後巳敢不竭誠上善之干子竟免又曰梁毗爲持書侍御史時京師饑上令禁酒劉昉使妾任任縱也屋當鑪酤酒毗劾奏昉曰臣聞處貴則戒之以奢持滿則守之以約昉旣位列郡公秩髙庶尹縻爵稍乆厚禄巳淹正當戒滿歸盈監斯止足何乃規麴蘖之潤競錐刀之末身昵酒徒家爲逋藪若不糺繩何以肅厲有詔不治昉鬱鬱不得志又曰柳彧爲治書御史右僕射楊素當塗顯貴百寮慴憚無敢忤者嘗以少譴勑送南臺素恃貴坐彧牀彧從外來見素如此於階下端笏整容謂素曰奉勑治公之罪素遽下彧據案而坐立素於廷辨詰事狀素由是衘之唐書曰孫伏伽𥘉以三事上諌髙祖大恱擢拜治書侍御史兼賜帛三百疋時軍國多事賦歛繁重伏伽屢奏請改革舊政髙祖並納之因謂裴寂曰隋末無道上下相蒙主則驕矜臣唯謟佞上不聞過下不盡忠使社稷傾危身死疋夫之手朕撥乱反正志在安人平乱任武臣官方委文吏庶得各展器能以匡不逮此每虚心接待兾聞讜言然惟李綱差盡忠欵孫伏伽可謂誠直餘人猶踵弊風俛首而巳豈朕所望哉江緫贈孔中丞詩曰我行五嶺表辭郷二十年聞鸎欲動詠披霧即依然疇昔同寮宷今隨年代改借問蔵書處唯君故人在故人名官髙清簡肅權豪誰知懷九歎徒然泣二毛傳咸御史中丞箴叙曰百官之箴以箴王闕余承先君之蹤竊位憲臺懼有忝累垂翼之責且造斯箴以自勗勵不云自箴而云御史中丞箴者凢爲御史中丞欲通以箴之也詞曰煌煌天文衆星是環爰立執法其暉有煥執憲之綱秉國之憲鷹楊虎視肅清違慢蹇蹇匪躬是曰王臣旣直其道奚顧其身身之不顧孰有弗震邦國若否惟仲山甫是明焉用彼相莫扶其傾淮南構逆實憚汲生赫赫有國可無忠貞憂責有在繩亦必直良農耘穢勿使能植無禮是逐安惜翅翼喏爾庶寮各敬乃職無爲罰先無怙厥力怨及朋友無慙于色罪天子内省有恧音匿慙也是用作箴惟以自勑太平御覽卷第二百二十六
