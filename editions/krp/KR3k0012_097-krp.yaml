front:
  text: 太平御覽卷第九十七皇王部二十二
  hash: sha256:709f3e46d00bf2b832c7b8c09c6d7f04ed0573166462219ba104894291a321dc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_097-1a}
body:
  text: 西晉惠皇帝趙王倫附惠皇帝晉書曰孝惠帝諱衷字正度武帝第二子也太始三年立爲皇太子時年九歳太熈元年四月己酉武帝崩是日太子即皇帝位大赦改元爲永熈尊皇后楊氏曰皇太后立妃賈氏爲后以太尉楊駿爲太傅輔政秋八月壬午立廣陵王遹音聿爲皇太子以中書監何劭爲太子太師吏部尚書王戎爲太子太傅永平元年春正月詔改永熈二年爲永平元年又詔子弟及羣官並不得謁陵三月辛夘誅太傅楊駿駿弟衛將軍瑤太子太保濟中護軍張劭散騎常侍叚廣楊邈左軍劉禎河南尹李斌中書令蔣俊東夷校尉文淑尚書武茂皆夷三族壬辰大赦賈后矯詔廢皇太后爲庶人徙于金墉城告于天地宗廟誅太后母龐氏壬寅徴大司馬汝南王髙爲太宰與太保衛瓘輔政六月賈后矯詔使楚王瑋音偉殺太宰汝南王亮太保菑陽公衛瓘乙丑以瑋擅害亮瓘殺之九月辛丑徴征西大將軍梁王􅊮爲䘙將軍録尚書事以趙王倫爲征西大將軍都督雍梁二州諸軍事三年春二月巳酉賈后弑皇太后于金墉城五年冬十月武庫火焚累代之寳十二月景戍新作武庫大調兵器六年八月秦雍氐羌悉叛推氐羌帥齊萬年僣號稱帝圍于涇陽七年春正月癸丑周處及齊萬年戰於六陌王師敗績處死之九年春正月左積弩將軍孟觀伐氐戰于中亭大破之獲齊萬年徴征西大將軍梁王彤録尚書事以北中郎將河間王顒爲鎮西將軍鎮關中成都王頴爲鎮北大將軍鎭鄴十二月壬戌廢皇太子遹爲庶人及其三子幽于金墉城殺太子之母謝氏永康元年正月大赦改元三月癸未賈后矯詔害庶人遹于許昌夏四月辛卯日有食之癸巳梁王彤趙王倫矯詔廢賈后爲庶人司空張華尚書僕射裴頠音隗文毁切皆遇害侍中賈謐及黨與數十人皆伏誅甲午倫矯詔大赦自爲相國都督中外諸軍如宣帝輔魏故事追復故皇太子位丁酉以梁王肜爲太宰己亥趙王倫矯詔害賈庶人于金墉城五月己巳立皇孫臧爲太孫秋八月淮南王允舉兵討趙王倫不尅允及其二子秦王郁漢王迪皆遇害永寜元年春正月乙丑趙王倫纂帝位景寅遷帝于金墉城號曰太上皇改金墉曰永昌宫廢皇太孫臧爲濮陽王五星經天縱横無常癸酉倫害濮陽王臧三月平東將軍齊王冏俱永切起兵以討倫傳檄州郡屯于陽翟征北大將軍成都王頴征西大將軍河澗王顒常山王乂豫州刺史李毅兖州刺史王彦南中郎將新野公歆皆舉兵應之衆數十萬倫遣其將閭和出伊闕張泓孫輔出堮坂以拒冏孫㑹士猗許超岀黄橋以拒頴及頴將趙驤石超戰於沮音蛆水㑹等大敗棄軍走四月辛酉左衛將軍王輿尚書淮南王漼七隗反勒兵入宫擒倫黨孫秀孫㑹許超士猗於離反駱休等皆斬之逐倫歸第即日乗輿反正群臣頓首謝罪帝曰非諸卿之過也詔大赦改元誅趙王倫義陽王威九門侯質等及倫之黨與五月立襄陽王尚爲皇太孫六月戊辰大赦増吏位二等庚午東萊王㽔左衛將軍王輿謀廢齊王冏事泄廢㽔爲庶人輿伏誅夷三族甲戍以齊王冏爲大司馬都督中外諸軍事成都王頴爲大將軍録尚書事河間王顒爲太尉罷承相復置司徒官太安元年五月癸卯以清河王遐子覃爲皇太子賜孤寡帛大酺音甫五日以齊王冏爲太師東海王越爲司空秋七月兖豫徐兾等四州大水冬十月地震十二月丁卯河間王顒表齊王冏窺伺神器有無君之心與成都王頴新野王歆范陽王虓許交切同㑹洛陽請廢冏還第長沙王乂奉乗輿屯南上東門攻冏殺之幽其諸子于金墉城廢冏弟北海王寔大赦改元以長沙王乂爲太尉都督中外諸軍事二年七月中書令卞粹侍中馮蓀河南尹李含等貳於長沙王爻疑而害之八月河澗王顒成都王頴舉兵討長沙王乂帝以乂爲大都督帥軍禦之庚申劉弘及張昌戰於清水斬之顒遣其將張方頴遣其將陸機牽秀石超等來逼京師乙丑帝幸十三里橋遣將軍皇甫商拒方於冝陽己巳帝旋軍于宣武塲庚午舎于石樓天中裂無雲而雷九月丁丑帝次于河橋壬午皇甫啇爲張方所敗甲申帝軍于芒山丁亥幸偃師辛卯舎于豆田癸巳帝旋于城東景申進軍緱氏擊牽秀走之大赦張方入京城燒清明開陽二門死者萬計石超逼乗輿于緱氏冬十月壬寅帝旋于宫石超焚緱氏服御無遺丁未破牽秀范陽王虓于東陽門外戊申破陸機于建春門石超斬其大將軍賈崇等十六人懸首銅駝街張方退屯十三里橋十一月辛巳星晝隕聲如雷王師攻方壘不利方决千金堰水碓皆涸音鶴乃發王公奴婢手舂給兵廪一品巳下不從征者男子十三巳上皆從役又發奴助兵號爲四部司馬公私窮踧子六反米石萬錢詔命所至一城而巳壬寅夜赤氣竟天隠隠有聲景辰地震癸亥東海王越執長沙王乂幽於金墉城㝷爲張方所害甲子大赦永興元年春正月成都王頴自鄴諷于帝乃大赦改元爲永安帝逼於河間王顒宻詔雍州刺史劉沉秦州刺史皇甫重以討之沉舉兵攻長安爲顒所敗張方大掠洛中還長安於是軍中大餧人相食以成都王頴爲丞相頴遣從事中郎成䕫等以兵五萬屯十二城門殿中宿所忌者頴皆殺之以三部兵代宿衛二月乙酉廢皇后羊氏幽于金墉城黜皇太子覃復爲清河王三月河間王顒表請立成都王頴爲太弟戊申詔曰朕以不徳纂承鴻緒于兹十有五載禍亂滔天姧逆仍起至乃幽廢重宫宗廟幾絶成都王頴温仁惠和尅平暴亂其以頴爲皇太弟都督中外諸軍事丞相如故秋七月景申朔右衞將軍陳音􅎮詔召百寮入殿中因勒兵討成都王頴戊戍大赦復皇后羊氏及皇太子覃巳亥司徒王戎東海王越髙密王簡平昌公摸呉王晏豫章王熾襄陽王範右僕射荀藩等奉帝北征至安陽衆二十餘萬頴遣其將石超拒戰巳未六軍敗績於湯隂矢及乗輿百官分散侍中嵇紹死之帝傷頰中三矢亡六璽帝遂幸超軍餒甚超進水左右奉秋桃超遣第熈奉帝之鄴頴帥羣官迎謁道左帝下輿涕泣其夕幸于頴府有九錫之儀陳留王送貂蟬文鶡尾明日乃備法駕幸于鄴唯豫章王熾司徒王戎僕射荀藩從庚申大赦改爲建武八月戊辰頴殺東安王繇張方復入洛陽廢皇后羊氏及皇太子覃匈奴左賢王劉元海反於離石自號大單于安北將軍王俊遣烏九騎攻成都王頴于鄴大敗之頴與帝單車走洛陽御服分散倉卒上下無齎侍中黄門𬒳囊中賫私錢三千詔貸用所在買飯食以供宫人止食於道中客舎宫人有持升餘粇米飯燥及蒜鹽豉以進帝帝噉音啖之御中黄門布𬒳次獲嘉市麄米飯盛以瓦孟帝噉兩孟有老父獻蒸雞帝受之至温將謁陵帝䘮履納從者之履下拜流涕左右皆歔欷及濟河張方帥騎三千以陽燧青蓋車奉迎方拜謁帝躬止之辛巳大赦賞從者有差冬十一月乙未方請帝謁陵因刧帝幸長安以所乗車入殿中帝馳避後園竹中方逼帝升車左右中黄門鼔吹十二人歩從唯中書監虜志侍側方以帝幸其壘帝令具載宫人寳物軍人因略妻後宫分爭府藏魏晉巳來所積之物掃地無遺矣行次新安寒甚帝墮馬傷足尚書髙光奉進靣衣帝嘉之河間王顒帥官屬歩騎三萬迎于灞上顒前拜帝下車止之以征西府爲宫唯僕射荀藩司隷劉暾也昆反太常鄭球音求河南尹周馥音服復與其遺官在洛陽爲留臺承制行事號爲東西臺焉景午留臺大赦改元復爲永安辛丑復皇后羊氏李雄僣號成都王劉元海僣號漢王十二月丁亥詔曰天禍晉邦家嗣莫繼成都王頴自在儲貳政績虧損四海失望不可承重器其以王還苐豫章王熾先帝愛子令問日新四海注意今以爲皇太弟以隆我晉邦以司空越爲太傳與太宰顒夾輔朕躬司徒王戎叅録朝政光禄大夫王衍爲尚書左僕射百官皆復職齊王冏前應還第長沙王乂輕䧟重刑封其子紹爲樂平縣王以奉其嗣自湏戎車屢征勞費人力供御之物皆減三分之二户調田租三分減一蠲除苛政愛人務本清通之後當還東京大赦改元以河間王顒都督中外諸軍事二年春正月甲午朔帝在長安夏四月景子張方廢皇后羊氏七月東海王越嚴兵徐方將西迎大駕成都王頴部將公師藩等聚衆攻䧟郡縣害陽平太守李志汲郡太守張延等轉攻鄴平昌公模遣將軍趙驤擊破之九月壬子以成都王頴爲鎮軍大將軍都督河北諸軍事鎮鄴河間王顒遣將軍吕㓪屯洛陽冬十月景子詔曰得豫州刺史劉喬檄稱頴川太守劉輿迫脅驃騎將軍虓拒逆詔命造構凶逆擅刧郡縣合聚兵衆擅用荀晞爲兖州斷截王命鎮南大將軍荆州刺史劉弘平南將軍彭城王釋等各勒所統徑㑹許昌與喬并力今遣右將軍張方爲大都督統精卒十萬建武將軍吕㓪廣武將軍騫貙敕俱反建威將軍刀黙等爲軍前鋒共㑹許昌除輿兄第丁丑使前車騎將軍石超北中郎將王闡討輿等赤氣見于北方東西竟天有星孛于北斗平昌公模遣將軍宋胄等屯河橋十一月立節將軍周權詐𬒳檄自稱平西將軍復皇后羊氏洛陽令何橋攻權殺之復廢皇后十二月吕㓪等東屯榮陽成都王頴進據洛陽張方劉弘等並按兵不能禦范陽王虓濟自官渡拔榮陽石超襲許昌破劉喬於肅喬奔南陽右將軍陳敏舉兵反自號楚公矯稱𬒳中詔從沔漢奉迎天子逐楊州刺史劉機丹陽太守王曠光熈元年春正月戊子朔日有蝕之帝在長安河間王顒聞劉喬破大懼遂殺張方請和於東海王越越不聽宋胄等破頴將婁裒進逼洛陽頴奔長安甲子越遣其將祁弘宋胄司馬纂等迎帝巳亥弘等奉帝還洛陽乗牛車行宫藉草公卿跋渉六月景辰朔至自長安升舊毀哀慼流涕謁于太廟復皇后羊氏辛未大赦改元八月以太尉東海王越録尚書事驃騎將軍范陽王虓爲司空九月頓丘太守馮嵩執成都王頴送之于鄴冬十月司空范陽王虓薨長史劉輿害成都王頴十一月庚午帝崩于顯陽殿在位十六年時年四十八葬太陽陵帝之爲太子也朝廷咸知不堪政事衛瓘常侍宴撫武帝所坐床曰可惜此坐和嶠亦以爲言曰皇太子有淳古風而季代多僞恐不了陞下家事武帝黙然不荅後武帝欲廢太子楊后曰立嫡以長不以賢豈可動乎太子遂定及居大位政岀群下紀綱大壤貨賂公行天下爲之市賈焉帝又甞幸華林園聞蛙聲謂左右曰此鳴者爲官乎爲私乎或對曰在官地者爲官在私地者爲私及天下荒亂百姓餒甚帝曰何不食内糜其蒙蔽皆此類也王隠晉書曰髙堂隆尅鄴宫屋材云後若干年當有天子居此宫惠帝止鄴宫治屋者土剥更泥始見刻字計年正合趙王倫晉書曰趙王倫字子彛宣帝弟九子也母曰栢夫人魏嘉平𥘉封安樂亭侯五等建改封東安子拜諌議大夫武帝受封琅瑘郡王元康𥘉遷征西將軍開府儀同三司鎭關中倫刑賞失中氐音低羗反叛徴還京師㝷拜車騎將軍太子太傅深交賈郭謟事中宫大爲賈后所親信求録尚書張華裴頠固執不可又求尚書令華頠復不許敏懐太子之廢也使倫領右軍將軍時左衛司馬督司馬雅及常徙督許超並常給事東宫二人傷太子無罪與殿中中郎士猗節謀廢賈后復太子以華頠不可移難與圖權倫執兵之要性貧冒可假以濟事乃說倫嬖人孫秀曰中宫凶妒音蠧無道與賈謐等共廢太子今國無適嗣社稷將危大臣將起大事而公名奉中宫與賈郭親善太子之廢皆云預知一朝事起禍必相及何不先謀之乎秀許諾言於倫倫納焉事將起而秀知太子聦明若還東宫將與賢人圖政量巳必不得志更說倫曰太子剛猛不可私請明公素事賈后時議皆以公爲賈氏之黨今雖欲建大功於太子太子含宿怒必不加賞於明公矣當謂逼百姓之望翻覆以免罪耳此乃所以速禍也今且緩其事賈后必害大子然後廢后爲太子報讎亦足以立功豈徒免禍而巳倫從之秀乃微泄其謀使謐黨頗聞之倫秀因勸謐等早害太子以絶衆望太子旣過害倫秀之謀益甚而超雅懼後難欲悔其謀乃辭疾秀復告右衛佽飛督閭和和從之期四月三日景夜一籌以鼔聲爲應至期乃矯詔勑三部司馬曰中宫與賈謐等殺害太子今使車騎入廢中宫汝等皆當從命賜爵關中侯不從誅三族於是衆皆從之倫又矯詔開門夜入陳兵道南遣翊軍校尉齊王同將三部司馬百人排閣入華林令駱休爲内應迎帝幸東堂遂廢賈后爲庶人幽之于建始殿中書監侍中黄門侍郎八座皆夜入殿執張華裴頠解紹杜斌等於殿前殺之尚書始疑詔有詐郎師景露板奏請手詔倫等以爲沮衆斬之以殉明日倫坐端門屯兵北向遣尚書和郁送賈庶人于金墉㝷矯詔自爲使持節大都督中外諸軍事相國侍中王如故一依宣文輔魏故事以其丗子散騎常侍拲音拱領冗從僕射子馥前將軍封濟陽王䖍黄門郎封汝隂王詡况羽反散騎侍郎霸城侯孫秀等皆封大郡並據兵權文武官侯封者數千人百官㹅巳聽於倫倫素庸下無智䇿復受制於秀秀之威權振於朝廷天下皆事秀而無求於倫秀起自琅瑘小吏累官於趙國以謟媚自逹旣執機衡遂恣其姦謀多殺忠良以逞私憾前衛尉石崇黄門郎潘岳皆與秀有嫌並見誅於是京邑君子不樂其生矣淮南王允齊王冏以倫秀驕僣内懷不平秀等亦深忌焉乃岀冏鎮許奪允護軍允發起兵討倫允旣敗滅倫加九錫増封五萬户倫無學不知書秀亦以狡黠胡八反小才貪淫昩利所共立事者皆邪佞之徒唯競榮利無深謀逺略倫秀並惑巫鬼聽妖邪之說秀使牙門趙奉詐爲宣帝神語令倫早入西宫又言宣帝於北邙爲趙王佐助於是別立宣帝廟於邙山謂逆謀可成秀等部分諸軍分布腹心使散騎常侍義陽王威兼侍中出納詔命矯作禪讓之詔使持節尚書令滿奮僕射崔隨爲副奉皇帝璽綬以禪位于倫倫僞讓不受於是宗室諸王群公卿士咸假稱符瑞天文以勸進倫乃許之左衛王與前軍司馬雅等率甲士入殿譬諭三部司馬示以威賞皆莫敢違其夜使張林等屯守諸門義陽王威及駱休逼奪天子璽綬夜漏未盡内外百官以乗輿法駕迎倫恵帝乗雲母車鹵簿數百人自華林西門出居金墉城尚書和郁兼侍中散騎常侍琅耶王􅐶中書侍郎陸機從到城下而反使張衡衛帝實幽之也倫從兵五千人自端門登太殿滿奮崔隨樂廣進璽綬於倫乃僣即帝位大赦改元建始諸黨皆登卿將並列大封其餘同謀者咸超階越次不可勝紀至于奴卒厮役亦加以爵位毎朝㑹貂蟬盈坐時人爲之諺曰貂不足狗尾續而以茍且之惠取恱人情府庫之儲不充於賜金銀冶鑄不給於印故有白板之侯君子恥服其章百姓亦知其不終矣倫親祠太廟還遇大風飄折麾蓋孫秀旣立非常之事倫敬重焉秀任文帝爲相國時所居内府事無巨細必諮而行倫之詔令秀改革有所與奪自書青𥿄爲詔或朝令夕改者數四百官轉昜如流矣時齊王冏河間王顒成都王頴並擁强兵各據一方秀知冏等必有異圖乃選親黨及倫故吏爲三王叅佐及郡守秀本異與張林有隙雖外相推崇内實忌之及林爲衛將軍深怨不得開府潜與拲牋具說秀專權動違衆心而功臣皆小人撓亂朝廷可一時誅之拲以書白倫倫以示秀秀勸倫誅林倫請宗室㑹於華林園召林秀及王輿入因收林殺之誅三族及三王起兵討倫檄至倫秀始大懼遣其中堅孫輔爲上將軍督諸軍以拒義師倫復受太子詹事劉琨節督河北將軍率歩騎千人催諸軍與義軍戰于激水大敗退保河上劉琨燒斷河橋自義兵之起百官將士咸欲誅倫秀以謝天下秀知衆怒難犯不敢岀省及聞河北軍悉敗憂懣音悶不知所爲義陽王威勸秀至尚書省與八座議征戰之備秀從之使京城西四品以下子弟十五以上皆詣司隷從倫出戰内外諸軍悉欲刧殺秀秀懼自崇禮闥走還下舎衛將軍趙泉斬秀等以徇使倫爲詔曰吾爲孫秀等所誤以怒三王今巳誅秀其迎太上復位吾歸老于農畝傳詔以騶音鄒虞幡勑將士解兵文武官皆奔走莫敢有居者黄門將倫自華林東門出及拲皆還汶陽里弟於是以甲士數千迎天子于金墉百姓咸稱萬歳帝自端門入升殿御黄室送倫及拲付金墉城梁王肜表倫父子凶逆冝伏誅百官㑹議于朝堂皆如彤表遣尚書袁敞持節賜倫死飲以金屑苦酒倫慙以巾覆面曰孫秀誤我於是収拲馥䖍詡付廷尉獄考竟百官是倫所用者皆斥免之臺省府衛僅有存者自兵興六十餘日戰及殺害近十萬人太平御覽卷第九十七
