front:
  text: 太平御覽卷第五百八十九
  hash: sha256:3d45c11afe6355335b60f1a162481010aa2e80ef9256870166b6babb56e7705c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_589-1a}
body:
  text: 文部五碑釋名曰碑𬒳也此本葬時所設也於是鹿盧以䋲𬒳其上引以下棺追述君父之功羙以書其上後人因爲焉故建道陌之頭名其文謂之碑也文心雕龍曰碑者禆也上古帝皇紀號封禪樹石禆岳故曰碑也周穆紀迹于弇山之石亦古碑云意也又宗廟有碑樹之兩楹事止麗壯未勒勲績而庸器漸闕故後代用碑以石代金同乎不朽自廟徂墳猶封墓也自後漢巳來碑碣雲起才鋒所斷莫髙蔡邕觀楊賜之碑骨鯁訓典陳郭二文詞無擇言周胡衆碑莫不精允其序事也該而要其綴采巳雅而澤清辭轉而不窮巧義出而卓立察其爲才自然至矣孔融所創有慕伯喈張陳兩文辭洽之來亦其亞也及孫綽爲文志在於碑温王郗庾詞多枝離桓彞一篇最爲辨裁矣此碑之致也屬碑之恥資乎史才其序則傳其文則銘摽序盛德必見清風之華照紀鴻懿必見峻偉之烈此碑之致也夫碑實銘器銘實碑文因器立名事光於誄是以勒器讃勲者入銘之域樹碑述亡者同誄之區焉禮記䘮大記曰君葬用輴四紼二碑御柩用羽葆大夫葬用輴二紼二碑御柩用茅士䘮用國車二紼無碑又祭義曰祭之日尸牽牲入廟門麗于碑麗猶擊也東觀漢記曰竇章女順帝𥘉入掖庭爲貴人早卒帝追思之詔史官樹碑頌德章自爲之辭范曄後漢書曰郭林宗卒同志者乃共刻石立碑蔡邕爲其文旣而謂盧植曰吾爲碑多矣皆有慙德唯郭有道碑無愧色耳又蔡邕傅曰邕以經籍去聖巳乆文字多謬俗儒穿鑿疑誤後學乃與五官中郎將堂谿典光禄大夫楊賜諌議大夫馬日磾議郎張訓韓說太史令單颺等奏求正定六經文字靈帝許之邕乃自丹於碑使工鐫刻太學門外於是後儒晚學咸取焉及碑始立其觀視及摹冩者車乗日千餘兩塡塞街陌魏志曰王粲與人共行讀道邊碑人問曰卿能闇乎曰能因使背而誦之不安一文又曰鄧艾字士載年十二隨母至潁川讀陳寔碑文言爲世範行爲士則艾遂更名範字士則後宗族有與同者故改焉晉書曰隱逸傅戴逵字安道譙國人也少博學好談論善屬文能鼓琴工書畫其餘工藝靡不畢綜揔角時以鷄卵汁溲白瓦屑作鄭玄碑又爲文而自鐫之詞麗器妙時人莫不驚歎又曰郭璞爲庾氷筮曰墓碑生金庾氏大忌後氷子爲廣州刺史碑生金爲桓温所㓕又曰杜預好爲後丗名常言髙岸爲谷深谷爲陵刻石爲二碑紀其勲績一沉萬山之下一立峴山之上曰焉知此後不爲陵谷乎又曰孫綽少以文才垂稱于時文士綽爲其冠温王郗庾諸公之薨必湏綽爲碑文然後刋石焉又曰扶風武王駿嘗都督雍梁病薨追贈大司馬加侍中假黃鉞西土聞其薨也泣者盈路百姓爲之樹碑長老見碑無不下拜其遺愛如此又曰唐彬爲幽州百姓追慕彬功德生爲立碑作頌彬𥘉受學於東海閬德門徒甚多獨目彬有廊廟才及彬官成而德巳卒乃爲之立碑王隱晉書曰石瑞記曰永嘉𥘉陳國項縣賈逵石碑中生金人盗取盡復生此江東之瑞齊書曰竟陵王薨范雲是故吏上表請爲立碑文云人蓄油素家懷鈆筆瞻彼景山徒然望慕油素絹也筆所以理書也三國典略曰梁宗懔少聦敏好讀書語輙引古事郷里呼爲小學士梁主使製龍川廟碑一夜便就詰朝呈上梁王羙之又曰陸雲呉郡呉人曽製太伯廟碑呉興太守張纉罷郡經途讀其文歎羙之曰今之蔡伯喈也至都言於髙祖髙祖召兼尚書議郎頃之即眞後魏書曰衛操桓帝以爲輔相任以國事劉石之亂勸桓帝匡助晉氏東􅌡公司馬騰聞而善之表加右軍封定襄侯桓帝崩後操立碑於䢴城南以頌功德云魏軒轅之苗裔桓穆二帝馳名域外九譯宗焉有德無禄大命不延背棄華殿雲中名都逺近齊䡄奔赴梓廬時晉光熈元年秋也皇興𥘉雍州别駕鴈門叚榮於大䢴掘得此碑又曰爾朱榮字天寳羙容皃㓜而明決長好射獵葛榮之叛也榮列圍大獵有雙兎超於馬前榮乃彎弓而誓曰中之則擒葛榮應弦而殪三軍咸恱破賊之後即命立碑於其所號曰雙兎碑唐書曰賈敦實宛昫人也貞觀中累除饒陽令時制大功巳下不得聮職敦實兄敦頥復爲瀛州刺史甚有惠政百姓共樹碑于大市通衢及敦實去職復刻石頌其政德立於兄碑之側故時人呼爲棠棣之碑焉又曰貞觀中議封禪又議立碑曰勒石紀號垂𥙿後昆羙盛德之形容闡后王之休烈其義逺矣又曰髙宗御製慈恩寺碑文及自書鐫刻旣畢戍申上御安福門樓觀僧玄奘等迎碑向寺諸寺皆造幢盖飾以金寳窮極瓌麗太常及京城音樂車數百兩僧尼執幡兩行導從士女觀者塡噎街衢自魏晉巳來崇事釋教未有如此之盛者也又曰文苑傳曰李邕尤長碑頌雖貶職在外中朝衣冠及天下寺觀多賷持金帛徃求其文前後所製凢數百首受納饋運亦至鉅萬時議以爲自古鬻文獲財未有如邕者有文集七十卷其張幹公行狀洪州放生碑批韋巨源謚議文士推重之後恩思例贈秘書監又曰長平中源寂使新羅國見有國人傳冩諷念馮定所爲黒水碑畫鸖記韋休符之使西蕃也見其國人冩定商山記以代屏障其文名馳於戎夷如此又曰李華嘗爲魯山令元德季墓碑顔真卿書李陽氷篆額後人爭摸冩之號爲三絶碑又曰裴度平淮西詔韓愈撰平淮西碑其辭多叙裴度事時先入蔡州擒呉元濟李愬功第一愬不平之愬妻岀入禁中因許碑辭不實詔令磨之憲宗命翰林學士叚文昌重撰文勒石又曰蕭俛在相位時穆宗詔撰故成德軍節度使王士眞神道碑對曰臣器𥚹狹比不能強王承宗先朝阻命事無可觀如臣秉筆不能溢羙又撰進之後例行貺遺臣若公然阻絶則違陛下撫納之冝僶俛受之則非微臣平生之志臣不願爲之秉筆帝嘉而從之又曰李絳憲宗時中官吐突承瓘自藩邸承恩寵旣爲神䇿軍護軍中尉嘗欲於安國佛寺建立聖德碑大興工作綘即上言陛下布惟新之政剗積習之弊四海延頸日望德音今忽立聖德碑以示天下不廣大易稱大人者與天地合德與日月合明執契垂拱勵精求理豈可以文字而盡聖德又安可以碑表而賛皇猷若可叙述是有分限乃反虧損盛德豈謂敷揚至道哉故自堯舜禹湯文武並無建碑之事至秦始皇荒逸之君煩酷之政然有之罘嶧山之碑揚誅伐之功紀廵幸之跡適足爲百王所笑萬代所譏至今稱爲失道亡國之主豈可擬議於此陛下嗣髙祖太宗之業舉貞觀開元之政思理不遑食從諫如順流固可與堯舜禹湯文武方駕而行安得追秦皇暴虐不經之事而自損聖政近者閻巨源請立紀聖德碑嚴勵請立紀聖功碑陛下詳盡事冝皆不允許今忽令立此與前事頗乖况此碑旣在安國寺即不得不叙載遊觀崇飾之事述遊觀且乖理要叙崇飾又匪政經固非哲王所冝行也上納之後唐史曰魏帥楊師厚於黎陽山採巨石將紀德政制度甚大以鐡爲車方任負載驅牛數百不由道路所經之處或壞人廬舎或發人丘墓百姓瞻望曰碑來碑石纔至而卒魏人以爲應碑來之兆祢衡別傳曰黃祖太子射作章陵太守與衡有所之見蔡伯喈所作石碑正平一過視之歎之言好後日各歸章陵自恨不令吏冩之正平曰吾雖一遇皆識其中央第四行中石書磨滅兩字不分明當是某字恐不諦耳因援筆書之𥘉無所遺唯兩字不着耳章陵雖知其才明猶嫌有所脫失故遣徃冩之還以校正平所書尺寸皆得𥘉無脫誤所疑兩字故如正平所遺字也於是章陵敬服丗說曰魏武嘗過曹娥碑下楊脩讀碑背上題云黃絹㓜婦外孫韲臼魏武謂脩曰卿解不荅云解魏武曰卿未可言待我思之行三十里乃曰吾巳得令脩别記所知脩曰黃絹色絲也於字爲絶㓜婦少女也於字爲妙外孫女子也於字爲好韲臼受辛也於字爲辭所謂絶妙好辭魏武亦記之與脩同乃歎曰我才不如卿乃覺三十里王肅荅詔問爲瑞表曰太和六年上將幸許昌過繁昌詔問受禪碑生黃金白玉應瑞不肅奏以始改之元年嘉瑞見乎于踐祚之壇冝矣晉令曰諸葬者皆不得立祠堂石碑石表石獸語林曰孫興公作永嘉郡郡人甚輕之桓公後遣傳教令作敬夫人碑郡人云故當有才不尓桓公那得令作碑於此重之荆州圖記曰羊叔子與鄒潤甫嘗登峴山泣曰自有宇宙便有此山由來賢逹登此望如我與卿者多矣皆湮滅無聞念此使人悲傷潤甫曰公德冠四海道嗣前哲令問令望當與此山俱傳若潤甫軰乃當如公語耳後叅佐爲立碑着故望處百姓毎行望碑莫不悲感杜預名爲墮淚碑盛弘之荆州記曰冠軍縣有張詹墓七丗孝廉刻其碑背曰白楸之棺易朽之衣銅鐡不入瓦器不藏嗟矣後人幸勿見傷及胡石之亂舊墓莫不夷毁而此墓儼然至元嘉六年民飢始發說者云𥘉開金銀銅錫之器未裝雕刻之飾爛然畢備齊道記曰琅邪城始皇東遊至此立碑銘紀秦功德云是李斯所刻西征記曰國子堂前有列碑南北行三十五枚刻之表裏書春秋經尚書二部大篆隷科斗三種字碑長八尺今有十八枚有餘皆崩太學堂前石碑四十枚亦表裏隷書尚書周易公羊傳禮記四部本石塶相連多崩敗又太學讃碑一所漢建武中立時草創未備永建六年詔下三府繕治有魏文典論立碑今四存二敗述征記曰下相城西北漢太尉陳球墓有三碑近墓一碑記弟子盧植鄭玄管寜華歆等六十人其一碑陳登碑文並蔡邕所作酈善長水經注曰昔大禹導河積石踈決梁山所謂龍門矣孟津河口廣八十歩巖際鐫跡遺功尚存岸上並有廟祠祠前有石碑三所碑字紊滅不可識也一碑是太和中立述異記曰崆峒山中有堯碑禹碣皆籕文焉伏滔述帝功徳銘曰堯碑禹碣磨古不昧虞喜志林曰贑榆縣有始皇碑潮水至則加其上三丈去則見三尺行有十二字異苑曰呉郡岑淵碑在江乗湖西太元村人見龜從田中出還其元處萍藻猶着腹下金樓子曰銘頌所稱興公而巳夫披文相質博約温潤吾聞斯語未見其人班固碩學尚云賛頌相似陸機鈎深猶稱碑賦如一國朝傳記曰魏文貞之薨也太宗自製其碑文并自書後爲人所間詔令掊之及征髙麗不如意深悔爲是行乃歎曰若魏徴在不使我有此舉也旣渡遼水令馳驛祀以少牢復立碑焉又曰率更令歐陽詢行見古碑索靖所書駐馬觀之良乆而去數百歩復還下馬佇立疲則布毯坐觀因宿其傍三日而後去李綽尚書故實曰東晉謝太傳墓碑樹貞石𥘉無文字盖重難製述之意國史𥙷曰韋貫之爲尚書右丞長安中爭爲碑誌若市賈然大官卒其門如市至有喧競搆致不由䘮家是時裴均之子圖不朽於貫之縑帛萬疋貫之舉手曰寧餓不苟太平御覽卷第五百八十九
