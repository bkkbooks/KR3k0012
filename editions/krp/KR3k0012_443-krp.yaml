front:
  text: 太平御覽卷第四百四十三
  hash: sha256:ba1d40a1c000616cb88476960897bc600f653b81ba6f684b8906ca1281b4deee
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_443-1a}
body:
  text: 人事部八十四知人中晉書曰裴頠字逸民弘雅有逺識博學稽古少知名御史中丞周弼見而歎曰頠若武庫五兵縱横一時之傑也又曰荀朂父盻早亡朂依于舅氏歧嶷夙成年十餘歳能屬文從外祖魏太博鍾繇曰此兒當及其曽祖旣長遂博學逹於從政又曰郭弈時亭長李含有俊才而門寒爲豪族所排弈用爲別駕含後果有名位時以奕爲知人又曰賀循少玩篇籍善屬文博覽衆書尤精禮傳雅有知人之鑒抜同郡楊方於卑陋卒成名於丗又曰應詹鎭南大將軍劉弘詹之祖舅也請爲長史謂之曰君器識弘深後當代老子於荆南矣乃委以之軍政又曰楊方字公回少好學有異才初爲郡鈐下威儀公事之暇輙讀五經郷邑未之知内史諸葛恢見而竒之待以門人之禮由是始得周旋貴人間又曰郭奕字大業太原陽曲人也少有重名山濤稱其髙簡有雅量爲野王令羊祜嘗過之奕歎曰羊叔子何必減郭大業少選復又歎曰羊叔子去人逺矣遂送祜出界數百里又曰李憙薦樂安孫璞亦以道德顯時人稱爲知人又曰唐彬𥘉受學於東海閬德德門徒甚多獨目彬有廊廟才及彬官成而德巳卒乃爲之立碑又曰韋忠年十二喪父哀慕毀悴杖而後起司空裴秀弔之匍匐號訴哀慟感人秀出而告人曰此子長大必爲佳器歸而命子頠造焉也又曰沛國戴晞少有才智與嵇紹從子含相友善時人許以逺致紹以爲必不成器晞後爲司州主簿以爲無行𬒳斥州黨稱有知人之明又曰鄭袤字林叔榮陽開封人也髙祖衆漢大司農父㤗楊州刺史有髙名袤少孤早有識鑒荀攸見之曰鄭公業爲不亡矣又曰王戎傳云阮籍與渾爲友戎年十五隨渾在郎舎戎少籍二十歳而籍與之交籍每適渾俄頃去過戎良乆然後出謂渾曰濬冲清貴非卿倫也共卿言不如共阿戎譚又曰樂廣字彦輔父方叅魏征西將軍夏侯玄軍事廣時年八歳玄甞見廣在路因呼與語還謂方曰向見廣神姿朗徹當爲名士卿家雖盆可令專學必能興卿門户也又曰曹攄字顔逺譙國人也祖肇魏將軍攄少有孝行好學善屬文太尉王衍見而器之調𥙷臨淄令又曰潘京舉秀才到洛尚書令樂廣京州人也共談累日深歎其才謂京曰君天才過人恨不學耳若學必爲一代談宗京感其言遂勤學不倦又曰王澄傳云王衍有重名於丗時人許以人倫之鑒尤重澄及王敦庾敳常爲天下士目曰阿平第一子嵩第二處仲第三澄嘗謂衍曰兄形似道人而神峯太㑺衍曰誠不如卿落落穆穆然澄由是顯名又曰戴若思徃武陵省父時同郡人潘京素有理鑒名知人其父遣若思就京與語旣而稱若思有公輔之林又曰周顗傳云同郡賈嵩有清操見顗歎曰汝頴固多竒士自湏雅道陵遟今復見周伯仁將振起舊風清我邦族矣又曰劉隗伯父訥字令言有人倫鑒識初入洛見諸名士而歎曰王夷甫大鮮明樂彦輔我所敬張茂先我所不解周弘武巧於用短杜方叔拙於用長又曰周浚有人倫鑒識其郷人史曜素微賤衆所未知浚獨引之爲友遂以妹妻之曜竟有名於丗又曰阮脩傳云王衍當時談宗自以論易略盡然有所未了研之終莫悟毎云不知此後當見能通之者不衍族子敦謂衍曰阮宣子可與言衍曰吾亦聞之但未知其亹亹之處定何如耳及與循談言寡而㫖暢衍乃歎服焉又曰桓彛字茂倫庾亮毎屬彛覔一佳吏部及至都謂亮曰爲卿得一吏部矣亮問安在彛曰人所應有而不必有人所應無而不必無徐寜眞海岱清士因爲叙之即遷吏部郎又曰謝玄時符堅強盛邊境數𬒳侵冠朝廷求文武良將可以鎭禦北方者安乃以玄應舉中書郎郗超素與玄不善聞而歎曰安違衆舉親然玄亦必不負舉時咸以爲不然超曰吾嘗與玄共在桓公府見其使才雖履屐間亦得其任所以知之晉中興書曰何充字次道年在童齓伯父邃謂之曰我爲兒時亡伯車騎謂我汝後當與伯父爭名汝今器宇宏深亦當名出我右由是少有名望又曰呉隱之字處默少有孝行遭母憂哀毀過禮時與太常韓康伯鄰居伯母語伯曰汝後若居銓衡之職當用如此軰人及伯爲吏部尚書因進用之遂歷清顯又曰范汪字玄平少失父年六歳過江依外家庾氏荆州刺史王澄見而竒之以爲與范族者必是人也又曰魏徐州刺史吕䖍有佩刀工相之以爲必三公可服此刀䖍謂别駕王祥曰茍非其人刀或爲害卿有公輔之量故以相與祥始辭之固強乃受祥死之日以刀授弟覽曰吾兒凢汝後必興足稱此故以相與又曰王珣字元琳弱冠與謝玄俱辟大司馬桓温掾温語人曰謝掾年三十必擁旄仗節王掾當作黒頭公皆不易才也又曰薛兼與同郡紀瞻廣陵閔鴻呉郡顧榮㑹稽賀循同志友善號曰五㑺𥘉入洛司空張華見而歎曰皆南金也又曰陸曄童齓中從兄機稱之爲陸氏之寶我家不丗之公也又曰禇季野翼從弟弱冠譙國橋彛見而異之曰禇季野有皮裏陽秋又曰王敦爲太子舎人滎陽潘滔時爲洗馬見而目之曰處仲蜂目巳露但豺聲未振若不噬人亦當爲人所噬沈約宋書曰桓玄聞一軍起便憂悴無復計或曰劉𥙿等衆力微弱豈便有成陛下何慮之甚玄曰劉𥙿是爲一丗之雄劉毅家無擔石之摴蒱一擲百萬何無忌劉牢之甥酷似其舅共舉大事何慮無成也宋書曰謝弘微童㓜時精神端審時然後言叔父混嘗異之曰此兒深衷夙敏方成佳器有子如此足矣又曰謝弘微叔父混尚晉陵公主髙祖受命晉陵公主降東郷君以混得罪前代東郷君節義可嘉聽還謝氏自混亡至是數載而室宇脩整倉廩充盈門徒業使不異平日曰疇墾闢有如於舊東郷君歎曰㒒射平生重此子可謂知人僕射爲不亡矣又曰袁淑字陽源陳郡陽夏人丹陽尹豹少子也少有風格年數歳伯湛謂家人此非凢兒齊書曰隋郡王子隆能屬文明帝謂王儉曰我家東阿也儉曰東阿重出實爲皇家藩屏又曰徐孝嗣姑適東莞劉舎舎兄藏爲尚書左丞孝嗣徃詣之藏退語舎曰徐郎是令僕人三十餘可知矣汝冝善自結又曰江斆爲丹陽丞時袁粲爲尹見斆歎曰風流不墜正在江郎數與宴賞流連日夜蕭子顯齊書曰禇淵字彦回河南陽翟人也父卒悉推財與弟唯取書數千卷𥘉與從弟炤同載道遇太祖淵舉手指太祖車謂炤曰此非常人將來不可測梁書曰沈瑀起家州從事奉朝請嘗詣齊尚書右丞殷濔濔與語及政事甚器之謂曰觀卿才幹當居吾此職又曰范𫐠曽字子玄呉郡錢塘人也㓜學從餘杭吕道惠受五經略通章句道惠學徒常有百數獨稱述曽曰此子必爲王者師又曰賀琛字國寳㑹稽山隂人也伯父瑒歩兵校尉爲丗碩儒琛㓜瑒授其經業一聞便通義理瑒異之常曰此兒當以明經致貴又曰臧盾㓜從徴士瑯瑘諸葛璩受五經通章句璩學徒常有數十百人盾處其間無所狎比璩異之歎曰此生重器王佐才也又曰賀瑒時沛國劉瓛爲㑹稽府丞見瑒深器異之嘗與俱造呉郡張融指瑒謂融曰此生神明聦敏將來當爲儒者宗又曰丘仲孚字公信呉興烏程人也少好學從祖靈鞠有人倫之鑒常稱爲千里駒也陳書曰杜之偉強識俊才頗有名當丗吏部尚書張瓉深知之以爲廊廟器也又曰陸慶永陽王爲呉郡太守聞其欲與相見慶固辭以疾時宗人陸榮爲郡五官慶嘗詣焉王乃微服徃榮舎穿壁以觀之王謂榮曰觀陸慶風神凝峻殆不可測嚴君平鄭子眞何以尚兹北史曰于謹南伐江陵以唐瑾爲元帥府長史及軍還諸將多因虜掠大獲財物瑾一無所取唯得書兩車載之以歸或言於周文曰唐瑾大有輜重悉是梁朝珍玩周文𥘉不之信然欲明其實密遣使檢閱唯見墳籍而已乃歎曰孤知此人來二十許年耳其不以利汚義向若不令撿視恐常人有投杼之疑孤所以益明之耳凡受人委任當如此也隋書曰魏任城王諧薦李德林因遺尚書令楊遵彦書云燕趙固多竒士此言誠不爲謬今歳所貢秀才李德林者文章學識固不待言觀其風神器宇終爲棟梁之用至如經國大體是賈生晁錯之儔彫蟲小伎殆相如子雲之軰今雖唐虞君丗俊乂盈朝然脩大厦豈厭夫良材之積也吾甞見孔文舉薦祢衡表云洪水撗流帝思俾乂以正平比夫大禹常謂擬諭非倫今以德林言之便覺前言非大又曰楊素少落拓有大志不拘小節丗人多未之知唯從叔祖魏尚書僕射寛深異之毎謂子孫曰處道當逸羣絶倫非常之器非汝曹所逮也又曰柳莊少有逺量博覽墳籍兼善辭令濟陽蔡大寳有重名於江左時爲岳陽王蕭察諮議見莊便歎曰襄陽水鏡在於兹矣大寳遂以女妻之又曰髙􅌟河東薛道衡才髙當丗毎稱構有清鑒所爲文筆必先以草呈􅌟有所詆訶道衡未甞不嗟伏大業七年終于家時年七十二所舉杜如晦房玄齡等後皆自致公輔論者稱􅌟有知人之鑒又曰虞丗基字茂丗㑹稽餘姚人也父荔陳太子中庻子丗基㓜沈静喜愠不形於色博學有髙才兼善草隷陳中書令孔奐見而歎曰南金之貴屬在斯人少傅徐陵聞其名召之丗基不徃後因公㑹一見而竒之顧謂朝士曰當今潘陸也因以弟女妻焉隋書曰李德林任城王諧爲定州刺史重其才召入州館朝夕同遊殆均師友不爲君民禮數嘗語德林云竊聞蔽賢蒙顯戮乆令君沉滯吾獨得潤身朝廷縱不見尤亦懼明靈所譴於是舉秀才入鄴李德林㓜聦敏年數歳誦左思蜀都賊十餘日便度髙隆之見而嗟歎遍告朝士云若假其年必爲天下偉器鄴京人士多就宅觀之月餘日中車馬不絶年十五誦五經及古今文集日數千言俄而該博墳典隂陽緯候無不通渉善屬文辭覈而理暢魏収嘗對髙隆之謂其父曰賢子文筆終當継温子昇隆之大笑曰魏常侍殊巳嫉賢何不近比老彭乃逺求温子又曰李士謙字子約趙郡平棘人也髫齓喪父事母以孝聞母曽嘔吐疑爲中毒因跪而嘗之伯父魏歧州刺史瑒琛所嗟尚毎稱曰此兒吾家之顔子也太平御覽卷第四百四十三
