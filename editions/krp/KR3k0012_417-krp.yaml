body:
  text: 人事部五十八忠勇左傳莊公曰齊侯田于貝丘墜于車傷足䘮屨反誅屨於徒人費誅責也弗得鞭之見血走岀遇賊于門刧而束之費曰我奚御哉袒而示之背信之費請先入昨欲助賊伏公而岀鬪死于門中又文公上曰戰於殽也晉梁弘御戎萊駒爲右戰之明日晉㐮公縳秦囚使萊駒以戈斬之囚呼萊駒失戈狼瞫取戈以斬囚禽之從公乗遂以爲右箕之役先軫黜之而立續簡伯狼瞫怒其友曰盍死之瞫曰吾未獲死所其友曰吾與汝爲難瞫曰周志有之勇則害上不登於明堂死而不義非勇也共用之謂勇吾以勇求右無勇而黜亦其所也謂上不我知黜而冝乃知我矣子姑待之及彭衙旣陳以其屬馳秦師死焉晉師從之大敗秦師又宣公下曰楚圍宋宋人告急于晉使解楊如宋使無降楚曰晉師悉起將至矣鄭人囚而獻諸楚楚子厚賂之使反其言反言晉不救不許三而許之登諸樓車使呼宋人而告之遂致其君命楚子將殺之使與之言曰爾旣許不榖而反之何故非我無信女則棄之速即爾刑對曰臣聞之君能制命爲義臣能承命爲信信載義而行之爲利謀不失利以衛社稷民之主也義無二信信無二命君之賂臣不知命也受命以岀有死無霄又可賂乎臣之許君以成命也死而成命臣之禄也寡君有信臣下臣獲考考成也死又何求楚子舎人以歸又成公上曰鞍之戰齊逢丑父使公下如華泉取飲鄭周父御佐車宛茷爲右載齊侯以免韓厥獻丑父郤獻子將戮之呼曰自今無有代其君任患者有一於此將爲戮乎郤子曰人不難以死免其君我戮之不祥赦之以勸事君者乃免之又昭公五年曰𥘉齊豹見宗魯於公孟爲驂乗焉將作乱而謂宗魯曰公孟子不善子所知也勿與乗吾將殺之對曰吾由子事公孟子假吾名焉故不吾逺也雖其不善吾亦知之抑以利故不能去是吾過也今聞難而逃是僭子也使子言不信也子行事吾將死之以周事子周終也齊氏周戈擊公孟宗魯以背蔽之斷肱以中宗魯之肩皆殺之國語曰晉文公誅觀駢脅之狀以伐鄭鄭復敕曹觀公駢脅之狀故見伐也鄭人以名寳行成公不許曰與我詹而師還詹鄭大夫叔詹伯也詹請徃鄭伯不許詹固請曰一臣可以赦百姓君何愛鄭人以詹與晉人晉人將烹之詹曰臣欲盡辭而公聽其辭詹曰天降鄭禍使滛觀狀臣曰不可夫晉公子賢明若使復國而得志於諸侯禍不赦矣今禍及矣尊明勝患智也殺身贖國忠也乃就烹據鼎而疾號曰自今以徃忠以事君者與詹同乃不殺厚爲之禮而歸之史記曰漢之三年項王圍漢王於滎陽漢將紀信說漢王曰事巳急矣請爲王誑楚王可間出於是漢王夜岀女子滎陽東門𬒳甲二千人楚兵四面擊之紀信乗黄屋車傳左纛季裴曰纛毛羽幢在乗與車衡曰城中食盡漢王降楚軍皆呼萬歳漢王與數十騎從城西門岀走城臯項王燒殺紀信漢書曰莾何羅夲姓馬明帝馬后恐其先人有反者易曰莾也與江充相善及充敗衛太子後上知太子冤乃夷㓕充宗族黨與何羅懼及金日磾視其志意非常心疑之隂獨察其動静與俱上下何羅亦覺日磾意以故乆不得發是時上行幸林光宫服虔曰甘泉一名林光臣瓉案林光夲秦離宫在甘泉日磾小疾卧廬何羅矯制發兵明旦上卧未起何羅從外入日磾心動立入卧内户下湏臾何羅裒白刃從東廂上見日磾色變走趍卧内欲入行逆觸寳瑟僵日磾得抱何羅因傳曰莾何羅反上驚起左右拔刃欲格之上恐并中日磾止勿格日磾投何羅殿下得擒縛之窮治皆伏辜東觀漢記曰王郎遣將攻信都信都大姓馬寵等開城内之收太守宗廣及李忠母妻子皆繫獄而令親属招呼忠時寵弟從忠爲校尉忠即時召見責數以背恩反城因格殺之諸將皆驚曰家属在人手中殺其弟何猛也忠曰若縱賊不誅則二心也上聞而美之謂忠曰今吾兵巳成也將軍可歸救老母妻子忠曰䝉明公大恩思得効命誠不敢内顧宗親又曰信都反爲王郎所置信都王捕繫邳彤父弟妻子使爲手書呼􅊮曰降者封爵不降族滅彤涕泣報曰事君者不得顧家又曰張歩攻耿弇時上在魯聞弇爲歩所攻自徃救之未至陳俊謂弇曰虜兵盛可且閇營休士以湏上來弇曰乗輿且到臣子當擊牛釃酒以待百官反欲以賊虜遺君父耶乃出大戰自旦及昏復大破之後數日車駕至臨淄自勞軍也范曄後漢書曰温序字次房太原人爲護羗校尉行部至襄武爲隗囂別將苟宇等所刧宇謂序曰子若與我并威同力天下可圖也序曰受國重任分當效死義不貪生茍背恩德宇等復曉譬之序素有氣力大怒叱宇等曰虜何敢迫脅漢將因以節撾殺數人賊衆争欲殺之宇止之曰此義士有死節可賜以釼序受釰衘鬢于口顧左右曰旣爲賊所殺無令鬢汙土遂伏釰而死英雄記曰王允誅董卓卓部曲將李􅔸郭氾不自安遂合謀攻圍長安城䧟吕布奔走布駐馬青璅門外招允曰公可以去乎允曰若國家社稷之靈上安國家吾之願也如其不獲則奉身以死之漢雜事曰景帝時吴楚七國反齊孝王狐疑膠西濟北二國圍齊齊使路中大夫於天下還報曰堅守比至二國圍齊數重無從入二國與路中大夫盟曰若反言漢巳破大夫許之至城下望見齊王曰漢巳發兵百萬使太尉周亞夫擊破吴楚方引兵救齊齊必堅守二國誅之魏志曰許渚從征袁紹於官渡徐他等謀爲逆以禇常侍左右憚之不敢發伺禇休下日他等懷刀入禇至下舎心動即還侍他等不知入帳見禇大驚禇覺之即擊殺他等太祖益親信之又曰諸葛恪圍合肥新城城中遣士劉整岀圍傳消息爲賊所得栲問所傳語賊謂整曰諸葛公欲活汝汝可具服整罵曰我當必死爲魏國鬼不茍求活逐汝去也終無他辭又遣使鄭像岀城傳消息恪遣騎尋跡得像歸面縛繞城令整像大呼言大將軍巳還洛不如早降像更呼城中大軍近在圍外壯士努力賊以刀築口不使得語遂大呼令城中聞詔追賜整像爵關中侯又曰王修字叔治北海人魏國旣建爲大農郎中令徙爲奉常其後嚴才反與其徒属數十攻掖門修聞變召車馬未至便將官属歩至宫門太祖在銅爵臺望見之曰彼來者必王叔治也相國鍾繇謂修曰舊京城有變九卿各居其府修曰食其禄焉避其難居府雖舊非赴難之義也又曰諸葛誕爲鎮東將軍殺楊州刺史樂綝據壽春反遣司馬昭征之斬誕誕麾下三百人不降昭令曰不降皆斬衆咸曰願從諸葛公死不恨矣每斬一人諸人顔色不變時人謂之後代田撗蜀志曰鄧艾伐蜀遣書誘諸葛曕若降者必表爲瑯瑘王瞻怒斬艾使遂戰大敗臨陣死時年三十七衆皆散瞻長子尚與瞻俱殁又曰先主奔荆州曹公追之先主棄妻子走使張飛將二十騎距後飛據水斷橋瞋目撗矛曰我張益得也可來共決無敢近者又曰嚴顔巴郡人益州牧劉璋使顔守巴郡劉備入蜀圍成都璋岀降備諸郡皆伏唯顔守而不屈使將張飛攻巴郡生擒顔呵曰汝見將軍至何得不降今逆戰乎顔曰卿等無狀奪我州我但有斷頭將軍無降將軍飛怒令左右斬之顔曰斫頭便斫何怒耶飛壯其忠節釋之王隱晉書曰嵇紹以天子蒙塵奔詣行在所值王旅不振敗績於湯隂百官左右皆奔散唯紹儼然端冕以身扞衛兵交御輦飛箭雨集遂以見害晉中興書曰譙王承爲湘州刺史王敦遣叅軍桓羆說承以劉隗專寵令討之請承爲軍司馬承歎曰吾其死矣地荒民飢勢孤援絶赴君難忠也死王事義也得忠與義亦復何求便唱義衆府長史長沙人虞悝慷慨有志節共盟誓囚桓羆馳檄湘川於是一州之内並皆同赴又曰蘇峻反桓彛爲宣城内史徃赴朝廷長史禆惠等咸以冝且桉甲以謀湏衆力齊集彛厲色曰夫見無禮於其君者誅之如鷹鸇之逐鳥雀今社稷之難而欲逡廵將何以云衆力雖寡義無寧處長驅徃進㝷王師敗績彛慷慨流涕皆勸僞同以紓交至之禍如其不然重兵必至彛曰吾受國厚恩不能死節焉能忍辱與之通問如其不濟此郎命也遣俞縱進軍左右以力不敵勸縱退軍縱曰吾承桓侯厚遇吾之不可負桓侯猶桓侯不可負國也遂力戰而死峻遣韓晃因進軍討彛力屈𬒳害又曰易雄長沙瀏陽人爲舂陵令聞王敦作逆譙王承檄至雄馳檄逺近列敦罪惡俄而王師敗績敦得肆暴收雄姑熟以檄示焉雄曰有之惜雄位微力弱不能救國難安以生爲今日即戮得爲忠鬼乃其願也沈約宋書曰劉胡叛淮南定陵人賈襲宗夲縣巳爲胡所得率三十人救沈攸之沈攸之言於建安王休仁休仁拔爲司徒叅軍督護使還郷里招集爲胡所擒以火炙之問臺軍消息一無所言瞋目謂胡曰君稱兵内侮窺覦神器未聞竒謨逺略而爲炮烙之刑僕夲以身奉義死亦何有胡乃斬之後魏書曰河間公元齊烈帝之玄孫也少雄傑魁岸丗祖愛其勇壯引侍左右從征赫連昌丗祖馬蹶賊衆逼帝齊以身蔽捍決死擊賊乃退丗祖得上馬示曰微齊以身蔽捍㡬至危殆乃賜爵浮陽侯又曰叔孫俊字醜肆少聦敏年十五内侍左右朱提王恱懷刃入禁欲爲大逆俊覺恱舉動有異便引掣之乃於恱懷中得兩匕首遂執恱殺之范亭燕書曰孟髙字弘義長壯有雄姿慕容暐即位左遷衛將軍出避難將向龍都禁衛四散唯髙及殿中將女㓪等十餘騎從行逹福禄逢賊髙獨力戰賊射殺之唐書曰劉感歧州鳯泉人武德𥘉以驃騎將軍鎭涇州薛仁果率衆圍之感嬰城拒守城中糧盡遂殺所乗馬以分將士感一無所噉唯煑馬骨取汁和木屑食之城垂䧟者數矣長平王叔良援兵至仁果解圍而去感與叔良出戰爲賊所擒仁果復圍涇州令感語城中云援軍巳敗徒守孤城何益也冝早出降以全家室感許之反至城下大呼曰逆賊饑餓亡在朝夕秦王率數十萬衆四面俱集城中勿憂各冝自勉以全忠節仁果大怒執感於城邊埋脚至膝馳騎射殺之又曰張廵守雎陽在圍中每戰皆登城大呼以助軍勢皆血流面牙齒皆咬碎城將䧟廵西向拜曰臣不能全孤城今爲賊凌逼誓願爲鬼與賊爲厲以荅聖明及城䧟尹子竒入城見廵問曰聞公毎督戰皆裂嚙碎牙齒因以大刀剔其口見其存者不過三數將存之廵大詈之賊黨皆曰此人必不爲我用又得衆死心不可留故害之五代史曰後唐應順末少帝失位自洛渉河與數百騎欲奔鄴時晉髙祖改鎭常山亦自郡詣闕夜與帝遇於獲嘉東遂俱入衛郡郵舎中是夜少帝伏甲欲與徒臣謀害晉髙祖詐屏人對語方坐於亭廡帝宻遣御士石敢䄂鎚立其後伏甲者俄起左右驚優敢素有勇力擁晉髙祖入一室以巨木墓門敢力當其鋒㝷死焉吕氏春秋曰荆莊襄王獵於雲夢射隨兕中之申公子培刼而奪之王曰何其暴而不敬也命吏誅之左右大夫皆進諌曰子培賢者也又爲王百倍之臣此必有故願王察之也不出三月子培疾而死荆興師戰於兩棠大勝晉歸而賞有功者申公子培之弟進請賞於吏曰人之有功也於軍旅臣之兄有功也於車下王曰何謂也對曰臣之兄犯暴不敬之名觸死亡之罪於王之側愚以忠於君王之身而特千歳之壽也臣之兄甞讀故記曰殺隨兕者不出三月是以臣之兄驚懼而争之故伏其罪而死王令人發平府而視之於故記果有乃厚賞之申公子培其忠也可謂穆行矣穆美也穆行之意人知之不爲勸人不知之不爲沮行無髙乎此者又曰人殺衛懿公熒澤盡食其肉獨舎其肝弘演使還哭畢呼天而號盡哀而止曰臣請爲襮愽卜二音因自出其肝内懿公之肝襮表也新序曰崔杼殺莊公申蒯漁於海將入死之其御止之曰君無道聞於天下不可死也申蒯曰安得食亂君之禄而死治君之事乎申蒯至門曰請入吊門者以告崔杼杼令勿内申蒯曰汝疑我乎吾與汝臂乃斷左臂以與門者以示崔杼杼陳八列令其入申蒯拔劒呼天闘殺七列未及崔子一列而死又曰楚有士申鳴者在家而養其父孝聞於楚國王欲授之相申鳴辭不受其父曰王欲相汝汝何不受乎申鳴對曰捨父之孝子而爲王之忠臣何也其父曰使有禄於國立義於庭汝樂吾無憂矣吾欲汝之相也申鳴曰喏遂入朝楚王因授之相居三年白公爲亂殺司馬子期申鳴將徃死之父止之曰棄父而死其可乎申鳴曰聞夫仕者身歸於君而禄歸於親今去子事君得無死其難乎遂辭而徃因以兵圍之白公謂石乞曰申鳴者天下之孝子也徃刧其父以事兵申鳴聞之必來來與之語白公曰善則徃取其父持之以兵告申鳴曰子與吾吾與子分楚國子不與吾子父則死矣申鳴流涕而應之曰始吾父之孝子也今吾君之忠臣也吾聞之也食其食者死其事受其禄者畢其能今吾已不得爲孝子矣乃君之忠臣也吾何得以全身援桴鼔之遂殺白公其父亦死王賞之百斤金申鳴曰食君之食避君之難非忠臣也定君之國殺臣之父非孝也名不可兩立行不可兩全也如是而生何面目立於天下遂自殺襄陽耆舊傳曰魏伐蜀羅獻爲巴東太守得劉禪委質定問乃帥所部臨于都亭三日吴聞蜀巳敗遂起兵西上外託援救内欲襲獻城以固其國遣盛㬅等水陸到說獻以合同之計獻乃㑹議曰今夲朝傾覆吴爲同盟不恤我難而邀其利可主降於北臣求福於東乎今守孤城百姓未定冝一決戰以定衆心遂衘枚夜擊破㬅旋軍保城告誓將士厲以節義莫不用命襄陽記曰劉備以習珎爲零陵北部都尉孫權遣潘濬討珎珎帥數百人登山自將濬乃單將左右自到山下交語珎謂曰我必爲漢鬼不爲吴臣矣濬攻珎圍守月餘糧箭並竭珎謂群下曰珎受漢中王厚恩不得不報之以死諸君何爲者耶乃伏劒自裁又曰晉伐吴張悌渡江戰吴軍大敗諸葛靚過迎悌悌不肯去垂泣曰仲思今是我死日且我作兒童便爲卿家丞相所扶常恐不得其死負名賢知故今身殉社稷復何所遁華陽國志曰曹公察關羽不安使張遼以情問之曰極知曹公待我厚然吾受劉將軍恩不可背之要當立効報公公聞而美之是歳袁紹遣顔良攻東郡太守劉延於白馬公使遼羽爲先鋒羽望見麾䇿馬刺良於萬衆之中斬其首還遂解延圍公即表封羽壽亭侯重加賞賜羽盡封其物拜書告辭而歸先主周處別傳曰玄賊齊萬年爲亂乃以處爲建威將軍進軍大戰奮劍慷旣仰天歎曰古者將受賑鑿凶門以出盖有進無退我爲大臣以身殉國不亦可乎遂戰死太平御覽卷第四百一十七
