front:
  text: 太平御覽卷第三百六十五
  hash: sha256:a24fed4b4ca92d623a7c7343673628f6934ad50cb726ee26308cd2462f9d9049
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_365-1a}
body:
  text: 人事部六面眉面說文曰面顔前也從􅔣音首象人面形音于願切靣不正也頢音括短面也頷音胡感切靣黄也顬音刀丁切靣瘦淺顬顬也𧹞面慙赤也可圖曰蒼帝方靣赤帝圎靣白帝廣靣黒帝深靣周易革卦曰上六君子豹變小人革靣禮記内則曰女子出門必擁蔽其面左傳僖三十三年曰晉侯敗狄于箕先􅎮免胄入狄師死焉狄人歸其元靣如生言其有異於人又襄六曰鄭子産曰人心之不同也如其面焉吾豈敢謂子靣如吾面乎又襄四曰晉程鄭卒子産始知然明問爲政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀也子産喜以語子大叔曰他日吾見蔑之靣而巳今吾見其心矣又哀下曰楚白公作亂殺子西子期于朝而劫惠王子西以𬒮掩面而死葉公在蔡方城之外皆曰可以入矣及北門乃胄而進又遇一人曰君胡胄國人望君如望歳焉曰日以幾兾君來若見君面是得艾也艾安也史記曰孟戯中衍鳥身人面趙之先也漢書曰李夫人病篤上自臨候之夫人遂轉面向壁歔欷而不復言又曰哀帝𥘉即位博士申咸毀給事中薛宣不供養行䘮服薄於骨肉不冝復列封侯使在朝省宣子況爲右曹侍郎數問其語賕音求客揚明欲令創咸面目使不居位㑹司隷闕沉恐咸爲之遂令明遮斫咸宫門外斷鼻脣身八創事下有司沉減死一等宣坐免爲庶人又曰朱博爲左馮翊長陵大姓尚方禁少時曾盗人妻見斫創着其頰府功曹曰白除禁調守尉博聞知以他事召見視其面果有瘢博辟左右問禁是何等創也禁乃叩頭服博笑曰大丈夫固時有是因親信以爲耳目又曰朱博爲人廉儉不好酒色之宴自微賤至冨貴食不重味案上不過三杯夜寢早起妻希見其面又曰董仲舒廣川人也景帝時爲博士下帷講誦弟子以次相授業或莫見其面三年不窺園圃其精如此又曰孔休守新都相休謁見莽莽縁恩意進其玉貝寳劒欲以爲好休不肯受莽因曰誠見君面有瘢美玉可以滅瘢欲獻其玉璏耳音衛劒鼻也又曰張禹爲兒數隨家至市喜觀於卜相者乆而頗曉其别蓍布卦意卜者愛之又竒其靣貌謂禹父曰是兒多知可令學經東觀漢記曰耿秉爲征西將軍鎭撫單于以下及薨南單于舉國發哀犂靣流血後漢書曰應奉年二十時甞詣彭城相袁賀賀時出行閉門造車匠於内開扇出半面視奉奉即委去後數十年於路見車匠識而呼之魏略曰徐庶名福本單家子好任俠擊劒中平末甞爲人報讎白堊突面𬒳髮而走蜀志曰張𥙿曉相術每舉鏡照面自知死刑未甞不撲之于地又曰劉琰妻胡入賀太后太后令特留胡經月乃出胡有美色琰疑其與後主有私呼卒檛胡至於以履搏面而後棄遣胡具告言琰坐下獄有司議曰卒非檛妻之人面非受杖之地琰竟棄市呉志曰諸葛恪父瑾長面孫權大㑹羣臣使人牽一馿檢其面題曰諸葛子瑜也恪跪曰乞請筆益兩字因聽與筆恪續其下曰之馿舉坐忻笑乃以馿賜恪王隠晉書曰趙孟字長舒入𥙷尚書都令史善於清談有國士之風其面有疵黯諸事不決皆言當問疵面也晉中興書曰王珂爲桓温主簿二軍文武數萬人悉識其面晉書曰𥘉王恭敗梟首於東桁王平之抽槊刺其面又曰桓温字元子豪爽有風槩姿貌甚偉面有七星又曰劉牢之面紫赤色鬢目驚人而沉毅多計又曰劉𥙿於東府聚樗蒱大擲一判應至數百萬餘人並黒犢唯𥙿及劉毅在後毅次擲得雉大喜褰衣繞床叫謂同座曰非不能盧不事此耳𥙿因挼五木乆之曰老兄試爲卿荅即成盧焉毅意殊不快然素黒其面如鐵色焉宋書曰沈慶之謂帝曰耕當問奴織當問婢今論争伐問白面書生事何由濟又曰明帝大㑹新亭接勞諸軍主樗蒲賭官李安人五擲皆盧帝大驚目安人曰卿面方如田封侯狀也又曰劉瑀爲右衛將軍因求益州甚不得意至江陵與顔竣書曰朱循之三丗叛兵一日居荆州青油幕下作謝宣明面齊書曰東昏即位多行殺戮沈昭略與沈文季徐孝嗣同召入省例賜藥酒昭略罵徐孝嗣曰廢昏立明古今令典宰相無才致有今日即擲甌破面曰作破面鬼時年四十後梁書曰宋如周有才學爲度支尚書如周面狹長宣帝甞戯之曰卿何謗法華經如周踧踖自陳不謗帝又言之如周懼而出告蔡大寳寳知其旨笑謂之曰君當不謗餘經止應不信法華法華云開經隨喜面不狹長如周乃悟後魏書曰清河王懌𬒳誣見害朝野貴賤知與不知含悲喪氣逺夷在京師聞懌喪爲之以刀劈面者數百人三國典略曰髙長恭以淮南之亂恐爲將帥歎曰我去年面腄今歳何爲不發至是齊主使徐之範飲以毒藥長恭謂妃鄭氏曰我盡忠事上何辜於天而遭賜鴆之禍春秋後語曰秦急攻趙求救於齊齊王曰必以長安君爲質兵乃出長安君者太后之小子也太后愛之不肯遣大臣強諌太后怒謂左右曰敢復言長安君爲質者老婦必唾其面山海經曰大荒之山日月所入有顓頊之子三面一臂不死郭璞注曰人頭三邊各有靣也又曰一目國一目中其面而居尸子曰子貢問孔子曰古者黄帝四面信乎孔子曰黄帝合巳者四人使治四方大有成功此之謂四面也又曰禹長頸鳥喙面貌亦惡天下從賢之者學也孫卿子曰衛靈公有臣公孫吕身長七尺面長三尺廣三寸名動天下莊子曰孔子謂盗跖曰今將軍身長九尺二寸面目有光脣如激丹齒如含貝音中鍾聲而名曰盗跖丘竊爲將軍恥之韓子曰古人目短於面見故以鏡觀燕丹太子曰田光云脉勇怒而面青骨勇怒而面白荆軻者神勇也怒而不變說苑曰呉王將死曰吾以不用子胥言以至於今死者無知則巳死者有知吾何面見子胥也遂蒙絮覆面自刎吕氏春秋同典論曰袁紹妻劉性妬忌紹死其尸未殯殺其妾五人恐死者有知皆髠髮黒面中論曰小人恥其面不如子都君子恥其行不如堯舜譙周法訓曰昔有人使妻爲母作粥妻不肯乃以刀擊傷妻面此可爲孝乎傳子曰相者三亭九候定於一尺之面語林曰王武子與武帝圍碁孫皓㸔王曰孫歸命何以好剥人面皮皓曰見無禮於其君者則剥其皮乃舉碁局武子伸脚在局下又曰劉眞長病積時公主毀悴將終喚主主旣見其如此乃舉手指之云君危篤何以自脩飾劉便牽𬒳覆面背之不忍視又曰王右軍見杜弘冶歎曰面如凝脂眼如點􅃮如神仙中人又曰何晏字平叔美姿容帝疑其傳粉賜湯餅令晏食之汗出流面拭之轉白丗說同丗說曰康僧淵目深而鼻髙王丞相每調之僧淵曰鼻者面之山目者面之淵山不髙則不靈淵不深則不清又曰鍾㑹撰四本論始畢甚欲使嵇康一見置懷中不敢出户外遥擲面便走郭子曰琅邪諸葛忘名面病鼠瘻劉眞長見歎曰䑕乃復窟穴人面乎異苑曰陳郡謝石字石奴少患面創諸治莫愈乃自幽逺止於若下中宵有物來舐其創隨舐隨除旣不見形竟爲是龍而舐處悉白故丗呼爲謝白面㑹稽後賢記曰貞女謝仙女者謝承孫也呉歸命侯采仙女充後宮仙女乃炙面服醇醯以取黄瘦竟得免黄帝八十一問曰人面獨能寒何也曰頭者諸陽之脉㑹也諸隂脉皆至頸項不還上獨諸陽脉上頭故面能寒耳相決曰竒毛生身及面皆豪貴白毫黒毛生共孔帶印綬蔡邕女戒曰夫心猶面首也一且不脩飾則塵垢穢之人心不思善則邪惡入之人盛飾其面而莫脩其心惑矣眉說文曰眉目上毛也釋名曰眉媚也有娬媚也毛詩淇澳碩人曰螓首蛾眉螓首顙廣而方巧笑倩兮美目盻兮尚書大傳曰堯有眉八如八字也淮南子同大戴禮曰曾子曰敢問不勞可以爲明乎孔子愀然揚眉曰參汝以明主爲勞乎昔者舜左禹而右臯陶不下席而天下治禮說曰君子乗金而玉爲人美眉左傳定公八年曰公侵齊門于陽州顔息射人中眉顔息魯人退曰我無勇吾志其目也榖梁傳曰長狄兄弟三人遞爲害斷其首而載之眉見於軾戰國䇿曰豫讓欲報趙襄子滅鬢去眉吞炭􅃮春秋後語曰吕不韋謂太后曰詐腐刑􅓎毒則得給事中乃令人以腐罪告之拔其鬚眉以爲宦者漢書曰張敞爲婦畫眉長安中傳京兆眉憮應劭曰憮大也孟康曰憮音詡北方人謂好爲詡也東觀漢記曰王莽天鳯五年樊崇起兵於莒恐其衆與莽兵亂乃皆朱其眉由是號曰赤眉又曰明德馬后眉不施黛獨左眉角小缺𥙷之以縹又曰馬援自還京數𬒳進見爲人鬒髯眉目如畫又曰梁鴻居呉賃舂每歸妻爲具食不敢於鴻前仰視舉案齊眉鄧粲晉記曰荆州民宗廞甞以酒犯王平子怒叱左右捽廞郭舒厲色謂左右曰使君醉汝軰何敢妄動平子大恚曰別駕狂郎枉言我醉因遣炙舒眉頭舒跪受炙平子意釋而廞得免宋書曰王玄謨在雍人言欲反玄謨馳啓自解帝知其虚馳遣主書呉喜公慰撫之曰七十老公反欲何求聊復爲笑想足以伸卿眉頭耳玄謨性嚴未曽妄笑時人言玄謨眉頭未曾伸故以此見戯梁書曰武寜王大威字仁容美風儀眉目如畫三國典略曰梁簡文方頰豐下眉目秀發隋書曰元暉字叔平河南洛陽人也父智鬚眉如畫進止可觀少得美名於京師唐書曰毛若虚絳州太平人也眉毛覆於眼性殘忍𥘉爲蜀川縣尉天寳末爲武功丞年巳六十餘矣帝王丗紀曰文王虎眉列仙傳曰陽都女生而連眉衆以爲異列仙傳曰莫耶子赤鼻眉間一尺列士傳曰千將子赤鼻眉廣三寸荆州先賢傳曰馬良字季常襄陽冝城人兄弟五人皆有令名良眉中有白毛郷里頌曰馬氏五常白眉最良呉越春秋曰伍子胥眉間廣一尺韓子曰失鏡無以正鬢眉失道無以知迷惑吕氏春秋曰呉闔閭使民習戰劒如眉流血不可止淮南子曰今盆水在庭清之終日未能見眉睫濁之不過一撓而不能察方圎察見也人神易濁而難清猶盆水之類也風俗通曰桓帝元嘉中京師婦人作愁眉愁眉者細而曲折此梁兾家所謂京師皆效之天戒若曰將收捕兾婦女憂愁之眉也抱朴子曰有古強者自云四千歳云見堯舜禹湯說之了了丗云堯眉八采不然也直兩眉頭甚竪似八字眉唐子曰人多患逺見百歩而不自知眉頰知眉頰者復不能察百歩西京雜記曰卓文君妖冶好眉色如望逺山語林曰庾公道王尼子非唯事事勝於人布置鬚眉亦勝人我軰皆出其轅下樊氏相法曰眉中長毫百二十歳太平御覽卷第三百六十五
