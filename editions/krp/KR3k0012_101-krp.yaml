body:
  text: 皇王部二十六後魏諸帝太祖道武皇帝諸帝後魏書序紀曰黄帝有子二十五人或内列諸華或外分荒服昌意少子受封北國有大鮮卑山因以爲號其後丗爲君長統幽都之北廣漠之野畜牧遷徙射獵爲業淳樸爲俗簡易爲化不爲文字刻木紀契而已丗事逺近人相傳授如史官之紀録焉黄帝以土德王北俗爲土爲托謂后爲跋故以爲氏其裔始均入仕堯丗逐女魃於弱水北民頼其勲帝舜嘉之命爲田祖爰歴三代以及於秦熏鬻獫狁山戎匈奴之属累代殘暴作害中州而始均之裔不交南夏是以載籍無聞焉積六十七丗至成皇帝諱屯立聦武明智逺近所推統國三十六大姓九十威振北方莫不率服成帝崩節皇帝諱貸立節帝崩其後四丗宣帝諱推寅立南遷大澤方千餘里厥土昏冥沮洳謀更南徙未行而崩其後六丗獻皇帝諱隣立時有神人言於國曰此土方遐未足以建都邑冝復徙居帝年時襄老乃以授子聖武帝諱詰汾獻帝命令南移山谷髙深九難八阻於是欲止有神獸其形似馬其聲類牛先行導引歴年乃出始居匈奴之故地其遷徙䇿略多岀宣獻二帝故時人並號曰推寅蓋俗云鑚研之義𥘉聖武帝常率數萬騎田於山澤欻見輜軿自天而下旣至見美婦人侍衛甚盛帝異而問之對曰我天女也受命相偶遂同宿旦請還曰明年周時復㑹於此言終而別去如風雨及朞帝至先所遊處果復相見天女以所生男授帝曰此君之子也善視之子孫相承當丗爲帝王語訖而去即始祖神元皇帝也故時人諺曰詰汾皇帝無婦家力微皇帝無舅家帝崩神元皇帝立諱力微生而聦叡元年歲在庚子先是西部内侵國民離散依於没鹿廻部大人竇賔始祖有雄傑之度時人莫測後與賔攻西部賔軍敗失馬歩走始祖使人以所乗駿馬給之賔歸令其部内求與馬之人賞當加重賞始祖隠而不言賔後知大驚將分國之半以奉始祖不受賔臨終戒其二子使謹奉始祖其子不從乃隂謀爲逆始祖召而殺之盡并其衆部大人悉皆從服控弦士馬二十餘萬三十九年遷於定襄之盛樂始祖乃告諸大人曰我歴觀前丗匈奴蹋頓之徒茍貪財利抄掠邊民雖有所得而多其死傷復不足相𥙷更招㓂讎百姓塗炭非長計也於是與魏和親四十二年遣子文帝如魏且觀風土是歳魏景元二年也文皇帝諱沙漠汗以國太子留洛陽爲魏賔之冠魏晉禪代和好仍密始祖春秋巳邁帝以父老來歸晉武帝具禮護送四十八年帝至自晉五十六年帝復如晉其年冬還國晉遺帝錦罽繒綵綿絹諸物豐厚車牛馬百乗行逹并州晋征北將軍衛瓘以帝爲人雄異恐爲後患乃蜜白晋帝請留不遣晉帝難於失信不許瓘復請以金帛賂國之大人令致間隙使相厄害晉帝從之遂留帝於是國之執事及部人皆受瓘貨五十八年方遣帝始祖聞帝歸大恱使諸部大人詣隂舘迎之酒酣帝仰視飛鳥謂諸大人曰我爲女曹取之授彈飛丸應弦而落時國俗無彈衆咸大驚並先馳還始祖曰我子旣歴他國進德何如皆對曰太子才㙯非常引空弓而落飛鳥似得晋人異法術亂國害民之兆唯願察之自帝在晋之後諸子愛寵日進始祖年踰期頤頗有所惑聞諸大人語意乃有疑因曰不可容者便當除之於是大人乃馳詣塞南害帝後乃追謚焉始祖㝷崩凢饗國五十八年年一百四歲太祖即位尊爲始祖章皇帝諱悉鹿立始祖之子也饗國九年而崩平皇帝諱綽立章帝之少弟也饗國七年而崩惠帝弗立丈帝少子思即位一年崩昭皇帝立諱禄官始祖神元之子也九年分國爲三部帝自以一部居東在上谷北湏源之西東接宇文部以文帝之長子桓皇帝諱猗㐌統一部居代郡之叅合陂北以桓帝之弟穆皇帝諱猗盧統一部居定襄之盛欒故城自始祖以來與晉和好百姓乂安財畜冨實控引騎士四十餘萬十年晉惠帝爲城都王頴逼留在鄴匈奴別種劉淵反於離石號漢王并州刺史司馬騰來乞師帝與桓帝同時大舉以助之大破淵衆於西河上黨晋假桓帝大單于金印紫綬是歲桓帝崩帝英傑魁岸馬不能勝常乗安車駕大牛牛角容一石帝曽中蠱嘔吐之地仍生榆木叅合陂土無林樹故丗人異之至今傳記十三年昭帝崩是歲羯胡石勒與晉馬牧帥汲桑反穆皇帝天姿英峙勇略過人昭帝崩後遂揔攝三部以爲一統元年劉淵僣帝自稱大漢三年晉并州刺史劉琨遣使以子爲質又遣使乞師救洛陽帝遣歩騎二萬助之晉太傳東海王司馬越辤以洛中飢饉師還是年劉淵死子聦僣立五年劉琨遣使乞師以討劉聦石勒以琨忠義矜而許之㑹聦遣其子粲攻洛陽害琨父母而據其城琨来告難帝大怒遣長子六脩桓帝子普根及衛瓘范班姬澹等爲前鋒帝統大衆二十四萬爲後繼粲懼弃輜重突圍遁走縱騎追斬其將劉豐伏尸數百里琨來拜謝帝以禮待之琨固請進軍帝曰吾不早來致卿父母見害誠以後時相愧今卿巳復州境然吾逺來士馬疲弊且侍後期賊豈可盡乎與琨馬牛羊各千餘車牛百乗又留勁銳戍之而還六年城盛樂以爲北郡脩故平城以爲南郡帝登平城西山望觀地勢乃更南百里於灅水之陽黄瓜堆築新平城晋人謂之小平城使子六脩鎮之統領南部九年帝召六脩不至帝怒討之失利乃微服民間遂崩普根先守外境聞難來赴功六脩㓕之普根立月餘而薨也平文皇帝諱欝律立惠帝之子也二年西兼烏孫故地東吞勿吉以西控胘上馬將有百萬劉聦死焉族子曜僣立帝聞晉愍帝爲曜所害頋謂大臣曰今中原無主天其資我乎劉曜遣使請和帝不納是年司馬叡稱大位於江南四年桓帝后以帝得衆心恐不利於巳子帝遂崩大人死者數十人天興𥘉尊曰太祖惠皇帝諱賀傉立桓帝之中子也未親政事太后臨朝遣使與石勒通和時人謂之女國使四年帝始臨朝五年崩煬皇帝諱紇那立惠帝之弟也五年岀居於宇文部賀蘭及諸部大人共立烈帝烈皇帝諱翳槐六平文之長子也石勒遣使來和帝遣弟昭成皇帝如襄國二年石勒僣立自稱大趙王烈皇帝崩昭武皇帝諱什翼犍立平文之次子也生而竒偉寛仁大度喜怒不形于色身長八尺隆凖龍顔立髪委地卧則乳垂至席烈帝崩頋命曰必迎立什翼犍社稷可安烈帝崩帝弟彌乃自詣鄴奉迎與帝俱還建國元年十一月帝即位於繁畤之北時年十九二年始置百官分掌衆職八年張駿私署假凉王十三年魏郡人冉閔殺石鑒僣立十四年氐符健僣稱天王自號大秦十五年慕容儁㓕冉閔僣稱尊號二十七年舂車駕還雲中冬十一月討没歌部破之獲牛馬羊數百萬頭三十四年春長孫斤謀反伏誅斤之反也拔刃向御座太子獻明皇帝諱寔格之傷脅夏五月薨後追謚焉秋七月皇孫珪生大赦三十九年符堅遣其大司馬符落率衆二十萬朱彤張蚝音刺鄧羌等諸道來㓂侵逼南境冬十一月白部獨孤部禦之敗績南部大人劉庫仁走雲中復遣庫仁率騎十萬逆戰於石子嶺王師不利帝時不豫十二月至雲中旬有二日帝崩時年五十七太祖即位尊曰髙祖帝雅性寛厚智通仁恕時國中少繒帛代人許謙盗絹二疋守者以告帝匿之謂燕鳯曰吾不忍視謙之面卿勿泄言謙或慙而自殺爲財辱士非也太祖道武皇帝後魏書曰太祖道武皇帝諱珪昭成皇帝之嫡孫獻明皇帝之子也母曰獻明賀皇后𥘉因迁徙遊于雲澤即而寢因夢日出室内寤而見光自牖属天欻然有感以建國三十四年七月七日生太祖於叅合陂北其夜復有光明昭成大恱羣臣稱慶大赦告於祖宗保者以帝體重倍於常兒竊獨竒怪明年有榆生於埋胞之坎後遂成林弱而能言目有光曜廣顙大耳衆咸異之年六歲昭成崩元年葬昭成皇帝於金陵營梓宫木材盡生成林帝雖冲㓜而嶷然不羣劉庫仁常謂其子曰帝有髙天下之志興復洪業光揚祖宗者必此主也登國元年春正月帝即代王位郊天建元大㑹於牛川復以長孫嵩爲南部大人以叔孫普洛爲北部大人班叙勲舊各有差夏四月改稱魏王是歲慕容垂僣稱皇帝位於中山自號大燕姚萇僣稱皇帝於長安自號大秦六年秋七月講武於牛川慕容永使其大鴻臚慕容釣奉表勸進尊號冬十月北征蠕蠕如蠢切追之及於大磧南啇山下大破之班賜從臣各有差十有二月出居于馬邑是歲起河南宫七年秋八月行幸漢南仍築廵臺八年春正月帝出南廵二月幸羖羊原起白樓皇始元年春正月大蒐于定襄之虎山三月慕容垂來宼桑乾川陳留公元䖍先鎭平城時帝徴兵未集䖍率麾下邀擊失利死之垂遂至平城西北踰山結營聞帝將至乃築城自守疾甚遂遁走死於上谷子寳迎喪而還至中山乃僣立秋七月左司馬許謙上書勸進尊號帝始建天子旌旗出入警蹕於是改元八月治兵于東郊大舉討慕容寳親勒六軍四十餘萬南出馬邑踰于句注旌旗駱驛二千餘里寳并州牧遼西王農棄城東遁并州平𥘉建臺省置百官封拜公侯將軍刺史太守尚書郎巳下悉用文人帝𥘉拓中原留心慰納諸王大夫詣軍門者無少長皆引入賜見存問周悉人得自盡苟有微能咸䝉叙用冬十月車駕出井陘十一月進軍中山引騎圍之二年春正月饗羣臣於魯口慕容寳遣其左衛將軍慕容騰宼博陵殺中山太守及髙陽諸縣令長抄掠租運是時信都未下帝乃進軍引騎圍之寳將軍張讓護軍將軍徐超率將吏以下舉城降寳聞帝幸信都乃趣博之深澤屯沲水遣弟賀麟宼楊城三月車駕次于盧妖寳遣使求和解焉仍請割常山以西奉魏乞守中山以東帝許之巳而寳背約車駕次中山命諸將圍之是夜寳弟賀麟妻子岀走西山寳見賀麟走恐先據和龍壬子夜遂將其妻子及兄弟親族數千騎北遁城内共立慕容普隣爲主麟復入中山殺普隣而自立九月賀麟飢窮率三萬餘人出宼新市甲子晦帝進軍討之太史令晁崇奏曰不吉帝曰其義云何對曰昔紂以甲子亡兵家忌之帝曰紂以甲子亡周武不以甲子勝乎崇無以對冬十月帝進軍西市賀麟退阻派水依漸洳澤以自固甲戍臨其營戰於義室塢大破之斬首九千餘級賀麟單馬走西山遂奔鄴慕容德殺之中山平遣三萬騎赴衛王儀將以攻鄴天興元年春正月慕容德走保滑臺克鄴車駕幸鄴廵登臺榭觀覽宫城將有定都之意乃置行臺以龍驤將軍曰南公和跋爲尚書與左丞賈㝷率郎吏及兵五千人鎮鄴車駕自鄴還中山所過存問百姓詔大軍所在州郡復貲租一年除山東民租賦之半車駕將北還發卒萬人通直道自望都鐡關鑿恒嶺至代五百餘里六月詔有司議定國號羣臣奏曰昔周秦以前帝王居所生之土有國有家及王天下即承爲號自漢以來罷侯置守時無丗継其應運而起者皆不由尺土之資今國家萬丗相承啓基雲代臣等以爲若取長逺應以代爲號詔曰昔朕逺祖揔御幽都控制遐國雖踐王位未定九州迨于朕躬百代之季天下分裂諸華乏主民俗雖殊撫之在徳故躬率六軍掃平土宇凶逆蕩除遐邇率服冝仍先號爲魏焉秋七月迁都平城始營宫室建宗廟立社稷八月詔有司正封畿制郊甸端經術摽道里平五權較五量定五度冬十月起天文殿十有一月詔尚書吏部郎中鄧淵典官制立爵品定律吕恊音樂儀曹郎中盧謐撰郊廟社稷朝覲饗宴之儀三公郎中王徳定律令申科禁太史令晁崇造渾儀考天象吏部尚書崔玄伯㹅而裁之十有二月帝駕臨於天文殿太尉司徒進璽綬百官咸稱萬歳大赦改年追尊成皇帝巳下及后號謚樂將皇始之舞詔有司議定行次尚書崔玄伯等奏從土德服色尚黄數用五未社辰臘犧牲用白五郊立氣宣賛時令敬授民時行夏之正徙六州二十二郡守宰豪傑吏民二千家于代都二年春正月𥘉祠上帝于南郊以始祖神元皇帝配降壇視燎成禮而反二月破髙車以所獲之衆起鹿苑於南臺隂北距長城東苞白登屬之西山廣輪數十里鑿渠引武川水注之苑中䟽爲三溝分流宫城内外又穿鴻鴈池三月𥘉令五經羣書各置博士増國子太學生貟三千人秋七月起天華殿大閱于鹿苑饗賜各有差冬十月太廟成迁神元平文昭成獻明皇帝神主于太廟三年三月立皇后慕容氏是月穿城南渠通於城内作東西魚池夏四月姚興遣使朝貢五月車駕東廵遂幸涿鹿遣使者以太牢祠帝堯帝舜廟七月車駕還宫起大中殿及雲母堂金華室四年三月帝親漁薦于寢廟五月起紫極殿玄武樓冬十二月集博士儒生比衆經文字義類相從凡四萬餘字號曰衆文經六年冬十月起而昭陽殿乙夘立皇子嗣爲齊王加車騎大將軍位相國是年島夷桓玄廢其主司馬徳宗而自立僣稱大楚天賜三年九月幸漠南鹽池至漠中觀天鹽池六年夏帝不豫𥘉服寒食散自太醫令隂羗死後藥數動發至此逾甚而灾變屢見憂懣莫困切不安或數日不食或不寢逹旦歸咎羣下喜怒乖常謂百寮左右曰人不可信慮如天文之占或有肘腋之虞追思旣徃成敗得失終日竟夜獨語不止若傍有鬼物對揚者朝臣至前追其舊惡便見殺害其餘或有顔色變動或以喘息不調或以行歩乖節或以言詞失措帝皆以爲懷惡在心變見於外乃手自毆擊死者皆陳天安殿前於是朝野人情各懐危懼有司廢怠莫敢相督攝百工偷刼盗賊公行巷里之間人爲稀少帝亦聞之曰朕故縱之使然待過灾年當更清治之耳冬十月帝崩於天安殿在位十四年時年三十九先時國内有䜟曰珪厄清河死萬人帝破滅清河郡手殺萬人以厭之夜恒變易寢處人莫得知唯愛妾萬人知處帝子清河王紹與萬人通懼罪同害帝帝歎曰清河萬人乃是汝耶元帝立誅紹及萬人永興二年九月上謚宣武皇帝葬於盛樂金陵廟號太祖太常五年改謚曰道武太平御覽卷第一百一
