front:
  text: 太平御覽卷第六百一十五
  hash: sha256:2ded7ecc7998a6670320a3327aa92b3c43e64ec19da8ad27e2e790b3c28c243e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_615-1a}
body:
  text: 學部九講說廣雅曰講讀也說文曰講和解也易曰麗澤兊君子以朋友講習論語曰德之不脩學之不講聞義不能徙不善不能改是吾憂也漢書曰夏侯勝毎講常謂諸生曰士病不能明經經術茍明其取青紫如俯拾地芥學經不明不如歸耕又曰孔光居公輔位前後十七年時㑹門下大生講問疑難舉大義其弟子多成就爲博士又曰董仲舒治春秋孝景時爲博士下帷講誦弟子以次授業或莫見其面又曰班伯爲中常侍成帝方嚮學鄭寛中與張禹朝夕入說尚書論語於金華殿中詔伯授焉又曰元帝時少府五鹿充宗貴幸爲梁丘易充宗乗貴辯口諸儒莫能與抗皆稱疾不敢㑹有薦朱雲者召入攝齋升堂抗首而說音動左右旣論難連柱五鹿君文穎曰柱閣也諸儒爲之語曰五鹿岳岳朱雲折其角由是爲博士遷杜陵令又西京雜記曰長安有儒生惠莊聞朱雲折五鹿充宗之角乃歎息曰薾栗犢反能尓耶吾終耻溺死溝中遂褁粮從雲雲與言莊不能對逡廵而去拊心語人曰吾不能劇談此中多有人東觀漢記曰朱祐字仲先𥘉光武學長安時過朱祐祐甞留上湏講竟乃談語及車駕幸祐家問主人得無去我講乎又曰建𥘉四年詔諸儒㑹白虎觀講五經同異又曰桓榮爲博士顯宗即位乗輿幸太常府令榮坐東面設几杖㑹百官數百人天子親自執業又曰桓榮拜議郎入侍太子毎朝㑹輙令榮於公卿前敷奏經書帝稱善又曰顯宗親於辟雍自講所制五行章句巳復令桓郁說一篇上謂郁曰我爲孔子卿爲子夏起我者啇也又問郁曰子幾能傳學郁曰臣子皆未能傳覺孤兄子一人學方起上曰努力教之有起者即白之又曰楊政字子行治梁丘易與京兆祁聖元同好俱名善說京師號曰說經鏗鏗楊子行論難僠僠祁聖元又周舉字宣光姿皃短陋而博學洽聞爲儒者所宗京師語曰五經縱撗周宣光也又曰井丹字大春通五經時人謂之語曰五經紛綸井之大春又陳嚚字君期明韓詩時語曰關東說詩陳君期又曰魯平字叔陵兼通五經關東號曰五經復興魯叔陵也又曰賈逵字景伯能講左氏及五經本文以大小夏侯尚書教授諸儒爲之語曰問事不休賈長頭後漢書曰鄭玄西入關因涿郡盧植事扶風馬融融門徒四百餘人升堂者五十餘生融素驕貴玄在門下三年不得見乃使髙業弟子傳授於玄玄日夜㝷誦未甞怠倦㑹融集諸生考論圖緯聞玄善筭乃召見於樓下玄因質諸疑義問畢辭歸融喟然謂門人曰鄭生今去吾道東矣又盧植於馬融受學融列女樂在於前植侍講積年未曽轉眄馬融是以敬之又曰大將軍袁紹緫兵兾州造使要鄭玄大㑹賔客玄最後至乃延升上座玄身八尺飲酒一斛秀眉明目容儀温偉紹客多豪俊見玄儒者未以通人許之競設異端百家玄起玄依方辯對咸出問表皆得所未聞莫不嗟服謝承後漢書曰董春字紀陽少好學究極聖旨後還歸立精舎逺方門徒學者常數百人諸生毎升講堂鳴鼓三通撗經捧手請問者百人追隨上堂難問者百餘人又曰戴馮字次仲徴拜郎中公卿大㑹群臣就席馮獨立丗祖問之對曰博士說經皆不如臣坐居臣上是以不得就席正旦朝賀帝令群臣說經義有不通輙奪其席以益通者馮重五十席京師諺曰解經不窮戴侍中後漢書曰丁鴻字孝公少好尚書十六能論難永平中引見說文侯一篇賜衣𬒳章帝㑹諸儒白虎觀上善鴻難說號之曰殿中無雙丁孝公魏書曰文帝𥘉在東宫氛癘大起時人凋傷帝深感難與素所敬者大理正郎書云人生有七尺之形死爲一捾之土唯立德揚名可以不朽其次莫如著篇籍疫癘數起士人凋落余獨何人能全其壽故論撰所著典論詩賦盖百餘篇集諸儒於肅成門内講論大義侃侃無倦晉書曰鄭玄爲散騎常侍光禄勲嘉平三年拜司空及髙貴郷公講尚書冲執經親授沈約宋書曰魏齊王毎講肆經通輙使太常釋奠先聖先師於辟雍又曰元嘉十五年徴雷次宗至京師開舘聚徒授教使丹陽尹何尚之立玄學太子率更令何承天立史學司徒叅軍謝元立文學九四學並建之梁書曰中宗於敬賢殿講老子僕射王褒執經百僚皆預講席中宗談折摙辯間以嘲謔在座者相顧解頥又曰沈峻字士嵩武康人也博通五經尤長周禮時吏部郎中陸倕與僕射徐勉書薦峻曰凢聖可講之書必以周官立義然則周官一書實爲群經源本此學不傳多歴年所唯助教沈峻特精此書比日開講群儒劉嵒沈熊之徒皆執經下座北靣受業莫不歎服人無間言也又伏曼傳曰宋明帝好周易常集朝臣於清暑殿講詔曼容執經曼容素美風采明帝恒以方嵇叔夜使吴人陸探微畫叔夜像以賜之爲尚書外兵郎甞與袁粲罷朝㑹言玄理時論以爲一臺絶又曰盧黄范陽涿人少明經有儒術天監中歸梁位歩兵校尉兼國子博士遍講五經時北來人儒學者有崔靈恩孫詳蔣顯並聚徒講說而音辭鄙拙唯廣言論清雅不類北人僕射徐勉兼通經術深相賞好後爲㝷陽太守武陵王長史卒官又曰賀琛字國寳㓜孤伯父瑒授其經業一聞便通義理瑒異之常曰此兒當以明經致貴瑒卒後琛家貧常往還諸曁敗粟以養母雖自執舟檝閑則習業尤精三禮年二十餘瑒之門徒稍從問道𥘉瑒於郷里聚徒教授四方受業者三千餘人瑒天監中亡至是復集琛矣琛乃築室郊郭之際茅茨數間年將三十便事講授旣丗習禮學究其微精占術先儒吐言辯㓗坐之聽受終日不疲後周書梁晉熈郡王蕭大圜當元帝時以丗多忌恐讒愬生焉乃屏絶人事門客左右不過三兩人不妄遊狎恒以講詩書易爲事梁元帝甞自問五經要事數十條大圜辭約指明應荅無滯梁元帝甚歎美之因曰昔河間好學尓旣有之臨淄好文尓亦兼之然東平爲善弥髙前載吾重之愛之尓當傚焉北史曰後魏元善遷國子祭酒上甞親臨釋奠令善講孝經於是敷陳義理兼之以諌上大恱曰聞江陽之說更起朕心賚絹一百疋衣一襲又曰盧景𥙿博通經典齊文襄入相於第開講招延時儁令景𥙿解所注昜景𥙿理義精微吐發閑雅時有問難或相詆訶大聲厲色言至不遜而景𥙿神彩儼然風調如一從容往復無際可㝷由是士君子嗟羡之後周書曰吕思禮東平壽張人也性温潤不雑交遊年十四受學於徐遵明長於論難諸生爲之語曰講書論易鋒難敵隋書曰後齊將講於天子先定經於孔父廟置執經一人侍講二人執讀一人擿句二人録義六人奉經二人講之旦皇帝服通天冠玄紗𫀆乗象輅至學坐廟堂上講訖還便殿改服綘紗𫀆乗象輅還宫講畢以一太牢釋奠孔父配以顔囬列軒懸樂六佾舞行三獻禮畢皇帝服通天冠綘紗𫀆升阼即座宴畢還宫皇太子每通一經亦釋奠又曰馬光爲太子博士甞因釋奠髙祖親幸國子學王公巳下畢集光升座講禮啓發章句巳而諸儒生以次論難者十餘人皆當時碩學光剖析凝滯雖辭非俊辯而理義引贍論者莫測其淺深咸共推服上嘉而勞焉又曰元善通博在何妥之下然以風流醖藉俯仰可觀音韻清明聽者忘倦由是爲後進所歸妥毎懷不平心欲屈善因善講春秋𥘉發題諸儒畢集善私謂妥曰名望巳定幸無相苦妥然之及就講肆妥遂引古今滯義以難善多不能對善深衘之二人由是有隙唐書曰太宗幸國子學視釋奠祭酒孔頴逹講孝經右庻子趙引智問之曰夫子門人曽閔俱稱大孝而今獨爲曽說不爲閔說何耶荅曰曽孝特優門人不能逮也制旨駮之曰朕聞家語云昔曽晢使曽參鋤瓜而誤断其本晳怒授大杖以擊其背參手扑地絶而後蘇孔子聞之告門人曰參來勿内旣而曽子請焉孔子曰舜之事父也使之常在側欲殺乃不可得小箠則受大杖則走今參誤於父委身以待暴怒䧟父於不義不孝莫大焉由斯而言孰愈於閔子騫也頴逹不能對太宗又謂侍臣曰諸儒各生異意皆非聖人論孝之本旨也夫孝者善事父母自家刑國忠於其君戰陣勇朋友信揚名顯親此之謂孝具在經典而論者多離其文逈出事外以此爲教勞而非法何謂孝之道耶語林曰劉真長與桓公宣武共聽講禮記桓公云時有入心處便覺咫尺玄門殷氏丗傳曰殷亮建武中徴拜博士諸儒講論勝者賜席亮重至八九三國典略曰東魏崔暹子逹挐年十三暹令儒者教其說周易兩字乃集朝貴名流逹挐升髙坐開講趙郡睦仲讓陽屈服之暹大恱擢仲讓爲司徒中郎鄴下爲之語曰解義兩行得中郎太平御覽卷第六百一十五
