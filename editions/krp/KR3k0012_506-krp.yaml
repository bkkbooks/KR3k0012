front:
  text: 太平御覽卷第五百六
  hash: sha256:3495bd98a1907bd90ad783276273e91c5279319fddde9f258aacb42228286c3e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_506-1a}
body:
  text: 逸民部六逸民六隋書隱逸傳曰李士謙字子約趙郡平棘人也髫齓喪父事母以孝聞母曽嘔吐疑爲中毒因跪而嘗之伯父瑒深所嗟尚每稱曰此兒吾家之顔子也後丁母憂居䘮骨立服闋舎宅爲伽藍脫身而出詣學請業研精不倦遂博覧群籍兼善天文術數隋有天下畢志不仕自以少孤未嘗飲酒食肉口無殺害之言至於親賔來萃輒陳樽俎對之危坐終日不倦李氏宗黨豪盛毎至春秋二社必髙㑹極歡無不沉醉諠亂嘗集士謙所盛饌盈前而先爲設黍謂群從曰孔子稱黍爲五榖之長荀卿亦云食先黍稷古人所尚容可違乎少長肅然不敢㢮惰退而相謂曰旣見君子方覺吾徒之不德也士謙聞而自責曰何乃爲人所踈頓至於此家冨於財躬處節儉毎以賑施爲務開皇八年終於家又曰崔廓字士玄博陵安平人也少孤貧而母賤由是不爲邦族所齒𥘉爲里佐屢逢屈辱於是感激逃入山中遂愽覽書籍多所通渉山東學者皆宗之旣還郷里不應辟命與趙郡李士謙爲忘言之友毎相徃來時稱李崔及士謙死廓哭之慟爲之作傳輸之祕書府士謙妻廬氏寡居毎有家事輒令人諮廓取定廓嘗著論言刑名之理其義甚精大業中終于家時年八十又曰徐則東海郯人也㓜沉静寡嗜欲受業於周弘正善三玄精論議懷栖隱之操杖䇿入縉雲山後學數百人苦請教授則謝而遣之不娶妻常服巾褐陳太建時應召來憇於至真觀朞月父辤入天台山因絶粒養性所資唯松水而巳雖隆冬沍寒不服綿絮𥘉入縉雲山太極真人除君降之曰汝年出十八當爲王者師然後得道也晉王諱鎭知其名手書詔之遂詣楊州其後夕中命侍者取香火如平常朝禮之儀至五更而卒支體柔弱如生又曰張文詡河東人也父琚開皇中爲洹水令以清正聞有書千卷教訓子姪皆以明經自逹文詡愽覽文史特精三禮髙祖引致天下名儒碩學之士文詡時逰於太學學内翕然咸共宗仰其門生多詣文詡請質疑滯文詡輒博引證據辨說無窮唯其所擇右僕射蘇威聞其名而召之與語大恱勸令從官文詡意不在仕固辤仁壽末學廢文詡䇿杖而歸灌園爲州郡頻舉皆不應命事母以孝聞毎以德化郷黨頗移風俗嘗有人夜中竊刈其麥者見而避之盗因感悟棄麥而謝文詡慰論之自誓不言固令持去經數年盗者向郷人論之始爲逺近所悉州縣以其貧素將加賑恤輒辤不受每閑居之際從容長歎曰老冉冉而將至恐修名之事不立以如意擊几皆有處所時人方之閔子騫原憲終於家時年四十郷人爲立碑頌號曰張先生唐書隱逸傳曰王績字無功絳州龍門人也少學李播吕才爲莫逆之交隋大業中應孝悌廉㓗舉楊州六合縣丞非其所好弃官還郷里績河渚中先有田十數頃隣渚有隱士仲長子先服食飬性績重其真素願與相近乃結廬河渚以琴酒自樂嘗逰北山因爲北山賦以見志績又嘗躬耕於東皐故時人號東皐子或經過酒肆動經數日徃徃題壁作詩多爲好事者詠諷貞觀十八年卒臨終自剋死曰遺命薄葬兼預自爲墓誌又曰田逰岩京兆三原人也𥘉𥙷太學生後罷歸逰於太白山毎遇林泉㑹意輙留連不能去其母及妻子並有方外之志與逰岩同逰山水二十餘年後入箕山就許由廟東築室而居自稱許由東隣調露中髙宗幸嵩山遣中書侍郎薛元超就問其母遊岩山衣田冠出拜帝令左右扶止之謂曰先生養道山中比得佳否遊岩曰臣泉石膏肓煙霞痼疾旣逢聖代幸得逍遥帝曰朕今得卿何異漢獲四浩乎因將遊岩就行宫授崇文學士令與太子少傅劉仁䡄談論帝後將營奉夫宫于嵩山遊岩舊宅先在宫側特令不毁仍親書題額懸其門曰隱士田遊岩宅又曰史德義蘇州崑山人也咸亨𥘉隱居武丘山以琴書自適或騎牛帶瓢出入郊郭東市號爲逸人髙宗聞其名徴赴洛陽尋稱疾東歸公卿巳下皆赴詩餞别德義亦以詩留贈其文甚羙天授𥘉江南道宣勞使周興表薦則天徴赴都詔曰蘇州隱士史德義志尚虚玄素履貞確謙冲彰於里閈孝友表於閨庭固辤徴辟長徃嚴陵之瀨多謝簮𥚑髙蹈愚公之谷朕承天革命建極開階寤寐星雲物色林壑順禎期而捐薜帶應休運以解荷裳粤自海隅來遊魏闕行藏之理所得去就之節無違風操可知啓沃攸佇特冝優奬委以諌曹授諌議大夫後放歸丘壑又曰王友貞懷州河内人也弱冠時母疾篤醫言唯啖人肉乃差友貞獨念無可求理乃割股肉以飴親母疾尋差則天聞之令就其家驗問持加旌表友貞素好學讀九經皆百遍訓誨子弟如嚴君焉口不言人過尤好釋典屏絶羶味出言未曽負諾時論以爲眞君子中宗在春宫召爲司議郎不就神龍𥘉又拜太子中舎人仍令所司以禮徴赴及至固以疾辤玄宗在東宫又表請禮徴之以年老竟辤疾不赴年九十餘開元四年卒特下制贈銀青光禄大夫又曰盧鴻一字浩然夲范陽人也徙家洛陽少有學業頗善籕篆楷隷隱於山開元𥘉遣備禮再徴不至五年下詔徴之至東都謁見不拜宰相問其故奏言臣聞老君言禮者忠信之薄不足可依山臣鴻一敢以忠信奉見上别召昇内殿賜之酒食詔曰盧鴻一應辟而至訪之政道有㑹淳風爰舉逸人用勸天下特冝授諌議大夫放之還山又曰王希夷徐州滕人也孤貧好道父母終爲人牧羊取傭以供葬葬畢隱於嵩山師道士黄𦣱向四十年盡能傳其閉氣道飬之術頥卒更居兖州徂徠山中與道士劉玄博爲棲遁之友好易及老子嘗餌松栢葉及雜花散景龍中年七十餘氣益壯刺史盧齊卿就謁致禮因訪以字人之術希夷曰孔子稱巳所不欲勿施於人可以終身行之矣及玄宗東廵勑州縣以禮徴召至駕前年巳九十六上令中書令說訪以道義宦官扶入宫中與說甚恱詔授朝散大夫守國子博士聽致仕還山又曰衛大經者篤學善易口無二言則天降詔徴之辤疾不起與魏州人夏侯乹童有舊聞乹童母卒徒歩往弔之郷人止之曰當夏溽暑豈可涉千里致書可也大經曰尺書安能盡意遂行至魏州㑹乹童出行大經造門設席行吊禮不訊其家人而還開元𥘉畢勾爲刺史謂解令孔愼言曰衛生德厚冝有旌異古人式千木之閭禮賢故也愼言造門就謁時大經巳年老辤疾不見嘗預筮死日先鑿墓自爲誌文如筮而終又曰李元凱者博學善天文律暦然性恭愼口未嘗言之郷人宋璟年少時師事之及作相使人遺元凱束帛將薦舉之皆拒而不荅景龍中元行冲爲洺州刺史邀元凱至州問以經義因遺之衣服元凱辭曰微軀不冝服新麗但恐不能勝其義以速咎也行冲乃以泥塗汚而與之不獲巳而受乃還乃以巳之所蚕素絲五兩以酬行冲曰義不受無妄之財年八十餘終又曰徐仁紀者聖曆中徴拜左拾遺三上書論得失不納謂人曰三諌不聽可去矣遂移病歸郷里神龍𥘉宣慰使舉仁紀之行可以激俗又徴拜左𥙷闕三上書又不省乃詣執政求出授靈昌令妻子不之官廨舎唯衣履及書䟽而巳餘無所蓄又曰孫處玄者長安中徴爲左拾遺頗善屬文常恨天下無書以廣所聞神龍𥘉桓彦範等用事處玄遺彦範書論時事得失彦範竟不用其言乃去官還郷里以病卒又曰白履忠陳留凌儀人也愽渉文史嘗隱居于古大梁城時號爲梁丘子景雲中徴拜校書郎尋棄官而歸開元十年刑部尚書王志愔表薦履忠隱居讀書貞苦守操有古人之風堪代禇無量馬懷素入閤侍讀乃徴赴京師及至辭以老病不任職事詔授朝散大夫停留數月而歸履忠郷人左庶子呉兢謂履忠曰吾子家室屢空竟不霑斗米疋帛雖得五品何益於實也履忠欣然尋以壽終又曰崔覲梁州城固人也爲儒不樂仕進以耕稼爲業老而無子乃以田宅家財分給奴婢令各爲主業覲夫妻遂隱於城固南山家事一不問約奴婢遞過其舎至則供給酒食而己夫婦林泉相對以嘯詠自娱山南節度使鄭餘慶髙其行辟爲節度叅謀累邀方至府第爲吏無方略苦不逹人事餘慶以長者優容之太和八年左𥙷闕王直方薦覲有髙行詔以起居郎徴之覲辝疾不起卒於山皇甫士安髙士傳曰王倪者堯時賢人也師𬒳衣齧缺又學於王倪問道焉齧缺曰子不知利害則至人固不知利乎王倪曰至人神矣大澤焚而不能熱河漢􅴟而不能寒疾雷破山暴風振海而不能驚若然者乗雲雨騎日月而遊天地之外死生無變於巳而况利害之間乎又曰善卷者古之賢人也堯聞其得道之士乃北面師之而問道焉及舜受終之後又以天下讓卷卷曰昔唐氏之有天下不教而民從之不賞而民勸之天下均平百姓安静民不知怒不知喜今子盛爲衣裳之服以觀民目調五音之聲以亂民耳作皇韶之樂以愚民心耳目益榮天下之亂從此始矣吾雖爲之其何益乎予立宇宙之中冬衣皮毛夏衣絺葛春耕種形足以勞秋収歛身足以休日出而作日入而息逍遥於天地之間而心意自得何以天下爲哉遂不受去入深山莫知所終矣又曰齧缺尭時人許由師事齧缺堯又師由問曰齧缺可以配天乎旣而齧缺遇由由曰子將何之曰將逃堯曰何謂也曰夫堯知賢人之利天下而不知其賊天下遂逃不見又曰巢父堯時隱人年老以樹爲巢而寢其上故時人號曰巢父堯之讓許由也由以告巢父巢父曰汝何不隱汝形藏汝光若非吾友也擊其膺而下之由悵然不自得乃過清泠之水洗其耳拭其目曰向者聞言負吾矣遂去終身不相見又曰許由字武仲隱乎沛澤之中堯聞乃致天下而讓焉由乃退而耕於中嶽頴水之陽箕山之下史記又載又曰壤父者堯時人年五十而擊壤於道中觀者曰大哉帝之德也壤父曰吾日出而作日入而息鑿井而飲耕田而食帝何德於我哉又曰蒲衣者舜時賢人也年八歲而舜師之遂讓以天下蒲衣不受而去莫知所終又曰老萊子者楚公室亂逃丗耕於蒙山之陽蓬蒿爲室技杖於牀飲水食菽墾山播種人或言於楚王王於是駕至萊子之門萊子方織畚王曰守國之政孤願煩先生老萊子曰諾王去其妻樵還曰子許之乎老萊子曰然妻曰妾聞之可食以酒肉者可隨而鞭棰夫可擬以官禄者可隨而鈇鉞妾不能爲人所制者妻投其畚而去老萊子亦隨其妻至於河南以萊子爲老子人莫知其所終也又曰顔回字子淵貧而樂道退居陋巷曲肱而寢孔子曰尓家貧居卑何不仕回曰回有郭外田六十畒足以供饘粥有郭内圃六十畒足以供絲麻鼓宫啇之音足以自樂習所聞於夫子足以自娯回何仕焉又曰弦髙者鄭人也鄭穆公時髙見鄭爲秦晉所逼乃隠不仕爲啇人及晉文公之返國也與秦穆公伐鄭圍其都鄭人私與秦盟而晉師退秦又使大夫祀子等三人戍鄭居三年晉文公卒襄公𥘉立秦穆公方強使百里西乞白乙率師襲鄭過周及滑鄭人不知時髙將市於周遇之謂其友蹇他曰師行數千里又數經諸侯之地其勢必襲鄭凡襲國者以無備也示以知其情必不敢進矣於是乃矯鄭伯之命以十二牛犒秦師且使人告鄭爲備祀子亡奔齊孟明等返至殽晉人要擊大破秦師鄭於是賴髙而在鄭穆公以存國之賞賞髙而髙辝曰詐而得賞則鄭國之信廢矣爲國而無信是敗俗也賞一人而敗國俗智者不爲也遂以其屬徙東夷終身不返太平御覽卷第五百六
