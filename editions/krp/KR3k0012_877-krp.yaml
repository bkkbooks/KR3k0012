  text: 太平御覽卷第八百七十七
  hash: sha256:04fac437101a13401248d6e11468df14ba67e004d1744cc0b1d704952221baf7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_877-1a}
body:
  text: 咎徴部四雲五色雲青雲黄雲赤雲黒雲氣白氣赤氣黒氣雨無雲而雨雨土雨沙雨灰雨血雨肉雨毛雨水雨花雨草雨糓雨魚雨螽雨錢雨水銀雨金雨續雨帛雲周禮春官曰眂祲掌十煇之法以觀妖祥四曰監八曰叙鄭司農曰監雲氣臨日也叙者雲有次叙如山在日上也而散吏皆壓佐袁山松後漢書曰中平四年雲氣如足相次重疊彌天國志暦曰晉咸和元年七月雲闘聲如暴風雨五色雲宋書曰前廢帝景平二年有雲五色如錦其年五月司空徐羡之廢帝爲滎陽王青雲河圖曰靑雲刺月五糓不熟傍多赤雲如人頭大戰月旁有白雲如杵者三貫月六十日内有兵戰月始出有黒雲貫名激雲不出三日暴雨黄雲崔鴻十六國春秋曰後趙石勒建平四年有赤黄雲如幕長數十疋其年勒死又曰冉閔永興三年有雲黄赤色起東北長百餘丈是歳閔爲慕容儁所殺春秋運斗樞曰勢集於后族羣妃之黨僣黄雲四合女訛驚邦春秋感精符曰妻黨翔則黄雲入國候今冬至日見雲黒有水雲赤白如人頭懸鏡之狀禍流赤雲左傳曰哀公六年有雲如衆赤鳥夾日而飛三日楚昭王使問周太史太史曰其當王身乎若禜之可移於令尹司馬王弗禜而卒孔子曰楚昭王知天道矣不失國冝哉黒雲趙書曰石虎建武四年東南卒有雲黒稍分爲三疋又貫日日没後分爲七枚相去數十丈其間有白雲如魚鱗虎子韜曰當有刺客後果爲太子宣所殺氣釋名曰祲祲也赤黒之氣相侵也周禮曰春官眂祲掌十煇之法以觀妖祥一曰祲鄭司農云祲隂陽氣相侵也左傳曰昭公十五年春將禘于武公戒百官梓慎曰禘之日其有咎乎吾見赤黒之祲非祭祥也䘮氣也其在莅事乎二月祭貞禘叔弓蒞事籥入而卒春秋運斗樞曰赤人刺房赤人賊氣而刺房房天王之明堂火星也吕氏春秋曰亂國之王其氣有豊上歛下有若水之狀有若山之狀春黄夏黒秋蒼冬赤崔鴻十六國春秋北凉録曰玄始十一年春正月饗群臣于謙光殿沮渠蒙遜曰南方有惡氣經天暴兵衆也不出一旬必有㓂問命治兵東苑以備之西秦遣騎七千來襲至縣孫猴嶺聞有備而還三輔舊事曰漢作靈臺以四孟之月登臺而觀黄氣爲疾病赤氣爲兵黒氣爲水也白氣漢書曰哀帝建平元年有白氣從地至天出叅下貫太廟廣如疋布長十餘丈哀帝隂病候也續漢書曰孝和永元十六年四月丁未紫宫中生白氣如粉絮占爲喪又曰孝靈嘉平二年八月辛未白氣如疋練衝北斗第四星占爲大戰明年冬楊州刺史臧旻攻盗賊於建康斬首數千級蜀李書曰哀帝即位有白氣二道帶天望氣者言宫中有伏兵果爲卭都公所害也晉書曰懷帝永嘉三年十二月有白氣如帶自地昇天南北各二至五年石勒劉曜王彌皆㓂洛陽帝蒙塵于平陽劉聦封帝爲㑹稽公又曰成帝咸和元年後蜀李雄玉衡二十四年雄死太子班立有白氣如帶經天太史占有隂謀班不悟爲李期所殺宋書曰文帝元嘉二十六年十二月夜有白氣貫於北斗屬子地至明年魏太武至瓜歩江陳書曰文帝天嘉五年六月夜有白氣兩道出于北斗東南屬子地後年四月帝崩太子伯宗立廢爲臨海王又曰宣帝太建五年二月夜有白氣貫于北斗紫宫屬于地至明年北齊兵至于江隋書曰蕭吉煬帝嗣位拜太府少卿行經華隂見楊素家上有白氣屬天宻言於帝帝問其故吉曰其後素家當兵禍絶滅之象改葬可免帝後謂玄感曰公家冝改葬玄感亦微知其故以爲吉祥託以遼東未滅不遑私門之事未幾玄感以反族誅赤氣漢書曰成帝永始三年二月癸未夜東方有赤白色氣大三四圍長二三丈索索如樹南方有大樹四五圍下莖十五餘丈皆不至地䜟占曰東客之變氣狀如樹木以此知四方欲動者明年十二月己夘尉氏男子楚並等謀反庚子山陽䜟官亡徙蘇令等爲大賊一日有兩氣同時起而並令等同月而俱發又曰王莽建國四年夏赤氣出東南竟天明年二月元帝王皇后崩後漢書曰獻帝興平末年夜有赤氣貫紫宫明年改元建安政歸曹氏晉書曰惠帝大安二年赤氣竟天又永興二年十一月夜有赤氣竟天其年十二月成都王頴攻洛陽又曰懷帝永嘉元年正月天氣晝赤氣有聲如雷明年劉元海僣位宋書曰文帝元嘉七年十一月西北有赤氣中黒如旌旗至八年滑臺爲魏軍圍粮盡城中燻䑕而食之後魏書曰莊帝永安三年十一月己丑有赤氣如霧從顯陽殿階西南角斜屬廊髙一丈連地如絳紗自未至戍不滅帝見而惡之隋書曰周静帝大定元年有赤氣起西方東行遍天下七月隋公堅禪又曰隋大業末越王侗東都留守爲王丗充所幽丗充自立爲丞相百官㹅巳於尚書省受冊設樂文武陪位於㕔西有赤氣如絳慢自辰至戌而滅旬日世充乃殺朝士元文都盧楚遂簒位黒氣史記曰周靈王二十年有五黒氣如日至景王五大夫争權後漢書曰靈帝光和元年六月有黒氣墮所御温徳殿庭十月皇后宋氏廢至中平元年鉅鹿人張角稱黄巾帥部三十六萬同反叛宋書曰明帝太始二年二月夜有黒氣五東西經天南行隋書曰梁元帝承聖三年六月有黒氣如龍見殿内其年元帝爲西魏所擒又曰陳廢帝臨海王時十月日入時有黒氣如雲入日中其年見廢雨史記曰夏桀末年大雨水俄爲湯所放京房易妖占曰雨鳴瓦任威武大臣專擅霖雨壞道尚書洪範咎徴曰狂恒雨若君行妄則常雨左傳曰莊公十一年秋宋大水公使吊焉曰天作淫雨害於粢盛若之何不吊對曰孤實不敬天降之災又以爲君憂拜命之辱春秋繁露曰木有變則春多雨此徭役衆賦歛重故也京氏别對災異曰人君擅私恩恣意縱情不與臣下同謀即致偏雨夜墮也不救致苦雨降萬民愁勞水絶道其救也興公道無私黨此災消矣漢書曰文帝後三年秋大雨晝夜不絶三十五曰流殺民家新垣平謀反之徴又曰昭帝時秋大雨自七月至十月時帝㓜霍光專政又曰成帝時秋大雨四十餘日時王氏舉宗在朝之應又曰哀帝時夏大雨雹又冬大風雨雹其年郡國四十一雨水明年京師及郡國又四十一雨水海賊張伯路與平原劉文光等攻厭次殺令長又曰王莽地皇中赤眉殺太師羲仲莽遣太師王匡討之莽兵出東都門外天大雨沾衣長安父老歎曰是爲軍泣時百姓飢荒莽令煑草爲酪不可食重於煩費又曰四年六月光武兵至昆陽莽使司徒王㝷司空王邑將兵百萬圍之㑹天大風飛屋瓦雨下如注二公兵亂敗自相殘殺滍水爲之不流後漢書曰靈帝時夏京師大雨水其秋中常侍曹節矯詔誅太傅陳蕃將軍竇武遷太后於北宫至後年京師又雨水暴出其年竇太后崩是苦雨之應也又曰獻帝𥘉平𥘉董卓逼帝入長安將入宫日大雨晝昬卓殺太傅袁隗太僕袁基及男女宗族五十餘人又曰獻帝時夏大雨水時曹操殺皇后伏氏又曰獻帝末司徒王允殺董卓卓將李􅔸郭汜攻䧟長安殺戮甚衆乃収卓尸葬於郿葬日大風雨雨水從藏溢漂卓棺岀於穴俄而􅔸汜皆𬒳殺續漢書曰建光元年京都及郡國二十九淫雨傷稼是時羗反乆未平百姓屯戍不解愁苦又曰桓帝延熹二年夏霖雨五十餘日是時大將軍梁兾秉政又曰靈帝建寧元年夏霖雨六十餘日是時大將軍竇武謀廢中官其年九月長樂五官史朱瑀等共中常侍曹節起兵闕下武敗走追斬武兄弟死者數百人魏志曰明帝時大雨殺鳥雀時帝居䘮不哀出入弋獵故有恒雨爲罰之變晉書曰元帝時大雨四十餘日晝夜雷電時王敦興兵王師敗續又曰成帝時頻年大雨恒雷時蘇峻餘黨猶據石頭帝㓜權在臣下也齊書曰明帝時王敬則爲大司馬拜日大雨洪注文武失色敬則後竟𬒳誅崔鴻十六國春秋曰後趙石勒將㓂鄴霖雨三月不止王師敗季龍于臣靈口赴水死者五百餘人勒軍大飢相食又曰石勒元年大霖雨滂沱泛溢衝山䧟谷巨松僵拔東至于海原隰之間皆如山積後文騫擊勒孔萇大敗而歸後又霖雨中山暴水流漂巨木百萬後有季龍篡奪之事隋書曰魏静帝時大雨七十餘日後元瑾荀濟劉思逸謀殺齊文宣不遂咸𬒳誅又曰北齊武成清河年大雨晝夜不息數十日山東大水人多餓死是年匈奴來㓂并州又曰後主大統三年積隂大雨時太后淫亂也隋書曰文帝仁壽元年夏驟雨震雷大風抜木冝君湫水移於始平明年獨孤后崩唐書曰則天長安四年九月霖雨兼雪凢隂一百五十餘日至神龍元年正月五王誅二張孝和反正方見晴霽又曰徳宗貞元二十一年順宗風病王叔文用事連月隂雨不霽乃以憲宗爲皇太子制岀日即晴傳所謂皇之不極厥罰恒隂皆此類也無雲而雨春秋感精符曰失陽事則無雲而雨宋均注曰四月純陽用事失陽故無雲而雨也河圖袐徵曰主急妄怒矢陽事則主無雲而雨京氏别對災異曰無雲暴雨何人君封拜無功進無徳則致不雲而暴雨過惡暴楊誅反受罪宻雲而不雨其救也誅疆䘏弱信及兆民雲雨時也隋書曰梁武帝時雨自七月至十月是時頻年興師士卒疲弊又曰元帝承聖中湘州賊陸納推李洪雅爲王羽議器甲甚精徒黨勇銳時天日晴明𥘉無雲霧軍發之際忽然風雨時人謂爲軍泣百姓竊言知其敗也元帝命竟陵太守王僧辨討平之京房曰若岀軍之日無雲而雨此天泣軍没不還雨不沾衣名曰鬼泣其軍必敗抱朴子曰無雲而雨是爲雨血將軍當楊兵講武以應之大雨軍中甚必無功雨土京房易傳曰内滛亂百姓勞苦則天雨土此小人將起是謂黄生目土失其性則雨塵土沙灰皆土之類尚書中候曰夏桀無道山亡土崩殷紂時十日雨土於毫紂竟國滅伏侯古今注曰漢武帝元朔四年雨土又曰昭帝始元二年雨土晝昬又曰元帝建昭四年雨土梁書曰武帝大同元年雨土二年又雨黄塵如雪攬之盈掬時帝溺於佛法興造尤甚後魏書曰世宗景明四年凉州雨土如霧時舅尚書令髙肇專政俄而𬒳殺隋書曰隋文帝開皇二年京師雨土四年関中亂飢諸王各謀爲逆時内營都邑後起仁壽宫丁匠死者太半雨沙隋書曰梁簡文時雨黄沙時侯景陵上其年人相食雨灰隋書曰梁武大同年雨灰色黄時帝惡人勝巳又信佛法捨身爲奴蔽賢絶道後有侯景之亂雨血戰國䇿曰齊湣王三十一年侵伐隣國窮兵極武外怨於諸侯内失於百姓燕將樂毅連五國兵以伐之湣王出走楚使淖齒救齊淖齒謂王曰夫千乗愽昌間地方數百里雨血沾衣嬴博之地坼及至泉有人當闕而哭求之不得去則又聞其聲王悉知之乎王曰不知淖齒曰天地人皆以告矣而王不知何得無誅遂殺湣王以與燕闘而敗漢書曰惠帝時冝陽雨血一頃時諸吕用事殺三皇子建立非嗣退大臣王陵趙堯周昌后崩大臣共誅滅諸吕僵尸流血之應又曰哀帝時山陽雨血廣三尺長五尺大者如錢小者如麻後二年王莽擅朝誅貴戚丁傅董賢用事晉書曰惠帝永康元年三月尉氏雨血明年正月趙王倫篡位遷帝於金墉城其後天下大兵禍流王室崔鴻十六國春秋曰前趙劉聦建元元年十二月雨血於左司隷寺覆地其月又雨血東宫延明殿徹瓦在地者深五寸二年四月雨血於東宫其年十二月又雨血於東宫廣袤頃餘麟嘉元年二月雨血東宫其月又雨血於光極殿來年雨血平陽廣袤十里其月聦死劉璨爲靳淮所殺又曰後趙石遵時雨血周遍鄴城俄爲石鍳冉閔所廢閔遂滅石氏誅胡人又曰南燕慕容超將敗東萊雨血俄而國亡又曰後蜀李勢末年天雨血俄降於桓温也隋書曰文帝時突厥雍閭可汗境内雨血三日俄而爲隋師所㓕唐書曰髙祖武徳𥘉突厥處羅可汗欲侵中夏㑹天雨血三日乃止而處羅疽發而死雨肉後漢書曰桓帝時廉縣雨肉似羊肺大如手時梁兾專政盗賊攻掠明年梁大后崩兾亦敗魏志曰公孫淵將亡襄平北市生肉長圍各數丈有頭目口喙無手足而動摇占曰有形不成有體無聲其國滅亡其年司馬宣王討平之晉書曰愍帝建興元年十二月河東雨肉劉石擁兵帝竟没遇害崔鴻十六國春秋曰前趙劉聦時有流星起于牽牛入紫宫龍形委曲蛇行光照地落于平陽北十里視之則肉臭聞平陽長三十歩旁常有哭聲墨子曰殷紂滅年天雨肉其年爲周武王所滅雨毛京房曰邪進賢退前樂後憂金失其性則雨毛也漢書曰武帝時天雨白毛明年又雨之時征役繁興户口凋散晉書曰武帝時蜀雨白毛益州刺史皇甫晏爲牙門張弘謀害隋書曰文帝開皇六年京師雨毛如馬尾長者二尺餘六七寸其月梁士彦宇文忻劉昉以謀反誅明年發十萬人築長城又於楊州開山造瀆以通運衆役繁興雨毛之應雨氷漢書曰桓帝時京師雨氷其年皇后梁氏崩梁兾與妻自殺崔鴻十六國春秋曰涼張駿二年九月雨氷狀若絲纊皆着草雨花隋書曰文帝仁壽年在仁壽宫頻天雨花大者徑寸小者如榆莢又曰毛州天雨金銀花遍四十餘里雨草京房曰君恡禄信衰厥妖雨草火失其性則草妖漢書曰元帝時雨草而葉相摎結大如彈丸時帝外氏權盛京房曰國破亡若雨孽人主殃又曰平帝時雨草狀如元帝時王氏專政至於莽乃篡位政在私門之家宋書曰明帝太始四年雨草于宫明年魏侵青州殺太守雨榖史記曰梁惠成王八年雨黍于齊京房曰雨五榖人相食又曰燕丹囚於秦天雨粟於燕後秦滅之後漢書曰光武末陳留雨粟形如稗實雨魚漢書曰成帝時雨魚長五寸巳下時王氏專政崔鴻十六國春秋曰後蜀李期末年大雨魚於宫中其色黄其年爲李壽廢殺之又曰夏赫連勃勃鳯翔元年五月雨魚于統萬時興役尤甚雨螽史記曰魯文公三年雨螽劉向以爲宋殺大夫而無罪有暴虐賦歛之應雨錢廣五行記曰後魏宣武景明年海陵人黄㝷家貧忽風雨錢飛至家後巨富錢數萬其後𬒳誅雨水銀隋書曰文帝仁壽四年八月仁壽宫内再雨水銀又陜州雨水銀奏髙祖髙祖知非祥其年太子逆殺漢王諒舉兵天下將亂之應雨金史記曰晉惠公二年雨金至六年秦穆公涉河伐晉雨續宋書曰孝武大明七年㑹稽雨續委於山澤續如麻紵脆似地毛至八年大餓横屍原野雨原宋書曰文帝元嘉十七年七月張仲舒晨夕輙見門側有赤氣赫然空中忽雨絳羅於庭中廣七八分長五六寸皆以箋𥿄繫之紙廣長與羅等紛紛甚駃舒惡而焚之舒經宿暴死太平御覽卷第八百七十七
