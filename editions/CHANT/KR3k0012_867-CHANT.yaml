body:
  text: 飲食部二十四醯釋名曰苦酒淳毒甚者酢且苦也周禮曰醯人掌共五齊七菹凡醯物以共祭祀之齊菹凡醯醬之物賓客亦如之齊菹醬屬醯人者皆酒醯成味王舉則共齊菹醯物六十罋共後及世子之醬齊菹賓客之禮共醯五十罋凡事共醯儀禮曰醯醢百罋夾碑十以為列禮曰宋襄公葬其大人醯醢百甕又曰大功之喪不食醯醬父母之喪又朞而大祥有醯醬論語曰子曰孰謂微生高直或乞醯焉乞諸其鄰而與之史記曰通邑大都酤千釀醯漢武內傳曰西王母仙上藥有鳳林鳴酢魏名臣奏曰劉放奏云今官販苦酒與百姓爭錐刀之末宜其息絕吳錄地理志曰吳王築城以貯醯醢今俗人呼苦酒城晏子春秋曰蘭本三年而成湛之苦酒則君子不近庶人不佩風俗通曰酢如蓂莢按蓂味酸工者取以調味愽物志曰酒暴熟者酢醢酸者易臭又曰龍肉以醯漬則文章生葛洪肘後方曰治齒痛用三年醶酢唐書曰初薛仁果拔秦州召富人磔於猛火之上或以醯灌鼻求其金寶又曰任迪簡萬年人舉進士初為天德軍使李景略判官性重厚常有宴行酒者誤以醯進迪簡知誤以景略性嚴慮坐主酒者乃勉強飲盡之而為容其過以酒薄景略請換之於是軍中感悅醢周禮曰醢人掌四豆之實朝事之豆其實韭菹醓醢昌菹麋臡菁菹鹿臡茆菹麋臡饋食之豆其實葵菹蠃脾析蜱醢蜃蚳醢豚拍魚醢加豆之實芹菹兔醢深蒲醓醢箈菹鴈醢筍菹魚醢又曰醢人為王及后世子共其內羞王舉則共醢六十罋以五齊七醢七菹三臡實之齊當為齏五齏昌本脾析蜃豚拍深蒲也十醢醓蠃蠯蚳魚兔鴈醢七菹韭菁茆葵芹箈筍三菹臡麋鹿麋臡也凡醢醬所和細切為齏全物若䐑為菹也賓客之禮共醢五十罋致罋餼時凡事共醢禮曰孔子哭子路於中庭寢中庭也與哭師同親之有人吊者夫子拜之為之主也既哭進使者而問故使者自衛來計者故謂死之意狀使者曰醢之矣時衛世子蒯聵纂輒而立子路死之醢之者爾欲啖食以悕眾遂命覆醢覆棄之不忍食禮記外傳曰祭祀賓客菹醢之用醢肉醬之通名醢汁也湆亦汁也此等皆在豆以其濕故也籩竹器何盛乾也豆木也皆跌足取其去地高潔醢有陸產畜之所生在陸者有水物天地陰陽之炁所生水草之品非人力所種自然潔臡者骨肉相雜為之有麋鹿麇之臡麇大獐也字或作䴦兔醢蚔醢皆陸產也砥蟻卵也有魚鴈蠃蜱之醢蜃蛤之類也蜃似蚌而長也五者水物崔寔四民月令曰五月一日可作醢弘君舉食檄曰東里獨姥之醢
