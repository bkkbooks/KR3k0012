body:
  text: 人事部一百三十八酣醉說文曰酣樂酒也又曰酒卒曰醉各卒其度量不至於亂也一曰瀆也易未濟曰有孚于飲酒無咎濡其首有孚失是飲酒有思信而無保言尤濡其首有孚失是況酒無節至濡首雖有飲酒之信失是不醉之節明飲酒不節濡首不可不戒也象曰飲酒濡首亦不知節也毛詩曰既醉告太平也既醉以酒既飽以德又曰幽王荒廢褻近小人飲酒無度沈湎淫泆是曰既醉不知其尤醉而既出並受其福醉而不出是謂伐德左傳曰重耳及齊齊桓公妻之公子安之姜曰行也公子不可姜與子犯醉而遣之醒以戈逐子犯史記曰范睢事魏中大夫須賈使齊睢從齊襄王聞睢辨乃使人賜睢牛酒須賈以為睢持軍事告齊故得此饋還以告魏相魏齊大怒使舍人笞睢折脅拉齒睢佯死既卷簀置廁中賓客飲酒醉更溺睢睢從簀中謂守者曰既出我我厚謝公守者乃請棄簀中死人齊醉曰可矣又曰齊威王置酒後宮召淳于髡賜酒問曰先生能飲幾許而醉髡曰飲一斗亦醉飲一石亦醉王曰先生飲一斗而醉迺能飲一石哉髡曰賜酒大王之前執法在傍御史在後髡恐懼俯伏而飲一斗徑醉若州閭之會男女雜坐前有墮珥後有遺簪髡竊樂此飲可八斗堂上燭滅主人留髡而出送客羅襦衿解微聞香澤當此之時髡心最欣能飲一石又曰曹參為漢相國無所變更一遵蕭何日飲淳酒卿大夫以下皆欲言來者參輒飲酒醉而後去終莫得開說又曰景帝召程姬姬有所避而飾侍者唐兒使夜進上醉不知以為程姬而幸之遂有娠及生子命曰發為長沙王漢書曰漢高祖為泗上亭長亭中吏無所不狎侮好酒及色常從王媼武負貰飲酒醉臥武負王媼見其上常有怪此兩家常折券棄債又曰高祖被酒夜經澤中令一人前前者還報曰前有大虵當徑高祖醉曰壯士何畏乃前拔劍斬虵分為兩道開行數里醉因臥又曰萬石君徙居陵里內史慶醉歸入外門不下車萬石君聞之不食慶恐肉袒請罪不許舉宗及兄建肉袒萬石君讓曰內史貴人入閭里中長老皆走匿而內史坐車中如故乃謝罷慶慶及諸子入里門趍至家又曰衛青伐匈奴右賢王當青等以為漢兵不能至飲醉漢兵夜至圍右賢王驚而夜逃又曰李廣當斬贖為庶人與故潁陰侯屏居藍田南山射獵嘗夜從一騎出從人田間飲還至亭灞陵尉醉呵止廣廣騎曰故李將軍尉曰今將軍尚不得夜行何故也宿廣亭下又曰陳遵為京兆尹嗜酒每大飲賓客滿堂輒閉門取車轄投井中雖有急終不得去有部刺史奏事過遵值其方飲刺史候遵宿醉時突入見遵母乃叩頭白當對尚書有期會乃令從後閤出去遵雖常醉然事亦不廢又曰邴吉始於官屬掾史務掩過揚善吉馭吏嗜酒數逋蕩嘗從吉出醉嘔丞相車下茵西曹主吏白欲斥之吉以醉飽之失去士使此人將復何所容西曹忍之此不過汙丞相車茵耳遂不去也東觀漢記曰更始納趙萌女為夫人有寵遂委政於萌日夜與婦人飲讌後庭群臣欲遂言事輒醉不能見乃令侍中坐帳內與語諸將識非更始聲出皆怨謝承後漢書曰劉寬為太尉嘗朝見寬被酒沈醉伏地睡詔問太尉醉耶寬仰對曰巨不敢醉但任重責大憂心如醉魏志曰徐邈字景山魏國初建為尚書郎時科禁酒而邈私飲沉醉校事趙達問以曹事邈曰中聖人達白太祖甚怒渡遼將軍鮮于輔平曰醉客謂清酒為聖人濁酒為賢者邈性脩慎偶醉言耳後文帝踐祚問邈曰頗復中聖人不對曰宿瘤以醜見知微臣以醉見識帝大笑顧左右曰名不虛也又曰曹仁為關羽所圍太祖以曹植行征虜將軍欲令救仁植醉不能受命於是罷之蜀志曰蔣琬字公琰除廣都長先主嘗因遊觀奄至廣都眾事不理時又沉醉先主大怒將加罪戮諸葛亮請曰蔣琬社稷之器非百里之才也願主父重加察之乃不加罪吴志曰孫權為吴王遊宴之後起自行酒虞飜伏地陽醉不持權去飜起坐權於是大怒欲手擊之大司農劉基起抱權諫曰大王以三爵後殺善士雖飜有罪天下孰知之權曰曹孟德尚殺孔文舉孤於虞飜何有哉基曰孟德輕害名士天下非之今大王躬行仁德欲與堯舜比隆何得自喻于彼乎由是得免權因勑左右自今酒後言殺皆不得殺也又曰孫皓大會群臣王蕃沉醉頓伏皓疑而不悅蕃轝出以頃之請還酒亦小解蕃性有威嚴行止自若皓大怒呵左右於殿下斬之魏典略曰董卓雖親愛呂布然時醉酒則罵之以刀劍擊之不中布恐終被害乃先畜死士以戟剌卓卓曰布何在布曰有詔遂殺之又曰時苗字德胄出為壽春令楊州治在其縣時蔣濟為治中苗以初至往欲謁濟濟素嗜酒適會其醉不能見恚恨還刻木為人署曰酒徒蔣濟豎之於牆下旦夕射之又曰丁沖為司隸校尉後數歲過諸將飲酒美不能止醉爛腸死也晉書曰羊曇者太山人知名士也少為謝安所愛重安薨後輟樂彌年行不由西路州嘗因石頭大醉扶路唱樂不覺至州門也左右白曰此西州門曇悲感不已以馬策扣扉誦曹子詩曰生存華屋處零落歸山丘因慟哭而去又曰王恭傳會稽王道子置酒於東府尚書令謝石因醉為委巷之歌恭正色曰居端右之重集藩王之第而肆淫聲欲令群下何所取則石深衘之又曰王蘊素嗜酒末年尤甚及在會稽略少醒日然猶以和簡為百姓所悅又曰顧榮傳齊王召為大司馬主簿擅權驕恣榮懼及禍終日昏酣不綜府事以情告友人長樂馮熊熊謂長史葛旟曰以顧榮為主簿所以甄拔才望委以事機不復計南北親踈欲平海內之心也今府大事殷非酒客之政旟曰榮江南望士且居職日淺不宜輕代易之熊曰可轉為中書侍郎榮不失清顯而府更收實才旟然之白以為中書侍郎在職不復飲酒人或問之曰何前醉而後醒耶榮懼乃復更飲晉中興書曰畢卓字茂世為吏部郎比舍郎釀熟卓因醉夜至其甕間取酒飲之掌酒者縛卓郎往視之釋縛宴於甕側取醉而去又曰周顗代戴淵為護軍尚書紀瞻置酒請顗及王導等二十人顗荒醉失儀復為有司所奏檀道鸞晉書曰桓玄詣會稽王道子道子已醉對玄張目矚四座云桓溫作賊玄見此醉勢難測伏地流汗宋書曰荊州刺史王忱范太外弟也忱嗜酒醉輒累旬及醒則儼然端肅太謂忱曰酒雖會性亦所以傷生也又曰孔顗使酒仗氣每醉輒彌日不醒僚類之間多所凌忽尤不能曲意權倖莫不畏而疾之又曰陶潛嘗九月九日無酒出宅邊菊藂中坐久之值王弘送酒至便酌大醉而歸崔鴻後趙錄曰石勒制法甚嚴兼諱胡尤峻有醉胡乘馬突入止車勒大怒謂宮門小執法馮翥曰夫人君為令將使下之無犯吾尚望威行天下況於宮閤之間向馳馬入門為是何人而不彈白縱之耶翥惶懼忘諱對曰向醉胡乘馬馳入甚呵衛之而不可與語所謂互鄉難與言小人所不能制勒笑曰胡正自難與言恕而不罪崔鴻前秦錄曰建武十四年堅宴群臣於釣臺以祕書監朱肜為酒正堅曰今日之飲當以落池為限史典論曰荊州牧劉表跨有南土子弟驕貴並好酒為三爵大曰伯雅次曰仲雅小曰季雅伯受七升仲受六升季受五升又設大鍼於坐端客有醉酒寢地輒以劖音讒剌驗其醒醉是醜於趙敬侯以筒酒灌人也大駕都許使光祿大夫劉松北鎮袁紹軍與紹子弟宴飲松常以盛夏三伏之際晝夜酣飲二方化之故南荊有三雅之爵河朔有避暑之飲又曰中常侍張讓子奉為太醫令與人飲酒輒掣引衣裳發露形體以為戲樂將罷又亂其履舄使小大差踦音紀無不傾倒僵仆踒跌手足因隨而笑之踒於臥反襄陽舄耆舊記曰襄陽城南有池山季倫每臨此池未曾不大醉而還恒曰此我高陽池也襄陽城中兒歌之曰山公出何許往至高陽池日夕倒戴歸酩酊無所知時時能騎馬到著白接離舉鞭問葛強何如并州兒韓詩外傳曰趙簡子與諸大夫飲於洪波之臺酒酣簡子涕諸大夫皆出走曰臣有罪而不自知也簡子曰大夫無罪昔友周舍有言曰千羊之皮不若一狐之腋眾人之唯唯不若直士之諤諤費禕別傳曰孫權每別置好酒以酌禕視其已醉然後問以國事并論世務辭難累至禕輒辭以醉退而撰次所問事條荅無所遺矣呂氏春秋曰秦繆公之時西戎強大繆公遺女樂戎王大喜以其故數飲食日夜不休左右有言秦寇之至因按弓而射之秦寇果至戎王醉而臥於樽下卒生縛而擒之博物志曰人中酒醉不解浴之以湯自漬則愈湯亦作酒氣味又曰昔有人名玄石從中山酒家酤酒酒家與之千日酒不語其節度至家而醉家以為死而葬之酒家計滿千日乃憶之往索玄石玄石家云亡來三年服已闋矣乃至家掘而問之玄石起於棺中說苑曰楚莊王賜群臣酒日暮燭滅有引美人衣者美人援絕其冠纓告王王曰賜人酒使醉失禮奈何欲顯婦人之節而辱士乎乃命左右曰與寡人飲不絕冠纓者不歡群臣皆絕其冠纓乃止世說曰周伯仁有德量深達危亂過江積年恒大飲酒嘗經三日醒時人謂三日僕射又曰張華既貴有少時知識來候之華屏官事與共飲九醞酒為酣暢其夜醉眠張華嘗飲此酒醉眠輒使左右轉側至覺左右依常為張公轉側其友無轉側者至明起友人猶不寤張公曰咄此必死矣使就視之酒果穿腹流床下滂沱又曰山公曰嵇叔夜之為人也嚴然若孤松之獨立及其醉也嵬峨若玉山之將頹又曰杜預為荊州刺史鎮襄陽時有讌集大醉閉齋獨眠或見一大虵垂頭床邊吐語林曰周伯仁過江恒醉止有姊喪三日醒姑喪三日醒也又曰周伯仁在中朝能飲一斛酒過江雖日醉然未嘗飲一斛以無其對也後有舊對忽從北來相得欣然乃出二斛酒共飲之既醉伯仁得眠眠覺問共飲者何在曰西廂問得轉不荅不得轉伯仁曰異事使視之脅腐而死十洲記曰瀛州者玉膏如酒味名曰玉酒飲數升輒醉令人長生俗記曰宋禕死後葬在金城南山對琅琊郡門袁山松為琅琊太守每醉輒乘輿上宋禕冢作行路難歌列子曰子產相鄭有兄曰公孫朝好酒朝之室藂酒千鍾積麴成封糟糠之氣逆於人鼻方其荒醉不知世道之安危魯連子曰楚王成章華臺酌諸侯酒魯君先至悅之故醉與之大曲之弓不琢之璧已而悔之魯君懼乃歸之莊子曰醉者之墜車也希死形體與人同其悟物與人異則其神者全也屍子曰赤縣洲者寔為崑崙之墟其東則滷水島山左右蓬萊玉紅之草生焉食其一實醉臥三百歲而寤韓子曰楚共王與晉厲公戰於鄢陵楚師敗績共王傷目司馬子反渴而求飲穀陽樹操觴而進子反王欲復戰召子反議子反醉乃辭以疾王入其幕酒臭旋師而斬韓子曰紹緇昧醉而忘其裘梁君曰醉足以亡裘乎荅曰紂以酒亡天下而況裘亡乎又曰紂為長夜而失日問於左右盡弗知曰使人問箕子謂其從曰為天下王而一國皆失日天下其危矣一國皆不知而我獨知之我其危矣辭以醉而不知也又曰齊桓公飲酒醉遺其冠恥之三日不朝管仲曰此非有國者之恥也公胡不雪之以政公曰善因發囷倉賜貧窮論囹圄出薄罪處三日而民歌之曰公乎不復遺其冠乎淮南子曰夫醉者俛入城門以為七尺之閨超江淮以為尋常之溝酒濁其神也陶淵明詩序曰余偶有名酒無日不飲顧影獨盡忽焉復醉諸葛亮集曰亮戒子曰夫酒之設合禮致情適體歸性禮終而退此和之至也主意未殫賓有餘倦可以至醉無致迷亂
