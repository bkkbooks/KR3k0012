body:
  text: 兵部九邊將史記曰李牧為趙將居鴈門備匈奴日擊牛饗士謹烽火多間諜敢有捕虜者斬王以為怯代之匈奴數來復使牧將牧曰如前乃敢奉令王詐諾數歲終無所得後進百金之士五萬彀弦者十萬大破匈奴又曰文帝時匈奴大入朝郍殺北地都尉印音昂帝以問馮唐安得廉頗李牧為將也唐對曰臣聞上古王者之遣將跪而推轂曰閫以內者寡人制之閫以外者將軍制之軍功爵賞皆決於外歸而奏之此非虛言也臣大父言李牧之為趙將居邊軍市之租皆自用饗士賞賜決於外不從中御也委任而責成功故李牧乃能得盡智能選車千三百乘彀騎萬三千疋百金之士十萬是以北逐單于東破胡滅澹林西抑強秦南支韓魏當是之時趙幾霸會趙王遷其母倡也王遷立乃用郭開讒卒誅李牧令顏聚代之是以兵破士北為秦所滅今臣竊聞魏尚為雲中守其軍市租盡以給士卒出私養錢五日一殺牛饗賓客軍吏舍人是以匈奴遠避不近雲中之塞虜嘗一入尚率車騎擊之所殺甚眾夫士卒盡家人子起田中從軍安知尺籍伍符終日力戰斬首捕虜上功莫府一言不相應文吏以法繩之其賞不行而吏奉法必用臣愚以為陛下法太明賞太輕罰太重且雲中守魏尚坐上功首虜差六級陛下下之吏削其爵罰之由此言之陛下雖得廉頗李牧不能用文帝說是日令馮唐持節赦魏尚復以為雲中守而受唐為車騎都尉又曰武帝以李廣為未央衛尉而程不識亦為長樂衛尉不識故與廣俱嘗屯邊而廣行無部伍行陣就善水草屯舍止人人自便不擊刀斗以自衛莫府省約束文籍事然亦遠斥候未嘗遇害程不識正部曲行伍營陣擊刀斗士吏理軍簿至明軍不得休息然亦未嘗遇害不識曰李廣軍極簡易然虜卒犯之無以禁也而其士卒亦佚樂咸樂為之死我軍雖煩擾然虜亦不得犯我是時漢邊郡李廣程不識皆為名將然匈奴畏廣士卒亦多樂從廣而苦程不識漢書曰晁錯上言兵事曰自高后以來隴西三困於匈奴非隴西之民有勇怯迺將吏之製巧拙異也故兵法曰有必勝之將無必勝之民繇此觀之安邊境立功名在於良將不可擇也又曰趙充國奏曰從今盡三月虜馬羸瘦必不敢捐妻子他種中涉河而來為寇是臣之愚計所度虜且必瓦解其處不戰而自破之策也又曰張安世長子千秋為中郎將兵隨度遼將軍范明友擊烏桓還謁大將軍光問千秋戰陣方略山川形勢千秋口對兵事畫地成圖無所忘失後漢書曰竇憲懼誅自求擊匈奴以贖死會南單于請兵北伐乃拜憲車騎將軍金印紫綬官屬依司空依淮也長一人千石褖屬二十九令史及御屬三十二人見續漢志以執金吾耿秉為副發北軍五校漢有南北軍北軍中候一人六百石掌臨五營黎陽雍營緣邊十二郡騎士漢官儀曰光武中興以幽冀并州兵騎克定天下故於𥠖陽五營以謁者監之又曰扶風郡尉部在雍縣以涼州近羗數犯三輔將兵衛護故俗稱雍營及羗胡兵出塞明年憲與秉各將四千騎及南匈奴左谷蠡王師子師子其名也萬騎出朔方雞鹿塞南單于屯屠河屯屠河單于名將萬餘騎出滿夷谷度遼將軍鄧鴻鄧禹少子及緣邊義從羗胡八千騎與左賢王安國萬騎出棝陽塞棝陽在五原郡棝音固皆會𣵠郡山憲分遣副校尉閻盤司馬耿夔耿譚將左谷蠡王師子右呼衍王須訾等呼衍其號因以為姓匈奴貴種也今呼延姓是其後須訾各精騎萬餘與北單于戰於稽落山大破之虜眾崩潰單于遁走追擊諸部遂臨私渠比鞭鞮海匈奴中海各斬名王已下方三千級獲生口馬牛羊橐駝百餘萬頭於是溫犢須日逐溫吾夫渠王抑鞮等八十一部率降者前後二十餘萬人憲秉遂登燕然山去塞三千餘里刻石勒功紀漢威德令班固作銘又曰馬援討五溪蠻軍次下雋下雋縣名屬長沙國故城今辰州沅陵縣雋音字兗反有兩道可入從壺頭則路近而水嶮壺頭山名也今在辰州沅陵東武陵記曰此山頭與東海方壺山相似神仙多所遊集固名壺頭山也從充則塗夷而運遠充縣名屬武陵郡充音昌容反帝初以為疑及軍至耿舒欲充道援以為棄日費糧不如進壺頭搤其喉咽搤持也充賊自破以事上之帝從援策三月進營壺頭賊乘高守隘水疾舡不得上會暑甚士卒多疾死援亦中病遂困乃穿岸為室以避炎氣武陵記曰壺頭山邊有石窟即援所室也室內有地如百斛舡大云是援之餘靈也賊每升險鼓譟援輒曳足以觀之左右哀其壯意莫不為之流涕又曰初馬援軍還將至故人多迎勞之平陵人孟冀名有計謀於坐賀援謂之曰吾望子有善言反同眾人耶昔伏波將軍路愽德開置七郡裁封數百戶漢書曰平南越以為南海蒼梧鬱林合浦交阯九真日南朱崖儋耳九郡今此言七郡則與前書不同也今我微勞猥饗大縣功薄賞厚何以能長久乎先生奚用相濟冀曰愚不及援曰方今匈奴烏桓尚擾北邊欲自請擊之男兒要當死於邊野以馬革裹屍還葬耳何能臥床上在兒女子手中耶冀曰諒為列士當如此矣又曰鄧訓卒官吏人羗胡愛惜旦夕臨者日數千人戎俗父母死恥悲泣皆騎馬歌呼至聞訓卒莫不吼號或以刀自割又殺其犬馬牛羊曰鄧使君已死我曹亦俱死耳前烏桓吏士皆奔走道路訓往烏桓校尉時吏士也至空城郭吏執不聽以狀白校尉徐傿傿歎息曰此義也傿音於建反乃釋之遂家家為訓立祠每有疾病輒請禱求福又曰竇固復出玉門擊西域詔耿秉及騎尉劉張皆去符傳以屬固專將兵者並有符傳擬合之取信今去符皆受固之節度也固遂破曰山降車師又曰祭彤使招呼鮮卑示以財利其大都護偏何鮮卑名也遣使奉獻願得歸化彤慰納賞賜稍復親附其異種滿離高句驪之屬遂駱驛款塞上貂裘好馬帝輒倍其賞賜其後偏何邑落諸豪並歸義願自效彤曰審欲立功當歸擊匈奴斬送頭首乃信耳偏何等皆仰天指心曰必自效即擊匈奴左伊袟訾部斬首二千餘級持頭詣郡其後歲歲相攻輒送首級又曰烏桓鮮卑追思祭彤無已每朝賀京師常過冢拜謁仰天號泣乃去遼東吏人為立祠四時奉祭焉又曰耿恭以踈勒城傍有澗水可固五月乃引兵據之七月匈奴復攻恭慕先登數千人直馳之朝騎散走匈奴遂於城下擁絕澗水恭於城中穿井十五丈不得水吏士渴乏笮馬糞汁而飲之笮謂壓笮也恭仰歎曰聞昔貳師將軍拔佩刀刺山飛泉涌出貳師大宛中城名昔武帝時使李廣利代大宛至貳師城因以為號今漢德神明豈有窮哉乃整衣服向井再拜為吏士禱有頃水泉奔出眾皆稱萬歲乃令吏士揚水以示虜又曰光武至薊聞邯鄲兵方到光武將欲南歸召官屬計議耿弇曰今兵從南來不可南行漁陽太守彭寵公之邑人寵南陽宛人也上谷太守即弇公也發此兩都控弦萬騎邯鄲不足慮也光武官屬腹心皆不肯曰死尚南首奈何北行入囊中漁陽上谷北椄塞垣至彼路窮如入囊也光武指弇曰是我北道主人也又曰耿夔為大將軍左校尉將騎八百出居延塞直奔北單于庭於金微山斬閼氏名王已下五千餘級單于與數騎脫亡盡獲其匈奴珍寶財畜去塞五千餘里而還自漢出師所未嘗至也又曰班超在䟽勒將還中國䟽勒舉國憂恐其都尉黎弇曰漢使棄我我必復為龜茲所滅耳誠不忍見漢去因以刀自剄超還至于寘王侯以下皆號泣曰依漢使如父母誠不可去㸦抱超馬腳不得所行超恐于寘終不聽其東又欲遂本志乃更還䟽勒䟽勒兩城自超去後復降龜茲而與尉頭連兵尉頭國居尉頭谷去長安八千六百五十里南與䟽勒接衣服類烏孫也超捕斬反者擊破尉頭又曰叚頴破羗窮山深谷之中斬其渠師以下萬九千級獲牛馬騾驢氈裘廬帳什物不可勝數又曰郭涼字公文氣力壯猛雖武將然通經書多智略尤曉邊事有名北方又曰張奐前度遼與叚頴爭擊羗意不相平及頴為司隸欲逐奐歸燉煌將害之奐憂懼奏記謝曰小人不明得過州將千里委命以情相歸又曰劉焉傳曰拜張魯鎮夷中郎將領漢寧太守通其貢獻謝承後漢書曰臧旻有幹事才達於從政討賊有功拜議郎還京師見太尉袁逢問其西域諸國土地風俗人物種數旻具荅悉陳其狀手畫地形逢奇其才歎息言雖班固作西域傳何以過此東觀漢記曰黃香為尚書曉習邊事每行軍調度動得事中上知其勤數加賞賜魏志曰母丘儉字仲恭有幹策為幽州刺史渡遼將軍儉以高句驪數叛帥軍出玄菟討之句驪王宮將步騎三萬逆軍隨流水上大戰宮連敗走遂束馬懸車登九都山斬獲首虜以千數玄菟太守王頎過汶沮千餘里至肅慎界刻石記功刊九都之山吳志曰孫歆字公禮為邊將數十年善食士卒得其死力將帥姓名盡具識之所問咸對身長八尺儀皃都雅悅曰吾久不見公禮不圖進益乃此後魏書曰韋珍高祖初蠻首桓誕歸款以為東荊州刺史令珍為使與誕招慰諸蠻珍自懸瓠西入三百餘里至桐柏山窮臨淮源宣楊恩澤莫不附降淮源舊有祠堂蠻俗恒用人祭之珍乃曉告曰天地明靈即是民之父母豈有父母甘子肉味自今已後悉宜以酒脯代用群蠻從約至今行之凡所招降七萬餘戶置郡縣而還以奉使稱旨除左將軍樂陵鎮將賜爵霸城子又曰李崇行梁州刺史時巴丘擾動詔崇以將軍荊州刺史鎮上洛勑發陜秦二州兵送崇至辭曰邊人失和本怨刺史奉詔代之自然易帖但須一宣詔旨而已不勞發兵自防懷懼也高祖從之又曰宇文測行綏州事每歲河冰合後突厥即來寇掠於是常預遣居人入城堡以避之測至皆令安堵如舊乃於要路數百處並多積柴仍遠斥候知其動靜是年十二月突厥從連谷入寇至界數十里測命積柴之處一時縱火突厥謂有大軍至懼而遁走自相蹂踐委棄雜畜及輜重不可勝數測徐率所部收之分給百姓自是突厥不敢復至測因請置戍兵以備之隋書曰帝以薛世雄為玉門道行軍大將軍與突厥啟民可汗連兵擊伊吾師次玉門啟民可汗背約兵不至世雄孤軍度磧伊吾初謂隋軍不能至皆不設備及聞世雄度磧大懼請降詣軍門上牛酒世雄遂於漢舊伊吾城東築城號新伊吾因留銀青光祿大夫王威以甲卒千餘人戌之而還天子大悅進位正議大夫賜物二千叚唐書曰馬揔為安南郡都護揔管經略使揔敦儒學長於政術在南海累年清廉不撓夷獠便之於漢所立銅柱之處以銅一千五百斤特鑄二柱刻書唐德以繼伏波之迹又曰范希朝鎮振武蕃落之俗有長帥至必効奇駞名馬雖廉者猶曰當從以致其歡希朝一無所受積十四年皆保塞而不為橫又曰柳公綽為太原尹北都留守河東節度觀察等使是歲北虜遣梅祿將軍李暢以馬萬疋來市託云入貢所經州府守帥假之禮分嚴其兵備留館則戒卒於外懼其襲奪太原故事出兵逆之暢及界上公綽使牙將祖孝恭單馬勞問待以修好之意暢感義出涕徐驅道中不妄馳獵及至闢牙門令譯引謁宴以常禮及市馬而還不敢侵犯陘北有沙陁部落自九姓六州皆畏避之公綽至鎮召其酋朱耶執宜直抵雲朔塞下治廢柵十一所募兵三千付之留屯塞上以禦匈奴其妻母來太原者請梁國夫人對酒食問遺之沙陁感之深得其効梁吳均邊城將詩曰僕本邊城將馳射靈關下箭御鴈門石氣振武安瓦玉摽丹霞斂金絡豔光馬高旗入漢飛長鞭歷地寫
