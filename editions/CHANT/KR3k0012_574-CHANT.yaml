body:
  text: 樂部十一歌四司馬相如琴歌曰鳳兮鳳兮歸故鄉遨遊四海索我皇時來通遇無所將何悟今夕升斯堂有艷淑女在此房室邇人遐毒我膓何緣交接為鴛鴦崔琦四皓頌曰昔南山四皓者蓋角里先生綺里季夏黃公東園公是也秦之博士遭世闇昧道滅德消坑黜儒術詩書是焚於是四公退而作歌曰莫莫高山深谷滅哉曄曄紫芝可以療飢唐虞世遠吾將何歸駟馬高蓋其憂甚大富貴畏人兮不如貧賤之肆志樂志曹植嘗為琴調歌曰於嗟此轉達夙夜無休閑東西經七陌南北越七阡願為中林草秋隨野火燔䃺滅豈不庸願與株葉連司馬相如美人賦曰有女獨處婉然在床奇葩逸麗素姿艷光覩臣微笑而言曰上客何國之君子無乃遠乎遂設旨酒進鳴琴玉釵挂臣冠羅袖拂臣衣撫絃而為幽蘭之曲女乃歌曰獨處室兮郎無依思佳人兮情傷悲彼君子兮來何遟日將暮兮華髮衰魏文益繁欽書曰守宮王孫世有女曰璅始年九歲夢與神通寤而悲吟哀聲激切體若飛仙于今十五是日戊午祖于北園博延眾賓迭奏名倡世女須臾而至厥狀甚美於是振袂徐進揚蛾微眺眾倡騰逝群賓失席然後修容飾粧改曲變度激清角揚白雪接孤聲赴危節於是商風振條飛霧成霜可謂聲恊鍾石氣應風律網羅韶護囊括鄭衛者也繁欽牋與魏文帝曰都尉薛訪車子年始十四能喉囀引聲與葭同音自上呈見果如所言即日故共觀試乃知天壤之所誠有自然之物也潛氣內囀哀音外激大不抗越細不幽散聲舊美曲常均國史補曰李袞善歌於江外而名動京師崔昭入朝密載而至乃邀致賓客請弟一部樂及京師之名倡以為盛會紿言表弟請登未座令袞被衣而出滿座皆笑少頃命酒昭曰請表弟歌座中又笑及喉囀一發樂人皆大驚曰是李八郎也乃羅拜之樂府雜錄曰踏搖娘者生於隋末河內有人醜皃而好酒常自號郎中醉歸必毆其妻妻色美善歌乃自歌為怨苦之詞河朔演其曲而被之管絃因寫其夫妻之容妻悲訴每搖其身故號踏搖娘近代優人頗改其制度非舊旨也又曰開元中有人許和子者本吉州永新縣樂家女也開元未進入宮因以永新名之藉於宜春院既美且惠善歌能變新聲韓娥李年延歿後千載曠其人至永新始繼其能遇高秋朗月臺殿清虛喉囀一聲響傳九陌明皇嘗獨召李謀吹苗逐其歌曲終管裂其妙如此一日賜大酺於勤政樓觀者數拾萬眾諠譁聚語莫得聞魚龍百戲之音上怒欲罷宴中官力士奏請命永新出樓歌一曲必可止喧上從之永新乃撩鬢舉袂直奏慢聲至是廣場敘寂若無一人義者聞之血湧愁者聞之膓絕洎漁陽之亂六宮星散永新為一士人所得韋青避地廣陵因月夜憑欄於小河上忽聞舟中唱水調者曰此永新故歌也乃登舟省之因與永新對泣久之青始晦其事後士人卒與其母之京師終於狹斜間又曰古之能者即有韓娥李延年莫愁莫愁者女子也樂府詩云莫愁在何處莫愁石城西艇子打兩催送莫愁來善歌者必先調其氣氤氳自臍間發至喉乃憶其詞即分抗墜之音既得其術即可致遏雲響谷之妙也又曰大曆初有才人張紅者本與父唱歌丐於衢路因過將軍韋青所居在昭國坊南門也青於看街窗中聞其歌喉寥亮仍有美色即納為姬其父亦舍於後戶優給之乃自傳其藝頴悟絕倫嘗有樂工自撰一曲即古曲長命西河女也加減其節奏頗有新聲未進間先印可於青青潛令紅於屏風後聽之紅乃以小豆數合以記其節拍樂工歌罷青因入問紅何如紅曰已唱得矣青出給云某有女弟子久曾唱非新曲也即令隔屏唱之一聲不失樂工大驚異遂請相見歎伏不已兼云此曲先有一聲不穩今已正矣尋達上聽翌日召入宜春院寵澤隆異宮中號為記曲娘子尋為才人一日內史奏韋青卒上告紅紅乃於上前嗚呼奏云妾本風塵丐者一旦老父死有所歸致身入內皆自韋青妾不忍忘其恩因一慟而絕上嘉歎久之即贈昭儀又曰韋青本士人也嘗自為詩云三代掌綸誥一身能唱歌青官至金吾將軍明皇雜錄曰唐玄宗自巴蜀迴因夜闌登勤政樓憑欄南望煙月滿目上因自歌曰庭前琪樹已堪攀塞外征人殊未還蓋盧思道之詞也歌歇上問有舊人乎逮明為我訪來翌日力士潛求於里中因召與同至則果梨園弟子也其夜上復與乘月登樓左右唯力士及貴妃侍者紅桃在焉遂命歌涼州詞貴妃所製上親御玉笛為之倚曲曲罷相覩無不掩泣上因廣其曲今涼州傳於人間者益加怨切焉又曰樂工李龜年恃恩寓於東都大起第宅僣侈之制逾於公侯宅在東都通遠里中堂制度甲於都下今裴晉公移於定鼎門南別墅號綠野堂其後龜年流落江南每遇良辰勝景常為人歌數闋座客聞之莫不掩泣而罷劉叔敬異苑曰臨川聶包死數年忽詣南豐相沈道襲共飲其歌笑甚有倫次每歌云花盈盈正聞行當歸不聞死復生祖台志怪曰建康小吏曹著見廬山夫人夫人命女婉出與著相見婉見著欣悅命婢瓊林令取琴出婉撫琴歌曰登廬山兮鬱嵯峨晞陽風兮拂紫霞招若人兮濯靈波欣良運兮暢雲柯彈鳴琴兮樂莫過雲龍會兮樂太和歌畢婉便還去搜神記日淮南王安設廚宰以俟賓客正月上午有八老公詣門求見王曰群娥子復來也公知不見乃更形為八童子王驚見之盛禮設樂以享八公援琴而絃歌曰明明上天照四海兮知我好之公來下兮公將與余生毛羽兮升騰青雲蹈梁甫兮觀見三光過北斗兮驅乘風雲使玉女兮今所謂淮南操是也幽明錄曰勾章人至東野還暮不至門見路傍有小屋燈火因投寄宿止宿有一小女不欲與丈夫共宿呼鄰家女自伴夜共彈琴箜篌至曉此人謝去問其姓字女不荅彈絃而歌曰連綿葛上藤一緩復一絙欲知我姓名姓陳名阿登又曰吳縣費升為九里亭吏向暮見一女從郭中來素衣哭入埭向一新塚哭日暮不得入門便寄亭宿升作酒食至夜升彈琵琶令歌女云有喪儀勿笑人也歌音甚媚云精氣感冥昧所降若有緣嗟我遘良契寄忻霄夢間中曲云成公從義起蘭香降張磧茍云冥分結纏綿在今夕下曲云佇我風雲會正俟今夕遊神交雖未久中心已綢繆寢處向明升去顧謂曰且至御亭女便驚怖獵人至群狗入屋於床咬死成大貍搜神記曰吳王夫差小女名玉悅童子韓重韓重乃學於齊魯之間臨去屬其父求婚王怒不與女玉結氣亡葬閶門之外重三年歸聞其死哀慟至玉墓所玉忽見重與言乃左顧宛頸而歌曰南山有鳥北山張羅志欲從君讒言孔多悲結生疾沒命黃壚命之不造冤如之何羽族之長名為鳳凰一日失雄三年感傷故見鄙姿逢君輝光身遠心近何嘗暫忘又曰太康末京洛始為折楊柳之歌有兵車辛苦之辭後楊駿被誅太后幽死折楊之應也續搜神記曰廬江杜謙為諸暨令縣西山下有一鬼長三丈著赭布袴布褶在草中相張又脫褶擲草上作懊惱歌百姓皆看之古樂志曰齊歌曰謳吳歌曰歈楚歌曰艷淫歌曰哇歌又有清歌高歌安歌緩歌長歌浩歌雅歌酣歌怨歌勞歌韓詩曰飢者歌食勞者歌事振旅而歌曰凱歌堂上奏樂而歌曰登歌亦曰升歌古之善歌者有咸黑帝唐時善歌者見呂氏春秋秦青響遏行雲聲振林木薛談秦青弟子韓娥齊人餘響遶梁三日已上三人列子王豹處於淇而河西善謳綿駒處高堂而齊右善歌瓠梁見淮南子魯人虞公見劉向別錄李延年見漢書古歌曲有陽陵白露朝日魚麗白水白雲江南陽春淮南駕辨綠水陽阿採菱下俚巴人並見襄陽耆舊轉及梁元帝纂要八闋葛天氏之歌見呂氏春秋也唐歌帝嚳之歌南風鄉雲並虞舜歌晨露湯歌並見呂氏春秋漢歌曲有大風高祖所作芝房白麟朱鴈交門天馬房中已上並郊廟歌見漢書也盛唐樅陽武帝歌見漢書瓠子武帝觀決河所作歌玄雲步雲西王母歌見漢武內傳古樂府有歌行艷歌行長歌行短歌行魏武帝作朝歌行怨歌行前緩聲歌行後緩聲歌行擢歌行鞠歌行放歌行蔡歌行陳歌行又古今樂錄晉宋已後歌曲有淫豫歌楊叛兒歌南齊有楊昊母為師入宮童謠呼為楊婆兒婆轉為叛扶風歌晉劉琨作百年歌晉王道沖陸機並作白日歌宋沈收之所作亦曰落日歌其歌曰白日落西山九曲歌宋何承天作採葛婦歌古越人作桃葉歌音王獻之所作同聲歌漢張衡作碧玉歌晉孫綽作四時歌出於子夜子夜歌古有女名子夜造此歌上聲歌亦名捉住哀悲之古曲白紵歌起於吳孫皓時作襄陽白銅鞮歌前溪歌晉車騎將軍沈玩所作歎聞歌晉穆帝初歌畢輒呼歎聞因以為名團扇歌晉中書令王珉與嫂婢芳姿有私愛甚篤苦捶撻之婢素善歌而珉之好捉白團扇因見珉之歌曰白團扇顦顇非昔容羞與郎相見願得隨郎手因風從方便後人因歌之丁督護歌彭城內史徐逵之為魯軌所殺府內督護丁旿收殯歛之逵之妻晉公主呼問事每問輒歎息曰丁督護其聲哀切後人因為曲焉懊惱歌崇安初人間訛謠之曲又云石崇為綠珠作古有絲布澀難縫一曲而已宋太祖謂之中朝曲也
