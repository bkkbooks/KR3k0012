body:
  text: 職官部四十九都督晉書曰杜預為都督荊州諸軍事南土美而謠之曰後世無叛由杜翁孰識智名與勇功又曰陶侃為都督荊雍益梁四州諸軍事是時荊州大飢百姓多飢死侃至秋熟輒糴至飢復價糶之士庶歡悅咸蒙濟賴又曰羊祜都督荊州諸軍事招攜以禮懷遠以德吳人悅服呼為羊公又曰庾翼都督江荊益三州刺史制度規模每出於人數年之中軍國充實人情翕然稱其才明由是自河以南皆懷歸附又曰陳勰為陶侃廣州長史侃夢有司馬以鎧與侃勰以為司馬國姓鎧者捍國之器節下當進位果除都督交州又曰張寔都督涼州下令曰忝繼前蹤庶幾刑政不為百姓之患而比年飢旱殆由庶事有闕竊慕箴誦之言以補不逮自今有面刺孤罪者酬以束帛翰墨陳孤過者荅以筐篚謗言於市者報以羊米又曰石苞都督楊州諸軍事苞因入朝當還辭高貴鄉公留語盡日既出白文帝曰非常主也數日而有成濟之事又曰劉胤代溫嶠都督江州諸軍事領江州刺史假節胤位任轉高放豪日甚縱酒躭樂不恤政事大殖財貨啇販百萬初胤之代嶠也遠近皆謂非選陶侃郄鑒咸云胤非方伯才朝廷不從或問王悅曰今大難之後繩紀頓絕自江陵至于建康三千餘里流人萬計布在國之南藩要害之地而胤以侈汰之性臥而對之不有外變必有內患悅曰間溫平南語家公云連得惡夢思見代者尋云可用劉胤此乃溫意非家公也是時朝廷空罄百官無祿唯資江州運漕而胤啇旅繼路以私廢公有司奏免胤官書始下而為郭默所害又曰王恭為都督兗青冀幽并徐州晉陵諸軍事平北將軍假節鎮京口初都督以北為號者累有不祥故桓冲王坦之桓彝之後不受鎮北之號恭表讓軍號以超授為辭而實惡其名於是改號前將軍北史曰賀蘭祥除都督荊州刺史見有發掘古冢暴露骸骨乃謂守令曰比豈仁者為政耶命所在收藏時夏亢陽即日降雨唐書曰宋璟轉廣州都督仍為五府經略使廣州舊俗皆以竹茅為屋屢有火災璟教人燒瓦改造店肆自是無復延燒之患夷夏懷惠立碑以紀其政又曰王方翼為夏州都督屬牛疫無以營農方翼造人耕之法施關鍵使人推之百姓賴焉揔管後周書曰長孫儉為荊州揔管嘗指闕奏事時值大雪遂立於雪中待報自旦達暮竟無惰容其奉公勤至皆此類也又曰赫連達遷大將軍夏州揔管三州五防諸軍事達雖非文吏然性質直遵守法度輕於鞭撻而重慎死罪性又廉儉邊境胡民或饋達以羊者達欲招納異類報以繒帛主司請用官物達曰羊入我廚物出官庫是欺上也命取私帛與之識者嘉其仁恕焉北史曰韋孝寬為延州揔管兄敻至州與孝寬相見將別孝寬以所乘馬及轡勒與敻敻以其華飾心不欲之謂孝寬曰昔人不棄遺簪墜履者惡與之同出而不與同歸吾之操行雖不逮前烈然捨舊策新亦非吾志也乃乘舊馬以歸隋書曰元褒為原州揔管有啇人為賊所劫其人疑同宿者而執之褒察其色寬而辭正遂捨其人啇詣闕訟褒受金縱賊上遣使窮治之使者薄責褒曰何故利金而捨盜也褒便即引咎初無異詞使者與褒俱詣京師遂坐免官其盜尋發於他所上謂褒曰公朝廷舊人位望隆重受金捨賊非善事何至自誣也曰臣受委一州不能息盜賊臣之罪一也州民為人所謗不付法司懸即放免臣之罪二也牽率愚臣無顧刑法不持文書約束至令為物所疑臣之罪三也臣有三罪何所逃責臣又不言受賂使者復將有所窮究然則縲絏橫及良善重臣之罪是以自誣上歎異之稱為長者又曰元景山為豪州揔管先是州民王迴洛張季真等聚結亡命每為劫盜前後牧守不能制景山下車遂捕之迴洛季真挺身奔江南擒其黨與數百人皆斬之法令明肅盜賊屏迹稱為大治又曰韋世康嘗因侍宴再拜陳讓曰臣無尺寸之功位亞台鉉今犬馬齒截不益明時恐先朝露無以塞責願乞骸骨退避賢能上曰朕夙夜庶幾求賢若渴冀與公共治天下以致太平今之所請深乖本望縱令䈥力衰謝猶屈公臥治一隅於是出拜荊州揔管時天下唯置四大揔管并楊益三州並親王臨統唯荊州委於世康時論以為美世康為政簡靜百姓愛悅合境無訟又曰韋藝遷營州揔管藝容皃瓌偉每夷狄參謁必整儀衛盛服以見之獨坐蒲一塌蕃人畏懼莫敢仰視又曰薛道衡聲名藉甚一時仁壽中楊素專掌朝政道衡既與素善上不欲道衡久知機密因而檢校襄州揔管道衡久蒙驅策一旦違離不勝悲戀兼之哽咽高祖愴然改容曰爾光陰晚暮侍奉誠勞朕欲令爾將攝兼撫氓俗今爾之去朕如斷一臂於是齎物三百叚九鐶金帶并時服一襲馬十疋慰勉遣之又曰樊子蓋轉循州揔管許以便宜從事十八年入朝奏嶺南地圖賜以良馬雜物又曰令孤熙拜桂州揔管十七州諸軍事許以便宜從事刺史已下官得承制補授給帳內五百人賜帛五百疋發傳送其家累改封康郡公熙至部大弘恩信其溪洞渠帥更相謂曰前時揔管皆以兵威相脅今者乃以手教相諭我輩其可違乎於是相率歸附先是州縣生梗長吏多不得之官寄政於揔管府熙悉遣之為建城邑開設學校華夷感敬稱為大化又曰李安領行軍揔管率蜀兵順流東下時陳人屯白沙安謂諸將曰水戰非北人所長今陳人依險泊舩必輕我而無備以夜襲之賊可破也諸將以為然安率眾先鋒大破陳師高祖嘉之唐書曰田留安拜魏州揔管劉闥之亂也來攻州城于時山東豪猾多殺長吏以應賊百姓兇人咸懷異志凡諸守皆以心腹自衛多所猜防由是上下情隔怨叛者多留安獨撫結所部示無疑阻凡有白事者無間踈遠皆至臥內謂人曰吾與卿輩同為國守自宜一心無為疑貳也必欲棄同即異背順歸逆亦任卿輩斬吾頭而去矣城中父老相誡勵子弟曰田公以赤心相付何得負之由是人情遂固州人苑竹林者劉闥之黨也初有異圖留安陰知之而不發其事因引置左右委以關鑰竹林感其意遂歸心焉卒收其力用又曰劉世讓拜廣州揔管將之官高祖問以備邊之策世讓荅曰突厥比數南寇者徒以馬邑為其中路耳如臣計者於崞城置一智勇之將多貯金帛有來降者厚賞賜之數出奇兵掠其城下踐其禾稼敗其生業不出歲餘彼當無食馬邑不足圖也高祖曰非公無可任者可馳驛至彼善為經略世讓於是以兵臨馬邑高滿政以其地來降突厥患之遣曹繁陁來詣中國言世讓與可汗通謀將為亂由是得罪籍沒其家及突厥來降言世讓初無逆謀始原其妻子都督護漢書曰宣帝時匈奴日逐王欲降漢使人與鄭吉相聞吉發渠犁龜茲諸國五萬人迎日逐王吉送三千人小王將十三人隨吉至阿曲頗有亡者吉追斬之將詣京漢封日逐王為德歸侯吉既破車師降日逐威震西域遂并護車師以西故號為都護都護之置自吉始焉上嘉其功乃下詔曰都護西域騎都尉鄭吉撫循外蠻宣明威信封吉為安遠侯漢之號令班於西域始自張騫成於鄭吉也又曰叚會宗為人好大節而功名為西域都護與谷永相友善永閔其老復遠出與書戒之曰足下以柔遠之靈德復典都護之重職甚休願吾子因循舊貫無求奇功萬里之外以身為本願詳思愚言又曰元帝時甘延壽為西域都護陳湯為副郅支單于數困辱漢使湯與延壽謀曰郅支所在絕遠無金城強弩之守如發屯田吏士從烏孫直詣其城可以成功延壽欲奏之湯曰國家與公卿議大策非凡所見必不從會延壽久病湯獨矯制發兵延壽聞之欲止焉湯怒按劍叱延壽曰大眾已集豎子欲沮眾耶延壽遂從之部勒行陣益置楊威白虎合騎之校張晏曰西域陣法之名也即日引軍分行遂斬郅支單于頭送京師延壽封茂成侯湯封關內侯功大賞少為石顯匡衡所抑應劭漢官儀曰西域都護武皇帝始開通西域三十六國其後稍分至五十餘國置使者校尉以領護之宣帝神雀三年改曰都護秩二千石平帝時省都護令戊已校尉領之沈約宋書曰初漢宣帝置西域都護以加騎都尉若諫大夫護西域諸國光武建武初始有督軍諸使至獻帝建安中魏武相漢遣大將外出督十軍二十軍者始號都督曹袁張楊之徒雖以三公假節領州郡然無都督之號也三國時亦有都護中都護左右都護將軍兼督諸軍猶是舊制意也黃初三年上軍大將曹真始都督中外諸軍事揔諸軍高貴卿公正元二年晉文帝都督中外諸軍事尋加大都督之號太始中置小都督江左亦時有也吳朝鎮將揔兵亦曰都督大軍出為二部則曰左右都督分武昌為兩部亦曰左右部大督其揔一者則曰大都督又繞帳羽林無難之屬隨事有督無常號也至諸葛恪以下輔政乃都督中外諸軍事蜀關羽在江陵亦督軍州至張飛姜維亦為中外都督如吳魏也晉氏以來宰輔任重者為中外大都督方伯望隆者亦如大都督之號凡諸都督雖軍號有輕重無假節也唐書曰馬揔為安南都護揔敦儒學長於政術在南海累年清廉不撓夷獠便之於漢所立銅柱之處以銅一千五百斤特鑄二柱刻書唐德以繼伏波之迹
