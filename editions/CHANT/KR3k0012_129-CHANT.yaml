body:
  text: 偏霸部十二宋劉裕徐爰宋書曰高祖武皇帝姓劉氏諱裕彭城綏輿里人夜生有神光之異是夕甘露降于墓樹嘗遊下邳遇一沙門于逆旅沙門言及中原事故因云江表尋當喪亂高祖曰便遂至亂亡當有拯之者不沙門曰拯之者其在君乎其意甚至初高祖患手瘡積年未瘳沙門曰此瘡難治先有良藥當以相與因出懷中黃散褁留之沙門既去高祖追而望之倏忽不見以黃散治瘡一傅而愈餘散寶錄之被金瘡輒用有驗晉陵人韋叟少以占相為事其言多驗嘗相高祖曰君當立主方伯久之又曰君相輒進貴不可言唯願富貴無相志晉末妖賊孫恩作亂前將軍劉牢之東討牢之請高祖參軍事牢之命高祖覘賊遠近將勇士數十人會遇賊至仍迎擊之賊眾數千高祖所將人多死而戰意方酣奮長刀所殺傷甚眾牢之子敬宣疑高祖淹久恐為賊所殺乃輕騎赴之既而眾騎並至賊遂大崩高祖為流矢所傷通中信宿而愈自後屢被重傷皆弗以為患軍中益加敬憚恩北走海鹽高祖追而翼之築城于海鹽故治恩知城弗可下乃進向滬高祖復棄城追之恩乘風浮海奄至丹徒師眾數萬鼓噪登于蒜山居民皆荷檐而走高祖率所領棄擊大破之投巘赴水死者甚眾恩顛沛僅得還船雖被摧破猶恃眾力遂徑向京師朝廷震懼以高祖為建武將軍下邳太守帥舟師討恩于郁洲復大破之桓玄從兄循以撫軍將軍鎮丹徒以高祖為中軍參軍玄篡帝位循入朝玄高祖從至京師玄既宿憚高祖威名又悅高祖之風儀姿貌語司徒王謐曰昨見劉裕卿不得獨擅其清或說玄曰劉裕龍行虎步聸視不凡恐必不為人下宜早為其所玄曰我方欲平蕩中原使裕以萬人為前驅關隴不足定也事定之後當更議之耳高祖乃與弟道規沛郡劉毅東海何無忌潛謀匡復桓循弟弘以征虜將軍領廣陵以道規為中兵參軍劉毅先亦為弘吏佐遭母憂還京口是至住江北與道規共集義徒高祖託遊獵會無忌及任城魏詠之高平擅馮之及從弟蕃等同謀二十七人并願從者百餘人是時大風暴起丙辰詰朝城門開義眾馳入稱有詔齊聲大呼吏士驚散即獲桓循斬而徇之與桓弘主簿平昌孟昶等帥壯士六十人斬弘于廣陵城因收眾濟江玄遣頓丘太守吳甫之右衛將軍皇甫敷北拒義軍或曰裕等眾力甚弱豈有辦成陛下何慮之甚玄曰劉裕足為一世之雄劉毅家無檐石之儲樗蒱一擲百萬何無忌劉牢之甥酷似其舅共舉大事何謂無成眾推高祖為盟主移檄京邑遇吳甫之於江乘甫之玄驍將也其兵甚銳高祖躬執長刀徑入其陣眾皆披靡即斬甫之進至羅落橋高祖望賊旗鼓誓眾馳進挺劍指麾光曜如電將士皆莫敢仰視但憑神武爭為先登殊死而戰無不一當百呼聲動天地風火並起鉦鼓之音震駭京邑桓謙等諸軍一時土崩高祖鎮石頭留臺百官群僚宿衛各率其職於是推高祖為使持節都督楊徐兗豫青冀幽并八州諸軍事鎮軍將軍徐州刺史桓玄經潯陽江州刺史郭昶之備乘輿法服以資之收略二千餘人挾天子奔于江陵冠軍將軍劉毅輔國將軍何無忌帥諸軍南討破玄大將軍郭鈴等于桑落洲玄棄眾復挾天子西走初益州刺史毛璩遣弟子循之誘玄以入蜀至於枚回州益州督護馮遷斬玄首傳于京師天子反正詔進位侍中都督中外諸軍事高祖固讓加錄尚書封豫章公邑萬戶絹三萬匹鮮卑慕容德僭號於青州德死從子超襲偽位公抗表北討屠廣因超踰城走獲之戮其王公以下約口萬餘馬二千匹夷其城隍獻超于京師斬于建康市盧循寇南康盧陵豫章諸郡守皆委任奔走馳使徵公公至下邳留船運輜重自帥精銳步歸孟昶諸葛長民懼寇之深也欲擁天子過江公弗聽昶窮窘無餘圖飲藥而卒群賊大至公悉出輕利帝躬提幡鼓命軍眾齊力擊之賊眾大敗追奔逮夜乃收兵而歸循等還潯陽公更簡練三軍將進攻討循聞大軍至欲遁還豫章乃悉力柵斷左里丙申大軍至左里將戰公麾以進兵幡竿折遂沉于水眾皆失色公自忻笑曰往年覆舟之戰亦幡竿折今復然賊必破矣眾乃大悅即攻柵並進循兵雖死戰猶弗能禁諸軍乘勝擊之循單舸走劉蕃孟懷玉斬徐道覆于始興傳首京師交州刺史杜慧度斬盧循父子函七首送都劉毅為荊州刺史矜功驕縱公表請討之毅單騎出自隘道側分遣諸軍伐蜀以朱齡石為益州刺史公授以謀略遂平成都斬偽蜀王譙縱荊州刺史司馬休之僭結雍州刺史魯宗之宗之得書響應公帥眾軍西討休之不敢戰乃棄城走奔偽羗偽主姚興死子泓新立人情騷擾公乃抗表北伐諸軍入關及姚泓戰大破之泓肉袒稽首公至長安長安豐稔帑藏盈積後宮數千人公先收彝器渾儀土圭之屬獻于京師其餘珍寶珠王悉以班諸將士執姚泓歸之有司斬于建康市公至洛陽常有紫雲見於軍上晉帝乃命有司禪位于王改元熙二年為永初元年三年正月崩于西陵年六十沈約宋書曰高祖諱裕字德輿漢楚元王交之後也小字寄奴初高祖家貧嘗負刁逵社錢三萬經時無以還逵執錄甚嚴王謐造逵見之乃密以錢代還由是得釋高祖名微位薄盛流皆不與相知唯謐交焉桓玄將篡謐手解安帝璽紱為玄佐命功臣及義旗事建眾並謂謐宜誅唯高祖保持之上清簡寡欲嚴整有法度不視珠玉輿馬之飾後庭無絲竹之音寧州嘗獻虎魄枕光色甚麗時將北征以虎魄治金瘡上大悅命擣碎分付諸將卒關中得姚興後女有盛寵以之廢事謝晦諫即時遣出錢帛皆付外府內無私藏宋臺建有司奏東西堂施局腳床銀塗釘上不許使用直腳床釘用鐵孝武帝大明中壞上所居陰室於其處起玉燭殿與群臣觀之床頭土鄣璧上掛葛燈籠麻繩紼侍中袁覬盛稱上儉素之德故能光有天下克成大業者焉宋書高祖遊京口竹林寺獨臥講堂前上有五色龍章眾僧見之驚以白帝帝獨喜曰上人無妄言也述異記曰宋高祖微時嘗遊會下過孔靜宅正晝臥有神人衣服非常謂之曰起天子在門既而失之靜遽出適與帝遇延入結交贈遺臨別執帝手曰卿後必當大貴願以身嗣為託帝許之及定京邑靜自山陰令擢為會稽內史劉義符徐爰宋書曰少帝諱義符高祖長子也高祖崩五月即皇帝位廬陵王義真明雋秀令朝野屬望而司空徐羨之尚書僕射傅亮領軍謝晦等貪弄朝權深相忌憚乃共誣罔搆成其釁是日上䟽收義真徙于新安郡徐羨之王弘傅亮謝晦檀道濟等守門露仗入殿時上在華林園寢舟中兵士競進殺侍御者二人遂扶上出東閤廢為滎陽王一依漢昌邑晉海西故事遂徙干吳郡六月徐羨之等使邢安太殺滎陽王於金昌亭年十九沈約宋書曰羨之等將謀廢立而廬陵王義真輕動多過不任主四海乃先廢義真然後廢帝侍中程道惠勸立第五皇帝恭羨之不許遣使殺真於新安殺帝於吳縣帝突走出門追者以門關擊之倒地然後加害劉義隆沈約宋書曰太祖文皇帝諱義隆小字車兒武帝第三子也授西中郎將荊州刺史長七尺五寸愽涉經史善隸書少帝廢百官備法駕奉迎即皇帝位改元元嘉元年三年司徒錄尚書令楊州刺史徐羨之尚書令護軍將軍傅亮有罪伏誅遣中領軍到彥之征北將軍檀道濟討荊州刺史謝晦上親帥六師擒晦於延頭送京師伏誅京師疾疫遣使存問給醫藥死者若無家屬賜以棺木十二年大水京邑乘舡二十四年貨貴制大錢一當兩三十年三月遇弒于含光殿年四十七劉劭沈約宋書曰劉劭字休遠文帝長子六歲拜為皇太子二十七年有巫嚴道育自言通靈天為劫沒入奚官劭姊東陽公主應閤婢王鸚鵡白公主云道育有異術主乃白上求入道育道育自言服食主及劭皆惑之始興王濬與劭並多過失使道育祈請令不上達遂誣蠱事泄道育叛亡變服為尼逃東宮濬往京口復載將去三十年二月濬自京口入朝復載還東宮有告上云京口有一尼服食出入征北內似是嚴道士上使掩捉得二婢云道育隨濬還都上乃使京口送道育二婢頃至撿覆廢劭賜濬死母潘淑妃具以告濬濬馳報劭劭因是有異謀其月二十一日召前中庶子蕭斌告以逆事明旦與斌同載從萬春門入張超之手行殺逆又使人殺潘淑妃濬屯中堂劭即偽位改元嘉三年為太初元年世祖及南譙王義宣隨王誕並舉義兵劭以事委王羅漢魯秀以拒義軍三月十九日義軍至新林二十一日至新亭二十二日劭眾連敗相繼散降四月四日義軍薛安都等並入殿臧質從廣莫門入同會大極殿劭穿西垣入武庫井中即從井中牽出縛劭於馬上防送軍門斬于牙下濬劭及四子並梟首曝屍於市投劭濬屍于江張超之為亂兵所剖腹刳心臠食其肉焚其頭骨道育鸚鵡並都街鞭殺於石頭西望山下焚屍揚灰于江後史官目劭為元凶劉駿沈約宋書曰世祖孝武皇帝諱駿字休龍小字道民文帝第三子遷南中郎將江州刺史元凶殺逆以為征南將軍加散騎常侍上帥眾入討荊州刺史南譙王義宣雍州刺史臧質並舉義兵元嘉三十年四月上至于新亭即皇帝位五月剋京城孝建元年春新祠南郊改元大赦詔凡諸守蒞親民之官可申詳舊條勸畫書地利力田善蓄者具以名聞更鑄四銖錢立皇子業為太子賜為父後者爵一級大明元年正月大赦改元四月京師疾疫遣使案行賜給醫藥死而無收斂者官為斂埋諸王及妃王庶姓位從公者喪事聽設凶門餘悉斷司空南州刺史竟陵王誕有罪貶爵誕不受命據廣陵反上親御六師車駕出頓宣武堂三年七月剋廣陵城斬誕初立馳道自閶闔門至朱雀門又自朱雀門至於玄武湖七年於博望山立雙闕八年閏五月帝崩於玉燭殿年三十五沈約宋書曰世祖遊幸無度太后六宮常乘副車在後沈懷文與王景文每諫不宜數出後同從坐松樹下風雨甚驟景文曰卿可以言矣懷文曰獨言無係宜相與諫之江智淵臥草側亦謂言之為善俄而被召俱入雉場懷文曰風雨如此非聖躬所宜冒景文又曰懷文所啟宜從智淵未及有言上乃注弩作色曰卿欲效顏峻耶何以恒知人事又曰顏峻小子恨不得鞭其面目劉子業沈約宋書曰前廢帝諱子業小字法師孝武帝長子也世祖入伐元凶被囚於侍中下省將見害者數矣卒得無恙世祖崩其日太子即皇帝位罷南北二馳道孝建以來所改制度還依元嘉是歲諸郡大旱甚米一斗數百京邑亦至百餘永光元年春改元大赦八月帝自率宿衛兵誅太宰江夏王義恭尚書令驃騎大將軍柳元景尚書左僕射顏師伯廷尉劉德願改元為景和元年以宮人謝氏為貴嬪夫人加虎賁鞁戟鸞輅龍旗出警入蹕時帝凶悖日甚誅殺相繼內外百司不保首領先訛言湘中出天子帝將南巡荊湘二州以厭之先欲誅除諸叔然後發太宗與左右阮佃夫王道隆李道兒密結帝左右壽寂之姜產之等十一人謀共廢帝戊午夜帝於華林園竹林堂射鬼時巫云見此堂有鬼故帝自射之壽寂之懷刀入姜產之為副帝欲走寂之追而殞之時年十七帝幼而狷急在東宮每為世祖所責世祖西巡子業啟參起居書跡不謹上讓之子業啟事陳謝上荅曰書不長進此是一條耳聞汝素業都懈狷戾日甚何以頑固爾耶帝少好讀書頗識古事自造世祖誅及雜篇章往往有辭彩沈約宋書曰前廢帝景和末召南平王鑠妃江氏入宮使左右於前逼迫之江氏不受命謂之曰若不從當殺汝三子江氏猶不肯於是遣使於第殺敬猷敬淵等杖一百其夕廢帝亦殞劉彧沈約宋書曰太宗明皇帝諱彧字休炳小字榮期文帝第十一子也為雍州刺史景和末上入朝被留停廢帝誅害宰輔殺戮大臣恒慮有圖之者疑畏諸父並拘之殿內收上付廷尉一宿被原將加禍害者前後非一既而害上意定明旦便應就禍害上先與腹心阮佃夫李道兒壽寂之等密共合謀殞廢帝於後堂建安王休仁便稱臣引升西堂御坐召見諸大臣于時事出倉卒上失履跣至西堂猶著烏帽坐定休仁呼主衣以白帽代之引備羽儀雖未即位凡眾事悉稱令書施行上即皇帝位大赦天下改景和元年為太始元年鎮軍將軍江州刺史晉安王子勛舉兵反鎮軍長史鄧琬為其謀主雍州刺史袁顗帥眾赴之車駕親御六師出頓中興堂司徒建安王休仁帥眾軍大破賊斬偽尚書僕射袁顗進討江郢荊雍相五州平定之晉安王子勛並賜死同黨皆伏誅太豫元年四月上大漸袁粲禇淵劉勔蔡興宗沈攸之同被顧命上崩于景福殿年四十四帝少而和美風姿端雅早失所生飬於路太后房內大明世諸弟多被猜忌唯上見親常侍路太后醫藥好讀書愛文義在藩時撰江左以來文章志又續衛瓘所注論語二卷行世及即大位四方反叛以寬仁待物諸將帥有父兄子弟同逆者並授以禁兵委任不異故眾為之用莫不盡力平定天下逆黨多被全宥其才者並見授用有如舊臣才學之士多蒙引進參攷典籍應對左右於華林園茆堂講周易常自臨聽末年好鬼神多忌諱近讒慝剪落皇技宋氏之業自此衰矣沈約宋書曰王景文為揚州刺史上既有疾而諸弟並已見殺唯桂楊王休範人才本下不見疑出為江州刺史慮一旦晏駕皇后臨朝景文自然成宰相門族強盛籍元舅之重歲暮不為純臣太豫元年春上疾篤乃遣使送藥賜景文死手詔曰與卿周旋欲全卿門戶故有此處分劉昱沈約宋書曰廢帝諱昱字德融小字慧震明帝長子也太宗諸子在孕皆以周易筮之即以得之卦為小字故帝字慧震立為皇太子太宗崩太子即位元徽元年正月改元二年太尉江州刺史桂陽王休範舉兵反賊奄至攻新亭壘齊王拒擊大破之越騎校尉張茍兒斬休範五年七月戊子夜帝殞於仁壽殿初帝在東宮年五六歲時始就書學而墮業好嬉戲主師不能禁好緣漆帳竿去地二丈餘如此者半食乃下年漸長喜怒無節左右有失旨者輒手加撲打徒跣蹲踞以此為常主師以白太宗上輒敕昱所生嚴加捶訓及嗣位內畏太后外憚諸臣猶未得肆志自加元服變態轉興內外稍無以制三年秋冬間便好出遊行太妃每乘青篾車隨相撿攝漸自放恣太后不復能禁單將左右棄部伍或十里二十里入市里或往營署旦出日暮乃歸四年春夏此行彌數自京城剋定意志轉驕於是無日不出與左右人解僧智張立鬼恒自馳逐夜出承明門久去晨反旦去暮歸從者並執鋌矛行人男女及馬驢值無免者民間憂懼晝日不敢開門道上行人殆絕常著小袴未嘗服衣冠有白棓數十枚各有名號鉗鑿錐鋸之徒不離左右嘗以鐵錐錐人陰破左右人見斂眉者昱大怒令此人祖臂正立以矛刺臂洞骨於耀靈殿上飬驢數十頭所自乘馬飬於御床側先是民間訛言謂太宗不男昱是李道兒子昱每出入去來常自稱劉統或自號李將軍與右衛翼輦營女子私通每從之遊持百數十錢供酒肉之費輅車一乘其上施蓬乘以出入從者不過數十人羽儀追之恒不及又各慮禍亦不敢追尋惟整部伍別在一處瞻望而已凡諸鄙事過目即能能鍜金銀裁衣作帽莫不精絕未嘗吹箎執管便韻天性好殺以此為忻一日無事慘慘不樂齊王潛圖廢立與直閣將軍王敬則謀之七月七日昱乘露車從二百許人無復鹵簿羽儀往青園尼寺曉至新安寺就曇渡道人飲酒醉扶夕還仁壽殿東河艖氈幄中臥時昱出入無禁大內諸閣夜皆不閉廂下畏相逢值無敢出者宿衛並逃避內外無相禁攝王敬則先結昱左右楊萬年等二十五人謀共取昱其夕王敬則出外楊玉夫見昱醉熟無所知乃與萬年同入氈幄內以昱防身刀斬之提昱首依常行法稱敕開承明門出以首與敬則馳至領軍府以首付齊王齊王乃戎服率左右數十人稱行還開承明門入昱他夕每開門門者震懼不敢視至是弗之疑齊王既入曉乃奉太后令奉迎安成王劉准沈約宋書曰順皇帝諱准字仲謨小字知觀明皇帝第三子也封安成王廢帝殞奉迎王入居朝堂壬辰即皇帝位昇明元年改元大赦齊王出鎮東城輔政作相三年加相國揔百揆備九錫之禮四月禪位于齊王壬辰帝遜于東邸既而遷居丹陽宮封為汝陰王殂于丹陽謚曰順皇帝時年十三史臣曰聖王膺錄自非接亂承微則天曆不至也自三五以來受命之主莫不乘淪亡之極然後符樂推之運水德遷謝其來久矣豈止於區區汝陰揖讓而已哉
