body:
  text: 人事部三十一言語說文曰直言曰言語議曰語釋名曰言宣也宣彼此之意也語敘也敘己所欲說述也易繫辭曰同心之言其臭如蘭又曰子曰書不盡言言不盡意又曰君子出其言善則千里之外應之況其邇者乎出其言不善則千里之外違之況其邇者乎言出乎身加乎民行發乎邇見乎遠言行君子之樞機樞機之發榮辱之主也又曰將叛者其辭慚中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈尚書益稷曰帝曰來禹汝亦昌言咎繇謀九德故呼禹使亦陳昌言也又無逸曰其在高宗時舊勞于外爰暨小人作其即位乃或諒闇三年不言其惟不言言乃雍又泰誓曰予誓告汝群言之首毛詩雨無正曰哿矣能言巧言如流俾躬處休箋云巧猶善也謂以事類風切如水之流急忽然而過之故不悖逆使身居安休如之也亂世之言順而為上也又小弁曰君子母易由言耳屬于垣箋云猶用也王母輕用讒人之言將有屬耳于垣壁聽也又巧言曰巧言如簧顏之厚矣又魚藻都人士曰彼都人士狐裘黃黃其容不改出言有章又蕩之什曰白珪之玷尚可磨也斯言之玷不可為也禮記玉藻曰動則左史書之言則右史書之又少儀曰言語之美穆穆皇皇又中庸曰故君子語大天下莫能載焉語小天下莫能破焉君子言顧行行顧言也又表記曰天下無道則言有枝葉又曰子曰事君大言入則望大利小言入則望小利大言可以立大事小言可以立小事立謂君受故君子不以小言受大祿不以大言受小祿又緇衣曰子曰王言如絲其出如綸王言如綸其出如綍故大人不倡遊言遊浮也不可用之浮也可行也不可言也君子弗言也可言也不可行也君子弗行也則民言不危行而行不危言也左傳僖中曰介子推曰言身之文也身將隱矣焉用文之求顯也又襄四年曰仲尼曰言以足志文以足言足猶成也不言誰知其志言之無文行而不遠左傳昭公曰晉叔向適鄭鬷薎惡欲觀叔向從收器者立於堂下一言而善叔向聞之曰必鬷明也又定上曰鄭子太叔卒晉趙簡子為臨甚哀曰黃父之會賈逵解曰黃父會在昭五年夫子語我九言曰無始亂無為亂始無怙富無恃寵無違同無慠禮無驕能無復怒無謀非德無犯非義又哀上曰吳舍衛侯衛侯歸效夷言子之尚幼曰君必不免其死於夷乎執焉而又說其言從之固矣論語曰詩三百一言以蔽之曰思無邪又曰君子欲訥於言而敏於行又曰定公問一言而可以興邦有諸孔子對曰言不可以若是其幾也人之言曰為君難為臣不易如知為君之難也不幾乎一言而興邦乎又曰言語宰我子貢又曰群居終日言不及義好行小惠難矣哉又曰君子不以言舉人不以人廢言又曰有德者必有言有言者不必有德又曰可與之言而不與言失人不可與言而與之言失言智者不失人亦不失言又曰侍於君子有三愆言未及之而言謂之躁言及之而不言謂之隱未見顏色而言謂之瞽又曰子曰子欲無言疾時利口多言無賢也子貢曰子如不言則小子何述焉子曰天何言哉四時行焉百物生焉天何言哉孝經曰口無擇言身無擇行言滿天下無口過家語曰仲孫何忌問於顏回曰仁者一言而必有益於仁智可得聞乎顏回曰一言而有益於智莫若蒙一言而有益於仁莫如恕又曰顏回問孔子曰小人之言有同乎君子者不可不察也子曰君子以行言小人以舌言又曰孔子北遊登農山子路子貢顏回侍側孔子四望喟然歎曰二三子各言爾志子路進曰由願得白羽若月赤羽若日鍾鼓之音上振于天旌旗紛紛下蟠於地由當一隊而敵之必也攘地千里搴旗執馘使二子者從我焉夫子曰勇哉子貢復進曰賜願使齊楚合戰兩壘相當旗鼓相望埃塵連接挺刃交兵賜縞衣白冠陳說其間推論利害使二國釋患唯賜能之使夫二子者從我焉夫子曰辯哉回曰願得明王聖主而相之敷其五教導以禮樂使城郭不修溝池不越鑄劍戟為農器放牛馬於原藪室家無離曠之思千載無鬭戰之患使由無所施其勇賜無所用其辯孔子曰美哉德之大也史記曰孔子適周問禮於老子老子曰子所言者其人與骨皆已朽矣獨其言在耳辭去而老子送之曰吾聞富貴者送人以財仁人者送人以言吾不能富貴竊仁人之號送子以言曰聰明深察而近於死者好議人之非也博辯宏大而危其身者發人之惡者也為人子者無以有己也家語同又曰沛公至灞上召秦父老曰秦苛法誹謗者族偶語棄市漢書曰漢王與項羽臨廣武間而語又曰太尉周勃迎代王請間宋昌曰所言公公言之所言私王者無私又曰石建奏事於上前即有可言屏人乃極切至庭見如不能言上以是親而禮之又曰袁盎求見丞相申屠嘉良久乃見因跪曰願請間丞相曰使君所言公事之曹與長史掾議之吾且奏之則私吾不受私語盎即起東觀漢記曰馬援謂官屬曰吾從弟少遊常哀吾慷慨大志曰士生一世乘下澤車御款段馬為郡掾史守墳墓鄉曲稱善人斯可矣當吾在浪泊里間虜未滅之時下潦上霧毒氣熏蒸仰視烏鳶跕丁愜切跕墮水中臥念少遊平生時語何可得也蜀志曰龐統字士元襄陽人少時朴鈍未有識者頴川司馬徽清雅有人倫鑒統弱冠往見徽徽採桑樹上統桑下共自晝達夜徽甚異之稱統當為南州士之冠冕由是顯名晉書曰武帝問孫皓曰聞南人好汝語頗為不皓因舉觴奉帝而言曰昔為汝國鄰今為汝國臣勸汝一杯酒願汝壽萬春帝悔之沈約宋書曰謝莊孝建元年遷左衛將軍初世祖嘗賜莊寶劍以與豫州刺史魯爽別後叛世祖因宴集問劍所在荅曰昔與魯爽別竊為陛下杜郵之賜上甚悅也當時以為知言鄧析書曰一言而非駟馬不能追一言而急駟馬不能及晏子曰曾子將行晏子送之曰君子贈人以軒不若贈人以言老子曰多言數窮不如守中善言無瑕讁又曰信言不美美言不信又曰天之道不言而善應墨子曰子禽問曰多言有益乎墨子曰蝦蟆蛙黽日夜而鳴舌乾擗然而不聽今鶴雞時夜而鳴天下振動多言何益唯其言之時也孫卿子曰贈人以言重於金石珠玉傷人以言重於刀戟觀人以言美於黼黻文章聽人以言樂於鐘鼓琴瑟又曰金人銘曰周大廟右階之前有金人焉三緘其口而銘其背曰我古之慎言人也戒之哉無多言無多事多言多敗多事多害皇覽云出太公金頤家語說苑又載莊子曰言者所以在意也得意而忘言吾安得忘言之人與之言哉說苑曰梁君出獵見白鴈群梁君下車彀弓欲射之道有行者觀勸梁君止鴈群駭梁君怒欲殺行者其御公孫龍下車對曰昔者齊景公之時天旱三年卜之曰必以人祠乃雨景公曰吾昔所以求雨者為吾民也今以人祠乃雨寡人將自當之言未卒天大雨方千里今主君以白鴈故而欲殺之無異於狼虎梁君援其首與上車歸入郭門呼萬歲曰樂哉今日獨也獨得善言子思子曰同言而信信在言前申子曰明君治國三寸之機運而天下定方寸之謀正而天下治一言正而天下定一言倚而天下靡淮南子曰人有多言者百舌之聲也又曰得萬人之兵不若聞一言之當新序曰晉文逐麋而失跡問農夫老古曰麋何在老古以足指曰如是行往公曰寡人問子子以足指何也老古振衣而起曰虎豹之居也厭閑而之近故得魚鱉之居也厭深而之淺故得諸侯之居也厭眾而遠遊故亡其國公恐歸曰寡人逐麋而失之得善言故有悅色欒武子曰其人安在公曰吾未與來也欒武子曰取人之言而棄其身盜也公曰善遂載老古與俱歸楊子曰大哉聖人言之至也開之廓然見四海之內閑之寂然不覩墻垣之里良玉不彫至言不文賈誼新書曰言有四術言敬以禮朝廷之言也文言有序祭祀之言也并氣折聲軍旅之言也言若不足喪紀之言也郭子曰孫安國盛字安國往殷中軍許共語別名浩也往返精苦客主無間左右進食冷而復煖者數四彼我奮擲塵尾毛悉隨落滿飡飯中賓主遂至暮忘飡殷方語孫卿曰公勿作強口馬我當併卿控孫亦曰卿勿作穴鼻牛我當穿卿頰尸子曰言美則響美言惡則響惡五帝本紀曰黃帝弱而能言神仙傳曰老子生而能語衛玠別傳曰太尉王君見阮千里而問曰老莊與聖教同異阮曰將無同太尉善其言辟之為掾世號曰三語掾王君嘲之曰一言可辟何假於三阮曰茍足天下民望亦可無言而辟復何假於一管輅別傳曰裴冀州何鄧二尚書及鄉里劉太常潁川兄弟輅曰自與此五君共言論使人精神清發至昏不暇寐自此已下殆白日欲寢陵零先賢傳曰張飛嘗就劉巴宿巴不與語遂忿恚諸葛亮謂巴曰張飛雖實武人敬慕足下足下雖天素高亮宜少降意曰丈夫處世當交四海英雄如何與兵子語備聞之怒曰孤欲定天下而子初專亂之括地圖曰太極山採華之草一日服之通萬里語世說曰晉文王稱阮嗣宗天下之至慎每與之言言及玄遠未嘗臧否人物又曰諸葛瑾為豫州遣別駕到臺語云小兒知談卿可與語於張輔吳座中相遇別駕呼恪咄咄郎君恪因嘲之曰豫州亂矣何咄咄有荅曰君明臣賢未聞有亂恪復云昔唐堯在上四凶在下荅曰非唯四凶亦有丹朱又曰或問王濟云昨遊有何語議濟曰張華善說史漢裴逸民敘前言往行袞袞可聽王戎道子房季扎之間陶然玄著又曰郝隆為桓公南蠻參軍三月三日作詩不能者罰酒隆攬筆作一句云娵隅躍清池桓曰娵隅是何物荅曰蠻名魚為娵隅桓曰作詩何以作蠻語隆曰千里投公始得蠻府參軍那得不作蠻語又曰裴僕射時人謂言談之林藪又曰殷中軍浩嘗至劉尹所惔字真長殷理屈而遊詞不已劉亦不復荅殷去乃言曰田舍兒學人作爾馨語又曰陸士龍荀鳴鶴未相識俱會張茂先座張介令共語以其並有大才可勿作常談陸抗手曰雲間陸士龍荀曰日下荀鳴鶴陸曰既開青雲覩白雉何不張爾弓挾爾矢荀曰本謂雲龍騤騤乃是山鹿野麋獸微弩強是以發遲張乃拊手大笑又曰王武子孫子荊各言鄉里土地人物之美王云其地坦而平其水澹而清其人廉且貞孫云其山崔嵬以嵯峨其水㳌渫而揚波其人礧砢而英多又曰宋處宗甚有思理才常買得一長鳴雞愛養之甚至恒籠盛著窗間雞遂作人語與處宗談語極有言思終日不輟處宗因此言遂大進又曰謝太傅一生語未嘗誤每共說退後敘說向言皆得次第後忽一悞自知當必死其年而薨又曰恒南郡與殷荊州語次因作了語顧愷曰火燒平原無遺燎桓曰白布纏棺樹旒旐殷曰投魚深淵放飛鳥次復作危語桓曰矛頭浙米劍頭炊殷曰百歲老翁攀枯枝顧曰井上轆轤安嬰兒殷有一參軍在坐云盲人騎瞎馬臨深池殷曰咄咄逼人仲堪眇目故也蘇彥語箴曰利輕春露害重冬霜蘧蒢充室戚施滿堂孫楚反金人銘曰晉太廟左偕前有石人焉大張其口而書其胸曰我古之多言人也無少言少言少事則後生何述焉夫唯立言名乃長久胡為塊然唑緘其口
