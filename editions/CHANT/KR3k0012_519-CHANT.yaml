body:
  text: 宗親部八子易蠱卦曰幹父之蠱有子考無咎厲終吉又家人卦曰家人嗃嗃悔厲吉父子嘻嘻終吝儀禮曰父為長子服三年何也正禮乎上又所重也禮記內則曰由命士以上父子皆異宮又祭義曰身也者父母之遺體也行父母之遺體敢不敬乎左傳隱公曰衛莊公之子州吁有寵而好兵公弗禁石碏諫曰臣聞愛子教之以義方不納於邪又宣上曰楚司馬子良生子越椒子文曰必殺之是子也熊虎之狀而豺狼之聲不殺必滅若敖氏矣論語曰陳亢問於伯魚曰子亦有異聞乎對曰未也嘗獨立鯉趍而過庭曰學詩乎對曰未也曰不學詩無以言他日又獨立鯉趍而過庭曰學禮乎對曰未也不學禮無以立鯉退而學禮陳亢退而喜曰問一得三聞詩聞禮又聞君子之遠其子也孝經曰父子之道天性也周書曰周公三撻伯禽往見商子商子曰南山有橋父道也北山有梓子道也蓋往觀之而伯禽往視橋梓明日朝伯禽俯而趨周公迎而撫之曰汝安見君子哉史記曰吳起衛人好用兵嘗學於曾子事魯君出衛郭門與其母決齧臂而盟曰起不為卿相不復入衛也又曰司馬談為太史天子建漢家之封而太史公留滯周南不得從事發憤而卒子遷適見父於河洛之間太史公執遷手下泣曰其先即周之太史後世中衰絕於余乎汝後為太史則續吾祖矣漢書曰張湯杜陵人父為長安丞父出湯為兒守舍遭鼠盜肉父還怒之笞湯湯掘地薰鼠得餘肉劾鼠掠治訊鞠鞫論報取鼠磔堂下父忽視其文辭如老吏大驚異遂使書獄焉又曰王遵字子貢涿人遷益州刺史先是王陽為益州至邛崍九折阪歎曰奉先人遺體奈何數乘此險後以疾去及遵至此阪問吏曰此非王陽所畏道耶吏曰是遵叱其馭曰驅之王陽為孝子王遵為忠臣又曰曹參代蕭何為相國日夜飲酒子窋為中大夫惠帝怪之令窋言曰無以請事何以憂天下窋洗沐歸具言參怒之乃笞二百曰趣入侍天下事非汝所當言又曰路溫舒字長君鉅鹿人父為里門監使溫舒牧羊因取澤中蒲截為牒編之寫書又曰揚雄蜀人自楊季至雄五代一子也又曰韋賢字長孺魯人質樸少欲篤志於學通詩書易以教授號鄒魯大儒為丞相薨少子玄成字少翁以明經歷位丞相故鄒魯諺曰遺子黃金滿籯不如教之一經又曰張禹字子文河內軹人父徙家蓮勺禹為小兒數至市卜相者奇其面貌謂禹父曰此兒多智可令經學矣又曰疏廣字仲翁東海蘭陵人也明春秋為太子太傅知止足與兄子受上䟽乞骸骨上賜黃金二十斤太子贈五十斤歸鄉里請故舊賓客為樂歲餘子孫竊謂昆弟老人勸說買田宅廣曰吾豈不念子孫哉顧有田廬足供衣食令更增益以為盈餘教子孫怠惰耳賢而多財損其志愚而多財益以為其過富者眾人怨也吾既無教化於子孫不欲益生於怨也又曰朱邑字仲卿廬江人少時為桐鄉嗇夫病且死囑其子曰我為桐鄉吏其民愛我死必葬之後世子孫奉祀我不如桐鄉死且葬之民為起冢祠又曰石奮從高祖至景帝時為九卿子等四人官至二千石景帝尊寵號為萬石君以上大夫祿歸老子家子孫有過不誚讓便對按不食後漢書曰馮勤字偉伯魏郡人曾祖楊宣帝時為弘農太守有子八人皆為二千石魏趙間號為萬石君又曰周華字宣光汝南人子勰字巨勝自曾祖楊至勰孫恂六代一子皆知名又曰吳祐字季英陳留人父恢為南海太守祐年十二隨父到官恢欲殺青簡竹以寫書祐諫曰今大人踰越五嶺遠在海濱其俗誠陋舊多珍怪上為國家所疑下為權威所望此書若成即載之而歸昔馬援以薏苡興謗王陽以衣囊徼名嫌疑之間先賢所慎恢奇之乃撫其首曰吳氏世不乏季子矣又曰崔烈涿郡人靈帝開鴻都門榜賣官爵烈入錢五百萬得為司徒及拜日天子臨軒百寮畢會帝欣謂親幸曰悔不至三公後聲譽日滅烈不自安問子鈞曰吾為三公於議何如鈞曰嫌大人銅臭烈舉杖擊之鈞時為虎賁中郎服虎并載鶡尾狼狽而走烈罵曰死卒父撾而走豈孝乎鈞曰舜之事父也小杖受大杖走此恐陷父於不義非不孝也烈慚而讓官魏志曰張廣字嗣宗魯第二子也魯雅為魏武所寵諸子未勝纓並遣中使拜授官爵南鄭城碑曰位尊上將體極人臣五子十室榮並爵均童年嬰稚抱拜王人命婚帝族或尚或嬪又曰胡威字伯庸父質操厲清白為荊州太守威至荊州省之十餘日歸質賜絹一疋威跪問曰大人清高何得此物質曰俸祿之餘耳武帝問威曰卿清何如父清威曰臣不如父遠矣帝曰何對曰父清畏人知臣清畏人不知是以不如也又曰賈充字公閭父逵晚生充言充後當有充閭之度故名充字公閭又曰羊祜字叔子年數歲令乳母取所棄金環乳母曰汝先無此物祜即指鄰人李氏東垣桑樹中探得之主人驚曰此吾亡兒所失物色時人謂祜前身為李氏之子又曰華嶠字叔駿才學深博為祕書監性嗜酒率常沉醉撰漢記九十七卷其十典未成而終祕書監何邵奏嶠子徹為佐著作續成之亦未竟而卒又曰王隱字處叔陳人世寒素父銓歷陽令有著述志每私錄晉事及功臣行狀未就而卒隱儒素自守不交權貴博學多聞受遺業為著作郎令撰晉史又曰孫盛字安國次子放字齊莊幼稱令惠年七八歲在荊州與父俱從庾亮出獵亮謂曰君亦來耶放應聲荅曰無小無大從公于邁亮白欲齊何莊放曰齊莊周亮曰不慕仲尼耶放曰仲尼生而知之者非所企及亮大奇之曰王輔嗣不過也又曰庾翼字稚恭孫盛字安國翼子愛客常候孫盛盛不在見盛子放謂之曰安國何在放曰往庾稚恭家愛客曰孫氏大盛有兒如此放曰不如諸庾之翼翼既而語人曰我固得重呼奴公字又曰袁宏為東征賦並列過江諸名德獨不載桓彝其子溫怒焉宏一時之文宗為文不欲令人顯問時並遊青山飲歸溫命宏同載因問曰君作東征賦何獨不及家君宏對曰尊公稱謂非下官敢專既未遑啟不敢顯之溫疑其不實乃曰欲謂何宏曰風鑒散朗或搜或引身雖可亡道則不殞宣城之節信而為允也溫泫然而止又不及陶侃子胡奴嘗於曲室抽刀逼問宏曰家君勳績如此云何相忘宏急荅曰精明百鍊在割能斷功以濟時職以靜亂長沙之勳為史所譖胡奴乃止又曰謝尚字祖仁豫章太守鯤之子也八歲神晤夙成鯤嘗攜之或曰此兒一座顏回也尚應聲曰座無尼父誰識顏回一席之賓莫不驚異又曰王述字懷祖遷尚書僕射述每受職不為虛讓其子坦之諫曰故事應讓述曰汝為我不堪也坦之曰非也克讓自美耳述曰既云堪何為復讓也坦之為柏溫府長史溫子欲求婚于王因坦之言其父坦之乃還家省父而述愛坦之雖長大猶抱之於膝上坦之乃言婚事於述大怒遽推坦之於膝下曰汝竟癡也詎可視面以妻兵乃止又曰阮籍謂王渾曰濬仲清賞非卿倫也共卿言不如共阿戎談及戎子邁有美名少而肥大戎曰令食糠轉益肥也又曰王祥二子烈芬並知名為祥所重愛同時而病將亡遺囑烈欲還葬舊土芬欲留葬京邑祥涕泣曰不忘鄉仁也不戀本達也唯仁與達二子有焉又曰王衍喪幼子山簡弟之衍悲不自勝簡曰孩抱中物何至於此衍曰聖人忘情下人不及情情之所鍾正在吾輩也簡服其言更為之慟又曰魏舒字陽元為司徒子混字延廣有才行為太子舍人年二十七卒朝野咸為舒惜舒每哀慟退而歎曰吾不及莊生遠矣豈以無益自損更不復哭又曰胡母輔之字彥國嗜酒子謙之字子光才學不及父而傲縱過之至酣醉時嘗自呼其父字輔之不以介意世以為狂又曰石崇字季倫渤海南皮人苞之少子也生於青州故小名齊奴少敏惠勇而有謀父苞臨終分財與諸子獨不及倫其母為言之苞曰此兒雖小後自能致又曰郄超字景興一字嘉賓父愔為司徒愔事道超奉佛愔又好藂積錢數千萬嘗開庫任超所取超性好施一日之中散與親故都盡桓溫辟為征西大將軍掾溫懷不軌超為之謀轉司徒左長史而卒初雖黨桓氏以愔忠於王室不軌之事不令愔知將亡出一箱書付門生曰本欲焚之恐公年老老必傷愍為獘我亡後若大損寢食可呈此箱不爾即便焚之愔後果哀悼成病門生依旨呈之則悉與溫往反密計悉見愔於是大怒曰小子死恨晚矣更不復哭又曰庾冰字季堅都督江荊七郡軍事子襲常貸官絹一疋冰怒棰之市絹十疋還官又曰王濛字仲祖父汭字文開為淦令美容姿嘗覽鏡自照稱其父字曰王文開生如此兒又曰王導字茂弘子悅字長豫弱冠有高名事親色養導甚愛之常與悅弈碁爭道導笑曰想與有瓜葛那得爾耶導性儉悵下甘果爛敗令棄之云勿使大郎知悅為中書郎先導卒導先夢人以百萬錢買悅潛為祈禱者備矣尋掘地得錢百萬意甚惡之一一皆藏閉及悅疾篤導憂念時至不食積日忽見一人形狀甚偉被甲持刀導問是何人曰僕蔣侯也公兒不佳欲為請命故來耳導因求之食至數斗食畢謂導曰中書命盡非可救也言訖不見悅亦殞絕又曰劉殷字長盛新興人有子七人五人各授一經其一子授太史公記一子授漢書一門之內七業俱興北州之學殷最為盛門又曰索靖子琳字巨秀少有逸群之才靖每曰琳宗廟之器非簡札之用州縣之任不足污吾兒也又曰戴若思廣陵人父昌會稽太守若思往武陵時郡人潘京素有理筌識鑒父遣若思與語潘稱若思有公輔之才又曰王獻之字子敬羲之子也謝安甚欽之請為長史因問獻之曰君書何如家君荅曰固不同安曰外論不爾對曰人郍得知獻之嘗書羲之自後掣其筆不得歎曰此兒當有大名又以掃箒霑泥書大字方一丈甚以為工宋書曰戴顒字仲若淮南人父逵喜琴顒及兄勃並受琴於父父歿所傳之聲不忍復奏各造新弄五部顒又製長弄一部並傳於世齊書曰世祖常問王儉當今誰能作五言詩對曰謝朏得父之膏腴梁書曰謝朏祖弘微宋太常卿父莊齊光祿朏十歲能屬文莊多遊山水賦詩使朏命篇覽筆便就王京文謂莊曰賢子足稱神童莊笑曰真吾家千金又曰王僧孺父延年加為常侍孺五歲父友饋延年柰者先與僧孺孺曰大人未見不敢先嘗不受之又曰柳惲字文暢父世隆善彈琴為士流第一惲每奏其聲嘗感傷憂思後因之變體寫古曲家語曰吳延陵季子聘于上國其長子死葬於嬴博之間歛以時服其坎深不至泉其高可隱孔子曰延陵季子之合於禮者也列子曰魏人有東門吳者年四十有一子喪之而不憂其相室曰公之愛子也天下無有今子死不憂何也東門吳曰吾嘗無子之時不憂今子死乃與向無子同又奚憂焉呂氏春秋曰晉平公問祈黃羊曰國無尉其誰可乃云其子年君子聞之曰祁黃羊可謂至公矣三輔要錄曰韋康字元將京兆人孔融與康父端書曰前見元將來淵才亮茂雅度弘毅偉世之器也昨日又見仲將來懿性貞實文敏志篤誠保家之主也不意雙珠出于老蚌郭子曰楊脩字德祖九歲聰惠孔文舉詣其父父不在乃呼脩脩為設果果有楊梅融指示兒曰此君之家果耶脩應聲曰未聞孔雀是夫子之家禽獸姓氏英賢錄曰宋顏竣字士遜少有令名太祖問其父延之曰諸子誰有卿風延之曰峻得臣筆測得臣文敻得巨義濯得巨酒世說曰豫章太守顧邵雍之子也在郡卒雍時盛集賓客自與客碁而信至無兒書雖神色不變而心了其故以瓜搯掌流血沾襟客散方歎己無延陵之高豈有喪明之痛於是豁然神氣自若又曰客有問陳季方曰足下家君有何功德而荷天下重名季方曰吾家君譬如桂樹生於太山之阿上有萬仞之高下有不測之淵上為甘露所沾下有淵泉所潤當此之時焉知太山之高淵泉之深不知有功德與無也
