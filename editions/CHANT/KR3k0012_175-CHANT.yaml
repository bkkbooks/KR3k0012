body:
  text: 居處部二室說文曰室實也釋名曰室實也物滿實其中也毛詩曰斯干宣王考室也築室百堵西南其戶又曰如彼築室于道謀是用不潰于成鄭箋云如當路築室得人而與之謀所為路人之意不同故不得成又曰彼姝者子在我室兮又曰宛其死矣他人入室尚書曰若考作室既厎法厥子乃不肯室矧肯構周禮冬官匠人曰內有九室九嬪居之外有九室九卿居之禮記檀弓下曰晉獻趙文子成室晉大夫發焉文子趙武也作室成晉君獻之謂賀之也諸大夫亦發禮以往也長老曰美哉輪焉美哉奐焉歌於斯哭於斯聚國旋於斯文子曰武也得歌於斯哭於斯是全要領以從先大夫於九原也北面再拜稽首又曰室中不翔又曰儒有一畝之宮環堵之室左傳襄十五年宋向戍來聘見孟獻子尤其室曰子有令聞而美其室非所望也對曰我在晉吾兄為之毀之重勞且不敢間又曰鄭伯有嗜酒為窟室而夜飲酒擊鍾焉朝至未已朝者曰公焉在其人曰吾公在壑谷壑在窟室又曰吳公子光伏甲於窟室而享王掘地為室又曰怒於室而色於市論語曰子游為武城宰子曰汝得人焉耳乎曰有澹臺滅明者行不由徑非公事未嘗至於偃之室也澹臺滅明者孔子弟子子游之同門也修身正行公事乃肯來我室得與之語耳非公事不肯來言無私謁國語曰智襄子為室美智伯曰美則美矣抑臣亦有懼也襄子曰何懼對曰臣以秉筆事君記曰高山峻原不生草木松柏之地其土不植臣懼其不安人也室成三年而智氏亡說苑同又曰趙文子為室斫其椽而礱之礱磨張老夕焉而見之不謁而歸文子駕而往曰吾不善子亦告我何其速也對曰天子之室斫其椽而礱之加密石焉諸侯礱之大夫斫之士首之首之斫其首也備其物也從其等禮也今子貧而忘義富而忘禮吾懼不免何以敢告文子歸勿令礱也春秋繁露曰廣室多陰遠天地之和也故聖人弗為漢書曰文帝徵賈誼入見上方受釐坐宣室因感鬼神事與誼言之又曰武帝為竇太主置酒宣室使謁者引內董君是時東方朔陛戟殿下辟戟而前曰董偃斬罪三安得入乎上曰何謂也朔曰偃以人臣私侍公主其罪一也敗男女之化而亂婚姻之禮傷王制其罪二也陛下富於春秋積思於六經留神於王事馳騖於唐虞折節於三代偃不遵經勸學反以靡麗為右奢侈為務盡狗馬之樂極耳目之欲行邪狂之道經淫辟之路是乃國家之大賊人主之大蜮師古曰蜮魅也音或說者以為短狐非也短狐射工用於此不當其義今俗猶言魅蜮矣偃為淫首其罪三也上默然不應良久曰吾業已設飲後而自改朔曰不可夫宣室者先帝之正處也非法度之政不得入焉故淫亂之漸其變為篡是以堅貂為淫而易牙作患慶父死而魯國全管蔡誅而周室安上曰善有詔止更置酒北宮引董君從東司馬門入更名東交門蘇林曰以偃從北門入交會於內故以名之也賜朔黃金三十斤董君之寵由是日衰又霍光傳曰蓋主等奏廢光光聞止晝室中不敢入帝召入慰勉之注晝室近臣計晝之室師古曰雕晝之室也又曰孔光凡典樞機十餘年守法度修故事上有所問據經法以心所安而對不希旨茍合如或不從不敢強諫爭以是久而安時有所言輒削草稿以為章主之過以奸忠直人臣大罪也師古曰奸求也好忠直之名也奸音干也有所薦舉唯恐其人之聞知沐日歸休兄弟妻子燕語終不及朝省政事或問光溫室省中樹皆何木也晉灼曰長樂宮中有溫文殿光嘿不應更荅以他語其不泄如是又曰京房所言屢中天子悅之數召見問房對曰古帝王以功舉賢即萬化成瑞應著末世以毀譽取人故功業廢而致災異宜令百官各試其功災異可息詔使房作其事房奏考功課吏法上令公卿朝臣與房會議溫室皆以房言煩碎上下相司不可許上意鄉之時部刺史奏事京師上召見諸刺史令房曉以課事刺史復以為不可行唯御史大夫鄭弘光祿大夫周堪初言不可後善之又漢三年魏王豹叛漢附楚漢使大將韓信擊虜豹薄姬內人傳詣雒陽織室漢王見薄姬內後宮幸之生文帝後漢書曰祭彤為太仆從東巡狩過魯坐孔子講堂顧指子路室謂左右曰此太僕之室太僕吾之禦侮也又曰袁閎見時險亂而家門富盛常對兄弟嘆曰吾先公福祚後代不能以德守之而竟為驕奢與亂代爭權此即晉之三卻矣延熹末黨事將作遂散髮絕代欲投跡深林以母老不宜遠遁乃築土室四周於庭不為戶自牖納飲食東向拜母母思閎時往就視母去便自掩閉兄弟妻子莫得見也及母歿不為制服設位時莫能名或以狂生目之潛身十八年黃巾賊起攻沒郡縣百姓驚散閎誦經不移賊相約語不入其閭鄉人就閎避難皆得全免年五十七卒於土室又曰馬援之攻五溪蠻初軍至下雋有兩道可入從壺頭側路近而水嶮壺頭山名也在今辰州沅陵縣東武陵記此山頭與東海方壺山相似因名壺頭從充則塗夷而運遠充縣屬武陵郡帝初以為疑及軍至耿舒欲從充道援以為費糧不如進壺頭扼其喉咽搤持蠻賊自破以事上之帝從援策三日進營壺頭賊乘高守隘船不得上會暑甚士卒多疫死援亦以中病遂困乃穿岸為室以避炎氣武陵記曰壺頭山傍有石窟援所穿室也室內有蛇數百斛以大云是援之餘靈耳賊每乘險鼓譟援曳足以觀之左右哀其壯意莫不為流涕謝承後漢書曰陳蕃家居不好掃室賓客存之者或曰可一掃乎蕃曰丈夫當為國家掃除天下豈徒室中晉書曰嵇含字君道祖嘉徐州刺史父蕃太子舍人含好學能屬文家在鞏縣毫丘自號毫丘子署其門曰歸厚之門室曰慎終之室宋書曰武帝六年五月初置陰室于覆舟山脩藏水也唐書曰太子承乾盛農之時營造曲室累月不止左庶子于志寧切諫不從家語曰魯有獨處室者鄰之嫠婦亦獨處室夜暴風雨室壞趨而託之魯人閉戶不受三輔黃圖曰明堂有十二室法十二月楊龍驤洛陽記曰顯陽殿北有避雷室西有禦龍室神異經曰西北荒有石室有百二十人同居齊壽千二百歲十洲記曰崑崙山上有瓊華之室淮南子曰西方有金室列仙傳曰彭祖殷大夫也歷夏至商末號七百歲歷陽有彭祖仙室漢宮殿名曰神明臺武帝造高五丈上有九室今人謂之九天臺武帝求神仙恒置九天道士百人洛陽宮室名曰洛陽有望舒涼室含章鞠室清暑涼室老子曰鑿戶牖以為室當其無有室之用管子曰堯有衢室之問者下聽於民也事具帝王部晏子曰景公謂晏子曰寡人欲朝夕相見為夫子築室於閨內可乎對曰臣聞之隱而顯近而結唯至賢耳如臣者飾其容止待令猶恐罪戾也今君近之是遠之也又曰景公問晏子曰吾欲服聖王之服居聖王之室如此則諸侯其至乎對曰法其節儉則可法其服室無益也拾遺錄曰老君居反景之室日與世人絕跡又曰燕昭王坐祇明之室升於泉昭之館此館常有白鳳白鸞遞集其間列子曰虛室生白張湛注云夫視有若虛者虛室而純白獨生莊子曰原憲居圜堵之室蓬戶不完桑以為樞瓮以為牖上漏下濕匡坐而絃歌尸子曰厚積不登高臺不處大室高臺多傷大室多陰故皆不居呂氏春秋曰高元作室又曰齊宣王為大室大蓋百畝堂上三百戶三年而未成群臣莫敢諫淮南子曰高陽魋將為室問匠人匠人對曰未可也木尚生加塗其木必將撓以生材任重塗今雖成後必將敗高陽魋曰不然夫木枯則益勁塗乾則益輕以勁材任輕塗今雖惡後必善匠人窮辭無以對受命而為之室其始成竘然善也而後果敗又曰崑崙有璿室又曰有石城金室又曰古者民澤處腹穴鑿崖岸之腹以為密室冬日則不勝雪霜霧露夏日則不勝暑熱蚊䖟聖人乃作為之築土構木以為室屋上棟下宇以蔽風雨以避寒暑百姓安之鹽鐵論曰匈奴織柳為室旃席為蓋說苑曰延陵季子遊于晉曰吾入其都新室惡故室美故墻高新墻庳是以知民力屈也又曰一室之中有王道焉父母之謂也故君正則百姓治父母平則子孫孝慈是以孔子家兒不知倨所以然者生而見善教也新序曰魯哀公為室而大公儀子諫曰室大眾與人處則曄少與人處則悲願公適之也曰聞命矣築室者不輟明日又諫國小室大百姓必怨吾君諸侯聞之必輕吾國公曰聞命矣築室不輟明日又諫曰左昭右穆為室而大以臨二先君無乃害於孝乎於是哀公毀室而止風俗通曰論語夫子宮墻數仞禮記季武子入宮不敢哭由是言之宮室一也秦以來尊者以為常號乃避之耳室也實弟子職曰室中論語曰譬如墻由此言之宮其外室其內也楚辭曰砥室翠翹挂曲瓊些言臥內之室以砥為壁干而滑澤以翠鳥之羽雕飾玉鉤以經衣曲瓊玉鉤也又曰鑿山楹而為室下披衣於水渚霧濛濛其晨降兮雲裴斐而承宇又曰網戶朱綴刻方連冬有奧突奧復室夏大室夏室寒事具居處部上又曰築室兮水中葺之以荷蓋又曰像設居室靜閑安高堂邃宇檻層軒潘岳狹室賦曰伊余館之褊狹良窮弊而極微李尤室銘曰室以安寧寢息幽閑窒塞空隟遮遏風寒無曰寂寞屋漏昭然
