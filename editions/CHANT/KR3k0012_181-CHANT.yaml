body:
  text: 居處部八宅釋名曰宅擇也言擇處而營之也說文曰宅人所託也周禮曰凡任地國宅無征鄭注云國宅城中無征稅也禮記曰獻田宅者操書契左傳曰初景公欲更晏子之宅曰子之宅近市湫隘嚚塵不可以居請更諸爽塏者辭曰君之先臣容焉臣不足以嗣之及晏子如晉公更宅反則成矣既拜乃毀之如里室皆如其舊則使人反之且諺曰非宅是卜惟鄰是卜二三子先卜鄰矣卒復其舊宅漢書曰蕭何買田宅必居窮僻處曰令後世賢師吾儉不賢母為勢家所奪又曰魯恭王餘好治宮室苑囿壞孔子舊宅以廣其宮聞鍾磬琴瑟之聲遂不敢復壞於其壁中得古文經傳吳志曰周瑜與孫策同年相友善瑜推道南大宅以舍策升堂拜母有無通共晉書曰裴楷性寬厚與物無忤不持儉素每遊榮貴輒取其珍玩雖車馬器服宿昔之間便以施諸窮乏嘗營別宅基構甚麗與兄共遊行床帳儼然櫺軒踈朗兄心甚願之而口不言也楷心知其意便使住又曰杜后母裴氏為廣德縣君裴氏名穆長水校尉綽孫太傅主簿遐女太尉王夷甫外孫中表之美高於當世遐隨東海王越遇害無子唯穆渡江遂享榮慶立第南掖門外世所謂杜姥宅云又曰有奏王公國家京城不宜有田宅未暇作諸國邸當使有往來之處今限京師得有宅一所又書曰劉繪字士彰彭城人也太常悛弟父勔宋末權貴門多客繪解褐為著作郎太祖見歎曰劉公為不亡矣繪聰警善隸書為竟陵王後進賓客時張融周顒並有五言融音旨緩韻顒辭致綺捷繪之言吐又頓挫風氣時人謂語曰劉繪貼宅別開一門言在二家之中也又朝野為語曰三人共宅夾清漳張南北劉中央言處二人間王隱晉書曰魏舒字陽元幼喪父母為外甯氏所養甯氏起宅相者云當出貴外甥外祖父母以甯氏甥小而慧謂應相也舒答當為外家成此宅相又曰上黨鮑瑗家多喪禍貧苦淳于智卜之卦成謂曰為君安宅者女子工耶曰是也又曰此人已死耶曰然智曰此人安宅失宜既害其身又令君不利君舍東北有大桑樹君徑入市門數十步當有一人折新馬鞭者便就請買還懸此樹三年當得物瑗承言詣市果得馬鞭懸之三年後浚井中得數十萬銅錢雜器復可二十餘萬於是家業用展病者亦愈晉書曰孔愉營山陰湖南侯山下數畝地為宅草屋數間便棄官居之送資數百萬悉無所取又曰桓玄得志常欲以謝安宅為營謝混曰邵伯之仁猶惠及甘棠文靜之德更不保五畝宅耶玄聞慚而止宋書曰初太社西空地區吳時丁奉宅孫皓流徙其家晉有江左初為周凱蘇峻宅其後為袁真宅又為章武王司馬秀宅皆凶敗後給臧燾亦頻遇喪禍故世稱惡地王僧綽常以正達自居謂宅無吉凶請為第始就築未居而敗又顏延之傳曰竣既貴重權傾一朝凡所資供延之無所受器服不改宅宇如舊見竣起宅謂曰善為之無令人笑汝拙也齊書曰齊世祖武皇帝諱賾字宣遠太祖長子也小字龍兒生於建康青溪宅其夜陳孝后劉昭后同夢龍據屋上故字上焉梁書曰高祖宋大明八年甲辰生于秣陵縣同夏里三橋宅後魏書曰德興反於營州使尚書廬同往討之大敗而反屬侍中穆紹與元順侍坐因論同之罪同先有近宅借紹頗欲為言順勃然曰盧同終將無罪太后曰何得如侍中之言順曰有好宅與要勢侍中豈慮罪也紹慚不敢復言又邦巒傳曰孝文因行樂至司空府南見巒宅謂巒曰朝行樂至此見巒宅乃佳東望德館情有依然巒對曰陛下移構中原方建無窮之業臣意在與魏昇降寧容不務永寧之宅帝謂司空穆高僕射李冲曰巒之此言其意不小五代史晉史曰羅紹威前唐時嘗建第洛陽福善里莊宗同光中始賜明宗梁租庸使趙巖宅雖華以趨內遠乃召紹威子周敬易其第後明宗即位一日夢中見一人儀形瓌秀若素識者上夢中曰此得非前宅主羅氏乎及寤訪其子孫左右對曰周敬見列明廷召至果符夢中所見上謂侍臣曰朕不欲使大勳之後久無土地因授左馮翊非承家為善何以致此五代史周書曰漢初以晉入蕃將相第宅賜隨駕大臣以趙瑩第賜太祖太袓召瑩子前刑部郎中易則告之曰所賜第除素屬版籍外如別有契券己所置者可歸本直即以千餘緍遺易則易則惶恐辭讓太祖堅之乃受孔子家語曰魯哀公問於孔子曰寡人聞東益宅不祥信有之乎孔子曰不祥有五而益宅不與焉夫損人而自益身之不祥也棄老而取幼家之不祥也釋賢而任不肖國之不祥也老者不教幼者不學俗之不祥也聖人伏匿愚者擅權天下之不祥也不祥有五而益宅不與焉淮南子曰魯哀公欲西益宅史爭之為西益宅不祥哀公作色怒左右數諫不聽乃以問其傅曼折睢對曰天下三不祥而西益宅不與焉哀公大悅復問何為三不祥對曰不行禮義一不祥嗜慾無止二不祥不聽正諫三不祥哀公喟然自反不益宅風俗通曰宅不西益俗說西者為上上益宅者妨家長也原其所以西益者禮記曰南向北向西方為上爾雅曰西南隅謂之隩尊長之處也不西益者恐動搖之耳審西益有害增廣三面豈能獨吉乎國語魯文公欲弛孟文子之宅文公魯僖公之子弛毀也孟文子魯大夫公孫敖之子文伯穀也宅有司所居公欲毀之以益宮也使人謂之曰吾欲利子於外之寬者對曰夫位政之建也署位之表也車服表之章也宅章之次也祿次之食也君議五者以建政為不易之政也今有司未命易臣之署與其車服而曰將昜而次為寬利也夫署所以朝夕虔君命也臣立先臣之署服其車服為利故而易其次是辱君命也不敢聞命若罪也則請納祿與車服而違署唯里人之所命次公弗取臧文仲聞之曰孟孫善守矣其可以蓋穆伯而守其後於魯乎穆伯文子之父公孫敖也淫乎魯出奔而死圻於齊今文子守官不失禮故可掩蓋其父惡守其後嗣也公欲弛郈敬子之宅亦如之公文公郈敬子魯大夫郈惠伯玄孫之孫敬伯回也亦如之者亦謂之欲利子於外之寬者也對曰先臣惠伯以命於同里嘗禘烝享之所致君昨者世有數矣出入受事之幣以致君之命者亦有數矣今命臣更次於外無乃違乎請從司徒以班從次亦弗取孟子曰五畝之宅樹墻下以桑匹婦蠶之則老者足以衣帛韓子曰有與猛者鄰欲賣宅避之人曰是其貫將滿矣子姑待之荅曰吾恐以我滿貫也遂去之淮南子曰任一人之能不足以治三畝之宅循道里之數因天地之固然則六合不足均也抱朴子曰葛廬佐光武有大功受爵立宅舍於愽望里于今基址石礎存焉郡國誌曰虢州楊震宅西有龍望原南崖有太尉公藏書窟太元初人逐獸入穴見古書二千餘卷又曰洛陽董卓宅在永和里掘地輒得金玉寶玩彼魏邢欒掘得丹沙及錢銘曰董太傅之物後夢見卓索欒不與經年而卒又曰洛陽石崇宅有綠珠樓今謂之狄泉又曰洛陽蘇秦宅在利仁里後魏高顯業每夜見赤光於光處掘得金百斤銘曰蘇家金業為之造寺又曰幹山南許詢宅又曰長沙南寺賈誼宅亦陶侃宅在焉又曰婁縣山下有巫咸故宅在焉又曰鄂州西塞山黃琬宅丁固宅又曰尋陽郡湓城亭有陶潛宅又曰郴州城東北有仙人蘇耽宅又曰淯陽有小長安東場城有范蠡祠即故宅也又曰恒州九門縣新市城西藺相如宅又曰鄧州梅溪出紫山南道百里奚故宅基在焉又曰密州高密西有鄭玄宅亦曰鄭城玄後移葬於屬阜墓側有稻田萬頃斷水造魚梁歲收億萬世號萬疋梁輿地誌云縣東南白沙有龐士元宅於漢水之北司馬德桑宅於漢水之南隔魚梁州街對宇歡情自接每至相思則褰裳涉水樓承先別傳曰樓玄到廣州密求虞仲翔故宅處遂徘徊躑跼哀咽悽愴不能自勝耳三輔決錄曰郭詳為太尉長史起大宅在高陵城西世稱曰長史宅瀨鄉記曰老子祠在瀨鄉曲仁里譙城西出十里老子平生時教化學堂故處也漢桓帝修建屋宇為老子廟廟北二里李夫人祠是老子所生舊宅也劉楨京口記曰糖頹山山周廻二里餘山南隔路得郗鑒故宅五十餘畝又曰長村東太瀆瀆北有謝玄故宅戴延之西征記曰東陽門外道北吳蜀二主第宅去城二里墟基猶存又曰潼關北去蒲坂城六十里城中有舜廟城外有宅井及二妃壇南去城二十里有山舜所耕山也述征記曰豐水西九十里有漢高祖宅又曰山陽縣城東北二十里魏中散大夫嵇康園宅今悉為田墟而父老猶謂嵇公竹林地以時有遺竹也成都記曰成都縣南百步有嚴君司馬相如揚雄宅今草玄亭餘跡尚存陳留耆舊傳曰董宣為北海太守大姓公孫舟造起大宅卜工占之云宅成當出一喪舟使其子取行人殺之以塞咎宣收舟考殺之世說曰鍾會荀濟二人情好不協荀有寶劍可直百萬常在母鍾太夫人許會善書學荀手跡作書與母取劍仍竊去不還荀後知是鍾而無由得求思所以報之會鍾兄弟共以千萬起新宅始成甚精麗未得移住荀善畫於是潛往畫鍾門堂並作太傳形像衣冠狀貌如平生之容鍾來入門便感慟於是宅遂空廢徐邈別傳曰邈字仙民舉世恣承傳為定範舊疑歲神在卯此宅之左即彼宅之右地何得俱忌邈以為太歲之屬自是遊神譬如日出之時向東皆逆非為定體水經注曰齊城門外有晏嬰宅盛弘之荊州記曰新曰新野郡西七里有楊溪源出紫山南流入淯故耆老傳云溪西有百里奚宅又曰新野郡南有越相范蠡祠蠡宅三戶人傳云祠處即是宅又曰襄陽范蠡祠南有晉河南尹樂廣宅周廻十餘畝曩舊井猶未頹檀道濟置邏其中即名為樂宅又曰襄陽西北十許里名為隆中有諸葛孔明宅又曰宛城有伍子胥宅范注荊州記曰義陽六安縣有光武宅枕白水所謂龍飛白水蘇州記曰周文學科孔子弟子言偃宅在常熟縣西史記云言偃吳人也字子游又吳地記云宅有井井邊有監洗石周四尺輿地志云梁蕭正德為郡太守為蕭將去莫知所在吳地記曰云陸氏宅在長谷谷在吳縣東北谷名華亭谷水下通松江昔陸遜陸凱居此谷吳志云漢廬江太守陸康與袁術有隙使姪遜與其子績率宗族遠此避難居于是谷谷東有崑山父祖墓焉故陸機思鄉詩曰髣髴谷水陽婉孌崑山陰列仙傳云歷陽有彭祖宅禱祠風雨應期而至襄沔記曰晉永興中鎮南將軍襄陽郡守劉弘至隆中觀亮故宅立碣表閭使太傳掾犍為李興為文又曰繁欽宅王粲宅並在襄陽井臺猶存又曰長流解西有梁曹儀同景宋柳儀同慶遠韋儀同叡諸宅並相鄰次郭城西門韋叡少時有南陽人蔡郍善相相叡宅應出三公刺史貴不可言時叡宅上有草屋十間郍宅在城南悉是瓦屋求叡換宅疑而不許叡兩兄闡纂有令問位望在叡之右鄉里謂此人應班槐棘其後闡纂相繼而終叡奉龍飛遂成宅相簡文徵書既至遊憩此宅望氣之言殆有徵矣丹陽記曰有張子布宅在淮水南對瓦官寺門張侯橋所也橋近宅因以為名仲雍荊州記曰秭歸縣有屈原宅伍子胥廟擣衣石猶存韋述兩京記曰東京宜人坊自半本隨齊王暕宅煬帝愛子初欲盡坊為宅帝問宇文愷曰里名為何愷曰里名宜人帝曰既號宜人柰何無人可以半為王宅又曰仁和坊兵部侍郎許欽明宅欽明戶部尚書圉師猶子與中書令郝處俊鄉黨親族兩家子弟類多丑陋而盛飾車馬以遊里巷京洛為之語曰衣裳好儀觀惡不姓許即姓郝又曰崇仁坊西南隅長寧公主宅既承恩盛加雕飾朱樓綺閣一時勝絕又有山池別院山谷虧蔽勢若自然中宗及韋庶人數遊於此第留連彌日賦詩飲宴上官昭容操翰於亭子柱上寫之韋氏敗公主隨夫為外官初欲出賣木石當二千萬山池別館仍不為數遂奏為觀請以中宗號為名詞人名士競入遊賞又曰延壽坊東隅駙馬裴巽宅高祖末裴行儉居之自行儉以前居者輒死自儉卜居有狂僧突入髡其庭中大柳樹中有豕走出徑入北鄰其家數月暴死盡此宅清晏又曰永興坊西門北魏徵宅本宇文愷宅及徵居之太宗幸焉時將營小殿賜徵為堂又曰通化坊東南鄖公殷開山宅西北顏師古宅又有歐陽詢宅時人謂之吳兒坊又曰延壽坊北門之西有中書令閻立本宅宅內西亭有立本畫水之跡又曰明教坊龍興觀西南隅開府宋璟宅南門之東國子司業崔融宅璟造宅悉東西相對不為斜曲以避惡名融為則天哀策用思精苦不直馬過其門不覺文就而卒又曰尚善坊東南隅歧王範宅宅有薛稷畫鶴世稱妙絕又曰勸善坊東北隅太子太師鄭公魏徵宅山池院有進士鄭光乂畫山水為時所重又曰宣風坊北街之西中書令蘇味道宅宅有三十六柱亭子時稱巧絕祿山事跡曰祿山舊宅在道政坊玄宗以其隘陋更於親仁坊選寬爽之地出內庫錢更造宅焉勑所司窮其華麗不限功力財物堂皇院宇重復窈窕周匝誥曲戶牖交䟽高臺臨池苑若天造帷帳幔幕充刱其中至九年八月祿山獻俘至京方命入此新宅春秋內事曰陰宅以日奇陽宅以月偶陰宅先內男子當令奇陽宅先內女子當令偶乃吉陰宅內男子三人陽宅內女子二人地鏡圖曰人望百家宅法中有赤氣者家有汎財白氣入人家有財不保黑氣有五其伏在宅中青氣者有銀地寶也嵇康宅無吉凶論曰設為三公之宅而命愚民居之必不為三公可知也夫壽夭之不可求甚於貴賤然則擇百年之宮而望殤子之壽孤逆魁忌以速彭祖之夭必幾矣然則果無宅也是性命自然不可求矣樓觀本記曰隋之開皇元年勑旨樓觀者本尹先生卜居之勝宅老君說經之聖跡乃玄教根源福田之首宜令所司別作圖樣開拓舊居
