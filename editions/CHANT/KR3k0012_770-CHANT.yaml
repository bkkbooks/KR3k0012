body:
  text: 舟部二敘舟中方言曰舟自關而東謂之舡自關而西或謂之舟方舟或謂之航又曰舩首謂之閭或謂之鷁首郭璞注曰今江東貴人舡前作青雀是其象也東觀漢記曰鄧訓為護羗校尉綘革為舡置於箄上以渡河掩擊明羗張璠漢記曰梁冀弟池中舡無故自覆問椽朱穆穆曰舟所以濟渡萬物不施遊戲而已今覆者天戒將軍濟渡萬民不可長念遊戲也漢宮殿䟽曰武帝作大池周匝四十里名昆明池作豫章大舡可載萬人舡上起宮室吳記曰孫皓問中書令張尚詩言汎彼柏舟唯柏中舟乎尚曰詩云檜楫松舟亦中也皓忌其勝己因下獄晉令曰水戰飛雲舡相去五十步蒼隼舡相去四十步金舡相去三十步小兒先登飛鳥舡相去五十步晉朝雜事曰太康八年七月大雨殿前地陷方五尺深數丈中有破舡晉宮閣記曰天淵池中紫宮舟升進舡曜陽飛龍舟射獵舟靈芝池有鳴鶴舟指南舟舍利池有雲母舟無極舟都亭池有華潤舟常安舟崔鴻後趙錄曰張彌師眾一萬徙洛陽鍾簴九龍翁仲銅駞飛廉鍾一沒於河募浮沒三百人入河以竹絙牛頭轆轤引之乃出造萬斛舟以渡之至于鄴穆天子傳曰天子乘鳥舟龍本浮于大沼沼池龍下宜有舟皆以龍鳥為形制今吳之青雀昉遺象山海經曰大人之國唑而削舡世本曰共鼓貨狄作舟共鼓貨狄黃帝二臣又曰廩君名曰豫相姓巳氏即與樊氏曋音審氏柏氏鄭氏凡五姓爭神以土為舡雕文畫之而浮水中其舡浮者神以為君他姓舡不能浮獨廩君舡浮因立為君蜀王本紀曰秦為舶舡萬艘欲攻楚呂氏春秋曰虞姁作舟姁音劬詡二音又曰荊有佽飛者得寶劍涉江中流而有蛟夾繞其舡佽飛拔寶劍赴江刺蛟殺之舟中之人皆活荊王聞之位以執圭又曰楚人有涉江者其劍自舟中墜於水遽契其舟曰是吾劍所從墜也舟去從所契處入求之而舟已行劍不行若此不亦惑乎又曰伍員如吳過於荊至江上欲涉見一丈人刺小舡方將漢從而請焉丈人渡之又曰管夷吾百里奚覆王之舡驥也絕江者託於舡致遠者託於驥淮南子曰湯武聖主也而不能與越人乘舲音靈舟而浮於江湖舲舟小舡者也又曰楚人有乘舡而遇大風者投於水非不貪生而畏死也或於死而反忘於生又曰龍舟鷁首浮吹以虞此道於水也於舡中吹籟與竿以為樂故曰浮吹以虞者也衡波傳曰孔子使子貢久而不來孔子謂弟子占之遇鼎鼎易卦也皆言無足不來顏回掩口而笑子曰回也哂謂賜來也曰無足者乘舟而來至矣子貢朝至如顏回說苑曰梁相死惠子欲之梁渡河而遽墮水中舩人救之曰子欲何之而遽也曰梁無相吾欲往相之舡人曰子居舡楫之間而溺無我則死矣子何能相梁乎惠子曰居艘長楫之間不如子至於安國家社稷子比我矇矇如未視狗耳又曰晉平公使叔向聘吳吳人飾舟以逆之左右各五百人有繡衣豹裘者錦衣狐裘者叔向歸以告平公吳其亡乎潛夫論曰人行之動天地譬車上御駟馬蓬中櫂舟雖有覆載猶在我所之蔣子萬機論曰吳越爭於五湖用舟楫而相觸怯勇共覆鈍利俱傾顧譚新言曰蓬蒿生于泰山之上豫章長于窮藪之中良匠造舟興宮建廟必不取泰山之陋質而棄窮藪之美材明矣又曰奔事失轄泛舟無楫欲以不覆未之有也譙周法訓曰以道為天下者猶乘安舟而由廣路安舟難成可久處也廣路難至可常行也又曰秉舡曲折不失其瀆是善乘舟者袁准正書曰非其所事而強學猶以百萬之師積之河濟之中其用舟楫固不如江漢之良杜夷幽求曰輕舟可以救溺濡幕可以濟焚抱朴子曰欲以獘藥必升騰者何異策蹇驢而欲尋遺風櫂籃舟而欲濟大川語林曰劉道真遭亂於河側自牽舡見一老嫗採桑逆旅劉謂之曰女子何不調機利杼而採桑逆旅女荅曰丈夫何不跨馬揮鞭而牽舡王子年拾遺記曰周昭王二十四年塗脩國獻青鳳丹鵠各一雌一雄孟夏之時鳳羽皆脫易毛羽聚鵠翅為羽扇鳳羽以飾車蓋扇名遊飄二名條翮三名虧光四名側影時東甌獻二美女一名延娟二名造娛使此二人更搖此扇侍於王側輕風乍至冷然自涼昭王淪於江漢二女與乘舟來願同沒漢水故江漢之民到今異之丘祠於江湄數十年間人於江漢之上猶見王與二女乘舟楫於水際至暮春上巳之日禊集於祠間或以時鮮甘味採杜蘭之葉以包褁之沉於水中或結五色紗囊盛食或用金鐵之器並沉於波中以言蛟龍水中一褁之不侵食也其祠號曰招袛之祠又曰軒皇變乘採以造舟楫水物為之翔踴滄海為之恬波又曰周武王東伐夜郎濟河時雲明如晝八百之旅皆薦賢而歌有大蜂狀如舟鳥飛集王舟困以鳥畫幡旗翌日而梟紂名其舡曰蜂舟魯哀公二年鄭人擊趙簡子得其蜂旗則其遺類也事出太公六韜又曰漢成帝嘗與飛鷰汎舟戲太液池以沙棠為舟貴不沉沒也以雲母飾於鷁首一名雲母舟又刻大桐木為虬龍雕飾如真像以夾雲舟而行又曰比翼鳥多力狀似鵠𠾑南海之舟泥巢昆岑之去木而止其中遇聖人則來翔集以表周公輔聖人之力也又曰漢武思李夫人之儔不可復得時始穿昆靈池汎翔螭舟帝自歌曲使女伶歌之時日已西傾涼風激水女伶歌甚道自賦葉落哀蟬之曲又曰張丞之母孫氏懷丞之時乘輕舫遊於江浦之際忽有白蛇長三尺騰入舟中母呪曰若禎吉勿毒噬我及將還置諸房內一宿視之不復見蛇嗟而惜之韻集曰蠲鷁首天子舡也吳越春秋曰吳王僚二年使公子光伐楚以報前來誅慶封也吳師敗而亡舟光懼因復得王舟之而還又曰范蠡既滅吳乃乘扁舟出三江入五湖人莫知其所適郡國志曰濟州有浮山故老相傳云堯時大雨此浮水上時有人纜舡於巖石間今猶有斷鐵鎖吳時外國傳曰扶南國伐木為舡長者十二尋廣肘六尺頭尾似魚皆以鐵鑷露裝大者載百人人有長短襓及篙音高各一從頭至尾面有五十人作或四十二人隨舡大小立則用長撓坐則用短橈水淺乃用篙皆當上應聲如一杜蘭香別傳曰香降張碩碩既成婚香便去絕不來年餘碩舡行忽見香乘車於山際碩不勝驚喜遙往造香見香悲喜香亦有悅色言語頃時碩欲登其車其婢舉手排之嶷然山立碩復欲車前上車奴攘臂排之碩於是遂退續搜神記曰臨淮公荀序字休玄母華夫人憐愛過常年十歲從南臨歸經青草湖時正帆風駃音文十也序出塞郭上落水比得下帆已行數十里洪波淼漫母撫膺遠望少頃見一掘頭舡漁父以楫撥舡如飛載序還之云送府君還荀後位至常伯長沙相故云府君也又曰合肥口有大舶舡云是曹公舶舡常有漁人夜宿傍以舡繫之但聞箏絃之音又音氣非常漁人又夢人驅遣去云勿近官舡此人驚覺即移舡去相傳云曹公載數妓舡覆於此今猶存焉異苑曰扶南國治生皆用黃金僦舡東西遠近雇一斤時有不至所屆欲減金數舡主便作幻誑使舡底砥拆狀欲淪滯海中進退不動眾人驚怖還請賽舡合如初也又曰越雀門會無縣有元馬河有銅舫舡嵩陽記曰山東北五了山上有池池有破舟云禹乘來也三秦記曰俗云太一山有水神人乘舡今有故漆舡也劉欣期交州記曰安定縣有越王銅舡潮退時有見者合浦四十里有潮陰雨日百姓樵採見銅舡出水上南州異物志曰外域人名舡曰舡大者長二十餘丈高去水三二丈望之如閣道載六七百人物出萬解
