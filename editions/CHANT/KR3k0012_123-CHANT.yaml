body:
  text: 偏霸部六前秦符堅崔鴻十六國春秋前秦錄曰符堅字永固健弟雄之子趙建武中母茍氏祈西門豹祠歸而夜夢與神交遂孕十二月而生有神光之異自天屬庭背有赤文隱起成字曰艸音草付臣又土王咸陽祕而莫之傳也姿貌魁傑臂垂過膝目有紫光祖洪奇而愛之名堅頭因而謂健曰此兒頭大重身長任大足短安下非常相趙右光祿大夫司隸校尉高平徐統有知人之鑒遇堅於路異之執其手曰符郎此官之御街小兒敢戲統顧左右曰此兒有霸王之相後復遇之統下車謂曰符郎當大貴僕不及如何堅曰若如公言不敢忘德八歲請就師學洪曰尚小未可吾年十三方欲求師時人猶以為速成健之入關次于曲沃夢天神遣使朱衣赤冠命拜堅為龍驤將軍旦而為壇於曲沃拜堅泣謂曰先王昔始受此號汝父次為之今若若汝也復為神明所授可不勉之性至孝有器度博學多才藝年十一便有經略大志堅既殺符生永興元年六月去皇帝之號僣稱大秦天王即位太極殿誅董龍等二十餘人改壽光三年為永興元年追尊父為文桓皇帝世子宏為皇太子兄清河王法為丞相東海公永安公符候為太尉諸王皆貶爵為公符抑為尚書令封弟融為陽平公雙河南公子丕為長樂公暉為平原公暉為廣平公李威為左僕射梁平老為右僕射席寶為丞相長史王猛為中書令侍郎權翼為黃門郎諸公卿為生所誅者悉復本官十月丞相東海公法以疑忌賜死茍太后之意也堅性友愛與法訣於東堂慟哭嘔血二年四月堅如雍祀五畤音止六月如河東祀后土八月自臨晉登龍門顧謂群臣曰美哉山河之固權翼對曰吳起有言在德不在嶮深願陛下追蹤唐虞懷遠以德山河之固不足恃也堅大悅至韓原觀晉魏顆鬼結草抗秦軍之處賦詩而歸甘露元年正月起明堂禪音善南北郊六月甘露降乃大赦改年八月堅下書曰咸陽內史猛聲彰出納所在著績有臥龍之才宜入贊百揆絲綸王言可徵拜侍中中書令領京兆尹中丞鄧羗性鯁直與猛協規齊志於是百僚肅整豪右屏氣風化大行堅歎曰吾今始知天下之有法也以猛為吏部尚書遷太子詹事十一月以猛為司隸侍中領選如故猛上䟽曰伏見陽平公融明德懿親光祿西河任群忠貞淑慎處士朱彤博識聰辯並宜左右彌綸暉贊九棘愚臣庸鄙請避賢路堅曰機務俟才允屬明哲朝野所望豈容致辭所舉融等尋別銓授於是以融為侍中中書監右僕射任群為光祿大夫領太子家令朱彤為中書侍郎領太子庶子三年九月鳳皇集于東閣大赦天下初將為赦與左僕射猛右僕射融議於露堂悉屏左右堅自為文猛融進紙筆有一大蒼蠅入自牖間鳴聲甚大集于筆端驅而復來堅惡之久而乃去俄而長安街巷市里民相告曰官今大赦有司以聞堅驚謂融曰事何從而泄勑外窮推咸言有一小人衣黑衣呼於市曰官今大赦須臾不見堅歎曰其向蒼蠅乎聲狀非常吾固惡之四年七月黃龍見於成紀梁山崩五年白虎見天水六年遣鴻臚拜張天錫為大將軍涼州牧西平公建元元年正月雍州秀才叚鏗對策上第拜吏部郎中孝廉通經者十餘人皆拜令長五年六月晉大司馬桓溫伐燕次于枋音方頭燕師屢敗遣散騎侍郎樂嵩來乞師請賂秦以虎牢以西之地八月遣將軍茍也洛州刺史邵羗帥步騎二萬救燕溫敗歸是月京兆民王攸上書獻十略一曰君道宜明二曰臣尚忠敬三曰子貴孝養四曰民生在勤五曰教無偏黨六曰養民在惠七曰延聘耆賢八曰懲惡顯善九曰伐叛柔服十曰易簡弘大堅納之以攸為諫議大夫十一月燕車騎吳王垂來奔桓溫既走慕容暐音葦悔割河洛之地以賂秦乃曰行人失辤分災救患理之常也堅大怒六年令輔國王猛帥鎮南楊安虎牙將軍張蚝音次建節鄧羗等步騎六萬討平燕冀八月猛攻剋壺關遣太傅上庸王評等帥四十萬屯於潞川猛覘丑艷切覘候也知評賣水鬻樵不撫將士大笑謂楊安等曰慕容評真奴才雖億兆之眾尚不足為慮況數十萬乎今破之必矣甲戍陳於渭原猛誓眾曰王景略受國厚恩任兼內外今與諸君深入賊地宜各勉進不可退也受爵明君之朝慶觴父母之室不亦美乎眾皆勇奮破釜棄糧大呼競進猛望燕師之眾惡之謂鄧羗曰今日之事非將軍莫可以捷也成敗之機在斯一舉羗曰若以司隸見與公無以為憂猛曰此非吾所及必以安定大守萬戶侯相處羗不悅而退俄而兵交猛召羗羗寢而不應猛乃馳就許之羗於是飲與張蚝徐成等跨馬馳入傍若無人搴音愆又居輦切舉也旗斬將燕師敗績進師圍鄴猛之未至鄴也劫盜公行及猛之至遠近怗然十一月堅自帥精銳十萬攻鄴七日而至於安陽故宅引諸耆老語及祖父舊事泫然流涕猛潛如安陽迎堅堅謂曰昔亞夫不出軍迎漢文將軍何以臨敵而背眾乎猛曰臣每覽亞夫之事常謂前卻人主以此而為名將竊未多之臣奉陛下神笇擊垂亡之虜若摧枯拉音獵朽何足憂也戊寅剋鄴慕容暐出奔將軍郭慶執暐於高陽送之辛巳堅入鄴宮大赦閱其圖籍郡百五十七縣一千五百七十九戶二百四十五萬八千九百六十九以王猛為都督諸軍事車騎大將軍開府儀同冀州牧鎮鄴封清河郡侯以偽太宰恪太傅評之第盡賜之加美妾五人上女妓十人中女妓三十八人猛辭堅曰昔魏絳和戎猶有金石絲竹之賞山甫翼周實受四牡之錫卿功超二子任過管葛安得辭也其敬受之無逆朕命以鄧羗為散騎常侍安定太守真定郡侯邑三千戶賞潞川之功七年七月堅如洛陽下書曰士死知己猶來格模故喬公一言魏祖追慟趙司隸高平徐統往在鄴都識朕於童稚每思其殷勤之言弗敢忘也可召其子孫詣行所八年五月以高平徐攀為琅邪太守攀統之少子以舊恩拔之也六月冀州牧猛入為丞相中書監司隸校尉猛固辭丞相改授司徒又固辭不拜乃停司徒之授四月天鼓鳴彗出于尾箕長十餘丈或名蚩九旗太史令張猛言於堅曰尾燕之分野而掃東井東井秦之分災深禍大十年之後燕滅秦之象二十年之後燕當為岱所滅慕容暐父子兄弟亡虜也而布列朝廷貴盛莫二宜除渠帥以寧皇秦若旦誅鮮卑不夕滅客彗者臣請就妖言之戮堅不納更以暐為尚書垂為京兆尹冲為平陽太守十年三月侍中太尉李威卒威字伯龍漢陽人荀太后姑子少與符雄結刎頸之交符生屢欲誅堅賴威之免堅深德之事威如父誅符生及法皆威與太后潛決大謀遂有辟陽之寵雅重王猛勸堅以國事任之堅常謂猛曰李公知卿猶鮑叔之於夷吾罕虎之於子產猛兄事之夏四月堅下書曰巴夷嶮逆寇亂益州招引吳軍為脣齒之勢特進鎮軍將軍護羗校尉鄧羗可帥甲士五萬星言赴討五月蜀人張育楊光等起兵二萬以應巴獠音老晉威遠將軍柏石帥眾三萬入據墊音店江張育自號蜀王稱蕃于晉八月鄧羗敗晉師于涪音浮西擊張育楊光於綿竹皆斬之益州平羗勒銘于岷山而還十二月羗至自成都堅引見東堂謂之曰將軍之先仲華遇漢世祖於前將軍復逢朕於後何鄧氏之多幸羌曰臣常謂光武之遇仲華非獨仲華之遭光武堅笑將軍蓋以自貺非直將軍之幸亦朕之遇賢十一年正月以徵士樂陵王忻為國子祭酒堅雅好文學英儒畢集純博之精莫如忻也終于太子少傳五月猛寢疾堅親祈南北郊宗廟社稷分遣侍臣禱河岳諸神無不周備以猛少瘳赦殊死七月堅臨省疾問以後事猛曰晉僻陋吳越乃正朔相承臣沒之後願不以晉為圖鮮卑羗虜我之仇讎終為大患宜漸除之以便社稷言終而卒時年五十一堅哭之慟謂太子宏曰天不欲使吾平一六合何奪吾景略之速也贈侍中丞相餘如故謚武俟朝野巷哭三日十二年正月癸巳高陸民穿井得龜大三尺六寸背有八卦文命太卜池養之食之以粟四月堅下書曰涼州刺史張天錫雖稱蕃受位而臣道未純可步兵校尉姚萇等自石城津伐天錫率勁勇五萬來拒戰于赤岸涼師大潰天錫率騎數千奔還姑臧牋降于萇甲午大軍至姑臧天錫素車白馬面縛昇襯降于軍門萇釋縛焚襯送之長安諸郡悉降涼州平九月以梁熙為西中郎將涼州刺史鎮姑臧徒豪右七千戶於關中封天錫重光縣之東寧鄉二百戶號歸義侯拜比部尚書遷右僕射萇之征也堅為天錫立第既至如歸十三年正月太史奏有星見于外國之分當有聖人之輔中國得之者昌堅聞西域有鳩摩羅什襄陽有釋道安竝遣求之十七年正月不雨至于六月徹樂減膳出宮女以迎和氣八月堅收起居注及著作所錄而觀之見茍太后李威之事慚怒乃焚其書著作郎董朏音斐雖更書時事然十不留一八年三月徙鄴銅駞銅馬飛廉翁仲于長安十月堅引群臣於太極殿議曰東南一隅未賓王化今欲起天下兵討之計其兵仗精卒九十七萬吾將先啟行薄伐南裔此行也朕與陽平公之任非諸將之事左右僕射權翼沙門道安陽平公融尚書石越等上書面諫前後數十堅終不納十九年晉車騎桓冲率眾十萬攻襄陽遣其前將軍劉波攻沔北堅大怒遣其子征南鉅鹿公叡冠軍慕容垂佐衛毛當等將步卒五萬救襄陽堅下書曰吳人敢恃江山屢寇王境宜時進討以清宇內便可戒嚴速脩戎備發州民則十丁遣一兵若門在灼然者為崇文義從朕將登會稽復禹績伐國存君義同三王其以司馬昌明為左僕射謝安為吏部尚書桓冲為侍中勢還不遠可並為起第八月戊午遣征南大將軍陽平公融騎從張蚝撫軍大將軍高陽公符方衛軍梁成平南慕容暐冠軍慕容垂步騎二十五萬為前鋒甲子堅發長安戎卒六十餘萬騎二十七萬前後千里九月堅至項城涼州之兵始達咸陽蜀漢之軍順流而下幽冀之眾至于彭城東西萬里水陸齊進融等攻壽春晉遣都督謝石徐州刺史謝玄豫州刺史桓伊水陸七萬敗堅于淝水堅為流矢所中單騎遁還於淮北顧謂夫人張氏曰朕用朝臣之言豈見今日之事耶何面目復臨天下泫然流涕堅諸軍悉潰及慕容垂一軍獨全比至洛陽百官威儀軍容粗備未及關而垂有貳志說堅請巡撫燕代并求拜墓堅許之權翼固諫以為不可堅不從堅至自淮南次于長安東之行宮入告罪于太廟丁零翟斌反于河南樂公符丕遣慕容垂及符飛龍討之垂南結丁零殺飛龍盡坑其眾垂引丁零烏九之眾二十餘萬為飛梯地道以攻鄴城慕容暐弟泓先為北城長史聞垂攻鄴亡奔關東妝諸馬牧鮮卑眾數千還屯華陰暐乃潛使諸弟及宗人起兵于外堅遣將軍強永擊之為泓所敗泓自稱大都督雍州牧濟北王推叔父垂為丞相大司馬冀州牧吳王堅謂權翼曰將若泓何翼曰慕容垂正可據山東為亂不暇近逼今暐宗族盡在京師鮮卑之眾布在畿甸實社稷之憂宜遣重將討之堅乃以廣平公符熙鎮蒲坂符叡為都督配兵五萬姚萇為司馬討泓于華陽平原太守慕容冲起兵河東有眾二萬進攻蒲堅命竇衝討之符叡勇果輕敵戰于華陰叡敗績被殺堅大怒萇懼誅遂叛竇衝大破慕容冲于河東冲奔于泓泓眾至十萬餘遣使謂堅曰秦師傾敗將欲興復大燕吳王以定關東可速資備大駕奉送家兄皇帝返鄴都與秦以虎牢為界分王天下堅大怒召暐責之暐叩頭流血陳謝堅曰此自三豎之罪非卿之過復其位待之如初命暐以書招諭垂及泓冲使息兵暐密遣使謂之曰今秦數已終當不能復久吾籠中之人必無還理勉建大業以興復為務泓於是進向長安堅卒步騎二萬討姚萇於北地萇率眾七萬來攻堅為萇所敗聞慕容冲去長安二百餘里退師而歸使符方戍驪山符暉都督中外諸軍事配兵五萬拒冲暉師敗績堅又以尚書姜宇與符琳率眾三萬擊冲于霸上為冲所敗宇死之琳中流矢冲遂據阿房城進逼長安堅登城觀之歎曰此虜從何出也吾不用王景略陽平公之言使白虜敢以至於此長樂公符丕在鄴糧竭馬又無草削松木而食之會丁零叛慕垂引師去鄴始具西問知長安危逼遣從弟求救於謝玄二十一年慕容冲僣稱尊號于阿房改年更始冲率眾登城堅身貫甲胃督戰拒之飛矢滿身流血被體時雖兵寇危逼馮翊諸堡猶有負糧冒難而至者多為賊所殺先是言天或導余留汝兼總戎政勿與爭利吾當出隴收兵運糧以給汝自將張夫人及中山公詵率騎數百出如五將山六月太子宏將母妻數千騎出奔冲入據長安堅至五將山姚萇遣將軍吳忠圍之堅眾奔散獨侍御十數人而已神色自若召宰人進食俄而忠執堅以歸新平縣幽之別室萇求傳國璽於堅曰萇次應符曆可以為惠堅叱之曰小羗乃敢干逼天子豈以傳國璽授汝羗乎五胡次序無汝羗名違天不祥其能久乎璽已送晉不可得也萇遣右僕射尹偉說堅求為堯舜禪代之事堅曰姚萇叛賊柰何擬之古人因問偉曰卿於朕朝作何官對曰尚書令史堅歎曰卿宰相才也王景略之流而朕不知卿亡也不亦宜乎八月縊堅於新平佛寺中時年四十八張夫人中山詵等皆自殺三軍莫不哀慟萇欲匿煞堅之名乃謚為莊列天王長樂公稱尊號偽謚堅為世祖宣昭皇帝初太子之奔也假道歸晉歷位輔國將軍桓玄篡位以為梁州刺史晉書曰堅在位二十七年符丕崔鴻十六國春秋前秦錄曰符堅字永敘堅之長庶子少而聰惠好學堅與之言將略嘉之才幹亞于符融為將善收士卒時出鎮于鄴東夏安之堅敗歸長安為慕容垂所逼自鄴奔于枋頭堅之死也建元二十一年丕復入鄴城將收兵趙魏西赴長安會平州刺史符冲帥幽并之眾擊慕容垂頻為垂將帶方等所敗乃率眾三萬進屯壺關使招丕丕乃去鄴率男女六萬進如潞州驃騎將軍張蚝并州刺史王騰迎之入據晉陽始知長安不守堅為姚萇所煞乃舉哀于晉陽僣即皇帝位于晉陽南立堅行廟大赦改建元二十一年為太平元年九月置百官是月安西呂光自西城還師二年正月慕容垂僣稱尊號二月慕容冲左將軍韓延煞冲立叚隨為燕王改年昌平正月丕以呂光為車騎將軍梁州牧酒泉公是月姚萇僣稱尊號氐有啖青者謂諸將曰狄道長符登雖王室踈屬而志略雄明請共立之以赴大駕於是推登為使持節督隴右雍河二州牧率眾五萬東下隴右據南安馳使請命八月丕以登為征南大將軍開府儀同南安王持節雍州牧因其所稱而授之九月丕下書鮮卑慕容永我之騎將首亂京畿禍傾社稷其遣丞相王永帥禁衛虎旅覆而取之十月與慕容永戰于襄陵王師大敗丕懼帥騎數千南奔東垣晉揭威將軍馮該自陜要擊斬之送丕首于江東符登稱尊號謚為哀平皇帝符登崔鴻十六國春秋前秦錄曰符登字文高丕之族子父敞太尉司馬登少勇有壯氣建元元年初拜殿中將遷羽林長安令坐事黜為狄道長太平二年與姚萇戰於胡奴塠大破之十一月丕子渤海王懿自吉城奔登登乃具丕死問於是為丕發喪行服為壇于隴東僣即皇帝位改太平二年為太初元年十二月立堅神主于軍中引師而告堅神主曰今收合義旅眾餘五萬星言電邁直造賊庭庶上報皇帝酷怨下雪民人大恥二年登次于凡亭九月進據胡空堡戎夏歸之者十有餘萬姚萇掘堅屍鞭撻無數裸剝衣裳附之以棘坎土埋之三年登次朝郍姚萇據武都相持累戰互有勝負萇以登戰勝謂堅神像所助亦於軍中立堅神主謂曰往年新平之禍非萇之罪陛下假臣龍驤曰朕以龍驤建業卿其勉之明詔昭然言猶在耳豈假手符登而圖臣忘前征時言耶今為陛下立神像可歸休于此勿計神過聽臣至誠四年正月登昇樓謂萇曰自古安有殺君反立神像大呼曰殺君賊姚萇出來與汝決之何為枉害無辜萇憚而不應萇自立堅神像戰未有利軍每夜驚乃斬像首送登六年三月登自雍攻長安七月登攻新平姚萇救之登引退八年十二月姚萇薨九年登聞萇死喜曰姚興小兒吾折杖以笞之於是大赦盡眾而東四月登從六陌趣廢橋興將軍尹緯據橋以待登與緯大戰為緯所敗登單馬奔雍初登之東也留太子崇守胡空堡崇聞登敗棄城出奔登至無歸乃奔平涼收集遺兵入馬毛山七月興攻登于馬毛登遣子崇質於隴西鮮卑乞伏乾歸結婚請援乾歸遣騎二萬救登登引軍出迎與興戰于山南為興所敗死之時年五十二子崇奔隍中復稱尊號改年延初謚登為高皇帝十月崇為乾歸所逐奔于楊定與崇帥眾二萬攻乾歸為乾歸所敗崇定皆死之自符健皇始元年歲在辛亥晉永和七年是歲歲在甲午四十四年晉太元十九年也晉書曰登在位九年始健以穆帝永和七年僣立至登伍世凡四十有四年以孝武帝太元十九年滅
