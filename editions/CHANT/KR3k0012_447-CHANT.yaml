body:
  text: 人事部八十七品藻中晉書曰韋忠傳云裴頠為僕射數言忠於司空張華華辟之辭病不赴人問其故忠曰吾茨簷賤士本無官情且茂先華而不實裴頠慾而無厭棄典禮而附賊后此豈大丈夫之所宜行耶又曰王戎有人倫鑒識嘗目山濤如璞玉渾金人皆欽其寶莫知名其器王衍神姿高徹如瑤林瓊樹自然是風塵外物謂裴頠拙於用長荀勗工於用短陳道寧𦃩𦃩如束長竿又曰禇陶吳平召補尚書郎張華見之謂陸機曰君兄弟龍躍雲津顧彥先鳳鳴朝陽謂東南之寶已盡不意復見禇生機曰公但未覩不鳴不躍者耳華曰故知延門之德不孤川岳之寶不匱矣又曰樂廣尚書令衛瓘朝之耆舊逮與魏正始中諸名士談論見廣而奇之曰自昔諸賢既歿常恐微言將絕而今乃復聞斯言於君矣命諸子造焉曰此人之水鏡見之瑩然若披雲而覩青天也又曰嵇紹始入或謂王戎曰昨於稠人中始見嵇紹昂昂然若野鶴之在雞群戎曰君復未見其父耳又曰王戎幼而頴悟神彩秀徹視日不昡裴楷見而目之曰戎眼爛爛如巖下電又曰張翰有清才善屬文而縱任不拘時人號為江東步兵又曰劉毅轉司頴校尉紏正豪右京師肅然司部守令望風投印綬者甚眾時人以毅方之諸葛豐蓋寬饒又曰樂廣少與弘農楊准相善準之二子曰喬曰髦皆知名於世准使先詣裴頠頠性弘方愛喬有高韻謂准曰喬當及卿髦少減也又使詣廣廣性清淳愛髦有神檢謂准曰喬自及卿然髦亦清出准歎曰我二兒之優劣乃裴樂之優劣也論者以為喬雖有高韻而神檢不足樂為得之矣又曰劉頌守廷尉時尚書令史扈寅非罪下獄詔使考竟頌執據無罪寅遂得免時人以頌比張釋之乎又曰和嶠遷頴川太守為政清簡甚得百姓懽心太傅從事中郎庾顗見而歎曰嶠森森如千丈松雖磥砢多節目施之大廈有棟梁之用又郗鑒傳云王敦嘗謂曰樂彥輔短才耳後生流宕言違名檢考之以實豈勝武秋耶鑒曰擬人必於其倫彥輔道韻平淡體識沖粹處傾危之朝不可得而親踈及愍懷太子之廢柔而有正武秋失節之士何可同日而言敦曰愍懷廢徙之際交有危機之急人何能以死守之乎以此相方其不減明矣又孫登傳云嵇康從之遊三年問其所圖終不荅康每歎息將別謂曰先生竟無言乎登乃曰子識火乎火生而有光而不用其光果在於用光人生而有才不用其才而果在於用才故用光在乎得薪所以保其曜用才在於識真所以全其年今子才多識寡難乎免於今之世去矣子無求手康不能用果遭非命又王湛傳云武帝亦以湛為癡每見濟輒調之曰卿家癡叔死未濟常無以荅及是帝又問如初濟曰臣叔殊不癡因稱其美帝曰誰比濟曰山濤以下魏舒以上時人謂湛上方山濤不足下比魏舒有餘湛聞曰欲處我季孟之間乎又曰陸機天才秀逸辭藻宏麗張華嘗謂之曰人常恨才少而子更患其多又曰陸雲刺史周浚召為從事謂人曰陸士龍當今顏子也又曰王衍雋秀有令望虛心玄遠未嘗語利王敦過江常稱之曰夷甫處眾中如珠玉在瓦石間顧愷之作畫贊亦稱衍巖巖清峙壁立千仞又曰杜乂性純和美姿容有盛名於江左王羲之見而目之曰膚若凝脂眼如點漆此神仙中人也桓彝亦曰衛玠神清杜乂形清又郭文傳溫嶠嘗稱曰文有賢人之性而無賢人之才柳下惠梁琦之亞乎又曰羅含謝尚與含為方外之好乃稱曰羅君章可謂湘中之琳琅又曰羅含桓溫嘗與寮屬讌會含後至溫問眾座曰此何如人或曰可謂荊楚之杞梓桓曰此自江左之秀豈唯荊楚而已又曰薛兼少與同郡紀瞻廣陵閔鴻吳郡顧榮會稽賀循齊名號為五俊初入洛司空張華見而奇之曰皆南金也又曰郄超傳云沙門支遁以清談著名于時風流勝貴莫不崇敬以為造微之功足參諸正始而遁常重超以為一時之俊又曰郄超為桓溫參軍謝安與王坦之常詣溫論事溫令超帳中臥聽之風動帳開安笑曰郄生可謂入幕之賓矣又曰周顗傳曰庚亮嘗謂顗曰諸人咸以君方樂廣顗曰何乃刻畫無鹽唐突西施也又曰應詹弱冠知名性質素弘雅雖犯而弗之校以學藝文章稱司徒何邵見之曰君子哉若人又曰桓溫豪爽有風概姿貌甚偉面有七星少與沛國劉惔善帝稱之曰溫眼如紫石稜鬢作蝟毛磔孫仲謀晉宣王之流亞也又曰劉惔寓居京口家貧織芒履以為養雖蓽門陋巷晏如也人未之識唯王導深器之後稍知名論者比之袁羊惔憙還告其母其母聰明婦人也謂之曰此非汝比勿受之又有方之范汪者惔復憙母又不聽及惔年德轉昇論者遂比之荀粲又曰荀松弱冠太原王濟甚相器重以方其外祖陳郡袁侃謂侃弟奧曰近見荀監子清虛名理當不及父德性純粹是賢兄輩人也又曰成公簡字宗舒東郡人也世二千石性清素不求榮利潛心味道罔有干其志者默識過人張茂先每言公簡清靜比揚子雲默識擬張安世又曰謝安總角神識沉敏風宇脩暢善行書弱冠詣王濛清言良久既去濛子脩曰向客何如大人濛曰此亹亹而來逼人王導亦深器之由是有重名又曰謝萬善屬文敘漁父屈原季王賈誼楚老龔勝孫登嵇康四隱四顯為八賢論其旨以處者為優出者為劣以示孫綽綽與往反以體公識遠者則出處同歸又曰韓康伯傳云庾龢名重一時少所推服常稱康伯及王坦之曰思理倫和我敬韓康伯志力彊正吾愧王文度又曰王獻之嘗與兄徽之俱詣謝安徽之多言俗事獻之寒溫而已既出客問安王氏兄弟優劣安曰小者佳客問其故安曰吉人之辭寡又曰禇裒與杜乂俱有盛名冠于中興譙國桓彝見而目之曰季冶有皮裏陽秋言其外無臧否而內有所褒貶也又曰王恭美姿儀人多愛悅或目云濯濯如春月柳嘗被鶴氅裘涉雪而行孟永窺見之歎曰此真神仙中人也又曰王恭字孝伯少有美譽清辯過人自負才地高華恒有宰輔之望與王忱齊名友善慕劉惔之為人謝安常曰王恭才地可以為將相宋書曰謝弘微叔父混特所敬貴號為微子常云何遠剛躁負氣阿容博而無檢曜恃才而持操不篤晦自知而納善不周設復功濟三才終亦以此為恨至如微子吾無間然又云微子異不傷物同不害正若年造六十必至公輔又曰龔祈不應徵辟祈風姿端雅容止可觀中書郎范述見而歎曰此荊楚仙人也蕭子顯齊書曰王僧祐父遠為光祿勳宋世為之語曰王遠如屏風屈曲能蔽風露陳書周弘正叔父捨每與談論輒異之曰觀汝神情穎晤清理警發後世知名當出吾右又曰高祖在京城嘗與諸將讌杜僧明周文育侯安都為壽各稱功伐高祖曰卿等悉良將也然而並有所短杜公志大而識闇狎下而嬌尊矜功不收其拙周侯交不擇人而推心過差居危履險猜防不設侯郎慠誕而無猒輕佻而肆志並非全身之道耳卒皆如其言隋書曰元善以高頴有宰相之具嘗言於上曰楊素麤踈蘇威怯懦元胃元旻正似鴨耳可以付社稷者唯獨高頴又曰蘇威治書侍御史梁毗以威領五職安繁戀劇無舉賢自代之心抗表劾威上曰蘇威朝夕孜孜志存遠大舉賢不闕何遽迫之顧謂威曰用之則行舍之則藏唯我與爾有是夫因謂朝臣曰蘇威不值我無以措其言我不得蘇威何以行其道楊素才辯無雙至若斟酌古今助我宣化非威之匹也蘇威若逢亂世南山四皓豈易屈哉又曰楊達為人弘厚有局度楊素每言曰有君子之貌兼君子之心者唯達耳唐書曰王珪嘗侍宴太宗謂珪曰鄉識鑒清通尤善談論自房玄齡等咸宜品藻又可自量孰與諸子玄對曰孜孜奉國知無不為臣不如玄齡才兼文武出將入相臣不如李靖敷奏詳明出納惟允臣不如彥博處繁理劇眾務必舉臣不如戴胃以諫諍為心恥君不及於堯舜臣不如魏徵至如激濁楊清嫉惡好善臣於數子亦有一日之長太宗深然其言群公亦各以為盡己所懷謂之磪論又曰馬周有機辯能敷奏深識事端動無不中太宗嘗曰我於馬周暫時不見則便思之中書侍郎岑文本謂所親曰吾見馬君論事多矣援引事類楊摧古今舉要刪蕪會文切理一字不可加一言不可減聽之靡靡令人忘倦昔之蘇張終賈正應此耳然鳶肩火色騰上必速恐不能免耳又曰韋述時趙冬曦孫逖王翰常遊其門趙冬曦兄冬日弟和璧居貞安貞頤貞等六人逖弟迪逌迥起音起巡亦六人並詞學登科張說曰趙韋昆季今之杞梓也又曰馮定字介夫宿之弟也儀貌壯偉與宿俱有文學而定過之貞元中皆舉進士時人比之漢朝二馮君呂氏春秋曰管仲有病桓公往問之曰仲父之病病矣將何以教寡人管仲對曰願君之遠易牙豎刀常之巫衛公子啟方也公曰易牙烹其子以慊寡人慊快也猶尚可疑邪管仲對曰人之情非不愛其子子之忍將何有於君公又曰豎刀自害以近寡人猶尚可疑耶管仲對曰人之情非不愛其身其身之忍又將何有於君公又曰常之巫審於死生能去痾病猶尚可疑耶管仲對曰死生命也痾病本也君不用其命守其本而待常之巫彼將以此無不為也公又曰衛公子啟方事寡人十五年其父死不敢歸哭猶尚可疑耶管仲對曰人之情無不愛其父父之忍將何有於君公曰諾管仲死盡逐之食不甘官不治病不起朝不肅居三年公曰仲父不亦過乎復召而反之明年公有病常之巫從中曰公將以某日薨易牙豎刀相與作亂公令衛公子啟方以書社四十人衛公慨焉歎涕曰管子聖人之所見豈不遠哉若死者有知我何面目以見仲父乎蒙衣袂而死絕于壽宮又曰吳起謂商文曰事君果有命矣商文曰何謂也吳起曰治四境之內成訓教變習俗使君臣有義父子有序子與我孰賢商文曰吾不若子曰今日置質為臣其主安重今日釋璽辭官其主安輕子與我孰賢商文曰吾不若子曰楥捊一鼓敵人在前使三軍之士樂死若生子與我孰賢商文曰吾不若子吳起曰三者子皆不吾若也位在吾上命矣夫商文曰善子問我我亦問子變世主少群臣相疑黔首不定當此之時屬之我乎屬之子乎吳起默然不對少間曰然商文曰是吾所以加於子之上也崔鴻前涼錄曰張茂謂馬岌曰劉曜自古可誰等輩也岌謂曰曹孟德之流茂默然岌曰孟德公族也劉曜戎狄難易不同曜殆過之茂曰曜可方呂布關羽而云孟德不及豈不過哉岌曰孟德挾天子令諸侯仗大義討不庭曜一卒胡人用烏合之眾而能建威成大逆天下莫之當其不優歟茂曰天生胡以滅中國殆不可以人事論也秦記曰姚萇大破符登置酒高會諸將各曰若值魏武王尋破此賊陛下將軍大過上嘆曰吾不如亡兄者四也長八尺五寸垂臂過膝人望而畏之一也當十萬之眾與天下爭衡望麾直突前無橫陣二也突覽古今講論道藝駕御群賢收羅俊異三也總領大眾經履嶮難大小悅稱人盡死力四不如也又曰魏武王姚襄禮待楊亮亮奔桓溫溫問亮曰襄何如人荅曰天下傑也神明器度故是孫策之疇而雄武過之越絕書曰或問曰子胥范蠡何人也曰子胥勇而智范蠡智而明皆賢人也問曰子胥死范蠡去二人行違皆稱賢何也荅曰論語曰陳力就列不能者止事君以道言耳范蠡單身入越致主於霸有所不合故去也問曰不合何不死曰止去事之義也義無死子胥死者受恩深也傳曰孔子去魯燔俎無肉曾子去妻藜蒸不熟微子去比干死孔子並稱仁行雖違其義同死與生敗與成其同奈何論語曰有殺身以成仁子胥重其信范蠡貴其義信從中出義從外入微子去者痛殷道也比干死者忠於紂也箕子亡者絕也忠信之至相為表裏耳問二子孰逾乎曰以為同耳華陽國志曰廣陵太守下邳陳登字元龍太尉球孫也有俊才較天下士謂功曹陳喬曰閨門雍穆有德有行吾敬陳元方父子冰清玉潔有德有言吾敬華子魚博聞強識奇逸卓犖吾敬孔文舉雄姿傑出有王霸之略吾敬劉玄德零陵先賢傳曰劉備曰子初即劉巴字也才智絕人如孤可用非孤者難獨任也亮亦曰運籌策於帷幄之中不如子初遠矣若提桴鼓會於軍門使百姓喜勇當與議之可陳武別傳曰武時人無察者頓丘閭遐薦之於軍府或問武當今可與誰為輩遐曰方謝道堅不足比徐世璋有餘道堅世璋皆同時知名士也武聞之笑曰乃處我季孟之間乎衛玠別傳曰永和中丹陽尹劉真長鎮西將軍謝仁祖商略中朝士人遂及於玠或問杜弘治得方衛洗馬不謝曰安得相比其間可容數人世說曰嵇中散語趙景真卿瞳子白黑分明有白起之風限量小狹趙荅曰尺表能審琁衡之度寸管能測往復之晷何必在大但問識何如耳又曰諸名士共洛水上戲還樂令問王夷甫曰今日共看樂不王曰裴僕射善談名理混有雅具張茂先論史漢殊靡可聽我王安豐說延陵子房亦超然者又曰劉萬安即道真之子庾公所謂灼然王舉又云千人亦見百人亦見王右軍少時丞相云逸少何緣復減萬安又曰諸葛瑾弟亮及從弟誕並有盛名各在一國于時以為蜀得其龍吳得其虎魏得其狗誕在魏與夏侯玄齊名瑾在吳吳朝服其弘雅又曰卞望之云郄公體中有三反方於事上好下接己一反治身清貞而大脩計校二反自好讀書憎人學問三反也又曰王敦為大將軍鎮豫章衛玠避亂從洛投敦相見欣然談話彌日于時謝鯤為長史敦謂鯤曰不意永嘉之末復聞正始之音阿平若在當復絕倒時人以玠為玉人語林曰謝碣絕重其婦張玄常稱其婦欲以敵之有濟尼者並遊張謝二家人問其二嫗優劣荅曰玄夫人神情散朗故有林下之風碣家婦清心玉映自是閨房之秀也三輔決錄曰弭生字仲叔其父賤故張伯英與李幼才書曰弭仲升高德美名命世之才非弭氏小族所有新豐瘠土所當出也郭泰別傳曰泰字林宗少遊汝南先過袁閬不宿而退往從黃憲累日方還或問林宗林宗曰奉高之器譬諸泛濫雖清而易挹叔度汪汪君子若千頃陂澄之不清撓之不濁不可量也
