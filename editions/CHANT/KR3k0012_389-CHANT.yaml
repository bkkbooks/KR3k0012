body:
  text: 人事部二十九聲周書曰師曠見周太子晉太子曰吾聞汝知人年壽幸以告我師曠曰汝色赤白聲火聲不壽太子曰余後三年上賓於帝汝慎無言殃將及汝三年而死毛詩關睢序曰情發於中故形於聲聲成文謂之音左傳宣上曰初楚司馬子良生越椒子文曰必殺之是子也熊虎之狀而豺狼之聲弗必滅若敖氏諺曰狼子野心是乃狼也其可畜乎又襄三曰晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競歌詠八風南風音微故曰不兢唯歌南北風者聽晉楚也多死聲楚必無功後楚師敗又昭上曰伯石始生子容之母走謁諸姑曰長叔姒生男姑視之及堂聞其聲而還曰是豺狼之聲也狼子野心非是莫喪羊舌氏矣遂不視春秋演孔圖曰伊尹大而短赤色而髯好俛而下聲家語曰孔子在衛昧旦晨興顏回侍側聞哭者聲甚哀子曰回汝知此何所哭對曰非但為生離別也子曰何以知之對曰回聞恒山之鳥生四羽翼既成將分于四海其母悲鳴送之哀聲有似於此孔子使問哭者果曰父死家貧賣子以葬與之長訣子曰回也善於識矣史記曰初楚成王將以商臣為太子語令尹子上子上曰商臣蜂目豺聲忍人也不可立之王弗聽又秦始皇世家曰大梁人尉繚曰秦王為人隆準長目鳥喙鷹呼豺聲少恩而虎狼心戰國策曰楚襄王為太子之時為質於齊懷王薨太子辤於齊王齊王曰與我地五百里則歸子太子曰臣今有傅請問傅傅曰獻之齊歸太子太子歸即位齊使來求地上柱國子良曰王身出聲許萬乘之齊而弗與則不信後不可以結約諸侯矣後漢書曰盧植字子幹身長八尺二寸音聲如鐘東觀漢記曰更始納趙萌女為后有寵遂委政於萌日夜與婦人飲讌後庭群臣欲言事輒醉不能見時不得已乃令侍中坐帷內與語諸將識非更始聲出皆怨之華嶠後漢書曰何熙字孟孫少有大志身長八尺五寸體皃魁梧善儀容舉孝廉為謁者贊拜殿中音動左右江表傳曰關羽欲襲魯肅甘寧與羽俱會益陽瀨淺將渡寧有所約令羽遙聞之曰此甘寧聲也遂不敢渡王隱晉書曰王褒少立操尚非禮不動音聲清辤氣雅正漢晉春秋曰王敦為楊州刺史潘滔曰處冲蜂目已露但豺聲未發今樹之江外是見賊也梁書曰呂僧珍字元瑜東平范人也始童兒時從師學有相工歷觀諸生指僧珍謂博士曰此人有奇聲封侯相也梁太清實錄曰中宗諱繹字世誠高祖第七子也既長而壯聰明博涉殆謂生知聲若撞鐘辯如河瀉越絕書曰越栖會稽行成於吳引兵而去勾踐將降吳吳王許之子胥大怒聲若哮虎曰此越未戰而服天以賜吳其可逆天乎臣唯君王急制之吳王不聽莊子曰曾子居衛縕袍無表三日不舉火十年不制衣正冠而纓絕捉衿而肘見納履而踵決曳屣而歌商頌聲若出金石賈誼書曰豫讓釁面變容吞炭變聲必執襄子一夕而五易處風俗通曰聲所以五者繫五行也音以八者繫八風也新序曰原憲見子貢曳杖行歌聲若金石郭林宗別傳曰林宗儀皃魁梧身長八尺音聲如鍾當時以為準的裴楷別傳曰賈充等治法律揩亦參典其事事畢詔專讀奏平章當否揩善能諷誦音聲解暢執刑書穆若清詠焉異苑曰陳思王嘗登魚山臨東阿忽聞巖岫裏有誦經聲清道深亮遠谷流響肅然有靈氣不覺歛襟祗敬便有終焉之志即俲而則之今梵唱皆植依擬所造項氏始學篇汪曰有龍淵者桓靈時善相人也於聽音聲尤妙二千石相者龍淵下床贊之令長起侍贊之自六百石以下皆坐而言之先相張濟當以財得三公濟常依淵以觀視有相者輒往求之會解瀆侯往相至門問當有至相何憂貧乎侯去淵謂濟曰可厚事之濟遂往盡為償債別數百萬脩居業桓帝崩無嗣解瀆侯入為天子而濟遂至司空世說曰蔡司徒說在洛陽見陸機兄弟住參佐廨中三間瓦屋士龍住東頭士衡住西頭龍為人文弱可愛士衡長七尺餘聲作鐘聲言多慷慨又曰杜預為荊州刺史鎮襄陽時有讌集大醉輒閑齋獨眠不聽人前後常醉聞齋中嘔吐其聲甚苦莫不側足悚懆有一小吏便開戶看之正見床上有大虵垂頭床邊吐都不見人語林曰胡廣本姓黃五月生父母置甕中投之于江流下聞有小兒啼聲往取因以為子遂登三司廣後不治本親服世以為譏又曰王武子葬夕孫子荊哭之甚悲賓客莫不垂涕哭畢向靈坐曰卿好我作驢鳴今為卿作驢鳴因作驢鳴似真聲賓客莫不笑孫聞笑顧謂曰諸君不死令王武子死賓客莫不皆怒又曰董仲道常在客宿與王孫隔共語同行人曰此人行必為亂後果為亂階色說文曰晢人色白也皤老人色也韓詩外傳曰閔子始見夫子有菜色後有芻豢之色子貢問其故閔子曰吾出蒹葭之中入夫子之門聞夫子切磋之教竊樂之出見羽盍龍旂又樂之二者相攻胸中是以有菜色今被夫子之文出見羽蓋龍旂視如冀土是以有芻豢之色尚書大傳曰撞鐘蕤賓在外者皆金聲在內者皆玉色禮記表記曰是故君子縗絰則有哀色端冕則有敬色甲胄則有不可辱之色又曰君子不失色於人不失口於人又曰玉藻曰立容德色容莊又曰盛氣闐實陽休玉色言身中氣盛闐蒲若陽氣之休物玉色言不變也又文王世子曰文王之為世子也朝於王季日三其有不安節則內豎以告文王文王色憂行不能正履也左傳僖上曰齊桓公與蔡姬乘舟於囿蕩舟公懼變色又定上曰衛太子蒯聵謂戲陽速曰從我而朝少君少君見我我顧乃殺之速曰諾乃朝夫人夫人見太子太子三顧速不進夫人見其色啼而走曰蒯聵將殺余見太子色變知其欲殺己又哀上曰肉食者無墨墨氣色下公羊傳桓公曰宋督殺其君與夷及其大夫孔父孔父存則殤公不可得殺於是先攻孔父殺之皆死孔父正色立于朝則人莫敢過而致難于其君孔父可謂義形于色矣論語公冶長曰巧言令色足恭左丘明恥之丘亦恥之又陽貨曰巧言令色鮮矣仁又曰子張問令尹子文三仕為令尹無喜色三已之無慍色何如子曰忠矣又鄉黨曰立不中門行不履閾過位色勃如也屏氣似不息者出降一等逞顏色怡怡如也上如揖下如授勃如戰足縮縮如有循享禮有容色私覿愉愉如也愉愉顏色和又曰色思溫貌思恭又曰車中不內顧不疾言不親指色斯舉矣顏色不善則失之又陽貨曰色厲而內荏譬諸小人其猶穿窬之盜也與又顏淵曰子張問士何如斯可謂之達矣子曰何哉爾所謂達者子張對曰在邦必聞在家必聞子曰是聞也非達也夫達也者質直而好義察言而觀色慮以下人夫聞也者色取仁而行違居之不疑又憲問曰賢者辟世世主莫得而臣其次辟地去亂國適理邦其次辟色色斯舉矣其次辟言有惡言乃去漢書曰李廣出右北平胡急擊矢下如雨漢兵死者過半會暮吏士無人色言懼甚也又曰李陵降邊塞以聞上欲陵戰死召陵母及婦使相者視之無死喪色又曰汲黯好游俠任氣節行脩潔其諫犯主之顏色常慕袁盎之為人上方招文學儒者黯曰陛下內多欲而外施仁義奈何欲效唐虞之治乎上怒變色而罷朝公卿皆為黯懼魏氏春秋曰嵇康寓居河內與之遊者未嘗見其喜慍之色世說同魏志曰夏侯玄格量弘濟臨斬顏色不變舉動自若續晉陽秋曰劉毅至黑時人謂之鐵色又曰初太宗諸子繼夭乃令扈謙卜云後房有一女當誕二男帝乃召相者示諸寵妾皆曰非其人又示諸婦時織坊中有一人形長色黑宮人謂之崑崙至相者驚曰此其人也帝以大計幸之生烈宗也前秦錄曰符堅舉國伐晉登城而望晉軍見部仵齊整八公山上草木皆類人形憮然有懼色後趙錄曰延熙元年石虎遣丞相郭殷持節入廢弘為海陽王弘安步就車容色自若百官莫不流涕春秋後語曰魏文侯謀事而當群臣莫之逮者逮及也朝而喜色吳起進曰昔楚莊王朝而有憂色申公巫臣問曰君有憂色何也莊王曰吾聞諸侯擇師王者擇友霸者自足而群臣莫之若者亡今以不穀之不肖而議於朝群臣莫能逮吾國其幾於亡乎幾近吾是以憂色山海經曰不死民為人黑色壽考不死郭子別傳曰林宗秀立高跱詹然淵渟蔡伯喈告盧子幹馬日磾曰為天下作碑銘多矣未嘗不有慚色唯郭先生碑頌無愧色耳列仙傳曰桂父象林人色時白時黃時赤竹林七賢論曰王戎女適裴氏用匱女為貸錢一萬久而不還女歸戎色不悅遽還錢乃懌瀨鄉記曰老子為人黃色美眉孫卿子曰皋陶之色如削瓜燕丹子曰荊軻入秦秦王陛戟而見燕使鐘鼓並發群臣皆呼萬歲秦武陽大怒面如死灰色郭子曰盧志於眾中問陸士衡陸抗是卿何物荅曰如卿於盧毓士龍失色既出戶謂兄曰何至於此彼或有不知士衡正色曰我父祖名播海內寧有不知識者疑兩陸優劣謝安以此定之世說曰石崇要王敦入學戲見顏淵像石歎曰若與之同昇孔子堂去人何必有間王曰子貢去卿差近石正色曰士處世當令身名俱泰何至以甕牗語人影尚書大禹謨曰惠迪吉從逆凶唯影響東觀漢記曰西羗祖爰劍為秦所奴隸而亡藏巖穴中見焚有影象如虎為蔽火得不死諸羗以為神推以為豪魏略曰何晏性自喜行步顧影山海經曰壽麻之國正立無影疾呼無響郭璞注曰言其形氣有異於人又曰長流山神白帝少昊居之主司反影日西入則反影東照言司察之也孫卿子曰夏首之南有人曰涓蜀梁其人愚宵行俯見其影以為伏鬼仰見其髮以為立魅倍道而走比至其家失氣而卒莊子曰有畏影惡跡而去之走者足舉逾數而跡愈多走逾疾而影不離自以為尚遟疾走不休絕力而死不知處陰以休影處靜以息跡愚亦甚矣又曰岡兩問影曰曩子行今子止曩子坐今子起何其無特操與影曰吾有待而然者耶岡兩影外之微陰也太玄經曰老子行則滅跡立則隱影風俗通曰陳留有富室公年九十無子取田家為婦一交接而死後生男其女誣其淫佚有兒爭財數年不能決丞相邴吉曰吾聞老公子不耐寒又無影時歲八月取同歲小兒解衣裸之此兒獨言寒文曰中獨無影大小歎息因與其財抱朴子曰韓終丹久服立日中無影列仙傳曰河間王家老舍人自言父世見玄俗玄俗無影王呼著日中實無影地鏡圖曰人行日月中無影者神仙人也與虛合體故居日月中無影履霜無跡火中無影也跡史記曰姜嫄為帝嚳元妃出野見巨人跡心欣然踐之而身動如孕朞月而生后稷故詩曰履帝武敏歆武跡也王子年拾遺曰石崇節沉水之香如麋末布置席上使所愛者踐之無跡者即賜真珠百琲若有跡者便節其飲食令體輕弱故中國相戲曰爾非細骨輕軀那得百琲真珠又曰燕王時廣延之國獻善舞者二人王設麟文之席散荃蕪之香使二人舞其上彌日無跡體輕故也述征記曰齊有龍盤山上有大腳姜嫄所履跡盛弘之荊州記曰零陵縣上石有夸父跡又曰湘東陰山縣北數十里有武陽龍靡二山上悉生松柏美木龍靡山有盤石石上有仙人跡及龍跡傳云昔仙人遊此二山常稅駕此石又於其所得仙人遺詠
