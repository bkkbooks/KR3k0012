body:
  text: 獸部十二牛下逸士傳曰堯讓天下於許由由逃之巢父聞而洗耳於池濱樊豎字仲父牽牛飲之見巢父洗耳乃驅牛而還恥令牛飲其下流關中記曰周元年老子之度關令尹喜先勑門吏曰若有老公從東來乘青牛薄板車者勿聽過關其日果見老公乘青牛車求度關吏入白之喜曰諾道今來矣我見聖人矣即帶印綬出迎設弟子之禮楊泉物理論曰武帝拜少翁為文成歲餘無効應乃作帛以飯牛陽言此牛有異應殺而視之得帛書武帝識其手跡其言妖怪乃急窮竟其事事急而首服於是誅文成而隱其事地鏡圖曰齊氣之見為牛雲氣占曰趙雲如牛北夷之氣如牛郭子橫洞冥記曰元封三年大秦獻花蹄牛高六尺尾環繞角生四耳又曰元封三年大秦獻牛善走多力使輦銅石以起望仙宮跡在石上皆如花形故陽關之外有花牛津英雄記曰董卓少嘗遊羌中與豪帥相結後更歸耕於野諸豪帥有來從之者卓乃為殺耕牛與之共宴樂皇甫謐高士傳曰民有牛暴管寧田者寧為牽著涼處自飲食還牛主主得牛大慚先賢行狀曰王烈字彥老通識達人時國中有盜牛者牛主得之盜者曰我邂逅迷惑從今已後將改過子既已赦宥幸無使王烈知之人有以告烈烈以布一端遺之間年中行路老父擔重有人代擔行數十里欲至家置之而去問姓名不以告老父復行失劍於路有人行而遇之欲置而去懼後人得之遂守之至暮劍主還見之即前擔人也老父攬其袂曰子前代吾擔不得姓名今子復守吾劍未若子之仁者請告吾姓名吾將以告王烈乃語之而去老父以告烈烈曰世有仁人吾未之見使人推之乃昔時盜牛人也廣州先賢傳曰羅威字德仁南海番禺人鄰家牛數入食其禾既不可逐又為斷芻多著牛家門中不令人知數數如此牛主驚怪不知為誰陰廣求乃覺是威自後更相約率檢犢不敢復侵威田玄中記曰大月支及西胡有牛名曰反牛今日割取其肉三四斤明日其肉已後創即愈也又曰萬歲樹精為青牛漠桓嘗出遊河上忽有一青牛從河中出人驚走太尉何公時為中尉將軍有勇力走逆牛見公走還河公以左手挽牛足右手持斧斫牛頭而殺之此青牛者萬年之木也嵩高記云山有大松或千歲其精變為青牛蜀王本紀曰秦惠王欲伐蜀乃刻五石牛置金其後蜀人見之以為牛能大便金蜀王以為然即發卒千人使五丁力士柂牛成道致三枚於成都秦道得石牛力也後遣丞相張儀等隨石牛道伐蜀也楊龍驤洛陽記曰石牛在城西石虎當衰石牛夜喚聲聞三十里事奏虎虎遣人打落牛兩耳尾以鐵釘釘四腳今具存劉道真錢塘記曰明聖湖有金牛嘗有見者神化莫測遂以名湖涼州異物志曰有水牛育於河中鬱林異物志曰周留者其實水牛蒼毛豕身角若擔矛衛護其犢與虎為讎又曰周留牛毛青大腹銳頭青尾其狀似豬齊地記曰東萊牛島上嘗以五月海牛產乳海牛形似牛而無角騂色虎聲爪牙亦如虎腳似鼉魚尾似鮎魚尾長尺餘其皮甚軟可供百用牛見人奔入水以杖擊鼻則得之史苓武昌郡記曰武昌牛崗古老相傳云有金牛出此今半已崩破坑大數十丈牛因躍出踐崗邊石遺跡尚在常璩華陽國志曰牛飲水者昔程鄭於此飲牛江為之竭因以為名劉欣期交州記曰九真居風山夷人有一嫗向田見金牛出食斫得鼻鎖長丈餘後人往往見牛夜出光曜數十里也盛弘之荊州記曰鷰尾洲南有龍寵二洲二洲之間舊云多異魚而投罟揮網輒便桂絕有水客沉而視之見有石牛二頭常為網害故網絕焉酈道元注水經曰陽城東八十里有牧牛山下有九十九泉即滄河之上源也耆舊云山下本有百泉競發有一神牛駭身自山而降下飲泉竭故山得其名裴氏廣州記曰有石牛每旱殺牛以血和泥泥石牛背既畢則雨洗牛背泥盡方止顧微廣州記曰陽縣里民有一兒年十五六牧牛牛忽舐此兒隨所䑛處肉悉白淨而甚快遂聽牛日日䑛之兒俄而病死其家葬兒殺此牛以供賓客凡食此牛肉者男女二十餘人悉變為虎笁法真登羅山䟽曰增成縣南有烈清洲洲南又有牛潭漁人見金牛常出水盤石上義熙中縣民張安釣此潭於石上躡得金鏁大如指長數十尋尋之不已俄有物從水中引之力不能禁以刀斫斷唯得數尺遂致大富後義興周靈分亦好釣嘗見此牛寢伏石上旁有金鎖往掩之得二丈許遂以財雄為南江都尉祖台之志怪曰茍晞為兗州鎮去京師五百里有貢晞珍異食者欲貽都邑親貴慮經信宿之間不復鮮美募有牛能日行數百里者當厚賞之有人進一牛云此一日行千里晞乃命具丁車善馭書䟽發遣旦發日中到京師取荅書還至一更始竟便達晞以其駿快筋骨必將有異遂殺而觀之亦無靈異唯見雙筋如小竹大自頭挾脊著肉裏故外不覺也又曰陶太尉微時喪當葬家貧親自營作塼有一班牸牛載塼已致忽然失去便自尋覔忽於道中逢一老翁問云君欲何所覓太尉具答更舉手指云向於山崗上見一牛眠山圩中必是君牛此牛所眠處便好作墓安墳當之致之極貴小復不當位極人臣世為方嶽矣又指一山云此山亦好但不如向耳亦當世出刺史也言訖便不復見太尉墓之皆如其言劉敬叔異苑曰余以義熙十三年為長沙景王驃騎參軍在西州得一黃牛時將貨之便晝夜銜草不食流淚瘦瘠又曰即墨有古冢或發之有金牛塞埏門不可移動犯之則殉也異物志曰合浦牛如橐駞案項上有特骨大如覆斗足揵疾其行如馬日行三百里列仙傳曰陽都女者市上酤酒家女也生而眉連耳細而長眾以為異皆言此天人也會犢子牽一黃犢來過都女悅之遂留相奉侍都女隨犢子出取桃一宿而反郭季產集異記曰兗州人舡行忽見水上有浮鎖牽取得數十許丈乃得一白牛與常牛無異而形甚光鮮可愛人知是神物乃放之牛於是入水鎖亦隨去干寶搜神記曰晉大興元年武陽太守王諒牛生子一頭八足兩尾而共一腹又曰武都故道有怒特祠土生梓樹焉秦文公二十七年使人伐之樹創隨合經日不斷文公乃益發卒持斧者四十人猶不斷士疲還息其一人傷足不能去臥樹下聞鬼相與言勞乎攻戰其一人曰何足為勞又曰秦公必將不休如之何荅曰秦公其如子何又曰赭衣灰坌子如之何默然無言臥者以告於是令工皆衣赭隨斫創坌以灰樹斷化為牛使騎擊之不勝或墮於地髻解被髮牛畏之乃入水不敢出故秦自是置旄頭騎劉義慶幽明錄曰巴丘縣金崗以上世里名黃金瀨古有釣於潭獲一金鎖引之滿一舩金牛出聲貌奔壯奮躍還潭鎖久乃盡釣人刀斫得數尺故潭瀨取名又曰桓玄時牛大疫有一人食死牛肉因得病亡復生云初死時見一人執籙將至天上有一貴人問云此人何罪對曰此人坐食疫死牛肉貴人云今須牛以轉輸肉以充百姓何故復殺之催遣還又曰桓玄在南郡國第居時出詣殷荊州於鵠穴逢一老公驅青牛形色怪異桓即以所乘馬易牛乘至零陵駃非常因思息駕飲牛牛逕入水不出桓遣人覘守經日絕跡也又曰元嘉中益州刺史吉翰遷為南徐州先於蜀中載一青牛每常自乘恒於目前養視翰遘疾多日牛亦不肯食及亡牛流涕滂沱吉氏喪未還都先遣驅牛向宅牛不肯行知其異即待喪喪既下舡便隨去又曰桓冲鎮江陵正會夕當烹牛牛忽孰視帳下都督甚久目中泣下都督呪之曰汝若能向我跪者當啟活也牛應聲而拜眾甚異之都督復謂曰汝若須活遍拜眾人者直往牛涕殞如雨遂拜不止值冲醉不得啟遂殺牛冲醉止得啟冲聞之歎息都督痛加鞭罰又曰護軍琅邪王華有一牛甚快常乘之齒已長華後夢牛語之曰衰老不復堪苦載載二人尚可過此必死華謂偶爾夢與三人同載還府此牛果死神仙傳曰吳有徐隨居丹徒左慈過隨門下有宿客六七欺慈云徐公不在慈去客皆見牛在楊樹杪車轂中皆生荊木長一二丈客懼入報隨隨曰此左公也遣追之客乃逐慈叩頭陳謝客還見牛故在弋轂中亦無復荊木也郭養恭廣志曰麒牛似鹿又似牛肉美皮溫常處滇濱也滇音顛宣驗記云天笁有僧養一牸牛日得三升乳有一人乞乳牛曰我前身為奴偷法食今生以乳饋之所給有限不可分外得也嶺表錄異曰自瓊至振多溪澗澗中有石鱗次水流其間或相去三二尺近似天設可躡之而過或有乘牛過者牛皆促歛四蹄跳躍而過或失則隨流而下見者皆以為笑彼人喭曰跳石牛骨碌好笑又好哭又曰瓊州不產驢馬人多騎黃牛亦飾以鞍韉加之銜勒可騎者即自小習其步驟亦甚有穩快者
