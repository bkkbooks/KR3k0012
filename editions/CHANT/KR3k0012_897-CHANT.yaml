body:
  text: 獸部八馬四戰國策曰汙明見春申君曰夫驥之齒至矣服鹽車而上太行漉汁洒地白汗交流中坂遷延負轅不能上伯樂遭之下車攀而哭之解紵衣而幕之驥於是俯而噴仰而鳴聲造於天欣見伯樂之知己也漢書音義曰騕褭者神馬也赤喙黑身穆天子傳曰天子命駕八駿之乘右服華騮而左綠耳右驂赤驥而左白義天子主車造父為御次車之乘右服渠黃而左踰輪右驂盜驪而左山子伯天子主車參百為御奔戎為右天子乃遂東南翔行馳驅千里至于巨蒐巨蒐之人用其牛馬之湩以洗天子之足湩乳音東又曰祝沉牛馬豕羊河宗命乎皇天子加皇者尊之天子受命南面再拜柏發既致河典乃乘黃之乘為天子先所乘馬盡黃色為先驅也以極西土又曰天子北征舍于珠澤此澤出珠因名之也以釣于㳅水因獻食馬三百可以供廚膳者牛羊二千又曰辛丑天子渴于沙衍沙中無泉水求飲未至七萃之士曰高奔戎刺其左驂之頸取其清血以飲天子又曰天子東遊于黃澤宿于曲洛洛水文廻曲曰黃之池其馬歕沙歕音普問切皇人威儀黃之澤其馬歕王皇人壽穀郭璞注穆天子傳曰竹書曰北唐之君來見以一驪馬是生綠耳魏時西卑獻千里馬白色而兩耳黃名之為黃耳山海經曰滑水中多水馬如馬而文臂臂前腳牛尾其音如呼又曰天帝之山有草焉狀如菜臭如糜蕪名曰杜蘅可以走馬帶香草令便馬或曰馬得之健走也又曰犬戎之國有文馬縞身朱鬣縞猶素也犬傳云駮身朱鬣目若黃金名曰吉壃或作良乘之壽千歲又曰夸父山北有林名桃林廣圓三百里其中多馬桃林今弘農湖縣南北名饒野馬又曰大樂之野夏后啟於此舞九代馬九代馬名也莊子曰馬蹄可以踐霜雪毛可以禦風寒齕草飲水翹足而陸此馬之真性也雖有儀臺路寢無所用之及至伯樂曰我善治馬燒之剔之刻之駱之連之以羈絆編之以皂棧馬之死者十二三矣飢之渴之馳之驟之整之齊之前有橛飭之患後有鞭策之威而馬之死者已過半矣又徐無鬼曰吾相馬直者中繩曲者中鉤方者中矩圓者中規是國馬也而未若天下馬也天下馬有成材若卹若泆若喪若一若是者超軼絕塵不知其所老子曰天下有道卻走馬以糞天下無道戎馬生於郊列子曰秦穆公謂伯樂曰子之年長矣子姓有可使求馬乎伯樂對曰良馬可以形容筋骨相也天下之馬者若滅若沒若亡若失臣之子皆下才也臣有所與九方皋其於馬非臣之比也穆公之見使行求馬三月而反報曰已得之在沙丘穆公曰何馬對曰馬牝而黃使人往取之牡而驪公不悅召伯樂曰敗矣子之所使求馬者色物牝牡弗能知又何馬之能知也伯樂曰若皋之所觀天機也得其精忘其麤在其內而忘其外馬至果天下之馬也淮南子曰九方禋餘同晏子春秋曰景公遊於紀得金壺發而視之有丹書曰勿食反魚無乘駑馬晏子曰食魚無反無盡民力也不乘駑馬無致不肖於側也公曰紀有此書何以亡晏子曰紀有此書藏之於壺不亡曷待又曰景公使人養所愛馬馬病死公怒令人殺養馬者晏子請數之曰尒有三罪使汝養馬殺之一當死也又殺公所最善馬二當死也使公以一馬之故而殺人百姓必怨叛諸侯輕伐吾國三當死也公喟然曰赦之家語曰孔子相魯齊人患其霸也欲敗其正名乃選女子八十人衣以文衣而舞容璣容璣舞曲及文馬四十駟以遺魯君陳女樂列文馬于魯城南高門外季桓子微服往觀之再三將受馬魯君為周道遊觀觀之終日殆於政事子路言於孔子孔子遂行又曰魯定公問於顏回曰子亦聞東野畢之善御乎對曰善則善矣雖然其馬將必佚定公色不悅顧謂左右曰君子故有誣人耶顏回退後三日校來報之曰東野畢之馬佚兩驂曳兩服入于廄公聞之越席而起促駕召顏回顏回至公曰前日寡人問吾子以東野畢之善御而子曰美矣其馬將佚不識吾子奚以知之對曰以政知之昔者帝舜巧於使民而造父又巧於使馬舜不窮其民而造父不窮其馬故舜無佚民而造父無佚馬今東野畢之御也升馬執轡衘體正矣馬宜為車步驟馳騁朝禮畢矣馬步驟馳騁盡朝禮之舞歷險致遠馬力盡矣然而其心猶乃求馬不已臣以此知之也公曰善哉誠若子之言也春秋後語曰蘇代欲見齊王齊王怨蘇秦欲困蘇代不肯見代代乃說淳于髡曰人有駿馬欲賣之比三旦立於市人莫知之往見伯樂曰臣有駿馬欲賣之比三旦立於市人莫與言願子還而視之如旋去而顧之臣請獻一朝之價伯樂乃如其言一旦而馬價十倍今臣欲以駿馬見於王莫為臣先後先後導引也足下有意為臣伯樂乎請獻白璧一雙黃金十溢以為馬食不斥言人欲云為馬之芻草淳于髡曰謹聞命矣入言之於王而見之王果善蘇代矣又曰初孫臏與龐涓俱學兵法涓既事魏惠王將自以為能不及孫臏乃陰使人召孫臏孫臏至以法刑之斷其兩足後齊使以為奇竊載與之歸田忌喜而客待之田忌數與齊諸公子馳逐重射馳馬爭先射重稱為勝也孫臏見其馬足不甚相遠有上中下輩於是臏謂田忌曰君弟重射弟但也亦阻也司馬長卿弟如臨卭是也我能令君勝田忌信然之與王及諸公子遂射千金臨質孫臏曰取君之下駟與彼上駟取君之上駟與彼中駟取君之中駟與彼下駟既三輩畢而田忌一不勝而再勝忌得千金於是田忌進孫臏威王王問兵法而師之韓子曰昔紂為甲百萬左飲馬於湛右飲馬於洹洹水竭湛水不流武王甲卒三千破而王之又曰鈆陵卓子乘蒼龍排父之乘鉤飾在前錯綴在後馬欲進則鉤飾禁之退則錯綴貫之造父見而泣曰猶人處急世而不知所由也或云乘瞿父之乘又曰桓公伐孤竹春往冬還迷惑失道管仲曰老馬之智可用乃放老馬而隨之遂得道又曰如耳說衛嗣君嗣君悅之左右曰公何為不相也公曰夫馬似鹿者而千金有千金之馬無一金之鹿者何也馬為人用而鹿不為人用今如子雖辯者亦不為寡人用吾是以不相也又曰伯樂教其憎者相千里馬教其愛者相駑馬以千里馬世一有其利少駑馬多其利多也孫卿子曰伯樂不可欺以馬君子不可欺以人又曰驊騮騏驥纖離綠耳古之良馬也又曰君子善其言而類焉者應矣故馬嗚而馬應之非知也其勢然也又曰驥一日而千里駑馬十駕則亦及之矣伯樂相馬經曰馬生下墮地無毛行千里尿舉一腳行五百里闌䈥豎者千里馬膝如團麴千里三軍莫逐但知所發不知所宿也又曰江淮津督徐成字子長兄弟蒙寵於府君治馬方以報千金不傳號淮津方尋陽丞陽朱君方最良豫州從事沛國蕭跣方最良也又曰馬相歲上下齒二十四歲齒黃三十三歲齒白口中欲紅色如日月光者行千里汗溝欲深脊欲如伏龜兩邊有廻毛曰騰蛇殺主口邊有廻毛曰衘禍妨主口中有黑者烏銜馬短壽又曰素下去飛䖟四寸行千里驟而不起骨勞起而不振皮勞振而不噴氣勞耳欲小而促也食有三芻飲有三時也白額入口名曰榆寫一名的盧奴乘客死主乘棄市廻毛在目下名曰承淚不利人也又曰馬頭為王欲得方目為丞相欲得明脊為將軍欲得強腹為城郭欲得張一曰脅為城郭四下為令欲得長一曰膝下為令一曰四下眼欲得高巨一曰欲其端正眼睛欲如懸鈴紫艷光明下臥蠶懸鑿欲得成鼻孔欲得大鼻頭有王火字一曰鼻欲得橫筋鼻上文如王火欲得明口中欲得赤膝骨圓而張耳欲相近而堅小而厚雍一寸三百里三寸千里伏龍骨欲得成頸欲得長雙扶欲得大而突蹄欲得厚腹下欲得平有八字馬頭欲得高而成尾骨高而垂也凡相馬之法先觀三贏五駑乃相其餘大頭小頸一羸也弱脊大腹二羸也小脛大蹄三羸也謂五駑者大頭緩耳一駑也長頸不折二駑也短上長下三駑也大骼短脅四駑也淺寬薄脾五駑也馬援銅馬相法曰水火欲明水火在鼻兩孔間上唇欲急而方口中欲紅而有光此馬千里頷下欲深下唇欲緩牙欲去齒一寸則四百里牙劍鋒則千里目欲滿而澤腸欲充膁小肋欲長懸薄欲厚而緩懸薄服股也腹下欲平滿汗溝欲深長而膝本欲起肘腑欲開膝欲方蹄欲厚三寸堅如石鬃欲戴中骨高三寸鬃中骨也頰欲開而膺下欲廣一尺以上能久走鞅欲方頸前胸欲直而出脾骨前向鳧間欲開望視之如雙鳧楚辭曰卻騏驥而不乘兮策駑駘而取路當世無騏驥兮誠莫之能善御見執轡者非其人兮故駒跳而遠去符瑞圖曰王者貴人而賤馬則白馬朱鬣集又云車馬有節則見騰黃騰黃者神馬也其色黃一名乘黃亦曰飛黃或曰吉黃或曰翠黃一名紫黃其狀如狐背上有兩角出白氏之國乘之壽三千歲黃帝乘之孫氏瑞應圖曰玉馬者王者清明尊賢則至又曰乘黃王者輿服有度則出騕褭者神馬也與飛兔同以明君有德也又曰飛兔者日行三萬里禹治水土勤勞歷年救民之害天應其德則至駃蹄者后土之獸也自能言語王者仁孝於民則出禹治水有功而來又曰龍馬者仁馬河水之精也高八尺五寸長頸骼上有翼旁乘毛鳴聲九音有明王則見呂氏春秋曰秦繆公車敗失左驂自往求焉見野人殺將食之繆公笑曰食駿馬肉而不飲酒余恐其傷性也遍飲之而去又曰伯樂學相馬所見無非馬者又曰古相馬者有寒風能相口齒麻朝能相頰女厲能相口管青能相脣吻陳裴能相股腳秦牙能相前賁君能相後並知其一也又曰今有千里之馬於此非得良工猶若弗取良二相馬之工良工之與馬也相得然後成譬之若枹之與鼓夫士亦有千里高節死義此士之千里也能使士行千里者其唯賢者乎又曰凡為善難任善易奚以知之今與驥俱走則人不勝驥矣居於車上而任驥則驥不勝人矣又曰良劍期乎斷不期乎莫耶莫耶良劍也取其能斷無取於名也故曰不期莫耶良馬期乎千里不期乎驥驁驥千里馬名也王有乘也遊驁因曰驥驁也又曰宋人有取道者其馬不進剄而投之溪水剄殺投棄又復取道其馬不進又剄而投之溪水如此者三雖造父之所以威馬不過此矣不得造父之道而徒得其威無益於御人主之不肖有似於此不得其道而徒多其威威逾不用又曰飢馬盈廄嗼然未見芻也飢狗盈宮嗼然未見骨也見骨與芻動則不可禁動猶爭也亂世之民嗼然未見賢者也見賢人則往不可止又曰得十良馬不若得一伯樂得地千里不若得一聖人又曰小方大方之類也小馬大馬之類也小知非大知之類也又曰青龍之疋遺風之乘也高誘曰皆馬名疾若遺風也非先為天子不可得而具具備具也燕丹子曰太子有千里馬荊軻謂太子曰千里馬肝美太子即進肝又曰丹質於秦秦王遇之無禮欲求歸秦王曰烏頭白馬生角乃許爾歸丹仰天而歎烏即頭白馬即生角秦王乃放歸淮南子曰聖人之治猶造父之御也和輯乎銜轡之際而緩急於脣吻之和正度乎胸臆之中而執節於掌握之間內得於中心而外合於馬志故能取道致遠而氣力有餘誠得其術也是故執權者人主之車輿也大臣者人主之四馬也體離車輿之安而手失四馬之心而能無危者古今未之見也又曰天下有道飛黃服皁又曰黃帝時飛黃服皁也皁與皂同又曰王良造父之御也上車攝轡投足調均勞佚若一世皆以為工然而未甚貴也若夫鉗旦大丙之御也鉗旦大丙太一之御徐轡衘去韅鞅車莫動而自舉也馬莫使而自走也日行月動星耀而玄運電奔而鬼駭過歸鴈於碣石軼昆雞於姑餘姑餘在吳也非思慮之察手爪之巧也嗜欲形於胸中精神喻於六馬以此弗御之御者也又曰子驊騮騄耳一日千里搏兔不如狼契也又曰戎翟之馬皆可以馳驅或近或遠唯造父能盡其力三苗之民皆可使忠信或賢或不肖唯唐虞能齊其美又曰馬齒非牛蹄檀根非椅枝故見其一本而萬物知知猶別也又曰季秋之月乃殺於田獵以習五戎命僕及七騶咸駕載旗又曰易道良馬使人欲馳飲酒而樂使人欲歌是而行之固謂之斷非而行之必謂之亂斷猶治也又曰夫馬之為草駒之時跳躍揚蹄翹尾而走人不能制齕咋足以噆肌碎骨蹶蹄足以破盧陷匈噆罕也及至圉人擾之良御教之掩以衡扼連以轡銜則雖歷險超塹弗敢辭也故其馬之不可化其可駕御教之所為也馬聾蟲聾蟲無知也而可以通氣志猶待教而成又況人乎又曰夫待腰褭飛菟而駕之則世莫乘車矣腰褭飛菟皆行萬里其行若飛因曰飛菟也待西施落纂而為妃則終身不蒙矣又曰日之行也不見其移也騏驥背日而馳草木為靡懸峰未薄而日在其前矣懸峰馬蹄下雞舌也又曰馬免人於難者其死也葬之以帷牛有德於人者其死也葬之以大車之鹿牛馬有功猶不可忘又況人乎淮南萬畢術曰馬毛犬尾親友自絕取馬毛犬尾置朋友若夫婦衣中自相憎也說苑曰晉平公出田見乳虎乳虎伏而不動平公還謂師曠曰聞之霸王之君出獵猛獸伏而不敢起今者寡人出乳虎伏而不動此猛獸乎師曠對曰鵲食猬猬食鵕鸃鵕鸃食駮駮食虎夫駮之狀有似駮馬今者吾君必驂駮馬以出乎平公曰然又曰北塞上之人其馬亡入胡中人皆吊之其父曰此何誰知不為福居數月其馬將胡駿馬而歸人皆賀之其父曰此何誰知不為禍家富馬良其子好騎墮而折髀人皆吊之其父曰此何誰知不為福居一年胡夷大出丁壯者皆控弦而戰塞上之人死者十九十人戰九人死此子獨以跛故子父相保地鏡圖曰銅器之精見為馬孔叢子曰衛公子友饋四乘馬於子思曰不以此求交於先生久降鄙土為賓至之餼耳又曰公孫龍以白馬為非馬或曰此辯而毀大道子高適趙謂龍曰願受業久不敢先者以白馬為非馬耳誠能去之則為弟子龍曰若使去之無以教矣涼州記曰呂光麟嘉五年踈勒王獻火浣布善舞馬
