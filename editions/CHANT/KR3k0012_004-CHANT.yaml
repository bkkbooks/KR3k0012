body:
  text: 天部三日上說文云日者寶也太陽之精不虧字從口一象形也又君象也易曰離為日又曰日中則昃又曰日以烜之又曰日月運行一寒一暑又曰陰陽之義配日月又曰懸象著明莫大乎日月又曰日月之道貞明者也又曰日中為市致天下之民聚天下之貨又曰日往則月來月往則日來日月相推而明生焉又曰日昃之離不鼓缶而歌則大耋之嗟凶又曰豐卦曰豐亨主假之勿憂宜日中宜照天下也以勿憂之德故宜照天下又曰日月麗乎天又曰日月得天而能久照書曰寅賓出日平秩東作日中星鳥以殷仲春又曰日永星火以正仲夏日短星昴以正仲冬又曰寅餞納日平秩西成詩曰其雨其雨杲杲出日又曰謂子不信有如皎日又曰嗈嗈鳴鴈旭日始旦又曰日之夕矣羊牛下來又曰日居月諸胡迭而微又曰日出東方照臨下土又曰春日遲遲采蘩祁祁禮曰二月中氣祀朝日於東郊又曰玄端而朝日於東門之外又曰天無二日土無二王又曰季冬是月也日窮于次月窮于紀言運行周匝於故處次舍也紀猶會也又曰五月中氣是月也日長至十一月日短至周禮周官曰眂祲掌十輝之法以觀祅祥辨吉凶祅祥善惡之徵鄭司農云輝謂日光气也一曰祲二曰象三曰鐫四曰監五曰闇六曰瞢七曰彌八曰敘九曰隮十曰想祲陰陽氣相侵也象如赤鳥也鐫謂日旁氣四面反鄉如輝狀監雲氣臨日也闇日月食也瞢瞢無光也彌者白虹彌天也敘者雲有次序如山在日上也隮者外氣也想者耀光者也又曰大司徒以土圭之法測土深淺正日景以求地中日南則景短多暑日北則景長多寒傳曰酆舒問於賈季曰趙衰趙盾孰賢對曰趙衰冬日之日也趙盾夏日之日也注曰冬日可愛夏日可畏又哀公六年楚有雲如眾赤烏夾日以飛三日楚子使問周太史曰其當王身若禜之可移於令尹司馬王曰移腹心之疾置之肱股何益王弗禜而死孔子曰昭王其不失國也宜哉爾雅曰孤竹北戶西王母日下謂之四荒也郭璞注曰日下在四方昏荒之國也又曰岠齊州以南戴日為丹穴岠去也齊中也東至日所出為太平西至日所入為太蒙即蒙汜也易坤靈圖曰至德之萌日月若連壁易參同契曰日為流珠青龍之俱日為陽陽精為流珠青龍東方少陽也尚書考靈曜曰黑帝亡二日並照又曰仲春仲秋日出於卯入於酉仲夏日出於寅入於戍仲冬日出於辰入於申又曰日光照四十萬六千里春秋感精符曰群臣恣則日黃無光群臣爭則日裂人主排斥則日夜出春秋元命包曰陽數起於一成於二故日中有三足烏又曰一歲三百六十五日四分度之一言陽布散立數合一故立字四合其一又曰日左行周天二十三萬里又曰七政度日月明春秋內事曰日者陽德之母也禮統曰日者實也形體光實人君之象禮斗威儀曰政太平則日五色政頌平則日黃中而赤暈政和平則日黃中而黑暈政象平則日黃中而白暈政升平則日黃中而青暈孝經援神契曰天地至貴精不兩明注天精為日地精為月又曰日中則光溢又曰日神五色明照四方又曰黃氣抱日輔臣忠德至於天日抱戴易傳曰聖王在上則日光明五色而備又曰日者眾陽之精內明玄黃五色無主以象人君精精似青翼翼似黑玄玄似赤縞縞似白煌煌似黃光照無主不可以一色名也劉向洪範傳曰日者照明之大表光景之大紀群陽之精眾貴之象也故曰日出而天下光明日入而天下冥晦此其効也故日者天之象君父夫兄之類中國之應也明王之踐位群賢履職天下和平黎民康寧則日麗其精明揚其景耀抱珥重光以見吉祥君獲慶賀劉昭幼童傳曰晉明帝諱紹元帝子初元帝為江東都督鎮楊州時中原喪亂有人從長安來帝問洛下消息潛然流涕帝年數歲問泣故具以東渡意告之因問帝汝意謂長安何如日遠荅曰不聞人從日邊來聞人從長安來居然可知帝異之明日集群臣宴會說以此荅明帝又以為日近帝動容問何故異昨日之言荅曰舉頭不見長安只見日以是知近帝大悅搜神記曰吳孫堅夫人懷孫策夢日月入懷解道康齊地記曰齊有不夜城蓋古者有日夜中照於東境故萊子立此城以不夜為名七聖紀曰鬱華赤文與日同居結鱗黃文與月同居鬱華日精結鱗月精也莊子曰陽燧見日則燃為火金也摩拭令熱便置日中以艾就之火生又曰孔子圍於陳蔡太公吊之曰子其昭昭如揭日月而行故不免又曰日出東方入於西極有目有趾者待是而成功又曰至人神矣乘雲氣騎日月淮南子曰日出於陽谷浴於咸池拂於扶桑是謂晨明登於扶桑之上扶桑東方之野爰始將行是謂朏音斐明朏明將明也至于曲阿曲河山名是謂朝明臨于曾泉曾重也早食時在東方多水之地故曰曾泉是謂早食次于桑野是謂晏食臻于衡陽是謂禺中對于昆吾昆吾丘在南方是謂正中靡于鳥次鳥次西南方之山上是謂小遷至于悲谷悲谷西南方之大壑是謂晡時廻于女紀女紀西方陰地是謂大遷經于隅泉是謂高春頓于連爛石是謂下春連石西北山名言將欲冥下蒙悉春故曰下春爰上羲和爰息六螭是謂懸車日乘車駕以六龍羲和御之日至此而薄於虞泉羲和至此而廻六螭即六龍也薄於虞泉是謂黃昏淪于蒙谷是謂定昏日入崦音淹嵫音茲示日落嘗山經細柳細柳西方之野入虞泉之池曙於蒙谷之浦蒙谷蒙汜之水日西垂景在樹端謂之桑榆言其光在桑榆樹上又曰日中有踆七論切烏踆者趾也謂三足烏又曰若木在建木西末有十日其華照地高誘注曰末端也若木端有十日狀如連珠華光照其下地又曰日者陽之主是以春夏則群獸除角又曰堯時十日並出草木穛枯堯命羿仰射十日其九烏皆死墮羽翼又曰日積陽之熱氣生火火氣之精者為日列子曰宋有田夫曝日於野美之不識廣廈綿縞之屬謂其妻曰吾負日之暄以獻吾君將獲重賞又曰穆王駕八駿之乘西觀日所入處又曰日積氣之中有光耀者又曰孔子晨遊見兩小兒爭辯而鬥孔丘問其故一兒曰我以日始出時去人近日中時去人遠一兒曰我以為日初出時遠而日中時近曰爾何以知曰日初出大如車輪及中纔如盤蓋此不為遠者小而近者大乎一兒曰日初出滄滄涼涼及其中如探湯此不為近者熱而遠者涼乎孔子不能決兩兒笑曰丘孰謂汝多知乎文子曰日出於地萬物蕃息尸子曰日五色至陽之精象君德也五色照耀君秉土而王又曰少昊金天氏邑於窮桑日五色互照窮桑又曰聖人以日圓光盈尺光滿天下聖人居室而所燭彌綸六合又曰火在井中不能燭遠目在足下不可以視近君之於國也猶天之有日居不高則不明視不尊則不遠又曰聖人身猶日也夫日圜尺光盈天地聖人之身小其所燭遠矣任子曰日月為天下眼目人不知德山川為天下衣食人不能謝符子曰盛魄重輪六合俱照非日月能乎呂氏春秋曰白人之南建木之下日中無影蓋天地中也賈誼書曰周文王問鬻子曰敢問君子將入其職則於其民何如對曰君子將入其職則於其民也旭旭然如日之始出也既入其職則於其民暵暵音漢然如日之正中也既去其職於其民也暗暗然如日之已入也故君子將入而旭旭者義先聞也既入而暵暵者民保其福也既去而暗暗者民失其教也文王曰受命矣又曰學聖王之道譬之如日靜居獨思譬其若火夫捨學聖主之道而靜居獨思譬其去日之明於庭而就火之光於室也然可以小見不可以大知山海經曰東海之外甘泉之間有羲和國有女子名羲和為帝俊之妻是生十日常浴日於甘泉郭璞注羲和能生日也故曰為羲和之子堯因是立羲和之官以主四時又曰日浴溫源谷溫源即湯谷也湯浴上於扶桑扶桑在上一日方至一日方出言交會相代也皆戴於烏日中有三足烏又曰明星山日月所出又曰蘇門日月所出又曰湯谷上有扶木即扶桑十日所浴此浴水中有大木九日居上枝昔堯使羿仰射九日盡墜死汲冢書曰本有十日迭次而出運照無窮堯時為妖十日並出故為射所死又曰夸父逐日扶飲河渭不足北飲大澤未至道渴而死棄其杖化為鄧林又曰夸山神蓐收居之是山也西望日之所入其氣圓日形圓故其氣象亦然神經光之所司也太玄經曰日動而東天動而西天日錯行陰陽更巡錯違也巡行也又曰日一南而萬物死日一北而萬物生外北而萬物虛外南而萬物盈外之南也右行而左還外之北也左行而右還或左或右或死或生纂要云日光曰景星月之光通謂之景日影日晷日氣曰睍乃見切詩見晛日消晛日氣日初出曰旭日昕曰晞大明曰昕詩曰匪陽不晞晞乾也言日昕乾濕物也日溫曰煦在午曰亭午在未曰昳日晚曰旰日將落曰薄暮日西落光返照於東謂之反景景在下日倒景日有愛日畏日愛冬日也畏夏日也春秋左傳曰冬日可愛夏日可畏白虎通曰日行遲月行疾日行一度月行十三度十九分度之七日月經千里雜占書曰日冠者如半暈也法當在日上有冠又有兩珥尤吉廣雅曰日名耀靈一名朱明一名東君一名大明亦名陽烏日御曰羲和范子計然曰日者寸也月者尺也尺者紀度而成數也寸者制萬物陰陽之短長也又曰日者火精也火者外景主晝居晝而為明處照而有光又曰日者行天日一度終而復始如環無端說苑曰師曠對晉平公曰少而學者如日出之光壯而學者如日中之光老而學者如秉燭夜行
