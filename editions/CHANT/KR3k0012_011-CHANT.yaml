body:
  text: 天部十雨上釋名曰雨羽也如鳥羽動則散又曰雨水從雲下也雨者輔也言輔也言輔時而生養說文曰零徐雨也𩆵音斯小雨裁落也𩂢一林本反霖雨也南陽名霖雨曰𩂢𩆑音酸小雨也𩃔子廉反微雨也𩆃音資雨聲也溟小雨也澍時雨也滑子八反雨下也易曰密雲不雨自我西郊又曰匪寇婚媾往遇雨則吉又曰雲行雨施又曰雨以潤之書曰若歲大旱用汝作霖雨又曰洪范休徵曰肅時雨若又曰納于大麓烈風雷雨弗迷詩曰有渰淒淒興雨祁祁雨我公田遂及我私渰陰雲貌淒淒雲行之貌祁祁猶徐徐也又曰月離于畢俾滂沱矣月離陰星則雨又曰我來自東零雨其濛鸛鳴於垤婦歎於室鄭玄注曰將陰則穴處者先知之鸛好水將雨長鳴而喜也又曰習習谷風以陰以雨禮記月令曰仲春之月始雨水孟春行夏令則雨水不時行秋令則暴雨惣至行冬令則水潦為敗又曰季春行夏令則時雨不降行秋令則淫雨早降又曰時雨將降下水上騰又曰立夏命有司祀雨師又曰孟夏行秋令則苦雨數來又曰六月中氣後五日大雨時行又曰仲秋行春令則秋雨不降又曰仲冬行秋令則天時雨汁瓜瓠不成又曰諸侯朝天子雨霑服失容則止又曰天降時雨山川出雲又曰風雨不節則饑又曰疾風迅雷甚雨則必變傳曰隱公九年三月癸酉大雨霖以震書始也又曰宋大水魯莊公吊焉曰天作淫雨以害于粢盛若之何不吊又曰如百穀之仰膏雨又曰雨三日以往為霖又曰衛大旱卜有事於山川不吉甯莊子曰昔周饑克殷而年豐今邢方無道欲使衛討邢焉從之師興而雨又曰臧文仲如晉雨過御叔在其邑將飲酒御叔魯大夫曰焉用聖人武仲多知時人謂聖人也我將飲酒而已雨行何以聖為公羊傳曰觸石而出膚寸而合側手為膚案指為寸信觸石理而出無有膚寸而不合也不崇朝而遍雨天下者惟太山之雲爾穀梁傳曰春正月不雨者勤雨也欲雨之心勤也夏四月不雨言不雨者閔雨也經一時不雨民之至憂也閔憂六月雨者喜雨也爾雅曰甘雨時降萬民以喜謂之醴泉又曰暴雨謂之凍小雨謂之霡霂久雨謂之霪霪雨謂之霖易稽覽圖曰降陰為雨降陰之雨潤而不破塊京房易飛候曰凡候雨以晦朔弦望雲漢四塞者皆當雨東風曰雷雨有黑雲氣如覆船於日下當雨有黑雲氣如牛彘當雨暴有異雲如水牛不出三日大雨有黑雲如群羊奔如飛鳥五日必雨有雲如浮船皆為雨北斗獨有雲不出五日大雨四望見青白雲名曰天塞之雲雨徵也有蒼黑雲細如杼軸蔽日月五日必雨雲如兩人提鼓持桴皆為暴雨又曰太平之時十日一雨凡歲三十六雨此休徵時若之應尚書說曰淮雨淮暴雨之名也尚書大傳曰五岳皆觸石而出雲不崇朝而雨又曰成王時有越裳氏來朝曰久矣天之無烈風東西南北來也無澍雨暴雨也意中國有聖人乎禮統曰雨者輔時生養均遍故謂之雨太戴禮曰天地之氣和即雨禮斗威儀曰君乘金而王其政象平則嘉雨時至春秋說題辭曰一歲三十六雨天地之氣宣十日小雨應天文十五日大雨以升運也又曰陽制陰故水為雨春秋元命包曰陰陽和而為雨春秋繁露曰木有變則春多雨此徭役眾賦歛重故也史記曰秦始皇時置酒而天雨陛楯者皆沾寒優旃見而哀謂之曰汝欲休乎陛楯者曰幸甚優旃旅曰我即行呼汝汝疾應曰諾居有頃殿上上壽呼萬歲旃大呼曰陛楯郎曰諾優旃曰汝雖長何益幸雨立我雖短幸休居於是使得半相代又曰夫子當行命第子持雨具既而果雨曰昨夜月宿畢故知之范曄後漢書曰高鳳字文通家貧好學不休其家曝麥令鳳守雞以竿授其手中鳳執竿讀書雨大至鳳讀書不覺執竿如故其妻還麥流甚以為怒鳳亦不愧後漢書曰郭林宗嘗於陳梁間行遇雨巾一角蟄時人乃故折角以為林宗巾其見慕如此謝承後漢書曰百里嵩字景山為徐州刺史境旱嵩出巡遽甘雨輒澍東海祝其合鄉等三縣父老訴曰人等是公百姓獨不迂適降廻赴雨隨車而下東觀漢記曰王郎起光武自薊東南馳及至南宮遇大風雨而引車入道傍舍馮異抱薪鄧禹爇火光武對竈燎衣又曰順帝陽嘉元年立順烈皇后是時自冬至春不雨尊后之日嘉澍沾渥又曰沛獻王輔善京氏易永平五年京師少雨上御雲臺自卦以周易林占之其繇曰蟻封穴戶大雨時至上以問輔輔上書曰蹇艮下為山坎上為水山雲為雨蟻穴居知雨將至故以蟻為興漢書名臣奏曰天陰雨人之病為之先動是陰相應而起也天將陰雨又使人睡臥者陰氣也魏志曰曹真伐蜀從子午道南入諸軍或從斜谷道會大霖雨四十餘日棧道斷絕詔真還又曰太祖在長安使曹仁討關羽於樊秋大霖雨漢水溢平地水數丈六軍皆沒晉書曰詔以王雅為太子少傅將拜遇雨請以繖入王珣不許因冒雨而拜又曰樊英隱於壺山嘗有暴風從西南起英謂學者曰成都市火甚盛因含水西向漱之乃令記其時日後有從蜀郡來者云是日大火有雲從東起須臾大雨神仙傳曰欒巴蜀人徵為尚書大朝得酒不飲西南噀之詔問巴巴曰臣本縣成都大火臣以酒為雨救之帝驚驛問咸云是時雨從北來猶有酒氣襄陽傳曰巫山神女朝為行雲暮為行雨西京雜記曰董仲舒曰太平之時雨不破塊津莖潤葉而已又曰董仲舒曰陰陽二氣之初蒸也若有若無若實若虛團攢聚合其體稍重乘虛而墜風多則合速故雨大而踈風少則合遲故雨細而密湘州記曰零陵山有石鷰遇風雨即飛止還為石王采安成記曰萍鄉西津名玉女崗天當雨輒先涌五色氣於石間俗謂玉女披衣搜神記曰武王伐紂至河上雨甚疾雷晦冥揚波於河眾甚懼武王曰余在天下誰敢干余者風波立濟述異記曰廬山有康王谷北嶺上有一城號劉城天每有雨輒聞山上有鼓角笳簫之聲村人以為常候武昌記曰武昌城東南有金牛崗西有石鼓山上有三石鼓石鼓鳴天必雨羅浮山記曰山有龜淵淵有神龜龜鼻貫銅鐶若有人穢此淵即注雨周處風土記曰榆莢雨春雨黃雀風濯梅雨六月之風雨也又曰六月有大雨名濯枝雨荊楚歲時記曰六月必有三時雨田家以為甘澤邑里相賀曰嘉雨王子年拾遺記曰甘雨濛濛似露委草木則滴瀝雨也又曰香雲成香雨帝王世紀曰黃帝遊洛水上見大魚殺五牲以醮天乃甚雨七日七夜魚流始得圖書今河圖是也家語曰孔子將行遇雨不假蓋於子夏護其短也又曰齊有一足之鳥集於殿前舒翅而跳齊候異之使聘魯訪諸孔子曰此鳥名曰啇羊昔童兒有屈一腳振訊雨臂而跳且謠曰天將大雨啇羊鼓舞今齊有之其應至矣急告趣治溝渠脩隄防將有大雨水為災果大霖雨水溢泛諸國傷害人民唯齊有備不敗景公曰聖人之言信而有徵矣老子曰暴雨不終日莊子曰宋景公時大旱三年卜云以人祀乃雨公下堂頓首曰吾所求雨者為人今殺人不可將自當之言未卒天大雨方千里又曰堯讓天下於許由許由曰曰月出矣而爝火不息時雨降矣而猶浸灌不亦勞乎文子曰若與俗處猶走逃雨也無之而不濡列子曰赤松子神農時雨師也廣成子曰黃帝時雲不待族而雨尸子曰神農理天下欲雨則五日為行雨旬為谷雨旬五日為時雨萬物咸利故謂之神雨孟子曰油然作雲霈然下雨抱朴子曰軍始發大風甚雨起於後大勝之徵也軍始出雨沾衣者是謂潤兵軍有功雨不足沾衣裳是謂泣軍必敗又曰無雲而雨是謂雨血將軍當楊兵講武以應之雨軍中尤甚者將軍戰必無功也管子曰冬作土功發地藏則夏多暴雨秋霖不止又曰春發五政一曰論幼孤赦有罪二曰賦爵列授祿位三曰脩溝洫復亡人四曰治封壃正阡陌五曰無殺麑卵無絕華萼五政徇時春雨乃來淮南子曰失火遇雨禍中有福又曰人莫鑑於沬雨而鑑於止水者以其凈也沬雨雨潦上沫起覆蓋也言其濁擾不見人形也又曰朱鼈浮於水上必大雨又曰天且雨也魚已噞噞音宜撿反又曰黑蜧神虬潛泉而居將雨則躣蜧音麗鄒子曰朱買臣孜孜脩學不覺雨之流粟韓子曰荊人伐陳吳救之軍間三十里雨十日夜左史倚相謂子期曰雨十日甲輯兵聚吳人必至不如備之乃為陣未成而吳人至見荊有戒而反傅子曰昔者伯牙子遊於泰山之陰逢暴雨止於巖下援琴而鼓之為淋雨之音更造崩山之曲每奏鐘期輒窮其趣曰善哉子之聽也孔叢子曰子思荅懸子曰以子產仁愛譬夫子猶浸水之與膏雨夫浸所及則生不及則死民皆知焉膏雨之所生也廣莫大焉民之受賜也普矣莫識其由也呂氏春秋曰武王伐紂至鮪水使膠鬲候周師問武王曰西伯何時至曰將以甲子日至膠鬲行矣大雨日夜不休武王疾行不輟軍吏諫武王曰吾疾行以救膠鬲之死也楊子法言曰震風凌雨然後知夏屋之帡幪震雨凌暴也夏大也帡彰幪覆廣雅曰雨師謂之屏翳纂要曰疾雨曰驟雨徐雨曰零雨雨久曰苦雨亦曰愁霖雨晴曰啟雨水曰潦雨雲曰渰雲亦曰油雲戰國策曰文侯與虞人期獵是日天雨文侯將出左右諫止曰吾與虞人期不可失乃往魏於是始強易林變占曰雷君出裝隱隱西行霖雨不止流為江河周易集林雜占曰占天雨否外卦得陰為雨得陽不雨其爻發變得坎為雨得離不雨巽化為巽先雨后風愽物志曰太公為灌壇令武王夢婦人當道夜哭問之曰吾是東海神女嫁於西海神童今為灌壇令當道廢我行我行必有大風疾雨大風疾雨是毀君之德也武王覺召太公問之果有疾雨暴風在太公邑外而過六韜曰文王問散宜生卜伐紂吉乎曰不吉鑽龜龜不兆數蓍交加而折將行之日雨輜車至軫行之日幟折為三散宜生曰此卜四不祥不可舉事太公進曰是非子之所知也祖行之日輜車至軫是洗濯甲兵也師曠占曰候月知雨多少入月一日二日三日月色赤黃者其月少雨月色青者其月多雨常以五卯日候西北有雲如群羊者即有雨至矣冬戊巳春辰己日雨蝗蟲食禾稼立春雨傷五木立秋日雨害五穀常以戊巳日日入時出時欲雨日上有冠雲大者即雨小者少雨天文要集曰北斗之旁有氣往往而黑狀似禽獸大如皮席不出三日必雨又曰河有雲黑狀似船若一疋布維河不出十日大雨又曰辰口守心有水災一日大雨不可當又曰北斗者不欲雲覆之黑雲覆之大雨范子計然曰風為天氣雨為地氣風順時而行雨應風而下命曰天氣下地氣上陰陽交通萬物成矣劉義慶世說曰謝太傅無嗔喜曾送兄征西葬還日暮雨馭人皆醉不可處分公乃於車中手取車柱撞馭人聲色甚怒劉義慶幽明錄曰河南人趙良與其鄉人諸生之長安至新安界遇霖雨糧乏相謂曰饑郍得美食邪應時羹飯備具有人聲語云進踈食黃子發相雨書曰常以戊申日候日欲入時日上有冠雲不問大小視四方黑者大雨青者小雨候日始出日正中有雲覆日而四方有雲黑者大雨青者小雨四方有雲如羊豬雨立至四方北斗中有雲後五日大雨四方北斗中無雲唯河中有雲三枚相連狀如浴豬狶三日大雨以丙丁之辰四方無雲唯漢中有者六十日風雨和常以六甲之日平旦清明東向望日始出時日上有雲大小貫日中青者以甲乙雨赤者丙丁雨白者庚辛雨黑者壬癸雨黃者戊己日雨六甲日四方雲皆合者即雨以天方雨時視雲有五色黑赤並見者即雹黃白雜者風多雨少青黑雜者雨隨之必滂沛流潦又曰四方有濯魚雲遊疾者即日雨遊遲者雨少至說苑管仲曰吾不能以春風風人夏雨雨人吾道窮矣又曰楚莊王伐陳吳救之雨十日十夜晴左史倚相曰吳師必夜至甲裂壘壞彼必薄我何不行列鼓出待之吳師至見楚軍成陣而還又曰武王伐紂過隧則斬岸過水則析舟示人無反志也至於有戎之隧大風折斾散宜生諫曰此其妖歟武王曰非也天落兵也風霽而乘以大雨散宜生又諫曰此非妖歟王曰非也天洗兵也風俗通曰雨師為玄冥山海經曰羽山其上多雨將陽之山多怪雨括地圖曰谷山有藂雲甘雨
