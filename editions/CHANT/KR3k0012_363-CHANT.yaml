body:
  text: 人事部三姓說文曰姓人所生也古之神聖人母感天而生子故稱天子因生以從女生生亦聲也易類謀曰黃帝吹律以定姓左傳隱八年曰無駭卒羽父請謚與族公問族於眾仲眾仲對曰天子建德因生以賜姓因其所由生以賜姓謂若舜由媯汭故謂陳為媯姓胙之土而命之氏諸侯以字諸侯位卑不得賜姓故其臣因氏其王父字為謚因以為族官有世功則有官族邑亦如之公命以字為展氏無駭公子展之孫故為展氏也又襄四年曰穆叔如晉范宣子逆之問焉曰古人有言曰死而不朽何謂也穆叔未對宣子曰昔匄之祖自虞以上為陶唐氏在夏為御龍氏在啇為豕韋氏在周為唐杜氏晉主夏盟為范氏其是之謂乎穆叔曰以豹所聞此之謂世祿非不朽也史記曰太公望呂尚者東海上人其先祖嘗為四嶽佐禹平水土甚有功虞夏之際封於呂本姓姜氏從其封姓故曰呂尚漢書曰夏侯嬰為滕令故號滕公及曾孫頗尚主主隨外家姓號孫公故滕公子孫更為孫氏又曰戍卒婁敬求見說上曰陛下取天下與周異而都雒陽不便不如入關據秦之固上以問張良良因勸上是日車駕西都長安拜婁敬為奉春君賜姓劉氏又曰灌夫潁陰人也父張孟嘗為潁陰侯灌嬰舍人因得幸進之至二千石故蒙灌氏姓為灌孟師古曰蒙冒也又曰衛青字仲卿其父鄭季河東平陽人也以縣吏給事侯家平陽侯曹壽尚武帝姊陽信長公主季與主家僮衛嫗通生青青有同產兄衛長君及子夫子夫自平陽公主家得幸武帝故青冒姓衛氏漢書曰京房字君明東郡頓丘人也房本姓李推律自定為京氏後漢書曰第五倫字伯魚京兆人也其先齊諸田諸田徙園陵者多故以次第為氏崔鴻三十國春秋夏錄曰赫連勃勃下書朕之皇祖自北遷幽朔姓改姒氏音殊中國故從母氏為劉子而從母之姓非禮也朕將以義易之帝王者係天為子是為徽實與天連今改姓曰赫連氏庶協皇天之意其非正統皆以鐵伐為氏庶朕宗族子孫剛銳如鐵皆堪伐人三國典略曰周蔡祐字承先陳留圉人齊安郡守襲之子也有膂力便騎射祖以其戰功賜姓大利稽氏唐書曰康國即漢康居之國也其王姓溫月氏先居張掖祁連山北昭武城為突厥所破南依䓗嶺遂有其地枝庶皆以昭武為姓示不忘本也又曰則天朝博州刺史瑯邪王沖據博州起兵沖父豫州刺史越王貞又舉兵於豫州與相應討平之改姓為虺氏又曰尚可孤東部鮮卑字文之別種也代居松漠之間天寶末歸國隸安祿山後事史思明上元中歸順累授左右威衛二大將軍魚朝恩之統禁軍愛其勇力甚委遇之俾為養子奏改姓魚氏又曰李全略者本姓王名簡為鎮州小將事主武俊元和中節度使王承宗歿軍情不安自拔歸朝授代州刺史及長慶初鎮州軍亂害田弘正穆宗為之旰食以簡嘗為將召問其計簡遂極言利害願有以自效明年擢拜橫海軍節度使賜姓李氏名全略以崇寵之白虎通曰人所以有姓者何所以崇恩愛厚親親遠禽獸別婚姻也故紀世別類使生相愛死相哀同姓不得相娶皆為重人倫也姓者生也人稟天氣所以生者也詩云天生蒸民尚書曰平章百姓姓所以有百者何以為古者聖人吹律定姓以記其族人含五常而生正聲有五宮商角徵羽轉而相雜五五二十五轉生四時異氣殊音悉備故姓有百也所以有氏者何所以貴功德下伎力或氏其官或氏其事聞其氏即可知矣所以勉人為善也或氏王父字者何所以別諸侯之後為興滅國繼絕世也王者之子稱王子王者之孫稱王孫諸侯之子稱公子公子之子稱公孫公孫之子各以其王父字為氏故春秋有王子瑕論語有王孫賈又有衛公子荊公孫朝魯有仲氏孟氏叔氏季氏楚有昭屈景氏齊有高國崔盧氏以知其子孫也王者之子亦稱王子兄弟立而皆封也或曰王者之孫亦稱王孫刑德放曰堯知命表稷契賜姓于姬皋陶典刑不表姓言天任德遠刑禹姓姒祖昌意以薏苡生殷姓子氏祖以玄鳥子生也周姓姬氏祖以履大人跡生也風俗通曰萬類之中唯人為貴春秋左氏傳官有世功即有官族邑亦如之公羊譏衛滅邢論語貶昭公娶於吳諱同姓也蓋姓有九或氏於號或氏於謚或氏於爵或氏於國或氏於官或氏於字或氏於居或氏於事或氏於職典號唐虞夏殷也以謚戴武宣穆也以爵王公侯伯也以國曹魯宋衛也以官司馬司徒司寇司空司城也以字伯仲叔季也以居城郭園池也以事巫卜陶丘也以職三馬五鹿青牛白馬也三輔舊事曰堯母字慶都配高辛氏而生堯因主人伊長孺為姓謂之伊陳留風俗傳曰侯氏氏侯爵周微官失其守故以侯爵為姓又曰秦之先曰伯翳佐舜擾馴鳥獸錫姓曰嬴氏其後分封以國為姓有徐氏郯氏黃氏江氏文士傳曰束晳字廣微踈廣後也王莽末廣曾孫孟造自東海避難歸蕪城改姓去踈之足為束氏世說曰諸葛令恢與王丞相共爭姓族前後王曰何不言葛王而言王葛諸葛曰譬言驢馬不言馬驢驢寧勝馬耶論衡曰孔子推律自知殷之苗也名禮記曲禮上曰名子者不以國不以日月不以隱疾不以山川此在常語之中為後難諱也春秋傳曰名終將諱之又曰二名不偏諱孔子之母名徵在言徵不稱在言在不稱徵也又曲禮下曰君子已孤不更名重本也又大傳曰名者人治之大也可無慎乎人治行以正人左傳桓公曰初晉穆侯之夫人姜氏以條之役生太子命之曰仇其弟以千畝之戰生命之曰成師師服曰異哉君之名子也夫名以制義義以出禮禮以體政政以正民是以政成而民聽易則生亂嘉耦曰妃怨耦曰仇古之命也自古有此言也今君命太子曰仇弟曰成師始兆亂矣兄其替乎又曰子同生以太子生之禮舉之公問名於申繻對曰夫名有五有信有義有象有假有類以名生為信若唐叔虞魯公子友以德命為義若文王名昌武王名發也以類為象若孔子首象尼丘山取於物為假若伯魚生人有饋之魚因名之曰鯉取於父為類若子同生有與父同者也不以國國君之子不自以本國為名也不以官不以山川不以隱疾不以畜牲不以器幣周人以諱事神名終將諱之君父之名固非臣子所斥然禮既卒器以木鐸徇曰舍故而諱新謂舍親盡之祖而諱親死者故以國則廢名以官則廢職以山川則廢主以畜牲則廢祀以器幣則廢禮晉以僖侯廢司徒僖侯名司徒廢為中軍也宋以武公廢司空武公名司空廢為司城也先君獻武廢二山二山具敖也魯獻公名具武公名敖是以大物不可以命公曰是其生也與吾同物命之曰同物類也謂同日也又閔公曰成季之將生也桓公使卜楚丘之父卜之曰男也其名曰友及生有文在其手曰友遂以命之遂以為名又文下曰鄋瞞侵齊鄋瞞狄國名遂伐我公卜使叔孫得臣追之吉冬十月敗狄于鹹獲長狄僑如僑如鄋瞞國之君以命宣伯得臣待事而名其三三子因名宣伯曰僑如以旌其功也又宣上曰楚鬭伯比淫於䢵子之女生子文立諸夢中虎乳之䢵子畋見之使收之楚人謂乳為穀謂虎為於菟故命曰鬭穀谷於菟又宣上曰鄭文公有賤妾曰燕姞夢天使與己蘭曰予為伯儵余爾祖也以是為而子以蘭有國香人服媚之如是既而文公見之與之蘭而御之辭曰妾不才幸而有子將不信敢徵蘭乎公曰諾生穆公名之曰蘭又定下曰魯苫越生子將待事而名之陽州之役獲焉名之曰陽州欲自比僑如漢書曰司馬相如小名犬子及長慕蘭相如為人更名相如後漢書曰趙歧字臺卿生於御史臺因字臺卿東觀漢記曰廉范為蜀郡守令民不禁火百姓皆喜家得其願時生子皆以廉為名者千魏志曰程昱本名立夢登太山捧日人或以夢告太祖太祖曰終為吾腹心遂上加日又曰鄧艾字士載棘陽人年十二隨母至潁川讀故太丘長陳寔碑文言為世範行為士則艾遂自名範字士則後宗族有與同者故改焉又曰王昶字文舒太原人其為兄子及子作名字皆一依謙實以見其意故兄子默字處靜沉字處道其子渾字玄沖深字道遂書戒之曰夫人之道莫大於寶身全行以顯父母吳志曰立子𩅦為太子注曰休制曰孤今為四子作名字太子名𩅦音如湖水灣澳之灣字莔音如迄今之迄次子名𢿲音如兕觥之觥字𧟨音如玄㘋首之㘋音玄次子名壾音如草莽之莽字盥音如舉物之舉次子名𠅬音如襃衣下寬大之襃字寅音如有所推持之推此都不與世所用者同故鈔舊文會合作之江表傳曰顧雍從蔡伯喈學專一清靜敏而易教伯喈貴異之謂曰卿必成致今以吾名與卿故雍與伯喈同名由此也吳錄曰雍字元歎言為蔡雍之所歎也晉書曰謝玄破符堅於淮淝先有童謠云誰謂爾堅石打破故桓豁以石名子以邀其功晉中興書曰咸和元年當徵蘇峻司徒導欲出王舒為外授及更拜撫軍將軍會稽內史秩中三千石舒上䟽以父名會不得作會稽朝議以字同音異於禮無嫌舒陳音雖異而字同乞換他郡於是改會字為鄶古會切舒不得已親職崔鴻十六國春秋前涼錄曰李弇字子隴西狄道人也弇本名良又妻姓梁張駿戲之曰卿名良妻姓梁夫妻相同稱子孫將何以目其舅氏昔耿弇以少年立功立事吾今賴卿有同於耿氏乃賜名曰弇又曰陳安成紀平莊人也少慷慨讀書見許褚而慕之乃自字虎侯後魏書曰游肇字伯始高祖賜名尚書令高肇世宗之舅為百寮懾憚以肇名與己同欲令改易肇以高祖所賜秉志不許高肇甚銜之世宗嘉其剛梗又曰太和初宋弁為殿中郎中高祖嘗因朝會之次歷訪治道弁年少官微自下而對聲姿清亮進止可觀高祖稱善者久之因是大被知遇賜名為弁意取弁和獻玉楚王不知寶也宋書曰廢帝諱昱字德融小字惠震明帝長子也大明七年正月辛丑生於衛尉府太宗諸子在孕皆以周易筮之即以所得之卦為小字故帝字惠震又曰王景文美風姿好言玄理少與陳郡謝莊齊名太祖甚相欽重故為太宗娶景文妹而以景文名名太宗又曰顏竣為丹陽尹加散騎常侍先是峻未有子而大司馬江夏王義恭諸子為元凶所殺至是並各產男上自為制名名義恭子為伯禽以比魯公伯禽周公旦之子也名竣子為辟彊以比漢侍中張辟彊張良之子也宋書曰謝莊五子䬅力計切朏顥嵷音揔𤅢音藥世謂莊名子以風月景山水梁書曰張嵊字四山初嵊父稷為剡令至嵊亭生之因名嵊字四山少敦孝行年三十餘猶班衣受稷杖動至數百收淚歡然三國典略曰周陸逞字季明綏德郡公通之弟也初名彥字世雄魏文帝嘗從容謂之曰爾既溫裕何乃字世雄且為世之雄非所宜也於爾兄弟又復不類遂改焉南史曰陳文帝嘗謂宣帝曰我諸子皆以伯為名汝諸子宜用叔為稱宣帝因以訪毛喜喜即條自古名賢杜叔英虞叔卿等二十餘人以啟之文帝稱善白虎通曰人必有姓名何以吐情自紀尊事人者也論語曰名不正則言不順三月名之何天道一時物有其變人生三月目煦亦能咳笑與人相荅故因其始有知而名之故禮傳曰子生三月則父名之名之於祖廟者謂子之親廟也明當為宗祖子也一說名之於燕寢名者幼小卑賤之稱也質略故於燕寢殷以日名子何殷家質直故以生日名也尚書言太甲帝乙武丁也於名臣亦得以甲乙生日名子不使亦不止也以尚書道殷臣有巫咸有祖己也何以諸侯不象王者以生日名子也以大王名亶甫王季名歷此殷之諸侯也不以子丑為名何曰甲乙者幹也子丑者枝也幹者本本貫故以甲乙為名也名或兼或單何名子非一或聽其聲律定其名或依其事旁於形故或兼或單也依其事者若后稷是也棄之因名為棄旁其形者孔子首類魯尼丘山故以為之名也風俗通曰袁賀字元服祖父京為侍中安帝始加元服京入賀而賀始生因名之曰賀而字元服鄭玄別傳曰玄一子名益字益思年二十三相國孔府君舉孝廉府君以多寇屯都昌為賊管亥所圍乃令從家將兵奔救遇賊見害時年二十七也妻有遺體生男玄以太歲在丁卯生此男以丁卯日生生又手理與玄相似故名曰小同孟宗別傳曰孟宗為豫章太守民思其惠路有行歌故時之生子者多以孟為名江祚別傳曰祚為南安太守民思其德生子多以為名字蜀李書曰賈夷字景叔梓潼人也太始初內移河東少仕晉臺為倉部令史懷帝時為安富令中原喪亂玉衡七年歸國武帝素聞夷名重之皇子雅生因名賈夷秦記曰後帝泓字元時東宮生邵弘言於父曰君之於臣先生之與其門人名之可也至於同官之於僚黨同姓之於昆弟同門之於朋友可以稱其字而不可斥其名故公羊傳曰名不如字者非謂其人之名不如其字尊乃謂為人所字則近乎見尊為人所名則近乎見卑也古之君子之名子也必以信義而擇淑令所以祥其名也不以官職所以殊其名也不以畜幣所以重其名也不以隱疾所以顯其名也遍告內外所以昭其名也書而藏之所以寶其名也賤者避焉所以貴其名也冠而有字所以尊其名也名成乎禮字依乎名名字之本字名之末也為本故尊為末故卑尊故其禮詳卑故其事略也且婦人無名故賤於丈夫野人無名故賤於學士名者己之所以事尊尊者之所以命己字則己之所以接卑卑者之所以稱己未有用之於尊而為卑用之於卑而為尊者也搜神記曰齊惠之妾蕭桐子見御有身以其賤不敢言也取薪而生頃公於野又不敢舉也貍乳鸇覆之人見而收之因名無野何槙玄壽賜名敘曰新婦荀氏所生女以歲在丁丑四月五日日始出時生此月斗建巳其日又巳其時加卯甲乙卯皆東南春夏天地動發萬物滋生今月吉月之善時也又於易卦震位在卯巽位在巳震為長男巽為長女而此女孫正用茲日斯時始瞻日月豈伊先祖之靈寔臨祐之玄髮素顏婦人之上姿也壽考無疆生民之至願也故賜名曰玄壽焉
