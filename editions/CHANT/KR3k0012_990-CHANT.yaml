body:
  text: 藥部六天門冬爾雅曰蘠蘼虋音門冬也郭璞注曰今門冬也一名滿冬山海經曰虋谷之山草多虋冬列仙傳曰赤須子豐人好食天門冬齒落更生神仙傳曰甘始者太原人服天門冬在人間三百餘年博物志曰天門冬莖間有剌而葉滑者曰郄休一名顛蕀根以浣縑素白越人名為浣草似天門冬而非也凡服此先試浣衣如法者便非天門冬抱朴子曰杜子服天門冬御十八妾有子百四十人日行三百里又內篇曰天門冬或名地門冬麥門冬潛夫論曰夫理世不得真賢譬猶治疾不得真藥也治疾當得麥門冬及得蒸橫麥已不識真合而飲之疾以䆮劇而不知為人所欺也遊名山志曰泉山竹際及金州多夌門冬盛弘之荊州記曰魚復縣巖崖內生夌門冬廣州記曰鄣平縣偏饒夌門冬建康記曰建康出夌門冬本草經曰麥門冬味甘平生川谷治心腹結氣傷中胃脈絕久服輕身不飢不老生函谷山吳氏本草曰夌門冬一名羊韭秦一名烏韭楚一名馬韭越一名羊薺一名愛韭一名禹韭一名爨火冬一名忍冬一名忍陵一名不死藥一名禹餘糧一名僕壘一名隨脂神農歧伯甘平黃帝桐君雷公甘無毒季氏甘小溫扁鵲無毒生山谷肥地葉如韭肥澤叢生採無時實青黃朮爾雅曰朮山薊本草云朮一名山薊今朮似薊而生山中山海經曰女几之山其草多朮列仙傳曰涓子好餌朮接食其精三百年神仙傳曰陳子皇得餌朮要方服之得仙去霍山其妻姜氏疲病念其婿採朮之法服之病自愈至三百七十歲登山取朮重檐而歸不息不極顏色氣力如二十時抱朴子內篇曰南陽文氏其先祖漢末大亂飢困欲死遇人教之食朮云遂不飢數十年乃來還鄉里顏色更少氣力勝故朮一名山精神藥經曰必欲長生當服山精茯苓廣雅曰茯神茯苓也史記龜策傳曰茯苓在兔絲之下之似飛鳥之形新雨已天清靜無風以夜燒兔絲去之即篝燭此地徐廣曰籍籠也蓋然火而籠罩其去土也篝音溝火滅即記其處明即掘取入地四尺至七尺得矣伏苓者千歲松脂食之不死齊書曰陶弘景永明中上表辭祿許之賜以束帛勑所在月給伏苓五斤白蜜二升以供服餌淮南子曰下有茯苓上有兔絲茯苓千歲松脂也兔終生其上而無根一名女羅也抱朴子內篇曰任子季服茯苓十八年仙人玉女往從之面體如玉澤范子計然曰茯苓出嵩高三輔神異經記曰西北荒有人飲甘露食茯苓典論曰頴川郄儉能辟穀餌茯苓初儉至市茯苓價暴貴數倍典術曰茯苓者松脂入地千歲為茯苓望松樹赤者下有之神仙傳曰秀眉公餌茯苓得仙又曰皇初起以弟初平得道乃棄妻子留就初平共服松柏茯苓至五萬日能坐在立亡行日中無影有童子之色及俱還鄉里親戚死亡略盡乃復俱去臨去以方教南伯遂易姓為赤初起字魯班初平字為松子其後服此藥得仙者數十人列仙傳曰犢子者鄴人也少在黑山上採松子茯苓餌而服之且數百年時牡時老時好時醜時人乃知仙人也廣志曰茯神松汁所作勝茯苓或曰松根茯苓貫著之生朱提濮陽縣博物志曰仙傳云松柏入地中千年化為茯苓茯苓千年化為虎魄一名江珠今太山出茯苓而無虎魄江珠益州永昌郡出虎魄而無茯苓或云蜂燒窠所作未詳二說嵩高山記曰取松柏茯苓二斤醇酒漬之和以白蜜日三服乃通靈名山略記曰鬱州山出茯苓吳氏本草曰茯苓通神桐君甘雷公扁鵲甘無毒或生益州大松根下入地三尺一丈二月七月採本草經曰茯苓一名茯神味甘平生山谷治胸脅山氣憂患悸驚生太山豬苓莊子曰豕橐藥也司馬彪注曰豕橐一名苓根似豬豕治渴本草經曰豬零一名猳豬矢味甘平生山谷治疾虎解毒蠱蛀不祥利水道久服輕身能不老生衡山吳氏本草曰豬零神農甘雷公苦無毒如茯苓或生宛句八月採卷柏建康記曰建康出卷柏范子計然曰卷柏出三輔本草經曰卷柏一名萬歲味辛溫生山谷治五藏邪氣吳氏本草曰卷柏一名豹足一名求股一名萬歲一名神投時神農平桐君雷公甘生谷鄭氏婚禮謁文曰卷柏藥草附生山顛屈卷成性終無自伸甘草本草經曰甘草一名美草一名蜜甘厚朴廣雅曰重皮厚朴也范子計然曰厚朴出弘農本草經曰厚朴味苦溫生山谷治中風傷寒熱血痺死肌去蟲生文山吳氏本草曰厚朴一名厚皮神農歧伯雷公苦無毒季氏小溫生交阯黃精廣雅曰黃精龍衘也又曰黃精葉似小黃也抱朴子曰黃精一名莬竹一名鷄格一名岳珠服其花勝其實花生十斛乾之則可得五六升服之十年乃可得益列仙傳曰脩羊公魏人也止華陰山石室中中有懸石塌臥其上塌盡穿陷略不食時取黃精服之神仙傳曰王烈字長能邯鄲人也常服黃精又曰白莬公服黃精而得仙永嘉記曰黃精出松陽永寧縣遊名山志曰名室藥多黃精博物志曰黃帝問天姥曰天地所生豈有食之令人不死者乎姥曰太陽草名黃精餌食之可以長生胡麻廣雅曰狗蝨鉅勝藤苰胡麻也孝經援神契曰鉅勝延年宋均注曰世以鉅勝為狗杞子晉書安帝紀曰殷仲堪在荊州以胡麻為廩廣志曰胡麻一名方莖服之不老風濕其葉名青襄也淮南子曰汾水濛濁而宜胡麻列仙傳曰關令尹喜與老子俱之流沙西服鉅勝實莫知所終魯女生別傳曰女生長樂人也少好道初服餌胡麻及朮絕穀八十餘年更少壯色如桃華一日能行三百里走及麞鹿抱朴子曰胡麻好者一石蒸之如炊須暴乾復蒸丸和細篩白蜜丸如雞子日二枚一年面色美身體滑二年白髮黑三年齒落更生四年入水不濡五年入火不燋六年走及奔馬或蜜水和作餅如糖狀炙食一餅抱朴子內篇曰胡麻服餌不老耐風濕吳氏本草曰胡麻一名方金一名狗蝨神農雷公甘平無毒立秋採青襄一名蔓神農苦雷公甘本草經曰胡麻一名巨勝味甘平生川澤治傷中虛羸補五藏益氣久服輕身不老生上黨崔寔四民月令曰二月可種胡麻謂之上時也當歸爾雅曰薜山靳廣雅曰山芹當歸今似芹而麤大靳音巨申切吳志曰曹公聞太史慈名遺書以篋封之發看無所道但貯當歸魏氏春秋同異曰姜維得母書并當歸維曰良田百頃不在一畝但有遠志不見當歸其皆親殉利如此范子計然曰當歸出隴西無枯者善秦州記曰隴西襄武縣有牛山是出當歸建康記曰建康出當歸不堪用廣州記曰鄣平縣出當歸博物志曰神農經曰下藥治病謂大黃除實當歸止痛崔豹古今注曰牛亨問將離別相贈以芍藥何也荅曰芍藥一名何離故將別贈以芍藥猶相招則贈以䕷蕪䕷蕪一名當歸也本草經曰當歸一名干歸味甘溫生川谷主治逆止氣溫瘧寒熱生隴西吳氏本草曰當歸神農黃帝桐君扁鵲甘無毒歧伯雷公辛無毒季氏小溫或生羗胡地遠志爾雅云葽鳥了切繞蕀莬今遠志也似麻黃赤華葉說而黃其上謂之小草蕀菟音棘冤抱朴子內篇曰陵陽仲服遠志二十年有子三十七人坐在立亡世說曰謝太傅始有東山之志後命屬不獲已始就桓公司馬于時人有致桓公藥草者中有遠志公取以問謝此藥又名小草何以物有二稱謝未即荅爾時郝隆在坐謝因曰郝參軍多知識試復通看郝應聲曰荅此甚易解處則為遠志出則為小草於是謝公殊有愧色桓目謝而笑曰郝參軍此通乃不惡亦甚有會本草經曰遠志一名棘宛一名要繞久服輕身不忘葉名小草生太山及宛句細辛山海經曰浮戲之山東有虵谷上多少辛管子曰五沃之土群藥生少辛范子計然曰細辛出華陰色白者善名山志曰松陽諸山草多細辛永嘉記曰細辛出松陽本草經曰細辛一名少辛味溫生山谷治欬逆明目通利九竅久服輕身生華陰吳氏本草曰細辛一名小辛一名細辛神農黃帝雷公相君辛小溫歧伯無毒季氏小寒如葵葉赤色一根一葉相連二月八月採根續斷范子計然曰續斷出三輔廣州記曰鄣平縣出續斷本草經曰續斷一名龍豆味苦微溫生山谷治傷寒補不足金瘡癱傷折跌續筋骨婦人乳難崩中漏血久服益力生常山吳氏本草曰龍芻一名龍多一名龍鬢一名續斷一名龍木一名草毒一名龍華一名懸莬神農季氏小寒雷公黃帝苦無毒扁鵲辛無毒生梁州七月七日採范注萬曰續斷即是馬䔓與水䔓菜相似但大於水䔓耳葉似旁翁菜葉但小厚兩邊有剌剌人其華紫色肉蓯蓉本草經曰肉蓯蓉味甘微溫生山谷治五勞七傷補中除莖中寒熱養五藏強陰益精氣多子婦人癥瘕久服輕身生河西吳氏本草曰肉蓯蓉一名肉蓯蓉神農黃帝鹹雷公酸李氏小溫生河東山陰地長三四寸藂生或代郡鴈門二月八月採陰乾用之藷藇山海經曰升山草多藷藇上藷署二音下余預二音湘中記曰永和初有採藥衡山者道迷糧盡過巖下見一老公與四五年少對坐執書告以飢與之食物如署豫指教所去五六月至家而不腹飢范子計然曰儲餘本出三輔白色者善本草經曰署豫一名山芋味甘溫生山谷治傷中虛羸補中益氣力長肌肉除邪氣寒熱久服輕身耳目聰明不飢延年山嵩高吳氏本草曰署豫一名諸署秦楚名王延齊越名山羊鄭趙名山羊一名玉延一名脩脆一名兒草神農甘小溫桐君雷公甘無毒或生臨朐踵山始生赤莖細蔓五月華白七月實青黃八月熟落根中白皮黃類芋二月三月八月採根惡甘遂曹毗杜蘭香傳曰蘭香降張碩與三署預實曰食此可以辟霧露碩食二懷一欲以歸香曰可自食不得持去異苑曰署預一名山羊根既入藥又復可食若掘取默默則獲唱名者不可得地黃爾雅曰芐音戶地黃郭璞注曰一名地髓江東呼芐也抱朴子曰楚文子服地黃八年視有光手上車弩本草經曰地黃一名地髓治傷中長肌肉生咸陽
