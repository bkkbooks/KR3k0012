body:
  text: 地部四嵩山釋名曰嵩字或為崧山大而高曰嵩詩曰嵩高維嶽峻極于天維嶽降神生甫及申國語曰夏之興也祝融降于崇山韋昭注曰崇嵩字古通用夏都陽城嵩山在焉白虎通曰中央之嶽獨加嵩高字者何中央居四方之中高故曰嵩高山續漢書曰武帝禮祭中嶽聞有呼萬歲聲三於是以三百戶封奉祠命曰崇高為嵩高也孫嚴宋書曰高祖表曰沙門釋法義於嵩高廟所石壇下得玉壁三十二枚黃金一鉼符彩潤洁河南太守毛脩之以靈岳降瑞送諸神府列仙傳曰王喬周靈王太子晉也好吹笙作鳳鳴遊伊洛之間浮丘公接以上嵩高山三十餘年后於山上見桓良曰告我家七月七日待我緱氏山頭果乘白鶴駐山巔望之不得到舉手謝時人數日而去漢武內傳曰漢武帝夜夢與少君俱上嵩高山半道有繡衣使者乘龍持節從雲中下言太一請少君覺告近臣曰如朕夢少君將捨朕去矣劉義慶世說曰嵩高山北有大穴晉時有人誤墮穴中見二人圍碁下有一杯白飲與墮者飲氣力十倍碁者曰汝欲停此否墮者曰不願停碁者曰從此西行有大井其中蛟龍但投身入井自當出若餓取井中物食之墮者如言可半年乃出蜀中因入洛問張華華曰此仙館也所飲者玉漿耳所食者龍肉石髓崔鴻十六國春秋前秦錄曰王猛至深山見一老父據胡床須鬢皓然猛進拜老父曰王公何因拜也遣人送猛出山顧視乃嵩高山也山海經曰太室之山即中岳嵩山今在陽城縣西也其上有木焉葉狀如梨赤理服者不垢有草焉其狀如禾服者不昧上多美石次玉者也嵩高山記曰漢有道士從外國將貝多子來於嵩岳西腳下種之并立浮圖今有四樹與眾木有異一年三花花白色其香甚佳嵩山最是栖神靈藪也東出一里有自然五穀神芝仙藥東腳下有眾果樹云是漢果園後有小山名牛山多香樹昔有婦女妊身三十月生子五歲便入嵩高學道通神明為母立祠號開母祠又有三臺山漢武東巡過此山見三學仙女遂以為名又一石室有自然經書飲食室前石柱似承露盤有石暗滴下食之一合與天地相畢中頂南下二百步亦有岳廟畫為神像有玉人高五寸玉色光潤相傳曰明公山人或失之經旬乃見山海經曰少室之山有木焉名曰帝休葉狀如楊枝五衢黃華黑實服者不怒其上多玉其下多鐵其中多䱱魚得其食者無蟲疾可以禦惡服之不怒郭氏注云陽城西谷名季室亦曰少室山顛有白玉膏服之仙山有周昭王陵又戴延之西征記曰少室山中多神藥漢武帝築登仙臺在其峰郡國志云少室山一名黍室山負黍城在南故因山以名城也又云少室有金像人往視則有白露起迷人雜道書曰少室之陽高于平地八百六十丈方十里可避兵水之災華山禮記曰地之廣厚戴華岳而不重范曄後漢書曰張楷字公超隱居弘農山學者隨之所居成市能為五里霧後華山南遂有公超霧市唐書曰李適之代牛仙客為右相累封清和縣公與李林甫爭權不叶適之性踈為其陰中林甫常謂適之曰華山有金鑛採之可以富國上未知適之心善其言他日從容奏之玄宗大悅顧問林甫對曰臣知之久矣然華山陛下本命王氣所在不可穿鑿臣不敢上言帝以為愛己薄適之言踈之白虎通曰西方為華山者何少陰用事萬物生華故曰華山武帝傳曰魯女長樂人初餌麻及水絕穀八十餘年日更少壯色如桃花一旦與故人別云入華山去後五十年先相識者逢女華山廟前乘白鹿從玉女三十人并謝其鄉里親戚故人崔鴻十六國春秋前燕錄曰石虎使人探策于華山得玉板山海經曰華山塚也塚者神鬼之所舍也其祀之以太華又曰泰華之山削成而四方其高千仞其廣千里郭璞注曰山上明星玉女主持玉漿得服之即神仙之道嶮無不通也有虵曰肥遺六足四翼見則天下旱列仙傳曰馬明生從安期先生受金液神丹方乃入華陰山中合金神丹升天也又曰脩羊公者蜀人也止華陰山石室中中有懸石榻臥其上石盡穿陷又曰毛女者在華陰山中獦師世世見之體生毛自言秦始皇宮人也又曰呼子先者漢中闕下卜師也壽百餘歲臨去呼酒家嫗曰急裝當與嫗共應中陵王今夜有仙人持二茅狗來先持一與酒家嫗得俱騎乃龍上華陰山也周禮曰豫州其鎮山曰華山華山記云山頂有池生千葉蓮花服之羽化因曰華山又曰山有三峰謂蓮花毛女松檜也辛氏三秦記曰華山在長安東三百里不知幾千仞如半天之雲晏子春秋曰君子若華山松柏既多望之自不知厭薛綜注西京賦曰華山對河東首陽山黃河流於二山之間古語云本一山當河河水過之而曲行河神巨靈以手擘開其上以足蹈離其下中分為兩以通河流今覩手跡於華嶽上足跡在首陽山下俱存焉韓子曰秦昭王使工人施鉤梯上華山以松柏之心為博箭長八尺棊長八寸勒之曰昭王嘗與天神博於此周易是謀類曰西岳亡玉羊鄭玄注云玉羊華山之精山海經曰小華山即少華也其木多荊𣏌鳥多赤鷩可以禦火泰山詩曰泰山巖巖魯邦是瞻傳曰鄭伯請釋泰山之祀而祀周公以泰山之祊易許田公羊傳曰山川有能潤于百里者天子秩而祭之觸石而出膚寸而合不崇朝而遍雨天下者唯泰山乎語曰季氏旅於泰山子謂冉有曰汝不能救歟旅祭名也禮諸侯祭山川在其封內者今陪臣祭泰山非禮也冉有孔子時仕季氏救猶止也對曰不能子曰嗚呼曾謂泰山不如林放乎孔子意云泰山之神知禮過於林放之賢遠也白虎通曰王者功成封禪必於泰山者何萬物之始交代之處也史記曰漢武帝封泰山白雲起封中漢書曰武帝封泰山禪石閭應劭注曰石閭在泰山下南方土人言仙人閭應劭漢官儀曰泰山東南名日觀者雞一鳴時見日始欲出長三丈所觀者望見長安其高如視浮雲其峻如無道徑望人如盂升或以為小白石或以為冰雪視巖石松樹鬱鬱蒼蒼如雲中晉書曰張忠隱于泰山教授弟子教以形不以言符堅徵之及至堅賜以衣冠辭曰年杇髮落不堪衣冠請以野服入覲從之後乞還堅以安車送之行達華山歎曰我東岳道士歿于西岳命也及關而死道書福地記曰泰山多芝草五石下有洞天周廻三千里鬼神之府袁山松後漢書曰光武封泰山雲氣成宮闕風俗通曰古封泰山禪梁甫舊說岱宗上有金篋玉策能知人年壽脩短漢武帝探策得十八因倒讀曰八十其後果壽長八十博物志曰泰山一曰天孫言為天帝孫也主召人魂東方萬物始成故知人生命之長短五經通義云一曰岱宗言王者受命易姓報功告成必於岱宗也東方萬物始交代之處宗長也言於群嶽之長白虎通曰王者受命必封禪封者廣厚也禪除也為壇字本為墠以其祭神故從示皆刻石紀號著己之功績以自效也天以高為尊地以厚為德故增泰山之高以報天禪梁甫之阯以報地也史記曰無懷氏封泰山禪云云伏犧封泰山禪云云神農封氏封泰山禪云云炎帝封泰山禪云云黃帝封泰山禪云云顓頊封泰山禪云云帝嚳封泰山禪云云堯封泰山禪云云禹封泰山禪會稽周成王禪梁甫肅然及蒿里石閭後又凡五脩封泰山後漢書曰光武封泰山禪梁甫凡云云亭亭肅然蒿里社首梁甫皆泰山下小山也石閭在西巖下漢官儀及泰山記曰泰山盤道屈曲而上凡五十餘盤經小天門大天門仰視天門如從穴中視天䆫矣自下至古封禪處凡四十里山頂西巖為仙人石閭東巖為介丘東南巖名日觀日觀者雞一鳴時見日始欲出長三丈許又東南名秦觀秦觀者望見長安吳觀者望見會稽周觀者望見齊黃河去泰山二百餘里於祠所瞻黃河如帶若在山阯山南有廟悉種柏千株大者十五六圍相傳云漢武所種小天門有秦時五大夫松見在茅君內傳云仙家凡有三十六洞天岱宗之洞周廻三千里名曰三宮空洞之天列仙傳曰稷丘君者泰山道士也武帝時以道術受賜後上東巡泰山稷丘君乃冠章甫衣黃衣擁琴來拜武帝曰陛下勿上也上必傷足必欲上及上數里左右足指果折乃止列仙真人傳曰馬明靈者齊國臨淄人也本姓和字君賢為縣吏捕賊為所傷當時殆死良久忽於道間見一女以時後管中一丸藥大如小豆與明服之於是即愈血絕瘡合隨神女還岱宗石室中上下懸絕重巖深隱去地千餘丈其中金床玉机乃人跡所不能至神仙傳曰劉馮者沛人學道於穆王子服石桂英及中岳石流黃年三百餘歲而有少容後入泰山中又曰秦山下老父者失其姓名漢孝武皇帝巡狩見老父鋤於道間頭上白光高數丈將問之父對曰臣年八十五時衰老垂死頭白齒落有道者教臣絕穀但服飲水并作神枕枕中有三十二物其二十四物以當二十四氣其八物當八風臣行之轉少日行三百里今年九十矣帝受其方賜縑帛去父入岱宗山十年五年時還鄉里三百餘年乃不復還也上黨記曰太行坂東頭即泰山也避世者區種而食或射熊於巖間泰山記曰泰山廟在山南悉種柏樹千株大者十五十六圍長老傳云漢武所種廟及東西房三十餘間并高樓三處春秋饗祀泰山君常在此壇周易是謀類曰泰山失金雞鄭玄注曰金雞泰山之精丘淵之齊記曰泰山東岳也瀛愽二縣共界漢武封禪割此縣以供祀泰山故曰奉高三十里有延陵兒塚伍輯之從征記曰泰山於所經諸山非最高而岑崿軒舉凌跨眾阜雲霞草木藹然靈異苑囿神奇故無螫虫猛獸孟子曰孔子登東山而小魯登泰山而小天下尸子曰泰山之中有神房阿閣帝王錄淮南子曰清之為明杯水而見眸子濁之為闇河水不見泰山新序曰挾泰山以超北海恒山史記曰趙簡子謂諸子曰吾藏寶符於常山往得者立焉諸子竟往無所得無恤曰常山臨岱可取也簡子曰是知符矣遂立之白虎通曰北方為常山者何陰終陽始其道常久故曰常後魏書曰道武立廟於上置侍祀九十九人歲時禱水旱至文成帝東巡親禮其神焉春秋元命苞曰昂畢散為冀州分為趙國立為常山崔鴻前燕錄曰慕容儁壽光三年常山寺大樹根下得壁七十二圭七十光色精奇有異常玉孫子兵法曰常山之虵名曰率然一身而兩頭擊其一頭則一頭至擊其中則兩頭俱至神農本草曰常山有草名神農置之門上每夜叱人常山圖經曰北嶽恒山在縣西北一百四十里尚書禹貢太行恒山至于碣石有恒水出焉其下有祠山記曰高三千九百丈上方三十里周廻三千里上有泰玄之泉神草十九種道者服之成仙又太史公云北岳者有五名一名蘭臺府二名列女宮三名華陽臺四名紫微宮五名太一宮或云太茂山山北四百餘里號飛狐之口有率然虵孫吳諭兵勢管子曰其山北臨代南俯趙東接河海之間早生而晚殺五穀之所蕃熟四種五穫焉陽固北都賦曰茂丘茂山也蓋恒岳之別名泒水從西來甚大至茂山之西沉伏于地過山而復出其大如初世言避恒岳之靈衡山周官曰荊州其山鎮曰衡山徐靈期南岳記曰衡山者五嶽之南嶽也其來尚矣至于軒轅乃以灊音潛霍之山為副焉故爾雅云霍山為南嶽蓋因其副焉或云衡山一名霍山至漢武南巡又以衡山遼遠道隔江漢於是乃徙南嶽岳之祭于廬江灊山亦承軒轅副義也干寶搜神記曰漢武徙南嶽之祭著廬江潛縣之霍山郭璞爾雅注云霍山在廬江郡潛縣別名天柱山漢武以衡山遼遠讖緯以霍山為岳故祭之也晉書曰劉驎之嘗採藥至衡山深入忘返見有一澗水南有二石囷一開一閉水深廣不得過欲還失道遇伐弓人問遙僅得還家或說囷中皆仙靈方藥驎之欲更尋終不復知處羅含湘中記曰衡山九疑皆有舜廟太守至常遣戶曹致祀則如絃歌之聲也吳越春秋曰禹傷父功不成登衡山血白馬以祭之忽然而臥夢赤繡文衣男子稱玄夷蒼水使者謂禹曰欲得我山書者齋於黃帝之嶽禹乃退齋三日登宛委發石得金簡玉字之書得治水之要也盛弘之荊州記曰衡山有三峰其一名紫蓋每見有雙白鶴徊翔其上一峰名石囷下有石室尋山徑聞室中有諷誦聲一曰芙蓉上有泉水飛流如舒一幅白練山海經曰衡山一名岣嶁山其上多青艧鳥多鸜鵒岣音炬嶁音縷湘中記曰衡山九疑皆有舜廟遙望衡山如陣雲沿湘千里九向九背乃不復見有玉牒焉禹按其文以治水也劉敬叔異宛曰湘東姚祖太元中為郡吏經衡山望巖下數少年並執筆作書祖行旅休息乃過之未至百步少年相與飛颺遺一紙書其字皆鳥跡郡國志衡山南嶽也南嶽記云當翼軫度機衡謂之衡山山有錦石斐然成文霍山白虎通曰南方為霍山者何太陽用事護養萬物故為霍山爾雅曰大山宮小山霍郭璞注曰宮謂圍繞也禮記曰君為廬宮是也漢書武帝以衡山敻遠讖記皆以霍山為南岳故祭其神於此宋書曰霍山數年來常有鍾聲潛發重壤山崩間六鍾自出制度合古式聲中律呂山海經曰霍山有獸焉其狀如狸白尾有鬣名曰朏朏可以忘憂音沛謂畜之也黃庭內景經曰霍山下有洞臺方二百里司命君之府也白虎通曰小山繞大山為霍
