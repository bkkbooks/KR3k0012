body:
  text: 獸部十三驢說文曰驢似馬長耳也何承天纂文曰驢一曰漠驪其子曰𩦺史記曰匈奴奇畜即驢騾也漢書西域傳曰烏桓國有驢無牛後漢書曰薊子訓漢末入市投主人家停其驢忽死時夏月蛆從驢口中出主人見之白訓訓曰無苦遂往驢邊舉杖驢忽走起又曰永平中更用驢輦歲省億萬計全活徒士數千人又曰戴良字叔鸞其母喜驢鳴常學之以娛樂晉書曰王濟卒將葬時賢無不畢至孫楚雅敬濟而後來哭之甚悲客莫不垂涕哭畢向靈床曰卿嘗好我作驢鳴我為卿作之體似聲真賓客皆笑楚顧曰諸君不死而令王濟死乎世說曰王仲宣好驢鳴既葬魏文帝臨其喪顧語同遊曰王好驢鳴可各作一聲以送之赴客皆作驢鳴吳志曰諸葛恪父瑾長面似驢孫權大會群臣使人牽一驢入長檢其面題曰諸葛子瑜也恪對跪乞請筆益兩字續其下曰之驢舉坐欣笑以驢賜恪晉陽春秋曰晉文帝親阮籍恒與譚戲任其所欲不迫以職事籍從容嘗言曰平生曾遊東平樂其士風願得為東平太守文帝大悅即從其意籍便騎驢徑到郡至皆壞府舍諸壁鄣使內外相望然籍教令清整常留十餘日便乘驢去又曰胡威字伯虎父質為荊州威自京都省之家貧無車馬僮僕威自驅驢單行拜見告歸每至客舍自放驢取樵食畢復隨侶而進晉書曰石苞既定壽春以威惠服物淮南監軍王環輕苞素微又聞童謠曰官中大馬幾作驢大石壓之不得舒因是密表苞與吳人交通又曰王導諸葛恢曰人言王葛不言葛王恢曰人言驢馬不言馬驢豈驢勝馬也沈約宋書曰後廢帝昱於耀靈殿上養驢數十又曰吏部尚書庾仲文荀萬秋嘗詣仲文逢一客姓夏侯主人問有好牛不言無問有好馬不又言無正有佳驢耳仲文便荅云甚是所欲客出門遂與相問索之齊書曰劉祥博才慠物常謂一驢曰汝弩力如汝人才俱為令僕矣又曰謝超宗為人仗才使酒齊高帝問以北方事超宗對失儀出為南郡王中軍司馬人或問曰聞有朝命定是何府荅曰不知是司馬為復是司驢既是驢府正應是司驢為有司所奏以怨望免後魏書曰元坦慠很凶粗安豊王延明每切責之曰昔宋有東海王禕志性凡劣人號曰驢王我熟觀汝所作亦恐不免驢當時聞者號為驢王三國典略曰東魏靜帝遷都鄴尚書郎已下盡令乘驢又曰齊蕭愨為太子洗馬愨字仁祖常患腰痛眩不堪馳馬齊主令乘驢以從見者笑之北史曰公孫軌拜尚書賜爵郡公出為武牢鎮將初太武將北征發驢以運糧使軌部調雍州軌令驢主皆加絹一百疋乃與受之百姓語曰驢無弱負絹自壯眾共嗤之又曰後魏車駕往征蠕蠕司馬楚之與濟陰公盧中山等督運以繼大軍時鎮北將軍封沓亡入蠕蠕說令擊之以絕運蠕蠕乃潛遣覘楚之軍截驢耳而去有告失驢耳者楚之曰必覘賊截之為驗耳賊將至矣乃伐柳為城水灌令凍城立而賊至不可攻逼乃走散太武聞而嘉之唐書曰郭英乂鎮劍南取女人令乘驢擊毬以寶鈿為驢鈿賞賜巨萬以為笑樂風俗通曰靈帝於宮中西園駕四白驢躬自操轡驅馳周旋以為大樂於是公卿貴戚轉相倣至乘軿以為騎從價與馬齊又曰凡人相罵曰死驢醜惡之稱也董卓陵虐王室執政皆如死驢漢志曰靈帝駕四驢親自操轡驢者服重征遠上下山谷野人之所用耳何有帝王君子而驂駕之乎天意若曰國且大亂賢愚倒植凡執政者皆如驢焉金樓子云漢靈帝養驢數百頭常自騎之驅馳遍京師有時駕四驢入市符子曰有驢仙者享五百歲負乘而不輟歷無定主大驛於天下世說曰孝武帝未嘗見驢謝太傅問陛下遙想其形當何所似孝武掩口而笑荅曰頭當似豬續搜神記曰石虎中有一胡道人知呪術乘驢作賈客於外國深山中行下有絕澗窅然無底忽有惡鬼偷牽此道人驢下入澗道人尋跡呪誓呼諸鬼王須臾即驢物如故國朝傳記曰武后初稱周恐下心不安乃令人自舉供奉官正員外多置裏行拾遺補闕御史至有車載斗量之詠有御史臺令史將入室值裏行御史數人藂立門內令史不下驢衝過其間諸御史大怒將杖之令史云今日之過實在此驢乞先數之然後受罰御史許之謂驢曰汝伎藝可知精神極鈍何物驢畜敢於御史裏行於是羞赦而止楚辭曰驥垂兩耳中阪蹉𧿶蹇驢服駕無用日多又曰駕蹇驢而無策又何路之能極臧彥吊驢文曰爰有奇人西州之馳驅者體質強直稟性沉難聰敏寬詳高音遠暢真驢氏之名駒也宋袁淑俳諧文曰驢山公九錫曰若乃三軍陸邁糧運艱難謀臣停筭武夫吟歎爾乃長鳴上黨忼慨應官崎嶇千里荷囊致飧用捷大勳萬世不刊斯實爾之功也音隨時興晨夜不默仰契玄象俯叶漏刻應更長鳴毫分不卻雖挈壺著稱未足比德斯復爾之智也若乃六合昏晦三辰幽冥猶憶天時用不應聲斯又爾之鳴也青脊綘身長頰廣額脩尾後垂巨耳雙礫斯又爾之形也嘉麥既熟寔須精面負磨廻衡迅若轉電惠我眾庶神祗獲薦斯又爾之能也爾有濟師旅之勳而加之以眾能是用遣中大夫廬丘加廬爾使銜勒大鴻臚班腳大將軍宮亭侯以楊州之廬江江州之廬陵吳國之桐廬冷浦之朱廬封爾為中驢公騾廣志云騾北方或曰罔說文曰騾驢父馬母也崔豹古今注曰驢為牡馬為牝即生騾馬為牡驢為牝即生騰𩥔史記曰大將軍衛青圍匈奴匈奴薄暮乘六騾壯騎可數百冒圍去追之不及漢書曰高昌性難伏乃作歌曰驢非驢馬非馬言高昌似騾也三國典略曰齊陽休之嘗乘騾遊於公卿門略無慚色又曰侯莫陳悅既敗與其子弟及麾下數十騎遁走至牽屯山不知所趣乃棄馬山谷乘騾而去唐書曰吳元濟叛其將有董重質者守洄曲其部下乘騾即戰號騾子部最為勁悍官軍恒警備之呂氏春秋曰趙簡子有兩白騾而甚愛之陽城胥渠豦黃門之官夜款門而謁曰主君之臣胥渠有疾醫教之曰得白騾肝病則止不得則死謁者入通董安于御於側慍曰譆胥渠也欺君請即刑焉簡子曰夫殺人以活畜不亦不仁乎殺畜以活人不亦仁乎於是令庖人殺白騾取其肝以與陽城胥渠豦無幾何趙興兵而攻翟黃門之官左七百人右七百人皆先登而獲甲首人主胡可以不好士抱朴子曰世不信騾乃驢馬所生云各自有種況乎仙者難知之事哉魯女生別傳曰李少君死後百餘日後人有見少君在河東蒲坂乘青騾帝聞之發棺無所有洞冥記曰脩彌國多神馬騾驢驢高十丈毛色皎然能行朮上有兩翼或飛於海上常與牝馬合則生神騾又曰元封四年脩彌國獻駮騾高一丈毛色赤班皆山毛旋成日月之象常以金寶物器盛芻以飼之置於黃門廄東方朔曰此六畜之下者無為深愛昔夏侯淫于原獸以亡其國況戎翟獻其鄙獸費財毀德非所以示天下也楚莊好馬叔敖知其失政願陛下省物全國家之機事騾鄙獸宜置之於負乘不用則棄之於野上乃放之後野人見有赤虵自天屬地有雲氣來繞地及雲除虵復變為赤龍騎之入雲有人來告上曰滑稽兒使我失龍矣朔曰龍何難值恐陛下費金寶終化為驢騾耳帝納其言而深忌之吳曆曰朱據討沓中獲驢騾二千餘頭晉書曰乘傳使者賣官出使遭周親喪以上皆自表聞聽得白服乘騾車晉諸公讚曰劉禪降乘騾車詣鄧艾神仙傳曰葪子訓齊人也到京師諸貴人欲見之子訓曰我非有重曈八采欲見我我亦無所道遂去諸貴人皆逐之問人云適去東陌上乘騾者是乃各走馬逐之望見子訓騾徐行而名馬逐之不及乃各罷歸橐駞淮南子曰橐駞之本出泉渠廣志曰天笁以北多馲駞山海經曰號山陽之光山獸多橐駞善行流沙中日三百里負千斤史記匈奴傳曰其奇畜則橐駞又蘇秦傳曰蘇秦說楚威王曰大王誠能用臣之愚計則燕代橐駞良馬必實外廄漢書西域傳曰鄯善國多馲駞東觀漢記曰河西太守竇融遣使獻橐駞南單于上書獻橐駞單于崴祭三龍祠走馬鬭斗橐駞以為樂事華嶠後漢書曰南單于遣使詣闕奉蕃稱臣入居於雲中遣使獻橐駞南史四夷傳滑國有兩腳橐駞野驢有角後魏書曰高祖不飲洛水常以千里足名駞更牙向恒州取水以供贍焉後周書四夷傳曰旦未西北有流沙數百里夏日多熱風為行旅之患其風欲至唯老駞知之即預鳴而藂立埋其口於沙中人以為候即以氈擁其鼻口其風迅速須臾即過不爾則至危斃鹽鐵論曰齊陶之縑南漢之布中國以一端縵得匈奴累金之物驢騾駱駞可使銜尾入塞博物志曰燉煌西渡流沙千餘里中無水時時伏流豦人不能智乘駱駞駞知水脈遇其處輒停不肯行以足蹋地人於蹋處掘之輒得水外國曰大秦國人長一丈五尺猨臂長脅好騎駱駞洛中記曰有銅駞二枚在宮之南四會道頭高九尺號銅駞路陸翽鄴中記曰二銅駞如馬形長一丈高一丈足如牛尾長二尺脊如馬鞍在中陽門外夾道相向異苑曰西域茍夷國山下有石駱駞腹下出水以金鐵及手承取即便對過瓠蘆盛之者即得飲之令身體香淨而昇仙其國神秘不可數遇楚辭曰鼃黽遊乎華池腰䮍奔亡勝駕橐駞腰䮍駿馬郭璞山海經圖橐駞讚曰駞惟奇畜肉鞍是被迅騖流沙顯功絕地潛識泉源微乎其智
