body:
  text: 疾病部三聾說文曰聾無聞也從耳從龍秦晉謂之䏁音宰又益梁之州謂聾曰䏁秦晉聽而不聞聞而不達謂之䏁又曰生而聾謂之聳釋名曰聾籠也如在蒙籠之內不察也左傳僖中曰耳不聽五聲之和為聾漢書曰黃霸為潁川太守長吏許丞老病聾督郵白欲逐之霸之許承廉吏雖老尚能拜起送迎正頗重聽何傷且善助之無失賢者東觀漢記曰尹敏遷長陵令永平五年詔書捕男子周慮藘素有名字與敏善過候敏敏坐繫免官出乃歎曰瘖聾之徒真世之有道者也何謂察察而遇斯禍也老子曰五音令人耳聾莊子曰耳之與形吾不知其異也而聾者不能自聞淮南子曰土地各以類生水氣多瘖風氣多聾說苑曰仲尼曰非其地而樹之不生非其人而語之不聽得其人如聚沙而雨之非其人若聚聾而鼓之抱朴子曰豹狐之裘不為負薪施九成六變不為聾夫設談藪曰後魏中書侍郎裴敬憲字伯茂敬憲新搆山亭與賓客集謂邢子才曰山池始就願為一名子才曰海中有蓬萊山仙人之所居宜名蓬萊裴聾也敬憲患耳故以戲之憲初不晤於後覺忻然謂子才曰長忌及戶高則無憲公但大語聾亦何嫌盲廣雅曰矇瞍瞽盲也方言曰半盲為睺呼鉤反說文曰盲目無眸也眇一目小也眺目不正也瞎目病也睞童子不正也眄目偏合也青目病主醫音縊也瞍無目也周易履卦曰六三眇能視跛能履象曰眇能視不足以與明也跛能履不足以與行也毛詩臣工有瞽曰有瞽有瞽在周之庭禮記檀弓上曰子夏喪其子而喪其明明目精也曾子弔之曰吾聞之朋友喪明則哭之曾子哭子夏亦哭曰天乎子之無罪也曾子怒曰商女何無罪也吾與女事夫子於洙泗之間退而老於西河之上使西河之民疑女於夫子爾罪一也喪爾親使民未有聞焉爾罪二也喪爾子而喪爾明爾罪三也而曰女何無罪與子夏投其杖而拜曰吾過矣吾過矣又仲尼燕居曰治國而無禮譬猶瞽之無相與倀倀乎其何之韓詩外傳曰海之上有勇士曰菑丘訢以勇遊於天下過神淵飲馬其僕曰飲馬此者必死訢言飲之其僕以其言飲之馬果死菑丘拔劍而入三日三夜殺二蛟一龍而去雷神隨而擊之十日十夜眇其左目漢書曰杜欽字子夏少好經書家富而目偏盲故不好為史茂陵杜業與同姓字俱以才能稱京師衣冠謂欽為盲杜子夏以相別欽惡之為小冠高廣二寸由是京師謂欽為小冠杜子夏業為大冠杜子夏東觀漢記曰杜篤仕郡文學掾以目疾二十餘年不窺京師魏略曰夏侯惇從征呂布為流矢所中傷左目時夏侯淵與惇俱為軍師軍中號惇為盲夏侯惇惡之每照鏡恚怒輒撲鏡著地魏略曰太祖聞丁儀為令士雖未見欲以愛女妻之以問五官將曰女人觀貌而禮目不便誠恐愛女未必悅也以為不如與伏波子楙太祖從之尋辟儀為掾到與論議嘉其才明曰丁掾好士也即使其兩目盲當與女何況但眇乎沈約宋書曰景王嬰孩時有目疾宣王令華陀治之出眼瞳割去疾而內之以藥梁書曰鄱陽王恢有孝性初鎮蜀所生費太妃猶停都後於都不豫恢未之知一夜忽夢還侍疾及覺憂惶廢寢食俄而信至太妃已瘳後有目疾久廢視瞻有道人慧龍得療眼術恢請之及至空中忽見聖僧及慧龍下針豁然開目咸謂精神所致也又曰江紑甫鳩反字含潔幼有孝性年十三父蒨患眼紑侍疾將朞月衣不解帶夜夢一僧云患眼者飲慧眼水必差及覺說之莫能解者紑第三叔祿與草堂寺智者法師善往訪之智者曰無量壽經云慧眼見真蒨乃因智者荅捨同夏縣界牛屯里舍為寺乞賜嘉名勑荅云純臣孝子往往感應晉時顏含遂見冥中送藥近見智者以卿第二息云飲慧眼水慧眼則五眼之一號可以慧眼為名及就創造泄故井水清冽異於恒泉依夢中取水洗眼及煮藥稍覺有瘳因此遂差時人謂之孝感又曰元帝字世誠武帝第七子也初武帝夢眇目僧執香爐稱託生王宮既而采女石氏侍始褰戶慢有風廻裙梁武帝意感幸之乃生元帝賜采女姓曰阮進為脩容脩容常失珠謂是左右所盜乃炙魚目不知其珠孝元吞之信宿之間珠遂便出一目致眇魚之報焉南史曰梁湘東王於江東泛舟顧而言曰今可稱有樂功曹劉源曰帝子降兮北渚王作色曰當道目眇眇兮愁予耶坐者股慄酒遂不酣又邵陵王賦詩戲之曰湘東有一病非啞復非聾相思下隻淚望直有全功後魏書曰祖班以罪徙於光州別駕張奉禮希大臣意上言班雖為流囚常與刺史對坐勑報曰牢掌奉禮曰牢者地牢也乃為深坑置諸內夜中以蕪青子燭熏眼因此失明異苑曰丹陽多寶寺元嘉中畫佛堂作金剛寺主奴婢惡戲以刀刮其目眼輒見一人甚壯五綵衣持小刀挑目精數夜眼爛於今永盲後越書曰戎陽一目瞽劉曜寇洛水復降曜曜敗生擒送前石使人罵曰瞎狗何降賊復持瞎來陽曰臣不降即死死則大王那得復見瞎狗前石笑曰瞎狗不足污刀活之文子曰師曠瞽而為太師列子曰宋人有好行仁義者三世不懈家無故黑牛生白犢以問孔子孔子曰此吉祥也以薦上帝居一年其父無故而盲牛又復生白犢子又問孔子孔子曰吉祥也復教以祭居一年其子又盲其後楚攻宋圍城民易子而食折骸而炊丁壯皆乘城戰死者太半父子有疾皆免及圍解而盲疾俱復莊子曰連叔謂肩吾子曰夫瞽者不知文章之觀又曰目之與形吾不知其異也盲者不能自見又曰許由曰夫眇者無以與乎眉目顏色之好尹文子曰瞽者無目而耳不可以𥉻察視也精於聽也又曰聾者不歌無以自樂盲者不觀無以接物韓子曰寐則盲者不知覺而使之視則窮矣淮南子曰今夫盲者行於道遇君子則易道遇小人則陷於溝壑桓譚新論曰余為典樂大夫得樂家記言文帝時得魏文侯時樂人竇公年百八十歲兩目皆盲帝問其何服食至此對曰臣年十三失明父母教為樂鼓琴不導引不知壽得若何余以為竇公少盲專一內視故抱朴子曰魏武收左慈慈走入市吏傳言慈一目眇葛巾單衣於是一市皆然也又曰董君異以玉醴與盲人服之而愈世說曰顧愷畫殷荊州形殷不許顧曰明府正當嫌眼耳明點童子飛白拂上若輕雲之蔽月又曰桓南郡與殷荊州語次因作危言桓公曰矛頭浙米劍頭炊殷云百歲老公攀枯枝井上轆轤臥小兒殷有一參軍云盲人騎瞎馬臨深池殷曰咄咄逼人仲堪眇故也法顯記曰祗洹精舍西北四里有榛名曰得眼本有五百盲人依精舍住佛為說法盡還得眼盲人歡喜刺杖著地頭面作禮杖遂生長大世重之無敢伐者遂以得眼為名楚辭九章曰離婁微睇瞽以為無明蔡邕瞽師賦曰夫何矇昧坐瞽兮心窮忽以鬱伊目冥而無睹兮羗永煩以悲愁瘖啞釋名曰瘖唵也唵然無聲也漢書曰韓延壽待下吏恩施甚厚而約誓明或欺負之者延壽自刻責吏聞者自傷悔其縣尉至自刺死及門下掾自剄人救不死因瘖不能言延壽聞之對掾吏涕泣遣吏醫治又曰呂后斷戚夫人手足去眼董耳飲瘖藥吳書曰程普殺叛者數百人皆使投火即日病瘖百餘日卒文子曰皋陶瘖而為士師淮南子曰瘖者可使守圉不可使通語又曰夫人大怒破陰大喜墜陽滿氣發瘖驚怖為狂又曰水氣多瘖黃帝素問曰瘖者何病岐伯曰胞之絡脈何以言之胞絡繫於腎少陰脈實腎繫舌本故不能言續搜神記曰沛國一士人姓周生三兒向應可語便啞皆七八歲有一人經門過來乞問主人此是何聲云是僕兒頻生三子皆啞不能語客曰君冥罪還內省我於外待君主人異其言知非常人便入內思良久而出謂客曰昔為小兒時當床上有鷰巢中有三子其母從外食哺子子輒出頭作聲受之積日如此時屋下攀得及巢試以指內巢中鷰子亦出口承之乃取三蒺梨各與其子吞之既死其母尋還不復見其子出戶徘徊悲鳴而去有此事今甚悔之客曰是矣便問其三兒言語周正異苑曰高惠清隆安中為太傅主簿忽晝日有群鼠更相衘尾自屋梁相連至地清尋得瘖疾數日而亡靈驗記曰王導河內人也兄弟三人並得時疾其宅有鵲巢旦夕翔鳴聞其諠噪俱惡之念云差當治此鳥既差果張取鵲斷舌而殺之兄弟悉得啞疾吃說文曰吃言語難也方言云𧮈極吃也或謂之軋或謂之嬰郭璞曰軋穀氣不利也江東名吃為嘆也漢書曰魯恭王餘口吃難言又曰馬相如吃而善著書又曰揚雄為人簡易口不能劇談劇甚也一說劇遽疾言也言吃不能疾言也鄭玄自序曰趙商子字子聲河內溫人愽學有秀才能講難而吃不能劇談管子曰吾畏事不敢為事畏言不敢為言故行年六十如老吃耳新序曰周昌者沛人以軍功封汾陰侯御史大夫高帝欲廢惠帝立戚夫人子如意群臣固爭莫能得昌廷爭之強上問其說昌為人吃曰臣口不能言然臣則知其不可也陛下雖欲廢太子臣期期不奉詔世說曰魏明帝口吃少言而內明斷世說曰鄧艾口吃語稱艾艾晉文王戲之曰艾艾為是幾艾鄧荅曰鳳兮鳳兮故是一鳳禿禮記曰禿者不免穀梁傳曰魯季孫行父禿聘于齊齊使禿者御音迓蔡邕獨斷曰古幘無巾如今半幘而已王莽乃始施巾故語曰王頭禿幘㡛施屋秦書曰符堅徵隱士張臣和至長安堅賜以衣冠和辭曰年老頭禿不可加冠野服而入既見求歸矣齆釋名曰鼻塞曰齆晉書曰謝安字安石本能為洛下書生詠有鼻疾故其音濁名流愛其詠而不能及或手掩鼻以斅之也崔鴻春秋後趙錄曰王謨字思賢齆鼻言不清暢尫短無威儀將拜曲陽令石勒疑之長史曰請試之政教嚴明百城尤最幽明錄曰晉司空桓豁在荊州有參軍教鸜鵒令語遂無所不名當大會令効人語有一人齆鼻語難學因以頭內甕中以効焉齲齒釋名曰齲朽也蟲齧之齒缺朽也續漢書曰桓帝元嘉中京師婦女作齲齒笑齲齒笑者齒痛也淮南子曰啄木愈齲啄木食齲虫也又曰決物治齲君子不與兔缺續晉陽秋曰魏詠之生而兔缺相者云後當貴年十八聞荊州殷仲堪帳下有術人能治之因西上仲堪與語令師看焉師曰可割補之但應百日食粥不語笑詠之曰半年不語亦當治之況百日也師為治而差宋書曰孝武狎侮群臣各有稱目多髯者謂之羊短長肥瘦皆有比擬顏師伯缺齒號之曰齴癭說文曰癭頸瘤也崔贛易林曰癭瘤瘍𤸁為身害傷范曄後漢書曰真定王劉揚造作讖記云赤九之後癭揚為主楊病癭欲以惑眾魏略曰賈逵前在弘農與校尉爭公事不得理乃發憤生癭後所病稍大自啟欲割之太祖惜逵恐其不活教謝主簿吾聞十人割癭九人死逵猶行其意而癭愈大宋書曰杜預病癭初攻江陵吳人以瓠壺繫狗頸示之山海經曰天帝之山有草如葵名曰杜衡食之已癭愽物志曰山居之民多癭又稽康養生論曰頸處險而癭莊子曰闉跂支離無脤甕盎大癭典術曰服食天門冬治癭除百病傴僂禮記喪服四制曰傴者不袒穀梁傳成公曰曹公子手僂聘於齊齊使傴者御蕭同姪子處臺笑之孫卿子曰周公僂背莊子曰子輿病曲僂頤隱於臍肩高於頂淮南子曰木氣多僂疣贅說文曰疣贅也釋名曰疣丘也出皮上聚高如地之有丘也贅橫生一內著體梁書曰武帝丁嬪生而有赤誌體又多疣及帝納之無何並失莊子曰彼以生為附贅懸疣以死為決疣漬瘇癰夫若然者惡知死生先後之所在也太玄經曰割疣贅惡不得大山海經曰單孤之山滑水出焉中有滑魚狀如鱓其音如梧食之已疣又曰旄山有鱃魚狀如鱧食之者不疣瘤釋名曰瘤流也聚而生瘤腫也魏略曰晉景帝先苦瘤自割之會母丘儉反而瘤發及儉走竟以自終蔡謨表曰臣先有瘤腫在腰上十數年初無患苦忽自潰晉書曰趙王倫得異鳥問皆不知名宮西有素衣小兒言是服劉鳥倫使錄小兒并鳥置牢室明旦開視並失所在倫目上有瘤時以為祅焉沈約宋書曰朱齡石舅頭有大瘤齡石伺舅眠密往割之舅即死列女傳曰齊宿瘤者東郭採桑之女項有大瘤故以名焉閔王出而女採桑如故王召問之對曰受之父母教採桑不教觀王王曰此奇女也內以為后女死後燕遂屠齊跛躄方言曰自關西秦晉之間凡蹇謂之逴勑略反周易歸妹初九曰歸妹以娣跛能履禮記喪服四制曰跛者不踊身有痼疾不可備禮也左傳宣公下曰晉侯使郄克會于齊傾公帷婦人使觀之郄子登婦人笑於房跛而登故笑之又穀梁傳成公曰衛孫良夫跛郄克眇聘於齊齊使跛者御跛蕭同叔子處臺笑之春秋後語曰秦攻趙急求救於齊齊王曰必長安君為質長安君者太后之小子也太后愛之不肯遣大臣強諫太后怒左師觸龍請見太后曰老臣病足曾不能疾走不得見久矣竊自恐太后體亦所苦也太后曰老婦恃輦而行耳因是太后怒色稍解乃徐說之太後從之又曰趙平原君家樓臨民家民家有躄者盤散行及散音珊平原君美人居樓上臨見大笑之明日躄者至平原君門請曰臣不幸有跛躄之疾而君之後宮臨而笑臣臣願得笑者頭平原曰諾及躄者去平原君笑曰豎子欲以一笑之故殺吾美人不亦甚乎終不殺居歲餘門下客稍稍引去過半平原君怪之一人前對曰以君之不殺笑躄者於是平原君斬所笑美人頭造躄者而謝焉漢書賈誼上書曰天下之勢方病大瘇非徒病瘇又苦𨂂盩𨂂腳掌盩古戾字謂反戾也又曰方今天下又類辟且病痱辟足疾痱音肥風疾也夫辟者一面痛痱者一方痛又曰哀帝有痿痺如淳曰兩足不能相過曰痿齊書曰始安王遙光字元暉生而躄疾高帝謂不堪奉拜祭祀欲封其弟武帝諫乃以遙光襲爵足病不得同朝列常乘輿自望賢門入遙光多忌人有餉屐者以為戲己大被嫌責為牋云智不乃葵亦忤旨唐書曰賈直言者父道冲以伎術得罪賜酖於路直言偽令其父拜四方辭上下神祇伺使者視稍怠即取其酖以飲遂迷仆而死明日酖洩于足而後復蘇代宗聞之減父死直言亦自病躄淮南子曰冠難至躄者告盲者負而走兩人皆得其能也故使瘖者語使躄者走大失其所也偏枯長沙耆舊傳曰夏叔丁母憂過禮遂患風濕一腳偏枯皇甫謐表曰久嬰篤疾半身不仁右腳偏小瘇毛詩巧言曰彼何人斯居河之麋無拳無勇職為亂階既微且尰爾勇伊何腫足為尰骭瘍為微漢書賈誼傳誼上書曰方今天下之勢方病大瘇一股之大幾如要一指之大幾如股失之不治必為錮疾堅久之疾後雖有扁鵲不能為已淮南子曰岸下氣多尰
