body:
  text: 偏霸部八前涼張軌崔鴻十六國春秋前涼錄曰張軌字士彥安定烏氏人漢常山王耳十七世孫祖烈魏外黃令父溫太官令母隴西辛氏軌少好學明經與同郡皇甫士安友善拜宮守舍人與京兆杜預以所注易遺之太康中為尚書郎太子洗馬中庶子遷散騎常侍征西軍司馬軌以晉室多難陰圖保據河西追竇融故事筮之遇泰之觀軌喜曰霸者之兆乃求為涼州公卿亦舉軌拜涼州刺史課農桑拔賢才置崇文祭酒徵九郡胄子五百人立學校以教之永興二年拜安西將軍封樂安鄉侯惠帝崩遺長史北宮純司馬纂別駕陰監奉表京師是歲大城姑臧姑臧城匈奴所築也南北七里東西三里地有龍形故名臥龍城永嘉四年十一月黃龍出於臨羗河發水昇天身長十餘丈五年帝遣使拜車騎大將軍開府儀同三司策命未至而劉曜攻陷長安遷晉帝於平陽建興元年晉愍帝即位於長安遣使者拜軌鎮西大將軍開府儀同三司加侍中封西平郡公固讓不受二年進拜太尉涼州牧以軌年老多疾拜子寔行撫軍副涼州刺史五月軌寢疾立子寔為世子己丑薨于正寢年六十葬建陵冊贈侍中大尉謚武穆公張祚僭號追尊武王廟號太宗張寔崔鴻十六國春秋前涼錄曰張寔字安遜軌之世子也學尚明察敬賢愛士晉舉秀才除尚書郎永嘉元年固辭驍騎將軍請還涼州帝許之改授議郎西中郎將建興元年長史張璽等表寔嗣位十月帝遣使授西中郎將涼州刺史西平公二年十一月帝將降劉曜進寔侍中司空涼州牧三年始知劉曜逼遷天子平陽大臨三日五年南陽王寶聞愍帝崩自稱晉王號年建康置百官遣拜寔征西大將軍開府儀同三司增邑三千戶六年六月京兆人劉弘使左道以眩惑百姓密與寔左右十餘人謀殺寔皆懷刀入內斬寔於外寢時年五十葬寧陵晉王寶冊贈寔大司馬涼州牧謚元公張祚僣號追尊曰明王廟號高祖張茂崔鴻十六國春秋前梁錄曰張茂字成遜寔之母弟虛靖好學不以勢利為心建興元年相國南陽王寶辟從事中郎又薦為給事黃門侍郎皆不就二年徵為侍中以父疾固辭四年拜秦州刺史加散騎常侍領雍州皆不受寔左司馬陰元等以寔既初害于駿冲幼宜立長君乃推茂為大都督太尉涼州牧茂不從以平西將軍行都督涼州諸軍事護羌校尉涼州牧西平公大赦境內九月立寔子駿為世子三年劉曜遣鴻臚拜茂太師涼王四年茂寢疾執駿手泣曰吾先人以孝友見稱自漢以來世康忠順汝謹守忠節無或失墮薨于正寢年四十八劉曜遣使贈太宰謚成烈王張祚僣號追尊曰成王廟號太宗張駿崔鴻十六國春秋前涼錄曰張駿字公庭寔之世子永嘉元年生幼而奇偉十歲能屬文茂之四年拜使持節大都督大將軍梁州牧西平公大赦境內劉曜遣使拜大將軍涼州牧元年正月親耕籍田二月始承晉元帝崩問大臨三日四年十二月劉曜為勒所擒曜太子毗及劉胤等率眾奔上邦六年二月石勒稱天王遣使拜駿征西大將軍涼州牧加五錫之禮八年群寮勸稱涼王置百官駿曰此非人臣所言敢有此言罪不在赦又請立世子乃立重華為世子十二月鄯善王元孟獻女殊好號曰美人立賓遐觀以處之十四年五月雨雪降霜駿避正殿素服命群寮極言得失十五年以右長史任處領國子祭酒立辟雍明堂而行禮焉命西曹掾集閤內外事付索綏以著涼春秋十一月以世子重華行涼州事十九年八月田于建西踰玉石縣九月改玉石縣為金澤縣二十一年始置百官官號皆擬天朝車服旌旗一如王者酒泉太守馬岌上言酒泉南山既崑崙之體周穆王見西王母樂而忘歸即謂此山有石室王母堂珠璣鏤飾煥若神宮禹貢崑崙在臨羗之西即此明矣宜立西王母祠以禆朝廷無疆之福駿從之二十二年六月薨于正德前殿年四十晉遣策贈大司馬謚忠成公七月葬大陵張祚僣號追尊文王廟號世祖張重華崔鴻十六國春秋前梁錄曰張重華字泰臨駿第二子寬和懿重沉毅少言駿薨右長史任處上華為使持節大都督太尉涼州牧護羗校尉西平公假涼王大赦境內三年九月晉遣使者拜侍中大都督隴右諸軍事大將軍涼州刺史領護羗校尉西平公重華以位號未稱怒不授詔群寮上重華為丞相涼王雍秦涼三州牧五年重華讌群寮于閑預庭講論經義顧問索綏曰孔子婦誰家女老聃父字為何四皓既安大子住乎還山乎綏曰孔子婦姓并官氏女聃父名乾字元杲胎則無耳一目不明孤單年七十二無妻與鄰人益壽氏老女野合懷胎十年乃生老子四皓還否臣所未悉重華曰卿不知乎四皓死于長安有四皓冢為不還山也七年十月重華寢疾臨春坊遣左長史馬岌策拜子靈曜為世子大赦境內十一月薨于平章殿年二十七葬顯陵張祚僭號追謚桓王廟號世祖張祚崔鴻十六國春秋前涼錄曰張祚字太伯駿之長庶子博學雄武有政治之才駿之二十一年拜延興太守封寧侯重華薨子靈曜嗣七年十一月右長史趙長等矯稱遺令以祚為使持節都督中外諸軍事撫軍大將軍輔政十二月趙長等議以靈曜冲幼世難未夷宜立長君廢曜為涼寧侯立祚為大將軍護羗校尉涼州牧涼公趙長等議僭即王位于謙光殿大赦改年為和平元年立叱千氏為皇后子太和為太子封弟夫錫為長寧侯重華少子玄靖為涼武侯置百官二月尊祖父郊祀天地二年有神降於玄武殿自稱玄冥與人交語祚日夜祈之神言與福利祚甚信之征東張瓘遣兵傳檄廢祚以侯還弟復立靈曜八月祚收瓘弟琚及其子嵩等驍騎將軍宋混兄脩素與祚有隙祚疑之混西奔招合夷晉眾至萬餘人還向姑臧祚大懼遣楊秋胡將靈曜於菀拉音獵其腰而殺之埋於沙坑九月宋混次于武始大澤為靈曜發哀閏月混至姑臧祚登神雀觀張琚張嵩煞祚守卒死者四百餘人斬西門關內混領軍趙長開宮門以應琚長馳入殿中大呼稱萬歲祚以長敗賊下觀勞之長奮槊音朔刺祚中額奔入萬秋閣為廚士徐里所殺以庶人禮葬之天錫即位備禮改葬于愍陵追謚威王封子廷堅為金澤侯張玄靖崔鴻十六國春秋前涼錄曰張玄靖字元安重華少子母郭夫人和平二年宋混張琚等上玄靖為大將軍涼州牧護羗校尉西平公時年七歲張瓘至姑臧推立玄靖為大將軍涼王自為使持節都督中外諸軍事尚書令涼州牧張掖郡公四年五月東菀大冢上忽有池東天澤地燃廣袤豪數大執法御史杜逸言於瓘曰此皆變之大者可移之佗族瓘徵兵數萬集於姑臧謀討宋氏混與弟澄及左右壯士楊和等四十餘騎奄入南城申令諸營曰張瓘謀逆被太后詔誅之俄而眾至二千瓘率眾出戰混擊敗之眾悉去瓘自殺混入見玄靖以混為使持節都督中外諸軍事驃騎大將軍酒泉郡侯輔政五年六月大旱令諸祈雨之官皆詠雲漢詩儒林祭酒索綏曰雲漢陳周宣之美非旱之文昔神鼎之出漢虞丘不賀今辭與事違恐非致澤之意也綏字士艾燉煌人父戢晉司徒綏家貧好學舉孝廉為記室祭酒母喪去官又舉秀才著涼春秋五十卷又作六夷頌符命傳十餘篇以著述之功封平樂亭侯六年宋混卒天錫以使持節都督中外諸軍輔政八月右將軍齊肅等議以靖多難務殷須立長君勸天錫自立閏月天錫遣肅等夜害玄靖時年十四葬平陵謚冲王張天錫崔鴻十六國春秋前涼錄曰張天錫字純嘏駿之少子母曰劉美人玄靖八年即位年十八謁于太廟尊母劉氏為太后元年四月秦遣鴻臚回國拜天錫大將軍涼州牧西平公三年姑臧北山楊樹生松葉西苑牝鹿生角東苑銅佛生毛延興地震陷裂水出天錫避正殿引咎責躬晉遣使拜隴右關中諸軍大將軍涼州牧西平公八年郡國火燃於泥中三十所符堅復有并兼之規天錫大懼遣從事中郎韓博奉表於晉又與桓溫書剋其年大舉都會上邽十年以世子懷為使持節鎮西將軍高昌郡公次子太豫為世子豫母焦氏為左夫人七月大水地震西平五十日中地十動土樓崩天錫疾美人閻姬薛姬皆自殺二姬國色並有殊寵天錫每謂之曰汝二人將何以報我我死之後豈可更為人妻皆曰尊若不諱妾請效死於前洒掃於地下無他志十月天錫疾瘳大赦境內追悼二姬葬以夫人禮十三年五月符堅遣武衛將軍茍長等率眾十萬來伐天錫遣中衛將軍史景等拒戰赤岸為秦所敗天錫納左長史馬芮之言面縛降秦東徙長安拜歸義侯北部尚書遷右僕射隨符堅敗於淮南又入晉為員外散騎常侍復本封薨贈鎮西將軍謚悼公張軌以晉永寧九年辛酉之歲牧涼州至天錫敗亡之歲歲在丙午八主七十六年西涼李暠崔鴻十六國春秋西涼錄曰李暠字玄盛隴西狄道人也漢前將軍廣十六世孫廣子侍中敢之後世李為為西州右姓祖父弇音掩前涼武衛將軍天水太守安世亭侯父昶字中堅幼有令名世子侍講年十八卒暠昶之遺腹子少而好學沉敏有器度後涼龍飛二年建康太守叚業自稱涼牧號神璽元年拜暠郊穀令二年燉煌索仙等以暠溫毅有惠政推暠為燉煌太守叚業復暠鎮西將軍領護西夷校尉庚子元年十一月晉昌太守唐瑤移檄六郡推暠為大將軍涼公領秦涼二州牧大赦改年追尊祖弇涼公父昶涼簡公以瑤為征東將軍三年正月於南門起靜恭堂以議朝政圖讚自古聖帝明王忠臣孝子烈士貞女親為序頌以作鑒戒五年正月立泮宮增高門學生百人四月燉煌有葛緣木而生作黃烏之形世子譚卒九月立好歆為世子正月大赦改年為建初元年三月讌于曲水命群寮賦詩暠規為之序文寫諸葛亮訓厲以誡諸子十三年正月寢疾顧命長史宋繇曰吾終之後嗣子猶卿子也善相輔導二月薨于恭德殿年六十七葬建世陵謚昭武王廟號太祖初暠為群雄所推定千里之地謂張氏之業不足成河西十郡歲月而一既而傉檀入據姑臧蒙遜基宇稍廣於是慨然著述志賦初河右不生楸槐張駿之世取秦隴植之皆死至是而酒泉宮西北有槐生焉乃作槐樹賦又作婦辛氏誄自餘賦數十篇李歆崔鴻十六國春秋西涼錄曰李歆字士業暠弟二子暠薨左長史宋謠等上為大將軍涼公領涼州牧護羗校尉大赦改年為嘉興元年七月歆聞蒙遜南伐西秦命中外戒嚴將攻張掖尹太后以為不可宋繇亦諫歆怒不從遂率步騎三萬東伐次于都瀆澗蒙遜自浩舋來戰于懷城歆敗左右勸還歆曰吾違太后明誨遠取敗辱不煞此胡復何面目以見母也勒眾復戰敗于蓼泉為遜所煞歆弟驍騎將軍翻擊虜將軍豫等西奔燉煌遜遂入酒泉翻及燉煌太守恂與諸子等棄燉煌奔於北山郡人宋承弘等以恂在郡有惠政密信招恂恂率數千騎入於燉煌宋承推恂為涼州刺史遜率眾二萬攻恂宋承等開門出降恂自煞恂暠之第六子也遜獲翻子寶徙于姑臧歲餘北奔伊吾後二十餘年至魏太平三年寶自伊吾率流人及虜騎南壟燉煌據之遣使降魏魏以寶為使持節侍中都督西垂諸軍事鎮西大將軍開府儀同三司領護西戎校尉沙州牧燉煌公承制玉門以西寶寬雅有度量甚著威惠於西土在燉煌三年徙并州刺史薨謚宣公自暠元年歲在庚子至為蒙遜所滅二十一年北涼沮渠蒙遜崔鴻十六國春秋北涼錄曰沮渠蒙遜臨松盧水胡人其先世為匈奴左沮渠遂以官為氏遜好學涉群史雄烈有英略後涼龍飛二年遜伯父羅仇麴粥從呂光征河南光前軍大敗皆為光所煞宗部會葬者萬餘人遜哭謂眾曰昔漢祚中微吾之乃祖翼獎竇融保寧河右呂王耄荒虐民無道豈可坐觀成敗不上繼先祖安民之志下使二父有恨黃泉眾咸稱萬歲遂立盟約一旬之間眾至萬餘與從兄男成推建康太守叚業為涼州牧康公改龍飛二年為神璽元年業以遜為張掖太守男成為輔國大將軍委以軍國之任永安元年三月遜以為業所憚內不自安請為安西太守四月業收男成賜死遜聞男成死泣告眾曰男成忠於叚公枉見屠害諸君能為報仇乎成素有恩信眾皆憤泣從之北至氐地眾餘一萬業遣右將軍田昴武衛將軍梁中庸等攻侯塢遜自氐地救之昴率騎五百歸遜軍遂大潰中庸來奔五月遜至張掖田昴兄子承愛斬關內遜業左右散走遜大呼曰鎮西何在軍人曰在此業曰孤單飄一巳為貴門所推可見乞餘命投身嶺南庶得東西與妻子相見遜遂斬之六月右長史梁中庸等推遜為大將軍涼州牧張掖公大赦改元四年秦遣鴻臚梁斐拜遜鎮西大將軍開府儀同三司沙州牧西海公九年二月兩月並出正始元年冬十月遷都姑臧十一月僭即河西王位于謙光殿大赦改元置百官始如呂光為三河王故事二年四月立子政德為世子三年二月與西秦通和遜西巡遂循海至鹽池祀西王母寺寺中有玄石神圖命中書侍郎張穆賦焉銘之于寺前十四年起遊林堂於內苑圖列古聖賢之象九月堂成遂讌群臣談論經傳顧謂郎中劉昞曰仲尼何如人也昞曰聖人也遜曰聖人者不凝滯於物而能與世推移畏于匡辱于陳伐樹削跡聖人固若是乎昞不能對遜曰卿知其外未知其內昔魯人有浮海而失津者至于亶州仲尼及七十二子遊于海中與魯人一木杖令閉目乘之使歸告魯侯築城以備寇魯人出海投杖水中乃龍也具以狀告魯侯不信俄而有群鷰數萬銜土培城魯侯信之大城曲阜訖而齊寇至攻魯不剋而還此其所以稱聖也義和元年十一月魏遣太常李慎拜遜太傅涼州牧涼王加九錫之禮三年夏四月遜寢疾立子茂虔為世子薨於路寢五月葬元陵謚武宣王號太祖沮渠茂虔崔洪十六國春秋北涼錄曰沮渠茂虔遜第三子聰穎好學和雅有度量義和三年立為世子加中外都督大將軍錄尚書遜薨僣即河西王位大赦改年為永和元年立子封壃為世子加撫軍大將軍錄尚書事三年正月西中郎將燉煌太守沮渠唐兒上言月十五日有一老父見於郡城東門投書於地忽然不見其書一紙八字滿之文曰涼王三十年若七年虔訪於奉常張慎慎曰昔虢將亡神降于莘深願陛下剋念脩政以副三十之慶若盤于遊田荒于酒色臣恐七年將有大變虔不悅七年正月朝群臣于謙光殿有狐在于東序門者不見其入左右以告命射之不獲二月端門崩初虔為酒泉太守起浮圖於中街有石像在焉是月目流血五月太廟基陷六月當陽門崩魏常山王赤堅率眾至姑臧虔嬰城拒守九月面縛出降魏釋其縛徙虔及宗室士民十萬戶于平城拜虔征西大將軍王如故八年賜死謚哀王自遜永安元年歲在辛丑至是歲庚寅三十九載晉書曰蒙遜以安帝隆安元年自稱牧義熙八年僭立後八年而宋氏受禪以元嘉十年死時年六十六在位三十二年子茂虔立六年為魏所滅
