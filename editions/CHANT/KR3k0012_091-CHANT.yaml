body:
  text: 皇王部十五後漢世祖光武皇帝東觀漢記曰光武皇帝漢高帝九世孫也出長沙定王發之後袁宏漢記曰孝景帝生長沙定王發發中子買為春陵節侯買生鬱林太守外外生鉅鹿都尉回回生南頓令欽欽生光武皇帝諱秀字文叔東觀漢記曰皇考初為濟陽有武帝行過宮常封閉上將生皇考以令舍下濕開宮後殿居之建平元年十二月甲子夜上生時有赤光室中盡明皇考異之使卜者王長曰此善事不可言是歲嘉禾生一莖九穗長大於凡禾縣界大豐熟因名上曰秀是歲鳳皇來集濟陽故宮皆畫鳳皇聖瑞萌兆始形於此上為人隆準日角大口美鬚眉長七尺三寸仁智明遠多權略樂施愛人在家重慎畏事懃於稼穡兄伯升好俠非笑上事田作比之高祖兄伯升年九歲而南頓君卒隨其叔父在蕭入小學後之長安受尚書經師事廬江許子威大義略舉因學世事朝政每下必先聞知具為同舍解說南陽大人往來長安為之邸闇稽疑議嘗訟逋租於大司馬嚴尤尤見而奇之宛大姓李伯玉從第軼數遣客求上上欲避之先是時伯玉同母兄公孫臣為醫伯升請呼難伯升殺之上恐其怨故避之使來者言李氏欲相見款誠無他意上乃見之懷刀自備入見因始侯兄弟為上言天下擾亂飢餓下江兵盛南陽豪右雲擾因具言讖文事上殊不意獨內念李氏富厚父為宗卿師語言譎詭殊非次弟嘗疾毒諸家子數犯法令李氏家富厚何為如是不然諾其言諸李遂與南陽府掾史張順等連謀上深念良久天變已成遂市兵弩絳衣赤幘時伯外在舂陵亦已聚會客矣上歸舊廬望見廬南若火光以為人持火呼之光遂盛赫然屬天有頃不見異之遂從南郭歸宅乃與伯升相見初伯升之起也諸家子弟皆逃自匿曰伯升殺我及聞上至絳衣大冠將軍服乃驚曰以為獨伯升如此也中謹厚亦如之皆合會共勞饗新市平林兵王鳳王匡等因率舂陵子弟隨之兵合七八千人上騎牛與俱殺進新野尉後乃得馬進圍宛城王莽遣大司徒王尋大司空王邑將兵來征更始立以上為太常偏將軍時無印得定武侯家丞印佩之二公兵到頴川嚴尤陳茂與合尤問城中出者言上不敢取財物但合會諸兵為之計冊尤笑言曰是美眉目者耶欲何為乃如此初莽遣二公欲盛威武以振山東至驅豹犀象奇偉猛獸以長人巨無霸為壘尉自秦漢以來師出未曾有也上邀之於陽關二公兵盛漢兵反走上馳入昆陽諸將惶恐各欲散歸與諸將議城中兵穀少宛城未拔力不能相救今昆陽即破一日之間諸將亦滅不同力救之反欲歸守其妻子財物耶諸將怒曰劉將軍何以敢如此上乃笑且去唯王常是上計會候騎還言大兵已來長數百里望不見其後尾前已至城北矣諸將遽請上上到為陳相救之勢諸將素輕上及迫急上為畫成敗皆從所言二公兵已五六萬到遂環昆陽城營圍之數重雲車七餘丈瞰臨城中旗幟蔽野塵熛連雲金鼓之聲數十里或為地𥥛或為衝車撞城積弩射城中矢下如雨城中負戶而汲二公自以為功成漏刻有流星墜營中正晝有雲氣如壞山直營而霣不及地尺而散吏士皆壓伏時漢兵在定陵郾者聞二公兵盛皆怖上歷說其意為陳大命請為前行諸部堅陳上將步騎千餘前去大軍四五里二公遣步騎數千乘合戰上奔之斬首數級諸部將喜曰劉將軍平生見小敵怯今見大敵勇甚奇怪也上復進二公兵卻諸部乘之斬首數百千級連勝遂令輕足將書與城中諸將言宛下兵復到而陽墜其書二公得書讀之恐上遂選精兵三千人從城西水上奔陣二公兵於是大奔北殺司徒王尋而昆陽城中兵亦出中外並擊會天大雷風暴雨下如注水潦成川滍水盛溢二公大眾遂潰亂奔赴水溺死者以數萬滍水為之不流王邑嚴尤陳茂輕騎乘死人渡滍水逃去漢軍盡獲其珍寶輜重車甲連月不盡五月齊武公拔宛城六月上破二公於昆陽破宛後數日收伯升部將劉稷而伯升強爭之更始遂用譖愬復收伯升即日皆物故上在父城徵詣宛拜上為破虜大將軍封武信侯更始欲北之雒陽以上為司隸校尉先到雒陽整頓官府三輔官府吏東迎雒陽者見更始諸將過者已數十輩皆冠幘衣婦人衣諸于繡擁䘿諸于大掖衣也如婦人之旌衣䘿音屈揚雄方言曰襜褕其矩者自閔目西謂之䘿據此是諸于上加繡䘿如今半臂也大為長安所笑知者或畏其衣犇走入邊郡見司隸官屬皆相指視之極望老吏或垂涕曰復見漢官威儀賢者蟻附更始以上為大司馬遣之河北十月上持節度孟津鎮撫河北安集百姓趙王庶兄胡子立邯鄲卜者王郎為太子移檄購求公十萬戶世祖引兵攻邯鄲連戰郎兵挫折郎遣諫議大夫杜長威見公據地曰實成帝遺體子輿也公曰正使成帝復生天下不可復得也況詐子輿乎長威請降得萬戶侯公曰一戶不可得長威曰邯鄲雖鄙君臣并力城守尚可支一歲終不君臣相率而降但得全身也辤去而郎少傅李立反郎開城門漢兵破邯鄲誅郎入王宮收文書得吏民謗毀公言可擊者數千章公會諸將燒之曰令反側者自安也更始遣使者即立公為蕭王諸將議上尊號上不許上發薊至中山諸將復請上尊號初王莽時上與伯升及姉壻鄧晨穰人蔡少公燕語少公道讖言劉秀當為天子或曰是國師劉子駿也上戲言曰何知非僕耶坐者皆大笑時傳聞不見赤伏符文軍中所上未信到鄗上所與在長安同舍諸生疆華自長安奉赤伏符詣鄗與上會群臣復固請乃命有司設壇于鄗南千秋亭六月己未即皇帝位改元為建武十月帝入雒陽幸南宮三年正月益吳漢鄧禹等封自漢草創德運正朔服色未有所定高祖因秦以十月為正以漢水德立北畤而祠黑帝至孝文賈誼公孫臣以為秦水德漢當為土德至孝武倪寬司馬遷猶從土德自上即位案圖讖推五運漢為火德周蒼漢赤水生火赤代蒼故上都雒陽制郊祀於城南行夏之時犧牲尚黑明火德之運徽熾尚赤四時隨色郊祀帝堯以配天宗高祖以配上帝上遣游擊將軍鄧隆與幽州牧朱浮擊彭寵隆軍潞浮軍雍奴相去百餘里遣吏上奏言寵破在旦暮上讀檄未竟怒曰兵必敗北汝歸可知吏還未至隆軍果為寵兵掩擊破浮軍遠至不能救以兵走幽州咸曰上神三年十月上幸舂陵祠園廟大置酒與舂陵父老故人為樂四年五月上幸盧奴為征彭寵故也自王莽末天下旱霜連年百穀不成元年之初耕作者少民飢饉黃金一斤易粟一石至二年秋天下野穀旅生麻菽尤盛或生瓜菜菓實野蠶成繭被山民收其絮採獲穀果以為蓄積至是歲野穀生者稀少而南畝亦益闢矣六年二月吳漢下朐城天下悉定唯獨公孫述隗囂未平上曰取此兩子置度外乃休諸將置酒賞賜之每幸郡國下與見吏輒問以數十百歲能吏次第下掾史簡練臣下之行下無所隱其情道數十歲事若案文書吏民驚惶不知所以人自以見識家自以蒙恩遠臣受顏色之惠坐席之間以要其死力當此之時賊檄日以百數憂不可勝上猶以餘間講經藝發圖讖制告公孫述署曰公孫皇帝囂雖遣子入侍尚持兩心囂故吏馬援謂囂曰到朝廷凡數十見自事主未常見明主如此也材直驚人其勇非人之敵開心見誠與人語好醜無所隱諱圖講天下事極盡下恩兵事方略量敵校勝闊達多大節與高帝等經學愽覽政事文辯前世無比囂曰如卿言勝高帝耶曰不如也高帝大度無可無不可今上好吏事動如節度不飲酒囂大笑曰如卿言反復勝也七年正月詔群臣奏事無得言聖人又舊制上書以青布囊素褁封書中不中式不得上既上詣北軍待執前后相塵連歲月乃決上躬親萬機急於下情乃令上書啟封則用不得刮璽書取具文字而已奏詣闕平旦上其有當見及冤結者常以日日出時騶騎馳出召入其餘以後中使者出報即罷去所見如神遠近不偏幽隱上達民莫敢不用情追念前世園陵至盛王侯外戚葬埋僣侈吏民相效浸以無限詔有誥天下令薄葬八年閏月車駕西征河西大將軍竇融與五部太守步騎二萬迎上隗囂士眾震壞皆降囂走入城吳漢岑彭追守之九年正月隗囂餓出城食糧糗糒腹脹死十二年吳漢引兵擊公孫述入犍為界小縣多城守未下詔書告漢直擁兵到成都據其心腹後城營自解散漢意難前獨言朝廷以為我縛賊手足矣遣輕騎至成都燒市橋武陽以東小城營皆奔走降竟如詔書漢兵乘勝追奔述距守詔書又戒漢曰成都十萬人且堅據廣都城去之五十里待其即營攻城罷倦引去乃首尾擊之勿與爭鋒述兵不敢來轉營即之移徙輒自堅十一月眾軍至城門述自將背城而戰吳漢攻之述軍大破刺傷述扶輿入壁其夜死夷述妻子傳首於洛陽縱兵大掠舉火燔燒上聞之下詔讓吳漢副將劉禹曰城降嬰兒老母口以萬數一旦放兵縱火聞之可為酸鼻禹宗室子孫故嘗更職何忍行此仰視天俯視地觀於放麑啜羹之羹二者孰仁矣失斬將吊民之義又議漢殺述親屬太多是時名都王國有獻名馬寶劍直百金馬以駕鼓車劍以賜騎士苑囿池籞音禦之官廢弋獵之事不御雅性不喜聽音樂手不持珠玉衣服大絹而不重綵征伐嘗乘革輿羸馬公孫述故哀帝時即以數郡備天子用述破益州乃傳送瞽師交廟樂葆車乘輿物是後乃稍備具焉述伏誅之後而事少閑官曹文書減舊過半下縣吏無百里之繇民無出門之役十九年上幸南陽汝南至南頃止令舍大置酒賜吏民復南頓田租一歲吏民叩頭言皇考居此日久陛下識知寺舍每來輒加厚恩但復一歲少薄願復十歲上曰天下重寶大器常恐不任日慎一日安敢自遠期十歲復增一歲二十年六月上風眗癉病發甚以衛尉關內侯陰興為侍中興受詔雲臺廣室二十六年正月詔曰前以用度不足吏祿薄少乃自益其俸自三公下至佐史各有差四月始營陵地於臨平亭南詔曰無為山陵陂池裁令流水而已迭興之後亦無丘壟使合古法今日月已逝當豫自作臣子奉承不得有加乃令陶人作瓦器又曰臨平望平陰河水洋洋舟船泛泛善矣夫周公孔子猶不得存安得松喬與之而共遊乎文帝曉終始之義景帝所謂孝子也故遭反覆霸陵獨完非成法耶上常自細書一札十行報郡縣旦聽朝至日晏夜講經聽誦坐則功臣特進在側論時政畢道古行事次說在家所識鄉里能吏次第比類又道忠臣孝子義夫節士坐者莫不激揚悽愴欣然和悅群臣爭論上前常連日皇太子嘗承間言陛下有禹湯之明而失黃老養性之道今天下大安少省思慮養精神上荅曰我自樂此三十年有司奏封禪詔曰災異連仍日月薄食百姓怨歎而欲有事於太山汙七十二代編錄以羊皮雜貂裘何強顏耶三十年群臣復奏宜封禪遂登太山勒石紀號改元為中平二年二月戊戍帝崩于南宮前殿在位三十三年時年六十二遺詔曰朕無益百姓如孝文皇帝舊制葬務從約省刺史二千石長皆無離城郭無遣吏及因郵奏太子襲尊號為皇帝群臣奏謚曰光武皇帝廟曰世祖三月葬原陵東觀漢記曰上破王郎還過鄧禹營禹進食炙魚上大飡啗時百姓以上新破大敵欣喜聚觀見上飡勞勉吏士威嚴甚厲於是皆竊言曰劉公真天人也東觀漢記曰隗囂遣馬援奏詣京都上出在宣德殿南廡下引援入與相見上曰遨遊二帝間見卿使人慚援曰今天下反覆而盜賊自名字者不可勝數也陛下恢廓大度同符高祖乃知帝王自有真也又曰帝既有仁聖之明氣勢形體天然之姿固非人之敵翕然龍舉雲興三兩而濟天下蕩蕩人無能名焉帝王世紀曰玄晏先生曰左氏春秋稱夏少康之起有田一成有眾一旅若漢之再命世祖不階成旅之資平暴反正遂建中與與夏康同美矣袁山松後漢書曰前漢自成哀已下而天地縱橫巨猾竊命劉氏舊澤雖在而瞻烏之望殆絕世祖以眇眇之胤起於白水之濱身屈無妄之力位與群豎並列于時懷璽者十餘建旗者數百高才者居之南面疾足者為之王公茫茫九州瓜分臠切泯泯蒼生塵消鼎沸我扇之以仁風驅之以大威霜雪被而洪棘枯綱維振而逆鱗掃群才畢湊人思與能數年之間廓清四海雖曰中興與夫始創業者庸有異乎誠馬生之言固以寥廊大度同符高祖又資太宗之仁兼孝宣之明一人之體其殆乎同故能享有神器據乎萬物之上矣會稽典錄曰上在長安中與餘姚嚴遵俱共受學結好建元元年徵遵拜為諫議大夫共上宿遵以足加帝上其夜客星犯帝座太史以聞上曰昨與嚴子陵臥也續漢書曰昔羿浞篡夏數十年少康生為仍牧正能脩德復夏厥勳大矣然尚有慮思及靡有鬲內外之助至於光武承王莽起自疋庶一民尺土靡有憑焉發跡於昆陽以數千屠百萬非膽智之主孰能堪之討賊平亂克復炎漢號稱中興者無以加之矣中國既定柔遠以德愛慎人命下及徭賦武功既備抗文德脩經術勳績弘矣薛瑩漢紀曰王莽之際天下雲亂英雄並發其跨州據郡僣制者多矣人皆冀於非望然考其聰明仁勇自無光武儔也弘寬愽納計慮如神是以任光竇融望風景附馬援一見覩顏識奇故能以十數年間掃除群凶清復海內豈非天之所輔贊哉古者師不內御而光武命將皆授以方略使奉圖而進其違失無不折傷意豈文史之過乎不然雖聖人其猶病諸更始東觀漢記曰劉玄字聖公光武族兄也弟為人所殺聖公結客欲報之客犯法聖公避吏於平林吏繫聖公父子張聖公詐死使人持喪歸舂陵吏乃出子張聖公因自逃匿王莽末南方飢饉人庶群入野澤掘鳧茈而食更相侵奪新市人王匡王鳳為平理諍訟推為渠帥眾數百人諸亡命往從之數月間至七八千人號新市兵平林人陳牧廖湛復聚眾千餘人號平林兵聖公入平林中與伯升會遂共圍宛聖公號更始將軍自破甄阜等眾庶來降十餘萬諸將立劉氏南陽英雄皆歸望於伯升然漢兵以新市平林為本其將帥素習聖公因欲立之而朱鮪立壇城南淯音育水上詣伯升呂植通禮經為謁者將立聖公為天子儀以示諸將馬武王匡以為王莽未滅不如且稱王張卬拔劍擊地曰稱天公尚可稱天子何謂不可於是諸將軍起與聖公至於壇所奉通天冠進聖公於是聖公乃拜冠南面而立改元為更始元年上為太常偏將軍上破二公於昆陽城而更始收劉稷及伯升即日皆物故上馳詣宛謝罪更始大慚長安中兵攻王莽斬首收璽綬詣宛更始入便坐黃堂上視之曰莽不如此當與霍光等更始韓夫人曰莽不如此帝郍為得之更始北都洛陽李松等自長安傳輿服御物及中黃門從官至洛陽關中咸相望天子更始遂西居東宮鍾鼓帷帳宮人數千官府里閭安堵如舊更始上前殿郎吏以次侍更始顧刮席與小常侍語郎吏怪之更始委政於趙萌曰在後庭與婦人躭飲諸將軍言事更始醉不能見韓夫人尤嗜酒每侍飲見常侍奏事輒怒曰帝方對我飲正用此時持事來乎起棓音棒書案破之所置牧守交錯州郡不知所從趙萌以私事捽才骨反侍中侍中曰陛下救我更始言大司馬縱之萌曰臣不受詔遂斬之又所署官爵皆群小被服不似或繡面衣錦袴諸于襜褕為百姓之所賤長安中為之歌曰竈下養中郎將爛羊胃騎都尉爛羊頭關內侯其冬赤眉十餘萬人入關引兵入上林更始騎出廚城門諸婦女皆從後車呼更始當下拜城更始下馬拜謝城乃去至高陵上聞更始失城乃下詔封更始為淮陽王而赤眉劉盆子亦下詔以聖公為長沙王更始仍許赤眉求降上璽綬乃封為畏威侯赤眉謝祿曰三輔兵多欲得更始一旦失之合兵攻公自滅道也遂害更始詔鄧禹牧葬於霸陵帝王世紀曰更始名玄字聖公即位凡三年
