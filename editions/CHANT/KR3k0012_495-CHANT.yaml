body:
  text: 人事部一百三十五詭詐說文曰詭責也又撗射物為詭詐欺也詩曰無縱詭隨以謹無良禮曰用人之智去其詐論語曰古之愚也直今之愚也詐戰國策曰楚懷王拘張儀將殺之靳尚為請王之幸夫人鄭袖曰子亦自知且賤於王乎鄭袖曰何尚曰張儀者秦王之忠信有功臣也今楚拘之秦王欲出之秦王有愛女美又簡擇宮中佳麗習音者以從之資以金玉寶器以上庸六縣為湯沐邑欲因張儀內之楚王必受之而忘子子踈必矣鄭袖遽說王出張子又曰張丑為賈於燕燕王欲殺之走且出境境吏得之丑曰燕王所為將殺我者人有言我有寶珠也今我已亡矣而燕王不我信今子致我我且言子之奪我珠而吞之燕王必且殺子刳子之腹君不可說吏恐而赦之史記曰趙武靈王立吳姬子何為惠文王自號為主父令何主治國而自胡服將士大夫西北略胡地而欲從雲中九原直南襲秦於是詐自為使者入秦秦昭王不知而怪其狀甚偉非人臣之量使人逐之而主父馳已脫門矣秦人大驚主父所以入秦者欲自略地因觀秦王為人也又曰張儀說楚王曰大王誠能聽臣閉關絕約於齊臣請獻商於之地六百里使秦女得為大王箕箒之國楚王大悅而許之遂閉關絕約於齊使一將軍隨儀儀至秦陽失綏墮車不朝三日楚王聞曰以寡人絕齊未甚邪乃使勇士至宋借宋之符北罵齊王齊王大怒折節下秦秦齊之交合儀乃朝謂楚使曰臣有奉邑六里願獻大王左右使者曰臣受命於王以商於之地六百里不聞六里還報楚王大怒又曰新垣平使人持玉柸上書闕下云有寶玉氣來者臣已視之果有獻玉柸者刻曰人主延壽平又言臣侯日再中於是始更以十七年為元年令天下大酺平言曰臣望汾陰有金寶氣意周鼎其出乎其見不迎則不至於是上使治廟汾陰南臨河欲祠出周鼎人有上書告新垣平所言皆詐也漢書曰陳勝吳廣起兵乃丹書帛曰大楚興陳勝王置人所罾魚腹中卒買魚烹食得而怪之又令廣隱社作狐鳴曰陳勝王吳廣相又曰韓信與家臣謀欲發兵攻呂后其舍人得罪信囚欲殺之舍人弟上書告信欲反狀於呂后后乃與蕭何謀詐令人從上所來言陳豨已死群臣皆賀相國紿信曰雖病強入呂后使武士縛信斬之長樂鍾室信方斬曰吾不用蒯通之計反為女子所詐豈非天哉又曰孝惠張皇后宣平侯敖女也呂太后欲為重親以公主女配帝欲其生子時方無子迺使佯為有身取後宮美人子名之殺其母立所名子為太子又曰人不患其不知患其為詐也又曰宣帝始元五年有男子來乘黃犢車衣黃襜褕著黃帽詣北闕自稱衛太子京兆尹雋不疑收縛之廷尉驗治卒得奸詐又曰傅介子與士卒俱齎金幣揚言以賜外國為名至樓蘭王意不信介子佯引去至其西界使譯謂曰漢使者持黃金錦繡行賜諸國王不來受我去之西國矣即出金幣以示譯譯報王王貪漢物來見使者介子與坐飲陳物示之飲酒皆醉介子謂王曰天子使私報王王起隨介子入帳中屏語壯士二人從後剌之刃交胸立死又曰李廣以衛尉為將軍出鴈門擊匈奴匈奴兵多破廣軍單于素聞廣賢令曰得李廣必生致之胡騎得廣佯死得脫匈奴騎數百追之廣行取弓射殺追騎又曰梓潼人哀章學問長安素無行見王莽居攝即位作銅匱為兩檢書言王莽為行天子即日昏時衣黃衣持匱至高廟莽至廟拜受金匱又曰匈奴寇邊甚王莽乃大募天下有奇伎術可以攻匈奴者將待以不次之位言便宜者以萬數或言能渡水不用舟楫或云不持升糧服食藥物三軍不飢或言能飛一日千里可窺匈奴輒試之取大鳥翮為兩翼頭與身皆著毛通引環紐飛百步隨莽知其不可用茍欲獲其名皆拜為將軍賜以車馬范曄後漢書曰王郎起北州擾惑吳漢素聞世祖長者獨欲歸心乃說太守彭寵出止外亭念所以譎眾未知所出望見道中有一人似儒生者漢使人召入為具食問以所聞生因言劉公所過為郡縣所歸邯鄲舉尊號者實非劉氏漢大喜即詐為世祖書移檄漢陽使生齎以詣寵令具以所聞說之漢復隨後入寵甚然之於是遣漢將兵擊王郎又曰王莽時尚書缺詔將大夫六百石以上試對政事天文道術以高第者補之翟酺自恃能高而忌太史令孫懿恐其先用乃往候懿既坐言無所及唯涕泣流連懿怪而問之酺曰圖書有漢孫登以才智為中官所害觀君表相似當應之酺受恩接愴君之禍耳懿憂懼移病不試由是酺對第一拜尚書又曰靈帝時官官得志並起第擬則宮室帝嘗登永安候臺官官恐其望見居處乃使中大夫尚坦諫曰天子不當登高登高則百姓虛散自是不敢升高東觀漢記曰和熹鄧后臨朝權在外戚杜根以安帝年長宜親政事乃與同時郎上書直諫太后大怒收執根等令盛以嫌囊於殿上撲殺之執法者以根知名語行事人使不加力既而載出城外根得蘇太后使人檢視遂詐死三日目中生蛆因得逃竄也又曰隗囂敗公孫述懼欲安其眾成都郭外有秦時舊倉改名白帝倉自王莽以來常空述詐使人言白帝倉出穀如山陵百姓空市里往觀之述乃大會群臣問曰白帝倉出穀乎皆對言無述曰訛言不可信道隗王破者復如此矣又曰臧宮將兵至中盧屯駱越是時公孫述將田戎任滿與征南大將軍岑彭相拒於荊門彭等戰數不利越人謀叛從蜀宮兵少力不能制會屬縣送委輸車數百宮夜使鋸斷城門限令車周轉出入至旦越人候伺者聞車聲不絕而門限斷相告以漢兵大至其帥乃奉牛酒以勞軍魏志曰司馬宣王稱病因李勝出為荊州刺史曹爽等令勝辭宣王自陳無它功効撗蒙時恩當為本州宣王令兩婢侍邊持衣衣落復上指口言渴主飲婢進粥宣王持杯飲粥皆流出沾胸勝愍然為之涕泣曰今主上尚幼天下賴明公然眾情謂公舊風病發何意尊體乃爾宣王徐更言年老沉疾死在旦夕君當屈為并州并州近胡好善為之恐不復相見如何勝曰當遷本州非并州宣王仍復陽為惛謬曰君方到并州努力自愛錯亂其辭狀如荒語勝復曰當忝本州非并州也宣王乃若微悟者謂勝曰懿年老意荒不解君言今當與君別自顧氣力轉微後必不更會同欲自力設薄主人生死共別今師昭兄弟結君為友因流涕哽咽勝亦長歎吳志曰孫峻謀置酒誅諸葛恪恪將見駐車宮門峻已伏兵於帷中恐恪不時入事洩自出見恪曰使君若尊體不安自可須復當具白主上欲以嘗知恪意荅曰當力人散騎常侍張約朱思密書與恪曰今日張設非常疑有佗故恪省書而去未出門逄太常滕裔恪曰卒腹痛不任入裔不知峻計謂恪曰君自行旋未見今上置酒請君已至門直當力進恪踟躕而還劍履上殿謝亮還坐設酒峻因曰使君疾未善平當有常服藥酒自可取之恪意乃安則飲所齎酒數行亮還入內峻起如廁著短服出曰詔收諸葛恪恪驚起杖劍未殊而峻刃交下晉書曰謝玄等既破符堅有驛書至謝安安方對客圍碁看書既竟便攝放床上了無喜色碁如故客問之徐荅云小兒輩遂已破賊既罷還內過戶限心喜甚不覺屐齒之折其矯情鎮物如此又曰桓玄以歷代咸有肥遁之士而己世獨無乃徵皇甫謐六世孫希之為著作并給其資用皆令讓而不受號曰高士時人名為充隱又曰紀瞻為會稽內史時有詐作大將軍府符收諸吏暨令令已受拘瞻覺其詐便破檻出之訊問使者果伏詐妄又曰崔洪口不言貨財手不執珠玉汝南王亮嘗讌公卿以琉璃鍾行酒酒及洪洪不執亮問其故對曰慮有執玉不趨之義故爾然實乖其常性故為詭也晉中興書曰晉元帝叔父東安王繇為成都王頴所害懼禍及謀出奔其夜月明禁衛甚嚴不能得去有頃天暴風雨晦冥邀者散帝乘間得脫至河陽為津吏所止從者宗典後至以馬鞭拂之謂曰舍長官禁貴人而汝被駐耶因大笑由是被釋又曰溫嶠知王敦不可復諫乃潛謀滅之先夙夜綜其府事而附其欲錢鳳敦所信也嶠謂人曰錢世儀精神滿腹嶠素有知人之稱鳳聞而悅之深結好於嶠會丹陽尹缺嶠說敦曰京尹輦轂喉舌宜得文武兼之公宜自選其才敦然之問嶠誰可作者嶠曰愚謂錢鳳可用然裁之在公敦思惟良久曰無復勝君嶠即苦辭敦不從表補丹陽尹猶懼錢鳳為之奸因敦置酒與嶠別嶠曰違離宇下情戀不已願自起行酒以展岐路之心行酒至鳳未飲嶠因偽醉以手板擊鳳幘為之墜作色曰錢鳳何人溫太真行酒而敢不飲鳳不悅敦以為醉兩釋之明日鳳曰嶠與朝廷甚密必未可信或懷反噬宜更思之敦曰太真昨醉小加聲色豈得以此詭貳由是鳳謀不行而得還都又曰王允之年在總角敦深知之謂為似己入則共寢敦嘗夜飲允之辭醉先眠敦將錢鳳計逆允之悉聞慮敦或疑於眠處大吐鳳既出敦果照視見眠吐中不復疑之唐書曰李義府擢拜中書侍郎同中書門下三品監修國史賜爵廣平縣男義府貌狀溫恭與人語必嬉怡微笑而褊忌陰賊既處權要欲人附己微忤意者輒加傾陷故時人言義府笑中有刀又以其柔而害物亦謂之李貓尹文子曰虎求百獸食之得狐狐曰子無食我也天帝令我長百獸今子食我是逆天帝命也子以我言不信吾為子先行子隨我後觀百獸之見我不走乎虎以為然故遂與行獸見之皆走虎不知獸之畏己而走以為畏狐也韓子曰司城子罕謂宋君曰慶賞賜子者民之所好也君自行之誅罰殺戮者民之所惡也臣請當之於是戮細民而誅大臣君曰與子罕議之居朞年民知死生命制於子罕故一國歸焉子罕親劫奪宋之政淮南子曰夫狐之搏雉也卑體弭毛以待其來也雉見而信之故可得而禽也使狐瞑目見其必殺之勢雉亦知憚驚遠飛以避其怒矣夫人偽詐以相欺非直禽獸詐也吳越春秋曰要離為王殺慶忌曰請以罪出走殺臣之妻子焚之吳市飛揚其灰購臣千金與百里之邑詐往慶忌必信臣也王曰諾要離以罪出走王殺其妻子焚之吳市飛揚其灰購之千金與百里之邑呂氏春秋曰趙簡子病召太子告曰我則死已葬上夏屋之山以望簡子死已葬襄子上夏屋以望代曰先君必以此殺之也反歸慮所以取代乃先善之代君好色請以其弟妻之襄子謂代君而請觴之先令舞者置兵羽中數百人又先具大金斗代君至酒酣舉斗而擊之腦塗地舞者操兵以鬭盡殺其從者陸賈新語曰秦二世之時趙高駕鹿而從行王曰丞相何為駕鹿高曰馬也王曰丞相誤耶以鹿為馬也高曰乃焉也陛下以臣之言為不然願問群臣於是乃問群臣群臣半言馬半言鹿當此之時秦王不敢信其目而從邪臣之言鹿與馬之異形乃眾人之所知也然不能別其是非況於闇昧之事乎王符潛夫論曰昔紂好色九侯聞之乃獻厥女紂則大喜以為天下之麗莫若此也以問妲己妲己懼進御而奪己愛也乃為俯而泣曰君王年既老耶明既衰耶何貌惡之若此而覆謂之好也紂於是渝而以為惡妲己恐天下之愈進美女因曰九侯之無道也乃欲以此惑君王也而弗誅何以革後紂則大怒遂脯淑女而烹九侯論衡曰儒書稱武王伐紂太公陰謀食小兒以丹令身絕赤長大教言商亡商民見身赤以為天神及言商亡皆謂商滅世說曰鍾會密白鄧艾有反狀會善効人書於劍閣要艾章表白事皆易其言令辭指倨傲多自矜伐葛仙公別傳曰時有一老人頗能治病從中國來其人言年已數百歲後他坐仙公欲知此公定年俄一人從天下舉坐瞻目良久集地著朱衣進賢冠即問此公曰天遣我來問君定年幾何故欺詐民人速以實對公大怖下地長跪言曰無狀實九十三仙公因撫手大笑忽然失朱衣人所在
