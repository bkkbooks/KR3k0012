body:
  text: 河北諸水淇水說文曰淇水出河內共北山東入海詩曰毖彼泉水亦流于淇又曰要我乎上宮送我乎淇之上矣又曰瞻彼淇澳菉竹猗猗又曰籊籊竹竿以釣于淇淇水悠悠檜楫松舟韓子曰昔紂為甲卒百萬左飲馬於淇右飲馬於洹洹水竭淇水不流武王甲卒三千破之隋圖經曰清淇西自魏郡朝歌縣界入分為二泒一在郡東一在郡西俱南流入河案酈道元注水經云淇水南與清水合而入白溝石會宿胥皆瀆之名淇又一名王莽河王莽時所穿也冀州圖經云河水西從河內郡界入至黎陽而東北至臨河西至王莽河出焉又東經澶淵東入武陽河南即東郡界是水經曰淇水出河內隆慮縣西大號山山海經曰淇水出沮如山水出其側頹波漰住衝激橫山山上合下開可減六七十步巨石磥砢交積隍澗傾瀾漭盪勢同雷轉激水散氣曖若霧合又曰詩云瞻彼淇澳菉竹猗猗毛云菉王芻也竹褊竹也漢武帝塞決河斬淇園之竹木以為用寇恂為河內伐竹淇川冶夫百餘萬以輸軍資今通望淇川無復此物唯生芻編草不異黃花水隋圖經曰黃花水出隆慮縣西北崖上高十七里去地七里懸水東南注壑巖下狀若雞翅俗謂之雞翅蓋天台赤城之流也至谷潛入地下十里復出名曰柳水者是黃花水重源發也其谷號為黃花谷內有仙母塚谷西有洞穴謂之聖人窟洹水隋圖經曰洹水出隆慮縣西北俗謂安陽河即聲伯夢涉之所源出林慮山東平地清水水經曰清水出河內脩武縣之北黑山黑山在縣北白鹿山東清水所出也上承諸陂散泉以成川南流西南屈曲瀑布垂巖懸河注壑二十餘丈聲震山谷左右石壁層深獸跡不交隍中散水霧合視不見底其水歷澗流飛清泠洞觀謂之清水矣滏水水經注曰滏水發源出石鼓山南巖下泉奮湧若滏水之湯矣其水冬溫夏冷崖上有魏世所立銘水上有祠能興雲雨滏水又東流注于漳又謂之合河浮圖澄別傅曰石虎時自正月不雨澄詣滏口祠稽首曝露即日二白龍降於祠下於是雨遍千里也山海經曰神國之山滏水出焉東流注于歐水郭璞注曰金滏水在臨水縣西釜口山經鄴西北至列人縣入于漳其水熱漳水說文曰濁漳水出上黨長子鹿谷山東入清漳清漳出沾山大要谷北入河呂氏春秋曰史起引漳水灌鄴田民初大怨後轉獲利相與歌曰鄴有聖令曰史公決漳水灌鄴旁終古斥鹵生稻梁風土記云南易水本名漳水源出三門山案趙地記云六國時此水名易水埤蒼及水經云洺水之目不知誰改俗謂山之下地名洺水因經之故曰洺水案燕趙記云其分有三易漳為南易水鄴縣圖經曰濁漳水在縣西水東北津有永樂浦浦西五里俗謂為紫陌河北處即俗巫為河伯娶婦處也水經注曰清漳水東經沙縣故有沙河之稱又曰濁漳水出上黨長子縣西發搗山又云漳水出麓谷山與發鳩連麓而在南淮南子謂之發苞山故異名互見也左則陽泉水注之右則散蓋水入焉三源同出一山但以南北為別耳又曰尚書所謂覃懷底績至于衡漳也孔安國曰衡橫也言漳水橫流也易水水經曰易水出涿郡故安縣閻鄉西山燕太子丹曰荊軻入秦不擇日發太子送之於易水之上荊軻起為壽歌曰風蕭蕭兮易水寒壯士一去兮不復還故安圖經曰易水又名安國河亦名北易水汾水說文云汾水出太原晉陽山西南入河山海經曰管涔之山其山無木而下多草其下多玉汾水出焉而流注于河十三州志曰出武周燕之燕京山亦管涔之異名也其山重阜脩層有草木無泉源導於南麓之下說文曰汾水出太原晉陽山西南入河莊子曰堯治天下之民平海內之政往見四子於姑射之山汾水之陽窅然喪其天下焉說苑曰智伯圍趙襄子於晉陽決晉水以灌之晉陽之城不沒者三版智伯曰吾始知水之可以士人國汾水可以灌安邑絳水可以灌平陽淮南子曰汾水濛濁而宜麻水經曰汾水南過冠爵津汾名也在介休縣之西南俗謂之雀鼠谷數十里間道隘水左右悉結編梁閣道累石就路縈帶巖側或去水一丈或高五六丈上戴山阜下臨絕澗俗謂之為魯股橋蓋通古之津隘亦在今之地嶮文水水經曰文水出大陵縣西山文谷東北入于汾注云縣西南山下武氏穿井給養井至幽深後一朝水溢平流東南注文水又曰文水又南逕縣右會隱泉水口水出謁泉山之上頂俗陽雨愆時是謁是禱故山得其名非所詳也其山石岸絕險壁立崖半有一石室去地可五十餘丈爰有層松飾巖列柏綺望唯西側一處得歷級外陟頂上平地一十許頃沙門釋僧光表建二剎泉發於兩寺之門東流瀝石沿注上下又東津渠隱沒而不恒流故有隱泉之名矣雨澤豐澍則通入文水又南經茲氏縣故城東為文湖東西一十五里南北三十里世謂之西河在縣直東一十里湖之西側臨湖澮水水經曰澮水出河東絳縣東澮交東高山注云一名詳高山亦曰河南山西南逕翼城北合諸水謂之澮交左傳晉悼公謀去故絳欲居郇瑕魏獻子曰不如新田有汾澮以流其惡遂居新田又謂之絳蓋在絳澮之陽又西南過虎祁宮南入于汾晉水水經注曰山海經曰懸甕之山晉水出焉今在縣之西南昔智伯之遏晉水以灌晉陽其川上源後人踵其遺跡畜以為沼沼西際山枕水有唐叔虞祠水側有涼堂結飛梁於水上左右雜樹交陰希見曦景晉川之中最為勝處媯水地記曰河東郡首山之東北山中有二泉水南流者曰媯水北流曰汭水二水西經歷山下異流同歸渾流而注入于河水經注曰尚書所謂釐降二女于媯汭孔安國曰舜居媯水之汭王肅曰媯汭虞地名皇甫謐曰納二女於媯水之汭馬季長曰水所入曰汭然則汭似非水名則今見有二水異源同歸渾流西注而入于河沁水水經曰沁水出上黨涅縣謁戾山注云沁即洎水也水經注曰沁水南巡石門石門是晉安平獻王司馬孚之為魏野王典農中郎將之所造也案其表云臣孚言臣被明詔興河內水利臣既到檢行沁水源出銅堤山屈曲周廻水道九百自太行以西王屋以東層巖高峻天時霖雨眾谷走水小石漂迸木門杇敗稻田汎濫歲功不成臣輒案行去堰五里以外方石可得數萬餘枚臣以為累方石為門若天旱增堰進水若天霖雨陂澤充隘則閉方斷水空渠衍澇足以成河雲雨田人經國之謀暫勞永逸聖王所許願陛下特出臣表勑大司農府給人工勿使稽延詔書聽許於是狹岸累石結以為門用代木門矣鴦漿水山海經曰解縣南有壇道山山下有水潛出停而不流俗為鴦漿水發于上而潛于下厥頂方平有良藥石臼河水經注曰漢永平中治呼沱石臼河案司馬彪後漢郡國志常山南行唐縣有石臼谷蓋資承呼沱之水轉山東之費自都盧至羊腸倉將憑汾水以漕太原用實秦晉苦役連年轉運所經凡三百八十九隘死者無筭拜鄧訓為謁者監護水功訓隱括知其難立言肅宗從之全活數千人和喜鄧后之立也訓后叔父以為訓積善所致也滹沱禮曰晉人將有事於河必先有事於滹沱隋圖經曰滹沱在深澤縣界光武為赤眉所追至滹沱河欲渡導吏還乃言水深無船左右懼上使王霸前瞻水霸恐驚眾乃言冰堅可渡北至冰合囊沙布冰上乃渡未畢數車冰陷今名其豦為危渡口是也魏改曰清寧河此水常有蛟入五月恒暴遂變為人於岸上與人并行至懸岸處推之與人俱下衡水信都記曰衡水亦曰長蘆水即濁漳之下流也水有袁潭渡歷下愽城北而逶迤東北注謂之九爭曲水味鹹苦俗稱苦河亦謂之黃漳河是也白溝水信都記曰白溝水地接館陶界隋煬帝導為永濟渠亦名御河南自相州洹水縣界流入又北難河出焉蓋魏時河難所以導以利行故瀆故此瀆有難之稱矣屯氏河注水經曰大河故瀆北為屯氏河漢書溝洫志曰自塞宣坊河復北決於館陶分為屯河氏廣深與大河等鳴犢河漢書地理志曰河水自靈縣別出為鳴犢河溝洫志曰元帝永光五年河決清河鳴犢口而屯氏河絕滅滭發水隋圖經曰滭發水今俗亦名妬女泉大如車輪水色青碧百姓祀之婦人不得艷裝衣新彩臨之必興雨雹故云妬女介子推妹也窮魚水竹書紀年曰晉荀瑤伐中山取窮魚之丘水經云水出魚山山石若巨魚水發其下漏水漏水曰一名澧水一名鴛鴦水俗謂之百泉源出龍岡縣東南平地以道其源納總眾泉合成一川故也亦謂之鴛鴦水魏都賦所云鴛鴦交谷是也桑乾河水經曰桑乾河水潛承太原汾陽縣北燕京山天池也天池一名大池俗謂之衣連汭在靜樂縣北百四十里注水經云桑乾河水潛承燕京之池池在山東之上周廻里餘其水澄停鏡凈潭而不流若安定朝郍之湫池也池內曾無片草及其風籜有淪輒有小鳥翠色投池衘水出會稽之耘鳥矣巨馬河注水經曰巨馬河即漆水也東北經郎山西望眾崖競舉若鳥翼立石嶄巖似劍戟之狀又南流經刀山層巖直上于霄望崖側若積刀環五渠水邢子勵記曰後魏延興初文安縣人孫願捕魚於五渠水中有群魚從西來共以柴塞之忽有人謂願曰須臾當大得魚若願多求宜勿殺也後願下網果得大魚其狀如鯉而大願以為異物遂殺食之俄然風雨晝昏唯聞鳥飛聲比風息雨霽有人乘舩至者云前見群魚無數飛入於海願遂不復漁矣因呼入海之處為飛魚口也金河郡國志曰雲中郡有紫河鎮界內有金河水其泥色紫故曰金河
