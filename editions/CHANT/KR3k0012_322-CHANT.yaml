body:
  text: 兵部五十二火攻孫子曰火攻有五一曰火人典敵陳師敵傍近草因風燒之戰之助也二曰火積燒其積蓄三曰火輜燒其輜重四曰火庫當使姦人入敵營燒其兵庫五曰火墜墜墮也以火墮敵營中也尖頭之法以鐵籠火著箭頭強弩射敵營中一曰火道燒絕其糧道行火必有因因姦人也又因風燥而焚之煙火素具燒煙具也先具燒燧之屬發火有時起火有日時者天之燥也日者宿在戍箕東壁翼軫也戊翼參日宿此宿之日風起凡此四宿者風起之日蕭世誠云春景丁夏戊巳秋壬癸冬甲乙此日有疾風猛雨也吾勘太乙中有飛鳥十精知風雨期五子元運式也各候其時可用火也凡火攻必因五火之變而應之火發於內則軍應之於外以兵應之使姦人縱火於敵營內當速進以攻攻其外火發而兵靜者待而勿攻極其火力可從而從之不可從則止見利則進知難則止極盡火力可則進不可則止吾無使敵知吾為火可發於外無待於內以時發之火發於上風無攻於下風不便也燒之必退退而逆攻之則必為所害者也晝風久風夜止數常也陽風也晝風則火氣相動夜也風卒欲縱火亦當如風之長短也几軍必知五火之變以數守之既知起五火之變當復以數消息其可否也故以火佐攻者明取勝明也史記曰田單齊人也燕將樂毅攻齊單保即墨不下燕兵圍之單乃收城中牛千餘頭盡以五采束刃於角縛葦於尾鑿城下數穴牽牛詣穴以燒其尾端牛尾熱奔燕軍燕軍大亂所觸皆死大克燕軍漢書曰李陵征匈奴戰敗班師為單于所逐及於大澤匈奴於上風縱火陵亦先放火燒斷葭葦用絕火勢蕭代誠曰敵用火焚吾門思火減敗吾當更積薪助火使火勢盛敵不得入亦拒火之方也後漢書曰奉車都尉竇固出擊匈奴以班超為假司馬將兵別擊伊吾戰於蒲類海多斬首虜而還伊吾匈奴中地名今在伊州納職縣界前書音義曰蒲類匈奴中海名在燉煌北也固以為能遣與從事郭恂俱使西域超到鄯善鄯本西域樓蘭國也昭帝元鳳四年改為鄯善去陽關一千六百里去長安六千一百里鄯善王廣奉超禮敬甚備後忽更踈懈超謂其宮屬曰覺廣禮意薄乎此必有北虜使來狐疑未知所從故也明者睹未萌况己著邪乃召侍胡詐之曰匈奴使來數日今安在乎侍胡惶恐具服其狀超乃閉侍胡悉會其吏士三十六人與共飲酒酣因激怒之曰卿曹與我俱在絕域曹輩欲立大功以求富貴今虜使到裁數日而王廣禮敬即廢如今鄯善收吾屬送匈奴骸骨長為豺狼食矣為之奈何官屬皆曰令在危亡之地死生從司馬超曰不入虎穴不得虎子當今之計獨有因夜以火攻虜使彼不知我多少必大震怖可殄盡矣滅此虜則鄯善破膽功成事立矣眾曰當與從事議之超怒曰吉凶決於今日從事文俗吏聞此必恐而謀洩死無所名非壯士也眾曰善於夜遂將吏士往奔虜營會天大風超令十人持鼓藏虜舍後約曰見火然皆當鳴鼓大呼餘人悉將兵弩夾門而伏超乃順風縱火前後鼓噪虜眾驚亂超手格殺三人兵吏斬其使及從士三十餘級餘眾百許人悉燒死東觀記曰斬得匈奴節使屋賴帶副使北離支首及節也明日乃還告郭恂恂大驚既而色動超知其意舉手曰掾雖不行班超何必獨擅之乎恂乃說又曰楊琁字機平為零陵太守是時蒼梧桂陽猾賊相聚攻郡縣賊眾多而琁力弱吏民憂恐琁乃特制馬車數十乘以排囊盛石灰於車上排囊即令排袋也排蒲拜切繫布索於馬尾又為兵車專彀弓弩剋共會戰乃令馬車居前順風鼓灰賊不得視因以火燒布然馬驚奔突賊陣因使後車弓弩亂發鉦鼓鳴震群盜波駭破散追逐傷斬無數梟其渠師郡境以清又曰皇甫嵩討黃巾賊張角嵩保長社賊來圍城嵩兵少軍中皆恐乃召軍吏謂曰兵有奇變不在眾今賊依草結營易為風火若因夜縱火必大驚亂吾出兵擊之其功可成其夕遂大風嵩乃約勒軍士皆束炬乘城使銳士間出圍外縱火大呼城上舉燎應之嵩因鼓而奔其陣賊驚亂奔走嵩進兵討之與角弟梁戰於廣宗梁眾精勇嵩不能剋明日乃閉營休士以觀其變知賊意稍懈乃潛夜勒兵雞鳴馳赴其陣至脯時大破之又曰劉表死曹公剋荊州得劉琮水軍沿流東下吳主孫權遣周瑜領兵逆曹公遇於赤壁初一交戰曹公軍披退引次江北瑜等在南岸瑜部將黃蓋曰今寇眾我寡難與持久然觀軍方連舡艦首尾相接可燒而走乃取蒙衝鬥艦數十艘實以薪草膏灌其中裹以帷幕上建牙旗先書報曹公欺以欲降又先備走舸各繫大舡後因風相次俱進曹公軍吏士皆延頸遙觀指言蓋降諸舡同時發火時風盛猛悉延燒岸上營落頃之熛焰張天熛音標火飛也人馬燒溺死者甚眾遂敗退耳魏志諸葛誕傳曰太傅司馬宣王潛軍東伐以誕為鎮東將軍後母丘儉反大為攻具晝夜五六日攻南圍欲決圍盪出圍上諸軍臨高以發石車火箭逆燒破其攻具晉書王濬伐吳吳人於江險磧要害之處普以鐵鏁橫截之又作鐵錐長丈餘暗置江中以逆拒舡先是羊祐獲吳間諜具知情狀濬乃作大筏數十亦方百餘步縛草為人被甲持杖令善水者以筏先行筏遇鐵錐輒著筏去又作火拒長十餘丈大數十圍灌以麻油在舡前遇鏁燃炬燒之須臾融液斷絕於是舡無所礙晉中興書曰殷浩北伐江逌為長史及丁零反叛浩軍震懼姚襄去軍十里結草為營方欲擊浩浩甚懷憂令逌代之逌曰今兵非不精而眾少於羗且壍柵甚固難與校力乃取數百雞以長繩連之腳皆繫火一時驅放以兵遏後群雞駭散一時飛過壍並集羗營皆燃因其驚亂縱兵擊之襄遂摧退宋書王玄謨圍滑臺城內多茅屋眾皆曰宜以火箭燒之又殷琰傳曰琰與劉勔相持勔用茅苞土擲以塞壍擲者如雲城內乃以火箭射之又曰良吏杜慧度傳曰慧度為交州刺史盧脩龍破合浦徑向交州慧度自登高艦合戰放火箭雉尾炬修眾俱然一時潰散齊書宗室脩安王遙光反詔太子右衛率左興盛屯東府東離門眾軍圍東城臺軍射火箭燒東北角樓至夜城潰陳書曰武帝時江東梁將王琳率兵東下陳遣大將侯瑱等拒之瑱以琳軍威方盛乃引軍入蕪湖避之是時西南風至急琳謂得天時將取楊州侯瑱等徐出蕪湖以躡其後北及兵放火西南風翻為瑱用琳兵放火燧以擲瑱舡者返燒其舡琳兵潰亂透水死者十二三其餘皆棄舡上岸為陳軍所殺殆盡北史曰李詢仕周遷司衛上士武帝幸雲陽宮委以留府事衛王直作亂焚肅章門詢於內益火故賊不得入武帝善之後周書曰遣將伐高齊齊將叚韶與太尉蘭陵王長恭同往扞禦至西境有柏谷城者乃絕險古城千仞諸將莫肯攻圍韶曰分北河東勢為國家之有若不去柏谷事同痼疾計彼援兵會在南道今斷其要路救不能來且城勢雖高其中甚狹火弩射之一朝可盡諸將稱善遂鳴鼓而攻之城潰獲儀同薛敬禮大斬獲首虜仍城華谷置戍而還隋書曰文帝時高頴獻取陳之策曰江南土薄舍多竹茅所有儲積皆非地窖古孝切密遣行人因風縱火待彼修立復更燒之不出數年自可財力俱盡帝行其策由是陳人益弊通典曰火兵以驍騎夜銜枚縛馬口人負束薪麻蘊懷火直抵敵營一時舉火營中驚亂急而乘之靜而勿攻凡火攻皆因天時燥旱營舍茅竹積穗糧軍營於秸草宿莽之中因風而焚也又曰火獸以艾熅火熅於問切置瓢中瓢開四孔繫瓢於野豬麞鹿項下針其尾端向敵營而縱之奔入草中瓢敗火發又曰火禽以胡桃剖分空中實艾火開兩孔復合繫野雞項下針其尾而縱之奔入草中器敗火發又曰火盜遣人暗伏與敵人同者夜竊號逐便懷火偷入營焚其積聚火發必亂而出又曰火弩以擘張弩射及三百步者以瓢盛火符矢端以數百張中夜齊射敵營中芻草積聚又曰以小瓢盛油冠矢端射城樓櫓版木上瓢敗油散因燒矢鏃內中射油散處火立燃復以油瓢續之則樓櫓盡焚謂之火箭又曰磨杏子中空以艾實之繫雀足上加火薄暮群放飛入城壘中捷宿其積聚廬舍須臾火發謂之火杏矣水攻孫子曰以水佐攻者強水以為衛故強也水可以絕而可以奪水但以絕其敵道分敵軍不以奪敵蓄積史記曰漢王遣韓信已定齊臨淄遂東追齊王田廣至高密項羽使龍且將二十萬救齊田廣龍且并軍且子余切與信戰未合人或說龍且曰漢兵遠鬥窮寇力戰其鋒不可當齊楚自居其地戰兵易敗散不如深壁令齊王使臣招所亡城亡城聞其王在楚來救必反漢漢兵二千里客居齊齊城皆反之其勢無所得食可無戰而降也龍且曰吾救齊不戰而降之吾何功今戰而勝之齊之半可得何為止遂戰與信夾濰水陣維音唯韓信乃夜令人為萬餘囊盛沙壅水上流引軍半度擊龍且佯不勝還走龍且果喜曰固知信怯也遂追信度水信使人決壅囊水大至龍且軍太半不得度即急擊殺龍且水東軍遂敗走後漢書曰董卓將兵三萬討先零羗為羗胡所圍糧食乏絕進退逼急乃於所度水中偽立𨻳以捕魚𨻳音偃而潛從𨻳下過軍比賊追之決水深不得度時眾軍敗退唯董早全師而還也又曰曹公圍呂布於下邳引沂泗二水灌城剋之又曰光武至邯鄲故趙繆王子林繆王景七代孫名元前書曰元坐殺人為大鴻臚所奏謚曰繆音謬東觀記曰林作臨字說光武曰赤眉今在河東但決水灌之百萬之眾可使為魚南史曰齊高帝新踐祚恐魏致討以送劉昶為辭以為軍衝必在壽春非垣崇祖莫可為捍徙為豫州刺史監二州諸軍事封望蔡侯建元二年魏遣劉昶攻壽春崇祖乃於城西北立堰塞肥水起小城使數千人守之謂長史封伯曰虜必悉力攻小城若破北堰放水一激急愈二峽自然沉溺豈非小勞而大制耶及魏軍由西道集堰南分軍東路內薄攻小城崇祖著白紗帽肩輿上城手自轉式日晡時決小埭水勢奔下魏攻城之眾溺死千數大眾退走梁書曰魏降人王足陳計求堰淮水以灌壽陽足引北方童謠曰荊山為上格浮山為下格潼江為激溝併灌鉅野澤帝以為然使水工陳承伯材官將軍祖𣈶視地形咸謂淮內沙土漂輕不堅實其功不可就帝弗納發徐楊人卒二十戶取五以築之假康絢節督淮上諸軍事并堰作役人及戰士有眾二十萬於鍾離南起浮山北抵巉石依岸築土合脊於中流十四年四月堰將合淮水漂沒復決潰眾患之或謂江淮多蛟能乘風雨決壞岸崖其性惡鐵因是引東西二冶鐵器大則釜鬲小則钁鋤數千萬沉於堰所猶不能合乃伐樹為幹以巨石加土其上緣淮百里內崗陵木石無巨細盡負擔者肩穿夏日疾疫死者相枕蠅蠱晝夜聲合武帝愍之遣尚書右僕射袁昂侍中謝舉假節慰勞并加蠲復是冬寒甚淮泗盡凍士卒死者十有七八帝遣賜以衣袴十二月魏遣將楊大眼聲決堰絢命諸軍撤營露次以待之遣其子悅挑戰斬魏咸陽王府司馬徐方興軍小却十五年四月堰成其長九里下闊一百四十丈上廣三十五尺高二十丈深十九丈五尺夾之以堤并樹杞柳軍人安堵列居其水清潔俯視居人墳墓了然皆在其下或謂絢曰四瀆天所以節宣其氣不可久塞若鑿湫東注則游波寬緩堰得不壞絢然之開湫東注人縱反間於魏曰梁所懼開湫魏人信之果鑿山深五丈開湫北注水日夜分流湫猶不減其月魏軍竟潰而歸水之所及夾淮方數百里地魏壽陽城戍稍徙頓八公山北南居人散就崗壟初起徐州界刺史張豹子謂己必尸其事既而絢以他官來監作豹子甚慚由是譖絢與魏交邇帝雖不納猶以軍事徵絢尋除司州刺史領安陸太守絢還後豹子不脩堰至其秋淮水暴長堰壞奔流于海殺數萬人其聲若雷聞三百里水中怪物隨流而下或人頭魚身或龍形馬首殊類詭狀不可勝名陳書曰閩中守陳寶應舉兵反據建安晉安二郡界水陸為柵將軍章昭達討之據其上流命軍士伐木帶枝葉為筏施拍於其上拍普伯切綴以大索相次列營帶夾兩岸寶應數桃戰昭遠按甲不動俄而暴雨江水大漲昭達放筏衝突水柵盡破又出兵攻其步軍寶應大潰遂剋定閩中又曰歐陽紇據嶺南反遣將章昭達督眾軍討之紇乃出柵涯口涯音崖多聚沙石盛以竹籠置于木柵之外用遏舟艦昭達居其上流裝艦造舟以臨賊柵又令軍人衘刀潛行水中斫竹籠篾皆解因縱大艦隨流突之賊眾大敗因擒紇三國典略曰東魏慕容紹宗高岳等堰洧水以灌頴川時有怪獸每衝壞其堰岳等悉眾苦攻分休迭進王思政身當矢石與士卒同其勞苦屬以大雪岳眾多死岳等乃作鐵龍雜獸用厭水神後周書曰太祖遣大將軍趙貴帥軍至穰兼督諸州兵以授王思政高岳起堰引洧水以灌城自頴川以北皆為陂澤救兵不得至唐書曰武德中劉黑闥據河北反太宗率兵討之先遣堰治水上流淺令黑闥得渡及戰遽令決堰水至深丈餘賊徒既敗爭渡水溺死者數千人咸以為神黑闥與二百餘騎奔于突厥悉虜其兵眾河北復平又曰武德中李靖隨河間王孝恭討蕭銑屬江水泛長諸將皆請停兵以待水退靖謂孝恭曰以速為神機者時不可失今若乘水漲之勢倏忽至其城下可謂疾雷不及掩耳兵家上策也孝恭從之進兵次夷陵銑將文士弘屯清江靖與之決戰大破賊軍仍率所部星馳進發營於荊州城下弘既敗銑眾莫不震讋靖又破其將楊君茂鄭秀等遂圍城數重其夜銑遣使請降靖即入據其城號令嚴肅軍無私焉淮南子曰始智伯率韓魏三國伐趙晉陽決水而灌之城中緣木而處懸釜而炊襄子謂張孟談曰城力已盡糧食匱武夫病為之奈何張孟談曰亡不能存危不能安無為貴智臣請試潛行伏行也見韓魏之君而約之乃見韓魏之君說曰聞之脣亡而齒寒今智伯率二君而伐趙趙將亡矣則君為之次矣今而不圖之禍將及二君二君曰智伯之為人麤中而少親我謀而泄事必敗為之奈何張孟談曰言出二君之口入臣之耳人孰知之者乎且同情相成同利相死君亦圖之二君乃與孟談謀陰與之盟張孟談乃報襄子至期日之夜趙民煞守隄之吏決水灌智伯智伯軍救水而亂韓魏翼而擊之襄子卒犯其前大敗智伯軍煞其身而三分其國太白陰經水攻具篇曰以水佐攻者強水因地而成勢為源高於城本大於末可以遏而止可以決而流故晉水可以灌安邑汾水可以浸平陽先設水平測其高下可以漂城灌軍沉營殺將又曰水平槽長二尺四寸兩頭及中間鑿為三池池橫闊一寸八分長一寸深一寸二分分間相去一尺五分中間有通水渠闊二分深一寸三分池各置浮木木闊狹微小施池匡厚二分上建立齒高八分闊一寸七分厚一分槽下置轉關腳高下與眼等以水注之三池浮木齊起眇目視之齒齊平則為天下准式十步一里乃至數十里目力所及置照版度竿亦白繩計其尺寸則高下丈尺分寸可知又曰照板形如方扇長四尺下二尺黑上二尺白闊三尺柄長二丈刻作二百寸二千分每寸內小刻其分隨向遠近高下立竿以照板暎之眇目視三浮木齒及照板又以度竿上尺寸為高下而往尺寸相承則山崗溝澗水源高下深淺可以分寸而度
