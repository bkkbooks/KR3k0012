body:
  text: 布帛部五縑說文曰縑并絲繒也釋名曰縑兼也其絲細緻數兼於絹染縑五色細且緻不漏水也續漢書曰張奐少立志節董卓慕之使其兄遺縑百疋奐惡卓為人絕而不受東觀漢記曰王丹資性清白疾惡豪強時河南太守同郡陳遵關西之大俠也其友人喪親遵為護喪事賻助甚豐丹乃懷縑一疋陳之於主人前曰如丹此縑出自機杼遵聞而有慚色又曰王丹子有同門生喪親家在中山白丹欲往奔慰結侶將行丹怒而撻之令寄縑以祠焉或問其故丹曰交道之難未易言也又曰上大發關東兵自將上隴隗囂眾潰走圍解於是置酒高會勞賜來歙班坐絕席在諸將之右賜歙縑千疋又曰馬援行亭鄣到右北平詔書賜援鉅鹿縑三百疋又曰蔡彤為襄賁令是時盜賊尚未悉平而襄賁清靜詔書增秩一等賜縑百疋策書勉勵後漢書曰趙熹避赤眉難入丹水遇更始親屬皆裸跣塗炭飢困不能前塗炭者若陷泥墜火喻窮困之極也熹見之悲感所裝縑帛資糧悉以與之將護歸鄉里東觀漢記曰顯宗時詔賜降胡縑尚書案事誤以十為百上見司農上簿大怒召郎將笞之鍾離意因叩頭曰過誤之失常人所容若以懈慢為愆則臣位大罪重郎位小罪輕咎皆在臣臣當先坐乃解衣就笞帝意乃解謝承後漢書曰汝南周躬為櫟陽令功曹萬良為父報讎自械詣獄躬解械放良後良齎縑五百餉躬𨳲門不受華矯後漢書曰孝獻伏后興平二年立為皇后李𠐶郭汜等敗乘輿於曹陽帝乃潛夜渡河走六宮皆步行出營后手持縑數疋董承使孫微以刃脅奪之殺傍侍者血濺后衣袁山松後漢書曰天鳳五年樊崇起兵於莒號曰赤眉圍莒數月或說樊崇曰豈有父母之國而攻之乎莒中人出縑數千疋以自贖乃引去范曄後漢書曰永平十五年幸偃師詔命自殊死以下贖死罪縑三十疋右趾至髡鉗城旦春十疋完城且至司寇五疋又曰戴封常遇賊財物悉被略奪唯餘縑七疋賊不知處封乃追以與之曰知諸君乏故送相遺賊驚曰此賢人也盡還其器物後舉孝廉又曰期門郎程偉妻能通神變化偉當從出無衣甚愁妻即為致兩縑得以為衣漢官典職儀曰尚書郎直供青縑白綾被魏志曰漢桓帝末董卓為軍司馬從中郎張奐征并涼州有功賜縑九千疋卓悉以分與吏士南史曰孫謙齊初為錢塘令御煩以簡獄無繫囚及去官百姓以謙在職不受餉遺追載縑帛以送謙辭不受梁書曰何遠輕財好義周人之急言不虛妄蓋天性也每戲語人云卿能得我一妄語則謝卿以一縑眾共伺之不能記也趙書曰中書令徐光奏議以東郊親耕改服青縑袴褶後魏書曰劉芳初入魏雖處窮窘之中而業尚貞固聰敏過人篤志墳典晝則傭書以自資給夜則誦經不寢至有易衣併日之弊而澹然自守不汲汲於榮利不戚戚於貧賤乃著窮通論以自慰常為諸儒傭寫經論筆跡稱善卷直一縑歲中能入百餘疋如此數年賴以頗振又曰楊津除侍御中尉孝文幼冲文明太后臨朝津曾入侍左右忽欬逆失聲遂吐數升藏之衣袖太后聞聲閱而不見問其故具以實言遂以敬慎見稱而賜縑百疋遷符璽郎又曰李元忠嘗貢齊文襄王蒲桃一盤文襄報以百縑其見賞重如此又曰高遵性不廉清在中書時每假歸山東必借備騾馬將從百餘屯逼人家不得絲縑滿意則詬詈不去旬月之間縑布千數郡邑苦之又曰薛琡字曇珍正光中行洛陽令部內肅然時以久旱京師見囚悉召集都亭理冤滯洛陽獄有三人孝明嘉之賜縑百疋北齊書曰賈思伯遷南青州刺史初思伯與弟思休師事北海陰鳳授業竟無資酬之鳳遂質其衣服時人為之語曰陰生讀書不免癡不識雙鳳脫人衣及思伯之部送縑百疋遺鳳因具車馬迎之鳳慚不往時人稱歎焉隋書曰田德懋丁父艱哀毀骨立廬於墓側負土成墳上聞而嘉之遣散騎侍郎元志就吊焉復降璽書并賜縑二百疋米百石復下詔表其門閭又曰文帝幸并州留高穎居守及上還京賜縑五千疋風俗通曰臨淮有一人持一縑到市賣之遂還值雨因共披戴後有人求庇蔭一頭之地雨霽因共爭之各云我縑丞相薛宣決曰縑直數百錢何足紛紛呼騎吏中斷縑各與半後人曰受恩矣前撮之縑主稱怨不已宣考乃歎服傅子曰漢末魏太祖以天下凶荒資財乏匱擬古皮弁裁縑帛以為帙何晏九州論曰清河縑總房子好綿荀勗為晉文王與孫皓書曰餉細縑十疋帛尚書堯典曰舜脩五禮五玉三帛周禮地官曰媒氏凡嫁子娶妻入幣純帛無過五兩又春官曰肆師之職常立國祀之禮以佐太宗伯佐助也立大祀用玉帛牲牷又春官典命曰凡諸侯之適子誓於天子攝其君則下其君之禮一等未誓則以皮帛繼子男又夏官下職方氏曰并州其利布帛又冬官考工記曰繼子男執皮帛謂公之孤也見禮次子男贄用束帛而以豹皮表之為飾又曰涷帛以欄為灰渥淳其帛實諸澤器淫之以蜃渥讀如繒人渥管之渥以欄木之灰漸釋其帛也鄭司農云澤器謂滑澤之器蜃謂炭也士冠禮曰素積白屨以魁柎之說曰魁蛤也周官亦有白盛之蜃蜃蛤也玄謂淫薄粉之令帛白蛤今海旁有焉清其灰而盝之而擇之清澄也於灰澄而出盝晞之晞而揮去其蜃而沃之而盝之而塗之而宿之更渥淳之明日沃而盝之朝更沃至夕盝之又更沃至旦盝之亦七日如漚絲也晝暴諸日夜宿諸井七日七夜是謂水涷禮記月令曰季春之月開府庫出幣帛周天下勉諸侯聘名士禮賢者又檀弓上曰伯高之喪孔氏之使者未至冉子攝束帛乘馬而將之孔子曰異哉徒使我不得成禮於伯高又王制曰布帛精麤不中數廣狹不中量不鬻於市又曰七十非帛不暖又禮運曰後聖有作治其絲麻以為布帛又內則曰國君世子生三日卜士負之告者宿齋朝服寢門外保受乃負之宰禮負子賜之束帛又曰婦人或賜之飲食衣服布帛則受而獻諸舅姑又坊記曰子云禮之先幣帛也欲民之先事而後祿也此禮謂所執之贄以見者也既相見乃奉幣帛以修好也或云禮之光辭而後幣帛左傳襄上曰季文子卒大夫入歛公在位宰庀家器為葬備無衣帛之妾無粟食之馬無藏金玉無重器備又哀上曰邾茅夷鴻以束帛乘韋自請救於吳無君命故言自毛詩鹿鳴曰鹿鳴醼群臣嘉賓也既飲食之又實幣帛筐以將其厚意周易賁卦曰賁於丘園束帛戔戔春秋元命苞曰須女四星十二度主布帛史記曰武帝使使束帛加璧安車駟馬迎申公又曰子貢結駟連騎束帛之幣以聘享諸侯所至國君無不界迎與抗禮者夫使孔子名布揚於天下者子貢先後之也又曰帛千鈞比千乘家又曰陳勝乃多書帛言陳勝王置人所罾魚腹中卒買魚得書怪之漢書曰武帝使東方朔射中上曰善賜帛十疋郭舍人曰朔齊人多變更致他物射之中則臣榜百不中賜臣帛朔又中乃榜舍人又曰館陶公主乃命私府曰董君所發一日金滿百斤錢滿百萬帛滿千疋乃白之又曰婁護為諫議大夫使郡國護假貸多持幣帛過齊上書求上先人冢因會宗族故人各以親䟽遺以束帛一日散百金之費東觀漢記曰耿純於邯鄲見上遂自結納獻馬及縑帛數百疋又曰長安語云城中好廣袖四方用疋帛范曄後漢書曰明帝出諸貴人當徙居南宮馬太后感析別之懷賜越帛三千端雜帛二千疋又曰永平六年雒山出寶鼎廬江太守獻之於廟賜三公帛五十疋九卿二千石半之續漢書曰宋秉字巨公拜御史中丞布被瓦器居不粟馬出無從車車駕幸其府舍歎曰雖楚國二龔不如雲陽宣巨公賜布帛帳帷什器後漢書曰公孫述造十層赤樓帛蘭船蓋以帛飾其欄檻也魏略曰陳留邯鄲淳奏投壺賦文帝以為尚書郎賜帛十疋魏志曰張伯英專精於書凡家之衣帛必書而後練晉陽秋曰董威輦常宿白社中時乞於市得殘碎繒結以自覆金帛桂綿則不肯受沈約宋書曰文帝袁皇后每就上求錢帛贍家上性節儉所得不過錢三五萬帛三五十疋南史曰宋鮑昭嘗謁臨川王義慶未見知欲貢詩言志人止之曰卿位尚卑不可輕忤大王昭勃然曰千載上有英才異士沉沒而不聞者安可數哉大丈夫豈可遂蘊智能使蘭艾不辯終日碌碌與鷰雀相隨乎於是奏詩義慶奇之賜帛二十疋齊書曰劉顯將之尋陽朝賢畢袓道顯懸帛十疋約曰衣來者以賞之眾人竟改常服不過長短之間顯曰將有甚於此矣既而周弘正綠絲布袴繡假種軒昂而至折標取帛梁書曰郭祖深清儉常服故布襦素木按食不過一肉有姥餉一早青瓜祖深報以疋帛後有富人効之以貨鞭而徇眾朝野憚之後魏書曰高允拜中書令帝幸允第唯草屋數間布被縕袍廚中鹽菜而已帝歎息曰古人之清貧豈有此乎即賜帛五百疋粟千斛又曰韋珍字靈智累遷顯武將軍郢州刺史所在有聲績朝廷嘉之遷龍騎將軍賜驊騮二疋帛五十疋穀三百斛珍乃召集州內孤貧者謂曰天子謂我能撫綏卿等故賜以穀帛吾何敢獨當遂以所賜悉分與之隋書曰文帝嘗遣高頴大閱於龍臺澤諸軍部伍多不齊整唯閻毗一軍法制肅然頴言之於上時蒙賜帛又曰張定和初為侍官會平陳之役定和當從征無以自給其妻有嫁時衣服定和將鬻之妻靳固不與定和於是遂行以功拜儀同賜帛千疋遂棄其妻唐書曰高祖傾府藏以賜勳人而又患國計不足劉義節進計曰今義師數十萬並在長安樵薪貴而布帛賤若伐街衢及苑中之樹為樵易布帛歲取數十萬立可致也又藏內繒絹疋皆有餘軸之使申截剩物以供雜費動盈千餘萬疋高祖並從之大收其利又曰太宗召太子舍人陸敦信勞之曰爾所錄古先太子善惡之事多所規諷誠有可嘉因賜帛五十叚又曰貞觀中皇后所生長樂公主將出降勑資送倍於長公主魏徵諫以漢明帝以朕子安得同於先帝子后聞之以為難可謂正直社稷之臣也固請遣中使齎帛五百疋賜徵又曰貞觀十一年賜遭水之家帛十五疋半毀者八疋又曰王君廓少孤貧無行以剽劫為業亡命聚徒以逆鬢竹器籠人頭而奪其繒帛又曰開成中以諫議大夫蕭俶為楚州刺史俶故相俛之弟將赴任延英候辤上曰蕭俛是先朝賢相筋力未衰即須一來京國朕今賜手詔及賜帛三百疋以備山谷所乏戰國策曰公子魏牟過趙趙王坐前有尺帛且令工以為冠趙王曰公子臨寡人願聞所以為天下魏牟曰王能重王之國若是尺帛則王之國大治矣王有此尺帛何不令郎中以為冠為冠而敗之奚虧王國而王必待工乃使之今社稷為丘墟先人不血食王不以與工乃與幼艾也事具冠門河圖玉板曰崑崙以東得大秦之國人長十丈皆衣帛韓詩外傳曰孔子之齊遇程丕子於譚郯之間傾蓋而語終日孔子曰取束帛十疋以贈先生又曰孔子顏淵登魯東山望吳昌門淵曰見一疋練前有生藍子曰白馬蘆蒭也東方朔別傳曰武帝幸甘泉長平阪道中有蟲覆地如赤肝朔曰必秦獄處也夫愁者得酒而解乃取蟲置酒中立消麋賜帛百疋後屬車上盛酒為此故也法言曰禽獸食人之食土木衣人之帛穀人不足於晝絲人不足於夜此謂惡政也風俗通曰諸侯相贈乘馬束帛束為帛與馬相疋崔寔四民月令曰八月清風戒寒趣絹縑帛荀卿禮賦曰爰有大物非絲非帛文采成章邯鄲淳上受命述詔曰淳作此甚典雅斯亦美矣朕何以堪之哉其賜帛四十疋
