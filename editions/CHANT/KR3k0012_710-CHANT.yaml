body:
  text: 服用部十一薦蓆說文曰蓆籍也禮天子諸侯蓆有黼繡純又曰筵竹蓆也又曰蒻蒲子也可以為薦釋名曰薦所以自薦藉也蒲平以蒲作之其體平也蓆釋也可卷可釋也書曰牖間南嚮敷重篾蓆黼純華王仍几篾桃枝竹白黑雜繒緣之華彩色華玉以飾憑几因因也因生時几不改作西序東嚮敷重底席綴純文貝仍几東西廂謂之序底蒻革綴雜絲有文之具飾矣東序西嚮敷重豐蓆畫純雕玉仍几豐莞彩色為畫雕刻鏤此養國老饗群臣之坐西序南嚮敷重荀蓆玄紛純漆仍几荀蒻竹玄紛黑綬此親屬私宴之坐詩邶柏舟曰我心匪席不可卷也席雖平尚可卷禮曲禮上曰群居五人則長者必異席席以四人為節為人子者坐不中席又曰有憂者側席而坐側猶持也有喪者專席而坐專猶單也侍坐於所尊敬無餘席必盡其近者尊之端為其後來也又曰姑姊妹女子子已嫁而反兄弟不與同席而坐不與同器而食又曰奉蓆如橋居廟切橫奉之令左昂右低如有首尾然橋井上𣚃槔衡上低昂請蓆何鄉請衽何趾順尊者所安也衽臥席也坐問鄉臥問趾因於陰陽也席南鄉北鄉以西方為上東鄉西鄉以南方為上若非飲食之客則布席席間函丈謂講問客也函猶容也講問宜相對容丈足以指畫也飲食之客布席於牖前主人跪正席客跪撫席而辭客徹重席主人固辭客踐席乃坐又檀弓下曰仲尼之畜狗死使子貢埋之曰丘也貧無蓋與之以席傳曰大輅越活音席昭其儉也服虔曰越席紀草為席又曰臧文仲不仁者三下展禽廢六關妾織蒲杜預曰家人敗席與民爭利周禮天官玉府曰王廂府掌王之袵慎鄭司農云袵席許曰純袵席敷弱布也又春官曰司几筵掌五席大朝覲大饗射凡封國命諸侯王位設黼依依前南鄉設莞筵紛純加繅席畫純加次席黼純鄭司農云紛白繡也純緣純也謂紛有文如綬而狹者也繅席削蒲編以五彩若今合歡也畫謂雲氣也次者有文次列之也諸侯祭祀席蒲筵繢純加莞席紛純右彫几昨席莞筵紛純加繅席畫純筵甸役則設熊席凡喪事設葦席大戴禮曰武王踐祚席前左端之銘曰安樂必敬前右端之銘曰無行所悔後左端之銘曰一反一側爾不可忘後右端之銘曰所鑒不遠視爾所代也論語曰席不正不坐君賜食必正席先嘗之史記曰蘇秦激張儀令相秦以馬薦席坐之又曰任安田仁俱為衛將軍舍人居門下衛將軍從此兩人過平陽至主家令兩人與騎奴同席而食此二子拔刀斷席而坐主家皆怪而惡之莫敢問也又曰陳平以弊席為門漢書曰文帝以莞蒲為席又曰元帝病史丹以親密侍疾候上獨寢直入臥內頓首伏青蒲上服虔曰青綠蒲席也應劭曰以青規地曰青蒲自非皇后不得至此孟康曰以蒲青席弊地也後漢書曰更始至長安居長樂宮升前殿郎吏以次列庭中更始羞怍俛首刮席不敢視又曰來歙征隗囂徑至洛陽隗囂守將固保其城囂乃悉兵圍洛陽築堤灌城歙固守矢盡發屋斷木為兵上自將上隴囂眾潰走於是置酒高會勞賜歙班坐絕席在諸將之上又曰鄧訓於閨門甚嚴兄弟莫不敬憚諸子進見未當賜席接以溫色又曰趙丙有術曾至渡頭求舡不得乃布席於水而坐呼風乃過又曰李恂遷武威太守坐事逸織席自給東觀漢記曰郭丹師事公孫昌敬重常持蒲編席人異之又曰王常為橫野大將軍位次與諸將絕席又曰黃香家貧躬執勤苦盡心供養暑則扇床枕寒則自溫席又曰張禹為太傅尚書鄧太后以殤帝初育欲令重臣居禁內乃詔禹與三公絕席又曰宣秉建武元年拜御史中丞上特詔御史中丞與司隸校尉尚書令會同並專席而坐故京師號曰三獨謝承後漢書曰戴憑徵博士詔公卿大會群臣皆就席憑獨立世祖問其意憑對曰博士說經皆不如臣而坐居臣上是以不得就席令與諸儒難說善之後正旦朝賀令群臣說經更相難詰義有不通輒奪其席以益通者憑重五十席京師議曰解經不窮戴侍中又曰殷亮為博士講學大夫諸儒論勝者賜席亮重八九席帝曰學不當如是也又曰許敬字鴻卿其鄉吏有誣君者會於縣令坐敬拔刀斷席曰敬不忍與惡人同席又曰汝南薛惇字子禮為北海長史家貧坐無完席妻曰君無俸祿給子孫復無完席耶惇以善與妻自坐敗者又衛良字叔賢拜尚書令病罷官還家家無完席賓客省之者坐桑下談論飲水去典略曰袁尚袁熙奔遼東公孫康先置精勇於廄中請熙尚熙尚入乃縛之坐於凍地尚寒求席熙曰頭顱方行萬里何席之為蜀志曰先主少孤母販履織席為業晉書曰王渾為將軍鎮壽陽虛懷撫士坐無空席王隱晉書曰陶侃字士衡親人過侃宿時大雪無草侃母湛撤床雜蔣手剉給客牛馬晉陽春秋云蔣薦也晉中興書曰王敦死裹以席塗以蠟埋齋中晉建武起居注曰立敬后廟薦席不用綠緣晉前燕書曰高祖廆年十五出避難追者急走避民家入其屋以席自障追者入屋發視無所見遂免宋書曰林邑王陽邁初在孕其母夢生兒有人以金席籍之其色光麗夷人謂金之精者為陽邁中國云紫磨者因以為名宋起居注曰元嘉中劉禎為御史中丞奏風聞廣州剌史韋朗於州部作白蒐席三百二十領請以事追免朗官吳均齊春秋曰劉璡字子璥耿介好禮嘗與故人共車於津陽內見一女子容質甚麗盻睞之璡因抽坐席懸車中以隔絕之其正如此唐書曰代宗時晉州男子郇摸以麻辨髮持竹筐𥯤席哭於東市三十字論時政每字條一事上即召見又曰玄宗子頴王璬為劍南節度大使玄宗將幸蜀遣璬先赴本郡渡綿州江乘舡見以綵緣席而籍者顧曰此可以為寢處柰何賤之令撤去六韜曰桀紂之時婦人坐文綺之席衣以紈綺之衣家語曰明王之守也則必折衡千里之外其征也還師袵席之上漢書儀曰祭天紫壇紺席登地用六彩席六重呂氏春秋曰衛靈公天寒鑿池宛春諫曰天寒起土恐傷民曰天寒乎哉宛春曰公衣狐裘坐熊席陬隅有竈是以不寒莊子曰申屠嘉兀者也與鄭子產同師伯昏瞀人合堂同席而坐也魯連子曰人君所察者三不可以不知不知行與不行譬以方為輪也不知宜與不宜譬以錦緣薦也列子曰陽朱南之沛之梁而過老子老子曰睢睢盱盱而誰與居夫太白若辱盛德如不足楊朱曰聞命矣其往也舍者避席其來也煬者與之爭竈席晏子曰景公獵休坐地而食晏子後至戍葭而席公不悅曰子猶席何也對曰臣聞介冑坐陳不席獄尸不席二者皆憂也臣故不敢以憂侍坐公曰善令大夫皆席又曰景公飲酒移於晏子晏子曰夫鋪薦陳簠有人臣不敢與焉又移於司馬穰苴曰鋪薦席陳簠簋者有人臣不敢與焉范子計然曰六尺蘭席出河東上價七十蒲席出三輔上價百子思子曰舜不降席而天下治桀紂不降席而天下亂韓子曰趙簡子謂左右曰車席泰美夫冠雖惡頭必戴之履雖善足必履之金車如此其太美也吾將何以履之且夫美而耗上方義之道也又曰衛嗣公時縣有人於令左右縣令發褥而席弊嗣公令人遣席曰吾聞汝發褥而席弊其賜汝席縣令大驚以君為神又曰孟獻伯相魯不坐重席又曰禹為蔣席頗緣此彌侈矣而國不服者三十三殷作茵席彫文彌侈矣國之不服者五十三又曰文公至河令席袵捐之咎犯聞之曰席蓐所臥也而君棄之臣不勝其哀說苑曰孔子困於陳蔡之間居環堵之內席三經之席鹽鐵論曰古者庶人蒲席以草經及後踐蒲蒻複筵方薦帛緣者也又曰古者大夫複薦草緣蒲平單莞今富者繡茵崔豹古今注曰草名虎鬢者江東織以為席曰西王母席也東宮舊事曰太子有獨坐龍鬢席赤皮花經席一領山海經曰鵲山至箕尾山其神皆鳥身龍首祠之用白管為席西京雜記曰昭陽殿設緣熊席毛皆長一尺餘眠而雍毛自弊望之者不能見也坐則沒膝其中雜薰諸香一坐此席餘香百日不歇也又曰趙飛鷰為皇后其女弟上遺廻風席漢武帝內傳曰帝齊於尋真臺紫羅薦地夜二更後西王母至也王子年拾遺錄曰軒皇使百辟群臣受教者先列珪玉於蘭蒲席上又曰蕖葉草高五丈葉色如紺葉形如半月之勢亦曰半月花草無實其質溫柔可以為蓆又曰方丈山有草名濡䓸葉色如紺莖色漆細軟可縈海人織以為薦蓆卷之不盈一手舒之列又曰崑崙山有葭紅色可編為席溫柔如毯毳焉又曰瀛州南有金巒之館有青瑤几覆以雲紈之素席用香水柔莞又曰岱與山有草名莽音莽煌葉圓如荷去之十步炙人衣服則蕉鳥獸不敢近也刈以為席方冬彌溫以枝相磨則火出矣又曰穆王時西王母來敷碧蒲之席黃莞之薦莞色若金又曰燕昭王設麟文席麟文者錯雜寶飭席為雲霞麟鳳之狀神仙傳曰淮南王為八公設象牙席異苑曰庾寔妻毛氏五月曬暴薦蓆忽見其三歲女在蓆下薦上臥驚怛便滅女真形在別床如故不旬日而夭世傳仲夏忌移床搜神記曰羅威字德行以至孝母老天寒以身溫席而後授其處鄴中記曰石虎作席以錦裏五雜香以五綵綖編蒲皮緣之錦范汪荊州記曰安城郡今屬江州出桃枝蓆成公興內傳曰登白鹿山延成君入為敷魚鬢之席文士傳曰張儼朱異張純三人共詣驃騎將軍朱據聞三人才名告各為賦然後乃坐純席曰蓆為冬設簟為夏施揖讓而坐君子攸宜皇甫謐高士傳曰嚴君平成都市賣卜詔徵不起蜀有富人羅仲與君平善問何以不往曰無車糧中即為具車焉糧米平君曰吾病身非不足也我有餘而子不足也我有餘而子不足柰何以不足奉有餘也仲曰吾一席直萬金子無檐石乃云有餘謬矣又曰老萊子親沒隱蒙山之陽枝木為床薦艾為蓆益部耆舊傳曰張充為州治中從事刺史每自坐高床為從事設單蓆於地鍾良吏傳曰吳隱之字處默鄄城人也轉廣州剌史返舟之日唯身而已宅有茅茨六間坐無完蓆以蓬為屏風會稽先賢讚曰董昆字文通為太農帑丞坐無完蓆盧毓冀州論常山為林大陸曰澤兼葭蒲葦雲母御蓆地產不為無珍也汝南先賢傳曰鄭敬以茅葭為蓆常隨杞柳之陰會稽典錄曰隆脩字奉遷為豫章太守廳事薦編絕不改以郡風俗不整常卷坐蓆唯徐穉李贄數詣問乃待以殊禮世說曰管寧與華歆同蓆嘗讀書有乘軒冕過門者廢書出看寧割蓆分坐曰子非吾友也楚辭曰瑤蓆兮玉鎮揚雄甘泉賦云靡薜荔以為蓆兮折瓊枝以為芳魏劉禎清慮賦曰布玳瑁之蓆設蟕蠵之筵蠵悅吹切蟕蠵大龜也
