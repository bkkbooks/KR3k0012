body:
  text: 木部二木下郭子撗洞冥記曰太初三年東方朔從西郍國還漢得聲風木枝十枚九尺大如指真可愛縉雲封禪之時許貢其木為車輦之用此木生因洹之水則禹貢所謂因洹也其洹出甜波樹上有紫鷰黃鵠集其間實如細珠風吹枝如玉聲因以為名春夏馨香秋冬聲清有武事則如金革之響有文章則如琴瑟之響上以枝遍賜群臣百歲者皆以此枝頒賜人有疾者枝則汗出死者枝則折昔老聃在於周世言七百年枝未汗偓佺生於堯時已年三千歲植此竟未析上乃以枝賜朔朔曰臣已見枝三遍枯死死而復何啻於汗折而已哉里語曰年未半枝不汗此木五千歲一濕萬歲一枯縉雲之世此樹生於阿閣間也又曰元光元年起壽福靈壇闊百步四周起銅梁銀木上列種垂龍之木木似青梧高十丈有朱露色如丹汁灑其葉落地皆成珠其枝似龍之倒垂亦曰珠枝樹此壇高八尺文錯雜金色虞喜志林曰東海之魚墜一鱗崑崙之木落一葉聖人皆能知王韶之始興記曰漢將滅越王築城伐木將運之一夜木數千件頓亡越亡之徵方言曰木細枝謂之杪江淮楊楚之間謂之篾鹽鐵論曰茂木之下無豐草大塊之間無美苗搜神記曰廬江舒縣陵亭有流水邊有大樹常有黃鳥數千枚巢其頭而有故祠後見一婦人著繡衣自稱黃祖能興雲雨地鏡圖曰財在丘墟者為木變故木有折枯者其旁有財折所向在焉其在南方去木八尺其在東方去木六尺離騷曰一夫九首拔木九千又云嫋嫋兮秋風洞庭波兮木葉下又云罾何為兮木上又云搴芙蓉於木末又曰樹輪囷以相糺兮林木躍骫音委枝葉盤紆也左思蜀都賦曰其樹則擢脩榦竦長條扇飛雲拂輕霄羲和假於道峻岐陽烏回翼乎高標王彪之閩中賦曰木則騰虹籠採於峻藂流星麗光於高林松書曰青州厥貢漆絲鈆松怪石詩曰徂來之松新甫之柏徂來新甫山也又曰松柏丸丸松桷有梴梃楹有閑又曰山有喬松隰有游龍松木也龍紅草也又曰蔦與女蘿施于松柏又曰淇水悠悠檜楫松舟又曰如松柏之茂無不爾或承如松柏之枝葉常茂盛無衰落時也左傳曰晉侯使張骼輔躒致楚師求御于鄭欲得鄭人自御知其地利故也鄭人卜宛射犬吉子太叔戒之曰大國之人不可以與也言不可與等也欲使卑下人對曰無有眾寡其上一也太叔曰不然培塿無松柏培塿小阜松柏大木又曰楚郟敖即位王子圍為令尹康王弟鄭行人子羽曰是謂不宜必代之昌松柏之下其草不殖言楚君弱令尹強物不兩盛禮記曰其在人也如竹箭之有筠也如松柏之有心也二者居天下之大端矣故貫四時而不改柯易葉禮斗威儀曰君乘木而王其政平則松為常生論語曰哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗又曰歲寒然後知松柏之後彫也史記曰松柏為百木長也而守宮闕也漢書曰賈山言治亂曰秦為馳道五十步三丈而樹厚築其外隱以金椎服虔曰作壁通道隱築也以鐵椎築之樹以青松為馳道之麗使其後世曾不得斜遙而託足焉應劭漢官儀曰秦始皇上封泰山逢疾風暴雨賴得抱樹因封其樹為五大夫松泰山云岱宗小天門猶有秦時五大夫松張勃吳錄曰丁固字子賤會稽人寶鼎中拜司徒初為尚書夢松樹生腹上謂人曰松字十八公也後十八年為公遂如夢王隱晉書曰山濤遭母喪歸鄉里濤雖年老居喪過禮手植松柏又曰庾敳我來切見和嶠曰森森如千丈松雖磥砢多節目施之大廈梁棟之用又曰慕容垂攻符丕在鄴糧竭馬無草但削松木而食之宋書曰顧歡好學鄉中有學舍歡貧無以受業於舍壁後倚聽無遺忘者夕則燃松節讀書齊書曰張堪好於齋前種松柏時人曰張堪屋下陳屍梁書曰陶弘景特愛松風庭院皆植松每聞其響欣然為樂有時獨遊泉石望見者以為仙人陳書曰張譏字直言後主嗣位為國子博士東宮學士後主常幸鍾山開善寺召從臣坐於寺西南松林下勑譏堅義時索塵尾未至後主勑取松枝手以屬譏曰可代塵尾顧群臣曰此即張譏後事後魏書曰甄琛喪父於塋兆之內手種松柏隆冬之月負掘水土鄉老哀之咸助力十餘年中墳成木茂又曰彭城王勰從幸代都次于上黨之銅鞮山路大松樹十數根時帝進繖遂行而賦詩令人示勰曰吾作詩雖不七步亦不言遠汝可作之比至吾間令就也勰去帝十餘步遂且行且作未至帝所而就詩曰松林經幾冬山川何如昔風雲與古同帝大笑曰汝此詩亦責我耳唐書曰拔野古僕骨東境其地豐草人皆敦富土多霜雪其地北東里曰康于河有松木入水一二年乃化為石其色青有國人居住其人謂之康干名為石後仍松文又曰賈嘉隱年七歲以神童召見時太尉長孫無忌司空李勣於朝堂立語戲謂嘉隱曰吾所倚者何樹嘉隱對曰松樹勣曰此槐也何忽言松嘉隱曰以公配木則為松樹無忌連問之吾所倚何樹嘉隱對曰槐樹無忌曰汝不能矯對耶嘉隱應聲曰何須矯對但取其以鬼配木耳穆天子傳曰天子升長松之磴山有長松也說苑曰智襄子為室美士茁夕焉智伯曰室美矣夫對曰美則美矣意臣亦有懼也智伯曰何懼對曰臣以康秉筆事君記有之曰高山峻原不生草木松柏之地其土不肥今土木勝人臣懼其不安人也室成三年而智氏亡周書曰太姒夢周梓化為松莊子孔子曰天寒既至霜雪既降吾是知松柏之茂尸子曰荊有長松文梓孫卿子曰歲不寒無以知松柏事不難無以知君子呂氏春秋曰故百仞之松本傷於下而末槁於上抱朴子曰松三千歲者皮中有藂芝如龍形名曰飛節芝又曰玉榮記稱千歲松樹邊枝起上杪不長望而視之有如偃蓋其中有物或如青牛青羊青犬或如人服之皆壽萬歲又曰天陵偃蓋之松大谷倒生之柏凡此諸木皆與天齊其長地等其久也又曰謂夏必長而齊麥枯謂冬必彫而松柏茂符子曰符子與子登乎太山下臨千仞之淵上蔭百丈之松蕭蕭然神王乎一丘矣言不出乎耒耜心不過乎俗人其猶木犬守戶瓦雞伺晨矣先聖本記曰許由欲觀帝意曰帝坐華堂面雙闕君之榮顧亦得矣余坐華堂森然有松生於牖雖面雙闕無異乎回鸞之榮崑崙余安知其一所以取榮哉帝美由師之列仙傳曰伏生者當湯時為木正常食松脂自作石室周武王祠之偓佺好食松實能飛行逮走馬以松子遺堯不能服異苑曰漢末大亂宮人小黃門上墓樹上避兵食松柏實遂不復飢舉體生毛長尺許亂離既平魏武聞而始牧飬還食穀米齒落頭白少神境記曰滎陽南有石室室後有孤松千丈常有雙鵠晨必接翮夕輒偶影傳云昔有夫婦二人俱隱此室中年既數百化為雙鵠一者失之尋為人所害一者獨棲此松煢立哀唳玄中記曰松脂淪入地中千歲為伏神茯苓博物志曰荒亂不得食可細切松柏葉水送令下隨能否以不飢為度粥清送為佳當用柏葉五合松葉三合不可過度嵩高山記曰嵩高丘有大松樹或百歲千歲其精變為青牛或為伏龜採食其實得長生雲南記曰雲南有大松子如新羅松子周景式廬山記曰石門巖即松林也南臨石門澗澗中仰視之離離駢塵尾號為塵尾松西嶺異然如馬鬣又葉五粒者名五粒松服之長生范子計然曰松脂出隴西如膠者善聖賢冢墓記曰東平王無疆傳云王歸國思京師後薨葬東平其冢上松柏皆西靡漢武內傳曰藥松柏之膏服之可延年焦贛易林需之坤曰溫山松柏常茂不落廣州先賢傳曰頓琦至孝母喪琦獨立墳歷年乃就居喪踰制種松柏成行王羲之遊郡記曰永寧縣界海中有松門在島嶼上皆生松故曰松門也豫章記曰徐孺子墓在郡南時杜牧守徐興於墓邊種松太守謝景立碑太守夏侯嵩於碑邊立思賢頌碑今並在松大合抱本草經曰松脂一名松膏一名松昉味苦溫中久服輕身延年世說曰孫興公自言見止足知分齋前種一株松高世遠時鄰居謂孫曰松樹子非不森可憐但永無棟梁耳孫公曰楓柳雖復合抱亦曷所施也又曰李元禮冽冽如長松下風周君颼颼如小松下風金樓子曰梁武每拜山陵杖而後起涕淚所灑松為變色顏氏家訓曰齊世有席毗者清幹之士官至行臺尚書嗤鄙文學嘲劉逖云君輩詞藻譬若朝菌須臾之翫非宏材也豈吾徒比千丈松樹常有風霜不可彫悴矣劉應之曰可哉西京雜記曰東都龍興觀有古松樹枝偃倒垂相傳云已經千年常有白鶴飛止其間蔡孚賦偃松篇玄宗賜和御書刻石記之公卿咸和焉晉陽記曰郡西北有松樹枝條鬱茂垂陰數畝傳云陶桓公样柯成此樹夢書曰松為人君夢見松者見人君之徵也宋玉風賦曰夫風緣於太山之阿舞於松柏之下扶風歌曰南山石嵬嵬松柏何摧摧上枝拂青雲中心十數圍古豔歌曰馬啖柏葉人啖松脂不可常飽聊可遏飢庾肅之松讚曰流潤飛津沉精幽結貞蕤含芳仰拂素雪
