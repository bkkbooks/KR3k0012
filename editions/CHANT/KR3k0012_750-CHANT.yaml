body:
  text: 書下古文王隱晉書曰荀勗領祕書監始書師鍾朗法太康二年得汲郡冢中古文竹書勗自撰次注寫以為中經別在秘書以較經傳闕文多所證明書斷曰古文者黃帝史蒼頡所造也頡首有四目通於神明仰觀奎星圜曲之勢俯察龜文鳥跡之象採乎眾美合而為字是曰古文孝經援神契云奎主文章蒼頡放象是也夫文字者揔而為言包意以名事也分而為義則文者祖父字者子孫得之自然備其文理象形之屬則為之文因而滋蔓母子相生形聲會意之屬則謂之字字者言孳乳浸多也題於竹帛謂之書書者如也舒也紀也又曰魏衛覬字伯儒河東安定人官至侍中尤工古文筆跡精絕魏初淳古文者出於邯鄲淳伯儒寫淳古文尚書以示淳淳不能別篆書漢書曰元帝善史書史籀所作大篆籀音紂續漢書曰靈帝置鴻都門諸生能為尺璧賦及以工書鳥篆相課試至千人焉魏略曰邯鄲淳善蒼頡蟲篆許氏宇指後魏書曰竇遵善楷篆北京諸碑及臺殿樓觀門題多其書也書斷曰秦李斯妙篆始省改之為小篆著蒼頡篇七章雖帝王質文世有損益終以文代質漸就澆醨則三皇結繩五帝畫象三王肉刑斯可況也古文可為上古大篆為中古小篆為下古三古謂之實草隸謂之華妙極於華者羲獻精窮於實者籀籀史籀斯始皇以和氏之壁琢而為璽令斯書其文今泰山繹山及秦望等碑並其遺跡謂國之偉寶百世之法式斯小篆入神大篆入妙書斷曰大篆者周宣王大史史籀所作也或云柱下史始變古文或同或異謂之為篆篆者傳也傳其物理施之無窮鄄酆定六書三曰篆書八體書法一曰大篆又漢書藝文志史籀十五篇蓋此也又曰呂氏春秋云蒼頡造大篆非也若蒼頡造大篆則置古文何地即籀篆蓋其子孫是也又曰小篆者秦丞相李斯所作也增損大篆異同籀文謂之小篆亦曰秦篆蔡邕篆勢曰體有六篆妙巧入神或象龜文或化龍鱗紆體放尾長翅短身延頸脅翼勢似凌雲八分書唐書曰張廷珪與陳州刺史李邕親善屢上表薦之邕所撰碑碣之文必請廷珪八分書之甚為時人所重世論曰安定梁鵠字孟皇善八分書太祖使書信憧宮門牓題書斷曰八分書者秦羽人上谷王次仲所作也又曰後漢師宜官南陽人也靈帝好書徵天下工書於鴻都門至數百人八分稱宜官焉最大則一字徑文小則方寸千言甚矜其能而性嗜酒或時空至酒家因書壁以雇之觀者雲集酤酒多售隸書吳志曰張昭字布善隸書晉書曰王羲之尤善隸書為古今之冠論者稱其筆勢以為飄若遊雲矯若驚龍深為從伯敦導之所器重晉中興書曰李充字弘度母衛氏廷尉展之妹也充少孤母聰明有訓又善楷書妙參鍾索世咸重之充從兄咸亦善書沈約宋書曰文帝善為隸書又曰羊欣字敬元長隸書父不疑初為烏程令欣年十二時王獻之為吳興太守甚知愛之獻之嘗夏月入縣欣著新絹裙晝寢獻之書裙數幅而去欣本工書因此彌善齊書曰王僧虔善隸書宋文帝見其書素扇歎曰非唯跡逾子敬又當器雅過之齊書曰周顒少往外氏車騎將軍臧質家得衛常散隸書法學之甚能文惠太子使顒書玄圃茅齋壁國子祭酒何胤以倒薤書求就顒換之顒笑曰天下有道丘不與易也三國典略曰周白石縣男趙文深以題牓之功除魏興郡守文深字德本南陽宛人也少學楷隸有鍾王之則當時書唯文深及冀俊而已王褒尤善書文深慚恨形於言色後知好尚難及改習褒書竟無所成轉被譏誚謂之學步邯鄲焉至於碑榜人莫之逮褒亦推之宮殿樓閣皆其跡也世宗令至江陵書景福寺碑蕭察觀而美之陳書曰蕭引善隸書為當時所重高宗嘗披秦事指引署名曰此字筆勢翩翩似鳥之欲飛引謝曰此乃陛下假其羽毛耳唐書曰薛稷好古愽雅尤工隸書自貞觀永徽之際虞世南禇遂良時人宗其書跡自後罕能繼者稷外祖魏徵家圖籍多有虞禇舊跡稷銳精模倣筆能遒麗當時無及之者書斷曰隸書者秦下邽人程邈所作也邈字元岑始為縣獄吏得罪始皇幽繫雲陽獄中覃思十年益小篆方圓而為隸書三千字奏之始皇善之用為御史以奏事煩多篆家難成乃用隸書為隸人佐書故曰隸書又曰和帝時賈魴撰滂喜篇以蒼頡為上篇訓纂為中篇滂喜為下篇所謂三蒼也皆是隸字寫之隸法由茲而廣酈善長水經注曰臨淄人發古冢得棺前和外隱起為隸字言齊太公六代孫胡公之棺也唯三字是古餘同今書證知隸字出古非始於秦也成公綏隸勢曰蟲篆既繁草藁近偽適之中庸莫尚於隸草書東觀漢記曰北海靜王睦善草書臨病明帝驛馬令作草書尺牘十首焉范曄後漢書曰張超並善於草書妙絕時人魏志曰劉廙轉五官將士學文帝器之命廙通草書晉書曰王獻之時議者以為羲之草書江左中朝莫有及者獻之骨力遠不及父而媚趣過之又曰衛瓘宇伯玉與尚書郎燉煌索靖俱善草字時人號之一臺二妙漢末張芝芝字伯英善草書論者謂瓘得伯英之筋靖得伯英之肉北齊書曰趙仲舒善草隸雖與弟書字皆楷正云草不可不解若放之於人即似相輕易若當家卑幼又恐其疑三國典略曰蕭子雲齊豫章文獻王之子有文學工草書與兄子顯子昭齊名少子特又善書梁武帝稱之曰子敬之跡不及逸少蕭特之書遂逼其父陳書曰文帝時軍人於丹徒盜發晉郄曇墓獲晉右軍將軍王羲之書及諸名賢遺跡事覺其書並沒縣官藏于祕府文帝以伯茂好古多以賜之由是伯茂大工章草甚得右軍之法伯茂始興王也唐書曰賀知章善草書好事者供其牋翰每紙不過數十字共傳寶之時有吳郡張旭亦與知章相善而好酒每醉後號呼狂走索筆揮灑變化無窮若有神助時人號為張顛三輔決錄曰趙襲字元嗣為燉煌太守先是杜伯度崔子玉以工草稱於前世襲與羅暉亦能草頗自矜誇故張伯英興襲同郡太僕朱賜書曰上比崔杜不足下方羅常有餘張壹非草書曰夫草書之興也其於近古乎上非文象所垂下非河雒所吐中非聖人所造蓋秦之末官書煩冗戰攻並作軍書交馳羽檄分飛故隸草趣急速耳示簡易之指非聖人之業也今之學草者不思其簡易之旨直以為杜崔之法龜龍所見也齔齒以上茍任涉學者廢倉頡史籀竟以杜崔為楷私書相與庶獨就書云適迫遽故不及草草本易而速今反難而遲失指多矣夫杜崔張子皆有超俗絕世之才愽學餘暇遊手于斯後世慕焉專用為務鑽堅仰高忘其罷勞夕惕不息昃不暇食十日一筆月數丸墨領袖如皁脣齒常黑雖處眾坐不遑談戲展指畫地見䚡蘇來切角中骨也出血猶不休輟然其為字無益工拙亦效嚬者之增醜學步者之失節也王右軍自敘草書勢曰昔秦時諸侯爭長簡檄相傳望烽走馹正以篆隸之難不救其速遂作赴急之書蓋今草書也其先出自杜氏以張為祖以衛為父索范者伯叔也二王父子可謂兄弟薄為庶息羊為僕隸自而敘之亦不失倉公觀鳥跡之意抑體有踈密意有倜儻或有飛走流注之勢驚竦峭絕之氣滔滔閑雅之容卓犖調宕之志百體千形而呈其巧豈可一概而論哉書斷曰如淳云作起草為藁姚察曰草猶麤書為本曰藁蓋刱文議出於此草書之先因於起草又曰晉王逸少妻郄氏甚工書七子獻之最知名玄之凝之徽之操之並工草書凝之妻謝蘊有才華亦善書甚為君舅重焉獻之猶善草書幼學於父次習於張爾後改變制度別刱其法率爾師心冥合天矩觀其逸志莫之與京齊謝朓字玄暉風華黼藻當時獨步書甚有聲草殊流美亦猶薄暮川上則餘霞照人晚春林中則飛花滿目宋蕭思話工書學於羊欣得其草妙崗連盡望勢不斷絕雖無奇峰壁立之秀可謂有巧矣袁昂云羊真孔草蕭行范篆各一時之妙也飛白書宋書曰王僧虔為尚書令嘗為飛白書題尚書壁曰圓行方止物之定質修之不已則溢高之不已則躓引之不已則遺是故去之宜疾當時嗟賞以比座右銘唐書曰劉洎除散騎常侍洎性踈俊敢言太宗工王羲之書尤善飛白嘗宴三品已上於玄武門帝操筆作飛白字賜群臣或乘酒爭取於帝手洎登御座引手得之皆奏曰洎登御床罪當死請付法帝笑而言曰昔聞婕妤辭輩今見常侍登床馬周太宗嘗以神筆賜周飛白書曰鸞鳳凌雲必資羽翼股肱之寄誠在忠良高宗為飛白書以賜侍臣賜戴至德曰泛洪源俟舟楫賜郝處俊曰飛九霄假六翮賜李玄敬曰資啟沃罄丹誠大業拾遺曰大業年煬帝將幸江都命越王侑留守東都宮女半不隨駕爭泣留帝攀車惜別指血染鞅帝不廻因飛白題二十字留賜宮妓云我夢江都好征遼亦偶然但留顏色在離別只今年唐會要曰貞觀十八年五日端午日太宗為飛白書作鸞鳳虬龍等字筆勢驚絕謂司徒長孫無忌吏部尚書楊師道曰五日舊俗必用服翫相賀朕今各賀君飛白扇二枚庶動清風以增美德書斷曰飛白書者後漢左中郎蔡邕所作也王隱王愔並云飛白變楷制也本是宮殿題署勢既勁大字宜輕微不滿名為飛白王僧虔云飛白八分之輕者雖有此說案漢靈帝嘉平年詔蔡邕作聖皇篇篇成詣鴻都門上時方脩飾鴻都門伯喈待詔門下見役人以堊帚成字心有悅焉歸而為飛白之書漢末魏初並以題署宮閣其體有二刱法於八分窮微於小篆自非蔡公設妙豈能詣此可謂勝寄冥通縹緲神仙之事也法書要錄曰飛白本是宮殿八分之輕者全用楷法吳時張弘好學不仕常著烏巾時人號為張烏巾此人特善飛白能書者鮮不好之章草書晉書曰王羲之書初不勝庾翼郄愔及其暮年方妙嘗以章草荅庾亮而翼深歎伏因與羲之書云吾昔有伯英章草十紙過江顛狽遂乃亡失常歎妙跡永絕忽見足下荅家兄書煥若神明頓還舊觀書斷曰章草書漢黃門令史史游所作也衛常李誕並云漢初而有草法不知其誰蕭子良云章草者漢齊相杜操始變藁法非也王愔云漢元帝時史游作急就章解散隸體麤書之漢俗簡惰漸以行之是也又曰索靖字幼安善章草出韋誕峻險過也有若山形中裂水勢懸流雪嶺孤松冰河危石其堅勁則古今不逮後漢徐幹字伯張善章草書班固與弟超書稱之曰得伯張書藁知識讀之莫不歎息實亦藝由己立名自人成後有蘇班者平陵人也五歲能書甚為伯張之所稱歎又曰後漢張伯英損益伯度章草亦猶逸少增減元帝真書雖潤色開華精於斷割美則美矣至若高深之致質素之風俱不逮其師也然名為今古之獨步又曰張伯英章草書急就章字皆一筆而成合於自然可謂變化至極羊欣云張芝皇象鍾繇索靖時並號書聖張芝善章草書崔瑗云龍驤豹變青出於藍又刱為今草天縱尤異率意超曠無惜是非若清間長源流而無限縈迴崖谷任於造化至於蛟龍駭獸奔騰拏玃之勢心手隨變窈冥不知其所如也精熟神妙冠絕古今則百世不易之法式不可以智識不可以勤求若上士游乎沉默之鄉鸞鳳翔乎大皇之野韋仲將謂之草聖豈徒言哉又曰後漢張昶字文舒伯英季弟為黃門侍郎尤善章草家風不墜弈葉清華書類伯英時人謂之亞聖又曰後漢杜度字伯度京兆杜陵人也御史大夫延年曾孫章帝時為齊相善章草書雖史游始草書傳不紀其能又絕其跡刱其神妙其唯杜公乎韋誕杜氏傑有骨力而字畫微瘦崔氏法之書體甚濃結字工巧時有不及張芝嘉而學焉轉精其巧可謂草聖超前絕後獨步無雙矣行書書斷曰後漢頴川劉德升字君嗣造行書即正書之小偽務從簡易相間流行故謂之行書王愔云晉世以來工書者多以行書者名昔鍾元常善行狎書是也爾後王羲之獻之並造其極焉又曰劉德升桓靈之時以造行書擅名以草刱亦豐妍風流宛約獨步當時胡昭鍾繇並師其法而胡書體差瘦亦各有德升之美也又曰晉王脩字敬仁善行書嘗就右軍求書乃寫東方朔畫讚與之王僧虔云敬仁書殆窮其妙王子敬每省之曰咄咄逼人
