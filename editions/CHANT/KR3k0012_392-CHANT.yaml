body:
  text: 人事部三十二笑說文曰啞笑也咥大笑聽笑貌也忻笑喜也易同人卦曰先號咷而後笑又震卦曰震來虩虩笑言啞啞又旅卦曰鳥焚其巢旅人先笑後號咷毛詩鄁終風曰終風且暴顧我則笑謔浪笑傲中心是悼又碩人曰巧笑倩兮美目盼兮又氓曰兄弟不知咥其笑矣咥咥然笑總角之宴言笑晏晏信誓旦旦晏晏和柔也又蓼蕭曰燕笑語兮禮記檀弓曰魯人有朝祥而暮歌者子路笑之笑其為樂速也夫子曰由爾責於人終無已夫三年之喪亦已久矣禮斗威儀曰君乘土而王其民好大笑樂動聲儀曰人情喜則笑左傳宣下曰晉侯使郄克徵會于齊齊頃公帷婦人使觀之郄子將登婦人笑於房又昭四曰晉韓起聘于鄭鄭伯享之子產戒曰茍有位於朝無有不共恪孔張後至立於客間執政禦之適客後又禦之適縣間客從而笑之事畢富子諫曰夫大國之人不可不慎也幾為之笑而不陵我言數見笑則心陵侮我也又昭六曰晉士彌牟逆叔孫于箕叔孫使梁其踁待于門內曰餘左顧而欬乃殺之右願而笑乃止又昭七曰昔賈大夫貌惡娶妻而美三年不言不笑御以如皋射雉獲之其妻始笑而言賈大夫曰才之不可以已我不能射女遂不言不笑穀梁傳曰成公曰季孫行父禿晉郄克耿衛孫良夫跛曹公子首傴同聘於齊齊使禿者御禿者耿者御耿者跛者御跛者傴者御傴者蕭同叔子處臺笑之客不悅相與立胥閭而語移日不解齊有知者曰齊患必在此始也又昭公曰楚靈王圍吳朱方執齊慶封將殺之使人令於軍中曰有若齊慶封殺其君者乎封曰子一息我亦且一言曰有楚公子圍殺其兄之子麇而代之為君者乎軍人粲然皆笑論語憲問恥曰子問公叔文子於公明賈曰信乎夫子不言不笑不取乎公明賈對曰以告者過也夫子時然後言人不厭其言樂然後笑人不厭其笑義然後取人不厭其取又陽貨曰子之武城聞弦歌之聲夫子莞爾而笑曰割雞焉牛刀莞爾小笑皃史記曰吳王問孫子兵法孫子曰願得大王寵姬二人以為軍陣長吳王曰諾使二夫人為軍隊長各將一隊令宮女三百被甲而立告以兵法令隨鼓進退令曰聞一鼓皆莊二鼓操兵三鼓皆為戰形於是宮女皆掩口而笑孫子操枹擊鼓三令五申其笑如故孫子怒目如明星聲如駭虎髮上衝冠鬢旁絕纓顧謂執法曰取鈇鑕引夫人斬之又曰有躄者盤散行汲趙平原君美人居樓上臨見大笑之明日躄者到門曰臣不幸癃病而君之後宮臨而笑臣臣願得笑臣者頭應曰諸居歲餘賓客門下舍人稍稍引去者過半平原怪之一人前對曰以君之不殺笑躄者君為愛色而賤士即去耳平原乃斬美人頭自造門進躄者因謝焉其後門下乃復稍稍來又曰高祖奉玉卮為太上皇壽曰始大人常以臣無賴不能治產業不如仲力今某之業所就孰與仲多殿上群臣皆呼萬歲大笑為樂又曰孟嘗君之趙趙平原君客之趙人聞孟嘗君賢皆出觀之皆笑曰始以薛公為魁然也今視之眇小丈夫耳漢書曰公孫弘為人談笑多聞師古曰善於談笑而又多聞也又曰匡衡字稚圭好學諸儒為之語曰無說詩匡鼎來匡說詩解人頤如淳曰使人笑不能止東觀漢記曰光武微時與鄧晨觀讖云劉秀當為天子或言國師公劉秀當之光武曰安知非僕乎建武三年上徵鄧晨還京師數讌見說故舊平生為忻樂晨從容謂帝曰僕竟辨之帝大笑又曰初桓榮遭倉卒困厄時嘗與族人桓元卿俱捃拾投閑輒誦詩元卿謂榮曰卿但盡氣爾當安復施用時乎榮笑而不應後榮為太常元卿來候榮諸子謂曰平生笑君盡氣今何如元卿曰我農民安能預知此又曰桓榮為博士入會庭中詔賜奇菓受者皆懷之榮獨舉手奉以拜帝笑止之曰此真儒生也愈見敬厚魏志曰賈詡字文和文帝為五官將而臨淄侯植才名方盛各有黨有奪宗之議太祖又問詡嘿然不對太祖曰與卿言而不荅何也曰思袁本初劉景昇父子也太祖大笑於是太子遂定又曰明悼毛皇后父嘉本典虞車工卒暴富貴明帝令朝臣會其家飲宴其容止舉動甚癡騃語輒自謂侯身時人以為笑蜀志曰馬忠為人寬濟有度量但談啁張流切大笑忿怒不形於顏色王隱晉書曰杜預伐吳軍入城至都督孫歆帳下生將歆詣預王濬先列得歆頭而預生送歆洛中大笑晉中興書曰石勒與李陽相近陽性剛愎每歲與爭漚麻池共相打撲互有勝負勒貴召陽引入言及平生酒醋宣陽肘曰卿年老臂中故有力不頗復與人鬭耶孤往昔數被卿尊拳卿亦數遭孤毒手因大笑賞賜甚厚即日拜陽奉車都尉除始興太守時有醉胡乘馬徑入府門勒問門吏馮翥向走馬入門為是何人而不彈白翥見問惶遽誤對忘諱向有醉胡乘馬馳來即以呵問胡人難與語非小吏所制勒笑曰胡正自難與言其後章武太守樊坦入辭居貧衣服甚陋曰樊章武貧耶朝服何以壞惡坦性踈謬對曰頃遇羯胡資財蕩盡是以窮弊勒大笑曰羯胡賊乃爾大惡取君物盡坦汗流而不敢謝勒賜坦衣恕而不問蕭子顯齊書曰徵張敬兒為護軍將軍常侍如故敬兒武將不習朝儀聞當內遷乃於密室中屏人學揖讓荅對空中俯仰如此竟日妾待竊窺笑焉崔鴻十六國春秋後趙錄曰桃豹字安步范陽人少時以膽勇騎射稱嘗攘臂大言曰大丈夫遭遇魏太祖不封萬戶侯位上將者非丈夫也時類笑之豹罵言爾鼠子輩安知君子豹變之志乎後起中原豹為十八騎之雄事勒甚恭又南燕錄曰慕容德建平四年妖賦王始藂眾於太山菜蕪谷自稱太平皇帝置署公卿父固為太上皇兄林為征東弟秦為征西討擒之將刑焉市人皆罵之曰何為妖妄自貽族滅父兄今並何在始曰太上皇蒙塵於外征東征西為亂兵所害朕躬雖存復何聊賴其妻趙氏怒之曰君正坐口過以至於此如何臨死猶有狂言始曰皇后何不達天命自古及今豈有不亡之國行刑者以刀鐶築之始曰朕當崩終不改號德聞而笑謂左右曰熒惑之人死由狂語何可不殺南史曰宋司徒禇彥回送相州刺史王僧虔閣道壞墜水僕射王儉馬驚跣下車謝超宗撫掌笑曰落水三公墮車僕射唐書曰馬周䟽曰人主每見前代之亡則知其政教之所由喪而皆不知其身之失是知殷紂笑夏桀之亡而幽厲亦笑殷紂之滅隋煬帝大業之初又笑齊魏之失國今之視煬帝亦猶煬帝之視齊魏不可不誡又曰李義府貌狀溫恭與人語必嬉怡微笑而褊忌陰賊既處權要欲人附己微忤意者輒加傾陷故時人言義府笑中有刀戰國策曰楚王遊于雲夢有狂兕觸車徑輪彎弓而射應發而殪仰天而笑曰樂矣今日之遊萬歲千秋之後誰與此同樂乎安陵君泣涕數行而進曰臣入則侍綸席出則陪萬乘萬歲千秋之後願得身滅黃泉先辱螻蟻王大悅晏子曰景公置酒太山之上酒酣公四面望喟然歎曰寡人將去此堂堂國而死耶左右泣者三人曰臣細人也猶將難死而況公乎晏子搏髀仰天大笑曰樂哉今日之飲也公怒曰笑何也對曰臣見怯君一諛臣三是以大笑公慚而更辭老子曰下士聞道大笑之不笑不足以為道列子曰晉文公出會欲伐衛公子鉏仰而笑公問何笑曰臣之鄰人有送其妻適私家者道見桑婦悅而與言然顧視其妻亦有招之者臣竊笑之公悟其言乃引師還未至而有伐其北鄙者矣莊子曰齊桓公田於澤見鬼焉公反誒音熙詒音恰為病數日不出齊士有皇子告敖者曰臣聞野有委虵惡聞雷車之聲則捧其首而立見者殆乎霸公輾然笑曰此寡人所見也不終日而病去又曰造適不及笑獻笑不及排所造皆適則志適矣故不及笑排者推移之謂也夫禮哭必哀獻笑必樂哀樂存懷則不能與適推移矣又曰盜跖謂孔子曰人上壽百歲中壽八十下壽六十除病瘦死喪憂患其中開口而笑者一月之中不過四五日而已矣鄧析子曰故體痛者口不能不呼心悅者顏不能不笑孟子曰曾子曰脇肩諂笑病乎夏畦脇肩竦體也諂笑強笑也此言其言勞苦甚於仲夏之月治畦灌園者勤也呂氏春秋曰戎嘗寇周幽王擊鼓諸侯皆至褒姒大悅而笑王欲褒姒之笑數數擊鼓諸侯至無寇及真寇至擊鼓而諸侯不來遂為戎所滅又曰強令之笑則不樂強令之哭則不悲不由中心也淮南子曰強哭者雖疾不哀強歡者雖笑不樂戴哀者見歌而泣戴樂者見哭而笑說苑曰楚魏會於晉陽將以伐齊齊王患之使人召淳于髡曰楚魏謀欲伐齊願先生與寡人共之淳于髡大笑而不應王怫然作色曰先生以寡人國為戲乎淳于髡對曰臣不敢以王國為戲也臣憐之祠田也以篋飲與一鮒魚其祝曰下田洿耶得穀百車洿耶下田也雞堁者宜禾雞堁雞肝黑土臣笑其所以祠者少而所求者多王曰善賜之千金革車百乘立為上卿又曰趙簡子舉兵伐齊有被甲而笑者簡子曰子何笑對曰臣乃有宿笑簡子曰有以說之則可無則死對曰當桑之時臣鄰家父與妻俱之見桑中女因追之不能及其妻怒而去之臣笑其曠也簡子曰今吾伐國失國是吾曠也還師而歸論衡曰天怒則隆隆雷聲天喜應啞啞而笑郍不聞笑也桓子新論曰關東語曰人聞長安樂則出門西向笑知肉美味則對屠門而大嚼郭子曰王淳與婦鐘氏共坐見武子從庭前過淳謂婦曰生兒如是足慰人意婦笑曰若使新婦得配參軍生兒故可不翅如此參軍是渾中弟名淪字太冲為晉文王大將軍從征壽春遇疾亡時人惜焉世說曰二陸入洛而士龍不詣張公公問士衡雲何以不來機曰有疾恐公不悉故未敢自見俄而雲詣華華為人多姿質又好帛纏鬚雲見而大笑不能自己士龍嘗著纕幘上舡因水中自見其影便大笑不能已幾落水中又曰王大將軍尚主如廁見漆箱中盛乾棗以塞鼻王言廁上菓食遂為之盡既還婢擎金漆盤盛水琉璃椀盛澡豆王因倒豆著水中飲之謂是乾飯群婢莫不笑又曰殷荊州有所識作賦示之殷甚以為有才語王恭適見新文甚可觀便於手中亟出之王既讀殷笑不自勝王看竟既不笑亦不言好惡但以如意點之而已殷悵然自失語林曰吊王武子客正哭見孫子荊驢鳴變聲成笑又曰董昭失勢久為衛尉昭乃厚加意於侏儒正朝大會侏儒作董衛尉啼面敘太祖時事舉坐大笑明帝悵然不怡月中以為司徒曹瞞別傳曰太祖為人佻易無威儀每與人談論戲弄言確盡無所隱及歡悅大笑至以頭投諸案中肴膳皆沾污巾幘璅語曰師曠御晉平公鼓瑟輟而笑曰齊君與其嬖人戲墜於床而傷其臂平公命人書之曰某年某月齊君戲而傷問之於齊侯笑曰然有之東方朔別傳曰朔於上前射覆中之郭舍人亟屈被榜上輒大笑又曰南山有木名曰柘良工材之可以射射中人情如掩兔舍人數窮何不早謝上乃搏髀大笑也荀勗別傳曰司徒鈌帝問其人勗曰魏文用賈詡為公孫權笑之神異經曰東方有人不妄語恒笑倉卒見之如癡張華注曰今人癡好笑本此搜神記曰孫琳殺徐光而無血後綝上蔣陵有大風盪綝車顧見光在松樹上附手笑之俄而綝誅蜀記曰譙周字允南巴西人體皃素朴無造次辯論之才諸葛亮領益州牧命周為勸學從事初見左右皆笑既出有司請推笑者亮曰孤猶不能忍況左右乎黃義仲父廣記曰合浦尹牙為郡主簿太守到官三年不笑牙問其故曰父為太尉所殺牙乃辭至洛為大尉養馬三年斷其頭而還南正論曰搔癬之為悅先笑而後愁養生要訣曰人語笑欲令至少不欲令聲高若過誤笑損肺腸精神不足楚詞九歌曰若有人兮山之阿披薜荔兮帶女蘿既含睇兮又宜笑宋玉登徒子賦曰腰如豹素齒如含貝嫣然一笑惑陽城迷下蔡
