body:
  text: 獸部十牛上說文曰牡畜父也從牛土聲犅古郎切特牛父也牝畜母也從牛匕聲犢牛子也牬普外切二歲牛也犙山耽切三歲牛也牭思貳切四歲牛也犗戒又音加騬牛也牻莫江切白黑雜毛牛也掠力強切牻牛也犡力制切牛白脊也𤙛達胡切黃牛虎文也犖駮牛也㸹力拙切牛白脊也𤘾巴耕切牛文駮如星也犥普表切牛黃白色也犉而純切黃牛黑脣也攉音岳白牛也㹔居羊切牛長脊也𤘸音牛徐行也犨牛息聲也一曰牛名牷音全牛純色也𤛾牛音遶柔謹也廣志曰有靡犘牛馬象切出巴中重千斤犦滿角切牛一曰犎牛有赤豹封牛周留水牛毛青腹犬狀似豬有牧牛項上堆肉大如斗似橐駝日行三百里犤音皮牛痺小今謂之稷牛又呼杲下牛出廣州高涼郡犩吾威切牛如牛而大肉數千斤出蜀中夔牛重千斤晉時此牛出上庸郡獵力涉切牛旄牛也髀膝尾間皆有毛花蹄牛高六尺尾環繞角有四耳角端有肉蹄如蓮華堂牛色黑或黃日南有之潛牛形狀似水牛一名𤘣音沉牛麟牛似鹿又似羊肉美牥音方牛如橐駞能行又有犛牛莊子曰其大若垂天之雲易大畜卦曰六四童牛之牿元吉又無妄卦曰六三無妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也又遯卦曰六二執之用黃牛之革莫之勝說象曰執用黃牛固志也又離卦曰離利貞畜牝牛吉又既濟曰九五東鄰殺牛不如西鄰之禴祭又說卦曰坤為牛周書王會曰卜盧紈牛紈牛者牛之小者大夏茲白牛數楚每牛牛之小者也大夏西北戎數楚北戎茲白牛野獸形似白牛詩鴻鴈無羊曰誰謂爾無牛九十其犉黃牛黑脣曰犉又曰爾牛來思其耳濕濕尚書曰武王剋紂放牛於桃林之野左傳成七年曰鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛又宣三年經曰王正月郊牛之口傷改卜牛牛死乃不郊又僖上曰齊侯伐楚楚子使與師言曰君處北海寡人處南海唯是風馬牛不相及風旅不虞君之涉吾地何故又僖下曰介葛盧來朝聞牛鳴曰是生三犧皆用之矣其音云問之而信又曰秦師入滑鄭商人弦高將市於周遇之以乘韋先牛十二犒師曰寡君聞吾子將步師出於敝邑敢犒從者又宣上曰宋城華元為植巡功植主巡行城也城者謳曰于思于思棄甲復來使驂乘謂之曰牛則有皮犀兕尚多棄甲則郍又宣上曰楚子為陳夏氏亂故伐陳殺夏徵舒因縣陳申叔時使於齊反命而退王使讓之曰夏徵舒為不道弒其君寡人以諸侯討而戮之汝獨不慶寡人何曰夏徵舒弒其君其罪大矣討而戮之君之義也抑人有言曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣諸侯之從君討其罪也今縣陳貪其富也無乃不可乎王曰善又成公下曰韓厥曰古人有言殺老牛莫之敢尸而況君子乎二三子不能事君焉用厥也尸也又昭四年曰邾人莒人愬于晉曰魯朝夕伐我幾亡矣我之不共魯故之以不共晉貢以魯故也晉侯使叔向來辭曰寡君不得事君矣請君無勤子服惠伯對曰君信蠻夷之訴以絕兄弟之國寡君聞命矣叔向曰寡君有甲車四千乘在雖以無道行之必可畏也況其率道何敵之有牛雖瘠僨加於豚上其畏不死乎禮記曲禮上曰國君下齊牛又曲禮下曰諸侯無故不殺牛又月令曰季春犧牲駒犢舉書其數在牧而書數秋當保內又曰季命有司出土牛以示農耕之早晚又曲禮下曰天子祭天地諸侯祭山川大夫祭五祀士祭其先天子以犧牛諸侯以肥牛大夫以索牛又郊特牲曰郊所以明天道也帝牛不吉以為稷牛帝牛必在滌三月稷牛惟具所以別事天神與人鬼也又曰郊用騂尚赤也用犢貴誠也又禮器曰有以少為貴者天子祭天特牲天子適諸侯諸侯膳以犢又內則曰牛夜鳴則庮庮臭惡也又曰祭天地之牛角繭栗宗廟之牛角握賓客之牛角赤周禮地官封人曰凡祭祀飾其牛牲設其楅衡置其絼供其水藁楅在鼻衡在角言不得觸絼繫牛鼻繩絼本又作紖持忍反又冬官考功記曰稺牛之角直而澤老牛之角終而昔昔讀為交錯之錯謂角捔理錯也角長二尺有五寸三色不失謂之牛戴牛三色本白中清末豐也戴牛角直一牛又地官上曰牛人掌養國之公牛以待國之政令公猶官也凡祭祀共其享牛求牛以授職人而芻之求牛禱於鬼神之牛謂所以祭者也求終也終事之牛謂所以繹者也宗廟有繹者孝子求神非一處職讀為樴樴謂之我可以繫牛樴人者謂牧人凡賓客之事共其牢禮積膳之牛饗食賓射共其膳羞之牛軍事共其犒牛喪事共其奠牛凡會同軍旅行役共其兵車之牛與其牽傍以載公任器牽傍在轅外輓牛也人御之居其前曰牽居其旁曰傍任猶用也凡祭祀共其牛牲之互與其盆簝以待事鄭司農云玄謂福衡之屬盆簝皆器名盆所以盛血簝受肉籠也玄謂互若今屠家縣肉格又秋官上曰罪隸掌役百官府與凡有守者掌使令之小事役給其小役凡封國若家牛助為牽傍鄭司農云凡封國若家謂建諸侯立大夫家也牛助為牽傍此官主為送致之也玄謂牛助國以牛助轉徙也罪隸牽傍之在前曰牽在旁曰傍史記曰騎劫攻即墨田單用牛千頭衣以五綵縛刃其角結火其尾穿城而出牛壯士五千銜枚隨其後牛出火明所觸皆死壯士擊之城上士大譟燕師大敗騎劫死乘勝逐北三戰三克遂收齊城也又曰馬蹄躈千牛千足此亦比千乘之家躈苦吊切又曰甯戚欲仕齊候桓公出牽牛叩角而歌曰南山粲白石爛短布單衣才至骭生不逢堯與舜禪長夜漫漫何時旦桓公用之又曰蘇秦說韓王曰鄙語云寧為雞口無為牛後今西面事秦何異牛後乎漢書曰邴吉嘗出逢群鬥者死傷橫道吉過之不問前行逢人逐牛牛喘吐舌止使騎吏問牛行幾里或譏吉吉曰民鬥殺傷長安令京兆尹職所當禁備逐捕丞相課其殿最不親小事也方春少陽用事未可以熱恐牛近行因暑故喘此時氣失節恐有所傷害者三公典調和陰陽職所當憂也又曰龔遂為渤海太守民有帶持刀劍者使賣劍買牛賣刀買犢可謂帶牛佩犢矣又曰宣帝地節三年求得外祖母王媼男無故弟武皆隨使者詣闕時乘黃牛車故百姓謂之黃牛嫗後漢書曰朱暉為臨淮太守時牛大疫而臨淮獨無疫者鄰郡牽牛入界避災耳范曄後漢書曰漢光武初起騎牛殺新野尉乃得馬又曰劉盆子初與兄茂屬右校卒吏劉俠卿主芻牧牛號曰牛吏及立為帝恐畏欲啼即復還依俠卿又曰更始即位舞陰大姓李氏擁城不下更始遣柱天將軍李寶降之不肯云聞宛之趙氏有孤孫熹信義著名願得降之更始乃徵熹熹年未二十既引見更始笑曰蠒栗犢豈能負重致遠乎犢角如蠒栗言小也禮緯曰天地之牲角蠒栗即除為郎中行偏將軍事使詣舞陰而李氏遂降又曰劉寬嘗行有人失牛者乃就寬車中認之寬無所言下駕步歸有頃認者得牛而送還叩頭謝曰慚負長者隨所刑罪寬曰物有相類事容脫幸勞見歸何為謝之州里服其不校又曰魯恭為中牟令亭長有從民借牛不還者牛主自言恭召亭長教令還牛亭長不還如是者三遂不還恭涕泣曰教化不行也欲解印綬去椽吏亭者固爭亭長即還牛詣獄受罪恭貰出不問於是吏人敬信皆不忍欺謝承後漢書曰朱暉為郡吏太守阮況嘗欲市暉牛暉不從及況卒暉乃厚贈送其家人或以譏焉暉曰前阮府君有求於我所以不敢聞命誠恐以財貨污君今而相送明吾非有愛也魏略曰鉅鹿時苗字胃為壽春令始之官乘牸牛歲餘生一犢子及代留其犢而去晉書曰羊篇祜之姪也為鉅平侯奉祜嗣篇歷官清慎有私牛於官舍產犢及還而留之張勃吳錄地理志曰合浦徐聞縣多牛其項上有持骨大如覆斗日行三百里蜀志曰蔣琰曾夢門前有一牛頭血流問於趙直直曰牛角及口公字也血者事明也夢吉矣晉朝雜事曰泰康九年三月幽州上言塞北有死牛頭語干寶晉記曰南安朱冲其鄰人失犢與冲犢相類來認取之冲不與爭後得之於堅冰之下慚謝冲冲不受王隱晉書曰朱冲字巨融少有德行鄰人牛犯冲苗冲乃擔芻送牛牛主大慚不敢復暴又曰潘岳出為河陽令以仕次宜為郎不得意出山濤領選岳內非之密作謠曰閣道東有大牛王濟鞅裴楷鞦和嶠㓨促不得休又曰郭洗牛生犢兩頭八足晉陽秋曰武帝時有司奏御牛青絲紖斷詔可以青麻代之晉書曰郭舒嘗有鄉人盜食舒牛事覺來謝舒曰卿飢所以食牛耳餘肉可共啖之世以此服其弘量又曰夫餘國若有軍事殺牛祭天以其蹄占吉凶蹄解者為凶合者為吉也又曰石崇與貴戚王愷奢靡相尚嘗與愷出遊爭入洛城崇牛迅若飛禽愷絕不能及乃密貸其帳下問其所以對曰牛奔不迅良由御者逐之不及而反制之可聽蹁轅則駃矣因從之遂爭長崇後知之殺所告者又曰王濟被斥外於是乃移第北芒山下性豪侈麗服玉食時王愷以帝舅奢豪有牛名八百里駮嘗瑩其蹄角濟請以錢千萬與牛對射而賭之愷亦自恃其能令濟先射一發破的因據胡床叱左右速探牛心來須臾而至一割便去又曰何曾性奢豪都官從事劉亨嘗奏曾以銅鉤黻紖車瑩牛蹄角後曾辟亨為掾勸勿應亨謂至公之體不以私憾遂應又曰桓溫北伐過淮泗踐北境與諸寮屬登平乘樓矚中原慨然曰遂使神州陸沉百年丘墟王夷甫諸人不得不任其責袁宏曰運有廢興豈必諸人之過溫作色謂四座曰頗聞劉景升有千斤大牛噉芻豆十倍於常牛負重致遠曾不若一羸牸魏武入荊州以享軍志意以況宏坐中皆失色又曰王延家中生一犢他人認之延牽與之初無吝色其人後知其妄認送犢還延叩頭謝罪延以與之不取也又曰肅慎國武帝時及元帝中興皆來貢獻成帝時又通貢於石季龍四年方達季龍問之荅曰每候牛馬向西南眠者三年矣是知大國所在故來南史四夷傳曰扶乘國有牛角甚長以角載物至勝二十斛宋書曰褚湛之有一牛至所受無故墮廳事前井湛之率左右躬自營救郡中喧擾彥回下簾不視又曰江湛為吏部尚書性廉儉牛餓御人求草湛良久曰可與飲又曰顧憲之元徽中為建康令時有盜牛者與本主爭牛各稱己物二家辭證等前後令莫能決憲之至覆其狀乃令解牛任其所去牛徑還本宅盜者伏其罪時人號曰神明三國典略曰陳桃根於所部得青牛獻之又上織成羅文錦被表二陳主命於雲龍門外焚之其牛遣還於人又曰梁出師拒侯景邵陵王綸次鍾離初綸將發營于樂遊苑臨賀王正德詣於綸所始入牙門有飄風觸旗竿而折至是將殺牛勞士一牛走入馬廄抵殺綸所乘駿馬又以兩角貫一馬腹載之而行衝突營幕軍中驚亂蕭子顯齊書曰豫章文獻王嶷為揚州刺史拜陵還過延陵季子廟觀沸井有水牛突部伍直兵執牛推問王不許取縜一疋橫繫牛角放歸其家為治務存寬厚故得朝野忻心後魏書曰刑昕以本官副李象使於梁昕好忤物人謂之牛是行也談者謂之牛象鬥於江南北史曰後魏元仲景性嚴峭孝莊時兼御史中尉京師肅然每向臺恒駕赤牛時人號赤牛中尉又曰魏婁提雄傑有識度僮僕千數牛馬以谷量姓好周給士多歸附之又曰道武時窟咄寇南鄙莫題時二於帝遺箭於地窟咄謂曰三歲犢豈勝重載言窟咄長而帝少也又曰孟信為趙郡太守及去官家貧無食唯有一老牛其兄子賣之擬供薪米作契已訖巿法應知牛主住所在信適從外來見買牛人方知其賣也因告之曰此牛先來有病小用便發君不須買也杖其兄子二十買牛人嗟異良久呼信曰孟公但見與牛未必須其力也苦請不得乃罷買牛者周文帝帳下人周文深歎異焉隋書曰盧昌衡為徐州揔管嘗行至浚儀所乘馬為他牛所觸因致死牛主陳謝求還價直昌衡謂之曰六畜相觸自關常理此豈人情也君何謝乎拒而不受性寬厚不求皆此類也又曰牛弘有弟曰弼好酒而酗嘗因醉射殺弘車牛弘來還宅其妻迎謂之曰叔射殺牛矣弘聞之無所怪問直荅云作脯坐定其妻又曰叔忽射殺牛大是異事弘曰已知之矣顏色自若讀書不輟其寬和如此又曰于仲文遷安固太守有任杜兩客各失牛後得牛兩家俱認州郡久不能決益州長史韓伯雋曰于安固少聰察可令決之仲文曰此易解耳於是令二家各驅牛群至乃放所認者遂向任氏群中又陰使人微傷其牛任氏嗟惋杜家自若仲文於是訶杜氏杜氏服罪而去又曰盧愷從周武帝在雲陽宮勑諸屯簡老牛欲以享士愷進諫曰昔田子方贖老馬君子以為美談向奉明勑欲以老牛享士有虧仁政帝美其言而止轉禮部大夫唐書曰李密嘗欲尋包愷乘一黃牛被以蒲韉仍將漢書一秩掛於角上一手捉牛靷一手飜書讀之尚書令越公楊素見於道從後按轡躡之既及問曰何處書生躭學若此密識越公乃下車再拜自言姓名又問所讀何書荅曰項羽傳越公奇之
