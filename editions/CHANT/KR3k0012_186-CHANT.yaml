body:
  text: 居處部十三廳事郡國志曰廣州吳孫皓時以滕脩為刺史未至州有五仙人騎五色羊負五榖來迎而去今州廳事梁上畫五仙人騎五色羊為瑞裴淵廣州記曰州廳事梁上畫五羊像又作五榖囊隨像懸之云昔高固為楚相五年銜榖莖于楚庭於是圖其像廣州則楚分野故因圖象其瑞焉臨海記曰章安縣南門有赤蘭橋世傳成公綏作縣此橋上製廳縣令年常祭廳事神用生鹿其年活得白鹿還於廳事上生以祭神仍遂食之歲時用焉自是以後白鹿不可復得而必須生鹿歷代相承迄今不絕世說曰庾太尉兄弟初渡江行路人有避雨者悉聚諸廳事上征西車騎自譬遣之不肯去太尉新沐頭散髮高詠從閤內出避雨者退莫有留者王朗與許靖書曰武皇帝於江陵劉景升廳事上共論道足下至于通夜不寐忘倦飢渴無已盧諶祭法曰凡祭法有廟者置之於座未遑立廟祭於廳事可也兩京記曰考功員外廳有薛稷畫鶴寧之問為讚工部尚書廳有薛稷畫樹石並為時所重齋王安成記曰大和中陳郡殷府君引水入城穿池殷仲堪又於池北立小屋讀書百姓于今呼曰讀書齋晉徵祥說曰桓玄鎮姑熟屋壁先畫作黃盤龍號盤龍齋俄而玄敗將軍劉毅居之毅小名盤襄沔記曰金城內刺史院有高齋梁昭明太子於此齋造文選鮑至云簡文為晉安王鎮襄陽日又引劉孝威庾肩吾徐防江伯操孔敬通惠子悅徐陵王囿孔鑠等於此齋綜覆詩集于時鮑至亦在數凡十人資給豐厚曰設肴饌于時號為高齋學士雍州記云高齋其泥色其鮮凈故此名焉南平世子恪臨州有甘露降此齋前竹林昭明太子於齋營休道義以時相繼又曰白土齋南道有一齋以栗為屋梁武帝臨州寢臥於此齋中常有五色雲廻轉狀如盤龍屋上恒紫雲騰起形似繖蓋遠近望者莫不異焉梁武帝于此龍飛又曰高齋東北有一齋名曰下齋次於高齋制度壯麗極爽塏刺史辯決獄訟舊出此齋國史補曰梁武造寺令蕭子雲飛白大書一蕭字在焉李約自江淮竭產買歸洛中置於小亭號曰蕭齋房說文曰房室在旁也釋名曰房旁也室之兩旁也尚書大傳曰古后夫人將侍於君前息燭後舉燭至于房中釋朝服襲燕服然後入御于君毛詩黍離曰君子陽陽左執簧右招我由房漢書曰哀帝初即位躬行儉約省減諸用政事由已出朝廷翕然望焉有詔問丞相大司空定陶恭王太后宜當何居孔光不欲令帝旦夕相近即議以為定陶王太后宜改築宮大司空何武曰可居北宮有紫房複道通未央宮太后果從複道朝夕至帝所求欲稱尊號貴寵其屬使上以不得直道而行應劭漢官儀曰皇后稱椒房以椒塗室主溫暖除惡氣也酈善長注水經曰芑水出南山芒水谷北流遙玉女房水側山際有石室世謂之玉女房郡國誌曰葭萌縣玉女房昔有玉女入石穴空有竹數莖下有青石壇每因風恒自掃壇王子年拾遺記曰越欲滅吳蓄天下奇寶美人異味以進於吳殺三牲以祈天地殺龍以祠川海以江南億萬戶民輸為傭保越又有美女二人一名夷光一名脩明以貢於吳吳處之以椒華之房貫細珠為簾熀熀內竊窺者莫不動心驚魂謂之神人吳王妖惑怠於國政及越兵入乃抱二女以逃吳苑晉宮閣名曰洛陽宮內有義和溫房十洲記曰崑崙山有紫翠丹房拾遺錄曰崑崙丹密雲房東西千步望之如丹霞尸子曰泰山之中有神房阿閣楚辭曰姱容脩態絙洞房又九歌曰桂棟兮蘭橑新夷楣兮藥房宋玉風賦曰主人女子乃更有蘭房奧室止臣其中庭說文曰庭朝中也尚書曰咸造勿褻在王庭周易曰揚于王庭孚號有厲造自邑不利即戎利有攸往禮記曰諸侯之庭毛詩曰洒掃庭內又曰俟我于庭乎而又曰殖殖其庭又曰子有庭內弗洒弗掃又曰有瞽有瞽在周之庭左傳曰庭實旅百論語曰鯉趨而過庭曰學詩乎又曰孔子謂季氏八佾舞於庭是可忍也孰不可忍也周書曰成王四征不庭漢書曰王商為人多質有威重師古曰多質言不為文飾長八尺餘身體鴻大容貌絕人河平四年單于來朝引見白虎殿丞相商坐未央庭中單于前拜謁商師古曰單于將見天子而經未央庭中過商起離席與言單于仰視商貌大畏之遷延卻退天子聞而歎曰真漢相矣晉書曰謝玄字幼度少潁悟與從兄朗俱為叔父安所器重安嘗戒約子姪曰子弟亦何豫人事而正欲使其佳諸人莫有言者玄荅曰譬如芝蘭玉樹欲使其生於庭階耳安悅說苑曰吳入楚申包胥告急於秦秦哀公曰諾固將圖之申包胥立哭於秦庭晝夜哭七日七夜不絕聲哀公曰有臣如此可不救乎興師救楚吳人引兵而還昭王反復欲封申包胥包胥辭曰救亡非為名也功成受賜是賣勇也遂退而隱終身不見階釋名曰階梯也言有等差說文曰階陛也陛升高階也除殿陛也阼主階也尚書曰舞千羽于兩階七旬有苗格禮記曰季氏之葬在西階下又大傳曰天子阼階高九尺又曰主人與客讓登主人先登客從之拾音涉級聚足連步以上上於東階則先右足上於西階則先左足又曰夏后氏殯於東階之上則猶在阼也周人殯於西階之上則猶賓之也左傳曰石之紛如死于階下又曰衛孫子來聘公登亦登論語曰沒階趨進翼如也史記曰堯舜土階三等堂高三尺三秦記曰明光殿以玉為階呂氏春秋曰周之明堂茅茨蒿柱土階三等以見儉節也文選詩曰紅藥當階翻蒼苔依砌上又曰阿閣三重階陛摯虞決要注云其制有陛右墄七則反左平平以文磚相並次墄者為陛級也九錫之禮納陛以登謂受此陛以上殿靈光殿賦曰飛陛緣雲以上征蔡邕獨斷曰天子陳兵於陛故呼陛下用卑達尊之意也墀說文曰墀塗地也禮記曰天子赤墀漢書典職曰以丹漆地故曰丹墀漢書有白玉墀又曰曲陽侯王根僣作赤墀青璅司隸京兆奏根負鉞謝罪劉楨清慮賦曰駢雄黃以為墀序爾雅曰東西廂謂之序郭璞曰所以序別外內也犍為舍人曰殿東西堂序尊卑處廣雅曰反坫謂之序說文曰序東西墻也尚書顧命曰大訓在西序河圖在東序孔安國曰大訓唐虞書典謨也河圖八卦也王延壽魯靈光殿賦曰東序重深而奧祕廊周書作雒曰凡五宮明堂咸有重廊史記紂有諛臣曰左強夸而目巧教紂為象廊漢書曰武帝策茂才曰蓋聞虞舜之時遊巖廊之上文穎注曰殿下外屋也晉灼注曰堂邊曰巖峻之廊也鄭緝之東陽記曰石步廊去歌山十里臨流虛構高可數丈長三十丈可容百人坐韓子曰師曠為晉平公請角一奏有雲從西北方起再奏大風而隨之裂幃幕破俎豆墯廊瓦平公懼伏于廊室兩京記曰隋焬帝從東都至西京御道並作長廊枚乘七發曰連廊四注臺城增光陸機與弟雲書曰聽頌觀東作百丈許廊屋塾爾雅曰門側之堂謂之塾郭璞注曰東門堂尚書顧命曰先輅在左塾之前次輅在右塾之後禮記學記曰古之教者家有塾白虎通曰所以必有塾何以飾門因取其名也明臣下當見於君先孰思其事也東觀漢記曰趙孝為郎每告歸往來常白衣步檐過道上郵亭但稱書生寄止於亭門塾魏武制度奏曰三公列侯門施內外塾方三十畝壇左傳曰子產相鄭伯以如楚舍不為壇漢書曰蕭何荐韓信於高祖高祖擇日齋戒設壇拜為將軍莊子曰孔子遊乎緇帷之林休坐乎杏壇之上弟子讀書孔子絃歌鼓琴奏曲未終有漁父者下船而來左手據膝右手柱頤以聽曲終而招子貢子路二人俱對客指孔子曰彼何為者也子路曰魯之君子也徐靈期南岳記曰南岳山上有飛流壇懸水激石飛湍百仞即孫溫伯所喪身處也又有曲水壇水行石上成溝瀆如世人臨河壇也三月三日時來逍遙梁州記曰沔陽城先沔陽縣所治也在漢水南舊蕭何所築劉備為漢王權住此城盟於城下今門外有盟壇猶存帝王世紀曰雍郊有五畤壇漢武獲麟處屏爾雅曰屏謂之樹郭璞曰小墻當門中者也犍為舍人曰以垣當門蔽為樹廣雅曰復罳謂之屏說文曰屏蔽也釋名曰屏自鄣屏也蕭牆在門內蕭肅也臣將入於此自肅警之處也罘罳在門外罘復也臣將入請事於此復重思也禮記禮器曰康王䟽屏天子廟飾也鄭玄注云屏樹也今謂之罘罳論語八佾曰或問管氏知禮乎曰邦君樹塞門管氏亦樹塞門管氏而知禮孰不知禮鄭玄注曰樹屏也又季氏曰吾恐季孫之憂不在顓臾而在蕭牆之內蕭牆謂之屏也漢書佞幸傳曰哀帝令將作為董賢起冢營義陵旁內為便房剛柏題湊外徼道周垣數里門闢罘罳甚盛又曰王莽傳曰莽性好時日小數及事迫急但為厭勝遣使壞渭陵園門罘罳曰無使民復思漢也漢官典職曰省閣下大屏稱曰丹屏尚書郎含雞舌香伏其下奏事晉書曰阮籍為東平相徹去屏障使內外相對孫卿子曰天子外屏諸侯內屏禮也外屏不欲見於外內屏不欲見於內也風俗通曰屏卿大夫以帷士以簾稍有第以自障蔽也示臣臨見自整屏氣處也吳越春秋曰越將伐吳越王命於夫人王背屏夫人向屏而立王曰自今日之後內政無出外政無入各守其職已盡其信內中辱者則是子境外千里辱者則是予也吾見子於是已明試矣王出宮夫人送王不過屏因反闔其門填之以土白虎通曰所以設屏何所以自障也示極臣下之故也天子德大故外屏諸侯德小所照見近故內屏扆爾雅曰戶牖之間謂之扆郭璞注曰牖東戶西也禮云斧扆形如屏風畫為斧文置扆地以其所名之耳尚書顧命曰設黼扆儀禮覲禮曰天子負扆南面朝諸侯是升致命也禮記明堂位曰天子負斧扆南而立宁爾雅曰門屏之間謂之宁郭璞注曰人君視朝門宁立處也釋名曰宁佇也見君所佇立定氣之處也毛詩曰俟我於著乎而曲禮曰天子當宁而立諸公東面諸侯西面曰朝
