body:
  text: 兵部三十三先鋒後漢書曰祭彤拜遼東太守至則厲兵馬廣斥候彤有勇力能貫三百斤弓虜每犯塞常為士卒前鋒數破走之東觀漢記曰賈復以偏將軍從上杖邯鄲擊青犢大戰日中賊陣堅不却上傳召復曰吏士飢且可朝食復曰先破之然後食耳於是被羽先登所向皆靡諸將皆服其勇魏志曰張遼字文遠為征東將軍征孫權被甲戰先陷陣銜壘入至麾下晉書劉牢之傳曰太元初謝玄北鎮廣陵時符堅方盛玄多募牢之與東海何謙琅㖿諸葛侃樂安高衡東平劉軌西河田洛晉陵孫無終等以驍猛應選玄以牢之為參軍領精銳為前鋒百戰百勝號為北府兵敵人畏之又曰元興初會稽王道子將討桓玄詔司馬柔之兼侍中以騶虞幡宣告江荊二州至姑熟為玄前鋒所害又載記曰高勾麗及宇文政國等謀滅廆以分其野太興初三國伐廆廆曰彼軍初其鋒甚銳若逆擊之落其計矣又曰呂隆載記曰宜曜初鋒示其威武彼以我遠來必決死拒戰可一舉而平宋書曰劉懷慎彭城人也少謹慎質直始參高祖鎮軍車騎將軍事振武軍彭城內史從征鮮卑每戰必先士卒及剋廣固懷慎率所先登高祖拒盧循於石頭屢戰剋捷又張暢傳曰虜攻彭城南門并放火暢躬自前戰身先士卒梁書曰宋武北伐廣固田子領偏師與龍驤將軍孟龍符為前鋒龍符戰沒田子力戰破之又曰孟龍符懷王第三子也驍勇有膽氣高祖伐廣固以龍符統步騎為前鋒賊數千圍統攻之以眾寡不敵遂見害追贈青州刺史又表曰龍符投袂義切前驅効命摧鋒三捷每為眾先及西勦桓歆北殄索虜朝議爵賞未及施行會臣北伐復統前旅臨照之戰氣冠三軍于時逆徒實繁控弦掩澤龍符疋馬電躍所向摧靡奮伐深入知死不恡後周書曰高祖東伐齊王憲率所部先向晉州明日諸軍揔集稍逼城下齊人亦大出兵陣於營南高祖召憲馳往觀之憲返命曰易與耳請破而後食帝悅曰如汝所言吾無憂矣內史柳昂私謂憲曰賊亦不少王安得輕之憲曰憲受委前鋒情兼家國掃此逋寇事等摧枯啇周之事公所知也賊雖眾其如我何既而諸軍俱進應時大潰其夜齊主遁走憲輕騎追之又曰李弼背侯莫陳悅以秦州歸國太祖謂弼曰公與吾同心天下不足平破悅得金寶奴婢悉以好者賜之拜秦州刺史從太祖平竇泰先鋒陷敵太祖以所乘騅賜之及泰所著牟甲亦賜之唐書曰太宗擊王充選千餘騎為奇兵皆皂衣玄甲分為左右隊建大旗令騎將秦叔寶程咬金尉遲敬德翟長孫等分統之每臨寇太宗躬被玄甲先鋒率之候機而進所向摧殄常以少擊眾賊徒氣懾殿廣雅釋詁曰殿後也桂苑曰殿鎮也軍後也開元文字曰樂只君子殿天子之邦謂鎮也孟之反不伐奔而殿言在軍後也前曰啟後曰殿傳曰公與石祁子玦甯莊子矢使守曰以此贊國擇利而為之與夫人繡衣曰聽於二子渠孔御戎子伯為右黃夷前驅孔嬰齊殿又曰十一月丁卯朔入平陰遂從齊師夙沙衛連大車以塞隧而殿此衛所欲守險者也殖綽郭最曰天殿國師齊之辱也子姑先乎乃代之殿又曰子儀之亂析公奔晉晉人寘諸戎車之殿以為謀主殿後軍也又曰公侵齊門于陽州顏息射人中眉退曰我無勇吾志其目也師退冉猛偽傷足而先其兄會乃呼曰猛也殿又曰處父曰然則亂也必及於子先備諸與孟孫以壬辰為期陽虎前驅林楚御桓子虞人以鈹楯夾之陽越殿越陽虎從弟也又曰侯犯亡之曰謀免我乎侯犯請行許之駟赤先如宿候犯殿又曰夏衛公孟彄伐曹克郊還滑羅殿羅衛大夫又曰追鄭師姚般公孫林殿而射前列多死又曰宋公伐曹將還禇師子肥殿曹人詬之不行子肥宋大夫又曰陳璀陳莊涉泗孟之側後入以為殿之側孟氏族字反也論語曰孟之反奔而殿將入門策其馬曰非敢後也馬不進也史記絳侯世家曰周勃沛人也高祖之為沛公以中涓從攻胡陵勃擊章邯車騎殿如淳注云殿不進呂瓚云在軍後曰殿也後漢書曰岑彭圍隗囂於西城囂將行巡周宗將蜀救兵到囂得出還冀漢軍食盡燒輜重引兵下隴延弇亦相隨而退囂出兵尾擊諸營彭殿為後拒尾謂異其後也凡軍在前曰啟在後曰殿後周書曰高祖伐齊還以齊王憲為後拒齊主自率眾來追至於高梁橋憲以精騎二千阻水為陣齊領軍叚暢直進至橋隔水招暢與語語畢憲問暢曰若何姓名暢曰領軍叚暢也公復為誰憲曰我虞候大都督耳暢曰觀公言語不是凡人今日相見何用隱其名位陳王純梁公侯莫陳芮內史王誼等並在憲側暢固問不已憲乃曰我天子大弟齊王也指陳王已下並以名位告之暢鞭馬而去憲即命旋軍而齊人遽追之戈甲甚銳憲與開府宇文忻各統精卒百騎為殿以拒之斬其驍將賀蘭豹子山褥瓌等百餘人齊眾乃退又曰楊寬從天穆引軍趣成皋令寬與爾朱兆為後拒尋以眾議不可乃廻赴石濟寬夜行失道後期諸將咸言寬少與北海周旋今不來矣天穆荅曰楊寬非輕於去就者也其所逗留必有他故吾當為諸君保明之語訖候騎白寬至天穆撫髀而笑曰吾固知其必來遽出帳迎之握其手曰是所望也唐書曰胡賊掠宜君令竇軌討之初不利軌斬其部將十四人拔隊中小帥以代之軌率數百騎殿於後令眾曰聞鼓聲有不進者自後斬之既鼓士卒爭進擊賊破之斬首千餘級虜男女二萬餘口鄉導孫子曰不用鄉導者不得地利不任彼鄉人而導軍者則不能得道路之便利先知迂直之計者勝此軍爭之法也衛公兵法曰凡是賊徒好相掩襲須擇敢勇之夫選明察之士兼使鄉導潛歷山原密其聲晦其迹或刻為獸䟽而履於中途或上冠微禽而幽伏於叢薄然後傾耳以遙聽竦目而深視專智以度事機注心而候氣色見水痕則可以測敵濟之早晚觀樹動則可以辨來寇之驅馳也故烟火莫若謹而審旌幟莫若齊而一爵賞必重而不欺刑戮必嚴而不捨止敵之動靜而我必有其備彼之去就而我豈不保其全哉必須先覘敵國道路遠近水潦山林谿谷險阨城邑大小溝渠深淺畜積多少兵革之數豪傑姓名審而知之用兵之要也伏兵易曰伏戎于莽三歲不興左傳曰北戎侵鄭鄭伯患之曰彼徒我車懼其侵軼我也徒步兵也軼突也公子突曰使勇而無剛者嘗寇而速去之嘗試也勇則能往無其剛不恥退也君為三覆以待之覆伏兵也戎輕而不整貪而無親勝不相讓敗不相救先者見獲後必務進進而遇覆必速奔後者弗救則無繼矣乃可以逞從之戎人之前遇覆者奔鄭將祝聃逐之衷戎師前後擊之盡殪為三部伏兵祝聃帥勇而無剛者先犯之戎而速奔以遇二伏兵至後伏兵伏兵起戎還走祝聃返遂逐之戎前後及中三處受敵故曰衷戎師殪死衷丁仲切又曰吳侵楚楚將養由基奔命楚司馬子庚以師繼之養由基曰吳乘我喪謂我不能師也必易我而不戒戒備子為三覆以待我我請誘之子庚從之戰于庸浦庸浦楚地大敗吳師又曰秋九月晉侯飲趙盾酒伏兵甲將攻之其右提彌明知之右軍右也趍登曰臣將侍宴過三爵非禮也遂扶跣以下公嗾獒焉明搏而殺之鬥且出提彌死之又曰衛侯在平壽平壽衛下邑公孟有事於蓋獲之門外有事祭也蓋獲衛郭門也齊氏惟於門外而伏甲焉齊豹之家後漢書曰馮異招集諸營保數萬人與賊約期會戰使壯士變服與赤眉同伏於道側且曰赤眉使萬人攻異前部異裁出兵以救之裁小出兵所以示弱也賊見勢弱遂悉眾攻異乃縱兵大戰日昃賊氣衰伏兵卒起衣服相亂赤眉不復識別眾遂驚潰追擊大破於崤底降男女八萬人通典曰後漢末荊州牧劉表遣劉備北侵至鄴曹公遣將李典與夏侯惇距之備一旦燒屯去惇率諸軍追擊之典曰賊無故退疑必有伏南道穿狹草木深不可追也惇不聽與將于禁追之典與惇等果入賊伏衷戰不利典往救備救至乃退又曰後漢末呂布從東緡與陳宮將萬餘人來與曹公戰時兵皆出取麥在者不數千人屯營不固曹公乃令婦人守陳悉將兵距之屯西有大堤其南樹木幽深布疑有伏乃相謂曰曹操多詐勿入伏中引軍南七十餘里明日復來曹公隱兵堤裏出半兵堤外布益進乃令輕兵挑戰既合伏兵乘堤步卒並進遂大破之晉書曰鎮南將軍杜元凱伐吳樂鄉城晉牙門管定周旨等伏兵樂鄉城外吳都督孫歆先遣車出拒晉將王濬於上流大敗而還旨等發伏兵隨歆軍入歆不覺直至賬下虜歆於是進逼江陵吳都督將伍延偽請降而列兵登陴晉師攻剋之十六國春秋曰後晉石季龍攻晉將劉演于廩丘晉將邵續使文鴦救演季龍退止盧關津以避之文鴦弗能進屯于景亭兗州豪右張平等起兵救演季龍夜棄營設伏于外揚聲將歸河北張平以為信然入于空營季龍廻擊敗之遂陷廩丘又曰夏赫連勃進屯依力川後秦姚興來伐至三城勃勃率騎禦之興遣其將姚文宗拒戰勃勃偽退設伏以待之興將姚榆生等追之伏兵夾擊皆擒之北齊書曰叚韶與右丞相斛律光率師伐後周五月攻服秦城周人於姚襄城南更起城鎮東接定陽又作深塹斷絕行道韶乃密抽壯士從襲之又遣潛渡河告姚襄城中令內外相應度者千有餘人周人始覺於是合戰大破之諸將咸欲攻其新城韶曰此城一面阻河三面地險不可攻縱令得之一城地耳不如更作一城壅其要路破服秦城併加以圖定陽計之長者將士咸以為然遂圍定陽其城主楊範固守不下韶登山以觀城勢乃縱兵爭攻之七月屠其外城韶謂光曰此城三面重澗險阻並無走路唯慮東南一處耳賊若突圍必從此出但簡精兵專守自是成摛光乃令壯士千餘人設伏於東澗口其夜果如所策賊遂出城伏兵擊之大潰範等面縛盡獲其眾後魏書曰万俟醜奴作亂關中魏將賀拔岳率兵討之岳以輕騎八百北渡渭殺略其民以挑之醜奴大將遲菩薩果率步騎三萬至渭北岳以輕騎數千餘菩薩隔水交言岳稱楊國威菩薩自言強盛往復數返時已逼暮於是各還兵密於渭南傍水分精騎數十為一處隨地形便置之明日自將百餘騎隔水與賊相見岳漸前進先所置騎隨岳而集騎既漸增賊不復測其多少行二十許里至水淺可濟之處岳便馳馬東出以示奔遁賊謂岳走乃棄步兵南渡渭之輕騎追兵東行十餘里依橫崗設伏待之賊以路險不得齊進前後繼至半度崗東岳乃廻與賊戰身先士卒急擊之賊便退走岳號令所部賊下馬者皆不聽殺賊顧見之便悉投馬俄而虜獲三千人馬亦無遺遂擒菩薩乃度渭北降步卒萬餘隋書曰煬帝征吐谷渾至覆袁川時吐谷渾王與數騎而遁其名王詐為渾主保車我真山帝令將張定和率師擊之定和既與賊相遇輕其眾少呼之命降賊不肯定和不被甲挺身登山賊伏兵於巖石之下發矢中之而斃唐書曰武德中太宗圍王世充於東都竇建德自河北率兵十二萬來救太宗自率騎二千五百步卒千人趣武牢四月建德自滎陽西上築壘于板渚太宗以五百騎出武牢東二十餘里將挑戰先伏李勣程咬金秦叔寶等齩五巧切令尉遲敬德執矟造建德壘下大呼致師賊眾大驚擾出兵數千騎太宗逡巡漸却遂引以入伏內李勣等奮擊大破之獲其大將殷秋石瓚斬首數百級又曰羅士信仕王充率千餘人奔于穀州高祖以為新安道行軍揔管使圖世充士信進居前鋒退居後殿凡所虜獲悉分士卒以此為常身未曾自取人有功者解衣下馬而賞之然持兵嚴暴有不用命者無問親友必皆斬決由是下不附而畏之及大軍至洛陽士信以兵圍世充千金堡其中人大罵之士信怒夜遣百餘人將嬰兒數十從南而來至于堡下詐言從東都來投羅揔管也因令嬰兒啼譟既而陽驚曰此千金堡吾輩錯矣忽然而去堡中謂是東都逃人遽出兵追之士信伏五千人於路側候其開門而奮擊遂破之殺無遺類也又曰武德中菀君璋及突厥吐屯設來寇馬邑高蒲政設三伏以待之突厥至城下伏兵發大破之斬首二百餘級以蒲政為朔州總管曲赦馬邑又曰王君廓從大軍討別下轘轅羅山二縣王充遣將魏隱率兵拒之君廓撤營偽遁設伏以待之隱縱兵疾進發伏破之又曰太宗初為右元帥揔兵十萬徇東都軍屯西苑營於三王陵自三月而旋太宗俄而隋將叚達率萬餘人自後而至太宗發伏以擊之賊師大敗親自追奔至金城下斬四十餘級又曰王君廓亡命聚徒數千人轉掠長平進逼夏縣河東郡丞丁榮以兵拒之又遣使慰諭君廓見其使謬為恭敬稱欲歸首榮心輕之於是曜兵登山下十餘里君廓悉匿其眾於山谷中榮無所見引兵而退纔至山下君廓追擊大破之吳越春秋曰公子光伏甲於私室中具酒而王僚乃被棠夷之甲三重使兵衛陳於道專諸置魚腹而進之刺王僚貫脾達背王僚立死世說曰桓玄伏甲設饌廣延朝士因此欲誅謝安王坦之王甚遽問謝謝之寬容愈表於皃望階趣席方作洛生詠諷浩浩洪流桓憚其曠遠乃起解兵王謝舊齊名於此始別優劣
