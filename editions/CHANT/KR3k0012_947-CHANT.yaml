body:
  text: 蟲豸部三莎雞毛詩豳七月曰六月莎雞振羽莎雞羽成而振訊之陸機毛詩䟽義曰莎雞如蝗而斑色翅數重下翅正赤或謂之天雞六月飛而振羽索索聲幽州人謂之蒲錯也爾雅曰翰天雞也孫炎注曰小蟲黑身赤頭一名莎雞郭璞注曰一名摴雞也廣志曰莎雞似蠶蛾而五色亦曰犨雞螽斯毛詩螽斯曰螽斯后妃子孫眾多也言若螽斯不妒忌則子孫眾多也螽斯羽詵詵兮螽斯摴蝑也毛詩豳七月曰五月斯螽動股斯螽摴蝑也蜙蝑陸機毛詩䟽義曰爾雅云螽蟴蜙宣龍切蝑相魚切也揚雄云舂黍也幽州謂之舂箕角長青色斑黑其股似瑇瑁文五月中以兩股相瑳作聲聞數十步毛詩題網曰螽斯名蜙蝑一名舂黍似蝗而小青色長股而鳴喻后妃之性不妒忌子孫眾多爾雅曰蜇音斯螽蜙蝑郭璞注曰蜙䗥也俗呼𧐍𧑓蝙蝠春秋運斗樞曰搖光攜則服翼兩頭並翔廢江淮山瀆之祠搖光不明服翼九足服翼附鼠也孝經援神契曰蝙蝠伏匿故夜食爾雅曰蝙蝠服翼也齊人呼為䘃或謂之仙鼠職墨二音抱朴子曰千歲蝙蝠色如白雪集則倒懸腦重故也此物得而陰乾末服之令人壽四萬歲玄中記曰百歲伏翼其色赤止則倒懸千歲伏翼色白得食之壽萬歲水經曰交州丹水亭下有石穴甚深未嘗測其遠近穴中蝙蝠大者如烏多倒懸得而服之使人神仙荊州記曰宜都夷道縣有石穴穴中有蝙蝠如烏多倒懸崔豹古今注曰蝙蝠一名仙鼠又曰飛鼠五百歲則色白腦重集物則頭垂故謂為倒挂鼠食之得仙幽明錄曰淮南郡有物髡人髮太守朱誕曰吾知之矣多置黐音離以塗璧夕有數蝙蝠大如雞集其上不得去殺之乃絕屋簷下已有數百人頭髻范汪治瘧方曰蝙蝠七枚合擣五百發雞鳴服一丸禺中一丸遇發乃與粥清一升耳守宮毛詩節正月曰哀今之人胡為虺蝪蝪螈也虺蝪之性見人則走陸機毛詩䟽義曰蝪一名榮原水蜴也或謂之䗂蜼音濉虵醫如蜥蜴青綠色大如指形狀可惡也春秋考異郵曰土勝水故守宮食蠆宋均曰守宮生於土蠆藏物屬坎水也爾雅曰蠑螈蜥蜴蜥蝪蝘蜓蝘蜓守宮也轉相解博異語別四名也漢書東方朔傳曰武帝置守宮盆下使射之朔曰臣以為龍又無角謂之為虵又有足跂跂脈脈善緣壁若非守宮即蜥蝪上曰善賜帛十匹抱朴子曰謂蜥蝪為神龍者非但不識神龍亦不識蜥蝪又曰沙礫無量而珠壁甚尠鴟隼屯飛而鸞鳳罕出虺蜥盈藪而虬龍希覿王充論衡曰禹南濟於江黃龍負舟舟中人人五色無主禹乃笑而稱曰我受命於天竭力以勞萬民生寄也死歸也視龍猶蝘蜓也龍去而亡患揚雄方言曰秦晉西夏謂之守宮其在澤者謂之蜥蝪南楚謂之虵毉或謂之蠑螈北燕謂之祝蜓桂林之中守宮大能鳴者謂之蛤蟹許慎說文曰榮蚖虵毉以注鳴者也在壁曰蝘蜓在草曰蜥蝪蜥蝪守宮也淮南萬畢術曰守宮塗齊婦人无子取守宮一枚置甕中及虵衣以新布密裹之懸於陰處百日治守宮虵衣分等以唾和之塗婦人齊磨令溫即无子矣又曰守宮飾女臂有文章取守宮新合陰陽者牝牡各一藏之甕中陰乾百日以飾女臂則生文章與男子合陰陽輒滅去又曰取七月七日守宮陰乾之治合以井花水和塗女人身有文章則以丹塗之不去者不淫去者有奸徐懷遠南越志曰成陽縣樹多守宮大者能鳴謂之蛤蟹郭義恭廣志曰守宮鱗色如虵而四足似蝘蜓有尺餘蝘蜓有屋壁間者有草野者有石上者博物志曰蜥蝪或蝘蜓以器養之食以朱砂體盡赤所食滿七斤擣萬杵以點女人支體終身不滅故號曰守宮崔豹古今注曰蝘蜓一曰守宮一曰龍子善於樹上捕蟬食之其長細五色者名為蜥蝪其短大者名為蠑螈一曰虵毉大者長三尺其色玄紺善魅人一曰玄螈一名綠螈曹叔雅異物志曰魚跳躍則蜥蝪從草中下稍相依近便共浮水上而相合事竟魚還水底蜥還草中干寶搜神記曰淮南書佐劉雅夢見青蜥蝪從屋棟落其腹內因苦腹痛夢書曰守宮為寡婦著垣牆也夢見守宮憂寡婦人也吳氏本草經曰石龍子一名守宮一名石蜴一名山龍子揚子雲解嘲曰今子乃以鴟梟而笑鳳皇執蝘蜓而嘲龜龍不亦病乎蜣蜋爾雅曰蛣蜣蜣蜋也郭璞曰黑甲蟲噉糞者也張揖廣雅曰天柱蜣蜋也一作天社許慎說文曰蜣蜋一曰天柱衝波傳曰蜣蜋無鼻而聞香抱朴子曰玄蟬潔飢不羨蜣蜋穢飽郭義恭廣志曰交州無蜣蜋崔豹古今注曰蜣蜋能以土包糞轉而成丸莊周所謂蛣蜣之智在於轉丸者也一名蜣蜋一名結蜣一名弄丸一名轉丸夢書曰蜣蜋為憂財輔矣行者夢見蜣蜋憂財糧也白魚爾雅曰蟫音淫白魚也衣書中蟲一名蛃魚音丙張揖廣雅曰白魚蛃魚也齊書曰明帝初有疾無輟聽覽群臣莫知及疾篤勑臺省府署求白魚以為藥外始知之本草經曰白魚一名衣魚治婦人疝疵小便不利小兒頭中風項彊皆宜摩之生咸陽吳氏本草經曰衣中白魚一名蟫范汪方曰治小便不利取白魚二七擣之令糜爛分為數丸頓服之即通也螳蜋易通繫卦曰螳蜋搏蟬之蟲乘寒而殺物自隱蔽而有所害捕搏之象也周書時訓曰芒種之日螳蜋生不生是謂陰息韓詩外傳曰齊莊公出獵有螳蜋舉足將搏其輪問其御曰此何蟲對曰此螳蜋也為蟲知進而不知退不量力而輕就敵公曰此為天下勇士矣廻車避之勇士歸焉淮南子同又曰楚莊王將伐晉告士大夫有諫者死孫叔敖曰臣園中有榆榆上有蟬蟬方奮翼悲鳴不知螳蜋在後欲攫而食之螳蜋方取蟬不知黃雀在其後也禮記月令曰仲夏之月螳蜋生蔡邕月令章句曰螳蜋蟲名食蟬殺蟲鄭玄禮記注曰螳蜋螵蛸母也王瓚曰爾雅云莫貈螳蜋同類物色也今沛魯以南謂之螳蜋燕趙之際謂之食肬齊兗以東謂之馬敷爾雅曰莫貈螳蜋蛑螳蜋有斧蟲江東呼為石蜋蛑音謀貈戶各反不過蟷蠰螳蠰螳蜋別名堂襄二音其子蜱蛸一名𧐕蟭螳蠰卵也蜱音裨𧐕音搏蟭音焦張揖廣雅曰羊羊蛻蚘堂蜋也博焦夷冒焦螵蛸也華嶠後漢書曰蔡雍在陳留其鄰人有以酒食召雍者比至而酒酣焉客有彈琴於屏雍至門潛聽之曰嘻以樂召我而有殺心何也遂反將命者告主人曰蔡君向來至門而去主人遽自追而問其故雍具以告彈琴者曰我向鼓絃見螳蜋方向鳴蟬蟬將去未飛螳蜋為之一前一卻吾心聳然唯恐螳蜋失之也此豈為殺心而形於聲者乎雍曰此足以當之矣吳越春秋曰吳王夫差令於邦中曰寡人欲伐齊敢有諫者死太子友因諷諫以激於王以清且懷丸挾彈從後園而來衣浹履濡吳王夫差怪而問之太子對曰臣遊後園聞秋蟬之鳴往而觀之秋蟬登高樹自以為安不知螳蜋超枝緣條曳要舉刃欲哺其形也螳蜋貪心務進志在有利不知黃雀盛緣茂林徘徊枝葉欲啄螳蜋也莊子曰莊周游於雕陵之樊覩一異鵲自南方來者執彈而留之宿留伺其便也覩一蟬方得美蔭而忘其身螳蜋執翳且搏之執草以自翳見得而忘其形異鵲從而利之見利而忘其真真身也莊周怵然曰噫物固相累二類相召也捐彈而反走又曰螳蜋怒臂以當車轍不知不勝任也是才之美者也司馬彪曰非不有美才顧不勝任耳揚雄方言曰螳蜋謂之髡或謂之丁或謂之羊羊郭璞曰江東呼齕肮按爾雅丁應下屬方言依此失其旨許慎說文曰螳蜋不過也一名蟷蠰一名研父邯鄲氏笑林曰楚人居貧讀淮南方得螳蜋伺蟬自鄣葉可以隱形遂於樹下仰取葉螳蜋執葉伺蟬以摘之葉落樹下樹下先有落葉不能復分別掃取數斗歸一一以葉自鄣問其妻曰汝見我不妻始時怕荅言見經日乃厭倦不堪紿云不見嘿然大喜齎葉入市對面取人物吏遂縛詣縣縣官受辭自說本末官大笑放而不治夢書曰螳蜋為亡人蔽匿草也夢見螳蜋憂亡命者范子許然曰螵蛸出三輔上價三百吳氏本草經曰桑蛸條蝕肬一名害焦一名致神農鹹無毒成公綏螳蜋賦曰戢翼應時延頸鵠望推翳俟前翹翼高抗鳥伏虵騰鷹擊隼放俯飛蟬而奮猛躍蟪蛄而逞壯距車輪而軒翥固齊侯之所尚郭璞螳蜋讚曰螳蜋氣蟲揮斧奮臂當轍不廻勾踐是避勇士致斃勵之以義蝍蛆春秋考異郵曰土勝水故蝍蛆搏虵宋均曰蝍蛆生土虵藏物屬於坎坎水也為隱伏爾雅曰蒺蔾蝍蛆郭璞曰似蝗大腹長角能食虵腦張揖廣雅曰蝍蛆吳公也莊子曰蝍蛆甘帶司馬彪曰帶小虵也蝍蛆紀喜食其眼抱朴子曰南人入山皆以竹管盛活吳公吳公知有虵之地便動作於管中如此則草中便有虵也吳公見虵能以氣禁之虵即死淮南子曰月照天下蝕於蟾蜍螣虵游霧而殆蝍蛆蟾諸月中蝦蟆也食月故曰食於蟾諸蝍蛆蓋吳公也殆猶畏也沈懷遠南越志曰綏定縣多吳公其大者能以氣吸蜥蝪劉欣期交州記曰大吳公出徐聞縣界取其皮可以冠鼓宋永初記亦同沈瑩臨海異物志曰晉安東南吳嶼山吳公千萬積藂或云長丈餘者以作脯味似大蝦嶺南異物志曰珠崖人每晴明見海中遠山羅列皆如翠屏而東西不定悉吳公也嶺表錄異曰蜈蚣南越志云大者其皮可以鞔鼓取其肉曝為脯美於牛肉又云長數丈能噉牛俚人或遇之則鳴鼓燃火炬以驅逐之陶潛續搜神記曰曇遊道人清苦沙門也剡縣有一家事蠱人噉其食飲无不吐血死遊詣之主人下食遊依常呪願一雙吳公長尺餘便於拌中跳走遊快飲食安然无他王琰冥祥記曰沙門安法開者北人也嘗見吳公長三尺自屋墮地旋徊而去葛洪遐觀賦曰吳公大者長百步頭如車箱可畏惡越人獵之屠裂取肉白如瓠稱金爭買為羹炙
