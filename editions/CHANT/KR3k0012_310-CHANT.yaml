body:
  text: 兵部四十戰中後漢書曰吳漢討公孫述乃進軍攻廣都拔之光武戒漢曰成都十餘萬眾不可輕也但堅據廣都待其來攻勿與爭鋒若不敢來公轉營迫之須其力疲乃可擊也漢乘利遂自將步騎二萬餘進逼成都去城十餘里阻江北為營作浮橋使副將劉尚將萬餘人屯於江南相去二十餘里帝聞大驚使讓漢曰公既輕敵深入又與尚別營事有緩急不復相及賊若出兵綴公而大眾攻尚尚破公即破矣急引兵還廣都詔書未到述果使其將謝豐袁吉攻漢使別將攻尚漢敗入壁豐圍之漢乃召諸將勵之曰今與劉尚二處受圍勢既不接其禍難量欲潛師就尚於江南并兵禦之若能同心一力人自為戰大功可立如其不然敗必無餘成敗之機在此舉也於是饗士秣馬閉營三日不出乃多掛幡旗使煙火不絕夜衘枚引兵與尚合軍豐等不覺明日分兵拒水北自將攻江南漢悉兵迎戰自晨至晡遂大破之斬謝豐袁吉獲甲首五千餘級於是引還廣都尚拒述帝報曰公還廣都甚得其宜述必不敢略尚而擊公也略猶過也若先攻尚公從廣都五十里悉步騎赴之適當值其疲困破之必矣自是漢與述戰於廣都之間八戰八克又曰涼州賊王國圍陳倉不拔而去皇甫嵩進兵擊之董卓曰不可兵法窮寇勿迫歸眾勿追今我追國是迫歸眾追窮寇也困獸猶鬥蜂蠆有毒況大眾乎嵩曰不然前吾不擊避其銳也今而擊之待其衰也所擊疲師非歸眾也國眾且走莫有鬥志以整擊亂非窮寇也遂獨進擊之使卓為後拒連戰大破斬首萬餘級國走而死又曰曹操擊陶謙還過拔取睢陵夏丘皆屠之殺男女數十萬人雞犬無餘泗水為之不流又曰廉范遷雲中太守會匈奴大入塞烽火日通故事虜入過五千人移書傍郡吏欲傳檄求救范不聽自率士卒摧之范兵不敵乃令軍中蓐食晨往赴之斬首數百級續漢書曰耿弇字伯照扶風人少學詩禮見郡督尉試騎士建旗鼓肆馳騁由是心善將率後上聞弇為張步所攻欲自往陳俊曰步兵盛可且閉營待上至弇曰上且到臣子當擊牛釃酒以待百官反欲以賊虜遺君父耶遂合戰破之蜀志曰夏侯淵敗曹公爭漢中地運米北山下數千萬囊黃忠以為可取趙雲遣兵隨忠取米雲將數十人輕行出圍行視忠等值曹公揚兵大出雲勢逼且鬥且却入營更大開門偃旗鼓公軍至疑有伏兵雲雷鼓於後射公公軍驚駭自相蹂踐墮漢水死者甚多先主明旦自來至雲營圍視昨戰處曰子龍一身都為膽子龍趙雲字也作樂飲宴至暝晉中興書曰桓溫步騎四萬自江陵向關中伐偽立荊州刺史郭敬進擊青泥皆破之至于灞上戎首多降居民皆壺漿路側耆老或泣曰不圖今日復見官軍兵師符健以五千人守長安小城時運道艱難而關中大飢溫率眾還詔遣侍中黃門慰勞於襄陽犒軍十一年溫進征討大都督司冀諸軍事委以專征之任溫乃合眾治兵七月率眾伐羌十月溫次伊水羌師姚襄來逆軍屯于北遣使詣溫奉身歸命願勑前鋒小却當拜伏路左溫荅曰我自脩復中原展敬山陵無豫君事欲來相迫何復求卻於是方軌齊進襄率驍勇萬餘人距水前戰溫命小弟沖及諸將奮擊襄大敗奔北自相殺害死者數千越北芒而奔走溫屯故太極殿前賊周成率眾降溫徙入金墉謁先帝諸陵被侵毀者皆繕復之選陵令守護又曰謝玄進號冠軍將軍加領徐州刺史還于廣陵以功封東興縣侯八年玄至符堅傾國大出眾號百萬先遣符融慕容煒張蚝符方四師至潁口梁成王先等守洛澗詔加衛將軍安為征討大都督玄為前鋒都督徐兗青三州楊州之晉陵幽州之燕國諸軍事與叔父征虜將軍石從弟輔國將軍琰西中郎將桓伊龍驤將軍玄等拒之眾凡八萬玄先遣廣陵劉牢之五千人直指洛澗邸斬梁成及成弟雲步騎崩潰爭赴淮水斬首萬級生擒五千餘人十月符融進屯壽陽玄與琰等選精銳八千人決戰肥水南臨陣斬符融俘獲萬計得偽輦及雲母車其餘寶器山積錦罽數萬端牛馬驢騾駱駞十萬疋又曰符堅率眾五十萬向壽春謂融曰晉人若知朕來便一時還南固守長江雖百萬之眾無所用之今祕吾來令彼不知彼顧江東在此必當戰若其潰敗求守長江不復可得則吾事濟矣乃秘不言堅自來於是以小將旗列屯肥北晉征虜將軍謝石冠軍將軍謝玄輔國將軍謝琰西中郎將桓伊等並阻水南一時涉渡肥水融曰及吳未成列擊之必克也堅曰不然我長於步彼便於水今捨步入水是以所短擊其所長非良策矣可須彼過水一時擊之彼既背水進退無術乃可盡殺然後船舫渡江直指會稽觀禹朝萬國之處不亦樂乎列陣以待晉軍晉軍既濟戰于肥北堅被重瘡三軍潰亂堅馳還長安晉書曰劉毅泝江追桓玄戰於崢嶸洲于時官軍數千玄兵甚盛而玄懼有敗衂常漾輕舸於舫側故其眾莫有鬥心官軍乘風縱火盡銳爭先玄眾大潰又曰將軍王敦反兵至石頭欲攻晉將劉隗五罪切其將杜弘曰劉隗死士眾多未易可剋不如石頭其守將周禮少恩兵不為之用必敗禮敗隗自走敦從之禮果開城門納弘諸將與敦戰晉師大敗又曰前秦符堅率兵來伐晉將軍謝石謝玄拒之堅遣其尚書朱序說石等以眾盛欲脅而降之序謂石曰若秦百萬之眾皆至則莫可以敵也及其眾未集宜在速戰若挫其前鋒可以得志晉將遣使請戰許之堅師列陣逼肥水晉師不得度晉將使謂堅將符融曰君懸軍深入置陣逼水此持久之計豈欲戰者乎若小退師令將士周旋僕與君公緩轡而觀之不亦美也堅眾皆曰宜阻水莫令得上我眾彼寡勢必萬全堅曰但却軍令得過我以鐵騎向水逼而殺之不然因其濟水而覆之於是麾軍却陣軍遂奔退制之不可止玄以八千精卒度肥逼之融馳騎略陣馬倒被殺軍遂大敗晉師乘勝追擊死者相枕堅為流矢所中單騎遁走又慕容超載記曰於是賀賴盧公孫五樓為地道出戰王師不利崔鴻十六國春秋曰前秦符堅遣將呂光領兵伐龜茲光軍其城南五里為營深溝高壘廣設疑兵以木為人被之以甲羅之壘土龜茲王帛純嬰城自守乃傾國財寶請諸國來救溫宿尉頭等國王合七十餘萬眾以救之胡便弓馬善矛矟鎧如連鏁射不可入眾甚憚之諸將咸欲每營結陣按兵以拒之光曰彼眾我寡眾營又相遠勢分力散非良策也於是遷營相接陣為勾鏁之法精騎為遊軍彌縫其闕戰于城西大敗之純遁走王侯降者三十餘國又曰西魏末東魏遣將侯景高敖曹等圍西魏將獨孤信於洛陽東魏大將齊神武繼後西魏大將周文帝率軍救信進軍瀍東景等夜解圍去及晨周文率輕騎追之至於河上景等北據河橋南屬邙山為陣與諸軍合戰周文馬中流矢驚逸遂失之因此軍中擾亂都督李穆下馬授周文帝以復振於是大捷斬高敖曹虜其甲士萬五千赴河死者以萬數是日置陣既大首尾懸遠從辰至未戰數十合氛霧四塞莫能相知獨孤信李遠居右趙貴恰峰居左戰並不利又不知周文所在皆棄其卒先歸開府唐公等為後軍遇信等退即與俱還由是乃班師洛陽亦失守大軍至弘農守將皆已棄城西走又曰後魏末賊莫折後熾所在寇掠州人李賢率鄉兵與涇州刺史史寧討之後熾列陣以待賢謂寧曰賊聚結歲久徒眾甚多數州之人皆為其用我若揔為一陣併力擊之彼既同惡相濟理必揔萃於我勢既不分眾寡莫敵我便救首尾無以制之今若令諸軍分為數陣多設旗鼓掎角而前以脅諸柵以別統精兵直指後熾按甲而待莫與交鋒後熾欲前則懼我疑兵令其進不得戰退不得走以俟其懈擊之必破後熾一敗則眾柵不攻自拔矣寧不從屢戰頻北賢乃率數百騎徑入後熾營收其妻子僮隸五百餘人并輜重等屬後熾與寧戰勝方欲追奔忽與賢遇乃棄寧與賢接戰賊遂大敗後熾單騎遁走北史曰後魏孝文南伐齊齊將陳顯達率眾拒戰元嵩身備三仗免冑直前勇冠三軍將士從之顯達奔潰帝大悅曰任城康王大有德福文武頓出其門以功賜爵高平縣侯後周書曰天和六年宇文憲帥眾二萬出自龍門齊將新蔡王康德以憲兵至潛軍霄遁憲乃西歸仍掘移汾水水南堡復入於齊人謂略不及遠遂弛邊備憲乃渡河攻其伏龍等四城二日盡拔又進攻張辟克之獲其軍實夷其城壘斛律明月時在華谷不能救之乃北攻姚襄城陷之時汾州又見圍日久糧援路絕憲遣柱國宇文盛運粟以饋之憲自入兩乳谷襲克齊相杜成進軍姚襄齊人嬰城固守以為汾州之援齊平京王叚孝先蘭陵王高長恭引兵大至憲命將士陣而待之大將軍韓歡為齊人所乘遂以奔退憲身自督戰齊眾稍却會日暮乃各收軍又曰齊神武遂度河逼華州刺史王羆嚴守知不可攻涉洛軍於許原西太祖據渭南徵諸州兵皆會乃占諸將謂之曰高歡越山度河遠來至此天亡之時也吾欲擊之何如諸將咸以眾寡不敵請待歡更西以見其勢太祖曰歡若得至咸陽人情轉騷擾今及其新至便可擊之即造浮橋於渭令軍人齎三日糧輕騎度渭輜重自渭南夾渭而西冬十月壬辰至沙苑距齊神武軍六十餘里齊神武聞太祖至引軍來會癸巳旦候騎告齊神武軍且至望太祖軍少竟馳而進不為行列揔萃於左軍兵將交太祖鳴鼓士皆奮起于謹等六軍與之合戰李弼等率鐵騎橫擊之絕其軍為二遂大破之斬六千餘級臨陣降者二萬餘人通典曰後周末隋文帝作相輔少主相州總管尉遲逈舉兵不從隋文遣將韋孝寬討之逈男惇率眾十萬入武德軍於沁東拒之與孝寬隔水相持乃布兵二十餘里麾軍小却欲待孝寬軍半度而擊之孝寬因其却乃鳴鼓齊進惇遂大敗又曰後周末隋文帝遣將韋孝寬率兵討尉遲逈於相州軍進至州逈悉出其卒十三萬陣於城南逈舊習軍旅雖老猶被甲臨陣其麾下三千兵皆關中人為之力戰孝寬等軍失利而却鄴中士女觀者如堵高頻與李詢乃整陣先犯觀者因其擾而乘之逈眾大敗遂拔其城又曰後漢末曹公征張魯於漢中使張遼與樂進李典等將千餘人守合肥教與護軍薛悌署邊曰賊至乃發俄而吳主孫權率十萬眾圍合肥乃共發教教云若權至者張李將軍出戰樂將軍守護軍勿得與戰諸將皆疑遼曰公征在外比救至敗我必矣是以教及其未合逆擊之折其盛勢以安眾心然後可守成敗之機在此一戰諸君何疑李典亦與遼同於是遼夜募敢死之士得八百人椎牛饗將士明日大戰平旦遼被甲持戟先登陷陣殺數十人斬二將大呼自若衝壘入至權麾下權大驚眾不知所為走登高塚以長戟自守權不敢動遙見所將眾少乃聚圍遼遼左右麾圍直前急擊圍開遼將麾下數十人得出餘眾號呼曰將軍棄我乎遼復還突圍拔出餘眾權人馬皆披靡披疋靡反無敢當者自朝戰至日中吳人奪氣還脩守備眾心乃安諸將咸服權攻合肥十餘日城不可拔乃引退遼率諸軍追擊之幾復獲權孫盛曰夫兵固詭道奇正相資若郡師不知則棄師之道也至於合肥之守懸弱無援專任勇者則好戰生患專任怯者則懼心難保且彼眾我寡心必懷貪墮以致命之兵擊貪墮之卒其勢必勝勝而後守則必固是以魏武雜選武力參以周同異為之密教宣其用事至是而應若合符契妙矣北齊書曰慕容紹宗與侯景戰於渦陽大破景軍溺死於渦水水不為流景走淮南
