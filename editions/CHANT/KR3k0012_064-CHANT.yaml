body:
  text: 河南諸水孝水山海經曰平逢山西十里廆山其陽多㻬琈之玉俞隨之水出于其陰北流注于穀世謂之孝水也潘岳西征賦曰澡孝水以濯纓嘉美名之在茲橐水陜縣圖經曰橐水即魯水也西北入城百姓賴之呼為利人渠是也又按唐史云武德元年陜東道行臺金部郎中長孫操自郡東又引水入城以代井汲百姓賴之與上渠俱利於民涑水十道志曰涑水亦名襄水荊楚之地水駕山而上者皆呼為襄上也今土人呼為涑水上流亦呼為襄名即無定故陸澄地理記曰襄陽無襄水也又按襄沔記云中廬有涑水注于沔此水中有物如三四歲小兒膝頭如虎掌爪常沒水中出膝頭示人小兒不知者欲弄之輒便啖人或人有生得者摘其鼻可小小使之名曰水虎菊花源荊州記曰菊花源傍悉生芳菊被徑浸潭流其滋液水極芳馨谷中有三十餘家不穿井仰飲此水上壽二三百中壽百餘其七八十者猶不為壽夫菊能輕身益氣令人久壽於此有徵矣又後漢胡廣字伯始為侍中久患風羸南歸飲此水遂瘳焉滍水傳曰晉陽處父侵蔡楚子上救之與晉夾滍而軍水經曰滍水出南陽魯陽縣西之堯山張衡南都賦曰其川瀆則滍澧𤄶濜發源巖穴布濩漫汗漭漾洋溢總激急趣箭馳風疾又曰滍水又東南逕昆陽縣故城昔漢光武與王尋王邑戰于昆陽敗之走者相騰踐奔殪百餘里會大雨如注滍川盛溢虎豹皆股戰士卒爭赴溺死者以萬數水為不流王邑嚴尤陳茂輕騎皆乘尸而渡澧水說文曰澧水南陽雉衡山東入汝山海經曰葛山澧水出馬音禮東流于余澤其中多六足魚漢書地理志曰充縣歷山澧水出焉又離騷云阮有芷兮澧有蘭也又有澹水王仲宣贈孫文始詩云悠悠澹澧是也澹水澧水汝水說文曰汝出弘農盧氏還歸山東入淮春秋說題辭曰汝出猛山汝之為言女也宋均注曰女取其生孕也詩曰汝墳道化行也文王之化行乎汝墳之國水經曰汝出河南梁縣勉鄉西天息山注曰地理志云出高陵山即猛山也亦言出魯陽縣之大孟山愽物志云出燕泉山並異名也東觀漢記曰傅俊從上迎擊王莽二公於陽關漢兵反走還到汝水上於水岸以手飲水澡頰塵垢謂俊等曰今日罷倦甚諸卿寧憊耶潁水說文曰潁水出潁川陽城乾山東入淮豫州浸也水經注曰潁有三源右水出陽乾山之潁谷中水出導源少室左水出少室南谿漢書曰灌夫潁川人宗族豪橫潁水謠曰潁川清灌氏寧潁水濁灌氏族韓子曰鄭人有卜子妻市買鼈歸過潁川以鼈當渴飲之遂失鼈呂氏春秋曰湯讓天下於下隨卞隨自投於潁水丹水漢書曰高祖入關王陵起兵丹水以歸漢水經曰丹水出京兆上洛縣冢嶺山至丹水縣入于汋呂氏春秋曰堯有丹水之戰以服南蠻注曰水出丹魚先夏至十日夜伺之魚浮水側赤光上照如火網而取之割其血以塗足可以步行水上長居淵中尚書逸篇曰堯子不肖舜使居丹淵為諸侯故號曰丹朱六韜曰堯伐有扈戰於丹水之浦白水水經曰白水出朝陽縣西東流過其縣南至新野縣東入于涓東觀漢記曰光武皇考封南陽之白水鄉莊子曰兩神女於白水之上禹過之而趍曰治天下奈何女曰股無肢脛不生毛手足胼胝何足以至司馬彪注言憂天下太甚灌水水經注曰灌水經蓼縣禇先生所謂神龜出於江灌之間是也潧水說文曰潧水出鄭國水經注曰潧水出鄶城西北雞絡塢下東南流入洧潧字今作溱詩曰子惠思我褰裳涉溱子不我思豈無他人又曰溱與洧方渙渙兮士與女方秉簡兮溱洧鄭兩水名蘭簡孟子曰子產聽鄭國之政以其乘輿濟人於溱洧洧水說文曰洧出潁川陽城山東南入潁水經云出密縣馬嶺山注云洧別源也詩曰子惠思我褰裳涉洧子不我思豈無他士傳曰鄭大水龍鬥于時門之外洧淵時門鄭城門也京水水經注曰京水發源京縣黃堆山東亦名祝東泉勢沸湧狀若鼎揚湯俗謂之京水也索水水經注曰索水出京縣西南嵩渚山與關水同源分流即古旃然水也左傳謂楚伐鄭次旃然即此水名史記曰漢王敗於彭城韓信擊破楚兵於京索間以故項羽不能西濮水說文曰濮水出東郡濮陽南入鉅野水經曰瓠子河東北過稟丘縣為濮水史記曰晉平公令師涓鼓琴未終師曠止之曰亡國之音也平公曰是何道出荅曰此師延所作也與紂為靡靡之樂武王伐紂師延東走自投濮水之中故聞此聲必於濮水之上先聞此聲者國削問果於濮上得之莊子曰釣於濮水楚王使大夫二人先焉曰願以境內為累莊子持竿不顧也隕石水水經注曰睢陽有隕石水一名漆溝左傳云隕石於宋五隕星也故老云此水有時竭涸五石存焉故名隕水石墜處為澤呂梁水述征記曰彭城呂縣有呂梁水則莊子所稱丈夫也列子曰孔子觀呂梁懸水三十仞流沫三十里黿鼉魚鼈不能游之數百步而出被髮行歌莊子亦載豪水水經注曰豪水出陰陵縣之陽亭北小屈石穴北注于淮莊子曰莊子與惠子遊於壕梁水上汳水水經曰汳水出陰溝至浚儀縣北入睢水注云陰溝即浪蕩渠也亦言汳受旃然水字今作汴又云丹沁亂流於武德絕河南入陽合故汳兼丹水之稱河泲水斷汳承旃然而東目王賁灌大梁水出縣南而不逕其北夏水洪泛則是瀆津通故渠即陰溝也於大梁北又曰浚水矣故陳留風俗傳云浚水逕其北者也睢水漢書曰項羽與漢王戰于靈壁東漢軍大敗睢水為之不流又地理志曰睢水首受陳留縣浪蕩渠水經曰睢水東逕睢陽縣又東過相縣南流當蕭縣南入淮又曰睢水又東經睢陽縣故城南積而為蓬洪澤也又九州要記云睢陽水在宋城西又云渙水經新城南又東南合明溝水又曰傳云睢渙之間出文章天子郊廟御服出焉尚書所謂厥篚織文者也泗水說文曰泗受濟水東入淮禮曰曾子謂子夏曰吾與爾事夫子於洙泗之間退而老於西河之上漢書地理志曰洙泗之水其民涉度幼者扶老及魯道衰洙泗之間斷斷如也論衡曰儒書言孔子葬泗水泗水為之卻流此虛也泗水無知天神使之卻流孔子生時何不使之尊敬乎水經注曰地理志曰泗出濟陰乘氏縣又云出卞縣地經言北山皆為非矣山海經泗水出魯東北余昔因公事沿歷徐沇路經洙泗因令尋其源流水出卞縣故城東南桃墟西北春秋昭公七年謝息納季孫之言以孟氏成邑與晉而遷于桃杜預曰魯國卞縣東南有桃墟世謂之曰陶墟舜所處也井曰舜井皆為非也墟有漏澤方一十五里澤西際阜俗謂之媯亭山蓋有陶墟舜井之言因復有媯亭之名矣阜側有三石穴廣圓三四尺穴有通否水有盈漏漏則數夕之中傾陂竭澤矣左右居民識其將漏豫以木彰穴口魚鼈暴鱗不可勝載矣自此連岡通阜西北四十許里岡之西際便得泗水之源也愽物志曰泗水陪尾蓋斯阜矣石穴吐水五泉俱導泉穴各徑尺餘水源南側有一廟栝柏成林時人謂之原泉祠非所究也又曰漢景帝三年有白頸烏與黑烏群斗於呂縣白頸烏不勝墮泗水中死者數千洙水水經曰洙水出泰山蓋縣臨樂山西南至卞縣入于泗注云洙水西南流盜泉水注云泉出卞城東北卞山之陰論語考讖曰水名盜泉仲尼不漱又注曰夫子教於洙泗之間今於城北二水之中即夫子領徒之所也從征記曰洙泗二水交於魯城東北十七里闕里有洙泗墻南北一百二十步東西六十步四門各有石閫北門去洙水百餘步沂水說文曰沂水出東海費東入泗一曰出泰山蓋青州浸也水經曰沂水出泰山蓋縣艾山注曰鄭玄云出沂山或云臨山水有二源南源所導世謂之祚泉北水所發俗謂之魚窮泉俱東南流合成一川論語曰暮春之月春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸西京雜記曰魯人秋胡娶妻三日而遊官三年休還其婦採桑于郊胡至不識而悅之乃遺金一鎰妻曰妾夫遊官未返于茲三年未有衱辱如今日也不顧胡慚而退至家問妻何在母曰採桑于郊乃是向來挑者也夫妻俱慚遂赴沂水而死尸子曰韓雉見申羊於魯有龍飲於沂韓雉曰吾聞之出見虎搏之見龍射之今弗射是不行吾聞也遂射之郡國志云小沂水今號為長利北上有橋即張良為黃石公取履所濰水水經注曰濰水導源濰山許慎呂忱云濰水出箕屋山淮南子曰濰出覆舟山蓋廣異名也史記韓信與楚將龍且夾濰水而陳於此信夜令為萬餘囊盛沙以遏濰水引軍擊且偽退且追北信決水水大至且軍半不得渡遂斬龍且汶水說文曰汶水出琅邪泰山朱虛東入濰又云出泰山萊蕪西南入濟從征記曰汶水出萊蕪縣西南流又言自入萊蕪谷夾路連山數百里水黑多行石澗中出草藥饒松柏林灌綿濛崖壁相望或傾岑岨徑或廻巖絕谷清風鳴條山壑俱響陵高谷深兼惴慄之懼危溪險徑有懸束之艱未出谷十餘里有別谷在孤山下谷有清泉泉上數丈有石穴二口容人平行入穴丈餘高九尺餘廣四五丈言是昔人居山之處薪爨煙黔猶存谷中林木緻密行人尠有能至矣又有少許山田引灌之蹤尚存出谷有平丘面山傍水土人悉以種麥云此丘不宜殖稷黍而宜麥齊人相承以殖之詩曰汶水湯湯行人彭彭周禮考工記曰狢踰汶則死地氣然也論語雍也曰季氏使閔子鶱為費宰子鶱曰善為我辭焉如有復我者則吾必在汶上矣傳曰齊人歸我汶陽之田沐水水經云沐水出琅邪東莞縣西北山東南經東海厚丘縣梁天監二年三月土人張高等五百餘人相率開鑿此溪引水溉田二百餘頃俗名為紅花水東流入泗州漣水界淄水水經曰淄水出泰山萊蕪縣原山注云世謂之原泉淮南子曰淄澠之水合易牙嘗而知之淄澠齊二水也新序曰齊有田巴先生者行脩於內智明於外齊君聞其賢聘而問政焉田巴對曰政在正身正身之本在於群臣大王召臣臣改制前飾將造公門問於臣妾曰奚若妾愛臣將出門問從者從者畏臣據臨淄水而觀影然後自知醜惡也今齊之臣妾諫王者非特二人王如臨淄水見己之惡過而能改斯齊國治矣澠水水經注曰澠水出營丘城東世謂之漢湊水入于時水傳曰有酒如澠
