body:
  text: 兵部四十七掩襲下晉書曰石勒偽推奉晉幽州刺史王浚浚不疑勒於是輕騎襲幽州以火霄行至易水浚督護孫緯馳遣白浚引軍拒勒浚將佐咸請出軍擊勒浚怒曰石公來正欲奉戴我也敢言擊者斬乃命設饗以待之勒晨至薊北門者開門疑有伏兵先驅牛羊數千頭聲言上禮實欲填諸街巷使兵不得發浚乃懼或坐或起勒入城升其廳事命甲士執浚立之於前數其罪惡而誅之遂陷幽州又曰劉𥙿秉政劉毅為荊州刺史每多異同之議𥙿帥兵討之遣禆將王鎮惡先襲至豫章口豫章口去江陵城二十里自鎮惡進路楊聲劉蕃上先是毅稱病表請從弟兗州刺史蕃為副毅謂信然不知見襲鎮惡自豫章口捨船步上小將蒯思軍在前鎮惡次之舸留一乙士卒之次也對舸岸上豎六七旗每旗下安一鼓語所留人計我將至城便長嚴令如後有大軍狀又分隊在後令燒江津船艦鎮惡逕前襲城語前軍若有問者但云劉兗州至津戍及百姓皆言劉蕃實上晏然不疑未至城五六里逢毅親將朱顯之將千餘騎從者數十欲出江津問是何人答曰劉兗州至顯之騎前問蕃在所答云在後顯之既至後不見蕃而見軍人擔鼓排戰具又遙見江津船艦已被焚燒煙焰張天而鼓嚴之聲甚盛知其非蕃上便躍馬馳去告毅外有大軍似從下上垂已至城江津船悉被火燒矣行命閉諸城門鎮惡亦馳進軍人緣城得入門猶未及下關因得開大城東門入城內毅凡有八隊餘已得戒嚴蒯思入東門便北廻擊射堂前軍攻金城東門鎮惡入東門便直西擊金城西門軍分攻金城南門毅金城內東從舊將士猶有六隊千餘人食時就關中晡西入退散及歸降略盡鎮惡入城便因風放火燒大城南門及東門又遣人以詔及文并高祖手書凡三篋示毅皆燒不視金城內亦未信𥙿自來鎮惡至軍門人與毅東來將士或有是父兄子弟中表親者鎮惡命因鬥且共語眾並知劉𥙿自來人情離懈一更許聽事前陣散潰毅左右兵猶閉東西閣拒戰鎮惡恐慮夜暗自相傷犯乃引軍出繞金城開其南面以退毅慮南有伏兵三更中率左右三百許人開北門突出城於佛寺自縊梁書曰侯景反陷建業高州刺史李遷仕據大皋圖逆召高梁太守馮寶寶欲往其妻沈氏止之曰刺史無故不合召太守此詐君欲為反耳頃者京師危逼羽檄徵兵遍于郡縣刺史稱疾不赴繕甲治兵今已備矣而更召君往必見留追君兵眾此意可知矣魚不可脫於泉願且勿行遣使譎之曰身病篤謹遣妻傳意并送土物以省之彼聞喜必無防為君取之如反掌矣寶從之於是沈氏自將千人皆藏短兵步擔雜物唱言賝貨賝音琛先書報遷仕曰太守馮寶疾篤謹令妻沈氏傳啟并奉土貢以資軍費遷仕大悅出迎沈氏因釋擔出刃大破之遷仕脫身而遁沈氏入據其城盡收其眾後魏書曰晉王伏羅督高平源州諸軍討吐谷渾慕利延軍至樂都謂諸將曰若從大道恐軍聲先振必當遠遁若潛軍出其非意此鄧艾擒蜀之計也諸將咸難之伏羅曰夫將軍制勝萬里擇利專之可也遂間道行至大母橋利延眾驚奔白蘭慕利延兄子拾寅走河曲降其一萬餘落又曰陸俟代人也長安盧永劉超等聚黨以叛世祖詔俟以本官鎮長安使以方略定之於是俟單馬之鎮超聞之欣然以為無能為也既申揚威信示以成敗誘納超女外若姻親超猶自驚初無降意俟乃率其帳下往見超觀其舉措超使人逆曰三百人以外適當以弓馬相待三百以內當以酒食相供乃將三百騎詣超超設備甚嚴俟遂縱酒以盡醉而返後謂將士曰超可取乃密選精兵五百人激厲之言至懇切士卒荅曰以死從公必無二也遂偽獵詣超與士卒約曰今會發機以當醉為限俟於是詐醉上馬大呼手斬超將士皆應聲縱擊遂平之世祖大悅徵還轉外都大官又曰魏使蕭寶寅伐梁堰淮水濫溢將為楊徐之患寅於堰上流鑿新渠引注淮澤乃遣將士千餘夜渡淮燒其營聚破賊斬其將軍而還又曰慕容白曜南征宋以酈範為副帥次無鹽宋將申纂憑城拒守議者僉以攻具未周不宜便進範曰今輕軍遠襲深入敵境無宜淹留久稽機候且纂必以我軍來速不在攻守謂方城可憑弱卒可恃今若外潛威形內整戎旅密厲將士出其不意可一攻而剋之白曜遂潛軍偽退示以不攻纂果不設備於是即夜部分晨便騰城崇朝而剋又曰幽州刺史劉靈助以莊帝被爾朱兆所弒遂舉兵唱義諸州豪右咸相通結靈助屯於定州之安固兆遣將叱列延慶討之諸將謂延慶曰靈助善於卜占百姓信惑所在響應未易可圖若萬一戰有利鈍則大事去矣若未還師西入據關拒嶮以待其變延慶曰劉靈助庸人也天道深遠豈其所識大兵一臨彼皆恃其妖術坐看符猒寧肯戮力致死與吾爭勝負哉如吾計者欲出城營外詭言西歸靈助聞之必信而自寬潛軍往襲可一舉而擒乃出頓城西聲云將還簡精騎一千夜發詰朝造靈助壘戰於城北遂破被擒之又曰宕昌羌獠甘作亂逐其王彌定魏遣將史寧討破之甘將百騎走投生羌鞏廉王彌定遂得復位寧以未獲獠甘密欲圖之乃揚聲欲還獠甘聞之復招引叛羌依山起柵欲攻彌定寧謂諸將曰此羌人入吾術中當進兵擒之耳諸將思歸咸曰羌之聚散無常依據山谷今若追討恐引日無成且彌定還得守藩將軍功已立矣獠甘勢弱定能制之此還軍策之上者寧曰一日縱敵數世之患豈可捨垂滅之寇更煩再舉人臣之禮知無不為此觀諸軍不足與計事也如更沮眾寧豈不能斬諸將遂進軍獠甘眾亦至與戰大破之生擒獠甘并鞏廉王後周書曰劉亮初從賀拔岳西征常先鋒陷陣以功拜大都督及岳被害亮與諸將謀迎太祖豳州刺史孫定兒據州不下涇秦諸州悉相與應眾至數萬推定兒為主以拒義師太祖令亮襲之定兒以義兵猶遠未為之備亮輕將二十騎先豎一纛於近城高嶺即馳入城中定兒方致酒高會卒見亮眾皆駭愕莫知所為亮乃麾兵斬定兒首懸首號令賊黨仍遙指城外纛命二騎曰出追大軍賊黨大懼一時降附於是諸州皆歸款伏太祖置十二軍諸將將之亮領一軍每征討與怡峰俱為騎將又曰賀拔岳從爾朱天光討萬俟醜奴宣言遠近曰今氣候漸熱非征討之時待至秋涼更圖進取醜奴聞之遂以為實分遣諸軍散農營於歧州之北百里綱州岳與天光諸軍盡發掩之醜奴乃棄平亭而走岳輕騎急追明日及醜奴於平涼之長坑一戰擒之隋書曰遂州獠反命將周法尚討之軍將至賊棄州城走散山谷間法尚捕不能得於是遣使慰論以官號偽班師自行二十里軍再舍潛遣人覘之知其首領盡歸柵聚飲相賀法尚選步騎數千人襲擊破之又曰李徹從元帥衛王爽擊突厥行軍總管李充言於爽曰周齊之世有戰國中夏力分其來久矣突厥每侵邊諸將輒以全軍為計莫能死戰由是突厥勝多敗少所以每輕中國之師今者沙鉢略悉國內之眾屯據要險必輕我而無備精兵襲之可破也爽從之諸將多以為疑唯徹獎成其計請以同行遂與充率精騎五千出其不意掩擊大破之沙鉢略棄所服金甲潛草中而遁以功加上大將軍又曰李安為尚書右丞黃門侍郎下陳之役以為楊素司馬仍領行軍揔管率蜀兵順流東平時陳人屯白沙安謂諸將曰水戰非北人所長今陳人依險泊船必輕我而無備以夜襲之賊可破也諸將以為然安率眾先鋒大破陳師高祖嘉之詔書勞曰陳賊之意自言水戰為長險隘之間彌謂官軍所憚開府親將所部夜動舟師摧破賊徒生擒虜眾益官軍之氣破賊人之膽副朕所委聞以欣然進位上大將軍又曰李密擊宇文化及精兵良將多有死傷王世充在東都乘其弊而擊之率步騎二萬營於洛南李密軍於偃師北世充潛遣二百騎夜伏於邙山自統其眾遲明渡水人奔馬馳以襲密營遽出兵以拒之陳未成列兩軍已合伏兵於北山中乘高而下馳入密營燒其廬舍密見營中火發因而遁走又曰煬帝末年群盜起遣將張須陁擊盧明月於下邳賊連營十餘萬須陁絻萬人力勢不敵去賊六七里立柵相持經十餘日糧盡欲退謂將士曰賊見兵却必輕來追我其眾若出營內即虛欲以千人襲營可有大利此乘危險誰能去者人皆莫對唯秦叔寶與羅士信皆曰願行於是須陁委柵而遁使二人分領千兵潛伏於草莽既而明月悉兵追之叔寶士信馳至其柵柵門閉不得入二人超昇其樓拔賊幟各殺數人營中大亂叔寶斬關而納外兵因散縱火焚其三十餘柵煙焰漲天明月奔還須陁却逐之大破賊眾明月以數百騎遁去餘皆虜之又曰李密起兵于雍丘是時河南山東大水死者將半密將李勣言於密曰今人多阻飢若據得黎陽倉大事濟矣密乃遣勣領麾下五千人自原武濟河掩襲即日剋之開倉恣食一旬之間勝兵二十餘萬人唐書曰高宗遣將薛仁貴郭待封等伐吐蕃大非川將赴烏海仁貴謂待封曰烏海險遠車行艱澀若引輜重將失事機又破賊即廻不煩轉運彼多瘴癘無宜久留大非川嶺上寬平足堪置柵可留二萬人作兩柵輜重並留柵內吾等輕銳倍道掩其未整即撲滅之矣仁貴遂率眾先行至河口遇賊擊破斬之所獲甚眾收其牛羊萬餘頭又曰貞觀初突厥頡利可汗牙於定襄時諸部離散代州道行軍揔管李靖選驍騎三千徑赴惡陽嶺出其不意擊之突利驚走靖遂收定襄之地頡利可汗懼退寶鐵山遣使入朝謝罪請舉國內附又命靖往迎之頡利雖外請入朝猶持兩端待草青馬肥將踰沙磧其年太宗遣唐儉安脩仁往頡利牙慰撫之靖揣知其意謂副將張公謹曰詔使到彼虜必自寬若選精騎一萬齎二十日糧引兵自白道襲之破虜必矣公謹曰詔許其降行人在彼未宜置討靖曰此兵機也時不可失韓信所以破齊如唐儉等輩何足可惜督軍疾進師至陰山遇其斥候千餘帳皆俘以隨軍頡利見詔使大悅不虞官兵之卒至靖軍將逼其牙十五里虜始覺頡利乃走靖俘斬萬餘級獲口十餘萬得可汗婦隨義城公主殺之頡利奔吐谷渾西道行軍張寶相擒之以獻俄而突利可汗來降靖始復定襄恒安故地開拓北境自陰山已北至於大漠太宗初聞突厥國滅謂侍臣曰朕聞主憂臣辱主辱臣死昔國家草創太上皇以百姓之故稱臣於突厥朕未嘗不痛心疾首志滅凶奴坐不安席食不甘味今暫舉偏師無往不捷單于款塞恥其雪乎因大赦天下大酺五日又曰李愬將襲蔡州先七日使判官鄭澥告師期於裴度乃以李祐帥突將三千為先鋒李忠義副之愬自帥中軍三千田進誠以後軍三千殿而行初出文城柵眾請所向愬曰東六十里而止至賊境曰張柴圍入之而盡殺其眾令軍士少息分食繕羈勒兵甲冑發刃彀弓復建斾而出是日陰晦雨雪大風裂旗斾馬慄而不能躍士卒苦寒抱戈僵仆者道路相望其川澤梁徑險夷張柴以東師人未嘗蹈其境皆謂投身不測初張柴諸將請所止愬曰入蔡州取元濟也諸將失色監軍使駐馬哭曰果落祜計中矣愬不聽促進師其下皆謂其必不還然以從愬之令無敢為身計者愬道分五百人斷洄曲路橋其夜凍死者十二三又分五百人斷朗山路自張柴行七十里北至縣瓠城夜半雪愈甚城傍有鵝鴨池愬令驚擊之以雜其聲賊恃吳房朗山之固晏然無一人知者李祐李忠義持钁坎城而先登敢銳者從之盡殺守門卒而發其門留柝者以安之及雞鳴雪亦止愬以眾入止元濟外宅田進誠續至乃合眾攻其子城子城防卒及雜役者尚千餘人乘城拒戰初有告元濟不信又告城陷矣元濟曰是洄曲子弟歸求寒衣耳及出聽聞愬號令云常侍傳語乃曰何常侍乃得至此遂操弓挾矢麾其左右奴僕盡乘城而自督戰愬計元濟猶望董質來救乃訪質家安恤之使其子持書禮召質質見子言城已陷及元濟孤窘之狀又見李祐輩已立奇功乃慨然以單騎歸愬白衣叩伏愬前愬揖登階以賓禮與之食時田進誠既毀其城外門得甲仗庫易其器甲明日後薄城焚其南門百姓爭負薪蒿以委之元濟城上以請罪進誠授梯而下之愬得元濟檻送京師其申光二州城鎮兵尚二萬餘人相次來降自元濟就執愬不戮一人其為元濟執事帳下及廚廄之間者使復其職使之不疑乃屯軍鞠塲以候裴度也又曰石雄為劉沔禆將會昌初回鶻寇天德詔命劉沔為招撫廻鶻使三年廻鶻大掠雲朔北邊牙於五原沔以太原之師屯于雲州沔謂雄曰點虜離散不足驅除國家以公主之故不欲急攻今觀其所為氣凌我輩若稟朝旨或恐依違我輩捍邊但能除患專之可也公乃選驍健乘其不意徑趍虜帳彼以疾雷之勢不睱枝梧必棄公主亡竄事茍不捷吾自繼進亦無患也雄受教自選勁騎得沙陁李國昌三部落兼契苾拓拔雜虜三千騎月暗夜發馬邑徑趍烏介之牙時虜帳逼振武雄既入城登堞視其眾寡見氈車從十從者皆衣朱碧類華人服飾雄令諜者訊之此何大人虜曰此公主帳也雄喻其人曰國家兵馬欲取可汗公主至此國家也須謀歸路俟其兵合時不得動帳幕雄乃大率城內牛馬雜畜及大鼓夜穴城為十餘門遲明城上立旗張炬火乃於諸門縱其牛畜鼓譟從之直犯烏介牙帳炬火燭天鼓譟動地可汗惶駭莫測率騎而奔雄率勁騎追之至殺胡山急擊之斬首萬級生擒五千羊馬車帳皆委之而去遂迎公主還又曰黃巢既陷長安時鄭畋帳下小校竇玖者驍敢無敵每夜率敢死之士百人直入京師放火燔諸門斬級而還賊人悚駭呂氏春秋曰齊令章子將攻荊荊令唐篾將拒之與荊人夾泚水而軍章子令人視水可絕者荊人射之水不可得近有芻水旁者告齊侯者曰水淺深甚易知荊人所盛守盡其淺者也所簡守皆其深者也使載芻者與見章子因夜奄荊人所盛守果殺唐篾也太公陰謀書武王伐殷兵至牧野晨舉脂燭推掩不備
