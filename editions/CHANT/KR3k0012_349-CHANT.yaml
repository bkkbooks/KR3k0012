body:
  text: 兵部七十九弩釋名曰弩怒也有勢怒也其柄曰臂似人臂也鉤弦者曰牙似齒牙也牙外曰郭為牙之規郭也下曰縣刀其形然也合名之曰機言如機之巧也亦言如門戶樞機開闔有節也說文曰洛陽名弩曰弲許緣切彀弩也彍滿弓也彍音霍古史考曰黃帝作弩廣雅曰鉅黍弓谿子弩太公兵法曰弩之神名遠望尚書曰若虞機張往省括于度則釋尚書帝命驗曰玉弩發驚天下秦有往矢西流枉矢即弩星也兵精主天下見之而驚西流秦滅也賤類出高將下賤類謂秦始皇也呂不韋之妻孕身而秦襄王納之生始皇高謂丞相趙高也始皇出趙高下言天生之也賤或為賊史記曰龐涓追孫臏音牝臏量其行暮當至馬陵馬陵道狹而旁多阻險可伏兵乃大析樹白而書龐涓死此下於是令齊軍善射者萬弩夾道而伏期曰暮見火舉而俱發龐涓夜至析木下見白書乃鑽火燭之讀書未畢齊軍萬弩俱發魏軍大亂龐涓自知智窮兵敗乃自剄曰遂成豎子之名又曰高祖阨於冒頓平城天下歌曰平城之下亦誠苦七日不食不能彀弩彀張也音遘又曰始皇葬驪山令匠作機弩矢有所穿近輒射之又曰蘇秦說韓王曰谿子距黍射六百步之外許慎曰南方谿子蠻之弩皆善射又曰蘇代遺穰侯書曰以天下攻齊如以千鈞之弩決潰癰也又曰漢王臨廣武數項羽十罪項羽大怒令伏弩射中漢王漢王傷胸乃捫足曰虜中吾指漢書曰李廣傳曰廣為匈奴所擊廣身自以大黃射其禆將服虔曰大黃肩弩也又曰申屠嘉梁人也以材官蹶張如淳曰材官皆多能腳蹋強弩張之故曰蹶張律有蹶張生從高帝擊項籍又曰李陵至浚稽與單于相值騎二萬圍陵陵軍居兩山間以大車為營陵引士出營外為陣前行持戟盾後行持弓弩虜見漢軍少直前就營陵搏戰攻之千弩俱發應弦而倒又曰司馬相如為中郎建節邛笮至蜀太守以下郊迎縣令負弩矢先驅蜀人榮之又曰霍去病為驃騎將軍過河東河東太守郊迎負弩先驅續漢書曰虞詡為武都太守虜來攻城詡出戰使強弩射之三發而三中虜眾潰謝承後漢云羗攻城也東觀漢記曰耿恭在䟽勒城救兵不至恭食盡窮困士乃煮鎧弩食其䈥革恭與士推誠同死生故無貳心後漢書曰宋則子年十歲與蒼頭共弩射蒼頭弦斷矢激誤中之即死奴叩頭就誅則察而恕之頴川荀爽深以為美時人亦服焉又曰中平中黃巾賊起郡縣皆棄城走陳愍王寵有強弩數千張出軍都亭置軍營於國之都亭也國人素聞王善射不敢反叛故陳獨得完百姓歸之者眾十餘萬人又曰陳愍王寵善弩射十發十中中皆同處華嶠後漢書曰陳愍王寵射善弩其秘法以天覆地載參連為奇又有三微三小三微為經三小為緯經緯相將萬勝之方然要在機牙其射至十發十中魏氏春秋曰諸葛亮損益連弩謂之元戎以鐵為矢矢長八寸一弩十矢俱發吳志曰甘寧字興霸巴郡臨江人也吳書曰寧本南陽人也招合輕薄少年為之渠帥群聚相隨挾持弓弩負眊音餌帶鈴民聞鈴聲即知是寧也吳錄曰松梁山山石開處容數十丈高竹弩不及其上在灃州晉書曰稽紹傳云齊王被誅初兵交紹奔散赴宮有持弩在東閤下者將射之遇有殿中將兵蕭隆見紹姿容長者疑非凡人趣前拔箭於此得免又曰劉聰將趙染冤殺其長史魯徽染寇北地夢魯徽大怒引弓射之染驚悸而寤旦將攻城中弩而死又曰孟幹為吳人所獲將徙之臨海幹等志北歸慮東徙轉遠以吳人愛蜀側竹弩言能作之皓留付作部後幹逃至京都又曰崔洪薦郗詵自代詵後駮奏洪曰我舉郗詵而反奏我是挽弩自射晉陽秋曰初高祖勒兵闕下經曹爽門爽悵下督嚴世引弩將射高祖孫謙止之曰未可知三注三止高祖車乃過世說又載又曰馬隆討涼州虜隆募限腰引弩四十六鈞弓限四鈞已上隆捶檦音摽懸弓弩檦側閱試自旦至中得三千五百人唐書曰李希烈既陷汴州乘勝東侵連陷陳留雍丘頓軍寧陵期下宋州會食浙西節度韓滉命王栖曜將強弩數千夜入寧陵希烈不之知晨朝弩矢及希烈坐悵希烈驚曰此江淮弩士今入矣遂不敢東希烈夜敗晉諸公讚曰都官從事程偉案狀羊琇音酉所犯狼籍琇即遣家人持銅弩牙首入重法時人皆謂琇有權智世祖詔免琇官英雄記曰王匡字公節太山人以任俠聞辟大將軍何進府使匡於徐州發強弩五百西詣京師會進敗匡還鄉又曰袁紹擊公孫瓚先令麴義領精兵八百強弩千張以為前登又曰袁尚使審配守鄴城曹操進軍攻鄴生獲配謂曰吾近行圍弩何多也配曰猶恨其少日南傳曰南越王尉佗攻安陽安陽王有神人睪音高通為安陽王治神弩一張一發萬人死三發殺三萬人他退遣太子始降安陽安陽不知通神人遇無道理通去始有姿容端美安陽王女眉珠悅其貌而通之始與珠入庫盜鋸截神弩亡歸報佗佗出其非意安陽王弩折兵挫浮海奔竄華陽國志曰秦襄王時有一白虎常從群遊巴蜀傷害千餘人昭王乃重募有能殺虎者賞邑萬家閬中夷廖中能作白的之弩乃登樓射殺白虎昭王嘉之以其夷不欲封刻石盟要曰秦犯夷輸黃龍一雙夷犯秦輸清酒一鍾夷人安之又曰鄧芝征涪陵見玄猿抱子在樹上引弩射之中猿母其子為拔箭以木葉塞瘡芝乃歎息曰嘻吾違物之性其將死矣投弩水中芝後果死會稽典錄曰鍾離牧謂朱育曰大皇帝以中國多騎欲以當之然吳神鋒弩射三里貫洞三四馬騎敢近之乎南越志曰龍川有營澗嘗有銅弩牙流出水皆以銀黃雕鏤取之者祀而後得曾有取此牙逢風雨舉船淪沒父老云越王弩營處也雜記曰事吳朝鴻臚卿張儼議郎張純鎮南將軍朱異三人共詣驃騎將軍朱據據曰三賢屈顧老鄙相聞含甘須之明懷終賈之才相飢渴久矣各為賦一物然後乃坐乃各賦所見異賦弩曰南嶽之幹鍾山之銅應機命中射隼高墉吳越春秋曰陳音對越王曰弩生於弓弓生於彈彈生於古之孝子臣聞楚琴氏以弓矢之勢不足以威天下遂乃撗弓著臂施機設郭加之以力郭為方城守臣子也敖為人君命所起也關為守禦撿去止也錡音奇又音蟻為侍從聽人主也辭為道路通所使也弓為將軍王重負也弦為軍師禦戰士也矢為飛容主教使也金為穿敵往不止也衛為副使正道里也驃為都尉執左右也鳥不得飛獸不得走弩之所向無不恐者王曰善子之說弩也願復聞正射之道陳音對曰臣聞射之道左足縱右足橫左手若附枝右手若抱兒右手發右手不知此正射持弩之道也戰國策曰蘇秦為楚合從說韓王曰天下之良弓勁弩皆自韓出射六百步之外文子曰狡兔得而獵犬烹高鳥盡而強弩藏尉繚子曰兵如揔木弩如羊角慎子曰弩弱而矰高者乘於風也身不肖而行合者得助於眾也淮南子曰烏號之弓谿子之弩南方谿子蠻夷柘弩皆善材也不能無弦而射越舼渠容切蜀艇舼小艇船大皆一木不能無水而浮又曰鈆不可以為刀銅不可以為弩鐵不可以為弓木不可以為釜又曰萬畢術云牛翁十四可以強弩取牛翁十四枚曲蟮白頸者二七以三尺新布褁之活塗布著之無令人見用之拭弩令溫引之校半力也阮子曰世多善弩而拙於弓弓無法准故任巧由意弩有法准故易有善抱朴子曰秋以弓弩在前太公六韜曰陷堅陣敗強敵以大黃參連弩大扶月車三十六乘才士強弩矛戟為翼太公兵法曰神后加四仲者以為明堂宮時天一出遊八極之外行窈寘之中日照其前月照其後當此之時天一自持玉弩執法承相刻不道者崔寔政論曰永平建初之際去戰未久官兵勁利有蔡太僕之弩擅名天下風俗通曰汲令應郴一作余祖父郴夏至日請主簿杜宣賜酒時北壁上懸赤弩照於杯中見其形如虵宣惡之然不敢不飲因得胸腹病攻治不差郴後知之過宣家問疾之由以為虵入腹中郴遶廳事思惟良久顧懸弩曰此是乎乃扶宣來於故處設酒杯中致復有虵因謂宣曰北壁上弩影耳非有他怪宣意解病即瘳又曰臧文仲家欲炊而失釜及弓弩自行十洲記曰續弦膠或名連金泥此膠能屬連弓弩斷絃連刀劍斷折之金膠連使人挽製他處即斷此終不復脫天漢二年帝事北海祠恒山西國王使至獻膠四兩吉光毛裘武帝受以付庫不知膠裘二物之妙也以上貢不奇稽留使未遣之帝幸華林苑射虎而弩絃斷使者從駕因上膠一分使口濡以續絃帝驚乃使武士數人對掣終日不斷膠青色如碧玉吉光毛裘黃色盖神馬之類也裘入水經月不沉入火不焦帝方重之厚賂使者而遣之趙公王琚音居教射經曰弩古有黃連百竹八檐雙弓之號今有絞車弩中七百步攻城拔壘用之擘張弩中三百步步戰用之馬弩中二百步馬戰用之弩張遟臨敵不過三發所以戰陣不便於弩非弩不利於戰而將不明於弩也不可雜於短兵當別為隊攢箭注射則前無立兵對無橫陣復以陣中張陣外射番次輪廻張而復出射而復入則弩不絕聲敵無薄我夫置弩必處其高爭山奪水守隘塞口破驍陷果非弩不剋殺法令曰張弩後左廂丁字立當弩八字立高揎手揎音宣屈衫襟左手承橦右手迎上當心看張張有闊狹左䏶右膊還復當心安箭高舉射敵遠擡弩頭敵近平身放敵在左右廻身放敵在高上挈腳放放箭訖唱殺却製拗蝎尾覆弩還著地太白陰經發弩圖篇曰弩者怒也言其聲勢威嚮如怒故以名其弩也穿剛達堅自近及遠守險塞口破驍陷堅非弩不剋也後漢李尤弩銘曰粵自近古發意所覩前聖制弓後世造弩機牙發矢執破醜虜克獲雖屢猶不可常忘戰者危極武者傷魏陳琳武軍賦曰弩則幽都䈥角恒山檿幹通肌暢骨直矢輕弦當鋒摧決貫遐洞堅陵機七導曰長角三倡武士棊布捺紫間之神機審心中而後射東觀漢記云朱勃理馬援表曰羗反殺吏唯狄道為國堅守然民飢餓噉弩煮履援救倒懸之急存幾亡之城蔡邕幽州刺史議曰幽州突騎冀州強弩為天下精兵國家瞻核四方有事未嘗不取辦於二州暨艷集雜移曰角弩既調射者又工多獲鶉鳥能無懇傷文選曰機不虛椅又曰虞機發留鵁鶄又曰良將勁弩守要害之處射雉賦曰擎牙伭鏃心平望審又曰黃間機張鏃折毫芒俯貫魴鱮仰落雙鶬魚不及竄鳥不及翔又曰彀金機馳鳴鏑剪爵毫落勁翮
