body:
  text: 石藥上紫石英山海經曰單孤之山蓬水出焉其中多紫石英魏氏春秋曰黃初元年明帝愈崇宮殿彫飾觀閣取白石英及紫石英五色文石於太行榖城之山宋書曰謝瞻字宣遠六歲能屬文為紫石英贊為當時才士歎異隋書曰梁彥光少歧嶷有至性七歲時父遇篤疾醫云餌五石可愈時求紫石英五色文石於太行不得彥光憂瘁不知所為於園中見一物彥光所不識怪而持歸即紫石英也親屬咸異之抱朴子內篇曰或問不寒之道荅曰以立冬之日或服六丙六壬符或服太陽酒或服紫石英東筦縣西北二十里有襮山出紫石英舊以貢獻永嘉記曰固陶朴有小山出紫石英人嘗於山下得一紫石英王府君聞遣人緣山掘得數升芒角甚好色小薄孫府君亦掘得數升也從征記曰自太峴至太山皆有紫石英太山所出特復瓌殊吳興記曰烏程縣北壟山有紫石英甚光明但小黑博物志曰平氏陽山縣紫石英特好其他者色淺紫石英舊出胡陽縣嶺表錄異曰隴州山中多紫石英其色淡紫其質瑩徹隨其大小皆五稜兩頭如箭鏃煮水飲之暖而無毒比北中白石英其力倍矣本草經曰紫石英味甘溫生太山谷治心腹嘔逆邪氣補不足女子風寒在子宮絕孕十年無子久服溫中輕身延年吳氏本草曰紫石英神農扁鵲甘氣平季氏太寒雷公太溫歧伯甘無毒生太山或會稽採無時欲令如削紫色頭如樗蒱者白石英本草經曰白石英味甘微溫生山谷主治消渴陰痿不足嘔逆益氣除濕痺鬲間久寒益氣久服輕身長年生華陰永嘉記曰安固老山出白石英吳氏本草曰白石英神農甘歧伯黃帝雷公扁鵲無毒生太山形如紫石英白澤長者二三寸採無時久服通日月光青石英本草經曰青石英形如白石英青端赤後者是赤石英本草經曰赤石英形如白石英赤端故赤澤有光味苦補心氣黃石英本草經曰黃石英形如白石英黃色如金在端者是黑石英本草經曰黑石英形如白石英黑澤有光石流黃後魏書曰悅盤國有火山山傍石皆燋鎔流數千里迺凝堅人取以為藥即石流黃也淮南子曰夏至流黃澤抱朴子曰石流黃五岳皆有而箕山為多其方言許由就此服之長生故不復以富貴累意范子計然曰石流出漢中神仙傳曰劉馮餌石流黃老而更少博物志曰西域使至王暢說石流黃出且彌山去高昌八百里有石流黃高數十丈縱廣五六畝有取流黃孔穴晝視其孔上狀如青煙常高數尺夜視皆如燃燈光明高尺餘暢所親視見也且彌人言是時氣不和皆往保此山毒氣自滅本草經曰石流黃味酸生谷中治婦人陰蝕疽痔能作金銀物生東海吳氏本草經曰流黃一名石流黃神農黃帝雷公鹹有毒醫和扁鵲無毒或生易陽或河西或五色黃是潘水石液也燒令有紫炎者八月九月採治婦人結陰能化金銀銅鐵石流青本草經曰石流青青白色主益肝氣明目石流赤神仙傳曰許由巢父服箕山石流丹抱朴子曰石流丹者山之赤精蓋石流黃之類也皆浸溢於涯岸之間其濡濕者可丸服其已堅者可散服如此者有百二十種皆石芝本草經曰石流赤生羗道山谷石膽孝子王冊曰虎魄又名為石膽十洲記曰滄浪海島上有石膽服之神仙仇池記曰石膽川平池出石膽博物志曰皇初三年武都西部都尉王褒獻石膽二十斤范子計然曰石膽出隴西羌道本草經曰石膽一名畢石一名君石生秦州羗道山谷大石間或出句青山其為石也青色多白文易破狀似空青能化鐵為銅合成金銀練餌食之不老吳氏本草經曰石膽一名黑石一名銅勒神農酸小寒李氏大寒桐君辛有毒扁鵲苦無毒生羗道或句青山二月庚子辛丑採石肺本草經曰石肺一名石肝黑澤有赤文如覆肝置水中即乾濡主益氣明目生水中石脾本草經曰石脾一名胃口一名腎石赤文主治胃中寒熱青石脂本草經曰青石脂味酸平無毒主養肝膽氣赤石脂越絕書曰田鍾穹隆山赤松子所取赤石脂也永嘉記曰赤石脂出永寧赤石山荊州記曰義陽有赤石脂山本草經曰赤石脂味酸無毒養心氣范子計然曰赤石脂出河東色赤者善黃石脂本草經曰黃石脂味平無毒主養脾氣白石脂本草經曰白石脂味甘無毒主養肺氣黑石脂本草經曰黑石脂味甘無毒主養腎氣強陰陽蝕腸泄利吳氏本草曰五石脂一名青赤黃白黑符青符神農甘雷公酸無毒桐君辛無毒季氏小寒生南山或海涯採無時赤符神農雷公甘黃帝扁鵲無毒季氏小寒或生少室或生太山色絳滑如脂黃符季氏小寒雷公苦或生嵩山色如肫腦雁鶵採無時白符一名隨歧伯雷公酸無毒季氏小寒桐君甘無毒扁鵲辛或生少室天婁山或太山黑符一名石泥桐君甘無毒生洛西山空地凝水石本草經曰凝水石味辛寒生山谷治身熱腹中積藂邪氣煩滿飲之不飢生常山范子計然曰凝水石出河東色澤者善吳氏本草曰凝水石一名白水石一名寒水石神農辛歧伯毉和甘無毒扁鵲甘無毒季氏大寒或生邯鄲採無時如雲母也陽起石本草經曰陽起石一名白石味酸微溫生山谷治崩中補足內攣藏中血結氣寒熱腹痛漏下無子陰陽不合生齊地吳氏本草曰陽起石或作羊字神農扁鵲酸無毒桐君雷公歧伯無毒季氏小寒或生太山或陽起山採無時石鍾乳吳錄地理志曰始安始陽有洞山山有穴如洞庭其中生石鍾乳唐書曰高季輔為太子右庶子上䟽切陳得失特賜鍾乳一劑曰卿進藥石之言故以藥石相報列仙傳曰邛䟽煮石髓而服之謂之石鍾乳水經曰大洪山巖嶂皆數百許仞入石門得穴穴上素崖壁立非人跡所及穴中多鍾乳凝膏下垂望若冰雪微津細液滴瀝不斷幽穴潛遠行者不極又曰易水東經孔山山下有鍾乳穴穴出佳乳採者揭水尋沙入穴里許太山記曰山有鍾乳但不好耳湘川記曰湘東陰山縣有黃坑山出鍾乳長沙湘鄉縣出鍾乳季秋入穴六七里乃得盛弘之荊州記曰天門郡出石鍾乳永嘉記曰安固縣東山石穴出鍾乳東陽記曰北山崖有洞穴有人嘗於此穴採鍾乳八十餘日糧盡而穴不窮劉道真錢塘記曰靈隱山北有穴旁入行數步有清流水廣丈餘昔有人採鍾乳水際見異跡或云是龍跡聞穴裏隆隆有聲便出不測所採近遠范子計然曰石鍾乳出武都黃白者善本草經曰石鐘乳一名留公乳味甘溫生山谷明目益精治欬逆上氣安五藏百節通利九竅下乳汁生少室吳氏本草曰鍾乳一名季氏大寒或生太山山谷陰處岸下藂溜汁所成如乳汁黃白色空中相通二月三月採陰乾孔公蘗本草經曰孔公蘗一名通石味辛溫生山谷治食化氣利九竅下乳汁治惡瘡疽瘻生梁山吳氏本草曰孔公蘗神農辛歧伯鹹扁鵲鹹無毒色青黃礜石說文曰礜毒石也山海經曰皋塗之山有白石焉名曰礜可以毒鼠今礜石殺鼠蠶食之而肥范子計然曰礜石出漢中色白者善湘州記曰湘東山多礜石博物志曰鸛伏卵時取礜石周遶卵以助暖氣方術家取鸛巢中礜石為真荊州記曰湖縣鹿山舍傍多礜石每至嚴冬其上不得停霜雪盛弘之荊州記曰魚復縣岸崩特出礜石吳興記曰長城縣有白石山出白礜石極精好本草經曰礜石一名青分石一名立制石一名固羊石味辛生山谷治寒熱鼠瘻蝕瘡除熱殺百獸生漢中吳氏本草曰白礜石一名鼠卿一名太白一名澤乳一名食鹽神農歧伯辛有毒桐君有毒黃帝甘有毒季氏大寒主溫熱生漢中或生魏興或生少室十二月採
