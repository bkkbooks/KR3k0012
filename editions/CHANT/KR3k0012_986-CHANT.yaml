body:
  text: 藥部二丹易參同契曰丹沙木精得金乃并書曰荊及衡陽惟荊州杶幹栝柏礪砥砮丹砥細於礪皆磨石也砮石中矢鏃丹朱類汲冢周書玉會曰成王時濮人獻丹沙濮人西南角之蠻丹沙所出禮儀曰君乘木而王地生丹孝經援神契曰德至山陵則陵出黑丹宋均注曰丹應五典備五色也春秋斗運樞曰搖光得陵出黑芝亦令人長生以金投中則名為金漿以玉投中則名為玉澧服之皆長生又有取伏丹法云天下諸水有石丹者其水中皆有丹魚先夏至十日夜伺之丹魚必浮於岸側赤光上照赫然如火網而取之雖多勿盡取之也割取血以塗足下則可步行水上長居水中史記曰寡婦清先得丹穴而擅其利清寡婦能守其業始皇為女築懷清臺梁書曰陶弘景既得神符祕訣以為神丹可成而苦無藥物帝給黃金朱沙曾青雄黃等後合飛丹色如霜雪服之體輕及帝服飛丹有驗益敬重之唐書曰道士劉道合者宛丘人高宗令合還丹丹成而上之咸亨中卒唯有空皮而背上開拆有似蟬蛻高宗聞之曰劉師為我合丹自服仙去其所進者亦無異典略曰白丹者山陵之精也淮南子曰赤水宜丹黃水宜金清水宜龜抱朴子曰余考覽養生之書究集久視之方曾所披涉篇以千計矣莫不以還丹金液為大要焉然則二事蓋仙道之極也服此而不仙則古無仙矣昔左元放於天注山中精思神人授以丹經仙公從元放受之凡受太清丹經三卷及九鼎丹經一卷金液經一卷子師鄭君者子從祖仙公之弟子乃於馬跡山中立墠盟受之并具諸口訣之不書者又曰太清神丹其法出元君元君者老子之師也太清觀天經有十四篇云其上七篇不可以教授其中四篇無足傳嘗沉之三泉下篇者正是丹經上中下三卷其經曰上下得道長生世間又曰漢末新野陰君合此太清丹得仙其人本儒生有才思著詩及丹經讚并序述初學道凌師本末引己所知識之得仙者四十餘人甚分明也又曰有九光丹與九轉異法大都相似耳作之之法當先以諸藥合水火以轉五石五石者丹砂雄黃礜石曾青磁石也一石轉五轉而各成五色五石合為二十五色色各一兩而異器盛之欲起死人未滿三日取清丹一刀圭和以水浴死人之身又以一刀圭發其口內之死人立生欲致行廚取黑丹和以塗左手所求如所道皆自致可致天下萬物也欲隱形及先知未然方來之事及住年不老服黃丹一刀圭即便長生不復老坐見千里之外吉凶皆如在目前也人生相命盛衰壽夭貴賤貧富皆知之矣其法具在太清中卷又曰五帝雲丹方一卷其法五也用丹砂雄黃石流黃曾青礜石磁石礬石戎鹽太一禹餘糧亦同用太一泥及神室祭醮之三十六日成又曰以金液為威喜巨勝之法取金液及水銀合煮之三十日出以黃土甌盛封以太一泥置之猛火上炊之卒時皆化為丹服如小豆便仙以此丹一刀圭粉和水銀一斤即成銀又取此丹一斤置猛火上扇之化為赤金而流名曰丹金以塗刀劍兵去萬里以此丹金為盤椀食其中令長生以承日月得神液如方諸之得水也飲之令人不死又曰九丹誠為仙藥之上然合作之所用雜藥甚多若四方清通者市之可得取若九域分攝則其物或不可得也又曰葛稚川云余祖鴻臚少時曾為臨沅令云此縣有廖氏家世壽考或出百或八九十後徙去子孫多夭折他人居其故宅者復累世壽由此乃覺是宅所為而不知其何故疑其井水殊赤乃試掘井左右得古人埋丹沙數十斛山海經曰拒山英水出焉其中多丹粟又曰始州國有丹山論衡曰太公陰謀書武王伐紂食小兒以丹金身純赤長大教云殷王亡民見兒身赤以為天神說文曰丹越之赤石也臒善丹也神仙傳曰采女請問彭祖延年之法彭祖曰欲舉形登天上補仙官者當用金丹此九君太一所以白日昇天又曰馬明生從道人受太清神丹經三卷入山合藥服之不樂昇天但服半劑為地仙展轉九州百餘年乃白日昇天也又曰淮南王安從八公受丹經及三十六水方又曰李少君從安期先生受神丹爐火之方家貧不得藥乃以方干漢武帝云又曰葛玄字孝先從左元放受九丹金液仙經又曰劉元鳳南陽人服芙蓉丹及鷄子丹魯女生別傳曰李少君字雲翼齊國臨淄人也少好道入山採藥修全身之術道未成而病困於山林中遇安期先生經過見少君少君叩頭求乞生活安期愍其有志乃以神樓散方與服之即起少君求隨安期奉給奴役廣志曰丹朱沙之朴也大者如米生山中出牂牁與古僂國裴淵廣州記曰鄣平縣有朱沙塘水如絳又曰鄣平縣有石膏山望之若霜雪又一嶺東為銀石南是鐵石西則丹沙北乃銅石本章曰丹砂味甘微寒生山谷養精神益氣明目鈆丹味辛微寒生平澤治吐逆胃反久服成仙生蜀都吳氏本草曰丹砂神農甘黃帝歧伯苦有毒扁鵲苦李氏大寒或生武陵採無時能化朱成水銀畏礠石惡鹹水武陵太守謝承表曰新宮成上丹砂五百斤上億萬歲壽芝上春秋運斗樞曰搖光得陵出黑芝孝經援神契曰德至草木則芝草生爾雅曰苬似由反芝也郭璞曰芝一歲三華瑞草漢書曰武帝時芝生殿內房中九莖詔赦天下作芝房歌又曰宣帝神爵元年三月詔曰金芝草九莖服虔曰色象金產于函德殿銅池中如淳曰函亦含也銅池承霤也晉灼曰以銅作池韋昭曰以銅飾池邊也東觀漢記曰明帝永平七年公卿以芝生前殿奉觴上壽桓帝建和元年芝草生中黃藏府又曰光和四年郡國上芝草英續漢書曰建初五年零陵女子傅寧宅內生紫芝五株長者尺四寸短者七八寸太守沈豐使功曹齎芝以聞帝告示天下宋書曰順帝升明二年臨城縣生紫蓋黃裏芝芝歷時質色不變唐書曰貞觀中皇太子寢室中產素芝十四莖並為龍興鳳翥之刑又曰天寶中有玉芝產于大同殿之柱礎一本兩莖神光照於殿又曰上元中延英殿御座生玉芝一莖三花御製玉靈芝詩淮南子曰巫山之上從風縱火紫芝與蕭艾俱死又曰稻生水而不能生於湍瀨之流芝生於山而不能生於盤石之上抱朴子曰芝者有石芝有木芝有草芝有肉芝有肉芝名有百許種也石芝者石象芝生於海隅石山及島嶼之涯肉芝者狀如肉頭尾四足良似生物也附於大石蓋在高岫嶮峻之地或卻著仰綴也赤者如珊瑚白者如截肪黑者如澤漆青者如翠羽黃者如紫金而皆光明洞徹如堅冰也晦夜去之一二百步便望見其光矣大者十餘斤小者三四斤非久齋至精及佩老子入山靈寶五符亦不能得見此凡見諸芝且先以開山卻害符置其上則不得復隱蔽化去矣徐徐擇王相之日設醮然後取之皆從日下禹步閉氣而往也又得石象芝擣之三萬六千杵服方寸匕日盡一斤則得千歲十斤則萬歲亦可分人服之玉脂芝生於有玉之山常居懸危之處玉膏流出萬年已上則凝而成芝有似鳥獸之形色無常采率多似山水蒼玉也亦鮮明如水精得而采之以無心草汁和之須臾成水服一升得一千歲也又曰七明九光芝皆石也生臨水之高山石崖之間狀如盤椀不過徑尺以還有莖葉連綴之起三四寸有七孔者名七明九孔者名九光光皆如星百餘步內夜可望見其光其光自別常以秋分伺之得之擣服方寸匕入口服則噏然身熱五味甘美盡一斤則得千歲令人身有光所居暗地如月可以夜視書也又曰石蜜芝生少室石戶中戶中便有深谷不可得過以石投谷中半日猶聞其聲也去戶外十餘丈有石柱柱上有偃蓋石南度徑可一丈許蜜芝生石上墮入偃蓋中良久輒有一滴有似雨後屋之餘漏時時一落耳然蜜芝墮不息而偃蓋亦終不溢也戶上刻石為科斗字曰得服石蜜芝一斗者壽萬歲諸道士共思推其處不可得往唯當以椀器著勁竹木端以承取之然竟未有能為之者按此戶上刻題如此前世必已有得之者也又曰石桂芝生山巖穴中似桂樹而實石也高尺許光明而味辛有枝條檮服之一斤得千歲也石中黃子所在有之沁水山為尤多其在大石中則其石常潤濕不燥打其石石有數十重乃得之在大石中赤黃溶溶如鷄子之在殼中也即當飲之不飲則漸堅凝成石不復中服也法正當及未堅時啜之既凝則不得服也破一石中多者有一升少者有數合不可頓服雖不得多相繼服之其計前後所服合成三斗則千歲但欲多服唯患難得耳又曰石脛芝生滑石中亦如石中黃子狀但不皆有耳打破大滑石千許乃可得一斤初破之其在石中五色光明而自動服一升得千歲矣又曰木芝者松柏脂淪地千歲化為伏芝萬歲其上生小木狀似蓮花名曰木威喜芝夜視有光持之甚滑燒之不燋帶之辟兵以帶鷄而雜他鷄十二頭共籠之去十二步射十二箭他鷄皆傷帶威喜芝者終不傷也從生門上採之六甲陰中乾之百日末服方寸匕日三盡一枝則三千歲也
