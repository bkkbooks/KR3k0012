body:
  text: 禮儀部二十三喪紀上周禮天官宰夫曰大喪小喪掌小官之戒令帥執事而治之大喪王后世子也小喪夫人以下也小官士三公六卿之喪與職喪帥官有司而治之凡諸大夫之喪使其旅帥有司而治之旅冢宰下下士也又天官宮正曰大喪則授廬舍辨其親踈貴賤之居廬倚廬也舍堊室也親者貴者倚廬踈者賤者居堊室也又天官獸人曰凡喪紀賓客共其死獸生獸共其完者又天官漁人曰凡喪共其魚之鱻薨周禮天官腊人曰凡喪共其脯腊凡乾肉之事又天官淩人曰大喪共夷槃水夷亦尸也實水於夷槃中置之尸床之下所以寒尸也又天官籩人曰喪事及賓客之事共其薦籩羞籩喪事乃籩謂殷莫時又天官籩人曰凡喪紀共其薦羞之豆實又天官掌次曰凡喪紀王則張帟三重諸侯再重孤卿大夫不重張帟柩上承塵又天官曰司裘大喪廞裘飾皮車皮車遣車之革路也古書廞字為淫鄭司農云淫裘陳裘也六謂廞興也若詩人之興云謂象似而作之又天官內小臣曰若有裘紀則儐詔后之禮又天官閽曰喪紀之事設門燎蹕宮門廟門燎地燭也蹕行者廟在中門之外又天官寺人曰喪紀之事則帥女宮而致於有司有司謂宮卿世婦也又天官世婦曰掌喪紀之事帥女宮而濯概為栥盛概拭也為猶差擇也又天官女御曰大喪掌沐浴王及后之喪也后之喪持翣從世婦而吊于卿大夫之喪從之數蓋如使者之介也又天官典絲曰喪紀共其絲纊組文之物以給線縷著盱口綦握之屬也青與赤謂之文又天官內司服曰右之喪共其衣服凡內具之物內具紛悅線纊槃帙之屬又地官大司徒曰大喪帥六鄉之眾庶屬其六引而治其政令眾庶所致役也鄭司農云引喪車索也六鄉主六引遂六主紼也若國有大故則致萬民于王門令無節者不行天下大故謂王崩及冠兵也節六節也有節乃得行防姦偽也又地官曰鄉師大喪用役則帥其民而至遂治之治謂監督其事及葬執纛以與匠師御柩而治役匠師事官之屬其司官若鄉師之於司徒也鄉師主役匠師主眾匠共主葬引翿羽葆幢也爾雅曰纛醫也以指麾輓柩之役正其行列進退及窆執斧以涖匠師匠師主豐碑之事報執斧以莅之使戒其事又地官閭胥曰凡喪紀之數聚眾庶既比則讀法書其敬敏任恤者喪紀大喪之喪之事也皆會聚眾民因以讀法勑戒之也又地官遂師曰大喪使帥其屬以幄帟先道野役及窆抱磨共丘籠及蜃車之役使以幄帟先者太宰也其餘司徒也幄帟所為葬窆之間先張神坐也道野役帥以至墓也丘籠之役竁復士也其器曰籠蜃車柩路也載柳四輪迫地而行似於蜃因取名焉行至壙乃脫更復載復以龍斬又地官委人曰喪紀共其薪蒸木材又地官土均曰禮俗喪紀祭祀皆以地媺惡為輕重之法而行之掌其禁令君子行禮不求變俗隨其土地厚薄為之制也又地官囿人曰喪紀賓客共其生獸死獸之物又地官舍人曰大喪共飯米敖穀飯所以實口不忍虛也君用梁大夫用稷士用黍皆四升實者唯盈敖穀者措于一旁所以惑蚍蜉又春官大宗伯曰以凶禮哀邦國之憂朝覲會同則為上相大喪亦如之又春官小宗伯曰王崩大肆以秬鬯渳鄭司農云大肆大浴也秬以鬯浴尸也又春官肆師曰大喪大渳以鬯則築鬻築香草煮以為鬯以浴尸也香草鬱又春官鬱人曰大喪之渳共其肆器肆器陳尸之器及葬共其祼器遂埋之遣奠之彝瓚也埋於祖廟階間又春官鬯人曰大喪渳設斗共其釁鬯斗所以沃尸也釁尸所以鬯酒使之香美者也又春官司几筵曰凡喪事設葦席右素几其柏席用萑黼純諸侯則紛純每敦一几喪事諸几奠也萑如葦而細者也鄭司農云柏席迫地之席也葦居其上或曰柏席載黍稷之席也玄謂柏槨字磨減之餘也槨席藏中神坐之席也敦謂曰燾燾覆也棺在殯則槨敦既窆則加見皆謂覆之周禮雖合葬及周時在殯皆異几體實不同也祭於廟同几精氣合凡吉事變凡凶事仍几古書仍為鄭司農云變几變更其質謂無飾又春官天府曰凡國之玉鎮大寶器藏焉若有大祭大喪則出陳之既事藏之玉鎮大寶器玉瑞玉器之美者也禘祫及喪陳之以華國也凡吉凶之事祖廟之中沃盥執燭吉事四時祭也凶事后王喪朝於祖廟之奠也又春官職喪曰掌諸侯之喪及卿大夫士凡有爵者之喪以國之喪禮涖其禁乃序其事國之喪禮喪服土喪既夕土虞今存者也其餘則亡事謂小歛大斂葬也凡國有司以王命有事焉則詔贊主人有事謂含遂贈之屬鄭司農云凡國諸侯國也有司謂王有司以命有事職喪主詔贊主人凡公有司之所共職喪令之趣其事今令其當共物者給事之期也有司或言公或言國者由其君所來也居其官曰公又春官司巫曰凡喪事掌巫降之禮降下也下神之禮也又春官太史曰大喪執法以涖勸防鄭司農云勸防六引六沸也遣之日讀誄遣謂祖廟之庭大奠將行之時也人之道終於此累其行而讀之太師帥瞽廞之而謚瞽史知天道使共其事言王之誄謚成於天也凡喪事考焉為有得失又春官巾車曰掌王之喪車五乘木車蒲蔽犬䄙尾橐䟽飾小服皆䟽木車不漆者也鄭司農云蒲蔽車謂嬴蘭車以蒲為蔽也天子喪服之車也漢儀亦然犬䄙以犬皮為覆笭也故書䟽為揟杜子春讀揟為沙玄謂蔽車旁禦風塵者也犬白犬皮也既以皮為覆笭又以其尾為戈戟之弢麤布飾二物之側為緣也若今攝菔云也服讀為菔刀劍短兵衣也此始遭喪所乘也為君之道尚微備姦臣也書曰以虎賁百人迎子釗亦為備焉素車棼蔽犬䄙素飾小服皆素素車以白土堊車也棼讀為薠薠麻也以麻為蔽也其䄙繒為緣此卒哭所乘也為君之道益著在車可以去戈戟也薻車薻蔽鹿淺䄙革飾故書藻為𨎮杜子春云𨎮讀為華藻之藻直謂華藻也玄謂藻水草名蒼色也以蒼土堊車以蒼繒為蔽鹿夏皮為覆笭也又以所治去毛者緣之此既練所乘之車也駹車雚蔽然䄙髤飾駹車邊側有漆飾也雚細葦席也以為蔽者漆則成藩即吉也然果然也髤赤多黑少之色韋也此大祥所乘之車也漆車藩蔽豻䄙雀飾漆車墨車也藩今時小車藩也漆席以為蔽豻胡犬也雀黑多赤少之色韋也此禫所乘之車也大喪飾遣車遂廞之行之謂陳駕之及葬執蓋從車持旌隨柩路持蓋與旌及墓呼啟關陳車小喪共柩路與其飾柩路載柩車飾柩飾又春官司常曰大喪共銘旌建廞車之旌又夏官大司馬曰大喪平士大夫鄭司農云平壹其服也玄謂平者正其職與位也喪祭奉詔馬牲王之喪以馬祭者蓋遣莫也奉猶送也送之至莫告而藏之又夏官射人曰大喪與僕人遷尸作鄉大夫掌事此其廬不敬者呵罰之僕人大僕與射人俱掌王之朝位也又夏官司士曰大喪作士掌事作六軍之士執披披持棺者又夏官諸子曰大喪正群子之服位又夏官虎賁氏曰國有大故則守王門大喪亦如之又夏官太僕曰喪紀正王之服位詔法儀贊王牲事牲事殺割杜載之屬大喪始崩戒鼓傳達于四方窆亦如之戒鼓擊鼓以敬眾也又夏官司兵曰大喪廞五兵廞興也興作明器之役器五兵也又夏官圉人曰喪紀牽馬而入陳廞馬亦如之廞馬遣車之馬也又秋官大司寇曰凡朝覲會同前王大喪亦如之大喪所前或嗣王也又秋官士師曰諸侯為賓則帥其屬而蹕于王宮大喪亦如之又秋官鄉士曰大喪紀帥其屬夾道而蹕屬中士已下也又秋官司隸曰賓客喪紀之事則役其煩辱之事煩猶劇也士喪禮下篇曰隸入涅廁又秋官大行人曰若有大喪則詔相諸侯之禮詔相左右告教之禮記檀弓上曰子上之母死而不喪門人問諸子思曰昔者子之先君子喪出母乎曰然子之不使白也喪之何也子思曰昔者吾先君子無所失道道隆則從而隆道汙則從而汙伋則安能為伋也妻者是為白也母不為伋也妻者是不為白也母孔氏之不喪出母自子思始也禮記所由廢非之也又檀弓上曰公叔朱有同母異父昆弟死問於子游子游曰其大功乎狄儀有同母異父之昆弟死問於子夏子夏曰我未之前聞也魯人為人齊衰狄儀行齊衰今之齊衰狄儀之問也又檀弓上曰子思之母死於衛子思伯魚子伯魚死妻嫁於衛柳若謂子思曰子聖人之後也四方於子乎觀禮子蓋慎諸柳若衛人子思曰吾何慎哉吾聞之有其禮無其財君子弗行也有其財無其時君子弗行也時所止則止時所行則行吾何慎哉
