body:
  text: 居處部二十五園圃說文曰園樹果圃樹菜也易曰賁于丘園束帛戔戔毛詩曰園有桃其實之肴又曰折柳樊圃周禮曰場人掌國之場圃而樹之果蓏珍異之物以時歛而藏之凡祭祀賓客供其果蓏享亦如之注云果棗栗之屬蓏瓜瓠之屬珍異蒲桃枇杷之屬又曰大宰九職二曰園圃毓草木又曰園廛二十而一注云以利少故二十而稅一也蓏城市中空地又曰圃以樹事貢草木謂果瓜葵韭論語曰樊遟請學為圃子曰吾不如老圃史記曰梁有漆園楚有橘柚園又曰王剪為秦將伐楚請善田宅園池甚眾漢書曰始曹參微時與蕭何善及為宰相有隙至何且死所推賢唯參參代何為相國舉事無所變更一遵何之約束擇郡國吏長大訥於文辭謹厚長者即召為丞相史史之刻深欲務聲名輒斥去之日夜飲酒卿大夫以下吏及賓客見參不事事來者皆欲有言至者參輒飲以醇酒度其欲有言復飲酒而後去終莫得開說以為常相舍後園近吏舍吏舍日飲歌呼從吏患之無如何迺請參遊後園聞吏醉歌呼吏幸相怒召按之迺反取酒張坐飲大歌呼與相和參見人之有細過掩匿覆蓋之府中無事又曰董仲舒廣川人也以治春秋孝景時為愽士下帷講誦弟子傳以九次相授業或莫見其面蓋三年不窺園圃其精如此後漢書曰法真隱大澤講論藝術歷年不窺園圃也又曰竇憲以賤直請奪沁水公主田園沁水明帝女主畏逼不敢言後肅宗駕出遊過園指以問憲憲陰喝不得對陰於禁反喝一介反猶噎塞也後發覺帝大怒責憲曰貴主尚見侵奪何況小人哉國家棄憲如孤雛腐鼠耳憲大震懼魏志曰顏斐字文林為京兆守於府下起菜園使吏投簡鋤治也晉書曰范汪好學外氏家貧無以資給汪乃廬于園中布衣蔬食然薪寫書寫畢誦讀亦遍遂博學多通善談名理又曰華廙既廢黜武帝後又登凌雲臺望見廙苜蓿園阡陌甚整依然感舊太康初大赦乃得襲封久之拜城門校尉遷左衛將軍數年以為中書監又曰和嶠性至儉家有好李帝求之不過數十王濟候其上直率少年詣園共啖畢伐樹而去王隱晉書曰涼州牧張駿增築四城相去各千步東城殖園果命曰講武場北城殖園果命曰玄武圃皆有宮殿宋書曰柳元景多產業居南岸有數十畝菜園時有人求之或留錢元景曰本立園自為供喫豈求利耶齊書曰世祖太子性頗奢麗宮內多雕飾精綺過於王宮開拓玄圃園與臺城北壍等其中起出池閣樓觀塔宇多聚奇石妙極山水慮上宮望見乃傍列脩竹內施高鄣造游牆數百間施諸機巧宜須鄣蔽以晉明帝為太子時立西池乃啟世祖引前例求於東田起小苑上許之窮極制度陳留耆舊傳曰范丹學通三經常自任灌園向秀別傳曰秀與呂安灌園於山陽收其餘利以供酒食之費莊子曰子貢過漢陰見一丈人為圃畦鑿隧而入抱甕而出灌子貢曰有機於此一日浸百畦用力甚寡而見功多夫子不欲乎為圃者仰而視之曰奈何曰鑿木為機後重前輕挈水若抽其名為槔者圃者忿然作色而笑曰吾聞之吾師有機械者必有機事有機事者必有機心機心存於胸中則純白不備純白不備則神生不定神生不定者道之所不載也吾非不知羞不為也子貢告孔子孔子曰假修渾沌之術者也雜記曰於陵子辤卿相而桔槔灌園又曰載宏為河間相自免歸而灌蔬以經教授也西京雜記曰茂陵富人袁廣藏鏹巨萬家僮八九百人於邙山下築園東西五里百步激流水注其內構石為山高十餘丈連延數里養白鸚鵡紫鴛鴦旄牛青兕奇禽怪獸委積其間聚沙為洲激水為波潮其中江鷗海鵠乳雛產鷇延漫林池奇樹異草靡不具植屋皆徘徊連屬重閣脩廊行之移晷不能徧廣有罪誅沒入為園鳥獸草木僉移上林苑中又曰樂遊園自生玟珻樹樹下多苜蓿苜蓿亦名懷風時人或謂光風風在其間常肅肅然日照其花有光彩故名苜蓿曰懷風茂陵謂之連枝草又曰梁孝王兔園有落猨巖棲龍岫鴈池鶴洲鳧渚宮觀相屬隋圖經曰史記謂梁孝王築東苑方三百里是曰兔園王褒雲陽記曰車箱阪下有黎園一頃樹數百株青翠繁密望如車蓋水經注曰睢水東南流入于竹圃水次綠竹蔭渚青青實望世人言梁王竹園也又曰玄瓠灣中地數頃有栗園栗小殊不並固安之實也然歲貢三百石以充天府水渚即栗洲樹木高茂望若屯雲中有栗堂甚閑敞牧宰英彥多所游薄魏志曰有芳林園桐園芳林後避少帝諱改為華林晉宮閣名靈芝園鄴有鳴鶴園蒲陶園華林園司馬彪續漢書曰濯龍園在洛陽西北角也郭仲產仇池記城東有苜蓿園列女傳魯漆室之女曰昔有客繫馬園中馬逸踐葵使子終歲不飽葵淮南子曰園有螫毒葵藿為之不採陳留志曰園庾襄邑人也庾始居園中故代謂之園公天文要集曰庖瓜為天子果園又天園主果實茹蓄儲又曰芙蓉園本隋氏之離宮居地三十頃周廻十七里貞觀中賜魏王泰泰死又賜東宮今屬家令寺園中廣廈脩廊連豆屈曲其地延袤塏跨帶原隰又有脩竹茂林綠被岡阜東坂下有涼堂堂東有臨水亭按黃圖曲池漢武所造周廻五里池中遍生荷芰菰蒲冒間禽魚翔泳宣帝立廟曲池之北名曰樂遊廟即今昇平坊內基趾是也此在秦為宜春苑在漢為樂遊苑宇文愷營建京城以羅城東南地高不便故缺此偶頭一坊餘地穿入芙蓉池以虛之郡國志云西夷有荔支園僰僮施夷中最賢者古所謂僰僮之富多以荔支為業園植萬株樹收一百五十斛隋圖經曰司竹園在𥂕屋縣東十二里穆天子西征至玄池乃植竹即此是也史記曰渭川千畝竹漢謂鄠杜竹林故有司竹都尉西都賦所謂鄠杜濱其足竹林果園芳草甘木也圈史記曰竇太后好黃老書召袁固問老子書固曰此家人言耳太后怒曰安得司空城旦書乎乃使固入圈擊豕漢書曰孝武帝作建章宮度為千門萬戶其西則數十里虎圈又曰李禹有寵於太子然好利亦有勇嘗與侍中貴人飲侵陵之莫敢應後愬之上上召禹使制虎懸下圈中未至地有詔引出之禹從落中以劍斫絕纍欲刺虎師古曰落與絡同謂當時繈絡而下也纍索也上壯之遂救止焉三輔故事曰師子圈在建章宮西南列士傳曰秦召公子無忌無忌不行使朱亥奉璧秦王大怒將朱亥著虎圈中亥瞋目視虎虎不敢動郡國誌曰雍州虎圈在通化門東二十五里秦王置朱亥於其中亥瞋目虎不敢動漢文帝問上林尉處及馮婕妤當熊在此漢宮殿䟽曰有彘圈有師子圈武帝造秦故虎圈周匝三十五步長二十步西去長安十五里牢說文曰牢閑養牛馬園也詩曰乃造其曹執豕于牢注云曹群也言搏豕於牢中以為飲酒之殽穆天子傳曰高奔戎獲虎畜于東虞命曰虎牢事具州郡曹子建求自試表曰如微才不試沒世無聞禽息鳥視終於白首此徒圈牢之養物非臣之所志也藩籬易曰羝羊觸藩羸其角詩曰折柳樊圃或云藩左傳曰宋向戍請弭諸侯之兵襄公二十七年諸侯之大夫會于宋以藩為軍注云示不相忌也又哀十二年衛侯會兵于鄖吳人藩衛侯之舍子服景伯謂子貢曰夫諸侯之會事既畢矣侯伯致禮地主歸餼以相辭也今吳不行禮於衛而藩其君舍以難之子盍見太宰乃請束錦以行乃免衛侯晉書曰庾袞字叔褒初袞諸父並貴盛唯袞父獨安貧約躬耕稼穡以給供養而執事勤恪與弟子樹籬跪以授條或曰今在隱屏先生何恭之過也荅曰幽顯易操非君子意也宋書曰謝瞻字宣遠弟晦時為宋臺右衛權遇巳重於彭城還都迎家賓客輻湊瞻在家驚駭謂晦曰吾家以遠退為業汝遂勢傾朝野此豈門戶福耶乃堅籬隔門庭曰吾不忍見此南朝宮苑記曰建康籬門舊南北兩岸籬門五十六所蓋京邑之郊門也如長安東都門亦周之郊門江左初立並用籬為之故曰籬門南籬門在國門西三橋籬門在今光宅寺側東籬門本名肇建籬門在古肇建市之東北籬門今覆舟東頭玄武湖東南角今見有亭名籬門亭西籬門在石頭城東護軍府在西籬門外路北白楊籬門外有石井籬門莊子曰願遊其藩閑居賦曰芳枳堅籬宋玉對問曰藩籬之鷃鷦鷯賦曰鷦鷯長於藩籬之下華表崔豹古今注程雅問曰堯設誹謗之木何也荅曰今之華木以橫木交柱頭狀如華形似桔槔大路交衢悉施焉或謂之表木以表王者納諫亦以表識衢路秦乃除之漢始復焉今西京謂之交午柱遼東華表見鶴門燕昭王墓前華表見貍門
