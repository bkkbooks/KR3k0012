body:
  text: 宗親部十夫妻釋名曰夫妻匹敵之義也又曰士庶人曰妻妻齊也夫賤不足以尊稱故齊等言也易家人卦曰夫夫婦婦而家道正又序卦曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦夫婦之道不可以不久也故受之以恒恒者久也毛詩衡門曰豈其食魚必河之魴豈其取妻必齊之姜豈其食魚必河之鯉豈其取妻必宋之子何必大國之女然後可妻亦取貞順而已又草蟲大夫妻能以禮自防也喓喓草蟲趯趯阜螽興也喓喓聲也草蟲常羊也趯趯躍也阜螽蠜也卿大夫之妻待禮而行隨從君子未見君子憂心忡忡忡忡猶衝衝也婦人雖適人有歸宗之義亦既見止亦覯止我心則降又采蘋曰采蘋大夫妻能循法度也能循法度則可以承先祖共祭祀矣女子十年不出姆教婉娩聽從軌麻枲治絲繭織絍組紃學女事以共衣服觀於祭祀納酒漿籩豆菹醢禮相助奠十有五而笄二十而嫁此言能循法度者今既嫁為大夫妻能循其為女人時所學之事以為法度也于以采蘋南澗之濱于以采藻于彼行潦于以奠之宗室牖下誰其尸之有齊季女尸主也齊敬也季少也又碩人曰碩人其頎衣錦褧衣齊侯之子衛侯之妻又氓曰女也不爽士貳其行士也罔極二三其德三歲為婦靡室勞矣夙興夜寐靡有朝矣又棠棣曰妻子好合如鼓瑟琴好合志意合也合者如琴瑟之聲相應和也兄弟既翕和樂且湛宜爾家室樂爾妻孥是究是圖亶其然乎又南山曰藝麻如之何橫縱其畝取妻如之何必告父母取妻之禮議於生者卜於死者此之謂名析薪如之何匪斧不克取妻如之何匪媒不得此言取妻必待媒乃得也又韓弈曰韓侯取妻汾王之甥蹶父之子韓侯迎止于蹶之里百兩彭彭八鸞鏘鏘不顯其光諸娣從之祁祁如雲韓侯顧之爛其盈門如雲言眾多也諸侯一娶九女三國媵之諸娣眾妾也顧之曲顧道義也又思齊曰刑于寡妻至于兄弟以御于家邦言文王以禮法接待其妻至於宗族以此又能為政治於家邦也禮記曰天子之妃曰后諸侯曰夫人大夫曰孺人士曰婦人婦人言服也庶人曰妻妻之言齊也又內則曰子甚宜其妻父母不說出宜猶善也子不宜其妻父母曰是善事我子行夫婦之禮焉沒身不衰又曰女子二十而嫁有故二十三而嫁故謂父母喪聘則為妻聘問也妻之言齊以禮見問則得與夫敵恥奔則為妾又坊記曰取妻不取同姓為其近禽獸也所以附遠厚別也左傳隱公曰鄭公子忽如陳逆婦媯辛亥以媯氏歸甲寅入於鄭陳鍼子送女先配而後祖鍼子曰是不為夫婦誣其祖矣非禮也何以能育禮逆婦必先告祖廟而後行鄭忽逆婦而後告廟故曰先配而後祖又曰桓公曰鄭祭仲專鄭伯患之使其壻雍紏殺之將享諸郊雍姬知之謂其母曰父與夫孰親其母曰人盡夫也父一而已胡可比焉婦人在室則天父出則天夫女以為疑故母以所生為本解之遂告祭仲曰雍氏舍其室而將享子于郊吾惑之以告祭仲殺雍糾尸諸周氏之汪公載以出曰謀及婦人宜其死也又莊公曰初懿氏卜妻敬仲其妻占之曰吉是謂鳳凰于飛和鳴鏘鏘有媯之後將育于姜五世其昌並為正卿八世之後莫之與京又僖中曰狄人伐廧咎如赤狄之別種獲其二女叔隗季隗納諸晉公子公子以叔隗妻趙衰生盾文公取季隗生伯儵後以妻趙衰生原同屏括樓嬰原屏樓三子之邑也趙姬逆盾與其母趙姬文公女也盾狄女叔隗之子也子餘辭子餘趙衰字也姬曰得寵而忘舊何以使人必逆之固請許之來以盾為才固請于公以為嫡子而使其三子下之以叔隗為內子而已下之卿之嫡妻為內子又昭元曰鄭徐吾犯之妹美公孫楚聘之矣楚子南穆公孫也公孫黑又強使委禽焉禽鴈也納采用鴈犯懼告子產子產曰是國無政非子之患也唯所欲與犯請於二子請使女擇焉皆許之子晢盛飾而入布幣而出子晢公孫黑也子南戎服而入左右射超乘而出女自房觀之曰子晢信美矣抑子南夫也夫夫婦婦所謂順也適子南氏又莊公曰宋華父督見孔父之妻于路目逆而送之曰美而豔又曰楚子滅息以息媯歸生堵敖及成王焉未言未與王言楚子問之對曰吾一婦人而事二夫縱不能死其又奚言又成下曰晉三卻害伯宗譖而殺之初伯宗每朝其妻必戒之曰盜憎主人民惡其上子好直言必及於難又襄四曰齊棠公之妻東郭偃之姊也東郭偃臣崔武子棠公死偃御武子以弔焉見棠姜而美之美其色也使偃取之為己取也偃曰男女辨姓今君出自丁臣出自桓不可武子筮之遇困之大過以示陳文子文子曰夫從風風隕妻不可娶也且其繇曰困于石據于蒺藜入于其宮不見其妻凶崔子曰嫠也何害先夫當之矣遂取之又僖下曰初臼季使過冀見冀鈌耨其妻饁之敬相待如賓與之歸言諸文公曰敬德之聚也能敬必有德德以治民請君用之文公以為下軍大夫又昭七曰晉叔向適鄭鬷薎惡欲觀叔向從使之收器者而往立於堂下一言而善叔向聞之曰必鬷明也下執其手以上曰昔賈大夫惡取妻而美三年不言御以如皋射雉獲之其妻始笑而言賈大夫曰才之不可以已也我不能射汝遂不言不笑也今夫子少不揚子若不言吾幾失子矣又哀上曰齊侯伐晉夷儀弊無存之父將室之辭以與其弟無存齊人也室之為取婦也曰此役也不死反必娶於高國高氏國氏齊貴族也無存欲必有功還取卿相之女也又成上曰齊晉戰于鞍齊師敗績齊侯見保者曰勉之齊師敗矣避女子女子曰君免乎曰免矣曰銳司徒免乎曰免矣曰茍君與吾父免矣可若何乃奔侯俟以為有禮既而問之辟司徒之妻也予之石窌又成下曰魯聲伯之母不聘穆姜曰吾不以妾為姒生聲伯而出之嫁于齊管于奚生二子而寡以歸聲伯以其外弟為大夫而嫁其外妹於施孝叔郤犨來聘求婦於聲伯聲伯奪施氏婦以與之婦人曰鳥獸猶不失伉儷子將若何曰吾不能死亡婦人遂行生二子於郤氏郤氏亡晉人歸之施氏逆諸河沈其二子婦人怒曰己不能庇其伉儷而亡之又不能字人之孤而殺之將何以終春秋漢含孳曰水火交感陰陽以設夫婦象也水火則陰陽也陰陽則夫婦也又曰妻象太陰臣法金位金陰中之剛故喻臣位水能純柔純柔妻象也戰國策曰鄒忌長八尺有餘身體逸麗朝服衣冠窺鏡謂其妻曰我孰與城北徐公徐公齊國之美麗者也妻曰愈窺鏡而自視不如遠矣暮寢而思之吾妻之美我私我也史記曰晉重耳謂其妻曰待我二十五年不來乃嫁其妻笑曰犂二十五年吾冢上柏大矣雖然妾待子又曰易基乾坤詩始關睢夫婦之際人道大倫也禮之用唯婚姻為競競又曰張儀已學而遊說諸侯嘗從楚相飲已而楚相亡璧門下意儀曰儀貧無行資必此人盜相璧共執儀掠笞數百不服釋之其妻曰嘻子無讀書遊說安得此辱乎張儀謂妻曰視吾舌尚在不其妻笑曰舌在也儀曰足矣乃遂入秦秦王以為客卿又曰吳起好用兵事魯君齊人攻魯欲將起以起取齊女為妻而疑之起欲就名遂殺其妻以明不與齊魯卒以為將攻齊大破之又曰外黃富人女甚美嫁庸奴其夫徐廣曰一云其夫亡去抵父客如淳曰父時故賓客父客素知張耳乃卒為請決嫁張耳張耳是時脫身游女家厚奉給張耳以故致千里客及官魏為外黃令名由此益賢漢書曰楊惲報段會宗云家本秦也能為秦聲婦趙女也雅善鼓瑟又曰京兆尹張敞為婦畫眉長安中傳京兆眉嫵有司以奏敞宣帝問之對曰臣聞閨房之內夫婦之私有過畫眉者范曄後漢書曰鮑宣妻者桓氏之女也字少君宣帝就少君父奇其清苦故以女妻之裝送甚盛宣不悅謂妻曰少君富驕而吾貧不敢當妻曰大人以生守約故使妾侍巾櫛既承君子惟命是從乃悉歸御服更衣短布裳與宣共挽鹿車歸鄉里拜姑提甕出汲後漢書曰班昭作女誡馬融善之令妻女習焉又曰沛周郁妻者字阿閑於婦道而郁驕淫輕躁多行無禮郁父偉謂阿曰新婦賢者女當以道正夫郁之不改新婦過也阿拜而受命退謂左右曰我無樊衛二姬之行故君以責我我言而不用君必謂我不奉教令則罪在我矣若言而見用是為子違父而從婦則罪在彼矣乃自殺又曰馮良有志行與妻子相遇如君臣又曰曹操攻呂布布欲降而陳宮等自以負罪於操深沮其計謂布曰曹公遠來勢不能久將軍若以步騎出屯於外宮將餘眾閉守於內若向將軍宮引兵而攻其背若但攻城則將軍救於外可破也布然之布妻曰昔曹氏待公臺如赤子猶舍而歸我今將軍厚公臺不過於曹而欲委全城捐妻子孤軍遠出乎若一旦有變妾豈得為將軍妻哉布乃止又曰酈炎風病慌忽性至孝遭母憂疾甚發動妻始產而驚死妻家訟之收繫獄炎病不能治對遂死獄中尚書盧植為之誄讚以昭其懿又曰公孫述連徵任永馮信並託清盲以避世難永妻媱於前匿情無言見子入井忍而不救信侍婢亦對信姦通及聞述誅皆盥洗更視曰世適平目即清媱者皆自殺又曰周澤為太守嘗臥疾齋宮其妻哀澤老病闚問所苦澤大怒以妻干犯齋禁遂收送詔獄謝罪世疑其詭激時人為之語曰生世不諧作太常妻一歲三百六十日三百五十九日齋一日不齋醉如泥又曰載封字平仲年十五詣太常師事東海申君申君卒送喪到東海邊嘗經其家父母以封當還豫為娶妻封蹔過拜親不宿而去又曰河南尹王調洛陽令李阜與竇憲厚善縱舍自由尚書僕射樂恢劾奏調阜并及司隸校尉諸所剌舉無所廻避貴戚惡之妻每諫恢曰昔人有容身避害何必以言取怨恢歎曰吾忍素餐立人之朝乎又曰更始尚書謝躬初其妻知世祖不平常戒躬曰君與劉公積不相能而信其虛談不為之備終受制矣躬不納竟為世祖所擒又曰河南樂羊子之妻者不知何氏之女也羊子嘗行路得遺金一鉼還以與妻妻曰妾聞志士不飲盜泉之水廉者不受嗟來之食況拾遺求利以汙其行乎羊子大慚乃捐金於野而遠尋師學一年來歸妻跪問其故羊子曰久行懷思無佗異也妻乃引刀趍機而言此織生自蠶璽成於機杼一絲而累以至於寸累寸不已遂成丈匹今若斷斯織也則損失成功稽廢時月夫子積學當日知所忘以就懿德若中道而歸何異斷斯織乎羊子感其言復還終業遂七年不返又曰魏朗字仲英入為尚書舉動皆有禮序室家相待如賓與子孫如嚴君焉又曰曹世叔妻班彪之姑名昭字惠召入宮號曰大家每有貢獻遣大家作賦頌注列女傳著女誡及詩並行於時魏志曰初司馬宣王勒兵從闕下趣武庫當曹爽門人逼車住爽妻劉氏怖出至廳事謂帳下守督曰公在外今兵起如何督曰夫人勿憂乃上門樓引弩注箭欲發將孫謙在後牽止之曰天下事未可知如此者一二宣王遂過又曰郭淮字伯濟太原河曲人拜車騎將軍封曲陽侯淮妻王陵之妹當從坐侍御史往收羗胡渠師數千人叩頭請淮表留妻淮不從妻之道莫不流涕人人扼腕欲劫留之淮五子叩頭流血請淮淮不忍視乃遣妻還淮以書曰司馬宣王曰五子哀母不惜其身若無其母是無五子亦無淮也書至宣王亦宥之魏氏春秋曰許允為吏部郎選郡守明帝疑其所用非次旨召入將加罪允妻阮氏跣出謂曰明主可以理奪難以情求允之入帝怒詰之對曰某郡太守雖滿文字先至年限在後日限在前帝取事視乃釋遣出望其衣敗曰清吏也賜之衣允之出為鎮北也喜謂其妻曰吾知免矣妻曰禍見於此何免之有魚豢魏略曰桓範字彥則沛郡人也使持節督青徐諸軍鎮下邳與徐州剌史鄒歧爭屋引節欲斬歧為歧所奏不直坐免當轉為冀州剌史統屬鎮北將軍呂昭為其妻仲長曰我寧作諸卿向公長跪耳不能為呂子展屈也其妻曰君前在東坐欲擅斬徐州眾人謂君難為作下今羞為呂屈是復難為作上範怒觸其首乃以刀鐶撞其腹妻其懷孕遂傷胎死又曰常林字伯槐河內人也少好學為諸生帶經鋤其妻常自餉饋雖在田野相敬如賓晉書曰元康中梁國女子許嫁已授禮聘尋而其夫戍長安經年不歸女家更以適人女不樂行其母逼強不得已而去尋復病亡後其夫還逕至女墓不勝哀情便發塜開棺女遂活因與俱歸後婿聞知詣官爭之所在不能決祕書郎王導議曰此是非常事不得以常理斷之宜還前夫朝廷從其議又曰謝安妻劉琰妹也既見家門富貴而安獨靜退乃謂曰丈夫不如此也安掩鼻曰恐不免耳世說又載又曰吳隱之為晉陵太守妻負薪冬月無被欲浣衣即披絮紡績以供朝夕又曰王凝之妻謝氏字道韞弈之女也初適凝之還甚不樂弈曰王郎逸少子不惡汝何恨也荅曰一門叔父則有阿父中郎群從兄弟則有胡封羯末不意天壤之中乃有王郎又曰王導為丞相妻曹氏性妒導甚憚之乃密營別館以處眾妾曹氏知而將往焉導恐妾被辱遽命駕猶遲之以所執塵尾柄驅牛而進司徒蔡謨聞之戲導曰朝廷欲加公九卿之命弗之覺但謙退而已謨曰不聞餘物唯有短轅犢車長柄塵尾導大怒謂人曰往與群賢共遊洛中何曾聞有蔡克兒也崔鴻前秦錄曰秦州剌史竇滔妻彭城令蘇道之女有才學織錦製廻文詩以贖夫罪劉向列女傳曰魯有秋胡子既納妻五日而官於陳五年乃歸未至其家見路徬有美婦人方採桑葉秋胡子說之下車謂曰苦暴獨採桑吾行道遠願託桑蔭下一飡於是下齎休焉婦人採桑不輟秋胡子謂曰力田不如逢年力桑不如見郎今吾有金願以與夫人婦人曰嘻夫採力作紡績織絍以供衣食奉二親養夫子而已矣吾不願人之金所願願卿事上無有外意妾事夫家亦無淫佚之志子去矣收子之齎與子笥金秋胡子遂去歸至家奉金遺其母母使人呼其婦至乃向採桑者也胡秋子見之而慚婦曰子束髮脩身辭親往仕五年乃還當驩喜乍馳乍驟揚塵疾至思見親今者乃說路旁婦人而下子之裝以金予之是志母也志母不孝好色淫泆是汙行不義夫事親不孝則事君不忠處家不義則治官不理孝義並亡於身必不遂妾不忍見不孝不義之人子改娶矣妾亦不嫁遂去東而走自投於河而死又曰晉宗伯妻者晉大夫伯宗之妻也謂伯宗曰子之性固不可易也且國家多貳其危可立而待也子何不豫結賢大夫以託州黎焉伯宗子也伯宗曰諾乃得畢羊而友之及欒不忌之難三郤害伯宗譖而殺之畢羊乃送州黎于荊遂得免焉
