body:
  text: 居處部六臺下王子年拾遺記曰秦始皇起雲明臺窮四方之珍木搜天下之工南得煙丘碧桂酈水然沙賁都朱泥雲岡素竹東得䓗巒綿柏縹穟龍杉雲梓寒河星柘西得漏海浮金狼淵羽壁滌嶂霞素寘阜乾漆陰坂文杞褰流黑魄暗海香瓊瑤異是集有二人皆騰虛緣木揮斤斧於空中子時興功至午時已畢秦人謂之子午臺又云二客於子午之地各起一臺又曰燕昭二年海人乘霞舟以雕壺盛數斗膏以獻王王坐通雲堂亦曰通霞之臺以龍膏為燈光耀百里煙色丹紫國人望之咸言瑞光也遙拜之燈以火浣布為纏山西有照石去石十里見人物之影如鏡焉碎石片片皆能照人而質方一丈則重一兩昭王舂此石為泥泥於通霞之臺與西王母遊居此臺上常有鍾鼓琴瑟鳴神光照耀如日月之出臺左右種恒春之樹葉如蓮花芬芳似桂花隨四時之色又曰魏明帝即位五年起靈禽之園方國所獻異鳥殊獸皆畜此園也時昆明國貢嗽金鳥國人云其地去涼州九千里出此鳥形如雀色黃毛羽柔密常翱翔海上羅者得之以為至瑞聞大魏之德被於荒遠故越山航海來獻大國帝得此鳥畜於靈禽之園飴以真珠飲以龜腦鳥常吐金屑如粟鑄之以為器服昔漢武時有獻大雀此之類也此鳥畏雪霜乃起小屋以處之名曰辟寒臺皆用水精為戶牖使內外通光而風露恒隔宮人爭以鳥所吐之金用飾釵珮謂之辟寒金宮人相嘲曰不服辟寒金郍得帝王心於是媚惑者亂爭此寶以為身飾及行臥皆懷挾以要寵也魏代喪滅珍寶池臺鞠為煨燼喇金之鳥亦自高翔也又曰周靈王二十三年起昆昭之臺一名宣昭之臺聚天下異木神工得崿谷陰生之樹其質千尋文理盤錯以此一木臺用足矣其木有龍虵百獸之形篩水精為泥臺高百丈升之以望雲色時有萇弘能招致神異王登臺忽見二人乘空而至乘遊飛之輦駕以青螭其衣皆縫緝毛羽王即迎之上席時天下大旱地裂木然一人先唱能為霜雪引氣一噴則雲起雪飛坐者皆口禁井池冰堅可琢又設狐腋素裘紫羆大褥褥是西域所獻施於臺上又一人以指彈席上而暄風入室裘褥皆棄臺下又曰魏文帝築臺基高四十丈列燭置於臺下名曰燭臺遠望如列星之墜也以處美人薛靈芸焉又曰魏明帝起凌雲臺躬自掘土群臣皆負奮鍤時陰寒役者多死高堂隆等諫之不聽累年而畢又曰魏文帝時黃星炳夜乃起畢昂臺以祀星又曰吳主潘夫人之父坐法夫人輸入織室夫人容態少儔為江東絕色同幽者百餘人有司聞於吳主使圖其容貌夫人憂慼不食減瘦改形工人寫其真狀以進吳主吳主見圖而嘉之以琥珀如意撫桉則折嗟曰此神女也愁貌尚能感人呪在懽樂乃命雕輪就織室納于後宮果以姿色獲寵每與夫人遊昭宣之臺恣意幸適既盡酣醉唾於玉壺中使侍婢寫於臺下得火齊指環即挂石榴枝上因其處起臺名曰環榴臺時有諫者云今吳蜀爭雄還劉之名特為妖乎權乃翻其名為榴環臺也又與夫人遊釣得大魚吳王喜而夫人曰昔聞泣魚今乃為喜有喜必憂以為深誡至末年漸相譖毀稍見離退時人謂夫人知幾之神矣釣臺今猶基存漢武帝內傳曰鉤弋夫人謂帝曰妾相運正應為陛下生一男男年七歲妾當死矣今年必不得歸願陛下自愛言終遂卒既殯屍香聞十餘里因葬之雲凌帝甚哀悼又疑其非常人乃發塚開視空棺無屍唯衣履存焉乃起通靈臺於甘泉常有一青鳥集臺上往來至宣帝時止矣又曰漸臺高三十丈南有辟門三層內殿階陛咸以玉為之鑄銅鳳皇高五丈飾以黃金於樓屋上洞冥記曰武帝起招仙之臺於明庭宮北明庭宮者甘泉之別名也於臺上撞碧玉之鍾掛懸黎之磬吹霜滌之箎唱來雲依日之曲使臺下聽而不聞管歌之聲又曰太初二年起甘泉望風臺於臺上得珠望之如照且因名照月珠又曰建元二年帝起騰光臺以望四遠常有飛光如星集於臺上亦曰經星臺又曰帝初起神明臺時掘地入三十丈得泉水色黃傍有人居無日月光明晝夜以火照中有人食土飲水服赭布之衣漢人問汝何時居此荅曰商王無道使兆民入地千丈求青堅之土以作瓦起瑤宮金堂二人皆以繩縋入地裏負畚器取土多有壓陷死者今猶二人在耳漢人問何得獨存荅曰我以玉為衣玦金為環身有金玉故心氣不滅漢人問汝欲更出為人否荅曰食土飲泉與螻蟻為伍寧望日月乎乃引出三日自死骨肉靡靡成灰唯心如彈丸大堅如石以物扣之則是乾血耳述異記曰郭景純注爾雅臺今在夷陵郡又曲阜縣南十里有孔子春秋臺又曰吳王夫差築姑蘇臺三年乃成周環詰屈橫亙五里崇飾土木殫耗人力宮妓數千人上別立春宵宮為長夜飲造千石酒鍾又作大池池中造青龍舟舟陳妓日與西施為水嬉又於宮中作靈館館娃閤銅溝玉檻宮之欄檻皆珠玉飾之吳既敗越王勾踐於會稽山上地方千里勾踐得范蠡之謀躬教民以耕桑延四方之士作臺于外而館賢士會稽之上有越臺又曰晉永嘉之亂既過江諸公主不得隨去安陽公主與平城公主等奔入兩河界悉為民家妻常怏怏不悅故有思鄉之志村人感之共築一臺以居之謂之公主望鄉之館至今巋然王朗懷舊賦云將軍出塞之臺公主望鄉之館是也漢武帝遣將軍王濆戍邊及帝崩王莽篡逆濆與莽有隙遂留不敢歸因亡入胡中士卒相率築臺為望鄉之處又曰會稽山有虞舜巡狩臺臺下有望陵祠帝舜南巡葬於九疑山民思之故立祠中都郭門古宮存焉宮前有堯臺舜館銘記皆古又曰中山有韓夫人愁思臺望子陵也又曰燕昭王為郭隗築臺今在幽州燕王故城中土人呼為賢士臺亦謂之招賢臺郡國志曰濮州壁玉臺穆天子為盛姬所造也今旁地猶多珉石又曰汝陰縣富陂城即詩之汝墳也俗謂之女郎臺又曰魏硯子臺云是張儀冢似硯也又曰曹州麟城南有望麟臺園客祠庭種香草有五色神蛾得六大璽絲六十日始盡處又曰洺州溫明臺後漢世祖晝臥此殿耿弇入造床下齊勸即位處又曰滎陽縣有太武城高祖與項氏各在一城東城有高壇即項羽置太公於上處今名項羽堆亦呼為太公臺又曰金河府青臺方山北五里文明太后恒於六宮遊戲因歌曰青臺雀青臺雀緣山採花額頸著其曲並在大樂部又曰金河府自平城遙登臺出渴鉢口梁元帝橫吹詩曰朝登青陂道暮宿白登臺天女神即生後魏始祖神元也又曰衛州苑城北十四里沙丘臺也俗稱姐巳臺去二里有一臺南臨淇水俗稱為上宮也又曰鄆州須昌縣有犀丘城青陵臺宋王令韓憑築者又曰南頓縣有光武臺應琚宅在其側又曰洛陽陽子臺在陽城東三十里陽陵子隱處洛水昔王子晉與浮丘公同遊受玉雞之瑞水亦宓妃之所在也又曰冤句縣昌都城呂后追尊父呂公為宣王都此有呂后臺西有辟陽侯臺閤道相連基址見存又曰洛陽雞臺有劉曜試弩棚夕陽亭賈充出鎮長安百僚餞送於此又曰鄭州故魏任城王臺下池內有漢時鐵鍾長六尺入地三尺頭自正為晉氏重興之瑞今不知所在東南有空候城鄭衛之音也又曰酸棗縣韓徙都於此有冰井臺五馬泉又曰衛州有鳳皇臺又曰荊州龍陂山有楚王臺又曰濮州羊角城陳思王愁臺基甚高又曰夏州朔方郡赫連勃勃僣號築土起真珠樓沖天臺又曰兗州有娥皇女英臺又曰恒州野望臺趙武靈王以登高望亦曰寒臺又曰荊州華容縣東六十里有章華臺楚靈王築臺東即荊臺縣也又曰并州榆次縣鑿臺即韓殺智伯於鑿臺之中又曰木客山吳王遣木客入山求木不得工人憂思作木客吟一旦神木自生長二十丈作姑蘇臺又曰鄧州皇后城即迎陰后處城西張平子讀書堂又曰毫州城父縣老子祠賴鄉曲仁里廟內有八公臺九柱樓畫東王母西王母又有靜念樓又曰蒲州蚩尤城史鳴條野禹娶塗山女思戀本國築臺以望之謂之青臺上有禹記號上有青臺驛又曰汴城上有列仙吹臺西有牧澤甬道二百里漢梁孝王所造今謂之赤堤城東有繁臺本吹臺也云蒼頡師子野所造後有繁姓居側因名焉西有崇臺即顏率雲蟬臺之下沙海之上是也又曰許州有丹書臺魏文帝受禪有黃鳥御丹書集此臺又曰衛州鹿臺在預城內紂自投火處紀年曰武王檎紂於南單之臺蓋鹿臺之異名也糟丘酒池去城南一里基跡猶存水經注曰固安縣金臺陂東西六十里南北五十步側陂西北有釣臺高十丈方可四十步陂北十餘步有金臺金臺高上東西八十許步南北加減高十餘丈昔慕容垂之為范陽也戍之即斯臺也有小金臺臺北有簡馬臺並悉高大秀峙相對翼臺左右水流經通長廡廣宇周旋波浦棟渚咸淪柱礎尚存是基構可得而尋訪諸耆舊咸言昭王禮賢廣延方士至如郭隗樂毅之徒鄒衍劇辛之儔宦遊歷說之民自遠而屆者多矣不欲令諸侯之客伺隙燕邦故脩建下都館之南垂言燕昭創之於前子丹踵之於後故彫墻敗館尚傳俊列之名雖無經紀可憑察其古跡似符宿傳矣又曰鳳谿水側有鳳皇止焉故謂之鳳皇臺又曰河水南至華陰又東北玉澗水注之南出玉溪北流經皇天固三面壁立高千許仞漢世祭天於其上因名之為皇天固上有漢武帝思子臺及泉鳩里加兵仞於太子者上憐太子無辜乃作思子宮為歸來望思之臺於湖師古曰言巳望而思之無太子之魂歸來也其在今湖城縣之西閔鄉縣之東基阯猶存也天下聞而悲之又曰睢陽城故宮東即梁之舊池也周五六百步水列鈞臺池東又有一臺世謂之清冷臺北城憑隅又結一池臺晉灼曰或說平臺在城中東北角亦或言兔園在平臺側如淳曰平臺離宮所在今城東二十里有臺寬廣而不甚極高俗謂之平臺余按漢梁孝王傳稱王以功親為大國築東苑方三百里廣睢陽城七十里大治宮室為複道自宮連屬於平臺三十餘里複道自宮東出楊州之門左陽門即睢陽東門也連屬於平臺則近矣屬之城隅則不能是知平臺不在城中也又曰景外臺劉表之所築也表性好鷹每登此臺歌野鷹自來又曰睢陽城中有掠馬臺東有一臺謂之清冷臺又曰長平城在上黨郡南秦壘在城西秦抗趙眾收頭顱築臺於此崔嵬桀起今乃號曰白起臺山海經曰沃民國有軒轅臺又曰帝嚳堯丹朱帝舜各二臺臺四方在崑崙東北列仙傳曰蕭史者秦穆公時人善吹蕭能致孔雀白鵠穆公有女字弄玉好之公以妻焉遂教弄玉作鳳鳴居數年吹似鳳聲鳳皇來止其屋為作鳳臺夫婦止其上數年皆隨鳳飛去秦為作鳳女祠於雍宮時有簫聲焉成都記曰望鄉臺蜀王秀所築也又曰思妻臺在梓潼縣五丁於此山拔虵山崩殺五丁並殺秦王女因名之三輔宮殿簿曰長樂宮有臨華臺神仙臺西征記曰揚州雷陂有臺高二丈南兗州記即吳王濞之釣臺也地理志曰北地郡有之回臺京西北四百里嵩高山記曰山有玉女臺云漢武帝見三仙玉女因以名臺益州記曰鴈橋東有嚴君平卜處土臺高數丈南雍州記曰高齊之後有堂堂西有射堂五間射堂南有大池池上有臺名曰樂喜臺荊州記曰江陵縣東有天井臺飛軒孤暎背邑面河實郊躔遊憩之佳處也襄沔記曰襄縣南五里鳳林山側宋隋王劉誕鎮北有龍兒見此池中後雍州刺史韋叡於此立放生臺越絕書曰夫差起姑蘇之臺三年聚材五年乃成高見三百里太史公登之以望五湖伏琛齊地記曰平業城西北八十里有平望亭亦古縣也或云秦始皇為望海臺述征記曰陵雲臺在明光殿西高八丈累塼作道通至臺上登廻廻眺究觀洛邑暨南望少室亦山丘之秀極也又曰蠡臺梁孝王所築於兔園中廻道似蠡因名之
