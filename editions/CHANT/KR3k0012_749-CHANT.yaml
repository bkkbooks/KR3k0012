body:
  text: 工藝部五書中王右軍題衛夫人筆陣圖後曰夫紙者陣也筆者刀矟也墨者鍪甲也水硯者城也本領者將軍也心意者將副也結構者謀畫也颺筆者吉凶也出入者號令也屈折者殺戮也夫欲書者先于研墨凝神靜思預想字形大小偃仰平直振動令筋脈相連意在筆前然後作字若平直相似狀如筭子便不是書但得其點畫耳昔宋翼常作此書翼鍾繇之弟子乃咄之翼三年不敢見繇潛心改跡每畫一波常三過折筆每作一點常隱鋒而為之衛夫人筆陣圖曰若初學書先須大書不得從小善鑒者不寫善寫者不鑒多骨微肉者筋書多肉微骨者墨豬多力豐筋者聖無力無筋者病一二從其消息而用之王僧虔論書曰王平南廙是右軍之叔自過江東右之前唯廙為最畫為晉明帝師書為右軍法又曰中書令王珉筆力過於子敬書舊品云有四疋素月朝操筆三暮便竟首尾如一又無誤字子敬戲云弟書如騎騾駸駸常欲度驊騮前又曰鍾公之書謂之盡妙鍾有三體一曰銘石書妙者也二曰章程書傳小學秘書教者也三曰行狎書是者也二法皆世人所善虞龢論書曰晉謝奉起廟悉用棐村右軍取柹書之滿林奉收得一大簣子敬後往謝奉為說右軍書甚佳而密已削作數十棐板請子敬書之亦甚佳奉並珍錄後履分半與桓玄用履為楊州主簿餘一半孫恩破會稽略以之海又曰晉時有一好事少年故作精白紗裓衣著詣子敬子敬便取書之草正諸體悉備兩袖及褾略同少年覺王左右有陵奪之掣裓而走左右果逐之及門外鬭爭分裂少年纔得一袖耳梁武帝觀鍾繇書法曰子敬不迨逸少猶逸少不迨元帝學子敬者如畫虎也學元常者比畫龍也又曰夫運筆邪則無芒角執手寬則書緩弱點掣短則去擁腫點掣長則法離澌畫促則字橫畫踈則形慢拘則乏勢放又少則純骨無媚純肉無力少墨浮澀多墨笨蒲本切鈍此並任之自然之理也庾元威論書曰余為書十牒屏風書作十體間以采墨當時眾所驚異自爾絕筆唯留草本而已其百體者懸針書垂露書秦望波冢書金鵲書玉文書鵠頭書虎爪書倒薤書偃波書幡信書制書列書日書月書風書雲書科斗署書胡書蓬書相書天竺書轉宿書一筆篆一筆隸飛白章草古又隸橫書楷書小科隸芝英隸花草隸幡信隸鍾鼓隸龍虎篆鳳魚篆麒麟篆仙人篆科斗篆雲篆蟲篆魚篆鳥篆龍篆龜篆虎篆鸞篆龍虎隸鳳魚隸麒麟隸仙人隸科斗隸雲隸蟲隸魚隸鳥隸龍隸龜隸虎隸鸞隸龍文書龜文書鼠書牛書龍書虎草書兔書龍草書蛇草書馬書羊書猴書雞書大書豕書已上皆采色其外復有大篆小篆銘鼎摹印刻符石經象形篇章震書到書反左書等及九體書所謂縑素書簡奏書牋表書行狎書楫書蒿書半草全草書此九法極真草之次第焉刪捨之外所存猶一百二十體袁昂古今書評曰王右軍書如謝家子弟縱復不端正者爽爽有一種風氣王子敬書如河洛間少年雖皆充悅而舉體蹉跎殊不可耐羊欣書如大家婢為夫人雖處其位而舉止羞澀終不似真徐淮南書如南岡士大夫徒好尚風軌終不免寒乞阮研書如貴胄失品次不能復排突英賢王儀同書如晉安帝非不處尊位而都無神施吳興書如新亭傖父一往見似楊州人共語便音態出陶隱居書如吳興小兒形雖未成長而骨體甚駿快殷鈞書如膏麗使人抗浪甚有意氣滋韻終不精味袁山松書如深山道士見人便欲退縮蕭子雲書如春初望山林花無處不發如經論道人無絕不言崔子玉書如危峰阻日孤松一枝有絕望之意師宜官書如鵰羽未息翩翩自逝韋誕書如龍威虎振劍拔弩張蔡邕書骨氣風遠爽爽為神鍾司書字十二種意外殊妙實多奇邯鄲淳書應規入矩方圓乃成張伯英書如漢武帝愛道憑虛欲仙索靖書如飄風忽舉鷙鳥不飛皇象書如歌聲繞梁琴人捨揮衛常書如插花美人舞笑鏡臺孟光祿書如崩山絕崖人見可畏張芝驚奇鍾繇特絕逸少鼎能獻之冠世四英其頹洪芳不滅羊真孫草蕭竹范篆各一時妙絕鍾繇書若飛鴻戲海舞鶴遊天行間希密實亦難過蕭思話書走墨連綿字勢屈強若龍跳淵門虎臥鳳闕薄紹之書字勢蹉跎如舞妓低腰仙人嘯樹江式論書表曰秦有八體一曰大篆二曰小篆三曰符書四曰蟲書五曰摹印六曰署書七曰殳書八曰隸書又曰漢時有六書一曰古文孔子壁中書也二曰奇字即古文而異者也三曰篆書云小篆也四曰佐書秦隸書也五曰繆篆所以摹印也六曰鳥蟲所以書幡信也李嗣真書後品曰蟲篆者小學之所宗草隸者士人之所尚近代君子故多好之或時有可觀耳武平一徐氏法書記曰梁大同中武帝勑周興嗣撰千字文使溫鐵石摸次羲之之跡以賜八王徐浩論書曰初學之際宜先筋骨筋骨不立肉何所附用筆之勢特須藏鋒鋒若不藏字則有病病且未去能何有焉字不欲踈亦不欲密亦不欲大亦不欲小小長令大大蹙令小踈肥令密密瘦令踈斯其大經矣筆不欲捷亦不欲徐亦不欲平亦不欲側側豎令平峻不使傾捷則須定徐則須利如此則其大較矣徐浩古跡記曰中宗時中書令宗楚客奏事承恩乃乞大小二王真跡勑賜十二卷大小各十軸楚客遂裝作十二扇屏風以禇遂良閑居賦枯樹賦為腳大會貴要張以示之時薛稷崔湜盧藏用廢食歎美復不宴樂何延之蘭亭記曰蘭亭者晉右軍將軍會稽內史琅耶王羲之字逸少所書之詩序也右軍蟬聯美胄蕭散名賢雅好山水尤善草隸以晉穆帝永和九年暮春三月三日嘗遊山陰與太原孫綽興公廣漢王彬之并逸少凝徽操之等四十有一人修祓禊之禮揮毫製序興樂而書用蠶蠒紙鼠鬚筆遒媚勁健絕代更無凡二十八行三百二十四字字有重者皆構別體就中之字最多乃有二十許箇變轉悉冀遂無同者其時迺有神助及醒後他日更書數百千本終無如祓褉所書之者右軍亦自珍愛寶重此書留付子孫傳掌至七代孫智永永即右軍第五子徽之之後掌其書為蕭翼紿而取之又曰右軍孫僧智永帝居永欣寺闕閣上臨書所退筆頭置之於大竹簏簏受一石餘而五簏皆蒲凡三十年於閣上臨得真草千字文好者八百餘本浙江東諸寺各施一本今有存者猶直錢數萬張懷瓘書詁曰文質相法立其三古貴賤殊品置其五等三古者篆籀為上古鍾張為中古羲獻為下古又曰崔張玉也逸少金也大賈則貴其玉小商則重其金膚淺之人多任其耳但知王書為最真草一概略無差殊張懷瓘二王等書錄曰承聖末魏師襲荊州元帝將降其夜乃聚古今圖書十四萬卷并大小二王跡遣後閣舍人高善寶焚之吳越寶劍並將斫柱乃歎曰蕭世誠遂至於此文武之道今夜窮乎歷代祕寶並為煨燼矣張懷瓘議書曰其真書逸少第一元常第二世將第三子敬第四士秀第五文靜第六茂猗第七其行書逸少第一子敬第二元常第三伯英第四伯玉第五季琰第六敬和第七茂弘第八安石第九章草子玉第一伯英第二幼安第三伯玉第四逸少第五士秀第六子敬第七休明第八其草書伯英刱立規範得物象之形歸造化之理然其法太古質不剖斷以此為少也有推輪草意之妙後學得魚獵其中宜為第一叔夜第二子敬第三處冲第四世將第五仲將第六士秀第七逸少第八張懷瓘敘書法曰太宗自真草書屏風以示群臣筆力遒勁為一時之絕嘗謂朝臣曰書學小道功非急務時或留心猶勝棄日凡諸藝業未有學而不得者也韋述書法記曰太宗貞觀中搜訪王右軍等真跡出御府金帛重為購賞由是人間古本紛然畢進書斷曰鍾繇字元常尤善書師曹喜蔡邕劉德昇真書光妙乃過於師剛柔備矣點畫之間多有異趣雖神明不備可謂幽深無際而古雅有餘秦漢已來一人而已求其盡善盡美則狐裘而有羔袖其行書羲之之亞書則索衛之下八分則有魏受禪碑稱此為最也又曰晉韋昶字文休太元中孝武帝改治宮室及廟諸門並欲使王獻之隸書題牓獻之固辭乃使劉瓌以八分書之後又使文休以大篆改八分焉或問王右軍父子書君以為如何荅曰二王自可謂能未是知書也又曰妙則筆王子敬得其筆歎為絕世又曰晉薄紹之字敬叔丹陽人也官至給事中善書憲草小王風格秀異若干將出匣光芒射人書斷曰晉太元中新起太極殿謝安欲使子敬題牓以為萬代寶而難言之乃說韋仲題陵雲臺事子敬知其旨乃正色曰仲將魏室大臣寧有此事使其若此知魏德之不長安遂不之逼又曰齊王僧虔善書孝武欲擅書名僧虔不敢顯跡大明之世常用掘筆書以此見容梁蕭子雲字景喬小篆草行諸體兼備而刱造小篆飛白意趣飄然點畫之際有若騫舉妍妙至極難與比肩故歐陽詢云飛白鳥巾冠世其後逸少子敬又稱妙絕乃爾飛而不白蕭子雲輕濃得中蟬翼掩素遊霧崩雲可得而語其真書初學子敬晚師元常及其暮年筋骨亦備名蓋當世舉朝效之又曰梁庾肩吾云張功夫第一天然次之鍾天然第一功夫次之王功夫不及張天然過之天然不及鍾功夫過之懷瓘以為杜度章草並無所師鬱然靈變為後世楷則此乃天然第一也及有道變杜君章體以至草聖天然所資理可度矣池水盡墨功亦至焉隨永欣寺僧知果會稽人也煬帝甚善之工書嘗謂永師云和尚得右軍肉智果得骨夫筋骨藏於膚肉山水不厭高深書斷曰唐禇遂良善書少則伏膺虞監長則祖述右軍真書甚得其媚趣若瑤堂青瑣窅映春林美人嬋娟似不任乎羅綺鈆華婥約則歐虞謝之其行草之間即居二公之後書斷曰唐高正臣善書廣平人也嘗為人書十五紙人或戲換其五紙又令示高再看不寤客曰有人換公書高乃審詳之得其三紙客曰猶有在高又觀之竟不能辯又曰唐宋令文河東陝人也官至左衛郎將奇姿偉麗身有三絕書畫力尤於書備兼諸體偏意在草焉
