body:
  text: 人事部一百三游說下魏志曰袁紹領冀州牧從事沮授說紹曰將軍屬廢立之際忠義奮發雖黃巾猾亂黑山跋扈舉軍東向則青州可定還討黑山則張燕可滅迎大駕於西京復宗廟於洛邑號令天下以討未服以此爭鋒誰敵之紹喜王沉魏書曰桓階字伯緒天下亂太祖興義兵袁紹強盛劉表舉州應之階說其守張羨曰夫舉事而不本於義未有不敗者也曹公雖弱扶義而起奉王命以討有罪羨曰善矣魚豢魏典略曰蘇秦四說秦惠王書十上而說不行蜀志曰曹公追先主與諸葛亮至於夏口亮曰事急矣請求救於孫將軍亮說權曰曹操之眾遠來疲弊聞追豫州騎一日一夜行三百里此所謂強弩之末不能穿魯縞者今將軍誠與豫州協規同力破操軍必矣權大悅即并力拒曹公敗於赤壁又曰曹公追先主至於夏口諸葛亮曰事急矣請奉命求救於孫將軍時權軍柴桑觀望成敗亮說權曰海內大亂將軍起兵江東劉表豫州牧眾漢南與曹操並爭天下今操芟荑大難略已平矣遂破荊州威震四海英雄無所用武故豫州牧遁逃至此將軍量力而處之若能以吳越之眾與中國抗衡不如與之絕若不能當何不按兵束甲北面而事之今將軍外託服從之名而內懷猶豫之計事急而不斷禍至無日矣晉中興書曰蘇峻反溫嶠推陶侃為盟主侃欲西歸嶠說侃曰天子幽逼社稷危殆四海臣子肝腦塗地嶠等與公致命之秋事若剋濟則臣主同休如其不然身雖灰滅足以謝責於先帝今之事勢義無旋踵騎虎之勢可得下平公若違眾獨反眾心必沮沮眾以敗事義旗將廻指於公矣侃無以對遂留不去又曰建興初祖逖進說曰晉室之亂非上無道而逃民怨叛也由藩王爭權自相誅滅遂使戎狄乘隙毒流中原今天下既被殘酷遺黎思本人有奮擊之心但悉無所憑倚大王誠能命將帥使若逖等執殳前驅上為國家雪恥下為百姓請命則郡國豪傑必因風嚮起沉溺之民欣於來蘇也掃灑中原清復寰宇此千載之一時願大王圖之中宗於是始欲疆理神州又曰劉牢之屯洌州桓玄至于湖熟遣牢之族舅何睦說曰今君戰敗則傾宗戰勝亦覆族欲以是安歸乎孰若翻然改圖唯理是宅則與金石等固名與天壤俱窮哉牢之得說詣玄請降也范亨燕書曰晉室大亂高祖方經略江東高翔說高祖曰自王公政錯士人失望繈負歸公者動有萬數今王氏敗沒而福宿見尾箕其兆可見也今晉室雖衰人心未變宜遣貢使江東亦有所尊然後仗義聲以掃不庭可以有辭於天下高祖深納焉宋書曰二凶搆逆王僧達廻感不知所從有客說之曰為君計莫若承義師之撽移告傍郡使工言之士明示禍福也唐書曰李懷光屯軍咸陽反狀始萌李景略時說懷光請復宮闕迎大駕懷光不從景略出軍門慟哭曰誰知此軍一日陷於不義軍士相顧甚義之因退歸私家又曰柏耆者將軍良器之子素負志略學縱橫家流會王承宗以常山叛朝廷厭兵欲以恩澤撫之耆於蔡州行營以畫干裴度請以朝旨奉使鎮州乃自處士受左拾遺既見承宗以大義陳說承宗泣下請質二男獻兩郡由是知名韋昭吳書曰將軍曹仁在公安拒守呂蒙令虞飜說之飜至城門仁不肯相見乃為書曰將軍獨守縈帶之城而不降死戰則毀宗滅祀為天下笑幸熟思焉仁得書流涕而降之太公六韜曰文王齋戒三日乘田車田馬田于渭之陽呂尚以竿以漁曰今臣言至情不諱君其惡之乎緡微餌明小魚食之緡調餌多大魚食之夫魚食於餌乃牽於緡人食其祿而服於君故以餌取魚魚可殺以祿取人人可竭也春秋後傳曰梁以張儀為齊相楚怒約而攻梁雍沮曰請令解攻雍沮謂齊楚之王曰王亦聞張儀之約秦王乎曰王若相儀於梁齊楚惡儀必攻魏魏戰而勝是齊楚之兵折而儀固得梁矣若不勝梁必事秦以持其國必割地以賂王若欲復攻其弊不足以應秦此儀之所以與秦王陰相約也齊楚王曰善乃遽解兵又曰魏加問春申君聞欲將臨武君有之乎曰有矣加曰臣少之時好射臣願以射譬可乎春申君曰可曰更嬴與魏王處廩下更嬴謂魏王曰臣能為王虛發而下鳥有間鴈來更嬴虛發而鳥下魏王曰然則射可至此乎更嬴曰此孽也王曰何以知之對曰其飛徐而鳴悲者故創痛也鳴悲者久失群也今臨武君嘗為秦孽不可為距秦之將也又曰皇甫嵩既破黃巾威震天下故信都令漢陽閻忠說嵩曰難得易失者時也時至不旋踵者機也故聖人常順時而動智者必因機以發今將軍遭難得之時蹈機而不發將何以權大名乎又曰劉備救徐州刺史陶謙會謙病死伏波將軍陳登說備曰今欲為使君合眾十萬上可以匡主濟人成五霸之業下可以割地守境書名竹帛若使君不聽登亦未聽使君得發備遂領徐州孔演漢魏春秋曰興平元年曹公復征陶謙陳宮說張邈曰雄傑並起君以千里之眾當四戰之地撫劍顧盼亦足以為人豪而反制於人不以鄙乎魏氏春秋曰鍾會陰懷異圖姜維見而知其心謂可構成擾亂以圖克復乃詭說之曰君自淮南已來筭無遺策晉道克昌皆君為之今復定蜀威德大震其民高其功而主畏其謀欲以此安歸乎夫韓信不背漢於擾攘而見疑於既平大夫種不從范蠡於五湖卒伏劍而亡彼豈闇主愚臣哉利害使之然也今君大功既立大德已著何不法陶朱公汎絕跡全功保身登娥媚之嶺而從赤松遊乎會曰君言遠我不能行且為全身之道或未盡於此也維曰其他則君智力之所能無煩於老夫矣由是情好欣甚周載曰薄款者衛之居士也疑進說衛嗣君以王道嗣君悅延之以相辭曰疑之毋以疑為賢然與疑議家事既定則又決之所幸蔡嫗故事多不就母子之間猶不免乎蔡嫗之議今人主皆有蔡嫗而於臣非骨肉之親安得不敗君曰寡人聞命遂相之委以從事江表傳曰曹公聞周瑜年少有俊才謂可遊說動也密下楊州遣九江蔣幹往見瑜幹有儀容以才辯見稱獨步江淮之間莫與為對乃布衣葛巾自託私行詣瑜瑜出迎之立謂幹曰子翼卿苦遠江湖為曹氏作說客耶幹曰吾與足下州里中間別隔遙聞芳烈故來敘闊并觀雅頌而云說客無乃逆詐乎瑜曰吾雖不及夔曠聞弦賞音足知曲也因延幹入為設酒食後三日瑜請幹與周觀營中行視倉庫軍資器仗言訖還飲宴示之侍者服飾珍玩之物因謂幹曰丈夫處世一遇知己外守君臣之義內結骨肉之恩言行計從禍福共之假使蘇張更生酈叟復在吾猶拊其背而折其辭豈足下幼生所能移乎幹但笑終無所言幹還稱瑜雅量非言辭所間中州之士亦此多之王充論衡曰傳稱蘇秦張儀習縱橫之術於鬼谷先生掘地為坎曰能下說令我泣出則能分人主之地蘇秦下說鬼谷先生泣沾襟張儀下說鬼谷先生泣亦沾襟劉向說苑曰孫卿曰夫談說之術端盛以處之堅強以持之莊子曰昔趙文王喜劍劍士日夜相擊於前太子悝患之乃使以千金奉莊子莊子不受請持劍服劍服成乃見王曰臣有三劍有天子劍有諸侯劍有庶人劍天子之劍包以四夷裹以四時一用天下服此天子之劍於是文王不出宮三月劍士皆伏弊之也列子曰鄧析操兩可之說設無窮之弊韓子說難篇曰不可不察愛增之主而後說焉又說難篇曰凡事以密成亦以泄禍未必其身泄也而語及所匿之事如此者身危矣又說難篇曰龍喉下有逆鱗有嬰之則必煞人人主亦有逆鱗說者能無嬰人主之逆鱗則幾死矣又說難篇曰大意無所拂悟辭言無所擊排然後極聘智辯焉又說難篇曰略事陳意則曰怯懦而不盡慮事廣肆則曰草野而倨侮此說之難也又說難篇曰凡說得親近不疑而得盡其辭也鬼谷子曰抵巇音熙篇云巇者始有朕可抵而塞可抵而卻聖人知之獨保其用因作說事又曰量權篇云與智者言依於博與博者言依於辯與辯者言依於要此其說也又曰午合篇云伊尹五就桀五就湯然後合於湯呂尚三入殷朝三就文王然後合於文王此天知之至歸之不疑注云伊尹呂尚各以至知說聖王因澤釣行其術策又曰摩意篇云摩者揣之也說莫難於悉行事莫難於必成注曰摩不失其情故能建功又曰量權篇云言有通者從其所長言有塞者避其所短注曰人辭說條通理達即敘述從其長者以昭其德人言壅滯即避其短稱宣其善以顯其行言說之樞機事物之志務者也又曰反覆篇云其和也若比目魚其司言也若聲與響注曰和荅問也因問而言申敘其解如此目魚相須而行候察言辭往來若影隨形響之應聲又曰量權篇云介虫之捍必以甲而後動螫虫之動必先螫毒故禽獸知其所長而談者不知用也注云虫以甲自覆鄣而言說者不知其長又曰揣情篇云說王公君長則審情以說王公避所短從所長又曰謀慮篇云乃立三儀曰上中下曰參以立焉變生事事生謀謀生計計生儀儀生說說生進注曰三儀有上有下有中會同異曰儀決是非曰說呂氏春秋曰伍子胥將見吳王而不得客有言之於王子光者王子光見之而惡其皃不聽其說而辭之客請之王子光曰其皃吾所甚惡也客以告子胥子胥曰此易改也願令王子光居於堂上重帷而見其衣子光許之胥說之半王子光舉帷搏其手而與之坐說畢王子光大悅子胥以為有吳國者必王子光也退而耕於野十年子光為王任子胥子胥為法制下賢良選陣士習戰鬭六年然後大勝楚於柏舉九戰九勝逐北千里昭王出奔又曰韓氏城新城期十五日而成段橋為司空有一縣後二日段橋執其吏而囚之囚者之子走告封人子高曰唯先生能活臣父封人子高曰諾乃見段橋自扶而上城封人子高左右望曰美哉城壹大功矣子必有厚賞矣自古及今功若此其大也而能無有罪戮者未曾有也封人子高出段橋使人夜解其吏之束縛之者而出之說之行若此其精也封人子高可謂善說矣又曰孟嘗君為從公孫弘謂孟嘗曰不若西觀秦王之意弘見昭王曰薛之地小大弘曰百里昭王曰寡人之國地數千里猶未敢以有難也今薛百里之地而欲難寡人乎公孫弘曰孟嘗君好士大王不好士昭王笑而謝之又曰善說者若巧士因人之力以自為力因其來而與來因其往而與往所因便也尸子曰公輸般為蒙天之階階成將以攻宋墨子聞之赴於楚行十日十夜而至於郢見王曰今有人於此舍其文軒鄰有弊輿而欲竊之舍其錦繡鄰有短褐而欲竊之舍其梁肉鄰有糟糠而欲竊之此為何若人王曰必竊疾矣墨子曰荊之地方五千里宋方五百里此猶文軒之與弊輿也荊有雲夢犀兒麋鹿盈溢江漢之魚鱉黿鼉為天下饒宋所謂無雉兔鮒魚者也猶梁肉之與糠糟也荊有長松文柏梓柟豫章宋無長木猶錦繡之與短褐也臣以王之攻宋也為與此同類王曰善哉請無攻宋孔叢曰齊攻趙國稟立趙使孔青擊之克齊軍尸三萬趙王詔勿歸其尸將以困之子慎聘齊曰以臣愚計貧齊之術乃宜歸尸使其家遠來迎尸不得事農一費歸而葬之二費也一年之中喪三萬費欲無困貧弗可得也王曰善又曰五國約而誅秦未入秦境而留兵於成皋子慎謂市丘君曰此師楚為之主今兵不散殆有異意君其備之市丘君曰先生幸而教之子慎許諾遂見楚王曰王約五國而伐秦事既不集王胡不卜交乎楚王曰柰何子慎曰王今出令使五國勿攻市丘五國重王則聽王之令矣不重王且反王令而攻市丘以此卜為國交王之輕重必明矣楚王敬諾而五國散揚雄解嘲曰婁敬委輅脫輓棹三寸之舌案漢書曰婁敬說高祖西都又曰上說人主下談公卿一從一橫論者莫當班固荅賓戲曰遊說之徒風颺電激
