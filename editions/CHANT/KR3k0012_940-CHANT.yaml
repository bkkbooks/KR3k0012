body:
  text: 鱗介部十一牛魚博物志曰東海中有牛魚形如牛剝其皮懸之潮水至則毛起潮去則伏臨海異物志曰牛魚形如犢子毛色青黃好眠臥人臨上及覺聲如大牛聞一里魏武四時食制曰海牛魚皮生毛可以飾物出楊州天牛魚南越記曰天牛魚方圓三丈眼大如升在脾頭口在脅中露齒無脣兩肉角如臂兩翼長六尺尾長五尺水豬魚南方草物狀曰水豬魚隨海潮搏岸邊食人人乘舩剌之大者圍九尺長二三尺似豬形鹿魚臨海異物志曰鹿魚長二尺餘頭上有角腹下有腳如人足嶺表錄異曰鹿子魚頳其尾鬣皆有鹿班赤黃色余曾覽羅州圖云州南海中有洲每春夏此魚跳出洲化而為鹿曾有人拾得一魚頭已化鹿尾猶是魚南人云魚化為肉腥不堪食郭璞江賦曰或鹿觡象鼻鹿觡頭角如鹿鰕魚爾雅曰鯢大者謂之鰕今鯢魚似鯛四腳前似獼猴後似狗聲如小兒啼大者長八九尺異物志曰鰕魚有四足如龜而行疾有魚之體而以足行故名鰕魚含水仰天不動小鳥就飲因而吞之異物記曰鰕實四足而有魚名頭尾類鯷歧行生長山澗出入深坑頂上有光迎風濆流云是嬾婦怨勤自投鰩魚呂氏春秋曰灌水之魚名曰鰩狀如鯉有翼左思吳都賦曰文鰩夜飛而觸綸珠鼈魚山海經曰葛山灃水中多珠鼈之魚如肺而有六足目有珠其味酸甘食之不厲山海經圖讚曰灃水之鱗狀如浮肺體兼三才以貨賈客呂氏春秋曰魚之美者灃水之魚名曰珠鼈六足有珠灃水在蒼梧九疑之西赤𩹓魚山海經曰青丘之山英水出焉中多赤𩹓音需其狀如魚而人面其音如鴛鴦食之疥經圖讚曰赤𩹓之狀魚身人頭何羅魚山海經曰譙明之山譙水出焉其中多何羅之魚一首十身其音如吠犬食之已癰鰼鰼魚山海經曰涿光之山囂水出焉而西流其中多鰼鰼之魚音鰼其狀如鵲而十翼鱗皆在羽端其音如鵲可以御火又經圖讚曰鼓翮一運十翼翩翻厥鳴如鵲鱗在羽端雒書曰鰼鰼魚狀如鵲食之不瘴出涿光山䲃魚山海經曰獄法之山瀤澤之水出焉音懷其中多䲃魚音藻狀如鯉鷄足食之已疣又經圖讚曰䲃之為狀半鳥半鱗鮨魚山海經曰北獄之山諸懷之水出焉其中多鮨魚音詣魚身犬首音如嬰兒食之已狂鱅鱅魚山海經曰樕蛛之山速株食水出焉中多鱅鱅之魚音容狀如犁牛其音如彘山海經圖讚曰魚號鱅鱅如牛虎駮葴魚山海經曰狗狀之山𣲵音枳水出焉中多葴魚狀如儵喙如葴食者無疫南越記長針魚口四寸縳魚山海經曰鷄山暴水出焉其中有縳魚音團狀如鮒彘毛其音如豚見則天大旱又圖縳魚并顒鳥讚曰顒鳥栖林魚處川俱為旱徵災延普天測之無象厥數惟玄呂氏春秋曰魚之美者洞庭之縳鯥魚山海經曰柩音帶山多水有魚出焉狀如牛陵居虵尾有翼在魼祛榻二音下其音如留牛其名曰鯥音六冬死夏生蟄類也食之無腫疾山海經圖讚曰魚號曰鯥處不在水厥狀如牛鳥翼虵尾𩶐魚山海經曰英山愚水出焉北流注于招音詔水其中多𩶐魚狀如鼈其音如羊𩹂魚山海經曰樂遊之山桃水出焉其中多𩹂魚其狀如虵而四足漢書地理志曰子桐之水其中澤多𩹂魚無遺魚山海經曰英鞮之山涴水出焉是多無遺之魚魚身虵首六足目如馬耳食之使人不昧可以禦凶鰠魚山海經曰鳥鼠同穴之山渭水出焉其中多鰠魚音駱其狀如鱣魚動則其邑大兵山海經圖讚曰物以感應亦有數動壯士挺劍氣激江湧鰠魚潛淵出則民悚𩶯鮆魚山海經曰鳥鼠同穴之山濫音檻水出於其西多𩶯鮆之魚如毗二音其狀如覆銚鳥首而魚翼魚尾其聲如磬是生珠玉珠母蚌類山海經圖讚曰形如覆銚苞玉含珠有而不積泄以尾閭闇與道會可謂奇魚蠃魚山海經曰邽音圭山濛水出焉其中多蠃魚魚身而鳥翼聲如鴛鴦見其國大水䰽䰽魚山海經曰少咸之山鴈門之水其中多䰽䰽之魚音沛食之殺人魮魚山海經曰懸甕之山晉水出焉其中多魮魚音紫其狀如儵而赤鱗其音如吒食之不驕或作慅山海經圖讚曰微哉魮魚食則不驕物有所感其用無摽𩹴父魚山海經曰陽山流水出焉其中有𩹴音瑫父之魚其狀如鮒魚首如彘食之已歐山海經圖讚曰𩹴父魚首厥體如豚師魚山海經曰饒山歷號之水出焉中有師魚食之殺人文魚山海經曰景山睢音蛆水出焉中多丹粟文魚有班彩也鯩魚山海經曰半石之山來需音須之水出焉其中多鯩魚音綸黑文狀如鮒食者不腫鰧魚山海經曰半石之山合水出其陰是多鰧音騰魚其狀如鱖居逵逵水中之穴相交通蒼文赤尾食者不雍可以已瘻臨海水土記曰鰧魚似鱦長二尺飛魚王子年拾遺錄曰仙人甯封食飛魚而死死百年生故甯先遊涉七言頌云菁藻灼爍千載舒萬齡蹔死餌飛魚山海經曰騩音愧山正回之水出焉而北流注于河其中多飛魚其狀如豚而赤文服之不畏雷可以禦兵郭璞山海經圖飛魚讚曰飛魚如豚赤文無羽山海經曰牛首之山勞水出焉是多飛魚其狀如鮒食之可以已痔又曰飛魚如豚赤文無羽張駿山海經飛魚讚曰飛魚如鮒登雲遊波林邑國記曰飛魚身圓長丈餘羽重沓翼如胡蟬出入群飛遊翔翳薈而沉則泳海底豪魚山海經曰渠豬之山渠豬之水出焉是多豪魚其狀如鮪而赤喙尾赤羽食之可以已白疥鯸鮐魚左思吳都賦曰王鮪鯸鮐劉逵曰鯸鮐狀如科斗蟲大者長尺餘腹白背青有黃文性有毒雖小獺犬魚不敢啖也蒸煮肥美鯸𩽷魚潘岳滄海賦曰𩹃魚鯸𩽷鮠魚廣志曰鮠魚一名河豚丹魚抱朴子曰南陽丹水有丹魚先夏至十日夜伺之魚夜浮水側有赤光割取血以塗足可以步行水上䖶魚廣志曰䖶魚一名鮦直壟切𩹴魚劉敬叔異苑曰𩹴魚凡諸魚欲產𩹴輒以頭衝其腹𩹴魚自欲生者亦更相撞觸故世人謂為眾魚之生母也嶺表錄異曰𩹴南人云魚之欲產子者須此魚以頭觸其腹而產俗呼為生母魚望魚魏武四時食制曰望魚側如刀可以刈草出豫章明都澤云云滏澤班文魚魚豢魏略曰濊國出班魚皮漢時恒獻之郭義恭廣志曰班文魚出東夷濊獻其皮蕭拆魚魏武四時食制曰蕭拆魚海之乾魚也䱐䰽魚魏武四時食制曰䱐䰽魚黑色大如百斤豬黃肥不可食數枚相隨一浮一沉一名敷常見首出淮及五湖三十六國春秋曰吳人夏丞為孝廉高士夏仲御以母疾將市藥于京師隨丞入洛時值禊飲賈充見而放之仲曰我會稽夏仲御也充問卿居海濱能獻舩不仲曰能之充因命焉仲御即登舩鼓拽容止可觀為䱐䰽之形俄然雲霧杳冥白魚躍入其舟充甚異之蕃踰魚魏武四時食制曰蕃踰魚如鼈大如箕甲上邊有髯無頭口在腹下尾長數尺有節有毒螫人龍魚山海經曰龍魚陵居其狀如狸或曰龍魚似狸一角也一曰鰕魚音遐即有神聖乘此以行九野一曰鼈魚郭璞山海經圖讚曰龍魚一角似狸居陵俟時而出神聖攸乘飛鶩九域乘雲上升括地圖曰龍魚一名鰕魚狀如龍而有神聖乘此以行九野郭璞江賦曰或虎狀龍顏龍魚亦似魚
