body:
  text: 服章部七袞衣說文曰袞天子享先王卷音袞龍繡於下幡一龍蟠阿上嚮釋名曰袞卷也畫卷龍於衣也書曰帝曰予欲觀古人之象孔安國曰欲觀衣法象衣服制日月星辰山龍華蟲日月星為三辰華象草華蟲雉也畫三辰山龍華蟲於衣服施旌旗作會宗彝會會五采也以五采成此畫焉宗廟彝尊亦以山龍華蟲為飾藻火粉米黼黻絺繡藻水草有文者火為火字粉若粟米若聚米黼若斧形黻為兩己相背葛之精者曰絺五色備曰繡也以五采彰施于五色作服汝明以五色明施五采作尊卑服汝制之也尚書大傳曰山龍青華蟲黃作繢黑宗彝白藻火赤天子五服詩曰九罭之魚鱒魴我覯之子袞衣繡裳又曰君子來朝何錫予之雖無予之路車乘馬又何予之玄袞及黼又曰袞職有闕仲山甫補之左傳曰諸侯伐楚許男斯卒于師凡諸侯薨于朝會加一等死王事加二等於是以袞斂袞衣公服也謂加二等禮曰有以大為貴者天子龍卷諸侯黼大夫黻士玄衣纁裳郊特牲曰祭之日王被袞以象天戴冕藻十有二旒則天數也又明堂位曰袞冕立於阼周禮春宮上司服曰王之吉服亨先王則袞冕又夏官下曰節服氏掌祭禮朝覲袞冕六人維王之太常鄭玄曰服冕者從王服也維維之以縷王旌十二旒兩兩也縷綴連其旁三人持之禮天子旌曳地儀禮覲禮曰天子袞冕負斧扆漢書曰韋孟詩云肅肅我祖家自豕韋袞衣朱黻四牡龍旂後秦記曰姚襄夢弟萇上御座著袞服謂官屬曰此兒或能大起吾族齊書曰陸澄兼左丞泰始六年詔皇太子朝賀服袞冕九章澄與議曹郎丘仲起議服冕以朝實著經文秦除六冕漢明還備魏晉已來不欲令臣下服冕故位公者加侍官今皇太子禮絕群臣宜遵聖王盛典革近代之制唐書曰代宗時渤海質子盜袞龍服捕得之詞云慕中國衣服上赦之董巴漢輿服志曰上古衣毛而冒皮後世聖人易之以絲麻觀翬翟之文榮華之色乃染帛以効之始作五采成以為服黃帝堯舜垂衣裳蓋取諸乾坤有文故上衣玄而下裳黃秦以戰國即天子位滅去禮學郊祀之服皆以初玄漢承掌故至顯宗初服冕旒衣章以祀天地養三老五更於三雍三公九卿郊祀天地明堂皆冠冕垂旒衣裳玄上纁下乘輿備文日月辰星十二章三公諸侯用山龍九章九卿以下用華蟲七章皆五采衣裳乘輿剌史公候九卿已下皆織成陳留襄邑獻之續漢輿服志曰聖人處天子位服日月昇龍所以福其德章其功也賢人佐聖封國愛民黼黻文繡降龍所以顯其仁光其能也環濟要略曰天子龍冕諸侯黼大夫黻白與黑謂之黼黑與青謂之黻青與赤謂之文赤與白謂之章五色備謂之繡諸侯去日月星辰服山龍華蟲卿大夫去山龍華蟲服藻火服粉米擊虞決疑要注曰秦除袞冕之制唯為玄衣絳裳一具而已漢興亦如之中興後明帝永平中使諸儒案古文依圖書始復造袞冕之服至于今用之穀梁傳序曰一字之褒賞逾華袞片言之貶誅深斧鉞六韜曰昔帝堯王天下黼衣絓履不獘盡不更為也傅子曰魏明帝疑三公袞冕之服似天子減其采章陳留風俗傳曰襄邑縣南有渙水有睢水傳曰睢渙之水出文章故有黼黻藻錦日月華蟲以奉天子宗廟御服焉鷩衣釋名曰鷩雉山雉也鷩憋并列切也性急憋不可生必自殺故畫其形於衣以象人執耿介之節也周禮春官上司服曰王之吉服享先公饗射鷩冕鄭玄曰先公謂后稷之後也饗射饗食及與諸侯射也鷩畫以雉也三禮圖曰鷩冕服者王祭先公及饗射之服也以朝天子助祭玄衣纁裳以華蟲火宗彝三章畫以為績裳藻粉米黼黻四章薾步里切以為繡凡七章毳衣釋名曰毳芮也畫藻文於衣象水草之毳芮溫暖而潔也詩曰大車檻檻毳衣如菼毳衣大夫之服菼騅也蘆之初生者也古者天子大夫服毳冕以巡行大車啍啍他昆切毳衣如璊璊頳也音門周禮春官上司服曰王之吉服祀四望山川則毳冕鄭玄曰毳其衣三章裳三章也三禮圖曰毳冕王祀四望山川服也子男服以朝天子絺衣周禮春官上司服曰王之吉服祭社稷五祀則絺冕鄭玄曰絺或作繡字之誤也繡剌粉米無畫也玄衣詩曰緇衣美武公之德父子並為周司徒善於其職國人宜之緇衣之宜兮弊予又改為兮緇衣黑色上卿聽朝之正服也周禮春官上司服曰王之吉服祭群小祀玄冕鄭玄曰群小祀林澤墳衍四方百物之屬也玄者衣無文裳剌黻而己凡冕服玄衣纁衣也禮玉藻曰天子玄端而朝日於東門之外鄭玄曰端當為冕字之誤朝日春分時也魏臺訪議曰禮天子大夫玄冕而執鴈今秩中二千石六百石者可使玄冕而執鴈禕衣釋名曰王后之上服曰禕衣畫翬雉之文於衣也伊洛而西雉青質五色備曰翬也周禮天官下內司服曰內司服掌王后之六服禕衣王后之服刻繒為翬之形而采畫之綴於衣從王祭先王則服褘衣也禮明堂位曰夫人副褘立于房中鄭玄曰副首飾也今之步搖是也周禮追師掌王后之首服為副禕王后之上服也唯魯及王者之後夫人服之諸候夫人自褕翟而下也又曰祭義曰歲既單世婦獻繭于夫人夫人副褘而受之董巴漢輿服志曰太皇太后入廟服紺上皂下后謁廟服白上皂下皆深衣製徐廣云深衣即單衣公卿列侯中二千石夫人入廟佐祭者服皂絹上下皆深衣制穆天子傳曰吉日戊午天子大服冕禕冕冠禕衣王后之上服今帝服之未岸也授河宗璧䄖狄釋名曰搖翟畫雞雉之文於衣也江淮而南雉素質五采皆備成章周禮天官下內司服曰內司服掌王后之六服䄖狄鄭玄曰䄖狄闕狄畫羽飾也玄謂䄖狄青也三禮六服圖曰䄖翟王后從王祭先公之服也侯伯之夫人服以從君祭宗廟闕翟釋名曰闕翟翦闕繒為翟雉形以綴衣也詩曰委委蛇蛇象服是宜義曰象服者謂䄖狄闕狄也周禮天官下內司服曰內司服掌王后之六服闕狄鄭司農曰䄖狄闕狄畫羽飾也鄭玄曰闕狄刻而不畫者也此三者皆祭服玄謂今世有袿衣者蓋三狄之遺象也以椎次其色闕狄赤也三禮六服圖曰闕翟王后從祭群小祀服也亦子男夫人服以從君祭宗廟鞠衣釋名曰鞠衣如菊花色也周禮天官下內司服曰內司服掌王后六服鞠衣鄭司農曰鞠衣黃桑服也色如鞠座像桑葉始生三禮六服圖曰鞠衣王后桑之服也孤之妻服以從助君祭董巴漢輿服志曰太皇太后皇太后蠶服青上縹下深衣制貴人助蠶服純縹上下深衣制公卿列侯中二千石夫人助蠶服縹絹上下深衣制自二千石夫人已上至皇后皆以蠶衣為朝服徐廣輿服雜注曰晉先蠶儀注皇后衣純青之衣特進卿世婦二千石命婦助蠶則青絹上下展衣周禮天官下內司服掌王后之六服展衣展衣白衣三禮六服圖曰展衣王后以禮見王及賓客之服也卿大夫之妻以從助君祭釋名曰襢展字或作此坦也坦然正白無文采也禒衣釋名曰禒衣禒然黑色也詩邶柏舟禒衣曰禒兮衣兮禒衣黃裏禒間色黃正色義云禒兮衣兮禒衣自有禮制也諸侯大夫祭服之下鞠衣為上展衣次之眾妾亦有貴賤之等服鞠衣黃展衣白禒衣黑皆以素紗為裏非其制故以喻妾上僭焉褖兮衣兮禒衣黃裳義云婦人之服不殊衣裳同色今衣黑裳黃喻亂嫡妾之禮也周禮天官下內司服曰內司服掌王后六服禒衣素紗禒衣御於王者之服也亦似燕居君子之禒衣黑則是亦黑也袗衣三禮圖曰傅母婚禮從者袗衣古者傅母選無夫與子而老賤曉習婦道者使之應對也朱衣應劭漢官儀曰虎賁中郎衣紗縠單衣續漢志同晉令絳紗縠東觀漢記曰光武起義衣絳單衣赤幘初伯升之起諸家子弟皆曰伯升殺我及見上絳衣大冠乃驚曰謹厚者亦復為之晉義熙起居注曰安帝自荊州至新亭詔曰諸侍官戎行之時不備朱服悉令袴褶從也宋元嘉起居注曰治書侍御史朱興啟彈朝請向騰之坐同僚會故員外散騎侍郎楊珍之喪侍兵唱變服然後唱眾官下陪位而騰之著單衣在朱衣上於禮有虧請免所居官詔可齊書曰呂安國為右衛將軍加給事中後改封湘鄉侯武帝即位累遷光祿大夫加散騎常侍安國欣有文授謂其子曰汝後勿袴褶驅使單衣猶恨不稱當為朱官也神異經曰西荒有一人不讀五經而意合不觀天文而心通不誦禮律而精當天賜其衣男朱衣縞帶委皃冠女碧衣戴金勝皆無縫墨子曰楚莊王絳衣博袍語林曰何平叔面絕白魏文帝疑其著粉夏日喚與熱餅既噉大汗出以朱衣自拭色轉皎然時帝始信之班彪便宜事曰可選師傅將相子孫有行好學者以備絳衣舍人班固與竇憲牋曰將軍哀憐賜固手跡告以中軍宜鮮明乃賜以瑇瑁簪絳紗單衣
