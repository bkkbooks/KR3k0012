body:
  text: 人事部一百一十一貴盛釋名曰貴歸也物所歸仰也汝頴言貴聲如歸暀之歸也易曰貴而無位孝經曰高而不危所以長守貴也史記曰李斯長男由為三川守諸男皆尚秦公主女悉嫁秦諸公子李由告歸咸陽李斯置酒於家百官長令皆斯前為壽門庭車騎以千數李斯慨然而歎曰唴乎吾聞之荀卿曰物禁太盛斯乃上蔡布衣閭巷之黔首上不知其駑困遂擢至此當今人臣之位無居臣上者可謂富貴極矣物極則衰吾未知所稅駕者也又曰衛子夫立為皇后弟衛青封為長平侯三弟皆封為侯貴震天下天下歌之曰生男無喜生女無怨獨不見衛子夫又曰蘇秦師於鬼谷先生後得周書陰符讀之以揣摩因說六國以拒秦為從約并六國各佩其印行過洛陽車騎輜重諸侯各使送之甚眾擬於王者周王聞恐懼除道使人郊勞於是散千金以賜宗族漢書曰帝舅王譚為平阿侯商為成都侯立為江陽侯逢為高平侯根為曲陽侯五人同日封謂之五侯榮貴絕代又曰金日磾勒功上將傳國後嗣七葉內侍何其盛也功臣之家唯有金氏親近貴寵比於外戚又曰楊僕宜陽人也稍遷至主爵都尉南越反拜樓舡將軍有功封梁侯因歸家懷銀黃秉三組以誇鄉里又曰楊惲曰吾家方全盛乘珠輪者十人又曰項羽屠咸陽殺子嬰收貨賂婦女而東秦民失望於是韓生說羽曰關中阻山河四塞地肥勢可都以伯羽曰富貴不歸故鄉如衣錦夜行又曰萬石君石奮長子建次甲次乙次慶皆以馴行孝謹官至二千石於是景帝曰石君及四子皆二千石號奮為萬石君又曰主父偃曰臣結髮遊學四十餘年身不得遂親不以為子昆弟不收賓客棄我我厄日久矣丈夫生不五鼎食死則五鼎烹耳吾日暮途遠故倒行逆施之偃為齊相至齊遍召昆弟賓客散五百金與之曰始貧時昆弟不我內今吾相齊諸君迎我或千里吾與諸君絕矣無復入偃之門又曰張安世以父子封侯在任太盛乃辭不受祿詔都內別藏張氏無名錢以五百萬數文穎曰都內主藏官也張昌曰安世以還官官不薄又曰田蚡召客飲坐其兄蓋侯北嚮自坐東向以為漢相尊不可以兄故私撓田比滋驕治諸第田圃極膏腴市買郡國市物相屬於道前堂羅鼓鍾立曲旃如淳曰旌旗之名也通帛曰旃也後房婦女以百數諸珍物狗馬玩好不可稱數又曰孝元王皇后成帝母也家凡十侯五大司馬外戚莫比又曰史丹男九人皆以丹任為侍中自宣元成哀外戚興者許史三王丁傅之家皆重侯累將窮富極貴又曰劉向上封事曰今王氏一姓乘朱輪轂者二十三人青紫貂蟬充盈幄內大將軍執事用權五侯驕奢並作威福又曰天子見欒大說乃拜為五利將軍居月餘得四印天士將軍地士將軍大通將軍印賜列侯甲第僮千人乘輿車馬帷帳又以衛長公主妻之齎金十萬斤數月佩六印貴震天下范曄後漢書曰楊震傳曰自震至彪四葉太尉德業相繼與袁氏俱為東京名族司馬彪續漢書曰袁安字召公桓帝初遷太尉有子逢成隗字周陽靈帝時為司空隗字周陽亦至司徒太傅封都鄉侯四葉五公謝承後漢書曰梁不疑為潁陰侯胤子為城父侯冀一門前後七封三皇后六貴人二大將軍夫人女侯邑稱君七人尚公主三人其餘卿將尹校五十七人梁氏在位二十餘年窮極滿盛威行內外百寮側目莫敢違命東觀漢記曰馮異潁川人建武中征賊還過陽翟詔異上冢別下潁川太守都尉及三百里內長吏皆會使中大夫致牛酒宗族會郡縣給費又曰中元年以竇固為中郎將監羽林左騎破西羗還是時竇氏公侯二千石並在朝廷門內尚三公主賞賜恩寵榮於當世親戚功臣無與為等也又曰鄧訓五子及女弟為貴人立為皇后騭三遷虎賁中郎將軍車騎將軍儀同三司同三封始自隲也鄧氏自中興後累世寵貴凡侯者二十九人公二人大將軍以下十三人中二千石十四人州牧郡守四十八人其餘侍中大夫郎謁者不可勝數東京莫與為比又曰耿氏自中興以後訖建安之末大將軍九人卿十三人尚公主三人列侯十九人郎將護羗校尉及刺史二千石數十百人遂與漢興衰又曰章帝崩竇太后臨政竇憲為大將軍食邑二萬戶弟景執金吾懷將作大匠光祿勳又曰馬防車騎將軍城門校尉加置掾令史位在九卿上絕席詔封防兄弟三人各三千戶防為潁陽侯身帶三綬防子鉅為黃門侍郎肅宗親御章臺下殿陳鼎俎自臨冠之兄弟奴婢各千人已上又曰竇融嗣子穆尚內黃公主而融弟顯親侯竇友嗣子固尚涇陽公主穆長子勳尚東海恭王女竇氏一公二侯三公主四千石自祖至孫官符廄茅相望奴婢千數於親戚功臣莫與為比吳志曰士爕兄弟並為列郡雄長一州偏在萬里威尊無上出入鳴鍾鼓備威儀笳簫鼓吹車騎滿道胡人夾轂焚香者常有數十妻妾乘輜軿子弟從兵騎當時貴重震服百蠻又曰孫權拜諸葛恪撫越將軍領丹陽太守授棨戟武騎三百拜畢令恪備威儀作鼓吹導引歸家時年三十二何法盛晉中興書曰諸葛氏之先出自葛國漢司隸校尉諸葛豊以忠強立名子孫代居二千石三國之典蜀有丞相亮吳有大將軍瑾魏有司空誕名並蓋海內為天下盛族又曰何比干字長卿武帝時為丹陽都尉有陰德嘗獨坐天大雨有一老母詣比干而衣不濡比厈怪而敬焉臨去懷中出金冊九百九十枚以授比干曰爾子孫當佩印綬如此冊數陳書曰征南將軍歐陽頠時頠弟盛為交州刺史次弟遂為衡州刺史合門顯貴威振南土又多致銅鼓生口獻珍異前後委積頗有助於軍國焉隋書曰觀德王雄傳或奏高潁朋黨者上詰雄於朝雄對曰臣忝衛宮闈朝夕左右若有朋附豈容不知至尊欽明眷哲萬機親覽潁用心平允奉法而行此乃愛憎之理惟陛下察之高祖深然其言雄時貴寵冠絕一時與高潁虞慶則蘇威稱為四貴又曰楊素貴寵日降其弟約從父文思弟紀及族父异並尚書列卿諸子無汗馬之勞位至柱國刺史家僮千數後庭妓妾曳綺羅者以千數第宅華侈制擬宮禁有鮑享者善屬文謝胄者工草隸並江南士人因高智慧沒為家奴親戚故吏布列清顯素之貴盛近古未聞唐書曰竇威拜內史令威奏議雍容多引古為證高祖甚親重之或引入臥內帝為前席又嘗謂曰昔周朝有八柱國之貴吾與公家咸登此職今我為天子公為內史令本同末異乃不平矣威謝曰臣家昔在漢朝內為外戚至於後魏三處外家陛下龍興復出皇后臣又階緣戚里位忝鳳池自惟叨濫曉夕兢懼高祖笑曰比見關中人與崔盧為婚猶自矜伐公代為帝戚不以貴乎又曰竇氏自武德至今再為外戚一品三人三品已上三十餘人尚主者八人女為王妃六人唐世貴盛莫與為比又曰姜皎長安中累遷尚衣奉御時玄宗在藩見而悅之皎察玄宗有非常之度尤委心焉尋出為潤州長史玄宗即位召拜殿中少監召入臥內命之捨敬曲侍宴私以后妃連榻以擊毬鬭雞常呼之為姜七而不名也兼賜以宮女名馬及諸珍物不可勝數玄宗又嘗與皎在殿庭翫一嘉樹皎稱其美玄宗令徙植於其家又曰崔神慶子琳等皆至大官郡群從數十趍奏省闥每歲時家宴組珮輝映以一榻置笏疊於其上開元天寶間中外族屬無緦麻之喪其福履昌盛如此東都私第門琳與弟太子詹事珪光祿卿瑤俱列棨戟時號三戟崔家又曰楊汝士有時名遂歷清貴其後諸子皆至卿鬱為皇族所居靜恭里知溫兄弟並列門戟咸通中昆仲子孫在朝行方鎮者十餘人劉義慶世說曰孫皓問丞相陸凱曰卿一宗在朝有幾人荅曰三相五侯將軍十餘人皓曰盛哉陸曰臣聞君賢臣忠國之盛父慈子孝家之盛也當今政荒人弊臣何敢家言盛也荊州記曰自峴山南至宜城百餘里舊說其間雕牆峻宇閭閻填列漢靈帝末其中有卿士及刺史二千石數十人朱軒駢耀華蓋接陰荊州刺史行部見之雅歎其盛勒縣刻石銘之雜鬼神志曰昔周時尹氏貴盛數代不別食口數千常遭飢荒羅鼎鑊作糜啜糜之聲聞數十里中臨食失三十人入鑊中墾取鑊底糜鑊深大故人不見也荀氏家傳曰惟我之先生於有晉人物盈朝袞衣暐曄六世九公不亦偉乎磊落瓌奇光昭合同已獨步於古今拊萬姓而駭之矣中興丞相王公歎曰自八龍以後榮寵莫二為天下之盛也蘇子曰夫帶方寸之印拖丈八之組戴貂鶡之尾建千丈之城遊五里之衢走卒警蹕叫呼而行此諸侯之所謂榮華時俗之所謂富貴也左思詠史詩曰金章籍舊業七葉珥漢貂校語御覽第四百七十按本卷有錯簡四處茲據日本學訓堂倣宋藂珍版暨鮑崇城本訂正並於銜接處加為識其原式如左今第二葉後三行田比滋驕治下原接今第四葉前十三行常有數十今第三葉前七行靈帝時為司空隗字下原接今第五葉前二行詰日之於朝今第四葉前十三行胡人夾轂焚香者下原接今第二葉後三行諸第田圃極膏腴今第五葉前二行或奏高潁朋黨者上次下原接今第三葉前七行陽亦至司徒太傅但今第二葉後三行治諸第句藂珍版作治宅甲諸弟鮑刻作治諸弟上文田比滋驕二本均作由此滋驕今第三葉前七行隗字陽句二本陽上均有次字又前六行遷太尉下均有弟湯字仲和累遷司徒湯十字又前七行第一字隗下有成左中郎逢五字今第五葉前二行上次詰日之於朝句詰日二字二本均乙轉附識於此
