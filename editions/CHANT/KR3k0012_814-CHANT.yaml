body:
  text: 珍寶部十二銅左傳僖中曰鄭伯朝楚楚子與之金既而悔之與之盟曰無以鑄兵故以鑄三鍾金銅史記曰秦使徐福入海還偽辭曰臣見海中大神曰汝秦王之神薄得觀而不得取即從臣往蓬萊山見芝城宮闕有使者銅色而龍形光上照天又曰秦始皇收天下兵聚之咸陽為銅鑄金人十二各千石置庭中又曰張孟談董安于之治晉陽也公室之堂皆以練銅為柱又曰趙襄子使廚人以銅斗擊代王殺之而取其地又曰上使善相相鄧通當貧餓死文帝於是賜通蜀嚴道銅山得自鑄錢景帝立有告通盜出徼鑄錢盡沒入一簪不得著身寄死人家又曰龍門碣石多銅鐵漢書曰武帝即位好鬼神之事李少君以卻老方見上上有故銅器問少君少君曰此器齊桓公十年陳於桓寢已而案其刻果齊桓公器又曰黃帝采首陽山銅鑄鼎於荊山之下又曰王莽夢長樂宮銅人五枚並起立莽惡之使尚方鐫滅銅人應之又曰吳有豫章郡銅山招致天下人民亡命者盜鑄錢又曰凡律度量衡用銅者所以同天下齊風俗也銅為物至精不為燥濕寒暑變其節不為風雨暴露改其形介然有常似於士君子之行是以用銅也又曰王莽天鳳四年八月莽親之南郊鑄作威斗威斗者以五色銅為之又曰無雷國有銅華嶠後漢書曰靈帝時使掖庭令畢嵐鑄銅人四列於蒼龍玄武闕外又曰脩玉堂殿鑄銅人四黃鍾四其音中黃鍾也子為黃鍾及天祿蝦蟆又鑄四出文錢天祿獸也范曄後漢書曰馬援善別名馬於交阯得駱越銅鼓乃鑄為馬式又曰馬援征南海鑄銅柱於林邑國以極漢南界又曰崔烈納錢為司徒久之不自安從容問其子鈞曰吾居三公於議者何如釣曰大人少有英稱歷位卿守論者不謂當為三公而今登其位天下失望烈曰何為然也鈞曰論者嫌其銅臭烈怒舉杖擊之又曰薊子訓遁去不知所止後人復於長安東霸城見之與老翁共磨娑銅人相謂曰適見鑄此而已近五百歲矣魏略曰明帝徒長安諸鍾虡駱駞銅人承露盤折銅人不可致住霸城又鑄作銅人列坐於司馬門外吳志朱異口賦弩曰南岳之幹鍾山之銅應機命中獲隼高墉晉書曰南陽王模督秦雍時關中飢荒百姓相噉加以疾癘盜賊公行模力不能制乃鑄銅人鍾鼎為釜器以易穀議者非之崔鴻十六國春秋後趙錄曰石勒徙洛陽銅馬翁仲二于襄國列之永豐門北史曰後魏明帝初爾朱榮與從弟世隆密議廢立乃以銅鑄孝文及咸陽王禧等五王子像成當奉為主唯莊帝獨就唐書曰開元中許昌縣之唐祠掘地得古銅罇又隱起雙鯉篆書文曰宜子孫又曰開元十三年宋州獻古銅鼎十九及鍾磬甑釜罇杓盤瓶各數四時宋城尉晉日休因板築獲而獻之又曰初天寶中天下州郡皆鑄銅為玄宗擬其形容首冠環焰足承菡萏與尊佛之像間列於殿堂號為真容及山東陷率被鎔毀而恒州獨存又曰文宗問宰臣曰幣輕錢重如何宰臣楊嗣復曰此事已久但且禁銅不可遽變其法法變即必擾人李玨曰今請加鑪鑄錢他法不可先有格令州府禁銅為器當今以銅為器而不知禁所病者制勑一下曾不經年而州縣因循所以制令相次而視之為常今自淮而南至於江嶺鼓鑄銅器列而為肆州縣不禁市井之人逐錐刀之利以緍範為他器鬻之售利不啻數倍是則禁銅之令必在嚴切斯其要也又曰五臺山有金閣寺鑄銅為瓦塗金其上照燿山谷計錢巨億萬淮南子曰銅英青又曰銅不可以為弩抱朴子曰吳時發廣陵大冡中有銅為人數十頭皆長五尺又曰金簡記云以五月丙子日中時鑄五石下其銅五石雄黃丹砂雌黃礬石曾青也皆鑄粉之以金華池漆之內太一神鼎中下以桂薪燒之銅成以銅炭冶之取牡銅以為雄劍取牝銅為雌劍帶之以入河則蛟龍巨魚水神不敢進也欲知銅之牝牡當令童男童女俱以水灌銅以其在火中尚赤時也則銅自分為兩叚有凸起者則牡銅也凹陷者則牝銅也又曰山中夜見胡人銅之精也山海經曰昆吾之山其上多赤銅此山出金色赤如火以切玉如泥周穆王持西戎為兵獻汲冡中得銅金劍一枚長三尺五寸故通以錫雜為兵器帝王世紀曰紂作銅柱令男女裸形緣之落則妲己笑國語管仲曰美金以鑄戟劍鑄冶試諸狗馬狗馬難為利者惡金以鑄鉏夷斤欘惡麤夷平也所以削草平地也斤形似鉏而小𢺡斫也廣雅曰白銅謂之鋈赤銅謂之錫漢武內傳曰上起神屋臺以銅為柱黃金塗之神異經曰入金山下四丈得丹楊銅張華曰此銅與金相似典術曰陶丹銅以為金也賈誼書曰下不得鑄錢則民反耕田矣西京雜記曰高祖初入咸陽宮周行庫藏見銅人十一枚坐皆高三尺列在一筵上琴筑笙竽皆有所執皆綴花綵儼然若生人筵下有銅管上口高數尺出筵後其一管內空一管有繩大如指使一人吹管一人紐繩則琴筑笙竽皆作聲音與真樂不異虞喜志林曰建武中南郡男子獻銅鼓背有銘及吳時江水中鍾上有百餘字人莫有識者地鏡圖曰草莖黃秀下有銅器士緯曰銅出於石為鈴則小鑄鍾則大南中八郡志曰雲南舊有銀窟數十劉禪時歲常納貢亡破以來時往採取銀化為銅不復中用世語曰元康八年陵雲臺上生銅賈誼鵬鳥賦曰陰陽為炭萬物為銅張瑩漢南記曰安帝見銅人以問侍中張陵對曰昔秦始皇時有大人十二身長五丈履六尺皆夷狄之服見於臨洮此天將亡秦之證而始皇誤喜以為瑞乃鑄銅人以為像上曰何以知之對曰臣見傳載亦其人胸上有銘林邑記曰林邑王范文鑄銅為牛銅屋行宮荊州記曰衡陽重安縣有岩苦歷反塘故老相傳云此塘中有銅神今猶時聞銅聲水轉變綠魚為之死武當山記曰山有石室中有銅杖長七尺越絕書曰赤堇之山破而出錫若耶之谷涸而出銅歐冶因為純鈞之劍玄中記曰銅之精為童奴嶺表異錄曰蠻夷之樂有銅鼓焉形如腰鼓而一頭有面鼓面圓二尺許面與身連全用銅鑄其身遍有䖝魚花草之狀通體均勻厚二分已來鑪鑄之妙實為奇巧擊之響亮不下鳴鼉貞元年中驃國進樂有玉螺銅鼓玉螺蓋螺之白者非琢玉所為即知南蠻酋首之家皆有此鼓也咸通末幽州張直方貶龔州刺史到任後修葺州城緣掘土得一銅鼓牽復載以歸京到襄漢以為無用之物遂捨于延慶禪院用代木魚鐵尚書曰華陽黑水惟梁州厥貢璆鐵尚書說命曰若金用汝作礪孔安國曰鐵須礪以成利器禮記月令曰季春之月命工師令百工審五庫之量金鐵及革無或不良左傳昭七年曰晉趙鞅賦晉國一鼓鐵以鑄刑鼎著范宣子刑書各出功力共鼓石為鐵一鼓而足之春秋孔演圖曰八政不中則鐵飛春秋繁露曰蒸石取鐵非人意也禍福所從生亦非人意乎廣雅曰鐵朴謂之礪史記曰邯鄲郭縱以鐵冶成業與王者埒富也又曰卓氏宛氏以鐵冶致富漢書五行志曰武帝征和二年涿郡鐵官鑄鐵消皆飛去時劉屈氂為太守後死象漢書曰高祖又與功臣剖符作誓丹書鐵契藏之宗廟又曰張良以家財求客㓨秦王得力士為鐵椎重一百二十斤秦始皇至愽浪沙中良與客俱擊秦皇帝又曰張敞弟武拜為梁相武曰當以柱後惠文冠彈治之耳應劭曰柱後以鐵為柱本法官冠也又曰成帝河平二年沛郡鐵官冶鐵飛又曰李尋說王根曰政感陰陽猶鐵炭之低仰見效可信者天文志曰懸土炭也以鐵易土耳先冬夏至懸鐵炭於衡各一端冬陽氣至炭仰而鐵低夏至炭低而鐵仰又曰婼羌國有鐵自化作兵范曄後漢書曰赤眉降徐宣等曰自今日得降猶去虎口歸慈母世祖曰卿鐵中鎗鎗庸中佼佼耳又曰公孫瓚徙鎮易京慮有非常乃居於高京以鐵為門魏略曰弁辰國出鐵韓穢皆從市之諸市買皆用鐵如中國用錢也王隱晉書曰石苞字仲容初為縣吏買鐵鄴市市長沛國趙元儒見苞異之便與結交晉陽秋曰肅慎土無鹽鐵晉書曰林邑國王范逸死奴文篡立文曰南西卷縣夷帥范雅奴也嘗牧牛澗中獲二鱧魚化成鐵用以為刀刀成乃對大石障而呪之曰鱧魚變化冶成雙刀石障破者是有神靈進斫之石即瓦解文知其神乃懷之晉書載記曰赫連㪍㪍以鐵伐為氏曰使我宗族子孫剛銳如鐵皆堪伐人也齊書曰高祖素儉約後宮物器欄檻以銅為飾者並改以鐵梁書曰康絢築浮山堰將合淮水漂沒復決潰眾患之或謂江淮多蛟能乘風雨決壞岸其性惡鐵因是引東西二冶鐵器大則釜鬲小則钁鋤數千萬斤沉於堰所後漢書曰崔挺為光州刺史先是州內少鐵器用皆求之他鏡挺表復鐵官公私有賴莊子曰金鐵蒙以大緤載六驥之上則致千里淮南子曰上古之時未有鐵器磨蜃以耨又曰鐵不可以為舟又曰豐水之深十仞不受塵埃投金鐵焉則形見於水山海經曰克光之山龍首之山其陰多鐵神異經曰南方有獸焉角足大小形狀如水牛皮毛黑如漆食鐵飲水其糞可為兵器其利如鋼名曰齧鐵俗云咋鐵玄黃經曰南方齧鐵糞利如鋼食鐵飲水腹中不傷也河圖曰赤帝有女譌鐵飛之異新序曰公孫敖曰夫玉石金鐵猶可琢磨以為器用而況於人論衡曰紂力能索鐵申鉤盧綝四王起事曰張方請帝遷都五千騎皆鐵纏槊魏武故事曰領長史王必是吾鄉披荊棘時吏忠而勤事心如鐵石語林曰許玄度出都為弟婚弟少愚恐人嘲弄玄度為解而獲免真長笑曰許玄度為弟張十重鐵步障異苑曰楚王與群臣獵於雲夢縱良犬逐狡兔三日而獲之其腸是鐵良工曰可以為劍十洲記曰流沙在西海中上多山川積石為昆吾石治其石成鐵作劍光明洞照如水精狀割玉如切泥土廣州記曰鄧平縣有鐵石南方草物狀曰鐵出躭蘭州裨夷莊舡載鐵至扶南賣之華陽國志曰公孫述廢銅錢鑄鐵錢百姓貨賣不行金鋼晉起居注曰咸亨三年燉煌上送金鋼生金中百淘不消可以切玉出天笁玄中記曰金鋼出天笁大秦國一名削玉刀削玉如鐵刀削木大者長尺許小者如稻米欲刻玉時當作大金鐶著手指開其背如月以割玉刀內環中以刻玉南州異物志曰金鋼石也其狀如珠堅利無疋外國人好以飾玦環服之能辟惡毒南越志曰波羅基國出鋼珠朗照幽夜林邑記曰林邑王范範明達獻金鋼指鐶抱朴子曰扶南有金鋼可以刻玉體似紫石英外國人名為千延至於百丈底著盤以鐵槌打之不能傷以羖羊角扣之則漼然冰泮服虔通俗文曰亂金謂之鉅鍮石廣志曰鍮石似金亦有與金雜者淘之則分鍾會蒭蕘論曰夫莠生似禾鍮石像金齊周捨謂沙門法雲曰孔子不飲盜泉之水法師何以捉鍮石香爐荅曰檀越既得戴纛貧道何為不得執鍮唐書曰高宗上元元年詔九品服淺碧並鍮石帶八胯王子年拾遺記曰石虎為四時浴臺皆用鍮石珷玞為陡岸
