body:
  text: 地部三十一湖廣雅曰湖池也說文曰湖大陂也史記曰三苗氏左洞庭右彭蠡德義不修舜滅之此在德不在險晉書曰陳訓少學天文孫皓以為奉禁都尉知皓必敗時錢塘湖開或言天下當太平青蓋入洛皓以問訓對曰臣能望氣不達湖開塞退告友曰青蓋入洛將有舁襯御璧之事非吉祥也宋書曰會稽太守孟顗事佛精懇而為謝靈運所輕嘗謂顗曰得道應須惠業文人生天當在靈運前成佛必在靈運後顗深恨之會稽東郭有迴踵湖靈運求決以為田顗堅執不與又求始寧岯崲湖為田顗又固執靈運謂顗非存利民正慮決湖多害生命言論毀傷與顗遂構讎隙唐書曰褚無量字弘度杭州鹽官人也幼孤貧厲志好學家近臨平湖時湖中有龍鬥傾里閈就觀之無量時年十二讀書晏然不動風俗通曰湖都曰流瀆四面所隈都也周官楊州其浸五湖案張勃吳錄五湖者太湖之別名以其周行五百餘里故以五湖為名虞翻又云太湖有五道別謂之五湖或說以太湖射貴湖上湖洮湖洮湖一名長塘湖在義烏滆戶伯切湖為五湖案國語吳越戰於湖直在笠澤一湖中戰耳則知或說非也隋大業記曰五月夏至前三五日吳郡太湖中白魚向湖側淺水菰蒲之上產子民得採之隋時貢於洛楊州記曰太湖一名震澤一名笠澤一名洞庭史記三苗之國左洞庭右彭蠡裴駰注云今湖中苞山有石穴其深洞無知其極者名洞庭洞庭對曰彭蠡則知因此穴之名通呼洞庭彭蠡即宮庭湖名也越絕書云太湖周三萬六千里在吳興也荊州記曰宮亭即彭蠡澤也謂之彭澤湖一名匯孩賄切澤在豫章郡青草湖一名洞庭湖洞庭湖亦謂之太湖在巴陵郡雲夢澤一名巴丘湖凡此並昭昭尤著又廣大也干寶搜神記曰由權縣秦時長水縣始皇時童謠曰城門有血城當陷沒為湖有嫗聞之朝往窺門將欲縛之嫗言其故後門侍以犬血塗門嫗見血走去忽有大水欲沒縣主簿令幹入白令令曰可忽作魚幹曰明府亦作魚遂淪為湖鄭緝之永嘉記曰懷北縣有蔣公湖父老云先代有祭祀祈請者湖輒下大魚與之秦州記曰武都郡前有湖義熙初有白龍於湖升天盛弘之荊州記曰宮亭湖廟神甚有靈驗塗旅經過無不祈檮能使湖中分風而帆南北又曰巴陵南有青草湖周廻數百里日月出沒其中湖南有青草山故因以為名劉澄之荊州記曰華容縣東南有雲夢澤一名巴丘湖荊州之藪也劉澄之豫州記曰陳縣地有芍陂湖魏將王陵與吳將張休交戰處也黃閔武陵記曰有湖名為丹陂周廻數百頃清波澄映洲嶼相望武昌記曰武昌長湖通江夏有水冬則涸于時靡所產植陶太尉立塘以遏水於此常自不竭因取瑯琊郡隔湖魚菱以著湖內菱甚甘美異於他故所產鮒魚乃長三尺劉道真錢塘記曰明聖湖在縣南去縣三里父老相傳有金牛時見神化莫測故以明聖垂名西京雜記曰顧翱少失父事母好食雕胡飯常帥子女躬自採擷還家導水鑿川供養每有盈儲家近太湖湖中乃生雕胡無復雜草蟲鳥不敢至焉遂得以為養郡縣表其閭舍江乘地記曰滆湖中有嘉魚美蓴劉欣期交州記曰有一湖去舍浦四十里每陰雨日百姓見有銅舩出水上又有一牛在湖中以鷄酒為祭便大獲魚若此禮不設唯得牛糞而已述征記曰桓冲為江州刺史遣人周行廬山冀覩靈異既陟崇巘有一湖匝生桑樹有白鵠湖中有赤鱗魚使者渴極欲往飲水有赤鱗魚張鰭向之使者不敢飲南康記曰空山上有平湖湖中有艑音便底浮在湖中動搖便起風兩鄭緝之東陽記曰北山去郡三十餘里有赤松廟故老相傳云其下有居民曰徐公者嘗登嶺至此處見湖水二人共愽於湖間自稱赤松子安期先生有一壺酌酒以飲徐公公醉而寐其側比醒不復見劉澄之豫州記曰城父縣有巢湖湖周五里湖中有三山湖南有四鼎山戰園策曰秦與荊戰大破之取洞庭五渚吳地記曰吳王葬女取土成湖又郡國志云三女墳在郭西云闔閭食蒸魚羹留半賜三女三女怨自殺王痛之葬於郭西文石為槨金印玉牒銀樽朱盤悉以送葬又云盤郢之劍或曰湛鑪之劍夜飛適楚以水繞墳因名女墳湖又云葬女時有白鶴舞吳市因入羨門悉化為犬錢塘記曰去邑十里有詔息湖古老相傳昔秦始皇巡狩經塗暫憩因詔以息為名周景式廬山記曰山頂有一窮湖湖足頳尾鯉鰭皆傷剝而又有一故艑槽崇山峻遠非舟楫所游豈深谷為陵而此物不與丘壑同遷乎顧微廣州記曰廬山上有一湖至甲戍日輒聞山有鼓角聲劉澄之楊州記曰新城縣東有俱山山上有湖湖中有白鵝一隻時時飛來不可常見劉楨京口記曰龍目湖秦王東游觀地勢云此有天子氣使赭衣徒鑿湖中長岡使斷因改為丹徒今水北注江也梁典曰武帝望京峴山盤紆似龍掘其右為龍目二湖徐州先賢傳曰句踐滅吳謂范蠡曰吾將與子分國而有之蠡曰君行令臣行意乃乘扁舟浮五湖而不返水經注曰武強縣耆宿云邑人有行於途有一小虵疑其有靈持而養之名曰檐生長而吞噬人里中患之遂捕繫獄檐生負而奔邑淪為湖縣長及吏咸為魚矣今縣東北半許里有淵謂之郎君淵耆宿又言縣淪之日其子東奔又陷於此故淵得郎君之目矣神異經曰北方荒外有湖方千里平滿無高下有魚長七八尺刑狀如鯉而目赤晝在湖中夜化為人刺之不入煮之不死以烏梅二七煮之即熟食之可以愈邪病又曰北方荒中有石湖方千里無凸凹上直結反下於交反平滿無高下岸深五丈餘恒冰唯夏至左右五六十日解耳又曰東南海中烜洲上有溫胡其中唯有鯽魚焉長八尺食之宜暑而避寒郡國志曰潤州遏陂有湖名龍目湖京口出好酒人習戰故桓溫云京口土瘠人窶無可戀唯酒可飲兵可用耳會稽記曰漢順帝永和五年會稽太守馬臻創立鏡湖在會稽山陰兩縣界築塘蓄水高丈餘田又高海丈餘若水少則洩湖灌田如水多則開湖洩田中水入海所以無凶年堤塘周迴三百一十里溉田九千餘頃又會稽記云創湖之始多淹塚宅有千餘人怨訴於臺臻遂被刑於市及臺中遣使按鞠總不見人驗籍皆是先死亡人之名又按輿地志云山陰南湖縈帶郊郭白水翠巖互相映發有若圖畫南徐州記曰子英常於芙蓉湖捕魚得赤鯉持歸以穀養一年遂生角翅魚云我來迎汝子英騎之即乘風雨騰而上天故列仙傳云每經數載來歸見妻子魚復來迎如是數十廻而不還芙蓉湖即射貴湖也又名上湖吳地記曰臨平湖在臨平山南吳志曰歸命侯天璽元年吳郡言臨平湖自漢末草穢擁塞今更除平古老相傳云此湖塞天下亂此湖開天下平又湖邊得石函函中有小石青色長四寸廣二寸餘刻上作皇帝字於是改年大赦俄而晉平吳孫盛以為元皇中興之符歙縣圖經曰黃墩湖在縣西南其湖有蜃常與呂湖蜃斗程靈銑好勇而善射夢蜃化為人告之曰吾為呂湖蜃所厄君能助吾必厚報束帛練者吾也明日靈銑彎弧助之正中後蜃不知所之後人名其處為蜃灘時有一道人詣靈銑母求食食訖曰勞毋設食今當為求善墓地使母隨行上山以白石識其地曰葬此可以暴貴矣靈銑因移父葬其所侯景亂靈銑率郡鄉萬餘眾保新安因隨陳武帝有奇功及陳武受梁禪靈銑以佐命功臣與周文昱侯安都為三傑按靈銑宅在湖東二里徐爰釋問曰玄武湖本桑泊晉元帝創為北湖宋以隸舟師京都記云從北望鍾山從宮亭湖望廬岳齊武帝理水軍於此中號曰昆明池故沈約登覆舟山詩云南瞻儲胥館北望昆明池即此爾永嘉末有龍見於湖內故改為玄武湖豫章記曰擔石湖在州東北其湖水中有兩石山有孔如人穿擔狀古老云壯士擔此兩石置湖中因以為名輿地志曰安成有蜜湖中有絲蓴鯽魚為時所重并有石窟容百人坐其魚味甘如蜜因此為名在縣東二十里淮南子曰夫歷陽之都一夕化而為湖勇力聖智與不肖者同命無遺脫也荊南志曰高沙湖在枚廻洲上翠澤平皛胡了切水陸彌曠芰荷殷生鱗羽滋阜湖南林野清曠可以栖託故徵士宗炳昔常家焉北有小水自湖通江謂之曾口是也渚宮故事曰江陵城西二十里高沙湖其中多魚又曰五葉湖昔湖測有主人張披五葉同居因以為名九江記曰彭蠡湖在尋陽縣東南與都昌縣分界湖心有大孤山案郡國志彭蠡湖周迴四百五十里內有石高數十丈大禹刻其石以記功焉又有乞烏隨船行舟人擲搏飯接之高下不失一粒今此烏沿江靈廟多有不獨在彭蠡湖爾郡國志曰鶴門湖者陶侃微時喪母忽有二客來吊化為雙白鶴飛去後因以為名丹陽記曰吳孫皓寶鼎元年丹陽縣宣騫之母年八十浴於後湖化為黿後湖又名練湖在縣北百二十步輿地志曰曲阿出名酒皆云後湖水所釀故醇烈也今按湖水上承丹徒陳驪覆船山馬林溪水色白味甘輿地志云練塘陳敏所立遏高陵水以溪為後湖語林曰褚公遊曲阿後湖狂風忽起船傾褚公已醉乃曰此舫人皆無可以招天譴者唯有孫興公多塵滓正當以厭天欲耳便欲捉孫擲水中孫懼無計唯大呼曰季野卿念我褚公褚彥回也季野彥回字也伏滔登故臺詩序曰夫差姑蘇臺東有丹湖萬頃內有金銀塘方輿記曰銅船湖馬援鑄銅船五隻一留此湖中四隻將過海征林邑潭幽明錄曰碩縣下有眩潭以視之眩人眼因以為名傍有田陂昔有人舡行過此陂見一死蛟在陂上不得下無何見一人長壯烏衣立於岸側語行人云吾昨下陂不過而死可為報眩潭行人曰眩潭無人云何可報烏衣人云但至潭便大言之行人如其旨須臾潭中有號泣聲又曰晉元熙中桂陽郡有一老翁常以釣為業後清晨出釣遇大魚食餌掣綸甚急船人奄然俱沒家人尋喪於釣所見老翁及魚並死為釣綸所纏魚腹下有丹字文曰我聞曾潭樂故從檐潭來磔死弊老翁持釣數見欺好食赤鯉鱠今日得汝為荊州圖記曰武當縣西北六里江中名佷字潭潭中有石磧洲長六十丈世傳佷子未曾從父命父臨終欲葬山上故謬曰葬我水中佷子唯從此命習鑿齒記云佷子是漢時人家在山東五女徼鄧德明南康記曰梓潭有梓樹洪直巨圍葉廣丈餘垂柯數畝又曰贛潭在郡下昔有長者於此潭以釣為事恒作漁父歌其聲慷慨忽聞綸動須臾一物形似小水牛眼光如鏡或言水犀浮躍逐綸角帶金繅釣客因引得鏁出水數十丈鏁斷餘數丈盡是珍寶羅浮山記曰牛潭深洞無極北岸有石周圍三丈許漁人見牛自水而出盤於此石抱朴子曰昔石頭水有大黿常在潭中因名此為黿潭能作魅行病於人吳有道士戴昞者乃以越章封埿偏投潭水中良久有大黿徑長丈久餘浮出不敢動乃格殺之而病人並愈又有小黿出羅列死於水渚甚多南康記曰梓潭山在雩都縣之東南六十九里其山有大梓樹吳王令都尉蕭武伐為龍舟艚斫成而牽引不動占云須童男女數十人為歌樂乃當得下依其言以童男女牽拽艚沒于潭中男女皆溺其後每天晴朗淨髣髴若見人船焉夜宿潭邊或聞歌唱之聲因號梓潭焉鄱陽記曰懷蛟水一名孝經潭在縣南二百步江中流石際有潭往往有蛟浮出時傷人焉每至五月五日鄉人於此江水以船競渡俗云為屈原攘災承前郡守縣綵以賞之刺史張栖遷貞以人之行莫大於孝縣孝經摽竿上賞之而人知勸俗號為蛟水或曰孝經潭湘州記曰益陽有昭潭其下無底湘洲最深處也或謂周昭王南征不復沒於此潭因以為名
