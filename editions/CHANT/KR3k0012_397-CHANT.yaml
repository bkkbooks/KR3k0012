body:
  text: 人事部三十七溺大戴禮曰武王踐祚曰盥盤之銘與其溺於水寧溺於人不可救禮記檀弓上曰死而不吊者三謂輕身忘孝畏人或時以非罪攻己不有以說之死之者孔子畏於匡是也壓行止危險之下溺不乘橋舡又緇衣曰子曰小人溺於水君子溺於口大人溺於人皆在其所褻也夫水近於人而溺人德易狎而難親也易以溺人左傳哀下曰越圍吳晉趙孟使楚隆問吳王王曰勾踐將生憂寡人寡人死之不得矣王曰溺人必笑吾將有問也史黯何以得為君子對曰黯也進不見惡退無謗言王曰宜哉東觀漢記曰鄧訓字平叔永平中治滹沱石曰河從都盧至羊腸倉欲令通漕太原吏民苦轉運所經三百八十九隘前後沒溺死者不可勝筭建初三年拜訓謁者使監領其事更用驢輦歲省億萬計活徒士數千人後漢書曰廉范西迎父喪至葭萌載舩觸石破沒范抱持棺柩遂俱沉溺眾傷其義鉤求得之僅免於死魏志曰管輅族兄孝國居在斥丘輅往從之與二客會客去後輅謂國曰此二人天庭及口耳之間同有凶氣累變俱起雙宅流魄于海骨歸于家少許時並當死也復數十日二人飲酒醉夜共載牛渴下道入漳河中皆即溺死也又曰帝幸許昌杜畿居守受詔作御樓舡於陶河試舡遇風沒帝為之流涕詔曰昔冥勤其官而水死稷勤百穀而山死故尚書僕射杜畿於孟津試舩遂至覆沒忠之至也朕甚愍焉追贈太僕謚曰戴侯吳錄曰孫策討黃祖表曰臣討黃祖斬首二萬餘級其赴水溺死二萬餘口舩六十餘艘財物山積唐書曰封德彝隋開皇末江南作亂內史令楊素往征之署為行軍記室泊舩海曲素夜召之德彝墜於水中人救免溺乃易衣以見竟寢不言素後知問其故荅曰私事也所以不白素甚嗟異之莊子曰至德者火弗能熱水弗能溺寒暑弗能禽獸弗能賊孟子曰淳于髡曰嫂溺則援之以手乎孟子曰嫂溺不援是豺狼也呂氏春秋曰洧水大有富人溺死有人得富者尸請贖而求金甚多富人黨以告鄧析曰但安之必無買此者得尸者患其不贖又告鄧析鄧析曰但安之必無人更賣又曰子路拯溺者其人拜之以牛子路受之孔子曰魯人必拯溺矣又曰荊人欲襲宋使人先表灌水灌水暴溢荊人不知循表而夜涉溺死者千有餘人淮南子曰與溺者金玉不如與之一尋常之纏又曰父溺則攬父髮而整之非敢憍侮以救死也說苑曰梁相死惠子欲之梁渡河而遽墮水中舩人救之曰居舩楫之間而溺無我則子死矣子何能相梁乎惠子曰居廣艘長楫之間則不如子至安國家全社稷子之比我蒙蒙如未視之駒曹毗神女杜蘭香傳曰神女姓杜字蘭香自云家昔在青草湖風溺大小盡沒香時年三歲西王母接而養之於崑崙之山於今千歲矣異苑曰蜀郡張貞行舡覆溺死貞婦黃因投江就之積十四日執夫手俱浮出又曰河內荀儒字君林乘冰省舅氏陷河而死兄倫求尸積日不得設祭冰側牋與河伯投牋一宿岸側冰開尸首執牋浮出倫又牋謝又曰頴川荀茂遠景平中至南康夜夢一人頭有一角為遠筮云君若至都必得官問是何職荅曰官生于林於是而寤未解所況因復寐又夢部伍至楊州水門墮水而死作棺既成遠入中自試恨小即見殯瘞葬渚次悵然驚以告母兄舩至水門果落江而殞喪儀一如其夢幽明錄曰蔡廓作豫章郡未發大兒始迎婦在渚次兒欲渡婦舡衣挂舡頭遂墮水即沒徐羨之作楊州登勑兩岸厚賞漁人及昆崙共尋覔至二更不得婦哀泣之間髣髴如夢聞聲告之曰吾今在卿舡下以告婢婢白之令水工沒覔果見坐在舡下初出水顏色如平生三輔決錄曰文帝竇后名猗清河觀津人也父遭秦之亂隱身漁釣墜淵而卒景帝即位后登尊號遣使者更填父所墜淵而筑起大墳觀津城南青山是也益部耆舊傳曰孝女叔光雄者犍為人也父泥和永建初為縣功曹乘舡墮水物故尸喪不歸號泣晝夜心不圖存所生男女二人並數歲雄乃各為囊盛珠環以繫兒數為訣別之辭家人每防閑之後稍懈因乘小舡於父墮處慟哭遂自投水死弟賢其夕夢雄告之卻後六日當共父同出至期伺之果與父相持江上郡縣表上為雄立碑圖像其形焉博物志曰澹臺子羽渡水子溺死將葬之滅明日此命也吾豈與螻蟻為親戚魚鼈為仇讎遂以葬之又曰南郡宜城王子山到太山從鮑子真學筭到魯賦靈光殿歸渡湘水溺死時年二十許其弟子玉親見之樂府解曰公無渡河朝鮮津卒霍里子高妻麗玉所作子高晨起剌舡有一白首狂夫被髮提壺亂流而渡其妻呼而止之乃遂溺死於是援箜篌而歌曰公無渡河相似春秋曆命序洛書曰人皇出於提地之日九男九兄弟相似別長九國家語曰孔子適鄭與弟子相失獨立東郭門或謂子貢曰東門有一人焉其形長九尺有六寸河目而隆顙其頭似堯其項似皋陶其肩似子產而腰已下不及禹三寸孔叢子曰萇弘語周文公曰吾觀仲尼有聖人之表其狀河目而隆顙是黃帝之形也脩肱而龜背其長九尺有六寸是成湯之容體也然言稱先王躬履謙讓洽聞強記博物不群抑亦聖人之興者也史記曰孔子既沒弟子思慕有若狀似孔子相與共立為師如夫子時又曰楚相孫叔敖臨死屬其子貧困往見優孟乃為叔敖衣冠振掌談語歲餘像叔敖王與左右不能別欲以為相優孟曰孫叔敖盡忠為楚令尹死其子負薪楚相不足為也王乃封敖子漢書曰夏陽人姓成名方遂居湖以卜筮為事有故太子舍人嘗從方遂卜謂曰子狀貌甚似衛太子方遂心利其言幾得以富貴即詐自稱詣闕廷尉建召鄉里識知者張宗祿等遂坐誣罔不道要斬東市又曰馮立字聖卿遷西河上郡守立居職公廉治行略與兄野王相似而多知有恩貸好為條教吏民嘉美野王與立相代為太守歌之曰大馮君小馮君兄弟繼踵相因循聰明賢智惠吏民政如魯衛德化鈞周公康叔猶二君漢獻帝春秋曰孝靈皇帝王美人生皇子協協生十餘日何皇后妒殺美人靈帝母永樂董太后攝養協號曰董侯董侯八歲能讀詩書魏志曰初高勾麗王生能開目視國人惡之及長果凶虐數寇鈔曾孫位生亦能開目視國人惡之勾麗呼相似為位以似其曾祖故名曰位晉書曰桓玄聞義軍起憂懼曰何無忌劉牢之外生酷似其舅共舉大事何慮不成又曰蜀人王富作亂郡縣討平之初諸葛孔明有盛德于蜀土子瞻又身死王事蜀人思之為瞻不死故將謂王富曰君狀貌甚似諸葛亮君因此思剋復以霸巴蜀晉中興書曰王允之字淵猷年在總角從伯敦知之謂為似己入則共寢檀道鸞晉陽秋曰初議以吳隱之為黃門郎而隱之皃似太宗上不忍見故攻焉齊書曰謝弘微性嚴正舉止必脩禮度時有蔡湛之者及見謝安兄弟謂人曰弘微皃類中郎而性似文靖梁書曰王筠字元禮琅琊人年十六為芍藥賦沈約曰王郎非唯額似袁公見人輒矜王郎見人必悞笑唯此條不能酷似耳袁粲即筠外祖也唐書曰王孝傑雍州新豐人高宗末西討吐蕃戰於大非川為賊所獲吐蕃贊普見孝傑垂泣曰貌類吾父厚加敬禮孟子曰昔者孔子夏子歿子夏子游子張以有若似聖人欲以所事孔子事之強曾子曾子曰不可江漢以濯之秋陽以暴之皜皜乎不可尚已劉昭幼童傳曰漢孝昭帝諱弗陵武帝少子也年五六歲壯大武帝云類我甚奇之江表傳曰孫皓夫人死皓哀愍葬於苑中皓治喪於內半年不出國人見葬太奢麗皆謂皓已死所葬者是也皓舅子何都顏狀似皓云都代立也孔融別傳曰融為太中大夫虎賁士皃似蔡邕每酒酣輒引與同坐曰雖無老成人尚有典刑續搜神記曰吳興施續為吳尋陽督能言論有門生亦有意理常秉無鬼論門生後渡江忽有一單衣白帢客來因共言語遂及鬼神客辭屈乃語曰僕便是鬼何以云無受使來取君門生請乞酸苦鬼問有似君者不云施續下都督與僕相似鬼許之便與俱歸與都督對坐鬼手中出一鐵鑿可長尺餘正自打之放鑿便去顧語門生慎勿道俄而都督云頭痛還所住至食時便亡說苑曰孔子之匡簡子將殺陽虎孔子似之甲士以圍孔子之舍子路怒奮戟將下斗孔子止之曰夫歌予和汝子路歌孔子和之三終而甲罷風俗通曰陳國張伯喈弟仲喈婦炊於灶下至井上謂喈曰我今日粧好不伯喈曰我伯喈也婦大慚愧其夕時伯喈到更衣婦復逐牽其背曰今旦大誤謂伯喈為卿荅曰我故伯喈也蓋親密無過夫婦然尚如此況於初未相見而責先識之乎世說曰桓豹奴是王混外生形似舅桓甚諱之宣武云不恒似時似耳恒似則形時似是神桓愈不悅又曰魏黃初末吳人發長沙王吳芮冢容皃如故吳卒發者見淮南吳綱曰君何類長沙王綱曰先祖也去綱近五百年語林曰張衡死蔡邕母始懷孕此二子才皃甚相類時人云邕是衡之後身又曰桓溫自以雄姿風氣是司馬宣王劉越石一輩器有以叱王大將軍者意大不平征符健還於北方得一巧作老婢乃是劉越石妓女一見溫入潸然而泣溫問其故荅曰官家甚似劉司空溫大悅即出外脩整衣冠又入呼問我何處似司空婢荅曰眼甚似恨小面甚似恨薄鬚甚似恨赤形甚似恨短聲甚似恨雌宣武於是弛冠解帶不覺惛然而睡不怡者數日偶像說文曰偶人也尚書說命曰高宗夢得說使百工營求諸野得諸傅巖王庸作書以誥曰以台正于四方台恐德弗類茲故弗言恭默思道夢帝賴予良弼其代予言乃審厥像俾以形旁求于天下孔安國注曰審所夢之人刻其形像以旁求之旅於民間說築傅巖之野惟肖傅氏之巖在虞䝞之界肖似所夢之形也史記曰孟嘗君將入秦賓客諫不聽蘇代謂曰今旦代從外來見木偶人與土偶人相與語木偶人曰天雨子將敗矣土偶人曰我生於土敗即歸土今天雨流子而行未知所止息也今秦虎狼國也而君欲往如有不得還無乃為土偶人所笑乎孟常君乃止國語曰越滅吳范蠡乘輕舟而浮於五湖莫知其終極越王命工以良金寫范蠡之狀朝禮之環會稽三百里以為范蠡地春秋後語曰秦欲攻安邑恐齊救之則以宋委於齊曰宋王無道為木人以像寡人射其面寡人地絕兵遠不能攻也王茍能破宋有之寡人如自得之戰國策曰孟嘗君將入秦蘇秦謂曰今臣經緇上有土偶人與桃梗人相與語桃梗謂土偶人曰子西岸土也八月雨降淄水至則子殘矣曰吾殘則復西岸子東園梗也刻削為人淄水至而去漂然將何所之矣孟嘗乃止漢書曰匈奴畏郅都之威刻木像都之狀交弓射之莫能中魏志曰鮑信與太祖擊黃巾信乃鬭死太祖購求信喪不得乃刻木如信形祭而哭之魏略曰時苗字德胄鉅鹿人少清白為人疾惡出為壽春令令行風靡楊州治在其縣時蔣濟為治中苗以初至任欲謁濟濟素好酒適會其醉不能見苗苗怨恨還刻木為人署曰酒徒蔣濟立之於壇旦夕射之江表傳曰孫權使朱雋往喻關羽令降羽乃作像人於城上而潛遁又曰孫皓以張布女為美人棒殺之後思其顏色使工巧刻作美人形恒置坐側隋書曰柳誓字顧言本河東人也拜祕書監封漢南縣公帝退朝之後命入閣言宴諷讀終日而罷恩若朋友帝猶恨不能夜召於是命匠刻木偶人施機關能坐起拜伏似於誓帝每在月下對酒輒令宮人運之於坐與相酬酢而為歡笑唐書曰丘行恭從太宗討王世充會戰於邙山之上太宗與諸騎相失唯行恭獨從尋有騎數人追及太宗矢中御馬行恭乃廻騎射之賊不敢復前然後下馬拔箭以其所乘馬進太宗貞觀中有詔刻石為人馬以像行恭拔箭之狀立於昭陵闕前又曰侯君集滅高昌國拜麴智盛為左武衛將軍及太宗崩刊石像智盛之形列於昭陵玄闕之下又曰天寶中天下州郡皆鑄銅為玄宗真容擬佛像之制又曰天寶五年於太清宮刻石為李林甫陳希烈像侍於聖容之側孝子傳曰丁蘭早孤不識其母乃刻木作母而事之車頻秦書曰姚萇為符堅神像戰求有利軍中士眾出入並驚恐皆云畏符主像萇嚴鼓斬之以首送符登抱朴子曰張華作博物志曰黃帝仙去其臣左徹者削木為黃帝像帥諸侯奉之亦見汲冢書
