body:
  text: 皇親部十五太子四唐書曰廢太子瑛音英玄宗第二子也景雲元年封真定郡王開元三年立為皇太子母趙麗妃本伎人有才貌善歌舞玄宗在潞州得幸及武惠妃寵幸麗妃恩乃漸弛惠妃女咸宜公主出降於楊洄洄希惠妃之旨規利於己日求其短譖於惠妃惠妃泣訴於玄宗以太子結黨將害於妾母子亦指斥於至尊玄宗惑其言震怒謀於宰相意將廢黜中書令張九齡奏曰陛下纂嗣鴻業將三十年太子已下常不離深宮日受聖訓今天下之人皆慶陛下享國日久子孫蕃育不聞有過陛下奈何以一日之間廢棄三子且太子國本難於動搖昔晉獻公惑寵嬖之言太子申生憂死國乃大亂漢武威加六合受江充巫蠱之事禍及太子遂至城中流血晉惠帝有賢子為太子容賈后之譖以至喪亡隋文帝取寵婦之言廢太子勇而立晉王廣遂失天下由此而論之不可不慎今太子既長無過二王又賢臣待罪左右敢不詳悉玄宗默然事且寢二十五年四月楊洄又構於惠妃言瑛兄弟三人與太子妃兄駙馬薛鏽常構異謀玄宗遽召宰相籌之李林甫曰此蓋陛下家事臣下不合參知玄宗意乃決矣使中官宣詔於宮中並廢為庶人天下之人不見其過咸惜之寶應元年詔贈皇太子又曰靖恭太子琬玄宗第六子也天寶十四年安祿山反於范陽其月制以琬為征討元帥高仙芝為副令仙芝徵河隴兵募屯於陜郡以禦之數日琬薨素有雅稱風格秀整時士庶冀琬有所成功忽然殂謝遠近咸失望焉贈靖恭太子葬於西原又曰承天皇帝倓音談既為張良娣所構肅宗怒而幽死又欲搖動代宗時代宗收復兩京遣判官李泌音秘入朝獻捷從容語及倓事泌曰臣幼稺時念得黃臺苽辭陛下聞其說乎高宗大帝有子八人天后所生四子自為行第故睿宗第四長曰孝敬皇帝弘為太子監國仁明孝悌天后方圖臨朝乃鴆殺之立雍王賢每自憂惕知必不保全與二弟同侍父母之側無由敢言乃作黃臺苽辭令樂工歌之冀天后聞之哀愍辭曰種苽黃臺下苽熟子離離一摘使苽好再摘令苽稀三摘尚自可摘絕抱蔓歸太子賢終為天后所逐死於黔中陛下有今日運祚已一摘矣慎無再摘上愕然曰卿安得有是言自是奪宗之計不行又曰憲宗章武皇帝順宗長子母王太后六七歲時德宗抱置膝上問曰汝誰子在吾懷對曰是第三個天子德宗異而怜之貞元四年封廣陵王順宗即位之年封冊為皇太子又曰懿宗恭惠皇帝宣宗長子母曰元昭皇太后晁氏大和七年生於藩邸封鄆王大中十三年宣遺詔立為皇太子姿貌瑰傑有異稠人藩邸時當重疾郭妃侍毉見黃龍出入於臥內妃以告帝曰慎勿言又曰僖宗恭定皇帝懿宗第五子母曰惠安皇后王氏初封普王懿宗大漸制曰朕守大器之重居兆人之上日慎一日如履如臨旰昊勞懷寢興思治涉道猶淺道化未孚而攝養乖方寒暑成厲實有慮於闕政且無暇而怡神考茲舊章謀于卿士思闡鴻業式建皇儲第五男普王孝敬溫恭寬和愽厚日新令德天假英姿言皆中規動必由禮俾崇邦本允叶人心宜立為皇太子權勾當軍國政事咨爾中外卿士暨于腹心之臣各竭乃心永安黎獻太弟王隱晉書曰惠帝永寧二年立清河王覃為太子成都河間王復廢覃為清河王立成都為皇太弟晉陽秋曰永興元年河間王顒表拜成都王穎為皇太弟司空越高密王簡平昌公模等以大駕北征廢皇太弟穎立預章王熾為皇太弟崔鴻十六國春秋曰晉成都王穎為皇太弟領丞相自鄴懸秉朝政事無大小皆先關諮唐書曰武宗肅皇帝穆宗第五子母曰宣懿皇后韋氏長慶元年封穎王開成五年文宗疾兩軍中尉仇士良魚志弘矯詔迎穎王於十六宅曰朕自嬰疾疹有加無瘳懼不能躬總萬機日釐庶政稽于古訓謀及大臣用建親賢以貳神器親弟穎王湹音鄽昔在藩邸與朕嘗同師訓動成儀矩性稟寬仁俾奉昌圖必諧人欲可立為皇太弟應軍國政事便令句當百辟卿士宜竭迺心又曰昭宗景文皇帝懿宗第七子母曰惠安太后王氏帝於僖宗母弟也尤相親睦自艱難播越嘗隨侍左右僖宗不豫遺詔立為皇太弟太孫王隱晉書曰趙王倫既廢賈后皇帝使使持節追復皇太子拜皇孫臧為臨淮王尚為襄陽王又詔立臧為皇太孫文武官屬即轉為太孫官屬車服侍從皆愍懷之舊也趙王倫篡位太孫廢為濮陽王薨惠帝復作立襄陽王尚為皇太孫薨謚冲皇太孫并追謚前太孫為哀皇太孫晉惠帝起居注曰拜皇孫臧為臨淮王尚為襄陽王又詔臧為皇太孫臧廢到銅駞街宮人嚴從皆哽咽路人收淚焉桑復生於西廂長丈餘太孫廢乃枯又曰惠帝詔以太常成粲為太孫太傅前城閭校尉梁柳為太孫少傅又曰惠帝使使持節兼司空任城王濟策命愍懷皇太子前妃為皇太孫太妃是日也以復妃告于太廟後魏書曰高宗文成皇帝景穆帝之長子也母曰閻氏帝少聰達太武常置左右號世嫡皇孫又曰劉尼代人也父祖皆為方面大人少壯健有膂力世祖善之拜羽林中郎宗愛既殺南安王余於東廟秘之唯尼知之尼勸愛立高宗愛自以負罪於景穆聞而驚曰君大癡人皇孫若立豈忘正平時事乎尼以狀告殿中尚書源賀仍謀於南部尚書陸麗麗曰唯有密奉皇孫耳於是賀與長孫渴侯嚴兵守衛尼與麗迎高宗於苑中麗抱高祖馬上入於京城尼馳還東廟大呼曰宗愛殺南安王大逆不道皇孫已登大位有詔宿衛之士皆可還宮眾咸唱萬歲後周書曰建德二年夏六月壬子皇孫衍生文武官普加一陛蕭子顯齊書曰文惠太子長懋音戊字雲喬世祖長子也世祖年未弱冠而生太子為太祖所愛建元元年封南郡王邑二千戶江左未有嫡皇孫封王始自此也又曰鬱林王昭業字元尚文惠太子長子也小名法身文惠太子薨立昭業為皇太孫居東宮昭業少美容止好餘書世祖勑皇孫手書不得妄出以貴重之唐書貞觀十七年誕皇太孫宴宮寮於弘教門太宗幸東宮自殿北門入謂宮臣曰頃來生業稍可非乏酒食而唐突公等宴會朕有甲觀之慶故就卿為樂耳謂太子曰爾國之儲二府藏是同金玉綺羅不足為賜但先聖典籍可為鏡誡耳因賜尚書毛詩孝經各一部又曰永淳元年立皇孫重照為皇太孫將置府寮上召吏部侍郎裴敬彝郎中王方慶問曰今立太孫前代故事如何方慶進曰臣按周禮有嫡孫漢魏已來皇太子在亦不立太孫但封王耳今陛下肇建皇孫創斯盛典所以彰子孫千億之盛福祚靈長之應也上悅太子妃白虎通云妃者匹也妃匹者何謂也相與偶然古者天子後宮嫡庶皆曰妃史記曰黃帝有四妃帝嚳有四妃虞舜有二妃周以天子之正嫡為王后秦稱皇帝因稱皇后以太子之正嫡稱妃漢因之漢書外戚傳云太子妃有良娣有孺子妻妾凡三等是也魏晉以後咸遵之漢書曰孝景薄皇后孝文薄太后家女也景帝為太子時薄太后取以為太子妃帝即位立為皇后又曰孝武陳皇后長公主嫖疋妙切女也初武帝得立為太子長主有力取主女為妃及帝即位立為皇后又曰元帝為太子司馬良娣死後太子悲恚發病忽忽不樂宣帝令皇后擇後宮家人子可以娛侍太子者王禁女政君預焉時預擇者五人政君獨衣絳緣諸于諸于大掖衣也使侍中杜輔送入太子宮見於丙殿待御幸有身立為太子妃又曰孝成許皇后平恩侯嘉女也元帝選配皇太子初入太子家上令中常侍黃門親近者侍送還白太子欣說狀元帝喜謂左右酌酒賀我左右皆稱萬歲及成帝即位立許妃為皇后又曰孝哀帝傅皇后定陶傅太后從弟子也哀帝為定陶王時傅太后欲重親取以配王王入為太子傅氏女為妃哀帝即位立為皇后後漢書曰明德馬皇后伏波將軍援小女也初授征五溪蠻卒於師虎賁中郎將梁松黃門侍郎竇氏等因譖之由是家益失勢又數為權貴所侵侮后從兄嚴不勝憂憤白太夫人絕竇氏婚求進女掖庭乃上書曰臣叔父援辜恩不報而妻子特獲恩全戴仰陛下為天為父竊聞太子諸王妃疋未備援有三女大考十五次者十四小者十三儀狀髮膚上中以上皆孝順小心婉順有禮願下相工簡其可否如有萬一援不朽於黃泉由是選后入太子宮時年十三吳志曰太子孫和賜死和與妃張部別張曰吉凶當相隨終不獨生活也亦自殺蜀志曰後主敬哀皇后車騎將軍張飛女也章武元年納為太子妃建興元年立為皇后王隱晉書曰楊元后武帝娶之生惠帝謀婚久不決上欲娶衛瓘女后欲娶賈充女充妻郭酷妬宿著上曰衛公女有五可賈公女有五不可衛家種賢而多子端正而長白賈家種妬少子酷而短黑郭必欲使所生女配太子既先使人言又輸寶物於楊后固啟必成本當娶后妹午午年十二小太子一歲定見短小未勝衣更娶南風南風時年十五大太子二歲上乃聽之帝知太子不惠又聞衛瓘言故試之盡召東宮大小官屬為作飲食而密封詔事使太子決停信待之賈妃大懼請外人作荅詔草給使張泓行還啟賈妃曰太子不學而荅詔引義必致責作草主更益譴負不如直以意荅賈妃大喜語泓便為我好荅得富貴與汝共之泓素有才荅之高過武帝大喜於是賈妃諷旨於外說張泓孝廉郎才語領軍舉高弟充遣語女曰衛瓘老奴幾破汝家事於是賈妃銜之又曰賈妃酷妬手斫數人或以戟擿音擲孕妾子乃隨刃墮地上聞大怒垂廢之荀勗深救之故得不廢晉氏后妃別傳曰武悼皇后武帝繼室也太傅楊駿女賈庶人為太子妃時數以肆情性忌妬失帝意帝欲廢焉后為妃陳請曰魯公有勳於王府妃親則其子妬忌婦人之常事不足以一眚而忘大德帝納焉王隱晉書曰初世祖遣才人謝玖給事惠帝因是有娠臨娶賈妃迎玖西宮遂生愍懷太子惠帝即位立為皇太子為娉王夷甫小女惠風賈后暴戾日甚乃表乞免為庶人送太子妃王氏入金墉城妃父尚書令王衍見脅表離婚妃出金墉城號哭感動左右道路為之悲愴也又曰劉曜王彌等入洛盡將諸后妃去愍懷太子王妃拔刀向賊曰我司徒公女皇太子妃死則已終不為賊婦賊乃害之晉起居注曰元帝太興五年上臨軒使策命拜晉王太子妃庾氏為皇太子妃晉孝武帝起居注曰納采聘太子妃百官朱服會於新安公主第秘書監王操之為主人晉孝武帝起居注曰上臨軒設懸而不樂遣兼司空望蔡公謝琰納太子妃王氏詔曰太子諱婚禮即就仰祖宗遺烈憑道德之資保傅將翼賢士竭誠慎行修德積善慶隆豈唯在予天齎錫所以宣其悅情其便依蒨有賜左僕射王珣奏賜文武絹布百官詣止車門上禮甲辰儀曰皇太子妃公妃夫人逢持節使者高車使者皆住車相揖妃主皆住車不揖東宮舊事曰司徒會稽王道子等啟曰皇太子係體宸極年德並茂宜簡國媛緝宣內教故中書令太常王獻之新安公主息女六行聿修四德光備加世載簡正慶深積善僉曰宜作配儲宮正位中饋太元二十一年皇太子納妃琅邪臨沂王氏時年十四王隱晉書曰安僖皇后王氏字神受太常王獻之女新安公主生即安帝姑也孝武帝以后少孤無兄弟故為安帝納為太子妃東宮舊事曰有詔以皇太子納妃賜帛各有差使持節兼司空公尚書右僕射謝琰副護軍將軍臨湘縣侯車胤迎詹事尚書左僕射王徇率東宮屬迎于主第東宮舊事曰皇太子納妃織成衮帶白玉佩四望車羽葆前後部鼓吹各一部步搖一具九鈿函盛之同心雀鈿一具函盛鬢花六五支登花二五支團樹花十株碧紗座袿半繡一丹羅杯文長命綺䙱一䙱音屬袴別名又曰太子納妃絳真文羅一幅被子一絳羅繡四幅被一又曰皇太子納妃有絳真文羅袴漆龍頭支髻枕一銀花鐶釰自副金塗連盤鴨燈一絳地文履一量漆花簏一絳地織成綺緩有七綵杯文綺一絳石杯文綺被有一又七綵杯文綺袴長命杯文綺袴晉令曰皇太子妃珮瑜玉沈約宋書曰皇太子妃金璽龜鈕纁朱緩佩瑜玉又曰少帝司馬皇后諱茂英河內溫人晉恭帝女也初封海鹽公主少帝以公子尚焉宋初拜皇太子妃少帝即位為皇后又曰前廢帝何皇后諱令婉廬江灊人也孝建三年納為皇太子妃又曰後廢帝江皇后諱簡珪濟陽考城人北中郎長史智淵孫女太始五年太宗訪太子妃而雅信小數名家女多不合江氏雖世為華族而后父祖並已亡弟又弱小門無強蔭以卜筮最吉拜為皇太子妃蕭子顯齊書曰皇太子妃厭翟車如重翟車飾微減漆畫輪車太子妃亦乘之又曰文安王皇后諱寶明琅耶臨沂人建元元年為南郡王妃四年為皇太子妃無寵太子為宮人制新麗衣裳及首飾而后床帳陳古舊釵錜奴叶切小釵也十餘枚唐書曰太宗文德皇后長孫氏少好讀書造次必循禮則十三嬪于太宗武德九年冊拜皇太子妃又曰高宗廢后王氏同安長公主即后之從祖母也公主以后有美色遂納為晉王妃高宗登儲冊為皇太子妃又曰開元中勑所選皇太子及諸王等妃既是百官子女禮合避人今追就本縣及過本司未為得所其應預妃者宜令所司具名錄奏各令女及近親隨使於命婦朝堂待進止良娣漢書曰衛太子史良娣宣帝妃祖母也太子有妻妾凡三等子皆稱皇孫史良娣家本魯國母貞君兄恭元鼎四年入為良娣生男進號史皇孫武帝末巫蠱事起衛太子及良娣史皇孫皆遭害沈約宋書曰大明五年上更為太子置內職二等曰保林曰良娣納南中郎長史太山羊贍女為良娣蕭子顯齊書曰建元三年太子宮置三內職良娣比開國侯唐書肅宗張皇后天寶中選入太子宮為良娣唐書曰順宗莊憲皇后王氏幼以良家子入宮為才人順宗在藩邸時代宗以才人賜之生憲宗皇帝立為孺人順宗升儲冊為良娣孺子後魏史曰劉芳沉雅方正太子恂之在東宮高祖欲為納芳女芳辭以年貌非宜更勑芳舉其宗女芳乃稱其族子長文之女高祖乃為恂娉之與鄭懿女對為左右孺子焉保林王隱晉書曰愍懷太子廢為庶人考竟太子母淑妃謝玖及太子所幸保林蔣俊及母三弟沈約宋書曰大明五年上為太子納宜都守袁僧惠女為保林蕭子顯齊書曰太子保林比五等侯才人王隱晉書曰世祖遣才人謝玖給事惠帝因是有娠臨娶賈妃迎玖西宮遂生愍懷蕭子顯齊書曰太子才人比附馬都尉家人子漢書曰史皇孫王夫人宣帝母也名翁須皇孫妻妾無號位皆稱家人子生宣帝數月衛太子史皇孫敗家人子皆坐誅
