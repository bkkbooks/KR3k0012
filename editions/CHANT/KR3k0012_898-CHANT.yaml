body:
  text: 獸部九馬五古今注曰秦始皇有七名馬一曰追風二曰逐兔三曰躡影四曰追電五曰飛翮六曰銅雀七曰晨鳧崔豹古今注曰曹真有駃馬名為驚帆言其馳驟如烈風之舉帆也風俗通曰馬一疋俗說馬比君子與人相疋或曰馬夜行目明照前四丈故曰一疋或說度馬從橫適得一疋或說馬死賣得一疋帛或云春秋左氏說諸侯相贈乘馬束帛束帛為疋與馬之相匹耳又曰疲馬不能度繩俗說馬之疲羸不能復度繩索言其極也或云不能度畦塍也謹按齊有繩水裁三四步馬疲不能度此水耳又曰殺君馬者路傍兒也語云長吏食重祿芻藁豐美馬肥希出路傍小兒觀之卻驚致死按長吏馬肥觀者快馬之走驟也騎者驅馳不足至於瘠死金樓子曰鳥與鳥遇則相躅獸與獸遇則相觸馬與馬遇則趹蹄相傷天之生此物多其力而少其智也傅子曰九日養親一日飾物之寧可言飽飽多飽少同為孝子穀馬一日餓之馬肥不損於義無傷非可同之夏侯子曰一舟之覆無一毫不濕一馬之走無一毛不動故大同萬物不一也又曰魯人有善相馬者與余俱遊夜方寐聞馬有行者魯人驚曰七百里也吾恐此暗中耳符子曰齊景公好馬命畫工圖而訪之殫百乘之價朞年而不得像過實也今使愛賢之君考古籍以求其人雖期百年不可得也又曰吾與玄子觀東海釋駟而升乎𡺁山未中路而忘馬符子使人求之不獲使鬼索之而獲符子曰六合不可忘故知良馬在其中矣請以六合之觀觀之也鄒子曰董仲舒三年不闚園圃乘馬不知牝牡諸葛教曰昔孫叔敖乘馬三年不知牝牡稱其賢也常璩華陽國志曰神馬四疋出滇音顛池河中三國典略曰神馬者河之精也代馬陰之精也西京雜記曰文帝自代還有良馬九疋皆天下駿足也名曰浮雲赤電絕群逸驃紫鷰騮綠螭驄龍子驎駒絕塵號為九逸又曰衛將軍生子或有獻騧馬者乃命其子為騧字叔馬東方朔傳曰驃騎難諸愽士朔對曰騏驎綠耳蜚鴻華騮天下良馬也將以捕鼠於深宮之中曾不如跛貓神異經曰西南大宛有馬其大二丈髯至𣍿尾委地蹄如升踠可握日行千里至日中而汗血乘者當以絮纏頭以避風病其國人不纏揚子法言曰或問治己曰治己以仲尼問治己何用益以用孔子之道或曰治己以仲尼奚寡矣言學孔子道多而成者何少也曰率馬以驥不亦可乎又曰希驥之馬亦驥之乘也希顏之人亦顏之徒也桓譚新論曰顏淵所以命短者慕孔子所以傷其年也若庸馬良馬相追至暮共列宿所良馬鳴食如故庸馬垂頭不復食何異顏淵與孔丘優劣又曰衛后園有送葬時乘輿馬十疋吏卒養視善飲不能乘而馬皆六十歲乃死又曰薛翁者長安善相馬者也於邊郡求得駿馬騎以入市去來人不見也後勞問之因請觀馬翁曰諸卿無目不足示也論衡曰儒書稱孔子與顏淵俱登魯東山望吳昌門謂曰爾何見曰見一疋練前有生藍孔子曰噫此白馬盧芻使人視之果然王子年拾遺記曰周穆王即位巡行天下馭八龍之駿名曰絕地翻羽奔霄越影踰暉超光勝霧挾翼又曰曹洪與魏武帝所乘之馬名曰白鶴時人諺曰憑空虛躍曹家白鶴洞冥記曰修彌國有馬如龍勝虛逐日兩足倚行或藏形於空中唯聞聲耳時得天馬汗血是其類也又曰畢勒國有小馬如駒日行千里毛垂至地東王公常騎此馬朝發湯泉夕飲虞淵一日一夕往返七八度亦言馬毛長於空中自放則吹之或東或西也又曰東方朔遊吉雲之地越扶桑之東得袖馬一疋高九尺股裏有旋毛如日月之狀如月者夜光如日者晝光毛色隨四時之變漢朝之馬見之即垂頭振毛一國眾獸見皆避之帝問東方朔是何獸也朔曰昔西王母乘靈光之輦以適東王公之舍稅此馬於芝田及食芝草王公怒棄馬於清津天岸臣至王公之壇因騎而返繞日三匝此馬入漢關關猶未掩臣於馬上睡眠不覺遂至帝曰其馬名云何朔曰因事為名則步景抱朴子曰韓子治嘗以地黃甘草哺五十歲老馬以生三駒又百三十歲乃死又曰李南乘赤馬行道逢他人乘白馬者白馬先鳴而南赤馬鳴應之南謂從者曰彼馬言汝今當見一黃馬左目盲者是吾子可為告使駛行相及從者不信行二里所果逢黃而左目盲南之馬先鳴而盲馬應之問其主果向白馬子也論衡曰廣漢翁偉能聽鳥獸之音乘蹇馬之野而田間有放馬者相去數里鳴聲相聞翁偉謂其御曰彼放馬目眇其御曰何以知之曰罵此轅中馬蹇馬蹇馬亦罵之曰眇馬衘者不信使往視之馬目果眇鹽鐵論曰騏驥負鹽車垂頭於太行之坂屠者持刀睨之又曰古者諸侯不秣馬天子有命以車就牧庶人之乘馬者足以代勞而已故行則服軛止則就犁一馬服櫪當中家六口之食孔融論曰馬之駿者名曰騏驥犬之駿者名曰韓盧犬之有韓盧馬之有騏驥人之聖也名號等設使騏驥與韓盧並走寧能頭尾相當八腳如一無有先後之覺矣英雄記曰公孫瓚每聞邊警輒厲色作氣如赴讎常乘白馬又白馬數十疋選騎射之士號為白馬義從以為左右翼胡甚畏之相告曰當避白馬長史曹瞞傳曰呂布有駿馬名赤兔常騎乘之時人為之語曰人中有呂布馬中有赤兔袁淮正書曰牛馬之為人駕乘者非樂負千鈞之重行千里之險鞭策痛矣桓公世論曰朝鮮之馬被鬣踶齧能使其成騏驥者習之故也愽物志曰穢貊國南與辰韓北與句麗沃沮接東窮大海海中出班魚皮陸出文豹又出果下馬高三尺漢時獻之駕輦車正始六年樂浪太守劉茂帶方太守弓遵領東穢屬勾麗伐之舉邑降愽物志曰唐公有驌驦項羽有騅馬華陽國志曰元馬日行千里死於蜀今元馬冢是也縣有元馬祠馬牧山下或產駿駒元馬子也長沙耆舊傳曰虞芝州命部南陽從事太守張忠連姻王室罪名入重芝依法執按㓨史畏勢召芝芝曰年往志盡譬如八百錢馬死生同價且欲立效於明時耳遂投傳去三輔決錄曰安陵有項仲山飲馬渭水先投三錢襄陽記曰中盧山西去襄陽一百三里有一地道漢時嘗有數疋白馬出其中遂名其地為白馬穴陸遜攻襄陽又值此穴中數十疋馬出戰還建鄴蜀使有五部兵家滇音顛池者識其馬色云是己亡父所乘對之流涕世語曰劉備屯樊城劉表禮焉憚其為人不甚信用曾諸宴會荊越蔡瑁欲因會取備備覺之偽如廁潛遁出行所乘馬名為的顱騎的顱走墮襄陽城西檀溪水中溺不得出備急曰的顱今日厄可不努力的顱乃一踴三丈遂得過異苑曰符堅為慕容冲所襲堅馳馬墮澗追兵幾及計無由出馬即踟躊臨澗垂控與堅堅不能及馬又跪而授焉堅攀之得登岸西走廬江七賢傳曰陳眾辟州從事楊州部有賊擊之多死眾請取之因單車乘白馬往賊束身歸降遂生為立祠號曰白馬從事竹林七賢論曰王戎簡脫不持儀形好乘巴𩥄馬雖為三司率爾私行巡省園田不從一人以手巾插腰戎故吏多至大官相逢戎輒下道避之搜神記曰昔秦人築城於武州塞內以備胡城將成而崩者數焉有馬馳走周旋反覆父老異之因依以築之為城乃定遂名為馬邑又曰吳先主殺武衛兵錢小小刑見大街顧借賃人吳永使永送書與桁南廟借木馬二疋以酒噀之皆成好馬鞍勒全耳志怪集曰孫弘常自云見鬼神與其言語委曲眾未之信鎮西將軍謝尚常所乘馬忽暴死會弘詣尚尚愛惜至甚弘謂尚曰我為公活馬何如尚常不信弘荅曰卿若能令此馬更生者卿真實通神矣弘於是便下床去良久還語尚曰廟神愛樂君馬故耳向我詣神請之初殊不許後乃見聽馬即便活尚時對死馬意甚不信怪其所言須臾其馬忽從門外走還眾咸見之莫不驚惋既至馬屍應時能動有頃奮迅呼鳴尚於是歎息述異記曰東平畢眾寶家在彭城有一驄馬甚快常乘出入至所愛惜宋大明六年眾寶夜夢見其亡兄眾慶曰吾有戎役方置艱危而無得快馬汝可以驄馬見與眾寶許諾既覺呼同宿客說所夢始畢仍聞馬倒聲遣人視之裁餘氣息狀如中惡眾寶心知其故為試治療向晨馬死眾寶還臥如欲眠聞眾慶語云向聊求馬汝治護備至將不惜之今以相還別更覔也至曉馬活食時復常續搜神記曰趙固常乘一疋赤馬以征戰甚所愛重常所繫看齋前忽腹脹少時死郭璞從北過因往詣之門吏云將軍馬今死甚愛惜今盛懊惋景純使語門吏云入通道吾能活此馬則必見我門吏聞驚喜即啟固固踊躍令門吏走迎之始交寒溫便問卿能活我馬不璞曰馬可活耳固忻喜即問須何方術璞云得卿同心健兒二三十人皆令持長竹竿於此東行三十里當有丘陵林樹狀若社廟有此者便以竿攪擾打拍之當得一物便急持歸既得此物馬便活矣於是命左右驍勇之士五十人使去果如璞言得大藂林有一物似猴而非走出人共逐得便抱持歸入門此物遙見死馬便跳梁欲往璞令放之此物便自走往馬頭間噓吸其鼻良久馬即起噴鼻奮迅鳴喚便不復見此物固厚資給璞得過江靈鬼志曰陳安為河間王顒給使甚壯健常樂一馬駿駃非常後馬死雙赤蛇出其鼻列異記曰胡司隸校尉上黨鮑子都少時舉上計於道遇一書生卒得心痛子都下車為按摩奄忽不知姓字有素書一卷銀十餅即賣一餅以資殯殮其餘以枕之素書著腹上埋之謂曰子若魂靈有知當令子家知子在此未至京師有驄馬隨之唯子都得近子都歸行失道遇一關內侯家住宿侯問曰君何以致此馬子都因說之侯乃驚愕曰此吾兒也侯迎喪開棺視銀書如言侯乃舉送詣闕上薦子都辟公府侍御史豫州牧司隸校尉至子永孫昱俱為司隸其在公皆復乘驄馬故京師歌之曰鮑氏驄三入司隸再入公馬雖瘦行步工傅玄乘輿馬賦曰往日劉備之初降也太祖賜之駿馬使自至廄選之歷名馬以百數莫可意者次至下廄有的顱馬委棄莫視瘦悴骨立劉備撫而取之眾莫不笑之馬超破蘇氏塢塢中有駿馬百餘疋自超已下俱爭取肥好者而將軍龐恩獨取一騧馬形觀既醜眾亦笑之其後劉備奔於荊州馬超戰於渭南逸足電發追不可逮眾乃服焉傅玄馳射馬賦曰耳小易使鼻大勢怒來往若鷹鷂超騰如逸虎劉琬馬賦曰吾有駿馬名曰騏雄龍頭鳥目麟腹虎胸尾如雲彗耳如插筒
