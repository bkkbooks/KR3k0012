body:
  text: 禮儀部八五祀禮記祭法曰王為群姓立七祀曰司命曰中霤曰國門曰國行曰太厲曰戶曰竈諸侯為國立五祀曰司命曰中霤曰國門曰國行曰公厲大夫立三祀曰族厲曰門曰行適士立二祀曰門曰行庶人立一祀或立戶或立竈鄭玄注曰五祀門戶中霤也此皆小神居人之問司察小神也又月令曰孟春其祀戶孟夏其祀竈季夏其祀中霤孟秋其祀門孟冬其祀行餘吉吉禮門白虎通曰何謂五祀者門戶竈井中霤也又曰曲禮下記云天子祭天地四方山川五祀歲遍諸侯方伯祀山川祭五祀歲遍士祭其先凡祀有廢之莫敢舉也有舉之莫敢廢也非所當祭而祭之名為淫祀無福祭五祀所以歲遍何慎五行也五經異義曰大戴說禮器云竈者老婦之祭許君按月令孟夏之月其祀竈五祀之神王者所祭非老婦也鄭玄曰竈神祝融是老婦又曰王為群姓立七祀一曰司命主督察人命也二曰中霤王宮室居處也三曰門四曰戶主出入五曰國行主道路也六曰大厲主殺也七曰竈主飲食也漢書議曰祠五祀謂五行金木水火土也木正曰勾芒火正曰祝融金正曰蓐收水正曰玄冥土正曰後土皆古賢能治成五行有功者也主其神祀之魏名臣奏曰秦靜議云祭法七祀有國行今月令謂行為井是以俗廢行而祀井武帝始定天下興復舊祀造祭祀門戶井竈中霤文帝稱詔靜按凡諸祠祀所以尊敬神靈不宜稱詔高堂隆議曰國中霤門井竈多不遍唯祀在者故曰祭五祀在於廟今每門戶輒祭之自漢以來非舊典也祭井自漢從水類不列五祀宜除井祀行世本曰徵作禓五祀徵者殷王八世孫也禓者強死男也謂時難索宣驅疫逐強死鬼也五者謂門戶及井竈中霤也傅玄五祀議曰禮大記云室中央中霤謂四霤之中也祭於漏井蓋失之矣七祀之文皆云祀行而無井祭竈而不祭井於事則闕夫設祀者非唯報功而已亦神道設教使民慎之幽冥也臣以為帝之都城宜祭一門正宮一門正室一戶井竈中霤亦各擇其一正者祭之四望尚書舜典曰正月上日受終于文祖在璿璣玉衡以齊七政肆類于上帝禋于六宗望於山川遍于群神歲二月東巡狩至于岱宗柴望秩于山川肆覲東后孔安國曰望秩于山川者以尊卑祭之也五岳視三公四瀆視諸侯其餘小者或卿大夫伯子男周禮春官上曰大宗伯之職國有大故則旅上帝及四望四望五嶽四鎮四瀆也又春官曰小宗伯之職常兆五帝於四郊四望四類亦如之兆為壇之營城又春官上典瑞曰掌玉瑞玉器之藏四珪有邸以祀天旅上帝兩珪有邸以祀地旅四望又春官下大司樂曰春奏姑洗歌南呂舞大韶以禮四望公羊傳僖下曰夏四月卜郊不從乃免牲猶三望三望者何望祭也則曷為祭祭泰山河海山川有能潤于百里者天子秩而祭之此皆助天氣成功故祭天及之五經通義曰王者所以因郊祭日月星辰風伯雨師山川何以為皆有功於民故祭之也皆天地之別神從官也緣天地之意亦欲及之故歲一祭之禮日於南門外禮月四瀆於北門外禮山川丘陵西門外祭風伯雨師於東門外各即其位也以是明之其祭之柰何乎曰祭日者懸祭月者毀祭風者明祭雨者布䟽祭山川者沉各象其貌也三輔黃圖曰宰衡王莽奏曰冬至使有司祭天神於南郊高祖配而望群陽夏至使有司祭地祇於北郊高后配而望群陰隋書志曰梁朱異議鄭眾云四望謂日月星海鄭玄云謂五岳四瀆尋二鄭之說牙有不同竊以望是不即之名凡厥遙祭皆有斯目豈容局於星海拘於海瀆請今天司有關水旱之義爰有四海名山大川能興雲致雨一皆備祭高禖禮記月令曰仲春玄鳥至之日以太牢祀于高禖天子親往后妃率九嬪御乃醴天子所御帶以弓韣授以弓矢立於高禖之前蔡邕章句曰高禖祀名也高猶尊也禖者所以祈子孫之祀也天子所御謂后妃以下主妾御者韣弓衣也祝以高禖之命飲以醴酒帶以弓衣尚使得男者也鄭玄注曰玄鳥遺卵娀簡狄吞之生契後以為禖官嘉祥而立祀也漢書曰太子據立為皇太子初上年二十九乃得太子甚喜為立禖張晏曰禖求子禖神使東方朔枚皋作禖祝續漢書曰仲春之月立高禖祀於城南禮以特牲五經異義曰王者一歲七祭天地仲春后妃郊禖禖亦祭天也五經要義曰契母簡狄以玄鳥至之日祀於高禖而生契高禖者蓋先王所以祈子孫之祀也玄鳥感陽而至集人棟宇有孳乳之祥故重其至日因以用事五經異義曰鄭記曰玄鳥至之日以太牢祀于高禖注曰高辛氏世娀簡狄吞鷰子而生契後王以為禖官嘉祥其祀焉王權問曰以注言之先商之時未有高禖生民詩曰克禋克祀以祓無子傳以為古者必以郊禖焉姜嫄禋祀上帝而生稷是則郊禖之祀非以生契之後立也譙喬荅曰先商之時自必有禖氏祓除之祀位在南郊蓋亦以玄鳥至之日然其所禋乃於上帝娀簡狄吞乙子之後王以為禖官嘉祥祀之以配帝謂之高禖晉束晳高禖壇石議曰元康六年高禖壇上石破為二段詔書問置此石來幾時出何經典今應復不博士議禮無高禖置石之文未知造設所由既已毀破無可改造設高辛氏有簡狄吞卵之祥今此石有吞卵之象蓋俗說所為而史籍無記可但收聚復於舊處而已太常以為吞卵之言蓋是逸俗之失義因今毀破便宜廢除下四府博士議賊曹屬束晳議夫未詳其置之故而欲必其可除之理理不可然按郊祀志秦漢不祀高禖漢武帝五子傳武帝晚得太子始為立禖其事未之能審許慎五經異說云山陽民祭皆以石為主然則石之為主由來尚矣其此象矣而祭禮龜策祭器弊則埋之而改置新石今破則宜埋而更造不宜遂廢收集破石積之故處於禮無依於事不肅思所未安也時公卿從太常所處此議不用其後得高堂隆故事魏青龍中造立此禮詔書更鐫石令如舊置高禖壇上埋破石入地一丈隋書禮志曰梁太廟北門內道西有石文如竹葉小屋覆之宋元嘉中脩廟所得陸澄以為孝武時郊禖之石然則江左亦有此禮矣後齊高禖為壇於南郊傍廣輪二十六尺高九尺四陛三壇禱祈周書曰四月孟夏王初祈禱于宗乃嘗麥于廟毛詩甫田曰琴瑟擊鼓以御田祖以祈甘雨以戒我稷麥以穀我士女又生民行葦曰曾孫唯主酒醴維醹酌以大斗以祈黃耇又臣工噫嘻曰春夏祈穀於上帝也祈猶禱求周禮春官上小宗伯曰小宗伯掌大災乃執事禱祠于上下神祇又春官下太祝掌六祝之辭以事鬼神祈福祥求永貞馬融傳曰神天神鬼人鬼祇地祇也禮記月令曰孟春是月也天子乃以元日祈穀于上帝左傳襄上曰郊祀后稷以祈農事也又定上曰魯昭公出故季平子禱于煬公九月立煬宮平子逐君懼而請禱於煬公昭公死於外自以為獲福故立其宮又哀上曰衛太子禱曰曾子蒯瞶敢昭告皇祖文王周文王皇大也烈祖康叔文祖襄公鄭勝亂從勝鄭聲公名釋君助臣為從於亂晉午在難午晉定公名不能治亂使鞅討之鞅趙簡子名論語八佾曰王孫賈問曰與其媚於奧寧媚於竈何謂也王孫賈自周出仕於衛也宗廟及五祀之神皆祭於奧室西南隅謂之奧子曰不然獲罪於天無所禱也明當媚其尊者夫竈者老婦之祭又述而曰子疾病子路請禱禱謝過於鬼神子曰有諸觀子路曉禱禮否子路對曰有之誄曰禱爾于上下神祇誄天神之辭也子曰丘之禱久矣孔子自知無過謝五經異義曰禮祭法云天子有祧遠廟曰祧將祧而去之故曰祧去祧曰壇去壇曰墠皆藏於祖廟有事則禱無事則止說文曰告事求福為禱漢書曰文帝曰昔先王遠施不求其報望祀不祈其福今吾聞祠官祝釐如淳曰釐福皆於朕躬不為百姓夫以朕之不德而專饗獨美其福百姓不與是重吾不德也其令祠官致祀無有所祈東觀漢記曰鄧太后嘗體不安左右憂惶至令禱祠願以人為代太后聞之即譴怒勑掖庭令以下何故乃有此不祥之言左右咸流涕歎太后臨太病不自顧而念兆民後病瘳豈非天地之應與晉中興書曰大旱經久太興四年四月始雨有奏應報賽宗廟山川中宗詔曰祈廟云報賽非奉尊上辭也吾意有疑以為舊山川有許報故雨賽非大事不應告廟臣子無要君之道黷祭稱賽於禮有違唐書曰憲宗謂宰臣曰穰災祈福之說其事信否李藩對曰臣竊觀自古聖達皆不禱祠故楚昭王有疾卜者謂河為崇昭王以河不在楚非所獲罪孔子以為知天道仲尼疾病門人子路請禱仲尼以為神道助順繫於所行己既全德無愧屋漏故荅子路云丘之禱久矣書云惠迪吉從逆凶言順道則吉從逆則凶詩云自求多福則禍福之來感應行事若茍為非道則何福可求是以漢文帝每有祭祀使有司敬而不祈其見超然可謂盛德若使神明無知則安能降福必其有知則私己求媚之事君子尚不可悅也況於明神乎由此言之則履信思順自天祐之茍異於此實難致福故堯舜之務唯在脩己以安百姓管仲云義於人者和於神蓋以人為神主故但務安人而已虢公求神以致危亡王莽妄祈以速漢兵古今明誡書傳所紀望陛下每以漢文孔子之意為準則百福具臻矣上深嘉美之又曰文宗開成中以久旱分命郡官偏祠祈禱於紫宸殿對宰臣憂形於色宰臣以星官所奏天時當爾乞不過勞聖慮上懍然改容曰朕為天下主無德及人致此災旱今又謫見于上若三日不雨當退歸南位更選賢明以主天下宰臣嗚咽流涕各請罪乞免相位是夜澍兩大洽又曰孔戣為廣州剌史先是准詔禱南海神多令從事代戣必自越風波而往韓愈為潮州作詩美之華陽國志曰梁輔為郡五官時天大旱請雨不降輔出禱乃積薪祝神曰二日不雨則欲自焚謝罪百姓言終而雨長沙郡耆舊傳曰祝良為洛陽令時亢旱天子祈不得良乃曝身階庭告誠引罪自晨至中紫雲沓起甘雨登降民為之歌曰天久不雨烝民失所天王自出祝令特苦精符感應滂沱而下列仙傳曰歷陽有彭祖仙室前世云禱請風雨莫不輒應常有兩虎在祠左右今日祠訖即有虎跡異苑曰晉簡文既廢世子道生次子郁又早卒而未有息嗣濮陽令在弟前禱至三更鬱有黃氣自西南來逆室前爾夜幸李太后而生孝武皇帝韓子曰衛人有夫妻禱者而祝曰使我無故得百束布其夫曰何少也對曰益是子將以買妾呂氏春秋曰昔殷湯剋夏而天下大旱五年不收湯乃以身禱於桑林曰余一人有罪無及萬方萬方有罪在子一人無以一人之不敏使上帝鬼神傷民之命於是剪其髮麗其手自以為牲用祈福於上帝民悅雨乃大至淮南子曰聖人者不恥身賤而媿道之不行不憂命之短而憂百姓之窮也是故禹為水以身解於陽肝之河湯為旱以身禱於桑林之下聖人之憂民如此其明也
