body:
  text: 咎徵部六晝昏爾雅曰陰而風為曀史記曰晉烈公二十三年國大風晝昏自旦至中明年太子喜出奔也後漢書曰獻帝時日晝晦董卓擁兵發帝陵晉書曰魏高貴鄉公時司馬景王討母丘儉大風晦暝行者傾伏劉向以為正晝而暝陰制陽臣制君之象儉敗見誅又曰晉元帝時京都晝昏風雲並起時公室卑弱又曰懷帝永嘉四年日中昏後劉曜寇洛川王師敗續帝蒙塵于平陽又曰孝武時大風晦暝其後諸侯違命干戈內侮崔鴻十六國春秋曰前秦符堅時大風從西來俄而晦暝恒星皆見後為謝石所敗又曰南燕慕容超太上四年超祠南郊大風暴起天地晝昏至七年超為晉將劉裕所滅宋書曰孝武時竟陵王誕鎮廣陵將入城晝晦而反見殺又曰晉安王子勳即偽位拜安陵王子綏為司州其日晦暝俄子勳被殺隋書曰梁元帝承聖中日晝昏天地昏暗明年為西魏所執遇害陰漢書五行志曰昭帝無嗣立昌邑王賀賀即位天陰畫夜不見日月賀欲出光祿大夫夏侯勝當車諫曰天久陰而不雨臣下有謀上者陛下欲何之賀怒縛勝以屬吏吏白大將軍霍光光時與車騎將軍張安世謀欲廢賀光讓安世以為泄語安世實不泄召問勝勝上洪範五行傳曰皇之不極厥罰常陰時則有下人伐上不敢察察言故云臣下有謀光安世讀之大驚以此益重經術士後數日卒共廢賀此常陰之明効也晉書曰吳孫亮時沉陰不雨三十餘日時將誅孫綝謀泄綝以兵廢亮又曰孫皓時久陰不雨太史奏將有陰謀皓驚懼時陸凱等欲謀廢不遂皓既肆虐群下多懷異圖終降晉崔鴻十六國春秋曰前秦符堅時久陰不雨俄為符堅廢而殺之隋書曰文帝開皇末久陰不雨是時獨孤皇后與楊素謀廢太子為庶人而後殺之立晉王廣為太子唐書曰睿宗先天二年四月陰至六月一百餘日至七月三日誅竇懷貞等十七家方晴旱尚書洪範咎徵曰僣恒陽若君行僣差常陽順之禮記檀弓下曰歲旱穆公召縣子而問然然之言焉也曰天久不雨吾欲曝尫而奚若尫者面向天冀天哀而雨也曰天則不雨而曝人之疾子虐無乃不可乎錮疾人之所哀曝之是虐然則吾欲曝巫而奚若曰天則不雨而望之愚婦人於以求之無乃已䟽乎徙市則奚若曰天子崩巷市七日諸侯薨巷市三日為之徙市不亦可乎徙市者庶民之喪禮也今徙市是憂戚於旱若喪也左傳僖公曰夏大旱公欲焚巫尫臧文仲曰非旱備也脩城郭貶食省用務嗇勸分嗇儉也勸分有無相濟此其務也巫尫何為天欲殺之則如勿生若能為旱焚之滋甚公從之是歲飢而不害不傷害民又昭公時鄭大旱使屠擊有事於桑山有事祭也斬其木不雨子產曰有事於山藝山林也藝養護令繁殖而斬其木其罪大矣奪之官邑春秋考異郵曰旱之言悍也陽驕蹇所致也春秋繁露曰水干土則大旱洪範五行傳曰魯桓公五年大雩旱也先是殺君而立有危亡之心而下有悲懃之氣外結大國娶於齊以為夫人後比二年天子使大夫來聘桓上得天子之意下得大國之心則有亢陽之意以御臣下興邢丘之役以勞百姓則臣下離心而不從故應是而秋大旱又曰魯宣公十年秋大旱是時公與齊伐萊夫代國亢陽節也師旅百姓所不欲也故應是而大旱也又曰旱所謂常陽不謂常陽而謂旱者以旱為災也旱之為言乾也萬物傷於乾而不得水也君持亢陽之節暴虐於下興師旅動眾勞民以起城邑臣下悲怨而心不從故陽氣盛而失度故旱災應也物理論曰陽盈而過故致旱家語曰哀公問孔子曰旱如之何孔子曰凶年則乘駑馬力役不興馳道不備馳道君祈所行道祈以幣玉有王所祈請用弊及王不用牲也祭事不見不縣不作樂也祀以下牲當用大牢者用少牢此則賢君自貶以救民之禮也史記曰紂末年大旱俄為武王所殺滅也又曰晉莊伯元年不雨雪二年翟人俄代翼至于晉郊又曰共和十四年大旱火焚其屋伯和篡位立故有火旱其年周厲王莽彘而死立宣王又曰魯莊公三十年冬不雨是歲一年而三築臺于郎夏築臺于薛秋築臺于秦又曰僖公二年三月春夏不雨莊公夫人與公子慶父淫而殺二公國人攻之慶父桓公子莊公弟二公謂子般及閔公又曰襄公五年秋大雩先是宋魚石奔楚楚伐宋取彭城以封魚石八年九月大雩季氏盛二十八年八月大雩晉使荀吳齊使慶封來聘是夏邾子來朝襄公自大應之又曰昭公三年八月大雩公居喪不哀亢陽失眾六年九月雩先是莒牟夷以二邑來奔莒怒伐魯亢陽動眾之應十六年九月大雩昭公夫人薨昭公不慼又大蒐于比蒲魯有大哀君無慼容殆其失國二十五年七月大雩旱甚又劉歆以為時君與季氏有隙昭公伐季氏為季氏所敗出奔齊漢書曰惠帝五年夏大旱江河水少谿水絕先是發男女十四萬人城長安又曰文帝時秋大旱其年濟北王興居反伏誅五年春天下大旱匈奴入上郡雲中烽火通長安三將軍周亞夫劉禮徐厲等出兵又曰武帝元光六年夏大旱是年衛青李廣公孫賀為四將軍出匈奴元朔五年春大旱十餘萬眾征匈奴元狩三年夏大旱是歲發天下民吏伐棘上林穿昆明池天漢中頻大旱是年李陵沒征和元年夏大旱閉長安城門大搜治巫蠱明年衛皇后太子死又曰宣帝本始三年夏大旱東西數千里先是五將軍二十萬眾征匈奴趙充國范明友等為將又曰和帝時夏旱傷苗稼其年武靈蠻陬叛寇金城又曰順帝時京師旱楊州六郡賊寇四十九縣殺其長史又曰桓帝時京師旱郡國飢疫人相食明年皇后崩梁冀用事尤盛又曰獻帝興平元年秋三輔旱人相噉食白骨委積郭汜攻李𠐶矢及御前李𠐶逼乘輿幸其營壘魏志曰有白毛玠出見黥反者妻子面玠曰使天不雨蓋此也太祖大怒收玠付獄大理鍾繇詰玠曰急當陰霖何以反旱玠遂黜免晉書曰武帝太始八年五月旱是時帝納荀勗邪說留賈充不復西鎮上下皆蔽之應也又李喜魯芝李胤等並在散職又曰太始十年四月旱去年秋冬採擇卿校諸葛冲等女五十餘人入殿簡選又取小將吏女數十人母子號哭於宮中聲聞於外行人悲酸是始積陰生陽之應又曰永寧元年春夏郡國旱是年三王討趙王倫六旬之中數十戰死者十餘萬又曰懷帝永嘉初大旱河洛漢皆可涉是年東海王越歸京都遣兵入京收中書令繆播殺之又劉元海石勒王彌之徒賊害百姓流血成川又曰明帝時夏大旱是時王敦有石頭之變二宮陵辱大臣誅死王隱晉書曰愍帝建興四年丞相府督軍令史淳于伯刑於建康市百姓諠譁咸曰伯冤於是大旱三年晉中興書徵祥說曰咸和十六年夏旱十七年秋冬旱是時烈宗仁恕信任會稽王道子亦舒緩之應又曰隆安二年冬旱且寒甚四年夏五月秋旱時孫因作亂桓玄疑貳內外騷動兵革方興又曰太元二十年冬無雪亦猶春秋之無冰恒煥之罰也是時任會稽王道子縱酒宴樂不卹政事舒緩之應也宋書曰孝武時頻年大旱人飢死者十有六七時帝造明堂又大興徒南巡校獵盛自矜大故旱災梁書曰武帝時大旱米升五千文人多餓死時與魏交兵前後連年百姓勞弊魏書曰靜帝天平年諸州大旱人多流散是歲齊武與魏戰於沙苑死者數十萬又曰武定年冬春大旱西魏師入洛齊神武親帥軍大戰於北邙死者數萬隋書曰北齊文宣天保年夏大旱時大發卒築長城四百餘里乾明年春旱先是發卒數十數築金鳳聖應崇光三臺窮極侈麗不恤百姓又曰後主河清年夏大旱突厥二十萬眾毀長城寇恒州內外纂嚴又曰隋煬帝時大旱人疫死死人如山明年楊玄感反于時群盜烽起天下離叛之應又發卒百餘萬築長城百姓失業至八年天下旱百姓流亡時發四海兵親征高麗六軍凍餧死者十八九至十三年天下大旱時郡縣鄉邑悉築長城男女無少長皆就役管子春不收枯骨朽胔伐枯木而去之則夏旱至矣晏子春秋曰齊大景公召群臣問曰天不下雨久矣民皆有飢色吾使人卜之崇在高山廣澤寡人欲賦歛以祠靈山可乎群臣皆莫對者晏子進曰不可祠此無益也夫靈山固以石為身以草木為毛髮天不雨髮將礁將熱彼獨不欲雨乎祠之何益公曰不然吾欲祠河伯可乎晏子曰不可河伯以水為國以魚鼈為民天久旱不雨水泉將下百川將竭國亡民將滅矣彼獨不欲雨乎祠之何益景公曰今為之柰何晏子曰君試避宮殿曝露與山河共憂其幸而雨景公即出曝露三日天果大雨隨巢子曰幽厲之時天旱地拆尸子曰湯之救旱也素車白馬布衣身嬰白茅以身為牲當此時也絃歌鼓舞者禁之韓子曰晉平公使師曠奏清徵師曠曰清徵不如清角平公曰清角可得聞乎師曠曰君德薄不足以聽之將恐有敗平公曰寡人老矣所好者音願遂聽之師曠不得已而鼓一奏之有雲從西北方起再奏之大風至大雨隨之裂帷幕破俎豆墮廊瓦坐者散走平公恐懼伏于室晉國大旱赤地三年公之身遂病焉師曠占曰歲欲旱旱草先生旱草者蒺藜也京房別對災異曰久旱何人君無施澤惠利於下人則旱不救蝗蟲害穀又君亢陽暴虐興師動眾下人悲怨陽氣盛陰氣沉故旱萬物根死數有火災此金失其性若夏大旱則雩祀之以素車白馬布衣以身為牲或云誅讒佞之臣於市則三日之雨降於天矣說苑曰湯之時大旱七年雒川竭煎沙爛石於是使人持三足鼎祀山川教之祝曰政不節耶使民疾耶苞苴行耶讒夫昌耶宮室營耶女謁盛耶何不雨之甚也黃帝占書曰日中三足烏見者大旱赤地寒京房易傳曰有德遭險茲謂逆命厥異寒洪範五行傳曰聽之不聰是謂不謀厥罰恒寒史記曰秦始皇九年四月大寒人凍死時嫪毒及大臣二十餘人車裂以殉夷滅宗族遷四千餘家於房陵晉中興書徵祥說曰太興四年冬大寒民凍死是時王敦肆亂天子弗能禁魏書曰靜帝武平年二月大寒人畜凍死疫史記曰秦始皇三年蟲起東方蔽天而下年為大疾漢書曰哀帝永初六年夏大疫疫者邪亂之氣所生延光四年冬京師大疫有絕門者人懼又曰桓帝元康元年正月京都大疫二月九月廬江又疫獻帝建安二十二年大疫至二十五年禪位於魏晉書曰魏文帝黃初四年三月宛許大疫死者數萬又曰明帝青龍二年四月大疫蜀相諸葛亮出斜谷卒于渭南又青龍三年正月京師大疫六韜曰人主好聚歛人則多疫死
