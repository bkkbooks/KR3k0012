body:
  text: 跋太平御覽為有宋一大著作其所引經史圖書凡一千六百九十種今不傳者十之七八或謂輯自古籍或謂原出類書要之徵引賅博多識前言往行洵足珍也今所行者有明代活字本有錫邑刻本其所從出周堂序謂其祖曾得故本黃正色序則謂據薛登甲所校善本繕寫付刻然胡應麟譏其姓名顛倒世代魯魚學者病焉明文淵閣書目存一部一百三十冊一部一百冊均殘缺其後散出遞入於蘇人朱文游周錫瓚黃丕烈汪士鐘家最後為湖州陸心源所得僅存三百六十餘卷今已流入東瀛為岩崎氏靜嘉堂中物矣先是阮文達何元錫各就黃氏假所藏文淵閣殘本謄校藏諸篋衍嘉慶間常熟張若雲據何氏本歙鮑崇城據阮氏本次第梓行張氏刊成未幾板燬存書稀如星鳳傳者唯鮑氏刻本歲戊辰余赴日本訪書先至靜嘉堂文庫觀所得陸氏本其文淵閣印燦然溢目琳琅滿架且於己國增得如干卷為之欣羨者不置嗣復於帝室圖書寮京都東福寺獲見宋蜀刻本雖各有殘佚然視陸氏所得為贏因乞假影印主者慨然允諾凡得目錄十五卷正書九百四十五卷又於靜嘉堂文庫補卷第四十二至六十一第一百十七至一百二十五此二十九卷者均半葉十三行同於蜀刻惟板心無刻工姓名且每行悉二十二字與蜀刻之偶有盈縮者不同疑即在前之建寧刊本蜀本卷首小引謂建寧所刊舛誤甚多李廷允跋亦言釐正三萬八千餘字今以二刻與鮑本校雖各有脫誤然阮文達序鮑刻明言古書文義深奧與後世判然不同淺學者見為誤而改之不知所改者反誤矣或其間實有宋本脫誤者但使改動一字即不能存宋本之真不能見重於後世據此為言是宋本即有脫誤未嘗損其聲價且亦未必真為脫誤也今請再舉數例以證宋刻之勝於今本職官部金紫光祿大夫門宋刻引干寶晉紀三國典略二則鮑本則引左傳成上曰衛侯使孫良夫來聘且尋盟公問諸臧宣叔曰中行伯之於晉也其位在三公下卿孫子之於衛也位為上卿將誰先對曰次國之上卿當大國之中中當其下下當其上大夫小國之上卿當大國之下卿中當其上大夫下當其下大夫上下如是古之制也九十八字下接入落授金紫光祿大夫云云見卷第二百四十三前後渺不相涉張本同但注上下疑有脫文兵部機略門引後漢書第十六則岑彭將兵三萬餘人云云凡一百三十七字見卷第二百八十四鮑張二本全脫妖異部精門引易禮記唐書管子列異傳又搜神記二則適成一葉見卷第八百八十六鮑張二本全缺獸部馬門引周禮夏官上馬及行則以任齊其行若有馬訟則聽之禁原蠶者並注又引論語周書韓詩外傳尚書大傳太公六韜禮斗威儀春秋考異郵春秋說題辭凡十則及淮南子曰八九七十二九字見卷第八百九十三鮑本全脫且易淮南子三字為家語張本同更少十餘字即此數事觀之彌覺宋本之可信日本文久紀元當我國咸豐十一年喜多邨直寬嘗以影宋寫本用藂珍版印行其優於鮑本者則板心所記刻工姓名均與蜀本相合且上文所舉四事一無脫誤宋刻而外斷推此本於是取以補影本二十六卷之闕書經覆寫又用活版詞句訛謬自所不免然以校鮑張二本道部尸解門彼且缺太微經曰諸尸解者按四極真科云一百四十年乃得神中真官於是始得飛華蓋乘輦龍登太極遊九宮也四十二字見卷第六百六十四方術部占星門末節元衡亦還吉甫下又脫先一年以元衡生月卒元衡後一年以吉甫十七字見卷第七百三十三巫門離騷曰欲從靈氛之吉占兮節又脫注十八字見卷第七百三十五惟祝門韓詩外傳曰齊桓公至海丘節盍復祝乎下封人曰使吾君好學而不惡問賢者在側諫者得入桓公曰善哉祝乎二十七字此言乃夫前二言之上也臣聞下子得罪於父母可因姑姊妹而謝也父乃赦之臣得罪於君可因便僻之左右而謝也君乃赦之昔三十八字見卷第七百三十六史記曰楚大發兵如齊節有注二十七字見卷第七百三十六張本存而鮑本猶脫疾病部總敘疾病門引禮記左傳春秋穀梁傳公羊傳國語論語史記漢書有注二十三條鮑本全脫張本僅存其二見卷第七百三十八是則此雖不逮建蜀二本抑猶出於吾國時本之上也蜀本原缺卷第二十一第六百五十六至六百六十五第七百二十四至七百三十八皆全卷又目錄及卷第四第三十八第一百一十第一百三十第一百四十第一百六十六第四百六十四第五百三第五百七十一第六百九十第七百五十七第九百五十二凡缺二十六葉有半均以藂珍版補宋刻每行二十二三四字不等藂珍版則整二十二字故前後葉銜接處偶有移易理合申明乙亥仲冬海鹽張元濟
