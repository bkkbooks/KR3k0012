body:
  text: 兵部八十箭上字林曰箭矢竹也字統曰箭者竹之別形大身小葉曰竹小身大葉曰箭箭竹主為矢因謂矢為箭開元文字曰東南之美者有會稽之竹箭焉箭蓧也自關而東謂之矢自關而西謂之箭箭者竹名因以為號也三鐮謂今䇶音同射箭也平題今戲射箭也鐮稜也題頭也說文曰箭矢也從竹前聲釋名曰矢指也言其所指向迅疾也又謂之箭箭進也其本曰足矢形似木木以下為本以根為足又謂之鏑鏑敵也可以禦敵也齊人謂之鏃言其所中皆族滅也關西曰釭釭鉸音校也言有鉸刃也其體曰簳言挺簳也其旁曰羽如鳥羽也鳥須羽而飛矢須羽而前也齊人曰衛所以導衛矢也其末曰括括會也與弦會也括帝曰義形如義也方言曰箭自關而東謂之矢江淮之間謂之鍭音侯關西曰箭郭璞注云箭者竹名因以為號也揚雄方言曰凡箭鏃三者謂之羊頭其廣薄而長薄謂之錍音卑爾雅曰東南之美者會稽竹箭焉注云會稽山名今在山陰縣南竹箭條也又曰金鏃剪羽謂之鏃骨鏃不剪羽謂之志郭璞注曰金鏃今錍箭也骨鏃金骨骲不剪謂以鳥羽自然淺狡不復剪也鏃音雹孫卿子曰浮游作矢世本曰夷牟作矢黃帝二臣太公兵法曰箭之神名續長趙氏兵書曰矢一名信往易曰得金矢利艱貞吉又曰射雉一矢亡終以譽命書曰周成王崩垂之竹矢在東房垂舜共工所為也詩曰周道如砥其直如矢又曰弓矢既同又曰舍矢如破又曰既張我弓既挾我矢發彼小豝殪此大兕又曰束矢其搜搜眾意勁急也五十矢為束禮記曰故男子生桑弧蓬矢六以射天地四方天地四方者男子之所有事也故必先有志於其所有事又曰月令仲冬云是月也伐木取竹箭注云此時堅成可伐取也又曰后妃執弓挾矢于高禖之前又曰乘丘之役圉人浴馬有流矢在白肉公曰非其罪也遂誄之周禮曰東南曰楊州其山鎮曰會稽其澤藪曰具區其川三江其浸五湖其利金錫竹箭又曰司弓矢掌八矢之法八矢一曰枉二曰絜音結三曰殺四曰鏃五曰矰六曰茀七曰恒八曰陣音痺凡枉矢絜矢利火射用諸守城車戰殺矢鏃矢用諸近射田獵矰矢茀矢用諸弋射恒矢痺矢用諸散射此八矢者弓弩各有四焉盖柱殺矰恒弓所用也絜鏃茀痺弩所用也左傳曰魯莊公以金僕姑射南宮長万杜預曰矢名也又曰狄人伐衛公與石祁子玦與甯莊子矢使守曰以此贊國擇利而為之又曰祝聃射王中肩王亦能軍又曰楚子與莫敖氏戰于睪滸睪滸楚也伯棼射王汰輈及鼓跗著於丁寧伯棼越椒也輈車轅汰過也箭過車轅上也丁寧鉦也又射汰輈以貫笠轂師懼退王使巡師曰吾先君文王克息獲三矢焉伯棼竊其二盡於是矣鼓而進之遂滅若敖氏又曰呂錡射恭王中目王召養由基與之兩矢使射呂錡中項伏弢而死以一矢復命弢音韜又曰郄克傷流血及屨未絕鼓音曰余病矣張侯曰自始合而矢貫予手及肘余折以御左輪朱殷豈敢言病吾子忍之又曰齊師遁晉州綽及之射殖綽中肩兩矢夾脰脛頸又曰楚君以鄭故親集矢於目鄢陵戰晉射中楚王目也又曰齊子淵捷從泄聲子射之中楯凡繇朐音劬汰輈匕入者三寸又曰孟之側後入以為殿抽矢策馬曰馬不進也不欲伐善穀梁曰偏弓鏃矢不出境偏當為敦鏃矢矢名皆天子之器也論語曰子曰直哉史魚邦有道如矢邦無道如矢家語曰子路見孔子孔子曰何好對曰好長劍孔子曰以子所能加之以學豈可及乎子路曰南山有竹不扶自直斬而用射達於犀革以此言之何學為孔子曰括而羽之鏃而礪之其入不益深乎子路再拜國語曰吳晉會于黃池吳王擐甲陳卒赤旗赤羽之矰望之如火賈逵注曰矢羽為矰又曰仲尼在陳有隼于陳侯之庭而死楛矢貫之石砮矢長尺有咫陳惠公使人以隼如仲尼之館問之仲尼曰隼之來也遠矣此肅慎氏之矢也昔武王剋商通道于九夷八蠻注說苑云百蠻使各以其方賂來貢使無忘職業於是肅慎氏貢楛矢石砮其長尺有咫先王欲其令德之致遠以示後人使永鑑焉故銘其括儁書功名也括箭羽之間曰肅慎氏之貢矢以分大姬配虞胡公而封諸陳古者分同姓以珍玉展親也分異姓以遠方之職貢使無忘服也故分陳以肅慎之矢君若使有司求諸故府其可得也使求得之金櫝如言櫝櫃也惠公使有司求之故府得肅慎氏矢於金櫃之中如仲尼之所言也史記曰魏公子無忌進兵擊秦秦軍解去遂救邯鄲趙王及平原君自迎公子平原君負韊音蘭矢為公子先引注呂忱字林曰韊盛弩矢漢書曰李陵擊匈奴一日五十萬矢皆盡虜攻急陵歎曰復得數十矢足以脫矣又曰匈奴右賢王圍李廣廣為圓陣外向矢下如雨漢兵死者過半又曰婁煩射項羽弓發矢欲到羽怒目叱矢乃墜地煩亦恐死又曰李廣夜行見石如虎乃射之其矢沒羽續漢書曰來歙擊隗囂守略陽城大戰登城相射乃發屋斷木為箭東觀漢記曰耿弇與張步戰矢中弇股以佩刀截之左右無知者又曰上拜寇恂河內太守恂移書屬縣講兵肄射伐淇園之竹治矢百餘萬又曰匈奴破離後王安得攻金滿城耿恭以毒藥傅矢傳語匈奴曰漢家箭神中其瘡者必有異因發強弩射之虜中矢者視瘡皆沸並大驚相謂曰漢兵神真可畏也遂解去魏志曰挹婁在失館東北千餘里弓長四尺如弩楛長八寸青石為鏃又曰陳琳曰矢在弦上不可不發魏略曰孫權乘大船出濡須口來觀魏軍曹公使弓弩亂發射之矢著其船船乃偏重箭墜將傾權因廻船復以一面受矢矢均船平乃放船而走蜀志曰關羽為流矢所中貫其左臂醫者曰矢鏃有毒當須破臂刮骨也晉書石季龍載記曰石韜起堂于太尉府號曰宣光殿梁長九丈石宣視而大怒斬匠載梁而去韜怒增之十丈宣聞之恚甚使楊杯牟皮牟成趙生等緣獼猴梯而入殺韜置其刀箭而去又毛寶傳曰寶軍縣兵少器仗濫惡大為祖煥桓撫所破寶中箭貫髀徹鞍使人蹋鞍拔箭血流滿鞾又桓玄傳曰達枚回恬興祐之迎擊玄矢下如雨玄嬖人丁仙期萬盖等以身蔽玄並中數十箭而死崔鴻三十國春秋西秦錄曰白蘭王吐谷渾阿柴臨卒呼子弟謂曰汝等各奉吾一只箭將玩之地下俄而命母弟慕延曰取汝一隻箭折之延折之又曰汝取十九隻箭折之延不能折柴曰汝曹知單者易折眾則難摧戮力一心然後社稷可固言終而卒又後燕錄曰慕容盛行至西樂遇盜陜中盛曰我六尺之軀入水不溺在火不焦汝欲當鋒乎試豎爾手中箭百步我若中之宜慎爾命如其不中當束身相授盜行豎箭盛一發中之盜曰相試耳資而遣之宋書朱齡石弟超石傳曰阿簿千步騎十萬屯河北岸超石以軟弓小箭射虜又曰謝靈運山居賦云其竹則二箭殊葉四苦齊味注云三箭一者苦箭大葉一者竿箭細葉又曰朱修之傳曰魯秀擊襄陽修之發連弩射秀秀亦發連弩應之修之使軍人緣水拾箭又曰謝莊傳云時河南獻舞馬詔群臣為賦莊所上其辭曰迎調露於飛鍾赴承雲於驚箭齊書曰陳顯達傳云顯達杜姥莫補切宅大戰破賊矢中左眼拔箭而鏃不出地黃村潘嫗善禁先以釘釘柱嫗禹步作氣釘即時出乃禁顯達目中鏃出之三國典略曰梁以護軍將軍陸法和為郢州刺史封江乘縣公法和嘗軍次白帝謂人曰諸葛孔明可謂名將吾目見之此城旁有埋弩箭鏃一斛許因令掘之果如其言北齊書曰郎基字世業遷海西鎮將梁吳明徹攻海西基糧仗皆盡乃削木為箭紙為羽得圍解還朝僕射楊暗勞之曰卿本文吏遂有武略削木箭紙羽皆無故事班墨之思何以過之後魏書曰世宗幸鄴還於河內懷界帝親射矢一里五十餘步侍中高顯等奏伏見御弧矢臨原弋遠弦動羽馳鏃所逮三百五十餘步臣等伏惟陛下聖武自天神藝夙茂巧會騶虞之節妙盡矍居約切圃之儀威稜攸疊甝胡甘切兕懾氣才猛所振勍憝弭心足以肅截九區赫服八宇矣盛事奇迹必宜表述勒銘射宮永彰聖藝後周書曰王傑魏恭帝元年從于謹圍江陵時柵內有人善用長矟戰士將登者多為所斃謹令傑射之應弦而倒登者乃得入餘眾繼進遂柭之謹喜曰濟我大事者在此箭也又曰賀拔嶽既遇害于河曲太祖乃率輕騎馳赴平涼時齊神武遣長史侯景招引嶽眾太祖至安定遇之謂景曰賀拔公雖死宇文泰尚存卿何為也景失色對曰我猶箭也隨人所射安能自裁景於此即還又曰庾信傳云信常有鄉關之思作哀江南賦以致其意云兩觀當戟千門受箭白虹貫日蒼鷹擊殿又曰長孫晟傳云晟與汝南公獵見二鵰飛而爭肉因以兩箭與晟曰射取之晟彎弓馳往遇雕相躍一發雙貫焉唐書曰太宗討劉黑闥闥常於肥鄉列陣太宗親率左右擊之有一突將勇壯絕人直衝太宗刃將接太宗以天策上將大箭射之中心洞背應弦而斃遂傳此箭於北蕃突厥見而驚歎又常輕騎近出遇三騎皆賊中驍勇有名者舉槍而進左右請避之太宗不從待其將至連發三矢相次皆斃敵人懾氣焉又曰貞元十四年貢武舉并應百隻箭及三十隻箭等今年權停時諫議大夫田敦因蒙召對奏言兵部武舉等每年常數百千人持挾弓矢出入皇城間恐非所宜上聞而瞿然故命停之其實武舉者每歲不過十數人時議惡敦貴欲非短舊事奏議不實自是訖于貞元更不復置太公六韜曰陷堅陣強敵大黃參連弩飛鳧電景失自副注云飛鳧電景矢名飛鳧尺莖白羽以為首電景青莖尺羽以鋼為首鋼一作鐵太公金匱曰武王伐殷丁侯不朝尚父乃畫丁侯三旬射之丁侯病遣使請臣尚父乃以甲乙日拔其頭箭丙丁日拔其目箭戊巳日拔其腹箭庚辛日拔其股箭癸亥日拔其足箭丁侯病乃愈四夷聞皆懼越常氏獻白雉
