body:
  text: 木部九皂莢廣志曰雞栖子皂莢也宋書曰明帝憎婦人妒劉休妻王氏妒帝聞之賜休妾勑王氏二十杖令休於宅後開小店使王氏親賣掃箒皂莢以此辱之齊書曰明帝每用皂莢授餘濼曆洛二音與左右曰此猶堪明日用又曰王儉素恨虞玩之東歸儉不出送朝廷無祖餞者玩之卒後員外孔皚詣儉求會稽五官儉方盥投皂角於地曰卿鄉俗惡虞玩之至死煩人三國典略曰梁元初甘露降荊州皂莢樹南史陳本紀下曰梁末童謠云不見馬上郎只見黃塵起黃塵污人衣皂莢相料理及王僧辯平群臣奏高祖曰王僧辯本乘巳馬擊侯景馬上郎王字也黃塵陳也世不解皂莢之義及陳滅於隋隋氏姓楊楊者羊也說者以江東人謂羖羊角為皂莢神仙傳曰劉綱受老君道成上大皂莢樹飛去入雲又曰雲仙翁斬皂莢樹以杯承之皆是好酒洛陽宮殿簿曰建始殿前槐及皂莢二十株扶南傳曰安息國出酢皂莢可食味最美幽明錄曰曲阿虞晚所居宅內有一皂莢樹大十餘圍高十餘丈枝條扶踈蔭覆數家諸鳥依其上晚令奴斫上枝因墮殆死空中有罵詈者言晚汝何意伐我家居便以瓦石推擲大小並委頓如此一年漸消滅笵子計然曰皂莢出三輔上價一枚一錢葛洪治溺死方曰擣皂莢裹以綿內死人下部中水出即活辛夷本草經曰辛夷一名辛引一名侯桃一名房木神農本草曰辛夷生漢中魏興涼州川谷中其樹似杜仲樹高一丈餘子似冬桃而小楚辭曰飲菌若之朝露兮構桂木而為室所飲食潔清所處芬香雜橘柚以為囿兮列辛夷與椒楨又曰乘赤豹兮從文貍辛夷車兮結桂旗茱萸洞林曰郭璞避難至新息有人以茱萸令璞射之璞曰子如小鈴含玄珠構支言之是茱萸說文曰椒似茱萸出淮南楊州有茱萸樹風土記曰茱萸椒也九月九日成熟色赤可棌世俗亦以比日折茱萸費長房云以插頭髻云辟惡異苑曰庾紹為東郡令宗協與紹中表旦服茱萸酒忽見紹來仍求酒執酒杯還置云茱萸氣協云惡之耶紹云上官皆畏況我乎雜五行書曰舍東種楊茱萸各三株增年益壽除患害蜀都賦曰其圃則有蒟蒻茱萸曹植樂府歌曰茱萸自用芳不若桂與蘭穀毛詩鶴鳴曰樂彼之園爰有樹檀其下維穀穀惡木也詩義䟽曰幽州謂之穀桑或曰楮桑荊楊交廣謂之穀今江南績其皮以為布又搗以為紙長數丈潔白光澤甚好葉初生可以為茹說文曰穀楮也裴淵廣州記曰蠻夷取穀皮熟搥為楬褁髻布鋪以擬氈錢塘記曰靈隱山四布似蓮花中央生穀樹甚高大韓子曰宋人有為其君以象為楮葉者三年而成亂之楮葉中而不可別也吳氏本草曰穀木皮治喉閉痺一名楮魏王花木志曰南方記楮子如梅實二月花色仍連實七八月熟土人鹽藏之味辛出交阯蔦爾雅曰寓木宛童也郭璞曰寄生樹也一名蔦漢書曰武帝使東方朔射覆郭舍人曰朔中榜臣百不中賜臣帛乃覆樹上寄生朔曰寠藪也舍人曰朔果不中朔曰生肉為膾乾肉為脯著樹為寄生盆下為寠藪上令榜舍人合歡古今注曰欲蠲人以憂則贈以丹棘丹棘一名忘憂欲蠲人之忿則贈以青裳青裳一名合歡能忘忿枝葉繁弱牙相交結每一風來輒自相解不相牽綴嵇康種之舍前本草經曰合歡味甜平生川谷安五臟和心氣令人歡樂無憂久服輕身明目生益州仲長統昌言曰漢安帝時有異物生長樂宮東廡柏樹永巷南閨合歡樹議者以為芝草也群臣皆賀受賜晉宮閣名曰華林園合歡四株神農本草曰合歡生豫州河內川谷其樹似狗骨樹嵇康養生論曰萱草忘憂合歡蠲忿白銀湘州記曰益陽縣西山多銀木晉宮閣名曰華林園白銀八株𣏞交州記曰𣏞赤色堪作舩作床遊名山志曰樓石山多章𣏞皆為三四五圍鄧德明南康記曰南康縣瞢音忘鄧切永極源去郡並九百地多章𣏞樹桄榔蜀志曰興古南漢縣有桄榔樹峰頭生葉有麵大者收麵乃至百斛華陽國志同吳錄曰交趾南海縣出桄榔中有米屑為麵臨海異物志曰桄榔木外皮有毛似栟櫚而散生作䋏音昨綆漬之不腐其木剛作鈠釤鋤利如鐵中石更利唯中焦榔致敗耳皮中有似檮稻米米片又似麥麵中作麵餌廣志曰桄榔樹大四五圍長五六丈洪直旁無枝條其顛生葉似棕葉斫其木肥堅難傷入數寸得麵博物志曰蜀中有樹名桄榔皮裏出屑如麵用作餅食之謂之桄榔麵魏王花木志曰桄榔出興古國者樹高七八丈其大者一樹出麵百斛交趾又有樹其皮有光屑取之乾擣以水淋之如麵可作餅餌嶺表錄異曰桄榔樹枝葉並蕃茂與棗檳榔等樹小異然葉下有鬢如麤馬尾廣人採之以織巾子其鬢尤宜鹹水浸漬即麤脹而肕故人以此縛舶不用釘線木性如竹紫黑色有文理而堅工人解之以制博弈局此樹皮中有屑如麵可為餅食之水經曰漢興縣溪中多生卬竹桄榔樹樹出緜而夷人資以自給欀吳錄地理志曰交趾望縣有欀木其皮中有如白米屑者乾之水淋之似麵可作餅郡內皆有之左思吳都賦曰文欀貞橿莎木蜀志曰莎樹大四五圍長五六丈峰頭生葉出麵一樹出一石正白而味似桄榔南中八郡志曰莎樹大四五圍長十餘丈樹皮能出麵大者百斛色黃鳩民部落而就食之廣志曰莎樹多枝葉葉兩邊行列若飛鳥翼其麵色白樹收麵不過一斛擣篩乃如麵不則如磨屑為飯滑軟木緜吳錄地理志曰交趾定安縣有木緜樹高大實如酒杯中有緜如蠶之緜又可作布名曰緤一名毛布廣州記曰枝似桐枝葉似胡桃而稍大出交廣二州羅浮山記曰木緜正月則花大如芙蓉花落結子方生緜與葉耳子內有緜甚白蠶成則熟南人以為縕絮廣志曰木緜樹赤華為房甚繁偪側相比為緜甚軟出交州永昌杬爾雅曰杬魚毒也郭璞曰杬木子似栗生南方皮厚汁赤中藏卵菓臨海異物志曰杭味如楮廣志曰原木漬其汁消殺眾生生南魄爾雅曰魄榽音奚橀音醯也魄大木細葉似檀今江東多有之廣雅曰青檀似奚橀語曰齊人斫檀奚榽先殫樕樸爾雅曰樕樸心也郭僕曰檞樕別名檴杔說文曰狗杶也欒說文曰欒木也似木蘭從木欒聲文木吳錄曰南朱桐縣有文木材堅黑如水牛角作馬鞭山海經曰符愚之山文木其實如棗南方草物狀曰文木樹高七八丈其色正黑如水牛角作馬鞭日南有之韶裴淵廣州記曰韶葉似栗赤色子大如栗有棘剌破其皮內白豬肪著核不離味甜酢核如荔枝平仲左思吳都賦曰平仲君遷平仲實如銀君遷子如瓠君遷劉欣期交州記曰君遷樹子如馬乳魏王花木志曰君遷細似甘蕉子如馬乳古度吳錄地理志曰廣州有木名古度不華而實裴淵廣州記曰古度葉如栗無華枝柯皮中生子子似櫨而酢煮以為粽數日不煮化作飛蟻吳都賦曰松梓古度柜爾雅曰楥柜柳郭璞曰柜似柳皮可煮作飲也貝多唐書曰貞觀中隋婆登國遣使朝獻其國在林邑南海行二月東與訶陵西與迷黎車接北鄰大海風俗與訶陵同種稻每月一熟亦有文字書之貝多葉杜寶大業拾遺錄曰洛陽翊津橋通翻經道場東街其道場有婆羅門僧及身毒僧十餘人新翻諸經其所翻經本從外國來用貝多樹葉書書即今胡書體貝多葉長一尺五六寸闊五寸許葉形似琵琶而厚大橫作行書隨經多少縫綴其一邊怗怗然顧徽廣州記曰貝多似枇杷而有光澤耀日枝柯去地四五丈作懸根生地便大如本株形一樹亦可有數十根如本形花白子不中食種於精舍浮圖前嵩高山記曰嵩高寺中有思惟樹即貝多也如來坐貝多下思惟因以為名焉魏王花木志曰思惟樹漢時有道人自西域持貝多子植於嵩之西峰下後極高大有四樹樹一年三花射干孫卿子曰西方有木名射干莖長四寸生於高山之崖臨百仞之淵木非長也所立高也君子居必擇鄉遊必就士楚辭曰掘荃蕙與射干兮芸蕓藜與蘘荷時好孫綽子曰北阜有木焉名曰時好摩廚異物志曰木有摩廚生于斯調摩廚木名也生於斯調州厥汁肥潤其澤如膏馨香馥郁可以煎熬如脂膏可以煎熬食物也彼州之民仰為嘉肴花木志曰煎熬食物香美如華夏之人用油榕異物志曰榕樹栖栖長與少殊少時緣木後乃成樹故為殊也高出林表廣蔭原丘孰知初生葛虆之儔魏王花木志曰榕木初生少時緣縛他樹如外方扶芳藤形不能自立根本緣繞他木傍作連結有如羅網相絡然後木理連合鬱茂扶踈高六七丈嶺表錄異曰榕樹桂廣容南府郭之內多栽此樹葉如冬青秋冬不凋枝條既繁葉文蒙細而根鬚繚繞枝榦屈盤上生嫩條如藤垂下漸漸及地藤梢入土便生根節或一大榕樹三五處有根者又橫枝著鄰樹則連理南人以為常不為之瑞木夫漏徐衷南方記曰夫漏樹野生三月華五六月成子如術有煮著豬肉雞鴨羹中好可食亦中鹽藏都桶徐衷南方記曰都桶樹二月花仍連實七月熟如卵魏王花木志曰南方草物狀都桶樹野生二月花色仍連著實八九月熟子如鴨卵民取食之其皮核滋味酢出九真交趾都咸徐衷南方記曰都咸樹子大如指取子及樹皮曝乾作飲芳香千歲袁山松宜都山川記曰佷山有異木人無見其朽者其名曰千歲葉似棗色似桑冬夏青貞強少節目慎火南越志曰廣州有大樹可以御火山北謂之慎火或謂戎火多種屋上以防火勝火伏琛齊地記曰東武城東南有勝火木方俗音曰挺子其木經野火燒炭不滅故東方朔謂為不灰之木左思齊都賦曰勝火之木衝水之草播栘林邑記曰播栘樹柯節發根下垂虛中森羅望之似懸髮
