body:
  text: 居處部十一門下家語曰孔子謂子路曰見長者不能黜其色見幼者不能盡其辤雖有疾風雨吾不入其門矣白虎通曰門四出何所以通四方故禮三朝記曰天子之宮四通太公金匱門之書曰敬遇賓客貴賤無二蔡邕明堂月令論曰禮古大明堂之禮曰膳夫氏相禮日中出南闈見九侯及門日昊出西闈親五闈之事日闇出北闈視帝績帝猷明堂之西北門稱闈墨子曰夫城守之法為懸門沉機也潛夫論曰貴戚願為其宅吉而制令名欲其門堅而造作鐵樞卒其所以敗者非苦禁忌而門樞杇常苦崇財貨而驕僣耳上不順天心下不育人物而任其私智竊弄君威反戾天地欺誣神明居累卵之危而圖泰山之安為朝露之行而思傳代之功豈不惑哉吳地記曰閶闔者吳王闔閶所作也名為閶闔門高樓閣道後由此伐楚改曰破楚門世說曰楊脩為魏武主簿作相國門始構榱桶魏武自看使人題門作活字便去楊脩見即命壞之曰門中活闊字王嫌門大也魯連子曰先生見孟嘗君於杏唐之門說苑韓昭侯造高門屈宜咎曰昭侯者非時日也人固有利不利昭侯嘗利矣不作高門往年秦拔宜陽明年大旱民饑不以此時恤民之急而反益以奢此謂福不重至禍必重來者也高門成昭侯卒竟不出此門矣常璩華陽國志曰秦孝文王以李冰為蜀守冰作石犀五頭以壓水精在市橋門今所謂石牛門吳越春秋曰吳王闔閭為太子騁齊女齊女思於齊日夜號泣因而為疾闔閭乃為起北門名曰望齊門作樓令女往登遊其上又曰子胥為吳造大城陸門八象天之八風水門八法地之八聽立閶門者象天門通閶闔風也立虵門以象地戶亦名破楚門亦名虵門者吳位辰屬龍故小城南門作龍以厭虵氣也又曰吳赦越王使歸國送之虵門之外大縱酒群臣祖道晏子春秋曰晏子使楚晏子身短楚人為小門於大門之側延晏子晏子曰使狗國者從狗門入今臣使楚不當從此門入乃更通大門淮南子曰周文王作玉門言以玉飾也又曰崑崙山旁有四百四十門又曰北極之山曰寒門楚辭曰踔絕寒門又曰自東北方土山曰東極之山曰開明之門東南方曰波母之山曰陽門南方曰南極之山曰暑門西方曰西極之山曰閶闔之門西北方曰不周之山幽都之門北方曰北極之山曰寒門八門之風是節寒暑焉神異經曰東北有鬼石室三百里戶共一門石牓題曰鬼門西南銅關頰牓題曰人往門向東北銅闕夾門牓題曰人來門張晏注漢書曰龍樓門門上有銅龍漢宮殿名曰長安有宣平門覆盎門萬秋門橫門郭門東都門今名青門宣德門禮城門青綺門章義門仁壽門壽成門成宮有辟門有慈石門又曰洛陽有泰夏門閶闔門西華門萬春門倉龍門長秋門景福門永巷門丙舍門鴻都門金牙門不老門章臺門濯龍門定鼎門蔡質漢官儀曰宮北朱雀門至止車門內崇賢門內建禮門洛陽故宮名曰洛陽有飛兔門含章門又有建禮門廣懷門有明禮門泰夏門司馬門閶闔門南止車門東西止車門西華門神虎門雲龍門東掖門西掖門千秋門南端門笙鏞門神仙門敬法門卻非門含德門上東門廣陽門津門小苑門開陽中東門司馬門北闕門玄武門南掖門北掖門南端門金門九龍門白虎門春興門青璅門金商門宜秋門古今地名曰河南定鼎門九鼎新定晉宮闕名曰洛陽有承明門又許昌有崇禮門晉宮門又有大夏門長春門朱明門青陽門三輔黃圖曰又有章城門直城門洛城門水經注曰神獸門東對雲龍門衡栿之上皆刻雲龍風虎之狀又曰榖水東流建春門石橋下即上東門也一曰上昇門又曰閶闔門漢之西上門又曰陶水東南經高門南蓋層阜墮缺故有高門之稱矣又經司馬子長墓北入于河亦謂之龍門太史自敘云遷生於龍門是也在馮翊夏陽縣郡國誌賀州封陽有隄陂龍水深百尋大魚自擲登此門化為龍不過者曝鰓點額也又曰同州龍門城帶龍門山大魚點額暴鰓半死謂此也司馬彪注莊子云呂梁即龍門也又曰郢城南有三門東曰龍門離騷云過夏首而西浮顧龍門而不見夏首即夏口也又曰洞庭山有宮五門東通林屋西達峨眉南接羅浮北連岱岳東有石樓樓下兩石鼓扣之即清越所謂神鉦也又曰兗州乘丘左傳公子偃曰宋師不整可敗也自雩門突出蒙皋比而先犯之大敗宋師于乘丘即此也又曰長安縣漢高祖五年置故城在京西北二里漢惠帝築南為南斗形北為北斗形入街九陌東面有青綺門東陵侯邵平秦破為布衣種瓜此門外西北面有棘門漢文屯兵之所又曰魯城伯禽邑也西五門東一曰鹿門即臧孫紇斬鹿門關以出奔邾第三曰稷門即圉人犖能投蓋于稷門之所又曰蜀望帝以褒斜為前門熊耳靈關為後戶又曰鄜州仙宮門即漢武帝所遊相思川也伏陸縣有相思鄉又曰洛陽南面最東曰開陽門初未有名夜有一柱飛在樓上乃是琅邪開陽縣南門一柱飛去遂記其年月日以為名又曰鴻門在新豐縣西八里沛公見項羽處又曰蒯城慕容儁鑄銅馬於門側謂曰銅馬門今大廳前有石函長二尺高一尺代不敢開銘云秦建元十年造銅虎馬又曰汴州陳留郡縣本春秋衛地魏惠王自安邑徙都亦稱梁惠王焉土多髦俊儒藝則以遊俠夷門即侯羸抱關處又曰洪州西門昌門豫章生松陽門內大二十五圍嘗枯永嘉中忽更榮茂以為元帝中興之瑞故郭璞南郊賦云弊樟櫂秀於祖邑以宣帝曾為此郡守故也又曰虬門即吳大城門也又曰廣州盧躭仕州為治中有仙術刺史步騭惡之以狀聞後誅之躭後題其門曰珠門珠門國雖存無射年欲知此書盧躭還太守削之隨削字更生又曰越州雷門勾踐所立吳有虵門得雷而發表事吳之意吳以越在辰巳之地作虵門石虎鄴中記曰鄴宮南面三門西鳳陽門高二十五丈上六層反宇向陽下開二門又安大銅鳳於其鎮舉頭一丈六尺開䆫戶朱柱白壁未到鄴城七八里遙望此門述征記曰青門外有魏車騎將軍郭淮碑小城最東一門名落索門門裏有司馬京兆碑郡民所立豫章記曰郡灌嬰所築有六門其一日松陽門其所以郡為名西二門其一曰昌門其一曰皋門東及北一門亦即以東北為名晉太元中太守順陽范君更開門之北為東陽門以對皋門開北門以對松陽門今八門相望通路直指安城記曰郡大城舊有六門今為八荊州圖記曰臨灃縣南三百里有高巒特立素崖千尋望之有似香鑪吳永安六年自然洞開其朗如門古老相傳名天門門兩角上各生一竹垂下為之天箒云吳地記曰匠門本名干將門門外有干將墓後語訛呼為匠門其言劍匠因之名又郡國志云申公巫臣家亦在西南面劉澄之宋初山川古今記曰魏武聽政殿前有聽政門丹陽記曰司馬門之名起漢世案列女傳鍾離春詣齊司馬門史記又云司馬欣請事咸陽留司馬門三日是則名起戰國非獨漢也今又曰公車門而俗稱謝章門也西京記秦阿房宮以磁石為門懷刃入者輒止之西征賦曰門磁石而梁木蘭構阿房之倔奇蕪城賦曰製磁石以禦衝糊頳壞以飛文韋述西京新記曰西京俗曰長安城亦曰京城高一丈八尺南面三門中明德門東啟夏門西安化門東面三門中春明門北通化門南延興門西面三門中金光門北開遠門南延平門皇城西芳林門金光門朱雀門通化門春明門有蕭望之冢啟夏門先農壇皇城南面六門正南承天門門外兩觀肺石登聞鼓東長樂廣運重明永春門次西永安門次北嘉猷東西恭禮安仁門東西廊歸仁納義門次北太極門西至殿北面三門正北玄武次東安禮門玄德門西面二門南通明北嘉猷門太極殿旁東上西上閤門東西廊左右延明門甘露殿門外東西永巷日華月華門東西千步廊東宮重明門北左右永福門內廊左右嘉善門東西奉化門又曰西京大明宮南面五門正南丹鳳門次東望仙延政門次西建福興安門又曰大明宮含元殿東西通乾觀象門殿北宣政門門設外屏東崇明門南出含曜門昭訓門西光順門東西廊日華月華門紫宸殿前紫宸門門設外屏東崇明門南出含曜門昭訓門西光順門南出昭慶門光範門又曰東京俗曰洛陽城城高一丈八尺南面三門正南曰定鼎門東建春門南永通門北面二門東安喜門西徽安門西面連苑又曰東京紫微宮城南面六門正南應天門門外觀相夾肺石登聞鼓次東興教門重光門大和門次西光政門洛南門東面一門重光北門西南二門南洛城西門北嘉豫門北面二門西玄武東安寧門應天次北乾元門門東萬春門西千秋門門外東西廊左右延福門又西會昌門西北景運門又曰上陽宮東西二門南曰提象門北星躔門內門曰觀風門又曰東都苑東面四門曰垂豫上陽新門望春門南面三門曰興善興安靈光門西面四門曰延秋遊義籠煙靈溪門北面四門曰朝陽靈圃望冬應福門又曰東都皇城南面三門正南曰端門東左掖門西又掖門東面一門賓曜門西面二門南曰麗景門北曰宣耀門又曰東都城東面一門宣仁門南面一門永福門北面一門含嘉門又曰萬年縣門宇文愷所造高宗末太平公主出降於縣廨為婚第以縣門窄隘欲毀之高宗勑曰其宇文愷所作不須坼於他所開門遂存楚辭曰望長楸而大息涕零零其若霰過夏首而西浮顧龍門而不見又曰君之門兮九重又曰魂兮下來入脩門王逸曰脩門郢城門也摯虞門銘云祿無常家福無定門人謀鬼謀道在則尊李尤平城門銘曰平門督司午位處中外臨僚侍內達帝宮正陽南面炎暑赫融李尤廣城門銘曰廣陽位孟厥月在申涼風時至白露已紛李尤上東門銘曰上東少陽厥位在寅條風動物月在孟春李尤中東門銘曰東處仲月厥位當卯倉庚有聲鷹隼匿爪除去桎梏獄訟勿考李尤旄城門銘曰旄門值季位月在辰順陽布惠貧乏是振李尤門銘曰門之設張為宅表會納善閈惡擊邪防害李尤西上門銘曰上西在季位月惟戍菊黃豹祭號令嚴悉李尤夏門銘曰夏門值孟位月在亥不周用事玄冥幽晦陰陽不通螮蝀匿彩迎冬北壇順陰所在李尤榖城門銘曰榖門北中位當于丑太陰主刑殺伐為首班固西都賦曰披三條之廣路立十二之通門左思吳都賦曰通門二八水道陸衢西京賦曰重門襲故陽曜陰藏潘岳懷縣作詩曰綠槐夾門植魏文帝賦序曰王粲直賢門也故纂之古詩曰黃金為君門白玉為君堂
