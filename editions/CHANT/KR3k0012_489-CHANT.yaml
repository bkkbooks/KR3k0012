body:
  text: 人事部一百二十九泣說文曰泣無聲出涕也易曰乘馬班如泣血漣如詩曰瞻望弗及佇立以泣又曰不見復關泣涕漣漣禮記曰高子羔執親之喪泣血三年未嘗見齒君子以為難又曰弁人有其母死而孺子泣者孔子曰哀則哀矣而難為繼也左傳曰楚令尹子元欲蠱文夫人為館於其宮側而振萬焉夫人聞之泣曰先君以是舞也習戎備也今令尹不尋諸仇讎而置館於未亡人之側不亦異乎又曰叔孫婼聘于宋宋公與之宴飲酒樂宋公使昭子右坐右相泣樂祁佐退而告人曰今茲君與叔孫其皆死乎吾聞之哀樂而樂哀皆喪心也何以能久又曰宋公子地有白馬四公嬖向魋魋欲之公取而朱其尾鬣以與之地怒使其徒奪之魋懼將走公閉門而泣之目盡腫國語曰叔向見司馬侯之子撫之而泣曰自其父死也吾蔑與比而事君也昔者其父始之我終之我始之夫子終之史記曰荊軻與高漸離飲於燕市酒酣漸離擊筑軻和而歌之於市中相樂已而相泣傍若無人又曰戚姬愛幸生趙王如意嘗從高祖於關東日夜啼泣欲立如意為太子又曰竇皇后兄長君弟曰竇廣國字少君年五歲時家貧為人所略賣之長安聞皇后新立廣國上書自陳后言之文帝召見具言其故於是后持之而涕泣交橫下侍御左右皆伏地泣助皇后悲哀又曰漢高帝欲自擊陳狶蒯成侯周緤泣曰始滅秦定天下未嘗自行是為無人可使者乎漢書曰上朝東宮趙談參乘袁盎伏車前曰聞天子所共六尺輿皆天下豪英今漢雖乏人陛下獨柰何與刀鋸之餘載於是上遣下談泣下車又曰李陵與蘇武別置酒起舞歌曰萬里兮度沙漠為君將兮奮匈奴路窮絕兮矢刃摧士眾滅兮名已頹老母已死雖欲報恩將安歸陵泣下數行因與武決又曰高祖破黥布軍還過沛置酒沛宮酒酣上慷慨傷懷泣下數行東觀漢記曰更始害齊武王光武飲食語笑如平常獨居輒不御酒肉枕席有涕泣處又曰來歙與蓋延攻公孫述將王元破之蜀人大懼使剌歙歙未死馳告蓋延延見歙伏悲不能仰視歙叱曰故呼卿欲屬以軍事而返效兒女子泣涕乎延收淚強起受所誡歙自書表投筆抽刃而死又曰章帝東巡狩祠泰山還幸東平王宮涕泣沾襟楚漢春秋曰惠帝崩呂太后欲為高墳使從未央宮坐而見之諸將諫不許東陽侯垂泣曰陛下日夜見惠帝塚悲哀流涕無已是傷生也臣竊哀之於是太后乃止吳志曰孟宗為驃騎朱據軍吏將母在營既不得志又夜雨屋漏因起涕泣以謝母母曰但當自勉之何足泣也晉書曰羊祜卒南州人罷市哭聲相接吳守邊將士亦為之泣隋書曰李穆從太祖擊齊師於邙山太祖臨陣墮馬穆突圍而進以馬策擊太祖而詈之授以從騎潰圍俱出賊見其輕侮謂太祖非貴人遂緩之以故免既而與穆相對泣顧謂左右曰成我事者其此人乎又曰李崇守永隆英果有籌筭膽力過人初以父賢勳封廻樂縣侯時年尚小拜爵之日親族相賀崇獨泣賢怪而問之對曰無勳於國而幼少封侯當報主恩不得終於孝養是以悲耳賢由此大奇之孔藂子曰費子陽謂子思曰吾念周室將滅涕泣不可禁也子思曰然今以一人之身憂世之不治而涕泣不禁是憂河水之濁而以泣清之也其為無益莫大焉又曰子高曰泣有二焉大奸之人以泣自信婦人懦夫以泣著愛尸子曰曾子每讀喪禮泣沾襟呂氏春秋曰吳起治西河之外王錯譖於魏武侯使人召之吳起至於岸門岸門邑名止車而望西河泣數行而下其僕謂吳起曰竊觀公之意釋天下若釋躧今去西河而泣何也吳起曰今君聽讒人之言而不知我西河之為秦不久矣魏國從此削乎起果去入楚有間西河入秦說苑曰聖人於天下也譬猶一堂之上今滿堂飲酒有一人向隅而泣則一堂之人皆不樂矣又曰禹出見辜人問而泣之左右問其故禹曰堯舜之民皆以堯舜之心為心今吾為君百姓皆以其心為心是以痛之又曰蔡威公閉門而哭三日泣盡繼以血其鄰窺牆問曰何故哭悲荅曰吾國且亡吾聞病之將死不可為良醫國之將亡不可為計謀吾數諫吾君不用是知將亡續晉陽秋曰司馬文王問劉禪曰頗思蜀不禪曰此間樂不思蜀也郄正見禪曰若王後問宜泣有以荅會王復問禪曰先人墳墓遠在隴蜀乃心西望無日不思因閉眼王曰何乃似郄正語耶禪驚視曰如尊命汝南先賢傳曰蔡順母畏雷後卒每有雷震順輒環塚泣曰順在此王充論衡曰昔周人有仕不遇年老白首涕泣於塗者人或問何為泣乎對曰吾仕數不遇自傷年老失時是以泣又曰蘇秦張儀學從橫之術於鬼谷先生先生曰能說我泣出則能分人主之地矣秦說鬼谷先生泣沾襟劉向新序曰周舍事趙簡子居無幾舍死簡子與諸大夫飲酒酣泣曰百羊之皮不如一狐之腑眾人之唯唯不如周舍之諤諤自舍死未嘗聞吾非也吾國幾亡乎是以垂泣也文士傳曰張叔序字彥真遇黨錮去官道逢其友人相與語天下云嫉害忠良豈但道之不行恐將不免二人相向而泣有老人過嗟曰二大夫何泣之悲哉龍不隱鱗鳳不藏羽羅網高懸憂在機後泣將何及二人欲與之語不顧而去梁江淹泣賦曰秋日之光流子以傷露離披而殺草風清冷而繞堂慮尺折而寸斷魂一逝而九傷欷潺湲兮沬袖泣嗚咽兮染裳尋夫景君齊山荊公燕市孟嘗聞琴馬遷廢史少卿悼躬夷甫傷子皆泣緒如絲詎能仰視後漢張奐與張公超書曰下筆愴恨泣先言流悲毛詩曰春日遲遲采繁祁祁女心傷悲家語曰閔子三年之喪畢見孔子孔子與之琴撫弦切切而悲史記曰項王軍垓下兵少食盡漢四面皆楚歌項王乃大驚曰漢已盡得楚矣乃悲歌慷慨范曄後漢書曰明帝嘗謁原陵夜夢先帝太后如平生忻對既寤悲不能寤明旦遂率百官上陵帝徒步前伏御床視太后鏡奩中物感慟悲泣左右皆泣莫能仰視也吳錄曰張武父業為郡門下掾還家遇賊鬭死武時幼不識父每至節日輒持父遺劍到亡處設祭悲動路人吳志曰顧雍為相十九年年七十六卒初疾微時權令醫趙泉視之拜其少子濟為騎都尉雍間悲曰泉善別死生吾必不起故上欲及吾自見濟拜也晉書曰羊祜樂山水每因風景必造峴山置酒言詠終日不倦嘗慨然歎息顧謂從事中郎鄒湛等曰自有宇宙便有此山由來賢達勝士登此遠望如我與卿者多矣皆湮滅無聞使人悲傷如歲後有知魂魄猶應登此也湛曰公德冠四海道嗣前哲令望必與此山俱傳至若湛輩乃當如公言耳莊子曰宋桓侯築蘇宮使蔡謳為土唱也觀者數百倍去之無有悲色君乃賞蔡呂氏春秋曰周有申喜亡其母聞乞人歌於門下而悲之動於顏色謂門者內乞人歌者自見而問焉與之語是其母也淮南子曰木葉落而長年悲列女傳曰魯七室邑之四者一邑七宮也過時未適人當穆公之時君老太子幼女倚柱而嘯傍人聞之心莫不為之慘慘者鄰人婦謂曰何嘯之悲欲嫁乎吾為子求偶七室女曰豈為嫁之故不樂而悲哉吾憂魯君老而太子少也秦州記曰隴西郡東一百六十里得隴山山東人西役升此而顧瞻者莫不悲思楚辭曰悲者秋之為氣兮草木搖落而變衰漢李陵與蘇武書曰胡地玄冰邊土慘烈但聞悲風蕭條之聲胡笳互動牧馬悲鳴吟嘯成群邊聲四起晨坐聽之不覺淚下嗟吁子卿陵獨何心能不悲哉梁庾信哀江南賦序曰不無危苦之辭唯以悲哀為主啼爾雅曰猩猩小而好啼郭璞云聲似小兒啼左傳曰齊襄公田于貝丘見豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼漢書曰王莽避火宣室前殿火輒隨之宮人婦女啼呼曰當柰何東觀漢記曰劉盆子字季年十五被髮徒跣卒見眾拜恐怖啼泣又曰樂恢字伯奇父親為縣吏有罪令欲殺之恢年十一常伏寺東門外凍地晝夜啼泣令乃出親魏略曰張遼為孫權所圍遼潰圍出復入權眾破走由是威震江東兒啼不肯止者其父母以遼恐之晉書曰桓溫字元子宣城太守彝之子也生未朞而太原溫嶠見之曰此兒有奇骨可試使啼及聞其聲曰真英物也蔡琰別傳曰琰在胡中十三年有二男捨之而歸作詩云家既迎兮當歸寧兒呼母兮啼失聲我掩耳兮不忍聽風俗通曰桓帝元嘉中婦人作啼粧者薄拭目下作啼處起梁冀家天下皆效之天戒若曰冀婦女將收啼也語林曰董昭為魏武帝重臣後失勢文明世入為衛尉昭乃厚加意於侏儒正朝大會侏儒作董衛尉啼面言昔太祖時事舉坐大笑明帝悵然不怡月中為司徒又曰胡廣本姓黃五月生父母置諸甕中投之于江胡翁見甕流下聞有小兒啼聲往取因以為子遂登三司涕說文曰涕鼻液也易曰齎咨涕洟無咎毛詩曰眷言顧之潸焉出涕又曰之子于歸遠送于野瞻望弗及泣涕如雨禮記曰孔子合葬於防封之崇四尺雨甚至孔子問門人曰爾來何遲曰防墓崩孔子泫然流涕曰古不修墓又曰孔子之衛遇舊館人之喪入而哭之哀出使子貢說驂而賻之子貢曰無乃己重乎夫子曰予嚮者哭之遇一哀而出涕子惡夫涕之無從也小子行之又曰將軍文子既除喪而後越人來吊主人深衣練冠待于廟垂涕洟公羊傳曰西狩獲麟非中國獸孔子曰孰為來哉反袂拭面涕沾袍也國語曰公父文伯卒其母戒其妾曰無洵涕無聲涕出為洵涕漢書曰李將軍恂恂如鄙人口不能出辭及死之日天下知與弗知皆為流涕彼其心誠信於士大夫也又曰揚雄怪屈原不容於世作離騷自投江而死悲其文讀之未嘗不流涕吳志曰凌統病卒時年二十九權聞之拊床而起哀不能自止數日減膳言及流涕使張承為作銘誄晉書曰桓溫自江陵北伐經金城見少為瑯琊時所種柳皆已十圍慨然曰樹猶如此人何以堪攀枝執條泫然流涕春秋後語曰荊軻將行太子及賓客知其事者二十餘人皆白衣冠以送之至易水之上既祖取道高漸離擊筑荊軻和歌為濮上聲士皆流涕說苑曰雍門周以琴見孟嘗君孟嘗君曰先生鼓琴亦能令文悲乎周曰夫千秋萬世之後高臺既已壞曲池既已毀墳墓既已下嬰兒豎子樵採者躑躅其足而歌其上夫以孟嘗君尊貴乃若是乎於是孟嘗君泫然涕流曰令文立若破國亡邑之人
