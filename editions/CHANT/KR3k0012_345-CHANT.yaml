body:
  text: 兵部七十五劍下呂氏春秋曰伍員如吳過於荊至江上欲涉見一丈人刺小舡方將漁從而請焉丈人刺度之已絕江問其名族則不肯告解其劍以與丈人曰千金劍也願獻之丈人丈人不受曰荊國之法得伍員者爵執圭祿萬石金千鎰昔者子胥過吳尚猶不取今我何用子之千金劍為乎伍員過於吳使人求之江上則不從得每食必祭之祝曰江上之丈人天地至大矣將奚不有名不可得而聞身不可得而見又曰相劍者曰白所以為堅也黃所以為紐也黃白雜則堅且紐良劍也難者曰白所以不為紐也黃所以為不堅也黃白雜則不堅且不紐又柔則錈堅則折劍折且錈焉得為利劍劍之精未革而或以為良或以為惡說使之也故有以聰明聽說則妄說者止無以聰明聽說則堯桀無別矣此忠臣之所患賢者之所以廢也又曰荊有次非者一作佽得寶劍于干遂干遂邑名還反涉江至於中流有兩蛟夾繞其舩次非謂舟人曰汝嘗見兩蛟夾舟而舟中之人有全活者乎舟人曰未之見也次非曰若如是吾固江中腐肉朽骨耳棄劍而已余何愛焉遂攘臂祛衣拔劍赴江刺蛟殺之而復上舟中之人皆獲全荊王聞之仕以執圭周禮侯執信圭楚以次非為勇武侯孔子聞之曰腐肉朽骨猶能除害見幾哉又曰劍不徒斷車不自行或使之也又曰楚人有涉江者其劍自舟中墜於水遽契其舟曰是吾劍之所從墜也舟止從其所契者入水求之舟已行矣而劍不行求劍若此不亦惑乎龍魚河圖曰流洲在西海中地方三千里上多山川積石名為昆吾石冶其石為鐵作劍光明照洞如水精以割玉如土又曰劍名飛揚山海經曰鮫魚皮有珠文而堅可以飾刀劍口又曰汲郡冢中得銅劍一枚長三尺五寸今所名干將劍明古者通以錫銅為兵器又曰有君子之國其人衣冠帶劍廣雅曰斷蛇魚腸純鈞燕支蔡偷屬鏤千勝堂谿墨陽並劍名也周遷輿服雜事曰劍所從來久矣其後唯朝服帶劍晉朝代之以木貴者玉飾首賤者以蚌金銀玳瑁為雕飾張敞晉東宮舊事曰太子儀飾有玉頭劍古今注曰吳大帝有寶劍六一曰白虹二曰紫電三曰辟邪四曰流星五曰青冥六曰百里十洲記曰流洲在西海中上有山川積石為昆吾冶其石成鐵作劍光明照如水精狀割玉如泥漢武內傳曰王母帶分景之劍上元夫人帶流黃擇精之劍神仙傳曰真人去世多以劍代形五百年後劍亦能靈化其驗矣西京雜記曰漢高祖斬蛇劍以七彩珠九華玉為飾五色瑠璃為匣刃上常如霜雪光景照外開囊拔鞘輒有風氣射人拾遺記曰顓頊高陽氏有畫影劍騰空劍若四方有兵此劍則飛赴指其方則剋未用時在匣中常如龍虎吟又曰越王勾踐使工人以白牛白馬祀昆吾山神以成八劍一名掩日以之指日則日光晝暗金者陰物也陰盛則陽滅二曰斷水畫水開即不合三曰轉魄指月蟾免為之倒轉四曰懸剪飛鳥遊遇觸其刃如斬截焉五曰驚鯢以之沈海鯨鯢為之深入六曰滅魂扶以之夜行不遇魑魅七曰却邪有妖魅見之則止八曰真剛以之切玉斷金如刻削土木矣以應八方之氣也雷次宗豫章記曰吳未亡恒有紫氣見於牛斗之間占者以為吳方興唯張華以為不然及平此氣逾明張華聞雷孔章妙達緯象乃要宿屏人問天文將來吉凶孔章曰無他象唯牛斗之間有異氣是寶物之精上徹於天耳此氣自正始嘉平至今日眾咸謂孫氏之祥唯吾識其不然今聞子言乃玄與吾同今在何郡曰在豫章豐城張遂以孔章為豐城令至縣移獄掘深二丈得玉匣長八九尺開之得二劍一龍淵二即太阿其夕牛斗氣不復見孔章乃留其一匣龍淵而進之劍至張公於密發之光焰鞾韡煥若電發後張遇害此劍飛入襄城水中孔章臨亡誡其子恒以劍自隨後其子為建安從事經淺瀨劍忽於腰中躍出初出猶是劍入水乃變為龍逐而視之見二龍相隨而逝焉孔章曾孫穆之猶有張公與其祖書反覆桑根紙古字縣後有掘劍窟方廣七八尺搜神記曰東越門中有嶺高數十里下北隰中有大蛇長七八丈大十餘圍常病都尉及長吏下夢巫覡欲得童女常八月朝祭送蛇輒吞之已用九女李誕有小女名寄應募而行乃請好劍咋蛇犬作數斛深密灌之以置穴口蛇出頭大如囷目如二尺鏡先啖深密寄便放犬咋蛇以劍斫殺得九女髑髏越王乃娉寄為后又曰會稽賀瑀字彥琚得疾不知人唯心下溫二日蘇云吏已將上天入曲房房中有層架其上層有印中層有劍使瑀唯意所取而短不及上層取劍而出門吏曰恨不得印可策百神劍唯得使社公耳異苑曰晉惠帝元康三年武庫火燒孔子屐高祖斬白蛇劍王莽頭等三物中書監張茂先懼難作列兵陳衛咸見此劍穿屋飛出莫知所向辛氏三秦記曰三月三日秦昭王置酒河曲有神人自泉而出捧水心劍曰令君制有西夏老子曰服文彩帶利劍又曰善攝生者兵無所容其刃莊子說劍篇曰昔趙文王喜劍劍士俠門而客三千餘人日夜相擊於前死傷者歲百餘人好之不厭如是三年國衰諸侯謀之太子悝患之募左右曰孰能說王之意止劍士者奉千金左右曰莊子當能太子使人奉千金莊子弗受與使者皆往見太子曰聞太子欲用周者絕王之喜好也太子曰然吾王所見者唯劍士也莊子曰諾周善為劍太子曰吾王所好劍士也蓬頭突鬢垂冠縵胡之纓短後之衣瞋目而語難王見說之今天子必儒服見王事必大逆莊子請治劍服三日太子乃見王王脫白刃待之莊子入殿門不趍見王不拜王曰子欲何以教寡人使太子先焉曰臣聞大王喜劍故以劍見王王曰子之劍何能禁制曰臣之劍十步一人千里不留行王大悅曰天下無敵矣莊子曰夫為劍者示之以虛開之以利後之以發先之以至願得試之王曰夫子休就舍待命設戲請夫子王乃校劍士七日七夜死傷者六十餘人得五六人使捧劍於殿下乃召莊子王曰今日使劍士交劍莊子曰望之以久矣王曰夫子御杖長短如何莊子曰臣之所奉皆可臣有三劍唯王所用請先言而後試王曰願聞三劍曰有天子之劍有諸侯之劍有庶人之劍王曰天子之劍何如曰天子之劍以燕谿石城為鋒齊岱為鍔晉衛為脊周宋為鐔韓魏為鋏苞以四夷褁以四時統以渤海帶以常山制以五行論以刑德開以陰陽持以春夏行以秋冬此劍直之無前舉之無上按之無下運之無旁上決浮雲下絕地紀此劍一用匡諸侯天下服矣此天子之劍也文王茫然自失曰諸侯之劍如何曰諸侯之劍以智勇士為鋒以清廉士為鍔以賢良士為脊以忠聖士為鐔以豪傑士為鋏此劍直之以無前舉之亦無上按之亦無下運之亦無旁上法圓天以順三光下法方地以順四時中和人意以安四鄉此劍一用如雷電之震也四封之內無不賓服而聽從君命者此諸侯之劍也王曰庶人之劍如何曰庶人之劍蓬頭突鬢垂冠縵胡之纓短後之衣瞋目而語難相擊於前上斬頸頷下決肝肺此無異鬥雞一旦命已絕矣無所用於國事今大王有天子之位而好庶人之劍臣竊為大王薄之王乃牽而上殿宰人上食王三環之莊子曰王安坐定氣劍事畢矣於是文王不出宮三月劍士皆伏斃其處矣又曰干越之劍匣而藏之不敢輕用寶之至也又曰大冶鑄金金踊躍曰我必為鏌鋣烈子曰魏黑卯以匿嫌殺兵邴章匿嫌私恨也邴章之子來丹謀復父讎而丹氣甚猛其形甚露露羸恥假力於人誓以手劍而黑卯力抗百人非人類也其視來丹猶雛鷇也來丹之友申抱曰子怨黑卯至矣黑卯之易子過矣將奚謀焉來丹垂涕曰願子為我謀申抱曰吾聞衛孔周其祖得殷之寶劍三僮子服之却三軍之眾奚不請為來丹適衛見孔周執僕禮請先納妻子後言所欲周曰吾有三劍唯子所擇而皆不能殺人且先言其狀一曰含光視之不可見運之不知其所觸泯然無際經物而不覺二曰承影將旦昧爽之交日夕昏明之際北面察之淡淡焉若有物存莫有其狀其觸物也竊然有聲經物而物不疾三曰霄練晝則見影而不見光夜方見光而不見形其觸物騞然而過騞音休蘖隨過隨合覺疾而不血刃此三寶劍傳之十三世矣而無施於事不能害物匣而藏之未嘗啟封來丹請其下者孔周乃歸其妻子跪而授其下劍丹再拜受之執劍從黑卯醉偃臥牖下自頸至腰三斬黑卯不覺丹以黑卯死趣而退遇卯子於門又擊之三下如接虛卯子方笑丹知劍不能煞人也歎而歸卯醒怒妻子醉而覆我使我嗌疾而腰急其子曰丹之來過於門三招我亦使我體疾而支強彼其厭我哉又曰宋有蘭子者以數干宋元君弄七劍迭躍之五劍常在空中元君大驚立賜金帛又曰周穆王征西戎戎獻昆吾之劍赤刀切玉如切泥管子曰昔葛大盧之山發而出金𧈪尤受而制之以為劍鎧此劍之始也又曰羽劍珠飾者斬生之斧也墨子曰良劍期乎利不期乎莫耶孫卿子曰干將莫耶巨闕辟閭皆古之良劍也尉繚子曰吳越臨戰左右進劍吳子曰夫提鼓揮捊臨難決疑接兵用刃此將軍也一劍之任非將軍事也又曰一賊鋏劍擊於市萬人無不觸辟者臣以為非一人獨勇一市萬人皆不肖尸子曰水試斷鵠鴈陸試斷牛馬所以觀良劍也燕丹子曰荊軻左手把秦王袖右手椹音砧其胸秦王曰今日之事從子計耳乞聽琴聲而死召姬人鼓琴聲曰羅縠單衣可裂司德狀拜二而絕八尺屏風可超而越鹿盧之劍可負而拔王於是奮袖超屏風而走荊軻擲劍中銅柱焉淮南萬畢術曰拔劍倚戶兒不夜驚又曰夫淳劍魚腸之始下夫擊則不能斷刺則不能入高誘注曰魚腸文繞屈譬若魚膓又曰劍工或劍之似莫耶者唯歐治能名其種歐治良工也玉工眩玉之似碧盧者唯猗頓不失其情碧盧或作武夫猗頓魯之富人能知玉理不失其情也抱朴子曰歐治不能鑄鈆錫為干將符朗子曰符朗棄千金之劍抱朴子趨曰何夫子棄大而存小乎符朗不應賈子曰古者天子二十而冠帶劍諸侯三十而冠帶劍大夫四十而冠帶劍隸人不得冠庶人不帶劍亢蒼子曰蜚景之劍威集白日氣成紫蜺以之封穫則與劂俱衛切刃也無擇蜚景神劍也剛鎌也神劍雖利以之穫陷猶司於鎌刀者也及夫凶邪流毒沸渭不靖加之運掌之上千里之內不留行矣凶邪流毒溫疫之氣也此神劍之能辟凶邪故威光所行千里之內未嘗留止者也宋玉大言賦曰長劍倚天外班固幽通賦注曰衛靈公太子剻聵為無道好帶長劍長一丈公鍊乃作短者長一尺公知不可以傳國乃逐之魏都賦曰劍則流彩之珍素質之寶或虹蔚波映或龜文龍藻服之可以威百蠻指麾可以開昏擾古詩曰腰中鹿盧劍可直千萬餘博物志曰劍後擊鹿盧名曰屬鏤又曰何意百鍊鋼化為繞指柔班固詩曰寶劍直千金又曰延陵輕寶劍曹子建詩曰拊劍西南望江文通詩曰倚劍臨八荒宋鮑昭詩曰雙劍將別離先在匣中鳴雌沈吳江裏雄飛入楚城吳江深無底楚闕有崇扃一為天地別豈直限幽明神物終不隔千祀儻還并梁吳均詠寶劍詩曰我有一寶劍出自昆吾溪照人如照水切玉如切泥鍔邊霜凜凜匣上風凄凄寄語張公子何當來見攜梁崔鴻詠劍詩曰寶劍出昆吾龜龍夾采珠五精初獻術千戶竟論都匣氣衝牛斗山形轉鹿盧欲知天下貴持此問風胡曹植七啟曰步光之劍越劍名華藻繁縟飾以文犀彫以翠綠綴以驪龍之珠錯以荊山之玉陸斷犀象未足稱雋隨波截鴻水不漸刃張景陽七命曰楚之陽劍歐冶所營陽劍名也耶谿之挺赤山之精銷踰羊頭羊頭骨銷之也鏷以鍜成乃鍊乃鑠萬辟千灌皆銷鍊名豐隆奮椎飛廉扇炭神氣化成陽文陰縵既亦流綺星連浮綵艷發光如散電質如曜雪霜鍔冰凝水刃霜洯形冠豪曹名珍巨闕指鄭則三軍白首麾晉則千里流血豈徒水截蛟鴻陸灑奔駟斷浮翮以為三絕重甲而稱利又曰若其形震薛燭光駭風胡價兼三鄉聲貴兩都或馳名傾秦或夜飛去吳功冠萬載威曜無窮揮之者無前擁之者身雄可以從服九國橫制八戎爪牙景附亟夏承風此盖希代之神兵也楚詞曰執棠溪棠溪劍名以拂蓬秉干將以割肉又曰撫長劍兮玉珥珥劍也鐔又曰余幼好此奇服年既老而不衰帶長鋏之陸離冠青雲之崔巍高皃後漢公孫瑞劍銘曰天生五才金德惟剛從革作辛含景吐商辨物利用勳伐彌彰暨彼良工歐治干將爰造寶劍巨闕墨陽精通皓靈獲茲休祥剖山竭川虹蜺消亡昭威耀武震動遐荒楚以定霸越以取強晉裴景聲文身劍銘曰器以利顯實以名舉長劍耿介體文經武陸斷玄犀水截輕羽九功斯像七德是輔晉張協太阿劍銘曰太阿之劍世載其美淬以清波歛以越砥如玉斯曜若景在水不運自肅率土從軌梁簡文帝謝勑賚方諸劍等啟曰纔發玉函雕奇溢目始開牙撿麗飾交陳已疋丹霞之暉乍比青雲之制身文且貴器用惟宜寒暑兼華左右相照梁沈約為東宮謝勑賜孟嘗君劍啟曰田文重氣殉名四豪莫及寶劍雄身故能威陵秦楚人高事遠遺物足奇謹加玩服以深存古
