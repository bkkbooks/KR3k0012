body:
  text: 職官部十揔敘尚書韋昭辯釋名曰尚上也言最在上揔領之也辯云尚猶奉也百官言事當省案平處奉之故曰尚書尚食尚方亦然周禮曰司會中大夫二人注司會主天下之大計計官之長若今之尚書漢書百官表曰成帝初置尚書員五人如淳曰主天子書主天子物皆曰尚如主壻曰尚主者也東觀漢記曰章帝東巡過任城乃幸鄭均舍勑賜尚書祿以終其身故時人號為白衣尚書又曰章帝賜尚書劍各一手署姓名韓稜楚龍泉郅壽蜀漢文劍陳寵濟南鍜成一室丙兩刃其餘皆平劍其時論者以為稜淵深有謀故得龍泉壽明達有文章故得蜀漢文劍寵敦朴有善於內不見於外故得鍜成劍皆因名而表意後漢書曰楊喬為尚書容儀偉麗數上言政事桓帝愛其才貌詔妻以公主喬固辭不聽遂閉口不食七日而死續漢書百官志曰尚書秩六百碩成帝建始四年罷中書官官置尚書員五人一人為僕射分為四曹通掌圖書祕記章奏各有曹任常侍主丞相御史公卿事二千石曹主刺史郡國事民曹主吏民上書事客曹主外國夷狄事而成帝又置三公曹主斷獄共為五曹世祖又分增三公為二曹其一曹主歲盡課州郡事改常侍曹為吏曹主選舉祠祀民曹主繕治攻作鹽池苑囿客曹主護駕羗胡朝賀二千石曹主辭訟中都官主水火盜賊與三公為六曹又曰李固上䟽云陛下之有尚書猶天之有北斗北斗為天喉舌尚書為陛下喉舌謝承後漢書曰陳禁字子雅拜尚書公卿朝日晏無詔禁問臺上故事何時可罷對言巳食輒有詔罷今巳晏禁曰寧可白耶尚書郎以上方宴樂不敢白禁使罷公卿既罷上問左右今未有詔而罷朝何也尚書直對曰陳禁命罷上曰勿復問也禁在臺二年嘗病令僕射數奏久病滿百日請輒免有詔賜金帛醫藥又曰張陵字處仲為尚書首歲朝梁冀滯劍入省陵叱冀令出勑虎賁奪其劍冀跪謝陵劾之詔以歲俸贖罪百寮肅然冀弟不疑曾舉陵後疾冀不疑謂曰昔舉君所以自罰也陵曰明府不以陵不肖誤見擢序令申公憲非報私恩耳不疑有慚色又曰翟酺字子廣為侍中時尚書有缺詔將軍大夫六百石以上試對政事天文道術以高第者補之由是酺對第一拜尚書又曰魏朗字少英入為尚書再升紫微謇諤禁省不屈豪右為百寮所服以黨事免朗性矜嚴閉門整法長吏希見動有禮序室家相待如賓子孫如事嚴君焉又曰蔡邕字伯喈以持書御史遷尚書三月之間周歷三臺又曰鍾離意字子阿明帝徵為尚書交阯太守坐贓伏法以資物簿入大司農詔頒賜群臣意得珠璣悉以委地而不拜帝怪問其故對曰臣聞孔子忍渴於盜泉之水曾參廻車於勝母之鄉惡其名也贓穢之寶不敢拜帝笑曰清乎尚書賜錢三十萬又曰荀緄字伯條拜尚書緄性明亮敏於眾職以勗群寮秉機平正直而行之是時內外公卿大夫莫不敬憚焉又曰韋彪上䟽曰欲急世所務當先除其患其源在尚書尚書典樞機天下事一決之不可不察漢官解詁曰士之權貴不過尚書又曰唐虞曰納言周官為內史機事所揔號令攸發漢官儀曰尚書唐虞官也書曰龍作納言詩云仲山甫王之喉舌秦改稱尚書漢亦尊此官典機密也應劭漢官曰漢明帝詔曰尚書蓋古之納言出納朕命機事不密則害成可不慎歟張璠漢記曰朱穆黨事禁固徵拜尚書正月百官朝駕畢虎賁當陛置弓於地謂群僚曰此天子弓誰敢干越百僚皆廻避不敢當穆乃呵之曰天子弓當載之於肩首之上乃敢置地大不謹不敬即收虎賁付詔獄治罪莫不肅然服其忠烈魏志曰陳群為尚書制九品為官人之法群所建也又曰許混字子劭清淳有鑒識明帝時為尚書又曰丁謐字彥靜曹爽宿與相親拔為散騎常侍轉為尚書在臺閣數有所彈駮以勢屈於爽爽亦敬之時謗書謂臺中有三狗二狗崖柴不可當一狗憑點作疽囊三狗謂何鄧丁也點者爽小字也意言三狗皆欲嚙人而謐尤疽囊也又曰孔禮字德遠為尚書明帝方修臺署節氣不和天下少穀禮固爭因罷役制曰敬納讜言魏略曰帝遊宴在內選女子知書可付信者六人為女尚書使典省外奏事處當書可云也吳志曰尚書熊睦見孫皓酷虐微有諫皓使人以刃環撞殺之身無完肌也晉書曰杜預為尚書損益萬機不可勝數朝野服焉號曰杜武庫言其無所不有又曰山濤轉尚書表辭年老詔曰方今多事嘉謀良圖委以老成也又曰劉頌為尚書孫秀等推崇趙倫功宜加九錫百寮莫敢異議頌獨曰昔漢之錫魏魏之錫晉皆一時之用非可通行今宗廟乂安雖嬖后被退勢臣受誅用周勃誅諸呂而尊孝文霍光廢昌邑而奉孝宣並無九錫之命亂舊典而習權變非先王之制九錫之議謂無所施晉康帝起居注詔曰尚書萬事之本朕所責成也而廩秩儉薄甚非治體今雖軍國多費不為元凱惜祿其依令僕給尚書各親信五十人廩賜晉中興書曰蔡謨為尚書上䟽曰八座之任非賢莫居前後選用名資有常孔愉諸葛恢並以清節令才素有名望昔愉為御史中丞臣尚為司徒長史恢為會稽太守臣為尚書郎恢尹丹陽臣守小郡名輩不同階級殊懸今猥以輕鄙超踰等疋上亂聖朝貫魚之次下違群士准平之論豈唯微臣斯亡之誡實貽聖政維塵之累宋書曰凡尚書官大罪則免小罪則出出者百日無代人聽還本職宋志曰今朝士詣三公尚書丞郎詣令僕射尚書並門外下車履度門閫乃納履齊職儀曰尚書六人品第三秩六百戶進賢兩梁冠納言幘絳朝服佩水蒼玉執笏負荷梁書曰陸杲遷尚書殿中曹郎拜日八座丞郎並到上省交禮而杲至晚不及時刻坐免官也又曰周捨問劉杳尚書官著紫荷相傳云挈囊竟何所出荅曰張安世傳云持橐簪筆事孝武帝數十年注云橐囊也近臣簪筆以待顧問也後魏書曰肅宗靈太后曾讌於華林園舉觴謂群臣曰袁尚書朕之杜預欲以此杯敬屬元凱今為盡之侍座者莫不羨仰翻名位俱重當時賢達咸推與之隋書曰于仲文上以尚書文簿繁雜吏多姦計令仲文勘錄省中事其所發擿甚多上嘉其明斷厚加勞賞焉唐新語曰玄宗欲以牛仙客為尚書張九齡諫曰不可尚書古之納言有唐巳來多用舊相居之不然歷踐內外清貫之地妙有德望者充之仙客本河湟一使典耳拔昇清流齒班常伯此官邪也益部耆舊傳曰太尉李固薦楊淮累世服事臺閣既閑練舊典且有幹用宜在機密特拜尚書固薨免官尚書令陳蕃表行狀復徵為尚書會稽典錄曰鄭弘拜尚書舊典科郎滿補縣長令史為丞尉弘奏以為臺職位尊而賞薄人無樂者請使郎補縣令史為長上從其議自此為始通典曰尚書出納王命敷奏萬機蓋王政之所由宣選舉之所由定罪賞之所由正斯乃文昌天府眾務泉藪內外所折衷遠近所稟仰故李固云陛下之有尚書猶天之有北斗斟酌元氣運平四時是為喉舌郭子曰王公有幸妾姓雷頗預政事納貨蔡公謂之雷尚書傳子曰嘏字蘭石為尚書大小無不揔桓子新論曰昔堯試舜於大麓麓者領錄天下事如今之尚書官矣宜得大賢智乃可使處議待平王昶考課事曰尚書侍中考課一曰掌建六材以考官人二曰綜理萬機以考庶績三曰進視惟允以考讜言四曰出納王命以考賦政五曰罰法以考典刑應璩書曰知楊生翻然遂登納言雖有所越亦其宜也傳說棄板築而為殷相呂望段渭竿而為周師卓茂起閭里而為漢宰若此翁者乃奇耳璅璅尚書執憲之吏曷以為異哉
