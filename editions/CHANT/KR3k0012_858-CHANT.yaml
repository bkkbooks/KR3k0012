body:
  text: 飲食部十五蜜張璠易注序曰蜜蜂以兼採為味韻集曰蜜蜂百草華所作也漢武帝故事曰西王母曰太上之藥有中華紫蜜雲山朱蜜續漢書曰天笁國出石蜜東觀漢記曰世祖嘗與朱祐共買蜜合藥後上追念之即賜祐白蜜一石問何如在長安時共買蜜乎吳書曰袁術為雷薄等所距士眾絕糧時盛暑欲得蜜漿又無蜜坐床歎息良久乃大咤曰袁術至於此乎吳曆曰孫亮使黃門至中藏取蜜漬梅蜜中有鼠矢召問藏吏曰黃門從汝求蜜耶吏曰向求蜜實不敢與黃門不服亮曰此易知耳令破鼠矢矢裏燥亮曰若久在蜜中中外當俱濕裏燥必是黃門所為黃門首服晉令曰蜜工收蜜十斛有能增煎二升者賞穀十斛晉太康起居注曰尚書令荀勗羸毀賜石蜜伍斤齊書曰明帝元好駎姨以銀鉢盛蜜漬之一食數鉢又曰陶弘景永明十年脫朝服掛神武門上表辭祿詔許之賜以束帛勑所在月給茯苓伍斤白蜜貳斤以供服餌梁書曰任昉為新安太守郡有蜜嶺及楊梅舊為太守所採昉以冒險多物故即時停絕又曰傅昭為臨海太守郡有蜜巖前後太守皆自封固專收其利昭以周文之囿與百姓共之大可喻小乃教勿封梁四公記曰高昌國遣使貢刺蜜帝命杰音竭公迓之謂其使曰刺蜜是鹽城所生非南平城者使者曰其年風災刺蜜不熟故爾帝問杰公何得知對曰南平城羊刺無葉其蜜色明白而味甘鹽城羊刺葉大其蜜色青而味薄以是知蜜之偽耳唐書曰蕃胡國出石蜜中國貴之上遣使往摩伽池國取其法令楊州煎諸蔗之汁於中廚自造焉色味逾於西域所出神仙傳曰飛黃子服中嶽石蜜及紫梁得仙王孚安成記曰郡東有山百姓呼曰蜜崗蜜焉仙經云蜜為眾口芝荊州圖記曰赤馬山有蜜房二百所羅綴相望因名曰百房異物志曰交阯草滋大者數寸煎之凝如冰破如愽棊謂之石蜜涼州異物志曰石蜜之茲甜於浮蓱非石之類假石之名實出甘柘變而凝輕甘柘似竹味甘煮而曝之則凝如石而甚輕范子曰白蜜出隴西天水本草經曰石蜜一名飴吳氏本草曰食蜜生武都谷劉根墨子枕中記鈔曰百花醴蜜楚辭招魂曰瑤漿勺勺沙也實羽觴左思蜀都賦曰蜜防郁毓被其阜漢昌縣多野蜂蜜蠟郭珍蜜賦曰繁布金房疊稱王室咀爵滋液釀以為蜜散似甘露凝如割肪冰鮮玉潤髓滑蘭香魏文帝與孫權書曰今因趙咨奉石蜜五餅又與朝臣詔曰南方龍眼荔支寧比西國蒱桃石蜜又曰新城孟太守道蜀猪肫鷄鶩味皆淡故蜀人作食喜著飴蜜沙𩛿張衡七辯曰沙𩛿飴石蜜遠國貢儲盛翁子與劉頌書曰沙𩛿西垂之產
