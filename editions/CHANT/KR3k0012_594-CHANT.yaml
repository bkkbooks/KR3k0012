body:
  text: 文部九詔釋名曰詔照也人闇不見事則有所犯以此照示使照然知所由也蔡邕獨斷曰制詔制者王者之喜必為法制也詔猶告也告教也三代無其文秦漢有也文心雕龍曰皇帝馭寓其言也神淵嘿負扆而響盈四表其唯詔策乎昔軒轅唐虞同稱為命命之為義制性之本也其在三王事兼誥誓誓以訓誡誥以敷政降及七國並稱曰命命者使也秦并天下改命曰制漢初定儀則有四品一曰策書二曰制書三曰詔書四曰戒勑勑戒州郡詔告百官制施赦令策封王侯策者簡也制者裁也詔者告也勑者正也觀文景以前詔體浮雜武帝崇儒選言弘奧策封三王文同典訓勸戒淵雅垂範後代及光武撥亂留意詞采而造次喜怒時或偏濫暨明章崇學雅詔間出和安政弛禮閣鮮才每為詔勑假手外請建安之末文理代興潘勗九錫典雅逸群衛覬禪誥符采炳耀不可加也自魏晉策誥職在中書劉放張華管于斯任施令發號洋洋盈耳魏文以下詞義多偉至於作威作福其萬慮之一獘乎晉氏中興唯明帝崇才以溫嶠文清故引入中書自斯已後體憲風流矣夫王言崇祕大觀在上所以百辟其刑萬邦作孚故授官選賢則義炳重離之暉優文封策則氣含雲雨之潤勑戒恒誥則筆吐星漢之華啟戎變伐則聲存洊雷之威眚災肆赦則文有春露之滋明詔勑法則詞有秋霜之烈此詔策之大略也漢制度曰帝之下書有四一曰策書二曰制書三曰詔書四曰誡勑策書者編簡也其制書二尺短者半之篆書起年月稱皇帝以命諸侯王三公以罪免亦賜策而以隸書用尺一木兩行惟此為異也制書者帝者制度之命其文曰制詔三公皆璽封尚書令即重封露布州郡者詔書也其文曰告某官云如故事誡勑者謂勑某官他皆類此漢書曰誡勑剌史太守及三邊營官被勑文曰有詔勑某官是為誡勑世皆名此為策書失之甚也又曰淮南王安傳曰武帝方好藝文以安屬於諸父辨博善為文辭甚尊重之每為報書及賜師古曰書賜之也常召司馬相如等視草迺遣東觀漢記曰第五倫每見光武詔書常歎曰此聖主也當何由一得見快矣等輩笑之曰汝三皇時人也說將尚不能動萬乘主耶倫曰未遇知己道不可故耳范曄後漢書曰隗囂賓客掾史多文才士每所有事當世才士大夫皆諷誦之故帝有所荅尤加意焉魏志曰明帝疾欲以燕王字為大將軍帝引見劉放孫資入臥內問之放資對曰燕實自不堪大任帝曰曹爽可代宇不放資因贊成之又深陳宜速召太尉司馬宣王以網維帝室納其言即以黃紙授放作詔放資既出帝意復變詔止宣王又曰蔣濟上萬機論帝嘉之入為散騎常侍時有詔詔征南將軍夏侯尚曰卿腹心重將當使恩施足死惠愛可懷作威作福殺人活人尚以示濟濟既至帝問曰卿所聞見天下風教何如濟對曰未有它善但見亡國之語耳帝忿然作色而問其故濟具以荅因夫作威作福書之明戒天子無戲古人所慎唯察之於是帝意解追取前詔王隱晉書曰武帝泰始四年班五條詔書於郡國一曰正身二曰勤民三曰撫孤寡四曰敦本息華五曰去人事又曰楚王瑋既誅汝南王亮尋又詔云瑋矯詔行斬刑臨死出其懷中青紙以示監刑尚書劉頌流涕而言此詔書也受此而行謂為社稷今更為罪託體先帝枉受如此幸見申列晉書楊駿傳曰武帝疾篤未有顧命佐命功臣皆已沒矣朝臣惶惑計無所從而駿盡斥群公親侍左右因輒改易公卿樹其心腹會帝少間見所用者乃正色謂駿曰何得便爾乃詔中書以汝南王亮與駿夾輔王室駿恐失權寵從中書借詔觀之得便藏匿中書監華廙恐懼自往索之終不肯與信宿之間上疾遂篤又曰齊王冏入宮稱詔廢賈后后曰詔當從我出何詔也晉中興書曰初顯宗幼冲見王導恒拜又帝與導手詔則敬白中書作詔則曰敬問於是以為永制又曰桓玄左右稱玄為桓詔桓胤諫曰詔者施於辭令不以為稱謂也漢魏之主皆無此言願陛下稽古帝則令萬世可法玄曰此詔以行今宣勑罷之後周書曰冀儁善隸書特工摸寫魏文昌初為賀拔岳墨曹參軍及岳被害太祖引為記室時侯莫陳悅阻兵隴右太祖志在平之乃令儁偽作魏帝勑書與費也頭令將兵助太祖討悅儁依舊勑摸寫及代舍人主書等署與真無異太祖說費也頭已曾得魏帝勑書及見此勑不以為疑遂遣步騎一千受太祖節度隋書後齊正日侍中宣詔慰勞州郡國使詔牘長一尺三寸廣一尺雌黃塗飾上寫詔書三計會日侍中依儀勞郡國計吏問剌史大守安不及穀價麥苗善惡人間疾苦又班五條詔書於諸州郡國使人寫以詔牘一枚長二尺五寸廣一尺三寸亦以雌黃塗飾上寫詔書正會日依儀宣示使人使人歸以告剌史二千石一曰政在正身在愛人去殘賊擇良吏正決獄平徭賦二曰人生坐勤勤則不匱其勸率由桑無或煩擾三曰六極之人務加寬養必使生有以自救沒有以自給四曰長吏華浮奉客以求小譽逐末捨本政之所疾宜謹察之五曰人事意氣干亂奉公內外溷淆綱紀不設所宜糺劾又曰陳梁制諸用官式吏部先為白牒錄數十名吏部常參掌人共署奏勑或可或不其不用者更銓量奏請隨才補用以黃紙錄名八座通署奏可即出付典名而典以名怗鶴頭板整威儀送往得官之家其有特發詔授官者即宣付詔誥局作詔草奏聞勑可黃紙寫出門下門下詔請付外施行又曰周武平齊得李德林嘗謂群臣云我常曰唯聞李德林名及其與齊朝作詔書移檄我正謂其是天上人豈言今日得其驅使復為我作文書極為大異神武公紇豆毅荅曰臣聞明王聖主得騏驎鳳凰為瑞是聖德所感非力能致之瑞物雖來不堪使用如李德林來受驅策亦陛下聖德所感致有大才用無所不堪勝於騏驎鳳凰遠矣武帝大笑曰誠如公言唐書文苑傳曰徐安貞開元中為中書舍人集賢學士每上屬文作手詔多令安貞視草風俗通曰光武中興以來五曹詔書題鄉亭壁歲輔正多有闕謬永建中兗州剌史過翔箋撰卷別改著板上一勞而九逸崔元始正論曰俚語曰州郡記如霹靂得詔書但挂壁永平中詔禁吏卒不得繫馬宮外樹為傷害其枝葉又詔今雒陽幘工作幘皆二尺五寸圍人頭各有大小不可同度此詔不可從也蔡質漢儀曰延熹中京師遊俠有盜發順帝陵者賣御物於市市長追捕不得周景以尺一詔召司隸校尉左雄詣臺與三日期擒賊曹植說灌均上事令曰孤前令寫灌均所上孤章三臺九府所奏事及詔書一通置之座隅孤欲朝夕諷詠以自警誡也語林曰明帝函封詔與庾公信誤致與王公王公開詔末云勿使冶城公知導既視表荅曰伏讀明詔似不在臣臣開臣閉無有見者明帝甚愧數月不能見王公鄴中記曰石虎詔書以五色紙著鳳鶵口中策蔡邕獨斷曰策者簡也禮云不備百文不書於策其制長二尺短者半之其次一長一短兩編下篆書起年月以命諸侯三公薨及以罪免悉以策書隋書曰諸王三公儀同尚書令五等開國太妃公主拜冊軸一枚長二尺以白練衣之用竹簡十二枚六枚與軸等六枚長尺二寸文出集書皆篆字哀冊贈冊亦同唐書曰劉迺字冰夷為司門員外崔祐甫秉政素與迺友善會加郭子儀尚父以冊禮久廢至是復行之祐甫令兩省官撰冊文未稱旨召迺至閣草之立就詞義典雅祐甫歎仰久之後唐書曰同光三年太常奏吳越王錢鏐冊禮案禮文用竹冊上優其禮勑以玉為之議者以玉冊帝王受命之重數不可假之非禮之宜也殷洪小說曰魏國初建潘勗字元茂為策命文自漢武已來未有此制勗乃依商周憲章唐虞辭義溫雅與典誥同風于時朝士皆莫能措一字勗亡後王仲宣擅名於當時時人見此策美或疑是仲宣所為論者紛紜及晉王為太傅臈日大會賓客勗子蒲時亦在焉宣王謂之曰尊君作封魏君策高妙信不可及吾曾問仲宣亦以為不如朝廷之士乃知勗作也誥尚書商書曰湯既黜夏命復歸于亳作湯誥又周書曰武王崩三監及淮夷叛周公相成王將黜殷作大誥又曰成王既伐管叔蔡叔以殷餘民封康叔作康誥又曰康王既尸天子尸主也主天子正號遂誥諸侯作康王之誥李充翰林論曰誡誥施於弼違後周書曰蘇綽自有晉之季文章競為浮華遂成風俗太祖欲革其弊因魏帝祭廟群臣畢至乃命綽為大誥奉行之其詞曰惟中興十有一年仲夏庶邦百辟咸會於王庭柱國洎群公列將罔不來朝時迺大稽百憲敷乎庶邦用綏我王度詞多不載自是之後文筆依此體三國典略曰周太祖太饗群臣史宮柳虬執簡書告於廟曰廢帝文皇帝之嗣子年七歲文皇帝託於安定公曰是子也才由公不孝不才亦由公勉之公既受茲重寄居元輔之任又納女為皇后遂不能訓誨有成致令廢黜負文皇帝付囑之意此咎非安定公而誰太祖乃令太常盧辨作誥喻公卿曰嗚呼我群后暨眾士維文皇帝以襁褓之嗣託於予訓之誨之庶厥有成而予罔能弗變厥心庸暨乎廢墜我文皇帝之志嗚呼茲咎予其焉避予實知之矧爾眾人心哉惟子之顏豈惟今厚將恐後世以予為口實唐書曰孫逖掌誥八年制勑所出為時流歎服議者以為自開元已來蘇頲齊澣蘇晉賈曾韓休許景先及逖為王言之最逖尤苦思文理精練晉史曰高祖令制誥之辭不得虛飾冗長必須陳其實行以正王言教尚書舜典曰帝曰契汝作司徒敬敷五教在寬春秋元命苞曰天垂文象人行其事謂之教教俲也言上為而下俲也文心雕龍曰教者俲也言出而民効也故王侯稱教昔鄭弘之守南陽條教為後所述乃事緒明也孔融之守北海文教麗而罕施乃治體乖也若諸葛孔明之詳酌庾稚恭之明斷並理得而詞中教之善也漢書曰京兆尹王遵出教令誡文心雕龍曰戒勑為文實詔之切者魏武稱作勑戒當指事而語勿得依違曉治要矣及晉武勑戒備告百官勑都督以兵要戒州牧以董司警郡守以恤隱勒牙門以禦衛有訓典焉戒者慎也禹稱戒之用休君父至尊在三同極漢高之勑太子東方朔之戒子亦顧命之作也及馬援以下各貽家戒班姬女戒足稱母師矣太公金匱曰武王曰五帝之誡可得聞乎太公曰黃帝曰余君民上搖搖恐夕不至朝故為金人三緘其口慎言語也東方生傳曰朔誡其子以上容應劭曰容身避容也首陽為拙柱下為工飽食安步以仕易農依隱玩世詭時不逢後漢書曰馬援兄子嚴敦並喜譏議而通輕俠客援在交阯還書誡之曰聞人之過失如聞親名耳可得聞而口不得言也好論人長短妄有善惡者寧死不願聞子孫有此行也龍伯高敦厚周慎謙約節儉吾愛之重之願汝曹效之杜季良豪俠好義憂人之憂樂人之樂有喪致客數郡畢至吾愛之重之不願汝曹效之效伯高不得猶為謹勑士所謂刻鵠不成尚類鶩者也效季良不得陷為天下輕薄子所謂畫虎不似反類狗也裴松之以為援此誡可謂切至之至不刊之訓矣杜恕家事戒曰張子臺視之似鄙樸人然其心中不知天地間何者為惡毅然如與陰陽合德作人如此富貴禍害何由而生陶淵明道誡曰夫天地賦命有生必有終自古賢聖誰能獨免汝輩既稚小不同生當思四海皆為兄弟之義鮑叔管仲分財無猜歸生伍舉班荊道舊遂能以此為成因喪立功它人尚爾況共父之人哉潁川韓元長漢末名士身處卿佐八十而終兄弟同居至于沒齒濟北汜雉春晉時操行人也七世同家人無怨色詩云高山仰止景行行止汝其慎哉顏延年廷詰云喜怒者有性所不能無常起於褊量而止於弘識然喜過則不重怒過則不威能以恬漠為體寬愉為器則為美矣大喜蕩心微抑則定甚怒煩性稍忍即歇故動無堡容舉無失度則為善也欲求子孝必先為慈將責弟悌務念為友雖孝不待慈而慈能植孝悌非期友而友亦立悌夫和之不備或應以不和猶信不足焉必有不信儻知恩意相生情理相出可使家有參差人皆由損枚叔有言欲人勿聞莫若勿為禦寒莫若重裘止謗莫若自脩論語云內省不疚何憂何懼
