body:
  text: 皇王部三十後周太祖文皇帝周書曰太祖文皇帝姓宇文氏諱泰字黑獺代郡武川人其先出自炎帝炎帝為黃帝所滅子孫遁居朔野有葛烏兔者雄武多筭略鮮卑慕之奉以為主遂揔總十二部落世為大人其後裔孫曰普回因狩得玉璽三紐有文曰皇帝璽普回異之以為天授其俗謂天子曰宇文因號宇文國并以為氏焉太祖德皇帝之少子也母曰王氏初孕五月夜夢抱子昇天纔不至而止寤而告德皇帝德皇帝喜曰雖不至天貴亦極矣魏孝昌二年燕州亂太宗始以統軍從爾朱榮征之先是北海王顥奔梁梁人立為魏王令率兵入洛魏孝莊帝出居河內以避之榮遣賀拔岳討顥仍迎孝莊帝太祖與岳有舊乃以別將從岳及孝莊帝反正以功封寧都子邑三百戶遷鎮遠將軍步兵校尉万俟上音墨下音其醜奴作亂關右孝莊帝遣泰朱天光及岳等討之太祖遂從岳入關先鋒破魏行臺尉遟菩薩等及平醜奴定隴右太祖功居多遷征西將軍金紫光祿大夫增邑三百戶加直閤將軍行原州事太常元年岳以太祖為左丞領岳府司馬加散騎常侍事無巨細皆委決焉表太祖為持節衛將軍夏州刺史魏永熙三年正月岳與侯莫陳悅討曹泥二月岳為悅所害四月太祖率輕騎臨悅軍悅大懼太祖統兵奮擊大破之悅遁走追及斬之魏帝遣著作郎姚幼瑜持節勞軍進太祖侍中驃騎大將軍開府儀同三司關西大都督洛陽縣公承制封拜使持節如故七月丁未從帝洛陽率輕騎入關太祖備儀衛奉迎謁見東陽驛八月齊神武襲陷潼關侵華陰太祖率諸軍屯霸上以待之齊神武留其將薛瑾守關而退太祖乃進軍襲瑾虜其卒七千還長安進位丞相冬十月齊神武推魏清河王亶子善見為主徙都於鄴是為東魏閏十二月魏孝武帝崩太祖立魏南陽王寶炬為嗣是為文皇帝大統十七年春三月魏文帝崩皇太子嗣位太祖以冢宰總百揆三年魏帝有怨言魏臨淮王育廣平五贊等垂泣諫之帝不聽於是太祖與公卿定議廢帝立齊王廓是為恭帝元年夏四月帝大饗群臣魏史柳虬執簡書告於朝曰廢帝文皇帝之嗣子年七歲文帝託於安定公曰是子也才由于公不才亦由于公公宜勉之公既受茲重寄居元輔之任又納女為皇后遂不能訓誨有成致令廢黜負文皇帝付囑之意此咎非安定公而誰太祖乃令太常盧辯作誥諭公卿曰嗚呼我群后暨眾士維文皇帝以襁褓之嗣託於子訓之誨之庶厥有成而予岡能弗變厥心庸暨乎廢墜我文皇帝之志嗚呼茲咎予其焉避予實知之矧爾眾人之心哉惟予之顏豈惟今厚將恐來世以子為口實乙亥魏帝詔封太祖子邕為輔城公憲為安城公邑各二千戶三年九月太祖有疾還至雲陽命中山公護受遺輔嗣子冬十月乙亥崩於雲陽宮還長安發喪時年五十二葬于成陵謚曰文公孝閔帝受禪追尊為文王廟曰太祖武成元年追為文皇帝孝閔皇帝後周書曰孝閔皇帝諱覺字陁羅尼太祖第三子也母曰元皇后大統八年生於同州七歲封略陽郡公時有善相者史元華見帝退謂所親曰此公子有至貴之相但恨其壽不足以稱之耳魏恭帝三年三月命為安定公世子十月乙亥太祖崩景子世子嗣位為太師大冢宰十二月丁亥魏帝詔以歧陽之地封帝為周公庚子禪位於帝元年春正月辛丑即天王位柴燎告天朝百官於路門追尊皇考文公為文王皇妣為文后大赦天下封魏帝為宋公帝性剛果見晉公護執政深忌之司會李植軍司馬孫恒以先朝佐命入侍左右亦疾護權重乃與宮伯乙弗鳳賀拔提等潛謀請帝誅護帝然之又引宮伯張先洛同謀先洛密白護護乃出植為梁州刺史恒為潼州刺史鳳等遂不自安更奏帝將召群臣入因此誅護先洛又白之時小司馬尉遲綱楤統宿衛兵謢乃召綱共謀廢立令綱入殿中詐呼鳳等論事既至以次執送護第並誅之綱乃罷禁兵帝方悟無左右獨在內殿令宮人持兵自守護又遣大司馬賀蘭祥逼帝遜位遂幽於舊邸月餘以弒崩時年十六護誅後謚曰孝閔皇帝陵曰靜陵明皇帝後周書曰世宗明皇帝諱毓小名統萬突太祖長子也母曰姚夫人永熙三年太祖臨夏州生帝於統萬城因以名焉大統十四年封寧都郡公十六年行華州事尋拜開府儀同三司宜州諸軍事宜州刺史魏恭帝三年授大將軍鎮隴右孝閔踐祚進位柱國轉歧州諸軍事歧州刺史治有美政黎民懷之及孝閔帝廢晉公護遣使迎帝於歧州秋九月癸亥至京師止於舊邸甲子群臣上表勸進備法駕奉迎帝固讓群臣固請是日即天王位大赦天下乙丑朝群臣於延壽殿武成元年春正月乙酉太師晉公護上表歸政帝始親覽萬機軍旅之事護猶總焉初改都督諸州軍事為揔管八月己亥改天王稱皇帝追尊文王為文皇帝大赦改元二年春正月癸丑朔大會群臣於紫極殿始用百戲三月辛酉重陽閣成會群公列將卿大夫及突厥使者於芳林園賜錢帛各有差夏四月帝因食遇毒庚子大漸辛丑崩於延壽殿時年二十七謚曰明皇帝廟稱世宗葬昭陵武皇帝後周書曰高祖武皇帝諱邕字祚羅突太祖第四子母曰叱奴太后大統九年生於同州有神光照室幼而孝敬聰敏有器質太祖異之曰成吾志者必此兒也年十二封輔城郡公孝閔帝踐祚拜大將軍出鎮同州世祖即位遷柱國授蒲州諸軍事蒲州刺史武成元年入為大司空治御正進封魯國公領宗師甚為世宗所親愛朝廷大事多共參議性沉深有遠識非因顧問終不輒言世宗每歎曰夫人不言言必有中武成二年世宗崩遺詔傳位於帝帝固讓百官勸進乃從之壬寅即皇帝位大赦天下保定元年春正月戊寅詔曰寒暑亟周奄及徂歲改元命始國之典章朕承寶圖宜遵故實可改武成三年為保定元年嘉號既新惠澤宜溥文武百官各增四級以大冢宰晉國公護為都督中外諸軍事四年十月詔大將軍大冢宰晉國公護率軍伐齊齊於太廟庭授以斧鉞於是護總大軍出潼關大將軍權景宣率山南諸軍出豫州少師楊摽出軹關天和元年正月大赦改元五月甲午詔曰道德交喪禮義嗣興褒四始於一言美三千於為敬是以在上不驕處滿不溢富貴所以長守邦國於焉乂安故能承天靜地和民敬鬼明並日月道合四時朕雖庸昧有志前古甲子乙邜禮云不樂萇弘表昆吾之稔杜蕢若怪切有楊觶音寘之文自世道喪亂禮儀紊毀此典茫然已墜于地昔周王受命請聞顓頊廟有戒盈之器室為復禮之銘矧伊末學而能忘此宜依是日有事停樂庶知為君之難為臣不易貽之後昆殷鑒斯在四年春正月辛卯朔廢朝以齊武成薨故也遣司會河陽公李綸等會葬於齊仍弔賻焉建德元年三月癸卯朔曰有蝕之齊遣使來聘景辰誅大冢宰晉國公護其子柱國潭國公會會弟大將軍莒國公至崇業公靜并柱國侯伏侯龍恩龍恩弟大將軍萬壽大將軍劉勇等大赦改元罷中外府二年秋七月己巳祠太廟自春末不雨至於是月壬辰集百寮於文德殿帝責躬罪已問以治政得失五年十月乙酉帝總戎東伐以越王盛為右一軍總管杞國公亮為右二軍總管隋國公楊堅為右三軍總管譙王儉為左一軍總管大將軍竇恭為左二軍總管廣化公丘崇為左三軍總管齊王憲陳王純為前軍六年春正月尉遟勒擒齊主及其太子恒於青州四月乙已至自東伐列齊主於前其王公等並從車轝旗幟及器物以次陳於其後大駕布六軍備凱樂獻俘於太廟京邑觀者皆稱萬歲戊申封齊主為溫國公宣政元年三月於蒲州置宮廢同州及長春宮甲戍初服常冠以皂紗為之加簪而不施纓道其制若今之折角巾也上大將軍郯國公王軌破陳師於呂梁擒其將吳明徹等俘斬三萬餘人五月己丑帝總戎北伐遣柱國平原公姬願東平公宇文紳舉等率軍五道俱入發關中公私馬驢悉從軍癸巳帝不豫止於雲陽宮丙申詔停諸軍事六月丁酉帝疾甚還京其夜崩於乘輿時年三十六謚曰武皇帝廟稱高祖葬孝陵宣皇帝後周書曰宣皇帝諱贇字乾伯高祖長子也母曰李太后武成元年生於同州保定元年五月景午封魯國公建德元年四月癸巳高祖親告廟冠於阼階立為皇太子詔皇太子巡撫西土文宣皇后崩高祖諒闇詔太子總朝政五旬而罷高祖每巡幸四方太子常留監國五年二月又詔皇太子巡西土因討吐谷渾宣政元年六月丁酉高祖崩戊戍太子即皇帝位尊皇后為皇太后大象元年春正月癸酉受朝於露門帝服通天冠絳紗袍群臣皆服漢魏衣冠大赦改元大成初置四輔官以上柱國大冢宰越王盛為大前疑相州總管蜀國公尉遟逈為大右弼申國公李穆為大左輔大司馬隋國公楊堅為大後丞二月辛已詔曰皇太子衍地居上嗣正統所歸遠憑積德之休允協無疆之祚帝王之量不肅而成天祿之期不謀已至朕今傳位於衍乃睠四海深合謳歌之望俾予一人高蹈風塵之表萬方兆庶知朕意焉可大赦天下改大成年為大象元年帝於是自稱天元皇帝所居稱天臺冕二十有四旒車服於鼓皆以二十四為節內史御正皆置上大夫皇帝衍稱正陽宮置納言御正諸衛等官皆准天臺尊皇太后為天元皇太后二年五月甲午夜帝備法駕幸天興宮乙未帝不豫還宮詔隋國公堅入侍疾己酉大漸御正下大夫劉昉與內史上大夫鄭譯矯制以隋國公堅受遺輔政是日帝崩於天德殿時年二十二謚曰宣皇帝葬定陵靜皇帝後周書曰靜皇帝諱衍後改為闡宣帝長子也母曰朱皇后建德二年六月生於東宮大象元年正月癸卯封魯王戊午立為皇太子二月辛巳宣帝於鄴宮傳位授帝居正陽宮二年夏五月乙未宣帝寢疾詔帝入宿於露門學已酉宣帝崩帝入居天臺廢正陽宮大赦天下停洛陽宮作大定元年春正月壬午詔曰朕以不天夙遭極罰光陰遄速遽及此辰窮慕纏綿言增號絕踰祀革號憲章前典可改大象三年為大定元年二月庚申大丞相隋王楊堅為相國總百揆備九錫之禮又加冕十有二旒建天子旌旗出警入蹕並依魏晉故事甲子隋王楊堅稱號帝遜於別宮隋氏奉帝為介國公邑萬戶車服禮樂一如周制上書不為表荅不稱詔有其文事竟不行開皇元年五月壬申崩時年九歲謚曰靜皇帝葬恭陵
