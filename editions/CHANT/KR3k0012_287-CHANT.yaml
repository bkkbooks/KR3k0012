body:
  text: 兵部十七機略五王隱晉書曰馬隆子咸為成都王前鋒統陸機攻長沙王乂於石橋將士器仗嚴利長沙王所統冠軍司馬王瑚率眾討咸咸堅不動瑚乃使數十騎下馬縛戟於馬鞍頭放令伺咸又使數十騎各刺所放馬馬驚奔咸軍軍即壞瑚因馳逐猛戰臨陣斬咸晉書毛寶傳曰時蘇峻送米万斛饋祖約約遣司馬桓撫等迎之寶告其眾曰兵法軍令有所不從豈可不上岸邪乃設變力戰悉獲其米又曰馬隆平泰原加赤幢曲蓋鼓吹隆奇謀間發夾道累礠石賊負鐵鎧行不得前隆卒先被犀甲無所留礙賊咸以為神也又曰衛瓘既囚鄧艾諸將圖欲劫艾整仗趨瓘營瓘輕出迎之偽作表草將申明艾事諸將信之而止又曰劉琨少負壯氣有縱橫之才善交勝己而頗浮誇與范陽祖逖為友聞逖被用與親故書曰吾枕戈待用志梟逆虜常恐祖生先吾著鞭其意相期如此在晉陽嘗為胡騎所圍數重城中窘迫無計琨乃乘月登樓清嘯胡賊聞之皆悽然長嘆中夜奏胡笳賊又流涕歔欷有懷土之切向曉復吹之賊棄圍而走又曰盧循自廣州南下戎卒十萬舩艫千艘討敗將軍劉毅于桑落逕至江寧循妹夫徐道覆素有膽決知𥙿已還欲乾沒一戰請於新亭白石焚舟而上數道攻之循多謀少決欲以萬全為討固不聽道覆曰我終為盧公所誤事必不成使我得為英雄主驅馳天下不足定也後循戰敗又曰王敦反敦既死以兄子應為嗣沈充自吳率眾萬餘人至與王含等合充司馬顧颺說充曰今日舉大事而天子已扼其喉情離眾沮鋒挫持疑猶豫必致禍敗今若決破柵塘因湖水灌京邑肆舟艦之勢極水軍之用此所謂不戰而屈人之兵上策也藉初至之銳并東南眾軍之力十道俱進眾寡過倍理必摧陷中策也轉禍為福因敗為成召錢鳳計事因斬之以降下策也充不能用颺逃歸于吳含復率眾渡淮蘇峻等逆擊大敗之充亦燒營而退既而周光斬錢鳳吳儒斬充並傳首京師又載記曰符登攻姚萇萇退還安定登就食新平留其大軍于胡空堡率騎萬餘圍萇營四面大哭哀聲動人萇惡之命三軍哭以應登登乃引退又曰河間王顒在關中遣將張方討長沙王乂方率眾自函谷入屯河南入遣左將軍皇甫啇拒之而敗張方率兵入洛陽又奉惠帝討方于城內方軍遙見乘輿於是引退方止之不得眾遂大敗方退壁于十二里橋人情挫衂無復固志或勸方夜遁方曰兵之利鈍是常貴因敗以為成耳我更前作壘出其不意此用兵之奇也乃夜潛進逼洛城七里人既新捷不以為意忽聞方壘成乂師乃戰遂大敗又曰石勒據襄國晉將王浚遣督護王昌及鮮卑叚就六眷末杯等部眾五萬餘以討勒時城隍未修乃築隔城重柵以待之就六眷屯于渚陽勒分遣諸將連出挑戰頻為六眷所敗又聞其大造攻具顧謂其將佐曰今寇來轉逼彼眾我寡恐攻圍不解外救不至內糧罄絕必敗不能固也吾將簡練將士大陣於野以決之何如諸將曰宜固守以疲寇彼師老自退追而擊之必剋張賓曰聞就六眷剋來月上旬送死北城今以我勢寡弱謂不敢出戰意必懈怠今叚氏種眾之悍末杯尤最其卒之精勇悉在末杯可勿復出戰示之以弱速鑿北壘為突門二十餘道候賊列守未定出其不意直衝末杯帳敵必震惶計不及設所謂迅雷不及掩耳末杯之眾既奔餘自摧散擒末杯之後王浚指揮而定勒納之即以孔萇為攻戰都督造突門于北城鮮卑入屯北壘勒候其陣未定躬率將士鼓譟于城上會孔萇督諸突門伏兵俱出擊之生擒末杯就六眷等眾遂奔散萇乘勝追擊枕屍三十餘里獲鎧馬五千疋就六眷收其遺眾屯于渚陽遣使求和送鎧馬金銀并以末杯三弟為質而請末杯諸將並勸殺末杯以挫之勒曰遼西鮮卑與我素無怨讎為王浚所使耳今殺一人結怨一國非計也放之必悅不復為浚用矣於是納其質而遣末杯就六眷等引還終獲其用又曰杜預以太康元年正月陳兵于江陵遣參軍樊顯尹林鄧圭襄陽太守周奇等率眾循江西上授以節度旬日之間累剋城邑皆如預策焉又遣牙門管定周旨伍巢等率奇兵八百汎舟夜渡以襲樂鄉多張旗幟起火巴山於要害之城以奪賊心吳都督孫歆震恐與伍延書曰北來諸軍乃飛渡江也吳之男女降者萬餘口旨巢等伏兵樂鄉城外歆遣軍出拒王濬大敗而還旨等發伏兵隨歆軍而入歆不覺直至帳下虜歆而還故軍中為之謠曰以計伐戰一當萬又曰劉牢之等討妖賊孫恩恩敗走虜男女二十餘萬口一時入海懼官軍之躡乃緣道多棄寶物子女時東土殷實粲麗盈目牢之等遽收歛故恩復得逃入海通典曰孫恩用此術獲免也又曰李矩守滎陽後趙石勒親率兵襲矩矩遣老弱入山令所在散牛馬因設伏以待之賊爭取牛馬伏發齊呼聲動山谷遂大敗之斬獲甚眾勒乃退又曰劉琨守太原遣將姬澹率眾十餘萬討石勒勒將拒之或諫曰澹兵馬精盛其鋒不可當宜深溝高壁以挫其銳攻守勢異必獲萬全勒曰澹眾大遠來體疲力竭犬羊鳥合號令不齊可一戰擒之何強之有寇已垂至胡可捨去大軍一動豈易中還若澹乘我之退顧走乃無暇焉得深溝高壘乎此為不戰而自滅亡之道立斬諫者以孔萇為前鋒都督令三軍後出者斬設疑兵於山上分為二伏勒輕騎與澹戰偽收眾而北澹縱兵追之勒前後伏兵夾擊澹軍大敗又載記曰前燕慕容廆封略漸廣廆胡罪切據棘城晉平州刺史東夷校尉崔毖陰結高勾麗毖音祕及宇文叚回等謀滅廆以分其地遂同伐廆廆曰彼信崔毖虛說邀一時之利烏合而來耳既無統一莫相歸伏吾今破之必矣然彼軍初合其鋒甚銳幸我速戰若逆擊之落其計矣靖以待之必懷疑貳迭相猜防一則疑吾與毖譎而覆之二則自疑三國之中與吾有韓魏之謀者待其人情沮惑然後取之矣於是三國攻棘城廆閉門不戰遣使送牛酒以犒宇文大言於眾曰崔毖昨有使至於是二國果疑宇文同於廆也引兵而歸宇文悉獨官曰二國雖歸吾當獨兼其國盡眾逼城連營三十里廆簡銳士配子皝推鋒於前皝音晃子翰領精騎為奇兵從傍出直衝其營廆方陣而進悉獨官自恃其眾不設備見廆軍之至方率兵拒之前鋒始交翰已入其營縱火焚之眾遂大敗又曰蘇峻反攻剋石頭城據之以陶侃溫嶠率兵討之諸將請於查浦築壘監軍鄧岳曰查浦地下又在水南唯白石峻極崇固可容數千人賊來攻不便戮賊之術也侃從之夜立壘訖賊見壘大驚賊攻大葉侃將救之長史殷羨曰若大葉步戰不利則大事去矣但當急攻石頭峻必救之而大葉自解侃又從羨言峻果棄大葉救石頭諸軍與峻戰陵東侃督竟陵太守李陽部將彭伐斬峻於陣賊眾遂潰又曰妖賊孫恩北出海鹽劉裕為將築城于海鹽賊日來攻城城內兵力甚弱𥙿深獨慮之一夜偃旗匿眾若已遁者明旦開門使羸疾數人登城賊遙問𥙿所在曰夜已走矣信之乃率眾大上𥙿乘其懈怠奮擊大破之崔鴻十六國春秋曰北涼淚渠蒙遜率兵伐南涼禿髮傉檀傉奴沃切入其境徙數千戶而還傉檀追及蒙遜于窮泉蒙遜將擊之諸將皆曰賊已安營不可犯也蒙遜曰傉檀謂吾遠來疲弊必輕而無備及其壘壁未成可一鼓而滅進擊敗之乘勝至于姑臧夷夏降者乃數千戶傉檀懼請和之而歸又曰前燕將慕容垂討丁零翟釗于滑臺次于黎陽津釗於南岸拒守垂徙營就西津為牛皮舡百餘艘載疑兵列仗泝流而上釗先以大眾備黎陽見垂向西津乃棄營西拒垂潛遣其桂林王慕容鎮率驍騎於黎陽津夜濟壁于河南釗聞而奔士眾疲渴走歸滑臺釗攜妻子率數百騎北趣白鹿垂遣追擊盡擒其眾又曰後燕慕容盛據遼東其遼西太守李朗陰引後魏軍上表請發兵以拒寇盛曰此必詐也召其使而詰之果驗盡滅其族遣將李旱率騎討之師次建安召旱旋師朗聞其家被誅也擁二千餘戶以自固及聞旱中路而還謂有內變不復為備留其子養守令又迎魏師于北平旱候知之襲剋令友遣禆將追朗及于無支斬之盛謂群臣曰前以追旱還者朗新為叛逆必忌官威一則鳩合同類劫害良善二則亡竄山澤未可卒平故非意而還以盈怠其志卒然掩之必剋之理也群臣皆曰非所及也又曰前秦符堅陷襄陽晉將桓沖攻之堅將慕容垂等率步騎五萬救襄陽以石越為前鋒次于沔水垂越夜命三軍人持火拒於樹枝光照數里沖懼退還又曰後趙石勒將石季龍太掠陳蔡間而去留將桃豹守譙城住西臺東晉將祖逖遣將韓潛等鎮東臺同一大城賊從南門出入放牧逖軍開東門相守四旬逖以布囊盛土如米狀使千餘人運上臺又令數人擔米偽為疲極而息於道賊果逐之皆棄擔而走賊既獲米謂逖士眾豐飽而胡戎飢久益懼無復膽氣又曰後涼呂光遣將呂延伐西秦乞伏乾歸大敗之乾歸因大泣歎曰死中求生正在今日也乃縱反間稱乾歸東奔成紀呂延信之引師輕進延司馬耿雅諫曰乾歸雄勇過人權略難測破王廣剋楊定皆羸師以誘之雖蕞爾小國蕞左外切亦不可輕也困獸猶鬥况乾歸而可覩風自散乎今宜部陣而前步騎相接徐俟諸軍大集可一舉滅之延不從戰敗死之又曰北涼沮渠蒙遜伐西涼李士業於酒泉先攻浩舋浩音閤舋音門虵盤於帳前蒙遜笑曰前一為騰虵今盤在吾帳天意欲吾廻師燒攻具而還次于川巖聞李士業徵兵欲攻張掖蒙遜曰入吾計矣但恐聞吾廻軍不敢前也兵事尚權乃露布西境稱得浩舋將進軍黃谷士業聞而大悅進入都瀆澗蒙遜潛軍逆之敗士業于懷城遂進剋酒泉又曰南涼禿髮傉檀守姑臧後秦姚興遣將姚弼等至於城下傉檀驅牛羊於野弼眾採掠傉檀分擊大破之又曰前燕慕容儁已剋幽薊至于冀州冉閔帥騎拒之與儁將慕容恪相遇於魏昌閔將董閏言於閔曰鮮卑乘勝勁不可當也請避之以溢其氣然後濟師以擊之可以捷也閔怒曰吾成師以出將平幽州斬慕容儁今遇恪而避之人將侮我矣閔威名素振燕眾咸憚之恪謂諸將曰閔勇而無謀一夫之敵耳雖有甲兵不足擊也吳今分為軍三都掎角以待之閔性輕銳又以吾軍勢非敵必出萬死衝吾中軍吾今貫甲厚陣以俟其至諸軍但勵卒從傍須其戰合夾而擊之必剋閔與恪遇十戰皆敗之恪乃以鐵鎖連馬簡善射鮮卑勇而無剛者五千方陣而前閔乘駿馬左杖雙刀右執鉤戟順風擊之斬鮮卑三百餘級俄而燕騎大至圍之數周閔眾寡不敵躍馬潰圍東走行二十餘里為恪所擒
