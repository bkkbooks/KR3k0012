body:
  text: 天部十三雷釋名曰雷者如轉物有所硠音郎雷之聲也說文曰霆雷餘聲鈴鈴所以挺出萬物易曰雷電皆至豐君子以折獄致刑又曰震為雷又曰動萬物者莫疾乎雷又曰鼓之以雷霆又曰洊慈見反雷震君子以恐懼脩省又曰震來虩虩許逆反又曰雷出地奮豫先王以作樂崇德又曰雷電噬嗑先王以明罰勑法又曰雲雷屯君子以經綸又曰雷在地中復先王以至日閉關啇旅不行后不省方又曰天地解而雷雨作雷雨作而百果草木皆甲坼又曰震驚百里驚遠而懼邇也又曰雷以動之又曰雷雨之動滿盈又曰雷風不相悖又曰雷風相薄又曰澤中有雷隨書曰納于大麓烈風雷雨弗迷詩曰殷其雷在南山之陽又曰虺虺其雷禮曰仲春日夜分雷乃發聲先雷三日奮木鐸以令兆民曰雷將發聲有不戒其容止者生子不備必有凶災主戒婦人有娠者止猶動靜又曰君子若有疾風迅雷甚雨則必變雖夜必興衣服冠而坐謂敬天之怒又曰秋分之日雷乃收聲傳曰藏冰以時則雷出不震棄冰不用則雷不發而震穀梁傳曰陰陽相薄感而為雷激而為霆爾雅曰疾雷為霆郭璞注曰疾雷謂雷音急激者論語曰迅雷風烈必變京房易傳曰當雷不雷陽德弱也又曰五星占雷電殺人何雷天拒難折衝之臣民也君承用節度即雷以節暴人威福則雷電殺人易妖占曰天冬雷地必震教令撓則冬雷民饑書洪範曰雷於天地為長子以其首長萬物與其出入也雷出地百八十三日而復入入則萬物入入地百八十三日而復出出則萬物亦出此其常經也又曰秦二世元年天無雲而雷雷陽也雲陰也有雲然後有雷象君臣也故雲雷相託陰陽之合也今二世不恤人人臣叛之故無雲而雷也又曰凡大風雷雨為不敬也又曰春後十日雷乃發聲又曰正月雷微動而雉雊又曰夫雷人君象也入能除害出能興利尚書中候曰秦穆公出狩天震大雷下有火化為白雀御丹書集公車大戴禮夏小正曰雷震雉鳴雊鼓其翼也正月必雷雷不必聞唯雉必聞之春秋元命包曰陰陽合為雷春秋合誠圖曰軒轅星主雷雨之神論語讖曰雷震百里聲相附宋均注云雷動百里故因以制國也雷聲謂諸侯之政教所至相附也史記曰高祖母劉媼常息大澤之陂夢與神遇是時雷電晦冥太公往視見蛟龍於其上已而有娠遂孕高祖漢書曰迅雷妖風怪雲變氣此皆陰陽之精本在地而上發於天續漢書曰桓帝建和三年六月乙卯雷震憲陵寢屋是時梁太后聽兄冀誅李固杜喬晉書曰晉人王襃母生時畏雷襃至母終後天雷輒還遶墓曰褒在此褒在此齊書曰永明八年六月十日晡時雷有黃光照地狀如金色占曰人君有德或謂之榮光周斐汝南先賢傳曰蔡順母平生畏雷自亡後每有雷震順輒環塚泣曰順在此韓詩外傳曰東海之上有勇士曰菑丘訢音忻以勇游於天下過神淵飲馬沉訢去朝服拔劍而入三日三夜殺二蛟一龍而出雷神隨而擊之十日十夜眇其左目王歆孝子傳曰笁彌字道綸父生時畏雷每至天陰輒馳至墓伏墳哭有白兔在其左右搜神記曰義興人周永和出行因日暮路旁小屋中有女子留宿一更後有喚阿香女應諾官喚汝推雷車女遂辭周云有官事須去俄而大雷既明周自異其處返尋唯見一新冢冢只有馬跡東方朔神異記曰八方之荒有石鼓其徑千里撞之其音即雷也天以此為喜怒之威盛弘之荊州記曰朝陽縣樊重母畏雷為母立石室以避之悉以文石為階砌至今猶存孟奧北征記曰凌雲臺南角一百步有白石室名避雷室又曰臨賀有石方二丈石有磨刀斧跡春夏常明凈其跡甚新秋冬則苔穢故為雷公磨石莊子曰陰陽交爭為雷文子曰夫目察秋毫之末耳不聞雷霆之聲耳調金石之音目不見太山之形小有所志必大有所忘曾子曰陰陽之氣俱則雷淮南子曰陰陽相薄感而為雷又曰蔭不祥之木為雷霆所撲又曰庶女叫天雷電下擊景公臺殞支體傷折海水大出庶賤之女齊之少寡婦人也無子不嫁事姑謹敬姑無男有女女利母財令母嫁婦婦終不肯女殺母以誣寡婦婦不能自明冤結叫天天為作雷電下擊景公之台殞壞之也傷毀景公支體水為之溢又曰雷霆之聲可以鍾鼓寫也風雨之變可以音律和也抱朴子曰雷天之鼓也鶡冠子曰昔者有道之君取政非取於耳目也夫耳之生聰目之生明兩葉蔽目不見太山兩豆塞耳不聞雷霆孫子曰擊電無停光疾雷無餘聲河圖帝通紀曰雷天地之鼓河圖曰玉虎晨鳴雷聲也又曰黃帝以雷精超六韜曰武王伐紂雨甚雷疾武王之乘雷震而死周公曰天不祐周矣太公曰君秉德而受之不可如何也伏侯古今注曰成帝建始四年無雲而風天雷如擊連鼓音可四五刻隆隆如車聲山海經曰羭音榆次之山有鳧名橐𩇯服之不畏電𩇯音肥匪備三音又曰飛魚如豚赤文無羽食之辟兵不畏雷師曠占曰春雷初起其音恪恪霹靂者所謂雄雷旱氣也其鳴依依音者不大霹靂者謂之雌雷水氣也又曰春分有音如雷非雷音在地中其所住者兵起其主無雲而雷名曰天狗行不出三年其國亡又曰初雷從金門起上旬旱下田熟一曰歲中兵華起也風俗通曰雷不蓋醬俗說令人腹中雷鳴世說曰曹爽將誅夢二虎衘雷公若二升捥放著庭中華陽國志曰曹公從容謂先主曰天下英雄唯使君與操爾本初之徒不足數也先主方食失匕箸會雷大震先主曰聖人言迅雷風烈必變良有以也一震之威乃可致此公亦悔失言酈炎對事曰或曰雷震驚百里何以知之炎曰以其數知之夫陽動為九其數三十六陰靜為八其數三十二一陽動二陰故曰百里雷雜兵書曰雷電霹靂破軍中樹木屋舍者徙去吉也雷電風所從來不可逆而相代宜慎之也物理論曰積風成雷王充論衡曰子路感雷精而生尚剛好勇親涉衛難結纓而死孔子聞而覆醢每聞雷鳴乃中心惻怛亦復如之故後人忌焉以為常也又曰盛夏之時雷電疾擊殺人謂之有陰過飲食不潔則天怒殺之隆隆之聲天怒之音也此虛言也道士劉春楚王英使食不潔春死必遇雷也建武四年六月夏雷擊會稽鄞魚巾反縣羊五頭羊有何陰過而雷擊之乎俗以為天取龍殺人罰陰過與取吉凶不同非實道也又曰圖畫之工圖雷之狀纍纍如連鼓形又曰一人若力士之容謂之雷公使之左手引連鼓右手推之世人信之莫不謂然始復原之虛妄之象也霹靂釋名曰霹靂析也震戰也所擊輒破若攻戰也說文曰震霹靂振物也穀梁傳曰震雷也爾雅曰疾雷為霆蜺郭璞曰雷之急激者為霹靂春秋繁露曰王言下不從則金不從革而秋多霹靂霹靂者金氣其音啇故應霹靂五經通義曰震與霆皆霹靂也晉安帝紀曰義熙二年六月震太廟鴟尾徹壁柱若有文字晉朝雜事曰元康七年霹靂破城南高禖中宮求子象也賈后將誅之應曹嘉之晉紀曰諸葛誕以氣邁稱常倚柱讀書霹靂震其柱誕自若列女後傳曰河南李叔卿為功曹應舉孝廉同時應人害之使婢宣言叔卿淫其寡妹同舉人詣尹以骨肉相奸不合應孝廉叔卿杜門自絕女妹傷被淫之名遂到府門自殺叔卿亦自殺明己無愆也後三年霹靂害叔卿者以其死屍置叔卿冢前其家收而葬之秋又雷發其冢玄中記曰玉門之西有一國國中有山山上有人歲歲出石䃡子林反數千輸廟中名曰霹靂䃡給霹靂用從春雷出䃡日減至秋而盡搜神記曰扶風楊道和於田中霹靂擊之道和以鋤格折其左肱遂落地不得去色如丹目如鏡毛角長三尺狀如六畜似獮猴續搜神記曰吳興人章荀者五月中於田耕以飯籮置菰裏晚於菰中伺之見一大虵偷其食荀即以鉟步悲反叉之蛇便走去荀乘船逐之至一坂有穴虵便入穴但聞號哭云人斫傷某甲或云當如何或云付雷公令霹靂殺奴須臾雲雨冥合震電傷荀荀於是跳梁大罵云天公我貧窮展力耕墾虵來偷食我飯罪在虵反來霹靂我是無知雷公若來今當以鉟斫汝腹破須臾雲雨輒開乃更霹靂向穴中諸蛇死者數十莊子曰陰陽錯行天地大駭於是有雷有霆劉義慶世說曰夏侯玄字太初嘗倚柱讀書時暴雨霹靂破所倚柱衣服焦然玄神色無變讀書如故異苑曰佛佛虜凶虐暴忍常自言國名佛佛則是佛中之佛尋被震而死既葬而後就冢中霹靂其柩引身出外題背四字表其凶逆之國也又曰滕放太元初夏枕文石枕臥忽暴雷雨震其枕枕四解傍人莫不怖懾而放微覺有聲不足為驚又曰元嘉十九年京口霹靂殺人赤字題臂世說曰王丞相見郭景純君可試為作一卦卦成郭意惡云公有震厄王問可有消伏理否郭曰公能命駕西出數里得一柏樹截短如公長置寢處災可消王悉依其語數日中果震柏樹碎門內子弟皆稱慶桓譚新論曰天下有鶴鳥郡國皆食之三輔俗獨不敢取之或雷霹靂起原夫天不獨左彼而右此殺鳥適與雷遇耳愽物志曰九真有貍牛出谿上或鬥岸上家牛皆怖或遮捕即霹靂號曰神牛山海經曰半石之山有草名曰嘉榮服之不畏霆不畏霹靂琴操曰楚高梁子出遊九皋之澤覽漸水之臺張罛置罟於荊山臨曲池而漁而疾風霣于敏反雹雷電奄冥天火四起霹靂下臻玄鶴翔其前白虎吟其后乃援琴而歌歎作霹靂引正論曰里語云州縣符如霹靂得詔書但桂壁電釋名曰電殄也乍見則殄滅也說文曰電陰陽激耀也從雨申聲易曰離為電又曰雷電皆至豐君子以折獄致刑詩曰燁燁震電禮記月令曰春分之日玄鳥至後五日雷乃發聲後五日始電傳曰隱九年三月癸酋大雨震電易稽覽圖曰陰陽和合為電輝輝也其光長春秋元命包曰陰陽激為電史記天官書曰電者陰陽之動也帝王世紀曰黃帝有熊氏母曰附寶有蝺音喬氏之女也見大電光繞北斗樞星照郊野感附寶而孕漢書李尋傳曰尋說王根曰窮見往者盛冬雷電潛龍為孽晉書曰王戎幼而穎悟神彩秀徹視日不眩裴揩目之曰戎眼爛爛如巖下電神異傳曰東王公與玉女杸壺誤而不接天為之笑開口流光今電是也漢武內傳曰西王母曰東方朔為太山仙官太仙使至方丈助三天司命朔但務山水遊戲擅弄雷電激波揚風風雨失時西京雜記曰董仲舒曰太平之世電不眴許絹反目宣示光輝而已莊子曰陰氣伏於黃泉陽氣上通於天陰陽分爭故為電文子曰腎為電主鼻曾子曰陰陽交則電抱朴子曰良將如收電可見不可追立如丘山可瞻不可動淮南子曰電以為鞭策電擊氣也物理論曰風清熱之氣散為電楚辭曰凌驚雷軼駭電揚雄河東賦曰奮電鞭驂雷輜鳴洪鍾違五旗張衡思玄賦曰凌驚雷之砊苦浪反磕苦大反兮弄狂電之淫裔傅玄詩曰童女製電夏侯孝若電賦曰攢雲間而飛火絳煙起於雲中曹毗霖雨詩曰紫電光牗飛迅雷終天奔顧愷之電賦曰天怒行凌雲赤光發李顒顧詩曰黮甚徒感黑反䨴徒對反重雲陰碎稜震電咤陟嫁反
