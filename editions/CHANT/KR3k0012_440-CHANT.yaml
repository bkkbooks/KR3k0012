body:
  text: 人事部八十貞女上毛詩曰漢廣德廣所及也文王之道被于南國美化行乎江漢之域無思犯禮求而不可得南有喬木不可休息漢有游女不可求思漢之廣矣不可泳思江之永矣不可方思又曰行露召伯聽訟也衰亂之俗微貞信之教興強暴之男不能侵陵貞女也誰謂雀無角何以穿我屋誰謂女無家何以速我獄雖速我獄室家不足又曰柏舟共姜自誓也衛世子共伯蚤死其妻守義父母欲奪而嫁之誓而弗許故作是詩以絕之也汎彼柏舟在彼中河髧彼兩髦實唯我儀之死矢靡它母也天只不諒人只禮記曰文伯之喪敬姜據其床而不哭曰昔者吾有斯子也吾以為將為賢人也吾未嘗以就公室今及其死也朋友諸臣未有出涕者而內人皆行哭失聲斯子也必多曠於禮矣夫穀梁傳曰宋災伯姬卒傳曰取卒之日加之災上者見以災卒也其見以災卒奈何伯姬之舍失火左右曰夫人少避火乎伯姬曰婦人之義傅母不在宵不下堂遂逮於火而死婦人以貞為行者也伯姬之義婦道盡矣詳其事賢伯姬也戰國策曰韓取聶正尸暴於市縣購之千金久之莫知誰子正姊聞之曰弟至賢愛妾之軀滅吾弟名非弟意也乃之韓視之曰勇哉今死而無名父母既沒矣弟兄無有此為我故也夫愛身不揚弟之名不吾忍也乃抱尸而哭之曰此吾弟軹深井里聶正亦自殺於尸旁晉楚齊聞之曰非獨聶正之能乃其姊者烈女也史記曰寡婦清其先得丹穴而擅其利數世家亦不訾寡婦能守其業用財自衛不見犯秦皇帝以為貞婦而容之袁宏後漢紀曰初弘農王唐姬故會稽太守唐瑁女也王薨父欲嫁之不從及關中破為李𠐶所略不敢自說也催欲妻之姬弗聽尚書賈詡聞之以為宜加爵號於是迎置於園拜為弘農王妃謝承後漢書曰曹節弟破石為越騎校尉越騎營五伯妻有美色破石從求之五伯不敢違妻執意不肯行遂自殺魚豢魏略曰龐毓外祖父為人所殺其二子弱不能報毓母載車出與仇家相逢於府門外乃拔刀下車手斫殺之州郡義其女人能如此縱而不問及毓長大節行又如此故令酒泉畫其母子儀像於廳壁而銘贊之謝靈運晉書曰劉曜王彌入于京都焚燒宮廟六宮幽辱愍懷太子妃拔刃距賊曰吾皇太子妃義不為逆胡所汙遂見害何法盛晉中興書曰張茂初起義討賊陳武一郡用全中宗初鎮召為掾屬中興累遷至太子右衛率出為吳國內史為沈充所殺茂妻陸氏散家財合義軍助國討充詣闕上書理茂忠節詔書褒歎追贈太僕卿鄧粲晉紀曰前始興太守尹虞起兵於巴陵日號監軍以討杜弢連戰稍勝遂進長沙為弢所沒初敗略虞二女皆國色也將妻之女不肯曰我父二千石終不為賊作婦有死而已及虞攻賊賊殺之又曰散騎常侍梁緯妻辛氏隴西人也劉曜欲妻之使人扶取因據地哭從者亦哭曜並殺之又曰廣平太守崔諒表政穀孰長崔希子休妻石氏年十餘歲為邦邑所宗既歸鄭氏為九族可重休前妻女少孤父希臨終庶子沉生是時漢未大亂希命棄之曰奈何使舅愛之至不存活乎寧割肌膚之恩以存顧援之命養沉乃前女力不兼舉九年之中三不舉子梁書曰王僧辨母貞敬太夫人夫人姓魏氏僧辨父神念以天監初董率徒眾據東關退保合肥漅胡西因娶以為室生僧辨性甚安和善於綏接家門內外莫不懷之初僧辨下獄夫人流淚徒行將謝罪世祖不與相見時貞惠世子有寵於世祖軍國大事多問焉夫人往詣閤自陳無訓涕泗嗚咽眾並憐之及僧辨免出夫人深相責勵辭色俱嚴云人之事君唯須忠烈非但保祐當世亦乃慶流子孫及僧辨剋復舊京功蓋天下夫人恒自謙損不以富貴驕物朝野咸共稱之謂為明哲婦人也崔鴻前秦錄曰符登妻毛氏毛與之女也善騎射營壘既陷猶彎弓跨馬率壯士數百與姚萇交戰殺賊七百餘人眾寡不敵為萇所執毛有姿色萇將納之毛罵曰天子皇后安可為賊羌所辱萇殺之崔鴻前趙錄曰陜有婦人十九嫠居事叔姑甚謹其家欲奪而嫁之此婦毀面自誓崔鴻後涼錄曰建中將軍遼東太守呂憲妻符氏年十五有姿色憲率自殺後涼錄曰初呂紹之死也美人敦煌張氏年十四為沙門清辯有姿色呂隆見而悅之遣中書郎裴敏說之張氏善言理敏為之屈隆親逼之張氏曰欽樂至法故投身道門且一辱於人誓不毀節今逼如此豈非命也昇門樓自投於地二脛俱折口誦佛經俄而卒又曰呂超殺纂纂后楊氏及侍婢數人殯纂于城西超問楊氏玉璽何在楊氏怒曰盡懷之矣楊氏國色也超將妻之謂父桓曰后若自殺禍及卿宗桓以言告楊氏楊氏曰大人本賣女與氐以圖富貴一之以甚可復使女辱于二氐乎桓不能強乃自殺後魏書曰經州貞女仙氏許嫁彭老生為妻幣娉既畢未成禮率行貞淑君貧常自汲以養父母老生輒往逼之女曰與君禮命雖畢二門多故未相見何由不稟父母擅見陵辱若茍行非禮正可身死耳遂不肯從老生怒而刺殺之取其衣服女尚能言臨死謂老生曰先身何罪與君相遇我所以執節自固者寧更有所邀政欲奉給君耳今反為君所殺若魂靈有知自當知報言終而絕老生持女衣服珠瓔至其叔宅以告叔叔曰此是汝婦奈何殺之天不祐汝遂執送官太和七年有司劾以死罪詔曰老生不仁侵陵貞淑原其強暴便可誅戮而女守禮履節沒身不移雖處草萊行合古跡宜賜美名以顯風操其摽墓旌善號曰貞女又曰勃海封卓妻彭城劉氏女也成婚一夕卓官於京師後以事伏法劉氏在家忽然夢想知卓已死哀泣不輟諸嫂喻之不止經旬凶問果至遂憤歎而死時人比之秦嘉妻中書令高允念其義高而名不著為之詩又曰平原鄃縣女子孫男王夫為零縣民所殺追執讎人男王欲自殺之其弟止而不聽男王曰女人出適以夫為天當親自復雪云何假人之手遂以杖敺殺有司處死以聞顯祖詔曰男王重節輕身以義犯法緣情定罪理可原其特恕之隋書曰楊慶王世充以兄女妻之署滎州刺史及世充將敗慶欲將其妻同歸長安其妻乃告之曰國家以妾奉箕箒於公者欲以申厚意結公心耳今叔父窮迫家國將危而公不顧婚姻孤負付囑為全家之計非妾所能責公也妾若至長安則公家一婢耳何用妾為願得送還君之惠也慶不許其妻遂沐浴靚粧飲藥而死慶遂歸大唐為宜州刺史又曰元務光母者范陽盧氏女也少好讀書造次以禮盛年寡居諸子幼弱家貧不能就學盧氏每親自教授勗以義方世以此稱之仁壽末漢王諒舉兵反遣將綦良往山東略地良以務光為記室及良敗慈州刺史上官政薄務光之家見盧氏悅而逼之盧氏以死自誓政為人凶悍怒甚以燭燒其身盧氏執志彌固竟不屈節又曰孝女王舜者趙郡王子春之女也子春與從兄長忻不協屬齊滅之際長忻與其妻同謀殺子春舜時年七歲有妹粲年五歲璠年二歲並孤苦寄食親戚舜撫育二妹恩義甚篤而舜陰有復讎之心長忻殊不為備姊妹俱長親戚欲嫁之輒拒不從乃密謂其二妹曰我無兄弟致使父讎不復吾輩雖是女子何用生為我欲共汝報復汝意如何妹皆垂泣曰唯姊所命是夜姊妹各持刀踰牆而入手殺長忻夫妻以告父墓因詣縣請罪姊妹爭為謀首州縣不能決高祖聞而嘉歎特原其罪又曰韓覬妻者洛陽于氏女也字茂德父寔周大左輔于氏年十四適于覬雖生長膏腴家門鼎盛而動遵禮度躬自儉約宗黨敬之年十八覬從軍戰沒于氏哀毀骨立慟感行路每至朝夕奠祭皆手自持及免喪其父以其幼少無子將嫁之誓無異志復令家人敦喻于氏晝夜涕泣截髮自誓其父喟然傷感遂不奪其志因飬夫之弟子世隆為嗣身自撫育愛同己生訓導有方卒能成立自孀居已後唯時或歸寧至親族之家絕不來往有尊卑就省謁者送迎皆不出戶庭蔬食布衣不聽聲樂以此終身又曰裴倫妻者河東柳氏女也少有風訓大業末倫為渭源令屬薛舉之亂縣城為賊所陷倫遇害柳時年四十有二女及兒婦三人皆有美色柳氏謂之曰我輩逢禍亂汝父已死我自念不能全汝我門風有素義不受辱於群賊我將與汝等同死如何其女等皆垂泣曰唯母所命柳氏自投于井其女及婦相繼而下皆重死於井中又曰趙元揩妻者清河崔氏之女也父儦在文學傳家有素範子女皆遵禮度元揩父為僕射家富於財重其門望厚禮以娉之元揩甚敬崔氏雖在宴私不妄言笑進止容服動合禮儀化及之反也元揩隨至河北將歸長安至滏口遇盜攻掠元揩僅以身免崔氏為賊所拘賊請以為妻崔氏謂賊曰我士大夫女為僕射子妻今日破亡自可即死遣為賊婦終必不能群賊毀裂其衣形體悉露縛於簀床之上將凌辱詐之曰人力已屈當聽處分不敢相違請解縛賊遽釋之妻因著衣取賊佩刀倚樹而立曰欲殺我任加刀鋸若欲覔死任來相逼賊大怒亂射殺元揩後得殺妻者支解之以祭崔氏之柩又曰鍾士雄母者臨賀蔣氏女也士雄仕陳為伏波將軍陳主以士雄嶺南酋帥慮其反覆每質蔣氏於都下及晉王平江南以士雄在嶺表欲以恩義致之遣蔣氏歸臨賀既而同郡虞子茂鍾文華等作亂舉兵攻城遣人召士雄士雄將應之蔣氏謂士雄曰我前在楊都備嘗辛苦今逢聖化母子藂集沒身不能上報烏得為逆哉汝若禽獸其心背德忘義者我當自殺於汝前士雄於是遂止蔣氏復為書與子茂等諭以禍福子茂不從尋為官軍所敗上聞蔣氏甚異之封為安樂縣君
