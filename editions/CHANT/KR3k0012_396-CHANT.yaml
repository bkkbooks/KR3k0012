body:
  text: 人事部三十六沐說文曰沐濯髮也毛詩淇澳伯兮曰自伯之東首如飛蓬豈無膏沐誰適為容大戴禮夏小正曰五月蓄蘭為沐浴禮記曲記上曰居喪之禮頭有瘡則沐又檀弓下曰石駘仲卒駘仲衛大夫也無適子有庶子六人卜所以為後者曰沐浴佩玉則兆五人皆沐浴佩玉石祁子曰孰有執親之喪而沐浴佩玉者乎不沐浴佩玉石祁子兆衛人以龜為有知又內則曰五日則燂湯請浴三日具沐左傳僖中曰初晉侯之奔豎頭須守藏者竊藏以逃文公出時盡用以求納之求納文公反入求見公辭以沐謂僕人曰沐則心覆心覆則圖反宜吾不得見也居者為社稷之守行者為羈紲之僕國君而讎疋夫懼者甚眾矣僕人以告公遽見之又僖下曰衛叔武將沐聞君至而喜捉髮走出前驅射而殺之公知其無罪枕股而哭之又哀下曰齊子我夕夕視事陳逆殺人逢之陳逆子行陳氏宗也子我逢之遂執以人執逆至朝陳氏方睦使疾而遺之潘沐備酒肉焉潘米汁可以沐頭論語憲問恥曰陳成子弒簡公孔子沐浴而朝請討之家語曰凡喪小功已上虞祔練祥之祭皆沐浴且祭日沐浴為齋潔也史記曰周公戒伯禽曰我文王之子武王之弟成王之叔於天下亦不賤矣然我一沐三握髮一飯三起以待士猶恐失天下之賢人漢書曰竇皇后弟廣國字少君四五歲時家貧為人所略上書自陳左右見問之曰姊去我西時與我訣傳舍中丐沐沐我飯我乃去后持之而泣也又曰鄧通愿謹不好外交雖賜沐浴不欲出於是文帝賜通巨萬又曰吳王遺諸侯書曰楚元王子淮南三王或不沐洗十餘年怨入骨髓言心有所懷志不在洗沐也欲壹有所出之久矣謂發兵也又曰張安世字子孺少以父任為郎用善書至給事尚書精力於職沐浴未嘗出又曰董賢每賜沐浴不肯出常留中視醫藥上以賢難歸詔令賢妻得通引籍殿中止賢廬又曰張蒼德安國侯王陵及貴父事陵陵死後蒼為丞相洗沐常先朝陵夫人上食然後敢歸家又曰孔光典樞機十餘年守法度修故事沐日歸休兄弟妻子燕語終不及朝省政事鄧粲晉記曰舂陵長易雄起兵討王敦欲活之使還邑舍洗沐眾人皆賀雄曰吾夢乘車掛肉其傍肉必有筋筋者斤吾其死也敦果刑雄晏子春秋曰景公之嬖妾嬰子死公守之三日不食不去左右晏子入曰育術客與醫俱言曰能生死者聞嬰子疾請治之公喜起曰病猶可為乎哉晏子曰客之通也使君潔沐浴飲食彼亦將有鬼神之事焉公曰諾屏而沐浴晏子令棺人歛之而復曰醫不能治病也歛矣不敢不以聞公作色不悅曰吾為君紿而已矣莊子曰孔子見老聃聃新沐被髮似非人孔子曰先生體若槁木似遺物乎老子曰吾遊物之初孔子出告顏淵曰丘之道其猶醯雞司馬彪注曰醯雞酒上蠛蠓韓子曰古諺曰為政若沐也雖有弃髮之勞而有長髮之利也又曰僖侯將沐湯中有礫問之曰當有人欲代湯者呂氏春秋曰昔者禹一沐而三捉髮一食而三起以禮有道之士淮南子曰湯沐具而蟣虱相吊大廈成而鷰雀相賀六韜曰文王聞殺崇侯虎歸至酆令具湯沐論衡曰子日沐令人愛卯日沐令人白頭案人之愛憎頭之白黑在乎自然但使嫫母子日沐能令人愛耶使十五童子卯日沐能令髮白耶世本曰秦穆公作沐異苑曰北海任詡字彥期從軍十年乃歸臨還握粟出卜師云非屋莫宿非食時莫沐詡結伴數十暮遇雷相庇於巖下竊憶非屋莫宿之戒遂負檐櫛沐巖崩壓停者悉死至家妻先與外人通情謀共殺之請以濕髮為識婦宵則勸詡令沐復憶非食時莫沐之忌收髮而止婦慚愧負怍乃自沐焉散髮同寢通者夜來不知婦也斬首而去楚辭曰浴蘭湯兮沐芳華采衣兮若英又漁父曰吾聞新沐者必彈冠新浴者必振衣安能以身之察察受物之汶汶乎浴說文曰浴洒身也禮記內則曰五日則燂湯請浴外內不共湢音逼浴湢浴室也禮記儒行曰儒有澡身而浴德常自清潔於身沐浴於德也左傳僖中曰晉公子重耳及曹曹共公聞其駢脅欲觀其祼浴薄而觀之又文下曰齊懿公之為太子也與邴歜之父爭田不勝及即位乃掘而刖之而使歜僕僕御納閻職之妻而使職參乘五月公游于申池二人浴于池歜以朴柣職朴箠柣擊職怒歜曰人奪汝妻而不怒一柣汝庸何傷職曰與刖其父而弗能病者何如乃謀殺懿公國語曰莊公將殺管仲齊使者請之而來以與使者比至三舋三浴之舋香薰也論語先進曰子路曾晢冉有公西華侍坐子曰點爾何如鼓瑟希鏗爾捨瑟而作對曰暮春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸夫子喟然歎曰吾與點也續漢書曰耿恭在䟽勒得出至王門唯餘十三人衣履穿決形容枯槁郎將鄭眾為恭以下沐浴易衣冠又曰靈帝時江夏黃氏之母浴化為黿入于深淵其後時時出見初浴簪一銀釵見猶在其首山海經曰大荒之中有淵正方四隅皆通言淵四海皆旁通北屬黑水南屬大荒北旁名曰少和之淵南旁名曰縱淵音烏懸反舜之所浴也言常在中澡洗莊子曰仲尼問於太史弢曰衛靈公為靈何也太史弢曰是固靈也靈公妻有三人同浴男女同浴此無禮也又曰鵠不日浴而白韓子曰燕人李季好遠遊其妻私通他人季忽歸私通者在內其妻令被髮直出門季曰何人耶妻曰無人季曰吾見鬼耶妻曰宣五牲屎浴季曰諾乃浴以狗屎說苑曰秦繆公見百里奚牛肥公曰牛何以肥對曰臣飲食之以時使之不暴有嶮先後之以身是以牛肥公知其君子令有司具沐浴為衣冠坐與語公大悅外國圖曰方江之上暑濕生男子三年而死有黃水婦人入浴出則乳矣去九嶷二萬四千里丘淵之征齊道理記曰朱靈城東有管寧舊宅宅前有水是寧常所澡浴處石虎鄴中記曰石虎金華殿後有虎皇后浴室三間徘徊及宇櫨枰隱起彤采刻鏤彫文粲麗四月八日九龍衘水浴太子之像又太武殿前溝水注浴時溝中先安銅籠䟽其次用葛其次用紗相去六七步斷水又安玉盤受十斛又安銅龜飲穢水出後腳入諸公主第溝亦出建春門東又顯陽殿後有皇后浴池上作石室引外溝水注之室中臨池上有石床世說曰桓車騎不好著新衣浴訖婦固送新衣桓冲也車騎大怒催使將去婦便持還傳語云衣不經新何由而故桓大笑而著之幽明錄曰桓溫內懷無君之心時比丘尼從遠來夏五月尼在別室浴溫竊窺之見尼祼身先以刀自破腹出五藏次斷兩足及斬頭手有頃浴竟溫問向窺見尼何得自殘毀如此尼云公作天子亦當如是溫惆悵不悅盥說文曰盥洒面也澡洒手也先洒足也尚書顧命曰盥以異同秉璋以酢太保以盥手洗異同實酒禮記內則曰子事父母雞初鳴咸盥漱又曰進盥少者奉槃長者奉水請沃盥盥卒授巾槃盛盥水者左傳僖中曰懷羸奉迤沃盥既而揮之懷羸怒曰秦晉疋也何以卑我後漢書曰劉寬簡略嗜酒不好盥浴澡手曰盥京師以為諺唐書曰虞世南受學於吳郡顧野王經十餘年精思不倦或累旬不盥櫛莊子曰陽子居遇老子老子中道仰天歎曰始以汝為可教也今不可也陽子居不荅至舍進盥漱巾櫛脫履戶外膝行而前曰向者弟子欲請問夫子夫子行不問今間矣請問其過管子曰冬日不盥非愛水也夏日不煬非愛火也為不適於身風俗通曰案里語厚哉鮑管探腸按腹不清然尚不盥何共財而生喜怒也游毛詩鄁柏舟谷風曰就其深矣泳之游之左傳莊公曰楚武王遷權於郍處使閻敖尹之及文王即位巴人叛楚而伐郍處取之遂于門楚閻敖游涌而逸敖既不能守城又游涌水而走莊子曰顏淵問於仲尼曰吾嘗遊乎觸深之淵津人操舟若神吾問焉曰操舟可學耶曰吾善游者數若乃夫沒人則未嘗見舟而便操之者也吾問焉而不吾告敢問何謂也仲尼曰善游者之數能忘水也若乃夫沒人之未嘗見舟而便操之也彼視淵陵視舟之覆猶其車卻也又曰孔子觀於呂梁懸水三十仞流沬三十里黿鼉魚鼈之所不能游也有一丈夫游之以為有苦而欲死者也使弟子並流而拯之數百步而出被髮行歌而遊於塘下孔子從而問焉曰蹈水有道乎曰吾無道吾始乎故長乎性成乎命與齊俱入與汨偕出從水之道而不為私焉此吾所以蹈水也呂氏春秋曰有道江上者見人方引嬰兒而投之江中嬰兒啼人問其故曰此其人父善游使其父雖善游其子豈遽能游之哉淮南子曰食水者善游而耐寒魚屬也萬震南州異物志曰合浦之人習水善游俛視增潭如猿仰株入如沉黿出如輕鳧蹲泥剖蚌潛竊明珠
