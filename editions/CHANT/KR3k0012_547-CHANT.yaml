body:
  text: 禮儀部二十五居喪禮記曲禮曰居喪未葬讀喪禮既葬讀祭禮喪復常讀樂章為禮各於其時居喪不言樂又曲禮曰居喪之禮頭有瘡則沐身有瘍則浴有疾則飲酒食肉疾止復初不勝喪乃比於不慈不孝勝任也又檀弓上曰穆公之母卒使人問於曾子曰如之何對曰申也聞諸申之父曰哭泣之哀齊斬之情麋粥之食自天子達又曰始死充充如有窮既殯瞿瞿如有求而弗得既葬皇皇如有望而弗至練而慨然祥而廓然子路有姊之喪可以除之矣而弗除也孔子曰何弗除也子路曰吾寡兄弟而不忍也孔子曰先王制禮行道之人皆弗忍也子路聞之遂除之子思哭嫂也為位禮雖無服為位而哭夫子善之曾子曰小功不稅追服為稅則是遠兄弟終無服也而可乎曾子曰喪有疾食肉飲酒必有草木之滋焉以為薑桂之謂曾子曰所云草木之滋者薑桂也又檀弓下曰子張問曰書云高宗三年不言言乃歡有諸時人君無行三年之喪禮者歡喜悅也言乃喜悅則民臣望其言久也仲尼曰胡為其不然也古者天子崩王世子聽於冢宰三年冢宰大官又曰顏丁善居喪顏丁魯人始死皇皇焉如有求而弗得及殯望望焉如有從而弗及既葬慨焉如不及其返而息此三者孝子哀慕之情也又檀弓曰孔子在衛有送葬者而夫子觀之曰善哉為喪乎足以為法矣小子識之子貢曰夫子何善爾也曰其往也如慕其反也如疑慕謂小兒隨父母啼呼疑者哀親之在後如不欲還然又檀弓上曰孔子既祥五日彈琴而不成聲哀未忘也十日而成笙歌踰月且異旬也祥者凶事用遠曰五日彈琴十日笙歌除由外也彈琴以手笙歌以氣也孔子與門人立拱而尚右二三亦皆尚右效孔子也孔子曰二三子之嗜學也我則有姊之喪故也二三子皆尚左又曰孟獻子禫縣而不樂比御而不入可以御婦人矣尚未復寢孟獻子魯大夫仲孫蔑也夫子曰獻子加於人一等矣加猶踰也又檀弓卞曰樂正子春之母死五日而食曰吾悔之勉強過禮子春曾子弟子自吾母死不得吾情我惡乎用吾情惡乎猶於何也又王制曰三年之喪自天子達下通庶人父母同也天子諸侯降其也於庶人喪從死者祭從生者又曾子問曰父母之喪弗除可乎以其有終身之憂也孔子曰先王制禮過時不舉非禮也非不能勿除也患其過制也故君子過時不祭禮也又雜記曰凡喪服未畢有弔者則為位而哭拜踊客始來主人不可以殺禮待之大夫之哭大夫弁絰大夫與殯亦弁絰弁絰者大夫錫衰相弔之服也如爵弁而素加環絰曰弁絰大夫有私喪之葛則於其兄弟之輕喪亦弁絰又曰有父之喪如未沒喪而母死其除父之喪也服卒事反喪服沒猶竟也除服謂詳祭之服也卒事既祭反喪服服後死者之服雖諸父昆弟之喪如當父母之喪其除諸父昆弟之喪也皆服其除喪之服卒事反喪服雖有親之大喪猶為輕服者除骨肉之恩也唯君之喪不除私服言當者期大功之喪或終始皆在三年之中小功緦麻則不除殤長中乃除又曰子貢問喪子曰敬為上哀次之瘠為下顏色稱其情戚容稱其服問喪問居父母之喪也喪常哀言敬為上者疾時尚不能敬也容威儀也孝經曰容止可觀請問兄弟之喪子曰兄弟之喪則存乎書策矣言䟽者如禮行之未有和也齊斬之喪哀容之體經不能載矣君子不奪人之喪重喪禮也亦不可奪喪也不可以輕之於己也孔子曰少連大連善居喪三日不怠三月不懈其悲哀三年憂東夷之子也言其生於夷狄而知禮也怠惰也解倦也又曰三年之喪言而不語對而不問廬堊室之中不與人坐焉在堊室之中非時見乎母也不入門言己事也為人說為語在堊室之中以時事見乎母乃後入門則居廬時不入門䟽哀皆居堊室不廬廬嚴者也言廬哀敬之處非有其實則不居又雜記曰懸子曰三年之喪如斬朞之喪如剡言其痛之惻怛有淺深也期之喪十一月而練十三月而祥十五月而禫曾申問於曾子曰哭父母有常聲乎曰中路嬰兒失其母焉何常聲之有又間傳曰斬襄何以服苴惡貌也所以首其內而見諸外也斬襄貌若苴齊襄貌若枲大功貌若止小功緦麻容貌可也此哀之發於容體者也有大憂者面必黎黑止謂不動於喜樂之事也枲或為似斬襄之哭若往而不反齊襄之哭若往而反大功之哭三曲而偯小功緦麻哀容可也此哀之發於聲音者也三曲聲而二折斬襄唯而不對齊襄對而不言大功言而不議小功緦麻議而不及樂此哀之發於言語者也議謂陳說非時事也斬襄三日不食齊襄二日不食大功三不食小功緦麻再不食三不食為明旦朝也再不食謂如死一不食始歛時一不食也故父母之喪既殯食粥朝一溢米暮一溢米齊襄之喪蔬食水飲不食菜果大功之喪不食醯醬小功緦麻不飲醴酒此哀之發於飲食者也父母之喪既虞卒哭蔬食水飲不食菜果期而小祥食菜果又朞而大祥有醯醬中月而禫禫而飲酒始飲酒者先飲醴酒始食肉者先食乾肉父母之喪居倚廬寢苫枕塊不脫經帶齊襄之喪居堊室芐翦不納大功之喪寢有席小功緦麻床可也此哀之發於居處者也又奔喪曰聞遠兄弟之喪既除喪而后聞喪免𥘵成踊拜賓則尚左手小功緦麻下稅者也雖不服猶免祖尚左手吉拜也又問喪曰親始死雞斯徒跣扱上袵交手哭惻怛之心痛疾之意傷腎乾肝焦胰水漿不入口三日不舉火故鄰里為之糜粥以飲食之親父母也雞斯當為笄笄聲之謨也親始死去冠二日乃去笄纚括髮也今時始喪者邪中貊頭笄纚之存象也又喪服四制曰父母之喪襄冠繩纓管屨履三日而食粥三月而沐期十三月而練冠三年而祥比終茲三節者仁者可以觀其愛焉知者可以觀其理焉強者可以觀其志焉又三年問曰三年之喪何也稱情而立文因以飾群別親踈貴賤之節而弗可損益也故曰無易之道稱情而立文者稱人情輕重而制其禮也創鉅者其日久痛甚者其愈遲三年者稱情而立文所以為至痛極也斬襄苴杖居倚廬食粥寢苫枕塊所以為至痛飾也三年之喪二十五月而畢哀痛未盡思慕未忘然而服以是斷之者豈不送死有已復生有節也哉凡生天地之間者有血氣之屬必有知有知之屬莫不知愛其類今是大鳥獸則失喪其群匹越月踰時則必返巡過其故鄉廻翔焉鳴號焉躑䠱焉踟躊焉然後乃能去之小者至於鷰雀猶有啁噍之頃焉然後乃能去之故有血氣之屬者莫知於人於其親也至死不窮則三年之喪二十五月而畢若駟之過隙然而遂之則是無窮也故先王為之立中制節壹使足以成文理則釋之矣立中制節謂服紀使有年月之限者也然則何以至朞也言三年之義如此則何以有降至於朞者父在父在為母服朞止曰至親以期斷是何也曰天地則已易矣四時則已廢矣其在天地之中者莫不更始焉以是象之也然則何以三年也曰加隆焉爾也焉使倍之故再朞也喪三年以為隆緦麻小功以為殺雖情不至制以此服所以立法期九月以為間間之在三年之下緦麻小功上也隨情輕重處之上取象於天下取法於地中取則於人人之所以群居和壹之理盡矣取象於天地所謂法其變易也自三年以至緦麻皆歲時之數左氏傳襄上曰晏桓子卒晏纓麤縗斬斬不緝也麤三升布苴經帶杖菅屨苴麻之有子者菅草履也食粥居倚廬寢苫枕草此禮與士禮略同此異唯枕草其老曰非大夫之禮時之所行土及大夫纕服各有不同晏子時為大夫行士禮其家臣不解故機曰唯卿為大夫家語曰子夏問曰居君子之母與妻之喪如之何孔子曰居處言語飲食侃爾於喪所則稱其服而已敢問伯叔母如之何曰伯母叔母䟽襄朞踊不絕地姑姊妹之功踊絕於地若知此者由文矣哉由文矣哉言知禮之意也南史曰王秀字伯奮幼時祖父敬弘愛其風采仕宋為太子舍人父卒廬於墓側服闋復職梁書曰到溉遭母憂居喪盡禮所處廬開方四尺毀瘠過人服闋猶蔬食布衣者累載又曰孔奐為儀曹侍郎遭母憂時天下喪亂皆不能終三年喪唯奐及吳國張種在寇亂中守法度並以孝聞奔喪禮記奔喪曰奔喪之禮始聞親喪以哭荅使者盡哀問故又哭盡哀遂行日行百里不以夜行唯父母之喪見星而行見星而舍侵晨冒昏行者蓋欲從速若未得行則成服而後行過國至境哭盡哀而止哭避市朝望其國境哭至於家入門左升自西階殯東西面坐哭盡哀括髮祖奔母之喪西面哭盡哀括髮祖降堂東即位西卿哭皆如奔父之禮下堂東至孝子堂所住處婦人奔喪升自東階殯東西面坐哭盡哀東髽即位與主人拾踊拾更也主人與之更踊盡哀而哭者賓客待之也又曰奔喪者不及殯先之墓北面哭盡哀主人之待之也即位於墓左婦人墓右成踊盡哀括髮柬即主人位絰絞帶哭成踊拜賓及位成踊又曰若所為位家遠則成服而往齊襄望鄉而哭大功望門而哭小功至門而哭緦麻即位而哭奔喪哭親䟽遠近之差也訃告禮記雜記上曰凡訃於其君曰君之臣某死訃或作赴赴至也臣死其子使人至君所告也父母妻長子曰君之臣某之某死此臣於其家喪所主者君訃於他國之君曰寡君不祿敢告於執事夫人曰寡小君不祿太子之喪曰寡君之適子某死君夫人不稱薨告也國君謙也大夫訃於同國敵者曰某不祿訃於士亦曰某不祿訃於他國之君曰君之外臣寡大夫某死訃於敵者曰吾子之外私寡大夫某不祿使某實敵謂有爵者實當為至也士訃於同國大夫曰某死訃於士亦曰某死訃於他國之君曰君之外臣某死訃於大夫曰吾子之外私某死於士亦曰吾子之外私某死白虎通曰天子崩訃告諸侯者何緣臣子哀痛憤蒲無能不告諸人者也諸侯欲聞之當持土地所出以供喪事故禮曰天子崩遣使者訃告諸侯又曰諸侯薨使臣歸瑞珪於天子者何諸侯以瑞珪為信今死矣嗣子諒闇歸之者讓之義也天子聞諸侯薨哭之何慘怛發中哀痛之至也使大夫弔之追遠重終之義又曰臣死亦訃告君何此君哀痛於臣子也君欲聞之當加賻賵之禮故春秋曰蔡侯考父卒卒訃而葬不告諸侯薨訃告鄰國何緣鄰國欲有禮也奪情禮記曾子問曰子夏問三年之喪卒哭金革之事無避也禮與初有司與疑有司使之然孔子曰夏后氏三年之喪既殯而致事殷人既葬而致事致事還其職位於君記曰君子不奪人之親亦不可奪親也此之謂乎子夏曰金革之事無避也者非與孔子曰吾聞諸老聃曰昔魯公伯禽則有為為之今以三年之喪從其利者吾不知也東觀漢記曰桓焉為大傳以母憂自乞聽以大夫行踰年詔賜牛酒奪服即拜光祿大夫遷太常後漢書曰耿恭征踈勒時母卒及還追行喪制有詔使五官中郎將齎牛酒釋服奪情不令追服又曰趙喜代虞延行太尉事遭母憂上䟽乞身行喪禮顯宗不許遣使者為釋服賞賜思寵甚渥漢雜事曰翟方進為丞相遭後母喪行服三十六日起視事曰不敢踰國家也吳志曰孫權詔曰夫三年之喪天下達制人情之極痛也賢者制哀以從禮不肖勉而致之也治道已泰上下無事君子不奪人情故三年逮孝子之間至於有事則殺禮以從宜要絰而處事故聖人制法有禮無時不行喪不奔非古也蓋隨時之宜以義斷恩也前故設科長吏在官當須交代而故犯之雖隨糺坐猶以廢曠方事之殷國家多難凡在官司宜各盡節先公後私而不恭承甚非謂也中外群僚其更平議務令得中節度丞相顧雍奏從大辟其後吳令孟宗喪母奔赴已而自拘於武昌以聽刑戮陸遜陳其素行因為之請減宗等後不得以為比自此遂絕風俗通曰謹案禮臣有大喪三年不呼其門
