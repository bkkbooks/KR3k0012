body:
  text: 珍寶部十一銀周禮夏官下曰正南曰荊州其利丹銀爾雅曰白金謂之銀其美者謂之鐐郭璞曰遼音也孝經援神契曰神靈滋液有銀甕不汲自滿史記封禪書曰殷得金德銀山溢蘇林注曰溢出又曰蓬萊方丈瀛州此三神山黃金白銀為宮闕又大宛傳曰安息國以銀為錢錢如其王面王死輒更錢放王面焉又曰舜為父母淘井將銀錢安鑵中與父母漢書曰王莽時珠堤銀重八兩一流直千五百八十張晏曰珠堤縣名屬犍為出銀池銀一流直千是為銀貨又西域傳曰無雷國出銀司馬彪續漢書曰大秦國以金錢為錢十銀錢當一金錢魏志曰郭脩手刃蜀大將軍費褘追加襃寵諡曰威侯子龍加爵拜奉車都尉賜銀千餅魏武上雜物䟽曰御物中宮貴人公主皇子純銀漆帶鏡一枚西貴人純銀參帶五皇子銀匣壹皇子雜用物十六種純金參帶方嚴四具又曰御物及貴人公主皇子有純銀香爐也魏志曰穢國男女繫銀廣數寸以為飾蜀志曰先主平蜀賜諸葛亮等銀千斤吳志曰孫皓時言掘地得銀長一寸廣一分刻上有年月於是改年為天策又曰婁圭為劉表所圍圭飲食健兒數百人人賜銀一斤使擊表晉故事曰成帝咸康元年有司奏上元給賜眾官銀檢金部見銀一萬五千兩充給宋起居注曰廣州刺史韋朗鏤銀銘二枚齊書曰明帝每存儉約欲鑄壞太官元日上壽銀酒鎗尚書令王晏等咸稱盛德蕭頴胄曰朝廷盛禮莫過三元此一器既是舊物不足侈帝不悅後預曲宴銀器滿席頴胄曰陛下前欲壞酒鎗恐宜移在此器也帝甚慚南史曰梁季直丹陽和陵人也祖愍祖宋廣州刺史父景仁中散大夫季直早慧愍祖甚愛異之嘗以四函銀列置於前令諸孫各取其一季直時年四歲獨不取曰若有賜當先父伯不應度及諸孫故不取愍祖益奇之陳書曰周文育從南海出至大庾嶺遇卜者卜之曰君北下不過作令長南入則為公侯又當暴得銀二千兩若不見信以此為驗其夕宿於逆旅有賈人求與文育愽文育勝之得銀二千兩旦遂卻入嶺南崔鴻十六國春秋前趙錄曰聰引帝入讌語帝曰卿為豫章王時贈朕柘弓銀研卿頗憶不曰臣安敢忘之但恨爾日不得早識龍顏又後趙錄曰大武殿室皆銀楹金柱後魏書曰銀出始興陽山縣又出桂陽陽安縣驪山有銀礦二石得銀七兩白登山亦有銀礦八石得銀七兩宣武帝詔並置銀宮每令探鑄又曰孝明皇帝開恒州銀山之禁與人共之又曰太武皇帝和平二年詔中尚坊作黃金合盤鏤以白銀鈿以玟珚唐書曰武德中方術人師市奴合金銀並成上異之以示侍臣封德彝進曰漢代方士及劉安等皆學術唯苦黃白不成金銀為食器可得不死又曰貞觀中治書侍御史權萬紀上言宣饒二州諸山大有銀坑採之極是利益每歲可得錢百萬貫上謂曰朕貴為天子是事無所少乏唯須嘉言善事有益於百姓者且國家賸得數百萬貫錢何如得一有才行人不見卿推賢進善之事又不能按舉不法震肅權豪唯只言稅鬻銀坑以利多為美昔堯抵璧於山投珠於谷由是崇名美號見稱千載後漢桓靈二帝好利賤士為近代庸暗之主卿遂欲將我比桓靈耶是日放令還第又曰太宗引杜淹為天策府兵曹參軍文學館學士常侍宴賦詩時有八人同作淹為稱首賜以銀鍾又曰貞觀中鴻臚奏高麗莫支離貢白金黃門侍郎禇遂良進曰莫支離虐殺其主九夷所不容陛下以之興兵將事弔伐為遼山之人報主辱之恥若受其貢何所致伐太宗納焉又曰元和十四年涇原節度使王潛進銀三千兩熟線綾三千疋涇州密邇戎境其土無百姓其軍皆仰給度支舊矣至若無名上獻雖吳蜀沃富猶謂取諸人以干媚不免於譏責今則盜削軍實以充貢獻而求恩澤蓋以時急於財勢使然也又曰太和中尚書左丞王起進亡兄播銀胡瓶二百枚玉及通犀帶刀劍器杖等管子曰上有鈆者下有銀列子曰周穆王執化人之祛騰而上天暨化人之宮構以金銀絡以珠玉淮南子曰夫淇衛簬飾以銀錫有薄縞之憺不能獨穿也抱朴子曰銀但不及金玉服可地仙穆天子傳曰天子乃賜曹奴之人戲黃金之鹿銀麕今有地中得玉豚金狗之屬皆古者賂夷狄之奇貨又曰披圖視觀天子之寶器有燭銀銀青精光如燭山海經曰杻陽之山其陽多白銀郭璞曰即銀也少陽之山其下多赤銀銀之精者東方朔神異經曰南方有銀山長五十餘里高百餘丈皆悉白銀不雜土石不生草木東方朔十洲記曰東方外有東明山有宮焉左右闕而立其高百尺建以五色門有銀牓以青碧鏤題曰天地長男之宮南方有誾明山有宮焉有銀牓題曰天地中女之宮桓譚新語曰期門郎程偉好黃白事娶婦得怪女偉無衣為婦致兩疋繒後見夫方扇炭欲燒筒中水銀婦乃出其中藥以投之立成銀偉就求道不受發狂而死白虎通曰王者易姓而起必升封太山何報告之義或曰封金銀繩或曰石塗金銀繩封之以印璽瑞應圖曰王者宴不及醉刑罰中人不為非則銀甕出阬諶三禮圖曰牛鼎受一斛天子飾以黃金錯以白銀幽明錄曰徐琦每見一女子姿色甚美便解臂上銀鉿贈之列異記曰故司隸校尉上黨鮑子都少時上計掾於道中遇一書生獨行無伴卒得心痛子都下車為按摩奄忽亡不知姓名有書一卷銀十餅即賣一餅以殯斂其銀以枕之素書著腹上哭之謂曰若子魂靈有知當令子家知子在此今奉使命不獲久留遂辭而去吳越春秋曰禹登委山得五金簡青玉為字編以白銀異物志曰金鄰國去扶南二千餘里土地出銀異苑曰弘農楊子聞土中作聲掘得玉後三年有虵去梁上落糞皆成碎銀作器賣於市得者尋以破滅地鏡圖曰銀氣夜正白流散在地撥之隨手合又曰銀精變白雄雞酈元注水經曰潺水出潺山水源有金銀礦洗取火合之以成金銀南越志曰遂成縣任山銀沙自出外國事曰私呵調國王供養道人食日銀三兩任預益州記曰陶保至益州人飢米二合直銀一兩王韶之始興記曰冷君西北有小首山宋元嘉元年夏霖雨山崩自顛及麓崩處有光耀有若星辰焉居人往觀皆是銀鑠鑄得銀也又曰秋水源山盤石上羅列十甕皆蓋以青盆其中悉是銀餅人有遇之者但得開觀之不可取取輒迷悶晉太元初林驅家僕竊三餅有大虵傷而死其夜林驅夢神語曰君奴不良盜銀三餅已受顯戮願以銀相備驅覺奴死銀在其傍有徐道者自謂能致乃集祭酒盛奏章書擊鼓吹入山須臾雷震雨石倒樹折木道遂懼走湘州記曰曲江縣有銀山山多素霧廣州記曰廣州市司用銀易米遂成縣任山又有有銀砂桂陽記曰臨賀山有黑銀黃銀禮斗威儀曰君乘金而王則黃銀見隋書曰辛公義為牟州刺史時山東霖雨自陳汝至于滄海皆苦水災境內犬牙獨無所損山出黃銀獲之以獻詔水部郎婁崱就公義禱乃聞空中有金石絲竹之響唐書曰太宗嘗賜房玄齡黃銀帶顧謂曰昔如晦與公同心輔朕今日所賜唯獨見公因泫然流涕又曰如聞黃銀多為鬼神所畏命取黃金帶遣玄齡親送于靈所也水銀史記曰秦始皇葬以水銀為百川江河大海機轉相輪終而復始皇覽曰關東賊發始皇墓中有水銀廣雅曰水銀謂之澒吳越春秋曰闔閭葬墓中澒地廣六丈神仙傳曰封君達隴西人服鍊水銀年百餘歲常騎青牛世號青牛道士鈆尚書禹貢曰海岱惟青州岱畎絲枲鈆松怪石史記曰高漸離秦始皇矐其目使擊筑漸離乃以鈆置筑中舉筑朴秦始皇帝漢書曰江都王建宮人八子有過者輒令以鈆杵舂不中程輒掠廣川王去數召姬榮愛與飲後昭信譖之銷鈆灌其口中漢書曰或盜靡錢質而取鈆如淳曰或曰民盜靡漫面而其鈆以更鑄作錢東觀漢記曰曹襃寢則枕鈆范子計然曰黑鈆之錯化成黃丹丹再化之成水粉淮南子曰鈆不可為刀又曰鈆之與丹異類殊色而可以為丹者誠得數也抱朴子曰愚民不信黃丹及胡粉是化鈆所作桓子新論曰淮南王之子娉迎道人作為金銀又云字金與公鈆則金之公而銀者金之昆弟也茅君內傳曰取鈆十斤安鐵器中猛火燒之三沸投九轉之華一銖於鈆中攪之立成黃金神仙傳曰尹軌字公度有一人遭父喪當葬而貧窮汲汲公度過省之孝子說甚辛苦公度愴然曰卿假求數十斤鈆得否孝子言猶可得耳乃具一百斤公度將入前山中架小屋下於爐火中銷鈆以其所帶管中藥如棗大投沸鈆中攪之皆成好銀以與之告曰念卿貧困故以相與慎勿多言述異記曰河間有雨鈆城漢世天雨鈆地境圖曰草青莖赤秀下有鈆玄中記曰鈆錫之精為老婢錫周禮夏官中職方曰楊州其利金錫鄭玄曰錫鍋也爾雅曰錫謂之鈏周官考工記曰凡鑄金之狀金與錫黑濁之氣竭黃白次之黃白之氣竭青氣次之然後可鑄史記曰江南出柟梓薑桂錫連徐廣曰連音蓮鈆之未練者也淮南子曰明鏡之始照未見其容也及杚之以玄錫磨之以氈則鬚眉見山海經曰龍山之下多赤錫濯山多白錫愽物志曰積草三年燒之津液下流成錫越絕書曰赤菫山破而出錫吳越春秋曰越王允常聘歐冶子不能鑄鈆錫為干將神仙傳曰尹軌字公度嘗見一人本官族子弟仕郡遇公事簿書不了當備官錢百萬賣田宅車牛不售而收繫公度語所富人曰子可以百萬錢借我我欲以救人後三十日倍當相還富人喜敬之即以百萬錢與公度公度以與遇事者曰卿能得一百二十斤錫不遇事者即具之公度於䥶中銷錫復以其腰間管中藥一方寸匕投沸錫中攪之皆成金即秤賣與人得錢百萬以還富人近光熙元年聞公度到南陽太和山中
