body:
  text: 釋部一敘佛漢書曰漢使驃騎將軍霍去病出隴過焉耆山得休屠王祭天金人顏師古注曰作金人以為天神之主而祭之即今佛像是其遺法也後漢紀曰浮圖者佛圖也西域天笁國有佛道焉佛者漢言覺也將以覺悟群生也統其教以脩善慈心為主不殺生類專務清淨其精進者號為沙門漢言息自心蓋息意去欲而歸無為也又以為人死精神不滅隨復受形所行善惡皆有報應故所貴行善脩道以練精神練而不已以至無生而得佛也身長一丈六尺黃金色項佩日月光變化無常無所不入故能化通萬物而大濟群生初帝夢見金人長大項有日月光以問群臣或曰西方有神其名曰佛其形長大而黃金色陛下之所夢得無是乎於是遣使天笁而問道術遂於中國而圖其形像焉有經書數千卷以虛無為宗包羅精麤無所不統善為宏闊勝大之言所求在於一體之內而所明在於視聽之表故世俗之人以為虛誕然歸於玄微深遠難測故王公大人觀死生報應之際莫不瞿然自失也晉書曰後趙百姓以佛圖澄故多奉佛皆營造寺廟相競出家真偽混淆多生愆過季龍下書料簡其著作郎王度奏曰佛外國之神非諸華所應祠奉漢代初傳其道唯聽西域人等得立寺都邑以奉其神漢人皆不出家魏承漢制亦修前軌今可斷趙人悉不聽詣寺燒香禮拜以遵典禮宋書曰顧歡以佛道二家教異學者互相非毀乃著夷夏論曰道經云老子入關之天笁維衛國國王夫人名曰淨妙老子因其晝寢乘日精入淨妙口中後年四月八日夜半時剖左腋而生墜地即行七步於是佛道由此而始興焉又玄妙內篇佛經云釋迦成佛有塵劫之數出法華無量壽然二經所說如合符契道則佛也佛則道也其聖則符其跡則反歡雖同二注而意黨道教司徒袁祭託為道人以駮之後魏書釋老志曰凡說教大抵言生生之類皆因行業而起有過去當今未來歷三世識神不滅凡為善惡必有報應漸積勝業陶冶麤鄙經無數形澡練神明乃致無生而得佛道其門階次二行等級非一皆緣淺以致深藉微而為著率在於積仁順蠲嗜欲習虛靜而成通照也其始修心則依佛法僧謂之三歸又有五誡去殺盜媱妄言飲酒大意與仁義禮智信同梁書曰郭祖深以武帝溺情內教朝政弛縱輿櫬詣闕上封事曰比來慕法普天信向家家齋戒人人懺禮不事農業空談彼岸夫農業者今日濟育功德者將來勝因豈可惰本勤末置近効賖也時帝大弘釋典將以昜易俗故祖深尤言其事以為都下佛寺五百餘所窮極宏麗僧尼十餘萬資產濃沃所在郡縣不可勝言道人又有白徒尼則畜飬女皆不貫人藉天下戶口幾亡其半而僧尼多非法飬女皆服羅紈其蠹俗傷法抑由於此恐方來處處成寺家家剃落尺土一人非復國有南史曰天笁諸國皆事佛道自後漢明帝法始東流自此以來其教稍廣別為一家之學元嘉十二年丹楊尹蕭摹之奏曰佛教被于中國已歷四代而自頃以來更以奢競為重請自今以後有欲鑄銅像者悉詣臺自聞興造塔寺精舍皆先列言須許報然後就功先是晉世庾冰始創議欲使沙門敬王者後桓玄復述其議並不果行宋大明六年孝武使有司奏沙門接見皆盡敬詔可隋書經藉志曰釋迦在世四十九年教化乃至天龍人鬼並來聽法弟子多有得道證果後於拘尸郍城娑羅雙樹間二月十五日入般涅槃譯言滅度亦言常樂我淨弟子迦葉等追共撰述教為十二部經唐書曰傅弈上䟽請除去釋教高祖付群官詳議太僕卿張道源稱弈奏合理中書令蕭瑀與之爭論曰佛聖人也弈為此議非聖人者無法請寘嚴刑弈曰禮本於事親終於奉上則忠孝之理著臣子之行成而佛踰城出家逃背其父以匹夫抗天子以繼體悖所親瑀非出於空桑乃遵無父之教臣聞非孝者無親瑀之謂矣瑀不能荅但合掌曰地獄所設正為是人又曰會昌中道士趙歸真舉羅浮道士鄧元起有長年之術帝遣中使迎之繇是與衡山道士劉玄靜膠固而排釋氏牟子曰或問曰佛從何而生寧有先祖牟子曰佛生天笁假形王家父曰白淨夫人字曰淨妙四月八日佛精從天來夫人晝寢夢見象六牙欣然悅之遂感而孕因以八日從母右脇而生太子有三十二相八十種好頰如師子皮不受塵水手足皆鉤鏁毛悉向上又曰子得佛道以來良有益否牟子曰吾自得佛道來如開浮雲見白日如執火炬入冥室矣建康實錄曰吳赤烏十年胡人康僧會入境置經行所朝夕禮念有司以聞帝曰昔漢明帝感夢金人使往西方求之得摩騰笁法蘭來中國立經行教今無乃是遺類乎因引見僧會其言佛教滅度已久唯有舍利可以求請遂於大內立壇結靜三七日得之帝崇佛道以是江東初有佛法高僧傳曰釋惠嚴宋高祖素所知重文帝在位情好尤密先是帝未甚崇信京尹蕭摹之上啟請制起寺及鑄像帝迺與侍中何尚之吏部郎羊玄保等議之謂尚之曰謝靈運常言六經典文本在濟俗為治必求靈性真奧豈得不以佛經為指南耶近摹之推達性論尤為名理羊玄保進曰此談蓋天人之際豈臣所宜預竊恐秦楚論強兵之術孫吳畫吞併之計將無取此耶帝曰此非戰國之具良如卿言尚之曰夫禮隱逸則戰士怠貴仁德則兵氣衰若以孫吳為志茍在吞噬亦無堯舜之道豈唯釋教而已邪帝悅曰釋門有卿亦猶孔氏之有季路世說曰殷中軍見佛經云理應在阿堵上注云佛經之行東國尚焉而記傳無聞莫詳其始牟子曰漢明帝夜夢見神人身有日光飛止殿前意甚忻悅明日問群臣有通人傅毅對曰聞天笁有得道者號曰佛身有日光殆將其神於是上悟遣羽林郎秦景博士弟子等十二人之大月氏寫取佛經四十二章在蘭臺石室又曰庾公常入佛圖見臥佛曰此子疲於津梁時人以為名言涅槃經云如來背痛於雙樹間北首而臥故後之圖繪者為此像也佛地論曰佛者覺也覺一切種智復能開覺有情如睡夢覺故名為佛姓釋伽號牟尼佛普曜經曰從兜率天降神於西域迦維衛國淨飯王宮摩耶夫人剖左脅而生時多靈瑞生而能言本相經曰年十九踰城出家學道勤行精進禪定六年成道具三十二相八十種好涅槃經曰醍醐之教喻於佛性從乳出酪從酪出蘇從生蘇出熟蘇熟蘇出醍醐醍醐蘇之精也法顯記曰佛生於殷末道成於周初至成王十二年經律始到新頭河河即張騫所到之處佛國記曰佛有四牙廣半寸長半寸一牙在呵條國又一牙在天上又一牙在海龍王宮又一牙在乾陁國國王使大臣九人守保之月朝捧擎牙出牙或時放光明香花數十斛散牙上而牙不沒唐韓愈論佛骨䟽曰伏以佛者夷狄之一法耳後漢時流入中國上古未嘗有也昔黃帝在位百年年一百一十歲少昊在位八十年年一百八十歲此時天下太平百姓安樂壽考然而此時未有佛也至殷湯亦年百歲湯孫太戊在位七十五年武丁在位五十九年書史不言其年壽考所極蓋亦非因事佛而致然漢明帝時始有佛法明帝在位纔十八年耳其後亂亡相繼運祚不長宋齊梁陳元魏已下事佛漸謹年代尤促唯梁武帝在位三十八年前後三度捨身施佛宗廟之祭不用牲牢盡日一食止於菜菓其後竟為侯景所逼餓死臺城國亦尋滅事佛求福乃更為禍由此觀之佛不足信也亦可知矣高祖始受隋禪則議除之當時群臣才識不遠不審知先王之道古今之宜推闡聖明以正斯弊其事遂止陛下神聖睿武數百年已來未有倫比即位之初不許度人為僧尼道士又不許創立寺觀臣愚以為高祖之志必行於陛下之身縱未能行豈可恣之轉令盛矣今聞陛下令群僧迎佛骨於鳳翔樓以舁入內又令諸寺送迎供養臣雖至愚必知陛下不惑於佛以祈福也直以年豊人樂徇人之心為京都士庶設詭異之觀戲翫之具耳然百姓愚冥易惑難曉茍見陛下如此將謂真心信佛皆云天子大聖猶一心敬信百姓何人更惜身命以至焚頂燒指百十為群解衣散錢自朝至暮轉相倣傚唯恐後時老少奔波棄其業次若不明加禁遏更歷諸寺必有斷臂臠身以為供養者傷風敗俗傳笑四方非細事也夫佛本夷狄之人與中國言語不通衣服殊制口不言先王之法言身不服先王之法服不知君臣之義父子之恩假如其身至今尚在奉其國命來朝京師陛下容而接之不過宣政一見禮賓一設賜衣一襲衛而出境不令惑眾也況其身死已久枯朽之骨凶穢之餘豈令入宮禁孔子曰敬鬼神而遠之古之諸侯行宜於國尚令巫祝以桃茢拂除不祥然後進弔今無故取朽穢之物親臨視之巫祝不先桃茢不用群臣不定其非御史不舉其失臣實恥之乞以此骨付有司投水火永絕根本斷天下之疑絕後代之惑使天下之人知大聖之作為出於尋常萬萬也豈不盛哉豈不快哉
