body:
  text: 樂部二雅樂下國語曰夫琴瑟尚宮鍾尚羽石尚角大不踰宮細不過羽故樂器重者從細輕者從大尾絲尚商匏竹尚徵革木一聲呂以和樂律以平聲金石以動之絲竹以行之歌以詠之匏以宣之土以贊之革木以節之物得其常曰樂清濁相應曰聲聲相保曰和細大不踰曰平如是金磨之石擊之絲木越之匏竹節之以節八風春秋感精符曰冬至日人主與群臣左右縱樂五日天下人眾亦家縱樂五日以迎日冬至人主備八能之士撞黃鍾之鍾擊黃鍾之鼓公卿大夫列士乃使八能之士擊黃鍾之鼓用馬革鼓員徑八尺一寸鼓黃鍾之瑟瑟用槐木瑟長八尺一寸吹黃鍾之律間音以竽補竽長四尺二寸天地以和應黃鍾之音得蕤賓之律應則公卿大夫列士以德賀於人主因請政所行請五官之符各受其賞聲之調者時氣和則人主以禮賜公卿列士五日儀定天地之氣和人主公卿大夫列士之德則陰陽之晷如度數夏日至之禮如冬日至之禮舞八樂皆以肅敬為戒八音者雲門五英大筮大卷大韶大夏大護大武也黃鍾之音調諸氣和人主之音順則蕤賓之律應磬聲和公卿大夫列士誠信林鍾之律應此謂冬日至成天文夏日至成地理頴客春秋釋例曰周用六代之禮樂故有雲門咸池大韶大夏大護大武也魯受四代之禮樂故不舞雲門咸池示有降殺也五經通義曰受命而王者六樂焉以太一樂天以咸池樂地以肆夏樂人以大夏樂四時以大護樂五行神明以大武樂六律各象其性而為之制以樂其先祖又曰歌舞同處耶異耶歌者象德舞者象功君子尚德下功故歌在堂舞在庭歌以養形歌者有聲舞者有形何言歌在堂也以燕禮曰升歌鹿鳴以是知之何以言舞在庭也援神契曰合忻之樂舞於堂四夷之樂陳於戶以是明之韓詩外傳曰古者天子左右五鍾將出則撞黃鍾而右五鍾應之馬鳴中規律駕者丈御者有數立則磬折拱則抱鼓出入中規折旋中矩然後太師奏升車之樂告出也入則撞蕤賓以治容貌容貌治則得顏色齊顏色齊則肌膚安蕤賓有聲鵠震馬鳴及倮介之虫無不延頸以聽蕤賓在內者皆玉色在外者皆金聲然後少師奏升堂即席告入也此言物類相感聲相應之義也又曰湯作護聞其宮聲使人溫良而寬大聞其商聲使人方廉而好義聞其角聲使人惻隱而仁愛聞其徵聲使人樂養而好施聞其羽聲使人恭儉而好禮白虎通曰樂也君子樂得其道小人樂得其欲聲音何聲鳴也聞其聲即知所生聲音者謂官商徵羽也音飲也剛弱清濁和而相飲也音有八謂金石絲竹土木匏革太平乃作樂樂所以防淫奢民飢寒何樂之防子思子曰繁於樂者重於憂厚於味者薄於行君子同則有樂異則有禮孟子曰莊暴見孟子曰暴見於王王語暴以好樂暴未有以對也孟子曰王之好樂甚則齊國其庶幾乎他日見於王曰王嘗語莊子以好樂有諸王變乎色曰寡人非能好先王之樂也直好世俗之樂耳曰今之樂猶古之樂也臣請為王言之今王鼓樂於此百姓聞王鍾鼓之聲管籥之音舉疾首蹙頞而相若曰吾王之好鼓樂夫何使我至於此極也父子不相見兄弟妻子離散此無他不與民同樂也今王鼓樂於此百姓聞王鍾鼓之聲管籥之音舉欣欣然有喜色而相告曰吾王庶幾無疾病與何以能鼓樂也此無他與百姓同樂也今王與百姓同樂則王矣墨子曰程繁問於子墨子曰聖王不為樂昔諸侯倦於聽治息於鍾鼓之樂士大夫倦於聽治息於竽琴之樂農夫春耕夏耘秋歛冬藏息於吟缶之樂今夫子曰聖王不為樂此譬之猶馬駕而不脫弓張而不弛墨子曰昔者堯舜有茅茨者且以為禮且以為樂湯放桀環天下自立因先王之樂又自作樂命曰護又循九韶武王勝殷殺紂環天下自立因先王之樂又自作樂命曰象周成王因先王之樂命曰騶吾聞周成王之治天下也不若武王武王之治天下也不若成湯成湯之治天下也不若堯舜故樂逾繁者洽逾寡自此觀之非所以治天下也又曰齊康公有樂萬人食必梁肉衣必文繡莊子曰北門成聞黃帝張咸池之樂於洞庭之野始聞之懼後聞之怠卒聞之而惑蕩蕩默默乃不自得帝曰汝殆其然哉吾奏之以人徵之以天行之以札義建之太清奏之以陰陽之和燭之以日月之明或謂之死或謂之生行流散徙不主常聲此之謂天樂也淮南子曰奏雅樂者如於陽阿採菱許慎注曰楚樂之名也邯鄲有鬻曲者託之李奇諸人皆爭學之後知其非皆棄其曲此未始知音也李奇趙之善樂者也穆天子傳曰天子西征至于玄池之上乃奏廣三日而終是曰樂池山海經曰祝融生子長琴是處搖山始作樂世說曰荀公曾善解音聲時論謂之闇解遂調律呂正雅樂每至正會殿庭作四指自謂宮商無不諧韻阮咸妙賞時論謂之神解每至公會作樂荀心識阮意必謂之不調而阮口初無言直意忌之遂出阮為始平太守後有田父耕於野地中得周時玉尺便是天下正尺荀試以校己所治鍾鼓金石絲竹皆短校一米於此伏阮之妙解徵阮南還說苑曰孔子至齊郭門之外遇一嬰兒擊一壺相與俱行其視精其心端孔子謂御曰趣驅之韶樂方作故樂不獨自樂也又以樂人非獨以自正也又以正人樂說曰聖人作樂不以為娛樂以觀得失之節故不取備於一人必須八能之士故八士或調陰陽或調五行或調盛人或調律曆或調五音與天地神明合德者則七始八終各得其宜也七始謂四方天地人也又曰上元者天氣也居中調禮樂教化流行惣五行氣為一下元者地氣也為萬物始質也為萬物之容範中元者人氣也其氣以定萬物通於四時承天心理禮樂通上下四時之氣和合人之情以慎天地者也時元者受氣於天布之於地以時出入萬物者也風元者禮樂之本萬物之首物莫不以風成熟也聖王知物極盛則衰暑極則寒樂極則哀是以日中則昃月盈則蝕天地盈虛與時消息制禮作樂者所以改世俗致祥風和雨露為萬姓獲福於皇天者也聖人作樂繩以五元度以五星碌貞以道德彈形以繩墨賢者進佞人伏繩正也碌碌摩也貞正也彈割也要覽曰桓君山曰余兄弟頗好音嘗至洛聽音終日而心足由是察之夫深其旨則欲罷不能不入其意故過己風俗通曰案劉韶鍾律書曰春宮秋律百卉必凋秋宮春律萬物必榮夏宮冬律雨雹必降冬宮夏律雷必發聲夫音樂至重所感者大故曰知禮樂之情能作知禮樂之文者能述華譚論曰夫無聲者五音之祖旡形者萬物之君本其祖然後情商徵之妙理其君然後正妍朴之容推精朴以撿得失稽清濁以接在亡夫宿瘤嫫母經日而人不視者何一尺之面醜也西施毛嬙靡服而人左顧者何一尺之面好也夏姬以容美而陳亡濮水以聲好而國滅夫何媱哇之有乎是以聖王知物之感人無窮而情之好惡旡節旡窮則人不能防其行旡節則中材不能制其欲是以為制可行之禮立中庸之法使賢者俯就不肖者企及明樂之妙以為教也阮籍樂論曰聖人之作樂將以順天地之體成萬物之性也故定天地四方之音以迎陰陽八風之聲均黃鍾中和之律開群生萬物之氣奏之圜丘而天神下奏之方丘而地祗上吳楚之風好勇故其俗輕死鄭衛之風好淫故其俗輕蕩輕死故有蹈水赴火之歌輕蕩故有桑間濮上之曲懷永曰之娛抱長夜之忻云終身之樂淫縱之俗故江淮以南其民好殺漳汝之間其民好奔吳有雙劍之節趙有挾琴之客氣發於中聲入於耳手足飛揚不覺其駭也桓譚新論曰揚子雲大才而不曉音余頗離雅操而更為新弄子雲曰事淺易喜深者難識卿不好雅頌而悅鄭聲宜也律呂周禮曰大師掌六律六同以合陰陽之聲陽聲黃鍾大蔟姑洗蕤賓夷則無射陰聲大呂應鍾南呂函鍾小呂夾鍾皆文之以五聲宮商角徵羽皆播之以八音金石土革絲木匏竹注云以合陰陽之聲者聲之陰陽各有合也黃鍾子之氣也十一月建焉而辰在星紀大呂丑之氣也十二月建焉而辰在玄𢪶太簇寅之氣也正月建焉辰在娵訾應鍾亥之氣也十月建焉辰在析木之津姑洗辰之氣也三月建焉而辰在大梁南呂酉之氣也八月建焉而辰在壽星蕤賓午之氣也五月建焉而辰在鶉首林鍾未之氣也六月建焉而辰在鶉火夷則申之氣也七月建焉而辰在鶉尾中呂巳之氣也四月建焉而辰在實沈無射戍之氣也九月建焉而辰在大火夾鍾卯之氣也二月建焉而辰在降婁辰與建交錯玄處如表裏然是其合也其相生則以陰陽六體為之黃鍾初九下生林鍾之初六也林鍾又上生太簇之九二太簇又下生南呂之六二南呂又上生姑洗之九三姑洗又下生應鍾之六三應鍾又上生蕤賓之九四蕤賓又下生大呂之六四大呂又上生夷則之九五夷則又上生夾鍾之六五夾鍾又下生無射之上九無射又上生中呂之上六同位者象夫婦異位者象母子所謂律娶妻而呂生子者也又曰典同掌六律六同之和以辨天地四方陰陽之聲以為樂器注云陽聲屬天陰聲屬地天地之聲布於四方故書同或作銅鄭司農云陽律以竹為管陰律以銅為管竹陽也銅陰也各順其性呂氏春秋曰黃帝詔伶倫作為音律伶倫自大夏之西乃之崑崙之陰取竹於嶰谷以生竅厚簿均者斷兩節間其長九寸而吹之以為黃鍾之宮日含少次制十二管以崑崙之下聽鳳之鳴以別十二律其雄鳴為六雌鳴亦六此黃鍾之宮適合皆可生之而律之本也故曰黃鍾徵而均鮮全而不傷其為宮獨尊象大聖之德可以明至賢之功故奉而薦之于宗廟以歆迎功德世世不忘是故黃鍾生林鍾林鍾生大呂大呂生夷則夷則生太蔟太蔟生南呂南呂生夾鍾夾鍾生無射無射生姑洗姑洗生應鍾應鍾生蕤賓之分所生益之一分以上生三分所生去其一分以下生黃鍾太呂大蔟夾鍾姑洗中呂蕤賓為上林鍾夷則南呂無射應鍾為下生大聖至理之世天地之氣合以生風日至則曰行其風以生十二律故仲冬短至則生黃鍾季冬生大呂孟春生太蔟仲春生夾鍾季春生姑洗孟夏生仲呂仲夏生蕤賓季夏生林鍾孟秋生夷則仲秋生南呂季秋生無射孟冬生應鍾天地之風正十二律也樂書曰雅樂部器隨律定聲合德其所也黃鍾之均則用黃鍾之器合太蔟之均則用太蔟之器是故旋宮法此聲律克諧則無借器度音咸取中聲恊律是以三倍黃鍾而大至于雷霆謂黃鍾之律度三分九寸而倍成一尺八寸則合雷霆之濁聲也九寸而減餘四寸五分則應中宮之清聲也唯當九寸是謂正聲而可恊和神人感通天地流而不息合同而化是故地氣上隮天氣下降陰陽相摩天地相蕩鼓之以雷霆奮之以風雨動之以四時煖之以日月而百化興焉如此則樂者天地之和也故書云聲依永律和聲則五音不失其常六律不差其度謂孤竹之管律應夾鍾聲與氣諧故感天神而降孤竹之管律應林鍾聲與器諧故感地祇而出陰竹之管律應黃鍾聲與器諧故感人鬼而至樂纂云昔晉人有銅藻盤無故自鳴問之於張茂先荅曰此器與洛陽宮鍾聲相諧宮中撞鍾故鳴也若以鑢之音殊其鳴可止後果如其言也是故樂之制器法度均聲得之毫釐厘失之千里故大樂之道與政通矣古今樂錄曰北齊神武霸府田曹參軍信都芳代號知音能以管候氣觀雲色嘗與人對語即指天曰孟春之氣至矣人往驗管而飛灰已應每月所候言皆無爽又為輪扇二十四理地中以測二十四氣每一氣感則一扇住並與管灰相應若合符契焉又曰隋文帝遣毛爽及蔡子元于普明等以候節氣依古於三重密屋之內以木為案十有二具每取律呂之管隨十二辰置于案上而以土埋之上平於地中實葭莩之灰以輕緹素覆律口每地氣至與律冥符則灰飛衝素散出于外而氣應有早晚灰飛有多少或初入月其氣即應或至中下旬開氣始應者或灰飛出三五夜而盡或終一月才飛少許者帝異之問牛弘對曰灰飛半出為和氣灰全出為猛氣吹灰不能出為襄氣和氣應者其政平猛氣應者其臣縱襄氣應者其君暴帝駮之曰臣縱君暴其政不和非月別暴也今十二月律於一歲內應並不同安得暴君縱臣若斯之甚也弘不得對
