body:
  text: 樂部四歷代樂呂氏春秋曰昔葛天氏之樂三人操牛尾投足以歌八闋投猶蹲也一曰載民二曰玄鳥三曰遂草木四曰奮五穀五曰敬天常六曰達帝功七曰依地德八曰揔禽獸之極又曰黃帝命伶倫與營援鑄十二鍾和五音以詔英韶以仲春之月乙卯之日日在奎始奏之命之曰咸池帝顓頊生自若水實處空桑空桑邑名乃登為帝惟天之合正風乃行德與天合其音若熙熙淒淒鏘鏘帝顓頊好其音乃令飛龍作效八風之音命之曰承雲以祭上帝乃命鱒先為樂偈偈始鱓乃偃寢以其尾鼓其腹其音英英和盛之貌帝嚳命咸墨作為唐歌九招六列六英倕有作為擊鼓鍾磬吹笭展管箎鞀推衡帝嚳乃令人棄兩手相擊曰棄或擊鼙擊鍾磬吹笭展管箎因令鳳天翟舞之帝嚳大喜乃以康帝德康樂也安也帝堯立乃命𨟊為樂質乃效山谿谷之音以歌質當為夔乃以麇輅冥缶而鼓之乃拊石擊石以象上帝玉磬之音以舞百獸鼓搜乃拌五經之瑟拌分作以為十五絃之瑟命之曰大章以祭上帝舜立卯延乃拌瞽叟之所為琴益之八絃以為二十三絃之瑟帝舜乃令質脩九招六列六英以明帝德禹之勤勞天下日夜不解通大川決壅塞鑿龍門降通漻水以道河䟽三江五湖注之東海以利黔首於是命皋陶作為夏籥九成以招其功殷湯即位夏為無道暴害萬民侵削諸侯不用度軌天下患之湯於是率六州以誅桀之罪功名大成黔首安寧湯乃命伊尹作為大護歌晨露脩六招六列六英以見其善周文王處歧諸侯去殷三淫而翼文王三淫割心斷脛刳孕散宜生曰殷可伐也文王弗許周公旦乃作詩曰文王在上於昭于天周雖舊邦其命惟新以繩文王之德武王即位以六師伐殷六師未至以兌以兵克之於牧野乃篇俘馘于京大室乃令周公作大武成王立殷民反王命周公伐之商服象獸名為虐于東夷周公遂以師逐于江南乃為三象以嘉其德故樂之所由來者尚矣生於度量本於太一太一出兩儀兩儀出陰陽陰陽變化一上一下合而成章渾渾純純離而復合合而復離是謂天常天地車輪終則復始極則復反莫不盛當日月星辰或疾或徐宿日不同以盡其行四時代興或寒或暑或短或長或柔或剛萬物所出造本於太一化於陰陽萌牙始厥厥動凝寒以刑形體有處莫不有聲聲出於和和出適先定樂由此生天下太平萬民安寧皆化其上樂乃可成夫音亦有適大鉅則志蕩以蕩聽鉅則耳不容不容則橫塞橫塞則振大振動小則志嫌聽小則耳不充不充則不詹詹詹音也不詹則窕大清則志危以危聽清則耳谿極谿靈極病谿極則不監不監則竭監察大濁則志下以下聽濁則耳不收不收則不搏不搏則怒不搏入不專一人故大距大小大清大濁皆非適也桀紂作為侈樂大鼓鍾磬管簫之音以鉅為美以眾為觀俶詭殊瑰耳所未嘗聞目所未嘗見務以相過不用度量宋之襄也作為十秩鍾律之名齊之襄也作為大呂楚之襄也作為巫音侈則移矣自有道者觀之則失樂之情其樂不樂其民怨其生傷其生與樂也若水之於炭反以自升此生乎不知樂之情而以侈為務故也又曰帝顓頊好音乃令飛龍作八風之音命之曰承雲帝嚳命咸池黑作唐歌九招六列禹䟽三江五湖命皋繇為夏籥九成湯率六州以誅桀之罪命伊尹為大護歌晨露武王以六師伐殷乃命周公作為大武商人服象為虐於東夷周公以師逐之至於江南乃為三象以嘉其德樂書曰謹案禮記䟽云伏羲樂曰立基言伏犧之代五運成立甲曆始基畫八卦以定陰陽造琴瑟以諧律呂繼德之樂故曰立基也神農樂曰下謀言神農播種百穀濟育群生造五弦之琴演六十四卦承基立化設降神謀故樂曰下謀以明功也黃帝樂曰雲門言黃帝之道成名百物明民共財德如雲出其門民可有於族類故樂曰雲門帝系譜曰女媧命娥陵氏制都良管以一天下之音又命聖氏為班管合日月星辰名曰充樂樂既成天下幽微旡不得理樂緯曰黃帝之樂曰咸池池者施也道施於民故曰咸池顓頊曰六莖道有根莖故曰六莖帝嚳曰五英道有英華故曰五英堯曰大章堯時仁義大行法度彰明故曰大章舜曰簫韶韶紹也舜紹堯之後修行其道故曰蕭韶禹曰大夏禺承二帝之後道重太平故曰大夏殷曰大護湯承襄而起護先王之道故曰大獲獲音護周曰勺又曰大武周承襄而起斟酌文武之道故曰勺春秋元命包曰王者不空作樂樂者和盈於內動發於外應其發時制禮作樂以成之是故作樂者必反天下之始樂於己為本舜之時民樂其紹堯業故韶者紹也舜服繼堯之業禹之時民大樂其駢三聖相繼故夏者大也駢讀曰頻頻猶旡也湯之時民大樂其救於患害故護者救也文王之時民樂其興師征伐故武者伐也四者天下所同樂一也其所同樂之端不可一也各樂其君所為故不可合四家以為一也樂苑曰文王樂名巨業武王樂名象武漢書曰樂家有能制雅樂聲律世世在大樂官但能記其鏗鎗鍾鼓而已不能言其義高祖時叔孫通因秦雅人制高廟樂太祝迎神於廟門奏嘉至李奇曰嘉善也善神之至猶古降神之樂也皇帝太廟奏永至以為行步之節猶古采薺肆夏也乾豆上奏登歌不以管絃亂人聲欲在位者遍聞之猶古清廟之歌也登歌再終下奏休成之樂服虔曰叔孫通所奏作也美神明既饗也皇帝獻酒東廂坐定奏永安之樂美禮已成也又有房中祠樂高祖唐山夫人所作也韋昭曰唐山姓也曰周有房中樂至奏名曰壽人孝惠二年使樂府令夏侯寬備其簫管更名曰安世樂高祖奏武德文始五行之儛孝文廟奏昭德文始四時五行之儛武德者高祖四年作以象天下樂已行武以除亂也文始儛者曰本韶儛也高祖六年更名曰文始以示不相襲也五行儛者本周儛也秦始皇二十六年更名曰五行也四時儛者孝文所作以明宗天下之安和也蓋樂己所自作明者制也樂先王之樂明有法也孝景采武德儛以為昭德以尊太宗廟至孝宣采昭德儛以為采德以尊世宗廟世宗廟諸帝廟皆常奏文始四時五行舞云高祖六年又作昭容樂昭容樂者猶古之韶夏也主出武德舞禮容樂者出文始五行儛儛入無樂者將至至尊之前不敢以樂也出用樂者言武不失節能以禮樂終也皆因秦舊事焉初高祖既定天下過沛與故父孝相樂醉酒作風起之詩令沛中兒童百二十人習而歌之至武帝定郊祀之禮祠太一於甘泉就位也祭后土於汾陰澤中方丘也乃立樂府採詩依誦有趙伐秦楚之謳以李延年為恊律都尉舉司馬相如等數十人善為詩賦略論律呂以合八音之調作十九章之歌以正月上辛用是甘泉圓丘使童男女七十人俱欲昏祠至明夜常有神光如流星上集於祠壇天子自竹宮而望拜韋昭曰以竹為官天子居之後漢書東平王蒼議以為漢制舊典宗廟各奏其樂皆不相襲以明功德光武帝受命中興撥亂反正脩建三雍肅祇禋祀德化巍巍比隆前代歌所以詠德舞所以象功世祖廟樂舞名宜曰大武之舞謹採百官頌可登者歌一章四句以為曲上從其議魏志曰明帝時有奏武皇帝撥亂反正為魏太祖樂用武始之舞文皇帝應天受命為魏高祖樂用咸熙之舞明帝制作興治為魏列祖樂用章斌之舞沈約宋書曰周存六代之樂至秦唯餘韶舞而已始周舞曰五行漢高改韶舞曰文始以示不相襲也高祖又作昭容樂昭容生於武德禮容生於文始五行也漢又有雲翹育命之舞雖莫知其所從來然舊以祀天地也至明帝初東平憲王蒼揔定公卿之議曰宗廟宜各奏樂不應相襲所以明功德也採文始五行武德真脩為文武之舞又制舞歌一章薦之世祖之廟皇初二年改漢巴渝舞曰昭武舞改宗廟安之樂曰正世樂加至樂曰迎靈樂武德樂曰武頌樂昭容樂曰昭業樂雲翹舞曰鳳翔舞育命舞曰靈應舞武德舞曰武頌舞文始舞曰大韶舞五行舞曰大武舞其眾歌詩多即前代之辭唯魏國初建使王粲改作登歌安世及巴渝詩而已又曰晉武帝太始二年改郊廟新歌其樂舞亦仍舊又改魏昭武羽籥舞曰宣文舞咸寧元年詔定祖宗之號而廟樂同用正德大豫之舞至江左初立宗廟尚書下太常祭祀宜周樂名太常賀修荅云舊京荒廢今既散亡音韻曲折又無識者則於今者難以音言于時以無雅樂器及伶人省太樂并鼓吹令是後頗得登歌食舉之樂猶有未備故太寧未又訪防孚等增益之咸和中乃復置太樂官鳩習遺逸又未有金石也初荀勗既以新律造一舞次更脩正鍾磬勗薨事猶不竟元康三年詔其子黃門郎蕃脩定金石以施郊廟尋值喪亂莫有記者又曰魏公卿奏曰烈祖未制樂舞非所以昭德著功夫歌以詠德舞以象事於文武為斌兼秉文武聖德所以彰明也臣等謹制樂名曰章斌文武之舞又曰武帝永初元年有司奏皇朝肇建廟祀應設雅樂乃晉樂也太常鄭鮮之等各撰立新歌黃門侍郎王韶之撰歌七首並令施用十二月又奏依舊正朝設樂改大樂諸歌詩王韶之撰二十二章又改正德舞曰前舞文悅舞曰後舞文帝元嘉九年大樂令鍾宗之更調金石至十四年治書令史奚縱又改之二十二年南郊始設登歌詔顏延之造歌詩廟舞猶闕孝武建元元年有司奏前殿中曹郎荀萬秋議郊廟宜設備樂於是使內外博議竟陵王誕等並同萬秋議建平王宏議以凱容為韶舞宣烈為武舞祖宗廟樂揔以德為君章皇太后奏永樂永至等樂仍舊皇帝祠南郊及廟迎神送神並奏肆夏皇帝入廟門奏永至皇帝南郊初登壇及廟中諸東壁奏登歌其初獻奏凱容宣烈之舞終獻奏永安之樂郊廟同孝武又使謝莊造郊廟明堂諸樂歌辭二年有司又奏先郊廟舞樂皇帝親奉初登壇及入廟詣東壁並奏登歌不及三公行事左僕射建平王宏重議公卿行事亦宜奏登歌有司又奏元會及二廟齋祠歌伎舊並於殿設作廟祠依新儀主登歌人上殿絃管住下令元會登歌亦上殿絃管住下隋書音樂志上武帝思弘古樂天監元年下詔求學術通明者皆陳所見時對樂者七十八家咸言樂之宜改不言改樂之法帝素善音律遂自制四器名之為通以定雅樂莫不和韻初齊永明中舞人冠幘並簪武帝曰筆笏蓋以記事受言舞不受言何事簪筆豈有身服朝衣而足綦讌履於是去筆乃定郊禋宗廟及三朝之樂以武舞為大壯舞取易云大者壯也正大而天地之情可見也以文舞為大觀舞取大觀在上觀天之神道而四時不忒也國樂以雅為稱取詩序云言天下之事形四方之風謂之雅雅者正也止乎十二則天數也乃去階步之樂增撤食之雅皇帝出入宋孝建二年奏永至齊及梁初亦同至是改為皇雅取詩皇矣上帝臨下有赫也二郊太廟同用皇太子出入奏胤雅取詩君子萬年永錫爾胤王公出入奏寅雅取尚書周官貳公弘化寅亮天地也上壽酒奏介雅取詩君子萬年介爾景福也食舉奏需雅取易雲上於天需君子以飲食宴樂也撤饌奏雍雅取禮記大饗客以雍撤也並三朝用之牲出入宋廢帝元徽二年儀注奏引牲齊及梁初亦同至是改為雅取禮記帝牛必在滌三月薦毛血宋元徽三年儀注奏嘉薦至是為牲雅左氏傳牲牷肥腯北郊明堂太廟並同用降神及迎送宋元徽三年儀注奏昭夏齊及梁初亦同至是改為誠雅取尚書至誠感神皇帝飲福酒宋元徽三年儀注奏嘉胙至齊不改梁初為永胙至是改為獻雅取禮記祭統尸飲五澆玉爵獻即今之福酒亦古之獻義也北郊明堂太廟同就燎位宋元徽三年儀注奏昭遠及齊不改就埋位齊永明六年儀注奏隸幽至是燎埋俱奏禋雅取周禮太宗伯以禋祀昊天上帝也眾官出入宋元徽三年儀注奏肅咸樂齊及梁初亦同至是改為俊雅取禮記司徒選士之秀者而外之于學曰俊士也二郊太廟明堂三朝同用焉其辭並沈約所製是時禮樂制度粲然有序鼓吹宋齊並用漢曲又充庭用十六曲武帝乃去其四留其十二合四時也更製新歌以述功德天監七年將有事太廟詔曰禮云齊曰不樂今親奉始出宮振作鼓吹外可詳議八座承郎參議請輿駕始出鼓吹從而不作還宮如常儀帝從之遂為定制初武帝之在雍鎮有童謠云襄陽白銅蹄反縛楊州兒識者言白銅謂金蹄謂馬也白金色及義師之興實以鐵騎楊州之士皆面縛果如謠言故即位之後更造新聲帝自為之詞三曲又令沈約為三曲以被管絃帝既篤敬佛法又製善哉天樂大歡天道仙道神王龍王滅過惡除愛斷苦輪等十篇名為正樂皆述佛法又有法樂童子伎童子倚歌梵唄設旡遮大會則為之其後臺城淪沒侯景以簡文女溧湯公主為妃請帝及主母范淑妃宴於西州奏梁所常用樂景儀同索超世亦在宴筵帝潛然屑涕景曰陛下何不樂也帝強笑曰丞相亦索超世聞此以為何聲景曰臣且不知何獨超世自此樂府修風雅咸盡及破侯景諸樂並在荊州經亂工器頗闕元帝詔有司補綴纔備荊州陷沒周人初不知採用工人有知音者並入關中隨例多沒為奴婢又曰陳武帝欲設樂有司議以武帝議為非時碩學名儒朝端在位者咸希上旨唯祠部侍郎姚察乃轉引經籍獨違群議據梁樂為是當時驚駭莫不慚伏又曰周樂曰武曰勺武象武王能以武禁暴也勺象周公制禮斟文武之道也又有房中之歌后妃之德周備六代之樂唯闕六莖與五英至秦餘韶武房中而已始皇改武曰五行房中曰壽人衣服用五行之色又曰漢高帝改韶樂曰文始高帝好壽人之聲惠帝使太樂令夏侯寬合之絃管改名曰安世魏復文始曰大韶五行曰大武改安世曰正世晉改大韶曰宣文正世曰房中晉亂後亡文舞秉羽籥皆宣文之遺法又曰漢樂曰武德昭容巴渝四時昭德盛德大武雲翹育命武德昭容巴渝並高祖所造也武德舞人執干戚以象天下行武除亂也四時文帝所作以象天下太平昭德景帝作之以享太宗廟盛德宣帝作之以享世祖廟諸帝之廟常奏文始四時五行之舞武帝加武德而去四時酎祭高祖歌海泰龜龍又有青陽朱明西皓玄冥等歌以迎四氣春夏舞雲翹秋冬舞育命季夏則歌朱明而兼舞二舞光武平隴蜀尊郊祀高祖配享南祀兼用五郊歌舞他時常亦如之魏武改武德曰武頌昭容曰昭業巴渝曰昭武雲翹曰鳳翔育命曰靈應晉改昭武曰宣武遭晉亂唯巴渝存隋隸清樂部又曰宋樂曰凱容宣烈並文帝所造至梁亡梁樂曰大壯大觀並武帝所造至陳亡隋樂以夏為名舞曰大武文帝所造自東晉至隋易服變名為異其實不全殊也又曰晉樂曰正德大豫並武帝所造武帝因漢魏舊禮定會儀正且夜漏未盡七刻設庭燎漏盡皇帝出鍾磬作公卿奉贄幣訖太樂令跪請奏雅樂皇帝乃入謂之晨賀畫漏上三刻皇帝又出百官上壽酒太樂令跪奏請進樂鼓吹合作鼓吹令又奏請進伎別置女樂三十人於黃帳外奏房中之歌江左始廢此禮宋改正德為前舞大豫為後舞至齊亡唐會要曰太宗七年正月七日製破陣樂舞左圓右方先偏後五魚麗鵝貫箕張翼舒交錯屈伸首尾廻牙以像戰陣之形起居郎呂才依圖教樂工一百二十人被甲執戟而習之凡舞三變每變為四陳有來往疾徐擊剌之象以應歌節數日而就其後令魏徵虞世南禇亮李百藥改制歌詞更名七德之舞十五日奏之於庭觀者覩其抑揚蹈厲莫不扼腕踴躍悚然震悚武臣列將咸上壽云此舞皆陛下百戰百勝之形容於是咸稱萬歲又曰貞觀元年正月三殿宴群臣奏秦王破陣樂之曲太宗謂侍臣曰朕昔在藩邸屢有征伐世間遂有此歌豈意今日登於雅樂然其發揚蹈厲雖異文容功業由之致有今日所以被於樂章示不忘本也尚書右僕射封德彝進曰陛下以聖武戡難立極安人功成化定陳樂象德實弘濟之盛烈為將來之觀文容習儀豈得為比太宗曰朕雖以武功定天下終當以文德綏海內文武之道各隨其時公謂文容不如蹈厲斯為過矣又曰貞觀中太宗幸慶善宮宮在武功縣即南祖舊宅宴從臣於渭濱其宮即上降誕之所上乃賦詩十韻壽丘唯舊跡酆邑乃前基奧余承累聖懸弧亦在茲弱齡逢運改提劍鬱匡時指麾八荒定懷柔萬國夷梯山盛入款駕海亦來思單于陪武帳日逐衛文儀端宸朝四岳旡為任百司霜節明秋景輕水結水湄芸黃遍原隰禾頴積成坻兵樂還譙宴驩此大風詩賞賜閭里有同漢之宛沛焉於是起居郎呂才播於樂府被之管絃名曰功成慶善樂之曲令兒童八佾皆冠進德冠紫袴裙為九功之舞每冬享讌及國有大慶與七德之舞皆奏於庭先是神功破陣樂功成慶善樂二舞每奏上皆立對高宗時太常博士裴守真奏議曰竊惟二舞肇謳吟屬贊九成之茂烈叶萬國之歡心義均韶夏用兼賓祭皆祖宗盛德而子孫享之詳覽博記未有皇王正觀之禮並謂守真議是也又曰咸亨中高宗自製樂章十四首有上元二儀二才四時五行六律七政八風九宮十洲得一慶雲之曲詔有司諸大祠享並奏之
