body:
  text: 方術部十相上左傳文上曰王使內史叔服來會葬公孫敖聞其能相人也見其二子焉叔服曰穀也食子難也收子穀文伯難惠叔也食子奉祭祀供養者也收子葬子身也穀也豐下必有後於魯國豐下蓋方面也又曰初楚子將以商臣為太子訪諸令尹子上子上曰君之齒未也而又多愛黜乃亂也楚國之舉恒在少者且是人也蜂目而豺聲忍人也不可立也弗聽又宣上曰楚司馬子良生子越椒子文曰必殺之是子也熊虎之狀而豺狼之聲不殺必滅若敖氏矣諺曰狼子野心是乃狼也其可畜乎子良不可子文以為大慼及將死聚其族曰椒也知政乃速行矣無及於難且泣曰鬼猶求食若敖氏之鬼不其餒而周書曰師曠見太子晉曰汝聲清浮汝色赤火色不壽王子曰後三年上賓於帝汝慎毋言殃將及汝師曠歸未及三年告死者至史記曰秦王見尉繚亢禮衣服食飲與繚同繚曰秦王為人蜂淮徐廣曰蜂一作隆長目鷙喙鳥膺豺聲少恩而虎狼心居約易出人下得志亦輕食人我布衣也然見我常身自下我誠使秦王得志於天下天下皆為虜矣不可與久遊乃亡去王覺固止之以為秦國尉又曰呂公曰臣少好相人相人多矣無如季相願季自愛臣有息女願為箕帚妾呂公女乃呂后也季漢高祖字也又曰呂后與兩子居田中耨有一老父過請飲呂后因餔之老父相后曰夫人天下貴人令相兩子見孝惠曰夫人所以貴乃由此男相魯元亦皆貴又曰薄姬母媼之許負相薄姬當生天子薄姬少時與管夫人趙子兒相約曰先貴無相忘而管趙先幸漢王漢王坐河南城皋臺兩美人相與笑薄姬初約漢王問其故以實告漢王心憐薄姬召一幸生代王即文帝也又曰姑布子卿見趙簡子簡子徧召其子使相之子卿曰無為將軍者𥳑子曰趙氏其滅乎子卿曰吾嘗見一子於路殆君之子也𥳑子召子母恤母恤至則子卿起曰此真將軍矣簡子曰其母賤翟婢也奚道貴哉子卿曰天所授也雖賤必貴自是之後簡子盡召諸子與語母恤最賢簡子乃告諸子曰吾藏寶符於常山之上先得者賞諸子馳之恒山求無所得母恤還曰已得符矣簡子曰奏之母恤曰從常山臨代代可取也𥳑子於是知母恤果賢乃廢太伯魯而以母恤為太子又日平原君對趙王日澠池之會臣察武安君之為人小頭銳上瞳子白黑分明眡瞻不轉小頭銳上斷敢行也瞳子白黑分明者見事明也眡瞻不轉者執志疆也眡讀如視古文通用可與持久難與爭鋒廉頗為人勇摯而愛士知難而忍恥與之野戰則恐不如守足以當之王從其計又曰蔡澤者燕人也遊學干諸侯大小甚眾而不遇因從唐舉相曰聞子相李兌百日之內持國秉政有之乎曰有之曰若臣者如何唐舉熟視而笑曰先生曷鼻曷鼻如謂蝎蟲也巨肩巨肩謂頂低而肩豎魋顏蹙齃謂蹙鼻於眉膝攣兩腳曲也吾聞聖人不相殆先生乎蔡澤知唐舉戲之乃曰富貴吾所自有吾所不知者壽也願聞之舉曰先生之壽從今已往四十三歲矣蔡澤笑謝而去謂其御者曰吾持梁齧肥躍馬疾驅懷黃金之印結紫綬於腰揖讓人主之前肉食富貴四十三歲亦足矣又曰英布少時遇相者曰當黥而王後布被刑欣然果為王又曰上使善相者相鄧通曰當貧餓死文帝曰能富通者在我於是賜通蜀嚴銅山得自鑄錢景帝立有告通盜出徼鑄錢下吏驗問頗有遂竟案盡沒其家一簪不得著身遂寄死人家又曰條侯周亞夫為河內太守時許負相之曰君三歲而侯侯八歲為將相貴重於人臣無兩其後九歲而餓死負指其口有從理入口此餓死法也又曰韋賢為吏至大鴻臚有工相之至丞相有男四人使相之至第二子玄成相工曰此子貴當封俟竟為亟相又曰衛青為侯家人少時歸其父使牧牛母子皆奴畜之不以為兄弟數青嘗從上至甘泉居室有一鉗徒相青曰貴人也官至封侯青笑曰人之奴得無笞罵即足矣安得封侯漢書曰上立劉濞於沛為吳王王郡五十三城已拜受印高帝召濞相之曰若狀有反相因拊其背曰漢後五十年東南有亂者豈汝耶然天下同姓一家慎無反濞頓首曰不敢又曰李陵為匈奴所圍上欲陵戰死召陵毋及婦使相者視之無死喪色後聞降上甚怒又曰翟方進字子威汝南上蔡人家世微賤方進年十二三失父孤學給事大守府為小吏號遲鈍不及事數為掾史所詈辱方進自傷乃從汝南蔡父相問己能所宜蔡父大奇其形皃謂曰小吏有封侯骨當以經術進方進聞蔡父言心喜因病歸家辭其後母欲西至京師受經後母憐其幼隨之長安織履以給方進又曰黃霸與善相者共載出見一婦人相者言此婦人當貴不然相書不可用矣霸推問之乃其卿里巫家女也霸即娶為妻與之終身後為丞相後漢書曰世祖以朱祐為護軍常見親幸舍止於中祐侍讌從容曰長安亂公有日角之相此天命也又曰龍淵善相劉宏造淵淵聞宏聲乃起迎曰公當極位也宏曰家貧負債何得貴乎淵曰公相然也張濟就淵相淵曰事劉宏可至三公濟事宏宏後為解犢侯既去南陽桓帝崩迎解犢侯為天子是為靈帝濟為司空也又曰明德馬皇后伏波將軍援女其母嘗使善相者看后曰此女必將大貴遂為帝王妃然而少子養他子得力乃當踰於所生耳又曰章德竇皇后扶風平陵人大司徒融之曾孫也父勳尚東海恭王疆女泚陽公主后其長女也家既廢壞數呼相工問息耗薛氏韓詩章句曰耗惡也息耗猶言善惡也見后者皆言當大尊貴非臣妾容貌又曰和熹鄧后傳曰幼時嘗有相者蘇大見后大驚曰此成湯之骨法也貴不可言家人竊喜而不敢宣又曰漢法常因八月筭人漢儀注曰八月初為筭賦故曰筭人遣中大夫與掖庭丞及相工於洛陽鄉中閱視良家童女十三以上二十已下姿色端麗合法相者載還後宮擇視可否乃用登御所以慎娉納詳求淑哲東觀漢記曰班超行詣相者相者曰祭酒布衣諸生耳而當封侯萬里之外超問其狀相者指曰生鷰頷虎頸飛而食肉此萬里侯相也又曰李固字子堅漢中南鄭人也司徒郃之子固貌狀有奇表鼎角匿犀足履龜文少好學常步行隨師不遠千里魏志曰管輅族兄李國居在斥丘輅往從之與二客會客去後輅謂國曰此二人天廷及耳口之閒同有凶氣黑變俱起雙魂無宅輅別傳曰厚味腊毒天精幽夕坎為棺槨兌為喪車流魄于海骨歸于家少許時當並死後十數日二人飲酒醉夜共載車牛渴下道入漳河中皆即溺死矣又曰鍾繇嘗與族父瑜俱至洛陽道遇相者曰此童有貴相然當厄於水努力慎之行未十里度橋馬驚墮水幾死瑜以相者言中益貴繇是供給資費使得專學舉孝廉又曰朱建平沛國人善相術頴川荀修鍾繇相與親善修先亡子幼繇經記其門戶欲嫁其女與人書曰吾與公達曾共使朱建平相建平曰荀君雖少然當以後事付鍾君吾時嘲之曰唯當嫁卿阿騖耳何意此子竟早殞歿戲言遂驗乎今欲嫁阿騖使得善處焉追思建平之妙雖唐舉許負何以復加耶又曰文帝為五官將坐上會客三十餘人文帝問朱建平巳年壽又命徧相眾賓建平曰將軍當壽八十至四十時當小有厄願謹護之謂夏侯威曰君四十九位為州牧而當有厄厄若得過可年至七十致位公輔謂應璩曰君六十二位為常伯而當有厄先此一年獨見白狗而旁人不見也謂曹彪曰君據藩國至五十七當厄於兵宜善防之後文帝黃初七年年四十病困左右曰建平所言八十謂晝夜也吾其決矣頃之果崩夏侯威為兗州剌史年四十九十二月上旬得疾念建平之言自分必死至三十日夜半卒應璩六十一為侍中直省內歘見白狗問之眾人悉無見者於是數聚會并急遊田里飲宴自娛過期一年而卒曹彪封王五十七坐與王陵通謀賜死凡說此輩無不如言魏書曰文帝甄皇后漢光和五年十二月丁酉生每寢寐家中髣髴見如人持玉衣覆其上常共怪之後相者劉良相后及諸姊指后曰此貴乃不可言蜀志曰先主穆皇后陳留人也兄吳壹少孤壹父素與劉焉有舊焉有異志聞善相者相后當大貴遂為子瑁納后瑁死后寡居先主既定益州而孫夫人還吳群下勸先主娉后先主疑與瑁同族法正進曰論其親踈可與晉文之於子圉乎於是納后為夫人又曰張裕曉相術每舉鏡視面自知刑死未嘗不撲之於地也又曰鄧芝字伯苗義陽新野人也漢末入蜀知益州從事張裕善相芝往從之裕謂曰君年過七十位至大將軍封侯吳志曰漢以孫策遠脩職貢遣使者劉琬加錫命琬語人曰吾觀孫氏兄弟才秀明遠然皆祿祚不終唯中弟孝廉形貌奇偉骨體不恒有大貴之表年又最壽爾其識之晉書裴秀傳曰文帝未定嗣而屬意舞陽侯攸武帝懼不得立問秀曰人有相否因以奇表示之秀後言於文帝曰中撫軍人望既茂文表如此固非人臣之相也由是世子乃定又曰孝武李太后諱陵容本出微賤始簡文帝為會稽王有三子繼夭自道生廢黜獻王早世其後諸姬絕孕將十年帝乃令善相者召諸愛妾而示之皆云非其人又悉以諸婢媵示焉時后為宮人在織坊中形長而色黑宮人皆謂之崑崙既至相者驚云此其人也帝以大計召之侍寢后數夢兩龍枕膝日月入懷意以為吉祥向儕類說之帝聞而異焉遂生孝武帝及會稽文孝王鄱陽長公主晉書曰王覽祥之弟也初呂虔有佩刀工相之以為必登三公可服此刀虔謂祥曰茍非其人刀或為害卿有公輔之量故以相與祥始固辭強之乃受祥臨薨以刀授覽曰汝後必興足稱此刀覽後弈世多賢才興於江左矣又曰羊祜少喪父遊汶水之濱父老謂之曰子有好相年未滿六十必建大功於天下既而去莫知所在又羊祜傳曰祜幼時有喜相墓者言祜墓有帝王氣若鑿之則無後祜遂鑿之相者見曰猶出折臂三公而祜竟墮馬折臂位至三公而無子又曰豫章人雷煥妙達緯象張華乃要煥宿屏人曰可共尋天文知將來吉凶因登樓仰觀煥曰僕察之久矣唯牛斗之閒頗有異氣華曰是何祥也煥曰寶劍之精上徹於天耳華曰君言得之吾少時有相者言吾年六十位登三事當得寶劍佩之斯言豈効歟又曰檀梁憑之嘗有善相者晉陵韋叟見憑之大驚曰卿有急兵之厄其候不過三四日耳宜深藏以避之不可輕出及桓玄將皇甫敷之至羅落橋也憑之與劉裕各領一隊而戰軍敗為敷軍所害又曰魏詠之字長道任城人家素貧而躬耕為事好學不倦生而兔缺有善相者謂之曰卿當富貴後果如言又曰王彌少遊俠京師隱者董仲道見而謂之曰君豺聲豹視好亂樂禍若天下騷擾不作士大夫矣晉中興書曰陶侃少漁雷澤夢生八翼飛至天門而不入相者師珪曰君位當上公為八州都督
