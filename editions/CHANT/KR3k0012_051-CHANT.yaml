body:
  text: 隴塞及海外諸山隴山說文隴山天水大坂也辛氏三秦記引俗歌云隴頭流水鳴聲幽咽遙望秦川肝腸斷絕又云震關遙望秦川如帶酈元水經注云縣西山謂之小隴巖嶂高嶮不通軌轍故張衡四愁詩云我所思兮在漢陽欲往從之隴坂長是也周地圖記云其山高處可三四里登山東望秦州可五百里目極泯然墟宇桑梓與雲霞一色其上有懸溜吐于山中為澄潭名曰萬石潭流溢散下皆注於渭東人西役升此而顧莫不悲思其歌云隴頭泉水流離西下念我行役飄然曠野登高遠望涕零雙墮是此山也小隴西三秦記曰小隴山一名隴坻又名分水嶺漢書揚雄解嘲云響若坻頹應劭曰天水有大坂名隴山其旁有崩落者聲聞數百里故曰坻頹又曰其坂九廻上者七日乃越上有清水四注下有縣縣因此水而名朱圉山漢書地理志曰天水冀縣有朱圉山一名巖山在縣南梧中聚土地十三州志云朱圉有石鼓不擊自鳴則兵起契吳山涼州記曰契吳山在縣北七十里赫連勃勃北遊契吳而歎曰美哉斯阜臨廣澤而帶清海吾行地多矣自嶺已北大河已南未有若斯之壯麗矣可藍山涼州記曰可藍山一名都廬山皆涇水源與笄頭山連亙赫連定勝光二年畋于涼州登可藍山望統萬城泣曰先帝若以朕承大業豈有今日在平涼縣接百泉界又云定據平涼登此山有群狐遶之而鳴射之竟不得一定乃歎曰咄咄此亦怪事也石門山酈元水經注曰離水又東經石門口山高險絕對岸若門故以得名疑即皋蘭山門也漢武元狩三年驃騎將軍霍去病出隴西至皋蘭謂是山之關塞矣燕然山漢書曰貳師引兵還至燕然山單于知漢軍勞倦自將五萬騎遮擊貳師軍大亂敗貳師降單于范曄後漢書曰竇憲與單于戰於稽范山大破之降者前后二十餘萬人憲遂登燕然山去塞三千餘里刻石勒碑令班固作名天山漢書曰漢使貳師將軍將三萬騎出酒泉擊右賢王於天山得首虜萬級而還又曰且西彌國王治天山東大谷去長安八千六百七十里續漢書曰竇固出塞至天山斬首千餘級水經注曰陰山故郎候應言於漢曰陰山東西一千餘里單于之苑囿也自武帝出師攘之於北漠匈奴過之未嘗不哭謂此山也西河舊事曰天山高冬夏長雪故曰白山山中有好木鐵匈奴謂之天山過之皆下馬拜在蒲海東一百里即漢貳師擊右賢王之處也山海經曰天山多金玉有雄黃莢水出焉而西流注于湯谷有神鳥狀如黃囊赤如丹火六沌四翼渾沌無面目是識歌舞實惟帝江天山今名折羅漫山在縣北一百里九州要記曰涼州古武成郡有天山黃帝受金液神丹於此山山近崆峒山山頂有魏太祖馬埒焉祁連山漢書曰霍去病擊匈奴至祁連山濟居延水遂臻小月氏西河舊事曰祁連山在張掖酒泉二界焉支山在刪丹故縣東西百餘里南北二十里亦宜畜匈奴失二山乃歌曰亡我祁連山使我六畜不蕃息失我焉支山使我婦女無顏色涼州記曰祁連山張掖酒泉二界之上東西二百里南北百餘里山中冬溫夏涼宜牧牛乳酪濃好夏寫酪不用器物刈草著其上不散酥特好酪一斛得升餘酥又有仙人樹行人山中飢渴者輒食之飽不得持去平居不可見焉支山漢書曰霍去病將萬騎出隴西涉狐奴水過焉支山千有餘里執渾邪王收休屠祭天金人涼州記曰焉支山在西郡界東西百餘里南北二十里有松柏五木其水草茂美宜畜牧與祁連同一刪丹山勿居山後魏書曰張袞從太祖破賀訥登勿居山聚石為峰以紀功德命袞為文臨松山十六國春秋曰晉元嘉元年張掖臨松山有石如張掖字掖漸滅張字分明又有文曰初天下四方安萬年後魏太和中置臨松郡故城在此山下臨松山一名青松山一名馬蹄山又云丹松嶺三危山河圖括地象曰三危山在鳥鼠之西南與汶山相接上為天苑星黑水出其南西河舊事曰三危山有三峰故曰三危俗亦為昇雨山在縣南二十里尚書禹貢謂竄三苗于三危又云導黑水至于南海水即自北而南經三危過梁州入南西山經曰三危之山青鳥居之三青鳥主西王母取食者別自棲息於此山也羊鶻山叚國沙州記曰羊鶻山多巖石少樹木甚似魯國南鄒山傍山北行三十里遠眺顧瞻百里但見山嶺巉巖無尺木把草西王母樗蒲山崔鴻十六國春秋曰甘松山東北有西王母樗蒲山大有神驗江水出焉叚國沙州記曰羊鶻嶺東北二百里有大山遙望甚似東岳岱山極高大嶮峻嵯峨崔嵬頗有靈驗羗胡父老傳云是西王母樗蒲山九隴山周地圖記曰昔有神人坐張掖西方山上西射酒泉郡西金山之白神射得九籌畫此山上遂成九隴因以為名九隴山鴻鷺山穆天子傳曰天子循黑水至于壁玉之山謂此也今名為鴻鷺山以山多鴻鷺所棲得名也沙角山三秦記曰河西沙角山峰崿危峻逾於石山其沙粒麤有如乾糒又山之陽有一泉云是沙井綿歷今古沙不填之人欲登峰必步下入穴即有鼓角之音震動人足又西河舊事云沙州天氣晴朗即沙鳴聞於城內又云人遊沙山結侶少或曾遊即生怖懼莫敢前其沙或隨人足自頓下經宿卻自還山上在縣七里亦名鳴沙山葱嶺山漢書曰西城三十六國而限葱嶺其河兩源一河出葱嶺山一出于寘國于寘國在南山下其河北流與葱嶺河合廣志曰葱嶺其山嶺生葱茂於常葱西域諸國志曰葱嶺高行十二日可至頂巫咸山西域志曰巫咸山一曰覆莫山注水經云塩水西北經巫咸山北山海經云巫咸之神以右手操青虵左手操赤虵在葆登群巫所從上下也又大荒西經云大荒之中有靈洲巫咸即朌巫彭巫姑巫直巫抵巫謝巫羅十里巫從此昇降百藥爰在郭璞云群巫上下靈山採藥往來也蓋神巫所遊故山得名懸度山漢書曰烏秺國有懸度者石山也谷磎不通以繩索相引而度又大頭痛山度則頭痛嘔吐驢畜皆然頭痛山漢書曰杜欽說大將軍王鳳曰罽國自知絕遠兵不可至道又歷大頭痛山小頭痛山赤土身熱之阪道使者尺六寸長往三十里漢書曰罽賓國歷大頭痛山有三池盤石坂道狹者尺六七寸繩索相引乃度廣志曰大頭痛山小頭痛山皆在罽賓東鐵山漢書曰莎車國有鐵山出青玉穆天子傳曰天子西征至剞居蟻切閭氏乃命剞閭氏供養六師之人于鐵山之下天子祭鐵山青山水經注曰北地富平縣西河則有兩山相對水出其間即上河峽也世謂之青山河水歷峽北注枝分東出石崖山水經注曰塞外歷域有石崖山西去北城五百里山石上自然有文畫獸馬之狀粲然成著類似圖焉故亦謂之畫石山䟽屬山山海經曰貳負之臣曰危與貳負殺窫窳帝乃梏之䟽屬之山梏猶擊縛也桎其右足桎械也反縛兩手與髮約髮合縛之也繫之山上磐石之下在開題西北漢宣帝時使人鑿上郡發磐石石室中得一人徒倮被髮反縛械一足時人不識乃載之於長安帝以問群臣群臣莫能知劉子政案此言之宣帝大驚於是時人爭學山海經矣論者多以為是其尸象非真體也意識者以為靈怪化論難以理測物稟異氣出於不然不可以常理推之可以近較察之矣魏時有人發故周靈王冢得殉葬女子不死至數日而有氣數月而能語狀如二十許女子人送詣京師郭太后愛養之恒不離左右十餘年太后崩哀思哭泣一年餘而死即此類也侖山山海經曰侖山者其山上有金玉下多青雘有木狀如穀而赤理其汁如漆其味如飴食者不飢可以釋勞其名曰白若或非皋蘇皋蘇一名白若見廣雅可以血玉血謂可用染玉作光彩也蛇山山海經曰北海之內有虵山者虵水出焉東入于海有五采之鳥飛蔽一鄉漢宣帝元康元年五色鳥以萬數飛屬縣即此鳥五采之鳥名曰翳鳥鳳屬也離騷曰駟玉風而乘翳鳥東口山山海經曰東口之山有君子之國其人衣寇帶劍役使虎豹好謙讓有司幽之民帝俊生星龍星龍生司幽思士不妻思女不夫言其人直思而氣通魄合而生子此莊子所謂白鶴相視眸子不運而風化之類也食黍食獸是使四鳥流波山山海經曰東海中有流波山入海七十里其上有獸狀如牛蒼身而無角一足入水則必風雨其光如日月其音如雷名曰夔黃帝得之以其皮作鼓橛以雷獸之骨雷獸則雷神獸龍身鼓其腹者撅挽擊也聲聞五百里以威天下鉤吾山山海經曰鉤吾之山其上多金其下多銅有獸焉羊身人面而目在腋下虎齒人爪其音如嬰兒名曰𧲼鴞食人為物貪焚食人未盡還害其身像在夏后鼎左傳所謂饕餮也天臺山山海經曰大荒之中有山名曰天臺海水入焉鵲山山海經曰鵲山其首曰招搔臨于西海之上在南山之西頭濱西海也多桂桂葉似杜杞長尺餘味辛白花叢生生間無雜木呂氏春秋曰招搖之桂是也多金玉有草焉其狀如韭而青花其名曰祝荼或作程茶食之不飢有木焉其狀如穀而黑理穀楮也皮作紙其華四照言有光炎也若木華也見赤光照下見亦比類也見離騷其名曰迷穀佩之不遠小次山山海經曰小次山山上多白玉下多銅有獸如猿白首赤足名曰未厭見則大兵長古山山海經曰長古之山無草多水有獸焉狀如禺而四耳名長古以山出此獸因以名之音如吟如人呻吟聲見則郡縣大水基山山海經曰基山其陽多玉其陰多金多怪木有獸焉其狀如羊九尾四耳其目在背其名曰縛訑搏他二音有鳥焉其狀如雞而三首六目六足三翼其名曰䳤𩿧憋𩿧憋怤兩音怠性食之無臥猥翼山山海經曰猥翼之山其中多怪獸水多怪魚几言怪者皆為貌狀掘奇不常也尸子云徐偃王好怪沒水而得怪魚入山得怪獸者爭列於庭密山山海經曰密山山上多丹木員葉赤莖黃花赤實味如飴食之不飢丹水出焉西注于稷澤后稷神所憑山名之其中多白玉膏其源沸沸湯湯玉膏涌出之貌也河圖云少室山有白玉膏服即仙矣此類也音拂也黃帝是食是饗所以得登龍於鼎湖而靈化也是生玄玉言玉膏中又出黑玉也玉膏所出以灌丹木丹木五歲五色乃清言鮮光也五味乃馨言滋香也黃帝取密山之玉榮謂玉華也而投之鍾山之陰以為玉鍾瑾瑜之玉為良言善玉也堅粟精密禮記鎮玉以粟或作栗玉有栗文所謂㯏壁濁澤有光濁謂潤澤也五色發作以知柔剛天地鬼神是食是饗玉所以祈祭者言能動天地感鬼神也君子服之以衛不祥今徼外出金剛石金剛石似金有光彩可以刻玉外國人帶之云辟惡氣也亶受山山海經曰亶受之山亶音蟬多水無草木不可以上言崇峭也有獸焉其狀如狸而有髮其名曰類類或作師自為牝牡食者不妬莊子亦曰類自為雌雄而化今狟豬亦自雄雌也耆闍窟山法顯記曰耆闍崛山未至頂三里有石窟佛本於此坐禪天魔波句化作鵰鷲住窟前以恐阿難佛以神力隔石舒手摩阿難頂怖即得止鳥跡手孔今悉在故名雕鷲窟山窟前有四佛坐處靈鳥山支曇嘗諦靈鳥山銘序曰昔如來遊王舍城憩靈鳥山舊云其山峰似鳥而威靈故以為名焉眾美咸歸壯麗畢備
