body:
  text: 雜樂部觱篥樂部曰觱篥者笳管也卷蘆為頭截竹為管出於胡地制法角音九孔漏聲五音咸備唐以編入鹵部名為笳管用之雅樂以為雅管六竅之制則為鳳管旋宮轉器以應律管者也通典曰篳篥本名悲篥出於胡中其聲悲或云濡者得傳胡人吹以驚中國馬後乃以笳為首竹為管也通典曰桃皮東夷有卷桃皮以為篳篥也二具大蠡也容可數升並吹之以節樂亦出南蠻樂府雜錄曰篳篥者本龜茲國樂也亦名悲篥有類於笳也德宗朝有尉遟青官至將軍大曆中有幽州王麻奴者解吹𥯤觱篥河北推為第一手頗踞傲自負除戎師外莫有敢輕易請者時有從事姓盧不記名臺拜將入京臨歧把酒請麻奴吹一曲子相送麻奴偃蹇大以為不可盧乃怒曰汝蓺亦未足稱者殊不知上國有尉遟將軍冠絕今古麻奴大怒曰某之此蓺海內豈有及者耶今即往彼定其優劣不數月到京訪尉遟所居即常樂里也乃於側近僦居日夕加意吹之尉遟每經其門過如不聞麻奴尚未分因賂其閽者方得通見即設席於地令坐乃於高般涉調中吹一曲勒部低曲終流汗夾背尉遟頷頤謂曰此曲何必於高般涉徒費許多氣力也因自出銀字管於平般涉調中吹之麻奴驚僨垂泣拜之曰某生於偏遠之方偶有寡藝實為無人今日幸聞天樂方悟前非遂將樂器碎之而歸終身不復言觱篥明皇雜錄曰明皇既幸蜀西南行初入斜谷屬霖雨涉旬於棧道雨中聞鈴聲與山相應上既悼念貴妃採其聲為雨霖鈴曲以寄恨焉時梨園弟子善吹觱篥者張野狐唯此人從至蜀上因以其曲授野狐泊至德中車駕復幸華清宮從官嬪御多非舊人上於望京樓下命野狐奏雨霖鈴曲未半上四顧淒涼不覺流涕左右感動與之歔欷其曲今傳於法部五絃國史補云趙壁彈五弦人問其術壁曰吾之於五絃也始則心驅之中則神遇之終則天隨之方吾浩然眼如耳耳如鼻不知五絃之為壁壁之為五絃也音律圖曰五弦不知誰所造也今世有之比琵琶稍小蓋北國所出也又曰二絃未詳所起形如琵琶二絃四隔孤柱一合散聲二隔聲八柱聲一惣一十聲隨調應律又曰秦漢未詳所起與琵琶同以不開目為異四絃四隔合散聲四隔聲十六惣二十聲隨調應律六絃又曰六絃史盛作天寶中進形如琵琶而身長六絃四隔孤柱一合散聲六隔聲二十四柱聲一惣三十一聲隔調應律七絃又曰七絃鄭喜子作開元中進形同阮咸而大近身旁有少缺取其近身便也絃十三隔孤柱一合散聲七隔聲九十一柱聲一惣九十九聲隨調應律太一又曰太一司馬滔作開元中進十二絃六隔合散聲十二隔聲七十二絃散聲應律呂以隔聲旋相為宮合八十四調今入雅樂宮懸內用之矣又曰天寶樂任歷作天寶中進類石憧十四絃設柱黃鍾一均足倍七聲後柱作調應律每舞者執之方響三禮圖方響梁有銅磬蓋今方響也方響以鐵為之脩九寸廣二寸圓上方下架磬而不設倚架上以代鍾磬人間使用者纔三四寸樂府雜錄曰唐咸通中有調音律官吳繽為鼓吹署丞善打方響其妙超群本朱崖李太尉家樂人也缶易曰日昊之离不鼓缶而歌則大耋之嗟凶毛詩宛丘曰坎其擊缶宛丘之道缶者瓦器所以盛酒漿秦人鼓之以節歌也爾雅曰盎謂之缶注云盆也史記曰秦王與趙王會澠池藺相如從秦王曰寡人聞趙王好音請奏琴趙王鼓琴秦御史書曰某年某月秦王命趙王鼓琴相如亦奉缶秦王秦王不肯相如曰五步之內請以頸血濺大王秦王不懌為一擊之相如亦命趙御史書曰某年某月趙王使秦王擊缶淮南子曰夫窮鄉之社扣瓮瓶相和而歌自以為樂常試為之擊建鼓撞巨鐘乃始知夫瓮瓶之足差也徐幹中論曰聽黃鍾之音知擊缶之細涉庠序之教知不學之困呂氏春秋曰堯使質以麋鞅魚缶而鼓之也墨子曰農夫春耕夏耘秋歛冬藏息於吟缶大周正樂曰今缶八永太初司馬滔進獻廣平樂兼此八缶具黃鍾一均聲樂府雜錄曰唐大中初有調音律官天興縣丞郭道源善擊甌用越甌邢瓶共一十二旋加減水以筯擊之其音妙於方響也鐸周禮曰二十五人為兩置司馬一人因以名焉木舌金鈴曰鐸軍中執之以通鼓也後周書曰長孫紹遠為太常廣召工創造樂器土木絲竹各得其宜唯黃鍾不調紹遠每以為意嘗因退朝經韓使君佛寺過浮圖三層之上有鳴鐸焉忽聞其音雅合宮調取而配奏方始克諧紹遠乃啟世宗行取通禮義纂曰鐸大鈴振之以通鼓也大周正樂曰鐸如鐃以木為舌搖之以和鼓也樂書曰木鐸者鈴也主銅為之以木作舌故天將以夫子為木鐸言施政教時天將命以號令天下文舞所執而鳴之以振文教樂書曰金鐸者形同木鐸以為金舌號令為度鳴而驚眾舞所執以振武教者也鄭注司馬職云掩上振之為摝摝者止行息氣也六軍三三而居其間相遠故振鐸以通之使軍眾知可進可止之節也司馬法曰鼓聲不過閶鼙聲不過闒鐸聲不過其琅也廣古今五行記曰晉愍帝建興四年晉陵人陳寵在田得銅鐸五枚皆有龍虎形大周正樂曰唐朝承周隋離亂之後樂懸散失獨無徵音國姓所闕知者不敢聞達其事天后末御史大夫李嗣真常密求之不得一旦秋爽聞砧聲有應之者在今弩營是當時英公宅又數年無由得之其後敬業舉兵敗走后瀦其宮嗣真乃求得喪車一鐸入而振之於東南隅果有應也遂掘之得石一段裁為四具補樂懸之散闕今享宗廟郊天掛簨簴者乃嗣真所得也鐃釋名曰鐃鐃也宮懸用之飾以流蘇禮記曰始奏以文文擊鼓以驚眾也復亂以武武擊鐃而退也周禮曰金鐃止鼓鐃如鈴無舌者秉執而鳴之以止鼓也樂書曰金鐃小者似鈴執而鳴之以止鼓也舞武工人所執謂振而退武也大者懸而擊之象鍾形薄旁有二十四銑應律音而和樂也說文曰鉦鐃也鈴柄中上下通鉦也銑小鐃也軍法卒長執銑漢有鼓吹曲有鐃歌鐲周禮曰鼓人以金為鐲節鼓形如小鍾行鳴之以為鼓節也近代有大銅疊懸而擊之又曰卒長執鐃兩司馬執鐲言鐲鐃之用謂鉦鐸之屬以金鐃止鼓而金鐲節鼓然是四金之數故鐲者非雅樂器也角通禮義纂曰長鳴角也按蚩尤師蝄蜽與黃帝戰於𣵠鹿帝命吹角為龍鳴以禦之魏武帝征烏桓軍士思歸乃減角為中鳴其聲尤悲以應胡笳晉宋以降沿襲用之有長鳴唐禮大駕陳一百二十具是承晉魏之制也宋樂志曰西戎有吹金者銅角長可二尺形如牛角書記所不載或云出羗胡以驚中國馬又曰角長五尺形如竹筒本細末稍大未詳所起今鹵部及軍中用之或以竹木或以皮為之無定制按古軍法有吹角也此器俗名拔邏廻蓋胡虜驚軍之音所以書傳無之海內亂離至侯景圍臺城方用之也銅鉢又曰銅鉢是西涼樂也以皮細相擊應節令法樂用之通典曰銅鉢亦謂之銅盤出西戎及南蠻其圍數寸隱起如浮漚貫之以韋相擊以和樂也南蠻國大者圍數尺或謂齊穆士素所造也壤風土記曰壤者以木作前廣後銳長尺三四寸其形如履節僮少以為戲也堯時有八九十老人擊而歌曰日出而作日入而息鑿井而飲耕田而食帝何為於我哉風俗通曰相拊也所以輔相於樂奏樂之時先擊相又曰雅形如漆䇶有椎詩云訊疾以雅是也撫相大周正樂曰撫相以韋為之實以糠撫之以節也春牘周禮笙師曰云掌春牘應雅鄭司農云狀如漆䇶而弇口大長五尺六寸以革鞔之有兩紐虛無底舉以頓地如舂杵亦謂之頓相相助也以節樂也或謂梁孝王築睢陽城方十二里造時唱聲以小鼓為節築者下築和之後世謂此聲為睢陽樂柏板樂府雜錄曰玄宗令黃幡綽撰柏板譜幡綽乃於紙上畫一耳進之問其故對曰但有耳道則無失其節奏也韓文公因為樂司
