body:
  text: 羽族部七烏春秋運斗樞曰搖光星散為烏左傳曰子元以車六百乘伐鄭諸侯救鄭楚師夜遁鄭人將奔桐丘諜告曰楚幕有烏乃止又曰晉侯伐齊齊師夜遁師曠告晉侯曰鳥烏之聲樂齊師其遁鳥烏得空營故樂也叔向告晉侯曰城上有烏齊師其遁毛詩曰莫赤匪狐莫黑匪烏又曰瞻烏爰止于誰之屋具曰予聖誰知烏之雌雄又曰弁彼鸒斯歸飛提提爾雅曰鸒斯鴨鶋楚烏也又曰雅烏小而多聲腹下白又曰烏鵲醜其掌縮飛縮腳復下又曰有燕白脰烏鸀山烏鸀似烏而小赤觜穴乳出西方春秋運斗樞曰飛翔羽翮為陽陽氣仁故烏反哺春秋元命苞曰火流為烏烏孝鳥陽精天意烏在日中從天以照孝也尚書緯曰火者陽也烏有孝名武王卒大業故烏瑞臻漢書曰成帝時御史府中列柏樹常有野烏數千栖宿其上晨去暮來號曰朝夕烏又曰黃霸為頴川太守遣吏有所伺察吏出不敢舍郵亭食於道旁烏攫其肉民有欲詣府言事適見之霸與語道此後日吏還見霸迎勞之曰甚苦食於道旁乃為烏所盜肉吏大驚以霸具知其起居所問毫釐不敢有所隱後漢書曰馬援曰當吾在西黑浪泊間詔書每到腹如湯火下潦上霧毒氣上蒸仰視鳥鳶跕跕墮水中謝承後漢書曰廣漢儒叔林為東郡太守烏巢於廳事屋梁兔產於床下司馬彪續漢書曰桓帝時童謠曰城上烏尾畢逋一年生九鶵公為吏子為徒一徒死百乘車吳曆曰吳王為神主來立廟蒼龍門時有烏巢朱雀門上晉書載記曰慕容冲之亂有群烏數萬翔鳴于長安城上其聲甚悲占者以為鬭羽不中年有甲兵入城之象梁書曰高國有烏旦旦集王殿前為行列不畏人日出後然後散去陳書曰司馬申短毛喜於後主使其廢錮又與施文慶李脫兒北周譖殺傅縡奪任忠部曲以配蔡徵申嘗書寢於尚書下省有烏啄其口流血及地時論以為譖賢之效也北史曰西魏裴俠年七歲不能言後於洛城西見群烏蔽天從西來舉手指之而言遂志識聰慧甚異常童又曰齊蕭放居喪以孝聞居廬門室前有二慈烏來集各據一樹為巢自午以前馴庭前飲啄午後更不下樹每臨時舒翅悲鳴全似哀泣家人伺之未嘗有闕又曰齊世辯性怯武平末為開府周師入鄴令辯以千餘騎覘候出險口登高阜西望遙見群烏飛起謂是西軍旗幟即馳還比至紫陌橋不敢返顧後周書曰宗懍遭母憂去職哭歐血兩旬之內絕而復蘇者三每旦有群烏數千集于廬舍候哭而來哭止而去又曰皇甫遐字永賢少喪父事母以孝聞後母亡廬於墓側負土為墳乃有鴟烏各一徘徊悲鳴不離墓側若助遐者隋書曰焬帝起宮丹陽將遊于江左有烏鵲來巢幄帳驅不能止唐書曰武德中張志寬純孝丁母憂於墓側負土成墳有烏巢於廬前樹上志寬哭臨烏輒悲鳴高祖聞之遣使弔賜帛三十段表其門閭又曰李義府召見太宗試令詠烏其末云上林多許樹不借一枝栖帝曰吾將全樹借汝豈唯一枝又曰貞元四年夏鄭汴二州烏群皆去分入田緒李納境內銜木為城高二三尺方十餘里緒納惡而命焚之信宿如故烏口多流血又曰柳仲郢為尚書左僕射東都留守盜發先人墓棄官歸華原除華州刺史不拜後以本官為天平軍節度受節鉞於華原別墅卒於鎮初仲郢自拜諫議後每遷官群烏大集於昇平里第庭樹戟架皆滿凡五日而散詔下不復集家人以為候唯除天平烏不集又曰長慶中濮州雷澤縣百姓張憲莊榆樹有烏巢因風墜三鶵有鵲巢於東南樹引所墜二鶵於其巢哺之太公六韜曰武王登憂臺以臨殷民周公旦曰臣聞之愛其人者愛其屋上烏憎其人者憎其余胥燕丹子曰燕太子丹質於秦秦王遇之無禮不得意欲歸秦王不聽謬言令烏白頭馬生角乃可丹仰天歎之烏即白頭馬為生角秦王不得已而遣之韓子曰夫馴鳥者斷其下翎則必恃人而食焉得不馴乎夫明主之畜臣亦然全臣不得全利夫利君之祿不得無服上之名君焉得不復祿淮南子曰堯時十日並出堯命羿仰射十日中其九烏皆死墮其羽翼抱朴子曰石先生丹法取烏之未生毛羽者以真丹和牛肉以吞之至長其毛羽皆赤乃殺陰乾百日并禱服百日得壽五百歲說苑曰孔子曰存亡禍福皆在己而已天災地妖亦不能殺也昔者殷王帝辛之時爵生烏於城之隅工人占之曰凡小以生巨國家必祉王名必倍帝辛喜爵之德不治國家凶暴無極外寇乃至遂亡殷國此逆天之時說福反為禍也楚辤曰羿焉畢日烏焉解羽焦氏易林曰城上有烏自名破家風俗通曰案明帝起居注上東巡泰山到滎陽有烏飛鳴乘輿上虎賁王吉射之中而祝曰烏烏啞啞引弓射洞左掖陛下壽萬年臣為二千石帝賜錢二百萬令亭壁悉畫為烏又曰烏號弓者柘桑枝條暢荗烏登其上垂下著地烏適飛去從後撥殺取以為弓因名曰烏號說文曰烏孝鳥也異苑曰陽顏以純孝著聞後有群烏衘鼓集顏所居村烏口皆傷一境以為顏至孝故慈烏來萃衘鼓之興故令聾者遠聞即於鼓處立縣而名為烏傷王莽改為烏孝以章其行跡云崔豹古今注曰烏一名鷙鳥述征記曰相風烏在靈臺上遇千里風則動成公緩烏賦序曰有孝鳥集余之廬乃喟爾歎曰無仁惠之德祥禽曷為而至哉夫烏為瑞久矣以其反哺識養故為吉鳥是以周書神其流變詩人瞻其所集國有道則見國無道則隱斯鳳鳥之德何以加焉服惡鳥而賈生懼之烏善禽而吾嘉焉懼惡而作歌嘉善而賦之不亦可乎洞林曰寧遠參軍弘景則其姊適吳病四十餘年暫來歸在其家令卦之得明夷之小過然病每欲動時輒有烏來鳴即便發作案卦中當時得獨蹄豬畜之江東名之為獨足猪後婦人如欲眠而見一丈夫衣服盡黑在戶前立遙呼婦人語其來前不肯言有所畏遂泣而去病如小間吾與殷侯共論此事曰烏日之禽豬月畜水火相忌自然之數故取玄陰之伏物用消太陽之飛精日中三腳故以獨足者當之南越記曰烏賊魚常自浮水上烏見以為死便啄之乃卷取烏故謂烏賊魚今匹烏化為之魚地理志曰孤山正在江中有烏飛入舡人以飯與之烏且飛且啖譙子法訓曰夫孝行之本替本而求未有得之者也如或得之君子不貴矣烏者猶有返哺況人而無孝心者乎孝子傳曰李陶交趾人母終陶居干墓側躬自治墓不授鄰人助群烏衘塊助成墳劉義慶世說曰徐干木年少時嘗夢烏從天下衘長繖敬樹其庭前烏復上天衘繖下樹凡三繖竟烏大鳴作惡聲而去徐後果遂以惡終春秋運斗樞曰維星得則日月光烏三足禮義循物類合春秋元命包曰日有三足烏者陽精其僂呼也僂呼溫潤生長之言東觀漢記曰章帝元和二年三足烏集沛國三年代郡高柳烏子生三足大如雞色赤頭上有角長寸餘後漢書曰明帝三年秋七月景申順陽獻三足烏八月甲子群臣上表稱慶詔曰夫天不愛淫地稱表瑞莫不威鳳巢閣圖龍躍沼豈直日月珠連風雨玉燭是以鉤命決曰王者至孝則出元命苞曰人君至治所有虞舜蒸蒸來茲異祉周文翼翼翔此靈禽文考至德下覃遺仁爰被遠符千載降斯三足將使三方歸本九州翕定惟此大禮景福在民予安敢攘宗廟之善弗宣大惠可大赦天下文武官並遣進三級隋書曰大業四年蜀郡獲三足烏張掖獲玄狐各一唐書曰天授元年有進三足烏者天后以為周室嘉應睿宗時為皇嗣言曰烏前足偽也天后不悅須臾一足墮地果如其言又曰寶應元年秋七月巳卯京兆府萬年縣獲三足烏獻之淮南子曰日中有踆烏月有蟾蜍踆獨蹲止不行謂三足也抱朴子曰青冷傳云熒火精生朱鳥古今注所謂赤烏者朱鳥也其所居高遠日中三足烏之精三足烏何以三足陽數奇也以是有虞至孝三足集其庭曾參鋤苽三足萃其冠司馬相如大人賦曰吾乃覩西王母皜然白母首戴勝而穴處有三足烏為之使論衡曰儒者言日中有三足烏日火也烏入火中燋爛安得立然烏日氣也張衡靈憲曰日陽精之宗積而成烏烏有三趾陽之類數奇括地圖曰崑崙之弱水中非乘龍不得至有三足神烏為西王母取食孫氏瑞應圖曰三足烏生王者慈孝天地則至晉諸公贊曰世祖時西域獻三足烏遂累有赤烏來集此昌陵後縣案昌字重曰烏者日中之鳥有託體陽精應期曜質以顯至德者也尚書中候曰周太子發渡孟津有火自天止於王屋為赤烏又曰有火自上復於王屋流為烏其色赤其聲魄瑞應圖曰赤烏武王時銜穀米至屋上兵不血刃而殷服一本曰王者不貪天下而重民命則至墨子曰赤烏衘珪降周之歧社日命周文王伐殷河出圖地出乘黃天錫武王黃鳥之旗帝王世紀曰豐公家于沛之豐邑中陽里其妻夢赤烏若龍戲已而生執嘉是為公即太上皇吳志曰赤烏元年八月武昌言赤烏見集於殿前朕所親見若神靈以為嘉祥者改年宜以赤烏又曰孫休永安三年春三月西陵言赤烏見常璩華陽國志曰𤏡道縣孝子吳順養母赤烏巢其門孝子傳曰吳叔和犍為人母沒負土成墳有赤烏巢門甘露降戶薛綜赤烏頌曰赫赫赤烏惟日之精朱羽丹質希代而生孝經援神契曰王者德至鳥獸則白烏下漢書曰孝昭元鳳三年有白烏數千下集泰山萊蕪山南古今注曰成帝河平四年白烏集孝文廟殿下黑烏從之和帝元興元年白烏一見廬江足皆赤王隱晉書曰虞溥為鄱陽內史觀勵學業為政嚴而不猛寬裕簡素白烏集郡庭止于棗樹就執不動宋起居注曰元嘉十三年戚羨縣民談含送白烏皓質潔映有若輝璧爰稽瑞圖寔惟嘉祥齊書曰高帝時有獻白烏帝問此何瑞范雲位卑最後荅曰臣聞王者敬宗廟則白烏至時謁廟始畢帝曰卿言是也感應之理一至此乎薛綜烏頌曰粲焉白烏皓體如素宗廟致敬乃胥來顧禮斗威儀曰江海不揚鴻波東海輸之蒼烏又曰君乘木而王其政升平南海輸以蒼烏孫氏瑞應圖曰文王時見蒼烏王者孝悌則至一本曰賢君帝王修行孝慈被於萬姓不好殺生則來隋書曰高祖授禪之年三月辛巳高平獲赤雀太原獲蒼烏
