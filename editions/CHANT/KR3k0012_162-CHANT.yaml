body:
  text: 河北道上懷州元和郡縣圖曰懷州河內郡禹貢冀州之域覃懷之地周為畿內及衛邗雍三國春秋時屬晉七國時屬韓魏二國秦兼天下滅衛為三川郡禹貢曰覃懷底績至于衡漳後漢書曰光武定河內而難其守問於鄧禹曰諸將誰可使守河內者禹曰昔高祖任蕭何於關中無復西顧之憂今河內帶河為固戶口殷實北通上黨南迫洛陽寇恂文武備足非此子不可也乃拜恂為河內太守恂移書屬縣講兵肄射伐湛園之竹以為矢養馬收租以給軍左傳曰周與鄭人蘇仇生之田州陘隤懷州今河內縣又曰襄王賜晉文公以陽樊溫原攢茅之田晉於是始啟南陽在晉山之南河之北故曰南陽元和郡縣圖曰河內縣春秋野王邑也左傳曰晉人執晏弱于野王漢志曰武德縣屬河內始皇東巡自以武德定天下故名之也十道志曰脩武本甯邑也韓詩外傳曰武王伐紂勒兵於甯故改曰脩武韓非書曰秦昭王敗趟長平西伐脩武漢書曰漢武帝將幸緱氏至汲縣之新中鄉得南越相呂嘉首因立為獲嘉縣孟州圖經曰孟州河陽郡禹貢冀豫二州之境則武王伐紂會盟津是也周為畿內蘇忿生之邑後為晉邑左傳曰晉侯召王以諸侯見且使王狩仲尼曰以臣召君不可以訓故書曰天王狩于河陽北齊書曰神武使潘岳鎮北城又使高永樂守南城以備西魏又東魏所築中潬城仍置河陽關故有河陽三城侯使冀州圖經曰河陽在河內郡南六十四里有宮有關晉書曰潘岳才名冠世為眾所嫉出為河陽令左傳隱三年曰鄭祭足帥師取溫之麥秋又取成周之禾又僖十年狄滅溫今河內溫縣溫子奔衛周襄王以地賜晉文公衛州元和郡縣圖曰衛州汲郡禹貢冀州之域後為殷都衛縣界朝歌是也戰國時屬魏秦屬河東郡漢為汲縣地地理志曰河內殷之舊都周既滅殷分其畿內為三國詩風邶庸衛是也邶以封紂子武庚鄘管叔尹之衛蔡叔尹之以監殷人謂之三監史記曰周旦以成王命興師殺武庚祿父殺管叔放蔡叔以殷余民封康叔為衛君居河淇之間故商墟漢志曰朝歌屬河內紂所都周武王弟康叔所封更名衛王莽曰雅歌劉子曰邑號朝歌墨子迴車後漢書曰虞詡為朝歌令多盜連年不解親舊多勞弔之曰得朝歌何衰也詡笑曰難者不避易者必從臣之節也詡謁河內太守馬稜稜曰君儒者乃在朝歌甚為君憂之詡曰賊犬羊相聚以求飽暖耳去敖倉不過百里不知取以為糧青冀流民不知掠以為眾守其阨塞此為斷天下之右臂也今則不然此無大計之效也詡悉平之春秋後序曰太康五年吳寇始平余自江陵還襄陽解甲休兵乃申予舊意修成春秋釋例及經傳集解始訖會汲郡汲縣有發其界內舊塚者得古書皆簡編科斗文字發塚者不以為意往往散亂科斗書久廢推尋不能盡通始者藏在祕府余晚得見之劉澄之山川古今記曰黎陽古黎國也詩曰黎侯寓于衛是也相州元和郡縣圖曰相州鄴郡禹貢冀州之域春秋時地屬晉戰國時屬魏魏文侯使西門豹守鄴是也秦併天下為邯鄲上黨二郡之地漢高帝分置魏郡治鄴尚書曰河亶甲居相後魏書曰道武幸鄴訪立州名尚書崔光對曰昔河亶甲居相宜曰相州道武從之漢志曰魏郡領鄴館陶斥丘等一十八縣後魏書曰文帝太和十八年卜遷都經鄴登銅雀臺御史崔光等曰鄴城平原千里漕運四通有西門使起舊跡可以饒富在德不在險請都之孝文曰君知其一未知其二鄴城非長久之地石虎傾於前慕容減於後國富主奢暴成速敗且西有枉人山東有列人縣北有柏人城君子不飲盜泉惡其名也遂止魏書曰黃武二年以魏郡東部為陽平郡西部為廣平郡廣平陽平魏平三郡為三魏也圖經曰安陽紂都也在淇洹二水之間本殷墟所謂北冢是也戰國策曰紂昔聚兵百萬左飲淇水使竭右飲洹水不流晉書載記曰石勒諸將佐議欲都鄴將攻三臺張賓進曰三臺險固攻守未可卒下於是進襄國漢志曰內黃屬魏郡春秋吳子晉侯會于黃池今黃澤在西陳留有外黃故加內云洺州十道志曰洺州廣平郡屬禹貢冀州之域春秋時為赤狄之地後屬晉左傳晉荀林父敗赤狄于曲梁是也七國時屬趙秦併天下為邯鄲郡漢初置廣平國禹貢曰覃懷底績至于衡漳衡漳在肥鄉縣左傳曰公會單頃公及諸侯同盟于雞澤杜注云雞澤在廣平曲梁縣漢志廣平國領縣十六武帝征和二年改為平于國宣帝復故王莽曰富昌十道志曰洺水縣本漢斥漳縣也漢志曰以其國斥鹵故云斥漳又曰曲周屬廣平國莽曰直周圖經曰邯鄲單盡也邯山名謂邯山之所盡也邢州十道志曰邢州鉅鹿郡禹貢冀州之域秦併天下於此置信都縣屬鉅鹿郡左傳曰凡蔣邢茅周公之胤也又成十五年楚大夫申公奔晉晉以為邢大夫東陽晉之山東魏郡廣平是郡國志曰邢州尚書坊東平地周百餘步其所鳴響人馬行上轟轟有聲掘之即火出十三州志曰鉅鹿唐虞時大麓之地尚書堯試舜百揆納于大麓麓則林之大者堯之禪舜欲使天下皆見之故合群臣與百姓納之大麓之野然後授受以明已禪也張耳傳曰高祖從平城還過趙趙王自上食禮甚卑高祖箕踞趙相貫高等乃壁人柏人要之上過欲宿心動問縣名為何曰柏人上曰柏人者迫於人也不宿而去柏人今堯山縣冀州十道志曰冀州信都郡元和郡縣圖曰春秋時屬晉七國時屬趙在秦屬鉅鹿郡李公緒趙記曰趙孝成王造壇臺之宮為趙都朝諸侯故曰信都史記曰秦時有客說張耳曰兩君羈旅難以獨立立趙後扶以義可以就功乃求趙歇立為趙王居信都漢書曰項羽分趙立張耳為常山王居信都改曰襄國晉書曰張賓說石勒曰襄國因山憑險實形勢之國可都之遂都於此晉書曰初童謠云古在左月在右讓去言或入口古在左月在右胡字也讓去言為襄也或入口為國也尋為石勒所都後漢書曰王郎僣號河北悉應光武自薊南行至下愽惶惑不知所之有白頭父在道傍指曰努力信都為長安守光武即馳赴信都太守任光開門出迎魏志曰韓馥為冀州牧公孫瓚欲襲之袁紹使高幹諷馥令以冀州讓紹馥素恇怯因然其計馥長史耿武諫曰冀州雖鄙帶甲百萬穀支十年袁紹孤客窮軍譬如嬰兒在股掌之上絕其乳哺立可餓殺柰何以州與之馥不從以州與紹廬植冀州風土記曰冀州聖賢之泉藪帝王之舊地十三州志曰冀州之地古京也人患剽悍故語曰仕宦不偶值冀部後漢書曰王郎起光武自蘇南馳及至南宮遇大風雨光武引車入道傍空舍馮異抱薪鄧禹爇火光武對竈燎衣異進麥飯兔肩魏志曰太祖拔鄴領冀州牧或說太祖宜復古置九州冀州所制者廣天下服矣太祖將從之荀彧曰若是則冀州當得河東馮翊扶風西河幽并之地所奪者眾今分冀州將皆動心一旦生變天下未易圖也公從之趙州元和郡縣圖曰趙州趙郡禹貢冀州之域春秋時屬晉戰國時屬趙秦為邯鄲郡平棘縣地又趙國兩漢及魏以封建子弟趙記云女子盛飾冶容習絲竹長袖傾絕諸侯左傳曰師及齊師衛孔圍及鮮虞伐晉取棘蒲即今平棘縣也史記蘇秦說趙曰當今之時山東之建國莫強於趙趙地方二千里西有常山南有漳河東有清河北有燕代漢志曰元氏屬常山縣王莽曰井關亭趙公子元之封邑故曰元氏後漢書曰光武北征彭寵陰后從行生明帝於元氏傳舍章帝幸元氏祠光武顯宗於縣舍又祠顯宗於始生堂皆奏樂用新詩復元氏祖十道志曰高邑縣趙房子之邑竹書紀年作魴子漢以為鄗縣鄗音大各反後漢復改為高邑後漢書曰光武至鄗群臣請即帝位於是設壇場於鄗南千秋高亭五成陌今趙州柏鄉縣鎮州十道志曰鎮州常山郡元和郡縣圖曰禹貢冀州之域周為并州地春秋時為鮮虞國戰國時屬趙秦兼天下為鉅鹿郡十三州志曰真定本名東垣以河東有垣故此加東耳漢書曰高帝時代相陳豨反使趙利守東垣上自攻之不下卒罵帝帝怒增兵急攻城斬罵者改曰真定漢志曰井陘屬常山郡穆天子傳曰天子獵于鉶山注曰燕趙謂山脊為鉶即今井陘是史記曰秦始皇十七年改趙王剪下井陘元和郡縣圖曰靈壽縣本中山國都也十三州志曰中山武公本周之同姓其後桓公不恤國政晉太史餘見周王王問之諸侯孰先亡對曰中山之俗以晝為夜以臣觀之中山其先亡乎其後魏樂羊為文侯將拔中山封之靈壽戰國策曰九門縣本有九室而居趙武靈王改為九門縣史記曰趙惠王三十八年藺相如城九門大城定州十道志曰定州愽陵郡禹貢冀州之域虞舜十二州蓋并州之域春秋時鮮虞白狄之國後改為中山國張曜中山記曰郡理中山以其城中有山故謂之中山又云郡治中人城漢志曰盧奴縣屬中山國盧水出焉圖經曰安喜縣即古盧奴縣也有黑水故池深而不流俗謂黑水為盧不流為奴漢書外戚傳曰宣帝母王夫人微時與父泣別於柳宿城在豐義縣十道志曰唐縣本春秋時鮮虞邑也漢為唐縣地漢志曰唐縣屬中山國王莽曰和親故堯國也堯為唐侯邑於此堯山在唐東北望都界孟康曰晉荀吳伐鮮虞入中人今中人亭是應劭風俗通曰中人城北四十里有左人亭鮮虞故邑左人亭即唐縣也漢書曰望都屬中山國莽曰順調堯山在北堯母慶都山在南登堯山見都山故以為名圖經曰陘邑縣本七國時中山國之苦陘縣也史記曰李克為中山相苦陘之吏上計入多於前克曰苦陘上無山林之饒下無藪澤牛馬之息而入多於前是擾亂吾民也於是免之十道志曰鼓城縣春秋鼓子之邑漢下曲陽之地春秋左氏傳曰晉荀吳圍鼓以鼓子鳶鞮歸鉅鹿下曲陽有鼓眾十三州志曰中山有上曲陽故加下耳圖經曰北平縣本秦曲逆縣之地屬中山國漢書曰高祖北征還過曲逆上其城望室甚大曰壯哉縣吾行天下獨見雊陽與是耳於是封陳平為曲逆侯後漢書曰章帝北巡北岳以曲逆名不善改為蒲陰瀛州十道志曰瀛州河間郡禹貢冀州之域舜十二州為并州之境春秋時屬燕趙二國秦并下為河間郡漢為河間國郡國志曰瀛州以地帶滄海物產滋瀛故以名之又云以瀛海為名漢志曰河間國領縣四樂成候井武隧弓高王莽曰朔定應劭曰在南河之間漢書曰武帝時望氣者云西北有女極貴遂訪之於河間得鉤弋夫人十道志曰愽野縣本漢蠡吾縣地十三州志曰太初元年蠡吾侯去入繼孝質是為孝桓帝追尊其父蠡吾侯翼為孝崇皇帝陵曰愽陵因改為愽野縣漢志曰高陽縣屬涿郡王莽曰高亭以其在高河之陽故曰高陽漢志曰東平舒屬渤海郡以代郡有舒故此加東也即平舒縣
