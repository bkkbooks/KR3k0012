body:
  text: 刑法部十五髡周禮秋官上掌戮曰髡者使守積鄭司農曰髡當為完謂但居作三年不虧其體者也五刑之中而髡者必王之同族不割者宮之為剪傷其類髡仍似守續也後漢書曰鄧騭子侍中鳳嘗與尚書郎張龕書屬郎中馬融宜在臺閣又中郎將任尚遺鳳馬後尚坐斷盜軍糧檻車徵詣廷尉鳳懼事洩先自首於騭騭畏太后遂髡妻以謝曹暪別傳曰太祖常行經麥中令士卒犯麥者死騎士皆下馬持夌以相付時太祖馬騰入夌中主簿對以春秋之義罰不加於尊太祖曰制法而自犯之何以率下然孤為軍師不可殺請自刑因拔劍割髮以置地會稽典錄曰吳範與鄱陽太守魏騰少相友善騰嘗有罪吳主怒甚敢有諫者死範謂騰曰與汝皆死騰曰死無益何死為範曰安能慮此坐汝耶乃髡頭自縛詣閣下使鈴下以聞鈴下不敢曰必死不可範曰汝有子曰有使汝為吳範死汝子屬我鈴下曰諾乃排閤入吳主大怒欲投以戟逡巡走出範因突入叩頭流血言與涕并良久吳主意釋乃免騰晉律曰髡鉗五歲刑張斐律序曰髡者刑之威秋彫落之像後魏書曰李訢負罪得降免有旨鞭髡刑配為廝役訢之廢也平壽侯張讜見與語奇之謂人曰此佳士也終不久屈未幾而復為太倉尚書風俗通曰秦始皇遣蒙恬築長城徒士犯罪亡依鮮卑山後遂繁息今皆髡頭衣赭亡徒之明効也鞭書曰鞭作官刑為辦治官事之刑也傳曰齊襄公田于貝丘見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼墜于車傷足喪屨反誅屨於徒人費弗得鞭之見血又曰重耳過衛衛文公不禮焉出於五鹿乞食於野人與之塊公子欲鞭之子犯曰天賜也稽首受而載之又曰楚子將圍宋使子文治兵於睽終朝而畢不戮一人子玉復治兵於蒍終日而畢鞭七人貫三人耳又曰衛獻公初有嬖妾使師曹誨之琴誨教也師曹鞭之公怒鞭師曹三百穀梁傳成公曰梁山崩壅河三日不流晉君召伯遵而問焉伯遵來遇輦者不辟使車右下而鞭之輦者曰所以鞭我者取道遠矣伯遵下車問焉曰子有聞乎對曰梁山崩伯遵曰君為此召我如之何輦者曰天有山天崩之天壅之雖召伯遵其若之何伯遵由悉問焉悉至疑欲重問之也輦者曰君親素縞帥臣而哭之既祀焉後漢書曰劉寬遷南陽太守典歷三郡溫仁多恕雖在倉卒未嘗疾言遽色常以為齊之以刑民免而無恥吏人有過但用蒲鞭罰之示辱而已漢晉春秋曰明帝勤於吏事苛察踰甚或於殿前鞭殺尚書郎晉中興書曰謝鯤字幼與弱冠知名值中朝大亂長沙王乂輔政親媚小人忌害君子時疾鯤名譖之乂遂執欲鞭之鯤解衣伏鑕神無遽容乂異而釋之文無喜色又曰皇帝詔飛督王饒忽上吾鴆鳥口云以辟惡此凶物豈宜妄進於是頓鞭饒二百使殿中御史孫雲監於四衝道焚燒之後魏書曰甄琛監決趙脩鞭猶相隱惻然告人曰趙脩小人背如土牛殊耐鞭杖有識以此非之三國典略曰齊崔謙遷鉅鹿太守恩信大行改鞭用熟皮為之不忍見血示恥而已有貧弱未理者皆曰我自造白鬢公不慮不決在郡七載獄無停囚齊春秋曰齊景真為晉乎太守有惠政常懸一蒲鞭未嘗用之齊書曰薛安都從弟道生以軍功為大司馬參軍犯罪為秣陵令庾淑之所鞭安都大怒乃乘馬從數十人令左右執矟欲往殺淑之行至朱雀航逢柳元景遙問曰薛公何之安都躍馬至車後曰小子庾淑之鞭我從弟今往剌殺之元景慮其不可駐紿之曰小子無宜適卿往與手甚快安都既廻馬元景復呼之令下馬入車因讓之曰卿從弟服章言論與寒細不異且人身犯罪理應加罰卿朝廷勳臣云何放恣輒於都邑殺人非唯科律所不容主上亦無辭相宥因載俱歸安都乃止南史曰禇玠為山陰令時舍人曹義達為宣帝寵縣人陳信家富謟事義達信父顯文恃勢撗恣玠乃遣使執顯文鞭之一百於是吏人股慄唐書曰太宗以暇日遍閱群書因讀明堂孔穴云人五藏之系咸附背脊針炙失所皆有損害乃廢書而歎曰今律決笞者皆六髀背分受乃有邂逅致死之義撻人之背理則宜然夫箠五刑之最輕者死者人生之至重者也豈容犯最輕之刑而或鞭笞致死自古帝王由來未悟不亦悲夫即頒制決罪人不得鞭背晉令曰應得法鞭者即執以鞭過五十稱行之有所督罪皆隨過大小大過五十小過二十鞭皆用牛皮革廉成法鞭生葦去四廉常鞭用熟靻之列反柔革也不去廉作鵠頭紉長一尺一寸鞘長二尺二寸廣三分厚一分柄皆長二尺五寸搜神記曰神農以赭鞭鞭百草盡知其毒寒溫臭味所主故天下號曰神農也異苑曰河內司馬惟之奴天雄死死後還其婦來善聞體有鞭瘡而卻著鏁問云有何遇至如此曰曾因醉竊罵大家今受此罪列女傳曰楚野辯女者昭氏妻也鄭簡公使大夫聘於荊至於狹路有一婦人乘車與大夫遇擊折大夫車之軸大夫怒將執而鞭之女曰妾聞君子不遷怒不貳過今狹路之中妾之避已極矣而子大夫之僕不肯少伺是以廢于大夫之車而反執妾豈非遷怒哉不怒僕而反怒妾豈不貳過哉會稽典錄曰鍾離意為尚書僕射時匈奴有降者詔賜縑三百疋尚書郎暨酆誤以三千疋賜之上大怒鞭酆殿下重痛將死意直排閣入諫曰陛下德被四表恩及夷狄是以左袵之徒稽首來服愚聞刑疑從輕賞疑從重今陛下以酆賞誤發雷霆之威海內謂陛下貴微財而賤士命也又曰謝夷吾為郡功曹吏太守第五倫妻車馬入府無所關啟夷吾鞭功曹佐吏門闌卒牽車馬出之收其人從倫為解之良久乃已汝南先賢傳曰許嘉年十三父給亭治道坐不竟當得鞭嘉叩頭流血請得免由是感激讀書梅陶自敘曰余居中丞曾以鞭皇太子傅親友莫不致諫余笑而應之曰堂高由階皇太子所以得崇於上由吾奉王憲於下也豈其枉道取媚後皇太子特見延賜以清讌笞史記曰張儀嘗從楚相亡璧意疑盜執掠笞數百不服釋之漢書曰曹參子窋為中大夫惠帝怪相國不治事謂窋曰汝歸私從容問乃父曰高帝新棄群臣帝富於春秋君為相國日飲無所請何事以憂天下然無言吾告汝也窋既洗沐歸時間自從帝所陳參怒而笞之二百曰趍入侍天下事非乃所當言也又曰景帝元年下詔曰加笞與重罪無異重罪謂死刑幸而不死不可為人謂不能自起居也其定律笞五百曰三百笞三百曰二百猶尚不存至中六年又下詔曰加笞者或至死而笞未畢朕甚憐之其減笞三百曰二百笞二百曰一百又曰笞者所以教之也其定箠令箠策也所以擊者也丞相劉舍御史大夫衛綰請笞者箠長五尺其本大一寸其竹也末薄半寸皆平其節當笞者笞臀母得更人畢一罪乃更人自是笞者得全又曰車千秋為高廟寢郎會衛太子為江充所譖敗之千秋上急言訟太子冤曰子弄父兵罪當笞耳天子之子過誤殺人當何罪哉臣嘗夢見一白頭翁教臣之言是時上頗知太子惶恐無他意乃大感悟焉又曰孝平后有節操自劉氏廢常稱疾不朝會莽敬憚傷哀欲嫁之迺更號為皇新室主令立國將軍成新公孫建世子豫成飾也音象飭醫往問后疾后大怒笞鞭其傍侍御因發疾不肯起莽遂不敢強也及漢兵誅莽燔燒未央宮后曰何面目以見漢家自投火而死楚漢春秋曰上敗彭城丁固追上上被髮而顧曰丁公何相逼之甚乃廻馬而去上即位欲陳功上曰使項氏失天下是子也為人臣用兩心非忠也使下吏笞殺之東觀漢記曰鄧禹攻赤眉曰無穀食自當來吾折箠笞之非諸將憂也後漢書曰汝南太守宗資署范滂功曹委任政事滂外甥西平李頌公族子孫而為鄉曲所棄中常侍唐衡以頌請資資用為吏滂以非其人寢而不召資遷怒捶書佐朱零零仰曰范滂清裁猶以利刃斷腐朽今日寧受笞死而滂不可違資乃止又曰橋玄再遷上谷太守又為漢陽太守時上邽令皇甫禎有贓罪玄收考髡笞死于冀市隋書曰劉行本為治書侍御史未幾遷黃門侍郎上嘗怒一郎於殿前笞之行本進曰此人素清其過又小願陛下少寬假之上不顧行本於是正當上前曰陛下不以臣不肖置臣左右臣言若是陛下安得不聽臣言若非當致之於理以明國法豈得輕臣而不顧也臣所言非私因置笏於地而退上歛容謝之遂原所笞者管子曰棟橈不勝任則屋覆而人不怒者其理然也弱子慈母所愛也不以其理不瓦則慈母笞之說苑曰韓伯瑜有過其母笞之泣其母問曰他日笞之未嘗泣今何泣對曰他日瑜得笞常痛今母力之衰笞不痛是以泣之益部耆舊傳曰杜真字孟宗廣漢緜竹人也少有孝行習春秋誦百萬言兄事同郡翟酺酺後被繫獄真上撽章救酺繫獄笞六百竟免酺難京師莫不壯之栲掠釋名曰搥而死曰掠掠狼也用威如狼也漢書曰景帝詔曰死者不可復生刑者不可復息此先帝之所重也而吏未稱職以掠辜苦飢寒瘦死獄中何用心逆人道也朕甚痛之其令郡國歲上繫囚以掠若瘦死者坐名縣爵里丞相御史課殿最以聞也後漢書曰薛安為楊州從事戴就字景成會稽上虞人為倉曹椽受贓穢剌史歐陽操遣安檢治栲覆取實安乃收就栲訊五毒乃以針剌就手十指甲使令爬土又燒鐵令赤使挾之肘腋內燋爛肉墮地就乃取而食之終無款伏安乃覆就於舡下而燒馬糞於舡兩頭熏之火滅謂就已死發舡視之乃張目謂其主者曰公何不益糞添火而使絕之何也主者乃報安安大驚遂引就共坐談論乃解其事耳會稽典錄又載又曰遭黨事當考實李膺等案經三府太尉陳蕃卻之曰今所考案皆海內人譽憂國忠公之臣此等猶十代宥也豈有罪名不彰而致收掠者乎不肯平署平署猶連署也帝愈怒遂下膺等於黃門北寺獄又曰周紆遷司隸校尉六年夏旱駕自幸洛陽錄囚徒二人被掠而䖝生者轉騎都尉後魏書曰盧度世以崔浩事棄官逃於高陽鄭羆家羆匿之使者囚羆長子將加箠楚羆戒之曰君子殺身以成仁汝雖死勿言子奉命遂被考掠至于火爇其體囚以物故卒無所言度世後令弟娶羆妹以報其恩又曰尉古真代人也道武之在賀蘭部賀梁于遣侯引乞突等將肆逆古真知之密馳以告染于疑古真泄其謀乃執持之以兩車軸捍其頭傷其目不服乃免之梁書曰梁代舊律測囚之法曰一上起自晡鼓盡于二更及比部郎中泉刪定律令以舊法測立持久非人所堪分其刻數曰再上廷尉以為新制過輕請集八座議之尚書周弘正議曰凡小大之獄必應以情豈可恣考掠以制刑罪且測人時節本非古制近代以來方有此法起自晡鼓迄于二更豈是常人所能堪忍所以重械之下誣枉者多朝晚二時同等刻進退而求於事為哀會稽典錄曰梁宏句章人也太守尹興召署主簿是時楚王英謀反妄䟽天下牧守謀發興在䟽中徵詣廷尉宏與門下掾陸續等傳考詔獄掠毒備至辭氣益壯
