body:
  text: 石藥下餘糧列仙傳曰赤斧者巴戎人為碧祠主簿能鍊丹與消石服之三十年身反童子髮毛皆赤數十年上華山取禹餘糧餌之手中長有赤斧博物志曰扶海洲上有草焉名曰蒒音師草其實食之如大麥從七月稔熟民歛至冬乃訖名自然榖或曰禹餘糧今藥中有禹餘糧者世傳昔禹治水棄其所餘食於江中而為藥也博物志曰地有蓼名則禹餘糧生亦有蓼名無者矣范子計然曰禹餘糧出河東本草經曰太一禹餘糧一名石腦味甘平生山谷治欬逆上氣癥瘕血閉漏下除邪久服能忍寒暑不飢輕身飛行千里若神仙生太山又曰禹餘糧味甘寒生池澤治欬逆寒熱煩滿下利赤白血閉癓瘕大熱久服輕身生東海吳氏本草經曰太一禹餘糧一名禹哀神農歧伯雷公甘平季氏小寒扁鵲甘無毒生太山上有甲甲中有白白中有黃如鷄子黃色九月採或無時消石吳氏本草經曰消石神農苦扁鵲甘范子計然曰消石出隴道芒消本草經曰消石一名芒消味酸苦寒生山谷治五藏積熱生益州朴消本草經曰朴消味苦寒生山谷治百病除寒熱邪氣除六府積藂結廦山谷之陰有鹹苦之水狀如芒消而麤能化七十二種石練餌服之輕身神仙生益州吳氏本草曰朴消石神農歧伯雷公無毒生益州或山陰入土千歲不變練之不成不可服雄黃玄中記曰員丘之上多大虵以雄黃精厭之水經曰黃水出零陽縣西北連巫山溪出雄黃頗有神異採常以冬月祭祀鑿石深數丈方得故溪水取名焉淮南萬畢術曰夜燒雄黃水蟲成列水蟲聞燒雄黃臭氣皆趣火吳氏本草曰雄黃神農苦山陰有丹雄黃生山之陽故曰雄是丹之雄所以名雄黃也雌黃吳越春秋曰太官舍春申君所造殿後殿名逃夏宮春申子假君宮也數失火因塗雌黃故曰黃堂臨海水土物志曰丹山草木赫然盡彤雌黃所產煒煌內含奇寶外發英光昔隸交部今則南康典術曰天地之寶藏於中極命曰雌黃雌黃千年化為雄黃雄黃千年化為黃金本草經曰雌黃石金味辛平生山谷治身癢諸毒磁石王隱晉書曰馬隆擊涼州以磁石累道側賊負鐵鎧不得過以為神呂氏春秋曰磁石召鐵或引之也石鐵之母也石之不怒者亦不能引之也抱朴子曰五石者丹沙雄黃白礬石曾青磁石也一石轉五轉而各成五色五石合為二十五色南州異物志曰漲海崎頭水淺而多磁石外徼人乘大舶皆以鐵鐷鐷之至此關以磁石不得過淮南萬畢術曰磁石拒碁取雞血與作針靡鐵擣之以和磁石日塗碁頭曝乾之置局上即相拒不休又曰磁石懸入井亡人自歸取亡人衣帶裹磁石懸井中亡人自歸本草經曰磁石一名玄石味辛寒生川谷吳氏本草曰磁石一名磁君石膏廣州記曰彰平縣有石膏山望之皎若霜雪本草經曰石膏味辛微寒生山谷治心下逆驚喘口乾焦不能息滑石南越志曰膋音尞城縣是出膋石膋石即滑石也土人以為燒器以用烹魚本草經曰滑石味苦寒生山谷治身熱泄癖生棘陽范子計然曰滑石白滑者善礬石本草經曰礬石一名羽砠泥結切味鹹酸寒生山谷治寒熱泄痢惡瘡目痛堅骨鍊餌久服輕身不老生河西盛弘之荊州記曰建平出礬石范子計然曰礬石出武都吳氏本草曰礬石一名羽砠一名羽澤神農歧伯酸扁鵲鹹雷公酸無毒生河西或隴西或武都石門採無時歧伯久服傷人骨曾青衡山記曰衡山有曾青崗曾青可合仙藥淮南萬畢術曰取曾青十斤燒之以水灌其地雲起如山雲矣曾青為藥令人不老本草經曰曾青生蜀郡名山其山有銅者曾青出其陽青者銅之精能化金銅空青江乘地記曰樵採者嘗於山上得空青此山三朝出雲雨必降民以為常占范子計然曰空青曾青出巴都白青又出巴郡盧青出弘農豫章本草經曰空青味甘寒生山谷明目久服輕身延年能化銅鈆作金生益州吳氏本草曰空青神農甘一經酸久服有神仙玉女來侍使人志高白青本草經曰白青味甘平生山谷明目利九竅耳聾殺諸毒之蟲久服通神明輕身延年出豫章范子計然曰白青出白郡吳氏本草曰神農甘平雷公鹹無毒生豫章可消為銅淮南萬畢術曰白青得鐵即化為銅取礬石白青分等煉治台鐵即成銅矣扁青本草經曰扁青味甘平生山谷治目痛明目辟毒利精神久服輕身不老生朱崖吳氏本草經曰扁青神農雷公小寒無毒生蜀郡明目治癰腫風痺丈夫內絕令人有子久服輕身長石本草經曰長石一名方石味辛治身熱吳氏本草曰長石一名方石一名直石生長子山理如馬齒潤澤玉色長服不飢冷石吳錄地理志曰鬱林布山縣多虺其毒殺人有冷石可以解之石色赤黑味苦屑此石著創并以切齒立蘇一名竊齒石見大康地記石蜜神仙傳曰羨門止中岳飡石蜜紫梁西京雜記曰閩越王獻高祖石蜜二斛本草經曰石蜜一名石飴味甘平生山谷治心邪安五藏益氣補中止痛解毒久服輕身不老生武都吳氏本草曰石蜜神農雷公甘氣平生河原或河梁玉泉本草經曰玉泉一名玉澧味甘平生山谷治藏百病柔筯強骨安魂長肌肉久服能忍寒暑不飢渴不老神仙人臨死服五斤死三年色不變生藍田吳氏本草曰玉泉一名玉屑神農歧伯雷公甘李氏平畏冬華惡青竹水銀廣稚曰水銀謂之汞音紅董切淮南萬畢術曰朱沙為汞本草經曰水銀味辛寒無毒決明本草經曰石決明味酸草決明味鹹理自珠精吳氏本草曰決明子一名草決明一名羊明赭說文曰赭赤土也山海經曰胞山灌水之中有流赭以塗牛馬無病郭璞注曰赭赤土也今多以朱塗牛角云辟惡又曰少陽山之中多美赭南方草物狀曰赤土出踴山下在石中採好色赤者雜丹中朱漆器范子計然曰石赭出齊郡赤色者善蜀赭出蜀郡本草經曰代赭一名血師好者狀如雞肝白堊山海經曰慈聾之山其中有太谷是多白堊黑青黃堊范子計然曰青堊出三輔本草經曰白堊即白善土也生邯鄲鹵鹹本草經曰鹵鹹一名寒石味苦治大熱消渴狂煩戎鹽主明目益氣去毒蟲大鹽一名胡鹽令人吐主腸胃結熱龍骨史記曰穿渠自微引洛水至商顏服虔曰顏音崖應劭曰微在馮翊或曰商顏山名穿梁得龍骨故名龍首渠盛弘之荊州記曰始安駭鹿山室鑿室內輒得龍骨下有伏滔范子計然曰龍骨出河東本草經曰龍骨味甘平山谷治心腹鬼疰生晉地華陽國志曰蜀五城縣其上值天門天門龍升天不達死墜此地故掘取龍骨冬夏無已吳氏本草經曰龍骨生晉地山谷陰大水所過處是死龍骨色青白者善十二月採或無時龍角畏乾漆蜀椒理石龍齒神農李氏大寒龍齒治驚癇久服輕身牛黃文士傳曰延篤為京兆尹桓帝時梁冀專政時皇太子疾詔書發京兆出牛黃冀遣諸生齎書持牛黃詣篤賣篤以為詐論殺之本草經曰牛黃味苦生隴西平澤特牛膽中治驚癇寒熱生晉地吳氏本草經曰牛黃牛出入鳴吼者有之夜視有光走牛角中死其膽中如雞子黃阿膠東水經曰東阿縣有大井其巨若輪深六十丈歲常煮膠以貢天府本草所謂阿膠也故世俗有阿井之名庾信哀江南賦雲阿膠不能止黃河之濁海蛤博物志曰東海有蛤鳥嘗啖之肉消盡殼起出浮泊在沙岸潮水往來揩蕩白如雪入藥最良勝取自死者本草經曰海蛤味苦平生池澤治欬逆上氣喘煩胸痛寒熱文蛤主惡瘡蝕五痔生東海吳氏本草經曰海蛤神農苦歧伯甘扁鵲鹹大節頭有文文如磨齒採無時犀角本草經曰犀牛角味鹹治百毒靈羊角本草經曰靈羊角安心氣不猒音掩鹿茸本草經曰鹿茸強志不老鹿脂本草經曰麋脂近陰令人陰痿雁昉本草經曰鴈昉一名鶩昉味甘平生池澤治風緊拘急偏枯氣不通久服長髮益氣不肌不老輕身生南海吳氏本草經曰鴈昉神農歧伯雷公甘無毒採無時鶩昉殺諸石藥毒䳒頭本草經曰䳒辟不祥生淮南吳氏本草曰䳒尾治蠱毒
