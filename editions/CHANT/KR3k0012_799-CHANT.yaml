body:
  text: 西戎七吐蕃唐書曰吐蕃在長安之西八千里本漢西羗之地其種落莫知所出或云南涼禿髮利鹿孤之後也利鹿孤有子曰樊尼及利鹿孤卒樊尼尚幼弟傉檀嗣位以樊尼為安西將軍後魏神瑞元年傉檀為西秦乞佛盤熾所滅樊尼招集餘眾以投沮渠蒙遜蒙遜以為臨松太守及蒙遜滅樊尼乃率眾西奔濟黃河逾積石於羗中建國開地千里樊尼威惠夙著為群羗所懷皆撫以恩信歸之如市遂改姓為窣勃野以禿髮為國號語訛謂之吐蕃其後子孫蕃昌又侵伐不息土宇漸廣歷周及隋猶隔諸羗未通於中國其國人號其王為贊普置大論小論以統理國事無文字刻木結繩為約雖有官不常厥職臨時統領徵兵用金箭寇至舉烽燧百里一亭用刑嚴峻小罪剜眼劓刖或皮勒鞭鞭之但隨喜怒而無常科囚人於地牢深數丈二三年方出之宴異國賓客必驅犛牛令客自射牲以供饌與其臣下一年一小盟刑羊狗獼猴先折其足而殺之繹其膓而屠裂之令巫者告于天地山川日月星辰之神云若心遷變懷姦反覆神明鑒之同於羊狗三年一大盟夜於壇墠之中陳設肴饌殺人馬牛驢以為牲呪曰爾等咸須同心勠力共保我家惟天地神衹共知爾志有負此盟使爾身體屠裂同於此牲其地氣候大寒不生秔稻有青䴹音果麥䝁豆小夌蕎麥畜多犛牛豬犬羊馬又有天鼠狀如雀鼠其大如猫皮可為裘又多金銀銅錫其人或隨畜牧而不常厥居然頗有城郭其國都城號為邏些城屋皆平頭高者至數十尺貴人處於大氈帳名為拂廬寢處汙穢絕不櫛沐接手飲酒以氈為盤捻麩為椀實以羹酪并而食之多事羱羝之神人信巫覡不知節候夌熟為歲首圍碁六慱吹蠡鳴鼓為戲弓劍不離身重壯賤老母拜於子子倨於父出皆少者前老者後軍令嚴肅每戰前隊皆死後隊方進重兵死惡疾終累代戰沒以為甲門臨陣敗死者懸狐尾於其首表其似狐之怯稠人廣眾必以徇焉其俗恥之以為次死拜必兩手據地作狗吠之聲以身再揖而止居父母喪截髮青黛塗面衣服皆黑既葬即吉其贊普死以人殉葬衣服珍翫及常所乘馬弓劍之類悉埋之又曰貞觀八年其贊普棄宋弄讚始遣使朝貢弄讚弱冠嗣位性驍武多英略其鄰國羊同及諸羗並賓伏之太宗遣行人馮德遐往撫慰之見德遐大悅聞突厥及吐谷渾皆尚公主乃遣使獻金隨德遐入朝多齎金寶奉表求婚太宗未之許又曰弄讚常率眾二十餘萬頓於松州西境遣使貢金帛云來迎公主太宗遣吏部尚書侯君集等擊破之弄讚大懼遣使謝罪因復請婚太宗許之弄讚乃遣其相祿東贊至禮獻金五千兩自餘寶玩數百事貞觀十五年太宗以文成公主妻之令禮部尚書江夏郡王道宗主婚持節送公主于吐蕃弄讚率其部兵次柏海親迎于河源見王人執子壻之禮甚恭既而歎大國服飾禮儀之美俯仰有愧沮之色及與公主歸國謂所親曰我祖父未有通婚上國者今我得尚大唐公主為幸實多當為公主築一城以誇示後代遂築城邑立棟宇以居處焉公主惡其人赭面弄讚令國中權且罷之身亦釋氈裘襲紈綺漸慕華風仍遣酋豪子弟請入國學以習詩書又請中國識文之人典其表䟽又曰太宗伐遼東還弄讚遣祿東贊來賀奉表曰聖天子平定四方日月所照之國並為臣妾而高麗恃遠闕於臣禮天子自領百萬渡遼致討隳城陷陣指日凱還夷狄纔聞陛下發駕少進之間已聞歸國鷹飛迅越不及陛下速疾奴忝預子壻喜百常夷夫鵝猶鴈也故作金鵝奉獻其鵝黃金鑄成高七尺中可實酒三斛又曰高宗嗣位授弄讚為駙馬都尉封西海郡王賜物二千叚弄讚因致書與司徒長孫無忌等云天子初即位若臣下有不忠之心者當勒兵以赴國并獻金銀珠寶十五種高宗嘉之進封為王賜雜綵三千叚因請蚕種及造酒碾磑紙墨之匠並許焉又曰高宗聞劉審禮等敗召侍臣問以綏禦之策中書舍人郭正一曰吐蕃作梗年歲已深命將興師相繼不絕空勞士馬虛費糧儲近討則徒損兵威深入則未窮巢穴臣望少發兵募且遣備邊明立烽候勿令侵抄使國用豐足人心叶同寬之數年可一舉而滅給事中劉齊賢皇甫文亮等皆言嚴守之便又曰長壽元年武威軍揔管王孝傑大破吐蕃之眾克復龜茲于闐踈勒碎葉等四鎮乃於龜茲置安西都護府發兵以鎮守之又曰聖曆三年番將贊婆率所部千餘人及其兄弟莽布支等來降則天遣羽林飛騎郊外迎之授贊婆輔國大將軍行右衛大將軍封歸德郡王優賜甚厚又曰神龍元年贊普之祖母遣其大臣悉董然來獻方物為其孫請婚中宗以所養雍王守禮女為金城公主許嫁與之自是頻歲貢獻景龍三年十一月又遣其大臣尚贊吐等來逆女中宗宴之于苑內毬塲命駙馬都尉楊慎交與吐蕃使打毬中宗率侍臣以觀之四年正月下制曰聖人布化用百姓為心王者垂仁以八荒無外故能光宅遐邇財成品物由是隆周理曆恢柔遠之圖強漢乘時建和親之義斯蓋御寓長策經邦茂軌朕受命上靈克纂洪業庶幾前烈永致和平睠彼吐蕃僻在西服皇運之始早申朝貢太宗文武聖皇帝德侔覆載情深億兆思偃兵甲遂通姻好數十年間一方清淨自文成公主化往其國因多變革我之邊隅亟興師旅彼之蕃落頗聞凋弊頃者贊普及祖母可敦酋長等屢披誠款積有歲時思託舊親請崇親好金城公主朕之少女豈不鍾念但為人父母志恤黎元若允乃誠祈更敦和好則邊土寧晏兵役休息遂割深慈為國大計築茲外館聿膺嘉禮降彼吐蕃贊普即以今月進發朕親自送于郊外命大將軍楊矩使焉其月帝幸始平縣以送公主設帳殿於百頃泊側引王公宰臣賦詩餞別改始平縣為金城縣改其地為鳳池鄉又曰開元二年秋吐蕃大將蚠達延乞力徐等率眾十餘萬寇臨洮軍又進寇蘭渭等州掠監牧羊馬而去玄宗令攝左羽林將軍薛訥及太僕少卿王晙率兵邀擊之仍下詔將大舉親征召募將士克期進發俄而晙等與賊相遇于渭源之武階驛前軍王海濱力戰死之晙等乘之而進大破吐蕃之眾殺數萬人盡收得所掠羊馬賊餘黨奔北相枕藉而死洮水為之不流上遂停親征命紫微舍人倪若水往按軍實仍吊祭王海濱而還又曰開元十七年玄宗遣皇甫惟明等使土蕃惟明等既見贊普及公主具宣上意贊普等欣然請和盡出貞觀已來前後勑書以示惟明等令其重臣名悉獵隨惟明入朝上表曰外甥是先皇帝宿親又蒙降金城公主遂和同為一家天下百姓普皆安樂中間為張玄表李知古等東西兩處先動兵馬侵抄吐蕃邊將所以互相征討迄至今日遂成釁隙外甥以先代文成公主今金城公主之故深識尊卑豈敢失禮又緣年小枉被邊將讒搆鬭亂令舅致怪伏乞垂察追留死將万足承前數度使人入朝皆被邊將不許所以不敢自奏去冬公主遣使人婁眾失若將狀專往蒙降使看公主來外甥不勝喜荷謹遣論名悉獵及副使押衙將軍浪些紇夜悉獵入朝奏取進百兩國事意悉獵所具外甥蕃中已處分邊將不許抄掠若有漢人來投便令卻送伏望皇帝舅遠察赤心許從舊好長令百姓快樂如蒙聖恩千年万歲外甥終不敢先違盟誓謹奉進金胡瓶一金盤一椀一馬腦盃一零羊衫叚一謹充微國之禮金城公主又別進金鴨盤盞雜器物等十八年十月名悉獵等至京師上御宣政殿列羽林仗以見之悉獵頗曉書記先曾迎金城公主至長安當時朝廷皆稱其材辯及是上引入內宴與語甚禮之賜紫袍金帶及魚袋并時服繒綵銀盤胡瓶等仍於別館供擬甚厚悉獵受袍帶器物而卻進魚袋辭曰本國無此章服不敢當殊異之賞上喜而許之詔御史大夫崔琳充使報聘仍於赤嶺各豎分界之碑約以更不相侵時吐蕃使奏云公主請毛詩禮記左傳文選各一部制令秘書省寫與之正字于休烈上䟽諫曰臣聞戎狄國之寇也經籍國之典也戎之生心不可以無備典有恒制不可以假人傳曰裔不謀夏夷不亂華所以革其非心在乎有備無患昔者東平王入朝求史記諸子漢帝不與蓋以史記多兵謀諸子雜詭術夫以東平漢之懿戚尚不欲示征戰之書今西戎國之寇讎豈可貽經典之事且臣聞吐蕃之性慓悍果決敏情持銳善學不廻若達於書必能知戰深於詩則知武夫有師干之試深於禮則知月令有廢興之兵深於傳則知用師多詭詐之智深於史則知往來有書檄之刺何異備寇兵而資盜糧也臣聞魯秉周禮齊不加兵吳獲乘車楚屢奔命一以守典存國一以喪法危邦可取鑒也且公主出嫁從人遠適異國合慕夷禮返求良書愚臣料之恐非公主本意也慮有奔北之類勸教於中若陛下慮失蕃情以備國信必不得已請去春秋當周德既衰諸侯強盛禮樂自出戰伐交興情偽於是乎生變詐於是乎起則以臣召君之事取威定霸之名若與此書國之患也傳曰于奚請曲縣鞶纓仲尼云惜也不如多與之邑惟名與器不可假人狄固貪婪貴貨易土正可錫之錦綺厚以玉帛何必率從其求以資其智臣忝叨列位職刊祕籍實痛經典棄在戎夷昧死上聞惟陛下深察又曰開元二十二年遣將軍李佺於赤嶺與吐蕃分界立碑二十四年正月吐蕃遣使貢方物金銀器玩數百事皆形制奇異上令列於提象門外以示百寮又曰開元二十八年春章求兼瓊密與安戎城中吐蕃翟都局及維州別駕董承宴等通謀都局等遂飜城歸款因引官軍入城盡殺吐蕃將士使監察御史許遠率兵鎮守上聞之甚悅中書令李林甫等上表曰伏以吐蕃此城正當衝要憑險自固恃以窺邊積年己來蟻聚為患縱有百萬之眾難以施功陛下親紆祕策不興師旅須令中使李思敬曉諭羗族莫不懷恩飜然改圖自相謀陷神筭運於不測睿略通於未然累載逋誅一朝蕩滅又臣等今日奏事陛下從容謂臣等曰卿等但看四夷不久當漸淪喪德音纔降遽聞戎捷則知聖與天合應如響至前古已來所未有也請宣示百寮編諸史策手制荅曰此城儀鳳年中羗引吐蕃遂被固守歲月既久攻伐亦多其地險隘非力所制朝廷群議不勸取之朕以小蕃無知事須處置授以奇計所以行之獲彼戎心歸我城守有足為慰也大羊同通典曰大羊同東接吐蕃西接小羊同北直于闐東西千餘里勝兵八九萬其人辮髮氈裘畜牧為業地多風雪冰厚丈餘所出物產頗同吐蕃俗無文字但刻木結繩而已刑法嚴峻其酋豪死抉於穴切去其腦實以珠玉剖其五臟易以黃金假造金鼻銀齒以人為殉卜以吉辰藏諸岩穴地人莫知其所多殺㹀牛莫馬以充祭祀葬畢服除其王姓姜葛有四大臣分掌國事自古未通悉立通典曰悉立在吐蕃西南戶五萬餘有城邑村落依溪澗丈夫以繒綵纏頭衣氈褐婦人辮髮著短裙以蒸報為俗畜多水牛羖羊雞豕穀宜秔稻麥豆饒甘蔗諸菓死葬於中野不為封樹喪制以黑為衣一年就吉刑有刖劓羈事吐蕃章求拔通典曰章求拔或云章揭拔本西羗種也在悉立西南居四山之內近代移出山西接東天笁遂改衣服變西羗之俗其地延袤八九百里勝兵二千餘人居無城郭好為寇掠商旅患之聞悉立入朝亦遣使朝貢且末漢書曰且末國王治且末城去長安六千八百二十里有蒲桃諸果西通精絕二千里北史曰且末西北有流沙數百里夏日有熱風為行旅之患風之所至唯老駞預知之即嗔而聚土埋其口鼻於沙中人每以為候亦即將氈擁蔽鼻中其風迅駃斯須過盡若不防者必至危斃後魏大統八年其兄鄯善未率眾內附烏秅漢書曰烏秅王治烏秅城去長安九千九百五十里田石間有白草累石為室民接手飲師古曰自高山下谿潤中飲水接連其手也出小步馬師古曰小細步也所謂百步千跡也西夜漢書曰西夜國王號子合王治呼犍谷犍音巨言切去長安萬二百五十里與胡異其種類羗氐行國師古曰言不著土地隨畜逐水草往來而地出玉石後漢書曰西夜國去洛陽萬四千四百里地生白草青毒國人煎以為藥傅箭鏃所中輒死
