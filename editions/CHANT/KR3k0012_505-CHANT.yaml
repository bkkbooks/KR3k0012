body:
  text: 逸民部四逸民四晉中興書曰孟陋字少孤少而貞潔清操絕倫口不言世事時或漁弋雖家人亦不知所之太宗輔政以為參軍不起桓溫躬往造焉或謂溫宜引在府溫歎曰會稽王不能屈非敢擬議也陋聞之曰億兆之人無官者十居其九豈皆高士哉我病疾不堪恭相王之命非敢為高也又曰劉驎之字子驥一字道民好遊于山澤志在存道常採藥至名山深入忘返見有一澗水南有二石囷一囷開一囷閉或說囷中皆仙方秘藥驎之欲更尋索終不能知桓沖請為長史固辭居于陽岐人士往來無不投止驎之自供給人人豐足凡人致贈一無所受又曰龔玄之字道玄潛處陋巷未常出入公門人有致餉一無所受武陵太守孫放薦玄之詔以為散騎常待郡縣逼苦辭不行前後四徵一皆不降又曰載逵字安道少博學能鼓琴總角時以雞子汁溲瓦屑作鄭玄碑又為碑文文既綺藻器亦妙絕武陵王晞聞其善琴使人召之逵於使者前打破琴曰戴安道不能為王門伶人累徵散騎常侍郡縣逼乃逃去吳國內史王珣有別館在虎丘山乃潛住珣山中謝玄王珣並表逵烈宗備禮徵不至沈約宋書曰陶潛字淵明或云淵明字元亮曾祖侃晉大司馬潛少有高趣常著五柳先生傳以自況曰先生不知何許人不詳姓字宅邊有五柳樹因以為號焉閑靜少言不慕榮利好讀書不求甚解性嗜酒而家貧不能恒得親舊知其如此或置酒招之造飲輒盡期在必醉常著文自娛頗示己志忘懷得失以此自終其自序如此時人謂之實錄又曰孔淳之字彥深魯郡魯人茅室蓬戶庭草無徑唯床上有數帙書元嘉初徵為散騎常侍乃逃于上虞縣界家人莫知所之又曰周續之字道祖鴈門廣武人也終身不娶妻布衣蔬食常以稽康高士傳得山林之美因為之注高祖比討世子居守迎續之館于安樂寺延入講禮月餘復還山又曰朱百年會稽山陰人以伐樵採箬為業每以樵箬置道頭輒為行人所取明旦已復如此人稍怪之積久方知是朱隱士所賣須臾行者隨其所堪多少留錢取樵而去又曰王素字休業琅邪人也少有志行乃往東陽隱居不仕屢被徵辟聲譽甚高山中有蚿蟲聲清長而形醜素乃為蚿賦以自況又曰戴顒字仲若譙郡銍人也父逵兄并隱遁有高名顒年六十遭父憂幾於毀滅因此長抱羸患又不仕復修其業父善琴書顒並傳之凡諸音律皆能揮手會稽剡縣多名山故世居剡下顒及兄勃並受琴於父父沒所傳之聲不忍復奏各造新弄桐廬縣又多名山兄弟復共遊之因留居止以桐廬僻遠難以養疾乃出居吳下吳下士人共為築室乃述莊周大旨著逍遙論太祖元嘉初徵散騎常侍並不就太祖每欲見之常謂黃門侍郎張敷曰吾東巡之日當讌戴公山也以其好音長給正聲伎一部卒年六十四後景陽山成上歎曰恨不使戴顒觀又曰宗炳字少文南陽人高祖領荊州辟為主簿不起問其故荅曰栖丘飲谷三十餘年豈可於王門折腰為趍走吏乎高祖善其對妙善琴書精於言理每遊山水往輒忘歸征西長史王弘每從之遊未常不彌日也乃下入廬山就釋惠遠考尋文義兄臧為南平太守逼與俱還乃於江陵三湖立宅閑居無事高祖召為太尉參軍不就二兄早卒孤累甚多家貧無以相贍頗營稼穡高祖數致餼賚宋受禪徵為太子舍人元嘉初又數徵庶子並不應衡陽王在荊州親至炳室與之歡讌命為諮議不起好山水愛遠遊西陟荊巫南登衡岳因而結宇衡山欲懷尚平之志有疾還江陵歎曰老疾俱至名山恐難遊遍唯當澄懷觀道臥以遊理皆圖之於室謂人曰撫琴操欲令眾山皆響古有金石弄唯炳傳焉太祖遣樂師就炳受之元嘉二十年炳卒又曰王弘之字方平琅邪臨沂人家貧而性好山水桓玄輔晉桓謙以為衛軍參軍時殷仲文還姑孰祖送傾朝謙要弘之同行荅曰凡祖離送別必在有情下官與殷風馬不接無緣扈從謙貴其言隨兄敬弘之安成郡弘之解職同行家在會稽上虞敬弘常解貂裘與之即著以採藥性好釣上虞江有一處名三石頭弘之裳垂綸於此經過者不識之或問漁師得魚賣否弘之曰亦自不得得亦不賣日夕載魚入至上虞郭經親故門各以一兩頭置門內而去始寧沈州有佳山水弘之又依巖築室謝靈運顏延之並相欽重又曰劉凝之字志安小名長年慕老萊嚴子陵為人推家財與弟及兄子立屋於野外非其力不食州里重其仁德禮辟並不受妻梁州刺史郭鈐女也遣送豐麗凝之悉散之親族妻亦能棄榮華共安儉苦徵為祕書郎不就荊州年飢衡陽王慮凝之餒弊餉錢十萬凝之大喜將錢至市門觀有飢色者悉分與之性好山水一旦攜妻子泛江湖隱居衡山之陽登高山絕人跡為小屋居之採藥服食妻子皆從其志又曰龔祈字道孟武陵漢壽人也父黎民及祈並不應徵辟祈風姿端雅容止可觀中書郎范述見而歎曰此荊楚仙人也時或賦詩不言及世事又曰翟法賜尋陽柴桑人祖湯湯子莊莊子矯並高尚不仕逃避徵聘矯生法賜少守家業立屋於廬山頂居後便不復還家不食五穀以獸皮結草為辟著作郎不就後家人至石室尋求因復遠徙違避徵聘遁跡幽深後卒於嚴石之間又曰沈道虔吳興武康人少仁愛好老易縣比山石下為精廬與諸孤兄子共釜庾之資困不改節受琴於戴逵辟府凡十二命皆不就太祖聞之遣使存問賜錢累世事佛推父祖舊宅為寺至四月八日每請像請像之日輒舉家感動焉道虔年老菜食恒無經日之資而琴書為樂孜孜不倦又曰雷次宗字仲倫南昌人也少入廬山事沙門釋惠遠篤志好學尤明三禮毛詩隱退不交世務以散騎侍郎徵並不就元嘉十五年徵至京師開館於雞籠山藂徒教授置生百餘人車駕數幸次宗學館資給甚厚又除給事中不就還廬山公卿已下並設祖道後徵詣京邑為築室於鍾山西巖下謂之招隱館使為皇太子諸王講喪服經次宗不入公門乃使自華林東門入延賓堂就業後卒於鍾山又曰關康之字伯愉河東楊人世居京口寓居南昌少而篤學筭妙盡其能元嘉中太祖聞康之有學義詔徵之不起棄人事守志閑居弟雙之病卒迎喪因得虛勞病寢頓二十餘年時有間日輒臥諭文義昇平初卒後魏書曰馮亮字靈通南陽人博覽諸書篤好佛理世宗常召以為羽林監領中書舍人將令侍講十地諸經固辤不拜父使衣幘入見亮求以幅巾就朝遂不強逼還山數年與僧徒禮誦為業有終焉之志既雅愛山水兼有巧思結架巖林甚得遊放之適頗以此聞世宗給其功力令與沙門統僧暹河南尹甄琛等周視嵩山形勝之處製閑居寺亮卒詔贈帛二百疋以供凶事遺誡兄子綜殮以衣慆左手持板右手執孝經置屍盤石上積十餘日乃焚於山以灰燼處起佛塔初亮以冬月亡時連驟雪窮山荒澗鳥獸飢窘僵屍山野無所防護時有壽春道人惠需每旦往看其屍拂去塵霰禽蟲之跡交橫左右而初無侵毀衣服如本唯風吹幍落耳惠需又以大栗十枚開亮手置把中經宿乃為蟲為盜食皮殼在地亦不傷肌體焚燎之日有素霧蓊鬱迴繞其旁自地屬天彌朝不絕中山道俗營助者百餘人莫不異焉又曰李謐字永和趙郡人少而好學博通諸經周覽百氏初師事小學博士孔璠數年之後璠還就謐業同門生為之語曰青成藍藍謝青師何常在明經謐飲酒好音律愛樂山水高尚之情長而彌固一遇其賞悠爾忘歸乃作神士賦又曰睦夸一名昶趙郡高邑人年二十遭父喪鬚鬢致白每悲哭聞者為之流涕高尚不仕寄情丘壑少與崔浩為莫逆之交及浩為司徒奏徵夸為其中郎辭疾不起州郡逼遣不得已及入都與浩相見經留數日惟飲酒敘平生不及世利浩每欲論屈之意不能發言見敬憚如此浩後遂投詔書於夸懷夸曰桃簡卿已為司徒何足以此勞國亡挑簡浩小名浩慮夸即還夸時乘一騾更無兼騎浩乃以騾內之廄中冀相維縶夸遂託鄉人輸租者謬為御車乃得出關浩知而歎恨曰睦夸獨行之士本不應以小職辱之又使其人杖策復路吾當何辭以謝也及浩誅後誇為之素服受鄉人吊喭乃歎曰崔公既死誰能更容睦夸年七十五卒及葬之日赴會者如市續晉陽秋曰謝惠隱居會稽初月犯少微一名處士星時戴逵名重於敷時人憂之俄而敷死故會稽士人嘲曰吳中高士求死不得死
