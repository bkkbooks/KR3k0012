body:
  text: 飲食部十九美周禮天官亨人曰祭祀共大羹鉶羹賓客亦如之大羹肉湆者鄭司農云大羹不致五味也鉶羹加鹽菜也涪音泣禮曰食居人之左羹居人之右毋嚃羹亦嫌欲疾嚃不爵菜也音勑荅切母絮羹為其詳於味絮猶調也絮勑處切客絮羹主人辭不能烹羹之有菜者用挾無菜者不用挾又曰雉羹雞羹兔羹芼羹食自諸侯已下至於庶人無等羹食之主又曰子卯稷食菜羹忌日貶也夫人與君同庖不時殺也又曰不能食粥羹之以菜可也謂性不能者可食飯菜羹又曰大饗之禮尚玄酒而俎腥魚大羹不和有遺味者矣左傳曰頴考叔有獻於鄭莊公公賜之食食而捨肉公問其故對曰小人有母皆嘗小人之食矣未嘗君之羹請以遺之肉有汁曰羹又曰臧哀伯諫曰大羹不致大羹肉汁也不致五味禮不忌本也又曰鄭侯伐宋將戰華元殺羊食士其御羊斟不與及鄭師與宋師戰曰疇昔之羊子為政疇昔猶前日也今日之事我為政與入鄭師故敗君子謂羊斟非人也以其私憾敗國殄民憾恨也殄盡也於是刑孰大焉詩所謂人之無良者詩義取不良之人相怨以亡其羊斟之謂乎又曰楚獻黿於鄭靈公宋子公與子家將見宋子公也子家婦人子公之食指動第二指也以示子家曰他日我如此必嘗異味及入宰夫將解黿相視而笑公問之問所笑子家以告及食大夫黿召子公而弗與也欲使指動無効也子公怒染指於鼎嘗之而去又曰叔鮒求貨於衛淫蒭蕘者衛人使屠伯饋叔向羹與一篋錦叔向受羹反錦又曰和如羹焉水火醯醢鹽梅以烹魚肉燀之以薪燀炊也宰夫和之齊之以味濟其不及以泄其過君子食之以平其心君臣亦然以水濟水誰能食之書曰若作和羹爾唯鹽梅鹽鹹梅鮓羹須鹹鮓以和之詩義䟽曰鴞肉甚美可以為羹臛語曰雖蔬食菜羹瓜祭必齊如也爾雅曰肉謂之羹郭璞注曰肉臛也舊說肉有汁曰羹孫氏以為肉作羹之物因以名云廣雅曰羹謂之湆說文曰羹五味和粥也釋名曰羹注也汁汪郎也史記曰古者天子常以春秋解祠黃帝用一梟破鏡如淳曰漢史東郡送梟五日作梟羹以賜百官也又曰項王為高祖置太公於机上告漢王曰吾與羽俱北面受命懷王約為弟兄吾翁即若翁必欲烹而翁幸分我一杯羹又曰高祖少時與賓客過丘嫂食嫂厭叔與客來佯為羹盡櫟釜邊客以故去已而視釜中尚有羹由此怨其嫂封其子頡羹侯戰國策曰樂羊為魏將而攻中山其子在中山中山君烹其子而遺之羹樂羊啜之盡一杯文侯謂禇師贊曰樂羊以我故食其子肉對曰其子食之其誰不食羊下中山文侯賞其功而疑其心又曰中山君饗大司馬子期在焉羊羹不遍子期怒走楚說王伐中山中山君亡有二人挈子隨後問之曰臣父嘗餓且死君下壺飡哺臣之父故來死君也中山君歎曰吾以一椀羊羹亡國之一壺飡得二士死後漢書曰太尉劉寬性仁恕不妄喜怒嘗服朝侍婢奉肉羹翻汙其衣婢遽收之寬神色不異徐言羹爛汝手東觀漢記曰王渙為洛陽令馬市正數從賣羹飯家乞貸不得輒歐罵之至忿煞正捕得渙問知事實便諷吏解遺謝承後漢書曰陸續詣詔獄其母至京師餉食續對餉泣曰續母來使者問其故荅曰續母作羹截肉未嘗不方斷葱寸寸無不同是以知母來又曰陶碩字公超啖蕪菁羹無鹽帝王世紀曰文王長子曰伯邑考紂烹以為羹以賜文王曰聖人不食其子羹文王得而食之紂曰誰謂西伯聖者與食其子羹而不知晉書曰桓溫表王濬之孫曰濬今有三孫年出六十室如懸磬餬口江濱四節蒸嘗菜羹不給宋書曰湘州刺史王僧虔引樂頤之為主簿以同僚非人棄官去吏部郎庾杲之嘗往候頤之為設食唯枯魚菜葅杲之曰我不能食之母聞之自出嘗膳魚羹數種杲之曰卿過於茅季偉我非郭林宗又曰殷淳子孚有父風嘗與侍中何勗共食孚羹盡勗云益殷蓴羹勗司空無忌子也孚徐輟筯曰何無忌諱又曰朱脩之為荊州刺史姉在鄉里飢寒不立脩之貴為刺史未曾供贍往姉家姉為設菜羹麤飯以激之又曰毛脩之被禽入魏敬事嵩山道士寇謙之謙之在魏太武帝信敬營護之故不死脩之嘗為羊羹薦魏尚書以為絕味獻之武帝大悅以為太官令被寵遂為尚書封南郡公太官令如故又曰宋末齊高帝輔政劉彥節知運祚將遷密懷異圖及沈攸之舉兵齊高入屯朝堂袁粲鎮石頭潛與彥節及諸大將黃回等謀夜會石頭詰旦乃發彥節素怯搔擾不自安脯後便自丹陽郡車載婦女盡室奔石頭臨去婦蕭氏強勸令食彥節歠羹寫胸中手振不自禁齊書曰高祖既為齊王置酒為樂羹膾既至崔祖思曰此味故為南北所推侍中沈文季曰羹膾吳食非祖思所解祖思曰炰鼈鱠鯉似非勾吳之詩文季曰千里蓴羹豈關魯衛之說帝甚悅曰蓴羹故應還沈又曰朱緒無行母病積年忽思菰羹緒妻到市買菰為羹欲奉母緒曰病復安能食先嘗之遂併食盡母怒曰我病欲此羹汝何必併啖盡天若有知當令汝哽怨緒聞心中介介然即吐血明日而死梁書曰蕭勵為廣州刺史徵為太子左衛率勵性率儉而器度寬裕左右嘗將羹正胸前翻之顏色不異徐呼更衣後魏書曰趙琰字叔起嘗送子冀州娉室過路旁主人設羊羹琰方知盜殺卒辭不食又曰彭城王浟為滄州刺史有濕沃縣主簿張達嘗詣州投入舍食雞羹浟察知之守令畢集浟對眾謂達曰食羹何不還價直也達即伏罪合境號為神明唐書曰魏元忠前後三坐棄市偶得不死武后嘗問之對曰臣猶鹿耳羅織之徒茍須臣肉作羹耳荀卿子曰孔子厄於陳蔡藜羹不糝韓子曰堯有天下糲梁之食藜藿之羹又曰昭僖侯之時宰人上食而羹中有生肝焉昭侯召宰人以次而誚之曰汝何為置生肝羹中眾宰人曰竊以為有欲去上食宰也淮南子曰鼓造辟兵壽盡五月高炎曰鼓造謂梟今世人五月作梟羹亦作蝦蟆羹又曰楚人有烹猴者而召其鄰人以為狗羹也而甘之後聞其猴也據地而嘔之此不知味也又曰太宰子朱侍食於令尹子國子國伏羹而熱援漿以泛明日子朱辭官曰令尹輕行而簡禮其辱人不難明日伏節尹怒而笞之三百秦子曰五味者各稱一族之名合和一鼎名曰羹猶威重廉平恩合而為信也郭子曰陸士衡詣王武子武子有數斛羊酪指以示陸曰卿東吳何以敵此陸云千里蓴羹未下鹽豉劉向新序曰紂王天下熊羹不熟而殺庖人又曰平公問叔向曰齊桓公九合諸侯一匡天下如是君不知臣力何也師曠侍曰臣請以喻五味管仲善斷割之隰明善煎熬之賓須無善齊和之羹已熟矣而進之又曰魏文侯見箕季子曰晏進糲飡瓜瓠之羹日豈不能具五味教我無歛於百姓以省飲食之養也風俗通曰昭帝時大官上食羹中有髮切中有土令承坐不謹敬皆論劉禎毛詩義問曰鉶羹有菜鹽豉其中菜為其形象可食因以鉶為名陸機毛詩草木䟽曰梅杏類也其子赤而酢不可生噉煮而曝乾為蘇可著羹臛中廣志曰大渡蜂取其子得數升為羹亦可蒸食臨海水物志曰民皆好啖猴頭羹雖五肉矐不能及之其俗言寧負千石之粟不願負猴頭羹臛笑林曰人有和羹者以杓嘗之少鹽便益之後復嘗之向杓中者故云鹽不足如此數益升許鹽故不鹹因以為怪食經曰有豬蹄酸羹法胡羹法雞羹法簾笴鴨羹法楚辭天問曰緣鵠飾玉后帝食饗后帝殷湯也言伊尹始伏緣因烹鵠鳥之羹脩飾玉鼎以事以放湯賢之遂相也彭鏗斟雉堯帝饗何彭鏗彭祖也好和滋味斟羹事事堯堯而饗食之受壽永多夫何久長言彭祖進雉羹於堯堯饗之以壽之也又九章曰懲於羹者而吹齏言人有歠而熟中懲艾之見齏則吹之又招魂曰和酸若苦陳吳羹吳人攻作又大招曰鮮𧓈甘雞和楚酪酪昨胾也言取生大鼈烹之羹謂賂密復有肥雞肉和以酢酪其味清也又曰內鶬鴿鵠味豺羹鶬鶬鶴似鳩而青鵠黃鵠也豺以豺言畢夫巧於調和先甘酸鶬鵠肉故羹美也唐明皇雜錄曰李林甫子婿鄭平為戶部員外嘗與林甫同處一日林甫就院省其女遇平櫛髮見林甫至處遽欲退藏林甫固邀之見其鬚髮皆白謂平曰上當賜甘露羹郎其食之縱當華皓必當鬒黑明日果有中使至賜林甫食中有甘露羹遂以與平平食訖一旦髮毛如䃜嶺表異錄曰交阯之人重不祿羹羹以羊鹿鷄豬肉和骨同一釜煮之令極肥濃漉去肉進之葱薑調以五味貯以盆器置之盤中羹中有觜銀銀杓可受一升即更相楫讓多自主人先舉即滿斟一杓內觜入鼻仰首徐傾之飲盡傳杓如酒巡行之喫羹了然續以諸饌謂之不錄會亦呼為先腦也交阯人或經營事務彌縫推要但備此會無不諧者安南錄異圖鑿穿心飛頭鼻飲者皆遺風也張翰豆羹賦曰乃有孟秋嘉菽垂枝挺莢是刈是穫充簞盈篋香鑠和調同疾赴急桓鱗七說曰河黿之羹齊以蘭梅芬芳甘旨禾咽先滋衛洪七開曰馨羹芬臛凝色生華皇象書曰想必醉令作醴梅羹相待繆襲祭儀曰夏祀調和羹芼以葵秋祀羹芼以葱春祀和羹芼以韭臛蒼頡解詁曰臇少年汁臛也膹臛多澤膹房文切說文曰臛肉羹釋名曰臛曰蒿也香氣蒿高也齊書曰虞悰家富於財而善為滋味豫章王嶷盛饌享賓謂悰曰肴羞有所遺否悰曰何曾食䟽有黃頷臛恨無之廣志曰晨鳧肥而耐寒宜為臛劉欣期交州記曰九真太守陶璜立郡築城於土穴中得一白色形似蠶蛹無頭長數十丈大餘圍軟軟動莫能名剖腹有肉如豬昉遂以為臛甚香美璜啖一杯三軍盡食齊諧記曰江北華本者為人好鼈臛食經曰有芋子酢臛法楚辭招魄曰臛鼈炮羔有柘漿言以飴密臑鱉炮羔或曰臑鱉缹羔和牛五臟羔臛也鴶鵠鵠酸臇鳧臇小臛也煎鴻鶬鴻鳴鴶鶬鵠也言復以酸將烹鵠為羹小臇鳧煎熬鴻鶬令肥美羹也露雞臛臇露露栖鷄也有菜曰羹無菜曰臛臇大龜也厲而不爽厲列也爽敗也楚人名敗曰爽言乃復烹露栖之肥鷄鷄臛鱉肉其味淆列而不知貶也又大招曰煎鯽臛爵言煎鮒魚臛黃雀也崔駰愽徒論曰鶩臛羊殘陳思王七啟曰臛江界之潛黿王粲七釋曰黿羹蠙臛飲周禮天官膳夫曰飲用六清六清水漿醴䣼醫酏也醫於美切酏以支切又食醫曰飲齊眡冬時飲宜寒也又酒正曰酒正辨四飲之物一曰清二曰醷三曰醬四曰酏清謂醴之泲者也醷內則所謂或以配為醴者凡醴濁釀馳為之則少清矣醴者馳粥清也又曰漿人掌共王之六飲水醬醴涼醷馳入于酒府醴者清也鄭司農云涼以水酒也方謂涼今寒粥若糗節雞水禮王制曰天子五飲上水醬酒醴酏上以水為上又郊特牲曰飲養陽氣故有樂又內則曰飲曰諸飲也重醴稻醴清糟黍醴清糟梁醴清糟重陪也糟醇也清泲也致飲有醇者有泲者陪設之也或以酏為醴釀粥為醴黍酏馳粥又外傳曰共王及后與世子食後所進之六飲水居其上其次曰漿三曰醴釀粥為之淨而清四曰涼暑月以雜糗為和水者五曰醴以乾梅乾木瓜相和水一名濫涼六曰酏以黍為粥之薄者左傳曰丑父使公下如華泉取飲鄭周父御佐車宛茷為右載齊侯以免佐車副車又曰鄢陵之戰欒鍼見子重之旌請曰楚人謂夫旌子重之麾也彼其子重也日臣之使於楚也子重問晉國之勇臣對曰好以眾整曰又何如又問其餘臣對曰好以暇暇閑暇今兩國治戎行人不使不可謂整臨事而食言不可謂暇食好整之言請攝飲焉攝持也持飲往飲子重也公許之使行人執搕承飲造于子重承奉也曰寡君乏使使使鹹御持也曰寡君乏使鍼御持矛是以不得犒從者使某攝飲子重曰夫子嘗與吾言於楚必是故也不亦識乎知其以往言好腵故致飲受而飲之免使者而復鼓免脫也又曰鄭師入陳子展執縶而見見陳侯再拜稽首承飲而進獻承飲奉觴示不失臣敬子美入數俘而出子美子產也但數其所獲人數不將以歸也又曰吳入楚申包胥乞師於秦立依於庭牆而哭日夜不絕聲勺飲不入口七日論語曰一簞食一瓢飲穆天子傳曰天子渴于中求飲未至七萃之士曰高奔戎割其左驂之頸取其清血以飲天子今西方之羌故刺馬咽取血飲之瘡示尋愈也天子美之賜佩玉一隻神仙傳曰蔡經尸解去十餘年忽還家言七月七日王君當來過到其日可多作數百斛飲以供從官乃去到期假借甕器作飲數百斛羅列覆置庭中其日方平果來語林曰陸士衡在洛夏月忽思竹篠飲語劉實云吾鄉曲之思轉深今來東歸恐無復相見理言此已復之生感漿詩曰或以其酒不以其漿或醉其酒者或不得漿者禮記曲禮曰酒漿處右又檀弓曰曾子謂子思曰伋吾執親之喪也水漿不入於口者七日又內則曰漿酢胾也水清新醷梅漿濫以諸和水也以周禮六飲枝之則濫涼也紀莒之問名諸為濫漢釋名曰桃濫水也水清而藏之其味濫濫然酢也史記曰漿千儋儋甖此亦比千乘之家又曰薛公藏於賣漿家漢書郊祀歌曰奉尊柘漿折朝醒應劭曰取甘柘汁以為飲也折解醒病酒言拓漿可以解朝醒也吳書曰袁術去壽春時方盛夏欲得蜜漿又無蜜遂歐血死後魏書曰游明根幼年遭亂為櫟陽王氏奴主使牧羊明根以漿倩人書字路邊書地學之又曰咸陽王禧謀逆被禽送華林都亭著千斤錢格鏁格羽林掌衛之時熱甚禧渴悶垂死勑斷水漿侍中崔光令左右送酪漿升餘禧一飲而盡管子曰左酒右漿蔡邕注曰事尚書左酒近體也右漿上遠列子曰列子之齊中道而返遇伯昏瞀人瞀人曰奚方而反曰吾驚焉惡乎驚曰吾食於十漿而五漿先饋饋遺也伯昏瞀人曰若是則汝何為已驚遺汝之漿何故驚也曰夫內誠不解內無誠實外無解然形諜成光諜飾其形身之光也以外鎮人心外以諜形鎮人則其內不足也使人輕乎貴老重少輕老由乎形諜而察其所患形飾則心亂亂必患生故當察也夫漿人持為食羹之貨多餘之羸漿人之饋我者非貴我羸也蓋貨我以自盈耳其為利也薄其為權也輕而猶若是食羹之利薄所利之權輕相猶謀我況有國者効我以功事乎故我道中而反而況萬乘之主身勞於國而智盡乎事彼將我任以事而効我以功吾是以驚也孟子曰書曰徯我后后來無罰其君子實玄黃于篚以迎其君子其小人簞食壺漿以迎其小人袁子正書曰歲在申酉乞漿得酒歲在辰巳嫁妻賣子顧子曰非其道壺漿不可受是其道雖天下不可讓山海經曰高前之山上有水焉甚寒而清帝臺之漿也飲者不心痛漢武故事曰西王母曰太上之藥有玉津金漿其次藥有五雲之漿神異經曰東南有人名黃父以霧露為漿廣志曰醶䣼漿也醶初檻切穆天子傳曰盛姬病求飲天子命取漿而給得之遂是日壺輲壺器名輲速也音遄焦贛易林曰登上橋堂飲萬歲漿華山記曰華山上有明星玉女持玉漿孝子傳曰洛陽陽公輦義漿以給過客世說曰嵩山北有大穴晉初有一人誤墮穴中緣行十許日有草屋區中有二人對坐圍碁局下有一杯白飲墮者告以飢渴碁者曰可飲此墜者飲之氣力十倍歸問張華華曰所飲者玉漿典術曰餌桃膠五十日後飲玉漿楚辭九歌曰奠桂酒兮椒漿以椒置漿中也援北斗兮酌桂漿西京雜記枚乘柳賦曰樽盈縹玉之酒爵獻金漿之醪梁人作諸柘酒名曰金漿張衡思玄賦曰斟白水以為漿
