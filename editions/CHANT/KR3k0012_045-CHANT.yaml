body:
  text: 關中蜀漢諸山吳山周禮雍州其山鎮曰吳嶽孫炎曰雍州鎮有吳嶽山也郭璞曰吳嶽別名開山漢書地理志云吳山在汧縣西國語謂之西吳秦都咸陽以為西岳酈元水經注云流水水發南山西側俗以此山為吳山其山三峰望之恒有落勢山下有石穴廣四尺高七赤水溢石穴懸波傾注涌瀾奔蕩發源成川北流注于汧是也驪山三輔故事曰始皇葬驪山起陵高五十丈下錮三泉周廻七百步以明珠為日月魚膏為脂燭金銀為鳧鴈金蠶三十箱四門施徼奢侈太過六年之間為項籍所發放羊兒墮羊塚中燃火求羊燒其槨藏述征記曰長安東則驪山西則白鹿原北望雲陽悉見山阜之形而恒若在雲霧之中孟康曰昔周幽王悅褒姒姒不笑王乃擊鼓舉烽以徵諸侯至而無寇褒姒乃笑王甚悅之及犬戎至王舉烽以徵諸侯不至王遂敗身死于驪山之北龍首山辛氏三秦記云龍首山長六十里頭入渭水尾連樊川頭高二十丈尾漸下高五六丈土赤不毛昔有黑龍從山出飲水其行道成土山今長安城即疏山為臺殿基址不假築其含元殿即龍首山之東麓高敞為京城之最階高於平地三十餘尺南去丹鳳門四百餘步中無間隔左右寬平東西廣百步兩都賦云漢之西都寔曰長安左據函谷二崤之岨右界褒斜龍首之險表以太華終南之山帶以洪河涇渭之川即此山之形勢也九嵕山四夷郡國縣道記曰九嵕山東連仲山西當涇水出焉九嵕高六百五十丈周十五里在咸陽𡽱嶭山四夷郡國縣道記曰𡽱嶭山在雲陽縣東北十里一名慈峨山俗嵯峨山頂有雲起即雨里人以為候昔黃帝鑄鼎於此山雞頭山崔鴻十六國春秋云石生不能守長安欲西上隴士卒散盡遂入雞頭山為追兵所害山在鄠縣東牛首山山海經曰牛首山澇水出焉而注于潏水是多飛魚狀似魽可療痔疾又云牛首山有鬼草赤莖葉如葵莠如禾服之使人不憂藍田山後魏風土記云藍田山巔方二里仙聖遊集之所劉雄鳴學道於山下有祠甚嚴亦灞水之源此西又有尊廬氏陵次北又有媧氏谷則知此地是三皇舊居於是笄頭山史記云黃帝西至于崆峒笄頭山圖經云笄頭山在涇陽西禹貢涇水所出淮南子云薄落山一名笄頭山注水經云大隴之山異名耳莊子謂廣成子學道於崆峒之山亦黃帝問道於廣成子蓋在此山按今肅川又有崆峒山未詳孰是今此見有柏堂在山頂上不知何代所置也後漢隗囂使王孟塞雞頭道謂此山也賀蘭山涇陽圖經曰賀蘭山在縣西九十三里山上多有白草遙望青白如駮北人呼駮馬為賀蘭鮮卑等類多依山谷為氏族今賀蘭姓者皆因此山名太白山辛氏三秦記曰太白山南有陳倉山山有石與山雞不別趙高燒山雞飛去晨鳴山頭聲聞三十里或謂是王雞錄異傳云秦文公時雍南山有大梓樹文公伐之輒有大風雨樹生合不斷有一人病夜往山中間有鬼語樹神秦若使人被髮以朱絲繞伐樹汝得不憂否文公如其言伐樹樹斷中有一青牛出走入澧水中復出使騎擊之不勝騎墮地復上髮解牛乃畏之入水不出故置髦頭騎也五將山崔鴻十六國春秋云符堅為慕容冲所逼長安城中有書曰帝出五將久長得免是又謠曰堅入五將長得堅大信之率騎數百出五將宣告州郡期以孟冬救長安堅至五將山姚萇遣將軍吳忠圍堅眾奔散忠執堅以歸新平即此山也仇池山辛氏三秦記云仇池山上有百頃地平如砥其南北有山路東西絕壁百仞上有數萬家一人守道萬夫莫向山勢自然有樓櫓卻敵之狀東西二門盤道可七里上有岡阜泉源史記謂秦得百二之固也西晉末為氐陽茂搜所據於山上立宮室囷倉皆為板屋乃氐之所理於此今謂之洛谷道是也秦州記曰仇池山本名仇維山形似覆壺上廣百頃下周數十里高二十餘里壁立千仞自然樓櫓卻敵分置均調竦起數丈有如人力也青城山福地記曰青城山高三千六百丈周匝五千里有甘露芝草天池醴泉玉匱經云黃帝封為五岳丈人乃岳瀆之上司真仙之崇秩一月之內群岳再朝六時灑泉以代晷漏一名赤城一名青城都一名天谷山亦為第五大洞寶仙九室之天對郡之西北在岷山之南群峰掩映互相連接靈仙所宅祥異則多益州記云崗蠻崿連嶺千里上有仙都地理志云西徹之外江水所出天彭青城連峰不絕李膺記云入山七里至赤石城有羊馬臺三師壇上五里至瀑布水澗二百步有二石梯有一石笋高三丈過二石門絕崖數百丈下起常道觀高峰下有冰六時灑落東北有二石室名龍宮可容百餘人從龍宮過石室至石梯名龍橋又有一石梯洞穴深淺莫知所極西北有石室宛然見存又有黃帝壇石法天地上圓下方闊一丈二尺有十二角觀東有石日月各闊五尺厚一尺二寸相對柱上烏兔煇鑠方圓磅礡可觀五岳真形圖云洞天所在之處其下別有日月分精以照其中龍橋處二山相去百餘步其峰危竦相對橋在峰首其橋中半漸漸促小可六七寸長一丈五尺兩邊懸崖俯臨不測山傍有誓石天師張道陵與鬼兵為誓朱筆畫山青崖中絕今驗斷處石並丹色闊二十丈深六七丈望之赩然邛崍山山海經曰崍山江水出焉今在漢嚴道縣南中江所出有九析坂出貘似熊其陽多黃金其陰多麋其木多檀柘也華陽國志曰嚴道縣縣有邛崍山山上凝冰夏結廻曲九折王陽去官之所岷山山海經曰岷山江水出焉而東海注于大江其中多怪蛇有鳥焉其狀如鴞而赤身白首其名曰竊脂可以禦火石鏡山華陽國志曰疊州合川縣石鏡山在縣西北四十五里其山有石瑩皎潔照之莫不備見形體故謂之石鏡山山下又有銅窟隋初於此置監鼓鑄錢刀焉綏山列仙傳曰葛由者蜀之羗人周成王時刻木為羊賣之一旦乘木羊入蜀蜀中王侯賓之上綏山山在安固縣東三十里隨之人皆得仙術覆舡山十道錄曰覆舡山堯遭洪水維舟樹下舡因覆焉又益州記云覆舡山中十五里有七里坂一名羊腹坂屈曲有壁立難昇之路牛頭山九州記云牛頭山昔日葛仙翁多遊於此今立為寺與白獸山相連昔秦時有白獸為害夷人射因刻白石於此山今遺像尚存董政山十道記曰董政山隋開皇中縣令董叔封高雅之士去官之後民咸思其德因指此山為董政山彭亡山十道記曰彭亡山後漢將軍岑彭征公孫述於此山戰死故號曰彭亡山鼎鼻山十道記曰鼎鼻山周道衰微九鼎淪一於此山之下其水清澄今民猶或見其鼎耳靈臺山十道記曰靈臺山在縣北一名天柱山高四百丈即漢張道陵昇真之所郡國志曰靈臺山天柱崖下有一桃樹高五尺皮是桃心肉似柏張道陵與王良趙昇試法於此四百餘年桃迄今不朽小碑記之黃厥山郡國志曰黃厥山有鍾乳穴十九又西岸有自然石塞其下流水上有一懸石似磬驚之有聲可聽靈山郡國志曰靈山昔有神女於此擣衣因號擣衣山山南絕巖有方石明瑩謂之玉女擣練砧又有盤龍山以山形如盤龍也猿門山益州記云猿門山在涪縣之北二十五里上多猿其山二峰磔堅如門故曰猿門金山益州記曰金山在涪縣東五十步東臨澗水光照映川又李膺記云金山長七八里每夏潦雨有崩處即金粟散出是也五婦山蜀記云梓橦縣有五婦山一名五婦臺秦王遺蜀王美女五人蜀王遣五丁迎女至梓橦五丁蹋地大呼驚五女並化為石蜀王築臺登而望之因名為五婦臺焉玉女山梁州記云肥城東南有玉女山山有一石穴中若房宇有玉女入穴不出穴前有脩竹下有石壇風微動竹拂壇如箒祁山關山圖曰漢陽西南有祁山九州之名阻天下之奇峻蜀志云建興六年諸葛亮率師攻祁山不扳即謂此也又按九州志云祁山上有高樓武陟二神祠每歲郡邑祀之又周地圖地記云其城即漢時守將所築閬山閬山圖經曰閬山四合於郡故曰閬中按名山志云閬山多仙聖遊集焉盤龍山李膺益州記云閬中盤龍山南有一石長四十丈高五尺當中有戶及扇若人之掩閉古老以為玉女房銅梁山左太冲蜀都賦云外員銅梁宕渠張孟注云銅梁山名也按其山有桃枝竹西連亘二十餘里山嶺之上平整遠望諸山而此獨秀也山在州南九里高梁山江源記云南浦郡高梁山尾東跨江西首劍閣東西數千里山嶺長峻其峰崔嵬於蜀市望之若長雲垂天一日行之乃極其頂俯視眾山泯若平原劍閣銘謂岩梁山積石峨峨即述此也青石山益州記云昔巴蜀爭界久而不決漢高帝八年一朝密霧石為之裂今猶如之自上及下破處直若引繩焉於是州界始判山上有古神祠甚靈今名青石山雲南山九州要記云雲南郡山山有祠處石室稱黃石公祀之必用紙一百張筆一雙墨一丸室內有啟必知吉凶但不見其形禺同山九州要記曰禺同山有金馬碧雞之祠弔鳥山九州要記曰弔鳥山在葉檢縣葉檢則雲南郡廢邑也山上有鳥千百群飛啁啾一歲必一度大集即鳳皇死也
