body:
  text: 皇親部十四太子三崔豹古今注曰漢明帝為太子樂人作歌詩四章以贊太子之德一曰日重光二曰月重輪三曰星重輝四曰海重潤東觀漢記曰東海恭王疆光武皇帝長子也母郭后建武二年六月立為皇太子十七年十月郭后廢為中山太后自郭后廢疆不自安數因左右陳誠願備藩輔十九年六月疆廢為東海王二十八年十月就國食東海魯國并二郡二十九縣租入倍諸王賞賜恩寵無倫比致虎賁旄頭宮殿設鍾簴之懸疆性聰達恭謙臨之國比上書讓還東海十九縣又固皇太子因辭上不許以疆章示公卿大夫深嘉歎之續漢書曰趙喜為太尉中元二年上崩喜受遺詔典錄喪禮新承王莽之亂國無舊典皇太子與諸王雜坐同席尊卑無別喜乃正色橫劍殿階扶下諸王以明尊卑范曄後漢書曰孝順皇帝安帝之子母李氏為閻皇后所害永寧元年立為皇太子延光三年安帝乳母王聖大長秋江京中常侍樊豐譖太子乳母王聖舅廚監邴吉殺之太子數為歎息王聖等懼有後禍遂與豐京共陷太子太子坐廢為濟陰王明年三月安帝崩北鄉侯立濟陰王以廢黜不能上殿親臨梓宮悲號不食內外群僚莫不哀之及北鄉侯薨車騎將軍閻顯及江京與中常侍劉安陳達等白太后秘不發喪而更徵立諸國王子乃閉宮門屯兵自守十一月丁亥京師及郡國十六地震是夜中黃門孫程等十九人共斬江京劉安陳達等迎濟陰王於德陽殿西鍾下即皇帝位年十一魏志曰文帝為五官將而臨淄侯植才名方盛各有黨與有奪文之議文帝使人問賈詡自固之術詡曰穎將軍恢崇德度躬素士之業朝夕孜孜不違子道如此而已文帝從之深自砥礪太祖又嘗屏除問詡默然不對太祖曰與卿言而不荅何也詡曰屬有思故不即對耳太祖曰何思詡曰袁本初劉景升父子也太祖大笑於是太子遂定魏略曰太祖不立太子太子自疑是時有高元昌者善相人乃呼問之對曰其貴乃不可言因問壽幾何元昌曰其壽至四十當有小恙過是無憂後無幾而立太子也世語曰辛毗女憲英適太常羊耽外孫夏侯湛為其傳曰憲英聰明有才鑒初文帝與陳思王爭為太子既而文帝得立抱毗頸而告之曰辛君知我喜不毗以告憲憲歎曰太子代君主宗廟社稷也代君不可以不慼主國不可以不懼宜慼而喜何以能久魏其不昌乎魏志曰明帝文帝太子也生而太祖愛之常念在左右魏書曰明帝生數歲而有歧嶷之姿武帝異之曰我基於爾三世矣每朝燕會同與侍中近臣並列帷幄好學多識特留意於法理魏略曰文帝以郭后無子詔使子明帝帝以母不以道終意甚不平後不獲已乃敬事郭后旦夕因長御問起居郭后亦自以無子遂加慈愛文帝始以帝不悅有意欲以他姬子京兆王為嗣故不拜太子魏末傳曰明帝嘗從文帝獵見子母鹿文帝射殺鹿母使帝射鹿子帝不從曰陛下殺其母臣不忍復射其子因涕泣文帝即放弓箭以此深奇之而建樹之意定也王隱晉書曰武皇帝寬惠仁厚深沉有智量風度容貌綽如也景元中為撫軍咸熙元年晉國初開立為世子遷撫軍大將軍開府副相國二年立為太子又曰惠帝為太子時上素知太子闇弱後必亂國然不能擇才乃遣荀勗和嶠往觀之最還盛稱太子德更進茂不同西宮之時也嶠荅詔稱臣以為太子如故不見更勝此自陛下家事非臣所盡也於是天下貴嶠而賤勗也又曰愍懷太子名遹音聿字熙祖少聰惠武帝愛之六七歲時帝夜望火太子牽上衣裾使入闇中上問其故太子對以暮夜倉卒宜備非常不當近火光令人照見也又嘗見官養豬肥大不常復問上何不殺以賜左右而久費五穀上即烹之由是益奇之常稱以為似宣皇帝亦以東宮無嫡有託後之意太康十年詔曰遹既長且仁可令以遹為廣陵王以廣陵臨淮為封國邑五萬戶及世祖崩惠帝即位立為皇太子詔曰遹尚幼蒙今出止東宮雖當賴師傅群賢之訓其遊處左右宜得正人陳共周旋能相長益者太保衛權息庭司空司馬秦息略太子太傅楊濟息毖音秘太子少師裴楷息憲太子少傅張華息禕尚書令華廙音翼息恒並以道義之門有不肅之訓其令此六人更共往來止其後太子好卑居小馬小牛令左右騎斷羈勒使墮地又令人屠肉己自分齊手揣輕重斤兩不差云其母本屠家女也頗好遊宴或闕朝侍稍失儲副望賈后無子妬害滋甚九年正月月暈赤黃數重三月十八日榮陽河南潁川繁霜殺桑及姚李杏花尉氏雨血有聲若牛出許昌城夏桑生于東宮西廂日長尺餘數日枯日中若飛鷰者積數月漢中平中亦有此變皆為太子也賈后作頡子髻太子見頡之象也是時謠曰宮東馬子莫聾啌前至臘月纏汝鬉十一月天連大風發屋折樹十二月二十八日后遣宮婢齎書與太子云陛下昨夜不快汝可入朝太子如令請朝詔聽二十九日入朝賈后不見使婢陳儛賜棗酒強使飲辭不見聽太子醉賈后誣奏太子有悖書廢徙金墉城以千兵防送幽于許昌宮之別坊賈后與賈謐等早害太子以絕民望三月十四日矯詔使小黃門孫慮害太子賈后表以廣陵王禮殯趙王倫誅賈謐廢賈后帝乃使持節兼司空衛尉伊策故皇太子曰嗚呼少資歧嶷之質荷先帝殊異之寵大啟土宇奄有淮陵朕奉遵遺旨建爾儲副以光顯我祖宗祗爾德行以從保傅事親孝敬禮無違者而朕昧于凶構致爾于非命之禍俾申生孝己復見于今賴宰相賢明人神憤怨朕心討厥有罪咸伏其辜何補於荼毒冤魂酷痛哉是用切怛悼恨震動於五內今追復皇太子喪禮備制反葬京畿祠以太牢魂而有靈尚獲爾心文士傳曰賈謐與愍懷太子博爭道成都王厲聲曰皇太子國之儲君賈長淵何得無禮晉書曰明帝元皇帝長子也幼而聰哲為元帝所寵異年數歲常坐置膝上屬長安使來因問帝曰汝謂日與長安孰遠對曰不聞人從日邊來居然可知也元帝異之明日宴群僚又問之對曰日近元帝失色曰何乃異間者之言對曰舉目見日不見長安由是益奇之及帝即尊號立為皇太子已見明帝紀中何法盛晉中興書曰肅祖中宗長子也建武元年中宗為晉王拜王太子及踐尊號為皇太子冊曰於戲朕承天緒黍繼祖宗之洪基君臨于萬邦戰戰兢兢若涉淵水未有攸濟自古聖王敷宅四海莫不建立元子本枝百世今稽古授爾于儲宮以陪貳于朕躬欽哉爾其克念乃祖日新厥德何遠非佞何親非賢欽翼師傅以丕崇大化可不慎歟爾其敬之又曰孝宗穆皇帝諱聃康帝子也建元二年康帝疾篤左光祿大夫領司徒謨尚書令恢等上䟽曰臣聞皇義玄邈五帝攸往淳風澆散三王傳嗣欲令國有常居民有定奉關諸盛衰不易之道也伏惟皇子天挺奇表隆準豐下歧嶷之姿彰於始年大成之風顯於朞月宜建立儲宮允副民望請下太史擇吉日告宗廟備禮儀奉行奏可後魏書曰太宗明元皇帝道武之長子初帝母既賜死大祖乃召帝告曰昔漢武帝將立其子而殺其母不令婦人後與國政使外家無亂汝當繼統吾故遠同漢武為長久之計帝素純孝哀泣不能自勝太祖怒召之帝欲入左右曰孝子事父小杖則受大杖避之今陛下怒盛入或不測陷帝於不義不如且出待和解而進不晚也帝從之乃遊行於外及元紹之逆也帝還而誅之天賜六年即皇帝位又曰景穆皇帝太武皇帝之長子也母曰賀夫人延和元年立為皇太子時年五歲明惠強識聞則不忘及長好讀經史皆通大義太武甚奇之初太武之伐河西李順等咸言姑臧無水草不可行太子有疑色及車駕至姑臧乃詔太子曰姑臧城東西門外涌泉於城北其大姑河澤草茂盛可供大軍數万人之多言亦可惡也太子謂言者曰為人臣不實若此豈是忠乎吾初聞有疑但帝決行耳幾誤人大事言者復何面目見帝也正平元年六月薨於東宮時年二十四賜謚曰景穆皇太子高宗即位追尊為景穆皇帝廟號恭宗又曰世宗宣武皇帝孝文皇帝第二子也母曰高夫人初夢為日所逐避於床下日化為龍繞己數匝遂有娠生帝於平城宮二十一年立為皇太子又曰肅宗孝明帝諱詡世宗第二子也延昌元年立為皇太子二年世宗幸東宮召崔光與黃門甄琛廣陽王淵等並賜坐詔光曰卿是朕西臺大臣當今為太子師傅光起拜固辭詔不許即命肅宗出從者十餘人勑以光為傅之意令肅宗拜光光又拜辭不當受太子拜復不蒙許肅宗遂南面再拜詹事王顯啟請從太子拜於是宮臣畢拜光北面立不敢荅拜唯西面拜謝而出又曰廢太子生而母死文明太后撫視之常置左右詔曰昔塗山有育美名列於夏典任姒作配昌發顯於周書故能緝熙丕緒祚延八百自元子誕育於今四載而名表未孚於四方茂實未昭於朝掖非所以憲章遠猷允光禮度者也太皇太后親發明旨為之立名依德協義名恂字元道國祚永隆儲貳有寄無窮之兆於是而始乃大赦天下太和十七年七月癸丑立恂為皇太子高祖每歲征幸常留守恂不好書學體貌肥大深忌河洛暑熱意每追樂北方庶子高道悅數苦諫恂甚銜之乃手刃道悅於禁中高祖引群臣於清徽堂議廢之為庶人置之河陽後謀逆賜死梁書曰天監十四年正月朔旦帝臨軒冠太子於太極殿舊制太子著遠遊冠金蟬翠緌纓至是詔加金愽山又曰昭明太子母丁貴嬪有疾太子還永福省侍疾衣不解帶及薨步從喪還宮至殯水漿不入口每哭慟絕武帝命中書舍人顧協宣旨曰毀不滅性聖人之制不勝喪比於不孝有我在郍得自毀如此可即強進飲粥太子奉勑乃進數合自是至葬日進麥粥一升武帝又勑曰聞汝所進過少轉羸瘦我比更無病正為汝如此胸中亦圯塞成疾應強加饘粥不使我恒爾懸心雖屢奉勸逼終喪日止一溢不嘗菜菓之味體素壯腰帶十圍至是減削過半每入朝士庶見者莫不下泣又曰昭明太子性愛山水於玄圃穿築更立亭館與朝士名素者遊其中嘗泛舟後池番禺侯軌盛稱此中宜奏女樂太子不荅詠左思招隱詩云何必絲與竹山水有清音軌慚而止又曰昭明太子好士愛文劉孝綽與陳郡殷芸吳郡陸倕琅琊王筠彭城劉洽等同見禮待太子起樂賢堂後周書曰宣帝諱贇高祖長子帝即位多過惡初帝之在東宮也高祖慮其不堪承嗣遇之甚嚴朝見進止與諸臣無異雖隆寒盛暑亦不得休息性既嗜酒高祖遂醪醴不許至東宮帝每有過輒加捶扑嘗謂之曰古來太子被廢者幾人餘兒豈不堪立邪於是遣東宮官屬錄帝言語動作每月奏聞帝憚高祖嚴矯情脩飾以是過惡遂不聞隋書曰煬帝高祖第二子也母文獻獨孤皇后上美姿儀少敏惠高祖及后於諸子中特鍾愛高祖幸上所居第見樂器絃多斷絕又有塵埃若不用者以為不好聲伎之玩上尤自矯飾當時稱為仁孝及太子勇廢立為皇太子唐書曰李綱隋開皇末為太子洗馬皇太子勇嘗以歲首宴宮臣左庶子唐令則自請奏琵琶又歌武媚娘之曲綱趨而出勇曰我欲為樂耳君勿多事及勇廢黜文帝召東宮宮屬切讓之無敢對者綱對曰今日之事乃陛下之過非太子之罪也太子才非上品性是常人若得賢明之士輔導之足堪繼嗣皇業方今多士盈朝當擇賢居任奈何以絃歌鷹犬之才日在其側致令至此乃陛下訓導不足豈太子之罪耶隋書曰元德太子昭煬帝長子也生而高祖命養宮中三歲時於玄武門弄石師子高祖與文獻后至其所高祖適患腰痛舉手憑后昭因避去如此者再三高祖歎曰天生長者誰復教乎由是大奇之高祖嘗謂曰當為爾娶婦昭應聲而泣高祖問其故對曰漢王未婚時恒在至尊所一朝娶便則出外懼將違離是以啼耳上歎其有至性特鍾愛焉煬帝即位便幸雒陽宮昭留守京師大業元年帝遣使者立為皇太子唐書曰太宗文皇帝高祖第二子也母曰太穆皇后以隋開皇十八年生於武功之別館初在孕而語聲聞於外后心異之將誕育后不之覺而太宗已生高祖受禪拜尚書令進封秦王武德九年立為皇太子又曰隱太子建成高祖長子也大業末高祖捕賊汾晉令建成攜家屬寄于河東義旗建遣使密召之建成與巢王元吉間行赴太原建成至高祖大喜拜左領大都督封隴西郡公引兵略西河郡從平長安義寧元年冬隋恭帝拜唐國世子開府置僚屬二年授撫軍大將軍東討元帥將兵十萬徇洛陽及還恭帝授尚書令武德元年立為皇太子時太宗功業日盛建成與齊王元吉潛謀作亂九年六月三日太宗密奏建成元吉淫亂後宮因自陳曰臣於兄弟無絲毫所負今欲殺臣似為世充建德報讎臣今枉死永違君親魂歸地下實亦恥見諸賊高祖省之愕然報曰明日當勘問汝宜早參四日太宗將左右九人至玄武門自衛高祖已召裴寂蕭瑀竇延陳叔達封倫宇文士及顏師古等欲令窮覆其事建成元吉行至臨湖殿覺變即迴馬將東歸宮府太宗隨而呼之元吉馬上張弓再三不彀太宗乃射之建成應弦而斃又曰高宗文皇帝太宗弟九子母曰文德順聖長孫皇后貞觀二年生於東宮之麗正殿封晉王幼而歧嶷端審寬仁孝友初授孝經太宗問曰此書中何言為善對曰夫孝始於事親中於事君終於立身太宗大悅曰行此足以事父兄為臣子矣太子承乾廢長孫無忌李勣等議立為皇太子又曰太子承乾得罪太宗欲立晉王而限以非次惶惑不決乃御兩儀殿群臣盡出獨留長孫無忌及司空房玄齡李勣謂曰我三子一弟所為如此我心無聊因自投於床抽佩刀欲自刺無忌等驚懼爭前扶抱取佩刀以授晉王無忌等請太宗所欲報曰我欲立晉王無忌曰謹奉詔有異議者臣請斬之太宗謂晉王曰汝舅許汝也汝宜拜謝晉王因下拜太宗謂無忌等曰公等既符我意未知物論何如無忌曰晉王仁孝天下屬心久矣乞召問百僚必無異辭於是建立遂定
