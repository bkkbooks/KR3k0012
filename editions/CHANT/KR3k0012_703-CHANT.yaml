body:
  text: 服用部四扇揚雄方言曰扇自關而東謂之扇自關而西謂之箑世本曰武王作箑帝王世紀曰武王自盟津還返於國見暍人王自左擁而以扇之續漢書曰梁冀輿服之制作擁身扇東觀漢記曰黃香至孝夏則以扇侍于親側魏略曰韓宣字景然為丞相軍謀掾步入宮門內與臨淄侯相遇時新雨地有泥潦宣礙不得去以扇自障晉書曰武帝太始中博選良家以充後宮先下書禁天下嫁娶使官者馳傳州縣召充選者使楊后選所取后妒不取端正好唯取長白時卞蕃女有美色帝舉扇彰面語后云卞蕃女好后曰蕃三世后族不宜枉以卑位帝乃止又曰何植字元幹常以縛筆織扇為業以奉供養又曰庾亮出鎮於外以帝舅故執朝權王導不能平嘗遇西風起輒舉扇自蔽曰元規塵污人又曰王羲之字逸少居蕺山見一老姥持六角扇賣之羲之書其扇各為五字姥初歎惋因謂姥曰旡苦但言是王右軍書以求百金價姥如言人競買之後姥復將數扇來請書羲之不荅又顧榮傳曰廣陵相陳敏反渡江攻楊州剌史劉機阻兵據州郡有鼎峙之意遣顧榮歛舟於岸敏率萬人出不獲濟榮自麾羽扇敏眾大潰也晉中興書曰安帝義熙元年禁絹扇及樗蒲續晉陽秋曰謝安賞袁宏機對辯速宏為東陽郡時賢祖道治亭安起執宏手顧左右取一扇授云聊以贈行宏應聲曰輒當奉揚仁風慰彼黎庶合坐稱其率要又曰謝安鄉人有罷中宿縣者還詣安問其歸貨荅曰嶺南彫獘唯有五萬蒲葵扇謂非時為滯貨安乃取其一中者捉之於是京都士庶競而慕焉增價數倍旬日則無所賣宋書曰明帝王皇后上嘗宮內大集而祼婦人觀之以為歡笑后以扇鄣面獨無所言又明恭王后傳曰廢帝失德太后每加勗譬始猶見順後狂慝稍甚太后嘗賜帝玉柄毛扇帝嫌毛柄不華因此欲加酖害令太醫煮藥左右止之乃止又曰范曄謀逆被擊上有白團扇甚佳送曄令書詩賦美句曄受旨援筆而書曰去白日之炤炤襲長夜之悠悠上循覽悽然齊書曰竟陵王子良孫賁字文奐形不滿六尺神識耿介幼好學有文才能書善畫於扇上圖山水咫尺之內便覺萬里為遙又曰劉祥字顯徵輕言肆行不避高下建元中為正員郎司徒禇彥回入朝以腰扇鄣日祥從側過曰作如此舉止羞面見人扇鄣何益彥回曰寒士不遜祥曰不能殺袁劉安得免寒士又曰蕭子顯頗負才氣反掌選見九流賓客不與交言但舉扇一撝而已衣冠竊恨梁書曰臨川王宏子正表幼不慧常執白團扇湘東王取題八字銘玩之正信不知嗤之終常搖握又曰柳惲早有令名少工篇什為詩云亭皋木葉下隴首秋雲飛琅琊王融見而嗟賞因書齋壁及所執白團扇南史張敷字景胤生而母亡年數歲問之雖童蒙便有感慕之色至十歲許求母遺物而散施已盡唯得一畫扇乃緘錄之每至感思輒開笥流涕又曰羊欣字敬元會稽王世子元顯每使書扇常不奉命元顯怒乃以為後軍府舍人又曰何戢美容儀動止與禇彥回相慕時人呼為小禇公家業富盛性又華侈衣被服飾極為奢麗出為吳興太守頗好畫扇宋武賜戢蟬雀扇善畫者顧景秀所畫時吳郡陸探微顧寶元皆能畫歎其巧絕戢因王晏獻之後魏書曰爾朱弼字輔伯節閔帝時封河間郡公尋為青州剌史韓陵之敗欲奔梁數日與左右割扇為約弼帳下都督馮紹隆為弼信待說弼曰今方同契闊宜當心瀝血示眾以為信弼從之大集部下弼乃踞胡床令紹隆持刀破心紹隆因推刃殺之唐書曰中宗為皇太子天后以時熱令皇太子外朝用扇鄣日太子讓之詔不許太公六韜云將冬不衣裘將夏不操扇名禮將之也管子曰夏行五政三曰禁扇去笠淮南子曰失火而鑿池披裘而用扇不能救也又曰夫夏日不披裘非愛之也煖有餘於身也冬日不用箑者非簡之也清有餘也抱朴子曰風不輟則扇不用日不出則燭不息春秋繁露曰以龍致雨以扇逐暑崔豹古今注曰雉尾扇起於殷高宗有雊雉之祥服章多用翟羽周制以為皇后夫人車服輦車有翣即緝雉羽為之以障翳風塵也漢朝乘輿服之後以賜梁孝王魏晉以來以為常准諸王皆得用之又曰鄣扇長柄扇也漢世多豪俠為雉尾而制長扇也又曰五明扇舜所作也既受堯禪廣開視聽求賢人以自輔故作五明扇秦漢公卿大夫皆用之魏晉非乘輿不得用也東宮舊事曰皇太子初拜供漆要弱青竹扇各一太子納妃同心扇三十單竹扇二十脩復山陵故事曰玄宮中用絹團扇六枚西京雜記曰朱買臣為會稽太守懷章綬還至金堂而國人未知也所知錢穀見其墨露乃勞之曰得旡罷乎遺以紈扇買臣至郡引為上客又曰長安巧工丁緩作七輪扇連七輪大皆徑尺相連續一人運之則滿堂寒戰又曰趙飛燕為皇后其弟上遺雲母扇五明扇七華扇翟扇蟬翼扇又曰天子夏則設羽扇冬則設繒扇晉中興徵祥說曰舊為羽扇柄者刻木以象骨翮用十毛取全數也中興初王敦始改用長柄使其下出可捉而減其羽用八識者以為服妖也柄使可執者國柄之象毛減用八是羽翮損少而飛羽不終之應也鄴中記曰石虎作雲母五明金薄莫難扇此一扇之名也薄打純金如蟬翼二面彩漆畫列仙奇鳥異獸其五明方中辟方三寸或五寸隨扇大小雲母帖其中細縷縫為其際唯畫而彩色明徹看之如謂可取故名莫難也虎出時以此扇挾乘輿亦用象牙桃枝扇其上竹或綠沉色或木蘭色或作紫紺色或作鬱金色異物志曰扶南國昔但知作大扇遣人持之不知人各自用也及今熱時各自用也拾遺錄曰周昭王時塗脩國獻青鳳丹鵠各一雌一雄夏至取鵠翅為扇一名施風一名條翮一名反影時有南歐獻二美女更搖此扇侍於王側世說曰王大將軍在西朝時見周侯轉扇鄣面而得住後度江左不能復爾王歎曰不知吾進伯仁退敦性強梁自少而長季倫斬妓曾無異色如斯傲恨憚於周顗斯不然之言又曰溫嶠娶姑女既婚交禮女以手披紗扇撫掌大笑我嫌是老奴果如所疑又曰羊孚作雪讚云資清以化乘氣以霏值象能鮮即潔成暉桓胤遂以書扇語林曰諸葛武侯與宣王在渭濱將戰武侯乘素輿葛巾白羽扇指麾三軍三軍皆隨其進止又曰胡母彥國至湘州坐廳事斷官事爾時三伏中傍搖扇視事其兒子光從容顧謂曰彥國復何為自貽伊戚又曰庾翼為荊州都督以毛扇上城帝疑是故物侍中劉邵曰柏梁雲構匠者先居其下管弦繁奏夔牙先聆其音翼之止扇以好不以新季恭聞之曰此人宜在帝左右俗說曰顧虎頭為人畫扇作嵇阮而都不點眼精主問之顧荅曰那可點精點精便語列仙傳曰介之推隨晉重耳去國後辭祿與母入介山從伯陽遊後世見在東海王治賣扇搜神記曰魯少千山陽人漢文帝微服懷金欲問其道少千執象牙扇出應門續搜神記曰吳猛好道術嘗渡江以白羽扇畫水橫流直過不用舟楫異苑曰高平檀茂宗義熙中喪亡其母劉氏夢見宗云方永違離今以此扇奉別母流涕覺於屏風間得扇上皆如蜘蛛網絡婦人集曰沒太子妻季氏為夫所遣婦與夫書并致安眾扇兩雙古詩曰綾扇如團月出自機中素畫作秦女形乘鸞入煙露班婕妤扇詩曰新裂齊紈素鮮潔如霜雪裁為合歡扇團團似明月出入君懷袖動搖微風發魏陳王曹植九華扇賦曰昔吾先君常侍得幸漢桓帝帝得賜尚方竹扇不方不員其中結成文名曰九華其辭曰形五離而九折篾𣯛解而縷分放虬龍之蜿蟬法雲霓之煙熅因形致好不常厥儀方不應矩圓不中規隨皓腕以徐轉發惠風之微寒時氣清以芳厲紛飃動乎綺紈徐幹團扇賦曰於帷合歡之奇扇肇伊洛之纖素仰明月以取象規圓體之儀度傅咸狗脊扇賦曰蓋卑以自居君子之經孤寡不穀王侯脩名尚不媿狗脊之為號亦焉顧九華之妙形蓋釋名曰蓋在上覆蓋人也通俗文曰張帛避雨謂之繖蓋禮檀弓下曰獘蓋不棄為埋狗也左傳定曰齊侯伐晉夷儀獘無存死於霤下鬥死於門霤下齊侯謂夷儀人曰得獘無存者以五家免給其五家命常不供役事乃得其尸公三襚之襚衣也殯三加遂深禮厚之與之犀軒直蓋犀軒卿車直蓋高蓋家語曰孔子將行命從者持蓋既而果雨聖人無所不通也又曰孔子將行雨無蓋門人曰商也有焉孔子曰商也之為人也甚短於財吾聞與人交者推其長者違其短者故能以久也史記曰五羖大夫相秦也勞不坐乘暑不張蓋漢書曰上官傑少時為羽林郎從武帝上甘泉天大風車不得行解蓋投之傑奉蓋雖風常屬車雨下蓋輒御上奇其材力焉又曰黃霸為楊州剌史三年宣帝詔賜車蓋特高一尺以彰有德又王莽傳曰或言黃帝時建華蓋登仙莽乃造菙蓋高八丈一尺皆全瑵羽蓋載以秘機四輪車駕六馬輓者皆呼登山續漢書曰靈帝時講武平樂觀建十重五彩華蓋高十丈建九重華蓋高九丈又曰祠老子於濯龍中設華蓋八座東觀漢記曰隗囂破上歸過汧幸祭遵勞之時遵有疾詔賜重茵覆以御蓋後漢書曰光武東巡虞延從駕到魯還經封丘城門門小不容羽蓋封丘今東京縣也帝怒使撻御史延救之乃止事具門部吳志曰曹休入睆城陸遜破之權令左右以御蓋覆遜又曰周泰字幼平數戰有功孫權覆以御蓋江表傳曰青兼蓋也又曰劉基孫權愛敬之嘗從御樓舡上時雨甚權以蓋自覆又令覆基餘人不得也又曰賀齊為將綺飾所乘舡青蓋絳幨晉安帝記曰桓玄遊於水南飄風飛其輗蓋後義兵起遂敗宋元嘉十年起居注曰御史中丞荀伯子奏左衛將軍何尚之公事每罩笠有虧體制建野笠於公門棄華繖而不御宋元嘉二十九年起居注曰訶羅單國奉孔雀蓋一具齊書曰始安王遙光傳江祐被誅東昏召遙光入殿告以祐罪遙光懼還省便陽狂號哭自此稱疾不復入臺先是遙光行還入風飄儀繖出城外遙光後敗梁書曰王籍為中散大夫彌日忽忌不樂乃至徒行市道不擇交遊有時途中見相識輒以笠傘覆面南史曰殷孝祖與賊合戰每常以鼓蓋自隨軍中人相謂曰殷統軍可謂死將至矣今與賊交鋒而以羽儀自摽顯若此射者十手攢射欲不斃得乎是日中流矢死又曰扶南其俗罩古具繖文子曰大丈夫恬然無思淡然無慮以天為蓋以地為輿又宋玉大言賦曰圓天為蓋方地為輿淮南子曰蓋非撩不能蔽日輪非輻不能追疾然而撩蓋未足恃也撩蓋骨也孔藂子曰夫子適郯郯子遇子於塗傾蓋而語終日而別命子路將束帛贈焉尉繚子曰吳起與秦人戰僕嗽之蓋足以蔽霜露說苑曰田子方遇翟璜乘軒車戴華蓋疑以為人君也崔豹古今注曰華蓋黃帝所作也與蚩尤戰于𣵠鹿之野常有五色雲氣金枝玉葉於帝上有花蘤之象故因而作華蓋蘤韋委切又曰曲蓋太公所作武王伐紂大風折蓋太公因折蓋之形而制曲盖焉戰國常以賜將軍自漢朝乘輿用之因謂睥睨蓋有軍號者賜其一焉睥疋詣切睨五計切搜神記曰湖陂吏丁初忽見少婦人姿容可愛青衣戴傘呼初初疑而待顧視婦自投波中是大蒼獺衣傘皆是蓮荷異苑曰義熙中烏陽小吏見女子戴青繖姿容甚麗遂要之女至多雷光乃是大狸抽刀研殺其繖乃枯荷葉事具獸部真人周君傳曰紫陽真人周義山子通合會仙人在金屋銅門之內以紫雲為蓋真人王君傳曰太上大道君授務成君繡羽蓋雙明珠俗說曰徐于木年少時嘗夜夢見烏從天上飛銜繖樹其廷中如此凡三過銜來作惡聲而去徐後果得繖遂以惡終青烏子葬書曰作墓發土夕夢見罩繖入市者富貴楚辭曰孔蓋兮翠旍言以孔雀翅為車蓋翠羽為旍旗也登九天兮撫彗星又曰乘水車兮荷蓋駕雨龍兮驂螭宋玉高唐賦曰晲為旍翠為蓋風起雨霽千里而逝司馬相如大人賦曰屯余車其萬乘兮綷雲而樹華旗綷子對切阮籍清思賦曰折丹木以蔽陽竦芝蓋之三重劉植魯都賦曰蓋如飛鵠馬如游魚宋玉大言賦曰圓天為蓋方地為輿
