body:
  text: 逸民部五逸民五蕭子顯齊書曰褚伯玉字元璩吳都錢塘人也年十八父為婚婦入前門伯玉從後門出遂往剡居瀑布山時人比之王仲都在山三十餘年隔絕人物王僧達為吳郡苦禮致之伯玉不得已停郡信宿才交數言而退寧朔將軍丘彌孫與僧達書曰聞褚先生出居貴館此子滅影雲棲不事王侯抗高木食有年載矣自非折節好士何以致之望其還策之日蹔紆清塵亦願助為譬說荅曰褚先生從白雲遊舊矣此子索然唯朋松石介於孤峰絕嶺者積數十載近故要其來此冀慰日夜比談討芝桂借訪荔蘿若已窺煙波臨滄洲矣知君欲見之當為申譬太祖即位手詔吳會二郡以禮迎遣又辭疾上不欲違其志勑於剡白石山立太平館居之又曰明僧紹字承烈平原聶人也隱長廣郡嶗山詔徵為正員郎稱疾不就其後上與崔思祖書曰不食周粟而食周薇古猶發議在今寧得息談耶僧紹弟慶符為青州刺史罷任僧紹隨歸住江乘攝山太祖謂慶符曰卿兄高尚其事亦堯之外臣與朕雖不相接有時通夢乃贈紹竹根如意南史曰郭希林武昌人也曾祖翻晉世高尚不仕希林少守家業徵召一無所就卒子蒙亦隱居不仕又曰辛普明字文達少就關康之受業至性過人居貧與兄共處一帳兄亡仍帳施靈蚊甚多通夕不得寢而終不道侵螫僑居會稽會稽士子高其行當葬兄皆送金為贈後至者不復肯受人問其故荅曰本以兄墓不周故不逆親友之意今實已足豈可利亡者餘贈耶又曰杜京產字景齊吳郡錢塘人也父道鞠州從事善彈棊京產少恬靜閑意榮官頗涉文義專修黃老會稽孔覬清剛有峻節一見而為交郡命主簿州辟從事皆稱疾去與同郡顧懽同契始寧東山開舍受學齊建元中武陵王曄為會稽齊高帝遣儒士劉瓛入東為曄講瓛故往與之遊曰杜生當今之臺尚也永明十年孔珪陸澄沈約表薦京產徵為奉朝請不至於會稽藂徒教授建武初徵員外散騎常侍郎京產曰莊生持釣豈為白璧所廻辭疾不就又曰孔道徽會稽山陰人守志業不仕與杜京產友善道徽父祐至行通神隱於四明山谷中有數百斛錢視之如瓦石太守王僧虔與張緒書曰孔祐敬康曾孫也行動幽祗德標松桂引為主簿遂不可屈此古之遺德也道徽少厲高行能世其家風隱居南山終身不窺都邑豫章王嶷為楊州辟西曹書佐不至鄉宗慕之又曰臧榮緒東莞莒人也少孤躬自灌園以供祭祀母喪洒掃堂宇置筵席朔望輒拜薦焉甘珍未常先食純好學括東西晉為一紀錄志傳一百一十卷隱居京口教授齊高帝為楊州刺史徵榮緒為主簿不到建元中司徒褚彥回啟高帝稱述其美以祕閣榮緒謂人曰昔宮尚奉丹書武王致齋降位李釋教誡並有禮敬之儀因甄明至道乃著拜五經序論常以宣尼庚子日生其日陳五經拜之自號披褐先生又以飲酒亂德言常為誡永明六年卒初榮緒與關康之俱隱在京口時號為二隱又曰吳苞字天蓋濮陽鄄城人也儒學善三禮及老莊宋泰始中過江藂徒教學冠黃葛巾蔬食二十餘年與劉瓛俱於褚彥回宅講授齊隆昌元年徵為太學博士不就始安王遙光及江祐徐孝嗣共為立館於鐘山下教授朝士多到門焉當時稱儒者自劉瓛已後藂徒講授唯苞一人而已以壽終又曰樓惠明字智遠立性貞固有道術居金華山舊多毒害自惠明居之無復辛螫之苦藏名匿跡人莫之知宋明帝召不至齊高帝徵又不至文惠太子在宮苦延方至仍又辭歸俄自金華輕棹西下及就路廻之豐安旬日聞俄賊起唯豐安獨全時人以為有先覺齊武帝勑為立館又曰漁父者不知姓名亦不知何許人也太康孫緬為尋陽太守落日逍遙渚際見一輕舟凌波隱顯俄而漁父至神韻蕭灑垂綸長嘯緬甚異之乃閑問有魚賣乎漁父笑而荅曰其釣非釣寧賣魚者耶緬益怪焉遂褰裳涉水謂曰竊觀先生有道者也終朝鼓枻良足勞止吾聞黃金白壁重利也駟馬高蓋榮勞也方今王道文明守在海外隱鱗之士靡然向風子胡不贊緝熙之美何晦其用若是也漁父曰僕山海狂人不達世務未辨貴賤無論榮貴乃歌曰竹竿籊籊河水悠悠相忘為樂貪餌吞釣非夷非惠聊以忘憂於是悠然鼓棹而去又曰顧歡字景怡吳興鹽官人也家世寒賤父祖並為農歡獨好學年六七歲知推六甲家貧父使田中驅雀歡作黃雀賦而歸雀食稻過半父怒欲撻之見賦乃止鄉中有學舍歡貧無以受業於舍壁後倚聽無遺忘者夕則燃松節讀書或燃糠自照及長篤志不倦聞吳興東遷邵玄之傳五經文旬假為書師從之受業同郡顧凱之臨縣見而異之遣諸子與遊從豫章雷次宗諮玄儒諸義母亡水漿不入口廬于墓側遂隱不仕於剡天台山開館藂徒受業諸生常近百人歡早孤讀詩至哀哀父母生我劬勞輒執書慟哭由是受學者廢蓼莪篇不復講焉又曰蔡會字休明陳留人清玩不與俗人交李撝謂江斅曰古人稱安貧清白曰夷涅而不緇曰白至如蔡休明者可不謂之夷白乎又曰徐伯珍字文楚東陽太末人也少孤貧無紙常以竹葉箭若甘蔗及地上學書山水暴出漂溺宅舍村鄰皆奔走伯珍累床而坐講書不輟叔父璠之與顏延之友善還袪蒙山立精舍講授伯珍往從學積十年究尋經史遊學者多依之太守琅邪王曇生吳郡張淹並加禮辟伯珍應召便退如此者凡十二焉如釋氏老莊兼明道術歲常旱伯珍筮之如期而雨舉動有禮過曲水之下趍而避早喪妻晚不復重娶自此曾參宅南九里有山伯珍移居之階戶之間木生皆連理門前梓樹一年便合抱白雀一雙栖其戶牖論者以為隱德之感也又曰沈麟士字雲禎吳興武康人也父虔之為樂安令麟士幼而俊敏年七歲聽叔父岳言玄賓散言無所遣失岳撫其肩曰若斯文不絕其爾乎及長博通經史有高尚之志親亡居喪盡禮服闋忌日輒涕泣彌旬居貧織簾誦書口手不息鄉里號為織簾先生常行路鄰人認其所著屐麟士曰是鄉屐耶即跣而返鄰人得屐送前者還之麟士笑而受之宋文帝令何尚之抄撰五經訪舉學士縣以麟士應選不得已至都尚之深相接及去尚之謂子偃曰山藪固多奇士沈麟士黃叔度之流也汝師之麟士常苦無書因遊都下歷觀四部畢乃歎曰古人亦何人哉少時稱疾歸鄉不與人物通或勸之仕荅曰魚懸獸檻天下一契聖人玄悟所以每履吉先吾誠未能景行坐忘何能不希企日損乃作玄散賦以絕世隱居吳差山講經從學之士數百人各管屋宇依止其側時為之語曰吳差山中有賢士開門教授居成市又曰諸葛璩字幼玟琅邪人也世居京口璩幼事徵士關康之博涉經史復師徵士臧榮緒榮緒著晉書稱璩有發擿之功方之靈壺齊建武初江祀薦璩於明帝言璩安貧守道閱禮敦詩如其簡退可揚清激濁辟為議曹從事帝許之璩辭不赴陳郡謝眺為東海太守下教揚其風慨餉穀百斛梁天監中舉秀才不就璩性勤於誨誘後出就學者日至居宅狹陋無以容之太守張庂為起講舍璩處身清正妻子不見喜慍之色旦夕孜孜講誦不輟時人益以此宗之又曰劉慧斐字宣文彭城人也少博學能屬文起家梁安成王法曹行參軍常還都途經尋陽遊於匡山遇處士張秀相得甚歎遂有終焉之志因不仕居東林寺又於山北構園一所號曰離垢園時人因謂離垢先生遠近欽慕之簡文遺以机杖論者云自遠法師歿後將二百年始有張劉之盛矣又曰范元琰字伯珪居父憂時童孺哀慕盡禮親黨異之及長好學博通經史兼精佛義祖母患癱常自含吮與人言常恐傷物居家不出城市雖獨居如對賓客見者莫不改容憚之家貧唯以園蔬為業常出行見人盜其菘元琰遽退走母問其故具以實荅問盜者為誰荅曰向所退畏其愧恥今啟其名願不泄也於是母子祕之或有涉溝盜其筍者元琰因伐木為橋以度之自是盜大慚一鄉無復草竊齊建武初為曹武平西參軍不至於時始安王遙光為楊州謂徐孝嗣曰曹武參軍豈是禮賢之職欲以西曹書佐聘之會遙光敗不果時人以為恨梁書曰阮孝緒字士宗尉氏人父彥之誡曰宜思自勗以庶爾躬荅曰願追赤松子於滄海逐許由於穹谷耳自是屏居一室非晨昏定省未常出戶外兄王晏貴顯緒度必顛覆聞笳聲至門孝緒乃穿籬逃迸及晏誅竟獲免時中丞任昉欲往見之不肯乃歎曰其室雖邇其人何遠自是飲風者莫不歛衽望塵而息也又曰陶弘景字通明丹陽人生十歲讀葛洪神仙傳曰仰青雲睹白日不覺為遠齊高祖作相引為侍讀永明初脫朝服掛神武門上表辭祿詔乃許之居勾容曲山自號華陽隱居武帝即位有吉凶征討大事皆使咨問時人號為山中宰相預知梁祚覆沒乃製詩曰夷甫任散誕平叔坐論空豈悟昭陽殿遂作單于宮及侯景傾陷篡位果在昭陽殿皆如其言大同初卒年八十五顏色不變屋中有異香氣累日𣱦氳謚貞白先生有肘後方枕中術及本草又曰沈顗吳興人也性有至介常慕黃叔度徐孺子之為人每獨處一室罕見其面從叔勃貴顯當朝每還吳賓客迎送填咽顗送迎不出域勃乃歎曰吾乃今知貴不如賤也又曰何點字士哲廬江人也點雖不出入城府而遨遊于外不簪不帶駕柴車躡草履恣心所適致醉而歸士大夫多慕從之時人謂之通隱後周書曰韋敻字敬遠孝寬之兄也志尚夷簡淡於榮利太祖經略王業仄席求賢備禮辭之終不能起彌加敬重世宗即位禮遇逾厚勑有司日給河東酒一斗號曰逍遙公年七十而卒陳書曰馬樞字要理扶風人初為梁邵陵王綸學士綸舉兵援臺城留書二萬卷寄樞肆意尋覽將遍乃喟然歎曰吾常聞貴爵位者以巢由為桎梏愛山林者以伊呂為管庫今乃稽諸史典篤論其義亦各從其所好乃隱於茆山曰精洞
