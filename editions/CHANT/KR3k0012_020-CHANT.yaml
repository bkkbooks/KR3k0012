seq: 20
body:
  text: 時序部四春中史記曰孝惠帝曾春出遊離宮叔孫生曰古者有春嘗果今方櫻桃熟願陛下因取櫻桃獻宗廟上乃許之諸果獻由此興也又曰正月為端月端首也春秋左傳曰履端於始又天官書曰明庶風居東方明庶明眾物盡出也二月律中夾鍾者言萬物陰陽相夾廁也其於十二子為卯卯之為言萬物茂也其於十母為甲乙甲者萬物割符甲而出也乙者言萬物生軋軋也南至於氐言萬物皆至也又曰漢世帝以正月土辛祠太一甘泉以昏祠到明而終常有流星經於祠壇上使童子童女七十人俱歌春歌青陽夏歌朱明秋歌西皓西方少吴冬歌玄冥漢書曰孟春之月群居者將散行人振木鐸徇于路以采詩獻之太師比其音聲以聞于天子又曰王溫舒事張湯為酷吏及為河內太守及春溫舒頓足曰嗟呼令冬益展一月足了吾事矣其不愛人如此也又曰宣帝時魏相奏請明經通知陰陽者四人各主一時時至明言所職以和陰陽如高祖時令謁者趙堯舉春李辭舉夏倪陽舉秋貢禹舉冬之類宣帝從之東觀漢記曰章帝行幸勑御史司空道橋所過歷樹木方春月無得有所伐輅車可引避也後漢書曰張奐為武威太守其俗多妖忌凡二月五日產子及與父母同月者悉殺之奐示以義方嚴加賞罰風俗遂改百姓為立祠又曰章帝建初三年正月祀五帝於明堂遂登靈臺望雲物赦天下又曰元和二年春正月詔曰令人有產子者後無筭三歲諸懷妊者賜月養穀復其夫勿筭一歲著以為令又詔三公曰方春生養萬物莩甲宜助萌牙以育時物其令有司罪非殊死且勿案驗又丙午詔曰畿內七十已上暮春赴京師將行養老之禮又曰王莽下書曰夫三皇象春五帝象夏三王象秋五伯象冬皇王德運也伯者繼空續乏以成曆數故其道駮謝承後漢書曰鄭弘為臨淮太守春行有兩白鹿隨車夾轂而行弘後為太尉續漢書曰太守常以春行縣所至縣勸人農桑振救乏絕第五倫為太守因春行見鄭弘奇之署督郵鄭弘時為鄒嗇夫又律曆志曰日行東陸謂之春魏略曰孟康為弘農守清平領群吏二百餘人涉春遣休常四分遣一分無宿諾晉書曰郭黁奴郎反西平人也少明於易仕郡主簿張天錫末年苻氏每有西伐之問太守趙凝使黁筮之黁曰若郡內二月十五日失囚者東軍當至涼祚必終凝乃申條屬縣至十五日鮮卑折握送馬於凝凝怒其非駿幽之廄內鮮卑懼而夜遁凝以告黁黁曰是也國家將亡弗可復振春秋繁露曰春喜氣故生又曰春之猶言偆偆者音蠢又癡准反喜樂之貌也春秋元命包曰春者神明推移精華結紐神明猶陰陽也相推使物精華結成紐結要也又曰春含名出位東方動春明達春之言蠢東之言動合此名以自明自達也六合俱生萬物應節雖於時為春以其蠢動無節應此時節也五行並起各以名利自六合俱生以通五行各有陰陽交合故能然也其精青龍龍之言萌也獸之妙莫若龍故就青萌以名之陰中之陽也老子曰眾人熙熙若享太牢如登春臺莊子曰夫春氣發而百草生正得秋而萬寶成夫春與秋豈無得而然哉天道已行矣春秋主生成皆得自然之道故不為又曰春夏先秋冬後四時之序也萬物化則萌區有壯盛衰之殺變化之流也又曰舜以天下讓善卷善卷曰子立於宇宙之中冬日衣皮毛夏日衣葛絺春耕夏種形足以勞動秋收冬歛身足以休食日出而作日入而息逍遙於天地之間而心意自得吾何以天下為哉文子曰政失於春歲星盈縮不居其常春政不失禾黍滋又曰因春而生因秋而殺所生不德所殺不怨則幾於道矣尸子曰翔風瑞風也一名景風一名惠風春為發生夏為長蠃秋為收成冬為安寧爾雅以為四時之別名也又曰春為忠也東方為春春動也是故鳥獸孕榮華生萬物遂忠之志也鶡冠子曰斗柄指東天下皆春列子曰荊之南有冥靈者五百歲為春五百歲為秋上古有大椿者以八千歲為春八千歲為秋管子曰孟春之朝君自聽朝論爵賞管子曰鄰人謂展禽曰魯聘夫子夫子三黜無憂色何展禽曰春風鼓百草敷蔚吾不知其茂秋霜降百草零落吾不知其枯茂非四時之悲欣榮辱非吾心之憂喜淮南子曰何謂五星東方木也其帝太昊太昊庖犧氏天下號也死託於東方帝也其佐勾芒執規而治春漢書魏相上書太昊乘震執規治春又曰日陽之主也是故春則群獸除除冬毛微墮也又曰太陰治春則欲行柔惠溫涼木德人也故柔涼也又曰春為規規之為度也轉而不復圓而不規復遏也垸轉也復而不縱廣大以寬感動有理發通有紀優優簡簡百怨不起優優簡簡寬舒之貌也規度不失生氣乃理氣類理達又曰六合孟春與孟秋合孟春始盈孟秋始縮盈長也縮短也故正月失政七月涼風不至又曰仲春始出仲秋始內出二月播種內八月始收歛又曰春肅秋榮冬雷夏霜皆賊氣之所生又曰四時者春生夏長秋收冬藏取與有節出入有時開闔張歙不失其序歙讀曰翕又曰春女悲秋士哀知物化矣周禮仲春之月令媒氏會男女女當外成於夫家骨肉相離故女悲秋金氣用事戰士執兵勝敗若化故士哀也又曰孟春之月東宮御女青色衣青采鼓琴瑟春王東方故處東宮也琴瑟木也春木生故鼓其兵矛有鋒銳以萬物鉆地如生也其畜羊羊木土之母故畜之也二月官倉其樹杏二月播種故官倉也杏有核在中象陰在內陽在外也故其樹杏也三月官鄉其樹李三月折民戶口故言鄉也李亦有核說與杏同又曰季春三月豐隆乃出將其雨也豐隆雷也至秋三月地氣不藏乃收其殺百蟲蟄伏靜居閉戶殺氣安靜青女乃出以降霜雪青女天神青天王女主霜雪也十二時之氣以至于仲春二月之夕乃布收其藏而閉其寒收歛其所藏而出布之閉其陰塞全不得發泄也女夷鼓歌以司天和以長百穀禽獸草木女夷主春夏養長之中也蔡邕月令章句曰季春戴鵀降於桑又曰仲春之月天子獻羔開冰又曰仲春玄鳥至玄鳥鷰也崔寔四人月令曰二月祠太社之日薦韭卯于祖禰五行志曰於易震在東方為春為木者也兌在西方為秋為金離在南方為夏為火坎在北方為冬為水春與秋日夜分寒暑平是以金木之氣易以相變故貌傷則致秋陰常雨言傷則致春陽常旱也至於冬夏日夜相反謂夏日長夜短冬日短夜長寒暑殊絕水火之氣不得相併故視傷常燠聽傷常寒者其氣然也又曰夾鍾言陰夾助太蔟宣四方之氣而出鍾物也位於卯在二月東陽記曰山南有春草巖出龍鬚多藥物西京雜記曰賈佩蘭云在宮時正月上辰出池邊盥濯食蓬餌以去祅邪荊州記曰陸凱與路曄為友在江南寄梅花一枝詣長安與曄并贈詩云折花奉秦使寄與隴頭人江南無所有聊寄一枝春荊楚歲時記曰正月夜多鬼鳥度家家槌床打戶捩狗耳滅燈燭以禳之玄中記云此鳥名姑獲一名天帝女一名隱飛鳥一名夜行游女好取人女子養之有小兒之家即以血點其衣以為誌故世人名為鬼鳥荊州彌多斯言信矣又曰正月未日夜蘆苣火照井廁中百鬼走愽物志曰宋國有田夫常衣黂分袞反縕僅以過冬暨春東作自曝於日不知天下之有廣夏奧室綿纊狐貉顧謂其妻曰背日之暄人莫知者以獻吾君將有賞臨海異物志曰鵙鴂一名田鵑春三月鳴晝夜不止音聲自呼止俗言取母子塗其口兩邊皆赤上天自言乞恩至當陸子熟鳴乃得止耳又曰春風甘露生育萬物呂氏春秋曰天行不信不能成歲地安不信草木不茂春風不信其華不盛則果實不生又曰仲春之月玄鳥至之日以太牢祠于高禖蔡邕曰高禖神名也又曰仲春之月先雷三日奮鐸以令于兆民曰雷且發聲有不戒其容止者生子不備必有凶災不戒容止謂以雷霆合房室之者生子必有瘖躄癡狂之疾矣耕者少舍皆耕在野少有舍於都邑者也晏子春秋曰齊景公夏遊獵又起大臺之役晏子諫曰春夏起役游獵奪民農時國家空虛不可景公曰吾聞相賢者國治臣忠者主逸吾年無幾矣言將老欲遂吾所樂卒即律反吾所好子其息矣晏子曰文王不敢盤于游田故國昌而民安楚靈不廢乾谿之役起章華之臺而民叛之今君不思將危社稷而為諸侯笑臣聞忠不避死諫不違罪君不聽臣臣將逝矣景公曰唯唯唯唯從其諫也楊子法言曰或曰為政先殺后教歟曰於乎天先秋而後春乎將先春而後秋乎梁元帝纂要曰春亦曰發生芳春青春陽春三春九春風曰陽風暄風柔風惠風景曰媚景和景韶景時曰良時嘉時辰曰良辰嘉辰芳辰節曰芳節嘉節韶節淑節草曰弱草芳卉木曰華木華樹芳林芳樹林曰茂林鳥曰陽鳥時鳥陽禽候鳥時禽好禽夏書曰龜人之職凡攻龜用春時各以其物入于龜室六龜各異室也秋取龜及萬物成也攻治也治龜骨以春是時乾解不發傷也上春釁龜祭祀先卜釁者殺性以血塗之也鄭司農云祭祀先卜者卜其日與其牲玄謂先始用卜筮者言祭祀尊天地也世本作日巠咸作筮卜未聞其人也是上春者夏正建寅之月月令孟冬云釁祀龜策相互矣秦以十月建亥為歲首則月令秦世之書亦或欲以歲首釁龜耳筮人上春相筮相謂更選擇其蓍龜歲易者歟周書時訓曰驚蟄二月節桃始花時訓云桃若不花是謂否塞又云倉庫災鶬鶊鳴時訓云若不鳴即下不從上鷹化為鳩時訓云若不化即寇賊數起春分二月中玄鳥至時訓云玄鳥不至即婦人不振雷乃發聲時訓云雷不發聲即諸侯失民又云遠人不服始電時訓云電若不見即人無威振
