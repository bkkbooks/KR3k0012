body:
  text: 皇親部九齊蕭道成母陳后蕭子顯齊書曰宣孝陳皇后諱道正臨淮東陽人后生太祖太祖年二歲乳人乏乳后夢人以兩甌麻粥與之覺而乳大出異而說之宣帝從任在外后常留家治事教子孫有相者謂后曰夫人有貴子而不見之后歎曰我三兒誰當應之呼太祖小字曰正應是汝太祖雖從官而家業本貧為建康令時高宗等冬月猶無縑纊而奉膳甚厚后每撤去兼肉曰我於此過足矣殂于縣舍年七十三建元元年重追尊孝皇后蕭道成劉后蕭子顯齊書曰高昭劉皇后諱智容廣陵人也父壽之員外郎后母桓氏夢吞玉勝生后時有紫光滿室后寢臥家人常見上如有雲氣焉年十餘適太祖嚴整有禮法家庭肅然宋泰豫元年殂葬宣帝墓側今泰安陵也門生王清與墓工始下鍤有白兔跳起尋之不得及墳成兔還棲其上建元元年尊謚昭皇后蕭昭業母王后蕭子顯齊書曰文安王皇后諱寶明琅耶臨沂人建元元年為南陽王妃四年為皇子妃無寵太子為宮人製新麗衣服及首飾而后床帷陳故古舊鑆鑷十餘枚永明十一年為皇太孫太妃鬱林王即位尊為皇太后稱宣德宮蕭昭業何妃蕭子顯齊書曰鬱林王何妃名婧英廬江灊人撫軍將軍戢之女后將拜鏡在床無因墮地其冬與太后同日謁太廟后稟性媱亂為妃時與外姦通左右柳珉之與同寢處如伉儷又與帝相愛褻故帝恣之迎后親戚入宮賞賜人數十萬以世祖耀靈殿處后家屬帝被廢后貶為王妃梁蕭衍母張后梁書曰太祖獻皇后張氏諱尚柔范陽方城人也祖次惠宋濮陽太守后母蕭氏即文帝從姑宋元嘉中嬪於太祖生長沙宣武王懿永陽昭王敷次生高祖初后嘗於室內忽見庭前菖蒲生花光彩照灼非世中所有后驚視謂侍者曰汝見不對曰不見后曰常聞見者當富貴因遽取吞之是月產高祖將產之夜后見庭內若有衣冠陪列焉次生衛陽宣王暢義興昭長公主令嫕宋泰始七年殂於秣陵縣同夏里舍葬武進縣東城里山天監元年五月甲辰追上尊號為皇后謚曰獻蕭衍郗后高祖德皇后郗氏諱徽高平金鄉人也祖紹宋國子祭酒領東海王帥父燁太子舍人早卒初后母尋陽公主方娠夢人云當生貴子及生后有赤光照于室內器物盡明家人皆怪之巫言此女光適有所妨乃於水濱祓除之后幼而明慧善隸書讀史傳女工之事無不閑習宋後廢帝將納為后齊初安陸王緬又欲結婚郗氏並辭以女疾乃止建元末高祖始娉焉生永興公主玉姚永世公主玉婉永康公主玉嬛建武五年高祖為雍州刺史先之鎮後乃迎后至州未幾殂於襄陽官舍時年三十二明年歸葬南徐州武進縣二年齊朝進高祖位相國封梁公詔贈后為梁公妃高祖踐祚追崇為皇后丁貴嬪梁書曰高祖丁貴嬪諱令光譙國人也世居襄陽貴嬪生于樊城初產有神光之異紫煙滿室故以為名相者云此女當大貴高祖臨州丁氏因人以聞嬪時年十四高祖納焉初貴嬪生而有赤誌在左臂治之不滅至是無何忽失所在事德皇后小心祗敬嘗於供養經案之側髣髴若見神人心獨異之高祖義師起昭明太子始誕育貴嬪與太子留在州城京邑平乃還京都天監元年五月有司奏為貴人未拜其年八月又為貴嬪位在三夫人上居于顯陽殿阮脩容高祖阮脩容諱令嬴本姓石會稽餘姚人也齊始安王遙光納焉遙光敗後入東昏宮建康城平高祖納為綵女天監六年八月生世祖尋拜為脩容常隨世祖出蕃大同六年六月薨于江州內寢時年六十七歸葬江寧縣通望山謚曰宣世祖即位追崇為文宣太后蕭綱王后梁書曰太宗簡皇后王氏諱靈賓瑯琊臨沂人也祖儉太尉南昌文憲公后幼而柔明淑德叔父暕見之曰吾家女師也天監十一年拜晉安王妃生哀太子大器南郡王大連長山公主䂮妙大通三年十月拜皇太子妃太清三年三月薨于永福省時年四十五其年太宗即位追崇為皇后謚曰簡大寶元年九月葬莊陵蕭繹徐妃梁書曰元帝徐妃諱昭佩東海郯人也祖孝嗣齊太尉枝江文忠公父緄侍中信武將軍妃以天監十六年十二月拜湘東王妃生世子方等益昌公主含貞妃無容質不見禮帝三二年一人房妃以帝眇一目每知帝將至必為半面裝以俟帝見則大怒而出妃性嗜酒多洪醉帝還房必吐衣中既而貞惠世子方諸母王氏寵愛未幾而終元帝歸咎於妃及方等死愈見疾太清三年遂逼令自殺妃知不免乃投井死帝以屍還徐氏謂之出妻葬江陵瓦官寺陳陳霸先章后陳書曰高祖宣皇后章氏諱要兒吳興烏程人也本姓劍父景明為章氏所養因改姓焉景明梁代官至散騎侍郎后母蘇氏嘗遇道士以小龜遺己光彩五色曰三年有徵及期后生而紫光照室因失龜所在后少而聰慧美容儀手爪長五寸色紅白每有朞功之服則一爪先折后善書計能誦詩及楚詞高祖自廣州南征交阯命后與衡陽王昌隨世祖由海道歸于長城侯景之亂高祖下至豫章后為侯景所囚景平高祖為長城縣公后拜夫人及高祖踐祚永定元年立為皇后高祖崩后與中書舍人蔡景歷定計秘不發哀召世祖入纂世祖即位尊后為皇太后下令黜廢帝為臨海王命高宗嗣位太建元年冊尊后為皇太后二年三月景申崩于紫極殿時年六十陳蒨沈后陳書曰世祖沈皇后諱妙容吳興武康人也父法深梁安州事參軍后年十餘歲以梁大同中歸于世祖高祖之討侯景世祖時在吳興景遣使收世祖及后景平乃獲免高祖踐祚永定元年后為臨川王妃世祖即位立為皇后陳頊柳后陳書曰高宗柳皇后諱敬言河東解縣人也曾祖世隆侯景之亂與弟盼往江陵依梁元帝以長城公主之故待遇甚原及高宗赴江陵元帝以后配焉承聖二年后生後主於江陵明年江陵陷高宗遷于關右后與後主留穰城天嘉二年與後主還朝后為安城王妃高宗即位立為皇后后美姿容身長七尺二寸手垂過膝初高宗居鄉里先娶吳興錢氏女及即位拜為貴妃甚有寵幸后傾心下之每尚方供奉之物其上者皆推於貴妃而已御其次焉高宗崩始興王叔陵為亂後主賴后與吳媼救而獲免後主即位尊后為皇太后宮曰弘範當此之時新失淮南之地隋師臨江又國遭大喪後主病瘡不能聽政其誅叔陵供大行喪事邊境防守及百司眾務雖假以後主之命實皆決之於后後主瘡愈乃歸政焉陳亡入長安隋大業十一年薨于東都時年八十三葬洛陽之芒山陳叔寶沈后陳書曰後主沈皇后諱婺華儀同三司憲侯君之女也母高祖女會稽穆公主主早亡時后尚幼而毀瘠過甚服畢每至歲時朔望恒獨坐泣涕哀慟左右內外咸敬異焉太建三年納為皇太子妃後主即位立為皇后后性端靜寡嗜慾聰敏強記涉獵經史工書翰初後主在東宮而后父君理卒后居憂處別殿哀毀逾禮後主遇后既薄而張貴妃寵傾後宮後宮之政並歸之后澹然未嘗有所忌怨而居處儉約衣服無錦繡之飾左右近侍繞百許人唯尋閱圖史佛經為事陳亡與后主俱入長安及後主薨后自為哀詞文甚酸切隋煬帝每所巡幸恒令從駕及煬帝為宇文化及所害后自廣陵過江還鄉里不知所終張貴妃陳書曰後主張貴妃名麗華兵家女也家貧父兄以織席為業後主為太子選入宮是時龔貴嬪為良娣貴妃年十歲後主見而悅焉因得幸遂有娠生太子深後主即位拜為貴妃妃性聰惠甚被寵遇後主每引見貴妃與賓客遊宴貴妃薦諸宮女預焉後宮等咸德之競言貴妃之善由是愛傾後宮又好厭魅之術假鬼道以惑後主置淫祀於宮中聚諸妖巫使之鼓舞因參訪外事人間有一言一事妃必知之以白後主由此益重妃內外宗族多被引用及隋軍陷臺城妃與後主俱入井隋軍出之晉王廣命斬妃於青溪中橋北齊高歡婁后北齊書武明皇后婁氏諱昭君贈司徒內于之女也少明悟強族多娉之並不肯行及見神武於城上執役驚曰此真吾夫也乃使婢通意又數致私財使以娉己父母不得已而許焉神武既有澄清之志傾產以結英豪密謀秘策后恒參預及拜渤海王妃閫闈之事悉決焉后高明嚴斷雅遵儉約往來外舍侍從不過十人性寬厚不妬忌神武姬侍咸以恩待神武嘗將西討出師后夜生一男一女左右以危急請追告神武后弗聽曰王出統大兵何得以我故輕離軍幕死生命也來復何為神武聞之嗟嘆良久沙苑敗後侯景言請精騎二萬必能取之神武悅以告于后后曰若如其言豈有還理得獺失景亦有何利乃止文襄嗣位進為太妃文宣將受魏禪后固執不許帝所以中止天保初尊為皇太后宮曰宣訓濟南即位尊為太皇太后尚書令楊愔等受遺詔輔政踈忌諸王太后密與李昭及諸大將定策誅之令廢立孝昭即位復為皇太后孝昭帝崩太后又下詔立武成帝大寧二年春太后寢疾衣忽自舉用巫媼言改姓氏四月辛丑崩於北宮年六十二合葬義平陵爾朱太妃北齊書彭城太妃爾朱榮之女魏孝莊后也神武納為別室敬重踰於婁妃見必束帶自稱下官神武迎蠕蠕公主還爾朱迎於木井北與蠕蠕公主前後別行不相見公主引角弓仰射翔鴟應弦而落妃引長弓邪射飛烏亦一發而中神武喜曰我此二婦並堪擊賊後為尼神武為起佛寺天保初為太妃及文宣狂酒將無禮於太妃太妃不從遂遇禍高澄元后北齊書文襄敬皇后元氏魏孝靜帝之姊也孝武帝時封馮翊公主而歸於文襄容德兼美曲盡和敬初生河間王孝琬時文襄為世子三日而孝靜幸世子第贈錦綵及布帛萬疋世子辭求通受諸貴禮遺於是十屋皆滿次生兩公主文宣受禪尊為文襄皇后高洋李后北齊書曰文宣皇后李氏諱祖娥趙郡李希宗女也容德甚美初為太原公夫人及帝將建中宮高隆之高德正言漢婦人不可為天下母宜更擇美配楊愔固請依漢魏故事不改元妃而德正猶固請廢后而立叚昭儀欲以結勳貴之援帝竟不從而立后焉帝好捶撻嬪御乃至有殺戮者唯后獨蒙禮敬天保十年改為可賀敦皇后孝昭即位降居昭信宮號昭信皇后高演元后北齊書曰孝昭皇后元氏開府元蠻女也初為常山王妃天保末賜姓步六孤孝昭即位立為皇后帝崩梓宮之鄴始渡汾橋武成聞后有奇藥追索之不得使閹人就車頓辱降居順成宮武成既殺樂陵王元被閟隔不得與家相知宮闈內忽有飛語帝令檢推得后父兄書信元蠻由是坐免官后以齊亡人入周氏宮中隨文帝作相放還山東高湛胡后北齊書曰武成皇后胡氏安定胡延之女其母范陽盧道約女初懷孕有胡僧詣門曰此宅瓠蘆中有月既而生后天保初選為長廣王妃產後主日鴞鳴於產帳上武成崩尊為皇太后高緯斛律后北齊書曰後主皇后斛律氏左丞相光之女也初為皇太子妃後主受禪立為皇后武平三年正月生女帝欲悅光詐稱生男為之大赦光誅后廢在別宮後令為尼
