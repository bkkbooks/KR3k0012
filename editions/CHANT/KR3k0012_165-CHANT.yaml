body:
  text: 關西道雍州尚書禹貢曰黑水西河惟雍州厥土惟黃壤厥田惟上上厥賦中下田第一賦第六人功少厥貢惟球琳瑯玕球琳皆王名琅玕石而似珠文耀鉤曰歧華已北龍門積石南至三危雍州也春秋說題辭曰秦金精堅故秦俗亦堅春秋元命苞曰雍壅也東距坂西有漢中南含高山阻居庸是釋名曰雍州在西山之內壅翳也應劭注漢書曰四面積高曰壅李巡注爾雅曰河西其氣蔽壅也晉太康地志曰雍州西北之地陽所不及陰氣壅遏故以為名呂氏春秋曰西方為壅州三輔黃圖曰始皇表河以為秦東門表汧以為秦西門地理通說曰東自同華略河西北西自歧隴會原極于此盡其地挾灃灞據函崤方千里得百二之固史記蘇秦說蘇孝公曰秦四塞之國被山帶河外有洪河之險西有漢中巴蜀北有代馬之利此天府也又曰獻公徒居櫟陽孝公用商鞅作咸陽築冀闕徙都之貨殖傳曰關中由汧雍以東至河華膏壤沃野千里自虞夏之貢以為上田漢書曰秦形勝之國也帶河阻山懸隔千里持戟百万秦得百二焉言秦地險固二万人足敵諸侯百万人也地勢便利以其下兵於諸侯譬猶居高屋之上建瓴水也瓴盛水瓶也居高屋之上而播瓴水言其向下之勢易也又婁敬說高祖曰陛下都洛陽豈欲與周室比隆哉周之都洛以為天下之中四方納貢道里均有德則易以王無德則易以亡今陛下欲比隆成康之時為不侔矣且秦地被山帶河四塞以為固卒然有變急百万之眾可具故秦膏膄之地以為天府陛下入關而都之山東雖亂秦故地可全而有也夫與人鬥不搤其吭而拊其背未能全勝今陛下入關而都之此亦搤天下之吭而拊其背也高祖以問群臣群臣皆山東人爭言周王數百年秦二世而亡高祖疑未能決及留侯明言入關便即日車駕西都關中又百官表曰內史周官秦因之掌治京師景帝二年分置左內史右內史太初元年更為京兆尹又東方朔曰三輔之地南有江淮北有河渭汧隴以東商雒以西厥壤肥饒此所謂天府陸海之地也後漢書曰董卓徙都長安謂陳紀曰三輔平敞四面險固土地肥美號曰陸海三輔黃圖曰太初元年以渭城以西屬右扶風長安以東屬京兆尹長陵以北屬左馮翊以輔京師謂之三輔關中記曰秦西以隴關為限東以函谷為界二關之間謂之中地地東西方千餘里十道志曰雍州京兆郡禹貢九州之一舜置十二牧雍亦在焉周武王都酆鎬平王東遷以歧酆之地賜秦孝公始都咸陽秦兼天下置內史以領關中項籍滅秦分其地為三以章邯為雍王都廢丘司馬欣為塞王都櫟陽董翳為翟王都高奴謂之三秦高祖入關定三秦復為內史武帝改為京兆尹華州十道志曰華州華陰郡置在鄭縣禹貢雍州之域元和郡縣圖曰周為畿內之國鄭桓公始封之邑其地一名咸林春秋時為秦晉之地戰國為秦魏二國之境西岳華山在焉秦為內史地漢為亦京兆尹國語曰鄭桓公為周司徒食菜咸林也左傳曰晉侯許賂秦伯以河外列城五南及華山史記曰秦武公十一年初縣北鄭漢志曰鄭屬京兆尹周宣王弟鄭桓公邑師古曰幽王既敗鄭桓公死之其子武公與平王東遷也爾雅曰河西曰華西南之美者有華山之金玉焉魏志曰董卓遷都長安華歆求出為下邽令史記曰秦始皇三十六年東遊海上遣使關中至平舒道有人持壁遮使者曰為我遺鎬池君事具璧門水經曰渭水東經平舒城即江神返壁於華陰平舒道遺鎬池君之處也尚書秦誓曰歸馬于華山之陽放牛于桃林之野左傳曰晉使詹嘉處瑕以守桃林之塞杜曰今華陰東潼關是也同州元和郡縣志曰同州馮翊郡禹貢雍州之域春秋時屬秦本大荔戎國秦獲之更名曰臨晉七國時屬魏秦併天下京兆馮翊扶風並內史之地漢為河上郡復為內史武帝更名左馮翊郡後改為同州以其書云灃水攸同故名之也十道志曰漢王定三秦關中置三郡以塞國為河上郡後罷三郡以為內史武帝改為左馮翊應劭漢官解詁曰馮輔翊蕃故以為名水經曰洛水東南經沙阜北其阜東西八十里南北三十里俗名沙苑史記曰魏文侯十六年代秦築臨晉十六國春秋曰符健時河渭溢蒲津監寇登得一履於河中長七尺健歎曰覆載之內何所不有穆天子傳曰陽䊸之山何伯馮夷之所都漢志曰臨晉縣有河水祠又郊祀志祠河於臨晉愽物志曰馮夷華陰人得道水仙為河伯左傳曰秦晉戰于彭衙注曰馮翊郃陽縣西北有衙城又曰秦伐晉晉使呂相絕秦曰俘我王官剪我羈馬羈馬今在郃陽王官今在登城漢書曰宣帝微時嘗困於蓮勺鹵中如淳曰為人所辱也蓮勺有鹽池名曰鹵中又漢志曰屬馮翊蓮音輦勺音酌漢志曰郃陽屬左馮翊在郃水之陽即大雅大明之詩曰在郃之陽歧州元和郡縣圖曰歧州扶風郡今為鳳翔府禹貢雍州之域春秋戰國時為秦都屬內史高帝更名中地郡復屬內史景帝更名主爵都尉武帝改右扶風所以扶助京師行風化也史記曰秦文公作鄜畤靈公作吳陽上畤又作下畤今郡內有三畤原又曰皇始二十九年巡隴西北地出笄頭山過回中回中在扶風郡漢書曰文帝十四年匈奴入蕭關殺北地都尉回中宮候騎至雍水經曰郿縣積石原魏青龍二年諸葛亮出斜谷與司馬宣王屯渭南郭洎筭亮必爭比原遂先據之亮至果不得上又魏氏春秋曰亮據渭南宣王謂諸將曰亮若出武功依山東轉是其勇也若西上五丈原即諸君旡事矣亮果屯此原五丈原亦在郿國語曰周之興也鸑鷟鳴于歧山今歧山縣是三秦記曰陳倉山上有石雞與山雞不別趙高燒山山雞飛去而石雞不去晨鳴山頭聲聞三十里或云王雞耀州五代史曰耀州本京兆府華原縣唐末李茂貞據鳳翔僣行墨制建為耀州以義勝為軍額命溫韜為節度使乾州又曰本唐之奉天縣也唐末李茂貞建之為州後因之不改隴州元和郡縣圖曰隴州汧陽郡禹貢雍州之域秦文公所都漢為汧縣屬右扶風禹貢曰道汧及歧至于荊山說文曰隴天水大坂名也三秦記俗歌曰隴頭流水鳴聲嗚咽遙望秦川肝膓斷絕又曰隴渭西關也其坂九廻不知高幾許欲上者七日乃得越漢志曰隃麋屬右扶風即今之汧陽縣邠州元和郡縣圖曰邠州新平郡禹貢雍州之域公劉所居之地秦為內史地漢為右扶風本作豳字開元中以豳與幽字相涉改為邠漢志栒邑屬右扶風有豳鄉詩豳國公劉所都也左傳曰畢原豐郇文之昭也十六國春秋曰符堅時新平人王雕陳圖讖王猛以為左道惑眾勸堅誅之雕臨刑上䟽曰臣師劉湛明於圖記謂臣曰新平應出帝王寶器願陛下志之後果獲玉器焉十道志曰宜祿縣本漢鶉觚縣後魏又分置東陰盤縣周地圖記曰秦使蒙恬北築長城又於北原築城以觚奠酒而祭有鶉飛止觚上因以名縣今有鶉觚原元和郡縣圖曰新平本漢漆縣後漢書曰建武八年隗嚚攻略陽上至漆進止未定會馬援夜至上喜問之援聚米以為山谷於上前指軍所從入上笑曰虜在吾目中矣涇州元和郡縣圖曰涇州安定郡禹貢雍州之域春秋時屬秦始皇時屬北地郡漢置安定郡宋永初山川記曰安定處山谷之間昆戎舊壤迫近夷狄修習武備人皆以馳射為事國語曰周恭王遊於涇上密康公從有三女奔之其母曰必致之於王夫獸三為群人三為粲美之物也眾以美物歸汝而何德以堪王猶不堪況汝小醜備物終必亡康公不獻王王滅密地有陰密城詩大雅曰密人不恭敢拒大邦寧州元和郡縣圖曰寧州彭原郡禹貢雍州之域當夏之衰公劉邑焉周時為義渠戎王國至秦昭王殺義渠戎王併其地始皇時為北地郡漢因之漢志曰泥陽屬北平郡莽曰泥陰應劭曰泥水出郁郅北蠻中十道志後漢改泥陽為富平後魏文改定平又曰義渠道屬北郡莽曰義溝史記曰夏道衰而公劉失其稷官變于西戎邑于邠至秦繆公得由余西戎八國服於秦梁山涇漆之北有義渠氏昫衍之戎築城郭以居秦稍蠶食至於惠王遂拔義渠二十五城秦昭王殺義渠戎王於是秦有北地隴西上郡之地慶州元和郡縣圖曰慶州順化郡禹貢雍州之域古西戎地夏稷子不窋居之今有不窋故城在焉春秋時義渠戎王國始皇時為北地郡漢志曰郁郅屬北地郡有牧師苑官莽曰功著周地圖記曰郁郅城今名尉季城在白馬嶺兩川交口水經曰尉季亦曰不窋疑郁郅之訛也十道志曰樂蟠縣本漢略畔道也漢志曰略畔道莽曰延年道有略畔山俗呼曰各盤音訛耳原州元和郡縣圖曰原州平涼郡禹貢雍州之域春秋時地屬秦始皇時屬北地郡漢為安定郡漢志曰高平屬安定郡莽曰鋪陸班固安豐戴侯頌曰高平第一帝臨我師漢書曰漢文十四年匈奴入蕭關殺北地都尉十道志曰蕭關在原州後漢曰隗嚚使牛邯守瓦亭關十道志曰瓦亭在平涼郡靈州元和郡縣圖曰靈州靈武郡禹貢雍州之域春秋戰國屬秦秦併天下為北地郡漢高為富平縣地漢志曰靈武屬北地莽曰威武惠帝四年置靈州有河奇苑號非苑師古曰水中可居曰洲此地在河州隨水高下未嘗淪沒故號靈州河奇二苑皆在焉十道志曰靈州有赫連勃勃所置果園水經云河水北有薄骨律鎮城在渚上舊赫連城也桑果榆林列植其上故謂之果州圖經曰周宣政和二年破陳將吳明徹遷其人於靈州江左之人崇禮好學習俗皆化因謂之塞北江南鹽州元和郡縣圖曰鹽州五原郡禹貢雍州之域春秋時戎狄地秦屬梁州漢置五原郡地有原五因而名之史記曰梁山漆沮之北有義渠朐衍之戎即此地漢志曰馬嶺屬北地郡以川形似馬領故以為名十道志曰馬嶺今鹽州地元和郡縣圖曰後魏為西安州以其有鹽池又改為鹽州鄜州十道志曰鄜州洛交郡禹貢雍州之域春秋時秦地始皇時為上郡漢為上郡雕陰縣地史記曰秦文公畋于汧渭之間夢黃蛇首上鄜以為上帝之徵遂以鄜立鄜畤祠白帝也漢書云匈奴南侵至朝郍膚施即此地也漢志曰雕陰屬上郡有雕陰山坊州元和郡縣圖曰坊州中部郡禹貢雍州之域春秋時翟國秦屬內史漢為右馮翊翟道縣之地符姚時時置杏城周置馬坊唐高祖因置坊州取馬坊為名漢書曰朔方為西部都尉休屠為北部都尉搜渠為中部都尉郡國志曰鄜城本三秦高奴之地翟道故城即今郡城是也俗謂之高樓城穆天子傳曰癸酉天子命駕八駿之駟造父為御翔行經翟道昇於太行元和郡縣圖曰宜君縣前秦符堅於祋祤縣故城置之延州元和郡縣圖曰延州延安郡禹貢雍州之域春秋時白狄所居秦漢屬上郡高奴之地項羽以董翳為翟王居高奴即其地也漢志曰膚施屬上郡有五龍山水經曰渭水東經高奴水漢志高奴水合豐林水謂之清水丹州元和郡縣圖曰丹州咸寧郡禹貢雍州之域春秋時為白翟所居秦漢為上郡地隋圖經集記曰義川蓋春秋時白翟也其俗語云丹州白窒即白翟語訛耳綏州元和郡縣圖曰綏州上郡禹貢雍州之域春秋白翟所居七國時屬秦秦併天下為上郡漢初屬翟國復改為上郡山海經曰上郡有䟽屬二負之臣曰危與二負殺窫寙帝梏之䟽屬之山即此也銀州元和郡縣圖曰銀州銀川郡禹貢雍州之域春秋時白翟地秦為上郡漢為河西郡圁圖陰縣地前漢志曰圜陰屬西河郡莽曰方陰師古曰圜字本作圁縣在圁水之陰因以為名也今有銀川銀水即是舊名猶存但字變耳耆舊傳驄馬城即銀川城也符秦建元元年自驄馬城巡撫夷狄麟州元和郡縣圖曰禹貢雍州之域秦漢為雲中郡隋為勝州天寶中分勝州地置麟州晉太康地志曰自北地郡北行九百里得五原塞即此地後漢光祿徐自為出五原塞數百里築城鄣列亭至盧朐山即今縣北光祿塞是也夏州元和郡縣圖曰夏州朔方郡禹貢雍州之域春秋及戰國時屬魏秦併天下屬上郡漢武分置朔方郡詩曰王命南仲城彼朔方漢書曰武帝元朔二年遣將軍衛青將兵擊匈奴出雲中至高關遂至符離收河南地置朔方五原郡符離漢北塞名十六國春秋曰赫連勃勃於朔方縣築大城既成下書曰今都城已建宜立美名朕方統一天下君臨萬國都城宜以統萬馬名酈元水經注統萬城勃勃蒸土所築又曰朔方縣有契吳山勃勃北遊登之歎曰美哉斯阜臨廣澤而帶清流吾行地多矣自馬嶺以北大河以南未有若此之善者也漢書曰武帝收河南置朔方五原郡公孫弘數諫以為罷獘中國以奉無用之地上使朱買臣等難弘發十策弘不得一由是城之自此為關中根抵漢志曰朔方治窳渾莽曰溝搜窳渾有道西北出雞鹿塞又曰三封屬朔方郡今長澤縣有三封故城豐州元和郡縣圖曰豐州九原郡禹貢雍州之域秦漢上郡地勝州元和郡縣圖曰勝州榆林郡禹貢雍州之域春秋時戎狄地戰國時晉趙地秦漢為雲中郡秦本紀曰始皇十三年伐趙取雲中因以為郡續漢書郡國志曰雲中郡領雲中咸陽旗陵沙南北興武泉原陽定襄武進成樂十一縣
