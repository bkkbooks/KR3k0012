body:
  text: 人事部一百六謳說文曰謳齊歌也左傳曰宋華元為植巡功城者謳曰睅其目皤其腹棄甲而復于思于思棄甲復來又曰宋皇國父為太宰為平公築臺妨於農收子罕請俟農功之畢公不許築者謳曰澤門之晢實興我役邑中之黔實慰我心漢書曰漢王既至南鄭諸將及士卒皆謌謳思東歸師古曰謳齊歌也多道亡還者未至南鄭在道即止歌釋名曰歌柯也所歌之聲是其質也以聲吟詠有上下如草木之有柯葉也說文曰歌詠也詩曰心之憂矣我歌且謠家語曰孔子相魯齊人歸女樂魯君淫荒孔子遂行師已送曰夫子則非罪也孔子曰欲歌可乎歌曰彼婦人之口可以出走彼婦人之謁可以敗死優哉游哉聊以卒歲史記曰曹參為漢相國三年百姓歌之曰蕭何為法講若畫一曹參代之守而勿失載其清靜人以寧一又曰衛子夫為皇后弟青貴震天下天下歌之生男無喜生女無怒獨不見衛子夫霸天下漢書曰石顯與中僕射牢梁少府五鹿充宗結為友黨諸附倚者得寵位民歌之曰牢耶石耶五鹿客耶印何累累綬何若若耶言其兼官據勢也又曰太始二年趙中大夫白公白姓公爵也為孺子之也復奏穿渠引涇水首起谷口尾入櫟陽注渭中延袤二百里溉田四千五百餘頃因名白渠民甚饒歌之曰田於何所池陽谷口鄭國在前白渠起後舉臿為雲決渠為雨涇水一石其浞數斗且糞且溉長我禾黍衣食京師億萬之口又曰馮立字聖卿為西河上郡與兄野王相代政行相似吏人嘉之乃歌曰大馮君小馮君兄弟繼踵相因循聰明聖智惠吏人政如魯衛德化鈞周公康叔猶二君又曰王氏五侯爭為奢侈大起第宅百姓歌曰五侯初起曲陽最怒壞決高都連境外杜土山漸臺象西白虎白虎殿名後漢書曰皇甫嵩討平黃巾請冀州一年田租以瞻飢民百姓歌曰天下亂兮市為墟母不保子兮妻失夫賴得皇甫兮復汝居又曰劉陶除順陽長以病免吏民思而歌之曰邑然不樂思我劉君何時復來安此下民又曰郭賀字喬卿為荊州刺史到官有殊政百姓歌之曰厥德仁明郭喬卿忠正朝廷上下平謝承後漢書曰岑熙遷魏郡太守民歌之曰我有枳棘岑君伐之我有蟊賊岑君遏之狗吠不驚足下生氂含哺鼓腹焉知凶災我嘉我生獨丁斯時美矣岑君於戲在茲又曰陳臨字子然為蒼梧太守人遺腹子報父怨捕得繫獄傷其無子令其妻入獄遂產得男人歌曰蒼梧陳君恩廣大令死罪囚有後代德參古賢天報施司馬彪續漢書曰賈琮為交州刺史歲間清平百姓安土為之歌曰賈父來晚使我先反今見清平吏不敢飯又曰李爕拜京兆尹詔發西園錢爕上一封事遂止不發吏民愛仰乃歌曰我府君道教舉恩如春威如虎剛不吐弱不茹愛如母訓如父東觀漢記曰廉范字叔度為蜀郡太守削火令但嚴使儲水而已百姓歌之曰廉叔度來何暮不禁火人安堵平生無襦今五袴又曰范丹字史雲為萊蕪長遭黨錮事推鹿車載妻子捃拾自資有時絕糧丹言貌無改閭里歌之曰甑中生塵范史雲釜中生魚范萊蕪又曰朱暉為臨淮太守抑強絕雅歲常豊熟人為之歌曰強直自遂南陽朱季吏畏其威人懷其惠又曰張堪為漁陽太守勸人耕種以致豊富百姓歌曰桑無附枝麥秀兩歧張君為政樂不可支吳錄曰彭循字子陽毗陵人建國二年海賊丁儀等萬人據吳太守秋君聞循勇謀以守令循與儀相見陳說利害應時散降民歌之曰時歲倉卒賊縱橫大戟強弩不可當賴遇賢令彭子陽又曰王譚字世容為成武令民服德化宿惡奔迸父老歌之曰王世容治無雙省傜役盜賊空晉書束晳傳太康中郡界大旱晳為邑人請雨三日而雨注眾謂晳誠感為作歌曰束先生通神明請天三日甘雨零零我黍以育我稷以成何以酬之報束先生又曰鄧攸為吳郡守刑政清明百姓歡悅為中興良守後稱疾去職郡常有送迎錢數百萬攸去郡不受一錢百姓數千人留牽攸舡不得進攸乃少停夜中發去吳人歌之曰纔如打五鼓雞鳴天欲曙鄧侯挽不留謝令推不去又曰徐州刺史呂虔檄王祥為別駕祥年垂耳順固辭不受為具車牛祥乃應召虔委以州事於時寇盜充斥祥率勵兵士頻討破之州界清靜政化大行時人歌之曰海沂之康實賴王祥邦國不空別駕之功又曰諸葛恢字道明荀闓字道明蔡謨字道明皆有名譽號曰中興三明時人之曰京師三明各有名蔡氏儒雅荀葛廉清王隱晉書曰應詹為南平郡郡人歌之曰亂離既著殆為灰朽僥倖之運賴茲應后蔭我塗炭惠隆丘阜潤曰江海恩猶父母崔鴻前秦錄曰王猛化洽六州人移風變百姓歌之曰長安大街夾樹楊槐下走朱輪上有鸞栖英彥雲集誨我人黎又曰符堅時鳳皇集于東闕歌之曰鳳皇于飛其羽翼翼淵哉聖后饗齡萬億崔鴻崔氏家傳曰崔瑗為汲令開溝澮興造稻田長老歌之曰上天降神明錫我慈仁父臨人布德澤恩惠施以序唐書顏師古叔父遊秦武德初累遷廉州刺史封臨沂縣男時劉黑闥初平人多以強暴寡禮風俗未安遊秦撫恤境內禮讓大行邑人歌之曰廉州顏有道性行同莊老愛人如赤子不煞非時草高祖璽書勞勉之韓子曰齊桓公飲酒醉遺其冠恥之管仲曰公胡不雪之以政公曰善因發困倉賜貧窮論囹圄三日而人歌之曰公胡不復遺其冠乎呂氏春秋曰魏襄王使吳起為鄴令引漳水灌田民大得利相與歌曰鄴有吳聖令為公決漳水灌鄴旁終古斥鹵生稻粱世說曰郗超王珣並以雋才為桓溫大司馬所眷珣為主簿超為記室參軍超多鬚珣形狀短小時人為之歌曰髯參軍短主簿能令公喜能令公怒常璩華陽國志曰吳資字元約為巴郡太守屢獲豐年人歌之曰習習晨風動澍雨潤乎苗我后恤時務我人以優饒劉向新序曰季子以劍帶徐君墓樹徐人嘉而歌之曰延陵季子不忘舊故千金之劍以帶丘墓陳留耆舊傳曰爰珍除六令吏人訟息教誨其子弟歌之曰我有田疇爰父殖置我有子弟爰父教誨襄陽耆舊傳曰山季倫每臨習池未嘗不大醉而還曰我高陽池也襄陵城中小兒歌之曰山公出何去往至高陽池日夕倒載歸酪酊無所時時能騎馬到著白接離舉鞭向葛強何如并州兒又曰襄陽太守胡烈有惠化百姓歌曰美哉明后儁哲惟嶷陶廣乾坤周孔是則文武播暢威振遐域謠爾雅曰徒歌曰謠漢書曰石顯失權數月丞相條奏顯舊惡及其黨牢梁陳順皆免官顯與妻子徒歸故郡憂懣不食道病死諸所交結以顯為官廢罷少府五鹿充宗左遷玄菟太守御史中丞伊嘉為鴈門都尉長安謠曰伊徙鴈鹿菟去牢與陳石無徒袁山松後漢書曰桓帝時朝廷日亂李膺風格秀整高自標尚後進之士升其堂者以為登龍門大學生三萬餘人牓天下士上稱三君次八俊次八顧次八及次八廚猶右之八元八凱也因為七言謠曰不畏強禦陳仲舉九卿直言有陳蕃天下模楷李元禮天下好交荀伯條天下英秀王叔茂天下冰楞王秀陵天下忠平魏少英天下稽古劉伯祖天下良輔杜周甫天下才英趙仲經司馬彪續漢書曰張霸為會稽太守越賊束手歸附童謠曰棄我戟捐我矛盜賊盡吏皆休又曰蜀童謠曰黃牛白腹五銖當復時公孫述僣號於蜀時人竊言王莽稱黃述欲繼之故稱漢家貨泉當復也又曰桓帝時汝南太守宗資任用功曹范滂中人以下共嫉之作七言謠曰汝南太守范孟博南陽宗資主畫諾東觀漢記曰王渙除河內溫令商賈露宿人開門臥人為作謠曰王稚子代未有平徭役百姓喜吳志曰周瑜少精意於音樂三爵之後其有關誤瑜必知之知之必顧時人謠曰曲有誤周郎顧晉書曰羊祜以伐吳必藉上流之勢又時吳有童謠曰阿童復阿童銜刀浮渡江不畏岸上獸但畏水中龍祜聞之曰此必水軍有功但當思應其名者耳又曰杜預遣周旨伍巢等伏兵樂鄉城外孫歆遣軍出拒王濬大敗而還旨等發伏兵隨歆軍而入直至帳下虜歆而還故軍中為之謠曰以討伐戰一當萬於是進逼江陵又曰太始中為賈充等謠曰賈裴王亂紀綱王裴賈濟天下言亡魏而成晉也王隱晉書曰裴秀纔十餘歲叔父徽有聲名賓客詣徽出則過秀時人謠曰後進領袖有裴秀又曰杜預開楊口起夏口水道洪洞達巴陵經千餘里內寫長江之險外通零桂之漕南土美而謠之曰後世無叛由杜翁孰識智名與勇功又曰潘岳字安仁清辯能屬文早辟賈充府太子舍人出為河陽令以仕次宜為郎不得意時僕射山濤領選岳內非之密作謠曰閣道東有大牛王濟鞅裴楷鞦和嶠剌促不得休崔鴻後趙錄曰張樓為臨水長嚴政酷刑殘忍無惠人謠之曰陽平張樓頭如箱見人切齒劇虎狼崔鴻前秦錄曰符洪母姜氏因寢產洪驚悸而寤先是隴右大霖雨百姓苦之謠曰雨若不止洪水必起故名之曰洪又曰初符生夢大魚食蒲又長安謠曰東海大魚化為龍男便為王女為公問在何所洛門東海堅將也時為龍驤將軍第在洛門之東是月生以謠夢之故誅侍中魚遵趙書曰劉膠討陳安於隴城安下小將劉牙趙牢路松多堅戍不下城內得安死力謠曰隴上健兒曰陳安軀幹雖小腹中寬愛養將士同心肝騄驄馬鐵瑕鞍七尺大刀配齊鐶丈八虵矛左右盤十盪十決無當前百騎俱出如雲浮追者千萬騎悠悠戰始三交失虵矛十騎俱盪九騎留棄我騄驄巖悲天降雨迨者休阿呵鳴乎奈子乎鳴呼阿呵柰子何又曰汲桑六月盛暑而重裘累茵使人扇之患不清涼斬扇者時軍中為之謠曰士為將軍何可羞六月重茵被納裘不識寒暑斷他頭又曰燕人龐世為光祿動奏案豪強苛剋人物咸懼疾之及卒門無弔客時人為之謠曰龐家之巷車馬鱗鱗泥丸之日無弔賓弔賓不來何所因由性苛剋寡所親隋書曰韓擒虎先是江東有謠曰黃斑青驄馬發自壽陽溪來時冬氣木去日春風始皆不知所謂擒虎本名豹平陳之際又乘青驄馬往反時節與謠相應至時是方悟列子曰堯微服遊於康衢開童謠曰立我蒸民莫匪爾極不識不知順帝之則抱朴子曰童謠猶助聖人之耳目豈況墳素之宏博哉益部耆舊傳曰王忳字少林詣京師於見諸生病甚困生謂忳曰腰下有金十斤願以相與乞收藏尸骸未問姓名呼吸因絕忳賣金一斤以給棺絮九斤置生腰下後署大度亭長到亭日有馬一疋到亭中其日大風有一繡被隨風以來後忳騎馬突入金彥父見曰真得盜矣忳說馬狀又取被示之彥父帳然曰被馬俱止卿有何陰德忳具說葬諸生事彥父曰此吾子也遣迎彥喪金具存民謠之曰信哉少林世為遇飛被走馬與鬼語陳留耆舊傳曰吳祐為恒農令勸善懲姦貪濁出境甘露降年穀豊童謠曰君不我憂人何以休不行界署焉知人處商氏世傳曰商亮字子華舉孝廉到陽城遇兩虎爭一羊亮案劍直前斬羊虎乃各以其半去時人為之謠曰石里之勇商子華暴虎見之藏瓜牙常璩華陽國志曰閻慮字孟度為綿竹令以禮讓為本童謠曰閻君賦政明且昶蠲苛去碎以禮讓劉恭叔異苑曰晉時長安謠曰秦川中血沒踠唯有涼州倚柱看及惠愍之間關內殲破浮血丹溧張軌擁眾一方威恩共著
