body:
  text: 皇王部三十三唐高祖神堯皇帝唐書曰高祖神堯皇帝姓李氏諱淵其先隴西狄道人涼武昭王暠七代孫也暠生歆歆生重耳仕魏為弘農太守重耳生熙為金門鎮將領豪族鎮武川因家焉儀鳳中追尊宣皇帝熙生天賜仕魏為幢主儀鳳中追尊光皇帝生皇祖諱虎後魏左僕射封隴西郡公與周文帝及太保李弼大司馬獨狐信等以功參佐命當時稱為八柱國家仍賜姓大野氏周受禪追封唐國公至隋文帝作相還復本姓武德初追尊景皇帝廟號太祖皇考諱昞音丙周安州總管柱國大將軍襲唐國公謚曰仁武德初追尊元皇帝廟號世祖高祖以周天和元年生於長安七年襲唐國公及長倜儻豁達任性真率寬仁容眾無貴賤咸得其歡心隋受禪補千牛備身文帝獨狐皇后即高祖從母也由是特見親愛累轉譙隴歧三州刺史有史世良者善相人謂高祖曰公骨法非常必為人主願自愛勿忘鄙言高祖頗以自負大業初受滎陽樓煩二郡太守徵為殿內少監九年遷衛尉少卿遼東之役督運於懷遠鎮及楊玄感反詔高祖馳驛鎮弘化郡兼知關右諸軍事高祖歷試中外素樹恩德及是結納豪傑眾多款附時煬帝多所猜忌人懷疑懼會有詔徵高祖詣行在所遇疾未謁時甥王氏在後宮帝問曰汝舅何遟王氏以疾對帝曰可得死不高祖聞之益懼因縱酒沉湎納賄以混其跡焉十一年煬帝幸汾陽宮命高祖往山西河東黜陟討捕師次龍門賊帥母端兒帥眾數千薄于城下高祖從十餘騎擊之所射七十發皆應弦而倒賊乃大潰十三年為太原留守郡丞王威武牙部將高君雅為副將群賊蜂起江都阻絕太宗與晉陽令劉文靜及門下客長孫順德劉弘基各募兵旬日眾且一萬密遣使召世子建成及元吉于河東威與君雅見兵大集恐高祖為變相與疑懼請高祖祈雨於晉祠將為不利晉陽鄉長劉世龍知之以告高祖陰為之備五月甲子高祖與威君雅視事太宗密嚴兵於外以備非常遣開陽府司馬劉政會告威等謀反即斬之以徇遂起義兵遣劉文靜使於突厥始畢可汗令率兵相應六月甲甲命太宗將兵徇西河下之癸巳建大將軍府并置三軍分為左右開倉庫以賑窮乏遠近響應秋七月高祖率兵西圖關中以元吉為鎮北將軍太原留守癸丑發自太原有兵三萬景辰師次靈石縣營於賈胡堡隋武牙郎將宋老生屯霍邑以拒義師會霖雨積旬餽運不給高祖命旋師太宗切諫乃止有白衣老父詣軍門曰余為霍山神使謁唐皇帝曰八月雨止路出霍邑東南吾當濟師高祖曰此神不欺趙無卹豈負我哉八月辛巳高祖引師趨霍邑斬宋老生平霍邑景戍進下臨汾郡及綘郡癸巳至龍門突厥始畢可汗遣康稍利率兵與劉文靜會于麾下隋驍衛大將軍屈突通鎮河東津梁斷絕關中向義者頗以為阻於是水濱居人競進舟楫不謀而至者前後數百人九月壬寅馮翊賊帥孫華土門賊帥白玄度各率其眾送款并具舟楫以待義師高祖令華與統軍王長諧劉弘基引兵渡河屈突通遣其武牙郎將桑顯和率兵數千夜襲長諧義師不利太宗以遊騎數百掩其後顯和潰散義軍復振景辰馮翊太守蕭造以郡來降戊午高祖親率眾圍河東屈突通自守不出乃命攻城不利而還文武將吏請高祖領太尉加置僚佐從之華陰令李孝常以永豐倉來降庚申高祖率軍濟河舍于長春宮三秦士庶至者日以千數高祖禮之咸過所望人皆喜悅景寅遣隴西公建成司馬劉文靜屯兵永豐倉兼守潼關以備他盜太宗率劉弘基長孫順德等前後數萬人自渭北徇三輔所至皆下高祖從父弟神通起兵鄠縣柴氏婦舉兵於司竹至是並與太宗會乙亥命太宗自渭汭屯兵阿城隴西公建成自新豐趣霸上高祖率大軍自下邽西上經煬帝行宮園苑悉罷之宮女放還親屬冬十月辛巳至長樂宮有眾二十萬京師留守刑部尚書衛文昇右翊衛將軍陰世師京兆郡丞骨儀挾代王侑音宥以拒義師高祖遣使至城下諭以匡服之意再三皆不報諸將固請圍城十一月景辰攻拔京城衛文昇先已病死以陰世師滑儀等拒義兵並斬之癸亥率百僚備法駕立代王侑為天子遙尊煬帝為太上皇大赦改元為義寧甲子隋帝詔加高祖假黃鉞使持節大都督內外諸軍事大丞相進封唐王總錄萬機以武德殿為丞相府改教為令以隴西公建成為唐國世子太宗為京兆尹改封秦王姑臧公元吉為齊公十二月癸未丞相府置長史司錄已下官僚金城賊帥薛舉寇扶風命太宗為元帥擊之遣趙郡公孝恭招慰山南所至皆下癸巳太宗大破薛舉之眾於扶風屈突通自潼關奔東都劉文靜等追擒於閿音間鄉虜其眾數萬河池大守蕭瑀音禹以郡降丙午遣雲陽令詹俊武功縣正李仲袞徇巴蜀下之二年春正月戊辰世子建成為撫疑大將軍東討元帥太宗為副揔兵七萬徇地東都三月景辰右屯衛將軍宇文化及弒隋太上皇於江都宮立秦王浩為帝自稱大丞相徙封太宗為趙國公戊辰隋帝進高祖位相國總百揆備九錫之禮唐國置丞相已下立皇高祖已下四廟於長安通義里第夏四月戊戍世子建成及太宗自東都班師五月乙已天子詔高祖冕十有二旒建天子旌旗出警入蹕王后王子王女爵命之號一遵舊典戊午隋帝詔遣使持節兼太保刑部尚書光祿大夫梁郡公蕭造兼太尉司農少卿裴之隱奉皇帝璽紱于高祖高祖辭讓百寮上表勸進至于三乃從之隋帝遜于舊邸改大興殿為太極殿甲子高祖即皇帝位於太極殿命刑部尚書蕭造兼太尉告於南郊大赦天下改隋義寧二年為唐武德元年官人百姓賜爵一級義師所行之處給復三年罷郡置州改太守為刺史丁卯宴百官于太極殿賜帛有差東都留守共立隋越王侗音同為帝壬申命相國長史裴寂等修律令六月甲戌太宗為尚書令廢隋大業律令頒新格己卯備法駕迎皇高祖宣簡公已下神主祔于太廟追謚妃竇氏為穆皇后庚辰立世子建成為皇太子封太宗為秦王齊國公元吉為齊王諸州揔管加號使持節癸未封隋帝為酅國公薛舉寇涇州命秦王為西討元帥征之改封永康王神通為淮安王壬辰加秦王雍州牧餘官如故秋七月秦王與薛舉大戰於涇州我師敗績八月壬午薛舉死其子仁杲復僣稱帝命秦王為元帥以討之涼州賊帥李軌以其地來降拜涼州總管封涼王九月乙巳親錄囚徒辛未追謚隋太上皇為煬帝宇文化及至魏州鴆殺秦王浩僣稱天子國號許冬十月李密率眾來降十一月秦王大破薛仁杲於淺水原降之隴右平乙已涼王李軌僣稱天子於涼州詔頒五十三條格約法緩刑十二月壬申加秦王太尉陜東道大行臺庚子李密叛於桃林行軍總管盛彥師追討斬之二年春二月丁酉竇建德攻宇文化及于聊城斬之傳首突厥閏月辛丑劉武周侵我并州己酉李密舊將徐世勣以黎陽之眾及河南十郡降授黎州總管封曹國公賜姓李氏庚戍上微行都邑以察甿俗即日還宮甲寅賊帥朱粲殺我使散騎常侍叚確奔洛陽夏四月乙巳王世充篡越王侗位僣稱天子國號鄭辛亥李軌為其偽尚書安興貴所執以降河右平九月辛未賊帥李子通據江都僣稱天子國號吳沈法興據毗陵僣稱梁王丁丑和州賊帥杜伏威遣使來降授和州總管東南道行臺尚書令封楚王裴寂與劉武周將宋金剛戰於介州我師敗績右武衛大將軍姜寶誼死之并州總管齊王元吉懼武周所逼奔于京師并州陷乙未京師地震甲子上親祠華岳十一月景子竇建德陷黎陽盡有山東之地淮安王神通左武衛大將軍李世勣皆沒於賊十二月景申永安王孝基工部尚書獨狐懷恩總管于筠為劉武周宋金剛掩襲並沒焉甲辰狩于華山壬子大風拔木三年春正月辛巳幸蒲州命祀舜廟癸巳至自蒲州甲午李世勣於竇建德所自拔歸國建德僣稱夏王四月甲寅加秦王益州道行臺尚書令秦王大破宋金剛於介州金剛與武周俱奔突厥遂平并州偽總管尉遟敬德尋相以介州降六月壬辰徙封楚王杜伏威為吳王賜姓李氏加授東南道行臺尚書令景午親錄囚徒七月壬戍命秦王率諸軍討王世充遣皇太子鎮蒲州以備突厥景申突厥殺劉武周於白道冬十月庚子懷戎賊帥高開道遣使降授蔚州揔管封北平郡王賜姓李氏四年五月己未秦王大破竇建德之眾於武牢擒建德河北悉平景寅王世充舉東都降河南平秋七月甲子秦王凱旋獻俘於太廟丁卯大赦天下廢五銖錢行開通元寶錢斬竇建德於市流王世充於蜀甲戍建德餘黨劉黑闥據漳南反置山東道行臺尚書省於洛州八月兗州總管徐圓朗舉兵反以應劉黑闥僣稱魯王冬十月乙丑加秦王天策上將軍位在王公上領司徒陜東道大行臺尚書令齊王元吉為司空乙巳趙郡王孝恭平荊州獲蕭銑五年春正月景申劉黑闥據洺州僣稱漢東王三月丁未秦王破劉黑闥于洺水上盡復所陷州縣黑闥亡奔突厥蔚州總管北平王高開道叛寇易州夏四月庚戌秦王還京師高祖迎勞於長樂宮壬申代州總管定襄郡王大恩為虜所敗戰死六月劉黑闥引突厥寇山東置諫議大夫官員秋七月隋漢陽太守馮盎以南越之地來降嶺表悉定八月辛亥以洺荊并幽交五州為大總管府改封恒山王承乾為中山王葬隋煬帝于楊州景辰突厥頡利寇鴈門己未進寇朔州遣皇太子及秦王討擊大敗之冬十月己酉遣齊王元吉擊劉黑闥於洺州時山東州縣多為黑闥所守所在殺長吏以應之行軍總管淮陽王道玄與黑闥戰于下愽道玄敗沒十一月甲申命皇太子率兵討劉黑闥景申幸宜州簡閱將士十二月景辰校獵於華池庚申至自宜州皇太子破劉黑闥於魏州斬之山東平六年春二月辛亥校獵於驪山三月乙未幸昆明池宴百官夏四月己未幸舊宅改為通義宮曲赦京城繫囚於是置酒高會賜從官帛各有差癸酉以尚書右僕射魏國公裴寂為左僕射中書令宋國公蕭瑀為右僕射秋七月突厥頡利寇朔州遣皇太子及秦王屯并州以備之八月壬子東南道行臺僕射輔公祏據丹陽反僣稱宋王遣趙郡王孝恭及嶺南道大使永康縣公李靖討之景寅吐谷渾內附九月景子突厥退皇太子班師七年二月丁已幸國子學親臨釋奠改大揔管府為大都督府三月戊寅廢尚書省六司侍郎增吏部郎中秩正四品掌選事戊戍趙郡王孝恭大破輔公祏擒之丹陽平夏四月庚子大赦天下頒行新律令以天下大定詔遭父母喪者聽終制五月造仁智宮於宜州之宜君縣李世勣討徐圓朗平之六月辛丑幸仁智宮秋七月巂音髓州地震山崩江水咽流八月戊辰突厥寇并州京師戒嚴壬午突厥退乙未京師解嚴八年夏六月甲子幸太和宮突厥寇定州命皇大子往幽州秦王往并州以備突厥八月并州道總管張公謹與突厥戰于大谷王師敗績中書令溫彥愽沒於賊九月突厥退冬十月辛巳幸周氏陂校獵因幸龍躍宮九年春正月景申命州縣修城隍備突厥尚書左僕射魏國公裴寂為司空二月庚申加齊王元吉為司徒戊寅親祀社稷三月辛卯幸昆明池六月庚申秦王以皇太子建成與齊王元吉同謀害已率兵誅之詔立秦王為皇太子總統萬機大赦天下八月癸亥詔傳位于皇太子尊帝為太上皇徙居弘義宮改名太安宮貞觀八年三月甲戍高祖讌西突厥使者於兩儀殿顧謂長孫無忌曰當今蠻夷率服古未嘗有無忌上千萬歲壽高祖大悅以酒賜太宗太宗又奉觴上壽流涕而言曰百姓獲安四夷咸附皆奉遵聖旨豈臣之力於是太宗與文德皇后互進御膳并上服御衣物一同家人常禮是歲閱武於城西高祖親自臨視勞將士而還置酒於未央宮三品已上咸侍高祖命突厥頡利可汗起舞又遣南越酋長馮智戴詠詩既而笑曰胡越一家自古未之有也太宗奉觴上壽曰臣早蒙慈訓教以文道爰從義旗平定京邑重以薛舉武周世充建德皆上稟神筭幸而剋定三數年間混一區宇天慈崇寵遂蒙重任今上天垂祐時和歲阜被髮左袵並為臣妾此豈臣智力皆由上稟聖筭高祖大悅群臣皆呼萬歲九年五月庚子高祖大漸下詔從漢制以日易月園陵制度務從儉約是日崩於太安宮之垂拱前殿年七十謚曰大武皇帝廟號高祖葬獻陵高宗上元元年改上尊號曰神堯皇帝天寶十三年上尊號曰神堯大聖大光孝皇帝
