body:
  text: 文部十一論李充翰林論曰研覈名理而論難生焉論貴於允理不求支離若嵇康之論成文美矣文心雕龍曰論者倫理無爽則聖意不墜昔仲尼微言門人追記故抑其經目稱為論語蓋群論立名始於茲矣論者彌綸群言而研精一理也是以莊周齊物以論為名不韋春秋六論昭別至如石渠論蓺白虎講聚述聖通經論家之政體也及班彪王命嚴左三將敷述昭情善入史體魏之初霸術兼名法傅嘏王粲校練名理迄至正始務欲守文而何晏之徒始盛玄論於是聃周當路與尼父爭塗矣詳觀蘭石之才性仲宣之去伐叔夜之辨聲太初之本玄輔嗣之兩例平叔之二論並師心獨見鋒潁精密蓋論之英也至乃李康運命同論衡而過之陸機辨亡效過秦而不及然亦其美哉原夫論之為體所以辯正然否窮於有數追於無形鑽堅求通鉤深取極乃百慮之筌蹄萬事之權衡也故其義貴圓通詞忌枝碎也必使心與理合彌縫莫見其隙詞共心密敵人不知所乘斯其要也是以論譬析薪貴能破理斤利者越理而橫斷詞辨者反義而取通覽文雖巧而撿跡知妄惟君子能通天下之志安可以曲論哉漢書曰班彪遭王莽亂避地隴右時隗囂據隴右囂問彪曰往者周亡戰國並爭天下分裂意者從橫之事復起於今乎將承運迭興在一人也願先生論之彪既感囂言又愍狂狡之不息乃著王命論以救其時難後漢書曰王符耿介不同於俗困而憤恚著書以譏於世不欲彰名號曰潛夫論又曰仲長統字公理每論古今世俗行事恒發憤歎息因著論名曰昌言晉書裴頠傳曰頠深患時俗放蕩不遵儒術何晏阮籍素有重名於世口談浮虛不遵禮法尸祿躭寵仕不事事至王衍之徒聲譽大盛位高勢重不以物務自嬰遂相放效風教陵遟乃著崇有之論以釋其蔽又范喬傳光祿大夫李銓嘗論揚雄才學優於劉向喬以為立一代之書正群籍之篇使雄當之故非所長遂著楊劉優劣論又曰董養字仲道陳留俊儀人也太始初到洛下不干榮祿及楊后廢養因遊太升堂歎曰建斯堂也將何為乎每見國家赦書謀反逆者赦至於祖父母不赦以為王法所不容也柰何公卿處議文飾禮典以至此乎天人之理既滅大亂作矣因著元化論以非之又曰魯褒字元道元康之後綱紀大壞褒傷時貪鄙乃隱姓名著錢神論其略曰市井便易不患耗折親之如兄字曰孔方失之則貧弱得之則富強無翼而飛無足而走解嚴毅之顏開難發之口錢多者處前錢少者居後京邑衣冠疲勞講肆厭聞清談對之睡寐見我家兄莫不驚視又成公綏亦著錢神論梁書曰范縝字子真南陽舞陰人也齊竟陵王子良盛招賓客縝豫焉子良精信釋教而縝不信因果看神滅論以明之子良集僧難之而不能屈王筠難縝曰嗚呼范子曾不知其先祖神靈所在縝荅曰嗚呼王子知其先祖神靈所在而不能殺身以從之又曰劉峻見任昉諸子西華等兄弟流離不能自振平生舊交莫有收恤西華冬月葛帔練衣路逢峻峻泫然矜之乃廣朱公叔絕交論到溉見其書抵凡於地終身為恨後周書曰柳虬時人論文體者時有今古非文有今古乃為文質論隋書曰開皇之末國家殷盛朝野皆以遼東為意劉炫以為遼東不可伐作撫夷論以諷焉當時莫有悟者及大業之年三征不克炫言方驗典論曰余觀賈誼過秦發周秦之得失通古今之滯義洽以三代之風潤以聖人之化斯可謂作者矣抱朴子曰洪造穹天論云天形穹隆如笠冒地若謂天北方遠者視北方星宜細於三方矣語林曰宋岱為青州剌史著無鬼論甚精莫能屈後有書生詣岱談論次及無鬼論書生乃拂衣而去曰君絕我輩血食二十餘年以君有青牛髯奴所以未得相困今奴已死今得相制矣言終而失明日岱亡又幽明錄曰阮瞻亦著無鬼論俄而鬼見而瞻死議說文曰議語也又曰論難也周易節卦曰君子以制度數議德行文心雕龍曰周爰咨謀是謂為議議之言宜審事宜也易之節卦君子以制度數議德行周書曰議事以制政乃弗迷議貴節制經典之體也昔管仲稱軒轅有明臺之議則其來遠矣洪水之難堯咨四岳百揆之舉舜疇五臣三代所興詢及芻蕘春秋釋宋魯桓預議及趙靈胡服而季父爭論商鞅變法而甘龍交辯雖憲章無筭而同異足觀迄至有漢始立駮議駮者雜也議不純故曰駮也自兩漢之明揩式昭備藹藹多士發言盈庭若賈誼之遍代諸生可謂捷於議矣至如主父之駮挾弓安國之辯匈奴賈捐陳於朱崖劉歆辯於祖宗雖質文不同得事要矣若乃張敏之斷輕侮郭躬之議擅誅程曉之駮校事司馬芸之議貨錢何曾蠲出女之科秦秀定賈充之謚事實允當可謂達議體矣漢世善駮則應劭為首晉代能議則傅咸為宗然仲援博古銓貫以敘長虞識治而屬辭枝繁及陸機議亦有鋒潁而腴辭不剪頗累文骨亦有其美風俗存焉夫動先擬議明用稽疑所以敬慎群務施張治術故其大體所資必樞紐經典顧事實於前代觀變通於當今理不謬插其枝字不妄舒其藻郊祀必洞於禮戎事宜練於兵田穀先曉於農斷訟務精於律然後摽以顯義約以正辭文以辯潔為能不以繁縟為巧事以明覈為美不以環隱為奇此綱領之大要也若不達政體而舞筆弄文支離搆辭穿鑿會巧空騁其華固為事實所檳設得其理亦為浮詞所埋矣昔秦女嫁晉從文衣之媵晉之貴媵而賤女楚鬻珠於鄭為薰桂之櫝鄭人買櫝而還珠若文浮於理末勝於其本則秦女楚珠復存於茲矣李充翰林論曰在朝辯政而議奏出宜以遠大為本陸機議晉斷亦各其美矣三國典略曰王粲才既高辯鍾繇王朗等雖各為魏卿相於朝廷奏議皆閣筆不敢措手又曰齊主命立三恪朝士議之太子少傅魏收為議眾皆同之吏部侍郎崔瞻以父與收有隙乃別立議收讀瞻議畢笑而不荅瞻曰瞻議若是須贊所長瞻議若非須詰所短何容讀國士議文直如此冷笑收但慚而竟無言又曰齊魏收嘗在議曹與諸博士引據漢書論宗廟事博士笑之收便忿取韋玄成傳抵之而起博士夜共披尋遲明乃來謝曰不謂玄成如此學也南史曰馬褧梁天監初詔通儒定五禮有司舉褧脩嘉禮除尚書祠部郎時創定禮樂褧所建議多見施行兼中書通事舍人每吉凶禮當時名儒明山賓賀瑒等疑不能斷者皆取決也唐書曰天寶中崔昌上封推五行之運以國家合承周漢其周隨不合為二王後請廢詔下尚書省集公卿議昌獨見之明群議不屈會集賢院學士衛包抗表陳論議之夜四星聚於尾宿天意昭然上心遂定求殷周漢後為三恪廢韓介酅等公以昌為左贊善大夫又曰張平叔判度支平叔欲以征利中上意以希大任請加監榷貴集州郡時宰不能奪因下其議韋處厚奏議發十難以詰之上然後深知害人乃止平叔繇是始踈獨斷曰有疑事公卿百官會議若臺閣有正處而獨執異意者曰駮議曰某官某甲議以為如是下言臣愚戇議異其非駮議不得言議異金樓子曰余後為江州副君賜報曰京師有語云論議當如湘東王仕官當如王克克時始為僕射領選也牋說文曰箋表識書也文心雕龍曰牋者表也識表其情也崔寔奏記於公府則崇讓之德音矣黃香奉牋於江夏亦肅恭之遺式矣公幹牋記文麗而規益子桓不論故世所共遺若略名取實則有美於為詩矣劉廙謝恩喻切以至陸機自敘情周而巧牋之善者也原牋記之為式既上窺乎表亦下睨乎書使敬而不懾簡而無傲清靡以惠其才彪蔚以文其響蓋箋記之分也晉書曰劉卞字叔龍東平須昌人也本兵家子質直少言為縣小吏功曹夜醉如廁使卞執燭不從功曹銜之以它事補亭子有祖秀才者於亭中作與剌史箋久不成卞教之數言卓犖有大致秀才謂縣令曰卞公府椽之精者卿云何以為亭子令即召為門下吏異苑曰河內荀儒字君林乘冰省舅氏陷河而死兄倫為文求尸積日不得設祭水側又投牋與河伯經一宿岸側冰開尸手執牋浮出倫又牋謝之博物志曰鄭玄注毛詩曰箋不解此意或云毛公嘗為北海玄是此郡人故以為敬世說曰郗司空在北府桓宣武惡其居兵權於事素暗遣牋詣桓方欲共獎王室修復園陵世子嘉賓出行道上聞信至急遣取牋視之竟寸寸毀裂便迴車解衣帳中臥更作牋自陳老病不復堪人間欲乞閑地自養宣武大喜即發詔轉為督王部守會稽啟說文曰啟傅信也服虔通俗文曰官信曰啟張璠漢紀曰董卓呼三臺尚書以下自詣卓啟事然後得行文心雕龍曰啟者開也高宗云啟乃心沃朕心蓋其義也孝景諱啟後兩漢無稱至魏國牋記始云啟聞奏事之末或云謹啟自晉來盛啟用兼表奏陳政事言既奏之異條讓爵謝恩亦表之別幹必辯要輕清文而不侈亦啟之大略也晉書曰山濤為吏部濤所奏甄拔人物各為題目時稱山公啟事書記文心雕龍曰大舜云書用識哉所以記時事也蓋聖賢言辭揔為之書書之為體主言者也揚雄曰言心聲也書心畫也聲畫形君子小人見矣故書者舒也舒布其言染之簡牘取象乎夬貴在明決而已三代政暇文翰頗踈春秋聘繁書令彌盛繞朝贈士會以策子家弔趙宣以書巫臣之責子反子產之諫范宣詳觀四書辭若對面又子服敬叔進弔書於滕君故知行人絜辭多被翰墨及七國獻書詭麗輻湊漢來筆札辭音紛紜觀史遷之報任安東方之謁公孫楊惲之酬會宗子雲之荅劉歆志氣盤桓各含珠采並杼軸乎尺素抑揚乎寸心逮後漢書記則崔瑗尤善魏之元瑜號稱翩翩文舉屬音半簡必錄休璉好事留意翰辭抑其次也嵇康絕交實志高而文偉矣趙壹贈離乃少年之激昂也至如陳遵占辭百封各意禰衡代書親踈得宜斯皆尺牘之文也詳諸書體本在盡言所以散鬱陶詠風采固宜滌蕩以任氣優游以懌懷文明從容亦心聲之獻酬也若夫尊貴差序則肅以節文自戰國已前君臣同書秦漢立儀始有表奏王公國內亦稱奏書張敞奏書於膠后其辭義美哉迄至後漢稍有名品公府奏託而郡將奉牋也漢書曰蘇武與常惠使匈奴被留昭帝即位數使至匈奴常惠請其守者與俱得夜見漢使具自陳道教使者謂單于言天子射上林中得鴈足有係帛書言武等在某澤中使者大喜如惠語單于單于視左右而敬謝漢使曰武等實在於是遣還漢又曰陳遵容皃奇偉略涉傳記贍於文辭善書與人尺牘皆以為榮為河南太守既至官遣吏西上召善書吏十人於前治私書謝京師故人遵馮机口占目省官事數百封親踈各有意又曰谷永字子雲便於筆札故時人云谷子雲之筆札婁君卿之脣舌後漢書曰鄧奉反於南陽趙熹素與奉善數遺書切責之而讒者因言熹與奉合謀帝以為疑及奉敗帝得熹書乃驚曰趙熹真長者也即徵熹引見賜鞍馬待詔公車又曰竇章遼伯向好學有文與馬融崔瑗同好更相推薦融與竇書曰孟陵奴來賜書見手跡歡喜何量次於面也書雖一紙八行行七字吳錄曰王宏為冀州剌史不發私書不交豪族號曰王獨坐蜀志曰先主辟馬良遂為椽後遣使吳良請亮曰今銜國命恊穆二家幸為良介於孫將軍亮曰君試自為文良即為草曰寡君遣椽馬良通聘繼好以紹昆吾豕韋之勳其人吉士荊楚之令鮮於造次之華而有克終之美願降心存納以慰將命權大待之又曰王平字子均生長戎旅手不能書所識不過十字而占授作書皆有意使人讀史漢諸傳聽之略知其義往往論說不失其指晉書曰何曾為三公人以小紙為書者勑記室勿報又曰何綏字伯蔚曾之孫也位至侍中尚書因以繼世名賢奢侈過度性既輕物翰札甚簡城陽王尼見綏書䟽謂人曰伯蔚居世而務豪乃爾豈其免乎劉與潘滔譖之於東海王越越遂誅綏又曰荀勗傳云勗與裴秀羊祜共管機密時將發使聘吳並遣當時文士作書與孫皓帝用勗所作皓既報命和親帝謂勗曰君前作書使吳思順勝十萬之眾也又曰簡文輔政引高松為撫軍司馬桓溫擅率眾北伐簡文忌之松曰宜致書喻以禍福自當廻斾便於坐為書草曰寇讎宜平時會宜接此實為國遠圖經略之大莫能加斯非足下而誰又曰王恭將舉兵討譙王尚之以謀告殷仲堪桓玄玄等從之推恭為盟主剋期同赴京師時內外疑阻津邏嚴急仲堪之信因庾揩達之以斜絹為書內箭簳中合鏑漆之揩送於恭恭發絹文角戾不復可識謂揩為詐晉陽春秋曰劉弘為荊州剌史每有興發手書郡國叮嚀款密故莫不感悅顛倒恭赴咸曰得公一紙書賢於十部從事也沈約宋書曰劉穆之朱齡石並便尺牘嘗於高祖坐與齡石共荅書自旦至日中穆之得百函齡石得八十函而穆之應對無廢又曰徐湛之善於尺牘音詞流暢南齊書曰周顒字彥倫善尺牘沈攸之送絕交書太祖口授令顒裁荅齊春秋曰吳都張融字思光臨終及葬徵士何點使汝南風周英為書與融謝𤅢見歎曰此書雖漂宕不倫亦有破的後周書曰梁臺性果敢有志操不過識百字口占書詞意可觀又曰柳慶時父僧習為潁川郡地接都畿民多豪右將選官皆依倚貴勢競來請託選用未定僧習謂子曰權貴請託吾並不用其使欲還皆須有荅汝等各以意為吾作書也慶乃具書草云下官受委大邦選吏之日有能者進不肖者退此乃朝廷恒典僧習讀書歎曰此兒有意氣丈夫理當如是即依慶所草以報後唐書曰李襲吉掌太祖書記襲吉博學多通尤諳悉國朝近事為文精意練實動拘典故無所放縱羽檄軍書辭理尤健自太祖上源之難與朱溫不叶乾寧末劉仁恭負恩其間論列是非交相聘荅者數百篇警策之句播在人口文士稱之天復中太祖與朱溫脩好遣張特致書初敘相失之由毒手尊拳之句溫怡然大笑謂幕史敬翔曰李公斗絕一隅削弱如此襲吉一函抵二十萬兵勢所謂彼有人可當也如吾之智筭得襲吉之筆才虎傅翼矣翔赧然而退魯連子曰燕伐齊取七十餘城唯莒與即墨不下齊田單以即墨破燕軍殺將軍騎劫復齊城唯聊城不下燕將守城數月魯仲連乃為書著之於矢以射城中遺燕將書燕將得書泣三日乃自殺韓子曰鄭人有遺燕相國書者夜火不明因謂持燭者曰舉燭而誤於書中云舉燭非書意也燕相國受書而悅之曰舉燭高明者舉賢而任之因以之治也皇甫謚高士傳曰光武徵嚴光至司徒侯霸使西之曹屬侯子道奉書光不起於床上箕踞發書讀訖問子道曰君房素癡今為三公寧小差否子道曰位居台鼎足不癡也光曰遣卿來何言子道曰公聞先生至區區欲即詣迫於典司是以不獲願因日暮自屈語言光曰卿言不癡是非癡語天子徵我三辭乃來人主尚不見當見人臣乎子道求報光曰我手不得書乃口授之曰君房足下位至鼎司甚善懷仁輔義天下悅阿諛順旨腰領絕無它言使者嫌少可更足光曰買菜乎求益耶魯國先賢志曰孔翊為洛陽令置器水於前庭得私書皆投其中一無所發彈治貴戚無所迴避典略曰太祖嘗使阮瑀作書與韓遂於馬上其具草書成呈之太祖攬筆欲有所定而竟不能增損語林曰殷洪喬作豫章郡臨去郡人因寄百餘函書至石頭悉擲水中因視祝之曰沉者自沉浮者自浮殷洪喬不能作達書郵魏文帝與吳質書曰元瑜書記翩翩致足樂也魏文帝集曰上平定漢中族父都尉還書與余盛稱彼上地形勢觀其詞知陳琳所為李充起居誡曰床頭書䟽亦不足視或是他私密事不欲令人見見之縱不能宣誰與明之若有泄露則傷之者至矣嵇康與山濤書曰素不便書不喜作書而人間事堆案盈几不相酬荅則犯教傷義欲自勉強則不能久堪延篤荅張奐書曰離別三年夢想言念何日有違伯英來惠之書盈四紙讀之及覆喜不可言張奐與陰氏書曰篤念既密文章粲爛奉讀周旋紙獘墨渝不離於手金樓子曰劉睦能屬文作春秋旨義終始論及賦頌數十又善史書當世以為揩則及寢病帝驛馬令作草書尺牘十首古詩曰客從遠方來遺我一書札置之懷袖中三歲字不滅又曰客從遠方來遺我雙鯉魚呼兒烹鯉魚中有尺素書長跪讀素書書中意何如上言加飡食下言長相憶
