body:
  text: 偏霸部九後涼呂光崔鴻十六國春秋後涼錄曰呂光字世明略陽人其先自沛遷略陽因家焉世為氐酋父婆樓字廣平佐命前秦官至太尉光以趙建武中生於方頭夜有神光之異故名焉年十歲與諸童兒遊戲邑里為戰陣之法童兒咸推為主長而身長八尺四寸目重童子左肘有肉印沉粹疑重寬簡有大量人莫之知唯王猛異之曰此非常人言之符堅舉賢良除美陽令民夷憚愛鄰境肅清遷鷹揚將軍以功賜爵關內侯建元十九年以光為使持節西討諸軍率將軍姜飛彭晃杜進等步騎七萬討西域十二月至龜茲龜茲王帛純捍命不降光軍其城南五里為一營深溝高壘廣設疑兵為木被甲羅之壘上以為持久之計二十年五月帛純乃傾財寶請救於獪胡獪胡王遣弟率二十餘萬救之胡便弓馬善矛槊鎧如連鏁射不可入乃以革索為骨策馬擲人多有中者眾甚憚之姑默宿尉頭等國及諸胡外內七十萬人光遷營相接陣為勾鏁之法精騎為遊軍彌縫其闕秋七月戰于城西大敗之帛純逃奔王侯降者三十餘國進入其城城有三重廣輪與長安地等城中塔廟千數帛純宮室壯麗煥若神居胡人奢侈富於生養家有蒲桃酒至千斛經十年不敗士卒淪沒酒藏者相繼諸國貢款屬路立帛純弟震為王以安之光撫寧西域威恩甚著秦以光為使持節散騎常侍王門巴西諸軍事安西將軍西域校尉進封順鄉侯二十一年正月大饗文武博議進止眾咸請還光從之三月引還以駞二萬餘頭致外國珍異千餘品駿馬萬餘匹而還九月光入姑臧自領涼州牧刺史護羗校尉大安元年符丕以光為車騎大將軍涼州牧領護西域大都酒泉公光始聞符堅為姚萇所害舊袂哀怒三軍縞素大臨于城南傳檄諸州期孟冬大舉謚堅為文昭皇帝十月大赦境內改建元為大安十一月群寮勸進曰長虵未殄方掃清國難宜進位元台十二月上光為侍中中外都督隴右諸軍大將軍涼州牧酒泉公三年八月甘露降逍遙園白鷰翔于酒泉眾鷰成列而從之麟嘉元年正月麟見金澤縣百獸從之於是群寮奉請崇進名號光從之二月僣即王位于南郊大赦改元置官司丞郎以下猶攝州縣事三年九月大廟新成追尊父為景昭王祖為宣公曾祖為恭公高祖為敬公龍飛元年五龍見于浩舋群臣咸賀勸光稱號六月僣即天王位于南郊大赦改年備置群司立世子紹為太子四年九月光寢疾十二月疾甚立太子紹為天王光自號太上皇帝以子纂為太尉弘為司徒詔曰吾疾病不濟吾終之後使纂統六軍弘管朝政汝恭己無為委重二兄庶可以濟今外有強寇民心未寧汝兄弟輯睦則貽厥萬世若內相圖則禍不旋踵纂弘泣曰不敢有二心薨葬高陵謚武皇帝廟號太祖呂纂崔鴻十六國春秋後涼錄曰呂纂字永緒光之長庶子母趙淑媛少便弓馬不好書大安元年至于姑臧光臨薨執手戒之曰汝性麤武深為吾憂開基既難守成不易善輔永業勿聽讒言光薨紹祕不發喪纂排閤入哭盡哀而出紹懼以位讓之曰兄功高年長宜承大統纂曰臣雖長陛下國家之適不可以私愛而亂大倫驍騎呂超謂紹曰纂臨喪不哀步高視遠觀其舉止恐成大變宜早除之纂聞超謀遂率壯士數百踰北城攻廣夏門入自青角門昇謙光殿紹登紫閣自殺呂超出奔廣武纂遂僣天王位大赦改龍飛四年為咸寧元年謚紹隱王纂遊田無度荒躭酒色常與左右因醉馳獵於坑澗之間殿中侍御史王回扣馬諫不納番和太守呂超擅伐鮮卑思盤思盤訴超於纂纂召超入朝怒曰卿恃兄弟桓桓欲欺吾也要當殺卿然後天下可定超頓首曰不敢纂引諸臣讌于內殿呂隆屢勸纂酒已至昏醉乘步輓車將超等遊于內至琨華堂東閤車不得過纂親將竇川駱騰倚劍于壁推車過閤超取劍擊纂纂下車擒超超超刺纂洞胸奔于宣德堂將軍魏益入斬纂首以徇隆既纂位謚纂靈帝葬白石陵呂隆崔鴻十六國春秋后後涼錄曰呂隆字永基光弟寶之子既殺纂遂僣即王位大赦改咸寧三年為神鼎元年二月追尊父寶為文皇帝超有佐命之勳拜為侍中都督中外諸軍事輔國大將軍錄尚書事封安定公二年秦遣鴻臚恒敦拜隆征北大將軍河西諸軍事涼州牧建康公三年隆以二涼之逼遣超齎珍寶請迎于秦遣尚書左僕射齊難率步騎四萬來迎隆率戶一萬隨難東遷既至長安秦以隆為散騎常侍尚書公如故超為安定太守其後坐與兆興少子廣平公弼謀反誅呂光以乙酉歲據涼州至于是歲歲在癸卯凡一十九年後燕慕容垂崔鴻十六國春秋後燕錄曰慕容垂字道明皝第五子小字阿六敦母蘭淑儀垂少有器度長七尺七寸手垂過膝皝甚寵之常曰此兒闊達好奇終能破人家或能成人家故名霸字道業因墜馬傷前二齒後改名𡙇外以慕郤𡙇為名內實惡而改之尋以讖記之文去夬以垂為名稱尊號封吳王建熙十年以車騎大將軍敗桓溫於枋頭威名大震太傅上庸王評深忌之垂遂出奔秦符堅聞垂至大悅郊迎執手禮之甚重王猛惡垂雄略勸堅殺之堅不從以為冠軍將軍封賓都侯歷京兆尹符堅敗於淮南垂軍獨全堅以千餘騎奔之世子言於垂曰家國傾喪皇綱廢弛當隆中興之業建少康之功宜恭承皇天之意因而取之垂曰彼悉心投命若何害之乃以兵屬垂垂至澠池言於堅曰王師不利北境之民或因此輕動臣請奉詔輯寧朔裔且龍鄴舊都陵廟所在乞過展拜以申罔極堅許之權翼諫曰垂瓜牙名將今之韓白且世豪東夏志不為人下頃避禍歸誠非慕義也而恐冠軍之號不飽其志列地百里未滿其心且垂猶鷹也飢則附人飽便高颺遇風塵之會必有凌霄之志堅曰卿言是也但朕已許之匹夫猶重信況萬乘之主乎翼曰陛下重小信而輕忽社稷臣見其往不見其還關東之變垂其首乎自涼馬臺結草筏而渡至安陽脩牋於長樂公丕垂至館之於鄴西會符暉告丁零翟斌聚眾四千謀逼洛陽丕於是配垂兵二千遣廣武將軍符飛龍率氏騎一千為垂之副貳戒飛龍曰垂為三軍之統卿為垂之謀主符暉告急簡書相尋垂方圖飛龍停河內不進悉誅氐兵命左右殺飛龍濟河焚橋眾三萬至洛陽符暉閉門拒守不與交通翟斌率眾會垂勸稱尊號垂曰新興侯國之正統孤之君也若以諸君之力得平關東當以大義喻秦奉迎反正誣上自尊非孤心也乃自稱大將軍燕王承制行事翟斌為建義將軍封河南王弟德為范陽王眾至二十萬濟自石門長驅攻鄴元年正月朝群寮于清陽宮以暐在長安依晉愍帝在平陽中宗稱王改年建武故事改秦建元為燕元元年立太子寶為燕王太子攻拔鄴郛丕固守中城垂壍而圍之於魏郡肥鄉築新興以置輜重進師攻鄴開其西奔之路二年三月丕棄鄴奔并州以魯陽王和為南中郎將鎮鄴十二年垂定都中山建興元年正月群寮勸垂正尊號辛卯僭即皇帝位於南郊大赦改元立子寶為皇太子十年五月太子寶率眾八萬伐魏范陽王德為之後繼魏聞寶將至徙于河西寶臨河不敢濟引師還次於參合俄而魏軍大至三軍奔潰寶與德等數千騎奔免十一年三月垂大眾出參合太子寶出天門垂至參合見積骸如山設祭吊之死者父兄各皆號哭軍中哀慟垂慚憤嘔血因而寢疾築燕昌城而還寶等至雲中聞垂疾皆引歸及垂于平城夏四月薨于上谷俎陽年七十一謚武成皇帝廟號世祖晉書曰垂以太元二十一年死在位十三年墓曰宣平陵慕容寶崔鴻十六國春秋後燕錄曰慕容寶字道祐垂第四子元璽四年生于信都少輕果無志操好人佞己叚后謂垂曰太子姿質雍容柔而不斷非濟世之雄遼西高陽陛下兒之賢者宜擇一樹之垂不納謂曰汝謂我為晉獻公乎建興十一年四月僭即皇帝位大赦改為永康元年寶遣將軍趙王麟逼叚后曰常謂主上不能嗣守大統今竟能不宜早自裁以全叚氏后怒曰汝兄弟尚逼殺母豈能保守社稷吾豈惜死念國滅不久遂自殺八月立妃叚氏為皇后濮陽公榮為皇太子二年正月魏使脩和寶不許二月魏攻中山其夜尚書慕容皓謀殺寶立趙王麟寶與太子榮等萬騎就清河王會于薊以開封公慕容詳守中山五月詳遂僭稱尊號九月趙王麟率眾入中山殺詳麟復僭尊號中山飢麟出據新市與魏師戰于義臺敗績南奔魏入中山寶遣御史中丞兼鴻臚魯遂持節授司徒范陽王德丞相冀州牧承制南夏封公侯牧守三年二月寶發龍城以撫軍慕容騰為前軍步騎三萬將南伐次于乙連長上叚速骨宋赤眉因民之憚遠役殺司空樂浪王宙眾既幸亂投伏奔走寶馳還龍城又與長樂王盛等南奔尚書蘭汗殺速骨等十餘人奉太子榮承制大赦遣迎寶還于薊寶欲北還盛等咸以汗忠款虛實未明宜就范陽王德寶從之乃自薊而南四月寶至鄴鄴中遺民固請留之寶不從南至黎陽城西聞范陽王德稱制懼而退乃還龍城次于廣都蘭汗又遣左將軍蘇超迎寶具申款誠忠節無差寶於是命發汗遣弟難率五百騎逆寶至龍城難引寶入于外邸殺之年四十四殺太子榮及王公卿士百餘人汗自稱大將軍大單于昌黎王號年青龍七月長樂王盛襲誅汗盛即位偽謚寶惠愍皇帝廟號列宗慕容盛崔鴻十六國春秋後燕錄曰慕容盛字道運寶之庶長子秦建元十年生于長安二十年符堅誅慕容氏盛奔東歸至垂問以西事畫地成圖垂笑謂之曰昔魏撫明帝之首遂乃侯之祖之愛孫有由來矣於是封長樂公建興六年領北中郎鎮薊進爵為王及寶為蘭難所殺盛馳赴哀盛潛結大眾謀討難及汗等斬之建平元年七月告成宗廟大赦改青龍元年謙揖自卑不稱尊號以長樂王稱制諸王貶爵為公東陽公慕容根等九十八人上尊號盛不許十月根等又請盛許之丙子僣即皇帝位正月朝群臣于承乾殿大赦改建平元年為長樂元年二年正月大赦盛去皇帝之號稱庶民天王三年八月右將軍慕容國謀率禁兵襲盛前將軍叚璣等因眾心阻動潛於禁中鼓譟大呼盛聞變率左右出戰眾皆披潰一賊從闇中擊盛傷足遂取輦昇前殿召叔父河間公熙囑以後事熙未至而薨年二十九偽謚昭武皇帝廟號中宗晉書曰盛幼而羈賤流漂長則遭家多難夷險安危備嘗之矣懲寶闇而不斷遂峻極威刑纖介之嫌莫不裁之於未萌防之於未兆於是上下震恐人不自安雖推忠誠親戚亦皆離貳舊臣靡不夷滅安忍無親所以卒於不免是歲隆安五年也慕容熙崔鴻十六國春秋後燕錄曰慕容熙字道文一名長生垂之少子燕元二年生于常山建興八年封河間王永康初隨寶奔龍城拜司隸校尉長樂元年遷僕射中外督領昌黎尹盛薨遂僭即皇帝位大赦改長樂三年為光始元年二年正月熙引見州郡耆舊于東宮問以民所疾苦司隸部民劉瓚對問稱旨拜帶方太守是春大治宮室四月立符貴人為昭儀五月築龍騰苑廣十里餘役徒二萬起景雲山于苑內又起逍遙宮甘露殿連房數百觀閣相交鑿天河渠引水入宮又為符昭儀鑿曲光海清涼池季夏暑熱士卒不得休息𣎅死者半四年二月昭儀符氏卒符貴嬪為皇后九月符后遊畋熙從之北登白鹿山東過青嶺南臨滄海冬十一月乃還百姓苦之士卒為虎狼所害及凍死者五十餘人五年十月擬鄴之鳳陽作弘光門累級三層建始元年正月大赦天下三月太史丞梁延年夢月化為五白龍夢中占之曰月臣也龍君也月化為龍當有臣為君寤而告人曰國祚其將盡乎是日符后起承華殿高承光一倍負土於北門土與穀同價典軍杜靜載棺詣闕上書諫熙大怒斬之后嘗季夏思凍魚鱠冬須生地黃皆下有司切責不得加以大辟四月符后卒熙悲號躃踊若喪考妣擁其尸而撫之曰體已就冷命遂斷矣於是僵仆絕息久而乃蘇服斬縗食粥百寮宮內設位哭臨有司桉檢哭者有淚則不無淚則加罪群臣振懼莫不含辛以為淚高陽王妃張氏熙之嫂也美姿容熙欲以為殉乃毀其禭鞾中有弊氈遂賜死三女叩頭求哀熙弗許營陵周輪數里下固三泉內圖畫尚書八座之像熙曰善為之朕將隨后入此陵轜車高大毀北門而出中衛將軍馮躍左衛將軍張興先皆坐事亡奔以熙政之虐也與躍從兄萬泥等三十二人結盟推夕陽公慕容雲為主發尚方徒五千人分屯四門入宮授甲閉門拒守中黃門趙洛生奔告熙熙曰此鼠盜耳朕還當誅之乃收髮貫甲馳還赴難夜至龍城攻北門不剋遂入龍騰苑左右潰散熙微服逃于林中為人執送雲等殺之年二十三雲葬之徽平陵謚曰昭文皇帝晉書曰垂以孝武帝太元八年僭立至熙四世凡二十四年以安帝伐熙二年滅慕容雲崔鴻十六國春秋後燕錄曰慕容雲字子雨寶之養子祖父和高勾麗之支庶自云高陽氏之苗裔故以高為氏寶之為太子雲以武藝給侍東宮永康初拜侍御郎以疾去官及熙葬后馮躍詣之告以大謀雲懼躍等強之四月即天王位復姓高氏大赦改建始元年為正始元年國仍號大燕以馬躍為侍中中外都督錄尚書事武邑公二年慕容歸為遼東公主燕之宗祀三年冬十月雲臨東堂幸臣離班桃仁懷劍執紙而入稱有啟抽劍擊雲雲以几拒班桃仁進而殺之推立馮氏為主躍即位謚為懿惠皇帝始垂以丙戍之歲建號中山馮躍即位之歲歲在己酉二十四年
