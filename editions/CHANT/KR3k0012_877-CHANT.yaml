body:
  text: 咎徵部三風尚書洪範咎徵曰蒙恒風若君行蒙暗則常風順之也禮記月令曰孟春行夏令飄風暴雨揔至季秋行春令則煖風來至京房易傳曰后專拜厥風疾而樹不搖不循道厥風不搖草京房別對災異曰廻風起何風者天之號令也當直而正普而不偏佞人眾君迷惑則迴風起不救則致逆風起其救也用公直黜邪枉此災消矣春秋潛潭巴曰疾風拔木讒臣恣忠臣辱史記曰殷紂末年大風飄牛馬壞屋拔樹飛颺數十里周滅之又曰秦始皇二十八年渡淮至衡山浮江至湘遇大風愽士云堯女舜妻葬於此始皇怒使刑人三千人伐湘山樹明年東遊至愽浪沙中為盜所驚乃令天下大索焉又曰項羽背約都彭城漢祖伐之圍漢三重大風從西北起折木發屋楚軍大亂漢書曰呂后崩後呂產執北軍朱虛侯劉章入宮衛帝見產廷中遂擊產走大風起從官莫敢鬥章逐產殺之又曰昭帝時燕王旦都葪大風拔宮樹十六吹壞城樓王反伏誅又曰濟北王興居反始舉兵太風從東吹其旌旗飛上墮城西井中馬皆悲鳴不進李廓切諫王不聽俄而兵敗自殺又曰平帝元始四年冬大風吹長安城門屋瓦盡又曰王莽天鳳年大風拔樹飛北闕城門屋瓦緣邊大飢人相食又曰地皇四年大風毀王路其年司徒王尋司空王邑守昆陽光武起兵南陽至昆陽攻之大風雷屋瓦皆飛雨下如注滍川盛溢尋邑乘死人而渡王尋見殺軍人皆散走王邑還長安莽敗俱殺之後漢書曰安帝時京師大風拔南郊梓樹九十六後海賊張伯路略九郡魏略曰正始元年商風大起數十日發屋拔樹動太極殿東閤正大會風又甚傾盃按曹爽將誅之徵母丘儉反景王率眾征之晉書曰吳孫權太元初大風江海湧溢平地水深八尺拔高陵樹二千株動吳城兩門瓦飛落是時賦役繁重明年權死又曰孫休永安元年十二月孫綝出屯武昌衛士施朔告綝欲反綝聞之大懼是夜大風四轉五復發屋折木揚沙石綝益恐明日臈會稱疾休強起之不得已乃至會張布丁奉自左右縛之綝叩頭請為奴不許乃斬之又曰孫皓末年狂暴丞相陸抗與大司馬大丁奉謀欲廢皓太史令陳苗奏久陰不雨風氣迴逆將有陰謀皓深驚懼抗遂寢其事又曰晉武帝咸寧三年八月大風拔木暴寒且冰其年吳將孫慎入江夏太康末京都風發屋拔木又曰惠帝永康中六月飄風吹賈謐朝衣飛數百丈明年謐誅其年十一月京都大風發屋折木十二月愍懷太子幽于金墉又曰永康元年四月張華舍颻風起折木飛繒軸六七枚是月趙王倫矯制廢賈后害張華裴頠等又曰趙王倫驀位改元建始祠太廟風暴起黃塵四合其年倫誅又曰元帝永昌中大風拔木壞屋拔御道柳百餘株時王敦害尚書刀恊僕射周顗等又曰成帝時劉胤鎮尋陽有迴風從東來入胤舡中西出狀如疋練長五六丈術人戴洋曰有刀兵死喪之亂頃胤為郭默所害王隱晉書曰王澄在荊州率眾軍次江陵之東堂皇北救國難飄風折其節後為王敦所殺晉中興書曰桓玄入建康宮逆風迅激旌旗不亡儀飾一皆傾偃是月酷寒此日尤甚急恒寒若之應也出遊門外飄風飛其儀蓋又曰符堅三年長安大風堅宮中樹悉拔是歲王猛死沈約宋書曰孝武帝大明七年風吹初寧陵隧口左標折鍾山通天臺新成飛倒散落山澗又曰徐羨之文帝初作楊州有摽風自西明門須臾入城直至廳前繞帽及蓆遙遠雲際尋羨之為文帝所誅又曰文帝元嘉九年壽陽驟雨有迴風雲霧廣三十步從南來至城西迴散滅當其衝者室樹木皆摧到其年晉寧太守松子反又曰元嘉三十年正月朔上會群臣於大極殿有大風拔木雷電晦瞑凍殺牛馬及人明年太子劭逆也又曰孝武時柳太尉乘車行還於庭中洗車有大風從門而入直來衝車有聲車蓋覆向天其年明帝立合門被殺又曰竟陵王誕文帝子孝武時鎮京口夜大風吹落屋瓦城門鹿床倒覆反鎮廣陵將入城衝風暴起俄而反伏誅又曰順帝昇明二年飄風起建康縣吹帛一疋入雲風止下於御道上俄而宋授禪其君為疋夫之象齊書曰明帝建武末大風拔東宮門外楊樹齊木行東木位其衰乎至東昏侯立狂亂被害又曰東昏侯寶卷永元元年始安王遙光知政入城有飄風飄儀繖出城外少日而反被殺又曰崔惠景圍臺城有一五色幡風吹飛翔在雲中半日乃下眾見皆驚怪相謂曰幡者事當飜覆數日惠景敗隋書曰梁武帝太清二年九月邵陵王綸出頓丘下其日天色陰慘風塵蕭瑟咸以出軍不祥十一月綸至江遇風亟溺人馬多損又曰大寶元年邵陵攜王綸出鎮南浦僣擬施幄帳無何風起吹投於江後為侯景將任約所襲綸敗走保汝南為魏將侯萬通所攻城陷被殺又曰元帝承聖三年帝觀講武于津陽門風雨惣集普天昏暗旗幟飄亂帝趍駕而廻無復次序還宮至城風雨隨息竊驚俄為魏軍所執送岳陽殺之又曰元帝徐妃初嫁夕車至州西疾風大起發屋折木無何雪霰交下帷簾皆白及還之日又大雷震西州廳兩柱辭以為不祥妃竟以淫穢自殺又曰梁岳陽王詧昭明太子之子西魏立為梁王其年至江陵結營夜疾風甚雨水平地數尺其月詧乃夜遁為諸蠻斷於山路墜馬僅得脫又曰侯景篡梁拜南郊登壇大風拔木物盡吹散見者莫不驚駭俄而景被殺崔鴻十六國春秋曰北燕馮跋太平二十一年二月飄風入征南大將軍上黨公姚昭宅至于司徒中山公宅而散上黨公家人問太史閔尚曰風者天之號令所以吹塵去穢除姦慝之禍至二十二年跋弟弘篡立以姚昭為大司馬昭貪暴其子肇諫曰大人不聞飄風之怪昭不納明年馮弘殺昭并諸子姪四十餘人又曰前秦符生壽光元年長安大風發屋拔樹行人顛頓宮中奔擾或稱賊至門晝閉五日乃止生推告賊者殺之刳出其心左光祿大夫強平諫曰元正盛曉日有蝕之正陽神朔風昏大起願陛下務養元元生大怒鑿其頂而殺之又曰符堅建元十八年三月大風吹壞長安西門拔宮中大樹倒根於上至二十一年堅為姚萇所殺又曰李期玉恒四年三月大風拔樹發屋四月為季壽所殺又曰蜀李壽漢興三年二月大風暴雨震端門至六年壽死子勢立三年為晉將桓溫所滅又曰前趙劉曜葬其父母費用億計發掘古冢暴骸原野哭聲盈衢大霖雨震曜父墓門屋大風飄發其父寢堂于外垣五十餘步松柏眾木植已成林至是悉枯死曜竟為石勒所擒又曰劉曜末年與石季龍對軍不撫士眾專與嬖臣愽飲左右諫之以為妖言斬之大風拔木昏霧四塞須臾見擒又曰前涼張玄靜四年六月大風震雷晦冥宮中雨水深四尺時宋混兄弟擅權玄靜虛坐而已後魏書曰孝文太和中安定王禎出為湘州刺史至日暴風大雨凍死者數十是月禎發背死後宣武延昌三年章武王熙除湘州刺史七月入理其日大風雨凍死者二十餘人驢馬凍死數十熙聞祖父禎前事心甚惡之俄而舉兵反伏誅齊書曰後主天統年大風晝晦發屋拔木和士開譖趙王叡生坐死士開出入宮掖胡太后幸之琅邪王儼矯詔殺士開於南臺儼伏誅又曰後主末年安德王延宗鄴下宅被風吹其廳棟榱相連置外數百步後主敗為王二日被擒入周賜死陳書曰陳文帝天嘉三年梁永嘉王將司空王琳與陳將侯禎對軍其日東西風吹琳舟艦琳軍大敗又曰天嘉六年大風西南吹靈臺候樓倒又曰後主至德年風吹朱雀門倒又禎明年大雨風自西北激濤水入石頭城時後主昏誅諫臣沈客卿明年陳亡又曰隋文帝開皇中宮都大風發屋拔木時獨狐皇后干預政事後宮多有濫死又楊素邪佞又曰開皇末泰州商胡乘騾遇暴風飄上空數百丈俄而墜下人騾俱碎時晉王廣矯詐取媚謀危太子勇勇竟廢死立廣為太子淮南子曰人主之精通于天故誅暴則多飄暴風京房易妖占曰獄吏暴害人臣專政暴風折木又曰暴風析柱邑大憂暴風折木吹草上屋且有急令獨祿風入宮人主死飄數相從入殿門有凶疾憂以此亡飄留君門一日一夜不去亂兵在門獨祿風者回轉風也京房別對災異曰狂風發何人君政教無法為下所逆則致狂風發泄其救也脩政教聘賢士狂風消矣又曰人君賊罰良善政教無常使命數變則致暴風折木發屋鳴瓦或害殺人其救也脩舊典任忠臣思過自改則風災消六韜曰人主好田獵畢弋則歲多大風飄牛馬發屋拔木民人飛揚數十里漢書曰文帝時吳暴風雨壞城門吳王濞反卒服誅其年楚王都彭城大風毀市門殺人後王與吳王濞謀反同誅京房曰眾逆同志暴風將起晉書曰孝武太元二年春暴風折木發屋夏又暴風揚沙石三年又暴風折木發屋時符堅強盛又曰安帝元興初夜大風雨大舡門飛落明年桓玄篡位沈約宋書曰前廢帝義符時正月朔朝暴風發殿前會席翻楊數十丈至五月帝廢為滎陽王梁書曰昭明太子孫棟簡文大寶二年八月為侯景廢棟時與妃張氏鋤菜而法駕至驚懼而泣昇輦及即位昇武德殿備陳文物於庭有暴風自東來吹旌旗悉倒又有迴風從地踊起折竿翻飛華蓋經出端門不見陪列者驚駭時人知其不終十一月景廢棟景乃篡立崔鴻十六國春秋曰南燕慕容超僣位祠南郊將登壇大風暴起天地晝昏行宮羽儀皆壞裂後超為晉將劉裕所滅斬於建康市又曰慕容盛建平元年八月暴風拔闕前七大樹其月步兵校尉馬勒謀反伏誅至長樂三年盛為叚纘于泰所殺又曰後燕慕容垂遣太子寶伐魏次參合忽大風黑氣狀若堤防臨覆軍上沙門支曇猛言於寶曰風氣暴逆魏軍將至宜遣兵禦之寶笑而不納俄黃霧四塞日月晦冥魏師至三軍奔潰其年垂死又曰石季龍死子遵立其月夜暴風拔樹震電雨雹俄而遵見殺隋書曰太子勇朝高祖於仁壽宮還至岐山妃元氏止干周大王廟因縱騎獵須臾暴風折樹雨雪深至人膝天晦暝咫尺不相見妃因心痛再宿而死勇後廢為庶人煬帝殺之又曰太子勇廢立晉王為皇太子當受冊高祖曰吾以大興公成帝業令出舍大興縣其夜烈風大雪地裂山崩民舍多壞死者百餘又曰煬帝大業十四年三月在江都蜀王秀囚於右驍勇營暴風吹塵晝昏識者大以為暴秀謂防者曰吾生年已來未見斯變亡國之禍應在旦夕其日夜宇文化及司馬德戡裴乾通反唐書曰玄宗天寶十一年潼關口女媧墓因風雨失所在後至肅宗乾元二年五月一日其墓復舊黑風後漢書曰世祖太常元年二月京師有黑風竟天廣五十餘丈其年四月沮渠蒙遜寇張掖古今五行志曰大業十三年二月李密於鞏縣南設壇刑白馬祭天稱魏公置僚佐改元升壇時有黑風從南北暴至吹密衣冠及僚屬皆匍匐於壇下沙塵暗天咫尺不相見良久息賊軍惡之俄而密敗赤風春秋潛潭巴曰天赤有大風發屋折木兵大起行千里漢書曰建元四年夏有風赤如血六月旱崔鴻十六國春秋曰張天錫十一年有赤風昏闇至十三年符堅滅之雷古今五行記曰夏桀末年雷震殺人其年湯放之左傳曰僖公十五年九月晦震夷伯之廟董仲舒以為夷伯季氏之陪臣不當有廟明絕去僣差之類河圖曰臣僣奢下犯主則雷電擊朝京氏易五星占曰雷霆殺人何夫雷天拒難之折衝也人君承用節度即雷風以節暴行威福則雷霆殺人其救也議獄綏死則災銷矣京房別對災異曰雷鳴連而不絕者何夫雷鳴萬里懼今鳴不絕此謂人君行政事民不恐懼也故致游雷之災雷當先電而鳴今雷電俱出或鳴而後電何此謂執法者貪所致災也後漢書曰桓帝建和三年六月雷震憲陵寢屋先是太后聽兄梁冀桓殺李固杜喬魏志曰魏明帝景初中洛陽水橋同日俱震時勞役大起古今五行記曰吳孫權赤烏八年夏雷震宮門柱又擊南津橋至十三年廢太子和立子亮又曰晉惠帝永康初六月震崇陽陵標西南五百步標破時賈后陷害大臣終見殺晉中興書徵祥說曰元興三年永安王皇后至自巴防將設威儀入宮天大雷震人馬多死沈約宋書曰元嘉十四年震初寧陵標四破至地十七年廢大將軍彭城王義康後魏書曰太祖天賜六年震天安殿東序帝惡之令佐校以衝車攻殿東西兩序屋毀之唐書曰太宗貞觀十一年四月震乾元殿前槐樹冬雷京房易妖占曰天冬雷地必震教令撓則冬雷民飢漢書曰昭帝五年十一月大雷震十二月丞相王訢薨後漢書曰安帝永初六年十月郡國大雷延光四年十月郡國凡三十雷時鄧太后專政帝不親萬機晉書曰吳孫亮建興初十二月大風雷亮見廢又曰愍帝建興初十一月大雨雷震劉向以雷二月出八月入於此月雷電者陽不閉藏失節之異是時九州幅裂至四年帝降劉曜害之晉中興書徵祥說曰太興元年十一月京都雷震凡未應雷而雷皆恒燠也又曰升平二年十一月雷時皇太后臨朝政舒緩也崔鴻十六國春秋後趙錄曰建武十三年十二月雷大雨霖石虎問佛澄此何災也澄曰其為我耳至戊子而卒又曰前秦符登攻姚萇冬大雷姚萇營殺七人萇軍大敗霹靂春秋合誠圖曰霹靂擊於宮殿者妃后爭政春秋潛潭巴曰霹靂擊宮失君精泄下有謀起宋均曰君精泄去也春秋繁露曰王言不從革而秋多霹靂霹靂者金氣也其音商故應之續晉陽秋曰太元五年霹靂含章殿四柱殺內侍二人晉朝雜事曰元康七年霹靂破高禖石占曰賈后將殺愍懷趙書曰前石時暴風雷雨霹靂雲臺壞署婦人震死瘞之三日重霹靂出之蔡邕封事曰臣聞天降災異緣象而至霹靂數發殆刑誅繁多之所生無雲而雷洪範五行傳曰秦二世元年無雲而雷雷陽也雲陰也有雲然後有雷有臣然後有君無雲而雷示君獨處無民臣也史記曰晉莊伯八年無雲而雷十年莊伯以曲沃叛又曰幽公十二年無雲而雷至十八年晉夫人秦嬴賊君于高寢又曰秦二世時無雲而雷二世不恤天下有怨叛之心是歲陳勝起兵天下亂漢書曰武帝征和四年天清晏無雲有雷聲聞四百里至後年侍中莽何羅反又曰成帝元延元年夏無雲而雷光耀四照昏乃止是歲趙飛鷰害後宮皇子後漢書曰獻帝初平四年無雲而雷時天下大兵人民相食晉書曰惠帝太安二年四月諸將立李特子雄為王八月天中裂為二無雲而雷成都王穎舉兵逼京師又曰太安二年無雲而雷其年張方入京燒服御死者萬計石超逼帝幸于緱氏王師不利大飢人相食梁書曰大通六年十二月西南無雲有聲如雷至地是年魏分為二東西各主崔鴻十六國春秋曰張重華三十九年十月無雲而雷聲皆東南引四十一年重華死子曜靈立為叔祚篡之又曰南燕慕容超太上二年無雲而雷七年為晉將劉裕所殺隋書曰文帝開皇二十年二月無雲而雷四月有聲如瀉水自南而北又曰無雲而雷其年立晉王廣為太子皇太子勇廢為庶人唐書曰則天時宗楚客以佞幸為內史受命之日無雲而雷聲震裂未周歲而誅
