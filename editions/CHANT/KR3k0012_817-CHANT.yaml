body:
  text: 布帛部三羅釋名曰羅文羅䟽也纚𥱰也麤可以𥱰物也魏文帝詔曰江東為葛寧比羅紈綺縠魏志曰自公侯已下大夫以上皆服綾錦羅綺金縷之物自是以下雜綵之服通于賤人也晉書曰謝玄好帶紫羅香囊叔父安惡之不欲傷其意因賭而焚之遂絕晉令曰第一品已下不得服羅綃東宮舊事曰太子納妃絳真文羅一幅帔一絳杯文繡羅一幅帔一絳真衣羅袴一王孫子曰隨珠曜日羅衣從風燕丹子曰荊軻左手把秦王袖右手椹其胸秦王曰願聽琴聲而死召姬人鼓琴聲曰羅縠單衣可掣而絕淮南子曰齊俗有繁繡羅紈漢武內傳曰帝以七月七日掃除宮掖之內設大床於殿上以紫羅薦地燔百和香燃九微燈以待西王母西京雜記曰趙飛鷰為皇后女弟在昭陽殿遺書曰今日嘉辰貴姉懋膺洪冊上襚三十條以陳踊躍金花紫羅面衣織成襦羅帷羅幌羅帳羅幬黃庭經曰黃庭為不死之道受者先齋九日然後受之結盟立誓期以勿渫古者盟以玄雲之錦九十尺金簡鳳文羅四十尺徐延年別傳曰道士姓徐名延年仙人以新黃羅衣衣之王子年拾遺記曰周氏王五年因祗國獻女工一人善於工巧體貌輕潔被纖羅新繡之衣又曰吳主孫權居昭陽宮趙夫人乃織羅縠累月而成裁之為幔內外視之飄飄如煙氣輕動而房內自涼異苑曰張仲舒為司空廣陵城北元嘉年七月中輒見門側有赤氣赫然後空中忽雨絳羅於其庭內廣七八分長五六寸皆以箋紙繼之廣長亦與羅等紛紛甚張惡而焚之猶有數片府州多相傳示張經宿暴疾而死世說曰武帝常降王武子供饌悉用琉璃器婢子百餘人皆綾羅袴以手擎飲食宋玉風賦曰躋于羅帷經于洞房司馬相如美人賦曰女以玉釵挂臣冠羅袖指臣衣張衡南都賦曰羅襪懾惵而容與古詩曰明月何皎皎照我羅床帷古歌詩曰大婦織綺羅中婦織流黃小婦無所作挾瑟上高堂阮籍詩曰西方有佳人皎皎如日光被服纖羅衣左右佩雙璫綺廣雅曰鬱金流黃綦綺說文曰綺文繒也釋名曰綺踦也其文欹邪不順經緯之縱橫也有杯文形似杯也有長命其采色相間皆橫也福言長之者服之使人命長本造者之意也有棋文方文如棋也漢書曰班伯侍講金華殿在織襦紈袴之間非其好也又曰賈人不得衣錦繡綺縠又曰孝文六年遺匈奴書使者言單于服繡祫綺衣東觀東記曰馬后袍極麤䟽諸主朝望見反以為綺后曰此繒染色好故直用之漢書儀曰祭天用六綵綺席六重長一丈干寶晉紀曰初洛中名服有白石綺織者尤之曰石非繒綵之稱晉令曰第三品已下得服雜杯之綺第六品已下得服七綵綺東宮舊事曰太子納妃有七綵杯文綺被一絳石杯文綺被一七綵杯文絳袴長命杯文綺袴司馬相如長文賦曰張羅綺之幔帷垂楚組之連綱班固西都賦曰紅羅颯纚綺組繽紛潘岳秋興賦序曰余兼虎賁中郎將寓直散騎之省珥蟬冕襲綺紈之士此馬遊處古詩曰客從遠方來贈我一端綺文作雙鴛鴦裁為合歡被又曰緗綺為下裳紫綺為上襦曹植詩曰西北有織婦綺縞何繽紛清晨秉機杼日暮不成文織成廣雅曰天笁出細織成續漢書輿服志曰虎賁武騎皆鶡冠虎文單衣襄邑歲獻織成虎文魏略曰大秦國用水羊毛木皮野繭絲作織成皆好色魏略曰大秦國出金織成帳吳時魏國傳曰大秦國天笁國皆出金縷織成晉後略曰張方兵入洛諸官府大劫掠御寶織成流蘇皆分割為馬棧矣晉令曰織成衣為禁物搜神記曰陳節謁諸神東海君以織成青襦一領遺之西京雜記曰宣帝被收繫郡岳臂上猶帶史良娣合采婉轉絲繩係身毒國寶鏡一枚大如八銖錢及即位常以琥珀笥盛之緘以戚里織成一曰斜文織成西京雜記曰趙飛鷰為皇后其女弟昭儀在昭陽殿遺飛鷰書曰今日嘉辰貴姉懋膺洪冊上襚三十五條以陳踊躍之志內有織成下裾杜蘭香傳曰蘭香降南郡張碩與碩織成袴衫鄴中記曰石虎冬月施流蘇斗帳懸金薄織成腕囊又曰石虎皇后出女妓二千為鹵簿冬月皆著紫綸巾熟錦袴腳著五文織成靴又曰石虎獵著金縷織成合歡袴高柔婦與柔書曰今奉織成袜一量綾釋名曰綾者其文望之似冰凌之理也漢官典職儀曰尚書郎直供青縑白綾被魏略曰大秦國有金縷繡雜色綾其色利得中國絲素解以為胡綾魏志曰楊阜字義山為城門校尉常見明帝著帽被縹綾半袖阜問帝曰此於禮何法服也帝默然晉咸康起居注曰詔臨邑使主范柳所貢物多絳綾是其所珍可籌量增賜晉安帝紀曰桓玄幼時會于西堂設伎樂上施絳綾帳縷金以為飾晉脩復山陵故事曰帝改服著白綾帽荀勗為晉文王與孫皓書曰餉雜色綾十端後魏書曰辛穆字叔宗舉茂才為雍州別駕初隨父在下邳與彭城陳敬文友善敬文弟敬武少為沙門從師遠學經久不返敬文病臨卒以雜綾二十疋託穆與敬武穆久不得見經一十年始於洛陽見敬武以物還之封題如故世稱廉信唐書曰太宗初七品以上服龜甲雙具十花綾其色綠九品已上服絲布及雜小綾其色青又曰長慶中淅西觀察使季德裕上表曰臣當道奉詔更令織定羅絲袍叚及盤絛綾一千疋況立鵝天馬豹盤絛文彩珍奇只合聖躬自服今所織千疋費用至多在臣愚誠亦所未諭乞酌臣當道物力所宜更賜節減即海隅蒼生無不受賜詔許罷進盤絛綾一千疋漢武內傳曰西王母侍女服紺綾之袍西京雜記曰霍光妻遺淳于衍散花綾二十五疋綾出鉅鹿陳寶光妻傳其法霍顯召入其弟使作之一疋直錢一萬又與綠綾七百端直錢百萬符丕荅謝玄書曰今往大文羅大絞綾各五疋縠三禮圖曰五綵方山冠以綵縠為之說文曰縠細繒也釋名曰穀粟也其形戚戚如也戰國策曰計見齊宣王宣王曰願聞先生直方正諫計曰王之憂國愛民不如王之愛一尺之縠王使人為冠不使左右便僻而使工者以為能也今治齊國非左右便僻無使也故王之愛民不如一尺之縠事具冠門漢書曰江充召見太一宮自請願以所常被服衣冠見上上許之充衣紗縠單衣東觀漢記曰建初二年詔齊相其止物復送冰紈方空縠董巴輿服志曰羽林左右監左右虎賁皆冠鶡紗縠單衣魏志曰袁術遂僣號荒侈滋甚後宮數百服綺縠餘梁肉楊子法言曰或曰霧縠之麗曰女工之蠹潛夫論曰小民或刻剝綺縠以成榆葉水波文抱朴子曰勁弩之餘力不能洞霧縠宋玉風賦曰主人女翳承日之華更被丹縠之單衣司馬相如子虛賦曰雜羅綃垂霧縠言細好如霧出以復須也劉楨魯都賦曰其女工則絳綺縠荀勗為晉文王與孫皓書曰餉縠三端紗東觀漢記曰馬融愽洽通儒教養諸生千數融好侈飾常施絳紗帳前授生徒後列女樂晉書曰武帝泰始九年帝多簡良家子女以充內職自擇其美者以絳紗繫臂梁書曰王僧孺幼貧其母鬻紗布以自業事具鹵簿門後魏書曰游明根以年踰七十表求致仕優詔許之引入陳謝悲不自勝帝言別殷勤仍為流涕賜青紗丹衣委貌冠被褥錦袍等物北齊書曰琅邪王儼字威仁武成第三子拜京畿大都督領軍大將軍領御史中丞遷大司徒初從北宮出將上中丞凡京畿步騎領軍之官屬中丞之威儀司徒之鹵簿莫不畢備帝與后在華林園東門外張幕隔青紗步障觀之北史齊盧道虔娉妻元氏甚聰悟常升高座講老子道虔從弟元明隔紗帷以聽焉唐書曰太宗幸蒲州刺史趙元揩服黃紗單衣迎謁路左東宮舊事曰皇太子初拜有絳紗單衣王子年拾遺記曰漢武帝思李夫人不可復得詔董仲君曰朕思李氏其可得乎仲君曰可遙見而不可同帷幄有潛英石色青輕如毛羽寒盛則石溫暑盛則石冷刻之人像不異真人使此像往則夫人至矣乃遣人至海經年而還得此石命工衣李夫人彩刻成置於輕紗幕裏宛若生時帝大悅又曰江漢之民至暮春上巳之日禊集之祠或結五色紗囊盛食沉於波中以言蛟龍水虫畏之不侵食也蔡克別傳曰克字子尼體貌尊嚴莫有媟嫚高平劉整雋才白衣居家車服奢麗謂人曰紗縠吾之常服耳遇蔡子在坐而經日不自安齊諧記曰餘杭縣有一人姓沈名蹤與父同入山至夜二更中忽見一人著紗帽披絳綾袍云是鬭山王鬭山在餘杭縣秦記曰符堅以太常韋逞母宋氏傳其父業周官音義乃就宋家立講堂書生百人隔絳紗幔而受業焉綃毛詩義䟽曰楊之水素衣朱繡繡當為綃綃綺也禮記玉藻曰君子狐青裘豹襃玄綃衣以裼之君子大夫士也綃綺屬也染之於玄以狐青裘相宜也廣雅曰綃謂之緗晉令曰第六品已下不得服羅綃王子年拾遺記曰燕昭王二年廣延國來獻善舞者二人昭王處以單綃華幄又曰吳主孫權居昭陽宮倦暑乃褰紫綃之帷曹植洛神賦曰踐遠遊之文履曳霧綃之輕裾綈說文曰綈赤黃色也釋名曰綈似𧋘虫之色綠而澤也史記曰范睢改名為張祿相秦秦伐魏魏使須賈於秦睢為微行獘衣徒步入邸見須賈賈驚曰范叔無恙乎今叔何事睢曰為人賃賈意哀之留坐飲食曰叔寒如此哉乃取其綈袍以賜之後睢見賈賈頓首言死罪睢曰公所以得不死者以綈袍戀戀有故人之意故釋公漢書曰文帝身衣弋綈如淳曰弋帛也漢書儀曰太官湯官奴婢各三千人大置酒日皆綈褠蔽膝漢書儀曰印綬盛以篋篋以綠綈白表裏西京雜記曰漢制天子玉几冬則加綈錦其上謂之綈几諸侯皆以竹木為之不得加綈錦之飾王子年拾遺記曰漢成帝於太液池傍起宵遊宮以漆為柱鋪黑綈之幕又造飛行殿所幸之宮咸以氈綈籍地惡車轍馬跡之喧也竹林七賢論曰舊俗七月七日法當曬衣諸阮庭中爛然莫非錦綈阮咸時總角乃豎長竿摽大布犢鼻於庭中曰未能免俗爾鄴中記曰石虎尚方御府中巧工作錦織成署皆數百人有青綈或白綈或緋綈或黃綈或綠綈或紫綈范子計然曰綈出河東鹽鐵論曰鼲貂狢不益錦綈之寶是以王者不珍張衡西京賦曰木衣綈錦土被朱紫罽韋輝光毛詩問曰七月之時無褐箋云褐毛布也賤者之所服也今罽亦用為之爾雅曰氂罽也郭璞注曰毛氂所以為罽也犍捷為舍人注曰氂毛也罽胡人績羊毛作衣說文曰罽西胡毳布也吳曆曰魏文帝賜吳王太子罽二張吳志曰孫堅為董卓軍所攻堅與數十騎潰圍而出堅常著赤罽幘令親近將祖茂著之卓騎爭逐茂故堅從間道得免干寶晉紀曰孫皓遣使詔書賜班罽五十張絳罽二十張紫青罽各十五張崔鴻十六國春秋西秦錄曰沮渠蒙遜尚書郎王朽送戎罽千疋銀三百斤鄴中記曰石虎御府罽有巳頭文罽麗子罽花罽扶南傳曰妥息國出五色罽鹽鐵論曰今富者黃金馬腦罽繡馬掩汙桓譚新論曰余歸沛道病蒙絮被絳罽襜乘騂馬宿下邑東亭亭長疑是賊發卒余令勿鬭乃問而去此安靜自存也曹植辯道論曰甘始謂王曰諸梁時西域胡來獻罽悔不取也班固與弟超書曰竇侍中前寄人錢八十萬市得雜罽十餘張紬說文曰紬大絲繒也釋名曰紬抽也抽引絲端細緒也又謂之絲掛也掛於杖端振舉之也北史曰袁韋脩為太常少卿出使巡省仍令考校官人得失經兗州時邢劭為刺史別後送白紬為別信聿脩不受與劭書云今日仰遇有異常行瓜田李下古人所慎願得此心不貽厚責劭亦欣然頓解報書云老夫忽忽意不及此敬承來旨吾無間然弟昔為清郎今日復作清卿矣
