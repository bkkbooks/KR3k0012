body:
  text: 宗親部三伯叔母爾雅曰父之兄妻為世母父之弟妻為叔母禮記曾子問曰婚禮吉既納幣有吉日女之父母死則如之何孔子曰壻使人吊如壻之父母死則女之家亦使人弔父喪稱父母喪稱母父母不在則稱伯父之世母又雜記曰孔子曰伯母叔母䟽衰踊不絕地姑姊妹之大功踊絕於地如知此者由文矣哉家語曰孔子之舊人曰原壤其叔母死夫子將助之以木子路曰由也昔聞諸夫子毋友不如己者過則勿憚改姑己如何姑且已止孔子曰凡人有喪匍匐救之況舊故非友同志乃為友故友非舊友吾其往及之為槨原壤登木曰久矣予之不託於音也遂歌曰狸首之班然執女手之卷然夫子為之隱陽不聞以過之子路曰夫子屈節而極於此失其舉矣豈未可已乎孔子曰吾聞之親者未失其為親也故者未失其故也禮記亦載稱原壤之母也蜀志曰許靖字文休汝南平輿人也靖與曹公書曰世路威夷禍亂遂爾駑怯偷生自竄蠻貊成闊十年吉凶禮廢涉南海循岸渚五千餘里復遇疫疾伯母殞命并及群從自諸妻子一時略盡復相扶持前到此郡追計為兵害及病亡者十遺一二生民之艱辛苦之甚晉書曰羅含字君章桂陽人也含幼孤為叔母朱氏所養少有志尚晝臥夢一鳥文彩異常飛入口中因驚起說之朱氏曰鳥有文彩汝後必有才章自後藻思日新又曰餘杭婦人經年荒賣其子以活夫之兄子吳興太守孔褒薦之又曰皇甫謐字士安幼名靜安定朝那人漢太尉嵩之曾孫也出後叔父徙居新安年二十不好學遊蕩無度嘗得瓜果輒進叔母任氏任氏曰孝經云二牲之養猶為不孝汝今年餘二十目不存教心不入道無以慰我因歎曰昔孟母三徙以成仁曾父烹豕以存教豈我居不卜鄰教有所闕何爾魯鈍之甚也修身篤學自汝得之於我何有因對泣涕謐乃感激就卿人席坦受書勤力不殆居貧躬自稼穡帶經而農遂博綜典籍百家之言自號玄晏先生又曰羊耽妻辛氏字憲英隴西人鍾會為鎮西將軍憲英謂躭從子祐曰鍾士季何故西出祜曰將為滅蜀也憲英曰會所在縱恣非持久處下之道吾畏其他志也會果反祜嘗送錦被憲英嫌其華反而覆之又曰杜有道妻嚴氏字憲京兆人貞淑有識量生子植植從兄預為秦州刺史被巫徵還憲與預書戒之曰諺曰忍辱至三公卿今可謂辱矣能忍之三公是卿座預後果為儀同三司三十國春秋曰羊祐年十五而孤事伯母蔡氏以孝聞蔡氏每歎曰羊叔子可謂能養也其諸葛孔明之亞乎宋書曰謝瞻字宣遠陳郡陽下人衛將軍晦弟三兄幼孤叔母劉氏撫育有恩同於至親從伯叔爾雅曰父之從父昆弟為從祖父吳志曰朱異字季文為陽武將軍孫權與論攻戰問對稱意權謂異從父驃騎將軍據曰本知季文獪烏外切定見之復過所聞臧榮緒晉書曰王沉字處道少孤為從叔司空昶所養沉事昶如父虞預晉書曰王渾從子浚字彭祖司空王沉賤孽也少時不為親黨所知渾謂弟深等曰卿等莫輕彭祖此兒平世不減方州牧伯亂世可為都督三公懷愍之世果為幽冀都督位至鼎輔如渾所說晉書曰王彪之字叔虎從伯導曰選曹欲以汝為尚書郎汝幸可作諸王佐耶彪曰多少既不足計自當任之於時至於超遷是所不願又曰王羲之字逸少司徒導之從子也深為伯敦導所器重又曰魏舒字陽元任城人也身長八尺二寸姿望秀偉飲酒石餘而遲鈍質朴不為鄉親所重從叔父吏部衡有名當世亦不之知使守水碓每歎曰舒堪數百戶長願畢矣舒亦不介意後遷至司徒劇陽子又曰檀憑之字慶子高平人少有志力閨門邕肅為世所稱孤從兄子歆兄弟五人皆稚弱憑之撫養若己所生又曰荀崧從弟馗早亡二息序廞許金切年各數歲崧迎與其共居恩同其子太尉臨淮公荀顓廢絕朝廷以崧屬近欲以崧子襲封崧哀序孤微乃讓封與序論者稱焉宋書曰謝景仁陳郡陽夏人也衛將軍晦從叔父也祖據太傅安弟父兄宣城內史景仁博聞強識玄每與之言不倦也又曰王誕字茂世琅琊臨沂人也少有才藻晉孝武崩從叔尚書令列為哀策文久而未就謂誕曰猶少序節物一句因出本示誕誕攬筆便益之接其冬秋代變後云霜繁廣除風廻高殿珣列嗟歎清拔因而用之拜秘書郎宋齊語錄曰梁特進沈約撰史王希聃嘗問約曰從叔太常何故無傳約戲之曰賢從叔者何可載荅曰從叔唯忠與孝君當不以忠孝為美約有慚色博物志曰蔡邕有書近萬卷末年載數車與王粲粲亡後粲子預魏諷反被誅邕所與粲書悉入粲從子景字長緒崔鴻前涼錄曰范績字弘基績幼有名稱族叔上洛太守毗拊其首曰汝吾宗千里駒也歷仕三朝士友服其清亮舉秀才為郎中遷中都謁者族父爾雅曰釋親曰父之從祖昆弟為族父後漢書曰侯霸字君房河南密人族父淵以官宦有才辯任職元帝世佐石顯等領中書號曰太常侍蜀志曰費褘字文偉江下鄲人也鄲音盲少孤依族父伯仁姑益州牧劉璋母也晉書曰顧和字君孝侍中眾族子也曾祖容吳荊州刺史祖相臨海太守和二歲喪父總角便有志操族叔榮雅重之曰此吾家騏驥興吾宗者必此子也時宗人球亦有令問為州別駕榮謂之曰卿速步君孝超卿矣陳留志曰阮武字文業魏末為清河太守族子籍方總角未知名武見而偉之以為勝己明於知人皆此類也姑釋名父之姊妹曰姑姑故也言於己為久故之人也廣雅曰姑謂之威威故也說文曰威姑也爾雅曰父之姊妹為姑王父之姊妹為王姑曾祖王父之姊妹為曾祖王姑高祖王父之姊妹為高祖王姑父之從父姊妹為從祖姑父之從祖姊妹為族祖姑毛詩曰泉水衛女思歸也問我諸姑遂及伯姊父之姊妹稱姑先生曰姊箋云甯則又問姑及姊親其類也先姑後姊尊姑也禮記曲禮曰姑姊妹女子子已嫁而返兄弟不與同席而坐不與同器而食又檀弓曰姑姊妹之薄也蓋有受我而厚之者也左傳僖上曰初晉獻公筮嫁伯姬於秦遇歸妹之睽史蘇占之曰不吉歸妹睽孤寇張之弧姪其從姑六年其逋逃歸其國而棄其家明年其死於高梁之虛震為木離為火火從木生離為震妹於火為姑謂我姪者吾謂之姑謂子圍質於秦也漢書曰成帝班婕妤彪之姑也後漢書曰桓曄字文林姑為楊賜夫人父鸞卒姑赴哀將至止於傳舍整飾從者而後入曄心非之及姑勞問終無所言號哭而已賜遣吏祠因縣發取祠具曄拒不受後每至京師未嘗舍楊氏晉書曰阮孚母祖姑家胡婢也父咸通之生孚咸遺姑書曰不意今日遂生胡兒姑荅曰靈光殿賦云胡人遙集於上楹便可以遙集為字咸從之列女傳曰魯義姑者魯野人之婦也齊攻魯至郊遙見一人攜一兒抱一兒及軍至乃棄抱者而抱攜者將欲射之遂止而問曰所抱者誰之子對曰兄之子所棄者誰之子曰己子也妾見大軍至不能兩全遂棄所生之子軍曰子之於母甚痛於心何棄所生而抱兄子對曰子之於母私愛也姪之於姑公義也夫背公而向私者妾不為也於是齊軍遂止曰魯郊有婦人猶持節行況於朝廷乎遂迴軍不伐魯君聞之賜束帛號曰義姑又曰梁宣節姑者梁之婦人也其室失火兄子與己子三人在內入取兄子輒得其子及火盛不復得入婦人將赴火其友曰本取兄子卒誤得己子至於中心亦已足矣何至赴火婦曰梁國豈可以戶告人曉也被不義之名何面見弟兄吾欲復投吾子又失母子之情誓不生遂赴火而死君子曰可謂節姑也先賢行狀曰蔡伯喈母袁曜卿之姑也又曰鍾元皓妻季膺之姑也生子覲與膺齊名
