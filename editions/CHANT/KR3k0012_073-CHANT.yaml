body:
  text: 地部三十七藪說文曰藪大澤也周禮曰楊州之澤藪曰具區荊州之澤藪曰雲夢豫州之澤藪曰甫田青州之澤藪曰孟諸兗州之澤藪曰大野雍州之澤藪曰弦蒲幽州之澤藪曰醫無閭冀州之澤藪曰昭余祁虞候祈望皆官名也國語曰穀洛鬥將毀王宮王欲壅之太子晉諫曰古之長民者不隳山不崇藪不防川不竇澤夫山土之聚也藪物之歸也又曰其後伯禹念前之非度度法釐改制景象物土地以類百則儀之于群生共之從孫四岳左焉高高下下䟽川導滯鐘水豐殖九藪淚越九原宅居九隩隩內九州之內皆可宅居也合通四海故天無伏陰地無散陽水無沉氣火無災燀神無間行民無淫心時無逆數物無害生師象禹之功度之于軌儀莫不嘉績克猒帝心皇天嘉之祚以天下爾雅曰魯有大野今高平鉅野縣東北大澤晉有大陸今鉅鹿北廣河澤秦有楊紆音謳今在扶風洴縣西也宋有孟諸今在梁國睢陽縣東北也楚有雲夢今南郡華容縣東南巴丘丘川也吳越之間有具區今吳縣南大湖即震澤也鄭有甫田今滎陽中牟縣西阜田澤周有焦穫音牙今扶風池縣陽瓠中是也謂之十藪漢書曰司馬相如論巴蜀父老文云鷦鵬已翔於寥廓之宇而羅者猶視於藪澤風俗通曰藪厚也草木魚鱉所以厚養人君與百姓也呂氏春秋曰昭餘祁一名大昭又名謳澤周禮并州藪俗名鄢城泊是桉藪自太原祁縣連延西椄至此關中記曰弦蒲藪案周禮職方氏雍州其藪曰弦蒲晉大康地志云汧澤有蒲谷鄉弦中谷乃雍州之弦蒲也按漢書地理志取蒲藪即弦蒲藪是焉水經注曰汧水源出汧山蒲谷鄉雍中谷決為絃蒲藪澤釋名曰下水曰澤言潤澤也又曰水浹出而為澤曰掌水所停處如手中也今兗州人謂澤曰掌說文曰坳澤在崑崙墟下荷澤在山陽胡陸南易曰麗澤兌君子以朋友講習又曰澤中有雷隨君子以嚮晦入宴息又曰上天下澤履君子以辯上下定民志又曰澤上有地臨君子以教思無窮容保民無疆又曰山上有澤咸君子以虛受人又曰上火下澤睽君子以同而異又曰澤上有雷歸妹君子以求終知敝又曰山下有澤損君子以懲忿窒慾又曰澤上於地萃君子以除戎器戒不虞又曰澤上有水節君子以制數度議德行又曰澤中有火革君子以治曆明時又曰澤上有風中孚君子以議獄緩死又曰澤滅木大過君子以獨立不懼遁世無悶又曰澤無水困君子以致命遂志又曰象曰澤上於天夬君子以施祿及下居德則忌河圖曰大跡出雷澤華胥履之生伏犧雷澤澤也書曰雷夏既澤灉沮會同孔安國注曰雷夏澤名書大傳曰舜漁於雷澤鄭玄注曰雷澤今屬濟陰詩曰彼澤之陂有蒲與荷周禮曰川澤其動物宜鱗物其植物宜膏物其民黑而津又曰澤虞掌國澤之政令為之厲禁使其地之人守其財物以時入之于王府頒其餘于萬民禮曰獺祭魚然後虞人入澤梁禮記稽命徵曰王者德禮之制者澤谷中有朱鳥白玉赤虵赤龍出焉傳曰宣十五年晉侯救宋伯宗曰不可古人有言雖鞭之長不及馬腹天方受楚未可與爭雖晉之強能違天乎諺曰高下在心度時制置川澤納污受汙濁也山藪藏疾又曰衛侯出奔齊孫氏追之敗公徒于柯澤濟北東河縣西南有大澤是也又曰叔向母曰深山大澤實生龍蛇廣雅曰方澤祭地也太公金匱曰夏桀之時有芩山之水桀常以十月發民鑿山穿陵通於河民諫曰孟冬鑿山穿陵是泄天氣發藏天子失子道後必有敗桀殺之朞年芩山一旦崩為天澤戰國策曰淳于髡一日見七人於齊宣王王曰千里而一士是比肩而立百世而一聖若隨踵而生淳于髡曰今求桔梗於沮澤則累世不得一矣桔梗山中之草史記曰陳餘與張耳相失餘解印綬付耳亡入澤中捕魚又曰封禪書云上效雍通回中道春至鳴澤漢書曰高祖以亭長送徒驪山徒道亡到豐西澤中停飲夜皆解縱曰公等皆去吾亦從此逝矣又曰秦皇帝常曰東南天子氣於是東游以厭當之高祖即自疑亡匿隱巖石之間呂后與人俱求常得之高祖怪而問之呂后曰季所居上常有雲氣故從往常得季高祖心喜沛中子弟或聞之多欲附者西域傳曰康居國西北二千里有奄蔡國控弦十萬臨大澤而居又曰河有兩源合東注塩澤一名昌蒲海去玉門關三百里廣輪四百里水冬夏不減皆以為潛行地下續漢書吳祐嘗牧豕於長垣澤中晉中興書曰劉牢之至五橋澤中敗績兵士殆盡牢之馬超五丈澗得免晉書曰陶侃少時漁於雷澤嘗網得一織梭以掛于壁有頃雷雨至遂為龍而去穆天子傳曰天子北征舍于珠澤山海經曰稷澤后稷神所拜因以為名也帝王世紀曰雀山之地一夕為大澤而深九尺戴延之西征記曰巨澤魯之西界孔子獲麟處管子曰北澤燒火照臺下管子曰萬乘之國不可無薪而炊今北澤燒農夫得賣其薪蕘一束十信又曰涸澤數百歲水不絕者生慶忌其狀若人長四寸黃衣黃冠戴黃蓋乘水鳥好疾馳以其名呼之可使千里外一日反報此涸澤之精也文子曰高莫高於天下莫下於澤天高澤下聖人法之韓宣子曰魯燒積澤天北風火南倚恐燒國哀公懼自持眾趨救之新序曰晉公逐獸于碭入大澤迷不知所出問漁者送出澤因以諫之公令記其名漁者曰公亟反國臣亦反漁所又曰楚威王問於宋玉曰先生其有遺行也何士民眾庶不譽之甚宋玉對曰鯨魚朝發崑崙之墟暮宿於孟諸夫尺澤之鯢豈能與之量江海之大哉俗之民又安知臣之所為哉風俗通曰水草交曰澤言潤萬物以阜民用水經注曰路溫舒鉅鹿縣之東里人里監門使溫舒牧羊澤中取蒱牒用寫書即北澤也又曰坳澤河水之所潛也其源渾渾泡泡者也東去玉門陽關一千三百里廣輪四百里其水澄停冬夏不減其中洄湍雷輪轉為隱輪之脈當其圜流之上飛禽舊翮於霄中者無不墜於淵波即河水之所潛而出於積石也又曰徐州豐西澤即高祖斬白虵之所又曰中牟縣圃田澤北與陽武分水澤多麻黃草故述征記曰踐縣境便覩斯卉斯卉窮則知踰界今雖不能然諒亦非謬詩所謂東有茂草也皇武子曰鄭之有原圃猶秦之有具圃澤在中牟縣西限長城東極官度北佩渠水東西四十許里南北二十許里中有沙岡上下二十四浦津流逕通淵潭相接各有名焉有大斬小斬大灰小灰義魯練秋大白楊小白楊散嚇禺中羊圈大鵠小鵠龍澤鬯罷大哀小哀大長小長大縮小縮伯丘大蓋牛眼等浦水盛則北注渠溢則南潘故竹書紀年云梁惠成王十五年入河水于甫田又為大溝而引甫水者也圖經曰晉有大陸呂氏春秋云晉之大陸猶趙之鉅鹿也按隋圖經云大陸大鹿大河即一澤而異名也漢書云路溫舒取蒲於此也澤亦尚書云納于大麓是此也河南圖經曰廣成澤在梁縣西四十里後漢書云安帝永初元年以廣成遊獵地假與貧人于時馬融作廣成頌云大漢之初基也揆厥靈囿營于南郊右矕莫板切三途左枕嵩岳面據衡陽箕背王屋浸以波溠演以榮洛金山石床殷起乎中神泉側出丹水星湟池怪石浮磬混乎其陂是此澤也隋大業中置馬牧焉亦名廣陂其溉灌之利至今百生賴之輿地志曰稡澤在王城西北三十里與金谷相近又郡國志云稡澤即金谷也有金水出焉故謂之金谷晉石季倫別墅在焉陂說文曰陂池也書曰九川滌原九澤既陂詩曰彼澤之陂有蒲有荷陂澤也史記曰高祖母云劉媼嘗息大澤之陂夢與神遇時雷電晦冥見蛟龍於其上已而有娠遂產高祖又曰甯成抵罪得脫乃詐馳傳出關歸家稱曰仕不至二千石賈不至千萬安可比人乎乃貰貸買陂田千餘頃假貧民役數千家焉漢書曰汝南舊有鴻郄大陂郡以為饒成帝時關東數水陂溢為害翟方進為丞相以為決去陂水其地肥美省隄防之費遂奏罷之及翟氏敗後鄉里歸惡於方進言方進請陂下良田不得而奏罷陂顧野王云王莽時嘗苦旱起追怨方進童謠云壞陂誰翟子威飯我豆食美芋魁反覆陂當復誰言者兩黃鵠建武中太守鄧晨使許陽典復鴻郄以陽為都水掾陽曰昔成帝夢上天天帝怒曰何故壞我濯龍池於是乃因高下形勝起塘四百餘里數年乃立續漢書郭林宗交汝南黃叔度過袁奉高不宿而去泰曰叔度之量汪汪若萬頃之陂澄之不清撓之不濁不可量望也謝承後漢書曰汝南許陽曉以術承地脈太守鄧晨署為平水掾使治鴻郄陂陂成人譖陽言取錢晨系陽於獄戶自開械自解晨釋之出時日暮陂上有火光引前清德之感也魏略曰明帝出次摩陂有龍見於井中帝出觀龍因改摩陂為龍陂異苑曰東鄉太湖吳庚申歲於此有一軍士五百人將破堰取魚先以酒肉祈神約令水涸夜夢人云塘水速竭若見巨鱗慎勿殺也又有銅釜並不可發明往決水翕然而盡得白魚形狀非常小人貪利剖而治之見昨所祭餘食充溢腸內須臾復得釜又取發水便暴出五百人一時沒溺唯督監得存具說事狀于今猶名此湖為五百陂汝南先賢傳曰鄭敬去吏隱居于蟻陂之陽以魚釣自娛彈琴詠詩常方坐於陂側隨杞柳之蔭鋪茅蘼為席淮南子曰譬若同陂而溉田其受水均也孫綽子曰海人曰橫海有魚一吸萬頃之陂抱朴子曰葛仙公每酒醉常入家門前陂水中臥竟日乃出方輿記曰新蔡縣葛陂費長房化竹之所後漢於此立葛陂縣河南圖經曰洛水自苑內上陽宮南瀰浸東注當宇文隑版築之時因築斜堤今東北流水衡作堰九所形如偃月謂之月陂壽春圖經曰芍陂在安豊縣淮南子曰楚相作期思之陂灌雩婁之野又輿地志崔寔月令云孫叔敖作期思陂即此是也故漢王景為廬江太守重修起之境內豊給又桉芍陂上承渒水南自霍山縣北界騶虞石入號曰濠水是北流注陂中凡經百里灌四萬頃
