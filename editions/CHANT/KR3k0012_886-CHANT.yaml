body:
  text: 妖異部一怪春秋潛潭巴曰異之為言怪也謂先發感動左傳莊公曰初內蛇與外蛇鬥於鄭南門之中內蛇死六年而厲公入公聞之問於申繻曰猶有妖乎對曰人之所忌其氣燄以取之妖由人興也人無釁焉妖不自作人棄常則妖興故有妖也又文公曰有蛇自泉宮出入于國如先君之數伯禽至僖公十七君秋八月聲姜薨毀泉臺魯人以為蛇妖所出而聲姜薨故壞之又襄六曰或叫于宋太廟曰譆譆出出謂譆熱也出出戒伯姬鳥鳴于毫社如曰譆譆皆火妖也甲午宋大災伯姬卒又哀上曰有雲如眾赤烏夾日以飛三日楚子使問諸周太史周太史曰其當王身乎曰為人君妖氣守之故以為當王身雲在楚上唯楚見之故禍不及他國若禜之可移於令尹司馬家語曰季桓子穿井獲如土缶其中有羊焉使問之仲尼曰吾穿井而獲狗何也對曰以丘之所聞羊也丘聞之木石之怪夔蝄蜽木石謂山也夔一足赻人謂山㺐或言獨足蝄蜽山精好效人聲迷感人水之怪曰龍罔象土之怪曰羵羊龍神獸非常所見故曰怪罔象食人名沐瞳墳羊雌雄不成者張璠漢記曰梁冀池中舡無故自覆後被誅後漢書曰彭寵自立為燕王多見變怪堂上聞蝦蟆聲在爐火下鑿地求之不得後為奴所殺魏志曰鉅鹿張荐才見至切正始中戴鵀鳥巢門珔告門人曰夫戴鵀鳥巢門陰此凶祥也乃援琴作詩旬日而卒又曰朱建平善相相應璩曰君年六十二位為常伯先此一年當獨見一白狗也璩年六十一為侍中直內省忽見白狗眾人悉不見於是併急遊觀飲讌自娛年六十二卒吳志曰諸葛恪將征淮南有孝子著縗衣入其閤中令外詰問曰不自覺入時守備亦悉不見後恪遂被誅晉書曰齊王冏輔政有一婦人詣大司馬門求寄產吏詰之曰我截臍便去耳言畢不見明年冏誅王隱晉書曰王浚居幽州有狐踞浚府門中翟雉入廳事遂為石勒所殺晉書曰趙王倫篡時有雉飛入殿中自大極東階上殿驅之更飛西鍾下有頃飛去又倫於殿上得異鳥問皆不知名翼日向夕宮西有素衣小兒言是服劉鳥倫使錄小兒并鳥閑置空室明旦開視戶如故並失人鳥所在倫目上有瘤時以為妖焉又曰溫嶠旋于武昌至牛渚磯水深不可測世云其下多怪物嶠遂燬犀角而照火須臾見水族覆水奇形異狀或乘車馬著赤衣者嶠其夜夢人謂己曰與君幽明道別何意相照也意甚惡之至鎮未旬日因齒疾而卒北齊書曰趙郡王叡奏後主云和士開不宜居內出士開為兗州刺史太后欲留過百日叡正色不許叡出夜方寢見一人長可丈五尺當門向床以臂壓王良久遂失甚惡之而明日被誅沈約宋書曰蕭思話在青州常所用銅斗覆在藥廚下忽於斗下得二死雀思話歎曰斗覆而雙雀殞其不祥乎既而被繫宋書曰劉敬宣嘗夜與寮屬宴空中有投一隻芒屩於坐墜敬宣食盤上長三尺五寸已經人著耳鼻間並欲壞頃之而敗喪易洞林曰吳興太守袁玄瑛當之官卜卦占凶曰至官當有赤蛇為妖不可殺至果有赤蛇在銅虎符石函上蟠玄瑛擿殺之其後果為賊徐馥所害唐明皇雜錄曰李適之既貴且豪嘗列鼎前以具膳羞一旦庭中鼎躍出相鬥家僮告適之適之乃往以其所引酒自誓而鬥亦不解鼎耳及足皆落明日適之罷知政事俄為李林甫所陷貶宜春太守而終又曰李林甫宅屢有妖怪其南北隅溝中有火光大起或有小兒持火出入林甫惡之又曰李林甫之疾也晨起盥飾將入朝命取書囊即常時所要事目也忽覺頗重於常時者開視之即有二鼠出焉投下於地即變為蒼狗雄目張牙仰視林甫命弓射之殷然即滅林甫惡之不踰月而卒世說曰衛瓘永熙中家人炊飯墮地盡化為螺出足而行瓘終見誅列異傳曰中山王周南正始中為襄邑長鼠從穴中出在廳上語曰周南汝以某月某日當死周南不應鼠還穴中至期復更冠幘絳衣而語曰周南汝日中當死周南復不應日適中鼠曰周南汝不應我復何道言鼠遂顛蹶而即失冠衣周南使卒取來視之如常鼠耳搜神記曰漢武太始四年十月趙有虵從郭外入與邑中虵鬥孝文廟下邑中蛇死後二年秋有衛太子事自趙人江充起又曰王莽居攝東郡太守翟義知其將篡漢世謀舉義兵兄宣教授諸生滿堂郡鵝鴈數十在中庭有狗從外入齧之皆驚比救之皆斷頭狗走出門求不知處宣大惡之後數日莽夷其三族又曰魏司馬太傅討公孫淵父子先時淵家有犬著赤幘絳衣襄城北市生肉有頭目無手足而動瑤占者曰有形不成有體無聲其國滅又曰吳時廬陵郡亭重屋中常有鬼物宿者輒死自後使官莫敢入舍丹陽人應大者膽武至使廬陵便入亭止吏啟不可應不聽盡遣所將人還外持一口大刀至三更聞有扣閤者應遙問是誰荅云部郡相聞應使進相聞去須臾扣閤者如前曰府君相聞應復使進著皂衣又去應謂是人了無疑也須臾復扣閤言部府君相詣應乃知是鬼持刀迎之見三人皆盛衣服俱進坐畢府君者便與應談談未畢而部郡跳至應背後應顧以刀擊中之府君下坐走應追至亭後墻下及之斫傷數下應還臥達曙將人往尋之見血跡追皆得之云稱府君者是老狶部郡是老狸自後遂絕又曰夏侯藻母病困將詣淳于智卜有一狐當門向之嗥喚藻愁愕遂馳詣智智曰其禍甚急君速歸在嗥處樹下啼哭合家人驚怪大小畢出一人不且啼哭勿休然後其禍僅可救也藻如之母亦扶疾而出家人既集堂屋五間拉然崩又曰淳于智字叔平濟北人性沉深有惠義少為書生善易高平劉采夜鼠齧其左手中指意甚惡之以問智智為筮之曰鼠本欲殺君而不能當相為使之反死乃以朱書其手腕橫文後三寸為田字辟方一寸使夜露手以臥其夜大鼠伏死手前又曰東陽劉寵字道和居于姑熟每夜門亭有血數十不知所從來如此三四後寵為折衝將軍見遣北征將行而炊食悉變為蟲寵遂北征軍敗於檀丘為徐龕所殺續搜神記曰廣州有三人共在山中伐木忽見石窠中有三卵大如升取煮之始湯熱便聞林中如風雨聲須臾有一蛇大十圍長四五丈徑來於湯中銜卵去三人無幾皆死又曰代郡張平者符堅時為賊帥自號并州刺史養一狗名曰飛鷰形若小驢忽夜上廳事屋上行行聲如常平未經年果為鮮卑所逐敗走降符堅未幾便死又曰新冶庾謹母病兄弟三人悉在白日侍疾常燃火忽見帳帶自卷上自舒如此數四須臾聞床前狗鬥聲非常舉家共視了不見狗止見一死人頭在地頭猶有血兩眼尚動甚可憎惡其家怖懼夜不持出門即於後園中埋之明旦往視之出土上兩眼猶爾即又埋之後旦亦復出乃以磚著頭合埋之不復出也數日其母遂亡異苑曰謝文靜於後府接賓婦劉氏見狗銜謝頭來久乃失所在婦具說之謝容無異色是月而薨又曰安固李道豫元嘉中狗當路眠豫蹴之狗曰汝停死何以蹋我經年豫死又曰晉惠帝羊后將入宮衣中忽有火光自後蕃臣遘兵洛陽失御后為劉曜所嬪又曰有人姓劉在朱方人不得共語若與之言人必遭禍難及身死疾唯一土謂無此理偶值人有屯塞耳劉聞之欣然而往自說被謗君能見明荅云世雷同何足卹須臾火發資畜服玩蕩盡於是舉世號為劉鵂鶹復遇諸塗皆閉車走馬掩目奔避劉亦杜門自守歲時一見則人驚散過於見鬼又曰太原王徽之字伯猷元嘉四年為兗州刺史在道有客命索酒炙言未訖而炙至徽之取自割終不入投地大怒少頃顧視向炙已變為徽頭矣驚愕反矚又覩其首在空中揮霍而沒王至州便殞又曰張仲舒元嘉十七年七月中晨夕間輒見門側有赤氣赫然後空中忽雨絳羅於其庭廣七八分長五六寸皆以箋紙繫之紙廣長亦與羅等紛紛甚駃舒惡焚之舒宿暴病而死又曰王愉義熙初在中庭行帽忽自脫仍乘空如人所著及愉母喪月期上祭酒器在几上須臾下地覆還登床尋而第三兒綏懷貳伏誅又曰檀道濟元嘉中鎮尋陽十二年入朝與家分別顧瞻城闕歔欷逾深識者是知道濟之不南旋也故時人為其歌曰生人作死別荼毒當奈何濟將發舟所養孔雀來銜其衣驅去復至如此數焉以十三年三月伏誅又曰武昌戴熙家道貧陋墓在樊山南占者云有王氣宣武桓公伏威西下停武昌令鑿之得一物大如水牛青色無頭腳時亦動搖斫刺不陷仍縱著江中得水便有聲如雷響發長川熙後嗣淪胥殆絕又曰烏傷葛輝夫義熙中在婦家宿至三更有兩人把火炬至階前疑是凶人往打之欲下杖悉變蝴蝶蠙紛飛散有一物衝輝夫腋下便倒地少時死述異記曰郭仲產宅在江陵批把寺南宋元嘉中起齊屋以竹為䆫櫺竹遂漸生枝葉長數丈鬱然如林仲產以為吉祥及孝建中被誅又曰嘉興朱休之元嘉中兄弟對坐犬向休蹲視二人而笑搖頭語曰言我不能歌聽我歌梅花今年故復可奈汝明年何其家斬犬牓首路側至梅花時兄弟相鬥弟戟傷兄收繫皆死又曰宋大明中頓丘縣令劉順酒酣晨起見榻床上有一聚凝血如覆盆形劉是武人了不驚怪乃令擣虀親自切血染虀食之棄其所餘後十許載至元徽二年為王道隆所害又曰周登之家在都宋明帝時統諸靈廟甚被恩寵母謝氏奉佛法太始五年夏月暴雨有物形隱煙霧垂頭屬廳事前地頭頸如大赤烏飲庭中水登之驚駭謂是善神路之汲水益之飲百餘斛水竭乃去二年而謝氏亡亡後半歲而明帝崩登之自此事業衰敗又曰宋驃騎大將軍河東柳元景大明八年少帝即位元景乘車行還使人在中庭洗車轅曬之有飄風中門而入直來衝車明年而闔門被誅幽明錄曰吳北寺終祚道人臥齋中鼠從坎出言終祚後數日當死終祚呼奴令置犬鼠云亦不畏此且犬入戶必死犬至果爾終祚嘗為商閉戶謂鼠曰汝正欲使我富貴耳今既遠行勤守吾房勿令有所零失時桓溫在南州禁殺牛甚急終祚載數萬竊買牛皮還東貨之得二十萬還時室猶闔也都無所失其怪亦絕自是浸富又曰石虎時太武殿圖賢人之像頭忽悉縮入肩中又曰義興周超為謝晦司馬在江陵妻許在家夜遙見屋裏月光一死人頭在地血流甚大驚怪即便失去後超被法又曰元嘉九年南陽樂遐嘗在坐忽聞空中有人呼其夫婦名甚急半夜乃止殊自驚懼後數日婦屋後還忽舉體衣服惣是血未一月而夫婦相繼病卒又曰諸葛長民富貴後嘗一月或數十日輒於夜眠中驚起跳踉如與人相打狀毛修之嘗與同宿駭愕不達此意視之良久長民告毛此物奇健非我無以制之良曰是何物長民曰我正見一物甚黑而手腳不分明每月中多夕來輒共鬥深自驚懼焉屋中柱及椽桷間悉見有蛇頭令人以刀懸斫應刀隱滅去輒復出悉以紙褁柱桷紙內蔌蔌如有物行聲又曰劉斌在吳郡時婁縣有一女忽夜乘風雨恍惚至郡城內自覺去家正一炊頃衣小沾濡曉在門上求通言我天使也府君宜起迎我當大富貴不爾必有凶禍劉問所來亦不自知後二十許日劉果誅又曰桓溫時參軍夜坐忽見屋梁上有一伏免切齒向之兔來轉近引刀斫之見正中兔而實反傷膝流血甄異記曰徐州人吳清以太元五年被羗為征人殺雞求福置雉頭在拌中忽然而鳴其後破賊賊帥邵寶臨陣戰死于時殭尸狼籍莫之能識清見一人著白錦袍疑是主帥便斬以聞推校之乃是寶首清以功拜清河太守越自行伍猥蒙榮位雞之妖更為祥桓譚新論曰呂仲子婢死有女四歲數來為沐頭浣濯道士云其家青狗為之殺之則止楊仲亦言所知家嫗死忽起飲食後醉而坐祭床上如是三四家益厭苦其後醉形壞但得老狗便打殺之推問乃里頭沽家狗玄晏春秋曰新安寺有槐而鵲巢之雄雞奪而棲焉永安令繁璉予之族姑子也其主簿以告予予雞棲野人必將寄次于野縣其空乎夏五月丙申璉卒喪次子縣空縣送之賈誼鵬鳥賦曰誼為長沙太傅有鵬飛入誼舍止于坐隅鵬似鴞不祥鳥也
