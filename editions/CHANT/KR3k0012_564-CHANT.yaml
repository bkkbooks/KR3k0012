body:
  text: 樂部一雅樂上易曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考書曰夔命汝典樂教胄子胄子國子也古者司樂以教國子詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和周禮曰大合樂以致鬼神以和邦國以諧萬民以安賓客以悅遠人以作動物又曰天子宮懸四面如宮諸侯軒懸去南面餘三面其形如軒亦曰曲懸大夫判懸又去其北面士特懸凡樂鍾磬之半為堵全為肆又曰大司樂掌成均之法以治建國之學政而合國之子弟焉鄭玄注曰均調也樂師主調其音大司樂主受此成事已調之樂以樂德教國子中和祗庸孝友中猶忠也和剛柔適也祗敬也庸有常也以樂語教國子興道諷誦言語興謂以善物諭善事也道讀曰遵也者言古以喻今以樂舞教國子雲門大卷大咸大韶大夏大護大武又曰大司樂分樂而序之以祭以享以祀乃奏黃鍾歌大呂舞雲門以祀天神乃奏太簇歌應鍾舞咸池以祭地祗乃奏姑洗歌南呂舞大卷以祀四望乃奏蕤賓歌黃鍾舞大夏以祭山川乃奏夷則歌小呂舞大護以享先妣乃奏無射歌夾鍾舞大武以享先祖凡六樂者文之以五聲播之以八音又曰凡六樂者一變而致羽物及川澤之祗再變而致羸物及山林之祗三變而致鱗物及丘陵之祗四變而致毛物及墳衍之祗五變而致介物及土祗六變而致象物及天神又曰凡樂圜鍾為宮夾鍾為角太簇為徵姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降皆得而禮矣凡樂函鍾為宮太簇為角姑洗為徵南呂為羽靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至於澤中之方丘奏之若樂八變則地祗皆出可得而禮矣凡樂黃鍾為宮大呂為角大簇為徵應鍾為羽路鼓路鼗陰竹之管龍門之琴瑟九德之歌九磬之舞於宗廟之中奏之若樂九變則人鬼可得而禮矣又曰凡樂事以鍾鼓奏九夏肆夏王夏昭夏納夏章夏齊夏蔟夏祴夏驁夏以鍾鼓者先擊鍾次擊鼓九夏夏大也樂之大歌有九祴讀為陔孩鼓之陔王出入奏王夏尸出入奏肆夏牲出入奏昭夏四方賓來奏納夏臣有功奏章夏夫人出祭奏齊夏族人侍奏族夏客醉而出奏陔夏公出入奏鷔夏禮曰凡音之起由人心生也人心之動物使之然也感於物而動故形於聲聲成方謂之音方猶文章比音而樂之及干戚羽毛謂之樂千楯也戚斧也武舞所執也羽翟也旄牛尾也文武所執也樂者音之所由生也其本在人心之感於物也是故其哀心感者其聲噍以殺其樂心感者其聲嘽以緩其喜心感者其聲發以散其怒心感者其聲粗以厲其敬心感者其聲直以廉其愛心感者其聲和以柔是故先王慎所以感之者宮為君商為臣角為民徵為事羽為物五者不亂則無怗懘之音矣凡音濁者尊清者卑怗懘弊敗不和皃也宮亂則荒其君驕商亂則卑其君壞角亂則憂其民怨徵亂則哀其事勤羽亂則危其財匱五者皆亂迭相陵謂之慢鄭衛之音亂世之音也比於慢矣桑間濮上之音亡國之音也其政散其民流誣上行私而不可正也是故知聲而不知音者禽獸是也知音而不知樂者眾庶是也唯君子為能知樂是故不知聲者不可與言音不知音者不可與言樂知樂則幾於禮矣禮樂皆得謂之有德德者得也樂者為同禮者為異同則相親異則相敬同謂齊好惡謂別貴賤也樂勝則流禮勝則離流謂合行不敬也離謂析居不和也樂由中出和在心也禮自外作敬在貌也樂由中出故靜禮自外作故文大樂必易大禮必簡樂至則無怨禮至則不爭揖讓而天下治者禮樂之謂也大樂與天地同和大禮與天地同節和故百物不失節故祀天祭地明則有禮樂幽則有鬼神如此則四海之內合敬同愛矣故知禮樂之情者能作識禮樂之文者能述述謂訓其義也作者謂之聖述者謂之明樂者天地之和也禮者天地之序也和故百物皆化序故群物皆別化猶生也謂猶形體異也王者功成作樂治定制禮其功大者其樂備其治辯者其禮具五帝殊時不相沿樂三王異世不相襲禮樂極則憂禮粗則偏矣及夫敦樂而無憂禮備而不偏者其唯大聖乎春作夏長仁也秋斂冬藏義也仁近於樂義近於禮故聖人作樂以應天制禮以配地禮樂明備天地官矣夫禮樂之極乎天而蟠乎地行乎陰陽而通乎鬼神窮高極遠而測深厚是故志微噍殺之音作而民憂思嘽諧幔易繁文簡節之音作而民康樂粗厲猛起奮末廣僨之音作而民剛毅廉直勁正莊誠之音作而民肅敬寬裕內好順成和動之音作而民慈愛流僻邪散簡成滌濫之音作而民淫亂故樂行而倫清耳目聰明血氣和平移風易俗天下皆寧故曰樂者樂也君子樂得其道小人樂得其欲以道制欲則樂而不亂以欲忘道則惑而不樂道謂仁義也欲謂邪淫也是故君子反情以和其志廣樂以成其教樂行而民嚮方可以觀德矣方猶道也德者性之端也樂者德之華也金石絲竹樂之器也詩言其志也歌詠其聲也舞動其容也三者本於心然後樂氣從之又曰魏文侯問子夏曰吾端冕而聽古樂唯恐臥聽鄭衛之音則不知倦敢問古樂之如彼何也新樂之如此何也子夏對曰今夫古樂進旅退旅和正以廣絃匏笙簧會守柎鼓始奏以文復亂以武治亂以相訊疾以雅君子於是語於是道古修身及家平均天下此古樂之發也今夫新樂進俯退俯姦聲以濫溺而不止及獶侏儒獶雜子女不知父子樂終不可以語不可以道古此新樂之發也文侯曰敢問溺音何從而出也子夏對曰鄭音好濫淫志宋音燕女溺志衛音趍數煩志齊音傲僻驕志四者淫於色而害於德是以祭祀弗用也詩云肅雍和鳴先祖是聽夫肅肅敬也雍雍和也夫敬以和何事不行為人君也謹其所好惡而已矣君好之則臣為之上行之則民從之詩云誘民孔易此之謂也然後聖人作為鞉鼓控楬壎箎此六者德音之音也然後鍾磬竽瑟以和之干戚旄狄以舞之此所以祭先王之廟也所以獻酬酳酢也所以官序貴賤各得其宜也所以示後世有尊卑長幼序也鍾聲鑑鑑以立號號以立撗撗以立武君子聽鍾聲則思武臣石聲磬磬以立辦辦以致死君子聽磬聲則思死封疆之臣絲聲哀哀以立廉廉以立志君子聽琴瑟之聲則思志義之臣竹聲濫濫以立會會以聚眾君子聽竽笙簫管之聲則思畜聚之臣鼓鼙之聲懽讙以立動動以進眾君子聽鼓鼙之聲則思將帥之臣君子之聽音非聽其鏗鏘而已也彼亦有所合之也君子曰禮樂不可斯須去身致樂以治心則易直子諒之心油然生矣易直子諒之心生則樂樂則安安則久久則天天則神天則不言而信神則不怒而威致樂以治心者也致猶深審也子讀如不子之子油然新生好貌也善心生則寡於利欲寡於利欲則樂矣至明行成不言而見信如天也不怒而見畏如神致禮以治躬則莊敬莊敬則嚴威心中斯須不和不樂而鄙詐之心入之矣鄙詐入之謂利欲生外貌斯須不莊不敬而易慢之心入之矣故樂也者動於內者也禮也者動於外者也樂極和禮極順內和而外順則民瞻其顏色而弗與爭也望其容貌而不生易慢焉極至也故德輝動於內而民莫不承聽理發諸外而民莫不承順故曰致禮樂之道舉而措之天下無難矣樂也者動於內者也禮也者動於外者也故禮主其減樂主其盈滅猶倦也盈猶溢也禮減而進以進為文樂盈而反以反為文樂以統情禮以理行之情溢而行倦則進之隘之則使反進則自免往反謂自損抑也文猶羨也禮減而不進則銷樂盈而不反則放故禮有報而樂有反放淫於聲樂不能止也報續曰褒猶進也禮得其報則樂樂得其反則安得謂曉其義知其歸禮之報樂之反其義一也夫樂者先王之所以飾喜也軍旅鈇鉞者先王所以飭怒也故先王之喜怒皆得其儕焉又曰孔子間居子夏曰敢問何謂三無孔子曰無聲之樂無體之禮無服之喪子夏曰三無既得而聞之矣敢問何詩近之孔子曰夙夜基命宥密無聲之樂也威儀棣棣不可選也無體之禮也凡民有喪匍匐救之無服之喪也子夏曰言盡於此而已乎孔子曰何為其然也君子之服猶有五起焉無聲之樂氣志不違無體之禮威儀遲遲無服之喪內恕孔悲無聲之樂氣志既得無體之禮威儀翼翼無服之喪施于四國無聲之樂氣志既從無體之禮上下和同無服之喪以畜萬邦無聲之樂日聞四方無體之禮日就月將無服之喪純德孔明無聲之樂氣志既定無體之禮施及四海無服之喪施于孫子又曰入門而金作示情也升歌清廟示德也下管象武示事也是故古之君子不必親相與言也以禮樂相示而已又曰故天子之為樂也以賞諸侯之有德者也德威而教尊五穀時熟然後賞之以樂也又曰郊特性曰賓入大門而作肆夏示易以敬賓朝聘者易和悅也卒爵而樂闋孔子屢嘆之美比禮也樂由陽來者禮由陰作者陰陽和而萬物得也傳曰曹太子來朝享曹太子初獻樂奏而歎酒始獻也施父曰曹太子其有憂乎非歎所也施父魯大夫也又曰晉郤至如楚聘且莅盟楚子享之子反相為地室而懸焉郤至將登金奏作於下擊鍾而奏樂也驚而走出
