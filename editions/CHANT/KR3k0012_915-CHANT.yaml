body:
  text: 羽族部一鳥周禮曰庖人供六禽辯其名物六禽鴈鶉鷃雉鳩鴿又曰中秋獻良裘王乃行羽物行羽物以飛鳥賜群吏中秋鳩化為鷹順其始殺大班羽物又曰射鳥氏掌射鳥祭祀以弓矢歐烏鳶凡賓客會同軍旅亦如之又曰羅氏掌羅烏鳥蜡則作羅襦天子大蜡謂十二月合取萬物而素饗之襦細密之羅又曰中春羅春鳥獻鳩以養國老行羽物春鳥蟄而始出是時鴈化為鳩春鳥變舊為新宜以養老生氣行謂賦物又曰掌畜掌養鳥而阜蕃教擾之鳥之可養盛大蕃息祭祀供卯鳥其卯丙薦之鳥四時貢鳥物鴞鴈之屬以四時來共膳獻之鳥雉及鶉駕之屬又曰翨氏翨音翼掌攻猛鳥各以其物為媒而掎之猛鳥鴈隼之屬置其所養之物於絹中鳥未下則掎其腳以時獻其羽翮又曰硩簇氏硩音摘又他歷切簇音蒼獨切掌覆夭鳥之巢覆毀也夭鳥惡鳴之鳥若鴞鵬以方書十日之號十有二辰之號十有二月之號十有二歲之號又曰庭氏掌射國中之夭鳥若不見其鳥獸則以救日之弓與救月之矢夜射之中若神也則以太陰之弓與枉矢射之禮曰獻鳥者佛其首又曰執禽者左首又曰大羅氏天子之掌鳥獸者也又曰鳥皫色而沙鳴鬱皫普表切又曰凡生天地之間者有血氣之屬必有知有知之屬莫不知愛其類今是夫鳥獸則失喪其群匹越月踰時焉則必反巡過其故鄉翔廻焉鳴號焉蹢䠱焉踟躕焉然後乃能去之小者至於燕雀獨有啁噍之頃焉然後乃能去之故有血氣之屬者莫智於人故人於其親也至死不窮傳曰或叫于宋大廟曰譆譆出出鳥鳴于毫社如曰譆譆又曰郯子來朝公與之宴叔孫昭子問焉曰少皞氏以鳥名官何郯子曰我高祖少皞摯之立也鳳鳥適至故紀於鳥為鳥師而鳥名又曰鳥則擇木木豈能擇鳥詩曰伐木丁丁鳥鳴嚶嚶嚶其鳴矣求其友聲易曰比王用三驅失前禽邑人不誡吉又曰井泥不食舊井無禽又曰旅鳥焚其巢又小過曰有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也書曰日中星鳥以殷仲春厥民析鳥獸孳尾孔安國曰乳化曰孳交接曰尾日永星火以正仲夏厥民因鳥獸希革夏時鳥獸毛羽希少改易革改宵中星虛以殷仲秋厥民夷鳥獸毛毨毨理也毛更生整理也日短星卯以正仲冬厥民燠鳥獸氄毛鳥獸皆生毳細毛也周書旅獒曰珍禽奇獸弗育于國論語曰鳥之將死其嗚也哀又曰鳥獸不可與同群爾雅曰鳥之雌雄不可別者以翼右掩左雄左掩右雌鳥之少美長醜為鶹𪅃二足而羽謂之禽春秋孔演圖曰鳥化為書孔子奉以告天赤爵集書上化為黃玉刻曰孔提命仰應法為赤制又曰黑帝治生五角之禽以觸民宋均注曰陽數玉也春秋考異郵曰鳥魚者陰中陽陽中陰皆卵生以類翔故魚從水鳥從陽凡飛翔羽翮柔良之獸皆為陽陽氣仁故鳥哺公鳥飛於風魚浮之水是故陽氣輕勁也含二氣故生卵吞齕者八竅而卵生鳥雞類也序命曆羲皇燧人始名物蟲鳥獸之名尚書考靈曜白鳥為春候歸藏啟筮曰金水之子其名曰羽蒙乃占之曰羽民是生百鳥史記曰秦仲知百鳥之音與之語皆應焉又曰楚莊王即位三年不出號令日夜為樂令國中曰有敢諫者死無赦伍舉入諫莊王左抱鄭姬右抱越女坐鍾鼓之間伍舉曰願有進隱隱為隱藏其意曰有鳥在於阜三年不蜚不鳴是何鳥也莊王曰三年不蜚蜚將冲天三年不鳴鳴將驚人舉退矣吾知之矣又曰楚頃襄王十八年人有好以弱弓微繳加歸鴈之上者王聞而召之問焉對曰小臣之好射鶀音其鴈羅鸗徐廣曰鸗野鳥也音龍小矢之發也何足為大王道哉且稱楚之國大王之賢所弋非特此也昔者三王以弋道德五伯以弋戰國故秦魏燕趙者其鴈也齊魯韓衛者青首也青首小鳧有青者鄒費郯邳者羅鸗也外則其餘不足射也見鳥六雙以喻下文秦趙等十二國故曰六雙唯王何取王何不以聖人為弓勇士為繳時張而射之此六雙者可得而囊載也其樂非特朝夕之樂也其獲非特鳧鴈之實也漢武故事曰武帝作玉堂以玉壁薄椽頭鑄為大鳥黃金塗長五丈栖屋上續漢書曰楊震將葬大鳥來止亭樹下地安行到柩前正立低頭淚出眾人更共摩牧抱持終不驚駭其鳥五色高丈餘兩翼長二丈三尺人莫知其名也魏志曰高唐隆臨終上䟽諫明帝臣觀黃初之際天兆其戒異類之鳥育長鷰巢口爪俱赤此魏室之大異也晉書曰趙王倫篡位時於殿上得異鳥問皆不知名其日向夕宮西有素衣小兒言是服劉鳥倫使錄小兒并鳥閉置空室明旦開視戶如故並失人鳥所在倫目上有廇以為妖焉南史曰甄恬字彥約中山無極人也居江陵數歲喪父哀感有若成人家貧養母常得珍羞及居喪廬於墓側恒有鳥玄黃雜色集於廬樹恬哭則鳴哭止則止齊書曰曲江公蕭遙欣年七歲出齊時有一左右小兒善彈無飛鳥不應弦墜落欣曰凡戲多端何急彈此鳥自空中翔飛何關人事無趣殺此生左右感其言遂不復彈鳥梁書曰何胤退居吳武丘寺講經論常禁殺有異鳥如鶴紅色集講堂馴狎如家禽南史曰海中浮鵠山去地千餘里上有女人年三百歲有女道士百四五人年並出百俱在山中學道遣使獻紅席梁武帝方捨身時其使適至此草常有紅鳥居下故以名觀其圖狀則鸞鳥也又曰梁武帝捨身時有男子不知何許人於眾中自割身以飴飢鳥血流遍體而顏色不變開講日有三足鳥集殿開講日有三足鳥集殿之東戶自戶適于西南懸楣三飛三集白雀一見于重雲閣前連李樹後魏書曰波斯國有鳥形如橐駞有羽翼飛而不能高食草與肉亦能噉火馳走甚疾一日能七百里也又曰彭城王勰從沔北除使持節都督南征諸軍事正中軍大將軍府勰於是親勒大眾須臾有二大鳥從南而來一向行宮一向府幕各為所獲勰言於帝曰始有一鳥望旗顛仆臣謂大吉帝戲之曰鳥之畏威豈獨中軍之略也吾亦分其一耳此乃大善北史曰周豆盧勣為渭州刺史鳥鼠山絕壁千仞由來乏水諸羗苦之勣馬足所踐忽飛泉湧出有白鳥翔止廳前乳子而後去人為之謠曰我有丹陽山飛玉漿濟戎夷人神鳥來翔隋書曰煬帝征遼東帝舍臨頓見大鳥丈餘縞身朱足游泳自若上異之詔虞綽為銘帝覽而善之命有司勒於海上又曰大業十二年一月甲子夜有二大鳥似鵰飛入大業殿止于殿幄至明而去又曰王世充將欲篡位羅取雜鳥書帛繫其頸自言符命而散放之或有彈射得鳥而來獻者亦拜官爵唐書曰太宗謂褚遂良學問稍長性亦堅正既寫忠誠甚親附於朕譬如飛鳥依人自加憐愛又曰永徽中吐火羅國獻大鳥高七尺其足如駞有翅而能飛行日三百里能噉銅鐵夷俗呼為駞鳥上以太宗懷遠所致獻于昭陵乃刻像於陵之內又曰永徽中萬年宮有小鳥生大鳥又曰大曆八年有大鳥見於武功縣群鳥隨而噪之武功縣神策行營將張日芬射而獲之以獻是鳥肉翅狐首四足足有爪其廣四尺三寸其毛色赤形類蝙蝠又曰大中十年舒州吳塘堰有眾禽成巢闊七尺高一丈而水禽山鳥鷹隼鷰雀之類無不馴狎又有鳥人面綠毛爪喙皆紺色其聲曰甘人呼為甘蟲莊子曰飛鳥之影未嘗動也文子曰有鳥將來張羅待之得鳥者一目也今為一目之羅即無得鳥時孫卿子曰鳥窮則啄人窮則詐淮南子曰鳥排空而飛獸蹶石而走又曰射者扞鳥號之弓彎綦衛之箭重之羽蓬蒙子之巧以要飛鳥猶不能與羅者競多何則以所持之小也張天下以為之籠因江海以為之罟又何亡魚失鳥之有乎又曰一目之羅不可以得鳥無餌之鉤不可以得魚遇士無禮不可以得賢德又曰毛羽者飛行之類也故屬於陽又曰繫舟水中鳥聞之高翔魚聞之沉淵又曰鳥不于防者雖近弗鳥燕之屬是也其當道者雖遠弗釋當道謂作防客者故曰不釋也又曰夫飛鳥主巢狐狸主穴巢者巢成而得宿焉趍捨行義亦人之所棲宿也又曰鳥魚皆生於陰屬於陽故鳥魚皆卵魚游於水鳥翔於雲又曰羽嘉生飛龍羽加羽蟲之先也蜚龍龍之有羽者飛龍生鳳皇鳳皇生鸞鳥鸞鳥生庶鳥凡羽者生於庶鳥也又曰蒲且之連鳥於百仞之上而詹何之鶩魚於大淵之中此皆得清淨之道也又曰羽者嫗伏毛者孕育淮南萬畢術曰人面擊地飛鳥自下取蘗木為人形似鳥而血塗人面以擊地飛鳥自下抱朴子軍術曰眾鳥群飛徘徊軍上不過三日有暴兵至焉鳥藂軍中將當賞功增秩鳥集將軍之旗將軍增官鳥集軍中莫知其名軍敗也阮子曰高鳥相木而集智士擇士而翔晏子春秋曰景公射鳥野人駭之公令吏誅之晏子曰鳥獸故非人所養野人駭之不亦宜乎公曰善自爾已來一弛鳥獸之禁又曰景公好弋使顏涿主藂鳥而亡公召吏殺之晏子曰諸侯聞之以君重鳥輕士公曰勿殺春秋後語淳于髡曰夫鳥同翼者藂飛而獸同足者俱行各有儔也又曰魏有吏羸脈者與王處廩下仰見飛鳥引弓虛發而鳥墮下魏王怪而問曰何以得至此羸脈曰此孽生也生曰先生何以知之對曰其飛徐其鳴悲其飛徐者故瘡痛也其鳴悲者久失群也故瘡未息而驚心未去聞弦音烈而高飛故隕也孽餘也先被傷而餘瘡未差故聞弦聲而奮驚而隕也切創與瘡同又曰燕王使騎劫代將樂毅奔趙王卒離心田單乃令城中食者先祭先祖於庭中飛鳥悉飛舞其上或下啄其食燕人皆怪之穆天子傳曰曠原之野飛鳥之所解羽舂之山飛鳥之所栖舂山之澤清水溫泉飛鳥百獸之所飲食家語曰孔子在衛顏回侍側聞哭聲甚哀子曰回汝知此何哭對曰此哭非但為死又為生離回聞桓山之鳥生四子焉羽翼既成將分于四海其母悲鳴而送之哀聲有似於此謂其往而不返也回竊以音類而知之又曰蒼鳥群飛熟使萃之蒼鳥蒼鴈又曰稷帝投之水上鳥何燠投棄燠溫鳥以羽翼覆薦溫之白虎通曰鳥所以飛何鳥者陽也飄輕故飛也禽者何鳥獸之總名明為人所禽制蔡邕月令章句曰天官五獸前有朱雀鶉火之體凡鳥生於水衝波傳曰顏淵子路於洙泗見五鳥色由熒熒之鳥也見色分明故曰熒熒廣志曰東齊多鳥爵千百為群小戶種㯏咸以爵為患文士傳曰張衡有巧藝嘗作木鳥假以羽翮腹中施機能數里飛又曰會稽山陰禹葬聖人化感鳥獸故象為民佃春耕鳥銜拔草根秋啄除其穢故縣官禁民不得殺傷此鳥犯者刑之無赦會稽典錄曰夏方字文昌家遭癘父母伯叔一時死九十三喪方年十四晝則負土哀號暮則扶棺哭泣比葬年十七烏鳥集藂猛獸乳其側幽明錄曰符堅時有射師經嵩山望見松樹上有一雙白鳥似鵠而大至樹下又見一虵長五丈許樹上取鳥未至鳥一丈鳥便欲飛虵張口歙之鳥不得去繽紛一食頃鳥轉欲困射師引弩射三矢虵隕而鳥得颺須臾雲晦雷發驚耳駭目而向鳥徘徊其上毛落紛紛雷息電滅鳥亦高飛十州記曰祖沷州有不死之草似菰苗秦始皇時死者橫道有鳥如烏狀衘此草以覆死人面皆登時起坐而遂活也異苑曰蘭陵昌慮縣華山有井鳥巢其中金喙黑色而圓翅此禽見則大水荊楚歲時記曰春分日民並種戒火草於屋上有鳥如烏先鷄而鳴架架格格民候此鳥則入田以為候人架犁格也又曰夏七月有鳥名穫穀其聲自呼農人候此鳥則犁把上岸
