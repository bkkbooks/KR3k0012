body:
  text: 人事部一百二十五貧上說文曰貧財分少也尚書六極四曰貧毛詩曰出自北門憂心殷殷終窶且貧莫知我艱窶者無禮也貧者困於財又曰自我徂爾三歲食貧又曰大東小東杼軸其空禮記曰君子雖貧不鬻祭器雖寒不衣祭服又曰子路曰傷哉貧也生無以養死無以為禮子曰啜菽飲水盡其歡斯之為孝斂手足形還葬而無槨稱其財斯之謂禮還猶疾謂不及其日月也又曰君子辭貴不辭賤辭富不辭貧又曰儒有一畝之宮環堵之室篳門圭竇蓬戶甕牖易衣而出併日而食不隕穫於貧賤不充詘於富貴左傳曰室如懸罄論語曰貧而無謟又曰貧與賤是人之所惡也不以其道得之不去也又曰衣敝縕袍與衣狐狢者立而不恥者其由也與縕絮也賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂又曰邦有道貧且賤焉恥也又曰君子憂道不憂貧家語曰端木賜駟馬連騎以從原憲居蓬蒿之中并日而食子貢曰甚矣子之病矣國語曰叔向見韓宣子憂貧叔向賀之宣子曰吾有卿名而無其實無以從二三子家貧則不及人也吾是以憂子賀我何故對曰昔欒武子無一卒之田武子晉正卿欒書也大夫一卒無者不及上大夫其官不備其宗器器祭器也宣其德行慎其憲則諸侯親之戎翟懷之今吾子有欒武子之貧吾亦為能其德也是以賀若憂德之不脩而患貨之不足將弔不暇何賀之有也史記曰叔孫敖知優孟之賢病且死謂其子曰我死汝必貧困其子無立錐之地又曰甯戚衛人也欲仕齊家貧無以自資乃賃為人推車至齊國桓公出戚望見車駕乃於車下飯牛扣牛角而歌桓公聞之撫手曰異哉此人乃非常人也命管仲迎之以為上卿又曰馮驩齊人貧乏不能自存使人屬齊相孟嘗君願寄食門下孟嘗君曰客何能也對曰無能孟嘗君笑而受之左右皆知君賤之食以草具居有頃驩倚柱彈其劍鋏而歌曰長鋏歸來乎食無魚左右以告孟嘗君食之乃比門下諸客居有頃復歌曰長鋏歸來乎出無車左右以告孟嘗君為之駕比門下客後有頃復歌曰長鋏歸來乎無以為家左右皆惡之以其貪不知足也孟嘗君問驩曰公有親乎對曰有母孟嘗君令人給其食用無使乏驩乃不復歌後孟嘗君出記事問門下諸客有能習計會能為吾收債於薛乎驩獨署曰臣能孟嘗君怪曰此誰乎左右曰歌夫長鋏歸來者也孟嘗君笑曰客果有能吾負之未之見也請而見之謝曰文倦於事憒於憂久開罪於先生先生不羞乃有意欲為收債乎驩對曰願之於是約車治裝載券契將行驩問曰收債畢市何物而返也孟嘗君曰視吾家之寡有者驩遂驅而之薛使吏召諸民當償債者悉來合券券既合驩乃矯君命以所債賜諸民因燒其券民皆呼萬歲驩遂長驅而還見孟嘗君君怪其疾也衣冠而見之曰債畢乎對曰畢何市而返對曰臣竊計宮中珍寶盈室車馬實於外廄美人充下陳君家所寡有者義耳竊為君市義孟嘗君曰市義若何對曰今君有區區之薛不附愛子其民因而賈利之臣竊矯君命盡以賜之而燒其券民時稱萬歲此臣為君市義也孟嘗君不悅曰先生休矣於是朞年人或毀孟嘗君於湣王曰孟嘗君將亂及王出畋忽有劫王者意甚疑之孟嘗君將出奔其舍人魏子初為君收邑三返而不敢入君問之對曰有賢者竊為君教與之以故無入至是魏子所與賢者聞孟嘗君出上書言其不亂請以身盟遂自刎於宮門湣王大驚乃復召孟嘗君孟嘗君謝病歸老於薛未至百里民扶老攜幼迎於道傍孟嘗君顧謂驩曰先生所為文市義者乃今見之矣驩對曰狡兔有三窟僅得免於死矣今君止有一窟未得高枕而臥也請為君復鑿三窟孟嘗君與車五十乘金百斤西遊於梁說魏王曰齊放其大臣孟嘗諸侯先迎之者國富兵強於是魏昭王以其故相為上將軍而虛相位遣謁者齎黃金千斤車乘往聘孟嘗君固辭不往魏使三返湣王聞之君臣恐懼遣太傅齎黃金千斤文馬二駟以謝孟嘗君使返國驩又請曰願得先生祭器立宗廟於薛廟既成還報曰三窟以就君可高會而樂矣孟嘗君乃還為齊相又曰顏無繇字路顏淵父也回死顏路貧請孔子車以葬孔安國曰賣車以作槨也孔子曰才不才亦各言其子鯉也死有棺而無槨吾不徒行以為之槨以吾從大夫之後不可徒行也又曰魏悖少時欲求見齊相曹參家貧無以自通乃常獨早夜掃齊相舍人門外舍人怪之以為物而伺之獨得勃勃曰願見相君無因故為子掃欲以求見於是舍人見之曹參因以為舍人又曰東郭先生拜為都尉先生久待詔公車貧困飢寒衣弊履不完行雪中履有上無下足盡踐地道人笑之又曰甘茂亡秦奔齊逢蘇代為齊使於秦茂曰臣得罪於秦懼而逃無所容跡臣聞富人女會績貧人女曰我無以置燭而子之火光有餘子可分我餘光無損子明今臣困願以餘光振之漢書曰司馬相如字長卿成都人家貧嘗於臨邛市與人沽酒傭為洒掃身著牘鼻布裩於市中然少好讀書學擊劍小名犬子慕藺相如之為人更名曰相如後遊梁數年歸素與臨邛令王吉善臨邛多富人有卓王孫程鄭相謂曰今有貴客為具召之并召令令既至請長卿長卿謝不能臨臨邛令不敢嘗食乃自起迎相如相如不得已而強往一坐盡歡酒酣令前奏琴曰竊聞長卿好之願以自娛相如為鼓一弄卓王孫有女文君新寡好音竊窺之相如乃挑之文君夜奔相如相如與馳歸成都家徒四壁立卓王孫大怒曰女不才我不忍赦一錢不分文君久之與相如俱至臨邛買酒舍乃令文君當壚相如與傭保雜作於市卓王孫恥之昆弟諸公謂王孫曰一女所不足者非財也今文君失身於相如相如雖貧其人才足依也柰何相辱如此王孫不得已分與僮僕百人錢百萬文君與相如乃歸成都武帝立蜀人楊德意為狗監侍上讀子虛賦而善之曰朕獨不得與此人同時意曰此臣之邑人司馬相如為此賦上驚乃召問相如相如曰然此乃諸侯之事未足可觀乃作上林賦賦成奏之帝大悅以相如為郎後拜中郎將建節使至蜀蜀太守郊迎縣令負弩先驅於是鄉閭故人及卓王孫諸公因門下獻牛酒以交歡王孫於是喟然歎曰老人所恨得使女事相如乃晚耳又曰晃錯奏曰古者稅民不過什一秦則不然用商鞅之法改帝王之制除井田民得賣買富者連阡陌貧者亡立錐之地故貧民常衣馬牛之衣而食犬彘之食又曰陳平陽武戶牖鄉人少時家貧有田三十畝與兄伯居常耕田縱平使遊學平為人長大美色人或謂平貧何食而肥若是其嫂疾平之不親家事曰食糠籺耳有叔如此不如無平好讀詩書家貧居窮巷以席為戶然門外多長者車轍又曰酈食其陳留高陽人好讀書家貧落魄無衣食業為里監門吏然縣中賢豪不敢役皆謂之狂生又曰韓信淮陰人家貧無行不得推擇為吏不能治生為商賈從常人寄食其母死無以葬乃行營高燥地令傍可置萬家者又曰倪寬千乘人治尚書歐陽生貧無貲用帶經而鋤休息輒誦讀又曰嚴助侍讌從容上問所欲對曰家貧為友壻富人所辱願為會稽太守於是拜之又曰王章字仲卿太山鉅平人為諸生學長安獨與妻居章疾病無被臥牛衣中與妻決涕泣其妻呵怒曰仲卿京師尊貴在朝廷人誰踰仲卿者今疾病困厄不自激卬乃反涕泣何鄙也又曰朱買臣字翁子吳人也家貧好書不治產業常刈薪樵以自賣給食擔束薪行且誦書其妻亦負載相隨數止買臣無歌謳道中買臣愈益疾歌妻羞之求去買臣笑曰我年五十當富貴今四十餘矣汝苦日久待我富貴報汝功力妻恚曰如公等終餓死溝中耳何能富貴買臣不能留即聽去又曰蔡義河內溫人以明經給事大將軍幕府家貧常步行資禮不逮眾門下好事者相合為義買犢車令乘之又曰主父偃齊國臨淄人學長短縱橫術晚乃學易春秋百家言遊齊諸子聞諸儒生相與排擯不容齊家貧假貸無所得北遊燕趙中皆莫能厚遇又曰陳湯字子公山陽瑕丘人少好學書博達善屬文家貧取貸無節不為州里所稱又曰貢禹上書曰臣禹年老貧窮家貲不滿萬錢妻子糠豆不贍短褐不完有田百三十畝又曰揚雄以病免復召為大夫家素貧嗜酒人希至其門下有好事者載肴從遊學又曰張竦居貧無賓客時有好事者從之質疑問事論道經書而已又曰匡衡字稚圭東海承人父世農夫至衡好學家貧傭作以供資用尤精力過人范曄後漢書曰孫期字仲式濟陰人也少為諸生家貧事母至孝牧豕於大澤中以奉焉遠人從其學者皆執經壟畔以追之里落化其讓又曰申屠蟠字子龍陳留外黃人也家貧傭為漆工郭林宗見而奇之又曰李充字大遜陳留人家貧兄弟六人同衣遞食妻竊為充曰今貧若此難以久留妾有私財願思分異充偽許之曰當醞酒會內外共議既而致酒宴客充前跪白母此婦無狀教充離間母兄今遣斥便叱去之謝承後漢書曰王充字仲任上虞人少孤鄉里稱孝到京師受業太學博覽而不守章句家貧無書常遊洛陽市肆閱所賣書目一見輒能誦憶遂博通眾流又曰張楷字公超治嚴氏春秋古文尚書門徒皆造問焉車馬填門貴戚之家皆起舍巷以候過客之利楷疾其如此輒徙避家貧無為業常乘驢車至縣賣藥足給食輒還鄉里東觀漢記曰符融妻亡貧無殯斂鄉人欲為具棺服融不肯受曰古之亡者棄之中野唯妻子可以行志但土埋藏而已又曰桓榮字春卿沛郡龍亢人也少學長安治歐陽尚書事博士朱普貧窶無常客傭以自給精力不倦十五年不窺家又曰閔仲叔居安邑老病家貧不能買肉日買一片豬肝屠者或不肯為斷安邑令候之問諸子何飯食對曰但食豬肝屠者或不肯與之令出勑市吏後買輒得仲叔怪問其子道狀乃歎曰閔仲叔豈以口腹累安邑耶遂去之沛又曰周紆為渤海太守赦令詔書到門不出夜遣吏到屬縣書決罪行刑坐徵詣廷尉繫獄數日免歸家貧無以自賑贍身築壍以給食章帝知憐之復以為郎華嶠後漢書曰范式為荊州刺史友人南陽孔嵩家貧親老乃變名姓傭為新野河里街卒式行部到新野而縣選嵩為導騶迎式式見而識之呼嵩把臂曰子非孔仲山耶對之歎息語及平生曰共與俱曳長裾遊集帝學吾蒙國恩致位牧伯而子懷道隱身處於卒伍不亦惜乎嵩曰昔侯嬴長守於賤業晨掃門肆志於抱關子居九夷不患其陋貧者士之宜豈為鄙哉式勑縣代嵩嵩以為先傭未竟不肯去續漢書曰范丹桓帝時以丹為萊蕪長不到官後辟太尉府自以狷急不能從俗常佩韋於朝徒行獘服賣卜於市遭黨人禁錮遂推鹿車載妻子捃拾自資或依宿樹蔭如此十餘年乃結草室內居焉閭里歌曰甑中生塵范史雲釜裏生魚范範萊蕪又曰吳祐年二十喪父居無擔石而不受贍遺常牧豕於長垣澤中行吟經書遇父故人謂之曰卿二千石子而自業賤事縱子無恥奈先君何祐辭謝而已守志如初也又曰王苑字仲安貧賤茅屋蓬戶藜藿謝承後漢書曰施延字君子沛人家貧母老常鬻力供養種瓜自給位至太尉又曰永平五年班超兄固被召詣校書超與母隨至洛陽家貧常為傭書以供養久傭嘗苦輟業投筆歎曰大丈夫無它志略獨當效傅介子張騫立功異域以取封侯安能久事筆硯乎魏略曰常林少單貧雖貧自非手力不取之於人性好學漢末為諸生帶經耕鋤其妻自擔餉餽之林雖在田野其相敬如賓又曰黃初中儒雅並進而楊沛本以事服能見遂以議郎冗散里巷沛前後宰歷城守不以私計意故身退之後家無餘積治疾於家荒田二項起蝸牛廬居止其中也典略曰程堅字謀甫南陽舞陰人仁孝清潔居貧無資磨鏡自給不受人施諸嫗共漂更相呼食有或不食也相謂曰非程謀甫何為不食人食耶又曰劉陶字子奇川人世祖十八年徙六郡大族陶曾祖自齊來世以儒學安貧樂道故仕不過孝廉又曰裴潛每之官不將妻子妻子貧乏織荊芘以自供群弟之田廬常步行家人小大或并日而食晉中興書曰王猛北海人居魏土少貧賤鬻畚為業嘗至洛陽貨畚有一人於市貴買畚而無直曰可隨我去取直猛隨行不覺遠忽至深山語猛且住樹下當先啟道君來須臾猛進見一公踞胡床頭鬢悉白從十許人一人引猛云大司馬公可進猛因拜公公曰王公何緣拜即十倍酬畚直遣人送猛出顧視乃嵩山又曰劉寔字子真平原高唐人少貧共糠飯繩索作衣賣手繩口誦又曰淳于智字叔平濟北人上黨鮑青家少喪疾貧苦謂曰淳于叔平神人也何不試就卜瑗乃令智作卦卦成曰君謂宅東北有大桑樹君逕至市入門數十步當有一人將新馬鞭者就請還買以懸此桑樹三年當暴得財也瑗承其言詣市果得馬鞭懸之正三年後浚井得錢千萬銅鐵雜器復可二十餘萬於是家業用展病者亦愈
