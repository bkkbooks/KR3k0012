body:
  text: 地部三十二池廣雅曰沼池也說文曰隍城池也有水曰池無水曰隍詩曰東門之池可以漚麻又曰王在靈沼於牣魚躍沼池也牣滿也箋云靈沼之水魚盈滿其中皆飛躍言亦得其所也韓詩外傳曰齊景公出弋昭華之池傳曰齊伐楚楚子使屈完對曰楚國方城以為城漢水以為池齊雖眾無所用之史記封禪書曰秦始皇遊海上祠名山大川及八神仙人羨門之屬八神一曰天齊祠天齊天池名臨南郊山漢書曰昆明池漢武帝元狩三年所穿也初漢欲求身毒國為昆明池夷所閉昆明有滇池方三百里名曰滇河漢將伐昆明以通身毒使謫卒伐棘上林象滇河作昆明池以習水戰池周廻四十里漢武帝平昆明以其地為益州郡其滇水原深廣末反淺狹有似倒流故曰滇河潘岳關中記曰昆明池漢武習水戰也中有靈沼神池云堯時理水訖停舡此池蓋堯時已有污池漢代因而深廣耳曹毗志怪云漢武鑿昆明池極深悉是灰墨無復土舉朝不解以問東方朔朔日臣愚不足以知之可試問西域胡帝以朔不知難以核問至後漢明帝時外國道人入來洛陽時有憶方朔言者乃試以武帝時灰墨問之胡人云經云天地大劫將盡則劫燒此劫燒之餘乃知朔言有是又曰昭帝元始元年春三月黃鵠下建昌宮太液池又曰宣帝詔曰池籞未御幸者蘇林曰折竹以繩綿連若禁籞使人不得往來也假與貧民郡國宮館勿復脩治又曰宣帝神爵元年詔曰金芝生于涵德殿銅池中銅作也魏志曰太祖還鄴作玄武池以肄舟師晉書曰山簡優遊卒歲唯酒是躭諸習氏荊土豪族有佳園池簡每出嬉遊多之池上置酒輒醉名之曰高陽池時有童兒歌曰山公出何許往至高陽池日夕倒載歸酩酊無所知時時能騎馬倒著白接離舉鞭向葛疆何如并州兒彊家在并州簡愛將也又曰荀勗久在中書專管機事失之甚怏怏或有賀之者勗曰奪我鳳皇池諸君何賀我耶後魏書曰文明皇太后馮氏與高祖幸靈泉池醼群臣太后忻然歌高祖亦和歌歌者九十人唐書曰蔣鎮為諫議大夫時戶部侍郎判度支韓滉上言河中鹽池生瑞鹽實土德之上瑞上以秋霖稍多水潦為患不宜生瑞命鎮馳馹檢行之鎮奏與滉同仍上表賀請宣付史館并請置神祠錫其號寶應靈慶池又曰文宗用鄭注言即命左右神策軍差人淘曲江昆明二池仍許公卿士大夫之家於江頭立亭館以時追賞遁甲開山圖榮氏解曰降北有陽石山中有神龍池黃帝時遣雲陽先生養龍於此帝王歷代養龍之處國有水旱不時祀池請雨晉宮閣名曰靈芝池廣長百五十步深二丈上有連樓飛觀四出閣道釣臺中有鳴鶴舟指南舟袁山松宜都記曰佷山縣東六十里有山名下魚城四面絕崖唯兩道可上皆峻嶮山上周廻可二十里有林池水民田種於山上昔永嘉亂土人登此避賊賊守之經年食盡取池魚擲下與之示不窮賊遂退散因名此為下魚城辛氏三秦記曰昆明池通白鹿原人釣魚綸絕而去夢於漢武求去其鉤明日戲於池見大魚御鉤帝去其鉤而放之間三日帝復遊池濱得明珠一雙武帝曰豈昔魚之報也湘州記曰湘南縣有架山下有小池常涸竭民齋戒往請自然而滿事訖還乾雷次宗豫章記曰去洪井六七里有風雨池山嶠水出激著樹木星散遠灑如風雨焉襄陽記曰峴山南有習郁太魚池依范蠡養魚法當中築一釣臺將亡勑其兒曰必葬我近魚池山季倫每臨此輒大醉而歸臨川記曰崇仁縣有鹹池桉陳書司空黃法𣰋音翟字仲昭崇仁縣巴山人也侯景亂法𣰋於卿里聚徒以助高祖有功薨墓在崇仁縣巴山卿故老相傳法𣰋有奇術常欲變置鹽池於家山之下愊員六十餘畝至今水味獨鹹於他水而湛然清澈禽畜不敢觸之西京雜記曰梁孝王好宮室苑囿之樂作曜華之宮築兔園園中有靈山山安膚寸石又有鴈池池中鶴洲鳧渚奇果異樹瑰禽怪獸畢備王日與宮人及賓客弋釣其中又曰積草池中有珊瑚樹高一丈二尺一云三柯上四百六十二條是越國王趙他所進號為烽火樹至夜光景照焉述征記曰廣陽門北有魏明帝流杯池穆天子傳曰天子西征于玄池天子三日休于玄池之上天子乃樹之竹種竹池邊是曰竹林又曰天子觴西王母于瑤池上西王母為天子謠三輔故事曰漢武帝作昆明池武帝崩後於池中養魚以給諸陵祠餘付長安市池有二石人如牽牛織女像又曰未央宮西有食池池中有臺王莽死於是也廣州先賢傳曰丁密字靖公蒼梧人遭父艱哭泣三年飛鳧一雙游密廬傍小池郡國志曰晉州臨汾縣臭水池下畜不飲一名飜鑊池即煮眉間赤頭處鑊飜因成池今水上猶有脂潤又曰成都郡秦惠王二十七年使張儀築城以象咸陽沃野千里號曰陸海有萬歲池是築城取土處又曰合浦海曲出珠號曰珠池又有夷人號越㐌多採甲香為業呂氏春秋曰衛靈公天寒鑿池宛春諫曰天寒公曰天寒乎宛春曰公衣狐裘坐熊席陬隅有竈是以不寒淮南子曰陰氣極則下至黃泉故不可鑿池穿井世說曰晉明帝欲作池臺元帝不許之明帝為太子養武士一夕中作比曉便成即今謂太子池是也又曰太原王國寶治宅因浚池忽見一物如酒杓形長四尺許飛去水經注曰隴西神馬山有淵池龍馬所生即是水西流謂之馬池又曰蔡州西即蔡倫故宅傍有蔡子池倫漢黃門即順帝之世始檮故魚網綱為紙用代簡素自其始也又曰滇池中有神馬家馬交之則生駿駒日行五百里顧子曰與子華遊於東池子華曰水有四德池為一焉沐浴群生流澤萬世仁也揚清激濁盪滌塵穢義也弱而難勝勇也導江䟽河變盈流謙智也顧子曰我得汝於池上矣方輿記曰興元府南鄭縣天池山上有池方二十里冬夏不竭久飲之可愈痼疾故號天池又曰梅福池一名風雨池梅福種蓮池福歎曰生為我酷身為桎梏形為我辱智為我毒於是棄南昌縣尉去妻子入洪崖山得道為神仙代代有人見或在玉笥山逢之今西山有梅君壇南昌開元觀有梅君堂焉又曰明月池在興道縣西北中有一臺云是漢高所營水經云形如偃月故號明月池又曰七女池昔有人無男而養七女父亡七女負土葬父取土之處今成一池號曰七女池今池邊又有七女塚谿尚書大傳曰呂尚釣於磻溪得魚腹中有玉璜春秋說題辭曰谿者隱也深虛繞山令得愽也宋均曰無水曰谷有木曰谿爾雅曰水注川曰谿桓彝別傳曰彝字茂倫明帝世彝與當時英彥名德庾亮溫嶠羊曼等共集青谿池上郭璞預焉乃援筆屬詩以白四賢并自序武昌記曰樊山東有山谿夏時凜凜恒有寒氣故謂之寒谿王韶之始興記曰連水下流有斟谿一日十溢十竭盛弘之荊州記曰酈縣北五十里有菊谿源出石澗山有甘菊村人食此水多壽又曰零陵郡西有九渡谿山獸從數十里往飲之經越他水皆不飲傍有半石坑上石形極方峭名為仙人樓又曰桂陽郡桂橫谿谿水甚深冬夏不乾俗謂之為貪泉也郡西南五十里有萬歲山有石室出鍾乳山上悉生靈壽木下有一谿名為千秋水其傍有居民即號萬歲村管子曰桓公北征孤竹廻未至卑耳之谿授弓而射未敢發謂左右曰見前人乎對曰不見公曰寡人見人長尺而人物具焉管仲曰臣聞霸王之君興而登山神見公拜曰仲父之聖若此俗說曰郗僧施青谿中汎舟一曲處輒作一篇詩謝益壽見詩嘆曰青谿中曲復何可窮水經注曰磻溪即太公釣所也石壁深高幽泉邃密林障秀阻亦人罕交東南隅有石室蓋太公所居也水次平石即太公垂釣之處也其水清冷神異北流注于渭又曰長陽谿源石穴中有神魚大者二尺小者一尺居民釣魚先陳所須多少拜而請之拜訖投釣得魚過數者水輒波涌暴風卒起樹木催折水側生異花路人欲摘者皆當先請不得輒取又曰白馬谿水出宜陽山有大石厥狀似馬故谿澗以物色受名也又曰向城有水二源俱北流合為一川名天漿谿又曰閩中有徐登者女子化為丈夫與東陽趙昞並善越方時遭兵亂相遇於谿各矜其所能登先禁谿水為不流昞次禁枯柳為生荑二人相視而笑登年長昞師事之後登身故昞東入章安百姓未知昞乃升茅屋榰鼎而主人驚怪昞笑而不應屋亦不損又嘗臨水求渡舡人不許昞乃張蓋坐中長嘯呼風亂流而濟於是百姓神服從者如歸又曰山陰縣西四十里有二溪東溪廣一丈九尺冬暖夏冷西溪廣三丈五尺冬冷夏暖二溪北出行三里至徐村合成一溪廣五丈餘而溫涼不雜蓋山經所謂茗水也又曰朐䏰有龜溪出靈龜咸熙元年獻龜於相府言出自此溪也郡國志曰豫州吳房縣吳王闔閭之第夫概王朝楚楚封之於堂溪又曰王昭君秭歸人也有香溪即昭君遊處又曰資陽縣有環溪百丈池所謂溪流如鐶池深百丈也又曰陵陽山在石埭縣北三里桉輿地志陵陽令竇子明於溪側釣魚一日釣得白龍子明鄰而放之後數年又釣得一白魚割其腹中乃有書教子明燒煉食餌之術三年後白龍來迎子明遂得上昇其溪環遶山足今有仙壇醮祭不絕信州圖經曰師溪水源出黃蘗山北面在弋陽縣東南一百一十里昔有隱士胡超居此眾人師之故名師溪越絕書曰薛燭對越王曰若耶之溪涸而出銅也古歐冶子鑄劍之所故戰國策云涸若耶以取銅破堇山而出錫又郡國志云歐冶子鑄劍處下有孤潭深而清有孤石聳出潭上有大櫟樹謝客兒與弟惠連作詩連句刻於樹上吳興記曰前溪在縣南東流入太湖謂之風渚夾溪悉生箭箬後溪在市北東出餘不亭晉車騎將軍沈充作前溪歌曲傳者以為指此溪也裴氏廣州記曰百管谿周廻丈餘水極沸涌如猛火煎油聲臨海圖經曰銅溪在縣西北五十里其水黃色狀似銅故號銅溪也孫興公天台山賦云過靈溪而一濯是也善歌錄曰武溪水源出武山東南流注于沅故為歌曰武溪深復深飛鳥不能渡遊獸不能臨又曰下潦上霧看飛鳥墮水中即此也壑周易略例曰隆墀永歎遠壑必盈禮記曰大蜡之祭辭曰土反其宅水歸其壑山海經曰東海之水有大壑列子曰渤海之東不知幾億萬里有大壑實惟無底之谷曰歸塘莊子曰夫壑之為物注焉而不滿取焉而不竭又曰藏舟於壑藏山於澤謂之固矣然則夜半有力者負之而趨昧者不知孟子曰志士不志在溝壑
