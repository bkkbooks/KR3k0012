body:
  text: 疾病部一揔敘疾病上說文曰疾病也疹病加也疢熱病也癉勞病也疽黃病也痁入病也釋名曰疾病也客氣中人急疾也病並也與正氣並在膚體中也疹診也有結聚可得診見也痛通也通在膚脈中也癢楊也其氣在皮中人搖發之揚出也爾雅曰痛瘏虺頹玄黃劬勞咎顇瘽瘉鰥戮癙癵㾖痒癢疧疵閔逐疚痗瘥痱癉瘵瘼癠病也方言曰南楚疾愈謂之差或謂之閒或謂之知通語也或謂之慧或謂之了或謂之瘳或謂之除殗於怯反殜音業微也晉楚之閒凡病不甚曰殗殜郭曰半臥半起也凡病少愈而加劇謂之不斟斟盆也或謂之何斟言雖小損無所益也瘼音莫復病也東濟海岱之間曰瘼或曰癁秦曰瘎音閻或諶周易無妄卦曰無妄之疾勿藥有喜也周禮天官下曰疾醫掌養萬民之疾病四時皆有癘疾春時有痟首疾夏時有痒疥疾秋時有瘧寒熱疾冬時有嗽上氣疾又曰醫師掌醫之政令凡邦之有疾病者有疕瘍者造焉則使醫分而治之禮記曲禮下曰君使士射不能則辭以疾曰某有負薪之憂又曰曾子寢疾病樂正子春坐於狀下鄭玄注子春曾參弟曾元曾申坐於足元申曾參之子童子隅坐而執燭童子曰華而睆大夫之簀與華畫也謂床簀也說者以睆為刮節目字或為刮子春曰止以病困不可動曾子聞之瞿然曰呼呼虛憊之聲也曰華而睆大夫之簀與曾子曰然斯季孫之賜也我未之能易也元起易簀曾元曰夫子之病革矣不可以變幸而至於旦請敬易之革急也變動也又喪服大記曰疾病外內皆掃為賓客將來問病也疾困曰病也君大夫徹懸士去琴瑟聲音動人病欲靜也寢東首于北牖下廢床徹褻衣加新衣體一人男子不死于婦人之手婦人不死于男子之手又曰君於大夫疾三問之士疾一問之左傳成十五年曰晉侯疾病求醫于秦秦伯使醫緩為之未至公夢疾為二豎子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何醫至曰疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也公曰良醫也厚為之禮而歸之又昭上曰晉侯有疾鄭伯使公孫僑如晉聘且問病叔向問焉曰寡君之疾病卜人曰實沉臺駘為祟史莫之知敢問此何神也子產曰若君身則亦出入飲食哀樂之事也山川星辰之神又何為焉言實沉臺駘不為君疾僑聞之君子有四時朝以聽政晝以訪問夕以脩令夜以安身於是節宣其氣勿使有所壅閉湫子小切底以露其體湫集底帶也露羸也一之則血氣集滯而體羸露今無乃一之則切生疾矣又昭上曰晉侯有疾求醫於秦泰伯使醫和視之曰疾不可為也是謂近女室疾如蠱蠱惑也非鬼非食惑以喪志惑女色而失志良臣將死天命不祐良臣不君過故將死而天不祐公曰女不可近乎對曰節之天有六氣降生五味發為五色徵為五聲淫生六疾事具醫門又昭二曰鄭子產聘于晉韓宣子曰寡君寢疾今夢黃熊奴才反入于寢門其何厲鬼也對曰堯殛鯀于羽山其神化為黃熊以入于羽淵實為夏郊三代祀之晉為盟主其或未之祀乎韓子祀夏郊晉侯有閒春秋穀梁傳曰季孫行父禿晉郄克跛孫良父眇曹公子手僂同聘于齊齊使禿者御禿者跛者御跛者眇者御眇者僂者御僂者蕭同叔子處臺而笑之客不悅相立胥閭而語移日不解齊有知者曰齊患必自此始也麋俗胥閭門名也御迎也春秋公羊傳曰衛縶不立惡疾也何休解曰惡疾聾盲之屬國語魯語曰子叔聲伯如晉郄犨欲與之邑弗受郄犨晉卿苦成叔也歸鮑國謂之曰子何以辭苦成叔之邑對曰吾聞之不厚其棟不能任重重莫若國棟莫若德夫苦成叔欲任兩國而無大德亡無日矣譬之如疾余懼易焉疾疫厲病論語曰曾子有疾召門弟子曰啟予足啟予手啟開也曾以為孝子受體於父母當完全之今疾或死故使弟子開衾而視之史記曰陳軫適秦秦惠王曰子去寡人之楚亦思寡人不陳軫對曰聞夫越人莊舄乎王曰不聞曰越人莊舄仕楚執珪有頃而病為越聲楚王曰舄故越之鄙細人也今仕楚執珪貴極矣亦思越不對曰凡人思故在其病也彼思越則越聲不思越則且楚聲使人往聽之猶尚越聲也今臣雖棄逐之楚豈能無秦聲哉又曰留侯多疾即導引不食穀漢書曰服辟穀藥靜居行氣也漢書曰王章為諸生學長安獨與妻居章病無被臥牛衣中與妻決涕泣其妻呵怒之曰仲卿京師尊貴在朝廷人誰踰仲卿者今病困不自激卬如淳曰激厲抗揚之意也乃返涕泣何鄙也又曰朱雲年七十餘終於家病不呼醫飲藥遺言以身服歛棺周於身土周於槨魏志曰太傅鍾繇有膝疾時華歆亦以高年疾病朝見皆使虎賁轝上殿就坐後三公疾常以為故事吳志曰呂蒙獲關羽封爵未下會疾發權時在公安延置內殿所以治護者萬方募邦內有能愈蒙疾者賜千金恐其勞動常穿鑿壁瞻之見其小能下食則喜顧左右言笑不然則咄嗟夜不能寐病中瘳為下赦令群臣畢賀後更增篤權自臨視命道士於星辰下為之請命晉書曰王戎先有吐疾居喪增甚帝遣醫療之并賜藥物又斷賓客晉書曰樂廣字彥輔嘗有親客久闊不復來廣問其故荅曰前在坐蒙賜酒方欲飲見盃中有虵意甚惡之既飲而疾作時河南廳事壁上有角漆畫作蛇廣意盃中虵即角影也復置酒於前處謂客曰酒中復有所見不荅曰所見如初廣乃告其所以豁然意解沉痾頓愈又風俗通曰予之祖郴為汲令以夏至日請主簿杜宣賜酒時北壁上有懸弓照於杯中某影如虵宣畏惡之然不敢不飲其日便得病云虵入腹郴召宣於故處設酒盃中有一虵因謂宣此乃壁上弓影耳非他怪宣意遂解甚夷懌又曰皇甫謐字士安因病服寒食散而性與之忤每委頓不倫嘗悲恚叩刃欲自殺叔母諫而止謐嘗上䟽曰久嬰篤疾軀半不仁右腳偏小十有九載又服寒食藥違錯節度辛苦茶毒于今七年隆冬裸袒食冰當暑煩悶加以咳逆或若溫瘧或類傷寒浮氣流腫四支酸重於今困劣宋書曰羊欣有病不服藥飲符水而已兼善醫術撰藥方數十卷沈休文宋書曰謝述有心虛疾性理時或乖謬除吳郡太守以疾不之官裴子野宋略曰殷景仁入居西州疾篤上為之累息西州道上不得有車聲謝綽宋拾遺曰宋愨表曰臣昔貧賤時嘗疾病家人為臣齋勤苦七日臣晝寢夢見一童子青衣持縑廣數寸與臣臣問之用此何為荅曰西王母符也可服之服符竟便覺一二日病差梁書曰范雲忽中疾居二日半召醫徐文伯視之伯曰緩之一月乃復欲速即時愈止恐二年不復可救雲曰朝聞道夕死可矣而況二年文伯乃下火而壯焉重衣以覆之有頃許汗流於背即起二年果卒南史曰褚澄善醫術建元中為吳郡太守百姓李道念以公事到郡澄見謂汝有重病荅曰舊有冷病至今五年眾醫不差澄為診謂曰汝病非冷非熱當是食白瀹雞子過多所致今取蒜一升煮服乃吐一物如升涎裹之動開看是雞雛羽翅爪距具足能行走澄曰此未盡更服所餘藥又吐得如向者雞十三頭而病都差當時稱妙北史曰齊蘭陵王長恭有戰功帝忌之人謂長恭勿預事長恭然其言未能退及江淮寇擾恐復為將歎曰我去年面腫今何不發自是有疾不療後魏書曰李諧為人短小六指因癭而舉頤因跛而後步因譽而徐言人言李諧善用三短北史曰周裴俠嘗遇疾沉頓士友憂之忽聞五鼓便即驚起顧左右可向府耶所苦因此而瘳晉公護聞之曰裴俠危篤若此而不應憂公因聞鼓聲疾病遂愈此豈非天祐其勤恪也唐書曰太宗謂侍臣曰治國與養病無異也病人覺愈彌須將護若有觸犯必至殞命治國亦然天下稍安尢須兢慎若便驕逸必至喪敗又曰有患應病者問醫官蘇澄云自古無此方今吾所撰本草網羅天下藥物亦謂盡矣試將讀之應有所覺其人每發一聲腹中輒應唯至一藥再三無聲過至他藥復應如初澄因為處方以此藥為主其病自除老子曰知不知上不知知病聖人不病以其病病夫唯病病是以不病莊子曰堯以天下讓許由許由不受又讓於子州支父子州支父曰以我為天子可也雖然我適有幽憂之病方旦治之未暇治天下也又曰子來有病喘喘然將死其妻子環而泣之子黎往問之倚其戶與之語曰偉哉造化以女為鼠肝乎以女為蟲臂乎子來曰父母於子東西南北唯命之從陰陽於人不翅為父母信陰陽制人甚於父母又曰南榮趎曰里人有疾里人問之病者能言其病病者猶未病也若趎之問大道也譬猶飲樂以加病者也司馬彪曰加增加也趎願聞衛生之經而已矣衛生謂衛護其生全性命列子曰龍叔謂文摯曰子之術微矣吾有疾病子能已乎文摯曰唯命所聽然先言子所病之證龍叔曰吾鄉譽不以為榮國毀不以為辱得而弗喜失而弗憂視生如死視富如貧此奚疾哉奚方能已之乎文摯乃命龍叔背明而立文摯從後向明而望之既而曰嘻吾見子之心矣方寸之地虛矣幾聖人也子心六孔流通一孔不達今以聖智為病者或由此乎非吾淺術所能已也又曰秦人逢氏有子少而慧及壯而有迷罔之疾聞歌以為哭視白以為黑饗香以為朽嘗甘以為苦行非以為是意之所之天地四方水火寒暑無不倒錯者焉列子曰鼻將窒者先覺燋朽體將僵者先亟犇佚心將迷者先識是非故物不至者則不反又曰宋陽里華子中年病忘朝取而夕忘夕與而朝忘在塗則忘行在室則忘坐不識先後不識今古魯有儒生自媒能治之華子之妻以居室之半請其方儒生曰吾試化其心變其慮庶幾其瘳乎於是試露之而求衣飢之而求食幽之而求明生欣然告其子曰疾可已也然吾方密傳不以告人試屏左右獨與居室七日而積年之病一日都盡又曰楊朱之友曰季梁季梁得疾七日大漸其子環而泣之請謁醫季梁謂楊朱曰吾子不肖如此之甚汝奚不為我歌以曉之其子曰不曉終謁三醫而季梁之疾自瘳墨子曰墨子病洗鼻問曰先生以鬼神為明福善禍惡今先生聖人也何故病墨子曰病者多方有得之勞苦有得之寒暑今有百門而閉其一賊何處不入哉管子曰凡國都皆有養疾聾盲喑啞跛躄偏枯不能自生者上收而養之尹子曰與死者同病難為良醫與亡國同道不可為謀又曰人將疾也必先不甘魚肉之味韓子曰秦昭王有疾百姓買牛而家為王禱魏子曰待扁鵲乃治病終身不愈也用道術則無所不治也淮南子曰土地各以類生人是故山氣多男澤氣多女水氣多瘖風氣多聾林氣多瘧木氣多傴生子多有此疾岸下氣多尰濕氣所坐石氣多力險阻氣多癭暑氣多殘殘折不終寒氣多壽谷氣多痺丘氣多狂衍氣多仁下而平也陵氣多貪象陵積聚春秋後語日齊桓公六年越醫扁鵲過齊桓侯客待之入朝見曰君有疾在腠理不治將深腠理皮膚也桓侯曰寡人無疾扁鵲出桓侯謂左右曰醫之好利欲以不病為功後五日復見日君疾在血脈後五日復見曰疾在腸胃後五日見桓侯而還走桓侯使人問其故日疾在骨髓臣是以無請也桓侯遂卒戰國策曰扁鵲見秦武王示之病扁鵲請除之左右曰君之病在耳之前目之下也除之使耳不聰目不明君以告扁鵲扁鵲怒而投其石曰君與智者謀之而與不智者敗之使秦政如此則一舉而亡國矣韓詩外傳曰人主之疾十有二發非有賢醫莫能治也何謂十二發曰痿蹶逆脹滿支隔盲煩喘痺風賢醫治之如何曰省事輕刑則痿不作無使小民飢寒則蹶不作無令財貨上流則逆不作無使倉廩積腐則脹不作無使府庫充實則滿不作無使群臣縱恣則支不作無使下情不上通則隔不作上材恤下則盲不作法令奉用則煩不作無使下怨則喘不作無使賢人伏匿則痺不作無使百姓歌吟誹謗則風不作夫重臣群下者人主之心腹支體也心腹支體無患則人主無疾矣故非有賢醫莫能治也人主有此十二疾而不用賢醫則國非其國也趙曄吳越春秋曰越王出石室召范蠡謂之曰吳王疾病三月不愈孤聞人臣之道主疾臣憂且吳王遇孤恩澤甚厚恐疾之無瘳也唯先生卜焉范蠡曰今日日辰陰陽上下和親無相入者法曰天一救且何憂吳王不死明矣到已巳當有瘳也呂氏春秋曰齊王疾瘠使人之宋迎文摯摯視疾謂太子曰王疾可已雖然必殺摯非怒王則不可治怒而摯必死太子請之文摯期往而不至三齊王已怒文摯至不解履登床王重怒叱而起病乃已生烹文摯物理論曰趙簡子有疾扁鵲診候出曰疾可治也而必殺醫焉以告太子太子保之扁鵲頻召不入入而著履登床簡子大怒便以戟追殺之扁鵲知簡子大怒則氣通血脈暢達也
