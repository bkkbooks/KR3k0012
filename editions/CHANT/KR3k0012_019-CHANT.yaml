canonical_identifier: bkk:krp/KR3k0012/chant/v1/juan/19
seq: 19
body:
  text: 時序部三春上釋名曰春之言蠢也萬物蠢然而生又曰正月少陽見寅寅者演也律中太蔟律之言率也所以率氣也太者大也蔟者湊也言萬物始大湊地而出也書曰每歲孟春遒人以木鐸徇于路注云遒人宣令之官木鐸金鈴木舌所以振文教也又曰分命羲仲宅嵎夷曰暘谷平秩東作日中星鳥以殷仲春詩曰春日遲遲采蘩祁祁鄭注曰遲遲舒緩也又曰有女懷春吉士誘之又曰春日載陽爰求柔桑又曰嗟嗟保介維暮之春亦又何求如何新畬田二歲曰新三歲曰畬箋云保介車右也月令曰正月之節日在虛立春為正月之節謹按春秋傳曰履端於始謂節也舉正於中謂氣也歸儉於終謂閏也既有閏則立春進退不恒在正月朔日故不定為孟春之月但得立春則是正月之節可以行春令矣昏昴中曉心中凡記昏昴曉心中為人君南面而聽天下觀時候以授人事也日入後二刻半為昏日未出二刻半為曉也斗建寅位之初地有十二辰斗柄杓常左旋指地位故立春正月之節則斗建寅位之初書云璇璣玉衡七政此之謂矣其日甲乙春秋傳曰天有十日謂甲乙丙丁戊巳庚辛壬癸甲乙屬木主春故云其日甲乙也其帝太皞其神勾芒昔太皞氏以木德繼天而王故為春帝高辛氏有天下置五行之官木正曰勾芒故勾芒為木神佐太皞於春律中太蔟律者候氣之管以竹為之中猶應也正月氣至則太蔟之律應應謂吹灰也太蔟者林鍾所生三分益一管長八寸空徑三分團九分立春之日東風解凍後五日蟄蟲始振後五日魚上水昔在周公作時訓定二十四氣辨七十二候每候相去各五日以明天時將驗人事言聖人奉順天時則萬物及節候也命有司祭風師立春之後丑日祭風師於國城東地正月中氣日在危雨水為正月中氣凡中氣前后去節十五日春秋傳曰舉正於中此之謂也昏畢中曉尾中斗建寅位之中雨水之日獺祭魚後五日鴻鴈來後五日草木萌動天子乃以元日祈穀于上帝元吉也謂上辛祈穀郊祀昊天上帝於國丘高祖神堯皇帝配坐以五方帝從祀於壇春秋傳曰啟蟄而郊祁而後耕此之謂矣命樂正習舞春夏尚舞故命習之禁止伐木為盛德所在無麛無卵無傷萌勾之類掩骼埋胔為死氣逆生氣枯骨曰骼肉腐曰胔釋名曰二月之夾鍾何夾者孚也言萬物孚甲種類分也禮曰二月之節日在營室驚蟄為二月之節昏東井中曉箕中斗建卯位之初律中夾鍾二月氣至則夾鍾之律應夾鍾者夷則之所生三分益一管長七尺四分其曰其音其數並同孟春驚蟄之日桃始華後五日倉庚鳴後五日鷹化為鳩省囹圄去桎梏省減也囹圄所以禁守繫者則今之獄矣木在手曰梏在足曰桎上丁釋奠於國學釋謂置也置牲幣之奠於文宣王上戊釋奠於太廟廟亦用牲幣之奠又曰二月中氣日在奎春分為二月中氣昏東井中曉南斗中斗建卯位之中春分之日玄鳥至雷乃發聲祀朝日於東郊春分日祭之獻羔開冰謂立春藏冰在春分方溫故獻羔以祭司寒而後開冰春秋傳曰日在北陸而藏冰西陸朝覿而出之先薦寢廟祠高禖昔高辛氏之代玄鳥遺卵簡狄吞之而生高辛後土以為禖官嘉祥而立其祠焉祭馬祖謂仲春祭馬祖於大澤用剛日無竭川澤無漉陂池無焚山林順陽養物也蓄水曰陂穿地通水曰池又曰三月之節日在婁清明為三月之節也昏柳中曉南斗中斗建辰位之初律中沽洗三月氣至沽洗之律應沽洗者南呂之生也三分益一管長七寸一分其日其音其數並同孟春又曰清明之日桐始華田鼠化為鴽後五日虹始見天子居青陽右個是月也天子乃薦鞠衣于先帝鞠衣衣名蓋黃桑之服薦于先帝者為進於太廟天子始乘舟薦鮪于寢廟進時美味聘名士禮賢者聘謂問也名士謂有名譽也又曰三月中氣日在胃穀雨為三月中氣昏張中曉南斗中斗建辰位之中穀雨之日萍始生後五日鳴鳩拂其羽後五日戴勝降于桑命有司無伐桑柘受蠶食乃修蠶器蠶器謂薄搥鉤筐之類擇吉日大合樂大合樂者言行射禮禮曰仲春之月天子乃獻羔開冰先薦寢廟又曰季春之月蚕事既登分繭秤絲效功以供宗廟之服又曰季春之月天子乃為麥祈實鄭玄注曰於含秀求其成也又曰春生夏長仁也秋歛冬藏義也又曰天子五年一巡狩天子以海內為家時一巡狩省之五年者虞夏之制也周則十二歲一巡狩也歲二月東巡守至于岱宗柴而望祀山川柴祭天告至也覲諸侯覲見也問百年者就見之就見老人命大師陳詩以觀民風陳詩謂采其詩而視之命市納賈以觀民之所好惡志淫好辟市典者賈謂知物貴賤厚薄也質則用物貴民則侈物貴民之志淫邪則其所好者不正周禮曰媒氏掌萬民之判判半也合成夫婦也仲春月會男女成春體是時奔者不禁無故而不用令者罰之又曰仲春詔后率內外命婦始蚕于北郊帥六宮之夫人主穜稑之種而獻之于王又曰羅氏仲春獻鳩以養國老鄭玄注曰春鷹化而為鳩變舊為新宜以養老助生氣又曰司烜氏掌仲春以木鐸脩火禁又曰籥章掌仲春晝擊鼓歌豳詩以逆之又曰四時皆有厲疾春時有痟首疾厲疾氣不和之疾痟酸削也傳曰春蒐夏苗秋獮冬狩皆於農隙以講武事也穀梁傳曰魯桓公十有四年春正月無冰皆君不明去就政治紓緩之所致五行傳曰視之不明是謂不哲厥咎舒厥罰常燠無冰時燠也又曰四時之田皆為宗廟之事也春曰田取獸於田夏曰苗因為苗除害故曰苗秋曰蒐蒐擇之舍小取大冬曰狩狩團狩也冬物畢成獲則取之無所擇語曰莫春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸爾雅曰春為青陽一曰發生又曰春獵為蒐搜索取也又曰春祭曰祀薦尚韭柳禮䟽曰祀者思也思嚮所以設之日祀也大戴禮曰三代之禮天子春朝朝日秋暮夕月祭日東壇祭月西壇故以別外內以端其政位所以明有敬也教天下之臣也又曰司徒典春以教民之不時不若不全成長幼老疾孤寡以時通于四疆月闔而不通有煩而不洽則民不樂生不利衣食凡民之藏貯以及山川之神明加于民者發圖功謀齋戒必敬會時必節日曆巫祝執伎以守官俟命而作祈王年禱民命及畜穀蜚征庶虞草方春三月緩施生育動作百物於時有事享于皇祖皇考朝孤子八人以成春事又曰二月祭鮪鮪者魚之先至也又曰三月參則伏不見又曰古者天子孟春論吏之德行能法者為有行能理得法者為有能盛法德者為有功故論吏而法行事治而功成季冬正法孟春論吏治國之要也春論班賞冬考量刑則莫不懲勸也又曰諸侯相見治卿為介以其教士畢行使仁者守會朝于天子天子以歲二月為壇于東郊建五色設五兵具五味陳六律品奏五聲聽明教置離抗大長侯規鵠豎物九卿佐三公三公佐天子天子踐位諸侯各以其局就位乃升諸侯之教士執弓挾矢揖讓以升履物以射其地以心端色容正時以效技有慶以地不時有讓以地天下之有道也開元禮曰仲春上丁釋奠于太學孔宣父為先聖顏子為先師上戊釋奠于齊太公以張良配易通統圖曰日春行東方青道曰東陸易說曰春有白鶴雲京房易占曰春當退貪殘進柔良卹幼孤賑不足求隱士則萬物應節而生隨氣而長所謂春取榆柳之火尚書大傳曰萬物非天不生非地不載非春不動非夏不長非秋不收非冬不藏故書禋于六宗此之謂也禋祭也字當為禋馬氏以為太宗謂日月星辰泰山河海也經曰肆類于上帝禋于六宗望秩于山川徧于群神月令孟冬天子祈來年于天宗如此則六宗近謂天神也以周禮差之則為星辰司人司命風師雨師也又曰東方者何也動方也物之動也何以謂之春春出也物之出也故謂東方春也尚書說曰東方春龍房位其規仁好生不賊五靈東方曰蒼龍五均東曰規五姓曰仁也其帝青表聖明行趜德表德也春好生故曰德尚書考靈耀曰春佩蒼璧蒼佩玉以象德也乘蒼馬以出遊發令於外春行仁政順天之常以安國也又曰鳥星為春候詩含神霧曰齊地處孟春之位海岱之間土地汙泥流之所歸利之所聚律中太蔟音中宮角陳地處季春之位土地平夷無有山谷律中沽洗音中宮徵韓詩外傳簡主曰夫春樹桃李夏得蔭其下秋得食其實春樹蒺藜夏不可采其葉秋得其刺焉由此觀之在所樹也今子所樹非其人也故君子擇而後種又曰天有四時春夏秋冬風雨霜露無非教也韓詩章句曰溱與洧方渙渙兮謂三月桃花水下時鄭國之俗三月上巳於此水招魂續魄祅除不祥之故也三禮義宗曰五行之官也木正曰勾芒者物始生皆勾屈而芒角因用為官名又曰祭六宗之禮寒暑有往來之期可退則祭禳卻之命退應至而不至則祭求之命至故春則送寒而迎暑秋則送暑而迎寒又曰東岳所以謂之岱者代謝之義陽春用事除故生新萬物更生相代之道故以代為名也又曰天子諸侯宮寢之制若春氣三月之中居正寢退息之時常居東北之寢三月之末土王之日則居中寢夏之三月則居東南之寢秋之三月則居西南之寢冬之三月則居西北之寢此三時後土王之日亦各居中寢以從時氣又曰古之學者干戈之舞得從春夏羽籥之職得入秋冬四事之中有文有武故得分之
