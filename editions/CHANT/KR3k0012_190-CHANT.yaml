body:
  text: 居處部十七井釋名井清也泉之清潔者也風俗通云井者法也節也言法制居人令節其飲食無窮禍也久不滯渫滌為井泥易云井泥不食不停污曰井渫易云井渫不食滌井曰浚井水清曰洌井易云井洌寒泉甃聚塼修井也易云井甃無咎易傳曰井通也物所通用也禮記曰井與門戶竈中霤為五祀世本曰伯益作井周書云黃帝作井說文云八家一井易曰改邑不改井無喪無得往來井井又曰井洌寒泉周禮曰挈壺氏掌挈壺以令軍井左傳曰楚伐蕭還無社謂申叔曰目於眢井而拯之若為茅絰哭井則已又曰鄭公子歸生受命于楚伐宋戰于大棘宋師敗績囚華元獲樂呂狂狡輅鄭人入於井狂狡宋大夫輅迎也倒戟而出之獲狂狡君子曰失禮違命宜其為擒也戎昭果毅以聽之之謂禮聽謂常在於耳著於心想聞其政令殺敵為果致果為毅易之戮也史記曰瞽叟使舜穿井穿井匿空旁出舜既入深瞽叟與弟象共下土實井從匿空出去漢書曰蜀多鹽井羅褒以鹽井致富又曰陳遵每大飲會賓客滿堂輒閉門取客車轄投井中漢書曰元帝時謠曰井水溢滅竈煙灌玉堂流金門至成帝北宮井水溢王莽之徵也又曰朱愽為御史大夫府吏舍百餘區井水俱竭長老異之後果廢焉又曰王莽時井得白石上圓下方有丹書著文曰告安漢公莽為皇帝符命之興自此始矣莽使群公白太后太后曰此誣罔天下不可施行宗廣劉京上書言七月中齊郡臨淄縣昌興亭長辛當一夕暮數夢曰吾天公使也公使我告亭長曰攝皇帝當為真即不信我此亭中當有新井亭長晨起視亭中有新井入地且百尺也後漢書曰琅邪有冰井冰厚尺餘又曰耿恭之攻匈奴以䟽勒城傍有澗水可固五月引兵據之七月匈奴復攻恭恭募先登數千人直馳之胡騎散走匈奴遂於城下擁絕澗水恭於中穿井十五丈不得水吏士渴乏笮馬糞汗而飲之恭仰天歎曰聞昔貳師將軍拔佩刀刺山飛泉涌出今漢德神明豈有窮哉乃整衣服向井再拜為吏士禱有頃水泉奔出眾皆稱萬歲乃令士揚水以示虜東觀記曰恭親自挽籠於是令士旦勿飲先和泥塗城并揚示之虜出不意以為神明遂引去又曰淳于恭門側有井鄉里小兒爭飲牛恭惡之名置水器汲水滿之又曰張讓劫天子至河掌璽者投璽井中後孫堅討董卓至祀國見井有五色光後浚井得璽吳書曰孫策功曹魏滕有罪譴欲殺之左右憂恐計無所出夫人乃倚大井召策謂曰汝新造江南其事未集方當優賢禮士闡過錄功功曹在公盡規汝今殺之他人明日皆叛汝矣吾不忍見汝禍及當先投此中策大驚遽釋滕罪晉書曰阮瞻嘗群行冒熱渴甚逆旅有井眾人競趣之瞻獨逡巡在後須臾飲者畢乃進其夷退無競如此又曰元帝為晉王使郭璞筮遇豫之睽璞曰會稽當出鍾以告成功上有勒銘應在人家井泥中得之繇所謂先王以作樂崇德殷薦之上帝也及帝即位太興初會稽剡縣人果於井中得一鍾長七寸二分口徑四寸半上有古文奇書十八字云會稽岳命餘字時人莫識之璞曰蓋王者之作必有靈符塞天人之心與神物合契然後可以言受命矣梁書曰巴郡忽有地自開成井方六丈深三十二丈帝王世紀曰堯時老人擊壤於路而歌曰鑿井而飲耕田而食帝力於我何有哉南史曰延陵縣季子廟沸井之北忽聞金石聲疑有異鑿深三尺得沸井奔涌若浪其地又響即復鑿之復得一井涌沸亦然井中得一木簡長一尺廣二分上有隱起字曰廬山道人張陵再拜謁簡大堅白字色乃黃魚豢魏略曰明帝九龍殿前為玉井綺欄高士傳曰管寧所居井會汲者或男女雜錯或爭井鬥寧乃多買器分置井旁汲以待之唐書曰長慶中長安主簿鄭翦主役太清宮御院忽於院前西序見一白衣老人云此下有井正直皇帝過路汝速實之不然罪在不測翦惶恐遽領役人視之其處已陷數尺發之則一古井宛然驚顧之際已失老人所在翦以聞上既至宮群臣及供奉官於馬前蹈舞賀有詔命翰林學士韋處厚紀述以表其異孟子曰有為者譬若掘井九軔而不及泉猶為棄井也有為仁義也軔八尺也雖深不及泉喻有為者中道而盡棄前行也莊子曰公孫龍問於魏牟曰龍困百家之智窮眾口之辯以為至達今吾聞莊子之言茫然異之無所開吾喙公子牟笑曰子獨不聞塪井之蛙謂東海之鼈曰吾跳梁乎井幹之上入休乎缺甃之岸赴水則接掖持頤蹶泥則滅足沒跗還虷蟹與科斗莫吾能若也且夫擅一壑之水而跱塪井之樂亦至矣夫子奚不時來入觀乎東海之鼈左足未入而右膝已墊矣於是逡巡而卻告之海若曰夫萬里之遠不足舉其大千仞之高不足極其深禹之時十年九潦而水不為加益湯之時八年七旱而崖不為加損夫不為頃久之推移者此亦東海之大樂於是塪井之蛙聞之適適然驚規規然自失墨子云備城五十步一井范子曰直木先伐甘井先竭孫子兵法曰地多陷曲曰天井墨子云二舍共一井抱朴子內篇曰臨沅縣有寮氏家世老壽後子孫輒夭賤折他人居其故宅復世壽乃知是宅所為不知何故疑井中赤乃掘井左右得古人埋丹砂數十斛丹汁入井是以飲其水而得壽呂氏春秋曰天下之美者崑崙之井又曰宋丁氏無井常一人溉汲於外及自穿井喜而告人吾穿井得一人人傳之者聞於宋君召問其故對曰得一人之使非得一人於井中也說苑曰季桓子穿井得土缶中有羊以問孔子言得狗孔子曰以吾所聞非狗乃羊也木之怪龍罔兩水之怪龍罔象二之怪棼羊也非狗也桓子曰善哉管子曰桓公將與管仲飲十日齋戒掘新井而柴焉注新井以柴蓋覆之取其清潔示敬也葛仙公傳曰仙公取數十錢使一人投井水公從井上呼錢又一一飛從井中出入公器中也桂陽列仙傳曰蘇躭啟母曰有賓客來會躭受性當仙今招耽去違於供養今年多疫竊有此井水飲之可得無恙賣此水過於供養使賓客隨去焉水經注曰華林園䟽圃中有古井悉珉玉為之以繢石為口玉作精密獨不變古粲焉如新異苑曰蘭陵昌慮縣郳城有華山山上有井鳥巢其中金喙黑色而團翅此禽見則大水井又不可窺窺者盈歲輒死又曰廣陵郡東界有黃公塚高墳二所前有一井面廣數尺每旱不竭有於其中得銅釜及罐各一又曰謝晦字宣明宅南路上有古井以元嘉二年汲者忽見三龍甚分明行道住觀莫不嗟異有人入井始知是塼隱起作龍形又曰潯陽曇椿世居長沙宅有古井每夜輒聞有如炮竹聲相承謂為龍吒風俗通曰龐儉父先逃走隨母流宕後居鄉里鑿井得銅生遂溫富後買奴曰堂上者我婦也問其故奴曰我婦姓艾字阿宏足下有黑子腋下有赤志母曰我翁也遂為夫妻時人曰鑿井得銅買奴得翁又曰龐儉鑿井得錢數萬又曰郄子路行飲馬投錢井中續漢禮儀志曰夏至日浚井改水冬至日鑽燧改火淮南子曰伯益作井而黃龍登異物志曰盧陵城中有一井井中有二色半青半黃黃者似炭汁作麋粥皆金色因名之金井幽明錄曰山陰縣九侯神山上有靈壇壇前有古井常無水及請告神即水涌出供用足乃復漸止潯陽記曰盆城漢灌嬰所築孫權經此城自立摽井令人掘得井銘曰潁陰侯所開三百年當塞不滿百年為當運者所開權忻以為瑞井江中風浪井水輒動豫章記曰厭源山西北余侔村五六里有洪井說云洪崖先生之井蜀都賦曰火井炤熒於幽泉注蜀都有火井欲出其火先將家火投之隆隆如雷聲須庾火出光耀十里以竹筩盛之其光不滅愽物志曰臨邛有火井縱廣五尺深二三丈在縣南百里昔時有竹木投之以取火諸葛丞相往視之後火轉盛熱以盆著井煮鹽得鹽後以燭火投井中即滅迄今不復也盛弘之荊州記隨郡北界有廟鄉村南有重山山下有一村父老相傳云是神農所生村西有重塹內周廻一頃二十畝地中有九井相傳神農既育九井自穿又云汲一井則眾井水動則以地為神農社年常祀之尋陽記龍窟有深泉泉側常見龍曾有人於水邊洗銅椀忽浪起水漲便失椀此人沒水逐取既出復失去後人見龍衘椀在城裏井邊幽明錄曰襄邑縣南有瀨鄉老子廟廟中有九井潔齋入者溫清隨人意念瀨鄉記老子廟中有九井汲一井餘井水並動廣志曰臨邛有粉井得其水汰粉則益光嵩山記少室山有雲母井出雲母洛陽記宮牆西有兩銅井連御溝名曰濛汜羊頭山記衛青破月支月支有井色如酒因名曰酒井又曰東阿城北門有大井深七尺煮之得膠貢之又曰雍丘縣有神井興霧雹享祀不輟又曰盤固山有大井銅人嘗守之五十年一踊水起數十丈銅人每以手掩之即止又曰零浦有鹽井二十四其一出火筩取密閉萬里不滅又曰金龍井西京太極殿上有之金龍負山於上兼金鹿盧山海經曰崑崙山墟在西北帝之下都高百仞面有九井以玉為檻洞冥記珠甜水去虞淵八千里有甜溪水如蜜東方朔遊此水還將數斛以獻帝帝投陰井井遂恒甜而寒洗肉肌理柔滑瑤琨去玉門九萬里有碧草如麥剉之以釀則味如酒而驗烈看之則顏色如醉飲一合則三旬不醒啜甜水則隨飲隨醒又曰長安東七百里有雲山山頭有井雲從中出若土德王則黃雲出火德王則赤雲出水德王則黑雲出金德王則白雲出木德王則青雲出荊州記風井夏則風出冬則風入又曰益陽縣有岡岡上有金井數百尺傳云昔有金人以杖撞地而輒成井王子年拾遺記峻鍰山石下有金井白氣冠其上井中金桑弱可緘縢又曰范蠡相越致千金僮者萬人收四海難得之貨盈於越都以為兵器銅鐵之類如山阜者或藏之井壍謂之寶井奇容麗色溢於閨房謂之遊宮自歷古已來未之有也又曰頻思之國人皆多力拳頸不食五榖日中無影飲桂漿雲露羽毛為衣發大如縷堅韌如盤申之裁至一丈置則自縮如螺績此人發以為繩以汲丹井之水至久方得升合之水水中有白蛙兩翅去來常在井上仙者食之至周王子晉臨井而窺有青雀御土杓以授子晉取而飲之乃有雪飛子晉以衣袖撝雪則雪自止白蛙化為雙白鳩入雲又曰王傅先時家貧穿井得鐵印銘曰傭力得富至億庚一土三田軍門主果大富永初中以錢買官至中壘校尉三田一土乃壘字也郡國誌曰姑衍州有湯井風穴深不可測常有微風雖三伏盛暑猶須衣裘又曰恒州常穿井得白玉方四尺下有石石有龜長二尺許又曰連渾府姑衍州遙火山西有火井深不可見底炎氣上昇常若微電以草爨之則煙騰火發其山似火從地發故名熒臺又曰濮州姚墟有二井是舜井也以物投一井即二井水皆動耕於歷山漁於雷澤即此也又曰硤州宜陽山有風井穴大如甕夏出冬入有樵人置笠穴口風翕之入後於長溪口得笠則知潛通也又曰朔州有神泉人歌曰紇真山頭有神井入地千尺絕骨冷又曰貴州有司命井半甘半淡潛涌江波虛盈如勢又曰衡山侯曇山山有溪豪神祠壇壇傍有石井常無水人祀之即水出事了即乾又曰柳州昔相嶺西麓下有潮井廣半畝一日三湧三落又曰堯井在汜水縣東十五里漢高祖敗項羽追之入此井得免見井中有雙鳩飛出有踟跦網因而得免又曰濟州榖城管仲私邑今城內有夫子五井焉又曰洪州龐源山山上有風雨池言山高水深流激著樹灑如風雨云是洪崖之井又曰廣州越井岡一云越王井云趙佗誤墜酒盃於井遂浮出石門故詩云石門通越井是也又曰儋州滔井與淪水通有人以竹置井口淪水得之俚人呼竹為滔沿因以為名師曠問天老曰人家忌臘日殺生于堂上有血光一不祥井上種桃花落井二不祥也天文志曰玉井四星在參左足下水為符瑞王者清凈則浪井出符瑞圖曰浪井者不鑿自成王者清凈則有仙人主之丹陽記曰句容縣有沸井亦曰沸潭兩京記曰醴泉坊本名承明坊開皇初繕築此坊忽聞金石之聲因掘得甘泉浪井七所飲者疾愈因以名坊水經注云襄國西石岡上有井大如車輪圖志云此井光武營軍所鑿魏都賦曰墨井鹽池注鄴西高陵有石墨井嶺表錄曰綠珠井在白州雙角山下昔梁氏之女有容貌石季倫為交趾使以真珠三斛買之梁氏之居舊井存焉渚宮故事云江陵城東二十里有天井周廻二里其深不測旱而禱之即大雨時至隋圖經云常山唐縣中出城西北隅有一大井俗名趙母井昔云醇酎千日即是此井所醞後以石蓋之人不敢開齊刺史愽陵王濟欲開之即有雲霧隱蔽懼不敢開魏文詩曰雙桐生空井枝葉自交加白澤圖曰井神曰吹簫女子江文通井賦曰穿重壤之千仞兮構玉甃之百節營之不日既汲既渫晉郭璞井賦曰爾乃冠玉檻甃鱗錯鼓鹿盧捍勁索魏明帝猛虎行曰雙桐生空井枝葉自交加通泉浸其根玄雲潤其柯
