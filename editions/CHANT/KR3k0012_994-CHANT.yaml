body:
  text: 藥部十桔梗廣雅曰犁如桔梗管子曰五沃之土生桔梗范子計然曰桔梗出河東洛陽戰國策曰淳于髡一日而見七士於宣王王曰寡人聞千里之一士是比肩而相望百世一聖若隨踵而生也今子一朝而見七士士不亦眾乎淳于髡曰夫鳥同翼者藂飛獸同足者俱行今求桔梗於沮澤累世不能得一之皋黍梁父之陰則卻車載耳王求士於髡譬挹水於河取火於燧也建康記曰建康出桔梗極精好搜神記曰鄱陽趙壽有犬蠱有陳岑詣壽忽有大黃犬六七群出吠岑後余伯婦與壽婦食吐血幾死屑桔梗以飲之乃愈本草經曰桔梗味辛微溫生山谷治胸脅痛膓鳴驚悸生嵩高吳氏本草經曰桔梗一名符蔰一名白藥一名利如一名梗草一名盧茹神農醫和苦無毒扁鵲黃帝鹹歧伯公甘無毒季氏大寒葉如薺苨莖如筆管紫赤二月生巴豆廣雅曰巴菽巴豆也蜀志曰犍為南安縣出巴豆晉書曰賈后使太醫令程據合巴豆杏子丸矯詔使黃門孫慮齎至許昌以害太子列仙傳曰玄俗河間人餌巴豆雲英賣一丸七錢盛弘之荊州記曰朐䏰縣有巴子城地多巴豆廣志曰犍為𤏡道縣出巴豆博物志曰鼠食巴豆三年重三十斤本草經曰巴豆一名巴菽味辛溫生川谷主治溫瘧傷寒熱破癖瘕結堅通六府去惡肉除鬼毒邪注殺蟲生巴蜀郡范子計然曰巴菽出巴郡吳氏本草經曰巴豆一名菽神農歧伯桐君辛有毒黃帝甘有毒李氏主溫熱寒葉如大豆八月採鬼臼吳氏本草經曰一名九臼一名天臼一名雀犀一名馬目公一名解毒生九真山谷及冤句二月八月採根莽草范子計然曰莽草出三輔青色者善淮南萬畢術曰莽草浮魚取莽草葉并陳粟米合濤之以內水魚皆死本草經曰莽草味辛生山谷治風頭癰乳疝瘕結氣疥瘙疽瘡生還谷吳氏本草經曰莽一名春草神農辛雷公桐君苦有毒生上谷山中或冤句五月採治風忍冬本草經曰忍冬味甘久服輕身淫羊霍本草經曰淫羊霍一名蜀前味辛寒治陰痿傷中益氣強志除莖痛利小便生上郡陽山吳氏本草經曰淫羊霍神農雷公辛季氏小寒堅骨狼牙本草經曰狼牙一名牙子味寒生川谷治邪氣去白蟲疥痔生淮南建康記曰建康出狼牙范子計然曰狼牙出三輔色白者善吳氏本草經曰狼牙一名支蘭一名狼齒一名犬牙一名抱牙神農黃帝苦有毒桐君鹹歧伯雷公扁鵲苦無毒或生冤句葉青根黃赤六月七月華八月實黑正月八月採根香蒲本草經曰香蒲一名睢蒲味甘平生池澤治五藏心下邪氣堅齒明目聰耳久服輕身能老生南海吳氏本草曰醮一名醮石一名香蒲神農雷公甘生南海澤中爵李本草經曰郁核一名爵李腐婢本草經曰腐婢小豆花也落石本草經曰落石一名鯪石味苦溫生川谷治風熱久服輕身明潤目澤好色不老延年生太山吳氏本草經曰落石一名鱗石一名明石一名縣石一名雲華一名雲珠一名雲英一名雲丹神農苦小溫雷公苦無毒扁鵲桐君甘無毒季氏大寒云藥中君採無時鬼箭廣雅曰鬼箭神箭也本草經曰衛矛一名鬼箭味苦寒生山谷治女子崩中下血腹滿汗出除邪殺鬼毒生霍山吳氏本草經曰鬼箭一名衛與神農黃帝桐君苦無毒葉如桃如羽正月二月七月採陰乾或生野田房葵博物志曰房葵與狼毒相似本草經曰房葵一名犁蓋味辛冬生川谷久服堅骨髓益氣生臨淄吳氏本草經曰房葵一名梁蓋一名爵離一名房苑一名晨草一名利如一名方蓋神農辛小寒桐君扁鵲無毒歧伯雷公黃帝苦無毒莖葉如葵上黑黃二月生根根大如桔梗根中紅白六月花白七月八月實白三月三日採根麻黃廣雅曰龍沙麻黃也麻黃莖狗骨也本草經曰一名龍沙味苦溫生川谷治中風傷寒出汗去熱邪氣破堅積藂生晉地范子計然曰麻黃出漢中三輔吳氏本草經曰麻黃一名卑相一名卑監神農雷公苦無毒扁鵲酸無毒季氏平或生河東四月立秋採慕容晃與顧和書曰今致麻黃五斤茈葫本草經曰茈葫一名地重味苦平生川谷治心腹祛腸胃結氣久服輕身明目益精生弘農吳氏本草經曰茈葫一名山來一名如草神農歧伯雷公苦無毒坐冤句二月八月採根亭歷爾雅曰蕇音典亭歷實葉皆似芥一名狗薺淮南子曰亭歷冬生周髀曰凡北極左右物有朝生暮穫謂亭歷冬生之類紫苑遊名山志曰石室紫苑吳氏本草經曰紫苑一名青苑女萎本草經曰女萎一名左眄一名玉竹味辛生川谷久服輕身能老生太山蓍實本草經曰蓍實味苦酸平無毒主益氣充肌膚明目聰慧先知久服不飢不老輕身生少室山谷八月九月採實日乾地椹本草經曰地椹一名石龍芮一名食果能味苦平生川澤治風寒久服輕身明目不老生太山范子計然曰石龍芮出三輔色黃者善吳氏本草經曰石龍芮一名薑苔一名天豆神農苦平歧伯酸扁鵲李氏大寒雷公鹹無毒五月五日採黃環本草經曰黃環一名凌泉一名大就味苦生山谷主治蟲毒鬼魅邪氣欬逆寒熱生蜀郡范子計然曰黃環出魏郡黃色者善吳氏本草經曰蜀黃環一名生芻一名根韭神農黃帝歧伯桐君扁鵲辛一經味苦有毒二月生初出正赤高二尺葉黃員端大莖葉有汁黃白五月實員三月採根根黃從理如車輻解治蠱毒菟絲爾雅曰唐蒙女蘿菟絲也廣雅曰女蘿松蘿也菟丘菟絲也史記龜策傳曰下有伏苓上有菟絲博物志曰女蘿菟絲寄草上根不著地呂氏春秋曰或謂菟絲無根非無根也其不屬也伏苓是也淮南子曰菟絲無根而生伏苓抽菟絲死抱朴子曰案仙方中自有合離草一名獨搖一名離母所以謂之合離下根如芋魁有遊子十二枚周環之大魁數尺雖相須生而實不連以氣相屬耳如菟絲之草下有茯菟之根無此菟在下則絲不得生於上又曰初生之根其形似兔掘取刻其血以和丹服之立變化在意所作吳氏本草經曰兔絲實一名玉女一名松蘿一名鳥蘿一名鴞蘿一名複實一名赤綱生山谷劉楨詩曰青青女蘿草上依高松枝幸蒙庇眷恩為惠不可訾石芸爾雅曰茢勃茢也郭璞注曰一名石共音列范子計然曰石芸出三輔甘遂廣雅曰陵旱甘遂也建康記曰建康出甘遂本草經曰甘遂味苦寒生川谷治大腹疝瘕脹滿面目浮腫除留飲宿食出中山范子計然曰甘遂出三輔吳氏本草經曰甘遂一名主田一名日澤一名重澤一名鬼醜一名陵藁一名甘藁一名苦澤神農桐君苦有毒歧伯雷公有毒須二月八月採馬刀本草經曰馬刀味辛微寒生池澤治補中漏下赤白留寒熱破石淋殺禽獸賊鼠生江海范子計然曰馬刀出河東吳氏本草經曰馬刀一名齊蛤古納切神農歧伯桐君鹹有毒扁鵲小寒大毒生池澤江海採無時也女青本草經曰女青一名雀翾味辛平生山谷治蠱毒逐邪殺鬼生朱崖羅浮山記曰又有男青似女青吳氏本草曰女青一名霍由祇神農黃帝辛王孫本草經曰王孫味苦平治五藏邪氣濕痺四支疼酸生海西吳氏本草經曰黃孫一名王孫一名蔓延一名公草一名海孫神農雷公苦無毒黃帝甘無毒生西海生谷及汝南城郭垣下蔓延赤文莖葉相當因塵爾雅曰因塵馬生也本草經曰因塵蒿味苦治風濕寒熱邪氣結黃疽久服輕身益氣能老生太山吳氏本草曰因塵神農歧伯雷公苦無毒黃帝辛無毒生田中葉如藍十一月採淮木吳氏本草曰淮木神農雷公無毒生晉平陽河東平澤治久欬上氣傷中羸虛補中益氣百部抱朴子內篇曰百部黃似拔揳治咳殺風博物志曰百部與門冬相似千歲垣中膚皮吳氏本草曰千歲垣中膚皮得薑赤石脂共治蒛葐爾雅曰茥音奎蒛葐覆葐也實似莓而小可食吳氏本草曰𡙇一名決盆蒱陰實吳氏本草曰蒱陰實生平谷或圃中延蔓如瓜葉實如桃七月採止溫延年
