body:
  text: 藥部九款冬爾雅曰莬奚顆凍也注曰款冬生水紫赤凍音東述征記曰洛水至歲末凝厲則款冬生曾水之中本草經曰款冬一名橐石一名顆冬一名虎鬚一名菟奚味辛溫傅咸款冬賦曰余曾逐禽登于北山于時仲冬之月也冰凌盈谷積雪被崖顧見款冬燁然始敷華艷春暉既麗且殊以堅冰為膏壤吸霜雪以自濡非天然之真貴曷能彌寒暑而不渝芫華本草經曰芫華一名去水味辛溫治欬逆上氣殺蟲生淮原建康記曰建康出芫華范子計然曰芫華出三輔吳氏本草曰芫華一名去水一名敗華一名兒草根一名黃大戟神農黃帝有毒扁鵲歧伯苦季氏大寒二月生葉青加厚則黑華有子紫赤白者三月實落盡葉乃生三月五月採華芫花根一名赤芫根神農雷公苦有毒生邯鄲九月八月採陰乾久服令人洩可用毒殺魚羊躑躅廣雅曰羊躑躅決光也建康記曰建康出躑躅本草經曰羊躑躅味辛溫生川谷治賊風濕痺惡毒生太行山吳氏本草曰羊躑躅花神農雷公辛有毒生淮南治賊風惡毒諸邪氣旋華本草經曰旋華一名葪根一名美草去面䵟黑令人色悅澤根主腹中寒熱邪氣生豫州或預章黃芩說文曰菳黃芩也廣雅曰奼眉黃文內虛黃芩也本草經曰黃芩一名腐膓味苦平生非谷治諸熱范子計然曰黃芩出三輔色黃者善吳氏本草曰黃芩一名黃文一名妬婦一名虹勝一名經芩一名印頭一名內虛神農桐君黃帝雷公扁鵲苦無毒李氏小溫二月生赤黃葉兩兩四四相值莖空中或方員高三四尺四月花紫紅赤五月實黑根黃二月至九月採恒山廣雅曰恒山菜蜀漆也漢書地理志曰武陵有佷山縣孟康注曰音恒出恒山藥遊名山記曰橫陽諸山草多恒山永嘉記曰恒山出松陽永寧縣本草經曰一名玄草味苦寒生川谷主治傷寒發溫瘧鬼毒胸中結吐逆生益州吳氏本草曰恒山一名七葉神農歧伯苦李氏大寒桐君辛有毒二月八月採蜀漆本草經曰蜀漆味辛平治瘡及欬逆寒熱腹癥堅邪氣蠱毒鬼蛀建康記曰建康出蜀漆范子計然曰蜀漆出蜀郡吳氏本草曰蜀漆葉一名恒山神農歧伯雷公辛有毒黃帝辛一經酸如漆葉藍菁相似五月採蕪夷本草經曰蕪荑味辛一名無姑一名𦽄音殿䕋音唐去三蟲化食逐寸白散腹中嗢嗢喘息秦皮本草經曰秦皮味苦微寒生川谷治風濕痺寒氣除熱目中青翳久服頭不白輕身生廬江建康記曰建康出秦皮吳氏本草曰岑皮一名秦皮神農雷公黃帝歧伯酸無毒季氏小寒或生冤句水邊二月八月採淮南萬畢術曰岑皮致水枳實山海經曰北嶽之山其上多枳晏子春秋曰晏子使楚楚王使縛一人過問曰縛者何為者耶對曰齊人坐盜王視晏子曰齊人故善盜乎晏子對曰橘生江南過北為枳水土異也今民生於齊不盜入楚則盜得無楚之水土使民盜耶崔寔四民月令曰九月九日收枳實本草經曰枳實味苦寒生川澤治大風在皮膚中如麻豆苦癢除寒熱結止利長肌肉利五藏益氣輕身生河內吳氏本草曰枳實苦雷公酸無季氏大寒九月十月採陰乾防風本草經曰防風一名銅芒甘溫生川澤治大風頭眩痛目盲無所見煩滿風行周身骨節疼痛久服輕身生沙苑范子計然曰防風出三輔白者善吳氏本草曰防風一名廻雲一名回草一名百枝一名蕳根一名百韭一名百種神農黃帝歧伯桐君雷公扁鵲甘無毒季氏小寒或生邯鄲上蔡正月生葉細圓青黑黃白五月黃花六月實黑二月十月採根日乾琅邪者良大黃廣雅曰黃良大黃也盛弘之荊州記曰建平出大黃本草經曰大黃味苦寒生山谷治下瘀血閉寒熱破癥瘕積藂留飲宿食蕩滌腸胃安五藏推陳致新通利水穀道調中食生河西吳氏本草曰大黃一名黃良一名火參一名膚如神農雷公苦有毒扁鵲苦無毒季氏小寒為中將軍或生蜀郡北部或隴西二月卷生生黃赤葉四四相當黃莖高三尺許三月華黃五月實黑三月採根根有黃汁切陰乾石斛盛弘之荊州記曰隋郡永陽縣有龍石山山上多石斛精好如金環也廬山記曰石門山石間多生石斛范子計然曰石斛出陸安本草經曰石斛一名林蘭一名禁生味甘平生山谷治傷中下氣虛勞補五藏羸瘦久服除痺腸胃強陰出陸安吳氏本草曰石斛神農甘平扁鵲酸季氏寒半夏禮記月令曰仲夏之月半夏生范子計然曰半夏出三輔色白者善廣州記曰鄣平縣出半夏建康記曰建康出半夏極精本草經曰一名地文水玉味辛平生川谷生槐里吳氏本草經曰半夏一名和姑生微丘或生野中葉三三相偶二月始生白華員上射干廣雅曰鹿廉䳒尾烏蓮射干也易通卦驗曰冬至射干生抱朴子曰千歲之射干其根如生人長七尺剌之有血以其血塗足下可步行水上不沒以塗人鼻入水水為之開以塗足耳則隱形欲見則拭去之孫卿子曰西方有木名曰射干莖長四寸生於高山之上臨百仞之淵木莖非能長也所立者然也范子計然曰射干根如安定建康記曰建康出射干本草經曰射干一名烏扇一名烏蒱味苦辛生川谷治欬逆上氣生南陽吳氏本草曰射干一名黃遠蓪草廣雅曰下父附支蓪草也本草經曰通草一名附支味辛平生山谷去惡蟲除脾胃寒熱利九竅血脈關節不忘生石城建康記曰建康出通草范子計然曰通草出三輔吳氏本草曰通草一名丁翁一名附支神農黃帝辛雷公苦生石城山谷葉青蔓延止汗自正月採牛膝廣雅曰牛莖牛𣍿也本草經曰牛𣍿一名百倍味苦辛生川谷治傷寒濕痿痺四支拘攣膝痛不可屈伸久服輕身能老生河內建康記曰建康出牛𣍿吳氏本草曰牛𣍿神農甘一經酸黃帝扁鵲甘季氏溫雷公酸無毒生河內或臨邛葉如夏藍莖本赤二月八月採牡丹廣雅曰白朮牡丹也范子計然曰牡丹出漢中河內赤色者亦善遊名山志曰泉山多牡丹本草經曰牡丹一名鹿韭一名鼠姑味辛寒生山谷治寒熱癥傷中風驚邪安五藏出巴郡吳氏本草曰牡丹神農歧伯辛季氏小寒雷公桐君苦無毒黃帝苦有毒葉如蓬相值黃色根如指黑中有毒核二月八月採日乾可食之輕身益壽茵芋吳氏本草曰茵芋一名卑山共微溫有毒狀如莽草而細軟獨活本草經曰獨活一名護羗使者味苦平生益州久服輕身吳氏本草曰獨活一名胡王使者神農黃帝苦無毒八月採此藥有風花不動無風獨搖紫威本草經曰紫威一名芙華一名陵苕味鹹微寒無毒生川谷治婦人乳餘疾崩中山癥血寒熱飬胎生西海建康記曰建康出紫威范子計然曰紫威出三輔吳氏本草曰紫威一名武威一名瞿夌一名陵居腹一名鬼目一名芙華神農雷公酸歧伯辛扁鵲苦鹹黃帝甘無毒如夌根黑正月八月採或生真定大戟爾雅曰蕎邛鉅郭璞注曰今藥草大戟也本草經曰大戟一名邛鉅栝樓毛詩東山曰我來自東零雨其濛果臝之實亦施于宇果臝栝樓也又唐蟋蟀葛生曰蘞蔓于野詩義䟽曰蘞栝樓爾雅曰果臝之實栝樓今齊人呼之為天瓜本草經曰栝樓一名地樓味苦寒生川谷吳氏本草曰栝樓一名澤巨一名澤冶蕤核本草經曰蕤核味甘溫生川谷主治心腹邪結氣明目赤痛傷淚出目腫眥爛久服益氣輕身生函谷晉宮閣記曰華林園蕤三株吳氏本草曰蕤核一名𦳚神農雷公甘無毒平生池澤八月採補中強志明耳目久服不飢地膚本草經曰地膚一名地華一名地脈一名地蔡貝母毛詩鄘柏舟載馳曰陟陂阿丘言採其䖟䖟貝母也爾雅曰莔音䖟貝母也郭璞曰根如小貝負而白華葉似韭說文曰莔貝母也海藻爾雅曰𧂇海藻也藥草也一名海羅如亂髮生海中𧂇音覃本草經曰海藻著頸下破散結廣雅曰海羅海藻豕首爾雅曰茢音列薽音真豕首郭璞注曰本草經曰彘盧一名蠩蘭今江東呼稀首本草經曰豕首一名劇草一名蠡實吳氏本草曰一名澤藍一名豕首神農黃帝甘辛無毒生冤句五月採當陸爾雅曰遂音逐薚音陽馬尾也郭璞注曰江東謂之當陸關西為薚本草經曰商陸一名夜乎敗醬范子計然曰敗醬出三輔本草經曰敗醬似桔梗其臭如敗豆醬綸布本草經曰綸布一名昆布味酸寒無毒主十二種水腫癭瘤藂結氣瘻瘡生東瘡石龍芮范子計然曰石龍芮出三輔吳氏本草經曰龍芮一名水薑苔虵床吳氏本草經曰虵床一名虵珠博物志曰虵床亂蘪蕪雲實本草經曰雲實味辛溫生川谷治泄利脹癖殺蟲蠱毒去邪惡多食令人狂走久服輕身通神明生河間范子計然曰雲實生三輔吳氏本草經曰雲實一名員實一名天豆神農辛小溫黃帝鹹雷公苦葉如麻兩兩相值高四五尺大莖空中六月花八月九月實十月採
