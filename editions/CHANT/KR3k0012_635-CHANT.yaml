body:
  text: 治道部十五急假釋名曰急及也功之使相逮及也漢書曰高祖常告歸之田李斐注曰告請也言請休謁也寧安也吉日告凶日寧也漢律吏二千石有予告有賜告者在官有功最法所當得也賜告者病滿三月當免天子優賜其告使得印綬將官屬歸家理病至成帝時郡國二千石賜告不得歸家自馮野王始也漢律吏五日得一下沐言休息以洗沐也又曰汲黯多病病且滿三月上常賜告者數終不愈又曰馮野王為琅琊太守成帝時王鳳輔政京兆尹王章譏鳳顓權薦野王代鳳上初納其言而後誅章於是野王懼不自安遂病滿三月賜告與妻子歸杜陵太將軍鳳風音諷御史中丞劾奏野王賜告奏病而私自便杜欽素高野王奏記於鳳為野王言曰竊見今日吏二千石過長安如淳曰謁者自白得告也不分別予賜予予告也賜賜告也今有司以為予告得歸賜告不得是一律兩科失省刑之意夫三最予告令也在官連有三最則得予告也病滿賜告詔賜也今告則得詔思不得失輕重之差又二千石病賜告得有故事不得去郡亡者著令鳳不聽竟免野王官謝承後漢書曰許荊字子張少喪父養母孝順家貧為吏無有舟車休假常單步荷擔上下清節稱於鄉里又曰范丹字史雲陳留人也為郡功曹每休假上下常單步策杖同類以車牛與之不取又曰吳馮字子高為州郡吏休假先存恤行喪孝子次贍病畢拜覲鄉里耆老先進然後到家名昭遠近後漢書曰光武皇帝紀告寧之典魏志曰王思正始中為大司農年老目暗又少信時有吏父病篤近在外舍自白求假思疑其不實發教曰世有思婦病母者豈此謂乎遂不與假吏父明日死思無恨意其為刻薄如此魏志曰祝皓字子春南陽平氏人也志節抗烈篤於仁義為吏歸休周旋鄉里吊死問疾畢乃還家晉起居注曰孝武太元元年詔大臣疾病假蒲三月解職王隱晉書曰王𡰥音夷字季孫洛中貴盛名士王澄胡母輔之等皆與𡰥交時𡰥為兵曹左大將軍幕澄等持羊酒詣軍門吏䟽名內請入見大將軍澄等既入語吏過王𡰥炙羊飲酒訖而去竟不見將軍聞之因與尼長假遂得離兵宋書曰王敬弘字惔之為祕書郎惔之曾請假還家未定省敬弘剋日見之至輒不果假日將盡惔之乞求奉辭敬弘呼前至閣復不見又曰謝景仁增弟述嘗設饌請宋武帝帝召述述知非景仁夙意又慮帝之命請急不從帝馳遣呼述頃至乃飡其見重如此又曰謝靈運自以名輩應參時政王曇首王華名位素不踰之並見任遇意不平多稱疾不朝直出郭遊行或一百六七十里經旬不歸既不表聞又不請急上不欲傷大臣諷旨令自解靈運表陳疾賜假東歸又曰庾炳之居選部請急還家尚書令史來諮事一人善彈一人工歌留與宿有司以違制奏焉又曰伏𣈶音亙自以名輩素在始興內史何遠前為吏俱稱廉白遠累見擢𣈶循階而已意望不滿多託居家尋求假到東陽迎妹喪因留會稽築宅自表解職詔以為豫章內史乃出拜侍御史虞䂃奏曰風聞豫章內史伏𣈶去歲啟假以迎妹喪為辭因停會稽不去入東始貨宅賣車以此而推則是本無還意𣈶深懷誹怨形於辭色請以大不敬論有詔勿論遂得就郡又曰謝𥙿字景仁晦從父也為左僕射𥙿性矜嚴居家守靜每唾輒唾左右衣事畢即聽假一日浣濯每唾右右爭來受之徐爰宋書曰申恬字道獻少懷貞恪志業介然拜殿中將軍禁省八載不休急時莫之比齊書曰衡陽公諶字彥平高帝絕服族子武帝即位除步兵校尉領御仗主齊內兵仗委付之心膐密事皆使參掌鬱林即位深委信諶每請急宿出帝通夕不能寐諶還乃安梁書曰太清元年大舉北侵初謀元帥帝欲用蕭範時朱異取急外還聞之遽入曰嗣王雄豪蓋世得人死力然所至殘暴非常非吊人之才昔陛下登北顧亭以望謂江右有異氣今日之事尤宜詳矣後魏書邢虬字神寶為光祿卿虬母在鄉遇患請假而歸值秋水暴長河梁斷絕虬得一舡而渡舡漏而不溢時人異之唐書曰張志寬蒲州安邑人隋末喪父哀毀骨立為州里所稱賊帥王君廓屢為寇掠聞其名獨不犯其閭鄰里賴之而免者百餘家後為里正詣縣稱母疾取急求歸縣令問其狀對曰母常有所苦志寬亦所苦向患心痛知母有疾令怒曰妖妄之辭也繫之於獄馳驗其母竟如所言令異之慰諭遣去襄陽耆舊傳曰習溫長子宇為執法郎取急歸賓從甚盛溫怒杖宇責之曰吾聞生於亂世貴而能貧始可以後亡況侈競乎文士傳曰顧榮兼侍中安慰河北以前後功封嘉興伯求急還南既造江渚欣然自得風俗通曰濟北李登為從事吏病得假歸復移剌延斯後被召登自嫌不甚羸瘦謂雙生弟寧曰我兄弟相似人不能別汝類病者代我至府寧曰府君大嚴得無不可登曰我新吏耳無能覺者我自行見診必死寧便詣府醫藥集診有驗後為人所言事發覺遂殺登世說曰車武子為侍中與王東亭諸人期共遊集車早請急出過詣王子敬子敬於時宅在建陽門內道北車求去王問卿何以忽忽車荅云與東亭諸人期共行王曰卿何以乃作此不急行車遂不敢去盡急還臺又曰顧長康作殷州請假還東爾時例不給苦求之乃得又曰張敷為宋臺祕書郎自彭城請假還東于時相國府有一參軍督護亦請假武帝遣傳令語敷云可載之荅曰臣性不雜遂不載俗說曰張邀在鼓城請假當歸東傳亮時為宋臺侍中下舫中與張別張不起授兩手指著舫戶外傳遂不執其手熟視張面云樝是梨中之不臧者便去陸機思歸賦序曰余牽役京室去家四載以元康六年冬取急歸而羌虜作亂王師外征機興憤而成篇范甯啟國子生假故事曰國學開建彌歷年載講誦之音靡聞考課之績不著良由導達之訓未弘鑽仰之心弗至陵替文源宜見整正謂應斷假精加督勵嚴其師訓舉善黜違眾官受假故事曰伏見內外眾官陳假紛紜煩黷無已舊有急假一月五急一年之中六十日為限不問虛實相率如此誣罔視聽煩穢官曹舉世行之不以為非急假之制唯以父母妻子為辭而伯叔兄弟制所不及長偷薄之風傷敦睦之化臣謂宜去病解故之制一年令賜衣假日隨其所欲之適任其取日多少假寧令曰諸內外官五月給田假九月給受衣假為兩番各十五日田假若風土異宜種收不等通隨給之又曰諸百官九品私家袝廟除程給假五日四時祭祀各給假四日並課主祭者去任所三百里內亦給程若在京都除祭日仍各依朝參又曰諸文武官若流外已上者父母在三年給定假三十曰其拜墓五年一假十日並除程若已經還家者計還後給其五品已上所司勘當於事每闕者奏不得輒自奏請請冠給假三日五服內親冠給假一日並不給程又曰諸婚給假九日除程周親婚嫁五日大功三日小功已下一日並不給程周已下無主者百里內除程諸本服周親己上疾病危篤遠行久別及諸急難並量給假
