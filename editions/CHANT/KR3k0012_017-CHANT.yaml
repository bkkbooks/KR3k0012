seq: 17
body:
  text: 時序部一律呂氏春秋曰黃帝命伶倫作為律伶倫自大夏之西乃之阮隃之陰山取竹於嶰谷以生空竅厚均者斷兩節間長三寸九分而吹之以為十二筒聽鳳鳴以別十二律其雄鳴為六雌鳴亦六故曰黃鍾之宮律之本也鳳有雌雄故律有陰陽書曰肆覲東后協時月正日同律度量衡又曰帝曰夔命汝典樂教冑子詩言志歌永言聲依永律和聲聲謂五聲宮啇角徵羽律謂六律六呂十二月之音氣言當依聲律以和樂八音克諧無相奪倫倫理也八音能諧理不錯奪則神人咸和命夔使勉之又曰予欲聞六律五聲八音在治忽以出納五言汝聽孔氏曰言欲以六律和聲音察天下治理及忽怠者又以出納仁義禮智信五德之言汝當聽審之也禮曰孟春之月律中太蔟蔟湊也言萬物始大而湊也周禮曰大司樂以六律六呂五聲八音六舞六代舞大合樂致鬼神又注曰律呂相生者上生者三分益一下生者三分減一黃鍾律長九寸下生林鍾六寸律也左傳曰六律七音八風九歌以相成也清濁大小長短疾徐哀樂遲速高下出入周流以相濟也君子聽之以平其心爾雅曰律謂之分郭璞注曰律管可以分氣者也易是類謀曰聖人興起不知姓名當吹律聽聲以別其姓律者六律也春秋元命包曰律之為言率也所以率氣令達也率猶導也春秋孔演圖曰孔子曰丘援律吹命陰得羽之宮孝經援神契曰聖王吹律有姓漢書張蒼傳曰蒼乃自秦時為柱下御史明習天下圖書計籍又善用笇律曆故令蒼以列侯居相府領王郡國上計又曰張蒼代灌嬰為丞相漢興二十餘年天下定公卿皆軍吏蒼為計吏時正緒律曆故漢家言律曆者法張蒼蒼好書無所不通而尤邃律曆邃深又京房傳曰房字君明東都頓丘人好鍾律知音聲房本姓李推律自定為京氏又曰夫五音生於本姓分為十二律轉生六十二律皆所以紀升氣效物類也天效以影地效以響響即律也陰陽和則影至以律氣應則灰除是故天子常以冬夏至御前殿合八能之士陳八音聽樂均度晷影候鍾律權土灰校陰陽冬至陽氣應則均清景長極黃鍾通土灰輕而衡仰夏至陰氣應則均濁景短極蕤賓通土灰重而衡低進退於先後五日之中八音能各以候狀聞大史合封上效則和否則占候氣之法為室三重戶開塗舋必周密布緹㦥室中以木為案每律各一內庫外高從其加律其上以葭莩灰抑其內端案曆而候之氣至者灰去其為氣所動者其灰散風所動者其灰聚殿中候用玉律十二唯二至乃候靈臺用竹律六十又曰凡律度量衡用銅銅為物也精不為燥濕寒暑變其節不為風雨曝露改其形介然常似於士君子之行是以用銅也用竹為引者事之宜也又曰至治之世天地之氣合以生風天地之風氣定士律王隱晉書曰荀勗以魏杜夔所制律呂撿校太樂揔章鼓吹八音與律呂乖錯始知後漢至魏度漸長於古四分餘而夔依為律呂故致不韻不和部佐著作劉恭依周禮制尺所謂古尺也依古尺作新律呂以調聲韻以律量黍以尺度古器皆與本銘尺寸無差又故冢得古玉律鍾聲亦與新律闇合遂班下太常使太樂總章鼓吹清啇施用勗遂典知樂事晉諸公讚曰世祖時以荀勗所造律班示朝臣散騎侍郎阮咸唱議謂勗所造聲高必由古今尺有長短所致然勗亦依案經典笇而制之又求古器得周時玉律比較正同荀勗奏曰中所出御府銅竹律二十五具部太常樂郎正劉秀等校試其三具與杜夔左延年法同其二十二具視其銘題尺寸是笛律也問恊律中郎將列和云昔魏明帝時令和丞受笛聲以作此律欲使學者別居一坊歌詠講習以此律調至於都合樂時但識其尺寸之名則絲竹歌皆得均合歌聲濁者用長笛長律歌聲清者用短笛短律凡弦歌調張清濁之制不依笛寸尺名之則不可知也趙書曰劉曜築建德殿取土城西南墎內得圓石狀若水碓其銘曰律推石重四釣同律度量衡有辛氏造議者未之詳或以為瑞參軍事續咸曰王莽時物東方朔十洲記曰武帝時有西胡月氏國遣使曰臣國去此三十萬里國有常占東風入律百旬不休青雲干呂連月不散者閻浮國將有好道之君矣孟子曰師曠之聰不以六律不能正五音淮南子曰夔合六律調五音通八風又曰天文訓曰帝張四維帝天帝也運之以斗運提月徙一辰復反其所正月指寅十一月指子一歲而匝終而復始寅則萬物螾螾也螾蟲也律受太蔟蔟者湊而未出也太蔟正月律指卯卯則茂茂然律受夾鍾夾鍾者鍾始夾也夾鍾二月律指辰辰則振振之也律受沽洗沽洗者陳去而新來也沽洗三月律指巳巳則生己定也律受中呂中呂者中充大也中呂四月也指午午者忤也律受蕤賓蕤賓者安而服也蕤賓五月律指未未者味也律受林鍾林鍾者引而止之也林鍾六月律指申申者呻也律受夷則夷則易其則也德去矣夷則七月律也德以去生氣盡也指酉酉者飽也律受南呂南呂者任苞大也南呂八月律指戍戍者滅也律受無射無射者人之無厭也無射九月律指亥亥者閡也律受應鍾應鍾者應其鍾也應鍾十月律指子子者茲也律受黃鍾黃鍾者已鍾也黃鍾十一月律指丑丑者紐也律受大呂大呂者旅旅而去也大呂十二月律也又曰一律而生五音十二律而為六十音因而六之六六三十六故三百六十音以當一歲之日故律曆之數天地之道國語曰天王將鑄無射王景王也問律於伶州鳩律鍾律也對曰律所以立均出度也律謂六呂六律也均鍾木長七尺有弦擊之以均鍾者度鍾大小清濁也漢大子樂官有之也紀之以三三天地人也平之以六平之以六律成以十二十二律呂也天之道也天之大數不過十二夫六中之色也故名之曰黃鍾六者天地之中天有六氣降生五味天有六甲地有五子十一而天地畢矣而六為中故六律六呂而成天道也所以宣養六氣九德也宣徧也六氣陰陽風雨晦明也九德九功之德水火金木土穀政德利用厚生之者也由是第之由從也弟次也次其日也二曰太蔟所以多以金奏贊陽出滯也三曰沽洗所以脩潔百物考神納賓也四曰蕤賓所以安靖神人獻酬交酢也五曰夷則所以詠歌九則平民無二也六曰無射所以宣布哲人之令德示民軌儀也為之六間以楊沉伏而黜散越也六間六呂在陽律之間沉滯也黜去也越楊也呂陰律所以呂間陽成其功發楊滯伏之氣而去越散者也元間大呂助宣物也二間夾鍾出隟之細也四時之間氣微細三間中呂宣中氣也四間林鍾和展百事俾莫不任肅純恪也五間南呂贊陽季也六間應鍾均利器用俾應復也律呂不易無姦物也蔡邕月令曰律率也聲之管也中應也太蔟鍾名上古本陰陽別風聲審清濁別風聲不可以文載口傳也故鑄金作鍾以正十二月之聲然後以效升降之氣而鍾不可用乃截竹為管曰律為清濁之率也以律長短為制正月之律與太蔟相中也言出於鍾乃置深室葭莩為灰以實其端其月氣既至則灰飛管通古以鍾律齊其聲後人不能則數以正其度度正則音亦正矣仲春中夾鍾仲春夾鍾也管長七寸四分強夾鍾類分也季春中姑洗管長七寸一分強故鮮也言萬物去故就新莫不鮮明也孟夏中仲呂長六寸二分陽氣將極後中難仲夏中蕤賓六寸一分小二分陽氣上極陰始起故賓敬之蕤下也季夏中林鍾長六寸九分物成熟鍾類也林鍾眾也孟秋中夷則長五寸六分二分夷傷則法也萬物始傷仲秋中南呂長四寸三分小三分南任也言陽氣尚有任也生孽長也季秋中無射長四寸八分小三分射終也言萬物隨陽終也孟冬中應鍾長四寸八分言萬物應陽而動下藏仲冬中黃鍾長九寸律之始言陽於黃泉下動也鍾動也季冬中大呂長八寸呂距也言陽氣欲出陰不許也京氏律術曰律難以度調故作准以代之准之狀如瑟長丈而十三弦隱間九尺中共一弦下盡分寸均中其弦使應黃鍾之聲然案分寸以求諸律則稍皆如盡而應矣然則上古有鍾其次有律近古有准皆稍簡易之意其相生也黃鍾下生林鍾林鍾上生太蔟太蔟下生南呂南呂上生沽洗沽洗下生應鍾應鍾上生蕤賓蕤賓下生大呂大呂下生夷則夷則上生夾鍾夾鍾下生無射無射上生中呂中呂上生黃鍾上下相生終六十執始以下四十八律文多不載孟春之月則太蔟為宮沽洗為啇蕤賓為角南呂為徵應鍾為羽大呂為變宮夷則為變徵他月效此也六韜曰武王問太公曰聽律之音聲何以知三軍之消息勝負之決乎公曰深哉王之問也夫律管十二其要以五宮啇角徵羽此其正聲也萬物不易五行之神道之常也可以知敵金木水火各以其勝攻之其法以天清靜無霧雨風雲夜遣輕騎往至敵人之壘九百步偏持律管橫管當耳大呼驚之有聲應管其來甚微角管聲應當以白虎徵管聲應當以朱雀羽管聲應當以勾陳五管盡不應無有應聲當以青龍此五行之符佐勝之徵成敗之機也白虎通曰十一月律謂之黃鍾何黃中和之氣鍾者動也言陽於黃泉之下動養萬物也十二月律謂之大呂何大者太也呂者距也言陽氣欲出陰不許也正月謂之太蔟何太者大也蔟者湊也言萬物始大湊地而出也二月謂之夾鍾何夾者物孚夾言萬物孚夾種類分也三月謂之沽洗何沽者故也洗者鮮也言萬物去故就新莫不鮮明也四月謂之中呂何言陽氣將極故復中難之也五月謂之蕤賓何蕤者下也賓者敬也言陽氣上極陰氣始起故賓敬之六月謂之林鍾何林者眾也萬物成熟其類眾多也七月謂之夷則何夷傷則法也言萬物始傷被刑法也八月謂之南呂何呂任也言陽氣尚有任也生孳長也故陰之也九月謂之無射何射終也言萬物隨陽而終也當復隨陰起無有終也十月謂之應鍾何應者動也言萬物應陽而動下藏也蔡邕月令章句曰鍾以斤兩尺寸中所容受升之數為法律亦以寸分大小長短為法故也黃鍾之管長九寸孔徑三分圍九分其餘皆稍短唯大小圍數無增減以度量者可以文載口傳與眾共知然不如耳決之明也周官曰太師掌六律六呂文以五聲播以五教以六詩六德為之本以六律為之音也劉向別錄曰鄒子在燕燕有黍谷地美而寒不生五穀鄒子居之吹律而溫氣至今名黍谷論衡曰孔子推律自知殷之苗裔楊泉物理論曰聽清濁五聲之和然後制為鍾律取弘農宜陽縣金門山竹為管夏侯玄辯樂論曰阮生云律呂協則陰陽和音聲適則萬物類天下無樂而欲陰陽和調災害不生亦以難矣此言律呂音聲非徒化治人物乃可以調和陰陽蕩除災害也夫天地定位剛弱相摩盈虛有時堯遭九年之水憂民阻飢湯遭七年之旱欲遷其社豈律呂不和音聲不通哉此乃天然之數非人道所招也揚雄太玄經曰調律者度竹為管蘆莩為灰列之九閉之中漠然無動寂然無聲徽風不起纖塵不形冬至夜半黃鍾以應矣曆世本曰容成作曆容成黃帝之臣易曰君子以治曆明時書曰乃命羲和欽若昊天曆象日月星辰敬授民時又曰天之曆數在爾躬又曰叶用五紀其五曰曆數易乾鑿度曰堯以甲子天元為推術注云甲子為蔀首起十月朔又曰曆原名握先紀曰甲子握先為曆始之名始言無前者也七十六歲為一紀二十紀而一蔀首易是類謀曰其觸耀而出師曠曆推音筭以度知旦觸耀而出謂師曠得聖人之一體故觸耀而生其人能曆數樞機之事又能推五音知將來之事漢書律曆志曰曆數之起上矣傳述顓頊命木正重司天火正黎司地其后三苗亂德二官咸廢而閏餘乖次孟陬殄滅攝提失方攝提星名隨斗柄所指建十二月若曆誤春三月當指辰乃指巳是為失方也堯復育重黎之后使纂其業後以授舜舜亦以命禹至周武王訪箕子箕子言大法九章而五紀明曆法歲月日星辰為五紀也五伯之末史官喪記疇子弟分散如淳曰家業世相傳為疇律年三十三傳之疇官各從父事或在夷狄故其所記有黃帝顓頊夏殷周及魯曆戰國擾攘秦兼天下未遑暇也亦頗推五勝五行相勝秦以周為火周水勝之也而自以為獲水德迺以十月為正色尚黑漢興方紀大基庶事草創襲秦正朔以北平侯張蒼言用顓頊曆比於六曆踈闊中最為微近然正朔服色未暏其真而朔晦弦望多虧矣至武帝元封七年漢興百二歲矣太中大夫公孫卿壺遂太史令司馬遷等言曆紀壞廢宜改正朔遂詔卿遂遷與侍郎尊大典星射姓等師古曰姓射名姓也議造漢曆迺定東西立晷儀下漏刻以進二十八宿相距於四方舉終以定朔晦分至躔離弦望應劭躔徑也離遠臣瓚案離曆也日月之曆也姓等奏不能為筭願募治歷者更造密度各自增減以造漢太初歷迺選治歷鄧平及長樂司馬可酒泉侯宜君侍郎尊及與民間治歷者凡二十餘人方士唐都巴郡洛下閎與焉晉灼曰史記曆書云唐部分天部而巴郡洛下閎運笇推歷也都分天部謂分部二十八宿為距度也而閎運筭轉曆與鄧平所造八十一分律歷律昏明踈遠者十七家使校歷律昏明宮者淳于陵渠復覆太初歷晦朔弦望皆最密日月如合璧五星如連珠謂太初上元甲子夜半朔旦冬至時七曜皆會聚斗牽牛中如合璧連珠也陵渠奏狀遂用鄧平歷以平為太史丞後二十七年元鳳三年太史令張壽王上書言曆者天地之大紀上帝所為傳黃帝調律歷漢元年以來用之今陰陽不調宜更歷之過也詔下主歷使者鮮干妄人請與治歷大司農中丞麻光等二十餘人雜候日月晦朔弦望八節二十四氣鈞校諸歷用狀奏可詔與丞相御史大將軍右將軍史各一人雜候上林青臺諸曆踈密凡十一家以元鳳三年十一月朔旦冬至盡五年十二月各有第壽王課踈遠案漢元年不用黃帝調歷壽王非漢歷逆天道非所宜言大不敬有詔勿劾復候盡六年太初歷第一即墨徐萬旦長安徐禹治太初歷亦第一壽王及待詔李信治黃帝調歷課皆踈闊壽王歷迺太史官殷歷也定至孝成世劉向總六歷列是非作五紀論向子歆究其微眇作三統歷及譜又曰路溫舒從祖父受曆數天文以為漢阨三七之間張宴曰三七二百一十歲也自漢初至哀帝元年二百一年也至平帝崩二百一十一歲也上封事以豫戒成帝時谷永亦言如此又王莽傳曰莽見盜賊多乃令太史推三萬六千歲曆紀布天下書曰紫閣圖昌太一萬帝皆仙而上天張樂崑崙處山之上後世聖主得瑞者當張樂秦終南山上長安南山詩所謂終南南故秦地故言秦予之不敏奉行未明乃今諭矣又孝武紀曰夏五月正歷以正月為歲首鄭玄曰先是以十月為歲首色上黃數用五張晏曰漢据土德土數五定官名協音律又曰曆譜有序四時之位正分至之節以會日月五星之辰以考寒暑殺生之實故聖王必正曆以深知五星日月之會凶阨之患其術皆出焉此聖人知命之術也續漢律曆志曰自太初元年始用三統曆施行百餘年曆稍後天朔先於曆朔或在晦月或朔見建武八年中太僕朱浮太中大夫許叔等數上書言朔曆不正宜當改更時分度覺差尚微上以天下初定未遑考正至永平五年官曆署七月十六日日蝕待詔楊岑見時月食多先曆即縮用筭因上言月當十五日食官曆不中詔書令岑普候與官曆課起七月盡十一月弦望凡五官曆皆失岑皆中庚寅詔書令岑署弦望月食官復令待詔張盛景防鮑業等六四分法與岑課歲餘盛等所中多岑六事又曰黃帝造曆元起辛卯而顓頊用乙卯虞用戊午夏用丙寅殷用甲寅周用丁巳魯用庚子漢初用乙卯至武帝元年以丁丑王莽之際劉歆作三統追太初前世一九得五星會庚戌之歲以為上元太初曆到章帝元和施復踈闊徵能術者課效諸曆定朔稽元追漢四十五年庚辰之歲退朔一日乃與天合以為四分曆又曰昔者聖人之作曆觀璇璣之運三光之行道之發軔景之長短斗綱所建青龍所踵參五以變錯綜其數而制術焉日月相推日舒月速當其同所謂之合朔舒速先後近一遠三謂之弦相與為衡分天之中謂之望以遠及舒光盡體伏謂之晦朔合離斗建移辰謂之朔魏略曰太史上言漢曆不及天時因更推步弦望朔晦為太和曆帝以高堂隆學問優深於天文又精乃詔使隆與尚書郎楊偉太史待詔駱祿參共推校更相刻奏紛紜數歲祿得日蝕而月晦不盡隆不得日蝕而晦盡詔從太史隆所爭雖不得而遠近猶知其精微又曰景初元年山茬音在貍切縣言黃龍見有司奏以為魏得地宜以建丑之月為正乃定曆年改太和曆為景初曆吳志曰孫權黃武二年改四分曆用乾象曆王隱晉書曰張載弟前烏程令亢依蔡邕注明堂月令中台要綴諸說曆數而為曆讚祕書監荀崧見讚異之亦信該羅曆義唐書曰王勃聰警絕眾於推步曆笇尤精嘗作大唐千歲曆言唐德靈長千年合承周漢運曆不合承周隨短祚其論大旨日云以土王者五十代而一千年金王者四十九代而九百年水王者二十代而六百年木王者三十代而八百年火王者二十代而七百年此天地之常期符曆之大數也自黃帝至漢并是五運真主五行之匝土運復歸唐德承之宜矣魏晉至于周隨咸非正統五行之沴氣也故不可承之大率如此鴻笵五行傳曰聖人所以揆天行而紀萬國也孔子作春秋正春正秋所以重曆也五家之曆多踈闊唯顓頊曆為微近故張蒼用顓頊曆元封中立太初曆測弦望皆冣密益部耆舊傳曰巴郡落下閎漢武帝時改顓頊曆更作太初曆曰後八百歲此曆差一日當有聖人定之風土記曰自黃帝瑞顓下逮三王治曆十有一家考課損益各有變衰非運之錯考察意異故也尸子曰造曆者羲和之子也楊泉物理論曰疇昔神農始治農功正節氣審寒溫以為早晚之期故立曆日董巴議曰武王作周曆周公作魯曆蔡邕議曰邕以為曆數精微去聖人久遠得失更迭術無常是漢丞秦正曆用顓頊元用乙卯百有二歲孝武皇帝始改正朔曆用太初元用丁丑行之百八十九歲孝章皇帝用清河李梵之言改從四合元用庚辰今馮光陳晃各以庚申為非甲寅為是案曆法黃帝顓頊夏殷周魯凡六家各自有元先晃所據則殷曆元也他元雖不明圖讖各自一家之術皆當有效於當時昔太初始用丁丑之後六家紛錯爭訟是非太史令張壽王挾甲寅元以非漢曆雜候清臺課在下第卒以踈闊連見剝奏太初效驗無所漏失是則非圖讖之元而有效於前者也及用四分以來考之行度密於太初是知新元有效於今者也延光元年中謁者擅誦亦非四分庚申上言當用命曆序甲寅元公卿百寮參議正處竟不施行且三光之行遲遲進退不必若一術家以笇追而求之取合於當時而已故有古今之而行不能上通於古猶古術不能下通於今也由此言之有文於讖無驗於今未必為是有驗於今無文於讖未必為非
