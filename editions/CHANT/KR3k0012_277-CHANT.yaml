body:
  text: 兵部七良將下後周書曰王思政初入頴川士卒八千人城既無外援亦無叛者思政常以勤王為務不營資產嘗被賜園池思政出征後家人種桑菓及還見而怒曰匈奴未滅去病辭家況大賊未平何事產業命左右拔而棄之故身陷之後家無蓄積又曰元定有勇略每戰必陷陣然未嘗自言其功太祖深重之諸將亦稱其長者又曰蔡祐少有大志與鄉人李穆布衣齊名嘗相謂曰大丈夫當建立功名以取富貴安能久處貧賤耶言訖各大笑穆即申公後皆如其言又曰王羆為華州刺史時茹茹渡河南寇候騎已至豳州朝廷慮其深入乃徵兵發士馬屯守京城壍諸街巷以備侵軼右僕射周專達召羆議之羆不應命謂其使曰若茹茹在渭北者王羆率鄉里自破之不煩國家兵馬何為天子城中遂作如此驚動由周家小兒性怯致此羆輕侮權勢守正不同皆此類也又曰劉亮本名道德累遷左大都督從擒竇泰復弘農與沙苑之後並力戰有功遷車騎大將軍開封府長廣公亮以勇敢見知為當時名將并屢陳謀策多合機宜太祖謂之曰卿文武兼資即孤之孔明也乃賜名亮并賜姓侯莫陳氏出為東州刺史卒喪還京師太祖親臨之泣而謂人曰股肱喪矣腹心何寄又曰王傑本名文達太祖奇其才擢授楊烈將軍羽林監尋加都督太祖嘗謂諸將曰王文達萬人敵也但恐勇決太過耳復潼關破沙苑爭河橋戰邙山皆以勇敢聞親待日隆賞賜加於倫等於是賜姓宇文氏又曰于謹平江陵還太祖親至其第宴語極歡賞謹奴婢一千口及寶物并金石絲竹樂一部謹自以久當權望隆位功名既立願保優閑乃上先所乘駿馬及所著鎧甲等太祖識其意乃曰今巨猾未平公豈得便爾獨善遂不受又曰蔡祏字承先有膂力便騎射從征伐常潰圍陷陣為士卒先軍還之日諸將爭功祏終無所競太祖每歎之嘗謂諸將曰承先口不言勳孤當代其論敘其見知如此三國典略曰周高琳每征伐勇冠諸軍太祖謂之曰公即我之韓白也又曰胡僧祐為梁名將常以鼓吹置于齋中恒坐對之以自娛玩或諫之曰公名望隆重朝野具瞻此是羽儀可自居外僧祐曰我性愛之恒須見耳又曰北齊斛律金字阿六敦朔州勑部人光祿大夫郍瓌之子世敦直善騎射行兵用匈奴法望塵識馬步多少嗅地知軍度遠近神武戒文襄曰有讒此人者勿信之文宣嘗與金宴射親持矟走馬以擬金胸者三金堅不動賜帛千疋因過其宅置酒作樂北史曰隋文帝嘗從容命高頴與賀若弼言及平陳事頴曰賀若弼先獻十策後於蔣山苦戰破賊臣文吏耳焉敢與將論功帝大笑時論嘉其有讓又曰周將王思政久經軍旅每戰唯著破衣弊甲敵人疑非將帥故得免又曰韓果從平竇泰於潼關周文依其規畫軍以勝返賞真珠金帶一腰隋書曰李密父寬驍勇善戰幹略過人自周及隋數經將領至柱國蒲山郡公號為名將又曰史萬歲少英武善騎射驍捷若飛好讀兵書兼精占候又曰宇文忻每參帷幄出入臥內禪代之際忻有力焉後拜右領軍大將軍恩賜彌重忻妙解兵法馭戎齊整當時六軍有一善事雖非忻所建在下輒相謂曰此必忻法也其見推服如此又曰薛世雄性廉謹凡所行軍破敵之處秋毫無犯帝由是嘉之帝嘗從容謂群臣曰我欲舉好人未知諸君識不群臣咸曰臣等何能測聖心帝曰我欲舉者薛世雄群臣皆稱善帝復曰世雄廉正節概有古人之風於是超拜右翊衛將軍又曰楊玄感欲立名陰求將領謂兵部尚書叚文振曰玄感世荷國恩寵踰涯分自非立効邊裔何以塞責若方隅有風塵之警庶得執鞭行陣少展絲髮之功明公兵革是司敢布心腹文振因言於帝帝嘉之顧謂群臣曰將門必有將相門必有相故不虛也於是賚物千叚禮遇益隆又曰突厥入朝上賜之射突厥一發中的上曰非賀若弼無能當此於是命弼弼再拜而呪曰若赤誠奉國者當一發破的如其不然發不中也既射一發而中上大悅顧謂突厥曰此人天賜我也唐書曰劉黑闥為竇建德將奇兵東西揜襲多所剋獲每臨危難而色不變軍中號為神勇又曰屈突通平薛仁果之際寶物山積諸將爭取通一無所犯高祖聞之曰通清正奉國著於終始名下定不虛也賜金銀六百兩雜綵千叚又曰右武候將軍張士貴破反獠而還太宗勞之曰聞公親蒙矢石為士卒先雖古名將無以加也朕嘗聞以身報國者不顧性命嘗聞其語未覩其實於公方見之矣又曰文德皇后之葬也叚志玄與宇文化及分統士馬出宿於章武門太宗夜使宮官至三將軍處宇文士及營內使者志玄閉門不內曰軍門不可夜開使者曰此有手勑志玄曰夜中不辯真偽竟停使者至曉太宗聞而歎曰此真將軍也周亞夫何以加焉又曰霍王元範高祖第十四子也母曰張美人元範少善騎射初為吳王時嘗從太宗遊獵遇群獸命射之矢不虛發獸無遺者太宗撫其背曰汝才藝過人恨今無所施耳當天下未定我得汝豈不安乎又曰王君廓統兵經略東都王世充將郭士行許羅漢前後入掠君廓輒擊退之拜右武衛將軍詔勞之曰卿以十三人破賊一萬自古以少擊眾未之前聞非唯驍勇絕人亦足以顯卿忠節也又曰突厥入寇王君廓邀擊破之俘斬二千餘人獲馬十五疋高祖聞而大悅徵之入朝賜與御馬令殿廷乘之而出又謂侍臣曰吾聞藺相如叱秦王目皆出血君廓往擊建德將出戰徐勣遏之君廓憤發大呼目及鼻耳一時流血此之壯氣何謝古人不可以常例賞之復賜錦袍金帶還領幽州又曰高宗時吐蕃陷安西四鎮長壽初蕃軍逼安西府則天令武威軍總管王孝傑將軍阿史那忠節等率師拒之孝傑至安西合戰屢捷大破蕃軍收復龜茲于闐踈勒碎葉四鎮而還則天大悅謂侍臣曰昔貞觀年中俱統得此蕃域其後西陲不守並陷吐蕃今既復舊邊境自然無事孝傑建茲功効竭盡款誠遂能裹足徒行身與士卒齊力如此忠懇深足可嘉遷左衛大將軍又曰薛仁貴擊九姓突厥於天山軍將發高宗出甲令仁貴射之射穿五重九姓眾十餘萬令驍健十人逆來挑戰仁貴發三箭中三人其餘下馬請降並坑之更就磧北安撫餘眾而還軍中歌曰將軍三箭定天山將士長歌入漢關又曰劉仁軌顯慶四年出為青州刺史五年大軍征遼令仁軌監統水軍以後期免特令以白衣隨軍自効尋撿校帶方州刺史兼熊津道行軍長史仍別領水軍二萬襲破倭賊數萬於白波虜獲舡艦四百餘艘倭及躭羅等國皆遣使詣之請降初仁軌將發帶方州謂人曰天將富貴此翁耳乃於州司請歷日一卷并七廟諱人怪其故荅曰擬削平遼海頒示國家正朔使夷俗遵奉焉至是果以軍功顯正除帶方州刺史又曰郭元振為安西大都護時安西突厥首領烏質勒部落強盛款塞通和元振就其牙帳計會軍事時天大雪元振立於帳前與烏質勒言議須臾雪深風冷元振未嘗移足烏質勒年老不勝寒苦會罷而死又曰李晟臨洮人也祖思恭父欽代居隴右嘗為禪將晟數歲而孤事母孝聞少雄烈有材力善騎射年十八從軍身長六尺勇敢絕倫時河西節度使王忠嗣擊吐蕃有驍將乘城拒鬥頗多殺士卒忠嗣募軍中能射者射之晟乃引弓一發而斃三軍大呼忠嗣厚賞之因撫其背曰此萬人之敵也又曰貞元五年九月馬燧與太尉晟召見於延英殿上嘉其有大勳力皆圖形於凌煙閣列於元臣之次九年十月召見延英殿因拜手仆于地上親起之又曰王栖耀性謹厚善騎射始起兵涉寇境太深遇遊騎四合百步內立表俾之環視發必破的虜相顧恐懼徐而解去嘗獵會稽山中有逸林白額獸卒起草中應弦而斃在蘇州嘗與諸文士遊虎丘寺平野霽日先一箭射空再發貫之江東文士自梁肅已下歌詠焉又曰李愬既執送吳元濟裴度建彰義軍節擁降卒萬餘人次入焉李愬具橐鞬候度馬首度將避之愬曰此方不識上下等威之分久矣請公因以示之度以宰相禮受愬謁眾聳觀焉明日愬以師還文成柵度乃視節度使觀察及刺史事蔡人大悅又曰李光顏為河東禆將討李懷光楊惠琳皆有功後隨高崇文平蜀搴旗斬將出入如神由是稍稍知名授兼御史大夫時兄光進官亦至兼御史大夫軍中號曰大大夫小大夫國語周語曰邵公告單公曰晉有三伐勇而有禮返之以仁吾三逐楚君之卒勇也見其君必趨禮也能獲鄭伯而捨之仁也老子曰以道佐人主者不以兵強天下果而勿矜果而勿伐河上公注云當果敢推讓勿自伐取其美也六韜曰兵入殷郊見太公曰是吾新君也而啇容曰非也其人虎據而鷹峙威怒自副見利欲發進不顧前後見武王曰是新君也見敵不怒獻帝春秋曰張遼問吳降人曰紫髯將軍長上短下誰也荅曰是孫會稽會稽典錄曰張立之為人剛毅志意慷慨太祖嘗抑之曰爾不念詩書慕聖道而好乘汗擊劍此一夫之用何足貴也謂左右曰丈夫一為衛霍將十萬馳沙漠驅戎狄立功建號耳何能作愽士耶荊州記曰鄧遐襄陽人也勇力絕人歷位冠軍將軍數郡太守號名將袁子世說曰呂布之破也太祖給眾官車乘使取軍中物唯所欲眾人皆重載唯袁渙取書數百卷資糧而已眾人聞之大慚劉向新序曰孫武樂毅之徒皆前世之賢將也久遠深奧其事難知至於吳漢近時人耳起於販馬立為良將乘名竹帛天下歸德此可慕也
