body:
  text: 人事部九十四諫諍三東觀漢記曰上將自擊彭寵伏惠公諫曰臣聞文王享國五十伐崇七年而三分天下有二至武王四海乃賓陛下承大亂之極出入四年中國未化遠者不服而遠征邊郡四方聞之莫不怪疑願思之又曰郅惲為上東城門候上嘗夜出還拒關詔開門欲入惲不納上令從門間識惲遂不開明日惲上書曰昔文王不敢盤于遊田以萬民惟憂而陛下遠獵山林以夜繼晝其如社稷宗廟何誠小臣所竊憂也由是上特重之又曰第五倫為司空奉公不撓言事無所依違諸子諫止輒叱之每上封自作草不復示掾吏或民奏記言便宜便封上又曰明帝時決獄多近於重尚書陳寵上䟽諫曰先王之政賞不僭刑不濫與其不得已寧僭故古賢君歎相重式者重刑之至也又曰帝時伐匈奴魯恭王上䟽諫曰竊見竇憲耿秉銜使奉命暴師於外陛下親勞憂在軍役誠欲以安定邊陲為民除害臣思之未見其便數年以來民食不足國無積盛春興擾動天下妨廢農時以事夷狄非所以垂意於中國憫念民命也又曰日蝕司徒丁鴻上䟽曰臣聞春秋日蝕三十六而殺君三十六變不空生夫帝王不宜以重器假人觀古及漢傾危之禍靡不由世位擅寵之家伏見大將軍刺史二千石初除謁辭求通待報雖奉璽書受臺勑不敢去至數十日背公室向私門此乃上威損下權盛外附之臣依託權門諂諛以求容宜誅之又曰竇憲為車騎將軍辟崔駰為掾憲府貴重掾屬三十人皆故刺史二千石唯駰以處士年少擢在其間憲擅權驕恣駰數諫之及出征匈奴道路愈多不法駰為主簿前後奏記數十指切長短憲不能容稍疏之因察駰高弟出為岑長駰自以遠去不得意遂不之官而歸卒于家又曰楊賜字伯獻代劉郃為司徒帝欲造畢圭靈昆苑賜上䟽諫曰竊聞使者並規度城南民田欲以為苑昔先王造囿裁足以脩三驅之禮薪萊芻牧皆悉往焉先帝之制左開鴻池右作上林不奢不約以合禮中今猥規郊城之地以為苑囿廣壞田園廢居民畜禽獸殆非所謂保赤子之義又曰光和中有虹蜺晝降嘉德殿上引楊賜等入金商門問以祥異對曰按春秋讖曰天投蜺恐海內亂加四百之期象見吉凶聖人則之今妾媵嬖人閹尹之徒共專國朝欺罔日月而今縉紳之徒委伏畋畝口誦堯舜之言身蹈絕俗之行亡捐溝壑不見逮及冠履倒易陵谷代處又曰白馬令李雲桓帝誅大將軍梁冀而中常侍單超等五人皆以誅冀功並封列侯又立掖庭民女亳氏為皇后數月間后家封四人賞賜巨萬時地數震裂眾災頻降雲素剛憂國乃露布上書移三府曰孔子曰帝者諦也今官位錯亂小人諂進財貨公行政令日損是帝欲不諦乎帝得奏震怒下有司送雲黃門北寺獄死魏志曰辛毗字佐治潁川人帝踐祚為侍中帝欲徙冀州士家十萬民實河南時連蝗民飢群司以為不可而帝意甚盛毗與朝臣俱求見帝知其欲諫作色以見之皆莫敢言毗曰陛下徙士家其計安出帝曰卿謂我徙之非耶毗曰誠以為非也帝曰吾不與卿共議也毗曰陛下以臣不肖置之左右廁之謀議之官安得不與臣議耶臣所言非私也乃社稷之慮也帝不荅起入內毗隨而引其裾帝遂奮衣而還良久乃出曰佐治卿持我何太急耶毗曰今徙既失民心又無以食也帝遂徙其半嘗從帝射雉帝曰射雉樂哉毗曰於陛下甚樂而於群下甚苦帝默然為之希出又曰太祖討張魯東還時有將軍許遊擁部曲不附太祖而有慢言太祖怒先欲討之群臣多諫太祖橫刀於膝作色不聽繆襲入欲諫太祖逆之曰吾計以定卿勿復言襲曰若殿下計是耶臣方助殿下成之若殿下計非耶雖成宜敗之殿下逆臣令勿言何待下之不闡乎太祖曰許遊慢吾何言可致乎襲曰臣聞千石之弩不為鼷鼠發機萬鈞之鍾不以蓬橦起音今區區之許遊何足以勞神哉太祖曰善遂厚撫遊遊即歸服又曰賈詡字文和文帝時為五官將而臨淄侯植才名方盛有奪宗之議文帝使人問詡自固之術詡曰願將軍恢崇德度躬素士之業朝夕孜孜不違子道如此而已文帝從之深自砥礪太祖又當屏除問詡詡嘿然不對太祖曰與卿言而不荅何也詡曰思袁本初劉景升父子也太祖大笑於是太子遂定又曰文帝頻出遊獵或昏夜還宮王朗上䟽曰夫帝王將行則設兵而後登輿清道而後奉引所以顯至尊務戒慎也近日車駕及昏而反非萬乘之至慎也又曰文帝踐祚以高柔為治書侍御史時人間數有誹謗妖言帝疾之有妖言輒殺而賞告者柔上䟽曰宜除妖謗賞告之法帝乃下詔敢以誹謗相告者以所告罪罪之於是遂絕又曰太祖置校事盧洪趙達等使察群下高柔諫曰今置校書既非君上信下之指又達等數以憎愛擅作威福宜撿治之後姦利發太祖殺之以謝於柔又曰太祖征并州留崔琰傅文帝於鄴太子仍出田獵變服易乘志存驅逐琰書諫曰今邦國殄悴惠康未治唯太子燔翳捐褶以塞眾望不令老臣獲罪於天又曰高堂隆寢疾口占上䟽曰臣寢疾病有憎無損常懼忠款不昭時王莫不思紹堯舜而蹈桀紂之跡願陛下少垂省覽又曰明帝即位辛毗為廷尉帝欲平北邙令登臺觀則見孟津毗諫曰天地之性高高下下今而反之既非其理若九河湓溢洪水為害而丘陵皆移將何以禦之帝乃止又曰明帝時百姓凋匱而役務方殷衛覬上䟽曰順止者愛所由來逆意者惡所從至故人臣皆爭順指而避逆意非破家為國殺身成君者誰能犯顏色觸忌諱建一言開一說哉又曰荀彧傳曰時曹公欲滅陶謙乘勝欲取徐州而後定呂布彧諫曰昔高祖保關中光武據河內深根固本以制天下進可以勝敵退可以自守雖師北身遁者數矣而終復振成大業也今將軍本以兗州首事故能平定山東此實天下之要地而將軍之關河也若不先定根本將何以寄諸乎宜且急收熟麥以實軍資呂布不足慮也今捨此而東未見其便多留兵則不可勝敵少留兵則不可固守且呂布乘虛冠暴震動人心縱保數城非己所有操乃從其言遂破呂布而平兗州魏略曰蘇則為侍中文帝時人多飢困而軍數出又兼治宮室則又數面諫由此上頗不悅其後出以為河東相又曰時太祖欲征吳而大雨霖三軍多不願行太祖知其然恐外有諫者教曰今孤戒嚴未知所之有諫者死賈逵受教謂其同寮三主簿曰今實不可出而教如此不可諫也乃建諫草以示三人三人不獲皆署名入白事太祖怒收逵等當選獄教取造意者逵即言我造意遂走詣獄獄吏以逵主簿也不即著械逵謂獄吏曰促械我尊者且疑我在近職求緩於卿既而復職又曰明帝徙長安鍾簴起土山寺司徒軍議掾河東董尋上書曰臣聞古之貞士盡言於國不避死亡故周昌比高祖於桀紂劉輔譬趙后於人婢天生忠直雖白刃沸湯往而不顧者誠為時主愛惜天下也建安已來野戰死亡或門單戶盡雖有在者遺孤老弱若今宮室狹小當大之猶隨時不妨農務況乃作無益之物黃龍鳳皇九龍承露盤玉山淵池也此皆聖明之所興其功參倍於殿舍三公九卿侍中尚書天下至德皆知非道而敢言者以陛下春秋方剛心畏雷霆臣今知言出必死而臣自比於牛一毛生既無益死亦何損發筆流涕心與世辭臣有八子臣死之後累陛下矣將奏沐浴既通帝曰董尋不畏死耶主者奏收尋有詔勿問吳志曰張昭少子休字叔嗣從中庶子轉為右弼都尉孫權嘗遊獵逮暮乃歸休上䟽戒權大善之以示於昭又曰孫權欲廢太子和立亮尚書僕射屈晃固諫不止權大怒牽晃入殿杖一百又曰孫權任信校事呂臺臺性苛慘用法深刻太子登數諫權不納後壹姦罪發露權引咎責躬又曰孫權既為吳王歡宴之末自起行酒虞翻伏地陽醉不持權去翻起坐權於是大怒手劍欲擊之侍坐者莫不惶遽唯大司農劉基起抱權諫曰大王以三爵後殺善士雖翻有罪天下熟知之權曰曹孟德尚殺孔文舉孤於虞翻何有哉基曰孟德輕害士人天下非之今大王躬行德義欲與堯舜比隆何自喻於彼乎翻由是得免權因勑左右自今酒後言殺皆不得殺又曰張紘字子綱廣陵人避難江東委質於孫策遣奉章詣許昌曹公聞策薨欲伐吳紘諫曰以為乘人之喪既非古義若有不克棄好成讎不如厚禮曹公從之紘歸吳後為長史權率輕騎將赴敵紘諫曰兵者凶器戰者危事麾下多強暴之勇三軍之眾莫不寒心權納而止又曰呂蒙時為護軍權將欲北取徐州以廣其地蒙諫曰不可今曹操遠在河北新破二袁撫集幽冀未暇東顧今徐州將守惡足言也往必剋之然地勢陸通四面受敵今日得之明日還失舉全吳之眾未足守也不如取關羽西據荊州則利盡長江此上流之勢於國之便十徐州也則重關西門國之固也權甚然之興師遂擒關羽而平荊州又曰華覈字永先吴人上䟽皓曰臣聞之主所求於民者二民之所望於主者三二謂求其為己勞也求其為己死者也三謂飢者能食之勞者能息之功者能賞之今民以致其二事而主失其三主二求已備民之三望未報今百工作無用之器婦人為綺靡之飾且美貌者不待華彩以崇好艷姿者不待文綺以致愛若極粉黛窮盛服未必無醜婦廢華彩文繡未必無美貌也皓終不納後以懲譴免數年而卒又曰韋曜字弘嗣吳人本名昭避晉文諱改之孫皓立曜以直諫非一漸見責怒皓每饗宴以七升為限雖不入口並澆灌取盡曜遂見逼皓輒以為曜與華覈薛瑩撰吳書皓欲以父和作帝紀曜以和不登帝位宜作傳曜遂被誅又曰賀邵字興伯孫皓時為中書令領太子太傅皓凶暴驕矜邵上疏諫曰陛下媟近寵媚之臣日聞順意之辭海內悼心朝臣失圖書奏皓深恨之竟見殺蜀志曰天旱禁酒釀者有刑吏於人家索得釀具欲令與作酒者同罰簡雍從先主遊見一男子行道謂先主彼人欲淫何以不縛先主曰卿何以知之雍對曰彼有淫具與欲釀者同先主大笑而原欲釀者雍之滑稽凡此類又曰黃權字公衡州牧劉璋召為主簿時別駕張松建議宜迎先主代張魯權諫曰左將軍有驍名今欲以部曲遇之則不滿其心欲以賓客禮待則一國不容二君客若有太山之安則主有累卵之危可但閉境以待河清璋不聽又曰張松說劉璋交通先主璋從之遣法正請先主璋從事廣漢王累倒自懸於州門以諫璋一無所納勑在所供奉先主入境如歸晉書曰何尚之傳時造玄武湖上欲於湖中立萬丈蓬萊瀛洲三神山尚之固諫乃止時又造華林園並盛暑欲興人工尚之又諫宜加休息又曰續咸偽趙石勒將遷都於鄴咸固諫勒怒曰不斬此老臣朕宮不得遷也勑御史收之中書令徐光表極諫勒乃悟停作賜咸絹百疋又曰孫嵩為王彌長史彌與石勒有隙勒常惡之乃請計於右侯張賓賓曰英雄不並立宜早圖之勒於是開宴請彌彌將行嵩請諫曰石公卑甚言甘不可信也願公勿往自守保固恐有專諸孫峻之禍及耳彌曰石勒一豎子耳奚能為也不聽遂入酒酣遇害又曰裴元略事偽秦符堅為金部郎中堅常以珠璣奇異彌飾不可勝計以朝群臣元略諫曰周卑宮室慶垂八百始皇窮極嗣不及孫此萬古所以傳載也願陛下去之以延洪祚慶流萬代堅曰非卿忠何以聞寡人之過悉命去之又曰游子遠仕劉曜西羌羯叛亂舉兵四十餘萬三輔大震曜甚患之欲大興師伐之子遠諫曰足下納臣愚計不勞大軍可一月而定矣且羌夷之叛也非有大度窺竊神器矣但迫足下嚴刑峻網今死者可不追生者猶可安莫若大赦釋諸逆人若沒官者悉還之遽相撫育聽其復業與人更始彼生路既開人情豈有樂禍好亂者也且小人藂居必有他心今無刑辟之懼以恩信懷之不降何待矣縱酋長負罪而不下者請假臣弱兵五千人為足下梟之不勞大軍此可定矣今賊黨既盛彌川被谷君臨之以兵恐非歲月而可殄也此言其術也曜大悅行其計西方遂平王隱晉書曰愍懷太子頗好遊宴洗馬江統等諫曰宜諮詢保傅引見賓客悉得自盡有增博見益多聞晉中興書曰江逌為侍中時穆宗欲於後園脩立池苑逌諫以強賊未滅宜務軍備當存儉約以率群下上即納之也徐廣晉紀曰成帝有乳母經營艱苦詔假其名號顧和諫曰保母奉祐聖躬不遺其勳第舍供給已為隆厚若假以名號非令典也書而不法後嗣何觀帝乃止臧榮緒晉書曰衛瓘字伯玉每議及經國屢形於言色晉祖恐大臣有諫瓘嘗因宴飲歡醉手撫御床曰此坐可惜宋書曰世祖遊幸無度太后六宮常乘副車在後沈懷文與王景文每諫不宜亟出後同從坐松樹下風雨甚驟景文曰卿可以言矣懷文曰獨言無從理相與從之江智淵臥草側亦謂之為善俄而入召俱入雉場懷文曰風雨如此非聖躬所宜冒景文又曰懷文所啟宜從智淵未及言上方注弩作色曰卿欲效顏竣耶何以恒知人事又曰顏竣小子恨不得鞭其面又曰何尚之遷尚書左僕射加散騎常侍時上行幸還多侵夜尚之表諫曰萬乘宜重尊不可輕此聖心所鑒豈假臣啟輿駕比還多冒夜伏願少採愚誠上優詔納之
