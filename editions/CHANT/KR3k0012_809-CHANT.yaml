body:
  text: 珍寶部七琥說文曰琥發兵瑞玉為琥文周禮春官上大宗伯曰白琥禮西方周禮秋官下小行人曰合六幣琥以繡也左傳昭七曰魯昭公疾徧賜大夫大夫不受賜子家子雙琥一環一璧受之大夫皆受其賜事見璧門呂氏春秋曰戰鬭用琥琥魄廣雅曰琥魄珠也生地中其上及旁不生草淺者五尺深者八九尺大如斛削去皮成琥魄初時如桃膠凝堅乃成其方人以為枕出愽南縣典略曰大秦國多琥魄續漢書曰哀牢夷出光珠琥魄吳書曰虞翻少好學有高氣年十二客有候其兄者不遇遇翻翻追書與曰僕聞虎珀不取腐芥慈石不受曲針過而不存不亦宜乎客得書奇之由是見稱沈約宋書曰武帝時寧州常獻虎珀枕甚光麗時將北征以虎珀治金瘡上大悅命擣碎分付諸將西京雜記曰宣帝有身毒寶鏡一枚大如八銖錢常以虎珀笥盛之異物志曰虎珀之本成松膠也或以作杯瓶華陽國志曰珠穴出光珠虎珀能吸芥西域諸國志曰珠穴出麋盧水邊沙中有短腰蜂窠燒治以為虎珀玄中記曰楓脂輪入地中千秋為虎珀愽物志曰松脂淪入地中千年化為茯苓千年化為琥珀虎珀一名紅珠今太山有茯苓而無虎珀益州永昌出虎珀而無茯苓或復云燒蜂窠所作未詳此二說拾遺記曰昔漢武寶鼎元年西方貢珍怪青虎珀鷰置之靜室自於室內鳴翔又曰吳主聞潘夫人有色令進其圖圖成吳主見之驚喜以琥珀如意撫案即折曰此神女也因納之又曰江引悅鄧夫人月下舞水精如意誤傷其頰令太醫醫之以白獺髓和琥珀末塗之遂差神農本草經曰取鷄卵黃白渾雜者熟煮及尚軟隨意刻作物以苦酒漬數宿既堅內著杓中佳者亂真矣此世所常用作無不成左思蜀都賦曰虎珀丹青珠江瑕英潘尼詩曰駕言遊西岳寓目二華山金樓虎珀階象榻瑇琩筵中有神秀士不知幾何年馬腦廣雅曰馬腦石次玉也魏略曰大秦國多馬腦涼州記曰呂纂咸和二年盜發張駿陵得馬腦鍾榼北齊書曰武平中除傅伏為東雍州刺史會周克并州遣韋孝寬來招伏曰并州已平故遣公兒來報便宜急下授上大將軍武鄉郡開國公即給告身以金馬腦二酒鍾為信伏不受北史曰梁主蕭詧曾獻馬腦鍾周文帝執之顧丞郎曰能擲樗蒲頭盧者便與鍾已經數人不得頃至薛端乃執樗蒲頭而言曰非為此鍾可貴但思露其誠耳擲之五子皆黑文帝大悅即以賜之古今注曰魏武帝以馬腦石為馬勒拾遺記曰帝顓頊時有丹丘國獻馬腦甕以盛甘露充於廚丹丘之地有夜叉駒跋之鬼能以赤馬腦為瓶盂及樂器皆精妙於中國用者一云馬腦者惡鬼之血凝成此物也黃帝時有馬腦甕至堯時猶有甘露在其中盈而不竭玄中記曰馬腦出月氐魏文帝馬腦勒賦曰玉屬也出自西域文理交錯有似馬腦故其方人因以名之陳琳馬腦勒賦曰託瑤溪之寶岸臨赤水之珠波陸機靈龜賦曰若車渠繞理馬腦縟文龜甲錯黿龍鱗王粲馬腦勒賦曰遊大國以廣觀兮覽希世之偉寶揔眾材而課美兮信莫臧於馬腦琉璃孝經援神契曰神靈滋液則琉璃鏡廣雅曰琉璃珠也韻集曰琉璃火齊珠也漢書地理志曰武帝使人入海市琉璃續漢書曰哀牢夷出火精琉璃漢武故事曰武帝好神仙起伺神屋扉悉以白琉璃作之光照洞徹又曰漢成帝為趙飛鷰造服湯殿綠琉璃為戶魏略曰大秦國出赤白黑黃青綠紺縹紅紫十種琉璃魏書曰天笁國人商販至京自云能鑄石為五色琉璃於是採礪山石於京師鑄之既成光澤美於西方來者乃詔為行殿容百餘人光色映徹觀者見之莫不驚駭以為神明所作自此國中琉璃遂賤人不復珍之吳曆曰黃龍扶南諸外國來獻琉璃晉書曰王濟豪侈帝常幸濟宅供饌甚豐悉貯琉璃器中帝甚美又曰汝南王醼公卿以琉璃鍾行酒酒及崔洪洪不肯執問其故曰慮有執玉不趍之義洞冥記曰東方朔得五色露以琉璃器盛之獻武帝拾遺記曰董偃設紫琉璃屏風世說曰滿奮畏風在晉帝坐北䆫作琉璃扉實密似踈奮有寒色帝笑奮荅臣猶吳牛見月而喘吳牛水牛也南士多暑而水牛畏熱見月疑是日所以喘奮太尉寵之孫也廣志曰琉璃出黃支斯調大秦日南諸國南州異物志曰琉璃本質是石欲作器以自然灰治之自然灰狀如黃灰生南海濱亦可浣衣用之不須淋但投之水中滑如苔石不得此灰則不可釋十洲記曰方文山上有琉璃宮杜篤論都賦曰槌蜯蛤碎琉璃諸葛恢集曰詔荅恢今致琉璃枕一傅咸污巵賦曰人有遺余琉璃巵者小兒竊弄墮之不潔意既惜之人有感物之汙辱乃喪其所以為寶況君子行身而可以有玷乎左思吳都賦曰致遠琉璃珂玳孫公達琵琶賦曰回風臨樂刻琉璃車渠廣雅曰車渠石次玉也魏略曰大秦國多車渠古今注曰魏武帝以車渠為酒杯玄中記曰車渠出天笁國古車渠椀賦曰車渠玉屬多纖理縟文出於西國其俗寶之小以繫頸大以為器王粲車渠碗賦曰雜玄黃以為質似乾坤之未分兼五德之上美超眾寶而絕倫陳思王車渠盌賦曰唯盌之所生於涼風之峻湄光如激電景若浮星河神怪之瓌環瑋信一覽而九驚王處道車渠觶賦曰溫若騰暾之升天曜似遊鴻之遠臻頗黎梁四公子記曰扶南大舶從西天笁國來賣碧頗黎鏡面廣一尺五寸重四十斤內外皎潔置五色物於其上向明視之不見其質問其價約錢百萬貫文帝令有司筭之傾府庫當之不足其商人言此色界天王有福樂事天澍大雨雨眾寶如山納之山藏取之難得以大獸肉投之藏中肉爛類寶一鳥御出而此寶焉舉國不識無敢酬其價者唐書曰高宗上元二年十二月拔汗那王獻碧頗黎及地黃龜茲白王素稽獻金頗黎天笁記曰大雪山中有寶山諸七寶並生取可得唯頗黎寶生高峰難得玄中記曰大秦國有五色頗黎紅色最貴十洲記曰崑崙山上有紅碧頗黎宮名七寶堂是也水精廣雅曰水精謂之石英續漢書曰哀牢夷出水精魏略曰大秦國一名黎難宮室皆水精為柱食器亦然廣志曰水精出大秦黃支國十洲記曰崑崙山上有水精闕山海經曰堂庭山多水玉注曰水玉今水精也列仙傳曰赤松子服水玉拾遺記曰周靈王二十三年起昆昭之臺篩水精為泥又曰鬱夷國於山上架樓室向明以開戶牖以水精火藻為階司馬相如上林賦曰精磊砢劉楨魯都賦曰水精潛光於雲穴也劉公幹清慮賦曰入鐐碧之間出水精之都上青雘之山蹈琳珉之塗雲母春秋運斗樞曰樞星散為雲母漢書曰王莽侍中待詔有說莽鴟自虎吻豺狼聲者莽誅待詔而封告者後常翳雲母屏風非親近莫得見范曄後漢書曰鄭弘為太尉弟五倫為司空初倫為會稽召弘署督郵每朝弘曲躬自卑帝聽置雲母屏風分隔其間晉陽秋曰孫秀降賜雲母車梁書曰南岳鄧先生名郁荊州建平人也少而不仕隱居衡山極峻之嶺立小板屋兩間足不下山斷穀三十餘載唯以澗水服雲母屑日夜誦大洞經唐書曰吳王杜伏威性好左道因合金丹求長生之術常服雲母散又曰尉遲敬德遂飛練金石閑居服雲母粉淮南萬畢術曰雲母入地千歲不朽雲母在足無踐棘注曰取大雲母塗足下踐棘不能刺淮南子曰雲母來水雲母石可致水抱朴子曰雲母五色其多青者名雲英宜以春服之多赤者名雲珠宜以夏服之多白者名雲液宜以秋服之多黑者名雲母宜以冬服之但有青黃二色者名雲沙宜以季夏服之皛皛純白者名磷石可四時長服又曰吳景帝戍將於廣陵掘冢有人如生棺中雲母厚尺許西京雜記曰晉幽公冢甚高美門關皆是石坐橃除深入乃得雲母深處見百餘尸縱橫相枕籍皆不朽唯一男子餘皆女子或坐或立或臥衣服形色不異生人又曰成帝設雲母帳雲幄雲幕於甘泉紫殿世謂之三雲殿晉公卿禮族曰賜太牢安平王治雲母輦晉宮闕名曰含元池中有雲母舡洛陽宮殿記曰宮中有林商等觀皆雲母置䆫裏日照之煒煒有光列仙傳曰方面堯時隱人練食雲母三齊記曰東武城有雲母山山有雲母因以為名安期先生常所遊餌東園祕記曰以雲母壅尸則亡人不朽帝馮貴人素國色亡已十餘年冢為賊所發形貌如故但冷耳盜共奸通之後捕得之此賊言貴人棺有數斛雲母石虎鄴中記曰虎作雲母五明金薄扇裴淵廣州記曰增城縣有雲母向日出照之晃曜地理志曰瑯琊定山出雲母王建平典術曰雲母有五名其色青黑五色亂文者名曰雲母白而微青名曰雲英如水露黃白名曰雲沙青赤雜者名曰雲珠黃白而赤重厚名陽起石雲母根也其中黑文班如錢名雲膽傷人不可服第一鄰石第二雲母第三雲珠第四雲英第五雲光服鄰石壽五千年服雲母壽三百年服雲英千年服雲光與天地同保瑟瑟明皇雜錄曰上於華清宮置長湯數十間屋又為銀鏤漆舡至於楫棹皆飾以珠玉又於湯中壘瑟瑟及沉香為山以狀瀛洲方丈又曰虢國夫人奪韋氏宅造中堂既成召匠圬墁授二百萬賞其直而復以金盃二瑟瑟三斗為賞後曾有暴風拔樹委其堂上已而視之略無所傷既撤瓦以觀之皆承以木瓦其傳作精至皆此類也玗琪說文曰玗石之似玉者也爾雅曰東方之美者醫無閭之珣玗琪山海經曰開明北有玗琪樹玗琪玉屬
