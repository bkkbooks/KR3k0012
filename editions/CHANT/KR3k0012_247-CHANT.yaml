body:
  text: 職官部四十四太子左右贊善大夫六典曰左贊善大夫掌翊贊太子以規諷也皇太子出入動靜茍非其德義則必陳古以箴焉右贊善大夫掌如其左凡皇太子朝宮臣則列於右階之下唐書曰貞元十六年以山人崔芊為右贊善大夫充太子侍直新名也太子洗馬六典曰洗馬掌四庫圖籍繕寫刊緝之事立正本副本以備供進凡天下之圖書上於東宮者皆受而藏之國語曰夫差為勾踐洗馬續漢書百官志曰洗馬員十六人秩六百石職如謁者太子出則當直一人在前導威儀蓋洗馬之義也漢書曰司馬安少與汲黯為太子洗馬安為人深巧善官四至九卿魏略曰顏斐字文林以才學為太子洗馬晉書曰江統為洗馬太子頗好遊宴或闕朝侍統以五事諫之又曰解系兄弟少連叔連各清身潔己仕皆為洗馬梁書曰庾於陵拜太子洗馬舊東宮官屬通為清選洗馬掌文翰尤其清者近世用人皆取甲族有才望者時於陵與周捨並擢充職高祖曰官以人而清豈限以甲族時論以為美唐書曰李綱字文紀隋開皇末為太子洗馬皇太子勇嘗以歲首宴宮臣左庶子唐令則自請奏琵琶又歌武媚娘之曲綱白勇曰令則身任宮卿職當調護乃於宴座自比倡優進淫聲穢視聽事若上聞罪在不測豈不累於殿下臣請遽正其罪勇曰我欲為樂耳君勿多事綱趨而出及勇廢黜文帝召東宮官屬切讓之無敢對者綱對曰今日之事乃陛下之過非太子罪也太子才非上品性是常人若得賢明之士輔道之足堪繼嗣皇業方今多士盈朝當擇賢居任奈何以絃歌鷹犬之才日在其側致令至此乃陛下誡道不足豈太子之罪耶辭氣凜然左右皆為之失色文帝曰令汝在彼豈非擇人文士傳曰江統字應元召補洗馬每有疑滯大事章表奏議輒為同官所推常為之作草韓子曰勾踐入宦於吳執干戈為吳王洗馬故能殺夫差於姑蘇傅咸申懷賦序曰余自無施謬為眾論所許補太子洗馬才不稱職意常默然傅咸感別賦序曰有人魯庶叔雅量弘濟思心邃遠余自少與之相長情相親愛有如同生其後遷太子洗馬俄而謬蒙朝私猥黍斯職雖懼不稱而喜得與此子同班共事天下之遇未有若此周旋三載魯生遷尚書郎雖別不遠而情甚悵恨退作茲賦云爾徐邈問玉珉曰漢法制洗馬冠高山冠職如謁者中朝新制洗馬進賢冠出則在馬前清道故曰洗馬太子司議郎六典曰司議郎掌侍從規諫駮正啟奏凡皇太子出入朝謁從享及釋奠於先聖先師講學齒冑撫軍監國之命可傳於史冊者並錄為記注若宮坊之內祥瑞災眚宮長除拜薨卒亦皆記之每歲終則送史館唐書曰敬播以撰實錄功遷太子司議郎時此官初置極為清望中書令馬周歎曰所恨資品望高不獲歷居此職又曰貞觀中皇太子上表曰臣聞直筆記言諫司箴過蓋絕代之通訓乃垂𥙿於當今臣以睱日遐覽前志竊惟古之養德咸有史官所以補闕拾遺為砥為礪彰善癉惡如切如磋譬立唯而端形猶琢玉而成器故大戴禮曰太子免於保傅之嚴則有司過之史漢書云太子既冠成人乃有記過之史是知姬誦登兩肇建此官劉啟昇儲憲章斯義故能道溫玉裕聲聞宸宮上有慰於皇情下無虧於物議臣地居問寢齒在撗經越以幼年夙蒙天奬趨紫宸以遵禮仰黃屋以承歡怙聖慈而益驕恃鍾心而取恣肅恭馳道恐或乖方晨昏視膳慮有違舛蒙泉始道必俟後乘之規離光未融懼寢前星之耀是以夙興夜寐內省非憂延首讜言冀匡童昧而魏晉已降不置此員杜絕箴規何期甚謬伏惟陛下窮神稽古尚擇芻蕘之言玄覽文明猶開登石之路况臣冲藐未涉藝文出自深宮便親監撫之重罕從鼓篋疇識絃誦之宜一德有愆貽憂睿念三朝登餕何以勝任所以冐敢陳聞請遵故實願開史職故司箴誡是使綿載墜典復在聖朝資此正人少匡不逮於是門下坊置太子司議郎四人妙選名行之士為之正六品上掌侍從規諫駮正啟奏并錄東宮記注分判坊事又曰元讓有孝行則天朝中宗居東宮復徵拜司議郎及謁見則天謂曰卿既孝於家必能忠於國今授此職須知朕意宜以孝道輔我兒也又曰王元感濮州鄄城人也長安三年上表其所撰尚書糺謬十卷春秋振滯二十卷禮記繩愆三十卷并所注孝經史記藁草請官給紙筆寫上秘閣詔曰王元感質性溫敏愽聞強記手不釋卷老而彌篤掎前達之失究先聖之旨是謂儒宗不可多得可太子司議郎兼崇賢館學士魏知古嘗稱其所撰書曰信可謂五經之指南也太子中舍人晉書曰杜錫預之子也累遷太子中舍人性亮直忠烈屢諫愍懷太子言辭懇切太子患之後置針著錫常所坐處毯中刺足流血他日太子問錫向者何事錫對醉不知太子詰之曰君喜責人何自作過也晉中興書曰顧榮清操南土秀望累遷太子中舍人又曰顧榮字彥先時吳朝士人入洛者唯陸機陸雲及榮三人而機雲雖有才藻清望不及榮也選補吳王郎中令累遷太子中舍人太子舍人六典曰太子舍人掌侍從行令書令旨及表啟之事皇太子通表如諸臣之禮諸臣及宮臣上皇太子大事以牋小事以啟其封題皆曰上於右春坊通事舍人開封以進其事可施行者皆下於舍人與庶子參詳之然後進不可者則否續漢書百官志曰舍人秩二百石無員更直宿衛如三署郎中漢書曰文帝使晁錯詣伏生受尚書還拜太子舍人東觀漢記曰侯霸字君房為人嚴而有威為太子舍人漢雜事曰鄭當時為太子舍人每伍日洗沐常置驛馬長安諸郊請謝賓客以夜繼日常恐不遍然其交知皆天下名士也魏志曰張茂上便宜擢為太子舍人晉書曰王衍以名問超為太子舍人又曰元帝太興元年以太子紹舅虞弲為舍人太子奏曰舅甥宜崇敬降舅氏之親為侍臣非所安也詔乃轉弲為常侍沈約宋書曰王僧達瑯琊臨沂人太保弘之少子也太祖聞僧達早慧召於德陽殿問其書學及家事應對閑敏上甚嘉之以為太子舍人齊書曰張率建武三年舉秀才除太子舍人與同郡陸倕陸厥幼相友狎嘗同載詣左衛將軍沈約遇任昉在焉約謂昉曰此三子後進秀才皆南金也卿可與交由此與昉友梁書曰劉杳字士深為舍人及昭明太子薨新宮建舊人例無住者勑特留杳焉後魏書曰崔玄伯少有儁才號曰冀州神童符融收冀州虛心禮敬拜陽平公管征東記室出揔庶政入為賓友眾務修理處斷無滯符堅聞而奇之徵為太子舍人摯虞云太常弟子通二經補文學三經補太子舍人晉置十六人掌表啟太子通事舍人六典曰太子通事舍人掌導引宮臣辭見及承令勞問之事凡元正冬至百官與諸方之使者參見亦如之若皇太子行先一日京文武職事九品已上奉辭及還宮之明日亦如之三國典略曰陳殷不害字長卿尚書右丞不佞兄也長於政事飾以儒術梁武帝時與庾肩吾俱為東宮通事舍人直日奏事梁武謂肩吾曰卿是文學吏事非所長可使不害來耶
