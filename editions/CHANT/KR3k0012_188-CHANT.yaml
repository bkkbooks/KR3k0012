body:
  text: 居處部十五牆壁說文曰垣蔽曰牆又曰壁垣也爾雅曰牆謂之墉廣雅曰墉垣牆也釋名曰墉容也所以蔽隱於形容也壁辟也所以辟斷風寒也牆障也所以自障蔽也垣援也人所阻以為援衛也易曰公用射隼於高墉之上獲之無不利書曰既勤垣墉惟其塗蔇茨尚書大傳云賁墉諸侯䟽杼注曰賁大也言大牆正道直也䟽衰也杼亦牆也亦衰殺其上不得正直詩曰百堵皆作又曰築室百堵又曰誰謂鼠無牙何以穿我墉又曰乘彼垝垣以望復關又曰牆有茨篇名衛人刺上也公子頑通于君母而不可道也牆有茨不可掃也箋牆所以防非常也又曰君子無易由言耳屬于垣由用也人將聽之又曰將仲子兮無踰我牆又曰兄弟鬩于牆外禦其務務侮又曰徹我牆屋田卒汙萊毀牆屋不得農也書序秦始皇滅先代典籍焚書坑儒天下學士逃難解散我先人用藏其家書于屋壁至魯恭王時好治宮室壤孔子舊宅以廣其居於壁中得先人所藏古文虞夏商周之書及傳論語孝經皆科斗文字又曰峻宇雕牆禮曰七月坯牆垣六月小暑後五日蟋蟀居壁周禮曰牆厚三尺崇之注云高卑為率足以相為勝也左傳叔孫曰人之有牆以蔽惡也牆之卻壤誰之咎也注咎在牆也又曰巢牛隱於短垣以射吳子諸樊又曰寺人披伐蒲重耳踰垣而走披斬其祛又曰晉靈公不君厚歛以雕牆論語叔孫武叔謂子貢曰仲尼豈賢於子乎對曰譬之宮牆賜之牆及肩窺見室家之好夫子之牆數仞不得其門而入不見宗廟之美又曰糞土之牆不可杇也又曰其猶正牆面而立也歟史記曰孝景帝即位晁錯為內史貴幸用事門東出不便乃穿一門出太廟煗垣丞相申屠嘉聞之奏請誅錯上愛之曰錯所穿非真廟垣乃外煗且又我使為之錯謝而出嘉曰吾悔不先斬錯又曰司馬相如家成都貧家徒四壁立漢書曰貫高等欲害高祖置人於複壁中後漢書曰逢萌與同郡徐房平原李子雲王君公相友善並曉達陰陽懷德穢行房與子雲養徒各千人君公遭亂獨不去儈牛自隱儈謂平會兩家買賣之事時人語曰避世牆東王君公又曰史叔賓者陳留人也少有盛名郭林宗見而告人曰牆高基下雖得必失後果以論議阿枉毀名云又曰崔晏仕官歷位邊郡而愈貧薄家徒四壁卒無以殯歛光祿勳楊賜太僕袁逢少府叚熲為備棺槨葬具大將軍袁隗樹碑頌又曰杜安字伯夷少有志節年十三入太學號奇童京師貴戚慕其名或遺之書安不發悉壁藏之及後捕案貴戚賓客安開壁出書印封如故竟不罹患時人貴之位至巴郡太守吳志曰呂蒙病孫權時在江安迎置內廄治護萬方欲數見顏色又恐勞動常穿壁瞻之見其少食則喜不能則咄唶也晉書外國傳大秦國以琉璃為牆壁齊書曰劉璡字子璥方軌正直兄瓛夜隔壁呼璡出不荅方下床著衣立行及簾外然後應瓛問其故璡曰向束帶未竟又曰徐孝嗣初在率府晝臥齋北壁下夢兩童子遽云移公床孝嗣驚起行數步而壁崩莊子曰正考父一命而傴再命而僂三命而俯循牆而走孰敢不軌言人不敢以不軌之事侮之家語曰孔子觀乎明堂覩四門之墉有堯舜桀紂之象各有善惡之狀興廢之誡焉衡山記曰甘泉宮有石壁焉禹所刻文在此洞冥記曰元狩三年帝復起陵霞觀去地九十丈累白玉為壁以八分篆寫羲皇以來迄周成王封禪之事所謂事登壁間蓋帝王之本績也孟子知命者不立乎巖牆之下恐頹也淮南子曰舜作宮築牆始也漢官儀曰省中皆胡粉塗壁畫古烈士新序曰諸侯牆有黑堊之色無丹青之彩神仙傳白和事王君王君語曰我暫往瀛州汝於正北石室熟視北壁當見文字讀之得道矣三年方見壁上有古人所刻太清經讀之得仙魏略曰趙岐避難青州市孫嵩知岐避事置岐於複壁中西京雜記云匡衡鑿鄰家壁偷光讀書宋玉賦云東家美女登牆窺玉三年玉猶未許焦贛易林曰千仞之牆禍不入門孟奧北征記曰鄴城避雷室西南石溝北有華林牆牆高九丈方圓一里也柱廣雅曰楹謂之柱釋名曰柱住也楹亭也亭亭然孤立也周書曰文王在鎬召太子發曰吾栝柱而茅茨為民愛費也左傳曰叔孫豹指楹曰雖惡是其可去乎又曰丹桓宮楹穀梁傳曰丹桓宮楹禮天子丹諸侯黝大夫蒼士黈大戴禮曰周時德澤和洽蒿茂以為宮柱名曰蒿宮漢書郊祀志曰武帝鑄柏梁銅柱又曰成帝立趙皇后劉輔諫曰朽木不可為柱卑人不可為主范曄後漢書曰李膺拜司隸校尉時張讓弟為野王令貪殘無道至乃殺孕婦聞膺厲威嚴懼罪逃還京師因匿兄讓弟舍柱中膺知其狀率將吏往破柱付洛陽獄受辭畢即殺之魏略曰大秦國以水精為室柱吳志曰孫堅為董卓所攻堅與數十騎馳圍而出堅常著赤幘令親近將祖茂著之卓騎爭逐茂急見一柱在草中因脫幘著柱上卓騎望見圍繞數重後覺是柱乃去晉書曰石季龍掘秦始皇冢取其銅柱鑄以為器又曰太始二年秋營太廟致荊山之材採華山之石鑄銅柱十二塗以黃金鏤以百物綴以明珠曹嘉之晉紀曰諸葛誕以氣勵稱常倚柱讀書雷震其柱誕讀書自若陳書曰初梁侯景焚太極殿及景平至陳武帝議欲營之獨闕一柱至是有樟木大十八圍長四丈五尺流泊後渚因得用之漢武內傳曰上起神屋鑄銅為柱金塗大五圍帝王世紀曰桀作金柱三千列女傳曰紂作銅柱以炭火然之有罪者令抱其柱輒墮炭中妲已觀以為笑漢官典職曰德陽殿柱皆金刻鏤作奇禽萬巧間以丹青翡翠竟柱構以水精一柱三帶韜以赤緹應劭漢官曰開陽門始成未有名夜有一柱飛來樓上後琅邪開陽縣上言南門一柱飛去光武使視因刻記其年月以名門焉神異經曰崑崙山有銅柱其高入天所謂天柱也圍三千里周廻如削下有仙人府與天地同休息男女名曰玉人男即玉男女即玉女無為配疋而仙道成也三輔決錄曰長陵田鳳字季宗為尚書郎儀皃端正入奏事靈帝目送之因題殿柱曰堂堂乎張京兆田郎伏滔北征記曰廣陵吳王濞所都脩大城得柏柱三皆柏心蓋吳王濞門柱也華延雋洛陽記曰太極殿有四金銅柱焦贛易林旅之咸曰金梁鐵柱又曰家人之外曰高樓無柱顛僵不久紂失人主身死牧豎盛弘之荊州記曰巴東城西有一柏柱孤殖大可數圍高三丈餘相傳是公孫述時樓柱乃云斫之血出枯而不朽歷代彌固將恐有物憑焉江陵記曰沔城內有赤湖客舍襄陽大道經城中過元嘉十一年連雨城南門沮壞得土中故柟柱長一丈七尺臨川康王取以為大齋西北柱初時色黑一季後不復黑計此千年列子曰共工觸不周山天柱折晏子春秋曰晏子將死鑿楹納書焉謂妻曰楹記日也子壯而示之燕丹曰荊軻以匕首擿決秦王入銅柱火出淮南子曰柱不可以刺齒蓬不可以持屋世說曰陸抗初拜司空有人往索酒便自起酌梁柱間祝曰當今乏才以爾為柱石之任莫傾人棟梁陸笑曰感卿良箴楚辭天問曰八柱何當東南何虧傅玄正都賦曰錦牆雕柱劉良七舉曰綠柱朱欀青璅壁璫李尤楹銘曰幹強體正雖重不移上下相安高而不危世說夏侯玄讚曰玄嘗倚柱作書霹靂其柱神色無變作書如故俞益期牋曰馬文淵昔立兩銅柱於林邑岸北有遺兵十餘家不反居寧壽靈岸南對銅柱悉姓為馬自為婚姻有二百戶交州以流寓號曰馬流言語飲食尚與華夏同山川移易銅柱今沒在海中正賴此民以識故處日南傳曰三銅松也梁爾雅曰杗廇謂之梁郭璞注曰屋大梁吳越春秋曰夏禹廟以梅木為梁焦貢易林旅之咸曰金梁鐵柱完全不腐漢官典職曰德陽宮畫屋朱梁曹子建七啟曰彤軒紫柱文欀華梁古歌曰本自南山松今為宮殿梁西京賦曰絙雄虹之長梁司馬相如長門賦曰飾文杏以為梁班固西郊賦曰固瑰材而究奇抗應龍之虹梁楚詞曰玄玉之梁曹植詩文欀華梁棟爾雅曰棟謂之桴郭璞注曰屋檼也廣雅曰檼棟也釋名曰穩穩也似桶也或謂之望高可望也或謂之林棟中也屋脊曰甍甍蒙也在上覆蒙屋也易大過卦曰棟橈本末弱也王弼注曰初為本而上為末左傳襄五年曰盧蒲癸刺慶舍王何解其肩猶援廟桶動於甍柱注曰屋棟又曰子產謂子皮曰子於鄭國棟也棟折欀崩僑將壓焉漢武帝故事上起神屋甍附作金鳳軒翥若飛口銜流蘇長十餘丈神仙傳曰左慈共曹公飲飲畢以柸擲屋棟懸著棟動搖似飛鳥淮南子曰郢人買屋棟而與之車轂跪而度之大雖可而長不足也桓子新論曰王公大人則嘉得良師明輔品庶凡民則樂畜仁賢哲士皆國之柱棟而人之羽翼楚辭九歌曰桂棟兮蘭橑新夷楣兮藥房郭璞游仙詩曰雲生梁棟間傅玄棟銘曰國有維輔屋有棟梁室之傾尚可柱也心之傾不可輔也
