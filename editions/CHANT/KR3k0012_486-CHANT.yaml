body:
  text: 人事部一百二十六貧下魏志曰崔林字德清河東武城人也幼時宗族莫知從兄琰異之太祖定冀州召除鄢長貧無車馬單步之官太祖征壺關擢為冀州主簿又曰華歆素清貧祿以賑親戚故家無擔石之儲又曰鄧艾字士載義陽人以口吃不得作幹佐為稻田守草吏同郡吏憐其貧資給甚厚艾初不稍謝每見高山大澤輒窺度指畫軍營處所時人多笑焉吳志曰呂範字子衡汝南人有容觀姿皃邑人劉氏家富女美範求之母嫌欲勿與劉氏曰呂子衡寧當久貧者遂與之婚又曰潘璋字文珪東郡人性嗜酒其家甚貧性好賖貸輒言豪富必相還孫權甚奇之魏將夏侯尚南郡作浮橋渡百里洲璋於上流伐葦作簟欲順風放火簟成尚使引退璋遂為平北將軍晉書阮咸字仲容陳留人時俗七月七日曬衣裳或宗族於庭羅列衣服咸貧無物乃脫犢鼻布裩以竹竿頭挂之人問故荅曰不能免俗宋書曰武帝劉裕少時其家大貧與人傭賃及登帝位耕具猶存并衲布襖並令收掌以示子孫令為規戒又曰江湛家貧約不營財利餉饋盈門一無所受無兼衣餘食嘗為上所召值澣衣稱疾經日衣成然後赴牛餓馭人求草湛良久曰可與飲又曰陶潛嗜酒而家貧不能恒得親舊知其如此或置酒招之造飲輒盡期在必醉既辭而退曾不𠫤情去留環堵蕭然不蔽風曰短褐穿結簞瓢屢空晏如也又曰顏延之屏居里巷不預人間者七載中書令王球名公子延之居常罄貧球輒分財贍之齊書曰王延之清貧居宇穿漏禇淵往候之見其如此具啟明帝帝即勑材官為起三間齋屋又曰虞玩之太祖鎮東府朝野致敬玩之猶躡履造席太祖取履視之曰卿此履已幾載玩之曰著此履已二十年貧竟不辦易太祖善之又曰庾杲字景行新野人初為駕部郎清貧自業食飡唯有韭葅生菜任彥昇嘗戲曰誰謂庾郎貧食鮭常有二十七種菜王儉用為長史安陸侯蕭緬與儉書曰盛府元僚實難其選庾景行泛淥水依芙蓉何其麗也時人以儉府為蓮花池故緬書言之官至御史中丞梁書曰阮孝緒家貧無以僮妾竊鄰人樵以繼火孝緒知之乃不食更令撤屋而炊所居室唯有一林竹樹環繞後魏書曰胡叟居家蓬室草戶唯以酒自適常謂人曰我此生活似勝焦光不治產業飢貧不以為恥養子字螟蛉以自給養每至貴勝之門恒乘一牸牛布囊容三四升飲噉醉飽便盛餘肉餅以付螟蛉見車馬榮華視之蔑如也隋書曰張仁詡州縣以其貧素將加賑恤輒辭不受每閑居從容長歎曰老冉冉而將至恐脩名之不立以如意擊几皆有處所人方之閔子騫原憲又曰虞世基陳滅歸國為通直郎直內省無產業每傭書養親怏怏不平嘗為五言以見意情理悽切世以為工作者莫不吟詠又曰房彥謙居官所得俸祿皆以周恤親友家無餘財車服器用務存素儉自少及長一言一行未嘗涉私雖致屢空怡然自得嘗從容獨笑顧謂其子玄齡曰人皆因祿富我獨以官貧所遺子孫在於清白又曰許康佐擢進士第以家貧母老求為知院官人或輕怪笑而不荅及母亡服除不就侯府之辟君子知其不擇祿養親之志也故名益重又曰李建字杓直家素清貧無舊業與兄造遜於荊南躬耕致養嗜學力文六韜曰武王問太公曰貧富豈有命乎太公曰為之不密密而不富者盜在其室武王曰何謂盜也公曰計之不熟一盜也收種不時二盜也取婦無能三盜也養女太多四盜也棄事就酒五盜也衣服過度六盜也封藏不謹七盜也井竈不利八盜也舉息就禮九盜也無事燃燈十盜也取之安得富哉武王曰善說苑同列女傳曰黔婁妻者魯黔婁先生之妻也先生死曾子與門人往弔之見先生尸在牖下覆以布被手足不盡歛覆頭則足見覆足則頭見曾子曰斜其被則歛矣妻曰斜之有餘不如正之不足且先生以不斜故至於此又曰齊女徐吾者在海上貧婦人與鄰婦人李吾之屬合燭相從績徐吾最貧而燭數不屬李吾謂曰徐吾燭數不屬請無與夜徐吾曰是何言歟今一室之中益一人燭不為益明去一人燭不為益闇何愛東壁餘光貧妾不蒙見愛之恩長為妾不亦可乎莫之能應遂復與夜高士傳曰老萊子楚人耕蒙山之陽以藿葭為牆蓬蒿為室枝木為床蓍艾為席東方朔別傳曰朔書與公孫弘借書曰朔當從甘泉願借外廄之後乘木槿夕死而朝生者士亦不必長貧也李郃別傳曰公居貧而不好治產有稻田三十畝弟宅一區至京學問常以賃書自給為人沉深弘雅有大度郭林宗別傳曰林宗家貧初欲遊學無資就姊夫貸五千錢乃遠至成皋從師受業併日而食衣不蔽形常以蓋幅自鄣出入入則戶前出則掩後邴原別傳曰原字根矩年十一喪父家貧早孤鄰有書舍原過其傍而泣師問曰童子何悲原曰孤者易傷貧者易感夫書者必有其父兄一則願其不孤二則羨其得學心中惻然而為涕零也師亦哀原之言而為泣曰欲書可書耳桓階別傳曰階貧儉文帝嘗幸其第見諸子無褌文帝搏手笑曰長者子無褌乃抱與同乘是日拜二子為郎使黃門齎衣三十囊賜曰卿兒能趍可以褌矣文士傳曰劉梁字曼山一名岑漢宗室子孫少有清才以文學見貴梁貧恒賣書以供衣食汝南先賢行狀曰胡定字元安頴川人至行絕人在喪雉兔遊其庭雪覆其室縣令遣戶曹掾排雪問定定已絕穀妻子皆臥在床令遣以乾糗就遺之定乃受半三輔決錄曰第五頡字子陵倫小子以清正為郡功曹至州從事公府辟舉高第侍御史南頓令皆稱病免洛陽無主人鄉里無田宅寄止靈臺中或十日不炊又曰孫晨字允公家貧不仕居杜城中織箕為業明詩書為郡功曹冬月無被有一束芻暮臥中旦燒之華陽國志曰朱良字雲卿什仿人少受學於蜀郡張寧食豆屑飲水以諷誦同業憐其貧給米肉不受家貧恒以步行為郡功曹世說曰李弘度常歎不被遇殷楊州知其家貧問君能屈志百里不李荅曰北門之歎久已上聞窮猿奔林豈暇擇木遂作鄻縣俗說曰謝僕射太常詣吳領軍坐久吳留客作食日已中方使婢賣狗供客比得食無氣力可語又曰劉真長少時居丹徒家至貧織芒履以養母說苑曰子思居於衛縕袍無表二旬九食西京雜記曰司馬相如初與卓文君至成都文君貧愁憊以所服鷫鸘裘就市人楊昌貰酒遂相與謀還於成都賣酒相如親著犢鼻褌滌器以恥王孫墨子曰天下有義則富無義則貧列子曰管仲之相齊君淫亦淫君奢亦奢志合言從道行國霸其後田氏相齊君盈則己降君斂則己施民皆歸之因有齊國若實名貧偽名富也又曰齊有貧者乞於城市患其亟也眾莫之與遂適田氏之廄從馬豎作役而假食郭中人戲之曰從馬豎而食不以辱乎乞兒曰天下之辱莫過於乞乞猶不辱豈辱馬豎哉又曰齊之國氏大富宋之問氏大貧自宋之齊謀術國氏告之曰吾善為盜始吾為盜也一年而給二年而定三年大攘自此往施及州閭問氏大喜喻其為盜之言而不喻其為盜之道遂踰垣鑿室手目所及亡不探也未及時以贓罪沒其先君之財問氏以國氏之謬己也往而怨之國氏曰嘻若夫為盜之道天有時地有利吾盜天地之利雲雨之澗吾陸盜禽獸水盜龜鱉亡非盜也夫金玉珍寶穀帛財貨人之所藂豈天之所與若盜之而獲罪孰怨哉又曰凡為名者必廉廉斯貧為名者必讓讓斯賤莊子曰原憲處魯居環堵之室蓬戶不完乘木為樞而甕牖上漏下濕匡坐而弦歌子貢乘大馬中紺而表素軒車不容巷往見原憲原憲杖藜而應門子貢曰先生何病也原憲應之曰憲聞無財之謂貧學道不能行之謂病今憲貧也非病也子貢逡巡而退有愧色又曰孔子謂顏淵曰家貧居卑胡不仕乎對曰不願仕回有郭外之田五十畝足以給饘鬻郭內之田五十畝足以為絲麻鼓琴足以自娛所學於夫子者足以自樂也回不願仕孔子愀然變色曰美哉又曰莊周家貧故往貸粟於監河侯曰我將得邑貸子三百金周忿作色曰周昨來有中道而呼者顧視車轍有鮒魚焉問之曰子何為者耶對曰我東海之波臣也君豈有斗升之水而活我哉周曰諾我將南遊吳越之王激西江之水而迎子可乎鮒魚忿然作色曰吾得斗升之水然活耳君乃言此曾不如早索我於枯魚之肆又曰曾子居衛捉衿而肘見納屨而踵決又曰河上有家貧窮恃緯蕭而食者其子沒淵得千金珠謂其子取石來鍜之夫千金之珠必在九重之淵而驪龍之頷下汝得之必遭其睡若龍寤子尚奚珠之有哉呂氏春秋曰世皆以珠玉為寶寶愈多而民愈貧失其所寶也荀卿子曰仁義禮善於人譬若貨財粟米之於家也多有之者富少有之者貧至無有者窮也又曰子夏貧衣若懸絲人曰子何不仕曰諸侯驕我者吾不為臣丈夫之驕我者吾不復見也抱朴子曰洪稟體尫羸兼之多疾貧無車馬不堪徒行荊棘叢於庭宇蒿莠塞乎階霤披榛出門排草入室淮南子曰貧人夏則披褐帶索唅菽飲水以支暑熱冬則羊裘鮮札短褐不掩形而煬竈口焉為裘如鎧甲之札言其破壞也煬炙也向竈口之自溫湯讀高尚之尚也故其為編戶齊民無以異然貧富之相去也猶人君之與僕虜不足以喻之喻猶方也又曰人有盜而富者未必富盜有廉而貧者未必廉也符子曰楚之交子魯之周子齊之狂子三子和與居乎太山之陽處乎環堵之室蓽門不扇蓋茨不翳而弦不輟鶡冠子曰家富疏族藂居貧兄弟離漢揚雄逐貧賦曰楊子遁居離俗獨處左鄰崇山右接曠野鄰垣乞兒終貧且窶禮薄義獘相與群藂惆悵失志呼貧與語汝在六極投棄荒遐好為庸卒刑戮如是匪惟幼稚嬉戲土沙居非近鄰接屋連家恩輕毛羽義薄輕羅進不由人退不受呵久為滯客其意謂何人皆文繡余褐不完人皆稻梁我獨藜飱貧無寶玩何以接歡宗室之宴為樂不槃徒行負賃出處易衣身服百役手足胼胝或耘或耔霑體露肌朋友道絕進宦凌遲厥咎安在職汝為之舍爾遠竄崑崙之顛爾復我隨翰飛戾天舍爾登山巖穴隱藏爾復我隨陟彼高崗舍爾入海汎彼柏舟爾復我隨載沉載浮我行爾動我靜爾休豈無他人從我何求今汝去矣勿復久留貧曰唯唯主人見逐多言益蚩心有所懷願得盡辭昔我乃祖宣其明德克佐帝堯誓為典則土階茅茨匪彫匪飾爰及季世縱其昏忒饕餮食群貪富茍得鄙我先人乃傲乃驕瑤臺瓊室華屋嵩高流酒為池積肉為崤是用鵠逝不踐其朝三省吾身謂予無愆處君之家福祿如山忘我大德思我小怨堪寒能暑少而習焉寒暑不忒等壽神山桀跖不顧貪類不干人皆重蔽子獨露居人皆怵惕子獨無虞言辭既罄色厲目張攝齊而興降階下堂誓將去女適彼首陽孤竹之子與我連行金乃避席辭謝不直請不貳過聞義則服長與爾居終無猒極貧遂不去與我遊息
