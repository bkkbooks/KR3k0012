body:
  text: 皇親部一總序后妃尚書大傳曰古者后夫人將侍君前息燭後舉燭至于房中釋朝服襲燕服然后入御史奏雞鳴于階下奏猶白階陛也然後夫人鳴佩玉于房中告去也然後應門擊柝告闢也應門朝門也辟啟也然後少師奏質明于陛下質正然後夫人入庭立君出朝毛詩曰關睢后妃之德也風之始也所以風天下而正夫婦也關關睢鳩在河之洲窈窕淑女君子好俅又曰葛覃后妃之本也后妃在父母家則志在於女功之事躬儉節用服澣濯之衣尊敬師傅則可以歸安父母化天下以成婦道也又曰卷耳后妃之志也又當輔佐君子求賢審官知臣下之勤勞內有進賢之志而無險詖私謁之心朝夕思念至於憂勤也采采卷耳不盈頃筐嗟我懷人寘彼周行又曰樛木后妃逮下也言能逮下而無嫉妬之心焉南有樛木葛藟虆之樂只君子福履綏之又曰螽斯后妃子孫眾多也言若螽斯不妬忌則子孫眾多也螽斯羽詵詵兮宜爾子孫振振兮又曰桃夭后妃之所致也不妬忌則男女以正婚姻以時國無鰥民也桃之夭夭灼灼其華之子于歸宜其室家又曰兔罝后妃之化也關睢之化行則莫不好德賢人眾多也肅肅兔罝㭬之丁丁赳赳武夫公侯干城又曰芣苢后妃之美也天下和平則婦人樂有子矣采采芣苢薄言采之又曰雞鳴思賢妃也哀公荒淫怠慢故陳賢妃貞女夙夜警戒相成之道焉禮記曰天子之妃曰后鄭玄注曰后之言後也又婚義曰古者天子后立六宮三夫人九嬪二十七世婦八十一御妻以德天下之內治以明章天下之婦順故內和而家理天子立六官三公九卿二十七大夫八十一元士以聽天下之外治以明章天下之男教故外和而國治故曰天子聽男教后聽女順天子理陽道后治陰德天子聽外治后聽內職教順成俗外內和順國家治理此之謂盛德白虎通曰天子之妃謂之后何后者君也天子妃至尊故謂君也明海內之小君也史記曰自古受命帝王及繼體守文之君非獨內德茂也蓋亦有外戚之助焉夏興也以塗山而桀放也用妹喜殷之興也以有娀及有㜪而紂之滅也嬖妲己周之興也以姜嫄及大任大姒而幽王之擒也淫褎姒故易基乾坤詩首關睢書美釐降春秋譏不親迎夫婦之際人道之大倫也漢書曰漢興因秦之稱號帝母稱皇太后祖母稱太皇太后正嫡稱皇后妾皆稱夫人有美人良人八子七子長使少使之號焉至武帝制婕妤娙娥傛華充衣各有爵位而元帝加昭儀之號凡十四等云昭儀位視丞相爵比諸侯王婕好視上卿比列侯娙娥視中二千石比關內侯傛華視真二千石比大上造美人視二千石比少上造八子視千石比中更充衣視千石比左更七子視八百石比右庶長良人視八百石比左庶長長使視六百石比五大夫少使視四百石比公乘五官視三百石順常視二百石無涓共和娛靈保林良使夜者皆視百石上家人子中家人子視有秩斗食云五官以下葬司馬門外陵上司馬門外應劭漢官曰皇后稱椒房詩云椒聊之實蔓衍盈升美其繁興以椒塗室亦取溫煖除惡氣也猶天子赤泥殿上曰丹墀漢舊儀曰皇后婕好乘輦餘皆以茵四人輿以行又曰皇后玉璽文與帝同皇后之璽金螭虎紐又曰皇后太子各食三十縣曰湯沐邑五經要義曰古者后夫人必有女史彤管之法后妃群妾以禮御于君所女史書其日授其環以進退之法生子月娠則以金環退之當御者以銀環進者著于左手既御著于右手左者陽也以當就男故著左手右手陰也既御而復故此女史之職也後漢書曰夏殷以上后妃之制其文略矣周禮王者立后三夫人九嬪二十七世婦八十一御女以備內職焉后正位宮闈同體天王夫人坐論婦禮九嬪掌教四德世婦主喪祭賓客女御序于王之燕寢頒官分務各有典司女史彤管記功書過居有保阿之訓動有環珮之響進賢才以輔佐君子哀窈窕而不淫其色所以能述宣陰化脩成內則閨房肅雍險謁不行也故康王晚朝關睢作諷宣王晏起姜氏請愆及周室東遷禮序凋缺諸侯僣縱軌制無章齊桓有如夫人者六人晉獻升戎女為元妃終於五子作亂家嗣遘屯爰逮戰國風憲偷薄適情任欲顛倒衣裳以至破國亡身不可勝數斯固輕禮弛防先色後德者也秦并天下多自驕大官備七國爵列八品漢興因循其號而婦制莫釐高祖帷薄不脩孝文衽席無辯然而選納尚簡飾玩少華自武元之後世增淫費至乃掖庭三千增級十四妖倖毀政之符外姻亂邦之跡前史載之詳矣及光武明德中興斫琱為璞六宮稱號唯皇后貴人貴人金印紫綬俸不過粟數十斛又置美人宮人采女三等並無爵秩歲時賞賜充給而巳漢法常因八月筭人遣中大夫與掖庭丞及相工於洛陽鄉中閱視良家童女年十三巳上二十巳下姿色端麗合法相者載還後宮擇視可否乃用登御所以明慎娉納詳求淑哲明帝聿遵先旨宮教頗修登建後必先令德內無出閫之言權無私溺之授可謂矯其獘矣向使因設外戚之禁編著甲令改正后妃之制貽厥方來豈不休哉雖御已有度而防閑未篤故孝章以下漸用色授恩隆好合遂志淄蠹自古雖主幼時艱王家多舋必委成冢宰簡求忠賢未有專任婦人斷割重器唯秦芊太后始攝政事故穰侯權重於昭王家富於嬴國漢仍其謬知患莫改東京皇統屢絕權歸女主外立者四帝臨朝者六后莫不定策帷帟委事父兄貪孩童以久其政抑明賢以專其威任重道悠利深禍速身犯霧露於靈臺之上家嬰縲絏於圄犴之下湮滅連踵傾輈繼路而赴蹈不息燋爛為期終於陵夷大運淪亡神寶詩書所歎略同一揆魏志曰魏因漢法母后之號皆如舊制自夫人以下世有增損太祖建國始命王后其下五等有夫人有昭儀有婕妤有華容有美人文帝增貴嬪淑媛脩容順成良人明帝增淑妃昭華脩儀除順成官太和中始復命夫人登其位於淑妃之上自夫人以下爵凡十二等又曰黃初三年詔曰婦人與政亂之本也自今已後群臣不得奏事太后后族之家不得當輔政之任又不得橫授茅土之爵以此詔傳後世若有背違天下共誅之殷融議后父不應拜后曰天性之至父子之道人倫之序君臣之義性至因親故情禮無二義序緣敬故尊嚴無上易曰有父子然後有君臣有君臣然後禮義生焉故資父事君教之至也君不以貴而臣其所尊故子爵不加於父也夫以帝王之尊猶無臣妾父母之義況后從尊於帝而令母執臣妾邪而鄭玄復云公朝典歸寧別有二制尊卑迭用拜謁更牙亦未詳斯議為何所據晉張華女史箴曰茫茫造化二儀始分散氣流形既陶既甄在帝庖犧肇經天人爰始夫婦以及君臣家道以正而王猷有倫婦德尚柔含章貞吉嬺婉淑慎正位居室施衿結褵虔恭中饋肅慎爾儀式瞻清懿樊姬感莊不食鮮禽衛女矯桓耳忘知音志厲義高而二主易心玄熊攀檻馮媛趨進夫豈無畏知死不恡班妾有辟割歡同輦夫豈不懷防微慮遠道罔隆而不殺物無盛而不衰日中則昊月滿則微崇猶塵積替若駭機人咸知飾其容而莫知飾其性性之不飾或愆禮正斧之藻之克念作聖出其言善千里應之茍違斯義則同衾以疑夫出言如微而榮辱由茲勿謂幽昧靈鑒無象勿謂玄漠神聽無響無矜爾榮天道惡盈無恃爾貴隆隆者墜鑒于小星戒彼攸遂比心螽斯則繁爾類歡不可以黷寵不可以專專實生慢愛極則遷致盈必損理有固然美者自美翩以取尤冶容求好君子所讎結恩而絕職此之由故曰翼翼矜矜福所以興靖恭自思榮顯所期女史司箴敢告庶姬後魏書曰魏氏王業之兆雖始於神元至於昭成世崇儉質妃嬙嬪御率多闕焉唯以次第為稱而章平思昭穆惠煬列八帝妃后無聞道武追尊祖妣皆從帝謚為皇后始立中宮餘妾或稱夫人多少無限然皆品次太武始增左右昭儀及貴人椒房後魏書曰後魏故事將立皇后必令手鑄金人以成者為吉不成則不得立也又太武文成保母劬勞之恩並極尊崇之義雖事乖典禮而觀過知仁北史曰周氏率由姬制內職有序文帝創基修衽席以儉約武皇嗣歷節情慾於矯枉宮闈有貫魚之美戚里無私溺之尤可謂得君人之體也宣皇外行其志內逞其欲溪壑難滿採擇無厭恩之所加莫限廝皁榮之所及無隔險詖於是升蘭殿以正位踐椒庭而齊體者非一人焉階房帷而拖青紫緣恩倖而擁玉帛非一族焉雖辛癸之荒淫趙李之傾城曾未足比其髣髴也人厭苛政其事實多文帝之祀忽諸特由於此隋文思革前獘大矯其違唯皇后當室旁無私寵婦官位號未詳備焉開皇二年著內官之式略依周禮省減其數煬帝時后妃嬪御無釐婦職唯端容麗飾陪從醼遊而已帝又參詳典故自製嘉名著之於令人皇后春秋命曆序洛書擿亡辟曰人皇兄弟九人別長九州離艮地精女出為之后離艮卦所推也包犧母河圖曰燧人之世大跡出雷澤華胥履之生伏羲帝系譜曰伏羲十月四日人定生母華胥孝經河圖云伏羲在亥得人定之時神農母春秋元命苞曰女登生神子人面龍顏始為天子孝經鉤命決曰姒感龍生帝嵬魁嵬魁神農名帝王世紀曰炎帝神農母曰佳姒有嬌氏女名登少典妃遊華陽有龍首感之生神農於裳羊山娶奔水氏女曰聽訞音妖生帝臨女子黃帝母河圖曰黃軒母曰地祇之子名附寶之郊野大霓繞北斗樞星耀感附寶生軒轅帝王世紀曰黃帝有熊氏少典之子母曰附寶其先即炎帝母有嬌氏之女少典氏婚及神農之末少典氏又娶附寶見大霓光繞北斗樞星照郊野附寶孕二十五月生黃帝於壽丘干寶云二十五月而生餘同黃帝四妃史記曰黃帝娶西陵氏女是為累祖為黃帝正妃生二子其後皆有天下漢書古今表曰黃帝妃方雷氏生玄囂為青陽妃累祖生昌意妃彤魚氏生夷鼓妃嫫母生蒼林帝王世紀曰黃帝四妃生二十五子元妃西陵氏累祖次妃方雷氏曰女節次曰彤魚氏次曰嫫母列女傳曰黃帝妃曰嫫母於四妃之班居下貌甚丑而最賢心每自退餘同呂氏顓頊母河圖曰搖光之星如虹貫月正白感女樞於幽房之宮生帝顓頊史記曰昌意娶蜀山女昌樸生高陽高陽有聖德黃帝崩高陽立是為顓頊帝王世紀曰昌意生妃謂之女樞金天氏末生顓頊於弱水搜神記同顓頊妃世本曰顓頊娶于勝墳氏宋忠注曰國名之子謂女祿是生老童帝系云勝奔氏餘同帝嚳四妃河圖曰慶都與赤龍合生帝於伊堯世記云從母姓毛詩曰天命玄鳥降而生商宅殷土茫茫春秋元命苞曰周本姜嫄遊閉宮其地扶桑履大跡生后稷春秋合誠圖曰堯母慶都有名於世蓋太常之女生於斗維之野常在三河之東南天大雷電有血流潤大石之中生慶都長大常有黃雲覆蓋之夢食不飢天帝以氣食年二十寄伊長孺家無夫出觀三河之首常若有神隨之有赤龍負圖至署曰赤帝起成天寶即慶都之翼之野奄然陰風雨龍與慶都合有身龍消不見乳堯漢書云堯母十四月生堯帝王世紀搜神記同史記曰嚳娶陳豐生放勳又曰后稷棄母有邰氏女曰姜嫄為帝嚳元妃出野見巨人跡心欣然說欲踐之身重如孕者居期而生子以為不祥棄之隘巷以為神收養之初欲棄之因名棄毛詩生民曰厥初生民時維姜嫄生民本后稷也姜姓也后稷之母配高辛氏帝焉史記曰殷契母曰簡狄有娀氏女為帝嚳次妃三人行浴見玄鳥遺其卵簡狄取而吞之因孕生契世本曰帝嚳卜其四妃四妃之子而皆有天下元妃有邰國之女曰姜嫄是產后稷次妃有娀氏之女簡狄是產契次妃曰陳豐是生帝堯次妃曰娵訾產帝摯帝王世紀曰娵訾班在四人下生摯最長故登帝位堯妃世本曰堯娶散宜氏子謂之女皇宋忠曰是生丹朱帝系漢書同帝王世紀曰女瑩生丹朱漢書亦云女瑩舜母河圖著命曰女登見大虹意感生舜於姚墟史記曰舜母早死瞽瞍更娶後妻生象傲舜二妃尚書曰師錫帝曰有鰥在下曰虞舜岳曰瞽子父頑母嚚象傲克諧以孝烝烝乂不格姦帝曰我其試哉女于時觀厥刑于二女釐降二女于媯汭嬪于虞禮記曰舜葬蒼梧蓋二妃未之從也山海經曰大荒之中有不庭之山帝俊妻娥皇生焉帝系曰舜娶于帝堯謂之曰女偃列女傳曰有虞二妃帝堯之二女也長曰娥皇次曰女英堯舉舜為相攝行王政每事常謀於二女舜既受禪升為天子娥皇為后女英為妃事瞽瞍猶若初焉天子稱二妃聰明貞仁舜陟方死蒼梧二妃死於江湘之間謂之湘君尸子曰堯妻舜以娥媵之以皇女英離騷九歌湘夫人曰帝子降兮北渚目耿耿兮愁予帝子謂堯二女娥皇女英隨舜不反墮舜謂堯於湘水渚因為湘夫人也嫋嫋兮秋風洞庭波兮木葉下夏禹母河圖著命曰脩紀見流星意感生帝文命我禹與周禮含文嘉曰夏姒氏祖以薏苡生孝經鉤命決曰命星貫昂紀夢接生禹父命使之星謂流行世本曰鯀娶華氏曰女志是生高密禹帝系云產文命餘同禹妃尚書咎繇謨禹曰予娶于塗山辛壬癸甲辛日娶妻至于甲日復往治水啟呱呱而泣予弗子塗山女史記同山海經曰太室嵩高成陽西啟母化為石在焉帝王世紀曰禹始納塗山氏女曰女媧合婚於臺桑有白狐九尾之瑞至是為攸女故連山易曰禹娶塗山之子名曰攸女生余是也列女傳曰啟母塗山者夏禹之妃塗山之女也禹娶四日而去治水啟既生呱呱而泣禹三過其門不入呂氏春秋曰禹行功見塗山之女禹未之遇南音南土遇以禮成之塗山之女乃令其妾往候禹于塗山之陽女作歌曰候人實始作南音也帝相后左傳曰伍員曰昔有過澆滅夏后相后緍方娠逃出自竇后緡相妻歸于有仍緡有仍氏女也生少康焉澆求之逃奔有虞虞思妻之以二姚楚辭曰迨少康之未家留有虞之二姚桀妃洛書錄運法孔子曰逢氏抱小女末喜觀帝孔甲悅之以為太子履癸妃國語曰桀伐蒙山而得末嬉紀年曰后桀伐岷山岷山女于桀二人曰琬曰琰桀受二女無子刻其名于苕華之玉苕是琬華是琰而棄其元妃于洛曰末喜氏末喜氏以與伊尹交遂以聞夏帝王世紀曰末喜好聞裂繒之聲而笑桀為發繒裂之以順適其意列女傳曰夏桀末喜者夏傑之妃也傑伐有施有施女以末喜以女妻人曰女殷湯母河圖著命曰扶都見白氣貫月意感生黑帝子湯湯妃帝王世紀曰湯娶有莘為正妃列女傳曰湯妃有莘之女也德高而伊尹為之勝臣佐湯致王訓正後宮嬪御有序咸無嫉妬逆理之人生三子太丁外丙仲壬教誨有成太丁早卒丙壬嗣登太位帝乙妃史記曰帝乙長子曰微子啟賤不得立立少子辛辛母正后嗣帝王世紀曰帝乙二妃生四子長曰微子啟中曰微仲少曰受德辛庶妃生箕子初啟母之生啟及仲尚為妾及立為后乃生紂紂妃史記曰紂伐有蘇有蘇人以妲己女焉紂愛妲己妲己之言是從武王殺之斬以玄戈懸之小白旗世本又載列女傳曰妲已者殷紂之妃也紂伐有蘇有蘇女以妲已美而辯用心邪僻夸比於體戚施於貌紂好酒淫樂不離妲己所譽者貴之所憎者誅之周大王妃毛詩曰古公亶父來朝走馬率西水滸至于岐下爰及姜女聿來胥宇又曰摯仲氏任自彼殷商來嫁于周曰嬪于京乃及王季維德之行摯國任姓史記曰古公太姜生少子季歷季歷娶大妊皆賢婦人生子曰昌列女傳曰太姜者太王之妃有台之女曰賢而有色生太伯仲雍王季化導三子皆成賢德太王有事必諮謀焉王季妃河圖著命曰太妊夢長人感己生文王毛詩曰思齊太妊文王之母思媚周姜京室之婦列女傳曰太妊者王季之妃摯任之女也端懿誠莊維德之行及其有娠也目不視惡色耳不聽淫聲口不放言溲于豕牢而生文王文王生而明聖太妊教以一而知其百卒為周宗君子謂太妊為能胎教文王妃毛詩曰天監在下有命既集文王初載天作之合在洽之陽在渭之涘纘女維莘長子維行纘繼也莘大莘國也長子長女篤生武王箋云大姒厚生聖子武王又曰大姒嗣徽音則百斯男論語泰伯曰武王曰子有亂臣十人馬融曰亂理也十人謂周公旦召公奭公太公望畢公榮虢叔閎天散宜生太顛南宮括其一人謂文母也孔子曰才難不其然乎唐虞之際於斯為盛有婦人焉九人而已列女傳曰大姒者文王之妃莘姒之女也號曰文母武王妃左傳曰子產曰當武王邑姜方娠太叔杜預曰邑姜武王后齊太公之女也懷胎為娠太叔成王之弟叔虞者夢帝謂己余命而子曰虞帝天也虞唐君之名將與之唐屬諸參而蕃育其子孫及生有文在手曰虞遂以命之帝王世紀曰武王納太公之女曰邑姜脩教于內生太子誦宣王后璅語曰元妃獻后生子不恒其月而生后弗敢舉王召群吏問將棄之仲山甫曰天將以是棄周棄之何益且卜筮言何必從乃弗棄列女傳曰周宣姜后者齊侯之女也宣王嘗夜臥而晏起后夫人不出於房姜后既出乃脫簪珥待罪於巷使其傅母通言於王曰妾不才妾之淫心見矣至使君王失禮而晏朝以見君王之樂色而志德也王曰寡人不德實自生過非夫人之罪也幽王襃后毛詩曰白華周人刺幽后也幽王取申女以為后又得襃姒而黜申后故下國化之以妾為妻以孽代宗幽后褒姒也又曰正月刺幽王也燎之方陽寧或滅之赫赫宗周襃姒威之國語曰夏之衰也二龍止於夏庭而曰余襃之二君夏帝卜請其漦而藏之乃吉韋昭曰龍吐沫龍之精氣也龍亡而漦在櫝而藏之三代莫敢發至厲王之末發而觀之漦流于庭不可除王使婦人倮而譟之釐化為玄龜入王後宮童妾既齓而遭之既笄而孕無夫而生子懼而棄之宣王之時童謠曰厭孤箕服實亡周國有夫婦賣是器者見後宮童妾所棄妖子聞其啼哀而收之夫婦亡奔襃襃人有罪請入所棄女是為襃姒幽王愛之生伯服廢申后而以襃姒為后襃姒不好笑幽王欲其笑萬方不笑烽火大鼓譟諸侯悉至至而無寇襃姒乃大笑幽王數為舉烽申侯怒與西夷犬戎攻殺王虜襃姒史記列女傳世紀並同也列女傳曰幽王出入與襃姒同乘弋獵不時以適襃姒意秦始皇太后史記曰呂不韋所幸姬有娠而進之于楚生秦始皇是為太后說苑曰秦始皇太后不謹幸郎嫪毒封為長信侯長信侯生兩子毒專國事驕奢與侍中左右貴人俱博飲酒醉爭言而鬭瞋目大呼曰吾乃秦皇之假父也窶人子何敢與我亢鬭者走行白始皇始皇大怒毒因作亂戰棫陽宮始皇取毒四支車裂之取兩弟囊樸殺之皇太后置之棫陽宮下令曰敢以太后事諫者戮而殺之闕下諫而死者二十七人茅焦乃上謁于王遂以千乘萬騎自迎太后歸咸陽太后喜大置酒待茅焦及飲太后稱曰抗枉令直使敗更成安秦社稷使妾母子復得相會茅君之力也
