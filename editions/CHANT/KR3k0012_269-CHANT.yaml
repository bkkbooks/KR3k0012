body:
  text: 職官部六十六良令長下崔鴻十六國春秋北涼錄曰張譚字元慶武威姑臧人也為和寧令政以德化為本不務威刑民有過者讀孝經及忠臣孝子傳訓導之百姓愛之如父母號曰慈君又後趙錄曰王謨字思賢甕鼻言不清暢尪短無威儀將拜曲陽令石勒疑之問長史張賓賓曰請試可勒從之政教嚴明百城尤最出為都部從事守宰去官者十五人又後趙錄曰申錄字道時為廣昌令白烏巢其庭樹甘露降其廳事後為三公北齊書曰郎茂除衛國令時有繫囚二百茂親自究審數日擇免者百餘人歷年辭訟不詣州省魏州刺史元暉謂曰長史言衛國人不敢申訴者畏明府耳茂曰人猶水也法令為隄防不固必致奔突茍無決溢使君何患哉暉無以應後周書曰辛昂行成都令昂到縣便與諸生祭文翁學堂因共歡宴謂諸生曰子孝臣忠師嚴友信立身之要如斯而已若不事斯語何以成名宜自勉克成令譽昂言切理至諸生等深感悟歸而告其父老曰辛君教誡如此不可違之於是井邑肅然咸從其化陳書曰禇玠山陰縣多豪猾前後令皆以贓汙免高宗患之謂中書舍人蔡景歷曰稽陰大邑久無良宰卿文士之內試思其人景歷進曰禇玠廉儉有幹用未審堪其選不高宗曰甚善卿言與朕意同乃除山陰令隋書曰魏德深遷貴鄉長為政清凈不嚴而治會興遼東之役徵稅百端使人往來責成郡縣于時王綱弛紊吏多贓賄所在徵歛下不堪命唯德深一縣有無相通不竭其力所求皆給百姓不擾稱為大治尋轉館陶長貴鄉吏人聞之皆歔欷流涕語不成聲及將赴任傾城送之號泣之聲道路不絕既至館陶闔境老幼皆如見其父母有猾人員外郎趙君寔與郡丞元寶藏深相交結前後令長未有不受其指麾者自德深至縣君寔屏處於室未嘗輒敢出門逃竄之徒歸來如市貴鄉父老冒涉險難詣闕請留德深有詔許之館陶父老復詣郡相訟以貴鄉文書為詐郡不能決會持節使者韋霽杜整等至兩縣詣使訟之乃斷從貴鄉貴鄉吏人歌呼滿道互相稱慶館陶眾庶合境悲哭因而居住者數百家隋書曰蘇威薦房恭懿授新豐令政為三輔之最上聞而嘉之賜物四百叚恭懿以所得賜分給窮乏未幾復賜米三百石恭懿又以賑貧人上聞而止之時雍州諸縣令每朔朝謁上見恭懿必呼至榻前訪以理人之術又曰房彥謙遷長葛令甚有惠化百姓號為慈父仁壽中上令持節使者巡行縣察長吏能不以彥謙為天下第一超授鄀州司馬吏民號哭相謂曰房明府今去吾屬何用生為其後百姓思之立碑頌德又曰劉曠不知何許人也性謹厚每以誠恕應物開皇初為平鄉令單騎之官人有爭訟者輒丁寧曉以義理不加繩劾自各引咎而去所得俸祿賑施窮乏百姓感其德化更相篤勵曰有君如此何得為非唐書曰李大亮授土門令屬百姓饑荒盜賊侵寇大亮遂賣所乘馬分給貧弱勸以墾田歲因大稔躬捕寇盜所擊輒平時太宗在藩巡撫北境聞而嗟歎下書勞之又曰賈敦頤弟敦實貞觀中為饒陽令政化清靜老幼懷之時敦頤復授瀛州刺史舊制大功以上不復連官朝廷以其兄弟在職俱有能名遂不遷替又曰高宗以尚乘奉御權懷恩為萬年令賞能也時有奉乘安畢羅善於調馬上頗狎之懷恩因奏事遇畢羅在左右言戲無禮懷恩既退執而杖之上知而嗟賞謂侍臣曰懷恩乃能不避強禦真良吏也即日遷擢又曰景雲中長安縣令李朝隱加太中大夫朝隱之宰京縣也政刑畢舉權豪懾憚有內寺伯非禮干忤朝隱叱擊于獄上喜焉故有此命又曰路嗣恭京兆三原人始名劍客歷仕郡縣有能名後授神烏令考績上上而為天下最玄宗以其能嗣魯恭賜改其名又曰韋景駿開元中為肥鄉令縣人有母子相訟者景駿謂之曰吾少孤每見人養親自痛終天無分汝幸在溫清之地何得如此錫類不行令之罪也因垂泣嗚咽仍取孝經與之令習讀於是母子感悟各請改悔遂稱慈孝累轉趙州長史路由肥鄉人吏驚喜竟來犒餞留連經日有童稚數人年甫十餘歲亦在其中景駿謂曰計吾去此時汝輩未生既無舊恩何慇勤之甚也咸對曰比聞長宿傳說縣中廨宇學堂館舍堤橋並是明公遺跡將謂古人不意親得瞻覩不覺欣戀倍於常也其為人所思如此又曰馮伉遷尚書膳部員外郎李抱真卒充弔贈使袍真男遺伉帛數百疋不納又專送至京伉因表奏固請不受屬醴泉闕縣令宰臣進人名上意不可謂宰臣曰前使澤潞不受財帛者此人必有清政可以授之遂改醴泉縣令患百姓多昏猾為著諭蒙十四篇大指明忠孝仁義勸學務農每鄉給一卷俾其傳習又曰元德秀字紫芝河南人也為魯山令先是墮車傷足不任趨拜汝郡守以客禮待之部人為盜吏捕之繫獄會縣界有猛獸為暴盜自陳曰願格殺猛獸以自贖德秀許之胥史曰盜詭計茍免擅放官囚無乃累乎德秀曰吾不欲負約累則吾坐必請不及諸君即破械出之翌日格猛獸而還誠信化人大率此類又曰王敬則為暨陽令時軍荒後縣有一部劫逃入山中頗為人患敬則遣人致意劫帥使出首當申論郭下廟神甚酷烈百姓信之敬則引神為誓必不相負劫帥既出敬則於廟中設酒會於座收縛曰吾啟神若負誓還神十牛今不得違誓即殺十牛解神并斬諸劫百姓悅之晉史曰壽張令趙賡考滿之外量留二年以飛蝗避境故也廣州先賢傳曰黃豪字子微交阯人除外黃令豪約己儉節麤衣蔬食所得俸秩悉賜貧吏一縣稱平益部耆舊傳曰羅衡字仲伯為萬年令誅鋤姦黨縣界肅然民夜不閉門繫牛馬於道旁曰以屬羅公又曰趙珜字孫明少好遊俠行部帶劍過亭長亭長譴之乃歎曰無大志故為豎吏所輕耳於是解劍掛壁曰珜不乘輜車佩紱不復帶劍因之京師詣太學受業治春秋變行厲操名德遂稱除野王令乃解劍帶之官治官清約以身率下烟火不舉常食乾糒又曰閻憲字孟度為綿竹令治以禮讓為首寬猛相濟其聽察甚明簡選吏職甚得其人男子杜成夜於路得遺裝一囊開視有錦二十五疋迄明詣吏曰縣有明君不能慚心故也又曰楊球字仲宣為茂陵令寬和多惠以至誠接下為民所愛比縣連歲蝗災曲折不入茂陵長沙耆舊傳曰祝良字邵卿為洛陽令責戚歛手桴鼓稀鳴時亢旱天子祈雨不得良乃暴身階庭告誠引罪紫雲沓起甘雨乃降陳留風俗傳曰昭帝時蒙人焦貢為小黃令路不拾遺囹圄空虛詔遷貢百姓揮涕守闕求索還貢天子聽增貢之秩千石貢之風化猶存其民好學多貧此其風也海內先賢傳曰公沙穆遷弘農令界有蝗虫食禾稼百姓惶懼穆設壇謝曰百姓有過咎在典掌罪穆之由請以身禱玄雲四集雨下霶霈自日中至晡不知蝗虫所在百姓稱曰神明魯國先賢傳曰孔翊為洛陽令置水於前庭得私書皆投其中一無所發彈理貴戚無所廻避汝南先賢傳曰黃浮字隱公陽安人年二十在於民伍曾為墟里所差次當給亭於是感激學書慨然長歎曰黃浮非鄉里所知因隨人到京師求學歲餘除昌慮長濮陽令同歲子為都市掾犯罪當死一郡盡為之請浮曰周公誅二弟石碏討其子今雖同歲子浮所不能赦也治政清明號為神君又曰陳曄邵陵人也體尚篤烈學通古今除巫令民張遺腹子年十五為父報讎吏捕得之曄愍曰嗟乎今殺遺腹之孤絕人繼嗣是不仁也法復讎之子是不義也不仁不義焉可以為人君長哉遂解印綬逃亡遇赦乃出鍾玩良吏傳曰高玩字伯珍蜀郡人也除曲陽令及徵還送者不使出界布被縕裘猶去時之服朝野歸其清又曰司馬儁字元異補洛陽令豪右挫氣京都號曰臥虎又曰陳登字元龍廣漢人也為東陽長視民如子崔氏家傳曰崔瑗為汲令乃為開溝造稻田薄鹵之地更為沃壤民賴其利長老歌之曰天降神明君錫我慈仁父臨民布德澤恩惠施以序穿溝廣溉灌決渠作甘雨殷氏傳曰殷裒為滎陽令先多淫雨百姓飢饉君乃穿渠入河三十餘里䟽導原隰用致豊年民賴其利號殷溝而頌之鍾離意別傳曰意遷東平瑕丘令男子倪直勇悍有力便弓弩飛射走獸百不脫一桀悖好犯長吏意到官召署捕賊掾勑謂之云令昔嘗破三軍之眾不用尺兵嘗縛暴虎不用尺繩但以良詐為之耳掾之氣勢安若宜慎之因復召直子涉署門下將游徼私出入寺門無所關白收涉鞭之直走之寺門吹氣大言言無上下意氣勑直能為子屈者自縛誡令不則鞭殺其子直果自縛意告曰令前告汝嘗縛暴虎不用尺繩汝自視何如虎自縛耶勑獄械直父子結連其頭對榜愽壯切欲死掾吏陳諫乃貸之由是相率為善所謂上德之政鷹化為鳩暴虎成狸此之謂也荀氏家傳曰荀貌除太原榆次令為政以德人懷之時有鳳凰集其境內晉武帝下詔褒美太始三年卒吏人如喪親戚為之樹碑其序曰仰之如日月敬之如神明愛之如父母樂之如時雨典略曰韓攸字仲潢潁川人為嬴長時民大飢而太守未至攸因發倉賑之吏白言太守垂至軍糧重事可須來到攸言民命懸急令以擅出穀受罪合眼入地不以為恨也後竟不坐吏民蒙濟者數千人會稽典錄曰徐弘字聖通為汝陰令縣俗剛強大姓兼并弘到官誅剪姦桀豪右歛手啇旅路宿道不拾遺童歌之曰徐聖通政無雙平刑罰姦宄空華陽國志曰王長文字德儁元康初試守江源令縣收得盜馬賊及發冢賊長文引見誘慰時適臘晦皆遣歸家獄先有繫囚亦遣之謂曰教化不厚使汝等如此長史之過也蜡節慶祚歸就汝上下善相懽樂過節來還當為汝思他理郡吏惶懼爭請不許尋有赦令無不感恩又曰景毅字文堅梓潼人為高陵令立文學以禮讓化民遷侍御史吏民守闕請之三年不絕搜神記曰徐栩字敬卿吳曲拳人少為獄吏執法詳平為小黃令時屬縣大蝗野無生草至小黃界飛過不集山公啟事曰溫令許奇等並見稱名雖在職各日淺宜顯報大郡以勸天下詔曰案其資歷悉自足為郡守各以在職日淺則宜盡其政績不宜速他轉也博物志曰太子望為灌壇令朞年風不鳴條文王夢見一婦人甚麗當道而哭問其故婦人言曰我東海太山神女嫁為西海婦欲東歸灌壇令當吾道太公有德吾不敢以暴風疾雨過也文王夢覺明日召太公三日果有疾風暴雨去者皆西來也說苑曰晏子治東阿三年景公召而數之曰吾以子為可而使子治東阿今子治而亂子退而自察也寡人將加大誅乎晏子曰臣請改道易行而治東阿三年不治臣請死之景公許之於是明年上計景公迎而賀之曰善矣子之治東阿也晏子對曰前臣之治東阿屬託不行貨賂不至陂池之魚以利貧民當此之時民無飢者而君反以罪今臣之治東阿也屬託行貨賂至事左右陂池之魚入權家民之貧飢者過半君反迎而賀臣臣願乞骸骨景公乃下席而謝曰子強復治之東阿者子之東阿也寡人無復與焉新序曰昔子奇年十八齊君使之治阿既行矣悔之使使追曰未至阿及之還之已至勿還也使者及之而不還君問其故對曰臣見使與共載者白首也夫以老者之智以少者之決必能治阿矣是以不還又曰魯君使宓子賤為單父宰子賤辭去因請借善書者二人其憲法教品魯君與之至單父使書子賤從旁引其肘書醜則怒之欲好則引之書者患之請辭而去歸以告魯君魯君曰子賤苦吾擾之使不得施其善政也乃命有可無得擅徵發單父單父大治故孔子曰君子哉若人魯無君子者斯焉取斯美其德也
