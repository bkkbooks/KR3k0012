body:
  text: 人事部七十五勇二漢書曰韓信數以策干項羽弗用漢王之入蜀信亡楚歸漢未得知名為連敖楚官也坐法當斬其疇十三人皆已斬至信信乃仰視滕公曰上不欲就天下乎而斬壯士滕公奇其言壯其貌釋弗斬與語大悅之漢王以為治粟都尉信謂漢王曰臣嘗事項王請言項王為人也項王噫嗚叱咤千人皆廢然不能任屬賢將匹夫之勇也又曰齊哀王弟章高后封為朱虛侯章年二十有氣力忿劉氏不得職嘗入侍醼飲高后令章為酒吏章自請曰臣將種也請得以軍法行酒高后曰可酒酣章進歌舞已而曰請為太后言耕田高后兒子畜之笑曰顧乃父知田耳若生而王子安知田乎章曰知之太后曰試為我言田意章曰深耕穊種立苗欲䟽非其種者鋤而去之太后嘿然頃之諸呂有一人醉亡酒章追拔劍斬之而還報曰有亡酒一人臣謹行軍法斬之太后大驚已許其軍法毋以罪也因罷酒又曰江都易王非二年立為汝南王吳楚反時非年十五有才氣上書自請擊吳景帝賜非將軍印擊吳吳破徙王江都治故吳國以功賜天子旌旗又曰李廣為上谷太守數與匈奴戰典屬國公孫昆耶為上泣曰李廣才氣天下無雙自負其能數與虜确恐亡之或曰确音角上乃徙廣為上郡太守廣以郎中令將四千騎出右北平博望侯張騫將萬騎與廣俱異道行數百里匈奴將四萬騎圍廣軍士皆恐廣乃使其子敢往馳之敢從數十騎直貫胡騎出其左右而還謂廣曰胡虜易與耳軍士乃安為圜陳外鄉胡急擊矢下如兩漢王兵死者過半漢矢且盡廣乃令持滿毋發而廣身自以大黃射其裨將服虔曰黃聞弩殺數人胡虜益解會暮吏以無人色而廣意氣自若益治軍軍中服其勇也明日復力戰而博望侯軍亦至匈奴乃解去又曰王尊字子贛涿郡人為東平相時王素驕不奉法尊謂王曰天下皆言王勇但負貴安能勇如尊乃勇耳王變色欲格殺之遷東郡太守河水盛溢泛浸瓠子金堤老弱奔走至恐水大決為害尊躬率吏民投沉白馬祀水神河伯尊親執圭璧使巫策祝請以身填金堤因止宿廬居隄上吏民數千萬人爭叩頭救止尊終不肯去及水盛隄壞吏民皆走唯一主簿泣在尊旁尊立不動而水波稍卻迴還吏民嘉壯尊之勇節白三毛朱英等奏其狀詔秩尊中二千石賜黃金二十斤又曰朱雲字游魯人徙平陵少時通輕俠借客報仇身長八尺餘容貌甚壯以勇力聞又曰趙充國字翁孫隴西人後徙金城令居以六郡良家子善騎射補羽林為人沉勇有大略少好將帥之節學兵法通知四夷事武帝時以假司馬從貳師將軍擊匈奴為虜所圍漢軍乏食數日死傷者多充國乃與壯士百餘人潰圍陷陣貳師引軍隨之遂得解身被二十餘創貳師奏狀詔徵充國詣行在所武帝親自視其創嗟嘆之拜為中郎又曰項羽下邳人身長八尺二寸力能扛鼎少學書劍不成季父梁怒羽羽曰書足以記姓名劍一人敵不足學也梁梁奇之教以兵法籍大喜遇秦始皇遊會稽渡浙江梁與籍俱觀籍曰彼可取而代也梁掩其口會七月陳勝起兵九月會稽守通謂梁曰江西皆反此亦天亡秦時也先則制人後則為人所制吾欲發兵使公及桓楚將梁曰桓楚亡人獨籍知其處請召籍受命籍因擊殺數十人府中讋伏梁遂舉郡中得八千人渡江而去至下邳軍已六七萬邯鄲人范曾說梁曰秦滅六國楚最無罪自懷王入秦不返楚人憐之至今若立楚後亡楚必也梁然之梁於是立懷王孫心為楚王是為義帝從民望也都盱眙梁自號武信君師次定陶有驕色宋義諫曰戰勝而驕卒墮者敗今卒墮矣秦兵日益為君危之梁不聽秦將章邯兵至擊楚大破梁戰死義帝以宋義有先見征為上將軍羽為次將范增為末將北救趙至安陽留不進籍謂義曰今秦軍圍鉅鹿疾引兵渡河楚擊其外趙應其內破秦軍必矣義曰不然夫搏牛之䖟不可以破虱蝨蟣今秦攻趙戰勝則兵疲我乘其弊不勝則我引兵鼓行而西必舉秦矣夫擊敵輕銳我不如公坐運籌策公不如我因下令曰猛如虎狠如羊貪如狼強不可令者斬之乃置酒高會留四十六日不進是時天寒士卒飢凍籍曰且國家兵新破王坐不安席掃境內屬將軍國家安危在此一舉今不恤士卒而徇私非社稷之臣也籍乃斬宋義於帳中左右懾伏莫敢枝梧悉發兵渡河沉舟敗釜燒廬舍持三日糧示必死乃大破秦兵虜王離諸將入轅門𣍿行而前莫敢仰視師次鉅鹿會戰夜坑秦卒二十萬入關屠咸陽殺子嬰自立為西楚霸王與漢王相持五年後漢兵大會垓下食盡與漢王戰不利圍之夜聞漢軍作楚歌聲驚曰漢已得楚乎遂與從騎者八百人夜潰圍南馳漢令騎將灌嬰追至東城籍唯單騎自知智窮乃大呼躍自刎而死遂為五將各分一體漢王以魯公葬於穀城諸項賜姓劉又曰樊噲沛人也身長八尺家貧以屠為業後為高祖參乘高祖項羽會鴻門因飲范曾起出為項莊曰汝可以劍舞便因擊沛公殺之莊入為壽曰軍中無以為樂臣請以劍舞因拔劍起舞時項伯亦起舞常以身翼蔽漢王時帳下唯有張良噲居營門外聞事急乃持楯橦入立於帳下項羽目之問誰張良曰漢王參乘樊噲也羽曰壯士賜之巵酒彘肩噲既飲酒咀彘肩羽曰能復飲乎噲曰臣死且不辭何憚巵酒且漢王入關定咸陽曝師于灞上以待大王今大王至而聽小人言與漢王有隙臣恐天下解心疑大王也項羽嘿然噲因目揮漢王佯如廁遂與噲輕騎歸營漢王即皇帝位封噲為武陽侯後從上擊陳豨有功遷左丞相又從上破黥布後上病惡見人群臣莫敢入噲排闥直入大臣等隨之噲曰陛下起沛何其壯也今天下已定又何憊也且陛下病甚不見臣等計會國事獨與一官者處幽室中絕不見臣等陛下豈不思趙高之事乎上笑而起又曰天漢二年貳師李廣利將三萬騎出酒泉擊右賢王於天山召李陵欲使為二師將輜重陵召見武帝叩頭自請曰臣所將屯邊者皆荊楚勇士奇才劍客也願得一隊到蘭于山以分單于兵無令專嚮貳師上曰將惡相屬耶吾發軍多無騎予汝陵對無所事騎願以少擊眾兵五千涉單于庭上壯而許之又曰李敢男禹亦有勇嘗與侍中貴人飲侵陵之莫敢應後愬之於上上召禹使剌虎懸下圈中未至地有詔引出之禹落中以劍斬絕纍欲剌虎上壯之遂無殺心又曰季布弟季心氣蓋關中任俠方數千里士爭為死中尉郅都不敢加少年時惜其名行是時心以勇聞布以諾聞關中范曄後漢書曰牛邯字孺卿狄道人有勇力才氣雄於邊陲又曰蓋延字巨卿漁陽安陽人也身長八尺彎弓三百斤邊俗尚勇力而延以氣聞又曰帝使王霸與馬武攻周建蘇茂救建與武戰霸曰開營後出精騎襲其背茂建前後受敵驚亂敗走霸武各歸營賊後藂挑戰霸堅臥不出方饗士作倡戲茂兩射營中中霸前酒罇霸安坐不動又曰中郎將張耽性勇銳而善撫士卒軍中皆為用命遂繩索相懸上通天山破烏桓悉斬其渠帥還得漢民獲其畜生財物東觀漢記曰劉伯升都部將宗人劉禝數陷陳潰圍勇冠三軍聞更始立怒曰本起兵圖大事者伯升兄弟更始何為者耶更始聞而心忌之以禝為抗威將軍禝不肯拜更始乃收禝將誅之伯升固爭并執伯升即日害之又曰祭遵為征虜將軍將兵北入箕關與弘農厭新柏華蠻賊合戰中弩矢入口洞出舉裒掩口血流裒中眾見遵傷卻退遵呵吏士吏士進戰皆一人擊十大破之又曰馬援曰方今匈奴烏桓尚擾北邊欲自請擊之男兒要當死於邊野以馬革裹尸還墓耳何能臥床上在兒女子手中耶又曰耿秉性勇壯而簡易於事軍行常自被甲在前休止不結營部然遠斥候明要誓有警軍陳立成士卒皆為死又曰永平中竇固擊匈奴班超為假司馬將兵別擊伊吾戰於蒲類海多斬首虜固又遣與從事郭恂俱使西域鄯善王廣禮敬甚備後更踈懈超謂其官屬曰寧覺廣志意薄乎此必有北虜使來也召侍胡詐之曰匈奴使來數日安在侍胡具服超悉會其吏士三十六人酒酣激怒曰不探虎穴不得虎子當今之計獨有因夜以火攻虜使彼不知我多少必大震怖可殄盡鄯善破膽功成事立也眾曰善遂將吏士往奔虜營超手格殺三人斬其使明日乃還告郭恂恂大驚既而色動超知其意舉手曰掾雖不行班超何心獨擅之乎恂乃悅鄯善一國震怖竇固具上超功并求更選彼西域帝壯超詔固曰吏如班超何故不遣而選乎今以超為軍司馬令遂前功固欲益其兵超曰願得本所從三十餘人足以備有虞多益為重煩又曰楊政字子行京兆人嘗過楊虛侯馬武武稱疾見政去對機邊床臥欲令政拜床下政入戶前排武徑上床坐武恨語言不懌政把武手責之曰卿蒙國恩備位蕃臣不思求賢助國而驕天下英俊今日搖者刀入脅左右大驚以為見劫操兵滿側政顏色自若會信陽侯至責數武令為朋友其果勇敢折皆此類也又曰賈復以偏將軍從上拔邯鄲擊青犢大戰至日中賊陣堅不卻傅召復曰吏士飢且朝飯復曰先破之後食耳於是被羽先登所向皆靡諸將咸服其勇上以復敢深入希令遠征而壯其勇節常自從之故復少方面之勳諸將每論功復未曾有言上輒曰賈君之功我自知之又曰張步攻耿弇營合戰飛矢中弇股以偑刀截之左右無知者又曰邳彤為遼東太守有勇力能貫三百斤弓虜每犯塞常為士卒先鋒數破之又曰溫序為護羗校尉行部為隗囂將茍宇所拘劫序素有氣大怒叱宇等曰虜何敢迫脅漢將因以節撾殺數人眾爭欲殺之宇止之曰此義士死節可賜以劍序受劍銜鬚於口顧左右曰無令鬚污又曰朱暉字文季南陽人暉早孤有氣決年十三莽敗天下亂與外氏家屬從田間奔入宛城道遇群賊賊操兵弩欲倮奪婦女衣物昆弟賓客皆惶迫伏地莫敢動暉拔枚劍前曰財物皆可取諸母衣不可得今日朱暉死日也賊見其小壯其志笑曰童子內刀遂舍之謝承後漢書曰彭脩字子陽會稽人年十五時父為郡吏得休與脩歸道為盜所劫脩困迫乃拔佩刀前持盜曰父辱子死盜相謂曰此童子義勇士也不宜逼之遂辭謝而去魏志曰龐德將所領與曹仁共拔宛遂南屯樊討關羽樊下諸將以德兄在漢中頗疑之德常曰我受國恩義在効死親與羽交敵射羽中額時德常乘白馬羽軍謂之白馬將軍又曰曹仁從平荊州以仁行征南將軍留屯江陵拒吳周瑜瑜將數萬人來攻遣部曲將牛金逆與挑戰賊多金眾少遂為所圍仁望金等垂沒左右皆失色仁氣奮怒甚將壯士數十騎直前衝入賊圍等金乃得解餘眾未盡出仁復直還突出金兵賊乃退又曰臧霸字宣高太山人父戒為縣獄掾據法不聽太守所欲殺太守怒收戒詣府送者百餘人霸年十八將客數人於南山中奪之送者莫敢動因與父俱亡命東海由是以勇壯聞又曰曹真字子丹太祖族子也少孤召養與諸子同使與文帝共止嘗獵為虎所逐顧射之應聲而倒太祖壯其鷙勇使將虎騎討虛丘賊拔之封靈壽亭侯又曰劉曄字子楊淮南成德人也鄭寶張多許慶之屬各擁部曲寶㝡驍果才力過人一方所憚曄時年二十餘會太祖遣使詣州有所案問寶從數百人齎牛酒來候使曄令家僮將其眾坐中門外為設酒飯與寶於內宴飲密勒健兒令因行觴而斫寶寶性不甘酒視候甚明觴者不敢發曄因自引取使刀以斫殺寶斬其首以令其軍魏書曰呂布字奉先五原人也董卓為都尉誓為父子遷至中郎將卓每以布自衛布嘗小失於卓卓拔戟擲之布趫捷得免布由是陰怨於卓布後應王允於門剌殺卓卓將李𠐶等阻兵布自南陽投袁術自術又投袁紹紹與布擊張燕布嘗御良馬號赤兔能馳飛壍遂突張燕軍陣一日或至三四皆斬首而出遂破燕軍布乃暴橫紹患之布不自安求還洛陽後復從袁術攻劉備於沛破之曹公自將至下邳擊布降之見曹公曰今日已後天下定矣公曰何以言之布曰明公所患不過布耳今布將騎明公將步天下不足定顧謂劉備曰玄德卿為坐客我為降虜繩縛我急獨不一言乎曹公笑曰縛虎不得不急遂縊殺之又曰張遼字文遠為蕩寇將軍陳簡梅成叛太祖討之簡入潛山中有天柱山遼遂進軍斬簡成首太祖論功曰登山履峻險遼之功也增封假節孫權率十萬眾圍合肥遼募其敢死者八百人登鋒陷陣大破之太祖遣遼屯合肥給遼母車輿兵馬遂詣屯所勑遼母至所在令道從迎觀者榮之江東小兒啼恐之曰遼來無不止矣又曰許褚字仲康長八尺大十圍勇力絕人太祖初見曰此樊噲也即日拜都尉太祖征韓遂馬超等單馬會語褚從行馬超負其力欲前突素聞褚勇乃問太祖曰公有虎侯安在太祖指褚瞋目眄之超不敢動數日會戰大破超等軍遷武衛中郎將武衛之號自此始也又曰典韋形皃魁梧膂力過人好持大雙戟與長刀軍中為之語曰帳下壯士有典君手提雙戟八十斤
