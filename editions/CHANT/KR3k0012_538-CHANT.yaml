body:
  text: 禮儀部十六巡狩易觀卦曰風行地上觀先王以省方觀民設教也尚書舜典曰歲二月東巡狩至于岱宗柴積柴以燎望秩于山川秩者如其秩次之柰也肆覲東后恊時月正日恊和同律度量衡同齊同也脩五禮五玉五等諸侯瑞圭璧也三帛玄纁黃二牲羊鴈一死雉也贄如五器卒乃復五器上五玉禮終則還之三帛以下不還五月南巡狩至於南嶽如岱禮南嶽衡山八月西巡狩至于西嶽如初禮西嶽華山十有一月朔巡狩至于北嶽如初禮朔北方北嶽恒山歸格於藝祖用特藝禰也尚書大傳曰元祀巡狩四嶽八伯壇四奧沉四海封十有二山肇十有二州毛詩清廟曰時邁巡狩告祭柴望也巡狩告祭者天子巡行郡國至方嶽之下而封禪也又曰般巡狩而祀四嶽河海也於皇時周陟其高山墮山喬嶽允猶翕河河山四嶽翕合也箋云合者河自大陸已北敷為尢道祭者合為一周禮下官夏曰職方氏掌天下之圖王將巡狩則戒于四方大戴禮曰十有二歲天子巡狩是故諸侯上不敢侵凌下不敢暴小民禮記王制曰天子五年一巡狩歲二月東巡狩至于岱宗柴而望祀山川覲諸侯問百年者就見之命太師陳詩以觀民風命市納賈以觀民之所好惡志淫好辟命典禮考時月定日同律禮樂制度衣服正之山川神祗有不舉者為不敬不敬者君削以地宗廟有不順者為不孝不孝者君絀以爵變禮易樂者為不從不從者君流革制度衣服者為叛叛者君討有功德於民者加地進律又祭義曰天子巡狩諸侯待於境天子先見百年者問其國君以百年者所在而見八十九十者東行西行者弗敢過欲言政者君就之可也弗敢過者謂道經則見之禮記逸禮曰王者必制巡狩之禮何尊天重民也所以五年一巡狩何五歲再閏天道大備所以至四嶽者盛德之山四方之中能興雲致雨也巡狩者何巡循也狩牧也為天循行牧民也禮記外傳曰溥天之下莫非王土封建諸侯各守天子之地故巡行之夏殷五載一巡狩五年再閏周制十二年一巡狩歲星一周皆在仲月以至嶽下仲者中也正也燔柴告天此因事而告至也天下廣大四方幽隱南面之君多行威福憂民之至故問之巡狩之年四方諸侯先會嶽之下以俟見嶽有湯沐之邑助祭泰山先齊戒以見天子考其制度以齊同書同文車同軌合其章律甲子有善惡以黜陟之左傳莊公曰天子非展義不巡狩注云天子巡狩所以宣布德義又僖下曰晉侯召王以諸侯見且使王狩仲尼曰以臣召君不可以訓故書曰天王狩於河陽言非其地且明德也漢書曰人有告韓信反陳平曰古者天子巡狩偽遊雲夢也又武紀曰朕郊見上帝巡於北見群鶴留止不以羅網靡所獲獻薦於大畤如淳曰是時春也非用羅網時故無所獲光景並見又曰元封五年南巡狩至於盛唐注如淳曰縣名在南郡也望虞舜於九疑應邵曰舜葬蒼梧九疑山名今在零陵營道也自尋陽浮江親射蛟江中獲之舳艫千里薄樅陽而出縣名屬盧江也作盛唐樅陽之歌又曰宣帝尊孝武廟為世宗行巡狩郡國皆立廟又食貨志曰天子始出巡郡國東渡河河東守不意行巡至不辨自殺行西踰隴隴西守以行往卒或曰踰度也卒倉卒從官不得食隴西守自殺於是上北出蕭關從數萬騎馬獵新秦中以勒邊兵而歸後漢書曰光武建武十八年二月西巡狩幸長安三月祠高廟遂有事十一陵歷馮翊界進幸蒲坂祠后土夏四月車駕還宮又曰章帝元和二年二月丙辰東巡狩乙丑帝耕于定陶使使者祠唐堯於咸陽靈臺辛未幸大山柴告岱宗有黃鵠三十從西南來經祠壇上東北過于宮屋翱翔升降進幸奉高又曰章帝巡幸詔曰惟巡狩之制以宣聲教考同遐邇解釋怨結又和紀曰冬十月戍申幸章陵祠舊宅癸丑祠園廟會宗室於宅勞賜作樂宋書禮志曰古者天子巡狩之禮布在方策至秦漢巡幸或以厭望氣之祥或以希神仙之應煩擾之役多非舊典惟後漢諸帝頗有古禮焉魏文帝值三分初創方隅事多皇輿亟動略無寧歲蓋應時之務又非舊章也明帝凡三東巡所過存問高年恤人疾苦或賜穀帛有古巡幸之風焉齊王正始元年巡洛陽縣賜高年力田各有差又曰元嘉四年二月太祖東巡至丹徒告覲園陵三月幸冊徒離宮升京城北顧饗父老舊勳于丹徒行宮加賜衣裳各有差蠲丹徒縣其年租賦宋書文帝行丹徒詔吾生在此城及盧循肆亂害流茲境先帝以桑梓根本寔同休愍復以蒙弱猥預艱難情義繾綣夷險備經遺蹤舊物猶存心目歲月不居逝踰三紀時人故老與運遷落眷惟既往倍深感歎越絕書曰禹巡狩大越見耆老納詩書審銓衡平斗斛孟子曰夏諺曰吾王不遊吾何以休吾王不預吾何以助一遊一豫為諸侯度也又曰晏子對齊景公曰天子適諸侯曰巡狩春省耕而補不足秋省歛而助不給也孔叢子曰古者天子將巡狩必造于祖禰命告群祀及社稷畿內名山大川七日而遍親告用牲史用幣蔡邕獨斷曰上巡狩校獵還公卿已下陳洛陽亭前街上乘輿到公卿以下拜天子東公卿親識顏色然後還宮酈善長注水經曰光武之征秦豊幸舊邑置酒極歡張平子以為真人南巡觀舊里焉三齊略曰堯山在廣固城西七里堯巡狩所登遂以為名山頂立祠祠邊有柏樹枯而復生不知幾代樹也又石上有堯跡于今猶存風俗通曰巡者循也狩者守也道德太平恐遠近不同故必自親行之循功考德黜陟幽明也白虎通曰王者所巡狩者何巡者循也狩者收也道德太平恐遠近不同化幽隱有不得所者故必自親行之謙敬重民之至也何以知太平乃巡狩以武王不巡狩至成王乃巡狩也黃帝太一密推曰師曠曰先知巡狩之年當視太一與天目在四維之歲法為巡狩若不出則遣使者按行風俗太一雖在四維不出也即出知巡狩何方以主人所在處之班固東巡頌曰事大而瑞盛誠非一小臣所任頌述不勝狂簡之情謹上岱宗頌一篇班固南巡頌曰是時聖上運天官之法賀馮列宿而贊元崔駰東巡頌曰登天靈之威輅駕太一之象車躬東作之上務始八政於南行崔駰南巡頌曰建初九年秋穀始登猶斯嘉時舉先王之大禮假于章陵遂南巡楚路臨江川以望衡山顧九疑嘆虞舜之風是時庶績咸熙罔可黜陟崔駰西巡頌曰惟永平三年八月巳丑行幸河東志曰君舉必書是故工歌其詩史歷春秋若夫聲管不發雅頌罔記崔駰北巡頌曰元和三年正月上既畢郊祠之事乃東巡出於河內經青兗之郊迴冀州遂禮北嶽聖澤流浹黎元被德嘉瑞並集乃作頌曰張衡巡狩頌曰初吉帝將狩於岱嶽展誼省方觀風設教丙寅朏率群賓備法駕以祖於東門乙酉觀禮於魯而休齊焉巳丑屆于靈宮是日有鳳雙集于臺馬融東巡頌曰敷六典經八成爕和萬殊總領神明類乎上帝柴乎三辰禋祠乎六宗祗燎乎群神籍田毛詩閔子載芟曰載芟春籍田而祈社稷也周禮天官上甸師曰掌帥其屬而耕耨王籍以時入之以供粢盛又天官下曰內宰上春詔王后帥六宮之人生穜稑之種而獻之於王鄭玄曰古者使后宮藏種以佐王耕事共禘郊也先種後熟曰穜後種先熟曰稑禮記月令曰是月也天子乃以元日祈穀于上帝乃擇元辰天子親載耒耜措之于叄保介之御間帥三公九卿諸侯大夫躬耕帝籍天子三推公五推卿諸侯九推反乃執爵于大寢三公九卿諸侯大夫皆御命曰勞酒又祭義曰昔天子為籍田千畝冕而朱紘躬秉耒耜諸侯為籍百畝冕而青紘躬秉耒耜以事天地山川社稷先公醴酪粢盛於是乎取之敬之至也又祭義曰耕籍所以教諸侯之養也又祭統曰天子親耕於南郊以供粢盛王后蠶於北郊以供冕服天子諸侯非莫耕也王后夫人非莫蠶也身致其誠信而已矣又表記曰天子親耕粢盛秬鬯以事上帝故諸侯勤以輔事於天子注言無事而居位食祿是不義而富且貴禮記外傳曰籍者借也天子耕千畝但三推發耒三垈而止借民力治之所耕之穀藏於神倉以供事天地宗廟神祗人鬼之用也天子以身先天下所以勸下民也以建寅之月而郊北郊即祈穀之祭郊而後耕郊用辛日擇吉日而耕用亥日享先農而後籍田國語曰周宣王即位不籍千畝虢文公諫曰夫民之大事在農上帝之粢盛於是乎出民之蕃庶於是乎生是故稷為大官古者太史順時𧠙出土氣震發先時九日太史告稷曰陽氣俱烝土膏其動稷以告王王即齋宮百官御事王耕一墢漢書文帝詔曰夫農天下之本也其籍田朕親率耕以給宗廟粢盛又曰昭帝始元元年上耕于鉤盾弄田應劭曰時帝年九歲未能親耕帝籍鉤盾官者近署故往試耕為戲弄也續漢書禮儀志曰正月始耕有司請行事訖就耕位天子諸侯百官以次耕晉書禮志曰武帝末有司奏古諸侯耕籍百畝躬執耒耜以奉社稷宗廟勸率農功今諸王臨國宜依之竟不施行又江彪傳曰哀帝即位欲躬自籍田彪以禮廢日久儀注不存中興以來所不行宜停之宋書禮志曰親耕籍晉武帝太始四年詔曰夫民之大事在農是以古之聖王躬耕帝籍以供郊廟之粢盛且以訓化天下近代以來耕籍於數步中空有慕古之名曾無供祀訓農之實而有百官車徒之費今脩千畝之制當與群公卿士躬稼穡之艱難以帥天下又曰元嘉二十一年太祖將親耕而其儀久廢使何承天撰定儀注乃下詔曰國以民為本民以食為天古者從時脈土以訓農功躬耕帝籍敬供粢盛仰瞻前王思遵令典何可量處千畝考上元辰朕當親率百辟致禮郊甸庶幾誠素獎被斯民又曰籍田皇帝冠通天冠朱紘青介幘衣青紗兗侍中陪乘奉車即秉轡又曰車駕至籍田侍中跪奏降車臨壇大司農跪奏先農已享請皇帝親耕太史令讚曰皇帝親耕三推三反於是群臣以次耕王公五等開國諸侯五推五反孤卿大夫七推七反士九推九反籍田令率其屬耕竟畝灑種即耰齊書禮志曰永明三年有司奏來年正月二十五日丁亥可祠先農即日輿駕親耕宋元嘉大明以來並用立春後亥日尚書令王儉以為亥日籍田經記無文太學博士劉蔓議禮孟春之月立春迎春又於是月以元日祈穀又擇元辰躬耕帝籍盧植說禮通辰日曰甲至癸也辰子至亥也郊天陽也故以日籍田陰也以辰陰禮畢後必居其末亥辰之末故記稱元辰注曰吉亥又五行之說木生於亥日祭先農又其義也隋書禮志曰北齊籍於帝城東南千畝每歲正月上辛後吉亥使公卿以一太牢祠先農神農氏於壇上無配饗祭訖親耕唐書曰貞觀三年春太宗親祭先農躬御耒耜籍于千畝之甸初晉氏南遷後魏來自雲朔中原分裂又雜以獯戎代歷周隋此禮久廢而今始行之觀者莫不駭躍於是秘書郎岑文本獻籍田頌以美之又曰乾元中耕籍田至於先農之壇因閱耒耜有雕刻文飾者謂左右曰田器農人執之在於朴素豈貴文飾乎乃命徹之又曰儀鳳二年春上親耕籍田于東郊禮畢作籍田賦以示群臣又曰開元二十二年正月上親耕於洛陽東門外諸儒奏議以為古者耦耕以一撥為推今用牛耕宜以一步為一推及親籍太常告三推禮畢上曰朕憂人知勤勞俯同九推而止自是公卿已下皆過於古五經要義曰天子籍田千畝以供上帝之粢盛常孟春啟蟄即郊之後身率公卿大夫而親耕焉所以先百姓而致孝敬說文曰帝籍千畝者使民如借故謂之籍從耒昔聲應劭漢官儀曰天子東耕之日率三公九卿戴青幘冠青衣載青旂駕蒼龍往出種堂天子升壇公卿耕訖天子耕於壇舉耒三應劭漢官儀曰天子升壇公卿耕訖嗇夫下種凡稱籍田為千畝亦曰帝籍亦曰耕籍亦曰東耕亦曰親耕亦曰王籍六典曰凡籍田所收九穀納于神倉以供粢盛五齊三酒之用若有餘及穰稿供飼犧牲焉又曰兩漢及魏晉並有其禮過江草創未暇至宋始有也黃瓊上書曰先農之禮所宜躬親以迎春和以致時雨論衡曰立春東耕為土象人男女各二秉耒鋤或立土牛象人土中未必而耕也從氣應時示率下也東京賦曰躬三推於天田脩帝籍之千畝繆襲許昌宮賦曰太和六年春上既躬耕帝籍發趾乎千畝以帥先萬國乃命群牧守相述職班教順陽宣化烝黎允示訓德歌功觀事樂業是歲甘露降黃龍見海外有克捷之師方內有豊穰之慶農有餘粟女有餘布遐狄來享殊俗內附穆乎有太平之風潘岳籍田賦曰伊晉之四年皇帝親率群臣籍於千畝之甸禮也於是乃使甸師清畿野廬掃路封人壝宮掌舍設枒青壇蔚其嶽立翠幙黯以雲布結崇基之靈祉啟四塗之廣阼任豫籍田賦曰瞻望圭景咫尺三川緬彼帝籍百有餘年曹植籍田論曰春耕于籍田郎中令侍寡人焉顧而謂之曰營疇萬畝厥田上上經以大陌帶以橫阡奇柳夾路名果被園牢農寔掌是謂公田此寡人之封疆也
