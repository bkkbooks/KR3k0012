body:
  text: 宗親部九孫爾雅曰子之子為孫孫之子為曾孫曾孫之子為玄孫玄孫之子為來孫言有往來之親來孫之子為昆孫昆後也昆孫之子為仍孫仍重也仍孫之子為雲孫言輕遠若浮雲毛詩文王有聲曰貽厥孫謀以燕翼子禮記曲記曰君子抱孫不抱子此言孫可以為王父尸以孫與祖昭穆同也子不可以為王父尸又雜記曰祭稱孝子孝孫喪稱哀子哀孫史記曰張蒼父不滿五尺蒼長八尺蒼子復長八尺餘孫類長六尺後漢書曰龐參字仲連緱氏人拜漢陽太守郡民任棠有奇節隱教參到先候之棠不與言但拔薤一大本水一盆致於屏前自抱孫兒伏于戶下見逸民部又曰虞詡字升卿陳國人孝養祖母縣舉為順孫又曰馮氏兄弟形皆偉壯唯馮勤祖父偃長不滿七尺常恥短陋恐子孫似之乃為子伉娶長妻生勤勤長八尺三寸魏志曰王粲字仲宣山陽人蔡邕見而奇之時邕顯貴車馬填門粲在門邕倒屣迎之粲年幼皃弱短小座皆驚邕曰此王公之孫有異才吾不如也吾家所有書籍當悉與之晉書曰張憑字長宗祖鎮蒼梧太守憑年數歲鎮謂其父曰我不如汝汝有佳兒憑曰阿翁詎宜以子戲父乎又曰李密字令伯父早亡母改醮祖母劉氏躬撫養密奉事以孝謹聞有暇即講學志疲師事譙周周門人方之游夏太始初徵為洗馬密以祖母年老上表自陳曰母孫二人更相為命已具祖門中又曰李胤字伯祖敏為公孫度所迫浮海莫知所終子妻妻生胤遂絕房內以憂卒胤以祖不知所亡設木主以事之由是顯名宋齊語錄曰虞願字士恭會稽人祖為給事中中庭有橘樹冬熟子孫爭取願獨不取祖及家人並異之又曰張元字孝始祖喪明三年元每憂涕讀佛書以求福祐後見藥師經云盲者得視遂請七僧燃燈七日七夜轉藥師經行道每自責曰為孫不孝使祖喪明今以燈施普照法界願祖止見明元求代暗其夜夢一老人以金鎞治其祖目謂之曰勿悲三日之後必差元于夢中喜躍驚覺乃遍告家人居三日祖目果漸見明從此遂差後周書曰薛登字景猷汾陰人早喪父家貧以養祖母暇則覽文籍躬耕以孝見稱列子曰北山愚公者年且九十面山而居懲山北之寒出入之迂也遂率子孫荷檐叩石墾壤箕畚運於北海之尾河曲智叟笑而止之愚公長息曰雖我之死有子在焉子又生孫孫又生子子又生孫孫孫子子無窮匱也而山不加增何苦不平河曲智叟無以應之又曰舜問乎丞曰道可得而有夫道性命非汝有也是天地之委順也子孫非汝有也是天地之委蛻也陳留志曰范喬字伯孫年二歲祖父馨臨終執其手曰恨不見汝成人因以所用硯留與之後家人告喬喬執其硯涕泣孝子傳曰原穀者不知何許人祖年老父母厭患之意欲棄之穀年十五涕泣苦諫父母不從乃作輿舁棄之穀乃隨收輿歸父謂之曰爾焉用此凶具穀云後父老不能更作得是以取之耳父感悟愧懼乃載祖歸侍養剋己自責更成純孝穀為純孫又曰吳郡陸仲元者晉太尉玩曾孫自玩至仲四世為侍郎時人方之全張二族幽明錄曰許遜少孤不識祖墓傾心所感忽見祖語曰我死三十餘年於今得正葬是汝孝悌之至因舉標牓曰可以此下求我於是迎喪葬者曰此墓中當出一侯及小縣長女禮記內則曰女子出門必擁蔽其面夜行以燭無燭則止又曰女子十年不出恒居內也姆教婉娩聽從婉謂言語也言語婉之言媚也媚謂容皃也執麻枲治絲繭織紝組訓學女事以共衣服觀於祭祀納酒漿籩豆葅醢醴相助奠當乃女時而知十有五年而笄二十而嫁凡女拜上右手右陰會也左傳襄五曰初宋芮司徒生女子赤而毛棄諸堤下恭姬之妾取以入長而美名之曰棄穀梁傳曰禮送女父不下堂母不出門父誡之曰謹慎從汝舅之言母誡之曰謹慎從汝姑之言諸母鞶紳誡之曰謹慎從汝父母之言無違宮事史記曰齊太倉令淳于公有罪當刑詔徙繫長安獄公無男有女五人將行罵曰生子不生男緩急非有益小女緹縈隨父至長安上書曰妾父為吏齊中皆稱其廉平今坐法當刑妾願入官沒為婢贖父之罪書奏天子悲憐其意遂為除肉刑漢書曰王章為京兆尹為大將軍王鳳所陷下廷尉獄妻子皆收章小女年十二夜起號哭曰每旦獄上呼囚常至九今八而止我家君素剛烈先死者必我君也及明問之果章死矣東觀漢記曰孝女郁字叔異五歲母不能食郁亦不肯食故字曰異也後漢書曰孔融被誅女年七歲幼弱遂得全寄住佗舍王人有遺肉汁男飲之女曰今日之禍豈得久活何賴肉味乎或有言於曹操收之將殺女謂兄曰若死而有知得見父母豈非志願乃延頸就刑晉書曰周顗母李氏名絡秀汝南人少時在室顗父俊為安東將軍時嘗出獵遇雨至絡秀之家會秀父兄不在絡秀見周俊至與一婢於內宰豬具數十人饌甚精而不聞人聲俊怪使覘之獨見一女甚美因求為妾其父兄不許絡秀曰門戶殄瘁何惜一女若連貴族將來庶有大益父兄遂許之生顗嵩謨而顗等才長絡秀謂之曰我屈節為汝家妾門戶計耳汝不與我家為親吾亦何惜餘年顗等從命由此李氏遂得為方雅之族又曰胡奮字玄威安定人為護軍太始末武帝怠於政事而躭於顏色大採公卿女以為六宮奮女選為貴人唯有一男為南陽王友早亡及聞女為貴人哭曰老奴不死唯有二子男入九地之下女升九天之上嘗謂后父楊駿曰卿恃女更豪耶見前代與帝家婚未有不滅門者見君所措益速禍耳駿曰卿女不在天子家乎奮曰我女為卿作妾耳又曰羊躭妻辛氏字憲英魏侍中辛毗之女也聰明有才鑒初文帝為太子抱毗項曰知我喜否毗以告憲英英曰太子代君主社稷者也代君不可以不慼主國不可以不懼今宜慼而反喜何以能久魏其不昌乎又曰愍懷太子妃太尉王衍之女字惠風太子廢衍請絕婚而歸惠風號泣行路流涕後劉曜陷洛陽以惠風賜其下將妻之惠風拔劍拒曰吾太尉之女太子之妃誓不為逆胡所辱遂害之又曰韋逞母宗氏家世儒學母早喪父躬養之及長授以周官音義謂曰世傳儒業無男可傳汝宜授之勿令絕世又曰吳隱之字處默濮陽人謝石請為將軍主簿隱之將嫁女石知其儉素令移廚帳就其家經營使者至方見賣犬此外蕭然無辦又曰靳康女不知何許人美姿容有志操劉曜誅靳氏訖將納其女為妾女曰陛下既誅其父母焉用妾為妾聞逆人之誅也尚污宮伐樹況其子女乎號泣請死曜慚乃固免之晏子春秋曰齊景公有所愛槐樹令吏守之犯槐者刑傷槐者死有不聞令而犯之者吏收之將加罪犯者之女說晏子曰妾聞明君不為禽獸以殺人今君以樹木之故殺妾父孤妾身恐害明君之政損明君之義晏子早朝而復其言於君公乃令吏罷守槐之役出犯槐之囚華陽國志曰荀崧小女灌幼有奇節崧為襄城太守為杜曾所圍力弱食盡欲投於故吏平南將軍石覽計無所出灌時年十三乃率勇士數十人踰城突圍夜出賊追甚急灌督厲將士且戰且前後得入曾陽山獲免得向覽乞師又為崧書與南中郎將周訪仍結弟兄訪即遣子撫率三千人會石覽俱救崧賊聞兵至散走灌之力也又曰王廣女美姿容性慷慨有丈夫之節廣仕劉聰為西楊州剌史蠻梅芳攻陷楊州廣被殺王年十五芳納之於闇室中擊芳不中芳曰何故反王曰劉畜我誅父賊吾聞之父讎不同天母讎不同地汝逆害人父母復以無禮凌人吾所以不死者欲誅汝爾所恨不得梟汝首於通達以塞大恥乃自殺又曰楊姬生自寒素父坐獄楊渙為尚書郎告歸姬乃邀道扣渙馬訟父罪言詞慷慨涕泣摧感渙愍之語郡縣令為出其父因奇其才為子文方以禮聘之汝南先賢傳曰戴良字叔鸞嫁五女皆布裙無緣蔡琰別傳曰琰邕之女年六歲邕夜中鼓琴絃絕琰曰第二絃邕乃故絕一絃琰曰第四絃邕曰汝偶得中之琰曰昔吳季禮觀樂知國之興亡師曠吹律識南風之不競由此言之何得不知邕奇之異苑曰順陽南鄉楊豊為虎所噬女香年十四手無寸刃直搤虎頭父遂得免子壻爾雅曰子之夫為壻壻之父為姻兩壻相謂為亞儀禮曰壻女子之夫傳曰何以服緦布之也左傳桓公曰祭仲專使其壻雍紏殺之雍姬知之謂其母曰父與夫孰親其母曰人盡夫也父一而已胡可比焉遂告祭仲曰雍氏舍其室而將享子于郊吾惑之以告祭仲殺雍紏尸諸周氏之汪公載以出曰謀及婦人宜其死也又文下曰趙穿晉君之壻也論語曰子謂公治長可妻也雖在縲紲之中非其罪也以其子妻之南容三復白圭孔子以其兄之子妻之史記曰陳餘者大梁人好儒術數遊趙富人公乘氏以其女妻之知餘非庸人漢書曰京房字君明東郡人習易淮陽憲王舅張博從京房受學以女妻房房與相親後漢書曰馬融扶風人為人美辭貌有俊才初京兆摯恂以儒術教授隱于南山不應徵聘從其游學通經籍恂遂奇融才以女妻之晉書曰韓謐字長深母賈氏賈充少女也父壽自德真南陽人美貌充辟為司空掾充讌賓僚女從青璅中窺見壽悅焉感想發於寤寐有婢往壽家說其光彩豔逸壽聞動心令通慇懃壽勁捷過人至夕踰垣而入家人莫知唯充覺女悅暢異於常日時西域有貢香每著人衣一月不歇帝甚貴之唯以賜充女密盜以遺壽僚佐與充宴聞香芬馥自此充意女與壽通乃夜半佯有盜驚起行之唯東北角有狐貍行處充考問女左右知之充遂因妻焉又曰郤鑒使門生求女壻於王導導令自東廂徧觀諸子門生歸謂鑒曰王氏諸少年並佳然聞信至咸自矜待唯一人在東床坦腹食獨若不聞鑒曰此正佳壻也訪之乃義之也宋書曰劉秀十餘歲時與諸兄戲忽有一大蛇來勢甚猛莫不驚怖秀知獨不動眾共異焉東海何承天雅相知器以女妻之齊書曰謝眺為王敬則壻曾告敬則其女常懷刀欲報眺眺不敢相見及當拜吏部謙挹尤甚尚書郎范縝嘲曰卿人才無慚小選俱恨不可刑于寡妻眺有愧色及臨誅歎曰天道其不可昧乎我不殺王公因我而死三十國春秋曰前趙殷州剌史杜廣初為劉景廄卒以馬肥良引為直士侍立通夜末曾休倦景因問之廣流涕申曲有章條景執其手曰吾罪人也久負賢者謂妻曰為女求夫三年不覺廄中有麒麟於是妻之搜神記曰陽公字雍伯洛陽人至情篤孝父母終歿葬無終山陽公常為人補履終不取價無終山上無水陽公乃行車汲水作義漿居三年有一人就陽公飲出一升石子與之使向有平好地有石處種之玉當生其中并得好婦陽公後種其石數年時往看玉子生焉北平徐氏有女甚有名行人多求不許陽公有佚氣試求焉徐氏以為狂乃戲媒人曰雍伯能得白璧一雙來當聽為婚致命雍伯於種石中索得五雙白璧以至徐氏大驚遂以女妻之
