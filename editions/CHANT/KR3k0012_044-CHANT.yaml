body:
  text: 啇洛襄鄧淮蔡諸山白於山水經曰白於山今名女郎山上多松柏下多櫟檀其獸多㸲音昨牛羬羊鳥多白鴞洛水出于其陽東注于涇也又云洛水源出縣北白於山又曰漢水女郎山山上有女郎冢遠望山墳崔嵬狀高及即其所裁有墳形山上直路下出不生草木世人謂之女郎道下有女郎廟及擣衣石言張魯女也啇山盛弘之荊州記曰上洛有啇山班孟堅西都賦所謂啇洛緣其隅高士傳謂地肺即此也晉書曰董景道少好學千里追略不與人交通永平中知天下將亂隱啇洛山衣木皮葉食樹果彈琴歌嘯以自娛至劉曜時徵拜常辭以壽終玄扈山春秋合成圖曰黃帝遊玄扈上洛與大司馬容光左右輔周昌等百二十人臨之有鳳御圖以置帝前玄扈山在上洛縣北一百里望楚山襄陽記曰望楚山有三名一名馬鞍山一名災山宋元嘉中武陵王駿為刺史屢登之鄙其舊名望郢山因改為望楚山後遂龍飛是孝武望之處時人號為鳳嶺高處有三墱即劉弘山簡九日宴賞之所也石梁山襄陽記曰襄州石梁山山起白雲則雨黃雲則風黑雲則蠻多病薤山襄陽記曰襄陽縣薤山山上有竹三年生一笋笋成竹死代謝如春秋焉峴山十道志曰羊祐常與從事鄒潤甫共登峴山垂泣曰自有宇宙便有此山由來賢達勝士登此遠望如我與卿者多矣皆湮滅無聞不可得知念此使人悲傷我百年後魂魄猶當此山也潤甫對曰公德冠四海道嗣前哲令聞令望當與此山俱傳若湛輩乃當如公語耳後以州人思暮遂立羊公廟并碑於此山白馬塞山盛弘之荊州記曰孟達為新城太守登白馬塞山而歎曰劉封申耽據金城千里而不能守豈丈夫也為上渚吟方土今猶傳此聲韻憤激其哀思之音乎遊者云重山疊鄣事亦信然也高車山高士傳曰高車山上有四皓碑及祠皆漢惠帝所立也漢高后使張良詣南山迎四皓之處因名高車山也桐柏山河圖括地象曰桐柏山為地穴上為維星荊州圖副曰桐柏山禹貢所謂導淮自桐柏者也其山則雲峰秀峙林惟椅柏潛潤吐霤伏流數里武當山山記曰武當山區域周廻四五百里中央有一峰名曰參嶺高二十餘里望之秀絕出於雲表清朗之日然後見峰一月之間不見四五輕霄蓋于上白雲帶其前旦必西行夕而東返常謂之朝山蓋以眾山朝揖之主也又南雍州記曰武當山有石門石室相承云尹喜所棲之地又陰君內傳云君字長生入武當山昇仙是也又郭仲產南雍州記曰武當山廣三四百里山高巃峻若博山香爐苕亭峻極干霄出霧學道者常百數相繼不絕若有於此山學者心有隆替輒為百獸所逐山海經曰祭水源伏流三百餘里漢武帝遣殿上將軍戴生之此山採仙藥遂得道不返甄異傳曰歷陽謝允字道通年十五為蘇峻賊軍王免所掠賣屬東陽蔣鳳家嘗行山中見虎檻中狗窮念狗餓以飯飴之人檻方見虎攀木仰看允謂虎曰此檻木為汝施而我幾死其中汝不殺我我放汝乃開檻出虎賊平之後允詣縣別良善烏程令張球不為申理桎梏栲楚允夢見人曰此中易入難出汝有慈心當救拯廻見一少年通身黃衣遙在柵外時進獄中與允言語獄吏知是異人由此不敢枉允蒙理還都西上武當山太尉庾公聞而愍之給其糧資隨到襄陽見道士說吾師戴先生孟盛子非世間人也勑若有西上欲見我者可將來得無是君允因隨去入武當山齋戒三日進見先生乃是昔日所夢人也問允復見黃童不因賜以神藥三丸服之便不飢渴無所思欲先生亦無常處時有祥雲紫氣陰其上或聞芳香之氣徹於山谷太狐山水經注曰大胡山在泚陽北如東三十餘里廣圓五六十里張衡賦曰所謂天封大胡者也胡一作抓南陽圖注曰山有大石如狐石魚山水經注曰石魚山本名立石山高八十餘丈廣十里石色黑而理若雲母開發一重輒有魚形鱗鰭首尾有若刻畫長數寸魚形備足燒之作魚膏腥因以名之苦菜山郡國志曰苦菜山即黃城山也自葉至泚陽南北相毗連旦百里亦曰長城山即長沮桀溺耦耕處下有東流水即子路問津之所尸子云楚狂接輿耕於方城即此山也春秋曰方城以為城是也大洪山水經注曰蔡陽縣東南大洪山山在隋郡之西南竟陵之東北盤基所跨廣圓一百餘里峰曰懸鉤處眾阜之中為諸嶺之秀山下有石門俠鄣層峻岩高皆數百許仞入石門又得鍾乳穴穴上素崖壁立非人跡所及穴中多鍾乳凝膏下垂望齊冰雪微津細液滴瀝不斷幽穴潛遠行者不窮其深而穴內常有風勢火無能以經久故也隕水出于其隕陰初流淺狹遠乃寬廣可以浮舟栰矣時人以隕水所導故亦謂之為隕山赤岸山南兗州記曰爪步山東五里江有赤岸山南臨江中羅君章云赤岸若朝霞即此類也濤水自海入江衝激六七百里至此岸側其勢始衰郭景純江賦云鼓洪濤於赤岸莫耶山壽春圖經曰莫耶山長老傳云古者於此山鑄莫耶劍因為山名史記賈誼吊屈原篇云莫耶為鈍兮鈆刀為銛銛汪云莫耶吳大夫姓也王僧虔吳郡地理志云吳人造劍二陽曰干將陰曰莫耶莫耶其妻名也又淮南記云濛水合流千金塘源出縣西莫耶山是也雲母山壽春圖經曰雲母山一名濠上山在州東南四十里按神仙傳云彭祖服食雲母時人共傳採於此山今或有道者採取不已濠塘山壽春圖經曰濠塘山在縣南六十里有濠水出焉古老所傳緣山泉灌濠成塘故以為名山穴多出鍾乳并有蝙蝠白艾色於穴中倒懸微帶紫色居人或有九月已後二月已前採取服之頗益壽九鬭山壽春圖經曰九鬥山一謂陰陵山江表傳云項羽敗烏江取此山過漢遣灌嬰兵追羽至此一日九戰因名九鬥山今石猶有磨刀礪鏃之跡塗山應劭漢地理志曰禹娶塗山塗山有禹墟太康地記曰塗山古當塗國夏禹所娶也山西南又有禹村蓋禹會諸侯於塗山在禹貢楊州之域今九江當塗縣有禹娶之地今邑界有當塗故城存焉即漢為縣後廢郡國志曰平阿縣有當塗山淮水出于荊山之左當塗之右奔流二山之間而楊濤北注也春秋左氏傳曰哀公七年諸大夫對孟孫曰禹合諸侯於塗山執玉帛者萬國杜預注曰塗山在壽春東北非也余案家語曰吳伐越至會稽獲骨焉其節專車吳子使使問孔子孔子曰丘聞之昔禹致群臣於會稽之山防風氏後至禹殺之其骨專車此為大也蓋丘明親丞聖旨錄為實證矣又案劉向說苑辯物王肅之敘孔子世孫孔龜所出先人書家語並出此事故塗山有會稽之名考校群書及方土之目疑非此矣蓋周穆之所會矣八公山水經注曰壽春縣八公山山無樹木唯重阜耳山上有淮南王劉安廟劉安是漢高帝之孫厲王長之長子也折節下士篤好儒學養方術之徒數千人多神仙祕法鴻寶之道忽有八公皆鬚眉皓素詣門希見門者曰吾王好長生今先生無住衰之術未敢聞八公咸變成童王甚敬之八士並能鍊金化丹從有入無乃與安登山埋金於地白日昇天餘藥在器雞犬舐之者俱得上昇其所昇之處踐石皆陷入焉故山即以八公為目蔡山懷寧圖經曰蔡山出大龜尚書云九江納錫大龜即謂蔡山也玉鏡山懷寧圖曰玉鏡山在縣北萬歲鄉界貞元二年從晥山東面忽然爆裂皎然如玉行路遠見如鏡懸焉其年刺史呂謂聞奏因山改萬歲為玉鏡鄉其山西隅連睆山東面睆山漢書地理志曰睆山在灊山天柱峰相連其山三峰鼎峙疊嶂重巒拒雲概日登涉無由山經云睆山東面有激水冬夏懸流狀如瀑布下有九井井有一石床可容百人其井莫知深淺若天時亢旱則殺一大投其中即降雷雨犬亦流出雞籠山歷陽圖經曰雞籠山在縣西北淮南子云麻湖初陷之時有一老母提雞籠以登此山因化為石今山有石狀如雞籠因為名也梁山歷陽圖經曰梁山在縣南俯臨江水南之博望山宋書云孝武帝大明七年登梁山大閱水軍于中江是日有雀二集于華蓋有司奏請改元為神雀元年帝不許因立雙闕於梁山都梁山盱眙圖經曰都梁山周廻三十里在縣南按廣志云都梁山生淮蘭草一名梁香草故以為名在楚州西南二百九里又阮昇之記云都梁山通鍾離郡廣袤甚遠出桔梗芫花等藥伏滔北征記云有都梁香草因以為名又曰隋大業元年焬帝立宮在都梁東鄰鬱西枕長淮南望岩峰北瞰城郭其中宮殿三重長廊周廻院之西又有七眼泉涌合為一流於東泉上作流盃又於宮西南淮側造釣魚臺臨淮高峰別造四望殿其側又有曲河以安龍舟大舸枕倚淮湄縈帶宮殿至十年為孟讓賊於此置營遂廢斗山盱眙圖經曰斗山周廻二十里在縣西南與都梁山相連枕淮水險峻名曰斗山臺子山盱眙圖經曰臺子山周廻一十里在縣東一里案宋書云元嘉二十七年宋將臧質引兵下造弩臺以射城中因以為名按臺子山在楚州西南是長圍山盱眙圖經曰長圍山周廻四里在縣北七里上置軍營將士一千人守捉至德二年節度使高適置按宋書云元嘉二十七年宋文帝遣臧質拒魏太武帝遂於梁山築長圖城造浮橋絕水路即此山又改為長圍山當在楚州西南一百八十里
