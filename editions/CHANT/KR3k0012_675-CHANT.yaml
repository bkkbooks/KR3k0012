body:
  text: 道部十六理所五岳山名圖曰性命魂神之所屬皆有理所神異經曰崑崙有銅柱其高凌雲所謂天柱圍三千里員曲如削下有仙曹九府治所又曰崑崙三角其一角正北干辰星名曰閬風巔其一角正西名曰玄圃臺其一角正東名曰崑崙宮上有玉樓十二景雲映日朱霞九光西王母之治所真官仙靈之所宗登真隱訣曰上清之境九天之門上皇太皇帝君玉尊集群神於其中以定天下萬民之罪福又曰西華堂在上清王母所居又曰文德宮張叔隱處之又曰八景城在上清玉晨道君所居又曰赤城太元真人所居又曰上清有楊寥殿上皇太帝玉尊集群真於內又曰希琳殿在上清東海八停山上太帝君所居又曰琅玕殿在上清金闕聖君所居也又曰上清之境有丹城紫臺上皇大帝君玉尊集處又曰七靈臺在上清境玉晨道君所居又曰明真臺在上清境東海八停太山上帝所居又曰郍弗臺在上清境方諸東華山上青童君所居又曰上清境有希林臺太帝道君居之東方朔十洲記曰有光碧堂西王母所處也三九素語曰蘭臺宮赤桂玉女處之玉房宮黃帝之女處之十洲記曰滄浪海島上有積石室多石象八石腦石桂英也又曰紫石宮室九老仙都治處也又曰崑崙山一名昆陵山一名玄圃臺上有積石圃大冶井西母宴會之所也又曰崑崙有瓊華室西王母處之又曰玄洲在北海亥地有太玄仙都伯真公所治也又曰聚窟洲在西海中北接崑崙上多真仙宮弟有辟邪天鹿之獸洲上有大樹與楓木相似而芳華聞數里又曰神仙島有紫石宮室九老仙都治處仙官數萬人又曰方丈在東海中三天司命所居處群仙皆往來其上太洞真經曰太素三元山有中黃太一上帝之館又曰玉晨大道君治蘂珠貝闕又曰玉皇道君居青雲之城玉階文陛又曰玉容堂者虛無真人之逸宅亦真氣之明堂又曰玉容堂者太上之明堂也得道符籍之所在又曰萬華宮在小有玉真之天小有先生之所治又曰絕空之宮在玄洲之北九真仙上帝司禁君會仙處也又曰圓華宮黃老之所處又曰太霞之中太虛元君之所處也又曰秀華山太極真人呼曰圓明丹室五靈真君處之又曰青精君登紫空之山化玉室之內又曰崑崙山有金丹流雲之堂上接琁璣之輪下在太室之中西王母所治真仙之女所處也又曰玉室青精君之所處又曰王華三元君處流逸之室又曰太虛有太霞之室合九雲而立宇太虛元君之所處也又曰青華之室青童君乘玉彫之軿御圓珠之氣而入山室又曰大老之室在上清八皇老君乘廣琅車而入又曰流剛山上有暉景之室西王母治所也金根經曰青要帝君在丘玉國黃金紫殿青要帝君所處又曰八闕天人散香其間闕上有金臺九層臺上玉晨鎮君所進居也有金輝紫殿後聖金闕帝君所居處也上清經曰上清南極長生司命君藏瑤臺丹靈宮又在蘭庭雲臺又登絕空之中紫碧玄臺又曰有紫微玄琳殿中央黃老君居之又曰恊晨虛觀𡺿層之室太上大道君閑居處也又曰元始居紫雲之闕碧霞為城又曰有黃房之室一石玉容之堂真晨道君治其中太真科崇玄臺天師朝禮處又曰有燕仙室天師教化處也南真說曰西王母女媚蘭字申林治滄浪山受書為雲林天人又曰北元中玄道君李慶賓女受書為東宮靈昭文人治方丈臺第十三朱館中又曰閬野者閬風之府是也崑崙上有九府是為九宮太極為太宮諸仙皆是九宮之官僚耳至於真人乃九宮之公卿也又曰大方諸宮青君常治處也其上人皆天真高仙太極公卿諸司命所處有服日月芒法雖已得道為真猶故服之霍山赤城亦為司命之府惟太元真人南岳夫人在焉李仲甫在西方韓眾在南方餘三十二司命當皆在東華東華青童為大司命惣統也楊君亦去東軫執事不知當在第幾耳又曰句曲山漢三茅君治其上各乘一白鵠集於處所時人亦有見者山生黃金漢靈帝時詔勑郡縣採句曲之金以充武庫至孫權時又遣宿衛人採金常輸於官又曰方丈西北有陰成大山滄浪西南有陽長大山其山多真仙之所處是陽九百六應數之摽揭也秀華山有玉堂乃五靈真君所處也又曰金華山上有五宮太一所處又曰玄洲之上有景暉之室西母之治所神洲七轉七變經曰西隴濛汜之濱紫微玉堂王母請誥靈素章之處也飛龍隱訣曰北極真公治於北極廣虛之室大洞雌一篇曰三元君在元虛之室元始序曰寒靈丹殿在上清太玄王都道君請真文之處又有玉寶之殿帝尊所處也王君內傳曰紫清太素瓊闕太素三元道君之所治也洞玄經曰太極紫瑤之闕太極玄元真君所治之處自天地已來人之生死簿籍在其中玉清書曰玉戶瓊門九皇上真在其中茅君內傳曰玉清天中有散華臺是四斗七晨道君之所治也列仙傳曰太空瓊臺太平道君處之上清八景飛經曰玉寶臺三元君所登處也三元真一經曰黃𨵗紫戶玄精之室身中三一尊君常栖息之所神祝經曰太上玄堂天人所止本行經曰有三元洞室妙真人所處也道學傳曰茅山鷰口洞女冠錢妙真登壇處也定志經曰天尊靜處玄都元陽七寶紫微宦太一洞真經曰有太極紫房宮天帝寶神所處也玉清經曰玉清宮高真玉皇出入處洞冥記曰宜都崇堂在紫泥之海東方朔宴息之所也洞真經曰大老寢堂八皇老君居處也三元玉檢經曰廣靈之堂太素三元君處之在上清天玄母八門經曰五通仙堂者五通帝君在其內又曰散花玉室三素元君在其內玉清隱書曰瓊琳堂上皇玉帝寢宴處也道學傳曰洞室中有太陰堂龍威丈人所見真文之所處也龜山元籙曰文龜洞室上元君坐之處也葛洪神仙傳曰金華山有石室一所丹溪人皇初平之隱處也清虛真人王君內傳曰委羽山洞周迴萬里名曰大有空明天司馬季主在其中又曰西域玉山洞周廻三千里名太玄惣真天司命君之所處也名山記曰益州西南青城山一名青城郡山形似城其山有崖舍赤壁張天師所治處南連峨嵋山山遙望唯見兩青嶺山如蚕蛾之眉亦有洞天諸靈書所藏不知當是第幾洞天也又曰赤城丹山洞周三百里名曰上清玉平天此山下洞臺方二百里司命君之府也玉京經曰玄都玉京山有七寶城太上無極大道虛皇君之所治也高仙之玄都焉大有經曰太清極玄宮在元景之上太上君居之三元布經曰上清玉景宮佩三元布人在其中道跡經曰秀華玉堂五靈真之所處也又曰洞真堂元始天王太一高聖君說觀身大戒之所也昇玄經曰玉清臺仙聖遊衍之所七星移度經曰帝君上登太極瓊臺上原經曰眉笁仙公住南岳五符經曰皇人在峨嵋山北絕巖之下蒼玉為屋龜山元籙曰紫閣西華玉女居之神祝經曰九合之室太上在其內玉晨明鏡經曰有太玄玉晨金華之室三素元君處之真誥曰大茅山西南有四平山俗呼為方山其下有洞室名曰方臺洞與華陽通號為別宇幽館得道者處之又曰方偶山下有洞室名曰方源館幽人居之又曰包山下有石室銀戶方圓百里又曰有天市壇范丘林受口訣處又曰存方臺仙人蔡天生隱其內又曰清虛宮司馬季主隱處也又曰積石臺朱孺子居之又曰寢靜之室涓子處之又曰蓬萊仙公洛廣休治蓬萊山又曰許玉斧居方山洞為上清仙公又曰羨門今在蒙山大洞黃金之庭受書為中元仙卿又曰廣漢郡綿竹縣東九里有山昔韓眾於上得仙有大石銅為誌治應箕宿又曰廣漢郡新都縣去成都一百五十里山有芝草神藥前有池水中有神魚五頭昔王方平於此與太上相見治應斗宿又曰越雋郡邛都縣有小山大山名蒙治山其高無踰伊尹於此學道上有芝英金液草服之度世治應奎宿又曰雲臺山有桃一樹三年一花五年一實懸絕無底之谷唯趙昇乃自擲取得桃子餘者無能取之治應胃宿又曰天柱山有玉女乘白鶴仙人乘白鹿在雲臺治前有兩碑又曰玉局治在成都南永壽元年正月七日太上乘白鹿張天師乘白鶴來至此坐局腳玉床即名玉局治應鬼宿又曰鍾山在北海子地隔弱水自生神草仙家種芝課計頃畝如稻狀亦有玉石泉上有九源丈人宮主領天下水神又曰扶桑在碧海中大帝宮太真東主所治處也又曰蓬萊山上有九天真宮蓋太真仙人所居玉涼仙山經曰方諸宮青童君治之大丹宮南極元君治之白山宮太素真君治之西城宮惣真王君治之太真科曰有無央宮高上太真居之龜山元籙曰金華宮西華玉女處之上清經曰啟金宮玉寶九霄丈人居之七映宮紫映九霄真人居之玉清元寶宮高上虛皇君處之金靈宮紫虛高上元皇道君居之朱靈宮上皇虛君居之洞雲宮皇上帝君處之金輝宮紫皇君居之靈映宮高亭君居之變化宮玉皇先生居之玉寶宮紫精君居之飛玄宮玄一君居之玄上宮玉皇先生居之變雲宮太帝君居之金門宮皇上帝君居之陽明宮洞真君居之元景宮太素君處之紫瑤宮北玄君居之納靈宮南朱君居之音光宮西華君居之靈金宮中元君居之紫微宮東明君居之鳳生宮高上君居之朗範宮元辰君居之七瑤宮九元君居之鬱森宮大明君居之雲森宮元靈君居之洞霄宮三元君居之返香宮元昭君居之長命宮太極元君居之高虛宮紫元君居之飛玄宮上真老君居之瓊容宮洞景君居之耀瓊宮大陽君居之明真宮景元君居之紫曜宮司命君居之通妙宮天皇君居之金華宮黃房君居之天皇宮太一君居之閑清府九天丈人居之又有丹府三天玉童居之又有重冥府玉寶九霄丈人居之鳳生府九霄真人居之金府靈皇君居之丹神府上皇元道君居之生真府玉虛君居之金魂府萬始先生居之務虛府皇帝君居之紫曜府紫皇君居之神變府中元君居之九合府玉皇先生居之又曰有𡺿層之室玉晨道君處之又曰幃綠之室太元真人處之漢武內傳曰有紫桂宮太上丈人居之
