body:
  text: 人事部一百八喜說文曰喜不言而悅曰喜從壴口壴音知句切易曰上九傾否先否後喜尚書曰股肱喜哉元首起哉毛詩曰風雨如晦鷄鳴不已既見君子云胡不喜又曰我有嘉賓中心喜之又曰菁菁者莪樂育才也君子能長育人才則天下喜樂之也禮記曰樂者音之所由生也其本在人心之感於物是故其喜心感者其聲發以散又曰人喜則斯陶陶鬱陶也陶斯詠詠斯搖又曰何謂人情喜怒哀樂愛惡欲七者弗學而能也又曰武王承命興師誅商萬國咸喜軍發盟津前歌後舞又曰文王朝夕至於大寢之門外問於內豎曰今日安否何如內豎曰今日安太子乃有喜色左傳曰城濮之役晉師三日穀文公猶有憂色左右曰有喜而憂如有憂而喜平公曰得臣猶在憂未艾也困獸猶鬭況國相乎及楚煞子玉子玉得臣公喜而後可知也又曰子產始知然明問為政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀子產喜以語子太叔曰他日吾見蔑之面蔑然明名今吾見其心矣又曰公賜公衍羔裘使獻龍輔於齊侯齊侯喜與之陽穀又曰吳將伐齊越子率其眾以朝焉吳人皆喜唯子胥懼曰是豢吳也吳王聞之使賜之屬鏤以死又曰鄭六卿餞韓宣子於郊宣子曰二三君子請賦起亦以知鄭志子賦野有蔓草宣子曰孺子善哉吾有望矣子抑賦蘀兮宣子喜曰鄭其庶乎公羊傳曰九月丁卯子同生子同者孰謂謂莊公何言乎子同生喜有正也此言喜有正何久無正子也又曰齊高子來盟高子者何齊大夫也何以不稱使我無君也然則何以不名喜之也爾雅曰坎坎僔僔喜也論語曰父母之年不可不知也一則以喜一則以懼又曰上失其道民散久矣如得其情則哀矜而勿喜又曰子曰道不行乘桴浮于海從我者其由也與子路聞之喜尚書中候曰維王既誅崇侯虎諸侯貢萬民咸喜鄭玄曰王文王也貢貢國異物色也尚書大傳曰惟丙午王還師師乃鼓譟師乃慆前歌後舞鄭玄曰慆喜也眾大喜前歌後舞也春秋元命包曰兩口衘土為喜喜得明心喜者為憙憙天心宋均曰心為天王布政之宮萬物須之乃盛所以為喜也今於口間土移一畫之者於字體安也是為兩口土也喜得明明得所喜也春秋繁露曰春之言猶蠢也蠢蠢者喜樂之皃國語曰伯宗朝以喜歸其妻曰子貌有喜何也曰吾言於朝諸大夫皆謂我似陽子知有似也陽子陽處父也對曰陽子華而不實言而無謀是以難及於身子何喜焉戰國策曰呂他亡西周之東周盡輸西周情於東周東周大喜又曰孟嘗君出行至楚楚獻象床郢之登徒直送之不欲往見孟嘗門人公孫戊曰臣郢之登徒直送象床象床之直千金傷此若髮標賣妻息不足以償足下能使僕無行先人有寶劍願獻之戊曰諾入見孟嘗曰五國所以皆致相印於君以國事累君者誠悅君之義慕君之廉今君至楚而受象床所未至國將何以待君孟嘗曰善戊趍而出孟嘗君曰今子舉足高志之楊何也戊曰臣有大喜三重之以寶劍一孟嘗曰何謂也戊曰門下百數莫敢入諫臣入諫一喜諫而聽臣二喜諫而止君之過三喜史記曰趙使蘭相如齎璧西入秦秦王坐章臺見相如相如奉璧秦王大喜傳璧以示美人及左右左右皆呼萬歲又曰孔子由大司寇攝行相事有喜色門人怪之孔子曰非樂其貴然喜下人得吾也又曰龍且與韓信夾濰水陣信乃夜令人為萬餘囊滿盛沙水壅上流引軍半渡擊龍且佯不勝還走龍且果喜曰固知韓信怯也追信渡水信使人決壅囊水大至擊殺龍且又曰慶雲喜氣也又曰呂后謂高祖曰季所居之上常有雲氣故從性常得季高祖心喜又曰邑中人民嘗俱出獵任安為人分麋鹿雉兔眾人皆喜曰無傷也任少卿分則平也漢書曰朱博為左馮翊長陵大姓尚方禁少時盜人妻見斫創著頰博聞以它事召視其面果瘢博辟左右問方禁是何創禁自知情得叩頭服狀博笑曰大丈夫固時有是博欲洒卿恥能自效不方禁且喜且懼對曰必死博因親信以為耳目又曰高祖入關與父老約法三章民大喜也又曰英布間行與隋何俱歸漢王方踞床洗召布入見布大怒悔來欲自死就舍張御食飲從官如漢王居布又大喜又曰韓信投漢蕭何等已數言上不用即亡何聞信亡不及以聞自追之人有言上曰丞相何亡上怒如失左右手居一二日何來謁上且怒且喜又曰呂須嘗以陳平前為高帝謀執樊噲數讒平於呂后曰為丞相不治事日飲醇酒戲婦人平聞日益甚太后聞之私喜又曰翟方進隨父至汝南蔡父奇方進形皃有封侯骨方進既厭為小吏聞蔡父言心喜又曰匈奴單于言願壻漢氏以自親元帝以後宮良家子王嬙字昭君賜單于單于忻喜謝承後漢書曰廬江毛義家貧以孝行稱南陽張奉慕其名往候之坐定而府檄適至以義守令義捧檄而入喜動顏色續漢書曰荀爽嘗謁李膺因為其御既還喜曰今日乃得御李君侯見慕如此東觀漢記曰上謂鮑永曰我攻懷三日兵不下關東畏卿且將故人往即拜永諫大夫至懷謂太守曰足下所以堅不下者未知孰是也今聖主即位天下以定不降何待即開城降上大喜與永對食又曰賈復北與五校戰於真定大破之復傷瘡甚上驚復病尋愈追及上上見大喜又曰梁鴻妻椎髻著布衣操作具而前鴻大喜曰此真梁鴻之妻也字之曰德曜孟光又曰上幸長祠高廟十一陵歷覽宮館舊處會郡縣吏勞賜作樂者有縣三老大言陛下入東都臣望顏色容儀類似先帝臣一驩喜百官嚴設如舊時臣二驩喜見吏賞賜識先帝時事臣三驩喜陛下聽用直諫默然受之臣四驩喜陛下至明懲艾酷吏視人如赤子臣五驩喜進賢用能各得其所臣六驩喜天下太平德合於堯臣七驩喜又曰上以馮異為孟津將軍屯河上擊走朱鮪追至雒陽城門環城一匝乃還上聞之大喜諸將皆賀又曰郭伋字細侯河南人在并州素結恩德行部到西河美稷育童兒數百各騎竹馬於道次迎拜伋問曰兒曹何自遠來對曰聞使君到喜故來奉迎魏志曰潁川戲志才籌畫士也太祖甚器之早卒太祖與荀彧書曰自志才亡後莫可與計事者汝潁固多奇士誰可以繼之彧薦郭嘉召見論天下事太祖曰使孤成大業者必此人也嘉出亦喜曰真吾主矣表為司空軍謀吳志曰曹公破走魯肅先還權大喜肅將入閤拜權起禮之因謂曰孤特鞌下馬相迎足以顯卿未肅趍進曰未也眾人聞之無不愕然就坐徐舉鞭曰願至尊威德加乎四海總括九州克成帝業更以安車蒲輪徵肅始當顯耳權拊掌歡笑王隱晉書曰石珩問袁甫壽春以西何以常旱東何以恒水甫曰東是吳人新附積憂成陰西是中國新平吳珍寶美人皆入志盈心滿長歡故旱孫嚴宋書曰劉宣字萬壽彭城人也素曉天文知晉室當復又夢九土服之覺而喜曰九者桓也桓既吞矣吾當復本土乎齊書曰謝超宗詣東府門自通其日風慘太祖謂四座曰此客至使人不衣自暖矣超宗既坐飲酒數巡辭氣橫出太祖對之甚歡崔鴻後秦錄曰秦末祅星見于東井尹緯知秦將滅心喜踴躍向天再拜唐書陸贄從幸山南道途艱險扈從不及與帝相失一夕不至上喻軍士曰得贄者賞千金翌日贄謁見上喜形於顏色其寵待如此周書曰人有五氣喜氣內畜雖欲隱之陽喜必見喜色油然以出又曰師曠見太子晉曰願聞一言王子應之曰吾聞太師將來吾心甚喜既已見子喜而又懼吾年甚少見子而懾盡忘吾度韓詩外傳曰曾子曰吾嘗仕為吏祿不過鍾釜尚猶欣欣而喜者非以為多也樂其逮親也張勃吳錄曰長沙桓王在歷陽遣書呼周瑜瑜將兵五百人舡糧器仗星夜馳赴王大喜執瑜手曰卿至諧矣又曰吳王之女有所怨王者遂自殺王痛之葬於昌門外文石為槨高墳深池珍玩人馬以徇葬國人哀之湛盧之劍夜飛去楚楚昭王覺劍在其床首昭王召風胡子而問焉對曰越獻劍於吳名曰湛盧人君有過則去適他國聞吳王葬女奢侈以人從死其必是也昭王大喜胡沖吳曆曰太史慈字子義於神亭戰敗為孫策所執策素聞其名即解縛諮問進取之術慈曰州郡新破士卒離心若儻分散難復合藂欲出宣恩安集恐不合尊旨策長跪荅曰誠本心所望也明日日中望君來還諸將皆疑策曰太史子義青州名士以信義為先終不欺策明日大會諸將預設酒食立竿視中而慈至策大懽喜常與參論軍事司馬彪九州春秋曰曹公與袁紹相距遣人招張繡繡欲歸紹賈詡勸繡歸曹公繡曰紹強又曹公與吾有讎不可詡曰此乃所以宜從之也夫有霸王之志者固將釋大怨明德於四海也繡從之歸曹公曹公見之喜執詡手曰使我信重於天下者君也檀道鸞續晉陽秋曰初符堅南寇京師大震謝玄入問討禦之方謝安夷然無懼色玄等既破賊有驛書至安方對客圍棊看書既畢攝放床上了無喜色還棊如故客問之安徐荅云小兒輩遂已破賊客罷還內過戶安心喜甚不覺履齒之折其矯情鎮物如此也太公六韜曰因其所喜以順其志又曰文王拘姜里求天下珍怪而獻之紂貪其幣大喜殺牛而賜之曹操別傳曰拜操典軍都尉還譙沛士卒共叛襲擊之操得脫身亡走竄平河亭長舍稱曹濟南處士臥養足創八九日謂亭長曰曹濟南雖敗存亡未可知公幸能以車牛相送往還四五日吾厚報公亭長乃以車牛送操未至譙數十里騎求操者多操開帷示之皆大喜始寤是操雷換別傳曰張華以煥為豊城令得雙寶劍乃送一劍與華自留一劍華得劍甚喜曰此干將也邴原別傳曰魏太祖為司空辟原署東閤祭酒太祖北伐三郡克單于還太祖曰孤返鄴守諸君必將來迎其不來者獨邴祭酒耳言訖未久而原先至門下通謁太祖大喜攬履而起遠出迎原曰賢者誠難則度孤謂君將不能來而遠自屈誠副飢虛之心零陵先賢傳曰劉巴入益益州牧劉璋見而驚喜每有事咨問璋遣法正迎劉備巴諫曰備雄人入必有為不可內也既入巴復諫曰若使備討張魯是放虎於山林璋不聽巴閉門稱疾備攻成都令軍中曰其有害巴者誅及三族及得巴甚喜列異記曰華子魚為諸生寄宿入門外主人婦夜生頃兩吏詣門便辟易卻相謂曰公在此躊躕良久一吏曰籍當定柰何住乃前向子魚拜相將入出並行共語曰當與幾歲一人曰當三歲子魚後故往視之兒果已死子魚喜曰我固當公後果為太尉西京雜記曰樊將軍噲問陸賈曰自古人君皆云受命於天云有瑞應豈有是乎賈應之曰有之夫目瞤得酒食火花得錢財幹鵲噪則行人至蜘蛛集而百事喜也晉朝雜事曰明帝入幘不正元帝自為正之明帝大喜莊子曰凡交近則靡以信遠則必忠之言以言必或傳之失傳兩喜兩怒之方天下之難者也夫兩喜必多溢美之言兩怒必多溢惡之言凡溢之類妄則信之列子曰鄭人有薪於野者遇駭鹿從而擊之斃恐人之見也遽藏諸隍中覆之以蕉不勝其喜俄而遺其所藏之處遂以為夢焉又曰堯微服遊於康衢聞兒童謠曰立我蒸民莫匪爾極不識不知順帝之則堯喜曰疇教爾為此言童兒曰我聞之大夫問大夫曰古詩也孟子曰魯欲使樂正子為政孟子聞之喜而不寐公孫丑曰奚為喜曰其為人也好善又曰子路人告其過則喜抱朴子曰人主有道國無粗政則四七從度五星不逆日不蝕朔月不薄望霜不夏繁雷不冬洩嘉瑞並臻災厲寢滅此則天喜也呂氏春秋曰湯聞伊尹使人請之有侁氏有侁氏不可伊尹亦欲歸湯湯於是請取婦為婚有侁氏喜以伊尹為媵送女顧子曰夫哀樂喜怒愛憎欲懼人之情也當其哀也則欲哭泣擗踴遇其樂也則欲懽笑鼓舞公孫尼子曰君子怒則自說以和喜則收之以正楚辭曰師望在肆昌何識敼刀楊聲后乃喜王逸曰師謂太公也昌文王也后亦文王也曹植禮上表曰臣得去幽屏之城獲覲百官之美此一喜也背茅茨之陋登閶闔之闥此二喜也必以有靦之容瞻見穆穆之顏此三喜也將以檮杌之質稟受崇聖之訓此四喜也
