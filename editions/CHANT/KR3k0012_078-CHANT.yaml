body:
  text: 皇王部二敘皇王下呂氏春秋曰始生之者天也養成之者人也能養天之所主而勿纓之謂之天子帝者天下之所適也王者天下之所往也又曰天地大矣生而弗成子而弗有高曰天大地大生育民人已不為不以為已子成遂萬物不以為已有也萬物皆被其澤得其利而莫知其所由始由從也萬物皆蒙天地之澤而得其利時父孝無徭役之勞擊壤於里陌自以為然故曰莫知其所從始者也此三皇五帝之德也又曰黃帝曰芒芒昧昧因天之威與元同氣高誘曰芒芒昧昧廣大貌也因天之威無不敗也與之同氣無不協也故曰同氣賢於同義同義賢於同力同力賢於同居帝者同氣同元氣也王者同義同仁義也霸者同力同武力也又曰軍必有將所以壹之也高誘曰將主也國必有君所以壹之也天下必有天子所以壹之也天子必執一所以愽之也又曰五帝固相興矣廢勝者用事又曰蚩尤作兵也利其栻高誘曰蚩尤少昊氏之末九黎之君名也始作亂伐無罪殺無辜善用兵為無道非始造之也故非作兵者也未有蚩尤之時民固剝林木以戰矣勝者為長長率也長猶不足以治之故立君君又不足以治之故立天子又曰人固不能自知人主獨甚存亡安危勿求於外高誘曰言皆在已務在自知堯有欲諫之鼓欲諫者擊其鼓舜有誹謗之木書其過失於表木也湯有司過之士司主也過闕也武王有戒慎之鞀欲戒者搖其鞀猶恐不能自知尚恐不能自知過也今賢非堯舜湯武而有揜蔽之道奚由自知哉又曰五帝先道而後德故德莫盛焉三王先德而後事故功莫大焉五伯先事而後兵五伯昆吾大彭豕韋齊桓晉文是也故兵莫強焉又曰凡為天下治國家必務本而後末所謂本者非耕稼種植之謂也務本莫貴於孝人主尊孝則名章榮下服聽天下譽人臣孝則事君忠處官廉臨難死士民孝則耕耘疾守戰固不敗北三考三皇五帝之本務而萬事之紀也夫執一術而百善至百邪去天下從之者唯孝乎又曰古先聖王之所以導其民者先務於農民農非徒為地利也貴其志也民農則樸樸則易用易用則邊境安主位尊民農則重重則少私義少私義則公法立力專一民農則其產復其產復則重徙重徙則死其處而無二慮又曰昔先聖王之治天下也必先公公則天下平矣嘗試觀於上志古記也有天下者眾矣其得之必以公其失之必以偏凡主之立也生於公故鴻範曰無偏無黨又曰昔舜欲稽古而不成既足以成帝矣禹欲帝而不成既足以成王矣湯欲繼舜而不成既足以服田荒矣武王欲及湯而不成既足以為諸侯長矣董仲舒荅問曰三皇三才也五帝五常也三王三明也五霸五嶽也淮南子曰至德之世謂太古三皇之時其瞑乎混淆之域而徙倚乎瀾漫之宇提挈天地委萬物以鴻濛為景性而浡楊乎無畛崖之際是故聖人呼吸陰陽之氣而群生莫不喁喁然仰其德和順止當此之時莫不領理決離隱愍而自成渾渾若若純樸未散滂薄為一而萬物大優是故雖有明知無所用之又曰古者至德之世賈便其肆農樂其業大夫安其職而處士循其道當此之時風雨不毀折草木不夭死九鼎重王者之德休明則鼎重姦回淫亂則鼎輕也珠玉潤澤洛出丹書河出綠圖故許由方面堯使方面求子列藥得之善卷披衣得達其道何則世主有欲利天下之心是以人得自樂其間四子之材非能盡大蓋今之世也然莫能與之同光者遇唐虞之時也又曰人主之居如日月之明也天下之所同側目而視傾耳而聽延頸舉踵而望也是故非淡漠無以明德非寧靜無以致遠非寬大無以兼覆非慈厚無以懷眾非平正無以制斷又曰古者有鍪而綣領以王天下者矣古者蓋三皇以前也鍪頭著兜鍪帽言未知制冠也綣領皮衣屈而袂之如今胡家韋襲文攝以為領也一說鍪放鬆也綣繞頸而已皆無飾也其德生而不辱刑措不用也予而不奪予其則也不奪無所徵求於民也天下不非其服同懷其德非猶譏也懷歸當此之時陰陽和平風雨時節萬物蕃息政不虐生無天折烏鵲之巢可俯而探也禽獸可羇而從也猶牽也豈必褒衣搏帶句襟委貌章甫哉又曰國之所以存者道德也道德施行民說其化故國存也家之所以亡者理塞也理道堯無百戶之郭舜無植錐之地以有天下禹無十人之眾湯無七里之分以王諸侯文王處歧周之間地方不過百里而立為天子者有王道也又曰聖人有貴尺之璧而重寸之陰時難得而易失也禹之趨時也履遺而弗納冠掛而不顧非爭其先也而爭其得時也是故聖人守清道而抱雌節清和靜也雌柔弱也因循應變常後而不先柔弱以靜舒安以定舒詳也攻大磨堅莫能與之爭攻大磨堅喻難也又曰帝者體太一王者法陰陽霸者則四時君者用六律體太一者牢籠天地彈壓山川含吐陰陽中曳四時紀綱八極經緯六合覆露照導普汜而無私普天汜眾也無私愛憎言皆公也翾飛蠕動莫不仰德而生法陰陽者承天地之和形萬殊之體含氣化物以成垀類垀形也盈縮卷舒淪於不測盈長縮短卷屈舒散入於不可測盡之源也終始虛滿轉於無源則四時者春生夏長秋收冬藏取與有節出入有時開闔張翕不失其序喜怒剛柔不離其理用六律者生之與殺賞之與罰與之與奪非此無道也明四時六律之君非用此上事其餘無他道也又曰古之立帝王者非以奉養其欲也聖人之踐位者非以供樂其身也為天下強掩弱眾暴寡詐欺愚勇侵怯懷知而不相教積財而不以相分故立天子以齊一之又曰五帝三王之法籍風俗一世之跡也譬若土龍芻狗之始成文以青黃飾以綺繡纏以朱絲及其已用則壤土草芥而已誰貴之哉又曰神農無制令而人從唐虞有制令而無刑罰夏后氏不負言殷人誓周人盟又曰聖人在上位者賞罰不施而天下賓服日計之不足而歲計之有餘譬若百梅足為百人酸一梅不足為一人酸也又曰使堯度舜則可使桀度堯是猶以升量石也又曰周氣者帝同義者王同力者亡於三者無一雖於世俱滅亡又曰秦古二皇許慎曰庖犧神農得於中央德覆天地而和陰陽節四時調五行虹蜺不出賊星不行五星逆行謂之賊星也又曰人主者以天下之目視以天下之耳聽以天下之智慮以天下之力動是故號令能下究而臣情得上聞百官脩通群臣輻湊喜不以賞賜怒不以罪誅是故威立而不廢聰明光而不蔽法令察而不苛耳目達而不闇善否之情陳於前而無所逆楊子法言曰五常者帝王之筆舌寧有書不由筆言不由舌哉桓譚新論曰儒者或曰圖王不成其弊可以霸此言未是也傳曰孔氏門人五尺童子不言五伯事者惡其達仁義而尚權詐也又曰夫上古稱三皇五帝而次有三王五伯此皆天下君之冠首也故言三皇以道治而五帝用德化三王由仁義五伯以權智其說之曰無制令刑罰謂之皇有制令而無刑罰謂之帝賞善誅惡諸侯朝事謂之王興兵約盟以信義矯世謂之伯也論衡曰古之帝王建鴻德者須鴻筆之臣褒頌紀德也潛夫論曰天作道皇作極臣作輔人作基又曰王之政普覆兼愛吉凶禍福與人共之應劭風俗通曰春秋運斗樞曰皇天不言四時行焉百物生焉垂拱無為謹言而民不違道德玄泊有皇天故稱曰皇皇者中也光也合元履中開陰布綱上合皇極其施光明指天畫地神化潛通煌煌盛美不可勝量又曰大傳說遂人為遂皇伏戲為戲皇神農為農皇也遂人以火紀火陽也陽尊故託遂皇於天伏戲以人事紀故託戲皇以人蓋天非人不固人非天不成也神農悉地力植穀故託農皇於地天地人之道備而三五之運興矣又曰五帝易傳禮記春秋國語太史公記黃帝顓頊帝譽帝堯帝舜是五帝也謹案易尚書大傳天立五帝以為相四時施生法度明察春夏慶賞秋冬刑罰帝者任德設刑以則像之言其能行大道舉措審諦也黃帝者先也厚也中和之色德施四季與地同功故先王以別之地顓者專也頊者信也愨也言其承文易之以質使天下遵化皆貴貞愨也嚳者考也成也言其考明法度醇美嚳然若酒之芬香也堯者高也言其隆興煥炳最高明也舜者准也循也言其准行道以循堯緒也又曰禮號謚記說夏禹殷湯周武王是三王也禹者輔也輔續舜後庶績洪茂自堯以上王者子孫據國而起功德浸盛故造美謚舜禹本以白衣砥行顯名升為天子雖復制謚不如名著故國名焉湯者禳也言其禳除不軌改亳為啇成就王道天下熾昌文武皆以其長夫擅國之謂王能制殺生之威之謂王王者往也天下所歸往也又曰易稱天先春而後秋地先生而後凋日月先光而後幽是以王者則之亦先教而後刑三皇結繩五帝畫像三王肉刑霸世黜巧此言步驟稍有優劣也傅子曰庖犧神農順民之性育之者也黃帝除民之害救之者也舜治天下拱無為者以咎繇既舉而不仁遠也禹治洪水冠桂不顧者不以下憂累其上也湯去三面之網歸之者四十國文王葬城隅之枯骨天下懷其仁所惠者小所感者大仁心先之也又曰不使不仁加乎天下用武勝殘而百姓以濟此仁形於撥亂黃帝是也時有萬物必世而後仁此著於治平堯舜是也周生烈子曰居堯舜之位而不行唐虞之政者猶反衣狐白步牽騄耳黃石公三略曰夫三皇無言化流四海故天下無所歸功帝者體天則地有言有令而天下太平君臣讓功四海行焉王者制人道德降心服志設矩備襄有察察之政甲兵之事備而無爭戰血刃之用天下太平君無疑於主國定主安臣以義退亦能美而無害又曰任德者縱任義者橫縱成者王橫成者霸王兵法天霸兵法地天者德不可量地者威不可圖不量不圖者萬物之父母也袁子正論曰堯舜之人比屋可封非盡善也猶在防之水非不流也桀紂之人比屋可誅非盡惡也猶在壑之水非不停也班彪王命論曰帝王之作必有明聖顯懿之德豐功厚利積累之業然後精誠通于神明流澤加於生民故能為鬼神福所向天下所歸往未見運世無本功德不紀而能倔起在斯立者也傅彥林王令敘曰帝王之起必有天下瑞應自然之符明統顯祚豐懿之業加以茂德成功賢智之助而後居世臨民為神所保祐永世所尊崇未見運敘無紀次勳澤不加於民而可力爭覬覦神器者也阮籍通老論曰三皇依道五帝仗德三皇施仁五霸行義強國任智蓋優劣之異薄厚之降也韓子曰明主制其臣下者二柄而已矣二柄者刑德也殺戮之謂刑慶賞之謂德也崔寔政論曰自堯舜之帝湯武之王皆賴明哲之佐愽物之臣故皋陶陳謨而唐虞以興伊箕作訓殷周以隆及繼體之君欲立中興之功者曷嘗不賴賢哲之謀乎鄧子曰堯置敢諫之鼓舜立誹謗之木湯有司直之人武有貳慎之銘此四君者聖人也而由此之勤至於栗陸殺東里子宿沙君戮箕文桀誅龍逢紂刳比干此四誅者亂君故其疾賢若仇是以賢愚之相較若百丈之谿萬仞之山若九地之下與重天之顛墨子曰古者民生未有刑政之時選擇天下之賢可者立以為天子又曰凡國之萬民皆尚同乎天子而不敢下比天子之所是必亦是之天子之所非必亦非之去而不善言學天子之善言去而不善行學天子之善行天子者固天下之仁人也舉天下萬民以法天子夫天下何說而不治哉又曰古者聖王制為衣服之法曰冬服紺緅之衣輕且煖夏服絺綌之服輕且清則止諸加費不加於民利者聖王弗為又曰天子者天下之窮貴也天下之窮富故富且貴者當天意而不可不順順天意者兼相愛交相利必得賞反天意者別相惡交相賊必得罰尸子曰人之欲見毛廧西施美其面也夫黃帝堯舜湯武美者非其面也人之欲觀焉其行也所欲聞焉其言也而言之與行皆在詩書矣又曰夫堯舜所起至治也湯武所起至亂也問其成功孰治則堯舜治問其孰難則湯武難又曰孔子曰商汝知君之君乎子夏曰魚失水則死水失魚猶為水也孔子曰商知之矣又曰治天下有四術一曰忠愛二曰無私三曰用賢四曰度量通財足用賢則多功無私百知之宗也忠愛父母之行也又曰堯舜黑禹脛不生毛文王至日仄不暇飲食故富有天下貴為天子矣
