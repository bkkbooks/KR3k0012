body:
  text: 州郡部三敘州釋名曰州注也郡國所注仰說文曰州疇也疇其土而生之河圖括地象曰長城者為州又曰崑崙東南地方五千里名神州中有五山帝王居之又曰天有九道地有九州天有九部八紀地有九州八柱河圖曰九州殊題水泉剛柔各異青徐角羽集寬舒遟人聲緩其泉鹹以酸荊楊角徵會氣漂輕人聲急其泉酸以苦梁州商徵接剛勇漂人聲塞其泉苦以辛兗豫宮徵合平靜有慮人聲端其泉甘以苦雍冀合商羽端駃烈人聲捷其泉辛以鹹尚書舜典曰肇十有二州范甯注曰禹平水土置九州舜為冀州廣大分為并州燕置幽洲分齊為營州始為十二州又湯誓曰以有九有之師爰革夏政九有者九州也尚書大傳曰古之處師八家而為鄰三鄰而為朋三朋而為里五里而為邑十邑而為都十都而為師州有十師焉鄭玄注曰州凡四十三萬二千家此蓋虞夏之數也毛詩商頌曰帝命式于九圍九圍州也詩含神務曰邶鄘衛王鄭此五國者千里之城處州之中名曰地軸周禮地官大司徒曰五黨為州使之相賙鄭玄注曰州二千五百家賙其困乏五州為鄉使之相賓又春官下保章氏曰以星土辨九州之地所封之域皆有分星以觀妖祥又夏官下職方曰職方氏掌天下之圖以掌天下之地辨其邦國都鄙天下之圖如今司空典地圖乃辨九州之圖使同貫利貫事禮記王制曰凡四海之內九州州方千里春秋說題辭曰州之言殊也合同類異其界也爾雅曰兩河間曰冀州自東河至西河河南曰豫州自河南至漢也河西曰雍州自河西至黑水漢南曰荊州自漢南至衡山之陽江南曰楊州自江至南海也濟河間曰兗州自河東至濟也濟東曰徐州自濟東至海也燕曰幽州自易水至北狄齊曰營州自岱東至海孝經援神契曰計校九州之別土壤山陵大川澤所注萊沛所生鳥獸所聚九百十一萬八千二十四頃言民少不足以盡地華利沛水傍漸洳不可耕者磽確不墾者其餘隄封千五百萬二千頃論語摘輔象曰兗豫屬上台九州繫於三台荊楊屬下級下級上之下等一台各有上下梁雍屬中上中台之上冀州屬錯錯雜也屬中台之下下台之上青州屬下上下台之上徐州屬下下下台之下也五經異義曰地有九州足以承天史記曰鄒衍云中國於天下乃八十一分之一耳中國名赤縣州內自有九州禹之序九州是也不得為州數中國外如赤縣州者有九乃謂九州也於是有裨海環之民禽獸莫能相通者如一區中者乃為一州如此者九乃有大嬴海環其外天地之際焉後漢書曰獻帝建安十八年復禹貢九州獻帝春秋曰時省幽并州以其郡國併於冀州省司隸校尉及涼州郡國以併於雍州自交州荊益州於是有兗豫青州荊揚冀益雍九數雖同禹貢旡益州有梁州然梁益亦一地也又曰順帝時李固上書曰夫天下之大譬一人之身本朝者心腹也州郡者四支也心腹病則四支不舉故臣之憂在心腹之疾非四支之患應劭漢官儀曰孝武皇帝南平百越北攘戎狄置交阯朔方之州復徐梁之地改雍曰梁改梁曰益凡十三州所以交朔獨不稱州明示帝王未必相襲始開北方遂交南方為子孫基阯也漢官解詁曰冀趙常山胡廣注曰經曰冀州既載居趙國今治常山兗衛濟河經曰濟河惟兗州衛國今治山陽青齊海岱經曰海岱惟青州居齊國今治焉徐魯淮沂經曰海岱及淮惟徐州又曰淮沂其又居魯國今居豫州而治東海楊吳彭蠡經曰淮海惟揚州又曰彭蠡既瀦居吳國今治九江荊楚衡陽經曰荊及衡陽惟荊州居楚國今治武陵益庸岷梁經曰華陽黑水惟梁州漢改梁州為益州合治廣漢涼邠黑水經曰黑水西河惟雍州居邠國漢改雍州為邠州國右扶鳳拘邑縣屬司隸部不復屬州今治漢陽雍別朔方漢別雍州之地置朔方刺史交阯南越漢平南越之地置交阯刺史列諸州治蒼梧幽燕朝鮮經無幽州而周官有焉蓋冀之別也居燕國今廣陽是并代晉翟經無并州而周官有蓋州之別也居燕國今廣陽是淮南子曰天地之間九州八柱又曰九州大統方千里九州之外乃有八寅亦千里又曰何謂九州東南神州曰晨土東南晨焉後稷所經緯也故曰神土也正南次州曰沃土沃盛也五月建午稼穡長故曰沃土西南戎州曰滔土滔大也七月建申萬物壯大故曰滔土正西弇州曰并土并猶成八月建酉百穀成熟故曰并也正中冀州曰中土冀大也為四方內主故曰中土西北括州曰肥土正北濟州曰成土未聞東北薄州曰隱土薄猶平也陰氣所隱伏也故曰隱土正東楊州曰申土申復也陰氣盡所隱伏也東北陽氣復起東方故曰申土輿地志曰周成王時周公作輔定官分職改禹九州以徐梁合之於青分冀州之域為幽并二州風俗通曰周禮五黨為州州疇也州有長使之相周足也物理論曰九州變易交錯不同禹貢有梁州無并州周官有并州爾雅有營州無青州漢興武帝開拓三方立十三州通并梁之數而增交益焉太一式占周公城名錄曰黃帝受命風后受圖割地布九州置十二圖張衡靈憲曰崑崙東南有赤縣之州風雨有時寒暑有節茍非此土南則多暑北則多寒東則多陰故聖王不處焉敘郡釋名曰郡群也人所群聚也秦改諸侯置郡縣隨其所在山川土形而立其名史記曰秦始皇廢五等之爵立郡縣之官以公國為大以侯伯為小大郡曰守小郡曰都漢書地理志曰漢孝平時凡郡國一百三十二侯國二百四十一又曰六郡者金城隴西天水安定北地上郡也續漢書郡國志曰光武中興命併省郡國明章和至于順帝凡郡國一百五仍為十三郡又曰光武以官多役煩乃併省郡國十凡縣道侯國四百餘所後為十三州部司隸理河南今洛陽豫州理亳州兗州理昌邑今兗州金鄉縣徐州理剡今泗州下邳縣青州理臨淄今青州臨淄縣涼州理隴今秦州隴城縣并州理晉陽今太原冀州理鄗音郝都今趙州高邑縣幽州理薊今幽州薊縣楊州理歷陽今和州縣荊州理漢壽今朗州武陵縣交州理廣信今梧州蒼梧縣至于末加置郡國百有五凡縣道侯國千一百八十東有樂浪郡西有燉煌郡南有日南郡北有鴈門郡西南有永昌郡廣袤如前漢通典曰秦始皇帝併天下分置三十六郡三十六者三川河東南陽南郡九江鄣郡會稽頴川碭郡泗水薛郡瑯琊齊郡上谷漢陽右北平遼西遼東代郡鉅廢邯鄲上黨太原雲中九原雁門上郡隴西北地漢中巴郡蜀郡黔中長沙凡三十五輿內史為三十六郡郡各領縣縣萬戶已上為令減萬戶為長平百越又置西郡閩中南海桂林象海合四十郡置一守一丞兩尉以典之監侍御史掌監諸郡漢有天下王侯郡國並置焉迄于平帝戶口繁息凡新置郡國六十七與秦三十六合一百三改周雍州曰涼州復置夏之徐梁二州而改梁曰益北置朔方南有交阯別置二刺史凡十三郡涼益荊楊青豫兗徐幽并冀十一州交阯朔方二刺史合十三部刺史十三人各掌一州又曰後漢魏武輔政吳蜀三方鼎跱疆場不定建安中置郡十二新興樂平西平新平略陽陰平帶方譙郡樂陵章武南陽襄陵是也又省上郡朔方五原雲中定襄漁陽廬江等七郡文帝受禪又置七郡朝歌陽平弋陽魏興新成美陽安豐也明帝置六郡平公孫度得遼西遼東帶方玄菟樂浪又置上庸一郡少帝又置平陽一郡并得漢舊郡國五十四平蜀得二十郡劉備初置郡九巴東巴西梓潼江陽文山漢嘉朱提雲南涪陵并得漢舊巴郡廣漢犍為祥拘越嶲益州漢中永昌南安武都也晉太康平吳之後天下一統平吳得州四交廣荊楊也郡四十三凡州十六太康地記曰司冀兗豫楊徐青幽并雍涼梁益交廣荊也晉自湯陰敗後羌羯交侵至乎劉曜陷洛陽於是司冀雍涼青并兗豫幽平秦營十二州並淪沒矣後魏孝文帝都洛陽開拓土宇明帝熙平元年凡州四十六鎮十二都國二百八十九矣天平年凡州六十八至武定年凡州一百一十一郡五百一十九周明帝受魏禪至大象二年凡州二百一十一隋文帝受周禪至開皇三年罷天下郡其縣但隸州而已九年平陳已後四海一家大業三年罷州為郡四年大簿凡郡國一百八十三唐貞觀十三年大簿凡州府三百五十八敘之為十道應劭漢官儀曰秦用李斯議分天下為三十六郡凡郡或以列國陳魯齊吳是也或以舊邑長沙丹陽是也或以山大山山陽是也或以川源西河河東是也或以所出金城城下有金酒泉泉味如酒豫章章樹生庭中鴈門鴈之所育是也或以號令禹合諸侯大計東冶之山會稽是也京兆絕高曰京京大也十億曰兆欲令帝都殷盈也左輔右弼蕃翊承風也張掖始開垂張臂掖也黃恭十四州記曰秦兼天下始皇二十六年廢五等之爵立郡縣之官以公國為大侯伯為小大郡曰守小郡曰都尉都尉之言君改公侯之封而言君者君至尊也言郡守專權君臣之禮更宗也今之郡字君在其左邑在其右君為元首邑以載民故取名於君而謂之郡也風俗通曰周制天子方千里分為百縣縣有四郡故左氏傳曰上大夫受縣下大夫受郡敘縣釋名曰縣懸也懸係於郡也說文曰縣邑也從口已聲周書曰郊田方六百里因四土為方千里分以百縣縣有四郡郡有鄙鄙不過百室以便野事周禮地官遂人曰五家為鄰五鄰為里四里為鄻五鄻為鄙五鄙為縣五縣為遂禮記王制曰天子之縣內方百里之國九七十里之國二十有一五十里之國六十有三凡九十三國縣內夏時天子所居州界也黃恭十四州記曰縣萬戶以上為令則子國也千戶為長男國也今人呼縣為百里子男本方百里也故言今之百里古之諸侯又曰縣者弦也言施繩用法狀如絃絃聲近縣故以取名風俗通曰周禮百里曰同所以獎王室協風俗總名縣縣玄也言當玄靜平徭役邑尚書大傳曰五里為邑周禮地官曰四井為邑易訟卦曰逋其邑人三百戶周書曰周公乃作大邑于成周左傳曰凡邑有宗廟先君之主曰都無曰邑穀梁傳曰齊人取子糺殺之十室之邑可以隱死以千乘之魯而不能存子糺公為病矣論語曰十室之邑必有忠信如丘者焉不如丘之好學也史記曰黃帝邑于涿鹿之阿遷徙無常處以兵師為營衛張華詩曰駕言遊東邑東邑紛穰穰婚姻及良時嫁娶避當梁鄉釋名曰鄉向也眾所向也周禮地官司徒曰五州為鄉使之相賓論語曰孔子於鄉黨恂恂如也似不能言者又曰玄鄉難與言童子見門人惑後漢書曰張湛為左馮翊告歸平陵望寺門而步主簿進白明府位尊德重不宜自輕湛曰禮下公門軾路馬孔子於鄉黨恂恂如也父母之國所宜盡禮何謂輕哉唐書曰張道源并州祁人也年十五父死居喪以孝行稱縣令郭湛改其所居為復禮鄉至孝里老子曰以鄉觀鄉莊子曰遊於無何有之鄉鄭玄別傳曰國相孔文舉教高密縣曰公者人德之正號不必三事大夫也今鄭君鄉宜曰鄭公鄉黃恭交廣記曰秦兼天下改附庸為鄉鄉則有族今嗇夫是也鄉之言境言其在人境域內非天王所置故言鄉零陵先賢傳曰鄭產泉陵人為白土嗇夫漢末產子一歲輒出口錢民多不舉產乃勑民勿得殺子口錢自當代出因名其鄉曰更生鄉萬歲曆曰黃武六年正月獲彭綺是歲由拳西鄉有產兒墮便語云天方明河欲清鼎腳折金乃生於是因曰語兒鄉郡國志曰秭歸縣屈原鄉里南岸曰歸鄉西岸曰秭歸屈原既放蹔歸鄉里因曰歸鄉縣屈原姊女須聞原還亦來喻之因曰姊歸也王子年拾遺錄曰張掖郡郅奇字君珍居喪盡禮以淚灑石石即成痕著枯木枯草在冬必茂浸地成鹹俗謂之鹹鄉漢帝嘉其孝異表銘其邑改曰孝行之鄉歲時使立廟祭祀黨周禮地官司徒曰四閭為族使之相葬五族為黨使之相助釋名曰五百家為黨黨長也一聚所尊長也六韜曰友之友謂之朋朋之朋謂之黨黨之黨謂之群閭周禮地官司徒曰五家為比使之相保五比為閭使之相受說文曰閭里門也周禮五比為閭閭侶也二十五家相群侶也尚書曰武王克商軾商容閭范曄後漢書曰袁忠子秘為郡門下議生黃巾起秘從太守趙謙擊之軍敗秘與功曹封觀等七人以身扞刃皆死於陣謙以侍免詔復秘等閭號曰七賢閭戰國策曰王孫假年十五齊閔王之出走天王之處其母曰汝朝出而晚來吾倚閭而望汝又曰齊桓公宮中七市女閭七百管仲故為三歸之家以掩桓公之罪呂氏春秋曰魏文侯過叚干木之閭而軾之里周禮地官遂人曰五家為鄰五鄰為里風俗通曰里者止也五十家共居止也禮記曲禮上曰里有殯不巷歌春秋傳潛潭巴曰里社鳴此里有聖人論語曰仁為美又曰東里子產潤色之論語撰考讖曰里名勝母曾子廉襟漢書曰禮古經者出魯淹中里又曰盧綰與高祖同里閈又曰宣帝舍長安尚冠里東觀漢記曰鮑永字君長為魯郡太守時彭豐等不肯降後孔子闕里無故荊棘自闢從講室掃除至孔里永異之召郡府丞謂曰方今阨急而闕里無故自滌意豈夫子欲令太守大行饗誅無狀也乃修學校禮請豐等會手格殺之張璠漢記曰荀爽兄弟八人時人謂之八龍舊居西豪里縣令苑康曰昔高陽氏有才子八人署其里曰高陽里宋書曰太原王知玄者僑居會稽剡縣居家以孝聞及丁憂哀毀而卒帝嘉之詔改所居青苦里為孝家里宋略曰張敷幼樹風規貞心簡立居喪滅性孝道淳深宜追甄異以旌厥美可改所居里曰孝張里又曰散騎常侍袁瑜薦會稽郭世道詔改所居曰孝行里又曰太祖十三年春鳳皇見于京師眾鳥隨之改其地曰鳳皇里唐書曰劉禕之貞觀元年詔遣入京以母老固辭太宗許其終養江南道大使李襲譽嘉其至孝賜以東帛因上表旌其門閭改所居為孝慈里典略曰衛襄字叔遼河東人也修行至孝州郡嘉之改其里謂之孝德里晉官閣名曰洛陽城中諸里年和里宜壽里永年里宜都里太學里富儲里德官里大雅里孝敬里永安里安城里左池里東臺里安民里延壽里日中里步廣里西國里東平里穀陽里北恢里安武里孝西里太始里光林里石市里宜秋里葛西里西河里宣賜里延嘉里攸陽里南孝里中恢里宜年里渭陽里利民里西樂里北溪里西義里東統里宣都里石羊里中安里右池里潘岳西征賦曰所謂尚冠修城河棘宣明建陽昌陰北煥南平皆夷漫滌蕩亡其處而有其名注云皆里名也社祭酒別傳曰桓宣武館于赤蘭橋南曰延賢里荊州記曰峴山南至宜城百餘里舊說其間雕墻崇峻漢靈帝末其中有卿士刺史二千石數十人朱轅駢耀華蓋接陰同會於太山廟下荊州刺史行部見之雅歎其盛勑縣號為冠蓋里荊州圖記曰秭歸縣北有屈原故宅方七頃累石為屋今其名樂平里伏琛齊地記曰臨淄有梧臺里益州記曰州南蜀時故錦澗也其處號錦里伍輯之從征記曰譙周云孔子後魯人就冢次而居者百有餘家曰孔里郡國志曰齊臨淄縣東有陰陽里諸葛亮梁甫呤云步出齊城門遙望陰陽里里內有三墳纍纍皆相似借問誰家墳田疆古冶子也會稽典錄曰陳囂與民紀伯為鄰伯夜竊藩囂地自益囂見之伺伯去後密校其藩一丈以地益伯伯覺之慚惶既還所侵又卻一丈太守周府君高囂德義刻石旌表其閭號曰義里坊漢宮閣名曰洛陽故北宮有九子坊晉宮閣名曰洛陽宮有顯昌坊脩成坊綏福坊延祿坊休徵坊承慶坊桂芬坊椒房坊舒蘭坊藝文坊鄰尚書曰睦乃四鄰以蕃王室毛詩曰協比其鄰周禮五家為鄰五鄰為里周易曰東鄰殺牛不如西鄰之禴祭左傳僖公曰棄德不祥怒鄰不義又曰棄信背鄰患孰恤之又曰救災恤鄰天之道也又桓公曰親仁善鄰國之寶也又昭元年曰晏子如晉景公使更其宅還而毀之曰諺曰非宅是卜唯鄰是卜又曰諸侯守在四鄰語曰孰謂微生高直或乞醯焉乞諸其鄰而與之又曰德不孤必有鄰後漢書曰張霸字伯饒博覽五經諸生孫林劉固叚著等慕之皆市宅其旁以就學焉南史曰宋季雅市宅在呂僧珍宅側呂問宅价曰千一百萬呂怪其貴宋曰一百萬買宅千萬買鄰也物理論曰買宅者先定鄰焉又曰買鄰之直貴於買宅也
