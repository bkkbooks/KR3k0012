body:
  text: 職官部二十五御史大夫六典曰御史大夫之職掌邦國刑憲典章以肅正朝列中丞為之貳凡天下之人有稱冤而無告者與三司誥之三司即御史大夫中書門下也凡中外百寮之事應彈劾者御史言於大夫大事則方幅奏彈之小事但署名而巳漢書公卿表曰御史大夫秦官也應劭曰侍御之率故稱大夫史記曰趙堯者少為符璽御史趙人方興公謂御史大夫周昌曰君之吏趙堯年雖少奇士也君必異之且代君位昌笑曰堯刀筆吏何能至是乎居頃之堯侍高祖獨不樂悲歌群臣不知所以然堯進問陛下所悲者非為趙王年少而戚夫人與呂后有隙萬歲之後而趙王不能自全乎高祖曰然吾私憂之不知所出堯曰陛下獨宜為趙王置強相及呂后太子群臣所素敬憚者乃可高祖曰然誰可堯曰御史大夫周昌其人賢忍質直且呂后太子及大臣皆敬憚之獨昌可高祖乃召問昌謂之曰吾欲固煩公公強為我相趙昌泣曰臣初起從陛下獨柰何中道而棄之於諸侯高祖曰吾極知其左遷君私憂趙念非公母可者於是徙昌為趙王相既行高祖持御史大夫印弄之曰誰可以為御史大夫者孰視趙堯曰母以易堯遂拜堯御史大夫漢書曰元帝時琅㖿貢禹為御史大夫而華陰守承嘉上封事言治道在於得賢御史之官宰相之副九卿之右不可不選平陵朱雲兼資文武中正有智略可使以六百石秩試守御史大夫盡其能又曰朱愽為御史大夫府史舍百餘區井泉俱竭又其府中列柏樹常有野烏數千棲其上晨去暮來號曰朝夕烏後去不來者數月長老異之果廢焉又曰汲黯謂上曰公孫弘位在三公奉祿甚多然為布被此詐也上問弘弘謝曰有之夫三公為布被誠飾詐以釣名今臣弘位為御史大夫九卿以下無差誠如黯言又曰公孫弘為御史大夫時又東置滄海北置朔方之郡弘諫以為罷弊中國以奉無用之地願罷滄海專奉朔方上許之又曰張湯為御史大夫舞文巧詆以輔法又曰張歐為御史大夫上具獄事可却之不可者不得巳而為之涕泣對之其愛人若此年老請免天子亦寵以上大夫祿歸老于家又曰杜周為御史大夫後周子延年又為御史大夫以居父官府不敢當舊位坐臥皆易其處又曰倪寬為御史大夫以稱意任職故久無所匡諫官屬易之又曰張湯為御史大夫每朝奏事語國用日旰天子忘食丞相充位而巳又曰晁錯遷御史大夫請諸侯之罪過則削其地奏上上令公卿列侯宗室集議莫敢難錯獨竇嬰爭之由此與嬰有隙又曰哀帝建平二年朱愽奏請罷大司空以御史大夫為百僚帥帝從之又曰梁相褚大通五經為博士倪寬為弟子及御史大夫缺徵褚大大自以為得御史大夫至雒陽聞寬為大夫褚大笑及至與寬議封禪於上前大不能及退而服曰誠知之漢書百官志曰御史大夫秦官位上卿銀印青綬掌副丞相事漢雜記事曰故事上書為二封其一曰副領尚書者先發之有不善屏去不奏魏相為御史大夫奏去副封以防擁蔽漢舊儀曰御史大夫寺在司馬門內門無塾門署用梓板不起郭邑題曰御史大夫寺北齊楊楞伽鄴都故事云御史臺在宮闕西南其門北開取冬殺之義也唐書曰韋挺太宗嘗謂挺曰卿之任御史大夫獨朕意耳左右大臣無為卿地者卿勉之哉又曰薛謙光拜御史大夫時僧惠範恃太平公主權勢逼奪百姓店肆州縣不能理謙光將加彈奏或請寢之謙光曰憲臺理冤滯何所廻避朝彈暮黜亦可矣遂與殿中慕容珣奏彈之又曰韋思謙除右肅政大夫遂坐受拜或以為言謙曰國家班列自有等差柰何以姑息為事又曰崔隱甫為大夫一切督責之事無大小悉令諮決稍有忤意列上其罪前後貶黜者過半群僚側目上常謂曰卿為大夫深副朕所委又曰肅宗幸靈武李峴應召至行在拜扶風郡太守兼御史大夫既收京師拜禮部尚書守京兆尹復兼御史大夫時峴兄峘為戶部尚書兼成都尹乾元初玄宗還京峘自蜀至又兼御史大夫兄弟俱判臺事自國初以來兄弟並拜大夫未有其比時長安士庶皆賦美之又曰崔縱勸李懷光西至奉天加右庶子充使無幾拜京兆尹兼御史大夫數奏懷光剛復反覆宜陰備之及幸梁州左右或短之曰縱素善懷光必不來矣上曰他人不知縱吾可保不數日縱至拜御史大夫又曰李元素徵拜御史大夫大夫自貞元中位缺久難其人至是元素以名望召拜中外聳聽及居位一無修舉但規求作相久之𥧲不得志見客必曰無以某官散相踈也見屬官必先拜脂韋在列大失人情又曰李景讓轉御史大夫景讓慷慨有大志事母以孝聞正色立朝言無避忌時宣宗皇舅鄭光卒詔贈司徒罷朝三日景讓曰國舅雖親朝典有素無容過越乃上言曰鄭光是陛下親舅外族之愛誠軫聖心况皇太后哀切之時理合加等而賜之粟帛降之弔問自家刑國允謂合宜今以輟朝之數比於親王公主即前例所無縱有亦不可施用何者先王制禮所貴防微大凡人情於外族則深於宗屬則薄所以先王制禮割愛厚親士庶猶然況當萬乘親王公主宗屬也舅氏外族也今朝廷公卿以至庶人據開元禮外祖父母及親舅喪止服小功五月若親伯叔親兄弟即服齊縗周年所以踈其外而密於內也有天下者尤不可使外戚強盛故西漢有呂氏之侈幾滅劉氏國朝有則天之篡殆革唐命蓋非一朝一夕其所由來漸也今鄭光輟朝日數與親王公主同設使陛下速改詔命輟朝一日或兩日示其昇降有差恩禮無僣使四方見陛下欽明之德青史傳陛下制度之文垂之百王永播芳烈臣愚不肖謬竊恩私實願陛下處於堯舜之上羲軒之列所以甘心鼎鑊伏進危言優詔報之乃罷朝兩日又曰田令孜軍沙陁逼京師移幸鳳翔邠帥朱玫引兵來迎駕令孜挾帝幸山南時中夜出幸百官不及扈從而隨駕者黃門衛士數百人而巳帝駐寶雞候館詔授孔緯御史大夫遣中使傳詔令緯率百寮赴行在時京師急變從駕官屬至盩厔並為亂兵所剽資裝殆盡緯承令見宰相論事蕭遘以田令孜在帝左右意不欲行辭疾不見緯遣臺吏促百官上路皆以袍笏不具為詞緯無如之何乃召三院御史謂之曰吾輩世荷國恩身居憲秩雖六騑奔道而咫尺天顏累詔追徵皆無承稟非臣子之義也凡布衣交舊緩急猶相救䘏况在君親策名委質安可背耶言竟泣下三院曰夫豈不懷但𥂕厔剽剝之餘丐食不給今若首途聊營一日之費俟信宿繼行可也緯拂衣而起曰吾妻危疾旦不得夕丈夫豈以妻子之故忽君父之急耶公輩善自為謀吾行決矣即日見李昌符告曰主上再有詔命令促百寮前進觀群公之意未有發期僕忝憲闈不宜居後道途多梗明公幸假五十騎送至陳倉昌符嘉之謂緯曰路無頓褁糧辦耶乃送錢五十緡令騎士援緯達散關緯知朱玫必蓄異志奏曰關城小邑不足以駐六師請速幸梁州翌日車駕離陳倉纔入關而邠歧之兵圍寶雞攻散關微緯之言幾危矣五代史後唐史曰天成元年夏六月以李琪為御史大夫自後不復除通典曰漢御史大夫副丞相事若今之同平章及參知機務之類所以漢書云薛貢韋匡迭為宰相薛宣韋賢匡衡則是丞相而貢禹但為御史大夫又曰武后時改御史臺為肅政臺凡置左右肅政二臺別置大夫中丞各一人侍御史殿中監察各二十人漢武帝集曰武帝作柏梁臺詔群臣二千石有能為七言詩者乃得上坐御史大夫曰刀筆之吏臣執之唐中宗授楊再思檢校左臺大夫制曰避車要秩非德靡升專席雄班惟賢是屬侍中楊再思衣冠舊齒廊廟宏材寒暑不易其心始終弗虧其度在明時而有立居暗室以無欺投水陳謨邁漢朝之三傑霑砂作相掩虞日之五臣森乎抱松柏之心凜若負冰霜之氣佇因獻替兼肅權豪宜分務於鸞扄俾效能於烏署又蘇珦授右臺大夫制曰烏臺峻秩望惣鐵冠蒼珮崇班威高石室誠副相之榮級實次卿之通任前歧州蘇珦詞吞楚澤量湛黃陂既光大廈之材堪入巨川之用西京展驥道掩題輿右輔憑熊風超露冕朱幡霧撤初停州縣之勞白簡霜凝宜屏權豪之氣御史中丞上韋昭辨釋名曰御史中丞居中丞相者也辨云此中丞自御史大夫下丞有二其一別居殿中舉不法故曰中丞周禮曰周官小宰之職常建邦之宮刑以理王宮政令凡宮之糺禁注曰若漢之御史中丞史記曰臧宣為御史及中丞者幾三十年以微文深詆殺者甚眾稱為敢決漢書曰陳咸字子康沛郡人為中丞惣領州郡奏事課第諸刺史執法殿中公卿巳下皆敬憚之又曰鮑宣字貢君為中丞執法殿中外惣部刺史郡國二千石所貶退稱進白黑分明由是知名又曰中丞有石室以藏秘書圖讖之屬以其居殿中故曰中丞又曰張湯為御史大夫丞上請造白金與五銖錢籠天下鹽鐵排富啇大賈東觀漢記曰樊准字幼陵為御史中丞舉正非法百僚震悚又曰宣秉建武元年拜御史中丞上特詔御史中丞與司隸校尉尚書令會同並專席而坐故京師號曰三獨坐後魏書曰高恭之字道穆為御史中丞帝姉壽陽公主行犯清路執赤棒卒呵之不止道穆令卒棒破其車公主深以為恨泣以訴帝帝謂主曰高中尉清直之人彼所行者公事豈可以私恨責之耶道穆後見帝帝曰一日家姉行路相犯極以為愧道穆免謝曰臣蒙陛下恩奉陛下法不敢獨於公主虧朝廷典章謝承後漢書曰陳謙字伯讓拜御史中丞執憲奉法多所糺正為百僚所敬尚書選舉序位旌賢常諮問謙自陳蕃雖尊為宰相論議褒貶每往質疑皆服其清識高亮續漢書曰馬嚴字威卿拜御史中丞賜冠幘衣服車馬嚴舉劾案章申明舊典奉法按舉無所廻避百寮憚之漢官儀曰御史中丞二人本御史大夫之丞其一別在殿中兼典蘭臺祕書外督部刺史內領侍御史受公卿章奏紏察百僚漢舊儀曰御史中丞督司隸司隸督司直司直督刺史刺史督二千石以下漢官解詁注曰建武以來省御史大夫官屬入侍蘭臺蘭臺有十五人特置中丞一人以惣之此官得舉非法其權次尚書魏志曰鮑勛字叔業黃初四年尚書令陳群僕射司馬宣王並舉勛為官正官正即御史中丞也帝不得巳而用之百寮嚴憚罔不肅然魏氏春秋曰故事御史中丞與洛陽令相遇則分路而行以土主多逐捕不欲稽留也
