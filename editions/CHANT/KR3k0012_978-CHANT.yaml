body:
  text: 菜茹部二蔥禮曰凡進食之禮蔥葉處末又膾春用蔥又脂用蔥又為君子擇蔥薤必絕其本爾雅曰茖古百切山蔥茖蔥細莖大葉漢書曰龔遂為勃海太守令人一口種五十本蔥又曰邵信臣為少府先是官園種冬蔥韭覆以屋晝夜難音然火待溫氣乃生奏罷之東觀漢記曰孔奮字君魚為姑臧長時天下亂河西獨安前長居官數月輒致貲產奮在姑臧四歲財物不增唯老母極膳妻子但食蔥菜或嘲奮曰置脂膏中不能自潤義熙起居注曰十年有司奏太常謝澹遣四人還家種蔥菜免官晉書曰居洛陽城十里內有園菜欲以當課聽引其長流灌紫蔥晉書曰石勒時石聰將叛佛圖澄戒勒曰今年蔥中有蟲害人百姓無食蔥俄而石聰走後秦書曰姚興種蔥皆化為韭其後兵戈日盛後周書曰宣帝大象年左衛園中蔥變作韭梁書曰呂僧珍拜南兗州刺史從父兄子先以販蔥為業僧珍至乃葉業求州官僧珍曰吾荷國恩重無以報效汝等自有常分豈可妄求叨越當速反蔥肆耳金樓子曰名山之下生蔥蔥薤者是古人食石種也故語曰寧得一把五茄不用金王一車寧得一片地榆不用明月寶珠五茄一名金鹽地榆一名王鼓惟此二物可煮石又曰用紫芝煮石石美如脂食之可更調五味下橘皮蔥鼓漢武內傳曰西王母曰仙上藥有玄都綺蔥列仙傳曰阮公者鳴山上道士也衣裘髮覆耳耳長六七寸口中無齒日行四百里於山上種蔥薤百餘年人不知也春秋元命苞曰天門山上有蔥所種畦壟悉成行人拔取者悉絕若請神而求即不拔自出奇異辛香繆龍祭儀曰秋祀和羹芼以蔥西河舊事曰蔥領在燉煌西八十里其山高大故曰蔥嶺也河源潛發其嶺分為二水一水西經休循國國在蔥嶺也郭義恭廣志曰休循國居蔥嶺其山多大蔥華陽國志曰曹公既與先主語失匕會天震雷先主曰賢人言迅雷風烈必變良有以也曹公亦悔失言使人覘之見其拔蔥公曰大耳公未覺也其夜先主急去廣志曰有胡蔥木蔥巴南山川記曰有石蒜石蔥續搜神記曰新野趙真家園中所種蔥未經抽拔忽一日盡縮入地後經歲餘真之兄弟相次分散揚雄蜀都賦曰萬條熒熒翠蔥青黃若摛錦布繡望之無彊潘岳閑居賦曰菜則有蔥韭蒜芋青荀紫薑荲薺甘旨蓼蘇芬芳薤爾雅曰葝巨盈切山薤今山中多有此菜皆如人家所種又曰薤鴻薈也即薤菜也漢書曰龔遂為渤海太守令民一口種百本薤後漢書曰龐參為南陽太守郡人任棠者有奇節隱居教授參到先候之棠不與言但以薤一本水一盂置戶屏前自抱孫兒伏戶下主簿白以為倨參思其微意良久曰棠是欲曉太守也水者欲吾清也拔大本薤欲吾擊強宗也抱兒當戶欲吾開門恤孤也於是歎息而還參在職果能抑強助弱以惠政侍人魏略曰李孚字子憲為諸生常種薤欲以成計有求索不與一莖亦不自食時人謂之能行意世說曰桓公座有參軍猗音羈箸取物也蒸薤不時解其食者又不助而猗終不放舉座皆笑又曰蘇峻亂庾公南奔見陶侃雅相重及食庾噉薤因留白陶問用此何為庾云故可種於是尤歎列仙傳曰務光服蒲薤根荊州圖副曰築陽縣有薤山山多野薤因以為名古詞曰薤上朝露何易稀潘岳閑居賦曰白薤負霜蒜爾雅曰藶力的切山蒜今山中多有此菜皆如人家所種說文曰蒜菜之美者雲夢之葷菜東觀漢記曰李恂為兗州刺史前刺史所種園小麥胡蒜悉付從事無所留謝承後漢書曰江夏費遂字子奇為楊州刺史悉出前刺史所種小麥胡蒜付從事又曰太原閔仲叔者代稱節士雖同黨之潔清自以弗及也同黨見其含菽飲水遺以生蒜受而不食王隱晉書曰郄詵母病苦車及亡不欲車載乃養雞種蒜得馬八疋輿棺至冢齊書曰豫章王大會賓僚張融食炙始畢人便去融欲求鹽蒜口終不言方搖食指半日乃息梁書曰邵陵王使賊煞何智通既擒賊智通子敞之割炙食之即載出新亭四面火炙之燋熟蔽車載錢設鹽蒜雇百姓食之撤一臠賞載錢一千徒黨并母肉遂盡枹朴子曰謂夏必長而蒜麥枯謂冬必凋而竹柏茂正部曰張騫使還始得大蒜苜蓿三輔決錄曰平陵范氏南陽舊語曰前隊大夫有范仲公鹽豉蒜果共一筩言其廉儉也袁子正書曰袁子曰吾嘗與陳子息於鄴東門之外見一老父方坐而食其子授之蒜食必有餘欲棄則惜欲持去則暑遂盡食於是大辛螫其腸胃兩目盡赤陳子笑之吾謂曰子之家中牛羊數千而不敢食天暑有喝音謁死者而後食之病子之軀亦由是也晉四王起事曰成都王頴奉惠帝還洛陽道中於客舍作食宮人持斗餘粳米飯以供至尊大蒜鹽豉到獲嘉市麤米飯瓦盂盛之天子噉兩盂燥蒜數株鹽豉而已顏氏家訓曰三輔決錄云前隊大夫范仲公鹽豉蒜顆共一筩顆當音魏顆之顆北土通呼物一段為一顆蒜是俗間常語耳故陳王雀鷂賦曰頭如蒜顆目似擘椒崔豹古今注曰蒜茆蒜也俗語謂之小蒜胡國有蒜十子共為一株二籜裹之名為胡蒜尤辛於小蒜俗人謂之大蒜冤報記曰梁廬陵王蕭績在荊州時常遣從事量括民田南陽樂孟卿亦充一使公府舍人韋破虜發遣試勑失王本意及孟卿以數誤得罪破虜惶懼不敢引愆但誑孟卿公自為當為公分雪無勞訴也數日之間遂斬於市孟卿號叫無由自陳唯語人以紙筆隨殮死後少日破虜在糟上看牛忽見孟卿挈頭而入持一椀蒜齏與之破虜驚呼奔走不獲已而服之因爾病未幾乃卒廣五行記曰唐咸亨四年洛州司戶唐望之冬集計至五品進止未出間有僧來覔初不相識延之共坐少頃間曰貧道出家人得飲食亦少以公名故闇相記能設一頓鱠否司戶欣然即處分買魚此僧云看有蒜否司戶家人云蒜盡僧云蒜盡去也即起留之云蒜盡遣得買僧云蒜既盡不可更住苦留不止司戶果無疾暴亡延薦與李文德書曰五折張騫大宛之蒜潘泥釣賦曰西戎之蒜南夷之薑茄梁書曰蔡樽為吳興太守不飲郡井水齋前自種白莧紫茄以為常餌詔襃其清加信武將軍杜寶大業拾遺錄曰四年改胡床為交床改胡瓜為白露黃苽改茄子為崑崙紫苽嶺南異物志曰南土無霜雪生物不復凋枯種茄子十年不死生子人皆攀緣摘之樹高至二丈嶺表錄異曰南中草菜經冬不衰故蔬園之中栽種茄子宿根有二三年者漸長枝幹乃為大樹每夏秋熟則梯樹摘之三年後樹漸老子稀即伐去別栽嫩者薑春秋運斗樞曰琁星散為薑失德逆時則薑有翼辛而不臭也援神契曰薑禦溫菜也禮記檀弓上曰喪有疾食肉飲酒必有草木之滋焉以為薑桂之謂也論語鄉黨曰不撤薑食撤去齊禁薰物薑卒而不臭故不去也韓詩外傳曰宋玉因其友見楚相楚相待之無以異讓其友其友曰夫薑挂因地而生不因地而辛女因媒而嫁不因媒而親子之於王未也何怨於我也史記曰萬家之城千畦薑與千戶侯等魏志曰倭國有薑不知其滋味齊書曰孔琇之為臨川太守在任清約罷郡還獻乾薑二斤武帝嫌其少知琇之清乃歎息梁書曰周拾占對辯捷嘗居直盧語及嗜好裴子野言從來不嘗食薑拾應聲曰孔稱不撤裴乃不嘗一坐皆悅呂氏春秋曰和之美者楊璞之薑招搖之桂楊璞地名在蜀郡招搖山名在桂楊越駱之箘神仙傳曰吳孫權曰權使介象作變化種瓜菜百菓皆立生可食先主論膾魚何者最美象曰鯔魚為上先主曰論近道魚耳此出海中安可得乎象曰可得耳乃令人於殿庭中作方坑汲水滿之并求釣象餌之垂綸於坑中不過頃得鯔魚先主驚嘉問象曰可食否象曰故為陛下取安敢取不可食之物乃使廚下切之先主曰聞蜀薑作虀至佳此間薑永不及也恨爾時無此薑耳象曰蜀薑豈不易得願差所使行者并付以直象自書一符以青竹杖使行人閉目騎杖杖止便買薑買薑畢復閉目此人承其言騎杖須臾止已到成都不知是何處問從言是蜀市乃薑于時吳使張溫於市見之問曰與帝買薑於是甚驚作書寄家比人買薑畢捉書騎竹杖閉目復須臾已還到吳廚下切膾亦適了也李先生傳曰郎中喬飜於牛渚遇神人意欲啖薑而市無之神人以絹數匹并書一牒付信入市門南下任意所如須臾得薑數斗還以問神人神人曰問李先生當知我博物志曰伏波將軍唐資傳蜀人煞薑法先栖掃別麤細為三輩盛著籠中作沸湯沒籠著湯中須臾取一片橫截斷視如熱否裏既熱訖便內著甖中細擣米末以覆上令薑不見訖以向湯令復沸使相淹消息視甖中當自沸沸便陰乾之又曰任娠者可啖生薑令兒盈指嶺表錄異曰山薑花莖葉即薑也根不堪食而於葉間吐花穗如麥粒嫩紅色南人選未拆開者謂之含胎以鹽淹藏入甜糟中終冬如琥珀香辛可重用為膾無加也又曰以鹽藏曝乾煎湯之極能治冷氣蘇爾雅曰蘇桂荏也蘇荏類故名桂荏方言曰周鄭之間謂之公蕡湘沅之間謂之𦵯湘沅在武陵沙州記曰乞佛虜不識五榖唯食蘇于本草經曰芥蒩一名水蘇吳氏曰假蘇一名鼠實一名薑芥也
