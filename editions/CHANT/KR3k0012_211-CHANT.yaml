body:
  text: 職官部八錄尚書漢書曰張安世領尚書事職典樞機以謹慎周密自著每言大政巳決輒移病出聞有詔令乃驚使吏之丞相府問焉自朝廷大臣莫知其與議也又曰孔光字子夏領尚書事凡典樞機十餘年守法度修政事不希茍合或問溫室省中樹皆何木也光荅以他語其慎密也如此應劭漢官曰章帝詔曰司空牟融曲職六年勤勞不怠其以融為太尉錄尚書事又曰和帝策書曰故太尉鄧彪元公之族三讓彌高海內歸仁為群賢首其以彪為太傅錄尚書事百官揔巳以聽又曰靈帝策書曰故太尉陳蕃忠亮謇諤有不吐茹之節司徒胡廣敦德允元五世從政今以蕃為太傅與廣參錄尚書事又曰沖帝策書曰太尉趙峻二世掌典機衡有匪石不二之心大司農李固公族之苗忠直不回余以峻為太傅固為太尉參錄尚書事晉書曰元康元年誅楊駿詔曰司徒王渾秉德忠正器量弘遠歷位內外文武勳庸著在方策宜參弼機衡以亮天工其令錄尚書事又曰賈充為太尉錄尚書事及伐吳為大都督吳平遣侍中程咸犒勞增邑八千戶又曰會稽王道子元顯並錄尚書事時謂道子為東錄元顯為西錄晉中興書曰泰和元年詔會稽王體道冲虛理識明允阿衡孝文有保乂之規輔弼哀皇盡翼亮之道朕承洪緒仍聞善誘慎徽五教儀形具瞻登賢顯親國之典也其以為丞相錄尚書事入朝不趨讚拜不名劍履上殿給羽葆鼓吹班劍六十人又曰元興元年八月庚子尚書下舍火是時桓玄用事出鎮姑熟名雖在外實遙錄尚書故天火示不復用也又曰明帝后庚氏為皇太后九月癸卯皇太后臨朝稱制司徒王導錄尚書事傅暢晉故事曰何劭王戎張華裴楷楊濟和嶠為愍懷太傅通省尚書事張華為光祿大夫尚書七條事皆諮而後行惠帝之世太保衛瓘太宰河間王顒太傅東海王越皆錄三省尚書秘書事沈約宋書曰高武永初三年尚書令楊州刺史徐羨之為司空錄尚書事又曰孝武帝即位以大將軍江夏王義恭為太尉錄尚書事又曰諸公錄尚書事古制也王肅解尚書納于大麓曰堯納舜於尊顯之官使大錄萬機之政案漢氏諸吏平尚書奏事後霍光以大司馬大將軍平尚書事齊書曰明帝為宣城王錄尚書事廢帝昭業思蒸魚太官以無錄公命不與後魏書曰比海王祥初遷大將軍錄尚書事祥之命其夜暴風雲電拔其庭中桐樹大十圍倒立本處天威如此識者知其不終三國典略曰齊以并省尚書令高阿郍肱為錄尚書事郍肱才伎庸劣不涉文史尚書郎中源師常白郍肱云龍見當雩郍肱問曰何處龍見作何顏色師荅曰此是龍星須雩祭也非是真有龍見郍肱曰漢兒多事強知星宿唐書官品志曰錄尚書一人位在令上掌與令同但不糾察今則糾彈見事與御史中丞更相廉察陶氏職官要錄曰後漢章帝以太傅趙喜太尉牟融並錄尚書事尚書有六名自此始也因斯以來每帝幼即位輒置太傅錄尚書事尚書令六典曰尚書令掌揔領百官儀形端揆其屬有六尚書一曰吏部二曰戶部三曰禮部四曰兵部五曰刑部六曰工部凡庶務皆會而決之漢官儀曰尚書令主贊奏揔典綱紀無所不統秩千石故公為之者朝會不階奏事增秩二千石天子所服五時衣賜尚書令其三公列卿將大夫五營校尉行複道中遇尚書令僕射左右丞皆迴車豫避衛士傳不得紆臺官臺官過乃得去漢尚書稱臺魏晉巳來為省漢書曰張安世字子孺少以父任為郎用善書給事尚書精力於職休沐嘗出上行幸河東云書三篋詔問莫能知唯安世識之具作其事後購求得書以相校無所遺失上奇其才擢為尚書令東觀漢記曰陳忠為尚書令數進忠言辭旨弘麗前後所奏悉條於宮上閣以為故事又曰侯霸為尚書令深見任用樊准為尚書令明習漢家故事周密畏慎申屠剛為尚書令謇謇多直言無所屈撓後漢書曰宋均拜尚書令每有駮議多合上旨均嘗刪翦疑事帝以為有姦大怒收郎縛格之諸尚書惶恐皆叩頭謝罪均顧厲色曰蓋忠臣執義無有二心若畏威失正均雖死不易小黃門在傍入具以聞帝善其不撓即令貸郎又曰申屠剛遷尚書令光武嘗欲出遊剛以隴蜀未平不宜宴安逸豫諫不見聽遂以頭軔乘輿輪帝遂為止又曰郭賀字喬卿為尚書令百姓歌之曰厥德仁明郭喬卿忠正朝廷上下平又曰侯霸拜尚書令條撰善政有便於民者除其煩苛時令立春下寬大詔書由霸始建言多施用又曰陳蕃出為豫章太守性方峻不接賓客徵為尚書令送者不出郭門華嶠後漢書曰申屠剛為尚書令時內外群官多帝自遷舉加以法理嚴察職事過苦尚書近臣乃至捶撲牽曳於前群臣莫敢言唯剛每極諫張璠漢記曰左雄為尚書令在位者各肅清時稱曰左伯豪為尚書令天下皆慎選舉伯豪雄字也漢官曰尚書令秦官銅印墨綬與司隸校尉御史中丞皆專席坐京師號曰三獨坐言其尊重如此魏志曰陳矯字季弼尚書令魏明帝卒至尚書門矯跪問何之帝曰欲案行文書耳矯對曰此臣職分非陛下所宜臨也若不稱則請就黜帝慚迴車又曰荀彧自為尚書令常以書陳事臨薨皆焚毀故奇策密謀不得盡聞又非正道不用心名重天下莫不以為儀表海內英俊咸宗焉魏氏春秋曰荀攸字公達為尚書令從太祖征伐常謀謨帷幄時人及子弟莫知其所言太祖每稱之曰公達外愚內智外怯內勇外弱內強不伐善無施勞知可及愚不可及雖顏回甯武子不能過文帝在東宮太祖謂曰荀公達人之師表也汝當盡禮敬之攸曾病世子問疾獨拜床下其見尊異如此始攸入尚書太祖聞名與語大悅謂荀彧鍾繇曰公達非常人也吾得與之計事天下當何憂哉蜀志曰費禕代蔣琬為尚書令于時戰軍多事眾務煩猥禕識寤過人每省讀書記粗舉目暫視究其意旨其速數倍於人終亦不忘常以朝晡聽事其間接賓客飲食嬉戲加之愽弈每盡人之歡事後遷大將軍錄尚書事董允代禕為尚書令旬日之中事多停滯允歎曰人才力相懸若此非吾所及又曰蔣琬字公琰諸葛亮每言公琰託志忠雅當與共讚王業也密表後主臣若不幸後事宜以付琬亮卒琬為尚書令時新喪元帥遠近危悚琬出類拔萃處群寮之右既無戚容又無喜色神守舉止有如平常由是眾望漸服又曰劉巴字子初代法正為尚書令躬履清儉不治產業又自以歸附非素懼見猜嫌恭默守靖退無私交非公事不言又曰呂乂字季陽代董允為尚書令庶事無留門無停賓又歷職內外治身儉約謙靜少言為政不煩號為清能然持法刻深好用文俗吏故居大官名聲損於郡縣時晉書曰樂廣為尚書令所在無當時功譽然為後人所思又曰裴秀為尚書令秀創制朝儀廣陳刑政朝廷多遵用之以為故事在位四載為當世名公又曰李胤為尚書令雖歷職內外而在公退食在家貧儉兒病無以市藥上賜錢十萬又曰荀勗守尚書令課試令史以下覈其才能有闇於文法不能決疑處事者即時遣出帝嘗謂曰魏武帝言荀文若之進善不進不止荀公達之退惡不退不休二令君之美亦望於君也又曰會稽王道子嘗集朝士置酒於東府尚書令謝石因醉為委巷之歌王恭正色曰居端右之重集藩王之第而肆淫聲欲令群下何所取則石深銜之又曰王彪之字叔虎為尚書令與謝安共掌朝政安每稱曰朝之大事眾不能決者諮之王公無不得判又曰太熙元年詔曰夫揔百揆之得失管王政之開塞者端右之職也是以自漢代以來每選此官必慎其人議郎王戎可為尚書令又曰衛瓘字伯玉拜尚書令性嚴整以法御下視參佐尚書郎若掾屬又曰熊遠啟曰伏見吏部以太尉荀組為尚書令復領荊州牧自三代以來未聞以納言之官而出領牧伯者晉中興書曰卞壺為尚書令司徒王導稱疾不朝壺奏導專任無敬事寢不行舉朝憚壺又曰萬恊遷尚書令詔曰尚書令恊抗志高亮才鑒博雅朕甚嘉之晉書曰百官表注尚書令一人唐虞官也是謂文昌天府銅印墨綬五時朝服納言幘進賢兩梁冠佩水蒼玉官品第三俸月四十五斛領都揔攝諸曹出納王命晉公卿禮秩曰尚書令拜受命皆策命薨則於朝堂發哀古之冢宰以在端右故也晉故事曰賈充為尚書令以目疾表置省事於是遂置省事吏四人品職章服與諸曹令史同宋書曰王僧虔為尚書令嘗為飛白書題尚書壁曰圓行方止物之定質脩之不巳則溢高之不巳則躓引之不巳則遺是故去之宜疾當時嗟賞以比座右銘又曰武帝踐祚王瑩遷尚書令時有猛獸入郭上意不悅以問群臣皆莫能對瑩在御筵乃歛板荅曰昔擊石拊石百獸率舞陛下應籙御圖武象來格帝大悅眾咸服焉齊書曰謝朏字敬沖徵為司徒尚書令朏辭腳疾不堪謁仍角巾自輿詣雲龍門謝既見乘小車就席齊職儀曰秦漢之世委政公卿尚書之職掌封奏令贊文書僕射主開閉令不在則僕射奏下其事魏氏重內職八座尚書任同六卿舜舉八元八凱以隆唐朝今號八座為元凱謂賢能用事義如昔也梁書曰何敬容為尚書令貪恡為時所嗤鄙其署名敬字則大作茍小為文容字大為父小為口陸倕戲之曰公家茍既奇大父亦不小敬容遂不能荅又曰漏禁中語故嘲誚日至嘗有客姓吉問卿與邴吉遠近曰如明公之與蕭何唐書曰太宗在藩嘗為尚書令其後人臣莫敢為遂廢其官廣德元年代宗以親賢有大勳遂特拜尚書令又曰廣德二年冬詔郭子儀於尚書省視尚書令事命宰臣巳下特遣射生五百騎執戟翼從自朝堂至于省賜以教坊音樂五代史梁書開平三年詔升尚書令為正一品按唐典尚書令正二品至是以將授趙王鎔此官故升之會稽先賢傳曰沈勳徵詣南宮賜酒拜尚書令持節臨辟雍名冠百僚襄陽耆舊傳曰劉季和曰荀令君至人家坐處三日香徐廣車服儀制曰尚書令軺車黑耳後戶通典曰大唐尚書令朝服鷩冕八旒七章三梁冠鷩雉也可為冠也武德初太宗為秦王時嘗居之其後人臣莫敢當故自龍朔二年制廢尚書令又曰舊尚書令有大廳當省之中今謂之都堂世說曰崇禮闥在東掖門內路西即尚書省崇禮門東建禮門內即是尚書令下舍之門
