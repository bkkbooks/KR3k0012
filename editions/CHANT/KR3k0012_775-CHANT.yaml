body:
  text: 車部三輅釋名曰天子所乘曰輅輅亦車也謂之輅言行路也金輅以金玉飾車也象輅革輅木輅各隨所名也書曰大輅在賓階面綴輅在阼階面大路王綴輅金面前皆南饗先輅在左塾之前先輅象以輅木金王象皆以飾車木則無飾朞以在路寢門內左右塾北面凡陳列皆象成王生時禮曰大輅者天子之車也又曰鸞車有虞氏之輅也軥音鉤車夏后氏之輅也又曰天子居青陽左个乘青輅駕蒼龍天子居明堂左个乘朱輅駕岑騮天子居太廟太室乘黃輅駕黃龍天子居總章左个乘白輅駕白駱天子居玄堂左个乘玄輅駕鐵驪周禮曰有虞氏上陶夏后上匠殷人上梓周人上輅又曰王之五路一曰玉路錫樊纓十月再就建太常十有二斿以祀金路鉤樊纓九就建大旂以賓同姓以封象路朱樊纓七就建大赤以朝異姓以封革路龍勒條纓五就建大帛以即戎以封四衛木輅前樊鵠纓建大麾以田以封蕃國又曰王后之五路重翟錫面朱總厭翟勒面績總安車雕面鷖總皆有容蓋翟車皃面組總有握輦車組輓有翣羽蓋左傳曰清廟茅屋大路越音活席大羹不致粢食音寺鑿昭其儉也又曰賜之大輅之服戎輅之服論語曰行夏之時乘殷之輅服周之冕說苑曰晏子朝乘弊車駕駑馬景公見之曰嘻天子之祿寡耶何乘不佼古巧切之甚也晏子對曰賴君之賜得以壽三族及國交遊皆得生焉臣得煖衣飽食弊車駑馬以奉其身於世足矣晏子出公使梁立據遺之輅車乘馬三反不受公不悅趣音促召晏子曰夫子不受寡人亦不受晏子對曰君使臣臨百官之吏節其衣服食飲之養以先齊國之民然猶恐其侈靡而不顧其行也今輅車乘馬君乘之上臣亦乘之下民之無義侈其衣食而不顧其行者臣無以禁之遂讓不受也董巴輿服志曰殷瑞山車金根之色殷人以為大輅於是秦皇作金根之車漢承秦制為乘輿即孔子所謂乘殷之輅也鹵簿令曰玉輅駕六馬太僕卿馭駕士三十二人並平巾幘青衫大口袴千牛衛將軍一人陪乘執金裝長刀御乘輦其輅衫腰輿後行次金輅象輅革輅木輅以次相隨並駕六馬各駕士三十二人並平巾幘大口袴衫色各從輅色次五副輅駕士各二十人衣服同正輅次耕根車駕六馬士三十二人服同玉輅又曰皇太子金輅駕四馬僕寺令馭左右率府卒一人執儀刀陪乘駕士二十二人並平巾幘緋帔衫大口袴又曰王公已下象輅駕四馬佐二人立侍一人武弁朱衣革輩帶在左一人緋裲襠大口袴執刀在右駕士十二人平巾幘緋衫大口袴又曰玉輅青質以玉飾諸末重輿左青龍右白虎金鳳翅畫莒文鳥獸黃屋左纛金鳳一在軾前十二鑾在衡正輅耕根鑾數皆准此其副則八二鈴在式龍輈設鄣塵青蓋繡飾黃裏愽山鏡子樹羽輪金根朱班重牙左建旂十有二旒旒皆畫升龍其長曳地右載闟許及切戟長四尺廣三尺黻文旂首金龍頭𠾑結綬及鈴緌駕蒼龍金緵亡黯切方釳許乞切插翟尾五焦鏤錫鞶纓十有二就錫馬當顱金為之鞶馬大帶纓馬決皆以五彩罽飾之就成也祭祀納后則供之金輅赤質以金飾諸末餘與玉輅同駕赤騮饗射祀還飲至則供之象輅黃質以象飾諸末餘同玉輅駕黃騮行道則供之革輅白質輓莫官切之以革餘同玉輅駕白駱巡狩臨兵事則供之木輅黑質以漆飾諸末餘與玉輅同駕黑騮田獵則供之諸蓋旌旗及鞶纓皆從輅色黃裏俱用黃其鏤錫與五輅同耕根車青質蓋三重餘同玉輅籍田則供之又曰皇太子金輅赤質以金飾諸末重輅箱畫苣丈鳥獸黃屋伏鹿軾龍輈金鳳一在軾前設鄣塵朱蓋黃裏輪畫朱牙左建旂九旒右載闟戟旂首金龍頭衘結綬及鈴緌駕赤騮四鑾在衡二鈴在軾金緵方釳插翟尾五焦鏤錫鞶纓九就從祀享正冬大朝納妃則供之又曰王公以下象輅以象飾諸末朱班輅八鸞在衡左建旗旗盡龍升一降升一右載闟戟革輅以革飾諸末左建旜通帛為旜餘同象輅木輅以漆飾之餘同革輅諸輅皆朱質朱蓋朱旂旜一品九旒二品八旒三品七旒四品六旒其鞶纓就數皆淮此張子平東京賦曰天子乃撫玉輅乘時龍又曰乘鑾輅而駕蒼龍又曰奉引既睪先輅乃發又曰龍輅充庭雲旗拂霓輿周易曰君子得輿民所載也又曰輿說輻夫妻反目象曰輿說輻中無尤也又曰壯于大輿之輹又曰見輿曳其牛掣其人天且劓無初有終象曰見輿曳位不當也無初有終遇剛也續漢書輿服志曰上古聖人見轉蓬始知為輅輅行可載因物生智後為之輿晉書曰王道有羸疾不堪朝會顯宗親幸之置酒作樂又詔自今已後輿載入殿不得施拜晉諸公讚曰司徒傅樞以足疾遜位不許板輿上殿晉起居注曰太始四年正月臨軒詔太宰安平生孚載輿昇殿宋書曰陶潛解印後有腳疾使一門生二兒舉藍輿詣王弘既至欣然而與之飲酌語林曰武侯與宣王在渭濱將戰宣王戎服莅事使人視武侯乘輿葛巾持白羽扇指麾三軍皆隨其進止宣皇聞而嘆曰可謂名士世說曰孟旭未達時家貧在京常見王恭乘高輿服鶴氅裘于時微雪旭於籬間窺之歎曰此真神仙中人也陳留耆舊傳曰洛陽令董宣死後詔使視之有蘭輿一乘白馬一疋帝曰宣之清死乃知之幽明錄曰謝安石當桓溫之世恒懼不全夜忽夢乘桓輿行十六里見一白雞而止莫有解此夢者及溫死後代居宰相歷十六年而得病安方悟云乘桓輿者代君其位也十六里者得十六年也見白雞生者今太歲在酉吾病殆不起乎少日而卒淮南子曰以天為蓋以地為輿四時為馬韓子曰輿人成輿則欲人富貴也非輿人仁不貴則不售也潘安仁閑居賦曰太夫人乃御板輿升輕軒遠覽王畿近周家國左太冲蜀都賦曰車輿雜沓冠帶混弁張子平東京賦曰乘輿巡乎岱岳勸稼穡於原陸又曰皇輿夙駕𨌅仕佳切於東階𨌅腳也曹子建七啟云駕超野之駟乘追風之輿宋玉高唐賦曰王乃乘玉輿駟倉螭同輿魏志曰太祖軍摩陂召夏侯惇常與同輿載諸將無得比者蜀志曰曹公東征呂布於下邳先王從曹公還表先主為左將軍禮之愈重出則同輿吳志曰大子登字子高善待僚屬略同布衣之禮諸葛恪顧譚等或同轝而載晉中興書曰紀膽字士遠為鎮東左長史丹陽宣城新安三郡中正上常幸瞻家同乘輿還府瞻甚見遇鄉郡榮之輦傳曰猛獲奔衛南宮萬奔陳以乘車輦其母一日而至又曰齊慶克通于聲孟子與婦人蒙衣乘輦而入于於閎巷門又曰孟氏之臣秦莒父輦重如役莒父孟獻子家臣步挽重車以從師穀梁傳曰晉君召伯尊而問焉伯尊來遇輦者輦者不辟使車右下而鞭之凡車將左御在中有力之人在右所以備非常爾雅曰徒禦不驚輦名也漢書曰淮南王長早失母常附呂后孝惠然常心怨辟陽侯孝文初即位自以為最親驕蹇數不奉法上寬赦之三年入朝從上入苑獵與上同輦帝謂為太兄又曰傅昭儀有寵於上生定陶恭王多伎藝上甚愛之坐則同席行須同輦又曰班婕妤班況之女孝成帝婕妤也賢才通辨帝遊於後庭嘗欲與同輦婕妤辤曰觀古賢聖之君皆有名臣在側三代末主乃有嬖妾今欲同輦無乃似之乎上善其言而止太后聞之喜曰古有樊姬今有班婕妤漢武故事曰又起明光宮發燕趙美女二千人充之常從行國載之後車與上同輦者十六人員數恒滿又曰上嘗輦至郎署見一老郎鬢眉皓白上顏名駟江都人上問公何時為郎何其老也對曰臣文帝時為郎上曰何其不遇也駟曰文帝好文而臣好武景帝好老而臣尚少陛下好少而臣已老是以三世不遇晉書曰山濤吳平之後詔天下罷軍役示海內大安州郡悉去兵大郡置武吏百人小郡五十人帝嘗講武于宣武場濤時有疾詔乘步輦從因與盧欽論用兵之本以為不宜去州郡武備其論甚精于時咸以濤不學孫吳而闇與之合帝稱之曰天下名言也而不能用及永寧之後屢有變難寇賊歘起郡國皆以無備不能制天下遂以大亂如濤言焉又曰張敞東宮舊事太子有臥輦步輿王韶晉紀曰義軍起桓玄問眾曰朕其敗乎曹靖之對曰神怒民怨臣實憂懼玄曰神何為怒民何為怨對曰移晉宗廟飄零落薄無所祭之不及於祖此其所以怒也玄曰卿何不諫對曰輦上諸君皆以為堯舜之世臣何敢諫又曰梁冀與妻孫壽共乘輦張羽蓋飾以金銀以騁娛樂晉公卿禮祑曰太宰平王給雲母輦晉太康起居注曰齊王歸蕃詔賜香衣輦一乘後魏書禮志曰大樓輦輈十二加以玉飾衡輪雕采與輅同駕牛十二又曰乾象輦羽葆圓蓋畫日月五星二十八宿天階雲漢山林雲氣仙聖賢明忠孝節義遊龍飛鳳朱雀玄武白虎青龍奇禽異獸可為飾者皆亦圖焉太皇太后助祭郊廟則乘之鄴中記曰石虎大駕有金銀輦雲母輦武剛輦數百乘虎皇后出乘嵩路輦文或玉路輦或朱漆臥輦純以雲母代紗中外四望皆通徹又曰石虎少遊獵體轉壯大不復乘馬作獵輦使二十人擔之如今之步輦上安徘徊曲蓋坐處轉關床若射鳥獸宜有所向關隨身而轉王君內傳曰神人乘三雲之輦拾遺記曰周穆王馭黃金碧玉之輦從朝至暮而窮宇宙之內潘岳籍田賦曰天子御玉輦蔭華蓋金銀照曜以𤈍晃龍驥騰驤而沛艾鄒陽上吳王書曰鬭城不休救兵不至死者相隨輦車相屬轉象流輸千里不絕枚叔七發曰出輿入輦命曰蹶痿之機又云輦道斜交隄池紆曲曹子建公讌詩云輕輦隨風移劉公幹公讌詩云輦車飛素質從者盈路傍丘希範應詔詩云輕荑承玉輦細草籍龍騎漢草輦從上行
