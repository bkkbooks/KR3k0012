seq: 22
body:
  text: 時序部六夏上爾雅曰夏為朱明孫炎曰夏氣赤而光明又曰為昊天又曰夏為長嬴又曰夏祭曰薦薦上帝魚初薄也夏時百穀未登可薦者薄也釋名曰五月謂之賓者下也賓者敬也言陽氣下陰氣上極陰氣始賓敬之也書曰夏暑雨小民亦唯曰怨嗟又堯典曰申命羲叔宅南交申重也交言夏與春交平秩南訛訛化也掌夏之官平序南方化育之事日永星火以正仲夏永長也謂夏至之日也蒼龍之中星舉中則七星見可知也厥民因鳥獸稀革因謂老弱因就在田夏時鳥獸毛羽稀少詩曰四月秀葽不榮而實日秀葽草也又曰正月繁霜我心憂傷正月夏之四月建巳之月純陽用事而霜多急恒寒若之異傷害萬物故心為之憂傷民之訛言亦孔之將又曰綢繆束楚三星在戶三星五月中直戶也箋云心星在戶謂五月之節六月之中今夕何夕見此粲者又曰維此六月既成我服我服既成于三十里又曰六月食鬱及薁鬱棣屬薁嬰薁也又曰六月莎雞振羽又曰四月維夏六月徂暑徂往也六月火星中暑盛而往矣箋云徂猶始也六月乃始盛與人為惡亦有漸非一朝一夕又曰無冬無夏值其鷺羽又曰冬之夜夏之日百歲之後歸于其室傳曰龍見而雩龍角亢星也建巳月昏見東方禮曰四月之節日在昴立夏為四月之節昏翼中曉牽午中斗建巳位之初其日丙丁丙丁屬火主夏故云其日丙丁其帝炎帝其神祝融昔炎帝神農氏以火德王繼天而王故為夏帝火正曰祝融為火神佐炎帝於夏其蟲羽南方朱鳥羽蟲之長凡有羽之類皆屬於火故曰其蟲羽其音徵三分宮去一以生徵徵數五十四屬火以其徵清事之象也夏和則徵聲調樂記曰徵亂則哀其事勤律中仲呂四月氣至則仲呂之律應仲呂者無射之所生三分益一管長六寸六分立夏之日螻蟈鳴後五日蚯蚓出後五日王瓜生盛德在火迎夏於南郊迎夏為祀赤帝命樂正習盛樂為將大雩先習盛樂自鞀鞞至祝敔皆作曰盛樂中氣日在畢小滿為四月中氣昏軫中曉須女中斗建巳位之中小滿之日苦菜秀後五日靡草死後五日小暑至挺重囚出輕繫挺猶寬也重囚寬之至秋方決輕繫出而舍之無起土功無發大眾無伐大樹為妨蠶農之事天子初衣暑服論語曰當暑袗絺綌謂暑服無大田獵恐傷生類以含桃先薦寢廟含桃櫻桃也先荐寢廟後乃食之蠶事既登后妃獻繭后妃獻繭進其成功也天子飲酎用禮樂酎之言醉也春酒至此始成與群臣飲之又曰五月之節日在參芒種為五月節也昏角中曉危中斗建午位之初律中蕤賓五月氣至則蕤賓之律應蕤賓者應鍾之所生三分益一管長六寸三分其日其音其數並同孟夏芒種之日螳蜋生後五日鵙始鳴後五日反舌無聲縶騰駒恐相蹄齧班馬政馬政謂掌十二閉養馬之政教聚蓄百藥因草木蕃廡之時則揉聚百藥中氣日在東井夏至為五月中氣昏亢中曉營室中斗建午位之中夏至之日鹿角解後五日蜩始鳴後五日半夏生祀皇地祗於方丘夏至之日祀皇地祇於方丘以高祖祖神堯皇帝配坐以岳瀆等神從祀日辰至陰陽爭死生分夏至之日漏刻長陽氣欲衰陰氣欲興陽日生陰日死至之日相與分君子齊戒以陰陽相爭之時務欲安靜薄滋味無致和謂陰氣始興身尚靜味尚薄節嗜慾定心氣微陰扶精不可散無用火於南方陽氣盛又用火於其方害微陰可以居高明可以遠眺望可以升山陵可以處臺榭是月暑氣方盛可以登高遠望順陽居上又曰六月之節日在東井小暑為六月之節昏氏中曉東壁中斗建未位之初律中林鐘六月氣至則林鍾之律應林鍾者黃鍾之所生三分去一管長六寸其日其音其數並同孟夏小暑之日溫風至後五日蟋蟀居壁後五日鷹乃學習中氣日在柳大暑為六月中氣昏尾中曉奎中斗建未位之中大暑之日腐草為螢後五日土潤溽暑後五日大雨時行命有司入山行木無有斬伐為其未堅成也中央土火休而盛德在土其日戊巳戊巳屬土故云其日戊巳其帝黃帝其神后土昔黃帝軒轅氏以土德繼天而王故為黃帝土官之神曰后土其蟲倮無毛羽麟介之類其音宮聲始於宮宮數八十一屬土以其最大樂記曰宮亂則荒其君驕律中黃鍾之宮黃鍾主十一月土在林鍾夷則之閒各有分主不可假借故引黃鍾之清宮以為土律其管半黃鍾之管長四寸五分則黃鍾之清宮也故季夏十八日己後土王氣至則黃鍾之宮應之也其祀中霤祭先心中霤猶中室也祭中霤之禮為祀先進心也又曰樂正崇四術立四教春夏教以詩書春夏陽也詩書者聲亦陽也又曰凡學春夏學干戈干盾也戈句子戟也干戈萬舞象武也用動作之時學之又曰春誦夏絃太師詔之誦謂歌樂也絃謂以絲播詩陽用事則學之以聲又曰春作夏長仁也又曰明堂位曰季夏六月以禘禮祀周公於太廟朱干玉戚冕而儛太武皮弁素積禓而舞大夏周禮曰蕤賓午之氣五月建焉而辰在鶉首又曰山虞以仲夏斬陰木鄭眾曰陰木秋冬生者鄭玄曰陰木生山北者冬斬陽夏斬陰堅濡調也又曰凌人掌冰凌冰室也夏頒冰暑氣盛王以冰頒賜也又曰祚氏掌攻草木及林麓夏日至令刊陽木而火之又曰夏見曰宗大行人云夏宗以陳天下之謨穀梁傳曰四時之田皆為宗廟之事也夏田曰苗因為苗稼除害故曰苗皇覽逸禮曰夏則乘赤輅駕赤騮載赤旗以迎夏於南郊其祭先黍與雞居明堂正廟啟南戶尚書大傳曰南方者何也任方也任方者物之方任何以為之夏夏者假也吁荼萬物養之外者也故曰南方夏也又曰主夏者火火昏中可以種黍菽上告乎天子而下賦之民三禮義宗曰夏大也謂萬物長大也夏謂南者南任也又曰火正曰祝融者祝甚也融明也言夏時物氣甚明也又曰南岳謂之霍霍者護也言陽氣用事盛夏之日護養萬物故以為稱又曰六月小暑為節者此以相刑為名刑大暑故謂之小暑六月之初暑氣熱未極故以小為名大暑為中者自十一月一陽爻生從地下而出至此之時方始上徹陽氣併出地上大暑既極故大暑為中大戴禮曰夏以教士車甲士執伎論力循四衛強股肱質射御才武聽慧治眾長平可以為儀綴於國出可以為率誘於軍旅四方諸侯之游士國中之賢者閱焉方夏三月養長莠蕃庶物於時有事享于皇考爵士之有慶者七人以成夏事易通統圖曰夏日月行東南赤道曰南陸尚書考靈耀曰火星為夏期專陽相助同精感符詩含神霧曰曹地處季夏之位土地勁急音中徵其聲清以急春秋繁露曰夏樂氣故養也孝經說曰斗指午為夏鶡冠子曰斗柄南指天下皆夏史記曰墨者亦尚堯舜言德行曰夏日葛衣冬日鹿裘又曰田嬰有子四十餘人其賤妾有子名文以五月生嬰告其母曰勿舉也其母竊舉生之及長因其兄弟而見其子文於田嬰田嬰怒其母曰吾令若去此子敢生之何也女頓首因曰君所不舉五月子者何故嬰曰五月子者長及戶齊將不利其父母文曰人生受命於天君何憂焉必受命於戶則可高其戶耳誰能至戶者嬰曰子休矣又曰熒惑南方夏火禮也視也禮虧視失逆夏令傷火氣罰見熒惑逆行二舍為不祥居之三月國有殃五月受兵七月半亡地九月太半亡地又曰漢武帝始幸雍郊見五帝以孟夏四月荅禮焉又曰賈誼既以謫居長沙長沙卑濕自以為壽不得長傷悼之乃為賦以自廣曰單閼之歲兮四月孟夏歲在卯曰單閼庚子日斜兮鵬集余舍五行志曰秦始皇九年四月大寒人多凍死時嫪毐及大臣二十餘人車裂以徇而滅宗放邊四千餘家于房陵漢食貨志曰朝錯曰今農人五口之家其服役者不下二人其能耕者不過百畝百畝之收不過百石春耕夏耘秋穫冬藏采樵治宮給役使春不得避風夏不得避暑熱秋不得避陰雨冬不得避寒凍四時閒無休息漢書魏相上書曰南方之神炎帝乘離執衡司夏張晏曰火為禮禮者齊平故為衡也又曰昔魯昭公十七年六月朔日食說曰正月謂周六月夏四月正陽純乾之月也止慝謂陰爻也冬至陽爻起初故曰復至建巳之月為純乾亡陰爻侵陽為災重故伐鼓用幣責陰之禮劉歆為六月二日魯分也又漢元帝永初元年四月日色青白亡景韋昭曰下無景也景謂惟質見耳正中時有景亡光韋昭曰無光耀也是夏寒至九月日乃有光續漢書律曆志曰日行南陸謂之夏續漢書禮儀志曰五月五日朱索五色桃印為門戶飾以止惡氣又曰仲夏之月陰氣萌作恐物不茂其禮以朱索連葦以施門戶又曰立夏之日夜漏未盡五刻京都百官皆衣赤衣迎夏於南郊後漢書張純奏議禮三年一祫五年一褅禘祭以夏四月夏者陽氣在上陰氣在下四月乾卦用事故言陽氣在上故正尊卑之義也謝承後漢書曰羊茂字季實為東郡守夏處單板榻又曰宋均為九江太守五日一視事夏以平旦晉書曰魏末有孫登字公和汲郡人無家屬時人於汲縣北山上土窟中得之夏則編草為裳又曰肅慎國一名抱樓夏則巢居晉書曰山濤將去選官舉嵇康自代康與濤書告絕且曰性巧而好鍛宅中有一柳樹甚茂乃激水圜之夏月居其下以鍛東平呂安服康高致每一相思千里命駕每鍛而向秀為佐又五行志云晉義熙時桓玄既篡位謠曰草生及馬腹鳥啄桓玄目及玄敗走至江陵時當五月中被誅晉陽秋曰車胤字武子家貧讀書不常得油夏月則練囊盛數十螢以夜繼日沉約宋書云羊欣字敬元父不疑為烏程縣令欣時年十二王獻之為吳興守甚知愛之賞夏月入縣欣著新練裙晝寢獻之書數幅而去欣本工書因此彌善又曰劉敬宜八歲喪母四月八日入寺及下頭上金鏡為母灌佛因泣下悲不自勝北齊書曰僕射魏收字伯起初習武不成改節謮書夏月坐板床隨逐樹陰諷讀累年床為之銳遂工辭令也南史曰梁何遠為武昌太守武昌俗皆汲江水盛夏遠患水溫每以錢買人井寒水不受錢者則以水還之其他事率多此類陸翽鄴中記石季龍於冰井臺藏冰三伏之月以冰賜大臣趙書曰汲桑六月盛暑而垂重裘累茵使十餘人扇之患不得清涼斬扇者軍中為之謠曰奴為將軍何可羞六月重茵被狐裘不識寒暑斷人頭三十國春秋燕王暮容熙后符氏賞季夏思凍魚膾仲冬須生地黃皆下有司切責之不得加之以辟焉隋書曰煬帝大業十二年五月上幸玉華宮徵求螢火得數斛夜出遊於山而放之光遍岩谷續會要曰貞元六年五月朔御紫宸殿受朝先是上以五月一陰生臣子道長君父道衰非善月也因創是月朝見之儀也國語曰魯宣公夏濫於泗淵漬罟於泗水之泉以取魚里革斷其罟而棄之曰古者大寒降土蟄發寒氣下謂季冬建丑之月土蟄發謂孟春建寅之月水虞於是乎講罛罶取名魚登川禽而嘗之寢廟行諸國人助宣氣也水虞漁師也罟魚網罾笱也言陽氣起魚負冰故令國人取之今魚方別孕不教魚長又行網罟貪無藝也公曰吾過矣藝猶極也吳越春秋曰越王念吳之復夏則握火說苑曰趙簡子謂陽虎曰樹李春夏得休息秋得食樹蒺藜者夏不得息秋得刺今子種樹蒺蔾耳太公金匱曰紂常以六月獵於西土發民逐禽民諫曰今六月天務覆施地務長養今盛夏發民逐禽而元元懸於野君殘一日之苗而民百日不食天子失道後必無福紂以為妖言而誅之後數月天暴風雨發屋折木六韜曰武王伐殷得二大夫而問之曰殷國常雨血雨灰雨石小者如雞子大者如箕常六月雨雪深丈餘武王曰大哉妖也其一人曰是非大妖也殷國大妖三十七章雨血雨灰雨石盛夏雨雪臣不為妖災武王踧然而問三十七章之妖對曰殷君好射人以餧虎喜割人心喜殺孕婦喜煞人父孤人之子上數事皆三十七章之事又曰夏不操扇冬不服裘天雨不張蓋名曰禮將又曰冬冰可折夏條可結傅子曰夏令披裘冬令披褐雖有嚴令終不從者逆也世說曰郗嘉賓三伏之月詣謝公炎暑方盛雖復當風交扇猶沾汗流離又曰周鎮罷臨川還都泊清溪時夏暴雨舡舫狹小而漏殆無坐處丞相王導曰胡威之清何以過此又曰劉真長始見王丞相時盛暑之月丞相以腹熨彈棋局曰何如乃渹吳人以冷為渹也音楚敬反劉既出人問見王公如何劉曰未見他異唯作哭語耳又曰胡廣本姓黃五月生父母惡之乃置之瓮投於江胡翁見甕流下聞有小兒啼聲往取因長養之以為子遂七登三司流中庸之號廣後不治其本親服云我本親以己為死人也世以為深譏焉又曰謝遏按謝朗小名遏夏月常仰臥謝公清晨卒來未暇著衣跣出屋外方躡履問訊公曰汝可謂前踞後恭語林曰何平叔美姿儀而絕白魏文帝疑傅以粉夏月與熱湯餅既啖大汗出隨以朱衣自拭色轉皎然又曰陸機夏在洛忽思東頭竹篠飲語劉寶曰吾思鄉轉深矣公孫尼子曰孔子有病哀公使醫視之醫曰子居處飲食何如孔子曰春居葛籠夏居密陽秋不風冬不煬飲食不饋飲酒不勤醫曰是良藥也太玄經曰蒙南方也夏也物之脩長也皆可得而載也謂長出向上也括地圖曰天毒國最暑熱夏草木皆乾白虎通曰六月謂之林鍾林者眾也萬物成熟類眾多也蔡邕月令章句曰百穀各以其初生為春熟為秋故麥以孟夏為秋祠令曰季夏土王日祀黃帝於南郊帝軒轅配后土從之又曰季夏迎氣日祀中霤
