body:
  text: 皇王部二十西晉宣帝晉書曰宣帝諱懿字仲達河內溫縣孝敬里人姓司馬氏其先出自帝高陽之子重黎為夏官祝融歷唐虞夏商世序其職及周以夏官為司馬其後程伯休父周宣王時以世官剋平徐方錫以官族因而為氏楚漢間司馬昂為趙將與諸侯伐秦秦亡立為殷王都河內漢以其地為郡子孫遂家焉自昂八世生征西將軍鈞字叔平鈞生豫章太守量字公度量生潁川太守雋字元異雋生京兆尹防字建公帝即防之弟二子也少有奇節聰明多大略博學洽聞伏膺儒教漢末大亂常慨然有憂天下心南郡太守同郡楊俊有知人鑒見帝未弱冠以為非常之器尚書清河崔琰與帝兄朗善亦謂朗曰君弟聰亮明允剛斷英特非子所及也漢建安六年郡舉上計椽魏武帝為司空聞而辟之帝知漢運方微不欲屈節曹氏辤以風痺不能起居魏武使人夜往密刺之帝堅臥不動及魏武為丞相又辟為文學掾勑行者曰若復盤桓便收之帝懼而就職於是使與太子遊處遷黃門侍郎轉議郎丞相東曹屬尋轉主簿魏國既建遷太子中庶子每與大謀輒有奇策為太子所信重與陳群吳質朱鑠號為四友遷為軍司馬言於魏武曰昔箕子陳謀以食為首今天下不耕而食者蓋二十餘萬非經國遠籌也雖戎甲未卷自宜且耕且守魏武納之於是務農積穀國用豐贍及魏武薨於洛陽朝野危懼帝綱紀喪事內外肅然乃奉梓宮還鄴魏文帝即位封河津亭侯轉丞相長史魏文受漢禪以帝為尚書頃之轉督軍御史中丞封安國鄉侯黃初二年督軍官罷遷侍中尚書右仆射五年天子南巡觀兵吳疆帝留鎮許昌改封向縣侯轉撫軍大將軍假節領兵五千加給事中錄尚書事帝固辭天子曰吾於庶事以夜繼晝無須臾寧息此非以為榮乃為分憂耳六年天子復大興舟師征吳命帝居守臨行詔曰吾深以後事為念故以委卿曹參雖有戰功而蕭何為重使吾無西顧之憂不亦可乎天子自廣陵還洛陽詔帝曰吾東撫軍當總西事吾西撫軍當總東事於是留帝鎮許昌及天子疾篤召帝與曹真陳群等見於崇華殿之南堂並受顧命輔政詔太子曰有間此三公者慎勿疑之明帝即位改封舞陽侯及孫權圍江夏遣其將諸葛瑾張霸并攻襄陽帝督諸軍討權走之進擊敗瑾斬張霸并首級千餘遷驃將軍太和元年六月天子詔帝屯于宛加督荊豫二州諸軍事初蜀將孟達之降也魏朝遇之甚厚帝以達言行傾巧不可任驟諫不見聽乃以達領新城太守封侯假節達於是連吳固蜀潛圖中國帝以書諭之達得書大喜猶與不決帝乃潛軍進討上庸城三面阻水達於城外為木柵自固帝渡水破其柵直造城下八道攻之旬有六日達甥鄧賢將李輔等開門出降斬達首傅京師俘獲萬餘人振旅還于宛乃勸農桑禁浮費南土悅附焉時邊郡新附民無名戶魏朝欲知隱實屬帝朝于京師天子訪於帝帝對曰賊以密網束下故下棄之宜弘以大綱則自然安樂又問二虜宜討何者為先對曰吳以中國不習水戰故敢散居東關凡攻敵必先扼其喉而春其心夏口東關賊之心喉若為陸軍以向皖音患城引權東下為水戰軍向夏口乘其虛而擊之此神兵從天而墮破之必矣天子並然之復命帝屯于宛四年遷大將軍加大都督假黃鉞與曹真伐蜀軍次丹口遇雨班師明年諸葛亮寇天水圍將軍賈嗣魏平於祁山天子曰西方有事非君莫可付者乃使帝西屯長安都督雍梁二州諸軍事統車騎將軍張郃後將軍費曜征蜀護軍戴凌雍州刺史郭淮等討亮遂進軍隃式朱切麋亮聞大軍直至乃自帥眾將芟音衫上邽音圭之麥諸將皆懼帝曰亮慮多決少必安營自固然後芟麥吾得二日兼行足矣於是卷甲晨夜赴之亮望塵而遁進次漢陽與亮相遇帝列陣以待之使將牛金輕騎誘之兵纔接而亮退追至祁山亮屯鹵城據南北二山斷水為重圍帝攻之拔其圍亮霄遁追擊破之俘斬萬計天子使使勞軍增封邑二年亮又帥眾十餘萬出斜谷壘于郿音眉之渭水南原天子憂之遣征蜀將軍秦朗督步騎二萬受帝節度諸將欲住渭北待之帝曰百姓積聚皆在渭南南北必爭之地也遂引軍而濟背水為壘因謂諸將曰亮若勇者當出武功依山而東若西上五丈原則諸軍無事矣亮果上原將北渡渭帝遣將軍周當屯陽遂以餌之數日亮不動遂遣將軍胡遵雍州刺史郭淮共備陽遂與亮會于積石臨原而戰亮不得進還于五丈原會有長星墜亮之壘帝知其必敗遣奇兵椅音巳亮之後斬五百餘級獲生口千餘降者六千餘人三年遷太尉累增封邑蜀將馬岱入寇帝遣將軍牛金擊走之斬千餘級四年遼東太守公孫文懿反徵帝詣京師天子曰此不足以勞君事欲必剋故以相煩耳君度其作何計對曰棄城預走上計也據遼水以拒大軍次計也坐守襄平此成擒耳天子曰其計將安出對曰唯明者能深度彼我乃能豫有所割棄此非其所及也今懸軍遠征將謂不能持久必先拒遼水而後守此中下計也天子曰往還幾時對曰往百曰還百日攻百日以六十日為休息一年足矣景初二年帥牛金明遵等步騎四萬發自京都車駕送出西明門詔弟孚子師送過溫賜以穀帛牛酒勑郡守典農已下皆往會焉見父老故舊讌飲累日帝歎息悵然有感為歌曰天地開闢日月重光遭遇際會畢力遐方將掃群穢還過故鄉肅清萬里總齊八荒告成歸老待罪舞陽遂進師經孤竹越碣石次于遼水文懿果遣步騎數萬阻遼隧堅壁而守南北六七十里以拒帝帝盛兵多張旗幟出其南賊盡銳赴之乃汎舟灒濟以出其北與賊營相逼沉舟焚梁傍遼水作長圍棄賊而向襄平賊見兵出其後果邀之乃縱兵逆擊大破之三戰皆捷賊保襄平進軍攻之初文懿聞魏師之出也請救於孫權權亦出兵遙為之聲援遺文懿書曰司馬公善用兵變化若神所向無前深為弟憂之會霖潦大水平地數尺賊恃水樵採自若朝廷聞師遇雨咸謂召還天子曰司馬公臨危制變計日擒之矣既而雨止遂合圍起土山地道楯櫓釣橦發矢石雨下晝夜攻之文懿大懼乃使其所署相國王建御史大夫柳甫乞降請解圍面縛不許執建等皆斬之文懿復遣侍中衛演乞剋日送任而守者日軍事大要有五能戰當戰不能戰當守不能守當走餘二事唯有降與死耳汝不肯面縛此為決就死也不須送任文懿攻南圍突出帝縱兵擊敗斬于梁又作沮水上時有兵士寒凍乞襦帝弗之與或曰幸多故襦可以賜之帝曰襦者官物人臣無私施也遂班師天子遣使者勞軍于薊增封食昆陽并前三縣及齊王即位遷侍中持節都督中外諸軍錄尚書事與曹爽各統兵三千人共執朝政更直殿中乘輿入殿爽欲使尚書奏事先由已乃言於天子徙帝為大司馬朝議以為前後大司馬累薨於位乃以帝為太傅入殿不趨贊拜不名劍履上殿如蕭何故事八年夏四月曹爽用何晏鄧颺丁謐之謀遷太后於永寧宮專檀朝政兄弟並典禁兵多樹親黨屢改制度帝不能禁於是與爽有隙五月帝稱疾不與政事九年春三月黃門張當私出掖庭才人石英等一十一人與曹爽為伎人爽晏謂帝疾篤有無君之心與當密謀圖危社稷期有日矣帝亦潛為之備爽之徒屬亦頗疑帝會河南尹李勝將蒞荊州來侯帝帝詐疾篤使兩侍婢持衣衣落指口言渴婢進粥帝不能持柸飲粥皆流出霑胸勝曰眾情謂明公舊風發動何意尊體乃爾帝使聲氣纔屬說年老抱疾死在旦夕君當屈并州并州近胡善為之備恐不獲相見以子師昭弟兄為託勝曰當還忝本州非并州也帝乃錯亂其辭曰君方到并州勝復曰當忝荊州帝曰年老意荒不解君言今還本州盛德壯烈好建功勳勝退告爽曰司馬公尸居餘氣形神已離不足慮矣他日又言曰太傅不可復濟令人愴然故爽等不復設備嘉平元年春正月甲午天子謁高平陵爽兄弟皆從是日太白襲月帝於是表奏永寧太后廢爽兄弟時景帝為中護軍將兵屯司馬門帝列陣闕下經爽門爽帳不督嚴世上樓引弩將射帝孫謙止之曰事未可知三注三止皆引其肘不得發大司農桓範出赴爽蔣濟言於帝曰智囊往矣帝曰爽與範內踈而智不及駑馬戀短豆必不能用也於是假司徒高柔節行大將軍事領爽營謂柔曰君為周勃矣命太僕王觀行中領軍攝羲義營帝親帥太尉蔣濟等勒兵出迎天子屯于洛水浮橋上奏曰先帝詔陛下齊王及臣升于御床楃臣臂曰深以後事為念今大將軍爽背棄顧命敗亂國典內則僣擬外專威權群官要職皆置所親宿衛舊人並見仟黜根據槃牙縱恣日甚又以黃門張當為都監專共交關伺候神器天下洶洶人懷危懼陛下便為寄坐豈得久安此非先帝詔陛下及臣升御床之本意也臣雖朽邁敢忘前言昔趙高極意秦是以亡呂霍早斷漢祚永延此乃陛下之殷鑒臣授命之秋也公卿群臣皆以爽有無君之心兄弟不宜典兵宿衛表皇太后皇太后勑如奏施行臣輒勑主者及黃門令罷爽羲訓吏兵各以本官侯就第若稽留車駕以軍法從事臣輒力疾將兵詣洛水浮橋伺察非常爽不通奏留車駕宿伊水南伐樹為鹿角發屯兵數千人以守桓範果勸爽奉天子幸許昌傳徼徵天下兵爽不能用而夜遣侍中許允尚書陳泰詣帝以觀望風旨帝數其過失事止免官泰還以報爽勸之通奏帝又遣爽所信殿中校尉尹大目諭爽指洛水為誓爽意信之桓範等援引今古諫說萬端終不能從乃曰司馬公正當欲奪吾權耳吾得以侯還弟不失為富家翁範拊膺曰坐卿滅吾族矣遂通帝奏既而有司劾黃門張當并發爽與何晏等反事乃收爽兄弟及其黨與何晏丁謐鄧颺畢軌李勝桓範等誅之二月天子以帝為丞相增封八縣邑二萬戶奏事不名固讓丞相冬十二月加九錫之禮朝會不拜固讓九錫二年春正月天子命帝立廟于洛陽帝以久疾不任朝請每有大事天子親幸弟以咨訪焉三年天子使兼大鴻臚太仆庾嶷持節冊命為相國封安平郡公固讓不受六月帝寢疾八月崩于京師時年七十三武帝受禪上尊號曰宣皇帝陵曰高原廟稱高祖虞預晉書曰上雖服膺文藝以儒素立德而雅有雄霸之量值魏氏短祚內外多難謀而鮮過舉必獨克知人拔善顯用仄陋王基鄧艾周秦賈越之徒皆起自寒門而著績於朝經略之才可謂遠矣異苑曰晉宣帝誅王陵後寢疾曰見陵逼帝呼曰彥雲彥雲陵之字也緩我身上便有打處賈逵亦為崇少日遂薨初陵既被執過賈逵廟呼曰賈梁道王陵魏之忠臣唯爾有神知之故逵助焉及永嘉之亂有覡見帝涕泗云家國傾覆是曹爽夏侯玄訴怨得伸故也爽以勢族致誅玄以時望被戮
