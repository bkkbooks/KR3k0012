body:
  text: 器物部八斧釋名曰斧甫始也凡將制器始以斧伐木己乃制之也易曰得其資斧我心不快斧所以破除荊棘以安其客舍者也不得其位不獲平砥之地雖得資斧其心不快龍魚河圖曰斧神名狂章周書曰神農作陶治斧破木為穭鋤耨以墾草莽然後五穀興詩曰析薪如之何菲斧不剋取妻如之何匪媒不得又曰蠶月條桑取彼斧斨音牆以伐遠揚又曰破斧美周公也既破我斧又缺我斨周禮曰大喪及窆執斧以莅匠師匠師主豊碑之士執斧以師之使戒其士禮曰禮諸侯賜鈇音夫鉞然後誅又曰天子負斧依南鄉而立斧依為斧文屏風於戶牖之間傳曰楚子執齊慶封將戮之負之斧鉞以徇於諸侯使言曰無或如齊慶封弒其君弱其孤以盟其大夫春秋元命苞曰斧鑕主亂行斬狂詐斧之為言補也漢書曰分周為二有逃責之臺被竊鈇之言應劭曰周赦王出至路邊竊取遇人又曰暴勝之為直指使者衣繡持斧逐捕盜賊又曰王莽司徒王尋初發長安宿霸昌廄亡其黃鉞尋軍士所王素狂直入哭曰此經所謂喪其齊音資斧者也應劭曰齊利也亡其利斧言無以復斬斷者東觀漢記曰祭遵襲略陽遣護軍王忠皆持刀斧伐樹開道又曰蔣翊字元卿後母憎之伺翊寢操斧斫之值詡如廁謝承後漢書曰會稽戴就字景成為都曹掾太守為州所奏就見伏考燒斧以著腋下就罵獄卒此無火氣何不熟燒魏志曰太祖延張繡及其將帥置酒高會太祖行酒典韋持大斧立後刃徑尺太祖所至之所韋輒舉目之繡及將帥莫敢仰視晉書曰魏舒嘗適野王主人妻夜產俄而聞車馬之聲相問曰男也女也曰男書之十五以兵死復問宿者誰曰魏公舒後十五載詣主人問所生兒何在曰因條桑為斧傷而死舒自知為公晉咸和起居注曰因有司奏魏氏故事正旦賀公卿上殿虎賁六人隨上以斧柄柱衣裙上令宜依舊為儀注詔曰此非前代善制其除之三輔舊事曰王莽夢大夏殿前五銅人語莽惡之斧斫開銅人腹東陽記曰晉中朝時有民王質者入山伐木至石室中見童子數人彈琴而歌因留跂斧柯而聽之童子以物與之狀如棗核質含之便不復飢也童子曰汝來已久宜去質承聲起斧柯漼然爛盡既歸去家已數十年列女傳曰丁仲謀妻氏共夫至交阯夫為賊所殺妻舩上得一斧舉以破賊列仙傳曰赤斧手中常有赤斧錄異傳曰陳世母黃亡後還家但聞聲世忽亡斧黃言問家奴福盜之幽明錄曰文翁常欲斷大樹欲斷處去地一丈八尺翁先祝曰吾若得二千石斧當著此處因擲之中所欲一丈八尺處後果為郡賈逵別傳曰逵廟一柏樹有人竊來斫伐始投斧數下斧刃仍折於樹中七賢傳曰文黨字翁仲與人俱入山取木謂侶人曰吾欲遠學先試投斧高木上斧當挂乃投之斧果上因之長安受經廷尉決事曰廷尉高文惠上民傅晦詣民籍牛塲上盜黍為牛所覺以斧擲折晦腳物故依律牛應棄市監棗超議晦既夜盜牛本無殺意宜減死一等六韜曰操刀不割失利之期執斧不伐賊人將來繁葉不去將為斧柯列子曰人有亡鈇者意其鄰人子視其行步竊鈇也顏色竊鈇也言語竊鈇也動作態度無為而不竊鈇也俄而於其谷而得其鈇他日復見其鄰子之動作熊度無似竊鈇矣孟子曰斧斤以時入山林材木不可勝用也荀卿子曰林木茂而斧斤至焉呂氏春秋曰孔甲田于東陽萯音倍山天大風晦孔甲迷惑入于民室主人方乳乳產也或曰后來是良日也是子必大吉或曰不勝之是子必大殃后取其子以歸曰以為余子誰敢殃之子長成莫動析音老斧破斬其足遂為太者以其無足遂使守門淮南子曰巨斧擊桐薪不待利時日而後破之又曰古之遣將尹親操斧持頭授將軍柄曰閫以外者將軍裁之說苑曰雍門周說孟嘗君以秦楚之強而報於弱薛譬猶蕭斧而伐朝菌也玄晏春秋曰鄰人亡斧及雞意予竊之居三日雞還斧又自得鄰人大愧志林曰齊斧齋當為齋凡師出必齋戒入廟受斧故云齋也抱朴子曰介象燒斧而立其上久不知熱諸葛亮教曰前後所作斧都不可用前伐鹿角壞刀斧千餘枚賴賊已走間自令作部刀斧數百枚用之百餘日初無壞者爾乃知彼主者無意宜收治之此非小事也若臨敵敗人軍事矣鋸釋名曰鋸倨也其體直所截應倨勾之正也說文曰鋸槍唐也古史考曰孟莊子作鋸史記曰公孫鞅之事孝公也設乃鋸以禁奸邪信賞罰以致理後漢書曰獻帝欲復肉刑孔融議曰雖忠如鬻奉信如楚和智如孫臏一離刀鋸沒世不齒吳志曰孫皓愛妾使人至市賊奪百姓財物同市陳聲繩之以法皓大恕假他事燒鋸斷聲頭王隱晉書曰趙王倫欲廢賈后而門鑰在侍中處所部司馬多木作有利鋸至期倫乃命三部司馬以銅鋸截關開門晉書曰胡母輔之字彥國少擅高名王澄常與人書曰彥國吐佳言如鋸木屑霏霏不絕誠為後進領袖也又中興書曰符健凶淫暴虐常露刀張弓椎鉗鋸鑿殺人之具備置左右宋書曰後廢帝名昱初在東宮惰業好嬉師主不能禁及嗣位漸自放恣晨出暮歸從者並執鋌矛加以虐刑鍼椎鑿鋸之徒不離左右莊子曰禮若亢鋸之柄亢舉也禮有所斷割猶舉鋸之柄以斷物也又曰天下好智而百姓求竭矣於是乎釿音斤鋸顓焉繩墨殺焉椎鑿決焉管子曰軍中必有一斧一鋸尸子曰水非石之鑽繩非木之鋸列女傳曰臧文仲為魯使齊齊拘之文仲使人遺公書恐人得之乃謬其詞曰臧我羊食我以銅魚公及大夫莫能知之乃問臧孫母母泣曰吾子拘有木治矣木治桔也臧我羊者臧善也羊者有母告妻善養母食我以銅魚銅魚其父錯錯者所以治鋸也鋸者所以治木是以知有木治擊於獄矣淮南子曰夏屋聯房公輸王爾無所措剖居綺切劂居月切削鋸然猶未能贍人主之欲也世說曰晉元皇初見賀司空言及吳時孫皓燒鋸截一賀頭是誰司空未復言元皇曰燒是賀邵司空流涕曰昔者先臣遭遇無道臣創巨痛深無以上荅明詔元皇慚愧三日不出衡山記曰雞頭陂西有石室有人採藥暮宿其中曉見一鋸懸在壁上示有形無復鐵貫椎說文曰椎擊也齊謂之柊音終揆音葵鐓丁回切千椎斤也纂文曰柊揆方椎崔贛易林曰亡椎失斧公輸無輔廣雅曰柊揆敤若臥切櫌鐇音煩䤶於葉切椓音卓椎也史記曰張良為韓報讎得切刀為鐵椎重百二十斤擊始皇於愽浪沙中誤中副車又曰信陵君客朱亥袖四十斤鐵椎椎晉鄙殺之奪兵以救趙戰國策曰始皇遺齊君王后連環曰齊多知能解環君王后引椎椎破之謝秦使曰謹已解矣漢書曰賈山上書曰秦王東窮燕齊南極吳楚厚築其外隱以金椎為馳道之麗至於此使其後世曾不得斜逕而託足焉又曰淮南王長怨辟陽侯之不救其母也袖金椎椎殺辟陽侯又曰中山靖王勝來朝聞樂聲而泣曰眾煦漂山聚蚊成雷明堂執虎十夫橈椎王隱晉書曰梅陶及鍾雅數說事祖納輒困之因曰君汝頴之士利如錐我幽異之士鈍如椎持我鈍椎椎君利錐皆當摧矣陶雅並稱有神錐不可得椎納曰假有神錐必有神椎吳越春秋曰夫差使力士石番以鐵椎椎殺王孫聖益州記曰市橋莋音作橋今各有一鐵椎大十許圍長六七十尺云初橋引機運此椎以擊橋柱本有三今餘二管子曰一農必有一椎莊子曰儒以詩禮發冢曰徐以金椎控其頤無傷口中珠周生列子曰昔伊尹操商栝姬公揮周機管子執齊鉞范蠡奮越椎世說曰永嘉三年中牟縣故魏任城王臺下池有漢時鐵椎長六尺入地三尺頭西南指不動桓譚上事曰孔子問屠牛曰屠牛有道乎曰刺必中解割必中理盤筋則引終葵而椎終葵方椎孫盛優劣論曰子房奮椎為天下唱義義聲既震則秦亡可知矣鑿釋名曰鑿有鑿穿鑿也說文曰鑿小鑿也通俗文曰石鑿曰鏨作澹切鑿充曰銃昌仲切小鑿曰𨬖音潺柄曰境音擎受樈曰鏓七切古史考曰孟莊子作鑿尸子曰利錐不如方鑿管子曰軍必有一鑿莊子曰齊桓公讀書堂上輪扁斲輪堂下釋椎鑿而上問桓公抱朴子曰魏明帝好聞椎鑿之聲搜神記曰陳仲舉微時常宿黃申家婦方產夜有叩門者須臾門裏言有客堂下有人不可進曰從後往須臾還留者問曰何等名可與幾歲應以何死荅曰男也名奴得十五歲當以兵死仲舉告其家父母不使執寸刃年十五有置鑿於梁者其末出奴以長木鉤取鑿墮陷腦而死
