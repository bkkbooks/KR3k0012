body:
  text: 禮儀部五祭禮下漢書郊祀志曰洪範八政三曰祀祀者所以昭孝事祖通神明也旁及四夷莫不脩之下至禽獸豺獺有祭應劭曰今孟春獺祭魚季秋豺祭獸是以聖王為之典禮焉秦襄公攻戎救周列為諸侯而居西自以為主少昊之神作西畤白帝其牲用駵駒黃牛羝羊各一云其後十四年秦文公東獵汧渭之間卜居之而吉文公夢黃蛇自天下屬地其口止於鄜衍李奇曰鄜音孚文公問於史淳淳曰此上帝之徵君其祠之於是作鄜畤用三牲郊祭白帝焉自未作鄜畤而雍旁故有吳陽武畤李奇曰於旁有吳陽地雍東有好畤皆廢無祀或曰自古以雍州積高神明之隩故立畤郊上帝諸神祠皆聚云蓋黃帝時常用事雖殷周亦郊焉其語不經見搢紳者弗道又郊祀曰始皇東遊海上行禮祠名山大川及八神求仙人羨門之屬八神將自古而有之或曰太公以來作之齊所以為齊以天齊也蘇林曰當天中央齊其祀絕莫知起時又郊祀志曰文帝始幸雍郊見五畤祠衣皆上赤趙人新垣平以望氣見上言長安東北有神氣成五采若人冠冕焉或曰東北神明之舍西方神明之墓也張晏曰神明日也日出東北舍謂陽谷日沒於西也故曰墓天瑞下宜立祠上帝以合符應於是作渭陽五帝廟同宇韋昭曰宇謂上同下異禮所謂複廟同屋也帝一殿面五門各如其帝色祠所用及儀亦如雍五畤明年夏四月文帝親拜霸渭之會以郊見渭陽五帝五帝廟臨渭其北穿蒲地溝水爟火舉而祠若光輝然屬天焉於是貴平至上大之賜累千金而使博士諸生刪六經中作王制謀議巡狩封禪事文帝出長門若見五人於道北遂因其直立五帝壇孟康曰直植也值其立處以位壇祠以五牢東觀漢記曰建武三年上幸舂陵祠園廟大置酒與舂陵父老故人為樂又曰桓譚字君山沛人章帝元和中行巡狩至沛令使者祠譚冢鄉里裏以為榮又曰李通上大司空印綬以特進奉朝請及有司奏請封諸皇子帝感通首創大謀即日封通少子雄為邵陵侯每幸南陽常遣使者以牢祀通父冢又曰顯宗拜馬嚴持兵長史將北軍五校士羽林兵三千人屯西河美稷衛護南單于聽置司馬從事牧守謁敬同之將軍勑嚴過武庫祭蚩尤帝親御阿閣觀其士眾時人榮之又曰永平中詔京兆右扶風以中牢祠蕭何霍光出郡錢穀給蕭何子孫在三百里內悉令侍祠又曰桓帝初立黃老祠北宮濯龍中以文罽為壇飾淳金釦器采色眩曜祠用三牲太官設珍饌作倡樂以求福祥漢皇德傳云章帝詔使者奉太牢致祠唐堯於成陽雲臺袁山松後漢書曰韓卓字子助陳留人臘日奴竊食祭其母卓義其心即日免之漢舊儀曰宗廟八月飲酎用九大牢元年祭天二年祭地三年祭五帝於五畤三歲一辯皇帝自行他祠不出祭天紫壇幄帷高帝配天居室下西嚮紺幄席又曰宗廟三年一大祫祭之子孫諸帝以昭穆坐於高廟神皆合食設左右坐高祖南面繡幄帳堂上西北隅曲凡黃金釦器每太牢中分之右辯上帝左辯上后俎餘委積於前殿千斤名曰堆俎子為昭孫為穆昭西曲屏風穆東面昔曲凡如高祖饌陳其右各配其左坐如祖妣之座法又曰原廟一歲十二祠有閏加皆用太牢又曰唯八月飲酎駕夕牲牛以繡衣之皇帝暮視牲以鑑燧取水於月以陽燧取火於日為明水火左祖以水沃牛右肩手執鸞刀以切牛毛血薦之而即更衣又曰五儀元年儒術奏施行董仲舒請兩事始令丞相以下求雨雪曝城南舞童女禱天神五帝五年始令諸官止雨朱繩縈社擊鼓攻之又曰祭五嶽祠用三正色牲十月涸凍二月解凍皆祭祝乘傳車稱使者祭四瀆用三正色牲況珪有馬祭人先於隴西西縣人先山皆有土人山下有畦埒如種菜畦畦中各王封祭參辰星辰於池陽谷曰夾道左右為壇營覆地各周三十六里又曰祭西王母於石室皆在所二千石令長奉祠漢五年脩復周室舊祀祀后稷於東南常以八月祭一太牢舞者七十二人冠者五六三十人童于六七四十二人為民祈農報功又曰凡聖王之法追祭天地日月星辰山川萬神皆古之人也能紀天地五行氣奉其功以成人者也故其祭祀皆以人事之禮食之所食也非祭食天與土地金木水火石也又祭三皇五帝九皇六十四民皆古帝王凡八十一姓漢末英雄記曰公孫瓚上計吏郡太守劉其以事犯法檻車徵伯珪褠衣平幘御車到洛陽其當徙日南伯珪具豚米於墓上祭先舉觴醊祝曰昔為人子今為人臣當詣日南日南多瘴氣恐或不還與先人辭於此再拜慷慨而起其時州里人在京師者送行見之及觀者莫不歔欷魏志曰管寧恒著布襦袴布裙隨時單複出入閨庭能自柱杖不須扶侍四時祠祭輒自力強改加衣服著絮巾故在遼東所有白布單衣親薦饌跪拜成禮寧少喪母不識形像常特觸如法泫然流涕又曰穢南國常用十月祭氏晝夜飲酒歌儛名之為舞天又祭虎以為神吳志曰赤烏年有兩烏銜鵲墮東館丞相朱據燎鵲以祭幹寶晉紀曰帝配饗魏太祖廟有奏諸功臣從饗者更以官為次在荀郭之上後魏書曰胡處少孤言及父母則若孺子之號燉煌汜潛家善釀酒每節常送一壺以給祭事也沈約宋書曰羊玄保自少至老謹於祭奠四時珍新未得祠薦者口不妄嘗齊書曰張冲衝永明八年為假節監青冀二州行剌史事冲父初卒遺命曰祭我必以鄉土所產無用牲物冲在鎮西時還吳國取果菜每至蒸嘗輒流涕薦焉家語曰魯公索氏將祭而亡其下牲孔子聞之曰公索氏不及二年必亡矣後一年而亡孔叢于曰元和二年春帝東巡狩還過魯幸闕里以太牢祠孔子及七十二子作六代之樂大會孔氏男子二十已上者六十三人命儒者講論尸子曰先王之祠禮也天子祭四極諸侯祭山川大夫祭五祀士祭其親也白虎通曰王者祭宗廟親自取禽者尊重先祖必欲自射加功力又曰王制曰春薦韭夏薦麥秋薦黍冬薦稻韭以卵麥以魚黍以豚稻以鴈春曰祠者物微故祠名之夏曰礿者麥熟進之秋曰嘗者新穀熟冬曰蒸蒸者為眾冬之時物成者眾益都耆舊傳曰蜀郡張寬字叔文漢武帝時為侍中從祀甘泉至渭橋有女子浴於渭水乳長七尺上怪其異遣問之女曰帝後第七車知我所來時寬在第七車對曰天星主祭祀者齋戒不嚴則女人星見汝南先賢傳曰薛苞歸先人冢側坊中種稻以祭祀芋以充飢躭詩悅禮玄虛無為舉孝廉賢良方正皆不就王歆之神境記曰九疑山既出林過溪望見舜廟在郡山之下而插搆水際杳若靈居矣余親負勁策致祠靈堂乃躬就齋潔奉奠其宵水月如鏡焉澗微響乃聞廟裏若有絃歌者聲調如近察復緬邈此其五絃之音南風之響乎解道虎齊記曰臨淄城南十五里天齊淵五泉並出有異於常故廟屋以同瓦有天齊字在齊八祠祠天於此故名云越絕書曰越王既得平吳春祭三江秋祭五湖因以其時為之立祠垂之來世傳之萬載鄰邦樂德皆來取之吳越春秋曰夫差帥諸群臣出國東祠子胥江水濱諸臣並在夫差乃言曰寡人蒙先王之遺恩為千乘之主昔不聽相國之言乃用讒佞之辭至令相國遠沒江海自亡已來濛濛惑惑如霧蔽日莫誰與言泣下沾衿哀不自勝左右群僚莫不悲傷十二州記曰昔禹治洪水既畢乃乘橋車到鍾山祠上帝於北河歸大功於九河也襄陽記曰諸葛亮初亡所在各求為立廟朝議以不合百姓遂因時節私祭之於道陌也摯虞雜祀議曰故事祀皋陶於廷尉寺祭先聖於大學也桓子新論曰昔楚靈王驕逸輕下簡賢務鬼信巫祝之道齋戒潔鮮以祀上帝禮群神躬執羽紱起舞壇前吳人來攻其國人告急而靈王鼓舞自若顧應之曰寡人方祭上帝樂明神當蒙福祐焉不敢赴救而吳兵遂至俘獲其太子及后姬以下甚可傷論衡曰魯文公逆祀去者三人定公順祀叛者五人貫於俗者謂則禮為非曉禮者寡則知是者稀又曰凡祭祀之義有二一曰報功二曰循先報功以勉力循先以崇恩也黃帝問玄女兵法曰六甲將及夫人姓名服色曰其將皆著赤幘小冠帶白綬絞夫人足皆各象其禽獸足凡欲治致神當於帛上書諸神名如法祭蔭齊事六曰見形六十日一祭合諸神祭之祭法脯長一九廣三寸白茅為籍編以青絲籍長二尺四寸廣六寸餅棗栗并脯置藉上柸皆黑中以丹沙九兩盛米囊九枚置北斗座上中為九星六甲坐外四面十二座座前一柸受道者壇東北祭南向再拜祝軍令曰金鼓幢麾隆衡皆以立秋日祠先時一曰主者請祠其主者奉祠若出征有所剋獲還亦祠向敵祠血于鍾鼓秋祠及有所剋獲還但祠不血鍾鼓祝文某官使主者某敢告隆衡金鼓幢麾夫軍武之器者所以正不義為民除害也謹以立秋之日潔牲黍稷旨酒而敬薦之又曰常以己丑日祠牛馬先祝文曰某月己丑某申敢告馬牛先馬者兵之道牛者軍農之用謹潔牲黍稷旨酒敬而薦之又曰軍行濟河主者常先白沈壁文曰某王使者某甲敢告于河賤臣某甲作亂天子使某帥眾濟河征討醜類故以壁沉唯爾有神裁之曹植求祭先王表臣雖比拜表自計違遠已來以踰旬日垂竟夏節方到臣悲感有念先王公以夏至日終是以家俗不以夏日祭至於先王自可以令辰告祠臣雖卑鄙實稟體於先王自臣雖貧窶蒙陛下厚賜足供太牢之具臣欲祭先王於北河之上羊豬牛臣自能辦否者臣縣自有先王喜鰒臣前以表得徐州臧霸二鰒百枚足自供事請水瓜五枚計先王崩來未能半歲臣實欲告敬且欲復盡哀博士鹿優韓蓋等以為禮公子不得禰先君公子之子不得祖諸侯謂不得立其廟而祭之也禮又曰庶子不得祭宗詔曰得月二十八日表知侯推情欲祭先王於河上覽省上下悲傷感切將欲遣禮以紓侯敬恭之意會博士鹿優等奏禮如此故寫以下開國承家顧迫禮制惟侯存心與吾同之殷允祭徐孺子文曰惟太元六年龍集荒洛冬十月哉生魄試守豫章太守殷君謹遣左右某甲奉清酌薌合一簋單羞再拜奠故聘士豫章徐先生周祗祭梁鴻文曰晉隆和四年十一月陳郡周穎文以蘊藻行潦祠梁先生殷闡祭王東亭文曰公以少牢之奠敬薦東亭王侯之靈蓋聞朗鑒不塵精金能照伯玉祭孫叔敖文曰謹以豊羞祭楚令尹孫君之靈眇眇千載悠悠舒荊理無不通事隔者形尚想清塵承風效誠謝惠連祭古冢文曰東府掘城北壍入一丈餘得古冢上無封域不用塼瓦以木為槨中有二棺正方兩頭無和明器之屬材瓦銅漆有數十種刻木為人長三尺可有二十餘載開見悉識是人形以物棖撥之應手灰滅棺上有五銖錢百餘枚水中有甘蔗節及梅李核皆浮出而不甚爛壞銘志不存世代不可得而知之公命城者改埋於東崗祭以豚酒既不知其名字近遠故假為之號曰冥寞君云爾楊泉請辭曰古不墓祭葬於中原而廟在大門裏不敢外其親平明出葬曰中反虞不敢一日使神無依也周衰禮廢立寢於廟墓漢因而不改以先帝衣冠四時上盥水進菓實而禘祫祭祀皆於宗廟及其末因寢之在墓咸往祭焉蓋由京師三輔酋豪大姓力強財富婦女贍侈車兩相追宿止墓下連日厭飫遂以成俗迄乎今日夫死者骨肉歸乎土神而有靈豈其守夫敗壤而繫乎草莽哉唐書曰王義方初為太子校書魏徵張亮皆厚禮之亮誅坐與交遊貶授儋州吉安丞行至南海舟人將以酒脯致祭義方曰黍稷非馨義在明德乃酌水而祭
