body:
  text: 車部五轍左傳曰齊師敗績公將馳之曹劌居衛切曰未可下視其轍登而望之曰可矣遂逐齊師既克公問其故對曰夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之又曰昔穆王欲肆其心周行天下特皆必有車轍馬跡焉漢書曰戶牖富人張負有女五嫁而夫輒死人莫敢娶陳平欲得之負至平家乃負郭窮巷以席為門然門多長者車轍負歸謂子仲曰固有美如陳平而長貧賤者乎卒與之女老子曰善行無轍跡莊子曰汝不知螳蜋怒臂當車轍不知不勝其任也又曰莊周貸粟于監河侯曰我將得邑金貸子三百周曰有中道而呼者周視車轍中有鮒魚焉子何為耶對曰我東海之波臣也君豈有升斗之水而活我哉餘具魚門中劉伯倫酒德頌曰有大人先生以天地為一朝萬期為須臾日月為戶牖八荒為庭衢行無轍跡居無室廬幕天席地縱意所如謝靈運送孔令詩曰河流有急瀾浮驂無蹊轍豈伊川途念宿心愧將別顏延年贈王太常詩曰林閭時晏開亟迴長者轍陸韓卿荅兄希升詩曰駿足思長坂柴車畏危轍傅武仲舞賦曰或踰埃赴轍霆駭電滅軸說文曰軸持輪也周禮曰軸有三理一者以為媺音美也二者以為久也三者以為利也媺無節目也久堅刃心利滑密也釋名曰軸複也重複非一之言也左傳曰齊侯執陽虎將東之陽虎願東陽虎欲西奔晉如齊必反己故許以東為願也及囚諸西鄙盡借邑人之車鍥若結切其軸麻約而歸之鏤刻也欲絕追者載葱音䆫靈寢於其中而逃葱靈輜車名追而得之囚於齊又以葱靈奔宋遂奔晉適趙氏史記曰淳于髡曰狶膏棘軸所以為滑也然不能運方穿漢書曰臨江閔王榮立為太子廢為臨江王坐侵廟壖地為宮上徵榮榮行祖於江陵北門既上車軸折車廢江陵父老涕泣竊言曰吾王不反矣轂詩曰文茵暢轂駕我騏馵周禮曰轂也者以為利轉也凡斬轂之道必矩其陰陽陽也者稹音奠理而堅陰也者䟽理而柔是故以火養其陰而齊諸其陽則轂雖敝不藃音耗轂小而長則祚鋤革切大而短則擊音致又曰行澤者欲短轂行山者長轂短轂則利長轂則安左傳曰楚子與若敖戰皋許射汰輈以貫笠轂穀梁傳曰長轂五百乘緜地千里長轂兵車四馬曰乘春秋考異郵曰黃池之會滕薛扶轂魯衛參乘後漢書曰崔駰字亨伯涿郡安平人祖母師氏能通經學百家之言王莽寵以殊禮賜號義成夫人金印紫綬文軒丹轂顯於新代老子曰三十輻共一轂當其無有車之用桓譚新論曰楚之郢都車掛轂民摩肩市路相交號為朝衣新而暮衣弊左太冲蜀都賦曰累轂疊跡叛衍相傾張平子東京賦曰乘軒並轂又曰䟽轂飛軨又公讌詩曰神飆接丹轂輕輦隨風移沈休文餞呂僧珍詩曰持轂二崤道楊斾九河陰輻易曰輿說輻夫妻反目說音脫周禮曰輪人為輪斬三材必以其時三材轂輻牙輻也者以為直指也望其輻欲其揱音消爾而纖也進而眡音視之欲其肉稱也參分其轂長二在外一在內以置其輻凡輻量其鑿深以為輻廣而鑿淺則是以大枕雖有良工莫之能固鑿深輻小則是固有餘而強不足故竑音宏其輻廣以為之弱則雖有重任轂不折參分其輻之長而殺音肢其一則雖有深泥亦弗溓讀如黏漢書曰李陵擊匈奴矢盡斬車軸而持之輞釋名曰輞羅也周輪其外周禮曰輪人為輪斬三材必以其時三材轂輻牙也牙讀如迓也間或謂之輞牙也者以為固抱也凡揉而首切牙外不廉而內不挫旁不腫謂之用火之善廉絕也挫所也腫廆也是故規之以眡其圜音員也萬音矩之以眡其匡也又曰六分其輪崇以其一為之牙圍叄分其牙圍而漆其二不漆其踐地者軛續漢書曰文虎伏軾龍道衡軛齊書曰吳興有項羽神護郡廳事太守不得上太守到郡必須祀以軛下牛李安民奉佛法為太守到郡不與神牛著屐上廳事又於廳上入關齊俄而牛死葬廟側今呼為李公牛韓詩外傳曰武王伐紂到邢丘軛折為三天雨三日不休武王召太公而問之曰未可伐乎太公曰不然軛折為三者軍當分為三也天雨三日欲洒吾兵也韓子曰鄭縣人得車軛不知其名問人人曰此車軛也俄得一人復問對曰此車軛也問者大怒曰曩者車軛今又車軛是何眾也遂與鬭屐釋名曰屐似人履又曰伏菟在軸上似之也輨說文曰輨軨轂端錔也枕釋名曰枕撗在前若臥床之有枕方言曰軫謂之枕郭璞曰車後橫木周禮曰車軫四尺謂之一等戈祕音必六尺有寸既建而迆音移崇於軫四尺謂之二等六分其廣以一為之軫圍參分軫圍去一以為式圍五分其軫間以其一為之軸圍軫之方象地也軾周禮曰參分軫圍去一以為式圍參分式圍去一以為較圍釋名曰軾式也式所敬者左傳曰齊與魯戰于長勺齊師敗績公將馳之曹劌曰未可下視其轍登軾而望之曰可矣又曰子玉使鬭勃請戰曰請與君之士戲君憑軾而觀得臣與寓目焉又曰叔山冉搏人以投中車折軾晉師乃止又曰長狄喬如之首眉隱於軾漢書曰酈生憑軛軾下齊七十二城宋玉九辨云倚結軫兮太息涕潺湲兮霑軾箱方言曰箱謂之輫音斐詩曰睆彼牽牛不以服箱通俗文曰車箱曰較音角風俗通曰車一曰兩相與為體也原其所以言兩箱轅及輪兩而耦故稱兩耳轙爾雅曰載轡謂之轙郭璞曰車軛上環轡所貫轊說文曰轊車軸端也杜林說轂錔也方言曰車轊齊謂之𨏠鮑明遠蕪城賦曰當昔全盛之時車挂轊人駕肩廛音鄽閈樸地歌吹沸天環釋名曰游環在休馬背上驂馬之外轡貫之游移前卻無常處爾雅曰與環謂之捐徐絹切郭璞曰著車眾環詩曰游環脅驅釭說文曰釭轂之鐵也方言曰車釭燕齊海代之間謂之鐹音戈或謂之錕自關而西謂之釭錕音袞續搜神記曰鄭茂病亡殯殮訖未得葬忽然婦及家人夢茂云巳未應死偶悶絕耳可開棺出我燒車釭以熨頂頭如言乃活轄釋名曰轄害也車之急害也詩曰出宿干干飲餞于言載脂載舝還車言邁舝與轄同左傳曰諸侯賓至甸設庭燎僕人巡宮車馬有所賓從有侍巾車脂轄隸人牧圄各贍其事漢書曰陳遵嗜酒每大飲賓客滿堂輒閉門取客車轄投井中雖有急終不能去蔡邕獨斷曰乘輿之車皆副轄副轄者施轄於外乃服設轄銘曰載馳非轄不行臨政誤教非賢不明張平子東京賦曰重輪貳轄䟽轂展軨潘正叔贈陸機詩云星陳夙駕載脂載轄鍊釋名曰鍊簡也鍊釭軸之間使不相忘輠釋名曰輠褁也褁軹也軹指見於轂頭禮曰叔孫武叔朝見輪人以杖關轂而輠輪者以是有爵而后讀如前後之後杖也餘具輪事注中史記曰淳于髡齊人也愽聞彊學其諫說慕晏嬰之為人然而秉意觀色為務故齊人謂之炙輠輠者之盛膏者炙之不盡猶有餘流言髡之智不盡如炙輠當通俗文曰車當謂箳步輕切篂郭林宗別傳曰宿仲琰為部從事嘗柴車駕牛編荊為當蓋周禮曰輪人為蓋達常圍二寸達常盍斗扛入丘中也上欲尊而宇欲卑上近部平者也隤下瓦宇上尊而宇卑則吐水是疾而霤蓋者主為兩設也蓋已崇則雖為門也蓋已卑是蔽目也是故蓋崇十尺良蓋弗冒弗紘殷敏而馳不隊謂之國工蓋之圜也以象天也蓋弓二十有八以象星也方言曰蓋在上如屋舍之復蓋蔡邕獨斷曰乘輿車皆黃蓋者並以黃為裏也董卓別傳曰卓諷朝廷使光祿宣璠持節拜卓為太師位諸侯上引還長安百官迎路拜揖卓遂僣擬車服乘金華青蓋畫兩輪時人號為竽摩車轑釋名曰轑似弓曲也說文曰轑蓋弓也淮陽名車穹周禮曰弓鑿廣枚鑿上二枚鑿下四枚弓轑也鑿深二寸有半下庇軹五尺謂庇輪四尺謂之庇軫參分弓長而揉其一以為尊之蓋之二十有八以象星也杠周禮曰輪人為蓋達常圍三寸桯音楹蓋杠也信其桯圍以為部廣六寸部長二尺桯長倍之四尺者二杠長八尺謂達常以下也加達常二尺則蓋高一丈也覆笭釋名曰笭撗在車前織竹作之空笭笭也廣雅曰覆笭謂之辟枸心廣雅曰從下枸軸也通俗文曰軸限者謂之枸較周禮曰參分式圍去一以為較圍去一以為軹圍釋名曰其較重卿所乘也幰通俗文曰張布曰幰儀制令曰諸車一品青油纁道幰朱裏朱絲絡網三品以上青道幰朱五品以上青徧幰碧裏六品以下皆不得用幰鹵簿令曰安車紫油通幰紫油纁朱裏四望車青油通幰青油纁並朱絲絡網后及皇太子車幰並准此風土記曰周禮以拂拭車一義謂施嚴惟幰潘岳籍田賦曰微風生於輕幰纖埃起乎朱輪潘尼書曰朝從長塗暮栖所集歸雲乘幰浮悽風尋惟入䋺釋名曰䋺道也在後道曰使不得卻縮也王隱晉書曰山濤為尚書有人題曰閣中有大牛王齊鞅裴揩鞦和嶠踖踧不敢休茵釋名曰茵車中所坐也用虎皮有文采詩曰陰靷鋈音沃續文茵暢轂駕我騏馵音注漢書曰邴吉為丞相馭吏嗜酒數逋蕩逋亡也蕩放也謂亡其所供之職而漸放也常從吉出醉歐丞相車茵上西曹主吏白欲斥之吉曰以醉飽之失去士使此人復何所容西曹但忍之此不過汙丞相車茵爾遂不去也
