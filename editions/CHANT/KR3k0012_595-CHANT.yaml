body:
  text: 文部十章表釋名曰下言上曰表思之於內施於外也李充翰林論曰表宜以遠大為本不以華藻為先若曹子建之表可謂成文矣諸葛亮之表劉主裴公之辭侍中羊公之讓開府可謂德音矣文心雕龍曰堯咨四岳舜命八元並陳詞帝庭匪假書翰然則敷奏以言即章表之義也至太甲既立伊尹書戒思庸歸亳又作書以讚文翰事斯見矣降及七國未變古式言事於主皆稱上書秦初定制改書曰奏漢初定制則有四品一曰章二曰奏三曰表四曰駮議章以謝恩奏以案劾表以陳請議以執異章者明也詩云為章于天謂文明也其在文物青赤曰章表者摽也禮有表記謂德見于儀其在器式揆景曰表表章之目蓋取諸此也案七略蓻文謠詠必錄章表奏議經國樞要然闕而不纂者乃各有故事布在職司也前漢表謝遺篇寡存及後漢察舉必試章奏左雄表議臺閣為式胡廣章奏天下第一並當時之傑筆也觀伯始謁陵之章足見其典文美焉昔文受策三辭從命是以漢末讓表以三為斷曹公稱表表不止三讓又勿得浮華所以魏初章表指事造實求其靡麗則未足矣如文舉之薦禰衡氣揚采飛孔明之辭後主志盡文壯雖華實異旨並表之英也琳瑀章表有譽當時孔璋稱健則其摽也陳思之表獨冠群才觀其體贍而律調辭清而志顯應物製巧隨變生趣執轡有餘故能緩急應節矣迨晉初筆札則張華為儁其三讓公封理同辭要引義比事必得其偶及羊公之辭開府有譽於前談庾公之讓中書信美於往載序志聯類有文雅焉劉琨勸進張駮自敘文致耿介並陳事之美表也原夫章表之為用所以對揚王庭照明心曲既其身文且亦國華章以造闕風矩應明表以致策骨采宜耀循名課實以文為本者也是以章式炳賁志在典謨使典而非略明而不淺表體多苞情位屢遷必雅義以扇其風清文以驅其麗然懇惻者辭為心使浮侈者情為文出必使繁約得正華實相勝脣吻不滯則中律矣子貢云心以制之言以結之蓋一辭意也東觀漢記曰馬援征尋陽山賊上書除其竹林譬如嬰兒頭多蟣虱而剔之書奏上大悅出尚璽書數日黃門取頭虱章持入張璠漢記曰周舉上書言得失尚書郭度見之歎息上䟽願退位避舉常置其章於坐吳志曰東萊太史慈字子義為郡奏曹史會郡與州有隙先聞者為善時州章已出郡守選慈以行至洛詣公車見州吏欲始通章慈曰章題署得無誤耶取視之先懷書刀截敗其章因共亡去遁還通章州遂受短由是知名晉書曰樂廣善清言而不長於筆將讓尹請潘岳為表岳曰當得君意廣乃作二百句語述己之志岳因取次比之便成名筆時人咸云若廣不假岳之筆岳不取廣之旨無以成斯美也後魏書曰董紹傳孝武崩周文與百官推奉文帝上表勸進令呂思禮薛憕作表前後再奏帝尚執謙衝不許周文曰為文能動至尊唯董公耳乃命紹為第三表操筆便成表奏周文曰開進人意亦當如此也又曰胡方回為北鎮司馬為鎮脩表有所稱慶世祖覽而嗟美問誰所作既知方回召為中書博士賜爵臨涇子又曰邢劭善屬每一文初出京師為之紙貴讀誦俄遍遠近于時袁翻與范陽祖瑩位望通顯文筆之美見稱先達以劭藻思華贍深共嫉之每洛中貴人拜職多憑劭為謝章表嘗有一貴勝初授官大事賓食翻與劭俱在坐翻意主人託其為讓表遂命劭作之翻甚不悅每告人云邢家小兒常客作章表自買黃紙寫而送之劭恐為翻所害乃辭以疾北齊書曰盧詢祖有術學文章華美為後生之俊舉秀才至鄴趙郡李祖勳嘗宴諸文士齊文宣使小黃門勑祖勳曰蠕蠕既破何無賀表使者佇立待之諸賓皆為表詢祖俄頃便成其詞云昔十萬橫行樊將軍請而受屈五千深入李都尉去以不歸時重其工三國典略曰周武帝下令上書者並為表於皇太子已下稱啟後周書曰柳慶領記室時北雍州獻白鹿群臣欲草表陳賀尚書蘇綽謂慶曰近代已來文章華靡逮于江左彌復輕薄洛陽後進祖述不已相公柄民軌物君職典文房宜製此表以革前弊慶操筆立成辭兼文質綽讀而笑曰枳橘猶自可移況才子也隋書曰魏楊遵彥命李德林製讓尚書令表援筆立成不加治點因大相賞異以示吏部郎中陸卬云已見其文筆浩浩如河之東注比來所見後生制作乃涓澮之流耳邛仍命其子乂與德林周旋戒乂汝每事宜師此人以為模楷唐書曰令狐楚為太原掌記鄭儋在鎮暴卒不及指撝後事軍中喧譁將欲有變中夜忽數十騎持刃迫楚至軍門諸將逼之令草遺表楚在白刃之中搦管立成讀示三軍無不感泣由是名聲益重典論曰陳琳阮瑀之章表書記今之俊也魏文帝與吳質書曰孔璋章表殊健微為繁富世說曰司馬景王令中書令虞松鬆作表再呈輒不可意令松更定松思竭不能改心存之形於顏色鍾會察其憂問松松以實荅會取為定五字松悅服以示景王景王曰不當爾耶誰所定也曰鍾會向亦欲啟之會公見問不敢饗其能王曰如此可大用可令來會平旦入見至二鼓乃出出後王獨拊手歎息曰此真王佐材也博物志曰漢承秦法群臣上書皆云昧死王莽慕古法改曰稽首光武因而不改朝臣曰稽首輕宜稽首再拜奏陸士衡文賦曰奏平徹以閑雅漢書雜事曰秦初之制改書為奏又曰群臣奏事上書皆為兩通一詣后一詣帝凡群臣之書通於天子者四品一曰章二曰奏三曰表四曰駮議文心雕龍曰昔陶唐之臣敷奏以言秦漢附之上書稱奏陳政事獻典儀上急變劾愆謬揔謂之奏奏者進也敷于下情進乎上也秦始皇立奏而法家少文觀王綰之奏德辭質而義近李斯之奏驪山事略而意誣故無膏潤形於篇章矣自漢來奏事或稱上䟽儒雅繼踵殊采可觀若夫賈誼之務農晁錯之兵術匡衡之定郊王吉之勸禮溫舒之緩獄谷永之陳仙理既切至辭亦通辦可謂識大體矣後漢群臣嘉言罔伏楊秉耿介於災異陳蕃憤懣於尺一骨骾得焉張衡指摘於史讖蔡邕銓列於朝儀博雅明焉魏代名臣文理迭興若高堂天文黃觀教學王朗節省甄毅考課亦盡節而知治矣晉氏多難世交屯夷劉頌殷勤於時務溫嶠懇惻於費役並體國之忠規矣夫奏之為筆固以明允篤誠為本辯析踈通為首強志足以成務博見足以窮理酌古御今治繁揔要此其體也典略曰王粲才既高辯鍾繇王朗等雖名為魏相至於朝廷奏議皆閣筆不敢措手唐書曰文宗嘗謂侍臣曰近日諸侯章奏語太浮華有乖典實宜罰掌書記以誡其流李石曰古人因事為文今人以文害事懲獘抑末實在其地之盛時論衡曰谷子雲唐子高章奏百上筆有餘力劾奏文心雕龍曰案劾之奏所以明憲清國昔周之太僕繩愆糺繆奏有御史職主文法漢置中丞揔司案劾故位在鷙擊砥礪其氣必使筆端振風簡上凝霜者也觀孔光之奏董賢則實其奸回路粹之奏孔融則誣其釁惡名儒之與儉士固殊心焉若夫傅咸果勁而辭案堅深劉隗切正而劾文闊略各有志也後之彈事迭相斟酌惟新日用而舊淮不羗然甲人欲全矢人欲傷術在糺惡勢入剛峭詩剌讒人投畀豺虎禮疾無禮方之鸚猩墨翟非儒目以羊彘孟軻譏墨比諸禽獸詩禮儒墨既其如此奏劾嚴文孰云能免是以近世為文競於詆訶吹毛取瑕剌骨為戾覆似善詈多失折衷若能闢禮門以懸規摽義路以植矩然後踰墻者折肱捷徑者滅跡何必躁言醜句詬病為巧哉是以丘範運衡宜明體惡必使理有典刑辭有風軌揔法家之裁秉儒家之文不畏強禦氣留墨中無縱詭隨聲動簡外乃稱絕席之雄直方之舉也晉書曰何曾嘉平中為司隸校尉撫軍校事尹橫憑寵作威奸利盈積朝野畏憚莫敢言者曾奏劾之朝廷稱焉又曰敬思王怡字元愉少拜散騎侍郎累遷散騎常侍黃門郎御史中丞值海西廢簡文帝登祚未解嚴大司馬桓溫屯中堂吹警角恬奏劾溫大不敬請科罪溫視奏歎曰此兒乃敢彈我也又曰劉毅以孝廉辟司隸都官從事京邑肅然毅將彈河南尹司隸不許曰攫獸之犬鼷蹈其背毅曰既能攫獸不能殺鼠何損於犬投傅其背而去南史曰徐陵為御史中丞時安成王頊為司空以帝弟之尊權傾朝野直兵鮑僧叡假王威風抑塞辭訟大臣莫敢言陵乃奏彈之文帝見陵服章嚴肅若不可犯為歛容正坐陵進讀奏狀時安成王殿上侍立仰視文帝流汗失色陵遣殿中侍史引王下殿自是朝廷肅然隋書曰郎茂為尚書左丞時工部尚書宇文愷左翊衛大將軍于仲文競河東鋃窟茂奏劾之曰臣聞貴賤殊禮仕農異業所以人知局分家識廉恥宇文愷位望已隆祿錫優厚拔葵去職寂爾無聞求利下交曾無愧色仲文大將宿衛近臣趨侍階庭朝夕聞道虞芮之風抑而不慕分銖之利知而必爭何以貽範庶寮示民軌物若不糺繩將虧政教愷與仲文竟坐得罪唐書曰顯慶中中書侍郎李義府恃寵用事聞婦人淳于氏有美色坐事繫大理乃訊大理寺丞畢正義枉法出之將納為妾或有密言其狀者上令給事中劉仁軌待御史張倫鞠義府義府恐洩其謀遂逼正義自縊於獄中上知而特原義府之罪侍御史王義方對仗叱義府令退義府願望不肯退義方三叱上既無言義府始趨出義方乃讀彈文曰義府請託公行交遊群小貪冶容之美好原有罪之淳于恐漏洩其謀殞無辜之正義雖挾山超海之力望此猶輕迴天轉日之威方斯更劣此而可恕孰不可容金風戒節玉露啟途霜簡與刑典共清忠臣將鷹鸇並擊請除君側少荅鴻私碎首玉階庶明臣節伏請付法推斷以申典憲上以義府有定策之功特釋而不問義方以毀辱大臣貶為萊州司戶參軍初義方謂其母曰姦臣當路懷祿而曠官不忠老母在堂犯難以危身不孝進退惶惑所以未能決也母曰吾聞王陵母自殺以成子之義汝若事君盡忠立名千載吾死不恨也及義方將赴萊州義府謂之曰王學士得御史是義府所舉今日之事豈無愧乎對曰義方為公不為私昔孔子為魯司寇七日誅少正卯於兩觀之下今義方任御史旬有六日不能除姦臣於雙闕之前實以為愧又曰元和十二年御史臺奏請知彈御史被彈即向下承次監奏或有故不到即殿中侍御史於侍御史下立以備其闕臣伏以朝官入閤失儀知彈侍御史先合彈奏若彈奏失錯向上侍御史及中丞大夫遞相彈奏奏畢復入本班侯監奏出閤然合待罪此乃殿庭舊制於事為宜今若移一殿中於知彈侍御史下防向上數人失錯如或殿中自錯則又更立何人只合知彈御史便了不必更羗殿中況乖故實終慮駮雜伏請自今已後依閤內故事縱知彈御史自有錯失不被彈奏候班退監奏畢然後出待罪冀從易永得遵行從之駮奏李充翰林論曰駮不以華藻為先世以傳長虞美奏駮事為邦之司直矣晉書嵇紹傳曰陳淮薨太常奏謚紹駮曰謚號所以垂之不朽大行受大名細行受細名文武顯於功德靈厲表其闇蔽自頃禮官恊情謚不依本准謚為過宜謚曰繆事下太常時雖不從朝廷憚焉唐書曰許孟容遷給事中論駮無所憚貞元末方鎮殂歿其主留務判官雖不得代位亦例皆超擢𥧲以為常十八年浙東判官武試大理評事齊揔由是拜衢州剌史孟容以揔無出人才一旦超為郡守非舊制也封還詔書時久絕論駮及孟容舉職班行為之惴恐德宗開悟召對慰勉遂寢其事又曰李藩為給事中制勑有不可遂於黃勑後批之吏曰宜別連白紙藩曰別以白紙是文狀豈曰批勑也
