seq: 33
front:
  text: 時序部十七七月十五日荊楚歲時記曰七月十五日僧尼道俗悉營盆供諸寺按盂蘭盆經云有七葉功德並幡花歌鼓果食送之蓋由此也又盂蘭盆經曰目連見其亡母生餓鬼中即缽盛飯往餉其母食未入口化成火炭遂不得食目連大叫馳還白佛佛言汝母罪重非汝一人柰何當須十方眾僧威神之力至七月十五日當為七代父母危難中者具百味五果以著盆中供養十方大德佛勑眾僧皆為施主呪願七代父母行禪定意然後受食是時目連白佛未來世佛弟子行孝順者亦應奉盂蘭盆供養佛言大善故後代人因此廣為華飾乃至刻木割竹飴蠟綵鏤繒摸花葉之形極工妙之巧道經七月十五日中元之節地官校閱搜選眾人分別善惡諸天聖眾普詣宮中簡定劫數人鬼簿錄餓鬼囚徒一時俱集以其日作玄都大齋獻於玉京及採諸花果世間所有奇異之物玩弄服飾幡幢寶蓋莊嚴供養之具清膳飲食百味芬芳獻諸眾聖及與道士於其日夜講誦是經十方大聖高詠靈篇囚徒餓鬼當時解脫一俱飽滿免於眾苦得還人中若非如斯難可拔贖唐書曰代宗七月望日於內道場造盂蘭盆飾以金翠所費百萬又設高祖已下七聖神座備幡節龍傘衣裳之制各書尊號于幡上以識之舁出內庭陳於寺觀是日排儀仗百寮序立於光順門以俟之幡花鼓舞迎呼道路歲以為常而識者嗤其不典唐楊盈川盂蘭盆賦曰渾元告秋羲和奏曉太陰望兮圓魄皎閶闔開兮涼風嫋四海澄兮百川皛陰陽肅兮天地窅掃離宮清重閣設一皇邸張翠幕鸞飛鳳翔睒暘倏爍雲舒霞布翕赫曶霍陳法供飾盂蘭壯神功之妙物何造化之多端青蓮吐而非夏頳果搖而不寒銅鐵鈆錫璆琳瑯玕映以甘泉之玉樹冠以承露之金盤憲章三極儀形萬類上寥廓法天下安貞兮象地殫怪力窮神異少君王子掣曳兮若來玉女瑤姬翩僊兮不至鳴鷫鸘與鸑鷟舞鶤雞與翡翠毒龍怒兮赫然狂象奔兮沉醉怖魍魎潛魑魅离婁明目不足見其精微匠石洗心不足微其奧祕繽繽紛紛氛氛氳氳五色成文若榮光休氣發彩於重雲蒨蒨粲粲煥煥爛爛三觀壯麗若合璧連珠耿曜於長漢夫其遠也天台嵥起繞之以赤霞夫其近也削城孤峙覆之以蓮晃兮瑤臺之帝室赩兮金闕之仙家其高也上諸天於大梵其廣也遍法界於常沙上可以薦元符於七廟下可以納群動於三車九月九日續齊諧記曰汝南桓景隨費長房遊學累年長房謂之曰九月九日汝家當有災厄宜急去令家人各作絳囊盛茱萸以繫臂登高飲菊花酒此禍消景如言舉家登山夕還見雞牛羊一時暴死長房聞之曰此可以代矣今世人每至九月九日登高飲酒婦人帶茱萸囊因此也晉書曰孟嘉為桓溫參軍既和而正溫甚重之九月九日溫遊龍山僚屬畢集風吹嘉帽落不覺如廁孫盛時在坐溫授紙筆命嘲之著嘉坐處嘉歸見之笑而請紙即荅了不容思言速成續晉陽秋曰陶潛九月九日無酒宅邊東籬下菊叢中擿盈把坐其側未幾望見白衣人至乃王弘送酒也即便就醉而後歸又曰寧康三年九月九日上嘗講孝經謝安侍坐陸納并卞躭執讀謝石袁宏並執經車狷王溫摘句南齊書曰高祖以九月九日登高飆館在孫陵寺崗世呼為九日臺在縣北三里一百步當孫陵崗曲街也又曰南齊以九月九日馬射或說秋金氣講習武事象漢立秋之禮又曰宋武帝為宋公在彭城九月九日出項羽戲馬臺至今相承以為故事荊楚歲時記曰九月九日四民並籍野飲讌杜公瞻云九月九日宴會未知起於何代然自漢世來未改今北人亦重呼節近代多宴設於臺榭風土記曰九月九日律中無射而數九俗於此日以茱萸氣烈成熟尚此日折茱萸房以插頭言辟惡氣而禦初寒西京雜記曰漢武帝宮人賈佩蘭九月九日佩茱萸食餌飲菊花酒云令人長壽蓋相一傳自古莫知其由豫章記曰龍沙在郡北帶江沙甚潔白高峻而陂有龍形俗為九日登高處又曰郡北龍沙九月九日所遊宴處其俗皆然也案南陽酈縣有菊水民居其側者壽並百二三十歲漢時劉寬袁隗嘗臨此郡月致三十斛水以自供續搜神記曰有一書生居吳自稱胡愽士以經傳教授假借諸書經傳年載忽不復見後九日人相與登山遊觀但聞講誦聲尋覔有一空塚入數步群狸羅坐見人迸走唯有一狸獨不能去是常假書者集異記曰明皇天寶十三年重陽日獵於沙苑雲間有孤鶴佪翔焉上親御弧矢一發而中其鶴則帶箭徐墜將及地丈許歘然矯翰西南而遊萬眾極目良久乃滅益州城距郭十五里有明月觀焉依山臨水松桂深寂道流非修習精愨者莫得而居觀之東廊第一院尤為幽絕每有自稱青城道士徐佐卿者風局清古一歲率三四而至觀之耆舊因虛其院之正堂以俟其來而佐卿至則栖焉或三五日或旬朔言歸青城甚為道流之所傾仰一日忽自外至神爽不怡謂院中人曰吾行山中偶為飛矢所加尋已無恙矣然此箭非人間所有吾留之於壁上後年箭主到此即宜付之慎無墜失仍援毫記壁云留箭之時則十三載九月九日也玄宗避狄幸蜀暇日命駕行遊偶至斯觀樂其佳境因遍幸道室既入此堂忽覩挂箭則命侍臣取而翫之蓋御箭也上深異之因詢觀之道士皆以實對即是佐卿所題乃前歲沙苑縱畋之日也佐卿蓋中箭孤鶴耳究其題處沙苑飜飛日集于斯歟上大奇之因收其箭而寶焉自後蜀人亦無有逢佐卿者襄陽記曰望楚山有三名一名馬鞍山一名災山宋元嘉中武陵王駿為刺史屢登之鄙其舊名望郢山因改為望楚山後遂龍飛是孝武所望之處時人號為鳳嶺高處有三登即劉弘山簡九日宴賞之所也姑熟記曰縣南十里有九井山殷仲文九日從桓公九井賦詩即此山是也臨海記曰郡北四十里有湖山形平正可容數百人坐民俗極重九日每菊酒之辰讌會於此山者常至三四百人登之見邑屋悉委江海分明壽陽記曰州有義門社有數百人每至九日於明義樓街作樂以受施以供冬齊人月令曰重陽之日必以餻酒登高眺逈為時讌之遊賞以暢秋志酒必采茱萸甘菊以泛之既醉而還太清諸草木方曰九月九日採菊花與茯苓松柏脂丸服之令人不老盧公範曰几重陽日上五色餻菊花枝茱萸樹飲菊花酒佩茱萸囊令人長壽也魏文帝九日與鍾繇書曰歲往月來忽復九月為陽數而日月並應俗嘉其名以為宜於長久故以享宴高會是月律中無射言群木廣草有射地而生於芳菊紛於獨秀非夫含乾坤之純和體芬芳之淑氣孰能如此故屈平悲冉冉之將老思餐秋菊之落英輔體延年莫斯之貴謹奉一束以助彭祖之術宋謝瞻九月從宋公戲馬臺詩曰風至授寒服霜降休百工巢幕無留鷰遵渚有歸鴻輕霞冠秋日迅適薄清穹聖心眷嘉節鳴鑾戾行宮四延霑芳體中堂起絲桐扶光迫西汜餘歡宴有窮又謝靈運九日從宋公戲馬臺送孔令詩曰季秋邊朔苦旅鴈違霜雪淒淒陽卉腓皎皎寒潭潔良辰感聖心雲旗興暮節鳴笳戾朱宮蘭巵獻時哲歸客遂海隅脫冠謝朝列東流有急瀾浮驂無緩轍梁庾肩吾九日侍宴詩曰轍跡光周頌巡遊盛夏功鉤陳萬騎轉閭闔九門通秋暉逐行漏朔氣遶相風獻壽重陽節廻鑾上苑中䟽山開輦道間樹出離宮玉醴吹花菊銀床落井桐飲羽山西射浮雲冀北聰塵非金垺滿葉破柳條空又劉苞九日侍宴樂遊苑詩曰上郡良家子幽并遊俠兒立乘爭飲羽側騎競紛馳明珂飾華眊金袍映玉羈膳羞殫海陸和齊眡秋宜雲飛雅琴奏風起洞簫吹曲終高宴罷景落樹陰移微薄承嘉惠飲德良不貲取效績無紀感恩心自知後周王褒九日從駕詩曰黃山獵地廣青門官路長律改三秋節氣應九鍾霜射馬垂雙帶豊貂佩兩璜苑寒梨樹紫山秋菊葉黃華露霏霏冷輕飆颯颯傷終慚屬車對空假侍中郎隋江揔衡州九日詩曰秋日正凄凄茅茨復蕭瑟姬人薦秋醞幼子問殘疾園菊抱黃華庭榴剖珠實聊以著書情暫遣他鄉日又九日至微山亭詩曰心逐南雲逝形隨北鴈來故鄉籬下菊今日幾花開
