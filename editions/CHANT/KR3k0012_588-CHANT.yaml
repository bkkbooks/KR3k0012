body:
  text: 文部三賦詩序曰詩有六義焉一曰風二曰賦釋名曰賦敷也敷布其義謂之賦也漢書曰不歌而誦謂之賦登高能賦可以為大夫言感物造端材智深美可以與圖政事故可以列為大夫也春秋之後周道寖壞聘問歌詠不行於列國歌詠之士逸在布衣賢人失志之賦作矣孫卿及楚臣屈原離讒憂國皆作賦以風諭咸以惻隱古訓之義也其後宋玉唐勒漢興枚乘司馬相如下及揚子雲競為侈麗閎廣之語設其風諭之義是以楊子稱之曰詩人之賦麗以則辭人之賦麗以淫如孔氏之門用賦也則賈誼登堂相如入室矣又曰上令王褒與張子僑等並待詔數從遊獵所幸宮館輒為歌頌第其高下以差賜帛議者多為淫靡不急上曰不有博弈者乎為之猶賢乎己辭賦大者與古詩同義小者辨麗可嘉如女工有綺縠音樂有鄭衛今世俗猶皆以此娛說耳目辭賦比之尚有仁義風諭鳥獸草木多聞之觀賢於倡優博弈遠矣又曰武帝以安車徵枚乘孽子皋母為小妻乘之東歸也皋母不肯隨乘乘怒留皋與母居年十七上書自陳枚乘之子上得大喜召入詔使賦平樂館善之拜為郎皋不通經術談笑類徘倡為賦頌好慢戲以故得渫黷貴幸比東方朔郭舍人武帝春秋二十九乃得皇太子群臣喜故皋與東方朔皇太子生賦皋為文疾受詔輒成司馬相如善為文而遟故所作少又曰上讀司馬相如子虛賦善之乃召相如相如曰此乃諸侯之事未足觀請為天子遊獵之賦上令尚書給筆札相如以子虛虛言也為楚烏有先生者烏有此事為難亡是也欲明天子之義故虛籍此三人為辭以推天子諸侯之苑囿其卒歸於節儉因以諷諫天子天子大悅時上好神仙相如又奏大人賦天子大悅飄飄有凌雲之氣游天地之間意又曰趙昭儀方大幸每上甘泉常從在屬車間豹尾中故揚雄盛言車騎之眾參麗之駕非所以感動天地逆釐三神又言屏玉女卻宓妃以懲齊戒之事賦成奏之天子異焉先是時蜀有司馬相如作賦甚弘麗溫雅雄心壯之每作賦常擬以為式後漢書曰王延壽字文考少遊魯國作靈光殿賦後蔡邕亦造此賦未成及見延壽所為甚奇之遂輟翰又曰李充字伯仁少以文章顯名賈逵薦充召詣東觀受詔作賦拜蘭臺令史魏志曰陳思王植太祖常視其文曰汝倩人耳植跪曰出言為論下筆成篇固當面試時鄴銅雀臺新成太祖悉將諸子登使名賦植賦援筆立成太祖甚異之吳書曰張紘作柵瘤枕賦陳琳在北見之以示人曰此吾鄉里張子紘所作也後紘見琳武庫賦應機論與琳書歎美之琳荅曰自僕在河北與天下隔此間率少於文章易為雄伯故僕受此過美之談非其實也今景在此足下子布在彼所謂小巫見大巫神氣盡矣魏略曰卞蘭獻賦贊述太子德美太子報曰作者不虛其辭受者必當其實蘭此豈吾實哉昔吾丘壽王一陳寶鼎何武等徒以歌頌猶受金帛之賜蘭事雖不諒義足嘉也今賜牛一頭又曰邯鄲淳作投壺賦奏之文帝以為工賜絹十疋晉書曰孫綽絕重張衡左思賦云三都二京六經之鼓吹也嘗作天台山賦辭致甚工初成以示友人范榮期云卿試擲地當作金石聲也榮期曰恐此金石非中宮商然每至佳句輒云應是我輩語又曰桓溫欲經緯中國以河南粗平將移都洛陽朝廷畏溫不敢為異而北土蕭條人情危懼孫綽上䟽言不可溫見綽表不悅曰致意興公何不尋君遂初賦而知人家國事耶又曰顧愷字長康晉陵無鍚人也博學有才氣嘗為箏賦成謂人曰吾賦之比嵇琴不賞者必當以後出相遺深識者亦當以高奇見貴宋書曰謝莊字希逸仕為太子中庶子時南平王鑠獻赤鸚鵡帝詔群臣為賦太子左衛率袁淑文冠當時作賦畢示莊及見莊賦歎曰江東無我卿當獨秀我若無卿亦一時之傑遂隱其賦梁書曰張率為待詔賦奏之甚見稱賞手勑荅曰相如工而不敏枚皋速而不工卿可謂兼二子於今之世矣又曰沈眾字仲興好學有文詞仕梁為太子舍人時武帝制千字詩眾因注解與陳謝景同時召見于文德殿帝命眾竹賦賦成奏之手勑荅曰卿文體翩翩可謂無忝爾祖北齊書曰劉晝舉秀才入京考策不第乃恨不學屬文方復緝綴辭藻言甚苦拙制一首賦以六合為名自謂絕倫吟諷不輟乃歎曰儒者勞而少工見於斯矣我讀儒書二十餘年而荅策不第始學作文便得如是曾以此賦呈魏收收謂人曰賦名六合其愚已甚及見其賦又愚於名唐書曰獲嘉主簿劉知幾著思慎賦以剌時鳳閣侍郎蘇味道李嶠見文相顧而歎曰陸機豪士之所不及也當今防身要道盡在此矣又曰文苑傳李華字遐叔善屬文與蘭陵蕭頴士友善華應進士時著含元殿賦萬餘言頴士見而賞之曰景福之上靈光之下後唐書曰李琪少孤貧苦學尤精於文賦昭宗時李谿父子以文學知名於時琪年十八袖賦一軸謁谿谿覽賦驚異倒履迎門因出琪啞鍾捧日等賦指爾謂琪曰予常患近年文士辭賦皆數句之後未見賦題吾子入句見題偶屬典麗吁可畏也琪由是以益知名也摯虞文章流別論曰賦者敷陳之稱古詩之流也前世為賦者有孫卿屈原尚頗有古之詩義至宋玉則多淫浮之病矣楚詞之賦賦之善者也故楊子稱賦莫深於離騷賈誼之作則屈原儔也禰衡傳曰黃祖時大會賓客人有獻鸚鵡者祖舉巵酒於衡曰願先生賦之以娛佳賓衡攬筆而作文無加點辭采甚麗文心雕龍曰詩有六義其二曰賦賦者鋪也鋪采摛文體物寫志也昔邵公稱公卿獻詩師箴瞽賦傳云登高能賦可為大夫詩序則同義傳說則異體總其歸塗實相枝幹故劉向明不歌而頌班固稱古詩之流至如鄭莊之賦大隧士蒍之賦狐裘結言短韻詞自己作雖合賦體明而未融及靈均唱騷始廣聲貌然則賦也者受命於詩人而柘宇於楚辭者也於是荀況禮智宋玉風鈞爰鍚名號與詩畫境六義附庸蔚成大國遂客主以首引極聲貌以窮文斯蓋別詩之源始命賦之厥初也秦世不文頗有雜賦漢初辭人循流而作陸賈扣其端賈誼振其緒枚馬洞其風王揚聘其勢皋朔以下品物畢圖繁積於宣時校閱於成世進御之賦千有餘首討其源流信興楚而盛漢矣若夫京殿苑獵述行敘志並體國經野義尚光大既履端於唱序亦歸餘於惣詞序以建言首引情本詞以理篇寫迭文勢觀夫荀結隱語事義自懷宋發誇談實始淫麗枚乘兔園舉要以會新相如上林繁類以成豔賈誼鳥致辨於情理子淵洞簫窮變於聲貌孟堅兩都明絢以贍雅張衡二京迅拔宏富子雲甘泉搆深偉之風延壽靈光含飛動之勢凡此十家並辭賦之英傑也及仲宣靡密發篇必道偉長博通時逢壯采太冲安仁策勳於鴻規士衡子安底績於流製景純綺巧縟理有餘彥伯梗概情韻不匱亦魏晉之賦首也原夫登高之旨蓋覩物興情情以物興故義必明雅物以情覩故詞必巧麗麗辭雅義符采相勝如組織之品朱紫畫繪之差玄黃文雖雜而有實色雖糅而有儀此立賦之大體也然逐末之儔蔑棄其本雖讀千首逾惑體要遂使繁華析枝膏腴害骨無貫風軌莫益勸戒此楊子所以追悔於雕蟲貽誚於霧縠者也宋玉大言賦序曰楚襄王既登雲陽之臺命諸大夫景差唐勒宋玉等並造大言賦賦卒而玉受賞又有能為小言賦者賦之雲夢之田而賦卒乃賜玉田楊子法言曰或問曰吾子少而好賦曰然童子雕蟲篆刻壯夫不為詩人之賦麗以則辭人之賦麗以媱若孔氏之門而用賦則賈誼升堂相如入室崔鴻十六國春秋南涼錄曰禿髮傉檀子歸年始十三命為高殿賦下筆即成影不移漏傉檀覽而善之擬之於曹子建又前秦錄曰符堅宴群臣於逍遙園將軍講武文官賦詩有洛陽年少者長不滿四尺而聰博善屬文因朱彤上逍遙戲馬賦一篇堅覽而奇之曰此文綺藻清麗長卿儔也西京雜記曰長安有度虬亦善為賦常為清思賦時人不貴虬乃託以相如作遂大重於世焉又曰相如將獻賦而未知所為夢一黃衣翁謂之曰子可為大人賦言神仙之事以獻上賜錦四匹又曰司馬長卿賦時人皆稱典而麗雖詩人之作不能加也揚子雲曰長卿賦不從人間來神化所主耳子雲學相如為賦而不逮是故雅服焉又曰司馬相如為上林子虛賦意思蕭散不復與外相關控引天地錯綜古今忽然而睡煥然而興幾百曰而後成其友人盛各𢱯字長通牂牁名士嘗問以作賦相如曰合纂組以成文列錦繡而為質一經一緯一宮一商此作賦之跡也賦家之心苞括宇宙惣覽人物斯乃得之於內不可得其傳也乃作合組歌列錦賦而退身終不復敢言作賦之心矣博物志曰王延壽逸之子也魯作靈光殿初成逸語其子曰汝鴈狀歸吾欲為賦文考遂以韻鴈簡其父曰此即好賦吾固不及矣三國典略曰齊魏收以溫子昇邢邵不作賦乃云會須作賦始成大才唯以章表自許此同兒戲文士傳曰何楨字元幹青龍元年天子特詔曰楊州別駕何禎有文章才試使作許都賦成封上不得令人見禎遂造賦上甚異之又曰棘嵩見陸雲作逸民賦嵩以為丈夫出身不為孝子則為忠臣必欲建功立策為國宰輔遂作官人賦以反雲之賦桓子新論曰予少時見揚子雲麗文高論不量年少猥欲迨及業作小賦用思太劇而立感動發病子雲亦言成帝上甘泉詔使作賦為之卒暴倦臥夢其五藏出地以手收之覺大少氣病一歲余少好文見子雲工為賦頌欲從學子雲曰能讀千賦則善之矣魏文典論曰今之文人魯國孔融廣陵陳琳山陽王粲北海徐幹陳留阮瑀汝南應璩東平劉楨此七子者於學無所遺於辭無所假如粲之初征登樓槐賦幹之玄猨漏巵團扇枕賦雖張蔡不過也陳琳阮禹之章表書記今之儁也應璩和而不壯劉楨壯而不密孔融體氣高妙有過人者魏文臨渦賦曰余從上拜墳乘馬過水相佯高樹之下駐馬書鞭為臨渦賦世說曰左思字太冲齊國臨淄人也作三都賦十年乃成門庭戶席皆置筆硯遇得一句即便䟽之賦成時人皆有譏訾思意甚不愜後示張華華曰此二京可三然君又未重於世宜以示高名之士思乃請序皇甫謐謐見之嗟嘆遂為作序於是先相訾者莫不斂袵讚述焉陸機入洛欲為此賦聞思作之撫掌而笑與第雲書此聞有傖父欲作三都賦須其成當以覆酒瓮耳及思賦出機絕歎服以為不能加也又曰袁宏作東征賦列稱過江諸名德而獨不載桓彝溫甚恨之嘗以問宏宏曰尊君稱位非下官敢專既未遑啟故不敢顯之溫曰君欲何為詞宏即荅云風鑒散朗或搜或引身雖可亡道不可殞溫乃喜又不道陶侃侃子胡奴抽刃於曲室問袁君賦云何忽袁急而荅曰大道尊公何言無因曰精金百鍊在割能斷功以治民職思靜亂長沙之勳為史所讚胡奴乃止金樓子云劉休玄好學有文才為水仙賦時人以為不減洛神賦擬古詩時人謂陸士衡之流也余謂水仙不及洛神擬古勝乎士衡矣閩川名士傳曰貞元中杜黃裳知貢舉試珠還合浦賦進士林藻賦成憑几假寐夢人謂之曰君賦甚佳但恨未敘珠來去之意爾藻悟視其草乃足四句其年擢第謝杜黃裳謂曰唯林生敘珠來去之意若有神助
