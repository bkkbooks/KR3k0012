body:
  text: 果部三甘謝承後漢書曰丹陽張磐字子石為廬江太守尋陽令嘗餉一奩甘其小男年七歲就取一枚磐奪取付外卒以兩枚與之磐奪兒甘鞭卒曰何故行賂於吾子宋書曰彭城王義康時四方獻饋皆以上品薦義康而以次者供御上嘗冬月啖甘歎其味並劣義康在坐曰今年甘殊有佳者遣人還東府取甘大三寸又曰元嘉末魏太武征彭城遣使送九種鹽并胡鼓仍求黃甘梁書曰呂僧珍既有大勳任總心膂性甚恭慎當直禁中盛暑不敢解衣每侍御座屏氣鞠躬果食未嘗舉筯嘗醉後取一甘食武帝笑謂曰卿今日便是大有所進祿外令月給錢十萬唐書曰羅浮甘子開元中始有山僧種於南樓寺其後常資進獻幸蜀幸奉天之歲皆不結實又曰天寶中中書門下奏曰臣等今日因奏事承德音聞江南為橘江北為枳蓋以地氣有殊物性因變朕近於宮內種甘子樹數株今秋已來結實一百五十顆乃與江南及蜀道所進無別亦可謂稍異也晉令曰閬中縣置守黃甘吏一人風土記曰甘橘之屬滋味甜美特異者也有黃者有者者謂之壺甘廣志曰甘有二十一核有成都平蒂甘大如升色蒼黃犍為南安縣出黃甘神異經曰東方朔云東南外有建春山其上多美甘樹京口記曰京城東門射堂前柑樹十餘株盧諶祭法曰冬祠用柑襄陽記曰李衡字叔平為丹陽太守衡每欲治家妻輒不聽後密遣十人於武陵龍陽洲上作宅種柑千樹臨死勑兒曰汝母惡治家故窮如是吾州里有千頭木奴不責汝衣食歲上一疋絹亦足用矣及衡甘成歲得絹數千疋荊州記曰枝江有名甘宜都郡舊江北有甘園名宜都甘湘州記曰州故大城內有陶侃廟地是賈誼故宅誼時種甘猶有存者崔豹古今注曰甘實形如石榴者謂為壺甘也唐新語曰益州每歲進甘子皆以紙裹之他時長吏嫌紙不敬代之細布既而恐甘子為布所損每懷憂懼俄有御史甘子布至長吏以為推布裹甘子事懼曰果為所推及子布到驛長吏但敘以布裹甘子為敬子布初不之知久而方晤聞者莫不大笑又曰安祿山將反宰臣韋見素請以平章事追之玄宗許焉草詔訖中留之遣中使輔璆琳送甘子且觀其變璆琳受賂而還因言無反狀玄宗謂宰臣曰祿山必無二心詔本朕已焚矣異苑曰河內司馬元胤元嘉中為新淦令喪官月旦設祭甘化而為鳶又曰南康皈美山石城內有甘橘橙柚就食其實任意取足脫持歸者便遇大虺或顛仆失俓家人啖之亦病述異記曰南康郡有東望山營民入山頂有湖清深又有菓林周四里許眾菓畢植間無雜木行列整齊如人功也甘子熟三人共食致飽訖懷二枚欲以示外人便還尋覔向逕廻旋半日迷不能得即聞空中語云放雙甘乃聽汝去懷甘者恐怖放甘於地轉眄即見歸逕乃相與俱卻返廣古今五行記曰唐高宗調露中連州見一甘樹四月中有子如拳大剖之有兩頭虵又曰唐光宅中李崇真任益州刺史廳事前有甘樹有子大如雞子晚熟微小有孔如針郡官咸異之方欲將進久而方罷因剖之得一赤班虵長尺餘崇真後為兵所殺王廙洛都賦曰若夫黃甘荔支殊遠之珍雖非方土之所產重九譯而來臻潘安仁笙賦曰披黃苞以授甘傾縹瓷以酌醽張載詩曰三巴黃甘瓜州素禁渴者所思銘之裳帶郭璞柚讚曰厥苞橘柚精者曰甘孔坦表曰天恩例賜酃酒黃甘不勝受遇謹表以聞張衡七辨曰離支黃甘宗炳甘頌曰煌煌嘉實磊如景星南金其色隨侯厥形橘焦贛易林剝之屯曰北山有萊橘柚所藂荷囊戴畚盈我筐筥尚書禹貢曰淮海惟楊州厥苞橘柚錫貢小曰橘大曰柚其所苞而致者也錫命乃貢言不嘗也周禮冬官上考工記曰橘踰淮而北為枳此地氣然也春秋運斗樞曰旋星散為橘史記曰蘇秦說燕文侯曰君誠能聽臣齊必置魚鹽之海楚必致橘柚之園漢書曰江陵之千樹橘其人皆與千戶侯等東觀漢記曰馬援好事至荔浦見冬筍名曰苞荀上言禹貢厥苞橘柚疑謂是也又曰建武中單于來朝賜橙橘謝承後漢書曰張磐為廬江太守尋陽令餉橘一奩小男年七歲卒以兩橘與之磐還橘鞭卒具甘部又曰沛國桓嚴字文林罷鄮縣舍楊州從事屈豫室廷有橘樹一株遇其實熟數垂室內嚴乃以竹蕃樹四面時風吹動兩實墮地以書繩縛繫樹枝後漢書曰廉范為成都太守部人楊由善風雲占候嘗有風吹削哺哺當作材音孚廢切太守以問由對曰方當有薦木實者其色黃赤頃之五官椽獻橘數苞益部耆舊同魏志曰倭國有橘不知滋味吳志曰陸績年六歲於九江見袁術出橘績懷三枚拜辭墮地術謂曰陸郎作賓客而懷橘乎績跪荅曰欲歸遺母術大奇之吳錄地理志曰朱光祿為建安郡中庭有橘冬月樹上覆裹之至明年春夏色變青黑味尤絕美上林賦云盧橘夏熟盧黑也蓋近是也吳曆曰吳王饋魏文帝大橘魏文帝詔群臣曰南方有橘酢正裂人牙時有甜耳建武故事曰咸和六年平西將軍庾亮送橘十二實共同一柢以為瑞異百官畢賀中興書曰王者德盛則嘉朱生橘亦嘉味之流晉宮閣名曰華林園橘十一株宋書曰孝武大明中芳香琴堂東西有雙橘連理改芳香琴堂為連理堂齊書曰豫章王嶷薨忽見形於第後園乘腰輿指麾處分呼直兵直兵無手板左右授一玉手板與之曰橘樹一株死可覔補之因出後園閤真兵倒地仍失手板南史曰虞願始數歲家中橘樹冬熟諸兒競來取之願獨不取家人皆異之三國典略曰梁侯景未平王僧辯獻嘉橘一帶二十五子于湘東王王荅之曰昔文康獻橘十有二子用今方古彼有慚色今景之兇惡既稔凱歌之聲已及嘉瑞遠臻但增鯁慰晏子曰晏子使楚楚王謂其左右曰晏嬰習辤者也吾欲傷之坐定而縛一人至問何為曰齊人坐盜王視晏子曰齊人善盜乎晏子對曰嬰聞橘生於淮北則為枳枝葉徒似其實味不同水土異也今民生於齊不盜入楚得無俲楚民善盜耶王笑曰寡人取病焉又曰晏子使楚楚王進橘置削晏子并食不剖王曰橘當云剖對曰臣聞之賜人主前者瓜桃不削橘柚不剖今者萬乘無教故不敢剖臣非不知也莊子曰三王五帝之禮義法度譬猶樝梨橘柚其味相反而皆可適於口淮南子曰夫橘樹之江北化而為橙呂氏春秋曰常山之北投淵之上有百菓焉群鳥所食箕山之東青馬之所有甘櫨焉箕山許由隱所青馬崑崙山東矣江浦之橘雲夢之柚漢上之菤所以致之菤菤且也音卷山海經曰洞庭之山其木多橘正論曰橘柚之貢堯舜不嘗山龍華蟲帝王不以為褻服而命臣餘黃甘厭文繡者蓋以萬數者也鹽鐵論曰孝武皇帝平百越以為園圃而民皆厭橘柚宋躬孝子傳曰王靈之廬陵西昌人喪父母二十年鹽酢不入其口所住屋夜有光廷中橘樹隆冬三實會稽先賢傳曰嚴遵從光武遇蜀郡獻橘栗上持付公卿遵獨不取已具甘中水經曰劉備時巴郡結舫水居者五百家縣有甘橘官荔支園夏至則熟二千石常設廚膳命士大夫共會樹下食之縣北有稻田出御米也南夷志曰甘橘大釐城有之其味甚酸穹贆音飄有橘大如覆杯湘州記曰泉陵縣有焦山山上多橘裴淵廣州記曰羅浮山有橘夏熟實大如李雲南記曰雲南出甘橘甘蔗橙柚梨蒲桃桃李梅杏糖酪之類悉有魏王花木志曰盧橘蜀土有給客橙似橘而非若柚而香冬夏華實相繼或如彈丸或如拳通歲食之亦名盧橘異物志曰橘為樹白華而赤實皮既馨香又有善味江南則有之不生他所交阯有橘置長官一人秩三百石主歲貢御橘續搜神記曰晉孝武帝世宣城秦精嘗入武昌山中採茗忽見一人身長一丈通體皆毛從山北來乃探懷中二十枚橘與精甘美異常具茗中異苑曰南康歸美山石城有橘就食任意取足脫持歸者輒道遇大虺具甘部任昉述異記曰越多橘柚園越人歲多橘稅謂之橘籍吳闞澤表云請除臣之橘籍是也越中有王氏橘園胡氏梅山賀氏之瓜廣五行記曰陳後主夢黃衣人圍城繞城橘樹盡伐去之及隋兵至上下通服黃衣未幾為隋攻圍之應嶺表錄異曰山橘子大者冬熟如土瓜次者如彈丸其實金色而葉綠皮薄而味酸偏能破氣容廣之人帶枝葉藏之入膾醋尤加香美楚辭曰皇后嘉樹橘來服皇天也后土也服習也言皇天后土生美橘樹異於眾受命不遷生南國深固難從更其壹志綠葉素榮分其可喜又曰斬伐橘柚列樹苦桃司馬相如子虛賦曰橘柚芬芳又上林賦曰盧橘夏熟郭璞注曰蜀中有給客橙即橘也冬夏華賓相繼也揚雄蜀都賦曰於西則鹽泉鐵冶橘林銅陵張衡南都賦曰遊女弄珠於漢睪之曲注曰遊女漢女也鄭大夫交甫於漢見之而贈之橘柚曹植橘賦曰播萬里而遙植列銅雀之園廷背江州之暖氣處玄朔之肅清孫楚枤杜賦曰朱橘甘美紫梨甜脆傅玄菊賦曰詩人覩王睢而詠后妃之德屈平見朱橘而申貞臣之志焉繁休伯三胡賦曰頟似鼬皮色象萎橘左思蜀都賦曰家有鹽泉之井戶有橘柚之園柏梁臺詩太官令曰柤梨橘栗桃李梅古詩曰橘柚垂華實乃在深山側聞君好我甘竊獨自雕飾崔琦七蠲曰于斯江睪寔產橘柚孟冬之月於時可食撫以玉手永用華飾王褒僮約曰南安拾栗採橘南安縣名出好栗橘
