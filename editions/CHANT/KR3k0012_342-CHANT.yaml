body:
  text: 兵部七十二斾說文曰斾者斾然垂也爾雅曰續旐曰斾帛續旄末為燕尾也左傳曰楚令尹南轅反斾又曰拔斾投衡乃出又曰晉楚戰子玉以若敖之六卒將中軍子玉楚令尹也子西將左子上將右子西鬥宜申子上鬥勃也胥臣蒙馬以虎皮先犯陳蔡陳蔡奔楚右師潰陳蔡屬楚之右師也狐毛設二斾而退之斾大旗也又建旗而退若大將稍却也東京賦曰通帛蒨斾幟史記曰沛公祠黃帝𧈪尤於沛庭旗幟皆尚赤又曰韓信伐趙令輕騎二百人人持一赤幟入趙壁拔趙幟立漢幟東觀漢記曰漢兵守成都公孫述謂延岑曰事當奈何岑曰男兒當死中求生可坐窮乎財物易聚耳不宜有愛述乃悉散金帛募敢死士五千餘人以配岑於市橋偽建旗幟鳴鼓挑戰而潛遣奇兵出吳漢軍後襲擊破漢漢墮水緣馬尾得出袁山松後漢書曰赤眉復入長安止桂宮逢安將千餘人攻延岑於杜陽鄧禹以赤眉精兵出在外唯盆子羸弱在長安攻之與謝祿夜戰槀街中鄧禹敗走逢安西與延牙蘇茂李寶戰於杜陽大破之寶茂降牙收散卒還戰寶茂從內拔赤眉旗自立其幟赤眉還驚亂走自投川死者十餘萬人墨子曰凡幟帛長五丈廣半幅太白經曰右一將行得水黑幡旗幟圖熊旗額白腳青右二將行得火赤幡旗幟圖鶚旗額白腳青右三將行得木青幡旗幟圖熊旗額白腳青右四將行得金白幡旗幟圖狼旗額白腳青右五將行得土黃幡旗幟圖虎旗額白腳青左一將行得水黑幡旗幟圖熊旗額白腳黃左二將行得火赤幡旗幟圖鶚旗額青腳白左三將行得木青幡旗幟圖熊旗額青腳黃左四將行得金白幡旗幟圖狼旗額青腳黑左五將行得土黃幡旗幟圖虎旗額青腳赤幡釋名曰幡也皃幡幡然也說文曰幡幟也麟角曰信幡古之麾號也所以題表官號以為符信故謂之信幡乘輿則畫為白虎取其義而有威信之德也魏朝有青龍朱雀玄武白虎黃龍等五幡以詔四方詔東方郡國以青龍信南朱雀西白虎北玄武朝廷畿甸則以黃龍亦以騏麟信幡高貴鄉公討晉文自秉黃龍幡以麾號令晉朝唯用白虎書信幡用鳥取其飛騰輕疾一曰鴻鴈有去來之信也漢書曰甘延壽出西域部勒行陣別為校尉踰葱嶺入赤谷至郅支城望見單于城上五采幡幟又曰武帝伐南越禱太一以牡荊書幡名曰靈旗獻帝春秋曰董卓未誅有書三尺布幡上作兩口相銜之字負之於道歌曰布乎及呂布殺卓負布者不復見吳志曰陸遜取宜都獲秭歸枝江還屯夷陵守峽口以備蜀關羽還當陽西保夌城權使誘之羽偽降立幡旗為象人於城上因遁走王隱晉書曰河間王伐齊王火燒觀閣及千秋神虎二宮門盜白虎幡唱云長沙王矯詔長沙更以白幡唱稱大司馬謀反晉書曰長沙王乂攻齊王令王胡悉盜騶虞幡唱云長沙王矯詔乂稱大司馬謀反助者誅五族又張華傳曰楚王瑋受密詔殺太宰汝南王亮太保衛瓘等內外兵擾朝廷大恐計無所出華白帝以瑋矯詔擅害三公將士倉卒謂是國家意故從之耳今可遣騶虞幡使外軍解嚴理必風靡上從之瑋兵果散及瑋誅華以首謀有功拜右光祿大夫又曰衛瓘既誅瓘女與國臣書曰先公名謚未顯無異凡人每怪一國蔑然無言春秋之失其各安在悲憤感慨故以示意於是主簿劉繇等執黃幡撾登聞鼓上言論之又曰楚王瑋之誅二公也守東掖門會騶虞幡出乂投弓流涕曰楚王被詔是以從之宋書曰元嘉四年車駕出北堂使三更竟開廣莫門南臺云應須白獸幡銀字棨不肯開尚書左丞羊玄保奏免御史中丞傅隆已下曇首曰既無異勑又闕幡棨雖稱上旨不異單刺元嘉元年二月雖有開門例此乃前事違令今守舊未為非禮其不請白獸幡銀字棨致開門不時由尚書相承之失亦合糺正上特無問更立科條北史曰後魏元孚持白虎幡勞阿那瓌於柔玄懷荒二鎮間阿那瓌眾號三十萬陰有異意遂拘留孚載以轒音汾轀音溫日給酪一升肉一叚每集其眾坐孚東廂稱為行臺甚加禮敬晉起居注曰太陽佐伺承有母云感老君生丞相中貴畫作九龍幡遂群聚棄市晉諸公讚曰楚王瑋矯詔害汝南王亮其夜帝臨東堂張華唱議乃遣左右以白虎幡麾之然後眾散鍾離意別傳曰意為瑕兵今立春遣戶曹史擅建齎青幘幡白督郵督郵不受建留於家還白意言受他日意見督郵而督郵謝意言所以不受青幘幡者己自有也意還召建問狀建惶怖叩頭意曰勿叩頭使外聞也出因轉署主記史假遣無期建歸家父問之曰朝大士眾賢能者多子何功才既獲顯榮假乃無期寵厚將何謂也無得有不信於賢主耶建長跪以青幘幡意語父父嘿然有頃令妻設酒殺雞與建相樂謂建曰吾聞有道之君以義理殺人無道之君以血刃加人長假無期唯死不還將何以自栽乎酒畢進藥建遂物故石虎鄴中記曰勒為石虎諱呼白虎幡為天鹿幡鹽鐵論曰發春之後懸青幡築土牛殆非明主勸耕稼之意春令之論也軍令曰五聞鼓音舉黃帛兩半幡合旗為三面負陣庾肅之教曰大赦蕩然萬物更新陽幡既建事從寬簡羗可得詢求民瘼撫循物性旒周禮曰龍旂九斿象大火也鳥旟七斿象鶉火也熊旗六斿以象伐也龜旐四斿以象營室也大尾九星朱鳥七星參七星營室四星又曰全羽為旒公羊傳曰諸侯若贅旒禮含文嘉曰天子之旗九仞十二旒曳地旗者旌旗也所以別尊卑序貴賤也諸侯七仞九旒齊軫軫車後橫木也諸侯之旗齊於軫卿大夫五仞五旒齊軫士三仞三旒齊首首頭也廣雅曰天子十二旒至地諸侯九旒至軫大夫七旒至轂士三旒至肩東京賦曰建神旒之太常旄尚書曰武王右秉白旄孔安國注曰手秉旄有事施教也又曰羽畎夏翟雉名可飾旄毛詩曰建彼旄矣又曰干旄美好善也衛文公之臣子多好善賢者樂告以善道也孑孑干旄在浚之郊左傳曰晉人假羽旄于齊而不歸齊人始貳漢書武紀曰征和二年更加節黃旄應邵注曰戾太子發節加其上黃以嗣之也晉書曰王珣字元琳弱冠與陳郡謝玄為桓溫掾俱為溫所重嘗謂之曰謝掾年四十必擁旄杖節王椽當作黑頭公皆未易才也鬻子曰武王伐紂乃命太公把旄以麾之紂軍反走列仙傳曰秦文公時有梓樹化為牛以騎擊之騎不勝或墜髻解被髮牛畏之入河故秦因致旄頭騎使先驅文選曰羽旄掃霓又曰羽旄楊蕤又曰素旄一麾渾一區宇洛神賦曰左倚彩旄右蔭桂旌楚詞曰建脩虹之采旄甘泉賦曰流星旄以電燭又曰建雄虹之采旄係綴螮文紛錯也五色雜而炫耀眾采雜廁而明朗眊服虔通俗文曰毛飾曰眊音餌漢魏故事曰與外國節皆二赤眊一黑眊十異於常節魏略曰諸葛亮見劉備備性好眊時適以旄牛尾與備者備手自結之亮曰將軍當復有遠志耶止結眊而已備知亮非常人乃投眊而謂曰以志憂耳吳時外國傳曰黑白眊出天笁國陶公故事曰臣侃奉獻金繕白眊四枚續異記曰竟陵王誕在廣陵左右侍直眠中夢人告之曰官須髮為矟眊覺則已失髮矣如此者數十人俗說曰謝安小兒時便有名譽流聞遠國慕容廆餉謝白狼眊一雙謝時年十三一作慕容垂也魏武與楊彪書曰今贈足下十鈴眊一具諸葛亮與瑾書曰兄嫌白帝兵非精練到所督則先主帳下白眊西方上兵也嫌其少者當復部分江州兵以廣益之庾翼與燕王書曰今致孔雀眊二枚諸葛亮與吳王書曰所送白毦薄少重見辭謝益以憎慚庾翼與慕容皝書曰今致𥜗鎧一領兜牟白眊自副又曰今致朱漆銏二十張絳碧畫幡黑眊自副銏所諫切麾左傳曰楚人謂夫旍子重之麾也穀梁曰日有食之鼓用牲于社用牲非禮也天子救日置五麾陳五兵五鼓諸侯置三麾陳三兵三鼓大夫擊門士擊柝後漢書曰班超拜為將兵長史假鼓吹幡麾王隱晉書曰戴洋病亡天神使為酒藏吏授符持幡麾將士蓬萊諸山五日更生華陽國志曰曹公察關羽不安使張遼以情問之羽嘆曰吾極知曹公待我厚然吾受劉將軍恩誓以共死不可背之要當立効報公曹聞而義之是歲紹征官渡遣驍騎將軍顏良攻東郡太守劉延於白馬公使遼羽為先鋒羽望見良麾策馬刺良於萬眾中斬其首還遂解延圍公即表封羽漢壽亭侯重加賞賜羽盡封其物拜書告辭而歸先主也晉令曰兩頭進戰視麾所指聞三金音止二金音還軍令曰凡戰臨陣皆無讙音暄譁音化明聽鼓音謹視幡麾麾前則前麾後則後麾左則左麾右則右麾不聞令而擅前後左右者斬淮南子曰譬若軍之持麾者也妄指而亂矣幢釋名曰幢童也其皃童童然也晉公卿禮秩曰安平王孚汝南王亮太傅楊駿義陽王望齊王魯王賈充河間王顒梁王彤秦王東長沙王乂皆給羽葆幢後魏書曰韓茂膂力絕人尤善騎射太宗曾親征丁零翟猛茂為中軍執幢時大風諸軍旌旗皆偃仆茂於馬上持幢初不傾倒太宗異而問之徵茂所屬具以狀對太宗謂左右曰記之尋徵詣行在所試以騎射太宗深奇之以茂為虎賁中郎將兵書曰赤幢常在大將不得動搖赤者火也火土之母故軍主長服赤幢節周禮曰守國者用玉節守都鄙者用角節掌邦國之使者用虎節土國用人節澤國用龍節皆金為之門戶用符節貨賄用璽節使用管節道用旌節以竹為之漢書曰蘇武在匈奴北海牧羊起臥操節節麾也又曰張騫使月支匈奴得之留騫五六年漢節不失東觀漢記曰鄭眾謂匈奴曰不忍將大漢節對氈裘也唐書曰潁王璬為蜀郡都督璬性儉率將渡綿州江登舟見以綵緣席為籍者顧曰此可以為寢處奈何踐之命徹去之璬初奉命之藩卒遽不遑受節綿州司馬史賁進說曰王帝子也且為節度大使今之藩而不持節單騎徑進人何所瞻請建大槊蒙之油囊為旌節狀先驅道路足以威眾璬笑曰但為真王何用假旌節乎鉞釋名曰鉞豁也所司莫敢當前豁然破散也宋林曰鉞王斧也開元文字云斧也或為鉞尚書牧誓曰王左杖黃鉞右秉白旄以麾曰逖矣西土之人又顧命曰一人冕執劉立于東堂一人冕執鉞立于西堂云冕皆大夫也鉞屬也立於東西廂之前堂詩曰武王載斾有虔秉鉞如火烈烈則莫我敢遏虔固也禮記曰天子賜諸侯樂則以柷將之賜伯子男樂則以鼗將之諸侯賜弓矢然後征賜鈇鉞然後殺賜圭瓚然後為鬯又曰軍旅鈇鉞先王之所以飾怒也又曰是故君子不賞而民勸不怒而民威於鈇鉞左傳曰魏絳至授僕人書將伏劍士魴張老止之公讀其書曰君合諸侯臣敢不敬君師不武執事不敬罪莫大焉臣懼其死以及楊干無所逃罪不能致訓至於用鉞臣之罪重敢有不從以怒君心請歸死於司寇也又曰將戮慶封椒舉曰臣聞無瑕者可以戮人慶封唯逆命是以在此其肯從於戮乎播於諸侯焉用之王弗聽負之斧鉞以徇於諸侯又曰其後襄之二輅鏚鉞耟鬯彤弓虎賁文公受之以有南陽之田晉文公也史記殷本紀曰當是時桀為虐亂媱荒酖酗于酒不脩厥政天下叛之而諸侯昆吾氏為亂湯迺興師率諸侯伊尹從湯湯自把鉞以伐昆吾遂伐桀又曰紂囚西伯於羑里西伯之臣閎夭之徒求美女奇物善馬以獻紂迺赦西伯西伯出而獻洛之地以請除炮烙之刑紂乃許之賜弓矢斧鉞使征伐又曰周本紀曰紂嬖妾二女皆經自殺武王又射三發擊以劍斬以玄鉞又曰周公旦把大鉞畢公把小鉞以夾武王漢書刑法志曰大刑用甲兵其次用斧鉞中刑用刀鋸其次用鑽鑿薄刑用鞭朴後漢書郭躬傳曰竇固出擊匈奴騎都尉秦彭為副彭在別屯而輒以法斬人固奏彭專擅請誅之顯宗乃引公卿朝臣平其罪科躬以明法律召入議者皆然固奏躬獨曰於法彭得斬之帝曰畢征校尉一統於督彭既無斧鉞何得專殺人乎躬對曰一統於督者謂在部曲也今彭專軍別將有異於此兵事呼吸不容先關督帥且漢制棨戟即為斧鉞於法不合罪帝從躬之議吳志陸遜傳曰遜假節鉞為大督逆曹休斬獲萬餘吳錄曰假陸遜黃鉞吳主親執鞭以見之晉書天文志曰天槍三星在北斗杓東一曰天鉞天之武備也又曰參十里一曰參伐一曰大辰一曰天市一曰鈇鉞主斬刈又曰青龍三年六月丁未鎮星犯井鉞占曰為兵氣也又曰甘露元年七月乙卯熒惑犯井鉞占曰竝有兵事唐書曰天寶中制黃鉞古來以金為飾金者應五行之數有肅殺之威去金稱黃理或未當其鉞宜改為金鉞副威武之義焉司馬法曰夏執玄鉞崔豹古今輿服注曰玄鉞諸公主得建之武王以黃鉞斬紂故王者以為戒太公以玄鉞斬妲己故婦人以為戒博物志曰武王伐紂度河太風波武王操鉞乘麾麾之風波立濟正部曰奔逃之士不避斧鉞張平子西京賦曰於是𧈪尤秉鉞奮鬣被般禁禦不若以知神姦張平子東京賦曰總輕武於後陳奏麗鼓之嘈獻戎士分而揚揮載金鉦而建黃鉞又曰方相秉鉞巫覡操茢挑弧棘矢所發無臬又曰我光武忿之乃龍飛白水鳳翔參墟授鉞四七共工是除潘元茂冊魏公九錫文曰錫以二輅虎賁鈇鉞陳孔章檄吳將校部曲文曰丞相秉鉞鷹揚順風烈火元戎啟行未鼓而破又曰伏鈇嬰鉞首腰分離范蔚宗宦者傳論曰梁冀受鉞迹罔公正思固主心故中外服從上下屏氣曹植王仲宣誅曰我公奮鉞耀威南楚荊人或違陳戎講武
