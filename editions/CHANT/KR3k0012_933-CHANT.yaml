body:
  text: 鱗介部四鼈易說卦曰離為鼈爾雅曰鼈三足能今吳興陽羨縣君山上有池中出三足鼈周書曰成王時長沙獻鼈蜃周禮天官鼈人曰鼈人掌取玄物以時籍魚鼈蜃鄭司農云藉謂以杖剌泥中搏取之春獻鼈蜃禮記曲禮上曰水潦降不獻魚鼈不饒多也又樂記曰土敝則草木不長水煩則魚鼈不大魏略舊志曰昔北方有橐離之國者其王侍婢有身王欲殺之婢云有氣如鷄子來下我故有娠後生子王捐之於溷中豬以氣噓之徙馬欄馬以氣噓之王疑之以天子乃命其母收畜之名曰東明常令牧馬東明善射王恐奪其國欲殺之東明走南至淹水以弓擊水魚鼈浮為橋東明得渡而魚鼈解散追兵不得渡東明因都王夫餘之地後魏書曰夫餘之臣以朱蒙善射欲殺之朱蒙母以告朱蒙與烏引烏連二人棄夫餘東南走遇一大水欲濟無梁蒙告水曰我是河伯外孫今逃追兵垂及如何於是魚鼈並浮為成橋朱蒙得渡追騎不得渡蒙至絕升骨城遂居焉隋書曰崔弘度每誡其寮吏曰人當誠恕無得欺誑皆曰諾後嘗食鼈侍者八九人弘度一一問之曰鼈美乎人懼之皆云鼈美弘度於是大罵曰傭奴何敢誑我汝初未食鼈安知其美俱杖之八十官屬百工見之莫不流汗無敢欺隱孫卿子曰跬步不休跛鼈千里淮南子同莊子曰塪井之跬謂東海鼈曰吾跳梁井幹之上入沐鈌甃之岸樂亦至矣子奚不時來入觀乎海鼈左足未入而右膝已墊矣於是逡巡而卻告之曰夫海千里之遠不足舉其大千仞之高不足極其深禹時十年九潦而水不為加益湯時八年七旱而岸不加損夫不為須臾推移不以多少進退者此亦東海之大樂也於是蛙聞之適適然驚規然自失韓子曰鄭縣人卜子毒妻之市買鼈以歸過潁水以為渴因縱而飲之遂失鼈淮南子曰鼈無耳而目不可以瞥精於明也不可以瞥瞥則見又曰王子慶忌足躡麋鹿手縛兕虎置之冥室之中不能搏龜鼈勢不便也慶忌吳王僚之子也又曰大生小多生少天之道也故立阜不能生雲雨縈水不能生魚鼈者小也又曰殺戎馬而求狐狸援兩鼈而失靈龜斷右臂而爭一毛折鏌鋣而爭鷄刀用智如此豈足高乎高猶貴也又曰忠信形於內感動應於外故禹執于戚儛於階之間而三苗服三苗畔禹禹風以禮樂而服也鷹翔川魚鼈沉禹以德服三苗猶鷹翔川上魚鼈恐皆深飛鳥揚鳥見鷹而揚去必遠實也鷹懷欲害之心故鳥魚知其情實故遠之說苑曰曾子有疾曾元抱首曾華抱足曾子曰吾無顏氏之才何以告汝雖無能君子務益夫華多實少者天也言多行少者人也夫飛鳥以山為卑而層巢其巔魚鼈以淵為淺而穿穴其中然所以得者餌也君子茍能無以利害身辱安從至乎國語曰公父文伯飲南宮敬叔酒以露賭父為客賭父曾大夫客上客也羞鼈焉小賭父怒相延食鼈辭曰將使鼈長而後食之遂出文伯之母聞之怒曰吾聞之先子曰祭養尸饗養上賓言祭祀之禮尊養尸饗宴之禮養上賓鼈於何有而使夫人怒曰遂逐之五日呂氏春秋曰水之深則魚鼈歸之樹之盛則飛鳥歸之庶草美則禽獸歸之人主賢則豪傑歸之晏子春秋曰齊大旱景公召群臣問曰寡人欲祀河伯可乎晏子曰不可河伯以水為國以魚鼈為民彼獨不欲雨乎祀之何益山海經曰從山多三足鼈顧譚新言曰吳之翫水若魚鼈蜀之便山若禽獸神仙傳曰汝南郡中常有鬼怪歲輒數出過時導從威儀如太守入府打鼓周行內外乃還去甚以為患後費長房詣府君而正值此鬼來到府君門常徑入獨此來至門而已不敢前欲去長房厲聲呼便促前來鬼化作老公乃下車把板伏庭中叩頭乞得自改長房曰汝死老鬼不念良善無故導從盪突官府知當死不復汝真形此鬼須臾即成大鼈如車輪頸長一丈許長房復令還就人形以一札符付之令送與葛陂君鬼叩頭流涕持一札符去使人追視之至陂邊以頸繞株而死王子年拾遺記曰容山下有水多丹鼈魚皆能飛躍星經曰天鼈十三星在南斗主水蟲南越志曰海中有朱鼈狀如肺有眼六腳而常吐珠見則天下大旱崔豹古今注曰鼈一名河伯從事博物志曰九竅者胎化八竅者卵生龜鼈黿此諸類皆卵生而影伏又曰大腰無雄龜鼉類也無雄與虵通氣則孕又曰鼈剉令如棊擣赤莧汁和合厚以茅苞五六月中作投於池澤中經旬臠臠成鼈志怪曰昔有人與奴俱得心腹病治不能愈奴死乃刳腹視之得一白鼈赤眼甚鮮淨以諸藥內鼈口中終不死後有人乘白馬來者馬溺濺鼈縮頭藏腳乃試取馬溺灌之豁然消成水病者頓飲一升即愈淮南萬畢術曰青泥殺鼈得莧復生黿禮記月令曰季秋登龜取黿左傳宣上曰楚人獻黿於鄭靈公公子宋與子家將見子公之食指動以示子家曰他日我如此必嘗異味及入宰夫將解黿相視而笑公問之子家以告及食大夫黿召子公而弗與也子公怒染指於鼎嘗之而出廣雅曰海黿大畝重千鈞續漢書曰靈帝時江夏黃氏之母浴而化為黿入于深淵其後時時出見初浴簪一銀釵及見猶在其首唐史曰韋丹少在東洛嘗至中橋見數百人喧集水濱乃漁者網得大黿繫之橋柱引頸四顧有求救之意丹問曰幾錢可贖曰五千丹曰吾驢直三千可乎曰可於是與之放黿於水徒步而歸淮南子曰桀之力別觡伸釣洛骨也索鐵操金椎移大戲大戲軍之大旗水殺黿鼉陸捕熊羆又曰積力之所舉則無不勝也眾智之所為則無不成也塪井之所無黿鼉隘也園中之無脩木小也又曰高山險阻深林藂薄虎豹之所樂也人入之而畏川谷通原積水重淵黿鼉之所便也人入之而死魏子曰夫樹樹異風人人異心不可以一檢量故黿鼉得水則生虎豹得水則死晏子春秋曰齊三子爭桃古冶子曰吾嘗濟河黿衘左驂而入砥柱流冶潛行逆流百步從流九里得黿頭鶴躍而出若冶之功可以食桃抱朴子曰在頭水有大黿常在深潭號為黿潭此能作魅行病吳有道士戴炳者能視見之以越章封泥遍擲潭中良久有大黿徑長丈餘浮出不敢動乃格殺之而病者並愈又有小黿出羅列死於渚上甚多書紀年曰穆王三十七年起師至九江以黿為梁也璅語曰範獻子獵占之曰此其繇也君子得黿小人遺冠獻子獵而不得遺其豹冠列仙傳曰廬山頂上有湖湖廣數頃黿鼉盈於水中博物志曰屠黿解其肌肉唯腹連於頭而經日不死猶能齧物鳥往食之則為所得漁者或以張鳥雀崔豹古今注曰黿為河伯使者搜神記曰齊景公渡于江沅之河黿衘左驂沒之眾皆愓懼古冶子於是拔劍從邪行五里逆三里至于砥柱之下乃黿也左手持黿頭右手俠左驂鷰躍鵠踴而出仰天大呼水逆流三百步觀者皆以為河伯也淮南萬畢術曰黿暗得火可以燃鐵取黿殺之燒鐵如炭狀以卒其脂中鐵自燃燒黿致鼈取黿燒之鼈自至楚辭曰乘白黿兮逐文魚言河伯遊鍰近則乘黿也宋玉高唐賦曰黿鼉鱣鮪交積縱橫鼉毛詩文王靈臺曰鼉鼓逢逢禮記月令曰季秋之月伐蛟取鼉說文曰鼉水蟲似晰蝎長丈所從龜單聲汲冢周書王會曰會稽似鼉注其皮可以冠鼓吳志曰孫亮初公安有白鼉鳴瑤曰鼉鳴龜背平南郡城中可求生守死不去來無成明年諸葛恪敗弟融鎮公安被收融刮金印龜背一服而死江表傳同莊子曰孔子觀於呂梁懸水三十仞流沬三十里黿鼉不得游見一丈夫游之數百步而出孔子請問曰有道乎丈夫曰吾長於性成乎命從水之道而無私焉呂氏春秋曰帝顓頊令飛龍作八風之音以祭上帝乃會為樂昌鼉乃偃寢以其尾擊腹其音美也搜神記曰滎陽張福舡行夜有女子乘小舟來投福云日暮畏虎不敢夜行福戲調之遂就福寢中夜月照乃見一白鼉枕福臂而臥福驚起鼉便去乘之舡乃枯槎也郭義恭廣志曰鼉魚長三尺有四足高尺餘尾如蝘蜓而大南方嫁娶必得食之魏武赤壁還所掘得之是也支僧載外國事曰私訶條國全道遼山有毗呵羅寺寺中有石鼉至有神靈眾僧飲食欲盡寺奴輒向石鼉作禮於是食具許氏志怪曰沙門竺僧瑤得神符尢能治邪廣陵王家女病邪召瑤治之瑤入門便瞋目大罵老魅不守道敢干犯人女在內大喚云人殺我夫鬼在側曰吾命盡於今可為痛心因歔欷悲啼又曰此神也不可爭傍人悉聞於是化為老鼉走出中庭瑤入撲殺之幽明錄曰宋高祖永初中張春為武昌太守時人有嫁女未及升車忽便失性出外歐擊人垂己不樂嫁俗人巫云是邪魅乃將女江際擊鼓以術祝治療春以為欺惑百姓制期須得妖魅後有一青虵來到巫所即以大釘釘頭至日中復見大龜從江來伏前更以赤朱書背作符更遣入立至暮有大白鼉從江中出乍沉乍浮向龜隨後催逼鼉自忿死冒來先入慢與女辭訣女慟哭云失其因好自此漸差或問巫曰魅者歸於何物巫云虵是傳通龜是媒人鼉是其對所獲三物悉示春春始知靈驗吊裴氏廣州記曰吊虵頭鼉身亦水宿亦水栖俗謂為吊膏至輕利以銅瓦器貯之浸出而唯鷄卵盛之不漏磨治諸毒腫絕驗也
