body:
  text: 文部十三檄說文曰檄二尺書也釋文曰檄激也下官所以激迎其上之書也李充翰林論曰盟檄發於師旅相如喻蜀老可謂德音矣起居誡曰軍書羽檄非儒者之事曰一家奉道法言不及殺語不虛誕而檄不切厲則敵心陵言不誇壯則軍容弱請姑舍之以待能者文心雕龍曰昔有虞氏始戒於國夏后初誓於軍殷誓軍門之外周將交刃誓之故知帝世戒兵三王誓師宣訓我眾未及敵人也至周穆西征祭公謀父稱古有威讓之令有文誥之詞即檄之本源也及春秋征伐自諸侯出懼敵不服故兵出須名振此威風曝彼昏亂劉獻公所謂告之以文詞董之以武師者齊桓征楚詰菁茅之闕晉厲伐秦責箕郜之焚管仲呂相奉詞先路詳其意義即今之檄文暨乎戰國始稱為檄檄者皦也宣佈於外皦然明白也張儀檄楚書以尺二明白之文或稱露布夫兵以定亂莫敢自專天子親戎稱恭行天罰諸侯禦師則云肅將王誅故分閫推轂奉詞伐罪非唯致果為毅抑亦厲詞為武使聲如衝風所擊氣似攙搶所掃奮其武怒揔其罪人徵其惡稔之時顯其貫盈之數搖姦凶之膽訂信順之心使百尺之衝摧折於咫書萬雉之城顛墜於一檄者也觀隗囂之檄亡新布其三逆文不雕飭而意切事明隴右文士得檄之體也陳琳之檄壯於骨骾雖奸閹攜養章實太甚發丘摸金誣過其虐然抗詞書釁皦然曝露鍾會檄蜀徵驗甚明桓溫檄胡觀釁尤切並壯筆也凡檄之大體或述休明或敘否剝指天時審人事驗強弱角權勢摽耆龜於前驗懸鞶鑑於已然雖本國信實參兵詐譎詭以馳旨煒曄以騰說凡此眾作莫之或違者也故其植義颺詞務在剛健插羽以示迅不可使詞緩露板以宣眾不可使義隱必事昭而理辨氣盛而詞斷此其要也若曲趣密巧無所取才矣史記曰張儀魏人嘗從楚相飲相亡璧意儀盜之掠笞數百後儀既相秦為檄告楚相曰吾從汝飲不盜汝璧善守汝國我且盜汝城漢書曰申屠嘉為丞相鄧通在上旁怠慢嘉奏事因言曰陛下幸愛群臣則富貴之至於朝廷之禮不可以不肅上曰君勿言吾私之罷朝嘉為檄召通曰不來且斬通恐又言於上上曰速往吾今召汝通至丞相府免冠徒跣頓首謝嘉嘉不為禮責曰朝廷者高帝朝廷也通小臣戲殿上大不敬當斬決勑史令行斬之通頓首血出不解文帝度嘉已困通持節召通而謝嘉曰此吾弄臣君釋之東觀漢記曰光武數召諸將置酒賜坐席之間以要其死力當此之時賊檄日以百數憂不可勝上猶以餘間講經藝又曰盧江毛義性恭儉謙約家貧以孝行稱南陽張奉聞其名往候之坐有頃府檄到當守令義攝檄持入白母喜甚事具孝門後漢書曰耿恭為戊巳校尉移檄烏孫示漢威德大昆彌己下皆喜遣使獻名馬又曰隗囂故宰府椽吏善為文書每上移檄士大夫莫不諷誦魏書曰陳琳作檄草成呈太祖太祖先苦頭風是日疾發臥讀琳所作翕然而起曰此愈我疾病太祖平鄴謂陳琳曰君昔為本初作檄書但罪孤而已何乃上及父祖乎琳謝曰矢在弦上不得不發太祖愛其才不咎又曰劉放善為書檄三祖詔命有所招喻多放之所為張華別傳曰駕西征鍾會次長安華兼中書侍郎從行掌軍中書䟽表檄文帝善之晉書曰易雄長沙人也為舂陵令剌史譙王承既拒王敦將謀起兵以赴朝廷雄承符馳檄遠近列王敦罪西城陷為其所虜意氣慷慨神色無怍送到武昌敦遣人持檄示雄而數之雄曰此實有之惜雄位微力弱不能救國之難王室如燬安用生為今日即戮得作惡鬼乃所願也敦憚其辭正釋之眾人皆賀雄笑曰昨夜夢乘車掛肉其傍夫肉必有筋筋者斤也車傍有斤吾其戮乎尋而敦遣殺之當時見者無不傷惋又曰張軌為涼州剌史時晉昌張越涼州大族讖言張氏霸涼自以才力應之越初為梁州剌史而志在涼州遂託病歸河而陰謀伐軌乃遣兄鎮及曹祛麴佩移檄廢軌軌遣主簿奉表詣闕將歸老宜陽長史王融參軍孟暢蹋折鎮檄排閣入諫軌默然從之又曰元帝遣揚威將軍甘卓建威將軍敦逸攻周馥于壽春安豐太守孫惠卿眾應之使謝擒為檄擒馥之故將馥見檄流涕曰必謝擒之辭擒聞之遂毀草旬日馥眾潰續晉陽春秋曰何母忌母劉牢之姊也無忌與高祖謀夜於屏風裏製檄文母潛於屏風上窺之既知其謀大喜謂曰汝能如此吾讎恥雪矣嵇氏世家曰含字君道為中書郎書檄雲集含不起草北齊書曰高祖西討命中外府司馬李義深知相府城局李士略共作檄文二人皆辭請以孫搴自代高祖引搴入帳自為吹火催促之搴援筆立成其文甚美高祖大悅即署相府主簿專典文筆梁書曰元帝擒宋子仙及丁和送之江陵並下于獄子仙檄湘東曰既瞎且尰爾勇伊何即書記沈炯之文也有司焚毀湘東弗知僧辯購炯獲之酬錢十萬炯既不敢謁見遂謟事于僧辦自此軍書咸出於炯又曰偉玉洛陽人也學通周易嘗在准陽賦詩曰平明聽戰鼓薄暮敘存亡楚漢方龍鬥秦關陣未央既至江陵繫之於獄以詩贈湘東嬖人曰趙壹能為賦鄒陽解獻書何惜西江水不救轍中魚又上五十韻詩以希不死湘東愛其詞翰猶欲未誅左右嫉之乃曰偉前作檄文言詞不順湘東所視其檄云項羽重瞳尚有烏江之敗湘東一目寧為赤縣所歸湘東大怒釘其舌於柱剜其臍抽其腸出乃斬之陳書曰趙知禮涉獵文史善書翰武帝之討元景仲也或薦之引為記室知禮涉文贍速每召製書下筆便就率皆稱旨又曰顧野王博識洽聞侯景之寇郡將衣君正舉兵赴援文檄皆以委之口占便就未嘗立草國朝記傳曰元萬頃初為契苾何力征高麗管記作檄書云不知守鴨綠之險莫離支報云謹聞命矣遂移兵固守官軍不得入萬頃坐流嶺南唐書曰李巨川為華州掌書記時李茂貞犯京師天子駐蹕於華韓建以一州之力供億萬乘慮其不濟遣巨川傳檄天下請助轉餉同臣王室完葺京城西方書檄酬報輻湊巨川灑翰陳敘文理俱愜昭宗深重之時巨川之名聞於天下移文心雕龍曰移者易也移風易俗令往而人隨者也相如之難蜀尤文曉而喻博有檄移之骨焉詞剛而義辨文移之首也陸機之移百官言簡而事顯武移之要者也故檄移為用事兼文武其在金革則逆黨用檄順眾資移所以洗濯民心堅明符契意用小異而體大同也漢書曰劉歆字子駿成帝時與父向俱領校書講六藝傳記後王莽篡位為京兆尹哀帝時與五經博士講論諸儒博士不肯置對歆因移書太常博士後漢書曰韓馥見民情歸袁紹忌方得眾恐將圖己常遣從事守紹門不聽發兵橋瑁乃詐為三公移書傳驛州郡說董卓罪惡企望義兵以釋國難馥於是方聽紹舉兵齊書曰孔稚珪字德璋會稽人也周彥倫隱於北山後應詔出為鹽官令欲過北山乃假山靈之意移書於北山三國典略曰衛襄字叔遼河東人脩行至孝州郡嘉之時有白波賊眾數萬人官兵誅伐不能乎賊曰使叔遼要我願散於是襄為移書即平定王隱晉書曰毛寶據邾城陷寶尸沉江不出戴洋移告河伯死尸立出梁裴子野傳曰普通七年大舉北侵勑子野為移魏文受詔立成武帝以其事體大召尚書僕射徐勉太子詹事周捨鴻臚卿劉之遴中書侍郎朱異集壽光殿以觀之時並歎服武帝目子野曰其形雖弱其文甚壯勑為書喻相元乂其夜受旨子野謂可待且方奏未之為也及五鼓勑催令遣上子野徐起操筆撰之昧爽便就人奏武帝深嘉焉自是凡諸符檄皆令具草子野為文典而速不尚靡麗制多法之古與今文體異當時或有詆訶者及其末翕然重之或問其文速者子野荅言曰人皆成於手我獨成於心露布文心雕龍曰露布者蓋露板不封布諸視聽也後漢書曰鮑永為司隸校尉子昱復拜焉後詔昱詣尚書使封胡降檄光武遣小黃門問昱有所怪不對曰臣聞故事通官文書不著姓又當司徒露布怪使司隸下書而著姓也帝報曰吾故令天下知忠臣之子復為司隸也後漢書曰邢巒從征漢北巒後至高祖曰至此以來未擒滅城隍土崩想在不遠所以緩攻孝正待中書為露布耳又曰高祖每歎曰上馬能擊賊下馬作露板唯傳脩耳魏書曰高祖車駕南伐以韓顯宗統大軍破蕭鸞軍斬其將高法援等顯宗至新野高祖曰卿破賊斬師殊益軍勢朕方攻堅何為不作露布也顯宗曰臣頃聞王肅獲賊二三疋驢馬皆為露布臣布東親私每哂之近雖仰憑威靈得摧醜虜斬擒不多脫復高曳長縑虛張功捷九而効之其罪彌甚所以歛毫卷帛解上而已又曰彭城王勰從征齊軍帝令勰為露布露布者布於四海露之群臣以臣小才豈足大用帝曰汝亦才達但可為之及就尤類帝文人咸謂御筆帝曰非兄即弟誰能辨之勰對曰子夏被嗤於先聖臣又荷責於今來後魏書曰宇文神舉幽州人盧昌期祖英伯等聚眾據范陽反詔神舉率兵討擒之齊黃門侍郎盧思道亦在反中賊平見獲解衣將伏法神舉素欽其才名乃釋而禮之即令草露布其待士禮賢如此又曰呂思禮好學有文才雖務兼軍國而手不釋卷晝理政事夜則讀書令蒼頭執燭燭燼夜有數升沙苑之捷命為露布食頃便成周文歎其工而且速北齊書曰杜弼從高祖破西魏於卬山命為露布弼即書絹曾不起於草世說曰桓武北征時袁虎從被責免官會須露布文喚表倚馬前令作手不蹔輟俄頃得七紙殊可觀王東亭亦在側絕歎其才國史補曰李晟破朱泚德宗覽收城露布云臣已肅清宮禁祇謁寢園鍾簴不移廟皃如故上感涕失聲左右六宮皆嗚咽論者以國朝捷書露布無如此者于公異之詞也公異後為陸贄所忌誣以家行不至賜孝經一卷𡒄坎而終
