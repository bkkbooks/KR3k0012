body:
  text: 居處部十二戶釋名曰戶護也所以謹護閉塞也說文曰半門曰戶易豐卦窺其戶闃其無人毛詩鴻鴈斯干曰築室百堵西南其戶大戴禮曰隋武子戶之銘曰夫難得而易失又夏小正曰七月漢案戶漢天漢也案戶者直戶也言正南北也禮記曲禮上曰戶外有二屨言聞則入言不聞則不入將入戶視必下入戶奉扃視瞻母回不于掩人之私戶開亦開戶闔亦闔有後入者闔而勿遂又禮運曰大道之行外戶而不閉是謂大同又王藻曰君子之居恒當戶自明又月令曰孟春其祀戶祭先脾陽氣出祀之於戶也論語曰子曰誰能出不由戶者何莫由斯道也史記田嬰賤妾有子名文五月五日生嬰告其母勿令舉妾竊舉之及嬰見文怒曰五月之子長與戶齊不利其父母文頓首曰人生受命于天乎受命于戶乎如受命于戶則高其戶誰能至者嬰歎曰子休矣後漢龐參為漢陽太守郡人任棠者有奇節隱居教授參到先候之棠不與言但以薤一大本水一盞致於屏前自抱孫兒伏於戶下主簿白以為琚參思其微意良久曰棠是欲曉太守也水者欲吾清也拔大薤本欲吾擊強宗也抱兒當戶欲吾開門恤孤也於是歎息而還參在職果能抑強扶弱以惠政得人又曰魏應字君伯任城人也少好學建武初詣博士受業習魯詩閉戶誦習不交僚友京師稱之又曰魯恭十五及弟丕俱居大學習魯詩魯申公詩閉戶講誦絕人間事兄弟俱為諸儒所稱學士爭歸之晉書羊祜傳襄陽百姓於峴山祜平生遊憩之所建碑立廟歲時饗祭焉望其碑者莫不流涕杜預因名為墯淚碑荊州人為祜諱名屋室皆以門為稱改戶曹為詞曹也老子曰不出戶知天下莊子曰原憲居魯蓬戶不完桑以為樞也慎子曰天明不憂人之闇雖不憂闇也闕戶牖必取以明焉淮南子曰使鬼神玄化則不待戶牖而行若循虛而出入則亦無履也夫戶牖者風氣所從往來也而風氣者陰陽之戶牖者也離者必病離遭故託鬼神以戒之又曰百星之明不若一月之光十牖畢開不若一戶之明楊子法言曰山徑之蹊不可勝由矣向墻之戶不可勝入矣曰惡由入曰孔氏孔氏者戶也曰子戶乎曰我戶哉吾獨有不戶者矣惡大不由聖人之道者也三輔黃圖曰明堂有三十六戶法極陰之變數束晢發蒙記曰治戶傷孕婦楚國先賢傳曰孫敬入學閉戶牖精力過人太學號曰閉戶先生語林曰大將軍丞相諸人在此時閉戶共為謀身之計王曠世弘來在戶外諸人不容之曠乃剔壁闚之曰天下大亂諸君欲何所圖謀將欲告官遽而內之遂建江左之策神異經曰東南有石井焉上二石闕東南面上有榜著闕題曰地戶列士傳曰吳王闔閭畏王僚之子慶忌作石室銅戶以備之太公金匱戶之書曰出畏之入懼之也解道虎齊記曰巢父城北十五里石戶聖人去轉欲閉今裁廣數寸窺屋裏方二丈論衡曰燕王生明光宮所臥處三戶盡閉使二十人開不得越地傳曰勾踐宮有百戶列仙傳曰方回堯時隱人食雲母夏桀時為人所閉於宮中從求道因化得去印封其戶時人曰得方回一丸泥閉戶不可開樞爾雅曰樞謂之椳郭璞注曰門戶扉樞也孫炎曰門戶扇樞間可依蔽為椳也說文曰門樞謂之椳魏志華佗曰戶樞不朽潛夫論曰貴戚懼家之不吉而聚為令名懼之不堅而為作鐵樞卒其所敗者非禁忌少門樞朽也苦崇貨財而行驕僣失民心耳事具門部傅子曰漢武世王侯觀殿重階金樞紫墀李陵詩曰明月照戶樞想見餘光輝文選詩曰秦地天下樞八方溱賢才尚書顧命曰四人綦弁執弋上刃夾兩階戺孔安國曰綦文鹿子皮弁亦土也堂廉曰戺土所立處爾雅曰樞達北方謂之落時落時謂之戺郭璞曰門特樞者或達北隱以固三秦記曰明光殿以金為戺關易復卦曰先王以至日閉關商旅不行后不省方焦貢易林曰大畜之乾金柱鐵關堅固衛災君子居之居當憂居左傳襄四年季孫攻臧紇斬鹿門之關以出奔邾杜預曰魯南城東門方言曰關而東陳楚之間戶籥老子曰善閉無關鍵史記曰侯嬴謂魏公子曰嬴乃夷門抱關者又漢書王仲翁謂蕭望之曰不肯錄錄反抱關為錄錄循常也魯連子曰魯連先王見孟嘗君於杏堂之門孟嘗君曰吾聞先生有勢數可得聞乎連曰勢數者譬若門關舉之而便則可以一指持中而舉之非便則兩手不關非益加重兩手非加罷也彼所起者非舉勢也彼可舉然后舉之所謂勢數鑰周禮地官曰司門掌授管鍵以啟閉國門鄭司農云鍵為壯也方言曰關西謂之鑰何承天纂文曰牡出鑰者也人作鑰子鑰母非也東宮舊事曰守鑰四人對番上下東宮門鑰在中庶子坊太公金匱鑰之書曰昏慎守深察訛也風俗通曰鑰施懸魚翳伏淵源欲令楗閉如此闈爾雅曰宮中門謂之闈周禮考工記曰闈門容小扃蔡邕明堂月令語曰明堂之門北門稱闈閨爾雅曰闈小者謂之閨說文曰閨持主戶也上圓下方有似於圭文選曰閨中風暖閤說文曰閤門傍戶也爾雅曰小閨謂之閤史記曰汲黯為東海太守以清靜為政黯多病臥閤內不出歲餘東海大治漢書曰公孫弘為丞相起客館開東閤以延賢人又曰田延年盜三千萬即閉閤獨居偏袒持刀東西步數日使者召延年詣廷尉聞鼓聲自刎死漢書曰左馮翊韓延壽行縣之高陵有昆弟相與訟田延壽恥不能明教化因入傳舍閉閤思過訟者自髡肉袒謝之宋書曰孝武宴朝賢張暢何偃並在坐偃因醉曰張暢固是奇才同義宣作賊亦能無咎非才何以致此暢乃厲聲曰太初之時誰黃其閤帝曰何事相苦初元凶時偃父尚之為元凶司空義師至新林門生皆逃尚之父子與婢妾共洗黃閤故暢譏之晉宮閤名曰洛陽宮有金光閤清陽閤朱明閤承休閤安樂閤白藏閤顯仁閤崇明閤章德閤飛雲閤安世閤長安閤長安有東明閤西華閤紫闥閤傅玄歌詩曰我家近宮掖易知復難忘黃金為閤門白玉為殿堂晉宮閤名曰洛陽有金光閤文成閤明度閤飛雲閤安世閤長安有東明閤西華閤紫闥閤宋志三公黃閤前史無其義按禮記士韠與天子同公侯大夫則異鄭注云賤與君同不嫌也夫朱門洞開當陽之正色也三公與天子禮秩相亞故黃其閤以示嫌不敢近天子也且漢制云爾閣周書作雒曰凡五宮堂咸有深閣韓詩外傳曰黃帝時鳳皇集東園止於阿閣棲梧桐食竹實終身不去禮記內則曰大夫七十而閣天子之閤左達五右達五鄭玄注曰閤以板為之藏食物也王者三牲肉及魚臘廣雅曰棧閣也漢書曰甘露中五經諸儒雜論於石渠閣又揚雄傳曰王莽時雄校書天祿閣上治獄使者來欲收雄雄恐不免乃從閣上自投幾死莽聞之曰雄素不與事何故在此間請問其故迺劉愔子棻嘗從雄學作奇字雄不知情有詔勿問然京師為語曰惟寂惟寞自投于閣後漢楊級上言宣帝博徵群儒論定五經於石渠閣方今天下少事學者得成其業而章句之徒破壞大體宜如石渠故事永為後世法於是詔諸儒於白虎觀論考同異焉陳書曰至德二年後主於光昭殿起臨春結綺望仙等三閣長數丈並數十間其䆫牖戶壁皆以懸柏橍檻之類並以沉檀香木為之又飾以金玉間以珠翠外施珠簾內有寶帳其服玩之屬瑰寶珍異皆近古所未有每微風暫動香聞數里朝日初照光映後庭其下積石為山引水為池植以奇樹雜以花藥後主自居臨春閣貴妃居結綺閣龔孔二貴嬪居望仙閣並複道交相往來五代史朱梁傳曰宰相柳璨奏西京舊有凌煙閣圖畫國初功臣今遷幸東都比未崇建四鎮副元帥梁王勳業冠古請近新凌煙閣別創一閣圖畫梁王以旌德業詔曰魏賞彭陽之功別創紀勳之觀齊旌泗水之績乃崇嘉德之樓式示新規爰從舊典宜令所司於皇城內擇善地別造凌煙閣圖寫賜名曰天祐旌功之閣戰國策曰田單棧道木閣以迎齊襄王及后於城陽山反之國楚漢春秋曰項王為高閣置太公於上告漢王曰今不急下吾烹太公漢王曰吾與項王約為兄弟吾翁即汝翁若烹汝翁幸分我一杯羹三輔舊事曰秦二世欲起凌雲閣與南山齊漢宮殿䟽曰天祿閣騏驎閣蕭何造以藏祕書畫賢臣凌雲閣秦二世造洛陽宮殿簿曰高平觀南行至清覽觀高閣六十四間脩齡觀南行至臨商觀高閣五十五間太極殿前南行仰閣三百二十八間南上惣章觀閣十三間東上凌雲臺閣十一間永寧宮連閣二百八十六間十二間連閣上下數見親觀差閣九間洛陽地記曰雲臺高閣十四間乘風觀高閣十二間丹陽記曰漢魏殿觀多以複道相通故洛宮之閣七百餘間三輔故事曰天祿閣石渠閣在大殿北以閣祕書又畫賢臣象凡十一人霍光第一蘇武第十二尸子曰泰山之中有神房阿閣物理論曰故之人任孕者惣其名籍上之天府天子立金匱玉閣命司錄以監省之西京記曰西京大明正中含元殿殿東西翔鸞棲鳳閣下肺石登聞鼓左右龍尾道東京記曰紫微宮有臨波閣閶闔閣班固西都賦曰周廬千列徼道綺錯輦輅經營蘭除飛閣張衡西京賦曰鉤陳之外閣道穹隆屬長樂與明光徑北通乎桂宮葛龔反遂初賦曰考天文於蘭閣覽群言於石渠古詩曰交䟽結綺䆫阿閣三重階陸機樂府詩曰昌門何峨峨飛閣跨通波崔琦七蠲曰紫閣青宮綺錯相連東京賦曰飛閣神行南都賦曰連閣煥其相輝上林賦曰重卒曲閣陸機表云登三閣注三閣謂祕書郎掌內外三閣經書鮑昭詩觀霞登綵閣蜀都賦曰行陽城之延閣注延長也江淹表云府之延閣注延閣書府也天臺賦曰朱閣玲瓏於雲間陸機詩曰飛閣纓虹帶張景陽七命翠觀岑青彫閣霞連謝玄暉詩曰尋雲陟累樹隨山望茵閣楚辭曰蘭閣兮黃樓古詩曰層閣肅天居簃爾雅曰連閣謂之簃郭璞注曰堂樓閣連小屋今呼之簃躕連觀也通俗文連閣曰簃闥東觀漢記曰帝詔馬嚴留仁壽闥與校書杜撫班固定建武注記晉宮閣名曰洛陽宮有崇陽闥延明闥通明闥脩雲闥通福闥徵音闥承休闥玄明闥玄暉闥崇禮闥白藏闥
