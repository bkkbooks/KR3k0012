body:
  text: 皇王部二十五東晉安皇帝晉書曰安皇帝諱德宗孝武帝長子也泰元十二年立為皇太子二十一年九月庚申孝武崩辛酉太子即位大赦癸亥以司徒會稽王道子為太傅攝政隆安元年春正月己亥朔帝加元服改元增文武位一等太傅會稽王道子歸政四月甲戍兗州刺史王恭豫州刺史庾揩舉兵以討尚書左僕射王國寶建威將軍王緒為名甲申殺國寶及緒以悅于恭恭乃罷兵二年七月兗州刺史王恭豫州刺史庾揩荊州刺史殷仲堪廣州刺史桓玄南蠻校尉楊佺期等舉兵反八月江州刺史王愈奔于臨川九月加太傳會稽王道子黃鉞遣征虜將軍會稽王元顯等討桓玄等輔國將軍劉牢之次新亭使子敬宣擊敗恭恭奔曲阿長塘湖湖尉收送京師斬之尋遣太常殷茂諭仲堪及玄玄等走于尋陽三年十一月妖賊孫恩陷會稽內史王疑之死之吳國內史桓謙等並委官而遁遣衛將軍謝琰等逆擊走之四年五月孫恩寇浹口謝琰為孫恩所陷死之恩轉寇臨海六月輔國司馬劉裕破恩于南山恩將盧循陷廣陵元興元年正月庚午朔大赦改元以後將軍元顯為驃騎大將軍征討大都督鎮北將軍劉牢之為元顯前鋒將軍譙王尚之為後部以討桓玄二月景午帝戎服餞元顯于西河丁巳遣兼侍中齊王柔之以騶虞幡宣告荊江二州丁卯桓玄敗王師于姑孰壬申桓玄自為侍中丞相録尚書事二年春二月辛丑建威將軍劉裕破徐道覆于東陽乙卯桓玄自稱大將軍丁巳冀州刺史孫無終為桓玄所害秋八月玄又自號相國楚王九月南陽太守庾仄起義兵為玄所敗冬十一月壬午玄遷帝于永安宮癸未移太廟神主于琅耶國十二月壬辰玄纂位以帝為平固王辛亥帝蒙塵于尋陽三年春二月帝在尋陽庚寅夜濤水入石頭漂殺人戶乙卯建武將軍劉裕帥沛國劉毅東海何無忌等舉義兵景辰斬桓玄所署徐州刺史桓修于京口及青州刺史桓弘于廣陵丁巳義師濟江三月戊午劉裕斬玄將吳甫之于江乘斬皇甫敷於羅落己未桓玄衆潰而逃庚申劉裕置留臺具百官壬戍桓玄司徒王謐推推劉裕行鎮軍將軍徐州刺史都督楊徐兗豫青冀幽并八州諸軍事假節劉裕以謐領楊州刺史録尚書事辛酉劉裕誅尚書左僕射王愈及愈子荊州刺史緩司州刺史溫詳辛未桓玄逼帝西上景戍密詔以幽逼於玄萬機虛曠令武陵王遵依舊典承制總百官行事加侍中餘如故并大赦謀反大逆已下唯桓玄一祖之後不宥夏四月己丑大將軍武陵王遵稱制總萬機庚寅帝至江陵庚戍輔國將軍何無忌振武將軍劉道規及桓玄將庾稚何淡之戰于湓口大破之玄復逼帝東下五月癸酉冠軍將軍劉毅及玄戰于崢嶸洲又破之己卯帝復幸江陵辛巳荊州別駕王康産南郡太守王騰之奉帝居于南郡壬午督護馮遷斬桓玄於南貊盤洲乘輿反正于江陵閏月己丑桓玄楊武將軍桓振陷江陵帝復蒙塵于賊營義熙元年正月帝在江陵太守魯宗之起義兵襲破襄陽己丑劉毅次于馬頭桓振以帝屯于江津辛卯宗之破振將溫揩于柞溪進次紀南為振所敗振武將軍劉道規擊桓謙走之乘輿反正帝與琅耶王幸道規舟二月丁巳留臺備乘輿法駕迎帝于江陵三月桓振復襲江陵荊州刺史司馬休之奔于襄陽建威將軍劉懷簡討振斬之帝至自江陵六年十二月劉裕破盧循于豫章七年春二月右將軍劉藩斬徐道覆于始興傳首京師夏四月盧循走交州刺史杜慧斬之十二年八月劉裕及琅耶王德文率衆伐姚泓景午大赦冬十月景寅姚泓將姚光以洛陽降己丑遣兼司空高密王恢之修謁五陵十三年秋七月劉裕剋長安執姚泓收其彝器歸京師十四年十二月戊寅帝崩于東堂在位二十三年時年四十七葬休平陵帝不慧自少及長口不能言雖寒暑之變無以辨也凡所動止皆非已出故桓玄之纂因此獲全桓玄晉書曰桓玄字敬道一名靈寶大司馬溫之孽子也其母馬氏嘗與同輩夜月下坐見流星墜銅盆中忽為二珠璨然明靜競以瓢接取馬氏得而吞之若有感遂有娠及生有光照室占者奇之故小名曰靈寶妳媼每抱詣溫輒易人而後至其重兼常兒溫甚愛異之臨終命以為嗣襲爵年七歲溫服終府州文武辭其叔父沖沖撫玄頭曰此汝家故吏也玄因涕淚被面衆並異之及長形貌瓌奇風神踈朗博綜藝術善屬文常負其才地以雄豪自處時咸憚之年二十三拜為太子洗馬時議謂溫有不臣之迹故折玄兄弟而為素官後出補義興太守鬱鬱不得志嘗登高望震澤歎曰父為九州伯兒為五湖長棄官歸國自以元勳之門而負謗於世乃上疏曰臣聞周公大聖而四國流言樂毅王佐而被謗騎劫巷伯有豺獸之慨蘇公興飄風之刺惡直醜正何代無之先臣蒙國殊遇姻婭皇極西平巴蜀北清伊洛使竊號之寇繫頭北闕園陵修復太恥載雪飲馬灞滻懸旌趙魏勤王之師功非一捷泰和末皇基有潛移之懼遂奉順天人翼登聖朝晉室之機危於殷漢先臣之功高於伊霍矣至於先帝龍飛九五陛下之所以繼明南面請問談者誰之由也若陛下忘先臣大造之功信具錦萋斐之説臣等自當奉還三封受戮市朝然後下從先臣歸先帝玄宮耳疏寢不報玄在荊楚積年優遊無事荊州刺史殷仲堪敬憚之及中書令王國寶用事謀削弱方鎮內外騷動知王恭有憂國之言玄潛有意於功業乃説仲堪宜興晉陽之師以內匡朝廷已當悉荊楚之衆順流而下推王恭為盟主此桓文之舉也俄而王恭信至招仲堪及玄匡正朝廷國寶既死於是罷兵詔以玄為廣州刺史其年王恭又與庾揩起兵討江州刺史王愈及譙王尚之兄弟玄仲堪謂恭事必剋捷一時響應仲堪令玄與楊佺期為前鋒玄至盆口獲王愈詔以玄為江州各西還屯于尋陽共相結約推玄為盟主後荊州大水仲堪振恤飢者倉廩空竭玄乘其虛而伐之至江陵仲堪數道拒之不剋佺期自襄陽來救期敗走殷仲堪亦見害於是平荊雍詔以玄督八州荊州牧玄於是樹腹心兵馬日盛其後孫恩逼京師玄建牙旗聚衆外託勤王實欲觀釁以兄偉為冠軍江州刺史留偉守江陵抗表率衆下至尋陽移檄京邑罪狀元顯玄既興師犯順慮衆不為用恆有回斾之計既過尋陽不見王師意甚悅將吏亦振先使其將馮該等攻譙王尚之敗之劉牢之遣子敬宣降玄至新亭元顯自潰玄入京師矯詔加已總百揆為丞相加黃鉞羽葆鼓吹府置官屬乃徙太傅道子于安成害元顯于市多戮朝望改易百官各置所親大赦改年為大亨玄將出居姑孰其中書令王謐對曰公羊有言周公何以不之魯欲天下一乎周也願靜根本以公旦為心玄善其對而不從遂大築城府乃出鎮焉大政皆咨之小事則決其僕射桓謙及卞範之後諷朝廷封諸子弟為公自知怨滿天下欲速定纂逆殷仲文卞範之等又共催促之於是先改授郡司其黨皆三公又矯詔封十郡為楚王加九錫備物楚國丞相以下一遵舊典又諷天子御前殿而策授焉玄屬偽讓詔遣百僚敦勸乃就命玄偽上表求歸藩又自作詔留之遣使宣旨玄又上表固請又諷天子作詔固留十一月矯制加其備天子禮服御禮樂皆僣備焉又矯詔使王謐兼太保奉皇帝璽禪位於已出居永安宮移晉神主于琅耶廟初玄恐帝不為手詔又慮璽不可得逼臨川王寶請帝自為手詔因奪取璽比臨軒璽已久出玄甚喜百官到姑孰玄偽讓朝臣固請玄乃於城南七里立郊壇以玄牡告天百僚陪列而儀注不備妄稱萬歲遂升壇燎于南郊大赦改元永始初偽詔改年為建始右丞王攸之曰建始復是王莽始執權之歲也其兆號不祥冥符僣逆如此國號大楚以南康平固縣奉晉帝為平固王車旗正朔如舊典遷居尋陽依陳留王處鄴宮故事追尊其父溫宣武皇帝諸子皆為王玄入建康宮逆風迅激旌旗儀飾皆傾及小會西堂設妓樂殿上施絳綾帳鏤黃金為顏四角作金龍頭銜五色羽葆旒蘇群臣竊相謂曰此頗似轜車亦王莽仙蓋之流也玄以其妻劉氏為皇后更造大輦容三十人坐以二百人舁之性好畋遊以體大不堪乘馬又作徘徊輿施轉關令回動無滯玄自纂盜之後驕奢荒侈遊獵無度以夜繼晝性又急暴呼召嚴速直官咸繫焉省前禁內雜亂無復朝廷之體於是百姓疲苦朝野勞悴怨怒思亂者十室八九焉劉裕劉毅何無忌等共謀克復裕等斬桓修于京口斬桓弘于廣陵裕率義軍至竹里玄遣吳甫之皇甫敷北距義軍裕等於江乘與戰臨陳斬敷及甫之玄聞之大懼乃召諸道術人推算數為厭勝之法乃問衆曰朕其敗乎曹靖之對曰神怒人怨臣實懼焉玄曰人或可怨神何為怒對曰移晉宗廟飄泊無所失楚之祭不及於祖此其所以怒也玄曰卿何不諫對曰輦上君子自以為堯舜之世何敢妄言玄愈忿懼使桓謙何淡之屯東陵卞範之屯覆舟山西衆二萬拒義軍裕至蔣山使羸弱登山分張旗幟數道並前玄偵候還云裕軍四塞不知多少玄益憂惶于時東北風急義兵放火煙塵張天鼓譟之音震駭京邑劉裕執鉞麾而進謙等諸軍一時奔潰玄率親信數千人聲言赴戰遂出南掖門西至石頭使殷仲文具船相與南奔或勸其戰玄不暇答直以策指天而經日不得食左右進以粗飯咽不能下其子升時年數歲抱玄胸而撫之玄悲不自勝劉裕以武陵王遵攝萬機立行臺揔百官遣劉道規躡玄玄至尋陽江州刺史郭昶之給其器用殷仲文自後至望見玄舟旌旗輿服備帝者之儀歎息曰敗中復振故可也玄於是逼乘輿西上於道作起居注敘其拒義軍之事自謂經略指授算無遺策諸將違節度以致虧喪非戰之罪玄至江陵石康納之未三旬衆盛謂其群黨曰卿等並清塗翼從朕躬都下竊位者方應謝罪軍門其觀卿等入石頭並雲霄中人也玄遣何淡之守湓口何無忌劉道規等破之帥舟艦二百發江陵以徐放為常侍遣説無忌等解軍謂放曰諸人不識天命致此妄作遂懼禍屯結卿三州所信可明示朕心若退軍解甲當與之更始授任江水在此朕不食言時道規已至玄與戰於崢嶸州于時義軍數千玄兵甚盛而玄懼敗常漾輕舸於舫側故其衆莫有鬥心義軍乘風縱火盡鋭爭先玄衆大潰玄留永安太后及皇后於巴陵殷仲文時在玄艦求出別船收集散軍因叛玄奉二后奔于江陵玄欲出投漢州而制令不行左右於暗中斫之不中前後相殺交橫玄僅免於是荊州別駕王康産奉帝入南郡時益州刺史毛璩使其從孫祐之送帝璠喪葬江陵有衆二百璩弟子修之先為玄校尉誘玄以入蜀幸枚回洲祐之迎擊玄矢下如雨玄被箭其子升拔去之益州督馮遷抽刃而前玄拔頭上玉簪與之仍曰是何人邪敢殺天子遷曰欲殺天子之賊耳遂斬首時年三十六自篡逆至敗凡八旬矣恭皇帝晉書曰恭帝諱德文安帝母弟也初封琅耶王歷中軍將軍散騎常侍衛將軍開府儀同三司加侍中領司徒録尚書六條事元興初遷車騎大將軍桓玄執政事進位太宰加袞冕之服緑綟綬玄篡位以帝為石陽縣公與安帝俱居尋陽及玄敗隨至江陵玄死桓振奄至躍馬舊戈直至階下瞋目謂安帝曰臣門戶何負國家而屠滅若是帝乃下床謂振曰此豈我兄弟意耶振乃下馬致拜振平復為琅耶王又領徐州刺史尋拜司馬領司徒加殊禮義熙五年置左右司馬長史從事中郎四人加羽葆鼓吹十二月戊寅安帝崩是日即帝位大赦元熙元年春正月壬辰朔改元以山陵未厝不朝會立后禇氏甲午徵劉裕還朝二年夏六月壬戍劉裕至于京師傅亮承裕密旨諷帝禪位草詔請帝書之帝欣然謂左右曰桓玄之時天命已去為劉公所延二十載矣今復何恨乃書赤紙為詔甲子遂遜于琅耶第劉裕以帝為零陵王居于秼陵行晉正朔車旗服色一如其舊有其文而不備其禮宋永初二年九月崩于內房時年三十六諡恭皇帝葬沖平陵續晉陽秋曰初安皇不慧起居動止不自己帝每侍左右消息涼溫飢飽之中而恭謹備焉時人稱其順悌又雅信佛法鑄貝貨十萬造丈六金像於瓦官寺外國齊日迎像宮步從十許里安皇帝歸陵有詔當出送八座奏諫以為宜加珍攝乃止沈約宋書曰褚秀之妹為恭帝后兄弟并盡忠孝高祖恭帝每生男轍令方便殺焉或誘賂內人或密加毒害前後如此非一恭帝居秼陵宮帝懼見禍與褚后共止一室慮鴆毒自煮食於床前高祖將殺之不欲遣人入內令褚淡之兄弟侍褚后出別宮官相見兵人乃踰垣而入進藥於恭帝帝不肯飲曰佛教自殺者不得復人身乃以被掩殺之中興書曰昔中宗以丁丑之歲始稱晉王改築宗廟使郭璞筮之云載祀二百暨今禪代庚申之歲凡百有二年而天祿永終璞精於數術理無乖二抑以百四期促故謬其嗣為二百乎史臣曰安帝即位之辰鍾無妄之日道子元顯并傾朝政主昏臣亂未有不亡者也雖有手握戎麾心存舊國回首無良忽焉簫散於是桓玄承釁勢踰飆指六師咸泯隻馬徂遷是以宋高非典午之臣孫恩豈金行之寇若乃世遇顛覆則恭皇斯甚於越之民詎燻丹穴會稽之侶寧歎入臣去黃屋而歸來灑丹書而不恨夫五運攸革三微數盡猶高秋凋候理之自然觀其零落人有為之流涕者也
