body:
  text: 道部一道老子曰道可道非常道虛極之妙也無名天地之始有名萬物之母無名者妙本也道冲而用之或似不盈淵乎似萬物之宗天地之閒其由橐籥乎玄牡之門是謂天地根天地所以能長且久者以其不自生故能長生生而不有為而不恃長而不宰是謂玄德執古之道以御今之有能知古始是謂道紀萬物並作吾以觀其復功成事遂百姓皆謂我自然絕聖棄智民利百倍孔德之容惟道是從以閱眾甫吾何以知眾甫之然哉曲則全謂曲己以應務則全也枉則直謂枉己以伸人則直也窪則盈謂執謙則常盈也弊則新謂守弊薄則日新也少則得謂抱一不離則無失也多則惑謂有為多門則惑亂也是以聖人抱一為天下式希言自然者謂因言悟道不滯於言合自然也有物混成先天地生寂兮寥兮獨立而不改周行而不殆吾不知其名字之曰道強為之名曰大域中有四大王居其一謂王者人靈之主萬物繫其興亡也人法地地法天天法道道法自然重為輕根靜為躁君善行無轍跡謂體了真性行無行相則心與道宜也善言無瑕摘謂遣象求意理證心忘也善計不用籌筭謂一以貫之不生他見也善閉無關楗而不可開謂心無逐境之迷境無起心之累也善結無繩約而不可解謂心與道合雖無約束其不可解也是以聖人常善救人故無棄人常善救物故無棄物是謂襲明知其雄守其雌知其白守其黑知其榮守其辱謂含德內融則復歸於朴常德聽川則散而為器既涉形器必有精麤聖人用之則為群材之官長矣故大制不割謂聖人用道大制群生萬物不謝於自然曾不割傷也道之在天下猶川谷之與江海死而不亡者壽謂死者分理之終亡者夭折之數壽者一期之盡夫知足力行者得天常也死而不亡是一期之盡可謂壽矣執大象天下往往而不害安於太平化而欲作吾將鎮之無名之朴謂道也失道而後德失德而後仁失仁而後義失義而後禮天下之物生於有有生於無明道若昧進道若退夷道若類上德若谷謂虛沿而容物也大白若辱謂能潔而含垢也廣德若不足謂大成而執謙也建德若渝謂立功而不衒也體真若渝謂淳一而和光也大方無隅謂不小立圭角也大器晚成謂且無近功也大音希聲謂不飾小說也大象無形謂能應萬類也道隱無名謂功用不彰也道生一一生二二生三三生萬物萬物負陰而抱陽冲氣以為和為道日損損之又損以至無為故塞其兌閉其門終身不勤也謂不縱六根愛悅則禍患之門閉矣終身不勤勞也開其兌濟其事終身不救謂開縱視聽以成其愛悅之事故有禍患不救也無遣自殃是謂襲常謂不為身災是謂密用真常之道也又曰知者不言言者不知所以言者以音相聞譬如知音者識音以絃心知其音口不能傳道深微妙知者不言也太上曰知者不言言能以救物又曰上士學道受之以神中士受之以心下土受之以耳以神聽者通無形以心聽者知內情以耳聽者聞外聲又曰知者不言言者不知故聖人云我無為而民自化我無事而民自富我好靜而民自正我無欲而民自樸脩之於身天下自化深根固蒂長生久視之道以道蒞天下其鬼不神道者萬物之奧為者敗之執者失之是以聖人無為故無敗無執故無失太上經曰混茫之氣變化為真人與時翱翔有名無體仙經曰神仙輕舉謂之天仙列位太清度名祕籍祕要經曰五岳洞府隱處地仙保其神形遠其憂患又曰太清九官皆有僚屬其最高者稱太皇紫皇玉皇其高揔稱大道君次稱真人真卿其閒有御史凡稱太上者一宮之尊也德高無踰故曰太上又曰仙者川也身者舟也濟川得岸何假舟焉太真科曰玉皇譜錄有百八道君群仙隨業以補其職三善道者聖真仙也上品曰聖中品曰真下品曰仙三清之閒各有正位聖登玉清真登上清仙登太清玉清有大帝宮殿皇帝王公卿大夫吏民率以聖呼之如聖皇聖帝之類是也男女貴賤各有次第上清有玄都玉京七寶紫微率以真呼之太清有太極宮殿率以仙呼之其上清太清之品位男女次第之統數與玉清同大洞經曰從生得道從道得仙從仙得真從真得為上清君五符經曰二十四真圖五岳之靈寶也能得之必能仙去飛步太清欲得道法先沐浴去穢當得東井圖欲定五帝役山精當得五岳圖欲通神靈法仙訣當得八史真形圖欲通五行廚當得六甲通靈圖欲存吾身致天神當得九宮紫房圖欲奉道法當得太清圖欲奉順道當得混成圖欲通道機當得西昇保錄圖欲通變化當得靈化圖欲躡大道當得九天圖欲脫身形當得九變圖欲隱存守身神當得養身圖欲定身守神寶當得含影圖欲恬泊守一以存身當得養身圖欲寂默養志當得精誠守志圖欲清淨潔白致其芝英當得芝英玉女圖欲騁六丁當得六陰玉女圖欲致仙籙當得九九道仙圖欲食道氣當得導引圖欲治道術當得洞中皇寶圖欲為變化當得偃息圖欲臨鑪定九丹金液當得太一圖欲登五岳求神仙芝藥當得開山芝藥圖欲保神形別邪精當得明鏡圖上清經曰氣之所守隨神所生神在則氣在神去則氣去氣散則為雲霧合則為形影出之為仙化入之為真一匕結三元下結萬物靜用為兆身動用為兆神洞真經曰凡讀太丹隱書洞真玄經能研精密感通玄達雲迴釋玄元味景太清者得為玄中法師也葛洪神仙傳曰自伏羲至三代顯名道士世世有之其老子蓋得道尤精者也內實自然欲正定本末當以史傳為據并仙經祕文以相參會其他俗說文多虛妄其後道士私有增益非真文也著道德二篇尹喜行其道至漢竇太后好黃老言孝文帝及外戚諸竇皆令讀之故莊周之徒以老子為宗太上玄一真人經曰眾真高仙皆有師也奉受上清三洞寶經為學無師則道不成八景龍輿焉可得乘太極玉闕焉可得登凡學上清之道豈肉飛之舉若慢於師道則失投夜光也以是言之道固難知也至於聖賢皆尊其師所以耐道也太上太霄琅書曰天地布氣師教之真真仙登聖非師不成心不可師師心必敗寶玄經曰裁制偏邪必歸中正能及流末還至本源道本無形假言立象雖言沖用用實無物道典曰制殺生者天也順性命者人也非逆天者勿殺也非逆人者勿伐也為政如是蓋道之極也七聖紀曰南岳赤君下教變跡為道士與六弟子俱顯姓名太一帝君經曰求道者使其心正則天地不能違也捨色累而不顧避榮利而自遠甘寒苦以存思樂靜齋於隱垣則學道之人始可與言矣太上三五順行經曰天者道之應形也應有時漸交以引之玄象虛文莫過三五三五順行運周則變通不窮三才合度太一者天也天之受一氣蕩蕩而致清道者天之積靈也昇玄經曰道之玄妙出於自然生於無生先於無先彌綸無外布神化氣淡然無上制御諸天玄妙內篇曰大道起於無為萬物之祖也正一真人經曰道之淳真非有言也借言通意因置玄都正一之化去真近矣寶玄經曰正則道合合則言志志言在正正以絕邪齋戒通經仙道自成成仙之大莫過太上太上無言言以應感感應之道表信成經也三皇經曰求索自然脫身當道三光發明天地常然智惠經曰與人君言則惠於國人父言則慈於子人師言則愛於眾人兄言則悌於行人臣言則忠於上人子言則孝於親人友言則信於交人婦言則志於夫人夫言則和於室人弟言則恭於禮野人言則勸於農道士言則止於道異國人言則各守其域奴婢言則慎於事太上經曰親近賢智博問善道賢者論議不可專執又曰末世道士講經說法儀軌云何若說五千文者亦依靈寶太上三洞寶經曰三洞傳法之師一人度世勝黃衣道士千人也又曰大茅山有銅鐵鼎可容四五斛刻甚精好在山最高處乒土八尺餘上有盤石掩鼎每吉日遠近道士咸登山瞻視無復草木壘石為小壇昔有小瓦屋為風所倒兩鉉法日月也三足法三才也羽山之銅所作神變隱顯真誥曰大茅山西南有四平山俗謂之方山其下有洞室名曰方臺洞有兩口見於山外與華陽通號為別宇幽館矣得道者處焉又曰脩於身其德乃真君子立身道德為任清淨為師太和為友為玄為默與道窮極治於根本求於未兆為善者自賞為惡者自刑故不爭無不勝不言無不應又曰能以至心學道當以道授學者裴君曰我師南岳赤松子為大虛真人昔太上以德教老子以得道松子以道授我而得仙又曰仙道十二試觀之法試皆過然後授之經此十二事大試也皆太極真人臨見之可不慎焉昔彭祖弟子青鳥公受明師之教審仙妙之理入華陰山學道積年十二試有三不過後服金液而升太極道君以為試三不過伹仙人而已不得為真人又曰裴君云學道者有九患若審之則仙不遠也患人有志無時有時無友有友無志有志不遇其師遇師不學學師不勤勤不守道或志不固一心如此則不須友而成亦不須感而動此學仙之廣要也師有憂戚弟子出入無善為學無師道則不成心存目想見師如經學非師授不可以教人恐疑悟後學故不得傳求法事師莫擇貴賤勿疑長幼言我年大而彼年小彼是賤而我是貴此是未解正真平等之要人無貴賤有道則尊所謂長老不必耆年要當多識多見以為先生不得言彼學在我後云何更反師彼作此念者非學道也當謙下推能讓德惟善是從不得獨是非彼得道度世莫不由師也學之有師亦如樹之有根也太智既成復能成就小智由樹根生子子復能生根展轉相生種類不絕從師變道道過於師還教於師所謂道貴人賤義類如此先師並須尊異所以爾者本師者學之根也譬為山一簣之士漸得高大本師者發蒙之基也後師者備成也諭如嚴裝服飾眾事已辨惟未加冠不可以行人事也妄生下想所以然者論議言說為人模範師不明道焉能解疑難也古者賢聖上學得其師名為更生不得其師名為亂經無其師道不自生也太平經曰上士學道輔佐帝王好生之德也中士學道欲度其家下士學道才脫其身又曰言則道不成多言則為害閉口不言萬歲無患又曰人得善師乃使凡賤之人成善人善不止更賢賢不止次聖聖不止乃得深知真道守道不止乃得仙仙不止乃與天比其神神不止乃得與元氣比其得元氣乃包天地八方莫不受其氣而生是善師之功也不得其善師失路矣故師師相傳迺堅於金石不以師傳之名為妄作則致邪矣叛去其師是去其真道自窮之術也道有宗師祖師定真玉籙曰治心之最不忘須臾心神乃定定則入道其狀在外慎其言語懼觸物也節其飲食慮貪叨也衣麤而靜在素淡也居陋而隱守靜篤也恭謹一切避淩辱也不敢為先免嫉謗也始終淳信潛化導也進止和光密行教也挫銳解紛明道有時也出處變化見神應之速也又曰九宮真人出入皆從黃闕絳臺中閒為道故以道之左右置臺闕者以司非常之氣伺迎真人之往來也道基經曰服藥食麥為善麥有甘始道士御氣食麥而度世也又云合道不言得無之真晝夜不臥日月合光不飢不渴龜龍胎息也又云食穀者名之穀仙行之不休則可延久長也不食穀者可以度世又曰無賣吾道以行求錢無衒吾道強授豪榮無損吾道以與讒佞黃庭經曰仙人道士服氣非有神也養生所致和氣專也若道士恐畏存神可鳴天鼓聲聞太極太真科曰道士脩經習業以五千文為先又曰道有寂動氣化之有形智化之有聲又曰皇教道也帝教德也王教仁也抱朴子曰求師必須深博猶涉滄海造長洲獨以力劣為患豈以物少為憂哉夫虎豹之所餘乃狸鼠之所飫陶朱之所棄乃原憲之所專心憑師依法行道濟身度世利在永亨事師盡敬得道為期承閒候色也不盡力明其師道則罪不可除也學道得師明事之害亂不得發也三無真一經曰有大洞守一經者則為師也太清經云天地以道資聖人以道師也資者持道以養育當生也師者以教人不知而當成也又曰有大洞守一經者則為師也所以崇建本末盡善明天戒之苦至期神靈之所宗託階級以自始所以師友垣其外三一鑑其內帝君忻其赤子悅其宅老子云天地以道資聖人以道師資者持道以養育當生也師者以教人不知而當成也上清紫宸經曰經不師受竊天之寶受無盟信忽天之道太上八素真經曰太上玄人所以與天地等者貴其能相教導也先覺悟於後覺反流歸於一源也天真皇人曰此諸君皆積學滅度道業垂成而得受此又以還生人中皆超虛步空上昇金闕受號自然也其並悠遠人世所不能明考其延者羨門子師夜光高丘子師石公洪崖先生師金母並受靈寶滅度五鍊之法昇天之傳又曰正一法文曰若衒法求利不明正典傳非習謬迷誤後生後生緣薄率爾逐易不尋高德茍貪愛名名而無實望福得禍禍加深也傳授茍非其人道不虛授常恐浮淺之輩亟生誹謗貽災致罪為累不輕所以立信効心因以為施授受之中有以分別洞真經曰修太一之道忌見血穢之類亦不可泣大有經曰受上清寶經者不得哭泣玄母八門經曰存金華雌一之精深戒哭泣令身多戚擾
