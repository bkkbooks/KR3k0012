body:
  text: 車部二敘車下司馬彪續漢書輿服志曰奚仲為車正具物以時六材皆良又曰輕車古之戰車也不巾不蓋孫吳兵法云車有巾有蓋謂之武剛車武剛者為先驅又為屬車輕車為後殿焉又曰大使車立乘駕駟赤帷持節者重道從賊曹皆兩大車伍伯璅弩十二人辟車四人從車四人從車乘元單導減半小使車不立乘有騑赤屏泥油重綘帷導無斧車近小使車蘭與赤轂白蓋赤帷從騶騎四十人此謂追捕考案有所勑取者之所乘也其送葬曰堊已下駟車而後還公卿中二千石郊廟明堂祠陵法出皆大車立乘駕駟他出乘安車大行載車其飾如金根加施組組連壁交結四角金龍首𠾑璧乘五彩折羽流蘇前後雲氣畫裳靈文盡曲轓長輿車等大僕御駕六希者淳白駱馬施色以黑藥灼其身為虎文又曰諸車之文乘輿倚龍伏虎靈文盡輈龍首鸞衡班輪升龍飛輅皇太子諸侯倚虎伏鹿靈文畫輈陟周切轓吉陽筒朱鹿班輪文飛軨旗旗九斿音留降龍公列侯倚鹿伏熊黑轓朱班輪鹿文飛九施降龍卿朱兩轓五斿降龍二千石以下各從科品諸輻車以上軛皆有吉陽筒漢獻帝傳曰董卓作乘輿青蓋金范瓜盡兩輻者乘之時人皆號月軨磨車言近天子也後地動卓問蔡雍雍曰地動陰盛大臣踰制之所致也公乘青蓋遠近以為非宜太師之乘白蓋車畫輻東觀漢記曰郭丹字少卿從師於長安買符入函谷關既入封乞符乃慨然歎曰不乘使者車終不出關又曰梁冀作平上軿車侍御史張綱獨埋輪於洛陽都亭曰豺狼當路安問狐狸遂奏冀應劭漢官儀曰天子有五色安車皆駕四馬毛詩四者示有四方之志也是為五時副車孝景帝六年令二千石朱兩音倆千石六百石朱轓較車耳及出為藩屏也又曰天子出祭陵常乘金根車春二月青安車在前秋八月白虎在前又曰天子法駕所乘白金根車駕六龍有五色立車各一皆駕四馬又曰甘泉鹵簿有道車五乘遊車九乘在輿前漢雜事曰古諸侯二車乘秦滅九國兼其服故大駕屬車八十一乘尚書御史乘之最後一車懸豹尾漢官解詁曰馬有廄車有府皮軒以虎皮為軒魏收後魏書曰安車紫蓋朱裏與公侯同子皂蓋青裏晉書曰謝玄敗符堅於淝水獲堅所乘雲母車儀服等又曰和嶠為給事黃門侍郎遷中書令帝深器遇之舊監令共車入朝時荀勗為監嶠鄙勗為人以意氣加之每同乘高枕專車而去坐乃後使監令異車自嶠始也晉公卿禮秩曰安平王孚齊王攸梁五肜給青蓋車垂九旒駕四馬太常何曾太傅楊駿梁王肜乘車入殿依漢田千秋故事光祿魏館軺車施黑孚薨葬給徘徊黑耳車一乘諸王及縣王皆給青徘徊車花瓜蓋孤李降給雲母陽遂車一乘犢車二十乘鹿車五十乘沈約宋書曰漢制乘輿金根安車立車輪皆朱班重轂兩轄飛舲以金薄繆龍為輿倚較靈文畫轓文獸伏軾龍首𠾑軛鸞雀立衡靈文畫轅翠羽蓋黃裏所謂黃屋也金華拖轑音未建旗旗十二斿音留也畫日月升龍駕六黑馬又加犛音貓牛尾大如斗置左騑馬軛上所謂左纛也其五色立車五色安車亦皆如之太后皇后法駕乘重翟羽蓋金根車加青交輅青帷裳雲靈畫轅黃金塗五朱皇太子皆要車朱班輅倚獸伏鹿軾旗旗九斿畫降龍文又曰沈慶之前廢帝立加几杖給三望車慶之每朝賀常乘豬鼻無幰嚴偃切車左右從之不過三五騎履行園田每農桑劇月無人從行過者不知三公也及加三望車謂人曰我每遊履田園有人時與馬成三無人則與馬成二今乘此車安所之乎及賜几杖並皆固讓孝經援神契曰上德至山陵則山出木根車應載萬物金車王者志行德則出虞舜德盛於山陵故山車出山者自然之揔也山藏之精與象車相似舜時盛山車有垂綏古史考異曰黃帝作車少皞時略加牛禹時奚仲駕馬仲又造車更廣其制度也神仙傳曰葛玄行過神廟乘車不下須臾有大回風逐玄埃塵張天玄怒曰小雅敢爾舉手指風風即止穆天子傳曰王欲肆其心周行天下皆有車轍馬迹焉韓詩外傳曰田子方魏太子從車百乘而送於郊太子再謁田子方不下車太子不悅曰敢問如何則可以驕人乎子方曰吾聞以一國驕人而亡者由此觀之則貧賤可以驕人矣夫志不得授履而適秦楚耳安往而不得吾貧賤乎於是太子再拜而後退子方遂不下車漢武內傳曰內外謐寂以候仙官到夜二更之後忽見西南如白雲起蓊鬱直來遙趨宮庭須臾王母或駕龍虎或乘白麟或乘白鶴或乘軿車或乘天馬群仙數千光輝庭宇關令內傳曰尹喜常登樓望見東極有紫氣西邁喜曰應有聖人過京邑果見老君乘青牛車來過神仙傳曰洗義學道於蜀中與妻共載路逢路鹿車一乘王子年拾遺記曰周成王六年然丘之國獻比翅鳥雌雄各一隻以玉為樊其國使者拳頭奓陟加切鼻衣雲霞之布經百有餘國方到京師越鐵峴泛沸海有蛇洲蜂岑鐵峴峭礪車輪皆剛金為輞比至京師輞鋭幾盡沸海湧起如煎魚鱉皮骨堅強如石可以為鎧泛沸海之時以銅薄為底蛇龍蛟不得近經蛇洲度則以豹皮為屋於屋中推車經峰岑然胡蘇之木此木煙能殺百蟲經塗五年然後至洛邑老子曰三十輹共一轂當其無有車之用莊子曰秦王有疾召醫破癰潰疽者得車一乘舐痔者得車五乘管子曰奚仲之車也方圜曲直皆中規矩鉤繩故機旋相得成器堅固主猶奚仲也言辭動作皆中術數故衆理相當上下相親巧者奚仲之所以為器也孔藂子曰孔子使宰豫于楚昭王以安車象飾遺孔子宰豫曰夫子無以為也王曰何對曰臣自侍衛夫子已來竊見其言不離道動不遺仁貴義尚清素好儉妻不服綵妾不衣帛車器不雕馬不食粟若夫觀物之麗靡窈妙之浮音夫子過之弗聽也故臣知夫子之不用車也孟子曰子産聽鄭國之政以其乘輿濟人於溱洧韓子曰商太宰使庶子行市還云西市門多車太宰謂庶子曰汝勿言及市吏至問曰市何多牛屎耶吏怪太宰神智又曰昔彌子瑕有寵於君衛國之法竊駕君車罪刖彌子之母有疾告彌子矯駕君車君曰孝哉為母之故犯刖罪及彌子色衰愛弛得罪於君君曰是嘗矯駕吾車也又曰孫叔敖為令尹棧車牝馬糖飯菜羹枯魚為膳面有飢色淮南子曰夫車之所能轉千里者以其要在三寸轄又曰見飛蓬轉而知為車以類取之也晏子曰齊人好擊轂相犯以為樂禁之不止晏子為新車良馬出與其人相犯曰犯轂者不祥下車而去之然後國人不為又曰晏子衣緇布之衣而頳裏棧軫之車而牝馬以朝子思子曰終年為車無一尺之軨則不可以馳尸子曰文軒六駃題無四寸之鍵則車不行小亡則大者不成也又曰寧戚為桓公祝曰使公無忘在莒管子無忘在魯寧戚無忘車下又曰車輕道近則鞭策不用孫卿子曰三尺之岸虛車不能登百仞之山負車登焉陵遲故也蘇子曰房麗者趙之賢人立東門之外有行商車轄忘麗告之不悟復更告之商人怒曰吾轄自亡何須汝告惠加於己而反怒之吾欲比之草木草木有心矣沈約輿服志曰車服以庸著在唐典夏建旌旗辨其尊卑至于殷瑞山車者金車也故殷人制為大輅金根之色也周人則有玉金象革木五路之制其物致巧備於考工輦車周禮王后五路之車也后居宮中從容所乘非王車也漢制乘輿御之或使人挽或駕車果下馬案女史圖班婕妤辭輦則乘之又復殷之末制後代遂行之耳陸景典語曰吳朝貴戚或犯道背理雕車麗服撗陵市路車服雖侈人不為榮宮室雖美士不過門又曰顯臣以車服天下莫不瞻其榮又曰飛車策馬撗騰超追來如霧合去若雲散得志則進失意則逝也異語曰仕官不止車生耳長六尺法六律六陰數也今其上作簟文所以缺後者月滿則虧也風俗通曰車一兩謂兩兩相與為體也厚其所以言兩者箱裝及輪兩兩而耦故稱兩耳通俗文曰車轢曰軋后重曰軒前重曰輊陟利切載喪車謂之轆音六轊音衛車聲曰轞胡減切雇車載曰僦蔡雍獨斷曰永安七年見金根耕根諸御車皆一轅或四馬或六馬金箱四輪皆以金鑄正黃兩辟前後剋金作龍虎龜鳥又曰緑車名皇孫車天子有孫乘以從蔡雍車服志曰俗人失其名故名冕為平天冠五時副車曰五帝鸞旗曰雞耕根曰三蓋旗皆非一儀制令曰諸車一品青油纁道幰許偃切朱裏朱絲絡綱三品以上青道幰朱裏五品以上青道幰碧裏六品以下皆不得用幰括地圖曰奇肱民能為飛車從風遠行湯時西風起奇肱車至於豫州湯破其車不以示民十年西風至乃復使作車遣歸其國去玉門四萬里董巴輿服志曰乘輿金根車五乘輪皆朱班重牙二轂司馬法曰夏曰子車殷曰胡奴車周曰輜車三代之輦語林曰潘安仁貌美每行老嫗以果擲之常滿車中張孟陽至醜每行兒以瓦礫擲之亦滿車傅暢故事曰尚書令軺車黑耳後戶僕射但後戶無黑耳中書監令如僕射譙周法訓曰鸞車璜珮求中道心石崇奴券曰作車當取大良白槐之輻茱萸之輞説苑曰齊景公伐宋至於歧隄之上登高以望大息而歎曰昔我先君桓公長轂八百乘以霸諸侯今我長轂三千乘而不敢久處於此管仲與弦章對曰臣聞之水廣則魚大君明則臣忠昔有桓公乃有管仲今桓公在此則車下之臣盡管仲也又曰趙簡主乘弊車癯音衢馬衣羖羊之裘其宰進諫曰車新則安馬肥則往來便衣狐豹之裘溫且輕簡子曰吾非不知吾聞君子服美則益恭小人服美則益倨今我以自備恐有小人之心又曰晉平公為馳逐之車挂之以犀錯之以羽車成立於殿下群臣得觀焉田差三過而不觀平公作色大怒差對曰臣聞桀以奢亡紂以此敗是以不敢觀也平公曰善令左右去車世説曰王武子乘車著連乾障泥前有水馬不肯渡武子曰此馬惜鄣泥使解之馬乃渡白虎通曰制車以步故立乘天子大路路大也道也正君至尊制度大所以行道德正車也諸侯路車大夫漸子廉切車士飾車山海經曰番禺生奚仲奚仲生吉光始以木為車郭璞曰世本曰奚仲造車此言吉光明其父子共創意首稱也袁子正書曰申屠剛諫光武以頭軔輪馬不得前子正云光武近出未有得失而頭軔輪此方頭也又曰輻車即輦魏晉公卿小出嘗乘馬亦多乘輿車漢諸侯貧者乃乘之其後轉見貴孫權云車中八牛即犢車也江左御出則載儲供之物漢世賤輅車而貴輜軿魏晉賤軿車而貴軺車又有追鋒如軺車而駕馬乂以雲母飾犢車謂之雲母車臣不得乘時以賜王公晉氏之有四望車今制亦存又漢制唯賈人不得乘馬車其餘皆乘之矣除吏赤蓋杠餘則青蓋杠云其非法駕則紫罽軿車案字林軿車有衣蔽無後轅其後有轅者謂之輻賈誼新書曰古之為路輿也蓋圜以象天二十八撩音老以象列星軫方以象地三十輻以象日月故仰則觀天文俯則察地理前視則暏鸞和之響四時之運此輿教之道也後漢崔駰車左銘曰虞夏作車取象機衡君子建左法天之陽正位授綏車不內顧塵不出軌鸞以節步彼言不疾彼指不躬玄覽于道永思厥中又車右銘曰擇御卜右採德用良詢納耆老于我是匡惟賢是師惟道是式針闕旅賁內顧自勑匪望其度匪愆其則越戒敦儉禮以華國又車後銘曰敬其在路體貌思恭望衡顧轂允填茲容無或好失匪槃于遊顧省厥遺虎尾斯求昭德塞違抑盈以無雖有三晉咸然若虛後漢李尤小車銘曰盆蓋象天方輿則地輪法陰陽動不相離合之嗛苦琰切噓疏通兩輜彰尊卑從輗之用信義所同梁載皓車馬篇曰朝集類蒸煙晚至如吹雪子雲亦何事門巷無車轍
