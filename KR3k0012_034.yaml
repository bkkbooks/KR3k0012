seq: 34
front:
  text: 時序部十八臘許慎說文曰臘冬至後壬戍臘祭百神也禮記月令曰孟冬是月也天子乃祈來年于天宗大割牲祠于公社及門閭臘先祖五祀此周禮所謂蠟祭也天宗日月星辰也大殺群牲割之也臘謂以畋獵所得禽祭也五祀門戶霤井灶也或曰祈年或曰大割或曰臘互其文也勞農休息之黨正屬民飲酒正齒位也天子乃命將帥講武習射御角力講武角力校武士材力所以備田獵之禮又曰郊特牲天子大蠟八伊耆氏始為蠟伊耆氏古天子號也蠟也者索也謂永索也歲十二月合聚萬物而索饗之也歲十二月周之正月謂建亥之月饗者祭其神也萬物有功民者神使為之也祭之以報焉蠟之祭也主先嗇也先嗇若神農者司嗇后稷神也又曰昔者仲尼與於蠟賓蠟者索也歲十二月索合聚萬物而索饗之亦祭宗廟孔子仕魯在助祭之中事畢出遊於觀之上喟然而嘆觀闕也子見魯君於祭禮有不備於此文覩象魏舊章之處感而嘆之仲尼之歎蓋歎魯也又曰子貢觀於蠟蠟索也歲十二月索群神而祀之蠟也孔子曰賜也樂乎對曰一國之人皆若狂賜未知其為樂也孔子曰百日之勞一日之澤非爾所知言民皆勤稼穡百日之勞喻久也今一日使之飲酒宴樂是君之恩澤也周禮曰國祭蠟則吹豳頌擊土鼓以息老鄭玄曰十二月禮謂建亥之月也索萬物而祭之者萬物天成歲事至此為其老而勞其禮而息之也幽頌七月又有穫稻作酒觥觴萬壽無疆之事是亦歌其類也謂之頌者以其言歲終又功成也周以今之十一月為正月以今十月為臘月也傳曰晉侯復假道於虞以伐虢宮之奇諫弗聽以其族行曰虞不臘矣臘祭名也日月會於龍尾百物備合國於是祭群神也史記曰秦惠文王十二年初臘始皇三十一年十二月更名臘曰嘉平太原真人茅君內記曰始皇三十一年九月庚子君魯祖父濛乃於華山之中乘雲駕龍白日升天先是其邑歌謠曰神仙得者茅初成駕龍上升入太清時下玄虛戲山赤城繼世而往在我嬴帝若學之臘嘉平始皇聞謠歌而問其故父老具對此仙人之謠勸帝求長生之志也於是始皇欣然乃有尋仙之志因改臘曰嘉平也又曰張良見老父出一編書曰讀是書為王者師後十三年濟北城山下黃石即我也良後得黃石取寶而祠之及死葬黃石每上冢伏臘祠黃石焉漢書曰高祖十年春有司奏令縣道常以春二月及臘祠社稷以羊彘又曰嚴延年為河南太守初延年母從東海來從延年臘到洛陽適見報囚報行次也母大驚便止都亭不肯入府延年出至都亭謁母母閉閣不見延年免冠頓首閣下良久乃見之因數責延年曰幸得備郡守專治千里不聞人愛多刑殺人欲以立威豈為民父母意哉延年重謝自為母御歸府舍母畢正臘已謂延年曰天道神明人不可獨殺我不自意當老見壯子被刑戮也行矣汝南東歸掃除墓地耳後延年遂敗司馬彪續漢書曰季冬之月星回歲終陰陽已交勞農夫享臘已送故焉又禮儀志先臘一日大儺謂之逐疫又舊儀曰臘者報諸鬼即古聖賢有功於民者皆享之袁山松後漢書韓卓字子助陳留人臘日奴竊食祭其母卓義其心即日免之免從良也謝承後漢書曰弟五倫母老不能之官至臘日常悲戀垂涕又曰沛國陳咸為廷尉監王莽篡位還家杜門不出莽改易漢法令及臘日咸常言我先祖何知王氏之臘乎又東夷列傳曰三韓俗以臘日家家祭祀俗云臘鼓鳴春草生也東觀漢記曰甄宇字長文北海人建武中自青州從事徵拜博士每臘詔書賜博士所在京師因以號之高堂隆魏臺訪議曰詔問何以用未祖丑臘臣隆對曰按月令孟冬十月臘先祖五祀謂薦田臘所得禽獸謂之臘左傳曰虞不臘矣唯見此二者而皆不書曰聞先師說曰王者各以其行之盛祖以其終臘水始生於申盛於子終於辰故水行之君以子祖辰臘火始生於寅盛於午終於戍故火行之君以午祖戍臘木始生於亥盛於卯終於未故木行之君以卯祖未臘金始生於巳盛於酉終於丑故金行之君以酉祖丑臘土始生於未盛於戍終於辰故土行之君以戍祖辰臘今魏據土德宜以戍祖辰臘也又曰華歆常以臘日宴子弟王朗慕之蓋其家法由來漸矣杜公瞻云蠟者息民之祭故孔子云百日之勞一日之懌其所祭八神者皆報其成功則於十月農隙是也後世臘有新故交接之義遂移於夏正月十二月晉博土張亮說蠟聚饗臘者祭廟初云蠟則黃服蠟臘不同惣非也臘宜在新故交接二祭月同而名異祭俱但而服殊今推諸經傳無正說蠟臘之文月令云蠟臘此則同日祭但互名耳據田臘取獸之名為臘因索饗百神號之曰蠟其曰上先祖旁饗百神下息萬民無別祭也即鄭玄云既蠟臘先祖五祀於是勞農者也近日蠟臘兼設蠟在十月臘在歲終隋開皇四年始停建元之蠟直為建丑之臘依五行火衰於戍而用戍日故也晉書范喬字伯孫喬邑人臘夕盜斫其樹有告者喬佯不聞邑人愧而還喬曰節日取柴欲與父母相歡耳何以愧乎遂不取又曰陳軫問方士戴洋曰江南有貴人顧彥先周宣珮是否洋曰顧不及臘周不及明年八月其年十二月十九日顧卒明日臘宣珮以明年七月晦亡又晉起居注曰安帝安隆四年十二月辛丑臘祠作樂又博士張亮議曰臘接也登宜在新故交接也俗謂之臘之明日為初歲秦漢以來有賀此古之遺語晉宋舊事曰魏帝遜位祖以酉日臘以丑日魏名臣奏曰大司農董遇議曰土行之君故宜以未祖以丑臘為得盛終之節不可以戍祖辰臘梁書曰何鳳為建安太守物不敢忤伏臘每放囚還家依期而返唐會要曰貞元九年十一月上比日來京兆府每年及臘日府縣捕養狐兔以充進獻自今已後宜停又曰貞元十一年十二月臘日畋於苑中止多殺行三驅之禮軍士無不知感鄭玄列傳曰玄年十二隨母還家正臘宴會同列十餘人皆美服盛飾語言間適君獨漠然如不及母私督數乃曰此非我志不在此願列女傳曰魯之母師者魯九子之寡母也臘日休家作悉召諸子謂曰婦人之義非有大故不出夫家然吾父母家歲時祀不理吾從汝謁謁告諸子欲往往監之慎房戶之守吾夕而反於是天陰還失早至閭外而止待夕而入魯大夫從臺上見而怪之使人問對妾歸視私家諸奴孺子期夕而反妾恐其酺啜醉飽人情公有也妾反早故止閭外盡期而入大夫美之言於穆公公賜母尊號曰母師搜神記曰宣帝時陰子方者當臘日晨炊而竈神形見子方再拜受慶家有黃羊因以祠之自是以後暴至巨富故後常以臘日祠竈風土記曰醇以告蠟竭恭敬於明祀乃有藏彄蓋因婦人所作金鐶以錔指而纏者彄音鉤臘日之後叟嫗叟嫗皆男子婦人之老稱各隨其儕為藏彄分二曹以效勝負荊楚歲時記曰又為藏彄之戲辛氏以為鉤弋夫人所起周處成公綏並作彄字藝經庚闡則作鉤字其事同也俗云戲令人生離有禁忌之家廢不修也辛氏三秦記曰漢昭帝母鉤弋夫人手拳有國色世人藏鉤因此安漢鉤弋夫人姓趙為武帝婕妤生昭帝漢武故事云上巡狩河間見青氣自地屬天望氣云下有貴子上求之莫舒上自披即舒號拳夫人善素女術大有寵即鉤弋夫人也周處風土記云呼為行彄蓋婦人所用銀作環以錔指而縫者臘日祭後叟嫗兒意皆藏彄戲分為二曹以效勝負為一籌為一都負者起拜謝勝者又曰孔子所以預於蠟賓一歲之中盛於此節又曰俗又以此月為臘月案史記陳勝傳有臘月之言是謂此也諺云臘鼓鳴春草生村人並擊細霄鼓戴明頭及作金剛力士以逐大疫華陽國志曰王長文字德雋元康初守江源令縣收得盜馬賊及發冢賊長文引見誘慰時適臘晦皆遣歸家獄先有擊囚亦遣之謂曰教化不厚使汝等如此長吏之過也蠟節慶祚肆汝就上下善相歡樂過節來還當為汝思他理群吏惶怖爭請不許尋有赦無不感恩三十國春秋曰江州刺史胤自武昌以一疾被徵為右將軍而王舒未至猶在盆口後將軍郭默旋而過胤胤不禮之臘日遺默酒五升馲一頭默大怒投之於江遂與故將張丑宋侯孟純等矯詔入城門莫有禦者胤獨與其妾寢默至斬于床下及其司馬張滿參荀揩李纂慠慠默故也王肅議禮曰季冬大儺旁磔雞出土牛以送寒氣節令之臘除逐疫磔雞葦絞桃梗之屬風俗通曰夏曰清祀殷曰嘉平周曰大蠟漢曰臘臘者臘也因獵取獸以祭先祖或曰臘接也新故交接狎臘大祭以報功也漢火行衰於戍故以戍為臘也又曰兔臏俗說臘正旦食得兔臏者名也曰幸賞以寒酒幸者善祥令人吉利也臏毗忍切臏臏膫蓋又曰上古之時有神荼與鬱壘昆弟二人性能伏鬼度朔山桃樹下簡閲百鬼鬼無道理妄為人禍者神荼與鬱壘縛以葦索執以食虎於是縣官常以臘除文飾桃人垂葦終絞畫於門皆追效前事冀以禦凶也會稽典録曰陳修字奉遷烏陽人家貧為吏常步擔上下恆食乾稗音備乾飵也每至正臘僵臥不起同僚以飲食請不往其志操如此世說曰王朗中年以識度推伏華歆歆蠟日堂乃集子姪宴飲王亦學之有人向張茂先稱此事張曰王之學華皆是形骸之外去之所以更遠玉燭寶典曰臘者祭先祖蠟者報百神同日異祭也蔡雍獨斷曰臘者歲終大祭縱吏民宴飲非迎氣故但送不迎也崔實四民月令曰十月上辛命典饋清麴釀冬酒以供臘祀又曰臘明日謂小歲進酒尊長修刺賀君師又曰十二月臘時祠祝炙蓬樹瓜田四角去甘蟲瓜中蟲謂之甘蟲蔡雍王喬録曰漢永和元年十二月腋夜王喬墓上哭聲王伯聞但往視之天大雪見大鳥跡并祭祀處採薪者尹禿見人冠衣曰我王喬也汝莫取吾墓樹忽不見徐爰家儀曰蠟本施祭故不賀其明日為小歲賀稱初歲福始罄無不宜正旦賀稱元正首慶百物惟新小歲之賀既非大慶禮止門內西域諸國志曰天笁國以十二月十六日為臘臘則麥熟盧公家範曰九臘日上澡豆帶及頭膏面脂口脂淮南萬畢術曰歲暮臘埋圓石於宅隅雜以桃弧七枚則無鬼疫養生要術云臘夜持椒臥井旁勿與人言投于井中除溫疫盛翁子藏鉤賦敘曰以臘之後因祭祀餘胙要命中外以行鉤為戲嵇含蠟賦序曰大蠟之夕雖天地同有至攜金蘭以齊聲利得意以遺榮勢孰尚我裴秀大蠟詩曰有肉如丘有酒如淵有肴如林有貨如山小歲說文曰膢楚十二月祭飲食也一日嘗新始殺食日貙膢貙勑俱切漢書曰武帝太初二年令天下酺五日膢五日祠門戶比臘如淳曰膢者樓漢儀注立社貙膢許慎曰俗以十二月祭飲食冀州北部或以八月朝作飲為膢其俗語曰膢臘社伏蔡雍曰貙獸常以立秋日邏食其母猛蟲搏鷙時王者亦以此臘邏以祭廟膢劉劉殺也言擊殺之時者也續漢書禮儀志曰立秋之日郊禮畢始楊威武斬牲於郊東門以薦陵廟其儀乘輿御戎輅白馬朱鬣躬執弩射牲薦廟太宰令謁者各一人載獲車馳駟送廟還宮遣使者齎束帛以賜武官肆兵習戰陳之儀斬牲之禮名曰貙劉風俗通曰謹案韓子書曰山居谷汲者膢臘寡水楚俗常以十二月祭飲也又曰嘗新始殺也食新曰貙膢也又曰謹案自郊貙膢春秋饗射天子射麑掩雉獻諸宗廟扶陽發滯養老致敬化之至也
