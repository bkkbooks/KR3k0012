body:
  text: 兵部五十八獻俘詩曰一月三捷左傳曰秋七月丙申振旅凱以入于晉凱樂也獻俘授馘飲至大賞授數也獻楚俘於廟徵會討二徵會諸侯將冬會於溫殺舟之僑以徇于國民於是大服又曰晉侯使趙同獻狄俘于周不敬劉康公曰不及十年原叔必有大咎劉康公元孝子元趙同也天奪之魄也又曰春士會帥師滅赤狄甲氏及留吁鐸辰鐸辰留吁之屬也三月獻狄俘于廟晉書載記曰石季龍攻陷徐龕送之襄國勒囊盛於百尺樓自上殺之令步都等妻子刳而食之坑龕降卒三千又曰杜預平吳王濬先列上得孫歆頭預後生送歆洛中以為大笑梁書曰沈林子獻捷書每以實聞武帝問其故林子曰夫王者之師本有征無戰豈可復增張虜獲以示誇誕昔魏尚以盈級致罰此後乘之良轍也武帝曰乃所望於卿也後魏書曰裴叔業率王茂先李定等來侵楚王戍傅永適還州王肅復令傅永討之永將心腹一人馳詣楚王至即令戍填塞外塹夜伏戰士一千人於城外曉而叔業等至頓於城東列陳置長圍永所伏兵於左道擊其後軍破之叔業乃令將佐守所列之陳自率精甲數千救之永上門樓觀叔業南行五六里許便開門奮擊遂摧破之叔業進退失圖於是奔走左右欲追之永曰弱卒不滿三千彼精甲猶盛非力屈而敗直墮吾計中耳既不測我之虛實足喪其膽俘此足矣何暇逐之獲叔業傘扇鼓幕甲仗万餘兩月之中遂獻再捷高祖嘉之後周書曰武帝平齊夏四月至自東伐列齊主於前其王公等並從車輿旗幟及器物以次陳於其後大駕布六軍備凱樂獻俘於太廟京邑觀者皆稱万歲戊申封齊主為溫國公唐書曰武德中西突厥葉護可汗遣使請婚又入寇邊上高祖謂群臣曰突厥入寇而復請和和之與戰其策安在太常卿鄭元璹對曰若擊之則怨深難以和緝中書令封德彝進曰若不戰而和親夷狄必謂中國畏懼未若擊之剋捷而和親此則威恩兼舉高祖然之戊辰西突厥遣使獻名馬已巳并州大惣管襄邑王神符擊突厥於汾東斬首五百級虜其馬二千匹汾州刺史蕭顗斬突厥五千餘級又曰太宗平東都凱旋親被黃金甲陳鐵馬一万騎甲士三萬人前後部鼓吹俘二僞主及隨神器輦輅獻捷于太廟高祖大悅行飲至禮以享焉又曰張瑾初仕隋歷職顯貴煬帝被圍於鴈門也瑾以驍果出城擊戰一日九捷煬帝登城望之大悅賜物二千假又曰元和中忠武軍節度使李光顏奏破吳元濟之衆上大悅賜其告捷使奴婢銀錦又曰元和十二年十月隋唐節度使李訴帥師入蔡州執賊師吳元濟以聞淮西平辛巳上御宣政殿受朝賀九品已上及宗子四夷之使皆會又曰元和十四年魏博節度使田弘正遣使獻逆臣李師道命左右軍兵衛之先獻于太廟郊社上御興安門百寮於門下列位稱賀又曰元和中昭義節度郗士美以賊首三百來獻詔梟於通化門外班師爾雅曰出曰治兵尚武也入曰振旅反尊卑也郭璞曰幼賤在前貴勇也尊老在後尚儀也詩曰出車勞還率也赫赫南仲薄伐西戎昔我往矣黍稷方華春日遲遲卉木萋萋執訊獲醜薄言還歸又曰杖杜勞還役也有杖之社其葉萋萋周禮曰若師有功左執律右秉鉞以先凱樂獻于社左傳曰三年而治兵入而振旅歸而飲至以數軍實飲至於廟以數車徒所獲也又曰楚子敗晉師于邲潘黨曰君盍築武軍而收晉尸以為京觀楚子曰夫文止戈為武武有七德禁暴戢兵保大定功安人和衆豐財者也我無一焉何以示子孫祀于河作先君宮告成事而還後漢書曰曹操討劉備出教曰雞肋外曹莫曉楊德祖曰夫雞肋食之則無所得棄則我惜公歸計決矣操乃還軍又曰馬援自南方振旅還京師軍吏經瘴疫死者十四五賜援兵車一乘晉書曰王濬平吳上表云間在秣陵諸軍凡二十萬衆臣軍先至為土地之主百姓之心皆歸仰臣臣切勑所領秋毫不犯諸有市易皆明破劵契有違犯者凡斬十三人皆吳人所知也餘軍縱橫詐稱臣軍而軍類皆蜀人幸以此自別耳又曰賈充為伐吳大都督孫皓降於王濬充未之知方以吳未可平抗表請斑師充表與告捷表同至朝野以充佐居人上智出人下宋書曰十二月景申大軍次左里將戰帝麾之麾竿折幡沉于水衆咸懼帝笑曰昔覆舟之役亦如此今勝必矣遂攻其柵盧循單舸走衆軍皆旋晉帝遣侍中黃門勞師于行所三國典略曰齊公憲夜收軍欲待明更戰達奚武謂之曰洛陽軍散人情駭動若不因夜速還明日欲歸不得武在軍旅久矣備見形狀豈可將數營大衆一朝而棄之憲從其諫遂全軍而反後魏書曰蕭衍寇徐兗州邢巒大破之旋師世宗臨東堂勞之曰卿役不踰時剋清妖醜鴻勳碩美可謂不愧古人巒曰此自陛下威略聖靈加以將士之力臣何功之有白虎通曰古者師出不踰時者為怨思也天道一時生物養人者天之貴物也踰時即內有怨女外有曠夫詩曰昔我往矣楊柳依依今我來思雨雪霏霏春秋曰宋人取長葛傳曰外取邑此不書此何謂以書久也六韜曰武王平殷還問太公曰今民吏未安賢者未定何以安之太公曰無故如天如地說苑曰魏文侯攻中山樂羊將已得中山還反叛文侯命主書曰群臣賓客所獻書操以進主書者舉兩篋以進令將軍視之盡難攻中山之事也將軍還北面而再拜曰中山之舉也非臣之力君之功也韓子曰晉文公將與楚戰召舅犯問曰吾將與楚戰彼衆我寡為之奈何對曰臣聞之君子不厭忠信戰陳不厭詐僞君其詐之而已又問雍季對曰焚林而田後必無獸以詐遇民後必無民公曰善以舅犯謀與楚戰大敗之歸行爵先雍季而後舅犯群臣曰城濮之事舅犯之謀夫用其言而後其身可乎公曰此非若所知夫舅犯之言權也雍季之言萬世之利也罷兵史記曰漢武帝患胸奴屢為邊患鴈門馬邑豪聶一因大將軍王恢言胸奴初和親親信邊可誘以利致之伏兵襲擊必破之道也帝召問公卿曰今欲舉兵攻之何如韓安國曰臣聞高皇帝圍於平城胸奴至者投鞍高如城者數所平城之飢七日不食天下歌之及解圍反位而無忿怒之心夫聖人以天下為度者不以己私怒傷天下之政故乃遣劉敬奉金千斤以結和親至今為五代利孝文皇帝又嘗一擁天下之精兵聚之廣武常溪終無尺寸之功而天下黔首無不憂孝文悟於兵之不可宿故復合和親之約此二聖之跡足以為效矣竊以為勿擊便漢書曰元帝時朱崖儋耳二郡夷數反賈捐之上書請不擊其略曰臣聞堯舜禹三聖之德地方不過千里西被流沙東漸于海朔南暨聲教欲與聲教則理之不欲與者不強理也是以頌聲並作視聽之類咸樂其生秦氏興兵遠攻貪外虛內務欲廣地而天下潰叛賴聖漢為百姓請命平定天下至孝武皇帝以國富人逸攘却胸奴西連諸國至于安息東過碣石造鹽鐵酒攉之利以佐用度猶不能足當此之時寇賊並起征伐不休之故也今陛下不忍悁悁之忿欲歐士衆擠之大海之中悁居緣切擠祖奚切快心幽冥之地非所以保全元元也詩云蠢爾荊蠻大邦為讎自古患之久矣何況万里之蠻乎臣竊以往者羌軍言之暴師曾未一年兵出不踰千里費四十餘萬大司農錢盡乃以少府禁錢續之夫一隅為不善費尚如此況於勞師遠攻亡士無功乎臣愚以為非冠帶之國禹貢所不及皆可且無以為於是遂罷其郡後漢書曰光武建武中北胸奴衰弱臧宮馬武上書請臨塞厚懸購賞喻告高勾驪烏桓鮮卑攻其左發河西四郡及天水隴西羌胡擊其右如此北虜之滅不過數年矣帝曰舍近謀遠者勞而無功舍遠謀近者逸而有終故曰務廣地者荒務廣德者強有其有者安貪人有者殘殘滅之政雖成必敗今國無善政災變不息百姓驚惶人不自保而復遠事邊外乎孔子曰吾恐季孫之憂不在顓臾自是諸將莫敢復言兵事魏志曰諸葛誕據壽春及魏將王基討之司馬文王欲遣諸將輕兵深入招迎吳將唐咨等子弟因釁有蕩覆吳之勢基諫曰昔吳將諸葛恪乘東關之勝竭江表兵以圍新城城既不拔而衆死者太半蜀將姜維因洮上之利輕軍深入糧餉不繼軍覆上邽音圭夫既勝之後必輕敵則慮難不深今賊新敗於外又內患未弭是其修政設慮之時也且兵出踰年人有歸志俘馘十万罪人斯得自歷代征伐未有全兵獨克如今之盛者也武皇帝破袁紹於官度自以所獲已多不復追奔懼挫威也從之尸子曰公輸般為蒙天之階階成將以攻宋墨子聞之赴於宋至於郢見般曰聞子為階將以攻宋宋何罪之有無罪而攻之不可謂仁胡不已也公輸般曰不可吾既以言之王矣墨子曰胡不見我於王公輸般曰諾墨子見楚王曰今有人於此舍其文軒鄰有弊輿而欲竊之舍其錦繡鄰有短褐而欲竊之舍其梁肉鄰有糠糟而欲竊之此為何若人王曰此為竊疾耳墨子曰荊之地方五千里宋之地方五百里此猶文軒之與弊輿也荊有雲夢犀兕麋鹿盈之以江漢之魚鱉黿鼉為天下饒宋無雉兔鮒魚者也猶梁肉之與糠糟也荊有長松文梓楩柟豫章宋無長木此猶錦繡之與短褐也臣以王之攻宋也為與此同類王曰善請無攻宋呂氏春秋曰秦興兵欲攻魏司馬唐諫秦君曰假干木賢者也而魏禮之天下莫不聞無乃不可加兵乎秦君乃按兵而輟不攻魏文侯可謂善用兵矣聞君子之用兵也莫見其形其功已成此之謂也偃武易曰澤上於地萃君子以除戎器戒不虞書曰武王伐殷乃偃武修文倒載干戈包以虎皮示不用也行禮射設庠序修文教也歸馬于華山之陽放牛于桃林之野示天下弗服山南曰陽桃林在華山東北皆非長養牛馬之地欲使自生死示天下不服乘用也修文教也禮記曰武王克啇後散軍而郊左射狸首右射騶虞而貫革之射息矣歸馬于華山之陽放牛于桃林之野干戈弓矢包之以虎皮示天下不復用兵也左傳曰宋向戍欲弭諸侯之兵以為名子罕曰天生五材民並用之廢一不可誰能去兵兵之設久矣所以威不軌而昭文德也聖人以興亂人以廢興廢存亡昏明之術皆兵由也而子求去之不亦誣乎又曰武王克啇作頌曰載戢干戈載橐弓矢又曰夫文止戈為武家語曰孔子北遊登於農山曰二三子各言其志吾將擇焉子路進曰由願白羽若月赤羽若日攘地千里搴旗折馘唯由能之子貢進曰賜願旗鼓相望縞衣白冠陳說其間二國釋怨唯賜能之顏回曰回聞薰蕕不同器而治回願得明王聖主王相之鑄劍戟為農器放牛馬於原藪則由無所施其勇賜無所用其辨矣孔子曰美哉德也史記曰始皇曰寡人賴宗廟之靈六王咸服其辜天下大定收天下兵器銷以為鍾鐻金人十二重各千斤置咸陽廷宮中漢書文帝詔曰朕能任衣冠念不到征討故雞鳴狗吠煙火万里也又食貨志曰武帝末年悔征伐之事乃封丞相為富民侯顏師古曰欲百姓之殷實故取其嘉名也莊子曰孔子謂盜跖曰將軍有意聽臣臣請南使吳越北使齊魯東使宋衛西使晉楚使為將軍造大城數百里立數十萬戶之邑使尊將軍為諸侯與天下更始罷兵休卒收養昆弟共祭先祖此聖人才士之行而天下之願又曰見侮不辱救民之鬥禁政寢兵救世之戰古司馬法曰古者武軍三年不與民覩之勞也上下相報和之至也還師罷兵復戎卒三年不徭役以答人勞得意則凱樂歌示喜也聖主誅不義百姓皆得其所喜樂各安其居樂其常偃伯靈臺答民之勞告不興也偃休息也伯主兵也靈臺錯德美之喜以祭天示不復用兵也呂氏春秋曰武王以武得之以文持之倒戈弛矢示天下不用兵尸子曰武王已戰之後三革不纍五刃不砥牛馬放之歷山終身弗乘也淮南子曰秦之時高為臺榭大為苑囿遠為馳道鑄金人秦始皇二十六年初兼天下有長人見於臨洮其高五丈足迹六尺放寫其刑鑄金人以象之翁仲君何是也發謫戍入芻槀戍守長城也入芻藁之說以供國用之也頭會箕賦於少府頭會隨民口數人責其稅箕賦似箕斂民財多取意也少府官名如今司農丁壯大夫西至臨洮狄道臨洮隴西之縣洮水北狄道漢陽之縣是也東至會稽浮石會稽山名浮石隨水高下言不沒皆在遼西界一說會稽山在泰山下封于泰山禪於會稽是也南至豫章桂林豫章郡桂林鬱林也北至飛狄陽原飛狄在代郡南飛狄山也陽原在太原道路死人以溝量言滿溝也當此之時忠諫者謂之不祥而道仁義者謂之狂逮至高皇帝存亡繼絶漢高祖也舉天下之大義身自奮袂執鋭以為百姓請命于皇天執利兵伐無道以求百姓之命祈之皇天也當此之時天下雄俊豪英暴露于野澤才過千人為俊百人為豪萬人為英前蒙矢石而後墮壑出百死而紹一生以爭天下之權墮入也紹至也奮武厲誠以決一旦之命當此之時豐衣博帶而道儒墨者以為不肖言尚武也逮至纍亂以勝勝暴亂也海內大定繼文之業立武之功繼文王受命之業武王誅無道之功履天子之圖籍造劉氏之貌冠高祖於新農所作竹冠一曰季貌冠也揔鄒魯之儒墨通先聖之遺教載天下之旗乘泰輅建九旒撞大鍾擊鳴鼓奏咸池陽干戚周禮天子五輅泰輅上輅也王者功成作樂故撞鍾擊鼓咸池黃帝樂也干楯也戚斧也春夏舞者所執當此之時有立武者見疑一世之間而文武代為雌雄有時而用也今世之為武也則非文也為文者則非武更相非而不知時世之用也說苑曰魏文侯與田子方語有兩童子衣青白衣而侍於君前子方曰此君子之寵子乎文侯曰非也其父死於戰此其孤幼也寡人收之子方曰臣以君之賊心為足今滋甚君之寵此子也又且以誰之父殺之乎文侯愍然曰寡人受令矣自是已後兵革不用左太冲魏都賦曰喪亂既弭而能宴武人歸獸以去戰蕭斧戢柯以押刃虹旌攝麾以就卷沈休文詩曰丹浦非樂戰負重切君臨
