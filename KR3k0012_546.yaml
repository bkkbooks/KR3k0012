body:
  text: 禮儀部二十四喪紀下禮記曾子問曰君薨而世子生則如之何孔子曰卿大夫士從攝主北面於西階南變於朝夕哭位也攝主上卿代君聽政也大祝裨冕執束帛升自西階盡等不升堂命無哭將有事宜清淨祝聲三告曰某之子生敢告升奠弊于殯東凡上哭降曾子問曰如已葬而世子生如之何孔子曰太宰太宗從太祝而告于禰告生三月乃名于禰以名遍告社稷宗廟山川又曰將冠子冠者至揖讓而入聞齊襄大功之喪如之何冠者賓及贊也孔子曰內喪則廢外喪則冠而不醴徹饌而掃即位而哭如冠者未至則廢又曰婚禮既納幣有吉日女之父母死則如之何吉日謂娶女之日也孔子曰壻使人弔若壻之父母死則女之家亦使人弔父喪稱父母喪稱母各以其正嫡自相弔問禮之宜父母不在則稱伯父世母弔禮不廢也已葬壻之伯父致命女氏曰某之子有父母之喪不得嗣為兄弟嗣繼使某致命女氏許諾而不敢嫁禮也壻免喪女之父母使人請壻弗娶而後嫁之禮也又曰大夫士有私喪可以除之矣而有君服焉其除之也如之何孔子曰有君喪服於身不敢私服又何除焉於是乎有過時而弗除也君之喪服除而後殷祭禮也謂主人也支子則否又曰君薨既殯而臣有父母之喪則如之何孔子曰歸居於家有殷事則之君所朝夕否曰君既啓而臣有父母之喪則如之何孔子曰歸哭而反送君曰君未殯而臣有父母之喪則如之何孔子曰歸殯反于君所有殷事則歸朝夕否又曰君出疆以三年之戒以裨從君薨其入如之何孔子曰供殯服則子麻辨絰疏襄菲杖棺柩未安不忍成服於外也布辨如爵辨而用布也杖者為己病入自闕升自西階闕謂毀宗也柩毀宗而入異於生如小斂則子免而從柩入自門升自阼階君大夫士一節也又雜記曰恤由之喪哀公使孺悲之孔子學士喪禮士喪禮於是存乎書又曰士之子為大夫父母弗能主也使其子主之無子則為之置後凡主兄弟之喪雖疏亦虞喪事虞祔乃畢又雜記下曰姑姊妹其夫死而夫黨無兄弟使夫之族人主喪妻之黨雖親不主此謂姑姊妹無子寡死而夫若無族矣則前後家東西家無有則里尹主之又曰或問於曾子曰夫既遣而包其餘猶既食而裏其餘乎言遣既鄭而又包之是與食於人已而裏其餘將去何異君子寧為是乎言傷廉也曾子曰吾子不見大饗乎夫大饗既饗卷三牲之俎歸于賓館父母而賓客之所以為哀也又喪服小記曰大夫不主士之喪土之喪雖無主不敢攝大夫以為主士不攝大夫唯宗子又喪大記曰疾病外內皆掃為寶客將來問疾也疾困曰病也君大夫徹懸士去琴瑟寢東首於北牖下謂君來視之時也病者居北牖下或為北牖下廢床徹褻衣加新衣體一人人始生在地去床庶其氣生反也徹褻衣則所加者朝服也男女改服屬纊以俟絶氣唯哭先復復而後行死事君設大槃造冰焉大夫設夷槃造冰焉士併瓦槃無冰設床䄠第有枕唅一床襲一床遷尸于堂又一床皆有枕席君大夫士一也始死遷尸于床幠用斂衾去死衣小臣楔齒用角柶綴足用燕几君大夫士一也管人汲授御者御者差沐于堂上君沐梁大夫沐稷士沐梁甸人為垼于西牆下陶人出重鬲管人受沐乃煮之甸人取所徹廟之西北厞薪用釁之管人授御者沐乃沐用瓦槃挋用巾如他日小臣爪手剪髮濡濯棄于坎又三年問曰三年之喪何也曰稱情而立文因以飾群別親疏貴賤之節而弗可損益也故曰無易之道也稱其情而立文稱人之情輕重而制其禮也群謂親之黨也無易猶不易也創巨者其日久痛甚者其愈遲三年者稱情而立文所以為至痛極也又曰然則何以至期也言三年之義如此則何以有降至於期也期者謂為人後者父在為母也曰至親以期斷言服之正雖至親皆期而除也是何也問服斷於期之義也曰天地則已易矣四時則已變矣其在天地之中者莫不更始焉是以象之也法此變易可以期也然則何以三年也言法此變易可以期何以乃三年為曰加隆焉爾也焉使倍之故再期也言於父母加隆其恩使倍期也下焉猶然田九月以下何也曰焉使弗及也言使其恩不若父母故三年以為隆緦小功以為殺期九月為間上取象於天下取法於地中取則於人人之所以群居和一之理盡矣取象於天地謂法其變易也自三年以至緦皆歲時之數也言既象天地又足以盡人聚居純厚之恩也左傳哀下曰越圍吳趙孟降於喪食趙孟襄子無恤時有父簡子喪楚隆曰三年之喪親昵之極也主又降之無乃有故乎楚隆襄子家臣趙孟曰黃池之役先主與吳王有質曰好惡同之今越圍吳嗣子不廢舊業而敵之嗣子襄子自謂欲敵越救吳非晉之所能及也吾是以為降論語陽貨曰宰我問三年之喪期已久矣君子三年不為禮禮必壞三年不為樂樂必崩舊穀既沒新穀既升鑽燧改火期可已矣子曰食夫稻衣夫錦於女安乎曰安女安則為之夫君子之居喪食旨不甘聞樂不樂居處不安故不為也今女安則為之宰我出子曰豫之不仁也子生二年然後免於父母之懷夫三年之喪天下之通喪也豫也有三年之愛於其父母乎言子之於父母欲報之恩昊天罔極而豫也有三年之愛乎孝經援神契曰喪不過三年以期增倍五五二十五月義斷仁期十二月也再期二十五月也言期增倍則可矣復云二十五月者容有閏故曰期而後三十五月也春秋曰閏月葬齊景公看數閏也示民有終緣喪絶情再期萬物再終喪者彌遠遠追慕殺故因殺以絶家語曰孔子在衛司徒敬子卒夫子弔焉主人不哀夫子哭不盡聲而退蘧伯玉謂孔子曰衛國鄙俗不習喪禮煩吾子辱相焉孔子許之掘中霤而浴中霤室中毀竈以綴足襲尸於床及葬毀宗𨆍行明不復有事於此綴足欲令不解戾也毀宗廟之門西而出行神之位在廟門之外出于大門及墓男子西面婦人東面既封而歸殷道也孔子行之子游問曰君子行禮不求變俗夫子變之矣孔子曰非此之謂也喪事則從其質而已矣又曰孔子之喪公西赤掌葬焉唅以蔬米三具蔬米粳米也禮記曰嘉蔬襲衣十有一稱加朝服一冠章甫之冠佩象環徑五寸而綦組綬綦雜色也桐棺四寸柏槨五寸飾桐牆置翣設披周也設崇殷也綢練設旐夏也披柩行夾引棺者也崇牙旌旗飾也綢練旌旗之扛葬乘東所建也旌旗之旒縿緇布廣充幅長尋日旐也兼用三王之禮所以尊師且備古也續漢書禮儀志曰登遐皇后詔三公典喪事百官皆衣白單衣白幘冠閉城門宮門近臣中黃門持兵虎賁羽林郎中署皆嚴宿衛官府各警北軍五校繞宮屯兵黃門令尚書御史謁者晝夜行陳三公所手足色膚如禮皇后皇太子哭踴如禮沐浴如禮守宮令兼東園匠將女執事黃綿緹繒金縷玉押如故事飯含珠玉如禮冰槃如禮百官哭臨殿下是日夜下竹使符到皆伏哭盡哀小斂如禮東園匠考工今東園祕器表裏洞赤文畫日月烏龜龍虎連璧偃明如故事大斂于兩楹之間干寶晉紀曰大鴻臚鄭默有母喪既葬有司依常使還攝職默固陳執久乃許之於是定令聽大臣得終喪焉宋書禮志曰鄭玄喪制二十七月而終學者多云得禮晉初用王肅議祥橝共月遂以為制江左以來唯晉朝施用縉紳之士猶多遵玄議齊書曰皇太子妃薨左衛將軍沈文季經為宮臣未詳服不王儉議曰漢魏已來官僚先備臣隸之節具體在三存既盡敬亡豈無服昔庾翼喪妻王允滕猶府吏宜有小君之服況臣節之重宜依舊君之妻齊襄三月而除後周書曰葬文宣后叱奴氏於永固陵帝𥘵跣至陵所詔曰齊斬之情經籍彝訓近代沿革遂亡斯禮伏奉遺令既葬便除攀慕几筵情實未忍三年之喪達於天子古今無易之道王者之所常行但時有未諧不得全制軍國務重庶目聽朝纕麻之節苫廬之禮率遵前典以申罔極百寮以下宜依遺令公卿上表固請俯就權制過葬即吉帝不許引古禮答之群臣乃止於是遂申三年之制五服之內亦令依禮衝波傳曰宰我謂三年之喪日月既周星辰既更衣裳既造百鳥既變萬物既易黍稷既生朽者既枯於期可矣顏淵曰人知其一莫知其他俱知暴虎不知憑河鹿生三年其角乃墮子生三年而離父母之懷子雖美辨豈能破堯舜之法改禹湯之典更聖人之文除周公之禮改三年之喪不亦難哉父母者天地天崩地壞三年不亦宜乎荀氏家傳曰荀爽對策曰臣聞火生於木故其德孝漢之諡帝稱孝其義取此也故漢制天下皆誦孝經選吏則舉孝廉蓋以孝務也夫喪親自盡孝之終也今二千石不得行三年喪非所以崇孝道而稱火德也頃者漢嗣數乏枝葉不繁其咎未必不由此往者文帝勞謙自約行過于儉故有遺詔以日易月此所謂夷惠激俗當身而已貫萬世為後嗣法者也
