body:
  text: 蟲豸部六蟾蜍春秋運斗樞曰紀乖政則蟾蜍月精四頭感翔感翔為妖韓詩外傳曰魚網之設鴻則離之嬿婉之求得此戚施薛君曰戚施蟾蜍喻醜惡文子曰蟾蜍辟兵壽在五月之望淮南子曰月照天下而蝕於蟾諸騰蛇遊霧而殆於蝍蛆蟾諸月中蝦蟆食月故曰食於蟾諸殆猶畏也蝍蛆蟋蟀爾雅謂之蜻蛚之大腹也上蛇蛇不敢動故曰殆於蝍蛆抱朴子曰蟾蜍壽三千歲又曰肉芝者謂萬歲蟾蜍頭上有角頷下有丹書八字再重以五月五日日中時取之陰乾百日以其足畫地即為流水帶其左手於身辟五兵若敵人射己者弓弩矢皆反還自向也又曰辟兵法或以月蝕時刻三歲蟾蜍喉下有八字者血以書所持之刀劍玄中記曰蟾蜍頭生角得而食之壽千歲又能食山精張衡靈憲曰羿請不死之藥於西王母姮娥竊之以奔月遂託身於月是為蟾蜍淮南子同河圖曰蟾蜍去月天下大亂西京雜記曰廣川王發晉靈公冢得玉蟾蜍一枚大如拳腹空容五合如新王取以盛水滴硯崔實四民月令曰五月五日取蟾蜍可治惡疸瘡傅玄詩曰蟾蜍食明月虹霓薄朝日蝦蟆易通卦驗曰夏至小暑蝦蟆無聲山海經曰藟音誄山湖水出焉東流于食水其中多活師科斗也小雅或曰活東也爾雅曰蟼蟆郭璞注云蛙類音驚亦曰景科斗活東蝦蟆子也周禮秋官下曰蟈氏掌去蛙黽焚牡蘜菊同以灰灑之則死齊魯之間謂蛙為蟈黽耿黽也蟈與耿黽尤怒鳴而聒人耳故去之漢書曰武帝元鼎五年秋蛙與蝦蟆俱鬭是歲四將軍衆十萬征南越開九郡後漢書曰馬援為隗囂使公孫述歸謂囂曰子陽井底蛙耳言述志遍狹如坎井之蛙事見莊子而妄自尊大不如專意東方東觀漢記曰彭寵堂上聞蝦蟆聲在火爐下鑿地求之無所得寵為奴所殺張璠漢記曰靈帝鑄天祿蝦蟆吐水於平昌門外橋東約入宮又作翻車渴烏施於橋西灑南北郊晉書曰有蛙鳴于華林園惠帝問左右曰為官乎為私乎侍中賈胤對曰在官地為官在私地為私宋書曰張暢弟收嘗為猘犬所傷醫云宜食蝦蟆膾收甚難之暢含笑先嘗收因此乃食創亦即愈南史曰沈僧昭別名法朗少事天師道士梁武陵王紀為會稽太守宴坐池亭蛙鳴聒耳王曰殊廢絲竹之聽僧照呪厭十許口便息及日晚王又曰欲其復鳴僧昭曰王歡已闌令汝鳴即便喧聒又齊書曰卞彬蝦蟆賦云紆青柂紫名為蛤魚世謂比令僕也又云蝌斗唯唯群浮暗水唯朝繼夕筆役如鬼比令史咨事也南孝義傳曰丘傑字偉跱吳興烏程人也年十四遭母喪以熟菜有味不嘗於口歲餘忽夢見母曰死亡是分別耳何事乃爾荼苦汝噉生菜遇蝦蟆毒靈床前有三丸藥可取服之傑驚起果得甌甌中有藥服之下科斗子數升三國典略曰周天和二年齊武安妖人與其徒偽云盲躄因飲泉水下得金佛其疾並愈於是遠近信之男女霧集水中有老黃蝦蟆全如金色乍出乍沒齊武成及百官已下莫不飲之隋書曰煬帝在東宮宮中數有妖變乃命衛尉少卿蕭吉禳邪氣於宣慈殿座祭神是時孟冬地久無水乃有蝦蟆從西南來入至座忽然而失文子曰禽子曰多言有益乎墨子曰蝦蟆蛙黽日夜恆鳴口乾舌劈然而不聽今觀晨雞時夜而鳴天下俱動多言何益唯其言之時也韓子曰越王勾踐伐欲伐吳欲民輕死出見鬭蛙乃下軾從者曰王何敬也曰以其有勇氣故也其後國人輕命死戰淮南子曰夫蝦蟆為鶉水蠆為蟌音聰皆生於非其類老蝦蟆化為鶉水中蠆化為蟌蟌者蜻蜓也唯聖人能知其化又曰蘭芝以芳未嘗見霜芳香也鼓造辟兵壽盡五月之望鼓造蓋謂梟一曰蝦蟆今世人五月望作梟羹亦作蝦蟆羹國語曰趙襄子以尹鐸有寬政於晉陽其心必和乃守晉陽後晉師圍而灌之沉竈生蛙民無叛意神仙傳曰葛玄指蝦蟆使舞皆應絃節使止乃止燕丹子曰太子自喜得荊軻永無秦憂日與軻之東宮臨池而觀軻拾博投蛙太子令人奉槃金以進物理論曰夫虛無之談尚其華藻此無異於春蛙秋蟬聒耳而已國俗通曰肅肅蝦蟆掉尾俗説蝦蟆一跳八尺再跳丈六從春至冬袒裸相逐無他所作掉尾肅肅謹按蝦蟆既處水中其尾又短正能使掉之豈能肅肅乎原其所以當言夏馬患蚋掉尾振擊常肅肅也蝦蟆夏馬音相似崔豹古今注曰科斗蝦蟆子也一名懸針一名玄魚形圓有尾聞雷則尾脫腳生也廣五行記曰懷州凝真觀東廊下柱已五十餘年道士往往聞有蝦蟆聲不知的處後因柱朽壞以他柱易之斫之於柱中得一蝦蟆其柱又無孔隙嶺表録異曰唐林藹為高州太守有鄉墅小兒牧牛聞田中有蛤鳴蛤即大蝦蟆牧童遂捕之蛤躍入一穴中遂掘之乃蠻酋冢也得一銅鼓其色翠緑土射數處損缺其上隱起多鑄蛙黽之狀疑其鳴蛙即銅鼓精也楚辭七諫曰蝦蛙遊於藥池芳藥之池成公綏陰霖賦曰百川泛濫潢潦流竈中生蛙庭運舟蟋蟀易通系卦曰蟋蟀之蟲隨陰迎陽居壁向外趣婦女織績女工之象今失節不居壁似女事不成有淫佚之行因夜為姦故為門戶夜開門戶人之所由出入今夜不閉明非也易通卦驗曰立秋蜻音精蛚音列鳴白露下蜻蛚上堂京房易妖占曰七月建申為夷則蟋蟀鳴毛詩蟋蟀曰蟋蟀在堂歲聿其暮今我不樂日月其除又豳七月曰七月在野八月在宇九月在戶十月蟋蟀入我床下箋云自七月至十月入我床下皆謂蟋蟀也言將寒有漸非卒來也陸機毛詩疏義曰蟋蟀似蝗而小正黑有光澤如漆有角翅一名蠶一名蜻蛚楚人謂之王孫幽州人謂之促織督促之言也里語曰趣織鳴懶婦驚詩義問曰蟋蟀食蠅而化成也劉芳毛詩義筌曰蟋蟀今促織也一名蜻蛚楚謂之蟋蟀或謂之蛬南楚謂之王孫也方言同蔡雍月令章句曰蟋蟀或謂之蛬亦謂之蜻蛚斯螽莎雞之類禮記月令曰季夏之月蟋蟀居壁春秋考異郵曰立秋趣織鳴宋均曰趣織蟋蟀也立秋女功急故趣也春秋潛潭巴曰蟋蟀集天子無遠兵春秋説題辭曰趣織為言趣織也織興事遽故趣織鳴女作兼爾雅曰蟋蟀蛬也郭璞曰今促織也亦名青蛚也周書時訓曰小暑之日溫風至又五日蟋蟀居壁袁宏後漢書曰崔駰上書曰竊聞春陽發而倉庚鳴秋風厲而蟋蟀吟蓋氣使之然也干寶搜神記曰朽葦為蛬麥為𧌄蝶崔豹古今注曰蟋蟀一名吟蛬秋初生得寒則鳴噪濟南謂為懶婦也又曰沙雞一名促織一名絡緯一名蟋蟀促織謂鳴聲如急織也絡緯謂其聲如紡也促織一曰促機絡緯一名紡緯阮籍詩曰開秋肇涼氣蟋蟀鳴床帷感物懷殷憂消然心悲盧諶蟋蟀賦曰何茲蟲之資生亦靈智之攸授享神氣之么眇體形容之微陋于時微涼既戒火靈告去玄乙辭宇翔鶤音昆南顧風戾戾而動柯露零零而隕樹月轉景而西頽漢回波而東注厲清響於長宵激悲聲以迄署王褒聖主得賢臣頌曰虎嘯而風洌龍興而致雲蟋蟀候秋吟蜉蝣出以陰楚辭曰淡容與而獨倚兮蟋蟀鳴於西堂虭蟧詩義疏曰蝘音偃一名虭音刃蟧音勞蟪蛄也爾雅曰蜓蚞螇螰即蝭蟧也一名蟪蛄齊人呼螇題木奚鹿四音家語曰孔子謂宰子曰違山十里蟪蛄之聲猶在於耳莊子曰蟪蛄不知春秋司馬彪注曰蝭蟧春生夏死夏生秋死故不知歲之春秋也揚雄方言曰蛥蚗上音折下音夬齊謂之螇螰奚鹿兩音楚謂之蟪蛄或謂之蛉蛄上音零秦謂之蛥蚗自關而東謂之虭蟧貂料兩音或謂之蝭蟧音帝或謂之蜓蚞音廷木西楚與秦通名江東又呼為蟂蟧風土記曰秋而蟪蛄鳴於朝寒螿鳴於夜鼠負爾雅曰蟠鼠負也郭璞曰此甕器底蟲也舊説伊威鼠婦別名未詳也毛詩東山曰伊威在室伊威委黍也陸機毛詩疏義曰伊威一名委黍一名鼠婦在壁甕底土中似白魚者也説文曰蟠蟅音柘鼠婦也蛜威委黍鼠負也干寶搜神記曰豫章有一家婢在竈下忽有人長數寸來竈間婢誤以履踐殺一人須臾遂有數百人著縗麻持棺迎喪凶儀皆備出東門入園中覆船下就視皆是鼠婦作湯澆殺遂絶葛洪治瘧方曰取鼠婦蟲十四枚各以糟封裹之凡十四丸臨發服七丸便愈陶弘景本草經曰鼠婦一名蟠負一名伊威一名委人俗言鼠多在坎中背則負之今作婦字如似乖理又一名鼠姑家用此悅媚人甚多方而應少蠹韓詩外傳曰枯魚銜索于何不蠹爾雅曰蠍蛣䖦木中蠹蟲蝎葉蠹即蛣蝟也漢書曰文帝賜尉他書衣物他因使者獻桂蠹一器文子曰山生金反自刻木生蠹還自食穆天子傳曰天子東遊次雀梁蠹書于羽陵謂暴書蠹蟲因曰蠹書也杜寶大業拾遺録曰七年始安郡獻桂蠹四瓶瓶別一千頭紫色香辛有味噉之去陰痰之疾強䖹爾雅曰姑䗐強蝆郭璞曰米穀中蠹小墨蟲也建平人呼焉蛢子音芊方言曰蛄䗐音施謂之強䖹郭璞注曰江東謂之蛄䗐也齧桑爾雅曰蠰音餉齧桑郭璞曰似天牛也長角體有白點喜齧桑樹作孔藏其中江東呼為齧髮守瓜爾雅曰蠸音權輿父守瓜也郭璞曰今瓜中黃小蟲喜食瓜葉故曰守瓜蚰蜒爾雅曰蚓𧍢入耳蚰蜒也𧍢音衍方言曰自關而東蚰蜒謂之蚓𧍢或謂之入耳或謂之䗅音長𧕯所宜切趙魏之間或謂之蚨虶音扶于北燕謂之䖡蚭廣雅同䖡奴六切蚭音尼蜰廣五行記曰春秋魯莊公二十九年蜰劉向以為此非中國所有南越盛暑男女同川澤淫亂所生為蟲臭惡時公娶齊淫女為夫人後漢書曰王莽地皇元年蜰蔽天至長安入未央宮緣莽發吏捕之于時天下大亂尋而莽敗見殺蜚廉本草經曰蜚廉味鹹治血瘀逐下血破積藂療喉痺生晉地山澤中二月採之吳氏本草曰蜚廉蟲神農黃帝云治婦人寒熱蠁爾雅曰國音或貉蟲蠁也音許兩切今呼蛹蟲為蠁廣雅曰土蛹蠁蟲蛷螋説文曰蛷多足蟲也廣雅曰矜蛷螋也博物志曰蠷螋蟲溺人影亦隨所著處生瘡盧氏曰以雞腸草搗塗經日即愈塵蟲吳氏本草曰塵蟲一名土鱉蛇公異苑曰海曲有物名蛇公形如覆蓮花正白庾闡楊都賦曰蛇公沉光於海曲螲蟷爾雅曰王蛈音蛈蜴音湯也郭璞注曰即螲蟷也似蜘蛛在冗中有蓋今河北人呼蛈蝪也金花笁法真登羅山疏曰金花蟲大如斑貓形色文采如金是龜屬得之養玩彌日茲母淮南子曰朝秀不知晦朔許慎注曰朝生暮死蟲也生水上似蠶娥一曰茲母
