body:
  text: 飲食部二十三鹽書曰青州厥貢鹽絺周禮天官籩人曰朝事之籩其實形鹽案鹽謂為虎形謂之形鹽又曰掌鹽之政令以共百事之鹽祭祀共其苦鹽散鹽杜子春讀若為鹽謂出鹽直用不凍治也鄭司農云散鹽凍治者玄謂散鹽煮水為鹽也賓客共其形鹽散鹽王之膳羞共飴鹽飴鹽之怡者今戎鹽有也凡齊事鬻鹽以待戒令齊事和五味之事鬻鹽凍治之鬻音煮也記曰祭宗廟鹽曰鹹鹺大鹹曰鹺又曰醯醢之美而煎鹽之尚貴天産也又曰桃諸卵鹽大鹽又曰功衰食菜果飲水漿無鹽酪不能食食鹽酪可也功衰齊斬之末也酪酢載左傳曰王使周公閲來聘饗有昌歜曰黑形鹽辭曰國君文足昭也武可畏也則有備物之饗以象其德薦五味羞嘉穀鹽虎形鹽五味之醬故刻盡虎形以象其武以獻其功吾何以堪之又曰晉人謀去故綘諸大夫皆曰必居郇瑕氏之地沃饒而近鹽鹽狩氏縣有鹽池是也又曰齊晏子曰山木如市弗加於山魚鹽蜃蛤弗加於海說文曰鹽鹹也鹽池河東鹽池袤五十里廣六里周一百十四里戴延之西京記曰鹽生水中夕取朝復千車萬驢適意多少鹵西方鹹也東方謂之斥西方謂之鹵鹺鹹也河內謂之鹹廣雅曰䴛音消𪉮七豆切音溫𪉱步典切鹽也史記曰募民月給費用官器作煮鹽宮牢盆如淳曰牢廩食也盆煮鹽漢書王莽詔曰鹽食者之將又曰吳東海水為鹽國用饒足吳録地里志曰吳王煮海水為鹽今海鹽縣是也續漢書曰虞翊為武都太守始到郡穀石千五百鹽石八千視事三歲穀石八千鹽百又曰天笁國出黑鹽東觀漢記曰賈復為縣掾迎鹽河東會盜賊起等輩放散其鹽復獨完還致縣中後漢書曰第五倫自以久為官不達遂將家屬客河東變名姓自稱王伯齊載鹽往來又太原上黨所過輒為糞除而去又王符論曰且攻玉以石洗金以鹽詩小雅曰他山之石可以攻玉今之金工發金色者皆淬之鹽水也魏志曰衛覬與荀彧書曰夫鹽國之大寶也自亂以來放散宜如舊置使者監賣以其直益市犁牛若有歸民以供給之又曰鄧艾平蜀後言於司馬文王留隴右兵二萬人蜀兵二萬人煮鹽興冶為軍農要用魏略曰漢令哀牢民家出鹽一斛以為賦吳志曰朱桓卒家無餘財孫權賜鹽五千斛以周喪事蜀志曰先主定益州置鹽府校尉較鹽鐵之利晉書曰肅慎國無鹽鐵燒木作灰取汁而食之又曰郭文字文舉隱居吳興餘杭大辟山中恆著鹿裘葛巾不飲酒食肉區種菽麥採草葉木寶貿鹽以自供人或酬下價者亦即與之宋書曰豫章王大會賓僚張融食炙始畢行炙人使去融欲求鹽䔉口終不言方食捶指半日乃息又曰張融作海賦文辭詭激獨與衆異後以示鎮軍將軍顧顗之曰卿此賦實超玄虛但恨不道鹽耳融即求筆注曰漉沙搆白熬波出素積雪中春飛霜暑路齊書曰崔慰祖父喪不食鹽母曰汝既無兄弟又未有子息毀不滅性故當不進肴羞耳如何絶鹽吾今亦不食矣慰祖不得已從之梁書曰侯景陷臺城宴集其黨又召僧通僧通取肉搵鹽以進景問曰好不景答所恨大鹹僧通曰不鹹則爛及景死王僧辨截其二手送齊宣又傳首往江陵果以鹽五斛置腹中送于建康暴之于市百姓爭取屠膾羹食皆盡後魏書曰世祖南伐遺李伯賜劉義恭等鹽各九種并胡豉孝伯曰有後詔凡此諸鹽各有所宜白鹽食鹽主上自所食黑鹽治腹脹氣滿末之六銖以酒下胡鹽治目痛戎鹽治諸瘡赤鹽駮鹽臭鹽馬齒鹽四種並非食鹽又曰忽吉國水氣鹹凝鹽生樹上又曰沮渠蒙遜平酒泉於宋繇室得書數千卷鹽米數十斛而已蒙遜歎曰孤不喜剋李氏欣得宋繇耳北齊書曰房景伯母亡居喪不食鹽菜因此遂為水病積年不愈又曰崔暹奏請海沂煮鹽有利軍國文襄以問崔昂昂曰亦既官煮斷之竈官力雖多不及人廣諸淮開市薄為竈稅私館給彼此有宜朝廷從之唐書曰武德中長安古城鹽渠水生鹽色紅白味甘狀如方印又曰左右神策鹽州行營節度使胡堅昌皆表奏初城鹽州鹵中獲壤土又置烽堡水路回遠即時有雨廢鹽并悉生鹽事扶聖德可謂天讚請宣付史館制可又曰代宗時河中府鹽池生瑞鹽韓滉奏曰土德之瑞又曰李晟薨後德宗以初城鹽州復鹽池上賜宰相新鹽惻然思之命置鹽於靈座又曰流鬼國去京師萬五千里邊於北海多沮澤有魚鹽之利又曰初榷鹽起於第五琦及劉晏代其任法術精密官無遺利初歲入錢六十萬貫季歲十倍而人無厭苦大曆末通計一歲征賦所入而鹽醝當天下太半之賦管子曰齊有渠之鹽燕有遼東之煮十口之家十人䑛鹽百口之家百人舐鹽凡食鹽之數一月丈夫五升少半婦人三升少半嬰兒二升少半鹽之重升加分耗而釜百升加什耗而釜千君伐沮薪煮浦水為鹽正而積之三萬鍾至陽春農事方作令民無得築垣牆毋得繕冢墓大夫無得治宮室臺榭北海之衆無得聚庸而煮鹽然鹽之價必四什倍君以四什之賈循河濟之流南輸梁趙宋衛濮陽惡食無鹽則腫守圉之本其用鹽獨重君伐菹薪煮沛水以籍於天下然則天下不減矣又曰桓公成鹽三萬六千鍾令吏糴之得成金萬一千餘斤尸子曰南海之輦北海之鹽魯連子曰連宿沙瞿子善煮鹽使煮潰沙雖十宿不能得也抱朴子曰作赤鹽法用寒鹽一斤雨泥一斤內鐵器中以為水燒皆消而赤也金樓子曰白鹽小小峰洞激如有水精及其映日光似琥珀胡人扣之以供國廚名為君王鹽亦名玉華鹽又曰有清池鹽正四方廣半寸其形挾踈似有人耕池旁地取池水波種之去勿回顧即生此鹽國語曰桓公通齊國之魚鹽于東萊言通者先時禁人東萊齊之東萊夷也山海經曰景山南望鹽皈或無皈字敗之池北望少澤其草多薯藇秦菽其陰多頳其陽多玉郭景純云鹽敗澤即解縣鹽池也呂氏春秋曰和之美者大夏之鹽高誘曰大夏澤名或山名春秋後語曰張儀說趙王曰今日楚與秦為兄弟之國而韓魏稱為藩臣齊獻魚鹽之地斷趙之右臂齊負海有魚鹽之利今云獻魚鹽之地矯辭以脅趙也淮南萬畢術曰鹽能纍卵取戎鹽塗卵取他卵置其上即纍也鹽鐵論曰古者豪強大家得煮海為鹽民皆依為姦之業也世說曰秦繆公使賈人載鹽百里奚使將軍風俗通曰鹹如炭俗說鹹亦與熱正等炭火不可以入口人食得大鹹亦吐之謹案東海昫人曉知鹽法者云攪鹽木多日每燋黑如炭非謂竈中火炭也吳時外國傳曰漲海州有灣灣中常出自然白鹽嶧嶧如細石子天笁國有新陶水水甘美下有石鹽白如水精南州異物志云鹽如石英晉令曰凡民不得私煮鹽犯者四歲刑主吏二歲刑蜀王本紀曰宣帝地節中始穿鹽井數十所世本曰宿沙作煮鹽宋志曰宿沙衛齊靈公臣齊潰海故衛為漁鹽之利晉太康地記曰梓潼縣出傘子鹽廣志曰鹽體因於水故或水且生于水故或與土雜産于地多側于海濱但未必千里相比耳煮鹽與海同河東有印成鹽西方有石子鹽皆生於水北海胡中有青鹽五原有紫鹽波斯國有白鹽如細石子玄晏春秋曰故侍中劉子楊食餅知鹽生精味之至秦記曰會稽王道子為符郎設盛饌郎云鹽味小生博物志曰臨卭火并諸葛亮往視之後火益盛以盆貯水煮之則鹽後人以火投并中火即滅至今不然梁四公子記曰高昌國遣使貢鹽二顆顆大如斗狀白似玉帝以其自萬里絶域而來獻數年方達命杰音竭公迓之謂其使曰鹽一顆是南燒羊山月望收之者一是北燒羊山非月望收之者使者具陳鹽奉王急命故非時爾因問紫鹽磬碧珀云中路遭北涼所奪不敢言之帝問杰曰公群物之異對曰南燒羊山鹽文理粗北燒羊山鹽文理密月望收之者明徹如水以氈橐煮之可驗交河之間平磧中掘深數尺有末鹽如紅如紫色鮮味甘食之止痛更深一丈下有碧珀黑逾純漆或大如車輪末而食之攻婦人小腹癥瘕諸疾彼國珍異必當致貢是以知之涼州異物志曰姜賴之墟今稱龍城恆溪無道以感天庭上帝赫怒溢海蕩傾姜賴胡國名也恆溪其王字也矜貪無厭上帝化為沙門遊于觀其政遂從溪乞之以鹽與帝帝乃震怒使蒲昌溢以蕩覆也剛鹵千里蒺藜之形其下有鹽纍棊而生其地化為鹵而剛堅嶷如蒺藜撥發其底鹽方大如棊以次相纍也坐以鹽乞天帝故使此地化生鹽也又曰鹽山二嶽三色為質赤者如丹黑者如漆小大從意鏤之寫物赤與黑者皆小惟白大或如篋箱從大所為形也作獸辟惡佩之為吉或治為鳥獸以佩之戎鹽可以療疾四方皆用白者作散以除頭風以其出胡國故言戎鹽也涼州記曰有青鹽池出鹽正方半寸其形似石甚甜美益州記曰汶山越嶲煮鹽法名異汶山有鹹石先以水漬既而煎之越嶲先燒炭以鹽井水沃炭刮取鹽荊州記曰鹽水自凝生傘子鹽方寸中央隆起形如張傘本草經曰鹵鹽一名寒石味苦戎鹽主明目大鹽一名胡鹽呂氏春秋曰本草云戎鹽一名胡鹽崔駰博徒論曰江陽六鹽笑林曰姚彪至武昌遇風與沈浙江渚守風糧用盡遣人從彪貸鹽百斛彪得書不答勑左右倒鹽百斛著江水中曰明吾不惜惜所與耳嶺表異録曰野煎鹽廣南煮海其無限商人納攉計價極微數內有恩州場石橋場俯邇滄溟去府最遠商人於所司給一百石榷課止銷雜貨三二千及往本場鹽並無官者給遣商人但將人力收聚鹹沙掘地為坑坑口稀布竹木鋪蓬簟於其上堆沙潮來投沙鹹鹵淋在坑內伺候潮退以火炬照之氣衝火滅則取鹵計用竹盤煎之頃剋而就竹盤者以篾細織竹鑊表裏以牡礪灰泥之自收海水煎鹽謂之野煎易得如此也江淮試鹵濃淡即置飯粒於鹵中粒浮者即是純鹵也醬禮記曰膾炙處外醯醬處內又曰獻熟食者操醬齊又曰濡雞醢醬實蓼濡魚卵醬實蓼濡鱉醢醬實蓼魚膾芥醬麋腥醢醬論語曰不得其醬不食漢書曰劉歆謂揚雄云今學有祿利然尚不能明易又如玄何吾恐後人覆醬瓿也瓿音部罌名也風俗通曰醬成於鹽而鹹於鹽夫物之變有時而重又曰雷不作醬俗說令人腹內雷聲按子路感雷精而生尚剛好勇死衛人醢之孔子覆醢每聞雷心惻怛耳桓談新論曰鄙人得鯅音羶醬而美與人共食少唾其中因棄之俱不得食論衡曰作豆醬惡聞雷此欲使人急作不欲積久世說曰陸機入洛欲為三都賦聞左司作之撫掌而笑與弟云書雲此間有傖父欲作三都賦須其成當以覆醬甕耳宋書曰孝武嘗為王玄謨作四時書云匏醬調秋菜白醝解冬寒又曰阮孝緒外兄王晏貴顯屢至其門孝緒度之必至顛覆聞其笳管穿籬逃匿不與相見曾會醬美問之云是王家所得便吐餐覆醬及晏誅親戚咸為之懼孝緒曰親而不黨唯坐之及竟獲免梁劉孝儀謝智安王賚蝦醬啓曰龍醬傳甘退成可陋蚿醢稱貴追覺失言上聖聞雷未之能覆嘉賓流啜差以無辭
