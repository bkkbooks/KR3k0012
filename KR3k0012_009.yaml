body:
  text: 天部八雲釋名曰雲猶云云衆盛也說文曰雲大澤之潤氣也又曰雲山川氣也從雨云象回轉形也霠於金反雲覆日也𩂸音沉淹於撿反雲久陰也凄雨雲起也雨雲貌也詩云有淹凄凄興雨祁邦易曰雲行雨施品物流形又曰雲從龍風從虎聖人作而萬物覩又曰召雲者龍又曰雲上於天需又曰坎為雲又曰密雲不雨自我西郊密靜也雲靜止不加雨喻紂恩澤不加於民也不雨之災自其君也西郊亦謂文王也詩曰薈兮蔚兮南山朝躋注曰薈蔚雲興貌南山曹南山躋升雲也又曰上天同雲雨雪紛紛又曰英英白雲露彼菅茅英英白雲貌露亦有雲言天地之氣無微不著無不覆養也禮曰天降時雨山川出雲又曰山林川谷丘陵能出雲為風雨周禮曰保章氏以五色雲物辨吉凶之祲象占視曰旁雲氣青為蟲白為喪赤為兵荒黑為水黃為豐傳曰凡分至啓閉必書雲物為備故也分謂春秋分至謂冬夏至啓立春夏也陽氣用事為啓閉立秋冬也陰氣用事為閉雲五雲也風氣日月星辰也分至啓閉天地之大節陰陽之分也故遂登觀臺望氣以審妖祥變禍亂之氣先見於八節書其雲物之形言其所致務為之備也又曰魯哀公五年有雲如衆赤鳥夾日以飛三日楚使問周太史太史曰其當王身乎日為君妖氣守之雲在楚若上禍不及他國也若禜之可移於令尹司馬也王曰除心腹之疾而置諸股肱何益終不禜孔子曰楚昭王知天道矣不失國宜哉又曰黃帝氏以雲紀官故為雲師而雲名有景雲之瑞公羊傳曰觸石而出膚寸而合不崇朝而遍雨乎天下者惟泰山雲爾語曰不義而富且貴於我如浮雲易通卦驗曰冬至陽雲出箕如樹木之狀小寒合凍蒼陽雲出氐大寒降雪黑陽雲出心立春青陽雲出房如積水雨水黃陽雲出亢驚蟄赤陽雲出翼春分正陽雲出張如積白鵠清明白陽雲出奎穀雨大陽雲出張如車蓋立夏常陽雲出觜赤如珠小蒲上陽雲出七星藝種長陽雲出維夏至少陰雲出如水波小暑雲五色出大暑陰雲出南赤北蒼立秋濁陰雲出如赤繒處暑赤雲出白露黃陰雲出秋分白陰雲出寒露正陰雲出如冠纓霜降大陰雲出上如羊下如磻石立冬陰雲出而黑大雪陰雪出而分冬至日謹候見雲送迎從其鄉來歲美民和京房易飛候曰凡候雨有黑雲如群羊奔如飛鳥五日必雨又曰視四方常有大雲五色其下賢人隱也青雲潤澤蔽日在西北為舉賢良黃雲如覆車大豐也又曰凡候雨以晦朔弦望有蒼黑雲細雲如杼軸蔽日月五日必雨尚書中候曰堯沉壁於河白雲起回風搖落又曰周成王舉堯舜禮沉璧于河白雲起而青雲浮至乃有蒼龍負圖臨河也尚書大傳曰舜為賓客禹為主人百工相和而歌卿雲于時八風循通卿雲藂叢注言和氣應也叢或為族又曰五嶽皆觸石出雲膚寸而合不崇朝而雨又曰舜時卿雲見於時百工和歌舜歌曰卿雲爛兮糾漫漫或以雲為出岫回薄而難以名狀也禮統曰雲者運氣布恩普博也禮斗威儀曰人君乘水而王其政和平則景雲見也又曰景明也言雲氣光明也又曰周成王治平觀於河青雲浮於河也春秋文耀鉤曰楚有蒼雲如霓圍軫七蟠中有荷斧之人向軫而蹲於是楚唐史畫遺灰而雲滅故曰唐史之策上滅蒼雲宋均注曰軫楚分也雲水氣灰火氣畫遺灰故雲滅春秋元命苞曰陰陽聚為雲春秋說題辭曰雲之為言運也觸石而起謂之雲含陽而起以精運也春秋合誠圖曰帝堯之母曰慶都生而神異常有黃雲覆上春秋孔演圖曰舜之將興黃雲升於堂又曰湯將興白雲入房白雲金精入湯房也孝經援神契曰王者德至山陵則景雲見又曰天子孝則景雲見史記曰若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂卿雲卿雲喜氣也又曰高祖過沛筑自為歌曰大風起兮雲飛揚威加海內兮歸故鄉安得猛士兮守四方又曰范曾云高祖之上有雲為龍虎之形此天子氣也又曰黃帝與蚩尤戰於涿鹿之野常有五色雲氣金枝玉葉止於帝上有花葩匹加辰之象因作華蓋漢書郊祀志曰武帝封泰山夜有光晝有白雲起於封中又曰封泰山後雲氣成宮闕漢書曰相如作大人賦帝覽之飄飄有凌雲之氣又曰武帝迎汾陰鼎至甘泉宮黃雲蓋其上又曰宣帝祠甘泉有頃紫雲從西北來散於殿前范曄後漢書曰樊英隱於壺山之陽曾有暴風從西方起英謂學者曰成都市火甚盛因含水西向漱之時客有從蜀郡來者云是日大火有黑雲卒從東方起須吏大雨火滅魏志曰文帝生於沛國譙縣上有雲氣青色而圓蓋終日乃解望氣者以為至貴人之證非人臣之氣蜀志曰劉備為兒戲於桑樹下上有雲覆童童如車蓋晉書曰樂廣有風姿衛瓘曰此人若披雲霧而覩青天又曰阮咸性曠達不拘顏延年五君詠曰仲容青雲器又曰咸和元年雲鬥聲如暴風雨宋書曰大明八年宣太后陵前後數有光及五色雲芳香四滿又五采雲在松上如車蓋又曰孝康建元二年二月乙未日上有雲如錦文光色潤澤又曰世祖在江州起義建牙軍有紫雲二假落于身上穆天子傳曰天子觴西王母於瑤池之上王母為謠曰白雲在天丘陵自出道路悠遠山川間之東方朔傳曰凡占長吏東耕當視天有黃雲來覆車五穀大熟青雲致兵白雲致盜烏雲多水赤雲有火長沙耆舊傳曰祝良為洛陽令時大旱告誠引罪紫雲沓起漢武帝內傳曰帝登尋真之臺齊戒到七月七日夜忽見天西南如白雲起直來趣宮須臾聞雲中簫鼓之聲復半食頃西王母至乘紫雲之輦臨發雲氣勃鬱盡為香氣漢武故事曰上幸梁父祠地主其日山上有白雲又曰呼萬歲聲封禪之上肅然白雲為蓋東方朔十洲記曰天漢三年月氏音支國獻神香使者曰國有常占東風入律百旬不休青雲干呂連月不散意中國將有好道君故搜奇蘊而貢神香也西京雜記曰瑞雲曰慶雲曰景雲雲五色曰慶或曰卿雲雲外赤內青謂之矞雲雲二色曰矞亦瑞雲也矞以律反雨雲曰油雲孟子曰油然作雲霈然下雨雪雲曰同雲詩云上天同雲雨雲氛氛同雲謂雲陰竟天同為一色雲師曰屏翳呂氏春秋曰屏翳曰雨師雲將亦雲之師司馬彪注莊子云雲將雲之主帥劉澄之楊州記曰婁縣有馬鞍山天將雨輒有雲起來映此山山出雲應之乃大雨抱朴子玉策記曰千歲之龜五色具焉浮於蓮葉之上或在藂蓍之下其上時有白雲風土記曰烏程縣音卞山望氣云有黃氣紫雲大吳故改葬焉王子年拾遺記曰崑崙山有九層從上來一層有雲氣五色從下望之皆有城闕之象又曰崑崙者西方曰須彌山九層其第七層有景雲出以映朝日又曰爛石色紅似肺燒之有香煙聞數百里煙氣升天則成香雲香雲遍潤則成香雨搜神記曰薊子訓至洛見公卿數十處去後皆白雲起王韶之始興記曰堯山長嶺望之如雲張野廬山記曰有白雲冠帶峰巖呼為山帶洞冥記曰吉雲之國俗常以雲占吉凶有吉事則滿室五色照人著草木皆成五色露莊子曰廣成子謂黃帝曰汝治天下雲氣不待族而雨草木不待黃而落奚足語至道又曰華封人謂堯曰夫聖人鶉居而鷇飲鳥行而無章章迹天下有道與物皆昌千歲厭世去而上仙乘彼白雲至於帝鄉抱朴子曰俗有見遊雲西馳而謂月之東行孟子曰油然作雲霈然下雨又曰湯一征自葛始天下從之人望之若大旱之望雲霓淮南子曰周雲之巃力孔反嵷七孔反尞力交反摷士交反彭步光反薄而為雨周雲密也尞摷彭薄蘊積之貌又曰伯益作井而龍登玄雲龍在黃泉下恐害及故去又曰山雲蒸柱礎潤又曰八極之雲是雨天下呂氏春秋曰山雲草莽水雲魚鱗旱雲煙火雨雲水氣無不比類其所生以示人又曰至亂之化君相賊其雲狀有若犬馬若白鵠車者遁甲開山圖曰遼東有襄平山多饒鬼目之菜生而有神虎龍蛇大魚守之雲氣覆之食之令人不飢榮氏注曰鬼目菜形似魚守芝草常有氣如龍虎蛇魚之狀河圖帝通紀曰雲者天地之本也河圖始開曰黃泉之埃上為黃雲青泉之埃上為青雲赤泉之埃上為赤雲白泉之埃上為白雲玄泉之埃上為玄雲河圖括地象曰崑崙山出五色雲氣兵書曰有雲如丹蛇隨星後大戰殺將又曰韓雲如布趙雲如牛楚雲如日宋雲如車魯雲如馬衛雲如犬周雲如輪秦雲如美人魏雲如鼠齊雲如絳衣越雲如龍頭蜀雲如囷言當處雲似之又曰雲如雄雉或如雄雞臨城其城必降魏武兵書節要曰孫子稱司雲氣非雲非煙非霧形似禽獸客吉主人忌韋頻秦書曰符堅時有黃雲五色時以為瑞賜民酺五日黃子發相雨書曰四方有濯魚雲疾者立雨濯魚雲遲者雨少難至江漢雲疾者即日雨洛書曰蒼帝起青雲扶日赤帝起赤雲扶日黃帝起黃雲扶日白帝起白雲扶日軍國占候曰若王子曰有黑雲似一匹布者其國兵起天文要集曰河有黑雲狀似船若一匹布維河不出十日大雨又曰北斗者不欲雲覆之有黑雲覆之天大雨地圖曰望石氣如浮雲其珠玉之精也京房風角要訣曰候雨法有黑雲如一匹帛日中即一日大雨二匹為二日雨三匹為三日雨黃帝岐伯經曰岐伯乘絳雲之車駕十二白鹿遊於蓬萊之上徐幹中論曰文王遇姜公於渭陽灼然如披雲見白日孫氏瑞應圖曰景雲者太平之應也一曰非氣非煙五色氛氳謂之慶雲瑞應圖曰矞雲瑞雲也有狀外赤內黃歸藏曰有白雲自蒼梧入大梁論衡曰龍無雲雨不能參天吳範占候風氣祕訣曰有青雲如雉兔臨城營軍敗走山海經曰符陽之山怪雲所出陸賈新語曰邪臣之蔽賢猶浮雲之障日月也宋玉高唐賦敘曰楚襄王與宋玉遊雲夢之臺高唐之觀上有雲氣須臾之間變化無窮問曰此何氣也玉曰朝雲也昔者先王嘗遊高唐殆而晝寢夢見婦人曰妾巫山之女也為高唐之客聞君遊高唐願薦枕席王因幸之去而辭曰妾在巫山之陽高丘之岨旦為朝雲暮為行雨朝朝暮暮陽臺之下旦朝視之如言故為立廟號曰朝雲孫卿雲賦曰圓者中規方者中矩又曰託地而游宇反風而下雨楚詞曰青雲衣兮白電裳又曰冠青雲之崔巍漢武帝秋風辭曰秋風起兮白雲飛司馬相如封禪頌曰自我天覆雲之油油雲行貌魏文帝詩曰西北有浮雲亭亭似車蓋應瑒詩曰清朝浮四海日暮歸故山張孟陽詩曰流波應舊浦行雲思故山傅玄詩曰浮雲舍愁氣悲風坐自嘆又玄歌詩曰青雲徘徊謂我愁又曰雲為車兮風為馬玉在山兮蘭在野雲無期兮風有止思心多端誰能理陸機雲賦曰望九畿以遠肆明皇極而永舒蔽陽光於晹谷闍天文於帝居齊濛荒於無極等渾昧於太初又浮雲賦曰若層臺高觀重樓疊閣或如種首之鬱律乍似塞門之寥郭若靈園之列樹攢寶耀之炳粲金柯分玉葉散龍逸蛟起熊厲虎戰鸞翔鳳翥鴻鶴驚奮成公綏雲賦曰舒則彌綸覆四海卷則消液入無形狎獵鱗次參差交錯狀崔巍其不安吁可畏而欲落龍伸蠖屈蜿蟬逶迤連翩鳳飛虎轉相隨或繡文錦章衣微要妙綿邈凌虛輕翔縹眇陶潛歸去來曰雲無心而出岫鳥倦飛而知還霄關令尹喜內傳曰當喜在胎之始其母夢絳霄流繞其身有長人謂曰汝咽之既覺口盈味屋生雙光若日飛流滿堂良久不知所在抱朴子曰凌厲九霄淮南子曰陰陽為騶乘雲凌霄與造化俱廣雅曰赤霄常霄氣與造化俱許慎注曰霄其霧雜字詁訓曰霄摩天赤氣也楚辭曰若王喬之乘雲載赤雲而陵青霄揚雄甘泉賦曰騰青霄而軼浮景孫楚鶴賦曰假使此鳥生自崑崙長於丹穴遊遨玄圃縹霄之際左思蜀都賦曰干青霄而透出舒丹氣而為霞郭璞遊仙詩曰尋仙萬餘日今乃見子喬振髮戴翠霞解褐披絳霄漢詩曰倬彼雲漢昭回于天倬明也又曰倬彼雲漢為章于天傳曰昭公四年星孛及漢水祥也賈逵解曰天漢水也或曰天河爾雅曰析木謂之津箕斗之間漢津也郭璞注曰津漢津也箕龍尾斗南斗天漢之津梁大戴禮曰夏小正月七日漢案戶漢天河也案戶言直南北也孝經援神契曰河者水之伯上應天漢史記天官書曰漢者金之散氣其本曰水漢星多則多水少則旱孟康曰漢河漢也水生於金也漢書曰項羽封高帝為漢王帝不悅蕭何謀曰語曰天漢其稱甚美願大王王漢撫其民還定三秦天下可圖也搜神記曰謝端少喪父母為鄰人所養年十七未婚後感天漢中白水素女潛為其炊以備飲食端後怪而潛候之得見言曰天哀忍孤貧恭順使我相為守舍今既見便去留不可博物志曰舊說天河與海通近世有居海者年年八月有人浮查來甚大往反不失期此人乃多齎糧乘查去忽忽不覺晝夜奄至一處有城郭居舍望室中多見織婦見一丈夫牽牛渚次飲之驚問此人何由至此此人即問為何處答曰君可詣蜀嚴君平此人還問君平君平曰某年某月有客星犯斗牛即此人到天河也抱朴子曰天河從北極分為兩頭至于南極其一經南中過其一經東井中過河者天之水也隨天而轉入地下過張衡靈憲曰水精為天漢河圖括地象曰河精上為天漢三輔黃圖曰始皇都咸陽端門四達以則紫宮渭水貫都以象天河橫橋南渡以法牽牛物理論曰星者元氣之英水之精也氣發而升精華上浮宛轉隨流名之曰天河一曰雲漢衆星出焉集林曰昔有一人尋河源見婦人浣紗以問之曰此天河也乃與一石而歸問嚴君平云此織女支機石也古詩曰河漢清且淺相去詎幾許盈盈一水間脈脈不得語傅玄擬天問曰七月七日牽牛織女時會天河唐宋之間明河篇曰明河可望不可親願得乘槎一問津更將織女支機石還訪成都賣卜人霞漢武內傳曰上元夫人謂西王母曰阿瓊有六甲之術用之可以遊景雲之宮登流霞之堂十洲記曰崑崙山之上有瓊之室紫翠丹房景雲燭日朱霞九光王子年拾遺曰燕昭王二年海人乘霞舟獻龍膏又曰崑山第八層有五色霞抱朴子曰咀六氣於丹霞楚辭曰漱正陽而含朝霞河圖曰崙崑山有五色水赤水之氣上蒸為霞而赫然論衡曰河東蒲坂項曼都好道學仙去三年而反家問其狀都曰欲飲食仙人輒飲我以流霞每飲一柸數日不饑揚雄甘泉賦曰吸青雲之流霞兮飲若木之露英王延壽魯靈光殿賦曰霞駮雲蔚若陰若陽魏文帝辭曰丹霞蔽日彩蚯垂天曹子建洛神賦曰遠而望之皎若太陽升朝霞阮籍清思賦曰厭白玉以為面霏丹霞以為裳左思蜀都賦曰舒丹氣而為霞陸機列仙賦曰即絳闕于朝霞陸機雲賦曰外聚紫霞郭璞江賦曰撫凌波而鳧躍吸翠霞而夭矯孫綽天台山賦曰赤城霞起以建摽張孟陽詩曰朝霞迎白日丹氣臨暘谷郭璞遊仙詩曰朝霞升東山朝日何晃朗嵇含悅晴詩曰朝霞炙瓊林夕影映靈芝
