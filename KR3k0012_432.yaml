body:
  text: 人事部七十二勤尚書無逸曰文王自朝至于日中昊弗遑暇食用咸和萬民又大禹謨曰克勤于邦又金滕曰昔周公勤勞王家惟豫沖人弗及知又梓材曰先王既勤用明德又周官曰功崇惟志業廣惟勤左傳宣下曰郤成子曰吾聞之非德莫如勤非勤何以求民文王猶勤況寡德乎又宣下曰民生在勤勤則不匱禮記祭法曰舜勤衆事而野死冥勤其官而水死東觀漢記曰明帝行部署不用輦晝甲夜乃解偃讀衆書乙夜盡寢先五鼓起率常如此又曰陳寵辟司徒鮑昱府掾屬專尚交遊以不肯親事為高寵常非之獨勤以物務又曰班超居家常執勤苦不恥勞辱又曰王丹字仲因每歲農時輒載酒肴於田間候勤者與而勞之魏氏春秋曰高文惠為剌姦令夙夜匪懈至擁膝抱書而寐太祖嘗夜微出覘察諸吏見而哀之徐解衣覆之而去魏志曰段灼上疏理鄧艾曰艾值歲凶又為區種身被烏衣手執耒耜以率將士上下相感莫不盡力吳志曰諸葛恪征淮南以滕胤為都督掌統留事胤白日接賓客夜省文書或至曉不寐王隱晉書曰陶侃少長勤勑自強不息常語人曰大禹聖者乃惜寸陰至於凡俗當惜分陰晉書曰任愷素有識鑒加以在公勤恪甚得朝野稱譽唐書曰杜佑性勤而無倦雖位極將相手不釋卷質明視事接對賓客夜則燈下讀書孜孜不怠與賓佐談論人憚其貴而伏其博杜預自敘曰在家則滋味經籍居官則畢力理治公家之事知無不為夏仲御別傳曰夏統字仲御永興人與母兄弟居恆星行夜歸採梠求食母老病不悰家事仲御鼓四起灑掃庭內鑽火炊爨之後徑便入野孟子曰雞鳴而起孜孜為善舜之徒也淮南子曰墨子無黔突孔子無暖席是故聖人蒙恥辱以干世主者非以貪祿慕位也欲事天下之利除萬民之害也又曰跬步不休跛鱉千里積纍不輟可成丘阜鹽鐵論曰禹感洪水身親其勞簪墮不掇冠挂不顧儉約尚書大禹謨曰禹克儉于家周書曰文王疾召太子發曰吾栝柱茅茨蓋為民愛費也禮記檀弓下曰晏子一狐裘三十年又禮器曰晏平仲禮其先人豚肩不掩豆浣衣濯冠以朝君子以為隘矣左傳桓公曰臧哀伯諫曰清廟茅屋大輅越席大羹不致粢食不鑿昭其儉也又閔公曰衛文公大布之衣大帛之冠又襄公上曰季文子卒大夫入斂公在位無衣帛之妾無食粟之馬無藏金玉無重器備又襄五年曰叔向曰子展儉而一又哀上曰子西曰二三子無患矣吾昔聞闔閭食不二味居不重席室不崇壇器不雕鏤宮室不觀舟車不飾衣服財用擇不取費選取堅厚不尚細靡公羊傳宣公曰晉靈公無道趙盾趍入靈公望見再拜知其欲諫以拒之盾出公使勇士往殺之勇士入俯而窺其戶方食魚餐勇士曰嘻子誠仁人也為晉國重卿而食魚飱見子之儉也君使我殺子吾不忍殺子也吾亦不可復見君遂刎頸而死論語里仁曰以約失之者鮮矣又泰伯曰子曰禹吾無間然矣菲飲食而致孝乎鬼神惡衣服而致美乎黻冕卑宮室而盡力乎溝洫漢書曰公孫弘起徒步數年至宰相封侯於是開東閣以延賢人食一肉脫粟之飯故人賓客仰衣食俸祿皆以給之又曰辛慶忌居處恭儉飲食被服尤以節約東觀漢記曰第五倫性節儉雖為二千石常衣布躬莝養馬妻炊爂飲食受俸祿常取赤米又曰王良為大司徒司直在位恭儉妻子不入官舍布被瓦器時司徒吏鮑恢以事到東海候其家而良薑布裙曳柴從田中歸恢告曰我司徒吏也故來授書欲見夫人妻曰妾是也恢乃下拜歎息而還又曰李恂為兗州刺史清約率下食不二味謝承後漢書曰東郡趙咨為東海人遺其雙枯魚者噉之二歲不盡以儉化俗又曰朱寵子字仲威為太尉家貧食脫粟飯臥布被朝廷賜錦被梁肉皆不敢受張璠漢記曰荀爽為三公食不過一肉脫粟飯坐皮褥范曄後漢書曰羊陟拜河南尹計日受俸食乾飯茹菜又曰宣秉字巨公馮翊雲陽人為御史中丞遷司隸校尉秉性節約常布服被蔬食瓦器帝嘗幸其府舍見而歎曰楚國二龔不如雲陽宣巨公即賜布帛帳帷又曰祭遵為人廉約小心克己奉公賞賜輒盡與士卒家無私財身衣韋袴布被夫人裳不加緣帝以是重焉魏略曰常林字伯槐歷宰守刺史所在檢身節用其家常飢乏糟粳縕弊魏志曰太祖平柳城頒所獲器物以素屏風素憑几賜毛玠曰君有古人之風故賜君古人之服玠居顯位常布衣蔬食吳志曰是儀字子羽北海營陵人為尚書僕射不服精細食不重膳孫權聞之幸儀舍求視蔬食親嘗之對之歎息晉書曰帝以山濤清儉無以供養特給日契加賜床帳茵蓐禮秩崇重時莫為比濤居榮貴貞慎儉約雖爵同千乘而無嬪媵王隱晉書曰李胤歷職內外而至貧儉兒病無以市藥上賜錢十萬晉中興書曰王廙為母立屋過制中宗流涕諫之帝所幸鄭夫人袍無文繡其恭儉率下如此又曰陸納字祖言徵拜左民尚書將應召綱紀白日宜裝幾舫約曰吾家不在此已勑私奴乘駕裝并食糧米無所須也臨發載被襆而已其餘皆封還官崔鴻十六國春秋趙録曰孟卓字君偉廣平人少修清苦之志有一單裙十年不浣又前燕録曰太尉楊驚字士秋右北平無終人也驚母李氏博學有母儀慕容晃常升堂拜敬性尤清儉好施無倦位為台保爵封郡公常乘弊車瘠牛卒無餘財後漢書曰孝文帝性儉素常服浣濯之衣鞍勒鐵木而已宋書曰文帝性存儉約不好奢侈車府令嘗以輦篷故請改易之輦席舊以烏皮緣欲代以紫皮上以篷未至於壞紫色貴並并弗聽也篷音貢又曰孝武大明中壞上所居陰室於其處起王燭殿與群臣觀之床頭有土鄣壁上挂葛燈籠麻繩拂侍中袁顗盛稱己為過矣又曰顏延之性既褊傲兼有酒過肆意直言曾無回隱故論者多不知之居身清儉不營財利布衣蔬食獨酌郊野當其為適傍若無人蕭子顯齊書曰高帝即位後身不御精細之物勑中書舍人桓景真曰主衣中似有玉瓜導此制始自大明末復太始增其光麗留此著主衣政是興長疾源可即時打破後宮器物欄檻以銅為飾者改用鐵內殿施黃紗帳宮人著紫皮履華蓋除金花瓜以用鐵回釘每曰使我治天下十年當使黃金與土同價又曰太官進食有裏蒸明帝曰我食此不盡可四片破之餘充晚食又曰太始已來相承奢侈太祖輔政上表禁民間華偽不得作成繡裙衣道路不得著錦履不得作局腳柳柏牙床箱籠錦緣不得以七寶飾樂器又諸雜漆物不得以金銀為花獸又曰王逡之字宣約琅邪臨沂人也少好學儉素衣服不浣几案塵墨齊春秋曰王儉字仲寶臨沂人不好聲色衣裘服用取給而已梁書曰到溉字茂灌美風儀善容止所蒞以清白修性又率儉不好聲色虛室單衣傍無姬侍後周書曰辛慶之位遇雖隆而率性儉素車馬衣服不尚華侈志量溫和有儒者風度特為當時所重唐書曰虞世南隋時世基當朝貴盛妻子被服擬於王者世南雖同居而躬履勤儉不失素業又曰李藩為相憲宗謂曰前代理天下或家給人足或國貧下困其故何也藩對曰古人云儉以足用蓋足用繫於儉約誠使人君不貴珠玉惟務耕桑則人無淫巧俗自敦本百姓既足君孰與不足帝曰儉約之事是我誠心唯當上下相勗以保此道又曰于休烈在朝凡三十餘年歷掌清要家無擔石之蓄恭儉深仁未嘗以喜慍形於顏色而親覽下士推轂後進雖位崇年高曾無倦色文子曰量腹而食度身而衣節乎己者貪心不生矣墨子曰晉文公好惡衣臣下皆衣牂羊之裘以韋帶劍呂氏春秋曰周明堂茅茨蒿柱土階三尺以見儉也風俗通曰大禹闕百品之羞而菲庖廚殷湯寐寢黃屋駕而乘露輿魏武別傳曰武皇帝子中山恭王袞尚儉約教勑妃妾紡績織紝習為家人之事桓階別傳曰階為趙郡太守時俸盡食醬酻上聞之數戲曰卿家作醬頗得成不詔曰光光大魏富有四海棟梁大臣而有蔬食非吾所以禮賢之意也其賜射鹿師二人并給媒弩三輔決録曰前隊大夫有范仲翁鹽豉蒜果共一筒言其粗儉也會稽典録曰陳修字奉先遷為豫章守性清潔恭儉十日一炊不燃官薪殷康明慎曰古人云驕奢人之殃恭儉福之場古今善言曰靈帝時欲用羊續為三司而中官求其賂續出黃紙補袍以示使者延篤與李文德書曰吾食赤鳥之麩麥飲化益之玄醴折張騫大苑之蒜歃晉國郇瑕氏之鹽魏武令曰吾衣被皆十歲也歲歲解浣補納之衛顗奏曰武皇帝之時後宮食不重肉衣不錦繡茵席不緣物無丹漆用能平定天下遺福子孫儉嗇毛詩曰汾沮洳剌儉也沮洳漸洳也又葛屨曰剌褊也魏地狹隘其民機巧趨利其君儉嗇褊急又曰蟋蟀剌晉僖公也儉不中禮故作是詩以閔之論語曰如有周公之才之美使驕且吝其餘不足觀也已又曰出納之吝謂之有司史記曰魯人俗儉嗇曹氏邴氏尤甚以鐵冶起富至巨萬然家自父兄子孫納俯有拾仰有取三輔決録曰平陵士孫奮富聞京師性儉吝嘗宿客舍雇錢直甚少主人曰君惜錢如此欲作士孫景卿耶魏略曰曹洪家富而性嗇文帝前在東宮嘗從洪貸絹百匹洪不稱意及犯法自分必死晉書曰王戎性好興利廣收八方園田水碓周遍天下積實藂錢不知紀極而又儉嗇不自奉養天下人謂之膏盲之疾女適裴頠貸錢數萬久而未還女後歸寧戎色不悅女遽還直然後乃歡從子將婚戎遺其一單衣婚訖而更責取家有好李常出貨之恐人得種恆鉆其核以此獲譏於世後魏書曰崔光韶家足於財而性儉吝衣弊馬瘦食味粗薄始光韶在都同里王蔓於夜遇盜害其二子孝莊詔黃門高道穆令加撿捕一方之人家別搜索至光韶宅綾絹錢布匱篋充積議者譏其矯嗇郭子曰王丞相性儉即帳下甘果盈溢不散涉春爛敗都督白之公令拾去勑云慎不可使大郎知大郎名悅字長豫晉書曰和嶠家産殷富擬於王者然性至吝以是獲譏杜預以為嶠有錢癖後魏書曰和躍清河人也為平昌太守家巨富而性吝嗇理錢數百斛其母季春思堇惜錢不買
