body:
  text: 羽族部六鵝禮記內則曰舒鴈翠鄭玄注曰翠尾舒鴈鵝也謂不利人爾雅曰鵱鷜鵝郭璞曰今之野鵝舒鴈鵝郭璞曰出如舒鴈今江東呼𪀉音加廣雅曰駕鵝野鵝也吳志曰景帝有疾使巫視鬼欲試之乃殺一鵝埋之於苑中架屋施床几以婦人服物著上乃使巫視之若能說此家中婦形狀者加賞此巫視日竟晝夕無所道帝催問之急乃曰實不見有鬼但見一頭白鵝在墓上所以不即白疑是神鬼變化而作定無復改易不知何故景帝乃厚賜之晉書曰永嘉中洛陽東北步廣里地陷有二鵝出焉一白一蒼白者不能飛蒼者飛去董養字仲道歎曰昔有周時盟會狄泉即此地也蒼胡白國象其可盡言乎又曰劉毅家在京口酷貧嘗與鄉曲士大夫往東堂共射時庾悅為司徒右長史要府州僚佐出東堂毅已先至遣與悅相聞曰身並貧躓營一遊甚難君如意人無處不可為適豈能以此堂見讓曰悅素豪徑前不答時衆人並避唯毅留射如故悅廚饌甚盛不以及毅毅既不去悅甚不歡毅又相聞曰身今年未得子鵝豈能以殘炙見惠悅又不答及毅貴奏解悅都督將軍官深相挫辱悅不得志疽發背少日而卒宋書曰胡蕃為高祖從事征廣固纍月未拔忽有鳥如鵝蒼黑色飛入高祖帳裏衆皆駭愕蕃起賀曰蒼黑色者戎虜戎虜歸我大吉之祥也明旦攻城陷之又曰孔靜居山陰宋武微時往候之靜時寢夢人語曰天子在門覺寤即遣人出看而帝適至靜虛己接待乃留帝宿夜設粥無鮭新伏鵝卵令煮以為食賊平以靜為奮威將軍又曰劉暄初為江夏王寶玄郢州行事執事過刻王妃索煮肫帳下咨暄暄曰旦已煮鵝不煩復此寶玄恚曰舅殊無渭陽之情齊書曰下彬禽獸決録目云鵝性頑而慠蓋比潘敞也又曰桂陽之役朝庭周章詔檄久之未就高帝引江淹入中書省先賜酒食淹素能飲啖食鵝炙垂盡進酒數升文誥亦辦南史曰何遠為永康令人甚稱之太守王彬巡屬縣諸縣皆盛供帳以待焉至武康遠獨設糗水而已彬去遠送至境進斗酒隻鵝而別彬戲曰卿禮有遇陸納將不為古人所笑乎三國典略曰庾信自建康遁歸江陵湘東王因賜妾徐氏妾與信弟掞私通掞欲求之無致言者信庭前有一蒼鵝乃繫書於鵝頸信視之乃掞啓遂題紙尾曰畜生乞汝唐書曰元和十二年李訴襲蔡州兵至懸瓠城夜半雪甚城旁有鵝鴨池訴令驚擊之以雜其聲列子曰黃帝與炎帝戰以鵰鴈鵝為旗幟魯連子曰君鵝鴨有餘食士不足半菽孟子曰仲子以兄之祿為不義避兄離母處於陵他日歸則有饋其兄生鵝者嚬曰惡用是鶂鶂者為其母殺是鵝與之食其兄自外至曰是鶂鶂肉也出而吐之趙岐曰鶂鶂鵝聲也戰國策曰管燕得罪於齊王謂左右曰子孰能與我赴諸侯乎左右莫對管燕連然流涕曰悲夫士何其易得而難用也田需對曰士三食不得厭而君鵝鶩有餘食下宮曳綺縠而士不得以為緣且財者君之所輕死者臣之所重君不肯以所輕與士而責之以所重事非士易得而難用也異苑曰傅承為江夏守有一雙鵝失之三年忽引導得三十餘頭來向承家秦記曰符殷食鵝炙知黑白之處人不信既而試之果然世說曰會稽有孤居老姥養一鵝鳴喚清長時王逸少為太守就求市之未得逸少乃攜故親命駕共往觀之姥聞二千石當來即烹以待之逸少既至殊喪往意歎息彌日俗記曰京下劉光祿養好鵝劉後軍從京還鎮尋陽以一雙鵝為後軍別純蒼色頸長四尺許頭似龍此一雙鵝可堪五萬自後不復見有此類張鴻傳曰鴻為慕容晃黃門初刑鴻不熟頤下生黃鬚三根長寸餘乃遣出宮看鵝鴨沈玄鵝賦序曰先大夫俞頴川者殊精意於善鵝求得駿鵝類於張猛虎亦多好者于時有緑眼黃喙折翼頳頭然經頴川之好者焦叔明以太康中得大蒼鵝從喙至足四尺有九寸體色豐麗鳴聲驚人三年而為暴犬所害惜其不終故為賦云崔豹古今注曰夫鵝似鵠而大頸長八尺善鬭好啖蛇列異傳曰廬山左右常有野鵝數千為群長老傳言嘗有一狸食明日見狸喚於沙州之上如見繫縛南越志曰化蒙縣祠山上有湖湖中有泉鵝如今野鵝弄吭山泉故號為泉鵝兩京記曰淨影寺沙門慧遠講經初在鄉養一鵝常隨遠聽經及遠入京留在寺晝夜鳴呼不止僧徒送入京至此寺大門放之自然知遠房便入馴狎每聞講鍾即入堂伏聽若聞泛說他事鳴翔而出如是六年忽哀叫庭宇不肯入堂二旬而遠卒寺內有遠碑亦述其事嶺南異物志曰南道之酋豪多選鵝之細毛夾以布帛絮而為被復縱撗納之其溫柔不下於挾纊也俗云鵝毛柔暖而性冷偏宜覆嬰兒而辟驚癇也雲南記曰韋齊休使雲南屯城驛西牆外有大地斗門垂柳夾蔭地中鵝鴨甚衆幽明録曰晉義熙中羌主姚略壞洛陽陰溝取磚得一隻雄鵝並金色交頸長鳴聲聞九皋臨海記曰郡東南有白石山高三百餘丈望之如雪山上有湖古老相傳云金鵝之所集八挂所植下有溪金光煥然又曰郡東有宴室山古老云越王時山上起望海館山下有湖湖中有金鵝飛魚唐書曰貞觀二十年吐蕃遣其大臣祿東贊奉表曰聖天子定四方日月所照之國並為臣妾而高麗恃遠闕於臣禮天子自領百萬渡遼致討隳城陷陳指日凱旋奴才聞陛下發駕少選之間已聞歸國鴈飛迅越不及陛下速疾奴忝預子壻喜百常夷夫鵝猶鴈也故作金鵝奉獻其鵝黃金鑄成高七尺中可實酒三斛淮南子曰魯般墨子以木為鵝而飛三日集而不可使為工也唐書曰高祖義兵至河東隋將堯君素城守時圍甚急君素乃為木鵝置表於頸具論事勢浮之黃河下河陽守者得之達於東都越王侗見而歎息鴨爾雅曰舒鳧鶩也郭璞曰鴨也廣雅曰鳧鶩鴨也魏氏春秋曰司馬文王鎮許昌徵還擊姜維至京師帝於平樂觀臨軍與左右小臣謀因文王辭劍之已書詔文王入帝方食粟優人雲午等唱曰青頭雞青頭雞者鴨也帝懼不敢發景王因是謀廢帝江表傳曰魏文帝遣使求鬭鴨群臣奏宜勿與權曰彼在諒暗之中所求若此豈可與言禮哉具以與使者吳志曰建昌侯孫慮於堂前作鬭鴨欄頗施小巧陸遜正色曰君侯宜勤覽經典用此何為慮即毀之南史曰齊人渡江至玄武湖西北莫府山南我軍自覆舟東移頓郊壇北與齊人對是時食盡調市人餽軍皆是麥屑為飯以荷葉裹而分給兵士皆困會文帝遣送米三千石鴨千頭帝即炊米煮鴨誓申一戰將士及防身計糧數臠人人裹飯媲以鴨肉帝命衆軍蓐食攻之齊軍大潰三國典略曰高德正相齊未誅之前家有赤鴨群行於庭犬來逐遂成碎血北史曰元善以高頴有宰相之具常言於上曰楊素粗踈蘇威怯懦元胄元昊正似鴨耳可以付社稷者唯獨高頴上初然之唐書曰齊王祐太宗第五子好養鴨未反前忽有野狸入籠中咬四十餘鴨皆斷其頭及敗同惡而誅者四十四人抱朴子曰有白虎七變法取三月三日殺虎血鴨血等合和之初生草似胡麻者生取其實合之可以移形易貌西京雜記曰高祖既作新豐并移舊杜放犬羊雞鴨於通途亦競識其家傅子曰鴨足何以眅雞足何以盺眅吾不知也何況問天地乎金樓子曰海鴨大如常鴨班白文亦謂之交鳥洞冥記曰武帝升望月臺南端有三青鴨飛俄而下帝悅之至夕鴨宿於臺端化為三小童皆著青綺文襦各執鯨文大錢五枚置帝几前風俗通曰雞伏鴨卵雛成入水雞母隨岸呼之雛出而隨母鴨雞異類能相隨也博物志曰中諸藥毒已死者取生鴨斷頭以鴨項內病者口中得血三兩滴入喉中即蘇也語林曰傅信貧母羸病恆驚悸信乃取雞鴨滅毛放承塵上行落地毋轉恐怖石崇金谷詩序曰吾有廬在河南金谷中去城十里有田十頃羊二百口雞豬鵝鴨之屬莫不畢備尋陽記曰周訪與商人共入宮亭廟宿明起如廁見一白頭翁訪逐之化為雄鴨還船欲煮之商人爭看遂飛去廣志曰野鴨雄者赤頭有距蔡氏化清經曰水戰之鴨何必白纓盈俎之雞何必長鳴新言曰譬猛虎浮水不如鳧鴨騏驎登木不如猿猴太元經曰素嬰之鴨翰音之雞望視之兔白蹄之豕短喙之狗修頸之馬君子之貌何獨異耶吳地記曰鴨城者吳王築城城以養鴨周數百里笁法真登羅山疏曰山上有神湖湖中有白鴨嶺南異物志曰廣州浛洭縣金池黃家有養鵝鴨池嘗於鴨糞中見麩金片遂多收掏之日得一兩緣此而致富其子孫皆為使府劇職三世後池即無金黃氏力殫矣鶩說文曰鶩野鳧春秋左傳曰公膳日雙雞饔人竊更之以鶩子尾怒春秋繁露曰張湯問仲舒曰祠宗廟或以鶩當鳧可不對曰鶩非鳧鳧非鶩愚以為不可漢書王莽多事諸鬼用三牲鳥獸三千餘種後不能備乃以雞當鴈鶩東觀漢記曰馬援與兄子嚴敦書云學龐伯高不就猶為謹勑士所謂刻鵠不成尚類鶩者說苑曰鶩無他心故庶人以為贄崔實政論曰今下僣其上尊卑無別如使雞鶩蛇頸龜身五色紛麗亦可貴於鳳乎唐子曰吾嘗會賓設樂天忽雲興繼以大雨有群鶩成列飛翔而過此偶爾何異玄鶴二八也廣志曰鶩生百卵一日再生有露華鶩以秋冬生卵並出蜀晨鳧肥而耐寒宜為矐越地傳曰越人為競渡有輕薄少年各尚其勇為鶩沒之戲有至水底然後魚躍而出鳧毛詩曰將翱將翔弋鳧與鴈又曰鳧鷖在涇公尸來燕來寧爾酒既清爾殽既馨公尸燕飲福祿來成鳧鷖在沙公尸來燕來宜爾酒既多爾殽既嘉公尸燕飲福祿來為韓詩外傳曰趙倉唐擊為魏文侯太子擊使於外問太子曰侯何好曰嗜晨鳧好北犬於是遣唐緤北犬奉晨鳧獻之侯曰擊愛我知我所嗜好莊子曰鳧脛雖短續之則憂風俗通曰王喬者河東人為葉令喬有神術每月朔望常自縣詣臺朝帝怪其來數而不見車騎密令太史伺望之言其臨至輒有雙鳧從東南飛來於是候鳧至舉羅張之但得一雙履乃詔尚方診視則四年中所賜尚書官屬履楚辭曰寧與騏驥抗軛將與雞鶩爭食乎寧卭卭若千里之駒泛泛若水中之鳧焦贛易林曰鳧舞鼓翼嘉樂堯德李陵贈蘇武詩曰二鳧俱北飛一鳧獨南翔我當留斯館子當歸故鄉蘇武與李陵書曰乘雲附景不足以譬速晨鳧失群不足以喻疾豈可因歸鴈以運糧託景風以餉軍哉晉書張華傳曰人有得鳧鳥毛長三丈以示華華見慘然曰此謂海鳧毛也出則天下亂後周書曰初賀勝至關中自以年位素重見太祖不拜尋而自悔太祖亦有望焉後從太祖宴于昆明池時有雙鳧遊於池上太祖乃授弓矢於勝曰不見公射久矣請以為歡勝射之一發俱中因拜太祖曰使勝得奉神武以討不庭皆如此也太祖大悅自是恩禮日重勝亦盡誠推奉周書曰太祖車駕幸城南園臨水亭見雙鳧爭藻戲於池面引弓射之一發而疊貫從官歡呼拜賀上命翰林繪工寫之縑素南越志曰化蒙縣祠山上有池池中有松鳧如今野鳧棲息松間故俗謂松鳧吳録地理記曰石首魚至秋化為寇鳧頭中有石冢墓記曰闔閭冢中有玉鳧廣州先賢傳曰頓琦至孝母喪感慕哀聲不絶致飛鳧白鵝栖廬側見人輒去見琦而留又曰丁密遭父艱致飛鳧一雙游廬旁小池見人則馴附如家所畜後遭母喪密歸至所居一宿故雙鳧復游戲池中崔豹古今注曰鳧鴈常在海邊沙上食沙石皆消爛唯食海蛤不消隨其糞出以為藥倍勝餘者蔡叔鬭鳧賦曰冠緑葩以耀首綴素毛以點纓
