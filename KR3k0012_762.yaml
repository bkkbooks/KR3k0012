body:
  text: 器物部六觥三禮圖曰觥受七升以兕角為之詩曰我姑酌彼兕觥維以不永傷兕觥角爵也又曰躋彼公堂稱彼兕觥萬壽無疆公堂學校也觥所以誓眾也又曰兕觥其觩音虯旨酒思柔彼交匪敖萬福來求兕觥罰爵也言上丁無失禮者其罰爵徒觩然陳設而已左傳曰晉趙孟叔孫豹曹大夫入于鄭鄭伯兼享之趙孟賦棠棣穆叔子皮及曹大夫興拜舉兕爵曰小國賴子知免於戾矣兕爵所以罰不敬言小國蒙趙孟德自知此罰戮觚三禮圖曰觚受三升兌音銳下方足漆赤中青雲飾小其尾周禮曰梓人為飲酒器觚三升獻以爵而酬以觚語曰子曰觚不觚觚哉觚哉孔子曰削觚而志有所念觥不時成或曰觚哉觚哉觚小器耳心不專一尚不時成況於大事也周地圖記曰秦使蒙恬北築長城又於原上築城以觚尊酒而祭有鶉飛止觚上因名鶉觚縣劉伶酒德頌曰止則操巵執觚巵說文曰巵圜器也觛小巵也圜音圓觛音但禮曰父母舅姑之敦音推牟巵𠤷非餕莫敢用史記曰高祖奉玉巵起為太上皇壽漢書曰沛公與項羽會鴻門樊噲居營外聞事急乃持揗直入帳下羽問為誰張良曰沛公驂乘羽曰壯士哉賜巵酒彘肩噲飲酒拔劍切肉食之羽曰復能飲乎曰死且不辭豈憚巵酒韓子曰棠谿空見韓昭侯曰今有白玉巵而無當有瓦巵而有當君渴將何以飲君曰以瓦巵棠谿空曰白王巵至貴君不以飲者以其無當耶君曰然空曰為人君漏泄群臣之語猶玉巵無當也空每見而出昭侯必獨臥惟恐夢言泄於妻妾戰國策曰昭陽為楚伐魏覆軍殺將得八城移師而攻齊陳軫為齊王使見昭陽再拜謝賀戰勝起而曰臣竊譬楚有詞者賜其舍人酒一巵舍人相謂曰數人飲不足一人飲有餘請畫地為虵虵先成者飲酒一人虵先成引酒且飲之乃左手持巵右手畫虵曰吾能為之足足未成一人虵成奪其巵曰虵固無足子安得為之足遂飲酒今子伐齊為虵畫足也淮南子曰霤水足以溢壺榼而江河不能實漏巵鹽鐵論曰川源不能實漏巵魏文帝荅楊脩書曰重惠流離巵昭厚意晉傅咸汙巵賦曰人有遺余琉璃巵者小兒竊弄墮之不潔意既惜之又感寶物之汙辱乃喪其所以為寶況君子行身而可以有玷乎𠤷說文曰𠤷似羹魁柄中有道可以注水纂文曰𠤷水器也儀禮曰嫡入室媵御奉𠤷沃盥左傳曰晉公子過秦秦伯納女五人懷羸與焉奉𠤷沃盥既而揮之𠤷沷盥器揮湔也怒曰秦晉匹也何以卑我國語曰勾踐命諸稽郢行成於吳曰勾踐願請盟一介適女執箕帚以胲姓於王宮一介適男奉𠤷盤以隨諸御胲備也音該醆斝說文曰斝玉爵也或說斝受十六升詩曰或獻或酢洗爵奠斝禮曰醆斝及尸君非禮也是謂僣君醆斝先王之爵也又曰季夏六月魯以禘禮祀周公爵用玉琖仍雕左傳曰齊侯伐燕燕人賂以瑤甕玉櫝斝耳斝耳玉爵也不克而還又曰鄭火裨竈言於子產曰若我用瓘斝玉瓚鄭必不火子產不許曰天道遠人道邇非所及也竈焉知天道錘孔叢子曰平原君強子高酒曰昔有遺諺堯舜千鍾孔子百觚子路嗑嗑音闔日飲百榼吾子何辤焉子高曰以予所聞賢聖以道德兼人未聞以飲食也沈約宋書曰蕭思話常從太祖登鍾山中道有盤石清泉上使於石上彈琴因賜以銀鍾酒曰相賞有松石間意涼州記曰胡安據等發張駿冢得馬瑙鍾論衡曰文王飲千鍾孔子百觚若酒用千鍾則肉宜百牛酒用百觚則肴宜用千羊則文王身如防風孔子體如長狄乃能堪之瓚三禮圖曰主瓚受四升徑八寸形如盤其柄以圭有流前注書曰平王錫晉文侯秬鬯圭瓚孔安國曰以圭為枘柄謂之圭瓚也詩曰氂爾珪瓚秬鬯一卣音酉又曰瑟彼玉瓚黃流在中玉瓚圭瓚也圭瓚文狀以圭為柄黃金為勺青金為外朱中央周禮曰祼音貫圭有瓚鄭司農云於圭頭為器可以挹鬯祼之祭謂之瓚也漢禮瓚盤大徑三升口徑八寸下有盤口經一尺也又曰祼圭尺有二寸有珪以祀宗廟也禮曰賜珪瓚然後祭又曰祀周公於太廟灌用玉瓚大圭瓚形如盤容五升以大圭為柄是謂圭瓚白虎通曰圭瓚者器之名所以受灌之器以圭瓚飭其柄樽彝說文曰樽酒器也罍龜目酒尊也木刻為雲象其施不窮爾雅曰彝卣罍器也皆酒尊彝其名也卣中尊也易曰樽酒簋二用缶納約自牖終無咎書曰用賚爾秬鬯一卣卣中尊也詩曰我姑酌彼金罍惟以不永懷周禮曰司尊彝掌六尊六彝之位春祠夏禴祼用雞彝鳥彝皆有舟其朝獻用兩獻音娑尊其再獻用兩象尊皆有罍秋嘗冬蒸祼用斝彝黃彝皆有舟其朝獻用兩箸直略切尊其饋獻用兩壺尊皆有罍彝亦尊也彝法也言為法之正也雞彝鳥彝謂刻而畫之為雞鳳之形也皆有舟鄭司農云舟尊下臺也若今時承盤也獻讀曰犧犧尊飾以翡翠象尊以象鳳皇或曰以象骨飾尊也斝讀為嫁彝畫禾稼也黃彝黃目尊也著尊者著地無足壺尊者以壺為尊禮曰五獻之尊門外缶門內壺君樽瓦甒音武此以小為貴也壺大一石瓦甒瓦大小未聞也易曰樽酒貳用缶也犧樽䟽布鼏音覔樿之善切勺此以素為貴也又曰夫禮之初始諸飲食其燔黍禆音伯豚汙音瓜切尊而抔薄侯切飲鄭玄云汙樽鑿地為撙也杯飲以手掬之也又曰黃目鬱氣之上尊也黃者中目者氣之清明者也言酌於中而清明於外也黃目黃彝也又曰魯李夏六月以禘禮祀周公於太廟尊用犧象山罍鬱尊用黃目犧尊以沙明為畫象骨飾之鬱鬱鬯之器黃目黃彝又曰泰有虞氏之尊也山罍夏后氏之尊也著殷之尊也犧象周之尊也泰用瓦著地無足傳曰犧象不出門喜樂不野合漢書曰梁孝王有罍尊上刻雲雷象也直千金戒後代善寶之王任后聞而欲得之王讓大母李太后曰先王有命無得以樽予音與人他物雖百鉅萬猶自恣任后絕欲得之王讓直使人開府取樽賜任后天子下吏驗問公卿治奏以為不孝讓誅也東觀漢記曰王霸擊賊作倡樂賊射營中霸前酒樽霸坐不動又曰章帝時美陽得銅酒樽采色青黃有古文後漢書曰章帝初元七年槐里歧山得銅樽一枚晉起居注曰穆帝升平二年尚書左丞劉兗元會曰彭城計佐虞興發白虎樽而群觀輻湊中蘭臺令史張玄不禁免玄令史沈約宋書曰正旦元會設白虎樽於殿庭樽蓋上施白虎有能獻直言者則發此樽飲酒蓋杜舉之遺式也蓋為白虎疑是後人所加欲令猛如虎無所忌憚也晏子春秋曰晉欲攻齊使范昭觀焉景公觴之范昭曰請君幸樽酌晏子命撤樽革具范昭歸曰齊不可伐也吾欲慚其君晏子知之孔子聞之曰不越於樽俎之間折衝千里也莊子曰市上之人有善戴尊者酒尊也累十尊而行人有與之更者行道未半而以其尊顛又曰百年之木破為犧樽青黃而文之其一斷在溝中比犧樽於溝之斷則美惡有間矣其於失性一也桀跖與魯史行義有間矣然其失性均也又曰純朴不殘孰為犧樽白玉不毀孰為珪璋道德不廢安取仁義淮南子曰百圍之木斬而為犧樽龍虵虎豹曲成文章高誘曰刻為蟠龍伏虎之狀也又曰夫聖人之道猶中衢而設樽耶過者斟酌多少不同各得其所宜又曰夫奉一爵酒不知於邑言其輕也挈石之樽則白汗交流言其重也又況羸天下之憂而任海內之事者乎重於樽亦遠矣風俗通曰坐不移樽俗說几宴飲者移轉樽酒令人訟諍志林曰先代不識犧樽但云沙畫之飾以翠羽至魏明帝時魯郡於地中得齊大夫子尾送女器有犧樽作犧牛形自爾乃知其定形吳越春秋曰闔閭女自殺以銀樽送之鄴中記曰石虎正會殿前有白龍樽作金龍於東箱西向龍口金樽受五十斛涼州記曰胡安據等發張駿陵得白玉樽受三升戴延之西征記曰太極殿中有銅龍長三丈銅樽容三十斛正旦大會龍從土中受酒口吐之於樽中傅玄朝會賦曰跱鳳虎之二樽清酤皆以淵停蔡邕論銘曰漢獲齊侯寶樽于槐里也孫綽陽燧樽銘曰詳觀茲器妙巧奇絕酌焉則注受滿則閉補結切吐寫適會未見其竭滑稽崔浩漢記音義曰滑稽酒器也轉注吐酒終日不已若今之陽燧樽史記曰吳王夫差取子胥尸盛以鴟夷革而浮之江中應劭曰取馬革為鴟夷鴟夷榼形漢書揚雄酒賦曰鴟夷滑稽腹大如壺晝日盛酒人復借酤常為國器託於屬車榼說文曰榼酒器也椑音鼙圜榼也左傳曰晉欒鍼使行人執榼承飲造于子童謝承後漢書曰陳茂為豫州別駕與刺史周敞行部到頴川陽翟傳車有美酒一椑敞勑載酒以行茂取椑擊柱破之曰使君傅車榼載酒非宜王隱晉書曰宣帝既滅公孫淵還作榼兩口二種酒持著馬上先飲佳酒塞口而開毒酒與牛金金飲而死北齊書曰元韶字世胄魏室奇寶多入韶家有馬瑙榼容三升玉縫之皆稱西域鬼作也涼州記曰胡安據等發張駿陵得流離榼孔叢子曰子路嗑嗑飲百榼已具鍾門列異傳曰濟北弦起神女來遊車上有壺榼青白流璃五具續齊諧記曰王敬伯夜見一女命婢取酒提一淥沉漆榼曹毗杜蘭香傳曰蘭香降張實輒齎元榼馬融奏事曰楚將吳起或遺之一榼酒注之上流使士卒迎流飲其下明不獨也劉伶酒德頌曰止則操巵執觚動則挈榼提壺壺三禮圖曰洗壺受一斛口徑一尺頭高五寸大中身兌音銳下赤漆中元上加青雲氣方壺受一斛腹圜足口方圜壺受一斛腹方足口圜詩曰顯甫餞之清酒百壺周禮曰挈壺氏以令軍井壺所以盛飲故以壺表井中凡軍事懸壺以序聚柝懸壺以為漏也柝竟託禮曰其以乘壺酒賜人亦曰乘壺酒乘壺四壺尊壺者面其鼻鼻在面上言向人也左傳曰晉侯問原守於寺人㪍鞮對曰昔趙襄以壺飧從徑餒而弗食故處原漢書曰東方朔曰壺者所以盛也晏子春秋曰景公遊於紀得金壺發視之中有丹書韓子曰晉公子重耳過曹僖負羈盛黃金於壺充之以食令人遺公子也說苑曰五大夫願衛人也負壺入井終日灌一區國語曰勾踐召范蠡而問焉曰諺有之曰觥飲不及壺飡言志在觥飲慮不至壺食喻己德小不能遠啚今歲晚矣子將奈何曰臣聞追亡人也蹶而趣之唯恐不及王曰諾遂伐吳神仙傳曰壺公賣藥常懸一壺於坐上日入之後公輒跳入壺中搜神記曰吳王夫差女王悅童子韓重結氣死形見將重入冢取崑崙玉壺與之琴操曰伍員奔吳過漂陽瀨溪見一女擊漂於水中旁有壺漿乃就乞飲飲畢謂女子曰掩夫人壺口女子知其意自投瀨溪而死洗三禮圖曰洗高三尺口徑尺五寸足徑三尺士鐵大夫以上銅為之諸侯白金飭天子黃金飭儀禮曰設洗于阼階東南禮曰其水在洗東祖天地之左海也魏武令曰臨祭就洗以手擬水而不盥以絜為敬未聞擬向不敬之禮吾親受水而盥
