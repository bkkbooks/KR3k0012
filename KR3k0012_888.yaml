body:
  text: 妖異部三重生左傳宣上曰晉人獲秦諜殺諸絳市六日而蘇續漢書曰獻帝初平中長沙人姓桓死月餘其母聞棺中有聲發之遂生至陰為陽下人為上其後曹公由匹庶起又曰武安四年武陵女子李娥年六十餘病物故瘞於城外數里已四十日行人聞其冢中有人聲便語其家家往視聞娥聲出之遂活吳志曰孫休永安四年吳民陳焦死埋之六日更生穿土中出前趙録曰麟嘉元年大將軍東平王豹卒一指猶暖遂不殯殮至甲戍乃蘇言見淵於不周山經五日遂復從至崑崙山三日而復返唐書曰貞元中翰林待詔戴少平死十六日復生建康實録曰晉方士戴洋字國流吳興長城人也年十二遇病死五日而蘇言執麾將士將往蓬萊崑崙積石太室恆廬衡等諸山既而遣歸葛洪神仙傳曰士燮嘗病死已三日仙人董奉以一丸藥與服以水灌之捧其頭搖消之食頃即開目動手顏色如故漸復半日能起坐四日後能語遂復常搜神記曰晉武帝世河間郡有男女相悅許相配適既而男從軍積年父母以女適人無幾而憂死男還悲痛乃至冢所欲哭之敘哀而已不勝其情遂發冢開棺即時蘇活因負還家將養數日平復其夫往求之其人還曰卿婦已死天下豈聞死人復活耶此天賜我非卿婦也於是相訟郡縣不能決以讞廷尉奏以精誠之至感於天地故死而更生常理之外非禮之所處刑之所裁斷以還開冢者又曰漢平帝元始元年二月朔方廣收女子趙春病死既棺斂六日出棺外自言見死人及父曰年二十七不當死太守談以聞説曰至陰為陽下人為上其後王莽篡位又曰晉咸寧中琅邪顏畿得病就醫張嗟自治死於嗟家家人迎喪旐每繞樹木不可解送喪者或為之傷乃言曰我壽命未應死但服藥太多傷我五臟耳今當復活慎無葬我也父拊而祝之曰若爾有命復當更生豈非骨肉所願今但欲還家不葬爾也旐乃解還家乃開棺形骸如故微有人色而手爪所刮摩棺材皆傷於是漸漸氣息以綿飲瀝口能咽遂乃出之日久飲食稍多能開目視瞻屈伸手足然不與人相當不能言語飲食猶常人如此者十餘年家疲相供護不復得操事其弟弘都絶棄人事躬侍養以知名後氣力稍更衰劣卒後還死又曰建安中南陽賈偶字文合得病卒亡死時有吏將詣太山同名男女十人司命閲呈謂行吏曰當召某郡文合來何以召此人促遣令去時日暮治下有禁不得舍遂至郭門外大樹下宿有好女獨行無伴文合問之曰子似衣冠家何為步行姓字為誰女曰我三河人也父見為易陽令昨錯召來今得遣去遂逼日暮懼獲瓜田李下之譏望君之容似類賢者是以停留依憑左右文合曰悅子之心願交歡於今夕女曰聞之諸姑婦人以貞專為德潔白為稱文合與相反覆終無動志天明別去文合死已再宿停當斂視其面有色摸心溫半日間蘇文合將驗其事遂至易陽問其令則女父也從之因問令其月某日君女寧卒亡而生耶具説女姿顏服色言語相反覆本末令入問女與文合同大驚乃以女配文合又曰臨海松陽人柳榮從張悌拒晉軍病死船中二日時軍已上岸無埋之者忽然大呼言人縛軍帥聲激揚遂活人問之言上天北斗門下卒見人縛張軍帥門下人怒榮叱逐使去榮懼怖口餘聲發揚其日悌戰死續搜神記曰武都太守李仲文在郡喪女年十八權假葬郡城北後有張世之代為郡世之男子長年二十侍從在郡中夢一女年可十七八顏色不常自言前府君女不幸早亡會今當更生心相愛樂故來相就如此五六夕忽然晝見解衣服薰香殊絶遂為夫妻寢息衣皆有污如處女焉後仲文婦遣婢視女墓因過世之婦相聞入室中見此女一隻履在子長床下取之啼泣呼言發冢持履歸以示仲文仲文驚愕遣問世之君兒何由得亡女履耶世之呼兒具陳本末李張並謂可怪發棺視之女體生肉顏姿如故右腳有履左腳無也自後遂死肉爛不復得生後夕女來曰夫婦情至謂偕老而無狀忘履以致覺露不復得生萬恨之心當復何言泣涕而別又曰東平馮孝將為廣陵太守兒名馬子年二十餘獨臥殿中夜夢見女子年十八九言我是前太守徐玄方女北海人不幸早亡來至今四年為鬼所枉殺案録當年八十餘聽我更生要當有所依憑乃得生活又應為君妻能從所陳免活不馬子答曰可遂與馬子剋期當出至期日床前地髣佛如人正與地平令人掃去愈分明始悟是所夢見者遂屏除左右人便漸覺額出次復面出一炊頃形體盡出馬子便令前坐對榻上陳説語言奇妙非常遂與馬子宿息每戒云我尚虛君當自節問何可得出答曰出當得本生日生日尚未至遂往殿中言語聲音人皆聞女計生日至女具教馬子出己養之法語畢拜去馬子從其言至日以丹雄雞一隻黍飯一盤清酒一升酹其喪前去殿十餘步祭訖掘出開視女身完全如故徐徐抱出著氈帳中唯心下微暖口有氣令婢四人守養之常以青羊乳汁瀝其兩眼開口能咽粥漸漸能語二百日中杖起一期之後顏色肌膚氣力悉復乃遣報徐氏上下盡來選吉日下禮娉為三日遂為夫婦生二男一女長子字元度永嘉初為祕書郎小男敬度太傅掾女適濟南劉子彥徵士延世之孫也又曰襄陽李除病死中時其婦守尸至夜三更中崛然起坐脫婦臂上金釧甚遽急婦因助脫得手執之還臥伺察之至曉心下更暖遂漸漸得蘇既活云吏將某去比伴甚多見有行貨得免歸者即許吏金訓吏令還取故歸取以與吏吏得釧便放令還幽明録曰琅邪人姓王名志居錢塘妻朱氏以太元九年病亡有二孤兒王復以其年四月暴死下三日而心猶暖經七日方蘇説初死時有二十餘人皆烏衣見録録去到朱門白壁狀如宮殿吏朱衣素帶玄冠介幘或所被著悉珠玉相連結非世中儀服復前見一人長大所著衣狀如雲氣王向叩頭自説婦已亡餘孤兒尚小無奈何便流涕此人為之動容云汝命自應來以汝孤兒特與三年之期王又曰三年不足活兒左右有一人語云俗尸何癡此間三年是世中三十年因便送出又三十年王果卒又曰桓玄時牛大疫有一人食死牛肉因得病亡死時見人執録將至天上有一貴人問云此人何罪對曰此人坐食疫牛肉貴人云須牛以轉輸肉以充百姓食何故復殺之催令還既更生具説其事於是食牛肉者旡復有患又曰于慶無病卒吳猛語慶子曰于侯算未窮方為請命未可殯殮尸臥淨舍唯心下尚暖七日時盛暑慶形體向壞猛教令屬纊候氣續為作水令以與洗并飲漱如此便退日中許慶蘇但開眼張口不得發聲時合門欣喜以向水洗唅吐腐血數升能言語三日平復如常説初見十數人來執縛桎梏到獄同輩十餘人以次語對未至俄而見吳君北面陳釋聽斷之王勑脫械歸所經官府莫不迎接請謁吳君皆與抗禮不知悉何神耳博物志曰漢末大亂有發前漢時宮人冢者宮人猶活既出平復如舊魏郭后愛念之録著宮中常置左右問漢時宮中事説之了了皆有次緒及郭后崩哭泣過遂死又曰魏大司馬曹休所統中郎將謝漳部曲義兵奚儂息女年四歲病死故埋藏五日復生太和三年七月詔令休使父母持送女來視之其年四月三日病死四日埋藏至八日同墟人採桑聞兒啼聲即語儂妻往發視兒生活今能飲食如常陸氏異林曰鍾繇嘗數月不朝會意性異常或問其故云常有好婦來美麗非凡問者曰必是鬼物可殺之婦人後往不即前止戶外繇問何以曰公有相殺意繇曰無此勤勤呼之乃曰繇意恨恨有不忍心然斫之傷髀婦人即出以新綿拭血竟路明使人尋迹之至一大冢木中有好婦人形體如生人衣青絹衫丹繡裲襠傷一髀以裲襠中綿拭血變化禮記月令曰仲春鷹化為鳩季春田鼠化為鴽季夏腐草為螢季秋雀入大水為蛤孟冬野雞入大水為蜃左傳昭二曰昔堯殛鯀于羽山其神化為黃熊以入于羽淵春秋潛潭巴曰女子化為丈夫賢人去位君獨居丈夫化為女子陰氣淖小人聚漢書曰哀帝建平中豫章男子化為婦子嫁為人婦生一子長安陳鳳言此陽變為陰將亡繼嗣自相生之象一日嫁為人婦生一子者將復一世乃絶續漢書曰靈帝時江夏黃氏之母浴而化為黿入于深淵其後時時出見初簪一銀叉及見猶在其首又曰建安二十年越嶲有男子化為女子時周群言哀帝時亦有此將有易代之事至二十五年獻帝封于山陽國語曰趙簡子歎曰雀入海化為蛤雉入于淮化為蜃黿鼉魚鱉莫不能化唯人不能悲夫鴻範五行傳曰魏襄王十三年張儀詐得罪於秦而去相魏將為秦而欺奪魏君是歲魏有女子化為丈夫者天若語魏曰勿用張儀陰變為陽臣將為君是時魏王亦覺之不用張儀儀免去歸秦魏無害紀年曰周宣王時馬化為狐山海經曰姑媱之山音遙帝女死焉其名曰女尸化為瑤草其葉成言葉相重亦音遙其華黃其實如莬丘莬免絲服者媚於人為人所媚愛一名荒夫草又曰炎帝之女娃惡住切遊于東海溺而死化為精衛其狀如鳥常銜西山之木石以堙東海又曰夸父與日競走渴飲河河涸不足北飲大澤未至道死棄其杖化為鄧林又曰鍾山其子鼓北神名鍾山之子耳其狀人面龍身是與欽䲹音邳殺葆江于崑崙之陽帝乃戮之鍾山之東日𡺯岸音遙欽䲹化為鶚鶚雕屬也鼓亦化為駿音俊鳥又曰刑夭與帝爭神帝斷其首葬之常羊之山乃以乳為目以齊為口操干戚以舞是為無首民又曰太室嵩高成陽西啓母化為石在焉莊子曰北溟有魚其名為鯤鯤之大不知其幾千里也化而為鳥其名曰鵬又曰列子行食於道仄見百歲髑髏攓蓬而指曰唯余與女知而未嘗死而未嘗生也種有幾得水則為繼得水土之際則為蠅蠙之衣生於陵屯則為陵舄陵則為鬱棲鬱棲則為烏足烏足之根為蠐螬其葉為蝴蝶蝴蝶胥也化而為蟲生於竈下其狀若脫其名為駒掇駒掇千日而化為鳥其名為乾餘胥乾餘胥之沫為斯彌斯彌為食醯頤輅生乎食醯黃軦食醯黃軦生乎九猷九猷生乎瞀芮瞀芮生乎腐蠸腐蠸生乎羊奚羊奚比乎不笋久竹不笋久竹生於青寧青寧生程程生馬馬生人人又返入於機萬物皆出於機皆入於機此言一氣而萬形有變化而無死生也又曰萇弘死于蜀藏其血三年而化為碧石又曰馬血之為磷也人血之為野火也鷂之為鸇鸇之為布穀布穀之復為鷂也燕之為蛤也田鼠之為鶉也老韭之為芫也老羭之為猿也羭狀羊魚卵之為蟲也此皆物之變者
