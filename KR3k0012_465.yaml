body:
  text: 人事部一百五辨下晉書曰王衍妙善玄理唯談莊老為事每捉玉柄塵尾與手同色義理有所不安隨即改更世號口中雌黃朝野翕然謂之一世龍門矣又曰謝安常賞袁宏機對辨速安為楊州刺史宏自吏部郎出為東陽郡及祖道於治亭時賢皆集安欲以卒迫試之臨別執宏手顧左右取一扇而授之曰聊以贈行宏應聲答曰輒當奉楊仁風慰彼黎庶又曰華談或問曰諺云人之相去如九牛毛寧有此理乎談對曰昔許由讓天子之貴市道小人爭半錢之利此相去何啻九牛毛也聞者稱善又曰呂珩問袁甫曰卿名能辨豈知壽陽已東何以恆水甫曰壽陽已東皆是吳人夫亡國之音哀以思鼎足疆邦一朝失職憤歎甚積積憂成雨雨久成水故其城恆潦也又曰祖納謂梅陶及鍾雅曰君汝潁之士利如錐我幽冀之士鈍如椎持鈍椎棰君利錐皆當摧矣陶雅並稱有神錐不可得摧納曰假有神錐必有神椎陶雅無以對又曰武帝始登祚探策得一王者世數繼此多少帝既不怡群臣失色莫能有言者侍中裴揩正容儀進曰臣聞天得一以清地得一以寧侯王得一以為天下貞帝意悅群臣歎服又曰李密字令伯犍為武陽人蜀朝舊臣數使於吳應機當義吳人稱其才辨蜀平以太子洗馬召張華問曰安樂公何如密曰可次齊桓華問其事密曰齊得管仲而霸得豎刀而流亡安樂公得諸葛亮而抗魏後任黃皓而喪國成敗一也又曰釋道安俊辨有高才自北至荊州與習鑿齒初相見道安曰彌天釋道安鑿齒曰四海習鑿齒宋紀曰孝武常賜謝莊寶劍莊以與預州刺史魯爽後反叛孝武因宴集問劍所在答曰昔以與魯爽別竊為陛下杜郵之賜上甚悅當時以為知言蕭子顯齊書曰張融字思光吳郡人也玄義無師法而神王過人白黑談論鮮能抗拒又曰周顒字彥倫汝南人音辭雅麗出言不窮商較朱紫發口成句每賓友會同顒虛席晤語聲如流聽者忘倦蕭方等三十國春秋曰劉裕為太尉中書監裕既拜朝賢畢至僕射謝混後來衣冠傾縱頗有傲慢之容裕甚不平乃謂之曰何謂旁若無人混對曰明公將隆伊周之化方使四海解襟謝混何人而敢獨異乎乃以手板披撥其襟領悉皆解散裕大悅魏收魏書曰李諧字虔和博學才辨天平中以諧兼散騎常侍為聘梁王衍遣主客郎范胥當接胥曰黃旗紫蓋本出東南君臨萬拜故宜在此諧答帝王符命豈得與中國比隆紫蓋黃旗終於入洛無乃自害邪陳書曰簡文在東宮召戚袞講論又嘗置宴集玄儒之士先命道學玄相質難次令中庶子徐摛馳騁大義間以劇談摛辭辨縱橫難以答抗諸人懾氣皆失次序袞時騁義摛與往復袞精釆自若對答如流簡文深加歎賞隋書曰吳興沈重名為碩學高祖嘗令辛彥之與重論議重不能抗於是避席而謝之曰辛所謂金城湯池無可攻之勢高祖大悅又曰蘇夔字伯尼少聰敏有口辨煬帝嘗從容謂宇文述虞世基等曰四夷率服觀禮華夏鴻臚之職須歸令皇寧有多才多藝美容儀可以接對賓客者為之乎咸以夔對是日拜鴻臚少卿又曰柳誓為東宮學士每召入臥內與之宴謔誓尤俊辨多在侍從有所顧問應答如響唐書曰薛收歸國秦府記室房玄齡薦之於太宗即日召見問以經略收辨對縱橫皆合旨要授秦王府主簿又曰文宗嘗於誕節召白居易與僧惟澄道士趙常盈對御講論於麟德殿居易論難鋒起辭辨泉注上疑宿構深嗟挹之列子云子夏問於孔子孔子對曰賜辨賢於丘賜也能辨不能訥吾兼有之所以事吾也矣莊子曰孔子舍於沙丘見主人曰辨士也子路曰夫子何以識之曰其口窮踦其鼻空大其服博戲其睫流撝其舉足也高其踐地也深鹿與而牛舍又曰公孫龍辨者之徒飾人之心易人之意能勝人之口不能服人之心辨者之囿也又曰古者王天下者智雖絡天地不自慮也辨雖雕萬物不自說也魯連子曰齊之辨者田巴辨於狙丘議於稷下毀五帝罪三王訾五伯離堅白合同異一日而服千人有徐劫者其弟子曰魯連謂劫曰臣願得當田子使之不敢復談可乎徐劫言之田巴曰劫弟子年十二耳然千里之駒也願得侍議於前田巴曰可魯連曰臣聞堂上之糞不除郊草不藝白刃交前不救流矢何則急者不救則緩者非務楚軍南陽趙氏伐高唐燕人十萬之衆在聊城而不去國亡在旦暮耳先王將奈何田巴曰無奈何魯連曰夫危不能為安亡不能為存則無為貴學士矣今臣將罷南陽之師還高唐之兵卻聊城之衆為所貴談談者其若此也先生之言有似梟鳴出聲而人惡之願先生之勿復談也田巴曰謹聞教明日見徐劫曰先生之駒乃非兔騕裊也豈特千里哉於是杜口易業終身不復談淮南子曰智絡天地明照日月辨解連環澤潤玉石抱朴子曰飛清機之英麗言約暢而判滯辨人也太公六韜曰辨言巧辭善毀譽者曰飛言之士皇甫謐高士傳曰趙惠文王好劍士夾門而客三千人太子悝患之募有能止王者與千金左右曰莊子必能太子使人奉周周見王曰臣有三劍唯所用焉天子之劍賓諸侯正天下諸侯之劍如雷霆之威震四封之內無不賓服庶人之劍上絶頸領下脫肺肝而此無異於鬭雞而爭一旦之命也今大王有天子之位而好庶人之業臣竊為大王薄之王不出宮三月劍客皆伏韓詩外傳曰鳥之美羽勾啄者鳥共畏之人之利口巧辨者人共畏之是以君子避三端文士筆端辨士舌端武士鋒端又曰子貢曰兩國構難壯士列陳塵埃張天錫不持尺兵斗糧解兩國之難用賜者存不用賜者亡孔子曰辨士哉語林曰諸葛靚字仲思在吳於朝堂大會孫皓問曰卿字仲思為欲何思之曰在家思孝事君思忠朋友思信如斯而已王子年拾遺録曰張儀蘇秦二人遞翦髮以相活或傭力寫書行遇聖人之文無以題記則以墨書於掌中及股裏夜還折竹寫之二人假食於路剝樹皮為囊以盛天下良書每息大樹之下假息而寐有一先生問曰二子何勤苦若是而儀秦共與言論曰子是何人答曰吾死生歸於山谷世論謂余歸谷子也秦儀後遊學復逢歸谷子乃請其學術則教以干世俗之辨乃探胸中韋袟三卷書言輔時之事故儀秦學之以終身也古史考云儀秦受術鬼谷先生歸之聲與鬼相亂故也桓談新論曰公孫龍六國時辨士也為堅白之論假物取譬謂白馬為非馬非馬者言白所以名色馬所以名形也色非形形非色世說曰郭象議如懸河瀉水注而不竭劉向別録曰鄒奭者頗采鄒衍之術迂大而閎辨文具難勝齊人美之頌曰談天鄒說苑曰林既衣韋而朝齊景公景公曰君子之服也小人之服也林既作色曰夫服何足以揣士行乎昔荊為長劍危冠令尹子西出焉齊短衣而管仲隰朋出焉越文身剪髮而范蠡大夫種出焉如君言衣狗裘者當犬號衣羊裘者當羊鳴今君衣狐裘而朝得無為變乎文士傳曰劉禎字公幹年八歲能誦論及賦數萬言性辨捷文帝嘗請同好為主人使甄夫人出拜坐者皆伏而禎獨平視如故武帝使人觀之見禎大怒命收之主者案禎大不恭應死減一等輸作部使磨石武帝嘗輦至尚方觀作者見禎故環坐正色磨石不仰武帝問曰石何如禎因得喻己自理跪對曰石出自荊山玄巖之下外有五色之章內含卞氏之珍磨之不加瑩雕之不增文稟氣堅貞受茲自然顧理枉屈紆繞獨不得申武帝顧左右大笑即日還宮赦禎復署吏又曰華談字令思年十四舉秀才入洛會宣武場座有辨者嘲南人諸君楚人亡國之餘有何秀異忽應斯舉衆無答談在下行遙曰當今六合齊軌異人並出吾聞大禹出於東夷文王生於西羌賢聖之所在豈常之有昔武王伐紂遷商頑民於洛邑得無吾子是其苗裔時咸改視辨者無以應也王瑱之童子傳曰孔林魯國人年十歲詣臺魯相劉公客有獻鴈者歎曰天之於人生五穀以為之食有魚鳥以為之肴衆賓咸曰誠如公旨林曰不然夫萬物所生各稟天氣事不必為人人徒以智得之故蚊蚋食人蚓蟲噉土非天為蚊蚋生人為蚓生土公曰童子辨焉郭子曰梁國楊氏子年九歲甚聰慧孔君平詣其父父不在乃呼兒出為設果有楊梅孔指示兒此君家果兒應聲答曰未聞孔崔是夫子家禽王弼別傳曰弼年十餘歲好老莊通辨能言者列女傳曰袁次陽妻者扶風馬季長之女也下車禮畢次陽問曰為婦之道貞順而已何輜軿僮婢數十黼黻玄黃珠璣之飾耶夫人答曰女有三從之義在家係於父母情愛無已欲其豐麗故不敢逆命今君欲擬鮑子子都之風不受婦家之送此乃清高異行也妾亦欲察君志悉還所有以成君之高不亦可乎次陽又問曰弟先足舉猶以為鄙高士不為也賢姊未嫁而新婦先行有何汲汲乎答曰家姊有宋伯姬之風梁高之行節操慨於青雲貞介皎於白日家君庶堯之配舜孔子妻公冶之義世乏此賢故且躊躇妾固陋不才遭人則可次陽默然悵恨外聽者曰使君努力何為新婦所困之有傅玄七禮曰辨論鋒起探虎摩龍徐幹七喻曰戰國之際秦儀之徒智略兼人辨利軼軌倜儻挾義觀釁相時圖爵位則佩六紱謀貨財則輸海內一怒而諸侯懼安居而天下憩人主見弄於股掌之上而莫之知惡也班固答賓戲曰子雖馳辨如濤波摛藻如春華猶無益於殿最劉邵趙都賦曰辨論之士則智凌狙兵材過東裏分摘滯義割劈纖理論折堅白辨藏三耳張衡西京賦曰其都遊說辨論之士街談巷議彈射臧否剖析豪釐擘肌分理張華縱橫篇曰蘇秦始為交同學鬼谷先生辨說剖毫釐變詐入無形巧言惑正理人主莫不傾聽王廙子貢畫讚曰端木英辨才清吐口敷華發音楊馨訥說文曰訥言難也易曰吉人之辭寡禮記曰趙文子其言內內若不出諸其口論語曰君子欲訥其言而敏於行又曰剛毅木訥近仁矣史記曰周勃為人木強少文然可屬大事又曰司馬相如口吃而善著書漢書曰曹參為相遵蕭何之約採擇郡國長史訥於文辭謹厚長者即召除為丞相史又曰李廣訥口少與人言居則畫地以為陳東觀漢記曰吳漢為人質厚少文造次不能以辭語自達鄧禹及諸將多所薦舉又曰揚雄好著書而口吃不能劇談范曄後漢書曰吳漢自建武時常居上公之位終始親愛諒猶質簡而強力也子曰剛毅木訥近仁斯豈漢之方乎又曰劉昆字恆公陳留人建武五年舉孝廉除江陵令時縣連火災昆輒向火叩頭多能降雨止風遷弘農太守虎皆負子渡河徵為光祿勳詔問前在江陵何德而政致是耶對曰偶然耳左右皆笑其質訥帝曰此長者之言顧命書諸策又曰高彪字義方吳郡無鍚人也家本單寒至彪為諸生遊太學有雅才而訥於言續漢書曰何休任城樊人朴訥而精研六經世儒無及者魏略曰嚴翰善春秋公羊司隸鍾繇不好公羊而好左氏謂左氏為太官而謂公羊為賣餅家故常數與翰辨短長繇為人機捷善持論而翰訥臨時屈無以應晉書曰郭林宗謂劉儒口訥心辨有圭璋之質張詮南燕書曰慕容納沉靜深邃外訥內敏北史牛恆訥於言而敏於行上嘗令其宣勑至陛下不能言退還拜謝云並忘之上曰傳語小辨故非宰臣任也愈稱其質直隋書范陽祖君彥齊尚書僕射孝徵之子也容貌短小言訥澀有才學大業末官至東平郡書佐老子曰大辨若訥管子曰吾畏事不敢事畏言不為言行年六十如老吃耳張騭文士傳曰左思字太沖貌惡不揚口訥不能給談默而心解又曰成公綏口訥不能談論默而內朗人有劇問以筆墨答之裴啓語林曰鄧艾口吃常云艾艾宣王曰為云艾艾終是幾艾答曰譬如鳳兮鳳兮故作一鳳耳玄晏春秋曰豫朴訥不好戲弄口又不能戲談崔琰述初賦序云琰性頑口訥年十八不能會問好擊劍尚武事紀騭表孫皓曰臣稟氣淺薄體不及衆形容短陋訥口弱顏
