body:
  text: 人事部五十七友悌周禮大司徒曰六行孝友睦姻任恤禮記曲禮曰親戚稱其慈也寮友稱其悌也又禮建曰兄良弟悌夫義婦聽家之肥也又檀弓上曰子路有姊之喪可以除之矣而弗除也孔子曰何弗降也曰吾寡兄弟而弗忍也孔子曰行道之人皆弗忍也子路聞之遂除之春秋左傳曰君義臣行父慈子孝兄友弟敬所謂六順毛詩葛屨陟岵曰陟彼岡兮瞻望兄兮兄曰嗟子弟行役夙夜必偕偕俱也又鹿鳴棠棣曰棠棣燕兄弟也閔管蔡之失道故作棠棣焉周公吊二叔之不咸而使兄弟恩疏召公為作此詩而歌以親之也棠棣之華萼不韡韡箋云承華曰萼不當作拊拊萼足得華之光明其貌韡韡然盛也興者喻弟以敬事兄兄以榮覆弟恩義之敬亦韡韡然也凡今之人莫如兄弟又邶柏舟二子乘舟曰二子乘舟思伋壽也衛宣公之二子爭相為死國人傷而思之而作是詩也二子乘舟泛泛其景二子伋壽也宣公為伋娶於齊女而美公奪之而生壽及朔朔與其母訴伋於公公全伋之齊使賊先待於隘而殺之壽竊其節而先往賊殺之伋至曰君命殺我彼何罪焉又殺之國人傷其涉危遂往如乘舟而無所薄也又曰惟此王季因心則友則友其兄則篤其慶尚書君陳曰惟孝友于兄弟克施有政論語曰孝悌也者其為仁之本與又曰孝乎惟孝友于兄弟又曰兄弟怡怡如也爾雅曰善兄弟為友漢書曰卜式河南人也以田畜為事有少弟式脫身出獨取羊百餘口田宅財物盡與弟式入山牧十餘年羊致千餘頭買田宅而弟盡破其産式輒復分與之又曰王商字子威涿郡蠡吾人也商為太子中庶子以肅敬敦厚稱父薨商嗣為侯惟財以分異母諸弟身無所受東觀漢記曰魯恭字仲康扶風人恭憐弟丕小欲先就其名託疾不仕郡數以禮請謝不肯應母強遣之恭不得已而西因留新豐教授丕舉方正恭乃始為郡吏又曰汝南王琳字巨尉弟季出遇赤眉將為所捕琳請自縛先季死賊憐而放遣之又曰趙孝字長平建武穀食尚少孝得穀炊將熟令弟禮夫妻出比還孝夫妻共蔬食禮夫妻歸告言已食輒獨飲之積久禮心怪之疑後掩伺見之不肯食出遂共蔬食兄弟怡怡鄉里歸德又曰孔奮篤於骨肉弟奇在雒陽為諸生分祿奉以供給其糧用四時送衣下至脂燭每有所食甘美輒分減以遺奇謝承後漢書曰許荊兄子常報讎殺人怨家會衆操兵至荊家欲殺之會荊始從府休歸與相遇因出門解劍長跪曰前無狀相犯咎皆在荊不能相教兄既早沒一子為嗣如令死者傷其滅絶今願殺身代之塞咎雖死已往猶謂更生怨家扶起荊曰許掾郡中稱為賢吾何敢相侵因遂委去又曰李鴻字奉遜禮性仁孝友于兄弟弟育為人所侵辱育後陰結客報怨為執法吏所得當伏罪時未有立嗣鴻為太尉掾在京師傷育以養刷恥門戶斷絶因分代育遂刻印還歸欲過家恐見妻子虧移其意到縣北亭預作記乞代育通記便飲鴆而之縣令省記怛然驚感矣司馬彪續漢書曰山陽張儉以忠正為中常侍侯覽所忿疾覽為刑章下州郡召捕儉儉與孔融兄褒有舊亡投遇褒出時融年十五六少之不下告也融知儉長者有窘迫色謂曰吾獨不能為君主乎因留舍藏之後以人客發泄覺知國相已下密就掩儉得脫走登時收融及褒送獄融曰保納藏舍者融也融當坐之褒曰彼來投我罪我之由非弟之過我當坐之兄弟爭死郡縣疑不能決乃上讞詔書令褒坐焉融由是著名范曄後漢書曰薑肱字伯淮彭城廣戚人也家世名族肱與二弟仲海季江俱以孝行著聞其友愛天性常共臥起及各娶妻兄弟相戀不能別寢以繼嗣當立乃往就室又曰鍾皓字季明潁川長社人少以篤行稱公府連辟為二兄未仕避隱密山王隱晉書曰徐苗字叔胄高密淳于人弟亡臨殯口中有癰潰膿血苗含去之晉中興書曰顏含字弘都琅琊人含次嫂繁氏老而失明含奉養必束帶躬親嘗省嫂病困須得蚺蛇膽為藥而求不能得平晝獨坐有一童子持一青囊授含含開視蛇膽也童子逡巡出戶化成青鴻飛去得膽藥成嫂病即愈又曰鄧攸字伯道為石勒參軍勒過泗水攸與鄉人河東陳嘏平陽馬恬共謀叛勒破車以牛馬負妻子入草中又遇賊掠牛馬去攸語妻曰吾弟早亡唯有一息今當步走誓兩兒恐盡死不如棄我兒抱弟子遺民婦乃從之崔鴻十六國春秋前趙録曰上郡王俊字玄英有幹藝之稱俊年七八歲隨兄密子元直西如涼州路中糧匱密留元直於途乞丐民間比還俊為賊所掠元直逃免密乃將元直追賊叩頭求哀曰人情自當皆愛其子但此弟未生家君見背孤遺相長以至于今請以元直易俊賊相謂曰以子易弟義之大也於是以俊密受元直而去密後亡俊勺飲不入口者五日雖服喪期年而心喪六載又前燕録曰有司奏中山浦陰民劉洛縣差充征弟興私代背軍逃歸州以本名捕斬興詣郡列稱逃是興身請求代洛死洛又曰固陳已實正名宜從憲辟兄弟爭命詳刑有疑暐曰洛應征輒留興冒名逃役俱應極法但兄弟競死義情可嘉宜特原之南燕録曰有司奏沙門僧知夜入臨淄人冷平舍淫其寡嫂李氏平與弟安國殺之郡縣桉平兄弟以殺人論而平安國各引手殺讓生競死義形急難後秦録曰姚襄與李雄戰馬中流矢死弟萇下馬以授襄曰汝可以免萇曰兄濟此豎子安敢害萇會救至俱免後魏書曰房景先沉敏方正事兄恭謹出告反面晨昏參省側立移時兄亦危坐相敬如賓客兄曾寢疾景先侍湯藥衣冠不解形容毀瘁親友者莫不哀之後周書曰裴寬字長寬弱冠為州里所稱與二弟漢尼並知名親沒撫諸弟以篤孝聞榮陽鄭穆嘗謂其從弟文直曰裴長寬兄弟天倫篤睦人之師表吾愛之重之汝可與之遊處梁書曰張弘榮兄弟友愛不忍暫離雖各有室常同臥起世比之薑肱兄弟唐書曰張嘉貞為并州長史開元初因奏事至京師上聞其善政數賞慰嘉貞因奏曰臣少孤兄弟相依以至今日臣弟嘉祐今授鄯州別駕與臣各在一方同心離居魂絶萬里乞移就臣側近臣兄弟盡力報國死無所恨上嘉其友愛特改嘉祐為欣州刺史又曰東都未平梁宋間群盜連藂或至二千餘餘衆攻陷城邑李瀾守蘄縣力屈為盜所執將害之瀾弟渤詣盜請代兄死瀾又請殺身留弟兄弟爭死俱為盜所害又曰杜佑子式方性孝友弟兄尤睦季弟從郁少多疾病式方躬自煎調藥膳水飲非經式方之手不入於口及從郁夭喪終年號泣殆不勝情士友多之又曰白居易弟行簡字知退文筆有兄風詞賦尤稱精密文士皆師法之居易友愛過人兄弟相待如賓客行簡子龜兒多自教習以至成名當時友悌無以比焉蕭廣濟孝子傳曰陳玄字子元陳侯太子七歲喪母父更娶周氏有子曰昭周氏讒玄侯將殺玄昭欲先死玄不聽引白羊誓曰孝者羊血逆上一丈三尺一如誓後又讒之侯恕令玄自殺玄投遼水有大魚負之玄曰我罪人也魚乃去昭從後來問漁者云投水死矣昭氣絶良久曰吾兄也又投水而死周景式孝子傳曰古有兄弟忽欲分異出門見三荊同株接葉連陰歎曰木猶欲藂況我兄弟而欲殊哉遂還相為雍和矣宋躬孝子傳曰孫棘彭城人事母至孝母臨亡以小兒薩屬棘特深友愛宋大明五年上募軍仵薩求代棘及後軍期應死棘薩爭死妻許氏又遙屬棘曰君當門戶豈可委罪小郎且大家臨終以小郎屬君竟未有妻息君已二兒死復何恨太守張岱表聞詔榜門宋世祖感其悌友乃普增諸弟封秩列女傳曰會稽石師安妻者同郡呂氏之女也名軍其兄遂犯法軍匿之知不能免乃請智者為辭乞代兄遂之命因自經縣門縣官嘉有義乃捨遂罪又曰齊義繼母者齊二子之母也當宣王時有人鬭死道者吏診之二子立其傍吏問之兄曰我殺之弟曰非兄乃我殺之期年不決言於相相不能決言於王王曰若皆赦之是縱有罪若皆殺之是誅無辜其母必知子之情善惡聽其所殺活相召而問之其母泣而對殺少子相曰小子人所愛今所殺之何也對曰少者妾之子長者前妻之子相言之於王王美其義皆赦其子又曰郃陽友娣者郃陽邑任延壽之妻也字季兒有三子季兒兄季宗與延壽爭事延壽與其友田建陰殺季宗建獨坐死延壽會赦乃以告季兒季兒曰嘻殺夫不義事兄之讎亦不義何面目以生季兒乃告大女曰汝父殺吾兄義不可以留又終不嫁矣吾去而死善視汝弟遂自經死海內先賢傳曰范舟字史雲清高亮直讓財千萬與三弟會稽先賢傳曰陳業字文理業兄渡海傾命同時依止者五六十人骨肉消爛而不可記別業仰皇天誓后土曰聞親戚者必有異焉因割臂流血以灑骨應時飲血餘皆流去汝南先賢傳曰繆彤字豫公郃陽人兄弟四人各求分異至有爭訟之言彤默閉戶自撻大自罵曰繆彤汝修身謹行將齊正風俗如何近一家之中不能使之和協耶鞭兩髀皆瘡於是諸姊及弟叩頭自責不復分矣張瑩漢南記曰陰慶為鯛陽侯其弟員及丹皆為郎慶以明尚書修儒術推居弟園田奴婢錢悉分與員丹慶但佩印綬而已當代稱之陳壽益部耆舊傳曰李孟元修易論語大義略舉質性恭順與叔子就同居就有痼疾孟元推所有田園悉以讓就夫婦紡績以自供給江微陳留志曰李銓平丘人也少聰慧有至行銓兄前母子後母甚不愛也而衣食皆使下銓銓始年五歲覺己衣服勝兄即脫不著須兄得己同然後服之母遂不得有偏及長銓內匡順母外奉其兄故閨門雍睦為群族所稱杜預汝南記曰李充兄弟六人貧無擔石之儲易衣而出并日而食而妻竊謂充曰今貧如是我有私財可分異獨居人多費極無為空自窮也充請呼諸鄰里室家相對前跪觴告其母便顧其妻叱而遣之婦行泣出門去顏延之庭誥曰將責弟悌務念為友
