body:
  text: 人事部五十四孝中陳書曰徐孝克陵第三第事所生母盡孝每侍宴無所食噉至席散當其前膳羞又損減高祖密記以問中書舍人管斌嘗不能對自是斌以意伺之見孝克取珍果內紳帶斌常莫能識其意後更尋訪方知還以奉母斌以啟高祖高祖歎嗟久之乃勑所司自今享孝克前饌賜以餉其母後屬兵荒母病思粳米粥不能得而孝克終身不食粳米崔鴻十六國春秋前趙錄曰太宰王詳字季海性至孝言及二親未嘗不嗚咽摧慟每忌日輒三日不食燕書曰周存字道名上谷俱陽人王彭祖叛母遇寇離失所在分崩州郡隔異存謂難尋求自河以北無不周遍存亡無問後傳在昌黎而存已屬段氏昌黎土地燕之所統存徑投高祖客之為置酒於坐問存君失母來幾年相見當識否高祖言音未止存涕泗覆面尋聲而對辭甚悲酸舉坐莫不忼慨高祖亦為之動容由是意遇倍加存停朞不得母問將辭歸高祖意欲留之而未顯也存覺微旨陳謝曰聶政荊軻剌客之流意氣之顧甘死秦韓今明公無求於徵用而見椄以國士應終身奉給以荅厚恩然老母未審存亡弟小無所依倚寢食未敢廢心昔徐庶指方寸以未辭今存披肝以表情願明公恕之高祖矜而聽去後魏書曰趙琰字叔起天水人為淮南王他府長史時禁制甚嚴不聽越關葬於藉兆琰積四十餘年不得葬二親及蒸嘗拜未嘗不嬰慕卒事每於時節不受子孫慶賀年餘耳順而孝思彌篤歲月推移坐遷窆無冀乃絕監粟斷諸肴味二十年間食麥而已年八十卒遷都洛陽子應等乃還鄉葬焉又曰長孫盧代人也母因飲酒其父真呵叱之誤以杖擊便即致死真為縣囚執處以重坐盧列辭尚書乞盧身代父老命使嬰稚眾孤得蒙存立書奏云盧於父為孝子於弟為仁兄尋情究狀特可矜感高祖詔特恕其父死罪以從遠流又曰辛少雍字季冲隴西狄道人也少聰潁有孝行尤為祖父紹先所愛紹先性嗜羊肝嘗呼少雍共食及紹先卒少雍終身不食羊肝又曰張彝字慶賓清河東武城人太和中為給事黃門侍郎後從駕南征母憂解任彝居喪過禮送葬自平城達家千里徒步不乘車馬顏皃毀瘠當世稱之又曰寇治字祖禮上谷人也世宗時為荊州刺史治兄弟並孝友敦睦白首同居父亡雖久而猶於平生所處堂宇備設幃帳几杖以時節開堂列拜垂涕陳薦若宗廟然吉凶之事必先啟告遠出行返亦如之又曰孝文帝以文明太后再周忌日哭於陵左絕膳二日哭不輟聲又曰元順字子和任城文宣王之子遭父憂哭泣歐血身自負土時年二十五便有白髮免喪抽去不復更生除吏部尚書兼右僕射上省登階見榻甚故問都令史徐仵對曰此榻曾經先王所唑順即哽塞涕泣交流久不能言遂令換之又曰楊弘三歲喪父為母所養母年九十三終弘年七十五哀毀過禮三年服終恨不識父追服斬喪誓終身命經十三年哀慕不改為郡縣鄉閭三百餘人上狀稱美有司奏宜旌賞復其一門旌其純孝後周書曰樂運少好學涉獵經史而不持章句年十五而江陵滅運隨例遷長安其親屬等多被籍沒運積年為人傭保皆贖免之又事母及寡嫂甚謹由是以孝義聞梁故都官郎中琅邪王澄美之為次其行事為孝義傳又曰荊可河東猗氏人也性質朴容止有異於人能苦身勤力供養其母隨時甘旨終無匱乏及母喪水漿不入口三日悲號擗踴絕而後蘇者數四葬母之後遂於墓側晝夜哭負土成墳蓬髮不櫛沐菜食飲水而已然可家舊塋城極大榛蕪至家十餘里而可獨宿其中與禽獸雜處遠近邑里稱之大統中可鄉人以可孝行之至足以勸勵風俗乃言焉太祖令州縣表異之及服終之後猶若居喪大冢宰晉公護聞可孝特引見與言論時有會於護護亦至孝其母閻氏沒於敵境不測存亡每見可自傷久乖𣍿下而重可至性及卒之後護猶思其純孝收可妻子於京城常給其衣食北齊書曰李元忠母老多病患乃專心醫藥研習積年遂善方伎性仁恕見有疾者不問貴賤皆為救療矣又曰李密平棘人元忠族弟性方直有行撿因母病積年得名醫治療不愈乃精究經方洞曉針藥母病乃除唐書曰高祖嘗宴侍臣果有蒲挑侍中陳叔達執而不食問其故對曰臣母患口乾求之不得高祖曰卿有母遺乎遂嗚咽流涕因賜帛百疋以市甘珍又曰歐陽通為中書舍人調露中起服每入朝必徒跣至城門然後著靴直宿則席地藉蒿非公事不言未常啟齒歸必哀號無時國朝奪情唯通得禮又曰聊城人王少玄者父隋末於郡西為亂兵所害少玄遺腹生年十餘歲問父所在其母告之因哀泣便欲求屍以葬時白骨蔽野無由可辨或曰以子血沾父骨即滲焉少玄乃剡其體以試之凡經旬曰竟獲父體以葬盡體病創歷年方瘉音庾貞觀中本州聞薦拜徐王府參軍又曰陳集愿瀧州開陽人也代為嶺表酋長父龍樹欽州刺史集愿幼有孝行父纔有疾即終日不食永徽中喪父嘔血數升枕服苫廬悲感行路資財田宅及僮僕三千餘人並以讓兄弟則天時官至左豹韜衛將軍又曰元讓雍州武功人也弱冠明經擢第以母疾遂不求仕躬親藥膳蒸蒸致養不出閭里者數十年及母終廬於墓側蓬髮不櫛沐菜食飲水而已咸亨中孝敬監國下令表其門閭永淳元年巡察使奏讓孝悌殊異擢拜太子左內率府長史後以歲滿還鄉里鄉人有所爭訟不詣州縣皆就讓決焉聖曆中中宗居春宮詔拜太子司議郎及謁見則天謂曰卿既能孝於家必能忠於國今授此職須知朕意宜以孝道輔弼我兒尋卒又曰張志寬河東人隋末喪父哀毀骨立為州里所稱寇賊聞其名不犯其閭後為里尹在縣忽稱母疾取給縣令問其故志寬對曰母嘗有所苦志寬亦有所苦向患心痛是以知母有疾令初怒曰妖妄之詞繫於獄外遣馳驗之果如斯言令異之以聞高祖旌表門閭就拜門外散騎侍郎又曰裴敬彝綘州聞喜人也曾祖子通隋開皇中太中大夫母終廬於墓側哭泣無節目遂喪明俄有白鳥巢於墳樹子通兄弟八人皆友悌著名詔旌表其門鄉人至今稱為義門裴氏敬彝少聰敏七歲解屬文性又端謹宗族咸重之號為甘露頃年十四侍御史唐臨為河北巡察使敬彝父智周時為內黃令為部人所訟敬彝詣臨論其冤臨大奇之因命作詞賦智周事竟釋特表薦敬彝補陳王府典籤智周在官忽暴卒敬彝時在長安忽泣涕不食謂所親曰大人每有痛處吾即輒然不安今日心痛手足皆廢事在不惻得無戚乎遂請急倍道言歸果聞父喪嬴毀逾禮事母復以孝聞乾封初累轉監察御史時母病有醫人許仁則足疾不能乘馬敬彝每自背負母卒特詔贈以縑帛仍官造靈舉服闋拜著作郎兼修國史儀鳳中自中書舍人歷吏部侍郎左庶子則天臨朝為酷吏所陷配流嶺南尋卒又曰給事中李日知事母至孝時母年老常疾病日知輒急數日而鬢髮變白尋加朝散大夫其母未受命婦邑而卒將葬發引吏人齋告身而至日知於路上即時慟絕久之乃酥左右皆哀慟莫能仰視巡察使衛州司馬路敬潛聞其孝悌之跡使求其狀日知辭讓不報服闋累遷黃門侍郎莊子曰夫事其親者不擇地而安之孝之至也尸子曰孝子一夕五起看其親衣之厚薄枕之高卑淮南子曰公西華之養親也若與朋友處曾參之養親也若事烈君嚴主又曰孔子立孝不過勝母之閭說苑曰曾子芸而誤斷其根曾晢怒援大杖擊之曾子仆有頃乃蘇蹶然而起進曰曩者參得罪大人用力杖參得無疾乎退屏鼓琴而歌欲令晢知其平也孔子聞之告門人曰參來勿內也曾子自以無罪使謝孔子孔子曰汝不聞瞽瞍有子名舜舜事瞽瞍求之未嘗不在側索而殺之未嘗可得小箠則待大箠則走今子委身以待暴怒殺身以陷父不義不孝孰是之大乎說苑曰韓伯逾有過其母笞之泣曰他日未嘗泣今日何泣也對曰逾他日得笞常痛今母力衰不能使痛是以泣也家語曰子路問於孔子曰有人於此夙興夜寐耕芸樹藝手足胼胝以養其親然而名不稱孝何也子曰意者身不敬與辭不慎與色不悅與有一於此破其孝名古之人有言曰人與不女欺言人與事實相通不欺也今盡養親之道而無三者之闕何為無孝之名乎孔子謂子路曰舉其身非力之少勢不可也夫內行不修身之罪也修身而身不彰友之罪也故君子入則篤行出則交賢何為無孝名也呂氏春秋曰樂正子春下堂傷足瘳而數月不出猶有憂色門人問之荅曰吾聞曾子曰父母全而生之子當全而歸之吾忘孝道是以憂也又曰凡理國家者必先務本務本莫過於孝夫孝三皇五帝之本務而萬事之紀也執一術而百善至盧盤估孝子傳曰華光字榮祖彭城人父亡六日年四歲問父所在母辛送光至父冢光再拜伏哭欲留冢下母抱歸悲咽三日不食至年七歲欲見父像雇畫師畫其父像朝夕拜謁如父師覺授孝子傳曰老萊子者楚人行年七十父母俱存至孝蒸蒸常著班蘭之衣為親取飲上堂腳胅恐傷父母之因僵仆為嬰兒啼孔子曰父母老常言不稱老為其傷老也若老萊子可謂不失孺子之心矣又曰閔損字子鶱魯人孔子弟子也以德行稱早失母後母遇之甚酷損事之彌謹損衣皆藁枲為絮其子則綿纊重厚父使損御冬寒失轡後母子御則不然父怒詰之損默然而已後視二子衣乃知其故將欲遣妻諫曰大人有一寒子猶尚垂心若遣母有二寒子也父感其言乃止又曰程曾字孝孫桂陽人年七歲喪母哀號哭泣不異常人祖母憐之嚼肉食之覺有味便吐去蕭廣濟孝子傳曰申屠勳字君遊河內汲人少失父與母孤貧傭作供養夏天多蚊子臥母床下以身遮之又曰宿倉舒陳留尉氏人也年七歲遭荒父母飢苦倉舒求自賣與潁川王氏得大夌九斛後王氏免之累官除上黨太守後尋覔父母經太原南郭忽見母遂還舊居母卒悲號而死又曰王驚廬陵石陽人父喪未葬假瘞宅後野火熛燎驚力不能救投火而死又曰媯皓字元起吳郡餘杭人父昆南郡太守被劾入重罪皓年十六髡頭詣闕通章不省皓不飲食懷石腰中但詣公卿及行路時輒出石置地叩頭流血覆面莫不傷懷遂奏理昆罪又曰伏恭字叔齊琅邪東武人也伯父大司徒湛孝謹敦睦世號伏不鬭恭事後母著孝建武初累遷太僕上臨辟雍於萬人中拜司空眾以恭孝行故光之又曰朱百年會稽山陰人家貧母以冬月亡無絮自此不依緜帛與同縣孔凱善時寒月就孔宿飲酒醉眠孔以臥具覆之百年覺引去謂孔子曰緜定意溫因流涕悲慟又曰郭世道會稽永興人年十四喪父事後母勤身供養婦生男夫婦共議養此兒所廢者大乃瘞之母亡服竟追思未嘗釋衣又曰桑虞字子綱魏郡黎陽人晉黃郎沖之子喪父虞年十四毀瘠過禮日食百粒以糝藜藿又曰何子平廬江灊人事母至孝為楊州從事月俸得白米輒貨市粟麥人或問之荅曰尊老不辦常得生米何容得食白粲有贈鮭音圭者不可寄家則不肯受母喪年將六十有孺子之慕宋大明末飢荒八年不得營葬晝夜號叫居屋不蔽雨日兄子伯與為葺治子平曰我情事未申天地一罪人屋何宜覆孟宗別傳曰宗事母至孝母亦能訓之以禮宗初為雷池監奉魚於母母還其所寄遂絕不復食魚後宗典知糧穀乃表陳曰臣昔為雷池監母三年不食魚臣若典糧榖臣母不可以三年不食米臣是以死守之世說曰晉王祥事繼母朱氏甚謹家有柰樹結子殊好常使守之時大風雨至祥猶抱樹而住母常夜持刀往祥所暗斫之值祥私起刃及被而已祥知母怪意不已因跪前請死朱氏於是感悟愛之如己子搜神記曰吳猛蜀人小兒時在父母傍時臥夏月多蚊而終不搖扇懼蚊虻之去我及父母也
