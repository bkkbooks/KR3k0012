body:
  text: 兵部七十八弓釋名曰弓穹也張之穹隆然也其未曰簫言簫邪也又謂之弭以骨為之滑弭弭也中央曰弣孚主切一作拊跗撫也所撫持也簫跗之間曰淵淵宛也言宛典也說文曰弓近窮遠象形也弴音雕又音敦畫弓也弭弓無緣可以解驂觚也弲許緣切角弓也弧木弓也一曰往體寡來體多曰孤弨尺招切又勑朝切弓反也𢑆音權弓曲也𢐲音遙弓便利也張施弓絃也彏烏郭切弓急張也弸拍生切又鄙矜切弓強貌也彎持弓關矢也㢨一弧切滿弓有所向也弘弓聲也又曰韣音獨韔音暢弓衣也又曰角𧤗音端獸狀似豕角善為弓出胡尸國一曰出休尸國山海經曰少皞生般始為弓矢郭璞注曰般音班世本云牟夷作矢揮作弓弓矢一器作者兩人於義有疑此言般作之是也帝後賜羿彤弓素矰以扶下國以射除患扶助下國也世本曰揮作弓宋衷注曰揮黃帝臣也孫卿子曰倕作弓龍魚河圖曰弓之神名曰曲張太公兵法又曰弓神名曲張方言曰弓藏謂之韇音獨箭衣也墨子曰羿作弓爾雅曰弓有緣者謂之弓郭璞注曰即今宛轉弓也無緣者謂之弭今之角弓也以金者謂之銑以辱者謂之珧音遙以玉者謂之圭用金蚌玉飾弓兩頭因以為名也易曰弦木為弧剡木為矢弧之利以威天下盖取諸睽又曰公用射隼于高墉之上獲之無不利又曰先張之弧尚書曰和之弓在東房孔安國注曰和古之弓人又曰平王錫晉文侯彤弓一彤矢百玈音盧弓一玈矢千又曰備乃弓矢詩曰彤弓天子錫有功諸侯也彤弓弨兮受言藏之弨弛也又曰騂騂角弓翩其反矣騂騂調利也又曰既張我弓又曰弓矢斯張又曰四壯翼翼象弭魚腹鄭玄注象弭弓反未彆者以象骨為之以助御者彆必袂切禮記曰男子生桑弧蓬矢六射天地四方注云天地四方男子所有事也又曰凡遺人弓者張弓尚䈥弛弓尚角弓有往來體皆欲其下曲隤然左手執簫右手承拊簫弭頭也尊卑垂帨帨佩巾也罄折則佩垂授之儀尊卑一也又曰越棘大弓天子之戎器也又曰良弓之子必學為箕又曰武王克商後干戈弓矢包之以虎皮周禮曰司弓矢掌六弓四弩八矢之法辯其名物而掌其守藏與其出入仲春獻弓弩仲秋獻矢箙弓弩成於和矢服成於堅也箙盛矢器也以獸皮為之及其頒之王弓弧弓以授射甲革椹音砧質者夾弓庾弓以授射豻音岸又俄塞切侯鳥獸者唐弓大弓以授學射者及使者勞者王弧夾庾唐大兵者弓異體之名往體寡來體多曰王弧往體多來體寡曰夾庾天子之弓合九而成規諸侯合七而成規大夫合五而成規士合三而成規句者謂之敝弓凡祭祀共射牲之弓矢射牲者示親殺也國語曰郊之事天子必自射其牲澤共射椹質之弓矢鄭司農云澤澤宮也所以習射選士之處也射義曰天子將至必先習射於澤者所以擇士也大射燕射共弓矢如數又曰庭氏掌射國中之妖鳥馬融傳曰國中妖鳥梟雞惡聲之鳥也若不見其鳥獸則以救日之方與救月之矢夜射之獸虎狼㘁鳴也救日食則伐鼓北面射太陰救月蝕則伐鼓南面射太陽以此弓矢射之若其神也則以太陰之弓與扭枉矢射之枉矢名也又曰弓長六尺謂之庇軹五尺謂之庇輪四尺謂之庇軫軹轂木也又曰弓人為弓取六材必以其時六材既聚巧者和之幹也者以為遠也角也者以為疾也筋也者以為深也膠也者以為和也絲也者以為固也漆也者以為受霜露也六材之力相得而足凡取幹之道七柘為上檍音億次之檿桑次之山桑也橘次之木瓜次之荊次之竹為下凡相幹欲赤黑而陽聲赤黑則嚮心陽聲則遠根陽猶清也凡柝幹射遠者用勢射深者用直凡為弓冬析幹而春液角夏治䈥秋合材冬定體為弓長六尺有六寸謂之上制上士服之弓長六尺有三寸謂之中制中士服之弓長六尺謂之下制下士服之人各以其形皃大小用此弓也又曰弓力有三均謂之九和安弓危矢危弓安矢儀禮曰射告賓曰弓矢既具有司請射賓與大夫弓倚于西序矢在弓下左傳曰王賜晉文公彤弓一彤矢百玈弓十玈矢千又曰武王克商作頌曰載櫜弓矢又曰楚子享公于新臺使長鬣者好以大屈宴好之賜也大屈弓名又曰舟堅射陳武子中手舟堅季氏之臣也失弓而罵武子罵也又曰周公相王室以尹天下於周為睦分魯公以大路大旂夏后氏之璜封父之繁弱封父古之諸侯也繁弱大弓名也封之於少昊之墟又曰魯伐齊士皆坐列顏高之弓六鈞皆分取傳而觀之顏高魯人也三十斤為鈞六鈞一百八十斤也故異之又曰子蕩以弓梏華弱于朝又曰楊虎稅甲如公宮取寶玉大弓以出又曰齊景公田于沛招虞人以弓不進公使執之辭曰旌以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進又曰晉楚戰於鄢陵郄至三遇楚子之卒見楚子必下免胃而趍風楚子使工尹襄問之以弓杜預注曰問遺之也又曰楚靈王次于乾谿左尹子革夕王與之語曰昔我先王熊繹僻在荊山唯是桃弧棘矢以供禦王事穀梁曰八年盜竊大弓大弓者武王之戎弓也周公受賜藏之魯崔贛易林曰桃弓葦戟除殘去惡郭璞毛詩拾遺曰象弭魚服毛云弭弓反未彆者以象骨為上蓋俗說文誤也左傳曰左執鞭弭弭者弓之別名謂以象牙為弓今西方有以犀角及鹿角為弓者春秋佐助期曰天弓主司弓弩之張神名推亡史記曰上迎寶鼎於中山有路弓乘矢集獲壇下又曰黃帝騎龍上天小臣不得上悉持龍髯髯拔墮墮黃帝之弓百姓望帝抱其弓而號後世因名其弓曰烏號又曰漢高祖擒韓信信曰高鳥盡良弓藏敵國滅謀臣亡天下已定我固當烹又曰子貢說越王以兵從吳伐齊越王乃使以秦屈盧之弓步光之劍以賀續漢書曰鮮卑亦東胡之支也禽獸異於中國者有野馬原羊角端牛以角為弓世謂之角端弓者也東觀漢記曰祭彤為遼東太守至則厲兵馬遠斥候彤有勇力能貫三百斤弓又曰盖延字巨卿漁陽要陽人以氣聞身長八尺彎弓三百斤謝承後漢書曰朱穆為尚書歲初百官朝賀有虎賁當階置弓於地謂群僚曰此天子弓誰敢干越百僚皆避之穆呵之曰天子之弓當戴之於首上何敢置地大不敬即收虎賁付獄治罪皆肅然服之張璠漢記曰陳球為零陵太守州兵朱盖等反與桂陽賊胡簡數萬人轉攻零陵球城守弦大木為弓羽矛為矢引機發之遠射千餘步斬朱盖等魏志曰句驪別種居小水因名小水貊出好弓所謂貊弓也挹婁弓長四尺力如弩矢用楛長尺八寸青石為鏃古肅慎國也魏要略曰北方有橐離之國其王侍婢有身王欲殺之婢云有氣如雞子來下我故有身後生子王捐之於溷中豬以喙噓之徙馬閑馬以氣噓之王疑以為太子令其母收畜之名曰東明常令牧馬東明善射王怒奪其國殺之東明走南至奄水以弓擊水魚鱉浮為橋東明得渡魚鱉解散追兵不得渡東明因都王夫餘之地王隱晉書曰劉琨與丞相牋曰不得進軍者實困無食殘民鳥散錄召之曰皆披林而至衣服藍縷木弓一張荊矢十隻晉中興書曰符健匈暴露刃張弓推鉗鋸鑿殺人之具備置左右晉令曰弓弩士習射者給竹弓角弓皆二人一張沈約宋書曰蕭思話為梁州太祖賜以弓琴手勑曰丈人頃何所作事務之暇故以琴書為娛耳并往桑弓一張材理乃快先所常用既久廢射又多病略當不能制之便成老公令人歎息良材美器宜在盡用之地丈人真無所與讓也梁書曰羊侃膂力絕人所用弓至二十石馬上用六石弓三國典略曰齊綦連猛有勇力梁使來聘有武藝人求欲相角猛帶兩鞬左右馳射併取四弓疊而挽之梁人嗟服後魏書曰傅融性豪爽有三子靈慶靈根靈越並有才力融以此自負謂足為一時之雄嘗謂人曰吾昨夜夢有一駿馬無堪乘者人曰何由得人乘之有一人曰唯有傅靈慶堪乘此馬又有弓一張亦無人堪引有一人曰唯有傅靈根可以彎此弓又有數紙文書人皆讀不能解此文有一人曰唯有傅靈越可以解之融意謂其三子文武材幹堪以駕馭當世常密謂鄉人曰汝聞之不鬲䖝之子有三靈此圖讖之文也好事者然之故豪勇之士多相歸附唐書曰太宗謂蕭瑀曰朕少好弓矢自為能盡其妙近得良弓十數以示弓工乃曰非良材也朕問其故工曰木心不正脈理皆斜弓雖剛勁而遣箭不直非良弓也朕始悟焉朕以弧矢定四方使弓多矣有天下之日淺得為治之意固未及於弓弓猶失之何况於治乎自是遂延耆老問之政術京官五品已上更宿中書內省上每延與語詢訪外事務知百姓疾苦政教之得失焉家語曰楚共王出遊亡其烏嗥之弓烏㘁良弓名也左右請求之王曰止也楚人失弓楚人得之又何求焉孔子聞之曰惜孚其不大也宜曰人遺弓人得之而已何必楚也又曰弓調而後求勁焉國語曰周宣王時有童謠檿弧箕音期服實亡周國有夫婦鬻是器者王執而戮之乃奔褒賈逵注曰箕木名服矢筒得棄女子於野而養之是為褒姒卒以衰周又曰更盈侍魏王見一鴈過曰臣能遙弓而落鴈乃彎弓向鴈鴈即落又曰鄢之戰郄至三逐王卒王使工尹襄問之以弓郄至甲冑而見客免冑而聽命韓詩外傳曰齊景公使人為弓弓人之妻曰此弓者泰山南烏號之祏燕牛之角荊麋之筋河魚之膠四物者天下之精材也戰國策曰楚人有好以弱弓微繳加歸鴈之上者頃襄王聞召而問之對曰見六雙王何不以聖人為弓以勇士為繳時張而射之此六雙者可得而囊載也越絕書曰麻林山勾踐欲伐吳種麻為弓弦使齊人守之典略曰蘇秦說韓宣王曰今韓地方九百里帶甲數十萬強弓勁弩皆射六百步之外劉向說苑曰齊攻魯子貢見哀公謂求救於吳公曰奚先君寶之用子貢曰使吾寶而與我師是不可恃也於是以楊幹麻䈥之弓六往江表傳曰高句麗王遣使貢孫權角弓吳時外國傳曰扶南之先女人為主名柳葉有摸趺國人字混慎好事神一心不懈神感至意夜夢人賜神弓一張教載賈人舶入海混慎晨入廟於神樹下得弓便載大船入海神廻風令至扶南柳葉欲刦取之混慎舉神弓而射焉貫船通度柳葉懼伏混慎因至扶南鄴中記曰石虎女騎皆手持雌黃宛轉角弓遁甲開山圖曰河東有獨頭山多青檀可以為良弓括地圖曰神弓在南山石泥渚中三禮圖曰彤弓天子所用玈弓卿已下所用也崔豹輿服注曰兩漢京兆河南尹及執金吾司隸校尉皆使人導引傳呼行者止坐者起四人持角弓走者射之有乘高闚者亦射之晉魏設弓而不用焉古史考曰烏號柘樹枝長而烏集將飛枝彈烏烏乃號呼以柘為弓因名曰烏號風俗通曰烏號弓者柘桑之枝枝條暢茂烏登其上垂下著地烏適飛去從後撥殺取以為弓因名烏號耳又曰白鷴古弓名出邊崖類聚沈懷遠南越志曰宋昌縣有棘竹長十尋俚人取以為弓又曰沙麻竹人削以為弓弓似弩淮南所謂浮子弩也南州異物志曰烏滸人土有竹皮厚寸餘破以作弓長四尺名曰弧弓廣志曰緣沉古弓名愽物志曰徐偃王既治其國仁義著聞欲舟行上國乃通溝陳蔡之間得朱弓矢以己得天瑞遂因名為號自稱徐偃王列女傳曰晉平公使工人為弓三年乃成射不穿一扎公怒將殺工其妻繁人之女也見公曰妾之夫造此弓亦勞矣幹生太山之阿一日三覩陰三覩陽傅以燕牛之角纏以荊麋之䈥糊以河魚之膠此四者天下選也而不穿一孔是君不能射也而反欲殺妾之夫不亦謬乎妾聞射之道左手如拒右手如附枝右手發之左手不知此射之道也公以其言為儀而穿七孔弓工立得出賜金三鎰綦母遽注曰繁人官名孔鎧孔也燕角善楚䈥何膠粘也管公明別傳曰信都令家中婦女盡驚更牙疾病使公明為占之卦成語曰君北室床西頭當有兩死男人一鬼持矛一鬼持弓箭頭在壁中腳在壁外持矛者主刺頭故頭重痛不得舉持弓箭者主射胸腹故心中懸痛不得飲食晝則浮遊夜還病人故驚恐若徙其屍柩便皆丁強於是令歸室中果得兩楸棺中有角弓及數箭物已久遠木消爛徙骸埋之合家皆愈洞林曰曲阿令趙元瞻兒字虎舒從吾學卜自求蓍作卦見吾有盛艾小陵龜欲得之不與語之曰當作卦相為致此物令自來復數日果有一龜入廄虎舒後見吾言偶有一物試可占之若得當再拜輸一好角弓即便作卦曰案卦之是為龜虎舒奉弓起再拜老子曰天之道其猶張弓乎高者抑之下者舉之列子曰紀昌學射於飛衛飛衛曰爾先學不瞚而後能又使學視小如大紀昌氂懸虱於牖南面而望之三年之後如輪覩物皆丘山也乃以燕角之弧朔蓬之幹射之貫虱之心而懸不絕孟子曰不仁不智無禮無義人役也人役而恥為役猶弓人而恥為弓孔藂子曰楚王張繁弱之弓載忘歸之矢射蛟兕於雲夢胡非子曰一人曰吾弓良無所用矢一人曰吾矢善無所用弓羿聞之曰非弓何以往矢非矢何以中的令合弓矢而教之射孫卿子曰繁弱鉅黍古之良弓也廣雅又云又曰天子雕弓諸侯彤弓大夫黑弓禮也魯連子曰楚王成章華臺酌諸侯酒魯君先至楚王悅之與大曲之弓闕子曰宋景公謂弓人曰為弓亦遟矣對曰臣不得見公矣公曰何也臣之精盡於弓矣獻弓而歸三日而死公張弓登虎圈之臺東面而射矢踰西霜之山集彭城之東其餘力逸勁飲羽於石梁夫盡精於一弓而身為夭死况治天下奈何其獨也尸子曰鴻鶴在上扞弓鞹彏同弩待之若發若否問二五弗知非二五難計也欲鴻之心亂也抱朴子曰金弧王弦無激矢之能又曰農夫得彤弓以驅烏南成得袞衣以負薪猶世人得仙丹而不貴淮南子曰射者扞烏號之弓彎綦御之箭杆張也彎引也綦美箭所出地名也衛利也烏號柘桑其材堅勁烏跱其上及飛至枝必撓下勁能復起樔烏隨之烏不敢飛號呼其上伐其材以為弓因曰烏號之弓也一說黃帝鑄鼎鍾於湖得道而仙乘龍上天其臣援弓射龍欲下黃帝不能也烏於也號呼也於是抱弓而號也自以名其弓為烏號之弓也重之羿逢蒙子之巧以要飛鳥猶不能與羅者竟多羿古諸侯有窮之君也逢蒙羿弟子皆攻射而百發百中故曰之巧要取竟逐也何則以所持之小也又曰淇衛箘路箘箭竹也出於淇地衛箭羽也飾以銀雖有薄縞然獨猶不能穿也若假之䈥角之力弓弩之勢則貫兕甲而經於革楯矣又曰曲張弓名也一名彷徨弓又曰宛轉弓今之弭弓是也呂氏春秋曰齊宣王好射說人之謂己能用強弓也其嘗所用弓不過三石以示左右左右皆試引之中間而止至於一半而止皆曰此不下九石非王孰能用是宣王所用不過三石而終身自以為用九石豈不悲哉非直士其孰能不阿主故亂國之主患存乎用三石為九石又曰萬人操弓共射一招招無不中招謂的也杜夷幽求曰弓折由射者之數劍𡙇因用之者多新序曰楚熊渠子夜行見寢石闕弓射之滅矢飲羽下視知石也却復射之矢摧無迹譙子法訓曰善耕者足以謹地待時而動善射者調弓定準見可而發君子善養其人足用韓楊天子要集曰弧者天弓備盜賊楚辭曰帶長劍兮挾秦弓言身死帶劍弓示不舍武也劉邵趙郡賦曰其器用則六弓四弩緣沉黃間堂溪魚腸丁令角端陳琳武庫賦曰弓則烏號越棘繁弱角端象弭繡質哲弣文身唐太宗詠弓詩曰上弦明月半激箭流星遠落鴈帶書驚啼猿映枝轉後梁宣帝詠弓詩曰虞人招不進繁氏久彌工已悲軒主跡復挹楚王風楊師道奉和詠弓詩曰霜重麟膠勁風高月影圓烏飛隨帝輦鴈落逐鳴絃齊王融謝武陵王賜弓啟曰殿下摛藻蕙樓暢藝蘭苑敷積玉於風筵疊連珠於月的兔園掩秀鄴水慚奇融揖讓未工濫陪升飲之賞操弧反正謬奉招賢之錫文韜鏤景逸幹梢雲玩溢百齡佩流千載晉稽合木弓銘曰烏號之撲豐條足理弦弧走栝截飛駭止射隼高墻出必有擬既用禦武亦以招士李尤良弓銘曰弓矢之作爰自曩時鄉射載禮招命在詩妙稱顏高巧發由基不爭之美亦以辦儀
