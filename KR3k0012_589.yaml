body:
  text: 文部四頌詩序曰頌者美盛德之形容以其成功告於神明者也又曰烝民尹吉甫美宣王也其詩曰吉甫作頌穆如清風陸機文賦曰頌則優游以彬鬱文章流別論曰頌詩之美者也古者聖帝明王成功治定而頌聲興於是史錄其篇工歌其章以奏於宗廟告於神明故頌之所美則以為名或以頌形或以頌聲其細已甚非古頌之意昔班固為安豐戴侯頌史岑為出師頌和熹鄧后頌與魯頌體意相類而文辭之異古今之變也揚雄趙充國頌頌而似雅傅毅顯宗頌文與周頌相似而雜以風雅之意若馬融廣成上林之屬純為今賦之體而謂之頌失之遠矣文心雕龍曰四始之至頌居其極頌者容也所以美盛德而述形容也昔帝嚳之世咸累為頌以歌九招自商頌已下文理允備夫化偃一國謂之風風正四方謂之雅容告神謂之頌風雅序人故事資變正頌主告神故義必純美魯以旦次編商以前王追錄斯乃宗廟之正歌非饗燕之恒詠也時邁一篇周公所製哲人之頌規式存焉夫三閭橘頌情采芬芳比類屬興又覃及細矣至於秦政刻文爰頌其德漢之惠景亦有述容沿世並作相繼於時矣若夫子雲之表充國孟堅之序戴侯武仲之美顯宗史岑之述僖后或擬清廟或範駉那雖深淺不同詳略有異其褒德顯容典章一也原夫頌惟典懿詞必清鑠敷寫似賦而不入華侈之區敬慎如銘而異於規式之域榆楊以發藻汪洋以樹儀雖纖巧曲致與情而變其大體所弘如斯而已漢書曰宣帝徵王褒為聖主得賢臣頌褒對曰夫荷旃被毳者難與道純綿之麗密羹藜唅糗者不足與論大牢之滋味今臣僻在西蜀生於窮巷之中長於蓬茨之下無有遊觀廣覽之知不足以塞厚望應明旨雖然敢不略陳愚而杼情素又曰成帝時西羗嘗有警上思將帥之臣追美充國乃召黃門郎揚雄即充國圖畫而頌之後漢書曰帝召賈逵因勑蘭臺給筆札使作神雀頌范曄後漢書曰肅宗治脩古禮巡狩方嶽崔駰上西巡頌稱漢德帝雅好文章自見駰頌後常嗟歎之問侍中竇憲曰寧知崔駰乎對曰班固數為臣說之然未見帝曰公愛班固而忽崔駰此葉公之好龍也可試見之駰由此候憲憲屣履迎門笑謂駰曰亭伯吾受詔交公何得薄我哉遂揖入以為上客又曰傅毅與班固賈逵共典校書毅追美孝明帝功德最盛而廟頌未立乃依清廟作顯宗頌十篇奏之又曰平望侯劉毅以和熹鄧太后有德教請令史官著長樂宮聖德頌以敷宣景耀勒勳金石縣之日月攄之罔極以崇陛下蒸蒸之孝帝從之魏志曰黃初三年黃龍見鄴西漳水中山王褒上頌賜黃金十斤晉春秋曰懷帝陷於平陽劉聰加帝開府儀同三司會稽郡公引帝入醼謂帝曰卿為豫章王時朕與王武子俱造卿武子稱朕於卿卿言聞名久矣卿以所作樂府文示朕曰劉君聞君善詞賦試為看也朕與武子俱為盛德頌卿稱善者久之又引朕射于皇堂朕得十二籌卿與武子俱得九籌卿又贈朕柘弓銀硯卿頗憶否帝曰安敢忘之恨爾日不得早識龍顏聰曰卿家骨肉何相殘之甚邪帝曰此殆非人事皇天意也大漢將興應乾受曆故為陛下自相驅耳且臣家若能奉武皇帝之業九族敦睦陛下何由得之聰甚有喜色晉書曰劉臻妻陳氏聰敏能屬文嘗正旦獻椒花頌其詞曰旋穹周廻正朝肇建青陽散暉澄景載煥臧榮緒晉書曰劉伶字伯倫沛國人也志氣曠放以宇宙為狹著酒德頌為建威參軍以壽終崔鴻春秋前燕錄曰慕容雋觀兵近郊見甘棠于道周從者不識雋曰唏此詩所謂甘棠于道甘者味之主也木者春之行也五德屬仁五行主土春以施生味以養物色又赤者言將有赫赫之慶于中土吾謂國家之盛此其徵也傳曰升高能賦可以為大夫群司亦各書其志吾將覽焉於是內外臣寮並上甘棠頌南史曰梁大同中嘗驟雨殿前往往有雜色寶珠梁武觀之甚有喜色虞寄因上瑞雨頌帝謂寄兄荔曰此頌典裁清拔卿之士龍也將加擢用寄聞之歎曰美盛德之形容以申擊壤之情耳吾豈買名求仕者乎後周書曰顏之儀幼潁悟三歲能讀孝經及長博涉群書好為詞賦嘗獻神州頌辭以雅贍梁元帝手勑報曰枚乘二葉俱得遊梁應貞兩世並稱文學我求才子鯁慰良深江陵平之儀隨例遷長安世宗以為麟趾學士隋書志曰北齊中書侍郎杜臺卿上世祖武成皇帝頌齊主以為未能盡善令和士開以頌示李德林宣旨云臺卿此文未當朕意以卿有大才須敘盛德即宜速作急進本也德林乃上頌十六章并序武成覽頌善之賜名馬一疋鄭玄別傳曰民有嘉瓜者異本同實縣欲表附文辭鄙略君為改作又著頌二篇侯相高其才王充論衡曰古之帝王建鴻德者須鴻筆之臣褒頌紀德也又曰永平中神雀群集孝明詔上神雀頌百官上頌文比瓦石唯班固賈逵傅毅楊終侯諷五頌文比金玉崔駰西巡頌表曰臣聞陽氣發而鶬庚鳴秋風厲而蟋蟀吟氣之動也唐虞之世樵夫牧監擊轅中韶感於和也臣不知手足之動音聲敢獻頌云零陵先賢傳曰周不疑字文直曹公時有白雀瑞儒林並已作頌不疑見操授紙筆立令復作操奇之讚釋名曰稱人之美曰讚讚纂也纂集其美而敘之也文心雕龍曰讚者明也助也昔虞舜之祀樂正重贊蓋唱發之詞也及益贊于禹伊陟贊于巫咸並颺言以明事嗟嘆以助詞者也故漢置鴻臚以唱拜為讚即古之遺語也至如相如屬詞如贊荊軻及史班書記以讚褒貶約文以惣錄頌體而論詞又紀傳後評亦同其名而仲治流別謬稱為述失之遠矣及景純任雅動植必讚讚兼美惡亦猶頌之有變耳然本其為義事生獎歎所以古來篇體促而不廣必結言於四字之句槃桓于數韻之詞約舉以盡情照灼以送文比其體也發言雖遠而致用蓋寡大抵所歸其頌家之細條也李充翰林論曰容象圖而讚立宜使辭簡而義正孔融之讚楊公亦其美也晉書曰嵇含紹之孫也弘農王粹以貴公子尚主館宇甚盛圖莊周於室廣集朝士使含為子讚含援筆為之文不加點其略曰嗟乎先生高跡何局生處巖岫之居死寄雕楹之屋既非其所沒有餘辱粹有愧色又曰衛恒字巨山為黃門郎善草隸太康元年汲縣人盜發魏襄王冢得策書十餘萬言其一卷論楚者最為工妙恒悅之故竭思以贊其美世說曰羊孚作雪讚曰資清以化乘氣以霏遇象能鮮即潔成輝桓伊遂以書扇箴文心雕龍曰箴所以攻疾除患喻針石垣又曰斯文之興盛於三代夏商二箴餘句頗存及周之辛甲百官箴闕唯虞箴一篇體義備焉迄至春秋微而未絕故魏絳諷君於后羿楚子訓人於在勤戰伐已來棄德務功銘辭代興箴文萎絕至揚雄稽古始範虞箴卿尹州牧二十篇及崔胡補綴揔稱百官指事配位盤鑒有徵可謂追清風於前古攀辛甲於後代者也至於潘勗符節要而失淺溫嶠侍臣博而患繁王濟國子引多事寡潘君乘輿義正體蕪凡斯繼作鮮有克衷至於王朗雜箴乃寘巾履得其戒慎而失其所施觀其約文舉要憲章武銘而水火井竈繁辭不已志有偏也夫箴誦於經銘題於器名用雖異而警戒實同箴全禦過故文資確切銘兼褒讚故理貴弘潤取其要也然天言之道蓋闕庸器之制久淪所以箴銘實用罕施後代惟秉文君子宜酌其遠大矣陸士衡文賦曰箴頓挫而清壯周書曰夏箴曰小人無兼年之食遇天饑妻子非其妻子也大夫無兼年之食遇天饑臣妾非其臣妾也卿大夫無兼年之食遇天饑臣妾轝馬非其有也國無兼年之食遇天饑百姓非其有也左傳襄元曰昔周辛甲之為太史命百官官箴王闕辛甲周武王太史也闕遇也百官各以箴以誡王過也於虞人之箴曰虞人掌田獵者芒芒禹跡畫為九州芒芒遠貌也畫分也經啟九道九道九州之道也啟開也民有寢廟獸有茂草各有攸處德用不擾人神各有歸故德不亂也在帝夷羿冐于原獸冐貪忘其國恤而思其麀牡言但念獵武不可重重猶數也用不恢于夏家羿以好武雖有夏家而不能恢大也獸臣司原敢告僕夫獸臣虞人也告僕夫不敢斥尊也范曄後漢書曰崔琦字子瑋梁冀聞其才請與交冀行多不軌琦數引古今成敗以誡之冀不能受作外戚箴晉書曰張華懼後族之盛作女史箴以為諷賈后雖凶妒而知敬重華又曰文帝子齊王攸武帝時為太子太傅獻箴於太子其略曰無曰父子之間昔有江充無曰至親靡二或容潘崇諛言亂真譖潤離親驪姬之讒晉侯疑申固親以道勿固以恩修身以敬勿託以尊世以為工後周書曰齊王憲友劉休徵獻王箴一首憲美之休徵後又以此箴上高祖高祖方剪削諸弟甚悅其文唐書曰元和中吏部郎中柳公綽獻太毉箴曰寒暑滿天地之間浹肌膚於外好愛溢耳目之前誘心知於內端潔為隄奔射猶敗氣行無間隙不在大睿聖之姿清明絕俗心正無斜志高寡欲謂天高矣氣蒙晦之謂地厚矣撗流漬之聖情超遙萬方賴之飲食所以資身也過則生患衣服所以稱德也侈則生慢惟過與侈心必隨之氣與心流疾亦伺之上深嘉歎降中使勞問又曰敬宗遊幸無度李德裕獻丹扆箴六首霄衣箴曰先王聽政昧爽以俟鷄鳴既盈日出而視伯禹大聖寸陰為貴光武至仁反支不忌無俾姜后獨去簪珥彤管記言克念前志又有正服罷獻納誨辨邪防微等箴文多不載帝甚嘉之胡廣百官箴敘曰箴諫之興所由尚矣聖君求之於下忠臣納之於上故虞書曰予違汝弼汝無面從退有後言墨子著書稱夏箴之辭崔瑗敘箴曰昔揚子雲讀春秋傳虞人箴而善之於是作為九州及二十五管箴規匡救言君德之所宜斯乃體國之宗也
