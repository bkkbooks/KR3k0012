body:
  text: 獸部十四羊説文曰羊祥也象四足角尾之形孔子曰牛羊之字以形舉又曰羔羊子也羜五月生羔也𦎦亡貝切六月生羔也羍七月生羊也䍮雉矯羊未卒歲也牂牝羊也羒扶分壯羊也羠音夷乘羊也羳扶員黃腹羊也羥揩間羊名也廣雅曰吳羊牝一歲曰䍮三歲曰羝其一歲曰牸三歲曰牂吳羊犗居八切曰䍸蒲各羖羊搳曰羯羍𦎦𦍺䍻思憲切羔也爾雅曰麢大羊似羊大角員鋭在山崖間羱如羊音元似吳羊羊壯羒音汾牝羒夏羊黑羖也牡羭音榆黑羝牝羖角不齊觤一短一長角三觠羷觠卷三匝羳羊黃腹未成羊羜絶有力奮郭義恭廣志曰犬尾羊細毛薄皮尾上旁廣重且十斤出康居又曰驢羊似驢字林曰䍲女奚切羺女溝切胡羊也腔口弄切羊臘也似羊四耳九尾目在背䍺音還似羊無口𦎣乙間切群羊相積一日羊羶初莧切羊相廁也羶羊臭也羶式延切玄中記曰千歲之樹精為青羊崔豹古今注曰羊一名美髯鬚主簿禮記曲禮下曰祭廟羊曰柔毛又曰大夫無故不殺羊又月令曰孟春天子食麥與羊又內則曰羊泠毛而毳羶詩小雅無羊曰誰謂爾無羊三百維群又曰爾羊來思其角戢戢又曰羔羊鵲巢之國也召南之政在位皆儉節正直德如羔羊也羔羊之皮素絲五紽又曰牂羊賁首三星在霤鄭玄注曰羊牝曰牂賁大也易説卦曰兌為羊又大壯曰九三小人用壯君子用罔貞厲羝羊觸藩嬴其角周禮夏官上曰羊人掌羊牲凡祭祀飾羔羔小羊也詩曰四之曰其早獻羔祭韭祭祀割羊牲登其首登升也升首報陽也升首于室凡祈珥共其羊牲共猶給也賓客共其法羊法羊飧饔積膳之羊凡沈辜侯禳釁積共其羊牲積故書為毗鄭司農云毗讀為釁謂釁國寶漬軍器也玄謂積積柴煙祀猶燎寶柴周禮天官食醫曰凡會膳食羊宜黍左傳宣上曰華元殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政與入鄭師故敗又宣下曰楚子圍鄭鄭伯肉袒牽羊論語曰子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮又曰葉公語孔子曰吾黨有直躬者其父攘羊而子證之攘盜史記曰武王克殷微子持其祭器肉袒面縛左牽羊把茅𣍿行而前又曰卜式者河南人式入牧百餘羊十餘歲羊致千餘上曰吾有羊在上林中欲令子牧之乃拜式為郎布衣草蹻而牧羊蹻音腳歲餘羊悉肥上過其羊善之式曰非獨羊也治民亦如是也拜緱氏令又曰秦襄公始用羝羊祠西畤漢書曰楚懷王孫心在人間為人牧羊項梁立為懷王又曰蘇武使胸奴胸奴知武不可降使北海上無人處牧羝羊乳乃得歸武在海上廩食不至掘野鼠草荄而食之杖漢節牧羊臥起持節節旄盡落東觀漢記曰甄宇北海人為州從事徵拜博士每臘詔書賜博士一羊羊有大小肥瘦時博士祭酒議欲殺羊稱分其肉宇曰不可又欲投鉤復恥之甄博士宇先自取其最瘦者猶是不復有爭訟後召會詔問瘦羊甄博士後漢書曰更始二年至長安尤嗜酒不聽政事所任皆賈豎膳夫庖人長安為之語曰竈下養中郎將爛羊胃騎都尉爛羊頭關內侯又廣陵思王荊傳曰光武崩大行在殿荊哭不哀而作飛書令蒼頭詐稱東海王強舅況書與強構為大逆其辭曰當秋霜無為檻羊秋霜肅殺於物檻羊受制於人崔鴻十六國春秋後録曰羌抑摩獻羊六角二口四角八口北史曰隋漢王諒為并州總管潞州有官羊生二角相背以為諒之咎徵帝王世紀曰湯問葛伯何故不祀曰無以供犧牲湯遺之以羊穆天子傳曰犬戎胡觴天子于雷首之阿乃獻良馬四六天子使孔牙受之曰雷水之平爰有黑牛白角爰有黑羊白血又曰天子飲于文山乃獻豪牛四節有豪又曰舂山大羊食鹿豕山海經曰錢來之山有獸如羊而馬尾名曰針羊周易是謀類曰太山失金雞西嶽亡玉羊鄭玄注曰金雞玉羊二嶽之精春秋説題辭曰羊者祥也合三而生以養王也故羊高三尺雜五行書曰懸羊頭門上除盜賊春秋繁露曰凡贄卿用羔羔飲之其母必跪類知禮者故羊之為言祥故以為贄莊子曰臧與穀二人相與牧羊而俱亡羊問臧奚事則挾策讀書穀奚事則博塞以遊二人事業不同其亡羊均也又曰善養生者如牧羊後者鞭之墨子曰齊莊公之臣王國卑中里擊者訟三年而獄不斷恐失有罪使二人共一羊盟齊之社二子相從以羊血灑社讀王國卑之祠已盡終里擊之辭未半祭羊起而觸中里擊齊人以為有神驗列子傳曰楊朱見梁王言治天下如運諸掌王曰先生有一妻一妾而不能治三畝之園而不能藝言治天下何也曰君見夫牧羊者乎百羊而群使五尺童子荷箠而隨之欲東而東欲西而西使堯牽一羊舜荷箠而隨之則不能前矣孫卿子曰仲尼為魯司冠沈猶氏不敢朝飲其羊尸子曰羊不任駕鹽車椽不可為楣棟龍魚河圖曰羊有一角食之殺人周書曰夏桀德衰夷羊在牧飛蛤滿野韓詩外傳曰魯哀公使人穿井三月不得泉得一玉羊焉公以為玉羊使祝鼓舞之欲上於天羊不能上孔子見曰水之精為玉土之精為羊願無怪之此羊肝土也公使殺之視肝即土矣國語曰季桓子穿井獲如土缶其中有羊符子曰魏文侯見宋陵子三仕不顧文侯曰何貧子曰王見楚富者牧羊九十九而願百嘗訪邑里故人其鄰人貧有一羊富者拜之曰吾羊九十九今君之一盈我成百則牧數足矣鄰者與之從此觀焉富者非富貧者非貧也呂氏春秋曰百里奚未遇時亡虞飯牛於秦傳鬻以五羖羊之皮公孫枝得獻諸繆公繆公用之謀無不當舉必有功淮南萬畢術曰阿羊九頭更食國亂乃出揚雄法言曰敢問質曰羊質虎皮見草而悅見豺而戰忘其皮之虎也王充論衡曰獬豸者一角之羊也性知有罪皋陶治獄其罪疑乃令羊觸之山海經曰羬羊尾如馬出錢來之山羬羬音針玉篇作古咸反瑞應圖曰鍾律和調則玉羊見白澤圖曰羊有一角當頂上龍也殺之震死博物志曰胡蕙蜀中本無也洛中人有驅羊入蜀其子著羊毛蜀人取種因名禾羊負來又曰陰夷山有淫羊一日百遍脯不可食但著床席間已自驚人又有作淫羊脯法取羖𦍺各一別繫令裁相近而不使相接食之以地黃竹葉飲以麥汁未潘百餘日後解放之欲交未成便牽兩殺之膊以為脯男食羖女食𦍺則並如狂好醜亦無所避其勢數日乃歇治之方煮茱萸菖蒲汁飲之又以水銀宮脂塗陰男子即痿宮脂鹿脂也杜預奏事曰臣前在南聞魏興北山有野羊大者數百十斤試令固求今者各得一枚并頭角蹄案其形不與土羊相似然是野獸土所希有新言曰初年懸羊頭磔雞頭以求富余以問河南服君服君曰是月草木萌羊能嚙草雞啄五穀故懸二物助陽氣今人殺羊雞自作不祥涼州異物志曰有小羊稱若斥頗熱峭山如壁上下無跌又曰有羊大尾車推乃行用纍其身又曰封羊其背如駝宋永初山川記曰九真都龍縣有麢羊大如𤚩牛春秋後語曰張儀謂楚王曰夫為從者無異驅群羊而攻生虎虎之與羊不格亦明矣格鬭也羊不能與虎明矣今王不與虎而與羊臣竊以為大王之計過衛玠別傳曰玠少時乘白羊車於洛陽市共觀咸曰誰家璧人述異記曰羊而不角呼蛟羊一名胡髯郎一名青烏又曰周成王時東夷進六角羊周厲王元年外國貢三角羊尹喜內傳曰老子與喜別曰尋吾於成都市青羊之肆喜後求而得之葛洪神仙傳曰皇初平年十五家使牧羊有道士見其良謹將至華山石室中四十年不誤念其家其兄初起行索初平見道士引至山與弟語畢問平羊何在平曰近東初起視不見羊但見白石卻謂平曰山東無羊平曰兄自不見爾與兄俱往平乃叱之白石一時皆起成羊數萬頭初起曰弟得仙道以如此遂棄妻子服松柏伏苓五萬日遂得仙易姓為赤松子又曰曹公收左慈慈走入群羊失慈之所在追者疑化為羊乃令人數羊羊本千口簡之長一口知化為羊乃謂曰若是左公者但出無苦也有一羊跪言詎如許追者欲執之於是群羊皆長跪曰詎如許追者乃去搜神記曰宣帝時陰子方者至孝有仁恩正當臘日晨炊而竈神形見子方再拜家有黃羊因以祠之又曰南陽宗定伯少年夜行忽逢一鬼鬼問為誰定伯乃欺之曰我亦鬼也遂相與為侶向遠行極困相簷問鬼曰鬼何所畏曰唯不喜人唾欲至宛便簷鬼著頂上徑詣宛市化為羊恐其變亟唾之賣之得錢千五百買者繫之明視之但繩在時人名宗定伯賣鬼得千五百列仙傳曰葛由者羌人周成王時好刻木作羊賣之一旦騎羊而入蜀中王侯貴人追之上綏山在峨嵋山西南高無極隨之者不得還皆得仙道山上有桃故里諺曰得綏山一桃雖不得仙亦足以豪又曰昔有攘羊者以羊遺叔嚮叔嚮母埋之不食後三年攘羊事發追捕嚮家檢羊骨肉都盡唯有舌在國人異之遂以羊舌為族矣續搜神記曰顧霈者吳之豪士送客於升平亭時有一沙門在坐是流俗道人主常欲殺羊羊繩斷便走來入此道人𣍿中穿頭入袈裟下道人不能救即將去而殺之既行炙主人先割以啖道人道人食炙下喉炙便自走行道人皮中痛毒不可忍呼醫來針之以數針貫之炙猶動搖乃破出之故是一臠肉耳道人於是得病作羊鳴吐沫還寺少時便死劉義慶幽明録曰洛下有澗穴婦欲殺夫推下經多時至底乃得一穴宮館金飾明踰三光人長三丈如此九處最後至告飢長人指樹下一羊令跪將羊鬚初得一珠長人取之次亦取後令噉即療飢請問九處名求停不去答云君不得停續異記曰吳興俞亮以永明八年補護軍府史於常眠處聞有羊聲疑為神怪竊於戶窺之見其床下有一羊可高二尺毛色若丹光耀滿室金樓子曰修羊公於華陰山以道干景帝禮遇之數歲道不可得有詔問修羊公能何發語未訖於床上化為白石羊題其脅曰修羊公謝天子後置石羊於通靈臺嶺表録異曰嘗有人自青社泛海歸閩為惡風所飄五日夜不知行幾千里也至一島忽見群羊人向之亦不驚避初疑人所放牧而絶無人迹乃知野生者船人方餒因取食之
