body:
  text: 地部三十六瀵水爾雅曰瀵水出尾下瀵敷問切汾陰有水口知車輪名為瀵尾猶底也列子曰禹之治水而失塗謬之一國其名終北不知際畔無風雨霜露魚禽草木國中有山名韋嶺頂有穴狀若圓環名曰滋穴有水涌出曰神瀵臭過蘭椒味過醪醴一源分為四國人飲神瀵力志平和過則醉經旬乃醒也瀑布水水經注曰漯水又南入山瀑布飛梁懸河注壑崩湍十許丈謂之馬落山幽明録曰衡山三峰最為竦桀自非清霽素朝不可望見峰下有泉飛流如舒一匹絹分映青林直注山下雖織羅不動其上翛翛恆淒清風也臨海記曰郡西北有白鵠山山有池水懸注遙望見如倒挂白鵠因以名山下有深湖湖中又有魚如二百斛船大長二丈許羅浮山記曰羅嶺之南有瀑布挂泉四十餘丈周景式廬山記曰泉在黃龍南數里即瀑布水也土人謂之泉潮其水出山腹挂流三四百丈飛湍於林峰表出望之若懸索注水處石悉成井其深不測也何尚之清暑殿賦曰深波奔上瀑布懸下孫興公天台山賦曰赤城霞起以建摽瀑布飛流而界道笁法真登羅山疏曰增城縣有石溝深廣三丈有兩瀑布皆同注此溝相傳云是仙人流杯池水溫泉華陽國志曰邛都縣南有溫水冬夏常熱其源可湯雞豚下流澡洗治宿病餘多惡水水神自司不可獩污及沉亂髮照面使人惡疾幽明録曰始興靈水源有湯泉每至霜雪見其上蒸氣高數十丈生物投之須臾熟吳録曰始興縣有始興山山出溫泉可以淪雞山海經曰溫水出空峒山山在臨汾南入河徑陽北也幽明録曰艾縣輔山有溫冷二泉同出一山之足兩泉發源相去數尺熱泉可以瀹雞冷泉常若冰生博物志曰不周山六川之水溫如湯也辛氏三秦記曰始皇生時作閣道至驪山八十里人行橋上車行橋下金石柱見存西有溫泉俗云始皇與神女戲不以禮女唾之則生瘡始皇怖謝神女為出溫泉後人因洗浴江乘地記曰東南三十五里有湯泉半冷半溫共同一壑盛弘之荊州記曰新都縣有溫泉冬月未至數里遙見白氣如煙上下交映狀如綺疏又有車輪雙轅形世人傳昔有玉女乘車自投此泉人時見女子姿儀光麗往來倏忽人造泉有聲則沸從下出而不可止也又曰棗陽縣界有溫泉其下有田資以浸灌一年三熟王孚安城記曰宜陽縣南鄉有溫泉焉以生雞卵投其中熟如煮也伏琛齊地記曰曲城東七十里有溫水水如湯沸可療百病煮物無不熟也水經注曰溫水出太一山其水沸湧如湯杜彥達曰可治百病世清則病愈世濁則無驗潢說文曰潢積水池也晏子春秋曰景公與晏子立曲潢之上公望見齊國問晏子曰後世孰將踐有齊者晏子對曰非賤臣之所敢議津論語曰長沮桀溺耦而耕孔子過之使子路問津焉長沮曰夫執輿者為誰子路曰為孔丘曰是魯孔丘與曰是也曰是知津矣言數周流自知津處晉書曰雷煥卒子華為州從事持劍行經延平津忽於腰間躍出墮水使人沒水取之不見劍但見兩龍各長數丈蟠縈其文章沒者懼而返須臾光采照水波浪驚沸崔鴻十六國春秋曰石虎起河橋於靈昌津採石為中濟石無大小下輒隨流用功五百餘萬而終不成虎遣散騎侍郎崔收沉璧中流告神已地震水流莫不傾壞壓死者百餘人虎甚怒乃斬工匠止作而還又曰慕容德正月渡黎陽津流澌冰合鄴令韓軌言於德曰光武渡呼沱澌冰自合大王濟河天橋自成靈命所扶徵兆已見德大悅改黎陽津為天橋津郡國志曰陜州平陸縣小平津張讓劫獻帝處南岸有勾陳壘武王伐紂八百諸侯會處又曰杜預造河橋於富平即此也又曰曹州離狐縣有延津淡臺子羽投璧斷蛟處酈善長注水經曰舊東郡白馬縣神馬亭有神馬寺去白馬津可二十許里東南去白馬縣故城可五十里開山圖所謂白馬山也山上常有白馬群行悲鳴則河決馳走則山崩又曰呂望東海人也老而無遇以釣竿周呂望行年五十賣食棘津七十則屠牛朝歌行年九十身為帝師又曰弘農郡有竇津說者咸云漢武微行柏谷遇辱感其妻深識既反厚齎賞焉賜以河津令其鬻渡今竇津是也又曰雲中定襄之間有津曰君子濟昔漢桓帝十三年西幸榆中東行代地洛陽大賈齎金貨隨帝後行夜迷失道往投津長津長送之渡河賈人卒死津長埋之其子尋求父喪發冢舉尸資費一無所損其子悉以金與之津長不受事聞於帝帝曰君子也即名其津為君子濟又曰河水東北為長壽津述征記曰涼城至長壽津六十里河之故瀆在焉異苑曰石勒元初十一年伐劉曜於洛陽從大河南濟時凍將合軍至而冰自泮舟楫無閡遂生擒曜謂是神靈之助改名靈昌津吳越春秋曰句踐入吳吳王遣之越王伏不敢起吳王遂引上車范蠡為執御至三津之上仰天而歎淚下沾襟曰嗟乎孤厄也不意復生渡此津渚釋名曰渚遮也能遮水從傍回也詩云鴻飛遵渚公歸無所於汝信處又曰魚潛在淵或在於渚又曰鳧鷖在渚公尸來燕來處廣雅曰渚處也晉書曰溫嶠至牛渚磯水深不可測世云其下多怪物嶠遂燬犀角而照之須臾見水族覆水奇形異狀或乘車馬著赤衣者嶠其夜夢人謂己曰與君幽明異路何意相照也意甚惡之嶠先有齒疾至是拔之中風至鎮未旬而卒又曰殷羡建元中為豫章太守去郡郡人多附書一百餘封行至江西石頭渚岸以書擲水中祝曰沉者自沉浮者自浮殷洪喬非是致書郵故時人號為投書渚吳興記曰烏程西風渚者防風氏國也幽明録曰淮南牛渚津水極深無可算計人見一金牛形甚瑰壯以金為鎖絆文選詩曰雙燕遊蘭渚潏釋名曰潏術也堰使水鬱術也魚梁水碓之類也爾雅曰人所為曰潏犍為舍人曰人力水為居止沚釋名曰沚也小可以息其止也廣雅同詩曰遡洄從之宛在水中沚又曰菁菁者莪在彼中沚傳曰澗溪沼沚之芼潢污行潦之水可荐於鬼神可羞於王公坻說文曰秦謂陵阜曰坻釋名曰坻遲也能小遏水使流遲也賈誼鳥賦曰乘流爰逝兮得坻則止湄神仙傳曰河上公漢景帝時結草為庵於河之湄常讀老子帝不解老子數事遣問公不答帝駕從之公即躍身空中矣濆說文曰濆水涯也詩曰汝墳道化行也文王之化行乎汝墳之國也遵彼汝墳伐其條枚又曰彼汾沮洳言采其莫涘說文曰涘水涯也詩曰綿綿葛藟在河之涘又曰所謂伊人在水之涘波釋名風吹水成文為瀾瀾連也波體轉流相及連也小波曰淪淪倫也水文相次有倫理也詩曰有豕白蹢蒸涉波矣魏志曰魏明帝至廣陵臨江觀兵見濤波洶涌歎曰此天所以限南北也遂歸又曰徐宣從文帝於廣陵六軍乘舟風浪暴起帝船回倒宣時病在後凌波獨前群僚無至者帝壯之遷尚書益部耆舊傳曰張霸為會稽太守入海捕賊遭疾風晦冥波水涌起士卒驚曰霸霸曰無得恐太守奉法追賊風必不為害須臾風靜波止莊子曰孔子遊乎緇帷之林休坐乎杏壇之上有漁父者孔子曰其聖人歟乃下求之漁父語訖刺船而去延緣葦間顏淵還車子路授綏孔子不顧待水波定不聞拿音而後敢乘拿船櫂也淮南子曰武王伐紂渡盟津陽侯之波逆如擊疾風晦冥人馬不相見於是武王左操黃鉞右執白旄瞋目而麾之曰余在天下誰敢害吾意者於是風濟波罷又曰楚國之人有乘船而遇大風者波至而恐自投於水非不貪生而畏死或恐死而忘生也世說曰桓宣武在南州與會稽王會於漂州于時漾舟江側謝公亦生狂風忽起波浪鼓涌非人力所制桓有懼色會稽王亦微異側謝公怡然自若頃間風止桓問謝曰向郍得不懼謝徐笑答曰何有三才同盡理孔叢子曰子順謂韓王曰胡越之人同舟濟江中流遇風波其相救如左右手所患同也廣雅曰侯濤大波也戰國策曰或謂公叔曰乘舟漏而不塞則舟沉矣塞漏舟而輕陽侯之波則舟覆矣今公自以辨於薛公是塞漏舟而輕陽侯之波也
