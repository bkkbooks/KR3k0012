body:
  text: 資産部十六錢下崔鴻十六國春秋後趙録曰趙王三年得一鼎容四升中有大錢三十文曰當千當萬鼎銘十三字篆不可曉藏之於永豐倉因此令私行錢而民不樂乃重立禁制官賦至皆取錢釐肆故不行也北史曰後魏元誕纍遷齊州刺史在州貪暴大為人患有沙門為誕採藥還見誕間外消息對曰唯聞王貪願王早代誕曰齊州七萬家吾至來一家未得三斗錢何得言貪也後魏書曰王昕為汝南王悅騎兵參軍悅數散錢於地令諸佐爭拾之昕獨不拾悅又散銀錢以目盺乃取其一北齊書高恭之字道穆時用錢稍薄道穆表曰百姓之業錢貨為本救弊改鑄王政所先自頃以來私鑄薄濫官司糾繩挂網非一在市銅價八十一文得銅一斤私鑄薄錢斤餘二百既示之以深利又隨之以重刑得罪者雖多姦鑄者彌衆今錢徒有五銖之文而無二銖之實薄甚榆葉上貫便破置之水上殆欲不沉此乃因循有漸科防不切朝廷失之彼復何罪昔漢文帝以五分錢小改鑄四銖至武帝復改三銖為半兩此皆以大易小以重代輕也論今據古宜改鑄大錢文載年號以記其始則一斤所成止七十六文銅價至錢五十有餘其中人工食料錫炭松抄縱復私營不能自潤直置無利自應息心無復嚴刑廣記也以臣測之必當錢貨永通公私獲允後遂用楊保計鑄永安五銖錢又曰王則元象初除洛州刺史則性貪婪在州取受非舊京諸像毀以鑄錢于時世號河陽錢皆出其家後周書曰大象元年初鑄永通萬國錢以一當千與五行大布並行北史曰隋鄭譯自隆州徵還帝令內史李德林立作詔書復爵國公位上柱國高頴戲謂曰筆乾答曰出為方嶽杖策言歸不得一錢何以潤筆上大笑唐書曰武德中置錢監於洛并益等諸州今上齊王元吉賜三爐鑄錢右僕射裴寂一爐敢有盜鑄者身死家口配沒又曰高宗時詔復開元通寶錢其乾封所鑄錢令所司貯納初開元錢之文給事中歐陽詢制詞及書時稱其工其字合八分及篆隸三體其詞先上後下次左後右讀之及上反左回環其義皆通議者以乾封不通商賈米帛翔踴以開元錢輕重大小近古最為折衷百姓便之又曰乾元中李輔國奏內飛龍廄鑄銅投乾元新錢二文於爐中而祈曰如聖躬萬福國祚無疆凶孽殄除四方寧謐則願不銷不鑠一陰一陽並見於外鍾成一如所祈又曰崔衍居宣州十年頗以勤儉府庫盈溢及穆贊代衍宣州歲饉贊遂以錢四十二萬貫代百姓之稅故宣州人不流散又曰元和中王鍔奏請於當管蔚州界加置爐鑄銅錢漸廢錫錢詔河東道自用錫錢以來百姓不堪其弊其蔚州鼓鑄漸致銅錢則公私之間皆得充用宜委所司子細計料量借錢本積漸加至五爐又曰李希烈既平淮西節度使陳仙奇進錢一文大小如開通之狀文曰天下太平云於希烈庭中得之命宰臣召百寮遍視之後唐書曰朱守殷奏於積善坊役所得古文錢四百五十六文曰得一元寶四百四十文順天元寶守殷進納勑凡窺奇異盡繫休明所獲錢文式昭玄貺得一者佇歸於一統順天者式契於天心道煥一時事光千載殊休繼出信史必書宜付史館又曰劉仁恭在幽州以墐士為錢令部人行使聚銅錢於山上鑿穴藏之為無窮之計晉書曰右驍衛大將軍張籛始在雍州因春景舒和出遊近郊憩於大冢之上忽有黃雀銜一銅錢置之而去未幾復於衙院晝臥見二燕相鬥畢各銜一錢落於籛首後所獲三錢嘗祕於巾箱識者以為大富之徵又曰天福三年勑先許鑄錢仍令每一錢重二銖四黍十錢重一兩者切慮逐處闕銅難依先定銖兩宜令天下無問公私應有銅欲鑄錢者一任取便酌量輕重鑄造因茲不得入錫并錢及令缺漏不堪久遠行用仍委鹽鐵司明行曉示誡約管子曰桓公請棧臺之錢散諸城陽鹿臺之布散諸濟陰商子曰今臣之所言民無一日之繇官無數錢之費其弱晉而強秦有過三戰之勝韓子曰或令孺子懷錢挈壺甕往酤而狗齕之酒所以酸呂氏春秋曰趙桑子見翳桑之下有臥餓人不能起趙宣子命食之拜受而不食問其故曰臣有母請持以遺之宣子更賜之脯二束錢一百賈誼書曰銅不布下不得採銅不得鑄錢則民反耕田矣鹽鐵論曰教與俗改弊與世易夏后以貝周人以紫石後世或金錢刀布極而衰終始之運也又曰古者市朝而無刀弊各以所有易所無抱布貿絲而已後世則有龜貝金錢又曰夫鑠金在爐盜跖不顧錢刀在路匹婦撥之論衡曰人文章豈徒調墨弄算為英麗哉載人行傳人名楊子法言蜀富貴人齎錢十萬願載一名子雲不聽夫富人無仁義正如圈中之鹿欄中之牛安得妄載又曰手中無錢而欲往市決貨貨主問錢何在曰無錢貨主必不與也胸中無學猶手中無錢也又曰淮陽鑄偽錢吏不能禁汲黯為太守不壞一爐不刑一人高枕安臥淮陽政清郭子璜洞冥記曰帝升望月臺有三青鴨化為三小童皆著青綺文襦各握鯨文大錢五枚以置帝几前身止而影動因名曰輕影錢潛夫論曰諺曰痛不著身言忍之錢不出家言與之猶見朝廷有寇而言不足憂也風俗通曰潁川黃子廉每飲馬輒投錢於水又曰河南平陰龐儉本魏郡鄴人遭倉卒之世失亡其父時儉三四歲在鏹褓母抱轉流客居廬中鑿井得錢千餘萬遂巨富行求老蒼頭堂上作樂奴在廚中竊言堂上老母我婦也婢以告母呼問事實復為夫婦時人為之語曰廬里龐公鑿井得銅買奴得翁又曰錢刀俗説害中有利旁有刀言人治生卒多得錢財者必有刀劍之禍也案漢書曰王莽造大錢作契刀錯刀錯銖錢凡四品並行故稱錢刀也列仙傳曰祝雞公洛陽人戶鄉北山下養雞百餘年雞皆有名字千餘頭暮棲樹晝四散欲取呼名即至賣雞及子得千萬輒置錢去豫章烈士傳曰施陽字季儒為舒令經江夏遇賊劫奪陽物賊去後車上有五千錢遣人追與賊聞知陽悉還其物陽以付亭長邴原別傳曰原字根短避地遼東嘗行得遺錢拾以繫樹枝此錢既不見取而繫錢者多原問其故答者謂之神樹原惡由己而成淫祀乃辨之由是里中遂斂其錢以為社供桓範世論曰靈帝置西園之邸賣爵號曰禮錢錢積如屋封塗漆書杜恕體論曰可以使鬼者錢也可以使神者誠也語林曰杜預道王武子有馬癖和長輿有錢癖竹林七賢傳曰王戎女適裴氏乏用遣女為貸錢數萬文而未還女歸戎色不悅女遽還錢乃懌干寶搜神記曰南方有蟲其形若蟬而大其子著草葉如蠶種得子以歸則母飛來就之殺其母以塗錢以其子塗貫用錢貨市旋則自還故淮南子術以之還名曰青鳧世説曰王武子私第近北邙山于時人多地貴濟好馬射買地作埒編錢布地竟埒時人號為金埒又曰郗公大聚斂有錢數千萬嘉賓甚不同常朝旦問訊郗家法子弟不坐因倚語移時遂及錢貨事郗公曰汝政當得錢耳乃一日開庫任意用郗公始謂正損數百萬許嘉賓遂一日乞與人都盡郗公聞之大驚不能已巳俗説曰王子敬學王夷甫呼錢為阿堵物後既詔出赴謝公主簿過會下與共擲散當其夕手自抱錢戲竟明日已後云何至須阿堵物葛仙公別傳曰取十錢使人一一投井中公井上以器呼錢人見從井中一一飛出入公器中投人刻識之所呼皆得是所投者關令內傳曰關令尹喜周大夫也善於天文登樓四望見東極有紫氣喜曰應有聖人經過果有老子過喜設坐行弟子之禮老子時貧徐甲曰雇錢一百與約須達安息國以黃金頓備錢還甲既見老子方欲遠遊疑遂不還乃作辭詣關令就老子求直關令以辭呈老子老子語甲曰前與汝約至安息國頓以黃金相還云何不能忍辱便興辭訟乎汝隨我已三百餘歲汝命早應死賴我太玄生符在汝身耳言畢見符從甲口出甲已成一聚白骨矣尹喜為請老子以符投之甲立更生喜即以見錢二百萬與甲遣之汝南先賢傳曰平輿閻敞字張為郡五官椽太守第五嘗被徵以奉錢三十萬寄敞敞埋置堂上後嘗舉家病死唯見孤孫九歲嘗未死語云吾有錢三十萬寄椽閻敞孫長大來求敞見之悲喜取錢盡還之孫白祖唯言三十萬今乃百三十誠不敢當敞曰府君固謬言耳郎君無疑之列異傳曰西河鮮子冀建武中為清河太守言出錢六百萬屋未成而死趙高代之計功用錢凡二百萬耳五官黃秉功曹劉商言是冀所自取便表沒冀田宅奴婢妻子送曰南俄而白曰冀鬼見入府與商秉等共計校定餘錢二百萬皆商等匿冀乃表自烈付商上詔還冀田宅異苑曰桂楊臨武徐孫太元中江行見岸有錢溢出即輦著船中須臾悉變成土異苑曰剡縣陳婺妻少寡與二兒為居宅中先有古冢姥母作茗先以著墳上息患之曰枯墓何知欲掘除之母苦禁乃止夜即夢見一人息説沒世以來三百餘載謬蒙惠澤賢二子怕欲見毀相賴保護雖潛壤朽骨敢忘翳桑之報姥霄竊述焉明負杖晨與於外屋得錢十萬似久埋而貫皆新還告兒兒並有慚色自是設饌愈謹幽明録曰海陵民黃尋先居家單貧嘗因大風雨散錢飛至其家來觸籬援誤落餘處拾而得之尋後巨富錢至數千萬遂擅名於江表三輔黃圖曰金寶一銀寶二龜寶三貝寶四布寶五泉寶六凡寶貨六種世八品煩碎難行乃羅本貨五百枚為重十二斤百姓安之闞駰十三州志曰青州平原國和帝延平九年以封子懷王勝風俗與舊齊同然吏姦倍於他民給衛士吏賦狐肉稍從假錢積至萬餘歲竟交代吏無償意衛士恨恚取狐肉沃以酒從而呪之曰狐肉狐肉尾斯尾斯身軀雖小錢多吏聞之恐乃償之錢盛弘之荊州記曰義熙十二年有童子群浴南陽淯水忽岸邊有錢出如流沙因競取之手滿放地尋復行去乃以衫衣縛各有所得王韶之始興記曰勞口東岸有石四方高百餘仞其狀如臺父老相傳此石昔有三人伐木以作橋於石頂戲見數甕錢共取半甕還劉道真錢塘記曰防海大塘郡議曹華信象家富乃議立此塘以防海水信始開募有致土石一斛即與錢一斗旬日之間來者雲集塘未成而誦云不復取於是載土者皆棄置而去塘以之成既遏絶湖漁一竟蒙利縣遷治餘姚王莽時縣名泉亭於是改為錢塘百姓懷德立碑塘所至今猶在地境圖曰錢銅之氣望之如有青雲又曰望錢千萬以上如車十萬之精如一素木萬錢精蓋地如甕江津上便宜曰夫錢之為物無益飢寒之用而儲之家利其不朽古今行之蓋亦由此又便交宜易小市之宜誠勝寸裂尺斷破為大小也過此以往無所一用軍國唯穀與帛錢雖可積未急寶也殷仲堪集太子令曰朝廷遂為吾營宮室顧省不才而大興役費深用愧愓冬氣已應作者殊常寒苦可使監殿舍人一月齎酒肉稱勞賜之吾蒙月俸錢上生塵無所用之可以供事晉魯褒錢神論曰大矣哉錢之為體有乾坤之象其積如山其流如川動靜有時行藏有節井便易不患耗折故親如兄弟字曰孔方失之則貧弱得之則富昌無翼而飛無足而走解嚴毅之顏開難發之口錢多者居前錢少者居後綦母氏論錢曰黃銅中方叩頭對曰僕自西方庚辛分土諸國處處皆有長沙越俊僕之所守黃金為父白銀為母鉛為長男錫為少婦伊我初生周末時也景王尹世大鑄茲也貪人見我如病得醫飢饗太牢未之喻也成公綏錢神論曰路中紛紛行人悠悠載馳載驅唯錢是求朱衣素帶當塗之士愛我家兄皆無能已執我之手託分終始不計優劣不論能否賓客輻湊門常如市諺曰錢無耳何可暗使豈虛也哉趙一疾邪賦曰文籍雖滿腹不如一囊錢曹植樂府歌曰巢許蔑四海商賈爭一錢鄭氏婚禮謁讚文曰金錢為質所歷長久金取和明錢用不止資財周禮地官下司關曰司關司貨賄之出入後漢書曰樊重字君雲世善農稼好貨殖重性溫厚有法度三世共財子孫朝夕禮敬常若公家其營理産業物無所棄課役童隸各得其宜故能上下戮力財利歲倍管子曰倉廩實知禮節國足則遠者來衣食足則知榮辱矣不務天時則財不生不務地利則倉不盈又曰桀有天下而用不足湯有土七十里用有餘而非獨為湯兩粟地非獨為湯出財物尸子曰農夫比粟商賈比財烈士比義列子曰端木子貢之世也籍其先資家纍萬金放意所好生民所無不為也庖廚之下不絶煙火堂廡之上不絶聲樂行年六十乃棄其家事都散庫藏及其死也無埋瘞之資孫卿子曰仁義禮智之於人也譬若財貨粟米之於家也多有者富少有者貧至無有者窮文子曰使信士分財不如探籌使廉士守財不如閉戶羽翼美傷其骨枝葉茂害其根憂河之涸泣以益也呂氏春秋曰白公愛財若梟之愛子梟養子長則食母白公得荊府庫不分人家語曰南宮敬叔以富得罪於定公而奔衛夫子聞之曰若其以貨喪不若速貧之愈也喪亡位也又曰孔子曰自季孫賜我千鍾而交益親以賜於衆故益親自南宮敬叔之乘我以車也而道加行説苑曰安陵纏得寵於楚恭王江乙謂纏曰吾聞以財事人者財盡而交踈以色事人者華落而寵衰豫安得長被幸乎鹽鐵論曰荊陽南有桂林之饒內有江湖之利左陵陽之金右蜀漢之材吳越之貨隋唐之林不可勝用江湖之魚菜黃之鮐不可勝食隴蜀丹沙毛羽荊陽皮革骨焉江南柟梓竹箭燕齊魚鹽旃裘兗豫漆絲絺紵養生奉終之具也待商而通潛夫論曰富貴人爭附之貧賤人爭去之富貴而交者上有稱舉之用下有資財之益與貧賤交者大有賑貸之費小有假貸之損故富貴易為交貧賤難得適又曰炎帝為市聚天下之貨各得其所孫綽子曰命駕而遊五都之市天下之貨畢陳矣風俗通曰陳留有富老年九十無男娶田家女為妻一交即氣絶後生得男其女曰我父死時年尊何一夕便有子爭財數年不決丞相邴吉出上殿決獄云老翁兒無影亦復畏寒于時八月取同歲小兒俱解衣裸之老翁兒獨呼寒復令並行日中無影因以財與男又曰沛中有富豪家訾三千萬小婦子是男又早失母其大婦女甚不賢公病困恐死後必當爭財男兒判不全得因呼族人為遺令云悉以財屬女但以一劍與男年十五以付之兒後大姊不肯與劍男乃詣官訴之司空何武曰劍所以斷決也限年十五有智力足也女及壻溫飽十五年已幸矣議者皆服謂武原情度事得其理
