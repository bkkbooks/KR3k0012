body:
  text: 禮儀部三十一槨周禮地官閭師曰凡庶民不樹者不槨禮記檀弓上曰有子曰昔者夫子居於宋見桓司馬自為石槨三年而不成夫子曰若是其靡也死不如速朽之愈也死之欲速朽為桓司馬言之禮記檀弓下曰孔子之故人曰原壤其母死夫子助之沐槨沐治也原壤登木曰久矣予之不託於音也木槨材也託寄也謂叩物以作音也歌曰貍首之班然執女手之卷然說人亂也夫子為弗聞也者而過之從者曰子未可以已乎夫子曰丘聞之親者無失其為親也故者無失其為故也又喪大記曰君松椁大夫柏槨士雜木槨槨謂周棺者也天子柏槨以端長六尺夫子制於中都使庶人之槨五寸五寸謂端方也棺槨之間君容祝大夫容壺士容甒問可以藏物因以為節左傳定上曰魏獻子屬役於韓簡子原壽過簡子韓起豫不信也壽過周大夫也而田於大陸焚焉還卒於甯甯今脩武魏也范獻子去其柏槨以其未復命而田也范獻子伐魏子為政去其柏槨是貶廣雅曰槨廓也史記曰始皇葬驪山發北山石為槨又曰慎夫人鼓瑟上自倚瑟而歌意悽愴悲懷顧謂群臣曰嗟乎北山石為槨用紵絮斮一作錯陳漆其間紵絮以漆著其間豈可動哉左右曰善張釋之前曰使其中有可欲者雖錮南山猶有郤使其中無可欲者雖無石槨又何慼焉文帝稱善古史考曰禹作土堲以周棺湯作水槨易土堲漢書曰始皇石槨中為遊又劉向上書曰棺槨之作自黃帝始也臣瓚注曰殷人作棺槨也始皇葬於驪山後牧兒亡羊羊入其藏牧者持火照求羊失火燒其藏及槨續漢禮儀志曰侯王公主將軍特進薨使者治喪作柏槨東觀漢記曰明帝自制石槨廣丈二尺長二丈五魏志曰夫餘國厚葬有槨無棺東沃沮其葬作大木槨長十餘丈開一頭作戶舉家皆共槨刻木為數魚豢魏略曰高麗其死葬有槨無棺停喪百日也越絕書曰闔閭葬銅槨三重二石偽事曰佛圖澄死時眾官皆殯歛以生所服錫杖缽終內著棺中為其理石作槨葬畢經年冉閔後故發槨開棺視之了不見體骨處所唯見杖缽存焉莊子曰衛靈公死卜葬沙丘而吉掘之數仞得石槨焉有銘曰不馮其子靈公奪而埋之郭緣生述征記曰桓魋石槨在九里山之東北也槨有二重門間隱起青石方淨如鏡門扇數四博物志曰漢滕公薨公卿送至東都門四馬悲鳴掊地不行於蹄下得石槨有銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室豫章記曰艾縣有一塚鑿青石以為槨制度非常號曰楊柳塚歷代久遠莫知其誰欑禮記喪大記曰君殯用輴欑至于上畢塗屋大夫殯以幬欑置于西序塗不塈於棺士殯見衽塗上帷之鄭玄注云欑猶藂也釋名曰塗曰欑欑木於上而塗之也芻靈周禮春官塚人曰及葬言鸞車象人鸞遣車也象人以芻草為人言問其不如法度也禮記檀弓曰塗車芻靈自古有之芻靈束茅為人馬謂之靈者神之類明器之道也言與明器同孔子謂為芻靈者善謂為俑者不仁不殆於用人乎哉俑偶人也有面目機發有以於生人孔子善古而非周釋名曰束草為人馬以神靈名之也續漢書禮儀志曰天子崩芻靈三十六尺王肅喪服要記曰魯哀公葬父孔子問曰寧設桐人乎哀公曰桐人起於虞卿虞卿齊人遇惡繼母不得養父死不得葬知有過故作桐人吾父生得供養何用桐人為陸機士庶挽歌辭曰埏埴為塗車束薪作芻靈明器周禮春官冢人曰大喪入藏凶器凶器明器周禮夏官司兵曰大喪廞五兵廞興作也興作明器之共禮記檀弓上曰宋襄公葬其夫人醯醢百甕曾子曰既曰明器矣而又實之言名之為明器與祭器皆實之是亂鬼器與人器也又曰既殯旬而布材與明器木工宜乾暗且預成材槨材也又曰之死而致死之不仁而不可為也之死而致生之不知而不可為也之往也死之生之謂無知與有知也為猶行也是故竹不成用瓦不成沫木不成斲成猶善也竹不可善用謂邊無滕味當作沫沫靧也琴瑟張而不平竽笙備而不和無宮商之調有鍾磬而無簨簴不縣之也橫曰簨植曰簴其曰明器神明之也言神一死之也神明者非人所知折其器如此又曰仲憲言於曾子曰夏后氏用明器示民無知也所謂致死之仲憲孔子弟子原憲殷人用祭器示民有知也所謂致生之周人兼用之示民疑也言使民疑於無知與有知曾子曰其不然乎其不然乎非其說之非也夫明器鬼器也祭器人器也夫古之人胡為而死其親乎言仲憲之言三者皆非此或用鬼器或用人器又檀弓下曰孔子謂明器者知喪道矣備物而不可用也哀哉死者而用生者之器不殆於用殉乎哉其曰明器神明之也神明死者異於生人也釋名曰送死之器曰明器神明之器異於人鹽鐵論曰古者明器有形無實示人不用也今厚資多藏器用如生人並衣綈紈江逌表曰宣皇帝顧命終制山陵不設明器以貽後則景帝奉遵遺勑逮文明皇后崩武皇帝亦承前無所設施唯酺醢之奠瓦器而已昔康皇帝玄宮內寶奩鳥粥此蓋太妃因己之情實違先志累世之法今永欲以為故事用此二物明衣說文曰褮鬼衣也褮讀如葛壘褮之縈穆天子傳曰贈用文錦明衣祖載周禮春官喪祝曰掌大喪及朝御柩乃奠朝將葬朝於祖考廟及祖飭棺及載遂御之祖將葬祖於庭禮記檀弓曰殯於客位祖於庭所以即遠也儀禮既夕曰既夕哭請啟期告于殯宿興設盥于祖廟門外祖王父也下土𥘵稱共廟有司請祖期將行而飲食曰祖祖始也白虎通曰祖於庭何奪孝子之恩也祖始始載於庭也乘車辭祖禰故為祖載也翣周禮夏官曰御僕大喪持翣翣棺飾也持之者夾蜃車禮記檀弓下曰周人廧置翣鄭玄注云廧柳衣翣者車飭也又禮器曰天子七月而葬五重八翣諸侯五月而葬三重六翣大夫三月而葬再重四翣此以多為貴也又喪大記曰飾棺君黼翣二畫翣二大夫黼翣二畫翣二士畫翣二古史考曰周公作翣齊書曰張緒卒日無宅以殯遺命凶事不設柳翣莊子曰戰而死者其人之葬也不以翣資翣者武之所資也戰而死者無武也翣將安施耳世本曰武王作翣董勛荅問曰翣似屏風人持隨喪車前後左右也紼禮記雜記曰諸侯喪執紼五百人四紼皆衘枚紼引車索釋名曰從前引曰紼紼發也發車使行續漢書禮儀志曰禮登遐中黃門虎賁執紼又曰公卿已下子弟凡三百人執紼白素幘委貌冠杜預要集曰凡挽天子六紼諸侯四大夫二士一旅旒賀循葬禮曰大夫五旒吉韋車之所建也通而已下不為龍畫旐周禮春官曰司常大喪供銘旌建廞車之旌銘旌王則太常也禮記檀弓上曰銘明旌也以死者為不可別也故以其旗識之續漢書禮儀志曰禮登遐大旂之制長三刃十有二斿曳地畫日月昇龍書旐曰天子之柩賀循葬禮曰杠今之旐也古者以緇布為之命以疑繒題姓字而已不為畫飭也禮論曰問下殤葬墓有旐否徐邈荅曰旐以題柩耳無不有旐晉書曰魏明悼后崩議書名旌或欲去姓而書魏或欲兩書安平王子孚以為經典正義皆不應書凡帝王皆因本國之名以為天下之號而與往代相別耳非為擇美名以自光也天稱皇天則帝稱皇帝地稱后土則后稱皇后此乃所以同天地之大號統無二之尊名不待稱國號以自表不俟稱氏族以自彰挽歌左傳哀上曰吳與齊戰齊人公孫夏將戰命其徒歌虞殯杜預注曰虞殯送葬歌曲示必死纂文曰薤露今人挽歌續漢書禮儀志曰禮登遐羽林孤兒巴俞櫂歌者六十人續漢書曰大將軍梁商三月上巳日會洛水倡樂畢極終以薤露之歌座中流涕其年八月而商薨晉公卿禮秩曰安平王葬給挽歌六十人諸公及開府給三十人晉書禮志曰漢魏故事大喪及大臣之喪執紼者挽歌新禮以為挽歌出於漢武帝役人之勞歌聲哀灱遂以為送終之禮雖音曲摧愴非經典所制違禮衘枚之義方在號慕不宜以歌為名除挽歌摯虞以為挽歌因倡和而為摧愴之聲衘枚所以全哀此亦以感眾雖非經典所載是歷代故事詩稱君子作歌惟以告哀以歌為名無所嫌宜定新禮如舊續晉陽秋曰袁山松作行路難辭句婉麗聽者莫不流淚吳曇善倡樂桓伊能挽歌時稱為三絕又曰武陵王晞未敗四五年喜為挽歌自搖鈴使左右和之語林曰張湛好於齊前種松柏養鴝鵒袁山松出遊好令左右挽歌時人謂張屋下陳尸袁道上行殯謝綽宋拾遺錄曰太祖嘗召顏延之傳詔頻曰尋覔不值太祖曰但酒店中求之自當得也傳詔依旨訪覔果見延之在酒肆躶身挽歌了不應對他日酒醒乃往宋書曰范曄為吏部郎元嘉元年彭城王太妃薨將葬祖夕僚故並集東府曄與司徒左曹屬王深及弟司徒祭酒廣夜中酣飲開北牖聽挽歌為樂彭城王義康大怒左遷宜城太守梁書曰謝幾卿普通六年詔西昌侯藻督眾軍北侵幾卿啟求行擢為藻軍師長史軍至渦陽退敗幾卿坐免官居自揚石井宅中交好者載酒從之客恒滿坐時左丞庚仲容亦免歸二人意相得並肆情誕縱或乘露車歷遊郊野醉則執鐸挽歌不屑物議莊子曰紼謳所生必於斥苦司馬彪注云紼引柩索也斥踈緩若用力也引紼所有謳者為人用力慢緩不齊促急之也風俗通曰京師賓婚嘉會酒酣之後續以挽歌譙周法訓曰挽歌者高帝召田橫至尸鄉自斃從者不敢哭而不勝其哀故作此歌以寄哀音焉干寶搜神記曰挽歌者喪家之樂執紼者相和之聲也挽歌詞有薤露蒿里二章出田橫門人橫自殺門人傷之為悲歌言人如薤上露易晞滅也亦謂人死精魂於蒿里古辭曰薤露朝露何易晞明朝更復露人死一去何時歸二章曰蒿里誰家地聚斂精魂無賢愚鬼伯一何相催促人命不得少踟躕至李延年乃分為二曲薤露送王公貴人蒿里送士大夫庶人使挽柩者歌之又有長歌短歌言壽命長短不可妄求魏繆襲挽歌辭曰生時遊國都死沒棄中野朝發高堂上墓宿黃泉下白日入虞淵縣車息駟馬造化雖神明安能復存我形容稍歌滅齒髮行當墮自古皆有然誰能離此者陸機挽歌辭曰魂衣何盈盈旟旐何習習父母拊棺號兄弟扶筵泣靈轜動轇龍首矯崔嵬挽歌挾轂唱嘈嘈一何悲浮雲中容與飄風不能廻淵魚仰失梁征烏俯墜飛又曰中闈且勿諠聽我薤露詩生死各異倫祖載當有時舍爵兩楹位啟殯進靈轜餞飯觴莫舉出宿歸無期又曰重阜何崔嵬玄廬竄其間磅礡云四極穹崇効蒼天側聽陰溝涌臥觀天井懸壙霄何遼廓大暮安可晨人往有返歲我行無歸年昔居四人宅今為萬鬼鄰昔為七尺體今成灰與塵金王昔所佩鴻毛今不振豐肌享螻蟻形體永夷泯壽堂延魑魅虛無自相賓螻蟻爾何怨魑魅我何親撫心痛茶毒永歎莫為陳晉陶潛挽歌辭曰荒草何茫茫白楊亦蕭蕭嚴霜九月中送我出遠郊四面無人居高墳正嶕嶢馬為仰天鳴風日自蕭條幽室一已閉千年不復朝千年不復朝賢達無奈何向來相送人各亦歸其家親戚或餘悲他人亦已歌死去何所道託體同山阿又曰有生必有死早終非命促昨暮同為人今旦在鬼錄魂氣散何之枯形寄空木嬌兒索父號良友撫我哭顏延之挽歌辭曰令龜告明兆撒奠在方昏戒徒赴幽穸祖駕出高門行行去城邑遙遙首丘園息鑣竟平埒稅駕列巖根北齊祖孝徵挽歌辭曰驅駟馬謁帝長楊宮旌懸白雲外騎獵紅塵中今來向漳浦素蓋轉悲風榮華與歌笑萬事盡成空隋盧思道鼓城王挽歌辭曰旭旦禁門開隱隱靈輿發纔看鳳樓逈稍視龍山沒猶陳五營騎尚聚三河卒容衛儼未歸空山照秋月又樂平長公主挽歌辭曰粧樓對馳道吹臺臨景舍風入上春朝月滿涼秋夜未言歌笑畢已覺先榮謝何時洛水湄芝田解龍駕方相周禮夏官曰方相氏掌蒙熊皮黃金四目玄衣朱裳執戈楊揗帥百隸大喪先柩及墓入壙以戈擊四隅歐方良壙穿中也方良罔兩也蔡質漢官儀曰陰太后崩前有方相及鳳皇車晉公卿禮秩曰上公薨者給方相車一乘安平王孚薨方相車駕馬幽明錄曰廣陵露白村人每夜輒見鬼怪或有異形醜惡怯弱者莫敢過村人怪如此疑必有故相率得十人一時發掘入地尺許得一朽爛方相頭訪之故老咸云嘗有人冒雨葬至此遇劫一時散走方相頭陷沒泥中風俗通曰俗說亡人魂氣浮揚故作魌頭以存之言頭體魌魌然盛大也或謂魌頭為觸壙殊方語也
