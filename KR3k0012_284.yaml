body:
  text: 兵部十四機略二史記曰韓信伐趙引兵未至井陘口三十里選輕騎二千人人持一赤幟從間道萆山而望趙軍如淳曰萆音蔽依山自覆蔽也誡曰趙見我走必空壁逐我若疾入趙壁拔趙幟立漢幟乃使萬人先行背水陳趙軍望見大笑平旦信建大將旗鼓鼓行出井陘口趙開壁擊之大戰良久於是信張耳棄旗鼓走水上軍水上軍開入之復疾戰趙果空壁爭漢旗鼓逐韓信張耳韓信張耳已入水上軍軍皆殊死戰信出奇兵二千騎候趙空壁逐利則馳入趙壁皆拔趙旗立漢赤幟二千趙軍不能得信等欲歸還壁壁皆漢赤幟而大驚以謂漢皆已得趙王將矣兵遂亂遁走於是漢兵夾擊大破虜趙軍斬成安君泜水上徐廣曰泜音遲擒趙王歇信諸將問信曰兵法右背山陵前左水澤今者將軍令臣等反背水陳臣等不服然竟以勝此術何也信曰此兵法不曰陷之死地而後生置之亡地而後存此所謂驅市人而戰其勢非置之死地使人人自為戰今豫之生地則皆走寧尚可得而用之乎諸將皆服曰善非所及也又曰越與吳戰敗范蠡獻吳粟十萬斛而蒸之吳言粟好盡付民種之不生明年大饑越遂伐吳滅之又曰天下兵起沛公西入武關欲以二萬人擊秦嶢關下軍張良曰秦兵尚強未可輕也臣聞其將屠者子賈豎易動以利願且留壁使人先行為五萬人具食益張旗幟諸山之上為疑兵令酈食其持重寶啖秦將貪而忽名可貨以賂秦將果畔欲連和俱西襲咸陽沛公欲聽之良曰此獨其將欲叛士卒恐不從不從必危不如因其懈怠擊之沛公乃引兵擊之秦軍大破又曰項籍圍漢王於滎陽漢將紀信詐降以故漢王得出走入關收兵欲復東袁生說漢王曰漢與楚相距滎陽數歲漢常中困願君王出武關項羽必引兵南走王深壁令滎陽成皋間且得休息使韓信等平河北趙地連燕齊君王乃復走滎陽未晚如此則楚所備者多力分漢得休息復與之戰破楚必矣漢王從其計出軍宛葉間與黥布行收兵項羽聞漢王在宛果引兵南漢王深壁不與戰終以此弊楚又曰漢王至南鄭諸將及士卒皆歌思歸韓信說漢王曰項羽王諸將之有功者而獨居南鄭是遷也軍吏士卒皆山東之人日夜跂而思歸及其鋒而用之可以有大功天下已定人皆自寧不可復用不如決策東嚮爭權天下漢王從之終滅項籍又曰楚漢相持項羽自擊漢將彭越於梁令其將大司馬曹咎守成皋漢將挑楚軍咎度汜水戰漢將後半涉擊大破之又曰漢王與韓信彭越期會擊楚軍至固陵會楚擊漢軍大破之漢王謂張良曰諸侯不從約奈何對曰楚兵且破信越未有分地其不至固宜君王能與分天下今可立致不即事未可知君王能自陳已東傳海盡與韓信睢陽以至穀城與彭越使各自為戰則楚易敗也乃發使者告韓信彭越皆報請令進兵並至垓下遂破項籍軍又曰漢王與諸侯兵共擊項羽決勝垓下韓信將三十萬自當之孔將軍居左費將軍居右漢王在後絳侯柴將軍在漢王後項羽之卒可十萬韓信先合不利却孔將軍費將軍縱楚兵退信復乘之大敗垓下又曰破項羽於垓下羽兵尚衆漢兵圍之皆為楚歌楚人久苦征戰因敗思歸遂潰通典曰斯亦攻心之機也又曰漢王遣將韓信擊魏魏王盛兵蒲坂塞臨晉信乃益為疑兵陳船欲度臨晉而伏兵從夏陽以木罌缶度軍以木為器如罌缶以度軍無船且尚密也缶缶同襲安邑虜魏王豹又曰吳王濞反濞匹備反漢將周亞夫率師禦之壁於下邑吳師奔壁東南亞夫備西北吳師果以精兵奔西北不得入大敗漢書曰先零音憐罕開音汧二種羌皆解仇合黨為寇漢將趙充國討之守便宜上書曰先零羌虜欲為背叛故與罕開解仇然其私心恐漢兵至而罕開背之也臣愚以為其計請擊先零若先擊罕羌零必助之今虜馬肥饒糧擊之恐不能傷害適使先零施德於罕羌也堅其約合其黨虜交堅黨合誅之用力數倍臣恐國家憂纍猶十數年不一二歲而已先誅先零則罕開之屬不煩兵服矣宣帝從之果如其策又曰王莽末光武起兵據昆陽城時唯有八九千人莽遣將王邑嚴尤討之軍至城下者十萬光武留王鳳等守城與李軼等十餘騎夜出既至郾定陵悉發諸營兵嚴尤說王邑曰昆陽城小而堅今假號者宛亟進大兵亟急也紀力切彼必奔走則昆陽自服邑曰吾昔以武牙將軍圍翟義坐不生得以見責今將百萬之衆過城而不能下何謂耶遂圍之數十里列營百所雲車十餘瞰臨城中旗幟蔽野埃塵連天鉦鼓之聲聞數十里或為地道或輣橦城輣蒲萌切積弩亂發矢下如雨城中負楯而汲王鳳等乞降不許光武遂與諸營部俱進自將部騎千餘人前去大軍四五里而陳尋邑亦遣兵千餘合戰光武奔之斬首數十級諸部喜曰劉將軍平生見小敵怯今見大敵勇甚可怪也且復居前請助將軍光武復進尋邑兵却諸部兵乘之斬首數百千級連勝遂因而大敗通典曰王邑違九攻宛所以敗也又曰王郎起河北郎巨鹿郡太守王饒據城光武圍數十日連攻不剋耿純說曰久守王饒士衆疲弊不如及大兵精鋭進攻邯鄲若王郎已誅王饒不戰自服矣從之乃留兵守巨鹿而進軍邯鄲屯其郭北郎數出戰無利城守急攻之二十餘日郎少傅李立為反間開門內漢兵遂拔邯鄲郎黨悉平又曰曹操圍袁尚鑿環城初令淺示若可越城中望見笑而不出操令一夜濬之廣深二丈決漳水以潰之自五月至八月城中餓死者過半後漢書曰朱穆舉度尚自右校令擢荊州刺史擊桂陽蒼梧盜賊尚躬率部曲與同勞逸廣募雜種諸蠻夷明設購賞進擊大破之降者數萬人桂陽宿賊渠帥卜陽潘鴻等畏尚威烈徙入山谷尚窮追數百里遂入南海破其三屯多獲珍寶而陽鴻等黨衆猶盛尚欲擊之而士卒驕富莫有鬭志尚計緩之則不戰逼之則逃亡乃宣言卜陽潘鴻作賊十年習於攻守今兵寡少未易可進當須諸郡所發悉至爾乃并力攻之申令軍中恣聽射獵兵士喜悅大小皆相與從禽尚乃密使所親客潛焚其營積皆盡獵者來還莫不泣涕尚人人慰勞深自咎責因曰卜陽等財寶足富數代諸卿但不并力耳所亡少少何足介意衆聞咸憤踊尚勑令秣馬蓐食明旦徑赴賊屯陽鴻等自以深固不復設備吏士乘鋭遂大破平之尚出兵三年群寇悉定又曰廉范為雲中太守會胸奴大入塞烽火日通故事虜入過五千人移書傍郡吏欲傳檄求救范不聽自率士卒拒之虜衆盛而范兵不敵會日暮令軍士各交縛兩炬三頭爇火營中星列用兩炬交縛如十字爇其頭手持一端使敵人望之疑兵士之多虜遙望火多謂漢兵救至大驚待旦將退范乃令軍中蓐食晨往赴之蓐食早起食於寢蓐中也斬首數百級虜自相轔藉死者千餘人轔轢也藉相蹈藉也由此不敢復向雲中又曰耿恭與胸奴戰恭以毒藥傅矢傳語胸奴曰漢家箭神其中瘡者必有異因發強弩射之虜中矢者視瘡皆沸遂大驚會天暴風雨隨而擊之殺傷甚衆胸奴震怖相謂曰漢兵神真可畏也遂解去又曰耿弇勑諸校會會猶集也後五日攻西安張藍聞之晨夜警守至期夜半弇勑諸將皆蓐食會明至臨淄城護軍荀梁等爭之以為宜速攻西安弇曰不然西安聞吾欲攻之日夜為備然臨淄出不意而至必驚擾吾攻之一日必拔臨淄即西安孤張藍與步隔絶必復亡去所謂擊一而得兩者也若先攻西安不卒下頓兵堅城死傷必多縱能拔之張藍引軍還奔臨淄并兵合勢觀人虛實吾深入敵地後無轉輸旬月之間不戰而困諸軍之言未見其宜遂攻臨淄半日拔之入據其城又曰高峻據高平猶不下帝議遣使降之乃謂寇恂曰為吾行也若峻不降引耿弇等擊之恂奉璽書與峻峻遣軍帥皇甫文出謁辭禮不屈恂怒將誅文諸將諫曰高峻精兵萬人率多強弩西遮隴道連年不下今欲降之而反戮其使無乃不可乎恂不應遂斬之遣其副歸告峻曰軍帥無禮已戮之矣欲降急降不欲固守峻惶恐即日開城門降諸將皆賀因曰敢問殺其使而降其城何也恂曰皇甫文峻之腹心其所取計者也今來辭意不屈必無降心全之則文得其計殺之則峻亡其膽是以降耳諸將皆曰非所及也又曰吳漢在河北時鬲縣五姓共逐守長據城而反鬲縣名屬平原郡故城在今德州西北五姓蓋當土強宗豪右也鬲音革諸將爭欲攻之漢不聽曰使鬲反者皆守長罪也敢輕冒進兵者斬乃移檄告郡使收守長而使人謝城中五姓大喜即相率歸降諸將乃服曰不戰而下城非衆所及也
