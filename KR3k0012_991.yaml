body:
  text: 藥部七附子廣雅曰𦺴前進切奚附子也一歲為萴子二歲為烏喙三歲為附子四歲為烏頭五歲為天雄春秋後語曰蘇秦如齊見王拜而慶仰面吊齊王曰是何慶吊相隨而速速也蘇秦曰臣聞飢人之所以不食烏喙者以為蜼偷充腹而與死人同患也烏喙毒藥與烏頭附子同本也飢人食之雖充腹而死也喙音許穢切今燕雖弱小秦王之女壻大王利其十城而長與強秦為仇今使弱燕為鴈行而強秦繼推其後是食烏喙之類也漢書曰宣帝許皇后産霍顯使醫搗附子入與后后崩淮南子曰夫天下之物莫凶於奚毒奚毒附子然而良醫橐而藏之有所用也抱朴子曰療聾或以狼毒冶葛或以附子蔥涕合內耳或蒸鯉魚腦灌之皆愈范子計然曰附子出蜀武都中白色者善楚國先賢傳曰孔休傷頰有瘢王莽曰玉屑白附子香消瘢乃以劍彘音滯并香與之荊州記曰宜都郡門生藥草有附子博物志曰物有同類而異用者烏頭天雄附子一物春夏秋冬采之各異大業拾遺記曰汾陽宮所甚出名藥數十種附子天雄並精好堪用本草經曰附子味辛溫出山谷治風寒咳逆邪氣寒濕痺癖拘緩不起疼痛溫中金瘡生牛犍為百藥之長吳氏本草曰附子名莨神農辛歧伯雷公甘有毒季氏苦有毒大溫或生廣漢八月採皮黑肌白天雄本草曰天雄味辛甘溫有大毒主大風破積藂邪氣強筋骨輕身健行長陰氣強志令人武勇力作不倦一名白幕生少室山谷淮南子曰天雄雄雞志氣益取天雄三枚內雄雞腹中搗生食之令人勇烏頭說文曰萴阻力切烏頭也爾雅曰芨居及反堇草郭璞注曰即烏頭江東今呼為堇梁冀傳曰冀迫殺大家母宣頭服丸而死後魏書曰胸奴秋收烏頭為毒藥以射禽獸范子計然曰烏頭出三輔中白者善崔實四民月令曰三月可採烏頭本草經曰烏頭一名烏喙一名葉毒一名萴味辛溫生川谷主治風中惡洗出汗除寒溫生朗陵吳氏本草曰烏頭一名莨一名千秋一名毒公一名果負一名耿子神農雷公桐君黃帝甘有毒正月始生葉厚莖方中空葉四面相當與嵩相似又曰烏喙神農雷公桐君黃帝有毒季氏小寒十月採形如烏頭有兩枝相合如烏之喙名曰烏喙也所畏惡使盡與烏頭同一名側子一名莨神農歧伯有大毒李氏大寒八月採陰乾是附子角之大者畏惡與附子同提母爾雅曰蕁音潭莐音沉藩音煩生山上提如韭一曰提母范子計然曰提母出三輔黃白者善吳氏本草曰知母一名提母神農桐君無毒補不足益氣五味爾雅曰菋荎豬五味也蔓生子藂在莖頭也未遲除三音聖賢家墓記曰孔子墓上五味樹抱朴子曰羡門子服五味十六年始降玉女能入水火本草經曰五味一名會及吳氏本草曰五味一名玄及典術曰五味者五行之精其子有五味淮南公美門子服五味十六年入水不濡入火不燋日行萬里雷丸范子計然曰雷丸出漢中色白者善本草經曰雷公丸一名雷矢味苦寒生山谷吳氏本草曰雷丸一名雷實神農苦黃帝歧伯桐君甘有毒扁鵲甘無毒季氏大寒或生漢中八月採藜蘆廣雅曰藜蘆蔥苒也本草經曰藜蘆一名蔥苒味辛寒生山谷主治蠱毒生太山范子計然曰藜蘆出河東黃白者善吳氏本草曰藜蘆一名蔥葵一名山蔥一名豐蘆一名蕙葵一名公苒神農雷公辛有毒黃帝有毒歧伯醎有毒季氏大毒大寒扁鵲苦有毒大葉根小相連二月採根虎掌本草經曰虎掌味苦溫生山谷治心痛寒熱吳氏本草曰虎掌神農雷公無毒歧伯桐君辛有毒或生太山或宛句立秋九月採貫衆爾雅曰濼貫衆孫炎曰一名貫渠郭璞注曰葉員鋭莖毛黑布地生冬不死也廣雅曰貫節衆也本草經曰貫衆一名貫節一名百頭一名貫渠一名虎卷一名扁符味苦微寒生山谷治腹中邪氣諸毒殺三蠱生玄山亦生宛句吳氏本草曰貫衆一名貫來一名貫中一名渠母一名貫鍾一名伯芹一名藥藻一名扁符一名黃鍾神農歧伯苦有毒桐君扁鵲苦一經甘有毒黃帝鹹酸一苦無毒葉青黃兩兩相對莖黑毛藂生冬夏不死四月華白七月實黑藂相連卷旁行生三月八月採根五月採葉冶葛周易參同契曰冶葛巴豆一兩入喉雖周文兆著孔丘占相扁鵲操針巫咸叩鼓安能蘇之唐書曰袁恕己與敬暉等纍被貶黜流于環州尋周利用左右逼令飲野葛汁數升不死因擊殺之恕己素服黃金故毒藥不發博物志曰魏武習啖冶葛至一尺亦多飲鴆近世事相傳云又曰鉤吻草與堇菜相似南州異物志曰廣州俚賊若鄉里負其家債不時還者子弟便取冶葛一名鉤吻數寸許到債家門食鉤吻而死其家稱怨誣債家殺之債家慚懼以財物辭謝多數十倍死家便收尸去不以為恨述異記曰晉義熙中有劉遁者居江陵忽有鬼來遁宅上遁貧無竈以升鎗煮飯飯欲熟輒失之尋覔於籬下草中但得餘空鎗遁密市冶葛煮以作麋鬼復竊之於屋北得鎗仍聞吐聲從此寂絶桓談新論曰余與劉子駿言養性無益其兄子伯玉曰天生殺人藥必有生人藥也余曰鉤吻不與人相宜故食則死非為殺人生也譬若巴豆毒魚礜石賊鼠桂害獺杏核殺狗天非故為作也論衡曰萬物含太陽者有毒在草為巴豆冶葛抱朴子曰中經曰鉤吻狼毒太陰之精氣主殺故入口令人死葛洪方曰鉤吻與食芹相似而生處無他草其莖有毛誤食之殺人本草經曰鉤吻一名野葛味辛溫生山谷主治金瘡中惡風咳逆上氣水腫殺蠱毒鬼注吳氏本草曰秦鉤吻一名毒根一名野葛神農辛雷公有毒殺人生南越山或益州葉如葛赤莖大如箭方根黃或生會稽東治正月採嶺表録異曰野葛毒草也俗呼胡蔓草誤食之則用羊血漿解之或說此草蔓生葉如蘭香光而厚置毒多著於生葉中不得藥解半日輒死山羊食其苗則肥而大芎藭春秋左傳宣公下曰楚師伐蕭還無社與司馬卯言號申叔展曰有山芎藭乎杜預注芎藭所以禦濕欲使無社逃泥水中說文曰芎藭香草也山海經注曰號山洞庭之山其草多芎藭郭璞注曰芎一名江籬吳録地志曰臨海縣有江籬草海水中正青如亂髮乾獻之亦鹽藏其汁名為濡酪楚辭所云籬是也范子計然曰芎藭生洽無枯者善遊名山志曰撗山諸小草多芎藭本草經曰芎藭味辛溫治中風入頭腦痛寒痺生武功吳氏本草曰芎藭一名香果神農黃帝歧伯雷公辛無毒香扁鵲酸無毒季氏生溫中熟寒或生胡無桃山陰或斜谷西嶺或太山葉香細青黑文赤如藁本冬夏藂生五月華赤七月實黑端兩葉三月採根根有節似如馬銜狀澤瀉典術曰食澤瀉身輕日行五百里走水上可遊無窮致玉女神仙一名澤之升麻廣雅曰周升麻升麻也本草經曰升麻一名周升麻味甘辛生山谷治辟百毒殺百老殃鬼辟溫疾鄣稚毒蠱久服不夭生益州華陽國志曰牧麻縣出好升麻吳氏本草曰升麻神農甘芍藥山海經曰條谷之草多芍藥洞庭之上多芍藥毛詩溱洧曰唯士與女伊其相謔贈之以芍藥毛詩香草也詩義疏曰今芍藥子無香氣非是也未審今何草司馬相如賦云芍藥之和揚雄賦曰甘甜之和芍藥之美然芍藥又入食也廣雅曰黑攣夷芍藥也晉宮閣名曰暉章殿前芍藥華六畦范子計然曰芍藥出三輔建康記曰建康出芍藥極精好本草經曰芍藥味苦辛生川谷主治邪氣腹痛除血痺破堅積寒熱瘕止痛吳氏本草曰一名其積一名解倉一名誕一名餘容一名白朮神農苦桐君甘無毒歧伯鹹李氏小雷公酸二月三月生澤蘭廣雅曰虎蘭澤蘭也建康記曰建康出澤蘭本草經曰澤蘭一名虎蘭一名龍來味微溫無毒生池澤治乳婦衄血生汝南又生大澤旁吳氏本草曰澤蘭一名水香神農黃帝歧伯桐君酸無毒季氏溫生下地水旁葉如蘭二月生香赤節四葉相值支節間三月三日採萆薢博物志曰菝蒲八切與萆薢相亂名狗脊吳氏本草曰萆薢一名百枝狗脊廣雅曰薜挈狗脊也本草經曰狗脊一名百丈味苦平生川谷治要背強開機緩急風痺寒濕膝痛利老人生常山建康記曰建康出狗脊吳氏本草曰狗脊一名狗青一名萆薢一名赤節一名強膂神農苦桐君黃帝歧伯雷公扁鵲甘無毒季氏溫如萆薢莖節如竹有剌葉圓青赤根黃白亦如根毛有剌歧伯一經莖無節黃白如竹根有剌葉端圓赤皮白有赤脈二月採壯蒙吳氏本草曰壯蒙一名紫參一名衆戎一名音腹一名伏莬一名重傷神農黃帝苦季氏小寒生河西山谷或宛句商山圓藂生根黃赤有文皮黑中紫五月華紫赤實黑大如豆三月採根白頭翁本草經曰白頭翁一名野丈人一名胡王使者味苦溫無毒生川谷治溫瘧癭氣狂易音羊生嵩山建康記曰建康出白頭翁范子計然曰野丈人出洛陽吳氏本草曰白頭翁一名野丈人一名奈何草神農扁鵲苦無毒生嵩山川谷治氣狂寒熱止痛枸杞廣雅曰地節枸杞抱朴子曰枸杞或名地骨或名卻老或名西王母杖或名仙人杖本草經曰枸杞一名杞根一名地骨一名地輔服之堅筋骨輕身耐老吳氏本草曰枸杞一名杞芭一名羊乳白及本草經曰白及一名甘根一名連及草味苦辛治癰腫惡瘡敗疽生北山晉宮閣名曰華林白及三株建康記曰建康出白及吳氏本草曰白及一名臼根神農黃帝辛季氏大寒雷公辛無毒莖葉如生薑黎盧也十月華直上紫赤根白連二月八月九月採生宛句
