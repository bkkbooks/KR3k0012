body:
  text: 文部十二誄釋名曰誄累也累列其事而稱之也說文曰誄謚也周禮春官下曰太史掌建邦之六典大喪執灋以涖勸防鄭司農云勸防引六紼遣之曰讀誄累其行而讀之而之謚也凡喪事孜焉為有得失小喪賜謚小喪卿大夫也禮記檀弓曰魯哀公誄孔丘曰天不遺一老莫相予位焉嗚呼哀哉尼父曾子問曰賤不誄貴幼不誄長禮也唯天子稱天以誄之諸侯相誄非禮也又檀弓上曰魯莊公及宋人戰於乘丘縣賁父御卜國為右馬驚敗績公墜佐車授綏公曰末之卜也縣賁父曰它日不敗績而今敗績是無勇也遂死之三人赴敵而死圉人浴馬有流矢在白肉公曰非其罪也流矢中馬非御與右之罪遂誄之士之有誄自此始也傳曰誄者累其行跡而為之謚也漢書曰景帝中二年春二月令諸侯王薨列侯初封及之國大鴻臚奏謚策應劭曰諸侯王皆屬大鴻臚故薨奏其行亦賜與謚及哀策詩文也列侯薨及諸侯太傅初除之官大行謚奏誄策師古曰大鴻臚本名典容行大令即典客之屬其行也官後改曰大行令如淳曰三公薨以策書誄其行東觀漢記曰杜篤字季雅客居美陽與美陽令遊數從之請託不諧頗相恨令怒收篤送京師會大司馬吳漢薨世祖詔諸儒誄之篤於獄中為誄辭最高帝美之賜帛免刑魏志明帝詔曹植曰吾既薄才至於賦誄特不閑從兒陵上還哀懷未散作兒誄為田家公語耳荅曰奉詔並見聖思所作故平原公主誄文義相扶章章殊興句句感切哀動聖明痛貫天地楚王臣彪等聞臣為讀莫不揮涕晉中興書郗超死之日貴賤操筆為誄者四十餘人其為物所宗如此齊書曰謝超宗有名譽善屬文為新安王子鸞國常侍王母殷淑儀卒超宗作誄奏帝大嗟賞謂謝莊曰超宗殊有鳳毛文章流別傳曰詩頌箴銘之篇皆有往古成文可放依而作惟誄無定制故作者多異焉見於典籍者左傳有魯哀公為孔子誄文心雕龍曰周世盛德有銘誄之文士大夫之才臨喪能誄誄者累其德行旌之不朽也夏商以前其詳靡聞周雖有誄未被於士又賤不誄貴幼而不誄長其萬乘則稱天以誄之讀誄定謚其節文大矣自魯莊戰乘丘始及於士迨尼父之卒哀公作誄觀其憖遺之辭嗚呼之歎雖非叡作古式存焉至柳妻之誄惠子則辭哀而韻長矣暨于漢世承流而作揚雄之誄元后文實煩穢沙鹿撮其要而執疑成篇安有誄德述遵而闊略四句孚杜篤之誄德有譽前代吳誄雖工而結篇頗踈豈以見稱光武而顧眄千金哉傅毅所製文體倫序孝山崔瑗辦潔相參觀其序事如傅辭靡律調固誄之才也潘岳搆意專師孝山巧於敘悲易入新麗所以隔代相望能徵厥聲者也至如崔駰誄趙劉陶誄黃並得憲章貴在簡要陳思功名而體實繁緩文皇誄末百言自陳其乖甚矣若夫殷臣誄湯追褒玄鳥之祚周史歌文上闡后稷之烈誄述祖宗蓋詩之則也至於序述哀情觸類而長傅毅之誄北海云白日幽光雰霞杳冥始序致感遂為後式影而效者彌取於切矣詳夫誄之為制蓋遐言以錄行傳體而頌文榮始而哀終論其人也瞬乎若可覿送其哀也悽焉如可傷此其旨也文心雕龍曰陳思之文群才之儁也而武帝誄云尊靈永蟄明帝頌云聖體浮輕輕浮有似於蝴蝶永蟄頗擬於昆蟲施之尊極不其蚩乎南史宋謝莊作宣貴妃誄曰贊堯門方之漢釣弋也及廢帝即位下莊于獄曰卿作此誄時知有東宮否列女傳曰柳下惠死門下將誄之妻曰將述夫子德耶二三子不若妾之知之乃為誄曰夫子之信誠與人無害兮嗚呼哀哉魂神泄兮夫子之謚宜為惠兮門人從之世說曰孫長樂作王長史誄云余與夫子交非勢利心猶淡水同此玄昧孝伯見云才士不遜亡祖何至與此人周旋又曰謝太傅問主簿陸退張憑何以作母誄陸荅曰故當是丈夫之德表於事行婦人之美非誄不顯弔文文心雕龍曰弔者至也詩云神之吊矣言神至也君子令終定謚事極理哀故賓之慰主亦以至到為言也壓溺乖道所以不弔矣又宋水鄭火行人奉辭國災人亡故同弔也及晉築虎臺齊襲燕城史趙蘇秦翻賀為弔害民構怨亦亡之道凡斯之例弔之所設也或驕貴以殞身或狷介以乖道或有志而無時或行美而兼累追而慰之並名為弔自賈誼浮湘發憤而弔屈體周而事覈辭清而理哀蓋首出之作也及相如之弔二世全為賦體桓譚以為其言惻愴讀者歎息及卒章意要切斷而能悲也揚雄序屈思積功寡意深文略故辭韻沈膇班彪蔡邕並敏於致詰然影附賈氏難為並驅耳故胡阮之弔夷齊褒喪而無文仲宣所製譏呵實工然則胡阮嘉其清王子傷其隘各其志也禰衡之弔平子縟麗而輕清陸機之弔魏武詞巧而文繁降斯已下未有可稱者矣夫弔雖古義而華辭未造華過韻緩則化而為賦固宜正義以繩理昭德而塞違析割褒貶哀而有正則無奪倫矣左傳莊十一年白秋宋大水公使弔焉曰天作淫雨害於粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱臧文仲曰宋其興乎禹湯罪己其興也勃焉桀紂罪人其亡也忽焉且列國有凶稱孤禮也言懼而名禮其庶乎史記曰相如從上至長楊還過宜春宮奏賦以哀二世行失也其辭曰東馳工山兮北揭石瀨弭節容與兮歷弔二世持身不謹兮亡國失勢信讒不寤兮宗廟滅絕墳墓蕪穢而不修魂無歸而不食漢書曰揚雄怪屈原文過相如至不容作離騷自投江而死悲其文未嘗不流涕也君子遇不遇命也何必沉身哉迺作書往往撫離騷文而反之自岷山投諸江流以弔屈原名曰反騷禰衡別傳曰南陽寇柏松記劉景升當蹔小出屬守長胡政令給視之柏松父子宿與政不佳景升不在柏松子在後羅人盜跡胡政無狀便爾殺之景升還慚悼無已即治殺胡政為作三牲醊焉正平為作板書弔之時當行在焉上駐馬授筆倚柱而作之禰衡弔張衡其辭曰南岳有精君誕其姿清和有理君達其機故能下筆繡亂揚手文飛昔伊尹值湯呂尚遇旦嗟矣君生而獨植漢倉蠅爭飛鳳凰已散元龜可羈河龍可絆石堅而朽星華而滅唯道與隆悠悠永絕靡君音與浮河水有竭君聲永流周旦先沒發夢孔丘余生雖後身亦存遊士貴知己君其勿憂糜元弔比干曰余既詰紂之後又感比干亢辭進諫不顧其身而受刳屠之戮殺身之後紂不悔寤適足快凶君之心而無益於世故復責而弔之糜元弔夷齊曰少承洪烈從戎子王側聞先生餓於首陽敢不敬弔寄之山岡嗚呼哀哉夫五德更運天秩靡常如有絕代之主必有受命之王故堯終于虞舜禹殄於成湯且夏后氏之末祀亦殷氏之所亡若周武為有失則帝乙亦有傷子不棄殷而餓何獨背周而深藏所行誰路而子涉之首陽誰山而子匿之彼薇誰菜而子食之行周之道藏周之林讀周之書彈周之琴飲周之水食周之茶而謗周之主謂周之淫是誦聖之文聽聖之音居聖之世而異聖之心束晢弔蕭孟恩文曰東海蕭惠孟恩者父昔為御史與晢先君同僚孟恩及晢旦夕同遊分義早著孟恩夫婦皆亡門無立胤時有伯母從兄之憂未獲自往致文一篇以弔其魂并修薄奠其文曰舊友人陽平束晢謹請同業生李察奉腵脩一束麥糒一器以致詞于處士蕭生之墓曰嗚呼哀哉精爽遐登形骸幽匿有耶亡耶莫之能測敬薦薄饋魂兮來食孟恩孟恩豈猶我識束晢弔衛巨山曰元康元年楚王瑋矯詔舉兵害太保衛公及公四子三孫公世子黃門郎巨山與晢有交好時自本郡來赴其喪作弔文一篇以告其柩曰同志舊友陽平束晢頃聞飛虎肆暴竊矯皇制禍集于子宗枋幾滅越自冀方來赴來祭遙望子弟銘旌藂立既闚子庭其殯盈十徘徊感慟載號載泣歛袂升階子不我楫引袂授祛子不我執魂兮魂兮於焉栖集李充弔嵇中散曰先生挺邈世之風資高明之質神蕭蕭以宏遠志落落以遐逸忘尊榮於華堂括卑靜於蓬室寧漆園之逍遙安柱下之得一寄欣孤松取樂竹林尚想榮莊聊與抽簪味孫觴之濁醪鳴七弦之清琴慕義人於玄旨詠千載之徽音凌晨風而長嘯託歸流而永吟乃自足於丘壑孰有慍乎陸沉馬樂厚而翹足龜悅塗而曳尾疇廟堂之是榮豈和鈴之足視久先生之所期差玄達於遐旨尚遺大以出生何殉小而入死嗟乎先生逢時命之不丁冀後凋於歲寒遭繁霜而夏零滅皎皎之玉質絕琅琅之金聲投明珠以彈雀捐所重而為輕諒心不爽非大雅之所營袁宏友李氏弔嵇中散曰宣尼有言曰唯仁者能好人能惡人自非賢智之流不可以褒貶明德擬議英哲矣故彼嵇中散之為人可謂命世之傑矣觀其德奇偉風韻劭邈有似明月之暎幽夜清風之過松林也若夫呂安者嵇子之良友也鍾會者天下之惡人也良友不可以不明明之而理全惡人不可以不拒拒之而道顯然夜光匪與魚目比暎三秀難與朝華爭榮故布鼓自嫌於雷門礫石有忌於琳琅矣嗟乎道之喪也雖智周萬物不能遣絕糧之困識達去留不能違顫沛之艱故存其心者不以一𤯝累懷檢乎跡者必以纖芥為事達人之獲譏懼高範之莫全凌清風以三歎予撫茲而悵焉聞先覺之高唱理極滯其必宣候千載之大聖期百五之明賢聊寄憤於斯章思慷慨男兒而泫然哀辭文章流別傳曰哀辭者誄之流也崔瑗蘇順馬融等為之率以施於童殤夭折不以壽終者建安中文帝臨菑侯各失稚子命徐幹劉禎等為之哀辭哀辭之體以哀痛為主緣以歎息之辭文心雕龍曰哀者依也悲實依心故曰哀也以辭遣哀蓋下流之悼故不在黃髮必施夭昏昔三良殉秦百夫莫贖事均夭枉黃鳥賦哀抑亦詩人之哀辭乎漢武封禪而霍嬗暴亡哀傷而作詩亦哀辭之類也降及後漢汝陽主亡崔瑗哀辭始變前式然腹穾鬼門怪而不辭駕龍乘雲僊而不哀又卒章五言頗似歌謠亦髣髴乎漢武也至於顯順張升並述哀文雖發其華而未極心實建安哀辭唯偉長差善行女篇時有惻怛及潘岳繼作實鍾其美觀其慮瞻辭變情洞悲苦敘事如傳結言摹詩促節四言鮮有緩句故能義直而文婉體舊而趣新金鹿澤蘭莫之或繼也原夫哀辭大體情主於痛傷而辭窮乎愛惜幼未成性故興言止於察惠弱不勝務故悼惜加乎容色隱心而結文則事愜觀文而屬心則體奢體奢為辭則雖麗不哀必使情往會悲文來引泣乃其貴耳班固馬仲都哀辭曰車騎將軍順文侯馬仲都明帝舅也從車駕於洛水浮橋馬驚入水溺死帝謂侍御史班固為馬上三十步哀辭南史曰劉孝綽三妹一適東海徐悱文尤清壯所謂劉三娘者也悱為晉安郡卒喪還建業妻為祭文詞甚悽愴悱父勉欲為哀辭見之乃閣筆三國典略曰齊文宣崩楊愔選其挽歌令樂署歌之其魏收四首陽休之祖珽劉逖各二首盧思道八首入用於是晉陽人謂思道為八采盧郎北營剌史李愔戲謂逖曰盧八問誶劉二逖每衘之至是愔上感思賦自陳文宣之世遭遇讒譖逖為帝奏其文誹謗先帝齊主怒令鞭之逖喜曰高搥三十熟鞭之百何如喚劉二時哀策文章流別傳論曰今所哀策者古誄之義世說曰王東亭夢人以大筆與之如椽子大覺曰當有大手筆事少日烈宗崩哀策謚議皆王所作國朝傳記曰禇遂良為太宗哀策文自朝還馬誤入人家而不覺也又曰崔融司業作武后哀文因發疾而卒時人以為三二百年來無此文
