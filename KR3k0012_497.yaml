body:
  text: 人事部一百三十七諺下漢晉春秋曰諸葛亮卒楊儀整軍而出宣王不逼百姓諺曰死諸葛走生仲達梁祚魏國統曰王昶字文舒戒兄子云諺曰救寒無若重裘止謗莫若自修斯言信矣張勃吳録曰陸稠字伯嬴為廣陵太守姦吏斂手廣陵諺曰解結理煩我國陸君韓詩外傳曰夫知惡往古之所以危亡而不知積其所以安存則無以異乎卻行而求逮於前人也鄙語曰不知為吏視已成事或曰前車覆後車戒江表傳曰諸葛亮表都護李嚴嚴少為郡職吏用性深剋茍利其身鄉里為嚴諺曰難可狎李鱗甲又曰典韋容貌魁傑名冠三軍其所持手戟長幾一尋軍中為之語曰帳下壯士有典軍手提雙戟八十斤又曰郭典字君業為巨鹿太守與中郎將董卓攻黃巾賊張寶於曲陽典作圍塹卓不肯典獨於西當賊之衝晝夜進攻寶由是城守不敢出時人為語曰郭君圍塹董將不許幾令狐狸化為豺虎賴我郭君不畏強禦轉機之間敵為窮虜猗猗惠君保完疆土又曰柳琮字伯騫所拔進皆為時所稱致位牧守鄉里為諺曰得黃金一笥不如為柳伯鶱所識皇甫謐達士傳曰繆斐字文雅代修儒學繼踵六博士以經行修明學士稱之故時人謂之語曰素車白馬繆文雅王祥別傳曰晉受禪時廊廟之士莫不歡容而祥色不加怡時人為之語曰王公恨恨有送故之情也張方賢楚國先賢傳曰諺曰黃尚為司隸姦慝自弭左雄為尚書令天下慎選舉荀氏家傳曰荀邃夫人有至行時歲荒每來糴者夫人恆叩其斛糴者歸量輒過其本時人號曰掾斛夫人陳留風俗傳曰許晏守偉君授魯詩於琅邪王改學曰許氏章句列在儒林故諺曰殿上成群許偉君曹操別傳曰呂布梟勇且有駿馬時人為之語曰人中有呂布馬中有赤免文士傳曰江應元時人諺曰嶷然希言江應元又曰留侯七世孫張讚字子卿初居吳縣相人里時人諺曰相里張多賢良積善應子孫昌習鑿齒襄陽記曰黃承産謂諸葛亮曰身有醜女才堪相配即載送之鄉里語曰孔明擇婦正得外醜也和苞漢趙記曰陳安奮刀左右俱發隴上語曰隴上壯士有陳安丈八蛇矛左右槃西京雜記曰韓嫣好彈以金為丸一日所失者十餘長安為之語曰若飢寒逐彈丸京師兒童每聞嫣出彈輒隨之望丸所落便拾取焉英雄記曰袁紹父成字文開貴盛自梁冀以下皆與交言無不從京師諺曰事不諧詣文開三輔決録曰馮豹字仲文後母遇之甚酷豹事之愈謹時人為之語曰道德彬彬馮仲文又曰五門子孫凡民之伍門今在河南西四十里澗穀洛三水之交傳聞馬氏兄弟五人共居此地作五門客舍因以為名主養豬賣豚故民為之語曰苑中三公館下二卿五門嚾嚾但聞豚聲又曰賈彪兄弟三人並有高名彪最優故天下稱曰賈氏三虎偉節最怒又曰游殷字幼齊為胡軫所害月餘軫得病但言伏伏游幼齊將鬼來於是遽死關中諺曰生有知人之明死有貴神之靈臨海異物志曰安家夷皆好噉猴頭羹諺言人寧負人千石之粟不願負人猴頭羹臛又曰䱥魚肥炙食甚美諺曰寧去纍世田宅不去䱥魚額風俗通曰趙王好大眉人間半額楚王好廣領國人沒項齊王好細腰後宮有餓死者又曰延嘉中常侍單超左琯徐璜具瑗唐衡在帝左右縱其姦逸時人為之語曰左回天徐轉日具獨坐唐應聲言信用甚於轉圓也又曰里語曰縣官漫漫怨死者半六韜曰天下攘攘皆為利往天下熙熙皆為利來列子曰周諺曰田父可坐殺晨出夜入自以性之恆啜菽茹藿自以味之極一朝處以軟毛綈薦以梁肉蘭味心㾓體煩內熱生病矣又曰揚朱曰古語有之生相憐死相捐此語至矣又曰趙子文曰國諺有言察見淵魚者不祥智料隱逸者殃且君欲無盜莫若舉賢而任之孟子曰齊人有言雖有智慧不如乘勢雖有鎡基不如待時齊人之諺語也乘勢居富貴之勢也鎡錤田器耒耜之屬也孔叢子曰平原君與子高飲強子高酒曰昔有遺諺堯舜千鍾孔子百觚子路嗑嗑尚飲百榼古之賢聖無不能飲也吾子何辭焉韓子曰鄙諺曰長袖善舞多錢善賈此言多資之易為工又曰古有諺曰為政猶沐也雖有棄髮之廢而有長髮之利也慎子曰諺云不聰不明不能為王不瞽不聾不能為公蔣子萬機論曰學者如牛毛成者如鱗角又曰猛虎不處卑勢徑鷹不立垂枝抱朴子曰桓靈曰舉秀才不知書察孝廉父別居寒素清白濁如泥高第良將怯如蠅又曰古人欲達勤誦經今世圖官勉治生商君書曰公孫鞅謂秦孝公曰臣聞之疑行無名疑事無功君亟定變法之慮殆猶天下之議語曰愚者暗於成事智者見於未萌邯鄲氏笑林曰桓帝時有人辟公府椽者倩人作奏記文人不能為作因語曰梁國葛龔者先善為記文自可寫用不煩更作遂從人言寫記文不去龔名姓府公大驚不答而罷歸故時人語曰作奏雖工宜去葛龔賈誼新書鄙諺曰欲投鼠而忌器此善喻也鼠近於器尚憚而弗投恐傷器也況貴大之臣近於主帝乎桓子新論曰關東諺語曰人聞長安樂則出門而西向笑知肉味美則對屠門而大嚼又諺曰侏儒見一節而長短可知孔子言舉一隅足以三隅反觀吾小時二賦亦足以揆其能否崔實政論曰每詔書所欲禁絶雖重懇惻罵詈極筆由復廢捨終無悛意故里語曰州郡記如霹靂得詔書但掛壁又曰一歲再赦奴兒噫唶況不軌之民熟不肆意應劭漢官儀曰里語云仕官不止車生耳蔡雍獨斷曰古幘無巾王莽頭禿乃始施巾故語曰莽頭禿幘如屋王朗貧窶語曰諺曰魯班雖巧不能為乞丐者顏魏武選令曰諺曰失晨之雞思補更鳴昔季闡在白馬有受金取婢之罪棄而弗問後以為濟北相以其能故曹植令曰諺云相門有相將門有將夫相者文德昭將者武功烈鬭爭左傳隱公曰鄭伯將伐許授兵於太宮公孫閼與潁考叔爭車潁考叔挾輈以走輈車轅也子都拔戟以逐之又襄二十六年曰秦伯之弟針如晉修成叔向命召行人子員欲使答秦行人子朱曰朱也當御御進也言當次行三云叔向不應子朱怒曰班爵同同為大夫何以黜朱於朝無劍從之叔向曰秦晉不和久矣今日之事幸而集晉國賴之不集三軍暴骨子員道二國之言無私子常易之姦以事君者吾所能御也拂衣從之人救之平公曰晉其庶乎庶幾於治吾臣之所爭者大師曠曰公室懼卑臣不心競而力爭不務德而爭善私欲已侈能無卑乎又襄五年曰楚伐鄭至於城麇鄭皇頡戍之出與楚師戰敗穿封戍囚皇頡公子圍與之爭之正於伯州犂正曲直也伯州犂曰請問於囚乃立囚伯州犂曰所爭君子也其何不知上其手曰夫子為王子圍寡君之貴介弟也下其手曰此子為穿封戍方城外之縣尹也誰獲子上下手以道囚意囚曰頡遇王子弱焉弱敗也言為王子所得戍怒抽戈逐王子圍史記曰蘭相如功大拜為上卿位在廉頗右頗曰我為趙將有攻城野戰之功相如徒以口舌為勞位居我上吾不忍為之下必辱之相如聞之不肯與會每朝常稱病不欲與頗爭列於是舍人請辭去相如曰強秦不敢加兵於趙者徒以吾兩人在也今兩虎共鬭勢不俱生所以先國家之急而後私讎也又曰彭越字仲常漁巨野中為群盜陳勝項梁起少年或謂越曰豪傑相立叛秦仲可效之越曰兩龍方鬭且待之又曰婁敬說上曰天與人鬭不扼其亢張晏曰亢嚨喉拊其背未能全其勝也今陛下入關而都案秦之故此亦扼天下亢而拊其背也又曰孔子去陳過蒲會公叔氏以蒲叛蒲人止孔子弟子公良孺者有勇力謂曰昔從夫子遇難於匡今遇難於此命也吾寧鬭而死鬭甚疾蒲人懼謂曰無適衛吾出子也漢書曰項羽謂漢王曰天下胸胸以吾兩人願與王挑戰決雌雄漢王笑曰吾寧鬭智不能鬭力也又曰大將軍霍光秉政諸霍在平陽奴客持刀兵入市吏不能禁及尹翁歸為市吏莫敢犯者又曰邴吉常出逢群鬭者死傷橫道吉過之不問掾史獨怪之吉曰民鬭相殺傷長安令京兆尹職所當禁也宰相不親小事又曰原涉遣奴至市買肉奴乘涉氣與屠者爭言斫傷屠者又漢書張耳贊曰張耳陳餘世所稱賢始居約時相然信死豈顧問哉及據國爭權卒相滅亡勢利之交古人羞之續漢書曰孝靈皇帝於後宮人為列肆販賣使相偷盜爭鬭上臨視之以為樂東觀漢記曰執金吾賈復在汝南部將殺人頴川捕得寇恂乃戮之於市復以為恥過頴川謂左右曰吾今見恂必手劍之恂知其謀不欲與相見恂曰昔蘭相如屈於廉頗者為國也乃勑屬縣盛供具一人皆兼二人之饌恂乃出迎於道稱疾還賈復勒兵欲追之而吏士皆醉遂過去恂以狀聞上乃徵恂恂至引見時復先在座欲起相避上曰天下未定兩虎安得私鬭又曰周黨字伯況太原人鄉佐發黨徭道於人中辱之黨學春秋長安聞復讎之義輟講下辭歸到與鄉佐相聞期鬭日卿佐多從兵往使卿佐先拔刀然後與相擊鄉佐服其義勇袁山松後漢書曰劉盆子居長樂宮赤眉諸將日會論功名自言欲為某王欲得某官爭言號呼拔劍相擊英雄記曰呂布字奉先劉備屯小沛袁術遣將紀靈步士三萬攻備備求救於布布率騎千餘馳赴之遣人招備並請靈等饗因謂靈曰布性不喜合鬭但喜解鬭耳蜀志曰劉封與孟達分爭不和封奪達鼓吹達遂降魏山海經曰刑夭與帝爭神帝斷其首葬之常羊之山神異經曰東北荒中有獸焉其狀如羊一角毛青四足似熊性忠而直見人鬭則觸不直聞人論咋不正名曰獬豸一名任法今御史用法冠俗曰獬豸冠也續搜神記曰晉太原中北地人陳良與沛郡民李焉共為賈後大得利焉殺良取物死十許日良忽蘇活得歸家說死時見周旋人劉舒舒久已亡謂良曰去年春社日祠祀家中鬭爭吾實忿之作一兕於庭前良故往報舒家其怪亦絶皇甫士安逸士傳曰高鳳鄰里有爭財鬭者兵刃相加鳳脫衣巾為叩頭曰仁義遜讓不可廢也爭財者投兵謝之而罷東觀漢記又載又曰管寧所居屯落會有汲者或男女雜錯或爭井鬭鬩寧患之乃買器分置井傍汲以待之各自相責不復鬭也會稽典録曰夏香字曼卿門側有大井上有瓦盆里中兒童各競飲牛爭水共鬭香豫為汲多置盆器由是無爭費禕別傳曰魏延與楊儀並坐爭論延或舉刃擬儀儀涕泣橫集禕常入坐其間諫喻分別石勒別傳曰勒微時居與邑人李陽相近陽性剛愎每輕勒與爭漚麻池共相打楪互有勝負吳越春秋曰伍子胥始吳時遇專諸於途專諸方與人鬭將就之適其怒有萬人之氣其妻一呼即還子胥怪而問其狀專諸曰夫屈一人之下必伸萬人之上列子曰昔共工與顓頊爭為帝怒觸不周之山折天柱絶地維胡非子曰胡非子修墨子教有屈將子恃勇聞墨者非鬭帶劍危冠往見胡非子劫而問之曰將聞先生非鬭而好勇有說則可無說則死胡非子為言五勇屈將子悅服尸子曰魯人有孝者三為母北魯人稱之彼其鬭則害親不鬭則辱羸矣不若兩降之韓子曰鄭人有相與爭年者一人曰吾與堯同年一人曰吾與黃帝兄同年訟此不決以後息為勝呂氏春秋曰楚之邊邑名曰卑梁其處女爭桑於境上戲而傷卑梁之女卑梁人以讓吳人吳人應不恭怒而殺之吳人往報之盡屠其家於是吳楚大爭淮南子曰佐祭者得嘗救鬭者得傷又曰三人同舍二人相與爭爭者各自以為直不能相聽一人雖愚必從而決之非以智也以不爭也說苑曰秦始皇太后不謹幸郎嫪毒封為長信侯專國事與侍中左右貴臣俱博飲酒醉爭言而鬭瞋目大呼桓子新論曰余前為典樂大夫有鳥鳴於庭樹上而府中門下皆為憂懼後余與典樂謝俟爭鬭俱坐免去風俗通曰臨淮有一人持一匹縑到市賣之道遇雨彼戴後人求共庇廕授與一頭雨霽當別因共爭各云我縑詣府自言丞相薛宣呼騎吏中斷縑各與半後人濫受因前撮之縑主稱怨宣然後知責之具服又曰俗說二人共澡手令人鬭爭良無異器當共澡者其祝曰人相愛狗相嚙言狗鬭時灑之以水便自解也又曰坐不移樽俗說移樽令人鬭爭典論曰汝南許劭與族兄靖俱避地江東保吳郡爭論於太守許貢座至於手足相及郭璞易洞林曰殷鴻喬令吾作卦得大壯之夬語之云慎勿與許姓者共事田作也必鬭相傷殷還宣成遂與許姓共田田熟有所爭此人舉杖欲撞之喬退思中間之戒辭謝僅乃得休夢書曰鶉鷃為鬭夢見鶉鷃憂間鬭也嵇康太師針曰若會酒坐見人爭語其形勢似欲轉盛便當捨去此鬭之兆也
