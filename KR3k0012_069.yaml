body:
  text: 地部三十三冰説文曰冰水水堅也澌流冰也易曰初六履霜堅冰陰始凝也馴致其道至堅冰也又曰乾為寒為水易通卦驗曰大雪魚負水鄭玄注曰負冰上近冰也詩曰二之日鑿冰沖沖三之日納于凌陰周禮曰凌人掌冰祭祀供冰鑑鑑如甀大口藏冰以御溫氣也賓客供冰大喪供夷盤冰夷盤大盤夏班冰賜群臣也又曰凌人掌冰正歲十有二月令斬冰三其凌三其凌三倍其冰禮曰孟冬之月水始冰地始凍仲冬之月冰益壯地坼鶡鳥不鳴虎始交又曰立春之日東風解凍又五日蟄蟲始振又五日魚上冰風不解凍號令不行魚不上冰兵甲不藏傳曰楚子使薳子馮為令尹遂以疾辭方暑闕地下冰而床焉重爾衣裘繭袍也禮玉藻曰藻績為繭縕為袍鮮食而寢楚子使醫視之復曰病則甚矣而血氣未動又曰春無冰梓慎曰今茲宋鄭其飢乎陰不勝陽也又曰日在北陸而藏冰西陸朝覿而出之其藏冰也深山窮谷固陰沍寒於是乎取之其出之也朝之祿位賓食喪祭於是乎用之其藏之也黑牡秬黍以享司寒其出之也桃弧棘矢以除其災祭寒而藏之獻羔而啓之火出而畢賦自命夫命婦至於老疾無不受冰山人取之縣人傅之輿人納之隸人藏之夫水以風壯而以風出而藏之也周其用之也遍則冬無愆陽夏無伏陰春無凄風秋無苦雨人不夭札孝經援神契曰高山之巔無樹深海之淵無冰剛太燥溫太柔也家語曰霜降而婦功成娶者行焉季秋霜降冰泮而農桑起婚禮殺焉史記曰薑嫄為帝嚳元妃出里見巨人迹悅欲踐之踐而身動如孕期而生子以為不祥棄渠冰上飛鳥以翼覆薦之薛瑩後漢書曰靈帝光和六年冬北海東萊琅邪井冰厚丈餘又曰光武至蘇上王郎使者至上發薊晨夜馳騖至曲陽呼沱河道吏還言河流澌無船不可渡遣王霸往視實然霸念恐驚衆即還曰冰堅可渡比至冰可乘帝遂得渡漢書曰朝錯上書曰夫胡貉之地積陰之處也木皮三寸冰厚六尺臧榮緒晉書曰王祥字休徵後母朱氏思生魚時河水冰堅祥朝朝冒厲風於河涯伺魚一朝忽冰開小穴有雙鯉跳出王隱晉書曰慕容皓上言正月十二日躬征平郭遠假陛下天地之威將士竭命精誠感靈海為冰結凌行海中三百餘里臣問故老初無海冰之歲平郭蓋近昌黎城也北齊書曰文宣時周人常懼齊兵之西度恆以冬月守河椎冰及後主即位朝政多紊齊人椎冰懼周兵之逼斛律光憂曰國家常有吞關隴之志今日至此東方朔神異經曰北方有冰萬里冰厚百丈鼷鼠在冰下土中焉其毛長八尺可為褥卻風寒王子年拾遺録曰東海員嶠山有冰蠶長七寸有鱗角以霜雪覆之始為繭其色五采織為文錦入水不濡投火不燎南燕録曰慕容德正月渡黎陽津流澌冰合鄴令韓軌言於德曰昔光武渡呼沱冰澌自合今大王濟河天橋自成德乃大悅異苑曰石勒伐劉曜於洛陽從大河南濟時河凍將合軍至而冰自泮舟楫無閡遂生擒曜謂是神靈之助又曰高平閭丘孝婦以元嘉中懷娠生一團冰得日便消液成水也吳越春秋曰越王念復吳怨非一旦也苦思勞心夜以接日冬寒則抱冰夏熱則握火趙書曰劉曜攻石勒將戰曜欲乘大赤馬無故蹢躅不可近於是退赤馬及合陳敗走曜體素壯馬小不勝陷冰為石堪所擒也博物志曰削冰令員舉以向日艾承其影則有火西京雜記曰漢制以酒滴為書取其不冰以玉為硯亦取其不冰也陸機洛陽記曰冰室在宣陽門內恆有冰天子用賜王公衆官戴延之西征記曰凌雲臺有水井延之以六月持去經日猶堅也述征記曰冰井在凌雲臺北古舊藏冰處鄧析書曰明君之御民若乘奔而去轡履冰而負重晏子曰景公伐魯得東門無澤問之魯年穀何如對曰陰水凝陽冰厚五寸晏子曰如是則寒溫節也寒溫節則政平政平則年穀熟請禮魯以息怨也老子曰渙若冰將釋莊子曰夏蟲不可以語於冰者篤於時也曲士不可以語於道者束於教也又曰朝受命而夕飲冰我其內熱歟孫卿子曰冰生於水而寒於水淮南子曰淮海有不死之草北方有不釋之冰又曰夫水向冬則凝而為冰迎春則釋而為水冰弛易乎前後又曰知一葉之落知歲將暮覩瓶中之冰而知天下之寒以近諭遠也論衡曰夫燻一炬火一鑊水終日而不熱也倚一尺冰置庖廚中終夜而不寒也風俗通曰積冰曰凌壯冰曰凍冰流曰澌冰解曰泮魏子曰居危殆之國治不善之民是猶薄冰當白日藂毛過猛火也抱朴子曰五玉不染而堅寒冰不礱而朗又曰蹈薄冰以待夏日登杇枝而須徑風新論曰畫水鏤冰與時消釋潮水説文曰潮朝也從水朝風土記曰俗説鯢一名海鰌長數千里穴居海底入穴則水溢為潮出穴則水入潮退出入有節故潮水有期祖台之志怪曰隆安中陳悝於江邊作魚䇻正匪切潮去於䇻中得一女人長六尺有容色無衣服水去不能動臥沙中與語不應人有就辱之悝夜夢云盾我是江黃昨失道落君䇻小人遂見加凌今當白尊神殺之悝不敢移潮來自逐水去姦者尋病死吳越春秋曰吳賜子胥劍而死乃投之江中子胥因揚波成濤隨潮往來博物志曰東海中有牛魚其魚形如牛剝其皮懸之潮水至則毛起潮去則復也臨海異物志曰石雞清響以應潮慧軀輕逝以遠潔石雞形似家雞在海中山上每朝水將至輒群鳴相應若家雞之向晨也裴淵廣州記曰石洲在海中名為黃山山北日一潮山南日再潮抱朴子曰糜氏云潮者據朝來也言夕至也一月之中天再東再西故潮水再大再小也又夏時日居南宿陰消陽盛而天高一萬五千里故夏潮大也冬時日居北宿陰盛陽消而天高一萬五千里故冬潮小也又春日居東宿天高一萬五千里故春潮漸起也秋日居西宿天高一萬五千里故秋潮漸減也又曰天河從北極分為兩頭至於南極其一經南斗中過其一經東斗中過兩河隨天轉入地下過而與下水相得又與海水合三水相蕩而天轉排之故激涌而成潮水又曰濤水者潮取物多者其力盛來遠者其勢大今潮水從東地廣道遠乍入狹處陵山觸岸從直赴曲其勢不泄故隆崇涌起而為濤俗人云濤是五子胥所作妄也子胥始死耳天地開闢已有濤水矣川説文曰川貫穿通流水也釋名曰川者穿地而流也易曰地險山川丘陵也王公設險以守其國又曰利涉大川書曰豫決九川距四海王肅曰九川者九州之川也又曰若濟大川用汝作舟楫又曰九山刊旅九川滌源禮曰天降時雨山川出雲周禮曰楊州其川三江荊州其川江漢豫州其川滎洛青州其川淮泗兗州其川河泲雍州其川涇汭幽州其川河濟冀州其川漳并州其川呼沱又曰兩山之間必有川焉大川之間必有途焉大戴禮曰聖人有國則川澤不竭蔡雍月令章句曰衆流注海曰川國語曰幽王二年三川皆震又曰厲王虐國人謗王邵公告王日民不堪命矣王怒得衛巫使監謗者以告則殺之國莫敢言道路以目王喜告邵公曰吾能弭謗矣乃不敢言邵公曰是鄣之也防民之口甚於防川川壅而潰傷人必多民亦如之是故為川決之使導為民宣之使言語曰子在川上曰逝者如斯夫不舍晝夜竹書記年曰藍田川有漢臨江王榮冢景帝以罪徵之將行祖於江陵北門車軸折父老泣曰吾王不反矣榮至都中尉郅都急切責王王年少恐而自殺葬於是川有燕數萬銜土置冢上百姓憐之水經注曰龍魚川澤漲不測出五色雲俗以為靈而莫敢採捕因謂是水為龍魚水自下亦通謂之龍魚川又曰祥川者漢戚夫人所生處也高祖得而寵之改其地為祥川用表夫人載誕之休祥也秦州記曰枹罕原北有鳳林川川中則黃河水東流莊子曰昔者禹之堙洪水決江河而通四夷九州名川三百支川三千小者無數方輿記曰清涼川在興道縣北唐史云德宗皇帝以朱泚之難幸梁洋中書舍人齊映從駕至此川見旌旗蔽野上心駭謂泚之追兵疾路至此見梁帥嚴震具軍容拜馬前敘君臣離亂流涕久之上喜令震登馬與朕作主人映曰嚴震與至尊導馬御膳自有所司頃之上次洋州行宮召映責以儒生不達兵機煙塵時務姑息主帥映奏曰山南士庶只知有嚴震不知有陛下且今天威親臨令巴蜀士民知天子之尊亦足以盡嚴震為臣子之節上歎之良久震聞特拜謝映時議多之即此川也
