body:
  text: 果部十二甘蕉晉宮閣名曰華林園芭蕉二株南夷志曰南詔土無食器以芭蕉葉藉之廣志曰芭蕉葅或曰甘蕉莖如荷芋重皮相裏大如盂升葉廣二尺長一丈子有角子長六七寸或三四寸生為行列兩兩共對若相抱形剝其上皮色黃白味似蒲萄甜而飽人其根大如芋魁大一石青色其莖解散如絲織以為葛謂之蕉葛雖脆而好色黃白不如葛色出交址建安南州異物志曰甘蕉草類望之如樹株大者一圍餘葉長一丈或七八尺廣尺餘二尺許花大如酒杯形色如芙蓉著莖未百餘子大名為房根似芋塊大者如車轂實隨菙每華一闔各有六子先後相次子不俱生花不俱落此蕉有三種一種子大拇指長而鋭有似羊角名羊角蕉味最甘好一種子大如雞卵有似牛乳味微減羊角蕉一種大如耦子長六七寸形正方少甘味最弱其莖如芋取以灰練之可以紡績異物志曰芭蕉葉大如筵席其莖如芋取鑊煮之為絲可紡續女工以為絺綌今交址葛也其內心如蒜鵠頭生大如合柈因為實房一房有數十枚其實皮赤如火剖之中黑剝其皮食其肉如蜜甚美食之四五枚可飽而餘滋味猶在齒牙間一名甘蕉顧徽廣州記曰甘蕉與吳花實根葉不異真是南土暖不經霜凍四時花葉展其熟其未熟時亦苦澀也南方草物狀曰蕉樹子房相連纍甜美亦可蜜藏遊名山志曰赤巖山水石之間唯有甘蕉林高者十丈卞敬宗甘蕉讚曰扶踈似樹質則非木扶留吳録地理志曰始興有扶留藤緣木而生味辛可以食檳榔蜀記曰扶留木根大如箸視之似柳根又有蛤名古賁生水中取燒為灰曰牡厲粉先以檳榔著口中又扶留長寸古賁灰少許同嚼之除胸中惡氣異物志曰古賁灰牡萬灰也與扶留檳榔三物合食而後善也扶留藤似木防己扶留檳榔所生相去遠為物甚異而相成俗曰檳榔扶留可以忘憂交州記曰扶留有三種一名穫扶留其根香美一名南扶留葉青味辛一名扶留藤味亦辛廣志曰扶留藤緣樹生其花實即蒟也可為醬左思吳都賦曰石帆水松東風扶留芋說文曰齊人謂芋為莒孝經援神記曰仲冬昴星中收莒芋宋均曰莒亦芋廣雅曰藉如水芋也亦曰烏芋漢書曰汝南郡有鴻隙大陂翟方進為丞相奏破之郡中追怨童謠曰壞陂誰翟子威飯我豆食羹芋魁漢書曰秦破趙遷卓氏曰吾聞岷山之沃野下有蹲鴟注曰蹲鴟芋也至死不飢乃求遠遷致之臨邛至僮百人崔鴻十六國春秋蜀録曰李雄剋成都衆甚飢餒乃將民就榖於郪掘野芋而食之南史孝義傳曰鮮于文宗漁陽人年七歲喪父父以種芋時亡至明年芋時對芋嗚咽如此終身汜勝之書曰區種芋法區收三石汝南先賢傳曰袁安字召公除陰平長時年飢荒民皆菜食租入不畢安聽使輸芋曰百姓飢困長何得食榖先自引芋吏皆從之汝南先賢傳曰薛苞歸先人冢側種稻芋稻以祭祀芋以充飢耽道說禮玄虛無為列仙傳曰酒客為梁承使民益種芋三年當大餓卒如其言梁民不死風土記曰博士芋蔓生根如鵝鴨卵華陽國志曰何隨字季業蜀郫人母亡歸送吏飢輒取道側民芋隨以帛繫其處使足所取直民相語曰聞何安漢清民取糧令為之償博物志曰野芋食之煞人家芋種之三年不收後旅生亦不可食廣志曰凡十四芋有君芋大如魁有車轂芋有旁巨芋有青邊芋此四芋魁大如瓶少子葉如繖蓋緗色紫莖長丈餘易熟長味芋之最善者也莖可作羹臛有蔓芋緑支生大者二三升有雞子芋色黃有百果芋畝收百斛有卑芋七月熟有九面芋大不美有蒙控芋有青芋有曹芋子皆不可食莖可為葅又有百子芋出葉榆縣有魁芋無旁子生永昌本草經曰芋土芝八月採左思蜀都賦曰瓜疇芋區菱爾雅曰菱厥郭璞注曰今水中芰也尚書大傳曰巨野菱巨野大野也魯藪今蜀山陽也周書曰冬食菱藕周禮天官下籩人職曰加籩之實菱國語曰屈到嗜芰有疾召其宗老而屬之屈到楚卿宗老家臣曰祭我必以芰及祥宗老將薦芰屈建命去之建屈到之子子木曰夫子不以私欲干國之典也漢書循吏傳曰龔遂為渤海太守勸民秋冬益蓄果實菱芡謝承後漢書曰袁閎父賀為彭城相亡閎到郡迎喪飢食菱芡渴飲行潦梁書曰魚弘為湘東王鎮西司馬述職西上道中乏食緣路採菱作菱飯給所部弘度之所後人覔一菱不得又於窮洲之上捕得獼猴數百為脯以供酒食淮南子曰楚靈王作章華之臺棄疾承民之怨而立公子比百姓避而去之乃食芰飲水枕塊而死呂氏春秋曰厲叔事莒閔公自以為不知而去居於海上夏日則食菱芡冬日則飧橡栗杜恕篤論曰夫蓱之浮與菱之浮相似也菱植根萍隨波是以堯舜歎巧言之亂德仲尼惡紫之奪朱風俗通曰殿堂象東井形刻作荷菱水物所以厭火也羅浮山記曰綏寧縣元龜淵中出菱甚為甘旨廣志曰巨野大菱大於常菱淮漢以南凶年以芰為蔬范汪祠制曰孟秋之祭菱芡楚辭曰制芰荷以為衣兮集芙蓉以為裳左思蜀都賦曰其沃嬴則有緑菱紅蓮潘嶽西征賦曰鳧躍漸唼喋菱芡郭璞江賦曰忽忘夕而宵歸詠採菱以叩舷曹植九愁曰採菱華而結辭孫楚論屈建文曰加籩之品菱芰存焉楚多陂塘菱芰所生父自嗜之而抑按宰祝既毀就養無方之禮又失奉死如生之義奪乎素欲建何忍焉芡周禮天官下籩人職曰加籩之實芡漢書曰龔遂為渤海太守勸民冬益蓄果實菱芡淮南子曰貍頭愈鼠雞頭已瘻音漏鼠齧人創貍愈之瘻頸腫疾雞頭水中草幽州謂之鴈頭亦愈瘻崔豹古今注曰芡雞頭也一名鴈頭一名菱葉似荷而大葉上蹙衄如沸實有芒剌其裏如珠可以療飢止渴方言曰䓈音役芡雞頭也北燕謂之䓈青徐淮泗之間謂之芡說文曰芡雞頭也廣雅曰南楚江湘之間謂之雞頭或謂之鴈頭本草經曰雞頭一名鴈實生雷澤劉騊駼玄根賦曰芳林臻臻朱竹離離菱芡吐榮若攄錦而布繡蓮爾雅曰荷芙蕖其實蓮蓮謂房也其中的蓮中子也的中薏中心苦者也毛詩陳宛丘澤陂曰彼澤之陂有蒲與蓮有美一人碩大且卷史記曰龜千歲遊於蓮葉之上焉吳時外國志曰大秦國有蓮藕雜果宋起居注曰元嘉十八年有司奏楊州刺史王濬解稱州治後池有兩蓮駢生雙房分體又十六年華林丞伍泳剌雙蓮同幹秀出華池宋起居注曰泰始二年八月嘉蓮雙葩並實合跗同莖生豫州鱧湖又六年雙蓮一蒂生東宮玄圃池三國典略曰齊主還鄴高麗新羅並遣使朝貢先是徐州蓮連一莖兩蒂占云異術蓮枝遠人入款斯其應也北齊書曰後主武平中特進侍中崔季舒宅中池內蓮莖皆作胡人面仍著鮮卑帽俄而季舒見煞三國典略曰周平齊齊幼主胡太后等並歸于長安初武成殂後有謠云千錢買果園中有芙蓉樹破券不分明蓮子隨他去調甚悲苦至是應焉又曰高緯所幸馮淑妃名小憐也後唐書曰監國張承業本朝舊人權貴任事人士脅肩低首候之唯馬郁以滑稽侮狎每賓僚宴集承業出異方珍果陳列於前客無敢先嘗者當郁前者食必盡承業私戒主膳者曰他日馬監至唯以乾蓮子置前而已郁至窺之知其不可啖異日靴中置鐵鎚出以擊之承業大笑曰為公易饌勿敗豫桉夏侯孝芙蓉賦曰緑房翠葉紫飾紅敷黃螺圓出垂蕤散鬚纓以金牙點以素珠孫楚蓮華賦曰攢藂星列纖離相扶皎若玄黎投幽夜粲若鄧林飛鵷雛樂府歌曰江南可採蓮蓮葉何田田藕爾雅曰荷芙蕖其根藕吳時外國志曰大秦國有蓮藕雜果齊書曰永明中巴東王子響殺行事劉夤等武帝聞之謂群臣曰子響遂反戴僧靜大言曰諸王應自反豈唯巴東武帝問其故答曰天王無罪而一時被囚一挺藕一杯漿皆咨籤師籤師不在則竟日忍渴唐史曰蘇州進藕其最上者名傷藕或云荷名或云葉甘為蟲所傷或云故傷其葉以長其根近多重臺荷蓋蓮寶中又生花亦甚異也司馬相如子虛賦曰咀嚼菱藕夏侯孝若芙蓉賦曰咀菱藕於玄泉謝眺詩曰秋藕折輕絲
