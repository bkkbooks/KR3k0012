body:
  text: 人事部二十六幼智下唐書曰李百藥字重規隋內史令德林子也為童兒時多疾病祖母趙氏故以百藥為之名七歲解屬文父友齊中書舍人陸乂馬元熙嘗造德林宴集有讀徐陵文者云既取成周之禾將刈琅耶之稻並不知其事百藥時侍立進曰傳稱鄅人藉稻杜預注云鄅國在琅琅開陽乂等大驚異之又曰禇亮字希明幼聰敏好學善屬文博覽無所不至經目必記於心喜遊名賢尤善談論年十八詣陳僕射徐陵與商榷文章深異之陳後主聞而召見使賦詩江總及諸詞人在坐莫不推善又曰陳叔達陳宣帝子年十餘歲侍宴賦詩十韻援筆便就僕射徐陵甚奇之又曰劉仁軌尉氏人也幼少恭謹好學遇隋末喪亂不遑專習每行坐所在輒書空畫地由是博涉文史又曰權德輿生四歲能屬詩七歲居父喪以孝聞十五日文數百篇編為童蒙集集十卷名聲日大又曰蔣乂字德源史官吳兢外孫以外舍富墳史幼便記覽不倦七歲時誦庾信哀江南賦數遍而成誦在口以聰悟強力聞於親黨間又曰高郢子定幼聰警絶倫七歲時讀尚書湯誓閭郢曰奈何以臣伐君郢曰應天順人不為非道又問曰用命賞于祖不用命戮于社是順人乎父不能對列子曰孔子東遊見兩小兒辨日問其故一小兒曰我以為日始出去人近而日中時遠一小兒曰我以為日出時遠而日中近一兒曰初出大如車蓋及中才如盤蓋此不為遠者小而近者大乎一兒曰日初出蒼蒼涼涼及其中如探湯此不為近者熱而遠者涼乎孔子不能決兩小兒笑曰孰為汝多知乎尸子曰蒲衣生八年舜讓以天下周王太子晉生八年而服師曠魯連子曰齊之辨士田巴辨於狙丘議於稷下毀五帝罪三王訾五伯離堅白合同異一日而服千人有徐劫者其弟子曰魯連連謂徐劫曰臣願得當田子使之必不復談可乎徐劫言之巴曰余弟子年十二然千里駒也願得待議於前可乎田巴曰可魯連得見曰今楚軍南陽趙伐高堂燕人在遼國亡在旦暮先生將奈何田巴曰無奈何魯連曰危不能為安亡不能為存無貴學士矣今先生之言有似梟鳴出聲人皆惡之願先生勿復談也田巴曰謹受教明日見徐劫曰先生之駒乃飛兔騕裊也豈特千里哉孔叢子曰孟子居尚幼請見子思子思見之甚悅其志命子上侍唑焉禮敬子居甚崇子上不願也客退子上請曰白聞士無介不見女無媒不嫁孟孺子無介而見大人説敬之白也未喻敢問子思曰然吾昔從夫子於郯遇程子於途傾蓋而語終日而別命子路將束帛贈焉以其道同於君子也今孟子居孺子也言稱堯舜性樂仁義世所希有也事之猶可況加敬乎又曰子和為臨晉令寢疾不瘳乃命其二子留葬焉二子長曰長彥年十有二次曰季彥年十歲父友西洛人姚進先有道徵不就養志于家長彥季彥常受教焉既除喪有先人遺書兄弟相勉諷誦不倦于時蒲坂令許君然造其宅勸使歸魯奉以車二乘辭曰載柩而反則違父遺命舍墓而去則心所不忍君然曰以孫就祖於禮為得願子無疑答曰若以死有知也祖猶鄰宗族焉父獨留此不已劇乎吾其定矣遂還其居於是甘貧研精墳典十餘年間會徒數百故時人為之語曰魯孔氏好讀經兄弟講誦可不聽學士來者有聲名不過孔氏郍得成郭子曰梁國楊氏子年九歲甚聰慧孔君平詣其父父不在乃呼兒為設果有楊梅孔指以示兒此實君家果兒應聲答曰未聞孔雀是夫子家禽周書曰晉平公使叔譽于周見太子晉與之言五稱三而窮李固別傳曰固被誅弟子汝南郭亮始成童遊學洛下乃詣闕上書乞收固尸不許因往臨哭喪不去太后聞而誅之孔融別傳曰孔文舉年四歲時每與諸兄共食梨引小者人問其故答曰我小兒法當取小由此宗族奇之又曰融十歲隨父詣京師聞漢中李公清節直亮慕之欲往觀其為人遂造公門謂門者曰我是公通家子孫也門者白之公曰高明父祖常與孤遊乎跪而應曰先君孔子與明公先李老君同德比義而相師友則融與公纍世通家坐衆數十人莫不歎息咸曰異童子也太中大夫陳煒後至曰人小了了大或未能佳少府尋聲答曰君子之幼時豈當惠乎李公撫抃大笑顧少府曰高明長大必為偉器范曄後漢書詣李膺也何晏別傳曰晏時小養魏宮七八歲便慧心大悟衆無愚智莫不貴異之魏武帝讀兵書有所未解試以問晏晏分散所疑無不冰釋邴原別傳曰原字根矩十一喪父家貧早孤鄰有書舍原過其傍而泣師問曰童子何罪原曰一則願其不孤二則羡其得學師亦哀原之言而為之曰童子茍有志我徒相教不求費也於是遂就書一歲之間誦孝經論語管輅別傳曰輅年八九歲便喜仰視星辰得人輒問其名夜不肯寐自言家雞野鵠猶尚知時況於人乎與比鄰兒共戲土壤中輒書地作天及日月星辰每答言説事語皆不常宿學耆人不能折之時年十五來在官舍始讀論語及易便開源布華辭義斐然于時黌上諸生四百餘人皆伏其才琅琊太守單子春雅有才度聞輅一黌之俊欲見之父遣輅造之大會賓客百餘人輅既年少懼失精神請先飲三升清酒然後與言子春大喜便酌酒獨使飲之子春曰吾自欲與輅旗鼓相當於是唱大語之端遂經乎陰陽子春及衆士卒共攻劫請難風起而輅答對言皆有餘至日向暮酒食不得子春語衆人曰此年少盛有才器聽其言語正似司馬子遊獵之賦何其磊硌雄壯英神秀茂必能明天文地理變化之數於是徐州號之神童傅宣別傳曰宣字世和北地泥陽人年十三而著河橋賦有文義傅嘏別傳曰嘏字昭先年八歲喪母號泣不絶聲自然之哀同於成人年十四始學疑不再問三年中誦五經皆究其義群言無不綜覽何禎別傳曰禎廬江潛人父他字文奇有俊才早卒禎在孕而孤生遇荒亂歸依舅氏齠齓乃追行喪哀泣合禮鄉邑稱焉十餘歲耽志博覽研精群藉名馳淮泗杜祭酒別傳曰君在孩抱之中異於凡童舉宗奇之年六七歲在縣北郭與小兒輩為竹馬戲有車行老公停車視之歎曰此有奇相吾恨不見徐邈別傳曰君諱邈字仙民東莞人歧薿朗慧聰悟七歲涉學詩賦成章趙至別傳曰至字景真代郡人流客緱氏令新之官至年十三與母共道傍觀母曰汝先世本非微賤家也世亂流離遂為士仵耳後能至此不至答曰可耳便求就師讀書早起聞父耕叱牛聲釋書而泣師問其故答曰自傷不能致榮使老父不免勤苦師大異之稱其當為奇器傅暢自敘曰暢字洪迎年四歲散騎常侍扶風曾叔虎以德量喜與余戲常解衣褶被脫余金環與侍者謂余當吝惜之而經數日不索遂於此見名言論甚重孝子傳曰華光字榮祖彭城人年七歲欲見父像求畫其父形像朝夕拜謁母有病輒呼天禱祠母即瘳愈每得珍甘置父像前劉向別傳曰楊信字子烏雄第二子幼而明慧雄筆玄經不會子烏令作九數而得之雄又疑易羝羊觸藩彌日不就子烏曰大人何不云荷戟入榛列子傳曰孔融被誅初女七歲男九歲以其幼弱得寄他舍主人有遺肉汁男渴而飲之女曰今日之渴豈得久活何賴知肉味乎兄號泣而止或言於曹操遂盡殺之及收至女謂兄曰若死者有知得見父豈非至願延頸就刑顏色不變文士傳曰張惇字子純與張儼及朱異俱童少往見驃騎將軍朱據聞三人才名欲試之曰為吾賦一物然後坐儼賦犬曰守則有威出則有獲韓盧宋鵲書名竹帛純賦席曰席為冬設簟為夏施揖讓而唑君子攸宜異賦弩曰南嶽之幹鍾山之銅應機命中獲隼高墉據大欣悅又曰桓驎字元鳳沛國龍亢人伯父焉知名官至太尉驎精敏年十三四在焉唑有宿客為詩曰甘羅十二楊烏九齡昔有二子今則桓生參差等蹤異世齊名驎即應聲答曰邈矣甘羅超等絶倫卓彼楊烏命世稱賢嗟豫蠢弱殊才侔年仰慚二子俯愧過言又曰劉楨字公幹少以才學知名年八九歲能誦論語詩論及篇賦數萬言警悟辨捷所問應聲而答當其辭氣鋒烈莫有折者又曰阮瑀少有雋才應機捷麗就蔡雍學歎曰童子奇才朗朗無雙又曰王弼字輔嗣山陽高平人幼聰達年十餘歲便能誦詩書讀莊老善通其意又曰杜育童孺奇才博學能著文章心解性達無所不綜一時稱為舞陽杜孔子三輔決録曰張既字德容為兒童郡功曹遊殷察異之殷先歸勑家設賓饌及既至殷妻笑曰張德容童昏小兒何異於客哉殷曰方伯之器也殷遂與既論霸王之略饗訖以子楚託之海內先賢傳曰童子汝南謝廣河南趙建年十二通經詔以為二童應化而皆拜郎中汝南先賢傳曰郭亮童幼之年則有尚義之心年十四始欲出學聞頴川杜周甫精黌多長杜亮造門而師學焉朝受其業夕已精講動聲則宮商清暢推義則尋理釋周甫奇而偉之又曰黃憲字叔度世貧賤父為牛醫頴川荀淑嘗至頴陽遇憲於逆旅時年十四淑竦然異之揖與語移日不能去謂曰子吾之師表也既而前至袁閬所曰子國有顏子寧識之乎閬曰君見叔度耶零陵先賢傳曰周不疑字文直長安人始嬰孩時已有奇異至年十三曹公聞之欲拜識既見即以女妻之不疑不受時有白雀瑞儒林並已作頌不疑見操授紙筆立令復作操異而奇之廣州先賢傳曰董正字伯和南海人少有令姿貧寒不戚耽意術籍志在規俗年十五通毛詩三禮春秋會稽先賢傳曰淳于長通年十七説宓氏易經貫洞內事萬言兼春秋鄉黨稱曰聖童益部耆舊傳曰張霸字伯饒蜀郡成都人也年數歲知禮義鄉人號為張僧子七歲通春秋復欲進餘經父母曰汝小未能也霸曰我饒為之故字伯饒會稽典録曰王充字仲任為兒童遊遊戲不好狎侮父誦奇之七歲教書數又曰餘姚伍賤字士微父為倉監失去官穀薄領罪至於死賤為執筆檢校相當由是見異號為神童江氏家傳曰江蕤字世林年十一始知樗蒲數以為遊祖母費為説往事有以博奕破業廢身者於是即棄五木終身不以為戲荀氏家傳曰勗字公魯年十二能通春秋屬文從外祖鍾繇甚奇之常稱此兒當繼司空又曰荀淑子爽字慈明一名諝幼而好學年十二能通春秋論語太尉杜喬見而稱之曰可為人師爽遂耽思經書慶吊不行徵命不應潁川為之語曰荀氏八龍慈明無雙華陽國志曰童子李餘涪人兄夷殺人亡命母慎當死餘年十三詣吏代母死吏以餘年小不許因自刎死吏以白令令哀傷言郡郡上書出慎太守與令以家財葬餘圖畫府庭涼州記曰武王呂光字世明以石氏建武四年生夜有光輝舉舍異之因名曰光年十歲與諸兄弟於里巷闕軍戲群童咸推為主割土處中部分行伍鄉黨皆稱之世説曰崔駰有文才不其縣令往造之駰子瑗年九歲書門曰雖無干木君非文侯何為入我里閭令見之問駰曰必兒所書召瑗使書乃書曰君使臣以禮臣事君以忠又曰徐孺子年九歲常月下戲人語之曰若令月中無物極當明矣徐曰不然譬如人眼中有瞳子無此可不暗乎又曰孔文舉有二子大者六歲小者五父眠小者床頭盜酒飲之大兒謂曰酒以行禮何以不拜答曰偷酒郍得復行禮又曰夏侯稱字義權自孺子而好合藂童兒為之渠帥戲必為軍旅戰陳之事有違者輒嚴以鞭捶衆莫敢逆父淵陰奇之使讀項羽傳及兵書不肯曰能則自為耳安能學人年十六淵與之畋見奔虎稱驅馬逐之一箭而倒名聞太祖把其手喜曰我得汝矣與文帝為布衣之交每宴會景陵一座辨士不能答世之高尚者從之遊弟榮字幼權幼聰慧七歲能屬文誦書日千言經目輒識文帝聞而請焉賓客百餘人人奏一剌悉書其鄉邑姓世所謂爵里剌也示之一過而使遍談不謬一人帝深奇之漢中之敗榮年十三左右提之走不肯曰君親在難焉所逃死乃奮劍戰遂歿又曰孫盛為庾公記室參軍從獵其第二兒齊莊俱行庾公不知忽於獵場見齊莊時年七八歲謂曰君亦復來耶應聲答曰所謂無小無大從公于邁又曰何晏年七歲明慧若神魏武帝奇受以晏母在宮內欲以為子晏乃畫地令方自處其中曰何氏之廬又曰鍾會少有令譽年十二三魏文帝聞之語父繇曰可令卿二子來於是命見育面有汗文帝問曰卿面何以獨汗育對曰戰戰惶惶汗出如漿復問會卿何不汗對曰戰戰栗栗汗不得出又曰王戎七歲常與諸小兒遊看道邊有李樹子壓枝折諸兒競走取之唯戎不去人問之答曰樹在道邊而子多苦李也取之信然又曰王濬沖裴叔則二人總角詣鍾士季客問鍾向二童是誰鍾曰裴揩清通王戎簡要二十年此二賢當為吏部尚書冀爾時天下無復滯才語林曰孫策年十四詣袁術俄而外通劉豫州來孫便求去袁曰劉豫州何若答曰英雄忌人既出下東階而劉備從西階上但得轉顧視孫足行殆不復前矣又曰劉道真年十六在門前弄塵垂鼻至胸洛下年少乘車從門過曰年少甚塠𡋙劉便隨車問為惡為善爾劉曰令君翁亦塠𡋙母亦塠𡋙上呼回反下徒回反
