body:
  text: 樂部十九簫釋名曰簫肅也其聲肅肅清也爾雅曰大簫謂之言小者謂之筊郭璞注曰言二十二管長尺四寸筊十六管長尺二寸簫一名籟也博雅曰簫大者二十三管無底小者十六管有底通禮義纂曰伏犧作簫十六管蔡雍曰簫編竹有底大者二十三管小者十六管長則濁短則清以密蠟實其底而增減之則和然則雍時無洞聲者矣易説曰夏至之樂補以簫簫長四寸鄭玄曰簫亦管形似鳥翼鳥火禽也火數七夏時火用事二七十四簫之長由此也三禮圖曰雅簫長尺四寸二寸四彄頌簫二寸十六彄仲夏之月令樂師均管簫簫長則濁短則清以密蠟實其底而增減之則和管成而音定無所復調當與琴瑟相參風俗通曰舜作簫其形參差象鳳翼十管長尺二寸白虎通曰簫者中呂之氣也尚書益稷曰簫韶九成鳳凰來儀毛詩臣工有瞽曰既備乃奏簫管備舉春秋説曰夏至作樂聞以簫笙周禮春官小笙師曰小笙師掌吹簫史記曰五子胥鼓腹吹簫乞食於吳市也又曰周勃吹簫給喪事謝承後漢書曰靈帝善鼓琴吹洞簫丹陽記曰江寧縣南三十里有慈姥山積石臨江生簫管竹王褒洞簫賦所稱即此也其竹圓緻異於衆處自伶倫採竹嶰谷其後唯此簳見珍故歷代掌給樂府而俗呼曰鼓吹涼州記曰呂纂咸寧二年有盜發張駿墓得白玉樽玉笛紫玉簫列仙傳曰簫史者秦繆公時人善吹簫能致孔雀白鶴繆公女弄玉好之以妻焉其後隨鳳去故秦人作鳳女祠於雍宮代有簫聲江表傳曰孫權攻合肥不下而還休兵皆上道權與呂蒙等在後魏將張遼奄至鼓吹驚怖不能復鳴簫唱甘寧援刀欲斫之於是始作之莊子曰南郭子綦謂顏成子遊曰汝間人籟曰而未聞地籟汝聞天籟郭象曰天籟簫也秦子曰一人執規十手自負一人吹簫長短皆應傳子曰馬先生能使木人吹簫比妙般輸墨翟不劣古矣笳杜贄笳賦序曰昔伯陽避亂入戎戎越之思有懷土風遂建斯樂美其出於戎貉之俗有大韶夏之音曹嘉之晉書曰劉疇曾避亂塢壁賈胡百數欲害之疇無懼色援笳而吹之為出塞入塞之聲動其遊客之思於是群胡皆泣而去蔡琰別傳曰琰字文姬先適河東衛仲道夫亡無子歸寧于家漢末大亂為胡騎所獲在左賢王部伍中春月登胡殿感笳之音晉先蠶儀注曰車駕住吹小菰發大菰即笳也又曰胡笳漢舊録有其曲不記所出本末笳者胡人卷蘆葉吹之以作樂也故謂曰胡笳夏仲御別傳曰激南楚吹胡笳風雲為之搖動星辰為之變度世説曰劉越石為胡騎所圍數重城中窘迫無計越石始乘月登樓清嘯胡賊聞之皆悽然長嘆中夜奏胡笳賊皆流涕人有懷土之切向曉又吹之賊並棄圍奔走笙釋名曰笙生也象物管地而生以匏為之其中空以受簧爾雅曰大笙謂之巢小者謂之和郭璞曰大笙列管匏中施簧也管端大者十九簧小音十三簧犍為舍人曰大笙音聲衆而高也小者音相和也白虎通曰笙之言施也牙也萬物始施而牙笙者太簇之氣也象萬物之生也故曰笙有七正之節焉有六合之和焉天下樂之故謂之笙古之善吹笙者有王子晉見列仙傳周靈王之太子也毛詩鹿鳴曰我有嘉賓鼓瑟吹笙吹笙鼓簧承筐是將尚書益稷曰笙鏞以間鳥獸蹌蹌孔安國曰間迭也吹笙擊鍾鳥獸仰德相率而舞蹌蹌然也禮記檀弓上曰孔子既祥五日彈琴而不成聲十日而成笙歌五日彈十日笙歌除曲外也琴以手笙歌以氣也又曰女媧之笙簧周禮曰春官笙師掌教吹笙鄉飲酒曰笙入奏南陔白華邯鄲綽五經折疑曰夫笙者法萬物始生導達陰陽之氣故有長短黃鍾為始象法鳳凰蔡雍月令章句曰季秋之月上丁入學習吹笙所以通氣也管簫笙竽塤箎皆以吹鳴者也穆天子傳曰西王母吟月吹笙鼓簧簧在笙中衷心翔翔民之子惟天之望呂氏春秋曰墨子見荊王衣錦吹笙竽易通卦驗曰冬至吹黃鍾之律間音以竽竽長四尺二寸鄭玄曰管類也竹為之形參差象鳥羽也周禮曰笙師掌教吹竽竽三十六簧也禮記月令曰仲夏之月命樂師調笙竽風俗通曰謹案禮記竽竹簧長四尺二寸今二十三管世本曰隨作竽楚辭曰代奏鄭衛鳴竽張伏獻駕辨楚勞商伏羲作琴造駕辨之曲楚人自作勞商之歌皆妙曲也通禮義纂曰漢武帝時丘仲作竽笙三十六管樂府雜録曰將竽形類小鍾以手捋之即鳴樂府圖曰吹竽有以知法度竽音調則度數得見列仙傳曰商丘子骨者高邑人也好牧豕吹竽年七十不取婦而老邑人乃奇怪之從受道問其要言但食木菖蒲根飲水不飢不老如此傳世見之三百餘年貴戚富室聞之取而服之不能終歲輒止墯慢矣謂將復有匿術也文心雕龍曰林籟結響諷如竽琴淮南子曰孟夏南方御女衣赤采吹笙竽煦也立春之氣煦生萬物也管三十六宮管在左右和十三宮管在中今之竽並以木代瓠而漆之無復八音矣荊梁之南尚仍古制桓談新論曰成少伯工吹竽見安昌侯張子夏鼓瑟謂曰音不通千曲以上不足以為知音韓子曰齊宣王使人吹竽有三百人南郭處士請為王吹粟食與三百人等宣王死文王即位一一聽之處士走或云韓昭侯田巖使一一聽之乃知其濫吹也新序曰楚王使謁者徐光迎方與盲人能吹竽者龔遂乃止簧毛詩曰巧言如簧又曰君子陽陽左執簧右招我由房陽陽無所用其心也漢書內傳曰西王母命侍女許飛瓊鼓震簴之簧世本曰女媧作簧宋均曰女媧黃帝臣也三禮圖曰雅簧上下各六神仙傳曰王遙有竹篋未嘗開後將茅子擔篋入石室室中有二人遙自取一枚以二枚與室中人對共鼓之潛夫論曰簧削鋭其頭有傷害之象塞蠟密有口舌之類皆非吉祥善應也塤世本曰塤暴新公所造亦不知何人周畿內有暴國豈其時人乎本作塤音許袁切圍五寸半長三寸半凡六孔宋均注云暴公國平王諸侯也樂書曰塤者喧也周平時暴辛公燒土為之説文云塤為樂器亦作塤也塤謂聲濁而喧喧然今雅樂部用也爾雅釋樂曰大塤謂之即塤也鋭上平底形象稱鍾大者如鵝子聲合黃鍾大呂也小者如雞子聲合太簇夾鍾也皆六孔與箎聲相諧故曰塤箎相應風俗通曰塤燒土為也圍五寸半長三寸半有四孔其二通凡六孔也塤一作塤字也
