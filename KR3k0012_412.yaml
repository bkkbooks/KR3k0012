body:
  text: 人事部五十二孝感孝經左契曰元氣混沌孝在其中天子孝天龍負圖地龜出書大孽消滅雲景出遊孝經援神契曰庶人孝則木澤茂浮珍舒恪草秀水出神魚此庶人謂有德不仕若曾子之孝千里感母能使其域致珍也東觀漢記曰明帝光武弟四子陰后所生即祚長思遠慕至踰年乃率諸王侯公主外戚郡國計吏上陵如會殿前禮正月上謁原陵夢先帝太后如平生親率百官上陵其日降甘露積於樹百官取以薦會畢上伏御床視太后鏡奩中物感慟悲涕令易脂澤粧具左右皆泣莫能仰視又曰薑詩字士遊廣漢雒人遭值年荒與婦傭作養母賊經其里束兵安步云不可驚孝子母好飲江水兒常取水溺死夫婦痛恐母知詐云行學歲作衣投于江中俄而涌泉出於舍側味如江水井旦出鯉魚一雙謝承後漢書曰方儲字聖明丹陽劍人幼喪父事母母終自負土成墳種奇樹千株白兔遊其下魏略曰程堅字謀角南陽居貧以磨鏡給養母喪哀號櫪下有馬每聞堅哭輒淚出暫輟芻草晉書曰王祥性至孝繼母朱氏不慈猶令除掃牛下祥愈恭謹父母有疾衣冠不解母令守奈實每風雨至抱樹而立母又思黃雀炙忽有十數黃雀飛入幕以共母食又母冬月欲食生魚祥脫衣剖冰求之雙鯉躍出鄉里以為孝感所致又曰吳隱之字處默年十歲丁父憂每號哭行人為流涕家貧無人鳴鼓每至號哭之時有雙鶴警叫及祥練之夕復有群鴈俱集時人咸以孝感所致晉中興書曰何琦字萬倫遭母憂停柩在殯為鄰火所逼煙熖已交家乏僮役計無從出乃匍匐棺所號哭而已俄而風止火息堂屋一間乃免又曰烏程吳達往經飢饉父母兄嫂及群從小幼之親十有三人達病篤鄰里咸葦褁衣而埋之親屬皆盡存者唯達夫妻而已家徒四壁晝則傭賃夜還燒磚伐木夜在山中屢遇虎虎下道避之夫妻勤苦期年中成七墓十二棺鄰里嘉上其志義葬日悉出助之太守張崇之義其志行加羔鴈之禮命補功曹史達以門寒固辭不就蕭子顯齊書曰永興王氏女年五歲得毒病兩目皆盲性至孝年三十父死臨尸一叫眼皆血出小妹娥舐其血左目即開時人稱為孝感崔鴻十六國春秋前趙録曰劉殷七歲喪父哀毀過禮曾祖母王氏盛冬思董殷年九歲乃於澤中慟哭收淚視地見有董生焉得斛餘而歸食而不減至董生乃盡其夜夢人謂殷曰西蘺下有粟窹而掘之得粟十五鐘焉銘曰七年粟百石以賜孝子劉殷自是食之七年乃盡又曰王延字延元西河人也九歲喪母後母卜氏遇之無道延供事彌謹卜恆取蒲穰及敗麻頭與延貯衣其姑聞而問之延知不言卜盛冬勑延云思生魚延求魚不獲卜杖之流血延尋汾叩凌而哭得生魚一雙長五尺卜食之積日不盡爾乃心窹撫延如親子秦記曰符健皇始元年晉梁州刺史司馬勳入秦州獲尚書趙琨煞而棄其尸琨子煥求父尸不得乃悲號不已俄有群鳥悲鳴從山而來來而復反尋鳥向山而得父尸南史曰潘綜吳興烏程人也孫恩之亂妖黨攻破村邑綜與父驃共走避賊驃年老行遲賊轉逼驃語我不能去汝走可脫幸勿俱死驃因之坐地綜迎賊叩頭曰父年老乞賜生命賊至驃亦請賊曰兒年少自能走今為孝子不去老子不惜死乞活此兒賊因斫驃綜抱父於腹下賊斫綜頭面凡四創綜當時悶絶又一賊從傍來相謂曰卿欲舉大事此兒以死救父爾何可煞煞孝子不祥賊乃止父子乃得免齊書曰匡昕字令先廬陵人有至性隱金華山服食不與俗人交母病亡已經七月昕奔還號叫母即蘇皆謂孝感所致齊春秋曰宗元卿字希符早孤為祖母所養祖病元卿在遠輒心痛大病則大痛小病則小痛如此常也又曰焦華父遺曾病甚冬中思瓜華忽夢人謂之曰聞爾父思瓜故送助養呼從者進之華跪受窹而瓜在手香非常也父食之而病愈又曰劉靈哲字文明母病祈禱至多忽夢一人以藥與之曰煮服之即差驚窹於枕間得所夢之藥似竹根服之立差餘根於齋前種葉似鳧茈莫有識者又曰蕭睿明字景懠在計切母病風積年晝夜祈禱時寒睿明下淚為冰筯額上叩血出亦冰不流忽有一人以小石函授之曰此能治丈夫百病睿明受之忽不見人以函奉母唯有三寸絹丹書為日月字母即平愈又曰解叔謙字楚梁母有疾於夜庭中祈祠聞空中云此疾無他得丁公藤為酒便差即詣醫及本草皆無識者乃求訪至宜都遙覩山中一老翁伐木問其所用答曰此丁公藤治風尤驗叔謙伏地流涕具款求意此公與之四段并示漬酒法叔謙拜領受之復視翁不見依法為酒母疾頓愈梁書曰陸襄字師伯常卒心痛醫方須三斗粟漿時屬凝冬日又暮矣求乞無所忽有老人詣門貨漿量如方斛始欲酬直無何失之時以襄孝感致焉又曰臧盾有孝性隨父宿直廷尉母劉氏在宅暴亡盾左手中指痛不得寢及曉宅信果報凶問其感通如此又曰甄恬字彥約數歲喪父哀戚有若成人年八歲問其母恨不識父悲泣纍日忽云有見形狀即其父也及母亡廬于墓有鳥玄黃色集于廬樹恬哭即鳴止則無聲陳書曰吳明徹幼孤性至孝年十四感墳塋未修家貧無以取給乃勤力耕種時天下亢旱苗稼燋枯明徹哀憤每之田中號哭仰天自訴居數日有田還者云苗已更生明徹疑其欺己及往如言秋而大獲足充葬用三國典略曰柳遐母嘗乳間發疽醫云須人吮膿遐應聲即吮旬日遂瘳咸以為孝感所致後魏書曰王崇字乾雍陽夏雍丘人也母亡扶而後起鬢髮墮落未及遷葬權殯宅西崇廬於殯所晝夜哭泣鳩鴿群生有一小鳥素質黑眸形大於雀棲於崇廬朝夕不去母喪始闋復丁父憂哀毀過禮是年陽夏風雹所經之處禽獸暴死草木摧折至崇田畔風雹便止禾麥十頃無所損落及過崇地風雹如初咸稱至行所感又曰吳遠達河東聞喜人父母為人所煞四時號慕悲感鄉鄰及長報仇避地永安後欲改葬歲月淹久亡失墳墓連年於聞喜舊鄉推尋弗獲號哭之聲晝夜不止周遊巡歷叫訴神祈忽於遠達足下地陷得父銘記因遷葬曾祖已下三世九喪後周書云張元字孝始芮城人年十六祖喪明三年元居常憂泣遂請七僧燃七燈七日七夜轉藥師經行道言曰元為孫不孝使祖喪明今日燃燈光普施法界願祖目見明元求代暗如此七日其夜夢見一老翁以金鞞療其祖目謂元曰勿憂悲也三日之後祖目必差如期果明唐書曰豫州人許坦年十歲餘父入山採藥父為猛獸所噬即號以杖擊之獸遂奔走父以得全太宗聞而謂侍臣曰坦雖幼童遂能致命救親至孝自衷深可嘉尚授文林郎賜物五十段又曰博州梁文貞虢州閿鄉人少從征役比回父母皆卒文貞恨不獲終養乃穿壙為門磴道出入晨夕灑掃其中結廬墓側未嘗暫息自是不言三十年家人有所問但畫字以對其後山水衝斷驛路更於原上開道經文貞墓前由是行旅之遠近莫不欽歎有甘露降塋前樹白兔馴擾開元初縣令崔季友刊石以紀之十四年刺史許先奏文貞孝行特絶泣血廬墓三十餘年請宣付史官又曰安金藏神龍初喪母葬於都南闕口之北廬於墓側躬造石墳石塔晝夜不息原上舊無水忽有湧泉自出又有李樹盛冬花開犬鹿相狎蕭廣濟孝子傳曰杜孝巴郡人也少失父與母居至孝充役在成都母喜食生魚孝於蜀截大竹筒盛魚二頭塞之以草祝曰我母必得此因投中流婦出渚乃見筒橫來觸岸異而取視有二魚含笑曰必我壻所寄熟而進之聞者歎駭又曰邢渠失母與父仲居性至孝貧無子傭以給父父老齒落不能食渠常自哺之專專然代其喘息仲遂康休齒落更生百餘歲乃卒也又曰隗通字君相母好飲江水常乘舟楫置之深浚艱辛忽有橫石特起直趍江脊後取水無復勞劇又曰辛繕字幼文母喪精廬旁有大鳥頭高五尺雞首燕領魚尾蛇頸備五色而青棲于門樹又曰文讓養母至及喪不用僮僕之力兄弟二人營築其墳暫歸取糧群鳥數千銜壤伯而成墳小説曰宋宜都王鏗三歲喪母及有識問母所在左右告以早亡便思慕蔬食祈請幽冥求一夢見至六歲夢見一婦人謂之曰我是汝之母鏗悲泣旦説之容貌衣服事事如平生也世説曰鄭子産善事母奉命聘晉道中心痛遣人還家起居問母母曰吾忽心體不調憶想汝耳更無他也祖台志怪曰吳中書郎盛仲至孝母王氏失明仲暫行勑婢食母婢乃取蠐螬蒸食之母甚以為美不知是何物兒還母曰汝行後婢進吾食甚甘然非魚肉汝試問之既而問婢婢服曰實是螬蠐仲抱母慟哭母目霍然立開宋躬孝子傳曰丘傑字偉跱吳興烏程人也遭母喪以熟菜有味不嘗於口病歲餘忽夢見母曰死正是分別耳何事乃爾荼苦汝噉生菜遇蝦蟆毒靈床前有甌甌中三丸藥可取服之傑驚起果得甌甌中有藥服之下科斗子數升丘氏世寶此甌宋大明七年災火焚失之又曰陳遺吳郡人少為郡吏母好鐺底燋飯遺在役常帶一囊每煮食輒録其燋以貽母後孫恩亂藂得數升常帶自隨及逃竄多有餓死遺食此得活母晝夜泣涕目為失明耳無所聞遺還入戶再拜號咽母豁然有聞見又曰韓靈珍東海郯人喪母三年貧無所葬與弟靈敏共種苽半畝欲以營殯及瓜熟採賣每朝取暮復生大小如初遂得充葬又曰夏侯欣字長況梁國寧陵人也母疾屢經危困欣衣不釋帶二年母不忍見其辛苦使出便寢息欣出便臥忽夢見其父來曰汝母病源深痼天常矜汝至孝賜藥在屋後桑樹上欣乃驚起如言得藥而取水和進之便得痊差又曰宋承字世林父資喪葬舊塋負土作墳不役僮僕一夕間土壞自高五尺松竹生焉又曰韋俊字文高京兆杜陵人嘗與其父共有所之夜宿逆旅時多虎將曉虎繞屋號吼俊乃出戶當之虎弭耳屈膝伏而不動俊跪曰汝飢可食我不宜驚吾親老虎逡巡而退屋人皆安全又曰伍襲字世長武陵人父沒羌中乃學羌語言衣服與賓客入搆羌諸令相攻襲乘其仇戎讎羌負喪而歸葬畢因居墓所每哭輒有鹿踞墳而鳴漢法死事之孤皆拜郎中而襲不忍受吏迫之乃掘室逃其中吏不知處又曰繆斐東海蘭陵人父忽患醫藥不給斐夜叩頭不寢不食氣息將盡至三更中忽有二神引鎖而至求斐曰尊府君昔經見侵故有怨報君至孝所感昨為天曹攝録斐驚起視父已差父云吾昔過伍子胥廟引二神像置地當是此耳又曰紀邁廬江人本姓舒以五月五日生母棄之村人紀淳妻趙氏養之年六歲本父母時來看語曰汝是我生邁泣涕告趙趙乃具言始末及年十歲傭力所得輒分二母各半淳亡無子邁乃斬衰三年本父母繼亡又並齊衰心喪三年趙欲為娶齋酒米往婚家道值醉人打趙體悶忽有一狗直至銜邁衣若此者三邁心動走赴婚家逢醉人適共舉酌於草中邁乃以簷煞二醉人趙歸得平乃詣縣首令宥之乃誓不娶後邁嘗寢忽有一女言姓衛昨忽暴死天神矜愍君無妻故使相報邁具説其狀母子至衛門外果如言送喪上車牛不肯動趙乃與主人具敘説之主人開柩女有氣息至曉便復蘇語具説始末如趙所言遂為夫婦趙卒邁絶復蘇者日數四邁年五十嘗病幾死夢神曰君行至孝延曆將得百歲果九十七而卒又曰王靈之年十三喪父二十年鹽醋不入口被病著床忽有一人來問疾謂之曰餐橘當差俄而不見之庭中橘樹隆冬乃有三實食之病尋愈咸以至孝所感會稽典録曰虞國少有孝行後為日南太守常有雙鴈宿廳事每出行縣飛逐其車既卒於官逐喪還至餘姚於墓前歷三年乃去又曰沈震字彥威烏程人十歲遭飢荒忽夜中有人告震曰西籬下地中有米五十石可供養旦夕即掘之果獲焉風俗通曰楊範字文端齊人齊宋之亂母在縣賊中採椹藏於地夜取之進母如是非一忽於地中得米十斛上有字云米十斛賜孝子楊範以資給母劉向孝子圖曰郭巨河內溫人甚富父沒分財二千萬為兩分與兩弟己獨取母供養寄住鄰有凶宅無人居者共推與之居無禍患妻産男慮養之則妨供養乃令妻抱兒欲掘地理之於土中得金一釜上有鐵券云賜孝子郭巨巨還宅主宅主不敢受遂以聞官官依券題還巨遂得兼養兒又曰前漢董永千乘人少失母獨養父父亡無以葬乃從人貸錢一萬永謂錢主曰後若無錢還君當以身作奴主甚慜之永得錢葬父畢將往為奴於路忽逢一婦人求為永妻永曰今貧若是身復為奴何敢屈夫人之為妻婦人曰願為君婦不恥貧賤永遂將婦人至錢主曰本言一人今何有二永曰言一得二理何乖乎主問永妻曰何能妻曰能織耳主曰為我織千匹絹即放爾夫妻於是索絲十日之內千匹絹足主驚遂放夫婦二人而去行至本相逢處乃謂永曰我是天之織女感君至孝天使我償之今君事了不得久停語訖雲霧四垂忽飛而去廣州先賢傳曰丁密字靖公遭父憂寢於冢側致飛鳧一雙遊密廬旁小池後遭母喪密至所居一宿故時雙鳧復來時人服其至孝朝野僉載曰崔渾為侍御史清白溫恭能盡色養父母母小不康輒祈幽請以身代母嘗有疾渾跪請病受己有頃覺疾從十指入俄而遍身母所苦遂愈丁父艱勺飲不入口毀脊骨立無何不勝哀而卒朝野傷心御史臺記曰崔希喬清河人也以孝悌稱解褐臨清尉丁母憂哀毀殆至滅性服闋補鄭縣尉清介公方聞乎京邑轉鄭縣丞所居堂芝草生焉一瞑而葩蓋盈尺矣州以狀申歲餘遷監察出授并州兵曹轉憑翊令人吏畏愛風化大行貧弱之輩荷其仁恕時有雲如蓋當其廳事斯須五色雜綵周於縣郭道俗仰望久之以狀聞勑編諸國史尋遷司勳員外其并州廳前有叢葦小鳥來巢如鷦鷯矣孕卵卯才數日殼毀而見已諭於母矣枝且不勝墜于地月餘五色成文如鵝馴擾間睱無復驚懼泊能飛翔時歸舊所人到于今稱為兵曹鳥初居喪管城每一哭群鳥畢集至于萬數墻宇皆遍至有樹條折者周於原野村鄰嗟稱之每所居其巢燕敷乳必返哺踰旬後分飛矣此孝義感通也史系曰趙俊字子奇平陽嶽陽人也父聃為縣西曹書佐嗜酒夜歸里墅橫臥途中俊年十八見父歸遲即尋迎之父醉負而不勝脫己衣覆之是時冬中沍寒方甚俊單衣而已嶽陽山多鷙獸夜有豹視之為之歧道而去將旦與父同歸縣吏異之時人以俊孝感所致父卒不呼相者自營丘封有白鵲常遊於其家棗樹俊每朝夕臨鵲為之悲鳴終喪而去會潞帥劉稹反家近潞封軍士齊討民散走時俊母年八十餘唯一子乃平其父墓別以物識之輦其母入文城西山妻蹇步捨之至山數宿妻方至逃難者多糇糧踴貴俊拾橡實飴之以木蜜供膳者終歲建稹滅復輦其母東歸嶽陽丘隴悉為軍盜所發唯俊家墓得完復起冢焉母卒哀毀過制縣令京兆韋伯倫知之給米粟蠲其家俊將葬母貧鬻其子質劑已定其夜夢一人謂曰爾舍東有錢百萬乃自發之及旦俊自舍東手掘之果得錢符夢數焉
