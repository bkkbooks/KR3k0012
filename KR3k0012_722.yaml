body:
  text: 方術部二醫一周禮天官下曰醫師掌醫之政令聚毒藥以共醫事凡邦之有疾病者疕瘍者造焉則使醫分而治之歲終則稽其醫事以制其食十全為上十失一次之十失四為下又天官疾醫職曰疾醫掌養萬民之疾病四時皆有癘疾春時有痟首疾夏時有癢疥疾秋時有瘧寒疾冬時有嗽上氣疾以五味五穀五藥養其病以五氣五聲五色視其死生兩之以九竅之變參之以九藏之動凡民之有疾病者分而治之死終則各書其所以而入于醫師瘍醫掌瞳瘍潰瘍金瘍折瘍之祝音注藥劀音刮殺之劑凡療瘍以五毒攻之以五氣養之以五藥療之以五味節之凡藥以酸養骨以辛養筯以鹹養脈以苦養氣以甘養肉以滑養竅凡有瘍者受其藥焉禮記曲禮曰君有疾飲藥臣先嘗之親有疾飲藥子先嘗之醫不三世不服其藥又王制曰凡執技以事上者祝史射御醫卜及百工又曾子問世子之記曰若內豎言疾藥必親嘗之左傳曰晉侯疾求醫於秦秦伯使醫緩為之緩醫名為猶治也未至公夢疾為二豎子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何肓心鬲也心下為膏醫至曰疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也公曰良醫也厚為之禮而歸之又襄三曰楚子使薳子馮為令尹訪於申叔豫叔豫曰國多寵而王弱國不可為也遂以疾辭方暑闕地下冰而床焉重繭衣裘鮮食而寢楚子使醫視之復曰瘠則甚矣而血氣未動乃使子南為令尹又昭元曰晉侯求醫於秦伯秦伯使醫和視之曰疾不可為也是謂近女室疾如蠱惑疾非鬼非食惑以喪志惑女色而失志良臣將死天命不祐良臣不匡救君過故將死而不為天所右公曰女不可近乎對曰節之先王之樂所以節百事也故有五節五聲之節遲速本未以相及中聲以降五降之後不容彈矣於是有煩手淫聲慆堙心耳乃忘平和君子弗聽也物亦如之至於煩乃舍也已無以生疾君子之近琴瑟以儀節也非以慆心也天有六氣謂陰陽風雨晦明也降生五味發為五色徵為五聲淫生六疾六氣曰陰陽風雨晦明也分為四時序為五節過則為菑陰淫寒疾陽淫熱疾風淫末疾雨淫腹疾晦淫惑疾明淫心疾女陽物而晦時淫則生內熱惑蠱之疾今君不節不時能無及此乎趙孟曰何謂蠱對曰淫溺惑亂之所生也於文皿蟲血為蠱穀之飛亦為蠱在周易女惑男風落山謂之蠱皆同物也趙孟曰良醫也厚其禮而歸之又昭五曰許悼公瘧飲太子止之藥卒太子奔晉書曰弒其君君子曰盡心力以事君舍藥物可也藥物有毒當由醫非凡君之名人所知譏上不舍藥物所以加弒尚書說命曰若藥弗瞑眩厥疾弗瘳開汝心以沃我心如服藥心瞑眩極其病乃除欲其出言以自警也論語曰子曰人而無恆不可以作巫醫帝王世紀曰伏羲氏仰觀象於天俯觀法於地觀鳥獸之文與地之宜近取諸身遠取諸物於是造書契以代結繩之政畫八卦以通神明之德以類萬物之情所以六氣六府五藏五行陰陽四時水火升降得以有象百病之理得以有類乃嘗味百藥而制九針以拯夭枉焉又曰炎帝神農氏長於姜水始教天下耕種五穀而食之以省殺生嘗味草木宣藥療疾救夭傷之命百姓日用而不知著本草四卷又曰黃帝有熊氏命雷公歧伯論經脈傍通問難八十一為難經教制九針著內外術經十八卷又曰歧伯黃帝臣也帝使歧伯嘗味草木典主醫病經方本草素問之書咸出焉素問曰黃帝坐明堂召雷公而問之曰子知醫之道乎雷公對曰誦而未能解解而未能別別而未能明明而未能彰足以治群僚不足至侯王願得受樹天之度四時陰陽合之別星辰與日月光以彰經術後世益明上通神農著至教疑於二黃帝曰善無失之此皆陰陽表裏上下雌雄相輸應也而道上知天文下知地理中知人事可以長久以教衆庶亦不疑殆醫道論篇可傳後世可以為寶世本曰巫咸堯臣也以鴻術為帝堯之醫史記曰扁鵲渤海鄭人姓秦名越人少時為人舍客桑君過扁鵲扁鵲獨奇之常謹遇之長桑君亦知扁鵲非常人乃呼鵲與語曰我有禁方年老欲傳與公公無泄乃出其懷中藥與扁鵲飲是以上池之水三十日當知物矣乃悉取禁方盡與扁鵲以其飲藥三十日視見垣外一方人以此視疾盡見五藏癥結特以診脈為名耳為醫或在齊或在趙趙簡子疾五日不知人召扁鵲入視疾出董安于問扁鵲扁鵲曰血脈滯也而何怪昔秦穆公嘗如此七日而寤居二曰半簡子寤語諸大夫曰我之常所甚樂與百神遊于鈞天廣樂九奏萬舞不類三代之樂其聲動心有一熊欲援我帝命我射之中熊熊死有羆來我又射之中羆羆死帝甚喜賜我二笥皆有副吾見兒在帝側屬我一翟犬曰及而子之壯也以賜之帝告我晉國且世衰七世而亡嬴姓將大敗周人於范魁之西而亦不能有也董安于受言書而藏之以扁鵲言告簡子簡子賜扁鵲田四萬畝其後扁鵲過虢虢太子死扁鵲至虢宮門下問中庶子喜百者曰太子何病國中治穰過於衆事中庶子曰太子病血氣不時交錯而不得泄暴發於外則為中害精神不能上邪氣邪氣畜積而不得泄是以陽緩而陰急故暴蹶而死扁鵲曰其死何時曰雞鳴時至今日收乎曰未也收謂棺斂其死未能半日鵲曰臣齊渤海秦越人也家在鄭未嘗得望清光侍謁於前也聞太子不幸而死臣能生之中庶子曰先生得無誕乎何以言太子之可生也臣聞上古之時醫有俞附治病不以湯液醴灑鑱石嬌引案杭毒尉一撥見病之應因五藏之輸乃割皮解肌訣脈結䈥搦髓折肓爪膜湔浣腸胃漱滌五藏鍊精易形先生之方能若是則太子可生也若不如是而欲生之曾不可以告孩嬰之兒扁鵲仰天嘆曰夫子之為方也若以管窺天以隙視文越人之為方也不待切脈望色聽聲寫形言病之所在聞病之陽論得其陰聞病之陰論得其陽病應見於大表不出千里決者至衆不可曲止也子以吾言為不誠試入診太子當聞其耳中鳴而鼻張循其兩股以至於陰當尚溫也中庶子聞扁鵲言目眩然而不能瞚舌橋然而不能下乃以扁鵲言入報虢君虢君聞之大驚出見扁鵲於中闕曰竊聞高義之日久矣然未嘗得拜謁於前也先生過小國幸而舉之偏國寡臣幸甚有先生則活無先生則棄捐溝壑長終而不反言未及畢因歔欷服皮力切臆涕泣撗流不能自止容貌變更扁鵲曰太子病者所謂尸蹶者也夫以陽入陰中動胃繵緣中經維絡別下於三焦膀胱是以陽脈下遂音墜陰脈上爭會氣閉而不通陰上而陽內行下內鼓而不起上外絶而不為使上有絶陽之絡下有破陰之紉破陰絶陽之色已廢脈亂故形靜如死狀太子未死也夫以陽入陰支蘭藏者生以陰入陽支蘭藏者死凡此數事者皆五藏蹶中之時暴作也良工取之拙者疑殆扁鵲乃使弟子子陽礪針砥石以取外三陽五會有間太子蘇乃使子豹為五分之尉以八減之齊和煮之以更尉兩臍下太子起坐更適陰陽但服湯二旬而復故故天下盡以扁鵲為能生死人扁鵲曰越人非能生死人也此自當生者越人能使之起耳扁鵲過齊齊桓侯客之入朝見曰君有疾在腠理不治將深桓侯曰寡人無疾扁鵲出桓侯謂左右曰醫之好利欲以不病者為功後五日復見曰君有疾在血脈不治將深桓侯曰寡人無疾扁鵲出桓侯不悅後五日扁鵲復見曰君有疾在腸胃不治將深桓侯不應扁鵲出桓侯不悅後五日扁鵲復見望桓侯退走桓侯使人問其故扁鵲曰疾在腠理湯尉所及其在血脈針石可理其在腸胃酒醪所能及其在骨髓雖司命無奈之何今在骨髓臣是以無請後五日桓侯體病使人召扁鵲鵲已逃遁焉桓侯遂卒扁鵲名滿天下旁遊六國至邯鄲聞趙貴女病扁鵲即為帶下醫過洛陽聞周人愛老人扁鵲即為耳目痺醫入咸陽聞秦人愛小兒即為小兒醫隨俗改變無所滯礙秦太醫令李醯自知伎不如遂密使人剌殺之又曰公孫光齊淄川唐里人善為古方及傳語法淳于意師之悉授其書意欲盡求他精方光曰吾方盡矣吾身已衰無所事之是吾少年所受妙方也公母以教人意曰悉得禁方幸甚死不妄傳人光喜曰公後必為國工臨菑楊慶有奇方吾不如之汝可謹事必得之意遂捨光而事慶焉又曰楊慶齊人也年七十餘有古先黃帝扁鵲脈書五色診病知人死生決嫌疑定可否治及藥論之書甚精妙又家自給富不肯為人治病亦不教子孫後淳于意以父道事之甚謹慶愛之盡以其禁方與之曰汝慎勿令我子孫知汝學吾此法意曰謹聞命矣意行用其方遂盡其妙焉又曰太倉公者齊太倉長臨淄人姓淳于名意少而喜醫方術更受師同郡元里公乘楊慶慶年七十餘無子使意盡去其故方更悉以禁方受之傳黃帝扁鵲脈書五色診疾知人死生多驗齊郎中令循病衆醫皆以蹶入中而剌之意診之曰湧疝也令人不得前後溲循曰不得前後溲三日矣意飲以火齊湯一飲得前後溲再飲得大溲三飲而疾愈淄川王美人懷子而不乳來召意意往飲以茛𦿆藥一撮以酒飲之旋乳意復診其脈躁躁者有餘疾即飲以消石一齊即出血如豆比五六枚濟北王侍者韓女病意診脈曰內寒月事不下也即竄以藥旋下病已病得之欲男子而不可得也菑川王病召意診脈曰蹶上為重頭痛身熱使人煩悶意即以寒水拊其頭剌足陽明脈左右各三所疾旋已病得之沐髮未乾而臥診如前所以蹶頭熱至肩齊王黃姬兄黃長卿家有酒召客意與諸客坐未上食意望見王后弟宋建吉曰君有病往四五日君腰脅痛不可以俯仰又不得小溲不亟治病即入濡腎及其未舍五藏急治之病方今在客腎濡此所謂腎痺也宋建曰然建故有腰脊痛往四五日天雨黃氏諸倩方言曰東齊之間壻謂之倩見建家京下方石京者倉廩之屬取弄之建炙欲效之效之不能起即復置之暮腰脊痛不能溺至今不愈建病得之好持重所以知建病者意見其色太陽色乾腎部上及界腰以下者枯四分所故以往四五日知其發也意即為柔湯使服之十八日而病愈臨菑女子薄吾病甚衆醫皆以為寒熱篤當死不治意診其脈曰蟯瘕蟯音饒蟯瘕為病腹大上膚黃粗循之戚戚然意飲以芫華一撮即出蟯可數升病愈三十日如故齊王侍醫遂病自鍊五石服之意往過之遂謂意曰不肖有病幸診遂也意即診之告曰公病中熱論曰中熱不溲者不可服五石石之為藥精悍公服之不得數溲亟勿服色將發癰遂曰扁鵲曰陰石以治陰病陽石以治陽病夫藥石者有陰陽水火之齊故中熱即為陰石柔齊治之中寒即為陽石剛齊治之意曰公所論遠矣扁鵲雖言若是然必審診起度量立規矩稱權衡合色脈表裏有餘不足逆順之法參其人動靜與息相應乃可以論論曰陽疾處內陰形應外者不加悍藥及鑱石夫悍藥入中則邪氣辟矣而宛氣愈深診法曰二陰應外一陽接內者不可以剛藥剛藥入則動陽陰病益衰陽病益著邪氣流行為重困於俞如喻切忿發為疽意告之後百餘日果病疽發乳上入𡙇盆死此所謂論之大體也必有經紀拙工有一不習文理陰陽失矣齊丞相舍人奴從朝入宮意見之食閨門外望其色有病氣意即告宦者平平好為脈學意所即示之舍人奴病告之曰此傷脾氣也當至春鬲塞不通不能飲食法至夏泄血而死宦者平即往告相曰君之舍人奴有病重死期有日相君曰何以知之曰君朝入宮君之舍人奴盡食閨門外平與倉公立公乃示平曰病如是者必死相即召舍人奴而謂之曰奴有病不舍人奴曰無病身無痛者至春果病四月泄血死所以知奴病者脾氣周乘五藏傷部而交外故傷脾之色也望之殺然黃殺蘇葛切察之如死青之滋衆醫不知以為大蟲不知傷脾所以至春死者胃氣黃氣黃者土氣也土不勝木故至春死所以至夏死者脈法曰病重而脈順清者曰內關內關之病人不知其所痛心急然無若若加以一病死中春一愈順及一時其所以四月死者診其人時愈順愈順者人尚肥也奴之病得之流汗數出炙於火而以出見大風也齊淳于司馬病意診其脈告曰當病迵音洞風迵風之狀飲食下嗌輒後之如廁也病得之飽食而疾走淳于司馬曰我之王家食馬肝飽甚見酒來即出驅疾至舍即泄數十餘出意告曰為火齊米汁飲之七八日當愈時醫秦信在旁意出信謂左右閣都尉曰意以淳于司馬病為何曰以為迵風可治信即笑曰是不知也淳于司馬病法當後九日死即後九日不死其家復召意意往問之盡如意診即為一火齊米汁使服之七八日病愈或問其故意曰診其脈時切之盡如法其病順故知不死又曰宋邑臨淄人師倉公授五診脈論之術
