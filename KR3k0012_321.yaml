body:
  text: 兵部五十一拒守下唐書曰乾符中元萬頃從李勣征高麗勣嘗令頃作文檄高麗其語有譏高麗不知守鴨綠之險莫離支報云謹聞命矣遂移兵固守鴨綠官軍不得入萬頃坐是流于嶺外又曰李光弼守太原自賊圍城城中張一小幕止宿有急即自往救之行至府門未嘗廻頭不復省視妻子賊退後收拾器械處置公事經三日然後歸家又曰史思明圍光弼於太原四面重圍十日不解每日使賊於陣前嫚罵光弼並戲弄城上人光弼使人穿地道以木撐之賊明日還於舊處立將戲之地道透遂把賊腳曳入地道中光弼得而對眾戮之城中大喜思明知事不集遂退歸河北又曰薛愿為頴川太守本郡防禦使時賊已陷陳留滎陽汝南等郡方圍南陽頴川當其來往之路愿與防禦副使龐堅同力固守城中儲蓄無素兵卒單寡自至德元年正月至十一月賊晝夜攻之不息距城百里廬舍墳墓林樹開發斬徹殆盡而外救不至賊將阿史郍承慶悉以銳卒併攻為木驢木鵝雲梯衝棚四面雲合鼓噪如雷矢石如雨力攻十餘日城中守備皆竭賊夜半乘梯而入而愿堅俱被執送於東都將支解之或說祿山曰薛愿龐堅義士也人各為其主屠之不祥乃繫於洛水之濱屬苦寒一夕凍死又曰張巡守睢陽在城中每戰登陴大呼以助威皆血流面牙齒皆碎城將陷西向再拜曰為救不至臣智勇俱竭不能全一城今使逆賊見逼臣死之後願為鬼與賊為厲以荅國恩及城陷尹子奇見巡問之曰聞公每督戰皆裂齒碎實有之否巡應之曰然子奇曰何以至此曰欲得殺逆賊遂至於此子奇以大刀剔其口見其存者不過三數巡因大詬罵子奇責以悖逆損害平人子奇欲存之左右曰此人必不為我用又得眾死心不可留故害之又曰史朝劉昌在圍中連月不解城中食盡賊垂將陷之刺史李岑計蹙昌為之謀曰今河陽有光弼制勝且江淮足兵此廩中有數千斤趜可屑以食眾計援兵不二十日當至東南敵眾以為危昌請守之昌遂被鎧持盾登之陳逆順以告諭賊之眾甚畏之後十五日副元師李光弼救軍至賊乃霄潰光弼聞其謀召置軍中超授試左金吾衛郎將又曰元和中鄂岳都團練使李道古攻申州剋其羅城乃進圍逼其中城城中守卒夜師婦人登城而呼懸門竊發分出其眾道古之眾驚亂多為虜殺又曰王凝為宣州黃巢自嶺表北歸大掠淮南攻圍和州凝令牙將樊儔舟師據採石以援之儔違令凝即斬之以徇命別將馬頴代儔赴援竟解歷陽之圍賊怒引眾攻宣城大將王涓請出軍逆戰凝曰賊忿而來宜持重待之彼眾我寡萬一不捷則州城危矣涓銳意請行凝即閱集丁壯分守要害登陴設備涓果戰死賊乘勝而來則守有備矣賊為梯衝之具急攻數月禦備力殫吏民請曰賊之兇勢不可當願尚書歸疑退之懼覆尚書家族凝曰人皆有族子豈獨全誓與此城同存亡也既而賊已退去時乾符五年也又曰王栖曜為常州別駕時江左兵荒詔內常侍馬日新領汴滑五千人鎮之日新貪暴賊蕭庭蘭乘人怨訴逐之而劫其眾時栖曜遊弈遠郊遂為賊所脅進圍蘇州栖曜因其懈怠挺身登城率城中出攻賊眾大潰又曰張伾建中初以澤潞將鎮臨洺田悅攻之伾度兵力不能出戰嚴設守備嬰城拒守賊不能拔累月攻之益急士多死傷糧儲漸乏救兵未至伾知事不濟無以激士心乃悉召將卒於軍門命其女出拜之謂曰將士辛苦守戰伾之家無尺寸物與公等為賞獨有此女幸未嫁人願出賣之為將士一日費眾皆大哭曰誓與將軍死戰幸無慮也會馬燧以太原之師至與軍眾合擊悅於城下大敗之伾乘勢出戰士卒無不一當百圍解以功遷泗州刺史三國典略曰周獨孤永業恐洛州刺史叚思文不能自固馳入金墉助守尉遲逈為士山地道曉夕攻戰永業選其三百人為爪牙每先鋒死戰逈不能剋又曰臺城朱陷侯景又燒大司馬門後閣舍人高善寶以私金千兩賞其戰士直閣將軍宗思領將士數人踰城出外灑水久之火滅景又遣持長柯斧入門下斫門將開羊促鑿扇為孔以槊刺倒二人斫者乃退又曰陳人侵齊北徐州刺史祖班令不閉城門守陴者皆下街巷禁斷人行雞犬不許鳴吠陳人莫測所以疑人走城空不設警備中夜班忽令鼓譟陳人驚散曉復結陳向城班自臨戰陳人先聞其盲謂不能抗拒忽見親在戎行彎弧縱鏑怪之遂退時穆提婆憾之不已欲令城陷不遣救援班軍守百日城竟保全北史曰梁將吳明徹攻圍海西齊將郎基固守乃至削木為箭翦紙為羽圍解還朝僕射楊愔迎勞之曰卿本文吏遂有武略削木剪紙皆無故事班墨之思何以相過墨子曰禽滑厘問曰雲梯施攻備已具武力又多爭上吾城為之奈何墨子曰多下矢石灰以雨薪火水湯以濟之若城外穿地來攻者宜城中掘於井以薄甖內井中使聽聰者伏甖聽之審知穴處鑿內而迎之呂氏春秋曰公輸般為高雲梯欲以攻宋墨子聞之自魯而往裂裳裹足日夜不休十日十夜而至於郢見荊王曰臣北方之鄙人也聞大王將攻宋信有之乎王曰然墨子曰臣以宋必不可得公輸般天下之攻工也已為攻宋之械矣墨子曰請公輸般試攻之臣請試守之於是公輸般設攻宋之械墨子設守宋之備公輸般九攻之墨子九卻之不能入故荊輟不攻宋墨子也能以術禦之荊而存乎宋矣博物志曰處士東里魂責禹亂天下事禹退作三城強者攻弱者守敵者戰城郭蓋禹始也賈誼過秦論曰有囊括四海之意并吞八荒之心當是時也啇君佐之命內立法度務耕織脩守戰之備外連衡而鬥諸侯又曰然後踐華為城固河為池據億丈之城臨不測之谿以為固良將勁弩守要害之處信臣精卒陳利兵而誰奈何任彥昇奏彈曹景宗曰故司州刺史蔡道恭率勵義勇奮不顧命全城守死自冬徂秋猶轉戰戰窮極摧醜虜危急韓子曰智伯圍襄子於襄陽決水以灌之城中巢處懸釜而炊易子食折骨炊史記曰楚莊王圍宋五月不解宋城中食盡易子而食析骨而炊宋華元出告以情莊王曰君子哉遂罷兵去又曰齊田單攻聊城歲餘不下魯連乃為書繼之矢射城中遺燕將書曰今公以弊聊人之距全齊之兵是墨翟之守也食人炊骨士無反心是孫臏之兵也又曰趙襄子保晉陽三國攻晉陽歲餘引汾水灌其城不沒者三板城中懸釜而炊易子而食漢記曰叚熲破羌胡明年羌復寇張掖熲下馬大戰弓刀折盡虜亦引退追之晝夜攻擊割內食雪四十餘日後漢書曰車師王與匈奴共攻耿恭於䟽勒中恭食盡乃煮鎧弩食其筋革又曰臧洪為東郡太守為袁紹所圍初尚掘鼠煮筋角後無所食取草實而食之魏志曰太祖圍張超於雍丘超言唯臧洪當來救吾眾人以為袁曹方穆洪為紹所表用必不敗好招禍洪聞之果徒跣號泣勒所鎮又從紹請兵馬救超紹不許遂為太祖所滅洪由是怨紹紹興兵圍之歷年不下紹忿洪無降意增兵急攻洪自度不得免呼吏士謂曰袁氏無道所圖不軌且不救洪郡洪於大義不得不死念諸君無事空興此禍耳可將妻子去吏士皆垂泣掘鼠煮筋角後無所食主簿啟內廚米三斗洪使作薄粥眾分醊之殺其愛妾以食士城中男女七八千人相枕而死莫有離叛城陷紹生執洪徐廣晉紀曰霍彪為賊貴黑所隔積百日殺馬燒皮鎧食之又曰韓晃蘇碩等攻苑城中飢米一㪷萬錢晉書劉崑赴并州上表曰臣自涉州彊目覩困之流移四散十不得存二攜老扶弱不絕於路及其在者鬻賣妻子生相捐棄死亡委厄白骨橫野哀呼之聲感傷和氣群胡數萬周匝四山動足遇掠開目覩寇唯有壺關可得告糴而此二道九州之險數人當路則百夫不敢進公私往反沒喪者多嬰守窮城不得薪菜耕牛既盡又乏田器以臣愚短當此至難憂如循環不遑寢食晉中興書曰中宗初鎮江左假郄鑒龍驤將軍兗州刺史徐龕石勒左右交侵鑒收合荒散保固一山隨宜抗對百姓飢饉掘野鼠蟄鷰而食之三十六國春秋曰蜀王李雄攻譙登于涪城無救援登固守不下士卒皆燻鼠食之一無叛者宋書曰朱脩之留府滑臺乃為索虜所攻圍脩之糧盡救兵不至將士燻鼠食之城陷為虜所執上嘉其節蕭子顯齊書曰魏遣魏郡王元英圍南鄭退入斜谷天大雨軍馬浛截竹炊米於馬上持炬吹而食之隋書曰李密聞行人關被囚於京兆與王仲伯亡抵平原賊帥郝孝德不甚禮之備遭飢饉至削樹皮食之矣
