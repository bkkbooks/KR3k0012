body:
  text: 封建部一敘封建周禮夏官職方氏曰乃辨九服之邦國方千里曰王畿其外方五百里曰侯服又其外方五百里曰甸服又其外方五百里曰男服又其外方五百里曰采服又其外方五百里曰衛服又其外方五百里曰蠻服又其外方五百里曰夷服又其外方五百里曰鎮服又其外方五百里曰藩服凡邦國千里封公以方五百里則四公方四百里則六侯方三百里則七伯方二百里則二十五子方百里則百男以周知天下史記曰太史公曰殷以前尚矣周封五等公侯伯子男然封伯禽康叔於魯衛地各四百里親親之義褒有德也太公於齊兼五侯地尊勤勞武王成康所封數百而同姓五十地上不過百里下三十里以輔衛王室又曰高祖定天下田橫猶居海島帝喻之曰橫來大者王小者侯又曰齊威王召即墨大夫而語之曰自子之居即墨也毀日至然吾使人視即墨田野辟民人給官無事東方以寧是子不事吾左右以求譽也封之萬家又曰鄒忌以鼓瑟見齊威王王悅之三月而受相印淳于髡見之曰善説髡有愚志願陳諸前髡説畢即出至門而語其僕曰是人者吾説之微言其應我若響之應聲是必封不久矣漢書曰李廣與望氣王朔語自漢擊胸奴廣未嘗不在其中而諸校尉材能不及中以軍功取侯者十數人廣不為人後然終無封邑者何也豈吾相不當侯耶朔曰將軍自念豈有所恨者乎廣曰吾為隴西太守羌嘗反吾誘降八百餘人詐而同坑曰禍莫大於殺降此乃將軍所以不得侯也東觀漢記曰上封功臣皆為列侯大國四縣餘各有差博士丁恭等議曰古帝王封諸侯不過百里故利以建侯取法於雷上曰古之亡國皆以無道未嘗聞封功臣地而滅也又曰馮勤為郎中給事尚書以圖議軍糧在事精勤遂見親識由是使典諸侯封事百官表注記曰王者之制公侯伯子男凡五等上大夫卿下大夫上中士下士凡五等周興隆三聖制法立爵五等封國八百親親建國則周公宅魯康叔啓衛賢賢表德則太公封齊九命既賜用征諸侯魯以周公之故郊祭昊天車服有裕季世陵遲僭施無度強弱相吞舊制不復循也禹貢徐州土五色王者取五色土以為社封四方諸侯各割其方色土與之皆苴以白茅皆假銅虎竹使符第五夫為諸侯始受封之各有菜地百里之諸侯以四十里為菜地七十里之諸侯以二十里為菜地五十里諸侯以十五里為菜地其後子孫雖有黜地而菜地世世不黜漢雜事曰天子太社以五色土為壇封諸侯者取其土苴以白茅授之各以所封方之色以立社於其國故謂之受茅土漢興唯皇子封為王者得茅土其他臣以戶賦租入為節不受茅土不立社王隱晉書曰元康初楊駿輔政封賞過度石崇與散騎常侍蜀郡何舉共為駮議以為陛下聖德光被皇靈啓祚正位宣化萬國歸心今承洪基此乃天授至於班爵行賞優於太始崔鴻十六國春秋後燕録曰符定符紹等降慕容垂下書封紹等為侯以酬秦王之惠且擬三恪吳越春秋曰吳王聞勾踐盡心自守增之以封越王乃使大夫種齎葛布十萬甘蜜九檔文笥七枚狐皮五雙以報增封之禮韓子曰穰侯越魏而東攻齊五年秦不益一尺之地反成其陶邑之封應侯以攻韓八年成其汝南之封自是以來諸用秦者皆應穰之類也故勝戰則大臣尊益地則私封立説苑曰鄭桓公東會封於鄭舍於宋東之逆旅逆旅之叟從外來曰客將焉之曰會封於鄭逆旅之叟曰吾聞之時難得而易失也今客之寢安殆非會封者也鄭桓公聞之援轡自駕其僕接術而載之袁子曰今有卿相之才居三公之位循其治政以寧國家未必封侯也今軍政之法斬一牙門將者封侯夫斬一將之功孰與安寧天下者安寧天下者不爵斬一將之功者封侯失賞之意也又曰春秋鄭莊公封母弟於京祭仲曰都城過制國之害也其後卒相攻伐國內大亂故過度則有強臣之禍鄙小則有微弱之憂秦以列國之勢而并天下自以由諸侯而起之也於是去五等之爵而致郡縣雖有親子母弟皆為匹夫及其政衰夫一呼而天下去及至漢家見亡秦以孤特亡也於是大封子弟或連城數十廓地千里自關巳東皆為王國力多而權重故亦有七國之難白虎通曰王者即位先封賢者憂民之急也故列土分疆非為諸侯張官設府非為卿大夫皆為民也封諸侯以夏何陽氣盛養故以封諸侯盛養賢也立人君陽德之盛者也又曰受命之王致太平之美群臣上下之功故盡封之乃中興征伐大功皆封所以褒大功也盛德之士亦封之所以尊有德封者必試之為附庸三年有功因而封之五十里凡士有功者亦為附庸附世其位大夫有功成封五十里卿成封七十里公成封百里又曰公居百里侯居七十里何封示之優賢義欲褒尊而上之何以知殷家侯不過七十里曰土有三等有百里七十里五十里公卿大夫者何謂也內爵稱也為爵稱公卿大夫何爵者量其職盡其才公之為言公正無私也卿之為言章也善明也大夫之為言大扶扶進人也王充論衡曰堯舜之人可比屋而封桀紂之人可比屋而誅曹植遷都賦曰余初封平原轉出臨淄中命鄄城遂徙雍丘改邑浚儀而末將適于東阿號則六易居實三遷連遇瘠土衣食不繼爵易中孚卦曰鳴鶴在陰其子和之我有好爵吾與爾縻之左傳襄公三年曰齊莊公為勇爵設爵位以命勇士殖綽郭最欲與焉州綽曰東閭之役臣左驂迫還於門中識其枚數識門枚數其可與乎公曰子為晉君也對曰臣為隸新然二子者譬之禽獸臣食其肉而寢其皮矣言嘗射得之也白虎通曰爵五等者法五行或三等者法三光或法三或法五何質者據天故象三光文者據地故法五行禮含文嘉曰殷爵三等周爵五等各有宜也王制曰王者之制爵祿凡五等謂公侯伯子男乎此據周也所以名之為公侯何公者公正無私之意侯者侯順逆故也孝經援神契曰二王之後稱公大國侯皆千乘象雷百里所潤雲雨同史記曰秦聞馬服子將乃陰使白起為上將軍奇兵絶趙軍後趙軍分而為二糧道絶秦王聞趙食道絶王自之河內賜民爵各一級發十五已上悉詣長平遮絶救之又曰秦始皇四年百姓內粟千石拜爵一級漢書曰惠帝元年民有罪得賣爵三十級以免死罪應劭曰一級直錢二千凡為六萬若今贖入三千匹強矣晉灼武帝一級七十萬始皇本紀入粟千斛拜爵一級時制各異者也賜民爵戶一級六年令民得賣爵又曰衛青比年擊胡賦稅既竭不足以奉戰士有司請令民得賣爵及贖禁錮免賦罪請置賞官名曰武功爵也又曰宣帝五鳳四年大司農中丞耿壽昌奏設常平倉以給北邊省轉漕爵關內侯袁山松後漢書曰建寧二年爵乳母趙堯為平氏君魏書曰太祖置名號侯爵十八級關中侯爵十七級關外侯十六級五大夫十五級有與舊列侯凡六等魏氏春秋曰黃初三年帝欲封太后母尚書陳群奏曰案典籍之文無婦人分土命爵之制在禮婦人因夫爵秦違古法漢氏因之非先王之令典帝曰是也晉書曰長樂馮恢父為弘農太守愛少子淑欲以爵傳之恢父終服闋乃還鄉里結草為廬陽瘖不能言淑得襲爵恢始仕管子曰爵不尊祿不重者不與圖難犯危以其道為未可以求之也是故先王制軒冕足以著貴賤不求其美設爵祿足以守其服不求其觀使君子食於道小人食於力孟子曰有天爵者有人爵者仁義忠信樂善不倦此天爵也公卿大夫人爵也天爵以德人爵以祿古之人修天爵而人爵從之今之人修其天爵以要人爵既得人爵而棄其天爵則惑之甚者也商君書曰明王之所貴唯爵其賞不榮則民急其列不顯則民不事爵易得也則民不貴淮南子曰爵祿者人臣之銜轡説苑曰晉文公出亡周流天下舟之僑去虞而從文公文公反國擇可爵而爵之擇可祿而祿之僑獨不與焉文公酌諸大夫酒酒酣公曰二三子盍為寡人賦乎舟之僑曰君子為賦小人請陳其辭辭曰有龍矯矯頓失其所一蛇從之周流天下龍反其淵蛇寧其處公懼然曰子欲爵也請待旦日之朝子欲祿耶請今命廩人之僑曰請而得其賞廉者不受也言盡而名至仁者不為也遂退終身誦甫田之詩風俗通曰漢武帝諱徹改曰通侯或曰列侯秦時六國未平將帥皆家關中故稱關內侯通侯言其功大通於王室列者言其功德列著乃饗爵也王粲爵論曰爵自一級轉登十級而為列侯譬猶秩自百石轉遷而至於公也而近世賞人皆不由等級從無爵封無列侯原其所以爵廢故也司馬法曰賞不踰時欲民速觀為善之利也近世爵廢人有小功無以賞也乃積纍焉頒事足乃封侯非所以速為而及時也上觀古比高祖功臣及白起衛鞅皆稍賜爵為五大夫客卿庶長以至於侯非一頓而封也夫稍稍賜爵與功大小相稱而俱登既得其義且侯次有緒使慕進者逐之不倦矣異姓王封漢書曰高祖定天下功臣異姓王者八國張耳吳芮彭越黥布臧荼盧綰與兩韓信皆徼一時之權變以詐力成功咸得裂土南面稱孤見疑強大懷不自安事窮勢迫卒謀叛逆終於滅亡張耳以知全至子亦失國唯吳芮之起不失正道故能傳號五世以無嗣絶澤流支庶有以矣夫以其不用詐力也漢書曰張耳大梁人也少時及魏公子母忌為客嘗亡命遊外黃外黃富人女甚美庸奴其夫亡邸父客父客謂曰必欲求賢夫從張耳女聽為請決嫁之女家厚奉給耳耳故致千里客官為外黃令高祖為布衣時嘗從耳遊秦滅魏故購求耳千金耳變姓名之陳為里監門後項羽素亦聞耳賢乃分趙立耳為常山王田榮襲耳耳敗走漢漢二年遣耳與韓信擊破趙井陘斬陳餘泜水上四年夏立耳為趙王耳薨子敖嗣立為王又曰韓信平齊使人言漢王曰齊夸詐多變反覆之國南邊楚不為假王以填音鎮之其勢不定今權輕不足以安之臣請自立為假王當是時楚方急圍漢王於滎陽使者發書漢王大怒罵曰吾困於此旦暮望而來佐我乃欲自立為王張良陳平從後躡漢王足因附耳語曰漢方不利寧能禁信之自王乎不如因立善遇之使自為守不然變生漢王亦寤因復罵曰大丈夫定諸侯即為真王耳何以假為遣張良立信為齊王徵其兵使擊楚又曰彭越字仲昌邑人也常漁巨野澤中為盜陳勝起歲餘澤間少年相聚百餘人往從越請仲為長乃行略地收諸侯散卒得千餘人沛公之從北擊昌邑越助之昌邑未下沛公引兵西越亦將其衆居巨野澤中項籍入關王諸侯還歸越衆萬餘人無所屬齊王田榮叛項王漢乃使人賜越將軍印使下濟陰以擊楚大破楚軍漢二年拜越為魏相國將兵略定梁地漢王之敗彭城解而西也越皆亡其所下城獨將其兵北居河上漢三年越常往來為漢遊兵擊楚項王與漢王相距滎陽越攻下睢陽外黃十七城漢王追楚為項籍所敗固陵乃謂留侯曰諸侯兵不從為之奈何留侯曰彭越本定梁地功多始君王以魏豹故拜越為相國今豹死亡後且越亦欲王而君王不蚤定今取睢陽以北至穀城皆許以王彭越則兵至矣於是漢王發使使越如留侯策使者至越乃引兵會垓下項籍死立越為梁王都定陶又曰項羽入咸陽黥布為前鋒項王封諸將立布為九江王後與隨何俱歸漢漢王方踞床洗而召布入見布大怒悔來欲自殺出就舍張御飲食從官如漢王居布又大喜過望漢益分布兵而與俱北收兵至成皋四年秋七月立布為淮南王又曰盧綰豐人也與高祖同里及高祖初起沛綰以客從入漢中為將軍項籍死使綰別將劉賈擊臨江王共尉還從擊燕王臧荼皆破平時諸侯非劉氏而王者七人上欲王綰群臣觖望及虜臧荼乃下詔諸將相列侯擇群臣有功者以為燕王群臣知上欲王綰皆曰太尉長安侯綰常從平定天下功最多可王上乃立綰為燕王諸侯得幸莫如燕王者漢十年陳豨反漢既斬豨其禆將降言燕王綰使范齊通謀豨所上使使召綰綰稱病又謂其幸臣曰非劉氏而王者獨我與長沙耳今上病屬任呂后呂后婦人專欲事誅異姓王者及大功臣乃稱病不行高祖崩遂亡入胸奴又曰吳芮秦時番陽令甚得江湖間民心號曰番君天下之初叛秦也黥布歸芮芮以女妻之因率越人舉兵以應諸侯沛公攻南陽乃遇芮之將梅鋗呼玄切與偕攻析酈降之及項羽相王以芮率百越佐諸侯從入關故立芮為衡山王項籍死上以鋗有功於入武關故德芮徙為長沙王都臨湘又曰惠帝崩立孝惠後宮子為帝呂太后臨朝稱制遂立周呂侯子台為呂王台弟産為梁王建城侯釋之子祿為趙王台子通為燕王又封諸呂凡六人皆為列侯太后病困以趙王祿為上將軍居北軍梁王産為相國居南軍戒産祿曰高祖與大臣約非劉氏王者天下共擊之今王呂氏大臣不平我即崩恐其為變必據兵衛宮慎毋送喪為人所制太后崩太尉周勃丞相陳平朱虛侯劉章等共誅産祿迎立代王是為孝文皇帝晉書曰初武帝為王時王祥與荀顗往謁謂祥曰相國王尊重列侯既巳盡敬今便當拜也祥曰相國誠為尊貴然是魏之宰相吾等魏之三公公王相去一階而巳班列大同安有天子三司而輒拜人者損魏朝之望虧晉王之德君子愛人以禮吾不為也及入顗遂拜而祥獨長揖帝曰今日方知君見顧之重矣北齊書曰尉景之子粲少歷顯職體性粗武天寶初封庫狄干等為王粲以不預王爵大恚恨十餘日閉門不朝帝怪遣就宅問之隔門謂使人曰天子不封粲父作王粲不如死使云須開門受勑粲遂彎弓隔門欲刺使者使者以狀聞之文宣使假韶諭旨粲見韶唯撫膺大哭不答一言文宣親詣其宅慰之方復朝請尋追封景長樂王唐書曰安祿山死朝廷欲圖大舉詔郭子儀帥師趨京城師於潏水之西與賊將安太清安守忠戰後從元帥廣平王率蕃漢之師十五萬進收長安京師老幼百萬夾道歡叫涕泣而言曰不圖今日復見官軍是時河東河西河南所盜郡邑皆平以功加司徒封代國公入朝天子遣兵仗戎容迎于灞上肅宗勞之曰雖吾之家國實由卿再造子儀頓首感謝乾元元年九月詔子儀與九節度之師討安慶緒以中官魚朝恩為觀軍容宣慰使朝恩害子儀之功媒孽之召還京師子儀雖失兵柄乃心王室以禍難未平不遑寢息俄而史思明再陷河洛朝廷旰食復慮蕃寇逼迫京畿言事者以子儀有社稷大功今殘孽未除不宜置之散地肅宗深然之上元元年以子儀為諸道兵馬都統復為朝恩所間事竟不行上元二年李光弼兵敗於邙山河陽失守又河中軍亂殺其帥李國貞太原節度使鄧景山亦為部下所殺恐其合從連賊朝廷深憂之後輩帥臣未能彈壓遂用子儀為朔方河中北庭潞儀澤沁等州節度行營兼興平定國副元帥進封汾陽郡王出鎮絳州子儀至絳擒殺其國貞賊首王元振數十人並誅之太原辛雲京聞子儀誅元振亦誅害景山者由是河東諸鎮率皆奉法又曰渾瑊皋蘭州人也本鐵勒九姓部落之渾部也父釋之少有武藝從朔方軍積戰功於邊上纍遷至開府儀同三司寧朔郡王德宗幸奉天瑊率家人子弟自京城至乃署為行都虞候以拒朱沘賊平德宗還宮以瑊為河中尹河中綘慈隰節度使封咸寧郡王又曰馬燧字洵美汝州郟城人少嘗與諸兄讀書輟卷歎曰丈夫當建功於代以濟四海安能矻矻為一儒哉燧姿度魁異沉勇多智略後朱泚之亂燧守太原燧以晉陽王業所起乃引晉水而注城之東渚以為池寇至計省守陴者萬人尋兼保寧軍節度使封北平郡王
