body:
  text: 皇王部五帝嚳高辛氏史記曰帝嚳高辛氏者黃帝之曾孫也父曰蟜極蟜極父曰玄囂玄囂父曰黃帝自玄囂與蟜極皆不得在位至高辛即位高辛於顓頊為族子其色郁郁其德嶷嶷日月所照風雨所至莫不從服帝嚳娶陳鋒氏女生放勛娶娵訾氏女生摯帝嚳崩而摯代立帝王世紀曰帝嚳高辛氏姬姓也其母不見生而神異自言其名曰逡𪘀齒有聖德年十五而佐顓頊三十登帝位都亳以人事紀官故以勾芒為木正祝融為火正蓐收為金正玄冥為水正后土為土正是五行之官分職而治諸侯於是化被天下遂作樂六莖以康位世有才子八人號曰八元亦納四妃卜其子皆有天下元妃有台氏女曰薑嫄生后稷次有娀氏女曰簡翟生禼次陳豐氏女曰慶都生放勛娵訾氏女曰常儀生帝摯帝嚳氏位七十五年年一百五歲而崩葬東郡頓丘廣陽里陶弘景云在位六十三年年九十二大戴禮曰宰我曰請問帝嚳孔子曰玄器之孫蟜音喬極之子曰高辛氏生而神靈自言其名取地之財而節用之撫教萬民而利誨之曆日月而迎送之明鬼神而敬事之其色蟜蟜其德涘涘其動也時其服也土春夏乘龍秋冬乘馬黃斧紼衣執中而獲天下禮記祭法曰帝嚳能序星辰以著衆春秋元命苞曰帝嚳戴干是謂清明發節移蓋像招搖干楯也招搖為天戈楯相副戴之像見天中以為表古史考曰高辛氏或曰房姓以木德王張顯析言曰高辛氏初生自言其名其君民終無迷謬魏陳王曹植帝嚳贊曰祖自軒轅玄囂之裔生言其名木德帝世撫寧天地神靈察教弭四海明並日月帝摯帝王世紀曰帝摯之母於四人之中其班最下而摯年兄弟最長故得登帝位封異母弟放勛為唐侯摯在位九年政軟弱而唐侯德盛諸侯歸之摯服其義乃率其群臣造唐朝而致禪因委至心願為臣唐侯於是知有天命乃受帝禪而封摯於高辛氏事不經見漢故議郎東海衛宏所傳云爾帝堯陶唐氏帝王世紀曰帝堯陶唐氏祁姓也母曰慶都孕十四月而生堯於丹陵名曰放勛或從母姓伊祁氏年十五而佐帝摯授封於唐為諸侯身長十尺常夢攀天而上之故年二十而登帝位以火承木都平陽置敢諫之鼓天下大和命羲和四子羲仲羲叔和仲和叔分掌四嶽諸侯有苗氏處南蠻而不服堯征而克之于丹水之浦乃以尹壽許由為師命伯夔訪山川溪谷之音作樂六章天下大和百姓無事有八十老人擊壤于道觀者歎曰大哉帝之德也老人曰吾日出而作日入而息鑿井而飲耕田而食帝何力於我哉有僬僥氏來貢沒羽廚中自生肉脯如翣形搖鼓自生風使食物寒而不臭名曰翣晡又有草夾階而生隨月生死王者以是占日月之數惟盛德之君應和而生故堯有之名蓂莢一名曆莢始封稷契咎繇褒進伯禹納舜于大麓後年二月又率群臣刻壁為書東沉于洛言天命當傳舜之意今中候運衡之篇是也舜攝政二十八年堯與方回遊陽城而崩尚書所謂二十有八載放勛乃殂落是也百姓如喪考妣三載四海遏密八音凡堯即位九十八年年百一十八歲墨子以為堯堂高三尺土階三等堯取散宜氏女曰皇生丹朱又有庶子九人皆不肖故以天下命舜又曰帝堯氏作始封於唐今中山唐縣是也堯山在北唐水在西北入河南有望都縣有都山即堯母慶都之所居也相去五十里都山一名豆山北登堯山南望都山故名其縣曰望都春秋合誠圖曰堯母慶都有名於世蓋大帝之女生於斗維之野常在三河之南天大雷電有血流潤大石之中生慶都長大形像大帝常有黃雲覆蓋之夢食不飢及年二十寄伊長孺家出觀三河之首常若有神隨之者三河之首東河此端有赤龍負圖出慶都讀之赤受天運運録運也下有圖人衣赤光面八彩鬚鬢長七尺二寸兌上豐下足履翼翼署曰赤帝起誠天下寶衣赤光光像而又著衣也八彩彩色有八也翼翼星火位宿也圖人旁有此署文七十也奄然陰風雨赤龍與慶都合婚有娠龍消不見龍乘風雲故光陰風乃龍至也婚猶會合或為結也既乳視堯如圖表及堯有知慶都以圖豫堯如圖人儀表也孝經援神契曰堯鳥庭荷勝八眉堯火精人也鳥庭庭有鳥骨表取像朱鳥與太微庭之也朱鳥戴聖荷勝似之八眉眉彩色有八論語曰大哉堯之為君也巍巍乎唯天為大唯堯則之孔安國曰則法也美堯則安則法天而行之也蕩蕩乎民無能名焉蕩蕩廣遠之稱言布德遠民無能名巍巍乎其有成功也功成化隆高大巍巍孔藂子曰堯身修十尺眉分八彩實聖也龍魚河圖曰堯時與群臣賢智到翠媯之淵大龜負圖來出授堯勑臣下寫取寫畢龜還水中易坤靈圖曰其母萌之玄雲入戶蛟龍守門母為慶都也天皇之女天帝以玄雲覆衛之故曰時乘六龍以御天也又曰堯之精陽萬物莫不從者言堯在天陽精所生帝必有洪水之災天生聖人使救之故言乃統天也書曰若稽古帝堯孔安國曰若順稽考也能順考道而行之者帝堯曰放勛欽明文思安安勛功欽敬也言堯放上世之初化而以敬明文思之四德安天當安者也允恭克讓光被四表格于上下允信也克能也克光格至也既有四德又信恭能讓故其名聞充溢四外至于天地也克明俊德以親九族能明俊德之士任用之以睦高祖至玄孫之親九族既睦平章百姓既巳也百姓官也言化九族而平章明也百姓昭明協和萬邦黎民於變時雍昭亦明也協和黎衆時是雍和也言天下衆民皆變是以風俗大和也尚書中候曰帝堯即政七十載景星出翼鳳凰止庭鄭玄注曰翼朱鳥宿朱草生郊嘉禾孳連甘露潤液醴泉出山朱草可以染服者嘉美也書序曰唐叔得禾異畝同穎此注之為孳連醴亦甘修壇河雒榮光起河休氣四塞休美也榮光五色從河出美氣四塞炫耀熠熠也白雲起回風搖龍馬銜甲赤文緑色龍形像馬也赤熛怒之使也甲所以藪圖赤文色而緑地也臨壇止霽吐甲圖而帶足霽齊亦止也帶足音帶去也又曰中候運行曰帝堯率群臣東沉于雒刻壁曰天下臣放勛德薄施行不元元善也尚書大傳曰堯八眉舜四童子八者如八字也又曰堯舜之王天下一人不刑而四海治春秋元命包曰堯眉八彩是謂通明曆象日月琁璣玉衡大戴禮曰宰我曰請問帝堯孔子曰高辛之子也曰放勛其仁如天其智如神就之如日望之如雲富而不驕貴而不豫黃斧紼衣彤車乘白馬六韜曰太公曰帝堯王天下之時金銀珠玉弗服錦繡文綺弗衣奇怪異物弗聽宮垣屋室弗崇桶椽柱楹不藻飾芧茨之蓋弗剪齊黻黻之絓履不弊盡不更為也滋味不重糝弗食也溫飯暖羹不酸餧不易也不以私曲之故留耕種之時削心約志從事無豫為莊子曰昔堯之治天下也使天下人欣欣焉人樂其性又曰堯治天下之民平海內之政往見四子於姑射之山汾水之陽窅然喪其天下四子許由齧缺披衣王倪也窅然猶幽然自失之貌言堯以有事之心至於無為之人故亦無所用也又曰堯觀于華封華封人曰嘻請祝聖人使聖人壽使聖人富使聖人多男子堯曰多男子則多懼多富則多事多壽則多辱封人曰夫聖人鶉居鷇音扣食鳥行而無章天下有道則與物皆昌天下無道則修德就間千歲厭世去而上仙乘彼白雲至于帝鄉三患莫至身常無殃又曰堯治天下伯成子高立為諸侯及堯授舜舜授禹子高辭為諸侯而耕禹往見之曰堯治天下吾子立為諸侯堯授舜舜授余吾子辭之敢問何也子高曰昔堯治天下不賞而人勸不罰而人畏子今賞罰而人且不仁德自此衰刑自此立後世之亂自此始矣無落吾事俋俋音蟄乎耕而不顧尸子曰人之言君天下者瑤臺九纍而堯白屋黻衣九種而堯大布宮中三市而堯鶉居珍怪遠味而堯糲飯菜粥騏驎青龍而堯素車玄駒又曰堯舜有天下四海之內皆治而丹朱啇均不與焉而謂皆治者衆也又曰舜授天下顏色不變堯以天下與舜顏色不變知天下無能益損於己也又曰人戴冠履莫不譽堯非桀敬士侮慢故敬侮之譽毀之非其取也韓子曰堯之王天下冬日鹿裘夏日葛衣茅茨不剪採椽不斷糲梁之食藜藿之羹雖監門之養不敵於此矣又曰由余謂秦穆公曰昔堯有天下飯於土軌飲於土形其土南至交址北至幽都東西日月所出入者無不賓服呂氏春秋曰堯有子十人不與其子而授舜孟子曰堯使九男二女事舜也又曰堯以天下讓於子州支父對曰以我為天子猶之可也雖然適有幽憂之病方將治之未暇在天下也幽隱也詩曰如有隱憂天下重物也而不以天下害其生者故可託天下淮南子曰堯之治天下也舜為司徒契為司馬禹為司空后稷為大田師奚仲為工其導萬民也水處者魚山處者木谷處者牧陸處者農地宜其事事宜其械械宜其用用宜其人澤皇織罔陵阪耕田得以所有易所無以工易所拙是故離叛者寡而聽從者衆譬若播棊於地負者走室方者處高各從其所安又曰人之所以樂為天子者以窮耳目之欲而適身體之便也今高臺層榭之人所麗也而堯採椽不斷斥題不枅言梁柱相斥矩不著枅櫨也珍怪奇味人之所美也堯糲梁之飯藜藿之羹文錦狐白人之所好也而堯布衣掩形鹿裘禦寒養生之具不加厚而增之以大任重之以憂故舉天下而傳之舜若解重負然非直辭讓也又曰堯治天下政教平德潤洽在位七十載乃求所屬天下之統今四嶽楊側陋四嶽舉舜而薦之堯堯乃妻以二女以觀其內任以百官以觀其外既入大麓烈風雷雨不迷林屬於山曰麓堯使舜入林麓之中遭大風雨不迷也乃屬以九子堯有九男贈以昭華之玉而傳天下焉又曰堯之有天下也非貪萬民之富也而寧人主之位也以為百姓力屈強弱相乘衆寡相暴於是堯乃身服節儉之行而明相愛之仁以和輯之是故茅茨而不剗采椽而不斷大路不畫大路天子車也越席不緑越席束蒲序也大羹不和無五味也粢飯不鑿巡狩行教勤勞天下周流五嶽豈其奉養不足樂哉舉天下以為社禝非有利焉年衰志閔舉天下之重而傳之舜也猶卻行而釋蹤也又曰堯之時十日並出燋禾穗殺草木而民無所食窫窳九嬰大風封豕鑿齒於疇華之澤疇華南方澤也鑿齒獸持戈楯羿持弓箭射殺也殺九嬰於凶水之上女嬰水大之怪為人之害者北狄之地有凶水者也繳大風於青丘之澤大風大鷙鳥也激以石磎繳擊矢射之青丘東方丘上射十日羿射日中曰墮中鳥羽而下殺窫音乾窳音庾窫窳狀如龍庾人齒食人也斷修蛇於洞庭洞庭南方水也其蛇食象三歲而其骨出也禽封豕於桑林封豕大彘也桑林湯禱旱地萬民皆喜置堯為天子也又曰堯王天下而憂不解授舜而憂乃釋説苑曰河間獻王曰堯存心於天下有一人飢曰我飢之也有一人寒曰我寒之也一民有罪曰我陷之也仁而立德博而化廣故不賞而人勸不罰而人治先生而後殺是堯道也楊子法言曰堯能則天者以其能臣二聖二聖舜禹也又曰堯舜之德輕於鴻毛潛夫論曰堯舜之德譬猶偶燭施明於幽室也前燭照之後燭益明非前燭昧後燭彰也乃二燭相因而成大光荀悅申鑒曰思唐虞於上世瞻仲尼於中古乃知小道足羞也譙子法訓曰唐虞之衣裳文法禹稷之溝洫耕稼人至今被之袁子法書曰堯避舜於濟陰今定陶有堯冢信乎符子曰許由謂堯曰坐于華殿之上面雙闕之下君之榮願亦已足矣夫堯曰坐于華殿之上森然而松生于棟余立於櫺扇之內霏焉而雲生于牖雖面雙闕無異乎崔嵬之冠蓬萊雖背墉墎無異乎回巒之縈崑崙余安知其所以不榮鄧析言曰古詩云堯舜至聖身如脯臘桀紂無道肌膚三尺夢書曰堯夢龍上天舜夢擊天鼓續述征記曰城陽縣有堯冢自漢晉二千石乃丞尉刊名甚衆堯即位至永嘉三年二千七百二十有一載記于堯碑魏陳王曹植帝堯贊曰火德統位父則高辛克流共工萬國同塵調適陰陽其惠如春巍巍成功則天之神
