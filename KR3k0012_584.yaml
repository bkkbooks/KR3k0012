body:
  text: 樂部二十一琵琶釋名曰琵琶本胡中馬上所鼓推手前曰琵引手卻曰琶因以為名晉書曰石季倫善彈琵琶宋書曰庾仲文為吏部尚書好貨先與劉德願殊惡德願自持琵琶甚精麗遺之便復款然南史曰宋范曄善彈琵琶能為新聲上欲聞之屢諷以微旨曄偽若不肯為上嘗宴飲歡適謂曄曰我欲歌卿可彈曄乃奉旨上歌既畢曄乃罷弦蕭子顯齊書曰太祖江宴群臣數人各使效伎藝禇淵彈琵琶王僧度彈琴沈文季歌張敬兒舞王敬則柏王儉曰臣無所解唯知誦書因跪上前誦相如封禪書上笑曰此盛德之事吾何以堪之遽止使陸澄誦孝經自仲尼居而起儉曰澄所謂博而寡要臣請誦之乃誦君子之事上章上曰善張子布更覺非奇隋祕書監牛弘修皇后房內之樂文帝龍潛時頗好音樂嘗倚琵琶作歌二首名曰地厚天高託言夫妻之義因即取之為房內曲命婦人並登歌上壽並用之職在宮內之女人教習之樂府雜録曰貞元中有王芬曹保其子善才其孫曹綱及裴興奴善彈琵琶其曹綱善運撥聲若風雨不事但弦其裴興奴善於攏撚不撥稍軟時人云曹綱有右手裴興奴有左手武宗朝朱崖李太尉有樂吏廉郊者師於曹綱精妙入神嘗謂儕流曰教授人亦多矣未曾有此性靈弟子也嘗因清夜攜樂器於平泉別墅臨池彈蕤賓調芰荷聞有聲意其魚躍也及彈別調即寂然因復彈蕤賓久之池中擲物跳上岸觀之乃一片方響蕤賓鐵蓋以聲律諧和相應故也其妙若此又曰貞元中有康崑崙彈琵琶第一手因長安大旱詔移兩市以析雨及至天門街市人廣較勝負及鬥聲樂即街東有康崑崙琵琶最上必謂街西無以敵也遂請崑崙登綵樓彈一曲新翻羽調録要即緑腰是也本因樂上進曲上令録出要者因以為名自後來誤言緑腰也其街西亦建一樓東市大誚之及崑崙度曲西市樓上出一女郎抱樂器先云我亦彈此曲兼移在楓香調及下撥聲如雷其妙絶入神崑崙即驚駭乃拜請為師女郎乃更衣而出及見即僧也蓋西市內豪族厚賂莊嚴寺僧善本善本名俗姓段也以定東之勝也翌日德宗召入令陳本藝異常佳獎因令教授崑崙奏曰且請崑崙彈一調子乃彈之師曰本領何雜也兼帶雅聲崑崙驚曰段師神人也臣小年初學琵琶偏於鄰舍女巫處授一品絃調子後仍易數師段精鑒玄妙如此段師奏曰遣崑崙不近樂器十餘年使忘其本領然後可教詔許之後盡段師之藝也又曰開元中有賀懷智善琵琶以石為槽鵾雞筋作絃用鐵撥彈之又曰琵琶始自烏孫公主造馬上彈之直項曲項者曲項蓋使於急關也古曲有陌上葉范曄石苞謝奕皆善此樂也風俗通曰琵琶近代樂家所作不知所起長三尺五寸法天地人與五行也四絃象四時也以手琵琶之因以為名語林曰謝鎮西著紫羅襦據胡床在大市佛圖門樓上彈琵琶作大道曲異苑曰南平國兵在姑熟有鬼附之每占凶輒先索琵琶隨彈而言事事有驗云是老鼠所作名曰靈侯王期絳幕祠儀曰琵琶出於弦鞉笙簧基於絲竹竹林七賢傳曰阮咸善琵琶荀勗雅解音律自以遠不及也文士傳曰孔輝善彈琵琶吳歸命恆使為樂孫放別傳曰君性好音能操琴及琵琶以自散傅玄琵琶序曰聞之故老云漢遣烏孫公主念其行道思慕使工知音者戰琴箏築箜篌之屬作馬上之樂觀其器盤圓柄直陰陽序也四弦法四時也以方語目之故枇杷也取易傳於外國也杜摯以為興秦之末蓋苦長城之役百姓弦鼗而鼓之二者各有所據以意斷之烏孫近焉石崇琵琶引曰王明君曰本為昭君以觸文帝諱改胸奴請婚元帝以明君配焉昔公主嫁烏孫令琵琶馬上作樂以慰其思其送明君亦故然序之云耳傅子曰朱生善彈琵琶雖伯牙之妙無加也文士傳曰孔煒字正忠解音律彈琵琶異苑曰永嘉中李謙素善琵琶元嘉初往廣州夜集坐倦悉寢唯謙獨揮彈未輟便聞窗外有唱佳聲每至契會無不擊節謙怪語曰何不進耶對曰遺生以久無宜干突始悟是鬼幽明録曰晉司空桓豁在荊州有參軍五月五日剪鸜鵒舌教令學語遂無不鳴與人相問顧參軍善彈琵琶鸜鵒每立聽移時録異傳曰吳赤烏三年句章氏楊度至餘姚夜行有一年少持琵琶求寄載度受之鼓琵琶作數十曲曲畢乃吐舌擘自以怖度而去復行二十里許又見一老父寄載自云姓王名戒因復載之謂曰鬼工鼓琵琶甚哀戒曰我亦能鼓即是向鬼復擘眼吐舌度怖幾死語林曰桓宣武外甥恆在坐鼓琵琶宣武醉後指琵琶曰名士固亦操斯器三輔決録曰遊楚上表乞宿衛拜駙馬都尉楚無學問好遊遨音樂乃畜歌琵琶箏笛每行將以自隨樂府雜録曰唐文宗朝女弟子鄭中丞善於胡琴中丞即宮人之宮也內庫有兩面琵琶號大忽雷鄭常彈小忽雷因匙頭脫送於崇仁坊南趙家修理大約造樂器多在此坊中南北二趙家最妙大和中有權相舊吏梁厚本莊在渭南縣之西北臨渭水一日因垂釣忽見一物流過長五尺許悉以錦纏其上令家僮接得就岸乃祕器也及發棺視之乃一女郎也粧色儼然久伺之口鼻間餘息未絶遂移於曲室中將養經旬漸能言詢之云是鄭中丞也昨以誤聖旨命內官縊殺投於渭河錦即諸弟子相贈耳及如故因垂涕感謝厚本即納為妻言其琵琶今尚在南趙家值鄭注之亂莫有知者梁乃潛賂樂匠贖得之每至夜深方敢輕彈後遇良晨美景飲於花下酒酣不覺郎彈數曲洎有黃門放鷂子過其門私於牆外聽之曰此是鄭中丞琵琶聲也不日召入內乃捨厚本之罪仍加錫賜也明皇雜録曰天寶中上命宮女子數百人為梨園弟子皆居宜春北院上素曉音律時有馬仙期李龜年賀懷智洞知律度安祿山自范陽入覲亦獻白玉簫管數百事皆陳於梨園自是音響殆不類人間有中官白秀貞自蜀使回得琵琶以獻其槽以邏逤檀為之溫潤如玉光輝可鑒有金縷紅文蹙成雙鳳貴妃每抱是琵琶奏於梨園音韻淒清飄如雲外而諸王貴主洎虢國已下競為貴妃琵琶弟子每授曲畢皆廣有進獻其後龜年流落江南每遇良晨勝景常為人歌數關座客聞之莫不掩泣罷酒羯鼓羯鼓録曰羯鼓出外夷以戎羯之鼓故曰羯鼓其音主太簇一均龜茲高昌踈勒天笁諸部皆用之次在都曇答獵鼓之下都曇似腰鼓而小答獵即楷鼓也雞鼓之上𣞙如漆桶山桑為之下以小牙床承之擊用兩杖其音焦殺鳴烈尤宜急曲促破作戰杖連碎之聲又宜高樓曉影明月清風破空透遠特異衆樂杖用黃檀狗骨花楸等木須至乾緊絶濕氣而復柔膩乾取發越響亮膩取戰裊健舉捲用鋼鐵鐵當精練捲須至勻若不以鋼則應條高下細捩不停不勻則鼓面緩急若琴徽之病玄宗洞曉音律由之天縱凡是管絃悉造其妙若製作曲調隨意即成如不立章度取適長短應指發聲皆中點拍至於清濁變轉律呂呼召君臣事物相制使雖古之夔曠無以過也尤愛羯鼓橫笛云八音之領袖也諸樂不可為比嘗值二月詰旦巾櫛方畢時宿雨初晴景色明麗小殿庭內柳杏將吐覩而歎曰對此景物豈可不與他判斷之左右相目將令備酒唯高力士遣取羯鼓上旋命之臨軒縱擊一曲名春光好上自掣神思自得及顧柳杏皆已發拆指而笑曰此事不喚我作天公可乎左右皆稱萬歲又製秋風高每至秋空逈徹纖塵不起即奏之必遠風徐來庭葉墜落其妙絶入神也如此又曰汝陽王璡寧王長子也姿容妍美秀出藩邸上特鍾愛焉自傳授之又以其聰悟敏惠妙達其旨每隨遊幸頃刻不捨璡嘗戴砑綃帽打曲上自樀槿花一朵置於帽上著處二物皆極滑久之方安遂奏舞山花一曲花不墜本色所謂定頭項難在不動搖上大喜笑賜金器一廚因誇花奴璡小名也姿質明瑩肌膚光細非人間人必神仙謫墜也寧王謙讓隨而短之上笑曰大哥不在過慮阿暪自是相師上於諸親自稱此號夫帝王之相且須英特越逸之氣不然則有深沉包育之候若花奴但端秀過人悉無此犬固無猜也而又舉止淹雅更得公卿間令譽耳寧王又謝之曰如此則臣乃輸之上曰若此則阿暪亦輸大哥矣寧王又謙謝上曰阿暪嬴處亦多大哥大用偽揖衆皆歡笑也上性雋邁酷不好琴嘗聽彈正弄未及畢叱琴者曰待詔出去謂宦者曰速召花奴將羯鼓來為我解穢黃幡綽亦知音者上嘗使人召之不時至上怒絡驛使尋捕之既至及殿側聞上理鼓固止謁者不令報俄頃上又問侍官奴來未曲罷改奏才三數十聲綽即入上謂曰賴稍遲我向來怒意至必撾焉適方思之長入供奉已五十餘日暫一日出外不可不許他東西過往綽拜謝畢內官有偶而笑者上詰之具言綽尋至聽鼓而候其時入上問之綽語其方及解怒之際皆無羌悟上奇之復厲聲謂之曰我心骨下事安有侍官奴聞鼓聲能料之耶今且謂我何如綽遂走下階面北鞠躬大聲曰有勑豎金雞上大笑而止又曰宋開府雖耿介不倫亦深好聲樂尤善羯鼓南山起雲北山起雨即開府所為始承恩顧與上論鼓事曰不是青州石即是魯山花歐然少年碧掌下雖有朋肯聲據此乃漢震第二鼓也且𣞙用石花瓷固是腰鼓掌下朋肯聲是以手拍非羯鼓鳴矣又謂上曰頭如青山峰手似白兩點按此即羯鼓之能事山峰欲不動兩點取碎急即上與開府兼善兩鼓也而羯鼓偏好以其比漢震稍雅細焉開府之家悉傳之東都留守鄭叔祖母即開府之女今尊賢里鄭氏第小樓即是夫人習鼓之所也又曰嗣曹王皋有巧思精於器用為荊南節度使有羈客懷二捲欲求通謁先啓於賓府府中觀者訝之曰豈足尚邪客曰但啓於尚書當解耳及見皋捧而歎曰不意今日獲逢至寶因指其鋼勻之狀賓但唯唯或復非之皋曰諸公或似未信乎命取食柈自選其極平者遂重二捲於柈心以油注之盤中捲滿而油不浸漏蓋相契無際也皋曰此必開元中供御捲也不然無以至此問其客曰某先人在黔中得於高力士衆方深伏佐潛問其價宜償幾何客曰不過三百緍及皋遺之財帛器皿其直果稱焉又曰廣德中蜀客雙流縣丞李琬者亦能之調集至長安稅居務本里夜聞羯鼓聲曲頗妙於月下步尋至一小宅門戶極卑隘叩門請謁鼓工曰君所擊者豈非耶婆色雞乎一本作耶婆娑雞也雖至精能然而無尾何也工大異之曰君固知音者此事無人知某太常工人也祖父傳此藝尤能此曲進因張通儒而入長安某家流散父沒西河此曲遂絶今但按舊譜數本尋之竟無結尾聲故夜夜求之琬曰曲下意盡乎工曰盡琬曰意盡則曲盡又何索乎工曰奈何聲不盡也琬曰可言矣夫曲有如此當以他曲解之方可盡其聲矣夫耶婆色雞當用掘拓急偏解之工如其所教果得諧叶聲意皆盡如朽枝用渾脫解甘州用絶了頭解之類是也工泣言而謝之即言於寺卿奏為主簿纍官至太常少卿為宗正卿又曰永奏中杜鴻漸為三川副元帥兼西川節度使亦能之成都有削杖者以二枚獻於鴻漸鴻漸得之示於衆曰此尤物也常衣襟下收貯積時矣匠曰某於脊溝中養之二十年及鴻漸出蜀至利州西界望喜驛入漢川矣自西南來始至嘉陵江頗有山景致至夜月色又佳乃與從事楊崖州杜亞輩登驛樓望月行觴宴話曰今日出艱危脫猜逼外則不辱命於朝廷內則不中禍於微質皆諸賢之力也既保此安步又𣊟於此殊境安得不自賀乎遂命家僮取羯鼓笛以所得杖酣奏數曲四山猿鳥悉皆飛鳴從事頗異之曰昔夔之擊拊百獸舞庭此豈遠耶漸曰若漸於此稍當致功猶未致妙尚能及是況聖主御天賢臣考樂飛走之類又何不感因言某有別墅近花嚴閣每值風清月朗時或登閣奏此初見群羊於川下數舉頭躑躅不已某謂以鼓然也及鼓止亦止某復鼓之亦復然遂以疾徐高下而節之無不相應旋有二犬自其家走而吠之及羊側逐漸止聲仰首若有所聽少選即復宛頸搖尾亦從而變態是知率舞固無難矣某後不敢為之近者士林間無習之者唯僕射韓皋善不甚露焉鄂州節度使時聞黃鶴一兩集而已
