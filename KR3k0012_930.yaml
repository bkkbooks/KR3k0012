body:
  text: 鱗介部一龍上河圖曰舜以太尉即位與三公臨觀黃龍五采負圖出置舜前以黃玉為押白玉檢黃金繩黃芝為泥章曰黃帝符璽春秋運斗樞同又曰黃金千歲生黃龍青金千歲生青龍赤金千歲生赤龍白金千歲生白龍玄金千歲生玄龍又曰黃龍從雒水出詣虞舜鱗甲成字舜令寫之寫竟去星經曰東方七宿為蒼龍凡有鱗之類皆屬於木故龍為鱗蟲之長歸藏明夷曰昔夏后啓土乘龍飛以登于天睪皋陶口之曰吉周易乾卦曰雲行雨施品物流形時乘六龍又曰坤卦龍戰于野其血玄黃又文言曰雲從龍又說卦曰震為龍易通卦驗曰立夏清風至而龍升天尚書中候曰黃龍負卷舒圖又曰青龍銜玄圖大戴禮冠曰鱗蟲三百六十而龍為之長禮記禮運曰龜龍在宮沼龍以為畜故魚鮪不淰淰潛藏也禮含文嘉曰龍馬金玉帝王之瑞也左傳昭五曰鄭大水龍鬭于時門之外洧淵國人請為榮焉子産不許曰我鬭龍不我覿也龍鬭我獨何覿焉穰之則彼其室也吾無求於龍龍亦無求於我乃止又昭七曰秋龍見於絳郊魏獻子問於蔡墨曰吾聞之蟲莫智於龍以其不生得也謂之智信乎對曰人實不智非龍實智言人實不智而謂之智非龍智也乃不智也古者畜龍故國有豢龍氏有御龍氏豢養也昔有飂叔安飂古國也安其君名也有裔子曰董父裔遠也玄孫之後為裔也實甚好龍能求其嗜欲以飲食之龍多歸之乃擾畜龍以服事帝舜帝賜之姓曰董氏曰豢龍故帝舜氏世有畜龍氏及有夏孔甲擾于有帝帝賜之乘龍河漢各二各有雌雄孔甲不能食而未獲豢龍氏有陶唐氏既衰其後有劉纍學擾龍于豢龍氏以事孔甲能飲食之夏后嘉之賜氏曰御龍以更豕韋之後龍一雌死潛醢以食夏后嘉之既而使求之懼而遷于魯縣龍水物也水官棄矣故龍不生得春秋元命苞曰龍之言萌也陰中之陽故言龍舉而雲興史記曰昔夏后氏之衰有神龍二止於夏帝庭而言曰余褒之二君也夏帝卜殺之徙去之與止之莫吉卜請其漦而藏之吉又曰黃帝得土德黃龍見夏得木德青龍止於郊漢書曰惠帝二年正月兩龍見蘭陵人家井中又曰文帝時公孫臣以為漢土德黃龍見張蒼以為水德至十五年黃龍見成紀下詔召臣為博士東觀漢記曰公孫述有龍出其府殿中夜有光耀述以為符瑞因稱尊號改元曰龍興後漢書曰哀牢夷其先有婦人捕魚水中觸沉木有孕生男子十人沉木化為龍出水上九男驚走一兒不去背龍因舐之後諸兒推為哀牢主魏志曰華歆邴原管寧三人為友號曰一龍歆為龍頭原為龍腹寧為龍尾魏略曰文帝欲受禪郡國奏黃龍十三見明帝鑄銅黃龍高四丈置殿前晉書曰劉毅為尚書左僕射時龍見武庫井中帝親觀之有喜色百官將賀毅獨曰昔龍降鄭時門之外子産不賀龍降夏庭沫流不禁卜藏其漦至周幽王禍釁乃發易稱潛龍勿用陽在下也證據舊典無賀龍之禮又曰陸機嘗餉張華鮓于時賓客滿座華發器便曰此龍肉也衆未之信華曰試以苦酒濯之必有異既而五色光起機還問鮓主果云園中茅積下得一白魚質狀殊常以作鮓過美故以相獻崔鴻十六國春秋前燕録曰慕容晃十二年夏四月黑龍一白龍一見於龍山晃親帥群僚觀龍二百餘步祭之以太牢二龍交首嬉翔解角而去晃大悅還宮殿赦其境內號新宮曰和龍宮晉書曰符生初夢大魚食蒲又長安謠曰東海大魚化作龍男便為王女為公問在何所洛城東時符堅為龍驤將軍第在洛門之東其後果驗又曰呂光伐龜茲軍其城南營外夜有一黑物大如斷堤搖動有頭角目光若電及明而雲霧四周遂不復見旦視其處南北五里東西三十餘步鱗甲隱地之所昭然猶在光嘆曰黑黑龍也俄而雲起西北暴雨滅其跡杜進言於光曰龍者獸之君大人利見之象易曰見龍在田德施普也斯誠明將軍道合靈和德符幽契願將軍勉之以成大慶光有喜色又曰馮跋弟素弗與從兄萬泥及諸少年遊于水濱有一金龍浮水而下素弗謂萬泥曰頗有見不萬泥等皆曰無所見也乃取龍而示之咸以為非常之瑞又曰雷奐子華度襄水劍躍入水化為龍又曰初桓溫南州起齊悉畫龍於其上號曰盤龍齊及玄篡而劉毅字希樂討玄玄死於盤龍齊而毅居之沈約宋書曰劉穆之字道和嘗夢與高祖俱泛海忽值大風驚懼俯視船下見有二白龍挾船既而至一山峰崿聳秀林樹繁密意甚悅之宋書曰徐羡之嘗從兄履之為臨海樂安縣嘗行經山中見黑龍長丈餘頭有角前兩足皆具無後足曳尾而行後文帝立羡之竟以凶終又曰傅亮率行臺迎宜都王王舟輿發自江陵中流有黑龍躍出負王舟左右失色王顧長史王曇首曰此大禹所以受天命吾何德以堪之齊書曰建武中荊大風雨龍入柏齊中柱壁上有爪足處刺史蕭遙欣恐畏不敢居也又曰初武帝夢金翅鳥下殿庭搏食小龍無數乃飛上天明帝初宗室多遇害其夢竟驗梁書曰武帝郤后素妒忌及終化為龍入于後宮井通夢於帝或見形光彩照灼帝體將不安龍輒激水騰涌於是井上為殿衣服委積南史曰梁江陵城壕中有龍騰出煥爛五色竦躍入雲六七小龍相隨飛去群魚騰躍墜死於道龍出處為窟若數百斛圌音遄三國典略曰陸法和拒任約至安南入赤亭湖法和乘輕舟不介胄沿流而下去約軍一里乃還謂將士曰彼龍睡不動吾軍之龍其能踴躍若待明日攻之當不損客而自破賊陳書曰隨師濟江荊州呂肅敗後別師廖世寵領大舴詐降欲燒隋艦更決死一戰於是有五黃龍備色象各長十餘丈驤首連接順流而東風浪大起雲霧晦冥陳人震駭不覺火自焚故隋文下詔以告郊廟又曰宣帝初在江陵軍主李總與帝有舊每同遊處帝嘗夜被酒張燈而寐總適出尋反乃見帝是大龍便驚走他室後魏書曰波知國有三池傳云大池有龍王次者龍婦小者龍子行人設祭乃得過不祭多遇風雪又曰正元元年有黑龍如狗南走宣陽門躍穿門樓下而出此魏衰之徵也後周書曰大象中榮州有黑龍見與赤龍鬭於汴水之側黑龍死隋書曰源師初在齊遷在外兵郎中又攝祠部屬孟夏以龍見請雩時高阿郍肱為相謂真龍出大驚喜問龍所在師整容報曰此是龍星初見依禮當雩祭郊壇非謂真龍也唐書曰貞觀中汾州言青龍白龍見白龍吐物初在空中有光如火至地陷入二尺掘之則玄金也形圓斜廣尺餘高六七寸又曰先天中玄宗以旱親往龍首池祈禱有赤蛇自池中而出雲霧四布應時澍雨又曰褚無量字弘度杭州鹽官人幼孤貧勵志好學家近臨平湖湖中有龍鬭傾里閭就觀之無量時年十三讀書晏然不動及長精三禮及史記又曰文宗太和二年五龍會於密州禆産山之北次第而至五方之色具焉自申及戍而沒後唐史曰莊宗時五臺僧誠惠自號降龍師帝雅重之每屈膝施敬諸王嬪御皆為之拜誠惠悉倨坐而受之初自臺山謁帝鎮州王鎔不為之禮誠惠恚怒曰吾有毒龍五百豈勞于命一龍揭片石常山其為沼乎踰年而滹川大溢敗鎮之郛或聞其言益以為神繇是帝敬之愈篤周史曰徐州豐縣民單興井中龍出民有子母三人同覩之即時皆卒龍既出澍雨漂沫城內居民濟之以筏登城以避水管子曰龍被五色而遊故神欲小則如蠶蠋欲大則函天地欲上則陵雲欲沉則伏泉又曰蛟龍水蟲之神者也乘水則神立失水則神廢墨子曰墨子北之齊遇日者曰帝以今日殺黑龍於北方先生色黑不可以北又曰帝以甲乙殺青龍於東方丙丁殺赤龍於南方庚辛殺白龍於西方壬癸殺黑龍於北方若用子言則禁天下之行也孫卿子曰積土成山風雨興焉積水成川蛟龍生焉莊子曰朱泙漫學屠龍於支離益殫千金之家三年伎成而無所用其巧也又曰子張見魯哀公哀公不禮託僕大夫而去曰君之好士也有似葉公子高之好龍也葉公好龍室屋雕文盡以寫龍於是天龍聞而下之窺頭於牖拖尾於堂葉公見之棄而還走失其魂魄五色無主是葉公非好龍也好夫似龍而非真今君非好士也好夫似士而非者也新序又載又曰孔子見老聃歸三日不談弟子問曰夫子見老聃亦得何規哉孔子曰吾乃今於是乎見龍龍合而成體散而成章乘乎雲氣飬乎陰陽余口張而不能嗋子又何規老聃哉又曰河上有家貧恃緯蕭而食者其子沒淵得千金之珠歸與其父其父謂其子曰取石來煆破也夫千金之珠必在九重之淵而驪龍頷下子能得珠者必遭其睡也如使驪龍悟子尚奚徼之有哉韓子曰夫龍之為蟲有狎而騎也然喉下有逆鱗徑尺若嬰之則殺人人主亦有之說者能無嬰人主之逆鱗則幾矣淮南子曰人莫欲學御龍而皆欲學御馬莫欲學治鬼而皆欲學治人急所用也御龍治鬼不益世用故以御馬治人為務矣又曰伯益作井而龍登玄雲神棲崑崙伯益夏禹之佐也初鑿井泄地氣以後必漉池而渙故龍登玄雲神棲崑崙一日龍在黃泉下恐害及故去之知愈多而德愈薄矣又曰夫騰蛇游霧而騰龍乘雲而舉又曰虎嘯而谷風生虎陰中陽獸也與風同類龍舉而景雲屬龍陽中陰蟲也與雲同類又曰人不見龍之飛舉而能高者風雨之奉也奉助也又曰燭龍在鴈門北蔽于委羽之山不見日其神人面龍身而無足不見日故龍以目照之蓋長千里視為晝瞑為夜吹為冬呼為夏新言曰漢祖驂三龍而乘雲路振長策而驅天下三龍人傑又曰龍潛之水乘雲躍鱗虎嘯之聲因風奮烈達則振纓朝堂窮則身親南畝抱朴子曰山中辰日稱雨師者龍也又曰西域方士能神祝者臨淵禹步吹氣龍即出浮其初出乃長十數丈於是方士更吹之一吹則龍輒一縮至長數寸萬士乃掇取著壺中或有四五龍以少水養之以踈物塞壺口於是方士聞有旱處便齎龍往賣之一龍直數十斤金舉國會斂以雇之直畢乃發壺出一龍著淵潭之中因復禹步吹之輒一吹一出長數十丈須臾雲雨四集又曰有自然之龍有蛇蠋化成之龍又曰夏時龍生於太廟之中說苑曰吳王欲從民飲酒伍子胥諫曰不可昔白龍下清冷之淵化為魚漁且豫且射中其目白龍上訴天帝天帝曰當是之時若安置而形白龍對曰我下清冷之淵化為魚天帝曰魚固人之所射也若罪豫且何罪夫白龍天帝貴畜也豫且宋國之賤臣也白龍不化豫且不射今棄萬乘之位而從布衣之士飲酒臣恐其有豫且之患矣王乃止呂氏春秋曰禹南濟江黃龍負舟人懼五色無主禹笑曰吾受命於天竭力以飬人奈何憂於龍龍弭耳而逃又曰晉文返國介子推不肯受賞自為詩賦曰有龍于飛周遍天下五蛇從之為之承輔龍反其鄉得其處所四蛇從之得其露雨一蛇著之死於中野懸書公門而伏山下文公聞之曰嘻此必介子推家語曰鱗蟲三百六十而龍為長水之怪龍罔象夏食而冬蟄皇甫謐帝王世紀曰太昊包犧氏風姓有景龍之瑞故以龍紀官又曰黃帝采首山銅鑄鼎荊山下有龍垂胡髯而下迎黃帝群臣欲從持龍髯髯拔遂墮說文曰龍鱗蟲之長能幽能明能小能大能短能長春分而登天秋分而入淵山海經曰夏后啓乘兩龍雲蓋三層左手操翳右手操環又曰鍾山之神名曰燭龍視為晝瞑為夜身長三千里括地圖曰龍池之山四方高中央有池方七百里群龍居之多五花樹群龍食之去會稽四千里論衡曰龍少魚衆少者為神列仙傳曰騎龍鴻者於池中求得龍子狀如守宮十餘頭結草廬而守飬之龍大稍稍去後五十餘年水壞其廬一旦騎龍來語云吾馮伯昌孫也此間人不去百里當皆死信之者皆去不信者以為妖言至八月水出死者以萬計又曰陵陽子明者好釣釣得白龍子明解釣拜謝放之後數十年得白魚魚腹中有書教子明服食遂上黃山採五石脂石肺服之三年白龍來迎止陵陽山上百餘年又曰馬師皇者黃帝馬醫有龍下垂耳張口師皇針其唇飲以甘草湯而愈後一旦負之而去又曰陶安公者六安鑄冶師也數行火一旦散上紫色衝天安公伏冶下求哀須臾朱雀止冶上曰安公冶與天通七月七日迎汝以赤龍至期赤龍來安公騎之大雨東南上而去又曰呼子先者漢中關下卜師也老壽百餘年臨去呼酒家老嫗曰急裝常與汝俱夜有仙人持二茅狗來呼子先子先持一與嫗嫗得而俱騎騎乃龍也上華陰山嘗於山上大呼言子先酒母在此耳
