body:
  text: 兵部六十六營壘孫子曰絶斥澤唯亟去無留斥鹹鹵之地水草惡浸洳不可處軍也亟紀力切為交軍於斥岸之中必依水草而背衆樹不得已與敵戰而會斥澤之中當背稠樹以為固守也此處斥澤之軍也平陸處易車之利也而右背高前死後生戰便也此處平陸軍也禮記曰四郊多壘卿大夫士之辱也左傳曰許伯致師御靡旌摩壘而還史記曰黃帝修德振兵與神農戰于阪泉之野以師兵為營衛漢書曰周亞夫軍於細柳天子入壁門而不得進上曰此真將軍又曰李陵浚稽山與單于相值可三萬陵軍居兩山間以大車為營陵引士出營外為陳前行持弓弩令曰聞金聲而止虜還見漢軍少直前就營陵搏戰攻之如淳曰手對戰也千弩俱發應絃而倒虜還走上山漢軍追擊殺數千人單于大驚後漢書曰岑彭伐蜀所營地名彭亡聞而惡之欲徙會日暮蜀刺客詐為士奴降夜刺殺彭又曰樊宏王莽末與宗家親屬作營塹自守老弱歸之者千餘家時赤眉賊欲前攻宏營宏遣人持牛酒米粟勞遺赤眉赤眉長老聞宏仁厚皆稱曰樊君素善旦今見待如此何必攻之引兵而去遂免寇難又曰第五倫少介烈有義行王莽末盜賊起宗族閭里爭往附之倫乃依險固築營壁有賊輒奮厲其衆引疆持滿以拒之又曰吳漢自將步騎二萬餘人進逼成都去城十餘里阻江北為營作浮橋使副將武威將軍劉尚將萬餘人屯於江南東觀漢記曰龐萌攻蓋延延與戰破之詔書勞延曰龐萌一夜反叛相去不遠營壁不堅殆令人齒欲相擊而將軍有不可動之節吾甚美之魏志曰鄧艾每見高山大澤輒規謀度指畫軍營處所時人皆笑之又曰諸葛亮死軍退司馬宣王幸其營壘曰天下奇才也又曰曹公征馬超於關中軍于渭南為賊衝突營不得立地又純沙不勝版築其將婁伯説公曰今天寒可起沙為城以水灌之須臾冰堅如鐵石功不達曙百堵所立雖金湯之固未能過也公從之比明已就又曰蜀先主劉備東下伐吳魏文帝聞備樹播連營七百餘里謂群臣曰備不曉兵豈有七百里營可以拒敵者乎包原隰險阻而為軍者為敵所擒此兵忌也緩急不相救一軍潰則衆心恐矣數日果有備敗書至晉書曰沮渠蒙遜載記曰改業築西安城以其將臧莫孩為太守蒙遜曰莫孩勇而無謀知進忘退所謂為之築冢非築城也改業不從俄而為呂纂所滅又曰姚萇破魏褐飛於杏城萇命其將當城於營處一柵孔中蒔樹一根以旌戰功歲餘問之城曰營所至小已廣之矣萇曰少來鬥戰無如此快以一千六百人破三萬衆國之事業由此剋舉小乃為奇大何足貴又曰成都王潁憚長沙王乂在內遂與河間王顒表請誅后父羊玄之左將軍皇甫啇等擊乂使就第乃與顒將張方伐京都以平原內史陸機為前將軍假節潁至朝歌每夜矛戟有光若火其壘井中皆有龍像進軍屯河南阻清水為壘造浮橋以通河北以大木函盛石沉之以擊橋名曰石鱉崔鴻後趙録曰河瑞元年石勒下冀州郡縣保壁百餘衆至十餘萬其衣冠人物集為君子營宋書曰宗越善營立陳每數萬人正頓自騎馬前行使軍人隨其後馬止營合未嘗參差梁書曰王僧辨陳霸先之破侯景也耀軍于張公洲高旗巨艦遏江蔽日乘潮順流景登石頭城而覩之不悅曰彼軍上有如是之氣不可易也因率鐵騎萬人聲鼓而進霸先謂僧辨曰善用兵者如常山之蛇首尾相應賊今送死欲為一戰我衆彼寡宜分其勢僧辨然之乃以強弩攻其前輕鋭蹂其後徑衝其中景遂大潰棄城而遁後周書曰楊猛鎮潼關封郃陽伯邑七百戶俄而潼關不守猛於善渚谷立柵收集義徒授征東將軍楊州刺史大都督武衛將軍仍鎮善渚大統三年為竇泰新襲猛脫身得免太祖以衆寡不敵弗之責也仍配兵千人守牛尾堡唐書曰德宗幸奉天李晟赴難李懷光以朔方軍屯咸陽不欲晟獨當一面以分功乃奏請晟兵詔令晟將兵合懷光軍晟引兵至陳陶斜軍壘未周賊出兵來攻晟乃出陳且言於懷光曰賊堅保宮苑攻之未必克今出穴而欲一戰此殆天以賊賜明公也懷光恐晟有功乃曰馬未銜秣士不素飽不飽不若斂兵俟時而發晟乃收軍入壘又曰高宗遣將軍裴行儉討突厥軍至單于都護府之北際晚下營壕塹方周遽令移就崇岡將士云衆已就安堵不可勞擾行儉不從更令徙之此夜風雨暴至前設營所水深丈餘將吏驚服問行儉曰何以知風雨也行儉笑曰自今但依我節制何須問我所由知也三國典略曰蕭紀兵次西陵艫舳旌戈翳川曜日護軍陸法和於硤兩岸築二壘運石填江鐵鎖斷之梁主令法和壘北斷白鴈城道別立小柵孟子曰天時不如地利地利不如人和三里之城七里之郭環而攻之而不勝夫環而攻之必有得天時者矣然而不勝者是天時不如地利也城非不高也池非不深也兵革非不堅利也米粟非不多也委而去之是地利不如人和也博物志曰處士東里愧責禹亂天下事禹退作三城強者攻弱者守敵者戰城蓋禹始也太公兵法曰張軍處將必避七舍七殃武王曰何謂七舍七殃太公曰張軍勿居天社勿居地社勿居虛器勿居宿死勿居吞害勿居蜚鋒勿居湖泉武王曰何謂天社太公曰地高而仰者也何謂地社卑而下者也何謂虛器故敗邑人莫居之者也何謂宿死冢墓丘陵間也何謂湖泉枯澤無水者也何謂吞害即人所聚五穀處也何謂蜚鋒地斥鹵禿不生草木也所謂七舍七殃不張軍處將也太白陰經曰偃月營形象偃月皆背山岡面陂澤輪逐山勢弦隨面直地窄山狹之所營又曰偃月外營右置上弦門中置偃月門左置下弦門文選曰夜薄休屠營盧思道從軍行曰平明偃月屯右地薄暮魚麗逐左賢烽燧説文曰烽燧候表也邊有警則舉火也漢書音義曰高臺上作桔槔頭置兜零以薪草置其中常懸之有寇則火然舉之曰烽下多積薪寇至則燔之望其煙曰燧晝則燔燧夜乃舉烽廣雅曰兜零箭也史記曰周幽王后褒姒好舉烽火叩賊鼓方喜王欲后喜輒詐為之後犬戎兵至舉烽火叩賊鼓群臣不救皆曰王欲后喜耳遂殺幽王及褒姒又曰魏王與信陵君博北境舉烽火言寇入界信陵君曰臣有客能知趙王陰事言趙王獵非寇也漢書曰單于立四歲胸奴復絶和親大入上郡雲中烽火通於甘泉東觀漢記曰郭伋為并州伋知盧芳賊難卒以力制常嚴烽候明購賞以結寇心又曰馬成繕治障塞自西河至渭橋河上至安邑於原至井陘中山至鄴皆築保壁起烽燧十里一候後漢書曰廉范為雲中太守會胸奴入塞烽火日通故事虜入度五千人乃移書傍郡求助吏自今虜兵度出五千人請移檄范不聽遂選精兵自率士卒拒之又曰遣驃騎大將軍杜茂屯北邊築亭候修烽燧後周書曰宇文貴性聰敏過目輒記嘗道逢二人謂其左右曰此人是縣黨何因輒行左右不識貴便説其姓名莫不唴伏白戟烽師為啇人所燒烽師納貨不言其罪他日北師隨例來參貴乃問云啇人烽何因私放烽師愕然遂自首伏明察如比隋書曰突厥染干為鄰部戰敗與長孫晟獨以五騎逼夜南走至旦行百餘里收得數百騎乃相與謀曰今兵敗入朝一降人耳大隋天子豈禮我乎玿厥雖來本無冤隙若往投之必相存濟晟知其懷二乃密遣從者入伏遠鎮令速舉烽染于見四烽俱發問晟曰城上然烽何也晟紿之曰城高地逈必遙見賊來我國家法若賊少舉二烽來多舉三烽大逼舉四烽使見賊多而又近耳染于大懼謂其衆曰追兵已逼且可投城既入鎮晟留其達官執室以領其衆自將染干馳驛入朝唐書曰元和中京兆尹李鄘奏三原高陵涇陽興平等四縣共管烽二十八所每年差烽子烽師九百七十五人今遠近無虞畿內烽燧請停從之玄女戰經曰諸見舉烽火傳言虜且起欲知審來不以言者時所加之得陽者不得陰者為來法晉令曰誤舉烽燧罰金一斤八兩故不舉者棄市甘氏天文占曰權舉烽遠近沉浮權四星在轅尾西邊地驚備烽候相望虜至則舉烽火十丈如今之井桔槔大錘其頭若警急燃火放之權重本低則末仰人見烽火吳時緣江戍圖曰每刺姦屯有五兵賊曹一人皆作烽火有急以光傳之黃帝出軍決法曰行軍行兵兩敵相要地形不便望見烽火不得為客衛公兵法曰烽臺於高山四顧險絶處置之無山亦於孤逈道平地置下築羊馬城高下任便常以三五為準臺高五丈下闊一丈形圓又曰諸軍馬擬停三五日即須去軍一二百里以來安置爟烽如有動靜舉相報其烽並於賊路左側逐要置每三十里置一烽應接令遣到軍其遊奕馬騎晝日遊奕候視至暮速即作食喫即移十里外止宿慮防賊徒暮間見煙火夜間掩襲捉將其賊路左右草中著人宿止以聽賊徒如覺來報烽家舉烽報軍司如覺十騎以上五騎以下即放火炬火前鋒應訖即滅火若百騎以上二百已下即放兩炬火準前應滅賊若五百騎以上五千騎以下即同放三炬火準前應滅前鋒應訖即赴軍若虜走不到軍即且投山谷逐空方可赴軍如以次烽候視不覺其舉火之烽即須差人急走告知既置爟烽軍內即須應接又置一都烽應接四山諸烽其都烽如見煙火急報大揔管云某道煙火起大揔管當須嚴備收拾畜生遣人遠拓每烽令別奏一人押一道烽令折衝果毅一人都押庾闡楊都賦注曰烽火以置於孤山頭緣江相望或百里或五十里或三十里寇至則舉以相告一夕可行萬里孫權時合暮舉火於西陵鼓三竟遠吳郡南徐敬業古意曰甘泉警烽候上谷抵樓蘭北門行曰羽檄起邊庭烽火入咸陽張景陽雜詩曰長鋏鳴鞘中烽火烈邊庭蔡雍徙朔方上書曰既到徙所乘塞守烽職在候望憂怖憔灼無心復能操筆成草致章闕庭蔡謨與弟書曰軍之耳目當用烽鼓烽可遙見鼓可遙聞須臾百里京觀左傳曰丙辰楚軍於邲遂次于衡雍潘黨曰君盍築武軍築武軍營以章武功而收晉尸以為京觀臣聞剋敵必視子孫以無志武功楚子曰非爾所知也夫文止戈為武武王克啇作頌曰載戢干戈載櫜弓矢我求懿德肆于時夏古者明王伐不敬取其鯨鯢而封之以為大戮於是乎有京觀以懲淫慝大魚喻不義吞食小國也積尸封土其上謂之京觀又曰齊侯伐晉取朝歌為二隊入孟門登太行張武軍於滎庭戍郫邵封少水封晉尸於少水以為京觀以報平陰之役乃還又曰秦伯伐晉濟河焚舟封尸而還遂霸西戎崔鴻夏録曰赫連勃勃大破南涼殺衆數萬以人頭為京觀號曰髑髏臺梁書曰天殲醜類宜為京觀用旌武功
