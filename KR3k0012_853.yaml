body:
  text: 飲食部十䴺𪌘束晢餅賦曰䴺𪌘髓燭甘脆范汪祠制曰孟夏祭下甘脆安乾特束晢餅賦曰安乾粔籹之倫盧諶祭法曰四時祠皆用安乾特餳禮記內則曰棗栗飴蜜以甘之方言曰餳謂之張皇即乾飴也飴謂之䬵音該錫謂之糖江東皆言糖也凡飴謂之餳自關而東陳魏宋楚衛之間通語説文曰飴米蘗煎也飴和饊也釋名曰餳洋也煮米消爛洋洋然也飴小弱於餳形怡怡然也哺餔也如餳而濁可哺也後漢書曰明德馬皇后報章帝曰吾但當含飴弄孫不能復關政矣東觀漢記曰野王獻甘膠膏餳每作大發吏以為饒利樊閎知之臨薨奏焉四王起事曰惠帝到華陰河間王遣使上甘果餔二百幡幽明録曰王胤祖安國張顯等以太元中乘船見仙人賜糖飴三餅大如比輪錢厚二分淮南子曰柳下惠見飴曰可以養老盜跖見飴可以粘牝見物同而用之異也牝門戶籥壯也鹽鐵論曰洗爵以盛水升降而進糖禮雖備然非其貴也世説曰王君夫飴餔澳釜楚辭招魂曰粔籹蜜餌有張皇張皇餳也張衡七辨曰沙飴石蜜遠國貢儲崔實四民月令曰十月先水凍作煮餳煮暴飴盧諶祭法曰冬祠用荊餳
