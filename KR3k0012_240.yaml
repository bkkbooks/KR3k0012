body:
  text: 四征將軍征東將軍魏志曰張遼字文遠為征東將軍征孫權被甲戰先䧟陣衝壘入至權麾下又曰滿寵字伯寧為征東將軍詔曰君典兵在外專心憂公賜田十頃穀五百斛錢二十萬以明清忠儉約之節晉書王渾平吳轉征東大將軍復鎮壽陽渾不尚刑名處斷明允時吳人新附頗懷畏懼渾撫循羇旅虛懷綏納座無空席門不停賓於是江東之士莫不悅附征西將軍東觀漢記曰馮異為征西將軍入關征赤眉又曰耿秉為征西將軍領撫單于及薨南單于舉國發喪犁面流血魏志曰夏侯淵字妙才為征西將軍守漢中後魏書曰陸真代人也少善騎射數從征伐所在摧鋒䧟陣前後以功為征西將軍征南將軍魏志曰夏侯尚字仁伯淵從子也文帝與之親友太祖定冀州尚為軍司馬常從征討遷征南將軍又曰曹仁為征南將軍𨻳陵侯彰北征烏丸文帝在東宮為書戒彰曰為將奉法不當如征南耶晉書曰羊祐為征南將軍寢疾求入朝既至洛陽會景獻梓宮在殯哀慟至篤中詔申諭扶疾引見命乘輦入殿無下拜甚見優禮後魏書曰司馬景之字洪略晉汝南王亮之後太宗時歸封蒼梧公加征南大將軍征北將軍魏志曰杜恕為幽州刺史時征北將軍程嘉屯薊尚書袁侃等戒恕曰程申伯今俱杖節共屯一城宜深有以禮之沈約宋書曰衡陽王義季為征北將軍徐州刺史鎮東將軍魏志曰臧霸字宣高太山華陰人也亡命東海以壯勇聞太祖募索得霸見而悅之以為琅㖿相文帝即位遷鎮東將軍鎮西將軍魏志曰曹真字子丹文帝即位以真為鎮西將軍蜀志曰馬超父騰靈帝末與邊章韓遂等俱起居事於西州初平三年遂騰率眾詣長安漢朝以遂為鎮西將軍遣還金城騰為征西將軍屯郿鄔鎮南將軍蜀志曰黃權字公衡伐吳敗於白帝既附魏文帝曰君捨逆順欲追蹤陳韓耶權曰臣降吳不可歸蜀無路是以歸命敗軍之將免死焉幸何古人之可纂帝善之拜鎮南將軍吳志曰呂岱既定交州進討九真斬獲萬數又遣從事南宣國化及徼外扶南林邑堂明諸王各遣使奉貢權嘉其功進拜鎮南將軍晉書曰杜預為鎮南將軍繕兵甲曜威武乃簡精銳襲吳西陵督張政大破之以功增封三百六十五戶政吳之名將也據要害之地恥以無備取敗不以所喪之實告于孫皓預欲間吳邊將乃表還所獲之眾於皓皓果召政遣武昌監劉憲代之故大軍臨至使其將帥移易以成傾蕩之勢預處分既定乃啟請伐吳之期後魏書曰唐和詣闕世祖優之待以上客高宗以和歸誠先朝拜鎮南將軍鎮北將軍魏氏春秋曰許元字士宗為鎮北將軍都督河北諸軍事蜀志魏延字文長先主大會群臣問延曰今委卿以重任卿居之欲云何延對曰若曹操舉天下而來請為大王距之偏將十萬之眾至請為大王吞之先主稱善眾咸壯其言先主踐尊號進拜鎮北將軍晉書曰何曾為鎮北將軍文帝使武帝齊王攸送之帝又過其子曾先勑劭曰客必過汝汝當預嚴劭不冠帶停帝良久曾深以為譴劭曾見崇重如此安東將軍王隱晉書曰武帝伐吳以王渾為安東將軍晉公卿禮秩曰世祖以扶風王駿為安東大將軍安西將軍魏志曰曹仁字子孝太祖從弟也少好弓馬弋獵俊豪並起仁亦陰結少年周遊淮泗之間遂從太祖為別部司馬太祖討馬超以仁行安西將軍安南將軍謝承後漢書曰光武以岑彭為安南將軍安北將軍沈約宋書曰劉秀之東莞莒人少孤貧有志操為安北將軍雍州刺史上車馬幸新亭視秀之發引平東將軍王隱晉書曰武帝伐吳以王濬為平東將軍平西將軍蜀志曰馬超聞先主圍劉璋於成都密書請降先主遣人迎超超將兵徑到城下城中震怖璋即稽首以超為平西將軍沈約宋書曰臨川王義慶為平西將軍平南將軍王隱晉書曰武帝伐吳以胡奮為平南將軍平北將軍魏志曰太祖征冀州張燕求佐軍拜平北將軍鎮軍將軍魏志曰黃初七年魏文以陳群為鎮軍大將軍錄尚書事受顧命又曰甘露元年以石苞為鎮軍將軍沈約宋書曰齊王攸為鎮軍驃騎上後復舊撫軍將軍魏志曰黃初四年以司馬宣王為撫軍大將軍輔政又曰齊王嘉平三年以司馬景王為撫軍大將軍輔政語林曰簡文為撫軍時坐床上生塵不聽左右拂去見鼠行跡視以為嘉有參軍見鼠以手板格煞之撫軍謂曰無乃不可乎征虜將軍東觀漢記曰祭遵為征虜將軍廉潔奉公光武歎曰安得憂國奉公如祭征虜者乎魏志曰太祖以臨淄侯植為征虜將軍遣救曹仁呼有所勑而植醉於是罷之又曰南陽周太好立功善用兵以為征虜將軍沈約宋書曰征虜將軍世號金紫將軍冠軍將軍史記曰楚義帝以宋義卿子冠軍漢書曰武帝以霍去病征匈奴功冠三軍封冠軍侯魏志曰正始中以文欽為冠軍將軍楊州刺史晉起居注曰武帝泰始七年詔曰議郎胡奮開爽忠亮有文武才幹歷位外內涉練戎事威略之聲著于方外其以奮為冠軍將軍齊書曰劉悛嘗從駕登蔣山上數歎曰貧賤之交不可忘糟糠之妻不下堂顧謂悛曰此况卿也世言富貴好改其素情吾雖有四海今日與卿盡布衣之適悛起拜謝遷冠軍將軍晉書載記曰符堅寇晉以姚萇為龍驤將軍督益梁州諸軍事謂萇曰朕本以龍驤建業龍驤之號未曾假人今特以相授山南之事一以委卿堅左將竇衝進曰王者無戲言此將不祥之徵也惟陛下察之堅默然車頻秦書曰符堅與符健西入關堅時年十二未有軍號健夢有天神遣使者朱衣武冠拜堅為龍驤將軍後加此官以應神夢羊祜別傳曰先時吳童謠云阿童復阿童衘刀浮渡江不畏岸上虎但畏水中龍祜聞之曰此必水軍有功即表王濬為龍驤將軍謀伐吳輔國將軍晉書王導為輔國將軍導上牋曰昔魏武達政之主也荀文若功臣之最也封不過亭侯倉舒愛子之寵贈不過別部司馬以此格萬物得不局跡乎今者臨郡不問賢愚豪賤皆加重號輒有鼓蓋時有不得者或為恥辱天官混雜朝望頹毀導忝荷重任不能崇浚山海而開創亂源饕竊名位取紊彝典謹送鼓蓋加崇之物請從導始庶令雅俗區別群望無惑王隱晉書曰王濬為輔國將軍又曰羊琇以輔國將軍開府儀同領軍將軍魏志曰文帝即位拜曹休為領軍將軍晉書曰紀瞻轉領軍將軍當時服其嚴毅雖恒疾病六軍敬憚之瞻以久病請去官不聽復加散騎常侍及王敦之逆帝使謂瞻曰卿雖病但為朕臥護六軍所益多矣晉陽秋曰韓康伯年四十九拜領軍疾病占候者云不宜此官固請徙之何法盛晉中興書曰陶回拜領軍將軍加散騎常侍性方範不畏強禦丹陽尹桓景頗以佞事司徒王導導甚眤之回常慷慨謂景非正人不宜親狎會熒惑守南斗經旬王公語回曰南斗楊州分而熒惑守之吾當遜位以厭此讁回荅曰公以明德作鎮輔弼聖主當親忠貞遠邪佞與桓景造膝熒惑何由退舍導深愧之梁書曰胡曾祐拜領軍將軍厚自封植以所加鼓吹恒置齋中對之自娛人曰此是羽儀公名望隆重不宜若此荅曰我性愛之恒須見耳或出遊亦以自隨人士笑之唐書曰貞元十一年以前太子賓客李愿為左領軍大將軍李憑為右威衛大將軍依前兼中丞皆太尉晟之子以免喪故晟諸子同日授官者凡九人護軍將軍王隱晉書曰王敦將復作逆明帝問曰何如應詹厲然慷慨荅詔曰陛下宜奮赫斯之威臣等當負戈從戎以順討逆誠社稷之計也即以詹為護軍將軍同心滅敦中軍將軍漢書曰馮奉世字子明元帝以為中軍屯首陽魏志曰曹真持節都督中外諸軍事中軍將軍受顧命王隱晉書曰太始元年以羊祐為中軍將軍惣宿衛游擊將軍史記曰漢高祖以陳狶為游擊將軍漢書曰太祖太初元年以蘇建韓說為游擊將軍袁宏漢紀曰建武二年以鄧隆為游擊將軍助朱浮攻彭寵魏志曰卞闌少有才學為游擊將軍加散騎常侍山濤啟事曰游擊將軍諸葛冲精果有文武擬補兗州詔荅曰冲領兵未欲出之積射將軍後周書曰于謹除積射將軍又隨廣陽王元深征鮮于脩禮停軍中山侍中元晏言於靈太后曰廣陽王以宗室之重受律專征今乃盤桓不進坐圖非望又有于謹者智略過人為其謀主風塵之隟恐非陛下純臣矣靈太后詔於尚書省門外立牓募能獲謹者許重賞謹聞之乃謂廣陽王曰今女主臨朝取信讒佞脫不明白殿下素心便恐禍至謹請束身詣闕歸罪有司披露心腹深遂許之謹遂到牓下曰吾知此人眾共詰之謹曰我即是也有司以聞靈后引見之大怒謹備述廣陽忠款兼陳停軍之狀靈后意解捨之世語曰積射將軍樊震對武帝稱鄧艾之忠積弩將軍沈約宋書曰積弩將軍晉官也齊職儀曰積弩將軍品第四銀章青綬武冠絳朝服佩水蒼玉晉太康十年立積弩積射營各二千五百人並以將軍領之強弩將軍漢書曰元狩元年以李沮為強弩將軍伐匈奴又曰太初二年以路愽德為強弩將軍又曰神雀二年以許延壽為強弩將軍遷大司馬傅暢晉讚曰晉文王晉臺置強弩將軍掌宿衛殿中將軍玄中記曰漢桓帝時出遊河上忽有一青牛從河中出直走盪桓帝邊人皆走太尉何公為殿中將軍有勇力輒走逆之牛見公往乃反走還河未至河公及牛乃以手拔牛左足脫以右手持斧斫牛頭殺之此青牛者是萬年木精也語林曰庾公欲伐王公先書與郄公曰老賤賊轉欲輈張殿中將軍舊用才學士以廣視聽而頃悉內面牆人是欲蔽主之明便欲勒數州之眾以除君側之惡今年之舉篾不濟矣員外將軍後魏官氏志曰員外將軍從第八品直閣將軍後魏書曰楊曄字延季弘農華陰人也性雅厚頗有文學起家奉朝請稍遷直閣將軍蕭子顯齊書曰王敬則晉陵南沙人也生而紫胞年長而腋下生乳各長數寸夢騎五色師子明帝即位為直閤將軍齊書曰劉善明為直閤將軍五年青州沒虜善明母陷北虜移置桑乾善明布衣蔬食哀慼如持喪明帝每見為之歎息時人稱之
