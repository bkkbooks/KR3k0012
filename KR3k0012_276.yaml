body:
  text: 兵部六良將上論語曰子曰孟之反不伐孔注曰魯大夫孟之側也與齊戰軍大敗不伐者不自伐其功也孝經左契曰將軍順虎御銜珠大夫正海出魚抱朴子曰良將剛則法天可望而不可干柔則象淵可觀而不可入去如收電可見而不可得留如山嶽可瞻而不可量唐子曰良將如泉如山不知其歡戚也史記曰吳起者衛人也好用兵事魯君齊人攻魯魯欲將起起取齊女為妻而疑之起遂殺妻明不為齊也魯卒以為將大破齊後之魏又曰陳勝之反秦使王離擊趙王及張耳巨鹿城或曰王離秦之名將也又曰魏文侯問吳起何如人李克曰其用兵司馬穰苴弗能過也於是魏文侯以為將擊秦拔五城又曰杜業曰竊見朱博忠信勇猛材略不世出誠國家雄俊之寶臣也宜徵博左右以填天下此人在朝則陛下可高臥矣又谷永傳曰平阿侯談位持進領城門兵永聞與談書曰君侯躬周召之德執管晏之操敬賢下士樂善不倦宜在上將久矣屬聞以特進領城門兵屬之欲切愚竊不為君侯喜宜深辭職自陳淺薄不足以固城門守收太伯之讓保謙謙之路闔門高枕為智者談得書大感遂辭讓不受領城門職又曰霍去病為驃騎將軍上嘗欲教之孫吳兵法對曰顧方略何如耳不至學古兵法上為治第令視之對曰胸奴不滅無以家為又曰李廣為右北平胸奴號曰漢飛將軍廣歷七郡太守前後三十餘年得賞賜輒分其麾下飲食與士卒共之家無餘財不言生産事又曰李廣其先曰李信秦時為將逐其燕太子丹者也廣以良家子從軍擊胡文帝曰惜廣不逢時令當高祖世萬戶侯豈足道哉又曰劇孟洛陽人也以任俠顯吳楚反時條侯為太尉乘傳東將至河南得劇孟喜曰吳楚舉大事而不求劇孟吾知其無能為也天下騷動大將得之若一敵國又曰沛公入咸陽諸將皆爭赴金帛財物之府分之蕭何獨先收秦丞相御史律令圖書藏之沛公具知天下厄塞戶口多少強弱處民所疾若者以得圖書故也後漢書景丹傳曰帝曰景將軍北州大將是其人也又馬武傳論曰中興二十八將前世以為上應二十八宿未之詳也然咸能感會風雲奮其智勇稱為佐命亦各志能之士也又曰賈復傳曰世祖大驚曰我所以不令賈復別將者為其輕敵也不然失吾名將又曰馮異大破赤眉于郁璽書曰始雖垂翅回溪終能奮翼澠池可謂失之東隅收之桑榆者也又曰耿秉能説司馬兵法尤好將帥之略又曰馮異字公孫為人謙退不伐行與諸將相逢輒引車避道東觀漢記曰續漢書云異勑吏士非交戰受敵常行諸營之後相逢引車避之由是無爭道變鬭者也進止皆有表識言其進退有常處軍中號為整齊每所止舍諸將並坐論功異常獨屏樹下軍中號曰大樹將軍光武破邯鄲乃更部分諸將各有配隸隸屬也袁山松書曰先時諸將同營吏卒多犯法軍士皆言願屬大樹將軍光武以此多之又鄧禹傳云赤眉遂入長安是時三輔連覆敗赤眉所過殘滅百姓不知所歸聞禹乘勝剋而師行有紀綱紀也言有條貫而不殘暴皆望風相攜負以迎軍降者以千數衆號百萬禹所止輒停車住節住或作柱以勞來之父老童稚垂發戴白垂髮童幼也戴白父老也滿其車下莫不感悅於是名震關西帝嘉之數賜書褒美又曰竇融以兄弟並受爵位久專方面懼不自安數上書求代詔報曰吾與將軍如左右手耳韓信亡蕭何自追之人曰丞相何亡高祖聞之如失左右手見前書數執謙退何不曉人意勉循士人無擅離部曲又曰諸將每論功自伐賈復未嘗有言帝輒曰賈君之功我自知之又曰陳蕃楊秉處稱賢宰皇甫張遐出號名將又曰馮緄字鴻卿巴郡宕渠人也長沙蠻寇益揚荊南皆沒於是拜緄為車騎將軍軍長沙進擊武陵蠻溪荊州平定詔賜錢一億固讓不受振旅還師推功於從事中郎東觀漢記曰上自征隗囂至漆諸侯多以王師之重不宜遠入險阻計未決會召馬援因説隗囂將帥土崩之勢兵進必破之狀於上前聚米為山指畫囂衆大潰又曰吳漢當出師朝受詔夕即引道初無辦嚴之日故能常任職以功名終又曰吳漢常屬吏士治兵事上時令人視吳公何為還言曰方修攻具上曰吳公隱若一敵國矣魏志曰諸葛亮斜谷出軍至武功司馬宣王禦之亮挑戰宣王不出亮遺之婦人巾幗宣王怒表請決戰天子不許遣辛毗杖節立於軍門以制之會亮病卒歸宣王不敢追之而退百姓為之語曰死諸葛走生仲達宣王曰吾便料死故也宣王案幸亮營壘處曰天下奇才也又曰趙典字曼成好學問貴儒不與諸將爭功敬賢士大夫若不及又任城王傳曰太祖問諸子所好便各言其志至彰曰好為將又曰劉曄謂太祖曰諸葛亮明於治而為相關羽張飛勇冠三軍而為將蜀人既定據險守要則不可犯矣又曰賈逵字梁道河東人自為兒童戲弄常設部伍祖父習異之曰汝大必為將率口授兵法數萬言蜀志曰鄧芝為大將二十餘年賞罰明善恤卒伍身之衣食資仰於官然終不治私産妻子不免飢寒死之日家無餘財又曰關羽字雲長亡命奔涿先主於鄉里合徒衆而羽與張飛為之禦侮晉書曰應詹遷南平太守鎮南將軍山簡復假詹督五郡軍事蜀賊杜疇作亂金寶溢目詹一無所取唯收圖書莫不難之又曰周訪威風既著遠近悅服智勇過人為中興名將性謙虛未嘗論功伐或問訪曰人有小善鮮不自稱卿功勳如此初無一言何也訪曰朝廷威靈將士用命訪何功之有又曰蘇峻平論功顧衆推功於蔡謨謨衆唱謨非己之力俱表相讓論者美之又曰符堅衆號百萬次于淝水謝玄入問計謝安無懼色方與玄圍碁遊涉至夜乃還指受將帥各當其任玄等破堅驛書至安對客圍碁看書便攝放床上了無喜色客問徐答小兒輩破賊既罷還內過戶限心喜甚不覺屐齒之折其矯情鎮物如此也又曰帝謂紀瞻曰卿雖疾病為朕臥護六軍所益多矣又羊祜傳曰吳人寇戈陽江夏略戶口語遣侍臣移書詰祜不追討之意并欲移州復舊之宜祜曰江夏去襄陽八百里皆知賊去亦已經日矣步軍方往安能救之哉勞師以免責恐非事宜也昔魏武帝置都督皆與州相近以兵勢好合惡離疆場之間一彼一此慎守而已古之善教也若輒徙州賊出無常亦未知之所宜據者使者不能詰又曰羊祜入朝武帝遣中書令張華問其籌策祜曰今主上有禪代之美而功德未著吳人虐政已甚可不戰而剋混一六合以興文教則主齊堯舜臣同稷契為百代之盛若孫皓不幸而殘吳人更立令主雖百萬之衆長江未可而越也將為患乎華深讚成其計祜謂華曰成吾志者子也帝欲使祜臥護諸將祜曰取吳不必須臣自行但既平之後勞聖慮耳功名之際臣所不敢居事當有所付授願審擇其人疾漸篤乃舉杜預自代尋卒又曰毛穆之鎮廣陵遷右將軍宣城內史假節鎮姑熟穆之以為戍在近畿無復軍驚不宜加節上疏辭讓許之又曰朱伺字仲文安陸人少為吳牙門將陶丹給使吳平徙江夏伺有武勇訥口不知書為郡將督見鄉里士大夫揖稱名而已及為將遂以謙恭稱又曰鄧遐字應遠勇力絶人氣蓋當時人方之樊噲桓溫以為參軍數從溫征伐歷冠軍將軍數郡太守號為名將襄陽城北沔有蛟常為人害遐拔劍入水蛟繞其足遐揮劍截蛟數假而出又曰劉牢之面紫赤色鬚目驚人而沉毅多計畫干寶晉紀曰文淑字次騫小名鴦有武力算策楊休胡烈為虜所害武帝西憂遣淑出征所向摧靡秦涼遂平名震天下為東夷校尉姿器膂力萬人之雄慕容盛載記曰尚書左僕射領中軍熙從征句驪契丹皆勇冠諸將又曰皇甫真字楚季弱冠以高才隨慕容評攻鄴都珍貨充溢真一無所取唯存恤人物收圖籍而已二石偽事曰郭權降石虎虎問權曰卿若得吾者當殺不權曰若登時得至尊必殺不疑也虎曰卿健將也因與共言事崔鴻前燕録曰張蚝本姓弓上黨人也膂力過人能曳牛走堅甚寵之常侍左右終為名將所在有殊功世稱鄧羌張蚝皆萬人敵也宋書曰姚泓屯軍長城下王鎮惡撫慰士卒及以身先士衆騰躍爭先泓衆一時奔潰泓妻子歸高祖降將至京鎮惡於灞上奉迎高祖勞之曰成吾霸業者真卿也鎮惡再拜謝曰此明公之威諸將之力鎮惡何功之有焉笑曰卿欲學馮異耶又曰桓玄云劉毅勇冠三軍當今實為無敵又曰劉順幢主樊僧愛勇冠三軍軍中皆懼齊書曰曹景宗建武四年隨太尉陳顯達北圍馬圈以奇兵二千破魏援中山王英四方人及剋馬圈顯達論功以景宗為後景宗退無怨言又曰垣崇祖初見高帝便自北韓白唯上獨許之及破魏軍啓至上謂朝臣曰崇祖恆自擬韓白今其人也進為都督梁書曰馮道根每征伐終不言功其部曲或怨非之道根喻曰明主自監功夫多少吾將何事武帝常指道根示尚書令沈約美其口不論勳約曰此陛下之大樹將軍也梁後略曰陸納分其衆輕舸掩襲巴陵晨至城下驃騎始命諸將會議乃出自壘門坐胡床以望之賊乘水來攻矢下如雨人情搔擾莫不震懼而驃騎方食甘蔗曾無遽色又曰齊遣其將竇泰趨潼關太祖將襲秦衆咸難之太祖問策於宇文深深對曰竇氏歡之驍將也歡每伏之以為禦侮北齊書曰劉豐本出河間樂城豐有雄姿壯氣果毅絶人有口辨好説兵事又曰辛術字懷哲隴西狄道人也清儉寡欲及平楚定淮南凡諸資物一毫不犯唯收典籍多是晉宋齊梁時佳本鳩集萬有餘卷
