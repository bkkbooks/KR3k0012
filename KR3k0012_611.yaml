body:
  text: 學部四禮釋名曰禮體也言得事之體也太公六韜曰禮者理之粉澤莊子曰三王五帝之禮義法度其猶樝梨橘柚雖其味相反而皆可於口也論語曰不學禮無以立詩曰相鼠有體人而無禮人而無禮胡不遄死禮記樂記曰簠簋俎豆制度文章禮之器也升降上下周旋禓襲禮之文也又燕居曰禮者何也即事之治也君子有其事必有其治治國而無禮譬猶瞽之無相與倀倀乎其何之譬如終夜有求於幽室之中非燭何見若無禮則手足無所措耳目無所加進退揖讓無所制倀丑良切又曲禮曰君子恭敬撙節退讓以明禮曰鸚鵡能言不離飛鳥猩猩能言不離禽獸今人而無禮雖能言不亦禽獸之心乎又禮運曰禮之於人也猶酒之有糵也君子以厚小人以薄又樂記曰樂者非謂黃鍾大呂弦歌干楊也樂之末節也故童者舞之鋪筵席陳撙俎列豆籩以升降為禮者禮之末節也故有司掌之又禮器曰君子之行禮也不可不慎也衆之紀也紀散而衆亂又曰先王之立禮也有本忠信禮之本也義理禮之文也無本不立無文不行又經解曰夫禮禁亂之所由生猶坊止水之自來也故以舊坊為無所用而去之者必有水敗以舊禮而無所用而去之者必有亂患又禮運曰夫禮先王以承天之道以治人之情故失之者死得之者生詩曰相鼠有體人而無禮人而無禮胡不遄死是故禮必本於天殽於地列於鬼神達於喪祭射御冠昏朝聘聖人以禮示之天下國家可得而正也春秋説題辭曰禮者體也人情有哀樂五行有興滅故立鄉飲之禮終始之哀婚姻之宜朝聘之表尊卑有序上下有體王者行禮得天中和斗居天中而有威儀王者法而備之是亦得天之中和也禮得則天下咸得厥宜陰陽滋液萬物調四時和動靜常用不可須臾惰也三禮正義曰周禮儀禮並周公所作記所謂禮經三百威儀三千禮經則周禮也威儀則儀禮也周禮遭秦滅學藏於山巖屋壁以故不亡漢武帝時有季氏獲之以上河間獻王獨闕冬官一篇購之千金不得乃以考工記補之遂奏入於祕府時儒以為非是不得至劉歆獨識其書知周公致太平之迹始奏立學官後鄭玄為之注儀禮周衰當戰國之世其書並亡至漢高堂生所傳十七篇唯士禮存焉後世推士禮以致天子之禮而行之至馬融鄭玄王肅並為之注解禮記正義曰禮記者本孔子門徒共撰所聞也後通儒各有損益子思伋作中庸公孫尼子作緇衣漢文時博士作王制其餘衆篇皆如此例至漢宣帝世東海后蒼善説禮於曲臺殿撰禮一百八十篇號曰后氏曲臺記后蒼傳於梁國戴德及從子聖德乃刪后氏記為八十五篇名大戴禮聖又刪大戴禮為四十六篇名小戴禮其後諸儒又加月令明堂位樂記三篇凡四十九篇則今之禮記也禮記有馬融鄭玄二家注馬注今亡唯鄭玄行於世矣漢書藝文志曰易曰有夫婦父子君臣上下禮義有所錯而帝王質文世有損益至周曲為之防事為之制言委曲防間每事為制也故曰禮經三百威儀三千及周衰諸侯將踰法度惡其害己皆滅去其籍自孔子時而不具至秦大壞漢興魯高堂生傳禮十七篇訖孝宣世后蒼最明戴德戴聖慶普皆其弟子三家立於學官禮古經者出於魯淹中應邵曰淹中里名也及孔氏學七十篇文相似多三十九篇及明堂陰陽王史氏記所見多天子諸侯卿大夫之制雖不能備愈倉等推士禮而致於天子之説師古曰愈與愈同愈勝也漢書曰樂以治內而為同禮以修外而為異同則和親異則畏敬也范曄後漢書曰曹褒論曰漢初朝制無文叔孫通頗採禮經參酌秦法雖適物觀時有救崩斃先王之宏典蓋多闕矣晉書曰韋逞母宋氏家世儒學其父授以周官音義謂之曰吾家世學周官傳業相繼此周公所制經紀典誥百官品物備於此矣吾無男汝可授之勿令絶世後符堅幸太學博士盧壺奏曰廢學已久書傳零落比年撰綴唯周官禮注未有其師竊見太常韋逞母宋氏傳其父業得周官晉義今年八十視聽無闕非此母無以傳授後生於是就其家立講堂隔綘紗幔而傳受以宋氏為文宣君賜侍婢十人周官後學傳於世時稱韋氏宋母唐書曰開元十四年上令太子賓客元行沖撰類禮義疏將立學官疏成右相張説駮奏曰今之禮記是前漢戴德戴聖所編録歷代傳習已向千年著為經教不可刊削至魏孫炎始改舊本以類相比有同抄書先儒所非竟不行用貞觀中魏徵因炎所修更加整比兼為之注先朝雖厚加賞錫其書竟亦不行今行沖等奉詔修撰勒成一家然與先儒義乖章句隔絶若欲行用竊恐未可上然其奏遂不得立學行沖意諸儒排己退著論以自釋春秋杜預序云春秋者魯史記之名也楚謂之檮杌晉謂之乘而魯謂之春秋其實一也釋名曰言春秋冬夏終以成歲舉春秋則冬夏可知也春秋正義曰孔子授春秋於卜商卜商又授之弟子公羊高穀梁赤又各為之傳則今公羊穀梁二傳是也左氏傳有賈逵訓服虔杜預注公羊傳有何休解詁穀梁有范寧集解春秋握成圖曰孔子作春秋陳天人之際記異考符春秋演孔圖曰作法五經連之天地稽之圖象質於三王施之四海史記太史公曰先人有言自周公卒五百歲而有孔子孔子卒後至於今五百歲有能紹明世正易傳繼春秋本詩書禮樂之際意在斯乎意在斯乎小子何敢讓耶上大夫壺遂曰昔孔子何為而作春秋哉太史公曰余聞董生曰周道衰廢孔子為魯司寇諸侯害之大夫壅之孔子知言之不用道之不行也是非二百四十二年之中以為天下儀表貶天子退諸侯討大夫以達王事而已矣子曰我欲載之空言不如見之於行事之深切著明也夫春秋上明三王之道下辨人事之紀別嫌疑明是非定猶豫善善惡惡賢賢賤不肖存亡國繼絶世補敝起廢王道之大者也撥亂世反之正莫近於春秋春秋文成數萬其指數千萬物之散聚皆在春秋春秋之中弒君三十六亡國五十二諸侯奔走不得保其社稷者不可勝數察其所以皆失其本已故易曰失之毫釐差以千里故曰臣弒君子弒父非一朝一夕之故也其漸久矣故有國者不可以不知春秋前有讒而不見後有賊而不知為人臣者不可以不知春秋守經事而不知其宜遭變事而不知其權為人君父而不通於春秋之義者必蒙首惡之名為人臣子而不通於春秋之義者必陷篡弒之誅死罪之名其實皆以為善為之不知其義被之空言而不敢亂夫不通禮義之指至於君不君臣不臣父不父子不子夫君不君則犯臣不臣則誅父不父則無道子不子則不孝此四行者天下之大過也以天下之大過子之則受而不敢辭故春秋者禮義之大宗也漢書藝文志曰古之王者世有史官君舉必書所以慎言行昭法式也左史記言右史記事其事為春秋言為尚書帝王靡不同之周室既微載籍殘缺仲尼思存前聖之業魯周公之國禮文備物史官有法故與左丘明觀其史記據行事仍人道因興以立功就敗以成罰假日月以定曆數籍朝聘以正禮樂有所褒諱貶損不可書見口授弟子退而異言丘明恐失其真故論本意而作傳明夫子不以空言也又云劉歆為左傳學以左氏丘明好惡與聖人同親見夫子而公羊穀梁在七十之後傳聞與親見其詳略不同嘗共父向校書父為穀梁學數以難其父向向不能報也漢書曰春秋所貶損當時有威權者是以隱其書而不宣及末世口説流行故有公穀鄒夾之傳四家之中公羊穀梁立於學官東觀漢記曰張霸字伯饒以樊鯈刪嚴氏春秋猶多繁辭乃減為二十萬言更名張氏學鄭玄別傳曰何休字邵公作公羊解注妙得公羊本意作公羊墨守左氏膏肓穀梁廢疾玄後乃發墨守針膏肓起廢疾休見而歎曰康成入吾室操吾矛以伐我乎魏略曰魚豢嘗問魏禧左氏傳禧曰左氏相斫書耳不足精意也又曰嚴翰字公仲善於春秋公羊時司隸鍾繇不好公羊而好左氏以左氏為太官廚公羊為賣餅家故嘗數與辨折長短繇機捷善持論而翰訥口時屈無以應繇曰公羊高竟為丘明服矣翰曰直故吏為明公服爾公羊未肯也蜀志曰孟光字孝裕洛陽人博物識古無書不覽尤鋭意三長史於漢家舊典好公羊春秋而譏訶左氏每與來敏爭此二義常譊譊歡咋歡許袁切咋音俎格切晉書曰王濟解相馬又甚愛之而和嶠頗聚歙預嘗稱濟有馬癖嶠有錢癖武帝聞謂曰卿有何癖對曰臣有左傳癖王隱晉書曰劉兆字延世以春秋一經三家殊途命世名儒是非之議紛然牙為讎敵乃思三家之異合而通之周禮有和怨調人之官遂作春秋調人七萬餘言又曰杜預大觀群典謂公羊穀梁詭辨之言又非先儒説左氏未究丘明意而橫以二傳亂之乃錯綜微言著春秋左氏經傳集解又參考衆家謂之釋例又作盟會圖春秋長曆備成一家之學至老乃成祕書監摯虞賞之曰左丘明本為春秋作傳而傳遂自孤行釋例本為傳設而所發明何但左傳故亦孤行也三國典略曰張曜好讀春秋每月一遍時人比之賈梁道趙隱嘗謂曜曰君研尋左氏豈求服虔杜預之紕繆耶曜曰何為其然乎左氏之書備敘言事惡者可以自戒善者可以庶幾故厲己溫習非欲詆訶古人之得失也梁書曰崔靈恩清河東武城人也少篤學遍習五經尤精三禮傳仕魏為太常博士天監十三年歸梁纍遷步兵校尉兼國子博士靈恩聚徒講授聽者常數百人性拙朴無風采及解析經理甚有精致都下舊儒咸稱重之助教孔僉尤好其學靈恩先習左傳服解不為江東所行乃改説杜義每文句常申服以難杜遂著左氏條義以明之時助教虞僧誕又精杜學因作申杜難服以答靈恩世並傳之顏延之庭誥曰褒貶之書取其正言晦義輔制衰王春秋為上三輔決録曰賈逵建初元年受詔列春秋公羊穀梁不如左氏四十事奏之名左氏長義帝大善賜布五百匹又魏略曰逵好左傳及為牧守常課之月一遍桓談新論曰左氏傳世後百餘年魯穀梁赤為春秋殘略多有遺失又有齊人公羊高緣經文作傳彌離其本事矣左氏經之與傳猶衣之表裏相持而成經而無傳使聖人閉門思之十年不能知也又曰劉子政子駿伯玉三人尤珍重左氏下至婦女無不讀論者江表傳曰關羽好左氏略諷皆上口孝經孝經序曰吾志在春秋行在孝經是知孝者德之本歟春秋説題辭曰孝經者所以明君父之尊人道之素天地開闢皆有孝人非父不生非母不長天地開闢而生人承天地是故親生膝下以養父母孝經鉤命決曰孝經者篇題就號也所以表指括意序中書名出義見道曰著就成也孝為一篇之目十八章也成號序中心之事使孝義見於外一字苞十八章為天地喉襟道要德本故挺以題符篇冠就又曰曾子撰斯問曰孝文乎駮不同何撰撰經異同也子曰吾作孝經以素王無爵祿之賞斧鉞之誅故稱避席復坐吾語汝遜順以避禍災與先王以託權託先以為己權勢力目至德要道以題行題行題天子德行致群瑞己行所及也首仲尼以立情性情性猶天地己不正為天地子故行冠子以立之也言子曰以開號若夫子所以自開於受命也列曾子示撰輔使若得録圖之故行冠子以立之也佐與共治天下也矣書詩以合謀二人同心其利斷金同心之言其臭如蘭也孝經中契曰丘作孝經文成道立齊以白天則玄雲踊北紫宮開北門角元星北落司命天使書題號孝經篇云神星孔丘知元今使陽衢乘紫麟下告地主要道之君後年麟至口吐圖文北落郎服書魯端門隱形不見子夏往觀寫得十七字餘字滅消文其餘飛為赤烏翔摩青雲漢書藝文志曰孝經者孔子為曾子陳孝道也夫孝天之經也地之義也民之行也舉大者言故曰孝經後漢書曰向栩字輔興張角之亂栩上便宜頗譏剌左右不欲國家興兵但遣人於河上北向讀孝經賊自當消滅中常侍張讀奏栩不欲命將出師疑與角同欲為內應收送黃門北寺獄殺之謝承後漢書曰仇覽字李智一名香陳留考城人也為縣陽逐亭長有羊元者凶惡不孝其母詣覽告之覽呼元責哨元以子道與孝經一卷使誦讀之元深改悔至母前謝罪曰元少孤為母所諺曰孤犢觸乳驕子詈母乞今自改卒成佳士王隱晉書曰皇甫謐督終論曰氣絶之後以蘧蒢褁尸擇不毛之地葬焉皆無以自隨唯齎孝經一卷示不忘孝道也吳均齊春秋曰沈士字雲楨臨終遺命曰棺中依皇甫謐用孝經既殯不須立靈士安亦然也齊書曰顧歡字景怡有病邪者問歡曰家有何書答曰唯有孝經歡曰可取仲尼居置病人枕邊恭敬之自差也病者果愈後人問其故答曰善禳惡正勝邪此病者所以差也蕭方等三十六國春秋曰漢大將軍東平王約漢王聰戲之曰汝誦何書味何句也約曰臣誦孝經每詠身體髮膚受之父母不敢毀傷至於在上不驕高而不危未嘗不反覆誦之聰大悅後周書曰宇文貴字乾福少聰敏涉獵經史尤便騎射始讀孝經便謂人曰讀此一經足為身之本三國典略曰徐陵子份陵嘗遇疾甚篤份燒香泣涕跪誦孝經晝夜不息如此者三陵疾豁然而愈隋書曰鄭譯性輕高祖以其定策功不忍廢而陰踈之譯乃陰呼道士章醮以祈福助其婢奏譯猒蠱左道上謂譯曰我不負公此何意也譯無以對後憲司謐以不孝由是除名下詔曰譯嘉謀良策寂爾無聞鬻獄賣官沸騰盈耳若留之於世在人為不道之臣戮之於朝入地為不孝子鬼有纍幽顯無以置之宜賜以孝經令其熟讀後復其爵位又曰韋師字公頴京兆杜陵人也少沉謹有志性初就學始讀孝經捨書而歎曰名教之極其在茲又曰蘇威嘗謂煬帝曰先臣謂臣唯讀孝經一卷可以立身何用多為帝亦然之何安曰蘇威所學非止孝經厥父若信有斯言威不從命是其不孝若無斯言而面欺陛下是其不誠不誠不孝何以事君且夫子曰不學詩無以言不學禮無以立豈容蘇綽教子獨反聖人之旨乎唐書曰永徽中上命陳王師趙弘智於百福殿講孝經召中書門下三品及弘文館學士國子監學官並令預坐弘智演暢微言備陳五孝之義學士等難問連環弘智酬應如響上謂弘智曰宜略陳此經要道以輔不逮對曰昔者天子爰及諸侯卿大夫皆有諍臣願以此言奉獻上甚悅弘智及學士儒官並賚以繒帛漢實録曰敏使於湖南途出江陵帥高從誨為贄是時諫曰祭酒惠及經書從誨所識不過孝經十八章爾敏曰讀書不在多至德要道十八章足矣敏記諸侯章云在上不驕高而不危制節謹度滿而不溢此一章皆經要言也時從誨兵敗於郢謂敏見諷舉觥以自罰
