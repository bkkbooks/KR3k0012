body:
  text: 皇親部二十公主下唐書竇抗母隋文帝萬安公主抗在隋以帝甥甚見崇寵文帝幸其第命抗及公主酣宴如家人之禮也又曰隋煬帝至鴈門為突厥所圍蕭瑀進謀曰臣聞始畢託校獵至此義成公主初不知其有違背之心且在蕃夷俗可賀敦知兵馬事昔漢高解平城圍乃是閼氏之力況義成以帝女為妻必恃大國之援若發一單使以告義成假使無益事亦無損煬帝從之發使詣可敦諭旨俄而突厥解圍而去於後獲其諜人云義成公主遣使告急於始畢稱北方有警由是突厥解圍蓋義成公主之助也又曰凡公主封有以國名者鄎國代國霍國是也有以郡名者平陽宣陽東陽是也有以美名者太平樂安長寧是也唯玄宗之女皆以美名名之又曰高祖平陽公主起義兵公主於鄠縣莊散家資招引山中亡命得數百人以應高祖略地至盩厔武功始平皆下之每申明法令禁兵士無得侵掠故遠近奔赴者甚衆得兵七萬人公主間使以聞使者至高祖大悅及義軍渡河公主引精兵萬餘與太宗會於渭北與其駙馬柴紹各置幕府營中號為娘子軍京城平封為平陽公主以獨有功每賞賜異於他主及薨諡曰昭又曰竇誕竇抗弟三子也尚高祖女襄陽公主竇氏自武德至今再為外戚尚主者八人女為王妃六人唐世貴盛莫與為比又曰房玄齡之子遺愛尚高陽公主玄齡病上表諫征遼太宗見表謂玄齡子婦高陽公主曰此人危惙如此尚能憂我國家又曰房遺愛尚太宗女高陽公主拜駙馬都尉初主有寵於太宗遺愛既驕恣謀黜遺直而奪其封爵永徵中誣告遺直無禮於己高宗令長孫無忌鞫其事因得公主與遺愛謀反之狀遺愛伏誅公主賜自盡又曰杜如晦之子荷以功臣子尚城陽公主賜爵襄陽郡公授尚乘奉御貞觀中與太子承乾謀反坐斬又曰高士廉子以履行尚太宗女東陽公主拜駙馬都尉遭父艱居喪以孝聞太宗手詔敦喻曰古人立孝毀不滅身聞卿絶粒殊乖大禮幸抑摧裂之情割傷生之纍俄起為衛尉卿又曰蕭瑀子鋭尚太宗襄城公主公主雅有禮度太宗每令諸公主凡厥所為皆視其楷則又令所司別為營弟公主辭曰婦人事舅姑如事父母若居處不同則定省多闕再三固讓乃止又曰王圭子敬直尚南平公主禮有婦見舅姑之儀自近代公主出降此禮皆廢圭曰今主上欽明動循法制吾受公主謁見豈為身榮所以成國家之美耳遂與其妻就位而坐令公主親執笲行盥饋之道禮成而退是後公主下降有舅姑者皆備婦禮自圭始也又曰貞觀中長樂公主出降太宗以皇后所生勑有司資送倍於永嘉長公主祕書監魏徵諫曰不可昔漢明帝欲封其子云我子豈得與先帝子等可半楚淮陽前史以為美談天子姊妹為長公主天子之女為公主既加長字即是有所尊崇或可情有淺深無容禮有踰越上然其言又曰太平公主高宗少女以則天所生特承恩寵初永隆年降駙馬薛紹垂拱中被誣告與諸王連謀誅死則天乃殺武攸暨之妻以配主焉公主豐碩方額廣頤多權略則天以為類己每預謀議神龍年誅張易之有謀進號鎮國太平公主賞錫不可勝紀二年置公主府時中宗韋后上官昭容用事皆以為智謀不及公主甚憚之公主日益豪橫唐隆元年玄宗清內難公主又預其謀令男崇簡從之與玄宗尊立睿宗公主頻著大勳益尊重加實封五千戶通前一萬戶每入奏事坐語移日所言皆聽軍國大政事必參決如不朝謁即宰臣就第議其可否公主由是驕恣田園遍於近甸貨殖流於江淮公主懼玄宗英武乃連結將相專謀異計時宰相七人五出公主門先天二年玄宗漸危逼乃勒兵誅其黨蕭至忠等公主遁入山寺數日方出賜死于家藉其家財貨山積珍奇寶物侔於御府又曰唐隆元年勑公主置府近有勑揔停太平公主有崇保社稷功其鎮國太平公主府即宜依舊酸棗縣袁楚客奏記於中書令魏元忠曰女有內男有外男女有別剛柔分矣中外斯隔陰陽著矣豈可相濫哉然而幕府者丈夫之職非婦人之事今諸公主並開府建僚崇置官秩若以女處男職所謂長陰而抑陽也而望陰陽不僣風雨不爽其可得乎竊謂非致遠之計乖久安之策書曰事不師古以克永世匪説攸聞此之謂也君侯不正雅之哉又曰安樂公主韋后所生初中宗遷於房州欲及州境生於路次性惠敏容質秀絶中宗韋后愛寵日深恣其所欲奏請無不允許恃寵驕縱權傾天下自王侯宰相以下除拜多出其門所營第宅并造安樂佛寺擬於宮掖城西造定昆池於莊延袤數里出降之時以皇后仗發於宮中中宗與韋后御安福門觀之及韋庶人敗與駙馬武延秀皆斬之追貶為悖逆庶人又曰武延秀武承嗣之弟子也時武崇訓為安樂公主壻即延秀之從父兄也數引至主第延秀久陷蕃中解突厥語常於主第唱突厥歌作胡旋舞有姿媚主甚喜及崇訓死延秀得幸尚主拜席日授太常卿兼右衛將軍駙馬都尉又曰大中二年以起居郎駙馬都尉鄭皓尚萬壽公主詔曰女人之德雅合慎修嚴奉舅姑夙夜勤事此婦之節也先王制禮貴賤同遵既已下嫁臣寮儀則須依古典萬壽公主婦禮宜依士庶又曰弘化公主宗室女貞觀十三年降吐谷渾慕容諸曷鉢又曰文成公主宗室女貞觀十五年封降於吐蕃贊普弄贊命禮部尚書江夏王道宗送之弄贊親迎于河源見主人子壻禮甚謹歎大國服飾禮儀之美俯仰有愧沮之色謂所親曰我祖父未有通婚大國者今我得尚大唐公主當築一城以誇示後世仍遣酋豪子弟請入國學以習詩書從之又曰貞元三年遣回紇使合闕將軍歸其國初合闕將其君命請婚於我上許以咸安公主嫁之命公主見合闕於麟德殿且命齋公主畫圖就示可汗以馬價絹五萬匹還之許其互市而去以殿中監嗣王湛然為送咸安公主使仍兼婚禮使四年回紇公主兼使者至自本蕃上御延喜門禁婦人及車輿觀者時回紇可汗喜於和親其禮甚恭乃上言曰昔為兄弟今即子壻子壻半子也彼猶父此猶子父若患於西戎子當遣兵除之又曰太和公主長慶元年封為公主册為回紇可敦出降愛登里邏骨沒密施合毗伽保義可汗初保義可汗既立遣使求婚遂封第九妹為永安公主將以降嫁其年保義可汗卒册九姓回鶻為崇德可汗五月遣使請迎所許嫁公主朝廷封第五妹為太和公主以降今回紇焉雖狄人固請永安而終不許故命中書舍人王起就鴻臚寺以宣喻焉列仙傳曰朱仲會稽市販珠人高后募三寸珠乃詣闕上之珠好過度賜五百金魯元公主私以七百金從仲求珠獻四寸之珠又曰蕭史善吹簫教秦穆公女作鳳聲公為作鳳臺令夫妻止其上一旦皆隨鳳飛去荀氏家傳曰荀羡字令則年十五擬國婚之選君不欲連姻帝室乃遠遁長沙監司追尋不獲已遂尚尋陽公主世説曰桓武平蜀以李勢女為妾有寵嘗著齋後溫尚南康長公主主始不知之既聞乃伺溫不在率數十婢拔白刃往李所故欲斫之見李梳頭髮垂委地姿貌端麗乃徐下地結髮斂手向主曰國破家亡以至今日若能見殺實猶生之年神色間正辭氣悽婉主於是擲刀前抱之阿姊我見汝不能不憐何況老奴遂善遇之風俗通曰列侯尚公主國人尚公主以妻制夫陽屈於陰爾漢武帝集柏梁詩曰左九嬪作萬年公主誄曰赫赫京室河洛所經陰精發曜降茲淑靈篤生公主誕奮休禎秀出紫曒日暉月明紅顏鬚髮金質玉形駙馬漢書曰駙馬都尉掌駙馬駙馬非正駕車皆為副馬一曰駙近也疾也又百官公卿表曰漢武元鼎二年置三都尉駙馬奉車掌御乘輿車騎都尉掌羽林從騎並無員或以侍中常侍卿尹校尉左遷為之漢舊儀曰駙馬都尉掌騎從武帝置秩比二千石蜀志曰諸葛瞻字思遠建興十二年亮出武功與兄瑾書曰瞻已今年八歲聰惠可愛嫌其早成恐不為重器耳十七尚公主拜駙馬都尉宋書曰江斆字叔文母宋文帝女淮陽公主幼以戚屬召見孝武謂謝莊曰此小兒方當為名器少有美譽尚孝武女臨江公主拜駙馬都尉為丹陽丞時袁粲為尹見斆歎曰風流不墜正在江郎數與宴賞留連日夜齊書曰王暕字思晦年數歲而風神警拔有成人之度時祖儉作宰相賓客盈門見暕曰公才公望復在此矣弱冠選尚淮南長公主拜駙馬都尉梁書曰袁樞博學明悉舊典初陳武帝長女永嗣公主先適陳留太守錢蕆生子𡵒主及並卒于梁時武帝受命唯主客請議加蕆駙馬都尉并贈𡵒官樞議曰昔王姬下嫁必適諸侯同姓為主聞於公羊之説車服不繫顯於詩人之篇漢氏初興列侯尚主自斯已後降嬪素族駙馬都尉置由漢武或以假諸功臣或以加於戚屬是以魏曹植表駙馬奉車趣為一號齊職儀曰凡尚公主必拜駙馬都尉魏晉已來因為瞻準蓋以王姬之重庶姓之輕若不如其等級寧可合巹而酳所以假駙馬之位乃配於皇女也今公主早薨伉儷已絶既無禮數致疑何須駙馬之授案杜預尚晉宣帝第二女晉武踐祚而主已亡泰始中追贈公主元凱無復駙馬之號梁文帝女新安穆公主早薨天監初王氏無追拜之事遠近二例足以校明無勞此授宜追贈陳侯時以議為當後魏書曰陸昕之風望端雅尚獻文女常山公主拜駙馬都尉又曰馮誕字子正與高祖同歲幼侍書學特蒙親待尚高祖妹樂安公主拜駙馬都尉高祖寵誕同輿而載同按而食同席而坐又曰宿石高宗時為中散嘗從獵高祖親欲射虎石叩馬而諫引高宗馬至原上後虎騰躍殺人詔曰石為忠臣而控馬切諫免虎之害後有犯罪宥而勿治尚上谷公主拜駙馬都尉又曰萬安國代人父振尚高陽長公主拜駙馬都尉遷散騎常侍馮翊公安國少明敏有姿貌以國甥復尚河南公主拜駙馬都尉遷散騎常侍顯祖特親寵之與同臥起為立第宅賞賜至巨萬超拜大司馬大將軍封安成王唐書曰文宗儉素嘗駙馬都尉韋處仁入見巾夾羅巾以進上謂曰本慕卿門戶清素故俯從選尚如此巾服從他諸戚為之卿不須為也又官品志曰駙馬奉車騎三都尉並無員駙馬以加尚公主者無班秩語林曰何晏字平叔以主壻拜駙馬都尉美姿儀帝每疑其傅粉後夏月賜以湯餅大汗出以朱衣自拭之尤皎然
