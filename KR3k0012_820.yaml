body:
  text: 布帛部六綿說文曰纊絮縕也禮記玉藻曰纊為繭縕為袍衣也著之異名也纊謂今之新綿也縕謂今纊及舊絮也又喪大記曰屬纊以俟絶氣纊今之新綿易動搖置口鼻之上以為候又內則曰婦事舅姑左佩紛帨針管線纊施鞶佚左傳宣下曰楚子伐蕭蕭潰申公巫臣曰師人多寒王巡三軍拊而勉之三軍之士皆如挾纊纊綿也言悅以忘寒也謝承後漢書曰徐稚不就諸公之辟及有喪者萬里赴吊常於家預炙雞一隻以一兩綿絮漬酒中曝乾至門以綿絮置水中候有酒氣以雞置前祭畢便去范曄後漢書曰張奐遺命曰吾前後仕進十腰銀艾不能和光同塵為讒邪所忌通塞命也始終常也但地下冥冥長無曉期而復纏以綿纊牢以釘密為不喜耳今幸有前穿朝殞夕下橫尸露床幅巾而已晉陽秋曰有司奏依舊調房子睢陽綿武帝不許宋書曰郭原平孝行既著高陽許瑤之罷建安郡丞還家以綿一斤遺之不受瑤之乃自往曰今過寒而建安綿好以此奉尊上耳原平乃拜而受之也又曰朱百年隱居山陰家室素貧母以冬月亡衣並無絮自此不衣綿帛嘗寒時就孔凱宿衣悉夾布飲酒醉眠凱以臥具覆之百年不覺引臥具去體謂凱曰綿定奇溫因流涕悲動凱亦為之傷感齊書曰阮孝緒年十六父喪不服綿纊雖蔬食有味亦吐之英雄記曰呂布為曹公所攻甚急乃求救於袁術術先求布女布恐術為女不至故不遣救也即以綿纏女身縛著馬上夜自送女出與術太祖守兵相觸格射不得過復還城語林曰萬謝就人乞裘云畏寒答曰君妄語正欲以為豪具耳若畏寒無復勝綿者以三十斤綿與謝陸氏異林曰鍾繇常數月不朝或問其故云常有好婦來美麗非凡問者曰必是鬼物不可不殺之婦人後往不即前止戶外繇問何以曰公有相殺意繇曰無此勤勤呼之乃入繇有不忍心然猶斬之傷胛婦人即出以新綿拭血竟路明日使人尋跡至一大塜木中有好婦人形體如生人著白練丹兩繡當傷一腳以兩當中綿拭血酈善長水經注曰房子城西出白土細滑如膏可用濯綿霜鮮雪曜異於常綿世俗言房子之纊也抑亦類蜀郡之錦得江津矣故歲貢其綿以充御府絮史記曰人有上書告周勃反下廷尉薄太后以為無反事文帝朝太后以冒絮提文帝曰絳侯綰皇帝璽將兵北軍此時不反今居一小縣顧欲反也帝乃出之又貨殖傳曰絮千乘家漢書曰帝以公主為老上單于閼氏使官者燕人中行說傅公主說既至因降單于單于愛幸之其得漢之繒絮以馳草棘中衣袴皆裂弊以示不如旃裘堅善也司馬彪續漢書曰光武建武二年野蠶成繭民收其絮東觀漢記曰建初二年詔齊相其止勿復送冰紈方空縠吹綸絮也漢舊儀曰皇后親蠶還獻繭凡蠶絲絮織室作祭服其皇帝得以作縷縫衣皇后間以作巾絮而已魏志曰曹公定鄴臨祠袁紹墓哭之流涕慰勞紹妻還其家人寶物賜雜繒絮廩食之吳書曰顧悌字子通父亡孫權作布衣一襲皆擘絮著之強令悌釋服晉中興書曰王敦害周顗籍其家政見素簏數枚中有故絮也晉書曰佛圖澄腹傍有一孔常以絮塞之每夜讀書則披絮孔中出光照于一室宋書曰顏竣丁父憂起為丹陽尹遣中書舍人戴明寶抱竣登車載之郡舍賜以布衣一襲絮以綵綸遣主衣就衣諸體又曰阮長之元嘉十一年除臨海太守在官常擁敗絮齊書曰江革補國子生王融謝朓嘗行還過候革時大寒雪見革弊絮單席而耽學不倦唴歎久之又曰卞彬蚤虱賦序曰余之多病起居甚踈縈寢敗絮不能自釋莊子曰宋人有善為不龜手之藥者世世以洴澼絖為事客聞之請買其方百金聚族而謀曰我世世洴澼絖不過數金今一朝鬻伎百金請與之淮南子曰藡苗類絮而不可以為絮藡苗藿秀也楚人謂藡又讀音敵古今注曰元帝永光四年東萊郡東牟山有野蠶為繭繭生娥蛾生卵卵著石收得萬餘石民人以為絲絮五年長安雨絮垣屋上皆白民衣之管寧別傳曰管寧性至孝恆布裳貉裘唯祠著單衣絮巾也吳越春秋曰吳王將死曰吾以不用子胥言以至於此死者無知則已死者有知何面目見子胥也遂蒙絮覆面而自刎博物志曰蜀人以絮巾為帽絮裴淵廣州記曰蠻夷不蠶採木綿為絮盧育冀州論曰房子好綿地産不為無珍也皇甫規與馬融書曰與被絮一雙以通微心陸雲與兄機書曰一日案行視曹公器物見拭目黃絮有垢黑目淚所沾污孝子傳曰閔子騫幼時為後母所苦冬月以蘆花衣之以代絮其父後知之欲出後母子騫跪曰母在一子單母去三子寒父遂止世說曰王文度在西州與林法師講韓孫諸人並在坐林公理每欲小屈孫興公曰法師今日似著弊絮在荊棘中觸地掛閡牽離說文曰絓繭滓絓頭也一曰牽離釋名曰煮繭曰莫莫幕也貧者著衣可以幕絮也或謂之牽離煮熟爛牽引使離散如綿也紈釋名曰紈煥也細澤有光煥然也漢書曰齊俗作冰紈容如冰也又曰齊韓延壽衣黃紈方領又曰白縠衣表薄紈之裏天子之服也東觀漢記曰楚王英奉送黃縑三十五匹白紈五匹入蜀楚相以聞詔書還蜀縑紈以助伊蒲塞衆門之盛饌漢舊儀曰乘輿冠高山冠飛羽之纓幘赤丹紈裏范子計然曰白紈素出齊魯王子年拾遺録曰瀛洲有金巒之觀中有瑤几覆以雲紈之素繁欽定情詩曰何以合歡欣紈素三條裙組說文曰組綬屬其小者以為纓也禮記檀弓上曰有子蓋既祥而絲屨組纓禮記玉藻曰玄冠朱組纓天子之冠也玄冠丹組纓諸侯之冠也又曰弟子縞帶并細約用組又曰天子佩白玉而玄組綬公侯佩山玄玉而朱組綬大夫佩水蒼玉而緇組綬世子佩璆玉而綦組綬士佩瓀珉而縕組綬孔子佩象環五寸而綦綬又少儀曰國家靡弊則車不雕幾甲不組縢幾附纏為沂鄂也組滕以飾左傳襄三年楚子重伐吳為簡之師克鳩茲至于衡山使鄧廖帥組甲三百被練三千史記曰秦王子嬰係頸以組降沛公軹道旁漢書曰錦繡纂組害女工穆天子傳曰天子見西王母好獻錦組百純又曰盛姬之喪叔㛗贈用茵組茵褥也叔姓穆王女墨子曰昔楚莊王鮮冠組纓絳衣博袞以治其國韓子曰吳起示其妻以組曰子為我織組令如是組妻織組果善吳起曰非戒也使之衣而歸妻兄請之起曰起家無虛言呂氏春秋曰邾之為甲常以帛公息忌謂邾君曰凡甲所以為固者以滿竅也今竅滿矣而任力者半組則不然竅滿則盡任力矣邾君以為然曰將何所得組公息忌對曰上用之則民為之矣邾君曰善下令令官為甲必以組公息忌知說之行也令其家皆為組人有傷之者曰公息忌之所以欲用組者其家多為組也邾君不悅於是乎止官無以組邾君有所尤也為甲以組而便公息忌雖多為組何損以組不便公息忌雖無為組亦何益為組與不為組不足以纍公息忌之說用組之心不可不察劉梁七舉曰華組之組從風紛絃應璩報燕中尉樊彥皇書曰登輿北踐燕路方當化銀龜以為黃變青組以為紫又報平陸長賁瑋伯書曰從此辭矣何敢復飛蟬於惠文鳴玉於緺組哉納魏武令曰吾衣皆十歲也歲歲解浣補納之耳魏志曰太祖幃帳壞即補納汲太子妻李氏與夫書曰并緻納一端宋書曰徐逵之尚會稽長公主初武帝微時貧過甚常自新洲伐荻有納布衣襖等皆是敬皇后手自作武帝既貴以此衣付主曰後世若有驕奢不節者可以此衣示之主子湛之為大將軍彭城王義康所愛與劉湛之等頗相附及劉湛之得罪事連主子文帝大怒將致大辟湛之憂懼無計以告公主公主即日入宮及見文帝因號哭下床不復施臣妾之禮以錦囊盛武帝納衣擲地以示上曰汝家本貧賤此是我母為汝父作此納衣今日有一頓飽食便欲殘害我兒子上亦號哭湛之由此得全南史曰齊張欣泰為直閣步兵校尉領羽林監欣泰通涉雅俗交結多是名素下直輒著鹿皮冠納衣錫杖挾素琴有以啓武帝帝曰將家兒何作此舉止又曰沙門寶志在建康寶亮欲以納被遺之未及有言寶志忽來牽被而去陳書曰大軍侵魏造陝城魏兵大合輕騎挑戰侯安都瞋目橫矛單騎突陳四向奮擊左右皆披靡殺傷不可勝數於是衆並鼓噪俱前魏多縱突騎衆軍患之安都怒甚乃脫兜鍪解所帶鎧唯著絳衲兩襠衫馬亦去具裝馳入賊陳猛氣咆勃所向無當其鋒者莫不應刃而倒綸釋名曰綸倫也作之有倫理也說文曰綸紏青絲綬也禮記曰王言如絲其出如綸王言如綸其出如綍後漢書仲長統書曰井田之變豪人貨殖館舍布於州郡田畝連於方國身無半通青綸之命而切三辰龍章之服續漢書輿服志曰百石青紺綸一采宛轉繆織長丈二尺東觀漢記曰建初二年詔齊相其上勿復送吹綸絮鄭玄注禮記曰綸今有秩嗇夫所佩也鄴中記曰石虎皇后出女騎一千冬月皆著紫綸巾齊書曰徐龍駒常住含章殿著黃綸帽被貂裘南面向案代帝書勑世說曰謝萬詣簡文無衣幘可前簡文曰但前不須衣幘即呼使入萬著白綸布而前既見共談移日孟達與諸葛亮書曰貢白綸帽一以示微意縞尚書禹貢曰海岱及淮惟徐州厥篚玄纖縞玄黑繒也縞白縞也二物皆當細也毛詩緇衣曰出其東門有女如雲縞衣綦巾聊樂我云願室家得相樂禮記王制曰殷人冔況羽反而祭縞衣而養老又玉藻曰朝服之以縞也自季康子始也左傳襄六曰季札聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉史記曰新城三老董公說漢王以義帝死故漢王遂發喪臨三日告諸侯曰天下共立義帝北面事之今項羽攻殺大逆無道寡人親發喪諸侯皆縞素歸漢韓子曰魯人身善織屨為履之也而越人跣縞欲冠之也而越人被髮欲無窮可得乎淮南子曰鈞之縞也一端以為冠一端以為絑冠則戴之絑則履之司馬相如子虛賦曰被阿緆緰紵縞阿細繒緆細練也緆音錫緰音臾也曹洪與魏文帝書云我軍入漢中若駭鯨之決細網奔兕之觸魯縞未足以喻其易也絺綌說文曰綌粗葛也絺細葛也皺絺之細者也尚書禹貢曰海岱惟青州厥貢鹽絺周禮地官下曰掌葛掌以時徵絺綌之材于山農禮記月令曰孟夏之月天子始絺又曲禮上曰為天子削瓜者副之巾以絺副析也既削又四折乃撗斷而巾覆之為國君者華之巾以綌華中列之不回折也又曲禮下曰縝絺綌不入公門縝單也必表而出為其褻也浴用二巾上絺下綌也又檀弓縣子曰綌衰繐裳非吉也非時尚輕涼慢禮毛詩關睢葛覃曰葛之覃兮施于中谷維葉莫莫是刈是穫為絺為綌服之無斁又緑衣曰絺兮綌兮凄其以風凄寒風也箋云絺綌所以當暑也以待寒喻失所我思古人實獲我心又君子偕老曰蒙被皺絺是紲袢父蕃反也絺之美者為皺是當暑紲袢之服也論語鄉黨曰當暑縝絺綌必表而出之縝單也暑月單衣葛為其彤褻也必有以表之若今單衣也漢書曰江都王建謀反與閩越通越遺建荃葛服虔注曰細葛也東觀漢記曰耿純字伯山率宗族賓客二千人皆繒襜絺巾迎上於費上大悅又曰馬嚴為陳留太守嚴病遣功曹史李龔奉章詣闕上親召見龔問疾病形狀以黃金葛絺賜嚴又曰黃香為郎召詣安福殿賜錢三萬黃白葛各一端魏武封魏王詔曰今以君為魏王青絳皂黃白各二匹葛越一端往欽哉吳曆曰孫策送華歆還洛井送布越香葛時多盜賊歆渡牛渚悉封還諸物江表傳曰魏文帝遣使於吳求細葛君臣以為非禮欲不與孫權勑付使梁書曰任昉卒後子西華冬月著葛帔練裙道逢平原劉孝標泫然矜之謂曰我當為卿作計後周書曰賀蘭祥梁雍州刺史嶽陽王蕭察欽其節儉乃以竹屏風絺綌之屬及經史贈之祥難違其意取而付諸所司太祖後聞之並以賜祥隋書曰袁充少警悟年十餘歲其父黨至門時冬初充尚衣葛衫客戲充曰袁郎子絺兮綌兮凄其以風充應聲答曰唯絺與綌服之無斁以是大見嗟賞穆天子傳曰天子筮獵蘋澤其卦遇訟逢公占之賜之駿馬十六絺紵三十篋帝王世紀曰堯見舜於二宮設饗禮逆為賓主南面而問政然後賜以絺衣琴瑟必築宮室封之於虞韓詩外傳曰孔子南遊楚至阿谷有處女珮璜而浣孔子曰彼婦人可與言矣抽絺綌五兩以授子貢曰善為之辭以觀其辭子貢曰吾北鄙之人也將南適楚於此有絺綌五兩吾不敢置之水浦婦人對曰行客之行唴然永久分其資財棄之野鄙吾年甚少何敢取之子不早去竊有狂夫守之者矣說苑曰綿綿之蔓在於曠野良工得之以為絺綌良工不得枯死於野服虔通俗文曰細葛謂之㲔翅稽康高士傳曰善卷曰豫立宇宙之中冬衣皮毛夏綌葛劉槇瓜賦曰承之雕盤羃以纖絺夏侯孝若大暑賦曰珠汗沾夫絺葛左思吳都賦曰焦葛升越弱於羅紈庾翼與燕王書曰今致細練十端竹練三端王褒聖主得賢臣頌曰服絺綌之涼者不苦盛暑之鬱悒假氏蜀記曰卭州鎮南蕉葛上者一匹直十千諸葛恢表曰天恩罔極特賜纖絺細竹顏測集大司馬江夏王賜絹葛啓曰冰紈風綌事膺盛服
