body:
  text: 果部六梨爾雅曰梨山摛即金梨樹摛音離梨曰鑽之啖食治擇之名漢書曰淮北滎南河濟之間千樹梨其人皆與千戶侯等晉書載記曰符雙據上邽符抑據蒲坂叛于堅符武據安定並應之將共伐長安堅遣使諭之各齧梨以為信皆不受堅命宋書曰王玄謨征滑臺一匹布責民八百大梨又曰張敷小名查父邵小名梨文帝嘗戲謂之曰查何如梨答曰梨萬果之宗查何敢比也齊書曰扶桑國有赤梨經年不壞兼多蒲桃唐書曰貞觀中杭州言木連理二十四株有樝梨二木合為一體又曰玄宗至馬嵬驛令高力士縊貴妃於佛堂前之梨樹又曰崔遠文才清麗風神峻整人皆慕其為人當時目為釘座梨言席上之珍韓子曰夫樹柦梨橘柚者食之則甘嗅之則香莊子曰柤梨橘柚其味雖別各適其口淮南子曰佳人不同體美人不同面而皆説於目佳美也梨橘棗栗不同味而皆調於口調適也應劭漢官儀曰光武封太山上壇見酢梨酸棗主者云百官上者所置具棗門晉令曰諸宮有梨守護者置吏一人晉宮閣名曰明光殿前梨一株世説曰桓南郡每見人不快輒嗔云君得哀家梨復蒸食否舊説秣陵有哀仲家梨甚大如升入口消釋言愚人不別得好梨蒸食之又曰安公講僧常數百習鑿齒嘗餉十梨正值講安公便於座中手自剖分梨盡人遍都無偏頗山海經曰洞庭之中其木多梨盧育冀州論曰常山好梨地産不為無珍關令尹喜內傳曰老子西遊省太真王母共食紫梨漢武內傳曰太上之藥有玄光梨曹瞞別傳曰王自漢中至洛陽起建始殿使工蘇黃越徙美梨掘之根盡血出越以狀聞王王躬自視之以為不祥還遂寢疾神仙傳曰介象言病帝使左右以美梨一奩賜象象死帝殯而埋之以日中時死其日晡時到建業以所賜梨付苑吏種之後吏以狀聞即發象棺棺中有一奏符文士傳曰孔融年四歲與諸兄食梨輒取其小者人問其故答曰我小兒法當取小者由此宗族奇之西京雜記曰上林有紫梨芳梨實小青梨大谷梨金柯梨出琅琊王野家太守王唐所獻縹蒂梨紫條梨瀚海梨出瀚海耐寒不枯青玉梨廣志曰洛陽北芒張公夏梨海內唯有一樹常山真定梨山陽巨野梨梁園睢陽梨齊郡臨淄梨巨野稿梨上黨楟音亭梨小而甘新豐箭谷梨關以西弘農京兆右扶風界谷中梨多供御廣都梨重六斤可數人分食之嵩高山記曰東嶽腳上有梨樹云是武帝果園山中諸生皆取食之辛氏三秦記曰漢武帝園一名樊川一名禦宿有大梨如五升落地則破其主取者以布囊盛之名含消梨三晉山險記曰山陽縣北有谷通得驢馬石勒十八騎昔在此啖梨生樹今有梨園段龜龍涼州記曰呂光時燉煌太守宋歆獻同心梨永嘉記曰青田村民家多種梨樹名曰官梨子大一圍五寸樹老今不復作子此中梨子佳甘美少比實大出一圍恆以供獻名為御梨吏司守視土人有未知味者梨實落至地即融釋郭子橫洞冥記曰塗山之北有梨大如斗色紫千年一花冬月乃實煎之有膏食者身輕亦曰紫輕梨博物志曰梨類甚多樝杜朴音卜皆是有大小甜酢之異耳神異經曰東方有樹焉高百丈敷張自輔葉長一丈廣六七尺名曰梨其子徑三尺剖之自如素食之為地仙張華注曰是故今梨樹大耳幽明録曰成彪兄喪晝夜哭泣兄提二升酒一槃梨就之引酌上勸廣五行記曰宋廢帝大始年江南盛傳種蕭梨先無此樹百姓爭欲植之識者曰當有姓蕭人王者後齊受禪楊衒之洛陽伽藍記曰歡農里報德寺有園珍果出焉有含消梨重六斤禁苑所無也從樹投地盡散為水焉世人云報德之梨承光之奈承光寺亦多果木奈味甚美冠於京師李鄴侯傳曰唐肅宗嘗夜坐召頴王等三弟同於於地爐罽毯上時李泌多絶粒上每為自燒二梨以賜之潁王恃恩固求上與曰汝恆飽肉食先生絶粒何乃爭之潁王曰臣等試大家心何乃偏耶不然三弟共乞一顆可乎上亦不許賜以他果潁王等又曰臣等以大家自燒故乞他果何用因曰先生恩渥如此臣等請聯句以為他年故事潁王曰先生年幾許顏色似童兒信王曰夜抱九仙骨朝披一品衣一王曰不食千鍾粟唯餐兩顆梨既而三王請上成之上曰天生此間氣助我化無為王讚梨頌曰太康十年梨樹四枝其條與中枝合生於玄圃園皇太子令侍臣作頌魏文帝詔曰真定御梨大若拳甘若蜜脆若凌可以解煩釋渴傳選七證曰恆陽黃梨巫山朱橘何晏九州論曰安平好棗真定好梨左思蜀都賦曰紫梨津潤又齊都賦曰果則昫山之梨潘嶽間居賦曰張公大谷之梨孫楚秋賦曰朱橘甘美紫梨甜脆膚不隱於斷牙融液易於含雪王廙洛都賦曰梨則大谷冬紫張公秋黃潘嶽金谷園靈圃繁若榴茂林列芳梨宋武帝戲馬臺梨花讚曰嘉樹之生于彼山基開榮布綵不離塵緇王弘謝賜河上梨表曰奉賜河上梨一千遠方味甘每垂降及仰佩恩逮俯增祗愧魏武帝為兗州牧上書曰山陽郡有美梨謹上甘梨二箱楂爾雅曰樝梨曰鑽之樝以梨而酢澀見禮記禮記內則曰樝梨薑桂鄭玄曰樝梨之不臧者皆人君羞呂氏春秋曰箕山之東有甘樝山海經曰平丘有楊柳甘樝又曰洞庭之上其木多樝説文曰樝似梨神異經曰南方大荒有樹焉名曰柦三千歲作華九千歲作實其花紫色中高百丈敷張自輔葉長七尺五色實長九尺無核割之如凝蜜張茂先注曰柦梨述異記曰江淮南人至北見榲勃香以為柦子蓋實異耳傅玄瓜賦曰龍眼生於南極甘樝引於崑山櫻桃禮記月令曰仲夏之月天子羞以含桃先薦寢廟鄭玄注曰含桃今之櫻桃也爾雅曰楔音革黠反荊桃郭璞注曰今櫻桃廣雅曰含桃櫻桃漢書曰惠帝出離宮叔孫通曰今櫻桃熟可獻陛下宜以櫻桃獻宗廟上許之諸果獻由此興唐書曰太宗將致櫻桃於酅公稱奉則以尊言賜又以卑問之虞監曰昔梁帝遺齊巴陵王稱餉遂從之又曰玄宗紫宸殿櫻桃熟命百官口摘之又曰蕭潁士李林甫採其名欲拔用之乃召見時潁士寓居母喪即縗麻而詣京師徑謁林甫於政事省林甫素不識遽見縗麻大惡之即令斥去潁士大忿乃為伐櫻桃賦以剌林甫云擢無庸之瑣質因本枝而自庇洎枝幹而非據專階廷之右地雖先寢而或薦豈和羹之正味其狂率不遜皆此類也又曰文宗始即位嘗因內園進新櫻桃將以賜三宮太后上曰送太后焉可以為賜因援筆易其文簿曰奉太后自是以為常拾遺録曰漢明帝於月夜宴賜群臣櫻桃盛以赤瑛盤群臣視之月下以為空盤帝笑之呂氏春秋曰仲夏之月羞含桃高誘注曰含桃櫻桃為鳥所含故曰含桃范汪祠制曰孟夏祭用櫻桃洛陽宮殿簿曰顯陽殿前櫻桃六株明光殿前櫻桃四株徽音殿前櫻桃二株廣志曰櫻桃大者如彈丸有長八分者白色多肌者凡二種虎丘山疏曰山下有櫻桃三株唐景龍文館記曰四年夏四月上與侍臣於樹下摘櫻桃恣其食末後於蒲萄園大陳宴席奏宮樂至瞑每人賜朱櫻兩籠又曰四年夏四月上幸兩儀殿命侍臣升殿食櫻桃其櫻桃並盛以琉璃和以杏酪飲塗麋酒博物志曰櫻桃或如手指春秋冬夏華實竟歲吳氏本草曰櫻桃味甘主調中益脾氣令人好顏色美志氣一名朱桃一名麥英也傅咸粘蟬賦序曰櫻桃為樹則多蔭為果則先熟故種之於廳事前以盛暑逍遙其下左思蜀都賦曰朱櫻春就素奈夏成魏文帝與鍾繇書報曰臣繇言賜甘酪及櫻桃惠厚意綢非言所申夏侯孝若春可樂曰進櫻桃於玉盤
