body:
  text: 蟲豸部四蚯蚓河圖説徵曰黃帝起大蚓見大戴禮曰蚓無爪牙之利筋脈之強上食埃土下飲黃泉用心一也文子孫卿淮南子同禮記月令曰孟夏螻蟈鳴後五日蚯蚓出冬至之日蚯蚓結孝經援神契曰蚓無食勞無勢故無心爾雅曰螼美引切蚓蜸苦顯切蠶他典切即蜿蟺也江東呼寒蚓後漢書曰王元説隗囂曰神龍失勢還與蚯蚓同帝王世紀曰黃帝時蚓大如虹淮南子曰太陰在上蚯蚓結為陽候抱朴子軍術曰蚯蚓見軍中尤多者軍罷又宜備反叛慎子曰騰蛇遊霧飛龍乘雲雲罷霧除與蚯蚓同失所乘故也呂氏春秋曰黃帝時而見大蚓土氣勝故其色尚黃高誘曰蚓蚯蚓也淮南萬畢術曰苓皮蚓脂魚鱉自藂注曰取苓皮之漬水斗半燒石如炭狀以淬蚓脂中已置苓皮水中七日已置沼則魚鱉自藂矣楊泉物理論曰撿身止欲莫過於蚓此志士所不及也郭義恭廣志曰閩越江北山間蠻夷啖蚯蚓脯為羞崔豹古今注曰蚯蚓一名蜿蟺一名曲蟺善長吟於地中江東謂為歌女或謂鳴砌蜿蟺苑善二音述異記曰劉德願兄子太宰從事中郎道存景和元年五月忽有白蚓數十登其齋前砌上通身白色人所未嘗見也蚓並張口吐舌大赤色其年八月與德願並誅劉敬叔異苑曰孟州王雙宋文帝元嘉初忽不欲見明常取水沃地以菰蔣覆上眠息飲食悉入中云恆有女著青裙白領巾來就其寢母聽聞薦下歷歷有聲發之見一青色白領蚯蚓長二尺許云此女常以一奩香見遺氣甚清芬奩乃螺殼香則菖蒲根于時咸謂雙暫同阜螽矣廣五行記曰陳後主時隋軍至江蚯蚓盡出森然如植箭陳氏水鄉蚯蚓土蟲象陳氏自稱土德盡出明傾其窟穴以曲歸直是歲隋平陳又曰隋煬帝大業中河南有婦人養姑不孝姑兩目暗婦切蚯蚓為羹以食之姑怪其味竊藏一臠以示兒兒還見欲送婦詣縣未及而雷震其婦俄而從空落身如故而易頭為白狗頭郭景純蚯蚓讚曰蚯蚓土精無心之蟲交不以分媱於阜螽觸而感物無乃常雄吳氏本草經曰蚯蚓一名白頸螳蚓一名附引葛洪療喉卒腫方曰用白頸蚯蚓十四枚搗以塗喉外立愈陶洪景集注本草經曰白頸蚯蚓一名土龍生蜚谷平土白頸者是其老大耳螔蝓尚書大傳曰巨定螺鄭玄曰巨定澤也今屬樂安故有縣屬齊螺蝸牛也禮記內則曰蝸醢而苽食爾雅曰蚹螺螔蝓郭璞曰音移臾即蝸牛也張楫廣雅曰蠡螺蝸牛螔蝓也莊子曰有國於蝸之左角者曰觸氏有國於蝸之右角者曰蠻氏時相與爭地而戰伏尸數萬逐北旬有五日而後反許慎説文曰蝸一曰螔蝓山海經曰清要之山北望河曲是多倮纍郭璞曰倮纍蝸牛也陶洪景集注本草經曰螔蝓味鹹寒無毒一名陵蠡一名土蝸一名附蝸生泰仙池澤生陰地沙石垣下螔蝓入三十六禽限又是四種角之例營室之精矣蠍毛詩魚藻彼都人士曰彼君子女卷髮如蠆毛詩義疏曰蠆一名杜伯河內謂之蚊幽州謂之蠍左傳僖二臧文仲曰蜂蠆有毒而況國乎又昭二曰鄭人謗子産曰其父死於路已為蠆尾大戴禮曰神人國有蜂蠆不螫嬰兒張揖廣雅曰杜伯蠹蠆蠍也説文曰蠆毒蟲也魏志曰彭城夫人夜之廁蠆螫其手呻呼無賴華他令溫湯近熱漬手其中卒可得寢但旁人數為易湯令暖其日即愈北史曰齊後主詔鎖南陽王綽赴行在所至而宥之問在州何者最樂對曰多取蠍將咀漢看時極樂後主即夜索蠍一斗比曉得二三升置諸浴斛使人裸臥斛中號叫宛轉帝與綽臨觀喜噱不已謂綽曰如此樂事何不早馳驛奏聞綽由是大為後主寵唐史曰劍南本無蠍嘗有人任主簿將之至今呼為主簿蟲莊子曰老聃曰三皇之知上悖日月之明下暌山川之精中隳四時之施其智憯音慘於蠆蠍之尾而猶自以為聖人不可恥乎唐景龍文館記曰上巳日上幸於渭濱宴侍臣其日賜侍臣等柳棬各一云帶之免蠆毒辟溫氣干寶搜神記曰安陽城南有亭宿者輒死有書生入亭宿明掘得蠍大如琵琶毒長數尺亭遂安靜葛洪方曰蠍中國屋中多江東即無也稽含遇蠆賦序曰元康二年余中夜遇蠆客有戲余曰俗諺云過滿百為蠆所螫斯言信哉雖內省不疚而逢此害喟然而歎遂作賦蟻焦贛易林震之蹇曰蟻封戶穴大雨將集又復之萃曰蜱蜉戴怨不能上山卻推趹蹶損傷其顏韓詩外傳曰夫吞舟之魚大矣蕩而失水則為蟻所制大戴禮曰十二月玄駒賁蟻也賁者走於地中也周官曰饋食之豆蜃蚳醢蜃蛤也蚳蟻子也禮記檀弓曰子張之喪公明儀為志焉褚幕丹質蟻結子四隅鄭玄曰畫褚之四角其文如蟻行往來相交錯也蟻蚍蜉也殷之蟻結似今蛇文畫也又內則曰蚳醢蚳蚍蜉子也又學記曰蟻子時術之其此之謂乎蚳蚍蜉也蚍蜉之子微蟲耳時蜉之所為其功乃復成大垤也爾雅曰蚍蜉大蟻俗呼為馬蚍蜉小者蟻齊人呼蟻蟻蛘龔音龍朾直耕切蟻赤駮蚍蜉螱音尉飛蟻有翅其子蚳蚳蚳蟻卵周禮曰蜃蟻醬後漢書曰巨鹿張角賊起皆著黃巾為摽幟時人謂之黃巾亦名為蛾賊蛾音魚綺切即蟻字喻賊衆多故以為名張勃吳録曰九真移風縣有赤絮膠人視土知有蟻因墾發以木枝插其中則蟻緣而生漆堅凝如螳蜋子螵蛸也折漆以染絮其色正赤所作赤絮則此膠也孟子曰羊肉不慕蟻蟻慕羊肉羊肉羶也莊子曰函牛之鼎沸蟻不得置一足焉喻聖主之法明姦至不敢蹈之又曰東郭子問莊子曰道安在莊子曰道在螻蟻又曰吞舟之魚蕩而失水則螻蟻能苦之孫卿子曰不食者蟻不飲者蜉蝣韓子曰桓公伐孤竹行山中無水隰朋曰蟻冬居山之陽夏居山之陰蟻壤寸而有水乃掘遂得水又曰千丈之堤以螻蟻之穴而漬又曰以骨去蟻蟻愈多以肉驅蠅蠅愈至呂氏春秋曰吞舟之魚陸處不勝螻蟻淮南子曰千里之堤以螻蟻之穴漏而百尋之屋以突隙之熛焚突灶突也抱朴子曰雞有專栖之雄雉有擅澤之鷮音嬌蟻有兼弱之智蜂有攻寡之計人相役御亦猶是耳又曰周髀家云天圓如張蓋地方如棊局而旁轉如推磨左行日月右行隨而左轉如推於磨蟻行磨石之上磨左旋而蟻右去磨疾而蟻遲故不得不隨磨以左回焉又曰百尋之山焚於分寸之飆千丈之陂潰於一蟻之穴符子曰東海有鼇焉冠蓬萊而浮遊於滄海騰躍而上則千雲之峰類邁於群嶽沉沒而下則隱天之丘潛嶠於重川有蚳蟻聞而悅之與群蟻相要乎海畔欲觀鼇焉月餘日鼇潛未出群蟻將反遇長風激浪崇濤萬仞海水沸地雷震群蟻曰此將鼇之作也數日風止雷默海中隱如嶽群蟻曰彼之冠山何異我之戴粒逍遙封壤之巔伏乎窟穴也山海經曰朱蟻其狀如蟻郭璞曰蟻蚍蜉在崑崙之墟京房易妖占曰蟻無故當道若門戶城郭藂土水且傷人揚雄方言曰蚍蜉齊魯之間謂蚼蟓音駒養西南梁益之間謂之玄駒燕謂之蛾咩楚郢以南蟻土謂之封王充論衡曰人坐樓臺之上察地之螻蟻尚不見其體安能聞其聲何則螻蟻之體細不若人形夫聲音孔氣不能達也今天之崇高非直樓臺人體比於天非若螻蟻於人也謂天聞人之言隨善惡為吉凶誤矣揚子法言曰食如蟻衣如華不以泰乎劉義慶世説曰殷仲堪父病虛悸聞床下蟻動云是牛鬭孝武不知殷父問有一殷病如此不仲堪流涕而起曰臣進退惟谷郭義恭廣志曰有飛蟻有木蟻古曰玄駒者也又有黑黃大小數種之蟻劉欣期交州記曰大和中人有至武嶺穴中有大蚍蜉甚大西京記曰長安化度廢寺內有礓音疆石徑二尺餘孔穴通連若欄椅樓臺之狀號曰蟻宮常云於中見蟻金色其大若蜂動逾萬計乃掘及泉因得此石張茂先博物志曰蟻知將雨伏侯古今注曰漢光武建武元年山陽有小蟲類人形甚衆明日皆懸樹枝而死乃大蟻也崔豹古今注曰牛亨問蟻曰玄駒何也答曰河內人無何而見有人馬數千萬騎皆大如黍米旋動往來從朝至暮家人以火燒殺之人皆是蚊蚋馬皆成大蟻故今人呼蚊蚋曰黍民蟻曰玄駒楊子法言曰吾見玄駒是也楊孚異物志曰鯪鯉吐舌蟻附之因吞之又開鱗甲使蟻入其中乃奮迅則舐取之劉敬叔異苑曰桓謙字敬祖太元中忽有人皆長寸餘悉被鎧持槊乘具裝馬塪中出緣機登竈尋飲食之所或有切肉輒來叢藂力所能勝者以槊剌取徑入穴蔣山道士朱應子令以沸湯澆所入處寂不復出因掘之有斛許大蟻死在窟中謙後以門釁同滅古今五行記曰後魏顯宗天安元年六月兗州有黑蟻與赤蟻交鬭長六十步廣四寸赤蟻斷頭而死黑主北赤主南時齊明帝殺少帝子業而自立大為魏軍所破東魏孝靜帝武定四年鄴下有黃蟻與黑蟻鬭黃東魏戎衣色黑西魏戎衣色是時黃蟻盡死時高歡圍玉壁五旬不拔歡疾班師而薨嶺表録異曰嶺南蟻類極多有席袋貯蟻子窠鬻於市者蟻窠如薄絮囊皆連帶枝葉蟻在其中和窠而賣有黃色大於常蟻而腳長者云南中甘子樹無蟻者實多蛀故人競買之以養甘子又曰交廣溪澗間酋長得收蟻卵淘擇令淨鹵以為醬或云其味酷似肉醬非官客親友不可得也夢書曰蚍蜉為小盜銜食行也夢見蚍蜉小盜衆也神光占曰行造酒家蟻藂中庭急去之應璩百一詩曰大魏承哀弊復欲密其羅蚍蜉猶見得何云鰌與蝦狴犴既已備欻復置黃沙楚辭招魂曰南方赤蟻若象玄蟻若靈壺應璩與曹昭伯箋曰空城寥廓所聞者悲風所見者鳥雀昔陳司空為邑宰所在幽間獨坐愁思幸賴遊蟻以娛其意以今況之知不虛矣郭璞蚍蜉賦曰飾殷人之喪輿在四隅而交結濟齊桓之窮師由山東之高垤感萌陽以潛步知將雨而封穴伊斯蟲之愚昧乃先識而似哲又蚍蜉讚曰蚍蜉瑣劣蟲之不才感陽而出應雨講臺物之蕪壞自然知來
