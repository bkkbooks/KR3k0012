body:
  text: 人事部一百一十三富下家語曰魯哀公問政於孔子孔子對曰政之急莫大乎使人富且壽也公曰為之柰何孔子曰省力役薄賦歛則民富矣公曰寡人欲行夫子之言恐吾國貧矣孔子曰詩云愷悌君子民之父母未有子富而父母貧者又曰南宮敬叔富得罪於定公而奔衛朞年衛侯請復之載其寶以朝夫子聞之曰富而不好禮殃也敬叔以之喪矣而又弗改吾懼其將有患也敬叔聞之驟如孔氏而後備禮散焉又曰以富貴而下人何人不與以富貴而敬人何人不親國語曰鬭且曰且楚大夫昔鬭斗子文三舍令尹無一日之積恤民故也成王每出子文之祿必逃王止而復人謂子文曰人生求富而子逃之何也對曰夫從政者以庇民也民多曠曠寡而我取富是不勤民以自封也封厚死無日矣我逃死非逃富也太公六韜曰文王問守土柰何對曰人君必從事於富弗富不足為人弗與無以合親䟽其親則困失其眾則敗也太史公素王妙論曰諸稱富者非貴其身得志也乃貴恩覆子孫而澤及鄉里也又曰黃帝設五法布之天下用之無窮蓋世有能知者莫不尊榮如范子可謂曉之矣子貢呂不韋之徒頗預焉自是以後無其人曠絕一百有餘年管子設輕重九府行伊尹之術則桓公以霸九合諸侯一匡天下范蠡為越相三江五湖之間民富國強卒以擒吳功成而弗居變名易姓之陶自謂朱公行十術之計二十一年之間三致千萬再散與貧桓寬鹽鐵論曰古者盂樽杯飲蓋無爵無觴今富者銀劍黃耳罍樽玉鋪又曰人太富則不可以祿使也又曰古者庶賤騎繩校草鞮皮薦而已今富者黃金銀鑣罽繡掩汗又曰燕之涿薊趙之邯鄲魏之溫軹韓之滎陽齊之臨淄楚之宛陳鄭之陽翟富冠海內皆為天下名都也魏文帝典論曰雒陽郭珍居財巨億每暑夏召客侍婢數十盛裝飾披羅縠使之進酒劉義慶記曰王武子移第北芒下于時人多地貴濟好馬射買地作埒編錢布地竟埒時人號曰金埒又幽明錄曰餘杭人沈縱家素貧與父同入山得一玉豚從此所向如意田蠶並收家富又曰海陵人黃尋先居家單貧常因大風雨散錢飛至其家錢來觸籬援誤落在餘處皆拾而得之尋巨富錢至數千萬異苑曰晉陵曲阿湯貺財數千萬三吳人多取其直為商賈治生輒得倍直或行長江卒暴風及劫盜者若投錢多獲免濟貺死後先所埋金皆移去鄰人嘗晨起見門外忽有百許萬錢封題是湯貺姓字然後知財物藂散必由天運也又曰張永家地有泉出小龍在焉從此遂為富室踰年因雨騰躍而去於是生貲日不暇給俗說云與龍共居不知龍神效矣說苑曰楚王問莊辛曰君子之富柰何對曰君子之富假貸人不買也飲食人不便不役也親戚愛之罪人善之不尚者事之皆欲其壽樂不傷於患此君子之富也論衡曰揚子雲作法言蜀富賈人齎錢十萬願載書子雲不能曰夫富無仁義猶圈中之羊安得妄載三輔決錄曰平陵士孫奮字景卿少為郡五官掾起宅得錢貲至一億七千萬富聞京師而性儉恡客舍雇錢甚少主人曰君士大夫惜錢如此欲作孫景卿耶不知實是景卿從子端梁冀掾奮送絹五疋食以干魚冀問奮何以相送端以實對冀素聞奮富且恡乃以一鏤安革遺奮從貸錢五千萬奮知冀貪暴畏之以三千萬與冀大怒乃告郡詐認奮母為守官藏婢云盜白珠十斛紫金千萬收考奮兄弟死獄中財貲盡沒越絕書曰富中大塘者勾踐治以為義肥饒謂之富中王子年拾遺記曰郭況累金數億庭中起高閣厝衡石於其上以稱量珠玉也謂為瓊廚金窟張淵廣州記曰豪富子女以金銀為大釵執以叩銅鼓與主人名為銅鼓釵西京雜記曰茂陵富人袁廣漢藏鏹萬億八九百人於芒山下築園東西四里南北五里百步激流注其內構石為山高十餘丈連延數里養白鸚鵡紫鴛鴦旄牛青兕奇禽怪獸委積其間也劉道真錢塘記曰防海塘去邑一里郡議曹華信家富立此塘以防海水始開募有能致土一石即與錢一升旬日之間來者雲集塘未成而譎不復取皆棄置而去塘以之成於是改為錢塘羅浮山記曰牛潭深洞無極北岸有石周員三丈討魚人見金牛自水而出磐于此石義興周靈甫嘗見此牛寢伏石上旁有金鎖如索繩焉周甫素銳勇往掩此牛掣斷其鎖得二丈許遂以財雄干寶搜神記曰魏郡張巨本富忽衰死散賣宅與程應舉家疾病賣與何文文先獨持大刀暮入北堂梁上至一更見人丈餘高冠赤幘呼曰細腰細腰應喏曰何以有人氣荅無便去文往向呼處因問向赤衣冠誰荅是金也在屋西壁下問君誰荅云我杵也今在竈下文掘得金三百斤燒去杵由此大富宅清甯又曰元康中屢縣瑤懷家忽聞池中有犬聲視之得犬子雌雄各一長老云此名犀犬得之者富又曰有周攬嘖者貧而好道夫婦夜耕困臥夢天公過而哀之勑外有以給與司祿案云此人相貧限不過此唯有張車子應賜錢千萬車子未生請以借之公曰善曙覺言之於是夫妻戮力晝夜以治生所為輒得貲至千萬先時有嫗者常往攬嘖傭賃墅舍有身月滿孕使遣出駐車屋下產得兒主人往視哀其孤寒作糜粥以食之問當名汝兒作何嫗曰在車下生夢天告之名為車子攬嘖乃悟曰吾昔夢從天換錢外白以張車子錢貸我必是子也財當歸之矣自是居日衰減車子長富於周家又曰京兆長安有張氏者獨處室有鳩自外入于室止于對床張氏惡之披懷而祝曰為我禍耶飛上承塵為我福耶來入我懷鳩飜入懷以手探之則不知鳩之所在而得一金帶鉤焉遂寶之自是後子孫昌盛貲財萬倍故關西稱張氏鉤又曰河間管弼僑居臨水北岸田作商賈往往如意嘗載兩舫米下都糴垂行忽於宅中見一物形似鼉而長大行還輒大得利如此一家遂巨富二十年恒有萬斛米續搜神記曰廬陵巴丘人夕晃者世以田作為業年市田數十頃家漸富晉太元初秋收已過穫刈都畢明旦至田禾悉復滿鬱然如先即使更穫於是遂巨富列女傳曰陶荅子妻者陶大夫荅子之妻也子治陶二年名譽不興家富三倍其妻數荅子怒曰非汝所知居五年從車百乘歸休宗人牽牛酒而賀之其妻抱兒而泣姑怒其不祥也婦曰夫子能薄而官大是謂縈害無功而家昌是謂積殃昔楚令尹之治國家貧而國富君敬之民戴之故福祿結於子孫名垂於後世今夫子貪富務大不顧後害妾聞南山有玄豹霧雨七日不下食何也飽其志飢其腹將欲以澤其毛衣而成其文章也故藏而遠害豕不擇食以肥身坐而須死今夫子治陶家日益富而國日益貧君不敬人不戴也夫子之逢禍必矣請去顧與少子俱脫於是遂棄之出其年荅子之家果以盜誅母老而免婦乃與少子歸養終始天年錄異傳曰昔廬陵邑子甌明者從客賈道經彭澤湖每輒以舡中所有多少投湖中云以為禮積數年後過見湖中有大道道上多風麝有數吏乘車馬來候云是青洪君使要明知是神然不敢不往甚怖問吏恐不得還吏曰無可怖責洪君以君前後有禮故要君必重送君者皆勿收獨求如願爾去果以繒帛送明辭之乃求如願神大怪明知之意甚惜不得已呼如願使隨去如願者青洪婢也常使之取物明將如願歸所欲輒得之數年大成富人意漸驕盈不復愛如願歲朝鷄一鳴呼如願如願不起明大怒欲棰之如願乃走明逐之於糞上糞上有昨日故歲掃除藂薪如願乃於此得去明不知謂逃在積薪糞中乃以杖棰使出久無出者乃知不能困曰汝但使我富不復棰汝今世人歲朝雞鳴時轉往棰糞云使人富也韓詩外傳曰陳之富人有處師氏者校車百乘觴於韞兵之止風俗通曰河南平陰龐儉本魏郡鄴人遭倉卒之世失其父時儉三歲弟纔襁抱耳流傳客居廬里中鑿井得錢千餘萬遂富儉作府吏躬親家事行求老倉頭謹信屬任者年六十餘直二萬錢使主牛馬耕種有賓婚大會母在堂上酒酣陳樂歌笑奴在竈下助廚竊言堂上母我婦也客罷婢語次說老奴無狀為妄語所說不可道也窮誌具白母謂婢試問其形狀奴曰家居鄴時在富樂里宛西婦艾氏女字阿橫大兒字阿嶷小兒曰越子時為縣吏為人所略賣阿橫右足下有黑子右胲下赤誌如半櫛母曰是汝公也因下堂相對啼泣兒婦前為汝公拜即洗浴身見衣被遂為夫婦如初時人為之語曰廬里諸龐鑿井得銅買奴得公子孫羞之言我先人初居廬里者兄弟二人家買奴得公尔世說曰司徒王戎既貴且富區宅僮役膏腴水碓之屬洛下莫有比契䟽鞅掌夜與夫人燭下散籌筭計又曰武帝嘗降王武子家武子供饌並不用盤悉用琉璃器婢子百餘人皆綾羅袴褶以手擎飲食蒸肫肥美於常味武帝怪問何由得尔云以人乳飲之武帝色甚不平所下飲食未畢便去又曰王君夫以飴糒澳釜石季倫以蠟炊君夫作絲布步障四十里崇作錦步障五十里石以椒為泥泥屏王以赤石脂泥壁新序曰魯孟獻子聘於晉韓宣子觴之飲三徒鍾石之懸不移而具獻子曰富哉宣子曰子之家孰與我富獻子曰吾家甚貧我有二士曰顏回慈無靈此二士者使吾邦家安平百姓和協客出宣子曰彼君子也以畜賢為富我鄙人也以鍾石金玉為富孔子曰孟獻子之富也可著於春秋也歸藏曰上有高臺下有雝池以此事君其貴若化若以賈市其富如河漢列子曰虞氏者梁之富人也家既完盛錢金無量財貨無比登高樓臨大路設樂陳酒擊博樓上管子曰凡為國之道必富人人富則易理者也七十九代之君法制不一號今不同然而俱有天下何也必國富而粟眾也又曰天下有義則富無則貧文子曰帝王富其民霸王富其地危國富其吏治國若不足亂國若有餘存國囷倉實亡國富倉虛孟子曰陽虎云為富不仁為仁不富荀卿子曰循禮者王為政者強節民者安藂歛者亡故王者富民霸者富土又曰仁義禮善之於人譬之若貨財米粟之於家也多有之者富少有者貧至無有者窮韓子曰輿人成輿則願人富貴也非輿人仁不富不貴則輿不集也又曰人有福則富貴至富貴則衣食美衣食美則驕心生驕心生則行僻邪而動棄理也行僻邪則身夭死動棄理則無成功尸子曰家有千金之玉而不知猶謂之貧也良功治之則富弇二國身有至貴而不知猶謂之賤也聖人告之則貴最天下孔叢子曰子思曰吾不取於人謂之富不屈於人謂之貴也又曰猗頓魯之窮士也耕則常飢桑則常寒聞淘朱公富往問術焉朱公告之子欲速富當畜五㹀於是乃適西河大畜牛羊於猗氏之南十年之間其孳息不可計貲擬王公馳名天下以興富於猗氏故曰猗頓也淮南子曰天下有至富而非金玉也至壽而非千歲也適情知足則富矣明死生之分則壽矣又呂氏春秋曰富貴而之不知道適足以為患出車入輦務以自佚命之曰蹶身之機肥肉厚酒務以自強命之曰爛腹之食靡曼皓齒鄭衛之音命之曰伐性之斧三患者富貴之所致又曰隨侯之珠和氏之壁得之而富失之而貧也劉邵趙都賦曰爰及富人郭侯之倫貲衍陶衛奓溢無埌金碧其輿朱丹其輪會遇燕好其從如雲
