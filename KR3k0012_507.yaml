body:
  text: 逸民部六逸民六隋書隱逸傳曰李士謙字子約趙郡平棘人也髫亂喪父事母以孝聞母曾嘔吐疑為中毒因跪而嘗之伯父瑒深所嗟尚每稱曰此兒吾家之顏子也後丁母憂居喪骨立服闋舍宅為伽藍脫身而出詣學請業研精不倦遂博覽群籍兼善天文術數隋有天下畢志不仕自以少孤未嘗飲酒食肉口無殺害之言至於親賓來萃輒陳樽俎對之危坐終日不倦李氏宗黨豪盛每至春秋二社必高會極歡無不沉醉諠亂嘗集士謙所盛饌盈前而先為設黍謂群從曰孔子稱黍為五穀之長荀卿亦云食先黍稷古人所尚容可違乎少長肅然不敢弛惰退而相謂曰既見君子方覺吾徒之不德也士謙聞而自責曰何乃為人所疏頓至於此家富於財躬處節儉每以賑施為務開皇八年終於家又曰崔廓字士玄博陵安平人也少孤貧而母賤由是不為邦族所齒初為里佐屢逢屈辱於是感激逃入山中遂博覽書籍多所通涉山東學者皆宗之既還鄉里不應辟命與趙郡李士謙為忘言之友每相往來時稱李崔及士謙死廓哭之慟為之作傳輸之祕書府士謙妻廬氏寡居每有家事輒令人諮廓取定廓嘗著論言刑名之理其義甚精大業中終于家時年八十又曰徐則東海郯人也幼沉靜寡嗜欲受業於周弘正善三玄精論議懷栖隱之操杖策入縉雲山後學數百人苦請教授則謝而遣之不娶妻常服巾褐陳太建時應召來憩於至真觀朞月父辤入天台山因絕粒養性所資唯松水而已雖隆冬泫寒不服綿絮初入縉雲山太極真人除君降之曰汝年出十八當為王者師然後得道也晉王諱鎮知其名手書詔之遂詣楊州其後夕中命侍者取香火如平當朝禮之儀至五更而卒支體柔弱如生又曰張文詡河東人也父琚開皇中為洹水令以清正聞有書千卷教訓子姪皆以明經自達文詡博覽文史特精三禮高祖引致天下名儒碩學之士文詡時遊於太學學內翕然咸共宗仰其門生多詣文詡請質疑滯文詡輒博引證據辨說無窮唯其所擇右僕射蘇威聞其名而召之與語大悅勸令從官文詡意不在仕固辭仁壽末學廢文詡策杖而歸灌園為州郡頻舉皆不應命事母以孝聞每以德化鄉黨頗移風俗嘗有人夜中竊刈其麥者見而避之盜因感悟棄麥而謝文詡慰論之自誓不言固令持去經數年盜者向鄉人論之始為遠近所悉州縣以其貧素將加賑恤輒辭不受每閑居之際從容長歎曰老冉冉而將至恐修名之事不立以如意擊几皆有處所時人方之閔子騫原憲終於家時年四十鄉人為立碑頌號曰張先生唐書隱逸傳曰王績字無功絳州龍門人也少學李播呂才為莫逆之交隋大業中應孝悌廉潔舉楊州六合縣丞非其所好棄官還鄉里績河渚中先有田十數頃鄰渚有隱士仲長子先服食養性績重其真素願與相近乃結廬河渚以琴酒自樂嘗遊北山因為北山賦以見志績又嘗躬耕於東皋故時人號東皋子或經過酒肆動經數日往往題壁作詩多為好事者詠諷貞觀十八年卒臨終自剋死日遺命薄葬兼預自為墓誌又曰田遊岩京兆三原人也初補太學生後罷歸遊於太白山每遇林泉會意輒留連不能去其母及妻子並有方外之志與遊岩同遊山水二十餘年後入箕山就許由廟東築室而居自稱許由東鄰調露中高宗幸嵩山遣中書侍郎薛元超就問其母遊岩山衣田冠出拜帝令左右扶止之謂曰先生養道山中比得佳否遊岩曰臣泉石膏肓煙霞痼疾既逢聖代幸得逍遙帝曰朕今得卿何異漢獲四浩乎因將遊岩就行宮授崇文學士令與太子少傅劉仁軌談論帝後將營奉天宮于嵩山遊岩舊宅先在宮側特令不毀仍親書題額懸其門曰隱士田遊岩宅又曰史德義蘇州崑山人也咸亨初隱居武丘山以琴書自適或騎牛帶瓢出入郊郭東市號為逸人高宗聞其名徵赴洛陽尋稱疾東歸公卿已下皆赴詩餞別德義亦以詩留贈其文甚美天授初江南道宣勞使周興表薦則天徵赴都詔曰蘇州隱士史德義志尚虛玄素履貞確謙沖彰於里閈孝友表於閨庭固辤徵辟長往嚴陵之瀨多謝簪裾高蹈愚公之谷朕承天革命建極開階寤寐星雲物色林壑順禎期而捐薛帶應休運以解荷裳粵自海隅來遊魏闕行藏之理所得去就之節無違風操可知啟沃攸佇特宜優獎委以諫曹授諫議大夫後放歸丘壑又曰王友貞懷州河內人也弱冠時母疾篤醫言惟啖人肉乃差友貞獨念無可求理乃割股肉以飴親母疾尋差則天聞之令就其家驗問持加旌表友貞素好學讀九經皆百遍訓誨子弟如嚴君焉口不言人過尤好釋典屏絕羶味出言未曾負諾時論以為真君子中宗在春宮召為司議郎不就神龍初又拜太子中舍人仍令所司以禮徵赴及至固以疾辤玄宗在東宮又表請禮徵之以年老竟辤疾不赴年九十餘開元四年卒特下制贈銀青光祿大夫又曰盧鴻一字浩然本范陽人也徙家洛陽少有學業頗善籀篆楷隸隱於山開元初遣備禮再徵不至五年下詔徵之至東都謁見不拜宰相問其故奏言臣聞老君言禮者忠信之薄不足可依山臣鴻一敢以忠信奉見上別召昇內殿賜之酒食詔曰盧鴻一應辟而至訪之政道有會淳風爰舉逸人用勸天下特宜授諫議大夫放之還山又曰王希夷徐州滕人也孤貧好道父母終為人牧羊取傭以供葬葬畢隱於嵩山師道士黃賾向四十年盡能傳其閉氣道養之術頤卒更居兗州徂徠山中與道士劉玄博為棲遁之友好易及老子嘗餌松柏葉及雜花散景龍中年七十餘氣益壯刺史盧齊卿就謁致禮因訪以字人之術希夷曰孔子稱已所不欲勿施於人可以終身行之矣及玄宗東巡勑州縣以禮徵召至駕前年已九十六上令中書令說訪以道義宦官扶入宮中與說甚悅詔授朝散大夫守國子博士聽致仕還山又曰衛大經者篤學善易口無二言則天降詔徵之辭疾不起與魏州人夏侯乾童有舊聞乾童母卒徒步往弔之鄉人止之曰當夏溽暑豈可涉千里致書可也大經曰尺書安能盡意遂行至魏州會乾童出行大經造門設席行吊禮不訊其家人而還開元初畢勾為刺史謂解令孔慎言曰衛生德厚宜有旌異古人式千木之閭禮賢敵也慎言造門就謁時大經已年老辭疾不見嘗預筮死日先鑿墓自為誌文如筮而終又曰李元凱者博學善天文律曆然性恭慎口未嘗言之鄉人宋璟年少時師事之及作相使人遺元凱束帛將薦舉之皆拒而不荅景龍中元行沖為洺州刺史邀元凱至州問以經義因遺之衣服元凱辭曰微軀不宜服新麗但恐不能勝其義以速咎也行沖乃以泥塗污而與之不獲已而受乃還乃以己之所蠶素絲五兩以酬行沖曰義不受無妄之財年八十餘終又曰徐仁紀者聖曆中徵拜左拾遺三上書論得失不納謂人曰三諫不聽可去矣遂移病歸鄉里神龍初宣慰使舉仁紀之行可以激俗又徵拜左補闕三上書又不省乃詣執政求出授靈昌令妻子不之官廨舍唯衣履及書䟽而已餘無所蓄又曰孫處玄者長安中徵為左拾遺頗善屬文常恨天下無書以廣所聞神龍初桓彥范等用事處玄遺彥範書論時事得失彥範竟不用其言乃去官還鄉里以病卒又曰白履忠陳留凌儀人也博涉文史嘗隱居於古大梁城時號為梁丘子景雲中徵拜校書郎尋棄官而歸開元十年刑部尚書王志愔表薦履忠隱居讀書貞苦守操有古人之風堪代褚無量馬懷素入閤侍讀乃徵赴京師及至辭以老病不任職事詔授朝散大夫停留數月而歸履忠鄉人左庶子吳兢謂履忠曰吾子家室屢空竟不霑斗米疋帛雖得五品何益於實也履忠欣然尋以壽終又曰崔覲梁州城固人也為儒不樂仕進以耕稼為業老而無子乃以田宅家財分給奴婢令各為主業覲夫妻遂隱於城固南山家事一不問約奴婢遞過其舍至則供給酒食而己夫婦林泉相對以嘯詠自娛山南節度使鄭餘慶高其行辟為節度參謀累邀方至府第為吏無方略苦不達人事餘慶以長者優容之太和八年左補闕王直方薦覲有高行詔以起居郎徵之覲辭疾不起卒於山皇甫士安高士傳曰王倪者堯時賢人也師被衣齧缺又學於王倪問道焉齧缺曰子不知利害則至人固不知利乎王倪曰至人神矣大澤焚而不能熱河漢沍而不能寒疾雷破山暴風振海而不能驚若然者乘雲雨騎日月而遊天地之外死生無變於己而況利害之間乎又曰善卷者古之賢人也堯聞其得道之士乃北面師之而問道焉及舜受終之後又以天下讓卷卷曰昔唐氏之有天下不教而民從之不賞而民勸之天下均平百姓安靜民不知怒不知喜今子盛為衣裳之服以觀民目調五音之聲以亂民耳作皇韶之樂以愚民心耳目益榮天下之亂從此始矣吾雖為之其何益乎予立宇宙之中冬衣皮毛夏衣絺葛春耕種形足以勞秋收歛身足以休日出而作日入而息逍遙於天地之間而心意自得何以天下為哉遂不受去入深山莫知所終矣又曰齧缺堯時人許由師事齧缺堯又師由問曰齧缺可以配天乎既而齧缺遇由由曰子將何之曰將逃堯曰何謂也曰夫堯知賢人之利天下而不知其賊天下遂逃不見又曰巢父堯時隱人年老以樹為巢而寢其上故時人號曰巢父堯之讓許由也由以告巢父巢父曰汝何不隱汝形藏汝光若非吾友也擊其膺而下之由悵然不自得乃過清冷之水洗其耳拭其目曰向者聞言負吾矣遂去終身不相見又曰許由字武仲隱乎沛澤之中堯聞乃致天下而讓焉由乃退而耕於中嶽頴水之陽箕山之下史記又載又曰壤父者堯時人年五十而擊壤於道中觀者曰大哉帝之德也壤父曰吾日出而作日入而息鑿井而飲耕田而食帝何德於我哉又曰蒲衣者舜時賢人也年八歲而舜師之遂讓以天下蒲衣不受而去莫知所終又曰老萊子者楚公室亂逃世耕於蒙山之陽蓬蒿為室枝杖於床飲水食菽墾山播種人或言於楚王王於是駕至萊子之門萊子方織畚王曰守國之政孤願煩先生老萊子曰諾王去其妻樵還曰子許之乎老萊子曰然妻曰妾聞之可食以酒肉者可隨而鞭棰夫可擬以官祿者可隨而鈇鉞妾不能為人所制者妻投其畚而去老萊子亦隨其妻至於河南以萊子為老子人莫知其所終也又曰顏回字子淵貧而樂道退居陋巷曲肱而寢孔子曰爾家貧居卑何不仕回曰回有郭外田六十畝足以供饘粥有郭內圃六十畝足以供絲麻鼓宮商之音足以自樂習所聞於夫子足以自娛回何仕焉又曰弦高者鄭人也鄭穆公時高見鄭為秦晉所逼乃隱不仕為商人及晉文公之返國也與秦穆公伐鄭圍其都鄭人私與秦盟而晉師退秦又使大夫祀子等三人戍鄭居三年晉文公卒襄公初立秦穆公方強使百里西乞白乙率師襲鄭過周及滑鄭人不知時高將市於周遇之謂其友蹇他曰師行數千里又數經諸侯之地其勢必襲鄭凡襲國者以無備也示以知其情必不敢進矣於是乃矯鄭伯之命以十二牛犒秦師且使人告鄭為備祀子亡奔齊孟明等返至殽晉人要擊大破秦師鄭於是賴高而在鄭穆公以存國之賞賞高而高辭曰詐而得賞則鄭國之信廢矣為國而無信是敗俗也賞一人而敗國俗智者不為也遂以其屬徙東夷終身不返
