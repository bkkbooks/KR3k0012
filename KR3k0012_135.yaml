body:
  text: 偏霸部十八陳陳蒨陳書曰世祖文皇帝諱蒨字子華始興昭烈王長子也少沉敏有識量美容儀留意經史舉動方雅造次必遵禮法高祖甚愛之常稱此兒吾宗之英秀也梁太清初帝夢兩日鬥一大一小大者光滅墜地色正黃其大如斗世祖因三分取一而懷之侯景之亂鄉人多依山湖冠抄世祖獨保家無所犯時亂日甚乃避地臨安及高祖舉義兵侯景遣使收世祖及衡陽獻王世祖乃密裏小刀冀因入見而害景至便屬吏故其事不行高祖大軍圍石頭景欲加害者數矣會景敗世祖乃得出赴高祖營起家為吳興太守高祖受禪立為臨川郡王邑二千戶拜侍中安東將軍及周文育侯安都敗於沌口高祖詔世祖入衛軍儲戎備皆以委焉尋命率兵城南晥戶板切永定三年六月景午高祖崩遣詔徵世祖入篡皇統甲寅至自南晥入居中書省其日即皇帝位於太極前殿詔曰上天降禍奄集邦家大行皇帝背離萬國率土崩心若喪考妣龍圖寶曆眇屬朕躬運鍾擾攘事務機務南面須主西讓禮輕今便式膺景命光宅四海可大赦天下改永定四年為天嘉元年鰥寡孤獨不能自存立者賜穀人五斛孝悌力田殊行異等加爵一級甲寅分遣使者宣勞四方辛酉輿駕親祠南郊二年春正月庚戍大赦天下十二月立始興國廟於京師用王者之禮太子中庶子虞荔御史中丞孔奐以國用不足奏立煮海鹽及榷酤之稅並施行三年春正月庚戍設帷宮於南郊幣告胡公以配天辛亥輿駕親祠南郊二月甲子改鑄五銖錢三月景子安成王頊至自周詔授侍中中書監中衛將軍置佐吏是歲周所立梁王蕭察死子巋丘軌切代立天康元年春二月景子詔曰朕以寡德纂承洪緒日昊劬勞思弘景業而政道多昧黎庶未康兼疾患淹時元陽纍月百姓何咎實由朕躬念茲在茲痛加疾首可大赦天下改天嘉七年為天康元年三月己卯以驃騎將軍開府儀同三司楊州刺史司空安成王頊為尚書令夏四月乙卯皇孫至澤生在位文武賜絹帛各有差為父後者賜爵一級癸酉世祖疾甚是日崩于有覺殿遺詔曰朕疾苦彌留遂至不救修短有命夫復何言但王業艱難頻歲軍旅生民多弊無忘愧愓今方隅乃定俗教未弘便及大漸以為遺恨社稷任重太子可即君臨王侯將相善相輔翊內外叶和勿違朕意山陵務存儉速大斂竟群臣三日一臨公除之制率依舊典六月甲子群臣上諡曰文皇帝廟號世祖葬永寧陵陳伯宗陳書曰廢帝諱伯宗字奉業小字藥王世祖嫡長子也永定二年拜臨川王世子世祖嗣位立為皇太子天康元年四月世祖崩即皇帝位二年春詔大赦天下改光大元年孝悌力田賜爵一級輿駕祠南郊二年十一月慈訓大后集群臣於朝堂令降為臨海王送還藩邸是日出居別第太建二年薨時年十九陳頊陳書曰高宗孝宣皇帝諱頊字紹世小字師利始興昭烈王第二子也梁大通二年生有赤光滿室少寬大多智略及長美容儀身長八尺三寸垂手過膝有勇力善騎射高祖平侯景鎮京口梁元帝徵高祖子姪入侍高祖遣高宗赴江陵纍官為直閣將軍中書侍郎時有馬軍主李揔與高宗有舊每同遊處高宗嘗夜被酒張燈而寐揔適出尋返乃見高宗身是大龍揔便驚走時在關右永定元年遙襲封始興郡王邑二千戶三年世祖嗣位改封安成王天嘉三年自周還授侍中中書監中衛將軍置佐吏尋授使持節都督楊南徐東楊南豫北江五州諸軍事楊州刺史進號驃騎將軍餘如故四年加開府儀同三司六年遷司空天康元年授尚書令廢帝即位拜司徒進號驃騎大將軍録尚書都督中外諸軍事給班劍三十人光大二年正月進位太傅領司徒加殊禮劍履上殿增邑并前三千戶餘如故十一月甲寅慈訓太后令廢帝為臨海王以高宗入篡是歲春正月甲午即皇帝位于太極前殿詔改光大三年為太建元年大赦天下在位文武賜位一階孝悌力田及為父後者賜爵一級異等殊才並加策序鰥寡孤獨不能自存者人賜穀五斛復太皇太后尊號曰皇太后立妃柳氏為皇后世子叔寶為皇太子冬十月新除左衛將軍歐陽紇據廣州舉兵反辛未遣車騎將軍開府儀同三司章昭達率衆討之壬午輿駕祠太廟二年春正月乙酉以征西大將軍開府儀同三司郢州刺史黃法氍其於切為中護大將軍丙午輿駕親祠太廟二月癸未儀同章昭達擒歐陽紇送都斬于建康市廣州平三月丙申皇太后崩丙午曲赦廣衡二州丁未大赦天下三年春正月癸丑以尚書右僕射領大著作徐陵為尚書僕射辛酉輿駕親祠南郊辛未親耕藉田三月丁丑大赦天下自天康元年訖大建元年逋餘軍糧祿秩夏調未入者悉原之五年三月討大都督吳明徹統衆十萬發自白下夏四月癸卯前巴州刺史魯廣達剋齊大峴城辛亥吳明徹剋秦州水柵庚申齊遣兵十萬援歷陽儀同黃法氍破之辛酉齊軍救秦州吳明徹又破之癸亥詔北伐衆軍所殺齊兵令埋掩甲子南譙太守徐槾剋石梁城六年春正月壬戍朔詔曰王者以四海為家萬姓為子一物乖方夕惕猶厲六合未混旰食彌憂朕嗣纂鴻基思弘經略上符景宿下叶人謀命將興師大拯淪溺灰琯未周凱捷相繼拓地數千連城將百蠢彼餘黎毒茲異境江淮年少猶有剽掠鄉閭無賴擲他歷切出陰私將帥軍人罔顧刑典今使符法蠲除仁聲載路且肇元告慶邊服來荒始覩皇風宜覃曲澤可赦江右淮北南司霍光歷陽臨江等郡士民罪無輕重悉皆原宥七年春正月辛未輿駕親祠南郊四月乙未陳桃根表上織成羅文錦被裘各二百首詔於雲龍門外焚之八月周遣使來聘是月甘露頻降樂遊苑丁未輿駕幸樂遊苑採甘露宴群臣詔於苑龍舟山立甘露亭十一年春正月丁酉龍見于南兗州永寧樓側池中二月癸亥輿駕親耕藉田三月丁未詔淮北義人率戶口歸國建其本屬舊名置立郡縣即隸近州賦給田宅秋七月辛卯初用大貨六銖錢八月甲子青州義主朱顯宗等率所領七百戶入附丁卯輿駕幸太社觀閲武十一月詔建子令月微陽初載應此加辰宜播寬澤可大赦天下甲午周遣柱國梁士彥率衆至肥口戊戍周軍進圍壽陽以新除中衛大將軍楊州刺史始興王叔陽為大都督揔督水步衆軍十二月乙丑南北兗晉三州及盱眙山陽平馬頭秦歷陽沛北譙南梁等九州並自拔還京師譙北徐州又陷自是淮南之地盡沒于周矣十四年春正月己酉高宗弗豫甲寅崩于宣福殿時年五十三上諡孝宣皇帝廟號高宗葬顯寧陵陳叔寶陳書曰後主諱叔寶字元秀小字黃奴高宗嫡長子也梁承聖二年生于江陵江陵陷高宗遷關右留後主于穰城夫嘉三年歸京師立為安成王世子太建十四年正月高宗崩即皇帝位于太極前殿詔大赦尊皇后為皇太后宮曰弘範立妃沈氏為皇后七月辛未大赦是月江水赤色如血自京師至于荊州九月設無礙五溉切大會於太極殿捨身及乘輿服御至德元年正月詔大赦改太建十五年為至德元年二年十二月夜天開自西北至東南其內有青黃雜色隱隱若雷聲後主在東宮好學有文藝及即位耽於酒色常在後庭不恤政事又於光昭殿前起臨春結綺望仙三閣閣高數丈並數十間其窗牖欄檻之類悉以沈檀香木為之飾以金玉間以珠翠微風暫至香聞數里瑰寶奇麗近古未有其下積石為山引水為池植以奇樹雜以花藥後主自居臨春閣孔貴人居望仙閣張貴妃居結綺閣並復道往來婦人麗質巧態以從者常千餘人張貴妃孔貴人等八人侍坐尚書令江揔孔範等十人侍宴號曰狎客上令八婦人制五言詩十客一時繼和遲則罰酒君臣酣飲從夕達曙所司皆因閹人奏事主者由此擅作威福軍旅警備並皆不修任用沈客卿施文慶等以苛刻為忠於是文武離心莫肯用命隋文帝謂高頴曰我為百姓父母豈可限一衣帶水不拯之乎命大作戰船人請密之隋文曰吾將行天討何密之有使投梀於江彼若能改吾又何求乃遣晉王廣為元帥以討之及聞隋軍臨江孔範曰必無渡理但恣妓樂縱酒作詩不輟明日隋軍濟江陵文武百寮皆遁出唯尚書僕射袁憲侍側憲勸端坐殿上正色以待之後主曰鋒刃之下未可當之吾自有計乃逃于井既軍人窺井呼之後主不應欲下石乃叫以繩引之驚其太重及出與張貴妃孔貴人三人同束而上賀若弼呼後主視之惶懼汗流股栗再拜弼謂之曰大國之卿當小國之君拜禮也入朝不失作歸命侯亦無勞恐懼三月後主與王公百司發自建鄴至長安後主已下大小在路五百里纍纍不絶隋文宣詔讓後主後主伏地不能對乃宥之給賜甚厚每侍宴恐致傷心為不奏吳音後監守者言叔寶願得官號隋文曰叔寶絶無心肝監守又言叔寶日飲一石少有醒時隋文曰不爾何以過日及從東巡狩印山賦詩曰日月光天德山河壯帝居太平何以報願上封禪書并上表請封禪隋文謙讓不許後從至仁壽宮嘗侍宴及出隋文目之曰此敗豈不由飲酒作詩將此功夫何如思安邊計策初賀若弼度京口彼人密啓告急叔寶為飲酒遂不省高潁至猶見啓在床下未開封豈天亡也後主以隋仁壽四年十一月終於洛陽在位七年年五十二歲史臣曰後主生深宮之中長婦人之手既屬邦國殄瘁不知稼穡艱難初懼阽音簷危屢有哀矜之詔後稍安集復扇淫侈之風賓禮諸公唯寄情於文酒胒近群小皆委之以衡軸謀謨所及遂無骨鯁之臣權要所在莫匪侵漁之吏政刑日紊尸素盈朝耽荒為長夜之飲嬖寵同艷妻之孽危亡弗恤上下相蒙衆叛親離臨機不悟自投於井冀以茍生視其以此求全抑亦民斯下矣遐觀列辟纂武嗣興其始也皆欲齊明日月合德天地高視五帝俯協三王然而靡不有初鮮克有終其故何哉並以中庸之材懷可移之性口存於仁義心怵音黜於嗜欲仁義利物而道遠嗜欲遂性而便身便身不可久違道遠難以固志佞諂之倫承顏候色因其所好以悅導之若下坂走丸順流決壅非夫感靈辰象降生明德孰能遺其所樂而以百姓為心哉此所以成康文景千載而罕遇也
