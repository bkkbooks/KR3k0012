body:
  text: 兵部五命將禮記曰諸侯賜弓矢然後專征賜斧鉞然後專殺史記留侯世家曰黥布反上欲使太子往擊之四人相謂曰凡來者將以存太子太子將兵事危矣乃說建成侯曰君何不急請呂后承間為上泣言黥布天下猛將也善用兵今諸將皆陛下故等夷乃令太子將無異使羊將狼也又馮唐曰上古王者遣將也跪而推轂曰閫以內寡人制之閫以外將軍制之又淮陰侯傳曰信數與蕭何曰信雖為將信必不留漢王曰以為大將何曰幸甚漢書曰蕭何追韓信還漢王曰以為大將何曰王素慢無禮今拜大將如召小兒此乃信所以去也王必欲拜之宜擇日齊戒設壇場具禮乃可王許之諸將皆喜人人各自以為得大將至拜乃韓信也一軍皆驚後漢書陳龜傳曰臣聞三辰不軌擢士為相蠻夷不恭拔卒為將摯虞新禮曰漢魏故事遣將出征符節郎授鉞於朝堂新禮遣將御臨軒尚書授節鉞古兵書跪而推轂之義也雀豹古今輿服注曰得賜黃鉞則斬持節將淮南子曰凡國有難君自宮召將詔之曰社稷之命在將軍耳今國有難請子將而應之將軍受命乃令祝史太卜齊宿三日之太廟鑽靈龜卜吉日以受鼓旗君入廟門西面而立將入廟門北面而立主親操鉞持頭授將軍柄曰從此上至天者將軍制之又復操斧持頭授將軍柄曰從此下至淵者將軍制之將以授斧鉞答曰國不可從外治也軍不可從中御也二心不可以事君疑志不可以應敵臣既以受制於前矣鼓旗斧鉞之威臣無還願君亦無垂一言之命於臣也君若不許臣不敢將君若許之詞而行乃剪爪前長鬋爪送終之禮去其手足爪也設明衣明衣喪衣也在於暗賓故言明鑿凶門而出凶門北出門也將軍之出以喪禮樂之以必死也乘將軍車載旍旗斧鉞其臨敵決戰不顧必死無有二心是故無天於上無地於下無敵於前無主於後進不求名退不避罪唯民是保利合於主上將之道也如此則智者為之慮勇者為之鬭氣厲青雲疾如馳騖是故兵未交接而敵人恐懼若戰勝敵奔賞吏遷官顧反於國效旗以入乃縞素辟舍請罪於君君曰赦之大勝三年反舍大勝敵者還三年乃反故舍中勝二年不勝期年兵之所加者必無道之國也故能戰勝而不報取地而不反民不疾疫將不夭死五榖豐風雨時節戰勝於外福生於內是故名必成而後無餘害矣任彥升奏彈曹景宗曰昔漢光命將坐知千里魏武置法案以從事陳孔璋檄吳將校部曲文曰朝為仇虜夕為上將馮衍與田邑書曰今以一節之任建三軍之威豈特寵其八尺之竹氂牛之尾也易將史記曰秦師伐趙王使廉頗禦之頗固壁不戰趙王惑秦之間以趙奢之子代頗趙師大敗後漢書曰光武遣馮異代鄧禹車駕送之河南賜以乘輿七尺具劍具謂以寶玉裝飾之東觀記作玉具劍晉書曰石苞為淮北監軍王琛所奏與吳人交通先時望氣者云東南有大兵起及琛表至帝甚疑之會荊州刺史胡烈表吳人欲大出為寇苞亦聞吳師將入至乃築壘遏水以自固帝聞之謂羊祜曰吳人每來常東西相應豈石苞果有不順乎祜深明之而帝猶疑焉命苞子喬為尚書郎上召之經日不至帝謂為必叛欲封而隱其事遂下詔以苞不料賊勢築壘遏水勞擾百姓策免其官遣太尉義陽王望率其大軍徵之以備非常又勑鎮東將軍琅邪王胄自下邳會壽春苞用掾孫鑠計放兵步出住都亭待罪帝聞之意解及苞詣闕以公還第苞自恥受任無效而無怨色又曰鎮南將軍杜元凱都督荊州諸軍事襲吳西陵督張政西陵今夷陵郡大破之政吳之名將據要害之地恥無備取敗不以實聞于孫皓元凱欲間吳邊將乃請還其所獲之衆於皓皓果召政遣武昌監劉憲代之故晉軍將至使將帥移易成傾蕩之勢竟殄滅焉北史曰後周末隋文帝作相尉遲逈據相州舉兵隋文遣鄖公韋孝寬鄖音云為東道元帥師次沁水水漲兵未得渡吏李詢上密啓云大將梁士彥宇文欣崔弘度等並受尉遲逈餉金軍中慅慅人情大異文帝以為憂欲代此三人李德林獨進計云公與諸將並是國家貴臣未相伏馭今以挾令之威使得之耳安知後所遣者能盡腹心前遣之人獨致乖異又取金之事虛實難明即令換易彼將懼罪恐逃逸便須禁固然則鄖公以下必有驚疑之意且臨敵代將自古所難樂毅所以辭燕趙奢之子以之敗趙如愚所見但遣公一腹心明於智略為諸將舊來所信伏者速至軍所觀其情僞縱有異意必不敢動文帝大悟即令高頴馳驛往軍所為諸將節度竟成大功戰國策曰昌國君樂毅為燕王合五國之兵而攻齊下七十餘城盡郡縣之以屬燕唯莒即墨二城未下而昭王死惠王即位用齊人反間疑樂毅而使騎劫代之樂毅奔趙老將史記曰秦始皇問李信曰吾欲攻荊用幾何人而足信曰不過用二十萬人始皇問王翦翦曰非六十萬人不可始皇曰王將軍老矣何怯也李將軍果斷壯勇其言是也王翦因謝疾歸老於潁陽李信攻鄢郢破之於是引兵而西與蒙恬會城父荊人因隨之三日三夜不得頓舍大破李信軍始皇聞之大怒自馳如潁陽謝翦曰不用將軍計李信果辱秦將軍獨忍棄寡人乎翦謝曰老臣罷病悖亂唯大王更擇賢將始皇謝曰已矣將軍勿復言王翦曰大王必不得已用臣非六十萬人不可始皇曰聽將軍計耳於是王翦將六十萬人始皇自送灞上王翦行請美田宅園池甚衆始皇曰將軍行矣何憂貧乎翦曰為大王將有功不得封侯故及大王之向臣臣亦及時以請園池為子孫業耳始皇大笑或曰將軍乞貸亦已甚矣翦曰今空秦國甲士專委我我不多請田宅為子孫業以自堅固令秦王坐而疑我耶翦東代信擊荊大破荊軍虜荊王負芻竟平荊地為郡縣漢書曰西羌反時趙充國年七十餘上老之使御史大夫丙吉問誰可將者充國對曰無踰於老臣耳上遣焉問曰將國度羌虜何如當用幾人充國曰百聞不如一見兵難踰度踰遙也三輔言也臣願馳至金城圖上方略然羌戎小夷逆天背叛滅亡不久願陛下以屬臣勿以為憂上笑曰諾充國日饗軍士皆欲為用虜數挑戰充國堅守捕生口言羌豪相責曰汝無反今天子遣趙將軍來年八九十矣善為兵今欲一鬭而死可得耶又曰元狩四年大將軍大擊胸奴李廣數自請行上以老不許良久乃許之大將軍陰受上旨以為數奇不偶也無令當單于恐不得所欲時公孫敖亡道從廣廣或失道大將軍使長史持糒醪遺廣因問失道狀長史急責廣之莫府上簿廣曰諸校尉無罪乃我自失道謂其麾下曰廣結髮與胸奴大小七十餘戰今幸從大將軍出接單于兵而大將軍從廣部行回遠又迷失道豈非天哉終不能復對刀筆吏遂引刀自剄而百姓聞之知與不知皆為垂泣東觀漢記曰馬援字文淵建武二十四年威武將軍劉向擊武陵五溪蠻夷深入軍沒援因復請行時年六十二帝愍其老未許之援自請曰臣尚能被甲上馬帝令試之援據鞍顧眄以示可用帝笑曰矍鑠哉是翁也遂遣援宋書曰沈慶之討竟陵王誕慶之至城下誕登樓謂曰沈公君白首之年何為來慶之曰朝廷以君狂愚不足勞少壯故使僕來耳梁書曰王神念少善騎射及老不衰嘗於武帝前手執二刀楯左右交度馳馬往來冠絶群伍後魏書曰中山王英之征義陽傅永為寧朔將軍統軍當長圍遏其南門蕭衍將馬仙琕連營稍進規解城圍永謂英曰凶堅豕突意在決戰雅山形要宜早據之英沉吟未決永曰機者如神難遇易失今日不去明朝必為賊有雖悔無及分英兵夜築城於山上遣統軍張懷等列陳於山下以防之至曉仙琕果至懷等戰敗築城者悉皆奔退仙琕乘勝直趣長圍義陽城人復出挑戰永乃分兵付長史賈思祖令守營壘自將馬步千人南逆仙琕轘甲揮戈單騎先入唯有軍主蔡三虎副之餘人無有及者突陳橫過賊射永洞其左股永拔箭復入遂大破之斬仙琕子仙琕燒營席卷而遁英於陳謂永曰公傷矣且還營永曰昔漢祖捫足不欲人知下官雖微國家一帥奈何使虜有傷將之名遂與諸軍追之極夜而返時年七十餘矣三軍莫不壯之又曰畢衆敬爵為東平公善自奉養食膳豐華必致他方遠味年已七十鬢髮皓白而氣力未衰據鞍馳騁有若少壯篤於姻親深有國士之風大和中高祖賓禮舊老衆敬咸陽公高允引至方山雖文武奢儉好尚不同然與允甚相愛敬接膝談款有若平生後以篤老乞還桑梓朝廷許之衆敬臨還獻真珠璫四具銀裝劍一口刺虎矛一枚後周書曰梁臺不過識千餘字口占書啓詞意可觀年過六十猶能被甲跨馬足不躡蹬馳射弋獵矢不虛發隋書曰開皇初突厥寇邊燕薊多被其患前總管李崇至拜為幽州六州五十鎮諸軍事搖修鄣塞謹斥堠邊民以安後六載徙為壽州初自以年老乞骸骨上召之既引見上勞之曰公積行纍仁歷仕三代克終富貴保茲遐壽良足善也賜坐褥歸於第歲餘終于家又曰賀若誼為涇州刺史時突厥屢為邊患朝廷以誼素有威名拜靈州刺史進位柱國誼時年老而筋力不衰猶能重鎧上馬為北夷所憚數載上表乞骸骨優詔許之誼家富於財郊外搆一別廬多植果木每邀賓客列女樂遊集其間卒于家
