body:
  text: 兵部十三機略一孫子曰凡戰者以正合以奇勝正者當敵奇兵從旁擊其不備故善奇者無窮如天地不竭如江海終而復始日月是也死而更生四時是也故聲不過五五聲之變不可勝聞色不過五五色之變不可勝觀味不過五五味之變不可勝嘗以喻奇正無窮也戰數不過奇正之變不可勝窮也奇正相生如循環之無端孰能窮之哉故水之疾至於漂石者勢也鷙鳥之擊至於毀折者節也發起討擊敵之是以善戰者其勢險險猶疾也其節短短近勢如彍弩節如發機在疾不遠發則中也紛紛紜紜鬭亂而不可亂旌旗亂也示敵者若亂以金鼓齊之渾渾沌沌形圓而不可敗也車騎轉形圓者出入有道齊整左傳曰齊侯登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而疏陳之使乘車者左實右僞以斾先輿曳柴而從之以揚塵齊侯見之畏其衆也乃脫歸齊師夜遁師曠告晉侯曰鳥烏之聲樂齊師其遁邢伯告中行伯曰有班馬之聲齊師其遁邢伯楚中行伯也又曰吳從楚師及清發將擊之夫概謂王曰困獸猶鬭况人乎若知不免而致死必敗我使先濟者知免後者慕之蔑有鬭心半濟而後可擊也從之又敗之楚人為食吳人及之奔食而從之又曰鄭人侵衛牧以報東門之役衛人以燕師伐鄭鄭將祭足原繁泄駕以三軍軍其前使曼伯子元潛軍軍其後燕人畏鄭三軍而不虞制人鄭二公子以制人敗燕師于北制君子曰不備不虞不可以師又曰宋襄公及楚人戰于泓宋人既成列楚人未既濟未盡度弘水也司馬子魚曰彼衆我寡及其未既濟也請擊之公曰不可既濟而未成列又以告公曰未可既陳而後擊之宋師敗績公傷股門官殲焉國人皆咎公公曰君子不重傷不擒二毛二毛頭白有二色者也古之為軍也不以阻隘也不因阻隘以求勝寡人雖亡國之餘宋商紂之後也不鼓不成列子魚曰君未知戰勍敵之人隘而不成列天贊我也勍強也言楚在險隘不得陳列天所以佐宋也阻而鼓之不亦可乎猶有懼焉雖因阻擊之猶恐不勝也且今之勍者皆吾敵也雖及胡耇獲則取之何有於二毛今之勍者謂與吾競者也胡耇元老之稱也耇音茍明恥教戰求殺敵也明設刑戮以恥不果也傷未及死如何勿重言尚能害己也若愛重傷則如勿傷愛其二毛則如服焉言茍不欲傷殺敵人則本可不須鬭也三軍以利用也為利興也金鼓以聲氣也鼓以佐士衆之聲氣也利而用之阻隘可也聲盛致志鼓儳可也儳巖未整陳也儳音讒通典曰宋公違之而敗也又曰越伐吳吳子禦于笠澤夾水而陳越為左右勾卒勾卒伍伍相著別為左右屯也勾音鉤使夜或左或右鼓譟而進吳師分以禦之越以三軍潛涉當吳中軍而鼓之吳師大亂遂敗之左右勾卒為聲勢以分吳而三軍精卒并力擊其中軍故得勝吳越春秋越伐吳起軍於江南乃分兵為左右軍將有私卒六千人為中軍日昏乃令左軍銜枚泝江五里右軍銜枚沿江五里夜半鳴鼓吳師聞之大駭曰越人來攻我乎因分其軍為二陳拒越越王乃以其中軍銜枚潛涉不鼓不譟以襲攻之吳師大敗此與左氏傳事同小異故附于此又曰吳子闔廬問於伍員曰初而言伐楚余知其可也而恐其使余往也又惡人之有余之功也今余將自有之矣伐楚何如對曰楚執政衆而乖莫適任患適音的若為三師以隸焉隸猶勞也一師至彼必皆出彼出則歸彼歸則出楚必道弊罷弊於道亟隸以罷之亟數也音器隸音羊至切多方以誤之既罷音疲而后以三軍繼之必大克之闔廬從之楚於是乎始病終於吳師入郢郢楚都也又曰吳伐越越子勾踐禦之陳于攜李攜將遂切勾踐患吳之整也使死士再擒焉不動使敢死之士往輒為吳師所擒欲使吳師亂取之而吳不動使罪人三行屬劍於頸以劍注頸行戶郎切而辭曰二君有理理軍旅也臣干旗鼓犯軍令也不敏於君之行前不敢逃刑將歸死遂自剄也師屬之目越子因而伐之大敗吳師又曰楚子圍宋晉侯將救之大夫先軫曰報施救患取威定霸於是乎在矣狐偃曰楚始得曹而新婚於衛若伐曹衛楚必救之則宋免矣從之而解又曰晉楚戰于城濮楚將子玉從晉師晉師陳于莘北胥臣以下軍之佐當陳蔡子玉以若敖之六卒將中軍曰今日必無晉矣鬭宜申將左鬭勃將右晉禆將胥臣蒙馬以虎皮先犯陳蔡陳蔡奔楚右師潰陳蔡屬楚右師狐毛設二斾而退之斾大斾也又建一斾而退使若大將稍却也欒枝使輿曳柴而僞遁曳柴起塵詐為衆走楚師馳之原軫郤溱以中軍公族橫擊之公族公所師之軍狐毛狐偃以上軍夾攻子西楚左師潰楚師敗績子玉收其卒而止故不敗晉師三日館穀館舍也食楚軍穀三日也又曰楚將鬭廉帥師及巴師圍鄾音憂鄧養甥𨈭甥音男帥師救鄾三逐巴師不克鬭廉衡陳其師於巴師之中以戰而北衡橫也分巴師為二部鬭廉橫陳於其間以與鄧師戰而僞北北走鄧人逐之背巴師而夾攻之楚師僞走鄧師逐之背巴師巴師攻之楚師自前與戰也鄧師大敗鄾人宵潰宵夜又曰晉師伐秦秦人毒涇上流師人多死又曰楚師伐吳針音針尹固與王同舟王使執燧象以奔吳師燒火燧繫象尾使赴吳師驚之鉞職深切又曰時邾人城翼翼邾邑也還將自離姑離姑邾邑也從離姑則道經魯之武城也大夫公孫鉏曰魯將禦我欲自武城還循山而南至武城而還依山南行不欲過武城鉏助魚切大夫徐鉏丘弱茅地二子邾大夫曰道下遇雨而將不出是不歸也謂此道下山濕遂自離姑遂過武城武城人塞其前以兵塞其前道斷其後之木而弗殊邾師過之乃推而蹶之遂取邾師推士追切蹶其月切又曰晉將陽處父侵蔡父音甫楚將子上救之與晉師夾泜而軍泜直利切處父患之使謂子上曰吾聞之文不犯順武不違敵子若欲戰則吾退舍子濟而陳欲避楚使度成陳而後戰遲速唯命不然紓我紓緩老師費財亦無益也乃駕以待子上欲涉大孫伯曰不可晉人無信半涉而薄我悔敗何及不如紓之乃退舍楚退欲使晉度陽子宣言曰楚師遁矣遂歸楚師亦歸太子啇臣譖子上曰受晉賂而避之楚之恥也罪莫大焉王殺子上戰國策曰秦伐趙趙以趙奢之子代廉頗為將拒秦將王齕於長平齕音恨勿切秦王聞之乃陰使武安君白起為上將軍而王齕為禆將軍令軍中有敢泄武安君者斬馬服子至則出兵擊秦軍秦軍佯敗而走張二奇兵以劫之趙軍逐勝追造秦壁秦壁堅距不得入而秦奇兵二萬五千人絶趙軍又一軍五千騎絶趙壁間趙軍分而為二糧道絶而秦出輕兵擊之趙戰不利因築壁堅守以待救至秦王聞趙食道絶王自之河內賜民爵各一級發年十五以上悉詣長平遮絶趙救及糧食至九月趙卒不得食四十六日皆內陰相殺食來攻秦壘欲出為四隊四五復之不能出其時馬服子卒自相搏戰秦軍射殺之軍大敗卒二十餘萬人降皆坑之又曰燕軍大破齊國齊將田單守即墨知士卒可用乃身操板插與士卒分功妻妾編行伍之間盡散飯食饗士令甲卒皆伏使老弱女子乘城遣約降於燕燕軍皆呼萬歲田單又牧人金得千鎰令即墨富豪遺燕將書曰即墨即降願無掠虜吾族家妻妾令安堵燕將大喜許之燕軍由此益懈田單出軍擊大敗之又曰燕師伐齊已下七十餘城圍即墨未下齊將田單乃收城中得千餘牛為縫繒衣畫以五綵龍文束兵刃於其中角而灌脂束葦於尾燒其端鑿城數十穴夜縱牛壯士五千人隨其後牛尾熱怒而奔燕軍燕軍夜大驚牛尾炬火光明炫耀燕軍視之皆龍文所觸盡死傷五千人因銜枚擊之而城中鼓譟從之老弱者皆擊銅器為聲聲動天地燕軍大駭敗走而齊七十餘城皆復為齊又曰燕將騎劫攻齊即墨齊將田單拒守乃宣言曰吾唯懼燕軍之劓所得齊卒置之前行與我戰即墨敗矣燕人聞之如其言城中人見齊降者盡劓皆怒堅守唯恐見得田單又縱反間曰吾懼燕人掘吾城外冢墓戮先人可為寒心燕軍盡掘龍墓燒死人即墨人從城上遙見皆涕泣其欲出戰怒皆十倍因大敗燕又曰魏趙相攻齊將田忌引兵救趙孫臏曰夫解雜亂紛糾者不控捲丘員切救鬭者不搏撠音戟批亢搗虛形格勢禁則自為解耳今魏趙相攻輕兵鋭卒必竭於外老弱罷於內君不若引兵疾走大梁據其街路衝其方虛彼必釋趙而自收弊於魏也田忌從之直走大梁魏師遂退又曰齊孫臏謂齊王曰凡伐國之道攻心為上務先伏其心今秦之所恃為心者燕趙也當收燕趙之權今說燕趙之君勿虛言空辭必將以實利以回其心所謂攻其心者也史記曰秦伐韓軍於閼與趙王召趙奢而問可救不對曰道遠險狹譬兩鼠鬭於穴中將勇者勝王乃命救之秦軍武安西鼓譟勒兵武安屋瓦盡震趙奢堅壁留二十八日不行秦間來入奢善食而遣之間還報曰去國三十里而不行秦將大喜秦間去趙奢卷甲而趨之軍士許歷曰秦人不意趙師至此其來氣盛將軍必厚集陳以待之先據北山上者勝奢許諾即以万人趨之秦兵後至爭山不得上奢縱兵大破秦軍解閼與之圍又曰李廣軍敗為胸奴生得佯死騰上胡兒善馬抱兒南馳以故得脫
