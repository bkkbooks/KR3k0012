body:
  text: 樂部十六琴中樂府解題曰水仙操伯牙學琴於成連先生三年不成至於精神寂寞情之專一尚未能也成連云吾師方子春今在東海中能移人情乃與伯牙俱往至蓬萊山留宿伯牙曰子居習之吾將迎師剌船而去旬時不返伯牙近望無人但聞海水洞滑崩澌之聲山林窅寞群鳥悲號愴然而嘆曰先生將移我情乃援琴而歌曲終成連回剌船迎之而還伯牙遂為天下妙矣又曰雉朝飛操者齊宣王時處士犢沐子所作也年七十無妻出薪於野見雉雌雄相隨則心悲乃仰天歎曰聖王在上恩及草木鳥獸而我獨以不獲援琴而歌以自傷又曰思歸引衛有賢女劭王聞其賢請娉之未至王薨太子曰吾聞齊桓得衛姬霸今衛女賢者欲留之大夫曰不可若賢必不我聽聽亦不賢不足取太子不聽遂留拘深宮思歸不得歸援琴而歌曲終自縊而死揚雄琴清英曰尹吉甫子伯奇至孝後母譖之自投江中衣苔帶藻忽夢見水仙賜其美樂唯念養親揚聲悲歌船人聞而學之吉甫聞船人之聲疑似伯奇援琴作子安之操琴操曰高陵牧子娶妻無子父母將改娶牧子援琴鼓之痛恩愛乖離故曰別鶴操揚雄琴清英曰雉朝飛操者衛女之作也衛侯女嫁於齊太子至中道聞太子死問傅母何如傅母曰旦往當喪畢不肯歸終之以死焉傅母好琴取女自操琴於冢上鼓之忽三雉俱出墓中傅母撫雌雉曰女果為雉耶言未卒俱飛而起忽而不見傅母悲痛援琴作操故曰雉朝飛琴操曰古琴曲有歌詩五曲一曰鹿鳴二曰伐檀三曰騶虞四曰鵲巢五曰白駒又有十二操一曰將歸操孔子所作孔子之趙聞殺鳴犢而歸作此曲也二曰倚蘭操孔子所作傷不逢時三曰龜山操孔子作季桓子受齊女樂孔子欲諫不得退而望魯龜山作曲喻季氏若龜山之蔽魯也四曰越裳操周公所作五曰拘幽操文王作文王拘於羑里作此曲六曰歧山操周人為太王所作七曰履霜操尹吉甫子伯奇無罪見逐自傷作此曲八曰雉朝飛操沐犢子所作沐犢子七十無妻見雉雙飛感之作此曲也九曰別鶴操商陵牧子所作娶妻五年無子父母欲改娶其妻聞之中夜悲牧子因之作此曲十曰殘形操曾子夢見一貍不見其足而作曲十一曰水仙操伯牙所作十二曰壞陵操伯牙所作又有九引一曰列女引楚樊姬所作二曰伯姬引魯伯姬所作三曰貞女引魯漆室女所作四曰思歸引衛女所作五曰霹靂引楚商梁出遊九皋之澤遇風雷霹靂畏懼而歸作此引六曰走馬引樗里牧恭所作牧恭為父報冤殺人而亡藏於山林之下有天馬引之感作此引七曰箜篌引霍里子高所作即公無渡河曲八曰琴引秦時屠門高所作九曰楚引楚龍丘子高所作又有河間雜歌二十一章琴歷曰琴曲有蔡氏五弄雙鳳離鸞歸風送遠幽蘭曰雪長清短清長側清調瑟調大遊小遊明君胡茄廣陵散白魚歎楚妃歎風入松烏夜啼楚明光石上流泉臨汝侯子安之流漸洄雙燕離陽春弄悅弄連弄悅人弄連珠弄中揮清暢志清看客清僻清婉轉清大周正樂曰師襄子夫子琴師也方子春教成連生鼓琴能化人情者也成連先生教伯牙鼓琴者也鍾子期善聽知音者子期死伯牙終身不鼓琴者也顏淵聽夫子琴知周襄者也涓子操琴心玉篇者也禽高以琴養性求仙於羅浮山中鼓琴於郢中奏陽春白雪者也雍門周以琴感孟嘗君悲者也鄒忌與齊王言琴事以方正定德者也榮啓期對夫子彈琴言三樂之事者也禽孟臨巒戶死而琴歌者也應侯鼓賈子對以取牛婦人者也子桑飢寒欲死鼓琴而歌者也師曠為晉平公探微感玄鶴二七下舞者也師涓寫濮上琴聲者也子夏除喪曰琴樂曰不敢不至者也閔子騫除喪曰彈琴不成聲者也宓子賤治單父不下堂彈琴而邑自理者也踞轉鼓琴春秋晉大夫張骼輔轢者也衛師曹衛獻公令師曹教公嬖妾師曹鞭之公怒之鞭師曹三百者又曰冠先生宋人也以釣魚為業宋景公問道不告殺之後十五年在宋城門下彈琴者也已上自堯神人暢至始皇九十三弄好士二十七人並為上石又曰杞梁妻者齊邑杞梁殖妻之所作也莊公襲莒殖戰而死莊公還遇其妻於路使使者道吊之妻曰今殖有罪君何辱命焉若殖免於罪賤妾有先人之弊廬妾不敢受郊吊也公乃吊諸室成禮而去妻歎曰上則無父中則無夫下則無子外無所依內無所倚將何以立吾節豈能更二哉死而己矣於是乃援琴而鼓之又曰伐檀操者魏國女之所作也傷賢者隱弊素飱在位閔傷怨曠失其嘉會夫聖主之制能治人者食於人不能治人者食於田今賢者隱退伐木小人在位食祿懸珍琦積百穀并包有土德澤不加百姓傷痛上之不知王道之不施仰天長嘆援琴而鼓之又曰將歸操者孔子之所作也趙簡子循執玉帛以聘孔子孔子將往未至渡狄水聞趙殺其賢大夫竇鳴犢喟然而歎曰夫趙之所以治者鳴犢之力也殺鳴犢而聘余胡丘之往也夫燔林而田則麒麟不至覆巢破卵則鳳皇不翔鳥獸尚惡傷類而況君子哉於是援琴而鼓之又曰歧山操者周大臣之所作也大王居豳狄人攻之仁恩惻隱不忍流血選練珍寶犬馬皮幣束帛與之狄侵不止問其所欲欲得土地大王曰土地者所以養萬民也吾將委國而去矣二三子亦何患無君焉遂杖策而出喻乎梁而邑乎歧山自傷劣不能化夷狄為之所侵喟然歎息援琴而鼓之又曰三士窮操者其思革子之所作也其思革子石文子叔愆子三人相與為友聞楚城子賢而好士三子相與俱往見之至於磝磽嶔岩之間卒逢飄風暴雨相與俱伏空柳之下衣寒乏糧自度不得活三人相視而歎曰與其飢寒俱死也豈若併衣糧於一人哉二人俱以其思革子為賢推衣糧與之革子曰死則共之今二子以賢愚相辭乃以死讓孰賢哉辭而不受二子曰吾自以相與猶左右手也左傷則右救之右傷則左救之子不我受俱死無名於世不亦痛乎於是思革子乃受之二子遂凍餓而死其思革子抱二子尸而埋之號天哭泣竭哀而去往見於楚王楚王知其賢者於是旨酒嘉肴設鍾鼓樂之其思革子愴然有憂悲之意楚王心動怪而不悅乃推樽罷樂引琴而進其思革子援琴而鼓之作相與別散之意王聞曰子琴音何苦哀也革子推琴離席長跪涕流而下對臣友三人石丈子叔愆子竊慕大王高義欲俱來謁至於磝磽嶔岩之間逢飄風暴雨衣寒糧乏度不能俱活二子俱不以臣為不肖推糧與臣二子逢凍餓死大王雖陳酒肴設樂誠不敢酣樂也楚王曰嗟乎乃如是耶於是賜其思革子黃金百斤命左右棺斂收二子而葬之以其思革子為相故曰三士窮又曰鹿鳴操者周大臣之所作也王道襄君志傾留心聲色內顧妃后設旨酒嘉肴不能厚養賢者盡禮極歡形見於色大臣照然獨見必知賢士幽隱小人在位周道陵遲自以是始故彈琴以風諫歌以感之庶幾可復歌呦呦鹿鳴食野之蘋我有嘉賓鼓瑟吹笙吹笙鼓簧承筐是將人之好我示我周行此言禽獸得美甘之食尚知相呼傷時在位之人不能乃援琴以剌之故曰鹿鳴也又曰騶虞操者邵國女之所作也古有聖王在上君子在位役不踰時不失嘉會內無怨女外無曠夫及周道襄微禮義廢弛強陵弱衆暴寡萬民騷動百姓愁苦男怨於外女傷於內內外無主內迫情性外迫禮義歎傷所説而不逢時於是援琴而歌又曰猗蘭操者孔子之所作也孔子周流天下應聘諸侯莫能任用自衛反魯過隱之中見薌蘭之獨茂也喟然而歎曰夫蘭當為王者香今乃獨茂與衆草為伍譬猶賢者不逢時與鄙夫為倫也憑車撫軾援琴而鼓之自傷不逢時也又曰龜山操者孔子之所作也齊人饋女樂季桓子受之魯君閉門不聽朝當此之時季氏專政上僣天子下畔大夫賢聖斥遂讒邪滿朝孔子欲諫而不聽復退而望魯魯有龜山蔽之譬季子於龜山託勢位於斧柯季氏專政道猶龜山之蔽魯也傷政道之不用閔百姓不得其所欲誅季氏而力不能於是援琴而歌又曰白駒操者失朋友之所作也其友賢俱仕乎襄亂之世君無道不可匡輔依違微風諒不見受國士詠而思之援琴而長歌又曰越嘗操者周公之所作也周公輔相成王成就文王之道天下太平萬國和會江黃納貢越嘗重九譯而來獻白雉執贄曰吾君在外國也頃無迅風暴雨意者中國有聖人乎故遣臣來周公於是仰天而歎之援琴而歌又曰拘幽操者文王之所作也紂為無道上逆天文下變地理刑無罪殺不辜斫朝涉刳孕婦百姓怨悲海內同心苦之文王為西伯種德修仁布其恩惠天下三分有其二紂大怒其有仁心也召而朝之拘於羑里文王憂愁援琴而鼓之故曰拘幽操也又曰聶政剌韓王者聶政之所作也聶政父為韓王治劍過時不成韓王殺之時政未生及壯問其母曰父何在母告之政欲殺韓王乃學塗入王宮拔劍剌韓王不得走政踰城而出去入太山遇仙人學鼓琴漆身為厲吞炭變其音七年而琴成欲入韓國道逢其妻妻對之泣下對曰夫人何故泣妻曰聶出遊七年不歸吾常夢相思見君對妾笑齒似政齒故我心悲而泣也政曰天下人齒盡相似耳胡為泣乎即別去復入山中仰天而歎曰嗟乎變容易身欲為父報仇而為妻所識父讎當何時復報援石擊落其齒留山中三年習琴持入韓國人莫知政政鼓琴闕下觀者成行馬牛止聽以聞韓王王召政而見之使之彈琴政即援琴而鼓之內刀在琴中政於是左手持衣右手出刀以剌韓王殺之曰烏有使者生不見其父可得死乎政殺國君罪當及母即自犁剝面皮斷其形體人莫能識知乃梟磔政形體市懸金其側有知此人者賜金十斤遂有一婦人往而哭之曰嗟乎為父報讎耶顧謂市人曰此所謂聶政也為父報仇知當及母乃自屠剝面何愛一女之身而不揚吾子之名哉乃抱政尸而哭冤結陷塞遂絶行脈而死故曰聶政剌韓王也又曰曾子歸耕者曾子之所作也曾子事孔子十有餘年眷然念二親年襄養之不備欲歸而重歎之於是援琴而鼓之又曰崔子渡河者閔子騫之所作也崔子早無母其後母常以其死母名呼之不應者後母輒笞之崔子惡與其母同名欲自殺恐揚父惡又死母名應則逆非義也則以能遊渡河為辭擊石於腹入水自沉而死衆人但以為不能遊耳莫知其故自沉是以父過不揚閔子騫大其能為父隱傷痛之故援琴而鼓之以美其意故曰崔子渡河又曰屈原自沉者屈原之所作也屈原楚同姓也為懷王佐博聞強識疏通政事入則與王議國計策以施號令出則接遇賓客應對諸侯上官大夫與之爭寵害其器能譖之於王曰使屈原每一出矜伐功以其非己莫能為懷王怒而斥之屈原自傷懷忠而見疑憂愁面目黎黑臨河而哀思著離騷九歌九歎七諫之辭仰天而歎援琴而鼓之又曰孔子厄者孔子之所作也孔子應聘於楚待禮於陳在陳絶糧從者病莫能興喟然而歎曰歸邪歸邪吾黨之小子狂簡斐然成章不知所以裁之於是援琴而鼓之以自敘其志故曰孔子厄又霍將軍歌者霍去病之所作也去病為討寇校尉為人少言勇而有氣使擊胸奴斬首二千後六出斬首十餘萬級益封萬五千戶祑祿與大將軍等於是志得意歡乃援琴而鼓之又曰鳳凰來儀者周成王之所作也成王即位用周召畢榮之屬天下大治殊方絶域莫不蒙化是以越常獻雉重譯來貢太平之瑞同時而應麒麟遊苑圃鳳凰翔舞於庭頌聲並作僉然大同於是成王乃援琴而鼓之又曰子安者其門離須之作也其門離須兄弟三人長兄從軍二年不歸離須坐事被刑天下昏亂兵革騷動宗族離散離須當遠往輸持其小弟往寄所知分別相去垂涕而決其弟歔欷謂須曰吾生不賭母長不識父遭顛沛擾攘之世兄從軍不歸子復遠輸未知反期一旦是非使吾無所依吾聞兄在林梨欲往從之離須止之曰兵革交錯道路不通子為我無往往必不還令吾兄弟分別死別不亦痛乎喟然不應啼泣而別離須屬其主人曰子欲往慎為我勿遣也去數日卒夜亡不知其處離須來還分布求之卒不得憂思不樂仰天而歎於是援琴而鼓之又曰力拔山者項羽之所作也項王為漢所圍於垓下諸侯兵悉到圍數重項王夜覺聞漢軍四面楚歌驚起坐仰天而歎曰漢得吾衆是何楚歌之多於是心悲援琴而鼓之又曰禹上會稽者禹之所作也堯時洪水滔天百姓巢居不安堯乃徵禹而使治之乃決江河上會稽山顧曰嗚呼洪水滔天下人愁悲上帝俞咨三過吾門不入父子道襄非欲伐功也傷君莫知不欲煩下民嗟乎天非欲數煩下嗟嗟不欲煩下民自是之後百姓降丘黎庶乂安彈琴以自歎故曰禹上會稽又曰箕子吟者箕子之所作也箕子紂之諸父也紂為無道殺比干醢梅伯斫朝涉刳孕婦奢淫驕恣不修道德箕子不可諫乃被髮佯狂痛宗廟之丘墟喟然援琴而鼓之又曰文王思士者文王之所作也文王思得賢士與為治出田乃援蓍而卜之卦得所獲非龍非麟非虎非熊乃帝王之師也至渭之陽果遇呂尚與語大悅之曰吾先人太公有言當有聖人適周子其是邪遂載與之俱歸立以為師號曰太公望文王悅喜乃援琴而鼓之自敘思士之意故曰文王思士又曰武王伐紂者武王之所作也武王興師伐紂伯夷叔齊拔劍扣馬曰父死不葬而爭天下非孝也執贄而事之舉兵而伐之非義也武王以告太公望太公曰循大行者不顧細禮立大功者不恤後愆遂剋殷誅紂於牧野於是天下晏然萬民歡欣武王援琴而鼓之
