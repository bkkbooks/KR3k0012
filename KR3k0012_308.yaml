body:
  text: 兵部三十八會兵書曰戊午師渡孟津陳于啇郊俟天休命甲子昧爽受率其旅若林會于牧野旅衆也如林言盛多會逆拒戰罔有敵于我師前徒倒戈一戎衣而天下大定言與衆同心動有成也穀梁曰齊侯兵車之會四未嘗有大戰愛民也後漢書曰初卷人維汜卷縣名屬河南郡故城在今鄭州原武縣西北訞言稱神有弟子數百人坐伏誅後其弟子李廣等宣汜神化不死以誑惑百姓十七年遂共聚會徒黨攻沒睆城睆縣名屬盧江郡今舒州懷寧縣睆音下板切又下管切殺睆俟劉閔自稱南嶽大師遣謁者張宗將兵數千人討之復為廣所敗於是使馬援發諸郡兵合萬餘人擊破廣等斬之又曰章和二年護羌校尉張紆誘誅燒當種羌迷吾等由是諸羌大怒謀欲報怨朝廷憂之公卿舉鄧訓代紆為校尉諸羌激忿遂相與解仇結婚交質盟詛鄭玄注周禮云大事曰盟小事曰詛衆四萬餘人期冰合渡河攻訓又曰吳漢為安樂令會王郎起北州擾惑漢素聞光武長者獨欲歸心乃説太守彭寵曰漁陽上谷突騎天下所聞也君何不合二郡精鋭兵附劉公擊邯鄲此一時之功也一時言不可再遇也寵以為然又曰朱鮪聞光武北伐而河內孤使討難將軍蘇茂副將賈強率兵三萬餘人渡鞏河攻溫鞏溫並今洛州縣也臨廣河故曰鞏河檄書至寇恂即勒軍馳出並移告屬縣發兵會於溫下軍吏皆諫曰今洛陽兵渡河前後不絶宜待衆軍畢集乃可出也恂曰溫郡之藩蔽失溫則郡不可守遂馳赴之且曰合戰而偏將軍馮異遣救及諸縣兵適至及士馬四集幡旗蔽野恂乃令士卒乘城鼓噪大呼言曰劉公兵到蘇茂軍聞之陳動恂因奔擊大破之又曰吳漢悉發幽州兵與光武會清陽諸將望見漢還士馬甚盛皆曰是寧肯分兵與人耶及漢至莫府上兵簿莫大也兵簿軍上之名帳諸將人人多請之光武曰屬者恐不與人屬猶近也今所請又何多也諸將皆慚晉書天文志曰征吳之役三河徐兗之兵悉出交戰於吳楚之地唐書曰憲宗時鄆州李師道翻覆違命詔宣武義成武寧橫海四節度之師與田弘正會軍討之弘正奏請取黎陽渡河會李光顏等軍齊進帝召宰臣於延英議可否皆曰閫外之事大將制之既有奏陳宜遂其請裴度獨以為不可奏曰魏博一軍不同諸道過河之後却退不得便須進擊方見成功若取黎陽渡河即才離本界便至滑州徒有供餉之勞又生顧望之勢况弘正光顏並少威斷更相疑惑必恐遷延然兵事不從中制一定處分或慮不可若欲於河南持重則不如河北養威不然即且秩馬厲兵候霜降水落於楊劉渡河直抵鄆但得至陽谷已來下營則兵勢自盛形自不撓上曰卿言是矣乃詔弘正取楊劉渡河及弘正軍既濟河而南距鄆州四十里築壘賊勢果蹙頃之誅師道三國典略曰周武帝率六軍趣鄴齊主令群臣議之廣寧王孝珩議曰今大寇既深事藉機變請使任城王便領幽州道兵自土門入聲取并州獨孤永業便領洛州兵自潼關入聲取長安臣請領京畿兵出溢只鼓行逆戰賊懸軍遠來日增疲老聞南北有兵自然應退誓衆書曰帝曰咨禹惟時有苗弗率汝徂征三苗之民數千王誅率循也徂往也不循帝道言亂逆也命禹討之禹乃會群后誓于師曰濟濟有衆咸聽朕命會諸侯伐有苗也軍旅曰誓濟濟衆盛之貌蠢茲有苗昏迷不恭蠢動昏暗也言其所以宜討侮慢自賢反道敗德狎侮先王輕慢典教反正道敗德義君子在野小人在位廢仁賢任姦佞民棄不保天降之咎言民叛天災之肆豫以爾衆士奉辭罰罪肆故也辭謂不恭罪謂姦慢以下事爾尚一乃心力其克有勳三旬苗民逆命益贊于禹曰惟德動天無遠弗屆禹拜昌言班師振旅帝乃誕敷文德舞于羽於兩階七旬有苗格又曰啓與有扈戰于甘之野王曰嗟六事之人豫誓告汝有扈氏威侮五行怠棄三正天用勦絶其命用命賞于祖不用命戮于社豫則孥戮汝又曰羲和湎淫廢時亂日胤往征之告于衆曰羲和尸厥官昏迷于天象以干先王之誅今豫奉將天罰火炎崑岡玉石俱焚天吏逸德烈于猛火殲厥渠魁脅從罔治嗚呼威克厥愛允濟愛克厥威允罔功爾衆士懋戒哉欽承天子休命又曰魯侯伯禽宅曲阜徐夷並興東郊不開作費誓公曰嗟人無譁聽命善穀乃甲胃備乃弓矢煆乃戈矛無敢不善峙乃糗糧峙乃芻茭無敢不逮汝則有大刑魯人三郊三遂峙乃楨幹甲戍我惟築無敢不恭汝則有無餘刑刑者非也又曰惟戊午王次于河朔次止也戊午渡河而誓既誓而止于河之北群后以師畢會諸侯盡會次也王乃徇師而誓曰嗚呼西土有衆咸聽朕言徇循也武王在西故稱西土今啇王受力行無度行無法度播棄黎老昵比罪人鮐背之者稱黎老棄不禮敬也昵近也罪人謂天下逋逃小人也豫有亂臣十人同心同德言我治理之臣雖少而心德同也雖有周親不如仁人周至也紂至親雖多不若周家之少仁人也又曰武王伐紂曰今豫發惟恭行天之罰今日之事不愆于六步七步乃止齊焉夫子勗哉不愆于四伐五伐六伐七伐乃止齊焉勗哉夫子尚桓桓如虎如貔如熊如羆于商郊弗迓克奔以役西土勗哉夫子爾所弗勗其于爾躬有戮又曰爾衆士同力王室史記曰太尉行令軍中曰為呂氏右𥘵為劉氏左𥘵軍中皆左𥘵後漢書曰齊武王伯升既破甄阜軍乃陳兵誓衆焚積聚破釜甑鼓行而前晉書曰元帝以祖逖為奮威將軍豫州刺史給千人廩布三千匹不給鎧仗使自招慕仍將本流徙部曲百餘家渡江中流擊楫而誓曰祖逖不能清中原而復濟者有如大江辭色壯烈衆皆慨歎屯于淮陰起冶鑄兵器得二千餘人而後進又載記曰王猛與慕容評戰陳於渭原而誓衆曰王景略受國厚恩任兼內外令與諸君深入賊地宜各勉進不可退也願戮力行間以報恩顧受爵明君之朝慶觴父母之室不亦美乎衆皆勇奮破釜棄糧大呼競進後周書曰大祖率李弼獨孤信等十二將東伐至潼關太祖乃誓於師曰與爾有衆奉天威誅暴亂惟爾衆士整爾甲兵戒爾戎事無貪財以輕敵無暴民以作威用命則有賞不用命則有戮爾衆士其勉之遣于謹居軍前徇地唐書曰高祖起義兵西圖關中精甲三萬高祖杖白旗誓衆於太原之野引師即路又曰太宗征王世充陳兵穀水之上步騎五萬太宗舉麾誓衆曰隋室無道毒被蒼生我國家受命于天寧濟憶兆世充敢抗大邦數行侵暴誅殺良善恣其淫酷國家為百姓除害事不獲已各宜整爾軍旅修爾器械立勳立效龔行天罰敢有犯命者斬無赦又曰朱泚反韋皋於隴州築壇于庭血牲與將士等盟曰上天不弔國家多難逆臣乘間盜據皇宮而李楚琳亦扇凶徒傾陷城邑酷虐所加爰及本使既不事上安能恤下皋是用激心憤氣不遑底寧誓舉群公竭誠王室凡我同盟一心竭力伏順除凶祖先之靈必當幽贊言誠則志合義感則心齊粉骨塵軀決無所顧有渝此志明神殛之逮於子孫亦罔遺育皇天后土當兆斯言又使通於吐蕃以求助古司馬兵法曰古者逐奔不遠縱綏不及所以示君子且有禮不遠則難誘不及則難陷以禮為固以仁為勝既勝之後其教可復是故君子貴之也有虞氏戒於國中欲人體其命也舜以農教戰以戰教民畋獵簡習故民體之也夏后氏誓於軍中欲民先成其慮也禹會軍聚重復教肆進退左右前後離合周旋也殷誓於軍門之外欲民先意待事也殷既遵虞夏之教民又於軍門外復簡試周將交刃而誓之以致意也周用虞夏殷之教民交和接兵又復申望誓之軍德薄民俗巧也又曰賢王制禮樂法度乃作五刑興甲兵以討不義巡狩省方會諸侯考不同其有失命亂常背德逆天之時而危有功之君王者以有功德者為君長賊臣欲篡殺之遍告于諸侯章明於有罪乃告于皇天上帝日月星辰以禱于后土四海之神山川冢社冢社者天子太社也乃造于先王然後冢宰徵師于諸侯造就也就造于先祖廟也曰某國為不道征之以某年月日師至于某國至于所征之國與天子會天子正刑刑者天子之法也刑以征不義伐不從王者之法也冢宰與伯布命于軍曰入罪人之地無暴神祇無獵田無有虐無毀二功無糞墻屋無伐樹木無取六畜無取禾粟無取器城見其老幼奉歸勿傷雖遇壯者不校勿敵若傷人醫藥歸之既誅有罪王及諸侯正其國舉賢更立明正復職三者與四方諸侯伐無道之國整頓其民人舉賢良更立為君奉遵王法復五官之職事矣論衡曰師尚父為周司馬將師伐紂到孟津之上仗鉞把旄號其衆曰倉兕食兕水中之獸也善覆人船因神以化欲令急渡汝不急渡倉兕害汝河中有此之物時時出浮一身九頭人畏惡之未必覆人船者也文選曰勒三軍誓將帥元戎竟野戈鋋彗雲麾兵莊子曰市南宜僚弄丸兩家之難解孫叔敖甘寢秉羽而郢人投兵晉書曰張重華攻石季龍遣謝艾為使持節軍師將軍率步騎三萬進軍臨河麻秋以三萬衆拒之艾乘軺車冠白恰鳴鼓而行秋望而怒曰艾年少書生冠服如此輕我也命黑矟龍驂三千人馳擊之艾左右大擾左戰師李偉勸艾乘馬艾不從乃下車踞胡床指麾處分賊以為伏兵發也懼不敢進張瑁從左南緣河而絶其後秋軍乃退艾乘奔擊遂大敗之又曰陳敏一旦據有江東刑政無常不為英俊所服且子弟凶暴所在為患周玘顧榮之徒常懼禍敗遣使密報征東將軍劉準遣兵臨淮已為應及兵至敏使弟昶及將錢廣次烏江以拒之錢廣玘鄉人也潛使圖昶廣遣其屬何康投募送白事於昶昶傾視書康揮刀斬之稱州下已殺敏動者誅三族吹角為內應廣先勒兵在朱雀橋陳兵敏師萬人將戰未濟榮以白羽扇麾之敏衆潰散單騎東奔為義師所斬梁書曰魏中山王元英冠北徐州高祖詔韋睿率衆會焉英自率衆來戰睿乘素木輿執白角如意以麾軍一日數合英甚憚其強劉璠梁典曰韋睿字文懷京兆杜陵人也睿雖有曠世之度蒞民以惠愛為本所居必治將兵仁愛被服必於儒者雖臨陳交鋒常緩服乘輿執竹如意以麾進止北史曰唐永身長八尺少耿介有將帥才讀班超傳慨然有萬里之志正光中為北地太守永善取下士人競為之用臨陳常著白裙襦把角如意以指麾處分辭色自若在北地四年與賊數十戰未嘗敗北時人語曰莫陸梁恐爾逢唐將永所營之處至今猶稱唐公壘後魏書曰毛法仁言聲壯大至於軍旅田狩唱呼處分振於山谷後周書曰李遠字萬歲幼有器局志度恢然嘗與群兒為戰鬥之戲指麾部分便有軍陳之法郡守見而異之召使更戲群兒懼而散走遠持杖叱之復為向勢意氣雄壯殆甚於前郡守曰此小兒必為將帥非常人也又曰建德中東伐齊帝引兵發京師壬寅渡河與諸軍合十二月戊申次於晉州恐王師卒至於城南穿塹自喬山屬於汾水庚戍帝諸軍八萬人置陳東西二十餘里帝乘常御馬從數人巡陳處分所至輒呼主帥姓名以慰勉之將士感見知之恩各自奮勵隋書曰李子雄從幸江都帝以仗衛不整顧子雄步伍之子雄立指麾六軍肅然帝大悅曰公真武侯才也尋轉右武候大將軍唐書曰德宗時鄭權為涇原節度使劉昌從事昌病亟請入覲度軍中必有變以權寬厚善容衆俾主留務既而兵果為亂權挺身於白刃中抗詞以明逆順因殺其首亂者數人士皆戢伏又曰昭宗時玉山都頭楊守信叶楊復恭稱兵闕下陳于通化門上陳兵於延喜門是夜令劉崇望守度支庫明日曉入含光門未開門內禁軍列于左右俟門開即劫掠兩市及聞傳呼宰相來門方開崇望駐馬慰諭之曰聖上在街東親揔戎事公等禁軍何不樓前殺賊立取功名切不可剽掠街市圖小利以成惡名也將士唯唯從崇望至長樂門守信見兵來即遁軍士呼萬歲是日庫市獲全軍人不亂緊崇望之方略也五代周史曰世宗至泗洲太祖皇帝乘勝麾軍焚郭門奪月城帝親冒矢石以攻其壘丙午日南至從臣拜賀於月城之上語林曰諸葛武侯與司馬宣王在渭濱將戰宣王戎服蒞事使人視武侯素輿葛巾持白毛扇指麾三軍皆隨其進止宣王聞而歎曰可謂名士饗士左傳曰宋華元將戰殺羊食其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政與入鄭師故敗君子謂羊斟非人也以其私憾敗國殄民刑孰大焉史記曰樂毅并護趙楚韓魏燕之兵以伐齊破之濟西諸侯罷歸而燕軍樂毅獨追至于臨輜齊昏王之敗濟而亡走保於莒樂毅獨留徇齊皆城守樂毅攻入臨淄盡取齊寶財物祭器輸之燕昭王大悅親至濟上勞軍行賞饗士封毅於昌國號為昌國君東觀漢記曰上大發關東兵自將上隴隗囂衆潰走圍解於是置酒高會勞賜諸將來歙班坐絶席在諸將之右賜歙縑千匹後漢書曰吳漢圍蘇茂於廣樂劉永將周建別招聚收集得十餘萬人救廣樂漢將輕騎迎與之戰不利墮馬傷膝還營建等遂連兵入城諸將謂漢曰大敵在前而公傷臥衆心懼矣漢乃勃然裹瘡而起推牛饗士令軍合戰大破之又曰劉盆子既降帝令縣廚賜食衆積困餧十餘萬人皆得飽飫又曰鄧禹至長安軍昆明池大饗士卒率諸將齊戒擇吉日修禮謁祠高廟收十一帝神主遣使來詣洛陽因循行園陵為置吏士奉守焉後周書曰若干惠於諸將最少早喪父事母以孝聞太祖嘗造射堂新成與諸將宴射惠竊歎曰親孝矣何時辨此乎太祖聞之即日徙堂於惠宅其見重如此淮南子曰員中規方中矩動成戰止成文可以榆衆而不可以陳軍滌杯而食洗爵而飲盥而後饋可以養少而不可以饗衆黃石公記曰動為事機舒之彌四海卷之不盈懷柔而能剛則其國彌光弱而能強則其國彌章一單之醪投之於河令士衆迎飲三軍為其死戰如風發攻如河決軍無財士不來軍無賞士不往香餌之下必有懸魚重賞之下必有死夫犒師左傳曰夏齊師伐我北鄙公使展喜犒師勞齊師也使受命于展禽齊侯未入境展喜從之曰寡君聞君親舉玉趾將辱於弊邑使下臣犒執事又曰三十三年秦師過周北門及滑鄭商人弦高將市於周遇之以乘韋先牛十二犒師商行賈也乘四韋也先韋及入牛也古者將獻饋於人有以先也曰寡君聞吾子將步於弊邑敢犒從者不腆弊邑為從者之淹則具一日之積腆厚也淹久也積芻米菜薪也行則備一夕之衛又曰楚子以馹至于羅汭馹傳也羅水名吳子使其弟蹶由犒師楚人執之將以釁鼓王使問焉曰汝卜來吉乎對曰吉且吳社稷是卜豈直為一人使臣獲釁鼓而弊邑知備以禦不虞其為吉孰大焉乃弗殺後漢書曰岑鼓長驅入江關令軍中無得虜掠所過百姓皆奉牛酒迎勞彭見諸耆老為言大漢哀愍巴蜀久見虜役故興師遂伐以討有罪為人除害讓不受其牛酒百姓皆大喜悅爭開門降晉書曰桓溫進兵至霸上耆老持牛酒迎溫曰不圖今日復見官軍後梁略曰大寶元年西魏將楊忠來逼荊鎮上懼其至送遣犒軍既而與忠結盟并送質子與魏相約為兄弟之親於是聘使往還相望道路後魏書曰鄧頴從世祖幸漢南高車莫弗庫若於率騎數萬驅鹿百餘萬諸行在所詔頴為文銘于漢南以昭功德淮南子曰秦繆公使孟明舉兵襲鄭鄭賈人弦高蹇他他弦高黨人相與謀曰師行數千里又數過諸侯之地其勢必襲鄭凡襲國者以為無備也其以知其情必不敢進乃矯鄭伯之命以十二牛勞三率相與謀三率秦將白乙孟明西乞曰守備必固進必無功乃還師而反晉先軫舉兵擊之先軫晉大夫也大破之鄭伯乃以存國之賞賞弦高高辭
