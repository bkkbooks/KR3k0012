body:
  text: 工藝部一敘藝書曰以旦代某之身子仁若考能多材多藝禮曰是月也命將講武習射御角力執弓挾矢以獵又曰德成而上藝成而下又曰尚伎而賤車則人興藝周禮曰保氏掌諫王惡而養國子以道馬融曰道大藝乃教之六藝禮樂射御書數論語曰太宰問於子貢曰夫子聖者歟何其多能也子貢曰固天縱之將聖又多能也又曰志於道據於德依於仁遊於藝漢書曰元帝多伎藝華嶠後漢書曰鄧禹十三男各令習一藝梁書曰柳惲字文暢早有令名少工篇什彈琴為士流涕一帝謂周捨曰吾聞君子不可求備至於柳惲可謂具美分其才藝足了十人又曰朱異字彥和通覽五經涉獵子史博奕書算尤善沈約面試皆妙乃戲之曰君何不廉天下有藝君一時持去可謂不廉也後漢書曰祖珽字孝徵裴讓之字士禮俱崇文學邢劭省中為之語曰多伎多能祖孝徵能賦能詩裴讓之皆一時之美也後趙録曰張材伎烏談部人也善棊博蹴鞠鬭雞諸伎身長八尺飲酒石餘不亂射上中論藝紀曰射以平志御以和心書以綴事數以理煩李顒遊藝針曰邈矣姬旦惟藝之淵易曰弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽睽乖也物乖則爭興弧矢之用所以威乖爭也又曰公用射隼于高墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而後動者也括結也君子待時而動則無結閔之患也詩曰既張我弓又挾我矢又曰終日射侯不出正兮禮曰工尹商陽與陳棄疾追吳師及之陳棄疾謂工尹商陽曰王事也子手弓子射諸射之斃一人韔弓丑亮切韔弓衣止其御曰朝不坐燕不與殺三人亦足以反命矣朝燕于寢大夫坐於上士立於下然則商陽與御者皆土也孔子曰殺人之中又有禮馬善之又曰孔子云士使之射不能則辭以疾懸弧之義也男子生而設弧于門左示有射道而未能也又曰射有似乎君子失諸正鵠反求諸其身反求於其身不以怨人也盡曰正皮曰鵠也又曰孔子射於矍相之圃蓋觀者如堵墻矍相地名也樹菜蔬曰圃射至於司馬使子路執弓矢出延射曰賁房吻切軍之將亡國之大夫與為人後者不入其餘皆入蓋去者半入者半先行飲酒禮將射弓以司馬子路執弓矢延射則為司射也賁讀為僨僨猶覆則也又使公罔之裘序點楊觶而語曰幼壯孝悌耆耋好禮不從流俗修身以俟死者不在此位也蓋去者半處者半序點楊觶而語曰好學不倦好禮不變耄期音基稱道不亂者不在此位也蓋僅有存焉之發聲也射畢又使此二人舉觶者古者於旅也語語謂説美理也三十曰壯耆耋皆老也流俗失俗也處猶留也不可以在此賓位序點或為徐點壯或為將耄期或為旄動又曰射之為言繹也或曰舍也繹者各繹己之志也故心平體正持弓矢審固持弓矢審固則射中矣故曰為人父者以為父鵠為人子者以為子鵠為人君者以為君鵠為人臣者以為臣鵠故射者各射己之鵠故天子大射謂之射侯射侯者射為諸侯也射中則得為諸侯射不中不得為諸侯大射將祭擇士之射也以為某鵠者將射還視侯中之則成人不中之則不成人也得為諸侯為有慶也不得為諸侯謂有讓也天子將祭必先習射於澤澤者所以擇士也已射於澤而後射於射宮射中者得與於祭不中者不得與於祭不得與於祭者有讓削以地得與於祭者有慶益以地進爵絀地是也澤宮名也士謂諸侯朝者諸臣及所貢士也皆先令習射於澤己乃射宮課中否也諸侯有慶者先進爵有讓者先削地也故男子生桑弧蓬矢六以射天地四方天地四方者男子之所有事也故必先有志於其所有事然後敢用穀也左傳曰晉楚將戰潘尫乏子黨與養由基蹲甲而射之徹七禮焉蹲聚以示王曰君有二臣如此何憂於戰王怒曰大辱國詰朝爾射死藝言汝以射自多必當以藝死也呂錡夢射日中之退入於泥呂錡魏錡也占之曰姬姓日也異姓月也射而中之退入於泥亦必死矣及戰射恭王中目王召養由基與之二矢使射呂錡中項伏韜他力切弓衣也以一矢復命言一發而中又曰衛獻公出奔初尹公他學射於庾公差庾公差學射於公孫丁二子追公二子也與差也為孫氏逐也公孫丁御公子魚曰射為背師不射為戮射而禮乎子魚庾公差也禮射不求中也射兩軥而還軥車軛卷者今俗謂之軥心木尹公他曰子為師我則遠矣乃友之他不從丁學故曰遠始與公差具退悔而獨還射丁公孫丁授公轡而射之貫臂貫手公他臂又曰吳子諸樊伐楚以報舟師之役門于巢攻巢門也巢牛臣曰吳王勇而輕若啓之親門啓開門也我獲射之必殪殪死也是君也死疆其少安從之吳子門焉牛臣隱於短墻以射之卒又曰昔賈大夫惡貌醜也娶妻而美三年不言御以如皋射雉獲之其妻始笑而言周禮曰不司樂掌成均之法鄭司農云均調也樂師主調其音大司樂主受此成事已調之樂大射王出入令奏王夏及射令奏騶虞騶虞樂章名在召南之卒章王射以騶虞為節也詔諸侯以弓矢舞舞謂執弓挾矢揖讓進退之儀又曰樂師掌國學之政以教國子少舞謂以年幼少時教之舞凡射王以騶虞為節諸侯以貍首為節大夫以采蘋為節士以采繁為節騶虞采蘋采繁皆樂章名在國風召南為貍首在樂記又曰王以六耦射三侯三獲三容樂以騶虞九節五正諸侯以四耦射二侯二獲二容樂以貍首七節三正孤卿大夫以三耦射一候一獲一容樂以采蘋五節二正士以三耦射犴侯一獲一容樂以采蘋五節二正鄭司農云三侯虎熊豹也容者乏也待獲者所蔽也九節析羽九重設於長杠正所射也若王大射則以貍步張三侯鄭司農云貍步謂不舉足為步於今為半步也玄謂貍善博者也行則止而擬度焉其發必獲是以量侯道法之也王射則令去侯立於後以矢行告卒令取矢鄭司農云射人王令人去侯所而立於後也以矢行告射人以矢行高下左右告於王者也又曰射鳥氏掌射鳥鳥謂中膳羞者鳧鴈鴇梟之屬也祭祀以弓矢驅烏鳶凡賓客會同軍旅亦如之鳥鳶善鈔盜便汗人射則取矢矢在侯高則以并夾取之鄭司農云王射則射鳥氏主取其矢在侯高者矢著侯高人手不能及則以并夾取之并夾針箭具夾讀為習故司弓矢職曰大射燕射共弓矢并甲又曰庭氏掌射國中之祆鳥若不見鳥獸則以救日之弓與救月之矢夜射之不見鳥獸謂夜來鳴呼為怪者獸狐狼之屬鄭司農云救日之弓救月之矢謂日月食所作弓矢玄謂日月之食陰陽相勝之變也於日食則射太陰月食則射太陽若神也則以太陰之弓與枉矢射之神謂非鳥獸之聲若或叫于宋大廟嘻嘻出出者又曰王大射則共虎侯熊侯豹侯設其鵠諸侯則共熊侯豹侯卿大夫則共麋侯皆設其鵠大射者為祭祀射王將有郊廟之事與邦國所貢之士可以與祭者射者可以觀德行其容體比於禮其節比於樂而中多者得與於祭凡大射各於其射宮侯者其所射也以虎豹熊麋之皮飭其側所謂皮侯三之大射虎侯王所自射也熊侯諸侯所射豹侯卿大夫以下所射諸侯之大射熊侯諸侯所自射豹侯群臣所射卿大夫之大射麋侯君臣共射焉又曰保氏掌養國子以道教之五射五射一曰白矢二曰參連三曰剡注四曰襄尺五曰井儀也論語曰君子無所爭必也射乎言於射而後有爭也揖讓而升下而飲射於堂升及下皆揖讓而相飲也其爭也君子多算飲少算君子之所爭也又曰射不主皮射有五善焉一曰和志體和也二曰和容有容儀三日主皮能中質四曰和順合雅頌五曰與舞同射者不但以中皮為善亦兼取其和容也為力不同科古之道也為力力役之事亦在上中下設三科焉故曰不同科也韓詩外傳曰楚熊渠子夜行見寢石以為伏虎彎弓而射之沒金飲羽下視知其石也因復射之矢摧無迹也三禮射侯圖曰天子大射之時天子虎侯九十步諸侯熊侯七十步卿大夫豹侯五十步畿內諸侯大射君熊侯九十步卿大夫參侯七十步士犴五旦切侯五十步天子卿大夫射君臣共射一麋侯五十步諸侯卿大夫亦如之天子及諸侯之士皆無大射參侯者以豹皮為鵠以麋皮為飾參之為言雜也犴侯者以胡大皮為鵠亦以為飾又曰天子賓射亦三侯天子射五正侯諸侯射三正侯卿大夫射二正侯諸侯賓射二侯君三正卿大夫賓射君臣共射一侯二正士與士賓射犴侯二正士不得畫雲氣故以犴皮飾其側也畿內諸侯與外國同其侯道亦如之又曰天子燕射天子熊侯諸侯卿大夫士虎豹侯諸侯燕射君亦熊侯卿大夫亦宜參侯士鹿豕卿大夫與其臣燕射君臣共射虎豹侯士燕射亦宜豹侯畫鹿豕焉畿內諸侯與外國用其侯道亦如賓射戰國策曰楚有養由基者善射去楊葉百步而射之百發百中有一大夫過之曰善射可教矣由基子試代我射之客曰我非能教子出左屈右也夫射者百發百中而不以善息少焉氣衰力倦弓撥矢拘一矢發而不中前功盡棄矣又曰更羸與魏王處廡下有鴈從東方來更羸虛發而鴈下魏王曰射可至此乎更羸曰其飛徐其鳴悲飛徐者故瘡痛也鳴悲者失群也故痛未息驚心末去故聞弦音而下史記曰漢有善騎射者樓煩楚挑戰三合樓煩輒射殺之又曰李廣為右北平太守出獵見草中石以為虎射之中石沒鏃視之石也因復更射之終不復入廣所居郡聞有虎常自射之及居右北平射虎虎騰傷廣廣亦竟射之廣為人猿臂其善射亦天性也雖其子孫他人學者莫能及廣擊胸奴中貴人從胸奴三人射之中貴人殺其騎且盡中貴人走廣廣曰是必射雕者雕鳥善射者射之也逐之果然廣為將其射見敵非十步之內度不中不發發即應弦而倒用此為將兵數困辱漢書曰胸奴畏郅都之威刻木像都之狀交弓射之莫能一中又曰堂邑父胡人也善射與張騫俱使西域每處困之時射鳥獸供食後漢書曰王寵善射十發十中皆同處焉又曰董卓膂力過人雙帶兩鞬左右馳射為羌胡所畏魏志曰挹婁國古肅慎氏之國也善射入人目又曰文帝共上常獵為虎所逐顧射應聲而倒太祖壯其摯勇使將武騎魏略曰成公英從太祖出獵有三鹿走過太祖命英射之三發三鹿皆應弦而倒吳志曰太史慈字子義初北海相孔融以黃巾寇暴出屯都昌為賊管亥所圍慈乃帶鞬攝弓上馬將兩騎自隨各作一的持之開門直出外軍圍下左右人並驚駭兵馬牙出慈引馬至城下塹內植所持的各一出射之射畢徑入門晨復如此圍下人或起或臥故慈復植的射之畢復入門明晨復出如此無復起者於是鞭馬直突圍中馳去此賊覺知慈行已過又射數人皆應弦而倒故無敢追者慈猿臂善射弦不虛發嘗從孫策討麻保賊賊於屯裏緣樓上行罵以手持樓棼慈引弓射之矢貫手著棼圍外萬餘人莫不稱善其妙如此晉書曰劉曜字永明身長九尺六寸垂手過膝雄武有膂力射鐵入一寸焉時號神射也又曰庾翼時有衆萬詔加都督征討諸軍事師次襄陽大會僚佐陳旌甲親授弧矢曰我之行也善此射矣遂三起三疊徒衆屬目其氣十倍又曰庾翼鎮武昌謝尚數詣翼咨謀軍事嘗與翼共射翼曰卿若破的當以鼓吹相賞尚應聲中之翼即以其副鼓吹給之又曰楊濟遷太子太傳濟有才藝常從帝校獵北邙山下與侍中王濟俱著布袴褶騎馬執角弓在輦前猛獸突出帝令濟射之應弦而倒須臾復一出濟受詔又射殺之六軍大叫稱快又曰魏舒纍遷後將軍鍾育長史每與參佐射舒常為畫籌而已後遇朋人不足以舒滿數育初不知其善射舒容貌間雅發無不中舉坐愕然莫有敵者育歎而謝曰吾之不足以盡卿才有如此射矣又曰江州刺史庾悅隆安中為司徒長史曾至京口劉毅時甚窶先就府借東堂與親故出射而悅與僚佐徑來詣毅告之曰毅輩迍否之人合一射甚難君於諸堂並可望以今日見讓悅不許射者皆散唯毅留射如故又曰王愷以帝舅奢豪有牛名八百里駮常瑩其蹄角王濟請以錢千萬與牛對射而賭之愷亦自恃其能令濟先射一發破的因據胡床叱左右速探牛心來須臾而至一割便已齊春秋曰宜都王鑑字宣徹太祖第十六子善射常取甘蔗插地百步射之十發十中古之楊葉殆不能加陳書曰禇玠剛毅有膽決長騎射常從司空侯安都於徐州出獵遇猛獸玠射之再發中口入腹俄而獸斃燕書曰賈堅字世固彎弓三石餘烈祖以堅善射故親試之乃取一牛置百步上召堅使射曰能中之乎堅曰少壯之時能令不中今已年老正可中之恪大笑射發一矢拂脊再一矢磨腹皆附膚落毛上下如一恪曰復能中乎堅曰所貴者以不中為奇中之何難一發中之堅時年六十餘觀者咸服其妙又曰慕容根善射嘗從行獵有一野羊立於懸崖太祖命左右射之莫有中者根自募求射之一發而中崔鴻十六國春秋燕録曰建威翰奔還本國有徑騎百餘追之翰遙謂之曰吾既思戀而歸必無返面吾之弧矢汝曹知否無為相逼自取死也吾處汝國久矣誓不殺汝可百步豎刀吾射中者汝便宜返不中者可前也諸騎解刀豎之翰發而中鐶追騎乃散又後燕録曰慕容盛行遇賊盛曰汝欲當鋒乎試豎汝手中箭百步我善中之宜慎汝命如不中當束身相授盜乃豎箭盛一發中之盜曰相試耳資而遣之又前秦録曰符琳字永瑤堅之第五子也有文武才藝引弓五百斤射銅犁耳至於山水文詠皆綺秀清麗又前涼録曰索孚字國明燉煌人善射十中八九或謂之曰射有法乎孚曰射之為法猶人主之治天下也射者弓有強弱矢有銖兩弓不合度矢不端直主雖逢蒙不能以中才不稱官萬務荒殆雖有堯舜之君亦無以治也又趙録王劉曜親圍陳安於隴城安突圍而出近則刀矛俱發輒害六七遠則雙帶兩鞬左右馳射
