body:
  text: 逸民部一敘逸民一易曰上九不事王侯高尚其事最處事上而不纍於位不事王侯高尚其事也象曰不事王侯志可則也蠱卦又曰六五賁于丘園束帛戔戔施飾丘園盛莫大馬故賁干束帛丘園乃落賁於丘園帛乃戔戔又曰天下有山遁君子以遠小人不惡而嚴九四好遁君子吉小人否馬融曰好遁君子告言雖身在外乃心在王室此之謂也小人則不然身在外心必怨也九五嘉遁貞吉象曰嘉遁貞吉以正志也詩曰考盤剌莊公也不能修先公之業使賢者退而窮處也考盤在澗碩人之寬獨寐寤言永矢弗諼考成盤樂也箋云有窮處成樂在此澗者又曰白駒大夫剌宣王也剌其不能留賢也皎皎白駒食我場苗縶之維之以永今朝宣王之末不能用賢賢者乘白駒而去者乘白駒而來食我場中苗我絆之縶之也禮曰季春之月聘名士禮賢者又曰儒有上不臣天子下不事諸侯慎靜而尚寬強毅以與人博學以知服近文章砥礪廉隅雖分國如錙銖不臣不仕其規為有如此者論語曰子曰賢者避世其次避地其次避色其次避言子曰作者七人矣七人謂長沮桀弱丈人石門荷蕢儀封人楚狂接輿又曰子路曰不仕無義長幼之節不可廢也君臣之義如之何其廢之欲潔其身而亂大倫君子之仕也行其義也道之不行已知之矣逸民伯夷叔齊虞仲夷逸朱張柳下惠少連子曰不降其志不辱其身伯夷叔齊與謂柳下惠少連降志辱身矣言中倫行中慮其斯而已矣謂虞仲夷逸隱居放言身中清廢中權我則異於是無可無不可漢書曰薛方字子容王莽以安車迎方因使者辭謝曰堯舜在上下有巢許今明王方崇唐虞之德亦猶小臣欲便箕山之節也使者以聞莽說方言不強致也後漢書曰或問汝南范滂曰郭林宗何如人滂曰隱不違親貞不絶俗天子不得臣諸侯不得友吾不知其他又曰隗囂素聞杜林志節深相敬待以為治書後因疾告去囂復欲留強起遂稱疾篤囂意雖相望且欲復容之乃出命曰杜伯山伯山林之字也天子所不能臣諸侯所不能友蓋伯夷叔齊不食周粟令且從師友之位林雖拘於囂終不屈節又曰趙歧初名嘉年四十有重疾臥蓐七年慮奄然乃遺令勑兄子曰大丈夫遁無箕山之操仕無伊尹之勳天不我與復何言哉可立一圓石於吾墓側前刻之曰漢有逸人姓趙名嘉有志無時命也奈何又曰樊曄字子融有俊才好黃老不肯為吏又逢萌字子廉北海都昌人也家貧給事縣為亭長時尉行過亭萌候迎拜謁既而擲楯歎曰大丈夫安能為人役哉遂去之長安學通春秋時王莽殺其子宇萌謂友人曰三綱絶矣不去禍將及人即解冠桂東都城門歸將家屬浮海客於遼東萌素明陰陽知莽將有頃乃首戴瓦盆哭於市曰新乎新乎因遂潛藏及光武即位乃之琅邪勞山養志修道人皆化其德北海太守素聞其高遣吏奉謁致禮萌不後詔書徵萌託以老耄迷路東西詔使者云朝廷所以徵我者以其有益於政尚不知方面所在安能濟時乎即便駕歸連徵不起以壽終又曰井丹字大春扶風郿人也少受業太學通五經善談論故京師為之語曰五經紛紛井大春性清高未嘗修剌候人建武末沛王輔等五王居北皆好賓客更遣請丹不能致信陽候陰就光烈皇后弟也以外戚貴盛乃詭說五王求錢千萬約能致丹而別使人要劫之丹不得已既至就故為設麥飯蔥菜之食丹推去之曰以君侯能供甘旨故來相過何其薄乎更置盛饌乃食及就左右進輦丹笑曰吾聞紂駕人車豈此耶唑中皆失色就不得已而令去輦自是隱閉不關人事以壽終又曰高鳳字文通南陽葉人也少為書生家以農畝為業而專精誦讀晝夜不息妻常之田曝麥於庭令鳳護雞時天暴雨而鳳持竿誦經不覺潦水流麥妻還怪問鳳方悟之其後遂為名儒鄰里有爭財者持其兵而鬭鳳往解之不已乃脫巾叩頭固請曰仁義遜讓奈何棄之於是爭者懷感投兵謝罪鳳年老執志不倦名聲著聞太守連召請恐不得免自言本巫家不應為吏又詐與寡嫂訟田遂不仕又曰臺佟音同字孝威魏郡鄴人也隱於武安山鑿穴為居採藥自建業初中州辟不就刺史行部乃使從事致謁佟病往謝刺史曰孝威居身如是甚苦如何佟曰佟幸得保終性命存神養和如明使君奉宣詔書夕惕庶事反不苦耶遂去隱逸終不見又曰韓康字伯林京兆霸陵人常採藥名山賣於長安市口不二價三十餘年時有女子從康買藥守藥價不移女子怒曰公是韓伯林耶乃不二價乎康歎曰我本欲避名今女子皆知有我遂遁入霸陵山中博士公車連徵不至桓帝乃備玄纁之禮以安車聘使者奉詔造康不得已乃許諾辭安車自乘柴車冒晨先使者發至亭亭長以韓徵君當過方發人牛修道橋及見康柴車幅巾公為田叟也使奪其牛康即釋駕與之有頃使者至奪牛翁乃徵君也使者欲奏殺亭長康曰此自老子與之亭長何罪康因中道逃遁以壽終又曰矯慎字仲彥扶風茂陵人也少好黃老隱遁山谷因穴為屋仰慕松喬導引之術汝南吳蒼甚重之遺書以觀其志慎不答年七十餘竟不肯娶後忽歸家自言死日及期果卒又曰馬瑤矯慎同郡人也隱於汧山以兔置為事所居俗化百姓說之號馬牧先生又曰陳留老父不知何許人也桓帝代黨錮事起守外黃令陳留張升去官歸鄉里道逢友人共班荊而言升曰吾聞趙殺鳴犢仲尼臨河而返覆巢竭淵龍鳳逝而不至今官豎日亂陷害忠良賢人君子其去朝乎夫德之不建人之無援將性命之不免奈何因相抱而泣老父趍而過之植杖太息而言曰吁二丈夫何泣之悲也龍不隱鱗鳳不藏羽網羅高懸去將安所雖泣何及乎二人欲與之語不顧而去莫知所終又曰龐公者南郡襄陽人也居峴山之南未常入城府夫妻相敬如賓荊州劉表數延請不能屈乃就候之謂曰夫保全一身孰若保全天下乎公笑曰鴻鵠巢於高林之上暮而得所栖黿鼉穴於深淵之下夕而得所宿夫趍舍行止亦人之巢穴也且各得其栖宿而已天下非所保也因釋耕於壠上而妻子耘於前表指而問曰先生苦居畎畝而不肯官祿後代何以遺子孫乎公曰伐人皆遺之以危今獨遺之以安雖所遺不同未為無所遺也表歎息而去後攜其妻子而登鹿門山因采藥不返又曰向長字子平高士傳向字作尚河內朝歌人也隱居不仕性尚中和好通易老貧無資食好事者更饋焉受之取足而反其餘王莽大司空王邑辟連年乃至欲薦於莽固辭乃止遂求退讀易至於損益卦喟然歎曰吾已知富不如貧貴不如賤未知死何如生耳建武中男女嫁娶既畢勑斷家事勿相關當如我死也於是遂肆意與同好北海禽慶俱遊五嶽名山不知所在又曰王霸字孺仲太原人少有清節及王莽篡位棄冠帶絶交官建武中徵到尚書拜稱名不稱臣有司問其故霸曰天子有所不臣諸侯有所不友司徒侯霸讓位於霸閻陽毀之遂止以病歸隱居守志連徵不至又曰閔叔仲代稱節士雖周黨之潔清自以弗及也黨見其含菽飲水遺之以生蒜受而不食建武中應司徒侯霸之辟既而投劾而去復徵博士不至客居安邑老病家貧不能得肉日買豬肝一斤屠者或不肯與安邑令聞勑市吏常給焉仲叔怪而問之知乃歎曰閔叔仲豈以口腹纍安邑乎遂去客沛以壽卒又曰野王二老不知何許人也初世祖二於更始會關中擾亂遣鄧禹西征送之於道既反因於野王獵路見二老即禽世祖問曰禽何向舉手西指言此中多虎臣每即禽虎亦即臣大王勿往也世祖曰茍有其備虎亦何患二老曰何大王之謬耶昔湯即桀於鳴條而大城於毫武王即紂於牧野而大城於郟鄏彼二王者備非不深也是以即人者人亦即之雖有其備庸可忽乎世祖悟其旨謂左右曰此隱者也將用之辭去莫知所在又曰嚴光字子陵會稽餘姚人少有高名與世祖同遊學及世祖即位光乃變姓名隱身不見帝思其賢乃令以物色訪之齊國上言有一男子披羊裘釣澤中乃備安車玄纁聘之三反而後至車駕即幸其館至光臥所撫光腹曰咄咄子陵何不出相助為治耶光曰昔唐虞著德巢父洗耳士故有志何至相逼後引光入共偃臥光以足加帝腹上明日太史奏客星犯御座帝笑曰朕故人嚴子陵耳除諫議不屈耕富春山後名其釣處為嚴陵瀨范曄後漢書逸民傳序曰易稱遁之時義大矣哉是以堯稱則天不屈潁陽之高武盡美矣終全孤竹之潔自茲以降風流彌繁長往之軌未殊而感致之數匪一或隱居以求其志或回避以全其道或靜己以鎮其躁或去危以圖其安或垢俗以動其慨或疪物以激其清然觀其甘心畎畝之中憔悴江海之上豈必親魚鳥樂林草哉亦云性所至而已京房易飛候曰以知賢人隱視四方常有火雲五色具而不雨其下賢人隱莊子曰古之所謂隱士者非伏其身而弗見也非閉其言而不出也非藏其智而不發也時命大謬也又曰刻意尚行離世異俗此山谷之誹世之人也就藪澤處間曠釣漁間處無為而已矣此江海之士避世之人間暇者之所好也皇甫士安高士傳序曰孔子稱舉逸民天下之人歸心焉是以鴻崖先生創高於上皇之世許由善卷不降於唐虞之朝自三代秦漢達乎魏興受命中賢之主未嘗不聘巖穴之隱追遁世之民是以易著束帛之義禮有玄纁之制詩人發白駒之歌春秋顯子臧之節故明堂月令以季春之月聘名士禮賢者然則高讓之士王政所先
