body:
  text: 禮儀部九齋戒易上繫曰明於天之道而察於民之欲故興神物以前民用聖人以此齋戒洗心曰齋防患曰戒也周禮天官冢宰曰祀五帝則掌百官之誓戒與其具修祀五帝謂四郊及明堂誓戒要之以刑重失禮也明堂位所謂各楊其職百官廢職服大刑是其辭之略也具所當共修掃除糞灑前期十日帥執事而卜日遂戒前期前所諏之日也十日客散齋七日致齋三日執事宗伯大卜之屬既卜又戒百官以始齋禮記曲禮曰齋者不樂不吊為哀樂則失正散其思也又檀弓曰是故君子非有大故不宿於外大故謂哀憂非致齋也非疾也不晝居於內內正寢之中又王制曰天子齋戒受諫歲中群臣奉歲事諫王當所改為也司會以歲之成質於天子司會冢宰之屬掌計要者成計要也質猶平也平其計要冢宰齋戒受質贊王受之大樂正大司寇市三官以其成從質於天子大樂正於周宗伯之屬市司市也於周司徒之屬從從於司會也大司徒大司馬太司空齋戒受質百官各以其成質於三官大司徒大司馬大司空以百官之成質於天子百官此三官之屬百官齋戒受質受平報也又郊特牲曰孔子曰三日齋一日用之猶恐不敬二日伐鼓何居居讀為姬語之助何居怪之也伐猶擊也齋者止樂而二日擊鼓則是成一日齋也又郊特牲曰齋之玄也以陰幽思也故君子三日齋必見其所祭者齋三日者思其居處思其笑語思其志意思其所樂則見之也又王藻曰將適公所宿齋戒居外寢又祭義曰古者天子諸侯必有養獸之官及歲時齋戒沐浴而躬朝之犧牲祭牲必於是取之敬之至也又祭義曰致齋於內散齋於外齋之日思其居處思其笑語思其志意思其所樂思其所嗜齋三日乃見其所為齋者又祭統曰及時將祭君子乃齋齋之為言齊也齋不齊以致齋者也是故君子非有大事也非有恭敬也則不齋不齋則於物無防也嗜欲無止也及其將齋也防其邪物訖其嗜欲耳不聽樂故記曰齋者不樂言不敢散其志也心不茍慮必依於道手足不茍動必依於禮是故君子之齋也專致其精明之德也故散齋七日以定之致齋三日以齊之定之之謂齋齋者精明之至也然後可以交於神明也定者定其志意是故先期旬有一日宮宰宿夫人夫人亦散齋七日致齋三日宮宰守宮官也宿讀為肅肅猶戒也戒輕肅重也君致齋於外夫人致齋於內然後會於太廟又坊記曰子云七日戒三日齋承一人焉以為尸過之者趍走以教敬也戒謂散齋也承猶事也又表記曰子曰齋戒以事鬼神擇日月以見君恐民之不敬也禮記外傳曰凡大小祭祀必先齋敬事夫神人鬼也齋者敬也齋其心思其貌然後可以入廟齋必變食去其葷羶也居必遷坐易其常處也故散齋於外致齋於內外者公寢也內者寢中小室大祀散齋七日祭曰猶遠客意散致齋三日致者至也就祭日近則十日齋矣祭前旬外之日則有司戒告內外內外百官齋謂之夙戒夙早也中祀七日則散齋四日小祀三日月令秦書也當戰國之急大小祭祀唯三日散齋二日致齋一日春秋合誠圖曰黃帝請問太一長生之道太一曰齋戒六丁道乃可成丁取能丁寧常戒懼也家語曰季桓子將祭齋三日而二日鍾鼓之音不絶冉有問於孔子子曰孝子之祭也散齋七日慎思其事致齋三日而一用之精一而用之也猶恐不敬而二日伐鼓何其論語鄉黨曰齋必有明衣布明衣親身名所以自潔清也其物以布為之齋必變食居必遷坐又述而曰子之所慎齋戰疾此三者人所不能慎而夫子慎之史記曰藺相如謂秦王曰趙送璧時齋五日今大王亦宜齋遂許齋五日舍相如廣成傳舍秦王齋五日後乃設九賓於庭引相如又曰秦二世夢白虎囓其左驂馬殺之心不樂問占夢人曰涇水為祟二世乃齋望夷宮閻樂殺之更立子嬰為王漢書曰蕭何薦韓信於漢王何曰王宜擇日齋戒設壇場具禮乃可拜為大將軍至拜乃韓信也一軍大驚也又曰宣帝詔曰乃者鳳凰甘露降集京師嘉瑞見修興太一五帝后土之祠祈為百姓蒙福鸞鳳萬舞集止于旁齋戒之暮神光顯著薦鬯之夕神光交映或降于天或登于地或從四方來集于壇上帝嘉饗海內承福續漢書曰殤帝崩太后與兄車騎將軍鄧騭定策禁中其夜使騭持節以王青蓋車迎安帝齋于殿中范曄後漢書曰周澤字稚都為太常嘗臥疾齋宮其妻哀澤老病就問所苦澤大怒以妻子犯齋禁遂收送謝罪當世疑其詭譎時人語曰生世不諧作太常妻一歲三百六十日三百五十九日齋一日不齋醉如泥干寶晉紀曰劉毅為司隸校尉常齋而疾其妻出看之表解齋唐書曰貞元九年冬德宗以是歲有年蠻夷朝貢思親告郊廟於祀事尤重慎及將散齋謂宰臣曰在禮散齋歸正寢攝心奉祭不可聞外事其常務勿奏乃齋於別殿及命皇太子諸王行祭者皆受誓一日又曰貞元中德宗方有事於郊廟詔以皇太子為亞獻親王終獻上令問柳冕當受誓戒否冕奏準開元禮並以前七日受誓戒詞云各揚其職不供其事國有常刑冕以誓皇太子更其詞云各揚其職肅奉常儀又曰憲宗元和中南郊陰氣凝閉浹旬不開宰臣議請改日上曰郊廟事重吾齋戒有日豈可廢乎至享獻之際景物澄清人情大悅鬼谷子曰周有豪士居鬼谷號為鬼谷先生蘇秦張儀往見之先生曰吾將為二子陳言至道子其齋戒擇日而學後秦儀齋戒而往莊子曰顏回曰吾無以進矣敢問其方仲尼曰齋吾將語若顏回曰回之家貧唯不飲酒不茹葷者數月矣若此則可以為齋乎曰是祭祀之齋非心齋也回曰敢問心齋仲尼曰若一志無聽之以耳而聽之以心無聽之以心而聽之以氣唯道集虛虛者心齋也又曰梓慶削大木為鐻鐻成見者驚猶鬼神魯侯曰子一何巧矣何術以至此曰臣工人何術之有雖然有一焉臣為鐻未嘗敢以耗氣也必齋以靜心器之所以凝神者其是與又曰祝宗人玄端以臨牢策説曰汝奚惡死吾將三月犧汝十日戒十日齊藉白茅加汝肩尻于雕俎之上韓子曰燕王欲巧衛人請以棘剌之端為猴成功人曰君欲觀之半歲不入宮不飲酒食肉雨霽日出視之晏陰之間而棘剌之母猴乃可見也燕王固養之不能觀也搜神記曰王業和帝時為荊州剌史每出行部沐浴齋潔以祈于天地當啓佐愚心無使有枉百姓在州七年惠風大行苛慝不作儺禮記月令季春日命國儺九門磔攘以畢春氣洪範傳曰言之不從則有犬禍犬屬金也故磔之於九門所以抑金扶木畢成春功東方三門不桀春位不殺其盛德所在無所攘又月令仲秋曰天子乃儺以達秋氣此儺之陽氣恐陽暑至此不衰害亦將及故儺以通秋氣方欲助秋故不磔犬又月令季冬曰命有司大儺旁磔以送寒氣大儺為歲終逐陰除疫以送寒氣故周官命方相氏率百隸索室驅疫以逐之旁謂王城四旁十二門也磔謂磔犬於門也春磔九門冬禮大故偏磔於十二門所以扶陽柳陰之義犬屬金冬盡春興春為木故殺金以助木氣又郊特牲曰卿人禓禓強鬼也謂時儺索室歐疫逐強鬼也禓或為獻或為儺孔子朝服立于阼存室神也神依人也禮記外傳曰方相氏之官歲有三時率領群隸驅索癘疫之氣於宮室之中亦攘送之義也天以一氣化萬物五帝各行其德餘氣留滯則傷後時謂之不和而災疫興焉大儺者貴賤至於邑里皆得驅疫命國儺者但於國城中行之耳名之儺者取群隸為儺儺之聲周禮夏官曰方相氏掌蒙熊皮黃金四目玄衣朱裳執戈楊盾帥百隸而時儺以索室驅疫蒙冒也冒熊皮者以驚驅疫癘之鬼如今魌頭也時儺四時作方相氏以儺卻凶惡也月令季冬命國儺索搜也續漢書曰先臘一日大儺謂之逐疫其儀選中黃門子弟十二已下百二十人為侲子皆赤幘皂製執大鼗方相氏服如周制及十二獸裳衣毛角中黃門行人冗從僕射之以逐惡鬼于禁中設桃梗鬱壘葦茭畢執事者皆罷葦戟桃枝以賜公卿將軍特進諸侯禮緯曰顓頊有三子生而亡去為疫鬼一居江水是為虐鬼魑鬼一居人宮室區隅善驚人小兒於是常以正歲十二月令禮官方相氏蒙熊皮黃金四目玄衣纁裳執戈楊楯帥百隸及童子而時儺以索室而驅疫鬼以桃弧葦矢土鼓且射之以赤丸五穀播灑之以除疫殃後魏書曰高宗和平三年十二月因歲除大儺之禮遂耀兵武更為制令步兵陳於南騎士陳於北各擊鍾鼓以為節度其步兵所衣青赤黃黑別無部隊楯矟矛戟相次周回轉易以相赴就有飛龍騰蛇之變為函箱魚鱗四門之陳凡十餘法跽起前卻莫不應節陳畢南北二軍皆鳴鼓角衆盡大譟各令騎將交去來挑戰步兵更進退以拒擊南敗北捷以為盛觀自後踵以為常唐書曰舊驅儺侲子等金吾將軍並具欄笏引入閣門謹按大儺者所以驅除群厲合資威武盛其光儀欄笏之制常參朝服舊制未稱今請各依錦繡具帑襪魅帶儀力部引出入建康實録曰孫興公嘗著戲為儺至桓宣武家宣武覺其應對不凡推問之乃興公宣城記曰吳時洪巨為廬陵太守有清稱徵還船輕皆載土時歲暮除逐人就乞見土而去莊子曰遊島問雄黃曰今逐疫出魅擊鼓呼噪何也雄黃曰黔首多疾黃帝氏立巫咸使黔首沐浴齋戒以通九竅鳴鼓振鐸以動其心勞形趍步以發陰陽之氣飲酒茹蔥以通五藏夫擊鼓呼噪逐疫出魅鬼黔首不知以為魅祟也張衡東京賦曰卒歲大儺驅逐群厲方相秉鉞巫覡操茢侲子萬童丹首玄裳桃弧棘矢所發無臬飛礫雨散剛殫畢斃惶火馳而星流逐赤疫於四裔然後淩天地絶飛梁囚耕父於清泠溺女魑於神潢廉品大儺賦曰於吉日之上戊將大臘于臘蒸先茲曰之酉久宿潔靜以清澄乃班有司聚衆大儺天子坐華殿臨朱軒憑玉几席文旃率百隸之侲子群鼓噪於宮垣
