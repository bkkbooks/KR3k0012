body:
  text: 居處部五臺上爾雅曰觀四方而高曰臺積土四方者有木曰榭釋名曰臺持也言築土堅高能自勝持也尚書曰散鹿臺之財毛詩曰經始勿亟庶民子來謂文王之作靈臺也又曰新臺刺衛宣公也納伋之妻作新臺于河上而要之國人惡之而作是詩禮記月令五月可以居高明可以處臺榭左傳曰夏啓有鈞臺之饗又曰宋平公築臺妨於農收子罕請俟農功之畢公弗許築者謳曰澤門之楯實興我役邑中之黔實慰我心子罕黑居邑中子罕聞之親執朴以行築而扶其不勉者曰吾儕小人皆有闔廬以避燥濕寒暑今君為一臺而不速成何以為役謳者乃止又曰晉靈公不君從臺上彈人觀其避丸者又曰楚子成章華之臺願與諸侯落之又曰有蛇自泉臺出入于國如先君之數八月聲薑薨毀泉臺也史記曰秦皇作琅琊臺刊石頌德又曰晉靈公造九闔層之臺孫息曰臣能纍十二棊加一雞子於上公曰危哉息曰公造九層之臺三年不成實危於此公乃止又曰趙武靈王為野臺以望齊中之山境徐廣注野一作望齊也又曰蜀寡婦清其先得丹穴徐廣曰涪陵出丹也而擅其利數世家亦不訾謂其多不可訾量清寡婦也能守其業用財自衛不見侵犯秦皇帝以為貞婦而為築女懷清臺又曰淮南王安立思仙臺又曰楚靈王為章華之臺伍舉諫曰昔楚莊王為匏居之臺高不過望國氛大不過容宴豆又曰燕昭王置千金於臺上以延天下士謂之黃金臺又曰子路聞蒯聵入馳往入城造蒯聵蒯聵與孔悝登臺子路曰君焉用孔悝請得而殺之蒯聵弗聽於是子路欲燔臺蒯聵懼乃下石乞壺厭黑攻子路斷纓子路曰君子死冠不免結纓而死又曰漢武帝起柏梁臺高數十丈悉以香柏香聞數十里漢書郊祀志曰王莽篡位二年好神仙事以方士言起八風臺於宮中臺成作樂其上史記云漢武帝元封二年公孫卿言於帝曰仙人好樓居帝乃使卿持節候神作通天臺高三十丈雷雨悉在其下去長安三百里望見長安城武帝祭天臺舞八歲童女三百人置祠具招仙人祭天己令人升通天臺以候天神天神既下祭所若大流星乃舉烽火而就竹宮望拜上有承露盤仙人掌擎玉杯承雲表之露元鳳間臺自毀椽桷皆化為龍鳳隨風雨飛去西京賦云通天眇而竦峙經百常而基擢上班華以交紛下刻峭而若削也又藝文志曰曲臺后倉記七篇如淳注曰行禮射曲臺后倉為記故曰曲臺又曰趙武靈王建藂臺於邯鄲又曰文帝嘗欲作露臺計之直百金曰百金中民十家之産也吾奉先帝宮室常恐羞之何以臺為又曰二師擊右賢王召李陵使為二師將軍輜重陵召見武臺師古曰未央宮有武臺也叩頭自請曰臣所將屯邊者皆荊楚勇士奇材劍客也力扼虎射命中願得自當一隊到蘭于山南以分單于兵母令專鄉二師軍上曰將軍惡相屬邪吾發軍多無騎豫女陵對曰無所事騎師古曰猶言不事復騎也臣願以少擊衆步兵五千涉單于庭上壯而拜之後漢書曰永平初馬援女立為皇后顯宗圖畫建初中名臣列將於雲臺雲臺在南宮以椒房故獨不及援東平王蒼觀圖言於帝曰何不畫伏波像帝笑而不言魏志曰武紀建安十五年作銅雀臺十八年作金虎臺又作冰井臺魏略云黃初五年文帝東征留郭后於永始臺霖雨城樓多壞有司請移止后曰昔楚昭王出遊貞薑留漸臺江水至使迎而無符不去卒沒今帝在遠未有急而便移止奈何也何晏景福殿賦曰鎮以崇臺實曰永始復道重閣猖狂是俟吳志曰孫權於武昌臨釣臺飲酒大欣歡使人以水灑群臣曰今日酣飲醉墮臺乃止張昭曰紂為糟丘酒池長夜之飲當時亦以為樂不以為惡權有慚色而罷晉書曰汝南文成王亮太妃伏氏嘗有小疾祓於落水亮兄弟三人侍從並持節鼓吹震耀洛濱武帝登凌雲臺望見曰伏妃洛可謂富貴矣又曰范寧為豫章太守大設庠序遣往交州採磬石以供學用改革舊制不拘常憲遠近至者千餘人資給衆費一出私祿并取郡四姓子弟皆充學生課讀五經又起學臺功用彌廣又曰涼張茂築靈釣臺周輪八十餘堵其高九仞武陵人閻魯夜叩門呼曰武公遣我來曰何故勞百姓築臺乎姑臧令辛巖以魯妖妄請殺之茂曰吾信勞人魯稱先君之令何謂妖乎太府主簿馬魴曰今世難未夷唯當弘尚道素不宜勞役崇飾臺榭比年已來轉覺衆務曰奢於往昔所經營輕違雅度實非士女所望於明公茂曰吾過也命止作役崔鴻十六國春秋夏録曰赫連勃勃大破南涼傉檀于百井殺衆數萬以人頭為京觀號曰髑髏臺韓子曰景公與晏子遊少海登柏寢之臺望其國曰美哉煥乎後世將孰有之晏子曰其田氏乎曰寡人有國如田氏有之為之奈何對曰君若欲奪之則近賢遠不肖治其煩亂綏其刑罰振貧窮恤孤寡行惠而好儉民將歸君雖十田氏其如君何又曰越王伐吳先宣言吾聞吳王築如皇之臺掘淵泉之池罷苦百姓剪財貨以盡民力余為民誅之幽明録曰海中有金臺出水百丈結構巧麗窮極神功橫巖雲渚竦曜星河也晏子春秋曰景公起大臺歲寒役者皆凍晏子遂如臺執撲鞭其不務者曰吾細人也皆有闔廬以避燥濕寒暑今君為一臺而不速成國人皆以晏子助君虐也晏子歸而君令罷役仲尼曰古之善為臣者美名歸之君災禍歸之身陸賈新語曰楚靈王作乾溪之臺立百仞之高欲登浮云窺天上王孫子曰昔衛靈公坐重華之臺侍御數百隨珠照日羅衣從風仲叔御諫曰昔桀行此而滅紂用此以亡今四境內侵諸侯加兵土地日削內寵無乃太盛歟公下席再拜曰寡人過矣於是出宮女數百人百姓大悅子貢聞之曰所謂能受諫也賈子曰翟王使使之楚楚王誇之饗于章華之臺三休乃至南雍州記曰隆中諸葛亮故宅有舊井一今涸無水盛弘之記云宅西有三間屋基迹極高云是孔明避水臺先有人姓董居之滅門後無復敢有住者齊建武中有人修井得一石枕高一尺二寸長九寸獻晉安王習鑿齒又為宅銘今宅院見在樓觀本記曰尹喜宅南山阜上先館舍即大夫觀望之臺也昔老君於此山騰空時人因號曰老子陵蓋非墳墓也故爾雅云大陸曰阜大阜曰陵此之謂矣新序曰桀作瑤臺殫百姓之財伊尹諫之桀曰吾有天下猶天之有日日亡吾亡矣又曰魏王將欲為中天之臺曰敢諫者死許綰入曰聞大王將為中天之臺願加一力王曰子何力能加曰臣聞天與地相去萬五千里今王因而半之當立七千五百里高其趾當方八千里盡王之地不足以為臺趾古者堯舜建諸侯五千里王必願為臺必起兵伐諸侯盡有其地猶不足又伐四夷得方八千里乃足以為臺趾材木之積人徒之衆食廩之輸以千萬億度八千里之外當盡農畝之地足以奉給王臺具者已備乃可作王默然而罷又曰紂為鹿臺十年乃成大三里高千尺臨望雲雨故天下叛沈懷遠守越志曰熙安縣東南有圓岡高十丈四面為羊腸道論者曰尉他登此望漢而朝名曰朝臺也裴淵廣州記曰尉他築臺以朝漢室圓基千步直峭百丈螺道登進頂上三畝朔望升拜號為朝臺戴延之西征記曰許昌城本許由所居大城東北九里有許由臺高六丈廣三十步長六十步由恥聞堯讓而登此山邑人慕德故立此臺管子曰囷倉寡而臺榭繁者藏不足以供其費臺榭相望者其上下相怨也三輔故事曰未央宮前有東山臺釣臺倉池中漸臺韓詩外傳曰趙簡子有臣曰周舍立於門下抱筆執牘從之書過簡子與之居無幾而死後與諸大夫飲於洪波之臺酒酣泣曰千羊之皮不如一狐之腋衆人之唯唯不如周舍之諤諤今舍死吾亡無日矣説苑楚莊王與晉戰勝之懼諸侯之畏己也乃築為五仞之臺臺成而觴諸侯諸侯請約莊王曰我薄德之人也諸侯請為觴皆仰而曰將將之臺窅窅其謀我言而不尚諸侯伐之於是遠者來朝近者入賓又曰齊景公為露寢之臺成而不適焉柏常騫曰為臺甚急臺成君何為不適焉公曰然梟昔鳴昔鳴者其聲無不為也吾惡之甚是以不適焉柏常騫曰臣請禳而去之公曰何其對曰築新室為置白茅焉公使為室置白茅焉柏常騫夜用事明問公曰今昔聞梟聲乎公曰一鳴而不復聞使人往視之梟當陛布翼伏地而死家語曰楚王將遊荊臺司馬子期諫王怒令尹子西駕於殿下曰今荊臺之觀不可失也王喜子西出從十里還引轡而止曰夫子期忠臣也若臣諛臣也願王賞忠而誅諛也王乃還五經異義曰天子有三臺靈臺以觀天文時臺中以觀四時施化囿臺以觀鳥獸魚鱉諸侯卑不得觀天文無靈臺但有時臺囿臺歸藏夏后曰啓筮享神於晉之靈臺作璿臺山海經曰享神於大陵而上釣臺老子曰九層之臺起於纍土又曰衆人熙熙如春登臺伏滔地記曰琅琊城東南十里有郎山即古郎琊臺也秦始皇二十八年至琅琊大樂之留三月作琅琊臺臺赤孤山也然高顯出於衆山之上高五里下周二十餘里山上壘石為臺石形如磚長八尺廣四尺厚尺半三級而上級高三丈上級平敞二百餘步刊石立碑紀秦功德漢武帝亦登此臺吳越春秋曰楚靈王立建章華之臺與群臣登焉王曰臺美乎伍舉曰臣聞國君服寵以為美安民以為樂克聽以為聰致遠以為明不聞土水之崇高蟲鏤之刻畫金石之清音絲竹之悽唳以之為美昔先莊王為匏居之臺高不過望國氛大不過容宴豆士不妨守備用不煩官府民不敗時務官不易朝市今君為此臺七年國人怨焉財用盡焉年穀敗焉百姓煩焉諸侯忿怨卿士訕譏豈前王之所盛人君之所美者乎臣之誠愚不知所謂也靈王納之即除工去飾不遊於臺又曰范蠡於東武山起遊臺其上東南為司馬門立增樓冠其山巔以為靈臺起離宮於淮陽中宿臺在於高平駕臺在於成丘立苑於樂野燕臺在於石室齊臺在於襟山勾踐之出遊也休息石臺食於冷廚又曰吳王闔閭治宮室立射臺於安里華池在平昌南城宮在長樂闔閭出遊臥秋冬治於城中春夏治於姑胥之臺且食鱔山晝遊胥臺射於鷗陂馳於遊臺興樂石城又曰越得神木一雙大二十圍長五十尋陽為文梓陰為楩柟巧工施校制以規繩雕治圓轉刻削磨礱分以丹青錯畫文章嬰以白壁鏤以黃金狀類龍蛇文彩生光乃使大夫種獻之於吳王曰東海役臣臣孤勾踐使臣種敢因下吏聞於左右賴大王之力竊為小殿有餘材再拜獻之吳王大悅子胥諫曰王勿受昔者桀為靈臺紂起鹿臺陰陽不和寒暑不時五穀不熟自取其災民虛國變遂取滅亡大王受之後必為越所戮吳王不聽遂受而起姑胥之臺三年聚材五年乃成高見二百里行步之人道死巷哭不輟嗟嘻之聲民疲士苦人不聊生帝王世紀曰周赧王雖居天子之位為諸侯所侵逼與家人無異貰於民無以歸之乃上臺以避之故周人因名其臺曰逃債臺故洛陽南宮簃臺是也呂氏春秋曰有娥氏有二佚女為九成臺飲食必以獻王孫子曰昔衛靈公坐重華之臺侍御數百隋珠照日羅衣從風戴延之西征記曰官度臺去青口澤六十里魏武造也破袁紹於此楊龍驤洛陽記曰凌雲臺高二十三丈登之見孟津鄧德明南康記曰雩都君山上有玉臺方廣數丈周回盡是白石柱自然石覆如屋形也四面多松杉遙眺峨峨嚮像羽人之館風雨之後景氣明淨頗聞山上有鼓吹之聲山都木客為儛唱之節述征記曰廣陽門北魏明帝流柸池猶有處所池西平原懿公主第有皇女臺西南劉曜壘壘西曜試弩棚西北有鬥雞臺
