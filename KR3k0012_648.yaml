body:
  text: 刑法部十三殺釋名曰殺竄也埋之使不復見也周禮秋官上曰掌戮掌斬殺賊諜而搏之斬以鈇鉞若今要斬也殺以刃刀若今棄市也諜為姦寇反間者斬之小者殺之凡殺其親者焚之殺王之親者辜之焚之燒也易曰焚如死如棄如辜之言枯也謂磔之也凡殺人者踣諸市肆之三日刑盜于市踣僵尸也肆猶陳也又司刑職曰殺罪五百鄭玄曰煞死刑尚書大傳曰武王殺紂而繼公子祿父使管叔康叔監祿父武王死成王幼周公盛養成王盛猶長之使召公奭為傅周公身居位聽天下為政管叔疑周公流言於國曰公將不利王奄君薄姑謂祿父曰武王已死矣成王幼周公見疑矣此世之時也請舉事言周弱旦不和欲代之而復政也然後祿父三監叛周公以成王之命殺祿父禮曰邾婁定公時有殺其父者有司以告公瞿然失席曰是寡人之罪也寡人嘗學斷斯獄矣臣弒君凡在官者殺無赦子弒父凡在官者殺無赦言諸臣子孫無尊卑皆得殺之其罪無赦也殺其人壞其室汙其宮而瀦焉明其大逆不欲人復之也盍君踰月而後舉爵自貶損也又王制曰析言破律亂名改作執左道以亂政者殺折言破律巧賣法令也亂名改作謂變易官與物之名更作法度也左道若巫蠱及俗禁也作淫聲異服奇技奇器以疑衆殺淫聲鄭衛之聲異服若聚鷸冠瓊辨奇技奇器若公輸般請以機窆也行僞而堅言僞而辨學非而博順非而澤以疑衆殺皆謂虛華捷給無誠也假於鬼神時日卜筮以疑衆殺今時持喪葬梁蓋嫁娶卜數文書使民倍禮違制者也此四誅者不以聽左傳襄六年曰齊子尾害閭丘嬰欲殺之使帥師以伐陽州我問師故魯以師往問齊何故伐我子尾殺閭丘嬰以說于我師又昭四年曰楚子謂成虎若敖之餘也遂殺之書曰楚殺其大夫成虎懷寵也又昭四年曰楚子伏甲而饗蔡侯於申醉執而殺之刑其士七十人論語顏淵曰如殺無道以就有道何如子曰子為政焉用殺子欲善而民善矣史記曰二世使使殺公子將閭將閭曰朝廷之禮吾未嘗敢不從賓贊也廊廟之位吾未嘗敢失節也仰天而大呼天者三昆弟皆流涕自殺又曰二世又遣使者之陽周令蒙恬曰君之過多矣而卿弟毅有大罪法及內史蒙恬喟然太息曰我何罪於天無過而死良久徐曰恬罪固當死矣起臨洮塹萬餘里此其中不能無斷地脈此乃恬之罪也吞藥自殺又曰秦昭王賜白起劍令自殺武安君曰我固當死矣長平之戰趙卒降者數十萬人我詐而坑之是以死乃引劍自殺秦人憐之鄉邑皆祭祀華嶠後漢書曰梁冀聞崔琦才請與交冀行多不執琦數誠之不能受琦以言不從失意為白鵠賦冀知興己大怒幽之室谷數月得出後竟殺之范曄後漢書曰陳蕃上疏欲急誅侯覽等太后不納朝廷聞者莫不震怒蕃因與竇武謀殺之及事泄曹節等矯詔誅武等蕃時年七十餘聞難作將官屬諸生八十餘人並拔刃入丞相門攘臂呼曰大將軍忠以衛國黃門反逆何云竇氏不道耶王甫時出與蕃相忤讓蕃曰先帝新棄天下山陵未成竇武何功兄弟父子一門三侯又多取掖庭宮人作樂飲宴旬月之間資財億計大臣若此是為道耶公為棟梁枉撓阿黨復焉求賊遂令收蕃蕃拔劍叱甫甫兵不敢近乃益人圍之數十里遂執蕃送黃門北寺獄黃門從官騶踏蹴蕃曰死老魅復能損我曹員數奪我曹稟假否即害之吳志曰人詐告樓玄謗訕政事華核上疏乞玄自新孫皓疾玄名聲復徒玄及子男據付交址將張棄使以戰自效陰別勑奕令殺之據到交址病死玄一身隨奕討賊持刃步見奕輒拜奕不忍殺玄會奕暴疾卒玄殯斂奕於器中見勑書還自殺也王隱晉書曰周處字子隱陽羡人姑為中書省事時女子李忩覺父北叛時殺父處奏曰覺父以偷生破家以邀福子圉告歸懷羸結舌忩無人子之道證父攘羊傷化汙俗宜在投卑以彰凶逆平刑市朝不足塞責奏可殺忩唐書曰宰相宋申錫為鄭注所搆獄自內起崔玄亮首率諫官請對與文宗往復數百言文宗不省其詐欲置申錫於法玄亮泣曰孟軻有言衆人皆曰殺之未可也諸大夫皆曰殺之未可也天下皆曰殺之然後察之方置於法今至聖之代殺一凡庶尚須合於典法況無辜殺一宰相乎臣為陛下惜天下法實不為申錫也文宗為之感悟玄亮由此名重於朝又曰興平縣人上官興因醉格殺人亡竄吏執其父下獄興自首請罪以出其父京兆尹杜悰以其首罪免父有光教義請減死配流王彥威曰殺人者死百王共守若許殺人不死是教殺人興雖免父不合減死山海經曰共工氏之臣曰相柳氏九首以食于九山頭各自食一山之物言貪暴難饜也相柳之所抵厥為溪澤抵觸也禹殺相柳其血脈不可以樹㯏乃以為衆帝之臺曹操別傳曰始袁忠為沛相薄待操沛國桓劭亦輕之及在兗州陳留邊讓頗笑操操殺讓族其家忠劭俱避難交州操遠使就太守士燮盡族劭劭得出首拜謝於中庭操謂曰跪可解死耶遂殺之孟子曰孟子謂齊宣王曰左右皆曰可殺勿聽諸大夫皆曰可殺勿聽國人皆曰可殺然後察之見可殺焉然後殺之故曰國人殺之也言當真行大辟之罪如此而後可以為民父母又曰或問勸齊伐燕有諸曰未也今有殺人者或問之曰人可殺與則將應之曰可彼如曰孰可以殺之則將應之曰為士師則可以殺之今以燕伐燕何為勸之哉燕有罪王者當誅之燕猶齊故不可搜神記曰漢宣帝之世燕代之間有三男共取一婦生四子及其將分妻子而不可均反致爭訟廷尉范延壽斷之曰此非人類當以禽獸處之禽獸從母不從父也請戮三男以兒還母帝嗟嘆曰何必古若此則可謂當於理而厭人情也延壽蓋見人事而知用刑矣太公金匱曰殺一人而千人恐者殺之殺二人而萬人動者殺之殺三人而君振者殺之三族刑尚書泰誓曰今商王受弗敬上天降災下民沉湎冒色敢行暴虐罪人以族官人以世一人有罪刑及父母兄弟妻子言淫濫也史記曰秦始皇平六國制天下以古非今者族吏見知不舉與同罪又曰陳狶反韓信欲謀發兵欲以襲呂后太子其舍人得罪於信告信欲反於呂后呂后使武士縛信斬之長樂鍾室信方斬歎曰吾悔不用蒯通計乃為兒女子所詐豈非天哉遂夷信三族漢書刑法志曰漢興尚有夷三族之令令曰當三族者先黥劓斬左右趾笞殺之梟其首葅其骨肉於市其誹謗者又先斷舌故謂之具五刑彭越韓信之屬皆受此誅至高后元年乃除三族罪妖言令後新垣平謀逆復行三族之誅又五行志曰趙人新垣平以望氣得幸以土上立渭陽五帝廟欲出周鼎夏四月郊見上帝歲餘懼誅謀為逆發覺腰斬夷三族後漢書曰少府耿紀丞相司直韋晃起兵誅曹操不剋夷三族又曰建安五年車騎將軍董承越騎校尉和輯受密詔誅曹操事泄壬午曹操殺董承夷三族魏志曰建安二年遣謁者僕射斐茂率關西諸將誅李𠐶夷三族又曰太傅司馬宣王奏免太將軍曹爽又尚書丁謐鄧揚何晏司隸校尉畢軌荊州剌史李勝大司農桓範皆與爽通姦夷三族三十國春秋曰魏帝謁陵曹爽及弟義訓彥皆從高祖命授兵召公卿於廟堂奏皇太后廢爽丁酉斬爽義訓彥夷三族雜死刑韓子曰齊國好厚葬布帛盡於衣裘林木盡於棺槨桓公患之以告管仲曰布帛盡則無以為幣林木盡則無以為守備如民之厚葬不休奈何管仲對曰凡民之有為也非名之則利之於是乃下令曰棺過度者戮其尸罪當喪者夫戮尸無名罪當喪者無利無名無利民何故為之呂氏春秋曰趙簡子沉鸞繳於河曰吾嘗好聲色矣而鸞繳致之吾嘗好宮室臺榭矣而鸞繳來之今吾好士六年矣而鸞繳未嘗進一人也是長吾過而絀吾善也淮南子曰夏桀殷紂生燔人辜頡者為炮烙鑄金柱鑄金柱然火其下以人置上人火中而對笑之符子曰桀觀炮烙於瑤臺謂龍逢曰樂乎龍逢曰樂桀曰觀刑何無惻恆之心龍逢曰天下苦之而君以為樂臣君之股肱何不悅乎桀曰聽子諫諫得我改之諫不得我刑之龍逢曰臣觀君冠危石也臣觀君履春冰也未有冠石而不壓蹈春冰而不陷桀笑曰是曰亡則與俱亡子知我之亡而不自知乎亡子就炮烙之刑吾觀子龍逢歌趍造作勞我以生息我以炮烙故涉薪我樂人不知赴火而死
